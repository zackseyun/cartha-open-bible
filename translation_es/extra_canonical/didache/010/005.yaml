revisions:
- from: Recuerda, Señor, a tu iglesia, para librarla de todo mal y perfeccionarla en tu amor; y reúnes[a]la de los cuatro vientos, la santificada para tu reino, que le preparaste. Porque tuya es la potestad y la gloria por los siglos.
  to: Recuerda, Señor, a tu iglesia, para librarla de todo mal y perfeccionarla en tu amor; y reúnela[a] de los cuatro vientos, la santificada para tu reino, que le preparaste. Porque tuya es la potestad y la gloria por los siglos.
  rationale: 'Se corrigió un error significativo de fidelidad al fuente: «reúnes[a]la» fue reemplazado por «reúnela[a]» para reflejar correctamente el imperativo griego σύναξον. Se conservó la nota alternativa porque corresponde al audit trail inglés y sigue siendo útil en español. No se hicieron más cambios porque el resto del versículo representa bien el sentido del original y mantiene un buen registro litúrgico.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:46:16Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general el sentido del griego y del POB inglés: oración a Dios para recordar a la iglesia, librarla del mal, perfeccionarla en el amor, reunirla de los cuatro vientos y cerrar con una doxología. También conserva bien la aposición de τὴν ἁγιασθεῖσαν como referencia a la iglesia. Sin embargo, hay un error verbal importante en «reúnes[a]la»: el griego σύναξον es imperativo aoristo («reúne» / «reúnela»), no indicativo presente («reúnes»).'
  spanish_quality_summary: El texto es legible y de registro litúrgico adecuado, pero «reúnes[a]la» es gramaticalmente incorrecto en el contexto oracional y rompe la fluidez. «Reúnela» resuelve el problema y mantiene la enclisis natural. El resto del texto suena claro y digno. «Potestad» es defendible, aunque «poder» también sería más directo; no exige cambio.
  glossary_alignment: 'La terminología está mayormente alineada con el proyecto: «Señor» para κύριε en este contexto litúrgico griego es una excepción razonada al valor por defecto de Yahvé; «iglesia», «amor», «reino» y «gloria» están bien. La decisión «potestad» para δύναμις es aceptable aunque menos directa que «poder». El principal desajuste no es terminológico sino morfosintáctico: el imperativo griego debe reflejarse en español.'
  issues:
  - severity: high
    issue: «reúnes[a]la» traduce mal el modo verbal de σύναξον
    rationale: 'σύναξον es imperativo aoristo de segunda persona singular: una petición directa a Dios, no una afirmación en presente. En español debe ser «reúnela» (o «reúne[a]la» sin separación impropia), no «reúnesla» ni «reúnes[a]la».'
  - severity: low
    issue: La nota alternativa debe anclarse a la forma verbal corregida
    rationale: La nota es válida porque preserva la alternativa registrada en el audit trail inglés, pero el marcador debe permanecer sobre la forma verbal imperativa correcta en el texto revisado.
  revised_spanish_text: Recuerda, Señor, a tu iglesia, para librarla de todo mal y perfeccionarla en tu amor; y reúnela[a] de los cuatro vientos, la santificada para tu reino, que le preparaste. Porque tuya es la potestad y la gloria por los siglos.
  revised_footnotes:
  - marker: a
    text: 'O: «reúnela, la santificada».'
    reason: alternative_reading
  revision_rationale: 'Se corrigió un error significativo de fidelidad al fuente: «reúnes[a]la» fue reemplazado por «reúnela[a]» para reflejar correctamente el imperativo griego σύναξον. Se conservó la nota alternativa porque corresponde al audit trail inglés y sigue siendo útil en español. No se hicieron más cambios porque el resto del versículo representa bien el sentido del original y mantiene un buen registro litúrgico.'
