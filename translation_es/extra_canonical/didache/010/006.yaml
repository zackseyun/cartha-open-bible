source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ἐλθέτω χάρις καὶ παρελθέτω ὁ κόσμος οὗτος. Ὡσαννὰ τῷ υἱῷ Δαβίδ. Εἴ τις ἅγιός ἐστιν, ἐρχέσθω· εἴ τις οὐκ ἔστι, μετανοείτω· μαρανᾰθά. Ἀμήν.
