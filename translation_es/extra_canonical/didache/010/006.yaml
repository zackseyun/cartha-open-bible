base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/010/006.yaml
  text: 'Let grace come,

    and let this world pass away.

    Hosanna to the son of David.

    If anyone is holy, let him come;

    if anyone is not, let him repent.

    Maranatha. Amen.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:23Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Venga la gracia,

    y pase este mundo.

    ¡Hosanna al Hijo de David!

    Si alguno es santo, que venga;

    si alguno no lo es, que se arrepienta.

    Maranata. Amén.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - misericordia
  lexicon: χάρις
  rationale: La POB en inglés conserva el valor central de χάρις como 'grace'. En español, 'gracia' reproduce ese término técnico-teológico sin necesidad de suavizarlo como 'favor'.
- source_word: ὁ κόσμος οὗτος
  english_pob_choice: this world
  chosen_spanish: este mundo
  alternatives_spanish:
  - este siglo
  - este mundo presente
  lexicon: κόσμος
  rationale: '''Este mundo'' sigue de cerca la imagen del griego y la opción inglesa, manteniendo la referencia a la esfera presente sin introducir una paráfrasis más interpretativa como ''siglo''.'
- source_word: υἱῷ Δαβίδ
  english_pob_choice: the son of David
  chosen_spanish: el Hijo de David
  alternatives_spanish:
  - el hijo de David
  - el Mesías
  lexicon: υἱός
  rationale: Se conserva la fórmula mesiánica tradicional del texto, con mayúscula en 'Hijo' para reflejar su carácter titular y mantener la resonancia bíblica de la frase.
- source_word: ἅγιός ἐστιν
  english_pob_choice: is holy
  chosen_spanish: es santo
  alternatives_spanish:
  - es santo/a
  - es consagrado
  lexicon: ἅγιος
  rationale: '''Santo'' es la correspondencia natural y fiel de ἅγιος; evita expandir el sentido hacia ''consagrado'', que sería menos directo en este contexto exhortativo.'
- source_word: μετανοείτω
  english_pob_choice: let him repent
  chosen_spanish: que se arrepienta
  alternatives_spanish:
  - que cambie de mente
  - que haga arrepentimiento
  lexicon: μετανοέω
  rationale: El contexto moral y exhortativo favorece 'arrepentirse' como equivalente español habitual de μετανοέω, preservando la fuerza de llamado a cambio de dirección y no solo de opinión.
- source_word: μαρανᾰθά
  english_pob_choice: Maranatha
  chosen_spanish: Maranata
  alternatives_spanish:
  - Maranatha
  lexicon: μαρανᾰθά
  rationale: Se translitera como préstamo litúrgico en español. 'Maranata' es la forma más natural para lectura pública en español, mientras que 'Maranatha' conserva más la grafía académica; ambas remiten al mismo vocativo/arameísmo.
theological_decisions:
- issue: Invocación litúrgica final
  english_pob_reading: Maranatha. Amen.
  chosen_spanish_reading: Maranata. Amén.
  alternative_spanish_readings:
  - Maranatha. Amén.
  - ¡Ven, Señor! Amén.
  rationale: La POB inglesa conserva el arameísmo sin explicitarlo. En español se mantiene como transliteración litúrgica para no resolver interpretativamente una frase que el texto fuente preserva en forma fija.
  doctrine_reference: Uso litúrgico primitivo / arameísmo preservado
- issue: Interpretación de Ὡσαννὰ τῷ υἱῷ Δαβίδ
  english_pob_reading: Hosanna to the son of David.
  chosen_spanish_reading: ¡Hosanna al Hijo de David!
  alternative_spanish_readings:
  - Hosanna al hijo de David.
  rationale: Se conserva la aclamación 'Hosanna' y la identificación davídica sin deshacer su carácter litúrgico o mesiánico. La mayúscula en 'Hijo' ayuda a reflejar el valor titular que la POB ya sugiere en inglés.
  doctrine_reference: Aclamación mesiánica / tradición davídica
translation_notes:
  revision_awareness: El testimonio fuente griego y la traducción inglesa auditada presentan alta concordancia y no registran revisiones aplicadas; por tanto, no se introdujeron cambios de sentido ni notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'gracia' para χάρις conforme al uso POB, sin sustituirlo por 'favor'.
  - Se traduce δοῦλος no aplica aquí; no se introdujo terminología ajena al versículo.
  - '''Amén'' se conserva con acento español y ''Maranata'' como transliteración estable para lectura eclesial.'
  - La puntuación segmenta las breves cláusulas del original y respeta su tono exhortativo y litúrgico.
