id: DID.2.7
reference: Didache 2:7
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐ μισήσεις πάντα ἄνθρωπον, ἀλλὰ οὓς μὲν ἐλέγξεις, περὶ δὲ ὧν προσεύξῃ, οὓς δὲ ἀγαπήσεις ὑπὲρ τὴν ψυχήν σου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/002/007.yaml
  text: You shall not hate any person, but some you shall reprove, for some you shall pray, and some you shall love more than your own life.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:10Z'
    unchanged: false
    changes_summary: Changed 'man' to 'person' for better lexical accuracy and natural English, since ἄνθρωπον is generic rather than specifically male. Removed the stray footnote marker 'd'.
translation:
  language: es
  text: No odiarás a ninguna persona, sino que a unos reprenderás, por otros orarás, y a otros amarás más que a tu propia vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐ μισήσεις
  english_pob_choice: You shall not hate
  chosen_spanish: No odiarás
  alternatives_spanish:
  - No aborrecerás
  - No detestarás
  lexicon: μισέω
  rationale: Ἐl verbo griego expresa odio personal y moral; «odiar» es la correspondencia más directa y natural en español. Mantiene la fuerza prohibitiva sin suavizarla.
- source_word: πάντα ἄνθρωπον
  english_pob_choice: any person
  chosen_spanish: a ninguna persona
  alternatives_spanish:
  - a ningún hombre
  - a nadie
  lexicon: ἄνθρωπος
  rationale: Sigo la revisión inglesa que corrigió «man» por el genérico «person», porque ἄνθρωπον es inclusivo y no masculino específico. «Persona» evita sesgo de género y conserva el sentido universal.
- source_word: ἐλέγξεις
  english_pob_choice: you shall reprove
  chosen_spanish: reprenderás
  alternatives_spanish:
  - corregirás
  - reprenderás y convencerás
  lexicon: ἐλέγχω
  rationale: En este contexto, el verbo apunta a corregir o reprender a quien yerra. «Reprender» refleja mejor la dimensión disciplinaria que una paráfrasis más amplia.
- source_word: προσεύξῃ
  english_pob_choice: you shall pray
  chosen_spanish: orarás
  alternatives_spanish:
  - rezarás
  - orarás por
  lexicon: προσεύχομαι
  rationale: «Orar» es el equivalente estándar y claro en español bíblico contemporáneo para la acción de dirigirse a Dios en oración.
- source_word: ἀγαπήσεις
  english_pob_choice: you shall love
  chosen_spanish: amarás
  alternatives_spanish:
  - querrás
  - amarás entrañablemente
  lexicon: ἀγαπάω
  rationale: «Amar» preserva la fuerza ética del mandamiento y el paralelo con el texto griego. En español, es la forma más fiel y elevada sin volverse artificiosa.
- source_word: ὑπὲρ τὴν ψυχήν σου
  english_pob_choice: more than your own life
  chosen_spanish: más que a tu propia vida
  alternatives_spanish:
  - más que tu alma
  - más que tu propia alma
  - por encima de tu propia vida
  lexicon: ψυχή
  rationale: La POB inglesa interpreta ψυχή aquí como «life», no como «soul». En español, «vida» transmite con claridad la prioridad comparativa y evita una lectura doctrinal ajena al contexto.
theological_decisions:
- issue: Alcance universal de la prohibición inicial
  english_pob_reading: any person
  chosen_spanish_reading: a ninguna persona
  alternative_spanish_readings:
  - a ningún hombre
  - a nadie
  rationale: La formulación conserva el alcance universal y evita restringir indebidamente el mandato a varones. También mantiene la cadencia imperativa del proverbio moral.
  doctrine_reference: Imparcialidad moral y universalidad del mandato ético
- issue: Relación entre reprensión, oración y amor
  english_pob_reading: some you shall reprove, for some you shall pray, and some you shall love
  chosen_spanish_reading: a unos reprenderás, por otros orarás, y a otros amarás
  alternative_spanish_readings:
  - a unos corregirás, por otros orarás, y a otros amarás
  - a unos reprenderás, por otros pedirás en oración, y a otros amarás
  rationale: Mantengo la secuencia triple del original sin suavizarla. El texto presenta respuestas distintas según la persona; la traducción conserva esa tensión ética y pastoral.
  doctrine_reference: Discernimiento moral y caridad diferenciada
translation_notes:
  revision_awareness: La versión española incorpora la revisión inglesa que sustituyó «man» por «person» para reflejar el genérico de ἄνθρωπον. No se añade nota textual porque la corrección ya está resuelta en el lema español.
  spanish_consistency_notes:
  - Se mantiene el estilo sobrio y normativo propio del POB.
  - «Persona» se usa aquí como genérico inclusivo conforme al griego.
  - «Orar» y «amar» siguen el registro bíblico estándar sin caer en arcaísmo.
