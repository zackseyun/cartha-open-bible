  language: en
  yaml_path: translation/extra_canonical/didache/002/004.yaml
  text: You shall not be double-minded nor double-tongued, for double-tongued speech is a snare of death.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:04Z'
    unchanged: false
    changes_summary: Revised the final clause from 'the double tongue' to 'double-tongued speech' for more natural English while preserving the meaning of διγλωσσία.
translation:
  language: es
  text: No seas de doble ánimo ni de doble lengua, porque el hablar con doblez es una trampa de muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐκ ἔσῃ διγνώμων
  english_pob_choice: You shall not be double-minded
  chosen_spanish: No seas de doble ánimo
  alternatives_spanish:
  - No seas indeciso
  - No seas de dos pareceres
  lexicon: διγνώμων
  rationale: La imagen griega apunta a una persona dividida o inconstante en su interior. 'De doble ánimo' conserva esa fuerza idiomática en español y mantiene la relación con la formulación tradicional sin sonar arcaico.
- source_word: οὐδὲ δίγλωσσος
  english_pob_choice: nor double-tongued
  chosen_spanish: ni de doble lengua
  alternatives_spanish:
  - ni de lengua doble
  - ni fingido al hablar
  lexicon: δίγλωσσος
  rationale: '''Doble lengua'' reproduce de forma transparente la metáfora griega de hablar con dos bocas/criterios. Se evita ''hipócrita'' porque sería una interpretación más amplia que el término mismo.'
- source_word: παγὶς γὰρ θανάτου ἡ διγλωσσία
  english_pob_choice: for double-tongued speech is a snare of death
  chosen_spanish: porque la doble lengua es una trampa de muerte
  alternatives_spanish:
  - porque la doble lengua es un lazo de muerte
  - porque la doble lengua es una red mortal
  lexicon: διγλωσσία
  rationale: La secuencia final describe el resultado o la cualidad de la duplicidad verbal. 'Trampa de muerte' conserva la imagen de 'snare' y hace natural la construcción en español, sin debilitar el valor admonitorio del griego.
theological_decisions:
- issue: Relación entre doble ánimo y doble lengua como vicios morales relacionados, no como dos pecados aislados sin conexión.
  english_pob_reading: double-minded ... double-tongued speech
  chosen_spanish_reading: de doble ánimo ... de doble lengua
  alternative_spanish_readings:
  - indeciso ... mentiroso al hablar
  - vacilante ... engañoso al hablar
  rationale: El texto griego coloca en paralelo la inestabilidad interior y la duplicidad verbal. El español conserva ese paralelismo sin convertirlo en una simple lista de defectos desconectados.
  doctrine_reference: ética cristiana primitiva; integridad interior y veracidad en el habla
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó la cláusula final de 'the double tongue' a 'double-tongued speech' para una expresión más natural en inglés. La redacción española sigue esa misma intención al elegir 'la doble lengua' como giro natural, manteniendo el referente a la duplicidad verbal sin crear una formulación demasiado literal o extraña.
  spanish_consistency_notes:
  - 'Se conservó el paralelismo sintáctico del original: negación + doble ánimo / doble lengua + causal con ''porque''.'
  - Se evitó 'SEÑOR' u otra terminología de sustitución porque el pasaje no contiene el nombre divino.
  - No se introdujeron notas al pie porque el griego y el inglés auditado no plantean variantes textuales relevantes aquí.
