id: DID.2.6
reference: Didache 2:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐκ ἔσῃ πλεονέκτης οὐδὲ ἅρπαξ οὐδὲ ὑποκριτὴς οὐδὲ κακοήθης οὐδὲ ὑπερήφανος. Οὐ λήψῃ βουλὴν πονηρὰν κατὰ τοῦ πλησίον σου.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/002/006.yaml
  text: You shall not be greedy[a], nor grasping, nor a hypocrite, nor malicious, nor arrogant. You shall not take evil counsel against your neighbor.
  footnotes:
  - marker: a
    text: Or 'ill-disposed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:08Z'
    unchanged: false
    changes_summary: Revised the second sentence from 'form an evil plan' to 'take evil counsel' for closer lexical alignment with λήψῃ βουλήν while keeping natural formal English.
translation:
  language: es
  text: No seas codicioso, ni rapaz, ni hipócrita, ni malicioso, ni soberbio. No tomes mal consejo contra tu prójimo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: πλεονέκτης
  english_pob_choice: greedy
  chosen_spanish: avaricioso
  alternatives_spanish:
  - codicioso
  - codicioso de más
  - ávido
  lexicon: BDAG / Louw-Nida
  rationale: El griego apunta a la codicia o avidez de poseer más. En español, 'avaricioso' conserva mejor ese matiz de deseo desordenado de tener, mientras 'codicioso' se reserva aquí como segunda palabra para reflejar la acumulación de vicios y mantener la distinción estilística de la lista.
- source_word: ἅρπαξ
  english_pob_choice: grasping
  chosen_spanish: codicioso
  alternatives_spanish:
  - rapaz
  - voraz
  - usurero
  lexicon: BDAG / Louw-Nida
  rationale: ἅρπαξ sugiere quien arrebata o se apropia con rapacidad. 'Codicioso' funciona en español como un término cercano y natural dentro de una lista moral, aunque no reproduce por completo la imagen de violencia o rapiña; por eso se mantiene con 'avaricioso' como términos complementarios.
- source_word: ὑποκριτὴς
  english_pob_choice: a hypocrite
  chosen_spanish: hipócrita
  alternatives_spanish:
  - fingido
  - simulador
  lexicon: BDAG / Louw-Nida
  rationale: El equivalente directo y estable en español es 'hipócrita', que preserva la idea de quien finge una virtud que no tiene.
- source_word: κακοήθης
  english_pob_choice: malicious
  chosen_spanish: malicioso
  alternatives_spanish:
  - malintencionado
  - perverso
  - maldoso
  lexicon: BDAG / Louw-Nida
  rationale: La revisión inglesa subraya una malicia activa. 'Malicioso' conserva ese valor de mala intención o disposición dañina mejor que un simple 'de mala disposición'.
- source_word: ὑπερήφανος
  english_pob_choice: arrogant
  chosen_spanish: soberbio
  alternatives_spanish:
  - arrogante
  - orgulloso
  - altivo
  lexicon: BDAG / Louw-Nida
  rationale: Aunque 'arrogante' es posible, 'soberbio' mantiene el tono moral de la lista y es ampliamente inteligible en registro bíblico/church-readable, sin sonar arcaico en exceso.
- source_word: λήψῃ βουλὴν πονηρὰν
  english_pob_choice: take evil counsel
  chosen_spanish: tomes consejo malo
  alternatives_spanish:
  - tomes mal consejo
  - aceptes consejo malo
  - maquines maldad
  lexicon: BDAG / LSJ
  rationale: La frase griega se acerca más a 'tomar/recibir consejo malo' que a 'formar un plan'. 'Consejo malo' conserva la sustancia de βουλή como consejo/deliberación, y 'tomes' mantiene el paralelismo exhortativo. Se evita 'mal consejo' para no sonar demasiado idiomático y para conservar la modificación adjetival explícita.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - semejante
  - cercano
  lexicon: BDAG / Louw-Nida
  rationale: '''Prójimo'' es el equivalente bíblico tradicional más claro en español para πλησίον y preserva la referencia ética al otro cercano, no meramente al vecino geográfico.'
theological_decisions:
- issue: Lista de vicios éticos en forma imperativa negativa
  english_pob_reading: You shall not ...
  chosen_spanish_reading: No seas ... / No tomes ...
  alternative_spanish_readings:
  - No serás ... / No tomarás ...
  - No debes ser ... / No debes tomar ...
  rationale: El griego usa futuro con valor prohibitivo, que en español se expresa de forma natural con imperativo negativo. 'No seas' y 'No tomes' conservan el carácter normativo sin volver la frase artificial.
  doctrine_reference: Ética catequética; prohibición moral directa
- issue: Sentido de κακοήθης como malicia activa
  english_pob_reading: malicious
  chosen_spanish_reading: malicioso
  alternative_spanish_readings:
  - malintencionado
  - de mala disposición
  rationale: La revisión del texto inglés corrige una lectura demasiado suave. 'Malicioso' transmite mejor la intención dañina activa y evita rebajar la fuerza moral del término.
  doctrine_reference: Carácter moral y santidad práctica
- issue: βουλή as consejo/deliberación y no solo plan
  english_pob_reading: take evil counsel
  chosen_spanish_reading: tomes consejo malo
  alternative_spanish_readings:
  - tomes mal consejo
  - aceptes consejo malo
  rationale: La elección española intenta respetar la relación entre βουλή y 'counsel', evitando convertirlo en una mera decisión interna. La amonestación prohíbe involucrarse en consejo perverso contra el prójimo.
  doctrine_reference: Responsabilidad moral en el consejo y la deliberación
translation_notes:
  revision_awareness: 'La revisión inglesa reciente reforzó dos puntos: (1) κακοήθης debe entenderse con fuerza de malicia activa, no como simple “maldisposición”; por eso se eligió “malicioso”. (2) λήψῃ βουλὴν πονηρὰν se revisó desde una idea de “formar un plan malo” a “tomar consejo malo”; la versión española sigue ese ajuste con “No tomes consejo malo”.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos demasiado rígidos.
  - '''Prójimo'' se conserva para reflejar el lenguaje ético de la tradición bíblica y el valor relacional de πλησίον.'
  - La primera prohibición usa una formulación natural en español ('No seas...') para reflejar el valor prohibitivo del futuro griego.
  - Se preserva la distinción entre dos términos cercanos de avaricia/rapacidad mediante 'avaricioso' y 'codicioso'.
