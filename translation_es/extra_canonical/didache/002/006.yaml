review_pass:
  verdict: revise
  source_alignment_summary: La lista de vicios está mayormente bien encaminada y refleja el tono prohibitivo del griego. Sin embargo, ἅρπαξ no queda fielmente representado por «codicioso»; el término griego apunta a rapacidad, arrebato o explotación, no simplemente a deseo de poseer más. Además, βουλὴν πονηρὰν se puede expresar con más naturalidad y precisión en español como «mal consejo» o «consejo perverso»; «consejo malo» suena menos idiomático.
  spanish_quality_summary: El borrador es claro y legible, con registro eclesial natural. No obstante, «avaricioso ... codicioso» crea solapamiento semántico innecesario entre los dos primeros términos, debilitando la acumulación distintiva de vicios. La segunda frase necesita un ajuste menor para sonar más natural en español bíblico moderno.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. Las decisiones relevantes aquí son léxicas locales: conviene mantener «prójimo» para πλησίον, «malicioso» para κακοήθης, y ajustar ἅρπαξ a un término de rapacidad como «rapaz».'
  issues:
  - severity: medium
    issue: «codicioso» para ἅρπαξ es demasiado débil y se solapa con πλεονέκτης
    rationale: πλεονέκτης expresa codicia/avaricia; ἅρπαξ describe a alguien rapaz, que arrebata o explota. Usar «codicioso» para ambos campos semánticos borra una distinción significativa del original.
  - severity: low
    issue: La nota [a] ya no es necesaria si πλεονέκτης se traduce por «codicioso»
    rationale: El pie actual solo ofrece como alternativa para «avaricioso» un término que puede servir mejor como traducción principal. Tras el ajuste, no aporta información útil.
  - severity: low
    issue: «consejo malo» es menos idiomático que «mal consejo»
    rationale: Ambas opciones son comprensibles, pero «mal consejo» suena más natural en español y sigue representando adecuadamente βουλή como consejo/deliberación.
  revised_spanish_text: No seas codicioso, ni rapaz, ni hipócrita, ni malicioso, ni soberbio. No tomes mal consejo contra tu prójimo.
  revision_rationale: Se ajusta πλεονέκτης a «codicioso» y ἅρπαξ a «rapaz» para preservar la distinción léxica del griego entre codicia y rapacidad. Se mejora «consejo malo» a «mal consejo» por naturalidad idiomática sin apartarse de βουλή. Se elimina la nota al pie porque deja de ser necesaria.
  requires_gpt54_adjudication: false
