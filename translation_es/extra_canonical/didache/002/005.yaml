translation:
  language: es
  text: Tu palabra no será falsa ni vacía, sino llena de acción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Οὐκ ἔσται ὁ λόγος σου ψευδής
  english_pob_choice: Your word shall not be false
  chosen_spanish: Tu palabra no será falsa
  alternatives_spanish:
  - Tu palabra no será mentirosa
  - Tu palabra no será engañosa
  lexicon: λόγος
  rationale: El griego λόγος puede abarcar 'palabra' en sentido de dicho o declaración. 'Palabra' conserva bien la referencia directa al habla comprometida. 'Falsa' reproduce ψευδής sin recargar el texto con una expresión más interpretativa.
- source_word: οὐ κενός
  english_pob_choice: not empty
  chosen_spanish: ni vacía
  alternatives_spanish:
  - ni vana
  - ni hueca
  lexicon: κενός
  rationale: κενός indica vacío, carente de contenido o efecto. 'Vacía' es natural en español y mantiene la oposición con el final de la línea, donde la palabra debe estar llena de acción.
- source_word: μεμεστωμένος πράξει
  english_pob_choice: filled with action
  chosen_spanish: llena de acción
  alternatives_spanish:
  - llena de obras
  - llena de hechos
  lexicon: μεμεστωμένος
  rationale: El participio perfetivo expresa estar colmado o rebosante. 'Llena de acción' sigue de cerca la imagen del texto recibido y preserva la tensión entre mera declaración y palabra eficaz. 'Obras' o 'hechos' son posibles, pero pueden sugerir una formulación más moral o interpretativa de la que el griego ofrece aquí.
theological_decisions:
- issue: Relación entre palabra verdadera y palabra eficaz
  english_pob_reading: Your word shall not be false or empty, but filled with action.
  chosen_spanish_reading: Tu palabra no será falsa ni vacía, sino llena de acción.
  alternative_spanish_readings:
  - Tu palabra no será falsa ni vacía, sino llena de obras.
  - Tu palabra no será falsa ni vacía, sino eficaz en la práctica.
  rationale: El texto contrapone una palabra meramente verbal con una palabra que se realiza en πράξις. La versión española conserva esa tensión sin convertirla en una paráfrasis doctrinal más amplia.
  doctrine_reference: Sabiduría práctica / integridad del habla en ética cristiana primitiva
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés fue verificado como de alta concordancia con la fuente griega. La versión española sigue esa lectura estable y no añade notas textuales porque no hay variantes relevantes en el paquete provisto.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece el tetragrámaton ni una cita explícita del nombre divino en este pasaje.
  - Se mantiene un registro sobrio y directo, acorde con un dicho moral breve.
  - '''Acción'' se usa como equivalente transparente de πράξις en este contexto, sin ampliar a ''obras'' salvo en una alternativa anotada.'
