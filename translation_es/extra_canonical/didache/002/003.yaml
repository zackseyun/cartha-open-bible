source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐκ ἐπιθυμήσεις τὰ τοῦ πλησίον, οὐκ ἐπιορκήσεις, οὐ ψευδομαρτυρήσεις, οὐ κακολογήσεις, οὐ μνησικακήσεις.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/002/003.yaml
  text: You shall not covet the things of your neighbor[a]; you shall not swear falsely; you shall not bear false witness; you shall not speak evil; you shall not hold a grudge.
  footnotes:
  - marker: a
    text: Or 'You shall not desire the things of your neighbor'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:02Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: No codiciarás los bienes de tu prójimo[a]; no jurarás falsamente; no darás falso testimonio; no hablarás mal; no guardarás rencor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No desearás los bienes de tu prójimo».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιθυμήσεις
  english_pob_choice: covet
  chosen_spanish: codiciarás
  alternatives_spanish:
  - desearás
  - apetecerás
  lexicon: ἐπιθυμέω
  rationale: En este contexto, el verbo no expresa un deseo neutral sino la ambición ilícita que el Decálogo prohíbe; por eso «codiciar» reproduce mejor la fuerza ética del mandamiento que un simple «desear».
- source_word: τὰ τοῦ πλησίον
  english_pob_choice: the things of your neighbor
  chosen_spanish: los bienes de tu prójimo
  alternatives_spanish:
  - las cosas de tu prójimo
  - lo de tu prójimo
  lexicon: τὰ τοῦ πλησίον
  rationale: La expresión griega alude a lo que pertenece al prójimo. En español, «bienes» comunica con naturalidad esa esfera de posesiones sin restringir innecesariamente el sentido de «cosas».
- source_word: ἐπιορκήσεις
  english_pob_choice: swear falsely
  chosen_spanish: jurarás falsamente
  alternatives_spanish:
  - perjurarás
  - jurarás en falso
  lexicon: ἐπιορκέω
  rationale: La forma verbal prohíbe el juramento falso; «jurarás falsamente» conserva la relación directa con el acto de jurar y es comprensible en español moderno.
- source_word: ψευδομαρτυρήσεις
  english_pob_choice: bear false witness
  chosen_spanish: darás falso testimonio
  alternatives_spanish:
  - testificarás falsamente
  - serás falso testigo
  lexicon: ψευδομαρτυρέω
  rationale: «Dar falso testimonio» es la equivalencia jurídico-bíblica más clara y fiel, y evita una paráfrasis más amplia que perdería la referencia al testimonio.
- source_word: κακολογήσεις
  english_pob_choice: speak evil
  chosen_spanish: hablarás mal
  alternatives_spanish:
  - dirás mal de
  - calumniarás
  lexicon: κακολογέω
  rationale: El griego indica hablar de modo dañino o injurioso; «hablar mal» reproduce esa fuerza de manera natural sin añadir un matiz de calumnia que no está explícito en el término.
- source_word: μνησικακήσεις
  english_pob_choice: hold a grudge
  chosen_spanish: guardarás rencor
  alternatives_spanish:
  - albergarás resentimiento
  - mantendrás rencor
  lexicon: μνησικακέω
  rationale: La idea es retener memoria hostil para actuar desde ella; «guardar rencor» es la forma española más estable y fiel para ese sentido.
theological_decisions:
- issue: Eco del Decálogo en una colección ética cristiana primitiva
  english_pob_reading: The wording follows the Decalogue pattern with direct prohibitions.
  chosen_spanish_reading: La redacción mantiene el tono de mandamientos directos, siguiendo el patrón del Decálogo.
  alternative_spanish_readings:
  - El texto podría suavizarse como exhortaciones generales.
  - Podría leerse solo como lista moral sin eco bíblico directo.
  rationale: El griego presenta una serie de prohibiciones categóricas, y el POB inglés conserva ese carácter mandatorio. En español, el futuro de mandato negativo transmite mejor esa estructura normativa.
  doctrine_reference: Éxodo 20:13–17; Deuteronomio 5:17–21
- issue: Distinción entre deseo neutro y codicia ilícita
  english_pob_reading: covet
  chosen_spanish_reading: codiciar
  alternative_spanish_readings:
  - desear
  - apetecer
  rationale: La revisión inglesa ya decidió que el contexto pide «covet» y no «desire». En español, «codiciar» conserva la tensión moral del mandamiento y evita banalizar el verbo.
  doctrine_reference: Éxodo 20:17; Romanos 7:7
translation_notes:
  revision_awareness: La revisión inglesa posterior corrigió 'desire' a 'covet' para reflejar mejor ἐπιθυμέω en el contexto del eco del Decálogo. La versión española sigue esa decisión y mantiene la alternativa menos intensa en una nota para transparentar la opción semántica.
  spanish_consistency_notes:
  - Se mantiene la segunda persona singular con futuro de mandato negativo para conservar el tono directivo del original.
  - Se usa 'prójimo' para τοῦ πλησίον, en línea con el valor relacional de la expresión.
  - Se evita 'SEÑOR' u otra adaptación no pertinente porque este versículo no contiene el nombre divino ni κύριος.
  - Se conserva un registro bíblico claro pero moderno, sin arcaísmos innecesarios.
