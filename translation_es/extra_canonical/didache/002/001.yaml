review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro auditado en inglés en la mayor parte del versículo: conserva la secuencia de prohibiciones, distingue magia/hechicería, mantiene la doble prohibición de aborto e infanticidio, y preserva la triada final sin resolver su tensión. Sin embargo, hay varios puntos donde la fidelidad léxica o la naturalidad española pueden mejorarse: παιδοφθορήσεις como «corromperás a los niños» diluye la especificidad de varones; διγλωσσία se vierte mejor como el hablar de doble lengua o habla de doble lengua, no simplemente «la doble lengua»; ἅρπαξ como «rapaz» suena arcaico/ambiguo en español general; y «No odiarás a toda persona» en español puede leerse de forma torpe o lógica-quantificacional.'
  spanish_quality_summary: 'El texto es generalmente legible y digno, pero algunas elecciones suenan poco naturales o ambiguas para un español eclesial amplio: «rapaz» puede entenderse como ave de rapiña o adjetivo literario; «la doble lengua es lazo de muerte» resulta menos claro que una formulación con «hablar»; «No odiarás a toda persona» necesita pulido para sonar idiomático sin perder el matiz de πάντα ἄνθρωπον. También conviene hacer más clara la referencia sexual de παιδοφθορήσεις en la nota y en el texto principal mediante «a los muchachos».'
  glossary_alignment: 'No hay conflicto con los términos doctrinales globales del proyecto. Las decisiones sobre «la enseñanza», «mandamiento», «vida», «magia/hechicería» y la prohibición del aborto se alinean bien con el expediente inglés. Las excepciones recomendadas son léxicas y de estilo: cambiar «niños» por «muchachos» para reflejar mejor παιδοφθορήσεις; cambiar «rapaz» por «aprovechado» o equivalente más claro; y ajustar la imagen de διγλωσσία para preservar la metáfora con español más natural.'
  issues:
  - severity: medium
    issue: «corromperás a los niños» debilita la especificidad de παιδοφθορήσεις
    rationale: El expediente inglés y la decisión teológica subrayan corrupción sexual de menores varones. «Niños» puede sonar demasiado amplio e incluso infantilizar en exceso; «muchachos» conserva mejor la referencia a varones sin tecnicismo duro.
  - severity: medium
    issue: «la doble lengua es lazo de muerte» reproduce la imagen de forma algo opaca
    rationale: La revisión inglesa ajustó διγλωσσία a «double-tongued speech». En español, «el hablar de doble lengua» o «el habla de doble lengua» comunica mejor que se trata de la práctica/discurso, no de un órgano literal.
  - severity: medium
    issue: «rapaz» para ἅρπαξ es ambiguo y poco claro en español contemporáneo
    rationale: Aunque etimológicamente defendible, en lectura general puede evocar ‘ave rapaz’ o registro literario. El inglés auditado eligió «grasping» de modo amplio; «aprovechado» o «codicioso en lo ajeno» transmite mejor el vicio sin sobreespecificar.
  - severity: low
    issue: «No odiarás a toda persona» suena rígido en español
    rationale: Aunque intenta reflejar πάντα ἄνθρωπον, la frase no es idiomática. «No odiarás a nadie» sería demasiado niveladora; una solución como «No odiarás a ningún ser humano» mantiene amplitud y buena lectura, con nota si se desea, pero aquí basta el ajuste estilístico.
  - severity: low
    issue: «un plan malo» es comprensible pero menos fuerte que «un plan perverso»
    rationale: βουλὴν πονηρὰν tiene carga ética más marcada que simple ‘malo’. «Perverso» o «malvado» suena mejor en una lista moral sin ser artificioso.
  revised_spanish_text: 'Y el segundo mandamiento de la enseñanza es este: No matarás; no cometerás adulterio; no corromperás a los muchachos[a]; no cometerás inmoralidad sexual; no robarás; no practicarás magia; no usarás hechicería; no matarás a un niño por aborto, ni matarás al que haya nacido[b]. No desearás las cosas de tu prójimo; no jurarás falsamente; no darás falso testimonio; no hablarás mal; no guardarás rencor. No serás de doble ánimo ni de doble lengua, porque el hablar de doble lengua es lazo de muerte. Tu palabra no será falsa ni vacía, sino llena de acción[c]. No serás avaricioso, ni aprovechado, ni hipócrita, ni malintencionado, ni arrogante. No tramarás un plan perverso contra tu prójimo. No odiarás a ningún ser humano; pero a unos reprenderás, por otros orarás, y a otros amarás más que tu propia vida.'
