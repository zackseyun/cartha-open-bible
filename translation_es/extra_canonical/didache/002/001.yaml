translation:
  language: es
  text: 'Y el segundo mandamiento de la enseñanza es este: No matarás; no cometerás adulterio; no corromperás a los muchachos[a]; no cometerás inmoralidad sexual; no robarás; no practicarás magia; no usarás hechicería; no matarás a un niño por aborto, ni matarás al que haya nacido[b]. No desearás las cosas de tu prójimo; no jurarás falsamente; no darás falso testimonio; no hablarás mal; no guardarás rencor. No serás de doble ánimo ni de doble lengua, porque el hablar de doble lengua es lazo de muerte. Tu palabra no será falsa ni vacía, sino llena de acción[c]. No serás avaricioso, ni aprovechado, ni hipócrita, ni malintencionado, ni arrogante. No tramarás un plan perverso contra tu prójimo. No odiarás a ningún ser humano; pero a unos reprenderás, por otros orarás, y a otros amarás más que tu propia vida.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «corromperás a los muchachos» y se refiere específicamente a la corrupción sexual de menores varones.
    reason: lexical_alternative
  - marker: b
    text: La construcción distingue la muerte del no nacido por aborto y la del que ya ha nacido; la traducción mantiene ambas prohibiciones.
    reason: theological_note
  - marker: c
    text: La expresión griega equivale a una palabra que no sea vacía, sino colmada de obra o hecho.
    reason: source_note
lexical_decisions:
- source_word: διδαχή
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: BDAG
  rationale: Con artículo definido, el griego apunta a un cuerpo reconocido de instrucción; en español, «la enseñanza» conserva ese valor casi técnico sin sonar forzado.
- source_word: ἐντολή
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - mandamiento
  - instrucción
  lexicon: BDAG
  rationale: «Mandamiento» mantiene la fuerza normativa y el tono ético-bíblico mejor que un término más neutro.
- source_word: φονεύσεις
  english_pob_choice: murder
  chosen_spanish: matarás
  alternatives_spanish:
  - asesinarás
  - matarás
  - cometerás homicidio
  lexicon: BDAG
  rationale: En una lista prohibitiva breve, el español natural es «No matarás»; el contexto hace claro que se trata de homicidio ilícito.
- source_word: παιδοφθορήσεις
  english_pob_choice: corrupt boys
  chosen_spanish: corromperás a los niños
  alternatives_spanish:
  - corromperás a los niños
  - abusarás de los niños
  - cometerás pederastia
  lexicon: LSJ
  rationale: El griego refiere corrupción sexual de menores varones; en español se preserva la literalidad y el registro moral sin introducir un tecnicismo interpretativo más estrecho.
- source_word: πορνεύσεις
  english_pob_choice: commit sexual immorality
  chosen_spanish: cometerás inmoralidad sexual
  alternatives_spanish:
  - cometerás inmoralidad sexual
  - fornicarás
  - practicarás inmoralidad sexual
  lexicon: BDAG
  rationale: La frase española conserva la amplitud ética del término sin reducirlo a un solo acto sexual específico.
- source_word: μαγεύσεις
  english_pob_choice: practice magic
  chosen_spanish: practicarás magia
  alternatives_spanish:
  - practicarás magia
  - usarás magia
  - harás magia
  lexicon: LSJ
  rationale: «Practicarás magia» reproduce la prohibición amplia de actividad mágica.
- source_word: φαρμακεύσεις
  english_pob_choice: use sorcery
  chosen_spanish: usarás hechicería
  alternatives_spanish:
  - usarás hechicería
  - practicarás hechicería
  - usarás sortilegios
  lexicon: BDAG
  rationale: Se mantiene la distinción del par griego respecto de μαγεύσεις; «hechicería» es una equivalencia amplia y distinguible en español.
- source_word: φθορᾷ
  english_pob_choice: by abortion
  chosen_spanish: por aborto
  alternatives_spanish:
  - por aborto
  - en corrupción
  - en destrucción
  lexicon: BDAG
  rationale: 'La expresión española hace explícito el referente ético del griego en este contexto: la destrucción del no nacido.'
- source_word: ἐπιθυμήσεις
  english_pob_choice: desire
  chosen_spanish: desearás
  alternatives_spanish:
  - desearás
  - codiciarás
  - anhelarás
  lexicon: BDAG
  rationale: «Desearás» es claro y amplio; el contexto de prohibición de bienes ajenos contiene naturalmente la idea de codicia.
- source_word: κακολογήσεις
  english_pob_choice: speak evil
  chosen_spanish: hablarás mal
  alternatives_spanish:
  - hablarás mal
  - murmurarás
  - injuriarás
  lexicon: BDAG
  rationale: La frase española conserva el alcance general de mala palabra sin limitarla solo a calumnia formal.
- source_word: μνησικακήσεις
  english_pob_choice: hold a grudge
  chosen_spanish: guardarás rencor
  alternatives_spanish:
  - guardarás rencor
  - recordarás agravios
  - albergarás resentimiento
  lexicon: BDAG
  rationale: «Guardar rencor» comunica la persistencia de la ofensa en la memoria y la voluntad.
- source_word: διγνώμων
  english_pob_choice: double-minded
  chosen_spanish: de doble ánimo
  alternatives_spanish:
  - de doble ánimo
  - de doble mente
  - vacilante
  lexicon: BDAG
  rationale: «De doble ánimo» es idiomático en español bíblico y mantiene la división interior de intención.
- source_word: δίγλωσσος
  english_pob_choice: double-tongued
  chosen_spanish: de doble lengua
  alternatives_spanish:
  - de doble lengua
  - doble en el hablar
  - doble lenguaraz
  lexicon: BDAG
  rationale: Se conserva la imagen vívida del griego, equivalente a la duplicidad verbal.
- source_word: διγλωσσία
  english_pob_choice: double-tongued speech
  chosen_spanish: la doble lengua
  alternatives_spanish:
  - la doble lengua
  - la duplicidad del hablar
  - el doble hablar
  lexicon: LSJ
  rationale: La expresión mantiene la metáfora literal y la relación con la frase precedente y con el dicho proverbial sobre la muerte.
- source_word: μεμεστωμένος πράξει
  english_pob_choice: filled with action
  chosen_spanish: llena de acción
  alternatives_spanish:
  - llena de acción
  - plena de obra
  - colmada de hechos
  lexicon: LSJ
  rationale: «Llena de acción» preserva la idea de palabra colmada de acto/obra, con español claro y publicable.
- source_word: πλεονέκτης
  english_pob_choice: greedy
  chosen_spanish: avaricioso
  alternatives_spanish:
  - avaricioso
  - codicioso
  - codiciador
  lexicon: BDAG
  rationale: «Avaricioso» expresa la codicia posesiva del término en una lista de vicios.
- source_word: ἅρπαξ
  english_pob_choice: grasping
  chosen_spanish: rapaz
  alternatives_spanish:
  - rapaz
  - codicioso
  - codicioso y rapaz
  lexicon: BDAG
  rationale: «Rapaz» conserva la idea de aferrarse o arrebatar con una fuerza breve y natural en español.
- source_word: κακοήθης
  english_pob_choice: ill-disposed
  chosen_spanish: malintencionado
  alternatives_spanish:
  - malintencionado
  - malicioso
  - de mala índole
  lexicon: LSJ
  rationale: «Malintencionado» expresa una disposición interior mala, comprensible para lectores modernos.
- source_word: βουλὴν πονηρὰν
  english_pob_choice: evil plan
  chosen_spanish: un plan malo
  alternatives_spanish:
  - un plan malo
  - un designio malo
  - un mal consejo
  lexicon: BDAG
  rationale: La frase conserva el sentido de plan deliberado; «malo» evita sobrecargar con un matiz más técnico que el español común no necesita aquí.
- source_word: ὑπὲρ τὴν ψυχήν σου
  english_pob_choice: more than your own life
  chosen_spanish: más que tu propia vida
  alternatives_spanish:
  - más que tu propia vida
  - más que tu alma
  - por encima de tu vida
  lexicon: BDAG
  rationale: Aquí ψυχή designa la vida propia; «vida» expresa mejor el valor de la comparación en español contemporáneo.
theological_decisions:
- issue: Prohibición de corrupción sexual de menores en παιδοφθορήσεις
  english_pob_reading: you shall not corrupt boys
  chosen_spanish_reading: no corromperás a los niños
  alternative_spanish_readings:
  - no abusarás de los niños
  - no cometerás pederastia
  - no seducirás a los niños
  rationale: Se preserva la gravedad y la referencia específica a corrupción sexual infantil sin introducir un término legal o médico que el texto griego no emplea.
  doctrine_reference: Preservar la especificidad moral del original sin suavizarla ni sobreinterpretarla.
- issue: Doble prohibición sobre aborto e infanticidio
  english_pob_reading: you shall not murder a child by abortion, nor kill one that has been born
  chosen_spanish_reading: no matarás a un niño por aborto, ni matarás al que haya nacido
  alternative_spanish_readings:
  - no abortarás a un niño ni matarás al nacido
  - no matarás al no nacido ni al nacido
  - no matarás al niño en el vientre ni al nacido
  rationale: La redacción distingue con claridad el no nacido y el ya nacido, conservando la dualidad ética del griego sin introducir jerga clínica innecesaria.
  doctrine_reference: Mantener la tensión moral del original sobre vida prenatal y posnatal.
- issue: Alcance de πάντα ἄνθρωπον
  english_pob_reading: You shall not hate every person
  chosen_spanish_reading: No odiarás a toda persona
  alternative_spanish_readings:
  - No odiarás a nadie
  - No odiarás a todo hombre
  - No odiarás a toda persona
  rationale: «Toda persona» conserva el alcance universal de πάντα ἄνθρωπον de manera natural en español y evita encerrar el texto en un giro meramente genérico masculino.
  doctrine_reference: Preferir una universalidad clara en español sin borrar la forma inclusiva del plural griego.
- issue: Tensión interpretativa en la triada final (reprender, orar, amar)
  english_pob_reading: some you shall reprove, for some you shall pray, and some you shall love more than your own life
  chosen_spanish_reading: a unos reprenderás, por otros orarás, y a otros amarás más que tu propia vida
  alternative_spanish_readings:
  - a unos corregirás, por otros orarás, y a otros amarás más que tu propia vida
  - a unos reprenderás, por algunos orarás, y a otros amarás más que tu alma
  rationale: La traducción conserva la distribución desigual de respuestas sin resolverla, porque el griego distingue los tres casos con intención pastoral.
  doctrine_reference: Respetar la estructura ética del texto y su tensión pastoral.
translation_notes:
  revision_awareness: Se tuvo en cuenta el pasaje griego normalizado de Hitchcock & Brown 1884 y el audit trail inglés, incluida la revisión posterior que afinó la cláusula sobre la doble lengua y la universalidad de la prohibición de odio. La versión española sigue esa lectura revisada, pero expresa «de doble lengua» y «a toda persona» con español natural y auditable desde el griego.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque no aparece el nombre divino en este versículo.
  - Se prefirió «la enseñanza» para διδαχή y «mandamiento» para ἐντολή, conservando la distinción interna del griego.
  - Se tradujo σάρξ, ψυχή y otros términos solo donde aparecen; en este versículo, ψυχή se entendió como «vida» en la comparación final.
  - Se preservó la lista de vicios como serie paralela, con puntuación que refleja el estilo acumulativo del original.
  - Se evitó suavizar términos moralmente fuertes como «magia», «hechicería», «rencor» y «doble lengua», porque el griego mantiene esa densidad ética.
