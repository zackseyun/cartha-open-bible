- from: 'Y el segundo mandamiento de la enseñanza es este: No matarás; no cometerás adulterio; no corromperás a los niños[a]; no cometerás inmoralidad sexual; no robarás; no practicarás magia; no usarás hechicería; no matarás a un niño por aborto, ni matarás al que haya nacido[b]. No desearás las cosas de tu prójimo; no jurarás falsamente; no darás falso testimonio; no hablarás mal; no guardarás rencor. No serás de doble ánimo ni de doble lengua, porque la doble lengua es lazo de muerte. Tu palabra no será falsa ni vacía, sino llena de acción[c]. No serás avaricioso, ni rapaz, ni hipócrita, ni malintencionado, ni arrogante. No formarás un plan malo contra tu prójimo. No odiarás a toda persona; pero a unos reprenderás, por otros orarás, y a otros amarás más que tu propia vida.'
  to: 'Y el segundo mandamiento de la enseñanza es este: No matarás; no cometerás adulterio; no corromperás a los muchachos[a]; no cometerás inmoralidad sexual; no robarás; no practicarás magia; no usarás hechicería; no matarás a un niño por aborto, ni matarás al que haya nacido[b]. No desearás las cosas de tu prójimo; no jurarás falsamente; no darás falso testimonio; no hablarás mal; no guardarás rencor. No serás de doble ánimo ni de doble lengua, porque el hablar de doble lengua es lazo de muerte. Tu palabra no será falsa ni vacía, sino llena de acción[c]. No serás avaricioso, ni aprovechado, ni hipócrita, ni malintencionado, ni arrogante. No tramarás un plan perverso contra tu prójimo. No odiarás a ningún ser humano; pero a unos reprenderás, por otros orarás, y a otros amarás más que tu propia vida.'
  rationale: 'Se propone una revisión menor pero necesaria para mejorar fidelidad y legibilidad: «muchachos» refleja mejor παιδοφθορήσεις; «el hablar de doble lengua» aclara διγλωσσία conforme al expediente inglés; «aprovechado» comunica mejor ἅρπαξ en español general; «tramarás un plan perverso» expresa mejor βουλὴν πονηρὰν; y «No odiarás a ningún ser humano» evita una formulación española rígida sin alterar el sentido ético general del pasaje.'
  reviewer_model: gpt-5.4
