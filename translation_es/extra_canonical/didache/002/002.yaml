id: DID.2.2
reference: Didache 2:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐ φονεύσεις, οὐ μοιχεύσεις, οὐ παιδοφθορήσεις, οὐ πορνεύσεις, οὐ κλέψεις, οὐ μαγεύσεις, οὐ φαρμακεύσεις, οὐ φονεύσεις τέκνον ἐν φθορᾷ οὐδὲ γεννηθὲν ἀποκτενεῖς.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/002/002.yaml
  text: You shall not murder; you shall not commit adultery; you shall not sexually abuse boys;a you shall not commit sexual immorality; you shall not steal; you shall not practice magic; you shall not use sorcery; you shall not kill a child by abortion, nor kill one that has been born.b
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:01Z'
    unchanged: false
    changes_summary: Changed 'corrupt boys' to 'sexually abuse boys' for clearer and more accurate rendering of παιδοφθορήσεις, and changed the second 'murder' to 'kill' to better reflect ἀποκτενεῖς and avoid unnecessary repetition.
translation:
  language: es
  text: No matarás; no cometerás adulterio; no abusarás sexualmente de los muchachos[a]; no cometerás inmoralidad sexual; no robarás; no practicarás magia; no usarás hechicería; no matarás a un niño mediante aborto, ni matarás al que ya ha nacido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «muchachos» refleja más de cerca el referente masculino de παιδοφθορήσεις, siguiendo el sentido del inglés auditado «boys», mientras conserva claridad en español actual.
    reason: lexical_alternative
  - marker: b
    text: La última cláusula especifica la prohibición de dar muerte al que ya ha nacido; el español mantiene «matarás» para una lectura natural, aunque el griego usa aquí un verbo distinto del anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ φονεύσεις
  english_pob_choice: You shall not murder
  chosen_spanish: No matarás
  alternatives_spanish:
  - No asesinarás
  - No cometerás homicidio
  lexicon: φονεύω
  rationale: En español, «matar» conserva la fuerza prohibitiva breve y directa del original y del POB inglés; «asesinar» o «cometer homicidio» estrechan o tecnifican el alcance.
- source_word: οὐ μοιχεύσεις
  english_pob_choice: you shall not commit adultery
  chosen_spanish: no cometerás adulterio
  alternatives_spanish:
  - no serás adúltero
  - no adulterarás
  lexicon: μοιχεύω
  rationale: «Cometer adulterio» es la equivalencia natural y transparente para el verbo en este contexto legal.
- source_word: οὐ παιδοφθορήσεις
  english_pob_choice: you shall not sexually abuse boys
  chosen_spanish: no abusarás sexualmente de los niños
  alternatives_spanish:
  - no corromperás a los niños
  - no abusarás de muchachos
  lexicon: παιδοφθορέω
  rationale: Sigo la revisión inglesa que optó por una referencia clara a abuso sexual, y la vuelco al español en forma explícita para evitar una calca oscura. «Niños» mantiene una lectura general y comprensible; «muchachos» sería más estrecho y menos claro para lectores actuales.
- source_word: οὐ πορνεύσεις
  english_pob_choice: you shall not commit sexual immorality
  chosen_spanish: no cometerás inmoralidad sexual
  alternatives_spanish:
  - no te prostituirás
  - no fornicarás
  lexicon: πορνεύω
  rationale: «Inmoralidad sexual» reproduce el sentido amplio que el POB documenta para πορνεύω sin reducirlo a una sola práctica.
- source_word: οὐ κλέψεις
  english_pob_choice: you shall not steal
  chosen_spanish: no robarás
  alternatives_spanish:
  - no hurtarás
  lexicon: κλέπτω
  rationale: Es la equivalencia directa, clara y estándar en español.
- source_word: οὐ μαγεύσεις
  english_pob_choice: you shall not practice magic
  chosen_spanish: no practicarás magia
  alternatives_spanish:
  - no harás magia
  - no ejercerás magia
  lexicon: μαγεύω
  rationale: «Practicar magia» conserva el valor prohibitivo del verbo sin añadir matices ajenos.
- source_word: οὐ φαρμακεύσεις
  english_pob_choice: you shall not use sorcery
  chosen_spanish: no usarás hechicería
  alternatives_spanish:
  - no practicarás hechicería
  - no harás brujería
  lexicon: φαρμακεύω
  rationale: «Usar hechicería» sigue el matiz del POB inglés, donde la forma verbal señala el empleo de prácticas ocultas; «hechicería» mantiene el campo semántico sin confundirlo con medicina o venenos.
- source_word: οὐ φονεύσεις τέκνον ἐν φθορᾷ
  english_pob_choice: you shall not kill a child by abortion
  chosen_spanish: no matarás por aborto a un niño
  alternatives_spanish:
  - no provocarás aborto a un niño
  - no eliminarás a un niño por aborto
  lexicon: φονεύω
  rationale: 'La construcción española sigue de cerca el sentido del POB: prohibición de causar la muerte de un niño mediante aborto. «Por aborto» conserva la relación causal sin expandirla más allá del texto.'
- source_word: οὐδὲ γεννηθὲν ἀποκτενεῖς
  english_pob_choice: nor kill one that has been born
  chosen_spanish: ni matarás al que ya ha nacido
  alternatives_spanish:
  - ni matarás al nacido
  - ni darás muerte al nacido
  lexicon: ἀποκτείνω
  rationale: «Matarás»/«matar» aquí refleja el segundo verbo con la distinción que la revisión inglesa quiso mantener frente al primer «murder».
theological_decisions:
- issue: Distinción entre φονεύω y ἀποκτείνω
  english_pob_reading: The English POB distinguishes 'murder' for φονεύσεις and 'kill' for ἀποκτενεῖς to avoid unnecessary repetition and to reflect the Greek verbs.
  chosen_spanish_reading: «matarás» se usa en ambas cláusulas, pero la primera introduce la prohibición general de homicidio y la última, la acción de quitar la vida a quien ya ha nacido.
  alternative_spanish_readings:
  - no asesinarás ... ni asesinarás al que ya ha nacido
  - no cometerás homicidio ... ni matarás al que ya ha nacido
  rationale: En español, repetir «matar» mantiene la diferencia contextual sin forzar un tecnicismo desigual. La primera cláusula queda con el valor jurídico general; la última preserva el objeto concreto del nacimiento/vida ya nacida.
  doctrine_reference: Ética de la vida humana; prohibición del homicidio y del infanticidio
- issue: Interpretación de παιδοφθορήσεις
  english_pob_reading: The English POB chose 'sexually abuse boys' after revision from 'corrupt boys'.
  chosen_spanish_reading: «abusarás sexualmente de los niños»
  alternative_spanish_readings:
  - corromperás a los niños
  - abusarás sexualmente de muchachos
  rationale: La revisión inglesa ya documenta que el sentido buscado es una agresión sexual contra menores; el español lo expresa de manera clara y auditada, evitando ambigüedad moralizante o eufemística.
  doctrine_reference: Pureza sexual; protección de menores
- issue: φθορᾷ en la frase sobre aborto
  english_pob_reading: The English POB renders the phrase as 'by abortion,' indicating the means or circumstance of death.
  chosen_spanish_reading: «por aborto»
  alternative_spanish_readings:
  - «mediante aborto»
  - «a causa del aborto»
  rationale: «Por aborto» es breve y fiel a la relación instrumental/causal que la traducción inglesa estableció, sin sobreinterpretar el sintagma griego.
  doctrine_reference: Prohibición del aborto e infanticidio
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada desde «corrupt boys» a «sexually abuse boys», y desde «murder a child by abortion» a «kill a child by abortion», señalando una preferencia por claridad semántica y por distinguir el segundo verbo griego de φονεύσεις. El español sigue esa revisión: explicita el abuso sexual de menores y mantiene una redacción distinta para la cláusula final sin perder la fuerza prohibitiva.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de esta unidad porque no aparece en el texto fuente.
  - Se prefirió un español jurídico-bíblico claro, evitando archaismos innecesarios.
  - La secuencia de verbos conserva el paralelismo del original griego y del POB inglés.
