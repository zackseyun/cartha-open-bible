review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del griego y el audit trail inglés: mantiene «acción de gracias», «vid», «asamblea», «reino», «Mesías» y la estructura litúrgica del pasaje. Sin embargo, hay varias desviaciones significativas del origen y de las decisiones documentadas: «cáliz» interpreta más litúrgicamente que el simple ποτήριον; «tu esclavo» para παῖς no sigue la decisión auditada «servant/siervo» y suena teológicamente impropio en español para David y Jesús; «Tuyo es la gloria» es gramaticalmente incorrecto; y «vuestra acción de gracias» rompe la coherencia de tratamiento con el resto del pasaje.'
  spanish_quality_summary: El español es mayormente claro, pero presenta mezcla de registros y pronombres («den» con «vuestra»), una construcción poco natural/incorrecta («Tuyo es la gloria»), y algunas elecciones léxicas demasiado duras o eclesiasticistas («cáliz», «esclavo») frente al tono del original. Con ajustes menores, puede quedar fiel y bien legible en español eclesial amplio.
  glossary_alignment: 'Alinea bien con varios términos del proyecto: «Mesías» por Χριστός, «asamblea» por ἐκκλησία, «reino» por βασιλεία, «acción de gracias» por εὐχαριστία. No obstante, «cáliz» se aparta de la preferencia por una forma no liturgizada para ποτήριον, y «esclavo» no está justificado para παῖς; aquí corresponde mejor «siervo» para preservar la tensión semántica sin introducir una dureza ajena al audit trail.'
  issues:
  - severity: high
    issue: «tu esclavo» para παιδός en referencia a David y Jesús
    rationale: El audit trail inglés decidió explícitamente «servant», no «slave», para no resolver indebidamente el matiz cristológico ni endurecer el término. En español bíblico y litúrgico, «tu siervo» preserva mejor el rango semántico de παῖς; «tu esclavo» resulta impropio y teológicamente distractor.
  - severity: medium
    issue: «cáliz» para ποτήριον
    rationale: El griego significa sencillamente «copa»/«vaso». El inglés evitó «chalice» por ser más litúrgico de lo que exige la fuente. En español, «copa» reproduce mejor esa sobriedad y la decisión documentada.
  - severity: medium
    issue: «Tuyo es la gloria»
    rationale: La construcción es gramaticalmente incorrecta en español; debe ser «Tuya es la gloria» o una reformulación equivalente. El error afecta dos veces el texto.
  - severity: medium
    issue: 'Mezcla de tratamiento: «den gracias» / «vuestra acción de gracias» / «No den»'
    rationale: El borrador alterna entre ustedes y vosotros. Para español neutro latinoamericano y consistencia interna, conviene mantener «su acción de gracias» con el mismo tratamiento de «den» y «no den».
  - severity: low
    issue: Nota [a] innecesaria para «pedazo partido»
    rationale: La nota no resuelve una ambigüedad real ni preserva una alternativa significativa. El texto puede leerse con claridad sin nota; además, una revisión a «trozo partido» o similar no requeriría glosa.
  revised_spanish_text: 'Ahora, respecto de la acción de gracias, den gracias de esta manera. Primero, respecto de la copa:


    Te damos gracias, Padre nuestro,


    por la santa vid de David, tu siervo,


    la cual nos diste a conocer por medio de Jesús, tu siervo.


    Tuya es la gloria por los siglos.


    Y respecto del pan partido:


    Te damos gracias, Padre nuestro,


    por la vida y el conocimiento


    que nos diste a conocer por medio de Jesús, tu siervo.


    Tuya es la gloria por los siglos.


    Como este trozo partido estaba disperso por los montes y, reunido, llegó a ser uno, así sea reunida tu asamblea desde los confines de la tierra en tu reino; porque tuyos son la gloria y el poder por medio de Jesús, el Mesías, por los siglos.


    Pero que nadie coma ni beba de su acción de gracias, sino los que han sido bautizados en el nombre del Señor; pues también acerca de esto dijo el Señor: «No den lo santo a los perros».'
  revision_rationale: 'Se corrige el texto para alinearlo mejor con el griego y con las decisiones del audit trail inglés: «copa» en vez de «cáliz» para ποτήριον; «tu siervo» en vez de «tu esclavo» para παῖς; corrección gramatical a «Tuya es la gloria»; y uniformidad de tratamiento con «su acción de gracias». También se suaviza «hiciste conocer» a «diste a conocer», que expresa naturalmente ἐγνώρισας ἡμῖν sin perder fidelidad. No hace falta adjudicación adicional, porque son ajustes claros y no controvertidos.'
