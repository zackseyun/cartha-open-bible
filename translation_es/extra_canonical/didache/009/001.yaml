translation:
  language: es
  text: 'Ahora, respecto de la acción de gracias, den gracias de esta manera. Primero, respecto de la copa:


    Te damos gracias, Padre nuestro,


    por la santa vid de David, tu siervo,


    la cual nos diste a conocer por medio de Jesús, tu siervo.


    Tuya es la gloria por los siglos.


    Y respecto del pan partido:


    Te damos gracias, Padre nuestro,


    por la vida y el conocimiento


    que nos diste a conocer por medio de Jesús, tu siervo.


    Tuya es la gloria por los siglos.


    Como este trozo partido estaba disperso por los montes y, reunido, llegó a ser uno, así sea reunida tu asamblea desde los confines de la tierra en tu reino; porque tuyos son la gloria y el poder por medio de Jesús, el Mesías, por los siglos.


    Pero que nadie coma ni beba de su acción de gracias, sino los que han sido bautizados en el nombre del Señor; pues también acerca de esto dijo el Señor: «No den lo santo a los perros».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: εὐχαριστία / εὐχαριστήσατε
  english_pob_choice: thanksgiving / give thanks
  chosen_spanish: acción de gracias / den gracias
  alternatives_spanish:
  - eucaristía / celebren la eucaristía
  lexicon: LSJ; BDAG
  rationale: Mantengo el sentido concreto de oración de agradecimiento sobre el cáliz y el pan, sin importar de antemano el término técnico posterior. «Acción de gracias» conserva el sustantivo y «den gracias» el verbo correspondiente.
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: cáliz
  alternatives_spanish:
  - copa
  lexicon: LSJ; BDAG
  rationale: Aunque el griego básico significa «cup», en este contexto litúrgico español «cáliz» comunica con naturalidad el vaso eucarístico. No altera el referente y resulta más idiomático en una oración litúrgica en español.
- source_word: ἁγίας ἀμπέλου Δαβὶδ
  english_pob_choice: the holy vine of David
  chosen_spanish: la santa vid de David
  alternatives_spanish:
  - la santa viña de David
  - la sagrada vid de David
  lexicon: LSJ; BDAG
  rationale: Conservo la imagen de ἀμπέλος como «vid», no como «vino» ni «viña», para respetar la metáfora del texto. «Santa» refleja ἁγίας y mantiene el tono bíblico.
- source_word: παιδός
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: BDAG; LSJ
  rationale: El audit trail inglés opta por «servant» para no resolver la ambigüedad a «son». En español, «esclavo» reproduce con más fuerza la flexión de δοῦλος/παῖς en un registro bíblico antiguo y evita suavizar el título; «siervo» sería una atenuación tradicional no exigida por el griego.
- source_word: κλάσματος
  english_pob_choice: the broken bread
  chosen_spanish: el pan partido
  alternatives_spanish:
  - el pan quebrado
  - la fracción
  lexicon: LSJ; BDAG
  rationale: En este punto el referente es claramente el pan eucarístico ya partido. «Pan partido» suena natural en español y conserva la imagen de κάτι roto/dividido sin diluir el vínculo con la mesa.
- source_word: ζωῆς καὶ γνώσεως
  english_pob_choice: life and knowledge
  chosen_spanish: vida y conocimiento
  alternatives_spanish:
  - vida y sabiduría
  - vida y entendimiento
  lexicon: LSJ; BDAG
  rationale: Sigo de cerca el par semántico del griego y del audit trail inglés. «Conocimiento» mantiene la densidad conceptual sin ampliar el alcance más de lo que el texto dice.
- source_word: κλάσμα
  english_pob_choice: broken piece
  chosen_spanish: pedazo partido
  alternatives_spanish:
  - fragmento
  - trozo
  lexicon: LSJ; BDAG
  rationale: En la comparación final, el demostrativo retoma el pan como unidad visible; «pedazo partido» conserva la materialidad del símbolo y funciona con naturalidad en español.
- source_word: ἐκκλησία
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - iglesia
  - congregación
  lexicon: LSJ; BDAG
  rationale: Sigo la decisión inglesa de preservar el sentido de comunidad reunida, sin imponer el matiz institucional posterior de «iglesia». «Asamblea» es transparente y fiel al contexto de reunión de piezas dispersas.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - soberanía real
  lexicon: LSJ; BDAG
  rationale: «Reino» conserva la fuerza litúrgica y la inteligibilidad tradicional en español, y sigue de cerca el término griego sin convertirlo en una abstracción.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Sigo la política del proyecto de traducir el título cuando funciona como título. «Mesías» preserva el valor semántico de Χριστός mejor que el nombre ya fijado «Cristo».
- source_word: βαπτισθέντες εἰς ὄνομα Κυρίου
  english_pob_choice: have been baptized into the name of the Lord
  chosen_spanish: han sido bautizados en el nombre del Señor
  alternatives_spanish:
  - han sido bautizados dentro del nombre del Señor
  - han sido bautizados para el nombre del Señor
  lexicon: BDAG; LSJ
  rationale: Para español, «en el nombre» es la fórmula más natural y estable para un rito de iniciación; «en» conserva el valor de incorporación de εἰς sin sonar forzado. Mantengo «Señor» por la directriz del proyecto para Κύριος.
- source_word: τὸ ἅγιον
  english_pob_choice: what is holy
  chosen_spanish: lo santo
  alternatives_spanish:
  - lo sagrado
  - la cosa santa
  lexicon: LSJ; BDAG
  rationale: El neutro sustantivado pide una forma neutra en español. «Lo santo» preserva el carácter proverbial de la cita sin introducir un objeto más específico de lo que el griego indica.
- source_word: κυσί
  english_pob_choice: the dogs
  chosen_spanish: los perros
  alternatives_spanish:
  - los canes
  lexicon: LSJ; BDAG
  rationale: «Perros» reproduce con claridad la imagen proverbial de la cita y coincide con el registro bíblico esperado en español.
theological_decisions:
- issue: Cómo renderizar εὐχαριστία sin importar el tecnicismo posterior de «Eucaristía»
  english_pob_reading: Rendered as 'thanksgiving' in the main text
  chosen_spanish_reading: «acción de gracias» en el texto principal
  alternative_spanish_readings:
  - «eucaristía»
  rationale: El griego del pasaje pone en primer plano la acción de dar gracias. Mantener esa forma evita adelantar una terminología sacramental posterior que el propio texto no necesita para ser inteligible.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; readable modern Spanish'
- issue: Cómo resolver παιδός aplicado a Jesús
  english_pob_reading: Rendered as 'your servant'
  chosen_spanish_reading: «tu esclavo»
  alternative_spanish_readings:
  - «tu siervo»
  - «tu hijo»
  rationale: El término griego permite una tensión entre «niño/siervo/esclavo», y el audit trail inglés decide no resolverla a «hijo». En español, «esclavo» preserva con mayor fuerza la relación de pertenencia y dependencia y mantiene visible la rudeza del lenguaje antiguo.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
- issue: Si ἐκκλησία debe sonar como institución eclesiástica o como comunidad reunida
  english_pob_reading: Rendered as 'assembly'
  chosen_spanish_reading: «asamblea»
  alternative_spanish_readings:
  - «iglesia»
  - «congregación»
  rationale: La imagen depende de piezas dispersas reunidas en uno solo; «asamblea» transmite ese movimiento de reunión sin cargar el término con desarrollos posteriores.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: El texto base en inglés coincide en alta medida con la lectura griega normalizada; no se registran revisiones aplicadas en la fuente auditada. La principal tensión interpretativa es el valor de παιδός, que se mantiene no resuelto en una forma fuerte en español para conservar la ambigüedad del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero esta sección no contiene el tetragrámaton.
  - «Mesías» se usa para Χριστοῦ de acuerdo con la política del proyecto y la lectura auditada.
  - «Señor» se conserva para Κύριος en la cláusula final conforme a la directriz del proyecto.
  - «Asamblea» y no «iglesia» sigue la decisión inglesa de reflejar ἐκκλησία como comunidad reunida.
