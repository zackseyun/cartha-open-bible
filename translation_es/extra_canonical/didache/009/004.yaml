review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: κλάσμα como una porción/fragmento disperso, la reunión de la comunidad desde los extremos de la tierra, y la doxología final. Sin embargo, no preserva del todo la elección léxica auditada de ἐκκλησία como ''assembly'', pues ''iglesia'' desplaza el énfasis de comunidad reunida. Además, la nota al pie está mal anclada: el inglés conserva la alternativa en torno a ''Jesus Messiah/Jesus the Messiah'', pero el español la colocó sobre ''iglesia'' en lugar de sobre ''Jesucristo''.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor fidelidad y legibilidad auditada. 'Así sea reunida tu asamblea' suena natural en registro litúrgico y preserva mejor el valor reunido de ἐκκλησία. La nota al pie debe moverse al nombre final. El resto del verso lee bien en español neutral.
  glossary_alignment: 'Buen uso de ''fragmento'', ''reino'', ''montes'' y ''Jesucristo'' como excepción contextual bien documentada al valor usual de Χριστός. La principal desalineación terminológica es ἐκκλησία: aquí conviene seguir la decisión POB ''assembly'' con ''asamblea'' en vez de ''iglesia''.'
  issues:
  - severity: medium
    issue: '''ἐκκλησία'' se tradujo como ''iglesia'' en vez de una forma que preserve el matiz de comunidad reunida.'
    rationale: El inglés POB eligió explícitamente 'assembly'. Aunque 'iglesia' es posible, aquí la imagen de algo disperso que es reunido favorece 'asamblea', que mantiene la conexión verbal y conceptual con συναχθήτω.
  - severity: high
    issue: La nota al pie [a] está anclada a 'iglesia' pero su contenido trata sobre 'Jesucristo'/'Jesús el Mesías'.
    rationale: Esto rompe la correspondencia entre texto y nota exigida por el proyecto. El marcador debe aparecer en el nombre o frase pertinente al final del versículo.
  revised_spanish_text: Así como este fragmento fue esparcido sobre los montes y, al ser reunido, llegó a ser uno, así sea reunida tu asamblea desde los confines de la tierra en tu reino. Porque tuya es la gloria y el poder por medio de Jesucristo[a] para siempre.
  revised_footnotes:
  - marker: a
    text: O «Jesús el Mesías».
    reason: alternative_reading
  revision_rationale: Se cambió 'iglesia' por 'asamblea' para reflejar mejor la decisión auditada sobre ἐκκλησία y el vínculo con la imagen de ser reunida. Se reubicó la nota [a] a 'Jesucristo' porque la alternativa documentada corresponde a Χριστοῦ, no a ἐκκλησία. No se requieren más cambios.
