revisions:
- from: Así como este fragmento fue esparcido sobre los montes y, al ser reunido, llegó a ser uno, así sea reunida tu iglesia[a] desde los confines de la tierra en tu reino. Porque tuya es la gloria y el poder por medio de Jesucristo para siempre.
  to: Así como este fragmento fue esparcido sobre los montes y, al ser reunido, llegó a ser uno, así sea reunida tu asamblea desde los confines de la tierra en tu reino. Porque tuya es la gloria y el poder por medio de Jesucristo[a] para siempre.
  rationale: Se cambió 'iglesia' por 'asamblea' para reflejar mejor la decisión auditada sobre ἐκκλησία y el vínculo con la imagen de ser reunida. Se reubicó la nota [a] a 'Jesucristo' porque la alternativa documentada corresponde a Χριστοῦ, no a ἐκκλησία. No se requieren más cambios.
