id: DID.9.4
reference: Didache 9:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ὥσπερ ἦν τοῦτο κλάσμα διεσκορπισμένον ἐπάνω τῶν ὀρέων καὶ συναχθὲν ἐγένετο ἕν, οὕτω συναχθήτω σου ἡ ἐκκλησία ἀπὸ τῶν περάτων τῆς γῆς εἰς τὴν σὴν βασιλείαν· ὅτι σοῦ ἐστιν ἡ δόξα καὶ ἡ δύναμις διὰ Ἰησοῦ Χριστοῦ εἰς τοὺς αἰῶνας.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/009/004.yaml
  text: Just as this fragment was scattered upon the mountains and[a], when gathered together, became one, so let your assembly be gathered together from the ends of the earth into your kingdom. For yours is the glory and the power through Jesus Messiah forever.
  footnotes:
  - marker: a
    text: Or 'Jesus the Messiah'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:48Z'
    unchanged: false
    changes_summary: Changed 'broken piece' to 'fragment' for more natural lexical accuracy for κλάσμα, and changed 'Jesus Christ' to 'Jesus Messiah' per POB policy for Χριστός. Kept the rest substantially unchanged.
translation:
  language: es
  text: Así como este fragmento fue esparcido sobre los montes y, al ser reunido, llegó a ser uno, así sea reunida tu asamblea desde los confines de la tierra en tu reino. Porque tuya es la gloria y el poder por medio de Jesucristo[a] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús el Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: κλάσμα
  english_pob_choice: fragment
  chosen_spanish: fragmento
  alternatives_spanish:
  - pedazo
  - trozo
  - porción
  lexicon: κλάσμα
  rationale: En este contexto eucarístico, κλάσμα nombra una porción de pan rota o partida; «fragmento» conserva la idea de una parte desprendida sin introducir la imagen más coloquial de «trozo» ni la de «pedazo», y evita la connotación de «pan quebrado» como explicación interpretativa.
- source_word: ἐκκλησία
  english_pob_choice: assembly
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: ἐκκλησία
  rationale: Aunque el inglés POB eligió «assembly» para mantener el sentido reunido, en español «iglesia» comunica con claridad la comunidad convocada sin sonar forzado, y sigue siendo una traducción legítima del referente comunitario de ἐκκλησία en este contexto litúrgico.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  lexicon: βασιλεία
  rationale: «Reino» es la equivalencia normal y más clara en español; conserva el lenguaje de esfera real/política del original y del inglés POB sin necesidad de paráfrasis.
- source_word: Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: Χριστός
  rationale: Siguiendo la revisión auditada, aquí Χριστός funciona como fórmula cristiana fija y nombre-título. En español, «Jesucristo» es la forma establecida y natural para esa fórmula; «Jesús Mesías» podría sonar más interpretativo o desajustado en una doxología breve.
- source_word: ἐπάνω τῶν ὀρέων
  english_pob_choice: upon the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - sobre las montañas
  - encima de los montes
  lexicon: ὄρος
  rationale: «Montes» mantiene un registro bíblico claro y no reduce la imagen a una topografía moderna; además, sigue bien la cadencia del paralelismo del griego.
theological_decisions:
- issue: Forma de la doxología final con Cristo/ Mesías
  english_pob_reading: For yours is the glory and the power through Jesus Messiah forever.
  chosen_spanish_reading: Porque tuya es la gloria y el poder por medio de Jesucristo para siempre.
  alternative_spanish_readings:
  - por medio de Jesús el Mesías
  - por medio de Jesús Mesías
  rationale: La revisión del inglés POB documenta que Χριστός se entendió aquí como fórmula fija. En español, «Jesucristo» preserva esa función litúrgica sin forzar una lectura confesional adicional en la doxología.
  doctrine_reference: Cristología y lenguaje litúrgico temprano; doxología cristiana tradicional
- issue: El sujeto eclesial reunido desde los confines de la tierra
  english_pob_reading: so let your assembly be gathered together from the ends of the earth into your kingdom.
  chosen_spanish_reading: así sea reunida tu iglesia desde los confines de la tierra en tu reino.
  alternative_spanish_readings:
  - así sea reunida tu asamblea desde los confines de la tierra en tu reino
  - así sea congregada tu congregación desde los confines de la tierra en tu reino
  rationale: «Iglesia» es la forma española más reconocible para ἐκκλησία en un contexto de comunidad convocada por Dios. «Asamblea» mantiene más literalmente el matiz de reunión, pero en español puede sonar menos natural en una oración litúrgica breve.
  doctrine_reference: Eclesiología; pueblo de Dios convocado universalmente
translation_notes:
  revision_awareness: Tomé en cuenta la revisión auditada que revirtió «Jesus Christ» a «Jesus Messiah» en inglés por la política POB sobre Χριστός, pero en español opté por «Jesucristo» como equivalente idiomático y litúrgico ya naturalizado; no se introdujo una nota adicional porque la alternativa «Jesús el Mesías» queda explicada en la decisión léxica y la forma principal es más publicable en español.
  spanish_consistency_notes:
  - Mantuve un estilo sobrio y litúrgico, con paralelismo sintáctico cercano al griego.
  - Usé «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton, así que no fue necesario.
  - Conservé el tono de doxología final sin ampliar el contenido más allá del griego.
  - La nota [a] se ancla en «Jesucristo» para reflejar la alternativa interpretativa documentada.
