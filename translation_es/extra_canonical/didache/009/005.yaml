  text: Μηδεὶς δὲ φαγέτω μηδὲ πιέτω ἀπὸ τῆς εὐχαριστίας ὑμῶν, ἀλλ' οἱ βαπτισθέντες εἰς ὄνομα Κυρίου· καὶ γὰρ περὶ τούτου εἴρηκεν ὁ Κύριος· Μὴ δῶτε τὸ ἅγιον τοῖς κυσί.
