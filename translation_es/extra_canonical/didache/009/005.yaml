  yaml_path: translation/extra_canonical/didache/009/005.yaml
  text: 'But let no one eat or drink from your thanksgiving except those who have been baptized into the name of the Lord. For also concerning this, the Lord has said: “Do not give what is holy to the dogs.”'
  revision_pass:
