review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y la traducción POB inglesa: conserva la prohibición de comer o beber, la restricción a los bautizados, y la cita final sobre lo santo y los perros. Sin embargo, ἀπὸ τῆς εὐχαριστίας ὑμῶν se vierte mejor como «de su acción de gracias» sin dividir la locución con nota incrustada; además, «sino solo» después de una negación con «nadie» suena menos fiel/idiomático que «excepto».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «de su [a]acción de gracias» resulta tipográficamente torpe y poco natural por insertar la nota dentro de la locución. «Sino solo los que…» también suena menos fluido que «excepto los que…» en este contexto. El resto está bien formulado.
  glossary_alignment: No hay términos del glosario principal especialmente conflictivos aquí. «Señor» para Κυρίου es adecuado en la Didaché; no hay base para imponer «Yahvé». «Acción de gracias» mantiene la amplitud de εὐχαριστία conforme al rastro inglés, con nota léxica apropiada sobre posible referencia eucarística.
  issues:
  - severity: medium
    issue: La nota [a] interrumpe la locución «acción de gracias».
    rationale: 'Las notas deben anclarse en una palabra o frase pertinente, pero en español es mejor colocarlas al final de la locución: «acción de gracias[a]». La forma actual dificulta la lectura.'
  - severity: low
    issue: «sino solo los que han sido bautizados» es menos idiomático que «excepto los que han sido bautizados».
    rationale: El griego ἀλλ' οἱ... tras una prohibición general se expresa con naturalidad en español mediante «excepto» o «salvo». «Sino solo» no es incorrecto, pero es más pesado y menos elegante.
  revised_spanish_text: 'Pero que nadie coma ni beba de su acción de gracias[a], excepto los que han sido bautizados en el nombre del Señor. Porque también acerca de esto ha dicho el Señor: «No den lo santo a los perros».'
  revised_footnotes:
