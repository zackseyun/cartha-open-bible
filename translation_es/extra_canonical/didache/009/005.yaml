    text: «acción de gracias» traduce εὐχαριστία de manera amplia; en contexto eclesial temprano también puede aludir a la celebración eucarística.
    reason: lexical_alternative
  revision_rationale: Se ajusta la ubicación de la nota para no romper la locución española y se reemplaza «sino solo» por «excepto» para una restricción más natural y fiel al sentido del contraste griego en español.
