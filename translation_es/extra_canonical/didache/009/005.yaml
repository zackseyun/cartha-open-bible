translation:
  language: es
  text: 'Pero que nadie coma ni beba de su acción de gracias[a], excepto los que han sido bautizados en el nombre del Señor. Porque también acerca de esto ha dicho el Señor: «No den lo santo a los perros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «acción de gracias» traduce εὐχαριστία de manera amplia; en contexto eclesial temprano también puede aludir a la celebración eucarística.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδεὶς δὲ φαγέτω μηδὲ πιέτω
  english_pob_choice: But let no one eat or drink
  chosen_spanish: Pero que nadie coma ni beba
  alternatives_spanish:
  - Pero nadie debe comer ni beber
  - No coma ni beba nadie
  lexicon: μήδε...μήδε / φάγω / πίνω
  rationale: Conserva la prohibición general del griego con una construcción natural en español. "Que nadie" refleja bien el valor exhortativo; "coma ni beba" mantiene el paralelismo verbal del original.
- source_word: ἀπὸ τῆς εὐχαριστίας ὑμῶν
  english_pob_choice: from your thanksgiving
  chosen_spanish: de su [a]acción de gracias
  alternatives_spanish:
  - de su eucaristía
  - de su acción de gracias
  lexicon: εὐχαριστία
  rationale: '"Eucaristía" sería técnicamente posible, pero en español eclesial puede sonar más cargado doctrinalmente. "Acción de gracias" conserva el sentido básico del término y evita imponer un equivalente litúrgico más interpretativo. Se usa "su" para seguir el referente comunitario del texto, como en el inglés POB.'
- source_word: οἱ βαπτισθέντες εἰς ὄνομα Κυρίου
  english_pob_choice: those who have been baptized into the name of the Lord
  chosen_spanish: solo los que han sido bautizados en el nombre del Señor
  alternatives_spanish:
  - solo los que han sido bautizados en el nombre del Señor
  - solo los bautizados en el nombre del Señor
  lexicon: βαπτίζω / εἰς ὄνομα Κυρίου
  rationale: '"Han sido bautizados" conserva el pasivo y el hecho consumado. "En el nombre del Señor" sigue de cerca la fórmula griega y la traducción inglesa auditada. "Solo" explicita el contraste excluyente del texto.'
- source_word: Μὴ δῶτε τὸ ἅγιον τοῖς κυσί
  english_pob_choice: Do not give what is holy to the dogs
  chosen_spanish: No den lo santo a los perros
  alternatives_spanish:
  - No den lo santo a los perros
  - No den la cosa santa a los perros
  lexicon: τὸ ἅγιον / κύων
  rationale: '"Lo santo" reproduce el sustantivo neutro sin sobreexplicar. "Lo santo" es más natural que "la cosa santa" y mantiene la resonancia bíblica del enunciado. "Perros" conserva la imagen proverbial.'
theological_decisions:
- issue: Sentido de εὐχαριστία en contexto de la comida sagrada
  english_pob_reading: your thanksgiving
  chosen_spanish_reading: su acción de gracias
  alternative_spanish_readings:
  - su eucaristía
  - su mesa de acción de gracias
  rationale: El griego puede referir la acción de dar gracias y, por extensión, la comida eucarística. La POB inglesa eligió una forma semánticamente amplia. En español, "acción de gracias" preserva esa amplitud sin introducir de antemano un tecnicismo confesional más fuerte.
  doctrine_reference: uso eucarístico primitivo / lenguaje litúrgico temprano
- issue: Exclusión de los no bautizados de la comida sagrada
  english_pob_reading: except those who have been baptized into the name of the Lord
  chosen_spanish_reading: solo los que han sido bautizados en el nombre del Señor
  alternative_spanish_readings:
  - excepto los bautizados en el nombre del Señor
  - salvo los que han sido bautizados en el nombre del Señor
  rationale: El texto establece una restricción explícita de participación. "Solo" expresa la exclusión de modo idiomático y claro en español, sin añadir matices posteriores sobre disciplina eclesial.
  doctrine_reference: disciplina sacramental / catecumenado temprano
- issue: Cita de Jesús sobre lo santo y los perros
  english_pob_reading: Do not give what is holy to the dogs
  chosen_spanish_reading: No den lo santo a los perros
  alternative_spanish_readings:
  - No den lo sagrado a los perros
  - No arrojen lo santo a los perros
  rationale: '"Lo santo" sigue el neutro griego y mantiene la conexión intertextual con las palabras de Jesús. "Lo sagrado" sería posible, pero menos literal. El imperativo plural concuerda con la forma general del mandato en español.'
  doctrine_reference: dicho de Jesús / enseñanza proverbial
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés quedó aprobado como de alta concordancia. La versión española sigue de cerca la sintaxis y las decisiones léxicas auditadas del POB inglés, especialmente en εὐχαριστία, βαπτισθέντες y τὸ ἅγιον.
  spanish_consistency_notes:
  - Se mantiene "Señor" para Κυρίου en consonancia con el inglés auditado.
  - Se conserva "acción de gracias" en lugar de "Eucaristía" para no fijar una interpretación litúrgica más estrecha que la admitida por el griego y el POB inglés.
  - El registro es formal y eclesial, pero evita arcaísmos innecesarios.
