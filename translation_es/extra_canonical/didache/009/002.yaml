  revision_rationale: Se revisa 'esclavo' a 'siervo' porque el término fuente es παῖς y la POB inglesa usa 'servant'; en español litúrgico y teológico esta opción es más fiel y natural, especialmente respecto de Jesús. También se mejora la idiomaticidad con 'nos diste a conocer' para ἐγνώρισας ἡμῖν. No se requieren notas al pie.
