  to: 'Primero, acerca de la copa:


    Te damos gracias, nuestro Padre,


    por la santa vid de David, tu siervo,


    que nos diste a conocer por medio de Jesús, tu siervo.


    A ti sea la gloria por los siglos.'
  rationale: Se revisa 'esclavo' a 'siervo' porque el término fuente es παῖς y la POB inglesa usa 'servant'; en español litúrgico y teológico esta opción es más fiel y natural, especialmente respecto de Jesús. También se mejora la idiomaticidad con 'nos diste a conocer' para ἐγνώρισας ἡμῖν. No se requieren notas al pie.
