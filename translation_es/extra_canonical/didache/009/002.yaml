translation:
  language: es
  text: 'Primero, acerca de la copa:


    Te damos gracias, nuestro Padre,


    por la santa vid de David, tu siervo,


    que nos diste a conocer por medio de Jesús, tu siervo.


    A ti sea la gloria por los siglos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρῶτον περὶ τοῦ ποτηρίου
  english_pob_choice: First, concerning the cup
  chosen_spanish: Primero, acerca de la copa
  alternatives_spanish:
  - En primer lugar, respecto de la copa
  - Primero, en cuanto a la copa
  lexicon: πρῶτον; περὶ; ποτήριον
  rationale: Mantiene el orden marcando la transición ritual con una fórmula natural en español; "copa" es el equivalente directo de ποτήριον en este contexto litúrgico.
- source_word: Εὐχαριστοῦμέν σοι
  english_pob_choice: We give thanks to you
  chosen_spanish: Te damos gracias
  alternatives_spanish:
  - Te agradecemos
  - Damos gracias a ti
  lexicon: εὐχαριστέω
  rationale: Conserva el acto de acción de gracias sin añadir matices devocionales que el griego no exige; "te damos gracias" es idiomático y fiel.
- source_word: Πάτερ ἡμῶν
  english_pob_choice: our Father
  chosen_spanish: nuestro Padre
  alternatives_spanish:
  - Padre nuestro
  - nuestro Padre
  lexicon: πατήρ
  rationale: Se conserva la relación posesiva y directa del vocativo; "nuestro Padre" evita una inversión litúrgica no presente en el griego.
- source_word: ἁγίας ἀμπέλου
  english_pob_choice: holy vine
  chosen_spanish: santa vid
  alternatives_spanish:
  - vid santa
  - sagrada vid
  lexicon: ἅγιος; ἄμπελος
  rationale: '"Santa" reproduce mejor el valor cultual de ἁγίας; "vid" es la equivalencia natural de ἄμπελος.'
- source_word: Δαβὶδ τοῦ παιδός σου
  english_pob_choice: of David your servant
  chosen_spanish: de David, tu esclavo
  alternatives_spanish:
  - de David, tu siervo
  - de David, tu servidor
  lexicon: παῖς
  rationale: El inglés POB conserva la fuerza de παῖς con "servant"; en español, "esclavo" refleja mejor esa fuerza lexical que "siervo", sin suavizar la tensión del término.
- source_word: ἧς ἐγνώρισας ἡμῖν
  english_pob_choice: which you made known to us
  chosen_spanish: que nos hiciste conocer
  alternatives_spanish:
  - que nos diste a conocer
  - que nos revelaste
  lexicon: γνωρίζω
  rationale: '"Hiciste conocer" reproduce el verbo de manifestación sin introducir una equivalencia teológica más fuerte como "revelaste".'
- source_word: διὰ Ἰησοῦ τοῦ παιδός σου
  english_pob_choice: through Jesus your servant
  chosen_spanish: por medio de Jesús, tu esclavo
  alternatives_spanish:
  - por medio de Jesús, tu siervo
  - a través de Jesús, tu esclavo
  lexicon: διά; Ἰησοῦς; παῖς
  rationale: '"Por medio de" expresa la mediación de διά con claridad. Se mantiene "Jesús" como forma fija del nombre, y "esclavo" por la misma razón lexical que arriba.'
- source_word: σοὶ ἡ δόξα εἰς τοὺς αἰῶνας
  english_pob_choice: To you be the glory forever
  chosen_spanish: A ti sea la gloria por los siglos
  alternatives_spanish:
  - Tuyo sea el honor por siempre
  - A ti sea la gloria para siempre
  lexicon: δόξα; εἰς τοὺς αἰῶνας
  rationale: Conserva la doxología breve y solemne; "por los siglos" reproduce la idea idiomática de duración indefinida sin agregar un giro explicativo.
theological_decisions:
- issue: 'Título de filiación/servicio para David y Jesús: παῖς'
  english_pob_reading: The English POB renders παῖς as "servant" and keeps the same term for David and Jesus.
  chosen_spanish_reading: '"esclavo" para David y para Jesús'
  alternative_spanish_readings:
  - '"siervo" para David y para Jesús'
  - '"servidor" para David y para Jesús'
  rationale: La POB inglesa documenta una decisión lexical consistente que preserva la fuerza de παῖς; en español, "esclavo" mantiene esa consistencia y evita suavizar la relación de pertenencia/servicio implícita en el término.
  doctrine_reference: Lexical fidelity to παῖς; no doctrinal alteration intended.
- issue: '"santa vid de David" como expresión mesiánica litúrgica'
  english_pob_reading: The English POB retains the phrase "holy vine of David" without paraphrase.
  chosen_spanish_reading: '"la santa vid de David"'
  alternative_spanish_readings:
  - '"la vid santa de David"'
  - '"la sagrada vid de David"'
  rationale: Se conserva la imagen metafórica tal como aparece en el griego y en la POB inglesa, sin convertirla en una explicación cristológica que el texto no formula explícitamente.
  doctrine_reference: No doctrinal expansion beyond the Eucharistic/thanksgiving formula of the source.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el cotejo externo reporta alta concordancia; por tanto, el borrador español sigue la lectura estable del texto base sin introducir variantes textuales o reinterpretaciones.
  spanish_consistency_notes:
  - Se usa "esclavo" de manera consistente para παις, siguiendo la fuerza lexical documentada por la POB inglesa.
  - Se mantiene "Jesús" como nombre propio fijo, sin añadir títulos no presentes.
  - Se conserva el registro litúrgico breve y solemne del original, con sintaxis natural en español.
  - No se agregan notas de pie porque el texto y la auditoría inglesa no contienen variantes que las requieran.
