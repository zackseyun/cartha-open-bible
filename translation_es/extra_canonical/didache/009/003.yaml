translation:
  language: es
  text: 'Y acerca del pan partido:


    Te damos gracias, nuestro Padre,

    por la vida y el conocimiento

    que nos has dado a conocer por medio de Jesús, tu siervo.

    A ti la gloria por los siglos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κλάσμα / τοῦ κλάσματος
  english_pob_choice: the broken bread
  chosen_spanish: el pan partido
  alternatives_spanish:
  - el pan quebrado
  - el pan fraccionado
  lexicon: κλάσμα
  rationale: El contexto litúrgico de la bendición eucarística pide una expresión natural en español. «Pan partido» conserva la imagen del pan ya partido y suena más idiomático que un calco más pesado. Mantiene la referencia al rito sin añadir interpretación doctrinal.
- source_word: Εὐχαριστοῦμέν σοι
  english_pob_choice: We give thanks to you
  chosen_spanish: Te damos gracias
  alternatives_spanish:
  - Te agradecemos
  - Te manifestamos gratitud
  lexicon: εὐχαριστέω
  rationale: «Te damos gracias» es la equivalencia directa, clara y solemne en español. Conserva el valor verbal de acción de gracias del texto griego y del audit trail inglés.
- source_word: Πάτερ ἡμῶν
  english_pob_choice: our Father
  chosen_spanish: nuestro Padre
  alternatives_spanish:
  - Padre nuestro
  lexicon: πατήρ
  rationale: Ambas opciones son posibles; aquí se eligió «nuestro Padre» para conservar el orden del griego y el tono de oración directa. «Padre nuestro» sería igualmente natural, pero reorganiza el sintagma.
- source_word: τῆς ζωῆς καὶ γνώσεως
  english_pob_choice: the life and knowledge
  chosen_spanish: la vida y el conocimiento
  alternatives_spanish:
  - la vida y el saber
  - la vida y la comprensión
  lexicon: ζωή; γνῶσις
  rationale: «Conocimiento» reproduce bien γνῶσις en este contexto de don revelado. «Saber» o «comprensión» serían posibles, pero «conocimiento» preserva mejor el paralelismo con la versión inglesa y la densidad teológica del término.
- source_word: ἧς ἐγνώρισας ἡμῖν
  english_pob_choice: which you made known to us
  chosen_spanish: que nos has dado a conocer
  alternatives_spanish:
  - que nos hiciste conocer
  - que nos revelaste
  lexicon: γνωρίζω
  rationale: La construcción española «dar a conocer» expresa bien la acción divina de revelar o hacer manifiesto sin imponer un término más doctrinal como «revelar». Sigue de cerca la fuerza causal del griego y del inglés POB.
- source_word: διὰ Ἰησοῦ τοῦ παιδός σου
  english_pob_choice: through Jesus your servant
  chosen_spanish: por medio de Jesús, tu siervo
  alternatives_spanish:
  - por medio de Jesús, tu servidor
  - por medio de Jesús, tu Hijo
  lexicon: παῖς
  rationale: El griego παιδός puede significar «siervo» y también, en ciertos contextos, «hijo». El inglés POB optó por «servant»; en español, «siervo» mantiene esa decisión lexical y evita suavizar el término. Se conserva así la tensión histórica del título sin reemplazarla por «Hijo».
- source_word: ἡ δόξα
  english_pob_choice: the glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  - la alabanza
  lexicon: δόξα
  rationale: «Gloria» es la equivalencia estable en español y mantiene la fórmula doxológica del texto.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - por siempre
  - por los siglos de los siglos
  lexicon: αἰών
  rationale: «Por los siglos» conserva el plural del griego y el registro doxológico. «Por siempre» simplificaría la formulación, pero perdería parte de la huella litúrgica del original.
theological_decisions:
- issue: 'Título aplicado a Jesús: παιδός / servant versus sonship'
  english_pob_reading: through Jesus your servant
  chosen_spanish_reading: por medio de Jesús, tu siervo
  alternative_spanish_readings:
  - por medio de Jesús, tu Hijo
  - por medio de Jesús, tu servidor
  rationale: Se mantiene la lectura del inglés POB y del griego normalizado, que usa παιδός. Traducir «Hijo» borraría una tensión lexical importante del texto y proyectaría una cristología más explícita que la del enunciado fuente. «Siervo» conserva la ambigüedad histórica del término.
  doctrine_reference: Cristología y lenguaje bíblico-litúrgico de los títulos de Jesús
- issue: Fórmula doxológica final
  english_pob_reading: To you be the glory forever.
  chosen_spanish_reading: A ti la gloria por los siglos.
  alternative_spanish_readings:
  - A ti sea la gloria por siempre.
  - Tuya es la gloria por los siglos.
  rationale: La construcción breve reproduce la fórmula de alabanza sin añadir un verbo que el griego puede omitir elípticamente. En español, esta elipsis resulta natural en registro litúrgico y mantiene la solemnidad del cierre.
  doctrine_reference: Doxología y lenguaje de adoración
translation_notes:
  revision_awareness: La versión inglesa POB más reciente fue revisada y quedó sin cambios; el control de concordancia reporta alta agreement (1.0) y ninguna observación de revisión. Por ello, esta propuesta española sigue de cerca el texto griego y el audit trail inglés sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este pasaje no contiene el tetragrámaton ni una cita directa que requiera esa decisión.
  - Se usa «Jesús» para Ἰησοῦς y «siervo» para παιδός, en coherencia con el documento fuente.
  - El registro es litúrgico y sobrio, evitando formas arcaizantes innecesarias y manteniendo la transparencia respecto del original.
