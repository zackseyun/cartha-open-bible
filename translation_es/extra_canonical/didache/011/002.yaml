revisions:
- from: Pero si el mismo maestro se vuelve y enseña otra enseñanza para derribar, no lo escuchéis; pero si es para añadir justicia[a] y conocimiento del Señor, recíbalo como al Señor.
  to: Pero si el mismo maestro se desvía y enseña otra enseñanza para derribar, no lo escuchen; pero si es para añadir justicia[a] y conocimiento del Señor, recíbanlo como al Señor.
  rationale: Se corrigió la mezcla de tratamientos para usar un español neutral y coherente con destinatario plural («no lo escuchen… recíbanlo»). Se ajustó «se vuelve» a «se desvía» para expresar mejor el giro doctrinal implícito en στραφεὶς sin añadir contenido nuevo. Se conservó «añadir justicia» por fidelidad al griego y al audit trail inglés, junto con la nota alternativa ya documentada.
