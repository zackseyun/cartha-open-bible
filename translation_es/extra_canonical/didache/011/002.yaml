    text: O «aumentar justicia».
    reason: alternative_rendering
  revision_rationale: Se corrigió la mezcla de tratamientos para usar un español neutral y coherente con destinatario plural («no lo escuchen… recíbanlo»). Se ajustó «se vuelve» a «se desvía» para expresar mejor el giro doctrinal implícito en στραφεὶς sin añadir contenido nuevo. Se conservó «añadir justicia» por fidelidad al griego y al audit trail inglés, junto con la nota alternativa ya documentada.
