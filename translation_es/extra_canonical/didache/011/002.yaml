id: DID.11.2
reference: Didache 11:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: ἐὰν δὲ αὐτὸς ὁ διδάσκων στραφεὶς διδάσκῃ ἄλλην διδαχὴν εἰς τὸ καταλῦσαι, μὴ αὐτοῦ ἀκούσητε· εἰς δὲ τὸ προσθεῖναι δικαιοσύνην καὶ γνῶσιν Κυρίου, δέξασθε αὐτὸν ὡς Κύριον.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/002.yaml
  text: But if the teacher himself turns and teaches another teaching so as to overthrow[a], do not listen to him; but if it is to add righteousness and knowledge of the Lord, receive him as the Lord.
  footnotes:
  - marker: a
    text: Or 'add to righteousness'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:27Z'
    unchanged: false
    changes_summary: Removed the unsupported object 'these things' after 'overthrow' and revised 'turns aside'/'increase' to the more direct 'turns'/'add' for closer lexical accuracy. Also adjusted punctuation for smoother clause flow.
translation:
  language: es
  text: Pero si el mismo maestro se desvía y enseña otra enseñanza para derribar, no lo escuchen; pero si es para añadir justicia[a] y conocimiento del Señor, recíbanlo como al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aumentar justicia».
    reason: alternative_rendering
lexical_decisions:
- source_word: διδάσκων
  english_pob_choice: the teacher
  chosen_spanish: el maestro
  alternatives_spanish:
  - el docente
  - el que enseña
  lexicon: διδάσκων → διδάσκω
  rationale: «Maestro» comunica naturalmente la función de enseñar y mantiene el referente personal del participio, sin volver la frase excesivamente técnica.
- source_word: στραφεὶς
  english_pob_choice: turns
  chosen_spanish: se vuelve
  alternatives_spanish:
  - se aparta
  - se gira
  lexicon: στραφεὶς → στρέφω
  rationale: «Se vuelve» conserva la idea de cambio de dirección o giro de conducta con buen español contemporáneo.
- source_word: ἄλλην διδαχὴν
  english_pob_choice: another teaching
  chosen_spanish: otra enseñanza
  alternatives_spanish:
  - otra doctrina
  - una enseñanza diferente
  lexicon: ἄλλην διδαχὴν → ἄλλος + διδαχή
  rationale: «Enseñanza» refleja bien διδαχή sin cargar automáticamente el término con un uso doctrinal más técnico que el griego exige aquí.
- source_word: εἰς τὸ καταλῦσαι
  english_pob_choice: so as to overthrow
  chosen_spanish: para derribar
  alternatives_spanish:
  - para destruir
  - para deshacer
  lexicon: καταλῦσαι → καταλύω
  rationale: «Derribar» conserva la fuerza de desmantelar o echar abajo algo establecido, sin añadir un objeto que el texto griego no expresa.
- source_word: εἰς δὲ τὸ προσθεῖναι δικαιοσύνην
  english_pob_choice: to add righteousness
  chosen_spanish: para añadir justicia
  alternatives_spanish:
  - para aumentar justicia
  - para incrementar rectitud
  lexicon: προσθεῖναι + δικαιοσύνην → προστίθημι + δικαιοσύνη
  rationale: 'La revisión inglesa corrigió la gramática hacia un objeto directo; en español, «añadir justicia» sigue de cerca la sintaxis griega y evita la estructura menos precisa «añadir a la justicia». '
- source_word: γνῶσιν Κυρίου
  english_pob_choice: knowledge of the Lord
  chosen_spanish: conocimiento del Señor
  alternatives_spanish:
  - conocimiento de Yahvé
  - conocer al Señor
  lexicon: γνῶσις + Κυρίου → γνῶσις + κύριος
  rationale: «Conocimiento del Señor» preserva la fórmula nominal y evita verbalizarla. Aunque el término κύριος puede aludir al nombre divino, aquí la frase funciona como título reverente dentro de la tradición del texto.
- source_word: δέξασθε αὐτὸν
  english_pob_choice: receive him
  chosen_spanish: recíbalo
  alternatives_spanish:
  - recibidlo
  - acójanlo
  lexicon: δέξασθε → δέχομαι
  rationale: «Recíbalo» mantiene el mandato y el referente personal con registro digno y claro en español.
- source_word: ὡς Κύριον
  english_pob_choice: as the Lord
  chosen_spanish: como al Señor
  alternatives_spanish:
  - como Señor
  - como al Señor Dios
  lexicon: ὡς + Κύριος → κύριος
  rationale: «Como al Señor» reproduce el valor comparativo del griego y el complemento personal implícito; evita ampliar indebidamente el sentido hacia una identificación teológica más fuerte que la frase inmediata.
theological_decisions:
- issue: Alcance de δικαιοσύνην en el miembro final
  english_pob_reading: increase/add righteousness
  chosen_spanish_reading: añadir justicia
  alternative_spanish_readings:
  - aumentar justicia
  - añadir a la justicia
  rationale: 'La revisión inglesa corrigió la relación sintáctica: δικαιοσύνην es objeto directo de προσθεῖναι. En español, «añadir justicia» mantiene la relación verbal directa y deja abierto si el efecto es aumento o incremento de la justicia ya presente, sin forzar una paráfrasis.'
  doctrine_reference: Gramática del griego koiné; cf. el participio infinitivo en Didaché 11:2.
- issue: Sentido de Κύριος en la cláusula de recepción
  english_pob_reading: as the Lord
  chosen_spanish_reading: como al Señor
  alternative_spanish_readings:
  - como Señor
  - como al Señor Yahvé
  rationale: El texto griego usa Κύριος con mayúscula en el contexto de la tradición cristiana primitiva. En español, «Señor» conserva el título reverente sin decidir más de lo que la cláusula exige; el contexto permite una posible resonancia con el nombre divino, pero no obliga a explicitar «Yahvé» aquí.
  doctrine_reference: Cristología y uso reverente de Κύριος en la literatura cristiana primitiva.
translation_notes:
  revision_awareness: 'La redacción española sigue la última revisión inglesa: elimina cualquier objeto no apoyado después de «derribar/overthrow», y refleja la corrección gramatical de δικαιοσύνην como objeto directo de προσθεῖναι. También conserva el tono imperativo y la simetría de las dos cláusulas condicionadas.'
  spanish_consistency_notes:
  - Se mantiene el registro eclesial sobrio y directo, sin sustituir «maestro» por un término más tradicionalista que no aporta precisión.
  - «Señor» se conserva como título reverente, consistente con el tratamiento contextual de κύριος en este pasaje.
  - La nota al pie marca una alternativa semántica válida para δικαιοσύνην sin romper la lectura principal del texto.
