review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego en la estructura principal: «el mismo maestro», «se vuelve», «otra enseñanza», «para derribar», «añadir justicia y conocimiento del Señor», «recíbalo como al Señor». Sin embargo, la forma verbal «no lo escuchéis» mezcla voseo/plural peninsular con el singular formal «recíbalo», lo que afecta la fidelidad pragmática del imperativo plural griego δέξασθε / ἀκούσητε al crear una inconsistencia de tratamiento en español. También conviene evitar el giro algo duro «para derribar» sin objeto mediante una opción más natural en español que preserve la elipsis griega.'
  spanish_quality_summary: 'El texto es mayormente claro, pero presenta mezcla dialectal y de tratamiento: «escuchéis» es peninsular de vosotros, mientras «recíbalo» es singular formal; ambos no pueden referirse coherentemente al mismo destinatario colectivo. Para español neutral eclesial, conviene usar imperativos plurales con «ustedes»: «no lo escuchen… recíbanlo». Además, «se vuelve» puede entenderse físicamente; «se desvía» o «se aparta» expresa mejor el giro doctrinal sin sobreinterpretar. «Añadir justicia» es fiel aunque algo rígido; puede mantenerse por cercanía al audit trail.'
  glossary_alignment: 'La terminología clave está mayormente alineada: «Señor» para κύριος es aceptable aquí por tratarse de título cristiano, no una ocurrencia clara del nombre divino Yahvé; «justicia» para δικαιοσύνη es adecuada; «enseñanza» para διδαχή funciona bien. No hay conflicto relevante con el glosario del proyecto. La revisión principal es estilística y gramatical del español, no terminológica.'
  issues:
  - severity: high
    issue: Mezcla inconsistente de tratamiento y número en los imperativos
    rationale: «No lo escuchéis» (vosotros, plural peninsular) y «recíbalo» (usted, singular) no reflejan coherentemente los imperativos plurales griegos y suenan incorrectos juntos en español neutral.
  - severity: medium
    issue: «Se vuelve» puede sonar demasiado físico o ambiguo
    rationale: στραφεὶς aquí probablemente indica volverse/apartarse en sentido de cambio de rumbo conductual o doctrinal. «Se desvía» comunica mejor esa fuerza en español natural.
  - severity: low
    issue: La nota «O “aumentar justicia”» es válida pero no necesaria
    rationale: El texto principal «añadir justicia» ya refleja bien la decisión gramatical auditada. La alternativa puede conservarse, pero no es imprescindible.
  revised_spanish_text: Pero si el mismo maestro se desvía y enseña otra enseñanza para derribar, no lo escuchen; pero si es para añadir justicia[a] y conocimiento del Señor, recíbanlo como al Señor.
  revised_footnotes:
