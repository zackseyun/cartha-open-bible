  text: Ἐξερχόμενος δὲ ὁ ἀπόστολος μηδὲ λαμβανέτω εἰμὴ ἄρτον ἕως οὗ αὐλισθῇ· ἐὰν δὲ ἀργύριον αἰτῇ, ψευδοπροφήτης ἐστί.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/006.yaml
  text: And when the apostle departs, let him take nothing except bread until he finds lodging; but if he asks for money, he is a false prophet.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:02Z'
    unchanged: false
    changes_summary: Removed the unnecessary comma after 'bread' for smoother English; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Y cuando el apóstol se vaya, no tome nada, salvo pan, hasta que encuentre alojamiento; pero si pide dinero, es un falso profeta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐξερχόμενος δὲ ὁ ἀπόστολος
  english_pob_choice: And when the apostle departs
  chosen_spanish: Y cuando el apóstol se vaya
  alternatives_spanish:
  - Y cuando el apóstol salga
  - Y al partir el apóstol
  lexicon: ἀπόστολος
  rationale: «Apóstol» conserva el término técnico usado por la fuente y por la tradición textual del pasaje; «se vaya» reproduce la idea de salida/departida sin cargarla de matices no presentes.
- source_word: μηδὲ λαμβανέτω εἰμὴ ἄρτον
  english_pob_choice: let him take nothing except bread
  chosen_spanish: no tome nada, salvo pan
  alternatives_spanish:
  - no reciba nada, salvo pan
  - no lleve consigo nada, excepto pan
  lexicon: λαμβάνω
  rationale: El verbo aquí funciona en sentido de tomar/recibir para el camino; «no tome nada» es natural en español y mantiene la prohibición absoluta con la excepción explícita de «pan».
- source_word: ἕως οὗ αὐλισθῇ
  english_pob_choice: until he finds lodging
  chosen_spanish: hasta que encuentre alojamiento
  alternatives_spanish:
  - hasta que halle alojamiento
  - hasta que tenga dónde alojarse
  lexicon: αὐλίζομαι
  rationale: El verbo expresa pasar la noche o hallar posada/alojamiento; «encuentre alojamiento» comunica bien el sentido sin introducir una posada específica que el griego no exige.
- source_word: ἐὰν δὲ ἀργύριον αἰτῇ
  english_pob_choice: but if he asks for money
  chosen_spanish: pero si pide dinero
  alternatives_spanish:
  - pero si solicita dinero
  - pero si exige dinero
  lexicon: αἰτέω / ἀργύριον
  rationale: «Pide dinero» sigue la fuerza simple de αἰτέω y ἀργύριον como dinero/moneda; «solicita» sería más formal y «exige» añadiría una intención no garantizada por el texto.
- source_word: ψευδοπροφήτης ἐστί
  english_pob_choice: he is a false prophet
  chosen_spanish: es un falso profeta
  alternatives_spanish:
  - es un profeta falso
  - es un profeta mentiroso
  lexicon: ψευδοπροφήτης
  rationale: «Falso profeta» es la equivalencia directa y la más idiomática en español eclesial; «profeta mentiroso» suaviza o desplaza el término compuesto del griego.
theological_decisions:
- issue: Condicionalidad moral del discernimiento sobre el mensajero
  english_pob_reading: if he asks for money, he is a false prophet
  chosen_spanish_reading: pero si pide dinero, es un falso profeta
  alternative_spanish_readings:
  - pero si pide dinero, se revela como falso profeta
  - pero si pide dinero, resulta ser un falso profeta
  rationale: 'Se mantiene la afirmación tajante del texto: pedir dinero funciona como criterio de falsedad profética. No se añade matiz interpretativo que atenúe la evaluación.'
  doctrine_reference: Discernimiento de profetas/maestros en la Didaché; criterio ético de autenticidad ministerial.
translation_notes:
  revision_awareness: La versión española sigue la redacción final inglesa tras la revisión menor de puntuación, sin incorporar cambios de sentido. Se priorizó la correspondencia directa con el griego y la fluidez natural en español.
  spanish_consistency_notes:
  - Se mantuvo «apóstol» como término técnico constante.
  - Se usó «dinero» para ἀργύριον por ser la opción más neutral y comprensible en español moderno.
  - No se introdujeron notas al pie porque el texto no presenta variantes textuales o léxicas relevantes que requieran alternativa explícita.
