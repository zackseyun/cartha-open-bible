    rationale: En español moderno, ‘probar’ puede entenderse como ‘intentar’ o ‘ensayar’. ‘Poner a prueba’ comunica mejor la idea de someter a examen o test.
  - severity: low
    issue: La nota alternativa puede mejorarse para sonar más idiomática en español
    rationale: Si se revisa el verbo principal, la nota también debe alinearse con la formulación mejorada y evitar una estructura torpe.
