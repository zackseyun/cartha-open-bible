translation:
  language: es
  text: Y no pongan a prueba ni juzguen a ningún profeta que hable en el Espíritu; porque todo pecado será perdonado[a], pero este pecado no será perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y a todo profeta que hable en el Espíritu no lo pongan a prueba ni lo juzguen».'
    reason: previous_rendering
lexical_decisions:
- source_word: πνεύματι
  english_pob_choice: speaking in the Spirit
  chosen_spanish: hable en el Espíritu
  alternatives_spanish:
  - hable por el Espíritu
  - hable en espíritu
  lexicon: πνεῦμα
  rationale: El contexto exige el sentido de habla inspirada o movida por el Espíritu, no simplemente una actitud interior. «En el Espíritu» conserva la referencia al ámbito/influjo del Espíritu sin añadir explicaciones que el griego no da.
- source_word: πειράσετε
  english_pob_choice: test
  chosen_spanish: probarán
  alternatives_spanish:
  - examinarán
  - pondrán a prueba
  lexicon: πειράζω
  rationale: «Probar» comunica bien la idea de poner a prueba con el riesgo de cuestionar la validez del profeta; además permite reflejar el paralelismo con «juzgarán» en la segunda cola.
- source_word: διακρινεῖτε
  english_pob_choice: judge
  chosen_spanish: juzgarán
  alternatives_spanish:
  - discernirán
  - distinguirán
  lexicon: διακρίνω
  rationale: Aquí el verbo se entiende como emitir juicio o evaluar con decisión. «Juzgar» es el equivalente más directo y claro en español, manteniendo el segundo miembro del paralelismo.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - ofensa
  lexicon: ἁμαρτία
  rationale: El pasaje contrapone la condición general de perdón con una falta específica que no será perdonada. «Pecado» mantiene el alcance moral y teológico del término.
theological_decisions:
- issue: Alcance absoluto de la prohibición frente a profetas que hablan en el Espíritu
  english_pob_reading: And you shall not test or judge any prophet speaking in the Spirit
  chosen_spanish_reading: Y no probarán ni juzgarán a ningún profeta que hable en el Espíritu
  alternative_spanish_readings:
  - Y todo profeta que hable en el Espíritu no lo probarán ni juzgarán
  - No probarán ni juzgarán a todo profeta que hable en el Espíritu
  rationale: El griego usa una construcción negativa con valor prohibitivo absoluto; la versión española debe dejar claro que la prohibición recae sobre cualquier profeta que hable en el Espíritu, no sobre «cada uno» en sentido distributivo ambiguo. Se evita una redacción que sugiera una excepción no presente en el texto.
  doctrine_reference: Didaché 11:7; nota revisada del POB en el archivo de revisión griega
- issue: Contraste entre perdón universal y una excepción única
  english_pob_reading: for every sin will be forgiven, but this sin will not be forgiven
  chosen_spanish_reading: porque todo pecado será perdonado[a], pero este pecado no será perdonado
  alternative_spanish_readings:
  - porque todo pecado será perdonado, pero este pecado no será perdonado
  - pues todo pecado será perdonado, pero este pecado no será perdonado
  rationale: 'Se conserva la tensión explícita del original: una afirmación general de perdón seguida de una excepción enfática. «Todo pecado» mantiene la amplitud de πᾶσα ἁμαρτία, y «este pecado» conserva la referencia deíctica a la falta concreta mencionada por el contexto.'
  doctrine_reference: Didaché 11:7; texto griego base
- issue: Sentido de ‘en el Espíritu’ en relación con el discurso profético
  english_pob_reading: speaking in the Spirit
  chosen_spanish_reading: que hable en el Espíritu
  alternative_spanish_readings:
  - que hable por el Espíritu
  - que hable bajo la acción del Espíritu
  rationale: La frase puede referir el ámbito o la fuente de la profecía; se conserva la formulación breve y abierta «en el Espíritu» para no estrechar indebidamente el sentido. Esto respeta la ambigüedad funcional del original.
  doctrine_reference: Didaché 11:7
translation_notes:
  revision_awareness: 'La revisión griega reciente confirma como preferible la lectura con alcance absoluto: «no probarán ni juzgarán a ningún profeta que hable en el Espíritu», frente a una redacción que podía leerse como distributiva («todo profeta... no»). La presente versión española sigue esa decisión y conserva el paralelismo y la excepción final sin ampliar el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el paralelismo «probarán / juzgarán» para reflejar los dos verbos griegos coordinados.
  - «En el Espíritu» se deja sin mayor glosa para respetar la ambigüedad del original y la formulación del POB inglés.
