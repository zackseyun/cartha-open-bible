review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue la revisión inglesa clave: la prohibición recae sobre cualquier profeta que habla en el Espíritu, no sobre ‘todo profeta’ con posible ambigüedad de alcance. También conserva correctamente el contraste entre ‘todo pecado’ y ‘este pecado’. Sin embargo, la forma verbal española en futuro (‘probarán’, ‘juzgarán’) suena menos natural como mandato/prohibición en español bíblico moderno; conviene usar presente de mandato (‘prueben’, ‘juzguen’) para expresar mejor el valor prohibitivo del futuro griego.'
  spanish_quality_summary: 'El texto es claro y comprensible, pero requiere un ajuste menor de naturalidad y registro: ‘no probarán ni juzgarán’ suena forzado en español contemporáneo y menos idiomático que ‘no pongan a prueba ni juzguen’ o ‘no prueben ni juzguen’. Además, ‘poner a prueba’ comunica con más precisión la fuerza de πειράζω en este contexto que el simple ‘probar’, que puede sonar a ‘intentar’. El resto del verso está bien logrado y es legible.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ‘Espíritu’ está bien capitalizado por contexto. ‘Pecado’ corresponde adecuadamente a ἁμαρτία. La única mejora léxica recomendable es πειράζω: ‘poner a prueba’ encaja mejor que ‘probar’ en español neutral eclesial.'
