revisions:
- from: Y no probarán ni juzgarán a ningún profeta que hable en el Espíritu; porque todo pecado será perdonado[a], pero este pecado no será perdonado.
  to: Y no pongan a prueba ni juzguen a ningún profeta que hable en el Espíritu; porque todo pecado será perdonado[a], pero este pecado no será perdonado.
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad y precisión del español sin cambiar el sentido: se reemplazó el futuro prohibitivo por formas exhortativas más idiomáticas (‘no pongan a prueba ni juzguen’) y se afinó πειράζω como ‘poner a prueba’. La nota se mantuvo como alternativa formal cercana al orden griego, alineada con la redacción revisada.'
