translation:
  language: es
  text: A todo apóstol que llegue a ustedes, recíbanlo como al Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πᾶς ... ἀπόστολος
  english_pob_choice: every apostle
  chosen_spanish: todo apóstol
  alternatives_spanish:
  - cada apóstol
  - todo enviado
  lexicon: ἀπόστολος
  rationale: «Todo apóstol» conserva el alcance distributivo de πᾶς y mantiene el término técnico «apóstol», que corresponde al griego y al inglés POB.
- source_word: ἐρχόμενος πρὸς ὑμᾶς
  english_pob_choice: who comes to you
  chosen_spanish: que llegue a ustedes
  alternatives_spanish:
  - que viene a ustedes
  - que se acerque a ustedes
  lexicon: ἐρχόμενος
  rationale: «Llegue» comunica llegada/proximidad de forma natural en español y preserva el valor de movimiento hacia los destinatarios.
- source_word: δεχθήτω
  english_pob_choice: be received
  chosen_spanish: recíbanlo
  alternatives_spanish:
  - recíbanle
  - sea recibido
  lexicon: δέχομαι
  rationale: El imperativo plural en español expresa bien la comunidad destinataria; «recíbanlo» mantiene la idea de acogida exigida por el verbo sin agregar contenido.
- source_word: ὡς Κύριος
  english_pob_choice: as the Lord
  chosen_spanish: como al Señor
  alternatives_spanish:
  - como Señor
  - como al Señor Jesús
  lexicon: κύριος
  rationale: «Como al Señor» refleja el valor comparativo de ὡς y conserva la mayúscula reverente para el referente divino implícito en el griego, en línea con el POB inglés.
theological_decisions:
- issue: Referencia de Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Dios
  - el Señor Jesús
  rationale: El texto griego usa Κύριος sin especificación. El POB inglés mantiene «the Lord»; en español «el Señor» conserva la ambigüedad reverente sin introducir una identificación explícita que el versículo no formula.
  doctrine_reference: Cristología y uso reverencial de κύριος
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo en el control de calidad previo y no presenta revisiones aplicadas; por eso se mantiene una traducción directa y estable, sin notas textuales necesarias.
  spanish_consistency_notes:
  - Se usa «apóstol» como término técnico constante para ἀπόστολος.
  - Se mantiene «Señor» con artículo para reflejar Κύριος y la lectura inglesa auditada.
  - Se conserva el tono imperativo comunitario en plural («recíbanlo») para el destinatario colectivo implícito en ὑμᾶς.
