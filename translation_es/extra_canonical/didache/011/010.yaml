translation:
  language: es
  text: Y todo profeta que enseña la verdad, si no hace lo que enseña, es un falso profeta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πᾶς δὲ προφήτης
  english_pob_choice: And every prophet
  chosen_spanish: Y todo profeta
  alternatives_spanish:
  - Y cualquier profeta
  - Y todo profeta que
  lexicon: πᾶς, προφήτης
  rationale: «Todo profeta» reproduce el valor distributivo de πᾶς con una formulación natural en español. Se conserva la apertura general del enunciado sin añadir restricción no presente en el griego.
- source_word: διδάσκων τὴν ἀλήθειαν
  english_pob_choice: teaching the truth
  chosen_spanish: que enseña la verdad
  alternatives_spanish:
  - enseñando la verdad
  - que enseña la verdad completa
  lexicon: διδάσκω, ἀλήθεια
  rationale: Se mantiene el participio como cláusula relativa fluida en español. «La verdad» es la correspondencia más directa para τὴν ἀλήθειαν; no se expande a «verdad completa» porque el griego no lo exige.
- source_word: εἰ ἃ διδάσκει οὐ ποιεῖ
  english_pob_choice: if he does not do what he teaches
  chosen_spanish: si no hace lo que enseña
  alternatives_spanish:
  - si no practica lo que enseña
  - si no cumple lo que enseña
  lexicon: ποιέω, διδάσκω
  rationale: «Hace lo que enseña» conserva el contraste entre enseñar y hacer con un paralelismo sencillo. «Practica» o «cumple» serían interpretativos; el griego usa ποιεῖ, ‘hacer’.
- source_word: ψευδοπροφήτης ἐστί
  english_pob_choice: is a false prophet
  chosen_spanish: es un falso profeta
  alternatives_spanish:
  - es profeta falso
  - resulta ser un falso profeta
  lexicon: ψευδοπροφήτης, εἰμί
  rationale: «Falso profeta» es la equivalencia directa y transparente. Se mantiene el predicado nominal sin atenuar la afirmación.
theological_decisions:
- issue: Relación entre enseñanza verdadera y conducta falsa en un profeta
  english_pob_reading: a prophet teaching the truth is false if he does not do what he teaches
  chosen_spanish_reading: un profeta que enseña la verdad es falso si no hace lo que enseña
  alternative_spanish_readings:
  - un profeta verdadero en su enseñanza pero falso en su conducta
  - un profeta que enseña bien, pero no obedece, es falso
  rationale: 'El griego vincula la credibilidad profética no solo a la doctrina correcta, sino también a la obediencia práctica. La versión española conserva esa tensión sin suavizarla: enseñar la verdad no basta si la vida contradice la enseñanza.'
  doctrine_reference: Santiago 1:22; Mateo 7:15-20; 1 Juan 2:4
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios y el cotejo cruzado reporta alta concordancia; por eso la redacción española sigue de cerca el sentido directo del griego y la traducción inglesa ya auditada, sin introducir variantes textuales ni ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se usa «profeta» y «falso profeta» de manera uniforme, sin sustituir por términos eclesiásticos más amplios.
  - Se mantiene «la verdad» como objeto directo de «enseña», en paralelo con el griego y con la POB inglesa.
  - No se añade nota textual porque no hay variantes reportadas en el paquete de fuente ni en la auditoría inglesa.
