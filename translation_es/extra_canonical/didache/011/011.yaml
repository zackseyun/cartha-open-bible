revisions:
- from: Pero todo profeta que ha sido probado, verdadero, que hace para un misterio terrenal de la iglesia, pero que no enseña a hacer lo que él mismo hace, no será juzgado por ustedes; porque tiene su juicio con Dios. Pues de la misma manera también lo hicieron los profetas antiguos.
  to: Pero todo profeta que ha sido probado, verdadero, que actúa en función de un misterio terrenal de la iglesia, y no enseña a hacer lo que él mismo hace, no será juzgado por ustedes; pues su juicio está con Dios. Pues de la misma manera también lo hicieron los profetas antiguos.
  rationale: 'Se hicieron reparaciones menores de estilo para que el español sea más natural sin apartarse del sentido fuente ni del audit trail inglés: «actúa en función de» sustituye a la construcción poco idiomática «hace para»; se eliminó la segunda oposición fuerte con «pero»; y «su juicio está con Dios» conserva mejor en español la idea de que el juicio le corresponde a Dios.'
