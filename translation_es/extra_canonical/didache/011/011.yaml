id: DID.11.11
reference: Didache 11:11
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Πᾶς δὲ προφήτης δεδοκιμασμένος, ἀληθινός, ποιῶν εἰς μυστήριον κοσμικὸν ἐκκλησίας, μὴ διδάσκων δὲ ποιεῖν ὅσα αὐτὸς ποιεῖ, οὐ κριθήσεται ἐφ᾽ ὑμῶν· μετὰ Θεοῦ γὰρ ἔχει τὴν κρίσιν· ὡσαύτως γὰρ ἐποίησαν καὶ οἱ ἀρχαῖοι προφῆται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/011.yaml
  text: But every prophet who has been tested, genuine, doing for an earthly mystery of the church, yet not teaching others to do what he himself does, will not be judged by you; for he has his judgment with God. For in the same way the ancient prophets also did.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:21Z'
    unchanged: false
    changes_summary: Tightened the participial sequence for closer alignment with the Greek, removed the added word 'others' and the added 'all,' changed 'acting' to 'doing' to reflect ποιῶν more directly, and adjusted the final clause from 'acted' to 'did' for closer lexical correspondence.
translation:
  language: es
  text: Pero todo profeta que ha sido probado, verdadero, que actúa en función de un misterio terrenal de la iglesia, y no enseña a hacer lo que él mismo hace, no será juzgado por ustedes; pues su juicio está con Dios. Pues de la misma manera también lo hicieron los profetas antiguos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - nada
  lexicon: n/a
  rationale: Correspondencia directa y estable en español para el oficio profético; no requiere término alternativo.
- source_word: δεδοκιμασμένος
  english_pob_choice: who has been tested
  chosen_spanish: que ha sido probado
  alternatives_spanish:
  - que ha sido examinado
  - puesto a prueba
  lexicon: n/a
  rationale: Conserva la idea de prueba/aprobación implícita en el participio perfecto pasivo; "probado" es natural y fiel en español.
- source_word: ἀληθινός
  english_pob_choice: genuine
  chosen_spanish: verdadero
  alternatives_spanish:
  - genuino
  - auténtico
  lexicon: n/a
  rationale: '"Verdadero" expresa bien la autenticidad del profeta y evita un tecnicismo innecesario; también mantiene el tono moral del pasaje.'
- source_word: ποιῶν
  english_pob_choice: doing
  chosen_spanish: que hace
  alternatives_spanish:
  - que realiza
  - obrando
  lexicon: n/a
  rationale: Se eligió un verbo simple y directo para reflejar el participio presente sin sobrerreformularlo.
- source_word: μυστήριον κοσμικὸν ἐκκλησίας
  english_pob_choice: an earthly mystery of the church
  chosen_spanish: un misterio terrenal de la iglesia
  alternatives_spanish:
  - un misterio mundano de la iglesia
  - un misterio del orden terrenal de la iglesia
  lexicon: n/a
  rationale: '"Terrenal" preserva el contraste con lo celestial sin cargar el término con connotaciones negativas de "mundano". "Misterio" e "iglesia" se mantienen por fidelidad léxica al griego y al audit trail inglés.'
- source_word: μὴ διδάσκων δὲ ποιεῖν
  english_pob_choice: yet not teaching others to do
  chosen_spanish: pero que no enseña a hacer
  alternatives_spanish:
  - pero que no enseña a otros a hacer
  - y no enseña a hacer
  lexicon: n/a
  rationale: Se sigue la revisión inglesa que quitó "others" y "all"; el español omite también "a otros" para no añadir un objeto no presente en el griego.
- source_word: ὅσα αὐτὸς ποιεῖ
  english_pob_choice: what he himself does
  chosen_spanish: lo que él mismo hace
  alternatives_spanish:
  - todo lo que él mismo hace
  - lo que hace él mismo
  lexicon: n/a
  rationale: Refleja con precisión la relación entre el pronombre intensivo y el verbo, sin ampliar el sentido a "todo".
- source_word: οὐ κριθήσεται ἐφ᾽ ὑμῶν
  english_pob_choice: will not be judged by you
  chosen_spanish: no será juzgado por ustedes
  alternatives_spanish:
  - no será juzgado por vosotros
  - no lo juzgarán ustedes
  lexicon: n/a
  rationale: Mantiene la pasiva y el agente explícito del griego; "ustedes" corresponde al registro neutral latinoamericano pedido.
- source_word: μετὰ Θεοῦ γὰρ ἔχει τὴν κρίσιν
  english_pob_choice: for he has his judgment with God
  chosen_spanish: porque tiene su juicio con Dios
  alternatives_spanish:
  - pues su juicio está con Dios
  - porque su juicio está con Dios
  lexicon: n/a
  rationale: Conserva la formulación relacional del original y el paralelo inglés. "Tiene su juicio con Dios" reproduce la idea de que el juicio pertenece ya a la esfera de Dios.
- source_word: οἱ ἀρχαῖοι προφῆται
  english_pob_choice: the ancient prophets
  chosen_spanish: los profetas antiguos
  alternatives_spanish:
  - los antiguos profetas
  - los profetas de tiempos antiguos
  lexicon: n/a
  rationale: Orden natural en español y fiel a la secuencia del griego; evita una expresión más literaria que podría sonar menos directa.
theological_decisions:
- issue: Alcance de "μυστήριον κοσμικὸν ἐκκλησίας"
  english_pob_reading: an earthly mystery of the church
  chosen_spanish_reading: un misterio terrenal de la iglesia
  alternative_spanish_readings:
  - un misterio mundano de la iglesia
  - un misterio del orden terrenal de la iglesia
  rationale: Se preserva la tensión entre "misterio" e "iglesia" y el calificativo κοσμικός sin suavizarlo hacia una interpretación doctrinal más precisa de lo que permite el texto. "Terrenal" mantiene la ambigüedad controlada del original y del audit trail inglés.
  doctrine_reference: Didaché 11:11; literalidad semántica del participio y sintagma adjetival griego
- issue: Relación entre el profeta probado y el juicio de la comunidad
  english_pob_reading: will not be judged by you; for he has his judgment with God
  chosen_spanish_reading: no será juzgado por ustedes; porque tiene su juicio con Dios
  alternative_spanish_readings:
  - no lo juzgarán ustedes; porque su juicio está con Dios
  - no será juzgado por ustedes; pues su juicio está con Dios
  rationale: La pasiva conserva que la comunidad no ejerce el juicio definitivo. "Con Dios" mantiene la esfera de autoridad divina sin convertirla en una sentencia doctrinal más explícita que el griego.
  doctrine_reference: Didaché 11:11; juicio de los profetas y autoridad divina
translation_notes:
  revision_awareness: This draft follows the latest English revision that tightened the participial sequence, removed added 'others' and 'all,' changed 'acting' to 'doing,' and aligned the final clause more closely with the Greek. The Spanish mirrors those tighter decisions by avoiding any extra objects, keeping the participial flow concise, and preserving the final simple aoristic force with 'lo hicieron.'
  spanish_consistency_notes:
  - Se usó "Dios" para Θεός, conforme al proyecto.
  - Se mantuvo "iglesia" y no se reemplazó por una formulación eclesial más interpretativa.
  - Se evitó "siervo" y se prefirió la fuerza directa de la construcción verbal, dado que δοῦλος no aparece aquí.
  - No se añadieron notas al pie porque no surgió una variante textual o lexical que requiriera anclaje explícito en el texto español.
