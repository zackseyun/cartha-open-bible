id: DID.11.12
reference: Didache 11:12
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ὃς δ᾽ ἂν εἴπῃ ἐν πνεύματι· Δός μοι ἀργύρια ἢ ἕτερά τινα, οὐκ ἀκούσεσθε αὐτοῦ· ἐὰν δὲ περὶ ἄλλων ὑστερούντων εἴπῃ δοῦναι, μηδεὶς αὐτὸν κρινέτω.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/012.yaml
  text: But whoever says in the Spirit[a], “Give me money or something else,” you shall not listen to him. But if he tells you to give for others who are in need, let no one judge him.
  footnotes:
  - marker: a
    text: Or '“Give me money,” or something else,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:22Z'
    unchanged: false
    changes_summary: Changed 'anything else' to 'something else' for a more natural rendering of ἕτερά τινα, and replaced 'Yet' with 'But' for simpler, more formal consistency.
translation:
  language: es
  text: 'Pero cualquiera que diga en el Espíritu[a]: «Dame dinero o algo más», no le escuchéis. Pero si dice que se dé para otros que están necesitados, que nadie lo juzgue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «“Dame dinero”, o algo más».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - por el Espíritu
  - en espíritu
  lexicon: πνεῦμα
  rationale: El griego admite una referencia al Espíritu en sentido pneumatológico; la mayúscula en español ayuda a preservar esa lectura, que el POB inglés mantuvo con la misma ambigüedad reverente. 'En espíritu' bajaría demasiado el sentido técnico; 'por el Espíritu' añade una relación causal que el texto no explicita.
- source_word: Δός μοι ἀργύρια ἢ ἕτερά τινα
  english_pob_choice: Give me money or something else
  chosen_spanish: Dame dinero o algo más
  alternatives_spanish:
  - Dame dinero o cualquier otra cosa
  - Dame dinero o algo distinto
  lexicon: ἀργύρια / ἕτερά τινα
  rationale: ἀργύρια se rinde naturalmente como 'dinero' en español, manteniendo el valor material general. ἕτερά τινα se traduce 'algo más' para conservar la amplitud de 'or something else' sin volverlo explicativo. Evito 'cualquier otra cosa' por sonar más absoluto que el griego.
- source_word: οὐκ ἀκούσεσθε αὐτοῦ
  english_pob_choice: you shall not listen to him
  chosen_spanish: no le escucharéis
  alternatives_spanish:
  - no lo escuchéis
  - no le prestéis atención
  lexicon: ἀκούω
  rationale: El futuro imperativo negativo del inglés POB se refleja con 'no le escucharéis', conservando el tono exhortativo y la dirección a la comunidad. 'No le prestéis atención' interpreta el efecto pero no sigue tan de cerca el verbo de oír/escuchar.
- source_word: περὶ ἄλλων ὑστερούντων
  english_pob_choice: for others who are in need
  chosen_spanish: para otros que están necesitados
  alternatives_spanish:
  - por otros que carecen de algo
  - en favor de otros necesitados
  lexicon: ὑστερέω
  rationale: ὑστερούντων apunta a carencia o necesidad; 'están necesitados' conserva esa fuerza sin hacerla más abstracta. 'Para otros' sigue el sentido distributivo de περὶ ἄλλων, y evita introducir 'en favor de' que suena más interpretativo.
- source_word: δοῦναι
  english_pob_choice: give
  chosen_spanish: se dé
  alternatives_spanish:
  - dar
  - que dé
  lexicon: δίδωμι
  rationale: En este contexto el infinitivo implica una exhortación sobre dar a otros; 'que se dé' expresa la acción impersonalmente en español y conecta con la dirección comunitaria del mandato. 'Dar' quedaría demasiado suelto; 'que dé' exigiría un sujeto más explícito que el griego no ofrece.
- source_word: μηδεὶς αὐτὸν κρινέτω
  english_pob_choice: let no one judge him
  chosen_spanish: que nadie lo juzgue
  alternatives_spanish:
  - nadie lo juzgue
  - que nadie lo condene
  lexicon: κρίνω
  rationale: κρίνω puede abarcar juzgar, evaluar o condenar; aquí 'juzgue' conserva la amplitud y sigue el POB inglés. 'Condene' sería demasiado fuerte y cerraría una ambigüedad que el griego deja abierta.
theological_decisions:
- issue: Discernimiento de un mensaje 'en el Espíritu' frente a peticiones egoístas
  english_pob_reading: The community must not listen to someone who, in the Spirit, asks for money or other things for himself; but a directive to give for others in need is not to be condemned.
  chosen_spanish_reading: La comunidad no debe atender al que, presentándose 'en el Espíritu', pide dinero u otras cosas para sí; pero sí debe permitir sin condena al que ordena dar a otros necesitados.
  alternative_spanish_readings:
  - El Espíritu inspira ambas peticiones por igual
  - '''En el Espíritu'' significa simplemente con fervor interior'
  rationale: El texto distingue entre una petición interesada y una exhortación caritativa. La redacción española conserva esa tensión sin resolver 'en el Espíritu' de modo reductivo, manteniendo la advertencia comunitaria y la excepción favorable para la dádiva a necesitados.
  doctrine_reference: Discernimiento profético y prueba comunitaria de los espíritus
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés al mantener 'something else' como parte de la petición directa, no como una cláusula aparte. También conserva la coordinación adversativa simple con 'Pero' en ambas oraciones, y refleja la excepción final como una prohibición de juicio comunitario sobre la exhortación a dar para otros necesitados.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí; no hay términos divinos explícitos.
  - Se conserva el registro exhortativo comunitario con 'no le escucharéis' / 'que nadie lo juzgue'.
  - La nota textual aísla la alternativa de puntuación para reflejar la ambigüedad de la frase griega sin alterar el texto principal.
