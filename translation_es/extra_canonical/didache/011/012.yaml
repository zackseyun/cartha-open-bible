review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: contrasta al que pide para sí con el que manda dar a otros necesitados. También mantiene correctamente dentro de la cita «dinero o algo más», en línea con la revisión inglesa auditada. Sin embargo, la nota al pie [a] preserva precisamente la lectura equivocada ya descartada por la auditoría inglesa, y por tanto no debe mantenerse como alternativa válida.'
  spanish_quality_summary: 'El español es claro y legible, pero mezcla registros: «cualquiera que diga» con «escuchéis» suena menos natural en español latinoamericano amplio. «No le hagan caso» sería idiomático, pero para una reparación mínima basta ajustar el verbo a «no lo escuchen», que además se acerca al sentido de ἀκούω. También conviene simplificar «que se dé para otros que están necesitados» a «que den para otros que están necesitados», que suena más natural y refleja mejor la exhortación comunitaria.'
  glossary_alignment: No hay conflictos mayores con la terminología del proyecto. «En el Espíritu» es defendible para ἐν πνεύματι. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La principal desviación documentaria está en conservar una nota alternativa que contradice la decisión léxica auditada sobre Δός μοι ἀργύρια ἢ ἕτερά τινα.
  issues:
  - severity: high
    issue: La nota al pie [a] conserva una lectura ya rechazada por la auditoría de fuente.
    rationale: La alternativa «“Dame dinero”, o algo más» reintroduce la puntuación errónea que separa «o algo más» de la petición citada, alterando el sentido del griego y contradiciendo la revisión aplicada.
  - severity: medium
    issue: Inconsistencia de registro verbal en el español.
    rationale: «Cualquiera que diga» junto con «no le escuchéis» mezcla un tono más general con voseo/plural peninsular; para español neutral latinoamericano es preferible «no lo escuchen».
  - severity: low
    issue: «que se dé para otros» suena algo impersonal y menos natural.
    rationale: Aunque es comprensible, «que den para otros» expresa mejor la exhortación dirigida a la comunidad y resulta más fluido en español eclesial general.
  revised_spanish_text: 'Pero cualquiera que diga en el Espíritu: «Dame dinero o algo más», no lo escuchen. Pero si dice que den para otros que están necesitados, que nadie lo juzgue.'
  revision_rationale: Se elimina la nota alternativa porque preserva una lectura incorrecta ya descartada por la auditoría de fuente. Además, se ajusta el registro al español neutral latinoamericano («no lo escuchen») y se mejora la naturalidad de la exhortación comunitaria («que den para otros»), sin cambiar el sentido del original.
