review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: prohibición de permanecer, excepción por necesidad para un segundo día, y veredicto de falso profeta si permanece tres días. Sin embargo, la frase inicial «no permanecerá un día» en español se presta a una lectura equívoca: puede sonar como que no debe permanecer ni siquiera un día completo, cuando el contexto contrasta un primer día permitido con un segundo solo por necesidad. El griego οὐ μενεῖ δὲ ἡμέραν μίαν, aunque se reflejó literalmente en el inglés auditado, necesita una formulación española más idiomática para preservar la norma temporal sin confusión.'
  spanish_quality_summary: El texto es claro y sobrio, pero la repetición triple de «Pero» resulta algo pesada en español. Además, «también el siguiente» suena elíptico de forma poco natural; «también el día siguiente» mejora la legibilidad sin sobreinterpretar. Conviene suavizar la primera cláusula a una forma más natural y normativa en español eclesial contemporáneo.
  glossary_alignment: No hay términos del glosario mayor en disputa. «Falso profeta» es correcto para ψευδοπροφήτης. «Permanecer» refleja bien μένω, aunque en la primera cláusula una reformulación idiomática española es preferible para evitar ambigüedad. No se requieren notas léxicas adicionales.
  issues:
  - severity: medium
    issue: Ambigüedad en «no permanecerá un día»
    rationale: En español puede entenderse como prohibición de quedarse incluso un día, o como que no llegará a cumplir un día completo. La norma del pasaje apunta a un límite de un día con posible extensión al siguiente por necesidad; una redacción más natural evita falsear el efecto práctico.
  - severity: low
    issue: Elipsis poco natural en «también el siguiente»
    rationale: Aunque el griego es elíptico, en español la omisión de «día» suena brusca. Añadir «día» conserva el sentido temporal y mejora la lectura.
  - severity: low
    issue: Repetición estilísticamente pesada de «Pero» al inicio de las tres cláusulas
    rationale: No es incorrecto, pero un ajuste leve produce mejor fluidez en español sin perder la coordinación del original.
  revised_spanish_text: Pero no se quedará más de un día; pero si hay necesidad, también el día siguiente. Y si permanece tres días, es un falso profeta.
  revision_rationale: Se ajusta la primera cláusula para expresar en español de manera inequívoca el límite temporal normativo que el contexto exige. «No se quedará más de un día» evita una lectura confusa de «no permanecerá un día». Se explicita «día» en la segunda cláusula por naturalidad española, y se aligera la coordinación final con «Y si» sin alterar el sentido.
