  text: οὐ μενεῖ δὲ ἡμέραν μίαν· ἐὰν δὲ ᾖ χρεία, καὶ τὴν ἄλλην· τρεῖς δὲ ἐὰν μείνῃ, ψευδοπροφήτης ἐστίν.
