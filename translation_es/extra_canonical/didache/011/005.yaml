revisions:
- from: Pero no permanecerá un día; pero si hay necesidad, también el siguiente. Pero si permanece tres días, es un falso profeta.
  to: Pero no se quedará más de un día; pero si hay necesidad, también el día siguiente. Y si permanece tres días, es un falso profeta.
  rationale: Se ajusta la primera cláusula para expresar en español de manera inequívoca el límite temporal normativo que el contexto exige. «No se quedará más de un día» evita una lectura confusa de «no permanecerá un día». Se explicita «día» en la segunda cláusula por naturalidad española, y se aligera la coordinación final con «Y si» sin alterar el sentido.
