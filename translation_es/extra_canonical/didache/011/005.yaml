    changes_summary: Corrected the opening clause to reflect οὐ μενεῖ ('he shall not remain'), removing the unsupported 'for only.' Kept the rest essentially the same, with minor smoothing.
translation:
  language: es
  text: Pero no se quedará más de un día; pero si hay necesidad, también el día siguiente. Y si permanece tres días, es un falso profeta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ μενεῖ
  english_pob_choice: But he shall not remain
  chosen_spanish: Pero no permanecerá
  alternatives_spanish:
  - No permanecerá
  - Pero no se quedará
  lexicon: μένω
  rationale: El griego expresa negación directa de permanecer; «no permanecerá» conserva la fuerza de οὐ μενεῖ sin añadir el matiz de duración implícito en «for only». «Permanecer» es claro y digno en español bíblico contemporáneo.
- source_word: ἡμέραν μίαν
  english_pob_choice: one day
  chosen_spanish: un día
  alternatives_spanish:
  - un solo día
  - un día entero
  lexicon: ἡμέρα
  rationale: La secuencia temporal se expresa naturalmente como «un día». No se añade «solo» porque el ajuste revisado del inglés ya eliminó el equivalente implícito; el griego simplemente fija el límite de un día.
- source_word: ἐὰν δὲ ᾖ χρεία
  english_pob_choice: but if there is need
  chosen_spanish: pero si hay necesidad
  alternatives_spanish:
  - pero si hace falta
  - pero si es necesario
  lexicon: χρεία
  rationale: χρεία denota necesidad o requerimiento. «Hay necesidad» mantiene un registro sobrio y corresponde bien a la construcción impersonal del griego.
- source_word: τὴν ἄλλην
  english_pob_choice: also the next
  chosen_spanish: también el siguiente
  alternatives_spanish:
  - también al siguiente
  - también el otro
  lexicon: ἄλλος
  rationale: El sintagma es elíptico y depende del contexto temporal. «El siguiente» conserva la referencia al día siguiente; se mantiene la ambigüedad mínima del original sin explicitar más de lo que dice.
- source_word: τρεῖς ... ἐὰν μείνῃ
  english_pob_choice: if he remains three days
  chosen_spanish: si permanece tres días
  alternatives_spanish:
  - si se queda tres días
  - si permanece por tres días
  lexicon: μένω
  rationale: Se conserva el verbo de permanencia para reflejar la repetición léxica del original y el contraste legal de la instrucción. «Tres días» reproduce el límite temporal sin adición interpretativa.
- source_word: ψευδοπροφήτης
  english_pob_choice: a false prophet
  chosen_spanish: un falso profeta
  alternatives_spanish:
  - un profeta falso
  lexicon: ψευδοπροφήτης
  rationale: La forma habitual en español es «falso profeta», que preserva tanto la valoración negativa como la referencia a la función profética. No se suaviza a «profeta mentiroso» porque el compuesto griego apunta al estatus del oficio, no solo a una mentira puntual.
theological_decisions:
- issue: Criterio disciplinario sobre la permanencia del visitante/profeta
  english_pob_reading: But he shall not remain one day; but if there is need, also the next. But if he remains three days, he is a false prophet.
  chosen_spanish_reading: Pero no permanecerá un día; pero si hay necesidad, también el siguiente. Pero si permanece tres días, es un falso profeta.
  alternative_spanish_readings:
  - No permanecerá un día; pero si hay necesidad, también el siguiente. Si permanece tres días, es un falso profeta.
  - No se quedará un día; pero si hace falta, también el siguiente. Pero si permanece tres días, es un falso profeta.
  rationale: La sentencia funciona como una norma práctica con umbral temporal. La traducción conserva el contraste entre la admisión excepcional de un segundo día y la marca de tres días como señal de falsedad profética, sin convertirlo en una explicación más amplia de discernimiento.
  doctrine_reference: Didaché 11:5; disciplina comunitaria sobre falsos profetas
translation_notes:
  revision_awareness: 'Se incorporó la corrección revisada del inglés POB: οὐ μενεῖ se entendió como negación simple («no permanecerá»), descartando la idea de «solo» que no estaba sustentada. El resto del versículo se mantiene cerca del texto griego y del ajuste editorial inglés.'
  spanish_consistency_notes:
  - Se mantiene «profeta» y «falso profeta» de forma consistente con la función profética del contexto.
  - Se usa «permanecer» para reflejar la repetición de μένω en ambas cláusulas.
  - Se evita introducir terminología eclesiástica posterior que no aparece en el griego.
  - El tono es normativo y sobrio, acorde con una instrucción comunitaria breve.
