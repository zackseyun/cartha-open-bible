base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/005.yaml
  text: But he shall not remain one day; but if there is need, also the next. But if he remains three days, he is a false prophet.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:02Z'
