  to: Y todo profeta que dispone una mesa[a] en el Espíritu no comerá de ella; de lo contrario, es un falso profeta.
  rationale: Se conserva la traducción principal, que es fiel y legible, pero se corrige la ubicación del marcador de nota y se mejoran las alternativas para que sean naturales en español y sigan reflejando el rango semántico documentado.
