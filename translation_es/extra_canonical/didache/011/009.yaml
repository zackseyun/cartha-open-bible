review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta correctamente la estructura y el sentido básico del griego: todo profeta que establece/prepara una mesa en el Espíritu no debe comer de ella; si lo hace, es falso profeta. Sin embargo, el anclaje de nota está mal colocado dentro de la palabra y la alternativa ''ordena una mesa'' suena poco natural en español. Conviene un ajuste menor para fidelidad formal y legibilidad.'
  spanish_quality_summary: 'La redacción es clara y digna. ''Dispone una mesa en el Espíritu'' es aceptable y mantiene la imagen de τράπεζα sin reducirla a mero mueble ni expandirla a ''comida'' más de lo necesario. El principal problema es tipográfico/estilístico: el marcador [a] no debe partir ''dispone''. También conviene pulir la nota para que las alternativas suenen naturales en español.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Profeta', 'Espíritu' y 'falso profeta' están bien. La elección 'dispone una mesa' es compatible con la decisión inglesa 'sets a table', mientras deja ver el matiz metonímico de τράπεζα.
  issues:
  - severity: medium
    issue: El marcador de nota [a] está insertado dentro de la palabra 'dispone'.
    rationale: Las notas deben anclarse a una palabra o frase completa en el texto, no interrumpir la ortografía. Esto afecta la legibilidad y el cumplimiento del formato requerido.
  - severity: low
    issue: La alternativa de nota 'ordena una mesa' es poco idiomática en español.
    rationale: Aunque intenta reflejar una posibilidad léxica, en español suena forzada y puede sugerir 'poner en orden' una mesa más que mandarla/prepararla. Es mejor ofrecer alternativas naturales como 'prepara una mesa' o 'pone la mesa'.
  revised_spanish_text: Y todo profeta que dispone una mesa[a] en el Espíritu no comerá de ella; de lo contrario, es un falso profeta.
  revised_footnotes:
  - marker: a
    text: 'O: «prepara una mesa en el Espíritu» o «pone la mesa en el Espíritu».'
    reason: alternativas de traducción para ὁρίζων τράπεζαν
  revision_rationale: Se conserva la traducción principal, que es fiel y legible, pero se corrige la ubicación del marcador de nota y se mejoran las alternativas para que sean naturales en español y sigan reflejando el rango semántico documentado.
