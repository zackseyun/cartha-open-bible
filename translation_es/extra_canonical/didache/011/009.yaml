id: DID.11.9
reference: Didache 11:9
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Καὶ πᾶς προφήτης ὁρίζων τράπεζαν ἐν πνεύματι, οὐ φάγεται ἀπ᾽ αὐτῆς, εἰδὲ μήγε ψευδοπροφήτης ἐστί·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/009.yaml
  text: And every prophet who sets a table in the Spirit shall not eat from it[a]; otherwise he is a false prophet.
  footnotes:
  - marker: a
    text: Or 'appoints a table in the Spirit shall not eat from it'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:18Z'
    unchanged: false
    changes_summary: Changed 'orders a meal' to 'sets a table' for closer lexical accuracy to τράπεζαν ὁρίζων, and adjusted 'eat of it' to the more natural 'eat from it.'
translation:
  language: es
  text: Y todo profeta que dispone una mesa[a] en el Espíritu no comerá de ella; de lo contrario, es un falso profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prepara una mesa en el Espíritu» o «pone la mesa en el Espíritu».'
    reason: alternativas de traducción para ὁρίζων τράπεζαν
lexical_decisions:
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  - portavoz profético
  lexicon: προφήτης
  rationale: Se conserva el término directo y estándar para el oficio profético. 'Profeta' comunica con claridad la función sin añadir matices no presentes en el griego.
- source_word: ὁρίζων τράπεζαν
  english_pob_choice: sets a table
  chosen_spanish: dispone una mesa
  alternatives_spanish:
  - prepara una mesa
  - pone una mesa
  - ordena una mesa
  lexicon: ὁρίζω + τράπεζα
  rationale: '''Dispone una mesa'' conserva la idea de ordenar/preparar lo necesario para la comida, y evita la lectura demasiado material de un mueble aislado. Mantiene la cercanía al griego y al ajuste auditado de la tradición inglesa.'
- source_word: ἐν πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - por el Espíritu
  - en espíritu
  lexicon: ἐν πνεύματι
  rationale: Se traduce con mayúscula porque el contexto apunta a una acción profética vinculada al ámbito/impulso del Espíritu. 'En el Espíritu' preserva la fórmula y la tensión semántica sin explicarla en exceso.
- source_word: οὐ φάγεται ἀπ᾽ αὐτῆς
  english_pob_choice: shall not eat from it
  chosen_spanish: no comerá de ella
  alternatives_spanish:
  - no comerá de eso
  - no participará de ella
  lexicon: φάγομαι + ἀπό
  rationale: '''Comerá de ella'' es idiomático en español y mantiene la referencia a la mesa/comedida preparada. Evita explicitar ''de ella'' como solo mueble y conserva la relación con el alimento implícito en τράπεζα.'
- source_word: ψευδοπροφήτης
  english_pob_choice: false prophet
  chosen_spanish: falso profeta
  alternatives_spanish:
  - falso profeta
  - profeta falso
  lexicon: ψευδοπροφήτης
  rationale: Se mantiene la expresión doctrinalmente estable en español, con el adjetivo pospuesto solo si el ritmo lo exige. Aquí 'falso profeta' es natural y fiel.
theological_decisions:
- issue: Sentido de τράπεζα como mesa o comida/banquete
  english_pob_reading: sets a table
  chosen_spanish_reading: dispone una mesa
  alternative_spanish_readings:
  - prepara una comida
  - ordena un banquete
  rationale: El audit trail inglés corrigió una lectura demasiado física. En español, 'dispone una mesa' conserva la metáfora de la mesa preparada, sin reducirla a un objeto ni ampliar indebidamente a 'banquete'.
  doctrine_reference: Didache 11:9; lexical note on τράπεζα as metonymy for meal/food
translation_notes:
  revision_awareness: La auditoría inglesa pasó de una formulación más literal ('appoints/orders a meal') a 'sets a table' para reflejar τράπεζαν ὁρίζων; la versión española sigue esa decisión con 'dispone una mesa', manteniendo el matiz de preparación de comida y la referencia al acto profético en el Espíritu.
  spanish_consistency_notes:
  - Se usa 'Espíritu' con mayúscula por el contexto profético.
  - Se evita 'SEÑOR' y no hay término divino aquí.
  - '''Falso profeta'' preserva el juicio explícito del texto sin suavizarlo.'
