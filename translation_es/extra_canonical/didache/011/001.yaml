translation:
  language: es
  text: 'Por tanto, cualquiera que venga y les enseñe todas estas cosas, las antes mencionadas, recíbanlo. Pero si el mismo maestro se desvía y enseña otra enseñanza para derribarlas, no lo escuchen. Pero si es para añadir justicia y conocimiento del Señor, recíbanlo como al Señor.


    Ahora bien, en cuanto a los apóstoles y profetas, conforme a la norma del evangelio, actúen así. Que todo apóstol que venga a ustedes sea recibido como al Señor. Permanecerá solo un día; pero si hay necesidad, también el siguiente. Pero si permanece tres días, es un falso profeta. Y cuando el apóstol se marche, no tome nada sino pan, hasta que encuentre alojamiento; pero si pide dinero, es un falso profeta.


    Y a todo profeta que hable en el Espíritu[a], no lo prueben ni lo juzguen; porque todo pecado será perdonado, pero este pecado no será perdonado. Sin embargo, no todo el que habla en el Espíritu es profeta, sino solo si tiene la conducta del Señor. Así pues, por su conducta se conocerá al falso profeta y al profeta. Y todo profeta que prepare una mesa en el Espíritu[b] no comerá de ella; de otro modo, es un falso profeta. Y todo profeta que enseña la verdad, si no hace lo que enseña, es un falso profeta. Pero todo profeta que ha sido probado y es genuino, actuando para el misterio terrenal de la iglesia, pero sin enseñar a otros a hacer todo lo que él mismo hace, no será juzgado por ustedes; porque con Dios tiene su juicio. Pues así actuaron también los profetas antiguos.


    Pero si alguno dice en el Espíritu: «Dame dinero, o alguna otra cosa», no lo escuchen. Pero si pide que se dé a favor de otros que están en necesidad, que nadie lo juzgue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Espíritu se capitaliza aquí por la lectura pneumatológica del discurso profético; el griego no distingue mayúsculas, y también puede entenderse «en espíritu».
    reason: theological_note
  - marker: b
    text: La expresión griega es oscura; el texto conserva la imagen literal de «preparar una mesa» para no borrar la ambigüedad del original.
    reason: source_note
lexical_decisions:
- source_word: ἐλθὼν διδάξῃ
  english_pob_choice: comes and teaches
  chosen_spanish: venga y les enseñe
  alternatives_spanish:
  - llegue y les enseñe
  - venga enseñándoles
  lexicon: BDAG
  rationale: Conservo el valor de llegada + enseñanza sin volverlo mecánico. «Venga» reproduce el movimiento de entrada; «les enseñe» mantiene el destinatario explícito del original.
- source_word: στραφεὶς
  english_pob_choice: turns aside
  chosen_spanish: se desvía
  alternatives_spanish:
  - se vuelve
  - se aparta
  lexicon: BDAG
  rationale: «Se desvía» expresa bien la idea de cambio de dirección aplicado a la enseñanza, y evita una lectura demasiado literal o vaga en español.
- source_word: εἰς τὸ καταλῦσαι
  english_pob_choice: so as to overthrow these things
  chosen_spanish: para derribarlas
  alternatives_spanish:
  - para destruirlas
  - para abolirlas
  lexicon: BDAG
  rationale: El infinitivo final indica propósito. «Derribarlas» conserva la fuerza de desmantelar o invalidar las enseñanzas previas sin imponer un término técnico excesivo.
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia de Dios
  lexicon: BDAG
  rationale: En este contexto, «justicia» conserva el peso moral y relacional del término sin perder naturalidad en español. No se introduce «rectitud» porque aquí la pauta es añadidura a la vida recta/justa enseñada.
- source_word: γνῶσιν Κυρίου
  english_pob_choice: knowledge of the Lord
  chosen_spanish: conocimiento del Señor
  alternatives_spanish:
  - conocimiento de Yahvé
  - conocimiento de Dios
  lexicon: BDAG
  rationale: El genitivo se traduce de modo directo y transparente. Mantengo «Señor» aquí porque el texto griego usa Κυρίου, y el contexto de la Didaché lo emplea como título reverencial.
- source_word: οὐ μενεῖ δὲ ἡμέραν μίαν
  english_pob_choice: He shall remain for only one day
  chosen_spanish: Permanecerá sólo un día
  alternatives_spanish:
  - No permanecerá un día
  - Permanecerá un solo día
  lexicon: BDAG
  rationale: Sigo la decisión auditada de reflejar el sentido claro del pasaje, que limita la estancia a un día. «Sólo» expresa el límite temporal con naturalidad.
- source_word: ἐὰν δὲ ᾖ χρεία
  english_pob_choice: but if there is need
  chosen_spanish: pero si hay necesidad
  alternatives_spanish:
  - pero si hace falta
  - pero si fuese necesario
  lexicon: BDAG
  rationale: «Hay necesidad» es una equivalencia directa y sobria, fiel al valor impersonal de χρεία.
- source_word: πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  lexicon: BDAG
  rationale: Sigo la lectura del audit trail que capitaliza la referencia por tratarse de habla profética inspirada. En español, la mayúscula ayuda a distinguir el sentido pneumatológico.
- source_word: ὁρίξων τράπεζαν
  english_pob_choice: who appoints a table
  chosen_spanish: que disponga una mesa
  alternatives_spanish:
  - que prepare una mesa
  - que ordene una mesa
  lexicon: LSJ
  rationale: «Disponga una mesa» conserva el gesto de establecer u ordenar la mesa sin sonar artificial. «Mesa» mantiene la imagen concreta del original.
- source_word: κοσμικὸν
  english_pob_choice: earthly
  chosen_spanish: terrenal
  alternatives_spanish:
  - terrestre
  - de este mundo
  lexicon: LSJ
  rationale: Prefiero «terrenal» para evitar la posible carga negativa de «mundano» y para sugerir algo perteneciente al orden del mundo, en línea con la explicación auditada.
- source_word: μυστήριον κοσμικὸν ἐκκλησίας
  english_pob_choice: earthly mystery of the church
  chosen_spanish: misterio terrenal de la iglesia
  alternatives_spanish:
  - misterio terrenal de la asamblea
  - misterio del mundo de la iglesia
  lexicon: LSJ
  rationale: Mantengo la estructura difícil sin paraphrasear de más. «Iglesia» traduce ἐκκλησίας con el uso eclesial ya establecido, y «terrenal» conserva la idea no celestial del texto.
- source_word: μὴ διδάσκων δὲ ποιεῖν ὅσα αὐτὸς ποιεῖ
  english_pob_choice: yet not teaching others to do all that he himself does
  chosen_spanish: y sin enseñar a otros a hacer todo lo que él mismo hace
  alternatives_spanish:
  - pero no enseñando a otros a hacer lo que él mismo hace
  - sin enseñarles a hacer todo lo que él hace
  lexicon: BDAG
  rationale: Sigo la decisión auditada de suplir «otros» como objeto general. «Sin enseñar» integra bien la oposición y conserva el participio concesivo del griego.
- source_word: Δός μοι ἀργύρια
  english_pob_choice: Give me money
  chosen_spanish: Dame dinero
  alternatives_spanish:
  - Dame monedas
  - Dame plata
  lexicon: BDAG
  rationale: «Dinero» es la equivalencia más clara y natural para el sentido contextual de ἀργύρια, evitando un literalismo que sonaría extraño en español.
- source_word: ἐν πνεύματι
  english_pob_choice: speaking in the Spirit
  chosen_spanish: en el Espíritu
  alternatives_spanish:
  - en espíritu
  lexicon: BDAG
  rationale: Se conserva la misma decisión pneumatológica en todo el pasaje para mantener consistencia y claridad doctrinal.
theological_decisions:
- issue: How to render the instruction about receiving a teacher who adds to righteousness and knowledge of the Lord
  english_pob_reading: receive him as the Lord
  chosen_spanish_reading: recíbanlo como al Señor
  alternative_spanish_readings:
  - recíbanlo como Señor
  - recíbanlo como al Señor Jesús
  rationale: La lectura sigue de cerca el griego con el artículo y el título Κυρίου. En español, «como al Señor» mantiene reverencia y evita introducir «Jesús» sin base inmediata en el verso.
  doctrine_reference: Christology / authority of teachers
- issue: Whether ἐν πνεύματι should be capitalized as Spirit in the prophetic instructions
  english_pob_reading: in the Spirit
  chosen_spanish_reading: en el Espíritu
  alternative_spanish_readings:
  - en espíritu
  rationale: 'La mayúscula refleja la interpretación pneumatológica del audit trail: habla profética inspirada, no mera disposición interior. La traducción no fuerza una distinción inexistente en el griego, pero sí la hace visible en español.'
  doctrine_reference: Pneumatology
- issue: How to preserve the obscure clause ποιῶν εἰς μυστήριον κοσμικὸν ἐκκλησίας
  english_pob_reading: acting for the earthly mystery of the church
  chosen_spanish_reading: actuando para el misterio terrenal de la iglesia
  alternative_spanish_readings:
  - actuando para el misterio mundano de la iglesia
  - actuando para el misterio terrenal de la asamblea
  rationale: No se simplifica el pasaje oscuro. «Terrenal» evita un matiz peyorativo y deja visible la posible oposición entre lo celestial y lo perteneciente a este orden del mundo.
  doctrine_reference: Ecclesiology
- issue: How to treat the apostolic visitor limit of one day plus a possible second day
  english_pob_reading: He shall remain for only one day; but if there is need, also the next
  chosen_spanish_reading: Permanecerá sólo un día; pero si hay necesidad, también el siguiente
  alternative_spanish_readings:
  - Permanecerá un solo día; pero si hace falta, también el siguiente
  rationale: Se sigue la lectura emendada adoptada por el audit trail, porque el griego transmitido con οὐ es incoherente en el contexto. La traducción refleja la norma clara del pasaje sin ocultar la restricción temporal.
  doctrine_reference: Church order
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: ahora sólo se incluyen notas con anclajes explícitos [a] y [b] en el texto español. La redacción sigue el texto griego del Didaché y la auditoría inglesa, conservando la tensión textual de los pasajes oscuros y la decisión emendada sobre la estancia de un apóstol.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto para el nombre divino en español, pero aquí el griego tiene Κυρίου y el contexto exige «Señor» en las fórmulas receptoras.
  - Se mantiene «iglesia» para ἐκκλησία según la práctica del POB cuando el contexto es eclesial, aunque el término griego puede significar asamblea.
  - «Profeta falso» se traduce como «falso profeta» para conservar la fórmula estable.
  - La capitalización de «Espíritu» se aplica de forma consistente en las secciones proféticas, siguiendo la lectura auditada.
