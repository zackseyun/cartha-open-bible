review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del griego y del audit trail inglés: conserva la desviación doctrinal de στραφεὶς, la finalidad de καταλῦσαι, la recepción «como al Señor», la enmienda contextual sobre la permanencia de un día, la capitalización de «Espíritu» y la ambigüedad de las cláusulas difíciles. Sin embargo, hay varios ajustes necesarios para mayor fidelidad y naturalidad: «las que han sido dichas antes» suena forzado frente a «las ya dichas» o «las antes mencionadas»; «decreto» no refleja tan bien δόγμα como «norma» u «ordenanza» en este contexto; «maneras» para τρόποι es poco idiomático y debilita el matiz de conducta/forma de vida; «disponga una mesa» es aceptable pero «prepare una mesa» resulta más claro en español sin perder la imagen; y «dice que se dé para otros» puede mejorar en claridad. También conviene pulir la sintaxis de la frase oscura sobre el «misterio terrenal de la iglesia».'
  spanish_quality_summary: 'La legibilidad general es buena y el registro es digno, pero algunos giros suenan demasiado calcados o poco naturales para español eclesial contemporáneo: «las que han sido dichas antes», «conforme al decreto del evangelio», «las maneras del Señor», «por sus maneras», y «dice que se dé para otros». El texto puede quedar más fluido y claro con leves ajustes sin perder apego al original.'
  glossary_alignment: 'No hay conflictos con los términos base del proyecto: no aparecen YHWH ni Mesías. «Señor», «Dios», «Espíritu» y «iglesia» están bien manejados en contexto. La decisión documentada de capitalizar «Espíritu» se conserva adecuadamente. La cláusula difícil con κοσμικὸν se mantiene sin sobreparáfrasis, en línea con la justificación inglesa.'
  issues:
  - severity: medium
    issue: «las que han sido dichas antes» es poco natural
    rationale: Aunque refleja τὰ προειρημένα, en español resulta pesado y calcado. «las antes mencionadas» o «las ya dichas» preserva el sentido con mejor fluidez.
  - severity: medium
    issue: «decreto del evangelio» debilita el sentido contextual de κατὰ τὸ δόγμα τοῦ εὐαγγελίου
    rationale: «Decreto» sugiere un acto jurídico puntual. En este contexto de instrucción práctica eclesial, «norma» u «ordenanza» comunica mejor la idea de regla establecida.
  - severity: medium
    issue: «maneras del Señor» / «por sus maneras» es poco idiomático para τρόποι
    rationale: Aunque posible, en español suena raro y menos claro que «conducta» o «camino de vivir». El contraste entre verdadero y falso profeta se basa en conducta observable.
  - severity: low
    issue: «disponga una mesa» puede sonar ambiguo o rígido
