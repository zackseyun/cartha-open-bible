id: DID.11.3
reference: Didache 11:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Περὶ δὲ τῶν ἀποστόλων καὶ προφητῶν κατὰ τὸ δόγμα τοῦ εὐαγγελίου, οὕτω ποιήσατε.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/003.yaml
  text: Now concerning the apostles and prophets, according to the rule of the gospel, do thus.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:57Z'
    unchanged: false
    changes_summary: Replaced 'ordinance' with 'rule' for more natural and accurate rendering of δόγμα here, and changed 'act in this way' to 'do thus' to reflect the concise imperative οὕτω ποιήσατε more directly.
translation:
  language: es
  text: Y en cuanto a los apóstoles y profetas, conforme a la regla del evangelio, hagan así.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Y en cuanto a
  alternatives_spanish:
  - Ahora acerca de
  - En cuanto a
  lexicon: περί
  rationale: La construcción introductoria comunica el cambio de tema con naturalidad en español. 'Y en cuanto a' conserva el valor de transición sin añadir énfasis ajeno al griego.
- source_word: τῶν ἀποστόλων καὶ προφητῶν
  english_pob_choice: the apostles and prophets
  chosen_spanish: los apóstoles y profetas
  alternatives_spanish:
  - los enviados y profetas
  - los apóstoles y los profetas
  lexicon: ἀπόστολος, προφήτης
  rationale: Se mantiene la terminología eclesial establecida por el griego. 'Apóstoles' y 'profetas' es directo, claro y fiel.
- source_word: κατὰ τὸ δόγμα
  english_pob_choice: according to the rule
  chosen_spanish: conforme a la regla
  alternatives_spanish:
  - según la regla
  - de acuerdo con la norma
  lexicon: δόγμα
  rationale: '''Regla'' refleja bien el sentido normativo de δόγμα en este contexto. ''Norma'' es posible, pero ''regla'' suena más natural en español y sigue la revisión inglesa que prefirió ''rule'' frente a ''ordinance''.'
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the gospel
  chosen_spanish: del evangelio
  alternatives_spanish:
  - del evangelio
  - de la buena noticia
  lexicon: εὐαγγέλιον
  rationale: '''Evangelio'' es la forma establecida y fiel al término técnico cristiano. ''Buena noticia'' sería explicativa, pero menos precisa como equivalente de la unidad terminológica del texto.'
- source_word: οὕτω ποιήσατε
  english_pob_choice: do thus
  chosen_spanish: hagan así
  alternatives_spanish:
  - haced así
  - hagan de este modo
  - obren así
  lexicon: ποιέω
  rationale: El imperativo breve se conserva con una formulación imperativa natural en español. 'Hagan así' reproduce la concisión del griego sin sobreexplicar ni suavizar el mandato.
theological_decisions:
- issue: Valor normativo de δόγμα en una instrucción eclesial
  english_pob_reading: according to the rule of the gospel
  chosen_spanish_reading: conforme a la regla del evangelio
  alternative_spanish_readings:
  - según la norma del evangelio
  - de acuerdo con la regla del evangelio
  rationale: Se preserva el peso normativo de la frase sin convertirla en una fórmula jurídica rígida. 'Regla' mantiene la idea de patrón autorizado por el evangelio.
  doctrine_reference: Autoridad normativa del evangelio en la disciplina de la iglesia primitiva
translation_notes:
  revision_awareness: 'La revisión inglesa cambió ''ordinance'' por ''rule'' para reflejar mejor δόγμα, y simplificó el mandato final a ''do thus''. La versión española sigue esa revisión: evita ''ordenanza'' y usa ''regla'', además de un imperativo breve y directo (''hagan así'').'
  spanish_consistency_notes:
  - Se usa 'evangelio' como término fijo, no una paráfrasis.
  - Se mantiene el tono instructivo y eclesial del original sin añadir contenido doctrinal no presente en la línea.
  - El registro es neutral y litúrgicamente usable, pero no arcaizante.
