id: DID.11.8
reference: Didache 11:8
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐ πᾶς δὲ ὁ λαλῶν ἐν πνεύματι προφήτης ἐστίν, ἀλλ' ἐὰν ἔχῃ τοὺς τρόπους Κυρίου. Ἀπὸ οὖν τῶν τρόπων γνωσθήσεται ὁ ψευδοπροφήτης καὶ ὁ προφήτης.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/011/008.yaml
  text: Yet not everyone speaking in the Spirit is a prophet[a], but only if he has the ways of the Lord. Therefore, from their ways the false prophet and the prophet will be known.
  footnotes:
  - marker: a
    text: Or 'the ways of the Lord. So then, from their ways'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:18Z'
    unchanged: false
    changes_summary: Replaced 'conduct' with 'ways' to more closely reflect τρόποι and preserve consistency within the verse; adjusted 'So then' to 'Therefore' for slightly more formal natural English.
translation:
  language: es
  text: Pero no todo el que habla en el Espíritu es profeta[a], sino solo si tiene los caminos del Señor. Por tanto, por sus caminos se conocerá al falso profeta y al profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los caminos del Señor. Por tanto, por sus caminos”.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν πνεύματι
  english_pob_choice: speaking in the Spirit
  chosen_spanish: habla en el Espíritu
  alternatives_spanish:
  - habla por el Espíritu
  - habla en espíritu
  lexicon: πνεῦμα
  rationale: Se conserva la referencia al Espíritu como ámbito o medio de habla, siguiendo la lectura inglesa “in the Spirit”. “Habla en el Espíritu” es natural en español eclesial y evita convertirlo en una mera manera interior de hablar.
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vaticinador
  lexicon: προφήτης
  rationale: El término normal y fiel en español es “profeta”. No hay base aquí para introducir una paráfrasis o especialización distinta.
- source_word: τοὺς τρόπους Κυρίου
  english_pob_choice: the ways of the Lord
  chosen_spanish: los caminos del Señor
  alternatives_spanish:
  - la conducta del Señor
  - el modo de obrar del Señor
  - las maneras del Señor
  lexicon: τρόπος
  rationale: El griego τρόποι aquí apunta a modos de vida, conducta o proceder. Se mantuvo “caminos” porque el inglés POB conserva “ways” y porque en español bíblico “los caminos del Señor” es una expresión inteligible que puede abarcar conducta sin perder la resonancia moral. Se evitó “SEÑOR” conforme al criterio POB para el nombre divino, pero se mantuvo la forma de título relacional en castellano.
- source_word: ἀπὸ οὖν τῶν τρόπων γνωσθήσεται
  english_pob_choice: Therefore, from their ways the false prophet and the prophet will be known
  chosen_spanish: Por tanto, por sus caminos se conocerá al falso profeta y al profeta
  alternatives_spanish:
  - Así pues, por sus caminos se distinguirá al falso profeta y al profeta
  - Por tanto, desde sus caminos será conocido el falso profeta y el profeta
  lexicon: γινώσκω / γνωσθήσεται
  rationale: Se traduce con pasiva impersonal natural en español, “se conocerá”, para reflejar γνωσθήσεται sin forzar la voz. “Por sus caminos” mantiene el sentido de criterio observable derivado del comportamiento.
theological_decisions:
- issue: Relación entre “hablar en el Espíritu” y el verdadero profeta
  english_pob_reading: Not everyone speaking in the Spirit is a prophet; possession of the Lord’s ways is the real test.
  chosen_spanish_reading: No todo el que habla en el Espíritu es profeta; el criterio decisivo es tener los caminos del Señor.
  alternative_spanish_readings:
  - No todos los que hablan en el Espíritu son profetas; el verdadero criterio son los caminos del Señor
  - No cualquiera que hable en el Espíritu es profeta, sino solo quien tiene los caminos del Señor
  rationale: La frase no identifica automáticamente inspiración carismática con profecía. La versión española mantiene esa tensión y deja claro que el discernimiento depende de una forma de vida conforme al Señor, no solo de la manifestación verbal.
  doctrine_reference: Discernimiento profético y autenticidad moral en la literatura didáctica cristiana primitiva.
- issue: Tensión lexical entre τρόποι y el lenguaje programático de “el Camino” en la Didaché
  english_pob_reading: The English revision restored “ways” to reflect τρόποι and preserve consistency within the verse.
  chosen_spanish_reading: Se conserva “caminos” para τρόποι, distinguiéndolo del uso programático de “camino” como identidad del libro.
  alternative_spanish_readings:
  - La conducta del Señor
  - el modo de vida del Señor
  rationale: En español, “caminos” conserva la conexión con el lenguaje bíblico sin borrar la distinción semántica respecto del motivo catequético de “el Camino”. Como aquí no aparece ὁδός sino τρόπος, la decisión busca reflejar un patrón de vida o proceder, no el título técnico del libro.
  doctrine_reference: Semántica del discipulado y discernimiento comunitario en la Didaché.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: la tradición auditada en inglés osciló entre “conduct” y “ways”; la revisión posterior volvió a “ways” por fidelidad a τρόπους. La versión española refleja esa decisión manteniendo “caminos” y uniendo la cláusula de discernimiento con una pasiva natural en castellano.'
  spanish_consistency_notes:
  - Se usa “Señor” como título reverencial, sin introducir un masking tipográfico distinto en esta breve unidad; el nombre divino no aparece explícitamente en español.
  - Se mantuvo la distinción entre carisma de habla y evidencia de carácter para no colapsar profecía con mera locución inspirada.
  - La puntuación busca reflejar la estructura adversativa y conclusiva del griego con claridad idiomática en español.
