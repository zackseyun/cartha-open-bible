source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τούτων δὲ τῶν λόγων ἡ διδαχὴ ἐστὶν αὕτη· Εὐλογεῖτε τοὺς καταρωμένους ὑμῖν καὶ προσεύχεσθε ὑπὲρ τῶν ἐχθρῶν ὑμῶν, νηστεύετε δὲ ὑπὲρ τῶν διωκόντων ὑμᾶς· ποία γὰρ χάρις, ἐὰν ἀγαπᾶτε τοὺς ἀγαπῶντας ὑμᾶς· οὐχὶ καὶ τὰ ἔθνη τὸ αὐτὸ ποιοῦσιν ; ὑμεῖς δὲ ἀγαπᾶτε τοὺς μισοῦντας ὑμᾶς καὶ οὐχ ἕξετε ἐχθρόν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/001/003.yaml
  text: 'And the teaching of these words is this: bless those who curse you, and pray for your enemies, and fast for those who persecute you. For what credit is it if you love those who love you? Do not even the Gentiles do the same? But you, love those who hate you, and you will not have an enemy.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:52Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y la enseñanza de estas palabras es esta: bendigan a los que los maldicen, oren por sus enemigos y ayunen por los que los persiguen; porque ¿qué mérito[a] hay si aman a los que los aman? ¿No hacen lo mismo también los gentiles? Pero ustedes, amen a los que los odian, y no tendrán enemigo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego χάρις; aquí tiene el sentido de «mérito», «crédito» o «recompensa», no el uso más común de «gracia» en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτων δὲ τῶν λόγων ἡ διδαχὴ ἐστὶν αὕτη
  english_pob_choice: And the teaching of these words is this
  chosen_spanish: Y la enseñanza de estas palabras es esta
  alternatives_spanish:
  - Y esta es la enseñanza de estas palabras
  - Y la instrucción de estas palabras es esta
  lexicon: διδαχή
  rationale: ‘Enseñanza’ conserva el sustantivo abstracto y suena natural en español; ‘instrucción’ es posible, pero menos directo aquí. Mantengo la estructura demostrativa del original y del inglés POB.
- source_word: Εὐλογεῖτε τοὺς καταρωμένους ὑμῖν
  english_pob_choice: bless those who curse you
  chosen_spanish: bendigan a los que los maldicen
  alternatives_spanish:
  - bendigan a los que los maldicen a ustedes
  - bendigan a quienes los maldicen
  lexicon: εὐλογεῖτε / καταρωμένους
  rationale: ‘Bendigan’ reproduce el imperativo plural. ‘Maldicen’ mantiene la fuerza de καταράομαι mejor que ‘hablan mal’. Se usa ‘los’ para un español más fluido y reverente, sin perder el sentido plural.
- source_word: προσεύχεσθε ὑπὲρ τῶν ἐχθρῶν ὑμῶν
  english_pob_choice: pray for your enemies
  chosen_spanish: oren por sus enemigos
  alternatives_spanish:
  - oren por sus enemigos
  - recen por sus enemigos
  lexicon: προσεύχεσθε / ἐχθροί
  rationale: ‘Oren’ es el equivalente moderno y eclesial más natural para προσεύχεσθε. ‘Sus enemigos’ conserva la relación directa del pronombre posesivo del texto.
- source_word: νηστεύετε δὲ ὑπὲρ τῶν διωκόντων ὑμᾶς
  english_pob_choice: and fast for those who persecute you
  chosen_spanish: y ayunen por los que los persiguen
  alternatives_spanish:
  - y ayunen por los que los persiguen
  - y ayunen a favor de los que los persiguen
  lexicon: νηστεύετε / διώκω
  rationale: ‘Ayunen’ es la forma directa del mandato; ‘por los que los persiguen’ conserva el valor relacional de ὑπέρ sin sobreinterpretar la preposición.
- source_word: ποία γὰρ χάρις
  english_pob_choice: For what credit is it
  chosen_spanish: porque ¿qué gracia hay
  alternatives_spanish:
  - porque ¿qué mérito hay
  - porque ¿qué crédito hay
  lexicon: χάρις
  rationale: Se conserva ‘gracia’ como lectura de χάρις, siguiendo el valor semántico de favor/agradecimiento/recompensa implícita. ‘Crédito’ y ‘mérito’ explicitan la idea, pero pierden el eco lexical del original; por eso se deja la tensión en una nota.
- source_word: ἀγαπᾶτε τοὺς ἀγαπῶντας ὑμᾶς
  english_pob_choice: you love those who love you
  chosen_spanish: si aman a los que los aman
  alternatives_spanish:
  - si aman a los que los aman
  - si ustedes aman a los que los aman
  lexicon: ἀγαπάω
  rationale: Se mantiene el verbo ‘amar’ para ἀγαπάω, coherente con el resto de la frase y con el POB inglés. La omisión del sujeto explícito en la primera cláusula refleja el griego y evita redundancia.
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los paganos
  lexicon: ἔθνη
  rationale: ‘Gentiles’ es el equivalente consolidado en contexto bíblico y preserva la referencia a no israelitas en el marco del texto. ‘Naciones’ sería más literal pero menos específico aquí.
- source_word: τοὺς μισοῦντας ὑμᾶς
  english_pob_choice: those who hate you
  chosen_spanish: a los que los odian
  alternatives_spanish:
  - a los que los odian
  - a quienes los odian
  lexicon: μισέω
  rationale: ‘Odiar’ es el equivalente natural de μισέω; el objeto preposicional ‘a los’ mejora la idiomaticidad del español.
- source_word: καὶ οὐχ ἕξετε ἐχθρόν
  english_pob_choice: and you will not have an enemy
  chosen_spanish: y no tendrán enemigo
  alternatives_spanish:
  - y no tendrán enemigo
  - y no tendrán un enemigo
  lexicon: ἔχω / ἐχθρός
  rationale: Se conserva la forma singular ‘enemigo’, como en el original y el inglés POB. En español puede entenderse genéricamente, sin añadir un artículo innecesario.
theological_decisions:
- issue: Valor de χάρις en la pregunta retórica
  english_pob_reading: what credit is it
  chosen_spanish_reading: ¿qué gracia hay?
  alternative_spanish_readings:
  - ¿qué mérito hay?
  - ¿qué crédito hay?
  rationale: La versión inglesa opta por ‘credit’ para expresar la idea evaluativa de la pregunta. En español, ‘gracia’ conserva mejor la palabra fuente χάρις y deja visible la tensión semántica entre favor, recompensa y reconocimiento; una nota puede señalar que la idea práctica es de ‘mérito/crédito’ sin sustituir el término del original.
  doctrine_reference: Ethics of recompense and reciprocity in early Christian moral teaching
- issue: Universalismo ético de la instrucción
  english_pob_reading: love those who hate you, and you will not have an enemy
  chosen_spanish_reading: amen a los que los odian, y no tendrán enemigo
  alternative_spanish_readings:
  - amen a los que los odian, y no tendrán un enemigo
  - amen a los que los odian, y no se les contará como enemigos
  rationale: Se preserva la fuerza absoluta de la afirmación, sin suavizarla. El singular ‘enemigo’ refleja el griego y mantiene la formulación proverbial; no se introduce una explicación que atenúe la exigencia ética del texto.
  doctrine_reference: Christian love of enemies and non-reciprocal moral practice
translation_notes:
  revision_awareness: El pasaje no tuvo cambios en la revisión más reciente de la base inglesa; el veredicto fue de alta concordancia y ‘sin cambios necesarios’. La presente versión española se ajusta directamente al griego normalizado y al POB inglés, sin depender de revisiones posteriores ni introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa ‘gentiles’ como término bíblico estable para τὰ ἔθνη en este contexto.
  - Se conserva el singular ‘enemigo’ para reflejar el griego y el énfasis proverbial.
  - Se prefiere ‘oren’ sobre ‘recen’ por registro eclesial amplio en español contemporáneo.
