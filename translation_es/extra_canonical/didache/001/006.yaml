    timestamp: '2026-04-23T20:30:57Z'
    unchanged: false
    changes_summary: Adjusted the opening word order to more closely reflect the Greek ('about this also it has been said') while preserving natural English. Kept 'alms,' 'sweat,' and 'in your hands' as accurate renderings.
translation:
  language: es
  text: 'Pero acerca de esto también se ha dicho: Que tu limosna[a] sude en tus manos, hasta que sepas a quién debes darla.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Limosna» traduce ἐλεημοσύνη y conserva la imagen de una dádiva para los necesitados; en español también puede entenderse como ayuda caritativa concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ καὶ περὶ τούτου δὴ εἴρηται
  english_pob_choice: But about this also it has been said
  chosen_spanish: Pero acerca de esto también se ha dicho
  alternatives_spanish:
  - Pero también acerca de esto se ha dicho
  - Y acerca de esto también se ha dicho
  lexicon: Ἀλλά; περί; εἴρηται
  rationale: Conservo el orden y el sentido del giro griego sin forzar un calco excesivo; 'acerca de esto' expresa bien περὶ τούτου, y 'también' refleja καί. 'Se ha dicho' mantiene la pasiva resultativa del perfecto.
- source_word: ἡ ἐλεημοσύνη
  english_pob_choice: your alms
  chosen_spanish: tu limosna
  alternatives_spanish:
  - tus limosnas
  - tu ayuda al pobre
  lexicon: ἐλεημοσύνη
  rationale: '''Limosna'' es el equivalente más directo y tradicional para ἐλεημοσύνη en este contexto de dar a los necesitados. Uso singular porque el griego lleva un sustantivo singular colectivo; el posesivo singular sigue la forma del texto y su fuerza distributiva.'
- source_word: Ἱδρωσάτω ... εἰς τὰς χεῖράς σου
  english_pob_choice: Let your alms sweat in your hands
  chosen_spanish: Que tu limosna sude en tus manos
  alternatives_spanish:
  - Haz que tu limosna sude en tus manos
  - Deja que tu limosna sude en tus manos
  lexicon: ἱδρόω; εἰς τὰς χεῖράς σου
  rationale: '''Sude'' conserva la imagen vívida del original y la decisión auditada en inglés. ''En tus manos'' reproduce εἰς τὰς χεῖράς σου de modo natural en español; ''tus manos'' mantiene la localización corporal exacta.'
- source_word: μέχρις ἂν γνῷς τίνι δῷς
  english_pob_choice: until you know to whom you should give
  chosen_spanish: hasta que sepas a quién se la des
  alternatives_spanish:
  - hasta que sepas a quién debes darla
  - hasta que sepas a quién darla
  lexicon: μέχρις ἂν; γνῷς; τίνι δῷς
  rationale: '''Hasta que sepas'' sigue el valor temporal de μέχρις ἂν. ''A quién'' expresa τίνι. Añadí ''se la des'' para que el objeto directo femenino remita naturalmente a ''limosna'' sin repetirlo; conserva la relación sintáctica implícita en español.'
theological_decisions:
- issue: Naturaleza proverbial y práctica del dicho
  english_pob_reading: It has been said
  chosen_spanish_reading: Se ha dicho
  alternative_spanish_readings:
  - está dicho
  - se ha proclamado
  rationale: Mantengo una fórmula sobria y proverbial, sin convertir el dicho en una cita más formal de autoridad bíblica. El texto funciona como instrucción ética transmitida; 'se ha dicho' preserva esa voz tradicional sin añadir solemnidad inexistente.
  doctrine_reference: Didaché 1:6; enseñanza ética parenética temprana
- issue: Imagen de la limosna que 'suda'
  english_pob_reading: Let your alms sweat in your hands
  chosen_spanish_reading: Que tu limosna sude en tus manos
  alternative_spanish_readings:
  - que tu limosna permanezca en tus manos
  - que tu limosna repose en tus manos
  rationale: Conservo la dureza de la imagen. No suavizo la metáfora hacia una idea abstracta de 'consideración' o 'prudencia', porque el griego y la traducción inglesa auditada retienen deliberadamente la imagen corporal e incómoda.
  doctrine_reference: Sabiduría práctica sobre la generosidad discernida; tradición didáctica de la Didaché
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail en cuanto al orden de apertura ('acerca de esto también se ha dicho') y he conservado la imagen verbal 'sude' y la localización 'en tus manos' como rasgos deliberados del texto base. No hay variantes textuales registradas en el paquete fuente.
  spanish_consistency_notes:
  - Usé 'Yahvé' según la pauta general solo cuando el texto lo requiera; aquí no aparece el tetragrámaton ni κύριος.
  - Mantuve el sustantivo singular colectivo 'limosna' para reflejar ἐλεημοσύνη sin pluralizar indebidamente.
  - El pronombre enclítico 'se la des' refiere a 'limosna' y evita repetir el sustantivo, manteniendo fluidez natural en español.
