  rationale: 'Se revisa la cláusula final para reflejar mejor el griego: ‘tampoco tú lo hagas a otro’ preserva el énfasis de καὶ σύ (‘tú también/tampoco tú’) y evita la formulación ‘se lo’, que introduce un objeto no expreso y puede sonar más estrecho o menos directo. También se corrige la ubicación de la nota al pie para que quede anclada en la frase donde realmente existe la alternativa significativa.'
