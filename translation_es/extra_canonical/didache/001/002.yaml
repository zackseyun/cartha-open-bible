review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura general y la ética del pasaje: ‘camino de la vida’, los dos mandamientos de amor, y la regla de oro negativa. Sin embargo, en la cláusula final, ‘no se lo hagas a otro tampoco’ introduce un objeto (‘lo’) no expreso en el griego y estrecha levemente el sentido más general de μὴ ποίει. Además, la nota al pie actual en ‘primero[a]’ no corresponde al lugar donde realmente existe la variante/alternativa significativa, que es la cláusula final con el matiz de καὶ σύ.'
  spanish_quality_summary: El español es claro, natural y digno. ‘Ahora bien’ y ‘camino de la vida’ funcionan bien; ‘amarás’, ‘prójimo’ y ‘como a ti mismo’ son adecuados y legibles. La única mejora importante es hacer la cláusula final más idiomática y más abierta semánticamente, evitando el pronombre objeto añadido. También conviene recolocar la nota al pie al segmento pertinente.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: ‘Dios’ para Θεός y ‘prójimo’ para πλησίον están bien. No aparecen términos sensibles como Yahvé/Mesías/Espíritu/esclavo. La decisión ‘hizo’ para ποιήσαντά se es defendible y fiel.'
  issues:
  - severity: medium
    issue: 'La cláusula final añade un objeto no explícito: ‘no se lo hagas a otro tampoco’.'
    rationale: El griego καὶ σὺ ἄλλῳ μὴ ποίει dice de forma general ‘no hagas [eso] a otro tampoco’; el ‘lo’ español puede sugerir una acción más concreta de la que el original especifica. ‘No lo hagas’ sería normal en español, pero aquí es mejor una formulación que mantenga el alcance abierto sin objeto explícito.
  - severity: medium
    issue: La nota al pie está anclada en ‘primero[a]’, pero la alternativa relevante pertenece a la cláusula final.
    rationale: El English POB conserva la nota de alternativa para la frase final (‘do not do to another’), no para ‘first’. En español, si se conserva una nota, debe anclarse donde realmente explica una opción de traducción significativa.
  revised_spanish_text: 'Ahora bien, este es el camino de la vida: primero, amarás a Dios que te hizo; segundo, a tu prójimo como a ti mismo. Y todo lo que no quieras que te ocurra, tampoco tú[a] lo hagas a otro.'
  revised_footnotes:
  - marker: a
    text: 'O: «no lo hagas a otro tampoco».'
    reason: Alternativa de orden y énfasis para la cláusula final; conserva el matiz de καὶ σύ sin añadir un objeto nuevo al texto principal.
  revision_rationale: 'Se revisa la cláusula final para reflejar mejor el griego: ‘tampoco tú lo hagas a otro’ preserva el énfasis de καὶ σύ (‘tú también/tampoco tú’) y evita la formulación ‘se lo’, que introduce un objeto no expreso y puede sonar más estrecho o menos directo. También se corrige la ubicación de la nota al pie para que quede anclada en la frase donde realmente existe la alternativa significativa.'
