base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/001/002.yaml
  text: 'Now this is the way of life: first[a], you shall love God who made you; second, your neighbor as yourself. And whatever you would not want to happen to you, do not do to another either.'
  footnotes:
  - marker: a
    text: Or 'do not do to another.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:50Z'
    unchanged: false
    changes_summary: 'Adjusted the final clause for more natural English and closer alignment with the Greek prohibition: changed ''you also do not do to another'' to ''do not do to another either.'''
translation:
  language: es
  text: 'Ahora bien, este es el camino de la vida: primero, amarás a Dios que te hizo; segundo, a tu prójimo como a ti mismo. Y todo lo que no quieras que te ocurra, tampoco tú[a] lo hagas a otro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo hagas a otro tampoco».'
    reason: Alternativa de orden y énfasis para la cláusula final; conserva el matiz de καὶ σύ sin añadir un objeto nuevo al texto principal.
lexical_decisions:
- source_word: Ἡ μὲν οὖν ὁδὸς τῆς ζωῆς
  english_pob_choice: Now this is the way of life
  chosen_spanish: Ahora bien, este es el camino de la vida
  alternatives_spanish:
  - Pues bien, este es el camino de la vida
  - Así pues, este es el camino de la vida
  lexicon: ὁδός
  rationale: ‘Camino’ conserva la imagen directiva del griego y su uso bíblico para una manera de vivir. ‘Ahora bien’ refleja el valor discursivo de μὲν οὖν sin sonar demasiado arcaico.
- source_word: ἀγαπήσεις
  english_pob_choice: you shall love
  chosen_spanish: amarás
  alternatives_spanish:
  - deberás amar
  - amarás de corazón
  lexicon: ἀγαπάω
  rationale: El futuro imperativo se vierte naturalmente con ‘amarás’ en español, manteniendo la fuerza exhortativa sin añadir paráfrasis.
- source_word: τὸν Θεὸν τὸν ποιήσαντά σε
  english_pob_choice: God who made you
  chosen_spanish: a Dios que te hizo
  alternatives_spanish:
  - a Dios, que te hizo
  - a Dios, quien te creó
  lexicon: ποιέω
  rationale: ‘Hizo’ reproduce el verbo griego con sobriedad; ‘creó’ sería posible, pero ‘hizo’ mantiene más de cerca la forma verbal y la amplitud semántica del original.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu semejante
  lexicon: πλησίον
  rationale: ‘Prójimo’ es la equivalencia bíblica más estable y comunica adecuadamente el alcance relacional del término en este contexto ético.
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como tú mismo
  - igual que a ti mismo
  lexicon: σεαυτόν
  rationale: La preposición ‘como’ y el complemento ‘a ti mismo’ preservan la comparación directa del griego con fluidez natural en español.
- source_word: πάντα δὲ ὅσα ἐὰν θελήσῃς μὴ γίνεσθαί σοι
  english_pob_choice: And whatever you would not want to happen to you
  chosen_spanish: Y todo lo que no quieras que te ocurra
  alternatives_spanish:
  - Y todo lo que no desees que te suceda
  - Y cuanto no quieras que te pase
  lexicon: θελήσῃς
  rationale: ‘Quieras’/‘no quieras’ expresa el volitivo del verbo θέλω con naturalidad. ‘Te ocurra’ evita restringir indebidamente el alcance a un solo tipo de evento.
- source_word: καὶ σὺ ἄλλῳ μὴ ποίει
  english_pob_choice: do not do to another either
  chosen_spanish: no se lo hagas a otro tampoco
  alternatives_spanish:
  - no hagas tú tampoco a otro
  - tú tampoco no se lo hagas a otro
  lexicon: ποιέω
  rationale: La forma española incluye el énfasis de καὶ σύ mediante ‘tampoco’, que deja ver la prohibición recíproca sin sonar forzada. ‘Se lo’ refleja el objeto implícito del hacer, aunque el griego sea más general.
theological_decisions:
- issue: Forma del mandamiento principal de amor
  english_pob_reading: you shall love God who made you
  chosen_spanish_reading: amarás a Dios que te hizo
  alternative_spanish_readings:
  - deberás amar a Dios que te hizo
  - amarás a Dios, que te hizo
  rationale: Se conserva el mandato como exhortación directa, sin convertirlo en consejo. No se introduce terminología doctrinal adicional; el texto mantiene el foco ético del pasaje.
  doctrine_reference: Ética del amor al Dios creador y al prójimo; eco del gran mandamiento.
- issue: Final negativo de la regla de oro
  english_pob_reading: do not do to another either
  chosen_spanish_reading: no se lo hagas a otro tampoco
  alternative_spanish_readings:
  - no hagas a otro tampoco
  - no se lo hagas tampoco a otro
  rationale: La revisión inglesa subrayó el matiz enfático de ‘you also’. En español, ‘tampoco’ preserva esa reciprocidad negativa y evita perder la responsabilidad personal destacada por el griego.
  doctrine_reference: Regla de oro negativa; ética interhumana recíproca.
translation_notes:
  revision_awareness: 'La revisión más reciente en inglés ajustó la cláusula final para alinearla mejor con el griego y evitar una formulación más pesada. La versión española sigue esa línea: conserva el énfasis recíproco de καὶ σύ con «tampoco» y mantiene una negación natural en español. También se tuvo en cuenta que el griego dice literalmente «te hizo», no una paráfrasis más teológica, por lo que se evitó reemplazarlo por «te creó» sin necesidad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este pasaje nombra a Dios, no al tetragrámaton.
  - Se usó «prójimo» como término bíblico estable, no una modernización sociológica.
  - La estructura de dos mandatos y la cláusula general final quedaron en paralelo con el griego.
  - La nota al pie refleja la alternativa de lectura marcada por la revisión inglesa, sin duplicar el texto principal.
