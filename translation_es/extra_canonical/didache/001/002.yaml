  text: Ἡ μὲν οὖν ὁδὸς τῆς ζωῆς ἐστιν αὕτη· πρῶτον, ἀγαπήσεις τὸν Θεὸν τὸν ποιήσαντά σε· δεύτερον, τὸν πλησίον σου ὡς σεαυτόν· πάντα δὲ ὅσα ἐὰν θελήσῃς μὴ γίνεσθαί σοι, καὶ σὺ ἄλλῳ μὴ ποίει.
