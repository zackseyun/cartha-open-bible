  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro inglés en la macroestructura y en la mayoría de las decisiones léxicas: «dos caminos», «vida / muerte», «amarás», «prójimo», «gentiles», «perfecto», «manto / túnica», «cuadrante» y la metáfora de las limosnas que «sudan». También preserva bien la tensión de «no tendrán enemigo» y la cláusula difícil «porque no puedes». Sin embargo, hay algunos puntos donde el español se aparta del registro o de la fuerza del original: «bendigan / oren / ayunen» cambia impropiamente de segunda persona singular a plural dentro de una secuencia que en griego está en plural pero el contexto venía en singular catequético; conviene unificar en plural para toda la unidad o en singular para toda la unidad. Además, «preséntale también la otra» es más interpretativo que el griego «vuélvele también la otra».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene mezcla inconsistente de tratamiento («amarás / te hizo / te suceda / te da» junto a «bendigan / los / sus / den / sepan»), lo cual afecta la legibilidad y el tono catequético. Hay además algunas formulaciones poco naturales o menos fieles: «habiendo llegado bajo confinamiento» suena forzado; «cuando haya quedado bajo confinamiento» o «al quedar bajo confinamiento» lee mejor. «Dones generosos» es entendible, pero el giro completo puede sonar más natural como «de sus propios dones de gracia» con nota, o mantener «dones generosos» si se pule la sintaxis. El resto del pasaje está bien logrado.'
  glossary_alignment: 'No hay conflicto con terminología de proyecto como Yahvé/Mesías, que no aparecen aquí. Las decisiones clave están bien alineadas con el glosario: «Dios», «prójimo», «gentiles», «carnales», «limosna(s)». La principal cuestión es estilística y de consistencia pronominal, no terminológica.'
  issues:
  - severity: medium
    issue: Inconsistencia de tratamiento entre singular y plural
    rationale: El texto alterna entre «amarás / te hizo / te suceda / te da / serás» y «bendigan / los / sus / den / sepan». Esto rompe la cohesión discursiva. En un texto catequético conviene uniformar. Dado que gran parte del borrador ya usa plural exhortativo en la segunda mitad, la revisión propuesta unifica todo en plural para lectura eclesial fluida.
  - severity: medium
    issue: «Preséntale también la otra» es más libre que el griego
    rationale: στρέψον ... καὶ τὴν ἄλλην significa literalmente «vuélvele también la otra». «Presentar la otra» comunica la idea, pero añade un matiz más interpretativo. «Vuélvele también la otra» o «vuélvele también la otra mejilla» preserva mejor el wording fuente.
  - severity: low
    issue: «Habiendo llegado bajo confinamiento» suena antinatural
    rationale: Aunque intenta reflejar ἐν συνοχῇ γενόμενος, la frase española es torpe. «Al quedar bajo confinamiento» mantiene el valor aspectual sin sonar calcado.
  - severity: low
    issue: Número de «limosna(s)»
    rationale: El griego ἡ ἐλεημοσύνη σου es singular. El borrador usa «sus limosnas». No es grave, pero «su limosna» se ajusta mejor al original y suena más proverbial en español.
  revised_spanish_text: 'Hay dos caminos, uno de vida y uno de muerte, y hay una gran diferencia entre los dos caminos. Ahora bien, este es el camino de la vida: primero, amarán a Dios que los hizo; segundo, a su prójimo como a ustedes mismos. Y todo lo que no quieran que les suceda, no lo hagan a otro.


    Y la enseñanza de estas palabras es esta: bendigan a los que los maldicen, oren por sus enemigos y ayunen por los que los persiguen. Pues, ¿qué crédito[a] hay si aman a los que los aman? ¿Acaso los gentiles no hacen lo mismo? Pero ustedes, amen a los que los odian, y no tendrán enemigo.


    Apártense de los deseos carnales y mundanos. Si alguien les da una bofetada en la mejilla derecha, vuélvanle también la otra, y serán perfectos. Si alguien los obliga a ir una milla, vayan con él dos. Si alguien les quita su manto, denle también la túnica. Si alguien toma de ustedes lo que es suyo, no lo reclamen, porque no pueden. Den a todo el que les pida, y no lo reclamen; porque el Padre quiere que a todos se les dé de sus propios dones generosos[b]. Bienaventurado el que da conforme al mandamiento, porque es inocente; pero ¡ay del que recibe! Pues si alguien recibe porque tiene necesidad, será inocente; pero el que no tiene necesidad pagará la pena: por qué recibió y con qué propósito. Y, al quedar bajo confinamiento, será examinado acerca de las cosas que hizo, y no saldrá de allí hasta que pague el último cuadrante.


    Pero sobre esto también se ha dicho: Hagan sudar su limosna en sus manos hasta que sepan a quién deben darla.'
  revised_footnotes:
  - marker: a
    text: 'Aquí «crédito» traduce χάρις en sentido retórico: no se refiere a la gracia salvadora, sino al mérito o reconocimiento que habría en amar solo a quienes aman a uno.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «de sus propios dones graciosos»; en español se mantiene la relación con χάρις mediante «dones generosos».
    reason: source_note
  revision_rationale: Se propone una revisión menor pero necesaria para unificar el tratamiento de segunda persona en todo el pasaje, mejorar la naturalidad del español y ajustar algunas frases más de cerca al griego sin cambiar la línea de traducción ya establecida. La revisión conserva todas las decisiones teológicas y léxicas principales del borrador.
