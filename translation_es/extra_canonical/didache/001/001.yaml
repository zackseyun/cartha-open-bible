source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ὁδοὶ δύο εἰσί, μία τῆς ζωῆς καὶ μία τοῦ θανάτου, διαφορὰ δὲ πολλὴ μεταξὺ τῶν δύο ὁδῶν. Ἡ μὲν οὖν ὁδὸς τῆς ζωῆς ἐστιν αὕτη· πρῶτον, ἀγαπήσεις τὸν Θεὸν τὸν ποιήσαντά σε· δεύτερον, τὸν πλησίον σου ὡς σεαυτόν· πάντα δὲ ὅσα ἐὰν θελήσῃς μὴ γίνεσθαί σοι, καὶ σὺ ἄλλῳ μὴ ποίει. Τούτων δὲ τῶν λόγων ἡ διδαχὴ ἐστὶν αὕτη· Εὐλογεῖτε τοὺς καταρωμένους ὑμῖν καὶ προσεύχεσθε ὑπὲρ τῶν ἐχθρῶν ὑμῶν, νηστεύετε δὲ ὑπὲρ τῶν διωκόντων ὑμᾶς· ποία γὰρ χάρις, ἐὰν ἀγαπᾶτε τοὺς ἀγαπῶντας ὑμᾶς· οὐχὶ καὶ τὰ ἔθνη τὸ αὐτὸ ποιοῦσιν ; ὑμεῖς δὲ ἀγαπᾶτε τοὺς μισοῦντας ὑμᾶς καὶ οὐχ ἕξετε ἐχθρόν. Ἀπέχου τῶν σαρκικῶν καὶ κοσμικῶν ἐπιθυμιῶν. Ἐάν τις σοὶ δῷ ῥάπισμα εἰς τὴν δεξιὰν σιαγόνα, στρέψον αὐτῷ καὶ τὴν ἄλλην, καὶ ἔσῃ τέλειος· ἐὰν ἀγγαρεύσῃ σε τις μίλιον ἕν, ὕπαγε μετʼ αὐτοῦ δύο· ἐὰν ἄρῃ τις τὸ ἱμάτιόν σου, δὸς αὐτῷ καὶ τὸν χιτῶνα· ἐὰν λάβῃ τις ἀπὸ σοῦ τὸ σόν, μὴ ἀπαίτει· οὐδὲ γὰρ δύνασαι. Παντὶ τῷ αἰτοῦντί σε δίδου καὶ μὴ ἀπαίτει· πᾶσι γὰρ θέλει δίδοσθαι ὁ πατὴρ ἐκ τῶν ἰδίων χαρισμάτων. Μακάριος ὁ διδοὺς κατὰ τὴν ἐντολήν·
    ἀθῷος γάρ ἐστιν· οὐαὶ τῷ λαμβάνοντι· εἰ μὲν γὰρ χρείαν ἔχων λαμβάνει τις, ἀθῷος ἔσται· ὁ δὲ μὴ χρείαν ἔχων δώσει δίκην, ἱνατί ἔλαβε καὶ εἰς τί, ἐν συνοχῇ δὲ γενόμενος ἐξετασθήσεται περὶ ὧν ἔπραξε, καὶ οὐκ ἐξελεύσεται ἐκεῖθεν μέχρις οὗ ἀποδῷ τὸν ἔσχατον κοδράντην. Ἀλλὰ καὶ περὶ τούτου δὴ εἴρηται· Ἱδρωσάτω ἡ ἐλεημοσύνη σου εἰς τὰς χεῖράς σου, μέχρις ἂν γνῷς τίνι δῷς.
