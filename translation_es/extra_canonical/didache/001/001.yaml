translation:
  language: es
  text: 'Hay dos caminos, uno de vida y uno de muerte, y hay una gran diferencia entre los dos caminos. Ahora bien, este es el camino de la vida: primero, amarán a Dios que los hizo; segundo, a su prójimo como a ustedes mismos. Y todo lo que no quieran que les suceda, no lo hagan a otro.


    Y la enseñanza de estas palabras es esta: bendigan a los que los maldicen, oren por sus enemigos y ayunen por los que los persiguen. Pues, ¿qué crédito[a] hay si aman a los que los aman? ¿Acaso los gentiles no hacen lo mismo? Pero ustedes, amen a los que los odian, y no tendrán enemigo.


    Apártense de los deseos carnales y mundanos. Si alguien les da una bofetada en la mejilla derecha, vuélvanle también la otra, y serán perfectos. Si alguien los obliga a ir una milla, vayan con él dos. Si alguien les quita su manto, denle también la túnica. Si alguien toma de ustedes lo que es suyo, no lo reclamen, porque no pueden. Den a todo el que les pida, y no lo reclamen; porque el Padre quiere que a todos se les dé de sus propios dones generosos[b]. Bienaventurado el que da conforme al mandamiento, porque es inocente; pero ¡ay del que recibe! Pues si alguien recibe porque tiene necesidad, será inocente; pero el que no tiene necesidad pagará la pena: por qué recibió y con qué propósito. Y, al quedar bajo confinamiento, será examinado acerca de las cosas que hizo, y no saldrá de allí hasta que pague el último cuadrante.


    Pero sobre esto también se ha dicho: Hagan sudar su limosna en sus manos hasta que sepan a quién deben darla.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Aquí «crédito» traduce χάρις en sentido retórico: no se refiere a la gracia salvadora, sino al mérito o reconocimiento que habría en amar solo a quienes aman a uno.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «de sus propios dones graciosos»; en español se mantiene la relación con χάρις mediante «dones generosos».
    reason: source_note
lexical_decisions:
- source_word: ὁδοὶ δύο
  english_pob_choice: There are two ways
  chosen_spanish: Hay dos caminos
  alternatives_spanish:
  - Hay dos vías
  - Hay dos sendas
  lexicon: LSJ
  rationale: «Caminos» comunica de forma natural el valor metafórico moral de ὁδοί y evita un calco demasiado técnico; conserva la imagen ética de orientación de vida.
- source_word: ζωῆς / θανάτου
  english_pob_choice: life / death
  chosen_spanish: vida / muerte
  alternatives_spanish:
  - vivir / morir
  lexicon: BDAG
  rationale: Los genitivos establecen dos ámbitos o destinos morales; «vida / muerte» mantiene el contraste sobrio y bíblico sin explicarlo en exceso.
- source_word: ἀγαπήσεις
  english_pob_choice: you shall love
  chosen_spanish: amarás
  alternatives_spanish:
  - amarás tú
  - deberás amar
  lexicon: BDAG
  rationale: El futuro con valor imperativo se conserva con «amarás», que reproduce bien el registro mandatorio y catequético del griego.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - el cercano
  lexicon: BDAG
  rationale: «Prójimo» es el equivalente ético y escritural más estable en español para el mandamiento del amor al prójimo.
- source_word: ἄλλῳ
  english_pob_choice: another
  chosen_spanish: a otro
  alternatives_spanish:
  - a alguien más
  - a otra persona
  lexicon: BDAG
  rationale: «A otro» mantiene la amplitud del griego, que no repite «prójimo» sino que generaliza el destinatario de la prohibición.
- source_word: χάρις
  english_pob_choice: credit
  chosen_spanish: crédito
  alternatives_spanish:
  - gracia
  - mérito
  - beneficio
  lexicon: BDAG
  rationale: En la pregunta retórica, χάρις no significa gracia salvífica sino reconocimiento o crédito; «crédito» preserva esa fuerza evaluativa sin teologizar indebidamente.
- source_word: ἔθνη
  english_pob_choice: Gentiles
  chosen_spanish: gentiles
  alternatives_spanish:
  - naciones
  - paganos
  lexicon: BDAG
  rationale: «Gentiles» conserva el contraste judío-cristiano del texto y evita la carga interpretativa de «paganos».
- source_word: Ἀπέχου
  english_pob_choice: Abstain from
  chosen_spanish: Apártense de
  alternatives_spanish:
  - Absténganse de
  - Aléjense de
  lexicon: BDAG
  rationale: El imperativo pide separación moral; «Apártense de» es claro en español y mantiene la idea de distanciamiento ético.
- source_word: σαρκικῶν καὶ κοσμικῶν ἐπιθυμιῶν
  english_pob_choice: fleshly and worldly desires
  chosen_spanish: deseos carnales y mundanos
  alternatives_spanish:
  - deseos de la carne y del mundo
  - deseos corporales y mundanos
  lexicon: BDAG
  rationale: «Carnales y mundanos» mantiene el paralelismo moral del griego y evita diluir σάρξ en una paráfrasis de «naturaleza humana» que no está aquí exigida.
- source_word: ῥάπισμα
  english_pob_choice: a blow
  chosen_spanish: una bofetada
  alternatives_spanish:
  - un golpe
  - una cachetada
  lexicon: BDAG
  rationale: Aunque el inglés opta por «a blow», en español «bofetada» expresa con precisión el golpe en la mejilla y conserva la concreción del acto sin volverse coloquial.
- source_word: τέλειος
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - maduro
  lexicon: BDAG
  rationale: «Perfecto» conserva el ideal moral elevado del pasaje y coincide con el registro catequético de la tradición textual.
- source_word: ἀγγαρεύσῃ
  english_pob_choice: compels you to go one mile
  chosen_spanish: te obliga a ir una milla
  alternatives_spanish:
  - te fuerza a ir una milla
  - te impone ir una milla
  lexicon: BDAG
  rationale: El verbo refleja servicio forzoso; «te obliga a ir una milla» sigue de cerca la revisión inglesa y suena natural en español.
- source_word: ἱμάτιον / χιτών
  english_pob_choice: cloak / tunic
  chosen_spanish: manto / túnica
  alternatives_spanish:
  - capa / túnica
  - manto / camisa interior
  lexicon: BDAG
  rationale: «Manto» y «túnica» conservan la distinción entre prenda exterior e interior con vocabulario bíblico claro en español.
- source_word: ἀπαίτει
  english_pob_choice: demand it back
  chosen_spanish: lo reclames
  alternatives_spanish:
  - lo pidas de vuelta
  - lo exijas de regreso
  lexicon: BDAG
  rationale: En el contexto, la idea no es solo pedir sino reclamar restitución; «reclames» preserva la fuerza de no insistir en el retorno.
- source_word: χαρισμάτων
  english_pob_choice: gracious gifts
  chosen_spanish: dones generosos
  alternatives_spanish:
  - dones graciosos
  - regalos generosos
  lexicon: BDAG
  rationale: La forma cognada con χάρις pide conservar la nota de generosidad procedente del Padre; «dones generosos» comunica bien la relación con la gracia sin sonar forzado.
- source_word: ἀθῷος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin culpa
  - irreprensible
  lexicon: BDAG
  rationale: «Inocente» expresa la exención de responsabilidad o culpa en el sentido jurídico-moral del pasaje.
- source_word: δώσει δίκην
  english_pob_choice: will pay the penalty
  chosen_spanish: pagará la pena
  alternatives_spanish:
  - sufrirá el castigo
  - dará cuenta
  lexicon: LSJ
  rationale: La locución tiene sentido penal; «pagará la pena» conserva el tono judicial sin añadir más precisión que la del texto.
- source_word: ἐν συνοχῇ
  english_pob_choice: under confinement
  chosen_spanish: bajo confinamiento
  alternatives_spanish:
  - en custodia
  - bajo arresto
  lexicon: LSJ
  rationale: «Bajo confinamiento» mantiene la idea de restricción punitiva sin decidir si el marco es judicial, carcelario o disciplinario.
- source_word: κοδράντην
  english_pob_choice: quadrans
  chosen_spanish: cuadrante
  alternatives_spanish:
  - quadrans
  - moneda pequeña
  lexicon: BDAG
  rationale: «Cuadrante» es el término español tradicional para la moneda romana y comunica la mínima cuantía del pago final.
- source_word: ἐλεημοσύνη
  english_pob_choice: alms
  chosen_spanish: limosnas
  alternatives_spanish:
  - limosna
  - caridad
  lexicon: BDAG
  rationale: «Limosnas» conserva el tono de donación al necesitado propio del término técnico, y encaja con el registro exhortativo del pasaje.
- source_word: Ἱδρωσάτω
  english_pob_choice: Let ... sweat
  chosen_spanish: Hagan sudar
  alternatives_spanish:
  - Dejen sudar
  - Permitan que suden
  lexicon: LSJ
  rationale: La metáfora vívida se preserva literalmente para no borrar su fuerza retórica; en español también funciona como imagen de retención prudente.
theological_decisions:
- issue: Resultado de amar a los enemigos
  english_pob_reading: But you, love those who hate you, and you will not have an enemy.
  chosen_spanish_reading: Pero ustedes, amen a los que los odian, y no tendrán enemigo.
  alternative_spanish_readings:
  - y no tendrán un enemigo
  - y no les quedará ningún enemigo
  rationale: Se conserva la ambigüedad del griego sobre si el cambio recae en la relación o en la condición del discípulo; la frase española mantiene el resultado moral sin resolverlo de más.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Cláusula sobre el Padre y sus dones
  english_pob_reading: for the Father wills that gifts be given to all from his own gracious gifts.
  chosen_spanish_reading: porque el Padre quiere que a todos se les dé de sus propios dones generosos.
  alternative_spanish_readings:
  - porque el Padre quiere dar a todos de sus propios dones generosos
  - porque el Padre quiere que todos reciban de sus propios dones
  rationale: La revisión inglesa aclara la voluntad del Padre respecto de la distribución de sus dones; la española sigue esa lectura sin introducir un objeto implícito ajeno al griego.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Sentido de «no puedes» tras «no lo reclames»
  english_pob_reading: for you are not able.
  chosen_spanish_reading: porque no puedes.
  alternative_spanish_readings:
  - porque no eres capaz
  - porque no te es posible
  rationale: Se traduce la clausula presente en el griego sin armonizarla con la expectativa del lector; el texto deja abierta si la incapacidad es práctica o moral.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Naturaleza del juicio del receptor y del confinamiento
  english_pob_reading: he will be examined... and he will not come out from there until he repays the last quadrans.
  chosen_spanish_reading: será examinado... y no saldrá de allí hasta que pague el último cuadrante.
  alternative_spanish_readings:
  - será juzgado...
  - no saldrá de allí hasta pagar la última moneda
  rationale: Se mantiene el lenguaje judicial sin decidir si se trata de juicio escatológico o disciplina concreta; la severidad del pasaje queda intacta.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Metáfora de las limosnas que sudan
  english_pob_reading: Let your alms sweat in your hands until you know to whom you should give.
  chosen_spanish_reading: Hagan sudar sus limosnas en sus manos hasta que sepan a quién deben darlas.
  alternative_spanish_readings:
  - Dejen sus limosnas sudar en sus manos
  - Retengan sus limosnas en sus manos
  rationale: Se conserva la imagen literal para no convertir una figura expresiva en una paráfrasis menos vívida; el lector puede captar la idea de dar con discernimiento.
  doctrine_reference: Do not paraphrase beyond what the Greek warrants.
translation_notes:
  revision_awareness: La versión española sigue la revisión final del audio-trail inglés donde se ajustó ἀγγαρεύσῃ como «te obliga a ir una milla» y la cláusula del Padre como distribución de sus propios dones; además, se evita suavizar la imaginería final de «Let your alms sweat in your hands», manteniéndola literal y publicable en español.
  spanish_consistency_notes:
  - Se conserva el tratamiento catequético en segunda persona plural para la exhortación general («ustedes») y singular para los imperativos directos del ejemplo moral («te»).
  - Se usa «camino»/«caminos» de modo consistente para ὁδοί, porque el contexto es ético y no meramente geográfico.
  - Se mantiene «gentiles» en minúscula por norma tipográfica española y por ser un sustantivo común en este contexto.
  - 'Se distinguen con cuidado las prendas: «manto» para ἱμάτιον y «túnica» para χιτών.'
  - «Cuadrante» se usa como equivalente histórico claro para κοδράντην, preservando la moneda romana sin perder inteligibilidad.
