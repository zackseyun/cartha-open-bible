base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/001/001.yaml
  text: 'There are two ways, one of life and one of death, and there is a great difference between the two ways. Now this is the way of life: first, you shall love God who made you; second, your neighbor as yourself. And whatever you would not want to happen to you, do not do to another.


    And the teaching of these words is this: bless those who curse you, and pray for your enemies, and fast for those who persecute you. For what credit is it if you love those who love you? Do not even the Gentiles do the same? But you, love those who hate you, and you will not have an enemy.


    Abstain from fleshly and worldly desires. If anyone gives you a blow on the right cheek, turn to him the other also, and you will be perfect. If anyone compels you to go one mile, go with him two. If anyone takes away your cloak, give him your tunic also. If anyone takes from you what is yours, do not demand it back, for you are not able. Give to everyone who asks you, and do not demand it back; for the Father wills that gifts be given to all from his own gracious gifts. Blessed is the one who gives according to the commandment, for he is innocent. But woe to the one who receives. For if someone receives because he has need, he will be innocent; but the one who has no need will pay the penalty: why he received, and for what purpose. And having come under confinement, he will be examined concerning the things he did, and he will not come out from there until he repays the last quadrans.


    But about this, it has also been said: Let your alms sweat in your hands until you know to whom you should give.'
