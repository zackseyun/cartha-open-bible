review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: dar a quien pide, no reclamar de vuelta, la voluntad del Padre de que sus dones se den a todos, la bienaventuranza del que da, la inocencia del necesitado que recibe, y la pena/juicio para quien recibe sin necesidad. Sin embargo, hay varios puntos de forma y fidelidad fina que conviene corregir: el cambio de singular a plural de segunda persona sin motivo textual, la puntuación en «¡ay del que recibe!» que rompe el flujo causal del original, y una formulación algo menos natural en «sean dados».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero puede sonar más natural y fiel con ajustes menores: «Da»/«te» en singular, «no lo reclames» o equivalente, «se den» en lugar de «sean dados», y mejor encadenamiento sintáctico del tramo judicial final. También conviene eliminar la nota al pie sobre el singular/plural, porque la variación fue introducida por el borrador español y no responde a una ambigüedad que deba preservarse en nota.'
  glossary_alignment: 'No hay conflictos mayores con la terminología del proyecto. «Padre», «dones», «Bienaventurado», «inocente», «cuadrante» son adecuados. «Pena» es aceptable para δίκη. La principal desviación no es glosarial sino pronominal: el griego tiene singular («te»), y el español debería conservarlo salvo razón contextual fuerte, que aquí no está documentada.'
  issues:
  - severity: medium
    issue: Cambio de segunda persona singular a plural en el texto principal
    rationale: El griego tiene σε y el POB inglés «asks you» en singular. «Den... les pida... les» introduce un cambio no motivado por la fuente. En español bíblico legible, «Da... te pida... no lo reclames» conserva mejor la referencia textual.
  - severity: medium
    issue: Nota al pie [a] innecesaria y mal orientada
    rationale: La nota justifica una alternativa creada por el propio borrador («les») frente al singular del griego. No preserva una ambigüedad real del original ni una variante del POB que deba mantenerse.
  - severity: low
    issue: «Sean dados» suena más pesado que «se den»
    rationale: Ambas opciones reflejan bien el pasivo/infinito griego, pero «se den» es más natural en español sin pérdida de sentido.
  - severity: low
    issue: La exclamación cerrada en «¡ay del que recibe!» corta el vínculo con la cláusula explicativa siguiente
    rationale: El original continúa con γάρ. En español fluye mejor «Pero ¡ay del que recibe! Porque...» o, mejor aún, «Pero ¡ay del que recibe!, porque...».
  revised_spanish_text: Da a todo el que te pida, y no lo reclames; porque el Padre quiere que sus propios dones se den a todos. Bienaventurado el que da conforme al mandamiento, porque es inocente. Pero ¡ay del que recibe!, porque si alguien recibe teniendo necesidad, será inocente; pero el que no tiene necesidad pagará la pena por qué recibió y para qué. Y, cuando haya sido puesto en confinamiento, será examinado acerca de las cosas que hizo[a], y no saldrá de allí hasta que pague el último cuadrante.
  revised_footnotes:
