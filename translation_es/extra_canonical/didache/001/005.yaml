id: DID.1.5
reference: Didache 1:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Παντὶ τῷ αἰτοῦντί σε δίδου καὶ μὴ ἀπαίτει· πᾶσι γὰρ θέλει δίδοσθαι ὁ πατὴρ ἐκ τῶν ἰδίων χαρισμάτων. Μακάριος ὁ διδοὺς κατὰ τὴν ἐντολήν· ἀθῷος γάρ ἐστιν· οὐαὶ τῷ λαμβάνοντι· εἰ μὲν γὰρ χρείαν ἔχων λαμβάνει τις, ἀθῷος ἔσται· ὁ δὲ μὴ χρείαν ἔχων δώσει δίκην, ἱνατί ἔλαβε καὶ εἰς τί, ἐν συνοχῇ δὲ γενόμενος ἐξετασθήσεται περὶ ὧν ἔπραξε, καὶ οὐκ ἐξελεύσεται ἐκεῖθεν μέχρις οὗ ἀποδῷ τὸν ἔσχατον κοδράντην.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/001/005.yaml
  text: Give to everyone who asks you[a], and do not demand it back; for the Father wants his own gifts to be given to all. Blessed is the one who gives according to the commandment, for he is innocent. But woe to the one who receives; for if someone receives while having need, he will be innocent, but the one not having need will pay the penalty for why he received and for what purpose. And having come under confinement, he will be examined concerning the things he did[b], and he will not come out from there until he repays the last quadrans.
  footnotes:
  - marker: a
    text: Or "for the Father's will is that giving be done to all from his own gracious gifts.".
    reason: previous_rendering
  - marker: b
    text: 'Or ''will pay the penalty: why he received, and for what purpose.''.'
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:57Z'
    unchanged: false
    changes_summary: Adjusted 'wishes' to 'wants' for more natural formal English, and revised 'because he has need' to 'while having need' / 'has no need' to 'not having need' to reflect the Greek participial phrasing more closely. Also replaced the period after 'receives' with a semicolon to better reflect the clause flow.
translation:
  language: es
  text: Da a todo el que te pida, y no lo reclames; porque el Padre quiere que sus propios dones se den a todos. Bienaventurado el que da conforme al mandamiento, porque es inocente. Pero ¡ay del que recibe!, porque si alguien recibe teniendo necesidad, será inocente; pero el que no tiene necesidad pagará la pena por qué recibió y para qué. Y, cuando haya sido puesto en confinamiento, será examinado acerca de las cosas que hizo[a], y no saldrá de allí hasta que pague el último cuadrante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será examinado por las cosas que hizo». El griego también permite entender la frase como parte de la razón de la pena.'
    reason: alternative_reading
lexical_decisions:
- source_word: Παντὶ τῷ αἰτοῦντί σε
  english_pob_choice: everyone who asks you
  chosen_spanish: todo el que les pida
  alternatives_spanish:
  - todo el que les pide
  - a cualquiera que te pida
  lexicon: αἰτέω
  rationale: El griego presenta un participio presente con sentido general; en español, «pedir» expresa la solicitud natural. Se usa «les pida» para un registro neutro y fluido, manteniendo la referencia plural del contexto español de cortesía/comunidad, aunque el singular del griego también permite «te pida».
- source_word: δίδου καὶ μὴ ἀπαίτει
  english_pob_choice: Give ... and do not demand it back
  chosen_spanish: Den ... y no se lo reclamen
  alternatives_spanish:
  - Den ... y no lo pidan de vuelta
  - Den ... y no exijan su devolución
  lexicon: δίδωμι; ἀπαιτέω
  rationale: «Reclamar» o «pedir de vuelta» expresa bien la prohibición de exigir devolución. Se evita una forma demasiado técnica y se conserva el matiz de no insistir en la restitución.
- source_word: ὁ πατὴρ ... ἐκ τῶν ἰδίων χαρισμάτων
  english_pob_choice: the Father wants his own gifts to be given to all
  chosen_spanish: el Padre quiere que sus propios dones sean dados a todos
  alternatives_spanish:
  - el Padre desea que sus propios dones se den a todos
  - el Padre quiere que se repartan a todos sus propios dones
  lexicon: πατήρ; χαρίσματα
  rationale: «Dones» conserva el valor de χαρίσματα sin forzar un sentido técnico eclesial. Se mantiene «sus propios dones» para reflejar ἐκ τῶν ἰδίων, preservando la idea de procedencia desde lo que le pertenece al Padre.
- source_word: Μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Bendito
  lexicon: μακάριος
  rationale: «Bienaventurado» es una equivalencia tradicional y digna para una bienaventuranza declarativa, más cercana al tono sapiencial del texto que «dichoso».
- source_word: ἀθῷος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - sin culpa
  - absuelto
  lexicon: ἀθῷος
  rationale: «Inocente» mantiene la fuerza jurídica/moral del término. «Sin culpa» sería más explicativo, pero menos directo; «absuelto» introducirá una lectura demasiado forense.
- source_word: οὐαὶ
  english_pob_choice: woe
  chosen_spanish: ¡ay de!
  alternatives_spanish:
  - ¡pobre de!
  - ¡ay del!
  lexicon: οὐαί
  rationale: La exclamación profética en español se expresa naturalmente con «¡ay de!». Se adapta a la concordancia con el sustantivo masculino singular.
- source_word: χρείαν ἔχων / μὴ χρείαν ἔχων
  english_pob_choice: while having need / not having need
  chosen_spanish: teniendo necesidad / no tiene necesidad
  alternatives_spanish:
  - si tiene necesidad / si no tiene necesidad
  - estando necesitado / no estando necesitado
  lexicon: χρεία
  rationale: Se preserva la estructura participial y la condición de necesidad sin convertirla en una paráfrasis causal. «Teniendo necesidad» mantiene el contraste con «no tiene necesidad».
- source_word: δώσει δίκην
  english_pob_choice: will pay the penalty
  chosen_spanish: pagará la pena
  alternatives_spanish:
  - pagará la pena
  - sufrirá el castigo
  lexicon: δίκη
  rationale: «Pena» comunica bien la retribución judicial sin sobredeterminarla. «Castigo» es posible, pero «pena» encaja mejor con la formulación breve y solemne del pasaje.
- source_word: ἱνατί ἔλαβε καὶ εἰς τί
  english_pob_choice: for why he received and for what purpose
  chosen_spanish: por qué recibió y para qué
  alternatives_spanish:
  - por qué lo recibió y con qué fin
  - por qué lo tomó y para qué
  lexicon: ἵνα τί; λαμβάνω
  rationale: Se conserva la doble indagación causal/final. «Por qué» y «para qué» reproducen con claridad las dos preguntas griegas sin añadir elementos interpretativos.
- source_word: ἐν συνοχῇ ... γενόμενος
  english_pob_choice: having come under confinement
  chosen_spanish: cuando haya sido puesto en confinamiento
  alternatives_spanish:
  - habiendo caído en confinamiento
  - cuando esté bajo encierro
  lexicon: συνoχή
  rationale: «Confinamiento» refleja la restricción física/judicial. La pasiva española evita una formulación torpe y conserva el carácter penal del contexto.
- source_word: ἐξετασθήσεται περὶ ὧν ἔπραξε
  english_pob_choice: he will be examined concerning the things he did
  chosen_spanish: será examinado acerca de las cosas que hizo
  alternatives_spanish:
  - será interrogado acerca de lo que hizo
  - será examinado por las cosas que hizo
  lexicon: ἐξετάζω; πράσσω
  rationale: «Examinado acerca de» sigue de cerca el griego y mantiene la apertura del juicio. «Interrogado» sería más específico, pero menos fiel al término general.
- source_word: μέχρις οὗ ἀποδῷ τὸν ἔσχατον κοδράντην
  english_pob_choice: until he repays the last quadrans
  chosen_spanish: hasta que pague el último cuadrante
  alternatives_spanish:
  - hasta que devuelva el último cuadrante
  - hasta que pague el último cuadrante
  lexicon: κοδράντης
  rationale: «Cuadrante» conserva la moneda romana del original. «Pague» mantiene la idea de satisfacción de deuda/pena, y es más natural en español que «devuelva» en este contexto.
theological_decisions:
- issue: La fuente textual habla del Padre que quiere que sus dones se den a todos, sin suavizar la generosidad universal ni convertirla en una formulación eclesial posterior.
  english_pob_reading: the Father wants his own gifts to be given to all
  chosen_spanish_reading: el Padre quiere que sus propios dones sean dados a todos
  alternative_spanish_readings:
  - el Padre desea que sus propios dones se den a todos
  - el Padre quiere que se repartan a todos sus propios dones
  rationale: Se mantiene la voluntad/gusto del Padre y la universalidad del destinatario («a todos»). No se introduce «gracia» en el texto principal porque χαρίσματα aquí puede leerse como dones/gracias concretas, y el contexto inmediato favorece una referencia amplia a bienes dados.
  doctrine_reference: Generosidad divina y obligación de la caridad sin añadir formulación doctrinal externa
- issue: La bienaventuranza y la amenaza de culpa distinguen entre quien da conforme al mandamiento y quien recibe sin necesidad; el texto no absuelve automáticamente toda recepción.
  english_pob_reading: Blessed is the one who gives according to the commandment, for he is innocent. But woe to the one who receives; for if someone receives while having need, he will be innocent, but the one not having need will pay the penalty
  chosen_spanish_reading: Bienaventurado el que da conforme al mandamiento, porque es inocente. Pero ¡ay del que recibe! Porque si alguien recibe teniendo necesidad, será inocente; pero el que no tiene necesidad pagará la pena
  alternative_spanish_readings:
  - Bienaventurado el que da según el mandamiento, porque es inocente. Pero ¡ay del que recibe! ...
  - '... pero el que no tiene necesidad sufrirá castigo'
  rationale: 'La tensión ética se conserva: dar obedeciendo es virtud; recibir sólo es inocente en caso de necesidad. No se diluye el juicio sobre la recepción no necesitada.'
  doctrine_reference: Ética de la limosna/ayuda y discernimiento moral en la recepción de bienes
- issue: La clausura judicial final es una pena hasta satisfacción completa, no sólo una estancia indefinida.
  english_pob_reading: he will not come out from there until he repays the last quadrans
  chosen_spanish_reading: no saldrá de allí hasta que pague el último cuadrante
  alternative_spanish_readings:
  - no saldrá de allí hasta que devuelva el último cuadrante
  - no saldrá de allí hasta pagar el último cuadrante
  rationale: 'Se conserva el carácter retributivo del pasaje: la salida depende del pago completo. No se atenúa la imagen judicial con una paráfrasis moralizante.'
  doctrine_reference: Responsabilidad y rendición de cuentas en un marco judicial/profético
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: «wants his own gifts to be given to all», la secuencia «while having need / not having need», y la conexión de la cláusula de pena con «for why he received and for what purpose».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; este pasaje no lo contiene.
  - Se traduce δοῦλος no aplicable aquí; no hay siervo/esclavo en el versículo.
  - Se conserva el tono admonitorio y judicial del original, evitando suavizar «pena», «confinamiento» y «examinado».
  - «Bienaventurado» y «¡ay de!» se usan como pares retóricos consistentes con el registro sapiencial/profético.
