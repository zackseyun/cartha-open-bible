revisions:
- from: Den a todo el que les pida[a], y no se lo reclamen; porque el Padre quiere que sus propios dones sean dados a todos. Bienaventurado el que da conforme al mandamiento, porque es inocente. Pero ¡ay del que recibe! Porque si alguien recibe teniendo necesidad, será inocente; pero el que no tiene necesidad pagará la pena por qué recibió y para qué. Y, cuando haya sido puesto en confinamiento, será examinado acerca de las cosas que hizo[b], y no saldrá de allí hasta que pague el último cuadrante.
  to: Da a todo el que te pida, y no lo reclames; porque el Padre quiere que sus propios dones se den a todos. Bienaventurado el que da conforme al mandamiento, porque es inocente. Pero ¡ay del que recibe!, porque si alguien recibe teniendo necesidad, será inocente; pero el que no tiene necesidad pagará la pena por qué recibió y para qué. Y, cuando haya sido puesto en confinamiento, será examinado acerca de las cosas que hizo[a], y no saldrá de allí hasta que pague el último cuadrante.
  rationale: Se corrige la segunda persona al singular para reflejar el griego, se elimina la nota [a] innecesaria, se mejora la naturalidad de «se den» y se mantiene la nota [a] del tramo final porque sí preserva una posibilidad sintáctica relevante ya reconocida por el POB inglés. Los cambios son menores y no requieren nueva adjudicación compleja.
