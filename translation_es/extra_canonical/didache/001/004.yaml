review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el inglés POB en la secuencia de exhortaciones y en los pares léxicos principales: deseos carnales/mundanos, golpe en la mejilla derecha, ir dos millas, capa/túnica, y no reclamar lo tomado. Sin embargo, introduce una nota al pie mal anclada y semánticamente fuera de lugar: la nota [a] está colocada en «mejilla derecha», pero su contenido trata sobre ἀγγαρεύσῃ ... μίλιον ἕν («obliga a recorrer una milla»). Eso rompe la fidelidad al aparato auditado.'
  spanish_quality_summary: 'El español es generalmente natural y claro. «Apártate» es aceptable, aunque «abstente» reflejaría mejor ἀπέχου en un registro exhortativo; no es un error grave. El principal problema de calidad es editorial: la nota al pie crea confusión de lectura al asociar una alternativa de la cláusula de la milla con la mejilla derecha. Además, la nota misma es poco idiomática («obligación de servicio espacial equivalente»).'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Carnales», «mundanos», «túnica» y «perfecto» están alineados con las decisiones documentadas. «Capa» para ἱμάτιον es defendible. La revisión necesaria es de aparato de notas, no de glosario teológico.
  issues:
  - severity: high
    issue: Nota al pie [a] anclada en la frase equivocada
    rationale: La nota documenta una alternativa para ἀγγαρεύσῃ ... μίλιον ἕν, pero está insertada después de «mejilla derecha». Esto desinforma al lector y no preserva el rastro de auditoría inglés.
  - severity: medium
    issue: Redacción de la nota al pie poco natural en español
    rationale: 'La expresión «obligación de servicio espacial equivalente» suena técnica y opaca. Conviene reflejar simplemente la alternativa previa del inglés POB: «O: “Si alguien te obliga por una milla”».'
