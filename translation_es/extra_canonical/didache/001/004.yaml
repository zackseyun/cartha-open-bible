revisions:
- from: Apártate de los deseos carnales y mundanos. Si alguien te da un golpe en la mejilla derecha[a], vuélvele también la otra, y serás perfecto; si alguien te obliga a recorrer una milla, ve con él dos. Si alguien te quita tu capa, dale también la túnica; si alguien te quita lo que es tuyo, no lo reclames, porque no puedes hacerlo.
  to: Apártate de los deseos carnales y mundanos. Si alguien te da un golpe en la mejilla derecha, vuélvele también la otra, y serás perfecto; si alguien te obliga a recorrer una milla[a], ve con él dos. Si alguien te quita tu capa, dale también la túnica; si alguien te quita lo que es tuyo, no lo reclames, porque no puedes hacerlo.
  rationale: Se conserva el texto principal casi intacto porque representa bien el sentido del griego. La corrección necesaria es mover la nota al lugar correspondiente de la cláusula sobre ἀγγαρεύω/μίλιον y simplificar su redacción para que refleje con claridad la alternativa auditada en inglés, sin jerga innecesaria.
