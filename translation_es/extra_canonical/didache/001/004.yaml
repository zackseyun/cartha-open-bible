    text: 'O: «Si alguien te obliga por una milla».'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal casi intacto porque representa bien el sentido del griego. La corrección necesaria es mover la nota al lugar correspondiente de la cláusula sobre ἀγγαρεύω/μίλιον y simplificar su redacción para que refleje con claridad la alternativa auditada en inglés, sin jerga innecesaria.
