id: DID.1.4
reference: Didache 1:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ἀπέχου τῶν σαρκικῶν καὶ κοσμικῶν ἐπιθυμιῶν. Ἐάν τις σοὶ δῷ ῥάπισμα εἰς τὴν δεξιὰν σιαγόνα, στρέψον αὐτῷ καὶ τὴν ἄλλην, καὶ ἔσῃ τέλειος· ἐὰν ἀγγαρεύσῃ σε τις μίλιον ἕν, ὕπαγε μετʼ αὐτοῦ δύο· ἐὰν ἄρῃ τις τὸ ἱμάτιόν σου, δὸς αὐτῷ καὶ τὸν χιτῶνα· ἐὰν λάβῃ τις ἀπὸ σοῦ τὸ σόν, μὴ ἀπαίτει· οὐδὲ γὰρ δύνασαι.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/001/004.yaml
  text: Abstain from fleshly and worldly desires. If anyone gives you a blow on the right cheek[a], turn to him the other also, and you will be perfect. If anyone compels you to go one mile, go with him two. If anyone takes away your cloak, give him your tunic also. If anyone takes from you what is yours, do not demand it back, for you are not able.
  footnotes:
  - marker: a
    text: Or 'If anyone compels you for one mile'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:30:54Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Apártate de los deseos carnales y mundanos. Si alguien te da un golpe en la mejilla derecha, vuélvele también la otra, y serás perfecto; si alguien te obliga a recorrer una milla[a], ve con él dos. Si alguien te quita tu capa, dale también la túnica; si alguien te quita lo que es tuyo, no lo reclames, porque no puedes hacerlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si alguien te obliga por una milla».'
    reason: alternative_reading
lexical_decisions:
- source_word: σαρκικῶν
  english_pob_choice: fleshly
  chosen_spanish: carnales
  alternatives_spanish:
  - de la carne
  - físicos
  - corporales
  lexicon: σάρξ
  rationale: En español, «carnales» conserva el vínculo semántico con «carne» sin sonar tan torpe como una calca literal; mantiene la fuerza ética de deseos gobernados por la carne.
- source_word: κοσμικῶν
  english_pob_choice: worldly
  chosen_spanish: mundanos
  alternatives_spanish:
  - del mundo
  - seculares
  - terrenales
  lexicon: κόσμος
  rationale: «Mundanos» comunica pertenencia al orden del mundo en contraste con la vida obediente a Dios, y corresponde bien al paralelo con «worldly» del texto inglés.
- source_word: ῥάπισμα
  english_pob_choice: blow
  chosen_spanish: un golpe
  alternatives_spanish:
  - una bofetada
  - un cachetazo
  - un azote
  lexicon: ῥάπισμα
  rationale: El término griego designa un golpe dado en la cara; «golpe» es suficientemente amplio y fiel, mientras que «bofetada» sería más específico pero introduce una interpretación no obligada.
- source_word: στρέψον αὐτῷ καὶ τὴν ἄλλην
  english_pob_choice: turn to him the other also
  chosen_spanish: vuélvele también la otra
  alternatives_spanish:
  - ofrécele también la otra
  - ponle también la otra mejilla
  - gírale también la otra
  lexicon: στρέφω
  rationale: La expresión idiomática en español se entiende naturalmente como «volver la otra mejilla»; se mantiene la dirección al agresor sin expandir el sentido.
- source_word: ἀγγαρεύσῃ ... μίλιον ἕν
  english_pob_choice: compels you to go one mile
  chosen_spanish: te obliga a recorrer una milla
  alternatives_spanish:
  - te obliga a ir una milla
  - te fuerza a caminar una milla
  - te requisita para una milla
  lexicon: ἀγγαρεύω / μίλιον
  rationale: «Obliga» refleja la presión coercitiva de ἀγγαρεύω; «recorrer una milla» reproduce el alcance espacial de μίλιον ἕν y suena natural en español.
- source_word: ἄρῃ ... τὸ ἱμάτιόν σου
  english_pob_choice: takes away your cloak
  chosen_spanish: te quita tu capa
  alternatives_spanish:
  - te toma tu capa
  - te arrebata tu capa
  - te quita tu manto
  lexicon: ἱμάτιον
  rationale: «Capa» es una equivalencia española clara y tradicional para ἱμάτιον en este contexto de prenda exterior; «manto» también sería posible, pero «capa» resulta más transparente.
- source_word: τὸν χιτῶνα
  english_pob_choice: your tunic
  chosen_spanish: la túnica
  alternatives_spanish:
  - la camisa
  - la ropa interior
  - el vestido interior
  lexicon: χιτών
  rationale: «Túnica» es la correspondencia más estable y reconocible para χιτών; conserva la distinción con la prenda exterior.
- source_word: μὴ ἀπαίτει
  english_pob_choice: do not demand it back
  chosen_spanish: no lo reclames
  alternatives_spanish:
  - no lo exijas de vuelta
  - no lo pidas de regreso
  - no lo reclames de nuevo
  lexicon: ἀπαιτέω
  rationale: En español, «reclamar» transmite la idea de insistir en la devolución sin añadir una formulación pesada; mantiene la prohibición de exigir de vuelta lo tomado.
theological_decisions:
- issue: 'La meta ética final: "serás perfecto"'
  english_pob_reading: and you will be perfect
  chosen_spanish_reading: y serás perfecto
  alternative_spanish_readings:
  - y serás completo
  - y llegarás a la perfección
  rationale: Se conserva la formulación fuerte de perfección moral/teleológica tal como la refleja el inglés POB y el griego τέλειος; «completo» debilitaría el alcance ético, mientras que una perífrasis podría exceder la brevedad del original.
  doctrine_reference: teleología ética del discipulado; cf. uso de τέλειος en contextos de integridad moral
- issue: 'Última cláusula: imposibilidad de exigir la devolución'
  english_pob_reading: for you are not able
  chosen_spanish_reading: porque no puedes hacerlo
  alternative_spanish_readings:
  - porque no eres capaz
  - porque no te es posible
  rationale: El griego cierra con una afirmación de incapacidad general. «No puedes hacerlo» conserva la idea sin añadir objeto explícito ajeno al texto, y evita interpretar de más la naturaleza de la incapacidad.
  doctrine_reference: límites de la capacidad humana frente a la exigencia de no reclamar
- issue: 'Primera exhortación ascética: deseos de la carne y del mundo'
  english_pob_reading: fleshly and worldly desires
  chosen_spanish_reading: los deseos carnales y mundanos
  alternative_spanish_readings:
  - los deseos de la carne y del mundo
  - las pasiones carnales y mundanas
  rationale: Se mantiene la tensión entre σάρξ y κόσμος sin convertirlo en una abstracción psicológica. «Carnales y mundanos» preserva el contraste moral del pasaje y es idiomático en español cristiano.
  doctrine_reference: ética de separación del mundo y dominio de los deseos
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés están en alto acuerdo; la única revisión relevante en inglés fue clarificar «compels you to go one mile» para mayor naturalidad. En español se siguió esa misma aclaración con «te obliga a recorrer una milla», sin perder el matiz de coerción ni el alcance espacial de μίλιον ἕν.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología general del proyecto no aplicable aquí; no hay nombre divino en el texto.
  - Se preservó la distinción entre «capa» (ἱμάτιον) y «túnica» (χιτών).
  - Se evitó sustituir la ética del pasaje por formulaciones más suaves; el texto conserva su tono imperativo y ascético.
  - La nota al pie se ancla solo en la cláusula de la milla, como en el audit trail inglés, para reflejar la alternativa de lectura sobre alcance de la compulsión.
