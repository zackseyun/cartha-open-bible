base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/016/007.yaml
  text: 'but not of all, but as it was said: The Lord will come, and all the holy ones with him.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:45Z'
    unchanged: false
    changes_summary: Changed 'yet not of all' to 'but not of all' for more natural English while preserving the Greek contrast; left 'holy ones' as a faithful rendering of οἱ ἅγιοι.
translation:
  language: es
  text: 'pero no de todos, sino como fue dicho: Vendrá el Señor, y todos los santos con él.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ πάντων δέ
  english_pob_choice: but not of all
  chosen_spanish: pero no de todos
  alternatives_spanish:
  - pero no para todos
  - sin embargo, no de todos
  lexicon: οὐ / πάντων
  rationale: El griego expresa una negación parcial con contraste; en español, «pero no de todos» conserva esa oposición sin introducir explicaciones ajenas al texto. Mantiene también la elipsis natural del complemento implícito en el contexto.
- source_word: ὡς ἐρρέθη
  english_pob_choice: as it was said
  chosen_spanish: como fue dicho
  alternatives_spanish:
  - como se dijo
  - según se dijo
  lexicon: ὡς + λέγω (pasivo)
  rationale: La pasiva impersonal refleja bien la fórmula de cita tradicional del griego. «Como fue dicho» suena formal y fiel, sin sobrecargar el sentido con una fuente explícita no presente aquí.
- source_word: Ἥξει
  english_pob_choice: will come
  chosen_spanish: Vendrá
  alternatives_spanish:
  - Vendrá de nuevo
  - llegará
  lexicon: ἥκω
  rationale: Ἥξει expresa la venida futura; «Vendrá» es la forma más directa y natural en español. «Llegará» sería posible, pero «vendrá» conserva mejor el matiz de venir/presentarse.
- source_word: ὁ Κύριος
  english_pob_choice: The Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: κύριος
  rationale: Aquí el texto griego usa κύριος sin contexto explícito del tetragrámaton. Dado el audit trail inglés y la cita formulística, «el Señor» es la opción más fiel y reconocible en español; no se sustituye por «Yahvé» porque la fuente inmediata no lo exige de manera inequívoca.
- source_word: πάντες οἱ ἅγιοι
  english_pob_choice: all the holy ones
  chosen_spanish: todos los santos
  alternatives_spanish:
  - todos los consagrados
  - todos los santos de Dios
  lexicon: ἅγιοι
  rationale: ἅγιοι puede ser «santos» en sentido de personas apartadas para Dios. «Todos los santos» reproduce bien la construcción inclusiva del griego y respeta el registro eclesial sin perder precisión.
- source_word: μετ᾽ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - conjunto con él
  lexicon: μετά + genitivo
  rationale: La preposición con genitivo indica compañía; «con él» es la solución natural y exacta en español.
theological_decisions:
- issue: Identidad de «el Señor» en una fórmula de cita escatológica
  english_pob_reading: The Lord will come
  chosen_spanish_reading: Vendrá el Señor
  alternative_spanish_readings:
  - Vendrá Yahvé
  - Vendrá el Señor Jesús
  rationale: El contexto inmediato no desarrolla la identificación explícita del referente; el griego conserva κύριος como título/cita. Por eso se mantiene la equivalencia sobria «el Señor» sin especificar más allá de la evidencia textual.
  doctrine_reference: Filología del texto; prudencia exegética sobre κύριος en cita escatológica
- issue: Renderizado de οἱ ἅγιοι
  english_pob_reading: all the holy ones
  chosen_spanish_reading: todos los santos
  alternative_spanish_readings:
  - todos los santos de Dios
  - todos los consagrados
  rationale: La expresión puede designar a los fieles apartados para Dios. «Santos» preserva esa identidad comunitaria y la resonancia bíblica sin añadir un matiz doctrinal no explicitado aquí.
  doctrine_reference: Uso bíblico de ἅγιοι como el pueblo apartado para Dios
translation_notes:
  revision_awareness: El texto inglés de auditoría fue revisado de «yet not of all» a «but not of all» para mantener mejor el contraste del griego; la versión española sigue esa lectura contrastiva con «pero no de todos» y no introduce elementos no presentes en el original.
  spanish_consistency_notes:
  - Se mantiene «el Señor» para κύριος en línea con la forma de cita griega y el audit trail inglés.
  - Se traduce ἅγιοι como «santos», no como «santos [católicos]» ni como una glosa explicativa, para conservar la amplitud bíblica del término.
  - No se añade puntuación interpretativa más allá de la necesaria para reflejar la cita introducida por «como fue dicho».
