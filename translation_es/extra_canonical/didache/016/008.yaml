translation:
  language: es
  text: Entonces el mundo verá al Señor viniendo sobre las nubes del cielo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel entonces
  lexicon: no entry number
  rationale: Marca la secuencia temporal de manera natural en español y conserva el valor consecutivo del griego sin añadir matices no presentes.
- source_word: ὄψεται
  english_pob_choice: will see
  chosen_spanish: verá
  alternatives_spanish:
  - contemplará
  - mirará
  lexicon: no entry number
  rationale: El verbo español básico «verá» reproduce la percepción visual futura del griego con claridad y sin intensificarla indebidamente.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la humanidad
  - la tierra
  lexicon: no entry number
  rationale: «El mundo» mantiene el sujeto amplio y colectivo del griego, conforme a la lectura inglesa auditada.
- source_word: τὸν Κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Soberano
  - al Dueño
  lexicon: no entry number
  rationale: Aunque el POB inglés usa «the Lord», en español «Señor» es la forma natural para Κύριος cuando se refiere al Señor divino; el artículo y la contracción «al» conservan el régimen verbal.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - que viene
  - que está viniendo
  lexicon: no entry number
  rationale: El participio presente se vierte con una forma progresiva natural en español para expresar la acción en curso sin convertirla en una cláusula excesivamente explicativa.
- source_word: ἐπάνω τῶν νεφελῶν
  english_pob_choice: upon the clouds
  chosen_spanish: sobre las nubes
  alternatives_spanish:
  - encima de las nubes
  - montado sobre las nubes
  lexicon: no entry number
  rationale: «Sobre» reproduce la preposición espacial del griego y conserva el tono bíblico de la imagen sin cargarlo con una paráfrasis más interpretativa.
- source_word: τοῦ οὐρανοῦ
  english_pob_choice: of heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo de Dios
  - de los cielos
  lexicon: no entry number
  rationale: «Del cielo» es la correspondencia directa y clara del genitivo; evita redundancias o pluralizaciones que no exige el griego.
theological_decisions:
- issue: Uso de «Señor» para Κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Soberano
  - el Dueño
  rationale: En este pasaje la frase alude a la figura escatológica que aparece con autoridad divina; «Señor» es el equivalente más estable y reverente en español, y mantiene el vínculo con el uso cristiano del título sin forzar una sustitución estilística.
  doctrine_reference: Cristología / título divino
- issue: Imagen de la venida sobre las nubes
  english_pob_reading: coming upon the clouds of heaven
  chosen_spanish_reading: viniendo sobre las nubes del cielo
  alternative_spanish_readings:
  - viniendo en las nubes del cielo
  - que viene sobre las nubes del cielo
  rationale: Se conserva la imagen apocalíptica tal como aparece en el original y en la traducción inglesa auditada, sin suavizarla ni reinterpretarla; la formulación española mantiene la expectativa visible y pública del retorno.
  doctrine_reference: Escatología / venida del Señor
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado mostró alta concordancia; por ello, la propuesta española sigue de cerca el sentido ya confirmado por el audit trail inglés y el texto griego normalizado.
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κύριος en coherencia con el registro bíblico-cristiano de la POB en contextos escatológicos.
  - No se introduce nota textual porque no hay variantes relevantes en el paquete de fuente proporcionado y la lectura inglesa auditada no llevó notas.
