revisions:
- from: 'Y entonces aparecerán las señales de la verdad: primero, una señal de una abertura[a] en el cielo; luego una señal del sonido de una trompeta[b]; y la tercera, la resurrección de los muertos—'
  to: 'Y entonces aparecerán las señales de la verdad: primero, una señal de una apertura[a] en el cielo; luego, una señal del sonido de una trompeta[b]; y la tercera, la resurrección de los muertos—'
  rationale: 'Se hace una reparación menor de estilo y léxico: ‘apertura’ mejora la naturalidad del español frente a ‘abertura’, sin apartarse del sentido adoptado en la revisión inglesa final. Se añade coma tras ‘luego’ para mejor fluidez. La nota [a] preserva la discusión léxica real de ἐκπέτασις; la nota [b] reubica ‘voz de una trompeta’ como alternativa más literal, no como opción principal.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:09:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del griego y la secuencia enumerativa: ‘Y entonces… primero… luego… y la tercera…’. ‘Las señales de la verdad’, ‘el sonido de una trompeta’ y ‘la resurrección de los muertos’ están bien alineados con τὰ σημεῖα τῆς ἀληθείας, φωνῆς σάλπιγγος y ἀνάστασις νεκρῶν. El punto débil es ἐκπετάσεως: ‘abertura’ sigue la revisión inglesa final, pero el expediente auditado documenta tensión léxica real, y en español ‘abertura’ suena mecánico y poco idiomático. Conviene una reparación menor hacia una formulación más natural sin perder la cautela semántica.'
  spanish_quality_summary: El español es claro y mayormente digno, pero ‘una señal de una abertura en el cielo’ resulta torpe por la repetición ‘de una’ y por ‘abertura’, que en este contexto se siente menos natural que ‘apertura’. El resto del versículo fluye bien. También conviene ajustar la nota para no presentar ‘voz de una trompeta’ como alternativa igualmente recomendable, ya que en español suena más personificada y menos natural; puede mantenerse como alternativa literal/tradicional, pero no como preferida.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones principales encajan: ‘señales’, ‘verdad’, ‘sonido’, ‘resurrección’. La única reparación léxica recomendada es preferir ‘apertura’ sobre ‘abertura’ para ἐκπετάσεως por naturalidad del español, dejando constancia de una alternativa más literal como ‘despliegue’ si se desea preservar la discusión léxica del griego.'
  issues:
  - severity: medium
    issue: ‘una abertura en el cielo’ suena poco natural en español e introduce una construcción pesada (‘una señal de una abertura…’).
    rationale: Aunque sigue la revisión inglesa final, en español eclesial general ‘apertura en el cielo’ es más idiomático. La meta es preservar sentido y legibilidad sin calcar torpemente el inglés.
  - severity: low
    issue: La nota [b] presenta ‘voz de una trompeta’ como alternativa simple, pero en español suena menos natural que el texto principal.
    rationale: φωνή con instrumento se entiende mejor como ‘sonido’. Si se conserva la alternativa, debe quedar como posibilidad más literal, no como opción equiparable en naturalidad.
  revised_spanish_text: 'Y entonces aparecerán las señales de la verdad: primero, una señal de una apertura[a] en el cielo; luego, una señal del sonido de una trompeta[b]; y la tercera, la resurrección de los muertos—'
  revised_footnotes:
  - marker: a
    text: O ‘abertura’; posiblemente ‘despliegue’ o ‘extensión’, según el matiz de ἐκπέτασις.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘voz de una trompeta’.
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor de estilo y léxico: ‘apertura’ mejora la naturalidad del español frente a ‘abertura’, sin apartarse del sentido adoptado en la revisión inglesa final. Se añade coma tras ‘luego’ para mejor fluidez. La nota [a] preserva la discusión léxica real de ἐκπέτασις; la nota [b] reubica ‘voz de una trompeta’ como alternativa más literal, no como opción principal.'
