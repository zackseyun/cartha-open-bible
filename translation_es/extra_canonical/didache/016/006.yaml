source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Καὶ τότε φανήσεται τὰ σημεῖα τῆς ἀληθείας· πρῶτον, σημεῖον ἐκπετάσεως ἐν οὐρανῷ, εἶτα σημεῖον φωνῆς σάλπιγγος καὶ τὸ τρίτον ἀνάστασις νεκρῶν·
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/016/006.yaml
  text: 'And then the signs of the truth will appear: first[a], a sign of an opening in heaven; then a sign of the sound of a trumpet; and the third[b], the resurrection of the dead—'
  footnotes:
  - marker: a
    text: Or 'an opening out'.
    reason: previous_rendering
  - marker: b
    text: Or "a trumpet's voice".
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:43Z'
    unchanged: false
    changes_summary: Changed 'a spreading out' to 'an opening' for a more natural and likely more accurate rendering of ἐκπετάσεως, while preserving the structure and all source elements.
translation:
  language: es
  text: 'Y entonces aparecerán las señales de la verdad: primero, una señal de una apertura[a] en el cielo; luego, una señal del sonido de una trompeta[b]; y la tercera, la resurrección de los muertos—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘abertura’; posiblemente ‘despliegue’ o ‘extensión’, según el matiz de ἐκπέτασις.
    reason: lexical_alternative
  - marker: b
    text: Lit. ‘voz de una trompeta’.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ σημεῖα τῆς ἀληθείας
  english_pob_choice: the signs of the truth
  chosen_spanish: las señales de la verdad
  alternatives_spanish:
  - los signos de la verdad
  - las señales de la verdad
  lexicon: σημεῖον
  rationale: ‘Señales’ conserva el valor de portentos/indicaciones visibles del texto, mientras ‘verdad’ traduce ἀληθείας de forma directa sin forzar un sentido doctrinal adicional.
- source_word: ἐκπετάσεως
  english_pob_choice: a sign of an opening in heaven
  chosen_spanish: una abertura[a] en el cielo
  alternatives_spanish:
  - una apertura en el cielo
  - una abertura en el cielo
  - un despliegue en el cielo
  lexicon: ἐκπέτασις
  rationale: La revisión inglesa volvió a ‘opening’, pero el griego de ἐκπέτασις admite la idea de una apertura/abertura. ‘Abertura’ es natural en español y mantiene la imagen sin sobreexplicar una ruptura violenta.
- source_word: φωνῆς σάλπιγγος
  english_pob_choice: the sound of a trumpet
  chosen_spanish: el sonido de una trompeta[b]
  alternatives_spanish:
  - la voz de una trompeta
  - el sonido de una trompeta
  - el toque de trompeta
  lexicon: φωνή
  rationale: En combinación con un instrumento, φωνή significa ‘sonido’ más que ‘voz’; ‘trompeta’ reproduce σάλπιγξ con claridad y evita una personificación extraña.
- source_word: τὸ τρίτον
  english_pob_choice: the third
  chosen_spanish: la tercera
  alternatives_spanish:
  - el tercer signo
  - la tercera
  lexicon: τρίτος
  rationale: Se conserva la secuencia enumerativa del griego. En español, ‘la tercera’ funciona como elipsis natural referida al ‘signo’ implícito.
- source_word: ἀνάστασις νεκρῶν
  english_pob_choice: the resurrection of the dead
  chosen_spanish: la resurrección de los muertos
  alternatives_spanish:
  - la resurrección de los muertos
  - la resurrección de los difuntos
  lexicon: ἀνάστασις
  rationale: ‘Resurrección de los muertos’ es la correspondencia directa y más transparente para el sintagma griego.
theological_decisions:
- issue: Carácter de las “señales de la verdad”
  english_pob_reading: the signs of the truth
  chosen_spanish_reading: las señales de la verdad
  alternative_spanish_readings:
  - los signos de la verdad
  rationale: Se mantiene el giro sin convertir ‘verdad’ en un adjetivo ni en una abstracción doctrinal distinta; el texto presenta señales que pertenecen o remiten a la verdad escatológica.
  doctrine_reference: Escatología / señales previas al fin
- issue: Mantenimiento de la enumeración escatológica
  english_pob_reading: first... then... and the third...
  chosen_spanish_reading: primero... luego... y la tercera...
  alternative_spanish_readings:
  - primero... después... y la tercera...
  rationale: La estructura enumerativa se conserva para reflejar el orden de los signos tal como aparece en el griego y en la tradición inglesa auditada.
  doctrine_reference: Orden de los acontecimientos finales
translation_notes:
  revision_awareness: La revisión inglesa más reciente vaciló entre ‘spreading out’ y ‘opening’ para ἐκπετάσεως; el español adopta ‘abertura’ como opción sobria y publicable que conserva la imagen de apertura sin imponer una interpretación más técnica de expansión. También se ajusta φωνῆς σάλπιγγος a ‘sonido de una trompeta’, coherente con la auditoría lexicológica inglesa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se mantiene ‘resurrección’ en sentido escatológico directo, sin reformulación doctrinal.
  - Las notas al pie están ancladas explícitamente en el texto con [a] y [b], sin marcadores huérfanos.
