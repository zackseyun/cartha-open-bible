id: DID.16.4
reference: Didache 16:4
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: αὐξανούσης γὰρ τῆς ἀνομίας, μισήσουσιν ἀλλήλους καὶ διώξουσι καὶ παραδώσουσι, καὶ τότε φανήσεται ὁ κοσμοπλάνος ὡς υἱὸς Θεοῦ καὶ ποιήσει σημεῖα καὶ τέρατα, καὶ ἡ γῆ παραδοθήσεται εἰς χεῖρας αὐτοῦ, καὶ ποιήσει ἀθέμιτα, ἃ οὐδέποτε γέγονεν ἐξ αἰῶνος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/016/004.yaml
  text: For as lawlessness increases, they will hate one another and persecute and betray one another, and then the world-deceiver will appear as a son of God and will do signs and wonders, and the earth will be delivered into his hands, and he will do unlawful things such as have never happened from the beginning of the age.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:38Z'
    unchanged: false
    changes_summary: Corrected typographical errors ('world-deceiverd' to 'world-deceiver,' 'Gode' to 'God'), supplied the implied object in 'betray one another' for completeness and natural English, and revised the final phrase to more closely reflect ἐξ αἰῶνος as 'from the beginning of the age.'
translation:
  language: es
  text: Porque al aumentar la iniquidad, se odiarán unos a otros y se perseguirán y se traicionarán unos a otros; y entonces se manifestará el engañador del mundo como hijo de Dios y hará señales y prodigios, y la tierra será entregada en sus manos, y hará cosas ilícitas que nunca han sucedido desde el comienzo de la era.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - ausencia de ley
  - desorden moral
  lexicon: ἀνομία
  rationale: En este contexto escatológico, la idea no es solo infracción jurídica sino maldad activa y generalizada; 'iniquidad' comunica mejor el campo moral que 'ilegalidad' en español bíblico sin volver a una fórmula demasiado tradicional.
- source_word: μισήσουσιν ἀλλήλους
  english_pob_choice: they will hate one another
  chosen_spanish: se odiarán unos a otros
  alternatives_spanish:
  - se aborrecerán unos a otros
  - se detestarán unos a otros
  lexicon: μισέω
  rationale: '''Odiarán'' reproduce la fuerza afectiva del verbo griego y conserva la reciprocidad explícita de ἀλλήλους mediante ''unos a otros''.'
- source_word: διώξουσι
  english_pob_choice: persecute
  chosen_spanish: se perseguirán
  alternatives_spanish:
  - los perseguirán
  - los acosarán
  lexicon: διώκω
  rationale: El objeto está implícito en el griego por el paralelismo con las acciones recíprocas anteriores y posteriores; 'se perseguirán' mantiene esa reciprocidad y evita introducir un objeto no explicitado.
- source_word: παραδώσουσι
  english_pob_choice: betray
  chosen_spanish: se entregarán unos a otros
  alternatives_spanish:
  - se traicionarán
  - se denunciarán unos a otros
  lexicon: παραδίδωμι
  rationale: El verbo puede abarcar traición y entrega; en este contexto de hostilidad mutua, 'se entregarán unos a otros' preserva el sentido de abandonar/poner en manos ajenas sin forzar una sola connotación.
- source_word: ὁ κοσμοπλάνος
  english_pob_choice: the world-deceiver
  chosen_spanish: el engañador del mundo
  alternatives_spanish:
  - el seductor del mundo
  - el impostor del mundo
  lexicon: κοσμοπλάνος
  rationale: Se conserva el compuesto con valor activo de engaño, pero en un orden natural para el español; 'del mundo' mantiene el genitivo descriptivo del griego.
- source_word: ὡς υἱὸς Θεοῦ
  english_pob_choice: as a son of God
  chosen_spanish: como hijo de Dios
  alternatives_spanish:
  - como un hijo de Dios
  - como si fuera hijo de Dios
  lexicon: υἱός / Θεός
  rationale: La comparación aparente exige 'como'; se deja 'Dios' sin mayúscula marcadora especial en la función sintáctica, manteniendo la referencia divina inequívoca.
- source_word: σημεῖα καὶ τέρατα
  english_pob_choice: signs and wonders
  chosen_spanish: señales y prodigios
  alternatives_spanish:
  - señales y maravillas
  - milagros y prodigios
  lexicon: σημεῖον / τέρας
  rationale: La pareja fija se traduce con el binomio más transparente y estable en español bíblico; 'prodigios' conserva el matiz de maravilla extraordinaria.
- source_word: ἡ γῆ παραδοθήσεται εἰς χεῖρας αὐτοῦ
  english_pob_choice: the earth will be delivered into his hands
  chosen_spanish: la tierra será entregada en sus manos
  alternatives_spanish:
  - la tierra caerá en sus manos
  - la tierra será puesta en sus manos
  lexicon: παραδίδωμι
  rationale: La pasiva mantiene la idea de entrega soberana y la imagen idiomática de posesión/poder sin añadir elementos interpretativos.
- source_word: ἀθέμιτα
  english_pob_choice: unlawful things
  chosen_spanish: cosas ilícitas
  alternatives_spanish:
  - cosas inicuas
  - cosas prohibidas
  lexicon: ἀθέμιτος
  rationale: '''Ilícitas'' preserva el valor de lo no permitido, más cercano al componente normativo del término que una mera evaluación moral.'
- source_word: ἐξ αἰῶνος
  english_pob_choice: from the beginning of the age
  chosen_spanish: desde el comienzo del siglo
  alternatives_spanish:
  - desde el principio de la era
  - desde el comienzo de la edad
  lexicon: αἰών
  rationale: Se mantiene la idea temporal de inicio de una era/edad; 'siglo' es un equivalente posible en español, aunque menos literal, y aquí conserva el carácter de período histórico amplio.
theological_decisions:
- issue: La figura final como impostor escatológico
  english_pob_reading: the world-deceiver will appear as a son of God
  chosen_spanish_reading: el engañador del mundo se manifestará como hijo de Dios
  alternative_spanish_readings:
  - el engañador del mundo aparecerá como hijo de Dios
  - el engañador del mundo se presentará como hijo de Dios
  rationale: Se conserva la expectativa de una manifestación pública y engañosa sin suavizar la cristología falsa implícita en el texto. 'Se manifestará' mantiene un registro solemne y escatológico.
  doctrine_reference: Escatología; advertencia sobre el anticristo/falso mesías en tradición cristiana primitiva.
- issue: Relación entre ilegalidad y maldad generalizada
  english_pob_reading: lawlessness increases
  chosen_spanish_reading: al aumentar la iniquidad
  alternative_spanish_readings:
  - cuando aumente la iniquidad
  - porque la iniquidad aumentará
  rationale: La secuencia causal del griego se conserva sin perder el carácter de progresión. 'Iniquidad' mantiene la densidad moral del término frente a una lectura meramente legal.
  doctrine_reference: Doctrina bíblica del pecado y su intensificación en tiempos finales.
translation_notes:
  revision_awareness: La versión inglesa revisada corrige una omisión recíproca ('betray one another') y ajusta 'from the beginning of the age' para reflejar mejor ἐξ αἰῶνος; la española sigue esa lectura completa y evita introducir un objeto no expresado en 'persecute'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para Θεός y no se usa una sustitución litúrgica como 'el Señor'.
  - Se evita 'Cristo' porque el texto dice 'hijo de Dios' y no usa Χριστός.
  - '''Señales y prodigios'' se usa como binomio estable para σημεῖα καὶ τέρατα.'
  - No se añade nota al texto porque no hay ambigüedad textual que requiera anclaje de nota en esta breve sección.
