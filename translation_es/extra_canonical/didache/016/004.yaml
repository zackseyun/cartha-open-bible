revisions:
- from: Porque al aumentar la iniquidad, se odiarán unos a otros y se perseguirán y se entregarán unos a otros; y entonces se manifestará el engañador del mundo como hijo de Dios y hará señales y prodigios, y la tierra será entregada en sus manos, y hará cosas ilícitas que nunca han sucedido desde el comienzo del siglo.
  to: Porque al aumentar la iniquidad, se odiarán unos a otros y se perseguirán y se traicionarán unos a otros; y entonces se manifestará el engañador del mundo como hijo de Dios y hará señales y prodigios, y la tierra será entregada en sus manos, y hará cosas ilícitas que nunca han sucedido desde el comienzo de la era.
  rationale: Se revisa 'se entregarán unos a otros' a 'se traicionarán unos a otros' para comunicar de forma inequívoca la hostilidad mutua implicada por παραδώσουσι en contexto y para alinearse con el English POB 'betray one another'. Se cambia 'desde el comienzo del siglo' a 'desde el comienzo de la era' para reflejar adecuadamente ἐξ αἰῶνος en español natural y evitar la lectura limitada de 'siglo'. El resto del versículo puede mantenerse por ser fiel y legible.
