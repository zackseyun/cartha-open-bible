id: DID.16.5
reference: Didache 16:5
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τότε ἥξει ἡ κτίσις τῶν ἀνθρώπων εἰς τὴν πύρωσιν τῆς δοκιμασίας καὶ σκανδαλισθήσονται πολλοὶ καὶ ἀπολοῦνται, οἱ δὲ ὑπομείναντες ἐν τῇ πίστει αὐτῶν σωθήσονται ὑπ᾽ αὐτοῦ τοῦ καταθέματος.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/016/005.yaml
  text: Then the human creation will come into the fire of testing[a], and many will be caused to stumble and will perish, but those who endure in their faith will be saved by the curse itself.
  footnotes:
  - marker: a
    text: Or 'by the accursed one himself'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:41Z'
    unchanged: false
    changes_summary: Corrected the apparent typo 'menf' to 'human' and revised the final phrase from 'saved from under the curse itself' to 'saved by the curse itself' to reflect ὑπ᾽ αὐτοῦ τοῦ καταθέματος more directly.
translation:
  language: es
  text: Entonces la creación humana vendrá al fuego de la prueba, y muchos tropezarán y perecerán, pero los que perseveren en su fe serán salvados por la misma maldición[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por el mismo maldito en persona’.
    reason: previous_rendering
lexical_decisions:
- source_word: ἡ κτίσις τῶν ἀνθρώπων
  english_pob_choice: the human creation
  chosen_spanish: la creación humana
  alternatives_spanish:
  - la creación de los hombres
  - la humanidad
  - la creación de las personas
  lexicon: κτίσις
  rationale: ‘Creación humana’ conserva la idea de un conjunto creado relativo a los seres humanos sin reducirla a una mera abstracción como ‘humanidad’. Evita también masculinizar innecesariamente el genérico.
- source_word: πύρωσις τῆς δοκιμασίας
  english_pob_choice: the fire of testing
  chosen_spanish: el fuego de la prueba
  alternatives_spanish:
  - el fuego de la tentación
  - el fuego del examen
  - la prueba ardiente
  lexicon: πύρωσις / δοκιμασία
  rationale: ‘Prueba’ comunica bien δοκιμασία como proceso de prueba o verificación. ‘Fuego’ mantiene la imagen de purificación/intensidad sin añadir explicaciones ajenas al texto.
- source_word: σκανδαλισθήσονται
  english_pob_choice: will be caused to stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - serán hechos tropezar
  - se escandalizarán
  - caerán
  lexicon: σκανδαλίζω
  rationale: En español, ‘tropezar’ reproduce la imagen de caer o ser inducido a caer, y es idiomático. ‘Serán hechos tropezar’ conserva más la pasiva causal, pero suena pesado.
- source_word: ἀπολοῦνται
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - morirán
  - se perderán
  - serán destruidos
  lexicon: ἀπόλλυμι
  rationale: ‘Perecerán’ preserva el sentido de destrucción o pérdida definitiva sin forzar una especificación doctrinal que el griego no explicita aquí.
- source_word: ὑπομείναντες
  english_pob_choice: those who endure
  chosen_spanish: los que perseveren
  alternatives_spanish:
  - los que resistan
  - los que soporten
  - los que permanezcan firmes
  lexicon: ὑπομένω
  rationale: ‘Perseveren’ expresa bien la constancia sostenida bajo presión y funciona naturalmente con ‘en su fe’. Mantiene el matiz de permanecer bajo prueba.
- source_word: ἐν τῇ πίστει αὐτῶν
  english_pob_choice: in their faith
  chosen_spanish: en su fe
  alternatives_spanish:
  - en la fe de ellos
  - en su fidelidad
  - en su confianza
  lexicon: πίστις
  rationale: ‘Fe’ es la correspondencia más directa y clara. ‘Fidelidad’ sería posible en ciertos contextos, pero aquí el texto habla de la esfera en que perseveran.
- source_word: σωθήσονται
  english_pob_choice: will be saved
  chosen_spanish: serán salvados
  alternatives_spanish:
  - serán rescatados
  - serán liberados
  - obtendrán salvación
  lexicon: σῴζω
  rationale: ‘Serán salvados’ conserva la pasiva y la amplitud de σῴζω sin introducir una formulación doctrinal más específica de la necesaria.
- source_word: ὑπ᾽ αὐτοῦ τοῦ καταθέματος
  english_pob_choice: by the curse itself
  chosen_spanish: por la misma maldición
  alternatives_spanish:
  - por la maldición misma
  - desde debajo de la maldición misma
  - por el mismo anatema
  lexicon: κατάθεμα
  rationale: ‘Maldición’ comunica el valor de κατάθεμα en español bíblico y evita la falsa lectura de una persona maldita. ‘La misma’ refleja αὐτοῦ con énfasis y sigue el ajuste revisado del audit trail.
theological_decisions:
- issue: Relación entre la salvación final y el término κατάθεμα
  english_pob_reading: saved by the curse itself
  chosen_spanish_reading: serán salvados por la misma maldición
  alternative_spanish_readings:
  - serán salvados del mismo anatema
  - serán salvados desde bajo la maldición misma
  - serán salvados por el maldito mismo
  rationale: La revisión auditada corrige una lectura personalista errónea y obliga a mantener el sustantivo neutro ‘maldición’. El español debe preservar que el medio o contexto de salvación no es una persona maldita, sino la maldición misma, sin resolver en exceso la relación preposicional.
  doctrine_reference: Cristología y escatología del juicio en la Didaché; fidelidad al valor léxico de κατάθεμα y a la revisión textual auditada
- issue: Naturaleza del ‘fuego de la prueba’
  english_pob_reading: the fire of testing
  chosen_spanish_reading: el fuego de la prueba
  alternative_spanish_readings:
  - el fuego del juicio
  - el fuego de la tentación
  - la prueba ardiente
  rationale: No se debe convertir la imagen en una interpretación doctrinal cerrada. ‘Prueba’ mantiene la ambivalencia entre prueba, examen y refinamiento que el griego permite y que el contexto apocalíptico sugiere.
  doctrine_reference: Escatología y prueba perseverante en literatura cristiana primitiva
translation_notes:
  revision_awareness: Se siguió la revisión auditada que corrigió la mala lectura personal de κατάθεμα; la versión española evita cualquier sugerencia de que un ‘maldito’ sea el agente de la salvación. También se ajustó el final para reflejar de forma directa la relación preposicional del griego con ‘por la misma maldición’.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ y no hay necesidad de ‘Yahvé’ en este versículo.
  - ‘Fe’ se conserva de forma consistente con el valor de πίστις en el contexto.
  - La pasiva ‘serán salvados’ preserva la estructura del original sin introducir sujeto explícito.
  - La nota a pie de página está anclada explícitamente en el texto con [a].
