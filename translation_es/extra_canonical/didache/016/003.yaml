translation:
  language: es
  text: Porque en los últimos días se multiplicarán los falsos profetas y los corruptores, y las ovejas se convertirán en lobos, y el amor se convertirá en odio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πληθυνθήσονται
  english_pob_choice: will be multiplied
  chosen_spanish: se multiplicarán
  alternatives_spanish:
  - aumentarán
  - se incrementarán
  lexicon: πληθύνω
  rationale: Mantiene la idea de aumento notable y pasivo/futuro sin sobrecargar el español. 'Se multiplicarán' reproduce bien la intensidad del griego y la opción del inglés POB.
- source_word: οἱ ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_spanish: los falsos profetas
  alternatives_spanish:
  - los profetas falsos
  - los pseudoprofetas
  lexicon: ψευδοπροφήτης
  rationale: La expresión española estable y fiel es 'falsos profetas'; conserva el valor de falsedad doctrinal y no solo moral.
- source_word: οἱ φθορεῖς
  english_pob_choice: corrupters
  chosen_spanish: los corruptores
  alternatives_spanish:
  - los pervertidores
  - los destructores
  lexicon: φθορεύς
  rationale: '''Corruptores'' refleja el sentido de quienes arruinan o pervierten a otros. Se evita ''destructores'' porque puede estrechar indebidamente el campo semántico.'
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  - las ovejas del rebaño
  lexicon: πρόβατον
  rationale: Se conserva la imagen pastoral directa del griego y del inglés POB, sin explicitar 'rebaño' que no aparece en el texto.
- source_word: εἰς λύκους
  english_pob_choice: into wolves
  chosen_spanish: en lobos
  alternatives_spanish:
  - en cuanto a lobos
  - hasta volverse lobos
  lexicon: λύκος
  rationale: '''Se convertirán en lobos'' expresa con naturalidad el cambio de condición o conducta; ''en lobos'' es la forma más directa y fiel al giro griego de transformación.'
- source_word: ἡ ἀγάπη
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la caridad
  - el afecto
  lexicon: ἀγάπη
  rationale: '''Amor'' es la equivalencia más amplia y transparente en español. ''Caridad'' estrecha el alcance y puede sonar eclesiástico en un sentido no requerido por el texto.'
- source_word: εἰς μῖσος
  english_pob_choice: into hatred
  chosen_spanish: en odio
  alternatives_spanish:
  - hasta el odio
  - para odio
  lexicon: μῖσος
  rationale: '''En odio'' conserva la transformación resultante con naturalidad en español y sigue la estructura de ''en lobos''.'
theological_decisions:
- issue: Identidad de 'los corruptores' como amenaza moral y comunitaria
  english_pob_reading: corrupters
  chosen_spanish_reading: corruptores
  alternative_spanish_readings:
  - pervertidores
  - destructores
  rationale: El griego φθορεῖς puede abarcar quienes corrompen, arruinan o pervierten. 'Corruptores' preserva esa amplitud sin decidir de más sobre el mecanismo de daño.
  doctrine_reference: Advertencia moral escatológica en Didaché 16:3
- issue: 'Metáforas de transformación: ovejas a lobos, amor a odio'
  english_pob_reading: the sheep will be turned into wolves, and love will be turned into hatred
  chosen_spanish_reading: las ovejas se convertirán en lobos, y el amor se convertirá en odio
  alternative_spanish_readings:
  - las ovejas serán vueltas lobos, y el amor será vuelto odio
  - las ovejas pasarán a ser lobos, y el amor pasará a ser odio
  rationale: La formulación elegida conserva la imagen fuerte de cambio radical sin suavizarla. En español, 'se convertirán en' es la forma más natural para la transformación resultante del griego στραφήσονται.
  doctrine_reference: Lenguaje apocalíptico y admonitorio de la Didaché
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio necesario; el presente borrador sigue de cerca el texto griego normalizado y la traducción inglesa POB, sin introducir notas por ausencia de variantes o ambigüedades editoriales documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece ningún nombre divino explícito.
  - Se usa 'amor' para ἀγάπη por coherencia con el breve enunciado escatológico y por ser la opción más natural en español.
  - Se conserva la estructura paralela del verso con tres miembros coordinados y futuro pasivo/medio en español natural.
