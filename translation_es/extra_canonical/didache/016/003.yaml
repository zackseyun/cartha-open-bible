  text: Ἐν γὰρ ταῖς ἐσχάταις ἡμέραις πληθυνθήσονται οἱ ψευδοπροφῆται καὶ οἱ φθορεῖς καὶ στραφήσονται τὰ πρόβατα εἰς λύκους καὶ ἡ ἀγάπη στραφήσεται εἰς μῖσος·
