  glossary_alignment: No hay términos del glosario principal en conflicto. «Almas» para ψυχαῖς y «perfeccionados» para τελειωθῆτε concuerdan con la evidencia y con la decisión inglesa auditada. La principal cuestión es de estilo meta en español, no de terminología teológica.
