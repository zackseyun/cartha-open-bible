  to: Y reúnanse con frecuencia, buscando las cosas que convienen a sus almas; pues todo el tiempo de su fe no les aprovechará, si no son perfeccionados en el último tiempo.
  rationale: La revisión mantiene el sentido fuente intacto pero adapta el texto al español neutral latinoamericano exigido por el proyecto. Se reemplazan formas de vosotros por formas ampliamente legibles en América Latina, y se elige «reúnanse» como equivalente más natural de συναχθήσεσθε. Se conserva «perfeccionados» para reflejar τελειωθῆτε y «último tiempo» para seguir de cerca ἐσχάτῳ καιρῷ.
