id: DID.16.2
reference: Didache 16:2
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Πυκνῶς δὲ συναχθήσεσθε ζητοῦντες τὰ ἀνήκοντα ταῖς ψυχαῖς ὑμῶν· οὐ γὰρ ὠφελήσει ὑμᾶς ὁ πᾶς χρόνος τῆς πίστεως ὑμῶν, ἐὰν μὴ ἐν τῷ ἐσχάτῳ καιρῷ τελειωθῆτε.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/016/002.yaml
  text: And gather together often, seeking the things that are fitting for your souls; for the whole time of your faith will not profit you unless you are perfected in the last time.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:35Z'
    unchanged: false
    changes_summary: Changed 'made complete' to 'perfected' for closer alignment with τελειωθῆτε, and 'last season' to 'last time' for more natural and accurate rendering of ἐσχάτῳ καιρῷ. Also corrected punctuation spacing before the semicolon.
translation:
  language: es
  text: Y reúnanse con frecuencia, buscando las cosas que convienen a sus almas; pues todo el tiempo de su fe no les aprovechará, si no son perfeccionados en el último tiempo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πυκνῶς δὲ συναχθήσεσθε
  english_pob_choice: And gather together often
  chosen_spanish: Y congregaos con frecuencia
  alternatives_spanish:
  - Y reuníos a menudo
  - Y juntaos con frecuencia
  lexicon: πυκνῶς; συνάγω
  rationale: Convey frequency with natural Spanish and preserve the exhortation to assemble. «Congregaos» fits ecclesial gathering without adding later church-specific doctrine.
- source_word: ζητοῦντες τὰ ἀνήκοντα ταῖς ψυχαῖς ὑμῶν
  english_pob_choice: seeking the things that are fitting for your souls
  chosen_spanish: buscando las cosas que convienen a vuestras almas
  alternatives_spanish:
  - buscando lo que es apropiado para vuestras almas
  - buscando las cosas que pertenecen a vuestras almas
  lexicon: ζητέω; ἀνήκοντα; ψυχή
  rationale: «Convienen» preserves the notion of what is fitting/appropriate. «Almas» keeps ψυχαῖς as the person in its inward/life sense, matching the English audit trail while remaining idiomatic.
- source_word: οὐ γὰρ ὠφελήσει ὑμᾶς
  english_pob_choice: for the whole time ... will not profit you
  chosen_spanish: porque todo el tiempo de vuestra fe no os aprovechará
  alternatives_spanish:
  - pues todo el tiempo de vuestra fe no os beneficiará
  - porque todo el tiempo de vuestra fe no os servirá
  lexicon: ὠφελέω; πᾶς χρόνος
  rationale: «Aprovechará» is a direct, dignified rendering of profit/help that works well in Spanish and keeps the negative force of οὐ ... ὠφελήσει.
- source_word: ὁ πᾶς χρόνος τῆς πίστεως ὑμῶν
  english_pob_choice: the whole time of your faith
  chosen_spanish: todo el tiempo de vuestra fe
  alternatives_spanish:
  - todo el período de vuestra fe
  - la totalidad de vuestro tiempo de fe
  lexicon: πᾶς χρόνος; πίστις
  rationale: Retains the temporal scope and the noun «fe» without over-expanding its sense; the phrase remains broad enough to include the whole span of faithful life.
- source_word: ἐὰν μὴ ἐν τῷ ἐσχάτῳ καιρῷ
  english_pob_choice: unless you are perfected in the last time
  chosen_spanish: si no sois perfeccionados en el último tiempo
  alternatives_spanish:
  - si no sois perfeccionados en el tiempo final
  - a menos que seáis perfeccionados en el último tiempo
  lexicon: ἐὰν μή; ἐσχάτῳ καιρῷ; τελειόω
  rationale: «Perfeccionados» follows the revised English audit trail for τελειωθῆτε and preserves the passive result. «Último tiempo» mirrors the source closely and avoids importing an interpretive eschatological label.
theological_decisions:
- issue: Meaning of τελειωθῆτε as completion/perfection
  english_pob_reading: you are perfected
  chosen_spanish_reading: sois perfeccionados
  alternative_spanish_readings:
  - sois hechos completos
  - llegáis a la perfección
  rationale: The Greek passive allows a completion/perfection sense; the audited English revision selected 'perfected'. Spanish «perfeccionados» preserves that lexical tension without narrowing it to moral flawlessness or merely logistical completion.
  doctrine_reference: Sanctification / eschatological completion
translation_notes:
  revision_awareness: The Spanish draft follows the latest audited English revision that changed 'made complete' to 'perfected' and 'last season' to 'last time'. It also preserves the earlier stable rendering of 'the things that are fitting for your souls' and the exhortation to gather together often, while aligning the final clause more closely with τελειωθῆτε and ἐσχάτῳ καιρῷ.
  spanish_consistency_notes:
  - Usa «Yahvé» only when the source explicitly warrants the divine name; this verse does not.
  - Mantiene «fe» para πίστις y no introduce «confianza» u այլ equivalentes no attestados.
  - «Almas» se usa en sentido antropológico amplio, no como sustituto doctrinal de «vida».
  - El orden y la puntuación reflejan una cláusula exhortativa seguida de una razón causal, en paralelo con el texto griego y el audit trail inglés.
