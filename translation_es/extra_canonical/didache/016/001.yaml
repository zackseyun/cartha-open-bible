translation:
  language: es
  text: 'Velen sobre su vida. No dejen que sus lámparas se apaguen, ni que sus lomos se aflojen, sino estén preparados, porque no saben la hora en que viene nuestro Señor. Y reúnanse con frecuencia, buscando las cosas que son convenientes para sus almas; porque todo el tiempo de su fe no les aprovechará si no son hechos completos en el último tiempo. Porque en los últimos días se multiplicarán los falsos profetas y los corruptores, y las ovejas se convertirán en lobos, y el amor se convertirá en odio. Porque, al aumentar la iniquidad, se odiarán unos a otros, perseguirán y traicionarán; y entonces aparecerá el engañador del mundo como un hijo de Dios, y hará señales y prodigios; y la tierra será entregada en sus manos, y hará cosas ilícitas que nunca han sucedido desde que comenzó la era. Entonces la creación de los seres humanos vendrá al fuego de la prueba, y muchos tropezarán y perecerán, pero los que perseveren en su fe serán salvos por el propio anatema[g]. Y entonces aparecerán las
    señales de la verdad: primero, una señal de una abertura en el cielo; luego, una señal de voz de trompeta; y la tercera, la resurrección de los muertos; no de todos, sin embargo, sino como se dijo: El Señor vendrá, y todos los santos con él. Entonces el mundo verá al Señor viniendo sobre las nubes del cielo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: g
    text: La expresión griega transmitida es muy difícil y posiblemente corrupta; por eso se ha conservado una redacción sobria que no resuelva de más el problema textual.
    reason: textual_variant
lexical_decisions:
- source_word: Γρηγορεῖτε
  english_pob_choice: Keep watch
  chosen_spanish: Velen
  alternatives_spanish:
  - Estén vigilantes
  - Manténganse despiertos
  lexicon: BDAG
  rationale: El imperativo pide vigilancia activa y continua. «Velen» conserva el tono exhortativo y escatológico mejor que una simple idea de estar despiertos.
- source_word: ὑπὲρ τῆς ζωῆς ὑμῶν
  english_pob_choice: over your life
  chosen_spanish: sobre su vida
  alternatives_spanish:
  - por su vida
  - acerca de su vida
  lexicon: BDAG
  rationale: La preposición expresa un cuidado protector; «sobre su vida» mantiene la imagen de vigilancia que cubre y protege la vida.
- source_word: οἱ λύχνοι ὑμῶν μὴ σβεσθήτωσαν
  english_pob_choice: Do not let your lamps be quenched
  chosen_spanish: No dejen que sus lámparas se apaguen
  alternatives_spanish:
  - No permitan que sus lámparas sean extinguidas
  - No dejen apagar sus lámparas
  lexicon: BDAG
  rationale: En español, «apagarse» transmite con naturalidad la imagen de una luz extinguida sin perder la advertencia moral.
- source_word: αἱ ὀσφύες ὑμῶν μὴ ἐκλυέσθωσαν
  english_pob_choice: do not let your loins be loosened
  chosen_spanish: ni que sus lomos se aflojen
  alternatives_spanish:
  - ni que sus lomos se relajen
  - ni que su cintura se afloje
  lexicon: BDAG
  rationale: «Lomos» conserva la metáfora corporal tradicional del texto, y «aflojen» refleja con claridad la idea de desentenderse o perder preparación.
- source_word: Πυκνῶς
  english_pob_choice: often
  chosen_spanish: con frecuencia
  alternatives_spanish:
  - a menudo
  - frecuentemente
  lexicon: BDAG
  rationale: La expresión indica repetición sin fijar una institución o calendario específico; «con frecuencia» es natural y precisa.
- source_word: τὰ ἀνήκοντα
  english_pob_choice: the things that are fitting
  chosen_spanish: las cosas que son convenientes
  alternatives_spanish:
  - las cosas que son apropiadas
  - lo que conviene
  lexicon: BDAG
  rationale: «Convenientes» preserva la idea de lo que corresponde o es adecuado para el bien espiritual, sin reducirlo a mera utilidad.
- source_word: τελειωθῆτε
  english_pob_choice: are made complete
  chosen_spanish: son hechos completos
  alternatives_spanish:
  - son perfeccionados
  - llegan a la plenitud
  lexicon: BDAG
  rationale: La completitud/perfección debe quedar visible; «hechos completos» mantiene la idea sin forzar un tecnicismo posterior.
- source_word: ἐσχάτῳ καιρῷ
  english_pob_choice: the last season
  chosen_spanish: el último tiempo
  alternatives_spanish:
  - la última temporada
  - el tiempo final
  lexicon: BDAG
  rationale: «Tiempo» comunica naturalmente el kairos decisivo y evita un calco duro de «season», manteniendo el carácter escatológico.
- source_word: φθορεῖς
  english_pob_choice: corrupters
  chosen_spanish: los corruptores
  alternatives_spanish:
  - los corruptores
  - los destructores
  lexicon: BDAG
  rationale: «Corruptores» conserva el valor activo de quienes corrompen moral o espiritualmente, siguiendo la elección del POB inglés.
- source_word: ὁ κοσμοπλάνος
  english_pob_choice: the world-deceiver
  chosen_spanish: el engañador del mundo
  alternatives_spanish:
  - el seductor del mundo
  - el engañador mundial
  lexicon: Lampe
  rationale: 'La forma compuesta se vuelve más natural en español como genitivo explicativo: «del mundo», sin perder la fuerza apocalíptica del término.'
- source_word: ὡς υἱὸς Θεοῦ
  english_pob_choice: as a son of God
  chosen_spanish: como un hijo de Dios
  alternatives_spanish:
  - como el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el artículo indefinido para no adjudicar al impostor el título pleno y único, manteniendo la imitación blasfema del original.
- source_word: ἀθέμιτα
  english_pob_choice: unlawful things
  chosen_spanish: cosas ilícitas
  alternatives_spanish:
  - cosas prohibidas
  - cosas injustas
  lexicon: BDAG
  rationale: «Ilícitas» expresa lo contrario de lo permitido o recto, con un registro claro y sobrio para español bíblico.
- source_word: ἐξ αἰῶνος
  english_pob_choice: since the age began
  chosen_spanish: desde que comenzó la era
  alternatives_spanish:
  - desde siempre
  - desde el comienzo del mundo
  lexicon: BDAG
  rationale: La frase busca un equivalente natural que conserve el sentido de antigüedad primordial sin volverla demasiado idiomática o demasiado literal.
- source_word: ἡ κτίσις τῶν ἀνθρώπων
  english_pob_choice: the human race
  chosen_spanish: la creación de los seres humanos
  alternatives_spanish:
  - la raza humana
  - el género humano
  lexicon: BDAG
  rationale: El sintagma griego es inusual; «creación de los seres humanos» conserva la rareza y evita resolver de manera prematura una posible ambigüedad textual.
- source_word: πύρωσιν τῆς δοκιμασίας
  english_pob_choice: the fire of testing
  chosen_spanish: el fuego de la prueba
  alternatives_spanish:
  - el fuego del examen
  - la prueba ardiente
  lexicon: BDAG
  rationale: La imagen mezcla fuego y prueba; «fuego de la prueba»/«fuego de la prueba» en español puede sonar rígido, así que «fuego de la prueba» se mantiene en una forma muy transparente.
- source_word: σκανδαλισθήσονται
  english_pob_choice: will be caused to stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - serán hechos tropezar
  - caerán en tropiezo
  lexicon: BDAG
  rationale: El verbo de tropiezo puede sonar pesado en español si se literaliza; «tropezarán» conserva la imagen y permite inferir el sentido de caída espiritual.
- source_word: καταθέματος
  english_pob_choice: the accursed one
  chosen_spanish: el propio anatema
  alternatives_spanish:
  - la maldición misma
  - el maldito mismo
  lexicon: LSJ
  rationale: El término transmitido es difícil y quizá corrupto. Se preserva una formulación formal que señale la rareza textual sin normalizarla excesivamente.
- source_word: ἐκπετάσεως
  english_pob_choice: an opening out
  chosen_spanish: una abertura
  alternatives_spanish:
  - un desplegarse
  - una expansión
  lexicon: LSJ
  rationale: En español, «abertura» comunica el gesto visual de apertura en el cielo sin cargar la imagen con interpretaciones específicas.
- source_word: ἅγιοι
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los consagrados
  - los santos de Dios
  lexicon: BDAG
  rationale: Aquí la expresión ya está consolidada en español bíblico y corresponde bien al grupo escatológico de los apartados para Dios.
theological_decisions:
- issue: Imperativo de vigilancia escatológica
  english_pob_reading: Keep watch over your life.
  chosen_spanish_reading: Velen sobre su vida.
  alternative_spanish_readings:
  - Estén vigilantes sobre su vida.
  - Permanezcan atentos sobre su vida.
  rationale: La exhortación combina vigilancia moral y expectativa del Señor que viene. «Velen» mantiene el peso pastoral y escatológico sin suavizarlo.
  doctrine_reference: Sobriedad y vigilancia en la esperanza final
- issue: Título del impostor escatológico
  english_pob_reading: the world-deceiver will appear as a son of God
  chosen_spanish_reading: aparecerá el engañador del mundo como un hijo de Dios
  alternative_spanish_readings:
  - aparecerá el engañador del mundo como el Hijo de Dios
  rationale: La lectura griega anartrosa permite una formulación indefinida; conservarla evita conferir al impostor el título cristológico pleno.
  doctrine_reference: Cristología y falsificación apocalíptica
- issue: Phrasing of ὑπ᾽ αὐτοῦ τοῦ καταθέματος
  english_pob_reading: saved by the curse itself
  chosen_spanish_reading: serán salvos por el propio anatema
  alternative_spanish_readings:
  - serán salvos por la maldición misma
  - serán salvos por el propio maldito
  rationale: La expresión transmitida es textualmente difícil. Se conserva su aspereza en español para no ocultar la posible corrupción o ambigüedad del texto.
  doctrine_reference: Crítica textual y transparencia traductora
- issue: Reference to the resurrection of the dead
  english_pob_reading: the resurrection of the dead—yet not of all
  chosen_spanish_reading: la resurrección de los muertos; no de todos, sin embargo
  alternative_spanish_readings:
  - la resurrección de los muertos; pero no de todos
  rationale: La exclusión parcial debe quedar explícita; el texto distingue una resurrección no universal en este contexto apocalíptico.
  doctrine_reference: Escatología de juicio y resurrección
- issue: Allusion to the Lord coming with all the holy ones
  english_pob_reading: The Lord will come, and all the holy ones with him.
  chosen_spanish_reading: El Señor vendrá, y todos los santos con él.
  alternative_spanish_readings:
  - Yahvé vendrá, y todos los santos con él.
  - El Señor vendrá con todos los santos
  rationale: La cita introducida en el texto griego se formula de manera reconocible en español, manteniendo la referencia al retorno del Señor con sus santos.
  doctrine_reference: Parusía y reunión de los santos
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió “the human race” por naturalidad. En español se optó por conservar la rareza del sintagma griego como «la creación de los seres humanos», porque el POB español debe permanecer más pegado al valor auditado del original y no borrar la ambigüedad del giro.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» reservado para el tetragrámaton; aquí, como el texto dice κύριος, se tradujo consistentemente «el Señor».
  - Se usó «santos» para ἅγιοι, en línea con el POB inglés y con la convención bíblica española clara y reconocible.
  - Se evitó «Cristo» porque no aparece en el griego de este pasaje; la mención es al Señor que viene, no al título mesiánico.
