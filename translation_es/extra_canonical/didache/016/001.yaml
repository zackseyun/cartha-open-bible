base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/016/001.yaml
  text: 'Keep watch over your life.a Do not let your lamps be quenched, and do not let your loins be loosened,b but be ready, for you do not know the hour in which our Lord is coming. And gather together often, seeking the things that are fitting for your souls;c for the whole time of your faith will not profit you unless you are made complete in the last season. For in the last days false prophets and corrupters will be multiplied, and the sheep will be turned into wolves, and love will be turned into hatred. For as lawlessness increases, they will hate one another and persecute and betray, and then the world-deceiverd will appear as a son of Gode and will do signs and wonders, and the earth will be delivered into his hands, and he will do unlawful things such as have never happened since the age began. Then the human racef will come into the fire of testing, and many will be caused to stumble and will perish, but those who endure in their faith will be saved by the curse itself.g And then
    the signs of the truth will appear: first, a sign of an opening out in heaven;h then a sign of a trumpet''s voice; and the third, the resurrection of the dead—yet not of all, but as it was said: The Lord will come, and all the holy ones with him.i Then the world will see the Lord coming upon the clouds of heaven.j'
