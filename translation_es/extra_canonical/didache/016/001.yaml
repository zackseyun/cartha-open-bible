review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y el rastro de auditoría inglés en la mayor parte del versículo: vigilancia escatológica, lámparas, lomos, reunión frecuente, falsos profetas, engañador del mundo, ''como un hijo de Dios'', señales y prodigios, y la secuencia final de señales. Sin embargo, hay varios puntos donde el español no preserva con suficiente fidelidad o naturalidad las decisiones auditadas: ''sino estén preparados'' es gramaticalmente defectuoso; ''desde que comenzó la era'' suena poco natural en español bíblico; ''la creación de los seres humanos'' conserva la rareza pero resulta demasiado rígido frente a la revisión inglesa ya aprobada a ''the human race''; y sobre todo ''serán salvos por el propio anatema'' no refleja bien la decisión inglesa revisada (''by the curse itself'') ni produce un español claro. También conviene marcar con nota la dificultad de ''una abertura en el cielo'' y mantener la nota textual en el lugar exacto.'
  spanish_quality_summary: 'El registro general es digno y entendible, pero hay varios giros poco naturales o demasiado literales para español eclesial amplio: ''sobre su vida'' es aceptable pero algo duro; ''sino estén preparados'' debe repararse; ''son hechos completos'' es comprensible pero pesado; ''la creación de los seres humanos'' y ''el propio anatema'' dañan la legibilidad. Con ajustes menores, el texto puede quedar fiel y más natural sin perder transparencia textual.'
  glossary_alignment: 'No hay choques graves con el glosario del proyecto. ''Señor'' para κύριος es admisible aquí porque el texto fuente griego dice ὁ Κύριος, no el Tetragrámaton hebreo directo. ''Como un hijo de Dios'' preserva correctamente la decisión teológica. ''Los santos'' es una excepción razonable aunque ''los santos'' estrecha algo frente a ''los santos/los consagrados/los santos'' del inglés; en esta cita es aceptable. El principal problema terminológico es καταθέματος: ''anatema'' en español puede sugerir una categoría eclesiástica fija y no representa bien la opción inglesa revisada.'
  issues:
  - severity: medium
    issue: 'Construcción defectuosa: ''sino estén preparados'''
    rationale: Tras 'No dejen...' la coordinación natural e idiomática es 'sino estén preparados' -> 'sino estén preparados' suena a error; debe ser 'sino estén preparados' con reestructuración, por ejemplo 'más bien, estén preparados' o 'sino que estén preparados'.
  - severity: medium
    issue: '''Desde que comenzó la era'' suena forzado y poco natural'
    rationale: Aunque intenta reflejar ἐξ αἰῶνος, en español bíblico amplio suena extraño. 'desde el comienzo de los siglos' o 'desde el comienzo del mundo/desde antiguo' sería más natural; para seguir de cerca la auditoría inglesa sin rareza innecesaria, 'desde el comienzo de los siglos' funciona bien.
  - severity: medium
    issue: '''La creación de los seres humanos'' es demasiado rígido en español'
    rationale: El inglés auditado fue revisado a 'the human race' por naturalidad. En español, 'la raza humana' o 'el género humano' comunica mejor el sentido sin crear una oscuridad excesiva. Dado que la revisión inglesa ya resolvió este punto a favor de claridad, el español debe acompañarla.
  - severity: high
    issue: '''Serán salvos por el propio anatema'' no es fiel ni claro'
    rationale: La auditoría inglesa vigente dice 'saved by the curse itself' y la nota explica la dificultad textual. 'anatema' no refleja bien esa elección, y 'propio anatema' suena opaco y teológicamente confuso. Debe cambiarse a 'por la maldición misma' o equivalente, con nota textual.
  - severity: low
    issue: Falta nota para la dificultad de ἐκπετάσεως
    rationale: La auditoría inglesa conserva nota para 'an opening out'. En español, 'una abertura' también es semánticamente incierta; conviene una nota breve para preservar la transparencia de una palabra rara.
  revised_spanish_text: 'Velen sobre su vida.[a] No dejen que sus lámparas se apaguen, ni que sus lomos se aflojen,[b] más bien, estén preparados, porque no saben la hora en que viene nuestro Señor. Y reú nanse con frecuencia, buscando lo que es apropiado para sus almas;[c] porque todo el tiempo de su fe no les aprovechará si no son llevados a la plenitud en el tiempo final. Porque en los últimos días se multiplicarán los falsos profetas y los corruptores, y las ovejas se convertirán en lobos, y el amor se convertirá en odio. Porque, al aumentar la iniquidad, se odiarán unos a otros, perseguirán y traicionarán; y entonces aparecerá el engañador del mundo[d] como un hijo de Dios,[e] y hará señales y prodigios; y la tierra será entregada en sus manos, y hará cosas ilícitas que nunca han sucedido desde el comienzo de los siglos. Entonces la raza humana[f] vendrá al fuego de la prueba, y muchos tropezarán y perecerán, pero los que perseveren en su fe serán salvos por la maldición misma.[g] Y
    entonces aparecerán las señales de la verdad: primero, una señal de una abertura en el cielo;[h] luego, una señal de voz de trompeta; y la tercera, la resurrección de los muertos; no de todos, sin embargo, sino como se dijo: El Señor vendrá, y todos los santos con él. Entonces el mundo verá al Señor viniendo sobre las nubes del cielo.'
  revised_footnotes:
  - marker: a
    text: O 'por su vida'. La preposición griega puede expresar vigilancia protectora; aquí se conserva la imagen de velar sobre la propia vida.
    reason: lexical
  - marker: b
    text: Lit. 'no dejen que sus lomos se aflojen'. La imagen corporal expresa disposición y preparación continua.
    reason: lexical
  - marker: c
    text: O 'las cosas que son apropiadas' o 'lo que conviene'. El griego apunta a lo que corresponde o es fitting para el bien de sus almas.
