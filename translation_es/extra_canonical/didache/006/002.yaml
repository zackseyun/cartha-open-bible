  text: Εἰ μὲν γὰρ δύνασαι βαστάσαι ὅλον τὸν ζυγὸν τοῦ Κυρίου, τέλειος ἔσῃ· εἰ δʼ οὐ δύνασαι, ὃ δύνῃ τοῦτο ποίει.
