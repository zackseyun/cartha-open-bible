base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/006/002.yaml
  text: For if you are able to bear the whole yoke of the Lord, you will be perfect; but if you are not able, do what you can.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:34Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque si puedes llevar todo el yugo del Señor, serás perfecto; pero si no puedes, haz lo que puedas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βαστάσαι
  english_pob_choice: bear
  chosen_spanish: llevar
  alternatives_spanish:
  - soportar
  - cargar
  lexicon: βαστάζω
  rationale: El griego expresa ‘llevar/portar’ una carga; en español, ‘llevar’ comunica naturalmente la imagen del yugo sin introducir el matiz de resistencia que puede tener ‘soportar’.
- source_word: ζυγὸν
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - yunta
  - jugo
  lexicon: ζυγός
  rationale: ‘Yugo’ es el equivalente directo y conserva la metáfora agrícola y disciplinaria del original.
- source_word: τοῦ Κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: κύριος
  rationale: Aquí el texto griego usa κύριος sin una cita explícita del nombre divino; se conserva ‘Señor’ como traducción natural y tradicional de esta forma en contexto cristiano, sin forzar ‘Yahvé’ donde el audit trail no lo documenta explícitamente.
- source_word: τέλειος
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - maduro
  lexicon: τέλειος
  rationale: ‘Perfecto’ mantiene la fuerza teleológica del griego y coincide con la traducción inglesa auditada; ‘maduro’ suavizaría el término, pero aquí la sentencia depende de la idea de plenitud/integidad.
- source_word: ὃ δύνῃ τοῦτο ποίει
  english_pob_choice: do what you can
  chosen_spanish: haz lo que puedas
  alternatives_spanish:
  - haz eso que puedes
  - haz lo que seas capaz de hacer
  lexicon: δύναμαι / ποιέω
  rationale: La construcción griega significa literalmente ‘lo que puedes, esto haz’. ‘Haz lo que puedas’ reproduce fielmente el sentido idiomático en español y conserva el límite de capacidad del original.
theological_decisions:
- issue: Relación entre obediencia plena y capacidad limitada
  english_pob_reading: If you are able to bear the whole yoke...; but if you are not able, do what you can.
  chosen_spanish_reading: Si puedes llevar todo el yugo del Señor, la respuesta es plenitud; si no puedes, debes hacer lo que puedas.
  alternative_spanish_readings:
  - Si puedes soportar todo el yugo del Señor...
  - Si no puedes, haz sólo lo que te sea posible.
  rationale: El dicho mantiene una tensión pastoral entre el ideal total (‘todo el yugo’) y la concesión a la capacidad real (‘haz lo que puedas’). La traducción debe preservar ambas partes sin convertirlas en dos mandatos independientes ni borrar la concesión final.
  doctrine_reference: Didaché 6:2; ética de discipulado y medida de capacidad humana en la instrucción moral cristiana primitiva
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el texto fuente y con la auditoría inglesa; no se registran revisiones aplicadas ni variantes textuales relevantes en el expediente proporcionado.
  spanish_consistency_notes:
  - Se mantiene ‘Señor’ para κύριος en coherencia con el contexto cristiano inmediato del dicho.
  - Se conserva la metáfora de ‘yugo’ sin explicitarla, porque el español la entiende de manera natural y el original no la desarrolla más.
  - ‘Perfecto’ se deja sin glosa para no debilitar el valor terminológico de τέλειος.
