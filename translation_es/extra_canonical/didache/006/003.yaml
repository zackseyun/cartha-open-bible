source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Περὶ δὲ τῆς βρώσεως, ὃ δύνασαι βάστασον· ἀπὸ δὲ τοῦ εἰδωλοθύτου λίαν πρόσεχε· λατρεία γάρ ἐστι θεῶν νεκρῶν.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/006/003.yaml
  text: And concerning food, bear what you are able; but be very careful about food sacrificed to idols, for it is the worship of dead gods.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:35Z'
    unchanged: false
    changes_summary: Replaced the awkward 'be strictly on guard against what is sacrificed to idols' with the more natural and precise 'be very careful about food sacrificed to idols,' making the object explicit from the Greek context while preserving the formal sense.
translation:
  language: es
  text: Y en cuanto a la comida, soporta lo que puedas; pero ten mucho cuidado con la comida sacrificada a los ídolos, porque es la adoración de dioses muertos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: βρώσεως
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - comida
  lexicon: βρῶσις
  rationale: El griego usa un término general para comida/alimento. «Comida» suena natural en español y conserva el sentido general del pasaje, sin volverlo técnico.
- source_word: βάστασον
  english_pob_choice: bear what you are able
  chosen_spanish: soporta lo que puedas
  alternatives_spanish:
  - lleva lo que puedas
  - aguanta lo que puedas
  lexicon: βαστάζω
  rationale: El verbo expresa cargar/soportar. «Soporta lo que puedas» mantiene la idea de aceptar o tolerar el límite propio, con español claro y sobrio.
- source_word: εἰδωλοθύτου
  english_pob_choice: food sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - comida sacrificada a los ídolos
  - lo ofrecido a los ídolos
  lexicon: εἰδωλόθυτον
  rationale: El sustantivo designa lo sacrificado a ídolos. En el flujo del versículo, el antecedente es comida; por eso se puede omitir «comida» en la frase principal, pero se conserva en una posible alternativa por claridad.
- source_word: θεῶν νεκρῶν
  english_pob_choice: dead gods
  chosen_spanish: dioses muertos
  alternatives_spanish:
  - dioses sin vida
  - ídolos muertos
  lexicon: θεός
  rationale: Se mantiene la dureza de la expresión original y de la traducción inglesa auditada. «Dioses muertos» reproduce el contraste polémico sin suavizarlo.
theological_decisions:
- issue: Referencia a alimentos sacrificados a ídolos
  english_pob_reading: be very careful about food sacrificed to idols
  chosen_spanish_reading: cuídate mucho de lo sacrificado a los ídolos
  alternative_spanish_readings:
  - ten mucho cuidado con la comida sacrificada a los ídolos
  - guárdate de lo ofrecido a los ídolos
  rationale: La advertencia debe sonar preventiva y fuerte, como en el griego y en la revisión inglesa, sin introducir un matiz más jurídico del necesario.
  doctrine_reference: ídolos y culto falso; pureza en la participación alimentaria
- issue: Caracterización del culto idolátrico
  english_pob_reading: it is the worship of dead gods
  chosen_spanish_reading: porque es la adoración de dioses muertos
  alternative_spanish_readings:
  - porque es el culto de dioses muertos
  - pues es adoración de ídolos muertos
  rationale: Se conserva la identificación explícita entre lo sacrificado a ídolos y la adoración idolátrica. «Adoración» responde bien a λατρεία y mantiene el peso teológico del texto.
  doctrine_reference: idolatría como culto indebido
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió una formulación más rígida e idiomáticamente extraña para hacer explícito que el objeto es la comida asociada con sacrificio a ídolos. La redacción española sigue esa decisión auditada con una construcción natural y precisa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «ídolos» y no terminología eclesiástica tradicional más amplia, porque el griego habla de εἰδωλόθυτον y λατρεία en un contexto de polémica idolátrica.
  - Se conserva el tono exhortativo breve del original, sin expandirlo con explicaciones pastorales.
