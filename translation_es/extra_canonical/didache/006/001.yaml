translation:
  language: es
  text: Mira que nadie te [a]desvíe de este camino de la enseñanza, porque te enseña aparte de Dios. Porque si puedes llevar todo el yugo del Señor, serás perfecto; pero si no puedes, haz lo que puedas. Y en cuanto a la comida, soporta lo que puedas; pero guárdate con suma atención de lo sacrificado a los ídolos, porque es culto de dioses muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Desvíe» conserva la idea de apartar del camino; también podría traducirse «te engañe» o «te haga errar».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅρα
  english_pob_choice: See that
  chosen_spanish: Mira que
  alternatives_spanish:
  - Cuida que
  - Vigila que
  lexicon: LSJ
  rationale: Conserva el tono imperativo de vigilancia de manera natural en español, sin perder la fuerza admonitoria del griego.
- source_word: πλανήσῃ
  english_pob_choice: leads you astray
  chosen_spanish: desvíe
  alternatives_spanish:
  - te engañe
  - te haga errar
  lexicon: BDAG
  rationale: «Desvíe» mantiene la imagen de apartarse del camino y funciona bien con «camino de la enseñanza».
- source_word: ὁδός
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - senda
  - vía
  lexicon: BDAG
  rationale: «Camino» es la equivalencia más natural y preserva la imagen moral y catequética del original.
- source_word: διδαχή
  english_pob_choice: the teaching
  chosen_spanish: la enseñanza
  alternatives_spanish:
  - la instrucción
  - la doctrina
  lexicon: BDAG
  rationale: «Enseñanza» mantiene el sentido concreto de catequesis sin cargar el término con un tecnicismo posterior.
- source_word: παρεκτὸς Θεοῦ
  english_pob_choice: apart from God
  chosen_spanish: aparte de Dios
  alternatives_spanish:
  - fuera de Dios
  - sin Dios
  lexicon: LSJ
  rationale: «Aparte de Dios» refleja la frase preposicional con la misma reserva semántica que el inglés POB, sin especificar más de lo que el griego dice.
- source_word: βαστάσαι
  english_pob_choice: bear
  chosen_spanish: llevar
  alternatives_spanish:
  - soportar
  - cargar
  lexicon: BDAG
  rationale: «Llevar» transmite bien la imagen de cargar un yugo y su obligación práctica en español.
- source_word: ὅλον τὸν ζυγὸν τοῦ Κυρίου
  english_pob_choice: the whole yoke of the Lord
  chosen_spanish: todo el yugo del Señor
  alternatives_spanish:
  - el yugo entero del Señor
  - todo el yugo del Señor
  lexicon: BDAG
  rationale: Se conserva la metáfora del yugo disciplinario y la totalidad expresada por ὅλον, siguiendo el valor del inglés POB.
- source_word: τέλειος
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - maduro
  lexicon: BDAG
  rationale: Se mantiene la fuerza tradicional y concisa del término, dejando abierta la tensión entre perfección, madurez y plenitud.
- source_word: ὃ δύνῃ τοῦτο ποίει
  english_pob_choice: do what you can
  chosen_spanish: haz lo que puedas
  alternatives_spanish:
  - haz esto, cuanto puedas
  - haz todo lo que puedas
  lexicon: BDAG
  rationale: Es una formulación natural en español que conserva el impulso práctico de obedecer según la capacidad de cada uno.
- source_word: βρώσεως
  english_pob_choice: food
  chosen_spanish: la comida
  alternatives_spanish:
  - el comer
  - la alimentación
  lexicon: BDAG
  rationale: «Comida» es idiomático y suficientemente amplio para el contexto dietético del pasaje.
- source_word: βάστασον
  english_pob_choice: bear
  chosen_spanish: lleva
  alternatives_spanish:
  - soporta
  - carga
  lexicon: BDAG
  rationale: Mantiene la continuidad verbal con βαστάσαι y el matiz de asumir una carga según la capacidad.
- source_word: εἰδωλοθύτου
  english_pob_choice: what is sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - lo ofrecido a los ídolos
  - la carne sacrificada a los ídolos
  lexicon: BDAG
  rationale: Es una equivalencia clara y fiel del cultismo compacto griego, sin reducirlo a una sola especie de alimento.
- source_word: λίαν πρόσεχε
  english_pob_choice: be strictly on guard against
  chosen_spanish: guárdate con suma atención de
  alternatives_spanish:
  - mantente muy alerta respecto de
  - guárdate mucho de
  lexicon: LSJ
  rationale: Une la intensidad de λίαν con el imperativo de vigilar, en un español solemne y claro.
- source_word: λατρεία
  english_pob_choice: worship
  chosen_spanish: culto
  alternatives_spanish:
  - adoración
  - servicio religioso
  lexicon: BDAG
  rationale: «Culto» conserva el matiz de servicio/devoción ritual y evita precisar más de lo que el griego exige.
- source_word: θεῶν νεκρῶν
  english_pob_choice: dead gods
  chosen_spanish: dioses muertos
  alternatives_spanish:
  - dioses sin vida
  - ídolos muertos
  lexicon: BDAG
  rationale: «Dioses muertos» reproduce la dureza polémica del original y mantiene la tensión teológica sin suavizarla.
theological_decisions:
- issue: Sentido de παρεκτὸς Θεοῦ σε διδάσκει
  english_pob_reading: he teaches you apart from God
  chosen_spanish_reading: te enseña aparte de Dios
  alternative_spanish_readings:
  - te enseña fuera de Dios
  - te enseña sin Dios
  rationale: 'La formulación española reproduce la reserva del griego y del inglés auditado: no identifica con más precisión la desviación, solo afirma que la enseñanza queda al margen de Dios.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
- issue: Valor de τέλειος en la exhortación
  english_pob_reading: perfect
  chosen_spanish_reading: perfecto
  alternative_spanish_readings:
  - completo
  - maduro
  rationale: Se conserva la traducción fuerte y tradicional, dejando visible la posible resonancia de madurez o plenitud sin resolverla en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Referencia de θεῶν νεκρῶν
  english_pob_reading: dead gods
  chosen_spanish_reading: dioses muertos
  alternative_spanish_readings:
  - ídolos muertos
  - dioses sin vida
  rationale: La opción mantiene la formulación polémica del griego y del inglés POB, sin sustituirla por una explicación interpretativa que aplane la tensión del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo un ancla explícita [a] en el texto español, de modo que toda nota al pie esté vinculada a una palabra o frase presente en la traducción.
  spanish_consistency_notes:
  - Se usó «Yugo del Señor» para mantener la metáfora discipular sin reemplazarla por una paráfrasis.
  - Se prefirió «dioses muertos» en lugar de «ídolos» porque el griego y el inglés auditado preservan la dureza polémica de θεῶν νεκρῶν.
  - Se mantuvo un registro de español neutro y eclesiásticamente legible, evitando arcaísmos innecesarios.
