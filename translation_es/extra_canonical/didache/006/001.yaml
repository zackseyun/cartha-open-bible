  spanish_quality_summary: 'El texto es en general claro y digno, con buen registro eclesial moderno. Sin embargo, hay dos puntos de estilo/claridad que conviene reparar: 1) «Mira que» funciona, pero «Cuida que» o «Mira que» ambos valen; no exige cambio. 2) «lleva lo que puedas» en cuanto a la comida es impropio en español y puede sonar como ''transporta''. Una formulación como «soporta lo que puedas» o «hazte cargo de ello cuanto puedas» sería más comprensible; la opción más directa y fiel aquí es «soporta lo que puedas», aunque algo áspera, porque conserva la continuidad con βαστάζω.'
