  text: See that no one leads you astray from this way of the teaching, since he teaches you apart from God. For if you are able to bear the whole yoke of the Lord, you will be perfect; but if you are not able, do what you can. And concerning food, bear what you are able; but be strictly on guard against what is sacrificed to idols, for it is the worship of dead gods.
