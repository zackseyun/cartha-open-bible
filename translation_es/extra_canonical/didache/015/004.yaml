translation:
  language: es
  text: Pero en cuanto a sus oraciones, sus limosnas y todas sus obras, háganlas así[a], como lo tienen en el evangelio de nuestro Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Pero practiquen sus oraciones, sus actos de misericordia y todas sus obras de esta manera».
    reason: alternative_rendering_from_english_audit
lexical_decisions:
- source_word: Τὰς δὲ εὐχὰς ὑμῶν
  english_pob_choice: your prayers
  chosen_spanish: sus oraciones
  alternatives_spanish:
  - sus plegarias
  - sus rezos
  lexicon: εὐχή
  rationale: «Oraciones» comunica con claridad el sentido de εὐχάς en español bíblico y eclesial sin añadir matices no exigidos. Se conserva la referencia directa a la práctica de oración, tal como la frase frontaliza el objeto en griego.
- source_word: τὰς ἐλεημοσύνας
  english_pob_choice: your alms
  chosen_spanish: sus limosnas
  alternatives_spanish:
  - sus dádivas
  - sus actos de misericordia
  lexicon: ἐλεημοσύνη
  rationale: El contexto revisado del POB inglés fija el sentido concreto de dar a los pobres, y «limosnas» es el equivalente natural en español para esa práctica. «Actos de misericordia» sería demasiado amplio y perdería el valor específico de la palabra.
- source_word: πάσας τὰς πράξεις
  english_pob_choice: all your deeds
  chosen_spanish: todas sus obras
  alternatives_spanish:
  - todas sus acciones
  - todas sus obras hechas
  lexicon: πρᾶξις
  rationale: «Obras» reproduce bien el alcance general de πράξεις y mantiene el paralelismo con las dos expresiones anteriores. «Acciones» es posible, pero menos idiomático en este registro.
- source_word: οὕτω ποιήσατε
  english_pob_choice: do them in this way
  chosen_spanish: háganlas así
  alternatives_spanish:
  - procedan así
  - háganlo de este modo
  lexicon: ποιέω
  rationale: «Háganlas así» conserva el imperativo y la referencia a las tres acciones anteriores. La alternativa «procedan así» suena más interpretativa; «háganlo» sería menos preciso respecto de los elementos plurales listados.
- source_word: ἐν τῷ εὐαγγελίῳ τοῦ Κυρίου ἡμῶν
  english_pob_choice: in the gospel of our Lord
  chosen_spanish: en el evangelio de nuestro Señor
  alternatives_spanish:
  - en el evangelio de nuestro Señor Jesucristo
  - según el evangelio de nuestro Señor
  lexicon: εὐαγγέλιον
  rationale: Se mantiene la formulación breve y directa del POB inglés. «Evangelio» es el término estándar y fiel para εὐαγγέλιον; «nuestro Señor» respeta el genitivo sin introducir añadidos no presentes en el texto griego.
theological_decisions:
- issue: Alcance de ἐλεημοσύνη
  english_pob_reading: alms rather than general acts of mercy
  chosen_spanish_reading: limosnas en sentido de ayuda concreta a los pobres
  alternative_spanish_readings:
  - actos de misericordia
  - caridades
  rationale: La decisión sigue la revisión inglesa que precisó ἐλεημοσύνας como una forma concreta de dar. En español, «limosnas» preserva ese contenido práctico sin diluirlo en una categoría moral más amplia.
  doctrine_reference: Práctica de caridad/alivio al pobre en la ética cristiana primitiva
- issue: Mantenimiento del orden tópico del griego
  english_pob_reading: fronted objects followed by the imperative
  chosen_spanish_reading: «Pero en cuanto a…» con los complementos anticipados antes del verbo principal
  alternative_spanish_readings:
  - «Y sus oraciones… háganlas así»
  - «En cuanto a sus oraciones…»
  rationale: El griego coloca los objetos al inicio para enfatizarlos. La versión española conserva ese énfasis con una apertura topicalizadora y luego el imperativo, sin perder naturalidad.
  doctrine_reference: Retórica sintáctica del texto apostólico/primitivo
translation_notes:
  revision_awareness: La redacción toma en cuenta la última revisión inglesa aprobada, que prefirió «alms» frente a «acts of mercy» por mayor precisión del griego, y mantuvo la estructura topicalizada de la cláusula. No se introducen cambios adicionales de sentido.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí el texto dice «nuestro Señor», por lo que no aplica.
  - Se usa «evangelio» en sentido técnico y no se expande a «buena nueva», para mantener continuidad con el registro del POB.
  - Se mantiene el plural de tratamiento implícito en la serie de objetos y el imperativo plural español («háganlas»), coherente con el destinatario comunitario.
