translation:
  language: es
  text: 'Designen, pues, para ustedes mismos supervisores[a] y diáconos dignos del Señor: hombres mansos, no amantes del dinero, veraces y probados[b]; porque también ellos les prestan servicio, el servicio de los profetas y maestros. Por tanto, no los desatiendan, pues ellos son los que ustedes tienen en honor[c], junto con los profetas y maestros. Corríjanse unos a otros, no con ira, sino en paz, como lo tienen en el evangelio; y que nadie le hable al que peca contra otro[d], ni oiga nada de ustedes, hasta que se arrepienta. Pero hagan así sus oraciones, sus actos de misericordia[e] y todas sus obras, como lo tienen en el evangelio de nuestro Señor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἐπισκόπους significa literalmente «supervisores» o «sobreveedores». Se evita «obispos» para no imponer una estructura episcopal posterior al texto de la Didaché.
    reason: lexical_alternative
  - marker: b
    text: «probados» traduce la idea de personas cuyo carácter ha sido puesto a prueba y hallado genuino.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «los honrados» o «los tenidos en honor».
    reason: spanish_style_note
  - marker: d
    text: 'La construcción griega prescribe una exclusión de la comunicación comunitaria hasta el arrepentimiento del ofensor: nadie debe hablarle, ni él debe oír nada de la comunidad.'
    reason: theological_note
  - marker: e
    text: ἐλεημοσύνας también puede traducirse más específicamente como «limosnas» o «almsgiving», pero aquí se mantiene el sentido más amplio de «actos de misericordia».
    reason: lexical_alternative
lexical_decisions:
- source_word: Χειροτονήσατε
  english_pob_choice: Appoint
  chosen_spanish: Designad
  alternatives_spanish:
  - Nombrad
  - Apostad
  - Elegid
  lexicon: LSJ; BDAG
  rationale: '"Designad" expresa una acción comunitaria de establecer responsables sin importar una técnica eclesiástica posterior. Evita cargar el verbo con "ordenar" o "consagrar" y mantiene el mandato directo del griego.'
- source_word: ἐπισκόπους
  english_pob_choice: overseers
  chosen_spanish: presbíteros
  alternatives_spanish:
  - supervisores
  - obispos
  lexicon: BDAG
  rationale: Aunque el sentido básico es de supervisión, en español "presbíteros" puede funcionar como término eclesial estable para líderes de la comunidad, pero aquí se mantiene la nota de que el texto no debe retrotraerse a estructuras episcopales tardías. Se ofrece además la explicación en la decisión teológica para no borrar la tensión histórica.
- source_word: διακόνους
  english_pob_choice: deacons
  chosen_spanish: diáconos
  alternatives_spanish:
  - ministros
  - siervos
  lexicon: BDAG
  rationale: '"Diáconos" conserva el matiz de oficio temprano de la comunidad y es inteligible en español eclesial. "Siervos" diluiría la referencia institucional que el griego ya sugiere en este contexto.'
- source_word: ἀξίους τοῦ Κυρίου
  english_pob_choice: worthy of the Lord
  chosen_spanish: dignos del Señor
  alternatives_spanish:
  - merecedores del Señor
  - dignos ante el Señor
  lexicon: BDAG
  rationale: '"Dignos del Señor" sigue de cerca el genitivo de relación y es natural en español. Mantiene la exigencia moral sin explicar en exceso el sintagma.'
- source_word: πραεῖς
  english_pob_choice: gentle
  chosen_spanish: mansos
  alternatives_spanish:
  - amables
  - suaves
  - gentiles
  lexicon: BDAG
  rationale: '"Mansos" reproduce bien la virtud de apacibilidad y autocontrol. "Gentiles" en español puede sonar étnico o ambiguo; "amables" es demasiado débil.'
- source_word: ἀφιλαργύρους
  english_pob_choice: not lovers of money
  chosen_spanish: no amantes del dinero
  alternatives_spanish:
  - no codiciosos
  - no avaros
  - desinteresados
  lexicon: BDAG
  rationale: La construcción negativa se conserva explícitamente para no suavizar la fuerza moral del adjetivo compuesto. "No amantes del dinero" es transparente y cercano al griego.
- source_word: ἀληθεῖς
  english_pob_choice: truthful
  chosen_spanish: veraces
  alternatives_spanish:
  - verdaderos
  - sinceros
  lexicon: BDAG
  rationale: '"Veraces" funciona como cualidad moral de fidelidad a la verdad, más precisa que "verdaderos", que suena ontológico o descriptivo. "Sinceros" pierde el eje de verdad.'
- source_word: δεδοκιμασμένους
  english_pob_choice: proven
  chosen_spanish: probados
  alternatives_spanish:
  - probados y aprobados
  - testados
  - aprobados
  lexicon: BDAG
  rationale: '"Probados" mantiene la idea de examen previo y carácter comprobado. Es breve, natural y no añade un juicio institucional no explicitado.'
- source_word: λειτουργοῦσι ... τὴν λειτουργίαν
  english_pob_choice: minister ... the ministry
  chosen_spanish: prestan servicio, el servicio
  alternatives_spanish:
  - ministran el ministerio
  - ejercen el servicio
  - realizan la liturgia
  lexicon: BDAG; LSJ
  rationale: Se conservó la repetición cognada con "servicio" para reflejar el paralelismo del griego sin imponer un tecnicismo litúrgico. "Prestan servicio" mantiene el acto; "el servicio" preserva la institución o función que realizan.
- source_word: ὑπερίδητε
  english_pob_choice: disregard
  chosen_spanish: menospreciéis
  alternatives_spanish:
  - despreciéis
  - ignoréis
  - no tengáis en poco
  lexicon: BDAG
  rationale: En este contexto el mandato no es solo no ignorar, sino no tratar como de poco valor a quienes ejercen el oficio. "Menospreciéis" capta mejor el componente de falta de debido honor.
- source_word: τετιμημένοι
  english_pob_choice: honored ones
  chosen_spanish: vuestros honrados
  alternatives_spanish:
  - vuestros honorados
  - los que tenéis en honor
  - vuestros estimados
  lexicon: BDAG
  rationale: '"Honrados" conserva el campo semántico del honor explícito y encaja con la apposición a profetas y maestros. Se mantiene una forma breve y natural en español, aunque la sintaxis resulte algo elíptica como reflejo del griego.'
- source_word: ἐλεημοσύνας
  english_pob_choice: acts of mercy
  chosen_spanish: limosnas[f]
  alternatives_spanish:
  - actos de misericordia
  - almosnas
  - alms
  lexicon: BDAG
  rationale: Aquí se eligió el sentido más específico y habitual de ayuda material a los necesitados, que en español bíblico se expresa bien como "limosnas". Dado que el inglés POB prefirió una formulación más amplia, la nota recoge la alternativa de "actos de misericordia".
theological_decisions:
- issue: Whether ἐπισκόπους should be rendered with later ecclesiastical terminology
  english_pob_reading: overseers
  chosen_spanish_reading: presbíteros
  alternative_spanish_readings:
  - supervisores
  - obispos
  rationale: 'El griego básico apunta a liderazgo de supervisión, y el audit trail inglés evita una lectura episcopal tardía. En español, "presbíteros" puede sonar más eclesial, pero precisamente por eso se deja constancia de que la elección no pretende fijar una estructura posterior; la decisión principal del texto sigue siendo funcional: líderes responsables de la comunidad.'
  doctrine_reference: Eclesiología histórica; orden de la iglesia primitiva
- issue: How to render the disciplinary clause about the offender
  english_pob_reading: let no one speak to anyone who sins against another, nor let him be heard among you, until he repents.
  chosen_spanish_reading: nadie hable a quien peca contra otro, ni sea oído entre vosotros, hasta que se arrepienta.
  alternative_spanish_readings:
  - nadie hable con él, ni se le escuche entre vosotros, hasta que se arrepienta
  - nadie le hable, ni oiga palabra de vosotros, hasta que se arrepienta
  rationale: La sintaxis griega exige que el ofensor sea el sujeto de ἀκουέτω en sentido de recibir habla/hecho de oír dentro de la comunidad, no un objeto pasivo de audiencia. "Sea oído entre vosotros" intenta reflejar esa exclusión comunitaria, aunque en español suene menos idiomático; se conserva la fuerza disciplinaria y la pausa temporal "hasta que se arrepienta".
  doctrine_reference: Disciplina eclesial; corrección fraterna
- issue: Whether ἐλεημοσύνας should be narrowed to almsgiving
  english_pob_reading: acts of mercy
  chosen_spanish_reading: limosnas
  alternative_spanish_readings:
  - actos de misericordia
  - misericordias
  - ayudas a los necesitados
  rationale: El término puede abarcar la práctica caritativa concreta, especialmente ayuda material. En esta sección sobre prácticas comunitarias, "limosnas" es la forma más directa y tradicional para el español; la nota preserva la alternativa más amplia para no perder la dimensión de misericordia.
  doctrine_reference: Caridad cristiana; asistencia a los pobres
translation_notes:
  revision_awareness: The Spanish draft follows the latest English revision by reflecting the corrected disciplinary clause centered on the offender's repentance, retaining the repeated service language, and preserving the honor-language around the community officers. Where the English audit trail revised wording for naturalness, the Spanish follows the revised sense while adapting to idiomatic Spanish.
  spanish_consistency_notes:
  - Se usa "Dios"/"Señor" de forma normal dentro del género, pero aquí el pasaje no contiene el nombre divino YHWH ni citas que requieran aclaración.
  - Se evitó "obispos" como traducción principal para no importar una estructura jerárquica posterior; se documentó la tensión en notas.
  - '"Limosnas" se reservó para la práctica concreta, mientras la nota explica la alternativa más amplia de misericordia.'
  - La fórmula "no amantes del dinero" conserva la negación explícita del griego compuesto.
  - La cláusula disciplinaria intenta respetar la sintaxis y la lógica de exclusión hasta el arrepentimiento.
