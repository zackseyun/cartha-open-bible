  verdict: revise
  source_alignment_summary: 'El borrador conserva gran parte del sentido, pero falla en dos puntos importantes del audit trail y del griego: ἐπισκόπους no debe traducirse como «presbíteros», porque el proyecto documentó «overseers» para evitar importar estructuras eclesiásticas posteriores; y ἐλεημοσύνας no debe estrecharse en el texto principal a «limosnas» cuando la decisión auditada prefirió el sentido más amplio «acts of mercy». Además, la cláusula disciplinaria puede expresarse en español con más fidelidad e idiomaticidad que «ni sea oído entre vosotros».'
  spanish_quality_summary: 'El español es generalmente legible y digno, pero algunas elecciones suenan eclesiásticamente cargadas o poco naturales: «vuestros honrados» es forzado; «presbíteros» contradice la intención histórica del original; y «ni sea oído entre vosotros» no es la mejor solución en español. Conviene ajustar a un registro claro y fiel: «supervisores», «los que ustedes tienen en honor» o equivalente, y «ni oiga nada de ustedes».'
  glossary_alignment: Alineación parcial. «Señor», «diáconos», «arrepienta» y el campo de «servicio» están bien. Pero «presbíteros» contradice la decisión documentada para ἐπισκόπους («supervisores/sobreveedores» en español, no terminología eclesiástica posterior), y «limosnas» se aparta de la preferencia auditada por un equivalente amplio de ἐλεημοσύνας. No hay conflicto con terminología de Yahvé/Mesías en este versículo.
  issues:
  - severity: high
    issue: «presbíteros» para ἐπισκόπους
    rationale: El griego significa «supervisores/overseers», y el audit trail explícitamente evita leer el oficio posterior de «obispo» o estructuras eclesiásticas desarrolladas. «Presbíteros» además confunde ἐπίσκοποι con πρεσβύτεροι.
  - severity: high
    issue: «limosnas» para ἐλεημοσύνας en el texto principal
    rationale: La decisión inglesa preserva el sentido amplio «acts of mercy». «Limosnas» reduce el campo semántico y altera la decisión lexical y teológica auditada, aunque puede quedar como alternativa en nota.
  - severity: medium
    issue: Cláusula disciplinaria expresada de forma poco fiel/idiomática
    rationale: «ni sea oído entre vosotros» suena pasivo y ambiguo en español. El audit trail original correcto destacaba que el ofensor es quien no debe oír nada de la comunidad. «ni oiga nada de ustedes/vosotros» refleja mejor la sintaxis y la disciplina de incomunicación.
  - severity: medium
    issue: «vuestros honrados» es español poco natural
    rationale: Aunque intenta reflejar τετιμημένοι, la frase resulta torpe. Una formulación como «los que ustedes tienen en honor» o «sus honrados» comunica el honor de manera más clara.
  - severity: low
    issue: Nota a contiene una justificación impropia de la elección errónea
    rationale: La nota intenta defender «presbíteros», pero el texto principal debe corregirse en vez de sostener una opción contraria al rationale documentado.
