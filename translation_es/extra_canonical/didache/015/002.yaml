source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μὴ οὖν ὑπερίδητε αὐτούς· αὐτοὶ γάρ εἰσιν οἱ τετιμημένοι ὑμῶν μετὰ τῶν προφητῶν καὶ διδασκάλων.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/015/002.yaml
  text: Therefore do not disregard them, for they are the ones honored by you, together with the prophets and teachers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:02Z'
    unchanged: false
    changes_summary: Revised 'your honored ones' to 'the ones honored by you' for more natural and transparent English while preserving the passive sense of τετιμημένοι and the force of ὑμῶν.
translation:
  language: es
  text: Por tanto, no los desprecien, porque ellos son los honrados por ustedes, junto con los profetas y los maestros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ οὖν ὑπερίδητε αὐτούς
  english_pob_choice: Therefore do not disregard them
  chosen_spanish: Por tanto, no los desprecien
  alternatives_spanish:
  - Por tanto, no los ignoren
  - Así que no los menosprecien
  lexicon: ὑπερίδητε
  rationale: El verbo expresa la idea de pasar por alto con desprecio o indiferencia. «Desprecien» conserva esa fuerza más claramente que un simple «ignoren», y «Por tanto» refleja el inferido οὖν como conclusión.
- source_word: τετιμημένοι
  english_pob_choice: the ones honored by you
  chosen_spanish: los honrados por ustedes
  alternatives_spanish:
  - los que ustedes honran
  - los que han sido honrados por ustedes
  lexicon: τετιμημένοι
  rationale: El participio pasivo pide una rendición pasiva. «Los honrados por ustedes» mantiene la voz pasiva y la relación semántica con ὑμῶν, sin convertirla en una fórmula posesiva menos transparente.
- source_word: μετὰ τῶν προφητῶν καὶ διδασκάλων
  english_pob_choice: together with the prophets and teachers
  chosen_spanish: junto con los profetas y los maestros
  alternatives_spanish:
  - con los profetas y los maestros
  - al lado de los profetas y los maestros
  lexicon: μετά + genitivo
  rationale: «Junto con» comunica adecuadamente compañía/asociación. «Profetas» y «maestros» son traducciones directas y naturales del par sustantival.
theological_decisions:
- issue: Relación entre ὑμῶν y el pasivo τετιμημένοι
  english_pob_reading: the ones honored by you
  chosen_spanish_reading: los honrados por ustedes
  alternative_spanish_readings:
  - sus honrados
  - los que ustedes honran
  rationale: 'Se preserva la tensión del griego: no se trata solo de pertenencia, sino de que la comunidad ha conferido honor. En español, la pasiva conserva esa relación sin borrar el matiz de agente implícito.'
  doctrine_reference: Ecclesiology / honor in the church community
translation_notes:
  revision_awareness: El español sigue la revisión inglesa más reciente al reflejar el pasivo de τετιμημένοι con una construcción transparente y natural («los honrados por ustedes») en lugar de una posesiva ambigua.
  spanish_consistency_notes:
  - Se mantiene el registro eclesial sobrio y público.
  - Se evita ‘ignoren’ como única opción porque debilita la fuerza de ὑπερίδητε.
  - ‘Maestros’ conserva el término general sin introducir un cargo eclesiástico específico no explicitado en el griego.
