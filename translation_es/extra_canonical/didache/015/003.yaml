revisions:
- from: Corrijan[a] unos a otros, no con ira, sino con paz, como lo tienen en el evangelio; y que nadie hable a quien peca contra otro, ni sea oído por ustedes, hasta que se arrepienta.
  to: Corríjanse[a] unos a otros, no con ira, sino con paz, como tienen en el evangelio; y que nadie le hable al que peca contra otro, ni sea oído por ustedes, hasta que se arrepienta.
  rationale: 'Se hicieron reparaciones pequeñas para que el español exprese con naturalidad el sentido del griego sin perder precisión: se ajustó la reciprocidad de ἀλλήλους con ''Corríjanse unos a otros''; se simplificó ''como lo tienen'' a ''como tienen''; y se rehízo la prohibición interpersonal como ''que nadie le hable al que peca contra otro'', que comunica mejor la idea de no dirigirle la palabra hasta el arrepentimiento. Se mantuvo ''ni sea oído por ustedes'' por fidelidad a la pasiva del griego y al audit trail inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:10:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura general del griego: corrección mutua, no con ira sino en paz, conforme al evangelio, y exclusión comunicativa temporal hasta el arrepentimiento. Sin embargo, en la segunda cláusula el español omite el dativo implícito interpersonal de μηδεὶς λαλειτώ y suena incompleto/ambiguo con ''hable a quien peca contra otro''. El sentido es mejor como ''que nadie le hable'' o ''que nadie hable con'' esa persona. También conviene suavizar la literalidad torpe de ''como lo tienen'' a ''como tienen'' o ''como está''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'Corrijan unos a otros' es menos natural que 'Corríjanse unos a otros'. La frase 'que nadie hable a quien peca contra otro' resulta poco idiomática en español y puede entenderse como 'hablar a' en vez de 'dirigirle la palabra'. La revisión propuesta mejora fluidez sin apartarse del griego.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'evangelio', 'se arrepienta' y 'paz' están bien. La nota léxica sobre Ἐλέγχετε es razonable; se conserva. 'peca contra otro' es fiel a la revisión inglesa y al contexto de ἀστοχοῦντι κατὰ τοῦ ἑτέρου.
  issues:
  - severity: medium
    issue: Construcción poco natural e incompleta en 'que nadie hable a quien peca contra otro'
    rationale: μηδεὶς λαλειτώ aquí prohíbe dirigirse al ofensor; en español 'hablar a' suena forzado y no expresa bien la exclusión relacional. 'Que nadie le hable al que peca contra otro' o 'que nadie hable con' refleja mejor el sentido.
  - severity: low
    issue: '''Corrijan unos a otros'' suena menos natural que el reflexivo recíproco'
    rationale: Con ἀλλήλους, el español idiomático suele preferir 'Corríjanse unos a otros' o 'Corrijanse mutuamente'. No es un error grave, pero la mejora estilística es clara.
  - severity: low
    issue: '''como lo tienen en el evangelio'' es algo pesado'
    rationale: Aunque fiel, 'como tienen en el evangelio' fluye mejor y mantiene el sentido del inglés auditado y del griego.
  revised_spanish_text: Corríjanse[a] unos a otros, no con ira, sino con paz, como tienen en el evangelio; y que nadie le hable al que peca contra otro, ni sea oído por ustedes, hasta que se arrepienta.
  revised_footnotes:
  - marker: a
    text: 'O: «repréndanse»; el verbo griego implica corrección o reprensión fraterna.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones pequeñas para que el español exprese con naturalidad el sentido del griego sin perder precisión: se ajustó la reciprocidad de ἀλλήλους con ''Corríjanse unos a otros''; se simplificó ''como lo tienen'' a ''como tienen''; y se rehízo la prohibición interpersonal como ''que nadie le hable al que peca contra otro'', que comunica mejor la idea de no dirigirle la palabra hasta el arrepentimiento. Se mantuvo ''ni sea oído por ustedes'' por fidelidad a la pasiva del griego y al audit trail inglés.'
