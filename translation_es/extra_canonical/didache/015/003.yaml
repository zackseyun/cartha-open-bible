id: DID.15.3
reference: Didache 15:3
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Ἐλέγχετε δὲ ἀλλήλους μὴ ἐν ὀργῇ, ἀλλ' ἐν εἰρήνῃ, ὡς ἔχετε ἐν τῷ εὐαγγελίῳ· καὶ παντὶ ἀστοχοῦντι κατὰ τοῦ ἑτέρου μηδεὶς λαλειτώ μηδὲ παρ' ὑμῶν ἀκουέτω, ἕως οὗ μετανοήσῃ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/015/003.yaml
  text: And reprove one another[a], not in anger but in peace, as you have in the gospel; and let no one speak to anyone who sins against another, nor let him be heard by you, until he repents.
  footnotes:
  - marker: a
    text: Or 'anyone who goes wrong against another'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:03Z'
    unchanged: false
    changes_summary: Removed the unnecessary pronoun in 'as you have in the gospel'; revised 'wrongs another' to 'sins against another' for closer lexical accuracy to ἀστοχοῦντι κατὰ τοῦ ἑτέρου; and changed 'nor let him hear from you' to 'nor let him be heard by you' to reflect ἀκουέτω more accurately.
translation:
  language: es
  text: Corríjanse[a] unos a otros, no con ira, sino con paz, como tienen en el evangelio; y que nadie le hable al que peca contra otro, ni sea oído por ustedes, hasta que se arrepienta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «repréndanse»; el verbo griego implica corrección o reprensión fraterna.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλέγχετε
  english_pob_choice: reprove
  chosen_spanish: Corrijan
  alternatives_spanish:
  - reprendan
  - amonesten
  lexicon: ἐλέγχω
  rationale: El verbo griego pide una corrección o reprensión dirigida al otro. En español, 'corrijan' comunica la acción fraterna con tono claro y natural; 'reprendan' mantiene más dureza, y 'amonesten' puede sonar más eclesiástico que el griego aquí.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre ustedes
  - mutuamente
  lexicon: ἀλλήλους
  rationale: '''Unos a otros'' reproduce bien la reciprocidad explícita del plural griego sin cargar el estilo.'
- source_word: ἐν ὀργῇ
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - en ira
  - en enojo
  lexicon: ὀργή
  rationale: '''Con ira'' es idiomático en español y conserva el sentido de estado o modo de corrección prohibido.'
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: con paz
  alternatives_spanish:
  - en paz
  - en un espíritu de paz
  lexicon: εἰρήνη
  rationale: '''Con paz'' mantiene el paralelismo con ''con ira'' y suena natural en español, sin perder el valor de actitud pacífica.'
- source_word: ἐν τῷ εὐαγγελίῳ
  english_pob_choice: in the gospel
  chosen_spanish: en el evangelio
  alternatives_spanish:
  - en el Evangelio
  - según el evangelio
  lexicon: εὐαγγέλιον
  rationale: La frase parece aludir a la enseñanza normativa del evangelio. 'En el evangelio' sigue de cerca el griego y el audit trail inglés, sin añadir una paráfrasis interpretativa.
- source_word: ἀστοχοῦντι κατὰ τοῦ ἑτέρου
  english_pob_choice: who sins against another
  chosen_spanish: quien peca contra otro
  alternatives_spanish:
  - quien comete falta contra otro
  - quien hace mal contra otro
  lexicon: ἀστοχέω
  rationale: El contexto interpersonal muestra una ofensa contra otro. 'Peca contra otro' conserva la fuerza moral y coincide con la revisión inglesa que optó por 'sins against another'; 'comete falta' sería más débil.
- source_word: μηδεὶς λαλειτώ
  english_pob_choice: let no one speak
  chosen_spanish: que nadie hable
  alternatives_spanish:
  - nadie hable
  - no hable nadie
  lexicon: λαλέω
  rationale: La prohibición en español queda natural como 'que nadie hable', equivalente funcional de una construcción imperativa negativa.
- source_word: μηδὲ παρ' ὑμῶν ἀκουέτω
  english_pob_choice: nor let him be heard by you
  chosen_spanish: ni sea oído por ustedes
  alternatives_spanish:
  - ni lo oigan ustedes
  - ni le presten oído
  lexicon: ἀκούω
  rationale: La revisión inglesa señaló que el griego dice literalmente que 'sea oído'. 'Ni sea oído por ustedes' conserva esa pasiva y evita suavizar el mandato; 'ni lo oigan ustedes' se aleja un poco más de la forma del griego.
- source_word: μετανοήσῃ
  english_pob_choice: repents
  chosen_spanish: se arrepienta
  alternatives_spanish:
  - cambie de mente
  - haga penitencia
  lexicon: μετανοέω
  rationale: En este contexto de restauración moral, 'se arrepienta' es la equivalencia más directa y fiel al uso bíblico habitual en español; 'cambie de mente' sería más explicativo y menos natural aquí.
theological_decisions:
- issue: Disciplina/corrección fraterna sin ira
  english_pob_reading: Reprove one another, not in anger but in peace
  chosen_spanish_reading: Corrijan unos a otros, no con ira, sino con paz
  alternative_spanish_readings:
  - Repréndanse unos a otros, no con ira sino con paz
  - Corrijan mutuamente, no airados sino en paz
  rationale: El texto regula una corrección comunitaria que debe ejercerse sin ira y con paz. 'Corrijan' mantiene el carácter exhortativo sin endurecer más de lo que exige el griego, pero la alternativa 'repréndanse' también sería viable si se quisiera más cercanía al tono de amonestación.
  doctrine_reference: Mateo 18:15; Gálatas 6:1
translation_notes:
  revision_awareness: 'La redacción sigue el sentido interpersonal afinado en la revisión del inglés: ἀστοχοῦντι κατὰ τοῦ ἑτέρου se entiende como una ofensa o pecado contra otro, y ἀκουέτω se refleja mejor con una pasiva en español («sea oído por ustedes») en vez de una forma activa. También se conserva la secuencia retórica del original: corrección, manera de corregir, norma del evangelio, y exclusión temporal de la conversación hasta el arrepentimiento.'
  spanish_consistency_notes:
  - Se usa 'evangelio' en minúscula por tratarse de la enseñanza normativa, no de un título propio en este contexto.
  - Se mantiene 'arrepienta' para μετανοέω, acorde con el uso bíblico corriente y sin introducir una paráfrasis cognitiva.
  - '''Con ira / con paz'' preserva el contraste de modo del griego sin convertirlo en una explicación más larga.'
