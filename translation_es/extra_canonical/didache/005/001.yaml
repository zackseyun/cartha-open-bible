translation:
  language: es
  text: 'Pero el camino de la muerte es este: ante todo, es malo y lleno de maldición: homicidios, adulterios, deseos desordenados, inmoralidades sexuales, robos, idolatrías, hechicerías[a], artes mágicas[b], rapiñas, falsos testimonios, hipocresías, doble corazón, engaño, arrogancia, maldad, voluntad propia, avaricia, lenguaje obsceno, celos, audacia, altivez, jactancia; perseguidores de los buenos, aborrecedores de la verdad, amadores de la mentira, que no conocen la recompensa de la justicia, no aferrados a lo bueno ni al juicio justo, velando no para lo bueno sino para lo malo; de quienes están lejos la mansedumbre y la paciencia, amando cosas vanas, buscando retribución, no teniendo misericordia del pobre, no esforzándose por el oprimido, no conociendo al que los hizo, asesinos de niños, destructores de la hechura de Dios, apartándose del que tiene necesidad, oprimiendo al afligido, defensores de los ricos, jueces injustos de los pobres, totalmente pecadores. Sean librados, hijos, de
    todas estas cosas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hechicerías» traduce este término de manera natural en español y lo distingue del siguiente, preservando el doblete del griego.
    reason: lexical_alternative
  - marker: b
    text: «Artes mágicas» mantiene una formulación distinta del término anterior para no fusionar los dos vocablos griegos consecutivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡ δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: conjunción adversativa
  rationale: El griego abre por contraste con el camino de la vida anterior; en español, «Pero» conserva mejor ese giro adversativo que una mera adición.
- source_word: κατάρας μεστή
  english_pob_choice: full of curse
  chosen_spanish: lleno de maldición
  alternatives_spanish:
  - lleno de maldecir
  - lleno de maldición/curses
  - pleno de maldición
  lexicon: campo semántico de curse/curse-state
  rationale: «Maldición» preserva el peso religioso-moral del genitivo sin domesticarlo en una simple grosería. «Lleno de maldición» es natural en español y mantiene la dureza del original.
- source_word: μαγεῖαι
  english_pob_choice: sorceries
  chosen_spanish: artes de magia
  alternatives_spanish:
  - hechicerías
  - sortilegios
  - sorceries
  lexicon: léxico de prácticas mágicas
  rationale: Se evita colapsar este término con el siguiente. «Artes de magia» conserva el registro de práctica religiosa/mágica y deja espacio para distinguirlo de φαρμακεῖαι.
- source_word: φαρμακεῖαι
  english_pob_choice: magic arts
  chosen_spanish: artes mágicas
  alternatives_spanish:
  - hechicerías
  - pociones mágicas
  - magias
  lexicon: léxico de prácticas mágicas
  rationale: Se mantiene la distinción auditada por la POB inglesa entre dos términos relacionados pero no idénticos. «Artes mágicas» suena natural en español y refleja el componente de práctica técnica/oculta.
- source_word: διπλοκαρδία
  english_pob_choice: double-heartedness
  chosen_spanish: doble corazón
  alternatives_spanish:
  - doble ánimo
  - duplicidad
  - doblez de corazón
  lexicon: metáfora antropológica
  rationale: La imagen literal del corazón doble se conserva mejor que una abstracción como «duplicidad», preservando la textura moral del griego.
- source_word: αὐθάδεια
  english_pob_choice: self-will
  chosen_spanish: obstinación propia
  alternatives_spanish:
  - voluntad propia
  - terquedad
  - autosuficiencia obstinada
  lexicon: rasgo moral de autoafirmación
  rationale: «Obstinación propia» intenta captar la autoafirmación dura e impenetrable del término sin perder la relación con la voluntad propia señalada por el inglés auditado.
- source_word: πλεονεξία
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición desmedida
  - greed
  lexicon: vicio de deseo posesivo
  rationale: «Avaricia» es la equivalencia española más estable y solemne para este vicio, y mantiene el valor moral negativo del término.
- source_word: αἰσχρολογία
  english_pob_choice: foul speech
  chosen_spanish: lenguaje obsceno
  alternatives_spanish:
  - habla vergonzosa
  - palabras obscenas
  - lenguaje soez
  lexicon: léxico de habla indecorosa
  rationale: «Lenguaje obsceno» comunica en español actual la indecencia verbal sin perder la aspereza moral del original.
- source_word: ὑπερηφανία
  english_pob_choice: haughtiness
  chosen_spanish: soberbia
  alternatives_spanish:
  - altivez
  - arrogancia
  - orgullo
  lexicon: vicio de orgullo elevado
  rationale: Se separa de ὕψος y ἀλαζονεία evitando redundancia. «Soberbia» es un equivalente moral fuerte y tradicionalmente inteligible.
- source_word: ἀλαζονεία
  english_pob_choice: boastfulness
  chosen_spanish: jactancia
  alternatives_spanish:
  - fanfarronería
  - presunción
  - vanagloria
  lexicon: vicio de autoexaltación verbal
  rationale: «Jactancia» conserva el matiz de autoexaltación ostentosa y funciona bien después de «soberbia».
- source_word: μισθὸν δικαιοσύνης
  english_pob_choice: reward of righteousness
  chosen_spanish: recompensa de la justicia
  alternatives_spanish:
  - recompensa de rectitud
  - galardón de justicia
  - premio de justicia
  lexicon: premio/recompensa de conducta justa
  rationale: «Recompensa» sigue la lectura auditada del inglés y «justicia» mantiene el sustantivo moral/legal del griego. La combinación es transparente y bíblicamente reconocible en español.
- source_word: οὐ κολλώμενοι ἀγαθῷ οὐδὲ κρίσει δικαίᾳ
  english_pob_choice: not clinging to what is good nor to righteous judgment
  chosen_spanish: no adheridos a lo bueno ni a juicio justo
  alternatives_spanish:
  - no aferrados a lo bueno ni a juicio justo
  - no pegados a lo bueno ni a juicio recto
  - no unidos a lo bueno ni a justa sentencia
  lexicon: adhesión moral/judicial
  rationale: «Adheridos» traduce la fuerza de κολλώμενοι como estar pegado o unido a algo. «Juicio justo» mantiene el paralelismo con la POB inglesa y la dimensión ética-jurídica de κρίσει δικαίᾳ.
- source_word: ὧν μακρὰν
  english_pob_choice: from whom... are far
  chosen_spanish: de quienes ... están lejos
  alternatives_spanish:
  - lejos de quienes ...
  - de los cuales ... están lejos
  lexicon: relación espacial/metafórica de distancia
  rationale: 'Se preserva la construcción relacional del griego: las virtudes están lejos de esas personas, no meramente ausentes en abstracto.'
- source_word: ἀνταπόδομα
  english_pob_choice: repayment
  chosen_spanish: pago
  alternatives_spanish:
  - recompensa
  - repago
  - retribución
  lexicon: reciprocidad retributiva
  rationale: El contexto aquí sugiere la búsqueda interesada de retorno o pago. «Pago» es breve y natural en español, sin forzar una lectura técnica adicional.
- source_word: φθορεῖς πλάσματος Θεοῦ
  english_pob_choice: destroyers of God's handiwork
  chosen_spanish: destructores de la hechura de Dios
  alternatives_spanish:
  - destructores de la obra de Dios
  - corruptores de la criatura de Dios
  - destructores del hecho por Dios
  lexicon: creación como cosa formada
  rationale: «Hechura» refleja bien πλάσμα como lo formado/hecho, y «de Dios» conserva el genitivo teológico sin introducir una paráfrasis más amplia.
- source_word: πανθαμάρτητοι
  english_pob_choice: altogether sinful
  chosen_spanish: totalmente pecadores
  alternatives_spanish:
  - enteramente pecadores
  - culpables por completo
  - sumamente pecadores
  lexicon: cualificación total del vicio
  rationale: «Totalmente pecadores» expresa la acusación global final con claridad natural en español.
- source_word: ῥυσθείητε
  english_pob_choice: Be delivered
  chosen_spanish: Sean librados
  alternatives_spanish:
  - Sean rescatados
  - Que sean librados
  - Sean salvados
  lexicon: pasivo optativo de liberación
  rationale: El pasivo optativo permite una exhortación/petición de ser rescatados por una acción externa. «Sean librados» conserva ese valor sin imponer explícitamente el agente.
theological_decisions:
- issue: Lista de vicios con dos términos cercanos para prácticas mágicas
  english_pob_reading: Render them distinctly as 'sorceries' and 'magic arts'
  chosen_spanish_reading: Distinguirlos como «artes de magia» y «artes mágicas»
  alternative_spanish_readings:
  - Traducir ambos como «hechicerías»
  - Traducir ambos como «magia»
  rationale: El griego mantiene dos vocablos sucesivos y la POB inglesa decide no fusionarlos. En español, dos formulaciones distintas preservan la acumulación retórica y evitan borrar la tensión lexical.
  doctrine_reference: No doctrinal doctrine; lexical-theological audit of vice-list accumulation.
- issue: Final exhortation/petition of deliverance
  english_pob_reading: Be delivered, children, from all these things.
  chosen_spanish_reading: Sean librados, niños, de todas estas cosas.
  alternative_spanish_readings:
  - Sean rescatados, niños, de todas estas cosas.
  - Que Dios los libre, niños, de todas estas cosas.
  rationale: El optativo pasivo expresa deseo/exhortación de liberación sin nombrar explícitamente al agente. «Sean librados» conserva la apertura teológica y la fuerza suplicante sin sobretraducir a una orden directa ni a una petición explícita a Dios.
  doctrine_reference: Grammar/theology of passive optative; divine agency implied but not overtly specified.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente del audit trail, especialmente en la distinción entre μαγεῖαι y φαρμακεῖαι, y en la clausula final de liberación. También evita dependencias del borrador anterior que colapsaban o moralizaban de forma más libre algunos vicios, prefiriendo equivalentes españoles estables y auditablemente ligados al griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología POB por defecto en el proyecto, pero aquí no aparece el tetragrámaton ni κύριος en una cita relevante.
  - Se preservó la distinción entre «justicia» y «juicio justo» para reflejar δικαιοσύνη y κρίσις δικαία sin homogeneizarlos.
  - Se mantuvo «carne» fuera del texto porque no hay σάρξ en este versículo.
  - Se evitó «Cristo/Mesías» porque el pasaje no lo contiene.
  - «Niños» traduce τέκνα de forma directa y mantiene el tono exhortativo del cierre.
