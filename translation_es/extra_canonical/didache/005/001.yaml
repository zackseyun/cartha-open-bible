  to: 'Pero el camino de la muerte es este: ante todo, es malo y lleno de maldición: homicidios, adulterios, deseos desordenados, inmoralidades sexuales, robos, idolatrías, hechicerías[a], artes mágicas[b], rapiñas, falsos testimonios, hipocresías, doble corazón, engaño, arrogancia, maldad, voluntad propia, avaricia, lenguaje obsceno, celos, audacia, altivez, jactancia; perseguidores de los buenos, aborrecedores de la verdad, amadores de la mentira, que no conocen la recompensa de la justicia, no aferrados a lo bueno ni al juicio justo, velando no para lo bueno sino para lo malo; de quienes están lejos la mansedumbre y la paciencia, amando cosas vanas, buscando retribución, no teniendo misericordia del pobre, no esforzándose por el oprimido, no conociendo al que los hizo, asesinos de niños, destructores de la hechura de Dios, apartándose del que tiene necesidad, oprimiendo al afligido, defensores de los ricos, jueces injustos de los pobres, totalmente pecadores. Sean librados, hijos, de
    todas estas cosas.'
  rationale: 'Se hicieron reparaciones menores pero necesarias para mejorar la fidelidad idiomática al español y la precisión semántica: se naturalizaron varios participios y giros calcados, se ajustó αὐθάδεια a «voluntad propia», se mejoró ἄνομοι κριταί con «jueces injustos», se cambió τέκνα a «hijos», y se refinaron los dos términos de prácticas mágicas para que sean más distinguibles y naturales en español sin perder la decisión auditada de mantener el doblete.'
