base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/005/001.yaml
  text: 'But the way of death is this: first of all, it is evil and full of curse: murders, adulteries, lusts, sexual immoralities, thefts, idolatries, sorceries, magic arts, robberies, false testimonies, hypocrisies, double-heartedness, deceit, arrogance, malice, self-will, greed, foul speech, jealousy, audacity, haughtiness, boastfulness; persecutors of the good, hating truth, loving falsehood, not knowing the reward of righteousness, not clinging to what is good nor to righteous judgment, keeping watch not for what is good but for what is evil; from whom gentleness and patience are far, loving vain things, pursuing repayment, not showing mercy to a poor man, not laboring on behalf of one who is oppressed, not knowing the one who made them, murderers of children, destroyers of God''s handiwork, turning away from the one in need, oppressing the one under affliction, advocates of the rich, lawless judges of the poor, altogether sinful. Be delivered, children, from all these things.'
