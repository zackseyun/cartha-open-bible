review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue de cerca la estructura del griego y en general conserva bien la larga lista de vicios, el contraste inicial con el camino de vida y la exhortación final pasiva. También mantiene varias decisiones auditadas importantes, como distinguir μαγεῖαι y φαρμακεῖαι, preservar «doble corazón» para διπλοκαρδία, y reflejar ῥυσθείητε con una forma pasiva. Sin embargo, varias expresiones suenan excesivamente calcadas o poco naturales en español y algunas elecciones léxicas pueden ajustarse mejor al sentido fuente sin perder auditabilidad.
  spanish_quality_summary: 'La legibilidad es irregular: combina buenas soluciones con giros poco idiomáticos como «no conocedores», «no adheridos», «obstinación propia», «persiguiendo pago» y «jueces ilegales de los pobres». Además, «Sean librados, niños» no encaja bien con el vocativo τέκνα, que aquí pide «hijos» más que «niños». El texto gana claridad y dignidad con ajustes menores de estilo y precisión semántica.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto (Dios, justicia, etc.). La distinción entre términos mágicos se preserva, aunque las dos opciones españolas elegidas son demasiado parecidas; conviene usar dos formas más naturales y distinguibles. «Justicia» para δικαιοσύνης es correcto. «Sean librados» mantiene la pasividad de ῥυσθείητε, pero el vocativo debe ajustarse a «hijos».
  issues:
  - severity: medium
    issue: «artes de magia / artes mágicas»
    rationale: Preserva el doblete, pero en español las dos expresiones resultan demasiado cercanas y algo artificiales. Una pareja como «hechicerías» y «artes mágicas» distingue mejor los términos y suena más natural, manteniendo la decisión auditada de no colapsarlos.
  - severity: medium
    issue: «obstinación propia» para αὐθάδεια
    rationale: Es poco idiomático. «Voluntad propia» o «terquedad» comunican mejor la autoafirmación obstinada del término griego; «voluntad propia» se alinea mejor con self-will.
  - severity: medium
    issue: 'Giros calcados: «no conocedores», «no adheridos», «persiguiendo pago»'
    rationale: Estos segmentos conservan el orden conceptual, pero suenan forzados en español. «Que no conocen», «no aferrados» y «buscando retribución» preservan mejor el sentido con naturalidad.
  - severity: medium
    issue: «jueces ilegales de los pobres»
    rationale: «Ilegales» modifica mal a «jueces» en español y puede sugerir estatus jurídico, no injusticia moral. «Jueces injustos de los pobres» o «jueces inicuos contra los pobres» representa mejor ἄνομοι en contexto.
  - severity: low
    issue: «niños» para τέκνα
    rationale: En exhortación cristiana antigua, τέκνα se entiende mejor como «hijos»/«hijitos» que como «niños». «Hijos» es más natural y dignificado aquí.
