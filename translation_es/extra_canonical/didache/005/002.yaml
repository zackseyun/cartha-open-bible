review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro auditado del POB en la mayoría de las unidades: conserva bien la cadena de participios descriptivos, mantiene «justicia / juicio justo», refleja correctamente la revisión clave de οὐ πονοῦντες ἐπὶ καταπονουμένῳ como falta de compasión, y traduce con fidelidad la mayor parte del catálogo ético. Sin embargo, varias formulaciones nominales y calcadas («aborrecedores», «amadores», «no conocedores», «no aferrados») suenan poco naturales en español continuo, y la cláusula final «Sean librados» no expresa bien la exhortación directa del griego como sí lo hace un imperativo medio/pasivo más idiomático.'
  spanish_quality_summary: La legibilidad necesita una reparación menor pero real. El texto actual es comprensible, pero demasiado rígido y nominalizado para un español eclesial natural. Conviene regularizar la serie con participios o cláusulas relativas idiomáticas («odiando la verdad», «amando la mentira», «sin conocer…», «sin aferrarse…») y mejorar la exhortación final a «Líbrense». También es preferible «recompensa de la justicia» y «maltratando al que está afligido» para sonar más natural sin perder sentido.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «justicia» para δικαιοσύνη y «juicio justo» para κρίσις δικαία están bien. «Dios» está bien. La nota sobre πονέω preserva correctamente la alternativa previa. No hay términos de alto riesgo doctrinal mal manejados.
  issues:
  - severity: medium
    issue: Exceso de calcos nominales poco naturales en español
    rationale: Formas como «aborrecedores de la verdad», «amadores de la mentira», «no conocedores de la recompensa» y «no aferrados al bien» reproducen mecánicamente la estructura griega/inglesa, pero en español suenan forzadas y reducen la legibilidad del catálogo.
  - severity: medium
    issue: Cláusula final mal orientada como pasiva indicativa/exhortativa
    rationale: «Sean librados, hijos» es comprensible, pero no es la mejor forma exhortativa para ῥυσθείητε; «Líbrense, hijos» comunica mejor la apelación directa del cierre en español natural.
  - severity: low
    issue: Algunas elecciones léxicas pueden afinarse para naturalidad
    rationale: «Persiguiendo retribución» suena más rígido que «buscando pago» o «buscando retribución»; «oprimiendo al que está bajo aflicción» es menos natural que «maltratando al que está afligido» o similar. Son ajustes de estilo, no de sentido.
  revised_spanish_text: Perseguidores del bien, odiando la verdad, amando la mentira, sin conocer la recompensa de la justicia, sin aferrarse al bien ni al juicio justo, velando no por lo bueno sino por lo malo; de quienes están lejos la mansedumbre y la paciencia, amando cosas vanas, buscando retribución, no mostrando misericordia al pobre, no sintiendo dolor[a] por el que está oprimido, no conociendo al que los hizo, asesinos de niños, destructores de la obra de Dios, apartándose del necesitado, maltratando al que está afligido, defensores de los ricos, jueces inicuos de los pobres, enteramente pecadores. Líbrense, hijos, de todas estas cosas.
  revised_footnotes:
  - marker: a
    text: 'O: «no trabajando en favor de uno que está oprimido». La revisión del POB adoptó «no sintiendo dolor por el que está oprimido» para reflejar el sentido de πονέω en este contexto.'
    reason: lexical_alternative
