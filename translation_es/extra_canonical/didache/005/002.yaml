revisions:
- from: Perseguidores del bien[a], aborrecedores de la verdad, amadores de la mentira, no conocedores de la recompensa de la justicia, no aferrados al bien ni al juicio justo, velando no por lo bueno sino por lo malo; de quienes la mansedumbre y la paciencia están lejos, amantes de cosas vanas, persiguiendo retribución, no mostrando misericordia al pobre, no sintiendo dolor por el que está oprimido, no conociendo al que los hizo, asesinos de niños, destructores de la obra de Dios, apartándose del necesitado, oprimiendo al que está bajo aflicción, defensores de los ricos, jueces inicuos de los pobres, enteramente pecadores. Sean librados, hijos, de todas estas cosas.
  to: Perseguidores del bien, odiando la verdad, amando la mentira, sin conocer la recompensa de la justicia, sin aferrarse al bien ni al juicio justo, velando no por lo bueno sino por lo malo; de quienes están lejos la mansedumbre y la paciencia, amando cosas vanas, buscando retribución, no mostrando misericordia al pobre, no sintiendo dolor[a] por el que está oprimido, no conociendo al que los hizo, asesinos de niños, destructores de la obra de Dios, apartándose del necesitado, maltratando al que está afligido, defensores de los ricos, jueces inicuos de los pobres, enteramente pecadores. Líbrense, hijos, de todas estas cosas.
  rationale: 'La revisión conserva el sentido fuente y las decisiones auditadas del POB, pero sustituye varios calcos duros por español natural y digno. Se mantuvo la nota léxica sobre πονέω, se preservó «justicia / juicio justo», y se ajustó la exhortación final a un imperativo más idiomático: «Líbrense, hijos».'
  reviewer_model: gpt-5.4
