base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/005/002.yaml
  text: persecutors of the good[a], hating truth, loving falsehood, not knowing the reward of righteousness, not clinging to what is good nor to righteous judgment, keeping watch not for what is good but for what is evil; from whom gentleness and patience are far, loving vain things, pursuing repayment, not showing mercy to the poor, not feeling distress for one who is oppressed, not knowing the one who made them, murderers of children, destroyers of God's handiwork, turning away from the one in need, oppressing the one under affliction, advocates of the rich, lawless judges of the poor, altogether sinful. Be delivered, children, from all these things.
  footnotes:
  - marker: a
    text: Or 'not laboring on behalf of one who is oppressed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:59Z'
    unchanged: false
    changes_summary: 'Adjusted a few phrases for lexical accuracy and natural English: ''cleaving'' to ''clinging,'' ''recompense'' to ''repayment,'' and ''a poor man'' to ''the poor.'''
translation:
  language: es
  text: Perseguidores del bien, odiando la verdad, amando la mentira, sin conocer la recompensa de la justicia, sin aferrarse al bien ni al juicio justo, velando no por lo bueno sino por lo malo; de quienes están lejos la mansedumbre y la paciencia, amando cosas vanas, buscando retribución, no mostrando misericordia al pobre, no sintiendo dolor[a] por el que está oprimido, no conociendo al que los hizo, asesinos de niños, destructores de la obra de Dios, apartándose del necesitado, maltratando al que está afligido, defensores de los ricos, jueces inicuos de los pobres, enteramente pecadores. Líbrense, hijos, de todas estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no trabajando en favor de uno que está oprimido». La revisión del POB adoptó «no sintiendo dolor por el que está oprimido» para reflejar el sentido de πονέω en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διῶκται ἀγαθῶν
  english_pob_choice: persecutors of the good
  chosen_spanish: Perseguidores del bien
  alternatives_spanish:
  - Perseguidores de lo bueno
  - Perseguidores de las cosas buenas
  lexicon: διώκτης + ἀγαθός
  rationale: Mantiene la fuerza nominal de «persecutors» y traduce ἀγαθῶν de manera natural como «del bien», evitando una paráfrasis excesiva.
- source_word: μισοῦντες ἀλήθειαν
  english_pob_choice: hating truth
  chosen_spanish: aborrecedores de la verdad
  alternatives_spanish:
  - odiando la verdad
  - que odian la verdad
  lexicon: μισέω + ἀλήθεια
  rationale: «Aborrecedores» conserva el participio con valor descriptivo y da una intensidad acorde con μισοῦντες.
- source_word: ἀγαπῶντες ψεῦδος
  english_pob_choice: loving falsehood
  chosen_spanish: amadores de la mentira
  alternatives_spanish:
  - amando la mentira
  - amantes de la falsedad
  lexicon: ἀγαπάω + ψεῦδος
  rationale: «Mentira» es el equivalente más idiomático y directo de ψεῦδος en español bíblico contemporáneo.
- source_word: οὐ γινώσκοντες μισθὸν δικαιοσύνης
  english_pob_choice: not knowing the reward of righteousness
  chosen_spanish: no conocedores de la recompensa de la justicia
  alternatives_spanish:
  - que no conocen la recompensa de la justicia
  - no entendiendo la recompensa de la justicia
  lexicon: γινώσκω + μισθός + δικαιοσύνη
  rationale: Conserva el sustantivo «recompensa» para μισθός y «justicia» para δικαιοσύνη, reflejando la relación conceptual sin interpretar más allá del texto.
- source_word: οὐ κολλώμενοι ἀγαθῷ οὐδὲ κρίσει δικαίᾳ
  english_pob_choice: not clinging to what is good nor to righteous judgment
  chosen_spanish: no aferrados al bien ni al juicio justo
  alternatives_spanish:
  - no unidos al bien ni a un juicio justo
  - no adheridos al bien ni al juicio recto
  lexicon: κολλάω + ἀγαθός + κρίσις δικαία
  rationale: «Aferrados» comunica bien la idea de unión/adhesión de κολλάω en un registro natural. «Juicio justo» preserva el sentido forense de κρίσις δικαία.
- source_word: ἀγρυπνοῦντες οὐκ εἰς τὸ ἀγαθὸν, ἀλλ’ εἰς τὸ πονηρόν
  english_pob_choice: keeping watch not for what is good but for what is evil
  chosen_spanish: velando no por lo bueno sino por lo malo
  alternatives_spanish:
  - velando no hacia lo bueno sino hacia lo malo
  - desvelándose no por lo bueno sino por lo malo
  lexicon: ἀγρυπνέω + ἀγαθός + πονηρός
  rationale: «Velando» es una forma natural y sobria para ἀγρυπνοῦντες; «lo bueno / lo malo» mantiene el paralelismo y evita una rigidez innecesaria.
- source_word: οὐ πονοῦντες ἐπὶ καταπονουμένῳ
  english_pob_choice: not feeling distress for one who is oppressed
  chosen_spanish: no sintiendo dolor por el que está oprimido
  alternatives_spanish:
  - no sintiendo compasión por el oprimido
  - no afligidos por el que está oprimido
  lexicon: πονέω + ἐπί + participio pasivo
  rationale: 'Sigue la revisión del POB: aquí πονέω expresa ausencia de pesar/aflicción compasiva, no simple «trabajar»; «dolor» comunica esa simpatía herida sin oscurecer el matiz emocional.'
theological_decisions:
- issue: «δικαιοσύνη» y «κρίσει δικαίᾳ» en una lista ética de vicios
  english_pob_reading: righteousness / righteous judgment
  chosen_spanish_reading: «justicia» / «juicio justo»
  alternative_spanish_readings:
  - rectitud / juicio recto
  - justicia / juicio recto
  rationale: En este catálogo moral, δικαιοσύνη conserva bien el valor de justicia conforme a Dios, mientras que κρίσις δικαία pide un giro forense claro; «juicio justo» mantiene la tensión entre rectitud moral y acto judicial.
  doctrine_reference: Énfasis bíblico en la justicia y el juicio recto de Dios; cf. uso ético-forense de δικαιοσύνη y κρίσις en literatura cristiana primitiva.
- issue: «πλασματος Θεοῦ» como propiedad creadora de Dios
  english_pob_reading: God's handiwork
  chosen_spanish_reading: «la obra de Dios»
  alternative_spanish_readings:
  - la hechura de Dios
  - la criatura de Dios
  rationale: «Obra de Dios» es fiel, claro y suficientemente amplio para τοῦ Θεοῦ como agente creador; evita restringir el sentido a una sola matiz de manufactura o de criatura.
  doctrine_reference: 'Antropología creatural: el ser humano como hecho por Dios y por eso inviolable.'
- issue: La clausula final «ῥυσθείητε, τέκνα, ἀπὸ τούτων ἁπάντων»
  english_pob_reading: Be delivered, children, from all these things.
  chosen_spanish_reading: «Sean librados, hijos, de todas estas cosas»
  alternative_spanish_readings:
  - Librense, hijos, de todas estas cosas
  - Sean rescatados, hijos, de todas estas cosas
  rationale: «Sean librados» refleja bien el pasivo desiderativo y mantiene el tono exhortativo del cierre; «hijos» conserva la dirección paternal/comunitaria del original.
  doctrine_reference: Exhortación comunitaria con lenguaje de filiación; no introduce doctrina ajena al texto.
translation_notes:
  revision_awareness: 'Se incorporó la revisión del POB que corrige οὐ πονοῦντες ἐπὶ καταπονουμένῳ: el sentido aquí es falta de compasión o dolor por el oprimido, no simplemente ausencia de trabajo en su favor. También se ajustó el español para mantener el catálogo de vicios, el paralelismo y el registro de exhortación.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando el texto lo exigiera; aquí aparece Θεοῦ, por lo que se tradujo «Dios».
  - Se prefirió «Mesías» solo cuando el título apareciera; aquí no ocurre.
  - Se conservó el tono de lista participial con gerundios y participios/adjetivos en español para preservar la acumulación retórica del griego.
  - «Justicia» se usó para δικαιοσύνη y «juicio justo» para κρίσις δικαία, evitando uniformar ambos términos.
  - La nota [a] se ancló en el texto para cumplir con la correspondencia exacta entre marca y pie de página.
