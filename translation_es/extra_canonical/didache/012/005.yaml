base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/012/005.yaml
  text: But if he is not willing to do so, he is a Messiah-trader; beware of such people.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:25Z'
