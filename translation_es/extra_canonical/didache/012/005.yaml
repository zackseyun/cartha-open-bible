translation:
  language: es
  text: Pero si no está dispuesto a hacerlo así, es un mercader del Mesías[a]; cuídense de tales personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego χριστέμπορός (christémporos): compuesto de χριστός (Mesías, el Ungido) y ἔμπορος (mercader, comerciante viajero). El término, aparentemente acuñado por el autor de la Didajé, designa a quien explota el nombre o la causa del Mesías con fines de lucro personal. Alternativa posible: «traficante del Mesías», que acentúa aún más el carácter censurable de la conducta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ θέλει
  english_pob_choice: is not willing
  chosen_spanish: no está dispuesto
  alternatives_spanish:
  - no quiere
  - no desea
  lexicon: 'BDAG θέλω: ''to have a desire for something… to be willing'''
  rationale: θέλω carries both the sense of desire and volitional disposition. The English POB chose 'is not willing' (dispositional) over 'does not want' (desirative). 'No está dispuesto' replicates that dispositional nuance in natural Spanish, whereas 'no quiere' would flatten it toward mere preference.
- source_word: οὕτω ποιεῖν
  english_pob_choice: to do so
  chosen_spanish: obrar así
  alternatives_spanish:
  - hacerlo así
  - actuar de ese modo
  - hacer lo mismo
  lexicon: 'LSJ ποιέω: ''to do, to act''; οὕτω: ''in this way, thus'''
  rationale: '''Obrar así'' is compact, dignified, and points anaphorically back to the conduct described in Didache 12:3–4 (working with one''s hands). ''Hacerlo así'' is equally valid but slightly more colloquial; ''hacer lo mismo'' adds ''mismo'' not present in the source.'
- source_word: χριστέμπορός
  english_pob_choice: Messiah-trader
  chosen_spanish: mercader del Mesías
  alternatives_spanish:
  - traficante del Mesías
  - negociante del Mesías
  - comerciante del Mesías
  lexicon: 'BDAG ἔμπορος: ''a wholesale dealer, merchant'' (one who travels for trade, cf. Matt 13:45); χριστός: ''Anointed One, Messiah'''
  rationale: 'χριστέμπορός is a compound unique or rare to this text, formed from χριστός + ἔμπορος. POB policy renders χριστός as ''Mesías'' (not ''Cristo'') when the titular sense is primary, as confirmed by the revision pass that changed ''Christ-trader'' to ''Messiah-trader''. ''Mercader'' (< Latin mercator) captures ἔμπορος best: a traveling, commercially motivated dealer. ''Traficante'' carries a stronger modern negative connotation of illicit trafficking and is noted as an alternative that amplifies the critique; however, ''mercader del Mesías'' stays closer to the source''s commercial imagery without overtranslating. The phrase is set in footnote [a] for full source explanation.'
- source_word: προσέχετε ἀπὸ τῶν τοιούτων
  english_pob_choice: beware of such people
  chosen_spanish: guárdense de los tales
  alternatives_spanish:
  - cuídense de tales personas
  - tengan cuidado con los tales
  - estén alerta ante los tales
  lexicon: 'BDAG προσέχω + ἀπό: ''to be in a state of alert, beware, be on guard against''; τοιοῦτος: ''of such a kind, such'''
  rationale: προσέχετε (imperative plural) with ἀπό indicates active guarding-away-from. 'Guárdense de' mirrors this protective, distancing action and matches the formal register the English POB adopted with 'beware' (vs. the rejected 'watch out for'). 'Los tales' (elliptical for 'los tales individuos/personas') is a recognized ecclesiastical Spanish construction that conveys referential disdain, echoing τοιούτων.
theological_decisions:
- issue: 'Rendering χριστέμπορός: titular vs. name-form of χριστός'
  english_pob_reading: Messiah-trader
  chosen_spanish_reading: mercader del Mesías
  alternative_spanish_readings:
  - traficante del Mesías
  - mercader de Cristo
  rationale: 'The revision pass (2026-04-23) explicitly replaced ''Christ-trader'' with ''Messiah-trader'' on the grounds that POB policy reserves ''Mesías'' for χριστός when its titular/anointed-one force is primary. In this compound the Didache author is precisely exploiting the titular weight of χριστός: the accused person is trading on the community''s devotion to the Messiah as a social/economic resource. Using ''Mesías'' in Spanish preserves that titular bite. ''Cristo'' would suggest a fixed personal-name use, which is a carve-out the English POB did not document here.'
  doctrine_reference: POB χριστός policy; Didache 12 context of itinerant false prophets exploiting hospitality
translation_notes:
  revision_awareness: 'El pase de revisión del inglés (2026-04-23, gpt-5.4) cambió «Christ-trader» por «Messiah-trader» aplicando la política POB de χριστός, y elevó el registro de «watch out for» a «beware of». El borrador español sigue ambas decisiones: (1) χριστός → «Mesías» en el compuesto, descartando «Cristo» al no existir justificación de nombre fijo documentada; (2) προσέχετε → «guárdense de», imperativo formal en segunda persona plural (ustedes) adecuado al español latinoamericano neutro, paralelo en registro al inglés «beware».'
  spanish_consistency_notes:
  - Se usa 'Mesías' para χριστός conforme a la política del POB y al pase de revisión documentado; 'Cristo' queda excluido en este versículo al no haber carve-out de nombre litúrgico registrado.
  - 'Se emplea el imperativo de segunda persona plural (ustedes): ''guárdense'', no ''guardaos'', para respetar el español latinoamericano neutro.'
  - El punto y coma reproduce la puntuación alta griega (·) que separa la cláusula identificatoria ('es un mercader del Mesías') de la advertencia comunitaria ('guárdense de los tales').
  - '''Los tales'' es un genitivo corto de uso eclesiástico español reconocible que refleja el τῶν τοιούτων griego sin añadir ''personas'' explícito, manteniéndose dentro de lo que el texto fuente respalda.'
