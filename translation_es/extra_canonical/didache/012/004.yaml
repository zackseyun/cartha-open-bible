    rationale: Aunque intenta seguir de cerca el inglés revisado, en español esa combinación resulta forzada. El griego προνοήσατε πῶς se expresa mejor como 'dispongan/prevean cómo podrá vivir'.
  - severity: medium
    issue: El texto principal fuerza 'como cristiano' en vez de la lectura más directa 'un cristiano'
    rationale: La ambigüedad existe, pero el audit trail inglés vigente optó por 'how a Christian may live among you'. En español conviene reflejar esa formulación en el texto principal y conservar la alternativa predicativa en nota.
  - severity: low
    issue: La nota actual repite la misma sintaxis poco idiomática del texto
    rationale: La nota alternativa debería registrar una opción real y clara, no una variante con la misma torpeza sintáctica.
