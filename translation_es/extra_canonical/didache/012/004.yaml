revisions:
- from: Pero si no tiene oficio[a], según su entendimiento, hagan provisión para cómo podrá vivir entre ustedes como cristiano sin estar ocioso.
  to: Pero si no tiene oficio[a], según su entendimiento, dispongan cómo podrá vivir entre ustedes un cristiano sin estar ocioso.
  rationale: 'Se ajusta la sintaxis a un español natural y fiel al griego: ''dispongan cómo'' comunica mejor προνοήσατε πῶς que ''hagan provisión para cómo''. También se restituye en el texto principal la lectura nominal más directa de χριστιανός (''un cristiano''), dejando en nota la alternativa ''como cristiano'' para conservar la ambigüedad documentada sin imponerla.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:09:23Z'
