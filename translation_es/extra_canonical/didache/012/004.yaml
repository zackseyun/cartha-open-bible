    text: O 'dispongan, según su entendimiento, cómo podrá vivir entre ustedes como cristiano sin estar ocioso'.
    reason: Preserva la alternativa predicativa de χριστιανός reflejada en el historial de revisión, pero deja en el texto principal la lectura más directa y natural en español.
  revision_rationale: 'Se ajusta la sintaxis a un español natural y fiel al griego: ''dispongan cómo'' comunica mejor προνοήσατε πῶς que ''hagan provisión para cómo''. También se restituye en el texto principal la lectura nominal más directa de χριστιανός (''un cristiano''), dejando en nota la alternativa ''como cristiano'' para conservar la ambigüedad documentada sin imponerla.'
