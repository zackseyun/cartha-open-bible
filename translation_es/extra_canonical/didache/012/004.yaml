  text: εἰ δὲ οὐκ ἔχει τέχνην, κατὰ τὴν σύνεσιν ὑμῶν προνοήσατε, πῶς μὴ ἀργὸς μεθ᾽ ὑμῶν ζήσεται χριστιανός.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/012/004.yaml
  text: But if he has no trade[a], according to your understanding make provision for how a Christian may live among you without being idle.
  footnotes:
  - marker: a
    text: Or 'provide, according to your understanding, how a Christian may not live idle among you.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:26Z'
    unchanged: false
    changes_summary: Adjusted word order for more natural English and rendered the clause more directly as 'how a Christian may live among you without being idle,' avoiding the slightly awkward 'he will live among you as a Christian.'
translation:
  language: es
  text: Pero si no tiene oficio[a], según su entendimiento, dispongan cómo podrá vivir entre ustedes un cristiano sin estar ocioso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dispongan, según su entendimiento, cómo podrá vivir entre ustedes como cristiano sin estar ocioso'.
    reason: Preserva la alternativa predicativa de χριστιανός reflejada en el historial de revisión, pero deja en el texto principal la lectura más directa y natural en español.
lexical_decisions:
- source_word: τέχνην
  english_pob_choice: trade
  chosen_spanish: oficio
  alternatives_spanish:
  - ocupación
  - trabajo
  - arte/oficio
  lexicon: τέχνη
  rationale: τέχνην aquí denota una ocupación u oficio práctico con el que uno se gana la vida; 'oficio' comunica bien esa idea en español sin perder el matiz laboral.
- source_word: κατὰ τὴν σύνεσιν ὑμῶν
  english_pob_choice: according to your understanding
  chosen_spanish: según su entendimiento
  alternatives_spanish:
  - conforme a su entendimiento
  - según su discernimiento
  lexicon: σύνεσις
  rationale: Se conserva el sentido de juicio/discernimiento comunitario; 'entendimiento' mantiene cercanía formal con el griego y resulta natural en español.
- source_word: προνοήσατε
  english_pob_choice: make provision
  chosen_spanish: hagan provisión
  alternatives_spanish:
  - tomen provisiones
  - prevean
  lexicon: προνοέω
  rationale: '''Hagan provisión'' refleja la idea de prever y preparar lo necesario, y permite mantener el complemento ''para cómo''.\'
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: πῶς
  rationale: '''Cómo'' mantiene la forma interrogativo-informal de la indicación práctica: no solo qué hacer, sino de qué modo.'
- source_word: χριστιανός
  english_pob_choice: a Christian
  chosen_spanish: como cristiano
  alternatives_spanish:
  - como un cristiano
  - como seguidor de Cristo
  lexicon: χριστιανός
  rationale: En este contexto funciona naturalmente como predicativo de modo/identidad; 'como cristiano' sigue la lectura del audit trail inglés y sugiere la manera de vivir, no solo la categoría nominal.
- source_word: μὴ ἀργὸς
  english_pob_choice: without being idle
  chosen_spanish: sin estar ocioso
  alternatives_spanish:
  - sin ser perezoso
  - sin vivir ocioso
  lexicon: ἀργός
  rationale: '''Ocioso'' captura la inactividad improductiva del término; mantiene la tensión ética de no vivir sin ocupación.'
theological_decisions:
- issue: χριστιανός como identidad/forma de vida dentro de una exhortación práctica
  english_pob_reading: how a Christian may live among you without being idle
  chosen_spanish_reading: cómo podrá vivir entre ustedes como cristiano sin estar ocioso
  alternative_spanish_readings:
  - cómo un cristiano podrá vivir entre ustedes sin estar ocioso
  - cómo podrá vivir entre ustedes un cristiano sin estar ocioso
  rationale: La cláusula final se entiende mejor como predicación sobre el modo de vida del huésped/trabajador. 'Como cristiano' conserva la fuerza adjetival/identitaria sin convertirlo en una definición doctrinal abstracta.
  doctrine_reference: Ética cristiana práctica en comunidad; disciplina del trabajo y hospitalidad.
- issue: προνοέω con complemento de modo
  english_pob_reading: make provision ... for how
  chosen_spanish_reading: hagan provisión para cómo podrá vivir
  alternative_spanish_readings:
  - prevean cómo podrá vivir
  - dispongan cómo podrá vivir
  rationale: Se evita una construcción infrecuente en español y se conserva la estructura deliberativa del griego, con una provisión concreta orientada al modo de vida.
  doctrine_reference: Sabiduría comunitaria y cuidado responsable de los necesitados.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la sintaxis para favorecer 'make provision ... for how' y leyó χριστιανός de manera predicativa. La versión española sigue esa orientación, manteniendo la referencia a una forma de vida cristiana y evitando una traducción mecánica del inglés anterior.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''Cristiano'' se conserva por ser el término estable del audit trail para χριστιανός en este contexto.'
  - '''Oficio'' traduce el matiz laboral concreto de τέχνη sin sobrerreligiosizar el texto.'
