  spanish_quality_summary: La frase actual es comprensible, pero 'hagan provisión para cómo podrá vivir' es poco natural en español. 'Según su entendimiento' es aceptable, aunque 'discernimiento' sería más idiomático; no obstante, puede mantenerse por cercanía al audit trail. El conjunto mejora con una redacción más fluida y eclesialmente clara.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Oficio' para τέχνην es adecuado. 'Cristiano' debe preservarse. La mejor reparación es mantener el sustantivo 'un cristiano' en el texto principal y dejar en nota la alternativa predicativa si se desea reflejar la ambigüedad de la cláusula.
  issues:
