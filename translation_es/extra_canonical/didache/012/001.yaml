translation:
  language: es
  text: Pero todo el que venga en el nombre del Señor sea recibido; luego, después de ponerlo a prueba, lo conoceréis, porque tendréis entendimiento de derecha e izquierda.[a] Si el que viene es un viajero, ayúdenlo cuanto puedan; no permanecerá con ustedes más de dos o tres días, si hay necesidad. Pero si quiere establecerse entre ustedes y es artesano, que trabaje y coma. Pero si no tiene oficio, provean, según su entendimiento, de qué manera un cristiano no viva ociosamente entre ustedes. Pero si no quiere hacer esto, es un mercader de Mesías; tengan cuidado con tales personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión griega conserva la imagen literal de 'derecha e izquierda'; el sentido probable es de discernimiento práctico, es decir, saber distinguir lo que corresponde y lo que no.
    reason: theological_note
lexical_decisions:
- source_word: ἐν ὀνόματι Κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - en nombre de Yahvé
  - bajo el nombre del Señor
  lexicon: κύριος
  rationale: Conserva la fórmula de autoridad y pertenencia sin forzar una paráfrasis. Aquí se mantiene 'Señor' porque el griego cita una fórmula tradicional de recepción y el audit trail inglés la trató como título heredado, no como sustituto explícito del nombre divino.
- source_word: δεχθήτω / δεχξήσθω
  english_pob_choice: be received
  chosen_spanish: sea recibido
  alternatives_spanish:
  - sea acogido
  - sea bien recibido
  lexicon: δέχομαι
  rationale: '''Sea recibido'' refleja mejor la imperativa pasiva y el registro eclesial de hospitalidad regulada. ''Acogido'' suaviza demasiado el tono institucional.'
- source_word: δοκιμάσαντες
  english_pob_choice: after testing him
  chosen_spanish: después de probarlo
  alternatives_spanish:
  - después de examinarlo
  - tras ponerlo a prueba
  lexicon: δοκιμάζω
  rationale: '''Probarlo'' mantiene la idea de discernimiento mediante evaluación real; evita ''examinarlo'', que suena más técnico, y preserva la tensión moral del contexto.'
- source_word: σύνεσιν γὰρ ἕξετε δεξιὰν καὶ ἀριστεράν
  english_pob_choice: for you will have understanding of right and left
  chosen_spanish: porque tendréis entendimiento de derecha y izquierda
  alternatives_spanish:
  - porque tendréis discernimiento de lo correcto y lo incorrecto
  - porque tendréis discernimiento en todo
  lexicon: σύνεσις
  rationale: Se conserva la imagen idiomática 'derecha y izquierda' para no resolverla demasiado pronto en la traducción. En español, 'entendimiento de derecha y izquierda' suena inusual pero transparente y auditable.
- source_word: παρόδιος
  english_pob_choice: traveler
  chosen_spanish: viajero
  alternatives_spanish:
  - transeúnte
  - caminante
  lexicon: παρόδιος
  rationale: '''Viajero'' comunica bien la persona que pasa de camino y es más natural que ''transeúnte'' en este contexto de hospitalidad itinerante.'
- source_word: οὐ μενεῖ ... εἰ μὴ δύο ἢ τρεῖς ἡμέρας
  english_pob_choice: he shall not remain ... for more than two or three days
  chosen_spanish: no permanecerá ... más de dos o tres días
  alternatives_spanish:
  - no se quedará ... más de dos o tres días
  - no permanecerá ... sino dos o tres días
  lexicon: μένω
  rationale: La construcción expresa un límite máximo. 'No permanecerá más de' reproduce con claridad la restricción temporal.
- source_word: ἐὰν ᾖ ἀνάγκη
  english_pob_choice: if there is a need
  chosen_spanish: si hay necesidad
  alternatives_spanish:
  - si es necesario
  - si hace falta
  lexicon: ἀνάγκη
  rationale: '''Si hay necesidad'' es natural en español y mantiene el carácter condicional sin explicarlo más allá de lo que el griego dice.'
- source_word: τεχνίτης
  english_pob_choice: craftsman
  chosen_spanish: artesano
  alternatives_spanish:
  - oficial
  - obrero calificado
  lexicon: τέκτων / τεχνίτης
  rationale: '''Artesano'' conserva el sentido de persona con un oficio manual o técnico. En español es más amplio y legible que ''oficial''.'
- source_word: ἐργαζέσθω καὶ φαγέτω
  english_pob_choice: let him work and eat
  chosen_spanish: que trabaje y coma
  alternatives_spanish:
  - que trabaje y que coma
  - trabaje y coma
  lexicon: ἐργάζομαι
  rationale: 'La forma exhortativa impersonal en español transmite bien la regla comunitaria: trabajar para comer.'
- source_word: τέχνην
  english_pob_choice: trade
  chosen_spanish: oficio
  alternatives_spanish:
  - profesión
  - ocupación
  lexicon: τέχνη
  rationale: '''Oficio'' funciona mejor que ''trade'' en español porque expresa el medio de sustento y la habilidad práctica, sin sonar demasiado moderno o burocrático.'
- source_word: προνοήσατε
  english_pob_choice: provide
  chosen_spanish: proveed
  alternatives_spanish:
  - prevenid
  - preparad
  lexicon: προνοέω
  rationale: '''Proveed'' refleja la idea de disponer o hacer arreglos concretos, más que solo planear. En español mantiene la fuerza de provisión comunitaria.'
- source_word: ἀργός
  english_pob_choice: idle
  chosen_spanish: ocioso
  alternatives_spanish:
  - inactivo
  - sin hacer nada
  lexicon: ἀργός
  rationale: '''Ocioso'' preserva el matiz moral y social de no trabajar o vivir a expensas de la comunidad, mejor que ''inactivo'', que es demasiado neutral.'
- source_word: χριστέμπορος
  english_pob_choice: Messiah-trader
  chosen_spanish: traficante de Mesías
  alternatives_spanish:
  - mercader de Mesías
  - mesías-mercader
  - traficante de Cristo
  lexicon: χριστέμπορος
  rationale: Se sigue la decisión revisada del POB inglés para χριστ- con 'Mesías'. 'Traficante de Mesías' conserva el tono despectivo y comercial del compuesto sin volverlo una explicación larga.
- source_word: προσέχετε ἀπὸ τῶν τοιούτων
  english_pob_choice: watch out for such people
  chosen_spanish: guardaos de tales personas
  alternatives_spanish:
  - estad alerta ante tales personas
  - tened cuidado con tales personas
  lexicon: προσέχω
  rationale: '''Guardaos de'' suena bien en español bíblico moderno y expresa tanto vigilancia como distancia protectora. ''Tales personas'' reproduce el demostrativo despectivo sin añadir juicio extra.'
theological_decisions:
- issue: Cómo traducir la fórmula 'en el nombre del Señor' en un texto de disciplina comunitaria y hospitalidad
  english_pob_reading: The Lord as an early-Christian title/authority formula, not a masking convention in the English line
  chosen_spanish_reading: en el nombre del Señor
  alternative_spanish_readings:
  - en el nombre de Yahvé
  - bajo la autoridad del Señor
  rationale: El contexto es una fórmula reconocible de recepción y autorización. En español, 'Señor' mantiene la función litúrgica y comunitaria sin resolver de antemano si el texto alude directamente al nombre divino o a la autoridad del Kyrios cristiano.
  doctrine_reference: Cristología primitiva y uso de κύριος en fórmulas comunitarias
- issue: Mantener la imagen idiomática 'entendimiento de derecha y izquierda'
  english_pob_reading: Retain the idiom in the main text as 'understanding of right and left'
  chosen_spanish_reading: entendimiento de derecha y izquierda
  alternative_spanish_readings:
  - discernimiento de lo correcto y lo incorrecto
  - discernimiento en todo
  rationale: La frase griega es rara y probablemente idiomática. Se conserva la imagen en la línea principal para no borrar una tensión interpretativa que el texto mismo deja abierta; la ambigüedad queda visible para el lector.
  doctrine_reference: Discernimiento práctico en el gobierno de la hospitalidad cristiana
- issue: Cómo reflejar el fuerte matiz despectivo de χριστέμπορος
  english_pob_reading: Messiah-trader
  chosen_spanish_reading: traficante de Mesías
  alternative_spanish_readings:
  - mercader de Mesías
  - traficante de Cristo
  - mercachifle de Mesías
  rationale: El compuesto denuncia convertir a Mesías en mercancía. 'Traficante de Mesías' conserva el reproche comercial y la dureza polémica sin diluirlo en una etiqueta moral más genérica.
  doctrine_reference: Integridad en el uso del nombre y la comunidad de Mesías
translation_notes:
  revision_awareness: La base inglesa revisada en el audit trail cambió 'Christ-trader' a 'Messiah-trader' para seguir la política POB sobre formas χριστ-. Esta versión española refleja ese ajuste con 'traficante de Mesías'. También se respetó la decisión revisada de 'provide' para προνοήσατε; por eso la línea usa 'proveed' y no una fórmula más débil. La traducción evita aplanar la imagen de 'right and left', manteniéndola visible con una nota explicativa.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, coherente con el registro del POB inglés y con una fórmula de recepción comunitaria.
  - '''Mesías'' se usa en el compuesto polémico χριστέμπορος, siguiendo la revisión del POB inglés y la política del proyecto para χριστ- cuando funciona como título.'
  - '''Ocioso'' se eligió para ἀργός por su matiz moral; no se suavizó a ''sin trabajo''.'
  - '''Viajero'' y ''artesano'' conservan el contraste entre tránsito y asentamiento en la estructura del pasaje.'
