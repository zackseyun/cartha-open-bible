review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro de auditoría inglés en casi todas las cláusulas: hospitalidad inicial, prueba posterior, límite de estancia, asentamiento del artesano, provisión para quien no tiene oficio y advertencia final. También conserva correctamente el idiomático ''derecha e izquierda'' con nota. Sin embargo, hay ajustes menores necesarios para mejorar fidelidad idiomática y terminológica: ''después de probarlo'' puede sonar en español más a experimentar con algo que a someter a prueba a una persona; ''guardaos de tales personas'' es comprensible pero menos natural en español latinoamericano actual; y ''traficante de Mesías'' resulta algo áspero/ambiguo en español, donde ''mercader de Mesías'' o una nota explicativa conserva mejor el compuesto comercial sin sugerir necesariamente tráfico ilícito de una persona.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero mezcla giros algo calcados o arcaizantes con español moderno. 'Entendimiento de derecha y izquierda' funciona si se sostiene con nota, aunque 'de derecha e izquierda' suena mejor. 'Ayudadle' y 'guardaos' son correctos pero algo peninsulares/literarios para el objetivo neutral latinoamericano; 'ayúdenlo' y 'tengan cuidado con' o 'cuídense de' serían más naturales. Conviene también suavizar la construcción 'cómo un cristiano no vivirá ocioso' a una formulación más idiomática sin perder el valor final de πῶς μὴ... ζήσεται.
  glossary_alignment: Alineación mayormente buena. 'Mesías' sigue correctamente la política para χριστ- en χριστέμπορος. 'Señor' para Κυρίου está bien justificado por la fórmula comunitaria. No hay conflictos con Yahvé, espíritu, gracia, etc. La principal cuestión terminológica es que 'traficante de Mesías' no refleja tan limpiamente en español el matiz de 'trader/merchant' como sí lo haría 'mercader de Mesías', que preserva mejor la imaginería comercial del compuesto.
  issues:
  - severity: medium
    issue: '''después de probarlo'' suena poco natural para una persona en este contexto'
    rationale: δοκιμάσαντες expresa someter a prueba/evaluar. En español bíblico legible, 'después de ponerlo a prueba' o 'después de examinarlo' comunica mejor el discernimiento comunitario que 'probarlo'.
  - severity: low
    issue: '''entendimiento de derecha y izquierda'' mejora como ''de derecha e izquierda'''
    rationale: La coordinación fija en español suena más natural con 'e' antes de palabra que comienza con i-/hi-. No cambia el sentido y mantiene el idiomático literal respaldado por la nota.
  - severity: medium
    issue: La cláusula 'cómo un cristiano no vivirá ocioso entre vosotros' es poco idiomática
    rationale: El griego expresa el objetivo de la provisión. En español fluye mejor 'de qué manera un cristiano no viva ociosamente entre ustedes' o equivalente, manteniendo el propósito sin sonar calcado.
  - severity: medium
    issue: '''traficante de Mesías'' puede desviar el matiz comercial del compuesto'
    rationale: χριστέμπορος señala a alguien que comercia con el Mesías/la fe. 'Mercader de Mesías' conserva mejor la metáfora comercial; 'traficante' en español moderno puede sugerir ilícito criminal más específico.
  - severity: low
    issue: Registro parcialmente peninsular en un objetivo neutral latinoamericano
    rationale: Formas como 'ayudadle', 'vosotros', 'guardaos' no son incorrectas, pero el encargo pide español neutral latinoamericano/broadly church-readable. Ajustarlas mejora accesibilidad sin afectar fidelidad.
