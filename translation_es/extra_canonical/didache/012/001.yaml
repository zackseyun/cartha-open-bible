source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Πᾶς δὲ ὁ ἐρχόμενος ἐν ὀνόματι Κυρίου δεχξήσθω, ἔπειτα δὲ δοκιμάσαντες αὐτὸν γνώσεσθε· σύνεσιν γὰρ ἕξετε δεξιὰν καὶ ἀριστεράν. Εἰμὲν παρόδιος ἐστιν ὁ ἐρχόμενος, βοηθεῖτε αὐτῷ ὅσον δύνασθε· οὐ μενεῖ δὲ πρὸς ὑμᾶς εἰ μὴ δύο ἢ τρεῖς ἡμέρας, ἐὰν ᾖ ἀνάγκη. Εἰ δὲ θέλει πρὸς ὑμᾶς καθίσαι, τεχνίτης ὤν, ἐργαζέσθω καὶ φαγέτω· εἰ δὲ οὐκ ἔχει τέχνην, κατὰ τὴν σύνεσιν ὑμῶν προνοήσατε, πῶς μὴ ἀργὸς μεθ᾽ ὑμῶν ζήσεται χριστιανός. Εἰ δ᾽ οὐ θέλει οὕτω ποιεῖν, χριστέμπορός ἐστι· προσέχετε ἀπὸ τῶν τοιούτων.
  language: Greek
  pages:
  - 36
  note: This chapter comes from the normalized Hitchcock & Brown 1884 OCR layer. Line-number noise and page segmentation were cleaned, but the translation must stay anchored in the Greek wording.
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/012/001.yaml
  text: But let everyone who comes in the name of the Lord be received; then, after testing him, you will know him, for you will have understanding of right and left. But if the one who comes is a traveler, help him as much as you can; he shall not remain with you for more than two or three days, if there is a need. But if he wants to settle among you and is a craftsman, let him work and eat. But if he has no trade, provide, according to your understanding, how a Christian may not live idle among you. But if he is not willing to do so, he is a Messiah-trader; watch out for such people.
