revisions:
- from: Pero que todo el que viene en el nombre del Señor sea recibido; luego, después de probarlo, lo conoceréis, porque tendréis entendimiento de derecha y izquierda.[a] Si el que viene es un viajero, ayudadle en cuanto podáis; no permanecerá con vosotros más de dos o tres días, si hay necesidad. Pero si quiere quedarse entre vosotros y es artesano, que trabaje y coma. Pero si no tiene oficio, proveed, según vuestro entendimiento, cómo un cristiano no vivirá ocioso entre vosotros. Pero si no quiere hacer así, es un traficante de Mesías; guardaos de tales personas.
  to: Pero todo el que venga en el nombre del Señor sea recibido; luego, después de ponerlo a prueba, lo conoceréis, porque tendréis entendimiento de derecha e izquierda.[a] Si el que viene es un viajero, ayúdenlo cuanto puedan; no permanecerá con ustedes más de dos o tres días, si hay necesidad. Pero si quiere establecerse entre ustedes y es artesano, que trabaje y coma. Pero si no tiene oficio, provean, según su entendimiento, de qué manera un cristiano no viva ociosamente entre ustedes. Pero si no quiere hacer esto, es un mercader de Mesías; tengan cuidado con tales personas.
  rationale: 'La revisión mantiene todas las decisiones exegéticas principales del borrador, pero mejora la naturalidad y la precisión en español neutral latinoamericano: ''ponerlo a prueba'' comunica mejor δοκιμάσαντες; ''de derecha e izquierda'' respeta mejor la coordinación española; ''de qué manera... no viva ociosamente'' expresa más idiomáticamente el propósito de προνοήσατε, πῶς μὴ...; y ''mercader de Mesías'' preserva con más claridad la metáfora comercial de χριστέμπορος. También se ajustan pronombres y mandatos al registro más ampliamente legible (''ustedes'').'
  reviewer_model: gpt-5.4
