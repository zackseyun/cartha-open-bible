  text: Εἰμὲν παρόδιος ἐστιν ὁ ἐρχόμενος, βοηθεῖτε αὐτῷ ὅσον δύνασθε· οὐ μενεῖ δὲ πρὸς ὑμᾶς εἰ μὴ δύο ἢ τρεῖς ἡμέρας, ἐὰν ᾖ ἀνάγκη.
