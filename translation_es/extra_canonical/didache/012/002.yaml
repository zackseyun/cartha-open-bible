translation:
  language: es
  text: Si el que viene es un viajero[a], ayúdenlo cuanto puedan; pero, si hay necesidad, no permanecerá con ustedes sino dos o tres días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el que viene de paso”.
    reason: alternative_rendering
lexical_decisions:
- source_word: παρόδιος
  english_pob_choice: traveler
  chosen_spanish: viajero
  alternatives_spanish:
  - forastero
  - peregrino
  - de paso
  lexicon: —
  rationale: El griego describe a alguien que va de paso por el camino; “viajero” comunica bien esa idea en español sin introducir una carga religiosa especial. “De paso” era posible, pero como sustantivo integrado en la frase resultó menos natural.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: the one who comes
  chosen_spanish: el que viene
  alternatives_spanish:
  - quien llega
  - el que llega
  lexicon: —
  rationale: La forma relativa con participio se expresa de manera natural como “el que viene”. Mantiene la referencia abierta y no sobreinterpreta identidad ni función.
- source_word: βοηθεῖτε αὐτῷ ὅσον δύνασθε
  english_pob_choice: help him as much as you can
  chosen_spanish: ayúdenlo cuanto puedan
  alternatives_spanish:
  - ayúdenlo todo lo que puedan
  - ayúdenlo cuanto sea posible
  lexicon: —
  rationale: “Ayúdenlo cuanto puedan” conserva el sentido de límite de capacidad implícito en ὅσον δύνασθε y suena natural en español bíblico contemporáneo.
- source_word: οὐ μενεῖ δὲ πρὸς ὑμᾶς
  english_pob_choice: he shall not remain with you
  chosen_spanish: no permanecerá con ustedes
  alternatives_spanish:
  - no se quedará con ustedes
  - no morará con ustedes
  lexicon: —
  rationale: “Permanecerá” corresponde bien a μενεῖ y evita una coloquialidad excesiva. Se conservó “con ustedes” para reflejar πρὸς ὑμᾶς.
- source_word: εἰ μὴ δύο ἢ τρεῖς ἡμέρας
  english_pob_choice: except for two or three days
  chosen_spanish: más de dos o tres días
  alternatives_spanish:
  - sino por dos o tres días
  - excepto dos o tres días
  lexicon: —
  rationale: Aquí el español más claro para la restricción griega es “no permanecerá… más de dos o tres días”. Aunque el inglés final usa “except for”, el griego expresa el límite permitido; la formulación española evita la ambigüedad señalada en la revisión y conserva la restricción temporal.
- source_word: ἐὰν ᾖ ἀνάγκη
  english_pob_choice: if there is a need
  chosen_spanish: si hay necesidad
  alternatives_spanish:
  - si es necesario
  - si surge necesidad
  lexicon: —
  rationale: “Si hay necesidad” reproduce de modo directo ἐὰν ᾖ ἀνάγκη y mantiene la sobriedad del mandato. “Es necesario” habría desplazado el foco hacia una evaluación impersonal.
theological_decisions:
- issue: Duración permitida de la hospitalidad al viajero
  english_pob_reading: he shall not remain with you except for two or three days, if there is a need.
  chosen_spanish_reading: no permanecerá con ustedes más de dos o tres días, si hay necesidad.
  alternative_spanish_readings:
  - no permanecerá con ustedes sino por dos o tres días, si hay necesidad
  - no permanecerá con ustedes, salvo dos o tres días, si hay necesidad
  rationale: La revisión inglesa aclaró que la condición no abre una excepción para prolongar la estancia, sino que sitúa el límite de dos o tres días dentro de la necesidad. La redacción española preserva esa restricción y evita la ambigüedad de una lectura permisiva.
  doctrine_reference: Hospitalidad cristiana y discernimiento comunitario en la disciplina eclesial primitiva
translation_notes:
  revision_awareness: 'La auditoría inglesa corrigió una ambigüedad importante: no se trata de permitir una permanencia mayor por causa de necesidad, sino de limitar la estancia a dos o tres días cuando exista necesidad. Además, el inicio debe reflejar el condicional simple del griego (Εἰ μὲν), no un contraste adversativo.'
  spanish_consistency_notes:
  - Se usó “Yahvé” por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y eclesial sin introducir terminología tradicional no requerida por el griego.
  - La nota al pie se vincula al sujeto participial para conservar la posible oscilación entre “el que viene” y “viajero” sin duplicar el sentido en el cuerpo del texto.
