  rationale: Se reordenó la cláusula final para que “si hay necesidad” modifique claramente la estancia permitida de dos o tres días, conforme al sentido restrictivo del griego y de la revisión inglesa auditada. También se simplificó la nota para que corresponda solo a παρόδιος, sin mezclarla con una alternativa de ὁ ἐρχόμενος.
