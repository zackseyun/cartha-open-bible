review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: condición inicial, mandato de ayuda y límite de estancia. Sin embargo, la secuencia final en español aún puede leerse ambiguamente, como si la necesidad justificara quedarse más de dos o tres días. El griego οὐ μενεῖ δὲ... εἰ μὴ δύο ἢ τρεῖς ἡμέρας, ἐὰν ᾖ ἀνάγκη restringe la estancia a dos o tres días en caso de necesidad, no más allá de ese límite.'
  spanish_quality_summary: El español es claro y natural, con buen registro eclesial contemporáneo. No obstante, conviene ajustar la frase temporal para eliminar la posible ambigüedad de alcance creada por “más de dos o tres días, si hay necesidad”. Además, la nota sobre “el que llega” corresponde mejor a ὁ ἐρχόμενος que a viajero, y la nota actual mezcla dos elementos léxicos distintos bajo un solo anclaje.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. “Viajero” para παρόδιος y “el que viene” para ὁ ἐρχόμενος son adecuados. La mejora necesaria es sintáctica y de nota, no de glosario principal.
  issues:
  - severity: medium
    issue: Ambigüedad en “más de dos o tres días, si hay necesidad”
    rationale: Aunque pretende expresar el límite correcto, en español esa colocación puede sugerir que la necesidad modifica la prohibición de exceder el plazo, en vez de describir la única circunstancia en que se permiten esos dos o tres días.
  - severity: low
    issue: La nota [a] mezcla alternativas para dos expresiones griegas distintas
    rationale: “El que llega” corresponde a ὁ ἐρχόμενος, mientras que “el que viene de paso” refleja mejor παρόδιος. Al estar anclada solo en “viajero”, la nota no está bien focalizada.
  revised_spanish_text: Si el que viene es un viajero[a], ayúdenlo cuanto puedan; pero, si hay necesidad, no permanecerá con ustedes sino dos o tres días.
  revised_footnotes:
  - marker: a
    text: O “el que viene de paso”.
    reason: alternative_rendering
  revision_rationale: Se reordenó la cláusula final para que “si hay necesidad” modifique claramente la estancia permitida de dos o tres días, conforme al sentido restrictivo del griego y de la revisión inglesa auditada. También se simplificó la nota para que corresponda solo a παρόδιος, sin mezclarla con una alternativa de ὁ ἐρχόμενος.
