translation:
  language: es
  text: Pero si quiere establecerse entre ustedes y es artesano, que trabaje y coma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρὸς ὑμᾶς καθίσαι
  english_pob_choice: to settle among you
  chosen_spanish: establecerse entre ustedes
  alternatives_spanish:
  - quedarse entre ustedes
  - residir entre ustedes
  lexicon: καθίζω / καθίσαι
  rationale: La imagen aquí no es solo una visita breve, sino un asentamiento o permanencia entre la comunidad. «Establecerse entre ustedes» conserva esa idea de residencia estable sin sonar demasiado técnico.
- source_word: τεχνίτης
  english_pob_choice: craftsman
  chosen_spanish: artesano
  alternatives_spanish:
  - obrero
  - oficial
  lexicon: τεχνίτης
  rationale: «Artesano» refleja bien a una persona con oficio manual o técnico y es claro en español contemporáneo. «Obrero» es más amplio y menos específico; «oficial» puede sonar demasiado especializado.
- source_word: ἐργαζέσθω
  english_pob_choice: let him work
  chosen_spanish: que trabaje
  alternatives_spanish:
  - que trabaje para vivir
  - que haga su trabajo
  lexicon: ἐργάζομαι
  rationale: 'La forma imperativa expresa obligación o permiso: debe dedicarse al trabajo. «Que trabaje» es la traducción más natural y directa, sin añadir matices no presentes en el griego.'
- source_word: φαγέτω
  english_pob_choice: eat
  chosen_spanish: coma
  alternatives_spanish:
  - que coma
  - y coma
  lexicon: ἐσθίω / φαγεῖν
  rationale: El verbo final tiene fuerza exhortativa coordinada con el mandato anterior. En español, «que trabaje y coma» mantiene el paralelismo y la concisión del original.
theological_decisions:
- issue: Hospitality and support for a resident craftsman
  english_pob_reading: But if he wants to settle among you and is a craftsman, let him work and eat.
  chosen_spanish_reading: Pero si quiere establecerse entre ustedes y es artesano, que trabaje y coma.
  alternative_spanish_readings:
  - Pero si quiere quedarse entre ustedes y es artesano, que trabaje y coma.
  - Pero si quiere residir entre ustedes y es artesano, que trabaje y coma.
  rationale: 'El texto regula la hospitalidad comunitaria sin implicar manutención pasiva. La traducción conserva esa orientación: el artesano que se queda debe trabajar para comer, no ser sostenido sin labor.'
  doctrine_reference: Didaché 12:3; instrucción comunitaria sobre hospitalidad y discernimiento
translation_notes:
  revision_awareness: 'La versión griega normalizada y la traducción inglesa coinciden de manera alta: ambas leen una cláusula condicional sobre un artesano que desea instalarse entre la comunidad y que debe trabajar para comer. No se observaron revisiones aplicadas ni notas de tensión textual en el pasaje.'
  spanish_consistency_notes:
  - Se mantuvo «entre ustedes» como registro neutro y comunitario.
  - Se evitó «SEÑOR» u otros reemplazos no relevantes, dado que el versículo no contiene léxico divino.
  - 'Se conservó el paralelismo breve del griego con dos imperativos en español: «que trabaje y coma».'
