revisions:
- from: No te exaltes a ti mismo[a], ni des audacia a tu alma[b]. Tu alma no se unirá con los encumbrados, sino que te asociarás con los justos y los humildes.
  to: No te exaltes a ti mismo, ni des atrevimiento a tu alma[a]. Tu alma no se unirá con los encumbrados, sino que andarás con los justos y los humildes.
  rationale: Se reemplaza 'audacia' por 'atrevimiento' para reflejar mejor el matiz moral de θράσος sin sobreinterpretarlo como 'arrogancia'. Se cambia 'te asociarás' por 'andarás' para representar más naturalmente ἀναστραφήσῃ en registro sapiencial y eclesial. Se elimina la nota sobre 'engreírse' por ser menos útil que la alternativa conservada para θράσος.
