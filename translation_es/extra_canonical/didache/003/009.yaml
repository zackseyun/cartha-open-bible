source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Οὐχ ὑψώσεις σεαυτὸν οὐδὲ δώσεις τῇ ψυχῇ σου θράσος. Οὐ κολληθήσεται ἡ ψυχή σου μετὰ ὑψηλῶν, ἀλλὰ μετὰ δικαίων καὶ ταπεινῶν ἀναστραφήσῃ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/009.yaml
  text: You shall not exalt yourself, nor give your soul boldness. Your soul shall not be joined with the lofty, but you shall associate with the righteous and humble.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:19Z'
    unchanged: false
    changes_summary: Replaced the awkward and interpretive phrase 'give bold arrogance to your soul' with the more direct and natural 'give your soul boldness,' which more closely reflects θράσος without adding explanation. Left the rest essentially unchanged.
translation:
  language: es
  text: No te exaltes a ti mismo, ni des atrevimiento a tu alma[a]. Tu alma no se unirá con los encumbrados, sino que andarás con los justos y los humildes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "ni des audacia a tu alma".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑψώσεις σεαυτόν
  english_pob_choice: You shall not exalt yourself
  chosen_spanish: No te exaltes a ti mismo
  alternatives_spanish:
  - No te engrías
  - No te eleves a ti mismo
  lexicon: ὑψόω
  rationale: Conserva el sentido de autoexaltación sin volverlo más interpretativo; "exaltarse" reproduce bien el movimiento reflexivo del griego y es natural en español bíblico contemporáneo.
- source_word: δώσεις τῇ ψυχῇ σου θράσος
  english_pob_choice: nor give your soul boldness
  chosen_spanish: ni des audacia a tu alma
  alternatives_spanish:
  - ni des atrevimiento a tu alma
  - ni hagas audaz a tu alma
  lexicon: θράσος
  rationale: '"Audacia" comunica la fuerza de θράσος sin añadir la carga moral de "arrogancia" que la revisión inglesa evitó. Mantiene la imagen de conceder a la propia alma un impulso desmedido.'
- source_word: ἡ ψυχή σου
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  lexicon: ψυχή
  rationale: Se conserva "alma" porque el griego usa ψυχή y el contexto contrasta el interior de la persona con su conducta externa; "vida" o "ser" diluirían esa correspondencia.
- source_word: μετὰ ὑψηλῶν
  english_pob_choice: with the lofty
  chosen_spanish: con los encumbrados
  alternatives_spanish:
  - con los altos
  - con los soberbios
  lexicon: ὑψηλός
  rationale: '"Encumbrados" mantiene la imagen de elevación social o moral sin convertirla en una acusación distinta como "soberbios"; así se preserva la ambigüedad del griego y del inglés.'
- source_word: μετὰ δικαίων καὶ ταπεινῶν
  english_pob_choice: with the righteous and humble
  chosen_spanish: con los justos y los humildes
  alternatives_spanish:
  - con los rectos y humildes
  - con los justos y mansos
  lexicon: δίκαιος / ταπεινός
  rationale: '"Justos" y "humildes" son equivalentes directos y bíblicamente transparentes en español; se evita desplazar el par hacia términos menos precisos.'
theological_decisions:
- issue: Relación entre autoexaltación y disposición interior
  english_pob_reading: You shall not exalt yourself, nor give your soul boldness.
  chosen_spanish_reading: No te exaltes a ti mismo, ni des audacia a tu alma.
  alternative_spanish_readings:
  - No te engrías, ni des audacia a tu alma
  - No te exaltes a ti mismo, ni alimentes el atrevimiento de tu alma
  rationale: La línea griega prohíbe tanto la autoexaltación visible como el otorgar a la propia ψυχή una actitud temeraria. La versión española conserva ambas dimensiones sin moralizar de más θράσος.
  doctrine_reference: Humildad y sobriedad moral en la ética cristiana primitiva; cf. Santiago 4:6 y Romanos 12:3 por paralelo conceptual.
- issue: Contraste social/moral entre los 'encumbrados' y los 'justos y humildes'
  english_pob_reading: Your soul shall not be joined with the lofty, but you shall associate with the righteous and humble.
  chosen_spanish_reading: Tu alma no se unirá con los encumbrados, sino que te asociarás con los justos y los humildes.
  alternative_spanish_readings:
  - Tu alma no se unirá con los altos, sino que convivirás con los justos y humildes
  - Tu alma no se pegará a los encumbrados, sino que andarás con los justos y humildes
  rationale: Se preserva el contraste entre compañía y carácter moral. "Encumbrados" permite leer una altura de estatus, de orgullo o de influencia, sin decidir en exceso entre esas opciones.
  doctrine_reference: Llamado a la humildad y a la comunión con los fieles; cf. Proverbios 3:34 y 1 Pedro 5:5 por afinidad temática.
translation_notes:
  revision_awareness: La versión inglesa fue afinada desde una formulación más interpretativa ('bold arrogance') a la más directa 'boldness'. La presente traducción sigue esa corrección y evita añadir calificativos que no están en θράσος. También mantiene sin sobreespecificar ὑψηλοί como 'encumbrados' en vez de 'soberbios' para no cerrar una ambigüedad que el texto griego conserva.
  spanish_consistency_notes:
  - Se usa 'alma' para ψυχή de manera uniforme, en coherencia con la traducción inglesa y con el contraste interno del pasaje.
  - Se evita 'SEÑOR' u otra terminología no presente, porque el texto no contiene el nombre divino ni una cita explícita del Tetragrámaton.
  - '''Justos y humildes'' se mantiene como par paralelo estable, sin reformularlo como una sola cualidad compuesta.'
