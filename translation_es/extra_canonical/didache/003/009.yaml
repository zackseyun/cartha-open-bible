review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el English POB en la estructura principal: prohíbe la autoexaltación, desaconseja infundir θράσος a la propia ψυχή, y contrasta la compañía de los ὑψηλοί con la de los δικαίοι καὶ ταπεινοί. Sin embargo, ''audacia'' en español suele sonar demasiado positiva o neutra y atenúa el matiz de atrevimiento/temeridad de θράσος. Además, el segundo miembro griego usa futuro medio/dep. ἀναστραφήσῃ con sentido de conducirse/relacionarse, por lo que ''andarás'' o ''te relacionarás'' refleja mejor el registro que ''te asociarás'', aunque este último no es incorrecto.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorar en naturalidad semántica. 'No te exaltes a ti mismo' es fiel y legible; el pie alternativo es aceptable. 'Ni des audacia a tu alma' suena algo forzado y puede malentenderse positivamente. 'Con los encumbrados' funciona bien para μετὰ ὑψηλῶν. La frase final sería más idiomática y bíblico-natural con 'andarás con' o 'te relacionarás con' en lugar de 'te asociarás con'.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Justos'' para δίκαιοι y ''humildes'' para ταπεινοί están bien. ''Alma'' para ψυχή preserva el valor léxico. La principal cuestión léxica es θράσος: conviene ''atrevimiento'' antes que ''audacia'' para evitar una connotación positiva no presente en el contexto moral.'
  issues:
  - severity: medium
    issue: θράσος traducido como 'audacia'
    rationale: Aunque formalmente cercano, 'audacia' en español contemporáneo suele tener matiz elogioso o al menos neutral; aquí el contexto ético pide un término más claramente impropio, como 'atrevimiento'.
  - severity: low
    issue: '''te asociarás'' algo menos natural para ἀναστραφήσῃ'
    rationale: El verbo griego apunta a convivir/andar/conducirse entre ciertos grupos. 'Te asociarás' comunica relación, pero suena más moderno-institucional que el tono sapiencial del pasaje.
  - severity: low
    issue: Nota a innecesaria
    rationale: El alternativo 'No te engrías a ti mismo' es menos natural que el texto principal y no preserva mejor el sentido; no hace falta retenerlo como nota en esta unidad breve.
  revised_spanish_text: No te exaltes a ti mismo, ni des atrevimiento a tu alma[a]. Tu alma no se unirá con los encumbrados, sino que andarás con los justos y los humildes.
  revised_footnotes:
  - marker: a
    text: 'O: "ni des audacia a tu alma".'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'audacia' por 'atrevimiento' para reflejar mejor el matiz moral de θράσος sin sobreinterpretarlo como 'arrogancia'. Se cambia 'te asociarás' por 'andarás' para representar más naturalmente ἀναστραφήσῃ en registro sapiencial y eclesial. Se elimina la nota sobre 'engreírse' por ser menos útil que la alternativa conservada para θράσος.
