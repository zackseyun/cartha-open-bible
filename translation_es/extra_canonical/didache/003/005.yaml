source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τέκνον μου, μὴ γίνου ψεύστης· ἐπειδὴ ὁδηγεῖ τὸ ψεῦσμα εἰς τὴν κλοπήν· μηδὲ φιλάργυρος μηδὲ κενόδοξος· ἐκ γὰρ τούτων ἁπάντων κλοπαὶ γεννῶνται.
