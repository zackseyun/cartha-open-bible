base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/005.yaml
  text: My child, do not become a liar, since lying leads to theft; nor be money-loving, nor vainglorious, for from all these thefts are born.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:17Z'
    unchanged: false
    changes_summary: Added 'be' after 'nor' for natural English and clearer parallelism; otherwise retained the draft's wording.
translation:
  language: es
  text: Hijo mío, no te hagas mentiroso[a], porque la mentira conduce al robo; ni seas amante del dinero ni vanidoso, pues de todas estas cosas nacen los robos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «No te hagas mentiroso» traduce el giro procesual del griego μὴ γίνου ψεύστης, que habla de llegar a ser ese tipo de persona, no solo de decir una mentira puntual.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον μου
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Niño mío
  - Hijo mío, querido
  lexicon: τέκνον
  rationale: «Hijo mío» reproduce el tono afectuoso y exhortativo del vocativo sin sonar infantil en español contemporáneo; es más natural que un calco como «mi niño» y mantiene la relación pedagógica del texto.
- source_word: μὴ γίνου ψεύστης
  english_pob_choice: do not become a liar
  chosen_spanish: no te hagas mentiroso
  alternatives_spanish:
  - no llegues a ser mentiroso
  - no te vuelvas mentiroso
  lexicon: γίνομαι + ψεύστης
  rationale: La idea es de llegar a ser o volverse falso/mentiroso; «no te hagas mentiroso» conserva la fuerza procesual del griego y suena natural en español. Se evita endurecerlo a una mera prohibición de mentir, porque el texto apunta al tipo de persona que uno llega a ser.
- source_word: ὁδηγεῖ τὸ ψεῦσμα εἰς τὴν κλοπήν
  english_pob_choice: lying leads to theft
  chosen_spanish: la mentira conduce al robo
  alternatives_spanish:
  - la mentira lleva al robo
  - la falsedad conduce al robo
  lexicon: ψεῦσμα / κλοπή
  rationale: «Mentira» es la forma más transparente y pública en español para ψεῦσμα en este contexto moral. «Robo» preserva κλοπή como acto de hurto o apropiación ilícita; se evita «hurto» por sonar más técnico y menos inmediato.
- source_word: μηδὲ φιλάργυρος
  english_pob_choice: nor be money-loving
  chosen_spanish: tampoco seas amante del dinero
  alternatives_spanish:
  - ni seas codicioso del dinero
  - ni ames el dinero
  lexicon: φιλάργυρος
  rationale: «Amante del dinero» refleja literalmente la composición de φιλάργυρος y conserva el matiz de apego desordenado al dinero. «Codicioso del dinero» sería posible, pero desplaza el foco desde la afección al vicio de avaricia; por eso se mantiene la imagen de amor desordenado.
- source_word: μηδὲ κενόδοξος
  english_pob_choice: nor vainglorious
  chosen_spanish: ni vanidoso
  alternatives_spanish:
  - ni jactancioso
  - ni dado a la vana gloria
  lexicon: κενόδοξος
  rationale: «Vanidoso» comunica con claridad el sentido de búsqueda de gloria vacía o autoexaltación. Se evita «vana gloria» en el cuerpo principal porque en español suena más eclesiástico y menos directo, aunque el matiz de gloria vacía queda implícito.
- source_word: ἐκ γὰρ τούτων ἁπάντων κλοπαὶ γεννῶνται
  english_pob_choice: for from all these thefts are born
  chosen_spanish: pues de todas estas cosas nacen los robos
  alternatives_spanish:
  - porque de todas estas cosas nacen los robos
  - pues de todas ellas nacen robos
  lexicon: γεννῶνται / κλοπαί
  rationale: Se conserva la metáfora de nacimiento para γεννῶνται, y el plural «robos» refleja el plural griego κλοπαί. «De todas estas cosas» mantiene la referencia cumulativa a los vicios anteriores sin forzar una enumeración más técnica.
theological_decisions:
- issue: Relación entre mentira, avaricia y robo como cadena moral
  english_pob_reading: lying leads to theft; ... from all these thefts are born
  chosen_spanish_reading: la mentira conduce al robo ... de todas estas cosas nacen los robos
  alternative_spanish_readings:
  - la mentira lleva al robo ... de todas estas cosas nacen los robos
  - de estos vicios nacen robos
  rationale: 'El texto presenta una causalidad moral explícita: la mentira es semilla de robo, y el amor al dinero y la vanagloria también engendran actos de hurto. La redacción española conserva esa cadena sin suavizarla ni moralizarla más allá del griego.'
  doctrine_reference: Didaché 3:5; ética moral exhortativa de la catequesis primitiva
translation_notes:
  revision_awareness: 'The English audit trail shows one revision: ''nor money-loving'' was adjusted to ''nor be money-loving'' for parallelism. The Spanish draft already uses a natural parallel construction with ''tampoco seas'', so no further revision-dependent adjustment is needed. The final English reading and the source Greek are aligned on the moral progression from falsehood to theft and on the parallel prohibitions against greed and vainglory.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Se mantiene un registro catequético sobrio y directo, con vocabulario comprensible en lectura pública.
  - «Robos» conserva el plural del griego κλοπαί, aunque en español el singular colectivo «robo» también sería natural; se prefirió el plural por fidelidad formal al cierre del versículo.
