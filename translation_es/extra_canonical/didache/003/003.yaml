review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura exhortativa del griego y conserva «adulterios» para μοιχεῖαι. Sin embargo, ἐπιθυμητής en este contexto no debe ir como «codicioso», porque el propio texto lo vincula causalmente con πορνεία; en español «codicioso/codicia» desplaza el sentido hacia avaricia. También «de boca obscena» es entendible pero menos natural que un adjetivo equivalente a αἰσχρολόγος.
  spanish_quality_summary: 'El español es mayormente claro, pero «no te vuelvas codicioso» suena semánticamente desviado en contexto moral-sexual. «Ni de boca obscena» es aceptable, aunque algo rígido. Conviene una formulación más natural y precisa: «lujurioso» y «hablador obsceno».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La principal cuestión léxica es ajustar ἐπιθυμητής al campo semántico sexual exigido por el contexto y por la traducción inglesa auditada («lustful»). Se puede mantener «soberbio» para ὑψηλοόφθαλμος con nota alternativa «de ojos altivos», dado el historial editorial.
  issues:
  - severity: high
    issue: «codicioso/codicia» para ἐπιθυμητής
    rationale: En español común remite sobre todo a avaricia o ansia posesiva, mientras que el contexto y la auditoría inglesa exigen «lustful/lust», es decir, deseo sexual desordenado que conduce a πορνεία.
  - severity: medium
    issue: «de boca obscena» para αἰσχρολόγος
    rationale: No es incorrecto, pero suena menos natural y menos directo que «hablador obsceno» o «de lenguaje obsceno». Conviene un adjetivo personal paralelo a los otros rasgos de carácter.
  - severity: low
    issue: Nota en «Hijo mío[a]»
    rationale: La alternativa «Niño mío» es posible, pero «hijo mío» ya comunica bien τέκνον en registro exhortativo. La nota puede mantenerse, aunque no es estrictamente necesaria.
  revised_spanish_text: Hijo mío[a], no te vuelvas lujurioso; porque la lujuria conduce a la inmoralidad sexual; ni hablador obsceno, ni soberbio[b], porque de todo esto nacen adulterios.
  revised_footnotes:
  - marker: a
    text: O «niño mío».
    reason: alternative_reading
  - marker: b
    text: O «de ojos altivos».
    reason: alternative_reading
  revision_rationale: 'Se revisa principalmente ἐπιθυμητής: «lujurioso» preserva el vínculo contextual con «inmoralidad sexual» y evita el falso desvío de «codicioso». También se mejora αἰσχρολόγος con «hablador obsceno», que suena más natural y mantiene el enfoque en el habla vergonzosa. Se conserva «soberbio» con nota por la alternativa más literal «de ojos altivos», ya que el expediente inglés mantuvo esa línea principal.'
