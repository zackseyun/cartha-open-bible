base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/003.yaml
  text: My child[a], do not become lustful, for lust leads to sexual immorality; nor foul-mouthed, nor haughty, for from all these adulteries are born.
  footnotes:
  - marker: a
    text: Or 'nor haughty-eyed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:15Z'
    unchanged: false
    changes_summary: Replaced 'having wandering eyes' with 'haughty' to reflect ὑψηλοόφθαλμος more accurately ('high-eyed,' arrogant). Kept the rest largely intact, with minor punctuation smoothing.
translation:
  language: es
  text: Hijo mío[a], no te vuelvas lujurioso; porque la lujuria conduce a la inmoralidad sexual; ni hablador obsceno, ni soberbio[b], porque de todo esto nacen adulterios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «niño mío».
    reason: alternative_reading
  - marker: b
    text: O «de ojos altivos».
    reason: alternative_reading
lexical_decisions:
- source_word: Τέκνον μου
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Niño mío
  - Hijo mío, querido
  lexicon: τέκνον
  rationale: «Hijo mío» conserva el tono personal y exhortativo del griego, y funciona de manera natural en español bíblico sin añadir afecto no explicitado por el texto.
- source_word: ἐπιθυμητής
  english_pob_choice: lustful
  chosen_spanish: codicioso
  alternatives_spanish:
  - lujurioso
  - apasionado por los deseos
  lexicon: ἐπιθυμητής
  rationale: El griego expresa una persona dominada por el deseo/codicia. En español, «codicioso» mantiene la fuerza de un deseo desordenado; sin embargo, para no perder el matiz sexual del contexto, se conserva la relación causal con «inmoralidad sexual» en la cláusula siguiente.
- source_word: πορείαν
  english_pob_choice: sexual immorality
  chosen_spanish: la inmoralidad sexual
  alternatives_spanish:
  - la fornicación
  - la conducta sexual inmoral
  lexicon: πορεία
  rationale: Aunque el término griego no nombra de forma técnica una sola categoría, el contexto de «adulterios» al final justifica una referencia amplia a la conducta sexual inmoral, como en la tradición auditada en inglés.
- source_word: αἰσχρολόγος
  english_pob_choice: foul-mouthed
  chosen_spanish: de boca obscena
  alternatives_spanish:
  - hablador obsceno
  - de lenguaje grosero
  lexicon: αἰσχρολόγος
  rationale: La expresión española intenta reflejar el carácter verbal de la injuria o lenguaje vergonzoso sin suavizarla a una mera grosería leve. «De boca obscena» es idiomático y mantiene la concisión del original.
- source_word: ὑψηλοόφθαλμος
  english_pob_choice: haughty
  chosen_spanish: soberbio
  alternatives_spanish:
  - altanero
  - de ojos altivos
  lexicon: ὑψηλοόφθαλμος
  rationale: La revisión inglesa volvió a «haughty» por priorizar el valor etimológico de «high-eyed», es decir, orgulloso/altivo. En español, «soberbio» comunica ese sentido con claridad y conserva la posible tensión con una lectura más concreta de mirada lasciva sin resolverla artificialmente.
- source_word: μοιχεῖαι
  english_pob_choice: adulteries
  chosen_spanish: adulterios
  alternatives_spanish:
  - adulterios
  - infidelidades matrimoniales
  lexicon: μοιχεῖαι
  rationale: «Adulterios» es la equivalencia directa y mantiene la fuerza lexical plural del griego. No se reduce a un concepto más general para respetar el término usado en la fuente.
theological_decisions:
- issue: Relación entre deseo desordenado y pecado sexual
  english_pob_reading: lust leads to sexual immorality
  chosen_spanish_reading: la codicia conduce a la inmoralidad sexual
  alternative_spanish_readings:
  - el deseo conduce a la inmoralidad sexual
  - la lujuria conduce a la inmoralidad sexual
  rationale: El texto griego presenta una cadena causal entre deseo y pecado sexual. Se conserva esa relación sin moralizar más allá de lo dicho; «codicia» intenta abarcar el impulso desordenado que el contexto vincula con el ámbito sexual.
  doctrine_reference: Ética sexual cristiana; admonición moral sapiencial
- issue: Sentido de ὑψηλοόφθαλμος en el contexto de pecados que engendran adulterios
  english_pob_reading: nor haughty
  chosen_spanish_reading: ni soberbio
  alternative_spanish_readings:
  - ni altivo
  - ni de ojos altivos
  - ni con mirada lasciva
  rationale: La historia editorial en inglés muestra una tensión entre una lectura etimológica («haughty») y una lectura contextual más concreta. Para el español, se mantiene la lectura de orgullo/altivez como traducción primaria, pero sin borrar que el contexto inmediato sigue siendo sexual y culmina en «adulterios».
  doctrine_reference: Exhortación ética; crítica del orgullo y de la mirada desordenada
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés que revirtió «having wandering eyes» a «haughty» por priorizar el valor etimológico de ὑψηλοόφθαλμος. La versión española sigue esa decisión, pero mantiene la conexión contextual con el lenguaje sexual y la culminación en adulterios, sin imponer una lectura que el audit trail no respalda explícitamente.
  spanish_consistency_notes:
  - Se conservó un registro bíblico sobrio y contemporáneo, sin recurrir a fórmulas eclesiásticas arcaizantes.
  - «Inmoralidad sexual» se usó para reflejar el alcance contextual del término griego sin estrecharlo indebidamente.
  - «Soberbio» se eligió como equivalente natural de la lectura etimológica confirmada por la revisión inglesa, mientras la nota alternativa preserva la posibilidad de «de ojos altivos».
  - Se mantuvo el plural «adulterios» para respetar la forma plural del griego.
