source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τέκνον μου, μὴ γίνου ἐπιθυμητής· ὁδηγεῖ γὰρ ἡ ἐπιθυμία πρὸς τὴν πορείαν· μηδὲ αἰσχρολόγος μηδὲ ὑψηλοόφθαλμος· ἐκ γὰρ τούτων ἀπάντων μοιχεῖαι γεννῶνται.
