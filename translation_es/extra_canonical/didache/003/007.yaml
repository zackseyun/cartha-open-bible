    changes_summary: Replaced 'since' with 'because' for slightly more natural formal English; removed the stray footnote marker 'c' from the translation text.
translation:
  language: es
  text: Pero sé manso, porque los mansos heredarán la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πραῢς
  english_pob_choice: meek
  chosen_spanish: manso
  alternatives_spanish:
  - apacible
  - humilde
  - dulce
  lexicon: πραΰς
  rationale: En español, «manso» comunica mejor la cualidad moral y actitudinal del término griego en este contexto exhortativo. «Apacible» o «humilde» pueden captar rasgos relacionados, pero desplazan el matiz de mansedumbre/templanza que la formulación inglesa POB conserva con «meek».
- source_word: κληρονομήσουσι
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - recibirán en herencia
  - poseerán
  - obtendrán como herencia
  lexicon: κληρονομέω
  rationale: «Heredarán» es el equivalente natural y fiel del verbo griego de herencia, manteniendo la relación jurídica y escatológica del texto. Otras opciones explicitan el sentido, pero no son tan directas ni tan transparentes para la correspondencia léxica.
- source_word: τὴν γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la tierra prometida
  lexicon: γῆ
  rationale: Se mantiene «la tierra» como equivalente directo de γῆ. Aunque en algunos contextos podría matizarse como «el país» o aludir a la tierra prometida, aquí la formulación bíblica general debe conservarse sin restringirla indebidamente.
theological_decisions:
- issue: Alcance de «la tierra»
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra prometida
  rationale: El griego dice γῆν sin especificación adicional. Traducir «la tierra» conserva la amplitud del enunciado y evita introducir una identificación más estrecha que el texto no explicita. La lectura también armoniza con la bienaventuranza conocida sin depender de una paráfrasis.
  doctrine_reference: Mateo 5:5; Salmo 37:11
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «since» por «because» para mayor naturalidad. En español se optó por «porque», que reproduce con naturalidad la relación causal del griego ἐπεὶ sin requerir nota textual adicional. No hay variantes textuales relevantes en el paquete fuente.
  spanish_consistency_notes:
  - Se evitó «Cristo» u այլ terminología no presente en el verso.
  - «Manso» se usa aquí como adjetivo moral; no como referencia a docilidad animal.
  - La estructura causal se mantiene explícita con «porque», en paralelo a la revisión inglesa.
  - Se conservó el orden breve y sentencioso del original, propio de una exhortación sapiencial.
