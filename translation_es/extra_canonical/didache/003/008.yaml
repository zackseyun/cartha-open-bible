translation:
  language: es
  text: Sé paciente y misericordioso[a] y sin malicia, y tranquilo, y bueno, y siempre temblando ante las palabras que escuchaste.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Conviértete en paciente y misericordioso y sin malicia, y tranquilo, y bueno, y siempre temblando ante las palabras que escuchaste”.'
    reason: alternative_reading
lexical_decisions:
- source_word: Γίνου
  english_pob_choice: Be / Become
  chosen_spanish: Sé
  alternatives_spanish:
  - Conviértete en
  - Llega a ser
  lexicon: γίνομαι
  rationale: En una exhortación moral, el imperativo funciona naturalmente como “sé” en español. “Conviértete en” puede sugerir un proceso más marcado que el griego aquí no exige.
- source_word: μακρόθυμος
  english_pob_choice: patient
  chosen_spanish: paciente
  alternatives_spanish:
  - longánimo
  - tardo para la ira
  lexicon: μακρόθυμος
  rationale: “Paciente” es la equivalencia más natural y transparente en español; conserva la idea de paciencia perseverante sin introducir una perífrasis pesada.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - misericordioso y compasivo
  lexicon: ἐλεήμων
  rationale: La palabra española más directa y eclesialmente inteligible es “misericordioso”, que mantiene la fuerza de mostrar misericordia.
- source_word: ἄκακος
  english_pob_choice: guileless
  chosen_spanish: sin engaño
  alternatives_spanish:
  - inocente
  - sencillo
  - sin malicia
  lexicon: ἄκακος
  rationale: “Guileless” no tiene un equivalente único y exacto en español. “Sin engaño” preserva la ausencia de astucia o fraude sin convertirlo en una lectura demasiado moralizada o sentimental.
- source_word: ἡσύχιος
  english_pob_choice: quiet
  chosen_spanish: tranquilo
  alternatives_spanish:
  - sosegado
  - callado
  lexicon: ἡσύχιος
  rationale: “Tranquilo” comunica bien la idea de quietud/serenidad en español moderno; “callado” estrecharía indebidamente el sentido hacia lo meramente verbal.
- source_word: ἀγαθός
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  lexicon: ἀγαθός
  rationale: “Bueno” es el equivalente directo y más general. Se evita “bondadoso” porque estrecha la amplitud ética del término griego.
- source_word: τρέμων τοὺς λόγους
  english_pob_choice: trembling at the words
  chosen_spanish: temblando ante las palabras
  alternatives_spanish:
  - temblando por las palabras
  - temiendo las palabras
  - temblando ante lo que has oído
  lexicon: τρέμω + λόγοι
  rationale: “Temblando ante” conserva la imagen reverente y el aspecto participial del original. “Ante las palabras” mantiene el complemento concreto del griego, en vez de generalizarlo a una paráfrasis.
- source_word: ἤκουσας
  english_pob_choice: you heard
  chosen_spanish: escuchaste
  alternatives_spanish:
  - oíste
  - has escuchado
  lexicon: ἀκούω
  rationale: “Escuchaste” refleja un acto pasado completo y suena natural en español. “Oíste” sería más literal, pero aquí “escuchaste” mantiene mejor la idea de recepción atenta de la enseñanza.
theological_decisions:
- issue: La forma del imperativo γίνου y su alcance sobre toda la serie de adjetivos y el participio final
  english_pob_reading: Be patient and merciful and guileless and quiet and good, and always trembling at the words that you heard.
  chosen_spanish_reading: Sé paciente y misericordioso, y sin engaño, y tranquilo, y bueno, y siempre temblando ante las palabras que escuchaste.
  alternative_spanish_readings:
  - Conviértete en paciente y misericordioso...
  - Sé paciente y misericordioso...
  rationale: Se conserva el valor exhortativo global del imperativo sin forzar “conviértete en” sobre el participio final. La serie se lee como una lista coordinada de cualidades morales exigidas al oyente.
  doctrine_reference: Catequesis moral de la Didaché; exhortación ética sin desarrollo doctrinal específico
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió “have heard” a “heard” para reflejar mejor el aoristo ἤκουσας y trató γίνου como un imperativo moral natural (“Be”) en inglés. La redacción española sigue esa lectura, usando un imperativo directo (“Sé”) y un pretérito simple (“escuchaste”) para reflejar una catequesis ya recibida.
  spanish_consistency_notes:
  - Se evita “Señor”/“Cristo” porque no aparecen en el texto.
  - “Sin engaño” se usa como opción sobria para ἄκακος y no como comentario interpretativo.
  - La puntuación con comas refleja la acumulación de rasgos éticos en la serie griega.
