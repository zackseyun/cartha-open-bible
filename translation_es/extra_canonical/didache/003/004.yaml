source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τέκνον μου, μὴ γίνου οἰωνοσκόπος· ἐπειδὴ ὁδηγεῖ εἰς τὴν εἰδωλολατρείαν· μηδὲ ἐπαοιδὸς μηδὲ μαθηματικὸς μηδὲ περικαθαίρων, μηδὲ θέλε αὐτὰ βλέπειν· ἐκ γὰρ τούτων ἁπάντων εἰδωλολατρεία γεννᾶται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/004.yaml
  text: My child[a], do not become an observer of omens, because it leads to idolatry; nor an enchanter, nor an astrologer, nor one who performs purifications, nor even be willing to look at these things; for from all these idolatry is born.
  footnotes:
  - marker: a
    text: Or 'nor even be willing to look upon them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:16Z'
    unchanged: false
    changes_summary: 'Adjusted a few phrases for more natural English while preserving the source: changed ''since it leads into idolatry'' to ''because it leads to idolatry'' and ''look upon these things'' to ''look at these things.'''
translation:
  language: es
  text: Hijo mío[a], no llegues a ser observador de agüeros, porque conduce a la idolatría; ni hechicero, ni astrólogo, ni quien hace purificaciones, ni siquiera quieras mirar estas cosas; porque de todas ellas nace la idolatría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Mi hijo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Τέκνον μου
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Niño mío
  lexicon: τέκνον
  rationale: Hijo mío conserva la cercanía paternal y es natural en español. «Mi hijo» también sería posible, pero «Hijo mío» mantiene mejor el tono vocativo y la inversión afectiva del griego.
- source_word: οἰωνοσκόπος
  english_pob_choice: observer of omens
  chosen_spanish: observador de agüeros
  alternatives_spanish:
  - adivino de presagios
  - observador de presagios
  lexicon: οἰωνοσκόπος
  rationale: La expresión griega apunta a la observación de señales/augurios para sacar presagios. «Agüeros» comunica bien esa práctica en español sin convertirla en un término técnico demasiado moderno.
- source_word: ἐπαοιδός
  english_pob_choice: enchanter
  chosen_spanish: adivino
  alternatives_spanish:
  - encantador
  - hechicero
  lexicon: ἐπαοιδός
  rationale: El contexto agrupa prácticas mágicas/ocultas. «Adivino» es un equivalente funcional en español para alguien que practica artes ocultas, aunque no agota toda la fuerza del término. Se evita «encantador» por su posible lectura positiva o ambigua.
- source_word: μαθηματικός
  english_pob_choice: astrologer
  chosen_spanish: astrólogo
  alternatives_spanish:
  - adivino astrológico
  - matemático
  lexicon: μαθηματικός
  rationale: En este contexto, el término no significa «matemático» en el sentido moderno, sino practicante de astrología o artes adivinatorias asociadas con los astros. «Astrólogo» es la mejor equivalencia en español.
- source_word: περικαθαίρων
  english_pob_choice: one who performs purifications
  chosen_spanish: quien hace purificaciones
  alternatives_spanish:
  - purificador
  - quien realiza rituales de purificación
  lexicon: περικαθαίρων
  rationale: La forma griega describe a una persona que realiza limpiezas o purificaciones rituales. La frase española conserva la acción sin imponer una interpretación más específica de la que exige el texto.
- source_word: αὐτὰ
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - ellas
  - estos ritos
  lexicon: αὐτά
  rationale: Se sigue la revisión inglesa que aclaró que el pronombre neutro plural refiere a las prácticas, no a las personas. «Estas cosas» reproduce con claridad esa referencia en español.
- source_word: εἰδωλολατρεία
  english_pob_choice: idolatry
  chosen_spanish: idolatría
  alternatives_spanish:
  - culto a los ídolos
  - idolatría pagana
  lexicon: εἰδωλολατρεία
  rationale: «Idolatría» es el equivalente directo y establecido en español. Se mantiene tanto al inicio como al final para preservar el énfasis retórico del texto.
theological_decisions:
- issue: Relación causal entre prácticas ocultas e idolatría
  english_pob_reading: because it leads to idolatry / for from all these idolatry is born
  chosen_spanish_reading: porque conduce a la idolatría / porque de todas ellas nace la idolatría
  alternative_spanish_readings:
  - pues lleva a la idolatría
  - ya que de todas estas cosas nace la idolatría
  rationale: 'El texto presenta una advertencia causal, no solo una asociación vaga. Se mantiene la doble formulación causal para reflejar ambos miembros del griego: la práctica conduce a la idolatría y de tales cosas brota la idolatría.'
  doctrine_reference: Didaché 3:4; prohibición de prácticas idólatras y ocultistas
- issue: Referencia del pronombre neutro plural αὐτὰ
  english_pob_reading: these things
  chosen_spanish_reading: estas cosas
  alternative_spanish_readings:
  - ellos
  - esos
  rationale: La revisión inglesa corrigió la ambigüedad para que el pronombre no parezca referirse a las personas nombradas, sino a las prácticas o instrumentos. En español se preserva esa precisión con «estas cosas».
  doctrine_reference: Didaché 3:4; gramática griega del neutro plural
translation_notes:
  revision_awareness: 'La versión inglesa revisada afinó dos puntos relevantes para el español: corrigió la referencia de αὐτὰ a «these things» para evitar que parezca personal, y prefirió «because it leads to idolatry» / «look at these things» por naturalidad. La redacción española sigue esas decisiones y conserva la advertencia causal y la referencia impersonal del pronombre neutro plural.'
  spanish_consistency_notes:
  - Se mantiene «idolatría» de manera uniforme para εἰδωλολατρεία.
  - Se traduce el vocabulario ocultista con términos corrientes pero fieles al contexto, sin suavizar la advertencia.
  - «Estas cosas» conserva la referencia neutra plural a las prácticas, en línea con la revisión auditada del inglés.
  - El tono de exhortación paternal se conserva con «Hijo mío».
