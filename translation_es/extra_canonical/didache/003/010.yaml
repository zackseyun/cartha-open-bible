source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τὰ συμβαίνοντά σοι ἐνεργήματα ὡς ἀγαθὰ προσδέξῃ, εἰδὼς ὅτι ἄτερ Θεοῦ οὐδὲν γίνεται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/010.yaml
  text: You shall accept the things that happen to you as good, knowing that apart from God nothing happens.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:19Z'
    unchanged: false
    changes_summary: Corrected the typo ('good,d' → 'good,') and revised 'the events that befall you' to the more natural and lexically broad 'the things that happen to you,' which better reflects τὰ συμβαίνοντά σοι while preserving the formal sense.
translation:
  language: es
  text: Acogerás como bueno[a] todo lo que te suceda, sabiendo que, aparte de Dios, nada sucede.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “Recibirás como bueno todo lo que te suceda”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὰ συμβαίνοντά σοι
  english_pob_choice: the things that happen to you
  chosen_spanish: todo lo que te suceda
  alternatives_spanish:
  - las cosas que te sucedan
  - los acontecimientos que te ocurran
  lexicon: συμβαίνω
  rationale: El griego apunta a lo que acontece o sucede, sin restringirse a “eventos” en sentido técnico. En español, “todo lo que te suceda” conserva la amplitud semántica y la naturalidad que buscó la revisión inglesa al pasar de una expresión más rígida a “the things that happen to you”.
- source_word: ἐνεργήματα
  english_pob_choice: things that happen
  chosen_spanish: lo que te suceda
  alternatives_spanish:
  - las cosas que te acontezcan
  - los hechos que te ocurran
  lexicon: ἐνέργημα
  rationale: Aunque el sustantivo puede sugerir “acciones/operaciones”, el contexto y la equivalencia auditada del inglés favorecen una referencia amplia a lo que acontece. La formulación española evita cargar el texto con una precisión no exigida por la fuente.
- source_word: ὡς ἀγαθὰ προσδέξῃ
  english_pob_choice: You shall accept ... as good
  chosen_spanish: Acogerás como bueno
  alternatives_spanish:
  - Recibirás como bueno
  - Aceptarás como bueno
  lexicon: προσδέχομαι
  rationale: “Acoger” transmite la idea de recibir/aceptar de manera positiva y deliberada, con mejor fluidez que un calco más duro. Mantiene el mandato y la evaluación moral “como bueno” sin añadir interpretación.
- source_word: ἄτερ Θεοῦ
  english_pob_choice: apart from God
  chosen_spanish: aparte de Dios
  alternatives_spanish:
  - sin Dios
  - fuera de Dios
  lexicon: ἄτερ
  rationale: “Aparte de Dios” reproduce la relación de exclusión o separación de ἄτερ sin exagerar con un matiz metafísico no explicitado. “Sin Dios” sería posible, pero en español puede sonar más absoluto o teológico de lo que exige la frase corta.
- source_word: οὐδὲν γίνεται
  english_pob_choice: nothing happens
  chosen_spanish: nada sucede
  alternatives_spanish:
  - nada acontece
  - nada ocurre
  lexicon: γίνομαι
  rationale: “Sucede” es el equivalente más natural y amplio para γίνομαι en este contexto. Conserva el paralelismo con “te suceda” y mantiene la afirmación general de la frase sin sobrerrefinar el verbo.
theological_decisions:
- issue: Providencia divina y afirmación universal
  english_pob_reading: apart from God nothing happens
  chosen_spanish_reading: aparte de Dios, nada sucede
  alternative_spanish_readings:
  - sin Dios, nada sucede
  - fuera de Dios, nada sucede
  rationale: 'La redacción conserva la tesis fuerte del texto: la dependencia universal de todo acontecimiento respecto de Dios. No se suaviza ni se reinterpreta el alcance de la afirmación.'
  doctrine_reference: Providencia divina
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó “the events that befall you” por “the things that happen to you” para ampliar y naturalizar el alcance de συμβαίνοντά σοι sin perder el sentido formal. La versión española sigue esa misma línea de amplitud léxica y fluidez.
  spanish_consistency_notes:
  - Se mantuvo “Dios” para Θεοῦ conforme al estándar del proyecto.
  - No se introdujo “Cristo” ni terminología eclesiástica ajena al texto.
  - La nota a pie de página preserva una alternativa válida sin debilitar la lectura principal.
