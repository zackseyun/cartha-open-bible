review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: aceptar lo que ocurre y reconocer que nada sucede aparte de Dios. Sin embargo, ὡς ἀγαθὰ es plural neutro (''como cosas buenas'' / ''como bueno'' referido a ''lo que te sucede''), y en español ''todo lo que te suceda'' pide naturalmente ''bueno'', no ''buena''. El problema principal no es semántico sino de concordancia y anclaje de nota.'
  spanish_quality_summary: La redacción es clara y natural en español eclesial moderno. No obstante, 'Acogerás como bueno[a] todo lo que te suceda' suena algo forzado por el lugar de la nota y por la leve aspereza de 'acogerás' en este contexto. 'Aceptarás' resulta más directo y fiel a 'you shall accept'. También conviene mantener la fluidez sin coma innecesaria tras 'que'.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dios' está bien para Θεοῦ. No hay términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión 'aparte de Dios' es aceptable y fiel a ἄτερ Θεοῦ.
  issues:
  - severity: medium
    issue: Concordancia/adjetivación en 'Acogerás como bueno[a] todo lo que te suceda'
    rationale: El adjetivo debe concordar con el referente neutro de 'todo lo que te suceda'; en español natural corresponde 'bueno', sin nota insertada que rompa la lectura.
  - severity: low
    issue: Elección de 'acogerás'
    rationale: Aunque posible para προσδέξῃ, en este contexto exhortativo 'aceptarás' suena más natural y coincide mejor con el inglés auditado 'accept'.
  - severity: low
    issue: Nota léxica innecesaria
    rationale: La alternativa 'Recibirás como bueno...' no preserva una diferencia significativa que deba mantenerse en nota; además el anclaje [a] interrumpe una frase breve sin necesidad.
  revised_spanish_text: Aceptarás como bueno todo lo que te suceda, sabiendo que aparte de Dios nada sucede.
  revision_rationale: Se corrige la expresión para un español más natural y fiel al mandato de προσδέξῃ, eliminando una nota innecesaria y la interrupción visual que causaba. También se simplifica la puntuación para mayor fluidez sin alterar el sentido.
