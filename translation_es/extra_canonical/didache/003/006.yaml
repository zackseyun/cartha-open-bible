  text: Τέκνον μου, μὴ γίνου γόγγυσος· ἐπειδὴ ὁδηγεῖ εἰς τὴν βλασφημίαν· μηδὲ αὐθάδης μηδὲ πονηρόφρων· ἐκ γὰρ τούτων ἁπάντων βλασφημίαι γεννῶνται.
