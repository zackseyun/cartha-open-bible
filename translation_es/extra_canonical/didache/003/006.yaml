    text: «Murmurador» refleja el griego γόγγυσος y conserva la idea de queja o rezongo persistente; también podría traducirse «quejumbroso».
    reason: lexical_alternative
  revision_rationale: Se conserva el contenido del borrador porque es fiel y natural, pero se corrige el formato del anclaje de nota para cumplir la convención requerida del proyecto. También se pule mínimamente la redacción de la nota («traducirse» en lugar de «leerse») para mayor precisión traductológica.
