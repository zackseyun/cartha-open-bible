base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/006.yaml
  text: My child, do not become a grumbler, since it leads to blasphemy; nor self-willed, nor evil-minded, for from all these blasphemies are born.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:17Z'
    unchanged: false
    changes_summary: Removed the stray footnote marker after 'blasphemy' and corrected punctuation spacing. Kept the wording otherwise, since it is accurate and complete.
translation:
  language: es
  text: Hijo mío, no te hagas murmurador[a], porque eso conduce a la blasfemia; ni obstinado, ni malintencionado, pues de todas estas cosas nacen blasfemias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Murmurador» refleja el griego γόγγυσος y conserva la idea de queja o rezongo persistente; también podría leerse «quejumbroso».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τέκνον μου
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío, hijo
  - Mi hijo
  lexicon: τέκνον
  rationale: «Hijo mío» comunica la relación afectuosa y exhortativa del vocativo sin volverlo artificial en español. Mantiene la calidez de «My child» y es natural para una admonición sapiencial.
- source_word: μὴ γίνου γόγγυσος
  english_pob_choice: do not become a grumbler
  chosen_spanish: no te hagas murmurador
  alternatives_spanish:
  - no te vuelvas quejumbroso
  - no seas murmurador
  - no te conviertas en quejoso
  lexicon: γόγγυσος
  rationale: El inglés POB eligió la fuerza conductual de «grumbler»; en español, «murmurador» preserva el sentido de queja/rezongo recurrente y encaja bien con el trasfondo bíblico de murmuración. «Hacerse» expresa proceso de volverse así, como γίνου.
- source_word: ἀθάδης
  english_pob_choice: self-willed
  chosen_spanish: obstinado
  alternatives_spanish:
  - terco
  - voluntarioso
  - autoafirmado
  lexicon: ἀθάδης
  rationale: «Obstinado» conserva la idea de una voluntad cerrada o dura frente a corrección. Es más claro y idiomático que un calco literal, y mantiene el valor moral negativo que el POB atribuye al término.
- source_word: πονηρόφρων
  english_pob_choice: evil-minded
  chosen_spanish: malintencionado
  alternatives_spanish:
  - mal pensado
  - de mala intención
  - malvado de pensamiento
  lexicon: πονηρόφρων
  rationale: El compuesto apunta a una disposición mental mala o dañina. «Malintencionado» recoge bien la orientación interior y es comprensible en español contemporáneo, sin diluir el componente de mente/disposición.
- source_word: βλασφημία / βλασφημίαι
  english_pob_choice: blasphemy / blasphemies
  chosen_spanish: blasfemia / blasfemias
  alternatives_spanish:
  - maledicencia / maledicencias
  - injuria / injurias
  lexicon: βλασφημία
  rationale: Se conserva «blasfemia» porque el texto griego y el POB la usan en sentido fuerte de hablar contra Dios, no solo de insulto general. En plural, «blasfemias» sigue el número del original.
theological_decisions:
- issue: Relación causal entre la murmuración y la blasfemia
  english_pob_reading: since it leads to blasphemy
  chosen_spanish_reading: porque eso conduce a la blasfemia
  alternative_spanish_readings:
  - ya que lleva a la blasfemia
  - pues eso produce blasfemia
  rationale: La cláusula causal debe mostrar que la murmuración no es solo un defecto social, sino un camino que desemboca en blasfemia. «Eso conduce a» preserva esa progresión moral sin añadir interpretación extra.
  doctrine_reference: Ética bíblica del habla; reverencia debida a Dios en el lenguaje.
- issue: Enumeración de vicios y resultado final
  english_pob_reading: nor self-willed, nor evil-minded, for from all these blasphemies are born
  chosen_spanish_reading: ni obstinado, ni malintencionado, pues de todas estas cosas nacen blasfemias
  alternative_spanish_readings:
  - ni terco, ni de mala intención, pues de todas ellas nacen blasfemias
  - ni voluntarioso, ni perverso de mente, pues de todas estas nacen blasfemias
  rationale: Se mantiene la cadena exhortativa y la conclusión causal del texto. «Nacen blasfemias» reproduce la metáfora de origen del griego y la pasiva conceptual del inglés POB sin volverla abstracta.
  doctrine_reference: Formación moral del creyente; el pecado del corazón se expresa en la lengua.
translation_notes:
  revision_awareness: El texto base inglés ya fue revisado para quitar un marcador accidental tras «blasphemy» y ajustar la puntuación; no introduce una variante textual nueva. La presente propuesta sigue ese contenido estable y traduce directamente desde el griego con el POB inglés como control de sentido.
  spanish_consistency_notes:
  - Se mantiene «blasfemia/blasfemias» para conservar la fuerza teológica del pasaje.
  - Se usa «Hijo mío» como vocativo afectuoso y exhortativo, no como parentesco biológico literal.
  - «Obstinado» y «malintencionado» conservan la lista de vicios sin suavizarla.
  - La nota a pie de página marca la única alternativa lexical relevante en español para γόγγυσος.
