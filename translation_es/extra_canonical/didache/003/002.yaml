source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Μὴ γίνου ὀργίλος· ὁδηγεῖ γὰρ ἡ ὀργὴ πρὸς τὸν φόνον· μηδὲ ζηλωτὴς μηδὲ ἐριστικὸς μηδὲ θυμικός· ἐκ γὰρ τούτων ἀπάντων φόνοι γεννῶνται.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/002.yaml
  text: Do not become quick-tempered, for anger leads to murder; nor be jealous, nor quarrelsome, nor hot-headed, for from all these murders are born.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:31:12Z'
    unchanged: false
    changes_summary: Added the missing verb 'be' after 'nor' for natural and complete English; otherwise retained the draft's accurate wording.
translation:
  language: es
  text: No te vuelvas irascible, porque la ira lleva al homicidio; ni seas celoso, ni contencioso, ni impulsivo, porque de todo esto nacen los homicidios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Μὴ γίνου ὀργίλος
  english_pob_choice: Do not become quick-tempered
  chosen_spanish: No te hagas pronto iracundo
  alternatives_spanish:
  - No te vuelvas pronto iracundo
  - No te hagas colérico
  lexicon: γίνομαι; ὀργίλος
  rationale: La forma imperativa negativa con γίνου pide evitar un estado o llegar a serlo; ‘no te hagas’ conserva ese matiz procesual mejor que un simple ‘no seas’. ‘Pronto iracundo’ reproduce la rapidez de ‘quick-tempered’ sin perder naturalidad en español.
- source_word: ὀργή
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: ὀργή
  rationale: ‘Ira’ mantiene el tono fuerte y el vínculo léxico con el efecto moral que conduce al homicidio. ‘Enojo’ suaviza demasiado; ‘cólera’ es posible, pero menos común en registro bíblico actual.
- source_word: φόνον
  english_pob_choice: murder / murders
  chosen_spanish: homicidio / homicidios
  alternatives_spanish:
  - asesinato / asesinatos
  - muerte
  lexicon: φόνος
  rationale: ‘Homicidio’ preserva la fuerza legal y moral del término griego, sin reducirlo a un sentido meramente general de ‘muerte’. En la clausula final, el plural ‘homicidios’ sigue el griego pluralizado y el inglés POB ‘murders’.
- source_word: ζηλωτὴς
  english_pob_choice: jealous
  chosen_spanish: tengas envidia
  alternatives_spanish:
  - seas celoso
  - seas envidioso
  lexicon: ζηλωτής
  rationale: En este contexto, el término describe rivalidad celosa o envidia, no simplemente celo positivo. ‘Tengas envidia’ expresa mejor la relación con las pasiones prohibidas, aunque admite que el griego puede abarcar celos y emulación.
- source_word: ἐριστικός
  english_pob_choice: quarrelsome
  chosen_spanish: contencioso
  alternatives_spanish:
  - pendenciero
  - disputador
  lexicon: ἐριστικός
  rationale: ‘Contencioso’ es un equivalente sobrio y tradicional para alguien dado a pleitos o disputas, cercano al sentido de ‘quarrelsome’ sin sonar demasiado coloquial.
- source_word: θυμικός
  english_pob_choice: hot-headed
  chosen_spanish: impulsivo
  alternatives_spanish:
  - iracundo
  - de genio vivo
  lexicon: θυμικός
  rationale: ‘Impulsivo’ comunica la prontitud vehemente de la disposición descrita y evita repetir ‘ira’ varias veces. Aunque ‘hot-headed’ sugiere temperamento fuerte, el conjunto de la lista pide una expresión breve y natural.
theological_decisions:
- issue: La progresión moral desde la ira al homicidio
  english_pob_reading: for anger leads to murder; ... for from all these murders are born
  chosen_spanish_reading: porque la ira lleva al homicidio; ... porque de todo esto nacen los homicidios
  alternative_spanish_readings:
  - porque la ira conduce al homicidio; ... porque de todo esto nacen los homicidios
  - pues la ira lleva al homicidio; ... pues de todo esto nacen los homicidios
  rationale: Se conserva la relación causal explícita entre la ira y el homicidio, así como la imagen final de nacimientos de homicidios. ‘Lleva al’ es directo y fiel al griego ὁδηγεῖ πρὸς.
  doctrine_reference: Didaché 3:2; ética moral de las pasiones y sus frutos
translation_notes:
  revision_awareness: El inglés POB revisado solo ajustó una elipsis gramatical (‘nor be jealous’), sin cambiar el contenido. La versión española refleja directamente la lista completa de vicios del griego y conserva la causalidad y el plural final del texto fuente.
  spanish_consistency_notes:
  - Se mantiene ‘ira’ para ὀργή y ‘homicidio/homicidios’ para φόνος/φόνοι a fin de conservar la conexión interna del versículo.
  - Se evita traducir ζηλωτής como ‘celoso’ de manera automática, porque en este contexto la idea dominante es la envidia o rivalidad resentida.
  - El orden de la lista sigue el griego y el inglés auditado, con un estilo natural en español latinoamericano.
