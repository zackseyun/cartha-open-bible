review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura exhortativa y causal del griego: prohibición de llegar a ser ὀργίλος, explicación de que la ira conduce al φόνος, y lista adicional de disposiciones de las que nacen φόνοι. Sin embargo, hay dos ajustes de fidelidad recomendables: (1) ''pronto iracundo'' suena poco natural y no representa bien en español el valor idiomático de quick-tempered / ὀργίλος; (2) ζηλωτής se alinea mejor aquí con ''celoso'' o ''envidioso'' como rasgo, no con la perífrasis verbal ''tengas envidia'', ya que la serie enumera disposiciones personales paralelas.'
  spanish_quality_summary: 'El texto es comprensible y digno, pero ''No te hagas pronto iracundo'' resulta forzado en español. ''Pronto'' modifica de manera poco idiomática a ''iracundo''. También la serie mejora en paralelismo con adjetivos: ''ni seas celoso, ni contencioso, ni impulsivo''. El resto es claro; ''contencioso'' funciona bien y ''homicidio/homicidios'' mantiene un registro sobrio y preciso.'
  glossary_alignment: No hay términos del glosario mayor en juego. La elección de 'homicidio/homicidios' para φόνος es defendible y coherente con la auditoría inglesa. 'Ira' para ὀργή también está bien. Recomiendo ajustar ζηλωτής a 'celoso' para conservar el carácter de disposición personal listado junto con 'contencioso' y 'impulsivo'.
  issues:
  - severity: medium
    issue: 'Expresión poco idiomática: ''No te hagas pronto iracundo'''
    rationale: Aunque intenta reflejar el matiz ingresivo de γίνου, en español suena antinatural. 'No te vuelvas iracundo' o 'No seas irascible' sería más natural; dado el inglés auditado 'quick-tempered', 'No te vuelvas irascible' preserva bien sentido y legibilidad.
  - severity: medium
    issue: Pérdida de paralelismo en 'ni tengas envidia'
    rationale: ζηλωτής es un sustantivo/adjetival de carácter personal en una serie de rasgos. 'Ni tengas envidia' cambia a una construcción verbal y rompe el paralelismo con 'ni seas contencioso, ni impulsivo'. 'Ni seas celoso' o 'ni seas envidioso' conserva mejor la lista de disposiciones.
  - severity: low
    issue: Posible matiz de θυμικός
    rationale: '''Impulsivo'' es aceptable, pero puede suavizar el matiz de ''fogoso/de mal genio''. No obstante, sigue siendo una opción legible y suficientemente cercana en este contexto ético, por lo que no exige cambio obligatorio.'
  revised_spanish_text: No te vuelvas irascible, porque la ira lleva al homicidio; ni seas celoso, ni contencioso, ni impulsivo, porque de todo esto nacen los homicidios.
  revision_rationale: 'Se mejoró la naturalidad del español sin apartarse del griego ni de la auditoría inglesa: ''No te vuelvas irascible'' expresa mejor el sentido de llegar a ser ὀργίλος que la frase forzada ''pronto iracundo''; y ''ni seas celoso'' restaura el paralelismo de la serie de disposiciones personales. Se conservaron ''ira'', ''homicidio'' y la imagen final ''nacen los homicidios'' por su buena fidelidad al texto fuente.'
