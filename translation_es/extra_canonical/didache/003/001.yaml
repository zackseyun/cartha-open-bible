translation:
  language: es
  text: Hijo mío, huye de todo mal y de todo lo semejante a él. No te hagas iracundo, porque la ira conduce al homicidio; ni celoso, ni contencioso, ni arrebatado, pues de todas estas cosas nacen homicidios. Hijo mío, no te hagas lujurioso, porque el deseo conduce a la inmoralidad sexual[a]; ni de lengua obscena, ni de mirada altiva, pues de todas estas cosas nacen adulterios. Hijo mío, no te hagas observador de presagios, porque esto conduce a la idolatría; ni encantador, ni astrólogo, ni uno que practica purificaciones rituales, ni quieras siquiera mirar estas cosas; porque de todas ellas nace la idolatría. Hijo mío, no te hagas mentiroso, pues la mentira conduce al robo; ni amante del dinero, ni vanaglorioso, pues de todos estos nacen robos. Hijo mío, no te hagas murmurador, pues conduce a la blasfemia[b]; ni obstinado, ni malintencionado, pues de todas estas cosas nacen blasfemias. Pero sé manso, porque los mansos heredarán la tierra[c]. Sé paciente, misericordioso, sin engaño y apacible,
    y bueno, y tiembla siempre ante las palabras que has oído. No te exaltes a ti mismo, ni des a tu alma arrogancia temeraria. Tu alma no se unirá con los altivos, sino que te relacionarás con los justos y los humildes. Acepta como buenos[d] los acontecimientos que te sobrevengan, sabiendo que, aparte de Dios, nada acontece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice πορείαν («camino» o «viaje»), pero el contexto exige la lectura de πορνείαν («inmoralidad sexual» / «fornicación»); por eso se traduce según la probable intención del pasaje.
    reason: textual_variant
  - marker: b
    text: Aquí βλασφημία puede abarcar también habla injuriosa o calumniosa, pero en este contexto la traducción «blasfemia» conserva el peso religioso de la advertencia.
    reason: theological_note
  - marker: c
    text: Eco de Mateo 5:5.
    reason: cross_reference
  - marker: d
    text: 'O: «las cosas que te suceden».'
    reason: alternative_reading
lexical_decisions:
- source_word: Τέκνον μου
  english_pob_choice: My child
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Niño mío
  - Hijo mío, querido
  lexicon: LSJ
  rationale: Reproduce la fórmula afectuosa y exhortativa con naturalidad en español; 'Hijo mío' mantiene el tono de admonición paterna sin añadir afecto no explicitado.
- source_word: φεῦγε
  english_pob_choice: flee
  chosen_spanish: huye
  alternatives_spanish:
  - evita
  - apártate
  lexicon: LSJ
  rationale: '''Huye'' conserva la urgencia moral y la imagen de escape fuerte que el verbo griego comunica.'
- source_word: ὀργίλος
  english_pob_choice: quick-tempered
  chosen_spanish: iracundo
  alternatives_spanish:
  - colérico
  - de genio pronto
  lexicon: LSJ
  rationale: '''Iracundo'' expresa un temperamento dado a la ira de manera más sobria y digna que una frase explicativa.'
- source_word: ζηλωτής
  english_pob_choice: jealous
  chosen_spanish: envidioso
  alternatives_spanish:
  - celoso
  - partidista
  lexicon: LSJ
  rationale: En esta lista de vicios, el sentido negativo se comunica mejor con 'envidioso' en español, manteniendo la fuerza ética de la progresión hacia la violencia.
- source_word: θυμικός
  english_pob_choice: hot-headed
  chosen_spanish: propenso al enojo
  alternatives_spanish:
  - irritable
  - arrebatádo
  lexicon: LSJ
  rationale: Describe con claridad la disposición habitual a enojarse, evitando un calco raro y preservando el matiz moral del rasgo de carácter.
- source_word: ἐπιθυμητής
  english_pob_choice: lustful
  chosen_spanish: desordenado en tus deseos
  alternatives_spanish:
  - lujurioso
  - concupiscente
  lexicon: LSJ
  rationale: El griego señala el carácter desordenado del deseo; esta opción conserva el contenido moral sin sonar excesivamente arcaica, y deja abierta la conexión con la siguiente referencia a inmoralidad sexual.
- source_word: πορείαν
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - conducta sexual inmoral
  lexicon: LSJ
  rationale: Sigue la decisión auditada de la POB inglesa de leer el contexto como una forma probablemente corrupta de πορνείαν; 'inmoralidad sexual' comunica la categoría ética de modo directo y entendible.
- source_word: αἰσχρολόγος
  english_pob_choice: foul-mouthed
  chosen_spanish: de lengua obscena
  alternatives_spanish:
  - de habla indecente
  - malediciente
  lexicon: LSJ
  rationale: Mantiene el foco en el habla vergonzosa/indecente, con una expresión natural en español que conserva el campo semántico de la palabra.
- source_word: ὑψηλοόφθαλμος
  english_pob_choice: haughty-eyed
  chosen_spanish: de mirada altiva
  alternatives_spanish:
  - de ojos orgullosos
  - altanero
  lexicon: LSJ
  rationale: Preserva la metáfora corporal de los ojos elevados, importante para no diluir el rasgo de soberbia.
- source_word: οἰωνοσκόπος
  english_pob_choice: observer of omens
  chosen_spanish: observador de presagios
  alternatives_spanish:
  - adivino de agüeros
  - augur
  lexicon: LSJ
  rationale: Traducción transparente del oficio de interpretar señales, sin imponer un término técnico moderno que oscurezca el sentido.
- source_word: μαθηματικός
  english_pob_choice: astrologer
  chosen_spanish: astrólogo
  alternatives_spanish:
  - matemático
  - calculador de horóscopos
  lexicon: LSJ
  rationale: En este contexto histórico la palabra se refiere a la astrología, no a las matemáticas; 'astrólogo' es la equivalencia española más clara.
- source_word: περικαθαίρων
  english_pob_choice: one who performs purifications
  chosen_spanish: purificador ritual
  alternatives_spanish:
  - quien realiza purificaciones
  - purificador
  lexicon: LSJ
  rationale: Conserva el valor participial y el sentido de práctica ritual/religiosa, evitando una explicación excesiva.
- source_word: θέλε αὐτὰ βλέπειν
  english_pob_choice: nor even be willing to look upon them
  chosen_spanish: ni quieras siquiera mirar estas cosas
  alternatives_spanish:
  - ni siquiera quieras verlas
  - ni desees verlas
  lexicon: LSJ
  rationale: Expresa la fuerza volitiva del griego y evita una referencia demasiado literal a un antecedente ambiguo, manteniendo la prohibición con naturalidad.
- source_word: κενόδοξος
  english_pob_choice: vainglorious
  chosen_spanish: vanaglorioso
  alternatives_spanish:
  - vano
  - presumido
  lexicon: LSJ
  rationale: '''Vanaglorioso'' reproduce bien la idea de gloria vacía y conserva el tono moral clásico del término.'
- source_word: γόγγυσος
  english_pob_choice: grumbler
  chosen_spanish: murmurador
  alternatives_spanish:
  - quejoso
  - murmurador
  lexicon: LSJ
  rationale: '''Murmurador'' es una voz bíblica y eclesial muy apta para el registro del texto, y refleja el resentimiento verbal implícito.'
- source_word: αὐθάδης
  english_pob_choice: self-willed
  chosen_spanish: obstinado
  alternatives_spanish:
  - caprichoso
  - autosuficiente
  lexicon: LSJ
  rationale: '''Obstinado'' comunica la terquedad autorreferente que encaja en la serie de vicios.'
- source_word: πονηρόφρων
  english_pob_choice: evil-minded
  chosen_spanish: de mala mente
  alternatives_spanish:
  - malintencionado
  - malévolo
  lexicon: LSJ
  rationale: Mantiene la estructura adjetival y el vínculo con el pensamiento/disposición interior, sin cargar el término de connotaciones más fuertes de las requeridas.
- source_word: πραῢς
  english_pob_choice: meek
  chosen_spanish: manso
  alternatives_spanish:
  - humilde
  - apacible
  lexicon: LSJ
  rationale: '''Manso'' permite la alusión bíblica a Mateo 5:5 y conserva el carácter de suavidad obediente.'
- source_word: τρέμων τοὺς λόγους
  english_pob_choice: trembling at the words
  chosen_spanish: temblando ante las palabras
  alternatives_spanish:
  - temeroso de las palabras
  - en reverente temor ante las palabras
  lexicon: LSJ
  rationale: Preserva el peso reverente y casi profético del giro sin convertirlo en mera deferencia intelectual.
- source_word: θράσος
  english_pob_choice: bold arrogance
  chosen_spanish: audacia
  alternatives_spanish:
  - atrevimiento
  - presunción
  lexicon: LSJ
  rationale: En combinación con la negación, 'audacia' comunica la osadía arrogante que el contexto reprueba.
- source_word: ἀναστραφήσῃ
  english_pob_choice: you shall associate
  chosen_spanish: te conducirás
  alternatives_spanish:
  - te comportarás
  - andarás
  lexicon: LSJ
  rationale: Refleja el uso ético de 'vivir/conducirse' en relación con la compañía de justos y humildes.
- source_word: ἐνεργήματα
  english_pob_choice: the events that befall you
  chosen_spanish: las cosas que te suceden
  alternatives_spanish:
  - los acontecimientos que te ocurren
  - las acciones que te sobrevienen
  lexicon: LSJ
  rationale: La frase se mantiene comprensible en español y conserva la idea de acontecimientos recibidos, no meramente fabricados por el sujeto.
- source_word: ἄτερ Θεοῦ οὐδὲν γίνεται
  english_pob_choice: apart from God nothing happens
  chosen_spanish: aparte de Dios, nada acontece
  alternatives_spanish:
  - sin Dios nada sucede
  - fuera de Dios nada ocurre
  lexicon: LSJ
  rationale: '''Acontece'' eleva ligeramente el registro y preserva la afirmación providencial breve y absoluta del griego.'
theological_decisions:
- issue: Posible corrupción textual en πορείαν
  english_pob_reading: Read as sexual immorality in context, with a note that the Greek likely reflects a scribal error for πορνείαν.
  chosen_spanish_reading: Traducido como 'inmoralidad sexual', con nota sobre la probable lectura subyacente de πορνείαν.
  alternative_spanish_readings:
  - camino
  - curso
  rationale: El contexto inmediato de deseo desordenado seguido de adulterios exige una lectura sexual; traducir literalmente 'camino' destruiría la coherencia moral del pasaje.
  doctrine_reference: Crítica textual y coherencia contextual.
- issue: Sentido de βλασφημία en la lista de vicios
  english_pob_reading: Rendered as blasphemy / blasphemies, with awareness of the broader sense.
  chosen_spanish_reading: '''Blasfemia'' / ''blasfemias'' en el cuerpo principal.'
  alternative_spanish_readings:
  - slander
  - calumnia
  - habla injuriosa
  rationale: El marco del Didaché es catequético y religioso; en español, 'blasfemia' conserva mejor la gravedad devocional de la progresión desde la murmuración.
  doctrine_reference: Ética cristiana del habla.
- issue: Recepción de los acontecimientos como buenos
  english_pob_reading: You shall accept the events that befall you as good, knowing that apart from God nothing happens.
  chosen_spanish_reading: '''Recibirás como buenas las cosas que te suceden, sabiendo que, aparte de Dios, nada acontece.'''
  alternative_spanish_readings:
  - aceptarás como buenas las cosas que te suceden
  - recibirás como buenas las circunstancias
  rationale: La formulación conserva la afirmación providencial sin expandirla; 'como buenas' refleja el juicio exhortativo del texto sin borrar la tensión de experiencias difíciles.
  doctrine_reference: Providencia divina.
translation_notes:
  revision_awareness: Se siguió el texto griego normalizado de Hitchcock & Brown 1884 y el rastro auditado en inglés; no hubo revisiones posteriores aplicadas y el último pase indicó acuerdo alto sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto para el nombre divino, pero aquí el texto dice Θεός y se traduce consistentemente como 'Dios'.
  - Se conservó el registro sapiencial y paraenético con verbos imperativos directos y vocabulario moral de tono bíblico sin archaismos innecesarios.
  - Se preservó la tensión textual de πορείαν mediante nota, sin sobrecorregir el cuerpo principal más allá de lo que el contexto exige.
  - Se evitaron equivalentes eclesiales tradicionales donde habrían debilitado el matiz concreto de la lista de vicios, por ejemplo 'murmurador', 'vanaglorioso' y 'de mirada altiva'.
