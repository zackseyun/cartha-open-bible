source:
  edition: Hitchcock & Brown 1884 (normalized OCR)
  text: Τέκνον μου, φεῦγε ἀπὸ παντὸς πονηροῦ καὶ ἀπὸ παντὸς ὁμοίου αὐτοῦ· Μὴ γίνου ὀργίλος· ὁδηγεῖ γὰρ ἡ ὀργὴ πρὸς τὸν φόνον· μηδὲ ζηλωτὴς μηδὲ ἐριστικὸς μηδὲ θυμικός· ἐκ γὰρ τούτων ἀπάντων φόνοι γεννῶνται. Τέκνον μου, μὴ γίνου ἐπιθυμητής· ὁδηγεῖ γὰρ ἡ ἐπιθυμία πρὸς τὴν πορείαν· μηδὲ αἰσχρολόγος μηδὲ ὑψηλοόφθαλμος· ἐκ γὰρ τούτων ἀπάντων μοιχεῖαι γεννῶνται. Τέκνον μου, μὴ γίνου οἰωνοσκόπος· ἐπειδὴ ὁδηγεῖ εἰς τὴν εἰδωλολατρείαν· μηδὲ ἐπαοιδὸς μηδὲ μαθηματικὸς μηδὲ περικαθαίρων, μηδὲ θέλε αὐτὰ βλέπειν· ἐκ γὰρ τούτων ἁπάντων εἰδωλολατρεία γεννᾶται. Τέκνον μου, μὴ γίνου ψεύστης· ἐπειδὴ ὁδηγεῖ τὸ ψεῦσμα εἰς τὴν κλοπήν· μηδὲ φιλάργυρος μηδὲ κενόδοξος· ἐκ γὰρ τούτων ἁπάντων κλοπαὶ γεννῶνται. Τέκνον μου, μὴ γίνου γόγγυσος· ἐπειδὴ ὁδηγεῖ εἰς τὴν βλασφημίαν· μηδὲ αὐθάδης μηδὲ πονηρόφρων· ἐκ γὰρ τούτων ἁπάντων βλασφημίαι γεννῶνται. Ἴσθι δὲ πραῢς, ἐπεὶ οἱ πραεῖς κληρονομήσουσι τὴν γῆν. Γίνου μακρόθυμος καὶ ἐλεήμων καὶ ἄκακος καὶ ἡσύχιος καὶ ἀγαθὸς καὶ τρέμων τοὺς λόγους διὰ παντός, οὓς ἤκουσας. Οὐχ ὑψώσεις
    σεαυτὸν οὐδὲ δώσεις τῇ ψυχῇ σου θράσος. Οὐ κολληθήσεται ἡ ψυχή σου μετὰ ὑψηλῶν, ἀλλὰ μετὰ δικαίων καὶ ταπεινῶν ἀναστραφήσῃ. Τὰ συμβαίνοντά σοι ἐνεργήματα ὡς ἀγαθὰ προσδέξῃ, εἰδὼς ὅτι ἄτερ Θεοῦ οὐδὲν γίνεται.
