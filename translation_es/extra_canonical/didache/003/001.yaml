review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido general del griego y del audit trail inglés: conserva la estructura parenética, la urgencia de φεῦγε con «huye», la nota textual sobre πορείαν, la progresión moral de las listas de vicios, la alusión a Mateo 5:5 y la afirmación providencial final. Sin embargo, varios giros españoles no representan con suficiente precisión o naturalidad algunos rasgos clave del original: «envidioso» desplaza ζηλωτής de ‘celoso/jealous’ hacia envidia; «de mala mente» es poco idiomático para πονηρόφρων; «audacia» no deja claro el matiz negativo de θράσος; «te conducirás con» no refleja bien la idea relacional de ἀναστραφήσῃ; y «Recibirás» es menos adecuado que el imperatival «acepta/acogerás» para προσδέξῃ en esta exhortación. También conviene mejorar la naturalidad de «desordenado en tus deseos» y la precisión de «conduce a la idolatría» con sujeto explícito en español.'
  spanish_quality_summary: 'El español es generalmente legible y de registro digno, pero presenta algunos calcos o formulaciones poco naturales para un texto eclesial ampliamente legible: «de mala mente», «te conducirás con los justos», «des a tu alma audacia» y «Recibirás como buenas las cosas que te suceden» suenan rígidos o ambiguos. Un ajuste menor puede mantener la fidelidad y mejorar mucho la fluidez: «lujurioso», «malintencionado», «des a tu alma arrogancia temeraria», «te relacionarás con» y «Acepta como buenos los acontecimientos que te sobrevengan» o equivalente. El resto del texto funciona bien y mantiene un tono moderno pero sobrio.'
  glossary_alignment: No hay conflictos con terminología troncal del proyecto (Dios, idolatría, etc.). La elección «manso» para πραῢς y «blasfemia» para βλασφημία está bien alineada con el rationale. Las principales correcciones son léxicas/contextuales, no de glosario mayor.
  issues:
  - severity: medium
    issue: «envidioso» para ζηλωτής
    rationale: El audit trail inglés eligió ‘jealous’ por la progresión hacia la violencia. «Envidioso» puede ser posible, pero mueve el foco desde celos/ardor posesivo a envidia. «celoso» funciona mejor en esta cadena ética, aunque en español tenga otras acepciones contextuales.
  - severity: medium
    issue: «desordenado en tus deseos» para ἐπιθυμητής
    rationale: La frase es comprensible, pero suena explicativa y poco natural. En este contexto sexual, «lujurioso» o «dominado por deseos» expresa mejor el rasgo y enlaza con la siguiente nota sobre πορνείαν.
  - severity: high
    issue: «de mala mente» para πονηρόφρων
    rationale: Es un giro poco idiomático en español y entorpece la lectura. «malintencionado» o «de mente perversa» representan mejor el sentido interior del original.
  - severity: medium
    issue: «audacia» para θράσος
    rationale: «Audacia» puede sonar positiva o neutral. El original y el rationale inglés subrayan insolencia arrogante; conviene explicitarlo con «arrogancia temeraria», «presunción» o similar.
  - severity: medium
    issue: «te conducirás con los justos y los humildes» para ἀναστραφήσῃ
    rationale: Aunque etimológicamente defendible, no suena natural en español contemporáneo y diluye el sentido de asociación/compañía. «te relacionarás con» o «andarás con» es más claro.
  - severity: low
    issue: «Recibirás como buenas...»
    rationale: El futuro imperatival puede mantenerse, pero en español aquí suena menos directo. «Acepta como buenos los acontecimientos que te sobrevengan» conserva mejor la exhortación. Además, el masculino plural «buenos» concuerda mejor con «acontecimientos» si se ajusta el sintagma.
  revised_spanish_text: Hijo mío, huye de todo mal y de todo lo semejante a él. No te hagas iracundo, porque la ira conduce al homicidio; ni celoso, ni contencioso, ni arrebatado, pues de todas estas cosas nacen homicidios. Hijo mío, no te hagas lujurioso, porque el deseo conduce a la inmoralidad sexual[a]; ni de lengua obscena, ni de mirada altiva, pues de todas estas cosas nacen adulterios. Hijo mío, no te hagas observador de presagios, porque esto conduce a la idolatría; ni encantador, ni astrólogo, ni uno que practica purificaciones rituales, ni quieras siquiera mirar estas cosas; porque de todas ellas nace la idolatría. Hijo mío, no te hagas mentiroso, pues la mentira conduce al robo; ni amante del dinero, ni vanaglorioso, pues de todos estos nacen robos. Hijo mío, no te hagas murmurador, pues conduce a la blasfemia[b]; ni obstinado, ni malintencionado, pues de todas estas cosas nacen blasfemias. Pero sé manso, porque los mansos heredarán la tierra[c]. Sé paciente, misericordioso, sin
    engaño y apacible, y bueno, y tiembla siempre ante las palabras que has oído. No te exaltes a ti mismo, ni des a tu alma arrogancia temeraria. Tu alma no se unirá con los altivos, sino que te relacionarás con los justos y los humildes. Acepta como buenos[d] los acontecimientos que te sobrevengan, sabiendo que, aparte de Dios, nada acontece.
  revised_footnotes:
  - marker: a
    text: El griego dice πορείαν («camino» o «viaje»), pero el contexto exige la lectura de πορνείαν («inmoralidad sexual» / «fornicación»); por eso se traduce según la probable intención del pasaje.
    reason: textual_variant
  - marker: b
    text: Aquí βλασφημία puede abarcar también habla injuriosa o calumniosa, pero en este contexto la traducción «blasfemia» conserva el peso religioso de la advertencia.
    reason: theological_note
  - marker: c
    text: Eco de Mateo 5:5.
    reason: cross_reference
  - marker: d
    text: 'O: «las cosas que te suceden».'
    reason: alternative_reading
  revision_rationale: La revisión es menor pero necesaria para mejorar precisión semántica y naturalidad española sin apartarse del original ni del audit trail inglés. Se corrigen giros poco idiomáticos («de mala mente», «te conducirás con»), se refuerza el matiz negativo donde el español podía suavizarlo («audacia»), y se afinan varias elecciones léxicas para reflejar mejor el contexto moral del pasaje.
