base_translation:
  language: en
  yaml_path: translation/extra_canonical/didache/003/001.yaml
  text: My child, flee from every evil thing, and from everything like it. Do not become quick-tempered, for anger leads to murder; nor jealous, nor quarrelsome, nor hot-headed, for from all these murders are born. My child, do not become lustful, for lust leads to sexual immorality;a nor foul-mouthed, nor haughty-eyed, for from all these adulteries are born. My child, do not become an observer of omens, since it leads into idolatry; nor an enchanter, nor an astrologer, nor one who performs purifications, nor even be willing to look upon them; for from all these idolatry is born. My child, do not become a liar, since lying leads to theft; nor money-loving, nor vainglorious, for from all these thefts are born. My child, do not become a grumbler, since it leads to blasphemy;b nor self-willed, nor evil-minded, for from all these blasphemies are born. But be meek, since the meek will inherit the earth.c Become patient and merciful and guileless and quiet and good, and always trembling at the
    words that you have heard. You shall not exalt yourself, nor give bold arrogance to your soul. Your soul shall not be joined with the lofty, but you shall associate with the righteous and humble. You shall accept the events that befall you as good,d knowing that apart from God nothing happens.
