lexical_decisions:
- source_word: ወወለደት፡ ሎቱ፡ ወልደ፡
  english_pob_choice: And she bore him a son
  chosen_spanish: Y ella le dio a luz un hijo
  alternatives_spanish:
  - Y ella le dio a luz un hijo varón
  - Y ella le dio a luz un hijo,
  lexicon: did not invent entry numbers
  rationale: La forma geʽez expresa el nacimiento de un hijo; en español natural, «dar a luz» comunica bien la acción sin perder el sentido factual.
- source_word: ወጸውዐ፡ ስሞ፡
  english_pob_choice: he called his name
  chosen_spanish: él llamó su nombre
  alternatives_spanish:
  - lo llamó
  - y él llamó su nombre
  lexicon: did not invent entry numbers
  rationale: 'El audit trail indica cambio de sujeto: el verbo es masculino singular, por lo que en español debe quedar claro que él, no ella, puso el nombre.'
- source_word: ናቤዮት፡
  english_pob_choice: Nabaioth
  chosen_spanish: Nabaiot
  alternatives_spanish:
  - Nabaiot
  - Nabaiot[h]
  lexicon: did not invent entry numbers
  rationale: Se adopta una transliteración castellana directa y estable del nombre propio, manteniendo la forma cercana al inglés POB pero con ortografía española fluida.
- source_word: እስመ፡ ትቤ፡ ቅሩብ፡ እግዚአብሔር፡ ሊተ፡
  english_pob_choice: for she said, “The Lord is near to me.”
  chosen_spanish: 'porque ella dijo: «Yahvé está cerca de mí»'
  alternatives_spanish:
  - 'porque ella dijo: «El Señor está cerca de mí»'
  - 'porque dijo: «Yahvé está cerca de mí»'
  lexicon: did not invent entry numbers
  rationale: El geʽez usa el nombre divino; conforme a la terminología del proyecto, se vierte como «Yahvé» en vez de ocultarlo con un equivalente genérico.
theological_decisions:
- issue: Representación del nombre divino en la cita de la madre
  english_pob_reading: The Lord is near to me
  chosen_spanish_reading: Yahvé está cerca de mí
  alternative_spanish_readings:
  - El Señor está cerca de mí
  - El Señor está cerca de mí
  rationale: Aunque el inglés POB dice «The Lord», el texto fuente geʽez contiene el nombre divino; por eso la traducción española lo hace explícito como «Yahvé», manteniendo la transparencia textual del proyecto.
  doctrine_reference: Tetragrammaton rendering policy / source transparency
translation_notes:
  revision_awareness: El audit trail inglés fue corregido para reflejar que el verbo de poner nombre es masculino singular, distinto del verbo anterior de dar a luz. Esta versión española preserva esa distinción y además traduce el nombre divino del geʽez con la convención del proyecto.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como máscara del nombre divino, porque el fuente geʽez contiene እግዚአብሔር y el proyecto pide «Yahvé».
  - 'Se mantiene la secuencia narrativa con dos sujetos distintos: ella dio a luz; él llamó.'
  - «Nabaiot» conserva una transliteración sobria y legible para lector español.
