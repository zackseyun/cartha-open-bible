translation:
  language: es
  text: 'Y ella le dio a luz un hijo, y él llamó su nombre Nabaiot[a], porque ella dijo: «Yahvé está cerca de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
