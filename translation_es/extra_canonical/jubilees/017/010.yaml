translation:
  language: es
  text: Y su madre lo tomó y lo arrojó debajo de un olivo[a], y fue y se sentó enfrente, a cierta distancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un olivo». El ge''ez usa una forma numeral que puede funcionar como artículo indefinido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነሥአቶ፡ እሙ፡
  english_pob_choice: his mother took him
  chosen_spanish: su madre lo tomó
  alternatives_spanish:
  - su madre lo recogió
  - su madre lo llevó consigo
  lexicon: madre / tomar
  rationale: El ge'ez indica claramente que el sujeto es la madre y que ella actúa sobre el niño; 'lo tomó' reproduce el gesto sin añadir matices no presentes en el texto.
- source_word: '*ወገደፈቶ፡'
  english_pob_choice: cast him
  chosen_spanish: lo arrojó
  alternatives_spanish:
  - lo echó
  - lo dejó caer
  lexicon: arrojar / echar
  rationale: El verbo transmite una acción de poner o lanzar debajo del árbol con fuerza o determinación; 'arrojar' conserva mejor la intensidad del original que un simple 'poner'.
- source_word: ታኅተ፡ አሐቲ፡ እልያስ፡
  english_pob_choice: under an olive tree
  chosen_spanish: debajo de un olivo
  alternatives_spanish:
  - bajo un olivo
  - debajo de un árbol de olivo
  lexicon: olivo
  rationale: El sentido del pasaje es un árbol de olivo; en español, 'olivo' es la forma natural y fiel. La secuencia con artículo indefinido refleja el uso idiomático del ge'ez, como ya señaló la revisión inglesa.
- source_word: ወሖረት፡ ወነበረት፡
  english_pob_choice: and she went and sat
  chosen_spanish: y fue y se sentó
  alternatives_spanish:
  - y se fue y se sentó
  - y fue a sentarse
  lexicon: ir / sentarse
  rationale: La coordinación simple conserva la narración secuencial del original sin sobreinterpretarla.
- source_word: አንጻር፡ መጠነ፡
  english_pob_choice: opposite, at a distance
  chosen_spanish: enfrente, a cierta distancia
  alternatives_spanish:
  - enfrente, a distancia
  - opuesta, a distancia
  lexicon: frente / distancia
  rationale: '''Enfrente'' expresa la relación espacial de oposición; ''a cierta distancia'' naturaliza el valor de ''at a distance'' sin perder la separación espacial mencionada por el texto.'
theological_decisions:
- issue: La frase final describe separación espacial, no una postura doctrinal o ritual.
  english_pob_reading: at a distance
  chosen_spanish_reading: a cierta distancia
  alternative_spanish_readings:
  - a distancia
  - lejos
  rationale: Se mantiene el valor puramente espacial del pasaje, evitando cargarlo con sentido simbólico que el texto no exige.
  doctrine_reference: Ninguna; observación narratológica
translation_notes:
  revision_awareness: La revisión inglesa corrigió un borrador ajeno al texto y confirmó como base la escena de la madre que coloca al niño bajo un olivo, con la nota de que el numeral ge'ez puede entenderse idiomáticamente como artículo indefinido. La versión española sigue esa lectura y evita introducir precisiones no sustentadas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se conserva un registro narrativo sobrio y bíblico, sin archaísmos innecesarios.
  - '''Olivo'' se mantiene como término natural en español; la nota recoge la alternativa literal ''un olivo''.'
