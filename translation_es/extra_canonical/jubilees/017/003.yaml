  to: Y recordó la palabra que le había dicho el día en que Lot fue separado de él, y se alegró porque Yahvé le había dado descendencia sobre la tierra para heredar la tierra, y bendijo al Creador con toda su boca.
  rationale: 'Se hace una reparación pequeña pero necesaria en la primera cláusula: «que le había hablado» se corrige a «que le había dicho», que conserva el singular de «palabra», el destinatario implícito «a él», y produce un español correcto y natural sin alterar el sentido fuente. No se requieren notas adicionales.'
