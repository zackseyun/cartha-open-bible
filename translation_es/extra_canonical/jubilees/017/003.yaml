translation:
  language: es
  text: Y recordó la palabra que le había dicho el día en que Lot fue separado de él, y se alegró porque Yahvé le había dado descendencia sobre la tierra para heredar la tierra, y bendijo al Creador con toda su boca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቃሎ፡ ዘተናገሮ፡
  english_pob_choice: the word that He had spoken to him
  chosen_spanish: la palabra que le había hablado
  alternatives_spanish:
  - las palabras que le había hablado
  - la palabra que le había dicho
  lexicon: qāl / dābar
  rationale: El ge'ez usa singular ('la palabra'), y el verbo lleva objeto pronominal ('a él'). Por eso se conserva el singular y se expresa la relación directa entre Dios y Abraham sin pluralizar injustificadamente.
- source_word: ወተፈሥሐ፡
  english_pob_choice: and he rejoiced
  chosen_spanish: y se alegró
  alternatives_spanish:
  - y se regocijó
  - y se gozó
  lexicon: s-m-h
  rationale: ‘Se alegró’ comunica bien el gozo sin sonar arcaico, y mantiene el sentido de júbilo del contexto.
- source_word: ወሀቦ፡ እግዚአብሔር፡ ዘርአ፡
  english_pob_choice: the Lord had given him seed
  chosen_spanish: Yahvé le había dado descendencia
  alternatives_spanish:
  - Yahvé le había dado simiente
  - el Señor le había dado descendencia
  lexicon: zeraʿ
  rationale: ‘Descendencia’ es la forma natural y bíblica en español para זרע/zeraʿ cuando el sentido es posteridad, no semilla agrícola. Se conserva Yahvé según la política terminológica del proyecto.
- source_word: ከመ፡ ይረሳ፡ ለምድር፡
  english_pob_choice: to inherit the earth
  chosen_spanish: para heredar la tierra
  alternatives_spanish:
  - para poseer la tierra
  - para recibir en herencia la tierra
  lexicon: warasa
  rationale: La revisión textual corrige la lectura a ‘heredar’, y ‘para heredar la tierra’ refleja con claridad la finalidad del pasaje sin añadir matices no sustentados.
- source_word: ወባረኮ፡ በኵሉ፡ አፉሁ፡ ለፈጣሪ፡
  english_pob_choice: and he blessed the Creator with all his mouth
  chosen_spanish: y bendijo al Creador con toda su boca
  alternatives_spanish:
  - y alabó al Creador con toda su boca
  - y bendijo al Creador con toda su voz
  lexicon: b-r-k
  rationale: ‘Bendijo’ corresponde al verbo de bendecir del texto y conserva la acción verbal concreta. ‘Con toda su boca’ suena literal en español, pero es fiel al original; se evita suavizarlo a ‘de todo corazón’ porque eso no está en el texto.
theological_decisions:
- issue: Referencia a la promesa divina y su destinatario
  english_pob_reading: He remembered the word that He had spoken to him
  chosen_spanish_reading: Recordó la palabra que le había hablado
  alternative_spanish_readings:
  - Recordó las palabras que le había hablado
  - Recordó la palabra que le había dicho
  rationale: Se preserva la relación de promesa personal entre Dios y Abraham sin convertirla en un discurso generalizado. El singular ‘palabra’ mantiene la fuerza de una promesa específica.
  doctrine_reference: Promesa divina a Abraham; fidelidad de Dios a su palabra
- issue: ‘Descendencia’ como don divino para heredar la tierra
  english_pob_reading: the Lord had given him seed upon the earth to inherit the earth
  chosen_spanish_reading: Yahvé le había dado descendencia sobre la tierra para heredar la tierra
  alternative_spanish_readings:
  - Yahvé le había dado simiente sobre la tierra para heredar la tierra
  - Yahvé le había dado descendencia en la tierra para poseer la tierra
  rationale: La frase mantiene tanto el don de descendencia como el destino de heredar la tierra, sin diluir la tensión entre promesa de posteridad y posesión heredada.
  doctrine_reference: Promesa de herencia a Abraham y su descendencia
- issue: Alabanza dirigida al Creador
  english_pob_reading: he blessed the Creator with all his mouth
  chosen_spanish_reading: bendijo al Creador con toda su boca
  alternative_spanish_readings:
  - alabó al Creador con toda su boca
  - bendijo al Creador con toda su voz
  rationale: Se conserva la dureza literal del giro para no perder el carácter enfático de una bendición verbal total. No se sustituye por una expresión más idiomática que suavizaría el énfasis del original.
  doctrine_reference: Doxología y bendición verbal a Dios/Creador
translation_notes:
  revision_awareness: 'La revisión reciente corrigió dos puntos clave del texto fuente: 1) la lectura de ከመ፡ ይረሳ፡ ለምድር፡ como ‘para heredar la tierra’, no ‘para cubrir la tierra’; y 2) ቃሎ፡ ዘተናገሮ፡ como ‘la palabra que le había hablado’, no una pluralización de ‘palabras’. La versión española sigue esas correcciones y mantiene el tono formal del registro bíblico.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ consistentemente para el nombre divino según la política del proyecto.
  - Se mantiene ‘descendencia’ para zeraʿ cuando el contexto es posteridad/promesa.
  - Se conserva la secuencia narrativa con un solo período coordinado, adecuada al estilo bíblico.
  - No se añadieron notas al pie porque no hay ambigüedad española que requiera anclaje textual en esta unidad.
