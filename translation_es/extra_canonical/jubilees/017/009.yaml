base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/017/009.yaml
  text: And he took bread and a skin of water and put them on Hagar's shoulder, and the child, and sent her away. And she went and wandered in the wilderness of Beersheba, and the water in the skin was finished, and the child was thirsty and was unable to walk, and he fell.
  footnotes:
  - marker: a
    text: Or 'and gave them to Hagar and the child, and sent them away.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:14Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the Ge''ez source: Abraham takes bread and water, gives them to Hagar and the child, sends them away; she wanders in the wilderness of Beersheba; the water runs out; the child becomes thirsty, cannot walk, and falls.'
translation:
  language: es
  text: Y tomó pan y un odre de agua, y los puso sobre el hombro de Agar[a], y al niño, y la despidió. Y ella fue y anduvo errante en el desierto de Beerseba, y el agua del odre se acabó, y el niño tuvo sed y no pudo caminar, y cayó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La secuencia también puede entenderse: «y se los puso a Agar, y al niño». Sin embargo, la revisión inglesa auditada favorece «sobre el hombro de Agar» por el sentido específico del verbo ge''ez.'
    reason: Aclarar la ambigüedad sintáctica y justificar la traducción principal sin dejar una nota confusa.
lexical_decisions:
- source_word: ወነሥአ / 'took'
  english_pob_choice: took bread and a skin of water
  chosen_spanish: tomó pan y un odre de agua
  alternatives_spanish:
  - agarró pan y un odre de agua
  - tomó pan y una bolsa de agua
  lexicon: took
  rationale: «Tomó» reproduce el acto simple de tomar/obtener del fuente. «Pan» y «odre de agua» reflejan el sustantivo concreto del contexto; «odre» conserva la imagen de un recipiente de cuero, más precisa que «bolsa».
- source_word: '*ሐባወ-ዝ፡ ወዝቀ፡ / ''put them on the shoulder'''
  english_pob_choice: put them on Hagar's shoulder
  chosen_spanish: los puso sobre el hombro de Agar
  alternatives_spanish:
  - los cargó sobre el hombro de Agar
  - los colocó sobre el hombro de Agar
  lexicon: put on the shoulder
  rationale: La revisión inglesa corrigió el sentido de 'dar' a 'poner sobre el hombro'. En español, «los puso sobre el hombro de Agar» expresa fielmente la acción física sin añadir matices no presentes.
- source_word: ለአጋር፡ ወለሕፃን፡ / 'to Hagar and the child'
  english_pob_choice: on Hagar's shoulder, and the child
  chosen_spanish: de Agar y del niño
  alternatives_spanish:
  - de Agar y del niño también
  - de Agar, y del niño
  lexicon: Hagar and the child
  rationale: La secuencia ge'ez, tal como quedó reflejada en la revisión, coloca el pan y el agua sobre Agar y también menciona al niño. El español mantiene la ambigüedad del referente sin forzar una reexpresión no garantizada por el texto.
- source_word: ወፈነዋ። / 'sent her away'
  english_pob_choice: sent her away
  chosen_spanish: la despidió
  alternatives_spanish:
  - la envió lejos
  - la echó
  lexicon: sent away
  rationale: «La despidió» conserva el valor de separación/despido y evita un tono excesivamente coloquial o violento. La forma femenina singular se respeta por el ge'ez y por la revisión inglesa.
- source_word: ወሖረት፡ ወተንገገ፡ / 'she went and wandered'
  english_pob_choice: she went and wandered
  chosen_spanish: ella fue y anduvo errante
  alternatives_spanish:
  - ella fue y vagó
  - ella fue y se extravió
  lexicon: wandered
  rationale: «Anduvo errante» preserva el movimiento sin rumbo con un registro digno y bíblico, sin reducirlo a una mera caminata.
- source_word: በገዳመ፡ ቤርሳቤ፡ / 'in the wilderness of Beersheba'
  english_pob_choice: in the wilderness of Beersheba
  chosen_spanish: en el desierto de Beerseba
  alternatives_spanish:
  - en la tierra desértica de Beerseba
  - en el yermo de Beerseba
  lexicon: wilderness
  rationale: «Desierto» es la opción natural y clara en español bíblico para renderizar el ámbito árido de «wilderness», manteniendo el nombre propio transliterado de forma estándar.
- source_word: ወተፈጸመ፡ ማይ፡ እምዝቅ፡ / 'the water in the skin was finished'
  english_pob_choice: the water in the skin was finished
  chosen_spanish: el agua del odre se acabó
  alternatives_spanish:
  - el agua del odre se consumió
  - el agua del odre se agotó
  lexicon: was finished
  rationale: «Se acabó» expresa con naturalidad el agotamiento total del agua. «Del odre» especifica el recipiente mencionado antes.
- source_word: ወጸምአ፡ ሕፃን፡ / 'the child was thirsty'
  english_pob_choice: the child was thirsty
  chosen_spanish: el niño tuvo sed
  alternatives_spanish:
  - el niño estaba sediento
  - el niño sintió sed
  lexicon: thirsty
  rationale: «Tuvo sed» es la formulación más directa y bíblicamente natural en español, manteniendo el estado físico del niño.
- source_word: ወስእነ፡ ሐዊረ፡ / 'was unable to walk'
  english_pob_choice: was unable to walk
  chosen_spanish: no pudo caminar
  alternatives_spanish:
  - no pudo andar
  - le fue imposible caminar
  lexicon: unable to walk
  rationale: «No pudo caminar» comunica con precisión la incapacidad resultante sin cargar el texto con explicaciones médicas o interpretativas.
- source_word: ወወድቀ። / 'and he fell'
  english_pob_choice: and he fell
  chosen_spanish: y cayó
  alternatives_spanish:
  - y se cayó
  - y se desplomó
  lexicon: fell
  rationale: «Y cayó» mantiene la tersura del relato. La ambigüedad del sujeto final, ya presente en la tradición auditada, se conserva sin resolverla artificialmente.
theological_decisions:
- issue: Referente final del niño y secuencia de acciones
  english_pob_reading: the child was thirsty and was unable to walk, and he fell
  chosen_spanish_reading: el niño tuvo sed y no pudo caminar, y cayó
  alternative_spanish_readings:
  - el niño tuvo sed y no pudo caminar, y se cayó
  - el niño tuvo sed y no pudo caminar, y cayó por tierra
  rationale: El ge'ez y el audit trail inglés permiten mantener la referencia al niño en la última cláusula sin añadir un sujeto explícito nuevo ni interpretar la naturaleza de la caída. El español conserva esa sobriedad.
  doctrine_reference: N/A (narrative precision)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrigió un borrador no relacionado y luego ajustó el sentido de 'give' a 'put on the shoulder' y el objeto singular femenino de 'sent her away'. Por eso el español evita la lectura 'les dio' y mantiene a Agar como destinataria del gesto físico y de la despedida.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparezca el nombre divino explícito; en este versículo no corresponde.
  - Se prefirió «odre» para el recipiente de agua, por su precisión cultural y narrativa.
  - Se mantuvo «Agar» como forma española estándar del nombre propio, y «Beerseba» con transliteración habitual.
  - Se conservó una sintaxis narrativa simple, en paralelo con el ritmo del texto fuente.
