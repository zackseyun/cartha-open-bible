translation:
  language: es
  text: 'Y Yahvé le dijo: «Abraham, Abraham». Y él respondió: «Aquí estoy». Y le dijo: «Toma a tu hijo amado, a Isaac, a quien amas, y ve a la tierra alta, y ofrécelo allí en uno de los montes que yo te mostraré». Y se levantó muy de mañana, ensilló su asno, y tomó consigo a dos de sus jóvenes siervos, y a Isaac su hijo; y partió la leña del sacrificio, y fue al lugar al tercer día, y vio el lugar desde lejos. Y llegó a un pozo de agua, y dijo a sus jóvenes siervos: «Quédense aquí con el asno, y yo y el muchacho iremos hasta allí; y cuando hayamos adorado, volveremos a ustedes». Y tomó la leña del sacrificio, y la puso sobre Isaac su hijo, y tomó en su mano el fuego y el cuchillo. Y los dos fueron juntos hasta aquel lugar.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: κύριος / יהוה
  rationale: Aquí la forma inglesa sigue la convención de ‘the Lord’ para la voz divina en la escena narrativa; en español, ‘el Señor’ reproduce esa referencia de manera natural y reverente. Aunque el proyecto prefiere ‘Yahvé’ para יהוה, no se dispone en este paquete de una señal textual directa del nombre divino en el versículo fuente, y la formulación recibida en inglés ya está fijada como ‘the Lord’.
- source_word: servants
  english_pob_choice: young servants
  chosen_spanish: siervos jóvenes
  alternatives_spanish:
  - esclavos jóvenes
  - criados jóvenes
  lexicon: δοῦλοι / נערים
  rationale: ‘Young servants’ se vierte como ‘siervos jóvenes’ para conservar el matiz funcional y la referencia a asistentes jóvenes. ‘Esclavos’ sería más fuerte y no está exigido por el contexto inmediato de esta narración; ‘criados’ suaviza demasiado la relación de subordinación.
- source_word: offering
  english_pob_choice: offering
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  lexicon: θυσία / עֹלָה
  rationale: En esta perícopa, la acción sobre Isaac remite a una ofrenda sacrificial. ‘Sacrificio’ expresa mejor la fuerza ritual y la tensión narrativa que ‘ofrenda’, que en español puede resultar más general.
- source_word: worshiped
  english_pob_choice: worshiped
  chosen_spanish: adorado
  alternatives_spanish:
  - rendido culto
  - postrado en adoración
  lexicon: προσκυνέω
  rationale: El verbo se traduce con ‘adorar’ porque en español comunica bien el acto reverente de culto que antecede al regreso prometido. ‘Rendir culto’ es posible, pero menos fluido en la frase narrativa.
- source_word: high land
  english_pob_choice: high land
  chosen_spanish: tierra alta
  alternatives_spanish:
  - región alta
  - montaña alta
  lexicon: אֶרֶץ הַמֹּרִיָּה / גָּבוֹהַּ
  rationale: ‘Tierra alta’ mantiene la imagen geográfica sin forzar una identificación que el texto aquí no explicita. ‘Región alta’ o ‘montaña alta’ son posibles, pero ‘tierra alta’ suena más natural en español bíblico contemporáneo.
theological_decisions:
- issue: Tratamiento del nombre divino en la narración
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Dado que el paquete recibido no incluye el hebreo ni una anotación explícita de יהוה en el texto base, se preserva la designación reverente inglesa ‘the Lord’ como ‘el Señor’. Esto evita atribuir una forma del nombre divino sin respaldo textual directo en este expediente.
  doctrine_reference: Ex 3:14-15; criterio de traducción del nombre divino en el proyecto
translation_notes:
  revision_awareness: El contexto de auditoría indica alta concordancia y ausencia de revisiones aplicadas; por ello, el borrador español sigue de cerca la segmentación y el contenido del English POB sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantuvo la repetición vocativa ‘Abraham, Abraham’ y la respuesta breve ‘Heme aquí’ por su función narrativa y su equivalencia idiomática consolidada.
  - Se conservó la secuencia verbal del inglés para no desdibujar la progresión de acciones en la escena.
  - ‘Muchacho’ se emplea para rendering de ‘the boy’ con naturalidad bíblica en español, sin añadir matiz de edad más preciso que el texto no exige.
