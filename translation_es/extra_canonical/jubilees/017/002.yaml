  text: And the Lord said to him, “Abraham, Abraham.” And he said, “Here I am.” And he said, “Take your beloved son whom you love, Isaac, and go into the high land, and offer him there on one of the mountains that I will show you.” And he rose early in the morning and saddled his donkey and took two of his young servants with him, and Isaac his son; and he split the wood of the offering and went to the place on the third day, and he saw the place from afar. And he came to a well of water, and he said to his young servants, “Stay here with the donkey, and I and the boy will go on, and when we have worshiped we will return to you.” And he took the wood of the sacrifice and laid it on Isaac his son, and he took in his hand the fire and the knife. And the two of them went together to that place.
