  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. «Odre» para skin es acertado; «pozo de agua» es fiel; «le dio de beber» es idiomático y digno. La nota textual sobre la alternativa «ella abrió los ojos» está bien orientada.
