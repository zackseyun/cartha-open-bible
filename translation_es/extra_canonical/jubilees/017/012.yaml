translation:
  language: es
  text: Y él le abrió los ojos[a], y ella vio un pozo de agua; fue, llenó el odre con agua y le dio de beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y ella abrió los ojos»; sin embargo, el testimonio ge''ez favorece la lectura con sujeto masculino: «él le abrió los ojos».'
    reason: textual_variant
lexical_decisions:
- source_word: ወከሠተ / opened
  english_pob_choice: He opened her eyes
  chosen_spanish: él le abrió los ojos
  alternatives_spanish:
  - él abrió sus ojos
  - le abrió los ojos
  lexicon: abrir los ojos
  rationale: El ge'ez usa verbo masculino singular, así que el sujeto implícito es él, no ella. En español, 'abrir los ojos' conserva la imagen bíblica y evita una paráfrasis innecesaria.
- source_word: ዐዘቅተ ማይ / well of water
  english_pob_choice: a well of water
  chosen_spanish: un pozo de agua
  alternatives_spanish:
  - un manantial de agua
  - un pozo
  lexicon: pozo
  rationale: '''Pozo de agua'' sigue de cerca la expresión del texto y es claro en español; ''manantial'' introduciría una especificación no garantizada por el ge''ez.'
- source_word: ወሖረት / she went
  english_pob_choice: and she went
  chosen_spanish: y ella fue
  alternatives_spanish:
  - y fue
  - y se fue
  lexicon: ir
  rationale: El verbo femenino confirma que el sujeto cambia a ella. 'Fue' es natural y fiel al movimiento narrativo.
- source_word: ወመልአተ / filled
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - llenó de agua
  - rellenó
  lexicon: llenar
  rationale: '''Llenó el odre con agua'' expresa con naturalidad la acción de completar el recipiente, sin añadir detalles ajenos al texto.'
- source_word: ዝቃ፡ ማየ / the skin with water
  english_pob_choice: the skin with water
  chosen_spanish: el odre con agua
  alternatives_spanish:
  - la piel con agua
  - el recipiente con agua
  lexicon: odre
  rationale: '''Skin'' en este contexto se entiende como bolsa de cuero para agua; ''odre'' es el equivalente español más claro y tradicional sin oscurecer el sentido.'
- source_word: ወአስተየቶ / gave him drink
  english_pob_choice: gave him drink
  chosen_spanish: le dio de beber
  alternatives_spanish:
  - le dio a beber
  - le dio agua
  lexicon: dar de beber
  rationale: '''Le dio de beber'' reproduce el sentido idiomático de dar agua para beber y suena natural en español bíblico contemporáneo.'
theological_decisions:
- issue: El sujeto de 'abrió'
  english_pob_reading: He opened her eyes
  chosen_spanish_reading: Él le abrió los ojos
  alternative_spanish_readings:
  - Ella abrió los ojos
  rationale: 'El audit trail corrige explícitamente una lectura previa errónea: el verbo ge''ez es masculino singular y, por tanto, el agente implícito es Dios/él. Mantener ''él'' preserva la relación causal y narrativa con el paralelo de Génesis 21:19.'
  doctrine_reference: Lectura textual y sintáctica del agente divino implícito
translation_notes:
  revision_awareness: 'El borrador anterior fue corregido porque no seguía el ge''ez ni el pasaje paralelo; esta versión incorpora la revisión que identifica el verbo masculino singular como acción de un agente masculino implícito y ajusta el resto de la cláusula a la secuencia verbal correcta: abrir los ojos, ver el pozo, ir, llenar el odre y dar de beber.'
  spanish_consistency_notes:
  - Se usa 'Y' inicial para reflejar la continuidad narrativa.
  - '''Odre'' se mantiene de forma consistente para el recipiente de cuero para agua.'
  - Se conserva el pronombre dativo 'le' para el destinatario de la acción final, en concordancia con el texto fuente.
