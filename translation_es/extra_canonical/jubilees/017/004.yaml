    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: Sarah sees Ishmael joking and dancing, Abraham rejoicing greatly, becomes jealous of Ishmael, and tells Abraham to cast out the woman and her son.'
translation:
  language: es
  text: 'Y Sara vio a Ismael bromeando y danzando, y vio a Abraham regocijándose con gran gozo, y se puso celosa de Ismael y dijo a Abraham: «Expulsa a esta esclava[a] y a su hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta mujer»; el sentido contextual del original revisado apunta a una esclava o sierva doméstica, no simplemente a una mujer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሣራ / Sarah
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: nombre propio
  rationale: En español bíblico actual, «Sara» es la forma natural y transparente del nombre; conserva la referencia al personaje sin necesidad de grafía inglesa.
- source_word: ይስማዔል / Ishmael
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  alternatives_spanish:
  - Ishmael
  lexicon: nombre propio
  rationale: «Ismael» es la forma establecida en español y corresponde al nombre bíblico conocido.
- source_word: ይትዋነይ፡ ወይዘፍን፡
  english_pob_choice: joking and dancing
  chosen_spanish: bromeando y danzando
  alternatives_spanish:
  - jugando y danzando
  - riendo y danzando
  lexicon: acción verbal / gestual
  rationale: «Bromeando» conserva el tono de burla o juego irreverente que suele estar implicado en el contexto de Génesis 21:9; «danzando» preserva el movimiento corporal explícito del texto.
- source_word: ይትፌሣሕ፡ ፍሥሓ፡ ዐቢየ፡
  english_pob_choice: rejoicing with great joy
  chosen_spanish: regocijándose con gran gozo
  alternatives_spanish:
  - alegrándose con gran alegría
  - gozándose con gran gozo
  lexicon: expresión enfática
  rationale: La repetición intensiva del original se refleja mejor con una construcción igualmente enfática. «Regocijándose con gran gozo» mantiene el paralelismo semítico sin sonar demasiado rígido.
- source_word: ቀንአት / jealous
  english_pob_choice: became jealous
  chosen_spanish: se puso celosa
  alternatives_spanish:
  - tuvo celos
  - se llenó de celos
  lexicon: estado afectivo
  rationale: El sentido es celos/hostilidad suscitado por la escena; «se puso celosa» comunica bien el cambio de estado en español natural. Se mantiene el referente femenino por Sara.
- source_word: እንዘ፡ ይትፌሣሕ፡ ፍሥሓ፡ ዐቢየ፡ ወቀንአት፡ ለይስማዔል፡
  english_pob_choice: and she became jealous of Ishmael
  chosen_spanish: y se puso celosa de Ismael
  alternatives_spanish:
  - y sintió celos de Ismael
  - y celó de Ismael
  lexicon: relación causal
  rationale: El objeto del celo es explícitamente Ismael; se conserva la preposición «de» para hacer visible la relación directa del texto fuente.
- source_word: ስድድ፡ ዛተ፡ ወሰተ፡
  english_pob_choice: Cast out this maidservant and her son
  chosen_spanish: Expulsa a esta esclava[a] y a su hijo
  alternatives_spanish:
  - Echa fuera a esta esclava[a] y a su hijo
  - Despide a esta esclava[a] y a su hijo
  lexicon: estatus social / mandato
  rationale: «Esclava» preserva la fuerza social del término y la decisión terminológica de la POB donde el inglés distinguía «maidservant» de un mero «woman». Se evita «sierva» porque suaviza indebidamente el estatus.
theological_decisions:
- issue: El estatus de la mujer expulsada
  english_pob_reading: this maidservant
  chosen_spanish_reading: esta esclava
  alternative_spanish_readings:
  - esta sirvienta
  - esta mujer
  rationale: La revisión auditada corrige explícitamente «this woman» a «this maidservant». En español, «esclava» transmite mejor la relación de subordinación doméstica y social que sostiene la escena; «sirvienta» diluye la dureza del término.
  doctrine_reference: Narrativa patriarcal de Génesis 21:10; uso léxico del relato paralelo
translation_notes:
  revision_awareness: 'El audit trail muestra una corrección importante: el inglés POB fue revisado desde «this woman» a «this maidservant» por acuerdo con el Ge''ez y el paralelo de Génesis 21:10. La versión española sigue esa corrección y evita la atenuación semántica. También se mantuvo el énfasis del doble gozo/júbilo y la secuencia narrativa completa del versículo.'
  spanish_consistency_notes:
  - Se usa «Sara», «Ismael» y «Abraham» como nombres propios estándar en español bíblico.
  - Se conservó una traducción fuerte de la relación social con «esclava», en línea con la nota de revisión.
  - La frase «regocijándose con gran gozo» mantiene la intensificación del original sin introducir interpretación adicional.
  - Se empleó puntuación directa y clara para lectura pública en español.
