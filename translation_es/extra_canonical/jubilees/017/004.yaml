  yaml_path: translation/extra_canonical/jubilees/017/004.yaml
  text: And Sarah saw Ishmael joking and dancing, and Abraham rejoicing with great joy, and she became jealous of Ishmael and said to Abraham, “Cast out this maidservant and her son.”
  footnotes:
