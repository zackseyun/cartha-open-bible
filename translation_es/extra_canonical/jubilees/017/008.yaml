translation:
  language: es
  text: Lo convertiré en una gran nación, porque procede de tu descendencia. Y Abraham se levantó muy de mañana.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ውስተ ዐቢይ ሕዝብ እሬስዮ
  english_pob_choice: I will make him into a great nation
  chosen_spanish: Lo haré en una gran nación
  alternatives_spanish:
  - Lo convertiré en una gran nación
  - Lo haré grande entre un gran pueblo
  lexicon: haza / ሕዝብ; ረሰየ
  rationale: La revisión inglesa más reciente corrigió el sentido a futuro y entendió la frase como “make him into a great nation”; por eso en español uso una construcción natural de transformación, sin perder el objeto colectivo “nación”. La alternativa ‘entre un gran pueblo’ reflejaría una lectura anterior, pero la evidencia revisada favorece ‘en una gran nación’.
- source_word: እስመ እምዘርእከ ውእቱ
  english_pob_choice: because he is from your seed
  chosen_spanish: porque procede de tu descendencia
  alternatives_spanish:
  - porque es de tu descendencia
  - porque proviene de tu linaje
  lexicon: seed / descent
  rationale: ‘Seed’ aquí tiene valor genealógico; ‘descendencia’ comunica bien el vínculo de origen sin introducir metáfora extra. ‘Procede de’ conserva la idea relacional de procedencia que el inglés auditado expresa con ‘is from’.
- source_word: ወነገሀ አብርሃም በነግህ
  english_pob_choice: And Abraham rose early in the morning
  chosen_spanish: Y Abraham se levantó muy de mañana
  alternatives_spanish:
  - Y Abraham madrugó
  - Y Abraham se levantó al amanecer
  lexicon: rise early in the morning
  rationale: La expresión española ‘se levantó muy de mañana’ es fiel, idiomática y amplia; evita un calco pesado y conserva el valor temporal de la acción.
theological_decisions:
- issue: Promesa de engrandecimiento de la descendencia
  english_pob_reading: I will make him into a great nation
  chosen_spanish_reading: Lo haré en una gran nación
  alternative_spanish_readings:
  - Lo haré grande entre un gran pueblo
  rationale: No suavizo el alcance colectivo de la promesa. ‘Nación’ mantiene la dimensión histórica/comunitaria que la revisión inglesa determinó para el ge’ez, en vez de reducirlo a un ‘pueblo’ ambiguo.
  doctrine_reference: Génesis 12:2; 17:20; tradición de promesa patriarcal
translation_notes:
  revision_awareness: 'Se incorporó la corrección revisada del ge’ez: la frase ውስተ ዐቢይ ሕዝብ እሬስዮ se entiende como futuro con sentido de transformación (“I will make him into a great nation”), no como un pasado ni como ‘among a great people’. También se mantuvo la secuencia posterior sobre Abraham levantándose temprano.'
  spanish_consistency_notes:
  - Se prefirió ‘descendencia’ para ἐ/זֶרַע en sentido genealógico, coherente con el registro bíblico en español.
  - ‘Se levantó muy de mañana’ conserva el aspecto narrativo y evita una paráfrasis excesiva.
  - No se usó ‘SEÑOR’ ni otros equivalentes cultuales porque este versículo no contiene el nombre divino ni una cita directa de κύριος.
