translation:
  language: es
  text: '…para que los despidiera[a] de su lado. Y Yahvé dijo a Abraham: «No te parezca doloroso ante tus ojos por causa del niño y por causa de la esclava. Todo lo que Sara te diga, escucha su voz y hazlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que los apartara de su lado». El verbo expresa alejamiento o despedida en una subordinada, no necesariamente una acción ya consumada en ese punto del relato.
    reason: Preservar la nota sobre el valor subordinado y una alternativa léxica sin dejar una forma verbal defectuosa en el texto.
lexical_decisions:
- source_word: ይሰድዶሙ / send them away
  english_pob_choice: that he should send them away from him
  chosen_spanish: para que los echara de su lado
  alternatives_spanish:
  - para que los despidiera de su lado
  - para que los apartara de su lado
  lexicon: send away
  rationale: El Ge’ez refleja una idea de alejamiento/despido en subordinada, no un pasado narrativo simple. «Echar de su lado» conserva la relación interpersonal y el valor de separación, sin convertirlo en un hecho consumado antes de la palabra de Dios.
- source_word: እግዚአብሔር / the Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: YHWH
  rationale: La política del proyecto pide «Yahvé» para el nombre divino, en lugar de ocultarlo con «Señor». Aquí el contexto no exige una sustitución litúrgica.
- source_word: ሐዘን / grievous, grief
  english_pob_choice: Do not let it be grievous in your sight
  chosen_spanish: No te parezca doloroso en tu vista
  alternatives_spanish:
  - No te aflija en tu vista
  - No te sea penoso
  lexicon: pain/grief
  rationale: 'La expresión busca reproducir el giro semítico de percepción interior: algo que «parece» doloroso o pesado ante los ojos. «Doloroso en tu vista» mantiene esa fuerza sin borrar el matiz de aflicción.'
- source_word: ወበእንተ፡ ሕፃን / because of the boy
  english_pob_choice: because of the boy
  chosen_spanish: por causa del niño
  alternatives_spanish:
  - a causa del niño
  - por el muchacho
  lexicon: boy/child
  rationale: «Niño» es directo y neutral en español, y conserva el referente del Ge’ez. «Muchacho» sería posible, pero menos preciso aquí.
- source_word: ወበእንተ፡ ወለት / because of the slave woman
  english_pob_choice: because of the slave woman
  chosen_spanish: por causa de la esclava
  alternatives_spanish:
  - a causa de la esclava
  - por causa de la sierva
  lexicon: slave woman
  rationale: Se mantiene «esclava» porque el inglés POB eligió «slave woman» por fuerza léxica, y el proyecto evita suavizarlo a «sierva» sin razón textual. La forma femenina sustantivada es clara en español.
- source_word: ሣራ / Sarah
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: proper name
  rationale: «Sara» es la forma corriente y plenamente reconocible en español bíblico, adecuada al registro del texto.
- source_word: ስማዕ ቃለ / listen to her voice
  english_pob_choice: listen to her voice
  chosen_spanish: escucha su voz
  alternatives_spanish:
  - oye su voz
  - atiende su voz
  lexicon: hear/listen idiom
  rationale: La frase bíblica conserva la metáfora de la «voz» como autoridad o palabra. «Escucha su voz» es una equivalencia idiomática natural y fiel.
theological_decisions:
- issue: Nombre divino en un pasaje narrativo de mandato
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el inglés POB usa «the Lord» por convención, la política española del proyecto explicita el nombre divino cuando el original y el contexto lo sustentan. No hay motivo aquí para enmascararlo.
  doctrine_reference: Divine-name policy / YHWH
- issue: ‘Slave woman’ as social status rather than softened servanthood
  english_pob_reading: the slave woman
  chosen_spanish_reading: la esclava
  alternative_spanish_readings:
  - la sierva
  - la servidora
  rationale: El texto diferencia con nitidez el estatus social de la mujer. Traducirlo como «esclava» preserva la tensión social y narrativa que el texto presenta.
  doctrine_reference: Lexical fidelity / social status
- issue: ‘Listen to her voice’ as obedience to Sarah’s spoken instruction
  english_pob_reading: listen to her voice and do it
  chosen_spanish_reading: escucha su voz y hazlo
  alternative_spanish_readings:
  - oye su voz y hazlo
  - escucha lo que ella dice y hazlo
  rationale: La expresión no describe mera percepción auditiva sino obediencia a la instrucción de Sara. «Escucha su voz» conserva el hebraísmo y su fuerza imperativa.
  doctrine_reference: Narrative obedience / speech-act idiom
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un borrador anterior que era ajeno al pasaje y alineó el sentido con el Ge’ez: la cláusula inicial es subordinada («para que los echara de su lado»), y luego Dios instruye a Abraham sobre el niño, la esclava y la obediencia a Sara. También se tuvo en cuenta la observación de revisión posterior sobre el valor subjuntivo/imperfectivo del verbo, evitando traducirlo como pasado concluido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la política española del proyecto.
  - Se conserva «esclava» para la mujer, en coherencia con la fuerza léxica documentada del inglés POB.
  - Se usa un registro bíblico claro y moderno, evitando arcaísmos innecesarios como «no te pese» salvo que el español exigiera una opción más idiomática.
  - La nota al pie marca la alternativa sobre la cláusula inicial sin duplicar el contenido del texto principal.
