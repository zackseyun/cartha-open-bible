revisions:
- from: Yahvé sabía que Abraham era fiel en todas sus pruebas; porque lo había probado en su país, y con hambre, y lo había probado mediante la riqueza de los reyes, y de nuevo lo había probado mediante su esposa cuando fue apartada de él, y mediante la circuncisión, y lo había probado mediante Ismael y Agar, su esclava, cuando los envió lejos. Y en todo aquello con que lo había probado, fue hallado fiel, y su alma no se impacientó, ni tardó en actuar; porque era fiel y amante de Yahvé.
  to: Yahvé sabía que Abraham era fiel en todas sus pruebas; porque lo había probado en su país, y con hambre, y lo había probado mediante la riqueza de los reyes, y de nuevo lo había probado mediante su esposa cuando fue apartada de él, y mediante la circuncisión, y lo había probado mediante Ismael y Agar, su esclava, cuando los despidió. Y en todo aquello con que lo había probado, fue hallado fiel, y su alma no se impacientó, ni tardó en actuar; porque era fiel y amante de Yahvé.
  rationale: Se hizo una reparación menor para evitar la sobreinterpretación espacial de «cuando los envió lejos». «Cuando los despidió» conserva mejor el valor del inglés auditado y el sentido del episodio, con español más idiomático. No se requieren notas adicionales.
