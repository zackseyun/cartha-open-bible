  language: en
  yaml_path: translation/extra_canonical/jubilees/017/001.yaml
  text: And the Lord knew that Abraham was faithful in all his trials; for he had tested him in his country, and with famine, and had tested him through the wealth of kings, and again had tested him through his wife when she was taken away, and through circumcision, and had tested him through Ishmael and Hagar his maidservant when he sent them away. And in everything by which he had tested him, he was found faithful, and his soul was not impatient, and he did not delay in acting; for he was faithful and a lover of the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:13Z'
    unchanged: false
    changes_summary: Revised 'afflictions' to 'trials' for better lexical fit with repeated testing language; changed 'in his land' to 'in his country' for more natural English; and adjusted 'delay to act' to 'delay in acting' for smoother formal style.
translation:
  language: es
  text: Yahvé sabía que Abraham era fiel en todas sus pruebas; porque lo había probado en su país, y con hambre, y lo había probado mediante la riqueza de los reyes, y de nuevo lo había probado mediante su esposa cuando fue apartada de él, y mediante la circuncisión, y lo había probado mediante Ismael y Agar, su esclava, cuando los despidió. Y en todo aquello con que lo había probado, fue hallado fiel, y su alma no se impacientó, ni tardó en actuar; porque era fiel y amante de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dios
  lexicon: Tetragrámaton / nombre divino
  rationale: El texto geʽez corresponde al nombre divino; la política del proyecto exige Yahvé en el texto principal, no una máscara como «el Señor». La secuencia «Yahvé sabía» mantiene el sujeto personal del pasaje sin perder la referencia al nombre propio divino.
- source_word: መሃይምን
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - fiel y digno de confianza
  lexicon: πίστις / fidelidad
  rationale: La idea es de fidelidad probada en las pruebas, no solo de creencia mental. «Fiel» reproduce bien el juicio sobre Abraham y permite conservar la repetición temática de prueba y fidelidad.
- source_word: በኵሉ፡ ምንዳቤሁ / በዘአመከሮ
  english_pob_choice: in all his trials / had tested him
  chosen_spanish: en todas sus pruebas / lo había probado
  alternatives_spanish:
  - en todas sus aflicciones / lo había puesto a prueba
  lexicon: πειρασμός / probar
  rationale: El contexto insiste en pruebas reiteradas, por eso «pruebas» y «probar» conservan el paralelismo sin suavizar la reiteración. «Aflicciones» sería posible, pero desplaza el énfasis del acto de poner a prueba.
- source_word: በምድሩ
  english_pob_choice: in his country
  chosen_spanish: en su país
  alternatives_spanish:
  - en su tierra
  - en su nación
  lexicon: γῆ / país, tierra
  rationale: «País» sigue la revisión inglesa y suena natural en español, sin perder el sentido de lugar de procedencia. «Tierra» sería más literal pero puede sonar más arcaizante o ambigua.
- source_word: ብዕለ፡ ነገሥት
  english_pob_choice: the wealth of kings
  chosen_spanish: la riqueza de los reyes
  alternatives_spanish:
  - las riquezas de los reyes
  - la abundancia de los reyes
  lexicon: πολυτέλεια / riqueza
  rationale: El geʽez apunta a la prueba mediante prosperidad/riqueza real. «La riqueza de los reyes» mantiene el sustantivo singular colectivo del inglés POB y su fuerza de contraste con las demás pruebas.
- source_word: ብእሲቱ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: γυνή / esposa
  rationale: «Esposa» es más preciso y digno en español que «mujer» cuando se habla de Sara como cónyuge de Abraham.
- source_word: ትትሃየድ
  english_pob_choice: when she was taken away
  chosen_spanish: cuando fue apartada de él
  alternatives_spanish:
  - cuando fue tomada
  - cuando le fue quitada
  lexicon: λαμβάνω / tomar, retirar
  rationale: El pasaje alude a Sara siendo separada de Abraham; «apartada de él» evita implicar necesariamente un matiz de rapto en español y conserva la tensión del episodio.
- source_word: በአስስክ
  english_pob_choice: through circumcision
  chosen_spanish: mediante la circuncisión
  alternatives_spanish:
  - por la circuncisión
  - a través de la circuncisión
  lexicon: περιτομή / circuncisión
  rationale: «Mediante» preserva el valor instrumental de la prueba y suena natural en un listado de medios por los cuales Abraham fue probado.
- source_word: ይስማዔል፡ ወበአጋር
  english_pob_choice: through Ishmael and Hagar his maidservant
  chosen_spanish: mediante Ismael y Agar, su esclava
  alternatives_spanish:
  - mediante Ismael y Agar, su sierva
  - a través de Ismael y Agar, su esclava
  lexicon: δοῦλος / esclava
  rationale: Se conserva «esclava» porque el trasfondo de la mujer de Sara/Abraham no debe suavizarse; el inglés POB usó «maidservant» como término funcional. «Sierva» sería menos fuerte y tendería a domesticar la relación social.
- source_word: ኢተአገተት ነፍሱ
  english_pob_choice: his soul was not impatient
  chosen_spanish: su alma no se impacientó
  alternatives_spanish:
  - su alma no desfalleció
  - su alma no se irritó
  lexicon: נפש / alma
  rationale: La formulación conserva la personificación hebraica/semítica de «alma» y reproduce el sentido de no perder paciencia o serenidad ante la prueba.
- source_word: ኢጐንደየ ገቢሮተ
  english_pob_choice: he did not delay in acting
  chosen_spanish: ni tardó en actuar
  alternatives_spanish:
  - ni se demoró en obrar
  - ni retrasó su actuación
  lexicon: מָהַר / tardar, demorar
  rationale: La revisión inglesa favorece una forma más fluida. «Tardó en actuar» conserva la idea de prontitud sin volver mecánica la cláusula.
- source_word: መፍቀሬ፡ እግዚአብሔር
  english_pob_choice: a lover of the Lord
  chosen_spanish: amante de Yahvé
  alternatives_spanish:
  - amador de Yahvé
  - amante del Señor
  lexicon: ἀγαπῶν / amar
  rationale: Se preserva el calificativo relacional fuerte. «Amante de Yahvé» es idiomático y comunica afecto y lealtad; «amador» sería más literal pero menos natural en español contemporáneo.
theological_decisions:
- issue: Nombre divino en un texto de tradición cristiana antigua
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el inglés POB traduce «the Lord», el proyecto español exige recuperar el nombre divino cuando el original lo sustenta. No se usa una máscara litúrgica porque el objetivo es transparencia textual y auditable.
  doctrine_reference: Éxodo 3:15; convención editorial del POB español sobre יהוה
- issue: Sentido de las pruebas de Abraham
  english_pob_reading: tested him / trials
  chosen_spanish_reading: lo había probado / pruebas
  alternative_spanish_readings:
  - lo había puesto a prueba
  - aflicciones
  rationale: El texto no solo describe sufrimiento sino examen de fidelidad. «Probar» y «pruebas» mantienen ese eje teológico de fidelidad verificada por Dios.
  doctrine_reference: Génesis 22:1; Santiago 1:2-4
- issue: Referente de la separación de Sara
  english_pob_reading: when she was taken away
  chosen_spanish_reading: cuando fue apartada de él
  alternative_spanish_readings:
  - cuando fue tomada
  - cuando le fue quitada
  rationale: La redacción evita decidir más de lo que el pasaje afirma, pero conserva que hubo una separación forzada o providencial de Abraham y su esposa. No se explicita el episodio histórico porque el texto solo alude a él.
  doctrine_reference: Génesis 12:10-20; 20:1-18; 26:1-11
- issue: Calificación final de Abraham como amante de Yahvé
  english_pob_reading: a lover of the Lord
  chosen_spanish_reading: amante de Yahvé
  alternative_spanish_readings:
  - amador de Yahvé
  - amante del Señor
  rationale: La frase expresa afección fiel y orientación de vida hacia Dios, no mero sentimiento devocional. Se conserva la tensión entre fidelidad ética y amor personal.
  doctrine_reference: Deuteronomio 6:5; Juan 14:21
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «trials» sobre «afflictions», «in his country» sobre «in his land» y «delay in acting» sobre «delay to act». El español refleja esas decisiones con «pruebas», «su país» y «ni tardó en actuar», manteniendo el tono formal y la repetición de la serie de pruebas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino.
  - Se usa «pruebas» y «probar» de manera reiterada para conservar la cadena lexical del pasaje.
  - «Esclava» se conserva como término de fuerza social, coherente con el criterio POB para δοῦλος/maidservant cuando el contexto lo justifica.
  - No se introducen notas al pie porque el verso no presenta una variante textual o ambigüedad que requiera marcadores en el texto español.
