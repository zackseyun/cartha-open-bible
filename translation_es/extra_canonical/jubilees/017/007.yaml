base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/017/007.yaml
  text: For in Isaac a name and seed will be called for you. And concerning the son of this slave woman,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:14Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Geʽez text: rendered እስመ as ''For,'' በይስሐቅ as ''in Isaac,'' ይጼዋዕ as ''will be called,'' included both ''name and seed,'' and translated the remaining clause as ''And concerning the son of this slave woman,'' preserving the verse''s incomplete/continuing syntax rather than adding material not in the source.'
translation:
  language: es
  text: Porque en Isaac te será llamado un nombre y descendencia. Y acerca del hijo de esta mujer esclava,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: conjunción causal
  rationale: El Geʽez introduce una explicación causal; en español «Porque» conserva la relación lógica de causa sin añadir contenido interpretativo.
- source_word: በይስሐቅ
  english_pob_choice: in Isaac
  chosen_spanish: en Isaac
  alternatives_spanish:
  - por medio de Isaac
  - a través de Isaac
  lexicon: preposición + nombre propio
  rationale: La construcción se mantiene de manera cercana al original y al inglés auditado. «En Isaac» es la forma más directa y reproduce la locución fuente sin forzar una paráfrasis.
- source_word: ይጼዋዕ
  english_pob_choice: will be called
  chosen_spanish: será llamado
  alternatives_spanish:
  - será nombrado
  - será designado
  lexicon: pasivo verbal
  rationale: Se conserva la voz pasiva futura del verbo. «Será llamado» es natural en español bíblico y refleja el valor pasivo del original.
- source_word: ለከ፡ ስም፡ ወዘርእ
  english_pob_choice: a name and seed
  chosen_spanish: un nombre y descendencia
  alternatives_spanish:
  - un nombre y simiente
  - un nombre y linaje
  lexicon: nombre; descendencia
  rationale: «Nombre» conserva el sustantivo básico del texto. Para ዘርእ, «descendencia» comunica mejor el alcance genealógico en español actual que «simiente», aunque esta última se deja como alternativa por su cercanía tradicional y lexical.
- source_word: ወበእንተ
  english_pob_choice: And concerning
  chosen_spanish: Y acerca de
  alternatives_spanish:
  - Y respecto de
  - Y en cuanto a
  lexicon: preposición discursiva
  rationale: «Acerca de» mantiene la transición temática del texto y su apertura a una continuación, sin completar lo que la línea no dice.
- source_word: ወልደስ፡ ለዛ፡ ወለት
  english_pob_choice: the son of this slave woman
  chosen_spanish: el hijo de esta esclava mujer
  alternatives_spanish:
  - el hijo de esta esclava
  - el hijo de esta mujer esclava
  lexicon: sustantivo de relación + calificativo
  rationale: Se conserva la fuerza léxica de ለዛ፡ ወለት con «esta esclava mujer», una traducción algo marcada pero fiel a la acumulación descriptiva del original. No se suaviza a «sierva» porque el testimonio inglés eligió «slave woman» y el contexto exige mantener esa tensión léxica.
theological_decisions:
- issue: La frase queda incompleta y no debe rellenarse con material ajeno al verso.
  english_pob_reading: And concerning the son of this slave woman,
  chosen_spanish_reading: Y acerca del hijo de esta esclava mujer,
  alternative_spanish_readings:
  - Y en cuanto al hijo de esta esclava,
  - Y respecto del hijo de esta mujer esclava,
  rationale: El testimonio fuente termina en una cláusula abierta; la versión española conserva esa apertura con una coma final y no añade continuación interpretativa. Esto respeta la forma fragmentaria del pasaje.
  doctrine_reference: Principio de fidelidad textual y de no-expansión
translation_notes:
  revision_awareness: 'El inglés POB revisado corrigió un borrador no relacionado y fijó la lectura actual a partir del Geʽez: causalidad inicial («For»), localización relacional («in Isaac»), pasivo futuro («will be called»), duplicación semántica («name and seed») y cláusula final incompleta sobre «the son of this slave woman». La versión española sigue esa revisión y conserva el carácter abierto del final.'
  spanish_consistency_notes:
  - Se prefiere «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evita «Cristo» y cualquier terminología ajena al verso.
  - «Descendencia» se usa para ዘርእ por claridad, con «simiente» como alternativa registrada.
  - La puntuación final con coma reproduce la continuidad sintáctica del original y la lectura inglesa auditada.
