translation:
  language: es
  text: …y su hijo, porque el hijo de esta esclava no heredará con mi hijo Isaac.” Y aquello fue muy doloroso a los ojos de Abraham por causa de su esclava[a] y por causa de su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esclava» traduce el término con fuerza servil; la alternativa «sierva» suavizaría el contraste social del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑ/Ge'ez ወወልዳ / “her son”
  english_pob_choice: and her son
  chosen_spanish: y su hijo
  alternatives_spanish:
  - y el hijo de ella
  - y su hijo de la esclava
  lexicon: —
  rationale: El Ge’ez retoma el hilo de la frase anterior con un complemento coordinado que en español funciona de modo natural como «y su hijo». Mantiene la referencia a Ismael sin introducir explicaciones ajenas al texto.
- source_word: slave woman / maidservant
  english_pob_choice: slave woman / maidservant
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  lexicon: —
  rationale: El contexto y el audit trail inglés conservan la fuerza lexical de la relación servil; «esclava» comunica mejor esa carga que «sierva» en español contemporáneo.
- source_word: inherit
  english_pob_choice: be an heir
  chosen_spanish: heredará
  alternatives_spanish:
  - será heredero
  - tendrá herencia
  lexicon: —
  rationale: «Heredará» preserva la idea legal de herencia del texto y suena natural en español; evita diluir la imagen jurídica de la cláusula.
- source_word: Isaac
  english_pob_choice: my son Isaac
  chosen_spanish: mi hijo Isaac
  alternatives_spanish:
  - mi hijo, Isaac
  lexicon: —
  rationale: 'Se mantiene la relación posesiva del original: Isaac es el hijo por contraste con el hijo de la esclava.'
- source_word: very grievous
  english_pob_choice: was very grievous
  chosen_spanish: muy doloroso
  alternatives_spanish:
  - muy aflictivo
  - muy penoso
  lexicon: —
  rationale: «Doloroso» expresa adecuadamente la gravedad emocional del pasaje en español bíblico moderno, sin exceder el matiz del original.
- source_word: in the sight of Abraham
  english_pob_choice: in the sight of Abraham
  chosen_spanish: a los ojos de Abraham
  alternatives_spanish:
  - ante Abraham
  - a la vista de Abraham
  lexicon: —
  rationale: Se conserva la fórmula idiomática tradicional, que en español es clara y fiel a la imagen hebrea/semítica detrás del giro.
- source_word: maidservant
  english_pob_choice: maidservant
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  lexicon: —
  rationale: La mención final repite el referente de Agar; se traduce consistentemente como «esclava» para no suavizar el contraste social del pasaje.
theological_decisions:
- issue: Relación de herencia entre Isaac y el hijo de la esclava
  english_pob_reading: the son of this slave woman will not be an heir with my son Isaac
  chosen_spanish_reading: el hijo de esta esclava no heredará con mi hijo Isaac
  alternative_spanish_readings:
  - el hijo de esta esclava no será heredero junto con mi hijo Isaac
  - el hijo de esta esclava no compartirá herencia con mi hijo Isaac
  rationale: Se mantiene el conflicto de herencia como declaración excluyente, sin suavizarlo. La formulación española conserva la tensión social y familiar del texto.
  doctrine_reference: Génesis 21:10; Gálatas 4:30
- issue: Dolor de Abraham ante la expulsión implícita y el destino de su hijo
  english_pob_reading: the matter was very grievous in the sight of Abraham because of his maidservant and because of his son
  chosen_spanish_reading: aquello fue muy doloroso a los ojos de Abraham por causa de su esclava y por causa de su hijo
  alternative_spanish_readings:
  - el asunto le resultó muy penoso a Abraham por causa de su esclava y por causa de su hijo
  - esto afligió mucho a Abraham por su esclava y por su hijo
  rationale: La lectura conserva la compasión y la angustia de Abraham sin convertirla en comentario explicativo. El doble motivo («por causa de…») se mantiene porque pertenece al peso narrativo del pasaje.
  doctrine_reference: Génesis 21:11
translation_notes:
  revision_awareness: El texto griego/ge’ez disponible muestra que la frase comienza con una continuación coordinada («…y su hijo, porque…»), enlazando con la sentencia previa sobre la expulsión de la esclava y su hijo. La versión española refleja esa continuidad y la revisión que corrigió un borrador ajeno al contenido real del versículo. También sigue la revisión que identifica el cierre del versículo como la reacción de Abraham ante Agar y su hijo.
  spanish_consistency_notes:
  - Se mantiene «esclava» de forma consistente para el referente femenino servil, en línea con la decisión léxica del proyecto.
  - Se preserva la estructura relacional entre «mi hijo Isaac» y «el hijo de esta esclava» para conservar la tensión de herencia.
  - 'La puntuación reproduce la división narrativa del versículo: discurso directo seguido de la reacción de Abraham.'
