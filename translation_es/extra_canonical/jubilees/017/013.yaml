    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: the child grew; she arose and went to the wilderness of Paran; he became an archer; the Lord was with him; and his mother took a wife for him from the daughters of Egypt.'
translation:
  language: es
  text: su hijo. Y ella se levantó y fue hacia el desierto de Parán. Y el niño creció, y se hizo arquero, y Yahvé estuvo con él, y su madre le tomó esposa de entre las hijas de Egipto.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ሕፃና
  english_pob_choice: her child
  chosen_spanish: su hijo[a]
  alternatives_spanish:
  - su niño
  - su hijo
  lexicon: sustantivo posesivo con valor simple de parentesco
  rationale: El Ge'ez aquí no dice 'and the child grew'; el audit trail inglés corrige esa lectura y entiende ሕፃና como un complemento pronominal, 'her child'. En español, 'su hijo' es la forma natural y precisa para expresar la relación materna sin añadir información no presente.
- source_word: መንገለ
  english_pob_choice: toward
  chosen_spanish: hacia
  alternatives_spanish:
  - hacia
  - en dirección a
  lexicon: preposición direccional
  rationale: El contexto y el audit trail inglés favorecen una dirección, no ubicación. 'Hacia' transmite bien el valor de movimiento con naturalidad en español.
- source_word: በድው ፍራም
  english_pob_choice: the wilderness of Paran
  chosen_spanish: el desierto de Parán
  alternatives_spanish:
  - el desierto de Parán
  - el yermo de Parán
  lexicon: topónimo + sustantivo geográfico
  rationale: '''Desierto'' es la opción más clara y readable en español para ''wilderness'' en este contexto narrativo; ''Parán'' conserva el topónimo. ''Yermo'' sería posible pero menos idiomático.'
- source_word: ነዳፌ
  english_pob_choice: an archer
  chosen_spanish: arquero
  alternatives_spanish:
  - arquero
  - tirador con arco
  lexicon: sustantivo ocupacional
  rationale: '''Arquero'' comunica directamente la profesión/habilidad sin sobreexplicar. Mantiene el sentido lexical del inglés POB ''archer''.'
- source_word: ה/ἥ/እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: nombre divino
  rationale: Conforme a la pauta del proyecto, el nombre divino se vierte como 'Yahvé' y no como una sustitución reverencial. Esto preserva la transparencia respecto del original.
- source_word: ብእሲተ እምአዋልደ ግብጽ
  english_pob_choice: a wife from the daughters of Egypt
  chosen_spanish: mujer de entre las hijas de Egipto
  alternatives_spanish:
  - mujer de entre las hijas de Egipto
  - esposa de entre las hijas de Egipto
  lexicon: expresión de parentesco/selección matrimonial
  rationale: '''Mujer'' mantiene la literalidad del objeto tomado para él; ''esposa'' explicita la función matrimonial, pero ''mujer'' respeta mejor la forma del original y del inglés POB, dejando clara la relación por el contexto.'
theological_decisions:
- issue: Divine name rendering
  english_pob_reading: the Lord was with him
  chosen_spanish_reading: Yahvé estuvo con él
  alternative_spanish_readings:
  - el Señor estuvo con él
  - Yahvé estaba con él
  rationale: La frase refleja presencia y favor divinos en lenguaje narrativo. Se conserva 'Yahvé' para mantener la transparencia del texto y la coherencia con la norma del proyecto.
  doctrine_reference: Nombre divino / transparencia textual
- issue: Maternal action and marital provision
  english_pob_reading: his mother took for him a wife from the daughters of Egypt
  chosen_spanish_reading: su madre le tomó mujer de entre las hijas de Egipto
  alternative_spanish_readings:
  - su madre le tomó esposa de entre las hijas de Egipto
  - su madre le consiguió mujer de entre las hijas de Egipto
  rationale: '''Le tomó mujer'' reproduce la construcción semítica/narrativa sin introducir una interpretación más fuerte que el texto. El sentido matrimonial queda claro por el complemento ''de entre las hijas de Egipto''.'
  doctrine_reference: Narrativa patriarcal / forma semítica
translation_notes:
  revision_awareness: El audit trail inglés corrige una lectura anterior errónea que insertaba 'el niño creció' al inicio; el Ge'ez comienza con 'her child'. También corrige la dirección como 'toward the wilderness'. La versión española sigue esa revisión y evita la duplicación de 'creció' en la primera cláusula.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme a la terminología estándar del proyecto.
  - '''Desierto'' se emplea por claridad narrativa en español; no se suaviza a ''tierra'' o ''región''.'
  - '''Arquero'' conserva el sustantivo concreto del original.'
  - La frase 'le tomó mujer' se mantiene para respetar el tenor semítico del texto.
