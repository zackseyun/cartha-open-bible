  text: When I called him. And it came to pass in the seventh week, in the first year, in the first month, in this jubilee, on the twelfth of this month, words came in heaven concerning Abraham, that he was faithful in all that he spoke, and he loved the Lord, and in every trial he was faithful.
  footnotes:
  - marker: a
    text: Or 'And when he had called him,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:15Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: restored the temporal markers, the heavenly declaration concerning Abraham, and the repeated statement of his faithfulness; rendered the verse in formal, natural English.'
translation:
  language: es
  text: 'Cuando lo llamé. Y aconteció que, en la séptima semana, en el primer año, en el primer mes, en este jubileo, el duodécimo día de este mes, se pronunciaron palabras en el cielo acerca de Abraham: que él era fiel en todo lo que hablaba, amaba a Yahvé, y en toda prueba fue fiel.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ጸዋዕክዎ
  english_pob_choice: When I called him.
  chosen_spanish: Cuando yo lo llamé.
  alternatives_spanish:
  - Y cuando lo llamé.
  - Cuando lo llamé.
  lexicon: call / llamar
  rationale: El ge'ez es de primera persona singular; por eso se conserva 'yo' para hacer explícito el sujeto, como en el sentido corregido del audit trail inglés. Se evita la forma pasiva o de tercera persona.
- source_word: በሰማያት
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo
  lexicon: heaven / cielo
  rationale: El plural etimológico 'los cielos' es posible, pero 'en el cielo' suena más natural en español y sigue el sentido locativo del texto.
- source_word: ዘይትናገር
  english_pob_choice: that he spoke
  chosen_spanish: lo que hablaba
  alternatives_spanish:
  - lo que decía
  - lo que hablaba
  lexicon: speak / hablar
  rationale: Se mantiene el valor durativo o habitual del verbo. 'Hablaba' evita añadir un objeto no explícito y refleja mejor la formulación general del elogio.
- source_word: ያፈቅሮ
  english_pob_choice: he loved the Lord
  chosen_spanish: amó a Yahvé
  alternatives_spanish:
  - amaba a Yahvé
  - amó al Señor
  lexicon: love / amar; divine name
  rationale: Se usa 'Yahvé' según el criterio POB para el nombre divino. El aoristo/pretérito en español funciona bien para el acto afirmado; también podría leerse con valor habitual, pero el contexto de declaración resumida favorece el pretérito.
- source_word: ምእመነ
  english_pob_choice: he was faithful
  chosen_spanish: fue fiel
  alternatives_spanish:
  - era fiel
  - permaneció fiel
  lexicon: faithful / fiel
  rationale: '''Fiel'' expresa directamente la cualidad elogiada. El pretérito ''fue'' corresponde al cierre de la afirmación general; ''era'' también sería posible si se enfatizara el estado continuo.'
theological_decisions:
- issue: Nombre divino en la referencia a 'the Lord'
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Dios
  rationale: El proyecto exige transcribir יהוה como 'Yahvé' y no enmascararlo como 'Señor'. Aunque el inglés POB usa 'the Lord', aquí la referencia es al nombre divino y no a un título ambiguo.
  doctrine_reference: Éxodo 3:15; convención editorial POB sobre el Tetragrámaton
- issue: Afirmación de fidelidad en toda prueba
  english_pob_reading: in every trial he was faithful
  chosen_spanish_reading: en toda prueba fue fiel
  alternative_spanish_readings:
  - en toda tentación fue fiel
  - en toda aflicción fue fiel
  rationale: '''Prueba'' conserva la amplitud semántica del término y evita restringirlo solo a tentación o sufrimiento. Así se mantiene la tensión del audit trail inglés.'
  doctrine_reference: Santiago 1:2-4; 1 Pedro 1:6-7
translation_notes:
  revision_awareness: La revisión más reciente corrigió un error de persona verbal en el ge'ez y restauró la secuencia temporal completa. La versión española sigue esa lectura revisada y evita reutilizar el antiguo borrador no relacionado. También se omitió toda nota al pie no anclada en el texto, para cumplir la validación.
  spanish_consistency_notes:
  - Se mantiene el nombre divino 'Yahvé' conforme al estándar del proyecto.
  - 'Se conserva el paralelismo de las dos afirmaciones sobre Abraham: habló con fidelidad y permaneció fiel en toda prueba.'
  - La formulación es formal y publicable, sin calcos innecesarios del inglés.
