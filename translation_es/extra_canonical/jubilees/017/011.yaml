base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/017/011.yaml
  text: She went a bowshot away, because she said, “Let me not see the death of my child,” and she sat and wept. And an angel of God, one of the holy ones, said to her, “What are you weeping for, Hagar? Rise, take up the child, and hold him with your hand, for God has heard your voice and has seen the child.”
  footnotes:
  - marker: a
    text: Or 'She went a little distance away'.
    reason: previous_rendering
  - marker: b
    text: Or 'and she sat opposite him, weeping.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:17Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez text: Hagar goes away, says she does not want to see the child''s death, sits weeping, and an angel of God tells her to rise, take the child, and assures her that God has heard her voice and seen the child.'
translation:
  language: es
  text: 'Ella se apartó un tiro de arco, porque dijo: «Que no vea la muerte de mi hijo», y se sentó y lloró[a]. Y un ángel de Dios, uno de los santos, le dijo: «¿Por qué lloras, Agar? Levántate, toma al niño y sostenlo con tu mano, porque Dios ha oído tu voz y ha visto al niño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice simplemente que se sentó y lloró; no añade que se sentó «enfrente de él».
    reason: textual_variant
lexical_decisions:
- source_word: አሐቲ፡ ምንዳፍ፡
  english_pob_choice: She went a bowshot away
  chosen_spanish: se apartó un tiro de arco
  alternatives_spanish:
  - se apartó un poco
  - se alejó a una distancia de un tiro de arco
  lexicon: mndaf
  rationale: La medida ge'ez expresa literalmente una distancia de un tiro de arco; por eso se conserva la imagen concreta en español. 'Se apartó' mantiene el sentido de alejarse sin añadir movimiento narrativo extra.
- source_word: ወነቢራ፡ በከየት
  english_pob_choice: and she sat and wept
  chosen_spanish: y se sentó y lloró
  alternatives_spanish:
  - y se sentó llorando
  - y sentada, lloró
  lexicon: nbra
  rationale: El ge'ez indica que se sentó y lloró; la redacción española más natural y fiel es coordinar ambos verbos sin introducir 'opposite him', que no está en el texto fuente.
- source_word: መልአከ፡ አምላክ፡
  english_pob_choice: an angel of God
  chosen_spanish: un ángel de Dios
  alternatives_spanish:
  - un mensajero de Dios
  lexicon: mal'ak
  rationale: La expresión corresponde de modo directo a 'ángel de Dios'. 'Mensajero' sería posible etimológicamente, pero aquí la tradición textual y la audibilidad en español favorecen 'ángel'.
- source_word: አሐዱ፡ እምቅዱሳን፡
  english_pob_choice: one of the holy ones
  chosen_spanish: uno de los santos
  alternatives_spanish:
  - uno de los santos seres
  - uno de los seres santos
  lexicon: qds
  rationale: '''Santos'' reproduce el sustantivo plural y mantiene la ambigüedad entre ''santos'' como seres celestiales y como los consagrados; ''seres santos'' aclara pero añade interpretación no explicitada por el texto.'
- source_word: ንሥእዮ፡ ለኅፃን፡ ወአንዝዮ፡ በእዴኪ፡
  english_pob_choice: Rise, take up the child, and hold him with your hand
  chosen_spanish: Levántate, toma al niño y sostenlo con tu mano
  alternatives_spanish:
  - Levántate, toma al niño y tenlo con tu mano
  - Levántate, toma al niño y apóyalo con tu mano
  lexicon: nsʾ
  rationale: '''Sostenlo con tu mano'' conserva la imagen física de apoyo/agarre. ''Tenlo con tu mano'' sería menos idiomático; ''apóyalo'' suaviza demasiado el mandato.'
- source_word: ሰምዐ፡ እግዚአብሔር፡ ቃለኪ፡
  english_pob_choice: for God has heard your voice
  chosen_spanish: porque Dios ha oído tu voz
  alternatives_spanish:
  - porque Dios escuchó tu voz
  - porque el Señor ha oído tu voz
  lexicon: smʿ
  rationale: '''Ha oído'' sigue el tiempo perfecto del sentido resultativo y coincide con el auditable wording de la POB inglesa. ''Tu voz'' preserva el objeto directo del texto; no se sustituye por ''clamor'' ni ''oración''.'
- source_word: ወርእዮ፡ ለሕፃን።
  english_pob_choice: and has seen the child
  chosen_spanish: y ha visto al niño
  alternatives_spanish:
  - y ha visto el niño
  - y ha mirado al niño
  lexicon: rʾy
  rationale: El objeto directo personal en español exige 'al niño'. Se conserva 'ha visto' para corresponder al paralelo con el oído previo y no introducir 'contemplado' o 'mirado'.
theological_decisions:
- issue: 'Quién habla: ángel de Dios y ''uno de los santos'''
  english_pob_reading: an angel of God, one of the holy ones
  chosen_spanish_reading: un ángel de Dios, uno de los santos
  alternative_spanish_readings:
  - un ángel de Dios, uno de los seres santos
  - un mensajero de Dios, uno de los santos
  rationale: 'La lectura inglesa mantiene ambas expresiones sin resolver la identidad celestial del mensajero. En español se conserva la misma tensión: el mensajero es un ángel de Dios y, a la vez, pertenece al grupo de ''los santos''.'
  doctrine_reference: Jubileos 17:11; compare Genesis 21:17 and angelic language in Second Temple literature
- issue: Relación con la muerte del niño
  english_pob_reading: Let me not see the death of my child
  chosen_spanish_reading: No quiero ver la muerte de mi hijo
  alternative_spanish_readings:
  - Que no vea la muerte de mi hijo
  - No deseo ver morir a mi hijo
  rationale: La formulación expresa el rechazo inmediato de presenciar la muerte, sin convertirla en una petición formal. 'Mi hijo' preserva el vínculo materno explícito del texto.
  doctrine_reference: Jubileos 17:11; Genesis 21:16 as parallel tradition
translation_notes:
  revision_awareness: 'La redacción sigue la corrección reciente que reemplazó un borrador ajeno y ajustó el pasaje al ge''ez: Hagar se aleja una distancia de un tiro de arco, expresa que no quiere ver la muerte de su hijo, se sienta y llora, y el ángel de Dios la llama a levantarse, tomar al niño y confiar en que Dios ha oído su voz y ha visto al niño. También incorpora la revisión crítica que eliminó la intrusión de ''opposite him'' y conserva la medida específica de ''bowshot''.'
  spanish_consistency_notes:
  - Se usa 'Dios' para እግዚአብሔር, conforme al texto fuente y al estándar POB en este proyecto.
  - Se mantiene 'ángel de Dios' sin sustituirlo por 'mensajero' en el texto principal, porque la audibilidad y la tradición textual son más claras en español.
  - '''Santos'' conserva la ambigüedad del original respecto a seres celestiales sin forzar una explicación doctrinal en el cuerpo del texto.'
  - Se evita 'Señor' como sustituto de Yahvé porque este versículo no contiene el nombre divino en la forma que requiera esa convención de máscara.
