  to: Y toda persona que trabaje en él, o vaya de viaje, o cultive su campo, ya sea en su casa o en cualquier lugar, o encienda un fuego, o monte sobre cualquier animal, o viaje en barco por el mar, o golpee o mate cualquier cosa, o degüelle un animal o un ave, o capture una bestia salvaje, un ave o un pez, o ayune, o haga guerra en el día de reposo—
  rationale: 'Se ajusta el español para reflejar con más precisión el sentido del geʿez y del POB inglés: «trabaje en él» mejora la naturalidad; «cultive su campo» evita la restricción indebida de «cave»; y «degüelle un animal o un ave» elimina el matiz cultual no documentado de «sacrifique» y se aproxima mejor a ''slaughters''. No hacen falta notas adicionales.'
