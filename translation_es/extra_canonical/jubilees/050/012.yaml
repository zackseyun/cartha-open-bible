review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la cadena de acciones prohibidas del geʿez y del POB inglés: trabajo, viaje, labor del campo, ubicación, encender fuego, montar animal, viajar por mar, golpear/matar, matar animal o ave, capturar bestia/ave/pez, ayunar y hacer guerra en sábado. Sin embargo, hay dos desajustes de sentido: «cave su campo» estrecha indebidamente ይትቀነይ ወፍረ / ''tills his field'' a una acción específica de cavar, y «sacrifique un animal o un ave» introduce un matiz cultual no sostenido por el POB inglés, que optó por ''slaughters'' y no preservó nota sobre sacrificio ritual.'
  spanish_quality_summary: El texto es mayormente natural y legible en español neutro. Conviene mejorar «haga trabajo en él» a «trabaje en él» para mayor fluidez sin pérdida semántica; «monte sobre cualquier animal» suena aceptable pero «monte cualquier animal» podría malentenderse, así que se puede dejar. «Haga guerra» es comprensible, aunque «haga la guerra» sería más idiomático; no obstante, la forma actual conserva bien el paralelismo semítico. La revisión principal es evitar formulaciones menos naturales o demasiado específicas.
  glossary_alignment: No hay términos del glosario principal particularmente implicados salvo la preferencia contextual por «día de reposo», que aquí es aceptable dado que el inglés POB usa 'sabbath day' pero el borrador ya justificó no imponer una denominación eclesial posterior. No aparecen Yahvé/Mesías/Espíritu u otros términos sensibles del glosario. La corrección de «sacrifique» a «degüelle» o «mate» alinea mejor con la decisión léxica inglesa documentada.
  issues:
  - severity: medium
    issue: «cave su campo» restringe demasiado el sentido de 'tills his field'
    rationale: El geʿez y el POB inglés apuntan a labor de cultivo/labranza en general, no específicamente a cavar. «Cultive su campo» preserva mejor la amplitud agrícola y suena natural.
  - severity: high
    issue: «sacrifique un animal o un ave» añade una dimensión cultual no asegurada
    rationale: El POB inglés eligió 'slaughters', no 'sacrifices'. En español, «sacrificar» sugiere con fuerza acto ritual. Para fidelidad semántica conviene «degüelle» o «mate». «Degüelle» refleja mejor la fuerza de matanza de animales.
  - severity: low
    issue: «haga trabajo en él» es algo torpe en español
    rationale: Aunque fiel, «trabaje en él» comunica el mismo sentido con mejor fluidez. El referente «él» sigue siendo el día de reposo implícito.
  revised_spanish_text: Y toda persona que trabaje en él, o vaya de viaje, o cultive su campo, ya sea en su casa o en cualquier lugar, o encienda un fuego, o monte sobre cualquier animal, o viaje en barco por el mar, o golpee o mate cualquier cosa, o degüelle un animal o un ave, o capture una bestia salvaje, un ave o un pez, o ayune, o haga guerra en el día de reposo—
  revision_rationale: 'Se ajusta el español para reflejar con más precisión el sentido del geʿez y del POB inglés: «trabaje en él» mejora la naturalidad; «cultive su campo» evita la restricción indebida de «cave»; y «degüelle un animal o un ave» elimina el matiz cultual no documentado de «sacrifique» y se aproxima mejor a ''slaughters''. No hacen falta notas adicionales.'
