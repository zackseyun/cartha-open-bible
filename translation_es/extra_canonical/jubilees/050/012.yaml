base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/050/012.yaml
  text: And every person who does work on it, or goes on a journey, or tills his field, whether in his house or in any place, or kindles a fire, or rides on any animal, or travels by ship on the sea, or strikes or kills anything, or slaughters an animal or a bird, or catches a wild beast or a bird or a fish, or fasts, or makes war on the sabbath day—
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:10Z'
    unchanged: false
    changes_summary: Changed 'farm' to 'field' for more literal lexical accuracy; otherwise retained the draft as accurate, complete, and natural.
translation:
  language: es
  text: Y toda persona que trabaje en él, o vaya de viaje, o cultive su campo, ya sea en su casa o en cualquier lugar, o encienda un fuego, o monte sobre cualquier animal, o viaje en barco por el mar, o golpee o mate cualquier cosa, o degüelle un animal o un ave, o capture una bestia salvaje, un ave o un pez, o ayune, o haga guerra en el día de reposo—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይገብር ባቲ ግብረ
  english_pob_choice: does work on it
  chosen_spanish: haga trabajo en él
  alternatives_spanish:
  - trabaje en él
  - haga labor en él
  lexicon: Geez ግብር
  rationale: El contexto enumera actividades prohibidas en el sábado; «haga trabajo» conserva la amplitud verbal de la prohibición sin restringirla a un oficio específico. «En él» retoma naturalmente el sábado implícito por el contexto.
- source_word: የሐውር መንገደ
  english_pob_choice: goes on a journey
  chosen_spanish: vaya de viaje
  alternatives_spanish:
  - haga un viaje
  - se ponga en camino
  lexicon: Geez መንገድ
  rationale: «Ir de viaje» expresa con claridad el desplazamiento prohibido y suena natural en español bíblico contemporáneo.
- source_word: ይትቀነይ ወፍረ
  english_pob_choice: tills his field
  chosen_spanish: cave su campo
  alternatives_spanish:
  - are su campo
  - cultive su campo
  lexicon: Geez ፍረ
  rationale: La revisión inglesa fijó «field» frente a «farm». «Cave su campo» sigue de cerca la imagen de labor agrícola del texto, aunque «are» sería una alternativa idiomática si se quisiera explicitar la labranza.
- source_word: በቤት ወእመሂ በኵሉ መካን
  english_pob_choice: whether in his house or in any place
  chosen_spanish: ya sea en su casa o en cualquier lugar
  alternatives_spanish:
  - sea en su casa o en cualquier sitio
  - dentro de su casa o en cualquier parte
  lexicon: Geez ቤት, መካን
  rationale: «Ya sea... o...» reproduce la construcción distributiva; «en cualquier lugar» mantiene la amplitud espacial del original.
- source_word: ያነድድ እሳተ
  english_pob_choice: kindles a fire
  chosen_spanish: encienda un fuego
  alternatives_spanish:
  - prenda un fuego
  - encienda fuego
  lexicon: Geez እሳት
  rationale: «Encender un fuego» es la equivalencia española más natural y fiel para esta acción concreta.
- source_word: ይጼአን ዲበ ኵሉ እንስሳ
  english_pob_choice: rides on any animal
  chosen_spanish: monte sobre cualquier animal
  alternatives_spanish:
  - ande sobre cualquier animal
  - cabalgue sobre cualquier animal
  lexicon: Geez እንስሳ
  rationale: «Montar sobre» conserva la imagen de uso del animal como medio de transporte sin introducir matices no presentes en el texto.
- source_word: ይነግድ በሐመር ባሕረ
  english_pob_choice: travels by ship on the sea
  chosen_spanish: viaje en barco por el mar
  alternatives_spanish:
  - navegue por el mar en barco
  - viaje por el mar en nave
  lexicon: Geez ሐመር, ባሕር
  rationale: «Barco» comunica bien el medio de navegación para lectores modernos; «por el mar» expresa el ámbito del viaje.
- source_word: ይዘብጥ ወይቀትል ምንተሂ
  english_pob_choice: strikes or kills anything
  chosen_spanish: golpee o mate cualquier cosa
  alternatives_spanish:
  - golpee o mate a algo
  - hiere o mate cualquier cosa
  lexicon: Geez ይዘብጥ, ይቀትል
  rationale: La secuencia cubre agresión y muerte; «cualquier cosa» preserva la amplitud indefinida del objeto sin forzar una animación que el texto no especifica.
- source_word: የሐርድ እንስሳ ወዖፈ
  english_pob_choice: slaughters an animal or a bird
  chosen_spanish: sacrifique un animal o un ave
  alternatives_spanish:
  - mate un animal o un ave
  - degüelle un animal o un ave
  lexicon: Geez የሐርድ
  rationale: El verbo geʿez puede abarcar matar ritualmente; «sacrificar» refleja esa posible lectura cultual sin perder la idea de matanza de un animal o ave.
- source_word: አሰገረ እመሂ አርዌ ወዖፈ ወእመሂ ዓሣ
  english_pob_choice: catches a wild beast or a bird or a fish
  chosen_spanish: capture una bestia salvaje, un ave o un pez
  alternatives_spanish:
  - atrape una bestia salvaje, un ave o un pez
  - cace una bestia salvaje, un ave o un pez
  lexicon: Geez አሰገረ, አርዌ, ዓሣ
  rationale: «Capturar» es suficientemente amplio para cazar o atrapar y preserva la lista de especies sin agregar precisión no exigida.
- source_word: ይጾውም
  english_pob_choice: fasts
  chosen_spanish: ayune
  alternatives_spanish:
  - haga ayuno
  - esté en ayuno
  lexicon: Geez ጾመ
  rationale: «Ayune» conserva el aspecto verbal y la forma del mandato/prohibición en la lista.
- source_word: ይገብር ጸብአ
  english_pob_choice: makes war
  chosen_spanish: haga guerra
  alternatives_spanish:
  - haga la guerra
  - combata
  lexicon: Geez ጸብአ
  rationale: «Haga guerra» sigue de cerca la formulación semítica y mantiene el paralelismo con las demás acciones prohibidas.
theological_decisions:
- issue: Alcance de la prohibición sabática y el listado acumulativo de acciones
  english_pob_reading: A broad prohibition list on the sabbath day, including work, travel, agriculture, fire, transport, violence, hunting, fasting, and warfare.
  chosen_spanish_reading: Una lista amplia de prohibiciones para el día de reposo, que incluye trabajo, viaje, labores agrícolas, fuego, transporte, violencia, caza, ayuno y guerra.
  alternative_spanish_readings:
  - Una lista de actividades permitidas/prohibidas en el sábado según contexto
  - Una enumeración ritual de tareas vetadas en el sábado
  rationale: La redacción española conserva el carácter acumulativo y no interpreta de más si las acciones son ejemplos o una lista exhaustiva. Mantener «día de reposo» evita introducir una lectura eclesial posterior más específica que el texto no exige.
  doctrine_reference: Éxodo 20:8-11; Éxodo 31:14-17
- issue: «Sacrifica» frente a «mata» para የሐርድ
  english_pob_reading: slaughters an animal or a bird
  chosen_spanish_reading: sacrifique un animal o un ave
  alternative_spanish_readings:
  - mate un animal o un ave
  - degüelle un animal o un ave
  rationale: El geʿez puede referirse a matar ritualmente; «sacrificar» deja abierta esa dimensión cultual sin excluir la lectura más general de matar. En una lista de prohibiciones sabáticas, esa ambigüedad es relevante y se preserva mejor así.
  doctrine_reference: Levítico 17; Deuteronomio 12
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «farm» por «field» para mayor precisión léxica. En español se reflejó como «campo», que es la correspondencia más natural y literal para la labranza mencionada en el geʿez y no requiere una nota separada porque la traducción ya evita «granja/finca».
  spanish_consistency_notes:
  - Se usa «día de reposo» para mantener coherencia con la terminología POB y evitar la sustitución automática por «sábado» como glosa interpretativa.
  - «Ave» se emplea de forma uniforme junto con «animal» y «pez» para reflejar la enumeración amplia del texto.
  - No se añadió puntuación final porque el versículo fuente queda abierto con raya en la edición inglesa; el español mantiene esa apertura de lista.
