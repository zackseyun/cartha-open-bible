translation:
  language: es
  text: Y he aquí, he escrito para ti el mandamiento concerniente a los sábados, y todos los juicios de sus leyes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ትእዛዘ (command/mandate)
  english_pob_choice: the command
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - la orden
  lexicon: mandato/mandamiento
  rationale: El ge'ez expresa una orden normativa concreta. «Mandamiento» conserva el valor prescriptivo y suena natural en registro bíblico en español, sin volverlo más eclesiástico de lo que exige el texto.
- source_word: ሰንበታት (Sabbaths)
  english_pob_choice: the Sabbaths
  chosen_spanish: los Sábados
  alternatives_spanish:
  - los días de reposo
  - los sábados
  lexicon: Sabbath/Sabbats
  rationale: Se mantiene el plural del original y del POB inglés revisado. «Sábados» conserva el término referencial sin sustituirlo por una paráfrasis que debilite la forma nominal del hebraísmo.
- source_word: ፍትሓተ (judgments/ordinances)
  english_pob_choice: the judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - las ordenanzas
  - las sentencias
  lexicon: judgment/ordinance
  rationale: «Juicios» reproduce bien el campo de decisiones normativas o judiciales. Evita imponer «ordenanzas» si el texto no lo exige, aunque sigue siendo una alternativa posible.
- source_word: ሕገጊሁ (his laws)
  english_pob_choice: its laws
  chosen_spanish: sus leyes
  alternatives_spanish:
  - su ley
  - sus preceptos
  lexicon: law/laws
  rationale: El audit trail señala una revisión oscilante, pero la última corrección textual y el gramatical del ge'ez favorecen el plural. En español, «sus leyes» refleja de manera directa el plural y mantiene la relación posesiva.
theological_decisions:
- issue: Pluralidad de 'Sabbaths'
  english_pob_reading: the Sabbaths
  chosen_spanish_reading: los Sábados
  alternative_spanish_readings:
  - el sábado
  - los días de reposo
  rationale: La mayúscula y el plural del POB inglés sugieren un uso referencial especializado, no solo el día semanal común. «Los Sábados» preserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Observancia del sábado en la literatura de Jubileos; no doctrinaliza más allá del texto.
- issue: Relación entre 'judgments' y 'laws'
  english_pob_reading: all the judgments of its law(s)
  chosen_spanish_reading: todos los juicios de sus leyes
  alternative_spanish_readings:
  - todos los juicios de su ley
  - todos los decretos de sus leyes
  rationale: El ge'ez distingue entre un conjunto de 'juicios' y 'leyes' poseídas por el antecedente. El español conserva ambos sustantivos y el plural de 'leyes' para no borrar la distinción semántica.
  doctrine_reference: Lenguaje legal-covenantal en Jubileos.
translation_notes:
  revision_awareness: La revisión inglesa más reciente vaciló entre singular y plural en 'law(s)'. Aquí se sigue la lectura compatible con el ge'ez proporcionado y con el registro del POB, manteniendo el plural 'leyes' en español. No se agregan notas al pie porque no hay un anclaje textual necesario ni una variante que deba marcarse en la línea principal.
  spanish_consistency_notes:
  - Se usa 'Y he aquí' para reflejar el valor enfático de ወናሁ.
  - Se conserva el plural 'Sábados' para alinearse con la revisión inglesa más reciente y con el uso referencial del término.
  - Se evita 'SEÑOR' o terminología de sustitución, ya que no aparece el nombre divino en este versículo.
  - La sintaxis mantiene una cadencia bíblica clara, pero en español natural y publicable.
