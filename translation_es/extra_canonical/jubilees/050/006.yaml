    rationale: En un contexto de mandato o prescripción, «concerniente a» o «sobre» suenan más precisos que «acerca de», que puede sentirse más expositivo que jurídico.
  - severity: low
    issue: Mayúscula en «Sábados» no necesaria en español
    rationale: La capitalización inglesa de «Sabbaths» no se traslada automáticamente al español. «sábados» es más natural y conforme a la ortografía general, sin pérdida de sentido referencial.
