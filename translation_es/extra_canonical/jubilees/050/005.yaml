    issue: '''fornicación'' suena demasiado estrecho y menos natural que una opción moderna amplia'
    rationale: El inglés POB usa 'fornication', pero en español bíblico amplio y neutral latinoamericano 'inmoralidad sexual' comunica mejor la categoría moral-sexual sin sonar rígido ni reducirse a un matiz técnico.
  - severity: medium
    issue: '''ningún malvado'' no reproduce tan bien ''any evil one'''
    rationale: En un contexto donde ya aparece 'satán', el paralelo pide una referencia personal más marcada. 'Ningún maligno' es más idiomático y mantiene mejor el contraste entre el adversario y cualquier ser maligno.
