  language: en
  yaml_path: translation/extra_canonical/jubilees/050/005.yaml
  text: And the jubilees will pass until Israel is cleansed from all guilt of fornication and uncleanness and pollution and sin and error, and dwells in confidence in all the land; and there will no longer be for them any satan or any evil one, and the land will be clean from that time forever.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:08Z'
    unchanged: false
    changes_summary: Removed the unnecessary 'by' after 'pass,' reordered 'in all the land' to 'dwells in confidence in all the land' for more natural English while preserving the source sense, and smoothed 'from that time and forever' to 'from that time forever.'
translation:
  language: es
  text: Y pasarán los jubileos hasta que Israel sea purificado[a] de toda culpa de inmoralidad sexual, de inmundicia, de contaminación, de pecado y de error, y habite con confianza en toda la tierra; y ya no habrá para ellos ningún satán ni ningún maligno, y la tierra estará limpia desde entonces para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Purificado» conserva el valor moral y ritual del verbo original; también puede traducirse «limpiado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ይነጽሕ
  english_pob_choice: is cleansed
  chosen_spanish: sea purificado
  alternatives_spanish:
  - sea limpiado
  - sea limpiado y purificado
  lexicon: purificar / limpiar
  rationale: El verbo ge'ez expresa quedar limpio o purificado de una condición moral/ritual; en español, 'purificado' conserva mejor la fuerza cultual y moral que 'limpiado', aunque se mantiene la idea de limpieza implícita en el contexto.
- source_word: ኵሉ፡ አበሳ፡ ዝሙት፡ ወርኵስ፡ ወግማኔ፡ ወኃጢአት፡ ወጌጋይ
  english_pob_choice: all guilt of fornication and uncleanness and pollution and sin and error
  chosen_spanish: toda culpa de fornicación, de inmundicia, de contaminación, de pecado y de error
  alternatives_spanish:
  - todo pecado sexual y toda impureza y contaminación y pecado y error
  - toda ofensa de fornicación, inmundicia, contaminación, pecado y error
  lexicon: culpa / fornicación / inmundicia / contaminación / pecado / error
  rationale: Se conserva la acumulación del original sin suavizarla. 'Culpa' refleja አበሳ como culpa/ofensa, y 'fornicación' mantiene el valor moral-sexual específico. 'Inmundicia' y 'contaminación' distinguen dos términos próximos que el inglés también separa.
- source_word: ይትአመን
  english_pob_choice: dwells in confidence
  chosen_spanish: habite con confianza
  alternatives_spanish:
  - more con confianza
  - viva con confianza
  lexicon: habitar / confianza
  rationale: El ge'ez sugiere morar o residir en una condición de seguridad/confianza. 'Habite con confianza' preserva la idea de permanencia y el matiz relacional de seguridad mejor que una mera locución adverbial.
- source_word: ምድር
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la tierra
  - todo el país
  lexicon: tierra
  rationale: Aunque el inglés usa 'land', en el contexto de Jubileos la referencia puede abarcar la tierra prometida y, por extensión, la tierra habitada. 'Tierra' es suficientemente amplio y fiel; 'país' sería más restrictivo.
- source_word: ሰይጣነ
  english_pob_choice: any satan
  chosen_spanish: ningún satán
  alternatives_spanish:
  - ningún Satanás
  - ningún adversario
  lexicon: satán
  rationale: Se conserva el préstamo 'satán' porque el texto lo usa como nombre/título de un ente malvado, no como simple traducción explicativa. 'Satanás' introduciría una forma más tradicional pero menos pegada a la forma semítica del término.
- source_word: እኩየ
  english_pob_choice: any evil one
  chosen_spanish: ningún malvado
  alternatives_spanish:
  - ningún maligno
  - ningún hombre malo
  lexicon: malvado
  rationale: 'El término puede funcionar como sustantivo adjetival: ''el malo'' / ''malvado''. ''Malvado'' mantiene la referencia personal genérica sin forzar una personificación más fuerte de la que el texto exige.'
- source_word: ኵሉ፡ መዋዕል
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por todos los días
  - eternamente
  lexicon: para siempre
  rationale: La expresión fija comunica duración indefinida y continua; 'para siempre' es la equivalencia natural y fiel en español.
theological_decisions:
- issue: Purificación de Israel antes de la paz final
  english_pob_reading: until Israel is cleansed from all guilt... and dwells in confidence
  chosen_spanish_reading: hasta que Israel sea purificado de toda culpa... y habite con confianza
  alternative_spanish_readings:
  - hasta que Israel sea limpiado de toda culpa... y viva seguro
  - hasta que Israel quede purificado... y more con confianza
  rationale: 'Se conserva la secuencia causal-escatológica: primero purificación moral, luego una condición estable de confianza en la tierra. No se introduce un lenguaje sacramental ajeno al texto; la purificación sigue siendo moral y colectiva.'
  doctrine_reference: escatología de restauración; santidad colectiva
- issue: Desaparición de satán y del mal
  english_pob_reading: there will no longer be for them any satan or any evil one
  chosen_spanish_reading: ya no habrá para ellos ningún satán ni ningún malvado
  alternative_spanish_readings:
  - ya no habrá para ellos ningún Satanás ni ningún maligno
  - ya no tendrán satán ni malvado alguno
  rationale: 'Se preserva la duplicidad del original: una figura adversa singular (''satán'') y una designación moral genérica (''malvado''). No se fusionan los dos términos para no borrar la tensión textual.'
  doctrine_reference: angelología/demonología; eliminación del mal al final de los tiempos
- issue: Duración final de la limpieza de la tierra
  english_pob_reading: the land will be clean from that time forever
  chosen_spanish_reading: la tierra estará limpia desde entonces para siempre
  alternative_spanish_readings:
  - la tierra quedará limpia desde entonces y para siempre
  - la tierra estará limpia desde aquel tiempo eternamente
  rationale: '''Desde entonces para siempre'' reproduce la secuencia temporal sin añadir solemnidad innecesaria. Se mantiene el resultado permanente y absoluto de la purificación de la tierra.'
  doctrine_reference: nueva creación / restauración final
translation_notes:
  revision_awareness: La redacción sigue la versión revisada del inglés POB que elimina el 'by' innecesario, ajusta el orden de 'in all the land' y suaviza 'from that time and forever' a 'from that time forever'. En español se reflejó ese flujo natural con 'habite con confianza en toda la tierra' y 'desde entonces para siempre'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponda a este proyecto; en este versículo no aparece el nombre divino.
  - '''Satán'' se dejó sin mayúscula interna para preservar el uso semítico/titular del original; si la serie editorial prefiere mayúscula en nombres propios, puede revisarse de forma consistente en todo el corpus.'
  - Se conservaron seis elementos de la lista de impurezas/culpa para no aplanar el paralelismo del original.
  - '''Toda la tierra'' traduce ''all the land'' sin decidir aquí entre territorio específico y alcance universal; el contexto de Jubileos permite cierta amplitud semántica.'
