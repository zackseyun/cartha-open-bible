  text: Six days you shall do work, but the seventh day is a sabbath of the LORD your God. You shall do no work on it—you and your children and your male servants and your female servants and all your animals and also the resident foreigner who is with you.
  footnotes:
  - marker: a
    text: Or 'your sons'.
    reason: previous_rendering
