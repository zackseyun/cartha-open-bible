translation:
  language: es
  text: Seis días trabajarás, pero el séptimo día es un sábado[a] de Yahvé tu Dios. No harás en él ninguna obra, ni tú ni tus hijos e hijas ni tus esclavos varones ni tus esclavas ni todos tus animales, ni tampoco el extranjero residente que está contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘sábado’ aquí traduce la institución del sabbat, es decir, el día de reposo consagrado, no meramente el nombre del día semanal.
    reason: lexical_clarity
lexical_decisions:
- source_word: ስዱሰ፡ ዕለተ፡ ትገብር፡ ግብረ፡
  english_pob_choice: Six days you shall do work
  chosen_spanish: Seis días trabajarás
  alternatives_spanish:
  - Seis días harás trabajo
  - Seis días harás obra
  lexicon: did work / do work
  rationale: El ge’ez expresa una actividad ordinaria de trabajo durante seis días. En español, 'trabajarás' comunica con naturalidad esa obligación sin añadir ni restar contenido.
- source_word: ወአመ፡ ሳብዕት፡ ዕለት፡
  english_pob_choice: the seventh day
  chosen_spanish: el séptimo día
  alternatives_spanish:
  - el día séptimo
  lexicon: seventh day
  rationale: La forma más natural en español bíblico contemporáneo es 'el séptimo día', conservando el orden y el sentido temporal del original.
- source_word: ሰንበት፡
  english_pob_choice: a sabbath
  chosen_spanish: un sábado[a]
  alternatives_spanish:
  - un día de reposo
  - un sabbat
  lexicon: sabbath
  rationale: Se conserva el término tradicional 'sábado' para el día de reposo, pero se marca con nota porque el término fuente es la institución del sabbat y no simplemente el día de la semana en sentido moderno.
- source_word: ዘ*እግዚአብሔር፡ አምላክክሙ፡
  english_pob_choice: of the LORD your God
  chosen_spanish: de Yahvé tu Dios
  alternatives_spanish:
  - de Yahvé, tu Dios
  - de el Señor tu Dios
  lexicon: YHWH / your God
  rationale: Siguiendo la norma del proyecto, se traduce el nombre divino como 'Yahvé'. 'Tu Dios' refleja el posesivo singular del texto fuente dirigido al oyente.
- source_word: ኢትግበሩ፡ ባቲ፡ ኵሎ፡ ግብረ፡
  english_pob_choice: You shall do no work on it
  chosen_spanish: No harás en él ninguna obra
  alternatives_spanish:
  - No trabajarás en él
  - No harás en él trabajo alguno
  lexicon: do no work
  rationale: '''Obra'' reproduce bien el sustantivo de acción y mantiene el registro solemne. ''Ninguna'' expresa la prohibición total del original.'
- source_word: አንትሙ፡ ወውሉድክሙ፡ ወአግብርቲክሙ፡ ወአእማቲክሙ፡ ወኵሉ፡ እንስሳክሙ፡ ወነኪርኒ፡ ዘኀቤክሙ።
  english_pob_choice: you and your children and your male servants and your female servants and all your animals and also the resident foreigner who is with you
  chosen_spanish: ni tú ni tus hijos ni tus esclavos varones ni tus esclavas ni todos tus animales, ni tampoco el extranjero residente que está contigo
  alternatives_spanish:
  - ni tú ni tus hijos ni tus siervos ni tus siervas ni todos tus animales, ni tampoco el forastero que habita contigo
  - ni tú ni tus hijos ni tus servidores varones ni tus servidoras ni todos tus animales, ni tampoco el forastero residente que está contigo
  lexicon: household list / servants / resident foreigner
  rationale: Se conserva la cadena inclusiva de sujetos afectados por la prohibición. 'Esclavos' refleja la fuerza léxica que el proyecto suele preservar para el término de servidumbre; 'extranjero residente' traduce con precisión 'ነኪርኒ ዘኀቤክሙ' sin perder la idea de permanencia junto al grupo.
theological_decisions:
- issue: Nombre divino en el precepto sabático
  english_pob_reading: of the LORD your God
  chosen_spanish_reading: de Yahvé tu Dios
  alternative_spanish_readings:
  - del Señor tu Dios
  rationale: El proyecto exige recuperar el nombre divino cuando el original lo sustenta. Aquí el ge’ez corresponde al tetragrámaton en la tradición subyacente, por lo que se evita la sustitución reverencial impersonal.
  doctrine_reference: Divine Name / Tetragrammaton
- issue: Alcance del descanso sabático para toda la casa
  english_pob_reading: you and your children and your male servants and your female servants and all your animals and also the resident foreigner who is with you
  chosen_spanish_reading: ni tú ni tus hijos ni tus esclavos varones ni tus esclavas ni todos tus animales, ni tampoco el extranjero residente que está contigo
  alternative_spanish_readings:
  - ni tú ni tus hijos ni tus siervos ni tus siervas ni todos tus animales, ni tampoco el forastero que habita contigo
  rationale: 'Se mantiene explícita la amplitud del mandamiento: no sólo el oyente principal, sino también dependientes, animales y el residente extranjero quedan incluidos en la prohibición del trabajo.'
  doctrine_reference: Sabbath command / household inclusion
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'your sons' por 'your children' a partir del ge’ez ውሉድ. La versión española sigue esa decisión con 'tus hijos' en un sentido inclusivo y natural, sin restringirlo a varones; por eso no se añadió una glosa separada. No se detectaron otras revisiones sustantivas en el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se usa 'esclavos' en lugar de 'siervos' para conservar la fuerza léxica del término de servidumbre.
  - '''Extranjero residente'' se elige por precisión y para evitar la ambigüedad de ''forastero'' sin residencia.'
  - La oración conserva la estructura enumerativa del original para reflejar el alcance universal de la prohibición.
