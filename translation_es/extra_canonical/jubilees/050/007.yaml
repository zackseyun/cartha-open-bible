- from: Seis días trabajarás, pero el séptimo día será un sábado[a] de Yahvé tu Dios. No harás en él ninguna obra, ni tú ni tus hijos ni tus esclavos varones ni tus esclavas ni todos tus animales, ni tampoco el extranjero residente que está contigo.
  to: Seis días trabajarás, pero el séptimo día es un sábado[a] de Yahvé tu Dios. No harás en él ninguna obra, ni tú ni tus hijos e hijas ni tus esclavos varones ni tus esclavas ni todos tus animales, ni tampoco el extranjero residente que está contigo.
