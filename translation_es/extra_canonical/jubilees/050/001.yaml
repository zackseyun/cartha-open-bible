translation:
  language: es
  text: Y después de esta ley les hice conocer los días de los sábados en el desierto de Sinaí, el cual está entre Elim y Sinaí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእምድኅረዝ / after this
  english_pob_choice: And after this
  chosen_spanish: Y después de esta ley
  alternatives_spanish:
  - Y después de esto
  - Y tras esto
  lexicon: after this / thereafter
  rationale: La revisión inglesa más reciente entiende ሕገ como referencia resumida a la ley recién concluida, no solo como un adverbio temporal. Por eso mantengo la relación con 'esta ley' en español.
- source_word: ሕገ / law
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - mandato
  lexicon: law
  rationale: '''Ley'' es la forma más directa y natural en español para el sustantivo jurídico-religioso del pasaje y conserva la continuidad con el audit trail inglés.'
- source_word: መዋዕለ፡ ሰንበታት / days of the sabbaths
  english_pob_choice: the days of the sabbaths
  chosen_spanish: los días de los sábados
  alternatives_spanish:
  - los días de reposo
  - los días sabáticos
  lexicon: sabbath
  rationale: Se evita sustituir el término por una paráfrasis más interpretativa. 'Sábados' conserva la relación literal con el plural del original y sigue de cerca la decisión inglesa.
- source_word: በገዳመ፡ ሲና / in the wilderness of Sinai
  english_pob_choice: in the wilderness of Sinai
  chosen_spanish: en el desierto de Sinaí
  alternatives_spanish:
  - en la soledad de Sinaí
  - en la estepa de Sinaí
  lexicon: wilderness
  rationale: '''Desierto'' comunica bien la idea de גדהם/גאדם como zona deshabitada y coincide con la revisión inglesa que corrigió ''on Mount Sinai'' a ''in the wilderness of Sinai''.'
- source_word: እንተ፡ ይእቲ፡ ምእከለ፡ ኤሎም፡ ወሲና / which is between Elim and Sinai
  english_pob_choice: which is between Elim and Sinai
  chosen_spanish: que está entre Elim y Sinaí
  alternatives_spanish:
  - que queda entre Elim y Sinaí
  - que se halla entre Elim y Sinaí
  lexicon: between
  rationale: '''Que está entre'' es una equivalencia natural y fiel al valor locativo-relativo del original, sin añadir interpretación.'
theological_decisions:
- issue: Referencia al sábado en plural ('days of the sabbaths')
  english_pob_reading: the days of the sabbaths
  chosen_spanish_reading: los días de los sábados
  alternative_spanish_readings:
  - los días sabáticos
  - los días de reposo
  rationale: El texto no identifica simplemente el sábado como institución general; habla de una serie de días/fechas sabáticas. Conservar la pluralidad ayuda a no nivelar la tensión terminológica del original.
  doctrine_reference: Torá / calendario sabático
- issue: 'Localización geográfica: ''wilderness of Sinai'''
  english_pob_reading: in the wilderness of Sinai
  chosen_spanish_reading: en el desierto de Sinaí
  alternative_spanish_readings:
  - en el desierto del Sinaí
  - en la región de Sinaí
  rationale: La revisión inglesa descartó 'Mount Sinai' a favor de una localización en el desierto. El español debe reflejar esa corrección sin convertirla en una glosa interpretativa.
  doctrine_reference: Geografía bíblica / contexto narrativo
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'on Mount Sinai' por 'in the wilderness of Sinai' y consolidó 'after this law' como marco para el resto del versículo. La versión española sigue esa lectura revisada, sin introducir la nota alternativa de la versión anterior porque el encargo exige que todo marcador de nota aparezca anclado en el texto.
  spanish_consistency_notes:
  - Mantengo 'Sinaí' con tilde en ambos casos por consistencia ortográfica en español.
  - Uso 'ley' para ሕገ y no 'instrucción' para conservar el tono jurídico-religioso del pasaje.
  - No empleo 'SEÑOR' ni terminología litúrgica adicional, porque el versículo no contiene el nombre divino ni un contexto cristológico directo.
