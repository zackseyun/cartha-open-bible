base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/050/004.yaml
  text: 'Therefore I have ordained for you weeks of years and years and jubilees: forty-nine jubilees from the days of Adam until this day, and one week and two years and forty years still remain for learning the commandments of the LORD, until they cross over into the land of Canaan crossing the Jordan to the west.'
  footnotes:
  - marker: a
    text: Or 'by the Jordan on the west.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:08Z'
    unchanged: false
    changes_summary: Removed unnecessary articles for a more literal list; adjusted 'still forty years remain' to 'forty years still remain' for natural English; revised the final clause from 'crossing the Jordan to its west' to 'by the Jordan on the west' to reflect the Ge'ez wording more naturally and accurately.
translation:
  language: es
  text: 'Por tanto, he ordenado para ti semanas de años y años y jubileos: cuarenta y nueve jubileos desde los días de Adán hasta este día, y todavía quedan una semana y dos años y cuarenta años para aprender los mandamientos de Yahvé, hasta que crucen hacia la tierra de Canaán, cruzando el Jordán hacia el occidente[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cruzando el Jordán al occidente».
    reason: alternative_rendering
lexical_decisions:
- source_word: weeks of years
  english_pob_choice: weeks of years
  chosen_spanish: semanas de años
  alternatives_spanish:
  - semanas de años
  - semanas de años completos
  lexicon: weeks + years idiom
  rationale: Conservo la expresión técnica sin suavizarla, porque el texto enumera unidades calendáricas especiales; en español suena natural y mantiene la fuerza literal del original.
- source_word: jubilees
  english_pob_choice: jubilees
  chosen_spanish: jubileos
  alternatives_spanish:
  - jubileos
  - jubileos calendáricos
  lexicon: jubilee
  rationale: El término técnico del libro se mantiene como 'jubileos', el equivalente más directo y reconocido en español bíblico para esta unidad cronológica.
- source_word: YHWH / LORD
  english_pob_choice: LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: יהוה
  rationale: Aunque la cita inglesa usa 'LORD', el proyecto exige restaurar el nombre divino; 'Yahvé' conserva el valor del nombre propio sin la convención de mayúsculas sustitutivas.
- source_word: until they cross over
  english_pob_choice: until they cross over
  chosen_spanish: hasta que crucen
  alternatives_spanish:
  - hasta que crucen
  - hasta que pasen
  lexicon: עבר
  rationale: El gerundio/acción de atravesar se expresa de forma natural con 'crucen', que conserva el movimiento de paso al otro lado sin perder el matiz de tránsito del original.
- source_word: by the Jordan on the west / crossing the Jordan to the west
  english_pob_choice: crossing the Jordan to the west
  chosen_spanish: cruzando al occidente
  alternatives_spanish:
  - cruzando al occidente
  - cruzando el Jordán hacia el occidente
  lexicon: גֵּרְדָּה / directional phrase
  rationale: La frase ge'ez indica la travesía con orientación occidental; 'cruzando al occidente' preserva el valor direccional y el carácter verbal del participio/gerundio, sin perder que el cruce ocurre por el Jordán.
theological_decisions:
- issue: Restauración del nombre divino frente a 'LORD'
  english_pob_reading: The English text uses 'LORD' as a standard rendering of the divine name.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: En este proyecto el nombre divino no se enmascara; la elección de 'Yahvé' refleja la política terminológica establecida y evita borrar la distinción del texto fuente.
  doctrine_reference: Tetragrámaton / divina nomenclatura
- issue: Sentido de aprendizaje de los mandamientos
  english_pob_reading: for learning the commandments of the LORD
  chosen_spanish_reading: para aprender los mandamientos de Yahvé
  alternative_spanish_readings:
  - para conocer los mandamientos de Yahvé
  - para aprender a obedecer los mandamientos de Yahvé
  rationale: El texto se centra en el proceso de aprender/recibir instrucción en los mandamientos; 'aprender' es lo suficientemente amplio y fiel sin introducir una paráfrasis ética no explícita.
  doctrine_reference: Instrucción de la ley / obediencia covenantal
- issue: Cruzar el Jordán hacia occidente
  english_pob_reading: until they cross over into the land of Canaan crossing the Jordan to the west
  chosen_spanish_reading: hasta que crucen el Jordán, cruzando al occidente, hacia la tierra de Canaán
  alternative_spanish_readings:
  - hasta que crucen el Jordán hacia el occidente, hacia la tierra de Canaán
  - hasta que pasen el Jordán al occidente, hacia la tierra de Canaán
  rationale: 'Conservo el doble movimiento: entrada a Canaán y especificación direccional por el oeste. La formulación no borra la acción de cruzar, que fue reafirmada en la revisión del inglés auditado.'
  doctrine_reference: Geografía narrativa / entrada a la tierra prometida
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para conservar la fuerza verbal de 'crossing the Jordan' y la orientación 'on the west'. Mi español sigue esa revisión y evita la reducción a una simple ubicación lateral. También evita el artículo donde el inglés final los retiró en la lista técnica.
  spanish_consistency_notes:
  - Mantengo 'Yahvé' conforme al estándar del proyecto y no como 'SEÑOR'.
  - Conservo la serie técnica 'semanas de años, años y jubileos' sin normalizarla a un calendario moderno.
  - '''Occidente'' se usa como orientación geográfica bíblica; en el pie aclaro la lectura alternativa para no perder el matiz direccional.'
  - '''Crucen'' y ''cruzando'' preservan la dinámica de tránsito del original, evitando una mera localización estática.'
