revisions:
- from: 'No harán ninguna obra en el día de reposo, excepto lo que hayan preparado para ustedes en el sexto día, para comer, para beber y para descansar, y para guardar el día de reposo de toda obra en este día, y para bendecir a Yahvé su Dios, que les ha dado un día de fiesta, un día santo y un día santo del reino[a] para todo Israel: este día por todos sus días, por todos los días[b].'
  to: 'No hagan ninguna obra en el día de reposo, excepto lo que hayan preparado para ustedes en el sexto día, para comer, para beber, para descansar y para guardar el día de reposo apartándose de toda obra en este día, y para bendecir a Yahvé su Dios, que les ha dado un día de fiesta, un día santo y un día santo del reino[a] para todo Israel: este día durante todos sus días, durante todos los días.'
  rationale: Se hicieron reparaciones menores para mejorar fidelidad expresiva y naturalidad en español sin apartarse del ge'ez ni de la auditoría inglesa. Se cambió 'No harán' por 'No hagan' para una exhortación más idiomática; se reformuló 'guardar el día de reposo de toda obra' a 'guardar el día de reposo apartándose de toda obra' para expresar con claridad la exclusión de toda labor; se suavizó la duración final con 'durante' manteniendo la repetición enfática de 'días'; y se eliminó la nota sobre 'generaciones' porque contradice la revisión auditada del texto fuente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:12:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura principal del ge''ez y sigue la revisión inglesa en puntos clave: la prohibición total de trabajo, la excepción de lo preparado en el sexto día, la secuencia ''comer, beber, descansar'', el uso de ''Yahvé'', la triple caracterización del día, y la corrección de ''días'' frente a ''generaciones'' en la cláusula final. Sin embargo, hay dos problemas de fidelidad/claridad: ''guardar el día de reposo de toda obra'' suena poco idiomático y no expresa claramente ''guardar sábado/apartarse de toda obra''; además, la nota [b] reintroduce ''generaciones'', lectura ya descartada por la revisión auditada del ge''ez.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero presenta giros poco naturales en español bíblico actual: ''No harán'' puede mejorarse a ''No hagan'' para una exhortación directa, y especialmente ''guardar el día de reposo de toda obra'' resulta torpe. También ''por todos sus días, por todos los días'' es muy literal; aunque puede mantenerse por fidelidad, conviene suavizarlo a ''durante todos sus días, durante todos los días'' sin perder la repetición enfática. La puntuación y el registro general son adecuados.'
  glossary_alignment: 'Alineación global buena con la terminología del proyecto: ''Yahvé'' está correctamente usado; ''día de reposo'' es aceptable como equivalente contextual de Sabbath, aunque ''sábado'' o ''Sabbath'' también serían posibles. No hay conflictos con otros términos teológicos del glosario. La principal desviación documentaria está en la nota [b], que contradice la decisión auditada de traducir በመዋዕሊሆሙ como ''días'', no ''generaciones''.'
  issues:
  - severity: medium
    issue: 'Frase poco natural: ''guardar el día de reposo de toda obra'''
    rationale: El ge'ez expresa guardar el Sabbath apartándose de toda obra. En español, 'de toda obra' unido directamente a 'guardar el día de reposo' suena gramaticalmente forzado y puede oscurecer el sentido.
  - severity: medium
    issue: 'Nota [b] conserva una alternativa rechazada por la auditoría: ''generaciones'''
    rationale: La revisión inglesa documentó que በመዋዕሊሆሙ significa 'en/sus días', no 'generaciones'. Mantener esa alternativa en nota contradice la evidencia fuente y puede confundir al lector.
  - severity: low
    issue: 'Modo verbal inicial algo rígido: ''No harán'''
    rationale: En contexto exhortativo/legal dirigido directamente al oyente colectivo, 'No hagan' suena más natural en español general sin alterar el sentido prescriptivo.
  - severity: low
    issue: 'Cláusula final demasiado calcada: ''por todos sus días, por todos los días'''
    rationale: Aunque fiel en léxico, 'por' produce una secuencia poco idiomática en español. 'Durante' o 'a lo largo de' preserva mejor la duración continua con español natural.
  revised_spanish_text: 'No hagan ninguna obra en el día de reposo, excepto lo que hayan preparado para ustedes en el sexto día, para comer, para beber, para descansar y para guardar el día de reposo apartándose de toda obra en este día, y para bendecir a Yahvé su Dios, que les ha dado un día de fiesta, un día santo y un día santo del reino[a] para todo Israel: este día durante todos sus días, durante todos los días.'
  revised_footnotes:
