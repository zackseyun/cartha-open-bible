base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/050/009.yaml
  text: You shall do no work at all on the Sabbath day except what you have prepared for yourselves on the sixth day, to eat and to drink and to rest and to keep Sabbath from all work on this day, and to bless the LORD your God, who has given you a day of festival and a holy day and a holy day of the kingdom for all Israel—this day throughout their days, throughout all days.
  footnotes:
  - marker: a
    text: Or 'a holy kingdom day'.
    reason: previous_rendering
  - marker: b
    text: Or 'throughout their generations'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:09Z'
    unchanged: false
    changes_summary: Capitalized Sabbath for consistency in register, revised 'a holy day of kingship' to 'a holy kingdom day' to reflect the wording more directly, and rendered the closing phrase more completely as 'throughout their generations, throughout all days.'
translation:
  language: es
  text: 'No hagan ninguna obra en el día de reposo, excepto lo que hayan preparado para ustedes en el sexto día, para comer, para beber, para descansar y para guardar el día de reposo apartándose de toda obra en este día, y para bendecir a Yahvé su Dios, que les ha dado un día de fiesta, un día santo y un día santo del reino[a] para todo Israel: este día durante todos sus días, durante todos los días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un día santo de realeza».'
    reason: alternative_reading
lexical_decisions:
- source_word: ግብር / work
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - labor
  - actividad
  lexicon: Lexical equivalent for general work/doing in a Sabbath-prohibition context
  rationale: El ge'ez prohíbe toda clase de actividad en sábado; «obra» conserva el sentido amplio de acción u ocupación prohibida sin reducirlo a trabajo remunerado.
- source_word: በዕለተ፡ ሰንበት / Sabbath day
  english_pob_choice: Sabbath day
  chosen_spanish: día de reposo
  alternatives_spanish:
  - sábado
  - Sabbath
  lexicon: Sabbath observance terminology
  rationale: «Día de reposo» comunica bien el valor funcional del sábado bíblico en español y mantiene dignidad litúrgica; además evita una lectura meramente calendárica de «sábado».
- source_word: ዘእንበለ፡ ዘአስተዳለውክምዎ / except what you have prepared for yourselves
  english_pob_choice: except what you have prepared for yourselves
  chosen_spanish: excepto lo que hayan preparado para ustedes
  alternatives_spanish:
  - salvo lo que hayan preparado para ustedes
  - excepto lo que se hayan preparado para ustedes
  lexicon: Temporal exception / preparatory clause
  rationale: La frase española conserva la excepción explícita y el matiz reflexivo de provisión previa sin forzar una construcción demasiado literal.
- source_word: ለበሊዕ፡ ወለስቲይ፡ ወለዐርፎ / to eat and to drink and to rest
  english_pob_choice: to eat and to drink and to rest
  chosen_spanish: para comer, para beber y para descansar
  alternatives_spanish:
  - para comer, beber y descansar
  - para comer y beber y reposar
  lexicon: Infinitival purpose sequence
  rationale: Se mantiene la secuencia final de propósitos con español natural; «descansar» expresa con claridad el valor de ʻrestʼ en el contexto sabático.
- source_word: ወለሰንበት እምኵሉ ግብር / to keep Sabbath from all work
  english_pob_choice: to keep Sabbath from all work
  chosen_spanish: para guardar el día de reposo de toda obra
  alternatives_spanish:
  - para guardar el día de reposo de toda labor
  - para observar el día de reposo sin ninguna obra
  lexicon: Sabbath-observance verbal phrase
  rationale: «Guardar el día de reposo» sigue la función observacional del verbo, mientras que «de toda obra» reproduce la exclusión total del ge'ez.
- source_word: እግዚአብሔር፡ አምላክክሙ / the LORD your God
  english_pob_choice: the LORD your God
  chosen_spanish: Yahvé su Dios
  alternatives_spanish:
  - el Señor su Dios
  - Yahvé, su Dios
  lexicon: Divine name and covenant address
  rationale: Se usa «Yahvé» conforme a la terminología POB para el nombre divino; «su Dios» refleja el posesivo plural del destinatario colectivo.
- source_word: ዕለተ፡ በዓል / a day of festival
  english_pob_choice: a day of festival
  chosen_spanish: un día de fiesta
  alternatives_spanish:
  - un día festivo
  - un día de festividad
  lexicon: Festival day terminology
  rationale: «Día de fiesta» transmite de manera directa el valor celebrativo sin introducir una terminología eclesiástica ajena al pasaje.
- source_word: ዕለተ፡ ቅድስተ / a holy day
  english_pob_choice: a holy day
  chosen_spanish: un día santo
  alternatives_spanish:
  - un día sagrado
  - un día consagrado
  lexicon: Holiness descriptor
  rationale: «Día santo» es la equivalencia más natural y fiel para la santidad ritual del día señalado.
- source_word: ዕለተ፡ መንግሥት፡ ቅድስት / a holy day of the kingdom
  english_pob_choice: a holy kingdom day
  chosen_spanish: un día santo del reino
  alternatives_spanish:
  - un día santo de reino
  - un día santo de realeza
  lexicon: Kingdom phrase with holiness modifier
  rationale: La decisión sigue la revisión inglesa que entendió el giro como «holy day of the kingdom»; en español, «del reino» es más natural y conserva la relación genitiva sin forzar un sintagma extraño.
- source_word: በመዋዕሊሆሙ / throughout their days
  english_pob_choice: throughout their days
  chosen_spanish: por todos sus días
  alternatives_spanish:
  - a lo largo de sus días
  - durante todos sus días
  lexicon: Duration phrase
  rationale: Se refleja el sentido temporal de «días» indicado por la revisión del texto fuente, evitando la lectura interpretativa de «generaciones».
- source_word: በኵሉ፡ መዋዕል / throughout all days
  english_pob_choice: throughout all days
  chosen_spanish: por todos los días
  alternatives_spanish:
  - a lo largo de todos los días
  - para siempre, en todos los días
  lexicon: Emphatic total-duration phrase
  rationale: La clausula final intensifica la duración; «por todos los días» mantiene la repetición enfática y su sentido de continuidad total.
theological_decisions:
- issue: Nombre divino en la exhortación sabática
  english_pob_reading: the LORD your God
  chosen_spanish_reading: Yahvé su Dios
  alternative_spanish_readings:
  - el Señor su Dios
  - el SEÑOR su Dios
  rationale: La POB española debe preservar el nombre divino auditado como Yahvé; el contexto es una exhortación de alianza, no un sustituto reverencial que oculte el tetragrámaton.
  doctrine_reference: Éxodo 3:15; práctica terminológica POB sobre el Nombre divino
- issue: 'Naturaleza del día final: festival, santidad y reino'
  english_pob_reading: a day of festival and a holy day and a holy kingdom day
  chosen_spanish_reading: un día de fiesta, un día santo y un día santo del reino
  alternative_spanish_readings:
  - un día festivo, un día sagrado y un día santo del reino
  - un día de fiesta, un día consagrado y un día santo del reino
  rationale: 'Se preservan las tres caracterizaciones sin fusionarlas. La tercera mantiene la tensión interpretativa del texto: el inglés revisado optó por «holy kingdom day», y el español sigue esa lectura sin convertirla en una paráfrasis doctrinal.'
  doctrine_reference: Jubileos 50:9; revisión textual auditada sobre el giro de reino
- issue: Referencia temporal final
  english_pob_reading: throughout their days, throughout all days
  chosen_spanish_reading: por todos sus días, por todos los días
  alternative_spanish_readings:
  - a lo largo de sus días, a lo largo de todos los días
  - durante todos sus días, durante todos los días
  rationale: El hebraísmo semántico subyacente distingue dos expresiones temporales; la traducción conserva ambas para no borrar la intensificación del original.
  doctrine_reference: Lectura revisada de በመዋዕሊሆሙ y በኵሉ፡ መዋዕል
translation_notes:
  revision_awareness: Se siguió la revisión auditada que corrige la lectura de la clausula temporal de «generations» a «days» y la del giro de reino a una formulación más directa. La versión española evita la interpretación descartada de «generaciones» y conserva la repetición final enfática del original ge'ez.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la terminología POB para el nombre divino.
  - «Día de reposo» se usa como equivalente funcional de Sabbath en un mandato ritual.
  - Se conservó la tripleta «día de fiesta / día santo / día santo del reino» sin armonizarla artificialmente.
  - La clausula final se tradujo con «días» y no con «generaciones», en conformidad con la revisión textual auditada.
