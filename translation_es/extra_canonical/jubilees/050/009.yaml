    text: 'O: «un día santo de realeza».'
    reason: alternative_reading
  revision_rationale: Se hicieron reparaciones menores para mejorar fidelidad expresiva y naturalidad en español sin apartarse del ge'ez ni de la auditoría inglesa. Se cambió 'No harán' por 'No hagan' para una exhortación más idiomática; se reformuló 'guardar el día de reposo de toda obra' a 'guardar el día de reposo apartándose de toda obra' para expresar con claridad la exclusión de toda labor; se suavizó la duración final con 'durante' manteniendo la repetición enfática de 'días'; y se eliminó la nota sobre 'generaciones' porque contradice la revisión auditada del texto fuente.
