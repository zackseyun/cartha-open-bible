base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/050/013.yaml
  text: And the person who does any of these things on the Sabbath day shall die, so that the children of Israel may keep according to the commandments of the Sabbaths of the land, as it is written on the tablets that he gave into my hands so that I might write for you the laws of each appointed time according to the divisions of its days.
  footnotes:
  - marker: a
    text: Or 'the law of'.
    reason: previous_rendering
  - marker: b
    text: Or 'keep the commandments'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:10Z'
    unchanged: false
    changes_summary: Added initial 'And' to reflect the opening conjunction; capitalized 'Sabbath' for consistency/formal register; changed 'laws' to singular 'law' to better match the source; otherwise retained the draft.
translation:
  language: es
  text: Y la persona que haga cualquiera de estas cosas en el día de reposo morirá, para que los hijos de Israel guarden conforme a los mandamientos de los días de reposo de la tierra, como está escrito en las tablas que él me dio en las manos para que yo les escribiera a ustedes las leyes[a] de cada tiempo señalado, según las divisiones de sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la ley de'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወሰብእ / the person
  english_pob_choice: the person
  chosen_spanish: la persona
  alternatives_spanish:
  - el hombre
  - quien
  lexicon: human referent term
  rationale: El ge'ez usa un sustantivo humano general; 'la persona' reproduce el alcance inclusivo sin añadir la dureza de 'el hombre' ni reexpresar como relativo impersonal.
- source_word: ይሙት / shall die
  english_pob_choice: shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - deberá morir
  - muera
  lexicon: die
  rationale: El futuro mantiene el valor de sanción legal del original y del POB inglés, sin convertirlo en un subjuntivo interpretativo.
- source_word: ዕለተ፡ ሰንበት / Sabbath day
  english_pob_choice: Sabbath day
  chosen_spanish: día de reposo
  alternatives_spanish:
  - día de sábado
  - sábado
  lexicon: Sabbath
  rationale: '''Día de reposo'' comunica el término bíblico de forma clara en español y evita una equivalencia meramente calendárica que podría ocultar la función ritual.'
- source_word: ትእዛዛተ / commandments
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: commandment
  rationale: '''Mandamientos'' es el equivalente más natural y estable para el lenguaje de pacto; conserva la fuerza normativa del texto.'
- source_word: ትእዛዛተ ሰንበታት ምድር / commandments of the Sabbaths of the land
  english_pob_choice: commandments of the Sabbaths of the land
  chosen_spanish: mandamientos de los días de reposo de la tierra
  alternatives_spanish:
  - mandamientos de los reposos de la tierra
  - mandamientos de los sábados de la tierra
  lexicon: Sabbaths of the land
  rationale: Se mantiene el plural y el complemento 'de la tierra' como en el ge'ez. 'Días de reposo' preserva la referencia sabática sin forzar un castellano calcado.
- source_word: ጽላት / tablets
  english_pob_choice: tablets
  chosen_spanish: tablas
  alternatives_spanish:
  - tablillas
  - láminas
  lexicon: tablet
  rationale: '''Tablas'' es la forma bíblica tradicional en español y corresponde bien al soporte de la inscripción mencionada.'
- source_word: ሕገገ / the laws
  english_pob_choice: the laws
  chosen_spanish: las leyes
  alternatives_spanish:
  - las normas
  - los estatutos
  lexicon: law
  rationale: El ge'ez plural justifica el plural español; 'leyes' refleja el sentido de disposiciones reguladoras mejor que un singular forzado.
- source_word: ጊዜ፡ ወጊዜ / each appointed time
  english_pob_choice: each appointed time
  chosen_spanish: cada tiempo señalado
  alternatives_spanish:
  - cada tiempo establecido
  - cada ocasión fijada
  lexicon: appointed time
  rationale: '''Tiempo señalado'' comunica la idea de cita o estación fijada por Dios sin añadir una interpretación demasiado técnica.'
- source_word: በበ፡ ክፍሌ፡ መዋዕሊሁ / according to the divisions of its days
  english_pob_choice: according to the divisions of its days
  chosen_spanish: según las divisiones de sus días
  alternatives_spanish:
  - conforme a las divisiones de sus días
  - de acuerdo con las divisiones de sus días
  lexicon: divisions of its days
  rationale: '''Según'' reproduce bien la idea normativa de medida o patrón; ''sus días'' conserva la referencia del posesivo al tiempo señalado.'
theological_decisions:
- issue: Relación entre el mandato del Sabbat y la muerte como sanción legal
  english_pob_reading: shall die
  chosen_spanish_reading: morirá
  alternative_spanish_readings:
  - deberá morir
  - será muerto
  rationale: Se conserva la sanción jurídica sin explicitar agente ni suavizar la severidad del texto. 'Morirá' deja intacta la formulación breve del original.
  doctrine_reference: pena legal pactal en textos de Torah/Jubileos
translation_notes:
  revision_awareness: El audit trail en inglés muestra una revisión que restauró la conjunción inicial 'And' y corrigió el número de 'laws' a plural; el verificador también señaló que el giro 'keep according to the commandments' debe reflejar la idea de observancia conforme a un معيار/estándar. La versión española incorpora la conjunción inicial, mantiene el plural 'leyes' y vierte la relación con 'conforme a'.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para reflejar la conjunción de apertura.
  - '''Día de reposo'' se usa de manera consistente para Sabbath en este pasaje.'
  - Se preserva el plural 'leyes' conforme al ge'ez y a la revisión crítica.
  - No se usa 'SEÑOR' ni 'Cristo', pues no corresponden a este versículo.
