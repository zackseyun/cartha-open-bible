revisions:
- from: Solo esta obra[a] se hará en los días de sábado en la casa del santuario de Yahvé, tu Dios, para que hagan expiación por Israel con una ofrenda continua, día tras día, como memorial[b] aceptable[c] delante de Yahvé, y él los recibirá para siempre, día tras día, conforme a lo que se te mandó.
  to: Solo esta obra[a] se hará en los días de sábado en la casa del santuario de Yahvé, vuestro Dios, para que hagan expiación por Israel con una ofrenda continua, día tras día, como memorial[b] aceptable delante de Yahvé, y él los recibirá para siempre, día tras día, conforme a lo que se te mandó.
  rationale: Se corrige 'tu Dios' a 'vuestro Dios' para ajustarse al plural explícito del ge'ez. Se elimina la nota sobre 'aceptable' porque sus alternativas reintroducían un matiz interpretativo que el rastro de auditoría descartó. El resto del texto se conserva por ser sustancialmente fiel al original y legible en español.
