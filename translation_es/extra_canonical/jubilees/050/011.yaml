    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:11Z'
    unchanged: false
    changes_summary: Replaced 'well-pleasing' with 'that is given' to reflect the source more closely; the draft's 'well-pleasing' appears interpretive and not directly supported by the wording.
translation:
  language: es
  text: Solo esta obra[a] se hará en los días de sábado en la casa del santuario de Yahvé, vuestro Dios, para que hagan expiación por Israel con una ofrenda continua, día tras día, como memorial[b] aceptable delante de Yahvé, y él los recibirá para siempre, día tras día, conforme a lo que se te mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘esta sola obra’.
    reason: lexical_alternative
  - marker: b
    text: O ‘recuerdo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዘግብር / gebr
  english_pob_choice: This work alone
  chosen_spanish: Solo esta obra
  alternatives_spanish:
  - Solo esta tarea
  - Solo este trabajo
  lexicon: gebr = obra, trabajo, acción
  rationale: El ajuste revisado en inglés señala que el texto ge'ez incluye explícitamente la idea de 'work'. En español, 'obra' conserva ese valor sin sonar tan técnico como 'trabajo', y 'solo' refleja la exclusividad de 'This alone'.
- source_word: በመዋዕለ፡ ሰንበታት
  english_pob_choice: on the sabbath days
  chosen_spanish: en los días de sábado
  alternatives_spanish:
  - en los días de reposo
  - en los sábados
  lexicon: sabbath = sábado / día de reposo
  rationale: '''Días de sábado'' mantiene la referencia directa al plural del texto y evita sustituir el término por una formulación más interpretativa. ''Día de reposo'' sería más explicativo, pero menos pegado a la forma del original.'
- source_word: ቤተ፡ መቅደሱ
  english_pob_choice: house of the sanctuary
  chosen_spanish: la casa del santuario
  alternatives_spanish:
  - la casa del santuario
  - la casa del lugar santo
  lexicon: house + sanctuary
  rationale: '''Casa del santuario'' reproduce la construcción nominal sin introducir ''templo'', que sería más tradicional pero menos literal respecto al ge''ez.'
- source_word: እግዚአብሔር፡ አምላክክሙ
  english_pob_choice: the LORD your God
  chosen_spanish: Yahvé, tu Dios
  alternatives_spanish:
  - Yahvé, vuestro Dios
  - el Señor, tu Dios
  lexicon: YHWH = Yahvé; אֱלֹהִים / theos = Dios
  rationale: Se mantiene el nombre divino 'Yahvé' conforme a la política del proyecto. Se usa singular 'tu' porque el español fluye mejor en el mandato directo; el plural queda implícito en el contexto colectivo.
- source_word: ከመ፡ ያስተስርዩ
  english_pob_choice: so that they may make atonement
  chosen_spanish: para que hagan expiación
  alternatives_spanish:
  - para que hagan expiación
  - para que realicen expiación
  lexicon: atonement = expiación
  rationale: '''Hagan expiación'' conserva el sentido sacrificial/ritual del término sin reemplazarlo por una paráfrasis teológica más amplia. ''Expiación'' es el equivalente español más directo para este contexto.'
- source_word: መባአ
  english_pob_choice: with a continual offering
  chosen_spanish: con una ofrenda continua
  alternatives_spanish:
  - con una ofrenda perpetua
  - con una ofrenda constante
  lexicon: offering = ofrenda
  rationale: La revisión de fondo indicó que el elemento omitido es 'offering'. 'Ofrenda continua' integra tanto el sustantivo como la continuidad temporal del adjetivo, y evita duplicar la idea de 'continual' de modo redundante.
- source_word: ቅድመ፡ እግዚአብሔር
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: before = delante de
  rationale: '''Delante de Yahvé'' es un giro español natural y reverente que conserva la relación espacial/ritual del original.'
- source_word: ይትወከፎሙ
  english_pob_choice: he will receive them
  chosen_spanish: él los recibirá
  alternatives_spanish:
  - él los aceptará
  - él los acogerá
  lexicon: receive/accept = recibir/aceptar
  rationale: El verbo ge'ez admite el matiz de aceptar/recibir. Se eligió 'recibirá' para seguir la línea del inglés POB y mantener la promesa divina, mientras que 'aceptará' queda disponible en nota por el matiz cultual.
theological_decisions:
- issue: Relación entre ofrenda continua y expiación por Israel
  english_pob_reading: so that they may make atonement for Israel with a continual offering, day by day
  chosen_spanish_reading: para que hagan expiación por Israel con una ofrenda continua, día tras día
  alternative_spanish_readings:
  - para que expíen a Israel con una ofrenda continua, día tras día
  - para que hagan expiación por Israel continuamente, día tras día
  rationale: La construcción conserva el vínculo entre el rito y el beneficio para Israel sin convertir la expiación en una acción meramente moral. 'Con una ofrenda continua' preserva el medio sacrificial explícito en el texto ge'ez y en la corrección del audit trail.
  doctrine_reference: Culto sacrificial y expiación ritual en la literatura del Segundo Templo
- issue: Valor de 'acceptable before the LORD'
  english_pob_reading: as a memorial that is acceptable before the LORD
  chosen_spanish_reading: como memorial aceptable delante de Yahvé
  alternative_spanish_readings:
  - como memorial grato delante de Yahvé
  - como memorial que es aceptable delante de Yahvé
  rationale: La revisión del inglés mostró que 'well-pleasing' era interpretativo y luego fue corregido a una idea de aceptabilidad. En español, 'aceptable' refleja esa lectura sin añadir una valoración devocional no exigida por el ge'ez.
  doctrine_reference: Aceptación cultual de la ofrenda ante Dios
- issue: Recepción divina permanente
  english_pob_reading: and he will receive them forever
  chosen_spanish_reading: y él los recibirá para siempre
  alternative_spanish_readings:
  - y él los aceptará para siempre
  - y él los acogerá para siempre
  rationale: Se conserva la promesa de recepción divina continua, manteniendo la fuerza durativa de 'forever'. 'Recibirá' es suficientemente amplio para incluir aceptación cultual sin cerrar la ambigüedad del original.
  doctrine_reference: Permanencia de la aceptación divina del pueblo en el marco pactal
translation_notes:
  revision_awareness: 'El texto inglés fue revisado varias veces: primero se introdujo erróneamente ''that is given'', luego se corrigió a ''that is acceptable''; además, el revisor señaló que se había omitido ''with a continual offering'' y que ''This alone'' debía explicitarse como ''This work alone''. La versión española incorpora esas correcciones: incluye ''obra'', recupera ''ofrenda continua'' y usa ''aceptable'' en vez de una expresión más interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto.
  - '''Expiación'' se usa en sentido sacrificial/ritual, no moralista.'
  - '''Obra'' traduce el sustantivo explícito del ge''ez y evita suavizar la exclusividad del mandato.'
  - Las notas se anclan en palabras presentes en el texto español y no se dejan footnotes huérfanas.
