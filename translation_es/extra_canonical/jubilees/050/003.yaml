  text: Y la tierra guardará sus descansos sabáticos mientras habitan en ella, y conocerán el año del jubileo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ምድር
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  - la tierra del país
  lexicon: earth/land
  rationale: El ge'ez usa un término amplio para la tierra o el suelo habitado; «la tierra» conserva esa amplitud en español y funciona bien con el contexto agrícola y de posesión.
- source_word: ሰንበታቲሃ
  english_pob_choice: its sabbaths
  chosen_spanish: sus sábados
  alternatives_spanish:
  - sus sábados
  - sus días de reposo
  - sus reposos sabáticos
  lexicon: sabbath/rest-days
  rationale: La forma plural mantiene la idea de ciclos sabáticos de la tierra. «Sábados» es la forma más directa y auditable, sin reemplazar el patrón técnico del original.
- source_word: በነቢሮቶሙ
  english_pob_choice: while they dwell upon it
  chosen_spanish: mientras ellos habitan en ella
  alternatives_spanish:
  - mientras habitan en ella
  - mientras moran en ella
  - cuando ellos habiten en ella
  lexicon: dwell/inhabit
  rationale: «Habitan» preserva el sentido de residencia estable sin introducir un matiz más solemne o arcaizante como «moran».
- source_word: ወዓመተ ለኢዮቤል
  english_pob_choice: the year of the jubilee
  chosen_spanish: el año del jubileo
  alternatives_spanish:
  - el año del jubileo
  - el año del jubileo
  - el año de jubileo
  lexicon: jubilee year
  rationale: «Jubileo» es el equivalente natural y tradicional en español para la institución bíblica, y mantiene la referencia calendárica específica del texto.
theological_decisions:
- issue: Relación entre la tierra y el cumplimiento sabático
  english_pob_reading: And the land will keep its sabbaths
  chosen_spanish_reading: Y la tierra guardará sus sábados
  alternative_spanish_readings:
  - Y la tierra guardará sus días de reposo
  - Y la tierra observará sus sábados
  rationale: La formulación mantiene la personificación de la tierra y el vínculo entre tierra y descanso sabático sin suavizar la fuerza legal-cúltica del enunciado.
  doctrine_reference: Levítico 25; 2 Crónicas 36:21
- issue: Conocimiento del jubileo como reconocimiento del tiempo señalado
  english_pob_reading: and they will know the year of the jubilee
  chosen_spanish_reading: y conocerán el año del jubileo
  alternative_spanish_readings:
  - y sabrán el año del jubileo
  - y reconocerán el año del jubileo
  rationale: «Conocerán» conserva la simple afirmación del original sin convertirla en explicación interpretativa. El texto afirma aprehensión/reconocimiento del año señalado.
  doctrine_reference: Levítico 25:8-13
translation_notes:
  revision_awareness: The English POB text had no footnotes and the latest revision pass reported no changes needed; the Spanish draft therefore follows the source closely without adding interpretive expansions.
  spanish_consistency_notes:
  - Se mantiene «jubileo» como término técnico estable.
  - Se evita «SEÑOR» porque el verso no contiene el tetragrámaton ni κύριος.
  - Se conserva la personificación de «la tierra» como sujeto activo, coherente con el original.
  - La puntuación sigue una estructura coordinada simple, equivalente a la del texto fuente.
