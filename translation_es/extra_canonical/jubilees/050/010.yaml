base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/050/010.yaml
  text: 'For great is the honor that the LORD has given to Israel: to eat and to drink and to be satisfied on this festival day, and to rest on it from all work belonging to the labor of the children of men, except burning incense and bringing an offering and sacrifice before the LORD for the days and for the sabbaths.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:10Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Porque grande es el honor que Yahvé ha dado a Israel: comer, beber y saciarse en este día de fiesta, y descansar en él de toda labor propia del trabajo de los hijos de los hombres, excepto quemar incienso y presentar una ofrenda y un sacrificio delante de Yahvé para los días y para los sábados.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: YHWH
  rationale: El texto fuente nombra al Dios del pacto con el equivalente del nombre divino; la convención del proyecto exige ‘Yahvé’ en el texto principal. Se evita el sustituto litúrgico ‘SEÑOR’ para conservar la transparencia auditiva y textual.
- source_word: ክብር
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - dignidad
  lexicon: כָּבוֹד / honor
  rationale: La POB inglesa eligió ‘honor’, y el ge’ez aquí expresa la grandeza del honor concedido a Israel; en español ‘honor’ comunica con claridad el sentido sin cargarlo innecesariamente hacia ‘gloria’.
- source_word: በሊዕ / ስቲይ / ጸጊብ
  english_pob_choice: to eat and to drink and to be satisfied
  chosen_spanish: comer, beber y quedar satisfechos
  alternatives_spanish:
  - comer, beber y ser saciados
  - comer, beber y saciarse
  lexicon: comer / beber / saciarse
  rationale: La secuencia verbal debe mantenerse natural en español. ‘Quedar satisfechos’ preserva el resultado de la plenitud alimentaria sin forzar un calco; la forma refleja bien el valor aspectual de ‘ser satisfechos’.
- source_word: በዛቲ ዕለት በዓል
  english_pob_choice: this festival day
  chosen_spanish: este día de fiesta
  alternatives_spanish:
  - este día festivo
  - este día de celebración
  lexicon: fiesta
  rationale: ‘Fiesta’ reproduce adecuadamente el valor de día festivo/celebración y coincide con el registro bíblico castellano sin sonar arcaico.
- source_word: እምኵሉ ግብር
  english_pob_choice: from all work
  chosen_spanish: de toda obra
  alternatives_spanish:
  - de todo trabajo
  - de toda labor
  lexicon: obra / trabajo / labor
  rationale: ‘Obra’ permite mantener la amplitud del término fuente y armoniza con la cláusula siguiente sobre el ‘trabajo de los hijos de los hombres’.
- source_word: ዘእምግብረ እጓለ እመሕያው
  english_pob_choice: belonging to the labor of the children of men
  chosen_spanish: perteneciente al trabajo de los hijos de los hombres
  alternatives_spanish:
  - propio del trabajo de los hijos de los hombres
  - que corresponde al trabajo de los hijos de los hombres
  lexicon: hijos de los hombres
  rationale: Se conserva la construcción semítica en forma inteligible. ‘Hijos de los hombres’ refleja el giro del original sin sustituirlo por una abstracción que borre la referencia antropológica.
- source_word: ዘእንበለ ዕጣን ዕጣን
  english_pob_choice: except burning incense
  chosen_spanish: excepto quemar incienso
  alternatives_spanish:
  - salvo el quemar incienso
  - exceptuando el incienso
  lexicon: incensar / incienso
  rationale: La POB distingue la acción concreta de ‘burning incense’; en español ‘quemar incienso’ es la manera más directa y fiel de expresarlo.
- source_word: ቍርባን ወመሥዋዕት
  english_pob_choice: an offering and sacrifice
  chosen_spanish: una ofrenda y un sacrificio
  alternatives_spanish:
  - una oblación y un sacrificio
  - una ofrenda y una víctima sacrificial
  lexicon: ofrenda / sacrificio
  rationale: ‘Ofrenda’ mantiene un término amplio para qorbán, mientras ‘sacrificio’ reproduce el paralelo cultual del texto y de la POB inglesa.
- source_word: ቅድመ እግዚአብሔር
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: delante de Yahvé
  rationale: ‘Delante de’ es idiomático en castellano bíblico moderno y conserva la dimensión cultual de presentación ante Dios.
- source_word: ለመዋዕለ ወለሰንበታት
  english_pob_choice: for the days and for the sabbaths
  chosen_spanish: para los días y para los sábados
  alternatives_spanish:
  - para los días y para los sábados de reposo
  - para los días y para los días de reposo
  lexicon: sábado / reposo
  rationale: Se mantiene la distinción literal del paralelo temporal. ‘Sábados’ refleja el plural del original; no se sustituye automáticamente por ‘días de reposo’ porque el texto conserva la forma concreta.
theological_decisions:
- issue: Nombre divino en contexto cultual y festivo
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: Aunque el contexto es una celebración en Israel, el referente sigue siendo el nombre divino del pacto, no un simple título. Mantener ‘Yahvé’ conserva la transparencia con la fuente y la línea editorial del proyecto.
  doctrine_reference: Tetragrámaton / nomen divinum
- issue: Relación entre descanso festivo y excepciones cultuales
  english_pob_reading: to rest on it from all work ... except burning incense and bringing an offering and sacrifice
  chosen_spanish_reading: descansar en él de toda obra ... excepto quemar incienso y presentar una ofrenda y un sacrificio
  alternative_spanish_readings:
  - descansar en él de todo trabajo ... salvo quemar incienso y presentar una ofrenda y un sacrificio
  - descansar en él de toda labor ... excepto el incienso, la ofrenda y el sacrificio
  rationale: 'La frase mantiene la tensión normativa: hay reposo general, pero permanecen excepciones cultuales. No se suaviza ni se fusiona la lista para no perder el contraste legal-ritual del pasaje.'
  doctrine_reference: Ley ceremonial / descanso festivo
- issue: Pluralidad temporal de ‘days’ y ‘sabbaths’
  english_pob_reading: for the days and for the sabbaths
  chosen_spanish_reading: para los días y para los sábados
  alternative_spanish_readings:
  - para los días y para los reposos
  - para los días y para los sábados de reposo
  rationale: Se conserva la aparente repetición del original. No se armoniza interpretativamente porque el texto distingue dos ámbitos temporales y la traducción debe dejar visible esa estructura.
  doctrine_reference: Calendario litúrgico / sábados
translation_notes:
  revision_awareness: La versión española sigue el juicio estable de la revisión más reciente, que no introdujo cambios. El borrador conserva la lectura principal del POB inglés y no añade notas donde el texto fuente y la traducción auditada muestran alta concordancia.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para el nombre divino.
  - Se mantiene ‘ofrenda’ junto a ‘sacrificio’ para reflejar el paralelismo cultual.
  - Se conserva ‘sábados’ en plural, sin normalizarlo a una glosa interpretativa.
  - El registro es bíblico-formal, pero con sintaxis natural en español.
