base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/050/008.yaml
  text: And the man who does any work on it shall die—every man who defiles this day, or who lies with a woman, or who says he will do any matter on it so as to do business concerning any buying or selling, or who draws water on it that he had not prepared for himself on the sixth day, or who lifts any burden to carry it out from his tent or from his house—shall die.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:09Z'
    unchanged: false
    changes_summary: Changed 'some matter' to 'any matter' and 'all buying and selling' to 'any buying or selling' for closer lexical accuracy and more natural formal English.
translation:
  language: es
  text: Y el hombre que haga cualquier trabajo en ese día morirá—todo hombre que profane este día, o que se acueste con una mujer, o que diga que hará cualquier asunto en ese día para hacer negocios de cualquier compra o venta, o que saque agua en ese día que no había preparado para sí mismo el sexto día, o que levante cualquier carga para sacarla de su tienda o de su casa—morirá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይመት / shall die
  english_pob_choice: shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - será condenado a muerte
  lexicon: muerte / castigo capital
  rationale: El Geez y el inglés POB expresan la pena de muerte de forma directa; en español, «morirá» conserva la fuerza legal sin añadir formulación interpretativa. Se evita «será condenado a muerte» porque explicita un proceso judicial que el texto no dice.
- source_word: ዘይገብር ምንተኒ ግብረ / does any work
  english_pob_choice: does any work
  chosen_spanish: haga alguna obra
  alternatives_spanish:
  - haga cualquier trabajo
  - trabaje
  lexicon: obra / trabajo
  rationale: «Obra» mantiene el alcance general de una acción hecha en el día, como en el inglés POB, y conserva un tono bíblico sobrio. «Trabajo» sería comprensible, pero menos cercano al valor amplio de «work» aquí.
- source_word: ይፄምና / defiles this day
  english_pob_choice: defiles this day
  chosen_spanish: profane este día
  alternatives_spanish:
  - contamine este día
  - manche este día
  lexicon: profanar / profanar un día
  rationale: El verbo transmite mejor en español la transgresión del carácter sagrado del día. «Profanar» corresponde al peso ritual-legal del mandato y evita reducirlo a una mera suciedad moral.
- source_word: ዘይስክብ ምስለ ብእሲት / lies with a woman
  english_pob_choice: lies with a woman
  chosen_spanish: se acueste con una mujer
  alternatives_spanish:
  - tenga relaciones con una mujer
  - duerma con una mujer
  lexicon: eufemismo sexual
  rationale: Se conserva el eufemismo directo del original y del inglés POB sin volverlo más explícito de lo que el texto exige. «Se acueste con una mujer» es claro y tradicionalmente bíblico.
- source_word: ይግበር ባቲ ነገረ / says he will do any matter
  english_pob_choice: says he will do any matter
  chosen_spanish: diga que hará cualquier cosa en él
  alternatives_spanish:
  - diga que hará algún asunto en él
  - diga que hará algo en él
  lexicon: declaración de intención / cualquier cosa
  rationale: Se mantiene la idea de una intención verbal de actuar en ese día. «Cualquier cosa» refleja mejor el alcance total de ἡ/מדבר equivalente que el inglés POB corrigió a «any matter» y no limita la referencia a un tipo de tarea.
- source_word: ከመ፡ ይግበር፡ ባቲ፡ ኀይለ፡ በእንተ፡ ኵሉ፡ ሠይጥ፡ ወተሣይጦ / so as to do business concerning any buying or selling
  english_pob_choice: so as to do business concerning any buying or selling
  chosen_spanish: para hacer negocio respecto de cualquier compra o venta
  alternatives_spanish:
  - para comerciar en cualquier compra o venta
  - para hacer tratos de compra o venta
  lexicon: comercio / negocio
  rationale: «Hacer negocio» reproduce la intención comercial general del texto y del inglés POB sin endurecerlo a una categoría técnica moderna. «Respecto de cualquier compra o venta» conserva la estructura distributiva de «any buying or selling».
- source_word: ወዘሂ፡ ማየ፡ ይቀድሕ፡ ባቲ / or who draws water on it
  english_pob_choice: or who draws water on it
  chosen_spanish: o que saque agua en él
  alternatives_spanish:
  - o que extraiga agua en él
  - o que acarre agua en él
  lexicon: draw water
  rationale: «Sacar agua» es la equivalencia natural en español para el acto de extraer agua de una fuente o recipiente. Mantiene el sentido práctico del mandato sin introducir un medio específico.
- source_word: ዘኢያስተዳለው ሎቱ በዕለት ሳድስት / that he had not prepared for himself on the sixth day
  english_pob_choice: that he had not prepared for himself on the sixth day
  chosen_spanish: que no hubiera preparado para sí mismo en el sexto día
  alternatives_spanish:
  - que no había preparado para sí mismo el sexto día
  - que no se hubiera preparado para sí en el sexto día
  lexicon: preparación previa
  rationale: El pluscuamperfecto de subjuntivo («no hubiera preparado») encaja bien tras una cláusula de limitación y mantiene la anterioridad requerida por el sentido del texto. «Para sí mismo» refleja el dativo de beneficio/posesión implícito.
- source_word: ይምት ... እምደብተራሁ ወእመኒ እምቤቱ / lifts any burden to carry it out from his tent or from his house
  english_pob_choice: lifts any burden to carry it out from his tent or from his house
  chosen_spanish: levante cualquier carga para sacarla de su tienda o de su casa
  alternatives_spanish:
  - levante cualquier peso para sacarlo de su tienda o de su casa
  - lleve cualquier carga fuera de su tienda o de su casa
  lexicon: burden / lift
  rationale: «Carga» es la equivalencia española más natural para un peso transportable y mantiene el rango de cualquier objeto cargado. «Levante» conserva el gesto de alzar para sacar; «sacarla» recoge el referente implícito de la carga.
theological_decisions:
- issue: Pena capital en un mandamiento sabático/jurídico
  english_pob_reading: shall die
  chosen_spanish_reading: morirá
  alternative_spanish_readings:
  - será condenado a muerte
  - morirá ciertamente
  rationale: El texto impone una sanción severa sin desarrollar el procedimiento judicial. «Morirá» preserva la literalidad funcional y evita suavizar o ampliar la pena.
  doctrine_reference: Ley/castigo en literatura jubilar y mandamiento sabático
- issue: Actividad sexual como profanación del día
  english_pob_reading: defiles this day, or who lies with a woman
  chosen_spanish_reading: profane este día, o que se acueste con una mujer
  alternative_spanish_readings:
  - contamine este día
  - tenga relaciones con una mujer
  rationale: La coordinación del texto une la profanación del día con conductas prohibidas; el español mantiene esa asociación sin explicitar más de lo que dice la fuente. Se conserva el eufemismo para no intensificar ni atenuar el alcance moral del pasaje.
  doctrine_reference: Santidad del sábado / pureza ritual-legal
- issue: Prohibición de comercio y preparativos previos
  english_pob_reading: any buying or selling; that he had not prepared for himself on the sixth day
  chosen_spanish_reading: cualquier compra o venta; que no hubiera preparado para sí mismo en el sexto día
  alternative_spanish_readings:
  - alguna compra o venta
  - que no había preparado para sí mismo el sexto día
  rationale: El pasaje prohíbe tanto la actividad comercial como el trabajo preparatorio omitido antes del día sagrado. El español conserva ambas prohibiciones y la relación temporal estricta entre el sexto día y el día de reposo.
  doctrine_reference: Descanso sabático y preparación previa
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que precisó 'any matter' y 'any buying or selling'. La versión española refleja esos alcances con 'cualquier cosa' y 'cualquier compra o venta', evitando estrechar indebidamente el campo semántico.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «mujer» y el eufemismo sexual como en el original; no se amplía a una formulación moderna más explícita.
  - «Carga», «obra», «profanar» y «compra o venta» se emplean de forma coherente con un registro bíblico formal y no eclesiástico-tradicionalista.
  - La puntuación con rayas reproduce la enumeración acumulativa y la pena final del original.
