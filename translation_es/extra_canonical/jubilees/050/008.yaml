  revision_rationale: 'La revisión conserva todo el contenido de la fuente y del POB inglés, pero corrige varios calcos y mejora la precisión semántica en español: «cualquier trabajo» para el alcance general de la prohibición, «en ese día» para referencia temporal natural, «cualquier asunto» para reflejar mejor any matter, una expresión comercial más idiomática, y «el sexto día» para una construcción temporal española más fluida. No se requieren notas.'
