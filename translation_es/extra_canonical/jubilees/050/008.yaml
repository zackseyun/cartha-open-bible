revisions:
- from: Y el hombre que haga alguna obra en él morirá—todo hombre que profane este día, o que se acueste con una mujer, o que diga que hará cualquier cosa en él, para hacer negocio respecto de cualquier compra o venta, o que saque agua en él que no hubiera preparado para sí mismo en el sexto día, o que levante cualquier carga para sacarla de su tienda o de su casa—morirá.
  to: Y el hombre que haga cualquier trabajo en ese día morirá—todo hombre que profane este día, o que se acueste con una mujer, o que diga que hará cualquier asunto en ese día para hacer negocios de cualquier compra o venta, o que saque agua en ese día que no había preparado para sí mismo el sexto día, o que levante cualquier carga para sacarla de su tienda o de su casa—morirá.
  rationale: 'La revisión conserva todo el contenido de la fuente y del POB inglés, pero corrige varios calcos y mejora la precisión semántica en español: «cualquier trabajo» para el alcance general de la prohibición, «en ese día» para referencia temporal natural, «cualquier asunto» para reflejar mejor any matter, una expresión comercial más idiomática, y «el sexto día» para una construcción temporal española más fluida. No se requieren notas.'
