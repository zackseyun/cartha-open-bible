translation:
  language: es
  text: Y te hablé acerca de los sábados[a] de la tierra en el monte Sinaí, y de los años de los jubileos te hablé entre los sábados de años; pero no te hablé de su año hasta el tiempo en que entres en la tierra que has de poseer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sábados» reproduce la forma literal del original para el ciclo sabático; también puede entenderse como «años sabáticos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሰንበታተ፡ ምድርኒ፡
  english_pob_choice: the sabbaths of the land
  chosen_spanish: los sábados de la tierra
  alternatives_spanish:
  - los reposos de la tierra
  - los años sabáticos de la tierra
  lexicon: sabbath / sabbaths; land
  rationale: El ge'ez y el inglés POB usan una expresión plural que alude al ciclo sabático de la tierra. En español, «sábados» conserva la forma literal y la relación con el término técnico, sin introducir una paráfrasis interpretativa. «Años sabáticos» explicita el sentido, pero va más allá de la forma del texto; por eso se deja solo como alternativa.
- source_word: ዓመታተ፡ ኢዮቤሌዎኒ፡
  english_pob_choice: the years of the jubilees
  chosen_spanish: los años de los jubileos
  alternatives_spanish:
  - los años jubilares
  - los ciclos de jubileos
  lexicon: jubilee / jubilees; years
  rationale: Se mantiene la relación genitiva directa del original y del inglés POB. «Años de los jubileos» es transparente y auditable; «años jubilares» sería más idiomático, pero suaviza la estructura del texto fuente.
- source_word: ውስተ፡ ሰንበታተ፡ ዓመታት፡
  english_pob_choice: among the sabbaths of years
  chosen_spanish: entre los sábados de años
  alternatives_spanish:
  - entre los años sabáticos
  - en medio de los sábados de años
  lexicon: sabbaths of years
  rationale: La frase es técnicamente compacta y difícil. Se preserva la colocación original con «sábados de años» para no borrar la tensión lexical del texto y mantener la correspondencia con el inglés POB. «Años sabáticos» sería comprensible, pero reinterpreta la imagen.
- source_word: እስከ፡ አመ፡ ትበውኡ፡ ውስተ፡ ምድር፡ እንተ፡ ትእኅዙ።
  english_pob_choice: until the time when you enter the land that you are to possess
  chosen_spanish: hasta el tiempo en que entren en la tierra que han de poseer
  alternatives_spanish:
  - hasta que entren en la tierra que poseerán
  - hasta el momento en que entren en la tierra que deban poseer
  lexicon: enter / possess the land
  rationale: El verbo final expresa posesión futura y pactal; «han de poseer» conserva ese matiz de obligación/destino sin volverlo demasiado interpretativo. Se usa «entren» para mantener un futuro subordinado natural en español.
theological_decisions:
- issue: Designación divina / ausencia de nombre divino explícito
  english_pob_reading: The English POB uses ordinary reference without adding a divine-name masking convention in this verse; no special theological term is introduced.
  chosen_spanish_reading: No se introduce ningún término divino adicional.
  alternative_spanish_readings:
  - Añadir una mención explícita a Yahvé
  - Reformular con sujeto implícito más marcado
  rationale: El versículo trata de instrucciones dadas a Moisés y no contiene una designación divina adicional en el tramo relevante. Mantener el foco evita introducir material no atestiguado por el texto.
  doctrine_reference: Tetragrammaton handling per POB Spanish defaults; source-text restraint
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió 'the year of it' a 'its year'; por eso la cláusula final se vierte de manera posesiva natural en español ('su año'), manteniendo la referencia al año singular sin añadir explicación extra.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la continuidad narrativa del original.
  - 'Se conserva la estructura paralela del versículo: revelación sobre sábados de la tierra, jubileos, y luego la restricción respecto al año singular.'
  - «Tierra» se traduce de forma consistente con el objeto posesivo del pasaje; no se sustituye por «país» porque el contexto legal-cultual apunta a la tierra prometida.
  - No se capitaliza «sábados» ni «jubileos» como nombres propios, porque funcionan como designaciones técnicas del calendario.
