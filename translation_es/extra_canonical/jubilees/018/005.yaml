translation:
  language: es
  text: Y tomó la leña del sacrificio y la puso sobre Isaac, su hijo; y tomó en su mano el fuego y el cuchillo, y los dos fueron juntos a aquel lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዕፀወ፡ መሥዋዕት፡
  english_pob_choice: the wood of the offering
  chosen_spanish: la leña del sacrificio
  alternatives_spanish:
  - la madera de la ofrenda
  - la leña de la ofrenda
  lexicon: Geez ዕፀወ / መሥዋዕት
  rationale: «Leña» reproduce de forma natural el material preparado para el sacrificio y mantiene la imagen concreta del texto. «Sacrificio» conserva el sentido cultual del sustantivo asociado a la ofrenda, sin suavizarlo con un término más general como «ofrenda».
- source_word: ወአስከሞ፡
  english_pob_choice: and laid it on
  chosen_spanish: y la puso sobre
  alternatives_spanish:
  - y la cargó sobre
  - y la echó sobre
  lexicon: Geez አስከመ
  rationale: «Puso sobre» sigue de cerca la acción física simple del original y evita agregar matices no explicitados, como la idea de cargar o arrojar.
- source_word: ወነሥአ፡ በእዴሁ፡ እሳተ፡
  english_pob_choice: and he took in his hand the fire
  chosen_spanish: y tomó en su mano el fuego
  alternatives_spanish:
  - y llevó en su mano el fuego
  - y tomó en su mano la brasa
  lexicon: Geez እሳተ
  rationale: Se conserva «fuego» porque el texto dice literalmente fuego; no se sustituye por «brasa» o «antorcha» sin base en el enunciado. «En su mano» corresponde a la formulación concreta del original.
- source_word: ወመጥባሕተני
  english_pob_choice: and the knife
  chosen_spanish: y el cuchillo
  alternatives_spanish:
  - y el cuchillo sacrificial
  - y el puñal
  lexicon: Geez መጥባሕት
  rationale: «Cuchillo» es el equivalente más directo y claro en español. Se evita «puñal» por su carga moderna de arma ofensiva y porque el texto describe un instrumento para el sacrificio.
- source_word: ኅቡረ፡ ክልኤሆሙ
  english_pob_choice: the two of them went together
  chosen_spanish: los dos fueron juntos
  alternatives_spanish:
  - ambos caminaron juntos
  - fueron juntos los dos
  lexicon: Geez ኅቡረ / ክልኤሆሙ
  rationale: «Los dos fueron juntos» reproduce con naturalidad la coordinación del original y mantiene la reciprocidad entre padre e hijo. Se evita una formulación más expansiva que introduzca detalles no presentes.
- source_word: መካን
  english_pob_choice: that place
  chosen_spanish: aquel lugar
  alternatives_spanish:
  - ese lugar
  - el lugar
  lexicon: Geez መካን
  rationale: «Aquel lugar» traduce el valor de deixis distante del término y sigue la revisión inglesa que corrigió la idea de movimiento hacia el destino («to that place»).
theological_decisions:
- issue: El instrumento del sacrificio y el fuego se presentan sin interpretación alegórica explícita.
  english_pob_reading: The sentence is narrated plainly, without adding typology or devotional explanation.
  chosen_spanish_reading: La frase se mantiene narrativa y concreta, sin agregar tipología ni explicación devocional.
  alternative_spanish_readings:
  - El pasaje es un símbolo del sacrificio.
  - La escena prefigura el sacrificio venidero.
  rationale: El texto fuente solo describe acciones. En una traducción fuente-auditada no se introduce lectura tipológica no explicitada por el pasaje ni por el audit trail inglés.
  doctrine_reference: Principio de suficiencia textual y no-expansión interpretativa
translation_notes:
  revision_awareness: El texto inglés revisado cambió «until that place» por «to that place» para reflejar mejor el movimiento hacia el destino. Por eso la versión española usa «hasta aquel lugar» como equivalente natural de llegada/dirección, sin dar a entender permanencia o límite temporal.
  spanish_consistency_notes:
  - Se mantiene «sacrificio» para መሥዋዕት por la carga cultual del contexto.
  - Se conserva «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece ninguna referencia divina explícita.
  - Se evita «ofrenda» como término único porque debilita la fuerza sacrificial del sintagma.
  - El orden sintáctico busca ser bíblico pero plenamente legible en español contemporáneo.
