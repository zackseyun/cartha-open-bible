  revision_rationale: 'Se hizo una reparación menor: «hasta aquel lugar» se ajustó a «a aquel lugar» para reflejar con mayor fidelidad el sentido del original según la revisión final del POB inglés y evitar un matiz de límite o trayecto no necesario en español.'
