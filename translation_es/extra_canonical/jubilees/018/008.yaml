translation:
  language: es
  text: Y edificó el altar y colocó la leña sobre el altar; y ató a Isaac, su hijo, y lo puso sobre la leña que estaba encima del altar; y extendió su mano para tomar el cuchillo, para degollar a Isaac, su hijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ምሥዋዐ / altar
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  - el altar de sacrificio
  lexicon: altar
  rationale: El texto fuente y la traducción inglesa se refieren al lugar sacrificial con el término común y claro ‘altar’; en español ‘el altar’ comunica bien el objeto sin introducir un tecnicismo innecesario.
- source_word: ዕፀው / wood
  english_pob_choice: wood
  chosen_spanish: la leña
  alternatives_spanish:
  - la madera
  - los leños
  lexicon: wood
  rationale: En contexto sacrificial, ‘la leña’ es la forma española más natural y precisa para la madera preparada sobre el altar; mantiene la función del material en la escena.
- source_word: አሰረ / bound
  english_pob_choice: he bound
  chosen_spanish: ató
  alternatives_spanish:
  - sujetó
  - ligó
  lexicon: bind
  rationale: ‘Ató’ reproduce directamente la acción de sujetar con cuerdas o ligaduras y es el equivalente más sobrio y claro en español.
- source_word: ይስሐቅሃ፡ ወልዶ / Isaac his son
  english_pob_choice: Isaac his son
  chosen_spanish: Isaac, su hijo
  alternatives_spanish:
  - Isaac, su propio hijo
  - Isaac su hijo
  lexicon: son
  rationale: Se conserva la relación posesiva explícita del original y de la traducción inglesa, con puntuación española natural.
- source_word: መጥባሕተ / knife
  english_pob_choice: the knife
  chosen_spanish: el cuchillo
  alternatives_spanish:
  - el puñal
  - la daga
  lexicon: knife
  rationale: ‘Cuchillo’ es el término más transparente y fiel para el instrumento de sacrificio mencionado por la fuente; evita cargar el texto con un matiz más violento del necesario.
- source_word: ይዝብሖ / slaughter
  english_pob_choice: slaughter
  chosen_spanish: degollar
  alternatives_spanish:
  - sacrificar
  - matar
  lexicon: slaughter
  rationale: ‘Degollar’ conserva la fuerza concreta del acto de sacrificar mediante el corte de la garganta, sin suavizar la crudeza del original.
theological_decisions:
- issue: Descripción del acto sacrificial sin eufemismo
  english_pob_reading: so that he might slaughter Isaac his son
  chosen_spanish_reading: para degollar a Isaac, su hijo
  alternative_spanish_readings:
  - para sacrificar a Isaac, su hijo
  - para matar a Isaac, su hijo
  rationale: El pasaje narra el acto con concreción ritual y violencia real; ‘degollar’ preserva esa tensión mejor que ‘sacrificar’, que puede sonar demasiado general o litúrgico en español.
  doctrine_reference: Génesis 22 / Jubileos 18; relato del sacrificio de Isaac
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el texto inglés POB fue mantenido sin notas, y la presente versión sigue de cerca la estructura y decisiones léxicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ no porque aparezca explícitamente en este versículo, sino porque aquí no hay nombre divino en el texto griego/ge'ez que requiera ajuste terminológico.
  - Se conserva la estructura acumulativa de cláusulas coordinadas, como en el inglés POB, para reflejar el ritmo narrativo del original.
  - No se introducen notas de pie porque el inglés POB no las tenía y el español no genera una ambigüedad adicional que exija alternativa textual.
