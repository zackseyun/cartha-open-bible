translation:
  language: es
  text: 'Y lo llamé desde el cielo y le dije: «Abraham, Abraham». Y él se llenó de terror y dijo: «Aquí estoy».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወ*ጸዋዕክዎ፡ እምሰማይ፡
  english_pob_choice: And I called to him from heaven
  chosen_spanish: Y lo llamé desde el cielo
  alternatives_spanish:
  - Y le hablé desde el cielo
  - Y lo llamé del cielo
  lexicon: llamar / cielo
  rationale: El ge'ez expresa una llamada dirigida a Abraham con procedencia celestial. «Lo llamé» conserva la acción directa; «desde el cielo» mantiene la fuente espacial sin introducir matices no presentes. Se evita una perífrasis más libre como «le hablé» porque la escena enfatiza el llamado.
- source_word: አብርሃም፡ አብርሃም፡
  english_pob_choice: “Abraham, Abraham.”
  chosen_spanish: «Abraham, Abraham»
  alternatives_spanish:
  - «¡Abraham, Abraham!»
  - «Abraham, Abraham.»
  lexicon: vocativo repetido
  rationale: Se conserva la repetición nominal como marca de urgencia y solemnidad. La coma interna comunica el vocativo de forma natural en español; se mantienen comillas de cita directa.
- source_word: ወይገብዕ፡
  english_pob_choice: And he was terrified
  chosen_spanish: Y él se aterrorizó
  alternatives_spanish:
  - Y quedó aterrorizado
  - Y tembló de terror
  lexicon: temor intenso / aterrorizado
  rationale: La revisión del audit trail corrige un sentido previo erróneo de 'hastened'. El contexto y la nota de revisión indican un verbo de terror o sobresalto; «se aterrorizó» reproduce esa reacción fuerte en español sin suavizarla.
- source_word: ወይቤ፡ ነየ፡ አነ።
  english_pob_choice: and said, “Here I am.”
  chosen_spanish: 'y dijo: «Aquí estoy»'
  alternatives_spanish:
  - 'y dijo: «Heme aquí»'
  - 'y respondió: «Aquí estoy»'
  lexicon: respuesta de disponibilidad
  rationale: «Aquí estoy» es natural y fiel para la respuesta de disponibilidad inmediata. «Heme aquí» sería más tradicional, pero menos transparente para el lector moderno; no se añade «respondió» porque el verbo «dijo» ya basta en el enunciado.
theological_decisions:
- issue: La reacción de Abraham ante la voz celestial
  english_pob_reading: he was terrified
  chosen_spanish_reading: él se aterrorizó
  alternative_spanish_readings:
  - quedó aterrorizado
  - temió grandemente
  rationale: Se preserva la lectura revisada del audit trail, que corrige una mala interpretación anterior. La escena subraya el impacto de la voz desde el cielo; la traducción debe reflejar ese sobresalto real sin atenuarlo.
  doctrine_reference: Narrative reverence before divine address; no doctrinal claim beyond the text.
translation_notes:
  revision_awareness: El texto inglés revisado pasó de 'he hurried' / 'he hastened' a 'he was terrified' tras revisión del ge'ez ወይገብዕ, que aquí significa 'ser aterrorizado' o 'encogerse de miedo'. La versión española sigue la lectura corregida y evita cualquier sugerencia de prisa.
  spanish_consistency_notes:
  - Se mantiene 'cielo' como referencia espacial directa al origen de la voz.
  - Se conserva la repetición 'Abraham, Abraham' para reflejar el vocativo enfático del original.
  - No se introduce terminología confesional adicional ni equivalentes litúrgicos que no estén en el texto.
