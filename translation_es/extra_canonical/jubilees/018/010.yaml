  rationale: Se hace una reparación menor de estilo para que la reacción de Abraham suene más natural y digna en español, manteniendo plenamente el sentido fuente de terror confirmado por el audit trail. No hacen falta notas al pie porque no se preservó nota léxica activa en el inglés final y el español no introduce una nueva ambigüedad significativa.
