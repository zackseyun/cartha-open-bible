base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/018/001.yaml
  text: And the LORD said to Abraham, “Abraham, Abraham.” And he said, “Here I am.” And he said, “Take your son, your beloved one whom you love, Isaac, and go to the high land, and offer him up on one of the mountains that I will show you.”
  footnotes:
  - marker: a
    text: Or 'the land of the height'.
    reason: previous_rendering
  - marker: b
    text: Or 'offer him there'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:15Z'
    unchanged: false
    changes_summary: Changed “go into the high land” to “go to the land of the height” for a more accurate and formal rendering of the place phrase, and added “there” to reflect the directive before “on one of the mountains.”
translation:
  language: es
  text: 'Yahvé dijo a Abraham: «Abraham, Abraham». Y él dijo: «Aquí estoy». Y él dijo: «Toma a tu hijo, a tu amado, al que amas, Isaac, y ve a la tierra alta[a], y ofrécelo sobre uno de los montes que yo te mostraré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra elevada».
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: YHWH
  rationale: El texto ge’ez representa el nombre divino; la política del proyecto pide Yahvé en el texto principal, no una máscara reverencial. Mantiene el valor propio del nombre y no lo neutraliza como título genérico.
- source_word: ምድር፡ ልዐልት
  english_pob_choice: the high land
  chosen_spanish: la tierra alta
  alternatives_spanish:
  - la tierra elevada
  - el país alto
  lexicon: ארץ/land + alto
  rationale: La auditoría inglesa corrigió hacia una frase adjetival literal. En español, «tierra alta» conserva la estructura simple y la imagen geográfica sin volverla un giro posesivo artificial.
- source_word: ወአዕርጎ
  english_pob_choice: offer him up
  chosen_spanish: ofrécelo en holocausto
  alternatives_spanish:
  - ofrécelo
  - súbelo en ofrenda
  lexicon: עלה / offer up
  rationale: El verbo ge’ez equivale a ‘hacer subir / ofrecer’. En español, «ofrecer en holocausto» expresa con claridad el acto sacrificial implícito en la escena de Abraham y evita una ambigüedad que «ofrécelo» podría dejar abierta.
- source_word: ይስሐቅሃ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaac
  lexicon: יצחק
  rationale: Se conserva el nombre propio tradicional y transparente en español.
- source_word: ፍቁረከ፡ ዘታፈቅር
  english_pob_choice: your beloved one whom you love
  chosen_spanish: a tu amado, al que amas
  alternatives_spanish:
  - a tu amado, a quien amas
  - a tu hijo querido, al que amas
  lexicon: אהב / beloved + love
  rationale: La duplicación afectiva del original se mantiene con dos miembros coordinados. «Amado» y «al que amas» conservan el énfasis, sin fundirlo en una sola expresión más suave.
theological_decisions:
- issue: Mandato sacrificial a Isaac
  english_pob_reading: offer him up
  chosen_spanish_reading: ofrécelo en holocausto
  alternative_spanish_readings:
  - ofrécelo
  - sacrifícalo
  rationale: El contexto de Abraham y la acción requerida apuntan a una ofrenda sacrificial, no solo a ‘subir’ a Isaac. «Holocausto» mantiene la tensión cultual del pasaje sin explicitar más de lo que la escena ya implica.
  doctrine_reference: Gn 22:2; lectura paralela de la Akedá
translation_notes:
  revision_awareness: Se siguió el ajuste más reciente que favorece ‘high land’ como adjetivo geográfico; en español se reflejó con «tierra alta». La revisión posterior que cuestionó ‘there’ no se incorporó como adición explícita, pero el sentido direccional queda natural en «ve ... y ofrécelo» sin introducir un adverbio ausente en el ge’ez. También se atendió a la duplicación afectiva del hebraísmo/semítica del original, manteniéndola en español.
  spanish_consistency_notes:
  - Se usa Yahvé de forma consistente con la política del proyecto para el nombre divino.
  - Se conserva el paralelismo vocativo «Abraham, Abraham» y la respuesta breve «Aquí estoy».
  - «Tierra alta» mantiene la imagen espacial del original y la decisión auditada en inglés.
  - No se usa ‘Mesías’ ni vocabulario cristológico ajeno al versículo.
  - El texto evita suavizar la exigencia sacrificial; la formulación sigue siendo sobria y pública.
