    rationale: El historial de revisiones dejó claro que no hay adverbio «allí» en el ge’ez; mantener esa alternativa induce al lector a una opción sin base textual.
  - severity: medium
    issue: La razón de la nota [b] como «textual_variant» es inexacta
    rationale: No se trata de una variante textual atestiguada en el material provisto, sino de una antigua posibilidad de traducción ya descartada.
