  to: 'Yahvé dijo a Abraham: «Abraham, Abraham». Y él dijo: «Aquí estoy». Y él dijo: «Toma a tu hijo, a tu amado, al que amas, Isaac, y ve a la tierra alta[a], y ofrécelo sobre uno de los montes que yo te mostraré».'
