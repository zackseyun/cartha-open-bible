translation:
  language: es
  text: 'Y yo me puse en pie delante de él y delante del príncipe Mastema, y Yahvé dijo: «Dile que no ponga la mano sobre el muchacho ni le haga nada, porque ahora sé que es uno que teme a Dios».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: YHWH
  rationale: El texto ge'ez corresponde al nombre divino; siguiendo la norma del proyecto para יהוה/YHWH, se conserva el nombre propio 'Yahvé' en vez de una máscara como 'el Señor'.
- source_word: መላእክት፡ መስተማ
  english_pob_choice: the prince Mastema
  chosen_spanish: el príncipe Mastema
  alternatives_spanish:
  - el jefe Mastema
  - el príncipe de Mastema
  lexicon: Mastema
  rationale: El nombre/título se mantiene como en la POB inglesa. 'Príncipe' reproduce la dignidad o rango del personaje sin añadir interpretación adicional.
- source_word: ሕፃን
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: child/young male
  rationale: '''Muchacho'' conserva la referencia a un varón joven con un tono natural en español y evita forzar una edad más precisa que la fuente no da.'
- source_word: ፈራሄ፡ እግዚአብሔር
  english_pob_choice: one who fears God
  chosen_spanish: uno que teme a Dios
  alternatives_spanish:
  - uno que reverencia a Dios
  - un temeroso de Dios
  lexicon: fear God / piety
  rationale: Se traduce literalmente la fórmula con 'teme a Dios', que refleja la cualidad pía reconocida en la fuente. 'Reverencia' suaviza demasiado el temor religioso presente en el texto.
- source_word: ኢይግበር፡ ምዝገኒ፡ ላዕሌሁ
  english_pob_choice: not to do anything to him
  chosen_spanish: ni hagas nada contra él
  alternatives_spanish:
  - ni le hagas nada
  - ni obres nada sobre él
  lexicon: do anything to him
  rationale: La negación amplia se conserva, pero 'contra él' explicita de manera natural la dirección de agresión implícita en el mandato y evita una construcción demasiado literal en español.
- source_word: ኢያውርድ፡ እዴሁ
  english_pob_choice: not to lay his hand upon the boy
  chosen_spanish: No le pongas la mano al muchacho
  alternatives_spanish:
  - No extiendas la mano sobre el muchacho
  - No pongas tu mano sobre el muchacho
  lexicon: lay his hand upon
  rationale: Se sigue la revisión inglesa que prefirió 'lay his hand' sobre 'lay down his hand'. En español, 'poner la mano' reproduce el gesto idiomático de acción física y conserva la fuerza de la prohibición.
theological_decisions:
- issue: Nombre divino en la voz directa del narrador/ángel
  english_pob_reading: the LORD said
  chosen_spanish_reading: Yahvé dijo
  alternative_spanish_readings:
  - el Señor dijo
  - Dios dijo
  rationale: La fuente ge'ez usa el nombre divino donde la POB inglesa puso 'the LORD'; según la terminología del proyecto, se traslada como 'Yahvé' para mantener la transparencia con el original.
  doctrine_reference: Divine Name / Tetragrammaton (YHWH)
- issue: Identidad moral de Abraham como temeroso de Dios
  english_pob_reading: he is one who fears God
  chosen_spanish_reading: es uno que teme a Dios
  alternative_spanish_readings:
  - es un hombre piadoso
  - es un reverente de Dios
  rationale: 'La frase conserva la evaluación teológica explícita de la escena: la obediencia de Abraham se interpreta como temor de Dios, no solo como piedad genérica.'
  doctrine_reference: Fear of God / piety as covenant faithfulness
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió 'lay down his hand' a 'lay his hand'. La redacción española evita esa ambigüedad con 'poner la mano', manteniendo la naturalidad y la fidelidad al gesto prohibido por el texto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el nombre divino, conforme a la norma del proyecto.
  - Se conserva 'Mastema' como nombre/título propio sin sustituirlo por una glosa explicativa no atestiguada.
  - '''Muchacho'' mantiene el referente juvenil sin introducir una precisión etaria inexistente en la fuente.'
  - La cláusula final preserva el diagnóstico teológico 'teme a Dios' sin atenuarlo.
