revisions:
- from: 'Y yo me puse en pie delante de él y delante del príncipe Mastema, y Yahvé dijo: «No le pongas la mano al muchacho ni hagas nada contra él, porque ahora sé que es uno que teme a Dios».'
  to: 'Y yo me puse en pie delante de él y delante del príncipe Mastema, y Yahvé dijo: «Dile que no ponga la mano sobre el muchacho ni le haga nada, porque ahora sé que es uno que teme a Dios».'
  rationale: Se restaura el mandato de transmisión presente en la fuente («Dile que...»), se ajusta la cadena verbal para conservar correctamente los referentes, y se mejora la naturalidad de la prohibición final con «ni le haga nada». Se mantiene «Yahvé», «príncipe Mastema», «muchacho» y «teme a Dios» por ser fieles al proyecto y a la fuente.
