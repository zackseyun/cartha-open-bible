translation:
  language: es
  text: 'Y vio el lugar desde lejos. Y llegó hasta el pozo de agua[a], y dijo a sus siervos: «Quédense aquí con los asnos[b], y el muchacho y yo iremos allá, adoraremos y volveremos a ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hoyo de agua’.
    reason: Preservar la alternativa previa del English POB (‘water-pit’) en español.
  - marker: b
    text: O ‘con el asno’.
    reason: Preservar la alternativa previa del English POB (‘with the donkey’) en español, aunque el texto principal correcto es plural.
lexical_decisions:
- source_word: ወርእየ፡ መካነ፡ እምርኁቅ።
  english_pob_choice: And he saw the place from afar.
  chosen_spanish: Y vio el lugar desde lejos.
  alternatives_spanish:
  - Y vio el lugar de lejos.
  - Y divisó el lugar desde lejos.
  lexicon: ver / lugar / desde lejos
  rationale: El ge'ez expresa una visión a distancia; 'desde lejos' reproduce bien el valor espacial sin añadir interpretación.
- source_word: ዐዘቅተ፡ ማይ፡
  english_pob_choice: the well of water
  chosen_spanish: el pozo de agua
  alternatives_spanish:
  - el pozo de aguas
  - el aljibe de agua
  lexicon: pozo / agua
  rationale: La revisión inglesa fijó 'well of water'; en español, 'pozo de agua' es natural y mantiene el paralelismo semántico sin forzar un calco extraño.
- source_word: አድግት
  english_pob_choice: the donkeys
  chosen_spanish: los asnos
  alternatives_spanish:
  - los burros
  - las acémilas
  lexicon: asno
  rationale: El término ge'ez es plural, por lo que el español debe reflejar pluralidad. 'Asnos' es más sobrio y bíblico que 'burros'.
- source_word: ወአነ፡ ወሕፃን፡
  english_pob_choice: and I and the boy
  chosen_spanish: y yo y el muchacho
  alternatives_spanish:
  - y yo con el muchacho
  - y yo y el niño
  lexicon: yo / muchacho
  rationale: '''Muchacho'' sigue de cerca la tradición narrativa y evita decidir innecesariamente entre ''niño'' y ''joven''.'
- source_word: ንበሩ፡ ... ንገብእ፡ ኀቤክሙ።
  english_pob_choice: Stay here ... and we will return to you.
  chosen_spanish: Quédense aquí ... y volveremos a ustedes.
  alternatives_spanish:
  - Permanezcan aquí ... y regresaremos a ustedes.
  - Quédense aquí ... y volveremos con ustedes.
  lexicon: quedarse / volver
  rationale: La forma exhortativa y la promesa de retorno se expresan con naturalidad en español. 'A ustedes' conserva el destinatario plural del texto.
theological_decisions:
- issue: ‘we will worship’ as cultic act before the journey
  english_pob_reading: and we will worship
  chosen_spanish_reading: adoraremos
  alternative_spanish_readings:
  - nos inclinaremos en adoración
  - daremos culto
  rationale: El verbo debe reflejar una acción reverente y cultual sin sobredeterminar la escena; 'adoraremos' es claro y compatible con el gesto de adoración implícito.
  doctrine_reference: Cultic worship language in narrative context
translation_notes:
  revision_awareness: 'La revisión inglesa reciente confirmó dos puntos relevantes para el español: (1) ''well of water'' debe entenderse literalmente como pozo, no como ''fosa de agua''; (2) አድግት es plural, por lo que el referente debe ser ''los asnos'', no singular. La traducción española sigue esas decisiones sin necesitar notas al pie.'
  spanish_consistency_notes:
  - Se mantiene 'pozo de agua' para reflejar el giro idiomático revisado en inglés.
  - Se usa plural 'los asnos' conforme al ge'ez y a la corrección textual reciente.
  - '''Yahvé'', ''Cristo'' y otras terminologías estándar del proyecto no aparecen en este versículo.'
  - La puntuación en estilo cita directa sigue usos contemporáneos del español bíblico.
