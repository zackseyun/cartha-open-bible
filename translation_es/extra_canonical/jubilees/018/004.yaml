    text: O ‘hoyo de agua’.
    reason: Preservar la alternativa previa del English POB (‘water-pit’) en español.
  - marker: b
    text: O ‘con el asno’.
    reason: Preservar la alternativa previa del English POB (‘with the donkey’) en español, aunque el texto principal correcto es plural.
  revision_rationale: Se mantiene el sentido del source y del POB, pero se añaden las notas alternativas exigidas por el rastro de auditoría y se pule una leve torpeza sintáctica en español con ‘el muchacho y yo’.
