translation:
  language: es
  text: 'Y dijo Isaac a su padre: «Padre». Y él dijo: «Aquí estoy, hijo mío». Y le dijo: «Mira: el fuego y el cuchillo y la leña; pero ¿dónde está la oveja[a] para el holocausto, padre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Oveja» reproduce el término geʿez de manera más amplia; en este contexto sacrificial puede referirse en general a un animal ovino, por lo que algunas traducciones optan por una expresión más específica como «cordero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ይስሐቅ / Isaac
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaac
  lexicon: nombre propio
  rationale: Se conserva el nombre propio tal como aparece en la fuente griega/latinizada y en el contexto bíblico estándar en español.
- source_word: አባ / father
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - papá
  lexicon: léxico común
  rationale: «Padre» reproduce el vocativo directo de la fuente y mantiene el tono reverente y narrativo del pasaje.
- source_word: ነየ / Here I am
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  lexicon: expresión idiomática
  rationale: «Aquí estoy» expresa con naturalidad en español la disponibilidad inmediata del hablante, sin cargarlo con un arcaísmo innecesario.
- source_word: እሳት
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - fuego
  lexicon: léxico concreto
  rationale: Se conserva el sustantivo concreto de la lista de objetos visibles en la escena.
- source_word: መጥባሕት
  english_pob_choice: the knife
  chosen_spanish: el cuchillo
  alternatives_spanish:
  - la navaja
  - el cuchillo sacrificial
  lexicon: léxico concreto
  rationale: La traducción directa y transparente es «cuchillo»; mantiene el objeto instrumental sin introducir precisión interpretativa no explicitada en la fuente.
- source_word: ዕፀው
  english_pob_choice: the wood
  chosen_spanish: la leña
  alternatives_spanish:
  - la madera
  lexicon: léxico concreto
  rationale: «Leña» comunica mejor en español el material ya preparado para el sacrificio, en un registro natural y bíblico.
- source_word: በግዕ
  english_pob_choice: the sheep
  chosen_spanish: el cordero
  alternatives_spanish:
  - la oveja
  - el carnero
  lexicon: léxico sacrificial
  rationale: Aunque el geʿez usa un término amplio para oveja/animal ovino, en el contexto del holocausto y la tradición sacrificial la opción más precisa y natural en español es «cordero».
- source_word: ጽንሓሕ / burnt offering
  english_pob_choice: burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: término cultual
  rationale: «Holocausto» es el término bíblico consagrado en español para la ofrenda completamente consumida por el fuego, y preserva la referencia cultual sin explicación añadida.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios respecto del texto previo; esta versión española sigue de cerca la disposición narrativa y la lista de objetos de la POB inglesa, pero apoya la elección léxica en la fuente geʿez y en el uso bíblico español.
  spanish_consistency_notes:
  - Se mantiene el vocativo repetido «padre» para reflejar la reiteración del original.
  - La secuencia «el fuego y el cuchillo y la leña» conserva la enumeración sin alisar la coordinación, porque la acumulación forma parte del estilo de la fuente y de la traducción inglesa auditada.
  - Se usa «holocausto» en sentido cultual bíblico, no en el uso moderno no religioso del término.
