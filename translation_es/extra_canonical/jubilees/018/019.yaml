base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/018/019.yaml
  text: And thus it is ordained and written on the heavenly tablets concerning Israel and his seed, that they should keep this festival seven days with festal joy.
  footnotes:
  - marker: a
    text: Or 'with joy.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:16Z'
    unchanged: false
    changes_summary: Changed 'with festal joy' to 'with joy' for closer lexical accuracy and more natural formal English; the source expresses joy/rejoicing, not an adjectival expansion.
translation:
  language: es
  text: Y así está ordenado y escrito en las tablas celestiales acerca de Israel y de su descendencia, para que celebren esta fiesta durante siete días con alegría festiva[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión puede entenderse simplemente como «con alegría»; el ge'ez también sugiere una alegría propia de la fiesta, por eso se traduce «alegría festiva».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወ*ከመዝ / 'And thus'
  english_pob_choice: And thus
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de esta manera
  - Así pues
  lexicon: conjunción + adverbio de modo
  rationale: Mantiene la continuidad lógica del mandato/registro y suena natural en español sin añadir interpretación.
- source_word: ሤሩዕ / 'ordained'
  english_pob_choice: ordained
  chosen_spanish: está ordenado
  alternatives_spanish:
  - ha sido ordenado
  - fue decretado
  lexicon: verbo pasivo
  rationale: Conserva el valor de decreto prescriptivo de la forma pasiva, sin introducir un matiz excesivamente jurídico que el contexto no exige.
- source_word: መጽሐፍ / 'written'
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - registrado
  - inscrito
  lexicon: participio pasivo
  rationale: «Escrito» reproduce de manera directa el hecho de quedar consignado en las tablas celestiales.
- source_word: ጽላተ፡ ሰማይ / 'heavenly tablets'
  english_pob_choice: heavenly tablets
  chosen_spanish: tablas celestiales
  alternatives_spanish:
  - tablillas celestiales
  - tablas del cielo
  lexicon: sustantivo compuesto
  rationale: «Tablas celestiales» es claro, solemne y ajustado al referente técnico del texto de Jubileos.
- source_word: በእንተ፡ እስራኤል፡ ወዲበ፡ ዘርኡ / 'concerning Israel and his seed'
  english_pob_choice: concerning Israel and his seed
  chosen_spanish: acerca de Israel y de su descendencia
  alternatives_spanish:
  - respecto de Israel y de su descendencia
  - sobre Israel y su descendencia
  lexicon: preposición + posesivo
  rationale: «Descendencia» conserva el sentido colectivo de זרע/seed mejor que una lectura individualista, y evita la ambigüedad de «su semilla» en español.
- source_word: ገቢረ፡ ዛቲ፡ በዓል / 'keep this festival'
  english_pob_choice: keep this festival
  chosen_spanish: celebren esta fiesta
  alternatives_spanish:
  - guarden esta fiesta
  - observen esta fiesta
  lexicon: verbo ritual
  rationale: «Celebren» comunica de modo natural la observancia festiva; «fiesta» conserva el sustantivo ritual del pasaje. «Guardar» podría sonar más calco y menos idiomático en español aquí.
- source_word: ሰቡዐ፡ ዕለተ / 'seven days'
  english_pob_choice: seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: expresión temporal
  rationale: «Durante» expresa duración continua y suena más natural en español formal.
- source_word: በፍሥሓ፡ በዓል / 'with joy' / 'with festal joy'
  english_pob_choice: with joy / with festal joy (revised audit issue)
  chosen_spanish: con alegría festiva
  alternatives_spanish:
  - con alegría
  - con gozo festivo
  lexicon: locución adverbial
  rationale: La revisión auditada señala la presencia de በዓል (fiesta) al final, por lo que conviene conservar el componente festivo en español. «Alegría festiva» refleja tanto la alegría como el matiz de celebración sin sobretraducir.
theological_decisions:
- issue: Referencia a las tablas celestiales como registro normativo
  english_pob_reading: written on the heavenly tablets
  chosen_spanish_reading: escrito en las tablas celestiales
  alternative_spanish_readings:
  - inscrito en las tablas celestiales
  - registrado en las tablas celestiales
  rationale: El texto presenta las tablas celestiales como lugar de inscripción autorizada. «Escrito» preserva el valor de registro divino sin añadir una doctrina extra al castellano.
  doctrine_reference: Jubilees 18:19; literatura de las tablas celestiales en Jubileos
- issue: Matiz de observancia festiva en la clausula final
  english_pob_reading: with joy
  chosen_spanish_reading: con alegría festiva
  alternative_spanish_readings:
  - con alegría
  - con gozo festivo
  rationale: La revisión del audit trail mostró que el ge'ez añade el término de fiesta al final. En español, omitirlo diluiría una tensión lexical documentada; mantener «festiva» conserva el sentido sin forzar una paráfrasis doctrinal.
  doctrine_reference: Revisión 2026-04-28 del audit trail para Jubileos 18:19
translation_notes:
  revision_awareness: El audio/registro inglés pasó por una revisión que primero redujo la frase final a «with joy», pero luego se corrigió al constatar que el ge'ez incluye de nuevo la palabra «fiesta» al cierre. La versión española sigue esa corrección y preserva el matiz festivo documentado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí, pues el versículo no contiene el nombre divino explícito.
  - «Tablas celestiales» se usa de manera uniforme para el término técnico del libro de Jubileos.
  - «Descendencia» se eligió para seed/זרע por coherencia con el lenguaje de promesa y linaje en español bíblico sin caer en literalidad extraña.
  - La cláusula final conserva el componente de celebración indicado por el audit trail, evitando simplificarlo a una alegría genérica.
