    changes_summary: Replaced “that is Mount Zion” with “it is Mount Zion” for a more direct rendering of the source while keeping the formal register and sense intact.
translation:
  language: es
  text: 'Y Abraham llamó a aquel lugar «Yahvé ha visto», de modo que se dice: «Yahvé ha visto»; es el monte Sion.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Dios
  lexicon: YHWH
  rationale: La fuente geʽez usa el nombre divino con valor de nombre propio; el criterio del proyecto pide «Yahvé» en el texto principal, manteniendo la referencia al nombre divino que el inglés POB expresó con «the LORD».
- source_word: ርእየ
  english_pob_choice: has seen
  chosen_spanish: ha visto
  alternatives_spanish:
  - ha mirado
  - ha contemplado
  lexicon: raʾa / ver
  rationale: El verbo expresa visión/percepción en forma perfecta; «ha visto» es la correspondencia más directa y natural en español, sin añadir matices no sustentados por el texto.
- source_word: ውእቱ ደብረ ጽዮን
  english_pob_choice: it is Mount Zion
  chosen_spanish: es el monte Sion
  alternatives_spanish:
  - es Monte Sion
  - es el monte de Sion
  lexicon: topónimo
  rationale: La cláusula identificadora final se rinde de forma directa y formal. «Monte Sion» conserva el topónimo bíblico habitual en español y reproduce la identificación del lugar sin expansión interpretativa.
theological_decisions:
- issue: Uso del nombre divino en un dicho etiológico
  english_pob_reading: The LORD has seen
  chosen_spanish_reading: Yahvé ha visto
  alternative_spanish_readings:
  - El SEÑOR ha visto
  - Dios ha visto
  rationale: No se enmascara el nombre divino con una convención tipográfica; se mantiene la referencia explícita a Yahvé conforme a la norma del proyecto y al valor del original.
  doctrine_reference: Tetragrámaton / nombre divino en traducción bíblica
- issue: Identificación final del lugar con Sion
  english_pob_reading: it is Mount Zion
  chosen_spanish_reading: es el monte Sion
  alternative_spanish_readings:
  - es el monte de Sion
  - es Sion
  rationale: La fuente concluye con una identificación directa. «Es el monte Sion» conserva el carácter declarativo sin debilitar la relación entre el nombre del lugar y el monte sagrado.
  doctrine_reference: toponimia bíblica y lectura etiológica
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «that is Mount Zion» a «it is Mount Zion» para ajustarse con más directez a la fuente; la redacción española sigue esa misma línea directa con «es el monte Sion».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en el texto principal.
  - Se conservó la estructura etiológica y la identificación final sin paráfrasis añadida.
  - «Sion» se usó como forma española estable del topónimo bíblico.
