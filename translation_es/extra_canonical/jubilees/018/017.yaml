translation:
  language: es
  text: Y Abraham fue a sus siervos, y ellos se levantaron y fueron juntos a Beer-seba, y Abraham habitó junto al Pozo del Juramento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּלֶךְ אברם / ወሖረ፡ አብርሃም፡
  english_pob_choice: And Abraham went
  chosen_spanish: Y Abraham fue
  alternatives_spanish:
  - Y Abraham se fue
  - Y Abraham marchó
  lexicon: ir
  rationale: El ge'ez expresa movimiento simple; 'fue' conserva la neutralidad narrativa del inglés POB sin añadir matiz de partida o intensidad no documentado.
- source_word: עבדים / ደቁ፡
  english_pob_choice: to his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus esclavos
  - a sus servidores
  lexicon: esclavo/siervo
  rationale: El inglés POB eligió 'servants', pero el contexto narrativo admite la terminología bíblica tradicional. 'Siervos' mantiene una relación de dependencia personal sin forzar 'esclavos' donde el audit trail no lo documenta.
- source_word: וַיָּקֻמוּ וַיֵּלְכוּ / ወትንሥኡ፡ ወሖሩ፡
  english_pob_choice: they arose and went together
  chosen_spanish: ellos se levantaron y fueron juntos
  alternatives_spanish:
  - se levantaron y caminaron juntos
  - se pusieron en pie y fueron juntos
  lexicon: levantarse / ir juntos
  rationale: '''Se levantaron'' reproduce el valor de acción sucesiva; ''fueron juntos'' preserva el matiz de compañía explícito en el inglés POB ''together''.'
- source_word: בְּאֵר שֶׁבַע / በርስሕ፡
  english_pob_choice: Beer-sheba
  chosen_spanish: Beer-seba
  alternatives_spanish:
  - Beerseba
  - Béersheba
  lexicon: topónimo
  rationale: Se mantiene el topónimo bíblico en una forma castellana reconocible y cercana a la transliteración del inglés POB, sin introducir una grafía eclesiástica no anclada en el texto fuente.
- source_word: וַיֵּשֶׁב אַבְרָהָם / ወኀደረ፡ አብርሃም፡
  english_pob_choice: and Abraham dwelt
  chosen_spanish: y Abraham habitó
  alternatives_spanish:
  - y Abraham moró
  - y Abraham vivió
  lexicon: habitar
  rationale: '''Habitó'' conserva el tono bíblico estable del inglés POB ''dwelt'' y es natural en español; evita ''moró'' por su mayor arcaísmo y ''vivió'' por perder la idea de residencia.'
- source_word: בְּאֵר הַשָּׁבֻעַ / ዐዘቅት፡ መሐላ።
  english_pob_choice: by the Well of the Oath
  chosen_spanish: junto al Pozo del Juramento
  alternatives_spanish:
  - junto al Pozo del Pacto
  - junto al Pozo del Voto
  lexicon: pozo / juramento
  rationale: '''Well of the Oath'' se vierte literalmente como ''Pozo del Juramento''. ''Juramento'' comunica el valor semántico de oath mejor que ''voto'' y evita cargar el texto con una interpretación teológica no explicitada en esta línea.'
translation_notes:
  revision_awareness: La versión en inglés POB y la revisión más reciente coinciden plenamente; no hubo cambios aplicados. El español sigue de cerca esa lectura estable sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se conservó un registro bíblico claro y sobrio.
  - Se evitó sustituir el topónimo por una forma litúrgica ajena al audit trail.
  - La relación de compañía quedó explícita con 'juntos', como en el inglés POB.
