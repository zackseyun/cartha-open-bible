translation:
  language: es
  text: 'Y dijo: «Dios verá para sí la oveja para la ofrenda quemada, mi hijo». Y se acercó al lugar del monte de Yahvé.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: God / the LORD in the same context
  chosen_spanish: Dios / Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: divine-name
  rationale: El texto ge'ez usa እግዚአብሔር, que en este contexto corresponde al nombre divino; por la norma del proyecto se rinde como Yahvé en el segmento final. En la cláusula previa, la frase 'God will see' expresa el sujeto teológico general y se traduce naturalmente como Dios en español.
- source_word: ይሬኢ
  english_pob_choice: will see for himself
  chosen_spanish: verá
  alternatives_spanish:
  - se verá proveer
  - proveerá
  lexicon: see/provide
  rationale: El verbo de ver aquí conserva la idea directa de percepción o provisión divina. El inglés POB eligió 'will see for himself' para evitar una paráfrasis excesiva; en español 'verá' mantiene esa fuerza sin añadir un giro explicativo no explicitado por el fuente.
- source_word: በግዐ
  english_pob_choice: the sheep
  chosen_spanish: el cordero
  alternatives_spanish:
  - la oveja
  - el carnero
  lexicon: animal sacrifice
  rationale: Aunque el término base puede abarcar oveja/cordero, el contexto de sacrificio quemado favorece en español 'cordero', que comunica de modo más natural la víctima sacrificial sin alejarse del campo semántico del original. 'Carnero' sería más específico de un macho adulto y no está exigido por el texto.
- source_word: ለጽንሓሕ
  english_pob_choice: for the burnt offering
  chosen_spanish: para la ofrenda quemada
  alternatives_spanish:
  - para el holocausto
  - para el sacrificio quemado
  lexicon: sacrifice terminology
  rationale: Se preserva el sentido técnico de sacrificio por fuego. 'Ofrenda quemada' es un español claro y reverente; 'holocausto' puede sonar arcaico o cargado por usos modernos, aunque sigue siendo una alternativa válida.
- source_word: መካን
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: place
  rationale: Se mantiene el sustantivo genérico sin sobreinterpretar la topografía. El texto no exige precisar más allá de 'el lugar'.
- source_word: ዘ*ደብረ፡ እግዚአብሔር
  english_pob_choice: of the mountain of the LORD
  chosen_spanish: del monte de Yahvé
  alternatives_spanish:
  - del monte del Señor
  - del monte de Dios
  lexicon: divine-name + mountain
  rationale: El genitivo expresa posesión o asociación con la montaña. Se usa 'Yahvé' conforme a la terminología base del proyecto para el nombre divino en español.
theological_decisions:
- issue: Divine name rendering in the same verse
  english_pob_reading: God ... the LORD
  chosen_spanish_reading: Dios ... Yahvé
  alternative_spanish_readings:
  - Dios ... el Señor
  - Señor ... el Señor
  rationale: El griego/inglés del POB distingue entre la referencia general a Dios y el nombre propio divino del final; en español se conserva esa distinción semántica y estilística con 'Dios' y 'Yahvé'.
  doctrine_reference: Tetragrammaton usage and source-language distinction
- issue: Sacrificial provision language
  english_pob_reading: will see for himself the sheep for the burnt offering
  chosen_spanish_reading: verá el cordero para la ofrenda quemada
  alternative_spanish_readings:
  - verá para sí el cordero para la ofrenda quemada
  - proveerá el cordero para la ofrenda quemada
  rationale: No se fuerza una expansión doctrinal explícita de 'proveer' si el original conserva literalmente el verbo de ver. La formulación deja abierta la resonancia de provisión sin imponerla como glosa.
  doctrine_reference: Narrative divine provision motif
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios, con acuerdo alto entre revisores. Por ello, se mantiene una traducción sobria y cercana al texto fuente, sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' para el nombre divino conforme a los defaults del proyecto.
  - Se mantiene 'Dios' para እግዚአብሔር en la primera cláusula por su función de sujeto general y para evitar una repetición innecesaria del nombre propio.
  - '''Ofrenda quemada'' conserva claridad moderna y evita una paraphrasis doctrinal.'
  - No se añaden notas porque el inglés POB no tenía notas y el registro fuente muestra alta concordancia.
