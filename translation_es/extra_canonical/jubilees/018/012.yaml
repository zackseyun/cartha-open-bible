    unchanged: false
    changes_summary: Capitalized 'Prince' as a title/name and added 'one' before 'ram' to reflect አሐዱ. Otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: Y Príncipe Mastema fue avergonzado. Abraham alzó sus ojos y miró, y he aquí que un carnero estaba atrapado por sus cuernos en el matorral. Abraham fue, tomó el carnero y lo ofreció en holocausto en lugar de su hijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መኰንን / Prince Mastema
  english_pob_choice: Prince Mastema
  chosen_spanish: el príncipe Mastema
  alternatives_spanish:
  - Príncipe Mastema
  - el príncipe Mastema
  lexicon: título/nombre propio
  rationale: El texto fuente presenta a Mastema con título personal; conservo «príncipe» como título y «Mastema» como nombre propio, siguiendo el ajuste auditado del inglés. No lo convierto en un nombre común ni en una glosa interpretativa.
- source_word: ወትገፍረ፡ ... ወርእየ፡
  english_pob_choice: was put to shame ... lifted up his eyes and looked
  chosen_spanish: fue avergonzado ... alzó sus ojos y miró
  alternatives_spanish:
  - quedó avergonzado ... levantó sus ojos y vio
  - fue humillado ... alzó sus ojos y miró
  lexicon: vergüenza / alzar los ojos / mirar
  rationale: La acción pasiva expresa vergüenza pública o derrota; «fue avergonzado» sigue de cerca la fuerza del inglés POB. «Alzó sus ojos y miró» mantiene la secuencia hebrea/semítica clásica sin suavizarla a una sola acción.
- source_word: አሐዱ፡ በሐኵ፡
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho carnero
  - un cordero
  lexicon: numeral + animal sacrificial
  rationale: El numeral «uno» se integra naturalmente en español como «un». «Carnero» refleja el animal adulto apto para sacrificio y conserva la precisión sacrificial mejor que «cordero».
- source_word: በአቅርንቲሁ፡
  english_pob_choice: by its horns
  chosen_spanish: por sus cuernos
  alternatives_spanish:
  - entre sus cuernos
  - con sus cuernos
  lexicon: horns
  rationale: «Por sus cuernos» expresa la idea de estar sujeto o atrapado por los cuernos en el matorral, sin forzar una imagen más específica que la fuente no exige.
- source_word: ወነሥአ፡ ለበሐኵ፡ ወአዕረገ፡ ለጽንሓሕ፡
  english_pob_choice: went and took the ram and offered it up as a burnt offering
  chosen_spanish: fue, tomó el carnero y lo ofreció en holocausto
  alternatives_spanish:
  - fue y tomó el carnero y lo ofreció como holocausto
  - tomó el carnero y lo elevó en holocausto
  lexicon: sacrificial offering
  rationale: «Holocausto» es el término técnico bíblico para una ofrenda totalmente quemada y corresponde al sentido sacrificial del texto. «Lo ofreció en holocausto» mantiene la estructura del inglés POB sin añadir glosa.
- source_word: ህየንተ፡ ወልዱ።
  english_pob_choice: instead of his son
  chosen_spanish: en lugar de su hijo
  alternatives_spanish:
  - en vez de su hijo
  - en sustitución de su hijo
  lexicon: substitution
  rationale: «En lugar de» expresa la sustitución sacrificial de manera directa y natural en español. Conserva la tensión teológica de sustitución sin explicitar más allá de lo que la fuente dice.
theological_decisions:
- issue: El título/nombre Mastema y su humillación
  english_pob_reading: Prince Mastema was put to shame
  chosen_spanish_reading: El príncipe Mastema fue avergonzado
  alternative_spanish_readings:
  - Mastema fue avergonzado
  - El príncipe Mastema fue humillado
  rationale: Conservo el título personal y la pasiva de vergüenza para no borrar la derrota pública del adversario. «Avergonzado» mantiene la ambigüedad entre vergüenza y humillación que el inglés POB también deja abierta.
  doctrine_reference: Literature of Jubilees; no doctrinal claim beyond the narrative defeat of Mastema
- issue: La sustitución del hijo por el carnero
  english_pob_reading: offered it up as a burnt offering instead of his son
  chosen_spanish_reading: lo ofreció en holocausto en lugar de su hijo
  alternative_spanish_readings:
  - lo ofreció como holocausto en vez de su hijo
  - lo presentó en holocausto como sustituto de su hijo
  rationale: La frase conserva explícitamente la sustitución sacrificial sin convertirla en comentario doctrinal. «En lugar de» reproduce el valor vicario del texto y evita ampliar la interpretación más allá de la evidencia.
  doctrine_reference: Tipología sacrificial / sustitución narrativa en Jubileos 18:12
translation_notes:
  revision_awareness: Se siguió la revisión auditada que capitaliza 'Prince' como título y añade 'one' para reflejar አሐዱ. La redacción española incorpora ambos elementos de forma natural con «el príncipe» y «un carnero», manteniendo la equivalencia óptima sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones porque este versículo no contiene el nombre divino.
  - Se conservó 'holocausto' como término sacrificial técnico, coherente con el registro bíblico y con el inglés POB.
  - No se añadió nota al texto porque no surgió una ambigüedad adicional que requiriera marcador de pie de página.
