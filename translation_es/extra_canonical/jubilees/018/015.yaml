  text: And he said, “By myself I have sworn, says the LORD, because you have done this thing and have not withheld your son, your firstborn, your beloved one, from me, surely blessing I will bless you, and multiplying I will multiply your seed like the stars of heaven and like the sand that is on the seashore, and your seed will inherit the cities of their enemies.”
  footnotes:
  - marker: a
    text: Or 'your son, your beloved one, from me'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:18Z'
    unchanged: false
    changes_summary: Reordered 'your beloved one' to modify 'your son' more naturally and accurately, and removed the em dashes for smoother formal English while preserving all source elements.
translation:
  language: es
  text: ‘Y dijo: «Por mí mismo he jurado, dice Yahvé, porque has hecho esta cosa y no me has retenido a tu hijo, tu primogénito, tu amado, ciertamente te bendeciré y ciertamente multiplicaré tu descendencia como las estrellas del cielo y como la arena que está en la orilla del mar; y tu descendencia heredará las ciudades de sus enemigos».’
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: YHWH
  rationale: El texto ge'ez corresponde al nombre divino; la norma del proyecto pide ‘Yahvé’ en el texto principal, evitando el enmascaramiento con ‘SEÑOR’.
- source_word: በዘረከ / በኵረከ (restaurado por revisión)
  english_pob_choice: your son, your firstborn
  chosen_spanish: tu hijo, tu primogénito
  alternatives_spanish:
  - tu hijo, tu primero nacido
  - tu hijo, tu heredero
  lexicon: בכור / firstborn
  rationale: La auditoría inglesa corrigió la omisión y restauró ‘firstborn’; en español ‘primogénito’ transmite la relación filial y el matiz de prioridad/nacimiento primero con registro bíblico claro.
- source_word: ዘአፍቀርከ
  english_pob_choice: your beloved one
  chosen_spanish: tu amado
  alternatives_spanish:
  - tu querido
  - tu amado hijo
  lexicon: אהב / beloved
  rationale: ‘Tu amado’ sigue de cerca el valor adjetival del ge'ez y mantiene la tensión textual separándolo de ‘tu hijo’ sin forzar una paráfrasis.
- source_word: ዘርከ
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu posteridad
  lexicon: zeraʿ / seed
  rationale: ‘Descendencia’ conserva el sentido colectivo y genealógico en español bíblico contemporáneo, evitando la literalidad de ‘simiente’ que hoy suena más arcaica.
- source_word: ባርኮ፡ እባርከከ፡ / multiplicando
  english_pob_choice: surely blessing I will bless you, and multiplying I will multiply
  chosen_spanish: ciertamente te bendeciré y ciertamente multiplicaré
  alternatives_spanish:
  - te bendeciré sin duda y multiplicaré en gran manera
  - te bendeciré, sí, te bendeciré, y multiplicaré
  lexicon: intensification by infinitive absolute-like repetition
  rationale: La repetición intensiva se reproduce con ‘ciertamente’ para conservar el énfasis semítico sin calco torpe.
- source_word: ከመ፡ ከዋክብተ፡ ሰማይ
  english_pob_choice: like the stars of heaven
  chosen_spanish: como las estrellas del cielo
  alternatives_spanish:
  - como las estrellas del firmamento
  - como las estrellas del cielo
  lexicon: simile / stars of heaven
  rationale: ‘Del cielo’ es la fórmula natural y fiel en español bíblico; mantiene el paralelismo con la siguiente imagen.
- source_word: ኆፃ፡ ዘይገጋን፡ ባሕር፡
  english_pob_choice: the sand that is on the seashore
  chosen_spanish: la arena que está en la orilla del mar
  alternatives_spanish:
  - la arena de la orilla del mar
  - la arena del mar
  lexicon: seashore
  rationale: ‘Orilla del mar’ expresa con claridad la imagen geográfica y evita una construcción demasiado literal o pesada.
- source_word: ይወርሱ፡ ዘርእከ፡ አህጉረ፡ ፀሮሙ
  english_pob_choice: your seed will inherit the cities of their enemies
  chosen_spanish: tu descendencia heredará las ciudades de sus enemigos
  alternatives_spanish:
  - tu descendencia poseerá las ciudades de sus enemigos
  - tu descendencia heredará las ciudades de sus adversarios
  lexicon: inherit / enemies
  rationale: ‘Heredará’ preserva el verbo de posesión hereditaria; ‘enemigos’ sigue la lectura inglesa y el tono hostil del contexto.
theological_decisions:
- issue: Nombre divino en el discurso directo
  english_pob_reading: says the LORD
  chosen_spanish_reading: dice Yahvé
  alternative_spanish_readings:
  - dice el Señor
  - dice el SEÑOR
  rationale: La política del proyecto exige el nombre divino explícito cuando el original corresponde a YHWH; no se adopta el masking devocional tradicional.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: Relación entre 'hijo', 'primogénito' y 'amado'
  english_pob_reading: your son, your firstborn, your beloved one
  chosen_spanish_reading: tu hijo, tu primogénito[a], tu amado
  alternative_spanish_readings:
  - tu hijo, tu amado, tu primogénito
  - tu hijo, tu querido, tu primogénito
  rationale: La revisión inglesa indica que ‘firstborn’ debe restaurarse. En español, mantener los tres sintagmas evita borrar ninguna de las capas del original y preserva la tensión entre filiación, primogenitura y afecto.
  doctrine_reference: Isaac as tested son / covenant offering tradition
translation_notes:
  revision_awareness: 'La versión inglesa más reciente había reordenado ‘your beloved one’ para que modificara a ‘your son’, pero la revisión posterior restituyó explícitamente ‘your firstborn’ tras detectar una omisión de la lectura ge''ez. Esta versión española refleja la lectura corregida y mantiene separadas las tres cualidades: hijo, primogénito y amado.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por la política terminológica del proyecto para el nombre divino.
  - Se conserva el paralelismo repetitivo con ‘ciertamente... y ciertamente...’ como equivalente del intensivo semítico.
  - ‘Descendencia’ se emplea consistentemente para ‘seed’ en sentido colectivo genealógico.
  - La nota al pie está anclada en ‘primogénito’ para evitar ambigüedad y cumplir la validación.
