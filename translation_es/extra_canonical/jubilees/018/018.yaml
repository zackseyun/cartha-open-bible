translation:
  language: es
  text: Y él celebró esta fiesta cada año durante siete días con alegría, y la llamó la Fiesta de Yahvé, de acuerdo con los siete días durante los cuales había ido y regresado en paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በዓለ / festival
  english_pob_choice: festival
  chosen_spanish: fiesta
  alternatives_spanish:
  - festival
  lexicon: terminología festiva
  rationale: El inglés POB usa “festival”; en español, “fiesta” transmite bien la celebración religiosa anual y suena natural y digna. “Festival” es posible, pero “fiesta” evita un matiz demasiado moderno o secular.
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: nombre divino
  rationale: Siguiendo el criterio del proyecto, el nombre divino se renderiza como “Yahvé” y no se máscara con “SEÑOR”. Esto mantiene la referencia explícita al nombre en el texto fuente.
- source_word: ሰቡዐ ዕለተ / seven days
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - siete jornadas
  lexicon: duración temporal
  rationale: “Siete días” es la forma más directa y clara en español. “Jornadas” sería más literario pero menos transparente aquí.
- source_word: በፍሥሓ / with joy
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - gozosamente
  lexicon: estado afectivo
  rationale: “Alegría” es natural y plenamente fiel. “Gozo” también sería válido, pero “alegría” evita una tonalidad más eclesiástica que no añade precisión.
- source_word: በከመ / according to
  english_pob_choice: according to
  chosen_spanish: de acuerdo con
  alternatives_spanish:
  - según
  lexicon: relación normativa/comparativa
  rationale: “De acuerdo con” expresa bien la correspondencia entre la duración de la fiesta y los siete días del viaje de ida y vuelta. “Según” también sería correcto, pero aquí la construcción explicativa queda más fluida.
- source_word: ሖረ ወተመይጠ፡ በሰላም / had gone and returned in peace
  english_pob_choice: he had gone and returned in peace
  chosen_spanish: había ido y regresado en paz
  alternatives_spanish:
  - había ido y vuelto en paz
  - había ido y retornado en paz
  lexicon: movimiento de ida y vuelta
  rationale: “Regresado” conserva el paralelismo de ida/vuelta en español contemporáneo. “En paz” mantiene la idea de un viaje seguro y concluido sin peligro.
theological_decisions:
- issue: Cómo traducir el nombre festivo asociado al nombre divino
  english_pob_reading: the Festival of the LORD
  chosen_spanish_reading: la Fiesta de Yahvé
  alternative_spanish_readings:
  - la fiesta del Señor
  - la fiesta de Yahvé
  rationale: La lectura inglesa conserva el nombre divino explícito. En español se mantiene “Yahvé” para no ocultar el referente del tetragrámaton, coherente con la política del proyecto y con la fuente ge’ez.
  doctrine_reference: Nombre divino / tetragrámaton
- issue: Relación entre los siete días de la fiesta y los siete días del viaje
  english_pob_reading: according to the seven days during which he had gone and returned in peace
  chosen_spanish_reading: de acuerdo con los siete días durante los cuales había ido y regresado en paz
  alternative_spanish_readings:
  - según los siete días durante los cuales había ido y vuelto en paz
  rationale: La frase conserva la comparación temporal y no la convierte en una explicación teológica adicional. Se mantiene la simetría del viaje como base del calendario festivo.
  doctrine_reference: Memoria litúrgica / narración fundacional
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada recientemente y quedó sin cambios, con alto acuerdo entre revisores; por tanto, la propuesta española sigue de cerca esa lectura estable sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se preserva el nombre divino como “Yahvé”, conforme al estándar del proyecto.
  - Se mantiene un español claro y litúrgicamente digno sin calcar la sintaxis inglesa.
  - No se añadieron notas al pie porque el pasaje no presenta variantes textuales ni ambigüedades españolas que requieran anclaje.
