translation:
  language: es
  text: 'Y le dije[a]: «No extiendas tu mano contra el muchacho, ni le hagas nada, porque ahora sé que temes a Dios y no me has negado a tu hijo, tu primogénito[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y él le dijo».
    reason: La forma ge'ez ha sido discutida en la historia de revisión; la auditoría final favorece la primera persona, pero conviene conservar la alternativa previamente considerada.
  - marker: b
    text: La forma transmitida en el texto proporcionado parece reflejar un error de OCR por «tu primogénito»; una lectura previa fue «tu descendencia» o «tu simiente».
    reason: La auditoría inglesa documenta una tensión textual entre la forma OCR y la lectura crítica de Charles 1895; la nota preserva esa información relevante.
lexical_decisions:
- source_word: ወእቤሎ
  english_pob_choice: And I said to him
  chosen_spanish: Y le dije
  alternatives_spanish:
  - Y él le dijo
  - Y yo le dije
  lexicon: verbo de decir en primera persona singular
  rationale: El ge'ez es primera persona singular perfecta; por eso en español corresponde «le dije», no tercera persona. Se mantiene el encuadre narrativo de habla directa sin añadir sujeto explícito innecesario.
- source_word: አትፈኑ፡ እዴከ፡ ዲበ፡ ሕፃን፡
  english_pob_choice: Do not stretch out your hand against the boy
  chosen_spanish: No extiendas tu mano contra el muchacho
  alternatives_spanish:
  - No alargues tu mano contra el muchacho
  - No pongas tu mano sobre el muchacho
  lexicon: expresión idiomática de amenaza/violencia
  rationale: «Extender la mano» es una equivalencia natural y fiel para el gesto de agresión. «Muchacho» conserva el valor del referente joven sin sobrecargar el tono.
- source_word: ወአትግበር፡ ምንተኒ፡ ዲቤሁ፡
  english_pob_choice: and do not do anything to him
  chosen_spanish: ni hagas nada contra él
  alternatives_spanish:
  - ni le hagas nada
  - ni hagas cosa alguna contra él
  lexicon: negación con alcance total
  rationale: La frase evita añadir matices no presentes y conserva la fuerza de prohibición completa. «Contra él» explicita el valor hostil que el contexto exige en español.
- source_word: ፈራሄ፡ እግዚአብሔር፡
  english_pob_choice: you fear God
  chosen_spanish: temes a Dios
  alternatives_spanish:
  - tienes temor de Dios
  - eres temeroso de Dios
  lexicon: temor reverente
  rationale: «Temes a Dios» expresa de forma directa y sobria el temor reverente del original. «Temor de Dios» sería también posible, pero la forma verbal encaja mejor en la cláusula.
- source_word: ወኢ*ምሕከ፡ ወልደከ፡
  english_pob_choice: and you have not withheld your son
  chosen_spanish: y no has retenido de mí a tu hijo
  alternatives_spanish:
  - y no has negado a tu hijo
  - y no me has rehusado a tu hijo
  lexicon: verbo de retener/abstenerse
  rationale: «Retener» conserva la idea de no reservar o no apartar para sí, y «de mí» refleja el movimiento relacional del original. «Tu hijo» es más natural en español que una repetición literal de «hijo» sin posesivo.
- source_word: በዘረከ / በኵረከ
  english_pob_choice: your seed / your firstborn
  chosen_spanish: tu primogénito
  alternatives_spanish:
  - tu descendencia
  - tu simiente, tu primogénito
  lexicon: término textual con tensión crítica
  rationale: La evidencia crítica indicada por la revisión favorece «primogénito» como lectura correcta del pasaje. En español se integra con naturalidad en la última cláusula, que además evita una lectura biomecánica de «descendencia» que no corresponde aquí.
theological_decisions:
- issue: Identificación de la acción prohibida sobre el muchacho
  english_pob_reading: Do not stretch out your hand against the boy, and do not do anything to him
  chosen_spanish_reading: No extiendas tu mano contra el muchacho, ni hagas nada contra él
  alternative_spanish_readings:
  - No extiendas tu mano sobre el muchacho, ni le hagas nada
  rationale: Se conserva la doble prohibición con un matiz de agresión explícita («contra él») para reflejar el contexto sacrificial y la urgencia de la intervención divina sin suavizarla.
  doctrine_reference: Gn 22:12; fe obediente y detención del sacrificio
- issue: Reverencia hacia Dios
  english_pob_reading: you fear God
  chosen_spanish_reading: temes a Dios
  alternative_spanish_readings:
  - tienes temor de Dios
  - eres temeroso de Dios
  rationale: La traducción mantiene el sentido de reverencia obediente, no solo emoción de miedo. El español permite expresar esa tensión sin necesidad de expandirla.
  doctrine_reference: Gn 22:12; temor de Dios como obediencia reverente
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió por error la persona verbal y dejó sin resolver la lectura crítica de ''your firstborn''; aquí se restaura la primera persona («le dije») y se adopta la lectura revisada por la auditoría textual: ''tu primogénito''. No se añaden notas al pie porque no hay alternativa retenida en el texto final.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de segunda persona singular, coherente con el discurso de Dios o del mensajero en esta escena.
  - Se evita 'SEÑOR' para Yahvé porque este verso, en la tradición auditada, usa 'Dios' y no requiere máscara del nombre divino.
  - No se usa 'Cristo' ni terminología eclesiástica añadida; el texto permanece narrativo y bíblico en español claro.
