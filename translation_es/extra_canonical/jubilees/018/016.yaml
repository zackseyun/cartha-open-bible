base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/018/016.yaml
  text: And in your seed all the nations of the earth will be blessed, because you have obeyed my voice, and I have made known to all that you are faithful to me in all that I have said to you. Go in peace.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:18Z'
    unchanged: false
    changes_summary: Changed 'to everyone' to 'to all' for a slightly more formal and literal rendering of ለኵሉ, while preserving the rest of the accurate draft.
translation:
  language: es
  text: Y en tu descendencia serán bendecidas todas las naciones de la tierra, porque has obedecido mi voz, y he dado a conocer a todos que eres fiel a mí en todo lo que te he dicho. «Ve en paz».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በዘርእከ
  english_pob_choice: in your seed
  chosen_spanish: en tu descendencia
  alternatives_spanish:
  - en tu semilla
  - en tu linaje
  lexicon: descendencia
  rationale: La forma ge'ez corresponde a la promesa de una posteridad/descendencia; en español bíblico y claro, "descendencia" conserva el sentido colectivo sin sonar mecánico. "Semilla" sería demasiado literal y ambiguo; "linaje" es posible, pero menos directo aquí.
- source_word: ኵሎሙ፡ አሕዛበ፡ ምድር
  english_pob_choice: all the nations of the earth
  chosen_spanish: todas las naciones de la tierra
  alternatives_spanish:
  - todos los pueblos de la tierra
  - todas las gentes de la tierra
  lexicon: naciones
  rationale: El conjunto designa a los pueblos/gentes de la tierra; "naciones" sigue el registro bíblico y mantiene la amplitud universal del original y del POB inglés.
- source_word: ህየንተ፡ ዘሰማዕከ፡ ቃለ፡ ዚአየ
  english_pob_choice: because you have obeyed my voice
  chosen_spanish: porque has obedecido mi voz
  alternatives_spanish:
  - por cuanto has obedecido mi voz
  - porque has escuchado mi voz
  lexicon: obedecer / voz
  rationale: El texto ge'ez expresa respuesta obediente a la voz divina; "obedecido mi voz" reproduce bien el valor semítico del giro y coincide con el POB inglés. "Escuchado" debilitaría la exigencia de obediencia.
- source_word: ወአይደዐኩ፡ ለኵሉ
  english_pob_choice: and I have made known to all
  chosen_spanish: y he dado a conocer a todos
  alternatives_spanish:
  - y he hecho saber a todos
  - y he dado a conocer a cada uno
  lexicon: dar a conocer
  rationale: La revisión inglesa fijó "to all" para ለኵሉ; en español "a todos" conserva esa literalidad. "He dado a conocer" mantiene el verbo de revelación/divulgación sin forzar un tecnicismo.
- source_word: ምእመን
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - fiel a mí
  - creyente
  lexicon: fiel
  rationale: El término ge'ez comunica fidelidad/lealtad, no simplemente fe subjetiva. "Fiel" preserva la relación de lealtad a Dios; "creyente" sería inexacto aquí.
- source_word: ሖር፡ በሰላም
  english_pob_choice: Go in peace
  chosen_spanish: Ve en paz
  alternatives_spanish:
  - Vete en paz
  - Anda en paz
  lexicon: paz
  rationale: La fórmula de despedida es idiomática en español bíblico y moderno. "Ve en paz" es breve, digno y fiel al imperativo final.
theological_decisions:
- issue: Universal blessing through Abrahamic seed
  english_pob_reading: And in your seed all the nations of the earth will be blessed
  chosen_spanish_reading: Y en tu descendencia serán bendecidas todas las naciones de la tierra
  alternative_spanish_readings:
  - Y en tu descendencia todas las naciones de la tierra serán bendecidas
  - Y por medio de tu descendencia serán bendecidas todas las naciones de la tierra
  rationale: La construcción pasiva conserva el énfasis en la bendición que recae sobre las naciones y evita introducir una explicación causal que no está explícita en el texto. "En tu descendencia" mantiene la formulación promesa-covenantal del pasaje.
  doctrine_reference: Promesa abrahámica / bendición universal
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'to everyone' por 'to all' para ajustar ለኵሉ con mayor literalidad y formalidad. La redacción española sigue esa decisión con 'a todos', sin ampliar ni singularizar el destinatario.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en este proyecto cuando el hebreo explícito lo requiera; aquí el pasaje usa la voz divina en primera persona y no introduce el Tetragrámaton como forma escrita en español.
  - Se prefiere 'descendencia' para lenguaje de promesa patriarcal por ser más natural y fiel que 'semilla'.
  - Se conserva el tono bíblico-digno sin arcaísmos innecesarios; la cita final se marca con comillas latinas españolas.
