translation:
  language: es
  text: Y se levantó muy de mañana, ensilló su asno, tomó consigo a dos esclavos y a Isaac, su hijo; partió la leña para el holocausto, y fue al lugar al tercer día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአሌለየ፡ በነግህ፡
  english_pob_choice: And he rose early in the morning
  chosen_spanish: Y se levantó muy de mañana
  alternatives_spanish:
  - Y se levantó de madrugada
  - Y se levantó temprano por la mañana
  lexicon: levantarse / de mañana
  rationale: La secuencia ge'ez expresa levantarse temprano; «muy de mañana» conserva el valor temporal y suena natural en español bíblico sin volverlo arcaico en exceso.
- source_word: ወጸዐነ፡ አድጎ፡
  english_pob_choice: and saddled his donkey
  chosen_spanish: ensilló su asno
  alternatives_spanish:
  - ensilló su burro
  - aparejó su asno
  lexicon: asno
  rationale: El animal es un asno; «ensilló» corresponde al acto de preparar el animal para montar, y «asno» es preciso y bíblicamente transparente.
- source_word: ደቂቀ፡
  english_pob_choice: two servants
  chosen_spanish: a dos siervos
  alternatives_spanish:
  - a dos esclavos
  - a dos criados
  lexicon: siervo
  rationale: Aunque el valor básico puede ser servidumbre, en español de este pasaje «siervos» comunica la relación subordinada de manera comprensible y evita una aspereza innecesaria en un contexto narrativo patriarcal; se mantiene la cercanía al campo semántico de servicio.
- source_word: ወይስሐቅሃ፡ ወልደ፡
  english_pob_choice: and Isaac his son
  chosen_spanish: y a Isaac, su hijo
  alternatives_spanish:
  - e Isaac, su hijo
  - y a Isaac, su hijo también
  lexicon: Isaac / su hijo
  rationale: Se conserva la identificación directa sin añadir énfasis no presente en el original. La coma ayuda a la claridad en español.
- source_word: ወዐፀወ፡ መሥዋዕተ፡ ሰፀረ፡
  english_pob_choice: and he split the wood for the burnt offering
  chosen_spanish: partió la leña para el holocausto
  alternatives_spanish:
  - cortó la leña para el holocausto
  - partió la leña para la ofrenda quemada
  lexicon: holocausto
  rationale: «Holocausto» refleja el término sacrificial tradicional usado en español bíblico para el sacrificio totalmente quemado, y corresponde al sentido del inglés POB «burnt offering».
- source_word: ወሖረ፡ ውስተ፡ መካን፡
  english_pob_choice: and he went to the place
  chosen_spanish: y fue al lugar
  alternatives_spanish:
  - y fue al sitio
  - y se dirigió al lugar
  lexicon: lugar
  rationale: El ge'ez no especifica más que «el lugar»; se conserva esa indefinición, importante para la narración y para la referencia posterior al lugar señalado por Dios.
- source_word: '*በሠሉስ፡ ዕለት፡'
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: tercer día
  rationale: «Al tercer día» es la forma natural en español para indicar el momento de llegada, y preserva el valor temporal del original y del inglés POB.
theological_decisions:
- issue: Término sacrificial para burnt offering
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - sacrificio quemado
  rationale: En español bíblico, «holocausto» es el término técnico establecido para un sacrificio completamente consumido por el fuego. Aunque puede sonar tradicional, aquí es la forma más precisa y reconocible para el género y la temática ritual del pasaje.
  doctrine_reference: Levítico 1; uso sacrificial bíblico tradicional
- issue: Designación de los acompañantes
  english_pob_reading: two servants
  chosen_spanish_reading: dos siervos
  alternative_spanish_readings:
  - dos esclavos
  - dos criados
  rationale: No se fuerza «esclavos» porque el ge'ez y el contexto narrativo permiten un término de servicio más amplio. «Siervos» mantiene subordinación sin introducir una carga social excesiva que no esté explícita en este versículo.
  doctrine_reference: Narrativa patriarcal en Génesis 22 / Jubileos 18
translation_notes:
  revision_awareness: El texto inglés POB y el control de revisión indican alta concordancia y ausencia de cambios. La versión española sigue esa línea sin introducir variantes textuales ni notas de crítica textual, y mantiene el mismo contenido narrativo en orden natural para el español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del texto porque este versículo no contiene el nombre divino ni una cita directa que lo requiera.
  - Se preserva la terminología sacrificial con «holocausto» por coherencia con el registro bíblico español.
  - No se añadieron notas al pie porque el inglés POB no documenta variantes ni ambigüedades relevantes en este versículo.
