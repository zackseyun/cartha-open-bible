  text: And the LORD called to Abraham by name a second time from heaven, as he had shown me, that we should speak in the name of the LORD.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:16Z'
    unchanged: false
    changes_summary: Revised word order for natural English ('called to Abraham by name'), added commas for clarity, and retained the source's comparative clause and purpose/result wording without paraphrase.
translation:
  language: es
  text: Y Yahvé llamó a Abraham por nombre por segunda vez desde el cielo, como me había mostrado, para que habláramos en nombre de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: YHWH
  rationale: El texto ge'ez usa el nombre divino, y la norma del proyecto pide renderizar יהוה/YHWH como «Yahvé» en el texto principal. Se evita la máscara litúrgica «SEÑOR» porque aquí el flujo fuente/auditado preserva el nombre divino explícitamente.
- source_word: ወጸውዖ
  english_pob_choice: called to
  chosen_spanish: llamó a
  alternatives_spanish:
  - llamó
  - convocó a
  lexicon: qara / llamar
  rationale: La construcción indica un acto de llamada dirigido a Abraham. En español, «llamar a» mantiene la dirección verbal sin añadir matiz más fuerte como «convocó».
- source_word: በስሙ
  english_pob_choice: by name
  chosen_spanish: por su nombre
  alternatives_spanish:
  - por nombre
  - nombrándolo
  lexicon: name / nombre
  rationale: La secuencia expresa identificación nominal, no solo mención de un nombre abstracto. «Por su nombre» suena natural en español y preserva la relación directa entre llamado e identificación.
- source_word: ዳግመ
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - de nuevo
  lexicon: second time
  rationale: «Por segunda vez» reproduce la repetición explícita del original con claridad idiomática en español.
- source_word: እምሰማይ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - desde los cielos
  lexicon: heaven / sky
  rationale: El ge'ez apunta al lugar de procedencia celestial. «Desde el cielo» es el equivalente más claro y sobrio en español bíblico contemporáneo.
- source_word: በከመ አስተረአየኒ
  english_pob_choice: as he had shown me
  chosen_spanish: como me lo había mostrado
  alternatives_spanish:
  - como me había mostrado
  - tal como me lo había mostrado
  lexicon: show / reveal
  rationale: La forma verbal expresa una revelación previa a Abraham/ al narrador. «Me lo había mostrado» conserva el dativo implícito y la referencia al contenido mostrado, según el audit trail inglés.
- source_word: ከመ ንትናገር
  english_pob_choice: that we should speak
  chosen_spanish: para que habláramos
  alternatives_spanish:
  - para que hablemos
  - que habláramos
  lexicon: speak / say
  rationale: El valor final/purpose se expresa mejor con «para que + imperfecto de subjuntivo» en español. «Habláramos» mantiene el sentido cooperativo plural sin volverlo mecánico.
- source_word: በስመ እግዚአብሔር
  english_pob_choice: in the name of the LORD
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - en el nombre de Yahvé
  - en nombre del Señor
  lexicon: name of the LORD / divine name
  rationale: La locución fija española «en nombre de» comunica el valor de representación/autorización del original. Se mantiene «Yahvé» para conservar la referencia al nombre divino.
theological_decisions:
- issue: Modo de referencia al nombre divino
  english_pob_reading: the LORD ... in the name of the LORD
  chosen_spanish_reading: Yahvé ... en nombre de Yahvé
  alternative_spanish_readings:
  - el Señor ... en nombre del Señor
  - Yahvé ... en el nombre de Yahvé
  rationale: El pasaje repite el nombre divino y el encargo de hablar en ese nombre. La traducción mantiene la duplicación para no ocultar la correspondencia con el original y seguir la política del proyecto sobre el Tetragrámaton.
  doctrine_reference: Éxodo 3:15; Éxodo 20:7
- issue: Relación entre la llamada divina y la mediación profética
  english_pob_reading: called to Abraham by name ... as he had shown me, that we should speak
  chosen_spanish_reading: llamó a Abraham por su nombre ... como me lo había mostrado, para que habláramos
  alternative_spanish_readings:
  - llamó a Abraham ... para que habláramos
  - llamó a Abraham por nombre ...
  rationale: 'El texto conserva una cadena revelación-encargo: lo mostrado al narrador fundamenta el hablar autorizado. No se explicita más de lo que el fuente permite, pero sí se mantiene la finalidad de la palabra dada.'
  doctrine_reference: Números 12:6-8; Amós 3:7
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó el orden a «called to Abraham by name» y mantuvo la cláusula comparativa y la finalidad. La propuesta española sigue esa misma estructura sin añadir contenido, preservando la referencia explícita al nombre divino y el vínculo entre revelación previa y mandato de hablar.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para el nombre divino, conforme al estándar del proyecto.
  - «Hablar en nombre de» se prefirió a formulaciones más eclesiásticas o más explicativas, porque reproduce con naturalidad el valor de autorización/representación del original.
  - No se añadieron notas de pie porque el verso no introduce una variante textual o ambigüedad que requiera aparato adicional en español.
