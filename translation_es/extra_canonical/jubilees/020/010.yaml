    rationale: Aunque calca la revisión inglesa, en español un «nombre combinado» suena torpe. «Quedó unido» o «se unió» comunica mejor el resultado de ተጸምደ aplicado al nombre sin perder la base textual.
  revised_spanish_text: el desierto. Y estos se mezclaron con aquellos, y su nombre quedó unido como árabes e ismaelitas.
