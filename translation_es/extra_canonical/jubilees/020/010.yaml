  text: el desierto. Y estos se mezclaron con aquellos, y su nombre quedó unido como árabes e ismaelitas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ገዳም
  english_pob_choice: the desert
  chosen_spanish: el desierto
  alternatives_spanish:
  - el yermo
  - la región desértica
  lexicon: N/A
  rationale: El geʽez designa aquí una región desértica; «el desierto» reproduce con naturalidad el sustantivo común y mantiene la brevedad del original y de la traducción inglesa POB.
- source_word: ወተደመሩ እሉ ምስለ እሉ
  english_pob_choice: And these mingled with those
  chosen_spanish: Y estos se mezclaron con aquellos
  alternatives_spanish:
  - Y estos se juntaron con aquellos
  - Y estos se unieron con aquellos
  lexicon: N/A
  rationale: La decisión inglesa de «mingled» se apoya en la idea de mezcla/mezclarse; «se mezclaron» es idiomático en español y conserva la relación entre dos grupos sin añadir matices no atestiguados.
- source_word: ወተጸምደ ስሞሙ
  english_pob_choice: and their name was combined
  chosen_spanish: y su nombre quedó combinado
  alternatives_spanish:
  - y su nombre fue combinado
  - y su nombre se unió
  lexicon: N/A
  rationale: Se conserva el valor de unión/combina­ción del verbo geʽez, según la revisión auditada que rechazó «was called». «Quedó combinado» expresa un resultado estable sin convertirlo en un simple acto de denominación.
- source_word: ዓረበ ወእስማዔላዊያን
  english_pob_choice: as Arabs and Ishmaelites
  chosen_spanish: como árabes e ismaelitas
  alternatives_spanish:
  - como árabes e ismaelitas
  - como árabes y ismaelitas
  lexicon: N/A
  rationale: Se mantienen los etnónimos de forma directa. «Árabes e ismaelitas» sigue la forma tradicional de los nombres y respeta el enlace copulativo antes de vocal en español.
theological_decisions:
- issue: La relación entre mezcla de grupos y el resultado del nombre
  english_pob_reading: their name was combined as Arabs and Ishmaelites
  chosen_spanish_reading: su nombre quedó combinado como árabes e ismaelitas
  alternative_spanish_readings:
  - su nombre fue llamado árabes e ismaelitas
  - su nombre se convirtió en árabes e ismaelitas
  rationale: La lectura auditada privilegia el manuscrito geʽez con sentido de combinación/unión, no de simple apelación. La versión española evita borrar esa tensión textual y refleja que el resultado nace de la mezcla de los grupos.
  doctrine_reference: No aplica una decisión doctrinal; es una decisión textual y lexical basada en la tradición crítica del pasaje.
translation_notes:
  revision_awareness: Se incorporó la revisión crítica más reciente que corrige la antigua lectura «was called» a «was combined», coherente con el verbo geʽez ተጸምደ y con el contexto de mezcla de dos grupos.
  spanish_consistency_notes:
  - Se mantiene «árabes» e «ismaelitas» sin mayúsculas internas, conforme al uso español para etnónimos comunes en este contexto.
  - No se introduce «Cristo», «SEÑOR» ni otras terminologías ajenas al pasaje.
  - La traducción conserva la estructura sintáctica breve del original y de la POB inglesa, sin añadir explicaciones interpretativas.
