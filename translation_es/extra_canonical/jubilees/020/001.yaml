translation:
  language: es
  text: Y en el cuadragésimo segundo jubileo, en el primer año de la séptima semana, Abraham llamó a Ismael y a sus doce hijos, y a Isaac y a sus dos hijos, y a los seis hijos de Cetura y a sus hijos. Y les mandó que guardaran el camino de Yahvé, que practicaran la justicia, que cada uno amara a su hermano, y que así cada uno estuviera entre todos los pueblos, caminando juntos[a] para practicar la justicia y la rectitud sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «caminando uno con otro»; la expresión ge''ez tiene un matiz recíproco, pero «caminando juntos» suena más natural en español sin perder la idea de convivencia mutua.'
    reason: alternative_reading
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: Tetragrámaton / nombre divino
  rationale: La fuente ge'ez corresponde al nombre divino, y la política del proyecto pide Yahvé en el texto principal cuando el original remite al nombre propio de Dios. 'El Señor' ocultaría esa distinción.
- source_word: ፍኖተ
  english_pob_choice: the way
  chosen_spanish: camino
  alternatives_spanish:
  - vía
  - sendero
  lexicon: camino / conducta
  rationale: En este contexto la expresión es ética y conductual, por eso 'camino' comunica bien el modo de vida que deben guardar.
- source_word: ጽድቀ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia y rectitud
  lexicon: justicia / rectitud
  rationale: La secuencia final ya incluye 'rectitud'; para evitar repetición forzada, 'justicia' traduce el primer término y 'rectitud' el segundo, manteniendo el doblete de la fuente.
- source_word: ይሖሩ
  english_pob_choice: walking together
  chosen_spanish: caminando juntos
  alternatives_spanish:
  - andando juntos
  - viviendo juntos
  lexicon: caminar / conducta
  rationale: El verbo conserva el idiomático semitismo de 'caminar' como conducta; 'juntos' refleja la lectura adverbial consensuada en el contexto y evita la literalidad extraña de 'cada uno hacia el otro'.
- source_word: አሐዱ፡ አሐዱ፡ ላዕሌሆሙ
  english_pob_choice: walking together
  chosen_spanish: caminando juntos
  alternatives_spanish:
  - cada uno hacia el otro
  - uno con otro
  lexicon: idioma relacional
  rationale: La frase expresa reciprocidad/comunidad. En español, 'caminando juntos' comunica mejor la idea colectiva sin perder el matiz de convivencia mutua que el inglés POB decidió no sobrecargar en el cuerpo principal.
- source_word: ይኩን
  english_pob_choice: that he should thus be
  chosen_spanish: que así él estuviera
  alternatives_spanish:
  - que así fuera
  - que así se hallara
  lexicon: verbo ser/estar en subjuntivo
  rationale: 'Se preserva el singular gramatical señalado en el audit trail: el sujeto distributivo es ''cada uno'', por lo que el verbo va en singular en español.'
- source_word: ይግበሩ
  english_pob_choice: to do
  chosen_spanish: practicaran
  alternatives_spanish:
  - hicieran
  - obraran
  lexicon: hacer / practicar
  rationale: '''Practicaran'' refleja una conducta habitual y ética, ajustada al sentido de obras de justicia/rectitud.'
theological_decisions:
- issue: El nombre divino en el mandato de Abraham
  english_pob_reading: the way of the LORD
  chosen_spanish_reading: el camino de Yahvé
  alternative_spanish_readings:
  - el camino del Señor
  rationale: El texto fuente usa el nombre divino, no un título genérico. Mantener Yahvé hace visible la referencia al nombre propio y sigue la convención del proyecto.
  doctrine_reference: Éxodo 3:15; uso consistente del nombre divino en POB
- issue: El sujeto singular dentro de una construcción distributiva
  english_pob_reading: that he should thus be among all people
  chosen_spanish_reading: que así él estuviera entre todos los pueblos
  alternative_spanish_readings:
  - que así estuvieran entre todos los pueblos
  rationale: La forma ge'ez es singular y se refiere distributivamente a cada individuo. La traducción conserva esa tensión gramatical en vez de nivelarla al plural.
  doctrine_reference: Syntaxis del Ge'ez del pasaje; nota audit trail sobre ይኩን
- issue: Vida pública de justicia y rectitud entre los pueblos
  english_pob_reading: walking together to practice justice and righteousness on the earth
  chosen_spanish_reading: caminando juntos para ejercer justicia y rectitud sobre la tierra
  alternative_spanish_readings:
  - viviendo juntos para practicar justicia y rectitud en la tierra
  rationale: Se mantiene el lenguaje bíblico de 'caminar' como conducta y la dimensión pública 'sobre la tierra', sin suavizar el alcance social del mandato.
  doctrine_reference: Ética bíblica de conducta/andadura; justicia y rectitud como par semántico
translation_notes:
  revision_awareness: 'La base inglesa ya incorpora las correcciones de revisión: ''his two sons'' para Isaac, el singular ''he should thus be'' y la recuperación del verbo ''walking''. La versión española sigue esas decisiones y conserva la tensión distributiva del singular sin perder la lectura comunitaria del tramo final.'
  spanish_consistency_notes:
  - Se usa Yahvé de forma consistente para el nombre divino.
  - '''Camino'' y ''caminar'' mantienen el valor ético-idiomático del original.'
  - '''Justicia'' y ''rectitud'' reproducen el doblete final sin fusionarlo.'
  - El singular de 'él estuviera' preserva la gramática distribuida del ge'ez.
  - '''Sus dos hijos'' refleja la corrección textual adoptada en el audit trail.'
