base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/020/001.yaml
  text: And in the forty-second jubilee[20:1], in the first year of the seventh week, Abraham called Ishmael and his twelve sons, and Isaac and his two sons, and the six sons of Keturah and their children. And he commanded them to keep the way of the LORD, to do righteousness, and that each should love his brother, and that he should thus be among all people, walking together to practice justice and righteousness on the earth.
  footnotes:
  - marker: '20:1'
    text: The final clause is syntactically dense in Ge'ez. The sense appears to be that Abraham urged mutual love and a public life marked by justice and righteousness among all peoples.
    reason: segmentation_note
  - marker: a
    text: Or 'and Isaac and his sons'.
    reason: previous_rendering
  - marker: b
    text: Or 'each toward the other, to practice'.
    reason: previous_rendering
  - marker: c
    text: Or 'and that they should thus be'.
    reason: previous_rendering
  - marker: d
    text: Or 'walking each toward the other'.
    reason: previous_rendering
