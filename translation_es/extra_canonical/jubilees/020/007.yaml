  text: tus rebaños. Y serás una bendición en la tierra, y todas las naciones de la tierra te desearán
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በበረከት
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - para bendición
  - en bendición
  lexicon: ברכה / בראכה; semantic field of blessing
  rationale: El giro ge’ez expresa el estado o resultado de bendición, no una fórmula más rígida como ‘para bendición’. En español, ‘serás una bendición’ reproduce con naturalidad la lectura revisada del POB y conserva el valor predicativo.
- source_word: ኵሎሙ አሕዛበ ምድር
  english_pob_choice: all the nations of the earth
  chosen_spanish: todas las naciones de la tierra
  alternatives_spanish:
  - todos los pueblos de la tierra
  - todas las gentes de la tierra
  lexicon: אֻמּוֹת / גּוֹיִם; nations, peoples
  rationale: ‘Naciones’ es la correspondencia más directa y pública para el alcance universal del texto. ‘Pueblos’ podría suavizar la referencia, pero el original y el POB mantienen la amplitud étnico-política de ‘nations’.
- source_word: ወይፈትዉክሙ
  english_pob_choice: will desire you
  chosen_spanish: te desearán
  alternatives_spanish:
  - te buscarán
  - te apreciarán
  - te anhelarán
  lexicon: חָפֵץ / desiderare; desire, seek, delight in
  rationale: ‘Desearán’ mantiene la fuerza de atracción/apetencia del verbo sin añadir un objeto implícito. Aunque en español puede sonar afectivo, aquí conserva la idea de que las naciones te querrán o te codiciarán como beneficiario de bendición.
theological_decisions:
- issue: La bendición hacia Abraham como testimonio universal entre las naciones
  english_pob_reading: you will be a blessing on the earth, and all the nations of the earth will desire you
  chosen_spanish_reading: serás una bendición sobre la tierra, y todas las naciones de la tierra te desearán
  alternative_spanish_readings:
  - serás bendición en la tierra, y todas las naciones de la tierra te buscarán
  - serás una bendición en la tierra, y todas las naciones de la tierra te anhelarán
  rationale: La formulación conserva el carácter teológico de Abraham como portador de bendición para el mundo, sin convertirlo en mera influencia moral. ‘Sobre la tierra’ mantiene el alcance espacial del enunciado y la dimensión universal del destino patriarcal.
  doctrine_reference: Génesis 12:2–3; Jubileos 20:7
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió ‘for a blessing’ a ‘a blessing’; la versión española adopta directamente la forma más natural y equivalente, ‘serás una bendición’.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque este versículo no contiene el nombre divino ni una cita de κύριος.
  - ‘Rebaños’ en el texto fuente ge’ez corresponde al arranque del versículo, pero el segmento proporcionado en la tradición inglesa auditada inicia en la cola de la oración; se mantiene solo la porción respaldada por el POB inglés recibido.
  - Se conserva el paralelismo entre ‘tierra’ y ‘naciones de la tierra’ para reflejar la estructura semítica del original.
