  to: alabad al Altísimo, y postraos ante él, y buscad continuamente su rostro en todo tiempo, y haced rectitud y justicia delante de él, para que él os enderece[a] y os conceda misericordia, y haga descender para vosotros la lluvia de la mañana y de la tarde[b], y bendiga toda la obra que hacéis en la tierra, y bendiga vuestro grano.
