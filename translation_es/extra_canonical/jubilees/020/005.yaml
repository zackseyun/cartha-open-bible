review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la mayor parte del sentido del ge''ez auditado: buscar continuamente el rostro de Dios, hacer rectitud y justicia, recibir misericordia, la lluvia de mañana y tarde, y la bendición sobre la obra y el grano. También refleja correctamente la revisión clave de ያርትዕ፡ ርእስክሙ como acción sobre las personas (''os enderece'') y no sobre un ''camino''. Sin embargo, el inicio no es fiel al testimonio auditado: el inglés POB y la evidencia lexical asociada apuntan a ''el Altísimo'', no a ''Yahvé''. La política del proyecto sobre Yahvé aplica al nombre divino, pero no autoriza sustituir un título fuente por el nombre propio sin evidencia contextual suficiente.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. La sintaxis fluye bien y las notas están bien formuladas. Hay solo ajustes menores de naturalidad/registro: ''sobre la tierra'' puede sonar algo calcado donde ''en la tierra'' es más natural, y ''toda la obra que hacéis'' puede afinarse como ''toda la obra que hacen'' o mantenerse según la serie verbal. El principal problema no es de estilo sino de fidelidad léxica al inicio del versículo.'
  glossary_alignment: Buena alineación general con la terminología del proyecto en misericordia, justicia, rectitud y grano. No obstante, la decisión de traducir ልዑለ como 'Yahvé' choca con la racionalidad documentada del pasaje, donde el título 'el Altísimo' fue explícitamente preservado en la auditoría inglesa y hasta figura como alternativa previa. Aquí debe mantenerse el título, no reemplazarse por el nombre divino.
  issues:
  - severity: high
    issue: Sustitución de 'el Altísimo' por 'Yahvé' al inicio
    rationale: La evidencia auditada trata ልዑለ como título ('the Most High'), no como el tetragrámaton. La preferencia general del proyecto por 'Yahvé' no justifica cambiar un título fuente por el nombre divino. Esto altera el matiz léxico y teológico del pasaje.
  - severity: low
    issue: '''sobre la tierra'' suena menos natural que ''en la tierra'''
    rationale: Ambas opciones son comprensibles, pero 'en la tierra' es más idiomático en español bíblico contemporáneo para el ámbito de trabajo humano.
