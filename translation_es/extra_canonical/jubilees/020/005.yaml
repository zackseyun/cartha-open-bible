  language: en
  yaml_path: translation/extra_canonical/jubilees/020/005.yaml
  text: evening[20:5], and bow down to him, and continually seek his face at all times, and do uprightness and righteousness before him, so that he may direct you and give you mercy, and send down for you the rain of morning and evening, and bless all the work that you do on the earth, and bless your grain
  footnotes:
  - marker: '20:5'
    text: '''Rain of morning and evening'' may reflect the familiar agricultural blessing of timely rains, comparable to ''early and late rain.'''
    reason: lexical_alternative
  - marker: a
    text: Or 'direct your path'.
    reason: previous_rendering
  - marker: b
    text: Or 'the Most High[20:5]'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:20Z'
    unchanged: false
    changes_summary: Added 'the' before 'Most High' for natural English, and changed 'your way' to 'your path' for a more natural singular expression matching the source sense.
translation:
  language: es
  text: alabad al Altísimo, y postraos ante él, y buscad continuamente su rostro en todo tiempo, y haced rectitud y justicia delante de él, para que él os enderece[a] y os conceda misericordia, y haga descender para vosotros la lluvia de la mañana y de la tarde[b], y bendiga toda la obra que hacéis en la tierra, y bendiga vuestro grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «os dirija»; el ge''ez sugiere aquí más bien «os haga rectos» que «dirigir vuestro camino».'
    reason: alternative_reading
  - marker: b
    text: 'O: «la lluvia temprana y tardía»; puede reflejar la bendición agrícola conocida como lluvias oportunas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ልዑለ / divine addressee implied by context
  english_pob_choice: the Most High
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Altísimo
  - Dios
  lexicon: theological name/title
  rationale: El contexto de Jubileos usa la invocación al Dios del pacto; el estándar del proyecto pide Yahvé para el nombre divino. Aunque la frase inglesa auditada dice 'the Most High', el flujo de la oración y la teología del pasaje apuntan al mismo referente divino, por lo que se mantiene Yahvé en el texto principal.
- source_word: ወስግዱ
  english_pob_choice: bow down
  chosen_spanish: postraos
  alternatives_spanish:
  - inclinaos
  - adóraos
  lexicon: gesture of worship
  rationale: '''Postraos'' comunica con precisión el acto físico y cultual de reverencia exigido por el verbo, sin perder la dimensión de adoración.'
- source_word: ወትረ፡ ወትስፈዉ፡ ገጸ፡ ዚአሁ፡ በኵሉ፡ ጊዜ፡
  english_pob_choice: continually seek his face at all times
  chosen_spanish: buscad continuamente su rostro en todo tiempo
  alternatives_spanish:
  - buscad sin cesar su presencia en todo tiempo
  - buscad siempre su rostro
  lexicon: seek his face
  rationale: '''Rostro'' conserva el hebraísmo/semitismo del original y de la versión inglesa, y ''en todo tiempo'' refleja con naturalidad la idea adverbial de continuidad.'
- source_word: ወግበሩ፡ ርትዐ፡ ወጽድቀ፡
  english_pob_choice: do uprightness and righteousness
  chosen_spanish: haced rectitud y justicia
  alternatives_spanish:
  - practicad rectitud y justicia
  - haced lo recto y la justicia
  lexicon: righteousness/ uprightness
  rationale: '''Rectitud'' y ''justicia'' preservan el paralelismo de dos términos distintos del original, evitando fusionarlos en una sola idea.'
- source_word: ያርትዕ፡ ርእስክሙ
  english_pob_choice: direct you
  chosen_spanish: os enderece
  alternatives_spanish:
  - os dirija
  - os haga rectos
  lexicon: make straight / direct
  rationale: El ajuste de revisión aclara que el verbo significa 'hacer rectos/enderezar' más que 'guiar un camino'. En español, 'enderece' conserva esa acción sobre la persona y mantiene la tensión moral del contexto.
- source_word: ወየሀብክሙ፡ ምሕረተ፡
  english_pob_choice: give you mercy
  chosen_spanish: os conceda misericordia
  alternatives_spanish:
  - os dé misericordia
  - tenga misericordia de vosotros
  lexicon: mercy
  rationale: '''Conceda misericordia'' conserva el matiz de don otorgado por Dios y suena natural en español bíblico contemporáneo.'
- source_word: ዝናመ፡ ነግሀ፡ ወሰርከ፡
  english_pob_choice: the rain of morning and evening
  chosen_spanish: la lluvia de la mañana y de la tarde
  alternatives_spanish:
  - la lluvia temprana y tardía
  - la lluvia de mañana y de tarde
  lexicon: timely rains
  rationale: Se mantiene la literalidad del binomio temporal del ge'ez. La nota explica la posible referencia agrícola a las lluvias temprana y tardía.
- source_word: ወይባርክ፡ ኵሎ፡ ተግባረክሙ፡ ዘትገብርክሙ፡ በዲበ፡ ምድር፡
  english_pob_choice: bless all the work that you do on the earth
  chosen_spanish: bendiga toda la obra que hacéis sobre la tierra
  alternatives_spanish:
  - bendiga todo lo que hacéis en la tierra
  - bendiga toda la labor que hacéis en la tierra
  lexicon: work / labor
  rationale: '''Obra'' reproduce el campo semántico de ''work'' sin añadir una interpretación más específica que la fuente no exige.'
- source_word: ወይባርክ፡ እክልከ፡
  english_pob_choice: bless your grain
  chosen_spanish: y bendiga vuestro grano
  alternatives_spanish:
  - y bendiga vuestro trigo
  - y bendiga vuestro alimento
  lexicon: grain
  rationale: '''Grano'' es la equivalencia más amplia y fiel al sustantivo agrícola del original, evitando restringirlo a una especie concreta.'
theological_decisions:
- issue: Título divino al inicio del versículo
  english_pob_reading: the Most High / divine addressee
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Altísimo
  - Dios
  rationale: El pasaje es una exhortación litúrgica dirigida al Dios de Israel. En el sistema del POB, Yahvé es la forma principal para el nombre divino; aquí se prefiere por fidelidad terminológica y por coherencia con el proyecto, sin ocultar que el inglés auditado usa 'the Most High'.
  doctrine_reference: Nombre divino / teología del pacto
- issue: 'Dirección divina: guiar o enderezar'
  english_pob_reading: direct you
  chosen_spanish_reading: os enderece
  alternative_spanish_readings:
  - os dirija
  - os guíe
  rationale: La revisión del texto fuente muestra que el ge'ez no expresa 'camino' sino una acción sobre la persona misma. 'Enderezar' preserva la idea de hacer recto al sujeto, no sólo de orientarlo externamente.
  doctrine_reference: santificación / rectitud moral
- issue: Bendición de lluvia agrícola
  english_pob_reading: rain of morning and evening
  chosen_spanish_reading: la lluvia de la mañana y de la tarde
  alternative_spanish_readings:
  - las lluvias temprana y tardía
  - la lluvia temprana y tardía
  rationale: Se conserva la imagen temporal del texto, mientras la nota permite reconocer la posible equivalencia agrícola tradicional de 'early and late rain'. No se neutraliza la concreción del original.
  doctrine_reference: provisión providencial
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica del ge''ez: ርእስክሙ no significa ''vuestro camino'', sino una referencia reflexiva a vosotros mismos, por lo que el verbo se traduce como una acción sobre la persona (''os enderece''). También se evitó trasladar mecánicamente la nota sobre ''the Most High'' al inicio, porque la auditoría indicó que la nota de lluvia debía ir anclada en la frase correspondiente. Se mantuvo el sentido agrícola de la lluvia con nota de alternativa.'
  spanish_consistency_notes:
  - Se usó Yahvé conforme al estándar del proyecto para el nombre divino.
  - Se conservó el paralelismo entre 'rectitud' y 'justicia' para no fusionar dos términos del original.
  - '''Rostro'' mantiene el hebraísmo de ''seek his face'' sin volverlo una paráfrasis abstracta.'
  - La nota [b] está anclada exactamente en 'la mañana y de la tarde' para evitar el desajuste señalado en la revisión.
  - '''vuestra''/''vuestro'' se mantiene en concordancia plural con el español bíblico contemporáneo, coherente con ''vosotros'' implícito en la forma verbal.'
