base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/020/004.yaml
  text: the God of heaven, and cling to all his commandments, and do not walk after their idols and after their uncleanness. And do not make for yourselves gods of cast metal or carved images, for they are emptiness, and there is no spirit in them; for they are the work of hands, and all who trust in them trust in nothing. Do not serve them, and do not bow down to them. But serve the God
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:20Z'
    unchanged: false
    changes_summary: Changed 'impurities' to 'uncleanness' for a more natural formal rendering of the source term, and 'molten gods' to 'gods of cast metal' for clearer, more idiomatic English while preserving the sense.
translation:
  language: es
  text: el Dios del cielo, y aférrense a todos sus mandamientos, y no anden tras sus ídolos ni tras su inmundicia. Y no se hagan dioses de metal fundido ni imágenes talladas, porque son vanidad, y no hay espíritu en ellos; porque son obra de manos, y todos los que confían en ellos confían en nada. No les sirvan, ni se postren ante ellos. Pero sirvan al Dios
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አምላከ፡ ሰማይ፡
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios del cielo y de los cielos
  - el Dios celestial
  lexicon: Dios / cielo
  rationale: Mantiene la construcción genitiva simple del original y la formulación auditada en inglés; 'del cielo' es natural en español y conserva el referente sin añadir matices no sustentados.
- source_word: ትእዛዞ፡
  english_pob_choice: all his commandments
  chosen_spanish: todos sus mandamientos
  alternatives_spanish:
  - todos sus mandatos
  - todas sus órdenes
  lexicon: mandamiento
  rationale: '''Mandamientos'' es el equivalente bíblico más claro y fiel para preceptos divinos; ''todos'' refleja el alcance total de ኵሎ.'
- source_word: ድኅረ፡ ጣዖቶሙ፡
  english_pob_choice: after their idols
  chosen_spanish: tras sus ídolos
  alternatives_spanish:
  - después de sus ídolos
  - detrás de sus ídolos
  lexicon: ídolo
  rationale: '''Tras'' conserva el sentido semítico de seguir o ir detrás de, como en la traducción inglesa, sin volverlo demasiado literal ni ambiguo.'
- source_word: ድኅረ፡ ርኵሶሙ።
  english_pob_choice: after their uncleanness
  chosen_spanish: tras su impureza
  alternatives_spanish:
  - tras su inmundicia
  - tras su suciedad ritual
  lexicon: impuro / pureza
  rationale: El inglés revisado optó por 'uncleanness'; en español, 'impureza' mantiene el registro formal y el campo semántico ritual/moral sin cargar con una concreción innecesaria.
- source_word: አማልክተ፡ ሰብክ፡
  english_pob_choice: gods of cast metal
  chosen_spanish: dioses de metal fundido
  alternatives_spanish:
  - dioses de metal vaciado
  - dioses de metal moldeado
  lexicon: ídolo / metal fundido
  rationale: Sigo la decisión inglesa revisada ('cast metal') con una equivalencia española transparente y bíblica; 'metal fundido' preserva la imagen de fabricación y evita introducir una técnica no explicitada.
- source_word: ግልፈዋተ፡
  english_pob_choice: carved images
  chosen_spanish: imágenes talladas
  alternatives_spanish:
  - imágenes esculpidas
  - ídolos tallados
  lexicon: imagen tallada
  rationale: '''Talladas'' refleja el trabajo manual de labrado indicado por la fuente y mantiene el paralelo con ''metal fundido''.'
- source_word: ከንቱ፡ ውእቱ።
  english_pob_choice: they are emptiness
  chosen_spanish: son vanidad
  alternatives_spanish:
  - son vacío
  - son nada
  lexicon: vanidad / vacío
  rationale: '''Vanidad'' es un equivalente bíblico establecido para la idea de vaciedad o nulidad; conserva bien la fuerza evaluativa del texto.'
- source_word: ኢምነትኒ፡ መንፈስ፡ አልቦሙ።
  english_pob_choice: there is no spirit in them
  chosen_spanish: no hay espíritu en ellos
  alternatives_spanish:
  - no tienen espíritu
  - no hay aliento en ellos
  lexicon: espíritu
  rationale: Mantiene la formulación auditada y deja abierta la ambigüedad entre vida/aliento/espíritu sin forzar una interpretación más estrecha.
- source_word: ግብረ፡ እደው፡
  english_pob_choice: the work of hands
  chosen_spanish: obra de manos
  alternatives_spanish:
  - obra humana
  - hechura de manos
  lexicon: obra / manos
  rationale: '''Obra de manos'' reproduce una fórmula bíblica natural en español y conserva el contraste entre el Creador y lo fabricado.'
- source_word: ይትዌከሉ፡ ቦሙ፡
  english_pob_choice: trust in them
  chosen_spanish: confían en ellos
  alternatives_spanish:
  - se apoyan en ellos
  - ponen su confianza en ellos
  lexicon: confiar
  rationale: '''Confiar en'' conserva el valor relacional y teológico del verbo sin añadir un registro demasiado interpretativo.'
- source_word: ኢትስግዱ፡ ሎሙ።
  english_pob_choice: do not bow down to them
  chosen_spanish: ni os postréis ante ellos
  alternatives_spanish:
  - ni os inclinéis ante ellos
  - ni los adoréis
  lexicon: postrarse
  rationale: '''Postrarse'' expresa con precisión el gesto de adoración/plegaria física sin sustituirlo por un término más doctrinal que el gesto mismo.'
- source_word: አላ፡ አምልኩ፡ አምላከ፡
  english_pob_choice: But serve the God
  chosen_spanish: Sino servid al Dios
  alternatives_spanish:
  - Pero servid al Dios
  - Más bien servid al Dios
  lexicon: servir / Dios
  rationale: La cláusula final queda abierta en el fragmento fuente; 'Sino' refleja bien el giro adversativo y preserva la incompletitud textual sin completarla artificialmente.
theological_decisions:
- issue: Nombre divino en contexto de adoración exclusiva
  english_pob_reading: the God of heaven
  chosen_spanish_reading: el Dios del cielo
  alternative_spanish_readings:
  - el Dios celestial
  - el Dios de los cielos
  rationale: No hay una sustitución por SEÑOR; se mantiene la designación explícita de Dios presente en la fuente y en el audit trail, preservando el contraste con los ídolos.
  doctrine_reference: Exclusividad de culto monoteísta
- issue: Naturaleza de los ídolos como objetos sin realidad espiritual
  english_pob_reading: for they are emptiness, and there is no spirit in them
  chosen_spanish_reading: porque son vanidad, y no hay espíritu en ellos
  alternative_spanish_readings:
  - porque son vacío, y no hay espíritu en ellos
  - porque son nada, y no hay espíritu en ellos
  rationale: '''Vanidad'' comunica nulidad y falsedad sin borrar el juicio teológico del texto; ''espíritu'' queda en singular, como en la fuente, para mantener la afirmación de ausencia de vida/realidad espiritual.'
  doctrine_reference: Crítica bíblica a la idolatría
- issue: Culto debido solo a Dios
  english_pob_reading: Do not serve them, and do not bow down to them. But serve the God
  chosen_spanish_reading: No les sirváis, ni os postréis ante ellos. Sino servid al Dios
  alternative_spanish_readings:
  - No los sirváis, ni os inclinéis ante ellos. Pero servid al Dios
  - No les sirváis, ni adoréis ante ellos. Más bien servid al Dios
  rationale: Se conserva la oposición entre servicio idolátrico y servicio debido a Dios. La forma final queda fragmentaria porque el pasaje fuente termina así en el expediente; no se completa con material no atestiguado.
  doctrine_reference: Primer mandamiento / culto exclusivo
translation_notes:
  revision_awareness: La redacción sigue el texto ge'ez proporcionado y la traducción inglesa auditada, incluyendo la revisión reciente que cambió 'impurities' a 'uncleanness' y 'molten gods' a 'gods of cast metal'. Por eso se eligió 'impureza' y 'metal fundido' como equivalentes españoles naturales y fieles.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para אֱלֹהִים/אֲלָהָא cuando el contexto es el Dios verdadero, sin usar 'SEÑOR' como máscara.
  - Se prefirió 'ídolos' para גִּלֻּלִים/objetos idolátricos y 'imágenes talladas' para el término de fabricación manual.
  - '''Espíritu'' se conservó sin explicitar ''aliento'' porque la fuente y el audit trail sostienen la formulación abierta.'
  - El cierre queda en forma de fragmento ('Sino servid al Dios') para respetar la evidencia disponible en el versículo/segmento dado.
