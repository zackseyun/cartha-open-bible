revisions:
- from: el Dios del cielo, y aferraos a todos sus mandamientos, y no andéis tras sus ídolos ni tras su impureza. Y no os hagáis dioses de metal fundido ni imágenes talladas, porque son vanidad, y no hay espíritu en ellos; porque son obra de manos, y todos los que confían en ellos confían en nada. No les sirváis, ni os postréis ante ellos. Sino servid al Dios
  to: el Dios del cielo, y aférrense a todos sus mandamientos, y no anden tras sus ídolos ni tras su inmundicia. Y no se hagan dioses de metal fundido ni imágenes talladas, porque son vanidad, y no hay espíritu en ellos; porque son obra de manos, y todos los que confían en ellos confían en nada. No les sirvan, ni se postren ante ellos. Pero sirvan al Dios
  rationale: Se reemplaza 'impureza' por 'inmundicia' para reflejar con más precisión el sentido de 'uncleanness' en contexto idolátrico. También se ajusta la segunda persona plural a un imperativo más natural y ampliamente legible en español latinoamericano ('aférrense', 'anden', 'se hagan', 'sirvan', 'se postren') y se cambia 'Sino' por 'Pero' para una adversativa fragmentaria más idiomática sin completar el texto truncado.
