    unchanged: false
    changes_summary: Changed 'entrance of Babylon' to 'entrance to Babylon' for more natural English, and removed the dangling final 'toward,' since the source already expresses 'faces eastward' without requiring an additional object.
translation:
  language: es
  text: a Isaac, su hijo. E Ismael y sus hijos, y los hijos de Cetura y sus descendientes, partieron juntos y se establecieron desde Parán hasta la entrada a Babilonia, en toda la tierra que mira hacia el oriente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለይስሐቅ፡ ወልዱ።
  english_pob_choice: to Isaac his son.
  chosen_spanish: a Isaac, su hijo.
  alternatives_spanish:
  - a Isaac, su hijo
  - para Isaac, su hijo
  lexicon: Isaac / posesión-relación filial
  rationale: El ge'ez expresa una relación filial directa; en español, la estructura breve «a Isaac, su hijo» conserva la referencia sin añadir información. Se evita una paráfrasis más explicativa que no está requerida por el original.
- source_word: ወሖረ፡ ይስማዔል፡ ወውሉዱ፡ ወውሉደ፡ ኬጡራ፡ ወውሉዶሙ፡ ኅቡረ፡
  english_pob_choice: And Ishmael and his sons and the sons of Keturah and their children went together
  chosen_spanish: E Ismael y sus hijos, y los hijos de Cetura y sus hijos, fueron juntos
  alternatives_spanish:
  - Y Ismael y sus hijos, y los hijos de Cetura y sus hijos, fueron juntos
  - Ismael con sus hijos y los hijos de Cetura con sus hijos fueron juntos
  lexicon: ir juntos / reunirse
  rationale: «Fueron juntos» reproduce la idea de movimiento conjunto sin forzar un matiz de congregación que el texto no explicita. «Cetura» sigue la forma castellana habitual del nombre propio.
- source_word: ወኀደሩ፡
  english_pob_choice: and settled
  chosen_spanish: y se establecieron
  alternatives_spanish:
  - y habitaron
  - y se asentaron
  lexicon: habitar / establecerse
  rationale: «Se establecieron» comunica asentamiento duradero con un registro natural y fiel. «Habitaron» es posible, pero en español suena menos preciso para la idea de fijar residencia.
- source_word: እምፋርሞን፡ እስከ፡ ምብዋአ፡ ባቢሎን፡
  english_pob_choice: from Paran as far as the entrance to Babylon
  chosen_spanish: desde Parán hasta la entrada a Babilonia
  alternatives_spanish:
  - desde Parán hasta la entrada de Babilonia
  - desde Parán hasta el acceso a Babilonia
  lexicon: from ... as far as / entrance
  rationale: «Desde ... hasta» conserva el límite geográfico. «Entrada a Babilonia» sigue la revisión inglesa más natural y evita una construcción posesiva menos clara en español. «Acceso» sería idiomático, pero atenúa la concreción de «entrada».
- source_word: ውስተ፡ ኵሉ፡ ምድር፡ እንተ፡ ገጸ፡ ጽባሕ፡ አንጻረ፡
  english_pob_choice: in all the land that faces eastward.
  chosen_spanish: en toda la tierra que mira hacia el oriente.
  alternatives_spanish:
  - en toda la tierra que mira al oriente
  - en toda la tierra que da al oriente
  lexicon: face eastward
  rationale: «Mira hacia el oriente» preserva el sentido direccional con un español claro y bíblicamente comprensible. Se evita «este» solo, para no perder la orientación expresiva del texto.
theological_decisions:
- issue: Precisión geográfica sin expansión interpretativa
  english_pob_reading: went together and settled from Paran as far as the entrance to Babylon, in all the land that faces eastward.
  chosen_spanish_reading: fueron juntos y se establecieron desde Parán hasta la entrada a Babilonia, en toda la tierra que mira hacia el oriente.
  alternative_spanish_readings:
  - se reunieron y habitaron...
  - se extendieron...
  rationale: El pasaje describe asentamiento y extensión territorial; no conviene convertirlo en una declaración sobre migración providencial, conquista o cumplimiento tipológico sin apoyo textual. La redacción española mantiene el alcance descriptivo del original.
  doctrine_reference: Principio de sobriedad exegética y restricción al sentido literal del texto
- issue: Referencia a Babilonia como topónimo, no símbolo
  english_pob_reading: the entrance to Babylon
  chosen_spanish_reading: la entrada a Babilonia
  alternative_spanish_readings:
  - la puerta de Babilonia
  - el acceso a Babilonia
  rationale: El contexto no exige lectura simbólica. «Entrada a Babilonia» conserva el valor geográfico y evita cargar el texto con asociaciones posteriores no presentes en el verso.
  doctrine_reference: Principio de literalidad geográfica en narrativa histórica
- issue: Relación filial con Isaac
  english_pob_reading: to Isaac his son.
  chosen_spanish_reading: a Isaac, su hijo.
  alternative_spanish_readings:
  - a Isaac, el hijo de Abraham
  rationale: La forma breve preserva la relación filiar explícita en el ge'ez sin introducir el nombre de Abraham, que no aparece en este segmento. Esto evita una expansión que el verso no demanda.
  doctrine_reference: Principio de no añadir sujetos implícitos no asentados en el texto
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'entrance of Babylon' a 'entrance to Babylon' por naturalidad y eliminó un 'toward' final sobrante. La versión española sigue esa decisión con «entrada a Babilonia» y cierra con una frase direccional completa («que mira hacia el oriente») sin añadir objetos sobrantes.
  spanish_consistency_notes:
  - Se mantiene 'Isaac' y 'Ismael' en formas españolas estándar.
  - Se usa 'Cetura' como forma castellana habitual del nombre propio.
  - Se evita 'SEÑOR' u otras sustituciones porque no aparecen aquí nombres divinos.
  - No se introducen notas de texto alterno porque el dossier fuente no presenta variantes ni tensiones léxicas documentadas en este versículo.
