revisions:
- from: a Isaac, su hijo. E Ismael y sus hijos, y los hijos de Cetura y sus hijos, fueron juntos y se establecieron desde Parán hasta la entrada a Babilonia, en toda la tierra que mira hacia el oriente.
  to: a Isaac, su hijo. E Ismael y sus hijos, y los hijos de Cetura y sus descendientes, partieron juntos y se establecieron desde Parán hasta la entrada a Babilonia, en toda la tierra que mira hacia el oriente.
  rationale: Se ajusta la coordinación para evitar la ambigüedad de «sus hijos» después de Cetura, usando «sus descendientes», que preserva el sentido de «their children». También se reemplaza «fueron juntos» por «partieron juntos» para un español más natural sin apartarse del sentido básico de movimiento conjunto del original.
