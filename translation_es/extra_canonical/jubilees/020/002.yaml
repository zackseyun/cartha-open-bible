base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/020/002.yaml
  text: And that they should circumcise their sons according to the covenant that was established with them[20:2], and that they should not turn aside from this, neither to the right nor to the left, from any path that the LORD commanded; and that we should keep ourselves from all fornication and uncleanness, and that we should put away from among us every act of fornication and uncleanness. And if a woman among you commits harlotry, or even a daughter, burn her with fire, and let them not commit fornication after their eyes and after their heart, and let them not take wives for themselves from the daughters of Canaan, for the seed of Canaan will be uprooted from the land. And he told them of the judgment of the Watchers[20:2],
  footnotes:
  - marker: '20:2'
    text: The phrase rendered 'circumcise their sons according to the covenant' is contextually inferred from the Abrahamic covenant formula; the wording is compressed in this witness.
    reason: lexical_alternative
  - marker: '20:2'
    text: The command about a woman or daughter who commits harlotry is severe and legal in tone; the Ge'ez is explicit about burning with fire.
    reason: cultural_note
  - marker: '20:2'
    text: '''The judgment of the Watchers'' refers to the punishment of the rebellious heavenly beings known from Enochic tradition.'
    reason: cross_reference
  - marker: a
    text: Or 'destroyed'.
    reason: previous_rendering
  - marker: b
    text: Or '[20:2][20:2]'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:22Z'
    unchanged: false
    changes_summary: Adjusted 'belonging to you' to 'among you' for a more natural and direct rendering; changed 'let them not commit fornication after their eyes and after their heart' to 'let them not go astray after their eyes and after their heart' to better reflect the idiom; changed 'will be rooted out' to 'will be destroyed' for a more straightforward rendering. Added a comma after 'to the left' for readability.
translation:
  language: es
  text: Y que circuncidaran[a] a sus hijos conforme al pacto que fue establecido con ellos, y que no se desviaran de esto ni a la derecha ni a la izquierda, de ningún camino que Yahvé mandó; y que nos guardáramos de toda fornicación e impureza, y que quitáramos de en medio de nosotros todo acto de fornicación e impureza. Y si una mujer entre ustedes comete fornicación, o aun una hija, quémenla con fuego, y que no cometan fornicación tras sus ojos y tras su corazón, y que no tomen para sí mujeres de entre las hijas de Canaán, porque la descendencia de Canaán será arrancada de la tierra[b]. Y les habló acerca del juicio de los Vigilantes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase 'conforme al pacto' está inferida contextualmente a partir de la fórmula abrahámica; el testimonio ge'ez está comprimido.
    reason: lexical_alternative
  - marker: b
    text: El ge'ez es más literal como 'será arrancada/desarraigada'; se eligió una forma española que conserve la imagen agrícola.
    reason: lexical_alternative
  - marker: c
    text: '''El juicio de los Vigilantes'' alude al castigo de los seres celestiales rebeldes conocidos por la tradición enociana.'
    reason: cross_reference
lexical_decisions:
- source_word: ኪዳን
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - el convenio
  - la alianza
  lexicon: N/A
  rationale: En este contexto de circuncisión abrahámica, 'pacto' comunica bien la relación formal establecida por Dios y evita una sobrecarga eclesiástica de 'alianza'; 'convenio' suena menos bíblico en español.
- source_word: ይትዐደዉ
  english_pob_choice: they should not turn aside
  chosen_spanish: no se desviaran
  alternatives_spanish:
  - no se apartaran
  - no se volvieran aside
  lexicon: N/A
  rationale: El contexto exige la imagen de no apartarse del camino mandado; 'desviarse' expresa bien la dirección moral y evita un calco torpe.
- source_word: ዝሙት
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - lujuria
  lexicon: N/A
  rationale: El texto repite el mismo campo léxico sexual y legal; 'fornicación' preserva esa fuerza y la recurrencia del término.
- source_word: ርኵስ
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: N/A
  rationale: '''Impureza'' conserva la amplitud ritual y moral del término sin reducirlo solo a suciedad física.'
- source_word: ዘመወት
  english_pob_choice: commits harlotry
  chosen_spanish: comete prostitución
  alternatives_spanish:
  - comete fornicación
  - se prostituye
  lexicon: N/A
  rationale: El original es explícito sobre conducta sexual ilícita; 'prostitución' refleja mejor el acto denunciado en una mujer, sin suavizarlo.
- source_word: አውዐይዋ በእሳት
  english_pob_choice: burn her with fire
  chosen_spanish: quemenla con fuego
  alternatives_spanish:
  - quémenla con fuego
  - la quemen con fuego
  lexicon: N/A
  rationale: Mantiene el tono legal severo del testimonio fuente y conserva el sujeto impersonal plural, como en la tradición textual auditada.
- source_word: ይዘምዋ
  english_pob_choice: let them not commit fornication after their eyes and after their heart
  chosen_spanish: que no cometan fornicación tras sus ojos y tras su corazón
  alternatives_spanish:
  - que no se prostituyan tras sus ojos y tras su corazón
  - que no se desvíen tras sus ojos y tras su corazón
  lexicon: N/A
  rationale: Se preserva la repetición del verbo sexual del texto ge'ez, siguiendo la corrección auditada que rechazó 'go astray' por oscurecer la raíz compartida.
- source_word: አዋልደ ከናአን
  english_pob_choice: the daughters of Canaan
  chosen_spanish: las hijas de Canaán
  alternatives_spanish:
  - las mujeres cananeas
  - las hijas cananeas
  lexicon: N/A
  rationale: Se mantiene la formulación genealógica del original y del inglés auditado, importante para la prohibición matrimonial.
- source_word: ይሤረዉ
  english_pob_choice: will be uprooted
  chosen_spanish: será arrancada
  alternatives_spanish:
  - será uprootada
  - será destruida
  lexicon: N/A
  rationale: La imagen agrícola del ge'ez es la de arrancar o desarraigar; 'arrancada' preserva mejor el matiz que 'destruida'.
- source_word: ኵነኔሆሙ ለረዓይት
  english_pob_choice: the judgment of the Watchers
  chosen_spanish: el juicio de los Vigilantes
  alternatives_spanish:
  - el juicio de los Ángeles Vigilantes
  - el castigo de los Vigilantes
  lexicon: N/A
  rationale: '''Vigilantes'' es la forma estándar para el grupo en la tradición enociana y mantiene el enlace intertextual señalado por la auditoría inglesa.'
theological_decisions:
- issue: Nombre divino en el mandato
  english_pob_reading: from any path that the LORD commanded
  chosen_spanish_reading: de ningún camino que Yahvé mandó
  alternative_spanish_readings:
  - del camino que el Señor mandó
  - de todo camino que Yahvé mandó
  rationale: Se sigue la norma del proyecto de traducir el nombre divino como 'Yahvé' en lugar de ocultarlo tras una máscara litúrgica; el contexto de mandamiento directo respalda esta decisión.
  doctrine_reference: Tetragrámaton / nominación divina
- issue: Severidad legal de la pena
  english_pob_reading: burn her with fire
  chosen_spanish_reading: quemenla con fuego
  alternative_spanish_readings:
  - la quemen con fuego
  - háganla morir en el fuego
  rationale: El testimonio auditado subraya que la expresión ge'ez es explícita y legalmente severa; la traducción conserva esa dureza sin atenuarla.
  doctrine_reference: Ley penal antigua / fidelidad descriptiva
- issue: Juicio de los Vigilantes
  english_pob_reading: the judgment of the Watchers
  chosen_spanish_reading: el juicio de los Vigilantes
  alternative_spanish_readings:
  - el castigo de los Vigilantes
  - el juicio de los ángeles caídos
  rationale: '''Vigilantes'' conserva el término técnico en la tradición de 1 Enoc y evita introducir una explicación interpretativa dentro del texto principal.'
  doctrine_reference: Intertextualidad enociana
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió 'destroyed' a 'uprooted' para la descendencia de Canaán, y la corrección doctrinal que rechazó 'go astray' en favor de repetir el verbo sexual explícito del ge'ez. También se respetó la nota inglesa de que la frase sobre circuncidar a los hijos está comprimida en el testimonio y se recupera por inferencia contextual.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se conservó 'fornicación' para el mismo campo léxico en toda la sección, evitando alternar con eufemismos.
  - Se tradujo 'Vigilantes' de manera consistente con la terminología enociana.
  - Se eligió 'impureza' para abarcar el término ritual/moral sin reducirlo a suciedad material.
  - Se usó puntuación española y un registro solemne pero claro.
