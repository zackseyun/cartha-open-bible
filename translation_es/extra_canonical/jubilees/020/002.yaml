revisions:
- from: Y que circuncidaran a sus hijos conforme al pacto que fue establecido con ellos[a], y que no se desviaran de esto ni a la derecha ni a la izquierda, de ningún camino que Yahvé mandó; y que nos guardáramos de toda fornicación e impureza, y que quitáramos de en medio de nosotros todo acto de fornicación e impureza. Y si una mujer entre ustedes comete prostitución, o aun una hija, quémenla con fuego, y que no cometan fornicación tras sus ojos y tras su corazón, y que no tomen para sí mujeres de entre las hijas de Canaán, porque la descendencia de Canaán será arrancada de la tierra[b]. Y les habló del juicio de los Vigilantes[c].
  to: Y que circuncidaran[a] a sus hijos conforme al pacto que fue establecido con ellos, y que no se desviaran de esto ni a la derecha ni a la izquierda, de ningún camino que Yahvé mandó; y que nos guardáramos de toda fornicación e impureza, y que quitáramos de en medio de nosotros todo acto de fornicación e impureza. Y si una mujer entre ustedes comete fornicación, o aun una hija, quémenla con fuego, y que no cometan fornicación tras sus ojos y tras su corazón, y que no tomen para sí mujeres de entre las hijas de Canaán, porque la descendencia de Canaán será arrancada de la tierra[b]. Y les habló acerca del juicio de los Vigilantes[c].
  rationale: 'Se revisa para mejorar fidelidad léxica e idiomaticidad mínima sin cambiar el sentido: se sustituye ''comete prostitución'' por ''comete fornicación'' para conservar la repetición deliberada del mismo campo léxico sexual del ge''ez y del audit trail inglés; se corrige ''quémenla''; se mueve la nota [a] al lugar relevante de la inferencia comprimida; y se ajusta levemente la cláusula final a ''les habló acerca del juicio'' para reflejar mejor ''he told them of''. No se requiere escalamiento doctrinal.'
