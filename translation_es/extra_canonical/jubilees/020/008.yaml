    text: Or 'but he gave everything'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:22Z'
    unchanged: false
    changes_summary: Reordered 'gave gifts' for more natural English and added the explicit subject in the final clause to reflect the source. Retained the abrupt ending despite its difficulty.
translation:
  language: es
  text: y bendecirán a tus hijos en mi nombre, para que sean bendecidos como yo lo soy. Y dio presentes a Ismael, a sus hijos y a los hijos de Cetura, y los envió lejos, apartándolos de Isaac su hijo; pero a él le dio todo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בָּרַךְ / bless
  english_pob_choice: bless
  chosen_spanish: bendecirán / bendecidos
  alternatives_spanish:
  - harán bien
  - invocarán bendición sobre
  lexicon: ברך
  rationale: El texto ge'ez y el inglés POB mantienen el sentido directo de bendecir; en español, ‘bendecir’ preserva la acción verbal y el resultado pasivo ‘ser bendecidos’ sin perder la repetición enfática.
- source_word: in my name
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  lexicon: שם
  rationale: ‘En mi nombre’ es la expresión natural y fiel en español para el valor instrumental o representativo del nombre.
- source_word: gifts
  english_pob_choice: gifts
  chosen_spanish: regalos
  alternatives_spanish:
  - dones
  - presentes
  lexicon: מַתָּנָה / מתנה
  rationale: El ge'ez habla de ‘gifts’; ‘regalos’ comunica el sentido concreto de presentes dados, sin introducir un matiz litúrgico que ‘dones’ podría sugerir en español eclesial.
- source_word: sent them away
  english_pob_choice: he sent them away
  chosen_spanish: los envió lejos
  alternatives_spanish:
  - los despidió
  - los apartó
  lexicon: שלח
  rationale: ‘Envió lejos’ reproduce el movimiento de separación geográfica implícito en el contexto y evita suavizar la expulsión o despido que el verbo puede implicar.
- source_word: everything
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - la totalidad
  lexicon: כל
  rationale: ‘Todo’ es la forma más natural en español para el hebreo/ge'ez de totalidad absoluta, y mantiene la tensión de la cláusula final abrupta.
theological_decisions:
- issue: La bendición transmitida a los hijos en el nombre divino
  english_pob_reading: they will bless your children in my name, so that they may be blessed as I am
  chosen_spanish_reading: bendecirán a tus hijos en mi nombre, para que sean bendecidos como yo lo soy
  alternative_spanish_readings:
  - bendecirán a tus hijos en mi nombre, para que sean bendecidos como yo
  - bendecirán a tus hijos en mi nombre, para que tengan bendición como yo
  rationale: Se conserva la comparación explícita ‘como yo lo soy’, reflejando la fuerza del inglés POB y evitando suavizar la identidad entre la bendición recibida y la condición del hablante.
  doctrine_reference: Tema de bendición patriarcal y mediación del nombre divino en literatura del pacto.
- issue: Cláusula final abrupta con objeto pronominal anticipado
  english_pob_reading: but he gave everything to him
  chosen_spanish_reading: pero a él le dio todo
  alternative_spanish_readings:
  - pero le dio todo
  - pero todo se lo dio a él
  rationale: La decisión conserva la referencia pronominal final y el cierre algo abrupto del verso, sin añadir contenido no atestiguado; el orden español ‘a él le dio todo’ mantiene la prolepsis del objeto.
  doctrine_reference: Economía textual y continuidad narrativa en transmisión patriarcal.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que hace explícito el sujeto de la última cláusula (‘he gave everything to him’) y se retuvo el carácter abrupto del cierre. No se introdujeron notas textuales porque la única variante editorial en el inglés auditado ya quedó absorbida por la redacción española sin ambigüedad residual.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton en la forma traducida auditada, por lo que no se introduce.
  - Se mantiene ‘bendecir’ como verbo principal para conservar la semántica de blessing sin desplazamiento hacia ‘prosperar’ o ‘alabar’.
  - Se evita ‘Cristo’ y otros términos cristológicos no presentes en el pasaje.
  - ‘Todo’ final se deja sin amplificación para reflejar la clausura truncada del verso y el pronombre objeto anticipado del original.
