review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la corrección auditada principal: አሰምዕ se refleja como primera persona declarativa («Yo les testifico») y አፍቅርዎ como mandato con objeto masculino singular («ámenlo»). También preserva correctamente la estructura nominal revisada en «todos sus hijos a destrucción…» en vez de convertirla en cláusula verbal. Sin embargo, hay dos desajustes de fidelidad/forma: «por maldición / por oprobio» no expresa tan bien la serie resultativa del original como «en maldición / en oprobio» o una construcción equivalente, y «todo su resto como los hijos de Gomorra» omite el sentido elíptico de destino compartido, por lo que conviene explicitar «será como».'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta giros algo duros o poco idiomáticos: «den su nombre por maldición» suena menos natural que «conviertan su nombre en maldición» o «hagan de su nombre una maldición», aunque la revisión debe conservar el paralelismo nominal. «Todo su resto como los hijos de Gomorra» queda truncado en español; añadir «sea» o «será» mejora notablemente la legibilidad sin apartarse del original. «Yo les testifico» es comprensible, pero «les doy testimonio» o «les declaro» sería más idiomático; aun así, no es necesario cambiarlo si se busca cercanía formal al audit trail.'
  glossary_alignment: No hay términos de glosario mayor comprometidos. «Fornicación», «impureza», «corrupción» y «ámenlo» están alineados con las decisiones auditadas. «Contaminación del pecado» es aceptable, aunque «mancha del pecado» o «corrupción del pecado» podrían sonar más naturales; no requiere cambio obligatorio. La principal mejora es sintáctica, no terminológica.
  issues:
  - severity: medium
    issue: «por maldición» y «por oprobio» debilitan la fuerza resultativa nominal del original
    rationale: La serie ge'ez revisada funciona como objetos/resultados paralelos («a curse … a reproach … to destruction»). En español, «por» puede leerse causal o instrumental; «en maldición» y «en oprobio» preservan mejor el valor resultativo y el paralelismo.
  - severity: medium
    issue: «todo su resto como los hijos de Gomorra» queda elíptico de manera poco natural en español
    rationale: Aunque el original puede ser comprimido, en español la omisión del verbo deja una frase incompleta. Añadir «sea» conserva el sentido comparativo-resultativo y mejora la inteligibilidad.
  - severity: low
    issue: La nota al pie solo explica «a destrucción», pero la serie completa también merece coherencia formal en el texto
    rationale: Si se mantiene la estructura nominal por fidelidad al source review, conviene que las otras dos expresiones paralelas también reflejen esa decisión en la redacción principal.
  revised_spanish_text: 'y el juicio de Sodoma: cómo fueron juzgados a causa de su maldad, y a causa de fornicación, impureza y corrupción entre ellos; por fornicación murieron. Y ustedes también, guárdense de toda fornicación e impureza y de toda contaminación del pecado, para que no conviertan su nombre en maldición, y toda su vida en oprobio, y todos sus hijos a destrucción[a] por la espada, y lleguen a ser malditos como Sodoma, y todo su resto sea como los hijos de Gomorra. Yo les testifico, hijos míos: ámenlo.'
  revised_footnotes:
