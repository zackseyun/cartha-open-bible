revisions:
- from: 'y el juicio de Sodoma: cómo fueron juzgados a causa de su maldad, y a causa de fornicación, impureza y corrupción entre ellos; por fornicación murieron. Y ustedes también, guárdense de toda fornicación e impureza y de toda contaminación del pecado, para que no den su nombre por maldición, y toda su vida por oprobio, y todos sus hijos a destrucción[a] por la espada, y se hagan malditos como Sodoma, y todo su resto como los hijos de Gomorra. Yo les testifico, hijos míos: ámenlo.'
  to: 'y el juicio de Sodoma: cómo fueron juzgados a causa de su maldad, y a causa de fornicación, impureza y corrupción entre ellos; por fornicación murieron. Y ustedes también, guárdense de toda fornicación e impureza y de toda contaminación del pecado, para que no conviertan su nombre en maldición, y toda su vida en oprobio, y todos sus hijos a destrucción[a] por la espada, y lleguen a ser malditos como Sodoma, y todo su resto sea como los hijos de Gomorra. Yo les testifico, hijos míos: ámenlo.'
  rationale: 'La revisión mantiene todas las decisiones léxicas centrales del audit trail, pero corrige dos puntos de español y fidelidad formal: se refuerza la serie resultativa nominal con «en maldición / en oprobio», y se completa la frase final comparativa con «sea» para evitar una elipsis dura en español. También se ajusta «se hagan» a «lleguen a ser» por mejor fluidez sin pérdida de sentido.'
