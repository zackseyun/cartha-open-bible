base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/020/003.yaml
  text: 'and the judgment of Sodom, how they were judged because of their wickedness, and because of fornication and uncleanness and corruption among themselves: by fornication they died. And you also, guard yourselves from all fornication and uncleanness and from every defilement of sin, so that you may not make your name a curse, and all your life a reproach, and all your sons to destruction by the sword, and you become accursed like Sodom, and all your remnant like the sons of Gomorrah. I testify to you, my children: love him'
  footnotes:
  - marker: a
    text: Or 'Listen to me, my children, and love'.
    reason: previous_rendering
  - marker: b
    text: Or 'and all your sons perish by the sword'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:20Z'
    unchanged: false
    changes_summary: Changed 'pollution of sin' to 'defilement of sin' for more natural formal English and closer lexical fit for the source term.
translation:
  language: es
  text: 'y el juicio de Sodoma: cómo fueron juzgados a causa de su maldad, y a causa de fornicación, impureza y corrupción entre ellos; por fornicación murieron. Y ustedes también, guárdense de toda fornicación e impureza y de toda contaminación del pecado, para que no conviertan su nombre en maldición, y toda su vida en oprobio, y todos sus hijos a destrucción[a] por la espada, y lleguen a ser malditos como Sodoma, y todo su resto sea como los hijos de Gomorra. Yo les testifico, hijos míos: ámenlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez aquí usa un sustantivo de resultado («a destrucción») en paralelo con «en maldición» y «en oprobio»; la formulación española busca conservar ese paralelismo.
    reason: source_note
lexical_decisions:
- source_word: ዝሙት
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - adulterio
  lexicon: lexical field of sexual immorality
  rationale: Conservo el término técnico más cercano y tradicional, porque el texto lo repite como categoría moral específica; «inmoralidad sexual» suaviza demasiado el valor lexical, y «adulterio» sería demasiado estrecho.
- source_word: ርኵስ
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - inmundez
  lexicon: field of ritual/moral impurity
  rationale: «Impureza» mantiene el paralelismo con «fornicación» y sirve tanto para impurificación moral como ritual, sin añadir una especificación no garantizada.
- source_word: ሙስና
  english_pob_choice: corruption
  chosen_spanish: corrupción
  alternatives_spanish:
  - depravación
  - descomposición
  lexicon: moral corruption/deterioration
  rationale: «Corrupción» preserva el sentido moral y el encadenamiento de sustantivos del original; «depravación» sería más interpretativa y «descomposición» más física que moral.
- source_word: ፃማነ ኀጢአት
  english_pob_choice: defilement of sin
  chosen_spanish: contaminación del pecado
  alternatives_spanish:
  - mancha del pecado
  - profanación del pecado
  lexicon: defilement/contamination imagery
  rationale: El giro ge'ez apunta a una idea de contaminación/ensuciamiento; «contaminación del pecado» suena natural en español y conserva la imagen sin volverla demasiado abstracta.
- source_word: ለመርገም
  english_pob_choice: a curse
  chosen_spanish: por maldición
  alternatives_spanish:
  - en maldición
  - como maldición
  lexicon: curse as nominative result/predicate
  rationale: El original encadena resultados nominativos; en español «por maldición» expresa el efecto social de convertir el nombre en una fórmula maldita sin borrar la función resultativa.
- source_word: ለተፋጽዮ
  english_pob_choice: a reproach
  chosen_spanish: por oprobio
  alternatives_spanish:
  - para vergüenza
  - por afrenta
  lexicon: reproach/shame,
  rationale: «Oprobio» conserva el registro elevado y la idea pública de deshonra; «vergüenza» sería menos formal y menos pública.
- source_word: ለሙስና
  english_pob_choice: to destruction
  chosen_spanish: a destrucción
  alternatives_spanish:
  - para ruina
  - a corrupción
  lexicon: destruction/corruption as object complement
  rationale: Sigo la revisión inglesa que reanaliza el sintagma como complemento nominal paralelo a «por maldición» y «por oprobio»; en español «a destrucción» conserva ese paralelismo, aunque suene marcado.
- source_word: አሰምዕ
  english_pob_choice: I testify to you
  chosen_spanish: Yo les testifico
  alternatives_spanish:
  - Yo les declaro
  - Yo doy testimonio a ustedes
  lexicon: first-person declarative verb
  rationale: La corrección auditada indica una forma de primera persona singular; «Yo les testifico» conserva el acto solemne de testimonio sin convertirlo en mandato de escucha.
- source_word: አፍቅርዎ
  english_pob_choice: love him
  chosen_spanish: ámenlo
  alternatives_spanish:
  - ámelo
  - ámense a él
  lexicon: 3rd person masculine singular object suffix
  rationale: El sufijo objeto apunta a un masculino singular anticipado por el contexto inmediato; en español la forma natural y fiel es «ámenlo». Mantengo el efecto de exhortación implícita que sigue al testimonio.
theological_decisions:
- issue: La referencia a Sodoma como paradigma de juicio por pecados sexuales y corrupción moral
  english_pob_reading: how they were judged because of their wickedness, and because of fornication and uncleanness and corruption among themselves
  chosen_spanish_reading: cómo fueron juzgados a causa de su maldad, y a causa de fornicación, impureza y corrupción entre ellos
  alternative_spanish_readings:
  - cómo fueron juzgados por su maldad y por sus pecados sexuales e impureza
  - cómo fueron juzgados a causa de su maldad y de su corrupción moral
  rationale: Mantengo la acumulación de vicios y la conexión explícita con Sodoma, sin convertirla en una generalización ética más amplia que la fuente no dice.
  doctrine_reference: Narrativa ejemplar de juicio divino sobre Sodoma (Génesis 19; tradición de Jubileos)
- issue: La secuencia resultativa de ‘nombre’, ‘vida’, ‘hijos’ y ‘resto’ como consecuencias públicas del pecado
  english_pob_reading: so that you may not make your name a curse, and all your life a reproach, and all your sons to destruction by the sword, and you become accursed like Sodom, and all your remnant like the sons of Gomorrah
  chosen_spanish_reading: para que no den su nombre por maldición, y toda su vida por oprobio, y todos sus hijos a destrucción por la espada, y se hagan malditos como Sodoma, y todo su resto como los hijos de Gomorra
  alternative_spanish_readings:
  - para que su nombre no sea maldición, y toda su vida oprobio, y sus hijos perezcan por la espada
  - para que no conviertan su nombre en maldición
  rationale: Sigo la revisión crítica que preserva la estructura nominal del ge'ez; esto evita diluir la triple serie de resultados en verbos distintos y conserva la fuerza solemne de la amenaza.
  doctrine_reference: Retribución pactual y vergüenza pública en la literatura judía del Segundo Templo
- issue: 'El cierre abrupto con ‘I testify to you, my children: love him’'
  english_pob_reading: 'I testify to you, my children: love him'
  chosen_spanish_reading: 'Yo les testifico, hijos míos: ámenlo'
  alternative_spanish_readings:
  - Oiganme, hijos míos, y ámenlo
  - 'Yo les testifico, hijos míos: ámelo'
  rationale: La revisión auditada corrige el valor verbal a primera persona y mantiene el objeto masculino singular. En español conservo la exhortación directa, dejando para el siguiente versículo la identificación del objeto implícito.
  doctrine_reference: Autoridad exhortativa del patriarca en discurso testamentario
translation_notes:
  revision_awareness: 'La redacción incorpora las revisiones auditadas del inglés POB: (1) el cierre final no se toma como «Listen» sino como «I testify to you», y (2) el miembro correspondiente a «all your sons ... by the sword» se trata como complemento nominal paralelo, no como cláusula verbal independiente. También se respeta la preferencia revisada por «defilement of sin» al reflejarla como «contaminación del pecado».'
  spanish_consistency_notes:
  - Uso «Yahvé» por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Mantengo «fornicación», «impureza» y «corrupción» como tríada moral consistente con el proyecto.
  - Conservo un registro formal, pero sin arcaísmos innecesarios; «Yo les testifico» sigue el valor del original con español natural.
  - La puntuación reproduce el encadenamiento solemne del texto fuente, con dos puntos antes de la exhortación final.
