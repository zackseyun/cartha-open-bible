lexical_decisions:
- source_word: ወማኅፀነ
  english_pob_choice: and womb
  chosen_spanish: y útero
  alternatives_spanish:
  - y vientre
  - y matriz
  lexicon: womb
  rationale: El contexto auditado muestra que este sustantivo va separado del verbo ‘bendiga’; por eso se conserva como un sustantivo independiente. ‘Útero’ comunica con precisión el sentido corporal sin añadir interpretación.
- source_word: ዘርአ፡ ከርሥከ
  english_pob_choice: the seed of your body
  chosen_spanish: la semilla de tu cuerpo
  alternatives_spanish:
  - la descendencia de tu cuerpo
  - el linaje de tu cuerpo
  lexicon: seed
  rationale: POB mantiene la metáfora de ‘seed’; en español ‘semilla’ preserva esa imagen genealógica con buena claridad. ‘Cuerpo’ refleja el valor del ge’ez traducido en inglés como ‘body’.
- source_word: ዘርአ፡ ምድርከ
  english_pob_choice: the seed of your land
  chosen_spanish: la semilla de tu tierra
  alternatives_spanish:
  - el fruto de tu tierra
  - la descendencia de tu tierra
  lexicon: seed
  rationale: Se conserva el paralelismo con la frase anterior y la metáfora agrícola. ‘Tu tierra’ sigue de cerca el posesivo del original y del audit trail inglés.
- source_word: መራዕየ፡ አልህምቲከ
  english_pob_choice: the herds of your cattle
  chosen_spanish: las manadas de tu ganado
  alternatives_spanish:
  - los hatos de tu ganado
  - los rebaños de tu ganado
  lexicon: herds
  rationale: La revisión auditada corrige ‘offspring’ por ‘herds/flocks’. En español, ‘manadas’ mantiene el sentido de grupos de animales pastando; ‘ganado’ corresponde al ganado doméstico del contexto pastoral.
- source_word: መራዕየ
  english_pob_choice: the flocks of
  chosen_spanish: los rebaños de
  alternatives_spanish:
  - las manadas de
  - los hatos de
  lexicon: flocks
  rationale: Para la segunda aparición de መራዕየ se usa ‘rebaños’, que en español es el equivalente más natural para animales pastoreados, conservando el paralelismo con ‘manadas’.
translation_notes:
  revision_awareness: La redacción sigue la revisión que separa ‘útero’ de ‘bendiga’ y conserva el final truncado del texto fuente/audit trail (‘de’), sin intentar completarlo. También incorpora la corrección lexical de መራዕየ como términos pastorales (‘manadas/rebaños’) en lugar de ‘descendencia’.
  spanish_consistency_notes:
  - Se mantiene la metáfora genealógica de ‘semilla’ para ser coherente con la política POB y el paralelismo del pasaje.
  - Se evita ‘SEÑOR’ y ‘Cristo’ porque no aparecen en este versículo ni en el testimonio fuente provisto.
  - El final queda incompleto a propósito, conforme al texto fuente auditado.
