  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Las decisiones léxicas deben ajustarse por estilo bíblico en español: ‘vientre’ para womb en una fórmula de bendición, y ‘rebaños’ en vez de ‘manadas’ para መራዕየ en contexto de animales domesticados.'
  issues:
