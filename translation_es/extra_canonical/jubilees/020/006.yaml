    rationale: ‘Manada’ se usa más para animales salvajes o como término menos marcado; para ganado doméstico y contexto pastoral, ‘rebaños’ o ‘hatos’ encajan mejor. Aquí ‘rebaños’ mantiene bien el paralelo con la segunda frase.
