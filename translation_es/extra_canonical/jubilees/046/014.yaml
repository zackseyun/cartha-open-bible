translation:
  language: es
  text: 'Y puso sobre ellos capataces para que los afligieran con opresión, y construyeron ciudades fortificadas para el faraón: Pitom y Raamsés. Y reconstruyeron todos los muros y todos los terraplenes que habían caído[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "que se habían caído".
    reason: Preservar en español la nota del audit trail inglés sobre la formulación anterior de 'that had fallen'.
lexical_decisions:
- source_word: taskmasters
  english_pob_choice: taskmasters
  chosen_spanish: capataces
  alternatives_spanish:
  - jefes de trabajo
  - supervisores de labores
  lexicon: no-entry
  rationale: '''Capataces'' comunica bien la función de vigilancia y presión laboral del término sin forzar un tecnicismo extraño al español bíblico actual.'
- source_word: afflict them with oppression
  english_pob_choice: afflict them with oppression
  chosen_spanish: los oprimieran con trabajos forzados
  alternatives_spanish:
  - los afligieran con opresión
  - los oprimieran con dureza
  lexicon: no-entry
  rationale: El ge'ez expresa causar aflicción/opresión; 'trabajos forzados' hace explícita la forma concreta de la opresión sin añadir una idea ajena al contexto.
- source_word: fortified cities
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades amuralladas
  - ciudades fortificadas y defendidas
  lexicon: no-entry
  rationale: La expresión es directa y transparente en español; 'fortificadas' mantiene la relación con la idea de defensa militar.
- source_word: Pithom
  english_pob_choice: Pithom
  chosen_spanish: Pitom
  alternatives_spanish:
  - Pítom
  lexicon: no-entry
  rationale: Se conserva el nombre propio tradicional en una forma española breve y reconocible.
- source_word: Raamses
  english_pob_choice: Raamses
  chosen_spanish: Raamsés
  alternatives_spanish:
  - Ramsés
  lexicon: no-entry
  rationale: Se mantiene la forma del topónimo bíblico con acentuación española; la forma con doble a refleja el source y el audit trail inglés.
- source_word: walls and embankments
  english_pob_choice: walls and embankments
  chosen_spanish: los muros y todos los terraplenes
  alternatives_spanish:
  - las murallas y todos los terraplenes
  - los muros y todas las rampas
  lexicon: no-entry
  rationale: '''Muros'' cubre la noción de walls; ''terraplenes'' traduce con naturalidad un elemento de relleno o contención, conservando el paralelo con el inglés sin exagerar la especificidad.'
- source_word: that had fallen
  english_pob_choice: that had fallen
  chosen_spanish: que habían caído
  alternatives_spanish:
  - que se habían derrumbado
  - que habían caído[a]
  lexicon: no-entry
  rationale: La construcción pasiva/resultado del ge'ez se expresa con el pretérito pluscuamperfecto 'habían caído'; se evita sobreinterpretar con 'derrumbarse' si el texto solo indica caída.
theological_decisions:
- issue: Referencia a la opresión faraónica en una sección narrativa de Jubileos
  english_pob_reading: And he appointed over them taskmasters so that they might afflict them with oppression
  chosen_spanish_reading: Y puso sobre ellos capataces para que los oprimieran con trabajos forzados
  alternative_spanish_readings:
  - para que los afligieran con opresión
  - para que los sometieran con dureza
  rationale: 'La decisión es narrativa y lexical, no doctrinal: el texto describe una acción administrativa y opresiva de Faraón, y el español elegido preserva esa fuerza sin introducir formulaciones eclesiásticas.'
  doctrine_reference: Exodus 1:11–14; Jubilees 46:14
- issue: Topónimos de Egipto en la construcción bíblica
  english_pob_reading: Pithom and Raamses
  chosen_spanish_reading: Pitom y Raamsés
  alternative_spanish_readings:
  - Pítom y Raamsés
  - Pitom y Ramsés
  rationale: Se preservan los nombres propios como marcadores históricos/geográficos; no se espiritualizan ni se traducen.
  doctrine_reference: Exodus 1:11; Jubilees 46:14
