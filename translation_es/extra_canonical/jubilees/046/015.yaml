    timestamp: '2026-04-23T14:52:51Z'
    unchanged: false
    changes_summary: Replaced 'however much they dealt harshly with them, so much the more' with the more natural and concise 'the more they oppressed them, the more,' while preserving the incomplete comparative structure of the source.
translation:
  language: es
  text: en la tierra de Egipto. Y los hicieron servir por la fuerza, y cuanto más los oprimían, tanto más
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በሀገረ፡ ግብጽ።
  english_pob_choice: in the land of Egypt.
  chosen_spanish: en la tierra de Egipto.
  alternatives_spanish:
  - en la tierra de Egipto
  - en Egipto
  lexicon: በ... ግብጽ = locativo de lugar
  rationale: La expresión ge'ez indica ubicación territorial; «en la tierra de Egipto» conserva el matiz geográfico del inglés POB y mantiene la formulación bíblica natural en español.
- source_word: ወይቀንይዎሙ፡
  english_pob_choice: And they made them serve by force
  chosen_spanish: Y los hicieron servir por la fuerza
  alternatives_spanish:
  - Y los obligaron a servir
  - Y los sometieron a servidumbre por la fuerza
  lexicon: causativo de servir / forzar
  rationale: El verbo transmite una acción de imposición de servicio. «Hicieron servir» conserva la relación causal del original y «por la fuerza» refleja el medio coercitivo sin suavizar la dureza del pasaje.
- source_word: በግፍዕ፡
  english_pob_choice: by force
  chosen_spanish: por la fuerza
  alternatives_spanish:
  - con violencia
  - a la fuerza
  lexicon: coacción violenta
  rationale: La frase especifica el modo de la servidumbre; «por la fuerza» es idiomática y mantiene la carga de coerción que el inglés POB ya explicitó.
- source_word: ወመጠነ፡ ... ከማሁ፡
  english_pob_choice: and the more they oppressed them, the more
  chosen_spanish: y cuanto más los oprimían, tanto más
  alternatives_spanish:
  - y mientras más los oprimían, más
  - y mientras más los maltrataban, más
  lexicon: comparativo correlativo incompleto
  rationale: El ge'ez preserva una estructura comparativa correlativa que el inglés POB dejó incompleta a propósito. En español, «cuanto más..., tanto más» reproduce esa tensión y deja la clausula final abierta, sin añadir material no atestiguado.
theological_decisions:
- issue: Representación de la esclavitud/coacción del pueblo en Egipto
  english_pob_reading: they made them serve by force
  chosen_spanish_reading: los hicieron servir por la fuerza
  alternative_spanish_readings:
  - los esclavizaron
  - los sometieron a servidumbre
  rationale: El texto describe coerción real en el servicio; la formulación evita suavizarla. «Esclavizaron» sería posible, pero el ge'ez y el inglés POB enfatizan el acto de hacer servir bajo fuerza más que una etiqueta abstracta.
  doctrine_reference: Éxodo 1:13-14; tema bíblico de opresión de Israel en Egipto
- issue: Estructura comparativa abierta
  english_pob_reading: the more they oppressed them, the more
  chosen_spanish_reading: cuanto más los oprimían, tanto más
  alternative_spanish_readings:
  - mientras más los oprimían, más
  - cuanto más los maltrataban, tanto más
  rationale: Se conserva la comparación creciente sin cerrar la frase con un complemento inexistente en la fuente. El español admite esta suspensión retórica y refleja la forma heredada por el POB inglés tras la revisión.
  doctrine_reference: Procedimiento retórico de intensificación paralelística en literatura bíblica
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que sustituyó una redacción más pesada ('however much they dealt harshly with them, so much the more') por una formulación más natural ('the more they oppressed them, the more'), manteniendo la correlación incompleta. La versión española sigue esa decisión y la reproduce con una estructura correlativa igualmente abierta.
  spanish_consistency_notes:
  - Se usó «Y» para mantener la continuidad narrativa del versículo.
  - Se evitó «SEÑOR» y otras sustituciones porque el versículo no contiene el Tetragrámaton ni lenguaje divino explícito.
  - No se añadió puntuación explicativa adicional al final para respetar la clausula comparativa truncada del original.
