translation:
  language: es
  text: Y no hubo adversario ni nada malo[a] durante todos los días de la vida de José, la que vivió después de su padre Jacob, porque todo Egipto lo honraba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “ningún mal”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: መዋዕለ፡ ሕይወቱ፡
  english_pob_choice: the days of Joseph's life
  chosen_spanish: los días de la vida de José
  alternatives_spanish:
  - los días de la vida de José
  - la vida de José
  lexicon: ዕድሜ / vida; expresión temporal distributiva
  rationale: Mantengo la referencia temporal a lo largo de toda la vida de José con una formulación natural en español. "Los días de la vida" conserva el matiz idiomático del texto fuente sin sonar rígido.
- source_word: ወአልቦ፡ ሰይጣን፡
  english_pob_choice: there was no adversary
  chosen_spanish: no hubo adversario
  alternatives_spanish:
  - no hubo adversario
  - no hubo enemigo
  lexicon: opositor / adversario
  rationale: '"Adversario" refleja bien la oposición personal o activa indicada por el texto y coincide con la opción del POB en inglés.'
- source_word: ወአልቦ፡ ምንተኒ፡ እኩየ፡
  english_pob_choice: nothing evil
  chosen_spanish: nada malo
  alternatives_spanish:
  - nada malo
  - ningún mal
  lexicon: mal / malo
  rationale: El ge'ez usa una negación amplia de maldad; en español "nada malo" es natural y conserva la amplitud del negativo sin añadir una abstracción innecesaria.
- source_word: እለ፡ ሐይወ፡
  english_pob_choice: that he lived
  chosen_spanish: la que vivió
  alternatives_spanish:
  - que vivió
  - la que vivió
  lexicon: cláusula relativa de vida
  rationale: La cláusula relativa debe mantenerse para no perder el matiz del texto fuente y la revisión inglesa que restauró "that he lived". En español, "la que vivió" conecta con "la vida" y suena idiomático.
- source_word: እምድኅረ፡ አቡሁ፡ ያዕቆብ፡
  english_pob_choice: after his father Jacob
  chosen_spanish: después de su padre Jacob
  alternatives_spanish:
  - después de su padre Jacob
  - tras su padre Jacob
  lexicon: después de / tras
  rationale: 'Sigo la revisión inglesa más literal y natural: el ge''ez expresa posterioridad respecto a Jacob, no necesariamente una glosa explícita sobre la muerte. "Después de" evita sobreinterpretar.'
- source_word: ኵሎሙ፡ ግብጽ፡ ያከብ
  english_pob_choice: all Egypt honored him
  chosen_spanish: todo Egipto lo honraba
  alternatives_spanish:
  - todo Egipto lo honraba
  - todo Egipto le rendía honor
  lexicon: honrar
  rationale: '"Todo Egipto" reproduce el sujeto colectivo y "lo honraba" conserva el sentido de reconocimiento público del original y del POB inglés.'
theological_decisions:
- issue: Ausencia de adversario y maldad como afirmación de providencia favorable
  english_pob_reading: There was no adversary and nothing evil through all the days of Joseph's life ... because all Egypt honored him.
  chosen_spanish_reading: Y no hubo adversario ni nada malo durante todos los días de la vida de José ... porque todo Egipto lo honraba.
  alternative_spanish_readings:
  - No hubo enemigo ni mal alguno durante toda la vida de José
  - No tuvo oposición ni maldad en todos sus días
  rationale: Conservo la afirmación fuerte del texto sin suavizarla. La frase sigue siendo descriptiva y no doctrinaliza más allá de la providencia favorable que el pasaje atribuye a José.
  doctrine_reference: Providencia divina y favor concedido en la narración de José
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió una omisión final y restauró la cláusula relativa “that he lived”. La traducción española refleja esa cláusula con “la que vivió”, y evita la lectura más expansiva “después de la muerte de” porque no está explícita en el ge'ez citado.
  spanish_consistency_notes:
  - Uso "Egipto" como sujeto colectivo singular, coherente con el inglés POB y natural en español.
  - Mantengo "adversario" en lugar de "enemigo" para respetar la fuerza lexical del texto y la terminología POB.
  - El orden sintáctico se ajusta al español moderno sin perder la estructura semántica del original.
  - La nota al pie [a] está anclada en "malo[a]" para evitar marcadores huérfanos.
