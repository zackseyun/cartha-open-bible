lexical_decisions:
- source_word: እምታሕተ፡ ንጉሥ፡
  english_pob_choice: under the king
  chosen_spanish: bajo el rey
  alternatives_spanish:
  - sometido al rey
  - bajo el dominio del rey
  lexicon: —
  rationale: La expresión ge'ez indica subordinación o estado bajo la autoridad del rey. ‘Bajo el rey’ conserva la concisión del original y del inglés POB sin añadir interpretación.
- source_word: እንዘ፡ ይኴንን፡
  english_pob_choice: while he was ruling
  chosen_spanish: mientras él reinaba
  alternatives_spanish:
  - mientras gobernaba
  - en tanto que reinaba
  lexicon: —
  rationale: El valor aspectual de la cláusula verbal pide una acción en curso. ‘Reinaba’ mantiene el matiz de gobierno real sin volverlo más técnico de lo necesario.
- source_word: ኵላ፡ ምድረ፡ ግብጽ።
  english_pob_choice: all the land of Egypt
  chosen_spanish: toda la tierra de Egipto
  alternatives_spanish:
  - toda la tierra egipcia
  - todo el país de Egipto
  lexicon: —
  rationale: ‘Tierra de Egipto’ reproduce de cerca la construcción semítica y la formulación del inglés POB, con español natural.
- source_word: ወሞተ፡
  english_pob_choice: And he died
  chosen_spanish: Y murió
  alternatives_spanish:
  - Y falleció
  - Y murió él
  lexicon: —
  rationale: Se conserva la simpleza narrativa del original. ‘Murió’ es el equivalente directo y más neutro.
- source_word: ወኵሎሙ፡ አኅዊሁ፡
  english_pob_choice: and all his brothers
  chosen_spanish: y todos sus hermanos
  alternatives_spanish:
  - y todos sus hermanos varones
  - y todos sus hermanos con él
  lexicon: —
  rationale: La frase es directa; ‘todos sus hermanos’ corresponde al conjunto referido sin ampliar innecesariamente el referente.
theological_decisions:
- issue: Referencia al reinado de un rey humano sobre Egipto
  english_pob_reading: while he was ruling over all the land of Egypt
  chosen_spanish_reading: mientras él reinaba sobre toda la tierra de Egipto
  alternative_spanish_readings:
  - mientras gobernaba sobre toda la tierra de Egipto
  - cuando estaba reinando sobre toda la tierra de Egipto
  rationale: No hay necesidad de introducir mayúsculas teológicas ni sustituciones por ‘Señor’; el texto describe un reinado humano en sentido histórico.
  doctrine_reference: Historia narrativa del libro de Jubileos; no implica fórmula doctrinal específica
- issue: Muerte del personaje y mención de ‘todos sus hermanos’
  english_pob_reading: And he died, and all his brothers,
  chosen_spanish_reading: Y murió, y todos sus hermanos,
  alternative_spanish_readings:
  - Y murió él, y todos sus hermanos
  - Y falleció, y todos sus hermanos
  rationale: Se mantiene la ambigüedad/incompletitud del segmento tal como aparece en el packet fuente, sin completar la frase ni resolver el referente más allá de lo evidenciado.
  doctrine_reference: Principio de fidelidad textual y preservación de la apertura del testimonio narrativo
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó ‘ruling’ a ‘while he was ruling’ para reflejar con mayor claridad la cláusula verbal introducida por እንዘ. La versión española adopta esa misma relación temporal con ‘mientras él reinaba’, sin perder la fluidez del español.
  spanish_consistency_notes:
  - Se emplea ‘tierra de Egipto’ para mantener coherencia con el registro bíblico narrativo y con la estructura del texto fuente.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otras glosas teológicas, porque el versículo no las contiene.
  - La frase final permanece abierta con una coma, conforme al fragmento fuente y al texto inglés de auditoría.
