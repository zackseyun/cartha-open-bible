    changes_summary: Adjusted the first clause for more natural and faithful rendering of the parallel verbs; replaced 'so much the more' with 'likewise.' Changed 'abominable' to 'loathsome' to better reflect making them detested/hated in English.
translation:
  language: es
  text: Y aumentaron, y asimismo se multiplicaron. Y los egipcios aborrecieron a los hijos de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይበዝኁ፡
  english_pob_choice: they increased
  chosen_spanish: aumentaron
  alternatives_spanish:
  - crecieron
  - se multiplicaron
  lexicon: Jubilees 46:16 / Ge'ez verb for increase
  rationale: El verbo expresa incremento numérico; «aumentaron» es natural en español y conserva la fuerza del crecimiento poblacional sin añadir matices no presentes.
- source_word: ወከማሁ፡ ይፈደፍዱ።
  english_pob_choice: likewise they multiplied
  chosen_spanish: asimismo se multiplicaron
  alternatives_spanish:
  - y de igual manera se multiplicaron
  - igualmente se multiplicaron
  lexicon: Jubilees 46:16 / parallel intensification of multiplication
  rationale: La repetición paralela pide una marca adverbial de correspondencia; «asimismo» conserva el paralelismo con el primer miembro y evita el calco pesado de «y así mucho más».
- source_word: ወያስተረዙስዎሙ፡
  english_pob_choice: the Egyptians loathed
  chosen_spanish: los egipcios aborrecieron
  alternatives_spanish:
  - los egipcios detestaron
  - los egipcios abominaron
  lexicon: Jubilees 46:16 / causative-estimative stem lexicalized as detest/loathe
  rationale: La revisión inglesa aclaró que el sentido no es «hacer odiosos» sino «aborrecer/detestar». «Aborrecer» reproduce bien la hostilidad afectiva sin sonar forzado en español bíblico contemporáneo.
- source_word: ሰብአ፡ ግብጽ፡ ለውሉደ፡ እስራኤል።
  english_pob_choice: the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los descendientes de Israel
  - a los hijos de Israel
  lexicon: Jubilees 46:16 / idiom for Israel's offspring
  rationale: Se conserva la fórmula heredada del texto fuente. «Hijos de Israel» mantiene el registro bíblico y la referencia étnico-familiar del original.
theological_decisions:
- issue: Sentido del verbo acerca de la reacción egipcia
  english_pob_reading: the Egyptians loathed the sons of Israel
  chosen_spanish_reading: los egipcios aborrecieron a los hijos de Israel
  alternative_spanish_readings:
  - los egipcios los hicieron aborrecibles
  - los egipcios hicieron odiosos a los hijos de Israel
  rationale: La historia del pasaje describe el odio real de los egipcios hacia Israel; la versión española debe reflejar ese juicio afectivo directo y no invertir el sujeto de la aversión.
  doctrine_reference: Éxodo 1:12; paralelos narrativos sobre la opresión de Israel en Egipto
translation_notes:
  revision_awareness: La base inglesa pasó de una formulación causativa ('made... loathsome') a una lectura estativa/estimativa ('loathed'), siguiendo la revisión lexical más reciente; la redacción española adopta directamente esa solución.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otros reemplazos innecesarios porque el versículo no contiene el Tetragrámaton ni un título divino.
  - 'Se mantuvo el paralelismo verbal del hebraísmo subyacente con dos verbos coordinados: crecimiento y multiplicación.'
  - «Aborrecer» se eligió por su compatibilidad con el registro bíblico y con la revisión del audit trail; no se usó «hacer abominable/odioso» porque esa lectura ya fue descartada.
