base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/046/007.yaml
  text: Egypt and killed him there; and he pursued after them to Egypt, as far as the entrance of Eromon. But he could not enter, because another new king had arisen over Egypt, stronger than he, and he returned to the land of Canaan, and the gate of Egypt was shut, and there was none who went out and none who came in to Egypt.
  footnotes:
  - marker: a
    text: Or 'he took possession of the land of Canaan and shut the gate of Egypt'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:49Z'
    unchanged: false
    changes_summary: Added 'them to Egypt' to reflect the object and destination more completely; changed 'for Egypt' to 'over Egypt' for more natural and accurate English.
translation:
  language: es
  text: Fue a Egipto y lo mató allí; y los persiguió hasta Egipto, hasta la entrada de Eromón. Pero no pudo entrar, porque había surgido sobre Egipto otro rey nuevo, más fuerte que él, y regresó a la tierra de Canaán[a]; y la puerta de Egipto fue cerrada, y no había ninguno que saliera ni ninguno que entrara en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomó posesión de la tierra de Canaán y cerró la puerta de Egipto».
    reason: Preserva la variante de una traducción anterior documentada en la nota del English POB.
lexical_decisions:
- source_word: ግብጽ / Egypt
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: topónimo bíblico
  rationale: El geʿez nombra el país de forma directa; en español conviene el topónimo breve y estándar «Egipto». Se evita añadir «tierra de» salvo donde el contexto lo requiera.
- source_word: ወቀተሎ
  english_pob_choice: and killed him there
  chosen_spanish: lo mató allí
  alternatives_spanish:
  - y lo mató allí
  - y lo mató en ese lugar
  lexicon: verbo de muerte
  rationale: El objeto directo masculino singular queda claro en el contexto. «Lo mató allí» reproduce la concisión del original y la secuencia narrativa sin sobreexplicar.
- source_word: ዴገነ፡ ድኅሬሆሙ
  english_pob_choice: and he pursued after them
  chosen_spanish: y los persiguió
  alternatives_spanish:
  - y los persiguió a ellos
  - y fue tras ellos
  lexicon: verbo de persecución
  rationale: La revisión inglesa corrigió el objeto a plural; en español se refleja con «los». «Persiguió» conserva la idea de ir detrás con hostilidad o presión.
- source_word: እስከ፡ አንቀጸ፡ ኤሮሞን
  english_pob_choice: as far as the entrance of Eromon
  chosen_spanish: hasta la entrada de Eromón
  alternatives_spanish:
  - hasta la puerta de Eromón
  - hasta el acceso de Eromón
  lexicon: topónimo + sustantivo espacial
  rationale: Se mantiene el nombre propio transliterado «Eromón» y se traduce አንቀጸ como «entrada», que es la opción más natural y fiel al sentido espacial. «Puerta» quedaría algo más interpretativa.
- source_word: ወኀየሰ፡ እምኔሁ
  english_pob_choice: because another new king had arisen over Egypt, stronger than he
  chosen_spanish: porque se había levantado sobre Egipto otro rey nuevo, más fuerte que él
  alternatives_spanish:
  - porque otro rey nuevo se había levantado sobre Egipto, más fuerte que él
  - porque había surgido otro rey nuevo sobre Egipto, más fuerte que él
  lexicon: verbo de ascenso real
  rationale: «Se había levantado» preserva la imagen de ascenso o aparición de un poder real. «Sobre Egipto» sigue el inglés revisado y mantiene la relación de dominio.
- source_word: ወገብአ
  english_pob_choice: he returned to the land of Canaan
  chosen_spanish: regresó a la tierra de Canaán
  alternatives_spanish:
  - volvió a la tierra de Canaán
  - retornó a la tierra de Canaán
  lexicon: verbo de retorno
  rationale: La revisión textual corrigió este verbo como «regresó/returned», no como «tomó posesión». En español, «regresó» es preciso y natural.
- source_word: ወተዐጽወ
  english_pob_choice: the gate of Egypt was shut
  chosen_spanish: la puerta de Egipto fue cerrada
  alternatives_spanish:
  - la puerta de Egipto quedó cerrada
  - la puerta de Egipto se cerró
  lexicon: pasiva verbal
  rationale: El geʿez es pasivo; por eso se usa «fue cerrada» para conservar la pasividad sin atribuir la acción al sujeto equivocado. «Puerta» sigue la imagen del original y de la traducción inglesa.
- source_word: ወአልቦ፡ ዘይወፅእ፡ ወአልቦ፡ ዘይበውእ
  english_pob_choice: there was none who went out and none who came in to Egypt
  chosen_spanish: no había ninguno que saliera ni ninguno que entrara en Egipto
  alternatives_spanish:
  - no había nadie que saliera ni nadie que entrara en Egipto
  - no hubo quien saliera ni quien entrara en Egipto
  lexicon: expresión negativa distributiva
  rationale: 'La doble construcción negativa se conserva con paralelismo: «no había ninguno que saliera ni ninguno que entrara». Esto refleja la clausura total del paso.'
theological_decisions:
- issue: Relación de dominio expresada por «sobre Egipto»
  english_pob_reading: another new king had arisen over Egypt
  chosen_spanish_reading: se había levantado sobre Egipto otro rey nuevo
  alternative_spanish_readings:
  - se había levantado para Egipto otro rey nuevo
  - se había levantado en Egipto otro rey nuevo
  rationale: La revisión inglesa corrigió «for Egypt» a «over Egypt», indicando dominio político y no mera localización. En español, «sobre Egipto» conserva ese matiz de autoridad.
  doctrine_reference: Soberanía política en la narración histórica; no implica doctrina técnica adicional.
- issue: Pasiva de la puerta cerrada
  english_pob_reading: the gate of Egypt was shut
  chosen_spanish_reading: la puerta de Egipto fue cerrada
  alternative_spanish_readings:
  - la puerta de Egipto quedó cerrada
  - se cerró la puerta de Egipto
  rationale: La pasiva del geʿez evita atribuir el cierre a un agente explícito. Mantener la pasiva en español respeta la forma y no introduce una causalidad no expresada.
  doctrine_reference: Fidelidad narrativa al agente implícito/omitido del texto fuente.
- issue: Objeto plural en la persecución
  english_pob_reading: he pursued after them to Egypt
  chosen_spanish_reading: los persiguió hasta Egipto
  alternative_spanish_readings:
  - lo persiguió hasta Egipto
  - los siguió hasta Egipto
  rationale: La revisión textual indica plural («them»), y el español debe reflejar ese plural para no borrar la referencia colectiva. «Persiguió» conserva el tono hostil implícito.
  doctrine_reference: Precisión referencial del relato.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés POB, especialmente en tres puntos: (1) el objeto plural «them» en «los persiguió»; (2) la lectura correcta de dominio en «sobre Egipto»; y (3) la corrección decisiva de ወገብአ como «regresó» y de ወተዐጽወ como pasivo («fue cerrada»), evitando la lectura anterior errónea de conquista/acción activa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar del proyecto cuando aparezca el nombre divino, pero en este versículo no interviene.
  - Se usa «Canaán» y «Egipto» como topónimos bíblicos estándar, con transliteración solo en «Eromón» porque corresponde al nombre propio del texto fuente.
  - Se evita «SEÑOR» y otras sustituciones devocionales; el versículo es narrativo y no requiere adaptación litúrgica.
  - Se conserva la coordinación narrativa con punto y coma para reflejar la sintaxis acumulativa del original.
