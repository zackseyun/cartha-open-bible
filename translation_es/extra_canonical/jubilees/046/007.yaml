review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general y recoge correctamente las revisiones clave del audit trail: objeto plural en «los persiguió», valor de retorno en «regresó a la tierra de Canaán» y pasiva en «la puerta de Egipto fue cerrada». Sin embargo, la apertura del versículo queda incompleta: el texto fuente/POB inglés comienza con «Egypt and killed him there», lo que en español no puede quedar como un fragmento nominal suelto «Egipto y lo mató allí». Hace falta una reparación mínima para que el español preserve la relación sintáctica sin perder el vínculo con Egipto. Además, el inglés POB conserva una variante previa en nota, y conviene mantenerla en español.'
  spanish_quality_summary: La mayor parte del español es legible y digna, pero el inicio «Egipto y lo mató allí» resulta agramatical o truncado para un lector hispanohablante. También «se había levantado sobre Egipto otro rey nuevo» es comprensible pero algo rígido; «había surgido sobre Egipto otro rey nuevo» suena más natural sin perder el matiz de dominio. El resto del versículo fluye bien.
  glossary_alignment: No hay términos teológicos de proyecto especialmente activados aquí. Los topónimos «Egipto», «Eromón» y «Canaán» están bien. La decisión de mantener la pasiva en «fue cerrada» está alineada con la revisión inglesa. La nota de variante debe reflejar la lectura anterior documentada por el POB.
  issues:
  - severity: high
    issue: Inicio español truncado y poco fiel sintácticamente
    rationale: «Egipto y lo mató allí» no funciona como oración natural en español y no deja claro cómo se relaciona «Egipto» con el verbo. El original/POB inglés conserva a Egipto dentro del desarrollo verbal; el español necesita una formulación mínima como «fue a Egipto y lo mató allí» para ser inteligible sin añadir contenido doctrinal.
  - severity: medium
    issue: Falta la nota de variante documentada en el audit trail inglés
    rationale: El English POB preserva una alternativa significativa sobre «regresó a la tierra de Canaán» frente a «tomó posesión de la tierra de Canaán y cerró la puerta de Egipto». Si el proyecto mantiene ese rastro de auditoría, debe reflejarse también en español con marcador único.
  - severity: low
    issue: Redacción algo rígida en «se había levantado sobre Egipto otro rey nuevo»
    rationale: No es incorrecta, pero «había surgido sobre Egipto otro rey nuevo» o «se había levantado otro rey nuevo sobre Egipto» mejora la naturalidad. Esto es estilístico, no una desviación grave.
  revised_spanish_text: Fue a Egipto y lo mató allí; y los persiguió hasta Egipto, hasta la entrada de Eromón. Pero no pudo entrar, porque había surgido sobre Egipto otro rey nuevo, más fuerte que él, y regresó a la tierra de Canaán[a]; y la puerta de Egipto fue cerrada, y no había ninguno que saliera ni ninguno que entrara en Egipto.
  revised_footnotes:
  - marker: a
    text: O «tomó posesión de la tierra de Canaán y cerró la puerta de Egipto».
    reason: Preserva la variante de una traducción anterior documentada en la nota del English POB.
