base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/046/001.yaml
  text: And it came to pass after Jacob died, the sons of Israel increased in the land of Egypt, and they became a numerous people; and they were all united in their hearts, so that each loved his brother and a man helped his brother. And they increased abundantly and multiplied exceedingly during all the days of Joseph, for ten weeks of years.
  footnotes:
  - marker: a
    text: Or 'and grew strong'.
    reason: previous_rendering
  - marker: b
    text: Or 'they were all united'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:48Z'
    unchanged: false
    changes_summary: Refined 'of one accord' to 'united' for naturalness, adjusted the clause to reflect purpose/result more clearly ('so that each loved his brother and a man helped his brother'), and removed 'life' after Joseph since it is not explicit in the source. Also changed 'throughout' to 'during' for smoother formal English.
translation:
  language: es
  text: Y aconteció que, después de la muerte de Jacob, los hijos de Israel aumentaron en la tierra de Egipto y llegaron a ser un pueblo numeroso; y todos estaban unidos[a] en sus corazones, de modo que cada uno amaba a su hermano y un hombre ayudaba a su hermano. Y aumentaron sobremanera y se multiplicaron muchísimo durante todos los días de José, por diez semanas de años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaban unidos en sus corazones».'
    reason: textual_variant
lexical_decisions:
- source_word: ወኮነ፡ እምድኅረ፡ ሞተ፡ ያዕቆብ፡
  english_pob_choice: And it came to pass after Jacob died
  chosen_spanish: Y aconteció que, después de la muerte de Jacob
  alternatives_spanish:
  - Y sucedió que, después de morir Jacob
  - Y aconteció después de la muerte de Jacob
  lexicon: Narrative formula
  rationale: Conserva la fórmula narrativa solemne sin volverla arcaica en exceso; "después de la muerte de Jacob" refleja el hecho explícito del ge'ez.
- source_word: በዝኁ
  english_pob_choice: increased
  chosen_spanish: aumentaron
  alternatives_spanish:
  - crecieron
  - se hicieron más numerosos
  lexicon: bäzḫu / increase, multiply
  rationale: '"Aumentaron" es natural en español y mantiene la idea de crecimiento numérico sin añadir fuerza no explícita.'
- source_word: ሕዝበ፡ ብዙኃ፡
  english_pob_choice: a numerous people
  chosen_spanish: un pueblo numeroso
  alternatives_spanish:
  - un pueblo muy numeroso
  - una multitud
  lexicon: people / many
  rationale: Respeta el valor colectivo de "people" y la cualidad de "many" sin exagerar el registro.
- source_word: ኵሎሙ፡ ዕሩያነ፡ በአልቦሙ፡
  english_pob_choice: they were all united in their hearts
  chosen_spanish: todos estaban unidos en sus corazones
  alternatives_spanish:
  - todos estaban unidos en su corazón
  - todos eran de un mismo sentir
  lexicon: united / hearts
  rationale: La revisión auditada señala "in their hearts"; "en sus corazones" preserva la imagen plural del original y la unidad interior.
- source_word: ከመ፡ ያፍቅር፡ እኁሁ፡ እኅዋሁ፡
  english_pob_choice: so that each loved his brother
  chosen_spanish: de modo que cada uno amaba a su hermano
  alternatives_spanish:
  - para que cada uno amara a su hermano
  - de manera que cada uno amaba a su hermano
  lexicon: purpose/result clause
  rationale: '"De modo que" mantiene el matiz de resultado o propósito observado en la revisión inglesa, sin forzar una subordinación más técnica.'
- source_word: ወከመ፡ ይትራዳእ፡ ብእሲ፡ ምስለ፡ እኁሁ፡
  english_pob_choice: and a man helped his brother
  chosen_spanish: y un hombre ayudaba a su hermano
  alternatives_spanish:
  - y un hombre ayudaba a su hermano
  - y cada hombre ayudaba a su hermano
  lexicon: help / man
  rationale: Mantiene el paralelismo del ge'ez con el hebraísmo de "un hombre" sin aclararlo demasiado; "ayudaba" conserva el valor continuo/general.
- source_word: ወበዝኁ፡ ፈድፋደ፡
  english_pob_choice: And they increased abundantly
  chosen_spanish: Y aumentaron sobremanera
  alternatives_spanish:
  - Y aumentaron abundantemente
  - Y crecieron en gran manera
  lexicon: intensive increase
  rationale: '"Sobremanera" reproduce bien el intensivo adverbial y suena digno en español bíblico contemporáneo.'
- source_word: ወበዝኁ፡ ጥቀ
  english_pob_choice: and multiplied exceedingly
  chosen_spanish: y se multiplicaron muchísimo
  alternatives_spanish:
  - y se multiplicaron sobremanera
  - y se multiplicaron en gran manera
  lexicon: repeat of increase verb
  rationale: La revisión corrigió que el segundo verbo también es "aumentar/multiplicar"; "se multiplicaron muchísimo" preserva la repetición y el intensivo sin introducir "fueron fuertes".
- source_word: ዐሠርተ፡ ሱባዔ፡ ዓመታት፡
  english_pob_choice: for ten weeks of years
  chosen_spanish: por diez semanas de años
  alternatives_spanish:
  - durante diez semanas de años
  - por diez semanas de años
  lexicon: time period idiom
  rationale: Se conserva la expresión cronológica peculiar del texto fuente sin sustituirla por una equivalencia interpretativa.
theological_decisions:
- issue: Unidad interior del pueblo
  english_pob_reading: they were all united in their hearts
  chosen_spanish_reading: todos estaban unidos en sus corazones
  alternative_spanish_readings:
  - todos eran de un mismo sentir
  - todos estaban unidos en su corazón
  rationale: El ge'ez especifica una unidad interior; evitar una expresión más abstracta preserva la metáfora corporal y la dimensión comunitaria del texto.
  doctrine_reference: Comunidad/corazón como sede de intención y concordia
- issue: Repetición del aumento
  english_pob_reading: increased abundantly and multiplied exceedingly
  chosen_spanish_reading: aumentaron sobremanera y se multiplicaron muchísimo
  alternative_spanish_readings:
  - aumentaron abundantemente y se multiplicaron sobremanera
  - crecieron en gran manera y se multiplicaron en gran manera
  rationale: La corrección textual muestra dos verbos distintos con intensificación; la traducción debe mantener ambas acciones sin fundirlas en un solo concepto de fortaleza o prosperidad.
  doctrine_reference: Fidelidad al paralelismo y a la progresión narrativa
translation_notes:
  revision_awareness: La revisión más reciente corrigió una mala traducción de la segunda ocurrencia de በዝኁ como 'crecieron fuertes'; aquí se refleja como 'se multiplicaron muchísimo'. También se incorporó el matiz explícito de 'en sus corazones' señalado por la revisión de control, y se mantuvo la formulación de resultado ('de modo que') para los dos miembros paralelos de amor y ayuda.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene 'José' para Ἰωσήφ/Joseph conforme al uso español normal y al contexto narrativo.
  - Se preserva 'pueblo numeroso' y no 'gente' para conservar el valor colectivo del original.
  - No se ha suavizado 'por diez semanas de años', porque el texto fuente presenta esa unidad cronológica idiomática de manera explícita.
