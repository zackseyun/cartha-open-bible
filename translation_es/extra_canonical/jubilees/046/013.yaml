base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/046/013.yaml
  text: and he oppressed them, and he said to the people of Egypt, 'Look, the people of the children of Israel are more and stronger than we are. Come, let us deal wisely with them, before they multiply, and let us oppress them with servitude, lest war come upon us and they also join themselves to our enemies and go out from our land, for their hearts and their faces are toward the land of Canaan.'
  footnotes:
  - marker: a
    text: Or 'lest they multiply'.
    reason: previous_rendering
  - marker: b
    text: Or 'and go up from our land'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:52Z'
    unchanged: false
    changes_summary: Replaced the initial infinitive-like phrase with a finite clause matching the source ('and he oppressed them'); changed 'sons' to 'children' for a more natural collective rendering; removed 'before' and kept 'lest they multiply' closer to the source; repeated 'oppress' for consistency with the same verb; and changed 'go out from our land' to 'go up from our land' to reflect the source wording.
translation:
  language: es
  text: 'y los oprimió, y dijo al pueblo de Egipto: «Miren, el pueblo de los hijos de Israel es más numeroso y fuerte que nosotros. Vengan, actuemos con astucia en su contra antes de que se multipliquen[a], y oprimámoslos con servidumbre, no sea que venga guerra sobre nosotros y ellos también se unan a nuestros enemigos y salgan de nuestra tierra[b], pues sus corazones y sus rostros están vueltos hacia la tierra de Canaán.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no sea que se multipliquen». El geez ዘእንበለ (zä-ʾənbälä) puede leerse como temporal ('antes de que') o final-negativo ('para que no / no sea que'). Los revisores confirmaron la lectura temporal como la más ajustada al texto fuente.
    reason: alternative_reading
  - marker: b
    text: 'O «y suban de nuestra tierra». Esta alternativa refleja una armonización con el hebreo de Éxodo 1:10 (עָלָה מִן הָאָרֶץ), que fue corregida en la revisión del texto inglés: el verbo geez ወፅአ (wäṣʾa) significa ''salir'', no ''subir''.'
    reason: textual_variant
lexical_decisions:
- source_word: ያሕምሞሙ (ḥamm — oppress/afflict)
  english_pob_choice: oppressed / oppress
  chosen_spanish: oprimió / oprimámoslos
  alternatives_spanish:
  - afligió / aflijámoslos
  - maltrató / maltratémoslos
  lexicon: 'CDG s.v. ሐምም: afflict, oppress; Dillmann 549'
  rationale: Ge'ez ሐምም covers both affliction and systemic political oppression. The English POB settled on 'oppress' (correcting 'afflict') after the revision pass, reflecting the sociopolitical force of the Ge'ez and the parallel Exodus 1 context. Spanish 'oprimir' best conveys coercive subjugation rather than mere personal suffering, and is used consistently for both finite verb forms in this verse.
- source_word: ሕዝበ፡ ውሉደ (ḥəzbä wəludä — people of the sons/children)
  english_pob_choice: the people of the children of Israel
  chosen_spanish: el pueblo de los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - el pueblo de los israelitas
  lexicon: 'CDG s.v. ሕዝብ (ḥəzb): people, nation; s.v. ውሉድ (wəlud): sons, children, offspring'
  rationale: The Ge'ez retains a dual-level designation—'people' (ሕዝብ) plus 'children/sons' (ውሉድ) of Israel—that parallels the phrasing found in other Jubilees verses. Collapsing to just 'los hijos de Israel' would erase the ḥəzb term. The English POB's 'children of Israel' (rather than 'sons') was chosen for a more natural collective sense; Spanish 'hijos' is equally natural as a collective and standard in biblical usage.
- source_word: ናሁ (nāhu — behold/look)
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - He aquí
  - Fíjense
  lexicon: 'CDG s.v. ናሁ: behold, lo, see'
  rationale: ናሁ is a demonstrative-exclamative particle used to introduce a surprising or urgent observation. The English POB's 'Look' captures the colloquial urgency of a direct speech appeal. Spanish 'Miren' (imperative plural) is the natural equivalent in speech address and preferred over the archaic 'He aquí' for modern readability.
- source_word: ልህቁ፡ ወበዝኁ፡ እምኔነ (ləhqu wäbäzəḥu ʾəmnnenä — are greater and more numerous than we)
  english_pob_choice: more and stronger than we are
  chosen_spanish: más numeroso y fuerte que nosotros
  alternatives_spanish:
  - más grandes y poderosos que nosotros
  - más numerosos y más poderosos que nosotros
  lexicon: 'CDG s.v. ለሃቀ (ləhaqä): to grow, become great; s.v. በዝኀ (bäzəḥa): to be many, multiply, be strong'
  rationale: Two distinct Ge'ez verbs convey both numerical growth and superior strength, echoing the Hebrew of Exodus 1:9 (רַב וְעָצוּם). 'Más numeroso y fuerte' renders the complementary senses without redundancy. The subject 'el pueblo' is grammatically singular in Spanish but semantically collective; agreement with 'es' (singular) is retained, with 'que nosotros' as the comparative complement.
- source_word: ንጥበብ (nəṭbäb — let us be wise/clever/shrewd)
  english_pob_choice: deal wisely
  chosen_spanish: actuemos con astucia
  alternatives_spanish:
  - seamos astutos
  - procedamos con sabiduría
  lexicon: 'CDG s.v. ጠበበ (ṭäbbäbä): to be wise, prudent, clever; hortative stem'
  rationale: The Ge'ez root ṭäbbäb means wisdom/cleverness but in this oppressive political context carries a scheming, self-serving sense—the 'wisdom' of the powerful plotting against the vulnerable. 'Actuemos con astucia' (let us act shrewdly) preserves this ambivalent edge, paralleling the Hebrew התחכמה (Exod 1:10). 'Sabiduría' alone would over-dignify the term in context.
- source_word: ዘእንበለ፡ ይብዝኁ (zä-ʾənbälä yəbzəḥu — before they multiply)
  english_pob_choice: before they multiply
  chosen_spanish: antes de que se multipliquen
  alternatives_spanish:
  - no sea que se multipliquen
  - para que no se multipliquen
  lexicon: 'CDG s.v. ዘእንበለ (zä-ʾənbälä): before, without; temporal or privative conjunction'
  rationale: The conjunction ዘእንበለ primarily means 'before' or 'without', not 'lest' (which requires ከመ፡ ኢ, kämä ʾi). The claude-opus-4-7 adjudicator explicitly corrected the gpt-5.4 revision that had changed 'before' to 'lest' here, confirming that the temporal reading is source-grounded. Spanish 'antes de que se multipliquen' faithfully renders the Ge'ez. The 'lest' alternative is documented in footnote [a].
- source_word: ቅኔ (qəne — servitude/hard labor/forced work)
  english_pob_choice: servitude
  chosen_spanish: servidumbre
  alternatives_spanish:
  - trabajo forzado
  - esclavitud
  lexicon: 'CDG s.v. ቅኔ: measure, rule; in contextual use parallel to Exod 1: hard/forced labor'
  rationale: In this Jubilees verse, ቅኔ functions in clear parallel to the forced labor context of Exodus 1. The English POB's 'servitude' is preserved as Spanish 'servidumbre', which conveys compelled subjugation without the narrower legal connotation of 'esclavitud' (chattel slavery) or the more bureaucratic ring of 'trabajo forzado'.
- source_word: ወፅአ (wäṣʾa — to go out)
  english_pob_choice: go out from our land
  chosen_spanish: salgan de nuestra tierra
  alternatives_spanish:
  - suban de nuestra tierra
  lexicon: 'CDG s.v. ወፅአ (wäṣʾa): to go out, depart, exit; distinct from ዐርገ (ʿärgä): to go up'
  rationale: The Ge'ez verb ወፅአ unambiguously means 'to go out/depart', not 'to go up'. The gpt-5.4 revision had changed this to 'go up', harmonizing with Hebrew Exodus 1:10 (עלה מן הארץ), but the claude-opus-4-7 adjudicator corrected this as a mistranslation that overrides the actual Ge'ez text. Spanish 'salgan de nuestra tierra' faithfully renders the Ge'ez. The 'go up' alternative (reflecting Exodus harmonization) is documented in footnote [b].
theological_decisions:
- issue: Relationship to Exodus 1:9-10 parallel
  english_pob_reading: Jubilees 46:13 closely echoes Exodus 1:9-10 but is an independent Ge'ez composition; source-language terms must govern the translation even where they diverge from the Hebrew.
  chosen_spanish_reading: Translation follows the Ge'ez text exclusively; echoes of the Exodus narrative are preserved naturally but do not override lexical evidence (ወፅአ = 'go out', not 'go up'; ዘእንበለ = 'before', not 'lest').
  alternative_spanish_readings:
  - Translation harmonized with Reina-Valera rendering of Exodus 1:10 ('para que no salgan de la tierra')
  rationale: Two of the three applied revisions explicitly correct harmonization errors that privileged the Hebrew/Greek Bible over the actual Ge'ez source. The Spanish draft must honor those corrections and resist assimilation to the familiar Exodus 1 wording, which would misrepresent the Jubilees text.
  doctrine_reference: 'POB source-priority principle: translation from original-language evidence; cross-canonical echoes are noted but do not override the primary source text.'
translation_notes:
  revision_awareness: 'Dos correcciones aplicadas por claude-opus-4-7 (2026-04-28) son determinantes para este borrador español: (1) La conjunción ዘእንበለ (zä-ʾənbälä) en el primer uso significa «antes» (temporal), no «no sea que» (final-negativa) — la revisión de gpt-5.4 había cambiado erróneamente «before they multiply» a «lest they multiply»; la corrección restaura la lectura temporal y el español adopta «antes de que se multipliquen». (2) El verbo ወፅአ (wäṣʾa) significa «salir», no «subir» — la revisión de gpt-5.4 había armonizado con el hebreo de Éxodo 1:10 cambiando «go out» a «go up»; la corrección restaura el texto geez y el español adopta «salgan de nuestra tierra». Ambas correcciones están reflejadas en el texto español principal; las lecturas rechazadas se documentan en las notas [a] y [b].'
  spanish_consistency_notes:
  - 'El verbo ሐምም se traduce coherentemente como ''oprimir'' en ambas apariciones del versículo: ''los oprimió'' (v. inicial) y ''oprimámoslos'' (hortativo); se evita alternar con ''afligir'' para no perder la coherencia léxica.'
  - ምድር se traduce como 'tierra' en ambas apariciones ('nuestra tierra', 'la tierra de Canaán'), sin alternar con 'país' o 'región'.
  - La partícula ናሁ se traduce como 'Miren' (imperativo de apelación directa), siguiendo el estilo de discurso directo del texto; 'He aquí' queda reservado para contextos más solemnes o proféticos.
  - Las comillas angulares «» se usan para el discurso directo del faraón, conforme a la convención tipográfica española estándar.
  - 'El modo subjuntivo se usa sistemáticamente en las cláusulas de propósito y temor: ''antes de que se multipliquen'', ''no sea que venga'', ''se unan'', ''salgan''.'
