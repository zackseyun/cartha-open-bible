translation_notes:
  revision_awareness: El texto inglés revisado corrigió la naturalidad de 'would not again bring out and bury him' a 'would not again bring him out and bury him'; la versión española ya refleja esa completitud natural con 'lo sacarían de nuevo para enterrarlo'. También se conserva la terminación incompleta del versículo, sin intentar resolverla.
  spanish_consistency_notes:
  - Se usa 'Canaán' y 'Asiria' como topónimos estándar en español bíblico.
  - Se mantiene 'sus huesos' sin añadir nota, porque el referente es claro en el contexto.
  - Se evita 'SEÑOR' u otras sustituciones devocionales, ya que este versículo no contiene el Tetragrámaton ni una cita directa del mismo.
  - Se conserva la incompletitud final del versículo para respetar la fuente.
