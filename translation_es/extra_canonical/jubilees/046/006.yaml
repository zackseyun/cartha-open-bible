lexical_decisions:
- source_word: አዕፅምቲሁ
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - los huesos de él
  - los huesos suyos
  lexicon: huesos
  rationale: El ge'ez expresa literalmente 'sus huesos'; en español, 'sus huesos' conserva la referencia posesiva y es natural. No hace falta explicitar 'de él' porque el contexto ya identifica al sujeto.
- source_word: ወአምሐሎሙ
  english_pob_choice: And he made them swear
  chosen_spanish: Y les hizo jurar
  alternatives_spanish:
  - Y los hizo jurar
  - Y los obligó a jurar
  lexicon: jurar
  rationale: La forma causativa corresponde bien a 'les hizo jurar'. 'Obligó a jurar' añade fuerza interpretativa que el texto no exige.
- source_word: አይድኅሙ
  english_pob_choice: bring him out
  chosen_spanish: lo sacarían de nuevo
  alternatives_spanish:
  - lo sacarían otra vez
  - lo traerían de nuevo
  lexicon: sacar
  rationale: El contexto habla de sacar el cuerpo de Egipto para sepultarlo en Canaán; 'sacar' preserva mejor la dirección del movimiento que 'traer'.
- source_word: ቀቢሮተ
  english_pob_choice: bury
  chosen_spanish: enterrarlo
  alternatives_spanish:
  - sepultarlo
  - darle sepultura
  lexicon: enterrar
  rationale: '''Enterrarlo'' es claro y natural en español; ''sepultarlo'' sería igualmente válido, pero algo más marcado litúrgicamente.'
- source_word: ከናአን
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - la tierra de Canaán
  lexicon: Canaán
  rationale: Se mantiene el topónimo estándar en español bíblico.
- source_word: ማክማሮን
  english_pob_choice: Makmaron
  chosen_spanish: Makmarón
  alternatives_spanish:
  - Makmaron
  lexicon: nombre propio
  rationale: Se conserva el nombre propio transliterado; se acentúa según el patrón español para facilitar lectura sin alterar la identificación.
- source_word: ንጉሠ፡ ከናአን
  english_pob_choice: king of Canaan
  chosen_spanish: rey de Canaán
  alternatives_spanish:
  - rey cananeo
  lexicon: rey
  rationale: La construcción posesiva simple reproduce la relación del original sin añadir una etnificación no necesaria.
- source_word: እንዘ፡ የኀድር፡ ምድረ፡ አሱር
  english_pob_choice: while dwelling in the land of Assyria
  chosen_spanish: mientras habitaba en la tierra de Asiria
  alternatives_spanish:
  - mientras vivía en la tierra de Asiria
  - cuando residía en la tierra de Asiria
  lexicon: habitar
  rationale: '''Habitaba'' reproduce la idea de residencia continua y mantiene el tono narrativo. ''Asiria'' es el topónimo español estándar.'
- source_word: ተቃተለ
  english_pob_choice: fought
  chosen_spanish: peleó
  alternatives_spanish:
  - combatió
  - luchó
  lexicon: pelear
  rationale: '''Peleó'' comunica de manera directa el enfrentamiento armado; es idiomático y fiel al sentido básico.'
theological_decisions:
- issue: La referencia a la sepultura futura de José en Canaán
  english_pob_reading: he knew that the Egyptians would not again bring him out and bury him in the land of Canaan
  chosen_spanish_reading: porque sabía que los egipcios no lo sacarían de nuevo para enterrarlo en la tierra de Canaán
  alternative_spanish_readings:
  - porque sabía que los egipcios no volverían a sacarlo para enterrarlo en la tierra de Canaán
  - porque sabía que los egipcios no sacarían de nuevo su cuerpo para enterrarlo en la tierra de Canaán
  rationale: 'Se conserva la tensión del original: el sujeto no regresará a Canaán por acción egipcia. La formulación evita interpretar más allá del texto y deja claro que la negativa recae sobre la acción de sacar y enterrar.'
  doctrine_reference: Narrativa patriarcal / tradición de los huesos de José
