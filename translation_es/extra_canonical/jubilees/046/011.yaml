translation:
  language: es
  text: Hebrón; y tu padre Amram[a] permaneció con ellos. Y el rey de Canaán derrotó al rey de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Abram’; así lee el etiópico.
    reason: textual_variant
lexical_decisions:
- source_word: ኬብሮን፡
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: toponym
  rationale: Se conserva el topónimo bíblico en su forma castellana habitual, con acento ortográfico español.
- source_word: አብራም፡
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Amram
  lexicon: proper_name
  rationale: El texto ge'ez lee አብራም, por lo que se mantiene Abram en el texto principal. Se evita emendar en la traducción principal, siguiendo el principio de transparencia textual.
- source_word: ወተረፈ፡
  english_pob_choice: remained with them
  chosen_spanish: permaneció con ellos
  alternatives_spanish:
  - se quedó con ellos
  - quedó con ellos
  lexicon: verb_of_remaining
  rationale: ‘Permaneció con ellos’ reproduce de forma natural y fiel la idea de permanecer/quedar con un grupo, sin añadir matices no presentes en el ge'ez.
- source_word: ወሞአ፡
  english_pob_choice: defeated
  chosen_spanish: derrotó
  alternatives_spanish:
  - venció
  - prevaleció sobre
  lexicon: verb_of_defeat
  rationale: La revisión crítica correcta el valor verbal hacia ‘conquistar/derrotar/ prevalecer sobre’, no ‘morir’. ‘Derrotó’ comunica bien el sentido de victoria militar en español actual.
theological_decisions:
- issue: Identidad del nombre propio en el texto base
  english_pob_reading: Abram (with prior audit discussion of Amram as an emendation in some traditions)
  chosen_spanish_reading: Abram
  alternative_spanish_readings:
  - Amram
  rationale: Dado que el packet fuente presenta explícitamente አብራም y la última revisión crítica reconocida en el paquete favorece esa lectura textual, la traducción principal conserva Abram. La alternativa Amram se reservaría para una nota si el aparato crítico lo exigiera de manera explícita.
  doctrine_reference: Principio de prioridad del testimonio textual y transparencia del aparato crítico
- issue: Sentido del verbo final
  english_pob_reading: the king of Canaan defeated the king of Egypt
  chosen_spanish_reading: el rey de Canaán derrotó al rey de Egipto
  alternative_spanish_readings:
  - el rey de Canaán venció al rey de Egipto
  - el rey de Canaán prevaleció sobre el rey de Egipto
  rationale: Se evita el falso sentido ‘murió’ y se conserva una afirmación de victoria/ superioridad militar coherente con la revisión filológica más sólida incluida en el paquete.
  doctrine_reference: Fidelidad semántica al verbo ge'ez ሞአ (conquistar/derrotar/ prevalecer)
translation_notes:
  revision_awareness: 'El paquete muestra una revisión conflictiva sobre dos puntos: el nombre propio final y el valor del verbo ወሞአ. La traducción española sigue la lectura textual directa del ge''ez y la corrección filológica posterior que entiende ሞአ como ‘derrotó’, evitando la lectura errónea ‘murió’ o la emendación del nombre a Amram sin necesidad explícita en el texto base.'
  spanish_consistency_notes:
  - Se ha mantenido una sintaxis breve y bíblica, pero en español natural.
  - Se conserva el nombre propio Abram en el texto principal por fidelidad al testimonio ge'ez.
  - La nota al pie marca la alternativa textual documentada sin introducir una lectura no anclada en el cuerpo principal.
  - No se emplea ‘SEÑOR’ ni terminología teológica ajena al versículo.
