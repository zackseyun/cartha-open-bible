translation:
  language: es
  text: y cerró la puerta de Egipto. Y tramó un plan maligno contra los hijos de Israel, para que
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወዐጸወ፡ አንቀጸ፡ ግብጽ
  english_pob_choice: and shut the gate of Egypt
  chosen_spanish: y cerró la puerta de Egipto
  alternatives_spanish:
  - y cerró la entrada de Egipto
  - y clausuró la puerta de Egipto
  lexicon: Gǝʿǝz ዐጸወ / አንቀጽ
  rationale: El texto fuente expresa la acción de cerrar una abertura o acceso; en español, "puerta" comunica con naturalidad la imagen y conserva la concreción del pasaje. "Entrada" es posible, pero "puerta" reproduce mejor el valor espacial del término sin forzar el estilo.
- source_word: ወሐለየ፡ እኩየ፡ ሕሊና
  english_pob_choice: And he devised an evil plan
  chosen_spanish: Y tramó un plan maligno
  alternatives_spanish:
  - Y concibió un plan malo
  - Y ideó un plan perverso
  lexicon: Gǝʿǝz ሐለየ / እኩየ / ሕሊና
  rationale: El verbo sugiere idear o tramar deliberadamente; "tramó" retiene la idea de intención hostil. "Maligno" conserva el peso moral de "evil" sin suavizarlo. "Plan" traduce con naturalidad la combinación semítica de pensamiento/propósito.
- source_word: ውሉደ፡ እስራኤል
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - la descendencia de Israel
  - los israelitas
  lexicon: Gǝǝz construct phrase / biblical kinship idiom
  rationale: La expresión es un modismo bíblico estable; "los hijos de Israel" mantiene la correspondencia más directa con la fuente y con el registro narrativo del pasaje. "Israelitas" sería más interpretativo.
theological_decisions:
- issue: Referencia al agente humano sin suavizar la malicia del acto
  english_pob_reading: And he devised an evil plan against the sons of Israel
  chosen_spanish_reading: Y tramó un plan maligno contra los hijos de Israel
  alternative_spanish_readings:
  - Y ideó un plan contra los hijos de Israel
  - Y preparó un plan malo contra los hijos de Israel
  rationale: La formulación española mantiene la agencia y la intención hostil presentes en el texto fuente. "Maligno" y "tramó" preservan la carga evaluativa sin convertirla en una paráfrasis más general.
  doctrine_reference: Ética bíblica narrativa; caracterización del mal intencional
translation_notes:
  revision_awareness: La redacción sigue el texto fuente geʿez y el audit trail inglés ya revisado, que ajusta "so as" a "so that" por completitud gramatical sin cambiar el sentido. En español, se deja la cláusula final abierta con "para que" porque el fragmento fuente termina en una construcción consecutiva incompleta.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicable, evitando un castellano arcaizante.
  - No se añadió puntuación interpretativa más allá de la necesaria para reflejar las dos proposiciones del fragmento.
  - Se conservó "los hijos de Israel" como fórmula bíblica estable y auditable.
