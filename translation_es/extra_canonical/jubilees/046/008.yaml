  spanish_consistency_notes:
  - Se mantiene 'jubileo' para la unidad cronológica técnica y no se sustituye por un equivalente explicativo.
  - Se usa el pretérito simple narrativo ('murió', 'sepultaron') para seguir el relato puntual del verso.
  - No se añaden notas textuales porque el paquete fuente y la auditoría inglesa no muestran variantes ni tensiones lexicológicas adicionales en este versículo.
