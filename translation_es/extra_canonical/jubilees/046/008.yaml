translation:
  language: es
  text: Y José murió en el cuadragésimo sexto jubileo, en la sexta semana, en el segundo año; y lo sepultaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዮሴፍ / Joseph
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: Nombre propio bíblico
  rationale: El nombre propio se adapta a la forma española establecida y transparente. 'José' es la forma bíblica estándar en español.
- source_word: ወሞተ / died
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: Verbo de muerte
  rationale: '''Murió'' comunica de manera directa y fiel el hecho narrado sin añadir matices ceremoniosos que el ge''ez no exige.'
- source_word: በዘአርብዓ ወስድስቱ ኢዮቤልው / in the forty-sixth jubilee
  english_pob_choice: in the forty-sixth jubilee
  chosen_spanish: en el cuadragésimo sexto jubileo
  alternatives_spanish:
  - en el jubileo cuarenta y seis
  lexicon: Cronología jubilar
  rationale: Se conserva el término técnico 'jubileo' y el ordinal con forma culta natural en español para reflejar la unidad calendárica del texto.
- source_word: በሱባዔ ሳድስ / in the sixth week
  english_pob_choice: in the sixth week
  chosen_spanish: en la sexta semana
  alternatives_spanish:
  - en la sexta semana de años
  lexicon: Unidad calendárica
  rationale: El texto ge'ez y la revisión inglesa dejan el término como 'week'; en español basta 'semana' para reproducir la unidad sin añadir 'de años', que no aparece explícito en la forma final auditada.
- source_word: በካልእ ዓመት / in the second year
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - en el año segundo
  lexicon: Cronología
  rationale: Se mantiene la secuencia cronológica con un orden natural en español.
- source_word: ወቀበርዎ / and they buried him
  english_pob_choice: and they buried him
  chosen_spanish: y lo sepultaron
  alternatives_spanish:
  - y lo enterraron
  lexicon: Verbo funerario
  rationale: '''Sepultaron'' conserva un registro digno y bíblico, y traduce bien el acto de entierro sin perder literalidad.'
theological_decisions:
- issue: Tratamiento del calendario jubilar como marco histórico-narrativo
  english_pob_reading: And Joseph died in the forty-sixth jubilee, in the sixth week, in the second year; and they buried him.
  chosen_spanish_reading: Y José murió en el cuadragésimo sexto jubileo, en la sexta semana, en el segundo año; y lo sepultaron.
  alternative_spanish_readings:
  - Y José murió en el cuadragésimo sexto jubileo, en la sexta semana de años, en el segundo año; y lo sepultaron.
  rationale: No se explica ni se armoniza el sistema cronológico más allá de lo que el texto da. Se conserva la estructura calendárica como dato narrativo, respetando la tensión terminológica entre 'week' y una posible comprensión técnica del período.
  doctrine_reference: No doctrinal; cronología del texto apócrifo/pseudepigráfico.
translation_notes:
