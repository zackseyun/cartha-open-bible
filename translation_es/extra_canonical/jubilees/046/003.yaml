  yaml_path: translation/extra_canonical/jubilees/046/003.yaml
  text: the sons of Israel throughout all the days of Joseph's life. And Joseph died at the age of one hundred and ten years. Seventeen years he lived in the land of Canaan, and ten years while he was serving, and three years in the prison-house, and eighty years he was under the authority of Pharaoh, king of Egypt.
  footnotes:
  - marker: a
    text: Or 'and eighty years in the land of Egypt.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:47Z'
    unchanged: false
    changes_summary: Completed the final clause by supplying the implied location, 'in the land of Egypt,' to account for the source text's concluding eighty years; also adjusted punctuation for smoother formal English.
translation:
  language: es
  text: a los hijos de Israel durante todos los días de la vida de José. Y José murió a los ciento diez años. Diecisiete años vivió en la tierra de Canaán, y diez años mientras servía, y tres años en la prisión, y ochenta años bajo la autoridad de Faraón, rey de Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ርዎሙ፡ ለውሉደ፡ እስራኤል፡ ኵሎ፡ መዋዕለ፡ ሕይወቱ፡ ለዮሴፍ።
  english_pob_choice: the sons of Israel throughout all the days of Joseph's life
  chosen_spanish: a los hijos de Israel durante todos los días de la vida de José
  alternatives_spanish:
  - a los hijos de Israel todos los días de la vida de José
  - para los hijos de Israel durante toda la vida de José
  lexicon: Syntax/phrase-level correspondence; ימי חיים → días de la vida
  rationale: Mantengo la relación temporal continua de 'throughout all the days' con 'durante todos los días', y conservo 'hijos de Israel' como equivalente directo del grupo nominal.
- source_word: ወሞተ፡ ዮሴፍ፡ ወልደ፡ ምእት፡ ወዓሠርቱ፡ ዓመት፡
  english_pob_choice: And Joseph died at the age of one hundred and ten years
  chosen_spanish: Y José murió a la edad de ciento diez años
  alternatives_spanish:
  - Y José murió con ciento diez años
  - Y José falleció a la edad de ciento diez años
  lexicon: Age formula
  rationale: '''Murió a la edad de'' refleja con claridad la fórmula de edad sin añadir matices no presentes en el texto.'
- source_word: ወዓሠርተ፡ ወሰብዓተ፡ ዓመተ፡ ነበረ፡ ምድረ፡ ከናአን፡
  english_pob_choice: Seventeen years he lived in the land of Canaan
  chosen_spanish: Diecisiete años vivió en la tierra de Canaán
  alternatives_spanish:
  - Vivió diecisiete años en la tierra de Canaán
  - Diecisiete años habitó en la tierra de Canaán
  lexicon: Temporal duration + habitation
  rationale: '''Vivió'' corresponde al POB inglés y preserva el valor temporal de permanencia en Canaán sin exagerar el verbo.'
- source_word: ወዐሠርተ፡ ዓመተ፡ ነበረ፡ እንዘ፡ ይትቀነይ፡
  english_pob_choice: and ten years while he was serving
  chosen_spanish: y diez años mientras servía
  alternatives_spanish:
  - y diez años mientras estaba sirviendo
  - y diez años en su servicio
  lexicon: Serving/servitude context
  rationale: '''Mientras servía'' es fiel y natural en español; mantiene la idea de servicio sin forzar una interpretación técnica adicional.'
- source_word: ወሠለስተ፡ ዓመተ፡ ውስተ፡ ቤተ፡ ሞቅሕ፡
  english_pob_choice: and three years in the prison-house
  chosen_spanish: y tres años en la casa de prisión
  alternatives_spanish:
  - y tres años en la cárcel
  - y tres años en la casa de la prisión
  lexicon: Prison-house phrase
  rationale: '''Casa de prisión'' conserva el sustantivo compuesto del inglés POB y evita modernizar demasiado el término con ''cárcel''.'
- source_word: ወሰማንያ፡ ዓመተ፡ ... ታሕተ፡ ሤመቱ፡ ለፈርዖን፡ ንጉሠ፡ ግብጽ
  english_pob_choice: and eighty years he was under the authority of Pharaoh, king of Egypt
  chosen_spanish: y ochenta años bajo la autoridad de Faraón, rey de Egipto
  alternatives_spanish:
  - y ochenta años en la tierra de Egipto
  - y ochenta años bajo el mando de Faraón, rey de Egipto
  lexicon: Authority formula / source correction
  rationale: Sigo la revisión crítica que corrige la antigua interpolación 'en la tierra de Egipto' y reflejo 'bajo la autoridad de' como traducción más literal y auditable del Ge'ez.
theological_decisions:
- issue: 'Final clause: implied location vs. explicit authority relation'
  english_pob_reading: The revised English audit trail corrects the clause to 'he was under the authority of Pharaoh, king of Egypt' rather than supplying 'in the land of Egypt.'
  chosen_spanish_reading: bajo la autoridad de Faraón, rey de Egipto
  alternative_spanish_readings:
  - en la tierra de Egipto
  - bajo el mando de Faraón, rey de Egipto
  rationale: La revisión más reciente muestra que el Ge'ez no sólo deja un lugar implícito, sino que expresa sujeción a la autoridad de Faraón. La versión española debe seguir esa corrección para no introducir una localización inexistente ni diluir la relación de dominio.
  doctrine_reference: Texto base y crítica textual de Jubileos 46:3; fidelidad al testimonio manuscrito frente a interpolación interpretativa
translation_notes:
  revision_awareness: La base inglesa revisada fue corregida por revisión crítica posterior para reemplazar 'in the land of Egypt' con 'he was under the authority of Pharaoh, king of Egypt'; la traducción española sigue esa lectura corregida y, por ello, no conserva la nota antigua sobre la posible variante.
  spanish_consistency_notes:
  - Uso 'José' para Ἰωσήφ/Ge'ez ዮሴፍ, conforme al estándar bíblico español.
  - He mantenido la secuencia paratáctica del original con 'Y' para preservar el estilo narrativo breve.
  - '''Casa de prisión'' reproduce la imagen del inglés POB sin añadir una referencia jurídica más moderna que el texto no exige.'
