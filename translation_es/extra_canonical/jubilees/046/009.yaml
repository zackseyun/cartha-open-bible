    changes_summary: Changed 'second week of years' to 'second week' for more natural rendering of the jubilee dating formula, and added 'of' in 'the field of the double cave' to better reflect the construct relation in the source.
translation:
  language: es
  text: en la tierra de Egipto. Y murieron todos sus hermanos después de él. Y el rey de Egipto salió a pelear con el rey de Canaán en el cuadragésimo séptimo jubileo, en la segunda semana, en el segundo año; y los hijos de Israel sacaron todos los huesos de los hijos de Jacob, excepto los huesos de José, y los enterraron en el campo, en la doble cueva[a] del monte,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el campo, en la doble cueva del monte»; el ge’ez repite la preposición locativa.'
    reason: textual_variant
