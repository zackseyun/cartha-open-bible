theological_decisions:
- issue: Datación jubilar técnica y no armonización con cronología bíblica posterior
  english_pob_reading: in the forty-seventh jubilee, in the second week, in the second year
  chosen_spanish_reading: en el cuadragésimo séptimo jubileo, en la segunda semana, en el segundo año
  alternative_spanish_readings:
  - en el cuadragésimo séptimo jubileo, en la segunda semana de años, en el segundo año
  rationale: Se conserva la fórmula cronológica especializada del libro de Jubileos sin añadir ‘de años’, porque la revisión auditada la suprimió por naturalidad y fidelidad al esquema técnico.
  doctrine_reference: Hermenéutica de cronología interna del libro de Jubileos
- issue: Tratamiento del lugar de sepultura con la sintaxis repetida del original
  english_pob_reading: in the field, in the double cave in the mountain
  chosen_spanish_reading: en el campo, en la doble cueva del monte
  alternative_spanish_readings:
  - en el campo, en la cueva doble del monte
  - en el campo de la doble cueva del monte
  rationale: La lectura debe preservar la doble preposición locativa documentada por la revisión gramatical; ‘del monte’ explicita el segundo complemento sin suprimir la estructura original.
  doctrine_reference: Crítica textual y sintaxis ge’ez del pasaje
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: se mantiene ‘segunda semana’ sin ‘de años’, y se respeta la sintaxis con dos locativos (‘en el campo, en la doble cueva’) en vez de convertirla en un constructo posesivo. La nota al pie refleja la alternativa interpretativa sobre el sintagma final sin contradecir la revisión gramatical más reciente.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino según las reglas del proyecto, pero este versículo no lo contiene.
  - Se conserva ‘José’ y ‘Jacob’ como nombres propios estándar en español bíblico.
  - ‘Jubileo’ se mantiene como término técnico del libro y no como ‘jubileo’ u otra adaptación.
  - 'La puntuación sigue el registro bíblico en español: cláusulas narrativas coordinadas y datación separada por punto y coma.'
