  text: in the land of Egypt. And all his brothers died after him. And the king of Egypt went out to fight with the king of Canaan in the forty-seventh jubilee, in the second week, in the second year; and the sons of Israel brought out all the bones of the sons of Jacob, except the bones of Joseph, and they buried them in the field, in the double cave in the mountain,
