    issue: La nota al pie [a] no refleja la alternativa pertinente del audit trail y actualmente duplica en esencia la lectura principal.
    rationale: 'El English POB conserva como alternativa previa ‘in the field of the double cave’. La nota española dice ‘O: en el campo, en la doble cueva del monte’, que no ofrece una variante real frente al texto principal y por tanto no cumple bien la función documental.'
