translation:
  language: es
  text: y muchos regresaron a Egipto, pero unos pocos de ellos permanecieron en la montaña de [Hebrón][a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «en la región montañosa»; el ge'ez presenta una construcción ligada a Hebrón.
    reason: alternative_reading
lexical_decisions:
- source_word: ወገብኡ፡ ብዙኃን፡ ውስተ፡ ግብጽ፡
  english_pob_choice: and many returned to Egypt
  chosen_spanish: y muchos regresaron a Egipto
  alternatives_spanish:
  - y muchos volvieron a Egipto
  - y muchos se regresaron a Egipto
  lexicon: regresar / volver
  rationale: El ge'ez expresa un movimiento de retorno a Egipto; «regresaron» comunica bien ese valor sin añadir matices no presentes. «Volvieron» también sería posible, pero «regresaron» suena más formal y directo en este contexto narrativo.
- source_word: ወኅዳጣን፡ *ተርፉ፡ እምኔሆሙ፡
  english_pob_choice: but a few of them remained
  chosen_spanish: pero unos pocos de ellos permanecieron
  alternatives_spanish:
  - pero algunos de ellos quedaron
  - pero unos pocos de ellos se quedaron
  lexicon: permanecer / quedar
  rationale: El sentido es de los que no regresan y permanecen en el lugar. «Permanecieron» conserva el tono narrativo y no introduce una coloquialidad excesiva como «se quedaron».
- source_word: ውስተ፡ ደብረ፡ / ኬብሮን
  english_pob_choice: in the mountain of [Hebron]
  chosen_spanish: en la montaña de [Hebrón]
  alternatives_spanish:
  - en el monte de [Hebrón]
  - en la región montañosa de [Hebrón]
  lexicon: mountain / mountain region
  rationale: El ge'ez está en estado constructo («montaña de») y queda ligado a Hebrón. En español, «montaña de Hebrón» mantiene la relación gramatical observada por la revisión y evita ocultar la conexión con el topónimo. «Monte» sería posible, pero «montaña» refleja más literalmente la forma base del término.
theological_decisions:
- issue: Referencia geográfica vinculada a Hebrón
  english_pob_reading: in the mountain of [Hebron]
  chosen_spanish_reading: en la montaña de [Hebrón]
  alternative_spanish_readings:
  - en el monte de [Hebrón]
  - en la región montañosa de [Hebrón]
  rationale: La revisión textual indica que el ge'ez está en construcción con Hebrón; por eso la traducción debe conservar la dependencia sintáctica y no resolverla como una mera paráfrasis geográfica. «Montaña de Hebrón» preserva la tensión entre forma gramatical y sentido geográfico.
  doctrine_reference: Topografía bíblica / fidelidad sintáctica del texto fuente
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una revisión importante: primero se amplió a «mountain region» y luego se corrigió por la evidencia ge''ez de que ደብረ está en estado constructo y unido a Hebrón. La versión española sigue esa corrección y conserva la dependencia «de Hebrón» en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se mantiene «Hebrón» como topónimo bíblico estándar en español.
  - Se prefirió «permanecieron» para reproducir el valor de residencia continua frente a simple «quedaron».
