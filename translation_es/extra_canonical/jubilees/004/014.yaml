  spanish_consistency_notes:
  - Se mantiene "jubileo" como término técnico fijo del libro de Jubileos.
  - Se usa "Matusalén" para la forma española estable del nombre.
  - No se introduce "Señor" ni otras sustituciones teológicas ajenas al contenido del verso.
  - La genealogía se conserva explícita para respetar la densidad relacional del original.
