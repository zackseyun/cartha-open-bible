  text: Y en el duodécimo jubileo, en su séptima semana, tomó para sí una esposa, y su nombre fue Edni, la hija de Danel, que era hija del hermano de su padre; y en el sexto año de esta semana ella le dio a luz un hijo, y le puso por nombre Matusalén.
