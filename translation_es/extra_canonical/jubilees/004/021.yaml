base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/021.yaml
  text: And he was still with the angels of God for six jubilees of years[21], and they showed him everything that is on the earth and in the heavens, the dominion of the sun, and he wrote down everything.
  footnotes:
  - marker: '21'
    text: 'The legal maxim echoes talionic justice: the instrument and manner of violence return upon the killer.'
    reason: cross_reference
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:06Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Geʽez source: Methuselah remained with the angels of God for six jubilees of years; they showed him all that is on earth and in the heavens, including the dominion of the sun; and he wrote everything down.'
translation:
  language: es
  text: Y él seguía con los ángeles de Dios durante seis jubileos de años[a], y ellos le mostraron todo lo que hay en la tierra y en los cielos, el dominio del sol, y lo escribió todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Jubileos" aquí conserva la unidad cronológica técnica del libro, no una simple serie de años ordinarios.'
    reason: source_note
lexical_decisions:
- source_word: መላእክት አምላክ / angels of God
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - los mensajeros de Dios
  - los ángeles divinos
  lexicon: ángeles
  rationale: El geʽez habla literalmente de 'ángeles de Dios'; en español, 'ángeles de Dios' reproduce de forma natural y directa la relación posesiva sin añadir matices no presentes en el texto.
- source_word: ስድስተ ዘኢዮቤልውሳት ዓመታት / six jubilees of years
  english_pob_choice: six jubilees of years
  chosen_spanish: seis jubileos de años
  alternatives_spanish:
  - seis períodos jubilares de años
  - seis jubileos
  lexicon: jubileos
  rationale: Se conserva el término técnico 'jubileo' porque el texto fuente lo usa como unidad cronológica propia de Jubileos; añadir 'de años' mantiene la expresión completa del original y evita suavizarla a una simple paráfrasis temporal.
- source_word: ሥልጣነ / dominion
  english_pob_choice: dominion
  chosen_spanish: el dominio
  alternatives_spanish:
  - el señorío
  - la autoridad
  lexicon: dominio
  rationale: '''Dominio'' corresponde con fidelidad al alcance de ሥልጣነ y preserva la idea de jurisdicción o gobierno atribuida al sol sin convertirla en un término más interpretativo.'
- source_word: ወጸሐፈ ኵሎ / and he wrote down everything
  english_pob_choice: and he wrote down everything
  chosen_spanish: y escribió todo
  alternatives_spanish:
  - y lo escribió todo
  - y anotó todo
  lexicon: escribir
  rationale: El verbo simple 'escribió' expresa de manera clara y fiel el hecho de registrar; 'todo' reproduce el alcance total del original sin sobrecargar la frase.
theological_decisions:
- issue: La mención de los ángeles de Dios como mediadores de revelación
  english_pob_reading: they showed him everything that is on the earth and in the heavens
  chosen_spanish_reading: ellos le mostraron todo lo que hay en la tierra y en los cielos
  alternative_spanish_readings:
  - le revelaron todo lo que hay en la tierra y en los cielos
  - le enseñaron todo lo que hay en la tierra y en los cielos
  rationale: '''Mostraron'' mantiene el carácter visual y revelatorio del verbo sin intensificarlo a ''revelaron'', que añade una carga interpretativa más fuerte; el texto presenta a los ángeles como agentes de exhibición/enseñanza, no como objeto de doctrinas adicionales.'
  doctrine_reference: Jubileos 4:21; mediación angélica en relatos apocalípticos
- issue: El alcance de 'todo' respecto de la creación visible y celestial
  english_pob_reading: everything that is on the earth and in the heavens, the dominion of the sun
  chosen_spanish_reading: todo lo que hay en la tierra y en los cielos, el dominio del sol
  alternative_spanish_readings:
  - todo cuanto hay en la tierra y en los cielos, y el dominio del sol
  - todo lo que hay en la tierra y en el cielo, y el dominio del sol
  rationale: 'La coordinación mantiene dos ámbitos: la totalidad de lo terrestre y celestial, y además un elemento específico, ''el dominio del sol''. No se fusionan para no borrar la estructura del original.'
  doctrine_reference: Jubileos 4:21; cosmología revelada
translation_notes:
  revision_awareness: 'El borrador sigue la corrección más reciente del audit trail: el texto no trata del juicio por una piedra, sino de la permanencia de Matusalén con los ángeles de Dios, su visión de lo terrenal y celestial, y el registro escrito de todo ello. Se evitó trasladar material de una versión anterior ya descartada.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para አምላክ como en el estándar del proyecto.
  - Se usa 'ángeles' y no 'mensajeros' porque el contexto angélico es explícito en el inglés auditado y en el geʽez.
  - '''Cielos'' preserva el plural del sentido amplio de los ámbitos celestiales.'
  - No se emplea 'SEÑOR' ni 'Cristo', pues no aparecen en el pasaje fuente.
