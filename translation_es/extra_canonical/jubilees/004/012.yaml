translation:
  language: es
  text: Él fue el primero en escribir un testimonio[a], y dio testimonio a los hijos de los hombres entre las generaciones de la tierra, y relató las semanas de los jubileos, y dio a conocer los días de los años, y ordenó los meses,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión puede entenderse también como 'escribir un registro' o 'dejar por escrito un testimonio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: write a testimony
  english_pob_choice: write a testimony
  chosen_spanish: escribir un testimonio
  alternatives_spanish:
  - dejar por escrito un testimonio
  - escribir un registro
  - anotar un testimonio
  lexicon: write; testimony
  rationale: La formulación española conserva la fuerza formal de la expresión y mantiene la tensión auditada en el inglés POB entre 'testimony' como declaración/testimonio y como algo puesto por escrito. 'Escribir un testimonio' sigue siendo directo y natural en español sin diluir el vínculo con escritura y testimonio.
- source_word: testified
  english_pob_choice: testified
  chosen_spanish: dio testimonio
  alternatives_spanish:
  - testificó
  - atestiguó
  lexicon: testify
  rationale: '''Dio testimonio'' es claro en español bíblico contemporáneo y conserva el acto de declarar solemnemente. ''Testificó'' o ''atestiguó'' son posibles, pero ''dio testimonio'' mantiene mejor la continuidad con el sustantivo ''testimonio'' del inicio.'
- source_word: recounted the weeks of the jubilees
  english_pob_choice: recounted the weeks of the jubilees
  chosen_spanish: relató las semanas de los jubileos
  alternatives_spanish:
  - contó las semanas de los jubileos
  - narró las semanas de los jubileos
  lexicon: recount
  rationale: '''Relató'' preserva el sentido de enumerar o exponer ordenadamente, sin sonar demasiado coloquial. Mantiene la estructura del original y la referencia técnica a las ''semanas de los jubileos''.'
- source_word: made known the days of the years
  english_pob_choice: made known the days of the years
  chosen_spanish: dio a conocer los días de los años
  alternatives_spanish:
  - hizo saber los días de los años
  - manifestó los días de los años
  lexicon: make known
  rationale: '''Dar a conocer'' es una equivalencia natural y exacta para comunicar divulgación o revelación. Conservar ''los días de los años'' evita suavizar la expresión cronológica característica del texto.'
- source_word: set in order the months
  english_pob_choice: set in order the months
  chosen_spanish: ordenó los meses
  alternatives_spanish:
  - puso en orden los meses
  - dispuso los meses
  lexicon: set in order
  rationale: '''Ordenó'' reproduce bien la idea de organizar o disponer con secuencia. Es breve, idiomático y fiel al paralelismo del pasaje.'
theological_decisions:
- issue: Chronological ordering as revealed instruction
  english_pob_reading: He ... made known the days of the years, and set in order the months
  chosen_spanish_reading: '... dio a conocer los días de los años, y ordenó los meses'
  alternative_spanish_readings:
  - '... hizo saber los días de los años, y dispuso los meses'
  rationale: El texto presenta una transmisión ordenada de conocimiento temporal, no solo una observación astronómica. 'Ordenó' mantiene el matiz de establecer un orden normativo o revelado, acorde con la lectura del POB.
  doctrine_reference: Calendrical revelation in Jubilees; no doctrinal claim beyond the text's own ordering of time.
translation_notes:
  revision_awareness: No hay revisión posterior en el expediente que altere el contenido; se conserva la lectura inglesa auditada y se traslada al español con el mismo nivel de cautela léxica, especialmente en la expresión inicial 'write a testimony'.
  spanish_consistency_notes:
  - Se conserva el paralelismo verbal del inglés POB con una secuencia de acciones en pasado simple.
  - Se mantiene 'jubileos' en plural para reflejar el texto fuente y la tradición del libro de Jubileos.
  - No se introduce terminología eclesiástica no atestiguada por el expediente.
