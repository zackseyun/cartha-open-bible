    text: El versículo 4 no se conserva por separado como una línea numerada en el corpus de trabajo, pero su sentido se transmite por la repetición inicial y la continuación hacia el versículo 5. La traducción suple el sentido intermedio probable a partir del contexto ge'ez inmediato sin expandirlo en exceso.
    reason: segmentation_note
  revision_rationale: Se corrige el anclaje y el contenido de la nota para preservar la nota crítica del inglés POB sobre la segmentación del versículo, y se cambia 'sobre la tierra' por 'en la tierra' para un español más natural sin alterar el sentido. Se mantiene 'el Señor' porque la evidencia ge'ez y el audit trail descartan una traducción que presuponga el Tetragrámaton.
