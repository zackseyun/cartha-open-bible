base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/004.yaml
  text: And therefore the Lord rebuked Cain because of Abel[4], because he had killed him; and he made him a fugitive on the earth because of the blood of his brother, and he cursed him on the earth.
  footnotes:
  - marker: '4'
    text: Verse 4 is not separately preserved as a numbered row in the working corpus, but its sense is carried by the opening repetition and the continuation into verse 5. The translation supplies the likely intervening sense from the immediate Ge'ez context without over-expansion.
    reason: segmentation_note
  - marker: a
    text: Or 'the LORD'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:49Z'
    unchanged: false
    changes_summary: Changed "upon the earth" to "on the earth" for smoother, more natural English while preserving the source sense.
translation:
  language: es
  text: Y por eso el Señor reprendió a Caín por causa de Abel[a], porque lo había matado; y lo hizo fugitivo en la tierra a causa de la sangre de su hermano, y lo maldijo en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo 4 no se conserva por separado como una línea numerada en el corpus de trabajo, pero su sentido se transmite por la repetición inicial y la continuación hacia el versículo 5. La traducción suple el sentido intermedio probable a partir del contexto ge'ez inmediato sin expandirlo en exceso.
    reason: segmentation_note
lexical_decisions:
- source_word: Egzi'abher / the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Dios
  - Yahvé
  lexicon: N/A
  rationale: La fuente ge'ez no distingue gráficamente el Tetragrámaton; el audit trail inglés revisó la forma a 'the Lord', no a 'the LORD'. En español, 'el Señor' conserva esa decisión sin introducir el convencional 'SEÑOR' en versalitas, que aquí no está sustentado por la base ge'ez.
- source_word: rebuked
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprendió con severidad
  - corrigió
  lexicon: N/A
  rationale: '''Reprendió'' comunica bien la censura o reproche divino sin añadir intensidad no indicada por el contexto inmediato.'
- source_word: because of Abel
  english_pob_choice: because of Abel[4]
  chosen_spanish: por causa de Abel[a]
  alternatives_spanish:
  - a causa de Abel
  - por Abel
  lexicon: N/A
  rationale: Se mantiene la relación causal directa del inglés; 'por causa de' suena natural en español bíblico contemporáneo y preserva el matiz explicativo del texto.
- source_word: fugitive
  english_pob_choice: fugitive
  chosen_spanish: fugitivo
  alternatives_spanish:
  - errante
  - desterrado
  lexicon: N/A
  rationale: '''Fugitivo'' sigue de cerca la fuerza léxica del inglés POB y conserva la idea de alguien puesto en huida o vagancia forzada.'
- source_word: on the earth
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por la tierra
  lexicon: N/A
  rationale: '''Sobre la tierra'' refleja la preposición del inglés y mantiene el tono solemne del pasaje; ''en la tierra'' también sería posible, pero esta forma conserva mejor la repetición retórica del original.'
- source_word: blood of his brother
  english_pob_choice: blood of his brother
  chosen_spanish: la sangre de su hermano
  alternatives_spanish:
  - la sangre de su hermano
  - la sangre de su hermano menor
  lexicon: N/A
  rationale: Se conserva la expresión directa de culpa por derramamiento de sangre, sin especificar más de lo que la fuente exige.
- source_word: cursed him
  english_pob_choice: cursed him
  chosen_spanish: lo maldijo
  alternatives_spanish:
  - lo condenó
  - lo anatemaizó
  lexicon: N/A
  rationale: '''Maldijo'' es el equivalente más directo y transparente para el acto de maldecir en el marco narrativo.'
theological_decisions:
- issue: Treatment of the divine title in a Ge'ez source without small-caps Tetragrammaton distinction
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dios
  - Yahvé
  rationale: La revisión inglesa explícitamente descartó 'the LORD' en versalitas porque el ge'ez no distingue ortográficamente el Nombre divino como el hebreo bíblico. En español, 'el Señor' respeta esa cautela y evita proyectar una distinción textual no atestiguada.
  doctrine_reference: Crítica textual y convención de traducción del Nombre divino
- issue: Causal emphasis linking Cain's punishment to Abel's death
  english_pob_reading: because of Abel ... because he had killed him ... because of the blood of his brother
  chosen_spanish_reading: por causa de Abel ... porque lo había matado ... a causa de la sangre de su hermano
  alternative_spanish_readings:
  - por Abel ... porque lo mató ... por la sangre de su hermano
  rationale: 'Se conserva la acumulación causal del inglés POB, que no es accidental: la reprensión, el exilio y la maldición se presentan como respuestas concatenadas al homicidio. La formulación española mantiene esa progresión sin suavizarla.'
  doctrine_reference: Responsabilidad moral y retribución narrativa
translation_notes:
  revision_awareness: La base ge'ez proporcionada no contiene texto legible en esta fila, así que la redacción española se apoya en el audit trail inglés y en la revisión posterior que corrigió 'the LORD' a 'the Lord' y afinó 'upon the earth' a 'on the earth'. Se ha preservado la secuencia causal y el tono sobrio sin ampliar el contenido.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' en versalitas porque la revisión textual indicó que no procede la convención del Tetragrámaton hebreo.
  - '''Maldijo'' se mantiene como verbo simple y directo, en coherencia con la economía narrativa del pasaje.'
  - La repetición de 'sobre la tierra' conserva el paralelismo del inglés y la cadencia solemne del relato.
