translation:
  language: es
  text: Y en el undécimo jubileo, Jared tomó para sí una esposa cuyo nombre era Baraka, hija de Rasuyal[a], hija del hermano de su padre, en la cuarta semana de este jubileo. Y le dio a luz un hijo en la quinta semana, en el cuarto año del jubileo, y le puso por nombre Enoc.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre «Rasuyal» translitera el geʿez ራሱያል; algunas ediciones antiguas usan «Rasujal».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወበኢዮቤል ፡ ፲ወ፩
  english_pob_choice: in the eleventh jubilee
  chosen_spanish: en el undécimo jubileo
  alternatives_spanish:
  - en el onceavo jubileo
  lexicon: Charles 1895 / POB audit trail
  rationale: ‘Undécimo’ es el ordinal natural y digno en español; conserva la estructura cronológica del texto sin introducir paráfrasis.
- source_word: ነሥአ ፡ ያሬድ ፡ ሎቱ ፡ ብእሲተ
  english_pob_choice: Jared took for himself a wife
  chosen_spanish: Jared tomó para sí una esposa
  alternatives_spanish:
  - Jared tomó una esposa para sí
  - Jared se tomó una esposa
  lexicon: Geʿez ነሥአ / English POB 'took for himself a wife'
  rationale: ‘Tomó para sí’ conserva la idea reflexiva/intencional del verbo sin hacer el español pesado. ‘Esposa’ refleja el vínculo matrimonial explícito del contexto.
- source_word: ራሱያል
  english_pob_choice: Rasuyal
  chosen_spanish: Rasuyal
  alternatives_spanish:
  - Rasujal
  lexicon: Leslau / English POB lexical decision
  rationale: Se mantiene la transliteración adoptada por la POB inglesa, evitando la forma más antigua con ‘j’ que depende de una convención editorial previa.
- source_word: ወለተ ፡ ራሱያል ወለተ ፡ እኍሁ ፡ ለአቡሁ
  english_pob_choice: the daughter of Rasuyal, a daughter of his father's brother
  chosen_spanish: hija de Rasuyal, hija del hermano de su padre
  alternatives_spanish:
  - hija de Rasuyal, sobrina de su padre
  - hija de Rasuyal, hija de su tío paterno
  lexicon: Geʿez kinship phrasing / English POB audit trail
  rationale: Se conserva la relación de parentesco literal del original. ‘Hermano de su padre’ evita cerrar prematuramente la relación con una equivalencia interpretativa más libre, manteniendo auditable la frase.
- source_word: በሱባዔ ፡ ፬
  english_pob_choice: in the fourth week
  chosen_spanish: en la cuarta semana
  alternatives_spanish:
  - durante la cuarta semana
  lexicon: Jubilees calendrical terminology
  rationale: ‘Semana’ corresponde al término cronológico técnico del libro; la preposición mantiene la relación temporal exacta.
- source_word: ወወለደት ፡ ሎቱ ፡ ወልደ
  english_pob_choice: she bore him a son
  chosen_spanish: ella le dio a luz un hijo
  alternatives_spanish:
  - ella le engendró un hijo
  - ella le parió un hijo
  lexicon: Geʿez birth formula / Spanish idiom
  rationale: ‘Dar a luz’ es la formulación más clara y reverente en español para esta fórmula de nacimiento, sin perder el sentido activo del original.
- source_word: ወሰመየ ፡ ስሞ
  english_pob_choice: he called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - puso por nombre
  - le llamó
  lexicon: Semitic naming formula / English POB audit trail
  rationale: ‘Llamó su nombre’ conserva más de cerca la construcción semítica que la POB inglesa mantiene, aunque en español sea menos idiomático que ‘puso por nombre’.
- source_word: ሄኖክሃ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Henoc
  lexicon: Standard biblical Spanish proper name
  rationale: ‘Enoc’ es la forma establecida y ampliamente reconocible en español bíblico; evita una grafía menos usual sin necesidad textual.
translation_notes:
  revision_awareness: 'La fuente geʿez y el audit trail inglés coinciden en el contenido de Jubileos 4:13: Jared toma por esposa a Baraka, hija de Rasuyal, en la cuarta semana del undécimo jubileo; ella da a luz a Enoch en la quinta semana, en el cuarto año del jubileo. Se evitó arrastrar material de los versículos 4:18b–19, que había aparecido en revisiones erróneas previas por un problema de límites de versículo. También se respetó la revisión que corrige la preposición subyacente para no forzar un sentido de oposición inexistente en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente necesario.
  - Se usa «jubileo» y «semana» como términos técnicos del libro.
  - Se conserva la transliteración «Rasuyal» según la decisión auditada en inglés.
  - Se opta por «Enoc» como forma bíblica española estándar.
  - La sintaxis sigue de cerca la fórmula semítica del original sin introducir explicaciones interpretativas adicionales.
