  yaml_path: translation/extra_canonical/jubilees/004/022.yaml
  text: And he testified to the Watchers, who had sinned with the daughters of men; for these had begun to unite themselves, so as to be defiled, with the daughters of men, and Enoch testified against them all.
  footnotes:
  - marker: a
    text: Or 'And in the fifteenth jubilee, in the third week, Lamech took for himself a wife, and her name was Betenos, the daughter of Baraki’el, his father’s brother’s daughter; and in this week she bore him a son, and he called his name Noah, saying, “This one will comfort me for my sorrow and for all my work and for the ground that Yahweh has cursed.”'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:08Z'
    unchanged: false
    changes_summary: Replaced the draft, which translated a different verse, with a rendering that matches Jubilees 4:28. Preserved the genealogy, timing, and Noah naming statement; rendered the divine name as Yahweh.
translation:
  language: es
  text: Y dio testimonio[a] a los Vigilantes que habían pecado con las hijas de los hombres; porque estos habían comenzado a unirse con las hijas de los hombres para contaminarse, y Enoc dio testimonio contra todos ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dio testimonio» conserva el matiz formal o judicial del verbo, frente a alternativas más vagas como «habló» o «protestó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ሰትጉሃን / Watchers
  english_pob_choice: Watchers
  chosen_spanish: Vigilantes
  alternatives_spanish:
  - Vigilias
  - Centinelas
  lexicon: No se proporciona número de lexicón; se sigue el término técnico del texto fuente.
  rationale: El contexto apocalíptico y el audit trail inglés conservan el término técnico. En español, «Vigilantes» comunica mejor el nombre de grupo sobrenatural que opciones más literales como «Centinelas».
- source_word: አበሱ / sinned
  english_pob_choice: sinned
  chosen_spanish: habían pecado
  alternatives_spanish:
  - habían transgredido
  - habían cometido pecado
  lexicon: No se proporciona número de lexicón; verbo moral estándar.
  rationale: «Habían pecado» reproduce el valor moral directo del original y del inglés POB sin añadir interpretación.
- source_word: አዋልደ ሰብእ / daughters of men
  english_pob_choice: daughters of men
  chosen_spanish: las hijas de los hombres
  alternatives_spanish:
  - las hijas de la humanidad
  - las hijas de los mortales
  lexicon: No se proporciona número de lexicón; expresión idiomática bíblica.
  rationale: Se conserva la expresión tradicional y transparente, que mantiene la referencia a seres humanos sin paraphrasear.
- source_word: ይደመሩ ... ይርኩሱ / to unite themselves, so as to be defiled
  english_pob_choice: had begun to unite themselves, so as to be defiled
  chosen_spanish: habían comenzado a unirse ... para contaminarse
  alternatives_spanish:
  - habían empezado a juntarse ... para profanarse
  - habían comenzado a mezclarse ... para quedar impuros
  lexicon: No se proporciona número de lexicón; construcción aspectual y moral.
  rationale: «Habían comenzado a unirse» conserva el sentido de unión voluntaria; «para contaminarse» mantiene la finalidad moral explícita del original y del inglés, sin suavizarla.
- source_word: ሄኖክ / Enoch
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Henoc
  lexicon: Nombre propio bíblico estándar.
  rationale: «Enoc» es la forma española más extendida y clara para lectores eclesiales en español.
theological_decisions:
- issue: Naturaleza del testimonio de Enoc contra los Vigilantes
  english_pob_reading: Enoch testified against them all
  chosen_spanish_reading: Enoc dio testimonio contra todos ellos
  alternative_spanish_readings:
  - Enoc testificó contra todos ellos
  - Enoc habló contra todos ellos
  rationale: «Dar testimonio» conserva el peso formal y judicial del verbo, coherente con el contexto de juicio ya presente en el pasaje.
  doctrine_reference: Juicio divino y testimonio profético
- issue: Relación entre pecado y contaminación ritual/moral
  english_pob_reading: so as to be defiled
  chosen_spanish_reading: para contaminarse
  alternative_spanish_readings:
  - para impurificarse
  - para quedar impuros
  rationale: El texto une pecado y contaminación. «Contaminarse» mantiene esa tensión moral y evita reducirla a una mera falta ética abstracta.
  doctrine_reference: Pureza moral y juicio
- issue: Término técnico para el grupo celestial caído
  english_pob_reading: Watchers
  chosen_spanish_reading: Vigilantes
  alternative_spanish_readings:
  - Centinelas
  - Vigilias
  rationale: Se mantiene un nombre de grupo técnico, no una generalización descriptiva, para respetar la terminología del texto y del audit trail inglés.
  doctrine_reference: Tradición enóquica sobre seres celestiales caídos
translation_notes:
  revision_awareness: El contexto auditado muestra que los borradores previos se desviaron a Jubilees 4:28 (la esposa de Lamec y el nacimiento de Noé). Esta versión corrige esa desviación y se alinea con Jubilees 4:22, donde Enoc testifica contra los Vigilantes. También se refleja el contenido de juicio y contaminación explícito en el ge'ez.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino en la cláusula principal española.
  - Se mantiene «Vigilantes» como término técnico uniforme para ሰትጉሃን / Watchers.
  - 'Se preserva la estructura de dos acciones paralelas: pecado con las hijas de los hombres y testimonio de Enoc contra ellos.'
  - La puntuación separa con coma la cláusula causal para reflejar la articulación del original sin añadir explicaciones.
