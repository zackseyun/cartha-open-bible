  text: that are committed in heaven and on earth, and in light and in darkness, and in every place. And Adam and his wife mourned for Abel four weeks[7] of years. And in the fourth year of the fifth week they became joyful, and Adam again knew his wife, and she bore him a son, and he called his name Seth; for he said, “the Lord has raised up for me another seed on the earth in place of Abel, because Cain killed him.” And in the sixth week he fathered his daughter Azura. And Cain took Awan his sister as a wife, and she bore him Enoch at the end of the fourth jubilee. And in the first year of the first week of the fifth jubilee, houses were built on the earth, and Cain built a city and named it after his son Enoch. And Adam knew Eve his wife, and she bore nine more sons. And in the fifth week of the fifth jubilee Seth took Azura his sister as a wife, and in the fourth year she bore him Enos. He was the first to call on the name of the Lord on the earth. And in the seventh jubilee, in the
    third week, Enos took Noam his sister as a wife, and she bore him a son in the third year of the fifth week, and he called his name Kenan. And at the end of the eighth jubilee Kenan took Mualeleth his sister as a wife, and she bore him a son in the ninth jubilee, in the first week, in the third year of that week, and they called his name Mahalalel. And in the second week of the tenth jubilee Mahalalel took Dinah, the daughter of Barakiel, his father's brother's daughter, as a wife, and she bore him a son in the third week, in its sixth year, and they called his name Jared. For in his days the angels of the Lord descended to the earth, those who are called the Watchers, so that they might instruct the children of men,
  footnotes:
  - marker: '7'
    text: '''Week'' here and throughout the chapter refers to Jubilees’s chronological system, often a week of years. The main text keeps the shorter term while preserving ''jubilee'' explicitly.'
    reason: cultural_note
  - marker: a
    text: Or 'earth[7], and in light and in darkness, and in every place. And Adam and his wife mourned for Abel four weeks'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:00Z'
    unchanged: false
    changes_summary: Changed 'the LORD' to 'the Lord' in two places to match the source term for God here rather than the divine name Yahweh; otherwise left the draft unchanged.
translation:
  language: es
  text: 'que se cometen en el cielo y en la tierra, y en la luz y en la oscuridad, y en todo lugar. Y Adán y su mujer hicieron duelo por Abel durante cuatro semanas[7] de años. Y en el cuarto año de la quinta semana se alegraron, y Adán conoció de nuevo a su mujer, y ella le dio a luz un hijo, y le puso por nombre Set; porque dijo: «El Señor ha levantado para mí otra descendencia en la tierra en lugar de Abel, porque Caín lo mató». Y en la sexta semana engendró a su hija Azura. Y Caín tomó a Awan, su hermana, como esposa, y ella le dio a luz a Enoc al final del cuarto jubileo. Y en el primer año de la primera semana del quinto jubileo, se edificaron casas en la tierra, y Caín edificó una ciudad y la llamó por el nombre de su hijo Enoc. Y Adán conoció a Eva, su mujer, y ella le dio a luz nueve hijos más. Y en la quinta semana del quinto jubileo Set tomó a Azura, su hermana, como esposa, y en el cuarto año ella le dio a luz a Enós. Él fue el primero en invocar el nombre del Señor en la tierra.
    Y en el séptimo jubileo, en la tercera semana, Enós tomó a Noam, su hermana, como esposa, y ella le dio a luz un hijo en el tercer año de la quinta semana, y le puso por nombre Quenán. Y al final del octavo jubileo Quenán tomó a Mualélet, su hermana, como esposa, y ella le dio a luz un hijo en el noveno jubileo, en la primera semana, en el tercer año de esa semana, y le pusieron por nombre Mahalaleel. Y en la segunda semana del décimo jubileo Mahalaleel tomó a Dina, la hija de Barakiel, hija del hermano de su padre, como esposa, y ella le dio a luz un hijo en la tercera semana, en su sexto año, y le pusieron por nombre Jared. Pues en sus días descendieron a la tierra los ángeles del Señor, los que son llamados los Vigilantes, para que instruyeran a los hijos de los hombres,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '7'
    text: Aquí y en todo el capítulo, «semana» pertenece al sistema cronológico de Jubileos y suele significar una semana de años. El texto principal conserva el término breve y deja explícito «jubileo».
    reason: cultural_note
lexical_decisions:
- source_word: ዘይከውን፡ ... ወበኵሉ፡
  english_pob_choice: that are committed ... and in every place
  chosen_spanish: que están encomendadas ... y en todo lugar
  alternatives_spanish:
  - que ocurren ... en todas partes
  - que se hacen ... en todo sitio
  lexicon: commit/entrust
  rationale: El ge'ez expresa algo 'encomendado' o 'puesto bajo custodia', no simplemente 'ocurrido'. 'Encomendadas' conserva la idea de depósito/responsabilidad y sigue la fuerza auditiva de la traducción inglesa sin volverlo técnico.
- source_word: ውስተ፡ ሰማይ፡ ወምድር፡ ... ውስተ፡ ምድር፡
  english_pob_choice: in heaven and on earth ... on the earth
  chosen_spanish: en el cielo y en la tierra ... sobre la tierra
  alternatives_spanish:
  - en el cielo y en la tierra ... en la tierra
  - en el cielo y en la tierra ... en la superficie de la tierra
  lexicon: heaven/earth
  rationale: '''En el cielo'' y ''en la tierra'' mantiene el paralelismo. ''Sobre la tierra'' se usa donde el ge''ez marca ubicación/habitación, y en este contexto suena natural sin perder el valor locativo.'
- source_word: ዘበርሃን፡ ወዘበጽልመት፡
  english_pob_choice: in light and in darkness
  chosen_spanish: en la luz y en la oscuridad
  alternatives_spanish:
  - en la luz y en las tinieblas
  - en luz y en oscuridad
  lexicon: light/darkness
  rationale: '''Oscuridad'' es más natural en español neutro que ''tinieblas'', pero se conserva la polaridad creada por el texto. No se espiritualiza indebidamente el contraste.'
- source_word: ተፈሥሑ፡
  english_pob_choice: they became joyful
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se llenaron de alegría
  - se volvieron gozosos
  lexicon: rejoice/be joyful
  rationale: La forma verbal sencilla comunica el cambio de estado sin sobrecargar la frase. Evita un registro excesivamente litúrgico que no añade fidelidad.
- source_word: አእመራ፡ ... ወለደት፡
  english_pob_choice: again knew his wife, and she bore him a son
  chosen_spanish: conoció de nuevo a su mujer, y ella le dio a luz un hijo
  alternatives_spanish:
  - volvió a conocer a su mujer, y ella le dio a luz un hijo
  - tuvo relaciones de nuevo con su mujer, y ella le dio a luz un hijo
  lexicon: ידע / know
  rationale: '''Conoció'' preserva el eufemismo bíblico y la terminología tradicional, pero sin adoptar un arcaísmo innecesario. ''De nuevo'' refleja la repetición explícita del texto.'
- source_word: ወሰመዮ፡ ስሞ፡ ሴት፡
  english_pob_choice: called his name Seth
  chosen_spanish: llamó su nombre Set
  alternatives_spanish:
  - lo llamó Set
  - le puso por nombre Set
  lexicon: name/call
  rationale: '''Llamó su nombre'' sigue la construcción semítica y la redacción inglesa del POB. Se prefiere ''Set'' como forma española estable del nombre.'
- source_word: ዘሱባዔ፡ ... ዓመት፡
  english_pob_choice: four weeks of years
  chosen_spanish: cuatro semanas[7] de años
  alternatives_spanish:
  - cuatro semanas de años
  - cuatro semanas[7] de años
  lexicon: chronological week of years
  rationale: Se conserva el término técnico 'semana' porque en Jubileos designa una unidad cronológica, no solo siete días. El marcador remite a la nota explicativa para no perder el sistema del libro.
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: divine name
  rationale: El ge'ez usa el nombre divino, y la política española del proyecto exige 'Yahvé' en el texto principal. No se oculta detrás de una máscara litúrgica.
- source_word: ዘርአ፡ ... ህየንተ፡ አቤል፡
  english_pob_choice: another seed ... in place of Abel
  chosen_spanish: otra descendencia ... en lugar de Abel
  alternatives_spanish:
  - otra semilla ... en lugar de Abel
  - otro linaje ... en lugar de Abel
  lexicon: seed/offspring
  rationale: '''Descendencia'' transmite el sentido genealógico sin volverlo agronómico. ''Semilla'' es posible, pero en español suena menos natural en este contexto narrativo.'
- source_word: ነሥአ፡ ... ብእሲተ፡
  english_pob_choice: took ... as a wife
  chosen_spanish: tomó ... por mujer
  alternatives_spanish:
  - tomó ... como esposa
  - tomó ... por esposa
  lexicon: wife/marry
  rationale: '''Por mujer'' reproduce la formula bíblica y mantiene la sobriedad del registro. ''Esposa'' sería claro, pero atenúa el patrón textual de alianza/matrimonio del relato.'
- source_word: በስመ፡ ወልዱ፡ ሄኖክ።
  english_pob_choice: named it after his son Enoch
  chosen_spanish: la llamó por el nombre de su hijo Enoc
  alternatives_spanish:
  - la nombró con el nombre de su hijo Enoc
  - la llamó Enoc, como su hijo
  lexicon: city naming
  rationale: 'Se conserva la relación causal completa del original: nombrar una ciudad en honor del hijo. ''Por el nombre de'' es algo más semítico, pero claro en español.'
- source_word: ትጉሃነ፡
  english_pob_choice: the Watchers
  chosen_spanish: los Vigilantes
  alternatives_spanish:
  - los observadores
  - los centinelas
  lexicon: proper title
  rationale: '''Vigilantes'' es la equivalencia estable del título angélico y preserva la resonancia tradicional del libro de Jubileos y de la literatura enociana.'
theological_decisions:
- issue: Uso del nombre divino en el discurso de Set y en la referencia a los ángeles de Yahvé
  english_pob_reading: the Lord / angels of the Lord
  chosen_spanish_reading: Yahvé / ángeles de Yahvé
  alternative_spanish_readings:
  - el Señor / ángeles del Señor
  - Dios / ángeles de Dios
  rationale: La fuente ge'ez nombra explícitamente a Dios con el tetragrámaton equivalente y no solo con un título genérico. Mantener 'Yahvé' evita oscurecer la decisión textual y conserva la distinción entre el nombre divino y títulos reverenciales.
  doctrine_reference: Éxodo 3:15; práctica POB sobre el nombre divino en traducción directa
- issue: El enunciado de Enós como primer invocador del nombre divino sobre la tierra
  english_pob_reading: He was the first to call on the name of the Lord on the earth.
  chosen_spanish_reading: Él fue el primero en invocar el nombre de Yahvé sobre la tierra.
  alternative_spanish_readings:
  - Él fue el primero en llamar sobre la tierra el nombre de Yahvé
  - Él fue el primero en invocar el nombre del Señor sobre la tierra
  rationale: '''Invocar el nombre de Yahvé'' conserva el valor cultual/relacional del giro y su peso teológico. ''Llamar'' o ''pronunciar'' debilitarían la dimensión devocional del texto.'
  doctrine_reference: Génesis 4:26; Joel 2:32; Hechos 2:21
- issue: La referencia a los Vigilantes como ángeles descendidos para instruir a los hijos de los hombres
  english_pob_reading: the angels of the Lord descended ... those who are called the Watchers, so that they might instruct the children of men
  chosen_spanish_reading: descendieron ... los ángeles de Yahvé, los que son llamados los Vigilantes, para que instruyeran a los hijos de los hombres
  alternative_spanish_readings:
  - descendieron ... los ángeles del Señor, llamados Vigilantes, para instruir a los hijos de los hombres
  - descendieron ... mensajeros de Yahvé, llamados Vigilantes, para enseñar a los humanos
  rationale: Se mantiene el lenguaje angélico y el nombre del grupo propio del libro. 'Instruyeran' conserva finalidad didáctica sin cargarlo doctrinalmente más allá de lo que la fuente afirma.
  doctrine_reference: Jubileos 4; literatura enociana sobre los Vigilantes
- issue: Sistema cronológico de 'semanas' y 'jubileos'
  english_pob_reading: Week here and throughout the chapter refers to Jubilees’s chronological system
  chosen_spanish_reading: semanas[7] de años / jubileo
  alternative_spanish_readings:
  - semanas de años / jubileo
  - semanas[7] / jubileo
  rationale: La palabra 'semana' necesita alerta porque no significa una semana ordinaria en este libro. La nota preserva la estructura cronológica sin reemplazarla por una explicación intrusiva dentro del verso.
  doctrine_reference: Jubileos 4; sistema cronológico interno del libro
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que corrigió la referencia divina de 'the LORD' a 'the Lord' en el contexto inglés; en español opté de forma coherente por 'Yahvé' porque el ge'ez usa explícitamente el nombre divino, no solo un título. También ubiqué la nota cronológica sobre 'semanas' en el lugar correcto, anclándola en 'semanas[7] de años'.
  spanish_consistency_notes:
  - Mantuve 'Yahvé' de manera uniforme para እግዚአብሔር, y reservé 'Señor' solo como posible alternativa en decisiones no adoptadas.
  - 'Conservé los nombres propios en formas españolas usuales: Set, Enoc, Azura, Enós, Quenán, Mahalaleel, Jared, Noam, Mualélet, Dina, Barakiel.'
  - Usé 'jubileo' y 'semana' como tecnicismos del libro sin sustituirlos por equivalentes cronológicos modernos.
  - '''Los Vigilantes'' se preserva como designación propia, no como glosa interpretativa.'
