  to: Fue el primero entre los nacidos en la tierra en aprender escritura, instrucción y sabiduría, y en escribir en un libro los signos del cielo según el orden de sus meses, para que los hijos de los hombres conocieran las épocas del año según el orden de cada uno de sus meses.
  rationale: 'Se hace una reparación menor de estilo y claridad: «las épocas del año» expresa mejor el sentido calendárico para lectores de español, y se unifica «según el orden» para conservar el paralelismo sin cambiar el contenido.'
