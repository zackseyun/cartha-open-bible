translation:
  language: es
  text: Y en el duodécimo jubileo, en su séptima semana, tomó para sí una esposa, y su nombre era Edni, hija de Daniel, hija de la hermana de su padre; y en el sexto año de esta semana ella le dio a luz un hijo, y le puso por nombre
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኢዮቤልዉ / jubilee
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - jubilé
  lexicon: No aplica
  rationale: El término técnico del libro se conserva como «jubileo», que es transparente en español y corresponde al uso del POB en inglés.
- source_word: በሳብዕ ሱባዔ / in its seventh week
  english_pob_choice: in its seventh week
  chosen_spanish: en su séptima semana
  alternatives_spanish:
  - en la séptima semana
  lexicon: No aplica
  rationale: Se mantiene la relación posesiva con «su», siguiendo la estructura del original y del POB inglés.
- source_word: ብእሲተ / wife
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - mujer casada
  lexicon: No aplica
  rationale: «Esposa» expresa con claridad la relación matrimonial en español y evita ambigüedad más que «mujer».
- source_word: እድኒ / Edni
  english_pob_choice: Edni
  chosen_spanish: Edni
  lexicon: No aplica
  rationale: Se conserva el nombre propio transliterado tal como aparece en el texto fuente y en el POB inglés.
- source_word: ወለተ ዳንኤል / daughter of Daniel
  english_pob_choice: the daughter of Daniel
  chosen_spanish: hija de Daniel
  alternatives_spanish:
  - la hija de Daniel
  lexicon: No aplica
  rationale: Traducción directa y natural del parentesco, sin añadir artículos innecesarios.
- source_word: ወለተ እኅተ አቡሁ / daughter of his father's sister
  english_pob_choice: the daughter of his father's sister
  chosen_spanish: hija de la hermana de su padre
  alternatives_spanish:
  - sobrina de su padre
  - prima
  lexicon: No aplica
  rationale: Se preserva la formulación genealógica exacta del original; aunque «sobrina de su padre» sería idiomática, aquí se mantiene la relación tal como está expresada.
- source_word: ወለደት / she bore
  english_pob_choice: she bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: No aplica
  rationale: «Dio a luz» es la forma natural y digna en español para el parto, y corresponde al sentido del verbo en este contexto.
- source_word: ወጸውዐ ስሞ / he called his name
  english_pob_choice: he called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso por nombre
  lexicon: No aplica
  rationale: Se conserva la fórmula semítica tradicional «llamó su nombre», que refleja mejor el calco del original y el estilo del POB; en español también sería posible «le puso por nombre», pero se deja la construcción más cercana al texto fuente.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente, que corrige un texto previamente no relacionado y confirma que este versículo trata de la esposa Edni y del nacimiento de un hijo, no de la muerte de Caín. Se ha mantenido la estructura del enunciado y la terminología cronológica del pasaje.
  spanish_consistency_notes:
  - Se conserva «jubileo» como término técnico del libro.
  - Se mantiene la fórmula genealógica directa para no perder la precisión del parentesco.
  - El final queda abierto porque el texto fuente y el POB inglés terminan en «he called his name»; no se completa el nombre del hijo.
