base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/005.yaml
  text: 'And because of this it is written on the heavenly tablets: “Cursed is he who strikes his neighbor maliciously”; and let all who see and hear say, “So be it”; and the man who has seen and not reported, let him be cursed in the same way.'
  footnotes:
  - marker: a
    text: Or 'and reported'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:51Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y por esto está escrito en las tablas celestiales: «Maldito el que golpea a su prójimo con mala intención»; y que todos los que lo vean y lo oigan digan: «Así sea»; y el hombre que lo haya visto y no lo haya denunciado[a], sea maldito de la misma manera.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo haya informado»; la idea es que no lo haya denunciado o reportado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ደበ / "strikes"
  english_pob_choice: strikes
  chosen_spanish: golpea
  alternatives_spanish:
  - hiere
  - pega
  lexicon: unknown
  rationale: El contexto legal exige una acción violenta contra el prójimo; «golpea» comunica el acto de agredir con claridad natural en español sin endurecerlo más allá del mandato citado.
- source_word: በእንተ፡ ደመ፡ እኁሁ / "maliciously"
  english_pob_choice: maliciously
  chosen_spanish: con mala intención
  alternatives_spanish:
  - maliciosamente
  - a sabiendas
  - con dolo
  lexicon: unknown
  rationale: «Con mala intención» conserva el matiz de dolo o intención perversa en un español comprensible y evita un adverbio demasiado técnico o poco natural.
- source_word: ጽላተ፡ ሰማይ / "heavenly tablets"
  english_pob_choice: heavenly tablets
  chosen_spanish: tablas celestiales
  alternatives_spanish:
  - tablas del cielo
  - tablillas celestiales
  lexicon: unknown
  rationale: Se mantiene la imagen apocalíptica/jubilar de las «tablas celestiales» con un plural natural en español, sin domesticarla a una paráfrasis explicativa.
- source_word: ይኩን / "So be it"
  english_pob_choice: So be it
  chosen_spanish: Así sea
  alternatives_spanish:
  - Amén
  - Que así sea
  lexicon: unknown
  rationale: «Así sea» reproduce la fórmula de asentimiento sin introducir una equivalencia litúrgica más marcada que el texto fuente no exige.
- source_word: ወኢነገረ / contextual negative for "and not reported"
  english_pob_choice: and not reported
  chosen_spanish: no lo haya denunciado
  alternatives_spanish:
  - no lo haya informado
  - no lo haya dicho
  lexicon: unknown
  rationale: La revisión auditada corrige el sentido a una omisión culpable de denuncia; «denunciado» expresa bien el acto de reportar un homicidio/agravio dentro de un marco jurídico en español. Se conserva la negación exigida por el contexto.
- source_word: ርጉም / "cursed"
  english_pob_choice: cursed
  chosen_spanish: maldito
  alternatives_spanish:
  - sea maldecido
  - sea anatema
  lexicon: unknown
  rationale: «Maldito» sigue de cerca el registro bíblico de maldición judicial y mantiene la repetición del texto sin recurrir a un término más eclesiástico.
theological_decisions:
- issue: La segunda cláusula debe reflejar la corrección negativa del texto
  english_pob_reading: and the man who has seen and not reported, let him be cursed in the same way
  chosen_spanish_reading: y el hombre que lo haya visto y no lo haya denunciado, sea maldito de la misma manera
  alternative_spanish_readings:
  - y el hombre que lo haya visto y lo haya denunciado, sea maldito de la misma manera
  rationale: La nota de revisión muestra que el texto ge'ez contiene un error OCR y que el sentido contextual, junto con la tradición de traducción, exige la negación. La traducción española sigue esa lectura para evitar un absurdo jurídico-teológico.
  doctrine_reference: Levítico 5:1; principio de responsabilidad por testimonio y denuncia
- issue: Fórmula de asentimiento comunitario
  english_pob_reading: let all who see and hear say, “So be it”
  chosen_spanish_reading: 'que todos los que lo vean y lo oigan digan: «Así sea»'
  alternative_spanish_readings:
  - 'que todos los que lo vean y lo oigan digan: «Amén»'
  rationale: Se conserva una respuesta verbal general de aprobación sin imponer una formulación litúrgica fija que pueda estrechar indebidamente el alcance del mandato.
  doctrine_reference: Uso bíblico de aclamación comunitaria y ratificación verbal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que corrige el sentido de la última cláusula de 'and reported' a 'and not reported' por coherencia contextual y con la tradición textual citada en el expediente. También se mantuvo la equivalencia fuente-sensible de 'heavenly tablets' y la fórmula de asentimiento 'So be it'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se evita «Cristo/Mesías» porque no corresponde al contenido del versículo.
  - Se conserva el paralelismo legal del original con un registro bíblico claro y no arcaizante.
  - La nota al pie se ancla en «denunciado» para reflejar la alternativa semántica de reportar/informar.
