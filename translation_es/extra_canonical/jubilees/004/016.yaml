base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/016.yaml
  text: And they did justice and uprightness upon the earth. And in the tenth jubilee[16], in the first week, Jared took for himself a wife, and her name was Baraka, the daughter of Rasujal, the daughter of his father's sister, as his wife, in the fourth year of this week; and she bore him a son in the fifth week, in the fourth year.
  footnotes:
  - marker: '16'
    text: The clause about the flood and 'the land of Eden' is difficult. The translation follows the Ethiopic as preserved, though the logic of the sentence may reflect a compressed or unstable textual tradition.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:59Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: restored the opening clause about doing justice and uprightness, Jared taking Baraka as wife, her lineage, the dating formula, and her bearing him a son.'
translation:
  language: es
  text: Y practicaron justicia y rectitud sobre la tierra. Y en el décimo jubileo, en la primera semana, Jared tomó para sí una esposa, y su nombre era Baraca, hija de Rasujal, hija de la hermana de su padre, en el cuarto año de esta semana; y ella le dio a luz un hijo en la quinta semana, en el cuarto año.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፍትሐ፡ ወርተዐ፡
  english_pob_choice: justice and uprightness
  chosen_spanish: justicia y rectitud
  alternatives_spanish:
  - justicia y uprightidad
  - justicia y equidad
  lexicon: ፍትሐ / justicia; ወርተዐ / rectitud
  rationale: La pareja refleja dos sustantivos coordinados; 'rectitud' conserva mejor la fuerza moral y relacional de 'uprightness' que opciones más interpretativas como 'uprightidad'.
- source_word: በዲበ፡ ምድር።
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra de
  lexicon: በዲበ / sobre; ምድር / tierra
  rationale: '''Sobre la tierra'' sigue más de cerca la preposición ge''ez y mantiene el matiz espacial del original.'
- source_word: ወበ፲ሥር፡ ወአሐዱ፡ ኢዮቤልዉ፡
  english_pob_choice: in the tenth jubilee, in the first week
  chosen_spanish: en el décimo jubileo, en la primera semana
  alternatives_spanish:
  - en el décimo jubileo, en la primera semana de siete años
  - en el décimo jubileo, en la primera semana
  lexicon: ኢዮቤልዉ / jubileo; ሥር / semana
  rationale: Se conserva la cronología técnica del Jubilees sin normalizarla a un sistema más explicativo que el texto no da.
- source_word: ነሥአ፡ ሎቱ፡ ያሬድ፡ ብእሲተ፡
  english_pob_choice: Jared took for himself a wife
  chosen_spanish: Jared tomó para sí una esposa
  alternatives_spanish:
  - Jared se tomó una esposa
  - Jared tomó una mujer para sí
  lexicon: ነሥአ / tomar; ብእሲተ / esposa, mujer
  rationale: '''Tomó para sí'' reproduce el giro verbal y ''esposa'' es el término más claro y digno en español para el contexto matrimonial.'
- source_word: ወስማ፡ *ባረካ፡
  english_pob_choice: and her name was Baraka
  chosen_spanish: y su nombre fue Baraca
  alternatives_spanish:
  - y se llamaba Baraca
  - y su nombre era Baraca
  lexicon: ስም / nombre; *ባረካ / Baraka
  rationale: Se mantiene el nombre propio con transliteración española estable 'Baraca' para lectura pública, sin alterar el nombre por adaptación semántica.
- source_word: ወለተ፡ ራሱያል፡
  english_pob_choice: the daughter of Rasujal
  chosen_spanish: hija de Rasujal
  alternatives_spanish:
  - la hija de Rasujal
  - descendiente de Rasujal
  lexicon: ወለተ / hija de; ራሱያል / Rasujal
  rationale: La filiación se conserva de forma directa y natural en español.
- source_word: ወለተ፡ እኅተ፡ አቡሁ፡
  english_pob_choice: the daughter of his father's sister
  chosen_spanish: hija de la hermana de su padre
  alternatives_spanish:
  - sobrina de su padre
  - nieta por parte de la hermana de su padre
  lexicon: እኅት / hermana; አቡሁ / su padre
  rationale: Aunque la relación de parentesco es algo enredada, se sigue la formulación explícita del texto para no resolverla interpretativamente.
- source_word: በሱባዔ፡ ፬ብዕ፡
  english_pob_choice: in the fourth year of this week
  chosen_spanish: en el cuarto año de esta semana
  alternatives_spanish:
  - en el cuarto año de esta semana septenaria
  - en el cuarto año de esta semana
  lexicon: ሱባዔ / semana
  rationale: Se mantiene la terminología calendárica propia de Jubileos, traduciendo de manera consistente 'week' como 'semana'.
- source_word: ወወለደት፡ ሎቱ፡ ወልደ፡
  english_pob_choice: and she bore him a son
  chosen_spanish: y ella le dio a luz un hijo
  alternatives_spanish:
  - y le dio a luz un hijo
  - y parió un hijo para él
  lexicon: ወለደት / she bore
  rationale: '''Dar a luz'' es idiomático y conserva el sentido reproductivo sin crudeza innecesaria.'
- source_word: በ"ሱባዔ፡ ኃምስ፡ በ፬ብዕ፡
  english_pob_choice: in the fifth week, in the fourth year
  chosen_spanish: en la quinta semana, en el cuarto año
  alternatives_spanish:
  - en la quinta semana, en el cuarto año de esa semana
  - en la quinta semana, en el cuarto año
  lexicon: ሱባዔ / semana
  rationale: Se conserva la secuencia cronológica literal, como en el inglés auditado, sin añadir explicaciones no presentes en el texto.
theological_decisions:
- issue: La fórmula de 'justicia y rectitud' como descripción moral colectiva
  english_pob_reading: And they did justice and uprightness upon the earth.
  chosen_spanish_reading: Y practicaron justicia y rectitud sobre la tierra.
  alternative_spanish_readings:
  - Y hicieron justicia y rectitud sobre la tierra.
  - Y ejercieron justicia y rectitud sobre la tierra.
  rationale: La lectura evita convertir la frase en un mero ideal abstracto; conserva la acción concreta con un verbo suficientemente amplio para el hebraísmo subyacente sin sobreinterpretarlo.
  doctrine_reference: Ética bíblica; lenguaje sapiencial de justicia/rectitud.
- issue: Cronología técnica de 'jubileo' y 'semana'
  english_pob_reading: in the tenth jubilee, in the first week ... in the fourth year ... in the fifth week, in the fourth year
  chosen_spanish_reading: en el décimo jubileo, en la primera semana ... en el cuarto año ... en la quinta semana, en el cuarto año
  alternative_spanish_readings:
  - en el décimo jubileo, en la primera semana de siete años ...
  - en el décimo jubileo, en la primera semana septenaria ...
  rationale: No se resuelve el sistema calendárico con glosas explicativas en el cuerpo del texto, porque el pasaje presenta una datación técnica propia del libro y la traducción debe respetarla.
  doctrine_reference: Cronología literaria de Jubileos; fidelidad textual.
- issue: Parentesco de Baraca con Rasujal y con la hermana del padre de Jared
  english_pob_reading: the daughter of Rasujal, the daughter of his father's sister
  chosen_spanish_reading: hija de Rasujal, hija de la hermana de su padre
  alternative_spanish_readings:
  - hija de Rasujal, sobrina de su padre
  rationale: Se conserva la aparente redundancia o tensión genealógica sin armonizarla, porque el texto la transmite así y una traducción responsable no debe borrar esa dificultad.
  doctrine_reference: Integridad textual; genealogías en literatura parabíblica.
translation_notes:
  revision_awareness: 'El texto inglés auditable fue corregido desde un borrador totalmente ajeno al pasaje para alinearse con el ge''ez: restauró la cláusula inicial sobre justicia y rectitud, la toma de esposa por Jared, la genealogía de Baraca y la doble datación. La presente versión española sigue ese estado revisado y no reproduce el contenido descartado.'
  spanish_consistency_notes:
  - Se mantiene 'jubileo' y 'semana' como términos técnicos del sistema cronológico de Jubileos.
  - Se usa 'Jared' como forma estándar del nombre propio en español, coherente con el uso académico y eclesial amplio.
  - No se introduce 'SEÑOR' ni otros equivalentes teológicos ajenos, porque el pasaje no contiene el tetragrámaton ni una referencia divina explícita.
  - No se añaden notas al pie porque el tramo revisado no presenta, en esta sección, una variante textual obligatoria para el español que deba marcarse en el cuerpo.
