base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/019.yaml
  text: And he recounted the sabbaths of years, as we made known to him. And he saw what was and what will be in a vision of his sleep, how it will happen to the children of men in their generations until the day of judgment. He saw and understood everything, and wrote his testimony, and placed the testimony on earth...
