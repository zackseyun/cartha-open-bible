    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:04Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y contó los sábados de los años, como se lo hicimos saber. Y vio lo que fue y lo que será en una visión de su sueño, cómo sucederá a los hijos de los hombres en sus generaciones hasta el día del juicio. Vio y entendió todo, y escribió su testimonio, y puso el testimonio en la tierra...
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሰንበታት፡ ዓመታት፡
  english_pob_choice: the sabbaths of years
  chosen_spanish: los sábados de los años
  alternatives_spanish:
  - las semanas de años
  - los ciclos sabáticos de años
  lexicon: sabbaths/years
  rationale: Conservo el paralelismo semítico de la expresión y evito interpretarla demasiado libremente. ‘Sábados’ mantiene la relación con el descanso cíclico; ‘de los años’ refleja la construcción del texto fuente sin añadir una explicación ajena al versículo.
- source_word: ነገረ፡ በከመ፡ አይዳዕናሁ።
  english_pob_choice: as we made known to him
  chosen_spanish: como se lo hicimos saber
  alternatives_spanish:
  - como le dimos a conocer
  - según se lo revelamos
  lexicon: made known
  rationale: ‘Hacer saber’ reproduce bien el valor declarativo del verbo sin introducir una carga más técnica como ‘revelar’, que el contexto no exige explícitamente.
- source_word: ወዘኮነ፡ ወዘይከውን፡
  english_pob_choice: what was and what will be
  chosen_spanish: lo que era y lo que será
  alternatives_spanish:
  - lo que fue y lo que será
  - lo que existía y lo que existirá
  lexicon: was/will be
  rationale: Mantengo la simetría temporal directa del original y del inglés POB. ‘Era’/‘será’ suena natural en español y conserva la amplitud del alcance temporal.
- source_word: ርእየ፡ *በራእየ፡ ንዋሙ፡
  english_pob_choice: in a vision of his sleep
  chosen_spanish: en una visión de su sueño
  alternatives_spanish:
  - en una visión mientras dormía
  - en visión durante el sueño
  lexicon: vision/sleep
  rationale: Sigo de cerca la estructura del texto fuente y del POB en inglés. ‘Visión de su sueño’ conserva la relación entre visión y sueño sin decidir excesivamente entre ‘durante el sueño’ y una visión más técnica.
- source_word: ዲበ፡ ደቂቀ፡ እጓለ፡ እመሕያው፡
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - la descendencia de los hombres
  - los seres humanos
  lexicon: children of men
  rationale: Esta expresión fija se mantiene de modo bastante literal para conservar su sabor bíblico y su amplitud antropológica. ‘Seres humanos’ sería más explicativo pero perdería la forma heredada del original.
- source_word: እስከ፡ አመ፡ ዕለተ፡ ደይን፡
  english_pob_choice: until the day of judgment
  chosen_spanish: hasta el día del juicio
  alternatives_spanish:
  - hasta el día del juicio final
  - hasta el día del juicio de Dios
  lexicon: day of judgment
  rationale: ‘Juicio’ transmite el referente escatológico de forma clara y sobria. ‘Juicio final’ añade precisión interpretativa que el texto no explicita aquí.
- source_word: ርእየ፡ ወአእመረ፡
  english_pob_choice: He saw and understood everything
  chosen_spanish: Vio y entendió todo
  alternatives_spanish:
  - Vio y comprendió todo
  - Vio y conoció todo
  lexicon: saw/understood
  rationale: ‘Entendió’ comunica la comprensión intelectual implicada por el paralelo verbal, sin forzar un tecnicismo. ‘Comprendió’ también sería posible, pero ‘entendió’ fluye mejor en el registro del pasaje.
- source_word: ወጸሐፈ፡ ስምዖ፡
  english_pob_choice: wrote his testimony
  chosen_spanish: escribió su testimonio
  alternatives_spanish:
  - escribió su testimonio como testigo
  - puso por escrito su testimonio
  lexicon: testimony
  rationale: ‘Testimonio’ es la correspondencia más directa y mantiene el valor jurídico/profético del término. ‘Puso por escrito’ sería válido, pero el texto fuente subraya el acto de escribir.
- source_word: ወአንበረ፡ ሰስምዐ፡ ዲበ፡ ምድር፡
  english_pob_choice: placed the testimony on earth
  chosen_spanish: puso el testimonio sobre la tierra
  alternatives_spanish:
  - depositó el testimonio sobre la tierra
  - colocó el testimonio en la tierra
  lexicon: placed on earth
  rationale: Conservo la imagen espacial del original. ‘Sobre la tierra’ sigue de cerca la forma fuente sin sustituirla por una explicación interpretativa.
theological_decisions:
- issue: Alcance de la visión profética de Enoc hasta el juicio
  english_pob_reading: he saw what was and what will be ... until the day of judgment
  chosen_spanish_reading: vio lo que era y lo que será ... hasta el día del juicio
  alternative_spanish_readings:
  - vio lo que fue y lo que será ... hasta el día del juicio
  - vio lo que era y lo que vendrá ... hasta el día del juicio
  rationale: La redacción mantiene el marco profético sin añadir detalles doctrinales ajenos. ‘Era y será’ preserva la amplitud temporal del texto y deja intacta la idea de una visión que abarca la historia hasta el juicio.
  doctrine_reference: Profecía; escatología
- issue: Naturaleza de la ‘visión de su sueño’
  english_pob_reading: in a vision of his sleep
  chosen_spanish_reading: en una visión de su sueño
  alternative_spanish_readings:
  - en una visión mientras dormía
  - en visión durante el sueño
  rationale: No se reduce el enunciado a simple ‘sueño’ ni se eleva innecesariamente a revelación técnica. La formulación deja la tensión entre sueño y visión como en el original.
  doctrine_reference: Revelación profética
- issue: Valor de ‘testimonio’
  english_pob_reading: wrote his testimony / placed the testimony on earth
  chosen_spanish_reading: escribió su testimonio ... puso el testimonio sobre la tierra
  alternative_spanish_readings:
  - escribió su declaración ... puso la declaración sobre la tierra
  - escribió su testificación ... puso la testificación sobre la tierra
  rationale: ‘Testimonio’ conserva el peso profético y legal del término y evita domesticarlo como una mera ‘declaración’. La traducción mantiene el carácter público y transmisible del contenido escrito.
  doctrine_reference: Testimonio profético
translation_notes:
  revision_awareness: 'La base inglesa auditada para Jubileos 4:19 estaba desalineada con el texto ge‘ez: correspondía en realidad a Jubileos 4:30. Por eso la versión española sigue el contenido del fuente ge‘ez proporcionado y no la redacción inglesa errónea; esto resuelve la discrepancia documentada en la revisión automática.'
  spanish_consistency_notes:
  - Se conserva ‘testimonio’ para el sustantivo repetido, siguiendo la carga profética/jurídica del pasaje.
  - Se mantiene ‘los hijos de los hombres’ por consistencia con el registro bíblico y para no neutralizar la expresión semítica.
  - ‘Sábados de los años’ reproduce el giro semítico sin sustituirlo por una paráfrasis explicativa que desdibuje el paralelo con el inglés POB y el ge‘ez.
