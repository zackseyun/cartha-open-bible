translation:
  language: es
  text: Y en la tercera semana del segundo jubileo dio a luz a Caín, y en la cuarta dio a luz a Abel, y en la quinta dio a luz a su hija Awan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: third week in the second jubilee
  english_pob_choice: in the third week in the second jubilee
  chosen_spanish: en la tercera semana del segundo jubileo
  alternatives_spanish:
  - en la tercera semana del segundo jubileo
  lexicon: week / jubilee
  rationale: Sigo la datación del texto de Jubileos con el mismo orden temporal. "Semana" y "jubileo" son los equivalentes más directos y claros en español, sin suavizar la cronología del pasaje.
- source_word: she gave birth to
  english_pob_choice: she gave birth to
  chosen_spanish: dio a luz a
  alternatives_spanish:
  - parió a
  - engendró a
  lexicon: birth / bear child
  rationale: '"Dar a luz" es natural en español y conserva el sentido físico de nacimiento que requiere el texto. "Engendró" sería posible, pero en español suele desplazar el foco hacia la generación más que hacia el parto.'
- source_word: Cain
  english_pob_choice: Cain
  chosen_spanish: Caín
  alternatives_spanish:
  - Caín
  lexicon: proper name
  rationale: Nombre propio estándar en español bíblico.
- source_word: Abel
  english_pob_choice: Abel
  chosen_spanish: Abel
  alternatives_spanish:
  - Abel
  lexicon: proper name
  rationale: Nombre propio estándar en español bíblico.
- source_word: Awan
  english_pob_choice: her daughter Awan
  chosen_spanish: su hija Awan
  alternatives_spanish:
  - su hija Awan
  lexicon: proper name / kinship
  rationale: Mantengo el vínculo de parentesco explícito con "su hija"; el nombre se deja sin adaptar porque es un antropónimo del texto.
theological_decisions:
- issue: Cronología genealógica de Jubileos 4:1
  english_pob_reading: The verse recounts the births of Cain, Abel, and Awan in a numbered chronology.
  chosen_spanish_reading: 'El versículo enumera nacimientos en una cronología interna: Caín, luego Abel, luego Awan.'
  alternative_spanish_readings:
  - El versículo podría entenderse de otro modo si se siguiera una lectura corrompida del reparto de versículos.
  rationale: El contexto de revisión indica que el versículo estaba desalineado en el material previo; por fidelidad al texto fuente y al audit trail, la redacción sigue la secuencia de nacimientos y no la lectura errónea anterior.
  doctrine_reference: No aplica; decisión textual y cronológica, no doctrinal.
translation_notes:
  revision_awareness: El audit trail señala que la versión inglesa anterior estaba mal alineada y mezclaba material de Jubileos 4:3–4. La presente traducción sigue el texto fuente provisto para Jubileos 4:1, que presenta los nacimientos de Caín, Abel y Awan.
  spanish_consistency_notes:
  - Usé "jubileo" en minúscula por tratarse de una unidad cronológica del libro, no del festival litúrgico contemporáneo.
  - '"Dar a luz" mantiene un registro bíblico claro y comprensible sin introducir terminología eclesiástica ajena al pasaje.'
  - 'Conservé el orden temporal explícito de la fuente: tercera, cuarta y quinta semana.'
