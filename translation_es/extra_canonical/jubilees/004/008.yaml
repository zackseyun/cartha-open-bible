translation:
  language: es
  text: y para que hicieran justicia y rectitud en la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ‘do justice’
  english_pob_choice: do justice
  chosen_spanish: hicieran justicia
  alternatives_spanish:
  - practicaran justicia
  - ejercieran justicia
  lexicon: δικαιοσύνη / justicia
  rationale: La idea expresa acción ética concreta, no solo un estado jurídico; en español, «hacer justicia» comunica bien la práctica de obrar con justicia.
- source_word: ‘uprightness’
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - recta conducta
  - honradez
  lexicon: ἀλήθεια / rectitud
  rationale: «Rectitud» mantiene el valor moral de conducta derecha y equilibrada que sugiere el par con justicia, sin cargarlo con una connotación meramente legal.
- source_word: ‘on the earth’
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  lexicon: γῆ / tierra
  rationale: «En la tierra» es la equivalencia más directa y natural para el ámbito creado donde debía realizarse esa conducta.
theological_decisions:
- issue: 'El doble ideal ético: justicia y rectitud'
  english_pob_reading: and that they might do justice and uprightness on the earth.
  chosen_spanish_reading: y para que hicieran justicia y rectitud en la tierra.
  alternative_spanish_readings:
  - y para que practicaran justicia y rectitud en la tierra.
  - y para que ejercieran justicia y rectitud en la tierra.
  rationale: La formulación conserva el paralelismo del inglés POB y no atenúa la exigencia moral del texto; «justicia y rectitud» preserva la tensión entre conducta correcta y orden justo.
  doctrine_reference: Ética bíblica / conducta humana ante Dios
translation_notes:
  revision_awareness: No hay texto ge'ez legible en el paquete fuente, y el inglés auditado ofrece únicamente la cláusula ética final; por ello la versión española sigue de cerca esa cláusula sin introducir material no atestiguado.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el texto fuente no contiene un sustituto del nombre divino en el fragmento disponible.
  - Se prefirió «rectitud» sobre perífrasis más largas para mantener el paralelismo breve del verso.
  - La conjunción final «y para que» refleja la finalidad implícita del inglés auditado sin sobreexplicar.
