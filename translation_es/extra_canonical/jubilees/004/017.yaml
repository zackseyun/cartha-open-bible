base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/017.yaml
  text: …year of the jubilee, and he called his name Enoch. He was the first among the children of men born on the earth who learned writing and knowledge and wisdom, and who wrote down the signs of heaven according to the order of their months in a book, so that they might know…
  footnotes:
  - marker: '17'
    text: The place-name rendered 'the mountain of the east' is difficult in the Ethiopic sequence of the four holy places. The wording is kept close to the surviving text rather than harmonized.
    reason: segmentation_note
  - marker: a
    text: Or 'And in the fourteenth jubilee Enoch took a wife[17], and her name was Edna, the daughter of Azrial, his father’s brother’s daughter; and in the sixth week, in the first year of it, she bore him a son, and he called his name Methuselah. He was the first among those born on the earth who learned writing and knowledge and wisdom, and who wrote down the signs of heaven according to the order of their months in a book, so that the children of men might know the seasons of the years according to the order of their separate months.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:03Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft text with a translation matching Jubilees 4:17: restored Enoch, Edna, and Methuselah; included the statement that he was the first to learn writing, knowledge, and wisdom; and rendered the clause about writing the signs of heaven in a book naturally and completely.'
translation:
  language: es
  text: …año del jubileo, y le puso por nombre Enoc. Él fue el primero entre los hijos de los hombres nacidos en la tierra que aprendió escritura, conocimiento y sabiduría, y que escribió en un libro las señales del cielo conforme al orden de sus meses, para que supieran…
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘኢዮቤልዉ / jubilee
  english_pob_choice: year of the jubilee
  chosen_spanish: año del jubileo
  alternatives_spanish:
  - año jubilar
  - año del jubileo
  lexicon: jubileo
  rationale: El pasaje conserva la referencia técnica al ciclo del jubileo; 'año del jubileo' sigue de cerca la estructura del texto fuente y la formulación inglesa auditada.
- source_word: ስሞ፡ ሄኖክ
  english_pob_choice: he called his name Enoch
  chosen_spanish: lo llamó Enoc
  alternatives_spanish:
  - le puso por nombre Enoc
  - y llamó su nombre Enoc
  lexicon: nombre
  rationale: En español, 'lo llamó' comunica de forma natural el acto de nombrar sin introducir elementos ajenos al original.
- source_word: ውእቱ፡ እግዚ፡ ቀዳሚ፡
  english_pob_choice: He was the first
  chosen_spanish: Él fue el primero
  alternatives_spanish:
  - Fue el primero
  - Él era el primero
  lexicon: primero
  rationale: Se conserva la afirmación de primacía sin suavizarla; 'Él fue el primero' es fiel y claro.
- source_word: መጽሐፈ፡ ወትምህርተ፡ ወጥበበ፡
  english_pob_choice: writing and knowledge and wisdom
  chosen_spanish: escribir, y conocimiento y sabiduría
  alternatives_spanish:
  - la escritura, el conocimiento y la sabiduría
  - escribir, conocimiento y sabiduría
  lexicon: writing
  rationale: La secuencia ge'ez expresa una acumulación de capacidades/disciplinas. Se conserva la tensión entre el acto de escribir y los objetos de aprendizaje, como refleja la tradición auditada en inglés.
- source_word: ተአምረ፡ ሰማይ፡
  english_pob_choice: the signs of heaven
  chosen_spanish: las señales del cielo
  alternatives_spanish:
  - los signos del cielo
  - las señales celestiales
  lexicon: signs
  rationale: '''Señales del cielo'' reproduce la imagen astral/cronológica del original y la elección inglesa, sin forzar una interpretación astronómica específica que el texto no explicita.'
- source_word: ከመ፡ ይእምሩ
  english_pob_choice: so that they might know
  chosen_spanish: para que supieran
  alternatives_spanish:
  - para que conocieran
  - a fin de que supieran
  lexicon: know
  rationale: La finalidad se expresa con un español natural. 'Supieran' mantiene el matiz de conocimiento práctico del calendario y los tiempos.
theological_decisions:
- issue: Primacía de Enoc como transmisor de escritura y saber
  english_pob_reading: He was the first among those born on the earth who learned writing and knowledge and wisdom
  chosen_spanish_reading: Él fue el primero entre los hijos de los hombres nacidos sobre la tierra que aprendió a escribir, y conocimiento y sabiduría
  alternative_spanish_readings:
  - fue el primero entre los nacidos sobre la tierra que aprendieron escritura, conocimiento y sabiduría
  - fue el primero entre los hijos de los hombres que aprendió escritura, conocimiento y sabiduría
  rationale: Se conserva la afirmación excepcional sobre Enoc sin diluirla. La redacción española mantiene la prioridad histórica y la tríada 'escritura, conocimiento y sabiduría' como una acumulación significativa, no meramente estilística.
  doctrine_reference: Jubilees 4:17; tradición antediluviana de Enoc
translation_notes:
  revision_awareness: 'Se corrigió cualquier arrastre de versos previos o posteriores. Esta redacción sigue el contenido disponible de Jubilees 4:17: Enoc, su primacía en escritura/conocimiento/sabiduría y la inscripción de las señales del cielo en un libro para que los hijos de los hombres conozcan los tiempos de los años según el orden de los meses.'
  spanish_consistency_notes:
  - Se usa 'Enoc' y no 'Henoc' para mantener consistencia con el nombre bíblico habitual en español, alineado con la forma inglesa auditada.
  - Se evita 'SEÑOR' porque este versículo, en el fragmento dado, no contiene una mención directa al Tetragrámaton; la referencia es a 'las señales del cielo'.
  - Se conserva un estilo sobrio y publicable, sin añadir detalles narrativos que no aparecen en el fuente.
