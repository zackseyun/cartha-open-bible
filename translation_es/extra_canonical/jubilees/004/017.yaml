  to: …año del jubileo, y le puso por nombre Enoc. Él fue el primero entre los hijos de los hombres nacidos en la tierra que aprendió escritura, conocimiento y sabiduría, y que escribió en un libro las señales del cielo conforme al orden de sus meses, para que supieran…
