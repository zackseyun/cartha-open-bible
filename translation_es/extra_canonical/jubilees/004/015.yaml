translation:
  language: es
  text: Y permaneció todavía con los ángeles de Dios durante seis jubileos de años, y ellos le mostraron todo lo que hay en la tierra y en los cielos, el curso del sol, y lo escribió todo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: with the angels of God
  english_pob_choice: with the angels of God
  chosen_spanish: con los ángeles de Dios
  alternatives_spanish:
  - junto a los ángeles de Dios
  - en compañía de los ángeles de Dios
  lexicon: ángeles; Dios
  rationale: Conserva la relación de compañía sin añadir matices no presentes en el texto base.
- source_word: for six jubilees of years
  english_pob_choice: for six jubilees of years
  chosen_spanish: durante seis jubileos de años
  alternatives_spanish:
  - por seis jubileos de años
  - a lo largo de seis jubileos de años
  lexicon: jubileos; años
  rationale: La preposición 'durante' expresa con naturalidad la duración continua indicada por el inglés revisado, sin perder la unidad técnica 'jubileos de años'.
- source_word: they showed him everything that is on earth and in the heavens
  english_pob_choice: they showed him everything that is on earth and in the heavens
  chosen_spanish: le mostraron todo lo que hay en la tierra y en los cielos
  alternatives_spanish:
  - le mostraron todo lo que está en la tierra y en los cielos
  - le enseñaron todo lo que hay en la tierra y en los cielos
  lexicon: mostraron; tierra; cielos
  rationale: '''Mostraron'' sigue el valor de revelar/enseñar sin forzar una paráfrasis. ''Cielos'' mantiene el plural del inglés y del trasfondo semítico.'
- source_word: the rule of the sun
  english_pob_choice: the rule of the sun
  chosen_spanish: el gobierno del sol
  alternatives_spanish:
  - la regla del sol
  - el dominio del sol
  lexicon: gobierno; sol
  rationale: '''Rule'' se vierte como ''gobierno'' para conservar la idea de orden rector o administración, evitando una falsa ''regla'' mecánica.'
- source_word: he wrote down everything
  english_pob_choice: he wrote down everything
  chosen_spanish: y escribió todo
  alternatives_spanish:
  - y lo escribió todo
  - y puso por escrito todo
  lexicon: escribió; todo
  rationale: Resumen fiel y natural del acto de consignar por escrito, sin añadir objeto implícito innecesario.
theological_decisions:
- issue: Duración exaltada de la estancia con los ángeles
  english_pob_reading: And he was still with the angels of God for six jubilees of years
  chosen_spanish_reading: Y permaneció todavía con los ángeles de Dios durante seis jubileos de años
  alternative_spanish_readings:
  - Y estuvo todavía con los ángeles de Dios por seis jubileos de años
  rationale: Se mantiene la duración extraordinaria sin suavizarla ni interpretarla alegóricamente.
  doctrine_reference: Narrativa de Jubileos; no se introduce doctrina ajena al pasaje.
- issue: Cosmología de revelación total
  english_pob_reading: they showed him everything that is on earth and in the heavens
  chosen_spanish_reading: le mostraron todo lo que hay en la tierra y en los cielos
  alternative_spanish_readings:
  - le mostraron todo lo que está en la tierra y en los cielos
  rationale: La formulación conserva el alcance universal de la revelación sin definir filosóficamente la cosmología.
  doctrine_reference: Revelación narrativa en literatura apocalíptica/jubilar.
translation_notes:
  revision_awareness: The English audit trail shows only a minor revision adding 'for' to clarify duration; the Spanish draft reflects that duration naturally with 'durante' and otherwise follows the stable English reading without introducing unsupported elaboration.
  spanish_consistency_notes:
  - Se mantiene 'ángeles de Dios' sin sustituirlo por una perífrasis devocional.
  - '''Jubileos de años'' se conserva como unidad técnica coherente con el género del libro.'
  - No se emplea 'SEÑOR' porque no aparece aquí el tetragrámaton ni su equivalente en el texto auditado.
  - '''Cielos'' se deja en plural para respetar el paralelismo del enunciado.'
