  source_alignment_summary: 'El borrador sigue bien el sentido general del inglés auditado: duración de seis jubileos, compañía con los ángeles de Dios, revelación de lo terrestre y celestial, y consignación escrita. La única zona débil es ''el gobierno del sol'', que suena algo interpretativo y menos natural en español para una expresión cosmológica de orden o curso solar.'
