base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/002.yaml
  text: And in the fifth week she bore him his daughter Awan. And in the first year of the third jubilee Cain killed Abel, because Abel’s offering was accepted, but Cain’s sacrifice was not accepted.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:47Z'
    unchanged: false
    changes_summary: Replaced the ambiguous pronoun 'his' with 'Cain’s' in the final clause to reflect the source explicitly and improve clarity and completeness.
translation:
  language: es
  text: Y en la quinta semana dio a luz a su hija Awan. Y en el primer año del tercer jubileo Caín mató a Abel, porque la ofrenda de Abel fue aceptada, pero el sacrificio de Caín no fue aceptado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበኃምስ ... ወለደታ
  english_pob_choice: And in the fifth week she bore him his daughter Awan.
  chosen_spanish: Y en la quinta semana le dio a luz a su hija Awan.
  alternatives_spanish:
  - Y en la quinta semana dio a luz a su hija Awan.
  - Y en la quinta semana le dio a luz Awan, su hija.
  lexicon: Semantic rendering of birth expression
  rationale: El geʽez expresa literalmente que ella 'lo dio a luz' y menciona que era su hija Awan. En español, 'le dio a luz a su hija' conserva la relación materna y la referencia explícita a la hija sin forzar una construcción extraña.
- source_word: በቀዳሚሁ ለኢዮቤሌው ሣልስ
  english_pob_choice: And in the first year of the third jubilee
  chosen_spanish: Y en el primer año del tercer jubileo
  alternatives_spanish:
  - Y en el primer año del tercer jubileo...
  - En el primer año del tercer jubileo
  lexicon: Chronological formula
  rationale: Se mantiene la secuencia temporal directa y el término técnico 'jubileo' para el periodo cronológico del texto.
- source_word: ቀተሎ ቃየን ለአቤል
  english_pob_choice: Cain killed Abel
  chosen_spanish: Caín mató a Abel
  alternatives_spanish:
  - Caín asesinó a Abel
  - Caín dio muerte a Abel
  lexicon: Violent death verb
  rationale: '''Mató'' reproduce de manera natural y fiel el verbo de asesinato del relato, sin intensificar más allá de lo que el pasaje dice.'
- source_word: ተወክፈ ቍርባኖ ለአቤል
  english_pob_choice: because Abel’s offering was accepted
  chosen_spanish: porque la ofrenda de Abel fue aceptada
  alternatives_spanish:
  - porque se aceptó la ofrenda de Abel
  - porque la ofrenda de Abel fue recibida
  lexicon: Accepted offering
  rationale: '''Fue aceptada'' conserva la pasividad del original y la relación entre Abel y su ofrenda, igual que la lectura auditada en inglés.'
- source_word: ኢተወክፈ መሥዋዕቶ
  english_pob_choice: Cain’s sacrifice was not accepted
  chosen_spanish: la ofrenda de Caín no fue aceptada
  alternatives_spanish:
  - el sacrificio de Caín no fue aceptado
  - la ofrenda de Caín no fue recibida
  lexicon: Sacrifice/offering terminology
  rationale: Aunque el inglés auditado usa 'sacrifice', el geʽez distingue aquí el término final como 'sacrificio/ofrenda'. En español se eligió 'ofrenda' para mantener la correspondencia con la primera cláusula y evitar una oscilación innecesaria, siguiendo la tensión terminológica del pasaje.
theological_decisions:
- issue: Diferencia entre 'ofrenda' y 'sacrificio' en la última cláusula
  english_pob_reading: Abel’s offering was accepted, but Cain’s sacrifice was not accepted.
  chosen_spanish_reading: la ofrenda de Abel fue aceptada, pero la ofrenda de Caín no fue aceptada
  alternative_spanish_readings:
  - la ofrenda de Abel fue aceptada, pero el sacrificio de Caín no fue aceptado
  - la ofrenda de Abel fue aceptada, pero la ofrenda de Caín no fue aceptada
  rationale: El texto fuente distingue dos términos relacionados pero no idénticos. Para no borrar la tensión léxica, se mantiene la repetición de 'ofrenda' en español, dejando visible que el geʽez usa vocabulario sacrificial estrechamente emparentado, aunque el inglés POB haya optado por alternar 'offering' y 'sacrifice'.
  doctrine_reference: Génesis 4:3–5 / Jubileos 4:2
translation_notes:
  revision_awareness: La traducción inglesa auditada fue revisada para sustituir el posesivo ambiguo 'his' por 'Cain’s' en la cláusula final. La versión española incorpora esa explicitación de manera directa mediante 'de Caín', sin ambigüedad pronominal.
  spanish_consistency_notes:
  - Se usa 'Awan' como nombre propio transliterado, en línea con el registro del texto fuente.
  - '''Jubileo'' se conserva como término técnico cronológico.'
  - No se introduce mayúscula devocional para el nombre divino porque este versículo no contiene el tetragrámaton ni un título divino relevante.
