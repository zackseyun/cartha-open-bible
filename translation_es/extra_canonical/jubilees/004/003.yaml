translation:
  language: es
  text: Y lo mató en el campo, y su sangre clamó desde la tierra hasta el cielo, quejándose de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «acusándolo». El Ge''ez admite un matiz de queja o de denuncia contra la persona mencionada.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወቀተሎ / he killed him
  english_pob_choice: And he killed him
  chosen_spanish: Y lo mató
  alternatives_spanish:
  - Y lo asesinó
  - Y le dio muerte
  lexicon: Spanish verbal rendering of violent causation
  rationale: El verbo español más natural y directo para el hecho narrado es «mató». Conserva la fuerza narrativa del original sin introducir matices ajenos como formalidad jurídica o perífrasis innecesarias.
- source_word: በገዳም / in the field
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el terreno
  lexicon: Español común para espacio abierto rural
  rationale: «Campo» comunica bien el lugar abierto del relato y evita un calco pesado. Mantiene el sentido general del Ge'ez sin precisar más de lo que el texto ofrece.
- source_word: ደሙ ... ይስኪ / his blood ... cried out / complained, accused
  english_pob_choice: his blood cried out ... complaining about him
  chosen_spanish: su sangre clamó ... acusándolo
  alternatives_spanish:
  - su sangre clamó ... quejándose de él
  - su sangre clamó ... denunciándolo
  lexicon: Verbos de reclamo/acusación en español
  rationale: El audit trail inglés mostró una oscilación entre «complaining about him» y «accusing because of him». «Acusándolo» preserva la tensión forense del pasaje y evita suavizarlo a mera queja, aunque el verbo de origen también admite una lectura de reclamo o denuncia.
- source_word: እምድር ውስተ ሰማይ / from the ground to heaven
  english_pob_choice: from the ground to heaven
  chosen_spanish: desde la tierra hasta el cielo
  alternatives_spanish:
  - de la tierra al cielo
  - desde el suelo hasta el cielo
  lexicon: Expresión espacial ascendente
  rationale: «Desde ... hasta ...» reproduce con naturalidad el movimiento vertical del original y del inglés POB. «Tierra» conserva la amplitud semántica de «ground» en este contexto narrativo.
theological_decisions:
- issue: La voz de la sangre como testigo acusador
  english_pob_reading: his blood cried out ... accusing/complaining about him
  chosen_spanish_reading: su sangre clamó ... acusándolo
  alternative_spanish_readings:
  - su sangre clamó ... quejándose de él
  - su sangre clamó ... denunciándolo
  rationale: No se atenúa la personificación de la sangre ni se reemplaza por una fórmula devocional más genérica. El texto conserva la imagen de denuncia implícita en el original y en el audit trail inglés, manteniendo la tensión entre lamento y acusación.
  doctrine_reference: Génesis 4:10 (paralelo intertextual de sangre que clama desde la tierra)
translation_notes:
  revision_awareness: El texto inglés fue revisado desde «making accusation because of him» a «accusing because of him», y luego se evaluó que «complaining about him» reflejaba mejor la naturalidad del inglés y el valor del verbo ge'ez. La versión española conserva esa tensión con «acusándolo», mientras la nota ofrece la alternativa de queja/denuncia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece ningún nombre divino.
  - Se prefiere «sangre clamó» para conservar la personificación fuerte del original, sin convertirla en paráfrasis explicativa.
  - «Acusándolo» se usa aquí por la carga acusatoria documentada en el audit trail; no se sustituye por un término litúrgico más suave.
