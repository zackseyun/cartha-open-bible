    unchanged: false
    changes_summary: Changed 'the LORD' to 'the Lord' because the source has a title for God, not the divine name Yahweh. Left the rest unchanged despite the verse being fragmentary.
translation:
  language: es
  text: Y por esta razón nosotros declaramos, cuando venimos ante el Señor nuestro Dios, todos los pecados
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበእንተዝ
  english_pob_choice: And for this reason
  chosen_spanish: Y por esta razón
  alternatives_spanish:
  - Y por esto
  - Por esta razón
  lexicon: conjunction + causal expression
  rationale: La frase ge'ez introduce una consecuencia o motivo; en español, «por esta razón» reproduce con naturalidad el valor causal sin añadir contenido. Se conserva el enlace inicial con «Y» porque el texto fuente continúa la enunciación.
- source_word: ንሕነ
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nos
  lexicon: pronombre personal de 1.ª persona plural
  rationale: Se mantiene el sujeto explícito en español por claridad y por fidelidad al énfasis colectivo del enunciado.
- source_word: '*ናየድዕ፡ መጻእነ፡'
  english_pob_choice: we come
  chosen_spanish: venimos
  alternatives_spanish:
  - nos acercamos
  - llegamos
  lexicon: verbo de movimiento/presentación
  rationale: El contexto de comparecer delante de Dios pide un verbo que exprese presentarse ante él. «Venimos» conserva la forma simple del original y funciona bien en español sin sobreinterpretar.
- source_word: ቅድመ፡ እግዚአብሔር፡ አምላክነ፡
  english_pob_choice: before the Lord our God
  chosen_spanish: delante del Señor nuestro Dios
  alternatives_spanish:
  - ante el Señor nuestro Dios
  - en presencia del Señor nuestro Dios
  lexicon: preposición + título divino
  rationale: «Delante de» traduce bien la relación espacial/ceremonial de comparecencia. Se conserva «Señor» porque el audio textual usa un título para Dios, no el nombre divino explícito; esto sigue la revisión inglesa.
- source_word: ኵሎ፡ ኀጢአተ፡
  english_pob_choice: all the sins
  chosen_spanish: todos los pecados
  alternatives_spanish:
  - todos los pecados nuestros
  - todos los pecados cometidos
  lexicon: sustantivo plural de pecado
  rationale: «Pecados» es el equivalente natural y exacto de ኀጢአተ. Se mantiene el cuantificador «todos» para reflejar la totalidad sin añadir especificaciones no presentes en el fragmento.
theological_decisions:
- issue: Título divino sin el nombre Yahvé
  english_pob_reading: the Lord our God
  chosen_spanish_reading: el Señor nuestro Dios
  alternative_spanish_readings:
  - Yahvé nuestro Dios
  - el Señor, nuestro Dios
  rationale: La revisión inglesa dejó claro que el texto fuente presenta un título para Dios, no el nombre propio Yahvé. Por eso en español se usa «Señor» y no «Yahvé» ni una máscara tipográfica.
  doctrine_reference: Distinción entre nombre divino y título reverente en traducción bíblica
- issue: Texto fragmentario conservado sin completar
  english_pob_reading: And for this reason we declare, when we come before the Lord our God, all the sins
  chosen_spanish_reading: Y por esta razón declaramos, cuando venimos delante del Señor nuestro Dios, todos los pecados
  alternative_spanish_readings:
  - Y por esta razón declaramos...
  - Y por esta razón declaramos, cuando venimos ante el Señor nuestro Dios, todos los pecados
  rationale: El versículo en la fuente y en la auditoría inglesa termina de forma fragmentaria. Se preserva la incompletitud sin intentar suavizarla o reconstruirla; en español se mantiene la misma apertura sintáctica.
  doctrine_reference: Principio de sobriedad textual ante pasajes fragmentarios
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió ‘the LORD’ a ‘the Lord’ porque la fuente no contiene el nombre Yahvé sino un título. La redacción española sigue esa decisión y evita cualquier máscara de nombre divino. También se conservó la fragmentariedad del verso, sin expansión interpretativa.
  spanish_consistency_notes:
  - Se emplea «Señor» para el título divino, en coherencia con la revisión inglesa y con el lenguaje de la fuente.
  - No se introduce «Yahvé» porque el testimonio base no señala el nombre divino explícito.
  - La frase permanece fragmentaria para respetar el estado del texto fuente.
  - Se usa un español sobrio y publicable, sin completar el final del verso.
