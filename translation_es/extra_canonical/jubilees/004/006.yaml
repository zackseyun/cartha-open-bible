    issue: El pronombre explícito ንሕነ ('nosotros') figura en las decisiones léxicas pero no aparece en el texto español.
    rationale: Si el equipo documentó que el sujeto explícito debía preservarse por énfasis colectivo, el texto debería reflejarlo. Dejarlo implícito no destruye el sentido, pero sí debilita la fidelidad al análisis documentado.
  - severity: low
    issue: '''Delante del Señor nuestro Dios'' es menos natural que ''ante el Señor nuestro Dios'' en este contexto formal de comparecencia.'
    rationale: Ambas opciones son fieles, pero 'ante' suena más idiomático y digno en español eclesial contemporáneo sin añadir significado.
  revised_spanish_text: Y por esta razón nosotros declaramos, cuando venimos ante el Señor nuestro Dios, todos los pecados
