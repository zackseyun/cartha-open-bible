base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/004/018.yaml
  text: He was the first to write a testimony, and he testified to the children of men among the generations of the earth, and recounted the weeks of the jubilees, and made known the days of the years, and set in order the months.
  footnotes:
