    text: Or 'And at the end of the nineteenth jubilee, in the seventh week, in its sixth year, Adam died, and all his sons buried him in the land of his creation; and he was the first to be buried in the earth.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:02Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Él fue el primero en escribir un testimonio y en dar testimonio a los hijos de los hombres entre las generaciones de la tierra, y relató las semanas de los jubileos, y dio a conocer los días de los años, y puso en orden los meses.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ስምዐ፡ ወአስምዐ፡
  english_pob_choice: write a testimony / testified
  chosen_spanish: escribir un testimonio / dio testimonio
  alternatives_spanish:
  - escribió un testimonio / testificó
  - registró un testimonio / dio testimonio
  lexicon: testimonio; dar testimonio
  rationale: El ge'ez combina la idea de escribir y de testificar. El POB inglés refleja ambas acciones con 'write a testimony' y 'testified'; en español se preserva esa tensión con 'escribir un testimonio' y 'dio testimonio'.
- source_word: ለደቂቀ፡ እጓለ፡ እመሕያው፡
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: hijos de los hombres
  rationale: La expresión conserva el color semítico del original y coincide con la formulación del POB inglés. 'Los seres humanos' sería más explicativo pero menos fiel al giro textual.
- source_word: ውስተ፡ ትዝምደ፡ ምድር፡
  english_pob_choice: among the generations of the earth
  chosen_spanish: entre las generaciones de la tierra
  alternatives_spanish:
  - entre las generaciones de la humanidad
  - en las generaciones de la tierra
  lexicon: generaciones; tierra
  rationale: Se mantiene la construcción espacial-temporal del original y del inglés auditado. 'Tierra' conserva la referencia creada/cósmica sin introducir una paráfrasis interpretativa.
- source_word: ኢዮቤልውሳት፡
  english_pob_choice: jubilees
  chosen_spanish: jubileos
  alternatives_spanish:
  - jubileos
  - los jubileos
  lexicon: jubileo
  rationale: Se traduce el término técnico con el equivalente español 'jubileos', ya asentado para la unidad de medida/periodización del libro.
- source_word: ወመዋዕለ፡ ዓመታት፡
  english_pob_choice: the days of the years
  chosen_spanish: los días de los años
  alternatives_spanish:
  - los días de los años
  - las fechas de los años
  lexicon: días; años
  rationale: Se conserva la secuencia exacta del original y la cadencia del inglés POB. 'Días de los años' es literal pero inteligible en español y sostiene el inventario cronológico.
- source_word: ወአውራኅ፡ ሰርዐ፡
  english_pob_choice: set in order the months
  chosen_spanish: puso en orden los meses
  alternatives_spanish:
  - ordenó los meses
  - dispuso los meses
  lexicon: ordenar; meses
  rationale: '''Puso en orden'' reproduce la acción organizadora sin añadir una teoría calendárica. ''Meses'' mantiene el objeto directo del texto.'
theological_decisions:
- issue: Identidad del sujeto y contenido de la acción escritural
  english_pob_reading: He was the first to write a testimony, and he testified...
  chosen_spanish_reading: Él fue el primero en escribir un testimonio, y dio testimonio...
  alternative_spanish_readings:
  - Él fue el primero en escribir un testimonio, y testificó...
  rationale: 'La lectura sigue el texto ge''ez y la corrección auditada del POB: la sección trata de la actividad de un testigo/escriba, no del relato sobre la muerte de Adán. No se introduce material ajeno al versículo.'
  doctrine_reference: Jubilees 4:18 según el texto ge'ez y la revisión auditada del POB; corrección textual de alineación
translation_notes:
  revision_awareness: 'El contexto auditado muestra una corrección importante: el inglés anterior estaba alineado por error con Jubilees 4:29 (la muerte de Adán). Para Jubilees 4:18, el ge''ez describe la obra escritural/testifical y la organización cronológica; la traducción española sigue esa lectura corregida.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo exija; aquí no aparece el Tetragrámaton.
  - '''Jubileos'' se usa como término técnico plural en español para el libro/las semanas jubilares.'
  - La puntuación conserva la enumeración coordinada del original sin suavizarla excesivamente.
