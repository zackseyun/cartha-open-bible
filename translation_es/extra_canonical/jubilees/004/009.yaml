  revision_awareness: 'El audit trail señala que la referencia JUB.4.9 está desalineada: el texto asociado corresponde a Jubileos 4:16a y queda truncado en la transmisión inglesa previa. Para este borrador en español se incorpora el cierre narrativo indicado en la revisión (''y le puso por nombre Enoc'') para evitar repetir la omisión y producir una sección publicable coherente con el aviso de revisión.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto, pero este pasaje no contiene el nombre divino.
  - '''Jared'' y ''Enoc'' se mantienen en la forma habitual en español bíblico.'
  - Se evita 'señor' o 'varón' para no oscurecer la relación matrimonial y genealógica precisa.
  - La cronología por 'semana' se conserva por tratarse de una unidad técnica de Jubileos.
