translation:
  language: es
  text: Y en el undécimo jubileo, Jared tomó para sí una esposa, y su nombre fue Baraca[a], hija de Rasujal, hija del hermano de su padre, en la cuarta semana de este jubileo; y ella le dio un hijo en la quinta semana, en el cuarto año de ella, y le puso por nombre Enoc.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Baraca». Se conserva el nombre propio tal como aparece en la tradición auditada del pasaje.'
    reason: alternative_reading
lexical_decisions:
- source_word: wife
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - mujer tomada por esposa
  lexicon: wife
  rationale: En español bíblico contemporáneo, 'esposa' comunica con claridad la relación matrimonial sin sonar arcaico; evita la ambigüedad de 'mujer'.
- source_word: took for himself
  english_pob_choice: took for himself
  chosen_spanish: tomó para sí
  alternatives_spanish:
  - tomó
  - se tomó
  lexicon: take for oneself
  rationale: Conserva la fuerza reflexiva del hebraísmo/idioma bíblico sin volverlo extraño en español.
- source_word: father’s brother’s daughter
  english_pob_choice: father’s brother’s daughter
  chosen_spanish: hija del hermano de su padre
  alternatives_spanish:
  - sobrina de su padre
  - prima
  lexicon: kinship description
  rationale: Mantiene la descripción genealógica precisa del original, sin inferir un término de parentesco más específico que no esté explicitado.
- source_word: in the fourth week / fifth week
  english_pob_choice: in the fourth week / fifth week
  chosen_spanish: en la cuarta semana / en la quinta semana
  alternatives_spanish:
  - durante la cuarta semana / durante la quinta semana
  lexicon: jubilee chronology
  rationale: Sigue de cerca la cronología técnica del texto de Jubileos, donde 'semana' es una unidad calendárica especializada.
- source_word: he called his name Enoch
  english_pob_choice: he called his name Enoch
  chosen_spanish: le puso por nombre Enoc
  alternatives_spanish:
  - llamó su nombre Enoc
  - lo nombró Enoc
  lexicon: name-giving formula
  rationale: '''Le puso por nombre'' es una fórmula natural y fiel en español bíblico para la imposición del nombre.'
