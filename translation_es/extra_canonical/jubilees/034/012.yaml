revisions:
- from: Y los hijos de Jacob sacrificaron un cabrito de las cabras y sumergieron la vestidura de José en la sangre, y la enviaron a Jacob, su padre, el día diez del séptimo mes.
  to: Y los hijos de Jacob degollaron un cabrito y empaparon[a] la vestidura de José en la sangre, y la enviaron a Jacob, su padre, el día diez del séptimo mes.
  rationale: Se ajusta 'sacrificaron' a 'degollaron' para evitar un matiz cultual no exigido; se cambia 'sumergieron' por 'empaparon' con nota para conservar la fuerza de 'dipped' de manera más natural en español; y se simplifica 'un cabrito de las cabras' a 'un cabrito' para evitar calco innecesario. No se requiere adjudicación adicional porque los cambios son de estilo y precisión léxica, no de incertidumbre doctrinal o textual.
