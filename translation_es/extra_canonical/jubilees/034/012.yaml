  text: And the sons of Jacob slaughtered a kid of the goats and dipped Joseph’s garment in the blood, and sent it to Jacob their father on the tenth of the seventh month.
  footnotes:
  - marker: a
    text: Or 'stained'.
    reason: previous_rendering
  revision_pass:
