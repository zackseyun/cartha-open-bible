    timestamp: '2026-05-03T07:41:52Z'
    unchanged: false
    changes_summary: Changed 'with the blood' to 'in the blood' for tighter, more natural English while preserving the source action of dipping.
translation:
  language: es
  text: Y los hijos de Jacob degollaron un cabrito y empaparon[a] la vestidura de José en la sangre, y la enviaron a Jacob, su padre, el día diez del séptimo mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la metieron en la sangre'; el sentido es 'la mojaron por inmersión', no solo 'la mancharon'.
    reason: Preservar en español la decisión auditada de 'dipped' frente a la lectura previa 'stained'.
lexical_decisions:
- source_word: kid of the goats
  english_pob_choice: a kid of the goats
  chosen_spanish: un cabrito de las cabras
  alternatives_spanish:
  - un cabrito
  - un cabrito de cabra
  lexicon: cabrito
  rationale: El inglés POB conserva el valor literal del animal sacrificado. En español, 'cabrito' comunica bien la cría de la cabra sin perder la referencia zoológica del original.
- source_word: dipped
  english_pob_choice: dipped
  chosen_spanish: sumergieron
  alternatives_spanish:
  - mojaron
  - empaparon
  lexicon: sumergir
  rationale: El audit trail corrigió 'stained' a 'dipped' por exigencia del verbo ge'ez. 'Sumergieron' reproduce mejor la acción concreta de introducir la prenda en la sangre.
- source_word: Joseph’s garment
  english_pob_choice: Joseph’s garment
  chosen_spanish: la vestidura de José
  alternatives_spanish:
  - el manto de José
  - la túnica de José
  lexicon: vestidura
  rationale: '''Vestidura'' mantiene una forma elevada y suficientemente amplia para la prenda de José, sin imponer una especificación que el texto fuente no da.'
- source_word: in the blood
  english_pob_choice: in the blood
  chosen_spanish: en la sangre
  alternatives_spanish:
  - con la sangre
  lexicon: sangre
  rationale: Se conserva la preposición 'en' porque el ajuste editorial en inglés privilegió la inmersión literal; 'en la sangre' refleja esa imagen con naturalidad en español.
- source_word: on the tenth of the seventh month
  english_pob_choice: on the tenth of the seventh month
  chosen_spanish: el día diez del séptimo mes
  alternatives_spanish:
  - el diez del séptimo mes
  - en el día diez del séptimo mes
  lexicon: diez / mes
  rationale: La fecha se vierte de modo natural en español conservando el orden y la precisión cronológica del original.
theological_decisions:
- issue: Acción ritual de la sangre sobre la vestidura
  english_pob_reading: dipped Joseph’s garment in the blood
  chosen_spanish_reading: sumergieron la vestidura de José en la sangre
  alternative_spanish_readings:
  - mojaron la vestidura de José en la sangre
  - empaparon la vestidura de José en la sangre
  rationale: No se atenúa la fuerza del gesto ritual/simbólico; 'sumergieron' preserva la materialidad de la acción y el vínculo intertextual con la narración de Génesis 37:31.
  doctrine_reference: Intertextualidad bíblica y lectura narrativa
translation_notes:
  revision_awareness: La revisión reciente corrigió el verbo inglés de 'stained' a 'dipped' y afinó 'with the blood' a 'in the blood'. La versión española sigue esa decisión, evitando cualquier término que sugiera sólo mancha o coloración pasiva.
  spanish_consistency_notes:
  - Se mantiene 'José' como nombre propio, conforme al uso bíblico español estándar.
  - No se usa 'SEÑOR' ni terminología de estilo eclesiástico que no aparece en el pasaje.
  - '''Vestidura'' conserva un registro bíblico claro y neutral para una prenda sin especificación adicional.'
