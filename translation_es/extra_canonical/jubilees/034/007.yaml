translation:
  language: es
  text: seis mil hombres que llevaban armas. Y los mató en la bajada[a] de Siquem, y persiguió a los que huían, y los mató al filo de la espada; y mató a Ares, a Tapu y a Seragán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «descenso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጸአተ (ṣa'ata)
  english_pob_choice: descent
  chosen_spanish: bajada
  alternatives_spanish:
  - descent
  - descenso
  - pendiente
  lexicon: topographical term for a downward slope or pass
  rationale: El contexto geográfico apunta a una bajada o descenso, no a una llanura. "Bajada" comunica naturalmente el sentido topográfico en español y preserva la imagen de un lugar en descenso junto a Siquem.
- source_word: ዘሴቄም
  english_pob_choice: of Shechem
  chosen_spanish: de Siquem
  alternatives_spanish:
  - de Shequem
  lexicon: proper place name
  rationale: '"Siquem" es la forma española habitual y clara del nombre propio, manteniendo la referencia geográfica del texto.'
- source_word: በአፈ፡ ሰይፍ
  english_pob_choice: with the edge of the sword
  chosen_spanish: al filo de la espada
  alternatives_spanish:
  - con el filo de la espada
  - a filo de espada
  lexicon: idiomatic instrumental phrase
  rationale: '"Al filo de la espada" conserva el sentido idiomático y suena natural en español, sin debilitar la imagen de violencia del original.'
- source_word: ወቀተሎሙ
  english_pob_choice: he killed them
  chosen_spanish: los mató
  alternatives_spanish:
  - los asesinó
  - los mató a todos
  lexicon: basic verb of killing
  rationale: '"Matar" es la equivalencia directa y sobria para el verbo de matar; evita sobrecargar el texto con matices no presentes en la fuente.'
- source_word: እለ፡ ይጸውሩ፡ አበይፍተ
  english_pob_choice: who carried weapons
  chosen_spanish: que llevaban armas
  alternatives_spanish:
  - que portaban armas
  - armados
  lexicon: descriptive participial phrase
  rationale: La construcción describe a los hombres por su equipamiento. "Llevaban armas" mantiene la concreción del original y es idiomático en español.
- source_word: ለአሬስ፡ ወለታፉ፡ ወለሴሬጋን፡
  english_pob_choice: Ares and Taphu and Seragan
  chosen_spanish: Ares, a Tapu y a Seragán
  alternatives_spanish:
  - Ares, Tapu y Seragán
  - Ares, a Tapu y a Seragán
  lexicon: proper names
  rationale: Se conservan los nombres propios con adaptación ortográfica mínima para lectura en español. Se mantiene la coordinación con repetición de "a" donde ayuda a la fluidez ante nombres personales.
theological_decisions:
- issue: Topographical term in the plain/descent of Shechem
  english_pob_reading: descent
  chosen_spanish_reading: bajada
  alternative_spanish_readings:
  - llanura
  - descenso
  rationale: La revisión del audit trail corrige "plain" por "descent"; en español debe reflejarse esa decisión sin suavizarla a un término más general. "Bajada" conserva la dirección espacial y evita introducir una llanura inexistente en la evidencia revisada.
  doctrine_reference: No doctrinal issue; text-critical/geographical accuracy
- issue: Enumerative violence and pursuit
  english_pob_reading: he pursued those who fled, and killed them with the edge of the sword
  chosen_spanish_reading: persiguió a los que huían, y los mató al filo de la espada
  alternative_spanish_readings:
  - persiguió a los fugitivos, y los mató con el filo de la espada
  rationale: Se mantiene la secuencia narrativa y la intensidad bélica del texto sin atenuación ni ampliación interpretativa.
  doctrine_reference: Narrative fidelity to the source
translation_notes:
  revision_awareness: El audit trail inglés muestra una corrección importante del lugar desde "plain" a "descent"; la versión española sigue esa revisión y no adopta la lectura anterior. También se mantiene la puntuación final añadida en la revisión inglesa.
  spanish_consistency_notes:
  - Se usa "Siquem" para el topónimo, en coherencia con el uso bíblico en español.
  - Se conserva "al filo de la espada" como expresión estable y transparente.
  - Los nombres propios finales se mantienen sin traducción, con adaptación gráfica mínima para lectura española.
