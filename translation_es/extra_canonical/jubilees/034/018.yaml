base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/034/018.yaml
  text: Therefore it was ordained for the sons of Israel that they should afflict themselves on the tenth of the seventh month[a], on the day when the news about Joseph reached Jacob his father, and that they should make atonement for themselves on it with a young goat on the tenth of the seventh month, once each year, because of their sins; for they had grieved the affection of their father for Joseph his son.
  footnotes:
  - marker: a
    text: The chapter links the annual self-affliction on the tenth of the seventh month with Joseph's bloodied garment and Jacob's mourning, functioning as an etiology for the observance of the Day of Atonement (Yom Kippur).
    reason: cross_reference
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:00Z'
    unchanged: false
    changes_summary: Removed 'had died' because the source says only that news about Joseph reached Jacob, not specifically news of his death. Changed 'compassion' to 'affection' for a more natural rendering of the father's feeling toward his son.
translation:
  language: es
  text: Por tanto, se estableció para los hijos de Israel que se afligieran el día diez del séptimo mes[a], el día en que la noticia acerca de José llegó a Jacob su padre, y que hicieran expiación por sí mismos en ese día con un cabrito, el día diez del séptimo mes, una vez cada año, a causa de sus pecados; porque habían entristecido el afecto de su padre por José su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El capítulo relaciona la aflicción anual del día diez del séptimo mes con la túnica manchada de José y el duelo de Jacob, funcionando como etiología de la observancia del Día de la Expiación (Yom Kippur).
    reason: cross_reference
lexical_decisions:
- source_word: ተሠርዐ
  english_pob_choice: it was ordained
  chosen_spanish: fue ordenado
  alternatives_spanish:
  - se estableció
  - quedó decretado
  lexicon: Leslau
  rationale: La raíz expresa una disposición u orden establecida; en español, 'fue ordenado' conserva el carácter normativo sin introducir una connotación eclesiástica ajena.
- source_word: ውሉደ፡ እስራኤል
  english_pob_choice: sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - la casa de Israel
  lexicon: Leslau
  rationale: '''Hijos de Israel'' es la equivalencia directa y mantiene la fórmula bíblica reconocible sin desplazar el sentido colectivo.'
- source_word: ይሕመሙ
  english_pob_choice: they should afflict themselves
  chosen_spanish: se afligieran
  alternatives_spanish:
  - se humillaran
  - se mortificaran
  lexicon: Leslau
  rationale: El verbo puede abarcar aflicción ritual y humillación; 'se afligieran' conserva la conexión con ayuno/duelo sin explicitar más de lo que el texto dice.
- source_word: በዐሡረ፡ ወርኅ፡ ዘሰብዑ
  english_pob_choice: on the tenth of the seventh month
  chosen_spanish: el día diez del séptimo mes
  alternatives_spanish:
  - el diez del séptimo mes
  - el décimo día del séptimo mes
  lexicon: Leslau
  rationale: La fecha se expresa de manera natural en español y conserva la estructura calendárica del original.
- source_word: ዜናሁ
  english_pob_choice: the news about Joseph
  chosen_spanish: la noticia acerca de José
  alternatives_spanish:
  - la noticia de José
  - el informe acerca de José
  lexicon: Leslau
  rationale: '''Noticias acerca de'' refleja que el texto no especifica la muerte de José; mantiene la vaguedad auditada por la revisión.'
- source_word: ያዕቆብ አቡሁ
  english_pob_choice: Jacob his father
  chosen_spanish: Jacob su padre
  alternatives_spanish:
  - Jacob, su padre
  - a Jacob su padre
  lexicon: Leslau
  rationale: Se preserva la relación posesiva simple del original sin añadir puntuación interpretativa innecesaria.
- source_word: ያስተስርዩ
  english_pob_choice: they should make atonement
  chosen_spanish: hicieran expiación
  alternatives_spanish:
  - hicieran propiciación
  - se reconciliaran
  lexicon: Leslau
  rationale: '''Expiación'' es el término más preciso y sobrio para el rito; ''propiciación'' es posible, pero menos transparente para lectores generales.'
- source_word: ባቲ
  english_pob_choice: on it
  chosen_spanish: por sí mismos
  alternatives_spanish:
  - en ello
  - sobre ello
  lexicon: Leslau
  rationale: El pronombre del original remite al acto/observancia; en español, 'por sí mismos' hace explícito el valor reflexivo del rito sin perder el referente ritual.
- source_word: ጠሊ
  english_pob_choice: young goat
  chosen_spanish: cabrito
  alternatives_spanish:
  - chivito
  - cabra joven
  lexicon: Leslau
  rationale: '''Cabrito'' es el equivalente natural y bíblicamente adecuado para el animal sacrificial; conserva la especificidad de la ofrenda mejor que un genérico ''cabra''.'
- source_word: ኃጢአቶሙ
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus faltas
  - su pecado
  lexicon: Leslau
  rationale: '''Pecados'' transmite de forma directa la causalidad moral/ritual del pasaje.'
- source_word: ምሕረቶ ለአቡሆሙ
  english_pob_choice: the affection of their father
  chosen_spanish: el afecto de su padre
  alternatives_spanish:
  - el cariño de su padre
  - la compasión de su padre
  lexicon: Leslau
  rationale: La revisión auditada descartó 'compasión' por sonar menos natural; 'afecto' reproduce bien el vínculo emocional paterno del contexto de José.
theological_decisions:
- issue: Naturaleza de la observancia anual ligada al décimo día del séptimo mes
  english_pob_reading: The chapter links the annual self-affliction with Joseph's bloodied garment and Jacob's mourning, functioning as an etiology for the observance of the Day of Atonement (Yom Kippur).
  chosen_spanish_reading: El versículo presenta una institución anual de aflicción y expiación, conectada etiológicamente con el duelo de Jacob por José, sin nombrar explícitamente la fiesta posterior.
  alternative_spanish_readings:
  - una referencia directa al Día de la Expiación
  - una alusión litúrgica ya plenamente fijada
  rationale: El texto fuente y la auditoría inglesa no nombran la fiesta; la traducción debe conservar el enlace etiológico sin importar una identificación explícita que no aparece en el versículo.
  doctrine_reference: Etiología ritual; no especifica una institución posterior en el texto mismo.
translation_notes:
  revision_awareness: La versión española sigue la revisión auditada que eliminó la inferencia de 'había muerto' respecto de José, porque el texto sólo dice que la noticia acerca de José llegó a Jacob. También conserva 'afecto' en lugar de 'compasión' para reflejar mejor el vínculo paterno y evita importar una identificación explícita con el Día de la Expiación al cuerpo del versículo, dejándola en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma de proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Expiación'' se usa con sentido ritual; no se sustituye por ''reconciliación''.'
  - '''Afligieran'' conserva el matiz de aflicción ritual sin desarrollar elementos no presentes como ayuno, aunque el contexto los sugiera.'
