base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/034/011.yaml
  text: Shechem[11], and he found them in the land of Dothan. And they dealt treacherously with him and made a plan against him to kill him; but changing their minds, they sold him to Ishmaelite merchants, and they brought him down to Egypt and sold him to Potiphar, an officer of Pharaoh, the chief of the guards, priest of the city of Heliopolis.
  footnotes:
  - marker: '11'
    text: The title rendered 'chief of the cooks' is difficult and has been rendered differently by interpreters. The translation follows the immediate Ethiopic sense rather than the more familiar Genesis wording.
    reason: lexical_alternative
  - marker: a
    text: Or 'hated him'.
    reason: previous_rendering
  - marker: b
    text: Or 'the chief of the cooks'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:00Z'
    unchanged: false
    changes_summary: Changed 'dealt treacherously with him' to 'hated him' for better lexical accuracy with the source verb, while retaining the rest of the verse unchanged.
translation:
  language: es
  text: Siquem, y los halló en la tierra de Dotán. Y obraron traidoramente contra él[a] y tramaron matarlo; pero, cambiando de parecer, lo vendieron a mercaderes ismaelitas, y lo llevaron a Egipto y lo vendieron a Potifar, oficial de Faraón, jefe de la guardia, sacerdote de la ciudad de Heliópolis.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “lo odiaban”.
    reason: previous_rendering
lexical_decisions:
- source_word: ሐበየ
  english_pob_choice: dealt treacherously with him
  chosen_spanish: actuaron con traición contra él
  alternatives_spanish:
  - lo traicionaron
  - obraron traidoramente contra él
  - lo trataron con engaño
  lexicon: N/A
  rationale: El verbo ge'ez refleja conducta traicionera o engañosa, no simplemente odio. Por eso ‘actuaron con traición contra él’ preserva la fuerza relacional y evita reducirlo a un estado emocional.
- source_word: ምክረ ... ይቅ ትልዎ
  english_pob_choice: made a plan against him to kill him
  chosen_spanish: tramaron matarlo
  alternatives_spanish:
  - hicieron un plan para matarlo
  - conspiraron para matarlo
  - urdieron matarlo
  lexicon: N/A
  rationale: La frase expresa intención homicida y trama deliberada; ‘tramaron matarlo’ es natural en español y mantiene el carácter intencional del original.
- source_word: ተመይጦሙ
  english_pob_choice: changing their minds
  chosen_spanish: cambiando de parecer
  alternatives_spanish:
  - al cambiar de opinión
  - al volver atrás
  - cambiaron de parecer
  lexicon: N/A
  rationale: El giro verbal marca un cambio de decisión. ‘Cambiar de parecer’ comunica el matiz sin cargarlo de un sentido doctrinal ajeno.
- source_word: ሣጥዎ
  english_pob_choice: sold him
  chosen_spanish: lo vendieron
  alternatives_spanish:
  - lo comerciaron
  - lo entregaron por venta
  - lo enajenaron
  lexicon: N/A
  rationale: La venta es explícita en el texto y debe conservarse de manera directa.
- source_word: ሊቀ፡ ዐቀብት
  english_pob_choice: chief of the guards
  chosen_spanish: jefe de la guardia
  alternatives_spanish:
  - capitán de la guardia
  - jefe de los guardias
  - comandante de la guardia
  lexicon: N/A
  rationale: La revisión crítica corrigió la antigua lectura ‘chief of the cooks’; el ge'ez aquí designa ‘chief of the guards’. ‘Jefe de la guardia’ es claro y ajustado al dato fuente.
- source_word: ሐፀወ
  english_pob_choice: officer
  chosen_spanish: oficial
  alternatives_spanish:
  - funcionario
  - sirviente de corte
  - servidor
  lexicon: N/A
  rationale: ‘Oficial’ reproduce la función administrativa/cortesana sin introducir una lectura más específica de la que el texto garantiza.
- source_word: ለኢጥፋራ
  english_pob_choice: Potiphar
  chosen_spanish: Potifar
  alternatives_spanish:
  - Potífar
  - Potifar
  lexicon: N/A
  rationale: Se conserva el nombre propio en una forma española ampliamente reconocible y cercana a la tradición bíblica, sin alterar la identificación del personaje.
- source_word: ዘሀገረ፡ ኤሌው
  english_pob_choice: priest of the city of Heliopolis
  chosen_spanish: sacerdote de la ciudad de Heliópolis
  alternatives_spanish:
  - sacerdote de Heliópolis
  - sacerdote de la ciudad de On
  lexicon: N/A
  rationale: El ge'ez nombra Heliópolis; se mantiene el topónimo explícito del testimonio fuente. ‘Sacerdote de la ciudad de Heliópolis’ refleja el enlace locativo sin suplir lecturas externas.
theological_decisions:
- issue: La identidad del funcionario egipcio y el título cortesano
  english_pob_reading: officer of Pharaoh, the chief of the guards, priest of the city of Heliopolis
  chosen_spanish_reading: oficial de Faraón, jefe de la guardia, sacerdote de la ciudad de Heliópolis
  alternative_spanish_readings:
  - oficial de Faraón, capitán de la guardia, sacerdote de la ciudad de Heliópolis
  - funcionario de Faraón, jefe de la guardia, sacerdote de la ciudad de Heliópolis
  rationale: 'No hay aquí una tensión doctrinal, pero sí una decisión histórica-textual importante: el ge''ez de Jubileos no sigue la fórmula más conocida de Génesis 37:36 (‘jefe de los camareros/cocineros’). La traducción debe respetar el título específico atestiguado por la fuente sin armonizarlo artificialmente con la tradición más familiar.'
  doctrine_reference: N/A
- issue: La violencia moral de los hermanos de José
  english_pob_reading: they dealt treacherously with him
  chosen_spanish_reading: actuaron con traición contra él
  alternative_spanish_readings:
  - lo traicionaron
  - obraron traidoramente contra él
  rationale: La revisión crítica del texto rechazó ‘hated him’ y restauró el valor de traición/engaño. En español conviene conservar esa carga moral y narrativa, porque no se trata solo de un sentimiento interno sino de una acción culpable contra José.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una oscilación revisional importante: una lectura reciente propuso ‘hated him’, pero la revisión crítica posterior la corrigió como error y restableció ‘dealt treacherously with him’. También corrigió el título de Potifar de ‘chief of the cooks’ a ‘chief of the guards’ según el ge''ez. La versión española sigue la lectura más reciente y mejor fundamentada del control crítico, sin armonizarla con la redacción conocida de Génesis.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma del proyecto cuando aparezca un tetragrámaton; aquí no aparece.
  - ‘Faraón’ se mantiene con mayúscula como nombre/título propio en estilo bíblico español.
  - ‘Heliópolis’ se escribe con tilde según uso español estándar.
  - ‘jefe de la guardia’ refleja el valor literal del ge'ez y evita el calco incorrecto ‘jefe de los cocineros’.
