translation:
  language: es
  text: Robel y Tamnatares. Y volvió en paz e hizo las paces con ellos, y fueron suyos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y llegaron a ser suyos». El verbo final puede expresar pertenencia o una relación que llegó a establecerse.'
    reason: preservar alternativa aspectual/relacional documentada en el audit trail
lexical_decisions:
- source_word: ርቤአሃ / ወትምናታሬስሃ (names)
  english_pob_choice: Robel and Tamnatares
  chosen_spanish: Robel y Tamnatares
  alternatives_spanish:
  - Róbel y Tamnatares
  - Robel y Tamnatares
  lexicon: nombres propios
  rationale: Se conservan los nombres propios tal como aparecen en la tradición textual y en la POB inglesa, sin castellanizarlos más allá de la ortografía básica del español.
- source_word: ወተመይጠ፡ በሰላም፡
  english_pob_choice: And he returned in peace
  chosen_spanish: Y volvió en paz
  alternatives_spanish:
  - Y regresó en paz
  - Y volvió pacíficamente
  lexicon: retorno + paz
  rationale: El verbo ge'ez de retorno se rinde naturalmente como 'volvió'; 'en paz' conserva el complemento adverbial de estado/condición que acompaña al movimiento, sin añadir matices no presentes.
- source_word: ወገብረ፡ ... ሰላመ፡
  english_pob_choice: and made peace with them
  chosen_spanish: y hizo paz con ellos
  alternatives_spanish:
  - y pactó paz con ellos
  - y se reconcilió con ellos
  lexicon: hacer paz
  rationale: Se mantiene la construcción verbal concreta del texto, 'hizo paz', porque el ge'ez expresa una acción de establecer paz; 'se reconcilió' sería interpretativo y menos literal.
- source_word: ወኮንዎ፡
  english_pob_choice: and they became his
  chosen_spanish: y fueron suyos
  alternatives_spanish:
  - y llegaron a ser suyos
  - y se hicieron suyos
  lexicon: ser / llegar a ser + objeto pronominal
  rationale: La revisión inglesa final dejó 'and they were', pero el audit trail posterior señala que el sufijo objeto -wo sugiere relación posesiva o de pertenencia. En español, 'fueron suyos' conserva esa relación sin sobreespecificar el tipo de sujeción. Evita borrar la tensión textual entre una lectura copulativa y una posesiva/relacional.
theological_decisions:
- issue: Relación final expresada por ወኮንዎ (posible posesión/sujeción implícita)
  english_pob_reading: and they became his / and they were
  chosen_spanish_reading: y fueron suyos
  alternative_spanish_readings:
  - y fueron de él
  - y quedaron bajo su autoridad
  - y se hicieron suyos
  rationale: 'El expediente revisado muestra una disputa real: una lectura copulativa simple y una lectura con sufijo objeto que sugiere pertenencia o relación de dependencia. ''Fueron suyos'' preserva esa ambigüedad útil sin imponer un matiz doctrinal específico.'
  doctrine_reference: Lectura textual y semántica del verbo con sufijo objeto; no aplica una doctrina sistemática específica.
translation_notes:
  revision_awareness: El texto inglés de trabajo pasó de 'and they were' a 'and they became his' tras una revisión que señaló el sufijo objeto del ge'ez final. La traducción española adopta una solución que conserve esa relación posesiva/relacional y no neutralice la tensión textual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para el nombre divino en todo el proyecto, pero este versículo no lo contiene.
  - '''Robel'' y ''Tamnatares'' se dejan sin adaptación eufónica para respetar la forma onomástica del testimonio.'
  - '''Fueron suyos'' funciona aquí como equivalente sobrio que deja abierta la lectura de pertenencia, sujeción o alianza, según el contexto inmediato del versículo siguiente.'
