  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  - inhumaron
  lexicon: N/A
  rationale: '"Sepultar" es más digno y bíblico en español que "enterrar"; mantiene la acción funeraria formal del relato.'
- source_word: opposite Rachel's tomb
  english_pob_choice: opposite Rachel's tomb
