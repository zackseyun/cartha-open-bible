  lexicon: N/A
  rationale: El sentido es el de actos o episodios de duelo; en español, "lamentaciones" comunica bien el peso funerario sin sonar tan técnico como "duelos" ni tan arcaico como "lutos" en este contexto narrativo.
- source_word: Israel
