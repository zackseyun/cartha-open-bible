translation:
  language: es
  text: 'de la tierra de Canaán. Y se lo dijeron a Jacob, diciendo: «Mira, los reyes de los amorreos[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los reyes amorreos»; se conserva «de los amorreos» para mantener el matiz étnico del original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: እም / from
  english_pob_choice: from the land of Canaan
  chosen_spanish: de la tierra de Canaán
  alternatives_spanish:
  - desde la tierra de Canaán
  lexicon: from
  rationale: 'El contexto revisado descarta la lectura errónea «la tierra de Ham» y confirma un valor locativo-origen: «from the land of Canaan». En español, «de la tierra de Canaán» conserva con claridad el origen sin añadir matices no atestiguados.'
- source_word: ከናዓን / Canaan
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canán
  lexicon: Canaan
  rationale: «Canaán» es la forma española estándar y reconocible, fiel al topónimo bíblico.
- source_word: ወዜነዉዎ / and they told him
  english_pob_choice: And they told Jacob
  chosen_spanish: Y se lo dijeron a Jacob
  alternatives_spanish:
  - Y le dijeron a Jacob
  lexicon: tell
  rationale: «Se lo dijeron» refleja bien el objeto implícito del anuncio y mantiene un español natural. «Le dijeron» también sería posible, pero «se lo dijeron» hace más explícita la transferencia de información.
- source_word: ለያዕቆብ / to Jacob
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - a Jacob,
  - 'a Jacob:'
  lexicon: proper name
  rationale: Se mantiene el destinatario explícito del relato sin alterar la sintaxis española.
- source_word: ከመ፡' ናሁ / saying, Behold
  english_pob_choice: saying, “Behold
  chosen_spanish: 'diciendo: «Mira'
  alternatives_spanish:
  - 'diciendo: «He aquí'
  - 'diciendo: «Miren'
  lexicon: behold
  rationale: «Mira» reproduce el valor de llamada de atención de «Behold» en un registro natural. «He aquí» sería más literal, pero menos idiomático en español moderno.
- source_word: ነገሥተ፡ አሞሬዎን / the kings of the Amorites
  english_pob_choice: the kings of the Amorites
  chosen_spanish: los reyes de los amorreos
  alternatives_spanish:
  - los reyes amorreos
  - los reyes de Amorreos
  lexicon: Amorites
  rationale: Se conserva la referencia étnica/territorial con el plural común «amorreos». La minúscula es la convención española para gentilicios y etnónimos.
theological_decisions:
- issue: Corrección de una lectura textual errónea en la traducción inglesa previa
  english_pob_reading: the land of Ham, in the land of Canaan
  chosen_spanish_reading: de la tierra de Canaán
  alternative_spanish_readings:
  - de la tierra de Ham, en la tierra de Canaán
  rationale: El informe de revisión identifica que la forma ge'ez corresponde a «from the land of Canaan» y que la lectura «Ham» proviene de una confusión por un error tipográfico. La traducción española sigue la lectura corregida y no preserva una variante descartada por el control textual.
  doctrine_reference: Crítica textual / control de fuente
translation_notes:
  revision_awareness: 'La revisión más reciente confirma que no hay cambios adicionales; sin embargo, el control textual marcó una corrección importante: la frase debe leerse como «from the land of Canaan», no como «the land of Ham, in the land of Canaan». La versión española sigue esa lectura revisada.'
  spanish_consistency_notes:
  - Se usa «Canaán» y «amorreos» de manera consistente con la terminología bíblica en español.
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este fragmento.
  - La puntuación de cita y discurso directo sigue un estilo español moderno y legible.
