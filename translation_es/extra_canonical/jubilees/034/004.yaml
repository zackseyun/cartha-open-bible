    reason: textual_variant
lexical_decisions:
- source_word: ወብንያም፡ ውእቱ፡ ዘይኄእስ፡
  english_pob_choice: And Benjamin was the youngest
  chosen_spanish: Y Benjamín era el menor
  alternatives_spanish:
  - Y Benjamín era el más joven
  - Y Benjamín era el menor de todos
  lexicon: Benjamín / menor
  rationale: El ge'ez indica que Benjamín es el más joven/menor; «el menor» es natural en español bíblico y conserva la relación de edad sin añadir una comparación explícita no necesaria.
- source_word: በእግዚአ፡ ነበረ፡ ኀበ፡ አቡሁ።
  english_pob_choice: for this reason he remained with his father
  chosen_spanish: por eso permaneció con su padre
  alternatives_spanish:
  - por esa razón se quedó con su padre
  - por esto se quedó con su padre
  lexicon: permanecer / quedarse
  rationale: La cláusula causal conecta la juventud de Benjamín con su permanencia junto a su padre; «permaneció» refleja bien la estabilidad del estado, mientras que «con su padre» sigue de cerca el ge'ez.
- source_word: መጽኡ፡ ነገሥተ፡ ...
  english_pob_choice: And there came the kings of Taphu, and the kings of Ares, and the kings of Seragan, and the kings of Selo, and the kings of Gaas, and the king of Bethoron, and the king of Maanisakir
  chosen_spanish: Y vinieron los reyes de Tafu, y los reyes de Ares, y los reyes de Seragán, y los reyes de Selo, y los reyes de Gaas, y el rey de Betorón, y el rey de Maanisáker
  alternatives_spanish:
  - Y llegaron los reyes de Tafu, y los reyes de Ares, y los reyes de Seragán, y los reyes de Selo, y los reyes de Gaas, y el rey de Betorón, y el rey de Maanisáker
  lexicon: place/royal names
  rationale: El audit trail inglés preserva los nombres con transliteración conservadora; en español se mantiene esa misma estrategia, adaptando solo la acentuación ortográfica necesaria para la lectura.
- source_word: ወኵሎሙ፡ እለ፡ ይነብሩ፡
  english_pob_choice: and all those who dwell
  chosen_spanish: y todos los que habitan
  alternatives_spanish:
  - y todos los que moran
  - y todos los que viven
  lexicon: dwell
  rationale: «Habitan» conserva el valor durativo y local de 'dwell' sin forzar un giro arcaico; es claro y fiel al contexto de asentamiento en un monte.
- source_word: ውስተዝ፡ ደብር፡
  english_pob_choice: this mountain
  chosen_spanish: este monte
  alternatives_spanish:
  - esta montaña
  - este monte
  lexicon: mountain
  rationale: «Monte» es una opción bíblica y geográfica apropiada en español, y mantiene el registro del texto original mejor que «montaña» en este contexto.
