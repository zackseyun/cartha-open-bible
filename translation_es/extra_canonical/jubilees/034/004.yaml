  text: Y Benjamín era el menor[a], y por eso permaneció con su padre. Y vinieron los reyes de Tafu, y los reyes de Ares, y los reyes de Seragán, y los reyes de Selo, y los reyes de Gaas, y el rey de Betorón, y el rey de Maanisáker, y todos los que habitan en este monte, y los que habitan en
  philosophy: optimal-equivalence
