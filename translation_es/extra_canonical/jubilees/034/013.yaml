translation:
  language: es
  text: 'Y lloró toda aquella noche, porque al atardecer se lo habían traído, y se puso febril por el dolor a causa de su muerte, y dijo: «Un animal salvaje ha devorado a José». Y toda la gente de su casa guardó duelo con él aquel día, y estuvo afligida y en duelo con él todo aquel día.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mourned
  english_pob_choice: mourned
  chosen_spanish: hizo duelo
  alternatives_spanish:
  - lloró
  - se lamentó
  - guardó luto
  lexicon: n/a
  rationale: El inglés POB repite la idea de duelo/lamento. En español, «hizo duelo» comunica el luto de forma clara y solemne sin sobrecargar el verso con tecnicismos fúnebres.
- source_word: became fevered with grief
  english_pob_choice: became fevered with grief
  chosen_spanish: quedó con fiebre por su dolor
  alternatives_spanish:
  - ardió de dolor
  - fue febril de dolor
  - se llenó de fiebre por la pena
  lexicon: n/a
  rationale: Se conserva la imagen física de fiebre asociada al dolor, evitando una paráfrasis psicológica que debilite la fuerza del original.
- source_word: a wild beast
  english_pob_choice: A wild beast
  chosen_spanish: Un animal salvaje
  alternatives_spanish:
  - una fiera
  - una bestia salvaje
  lexicon: n/a
  rationale: «Animal salvaje» es natural en español y mantiene el sentido general del hebreo/inglés sin introducir un matiz más literario o arcaico que no esté exigido.
- source_word: all the people of his house
  english_pob_choice: all the people of his house
  chosen_spanish: toda la gente de su casa
  alternatives_spanish:
  - toda la casa
  - todos los de su casa
  lexicon: n/a
  rationale: La frase conserva el alcance colectivo del hogar/comunidad doméstica sin convertirla en una fórmula idiomática demasiado rígida.
- source_word: grieving and mourning
  english_pob_choice: grieving and mourning
  chosen_spanish: afligida y en duelo
  alternatives_spanish:
  - dolida y lamentándose
  - triste y llorando
  lexicon: n/a
  rationale: 'Se distinguen dos matices próximos: aflicción interior y duelo visible. Así se evita repetir mecánicamente el mismo verbo.'
theological_decisions:
- issue: Relato de duelo y sufrimiento familiar
  english_pob_reading: The text presents a household grief narrative without doctrinal framing.
  chosen_spanish_reading: El texto presenta un relato de duelo doméstico sin marco doctrinal añadido.
  alternative_spanish_readings:
