base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/034/001.yaml
  text: And in the sixth year of this week, of this forty-fourth jubilee, Jacob sent his sons to pasture their sheep, and their servants also with them, in the pasture of Shechem.
  footnotes:
  - marker: a
    text: Or 'his servants'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:58Z'
    unchanged: false
    changes_summary: Changed 'week of years' to 'week' for a more direct rendering of the source, and 'pastures' to singular 'pasture' to match the source wording. Kept the rest unchanged.
translation:
  language: es
  text: Y en el sexto año de esta semana, de este cuadragésimo cuarto jubileo, Jacob envió a sus hijos a apacentar sus ovejas, y también a sus esclavos[a] con ellos, en el pastizal de Siquem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: «sus siervos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወበሳድስ፡ ዓመት፡ ለዝ፡ ሱባዔ፡
  english_pob_choice: in the sixth year of this week
  chosen_spanish: en el sexto año de esta semana
  alternatives_spanish:
  - en el sexto año de esta semana de años
  - en el sexto año del período
  lexicon: Jubileos 34:1
  rationale: El Ge'ez usa literalmente 'año' y 'semana'; la revisión inglesa quitó 'of years' para acercarse más al original. En español, 'esta semana' conserva el término técnico de Jubileos sin añadir 'de años', que no está explícito en la forma revisada del texto base.
- source_word: እምዝንቱ፡ ዘአርብዓ፡ ወረባዕቱ፡' እዮቤልው፡
  english_pob_choice: of this forty-fourth jubilee
  chosen_spanish: de este cuadragésimo cuarto jubileo
  alternatives_spanish:
  - de este cuarenta y cuatro jubileo
  - de este jubileo cuadragésimo cuarto
  lexicon: Jubileos 34:1
  rationale: '''Jubileo'' se mantiene como término técnico; el ordinal compuesto ''cuadragésimo cuarto'' es la forma más natural y fiel en español formal.'
- source_word: ፈነዎሙ፡ ያዕቆብ፡ ለውሉዱ፡
  english_pob_choice: Jacob sent his sons
  chosen_spanish: Jacob envió a sus hijos
  alternatives_spanish:
  - Jacob mandó a sus hijos
  - Jacob envió a sus hijos
  lexicon: Jubileos 34:1
  rationale: '''Envió'' corresponde bien al verbo de despacho/mandato del original y al audit trail inglés; ''hijos'' traduce literalmente ''sons''.'
- source_word: ይርዐዩ፡ አባግዒሆሙ፡
  english_pob_choice: to pasture their sheep
  chosen_spanish: a apacentar sus ovejas
  alternatives_spanish:
  - a pastorear sus ovejas
  - a apacentar sus ovejas
  lexicon: Jubileos 34:1
  rationale: '''Apacentar'' conserva el matiz pastoril y es idiomático en español bíblico contemporáneo; ''ovejas'' explicita el referente de ''their sheep''.'
- source_word: ወአግብርቲሆሙኒ፡
  english_pob_choice: and their servants also with them
  chosen_spanish: y también a sus esclavos con ellos
  alternatives_spanish:
  - y también a sus siervos con ellos
  - y también a sus esclavos con ellos
  lexicon: Jubileos 34:1
  rationale: El audit trail corrige a 'their servants', y el término de proyecto para δοῦλος es 'esclavo' cuando se quiere conservar la fuerza lexical. 'Servidores/siervos' suavizaría una relación social más fuerte que el texto permite.
- source_word: ውስተ፡ ጸአተ፡ ሴቄም
  english_pob_choice: in the pasture of Shechem
  chosen_spanish: en el pastizal de Siquem
  alternatives_spanish:
  - en el pasto de Siquem
  - en el pastizal de Siquem
  lexicon: Jubileos 34:1
  rationale: La revisión inglesa dejó singular 'pasture'; 'pastizal' comunica mejor en español el lugar de pastoreo que un simple 'pasto'. 'Siquem' sigue la forma castellana estable del topónimo.
theological_decisions:
- issue: Relación social expresada por 'their servants'
  english_pob_reading: their servants also with them
  chosen_spanish_reading: sus esclavos con ellos
  alternative_spanish_readings:
  - sus siervos con ellos
  - sus servidores con ellos
  rationale: 'No hay una cuestión doctrinal compleja, pero sí una decisión socio-lexical importante: el texto distingue a los hijos de Jacob de los dependientes que los acompañan. ''Esclavos'' preserva la fuerza del término sin domesticarla a ''siervos''.'
  doctrine_reference: Lexical force in translation; no doctrinal locus specific
- issue: Término técnico de Jubileos para la unidad temporal
  english_pob_reading: this week
  chosen_spanish_reading: esta semana
  alternative_spanish_readings:
  - esta semana de años
  - este período
  rationale: En Jubileos, 'week' funciona como unidad cronológica técnica. Mantener 'semana' permite al lector ver el patrón del libro sin introducir una glosa interpretativa en el texto principal.
  doctrine_reference: Literary structure of Jubilees
translation_notes:
  revision_awareness: La redacción inglesa más reciente corrigió 'week of years' a 'week' y 'pastures' a singular 'pasture'; también se corrigió 'his servants' a 'their servants'. La versión española refleja esas revisiones y mantiene el singular en el lugar de pastoreo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - '''Jubileo'' y ''semana'' se usan como términos técnicos del libro, sin expandir innecesariamente.'
  - Se conservó 'esclavos' para reflejar la fuerza social del término, con nota alternativa por la lectura suavizada.
  - Se prefirió 'Siquem' como topónimo establecido en español bíblico.
