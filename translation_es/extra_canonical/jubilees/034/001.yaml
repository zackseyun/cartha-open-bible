review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del ge''ez y el audit trail inglés: ''en el sexto año de esta semana'', ''de este cuadragésimo cuarto jubileo'', ''Jacob envió a sus hijos'', singular ''pastizal/pastura de Siquem'', y refleja correctamente la corrección clave ''their servants'' frente a ''his servants''. Sin embargo, la traducción española introduce un desajuste léxico importante al convertir ''servants'' en ''esclavos'', una fuerza semántica no documentada por la evidencia fuente ni por el POB inglés para este pasaje.'
  spanish_quality_summary: El español es claro y digno, pero 'también a sus esclavos con ellos' suena algo forzado sintácticamente y además sobretraduce el término. 'Y también sus siervos con ellos' o 'y también sus servidores con ellos' fluye mejor; en registro bíblico amplio, 'siervos' es la mejor opción aquí. 'Pastizal' es posible, pero 'pastura' encaja mejor con el tono bíblico y con 'pasture' singular sin sonar rural-regional.
  glossary_alignment: No hay términos de glosario mayor en juego salvo la política sobre δοῦλος -> 'esclavo', pero aquí no estamos traduciendo griego δοῦλος ni hay una decisión inglesa documentada que exija esa fuerza. Por tanto, aplicar 'esclavos' por default de proyecto es inapropiado. 'Siquem' está bien. 'Jubileo' y 'semana' están bien preservados.
  issues:
  - severity: high
    issue: '''servants'' se tradujo como ''esclavos'''
    rationale: 'La fuente ge''ez y el audit trail inglés solo apoyan ''their servants''. No hay justificación documental en este registro para intensificar a ''esclavos''. La nota ''Or: sus siervos'' invierte indebidamente la prioridad léxica.'
  - severity: medium
    issue: La nota al pie presenta la mejor opción como alternativa
    rationale: Si el texto principal se corrige a 'siervos', ya no hace falta nota. Si se mantuviera una alternativa, tendría que reflejar una ambigüedad real de fuente, que aquí no está documentada.
  - severity: low
    issue: '''pastizal'' puede sonar menos bíblico/literario que ''pastura'''
    rationale: No es un error, pero 'pastura de Siquem' transmite mejor el registro del pasaje y sigue el singular del original/POB.
  revised_spanish_text: Y en el sexto año de esta semana, de este cuadragésimo cuarto jubileo, Jacob envió a sus hijos a apacentar sus ovejas, y también sus siervos con ellos, en la pastura de Siquem.
  revision_rationale: Se corrige 'esclavos' a 'siervos' porque la evidencia fuente y el POB inglés solo sostienen 'servants', no una intensificación a 'slaves/esclavos'. Se elimina la nota porque deja de haber una alternativa necesaria. También se ajusta 'pastizal' a 'pastura' para un registro más natural y bíblico en español, manteniendo el singular del original.
