base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/034/002.yaml
  text: And the seven kings of the Amorites gathered against them to kill them secretly.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:58Z'
    unchanged: false
    changes_summary: Removed the reflexive 'themselves' for more natural English and revised 'hiding themselves' to 'secretly' to more clearly convey the adverbial sense of acting in concealment.
translation:
  language: es
  text: Y los siete reyes de los amorreos se reunieron contra ellos para matarlos en secreto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወተጋብኡ
  english_pob_choice: gathered against them
  chosen_spanish: se reunieron contra ellos
  alternatives_spanish:
  - se juntaron contra ellos
  - se congregaron contra ellos
  lexicon: reunirse
  rationale: El ge'ez expresa una reunión o congregación dirigida contra un objetivo; 'se reunieron contra ellos' conserva el valor colectivo y hostil sin añadir reflexividad innecesaria.
- source_word: ሱባዔቲሆሙ
  english_pob_choice: the seven kings
  chosen_spanish: los siete reyes
  alternatives_spanish:
  - los siete reyes
  - los siete monarcas
  lexicon: siete / reyes
  rationale: La secuencia numeral-sustantivo se conserva de forma directa y natural; 'reyes' es el equivalente claro y fiel a 'kings'.
- source_word: ነገሥተ፡ አሞሬዎን
  english_pob_choice: of the Amorites
  chosen_spanish: de los amorreos
  alternatives_spanish:
  - de los amorreos
  - de los amorritas
  lexicon: amorreos
  rationale: '''Amorreos'' es la forma española más estable y legible para el etnónimo bíblico, manteniendo la referencia étnica del original.'
- source_word: ይቅትልዎሙ
  english_pob_choice: to kill them
  chosen_spanish: para matarlos
  alternatives_spanish:
  - para darles muerte
  - para asesinarlos
  lexicon: matar
  rationale: El verbo básico 'matar' transmite con precisión la intención homicida del texto sin añadir matices ajenos.
- source_word: ኀብኢኦሙ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - a escondidas
  - ocultamente
  lexicon: en secreto
  rationale: El adverbio ge'ez indica ocultamiento en la acción; 'en secreto' reproduce bien el sentido adverbial que la revisión inglesa aclaró con 'secretly'.
theological_decisions:
- issue: La forma de expresar la acción encubierta
  english_pob_reading: to kill them secretly
  chosen_spanish_reading: para matarlos en secreto
  alternative_spanish_readings:
  - para matarlos a escondidas
  - para asesinarlos ocultamente
  rationale: La revisión inglesa abandonó una construcción demasiado literal ('hiding themselves') para expresar el adverbio de ocultamiento; en español, 'en secreto' conserva esa lectura sin forzar una imagen reflexiva.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el reflexivo 'themselves' y reexpresó el cierre como adverbio de ocultamiento ('secretly'); la versión española sigue esa decisión, evitando una traducción que sugiera que los reyes 'se escondían' como elemento principal.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio.
  - No se introduce terminología eclesiástica ajena al texto.
  - La sintaxis sigue el orden natural del español, conservando al mismo tiempo la estructura informativa del original.
