    unchanged: false
    changes_summary: Added the opening clause from the source text about their sin grieving their father's compassion because of Joseph his son; retained the rest with minor consistency adjustment.
translation:
  language: es
  text: Su pecado consistió en que habían entristecido a su padre, por la compasión que tenía por José, su hijo. Y este día fue ordenado para que se entristecieran en ese día por sus pecados, y por todas sus transgresiones, y por todos sus errores, para purificarse en este día una vez cada año.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኃጢአቶሙ
  english_pob_choice: Their sin
  chosen_spanish: Su pecado
  alternatives_spanish:
  - Su culpa
  - Su falta
  lexicon: sin
  rationale: El ge'ez abre con el sustantivo de pecado en singular colectivo; el POB inglés lo vierte en singular posesivo, y en español «su pecado» conserva esa referencia sin añadir pluralización innecesaria.
- source_word: አኅዘኑ
  english_pob_choice: they had brought grief
  chosen_spanish: habían causado tristeza
  alternatives_spanish:
  - habían entristecido
  - habían causado dolor
  lexicon: grief / cause grief
  rationale: La acción es causar pena o tristeza a otro; «habían causado tristeza» preserva la relación verbal sin forzar una construcción más idiomática pero menos transparente.
- source_word: ምሕረተ፡ አቡሆሙ
  english_pob_choice: the compassion of their father
  chosen_spanish: la compasión de su padre
  alternatives_spanish:
  - la misericordia de su padre
  - la ternura de su padre
  lexicon: compassion / mercy
  rationale: El sustantivo puede abarcar compasión o misericordia; se eligió «compasión» porque refleja mejor la emoción afectiva herida por el acto de los hijos y sigue de cerca la lectura inglesa.
- source_word: ዮሴፍ፡ ወልዱ
  english_pob_choice: Joseph his son
  chosen_spanish: José, su hijo
  alternatives_spanish:
  - José, el hijo de él
  - José, su hijo varón
  lexicon: Joseph his son
  rationale: 'Se mantiene la aposición explicativa del original: José es identificado como «su hijo», sin reinterpretar la relación familiar.'
- source_word: ወተሠርዐት፡ ዛቲ፡ ዕለት
  english_pob_choice: And this day was ordained
  chosen_spanish: Y este día fue ordenado
  alternatives_spanish:
  - Y este día fue instituido
  - Y este día fue establecido
  lexicon: ordain / appoint
  rationale: «Ordenado» conserva la idea de una disposición establecida por autoridad; es la opción más cercana al inglés POB y adecuada al tono del texto.
- source_word: ይሕዝኑ
  english_pob_choice: they should grieve
  chosen_spanish: se entristecieran
  alternatives_spanish:
  - se afligieran
  - lloraran
  lexicon: grieve
  rationale: El verbo expresa aflicción o tristeza ritual; «se entristecieran» mantiene el valor afectivo sin añadir un matiz más intenso que no exige el contexto.
- source_word: ኃጢአቶሙ ... ኵሉ አበሳሆሙ ... ኵሉ
  english_pob_choice: for their sins, and for all their transgressions, and for all their errors
  chosen_spanish: por sus pecados, y por todas sus transgresiones, y por todos sus errores
  alternatives_spanish:
  - por sus pecados, y por todas sus rebeliones, y por todos sus desvíos
  - por sus pecados, y por todas sus faltas, y por todos sus yerros
  lexicon: sins / transgressions / errors
  rationale: Se conserva la tríada semántica del original y de la versión inglesa sin colapsarla en un solo término; «errores» refleja el tercer término con un matiz menos jurídico que «transgresiones».
- source_word: ወበእንተ፡ ... ይፀርዑ/ይንጹ
  english_pob_choice: so as to cleanse themselves
  chosen_spanish: para purificarse
  alternatives_spanish:
  - para limpiarse
  - para quedar limpios
  lexicon: cleanse
  rationale: «Purificarse» mantiene el sentido ritual del propósito del día, evitando una lectura meramente higiénica.
- source_word: በዚህ ዕለት አንድ ጊዜ በየዓመቱ
  english_pob_choice: on this day once each year
  chosen_spanish: en este día una vez cada año
  alternatives_spanish:
  - una vez al año en este día
  - una vez cada año en este día
  lexicon: once each year
  rationale: Se respeta la secuencia temporal del original y la cadencia de la frase inglesa, manteniendo el valor anual del rito.
theological_decisions:
- issue: El día instituido tiene finalidad de aflicción ritual y purificación anual
  english_pob_reading: And this day was ordained so that they should grieve on it ... so as to cleanse themselves on this day once each year.
  chosen_spanish_reading: Y este día fue ordenado para que se entristecieran en él ... para purificarse en este día una vez cada año.
  alternative_spanish_readings:
  - Y este día fue instituido para que se afligieran en él ...
  - Y este día fue establecido para que lloraran en él ...
  rationale: 'La formulación conserva la finalidad doble del día: duelo por el pecado y purificación anual. No se suaviza ni se intensifica el carácter penitencial del texto.'
  doctrine_reference: Ritual penitence and annual purification in Jubilees 34:19
translation_notes:
  revision_awareness: La versión española incorpora la cláusula inicial restaurada en la última revisión inglesa ('Their sin was that they had brought grief to the compassion of their father because of Joseph his son') y mantiene el resto del período con el sentido anual de purificación. No se detectan variantes textuales adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «José» como nombre propio uniforme.
  - Se conserva la tríada «pecados / transgresiones / errores» para reflejar la progresión semántica del original.
  - «Purificarse» se usa en sentido ritual, no médico ni moral abstracto.
  - La sintaxis conserva una sola oración larga, acorde con el estilo de la fuente y de la versión inglesa auditada.
