revisions:
- from: Su pecado consistió en que habían causado tristeza a la compasión de su padre a causa de José, su hijo. Y este día fue ordenado para que se entristecieran en él por sus pecados, y por todas sus transgresiones, y por todos sus errores, para purificarse en este día una vez cada año.
  to: Su pecado consistió en que habían entristecido a su padre, por la compasión que tenía por José, su hijo. Y este día fue ordenado para que se entristecieran en ese día por sus pecados, y por todas sus transgresiones, y por todos sus errores, para purificarse en este día una vez cada año.
  rationale: Se ajustó la primera cláusula para expresar de manera natural y fiel en español la idea de que ellos afligieron a su padre en relación con su compasión por José, evitando la construcción opaca «tristeza a la compasión». También se suavizó la rigidez de «en él» a «en ese día» para mejor legibilidad, manteniendo el sentido ritual y temporal del original.
