base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/034/020.yaml
  text: And after Joseph was taken away, the sons of Jacob took wives. The name of Reuben’s wife was Ada, and the name of Simeon’s wife was Adiba, a Canaanite; and the name of Levi’s wife was Melka, from the daughters of Aram, from the seed of the sons of Terah; and the name of Judah’s wife was Bethasu’el, a Canaanite; and the name of Issachar’s wife was Hezaqa; and the name of Zebulun’s wife was Ni’aman; and the name of Dan’s wife was Egla; and the name of Naphtali’s wife was Rasu’a, from Mesopotamia; and the name of Gad’s wife was Maka; and the name of Asher’s wife was Ijona; and the name of Joseph’s wife was Asenath, an Egyptian; and the name of Benjamin’s wife was Iyasaka.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:32Z'
    unchanged: false
    changes_summary: Changed 'the Egyptian' to 'an Egyptian' for more natural English while preserving the sense of the source.
translation:
  language: es
  text: Y después de que José fue llevado, los hijos de Jacob tomaron esposas. El nombre de la esposa de Rubén fue Ada, y el nombre de la esposa de Simeón fue Adiba, una cananea; y el nombre de la esposa de Leví fue Melca, de las hijas de Aram, de la descendencia de los hijos de Tará; y el nombre de la esposa de Judá fue Betasu’el, una cananea; y el nombre de la esposa de Isacar fue Hezaqa; y el nombre de la esposa de Zabulón fue Ni’aman; y el nombre de la esposa de Dan fue Egla; y el nombre de la esposa de Neftalí fue Rasu’a, de Mesopotamia; y el nombre de la esposa de Gad fue Maka; y el nombre de la esposa de Aser fue Ijona; y el nombre de la esposa de José fue Asenat, una egipcia; y el nombre de la esposa de Benjamín fue Iyasaka.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ተሐጕለ፡ ዮሴፍ፡
  english_pob_choice: after Joseph was taken away
  chosen_spanish: después de que José fue apartado
  alternatives_spanish:
  - después de que José fue llevado
  - tras ser separado José
  lexicon: JUB-34-20
  rationale: El ge’ez indica que José fue removido/retirado; el inglés POB opta por 'taken away'. 'Apartado' conserva la idea de separación sin implicar necesariamente captura o muerte.
- source_word: ነሥኡ፡
  english_pob_choice: took wives
  chosen_spanish: tomaron esposas
  alternatives_spanish:
  - tomaron mujeres
  - se casaron
  lexicon: JUB-34-20
  rationale: El verbo expresa la acción de tomar esposa; 'esposas' es más preciso y menos ambiguo que 'mujeres' en español, sin suavizar el matiz narrativo.
- source_word: ከነናዊት፤
  english_pob_choice: a Canaanite
  chosen_spanish: una cananea
  alternatives_spanish:
  - cananea
  - una mujer cananea
  lexicon: JUB-34-20
  rationale: Se conserva el etnónimo en forma adjetival femenina para corresponder al texto y mantener el patrón del versículo.
- source_word: እምዘርአ፡ ውሉደ፡ ታራን፤
  english_pob_choice: from the seed of the sons of Terah
  chosen_spanish: de la descendencia de los hijos de Tará
  alternatives_spanish:
  - de la simiente de los hijos de Tará
  - de la semilla de los hijos de Tará
  lexicon: JUB-34-20
  rationale: '''Seed'' aquí funciona como linaje o descendencia; ''descendencia'' evita una literalidad extraña en español y conserva el valor genealógico.'
- source_word: እንተ፡ ሜስጶጦምያ፡
  english_pob_choice: from Mesopotamia
  chosen_spanish: de Mesopotamia
  alternatives_spanish:
  - procedente de Mesopotamia
  - desde Mesopotamia
  lexicon: JUB-34-20
  rationale: El complemento de procedencia se transmite directamente con la preposición 'de', la forma más natural y fiel en español.
- source_word: ግብጻዊት፤
  english_pob_choice: an Egyptian
  chosen_spanish: una egipcia
  alternatives_spanish:
  - la egipcia
  - una mujer egipcia
  lexicon: JUB-34-20
  rationale: Sigue la revisión inglesa que corrigió la indefinición a 'an Egyptian'. En español, 'una egipcia' expresa la pertenencia étnica de forma natural y fiel.
theological_decisions:
- issue: Tratamiento del linaje y las designaciones étnicas en un pasaje genealógico
  english_pob_reading: The verse lists wives by name and by ethnic/geographic origin without additional theological comment.
  chosen_spanish_reading: Se mantiene el registro genealógico descriptivo, sin ampliar ni reinterpretar las marcas de origen.
  alternative_spanish_readings:
  - adoptar paráfrasis explicativas sobre integración o alianzas
  - omitir los gentilicios
  rationale: El texto presenta una lista histórica y nominal; añadir interpretación alteraría el carácter documental. Conservar los gentilicios respeta la evidencia del original y del POB inglés.
  doctrine_reference: Narrative genealogy; no doctrinal elaboration warranted
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'the Egyptian' a 'an Egyptian' para reflejar mejor la indefinición del original; la redacción española adopta esa misma distinción con 'una egipcia'. No hay otros cambios de revisión que exijan anotación textual.
  spanish_consistency_notes:
  - Se mantuvo 'Yosef/José' como José en toda la frase.
  - Se conservaron los nombres propios con formas españolas estándar o transliteradas cuando el POB inglés no fijó una adaptación tradicional.
  - Se usó 'esposas' de manera uniforme para preservar la estructura repetitiva del listado.
  - '''Tará'' se emplea como forma española del nombre Terah en coherencia con el uso bíblico en español, sin introducir equivalencias no atestiguadas.'
