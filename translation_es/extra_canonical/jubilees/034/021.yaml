base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/034/021.yaml
  text: The wife of Benjamin was Iyasaka. And Simeon regretted it and took a second wife from Mesopotamia[21], like his brothers.
  footnotes:
  - marker: '21'
    text: The verb for Simeon may mean 'repented,' 'changed his mind,' or more generally 'turned'; the sense is that he took another wife from Mesopotamia like his brothers.
    reason: alternative_reading
  - marker: a
    text: Or 'And Simeon regretted it'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:30Z'
    unchanged: false
    changes_summary: Changed 'repented' to 'regretted it' for more natural English and to better reflect the sense in context; retained the rest of the wording.
translation:
  language: es
  text: La esposa de Benjamín fue Iasaca. Y Simeón lo lamentó[a] y tomó una segunda esposa de Mesopotamia, como sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo puede entenderse como 'lo lamentó', 'se arrepintió', 'cambió de parecer' o, más ampliamente, 'se volvió'; el sentido en contexto es que tomó otra esposa de Mesopotamia, como sus hermanos.
    reason: alternative_reading
lexical_decisions:
- source_word: ለብእሲተ፡ ብንያም፡ ኢያስካ፡
  english_pob_choice: The wife of Benjamin was Iyasaka.
  chosen_spanish: La esposa de Benjamín fue Iasaca.
  alternatives_spanish:
  - La mujer de Benjamín fue Iasaca.
  - La esposa de Benjamín era Iasaca.
  lexicon: wife
  rationale: El ge'ez introduce una cláusula nominal independiente con el nombre de la esposa de Benjamín; 'esposa' es el equivalente más claro y digno en español, y conserva el valor identificatorio del nombre propio.
- source_word: ወተመይጠ፡
  english_pob_choice: And Simeon regretted it
  chosen_spanish: Y Simeón lo lamentó
  alternatives_spanish:
  - Y Simeón se arrepintió
  - Y Simeón cambió de parecer
  - Y Simeón se volvió
  lexicon: regret / repent / turn
  rationale: El verbo admite una gama semántica que la nota inglesa también preserva. En español, 'lo lamentó' refleja bien el matiz de pesar sin fijar innecesariamente una lectura moral o penitencial que el contexto no obliga a tomar como única.
- source_word: ካልእተ፡ ከመ፡ አኅዊሁ።
  english_pob_choice: took a second wife ... like his brothers
  chosen_spanish: tomó una segunda esposa ... como sus hermanos
  alternatives_spanish:
  - tomó otra esposa ... como sus hermanos
  - tomó una esposa adicional ... como sus hermanos
  lexicon: took a second wife
  rationale: '''Segunda esposa'' mantiene la fuerza de ''second wife'' sin suavizarla a una formulación más vaga; ''como sus hermanos'' conserva la comparación explícita del texto, que señala una práctica compartida.'
- source_word: ሜስጶ ጦምያ፡
  english_pob_choice: Mesopotamia
  chosen_spanish: Mesopotamia
  alternatives_spanish:
  - Mesopotamia
  - de Mesopotamia
  lexicon: Mesopotamia
  rationale: El topónimo ya está asentado en español y corresponde directamente al referente geográfico del texto. Se mantiene sin adaptar para evitar perder la identificación histórica.
theological_decisions:
- issue: 'Alcance de ወተመይጠ፡: arrepentimiento moral o simple pesar'
  english_pob_reading: The verb for Simeon may mean 'repented,' 'changed his mind,' or more generally 'turned'; the sense is that he took another wife from Mesopotamia like his brothers.
  chosen_spanish_reading: Simeón lo lamentó
  alternative_spanish_readings:
  - Simeón se arrepintió
  - Simeón cambió de parecer
  - Simeón se volvió
  rationale: 'La evidencia auditada reconoce una tensión léxica real y no la resuelve de forma absoluta. ''Lo lamentó'' permite conservar esa ambigüedad: expresa pesar y deja abierta la posibilidad de una decisión interna sin convertirla en una afirmación doctrinal sobre arrepentimiento religioso.'
  doctrine_reference: No aplica; decisión léxica-contextual sobre un verbo ambiguo.
- issue: Cláusula comparativa 'como sus hermanos' y su implicación narrativa
  english_pob_reading: '... took a second wife from Mesopotamia, like his brothers.'
  chosen_spanish_reading: '... tomó una segunda esposa de Mesopotamia, como sus hermanos.'
  alternative_spanish_readings:
  - '... tomó otra esposa de Mesopotamia, como sus hermanos.'
  - '... tomó una segunda esposa de Mesopotamia, al igual que sus hermanos.'
  rationale: Se conserva la comparación narrativa sin añadir interpretación. El texto no explica aquí la motivación; solo indica conformidad con la conducta de sus hermanos.
  doctrine_reference: No aplica; observación narrativa.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió una omisión importante: el nombre de la esposa de Benjamín (Iyasaka) pertenece al texto base y debe aparecer en español. También se revisó la nota sobre el verbo de Simeón, que en inglés pasó de ''repented'' a ''regretted it''; la traducción española mantiene la ambigüedad reconocida por la auditoría.'
  spanish_consistency_notes:
  - Usar 'Benjamín' e 'Iasaca' de forma consistente con los nombres propios ya establecidos en español, sin añadir artículos innecesarios.
  - Mantener 'Mesopotamia' como topónimo fijo; no glosarlo en el texto principal.
  - Conservar 'segunda esposa' para reflejar la relación comparativa explícita del original.
  - No elevar 'lo lamentó' a una formulación más teológica que el contexto no obliga a adoptar.
