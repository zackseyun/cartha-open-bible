    rationale: El texto dice 'Y Simeón [a]lo lamentó[b]', lo que rompe la lectura normal del español y no ancla limpiamente la nota al verbo ambiguo. El marcador debe ir sobre la expresión verbal pertinente, p. ej. 'lo lamentó[a]'.
  - severity: medium
    issue: La segunda nota añade interpretación no necesaria
    rationale: La nota b ('Es decir, tomó otra esposa...') no refleja una alternativa textual preservada por la auditoría, sino una explicación editorial. La evidencia inglesa solo documenta la ambigüedad del verbo y una nota de versión previa; no hace falta una nota adicional aquí.
  - severity: low
