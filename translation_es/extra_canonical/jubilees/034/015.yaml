translation:
  language: es
  text: Y en aquel día Bilhá oyó que José había perecido, y, mientras lloraba por él, murió en Qafratef[15], y su hija Dina también murió después de que José hubiera perecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '15'
    text: El nombre de lugar 'Qafratef' es incierto en su vocalización y puede reflejar un topónimo corrupto en la transmisión etiópica.
    reason: textual_variant
lexical_decisions:
- source_word: Bilhah
  english_pob_choice: Bilhah
  chosen_spanish: Bilhá
  alternatives_spanish:
  - Bilha
  lexicon: nombre propio
  rationale: Se adapta el nombre propio a la grafía española habitual con acento agudo final para indicar la sílaba tónica y conservar legibilidad en español.
- source_word: perished
  english_pob_choice: perished
  chosen_spanish: había perecido / hubiera perecido
  alternatives_spanish:
  - había muerto
  - falleció
  lexicon: verb of death
  rationale: '''Perecer'' conserva la fuerza de pérdida o muerte tal como la mantiene la POB en inglés, sin suavizarla a un simple ''morir'' en todos los casos. Se ajusta el tiempo verbal para reflejar la secuencia narrativa.'
- source_word: Qafratef
  english_pob_choice: Qafratef
  chosen_spanish: Qafratef
  alternatives_spanish:
  - Cafratef
  - Qafrátéf
  lexicon: toponym
  rationale: Se conserva el topónimo transliterado porque la nota inglesa lo presenta como incierto/corrupto en la tradición etiópica; no hay base para normalizarlo al español. El marcador [15] se coloca junto al nombre del lugar, según la revisión más reciente.
- source_word: mourning
  english_pob_choice: mourning
  chosen_spanish: lloraba por él
  alternatives_spanish:
  - estaba de duelo por él
  - lo estaba lamentando
  lexicon: expression of grief
  rationale: '''Lloraba por él'' comunica el duelo de manera natural en español y preserva el sentido de lamento personal. No se fuerza un término más técnico como ''duelo'' si el contexto narrativo puede expresarse con claridad.'
- source_word: Dinah his daughter
  english_pob_choice: Dinah his daughter
  chosen_spanish: su hija Dina
  alternatives_spanish:
  - Dina, su hija
  - su hija Diná
  lexicon: proper name plus relation
  rationale: Se conserva la relación filial explícita y se adapta el nombre propio a la forma española más común, Dina.
theological_decisions:
- issue: Expresión de la muerte de José
  english_pob_reading: Joseph had perished
  chosen_spanish_reading: José había perecido
  alternative_spanish_readings:
  - José había muerto
  - José había fallecido
  rationale: Se mantiene el matiz fuerte de 'perished' sin añadir interpretación doctrinal. La versión española conserva la gravedad narrativa sin convertir el verbo en un eufemismo.
  doctrine_reference: Ninguna; decisión léxica-narrativa
- issue: Relación entre el lamento de Bilhá y su muerte
  english_pob_reading: while she was mourning for him she died
  chosen_spanish_reading: mientras lloraba por él murió
  alternative_spanish_readings:
  - mientras estaba de duelo por él murió
  - mientras lo lloraba murió
  rationale: La secuencia causal/narrativa se mantiene sin explicitar más de lo que el texto dice. No se introduce una causa médica o providencial adicional.
  doctrine_reference: Ninguna; lectura narrativa
translation_notes:
  revision_awareness: La nota de aparato indica que el marcador [15] debía moverse para seguir inmediatamente a 'Qafratef'; la redacción española coloca el marcador en ese lugar y evita asociarlo con 'perecido'. No hay otros cambios sustantivos respecto del estado más reciente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene la transliteración de Qafratef por tratarse de un topónimo incierto en la tradición textual.
  - Se usa 'perecido' para reproducir la fuerza del inglés POB 'perished'.
  - Los nombres propios se adaptan a grafía española cuando ello mejora la lectura sin alterar la identificación del referente.
