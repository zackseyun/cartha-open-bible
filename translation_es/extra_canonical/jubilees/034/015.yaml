  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios 'José' y 'Dina' están bien; 'Bilhá' es defendible como adaptación gráfica española, aunque 'Bilha' también sería posible. El topónimo 'Qafratef[15]' conserva adecuadamente la transliteración incierta documentada. No hay términos teológicos sensibles en este versículo.
