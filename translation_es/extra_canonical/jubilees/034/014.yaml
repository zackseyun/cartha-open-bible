translation:
  language: es
  text: Y sus hijos y sus hijas se levantaron para consolarlo, pero él no quiso ser consolado por causa de su hijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sons and daughters
  english_pob_choice: his sons and his daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos e hijas
  - sus hijos y sus hijas
  lexicon: hijos / hijas
  rationale: Conservo la distinción explícita del plural masculino y femenino que está presente en el inglés POB y en el original, en un español natural y publicable.
- source_word: rose up
  english_pob_choice: rose up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: levantarse
  rationale: ‘Se levantaron’ comunica de forma natural la acción de ponerse en pie para actuar o acercarse a consolar, sin introducir un matiz más fuerte que el de la fuente.
- source_word: to comfort him
  english_pob_choice: to comfort him
  chosen_spanish: para consolarlo
  alternatives_spanish:
  - para darle consuelo
  - para aliviarlo
  lexicon: consolar
  rationale: ‘Consolar’ es el equivalente directo y adecuado para el verbo de la fuente, con un registro claro y dignificado.
- source_word: he would not be comforted
  english_pob_choice: he would not be comforted
  chosen_spanish: él no quiso ser consolado
  alternatives_spanish:
  - no pudo ser consolado
  - no aceptó consuelo
  lexicon: consolar / consuelo
  rationale: Mantengo la fuerza volitiva del inglés POB (‘would not’) con ‘no quiso’, y el pasivo de resultado con ‘ser consolado’, sin suavizar la resistencia emocional del sujeto.
- source_word: for his son
  english_pob_choice: for his son
  chosen_spanish: por su hijo
  alternatives_spanish:
  - a causa de su hijo
  - por el hijo
  lexicon: hijo
  rationale: ‘Por su hijo’ reproduce de modo natural la razón del duelo indicada en la frase inglesa, sin ampliar el contexto.
theological_decisions:
- issue: La negativa persistente al consuelo en el duelo
  english_pob_reading: he would not be comforted for his son
  chosen_spanish_reading: él no quiso ser consolado por su hijo
  alternative_spanish_readings:
  - no aceptó consuelo por su hijo
  - rehusó ser consolado por su hijo
  rationale: 'La redacción conserva la tensión emocional del texto: no solo hubo tristeza, sino una negativa persistente a recibir consuelo. ‘No quiso’ preserva ese matiz sin volverlo interpretativo.'
  doctrine_reference: Antropología bíblica y lamento/duelo en la narrativa patriarcal
translation_notes:
  revision_awareness: La fuente griega/ge’ez en el paquete es vacía en el expediente; la propuesta sigue el texto inglés auditado, que además fue confirmado sin cambios por la revisión más reciente y por la concordancia alta del control cruzado.
  spanish_consistency_notes:
  - Uso ‘Yahvé’ no aplica aquí porque el versículo no contiene el nombre divino.
  - Mantengo un español sobrio y directo, sin arcaísmos innecesarios.
  - ‘Consolar’/‘consuelo’ se conserva de manera consistente para el campo léxico del pasaje.
