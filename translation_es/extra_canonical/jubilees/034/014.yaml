  revised_spanish_text: Y sus hijos y sus hijas se levantaron para consolarlo, pero él no quiso ser consolado por causa de su hijo.
  revision_rationale: Se ajusta únicamente la frase final para expresar con claridad el valor causal de «for his son» en español natural, manteniendo la fuerza volitiva de «would not be comforted» con «no quiso ser consolado».
