    rationale: El inglés auditado dice 'to seize their cattle', con fuerza de apoderamiento. En español, 'tomar' puede sonar neutral, y 'ganados' como plural es poco idiomático aquí. 'Apoderarse de su ganado' conserva mejor el sentido y suena natural.
  - severity: low
    issue: Pronombre explícito 'ellos' innecesario
    rationale: En 'y ellos no podían dejarlo', el sujeto ya está claro por el contexto. Omitirlo mejora la fluidez sin pérdida de sentido.
