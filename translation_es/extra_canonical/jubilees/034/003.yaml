translation:
  language: es
  text: debajo de los árboles, y para apoderarse de su ganado. Pero Jacob, Leví, Judá y José estaban en la casa con Isaac su padre, porque su espíritu estaba afligido y no podían dejarlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ታሕተ፡ አም፡
  english_pob_choice: under the trees
  chosen_spanish: debajo de los árboles
  alternatives_spanish:
  - bajo los árboles
  - entre los árboles
  lexicon: Topographical phrase
  rationale: La expresión ge'ez señala ubicación bajo árboles; “debajo de los árboles” mantiene el sentido directo y es natural en español. “Bajo” también es posible, pero “debajo” conserva mejor la imagen espacial.
- source_word: ወከመ፡ ይማህርኩ፡ እንስሳሆሙ።
  english_pob_choice: and to seize their cattle
  chosen_spanish: y para tomar sus ganados
  alternatives_spanish:
  - y para apoderarse de su ganado
  - y para arrebatar sus animales
  lexicon: Action against livestock
  rationale: El verbo indica capturar o llevarse por la fuerza el ganado; “tomar sus ganados” sigue de cerca el valor del inglés POB y evita introducir una especificación más fuerte que el texto no exige. “Ganado” puede funcionar como colectivo en español, aunque el plural mantiene la referencia del original.
- source_word: ወመንፈሱ፡
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su aliento
  - su ánimo
  lexicon: רוּחַ / πνεῦμα equivalent
  rationale: Se conserva “espíritu” para reflejar la dimensión interior del término y la elección del inglés POB. “Ánimo” suaviza demasiado la fuerza espiritual; “aliento” no encaja bien aquí.
- source_word: ኖንዝና፡ መንፈሱ፡
  english_pob_choice: his spirit was grieved
  chosen_spanish: su espíritu estaba afligido
  alternatives_spanish:
  - su espíritu estaba entristecido
  - su espíritu estaba apenado
  lexicon: Emotional state of spirit
  rationale: La revisión del inglés POB pasó de “sorrowful” a “grieved”, y “afligido” reproduce con mayor formalidad ese matiz de pesar o aflicción sin volverlo excesivamente interpretativo.
- source_word: ወስእኑ፡ ኀዲጎተ፡
  english_pob_choice: they could not leave him
  chosen_spanish: no podían dejarlo
  alternatives_spanish:
  - no podían abandonarlo
  - no pudieron apartarse de él
  lexicon: Departure/refusal to leave
  rationale: El ge'ez indica incapacidad de irse/separarse de él; “dejarlo” comunica bien esa imposibilidad en español. “Abandonarlo” añade una carga moral no explícita en el contexto.
theological_decisions:
- issue: El sentido de “espíritu” aplicado a Isaac
  english_pob_reading: because his spirit was grieved
  chosen_spanish_reading: porque su espíritu estaba afligido
  alternative_spanish_readings:
  - porque estaba triste
  - porque su ánimo estaba afligido
  rationale: Se mantiene la referencia al ‘espíritu’ como sede interior, sin convertirla en una mera emoción pasajera. Esto preserva la continuidad conceptual con el texto fuente y con la lectura auditada del inglés POB.
  doctrine_reference: Anthropology / inner life language
- issue: Relación causal entre la aflicción de Isaac y la permanencia de sus hijos
  english_pob_reading: and they could not leave him
  chosen_spanish_reading: y ellos no podían dejarlo
  alternative_spanish_readings:
  - y no pudieron abandonarlo
  - y no podían separarse de él
  rationale: 'La formulación conserva la dependencia causal del original: permanecen con Isaac porque su estado interior requiere su cercanía. “Dejarlo” es suficientemente literal y natural sin añadir dramatización.'
  doctrine_reference: Narrative causation and familial duty
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó 'sorrowful' por 'grieved' para hacer más natural y formal la expresión sobre el espíritu; la traducción española refleja esa revisión con 'afligido' y no necesita nota textual adicional porque no cambia el contenido referencial.
  spanish_consistency_notes:
  - Se usa “espíritu” en minúscula porque refiere al estado interior de Isaac, no al Espíritu Santo.
  - Se mantiene la enumeración de nombres propios sin artículos, conforme al español bíblico natural.
  - “Ganados” conserva el plural del inglés POB y la imagen de bienes ganaderos del pasaje.
  - No se introduce 'Mesías', 'Cristo' ni terminología doctrinal ajena al versículo.
