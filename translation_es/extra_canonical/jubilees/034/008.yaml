  text: and Selo and Amanisker and Gagaas. And he recovered his built[8], and prevailed over them, and imposed tribute on them, so that they gave him tribute, a fifth of the produce of their land. And he built
  footnotes:
  - marker: '8'
    text: The two built places are textually uncertain in form; 'Robel' and 'Tamnatares' are provisional transliterations from the Ethiopic.
    reason: textual_variant
  - marker: a
    text: Or 'possessions[8]'.
    reason: previous_rendering
  revision_pass:
