    unchanged: false
    changes_summary: Updated the name Amanisakir to Amanisker to better reflect the source, and changed 'flocks' to 'possessions' for a broader and more accurate sense of the term.
translation:
  language: es
  text: y Selo, y Amanisker, y Gagaas. Y recobró sus posesiones[a], y prevaleció sobre ellos, y les impuso tributo, de modo que le dieron tributo, una quinta parte del producto de su tierra. Y edificó[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus bienes». La tradición auditada en inglés ha oscilado entre una lectura posesiva amplia y una dificultad textual en esta zona; por eso «posesiones» se mantiene aquí como opción principal sin excluir la incertidumbre.'
    reason: lexical_alternative
  - marker: b
    text: La nota textual del inglés POB sobre los dos lugares «construidos» pertenece a esta cláusula final; el marcador se coloca aquí porque los nombres de esos lugares siguen en el texto inmediato.
    reason: textual_variant
