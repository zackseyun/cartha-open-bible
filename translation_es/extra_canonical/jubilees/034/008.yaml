  alternatives_spanish:
  - y Selo, y Amanisker, y Gagaas
  - y Selo y Amanisker y Gagaas
  lexicon: nombre propio
  rationale: Se conservan los nombres propios en transliteración, ajustando la grafía de Amanisker para reflejar la revisión auditada del inglés POB y mantener cercanía al ge’ez sin latinizar innecesariamente.
- source_word: ወአስተጋብአ፡ መራዕይሁ፡
  english_pob_choice: And he recovered his built[8],
  chosen_spanish: Y recobró sus posesiones[a],
  alternatives_spanish:
  - Y recobró sus bienes[a]
  - Y recobró lo que poseía[a]
  lexicon: sustantivo de posesión
  rationale: El contexto revisado del inglés POB indica que el sentido más amplio y exacto es 'possessions', no 'flocks'. En español, 'posesiones' conserva ese alcance patrimonial sin especificar indebidamente el tipo de propiedad.
- source_word: ወአስተጋብአ፡ መራዕይሁ፡
  english_pob_choice: And he recovered his built[8],
  chosen_spanish: Y recobró sus posesiones[a],
  alternatives_spanish:
  - Y recobró sus bienes[a]
  - Y recobró su propiedad[a]
  lexicon: sustantivo de posesión
  rationale: La lectura inglesa auditada presenta una tensión textual entre la cláusula y la nota crítica sobre lugares 'built'. En español se sigue la revisión principal del sentido posesivo; la nota conserva la alternativa textual en el punto correspondiente.
- source_word: ወሠርዐ፡ ፀባሕተ፡ ላዕሌሆሙ፡
  english_pob_choice: and imposed tribute on them,
  chosen_spanish: e impuso tributo sobre ellos,
  alternatives_spanish:
  - e impuso tributo sobre ellos
  - y les impuso tributo
  lexicon: tributo
  rationale: '''Tributo'' reproduce con fidelidad la relación de sujeción fiscal del original y del inglés POB, manteniendo un registro claro y bíblico en español.'
- source_word: ከመ፡ የሀብዎ፡ ጸባሕተ፡ ኀምስተ፡ ፍሬ፡ ምድርሙ፡
  english_pob_choice: so that they gave him tribute, a fifth of the produce of their land.
  chosen_spanish: de modo que le dieron tributo, una quinta parte del producto de su tierra.
  alternatives_spanish:
  - de modo que le dieron tributo, la quinta parte del producto de su tierra
  - para que le dieran tributo, una quinta parte del producto de su tierra
  lexicon: fracción / producto agrícola
  rationale: '''Una quinta parte'' corresponde de manera natural a ''a fifth''. ''Producto de su tierra'' mantiene el sentido agrícola y económico del ge’ez y del inglés POB sin ampliar innecesariamente a un concepto más técnico.'
- source_word: ወሐነጸ፡
  english_pob_choice: And he built
  chosen_spanish: Y edificó[b]
  alternatives_spanish:
  - Y construyó[b]
  - Y levantó[b]
  lexicon: verbo de construcción
  rationale: '''Edificó'' es la forma más sobria y bíblica para el acto de construir en este contexto. El marcador se coloca aquí porque la nota textual del inglés POB sobre lugares construidos se relaciona con esta cláusula final.'
theological_decisions:
- issue: Tratamiento de nombres propios no bíblicos/culturales en transliteración
  english_pob_reading: and Selo and Amanisker and Gagaas.
  chosen_spanish_reading: y Selo, y Amanisker, y Gagaas.
  alternative_spanish_readings:
  - y Selo y Amanisker y Gagaas
  rationale: No hay carga doctrinal; la decisión es filológica. Se preserva la forma propia sin adaptar a equivalentes españoles inexistentes, evitando borrar el carácter onomástico del texto.
  doctrine_reference: No aplica
- issue: Tensión textual entre 'possessions' en la revisión principal y la nota crítica sobre 'built'
  english_pob_reading: And he recovered his possessions[8] ... And he built
  chosen_spanish_reading: Y recobró sus posesiones[a] ... Y edificó[b]
  alternative_spanish_readings:
  - Y recobró sus bienes[a] ... Y edificó[b]
  rationale: Se sigue la revisión principal del sentido patrimonial ('possessions'), pero se mantiene la nota textual separada en el verbo final para no mezclar dos problemas distintos. Esto conserva la tensión auditada sin forzar una armonización artificial.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB que cambió 'flocks' por 'possessions' y 'Amanisakir' por 'Amanisker'. También se atendió la corrección posterior del control cruzado que movió la nota textual desde 'possessions' a la cláusula final 'And he built', porque la incertidumbre afecta a los lugares construidos que siguen en el verso. La redacción española refleja ambas decisiones sin fusionarlas.
  spanish_consistency_notes:
  - Se mantiene 'Amanisker' conforme a la revisión auditada.
  - Se usa 'posesiones' para el sentido amplio de propiedad, evitando 'rebaños'.
  - Se conserva la partícula 'Y' al inicio de cláusulas para reflejar la cadencia narrativa del original.
  - Los nombres propios se transliteran sin hispanización adicional.
  - El marcador [a] se asocia a la alternativa léxica y [b] a la variante textual, respetando su ubicación semántica.
