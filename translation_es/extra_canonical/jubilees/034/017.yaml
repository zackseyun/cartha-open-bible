  spanish_consistency_notes:
  - Se mantiene el nombre «José» para el personaje bíblico, conforme al uso español estándar.
  - Se conserva un registro sobrio y bíblico, sin introducir glosas interpretativas no respaldadas por el texto.
  - La cita directa se ha puntuado con comillas españolas y verbo introductorio simple para reflejar el discurso citado.
