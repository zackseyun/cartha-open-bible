translation:
  language: es
  text: 'Y guardó luto por José durante un año y no cesó, porque dijo: «Descenderé a la sepultura de luto por mi hijo».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: mourned
  english_pob_choice: mourned
  chosen_spanish: lloró... lamentándome
  alternatives_spanish:
  - estuvo de duelo
  - guardó luto
  - se lamentó
  lexicon: ל־ ק / אנן (luto, lamento); Spanish no marcada para duelo continuo
  rationale: El inglés POB conserva la idea de duelo prolongado; en español, "lloró" junto con "lamentándome" comunica el luto continuo sin forzar una sola palabra que suene artificial. Se evita reducirlo a un simple "estuvo triste".
- source_word: one year
  english_pob_choice: one year
  chosen_spanish: durante un año
  alternatives_spanish:
  - por un año
  - un año entero
  lexicon: זמן / שנה
  rationale: '"Durante un año" expresa duración completa y suena natural en español, manteniendo el valor temporal exacto.'
- source_word: did not cease
  english_pob_choice: did not cease
  chosen_spanish: no cesó
  alternatives_spanish:
  - no dejó de hacerlo
  - no se detuvo
  lexicon: חדל / פסק
  rationale: '"No cesó" reproduce bien la continuidad negativa del original y del inglés auditado, con registro bíblico claro pero no arcaizante.'
- source_word: grave
  english_pob_choice: grave
  chosen_spanish: sepultura
  alternatives_spanish:
  - tumba
  - sepulcro
  - fosa
  lexicon: קֶבֶר / τάφος
  rationale: '"Sepultura" mantiene un tono bíblico y funerario, y en español es un equivalente natural y reverente para la referencia al lugar de los muertos.'
- source_word: mourning for my son
  english_pob_choice: mourning for my son
  chosen_spanish: lamentándome por mi hijo
  alternatives_spanish:
  - de duelo por mi hijo
  - llorando por mi hijo
  - en luto por mi hijo
  lexicon: אבל + relación filial
  rationale: La forma progresiva "lamentándome" conserva la acción continua implícita en el dicho citado. Se mantiene "mi hijo" para preservar la afectividad y la relación directa del discurso.
theological_decisions:
- issue: Continuidad del duelo como expresión narrativa de dolor filial
  english_pob_reading: And he mourned for Joseph one year and did not cease
  chosen_spanish_reading: Y lloró por José durante un año y no cesó
  alternative_spanish_readings:
  - Y guardó luto por José durante un año y no cesó
  - Y estuvo de duelo por José durante un año y no cesó
  rationale: La formulación española preserva el énfasis narrativo en un duelo prolongado y persistente, sin suavizarlo ni convertirlo en una mera emoción momentánea.
  doctrine_reference: Gn 37:34–35; lamento y duelo en contexto familiar
