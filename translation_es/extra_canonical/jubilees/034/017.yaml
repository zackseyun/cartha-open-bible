review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del inglés POB: duelo prolongado por José durante un año, sin cesar, y la cita sobre descender a la sepultura por su hijo. Sin embargo, hay una leve pérdida de precisión aspectual y de registro en «lloró ... lamentándome», y la nota sobre «sepultura» era defendible pero no necesaria.'
  spanish_quality_summary: El español es claro y digno, pero «lloró por José» suena algo más puntual que «mourned», y «lamentándome por mi hijo» es menos idiomático en esta cita que «de luto por mi hijo». Se reemplaza «lloró» por «guardó luto» y «lamentándome por mi hijo» por «de luto por mi hijo». Se elimina la nota innecesaria.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «José», «hijo» y el registro general son adecuados. «Guardó luto» preserva mejor el campo semántico de duelo continuado.
  issues:
  - severity: medium
    issue: «lloró por José» debilita el matiz de duelo prolongado de «mourned».
    rationale: «Mourned» apunta más a guardar luto que a un acto de llorar; el contexto «un año y no cesó» pide formulación durativa.
  - severity: medium
    issue: «lamentándome por mi hijo» suena menos natural en español bíblico actual.
    rationale: En cita directa resulta algo forzado; «de luto por mi hijo» expresa mejor el estado continuo.
  - severity: low
    issue: La nota al pie sobre «sepultura» no era necesaria.
    rationale: No documenta una alternativa obligatoria ni crea ambigüedad nueva.
