lexical_decisions:
- source_word: ሰላሞሙ
  english_pob_choice: welfare
  chosen_spanish: bienestar
  alternatives_spanish:
  - salud
  - paz
  - estado
  lexicon: salud/paz/bienestar
  rationale: El etíope expresa el estado o bienestar general de los hermanos; "bienestar" conserva ese sentido amplio sin reducirlo solo a "salud" ni volverlo excesivamente interpretativo. En español es natural en un informe de noticia o consulta.
- source_word: ፈነወ፡ ዮሴፍሃ
  english_pob_choice: he sent Joseph
  chosen_spanish: envió José
  alternatives_spanish:
  - envió a José
  - mandó a José
  lexicon: enviar/mandar
  rationale: El verbo básico de envío se conserva de forma directa. Se omite el objeto explícito "a" por estilo español fluido, pero el sentido es inequívoco; la forma con "a José" queda como alternativa implícita.
- source_word: ውስተ፡ ምድረ፡
  english_pob_choice: in the land of
  chosen_spanish: en la tierra de
  alternatives_spanish:
  - en el país de
  - en la región de
  lexicon: land/tierra
  rationale: La revisión inglesa indica que el ge'ez está en estado constructo y debe quedar incompleto como "of". En español, "tierra de" conserva mejor esa apertura y la construcción posesiva incompleta que "en la tierra"; además suena bíblico sin ser arcaizante.
- source_word: ወረዱ፡ ... ግብጽ
  english_pob_choice: went down into Egypt
  chosen_spanish: descendieron a Egipto
  alternatives_spanish:
  - bajaron a Egipto
  - fueron a Egipto
  lexicon: descender/bajar
  rationale: El movimiento hacia Egipto se expresa con el verbo tradicional de descenso, que refleja tanto el sentido geográfico como el bíblico. "Descendieron" mantiene la imagen sin sonar forzado en español.
theological_decisions:
- issue: Tratamiento del nombre divino en este versículo
  english_pob_reading: No divine-name term appears in the provided line.
  chosen_spanish_reading: No se introduce ningún término divino en el texto español.
  alternative_spanish_readings:
  - No aplica
  rationale: La línea proporcionada no contiene referencia explícita a יהוה, κύριος, Dios ni títulos afines. Por fidelidad al texto, no se añade terminología teológica ajena.
  doctrine_reference: Fidelidad textual y economía exegética
- issue: Frase final incompleta por el estado constructo de 'land of'
  english_pob_reading: The English POB was revised to keep 'in the land of' incomplete, reflecting the Ge'ez construct state and an apparent verse-segmentation gap.
  chosen_spanish_reading: Se conserva la incompletitud con 'en la tierra de'.
  alternative_spanish_readings:
  - en la tierra
  - en la tierra de la
  rationale: 'El español debe reflejar la misma tensión textual que el audit trail documenta: no cerrar artificialmente la frase. "En la tierra de" deja visible que falta el complemento, evitando una normalización que oculte el problema de segmentación.'
  doctrine_reference: Crítica textual / integridad del testimonio manuscrito
translation_notes:
  revision_awareness: La versión inglesa más reciente solo añadió el punto final; después, otra revisión académica observó que la secuencia final debe permanecer como 'in the land of' para respetar el estado constructo del ge'ez y la probable omisión del complemento final. La traducción española sigue esa última observación y conserva la frase abierta.
  spanish_consistency_notes:
  - Se usa 'José' para el nombre propio y 'Egipto' con mayúscula por convención española.
  - Se prefirió 'tierra' a 'país' para mantener el registro bíblico y la apertura sintáctica de la frase final.
  - No se completó el complemento final con un lugar supuesto, a fin de no resolver el problema textual sin base en el fuente.
