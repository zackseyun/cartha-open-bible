translation:
  language: es
  text: «Han rodeado a tus hijos, y sus rebaños han sido capturados». Entonces se levantó de su casa, él y sus tres hijos, y todos los esclavos de su padre, y los esclavos de su casa, y salió contra ellos con seis mil hombres.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ዐገትዎሙ
  english_pob_choice: have surrounded
  chosen_spanish: han rodeado
  alternatives_spanish:
  - han cercado
  - han sitiado
  lexicon: sentido verbal de rodear/cercar
  rationale: «Han rodeado» comunica el cerco alrededor de los hijos sin añadir la connotación militar fuerte de «sitiado», que podría ser excesiva para el contexto inmediato.
- source_word: ውሉድከ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos
  lexicon: hijos / descendencia
  rationale: El término se vierte naturalmente como «hijos» en español; el contexto ya distingue que se trata de los hijos del destinatario.
- source_word: መራዕዮሙ
  english_pob_choice: their flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - su ganado
  - sus animales
  lexicon: rebaño / ganado
  rationale: «Rebaños» mantiene la lectura pastoral básica y evita cerrar el sentido solo a ovejas o cabras; el audit trail inglés preserva esta amplitud con la nota alternativa a cattle en otros estados del texto.
- source_word: ተማህጠኑ
  english_pob_choice: have been seized
  chosen_spanish: han sido tomados
  alternatives_spanish:
  - han sido apresados
  - han sido arrebatados
  lexicon: tomar / apoderarse de
  rationale: En español, «han sido tomados» conserva la pasiva de resultado del texto fuente sin decidir de más sobre el modo exacto de captura; «han sido arrebatados» sería más interpretativo.
- source_word: ደቂ አቡሁ
  english_pob_choice: all his father’s servants
  chosen_spanish: todos los esclavos de su padre
  alternatives_spanish:
  - todos los siervos de su padre
  - todos los servidores de su padre
  lexicon: δοῦλος -> esclavo
  rationale: El contexto de la POB favorece una traducción de fuerza léxica. «Esclavos» refleja mejor la relación de dependencia que «siervos», que suaviza el término.
- source_word: ደቂ ቤቱ
  english_pob_choice: the servants of his house
  chosen_spanish: los esclavos de su casa
  alternatives_spanish:
  - los siervos de su casa
  - los servidores de su casa
  lexicon: δοῦλος / casa
  rationale: Se mantiene la distinción documental entre los esclavos de su padre y los esclavos de su propia casa, como indica la revisión del texto inglés.
- source_word: በስሳ
  english_pob_choice: with six thousand men
  chosen_spanish: con seis mil hombres
  alternatives_spanish:
  - con 6.000 hombres
  - con seis millares de hombres
  lexicon: numeral cardinal
  rationale: La revisión crítica corrige la lectura a seis mil; en español, «seis mil hombres» es la forma más clara y fiel, sin introducir elementos inexistentes como «ganado».
theological_decisions:
- issue: Distinción entre los esclavos de su padre y los de su casa
  english_pob_reading: and all his father’s servants, and the servants of his house
  chosen_spanish_reading: todos los esclavos de su padre, y los esclavos de su casa
  alternative_spanish_readings:
  - todos los siervos de su padre, y los siervos de su casa
  - todos los esclavos de su padre, y los servidores de su casa
  rationale: La revisión textual separa dos grupos distintos. Mantener ambos en español evita perder una distinción social/organizativa explícita en el fuente.
  doctrine_reference: fidelidad textual y precisión referencial
- issue: Lectura de la cantidad militar
  english_pob_reading: with six thousand men
  chosen_spanish_reading: con seis mil hombres
  alternative_spanish_readings:
  - con seis mil
  - con seis mil guerreros
  rationale: La corrección rechaza la lectura errónea «con ganado» y restituye el dato numérico atestiguado por el Ge'ez y la revisión crítica.
  doctrine_reference: crítica textual y control de errores de transmisión
translation_notes:
  revision_awareness: 'La redacción española incorpora la corrección crítica principal del audit trail: donde una revisión automática había deslizado «ganado», el texto fuente y la revisión posterior exigen «seis mil hombres». También conserva la distinción entre los esclavos/servidores de su padre y los de su casa, evitando conflarlos en una sola expresión.'
  spanish_consistency_notes:
  - Se mantiene «esclavos» de manera consistente para el valor léxico fuerte de dūlus/δούλος en la tradición POB, con la alternativa «siervos» solo en notas.
  - «Han rodeado» y «han sido tomados» conservan un registro bíblico claro sin forzar una imagen militar más específica que la fuente.
  - «Seis mil hombres» se formula explícitamente para evitar ambigüedad numérica.
  - Se usa «sus rebaños» como equivalente natural de la referencia pastoral de la fuente sin añadir concretizaciones zoológicas.
