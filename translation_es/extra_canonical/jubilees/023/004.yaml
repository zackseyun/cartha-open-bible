base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/004.yaml
  text: And he rose from his bosom and ran and told Rebekah his mother. And Rebekah went by night to Isaac and told him, and they went together, and Jacob also with them, and a torch was in his hand; and when they had gone, they found Abraham lying dead.
  footnotes:
  - marker: a
    text: Or 'from his bed'.
    reason: previous_rendering
  - marker: b
    text: Or 'torches were in their hands'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:32Z'
    unchanged: false
    changes_summary: Changed 'from his bosom' to 'from his bed' for more natural and likely accurate sense of the Ge'ez; changed singular 'a torch was in his hand' to plural 'torches were in their hands' to better reflect the plural wording; otherwise retained the structure and formal register.
translation:
  language: es
  text: Y él se levantó del regazo[a] de Abraham y corrió, y se lo contó a Rebeca su madre. Y Rebeca fue de noche a Isaac y se lo contó, y ellos fueron juntos, y Jacob también con ellos, y llevaba una antorcha en la mano[b]; y cuando llegaron, hallaron a Abraham tendido muerto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pecho». «Regazo» conserva el sentido literal de 'bosom' y mantiene la conexión con la escena previa; «lecho» no refleja bien el término ge'ez.
    reason: lexical_alternative
  - marker: b
    text: 'El ge''ez usa singular: «una antorcha» y «en su mano». No se adopta la lectura plural porque no está respaldada por el texto fuente.'
    reason: textual_variant
lexical_decisions:
- source_word: ወተንሥአ፡ እምሕፅኑ፡
  english_pob_choice: rose from his bosom
  chosen_spanish: se levantó de su regazo
  alternatives_spanish:
  - se levantó de su pecho
  - se levantó de su seno
  lexicon: ἔγειρε / levantarse; ḥəḍnu = bosom/lap
  rationale: El Ge'ez indica 'de su bosom', pero en español 'regazo' comunica mejor la imagen de estar reclinado junto a alguien y evita un calco oscuro. Se conserva la cercanía narrativa del contexto inmediato.
- source_word: ወሮጸ፡
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - echó a correr
  - corrió apresuradamente
  lexicon: run
  rationale: '''Corrió'' es directo, natural y fiel al movimiento urgente del pasaje.'
- source_word: ለርብቃ፡ እሙ፡
  english_pob_choice: Rebekah his mother
  chosen_spanish: Rebeca su madre
  alternatives_spanish:
  - Rebeca, su madre
  - Rebeca, la madre de él
  lexicon: Rebekah / mother
  rationale: Se mantiene el genitivo posesivo simple del original sin añadir palabras innecesarias; el nombre propio se adapta a la forma bíblica común en español.
- source_word: ወሖረት፡ ርብቃ፡ ኀበ፡ ይስሐቅ፡ ሌሊተ፡
  english_pob_choice: Rebekah went by night to Isaac
  chosen_spanish: Rebeca fue de noche a Isaac
  alternatives_spanish:
  - Rebeca fue durante la noche a Isaac
  - Rebeca se dirigió de noche a Isaac
  lexicon: go by night
  rationale: '''Fue de noche'' reproduce el adverbial temporal del Ge''ez con sencillez y dignidad. ''A Isaac'' conserva el destino personal sin forzar una preposición más interpretativa.'
- source_word: ወማኅቶት፡ ውስተ፡ እዴሁ፡
  english_pob_choice: a torch was in his hand
  chosen_spanish: una antorcha estaba en su mano
  alternatives_spanish:
  - una antorcha iba en su mano
  - llevaba una antorcha en la mano
  lexicon: torch in his hand
  rationale: Se mantiene el singular del Ge'ez y la imagen concreta de una antorcha sostenida por una persona. 'Estaba en su mano' sigue el orden descriptivo del original.
- source_word: ወሐዊሮሙ፡ ረከብዎ፡
  english_pob_choice: when they had gone, they found
  chosen_spanish: y cuando habían ido, hallaron
  alternatives_spanish:
  - y al ir, hallaron
  - y cuando se habían ido, encontraron
  lexicon: find after going
  rationale: La estructura temporal queda clara en español sin añadir explicaciones. 'Hallar' conserva un tono bíblico sobrio y preciso.
- source_word: በድኖ።
  english_pob_choice: lying dead
  chosen_spanish: tendido muerto
  alternatives_spanish:
  - muerto y tendido
  - yaciendo muerto
  lexicon: dead body / lying dead
  rationale: '''Tendido muerto'' comunica el estado del cuerpo con naturalidad y sin suavizar la muerte. Mantiene la concisión del cierre ge''ez.'
theological_decisions:
- issue: Narrative specificity of 'bosom' vs. 'bed'
  english_pob_reading: rose from his bosom
  chosen_spanish_reading: se levantó de su regazo
  alternative_spanish_readings:
  - se levantó de su lecho
  - se levantó de su pecho
  rationale: La revisión inglesa intentó 'bed', pero el control posterior señaló que el Ge'ez literalmente dice 'bosom'. En español, 'regazo' conserva la proximidad física y la conexión con el contexto inmediato sin falsear el dato textual.
  doctrine_reference: Source-critical accuracy; no doctrinal issue, but text-faithfulness in narrative detail
- issue: Singular torch imagery
  english_pob_reading: a torch was in his hand
  chosen_spanish_reading: una antorcha estaba en su mano
  alternative_spanish_readings:
  - antorchas estaban en sus manos
  - una antorcha iba en su mano
  rationale: Se sigue el ajuste correctivo que restituye el singular del Ge'ez. No se pluraliza la escena, para no borrar el detalle textual de una sola antorcha y una sola mano.
  doctrine_reference: Source-critical accuracy; preservation of narrative particulars
translation_notes:
  revision_awareness: La redacción inglesa pasó por una revisión que propuso 'from his bed' y un plural para las antorchas; sin embargo, el control posterior corrigió ambas decisiones, volviendo a la literalidad ge'ez de 'from his bosom' y al singular de 'a torch was in his hand'. La traducción española sigue esas correcciones y evita depender de la revisión errónea.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se mantiene 'Rebeca', 'Isaac', 'Jacob' y 'Abraham' con las formas usuales en español bíblico.
  - '''Hallar'' y ''tendido muerto'' sostienen un registro bíblico sobrio sin arcaizar en exceso.'
  - No se introducen términos doctrinales ajenos al relato; la prioridad es la precisión narrativa.
