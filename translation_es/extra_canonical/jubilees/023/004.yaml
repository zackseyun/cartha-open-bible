review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del ge''ez y el rastro de auditoría inglés en los dos puntos críticos: conserva el sentido literal de እምሕፅኑ como cercanía corporal, no ''lecho'', y mantiene el singular en ''una antorcha ... en su mano''. También refleja adecuadamente la secuencia narrativa: se levantó, corrió, avisó a Rebeca, ella fue de noche a Isaac, fueron juntos, y hallaron a Abraham muerto.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene dos problemas de naturalidad/precisión: ''de su regazo'' suena posesivamente ambiguo en español y puede sugerir el regazo propio de Jacob, no el de Abraham; y la colocación ''[a]regazo'' está mal espaciada. Además, ''cuando habían ido'' es poco natural en español moderno; ''cuando llegaron'' o ''después de ir'' expresa mejor la progresión. ''Una antorcha estaba en su mano'' es fiel pero algo tieso; ''llevaba una antorcha en la mano'' mantiene el singular y suena más idiomático.'
  glossary_alignment: No hay términos del glosario teológico principal en juego. Los nombres 'Rebeca', 'Isaac', 'Jacob' y 'Abraham' están bien. La decisión de no usar 'lecho' y de no pluralizar 'antorcha' concuerda con la documentación inglesa.
  issues:
  - severity: medium
    issue: '''de su regazo'' deja ambiguo el referente posesivo'
    rationale: El ge'ez y el contexto indican que Jacob se levantó del regazo/pecho de Abraham. En español, 'su regazo' puede entenderse como el regazo del mismo sujeto 'él'. Conviene explicitar 'del regazo de Abraham' para preservar la escena previa sin ambigüedad.
  - severity: low
    issue: Anclaje de nota mal espaciado en 'su [a]regazo'
    rationale: La marca debe insertarse de forma limpia en el texto, no separando artificialmente el sintagma con un espacio impropio.
  - severity: low
    issue: '''cuando habían ido'' suena poco natural'
    rationale: Aunque calca la estructura temporal, en español resulta forzado. Una forma como 'cuando llegaron' comunica la secuencia con más naturalidad y sin pérdida de sentido.
  - severity: low
    issue: '''una antorcha estaba en su mano'' es demasiado rígido'
    rationale: 'La idea singular puede mantenerse con una expresión española más natural: ''llevaba una antorcha en la mano''. Esto no altera el detalle textual restaurado por la auditoría.'
  revised_spanish_text: Y él se levantó del regazo[a] de Abraham y corrió, y se lo contó a Rebeca su madre. Y Rebeca fue de noche a Isaac y se lo contó, y ellos fueron juntos, y Jacob también con ellos, y llevaba una antorcha en la mano[b]; y cuando llegaron, hallaron a Abraham tendido muerto.
  revised_footnotes:
