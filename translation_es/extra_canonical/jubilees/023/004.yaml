    reason: lexical_alternative
  - marker: b
    text: 'El ge''ez usa singular: «una antorcha» y «en su mano». No se adopta la lectura plural porque no está respaldada por el texto fuente.'
    reason: textual_variant
  revision_rationale: 'Se hacen ajustes menores pero importantes para la claridad y el buen español: se explicita que el regazo es el de Abraham, se corrige la colocación de la nota, se vuelve más idiomática la frase de la antorcha sin perder el singular del original, y se reemplaza una construcción temporal poco natural por una equivalente clara en español.'
