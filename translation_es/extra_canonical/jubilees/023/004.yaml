revisions:
- from: Y él se levantó de su [a]regazo y corrió, y se lo contó a Rebeca su madre. Y Rebeca fue de noche a Isaac y se lo contó, y ellos fueron juntos, y Jacob también con ellos, y una antorcha estaba en su mano [b]; y cuando habían ido, hallaron a Abraham tendido muerto.
  to: Y él se levantó del regazo[a] de Abraham y corrió, y se lo contó a Rebeca su madre. Y Rebeca fue de noche a Isaac y se lo contó, y ellos fueron juntos, y Jacob también con ellos, y llevaba una antorcha en la mano[b]; y cuando llegaron, hallaron a Abraham tendido muerto.
  rationale: 'Se hacen ajustes menores pero importantes para la claridad y el buen español: se explicita que el regazo es el de Abraham, se corrige la colocación de la nota, se vuelve más idiomática la frase de la antorcha sin perder el singular del original, y se reemplaza una construcción temporal poco natural por una equivalente clara en español.'
