    timestamp: '2026-04-23T14:50:32Z'
    unchanged: false
    changes_summary: Added punctuation to clarify that 'his sons Isaac and Ishmael' are the subject of the burial action, while retaining the draft's wording.
translation:
  language: es
  text: Y sus hijos Isaac e Ismael lo sepultaron en la cueva doble, cerca de Sara, su esposa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውስተ፡ በዓተ፡ ካዕበት፡
  english_pob_choice: in the double cave
  chosen_spanish: en la cueva doble
  alternatives_spanish:
  - en la cueva de doble entrada
  - en la cueva doble
  lexicon: cave/cueva; double/doble
  rationale: El Ge'ez describe literalmente una ‘cueva doble’; el español natural y fiel es ‘cueva doble’. Evito ampliar a ‘de doble entrada’ porque el texto fuente no lo dice.
- source_word: ሳራ፡ ብእሲቱ፡
  english_pob_choice: Sarah his wife
  chosen_spanish: Sara, su esposa
  alternatives_spanish:
  - Sara, su mujer
  - Sara, su esposa
  lexicon: wife/esposa
  rationale: ‘Esposa’ conserva el registro digno y el vínculo matrimonial sin introducir matiz coloquial. El nombre propio se adapta a la forma española estándar ‘Sara’.
- source_word: ውሉዱ፡ ይስሐቅ፡ ወእስማዔል፡
  english_pob_choice: his sons Isaac and Ishmael
  chosen_spanish: sus hijos Isaac e Ismael
  alternatives_spanish:
  - sus hijos Isaac e Ismael
  - Isaac e Ismael, sus hijos
  lexicon: sons/hijos
  rationale: El Ge'ez presenta claramente a Isaac e Ismael como sujetos de la acción de sepultar. ‘Hijos’ reproduce la relación filial sin añadir énfasis doctrinal.
translation_notes:
  revision_awareness: La versión anterior en inglés fue revisada para dejar explícito que Isaac e Ismael son el sujeto de ‘buried him’. El español sigue esa sintaxis directa con ‘Y sus hijos Isaac e Ismael lo sepultaron…’, sin necesidad de nota alternativa.
  spanish_consistency_notes:
  - Se mantiene ‘cueva doble’ como traducción directa y transparente del Ge'ez.
  - Se usa ‘sepultaron’ para el acto de entierro, coherente con el tono bíblico en español.
  - No se añade nota al pie porque no hay ambigüedad textual que requiera variantes registradas en esta línea.
