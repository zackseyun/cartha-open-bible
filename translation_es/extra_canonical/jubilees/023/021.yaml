base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/021.yaml
  text: And they will rise up with bow and with swords and with slaughter, to turn them back to the way; and they will not turn back until much blood is poured out on the earth, these by those.
  footnotes:
  - marker: a
    text: Or 'to drive them from the way'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:37Z'
    unchanged: false
    changes_summary: Changed 'stand' to 'rise up' for better lexical fit, and 'return' to 'turn back' for more natural rendering of the verb in context. Kept the rest substantially the same, including the final reciprocal phrase 'these by those.'
translation:
  language: es
  text: Y se levantarán con arco, con espadas y con matanza, para hacerlos volver al camino; y no volverán atrás hasta que mucha sangre sea derramada sobre la tierra, unos por otros.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወይቀውሙ
  english_pob_choice: they will rise up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - se alzarán
  - se pondrán en pie
  lexicon: levantarse; alzarse
  rationale: El Ge'ez y la revisión inglesa apuntan a una acción de levantarse/ponerse en pie para actuar, no solo de permanecer. 'Se levantarán' conserva el arranque dinámico sin introducir más contenido del que da el texto.
- source_word: በቀስት፡ ወበአስይፍት፡ ወበቅትል፡
  english_pob_choice: with bow and with swords and with slaughter
  chosen_spanish: con arco, con espadas y con matanza
  alternatives_spanish:
  - con arco, con espadas y con matanza
  - con arco, con espadas y con degüello
  lexicon: arco; espada; matanza
  rationale: Conservo la serie concreta de instrumentos/medios. 'Matanza' refleja el sustantivo de violencia del texto y la tradición POB inglesa; 'degüello' sería más literal pero menos neutral en español bíblico general.
- source_word: ከመ፡ ይሚጥዎሙ፡ ውስተ፡ ፍኖት፡
  english_pob_choice: to turn them back to the way
  chosen_spanish: para hacerlos volver al camino
  alternatives_spanish:
  - para volverlos al camino
  - para hacerlos regresar al camino
  lexicon: volver; camino
  rationale: 'La revisión inglesa corrigió el sentido: no es expulsarlos ''de'' el camino, sino devolverlos a él. En español, ''hacerlos volver al camino'' transmite bien la causatividad del verbo sin forzar una paráfrasis mayor.'
- source_word: ወኢይትመየጡ
  english_pob_choice: they will not turn back
  chosen_spanish: y no volverán atrás
  alternatives_spanish:
  - y no se volverán
  - y no retrocederán
  lexicon: volver atrás; retroceder
  rationale: La frase inglesa revisada distingue un giro de retroceso/retorno. 'Volverán atrás' es idiomático y conserva la idea de no desistir o no retirarse.
- source_word: እስከ፡ ይትከዐው፡ ደም፡ ብዙኅ፡ ዲበ፡ ምድር፡
  english_pob_choice: until much blood is poured out on the earth
  chosen_spanish: hasta que mucha sangre sea derramada sobre la tierra
  alternatives_spanish:
  - hasta que se derrame mucha sangre sobre la tierra
  - hasta que mucha sangre corra sobre la tierra
  lexicon: derramar sangre
  rationale: Mantengo la formulación casi literal porque el texto presenta una imagen de derramamiento abundante de sangre en la tierra; 'derramada' es la forma natural en español bíblico y no atenúa la violencia del pasaje.
- source_word: እሉ፡ በእሉ።
  english_pob_choice: these by those
  chosen_spanish: estos por aquellos
  alternatives_spanish:
  - unos por otros
  - éstos por aquéllos
  lexicon: estos; aquellos
  rationale: La frase final recíproca es compacta y oscura. 'Estos por aquellos' conserva la tersura y la reciprocidad del original/inglés sin explicitar más de lo que el texto ofrece.
theological_decisions:
- issue: Direction of violent action toward 'the way'
  english_pob_reading: to turn them back to the way
  chosen_spanish_reading: para hacerlos volver al camino
  alternative_spanish_readings:
  - para expulsarlos del camino
  - para alejarlos del camino
  rationale: La evidencia revisada del Ge'ez favorece un retorno forzado a la senda, no una expulsión. La españolidad de 'volver al camino' preserva el valor direccional y evita invertir el sentido.
  doctrine_reference: No doctrinal assertion beyond the immediate narrative sense; textual/lexical decision.
- issue: Reciprocal closing phrase
  english_pob_reading: these by those
  chosen_spanish_reading: estos por aquellos
  alternative_spanish_readings:
  - unos por otros
  - aquellos por estos
  rationale: La frase parece indicar intercambio o reciprocidad entre grupos sin mayor explicación. Mantengo una formulación abierta que no resuelve artificialmente la ambigüedad.
  doctrine_reference: No doctrinal assertion; discourse ambiguity in the source.
translation_notes:
  revision_awareness: Se incorporó la corrección del audit trail que revierte la antigua lectura 'to drive them from the way' a 'to turn them back to the way'. También se conservó la revisión de 'they will rise up' y 'they will not turn back' como 'se levantarán' y 'no volverán atrás'.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece porque este versículo no contiene el tetragrámaton ni una alusión directa al nombre divino.'
  - '''Mesías/Cristo'' no aplica en este versículo.'
  - Se prefirió 'matanza' para mantener el tono violento sin sobreespecificar el instrumento.
  - La nota [a] está anclada en 'camino' para registrar la alternativa verbal del sintagma final.
