  footnotes: []
lexical_decisions:
- source_word: ኃጥአኒሆሙ / sinners
  english_pob_choice: the sinners of the nations
  chosen_spanish: los pecadores de las naciones
  alternatives_spanish:
  - los impíos de las naciones
  - los pecadores entre las naciones
  lexicon: pecadores
  rationale: Mantiene la correspondencia directa con el valor moral del término y conserva la estructura genitiva del original y del POB inglés sin suavizar la acusación.
- source_word: ምሕረተ ወሣህለ / mercy or compassion
  english_pob_choice: mercy or compassion
  chosen_spanish: misericordia ni compasión
  alternatives_spanish:
  - piedad ni compasión
  - misericordia ni ternura
  lexicon: misericordia / compasión
  rationale: El par español reproduce el doblete semántico del original y del inglés POB, manteniendo ambos matices sin fusionarlos.
- source_word: ለገጸ መኑሂ / show favor
  english_pob_choice: show no favor
  chosen_spanish: no muestran favor
  alternatives_spanish:
  - no tienen favor
  - no hacen acepción
  lexicon: favor
  rationale: Se conserva la idea de no dispensar trato favorable; 'favor' es el equivalente más directo del audit trail en inglés y evita introducir un lenguaje jurídico ajeno al pasaje.
- source_word: አሰልሂቅ / old
  english_pob_choice: old
  chosen_spanish: al anciano
  alternatives_spanish:
  - al viejo
  - a los mayores
  lexicon: anciano
  rationale: '''Anciano'' refleja la referencia etaria concreta y suena natural en español bíblico contemporáneo sin perder el contraste con ''joven''.'
- source_word: ወኢ ለወሬዛ / and not to young
  english_pob_choice: or young
  chosen_spanish: ni al joven
  alternatives_spanish:
  - ni al muchacho
  - ni al joven o a la joven
  lexicon: joven
  rationale: Conserva el contraste de edad del original y del inglés POB en una forma idiomática y neutral.
- source_word: እኩያን / evil
  english_pob_choice: they are evil
  chosen_spanish: son malos
  alternatives_spanish:
  - son perversos
  - son impíos
  lexicon: malos
  rationale: '''Malos'' reproduce de manera directa el juicio moral del texto y evita cargar el verso con una elección más interpretativa que el original no exige.'
- source_word: ኀያላን / strong
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - poderosos
  - robustos
  lexicon: fuertes
  rationale: Es la equivalencia más sencilla y fiel para la capacidad/ímpetu descrita; mantiene el paralelismo con 'malos' sin reinterpretar la fuerza como autoridad política.
- source_word: ውሉደ ሰብእ / sons of men
  english_pob_choice: sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - los hijos del hombre
  lexicon: hijos de los hombres
  rationale: Conserva la formulación idiomática del texto fuente y del inglés POB, evitando una nivelación excesiva hacia 'seres humanos'.
