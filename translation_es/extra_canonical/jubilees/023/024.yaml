translation:
  language: es
  text: Y él suscitará contra ellos a los pecadores de las naciones, que no tienen misericordia ni compasión de ellos, y que no muestran favor ni al anciano ni al joven, ni a nadie en absoluto; porque son malos y fuertes, de modo que hacen más mal que todos los hijos de los hombres.
