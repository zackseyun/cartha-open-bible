  rationale: Se conserva la atribución de iniciativa divina mediante 'suscitará', que refleja la acción permitida/ordenada en el texto y evita hacerla más agresiva de lo que sugiere el original.
  doctrine_reference: Providencia divina y juicio histórico en literatura parabíblica
