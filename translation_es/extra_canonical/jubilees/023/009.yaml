translation:
  language: es
  text: Y vivió tres jubileos y cuatro semanas de años, ciento setenta y cinco años; y completó los días de su vida, anciano y lleno de días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሠለስተ፡ ኢዮቤልው፡ ሐይወ፡ ወአርባዕተ፡ ሱባዔ፡ ዓመተ፡ *ምእተ፡ ወሰብዓ፡ ወኃምስተ፡ ዓመተ፡
  english_pob_choice: And he lived three jubilees and four weeks of years, one hundred and seventy-five years
  chosen_spanish: Y vivió tres jubileos y cuatro semanas de años, ciento setenta y cinco años
  alternatives_spanish:
  - Y vivió tres jubileos y cuatro semanas de años, 175 años
  - Y vivió tres jubileos y cuatro semanas de años, ciento setenta y cinco
  lexicon: ሐይወ / ሕይወት
  rationale: El ge'ez expresa la duración de la vida con una fórmula temporal. Mantengo literalmente «tres jubileos y cuatro semanas de años» como unidad calendárica, y explicito la cifra en palabras por estilo bíblico en español. La equivalencia numérica con ciento setenta y cinco años sigue la lectura inglesa auditada.
- source_word: ወፈጸመ፡ መዋዕለ፡ ሕይወቱ፡
  english_pob_choice: and he completed the days of his life
  chosen_spanish: y completó los días de su vida
  alternatives_spanish:
  - y terminó los días de su vida
  - y acabó los días de su vida
  lexicon: ፈጸመ
  rationale: «Completar» reproduce bien el valor de llevar algo a su plenitud/consumación sin reducirlo a mero cese físico. Conserva el matiz formal de la expresión auditada en inglés.
- source_word: አሂቅ፡
  english_pob_choice: old
  chosen_spanish: anciano
  alternatives_spanish:
  - viejo
  - ya viejo
  lexicon: አሂቅ
  rationale: El adjetivo señala vejez en un registro digno. «Anciano» suena más bíblico y respetuoso en español que «viejo», sin añadir contenido doctrinal.
- source_word: ወፍጹመ፡ መዋዕለ።
  english_pob_choice: and full of days
  chosen_spanish: y lleno de días
  alternatives_spanish:
  - y colmado de días
  - y saciado de días
  lexicon: ፍጹም
  rationale: Conservo la fórmula semítica tradicional «lleno de días», muy transparente en español bíblico y fiel a la imagen de vida cumplida. «Colmado de días» sería posible, pero menos idiomático.
theological_decisions:
- issue: La fórmula final describe culminación vital, no solo longevidad biológica.
  english_pob_reading: old and full of days
  chosen_spanish_reading: anciano y lleno de días
  alternative_spanish_readings:
  - viejo y lleno de días
  - anciano y colmado de días
  rationale: 'La redacción española conserva la doble afirmación: edad avanzada y vida cumplida. «Anciano» mantiene dignidad y evita una connotación despectiva.'
  doctrine_reference: Génesis 25:8; 35:29; 1 Crónicas 29:28
- issue: La mención de jubileos y semanas de años pertenece al cómputo calendárico del libro y no debe simplificarse.
  english_pob_reading: three jubilees and four weeks of years
  chosen_spanish_reading: tres jubileos y cuatro semanas de años
  alternative_spanish_readings:
  - tres jubileos y cuatro semanas de años, es decir, ciento setenta y cinco años
  - tres jubileos y cuatro semanas de años
  rationale: Mantengo la unidad de medida del texto para no borrar su particularidad cronológica. La cifra se conserva junto a la fórmula para claridad lectora, como en el inglés auditado.
  doctrine_reference: Jubileos 23:9
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre la fuente ge'ez, la traducción inglesa POB y la revisión más reciente; no se registran cambios editoriales necesarios. La versión española sigue esa estabilidad, preservando la fórmula cronológica y el cierre tradicional «lleno de días».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - Se conservó el registro bíblico formal sin introducir glosas interpretativas.
  - La cifra se expresó en palabras para concordar con el tono escritural, manteniendo también la equivalencia explícita en la misma cláusula.
