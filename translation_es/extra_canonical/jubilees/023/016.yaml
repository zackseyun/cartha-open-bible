  to: 'Entonces dirán: «Los días de los antiguos[a] fueron muchos, hasta mil años, y buenos; pero he aquí, los días de nuestra vida, cuando un hombre ha vivido muchos años,[b] son setenta años, y si es fuerte, ochenta años, y son malos, y no hay paz en los días de esta generación malvada».'
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español y mantener una alineación más limpia con el texto fuente y la auditoría inglesa: ''los antiguos'' eleva el registro frente a ''los de antes''; ''ha vivido muchos años'' expresa idiomáticamente la longevidad; y se eliminó ''siquiera'' del texto principal para evitar una ampliación estilísticamente forzada que la POB inglesa no retuvo. Las notas se simplificaron para conservar solo lo necesario y anclado en el texto revisado.'
