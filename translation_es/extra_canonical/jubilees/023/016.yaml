    rationale: La nota lexical es razonable, pero 'no hay paz siquiera' es una colocación marcada. Dado que la POB inglesa auditada no preservó ese matiz, es preferible el texto principal 'no hay paz' y, si se desea, mantener la observación en nota; aquí la mejor reparación mínima es eliminar el añadido.
