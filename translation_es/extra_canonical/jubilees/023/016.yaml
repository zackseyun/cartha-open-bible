  - severity: medium
    issue: Registro demasiado coloquial en 'los de antes'
    rationale: El Ge'ez ቀደምት significa 'los anteriores / los que fueron antes'. 'Los de antes' es comprensible, pero en una traducción bíblica suena conversacional. 'Los antiguos' preserva el contraste temporal con mejor dignidad estilística.
  - severity: low
