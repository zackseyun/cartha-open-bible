base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/016.yaml
  text: Then they will say, “The days of the former ones were many, up to a thousand years, and good; but behold, the days of our life, when a man has lived long, are seventy years, and if he is strong, eighty years, and they are evil, and there is no peace in the days of this evil generation.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:35Z'
    unchanged: false
    changes_summary: Removed the unnecessary 'even' for smoother formal English, changed 'if a man has lived long' to 'when a man has lived long' to better fit the sense, and replaced 'yet they are evil' with 'and they are evil' to more closely reflect the source conjunction.
translation:
  language: es
  text: 'Entonces dirán: «Los días de los antiguos[a] fueron muchos, hasta mil años, y buenos; pero he aquí, los días de nuestra vida, cuando un hombre ha vivido muchos años,[b] son setenta años, y si es fuerte, ochenta años, y son malos, y no hay paz en los días de esta generación malvada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Ge''ez ቀደምት (qadam''t): ''los que vinieron antes / los anteriores''. Aquí alude implícitamente a las generaciones antiguas de gran longevidad en Jubileos.'
    reason: lexical
  - marker: b
    text: 'Eco de Sal 90:10 (LXX 89:10): «Los días de nuestra vida son setenta años; si hay vigor, ochenta.» Jubileos usa estas cifras para subrayar el deterioro de la condición humana.'
    reason: cross_reference
lexical_decisions:
- source_word: ቀደምት (qadam't)
  english_pob_choice: the former ones
  chosen_spanish: los de antes
  alternatives_spanish:
  - los antiguos
  - los primeros
  - los antepasados
  lexicon: CDG s.v. qadama (preceder, ser anterior)
  rationale: El Ge'ez ቀደምት denota 'los que vinieron antes / los anteriores.' 'Los de antes' resulta más natural en español moderno de registro elevado que 'los anteriores,' y más fiel que 'los antepasados,' que añadiría connotación genealógica no codificada en el término Ge'ez.
- source_word: ዐሠርቱ፡ ምእት፡ ዓመት (ʿaśartu miʾt ʿāmat)
  english_pob_choice: a thousand years
  chosen_spanish: mil años
  alternatives_spanish:
  - diez centenas de años
  lexicon: CDG s.v. ʿaśart (diez), miʾt (cien), ʿāmat (año)
  rationale: Traducción exacta de la expresión idiomática Ge'ez 'diez cientos de años.' 'Mil años' es la forma española natural y numéricamente precisa; la paráfrasis 'diez centenas' añadiría torpeza sin ninguna ganancia de fidelidad.
- source_word: አበ / አመ አብዝኀ ሰብእ ሐይወ (ʾama ʾabzaḥa sabiʾ ḥaywa)
  english_pob_choice: when a man has lived long
  chosen_spanish: cuando un hombre ha vivido largo
  alternatives_spanish:
  - cuando un hombre ha vivido muchos años
  - cuando un hombre ha alcanzado mucha edad
  lexicon: CDG s.v. bazḥa (ser numeroso/mucho); causativo ʾabzaḥa (multiplicar, hacer abundante)
  rationale: El causativo አብዝኀ literalmente significa 'cuando se ha multiplicado (la vida de) un hombre,' es decir, cuando su existencia se ha extendido considerablemente. 'Ha vivido largo' captura la idea de longevidad de forma concisa. La revisión inglesa de la POB optó por 'when' (temporal, no condicional), en línea con la partícula temporal Ge'ez አመ (ʾama), frente al 'if' previo; el español sigue la misma lectura con 'cuando.'
- source_word: ምዝኒ (miznī)
  english_pob_choice: (omitido; inglés rinde 'there is no peace')
  chosen_spanish: siquiera
  alternatives_spanish:
  - incluso
  - ni siquiera
  lexicon: 'CDG s.v. miznī (también, asimismo; en contexto negativo: ni siquiera, incluso)'
  rationale: 'La partícula Ge''ez ምዝኒ añade énfasis intensificador: ''no hay ni siquiera paz.'' La traducción inglesa de la POB no preservó este matiz. El español lo recupera con ''paz siquiera,'' indicando que incluso el mínimo de paz está ausente. Esta es la única desviación sustantiva respecto al inglés POB, motivada por evidencia directa del texto fuente.'
- source_word: ትውልድ (tiwulid)
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - época
  - era
  lexicon: CDG s.v. wālada (engendrar, dar a luz); tiwulid = descendencia, generación
  rationale: Calco semántico directo. 'Generación' es el equivalente preciso y bíblicamente estándar en español, coherente con el uso en la tradición judeo-cristiana y más fiel al sentido de 'conjunto de contemporáneos nacidos en un período' que 'época' o 'era.'
- source_word: እኩይ / እኪት (ʾikuy / ʾikīt)
  english_pob_choice: evil
  chosen_spanish: malos / malvada
  alternatives_spanish:
  - perversos / perversa
  - malos / mala
  lexicon: CDG s.v. ʾakaya (ser malo, dañino, perverso)
  rationale: 'El adjetivo aparece dos veces: ወእሉ፡ እኩይ (''y son malos,'' masculino plural, referido a los días) y ትውልድ፡ ይእቲ፡ እኪት (''generación malvada,'' femenino singular). El español diferencia correctamente: ''son malos'' para los días y ''malvada'' para la generación, respetando la concordancia de género del Ge''ez original.'
theological_decisions:
- issue: Alusión a los setenta y ochenta años de vida (eco de Salmo 90:10)
  english_pob_reading: seventy years... eighty years
  chosen_spanish_reading: setenta años... ochenta años
  rationale: 'El texto de Jubileos 23:16 evoca deliberadamente el Salmo 90 (LXX 89):10: ''Los días de nuestra vida son setenta años; si hay vigor, ochenta años.'' Esta alusión es teológicamente central: Jubileos interpreta el declive de la longevidad humana (de los casi mil años patriarcales a los setenta u ochenta) como consecuencia y señal del deterioro moral de las últimas generaciones. La traducción española preserva las cifras exactas sin paráfrasis.'
  doctrine_reference: Jubileos 23:9–15 (declive de la longevidad); Salmo 90:10 (LXX 89:10)
- issue: '''Los de antes'' como referencia implícita a los patriarcas antediluvianos de mil años'
  english_pob_reading: The days of the former ones were many, up to a thousand years
  chosen_spanish_reading: Los días de los de antes fueron muchos, hasta mil años
  alternative_spanish_readings:
  - Los días de los antiguos fueron muchos, hasta mil años
  rationale: 'Jubileos presenta un esquema de declive progresivo de la longevidad humana: los patriarcas de Génesis 5 (Adán, Matusalén, etc.) vivieron casi mil años. El límite de ''mil años'' es la idealización Jubileana del máximo alcanzable de vida humana (cf. Jub. 4:30: Adán muere a los 930 años, ''cien años menos que mil''). ''Los de antes'' (ቀደምት) alude implícitamente a esos patriarcas sin nombrarlos. El español mantiene la referencia implícita sin amplificarla.'
  doctrine_reference: Jubileos 4:30; 23:9–11; Génesis 5 (edades patriarcales masoréticas)
translation_notes:
  revision_awareness: 'La revisión inglesa de la POB (2026-04-23, azure-gpt-5.4) realizó tres ajustes: eliminó ''even'' antes de ''up to'' por fluidez; cambió ''if a man has lived long'' por ''when a man has lived long,'' más apropiado para la partícula temporal Ge''ez አመ (ʾama); y sustituyó ''yet they are evil'' por ''and they are evil'' para reflejar la conjunción copulativa ወ- (wa-) del Ge''ez. El español sigue estas tres decisiones revisadas. Adicionalmente, el español recupera la partícula ምዝኒ (miznī) omitida en el inglés POB, rindiendo ''no hay paz siquiera'' en lugar del simple ''no hay paz.'''
  spanish_consistency_notes:
  - Se mantiene 'generación' (no 'época' ni 'era') como equivalente de ትውልድ, coherente con el uso bíblico estándar en español.
  - El uso de 'he aquí' para ወናሁ (wanāhu) sigue el patrón de interjección demostrativa de registro bíblico elevado en español, preferido sobre 'mira' o 'fíjate.'
  - 'Los adjetivos ''malos'' (para los días, masculino plural) y ''malvada'' (para la generación, femenino singular) reflejan el género gramatical del Ge''ez original: እኩይ (masculino) y እኪት (femenino).'
  - Las comillas angulares «» para el discurso directo siguen la convención tipográfica española estándar.
