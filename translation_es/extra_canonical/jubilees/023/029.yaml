base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/029.yaml
  text: And the days will begin to grow many and increase among the children of men, generation by generation and day by day, until their days draw near to one thousand years and to many years beyond many days. And there will be no old man, nor one who is not satisfied with his days; for all of them will be like children and youths. And all their days they will complete in peace and joy, and they will live, and there will be no Satan and no evil destroyer, for all their days will be days of blessing and healing.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:40Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y los días comenzarán a multiplicarse y a aumentar entre los hijos de los hombres, generación tras generación y día tras día, hasta que sus días se acerquen a mil años y a muchos años más. Y no habrá anciano, ni nadie que no quede satisfecho con sus días; porque todos ellos serán como niños y jóvenes. Y todos sus días los cumplirán en paz y en gozo, y vivirán; y no habrá Satanás ni destructor malvado, porque todos sus días serán días de bendición y de curación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውሉደ ሰብእ
  english_pob_choice: children of men
  chosen_spanish: hijos de los hombres
  alternatives_spanish:
  - hijos del hombre
  - seres humanos
  - descendientes de Adán
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: La expresión ge'ez corresponde al semitismo “children of men”, que en español se comunica de manera natural como “hijos de los hombres”. Mantiene el sentido colectivo y el tono bíblico sin convertirlo en una paráfrasis abstracta.
- source_word: ይብዝኃ ወይሌህቃ
  english_pob_choice: will begin to grow many and increase
  chosen_spanish: comenzarán a multiplicarse y a aumentar
  alternatives_spanish:
  - comenzarán a crecer y multiplicarse
  - se harán muchos y se incrementarán
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: El par verbal ge'ez enfatiza multiplicación e incremento. En español, “multiplicarse y aumentar” conserva la redundancia enfática del original sin endurecer el estilo.
- source_word: መዋዕሊሆሙ ለ፲ሠርቱ ምእት ዓመት
  english_pob_choice: their days draw near to one thousand years
  chosen_spanish: sus días se acerquen a mil años
  alternatives_spanish:
  - sus días lleguen a mil años
  - sus días se aproximen a mil años
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: “Se acerquen a mil años” refleja de forma directa la idea de aproximación temporal del ge'ez y coincide con la lectura inglesa, evitando añadir una afirmación de cumplimiento exacto que el texto no exige.
- source_word: አልቦ ልሂቀ
  english_pob_choice: there will be no old man
  chosen_spanish: no habrá anciano
  alternatives_spanish:
  - no habrá hombre viejo
  - no habrá persona anciana
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: “Anciano” comunica bien la ausencia de vejez avanzada en registro bíblico y suena más natural que una repetición demasiado literal de “hombre viejo”.
- source_word: አልቦ ዘኢይጸግብ መዋዕሊሆሙ
  english_pob_choice: nor one who is not satisfied with his days
  chosen_spanish: ni nadie que no quede satisfecho con sus días
  alternatives_spanish:
  - ni uno que no esté satisfecho con sus días
  - ni quien no se sacie de sus días
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: La construcción doble negativa del original se conserva de forma clara en español. “Quede satisfecho” mantiene el matiz de plenitud de vida, no solo de aceptación psicológica.
- source_word: ሰይጣነ
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satán
  - el Adversario
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: Se conserva el nombre propio tradicional en español, equivalente a la forma inglesa POB. “Satán” sería posible, pero “Satanás” es más reconocible y estable en lectura bíblica.
- source_word: እኩየ ዘያማስን
  english_pob_choice: evil destroyer
  chosen_spanish: destructor malvado
  alternatives_spanish:
  - destructor malo
  - malvado destructor
  - el destructor maligno
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: La combinación ge'ez une la idea de destrucción con cualificación moral. “Destructor malvado” conserva ambas sin introducir una personificación más fuerte de la que el texto exige.
- source_word: መዋዕለ በረከት ወፈውስ
  english_pob_choice: days of blessing and healing
  chosen_spanish: días de bendición y de sanidad
  alternatives_spanish:
  - días de bendición y curación
  - días de bendición y salud
  lexicon: N/A (source phrase, no lexicon entry supplied)
  rationale: “Sanidad” refleja mejor el alcance restaurador del término que solo “curación” o “salud”, y armoniza con el paralelismo de bendición/restauración del pasaje.
theological_decisions:
- issue: Ausencia de Satanás y del destructor malvado
  english_pob_reading: there will be no Satan and no evil destroyer
  chosen_spanish_reading: no habrá Satanás ni destructor malvado
  alternative_spanish_readings:
  - no habrá Satán ni destructor malo
  - no existirá Satanás ni un destructor maligno
  rationale: Se mantiene la personalización del mal presente en el texto fuente y en la POB inglesa. No se suaviza a una mera abstracción moral, porque el ge'ez nombra dos agentes negativos distintos.
  doctrine_reference: Angelology / evil agency in apocalyptic literature
- issue: Duración extrema de los días humanos
  english_pob_reading: their days draw near to one thousand years and to many years beyond many days
  chosen_spanish_reading: sus días se acerquen a mil años y a muchos años más allá de muchos días
  alternative_spanish_readings:
  - sus días lleguen a mil años y a muchos años más allá de muchos días
  - sus días se aproximen a mil años y a muchos años sobre muchos días
  rationale: Se conserva la hipérbole temporal del texto sin convertirla en una cifra literalizada o explicada alegóricamente. La formulación española mantiene la tensión entre cercanía a mil años y prolongación indefinida.
  doctrine_reference: Eschatology / longevity in the age of blessing
- issue: Paz, gozo y bendición como marco de la vida prolongada
  english_pob_reading: they will complete in peace and joy ... days of blessing and healing
  chosen_spanish_reading: los cumplirán en paz y en gozo ... días de bendición y de sanidad
  alternative_spanish_readings:
  - los completarán en paz y alegría
  - los pasarán en paz y gozo ... días de bendición y curación
  rationale: La traducción conserva el paralelismo de paz/gozo y bendición/sanidad, evitando reemplazarlo por una lectura meramente moral o psicológica. “Sanidad” preserva la dimensión restauradora del final del versículo.
  doctrine_reference: Shalom and restoration in eschatological blessing
translation_notes:
  revision_awareness: El texto fuente ge'ez y la traducción inglesa auditada muestran alta concordancia. No se reportan revisiones aplicadas ni notas textuales previas; por ello, el borrador español sigue de cerca la sintaxis y el paralelismo del original sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” solo cuando aparece el nombre divino; en este versículo no aparece, por lo que no se usa.
  - Se usa “Satanás” como nombre propio estable en español, coherente con la POB inglesa “Satan”.
  - Se conserva el doblete “bendición y sanidad” para respetar el cierre del pasaje.
  - El registro es bíblico y contemporáneo, evitando arcaísmos innecesarios pero manteniendo la cadencia apocalíptica.
