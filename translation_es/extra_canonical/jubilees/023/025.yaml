translation:
  language: es
  text: Y cometerán violencia en Israel y pecarán contra Jacob, y mucha sangre será derramada sobre la tierra, y no habrá quien recoja ni quien sepulte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይገብሩ / commit violence
  english_pob_choice: commit violence
  chosen_spanish: cometerán violencia
  alternatives_spanish:
  - harán violencia
  - oprimirán
  lexicon: N/A
  rationale: El inglés revisado fija la acción como violencia, no solo opresión; en español, 'cometer violencia' conserva el valor verbal y el matiz de acto culpable sin volverlo demasiado interpretativo.
- source_word: ውስተ እስራኤል / in Israel
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - sobre Israel
  lexicon: N/A
  rationale: La preposición ge'ez correspondiente indica localización dentro del ámbito de Israel; 'en' es la forma natural y fiel en español.
- source_word: ዲበ ምድር / on the earth
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por la tierra
  lexicon: N/A
  rationale: '''Sobre la tierra'' refleja mejor la imagen de derramamiento extendido del hebraísmo/semítica subyacente que una simple localización estática.'
- source_word: ወይትከዐው ደም ብዙኅ / much blood will be poured out
  english_pob_choice: much blood will be poured out
  chosen_spanish: mucha sangre será derramada
  alternatives_spanish:
  - se derramará mucha sangre
  - mucha sangre correrá
  lexicon: N/A
  rationale: '''Ser derramada'' mantiene la pasiva y la imagen sacrificial/violenta del original; ''sangre'' es la equivalencia idiomática habitual en español bíblico.'
- source_word: ወአልቦ ዘያስተጋብእ / there will be none to gather
  english_pob_choice: there will be none to gather
  chosen_spanish: no habrá quien la recoja
  alternatives_spanish:
  - no habrá quien la junte
  - no habrá quien la reúna
  lexicon: N/A
  rationale: El objeto implícito es la sangre/cadáveres en contexto; 'la recoja' conserva la brevedad del original y funciona naturalmente en español.
- source_word: ወአልቦ ዘይቀብር / and none to bury
  english_pob_choice: and none to bury
  chosen_spanish: ni quien la sepulte
  alternatives_spanish:
  - ni quien la entierre
  - ni quien la dé sepultura
  lexicon: N/A
  rationale: '''Sepultar'' preserva un registro bíblico formal y mantiene la parallelismo con ''recoja''; el pronombre ''la'' retoma la sangre implícita como metonimia del muerto/cuerpo.'
theological_decisions:
- issue: Nuance between 'in Israel' and 'against Jacob' implied by different prepositions in Ge'ez
  english_pob_reading: in Israel ... and sin against Jacob
  chosen_spanish_reading: en Israel ... y pecarán contra Jacob
  alternative_spanish_readings:
  - en Israel ... y pecarán en Jacob
  - en Israel ... y pecarán sobre Jacob
  rationale: La revisión textual subraya que el segundo miembro no repite simplemente 'en', sino que añade la idea de agresión/culpa dirigida a Jacob. 'Contra Jacob' mantiene esa diferencia sin forzar una lectura doctrinal.
  doctrine_reference: Textual nuance / source-language prepositional contrast
- issue: Generic violent chaos ending with no one to gather or bury
  english_pob_reading: there will be none to gather and none to bury
  chosen_spanish_reading: no habrá quien la recoja ni quien la sepulte
  alternative_spanish_readings:
  - no habrá quien la junte ni quien la entierre
  - no habrá quien recoja ni entierre
  rationale: El cierre debe sonar como lamento profético y no como simple redundancia narrativa; la combinación 'recoja/sepulte' comunica abandono total sin añadir elementos ausentes.
  doctrine_reference: Prophetic lament / literary closure
translation_notes:
  revision_awareness: La redacción sigue la lectura inglesa revisada que cambió 'work oppression' por 'commit violence' y mantuvo la corrección sobre 'against Jacob' en vez de repetir 'in Jacob'. No se introducen notas porque el español puede reflejar la distinción sin ambigüedad extra.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras convenciones ajenas porque este versículo no contiene el tetragrámaton ni un título divino.
  - '''Jacob'' se conserva como nombre propio bíblico, no como metonimia explicada, para respetar el paralelismo del texto.'
  - La voz pasiva en 'será derramada' ayuda a conservar el tono profético y el flujo del original.
