review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura básica del ge'ez y preserva correctamente la distinción entre «en Israel» y «contra Jacob», así como la imagen de mucha sangre derramada sobre la tierra. Sin embargo, la cláusula final queda menos fiel al probable referente del original al usar pronombres femeninos («la recoja… la sepulte») que hacen pensar en «la sangre», cuando «sepultar» exige naturalmente un cuerpo o cadáver. El inglés auditado deja el objeto sin expresar, y el español puede hacerlo también para conservar la indeterminación y evitar una metonimia forzada.
  spanish_quality_summary: El español es claro y digno, pero «no habrá quien la recoja ni quien la sepulte» suena algo tenso e internamente inconsistente, porque lo que se recoge podría ser la sangre, pero la sangre no se sepulta. Una formulación sin pronombres suena más natural y mantiene mejor el tono profético.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Violencia», «Israel», «Jacob», «sangre» y «tierra» están bien resueltos. No intervienen términos de glosario sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: Pronombres explícitos en la cláusula final introducen un referente problemático
    rationale: El original y el inglés POB dejan sin expresar qué se recoge y qué se sepulta. En español, «la recoja… la sepulte» sugiere «la sangre», pero «sepultar la sangre» no es natural ni fiel al sentido más probable de abandono de muertos/cadáveres.
  - severity: low
    issue: La metonimia propuesta en la justificación léxica no funciona bien en español receptor
    rationale: Aunque semíticamente pueda haber asociación entre sangre derramada y muertos sin sepultura, el español común no procesa con facilidad «sepultar» con antecedente «sangre». Conviene evitar esa sobreespecificación.
  revised_spanish_text: Y cometerán violencia en Israel y pecarán contra Jacob, y mucha sangre será derramada sobre la tierra, y no habrá quien recoja ni quien sepulte.
  revision_rationale: Se elimina el pronombre femenino en la última cláusula para evitar un antecedente engañoso y mantener la ambigüedad del original y del inglés auditado. El resto del versículo es fiel, natural y bien formulado en español.
