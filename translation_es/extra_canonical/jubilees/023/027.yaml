translation:
  language: es
  text: Y las cabezas de los niños se volverán blancas con canas, y un niño de tres semanas parecerá viejo como uno de cien años, y la estatura de ellos quedará arruinada por la angustia y la aflicción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይጸዐዱ፡ አርእስተ፡ ደቂቅ፡ በሲበት
  english_pob_choice: the heads of the children will become white with gray hair
  chosen_spanish: las cabezas de los hijos se volverán blancas con canas
  alternatives_spanish:
  - las cabezas de los niños se pondrán blancas con canas
  - las cabezas de los hijos encanecerán
  lexicon: cabezas / hijos / canas
  rationale: El ge'ez habla de las 'cabezas' de los hijos volviéndose blancas; en español, 'cabezas' mantiene la imagen corporal concreta y 'canas' expresa de manera natural el encanecimiento que el inglés POB explicitó como gray hair.
- source_word: ወያስተርኢ፡ ሕፃን፡ ወልደ፡ ሠለስት፡ ሱባዔ፡
  english_pob_choice: a child of three weeks will appear old
  chosen_spanish: un niño de tres semanas parecerá viejo
  alternatives_spanish:
  - un niño de tres semanas aparecerá viejo
  - un niño de tres semanas se verá viejo
  lexicon: niño / tres semanas / parecerá viejo
  rationale: '''Parecerá viejo'' reproduce la idea de apariencia sin añadir más que el texto sostiene; ''aparecerá'' o ''se verá'' son posibles, pero ''parecerá'' es más idiomático y conserva la noción de apariencia.'
- source_word: ከመ፡ ዘምእት፡ ዓመት፡
  english_pob_choice: like one of a hundred years
  chosen_spanish: como uno de cien años
  alternatives_spanish:
  - como uno de cien años de edad
  - como alguien de cien años
  lexicon: cien años / uno
  rationale: La comparación literal del ge'ez y del inglés POB se conserva con 'uno de cien años', que suena comprensible en español bíblico y mantiene la estructura comparativa.
- source_word: ወይትሐጐል፡ ቍመቶሙ፡
  english_pob_choice: their stature will be destroyed
  chosen_spanish: su estatura será destruida
  alternatives_spanish:
  - su estatura será arruinada
  - su talla será destruida
  lexicon: estatura / destruida
  rationale: El verbo ge'ez expresa ruina o destrucción de la estatura. 'Estatura' reproduce la dimensión corporal; aunque 'arruinada' sería más natural, 'destruida' sigue de cerca la fuerza del POB inglés y del original.
- source_word: በምንዳቤ፡ ወበፃዕር።
  english_pob_choice: by distress and affliction
  chosen_spanish: por la angustia y la aflicción
  alternatives_spanish:
  - por la tribulación y la aflicción
  - a causa de la angustia y la aflicción
  lexicon: angustia / aflicción
  rationale: '''Angustia'' y ''aflicción'' comunican bien los dos sustantivos del original y preservan el paralelismo del inglés POB sin introducir terminología eclesiástica más pesada.'
theological_decisions:
- issue: Descripción de envejecimiento prematuro como señal de juicio o calamidad
  english_pob_reading: 'The verse states a physical sign of distress: children age prematurely and lose stature through affliction.'
  chosen_spanish_reading: 'El versículo presenta un signo físico de calamidad: los niños envejecen prematuramente y su estatura se ve destruida por la aflicción.'
  alternative_spanish_readings:
  - El versículo habla de una vejez prematura causada por el sufrimiento.
  - El texto describe únicamente una hipérbole poética sin referencia física concreta.
  rationale: La traducción mantiene el contenido descriptivo del texto sin añadir una explicación doctrinal externa. La imagen de envejecimiento prematuro y deterioro corporal queda explícita en el español como en el inglés POB y el ge'ez.
  doctrine_reference: Sufrimiento y aflicción como manifestación corporal de miseria humana; no se introduce una doctrina adicional.
translation_notes:
  revision_awareness: Se siguió el texto ge'ez de Charles 1895 y el audit trail inglés, que permanecen sin cambios en la última revisión; no hubo revisiones aplicadas ni notas textuales previas que requirieran conservar variantes en español.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o terminología no presente, porque el pasaje no contiene el Tetragrámaton ni vocabulario cristológico.
  - '''Hijos'' se mantiene para seguir la imagen literal del texto; en este contexto puede abarcar niños/hijos varones sin necesidad de un ajuste más interpretativo.'
  - '''Angustia'' y ''aflicción'' reflejan dos términos distintos y no se fusionan en una sola idea.'
