base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/010.yaml
  text: For the days of the former ones were nineteen jubilees for their lives; but after the Flood they began to diminish from nineteen jubilees, and to grow old quickly, and to shorten the days of their lives because of many afflictions and because of the evil of their ways, except Abraham.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:33Z'
    unchanged: false
    changes_summary: Capitalized 'Flood' as a proper event name and changed 'apart from Abraham' to 'except Abraham' for more natural formal English while preserving the sense.
translation:
  language: es
  text: Porque los días de los antiguos fueron diecinueve jubileos para sus vidas; pero después del Diluvio comenzaron a disminuir a partir de los diecinueve jubileos, y a envejecer rápidamente, y a acortar los días de sus vidas a causa de muchas aflicciones y por la maldad de sus caminos, excepto Abraham.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐሠርቱ ወተስዓቱ ኢዮቤልውሳት
  english_pob_choice: nineteen jubilees
  chosen_spanish: diecinueve jubileos
  alternatives_spanish:
  - diecinueve ciclos jubilares
  - diecinueve períodos jubilares
  lexicon: jubileo
  rationale: Conservo el valor técnico de "jubileos" para el período cronológico del texto, como en el inglés POB, sin sustituirlo por una paráfrasis más general.
- source_word: መዋዕለ፡ ቀደምት፡
  english_pob_choice: the days of the former ones
  chosen_spanish: los días de los antiguos
  alternatives_spanish:
  - los días de los primeros
  - los días de los de antes
  lexicon: día
  rationale: '"Antiguos" refleja bien la referencia a generaciones anteriores y suena natural en español sin perder el contraste temporal del original.'
- source_word: እማንቱ፡ ለሕይወቶሙ፡
  english_pob_choice: for their lives
  chosen_spanish: para su vida
  alternatives_spanish:
  - para sus vidas
  - respecto de su vida
  lexicon: vida
  rationale: El singular colectivo "su vida" comunica de manera natural la duración vital de ese grupo humano, manteniendo la referencia distributiva implícita.
- source_word: ወእምድኅረ፡ አይኅ፡
  english_pob_choice: but after the Flood
  chosen_spanish: pero después del Diluvio
  alternatives_spanish:
  - pero después del Gran Diluvio
  - pero tras el Diluvio
  lexicon: diluvio
  rationale: '"Diluvio" capitalizado sigue la revisión inglesa que lo trata como evento propio, y conserva la referencia al cataclismo bíblico sin añadir términos no presentes.'
- source_word: ይኅትጉ፡
  english_pob_choice: they began to diminish
  chosen_spanish: comenzaron a disminuir
  alternatives_spanish:
  - empezaron a disminuir
  - se fueron reduciendo
  lexicon: disminuir
  rationale: '"Comenzaron a disminuir" reproduce el inicio del proceso expresado por el verbo, en un español claro y fiel al sentido gradual.'
- source_word: ወበረሲአ፡ ፍጡነ፡
  english_pob_choice: and to grow old quickly
  chosen_spanish: y a envejecer rápidamente
  alternatives_spanish:
  - y a hacerse viejos rápidamente
  - y a envejecer pronto
  lexicon: envejecer
  rationale: '"Envejecer rápidamente" mantiene el carácter directo del original y evita explicaciones que suavicen la imagen de deterioro prematuro.'
- source_word: ወለአኅጽጾ፡ መዋዕለ፡ ሕይወቶሙ፡
  english_pob_choice: and to shorten the days of their lives
  chosen_spanish: y a acortar los días de su vida
  alternatives_spanish:
  - y a reducir los días de su vida
  - y a abreviar los días de su vida
  lexicon: acortar
  rationale: '"Acortar" conserva el sentido de reducción de duración vital sin introducir un giro más literario que pudiera oscurecer la imagen.'
- source_word: እምገጸ፡ ሕማም፡ ብዙኅ፡
  english_pob_choice: because of many afflictions
  chosen_spanish: a causa de muchas aflicciones
  alternatives_spanish:
  - por muchas aflicciones
  - a causa de muchos padecimientos
  lexicon: aflicción
  rationale: '"Aflicciones" sigue el campo semántico de sufrimiento y opresión con una palabra idiomática y eclesialmente legible en español.'
- source_word: ወበእከየ፡ ፍናዊሆሙ፡
  english_pob_choice: and because of the evil of their ways
  chosen_spanish: y por la maldad de sus caminos
  alternatives_spanish:
  - y por la maldad de sus senderos
  - y por la perversidad de sus caminos
  lexicon: camino
  rationale: '"Caminos" reproduce la metáfora moral del original; "maldad" preserva el juicio ético sin cargar el texto con un matiz más interpretativo.'
- source_word: ዘእንበለ፡ አብርሃም።
  english_pob_choice: except Abraham
  chosen_spanish: excepto Abraham
  alternatives_spanish:
  - salvo Abraham
  - a excepción de Abraham
  lexicon: excepto
  rationale: '"Excepto Abraham" sigue la revisión inglesa "except Abraham" y es la forma más natural en español para marcar la excepción explícita.'
theological_decisions:
- issue: El alcance de la excepción final respecto a Abraham
  english_pob_reading: except Abraham
  chosen_spanish_reading: excepto Abraham
  alternative_spanish_readings:
  - salvo Abraham
  - a excepción de Abraham
  rationale: Mantengo la excepción en forma absoluta y simple, sin ampliar el texto a una explicación sobre el carácter singular de Abraham, porque el ge'ez y el inglés auditado sólo establecen la excepción, no su motivo doctrinal.
  doctrine_reference: Excepcionalidad de Abraham dentro del patrón general de longevidad postdiluviana; no se añade interpretación extra-textual.
- issue: Capitalización del Diluvio como acontecimiento singular
  english_pob_reading: the Flood
  chosen_spanish_reading: el Diluvio
  alternative_spanish_readings:
  - el diluvio
  - el Gran Diluvio
  rationale: Lo trato como evento histórico definido, en línea con la revisión inglesa que capitaliza 'Flood'. En español, la mayúscula puede quedar implícita por contexto narrativo; el término mismo conserva la referencia al acontecimiento del Génesis.
  doctrine_reference: Narrativa del Diluvio como evento fundacional en la historia bíblica.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del audit trail: la frase inglesa pasó de ''apart from Abraham'' a ''except Abraham'' para mayor naturalidad formal, y también se capitalizó ''Flood'' como evento propio. La versión española refleja ambas decisiones sin añadir contenido interpretativo.'
  spanish_consistency_notes:
  - Conservo 'jubileos' como término técnico, coherente con el inglés POB y el contenido cronológico del ge'ez.
  - Usé 'Diluvio' para el evento singular, evitando una formulación genérica que debilitara la referencia bíblica.
  - Mantuve 'caminos' como metáfora moral, por ser la forma más estable y reconocible en español bíblico sin recurrir a un reemplazo doctrinalmente cargado.
  - No añadí notas a pie de página porque no hay variantes textuales ni ambigüedades decisivas que el español obligue a resolver aparte del texto principal.
