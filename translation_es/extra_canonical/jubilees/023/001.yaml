base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/001.yaml
  text: And he placed Jacob's two fingers upon his eyes, and he blessed the God of gods, and he covered his face and stretched out his feet and slept the sleep of eternity, and was gathered to his fathers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:31Z'
    unchanged: false
    changes_summary: Changed 'the two fingers of Jacob' to 'Jacob's two fingers' for natural English while preserving the same meaning. No other changes needed.
translation:
  language: es
  text: Y puso los dos dedos de sus manos sobre sus ojos, y bendijo al Dios de dioses, y cubrió su rostro, y extendió sus pies, y durmió el sueño de la eternidad, y fue reunido a sus padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአንበረ ... ዲበ አዕይንቲሁ
  english_pob_choice: he placed Jacob's two fingers upon his eyes
  chosen_spanish: puso los dos dedos de Jacob sobre sus ojos
  alternatives_spanish:
  - colocó los dos dedos de Jacob sobre sus ojos
  - puso los dos dedos de Jacob en sus ojos
  lexicon: poner / colocar; dedos; ojos
  rationale: El ge'ez indica una acción física simple de colocar/poner los dos dedos de Jacob sobre los ojos. «Puso» es natural y fiel; «sobre» refleja ዲበ mejor que un «en» más intrusivo.
- source_word: ባረኮ፡ ለአምላክ፡ አማልክት፡
  english_pob_choice: he blessed the God of gods
  chosen_spanish: bendijo al Dios de dioses
  alternatives_spanish:
  - bendijo al Dios de los dioses
  - bendijo al Dios supremo
  lexicon: bendecir; Dios de dioses
  rationale: Se conserva la expresión semítica intensiva «Dios de dioses» tal como la lee POB. «Del os dioses» sería más explícito, pero menos compacto y menos cercano a la forma tradicional de la frase.
- source_word: ወከደነ፡ ገጾ፡
  english_pob_choice: he covered his face
  chosen_spanish: cubrió su rostro
  alternatives_spanish:
  - cubrió su cara
  - cubrió su semblante
  lexicon: cubrir; rostro
  rationale: «Rostro» mantiene un registro bíblico claro y corresponde bien a «face» en un contexto solemne.
- source_word: ወ*ሰፍሐ፡ እገሪሁ፡
  english_pob_choice: and stretched out his feet
  chosen_spanish: y extendió sus pies
  alternatives_spanish:
  - y estiró sus pies
  - y alargó sus pies
  lexicon: extender; pies
  rationale: La frase sigue de cerca la imagen corporal del original y del inglés auditado; «extendió» conserva mejor el tono literario que «estiró».
- source_word: ወኖመ፡ ንዋመ፡ ዘለዓለም፡
  english_pob_choice: and slept the sleep of eternity
  chosen_spanish: y durmió el sueño de la eternidad
  alternatives_spanish:
  - y durmió el sueño eterno
  - y se durmió para siempre
  lexicon: sleep; eternity
  rationale: Se conserva la formulación poética del texto y la elección inglesa. «De la eternidad» reproduce con mayor literalidad la construcción, sin perder inteligibilidad.
- source_word: ወተጋብአ፡ *ኀበ፡ አበዊሁ
  english_pob_choice: and was gathered to his fathers
  chosen_spanish: y fue reunido con sus padres
  alternatives_spanish:
  - y se reunió con sus padres
  - y fue recogido entre sus padres
  lexicon: gathered; fathers
  rationale: «Fue reunido con sus padres» conserva la fórmula bíblica tradicional y refleja la pasiva del original mejor que una forma reflexiva.
theological_decisions:
- issue: La frase «Dios de dioses» puede leerse como título de supremacía o como expresión de pluralidad divina retórica.
  english_pob_reading: the God of gods
  chosen_spanish_reading: el Dios de dioses
  alternative_spanish_readings:
  - el Dios supremo
  - el Dios por encima de todos los dioses
  rationale: Se mantiene la tensión del original y de la traducción inglesa auditada sin neutralizar el lenguaje comparativo del texto. En español, «Dios de dioses» preserva la fuerza del título y deja abierta la lectura de supremacía.
  doctrine_reference: Deuteronomio 10:17; Salmo 136:2
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la posesión en «Jacob's two fingers» para naturalidad; la sustancia semántica no cambió. La versión española refleja directamente ese mismo sentido posesivo sin necesidad de marcar variante textual.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים/אֱלָהָא en el título «Dios de dioses», coherente con el estándar del proyecto.
  - «Rostro» se prefiere a «cara» por registro reverente y consistencia bíblica.
  - La pasiva «fue reunido con sus padres» conserva la fórmula funeraria tradicional sin reinterpretarla.
