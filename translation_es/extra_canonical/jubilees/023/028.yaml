translation:
  language: es
  text: Y en aquellos días los hijos comenzarán a buscar la ley, y a buscar los mandamientos, y a volver al camino de la justicia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ደቂቅ
  english_pob_choice: the children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los descendientes
  lexicon: 'Ge''ez ደቂቅ; English POB: children'
  rationale: En este contexto legal-moral, 'hijos' mantiene la referencia colectiva a la descendencia o generación, sin infantilizar indebidamente el sentido. 'Niños' sería posible, pero suena menos natural para una generalización histórica; 'descendientes' explicita más de lo necesario.
- source_word: ሕገገ
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la Torá
  lexicon: 'Ge''ez ሕግ / ሕገገ; English POB: law'
  rationale: '''La ley'' corresponde directamente al valor jurídico-religioso del término y coincide con la opción auditada del inglés. ''La Torá'' sería demasiado específica y menos transparente para una traducción general; ''instrucción'' suaviza en exceso el matiz normativo.'
- source_word: ትእዛዝ
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  lexicon: 'Ge''ez ትእዛዝ; English POB: commandments'
  rationale: '''Mandamientos'' preserva el carácter normativo y es la equivalencia más natural en español bíblico moderno. ''Preceptos'' es posible, pero menos directo; ''mandatos'' pierde la resonancia bíblica habitual.'
- source_word: ውስተ፡ ፍኖተ፡ ጽድቅ
  english_pob_choice: the way of righteousness
  chosen_spanish: el camino de la justicia
  alternatives_spanish:
  - el camino de la rectitud
  - la senda de la justicia
  lexicon: 'Ge''ez construct with ''way/path'' + ''righteousness''; English POB: way of righteousness'
  rationale: '''Camino'' reproduce bien la metáfora del original y del inglés. Para ጽድቅ, ''justicia'' conserva el campo moral y covenantal; ''rectitud'' también sería válida, pero ''justicia'' mantiene mejor la conexión bíblica amplia. Se evita ''senda'' por estilo menos natural en español contemporáneo.'
theological_decisions:
- issue: Relación entre 'ley', 'mandamientos' y 'camino de la justicia'
  english_pob_reading: 'The verse presents a sequence of renewed pursuit: search the law, seek the commandments, return to the way of righteousness.'
  chosen_spanish_reading: 'El versículo presenta una secuencia de renovación: buscar la ley, buscar los mandamientos y volver al camino de la justicia.'
  alternative_spanish_readings:
  - '...y regresar al camino de la justicia'
  - '...y volver al sendero de la justicia'
  rationale: Se mantiene la progresión de búsqueda y retorno sin introducir una interpretación más doctrinal de la necesaria. 'Volver' conserva el movimiento de regreso implícito en el texto; 'regresar' es equivalente, pero 'volver' encaja mejor con el ritmo de la frase.
  doctrine_reference: Sabiduría/obediencia pactual; lenguaje de retorno moral sin explicitación doctrinal adicional.
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa auditada sin cambios de revisión: no hubo notas previas ni variantes textuales adicionales en el paquete, y el cotejo indicó alto acuerdo.'
  spanish_consistency_notes:
  - Se mantuvo 'ley' y 'mandamientos' como términos normativos diferenciados, tal como en el inglés auditado.
  - '''Justicia'' se eligió para ጽድቅ por coherencia con el vocabulario bíblico de rectitud/justicia sin perder naturalidad en español.'
  - No se introdujeron notas críticas porque el paquete no reporta variantes ni tensiones textuales adicionales.
