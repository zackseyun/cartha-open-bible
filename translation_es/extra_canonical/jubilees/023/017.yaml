  to: Y en aquella generación los niños[a] reprocharán a sus padres y a sus ancianos por el pecado, por la injusticia, por las palabras de su boca y por los grandes males que ellos cometen; y porque han abandonado el pacto que Yahvé hizo entre ellos y él mismo, para que guardaran y cumplieran todos sus mandamientos, sus ordenanzas y toda su ley, sin desviarse a la derecha ni a la izquierda.
