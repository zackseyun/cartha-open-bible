base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/017.yaml
  text: And in that generation children will reproach their fathers and their elders because of sin and because of injustice and because of the speech of their mouth and because of the great evils that they commit, and because they have forsaken the covenant that the LORD made between them and himself, that they should keep and do all his commandments and his ordinances and all his law, without turning aside to the right hand or to the left.
  footnotes:
  - marker: a
    text: Or 'sons'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:36Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y en aquella generación los niños[a] reprocharán a sus padres y a sus ancianos por el pecado, por la injusticia, por las palabras de su boca y por los grandes males que ellos cometen; y porque han abandonado el pacto que Yahvé hizo entre ellos y él mismo, para que guardaran y cumplieran todos sus mandamientos, sus ordenanzas y toda su ley, sin desviarse a la derecha ni a la izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos». El término ge'ez ደቂቅ puede referirse a niños o hijos; el POB inglés revisó una versión anterior de «sons» a «children» para reflejar mejor ese sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ደቂቅ
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendencia
  lexicon: N/A
  rationale: El audit trail inglés revisó 'sons' a 'children' por el sentido primario de ደቂቅ como 'children'/'little ones'. En español, 'hijos' conserva esa amplitud natural y mantiene el contraste con 'padres' y 'ancianos' sin restringir indebidamente el referente a varones.
- source_word: ኀጢአት
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - error
  lexicon: N/A
  rationale: '''Pecado'' es el equivalente bíblico estándar en español y preserva la fuerza moral y religiosa del término.'
- source_word: ዐመፃ
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - opresión
  lexicon: N/A
  rationale: '''Injusticia'' sigue de cerca el valor de la lectura inglesa y mantiene el matiz legal/moral de la transgresión.'
- source_word: ነባበ፡ አፉሆሙ
  english_pob_choice: the speech of their mouth
  chosen_spanish: las palabras de su boca
  alternatives_spanish:
  - el hablar de su boca
  - lo que sale de su boca
  lexicon: N/A
  rationale: La construcción ge'ez enfatiza el habla pronunciada; 'las palabras de su boca' reproduce esa imagen de forma clara y fiel en español.
- source_word: እኩያት ዐበይት
  english_pob_choice: the great evils
  chosen_spanish: los grandes males
  alternatives_spanish:
  - las grandes maldades
  - los graves males
  lexicon: N/A
  rationale: '''Males'' refleja el campo semántico de daño/maldad y ''grandes'' conserva el calificativo intensificador del original y del inglés POB.'
- source_word: ኀደገቶሙ ሥርዐተ
  english_pob_choice: they have forsaken the covenant
  chosen_spanish: han abandonado el pacto
  alternatives_spanish:
  - han dejado el pacto
  - han desechado el pacto
  lexicon: N/A
  rationale: La frase ge'ez indica abandono del pacto; 'abandonado' conserva bien la ruptura relacional y pactal que el inglés POB marca como 'forsaken'.
- source_word: ዘኮነኖይ እግዚአብሔር
  english_pob_choice: the LORD made
  chosen_spanish: Yahvé hizo
  alternatives_spanish:
  - el Yahvé hizo
  - el Señor hizo
  lexicon: N/A
  rationale: Se emplea 'Yahvé' conforme al estándar español del proyecto para el nombre divino en el texto principal. 'Hizo' traduce la acción de establecer/crear el pacto en la formulación dada.
- source_word: ትእዛዘ
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: N/A
  rationale: '''Mandamientos'' es el equivalente más natural y estable en español bíblico para los requerimientos divinos.'
- source_word: ወሥርዐተ
  english_pob_choice: ordinances
  chosen_spanish: ordenanzas
  alternatives_spanish:
  - estatutos
  - decretos
  lexicon: N/A
  rationale: '''Ordenanzas'' mantiene la distinción tradicional entre mandamientos, ordenanzas y ley sin perder inteligibilidad.'
- source_word: ሕገ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - torá
  - instrucción
  lexicon: N/A
  rationale: '''Ley'' corresponde directamente al inglés auditado y es comprensible en español, aunque ''instrucción'' sería posible en algunos contextos.'
theological_decisions:
- issue: Nombre divino en el pacto
  english_pob_reading: the LORD made between them and himself
  chosen_spanish_reading: Yahvé hizo entre ellos y él mismo
  alternative_spanish_readings:
  - el Señor hizo entre ellos y él mismo
  rationale: El proyecto exige 'Yahvé' para יהוה; aquí el pacto se presenta como establecido por Dios mismo, por lo que se conserva la referencia personal explícita sin sustituirla por una máscara litúrgica.
  doctrine_reference: Convención terminológica del People's Open Bible para el tetragrámaton; coherencia intraobra.
- issue: Human age/sex reference in ደቂቅ
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - niños
  - descendientes
  rationale: Aunque el inglés POB optó por 'children', en español 'hijos' evita la posible connotación de infancia y conserva la referencia filial amplia, compatible con el paralelo con 'padres' y 'ancianos'.
  doctrine_reference: Lectura lexical basada en la revisión auditada del valor de ደቂቅ como 'children'.
- issue: Final idiom of non-deviation
  english_pob_reading: without turning aside to the right hand or to the left
  chosen_spanish_reading: sin desviarse a la derecha ni a la izquierda
  alternative_spanish_readings:
  - sin apartarse a la derecha ni a la izquierda
  - sin torcerse a derecha o izquierda
  rationale: La fórmula idiomática se conserva con una equivalencia muy cercana y natural; 'desviarse' comunica la imagen de apartarse del camino recto sin introducir interpretación adicional.
  doctrine_reference: Fidelidad a fórmula bíblica idiomática tradicional con claridad moderna.
translation_notes:
  revision_awareness: El inglés POB revisó 'sons' a 'children' a partir de ደቂቅ; la versión española refleja esa decisión con 'hijos', que mantiene la amplitud referencial y la naturalidad del español. No se detectaron otras revisiones sustantivas en el audit trail más allá de la preferencia léxica ya resuelta.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se preserva la triple serie 'mandamientos, ordenanzas y ley' para reflejar la enumeración del texto fuente.
  - '''Hijos'' se usa aquí como equivalente amplio de ''children'' sin restringir el sentido a varones o menores de edad.'
