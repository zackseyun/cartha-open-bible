base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/013.yaml
  text: And in those days, if a man lives a jubilee and a half of years, they will say of him, “He has lived long”; but most of his days are pain and labor and distress, and there is no peace.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:35Z'
    unchanged: false
    changes_summary: Replaced 'yet' with 'but' for a more straightforward formal register, and changed 'toil' to 'labor' for closer lexical correspondence to the source.
translation:
  language: es
  text: 'Y en aquellos días, si un hombre vive un jubileo y medio de años, dirán de él: «Ha vivido mucho»; pero la mayor parte de sus días son dolor, labor y angustia, y no hay paz.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እመ፡ ሐይወ፡ ብእሲ፡
  english_pob_choice: if a man lives
  chosen_spanish: si un hombre vive
  alternatives_spanish:
  - si una persona vive
  - si alguien vive
  lexicon: hombre
  rationale: El geʽez usa una formulación genérica para un ser humano varón/individuo; el inglés POB mantiene 'a man'. En español, 'un hombre' conserva la fuerza genérica y el paralelismo bíblico sin añadir connotaciones innecesarias.
- source_word: ኢዮቤልወ፡ ወመንፈቀ፡ ዓመታት፡
  english_pob_choice: a jubilee and a half of years
  chosen_spanish: un jubileo y medio de años
  alternatives_spanish:
  - un jubileo y medio
  - un jubileo y medio de años
  lexicon: jubileo
  rationale: Se conserva 'jubileo' como término técnico y se añade 'de años' porque la frase fuente lo explicita. 'Un jubileo y medio' es natural, pero la adición mantiene la correspondencia lexical completa con el original.
- source_word: ይብሉ፡ በእንቲአሁ፡
  english_pob_choice: they will say of him
  chosen_spanish: dirán de él
  alternatives_spanish:
  - dirán acerca de él
  - dirán sobre él
  lexicon: decir
  rationale: La construcción española más directa y fiel es 'dirán de él', que reproduce la referencia personal implícita del original sin sobreexplicarla.
- source_word: አብዝኀ፡ ሐይወ፡
  english_pob_choice: He has lived long
  chosen_spanish: Ha vivido mucho
  alternatives_spanish:
  - Ha vivido largo tiempo
  - Ha vivido por mucho tiempo
  lexicon: vivir
  rationale: '''Ha vivido mucho'' conserva el valor idiomático de longevidad que el inglés POB ya formuló como ''He has lived long''. En español suena natural y no desplaza el sentido temporal.'
- source_word: ሕማም፡
  english_pob_choice: pain
  chosen_spanish: dolor
  alternatives_spanish:
  - pena
  - sufrimiento
  lexicon: dolor
  rationale: '''Dolor'' es la correspondencia más directa y amplia para el término físico/aflictivo del original y de la tradición textual, manteniendo el paralelismo con las otras aflicciones.'
- source_word: ወስራሕ፡
  english_pob_choice: labor
  chosen_spanish: labor
  alternatives_spanish:
  - trabajo
  - fatiga
  lexicon: labor
  rationale: Se conserva 'labor' porque el inglés POB ya lo ajustó desde 'toil' a un término más formal y cercano al original. En español, 'labor' es digno, bíblico y transmite esfuerzo sostenido.
- source_word: ወምንዳቤ፡
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - tribulación
  lexicon: angustia
  rationale: '''Angustia'' expresa opresión interior y aflicción externa a la vez, y funciona bien en la tríada con ''dolor'' y ''labor''. Mantiene el tono solemne del texto.'
- source_word: አልቦ፡ ሰላመ።
  english_pob_choice: there is no peace
  chosen_spanish: no hay paz
  alternatives_spanish:
  - no existe paz
  - no hay tranquilidad
  lexicon: paz
  rationale: Se mantiene la negación simple del original y la formulación idiomática española más natural. 'Paz' conserva la amplitud semántica del geʽez.
theological_decisions:
- issue: Descripción de la vejez como mezcla de longevidad y aflicción
  english_pob_reading: they will say of him, “He has lived long”; but most of his days are pain and labor and distress, and there is no peace.
  chosen_spanish_reading: 'dirán de él: «Ha vivido mucho»; pero la mayor parte de sus días son dolor, labor y angustia, y no hay paz.'
  alternative_spanish_readings:
  - 'dirán de él: «Ha vivido largo tiempo»; pero la mayor parte de sus días son dolor, trabajo y angustia, y no hay paz.'
  rationale: 'La redacción conserva la tensión del pasaje: reconocimiento social de longevidad, pero valoración real de la vida como marcada predominantemente por sufrimiento. No se suaviza la afirmación final de ausencia de paz.'
  doctrine_reference: Observación sapiencial/antropológica; no implica una doctrina sistemática específica, pero sí una antropología de la fragilidad humana.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail en el punto léxico de 'labor' frente a 'toil', manteniendo un registro formal y correspondencia más cercana al original; también conserva 'but' como contraste simple, reflejado en español con 'pero'.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico formal sin arcaísmos innecesarios.
  - '''Jubileo'' se conserva como término técnico, no como simple sinónimo de celebración.'
  - No se insertó 'SEÑOR' ni terminología cristianizada, porque el pasaje no contiene el Tetragrámaton ni un título divino explícito.
  - La puntuación sigue un español de lectura pública, con comillas angulares para el discurso directo.
