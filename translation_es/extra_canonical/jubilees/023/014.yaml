base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/014.yaml
  text: 'For blow upon blow, and wound upon wound, and distress upon distress, and evil report upon evil report, and sickness upon sickness, and every evil like these, one with another: disease and collapse and frost and hail and snow and fever and chills and stupor and famine and death and sword and captivity and every affliction and sickness.'
  footnotes:
