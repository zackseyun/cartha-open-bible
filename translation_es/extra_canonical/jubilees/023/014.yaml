    timestamp: '2026-04-23T14:50:34Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Porque golpe sobre golpe, y herida sobre herida, y angustia sobre angustia, y mala nueva sobre mala nueva, y enfermedad sobre enfermedad; y todo mal semejante a estos, uno junto a otro[a]: enfermedad y colapso y helada y granizo y nieve y fiebre y escalofríos y estupor y hambre y muerte y espada y cautiverio, y toda plaga y dolencia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Representación anterior al borrador revisado (2026-04-28): «y todo mal semejante a estos: enfermedad y colapso y helada y fiebre y plaga y golpe de espada y cautiverio». La revisión de nivel 2 restauró del Ge''ez la frase ዝንቱ ምስለ ዝንቱ («uno junto a otro») y seis términos omitidos en el borrador previo: granizo (በረድ), nieve (ሐመዳ), escalofríos (ስክሕካሕ), estupor (ሰምዛዝ), hambre (ዐባር) y muerte (ሞት); asimismo eliminó «plaga» que era una adición sin respaldo en la fuente Ge''ez.'
    reason: alternative_reading
lexical_decisions:
- source_word: መቅሠፍት (mäqśäft)
  english_pob_choice: blow (anaphoric); affliction (final enumeration)
  chosen_spanish: golpe (anaphoric) / plaga (final)
  alternatives_spanish:
  - azote
  - aflicción
  - castigo
  - llaga
  lexicon: Charles 1895; Leslau, CDG s.v. ቀሠፈ (to strike/scourge)
  rationale: El término Ge'ez መቅሠፍት deriva del verbo ቀሠፈ ('golpear/azotar') y denota tanto el acto percusivo como el resultado (plaga/azote). En la estructura anafórica inicial se prioriza el sentido activo del impacto ('golpe sobre golpe'), que en español transmite bien la imagen acumulativa. En la cláusula final (ኵሉ፡ መቅሠፍት, 'every affliction'), se prefiere 'toda plaga' para distinguir del uso anterior y capturar el sentido recapitulativo más amplio.
- source_word: ቍስላን (qʷɪslan)
  english_pob_choice: wound
  chosen_spanish: herida
  alternatives_spanish:
  - llaga
  - lesión
  lexicon: Charles 1895; Leslau, CDG s.v. ቈሰለ (to wound)
  rationale: '''Herida'' es el equivalente estándar en español bíblico para el término Ge''ez de lesión física. ''Llaga'' sería más específico a úlceras/llagas abiertas y no captura la amplitud del término.'
- source_word: ምንዳቤ (mɪndabé)
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - tribulación
  - sufrimiento
  - aflicción
  - pena
  lexicon: Charles 1895; Leslau, CDG s.v. ምንዳቤ (distress, tribulation, sorrow)
  rationale: '''Angustia'' captura el sentido de opresión interior y sufrimiento acuciante del Ge''ez ምንዳቤ. ''Tribulación'' suena más técnico-teológico y es menos natural en español moderno; ''sufrimiento'' es demasiado genérico. ''Angustia'' preserva la carga emocional y física del término.'
- source_word: ስምዐት፡ እኩይ (sɪmʿat ʾɪkuy)
  english_pob_choice: evil report
  chosen_spanish: mala nueva
  alternatives_spanish:
  - mala noticia
  - mal informe
  - malas noticias
  lexicon: Charles 1895; Leslau, CDG s.v. ሰምዐ (to hear; report, tidings)
  rationale: El compuesto Ge'ez ስምዐት (acto de oír / noticia) + እኩይ (malo/perverso) equivale a 'informe/noticia mala'. Se prefiere 'mala nueva' por su registro bíblico clásico en español (cf. Sal 112:7; Is 52:7), apropiado para Jubileos como texto del Segundo Templo. 'Mala noticia' sería igualmente válida pero con registro más cotidiano.
- source_word: ዝንቱ፡ ምስለ፡ ዝንቱ (zɪntu mɪslä zɪntu)
  english_pob_choice: one with another
  chosen_spanish: uno junto a otro
  alternatives_spanish:
  - esto con esto
  - uno con otro
  - cada cual con el otro
  - unos sobre otros
  lexicon: Charles 1895; Leslau, CDG s.v. ምስለ (with, together with)
  rationale: La frase Ge'ez ዝንቱ ምስለ ዝንቱ es literalmente 'este con este / esto con esto'. El POB inglés lo rinde 'one with another', enfatizando la combinación y acumulación mutua de males. Se adopta 'uno junto a otro' que preserva el sentido cumulativo y la sintaxis natural en español sin calco literal. Esta frase fue omitida en el borrador anterior y restaurada en la revisión de nivel 2 (2026-04-28) como corrección de traducción.
- source_word: ጕፍጥአት (gʷɪftʾat)
  english_pob_choice: collapse
  chosen_spanish: colapso
  alternatives_spanish:
  - postración
  - derrumbe
  - abatimiento
  - desplome
  lexicon: Charles 1895; Leslau, CDG s.v. ጐፈጠ (to prostrate, knock down)
  rationale: El término refiere al derrumbamiento o postración física. 'Colapso' sigue el POB inglés y es ampliamente comprensible en español moderno en contexto de enfermedades y calamidades. 'Postración' sería igualmente válida y más clásica.
- source_word: አስሕትያ (ʾasɪħtɪya)
  english_pob_choice: frost
  chosen_spanish: helada
  alternatives_spanish:
  - escarcha
  - frío extremo
  - hielo
  lexicon: Charles 1895; Leslau, CDG s.v. ሐሠተ (cold, frost)
  rationale: '''Helada'' (frost/freeze) es el equivalente natural en español para el fenómeno climático dañino del frío extremo. ''Escarcha'' es más específica (hoarfrost visible) y no implica necesariamente daño; ''helada'' cubre el fenómeno destructivo de las temperaturas bajo cero, apropiado en una lista de calamidades.'
- source_word: ስክሕካሕ (sɪkħɪkaħ — reduplicative form)
  english_pob_choice: chills
  chosen_spanish: escalofríos
  alternatives_spanish:
  - temblores
  - tiritera
  - estremecimiento
  lexicon: Charles 1895; Leslau, CDG (reduplicative formation indicating shivering/chills)
  rationale: La forma reduplica la raíz expresando el movimiento iterado del temblor/escalofrío. 'Escalofríos' es el término más natural y reconocible en español para el síntoma de temblores febriles (chills). 'Tiritera' es más coloquial; 'estremecimiento' abarca también terror emocional.
- source_word: ሰምዛዝ (sämazaz)
  english_pob_choice: stupor
  chosen_spanish: estupor
  alternatives_spanish:
  - vértigo
  - aturdimiento
  - torpor
  - sopor
  lexicon: Charles 1895; Leslau, CDG s.v. ሰምዘዘ (to be dizzy, stupefied, bewildered)
  rationale: '''Estupor'' es un latinismo compartido entre español e inglés que captura el sentido de entorpecimiento extremo/aturdimiento. Coherente con el POB inglés. ''Sopor'' (deep sleep/torpor) sería igualmente válido; ''vértigo'' sugiere principalmente mareo rotatorio y es más estrecho.'
- source_word: ዐባር (ʿäbar)
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - carestía
  - sequía
  lexicon: Charles 1895; Leslau, CDG s.v. ዐበረ (to be hungry; drought, famine)
  rationale: '''Hambre'' es el término más directo y natural en español para ዐባር. ''Hambruna'' enfatiza el alcance masivo y también sería válida; ''carestía'' se centra en escasez sin necesariamente implicar inanición. ''Sequía'' es una causa posible pero no el sentido principal del término aquí.'
- source_word: መጥባሕት (mäṭbaħt)
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - cuchilla
  - matanza
  - degüello
  lexicon: Charles 1895; Leslau, CDG s.v. ጠበሐ (to slaughter; sword, slaughter)
  rationale: El término Ge'ez refiere al instrumento de matanza/espada. 'Espada' sigue el POB inglés y es el término bíblico estándar en español para las calamidades de guerra y violencia (cf. Deut 28:22 RV). La connotación de matanza queda implícita en el contexto.
- source_word: ፂዋዌ (ṣɪwawé)
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - cautividad
  - deportación
  - exilio
  lexicon: Charles 1895; Leslau, CDG s.v. ጸዋ/ፀወ (exile, captivity)
  rationale: '''Cautiverio'' es el término estándar en español bíblico para el estado de ser llevado prisionero o deportado. Preferido sobre ''cautividad'' (más abstracto) y ''exilio'' (que no captura la dimensión de coerción y sometimiento).'
- source_word: ሕማም (ħɪmam)
  english_pob_choice: sickness
  chosen_spanish: dolencia
  alternatives_spanish:
  - enfermedad
  - malestar
  - achaque
  lexicon: Charles 1895; Leslau, CDG s.v. ሐምዐ (to be sick, in pain; disease, ailment)
  rationale: Para distinguir ሕማም del ደዌ anterior (ambos traducidos 'sickness' en el POB inglés sin diferenciarlos léxicamente), se usa 'dolencia' al cierre de la lista. ደዌ → 'enfermedad' (condición de enfermedad/disease); ሕማም → 'dolencia' (aflicción/ailment con énfasis en el sufrimiento subjetivo). Esto preserva la distinción léxica Ge'ez que el inglés nivela.
translation_notes:
  revision_awareness: El borrador español sigue el texto revisado (revisión de nivel 2, 2026-04-28, adjudicado por auto_apply_tier2_source_grounded sobre revisión de gemini-3.1-pro-preview). La revisión corrigió seis omisiones del listado Ge'ez (granizo/በረድ, nieve/ሐመዳ, escalofríos/ስክሕካሕ, estupor/ሰምዛዝ, hambre/ዐባር, muerte/ሞት), añadió la frase ዝንቱ ምስለ ዝንቱ («uno junto a otro») y suprimió el término «plaga» que no tiene respaldo en la fuente. Estos cambios están reflejados íntegramente en el texto español y documentados en la nota [a]. El cruce de verificación (cross_check_summary) muestra acuerdo 0,95 con problemas menores, sin ningún elemento de la versión anterior retenido en el presente borrador.
  spanish_consistency_notes:
  - No aparece el nombre divino יהוה/YHWH en este pasaje; la directriz de proyecto 'Yahvé' no aplica aquí.
  - No hay terminología cristológica ni pneumatológica en este versículo; las directrices de proyecto sobre Mesías/Cristo y Espíritu no aplican.
  - 'El patrón anafórico «X sobre X» (Ge''ez: ዲበ) es un recurso retórico semítico de intensificación acumulativa; se reproduce con la preposición «sobre» en español, solución natural y reconocible en el registro bíblico (cf. Ez 7:26).'
  - La lista de calamidades del Jub 23:14 tiene paralelismos tipológicos con las listas de maldiciones deuteronómicas (Deut 28:22, 27-28, 59-61), hecho relevante para notas de estudio futuras aunque no altera las decisiones léxicas del presente borrador.
  - 'Se distinguen léxicamente los dos términos Ge''ez para enfermedad/dolencia: ደዌ → ''enfermedad'' (condición patológica), ሕማም → ''dolencia'' (sufrimiento/ailment); el inglés POB no mantiene esta distinción de forma consistente.'
  - La puntuación española usa punto y coma para separar la secuencia anafórica de la lista detallada, y dos puntos para introducir el inventario de calamidades, siguiendo la estructura sintáctica del Ge'ez.
