base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/018.yaml
  text: For all of them have acted wickedly, and every mouth speaks sin, and all their works are uncleanness and abomination, and all their ways are defilement and uncleanness and destruction.
  footnotes:
  - marker: a
    text: Or 'uncleanness and corruption'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:36Z'
    unchanged: false
    changes_summary: Replaced 'guilt' with 'sin' for a more direct rendering of the source term, and 'ruin' with 'destruction' for a more formal and natural translation of the final term. Kept the overall structure unchanged.
translation:
  language: es
  text: Porque todos han obrado perversamente, y toda boca pronuncia pecado, y todas sus obras son inmundicia y abominación[a], y todos sus caminos son mancha e inmundicia y destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inmundicia y corrupción».
    reason: Preserva la alternativa léxica documentada en el rastro de auditoría del English POB para esta frase.
lexical_decisions:
- source_word: እስመ / For
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conjunction causal
  rationale: El Ge'ez introduce la explicación causal del juicio descrito; «porque» comunica de manera natural esa relación sin añadir matiz interpretativo.
- source_word: ኵሎሙ / all of them
  english_pob_choice: all of them
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la totalidad de ellos
  lexicon: quantifier pronoun
  rationale: «Todos» conserva la fuerza distributiva del original y suena más fluido en español bíblico contemporáneo.
- source_word: አእከዩ / have acted wickedly
  english_pob_choice: have acted wickedly
  chosen_spanish: han obrado perversamente
  alternatives_spanish:
  - han actuado malvadamente
  - han hecho mal
  lexicon: verb of moral action
  rationale: «Obrado perversamente» preserva el registro moral fuerte de la frase y evita debilitar el juicio a un simple error moral.
- source_word: ወኵሉ አፍ / every mouth
  english_pob_choice: every mouth
  chosen_spanish: toda boca
  alternatives_spanish:
  - cada boca
  - toda lengua
  lexicon: metonymy
  rationale: 'Se mantiene la metáfora corporal del original: «boca» como metonimia de la persona que habla.'
- source_word: ይትናገር ዐበሳ / speaks sin
  english_pob_choice: speaks sin
  chosen_spanish: habla pecado
  alternatives_spanish:
  - pronuncia pecado
  - habla de pecado
  lexicon: speech + moral noun
  rationale: El texto dice que la boca «habla» una realidad moral; «habla pecado» conserva la construcción simple y la fuerza directa del enunciado.
- source_word: ወኵሉ ግብሮሙ / all their works
  english_pob_choice: all their works
  chosen_spanish: todas sus obras
  alternatives_spanish:
  - todas sus acciones
  - todo lo que hacen
  lexicon: deeds/works
  rationale: «Obras» corresponde de manera transparente a acciones o hechos realizados, manteniendo el paralelismo con las frases siguientes.
- source_word: ርኵስ / uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - suciedad
  lexicon: ritual/moral impurity
  rationale: «Inmundicia» refleja la carga ritual y moral del término mejor que un equivalente higiénico o demasiado abstracto.
- source_word: ወስቈራር / abomination
  english_pob_choice: abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - horror
  - repugnancia
  lexicon: cultic/moral abhorrence
  rationale: La revisión auditada favorece «abominación» por su fuerza lexical y su correspondencia con el valor de repulsión moral/cúltica del término ge'ez.
- source_word: ግማኔ / defilement
  english_pob_choice: defilement
  chosen_spanish: mancha
  alternatives_spanish:
  - contaminación
  - profanación
  lexicon: pollution/defilement
  rationale: «Mancha» comunica de forma natural la idea de contaminación moral sin sobrecargar el verso con tecnicismos.
- source_word: ወሙስና / destruction
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - aniquilación
  lexicon: ruin/destruction
  rationale: Se sigue la revisión más reciente que prefirió «destruction»; «destrucción» es el equivalente español más directo y formal.
theological_decisions:
- issue: Acumulación de términos morales y cultuales
  english_pob_reading: all their works are uncleanness and abomination, and all their ways are defilement and uncleanness and destruction
  chosen_spanish_reading: todas sus obras son inmundicia y abominación, y todos sus caminos son mancha e inmundicia y destrucción
  alternative_spanish_readings:
  - todas sus obras son impureza y horror, y todos sus caminos son contaminación e impureza y ruina
  rationale: Se conserva la acumulación intensiva del original sin suavizarla. El español mantiene la escalera de términos negativos para no perder la fuerza moral del juicio.
  doctrine_reference: Pureza ritual y moral en lenguaje bíblico apocalíptico/sapiencial
- issue: Mouth as metonymy for speech
  english_pob_reading: every mouth speaks sin
  chosen_spanish_reading: toda boca habla pecado
  alternative_spanish_readings:
  - cada boca pronuncia pecado
  - toda lengua habla pecado
  rationale: La imagen no se explica ni se sustituye por una abstracción; la boca permanece como figura de la expresión humana que produce pecado.
  doctrine_reference: Uso bíblico de metonimia corporal para responsabilidad moral
- issue: Final term rendered as destruction
  english_pob_reading: destruction
  chosen_spanish_reading: destrucción
  alternative_spanish_readings:
  - ruina
  - perdición
  rationale: La revisión textual favorece una conclusión fuerte y formal. «Destrucción» evita que el final quede demasiado interpretativo y mantiene la gradación negativa.
  doctrine_reference: Juicio divino y consecuencias de la impureza
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB que sustituyó «guilt» por «sin» y «ruin» por «destruction», y también la adjudicación lexical posterior que elevó ስቈራር a «abomination». No se añadió nota al pie porque el texto español queda suficiente y no se requiere una variante anclada.
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de tres miembros: obras / caminos / boca.'
  - Se evitó «SEÑOR» u otra convención no presente en el verso.
  - «Inmundicia» se usa de manera consistente para ርኵስ en ambas ocurrencias.
  - «Destrucción» cierra el verso con el mismo valor fuerte que la revisión inglesa final.
  - El registro es bíblico contemporáneo, no arcaizante, pero conserva solemnidad.
