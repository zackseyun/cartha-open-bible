base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/022.yaml
  text: And those who have escaped will not turn from their wickedness to the way of righteousness, because all of them will rise up for deceit and wealth, each to seize all that belongs to his neighbor; and they will make a great name for themselves, but not in truth and not in righteousness; and they will profane the holy of holies with their uncleanness and with the corruption of their defilement.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:38Z'
    unchanged: false
    changes_summary: Changed 'return from their wickedness into the way of righteousness' to 'turn from their wickedness to the way of righteousness' for more natural English and closer sense.
translation:
  language: es
  text: Y los que hayan escapado no se volverán de su maldad al camino de la justicia, porque todos se levantarán para el engaño y la riqueza; cada uno para apoderarse de todo lo que pertenece a su vecino; y se harán un gran nombre, pero no en verdad ni en justicia; y profanarán el santo de los santos con su inmundicia y con la corrupción de su impureza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፍኖተ፡ ጽድቅ፡
  english_pob_choice: the way of righteousness
  chosen_spanish: el camino de la justicia
  alternatives_spanish:
  - el camino de la rectitud
  - la senda de la justicia
  lexicon: ጽድቅ = justicia / rectitud
  rationale: Conservo la imagen de “camino” y traduzco ጽድቅ como “justicia”, que en español bíblico mantiene bien el valor ético y jurídico del término sin volver la frase demasiado abstracta. “Rectitud” sería posible, pero aquí “justicia” encaja mejor con el contraste moral del pasaje.
- source_word: ኢይትመየጡ፡
  english_pob_choice: will not turn
  chosen_spanish: no se volverán
  alternatives_spanish:
  - no se apartarán
  - no regresarán
  lexicon: volverse / apartarse
  rationale: Sigo la revisión inglesa que prefirió “turn” frente a “return” por sentido más natural y más cercano al giro semítico. En español, “no se volverán” expresa bien el movimiento moral de apartarse sin añadir un matiz de regreso físico que el contexto no exige.
- source_word: እከዮሙ፡
  english_pob_choice: their wickedness
  chosen_spanish: su maldad
  alternatives_spanish:
  - su perversidad
  - su impiedad
  lexicon: maldad / perversidad
  rationale: “Maldad” es la opción más clara y sobria en español para እከይ en este contexto. Mantiene el juicio moral general del texto sin cargarlo con un tecnicismo innecesario.
- source_word: በፍኖተ፡ ጽድቅ፡
  english_pob_choice: the way of righteousness
  chosen_spanish: el camino de la justicia
  alternatives_spanish:
  - la senda de la rectitud
  - el sendero de la justicia
  lexicon: camino / senda
  rationale: Repito la misma solución para conservar la estructura del paralelismo y la claridad del castellano. “Camino” es más idiomático que “sendero” en este registro.
- source_word: ወበሙስና፡ ግማኔሆሙ።
  english_pob_choice: with the corruption of their defilement
  chosen_spanish: con la corrupción de su contaminación
  alternatives_spanish:
  - con la corrupción de su impureza
  - con la podredumbre de su inmundicia
  lexicon: mūsna / contaminación
  rationale: “Contaminación” traduce bien la idea de impureza ritual o moral sin perder la fuerza del término. “Corrupción” conserva el desdoblamiento intensivo del original y el inglés POB, aunque la combinación suena severa en español; por eso mantengo ambas palabras.
- source_word: ወቅድስተ፡ ቅዱሳን፡
  english_pob_choice: the holy of holies
  chosen_spanish: el santo de los santos
  alternatives_spanish:
  - el lugar santísimo
  - el santísimo
  lexicon: santo de los santos
  rationale: El hebraísmo consagrado “santo de los santos” reproduce con precisión la expresión tradicional del lugar supremo de santidad. “Lugar santísimo” sería también comprensible, pero aquí prefiero la forma más literal y transparente al origen.
- source_word: በሀልወ፡
  english_pob_choice: with deceit
  chosen_spanish: para el engaño
  alternatives_spanish:
  - para el fraude
  - para la mentira
  lexicon: engaño / deceit
  rationale: En este contexto, el sustantivo expresa la orientación de sus acciones. “Engaño” mantiene el campo semántico de deceit sin forzar un verbo o una formulación más interpretativa.
- source_word: ወስመ፡ ዐቢየ፡ ይሰምዩ፡
  english_pob_choice: and they will make a great name for themselves
  chosen_spanish: y se harán un gran nombre
  alternatives_spanish:
  - y se procurarán un gran nombre
  - y se ganarán gran fama
  lexicon: make a great name
  rationale: “Se harán un gran nombre” conserva muy de cerca la metáfora semítica de autoexaltación nominal. “Fama” suaviza demasiado el valor del texto y no reproduce tan bien la construcción original.
theological_decisions:
- issue: Negación del retorno al camino de justicia como obstinación moral
  english_pob_reading: will not turn from their wickedness to the way of righteousness
  chosen_spanish_reading: no se volverán de su maldad al camino de la justicia
  alternative_spanish_readings:
  - no se apartarán de su maldad para andar en justicia
  - no regresarán de su maldad al camino de la justicia
  rationale: Sigo la lectura revisada en inglés que enfatiza el giro moral (“turn”) y no un simple regreso espacial (“return”). En español, “no se volverán” refleja mejor la resistencia ética del sujeto colectivo y conserva la tensión del juicio.
  doctrine_reference: ética bíblica; arrepentimiento y conversión moral
- issue: Autoexaltación sin verdad ni justicia
  english_pob_reading: but not in truth and not in righteousness
  chosen_spanish_reading: pero no en verdad ni en justicia
  alternative_spanish_readings:
  - pero no en verdad ni en rectitud
  - pero no con verdad ni con justicia
  rationale: Mantengo la doble negación paralela y la oposición entre apariencia y realidad moral. “En verdad” y “en justicia” son naturales en español y preservan la crítica profética a la autoexaltación ilegítima.
  doctrine_reference: verdad y justicia como criterios divinos de legitimidad
- issue: Profanación del santo de los santos
  english_pob_reading: they will profane the holy of holies with their uncleanness and with the corruption of their defilement
  chosen_spanish_reading: profanarán el santo de los santos con su inmundicia y con la corrupción de su contaminación
  alternative_spanish_readings:
  - profanarán el lugar santísimo con su inmundicia y con la corrupción de su impureza
  - profanarán el santísimo con su suciedad y corrupción
  rationale: Conservo la intensificación reverencial del lugar sacro y la doble acumulación de términos de impureza. “Inmundicia” y “contaminación” mantienen el peso ritual/moral del pasaje sin neutralizarlo.
  doctrine_reference: santidad del espacio sagrado; pureza ritual y moral
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó ‘return from their wickedness into the way of righteousness’ por ‘turn from their wickedness to the way of righteousness’ para reflejar un sentido más natural y cercano. La redacción española sigue esa revisión con ‘no se volverán de su maldad al camino de la justicia’.
  spanish_consistency_notes:
  - He conservado la secuencia causal y acumulativa del original con puntos y coma, para reflejar la larga progresión del juicio.
  - 'He mantenido una terminología consistente: justicia, maldad, engaño, riqueza, verdad, inmundicia, contaminación.'
  - No he sustituido ‘Yahvé’ porque este versículo no contiene el nombre divino.
  - He usado ‘santo de los santos’ como hebraísmo transparente y no como explicación interpretativa.
