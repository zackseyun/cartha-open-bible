  glossary_alignment: No hay conflictos con los términos base del proyecto. «Justicia», «verdad», «santo de los santos» e «inmundicia» están bien alineados. La revisión propuesta mantiene la fuerza ritual/moral del cierre sin alterar la teología del pasaje.
