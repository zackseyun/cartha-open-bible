    changes_summary: Replaced 'at that time' with the more direct 'then' for closer alignment with the opening conjunction, and added a semicolon before the final clause for clearer English structure. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: Y entonces Yahvé sanará a sus siervos, y ellos se levantarán y verán gran paz, y expulsarán a sus enemigos; y los justos verán, darán gracias y se alegrarán para siempre jamás con gozo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: Tetragrámaton / nombre divino
  rationale: El texto etiópico usa el nombre divino que corresponde al Tetragrámaton; en el POB español se prefiere ‘Yahvé’ para no ocultarlo con una convención de mayúsculas ni sustituirlo por un título genérico.
- source_word: ለገብርቲሁ
  english_pob_choice: his servants
  chosen_spanish: a sus siervos
  alternatives_spanish:
  - a sus esclavos
  - a sus servidores
  lexicon: doûlos / servidumbre
  rationale: ‘Siervos’ conserva la relación de pertenencia y servicio sin imponer la fuerza social de ‘esclavos’, que no parece ser el foco aquí en español natural.
- source_word: ይፈውሶ
  english_pob_choice: will heal
  chosen_spanish: sanará
  alternatives_spanish:
  - curará
  - restaurará
  lexicon: sanar / curar
  rationale: ‘Sanará’ es claro y natural en español bíblico contemporáneo; mantiene el sentido físico y restaurador sin ampliar indebidamente el alcance.
- source_word: ይትነሥኡ
  english_pob_choice: they will rise up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - resucitarán
  - se alzarán
  lexicon: levantarse
  rationale: La forma no exige introducir ‘resucitarán’, que sería una especificación doctrinal no garantizada por el contexto inmediato; ‘se levantarán’ mantiene el movimiento y la respuesta activa.
- source_word: ይሬእዩ
  english_pob_choice: see
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - mirarán
  lexicon: ver
  rationale: ‘Verán’ es la equivalencia directa y suficientemente digna para la visión de la paz y de la retribución futura.
- source_word: ሰላመ፡ ዐቢየ
  english_pob_choice: great peace
  chosen_spanish: gran paz
  alternatives_spanish:
  - mucha paz
  - paz grande
  lexicon: paz / grande
  rationale: ‘Gran paz’ reproduce bien la construcción adjetival y su intensidad sin sonar forzado en español.
- source_word: ወይሰድዱ፡ ጸላእቶሙ
  english_pob_choice: they will drive out their enemies
  chosen_spanish: expulsarán a sus enemigos
  alternatives_spanish:
  - ahuyentarán a sus enemigos
  - echarán a sus enemigos
  lexicon: expulsar / enemies
  rationale: El verbo etiópico expresa expulsión o alejamiento activo; ‘expulsarán’ refleja mejor esa fuerza que una simple huida pasiva.
- source_word: ወይሬእዩ፡ ጻድቃን
  english_pob_choice: and the righteous will see
  chosen_spanish: y los justos verán
  alternatives_spanish:
  - y los rectos verán
  - y verán los justos
  lexicon: צדיק / justos
  rationale: ‘Los justos’ es la forma estándar y más transparente para el grupo moral/covenantal señalado por el original.
- source_word: ወያአኵቱ
  english_pob_choice: and give thanks
  chosen_spanish: darán gracias
  alternatives_spanish:
  - agradecerán
  - alabarán
  lexicon: dar gracias
  rationale: ‘Darán gracias’ conserva la acción explícita de agradecimiento sin convertirla en alabanza general, que sería más amplia.
- source_word: ወይትፌሥሑ
  english_pob_choice: and rejoice
  chosen_spanish: y se alegrarán
  alternatives_spanish:
  - y se regocijarán
  - y gozarán
  lexicon: alegrarse / regocijarse
  rationale: ‘Se alegrarán’ es un equivalente natural y fiel; ‘regocijarán’ puede sonar más arcaico y ‘gozarán’ puede confundirse con el sustantivo final.
- source_word: እስከ፡ ለዓለመ፡ ዓለም፡
  english_pob_choice: forever and ever
  chosen_spanish: para siempre jamás
  alternatives_spanish:
  - por los siglos de los siglos
  - por siempre y para siempre
  lexicon: eternidad intensificada
  rationale: ‘Para siempre jamás’ reproduce bien la intensificación semítica del doble término y evita una fórmula litúrgica menos directa.
- source_word: በፍሥሐ፡
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - en gozo
  lexicon: joy / rejoicing
  rationale: ‘Con gozo’ mantiene el matiz bíblico del término final y su eco con el verbo anterior, sin perder fluidez en español.
theological_decisions:
- issue: Identidad del sujeto divino
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: La fuente no usa un título genérico sino el nombre divino equivalente al Tetragrámaton; el POB español debe dejarlo visible en lugar de enmascararlo.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Posible lectura de ‘they will rise up’
  english_pob_reading: they will rise up
  chosen_spanish_reading: se levantarán
  alternative_spanish_readings:
  - resucitarán
  rationale: No se debe cargar el verbo con una lectura escatológica específica que el texto inmediato no obliga a adoptar; ‘se levantarán’ conserva la ambigüedad útil del original.
  doctrine_reference: Resurrección / restauración futura
- issue: Destino de los enemigos
  english_pob_reading: they will drive out their enemies
  chosen_spanish_reading: expulsarán a sus enemigos
  alternative_spanish_readings:
  - vencerán a sus enemigos
  - destruirán a sus enemigos
  rationale: El verbo del original expresa remoción/expulsión; traducirlo como destrucción excedería la evidencia textual y alteraría la relación entre los justos y sus adversarios.
  doctrine_reference: Juicio y victoria escatológica
- issue: ‘Peace’ as a corporate future condition
  english_pob_reading: great peace
  chosen_spanish_reading: gran paz
  alternative_spanish_readings:
  - paz abundante
  - gran tranquilidad
  rationale: La paz aquí es colectiva y concreta; ‘gran paz’ mantiene la imagen sin diluirla en abstracción psicológica.
  doctrine_reference: Paz escatológica
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de ‘at that time’ a ‘then’ y mantuvo la cláusula final con ‘forever and ever with joy’. La redacción española sigue esa secuencia directa con ‘Y entonces’ y conserva la cadencia de las acciones encadenadas, sin introducir material ausente ni suavizar la clausula final.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ consistentemente para el nombre divino, conforme al estándar español del proyecto.
  - Se mantuvo ‘siervos’ en lugar de ‘esclavos’ por la formulación poseedora ‘sus’ y por el tono del pasaje.
  - ‘Con gozo’ preserva el sustantivo final y evita duplicar innecesariamente ‘alegría’ tras ‘se alegrarán’.
  - La puntuación con punto y coma refleja la estructura del audit trail inglés revisado y separa las dos cláusulas principales con claridad.
  - No se añadieron notas al pie porque la redacción española no introdujo una ambigüedad nueva que requiriera marcación textual.
