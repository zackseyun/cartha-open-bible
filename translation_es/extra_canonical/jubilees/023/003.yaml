  yaml_path: translation/extra_canonical/jubilees/023/003.yaml
  text: And Jacob awoke from his sleep, and behold, Abraham had grown cold as ice; and he said, “Father, father!” But there was no one speaking, and he knew that he had died.
  footnotes:
  - marker: a
    text: Or 'Abraham had grown cold;'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:32Z'
    unchanged: false
    changes_summary: Replaced the idiomatic expansion “was cold as ice” with the more literal “had grown cold” to better reflect the source without paraphrase. Retained the rest with minor consistency in formal register.
translation:
  language: es
  text: 'Y Jacob despertó de su sueño, y he aquí, Abraham se había enfriado como hielo[a]; y dijo: «¡Padre, padre!». Pero no había nadie que hablara, y supo que había muerto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La comparación literal del ge'ez incluye la idea de «como hielo»; por eso se conserva aquí en vez de suavizarse como simple «se había enfriado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  lexicon: nombre propio
  rationale: Se conserva el nombre propio bíblico en la forma hispana usual y reconocible.
- source_word: እምንዋሙ
  english_pob_choice: from his sleep
  chosen_spanish: de su sueño
  alternatives_spanish:
  - del sueño
  - de dormir
  lexicon: sueño / dormir
  rationale: El sentido inmediato es despertar del sueño; en español, «de su sueño» mantiene naturalidad y fidelidad sin introducir un matiz ajeno.
- source_word: ቈረ፡ አብርሃም፡ ከመ፡ ባረድ
  english_pob_choice: Abraham had grown cold as ice
  chosen_spanish: Abraham se había enfriado como hielo
  alternatives_spanish:
  - Abraham se había quedado frío como hielo
  - Abraham se había puesto frío como hielo
  lexicon: frío / como hielo
  rationale: La revisión del texto fuente indica que la comparación literal debe mantenerse. «Se había enfriado como hielo» refleja el valor de ከመ፡ ባረድ sin omitir la comparación.
- source_word: ወይቤ
  english_pob_choice: and he said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y exclamó
  lexicon: decir
  rationale: La forma simple «y dijo» es la más directa y fiel al discurso citado.
- source_word: አባ፡ አባ፡
  english_pob_choice: Father, father!
  chosen_spanish: ¡Padre, padre!
  alternatives_spanish:
  - ¡Papá, papá!
  lexicon: vocativo
  rationale: El vocativo paterno se conserva con registro solemne y bíblico, coherente con el contexto narrativo.
- source_word: ወአልቦ፡ ዘነበበ
  english_pob_choice: But there was no one speaking
  chosen_spanish: pero no había nadie hablando
  alternatives_spanish:
  - pero no había nadie que hablara
  - y no había nadie hablando
  lexicon: negación + habla
  rationale: Se mantiene la idea de ausencia de voz o respuesta sin forzar una reexpresión interpretativa.
- source_word: ወአእመረ፡ ከመ፡ ሞተ
  english_pob_choice: and he knew that he had died
  chosen_spanish: y entendió que había muerto
  alternatives_spanish:
  - y supo que había muerto
  - y comprendió que había muerto
  lexicon: conocer / entender
  rationale: «Entendió» transmite el acto de reconocer o llegar a la certeza, manteniendo el resultado cognitivo del verbo fuente sin añadir tecnicismo.
theological_decisions:
- issue: Descripción de la muerte de Abraham sin suavizarla ni reinterpretarla
  english_pob_reading: he knew that he had died
  chosen_spanish_reading: entendió que había muerto
  alternative_spanish_readings:
  - supo que había muerto
  - comprendió que había muerto
  rationale: El texto narra el reconocimiento de la muerte de Abraham de manera directa. Se conserva el sentido factual sin introducir explicaciones doctrinales ajenas al pasaje.
  doctrine_reference: No aplica; narrativa histórica/visionaria del libro de Jubileos.
translation_notes:
  revision_awareness: Se corrigió la tendencia previa a omitir la comparación literal del original. La redacción española retiene la imagen completa «como hielo» y mantiene el resto del versículo en un registro formal y natural.
  spanish_consistency_notes:
  - Se usa «Jacob» y «Abraham» en las formas bíblicas estándar para claridad y continuidad.
  - Se mantiene la puntuación narrativa con cita directa breve para reproducir el diálogo del pasaje.
  - La comparación física se expresa de modo explícito para no perder la fuerza imagética del original.
