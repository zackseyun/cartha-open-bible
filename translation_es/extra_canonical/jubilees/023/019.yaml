  glossary_alignment: No hay términos del glosario principal en conflicto. «Infieles» para ካሕደ mantiene bien la dimensión moral-religiosa. «Bestias», «ganado», «aves», «peces del mar» y «los hijos de los hombres» son compatibles con el registro del proyecto. La revisión recomendada no afecta terminología doctrinal sensible.
