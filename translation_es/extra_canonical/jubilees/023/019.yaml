base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/019.yaml
  text: Behold, the earth will be destroyed because of all their deeds, and there will be no grain, no wine, and no oil, because all their deeds are faithless; and they will all perish together—beasts and cattle and birds and all the fish of the sea—because of the sons of men.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:37Z'
    unchanged: false
    changes_summary: Revised 'seed of the vine' to 'grain, no wine' to reflect the paired agricultural products more naturally and completely; changed 'works' to 'deeds' for consistency within the verse.
translation:
  language: es
  text: 'He aquí, la tierra será destruida[a] a causa de todos sus hechos, y no habrá grano, ni vino, ni aceite, porque todos sus hechos son infieles; y todos perecerán juntos: bestias, ganado, aves y todos los peces del mar, a causa de los hijos de los hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Destruida» traduce el verbo geʽez con fuerza de ruina o juicio; también podría entenderse como «arruinada» en un registro menos absoluto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ትትሐጐል
  english_pob_choice: will be destroyed
  chosen_spanish: será destruida
  alternatives_spanish:
  - será arruinada
  - será desolada
  lexicon: Geez ትትሐጐል
  rationale: El verbo expresa ruina o destrucción de la tierra; en español, «será destruida» conserva la fuerza directa del enunciado sin suavizarla ni añadir matices no evidentes.
- source_word: ምግባሮሙ / ካሕደ፡ ምግባሪሆሙ
  english_pob_choice: all their deeds ... all their deeds are faithless
  chosen_spanish: todas sus obras ... todas sus obras son infieles
  alternatives_spanish:
  - todos sus hechos ... todos sus hechos son desleales
  - todas sus acciones ... todas sus acciones son infieles
  lexicon: Geez ምግባር
  rationale: POB revisó «works» a «deeds»; en español, «obras» mantiene el paralelismo y «infieles» conserva la carga moral y religiosa del adjetivo, más cercana al contraste con fidelidad que un mero ‘malas’.
- source_word: ዘርእ፡ ወይን፡
  english_pob_choice: grain, wine
  chosen_spanish: grano, ni vino
  alternatives_spanish:
  - semilla de la vid, ni vino
  - grano, ni fruto de la vid
  lexicon: Geez agricultural lexicon
  rationale: La revisión inglesa aclaró la pareja agrícola como productos de la tierra. En español, «grano» y «vino» es la forma más natural y fiel al sentido productivo, evitando una traducción demasiado literal de «seed of the vine» que no se ajusta al contexto.
- source_word: ቅብዐ
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - óleo
  - aceite de oliva
  lexicon: Geez dietary/agricultural term
  rationale: «Aceite» es el equivalente idiomático y claro en español bíblico contemporáneo para este producto agrícola básico; «óleo» sonarían más eclesiástico o menos natural aquí.
- source_word: ኵሉ፡ ይትሐጐሉ
  english_pob_choice: they will all perish together
  chosen_spanish: todos perecerán juntos
  alternatives_spanish:
  - perecerán todos juntamente
  - todos desaparecerán juntos
  lexicon: Geez collective verb phrase
  rationale: Mantiene la idea de una destrucción colectiva y simultánea sin añadir un matiz de aniquilación absoluta que el verbo por sí solo no exige.
- source_word: ኅቡረ፡ አራዊት፡ ወእንስሳ፡ ወአዕዋፍ፡ ወኵሉ፡ ዓሣተ፡ ባሕር፡
  english_pob_choice: beasts and cattle and birds and all the fish of the sea
  chosen_spanish: bestias, ganado, aves y todos los peces del mar
  alternatives_spanish:
  - animales salvajes, animales domésticos, aves y todos los peces del mar
  - fieras, ganado, pájaros y todos los peces del mar
  lexicon: Geez zoological list
  rationale: La lista zoológica se conserva en paralelo con el inglés POB. «Bestias» mantiene el registro bíblico para animales salvajes; «ganado», «aves» y «peces del mar» son transparentes y naturales en español.
- source_word: ውሉደ፡ ሰብእ
  english_pob_choice: sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos de los hombres mortales
  - los seres humanos
  lexicon: Geez idiom for humankind
  rationale: Se conserva la fórmula idiomática tradicional y su eco bíblico. «Seres humanos» sería más explícito pero perdería la marcación proverbial del original.
theological_decisions:
- issue: La tierra sufre juicio por las obras humanas y la corrupción moral se expresa como infidelidad
  english_pob_reading: the earth will be destroyed because of all their deeds ... because all their deeds are faithless
  chosen_spanish_reading: la tierra será destruida a causa de todas sus obras ... porque todas sus obras son infieles
  alternative_spanish_readings:
  - la tierra será arruinada a causa de todas sus obras ... porque todas sus obras son desleales
  - la tierra será destruida a causa de todos sus hechos ... porque todos sus hechos son infieles
  rationale: La formulación española reproduce el vínculo causal entre conducta humana y ruina de la tierra, sin diluir el juicio. «Infieles» conserva la dimensión moral-religiosa que el texto subraya.
  doctrine_reference: Responsabilidad humana; juicio divino sobre la creación debido al pecado humano.
- issue: Destrucción total que incluye criaturas terrestres y marinas
  english_pob_reading: they will all perish together—beasts and cattle and birds and all the fish of the sea
  chosen_spanish_reading: 'todos perecerán juntos: bestias, ganado, aves y todos los peces del mar'
  alternative_spanish_readings:
  - 'todos perecerán juntamente: bestias, ganado, aves y todos los peces del mar'
  - 'perecerán todos a una: bestias, ganado, aves y todos los peces del mar'
  rationale: La cláusula colectiva se mantiene sin convertirla en una generalización abstracta; el texto enfatiza la devastación de la creación entera bajo el juicio.
  doctrine_reference: Juicio cósmico; solidaridad de la creación en la culpa y en la devastación.
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente, que cambió la pareja agrícola a «grain, wine, and oil» y ajustó «works» a «deeds». La versión española refleja esa revisión con «grano, ni vino, ni aceite» y mantiene «obras» de forma consistente en ambos miembros del paralelismo. También preservé la enumeración zoológica y el cierre causal «a causa de los hijos de los hombres» sin domesticar la expresión.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Mantuve «obras» como término uniforme para el paralelismo interno del versículo.
  - Conservé «infieles» para reflejar la tensión moral del original, evitando una moralización más genérica.
  - La puntuación con dos puntos introduce la lista final de criaturas de manera natural en español.
