translation:
  language: es
  text: Y Isaac cayó sobre el rostro de su padre, lloró y lo besó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወወድቀ፡ ... ውስተ፡ ገጹ፡ አቡሁ፡
  english_pob_choice: fell upon the face of his father
  chosen_spanish: cayó sobre el rostro de su padre
  alternatives_spanish:
  - se echó sobre el rostro de su padre
  - se postró sobre el rostro de su padre
  lexicon: Gəʿəz ወድቀ / ውስተ ገጽ
  rationale: La secuencia indica un movimiento corporal repentino hacia el padre y el contacto con el rostro. «Cayó sobre» conserva la fuerza narrativa de la acción sin añadir una postura devocional no explicitada por el texto. «Rostro» refleja bien ገጽ y mantiene el paralelismo con la versión inglesa auditada.
- source_word: ወበከየ፡
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - se puso a llorar
  - lloraba
  lexicon: Gəʿəz በከየ
  rationale: El verbo simple «lloró» corresponde al lamento expresado por el Gəʿəz y sigue la concisión del texto fuente. No se expande a «se puso a llorar» porque el original no requiere una perífrasis aspectual adicional.
- source_word: ወሰዐሞ።
  english_pob_choice: kissed him
  chosen_spanish: lo besó
  alternatives_spanish:
  - le besó
  - le dio un beso
  lexicon: Gəʿəz ሰዐመ
  rationale: «Lo besó» reproduce el objeto directo masculino y la acción física directa del original. En español contemporáneo es claro y natural, y evita una formulación más interpretativa que altere la sencillez del versículo.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el control cruzado informó alta concordancia; por eso la redacción española sigue de cerca la lectura estable del texto base sin ampliar ni suavizar sus acciones.
  spanish_consistency_notes:
  - Se mantiene estilo narrativo sobrio y directo, coherente con la traducción POB en inglés.
  - No se introducen títulos teológicos ni vocabulario interpretativo ajeno al breve relato.
  - 'La puntuación coordina tres acciones sucesivas: caer, llorar y besar.'
