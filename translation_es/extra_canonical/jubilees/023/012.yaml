  revision_rationale: Se ajusta únicamente la cláusula central para que el español sea natural y siga preservando el elemento fuente 'de su espíritu', ya explícitamente exigido por la auditoría inglesa. No se introducen notas porque no hay alternativa que deba preservarse en el texto español y la reparación es estilística-fiel, no interpretativamente expansiva.
