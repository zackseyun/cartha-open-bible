translation:
  language: es
  text: Y todas las generaciones que surgirán desde ahora hasta el día del gran juicio envejecerán rápidamente antes de completar dos jubileos, y su conocimiento se apartará de su espíritu, y todo su conocimiento se desvanecerá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወኵሉ፡ ትውልድ፡ ዘይትነሣእ፡ እምይእዜ፡ ወእስከ፡ ዕለተ፡ ደይን፡ ዐባይ፡
  english_pob_choice: And all the generations that will arise from now until the day of the great judgment
  chosen_spanish: Y todas las generaciones que surgirán desde ahora hasta el día del gran juicio
  alternatives_spanish:
  - Y todas las generaciones que se levantarán desde ahora hasta el día del gran juicio
  lexicon: Generations / arise / great judgment
  rationale: '''Generaciones'' corresponde directamente a ''all the generations''. Para ''will arise'' uso ''surgirán'' porque expresa aparición o venir a existir sin forzar una imagen corporal. ''Great judgment'' se vierte como ''gran juicio'', una traducción directa y sobria de la construcción etiópica y del inglés auditado.'
- source_word: ይረሰኡ፡ ፍጡነ፡ ዘእንበለ፡ ይፈጽሙ፡ ክልኤ፡ ኢዮቤልወ፡
  english_pob_choice: will grow old quickly before they complete two jubilees
  chosen_spanish: envejecerán rápidamente antes de completar dos jubileos
  alternatives_spanish:
  - envejecerán pronto antes de completar dos jubileos
  - se volverán viejos rápidamente antes de completar dos jubileos
  lexicon: grow old quickly / two jubilees
  rationale: '''Envejecerán rápidamente'' conserva el sentido de deterioro prematuro. ''Completar dos jubileos'' sigue el valor técnico de ''two jubilees'' sin reemplazarlo por una equivalencia explicativa.'
- source_word: ወትከውን፡ እንዘ፡ ተኀድጎሙ፡ አእምሮቶሙ፡ እመንፈሶሙ፡
  english_pob_choice: and their knowledge will depart from them, from their spirit,
  chosen_spanish: y su conocimiento se apartará de ellos, de su espíritu
  alternatives_spanish:
  - y su conocimiento se apartará de ellos, de su espíritu interior
  - y su conocimiento se apartará de ellos, desde su espíritu
  lexicon: knowledge / depart / spirit
  rationale: La revisión inglesa indica que el ge'ez incluye 'from their spirit', por lo que el español debe conservar ese complemento. 'Se apartará de ellos' mantiene la imagen de retirada/pérdida sin introducir una causa ajena. 'Espíritu' traduce መንፈስ sin desplazarlo a 'mente', porque el texto distingue el conocimiento de su principio interior o vital.
- source_word: '[ወትአትት፡ ኵላ፡ አእምሮቶሙ]'
  english_pob_choice: and all their knowledge will vanish
  chosen_spanish: y todo su conocimiento se desvanecerá
  alternatives_spanish:
  - y todo su conocimiento desaparecerá
  - y todo su conocimiento se borrará
  lexicon: all their knowledge will vanish
  rationale: '''Se desvanecerá'' reproduce bien la idea de pérdida total y gradual, y armoniza con el paralelismo del miembro anterior. Evita una simplificación excesiva de la cláusula bracketed del texto fuente.'
theological_decisions:
- issue: Relación entre 'conocimiento' y 'espíritu'
  english_pob_reading: their knowledge will depart from them, from their spirit
  chosen_spanish_reading: su conocimiento se apartará de ellos, de su espíritu
  alternative_spanish_readings:
  - su conocimiento se apartará de ellos
  - su entendimiento se apartará de su espíritu
  rationale: El texto fuente revisado incluye explícitamente el complemento 'de su espíritu'; por fidelidad auditada debe conservarse. No se reduce a 'mente' o 'entendimiento' porque eso borraría la tensión antropológica del pasaje, que separa el conocimiento del espíritu como sede o ámbito de pérdida.
  doctrine_reference: Antropología bíblica; preservación de la distinción entre conocimiento y espíritu en el texto apocalíptico/sapiencial.
- issue: Valor del juicio final
  english_pob_reading: the day of the great judgment
  chosen_spanish_reading: el día del gran juicio
  alternative_spanish_readings:
  - el día del juicio grande
  - el día del juicio final
  rationale: '''Gran juicio'' mantiene la amplitud y solemnidad del original sin introducir ''final'', que no está expresado explícitamente en el texto fuente. Se conserva así la formulación apocalíptica sin sobreespecificar.'
  doctrine_reference: Escatología; fidelidad al alcance semántico del juicio en la fuente.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa más reciente que restableció ''their knowledge will depart from them'' y, además, incorpora el hallazgo posterior del control cruzado que exige retener ''from their spirit''. Por eso el español conserva ambos elementos: la partida del conocimiento y el complemento ''de su espíritu'', junto con la cláusula final paralela sobre todo su conocimiento.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exige; aquí no aparece un nombre divino explícito.
  - '''Jubileos'' se mantiene como término técnico sin explicarlo en el cuerpo del verso, para respetar la terminología del pasaje.'
  - Se evita 'mente' porque el texto no usa un equivalente mental exclusivo; 'espíritu' es la correspondencia más fiel al ge'ez revisado.
  - La puntuación separa las cláusulas con comas para reflejar la estructura acumulativa del original y del audit trail inglés.
