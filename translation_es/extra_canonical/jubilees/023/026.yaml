    reason: Preserva la alternativa previa documentada y explica por qué el texto principal debe leerse como 'ser salvado/salvarse', no como 'salvar a otros'.
  revision_rationale: La revisión mantiene intacto el sentido fuente y la decisión auditada sobre el verbo ge'ez, pero mejora la naturalidad del español. 'Invocarán' encaja mejor en la serie de súplica religiosa que 'llamarán', y 'no habrá nadie que se salve' expresa de forma más idiomática el valor intransitivo/pasivo que motivó la corrección inglesa.
