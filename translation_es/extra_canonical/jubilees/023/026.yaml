    rationale: En español eclesial y general, 'clamarán, invocarán y orarán' expresa mejor una secuencia de apelación a Dios que 'clamarán, llamarán y orarán', donde 'llamarán' puede sonar demasiado genérico o coloquial.
  - severity: medium
    issue: 'La cláusula final suena algo forzada: ''no habrá nadie que sea salvado'''
    rationale: Aunque fiel, en español natural y digno 'no habrá nadie que se salve' preserva el valor intransitivo/pasivo del ge'ez y evita una construcción perifrástica menos idiomática.
  - severity: low
    issue: '''para ser salvos'' puede mejorarse a ''para salvarse'''
    rationale: Ambas son fieles, pero el infinitivo pronominal suena más natural en español sin alterar la fuerza semántica de 'to be saved'.
  revised_spanish_text: En aquellos días clamarán, invocarán y orarán para salvarse de la mano de las naciones pecadoras, pero no habrá nadie que se salve[a].
