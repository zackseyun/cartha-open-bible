translation:
  language: es
  text: En aquellos días clamarán, invocarán y orarán para salvarse de la mano de las naciones pecadoras, pero no habrá nadie que se salve[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''pero no habrá nadie para salvar [a otros]''. La lectura corregida del verbo favorece el sentido intransitivo/pasivo: ''no habrá nadie que se salve''.'
    reason: Preserva la alternativa previa documentada y explica por qué el texto principal debe leerse como 'ser salvado/salvarse', no como 'salvar a otros'.
lexical_decisions:
- source_word: በ*ውእቱ፡ መዋዕል፡
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - En esos días
  - En tales días
  lexicon: Jubileos 23:26
  rationale: La expresión fija temporal se vierte con una fórmula natural y solemne en español, sin añadir contenido interpretativo.
- source_word: ይጸርሑ፡ ወይጼውዑ፡ ወይጼልዩ፡
  english_pob_choice: they will cry out and call and pray
  chosen_spanish: clamarán, llamarán y orarán
  alternatives_spanish:
  - gritarán, invocarán y rogarán
  - clamarán, invocarán y suplicarán
  lexicon: Jubileos 23:26
  rationale: Se preserva la triple serie verbal. 'Orarán' comunica claramente el acto de oración; 'invocarán' o 'suplicarán' serían posibles, pero 'orarán' mantiene el sentido general sin forzar un matiz técnico no explícito en el español de destino.
- source_word: ይድኅኑ፡
  english_pob_choice: to be saved
  chosen_spanish: para ser salvos
  alternatives_spanish:
  - para ser librados
  - para escapar
  lexicon: Jubileos 23:26
  rationale: El verbo ge'ez es intransitivo, y la revisión inglesa corrigió 'to save' a 'to be saved'. En español conviene reflejar la pasividad/intransitividad con 'ser salvos', no 'salvar'.
- source_word: እምእደ፡ ኃጥአን፡ አሕዛብ፡
  english_pob_choice: from the hand of the sinful nations
  chosen_spanish: de la mano de las naciones pecadoras
  alternatives_spanish:
  - de la mano de las naciones malvadas
  - del poder de las naciones pecadoras
  lexicon: Jubilees 23:26
  rationale: '''Mano'' conserva el modismo semítico de dominio o poder. ''Pecadoras'' traduce el adjetivo moral del texto; ''malvadas'' es posible, pero menos literal.'
- source_word: ወአልቦ፡ ዘይድኅን።
  english_pob_choice: but there will be no one who will be saved
  chosen_spanish: pero no habrá nadie que sea salvado
  alternatives_spanish:
  - pero no habrá quien se salve
  - pero no habrá nadie salvo
  lexicon: Jubileos 23:26
  rationale: 'La cláusula final debe reflejar la corrección textual: no significa ''nadie para salvar'', sino ''no habrá nadie que sea salvado''. ''Sea salvado'' mantiene el sentido pasivo e intransitivo del verbo.'
theological_decisions:
- issue: Sentido de salvación en la cláusula final
  english_pob_reading: but there will be no one who will be saved
  chosen_spanish_reading: pero no habrá nadie que sea salvado
  alternative_spanish_readings:
  - pero no habrá quien se salve
  - pero no habrá nadie salvo
  rationale: La decisión evita revertir el sujeto/objeto del verbo. Teológicamente, el texto presenta una ausencia total de rescate entre esas naciones en ese momento, no una falta de agentes salvadores.
  doctrine_reference: Soteriology in the immediate Jubilees context; source-language verb aspect/voice
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente que corrigió la lectura de la cláusula final del inglés POB: el ge''ez ይድኅን es intransitivo (''ser salvado/escapar''), no causativo (''salvar''). La traducción española sigue esa corrección y evita el sentido anterior rechazado.'
  spanish_consistency_notes:
  - Se mantuvo 'Dios' implícito fuera del versículo porque el texto no lo nombra.
  - Se usó 'ser salvos/sea salvado' para conservar la voz pasiva/intransitiva del original.
  - '''Naciones pecadoras'' preserva el calificativo moral del grupo sin introducir una glosa doctrinal.'
