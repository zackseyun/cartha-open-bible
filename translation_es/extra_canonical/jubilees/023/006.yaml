    unchanged: false
    changes_summary: Changed 'wept over Abraham' to 'wept for Abraham' for more natural and accurate English in context; otherwise retained the draft.
translation:
  language: es
  text: Y se oyó un sonido en la casa de Abraham, e Ismael, su hijo, se levantó y fue a Abraham, su padre, y lloró por Abraham, su padre; él y toda la casa de Abraham lloraron con gran llanto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቃል / sound
  english_pob_choice: a sound was heard
  chosen_spanish: se oyó un sonido
  alternatives_spanish:
  - se escuchó un sonido
  - hubo un sonido
  lexicon: source term for an audible occurrence
  rationale: El ge'ez habla de un sonido/voz audible que llega a oírse en la casa; «se oyó un sonido» conserva esa pasividad y evita concretar indebidamente como «voz» o «rumor».
- source_word: ቤት አብርሃም / house of Abraham
  english_pob_choice: house of Abraham
  chosen_spanish: la casa de Abraham
  alternatives_spanish:
  - el hogar de Abraham
  - la familia de Abraham
  lexicon: house/household
  rationale: La frase puede abarcar la casa física y la casa como casa-hogar; «la casa de Abraham» mantiene esa amplitud sin explicitar más de lo que el texto dice.
- source_word: ወተንሥአ / arose
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso de pie
  lexicon: get up / rise
  rationale: «Se levantó» es la forma natural en español para el acto de incorporarse y ponerse en movimiento.
- source_word: ኀበ / to, went to
  english_pob_choice: went to
  chosen_spanish: fue a
  alternatives_spanish:
  - fue hacia
  - se dirigió a
  lexicon: go to
  rationale: «Fue a» expresa de manera directa el movimiento hacia Abraham sin añadir matices ajenos.
- source_word: በከየ / wept
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - se lamentó
  - sollozó
  lexicon: weep/cry
  rationale: El verbo español «llorar» corresponde bien al llanto fúnebre del contexto; conserva la sencillez del original.
- source_word: ኵሉ ቤተ አብርሃም / all the house of Abraham
  english_pob_choice: all the house of Abraham
  chosen_spanish: toda la casa de Abraham
  alternatives_spanish:
  - toda la familia de Abraham
  - todos los de la casa de Abraham
  lexicon: all + household
  rationale: Se mantiene la estructura de casa/hogar-comunidad con el cuantificador total, en línea con la literalidad del testimonio.
- source_word: ብካየ ዐቢየ / great weeping
  english_pob_choice: great weeping
  chosen_spanish: gran llanto
  alternatives_spanish:
  - llanto muy grande
  - gran lamento
  lexicon: great + weeping
  rationale: «Gran llanto» es idiomático y conserva la intensidad del duelo expresado por el ge'ez.
theological_decisions:
- issue: El sujeto del llanto final incluye a Ismael y a toda la casa, con énfasis colectivo en el duelo.
  english_pob_reading: he and all the house of Abraham, and they wept with great weeping
  chosen_spanish_reading: él y toda la casa de Abraham, y lloraron con gran llanto
  alternative_spanish_readings:
  - él y toda la casa de Abraham, y se lamentaron con gran llanto
  - él y toda la casa de Abraham, y lloraron con gran duelo
  rationale: La redacción mantiene el peso comunitario del duelo sin individualizarlo más de lo que el texto indica. «Lloraron» respeta el plural del final y la solidaridad del lamento familiar.
  doctrine_reference: Narrativa de lamento/funeraria sin afirmación doctrinal adicional
translation_notes:
  revision_awareness: La revisión inglesa cambió solo la relación preposicional de 'wept over Abraham' a 'wept for Abraham'. La versión española adopta directamente el valor natural de duelo con 'lloró por Abraham', evitando la ambigüedad de 'sobre'.
  spanish_consistency_notes:
  - Se mantiene 'Abraham' en toda la línea, sin adaptación onomástica.
  - Se preserva el paralelismo narrativo con dos cláusulas principales unidas por 'y'.
  - No se introduce 'Mesías', 'Yahvé' ni otra terminología no presente en el pasaje.
  - El último verbo va en plural ('lloraron') para reflejar 'él y toda la casa de Abraham'.
