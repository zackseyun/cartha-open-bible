base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/023.yaml
  text: And a great punishment will come upon the works of that generation from the LORD, and he will give them over to slaughter and judgment and captivity and plundering and destruction.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:38Z'
    unchanged: false
    changes_summary: Revised 'deeds' to 'works' for closer lexical correspondence to ግብረ; changed 'sword' to 'slaughter' to reflect መጥባሕት more accurately; changed final 'devouring' to 'destruction' for more natural formal English and better sense of ብልዐት.
translation:
  language: es
  text: Y vendrá un gran castigo sobre las obras de aquella generación de parte de Yahvé, y los entregará a matanza, a juicio, a cautiverio, a saqueo y a destrucción.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ግብረ (gibra, 'works/deeds')
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - deeds
  - acciones
  lexicon: N/A
  rationale: El etíope ግብረ apunta a lo que la POB inglesa fijó como 'works'; en español, 'obras' conserva mejor el carácter de resultados/obras realizadas que 'hechos', y evita un matiz más moralizante de 'acciones'.
- source_word: መቅሠፍት (meqseft, 'punishment/plague')
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - plaga
  - aflicción
  - pena
  lexicon: N/A
  rationale: La POB inglesa opta por 'punishment'; 'castigo' transmite bien la sanción divina sin introducir la imagen de enfermedad o plaga que también puede sugerir el término original.
- source_word: ወይሁቦሙ (weyhubomu, 'and he will give them over')
  english_pob_choice: he will give them over
  chosen_spanish: los entregará
  alternatives_spanish:
  - los entregará por completo
  - los abandonará
  - los dejará
  lexicon: N/A
  rationale: '''Entregar'' conserva la idea de una acción judicial de abandono/cesión a consecuencias adversas, alineada con la fuerza de ''give them over''.'
- source_word: መጥባሕት (meṭbahṭ, 'slaughter')
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - degüello
  - muerte
  - sacrificio
  lexicon: N/A
  rationale: La revisión inglesa corrigió 'sword' a 'slaughter'; 'matanza' reproduce esa violencia concreta sin añadir un arma específica que no está en el fuente.
- source_word: ፂዋዌ (ṣiwawe, 'judgment')
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - veredicto
  - castigo
  lexicon: N/A
  rationale: '''Juicio'' mantiene la carga legal/judicial de la serie nominal del texto y corresponde directamente al valor de la palabra sin forzarla hacia ''sentencia''.'
- source_word: ሀደድ (hadad, 'captivity')
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - esclavitud
  - prisión
  - destierro
  lexicon: N/A
  rationale: '''Cautiverio'' refleja con precisión el estado de ser llevado y retenido cautivo, mejor que ''esclavitud'' o ''prisión'' en este contexto.'
- source_word: ብልዐት (bli'at, 'devouring/destruction')
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - devoración
  - consumo
  - ruina
  lexicon: N/A
  rationale: La revisión inglesa pasó de 'devouring' a 'destruction'; 'destrucción' es el equivalente español más natural y sobrio para ese cierre acumulativo.
theological_decisions:
- issue: Referencia al nombre divino en la cláusula 'from the LORD'
  english_pob_reading: from the LORD
  chosen_spanish_reading: de parte de Yahvé
  alternative_spanish_readings:
  - del SEÑOR
  - de parte del Señor
  rationale: Siguiendo la norma del proyecto, se restituye el nombre divino como 'Yahvé' en lugar de enmascararlo con 'SEÑOR'. 'De parte de' expresa el origen/agencia del castigo sin perder el matiz judicial.
  doctrine_reference: 'Proyecto POB: tratamiento del Tetragrámaton'
translation_notes:
  revision_awareness: 'La redacción española incorpora la revisión inglesa reciente: ''works'' en lugar de ''deeds'', ''slaughter'' en lugar de ''sword'', y ''destruction'' en lugar de ''devouring'', manteniendo la acumulación judicial del pasaje y evitando añadir imágenes no sustentadas por el etíope.'
  spanish_consistency_notes:
  - Se mantuvo una sintaxis coordinada simple para reflejar la serie nominal del original.
  - '''Yahvé'' se usa de forma consistente con el estándar del proyecto para el Tetragrámaton.'
  - No se introdujo una equivalencia litúrgica tradicional que ocultara la precisión lexical del texto.
