  to: Y contenderán estos con aquellos, y los jóvenes con los ancianos, y los ancianos con los jóvenes, los pobres con los ricos, los humildes con los grandes, y los necesitados con el gobernante, acerca de la ley y acerca del pacto, porque han olvidado mandamiento, pacto, festividad, mes, sábado, Jubileo y todo lo que está establecido.
