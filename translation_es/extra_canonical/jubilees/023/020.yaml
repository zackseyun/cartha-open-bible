base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/020.yaml
  text: And they will contend, these with those, and the young with the old, and the old with the young, the poor with the rich, the lowly with the great, and the needy with the ruler, concerning the law and concerning the covenant, because they have forgotten commandment and covenant and festival and month and Sabbath and Jubilee and all that is appointed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:38Z'
    unchanged: false
    changes_summary: Changed 'strive' to 'contend' for a more formal and precise rendering; changed 'feast' to 'festival' for better lexical fit; capitalized 'Sabbath' and 'Jubilee' as formal sacred time designations. Kept the rest substantially unchanged.
translation:
  language: es
  text: Y contenderán estos con aquellos, y los jóvenes con los ancianos, y los ancianos con los jóvenes, los pobres con los ricos, los humildes con los grandes, y los necesitados con el gobernante, acerca de la ley y acerca del pacto, porque han olvidado mandamiento, pacto, festividad, mes, sábado, Jubileo y todo lo que está establecido.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይትባአሱ
  english_pob_choice: contend
  chosen_spanish: contenderán
  alternatives_spanish:
  - disputarán
  - se enfrentarán
  - lucharán
  lexicon: contender
  rationale: El auditorio inglés revisado prefirió 'contend' frente a 'strive' por precisión formal. En español, 'contenderán' conserva el matiz de disputa verbal o litigiosa sin intensificar indebidamente hacia violencia física.
- source_word: ምስለ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  lexicon: con
  rationale: La serie repetida expresa oposición bilateral entre grupos; 'con' reproduce la construcción relacional del original y del inglés POB sin forzar 'contra' en cada miembro, que endurecería el tono más allá del patrón paralelo.
- source_word: ሊቃናት / ወረዘት / ነዳይ / ባዕል / ትሑት / ዐቢይ / ምስኪን / መኰንን
  english_pob_choice: young / old / poor / rich / lowly / great / needy / ruler
  chosen_spanish: jóvenes / ancianos / pobres / ricos / humildes / grandes / necesitados / gobernante
  alternatives_spanish:
  - jóvenes / viejos
  - pobres / ricos
  - bajos / altos
  - pobres / poderosos
  - príncipe
  lexicon: edad, estatus social y poder
  rationale: Se preserva la enumeración social y generacional del original. 'Ancianos' mantiene edad y respeto; 'grandes' refleja estatus/posición más que tamaño; 'gobernante' conserva la referencia funcional a quien ejerce autoridad, sin añadir una clase política no explicitada.
- source_word: ሕግ
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - Torá
  - norma
  lexicon: ley
  rationale: '''Ley'' es la correspondencia directa y mantiene el registro jurídico del pasaje. ''Torá'' sería posible como nota interpretativa, pero el texto auditado no la exige de forma exclusiva.'
- source_word: ኪዳን
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - convenio
  lexicon: pacto
  rationale: '''Pacto'' preserva el término bíblico convencional en español y la fuerza formal de ''covenant'' sin suavizarlo a ''alianza'', que puede sonar más genérico.'
- source_word: በዓለ
  english_pob_choice: festival
  chosen_spanish: festividad
  alternatives_spanish:
  - fiesta
  - festival
  lexicon: time designation
  rationale: El inglés revisado cambió 'feast' por 'festival'. En español, 'festividad' comunica un día o tiempo sagrado establecido con un tono más natural y amplio que 'festival', evitando un falso modernismo cultural.
- source_word: ወርኀ
  english_pob_choice: month
  chosen_spanish: mes
  alternatives_spanish:
  - lunación
  lexicon: calendar term
  rationale: '''Mes'' es la forma natural en español y corresponde al valor calendárico del término.'
- source_word: ሰንበተ
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - Sabbat
  - reposo sabático
  lexicon: sacred day
  rationale: En español bíblico 'sábado' es la denominación más inteligible y fiel para el día señalado. 'Sabbath' sería menos idiomático; 'reposo sabático' explicita, pero agrega interpretación.
- source_word: እዮቤሌወ
  english_pob_choice: Jubilee
  chosen_spanish: Jubileo
  alternatives_spanish:
  - Jubileo
  lexicon: sacred time designation
  rationale: Se capitaliza como designación sagrada, en concordancia con la revisión inglesa. 'Jubileo' mantiene el término técnico bíblico en español.
- source_word: ወኵሎ፡ ዘ ኴነ
  english_pob_choice: all that is appointed
  chosen_spanish: todo lo que está establecido
  alternatives_spanish:
  - todo lo designado
  - todo lo ordenado
  - todo lo señalado
  lexicon: appointed
  rationale: La frase final reúne la idea de prescripción o establecimiento. 'Está establecido' conserva la pasiva resultativa sin sobrecargar de juridicismo adicional.
theological_decisions:
- issue: Choque social y generacional como señal de desorden del pacto
  english_pob_reading: The verse describes groups contending with one another because covenantal obligations have been forgotten.
  chosen_spanish_reading: El versículo presenta contienda entre generaciones y estratos sociales como consecuencia del olvido del mandamiento y del pacto.
  alternative_spanish_readings:
  - desacuerdo
  - pelea
  - litigio
  rationale: '''Contienda'' mantiene la amplitud del inglés POB y permite incluir conflicto social, verbal o judicial sin reducirlo solo a violencia física. Esto respeta la estructura causal del texto: el olvido del orden pactal produce conflicto.'
  doctrine_reference: Jubilees 23:20; covenantal order and social disorder
- issue: Enumeración de tiempos sagrados
  english_pob_reading: festival, month, Sabbath, Jubilee, and all that is appointed.
  chosen_spanish_reading: festividad, mes, sábado, Jubileo y todo lo que está establecido.
  alternative_spanish_readings:
  - fiesta
  - fiesta señalada
  - descanso sabático
  rationale: La lista conserva categorías calendáricas y cultuales diferenciadas. 'Festividad' evita nivelar todo a 'fiesta' y permite reconocer una observancia sagrada, no mera celebración social.
  doctrine_reference: Jubilees 23:20; sacred times
- issue: '''Law and covenant'' as paired authorities'
  english_pob_reading: concerning the law and concerning the covenant
  chosen_spanish_reading: por causa de la ley y por causa del pacto
  alternative_spanish_readings:
  - acerca de la ley y acerca del pacto
  - sobre la ley y sobre el pacto
  rationale: '''Por causa de'' refleja que la contienda surge en torno a estas realidades, no solo como tema de discusión. Mantiene la causalidad y el peso normativo del par ley/pacto.'
  doctrine_reference: Jubilees 23:20; Torah/covenant framing
translation_notes:
  revision_awareness: La revisión inglesa finalizó 'contend' en lugar de 'strive', 'festival' en lugar de 'feast', y capitalizó 'Sabbath' y 'Jubilee'. La versión española sigue esas decisiones con 'contenderán', 'festividad', 'sábado' y 'Jubileo', manteniendo la enumerción y la causalidad del texto fuente sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo 'pacto' para covenant y 'ley' para law en coherencia terminológica.
  - Se usó 'Jubileo' con mayúscula como tiempo sagrado nombrado, alineado con la revisión inglesa.
  - No se sustituyó 'gobernante' por vocabulario eclesiástico o monárquico más específico, para preservar la neutralidad del cargo en el pasaje.
  - La secuencia repetida 'y ... con ...' conserva el paralelismo del original y evita suavizar la contienda entre grupos.
