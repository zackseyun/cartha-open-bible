review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente la corrección principal del Ge''ez reflejada en la auditoría inglesa: distingue «que peca sobre la tierra» de «sus obras son ...», en vez de fusionarlas como «contamina la tierra con ...». También conserva bien la serie de vicios y el sentido de juicio venidero. Sin embargo, la nota al pie no preserva fielmente la alternativa inglesa documentada: introduce «obras abominables», cuando la nota inglesa dice «abominable deeds» dentro de una traducción antigua completa, pero el texto principal inglés corregido opta por «abomination» en singular. En español, la nota actual puede confundir al mezclar la lectura antigua con una reformulación explicativa.'
  spanish_quality_summary: El español es claro, natural y digno. «Y todo esto vendrá sobre una generación mala, que peca sobre la tierra; sus obras son inmundicia, fornicación, impureza y abominación» es legible y fiel. El único ajuste necesario es la nota al pie, para que sea más exacta y menos interpretativa. Opcionalmente, «en la tierra» sonaría más idiomático que «sobre la tierra», pero «sobre» todavía es aceptable por su cercanía formal al inglés auditado y no exige corrección.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los términos éticos «inmundicia», «fornicación», «impureza» y «abominación» están bien escogidos y preservan las distinciones del texto fuente y de la revisión inglesa. No hay nombres divinos ni títulos mesiánicos implicados.
  issues:
  - severity: medium
    issue: La nota al pie no refleja con precisión la alternativa documentada en la auditoría inglesa.
    rationale: 'La nota inglesa dice: Or ''that defiles the earth with uncleanness and fornication and impurity and abominable deeds.'' La nota española actual añade explicación editorial extensa y mezcla «obras abominables» con una glosa sobre la corrección. Conviene conservar de forma más directa la alternativa previa, sin crear la impresión de una variante textual formal si solo se está preservando un rendering anterior.'
  revised_spanish_text: Y todo esto vendrá sobre una generación mala, que peca sobre la tierra; sus obras son inmundicia, fornicación, impureza y abominación.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «que contamina la tierra con inmundicia, fornicación, impureza y obras abominables».'
    reason: previous_rendering
  revision_rationale: Se conserva el texto principal, que ya es fiel al Ge'ez y a la corrección de la auditoría inglesa. Solo se corrige la nota al pie para que preserve de manera limpia y exacta la traducción alternativa previa, sin expansión explicativa innecesaria ni ambigüedad sobre su función.
