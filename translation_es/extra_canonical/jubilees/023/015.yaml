    changes_summary: Replaced 'pollution' with 'impurity' for a more natural and formally appropriate rendering alongside 'uncleanness,' while preserving the full list of evils in the source.
translation:
  language: es
  text: Y todo esto vendrá sobre una generación mala, que peca sobre la tierra; sus obras son inmundicia, fornicación, impureza y abominación.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que contamina la tierra con inmundicia, fornicación, impureza y obras abominables».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወኵሉ፡ ዝንቱ፡ ይመጽእ፡
  english_pob_choice: And all this will come upon
  chosen_spanish: Y todo esto vendrá sobre
  alternatives_spanish:
  - Y todo esto caerá sobre
  - Y todo esto les vendrá encima
  lexicon: source phrase with future/incoming force
  rationale: El Ge'ez expresa un futuro de acontecer que llega sobre el sujeto; «vendrá sobre» conserva el movimiento de juicio/acontecimiento sin sobretraducir.
- source_word: በትውልድ፡ እኪት፡
  english_pob_choice: an evil generation
  chosen_spanish: una generación mala
  alternatives_spanish:
  - una generación perversa
  - una generación impía
  lexicon: generation + moral evil
  rationale: «Mala» reproduce con sobriedad la valoración moral del grupo sin imponer un matiz más técnico que el del texto. Se evita suavizarlo como «impía» si el original no exige específicamente irreligiosidad.
- source_word: እንተ፡ ትኤብስ፡ በምድር፡
  english_pob_choice: which sins on the earth
  chosen_spanish: que peca sobre la tierra
  alternatives_spanish:
  - que peca en la tierra
  - que comete pecado sobre la tierra
  lexicon: verb of sin/transgress on the earth
  rationale: La revisión inglesa corrigió el sentido a «sins on the earth»; en español, «peca sobre la tierra» conserva la relación locativa/escénica de \"on the earth\" mejor que una cláusula causal o instrumental.
- source_word: ገብርሙ።
  english_pob_choice: their deeds
  chosen_spanish: sus obras son
  alternatives_spanish:
  - sus hechos son
  - sus acciones son
  lexicon: their deeds / works
  rationale: El sustantivo final introduce la lista de vicios como predicado nominal; «sus obras son» mantiene que la lista describe las obras de esa generación, sin añadir un verbo de defilement que el texto no tiene.
- source_word: ርኵስ፡ ወዝሙት፡ ወገማኔ፡ ወሳቀራር፡
  english_pob_choice: uncleanness and fornication and impurity and abomination
  chosen_spanish: inmundicia, fornicación, impureza y abominación
  alternatives_spanish:
  - inmundicia, fornicación, contaminación e abominación
  - inmundicia, fornicación, suciedad e indecencia
  lexicon: uncleanness / fornication / impurity / abomination
  rationale: 'Se mantiene la serie ética con los equivalentes españoles más cercanos y solemnes: «inmundicia» para ርኵስ, «fornicación» para ዝሙት, «impureza» para ገማኔ, y «abominación» para ሳቀራር. La combinación evita borrar la distinción entre inmundicia e impureza que la revisión inglesa preservó.'
theological_decisions:
- issue: Relación entre pecado y contaminación de la tierra
  english_pob_reading: which sins on the earth; their deeds are uncleanness...
  chosen_spanish_reading: que peca sobre la tierra; sus obras son...
  alternative_spanish_readings:
  - que contamina la tierra con...
  - que defile la tierra con...
  rationale: 'La revisión del inglés corrigió un error importante: el texto no dice que la generación «contamina» la tierra, sino que «peca sobre la tierra» y luego describe sus obras. El español sigue esa corrección para no fusionar dos cláusulas distintas ni atribuir un sujeto/objeto que el Ge''ez no da.'
  doctrine_reference: Fidelidad semántica y sintáctica al texto base; no introducir un juicio ecológico/moral no explicitado por la cláusula.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés POB, que corrigió una mala interpretación anterior: el Ge''ez no dice que la generación «defile la tierra», sino que «peca sobre la tierra» y que sus obras consisten en inmundicia, fornicación, impureza y abominación. También se conserva la enumeración completa sin colapsarla en una sola cláusula.'
  spanish_consistency_notes:
  - Se usa «abominación» para ሳቀራር por coherencia con el registro bíblico y con la audit trail inglesa.
  - Se mantiene «fornicación» como término técnico moral, no como una paráfrasis más vaga.
  - Se preserva «impureza» junto a «inmundicia» porque la revisión inglesa distinguió ambos términos.
  - No se introduce «SEÑOR» ni otros términos de sustitución, porque el versículo no contiene el nombre divino.
