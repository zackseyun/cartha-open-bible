  yaml_path: translation/extra_canonical/jubilees/023/008.yaml
  text: And all the men of his house wept for him forty days, and Isaac and Ishmael and all their sons and all the sons of Keturah in their places; and the days of weeping for Abraham were completed.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:33Z'
    unchanged: false
    changes_summary: Revised the final clause from 'the days of Abraham’s weeping' to 'the days of weeping for Abraham' to reflect the sense that others were mourning Abraham, not that Abraham was weeping. Otherwise retained the draft.
translation:
  language: es
  text: Y todos los hombres de su casa lo lloraron durante cuarenta días, e Isaac e Ismael y todos sus hijos y todos los hijos de Quetura, en sus lugares; y se cumplieron los días del duelo por Abraham.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: وَبَكَوْهُ / ወበከይዎ
  english_pob_choice: wept for him
  chosen_spanish: lo lloraron
  alternatives_spanish:
  - lloraron por él
  - hicieron duelo por él
  lexicon: בכה / κλαίω
  rationale: El sujeto es la casa de Abraham, y el objeto del llanto es Abraham; por eso el español natural es «lo lloraron» o «lloraron por él». Se evita una forma que sugiera que Abraham lloró él mismo, coherente con la revisión inglesa que aclaró el sentido.
- source_word: ሰብአ፡ ቤቱ
  english_pob_choice: the men of his house
  chosen_spanish: los hombres de su casa
  alternatives_spanish:
  - la gente de su casa
  - los varones de su casa
  lexicon: בֵּית / οἶκος
  rationale: «Hombres de su casa» reproduce de manera directa la referencia a los miembros masculinos del hogar sin introducir una paráfrasis social más amplia. Es la opción más cercana al español bíblico y al sentido del conjunto.
- source_word: አርብዓ፡ መዋዕለ
  english_pob_choice: forty days
  chosen_spanish: durante cuarenta días
  alternatives_spanish:
  - por cuarenta días
  - cuarenta días
  lexicon: אַרְבָּעִים / τεσσαράκοντα
  rationale: La preposición «durante» expresa duración continua con naturalidad en español y mantiene el valor temporal del original.
- source_word: ወይስሐቅ፡ ወእስማዔል
  english_pob_choice: and Isaac and Ishmael
  chosen_spanish: e Isaac e Ismael
  alternatives_spanish:
  - e Isaac, e Ismael
  - e Isaac y Ismael
  lexicon: Ἰσαάκ / Ἰσμαήλ
  rationale: Se conserva la enumeración simple de nombres propios. La forma «e» ante vocal mantiene la eufonía del español sin alterar el contenido.
- source_word: ወኵሉ፡ ውሉዶሙ
  english_pob_choice: and all their sons
  chosen_spanish: y todos sus hijos
  alternatives_spanish:
  - y todos los hijos de ellos
  - y todos sus descendientes varones
  lexicon: בָּנִים / υἱοί
  rationale: «Hijos» es la correspondencia directa y suficiente; no hay indicio en el pasaje de que deba ampliarse a «descendientes» ni restringirse más de lo que el texto dice.
- source_word: ወ*ኵሎሙ፡ ውሉደ፡ ኬጡራ፡
  english_pob_choice: and all the sons of Keturah
  chosen_spanish: y todos los hijos de Quetura
  alternatives_spanish:
  - y todos los hijos de Keturá
  - y todos los descendientes de Quetura
  lexicon: קְטוּרָה / Κεττούρα
  rationale: Se usa «Quetura», forma estable en español bíblico, para el nombre propio. «Hijos» conserva el parentesco literal del original.
- source_word: በመካኖሙ
  english_pob_choice: in their places
  chosen_spanish: en sus lugares
  alternatives_spanish:
  - cada uno en su lugar
  - en sus respectivos lugares
  lexicon: מָקוֹם / τόπος
  rationale: La frase es idiomática y un poco ambigua; «en sus lugares» preserva la literalidad sin forzar una explicación interpretativa innecesaria.
- source_word: ወተፈጸመ፡ *መዋዕለ፡ ብካዩ፡ አብርሃም
  english_pob_choice: and the days of weeping for Abraham were completed
  chosen_spanish: y se completaron los días del luto por Abraham
  alternatives_spanish:
  - y se cumplieron los días de llorar por Abraham
  - y terminaron los días de duelo por Abraham
  lexicon: πένθος / בְּכִי
  rationale: «Luto» comunica en español el estado/periodo de duelo mejor que un calco como «días de llorar». Además, refleja que el texto habla del periodo de lamentación por Abraham, no de su acción de llorar, en línea con la revisión inglesa.
theological_decisions:
- issue: La relación del duelo con Abraham en la cláusula final
  english_pob_reading: the days of weeping for Abraham were completed
  chosen_spanish_reading: se completaron los días del luto por Abraham
  alternative_spanish_readings:
  - se completaron los días de llanto por Abraham
  - terminaron los días de duelo por Abraham
  rationale: Se evita cualquier lectura que haga de Abraham el sujeto del llanto. El español elegido conserva el sentido pasivo/objetivo del luto celebrado por otros en honor de Abraham, conforme a la revisión auditada del inglés.
  doctrine_reference: Coherencia narrativa; cuidado exegético sobre el sujeto y objeto del duelo
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada en la cláusula final de 'the days of Abraham’s weeping' a 'the days of weeping for Abraham' para aclarar que otros lloraban por Abraham. La traducción española sigue esa revisión y evita reintroducir la ambigüedad original del borrador.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando vocabulario eclesiástico no motivado por el texto.
  - Se usó «Quetura» como forma española estable del nombre propio.
  - Se prefirió una estructura sintáctica cercana al original, con ajustes mínimos para fluidez natural en español.
  - No se añadieron notas de pie porque el pasaje no presenta variantes textuales o semánticas que requieran un anclaje explícito en esta sección.
