base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/023/011.yaml
  text: For Abraham was perfect in all his deeds with the LORD, and he was pleasing in righteousness all the days of his life; and behold, he did not complete four jubilees in his life, until he grew old because of evil, and he was full of days.
  footnotes:
  - marker: a
    text: Or 'before the LORD'.
    reason: previous_rendering
  - marker: b
    text: Or 'in the presence of evil'.
    reason: previous_rendering
  - marker: c
    text: Or 'his days were fulfilled'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:34Z'
    unchanged: false
    changes_summary: Changed 'with the LORD' to 'before the LORD' for better lexical accuracy; simplified 'well-pleasing' to 'pleasing'; changed 'had grown old' to 'grew old' for smoother narrative flow; and replaced 'his days were cut short' with 'his days were fulfilled' to reflect the source more accurately.
translation:
  language: es
  text: Porque Abraham fue perfecto en todas sus obras con Yahvé[a], y fue agradable en justicia todos los días de su vida; y he aquí, no completó cuatro jubileos en su vida, hasta que envejeció por causa del mal[b], y estuvo lleno de días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘antes de Yahvé’ si se tomara la preposición en sentido de presencia; la revisión auditada más reciente favorece ‘con Yahvé’.
    reason: alternative_reading
  - marker: b
    text: 'O ‘en presencia del mal’; la revisión auditada entiende aquí una relación causal: ‘por causa del mal’.'
    reason: alternative_reading
  - marker: c
    text: 'Traducción previa: ‘sus días fueron cumplidos’. El modismo ge''ez aquí expresa plenitud de vida, por eso se conserva ‘estuvo lleno de días’.'
    reason: previous_rendering
lexical_decisions:
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: divine name
  rationale: El texto ge'ez alude al nombre divino; la política española del proyecto prefiere ‘Yahvé’ como forma transparente y directa, evitando el enmascaramiento litúrgico de ‘SEÑOR’.
- source_word: ፍጹም
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - íntegro
  - completo
  lexicon: completion / wholeness
  rationale: ‘Perfecto’ conserva la fuerza de integridad total que refleja la lectura inglesa y el valor moral del contexto.
- source_word: ምግባሪሁ
  english_pob_choice: in all his deeds
  chosen_spanish: en todas sus obras
  alternatives_spanish:
  - en todos sus actos
  - en toda su conducta
  lexicon: deeds / works
  rationale: ‘Obras’ mantiene la amplitud de acciones/obras sin reducirlo a un registro demasiado abstracto.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: righteousness
  rationale: ‘Justicia’ preserva el campo semántico covenantal/legal del término; en español bíblico suena natural y fiel.
- source_word: ኢፈጸመ አርባዕተ ኢዮቤልውሳተ
  english_pob_choice: he did not complete four jubilees in his life
  chosen_spanish: no completó cuatro jubileos en su vida
  alternatives_spanish:
  - no llegó a completar cuatro jubileos en su vida
  - no cumplió cuatro jubileos en su vida
  lexicon: jubilees / lifespan measure
  rationale: ‘Jubileos’ conserva el término técnico del texto; ‘completó’ sigue la lectura inglesa y el sentido temporal del pasaje.
- source_word: እስከ አመ ረሰአ
  english_pob_choice: until he grew old
  chosen_spanish: hasta que envejeció
  alternatives_spanish:
  - hasta que llegó a viejo
  - hasta que se hizo viejo
  lexicon: age / becoming old
  rationale: ‘Envejeció’ comunica con claridad el proceso de llegar a la vejez y evita una paráfrasis más interpretativa.
- source_word: ቅድመ ገጸ እኩይ
  english_pob_choice: because of evil
  chosen_spanish: por causa del mal
  alternatives_spanish:
  - a causa del mal
  - por motivo del mal
  - en presencia del mal
  lexicon: causal idiom
  rationale: La revisión inglesa corrigió el sentido hacia causalidad; ‘por causa del mal’ mantiene explícita esa relación y evita la lectura espacial de ‘en presencia de’.
- source_word: ወጸገበ መዋዕሊሁ
  english_pob_choice: his days were fulfilled
  chosen_spanish: estuvo lleno de días
  alternatives_spanish:
  - sus días se cumplieron
  - sus días fueron cumplidos
  lexicon: biblical idiom of fullness
  rationale: La revisión más reciente del inglés indica el modismo de plenitud, no una simple terminación temporal. ‘Estuvo lleno de días’ preserva el sujeto (‘él’) y el tono idiomático bíblico.
theological_decisions:
- issue: Relación de Abraham con Yahvé
  english_pob_reading: perfect in all his deeds with the LORD
  chosen_spanish_reading: perfecto en todas sus obras con Yahvé
  alternative_spanish_readings:
  - perfecto en todas sus obras delante de Yahvé
  - perfecto en todas sus obras ante Yahvé
  rationale: La tradición textual aquí usa la preposición ge'ez equivalente a compañía/asociación; por eso se mantiene ‘con Yahvé’ en lugar de cambiar a una fórmula de presencia o tribunal que no está sustentada por la revisión más reciente.
  doctrine_reference: fidelidad patriarcal; lenguaje relacional sin reescritura teológica
- issue: Causalidad de la limitación de la vida
  english_pob_reading: until he grew old because of evil
  chosen_spanish_reading: hasta que envejeció por causa del mal
  alternative_spanish_readings:
  - hasta que envejeció en presencia del mal
  - hasta que envejeció a causa del mal
  rationale: 'La nota revisada del inglés muestra que el giro es causal: la maldad acorta y enmarca la vida humana. La traducción española conserva esa causalidad sin borrar la tensión interpretativa de la expresión idiomática.'
  doctrine_reference: antropología bíblica; corrupción humana y mortalidad
- issue: Plenitud final de la vida
  english_pob_reading: and his days were fulfilled
  chosen_spanish_reading: y estuvo lleno de días
  alternative_spanish_readings:
  - y sus días se cumplieron
  - y sus días fueron cumplidos
  rationale: Se mantiene la imagen bíblica de plenitud/saturación, que es más fiel al giro final que una simple clausura cronológica. Esto también armoniza con el eco de Génesis 25:8.
  doctrine_reference: bendición patriarcal; plenitud de vida
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB en tres puntos clave: mantiene ‘with the LORD’ como ‘con Yahvé’ tras la corrección del debate preposicional; adopta la causalidad de ‘because of evil’; y refleja el modismo final como plenitud (‘estuvo lleno de días’) en vez de una simple conclusión temporal. También conserva ‘four jubilees’ de modo literal porque el texto fuente mide la vida por jubileos y no requiere equivalencia dinámica adicional.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ conforme al criterio del proyecto para el nombre divino.
  - ‘Justicia’ se mantiene para δικαιοσύνη/צדקה cuando el contexto es moral-covenantal.
  - Se evita ‘siervo’ porque el pasaje no contiene δοῦλος ni lenguaje servicial técnico.
  - La puntuación y el ritmo buscan lectura pública, pero sin suavizar los rasgos idiomáticos del original.
