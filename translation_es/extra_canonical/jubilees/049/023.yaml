revisions:
- from: delante de Yahvé, sobre el altar de tu Dios. Porque celebraste esta fiesta con prisa cuando saliste de Egipto, hasta que entraste en el desierto de Shur; pues en la orilla del mar la cumpliste[a].
  to: delante de Yahvé, sobre el altar de su Dios. Porque observaste esta fiesta con prisa cuando saliste de Egipto, hasta que entraste en el desierto de Shur; pues en la orilla del mar la cumpliste[a].
  rationale: Se corrige «tu Dios» a «su Dios» para reflejar el posesivo plural/colectivo del original en un español panhispánico natural, y se ajusta «celebraste» a «observaste» para alinearlo mejor con el matiz ritual documentado en el POB inglés. Se conserva la nota léxica sobre «la cumpliste», que sigue siendo útil y está correctamente anclada.
