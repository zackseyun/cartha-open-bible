  text: before the LORD, upon the altar of your God. For you observed this feast in haste when you came out from Egypt until you entered the wilderness of Shur, because at the shore of the sea you completed it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:06Z'
    unchanged: false
    changes_summary: 'Adjusted word order to more naturally and accurately reflect the subject: ''For you observed this feast in haste'' instead of ''For this feast you observed with haste.'' No other changes needed.'
translation:
  language: es
  text: delante de Yahvé, sobre el altar de su Dios. Porque observaste esta fiesta con prisa cuando saliste de Egipto, hasta que entraste en el desierto de Shur; pues en la orilla del mar la cumpliste[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La cumpliste» puede entenderse también como «la completaste» o «la terminaste», reflejando el matiz de llevar la fiesta a su plena observancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: YHWH
  rationale: La instrucción del proyecto pide mantener el nombre divino como «Yahvé» en el texto principal. Aunque el inglés POB usa «the LORD» como convención auditada, en español se evita esa máscara y se recupera el nombre explícito.
- source_word: ምሥዋዐ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - sacrificio
  - ara
  lexicon: מִזְבֵּחַ / altar
  rationale: El contexto inmediato exige el sentido de lugar de ofrenda, no de sacrificio en abstracto. «Altar» es la equivalencia más natural y fiel en español.
- source_word: አምላክክሙ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios
  lexicon: אֱלֹהֵיכֶם
  rationale: El sufijo posesivo plural se refleja naturalmente en español bíblico como «tu Dios» dirigido al pueblo en conjunto; en estilo de habla directa al colectivo puede funcionar mejor que «vuestro Dios» para lectura panhispánica contemporánea.
- source_word: በዓለ፡ በውልዋሌ
  english_pob_choice: this feast
  chosen_spanish: esta fiesta
  alternatives_spanish:
  - esta celebración
  - esta solemnidad
  lexicon: חָג
  rationale: La referencia es a una fiesta ritual concreta. «Fiesta» comunica claramente el evento sin introducir un registro eclesiástico más técnico que el original no exige.
- source_word: ገበርክምዋ
  english_pob_choice: you observed
  chosen_spanish: celebraste
  alternatives_spanish:
  - guardaste
  - observaste
  lexicon: עָשָׂה / cumplir una fiesta
  rationale: El inglés POB siguió el sentido de observar/celebrar una fiesta. En español, «celebraste» expresa con naturalidad la realización cultual de la fiesta; «observaste» suena más literal pero menos idiomático en este contexto.
- source_word: አመ፡ ትወፅኡ፡ እምግብጽ፡
  english_pob_choice: when you came out from Egypt
  chosen_spanish: cuando saliste de Egipto
  alternatives_spanish:
  - cuando salisteis de Egipto
  - cuando saliste de Egipto
  lexicon: יָצָא מִמִּצְרַיִם
  rationale: Se conserva la salida de Egipto con verbo simple y directo. La segunda persona singular en español funciona como forma colectiva reverente y mantiene la fluidez del enunciado.
- source_word: ውስተ፡ ገዳመ፡ ሱር
  english_pob_choice: the wilderness of Shur
  chosen_spanish: el desierto de Shur
  alternatives_spanish:
  - el páramo de Shur
  - la región desértica de Shur
  lexicon: מִדְבַּר שׁוּר
  rationale: «Desierto de Shur» es la forma más transparente y tradicional para el topónimo bíblico, y evita perífrasis que diluirían el nombre propio.
- source_word: በኀበ፡ ድንጋገ፡ ባሕር፡
  english_pob_choice: at the shore of the sea
  chosen_spanish: en la orilla del mar
  alternatives_spanish:
  - junto a la costa del mar
  - a la orilla del mar
  lexicon: שְׂפַת הַיָּם
  rationale: «Orilla del mar» reproduce bien la imagen espacial y conserva la sencillez del original. La variante «a la orilla» es posible, pero la construcción con «en» funciona bien en español para ubicar el acto completivo.
theological_decisions:
- issue: Uso del nombre divino frente a la convención «LORD/SEÑOR»
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto fuente contiene el nombre divino, y el proyecto exige no enmascararlo en español. Mantener «Yahvé» preserva la transparencia textual y el principio auditado de traducción directa desde las fuentes originales.
  doctrine_reference: Éxodo 3:15; convención editorial POB sobre el Tetragrámaton
- issue: Término para el cumplimiento ritual de la fiesta
  english_pob_reading: you observed this feast
  chosen_spanish_reading: celebraste esta fiesta
  alternative_spanish_readings:
  - observaste esta fiesta
  - guardaste esta fiesta
  rationale: 'No hay tensión doctrinal, pero sí una elección semántica: el pasaje describe la ejecución ritual de la fiesta. «Celebraste» comunica mejor en español la participación cultual sin perder el matiz de observancia.'
  doctrine_reference: Lexicografía ritual de חג / observancia festiva
- issue: Relación entre salida de Egipto, desierto de Shur y costa del mar
  english_pob_reading: when you came out from Egypt until you entered the wilderness of Shur, because at the shore of the sea you completed it
  chosen_spanish_reading: cuando saliste de Egipto, hasta que entraste en el desierto de Shur; pues en la orilla del mar la cumpliste
  alternative_spanish_readings:
  - '...porque la terminaste en la orilla del mar'
  - '...hasta que entraste al desierto de Shur, ya que la acabaste en la orilla del mar'
  rationale: 'Se mantiene la secuencia histórica y causal del original: la fiesta se observó desde el éxodo hasta el desierto de Shur, y se completó en la orilla del mar. «Cumpliste» conserva la idea de llevarla a término sin forzar un matiz litúrgico distinto.'
  doctrine_reference: Narrativa de la Pascua/fiesta del éxodo en Jubileos
translation_notes:
  revision_awareness: 'Se incorporó el ajuste del pass final en inglés: el sujeto correcto es «you observed this feast in haste», no «this feast you observed with haste». Por eso el español coloca el adverbial de modo con el verbo de celebración: «celebraste esta fiesta con prisa». También se respetó la secuencia final del texto fuente, donde la fiesta se completa en la orilla del mar.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usó segunda persona singular como tratamiento colectivo bíblico, coherente con el inglés POB y con el tono del pasaje.
  - «Cumpliste» se eligió para reflejar el sentido de llevar la fiesta a término; la nota aclara la alternativa semántica.
  - No se introdujeron términos eclesiásticos ajenos al registro del texto; «altar», «fiesta» y «desierto» siguen la transparencia del original.
