  text: All of Israel shall observe it at its appointed time. And every man who comes on that day shall eat it in the house of the sanctuary of your God before the LORD, from twenty years old and upward, because
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:03Z'
    unchanged: false
    changes_summary: Changed 'of the people of Israel' to 'All of Israel' for completeness and natural English; changed 'has come' to 'comes' for a more natural/generic rendering; retained the unfinished final 'because' to match the source; rendered ቤተ መቅደሱ more literally as 'the house of the sanctuary' rather than simply 'the sanctuary.'
translation:
  language: es
  text: Todo Israel lo observará en su tiempo señalado. Y todo hombre que venga en ese día lo comerá en la casa del santuario de su Dios delante de Yahvé, desde los veinte años en adelante, porque
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሮሙ፡ ለእስራኤል፡
  english_pob_choice: All of Israel shall observe it
  chosen_spanish: Todo Israel lo observará
  alternatives_spanish:
  - Todo el pueblo de Israel lo observará
  - Toda Israel lo observará
  lexicon: Israel / collective subject
  rationale: El ge’ez presenta a Israel como sujeto colectivo; ‘Todo Israel’ reproduce la amplitud colectiva que la revisión inglesa quiso fijar con ‘All of Israel’, sin añadir una expresión más explicativa que el texto no exige.
- source_word: ይገበርዎ፡ በጊዜሁ።
  english_pob_choice: shall observe it at its appointed time
  chosen_spanish: lo observará en su tiempo señalado
  alternatives_spanish:
  - lo guardará en su tiempo señalado
  - lo observará en el tiempo fijado
  lexicon: appointed time / observance
  rationale: ‘በጊዜሁ’ indica un tiempo propio o señalado; ‘en su tiempo señalado’ conserva la relación de pertenencia y el carácter fijado del momento. ‘Observará’ mantiene el valor de cumplimiento ritual que el inglés POB expresó con ‘observe’.
- source_word: ወ*ኵሉ፡ ሰብእ፡ *ዘመጽአ፡ በዕለቱ፡
  english_pob_choice: And every man who comes on that day
  chosen_spanish: Y todo hombre que venga en aquel día
  alternatives_spanish:
  - Y todo hombre que haya venido en aquel día
  - Y todo varón que llegue en aquel día
  lexicon: every man who comes
  rationale: El participio ge’ez describe al que llega en ese día de forma general; ‘que venga’ conserva el valor genérico presente del inglés revisado (‘comes’) sin forzar un pretérito. ‘Todo hombre’ sigue la fuerza inclusiva y legal del original.
- source_word: ይብልዎ፡
  english_pob_choice: shall eat it
  chosen_spanish: lo comerá
  alternatives_spanish:
  - lo comerá allí
  - lo deberá comer
  lexicon: eat
  rationale: El verbo simple ‘comerá’ reproduce la acción prescriptiva sin añadir elementos no presentes. El objeto ‘lo’ mantiene la referencia al alimento ritual implícito en el contexto.
- source_word: በቤተ፡ መቅደሱ፡
  english_pob_choice: in the house of the sanctuary
  chosen_spanish: en la casa del santuario
  alternatives_spanish:
  - en el casa del santuario
  - en el templo
  lexicon: house of the sanctuary
  rationale: Se conserva la construcción concreta de la revisión inglesa, ‘house of the sanctuary’, evitando reducirla a ‘templo’, que suavizaría la estructura semítica y perdería la literalidad auditable.
- source_word: ለአምላክክሙ፡
  english_pob_choice: your God
  chosen_spanish: de tu Dios
  alternatives_spanish:
  - de vuestro Dios
  - de su Dios
  lexicon: your God
  rationale: El sufijo pronominal plural del ge’ez puede reflejar el destinatario colectivo; en español, ‘tu’ funciona aquí como posesivo singular genérico dirigido al pueblo, mientras que ‘vuestro’ sería posible pero menos natural en el español neutro latinoamericano. Se conserva la relación posesiva sin ampliar la referencia.
- source_word: በቅድመ፡ እግዚአብሔር፡
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: YHWH / divine name
  rationale: Se sigue el principio del proyecto de traducir el nombre divino como ‘Yahvé’, y ‘delante de’ conserva la preposición relacional del original y del inglés POB ‘before’ sin recurrir al sustituto litúrgico ‘Señor’.
- source_word: ዘእም*፳ዓመት፡ ወላዕለ፡
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años en adelante
  alternatives_spanish:
  - a partir de los veinte años
  - desde los veinte años y más
  lexicon: from twenty years old and upward
  rationale: ‘Desde los veinte años en adelante’ es idiomático y conserva el rango mínimo inclusivo del original y del inglés POB, sin perder el matiz de edad de ingreso al requisito ritual.
theological_decisions:
- issue: Nombre divino en una fórmula de presencia cultual
  english_pob_reading: before the LORD
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante el Señor
  - en presencia del Señor
  rationale: La instrucción del proyecto exige ‘Yahvé’ para יהוה. El contexto litúrgico no justifica ocultar el nombre divino tras un título; ‘delante de’ mantiene la relación de comparecencia cultual sin introducir mayor interpretación.
  doctrine_reference: Tetragrámaton / nombre divino en traducción
- issue: Referencia a Israel como sujeto colectivo
  english_pob_reading: All of Israel shall observe it
  chosen_spanish_reading: Todo Israel lo observará
  alternative_spanish_readings:
  - Toda Israel lo observará
  - Todo el pueblo de Israel lo observará
  rationale: No se individualiza indebidamente el mandato ni se lo restringe a una élite. La formulación colectiva conserva el alcance comunitario y ritual del precepto.
  doctrine_reference: Pueblo del pacto / observancia comunitaria
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que universaliza el sujeto (‘All of Israel’), actualiza el presente genérico (‘comes’), conserva el final inconcluso ‘because’, y opta por una traducción más literal de ‘the house of the sanctuary’. La versión española refleja esas decisiones sin resolver el final abrupto del verso.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - Se usa ‘santuario’ en vez de ‘templo’ para conservar la literalidad de ‘house of the sanctuary’.
  - Se conserva el tono ritual y jurídico con verbos simples y sin ampliaciones explicativas.
  - No se añaden notas textuales porque el material de origen y el audit trail no documentan variantes adicionales para este versículo.
