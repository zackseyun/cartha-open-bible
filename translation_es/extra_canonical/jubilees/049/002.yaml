  - He reservado «Pascua» para ጳስካ, con «memorial» para el sentido conmemorativo cultual.
  - He mantenido «Mastema» sin traducir por ser nombre propio del adversario en Jubileos.
  - He preservado el tono legal con «estatuto», «tiempo señalado» y «será eliminado».
  - He usado pasiva o formulación impersonal donde el original expresa norma ritual general.
