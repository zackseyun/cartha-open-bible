revisions:
- from: 'En la noche, al atardecer del día quince, desde la puesta del sol. Porque en esa noche vino el comienzo de la fiesta, y vino el comienzo del regocijo. Ustedes habitaban en Egipto, comiendo la Pascua, mientras todos los poderes de Mastema fueron enviados para herir a todos los primogénitos en la tierra de Egipto, desde el primogénito del faraón hasta el primogénito de la esclava cautiva que estaba en el molino, y también al ganado. Y esta es la señal que Yahvé les dio: en toda casa en la que vieran la sangre de un cordero de un año en los postes de la puerta, no entrarían en esa casa para matar, sino que la pasarían de largo, para que todos los que estaban en la casa fueran salvados, porque la señal de la sangre estaba en sus postes de la puerta. Y los poderes de Yahvé hicieron todo exactamente como Yahvé les había mandado, y pasaron sobre todos los hijos de Israel, y no vino sobre ellos ninguna plaga para destruir de entre ellos ninguna vida, desde los animales hasta los seres humanos,
    y aun los perros. Y la plaga en Egipto fue muy grande, y no había casa en Egipto en la que no hubiera un muerto, y luto y lamentación. Pero todo Israel estaba habitando mientras comía la carne de la Pascua, y bebía vino, y alababa, y bendecía, y daba gracias a Yahvé, el Dios de sus padres; y estaban listos para salir de debajo del yugo de Egipto y de la mala esclavitud. Y tú también, recuerda este día todos los días de tu vida, y obsérvalo de año en año, todos los días de tu vida, una vez cada año, en su día, conforme a toda su ley; y no muevas el día de día en día ni de mes en mes. Porque es un estatuto perpetuo, y está escrito y ordenado en las tablas celestiales para todos los hijos de Israel, para que lo observen cada año, año tras año, en su día, una vez cada año, por todas sus generaciones; y no hay fin de días, porque esto ha sido ordenado para siempre. Y el hombre que esté limpio y venga a observarlo en su día, para presentar una ofrenda aceptable delante de Yahvé y comer y beber
    delante de Yahvé en el día de su fiesta —ese hombre, estando limpio y cercano, será eliminado[b] porque no presentó la ofrenda de Yahvé en su tiempo señalado; ese hombre llevará su pecado. Por eso los hijos de Israel vendrán y observarán la Pascua en su tiempo señalado, el día catorce del primer mes, entre las tardes, desde el mediodía hasta la tercera parte de la noche; porque dos partes del día se dan a la luz, y una tercera parte pertenece al atardecer. Esto es lo que Yahvé te mandó observar en medio de la tarde. Y no se sacrificará durante ningún tiempo de la luz, sino al atardecer; y la comerán al atardecer hasta la tercera parte de la noche; y lo que quede de toda su carne después de la tercera parte de la noche lo quemarán con fuego. Y no la comerán cruda, ni la comerán hervida en agua, sino asada al fuego; con su cabeza, con sus entrañas y con sus patas la asarán al fuego; y no quebrarán de ella ningún hueso, porque ningún hueso de los hijos de Israel debe ser quebrado. Por esto
    Yahvé mandó a los hijos de Israel observar la Pascua en su tiempo señalado, y no se quebrará de ella ningún hueso, porque es día de fiesta y día mandado; y no la trasladarán de un día a otro, ni de mes a mes, sino que debe observarse en el día de su fiesta. Y tú, manda a los hijos de Israel que observen la Pascua en sus tiempos, cada año, una vez cada año, en su tiempo señalado; y vendrá como memorial aceptable delante de Yahvé, y no les vendrá plaga para matanza ni para golpe en aquel año cuando observen la Pascua.'
  to: 'En la noche, al atardecer del día quince, desde la puesta del sol. Porque en esa noche vino el comienzo de la fiesta, y vino el comienzo del regocijo. Ustedes habitaban en Egipto, comiendo la Pascua, mientras todos los poderes de Mastema fueron enviados para herir a todos los primogénitos en la tierra de Egipto, desde el primogénito del faraón hasta el primogénito de la esclava cautiva que estaba en el molino, y también al ganado. Y esta es la señal que Yahvé les dio: en toda casa en la que vieran la sangre de un cordero de un año en los postes de la puerta, no entrarían en esa casa para matar, sino que la pasarían por alto, para que todos los que estaban en la casa fueran salvados, porque la señal de la sangre estaba en sus postes de la puerta. Y los poderes de Yahvé hicieron todo exactamente como Yahvé les había mandado, y pasaron por alto a todos los hijos de Israel, y no vino sobre ellos ninguna plaga para destruir de entre ellos ninguna vida, desde el ganado hasta el ser humano,
    y aun a los perros. Y la plaga en Egipto fue muy grande, y no había casa en Egipto en la que no hubiera un muerto, y luto y lamentación. Pero todo Israel estaba habitando mientras comía la carne de la Pascua, y bebía vino, y alababa, y bendecía, y daba gracias a Yahvé, el Dios de sus padres; y estaban listos para salir de debajo del yugo de Egipto y de la mala esclavitud. Y tú también, recuerda este día todos los días de tu vida, y obsérvalo de año en año, todos los días de tu vida, una vez cada año, en su día, conforme a toda su ley; y no muevas el día de día en día ni de mes en mes. Porque es un estatuto perpetuo, y está escrito y ordenado en las tablas celestiales para todos los hijos de Israel, para que lo observen cada año, año tras año, en su día, una vez cada año, por todas sus generaciones; y no hay fin de días, porque esto ha sido ordenado para siempre. Y el hombre que esté limpio y venga a observarlo en su día, para presentar una ofrenda aceptable delante de Yahvé y comer y
    beber delante de Yahvé en el día de su fiesta —ese hombre, estando limpio y cercano, será eliminado[b] porque no presentó la ofrenda de Yahvé en su tiempo señalado; ese hombre llevará su pecado. Por eso los hijos de Israel vendrán y observarán la Pascua en su tiempo señalado, el día catorce del primer mes, entre las tardes, desde el mediodía hasta la tercera parte de la noche; porque dos partes del día se dan a la luz, y una tercera parte pertenece al atardecer. Esto es lo que Yahvé te mandó observar en medio del atardecer. Y no se sacrificará durante ningún tiempo de la luz, sino al atardecer; y la comerán al atardecer hasta la tercera parte de la noche; y lo que quede de toda su carne después de la tercera parte de la noche lo quemarán con fuego. Y no la comerán cruda, ni la comerán hervida en agua, sino asada al fuego; con su cabeza, con sus entrañas y con sus patas la asarán al fuego; y no quebrarán de ella ningún hueso, porque ningún hueso de entre los hijos de Israel debe ser quebrado.
    Por esto Yahvé mandó a los hijos de Israel observar la Pascua en su tiempo señalado, y no se quebrará de ella ningún hueso, porque es día de fiesta y día ordenado; y no la trasladarán de un día a otro, ni de mes a mes, sino que debe observarse en el día de su fiesta. Y tú, manda a los hijos de Israel que observen la Pascua en sus tiempos, cada año, una vez cada año, en su tiempo señalado; y vendrá como memorial aceptable delante de Yahvé, y no les vendrá plaga para matanza ni para herida en aquel año cuando observen la Pascua.'
  rationale: 'Se hicieron reparaciones menores pero necesarias para mejorar fidelidad y español: «pasar por alto» para el acto pascual respecto de la casa/Israel; «en medio del atardecer» para una frase temporal más natural; «día ordenado» en lugar del calco «día mandado»; «para herida» en vez de «para golpe»; y pequeños ajustes de estilo ritual. La estructura, la teología y la nota principal se conservan.'
