theological_decisions:
- issue: Nombre divino frente a sustituto litúrgico
  english_pob_reading: LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: La POB española debe ser transparente y no enmascarar el nombre divino cuando el marco del proyecto lo pide; el contexto de Jubileos y la audit trail justifican «Yahvé».
  doctrine_reference: Ex 3:15; práctica POB de no ocultar el Tetragrámaton
- issue: Mastema como poder personal o colectivo
  english_pob_reading: all the powers of Mastema
  chosen_spanish_reading: todos los poderes de Mastema
  alternative_spanish_readings:
  - todas las potestades de Mastema
  - todas las fuerzas de Mastema
  rationale: Se mantiene la figura de Mastema como agente personal detrás de fuerzas subordinadas; «poderes» preserva la pluralidad de agentes sin despersonalizarlo.
  doctrine_reference: Jubileos 10:8-11; angelología/demonología de Jubileos
- issue: Pena de exclusión versus simple negligencia
  english_pob_reading: shall be cut off because he did not bring the offering ... at its appointed time
  chosen_spanish_reading: será eliminado porque no presentó la ofrenda ... en su tiempo señalado
  alternative_spanish_readings:
  - será cortado porque no presentó la ofrenda ... en su tiempo señalado
  - será extirpado porque no presentó la ofrenda ... a su tiempo
  rationale: La revisión corrigió una pérdida grave del sentido legal. «Será eliminado» comunica la pena de exclusión/corte sin sobretraducir a categorías técnicas que el lector general podría no entender.
  doctrine_reference: Nm 9:13; pena de karet en lenguaje bíblico
- issue: Marco temporal pascual y división del día
  english_pob_reading: between the evenings, from the middle of the day until the third part of the night
  chosen_spanish_reading: entre las tardes, desde el mediodía hasta la tercera parte de la noche
  alternative_spanish_readings:
  - entre las tardes, desde la mitad del día hasta la tercera parte de la noche
  - entre las tardes, desde el mediodía hasta la primera parte de la noche
  rationale: El ge'ez refleja una partición del día que la revisión ya había corregido. Se evita introducir «tarde» donde el texto habla de división horaria, y se conserva la expresión ritual «entre las tardes».
  doctrine_reference: Éx 12:6; Nm 9:3-5; cronología pascual
- issue: Carne del sacrificio y modo de consumo
  english_pob_reading: raw / boiled in water / roasted with fire
  chosen_spanish_reading: cruda / hervida en agua / asada al fuego
  alternative_spanish_readings:
  - cruda / cocida en agua / asada al fuego
  - cruda / hervida / tostada al fuego
  rationale: Se conserva la triada de contrastes sin reinterpretar ni suavizar la prohibición ritual.
  doctrine_reference: Éx 12:8-10
- issue: Destino de la sangre en los postes de la puerta
  english_pob_reading: the sign of the blood was on its doorposts
  chosen_spanish_reading: la señal de la sangre estaba en sus postes de la puerta
  alternative_spanish_readings:
  - la marca de la sangre estaba en sus postes de la puerta
  - la señal de la sangre estaba sobre sus jambas
  rationale: «Postes de la puerta» mantiene el paralelismo con el texto fuente y evita tecnicismos arquitectónicos que no son necesarios para la claridad.
  doctrine_reference: Éx 12:7, 13
translation_notes:
  revision_awareness: He incorporado la revisión que corrige la pena legal de «neglects it» a «shall be cut off», y he evitado seguir la formulación anterior errónea. También he atendido la nota de revisión sobre la sección temporal de la Pascua, distinguiendo la partición del día de la referencia a la tarde/noche y manteniendo la cláusula ritual «entre las tardes».
  spanish_consistency_notes:
