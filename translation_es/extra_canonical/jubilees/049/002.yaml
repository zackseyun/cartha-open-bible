  source_alignment_summary: 'El borrador español sigue de cerca el sentido general del ge''ez y del rastro POB en la mayor parte del versículo: calendario pascual, agentes de Mastema, señal de la sangre, exclusión de la plaga, memorial anual y reglas de consumo. También adopta correctamente «Yahvé» y preserva la pena fuerte de exclusión. Sin embargo, hay varios desajustes puntuales con el texto fuente y con la auditoría inglesa revisada.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero contiene algunas formulaciones poco naturales o imprecisas: «la pasarían de largo» para una casa es torpe; «en medio de la tarde» no refleja bien la expresión temporal; «día mandado» suena calcado; y la nota [b] está bien formada pero la frase principal puede mejorarse. También conviene afinar algunos términos rituales y de estilo para mayor legibilidad eclesial.'
  glossary_alignment: 'Buen alineamiento global con la terminología del proyecto: «Yahvé», «Pascua», «esclava», «memorial», «Yahvé» no enmascarado. No hay conflicto mayor de glosario. Las mejoras necesarias son más de fidelidad y naturalidad: «pasarán por alto» en vez de «la pasarían de largo», «hombres» o «ser humano» según contexto, y mejor formulación de la sanción y del día festivo ordenado.'
  issues:
  - severity: medium
    issue: «la pasarían de largo» para la casa
    rationale: El ge'ez y el inglés expresan el acto pascual de pasar por encima/saltar esa casa. En español neutro bíblico, «la pasarían de largo» aplicado a una casa suena forzado. «la pasarían por alto» o «pasarían por encima de ella» comunica mejor el sentido.
  - severity: medium
    issue: «en medio de la tarde»
    rationale: La cláusula posterior dice que Yahvé mandó observarlo «en el medio del evening». En español, «en medio de la tarde» es poco idiomático y puede chocar con «entre las tardes». «a mitad del atardecer» o «en medio del atardecer» refleja mejor el valor temporal ritual sin introducir una cronología distinta.
  - severity: low
    issue: «día mandado»
    rationale: Aunque sigue de cerca el inglés auditado, en español suena calcado. «día ordenado» o «día señalado por mandato» es más natural sin perder el matiz de precepto.
  - severity: low
    issue: «para golpe»
    rationale: La última frase conserva literalmente «for smiting», pero «para golpe» resulta dura e impropia en español bíblico corriente. «para herida» o «para azote» comunica mejor el sentido de golpe/plaga.
  - severity: low
    issue: Nota y anclaje correctos, pero la frase puede afinarse
    rationale: La nota [b] está bien anclada y útil. No obstante, «será eliminado» puede reforzarse con una redacción ligeramente más jurídica y natural en la oración principal, manteniendo la nota alternativa «será cortado».
  revised_spanish_text: 'En la noche, al atardecer del día quince, desde la puesta del sol. Porque en esa noche vino el comienzo de la fiesta, y vino el comienzo del regocijo. Ustedes habitaban en Egipto, comiendo la Pascua, mientras todos los poderes de Mastema fueron enviados para herir a todos los primogénitos en la tierra de Egipto, desde el primogénito del faraón hasta el primogénito de la esclava cautiva que estaba en el molino, y también al ganado. Y esta es la señal que Yahvé les dio: en toda casa en la que vieran la sangre de un cordero de un año en los postes de la puerta, no entrarían en esa casa para matar, sino que la pasarían por alto, para que todos los que estaban en la casa fueran salvados, porque la señal de la sangre estaba en sus postes de la puerta. Y los poderes de Yahvé hicieron todo exactamente como Yahvé les había mandado, y pasaron por alto a todos los hijos de Israel, y no vino sobre ellos ninguna plaga para destruir de entre ellos ninguna vida, desde el ganado
    hasta el ser humano, y aun a los perros. Y la plaga en Egipto fue muy grande, y no había casa en Egipto en la que no hubiera un muerto, y luto y lamentación. Pero todo Israel estaba habitando mientras comía la carne de la Pascua, y bebía vino, y alababa, y bendecía, y daba gracias a Yahvé, el Dios de sus padres; y estaban listos para salir de debajo del yugo de Egipto y de la mala esclavitud. Y tú también, recuerda este día todos los días de tu vida, y obsérvalo de año en año, todos los días de tu vida, una vez cada año, en su día, conforme a toda su ley; y no muevas el día de día en día ni de mes en mes. Porque es un estatuto perpetuo, y está escrito y ordenado en las tablas celestiales para todos los hijos de Israel, para que lo observen cada año, año tras año, en su día, una vez cada año, por todas sus generaciones; y no hay fin de días, porque esto ha sido ordenado para siempre. Y el hombre que esté limpio y venga a observarlo en su día, para presentar una ofrenda aceptable delante
    de Yahvé y comer y beber delante de Yahvé en el día de su fiesta —ese hombre, estando limpio y cercano, será eliminado[b] porque no presentó la ofrenda de Yahvé en su tiempo señalado; ese hombre llevará su pecado. Por eso los hijos de Israel vendrán y observarán la Pascua en su tiempo señalado, el día catorce del primer mes, entre las tardes, desde el mediodía hasta la tercera parte de la noche; porque dos partes del día se dan a la luz, y una tercera parte pertenece al atardecer. Esto es lo que Yahvé te mandó observar en medio del atardecer. Y no se sacrificará durante ningún tiempo de la luz, sino al atardecer; y la comerán al atardecer hasta la tercera parte de la noche; y lo que quede de toda su carne después de la tercera parte de la noche lo quemarán con fuego. Y no la comerán cruda, ni la comerán hervida en agua, sino asada al fuego; con su cabeza, con sus entrañas y con sus patas la asarán al fuego; y no quebrarán de ella ningún hueso, porque ningún hueso de entre los hijos de
    Israel debe ser quebrado. Por esto Yahvé mandó a los hijos de Israel observar la Pascua en su tiempo señalado, y no se quebrará de ella ningún hueso, porque es día de fiesta y día ordenado; y no la trasladarán de un día a otro, ni de mes a mes, sino que debe observarse en el día de su fiesta. Y tú, manda a los hijos de Israel que observen la Pascua en sus tiempos, cada año, una vez cada año, en su tiempo señalado; y vendrá como memorial aceptable delante de Yahvé, y no les vendrá plaga para matanza ni para herida en aquel año cuando observen la Pascua.'
  revised_footnotes:
  - marker: b
    text: O «será cortado»; la expresión refleja la pena bíblica de exclusión por no traer la ofrenda en su tiempo señalado.
