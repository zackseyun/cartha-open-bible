    changes_summary: Removed 'come and' because it is not represented in the source, and smoothed 'at the going down of the sun' to the more natural but still formal 'at sunset.'
translation:
  language: es
  text: De año en año. Y en los días en que la casa sea edificada en el nombre de Yahvé en la tierra de su heredad, allí irán y degollarán la Pascua por la tarde, al ponerse el sol.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እምዓመት፡ በ*ዓመት።
  english_pob_choice: from year to year
  chosen_spanish: De año en año
  alternatives_spanish:
  - Año tras año
  - De un año a otro
  lexicon: repetición anual
  rationale: La expresión ge'ez indica repetición cíclica anual; 'de año en año' es natural, formal y conserva el valor distributivo sin añadir matices no presentes.
- source_word: ተሐንጸ፡ ቤት፡
  english_pob_choice: the house is built
  chosen_spanish: la casa sea edificada
  alternatives_spanish:
  - la casa sea construida
  - se edifique la casa
  lexicon: edificar/ construir
  rationale: '''Edificada'' mantiene el tono formal y bíblico y evita una mecanización excesiva; no se fuerza un sentido distinto del de construcción del edificio.'
- source_word: በስመ፡ እግዚአብሔር፡
  english_pob_choice: in the name of the LORD
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - en nombre de Yahvé
  - en el nombre del Señor
  lexicon: YHWH / nombre divino
  rationale: Se usa 'Yahvé' conforme al estándar del proyecto para יהוה; 'nombre de' conserva la fórmula cultual del original sin sustituirla por una máscara reverencial.
- source_word: በምድረ፡ ርስትሙ፡
  english_pob_choice: in the land of their inheritance
  chosen_spanish: en la tierra de su heredad
  alternatives_spanish:
  - en la tierra de su herencia
  - en la tierra de su posesión
  lexicon: heredad
  rationale: '''Heredad'' refleja el lenguaje bíblico de posesión hereditaria y conserva mejor el registro tradicional que ''herencia'', sin perder inteligibilidad.'
- source_word: ህየ፡ የሐሩ፡ ወይጥብሑ፡
  english_pob_choice: there they shall go and slaughter
  chosen_spanish: allí irán y sacrificarán
  alternatives_spanish:
  - allí irán y matarán
  - allí irán y degollarán
  lexicon: slaughter / sacrifice
  rationale: El contexto pascual exige expresar el acto sacrificial, no solo el matado físico; 'sacrificarán' comunica el valor cultual del verbo sin borrar la acción concreta de inmolar.
- source_word: ጳስካ፡
  english_pob_choice: Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pésaj
  - la Pascua de liberación
  lexicon: Passover
  rationale: '''Pascua'' es la forma española ampliamente entendida y mantiene la referencia bíblica; no se introduce una glosa explicativa que exceda el texto.'
- source_word: ምሴተ፡
  english_pob_choice: in the evening
  chosen_spanish: por la tarde
  alternatives_spanish:
  - al anochecer
  - en la tarde
  lexicon: evening
  rationale: '''Por la tarde'' reproduce de modo natural el marco temporal general del original y se ajusta al registro bíblico en español.'
- source_word: እንዘ፡ የዐርብ፡ ፀሐይ፡
  english_pob_choice: at sunset
  chosen_spanish: al ponerse el sol
  alternatives_spanish:
  - al ocaso
  - al atardecer
  lexicon: sunset
  rationale: '''Al ponerse el sol'' conserva la imagen concreta del movimiento solar y corresponde bien al valor de ''at sunset'' sin perder formalidad.'
theological_decisions:
- issue: Nombre divino en una formulación cultual
  english_pob_reading: in the name of the LORD
  chosen_spanish_reading: en el nombre de Yahvé
  alternative_spanish_readings:
  - en el nombre del Señor
  rationale: La fuente ge'ez explicita el nombre divino en una fórmula de dedicación/observancia. Siguiendo la política del proyecto, se evita la sustitución reverencial por 'Señor' y se conserva el referente del Tetragrámaton.
  doctrine_reference: Éxodo 3:15; Deuteronomio 12:5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que eliminó erróneamente el movimiento verbal y la aclaración posterior de que el ge'ez sí incluye 'irán'; por eso la traducción española conserva 'irán y sacrificarán'. También se siguió la corrección de 'at sunset' como una formulación natural y formal en español ('al ponerse el sol').
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se conserva el verbo de movimiento ('irán') porque está atestiguado en el source payload y fue defendido en la revisión posterior.
  - '''Sacrificarán'' se eligió para reflejar el acto pascual cultual; no se reduce a un mero matar físico.'
  - El registro es bíblico-formal, pero con sintaxis española natural.
