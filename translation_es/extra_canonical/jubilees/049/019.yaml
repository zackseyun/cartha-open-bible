revisions:
- from: De año en año. Y en los días en que la casa sea edificada en el nombre de Yahvé en la tierra de su heredad, allí irán y sacrificarán la Pascua por la tarde, al ponerse el sol.
  to: De año en año. Y en los días en que la casa sea edificada en el nombre de Yahvé en la tierra de su heredad, allí irán y degollarán la Pascua por la tarde, al ponerse el sol.
  rationale: Se revisa únicamente el verbo principal del acto pascual para reflejar con mayor fidelidad la fuerza léxica del ge'ez y del inglés POB auditado ('go and slaughter'). El resto del borrador es sólido y natural en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:09:49Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del ge''ez y del POB auditado: repetición anual, construcción de la casa en el nombre divino, ubicación en la tierra de la heredad, y la secuencia verbal ''irán y ...''. Sin embargo, el verbo ''sacrificarán'' atenúa el valor léxico concreto de ''slaughter'' / ወይጥብሑ, que el inglés POB preserva deliberadamente. En este contexto cultual puede mantenerse la fuerza concreta con ''degollarán'' o ''matarán'' sin perder el marco sacrificial; ''degollarán la Pascua'' suena bíblico y preciso.'
  spanish_quality_summary: El texto es claro, natural y de registro digno. 'De año en año', 'en el nombre de Yahvé' y 'en la tierra de su heredad' funcionan bien. 'Por la tarde' es aceptable, aunque el binomio con 'al ponerse el sol' queda un poco más terso con 'al atardecer' o 'en la tarde'; no es un error. La principal mejora necesaria es léxica, no estilística.
  glossary_alignment: Alinea bien con las pautas del proyecto en 'Yahvé', 'Pascua' y el tono general. La única desviación relevante es que el proyecto pide conservar la fuerza de verbos sacrificiales/violentos cuando el inglés POB eligió 'slaughter'; por eso 'sacrificarán' resulta demasiado suavizado frente a la decisión auditada.
  issues:
  - severity: medium
    issue: El verbo 'sacrificarán' suaviza demasiado ህየ፡ የሐሩ፡ ወይጥብሑ፡ / 'there they shall go and slaughter'.
    rationale: El inglés POB y la revisión posterior insisten en conservar tanto el verbo de movimiento como el de matanza ritual. 'Sacrificarán' expresa el marco cultual, pero difumina la acción concreta que 'slaughter' preserva. 'Irán y degollarán la Pascua' mantiene mejor la fuerza léxica y sigue siendo bíblico y comprensible.
  revised_spanish_text: De año en año. Y en los días en que la casa sea edificada en el nombre de Yahvé en la tierra de su heredad, allí irán y degollarán la Pascua por la tarde, al ponerse el sol.
  revision_rationale: Se revisa únicamente el verbo principal del acto pascual para reflejar con mayor fidelidad la fuerza léxica del ge'ez y del inglés POB auditado ('go and slaughter'). El resto del borrador es sólido y natural en español.
