    changes_summary: Changed 'opposite' to 'before' for more natural formal English reflecting the spatial sense, and added 'with' before 'all the assembly' to account for the final phrase and complete the sentence more naturally.
translation:
  language: es
  text: a su tiempo señalado, en todo conforme a su mandamiento. Y no será lícito comerlo fuera del santuario de Yahvé, sino delante del santuario de Yahvé, y todo el pueblo de la asamblea
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: በጊዜሁ፡
  english_pob_choice: at its appointed time
  chosen_spanish: a su tiempo señalado
  alternatives_spanish:
  - en su tiempo señalado
  - en el tiempo designado para ello
  lexicon: time / appointed time
  rationale: El ge'ez expresa tiempo fijado o determinado; «a su tiempo señalado» conserva la idea de cita establecida sin volverla más interpretativa de lo que exige el texto.
- source_word: በከመ፡ ትእዛዙ
  english_pob_choice: in every respect according to its command
  chosen_spanish: en todo conforme a su mandamiento
  alternatives_spanish:
  - en todo según su mandamiento
  - completamente conforme a su mandato
  lexicon: command / commandment
  rationale: «Mandamiento» mantiene la fuerza normativa del original y permite una relación más directa con el estándar exigido; «en todo» conserva el matiz de totalidad del giro ge'ez.
- source_word: በአፍአ፡ እምቤተ፡ መቅደሱ፡
  english_pob_choice: outside the sanctuary of the LORD
  chosen_spanish: fuera del santuario de Yahvé
  alternatives_spanish:
  - fuera del santuario de Yahvé
  - en las afueras del santuario de Yahvé
  lexicon: outside / sanctuary
  rationale: El ge'ez marca exclusión espacial; «fuera de» es el equivalente claro y natural en español. Se mantiene «Yahvé» como decisión terminológica del proyecto para el nombre divino.
- source_word: በአንጻረ፡ ቤተ፡ መቅደሱ፡
  english_pob_choice: before the sanctuary of the LORD
  chosen_spanish: delante del santuario de Yahvé
  alternatives_spanish:
  - ante el santuario de Yahvé
  - frente al santuario de Yahvé
  lexicon: before / before in spatial sense
  rationale: La revisión inglesa aclaró que el sentido es espacial, no meramente temporal; «delante de» comunica bien la posición espacial en español sin cargarla con un matiz litúrgico añadido.
- source_word: ወኵሉ፡ ሕዝበ፡ ማኅበር
  english_pob_choice: and all the people of the assembly
  chosen_spanish: y todo el pueblo de la asamblea
  alternatives_spanish:
  - y todo el pueblo de la congregación
  - y todo el pueblo reunido
  lexicon: people of the assembly / congregation
  rationale: Se conserva la estructura «pueblo de la asamblea» porque el audit trail señala que la frase completa pertenece al flujo sintáctico del contexto siguiente. «Asamblea» traduce ማኅበር de manera más neutral que una sustitución eclesiástica cerrada.
theological_decisions:
- issue: Nombre divino en el santuario
  english_pob_reading: the sanctuary of the LORD
  chosen_spanish_reading: el santuario de Yahvé
  alternative_spanish_readings:
  - el santuario del Señor
  rationale: Siguiendo la convención del proyecto, se restituye el nombre divino como «Yahvé» en vez de la máscara «SEÑOR». No hay indicio en este versículo de una razón para desviar esa norma.
  doctrine_reference: Tetragrammaton / divine-name rendering
- issue: Cierre sintáctico de la cláusula con 'all the assembly'
  english_pob_reading: and all the people of the assembly
  chosen_spanish_reading: y todo el pueblo de la asamblea
  alternative_spanish_readings:
  - con todo el pueblo de la asamblea
  - y toda la asamblea
  rationale: El aparato revisado indica que la frase no debe independizarse como aposición suelta, sino conservarse como parte del encadenamiento del contexto inmediato. Por eso se deja en forma coordinada, sin convertirla en una lectura más interpretativa.
  doctrine_reference: syntactic continuity / cross-verse context
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión inglesa que corrigió «opposite» a un sentido espacial más natural («before») y que restableció la continuidad de «and all the people of the assembly» con el contexto siguiente, sin desligar la frase de su función sintáctica. También se evitó depender mecánicamente del inglés, atendiendo al ge'ez conservado en el expediente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma consistente para el nombre divino.
  - «Santuario» se usa de manera uniforme para בית/templo-santuario en este registro.
  - La frase final conserva su ambigüedad de coordinación/acompañamiento mediante nota, sin forzar una única lectura.
  - El español procura ser formal y publicable, pero sin añadir contenido no sustentado por el texto fuente.
