base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/049/001.yaml
  text: 'Remember the command that the LORD commanded you concerning the Passover: that you should observe it at its appointed time, on the fourteenth day of the first month; that you should slaughter it before evening and that they should eat it.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:01Z'
    unchanged: false
    changes_summary: Changed 'keep it' to 'observe it' for a more formal and precise rendering of the command concerning Passover. No other changes needed.
translation:
  language: es
  text: 'Recuerda el mandamiento que Yahvé te dio acerca de la Pascua: que la observes en su tiempo señalado, el día catorce del primer mes; que la sacrifiques antes del atardecer y que ellos la coman.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: YHWH
  rationale: El texto ge'ez corresponde al nombre divino del mandamiento; siguiendo la norma del proyecto, se evita el ocultamiento por mayúsculas y se usa la forma explícita 'Yahvé'.
- source_word: ፋሲካ / Passover
  english_pob_choice: Passover
  chosen_spanish: Pascua
  alternatives_spanish:
  - Pésaj
  - la fiesta de la Pascua
  lexicon: פֶּסַח / πάσχα
  rationale: '''Pascua'' es la forma española transparente y ampliamente inteligible para este término festivo; ''Pésaj'' conservaría más proximidad semítica, pero aquí no es necesaria para la claridad.'
- source_word: ትግበር / observe
  english_pob_choice: observe it
  chosen_spanish: la observes
  alternatives_spanish:
  - la guardes
  - la cumplas
  lexicon: שמר
  rationale: La revisión inglesa precisó 'observe' para el mandato ritual; 'la observes' mantiene ese valor formal y litúrgico sin perder naturalidad en español.
- source_word: በጊዜሁ / at its appointed time
  english_pob_choice: at its appointed time
  chosen_spanish: en su tiempo señalado
  alternatives_spanish:
  - en su tiempo
  - a su tiempo fijado
  lexicon: מועד
  rationale: '''Tiempo señalado'' expresa bien el carácter de fecha fijada por mandato, preservando la idea de cita ritual.'
- source_word: ዐሡሩ ወረቡዑ / the fourteenth
  english_pob_choice: the fourteenth day
  chosen_spanish: el día catorce
  alternatives_spanish:
  - el catorce
  - el decimocuarto día
  lexicon: '14'
  rationale: Se conserva la formulación cronológica natural en español y coherente con el registro bíblico.
- source_word: ለወርኅ ቀዳማዊ / of the first month
  english_pob_choice: of the first month
  chosen_spanish: del primer mes
  alternatives_spanish:
  - del mes primero
  lexicon: ראשון / πρώτη
  rationale: La expresión directa y sobria 'primer mes' reproduce fielmente la indicación calendárica.
- source_word: ከመ፡ ትጥብቍ / that you should slaughter it
  english_pob_choice: that you should slaughter it
  chosen_spanish: que la sacrifiques
  alternatives_spanish:
  - que la inmoles
  - que la mates
  lexicon: שחט
  rationale: '''Sacrificar'' es el equivalente español más natural y reverente para el acto ritual de matar la víctima pascual; ''inmolar'' es posible, pero menos idiomático aquí.'
- source_word: ዘእንበለ፡ ይምሰይ / before evening
  english_pob_choice: before evening
  chosen_spanish: antes del atardecer
  alternatives_spanish:
  - antes de la tarde
  - antes de anochecer
  lexicon: בֵּין הָעַרְבַּיִם / ערב
  rationale: '''Atardecer'' comunica bien el límite temporal ritual y suena más natural que un calco como ''antes de la tarde''.'
- source_word: ወከመ፡ ይብልዕዎ / and that they should eat it
  english_pob_choice: and that they should eat it
  chosen_spanish: y que la coman
  alternatives_spanish:
  - y que la coman ellos
  - y que la coman
  lexicon: אכל
  rationale: Se mantiene la referencia femenina al sustantivo implícito 'la' (Pascua/víctima pascual) para reflejar el objeto directo del mandato sin añadir explicaciones no presentes en el texto.
theological_decisions:
- issue: Nombre divino en el mandato pascual
  english_pob_reading: the LORD commanded you
  chosen_spanish_reading: Yahvé te ordenó
  alternative_spanish_readings:
  - el Señor te ordenó
  - el SEÑOR te ordenó
  rationale: El proyecto pide preservar el nombre divino explícito cuando el original lo sustenta. No se usa una máscara tipográfica, porque el texto fuente presenta el nombre divino como parte directa del mandato.
  doctrine_reference: Tetragrámaton / nombre divino en la Escritura
- issue: Carácter ritual de la Pascua
  english_pob_reading: observe it at its appointed time
  chosen_spanish_reading: la observes en su tiempo señalado
  alternative_spanish_readings:
  - la guardes en su tiempo señalado
  - la cumplas en su tiempo señalado
  rationale: '''Observe'' conserva mejor el sentido de cumplimiento ritual de una orden ceremonial; evita reducirlo a mera memoria o conmemoración.'
  doctrine_reference: Ley ritual / observancia festiva
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'keep it' por 'observe it' para precisar el carácter formal del mandato pascual; la traducción española sigue esa revisión con 'la observes'. No hay otros cambios relevantes en el audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del nombre divino según la política del proyecto.
  - '''Pascua'' se usa como término festivo principal; no se introduce ''Pésaj'' porque el contexto no exige una transliteración semítica.'
  - 'Se conserva el paralelismo sintáctico del original: mandato inicial, observancia en tiempo señalado, fecha exacta, sacrificio previo al atardecer y consumo final.'
