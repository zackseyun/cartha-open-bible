revisions:
- from: 'Recuerda el mandamiento que Yahvé te ordenó acerca de la Pascua: que la observes en su tiempo señalado, el día catorce del primer mes; que la sacrifiques antes del atardecer y que la coman.'
  to: 'Recuerda el mandamiento que Yahvé te dio acerca de la Pascua: que la observes en su tiempo señalado, el día catorce del primer mes; que la sacrifiques antes del atardecer y que ellos la coman.'
  rationale: 'Se hicieron dos ajustes menores: (1) «te dio» reemplaza «te ordenó» para una construcción más natural con «mandamiento» sin alterar el sentido de mandato divino; (2) se añadió «ellos» para reflejar el cambio de sujeto presente en la fuente y evitar ambigüedad en español. No se requieren notas.'
  reviewer_model: gpt-5.4
