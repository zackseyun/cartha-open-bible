review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido principal del ge''ez y del texto inglés auditado: la Pascua no debe celebrarse en las ciudades ni en cualquier otro lugar, sino ante la tienda de Yahvé, o ante su casa donde él habita. También mantiene correctamente la disyunción ''o'' documentada en la revisión inglesa. Sin embargo, el texto español está incompleto al comenzar con una elipsis y omitir la cláusula inicial ''that has been sanctified in the name of the LORD'', que sí forma parte del versículo fuente.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Delante de la tienda de Yahvé'' y ''donde habita'' son lecturas fluidas y fieles. No obstante, la nota [a] está mal anclada: explica como alternativa ''o delante de su casa'', pero esa misma lectura ya está en el texto principal, de modo que la nota resulta redundante e incorrecta. Además, la elipsis inicial hace que el versículo quede truncado.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''Yahvé'' respeta la convención para el nombre divino, ''Pascua'' es adecuado, y ''tienda'' es una opción defendible frente a ''tabernáculo''. La decisión léxica documentada para ''consagrado'' es aceptable, pero debe aparecer en el texto revisado para reflejar la cláusula omitida. No hay conflicto teológico relevante.'
  issues:
  - severity: high
    issue: Omisión de la cláusula inicial del versículo
    rationale: El borrador empieza con '...' y no traduce 'that has been sanctified in the name of the LORD', que está presente en la fuente y en el POB inglés auditado.
  - severity: medium
    issue: Nota al pie redundante y mal justificada
    rationale: 'La nota [a] dice ''También puede entenderse: “o delante de su casa”'', pero ''o delante de su casa'' ya está en el texto principal; no preserva una alternativa real ni corresponde a la nota inglesa, que solo registraba un rendering previo.'
  revised_spanish_text: lo que ha sido consagrado en el nombre de Yahvé. Y no podrán celebrar la Pascua en sus ciudades, ni en ningún lugar, excepto delante de la tienda de Yahvé, o delante de su casa donde habita.
  revised_footnotes: []
  revision_rationale: Se restaura la cláusula inicial omitida para reflejar íntegramente el versículo fuente y el audit trail inglés. Se elimina la nota al pie porque no aporta una alternativa válida en español y, tal como está, duplica el texto principal. También se suaviza la puntuación en 'su casa donde habita' para mantener una lectura más natural en español sin cambiar el sentido.
  requires_gpt54_adjudication: false
