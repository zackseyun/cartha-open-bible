  yaml_path: translation/extra_canonical/jubilees/049/021.yaml
  text: that has been sanctified in the name of the LORD. And they shall not be able to observe the Passover in their cities, nor in any place except before the tent of the LORD, or before his house where he dwells.
  footnotes:
  - marker: a
    text: Or 'and before his house'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:04Z'
    unchanged: false
    changes_summary: 'Removed unsupported material (''his name'' and ''and they shall not go astray after the LORD''), and simplified the final clause to reflect the source more closely: ''before his house where he dwells.'''
translation:
  language: es
  text: lo que ha sido consagrado en el nombre de Yahvé. Y no podrán celebrar la Pascua en sus ciudades, ni en ningún lugar, excepto delante de la tienda de Yahvé, o delante de su casa donde habita.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: sanctified
  english_pob_choice: has been sanctified
  chosen_spanish: consagrado
  alternatives_spanish:
  - santificado
  - apartado para Dios
  lexicon: Geez passive sanctification term
  rationale: En español, 'consagrado' comunica mejor la idea de algo puesto aparte para uso sagrado sin cargar demasiado con matices devocionales modernos de 'santificado'. Mantiene la idea cultual del estado descrito por el original.
- source_word: name of the LORD
  english_pob_choice: name of the LORD
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre del Señor
  lexicon: divine name rendering
  rationale: Se conserva 'Yahvé' según la norma del proyecto para el tetragrámaton/divino nombre. 'Nombre de Yahvé' refleja el valor cultual del original sin sustituirlo por una máscara.
- source_word: Passover
  english_pob_choice: Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua de Yahvé
  - la fiesta de la Pascua
  lexicon: festival term
  rationale: '''Pascua'' es el equivalente natural y tradicional en español para la festividad bíblica. El contexto ya restringe el rito; no hace falta expandirlo.'
- source_word: cities
  english_pob_choice: their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus pueblos
  - sus localidades
  lexicon: common noun
  rationale: '''Ciudades'' reproduce de forma directa el referente espacial del texto sin reinterpretarlo.'
- source_word: tent of the LORD
  english_pob_choice: tent of the LORD
  chosen_spanish: la tienda de Yahvé
  alternatives_spanish:
  - el tabernáculo de Yahvé
  - la tienda del Señor
  lexicon: cultic dwelling
  rationale: '''Tienda'' sigue de cerca la imagen del original y evita introducir el término técnico ''tabernáculo'' si el texto fuente no lo requiere expresamente. ''De Yahvé'' preserva el nombre divino.'
- source_word: where he dwells
  english_pob_choice: where he dwells
  chosen_spanish: donde habita
  alternatives_spanish:
  - donde mora
  - en la que habita
  lexicon: dwelling verb
  rationale: '''Habita'' es claro y solemne en español bíblico contemporáneo, y mantiene la idea de residencia divina sin agregar contenido textual.'
theological_decisions:
- issue: Divine name versus title in cultic setting
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El proyecto exige representar el nombre divino con 'Yahvé' cuando el texto remite al Tetragrámaton. Esto preserva la transparencia textual y la continuidad del audit trail.
  doctrine_reference: Éxodo 3:15; convención editorial POB
- issue: Location of permitted Passover observance
  english_pob_reading: except before the tent of the LORD, or before his house where he dwells
  chosen_spanish_reading: excepto delante de la tienda de Yahvé, o delante de su casa, donde habita
  alternative_spanish_readings:
  - excepto delante de la tienda de Yahvé y delante de su casa, donde habita
  rationale: Se mantiene la disyunción 'o' porque el control textual indicó que el giro ge'ez 'wa-'ama 'ako' corresponde idiomáticamente a 'or/otherwise'. La lectura con 'y' sería una corrección no sustentada.
  doctrine_reference: Jubilees 49:21, revisión crítica del texto ge'ez
- issue: Unsupported expansion to 'his name'
  english_pob_reading: before his house where he dwells
  chosen_spanish_reading: delante de su casa, donde habita
  alternative_spanish_readings:
  - delante de su casa, donde mora
  - delante de su casa, en la que habita
  rationale: Se excluye 'su nombre' porque la revisión crítica lo removió por no estar sustentado en el texto base. La frase final queda limitada a la morada divina.
  doctrine_reference: revisión textual 2026-04-23
translation_notes:
  revision_awareness: 'El draft sigue la revisión crítica más reciente: elimina la expansión no sustentada “su nombre” y conserva la disyunción correcta “o” antes de “delante de su casa”. La redacción española se ajusta al ge''ez y al inglés auditado sin reintroducir material descartado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme a la política del proyecto.
  - 'Se preserva la estructura cultual y espacial del texto: consagración, Pascua, ciudades, tienda/casa.'
  - No se introduce 'tabernáculo' para evitar tecnicismo no requerido por el original; 'tienda' es suficientemente transparente.
  - La nota al pie se ancla explícitamente en 'o' para reflejar la alternativa de lectura sin alterar el texto principal.
