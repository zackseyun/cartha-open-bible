base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/049/020.yaml
  text: in the third part of the day. And they shall bring its blood to the base of the altar, and they shall place its fat on the fire that is upon the altar, and they shall eat its flesh roasted with fire in the court of the house
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:03Z'
    unchanged: false
    changes_summary: Changed 'threshold of the altar' to 'base of the altar' for better lexical accuracy and more natural formal English; retained the rest as accurate and complete.
translation:
  language: es
  text: en la tercera parte del día. Y llevarán su sangre a la base del altar, y pondrán su sebo sobre el fuego que está sobre el altar, y comerán su carne asada al fuego en el atrio de la casa
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በ*ሣልስቲ፡ ለዕለት።
  english_pob_choice: in the third part of the day
  chosen_spanish: en la tercera parte del día
  alternatives_spanish:
  - a la tercera parte del día
  - en la tercera porción del día
  lexicon: third part of the day
  rationale: La expresión ge'ez indica una división temporal del día; en español, 'tercera parte del día' conserva el valor composicional sin añadir una hora precisa que el texto no da.
- source_word: ደሞ፡
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: blood
  rationale: '''Sangre'' es la equivalencia natural y fiel; no se añade ''derramada'' porque el texto solo habla de llevarla al altar.'
- source_word: ምካይዳ፡ ለምሥዋዕ፡
  english_pob_choice: the base of the altar
  chosen_spanish: la base del altar
  alternatives_spanish:
  - el fundamento del altar
  - el pie del altar
  lexicon: base
  rationale: La revisión inglesa corrigió 'threshold' a 'base'; en español, 'base del altar' transmite con claridad el punto inferior o fundamento sin forzar una imagen arquitectónica específica.
- source_word: ሥብሖ፡
  english_pob_choice: fat
  chosen_spanish: sebo
  alternatives_spanish:
  - grasa
  - gordura
  lexicon: fat
  rationale: '''Sebo'' conserva el sentido sacrificial de la grasa seleccionada para el altar y mantiene un registro bíblico preciso; ''grasa'' sería más general.'
- source_word: ይነብሩ፡ ዲበ፡ እሳት፡ ዘላዕለ፡ ምሥዋዕ፡
  english_pob_choice: they shall place its fat on the fire that is upon the altar
  chosen_spanish: pondrán su sebo sobre el fuego que está sobre el altar
  alternatives_spanish:
  - lo pondrán sobre el fuego que está sobre el altar
  - pondrán su grasa sobre el fuego que está sobre el altar
  lexicon: altar fire
  rationale: Se conserva la relación locativa 'sobre el fuego que está sobre el altar' y el pronombre posesivo 'su' para seguir de cerca la sintaxis del original sin volverla opaca.
- source_word: ይብልዑ፡ ሥጋሁ፡ ጥቡሰ፡ በእሳት፡
  english_pob_choice: they shall eat its flesh roasted with fire
  chosen_spanish: comerán su carne asada al fuego
  alternatives_spanish:
  - comerán su carne asada con fuego
  - comerán su carne asada sobre el fuego
  lexicon: roasted with fire
  rationale: '''Asada al fuego'' comunica la idea sacrificial de una cocción por fuego de manera idiomática en español y preserva el paralelismo con el inglés auditado.'
- source_word: በውስተ፡ ዐጸደ፡ ቤት፡
  english_pob_choice: in the court of the house
  chosen_spanish: en el atrio de la casa
  alternatives_spanish:
  - en el patio de la casa
  - en el recinto de la casa
  lexicon: court of the house
  rationale: '''Atrio'' es la opción bíblica más precisa para el espacio del templo/casa sacrificial; ''casa'' se conserva porque el texto no especifica más allá de esa designación.'
theological_decisions:
- issue: 'Ubicación del altar: ''base'' frente a ''umbral'''
  english_pob_reading: base of the altar
  chosen_spanish_reading: base del altar
  alternative_spanish_readings:
  - umbral del altar
  - pie del altar
  rationale: La revisión inglesa asentó 'base' como la lectura correcta. En español se adopta esa corrección para evitar una metáfora espacial impropia del altar y respetar el ajuste textual ya auditado.
  doctrine_reference: No aplica; decisión textual y lexical, no doctrinal.
- issue: Terminología sacrificial de la carne y la grasa
  english_pob_reading: its fat ... its flesh roasted with fire
  chosen_spanish_reading: su sebo ... su carne asada al fuego
  alternative_spanish_readings:
  - su grasa ... su carne asada con fuego
  - su gordura ... su carne asada al fuego
  rationale: '''Sebo'' preserva el matiz de la porción grasa ofrecida ritualmente; ''carne asada al fuego'' mantiene la estructura sacrificial sin suavizar el carácter cultual del acto.'
  doctrine_reference: No aplica; precisión ritual del texto.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde 'threshold of the altar' a 'base of the altar' por precisión léxica; la versión española sigue esa lectura corregida y mantiene intacto el resto del enunciado, sin añadir interpretaciones ni expandir el marco ritual.
  spanish_consistency_notes:
  - Se mantiene 'altar' y no 'olocausto' o fórmulas litúrgicas ajenas al original.
  - '''Casa'' se conserva según el inglés auditado; ''atrio'' traduce el espacio exterior de acceso/consumo.'
  - No se introduce mayúscula en 'altar' ni en 'atrio' porque el pasaje no lo requiere.
  - La preposición 'al fuego' refleja de forma natural la construcción sacrificial sin sobrecargar el verso con una glosa explicativa.
