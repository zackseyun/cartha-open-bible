base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/049/018.yaml
  text: Thus it is written and ordained that they should eat it in the sanctuary of the LORD. And when the children of Israel enter the land that they are to possess, in the land of Canaan, and they set up the tent of the LORD in the midst of the land, in one of their tribes, until the sanctuary of the LORD is built in the land, they shall come and observe the Passover in the midst of the tent of the LORD, and they shall slaughter it before the LORD.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:03Z'
    unchanged: false
    changes_summary: Capitalized the opening word for formal register, changed 'which' to 'that' for smoother English, and added final punctuation. No substantive translation changes were needed.
translation:
  language: es
  text: Así está escrito y ordenado que lo coman en el santuario de Yahvé. Y cuando los hijos de Israel entren en la tierra que han de poseer, en la tierra de Canaán, y levanten la tienda de Yahvé en medio de la tierra, en una de sus tribus, hasta que el santuario de Yahvé sea edificado en la tierra, vendrán y celebrarán la Pascua en medio de la tienda de Yahvé, y sacrificarán el cordero pascual ante Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለእግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: YHWH
  rationale: El texto ge'ez usa la forma divina correspondiente al nombre del pacto; la política del proyecto pide 'Yahvé' en el texto principal, no una sustitución por 'SEÑOR'. Mantiene la referencia nominal y la transparencia auditiva.
- source_word: ተጽሕፈ፡ ወተሠርዐ፡
  english_pob_choice: it is written and ordained
  chosen_spanish: Así está escrito y ordenado
  alternatives_spanish:
  - está escrito y decretado
  - fue escrito y establecido
  lexicon: כתב / ordenar
  rationale: La coordinación conserva el paralelismo de 'escrito' + 'ordenado' sin introducir una paráfrasis. 'Así' reproduce el valor inferencial de la apertura inglesa y su tono jurídico.
- source_word: ይብልዕዎ፡
  english_pob_choice: they should eat it
  chosen_spanish: lo coman
  alternatives_spanish:
  - lo coman ellos
  - lo comerán
  lexicon: אכל
  rationale: El verbo expresa comer como mandato/orden. En español, el subjuntivo de propósito/obligación comunica mejor la fuerza normativa que un futuro simple.
- source_word: ውሉደ፡ እስራኤል፡
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los descendientes de Israel
  - el pueblo de Israel
  lexicon: בני ישראל
  rationale: Es la equivalencia estable y transparente para este giro étnico-covenantal. 'Hijos' preserva la imagen heredada del original y del inglés POB.
- source_word: በኤብ ... ምድር፡ እንተ፡ ይእኅዙ
  english_pob_choice: the land that they are to possess
  chosen_spanish: la tierra que han de poseer
  alternatives_spanish:
  - la tierra que poseerán
  - la tierra destinada a ser su heredad
  lexicon: ירש
  rationale: '''Han de poseer'' conserva la noción de posesión futura y determinada, sin reducirla a mera descripción temporal. ''Poseerán'' sería más llano, pero pierde algo del matiz de destino/obligación.'
- source_word: ደብተራ፡ እግዚአብሔር
  english_pob_choice: the tent of the LORD
  chosen_spanish: la tienda de Yahvé
  alternatives_spanish:
  - el tabernáculo de Yahvé
  - la tienda del Señor
  lexicon: משכן / אהל
  rationale: El ge'ez habla de una 'tienda', y el inglés POB mantiene 'tent'. En español, 'tienda de Yahvé' conserva esa concreción móvil y evita imponer 'tabernáculo' donde el texto visible no lo exige.
- source_word: ማእከለ፡ ምድር፡
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en el centro de la tierra
  - en medio del país
  lexicon: תוך הארץ
  rationale: '''En medio de la tierra'' es fiel y natural; ''del país'' moderniza el referente pero atenúa la imagen territorial del original.'
- source_word: በአሐዱ፡ እምነ፡ ሠራዊቶሙ፡
  english_pob_choice: in one of their tribes
  chosen_spanish: en una de sus tribus
  alternatives_spanish:
  - en una de sus campamentos
  - entre una de sus tribus
  lexicon: שבט
  rationale: '''Tribus'' corresponde de manera directa al lenguaje de Israel. Se evita ''campamentos'' porque el contexto ya habla de instalar la tienda; aquí el referente es la subdivisión tribal.'
- source_word: እስከ፡ አመ፡ ይትሐነጽ፡ መቅደሱ
  english_pob_choice: until the sanctuary of the LORD is built
  chosen_spanish: hasta que el santuario de Yahvé sea edificado
  alternatives_spanish:
  - hasta que se construya el santuario de Yahvé
  - hasta que el santuario de Yahvé esté edificado
  lexicon: בית מקדש / בנה
  rationale: '''Sea edificado'' conserva el pasivo solemne y la densidad cultual del original mejor que un simple ''se construya''. Mantiene el estado resultante esperado por el texto.'
- source_word: ይገብሩ፡ ጳስካ
  english_pob_choice: they shall ... observe the Passover
  chosen_spanish: celebrarán la Pascua
  alternatives_spanish:
  - guardarán la Pascua
  - observarán la Pascua
  lexicon: פסח
  rationale: '''Celebrarán'' comunica una observancia litúrgica natural en español y evita la rigidez de ''observarán''. Se mantiene el sentido festivo-ritual sin apartarse del contenido prescriptivo.'
- source_word: ይጠብኅዎ፡ በቅድመ፡ እግዚአብ
  english_pob_choice: they shall slaughter it before the LORD
  chosen_spanish: la sacrificarán ante Yahvé
  alternatives_spanish:
  - la degollarán ante Yahvé
  - la inmolarán ante Yahvé
  lexicon: שחט
  rationale: '''Sacrificarán'' recoge la función cultual del acto en español eclesial amplio; ''degollarán'' sería más literal anatómicamente, pero más áspero y menos cultual. ''Ante Yahvé'' preserva la referencia de presencia divina.'
theological_decisions:
- issue: Uso del nombre divino en una cita de contexto cultual y legislativo
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El proyecto exige transliterar el nombre divino en el texto principal cuando el original subyacente es el tetragrámaton o su equivalente directo. No se usa el sustituto litúrgico porque ocultaría el dato fuente y debilitaría la trazabilidad.
  doctrine_reference: Nombre del pacto / transparencia textual
- issue: Modalidad normativa de la prescripción
  english_pob_reading: it is written and ordained that they should eat it ... they shall come and observe ... and they shall slaughter
  chosen_spanish_reading: Así está escrito y ordenado que lo coman ... vendrán y celebrarán ... y la sacrificarán
  alternative_spanish_readings:
  - está escrito y ordenado que deben comerlo ... deben venir y observar ... y deben sacrificarla
  rationale: La secuencia usa una fórmula legislativa; el español conserva el carácter prescriptivo con subjuntivo y futuro de mandato, sin convertirlo en mera predicción. 'Así' mantiene el tono de remisión a una norma previa.
  doctrine_reference: Ley ritual / obligación pactal
- issue: Referencia a la 'tienda' frente a un término eclesiástico más tradicional
  english_pob_reading: the tent of the LORD
  chosen_spanish_reading: la tienda de Yahvé
  alternative_spanish_readings:
  - el tabernáculo de Yahvé
  rationale: El original visible habla de una tienda, y el inglés POB no la reemplaza por un término más técnico. 'Tabernáculo' sería posible en tradición bíblica, pero introducirlo aquí sin necesidad perdería la correspondencia con el source packet.
  doctrine_reference: Santuario portátil / precisión terminológica
translation_notes:
  revision_awareness: La revisión inglesa no alteró el contenido sustantivo; solo ajustó mayúscula inicial, un relativo ('which' a 'that') y la puntuación final. Por ello, la versión española no necesita reflejar cambios de sentido, sino mantener el mismo contenido prescriptivo y cultual con fluidez natural.
  spanish_consistency_notes:
  - 'Se preserva la distinción entre ''tienda'' y ''santuario'' según el source packet: ''tienda de Yahvé'' para el espacio portátil y ''santuario de Yahvé'' para el edificio futuro.'
  - '''Pascua'' se usa como nombre festivo consagrado en español bíblico, evitando una transliteración innecesaria.'
  - La construcción 'han de poseer' mantiene el matiz de heredad futura sin sobrecargar la frase.
  - No se añaden notas a pie porque el pasaje no presenta variantes textuales o alternativas doctrinales que requieran anclaje explícito en el cuerpo español.
