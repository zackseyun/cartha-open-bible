  source_alignment_summary: 'El borrador español refleja fielmente el sentido del ge''ez y sigue adecuadamente la auditoría inglesa: Moisés debe mandar a los hijos de Israel guardar la ordenanza de la Pascua, instruirles año tras año y día tras día, y específicamente acerca de la fiesta de los panes sin levadura, para que coman panes sin levadura siete días, observen su fiesta y presenten su ofrenda cada día durante esos siete días de gozo. La distinción entre Pascua y fiesta de los panes sin levadura se conserva, y la cláusula final mantiene correctamente ፍሥሓ como ''gozo'' en vez de ''fiesta''.'
