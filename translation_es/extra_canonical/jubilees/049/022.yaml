base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/049/022.yaml
  text: And you, Moses, command the children of Israel to keep the ordinance of the Passover as it was commanded to you; tell them year by year, and day by day, and concerning the feast of unleavened bread, that they should eat unleavened bread for seven days, that they should observe its feast, and that they should bring its offering day by day during those seven days of rejoicing.
  footnotes:
  - marker: a
    text: Or 'the feast.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:05Z'
    unchanged: false
    changes_summary: Improved natural English and completeness by adding 'concerning' before 'the feast of unleavened bread' and revising the final phrase from 'seven days of rejoicing' to 'seven days of the feast' to reflect the source more accurately.
translation:
  language: es
  text: Y tú, Moisés, manda a los hijos de Israel que guarden la ordenanza de la Pascua, como se te mandó a ti; diles, año tras año y día tras día, y en cuanto a la fiesta de los panes sin levadura, que coman panes sin levadura durante siete días, que observen su fiesta y que presenten su ofrenda día tras día durante esos siete días de gozo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ስሙ / አዝዞሙ
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - manda a
  lexicon: mandar / ordenar
  rationale: El mandato es directo y autoritativo; en español 'manda' conserva la fuerza imperativa sin volverlo más litúrgico de lo que exige el texto.
- source_word: ውሉደ፡ እስራኤል
  english_pob_choice: children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  lexicon: hijos de Israel
  rationale: La expresión bíblica estándar en español comunica bien el grupo pactal sin introducir una paráfrasis sociológica.
- source_word: ሥርዐተ፡ ጳስካ
  english_pob_choice: ordinance of the Passover
  chosen_spanish: la ordenanza de la Pascua
  alternatives_spanish:
  - el estatuto de la Pascua
  - la norma de la Pascua
  lexicon: ordenanza / Pascua
  rationale: '''Ordenanza'' conserva el sentido legal-prescriptivo de ሥርዐት y evita suavizarlo a una mera costumbre.'
- source_word: በዓለ፡ ፍአት
  english_pob_choice: feast of unleavened bread
  chosen_spanish: la fiesta de los panes sin levadura
  alternatives_spanish:
  - la festividad de los panes sin levadura
  - la fiesta del pan sin levadura
  lexicon: panes sin levadura
  rationale: El plural refleja el plural implícito del alimento ritual y la fórmula bíblica ya establecida en español.
- source_word: ፍአተ፡ ሰቡዐ፡ ዕለተ
  english_pob_choice: unleavened bread for seven days
  chosen_spanish: panes sin levadura durante siete días
  alternatives_spanish:
  - panes sin levadura por siete días
  - panes sin levadura por siete días
  lexicon: durante siete días
  rationale: '''Durante'' transmite duración continua; ''panes'' mantiene la repetición del alimento ritual y suena natural en español.'
- source_word: በዓሎ
  english_pob_choice: its feast
  chosen_spanish: su fiesta
  alternatives_spanish:
  - su fiesta
  - su celebración
  lexicon: fiesta
  rationale: La posesión se refiere a la fiesta de los panes sin levadura; 'fiesta' es la opción más directa y fiel en español.
- source_word: ቍርባኖ
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda
  - sacrificio
  lexicon: ofrenda
  rationale: '''Ofrenda'' es suficientemente amplia para el término sacrificial y evita restringir innecesariamente el tipo de rito.'
- source_word: ፍሥሓ
  english_pob_choice: rejoicing
  chosen_spanish: gozo
  alternatives_spanish:
  - gozo
  - alegría
  - regocijo
  lexicon: gozo
  rationale: El ge'ez expresa alegría/rejoucing; 'gozo' preserva el tono festivo y bíblico sin forzar 'fiesta', que sería un error de sentido.
theological_decisions:
- issue: Relación entre Pascua y la fiesta de los panes sin levadura
  english_pob_reading: The text distinguishes the ordinance of the Passover from the feast of unleavened bread, while linking both in the same instruction.
  chosen_spanish_reading: La traducción distingue la ordenanza de la Pascua de la fiesta de los panes sin levadura, pero las enlaza en una sola exhortación.
  alternative_spanish_readings:
  - Unir ambas como una sola fiesta
  - Hacer de la Pascua y los panes sin levadura un mismo rito
  rationale: El texto fuente mantiene una distinción terminológica y ritual; la traducción no debe borrarla.
  doctrine_reference: Éxodo 12; Levítico 23:4-8
- issue: Sentido de ፍሥሓ en la cláusula final
  english_pob_reading: during those seven days of rejoicing
  chosen_spanish_reading: durante esos siete días de gozo
  alternative_spanish_readings:
  - durante esos siete días de alegría
  - durante esos siete días de regocijo
  rationale: La revisión inglesa corrigió erróneamente 'feast' por 'rejoicing'; la fuente ge'ez apoya un estado festivo de gozo, no un sustantivo para 'fiesta'.
  doctrine_reference: Salmos 100:2; Deuteronomio 16:14-15
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió por error el final a 'feast'; la fuente ge'ez confirma ፍሥሓ, por lo que el español conserva 'gozo' y no 'fiesta'. También se respeta la inserción de 'concerning' mediante 'en cuanto a' para introducir la cláusula sobre los panes sin levadura.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exija explícitamente; aquí no aparece.
  - '''Pascua'' y ''fiesta de los panes sin levadura'' se conservan como términos rituales distintos.'
  - Se evita 'siervo' porque no hay δοῦλος en este versículo.
