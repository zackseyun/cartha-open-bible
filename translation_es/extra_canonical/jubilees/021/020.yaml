revisions:
- from: Y no aceptes soborno[a] ni presente[b] por sangre humana; sangre por sangre se ha de dar delante de Yahvé, el Dios Altísimo. Y será para ti una buena protección, para que seas guardado de todo mal y para que él te libre de toda muerte. Porque veo, hijo mío, todas las obras de los hijos de los hombres, que todo su pecado y maldad y todas sus obras son inmundicia, abominación y contaminación, y no hay justicia en ellos. Cuídate de no andar en sus caminos ni de pisar sus senderos, y no peques con un pecado que lleva a muerte delante del Dios Altísimo, no sea que él oculte de ti su rostro y te entregue en manos de tus enemigos[20] y te arranque de la tierra, a ti y a tu descendencia de debajo del cielo, y destruya tu nombre y tu descendencia de toda la tierra. Apártate de todas sus obras y de toda su inmundicia, guarda el encargo del Dios Altísimo, y haz su voluntad, y sé recto en todo. Y él te bendecirá en todas tus obras, y levantará de ti una planta de justicia en toda la tierra por
    todas las generaciones de la tierra. Y mi nombre y tu nombre no será olvidado debajo del cielo para siempre. Ve, hijo mío, en paz. Que el Dios Altísimo, mi Dios y tu Dios, te fortalezca para hacer su voluntad; y que bendiga toda tu descendencia y el remanente de tu descendencia por generaciones eternas con toda bendición justa, para que llegues a ser bendición en toda la tierra». Y salió de su presencia gozoso.
  to: Y no aceptes un soborno ni un presente por sangre humana; sangre por sangre se ha de dar delante de Yahvé, el Dios Altísimo. Y será para ti una buena protección, para que seas guardado de todo mal y para que él te libre de toda muerte. Porque veo, hijo mío, todas las obras de los hijos de los hombres, que todo su pecado y maldad y todas sus obras son inmundicia, abominación y contaminación, y no hay justicia en ellos. Cuídate de no andar en sus caminos ni de pisar sus senderos, y no peques con un pecado que lleva a muerte delante del Dios Altísimo, no sea que él oculte de ti su rostro y te entregue en manos de tus enemigos[20] y te arranque de la tierra, a ti y a tu descendencia de debajo del cielo, y destruya tu nombre y tu descendencia de toda la tierra. Apártate de todas sus obras y de toda su inmundicia, guarda el encargo del Dios Altísimo, haz su voluntad y sé recto en todo. Y él te bendecirá en todas tus obras, y hará surgir de ti una planta de justicia en toda la tierra a lo
    largo de todas las generaciones de la tierra. Y mi nombre y tu nombre no serán olvidados debajo del cielo para siempre. Ve, hijo mío, en paz. Que el Dios Altísimo, mi Dios y tu Dios, te fortalezca para hacer su voluntad; y que bendiga toda tu descendencia y el remanente de tu descendencia por generaciones eternas con toda bendición justa, para que llegues a ser bendición en toda la tierra». Y salió de delante de él gozoso.
  rationale: Se corrigen una falla gramatical clara ('no serán olvidados'), varias asperezas de estilo ('hará surgir de ti', simplificación de comas y coordinación), y se eliminan dos notas léxicas no necesarias. Se conserva la nota textual importante sobre 'enemigos' y el resto de las decisiones fieles al source/audit trail.
