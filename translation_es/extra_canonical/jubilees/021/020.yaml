base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/020.yaml
  text: And do not accept a bribe or a present for human blood; blood for blood is to be rendered before the Lord, the Most High God. And it will be a good protection for you, so that you may be kept from every evil and so that he may save you from every death. For I see, my son, all the works of the children of men, that all their sin and evil and all their deeds are uncleanness and abomination and defilement, and there is no righteousness with them. Take care not to walk in their ways and not to tread in their paths, and do not sin a sin leading to death before the Most High God, lest he hide his face from you and give you into the hand of your enemies and root you out from the earth, and your seed from under heaven, and destroy your name and your seed from all the earth. Turn away from all their deeds and from all their uncleanness, and keep the charge of the Most High God, and do his will and be upright in everything. And he will bless you in all your deeds, and he will raise up from
    you a plant of righteousness in all the earth throughout all generations of the earth. And my name and your name will not be forgotten under heaven forever. Go, my son, in peace. May the Most High God, my God and your God, strengthen you to do his will; and may he bless all your seed and the remnant of your seed for everlasting generations with every righteous blessing, so that you may become a blessing on all the earth.” And he went out from before him rejoicing.
  footnotes:
  - marker: '20'
    text: The clause 'give you into the hand of your offense' is difficult. It may mean 'into the hand of your enemies' or preserve a corrupted reading. The translation stays close to the transmitted wording while signaling the warning of judgment.
    reason: textual_variant
  - marker: a
    text: Or 'gifts[20], and do not be partial in a case of'.
    reason: previous_rendering
  - marker: b
    text: Or 'memorial'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:58Z'
    unchanged: false
    changes_summary: Added 'a' in 'a good memorial' for natural English; added 'For' to reflect the connective; corrected 'hand of your offense' to 'hand of your enemies'; adjusted 'for the generations forever' to 'for everlasting generations' for more natural formal English while preserving sense.
translation:
  language: es
  text: Y no aceptes un soborno ni un presente por sangre humana; sangre por sangre se ha de dar delante de Yahvé, el Dios Altísimo. Y será para ti una buena protección, para que seas guardado de todo mal y para que él te libre de toda muerte. Porque veo, hijo mío, todas las obras de los hijos de los hombres, que todo su pecado y maldad y todas sus obras son inmundicia, abominación y contaminación, y no hay justicia en ellos. Cuídate de no andar en sus caminos ni de pisar sus senderos, y no peques con un pecado que lleva a muerte delante del Dios Altísimo, no sea que él oculte de ti su rostro y te entregue en manos de tus enemigos[20] y te arranque de la tierra, a ti y a tu descendencia de debajo del cielo, y destruya tu nombre y tu descendencia de toda la tierra. Apártate de todas sus obras y de toda su inmundicia, guarda el encargo del Dios Altísimo, haz su voluntad y sé recto en todo. Y él te bendecirá en todas tus obras, y hará surgir de ti una planta de justicia en toda la tierra a
    lo largo de todas las generaciones de la tierra. Y mi nombre y tu nombre no serán olvidados debajo del cielo para siempre. Ve, hijo mío, en paz. Que el Dios Altísimo, mi Dios y tu Dios, te fortalezca para hacer su voluntad; y que bendiga toda tu descendencia y el remanente de tu descendencia por generaciones eternas con toda bendición justa, para que llegues a ser bendición en toda la tierra». Y salió de delante de él gozoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '20'
    text: La lectura aquí es difícil en la transmisión textual. El audit trail adopta 'enemigos' como la mejor reconstrucción contextual, y se conserva el marcador para señalar esa variante.
    reason: textual_variant
lexical_decisions:
- source_word: ሕልያነ፡ ወአምኃ፡
  english_pob_choice: a bribe or a present
  chosen_spanish: soborno ni presente
  alternatives_spanish:
  - regalo
  - obsequio
  - don
  lexicon: sin entrada léxica específica; decisiones basadas en el paralelismo del segmento
  rationale: El ge'ez enumera dos elementos prohibidos; en español, 'soborno' mantiene la fuerza ética/legal de ሕልያነ፡ y 'presente' conserva el segundo término sin suavizarlo a un regalo neutral.
- source_word: ዑቃቤሁ፡
  english_pob_choice: protection
  chosen_spanish: protección
  alternatives_spanish:
  - resguardo
  - custodia
  - preservación
  lexicon: sin entrada léxica específica; decisión semántica por contexto
  rationale: La revisión inglesa corrigió 'memorial' a 'protection'; 'protección' es la equivalencia más transparente y natural en español para el sentido de resguardo eficaz.
- source_word: ሕጽበት / contexto de sangre por sangre
  english_pob_choice: blood for blood is to be rendered
  chosen_spanish: sangre por sangre se ha de dar
  alternatives_spanish:
  - sangre por sangre se ha de pagar
  - sangre por sangre se ha de retribuir
  lexicon: sin entrada léxica específica; construcción jurídico-retributiva
  rationale: Conserva la fórmula retributiva breve del original y del POB inglés, evitando añadir explicaciones interpretativas que no están en el texto.
- source_word: ἐν χερσὶν / 'hand of your enemies' (audit trail)
  english_pob_choice: into the hand of your enemies
  chosen_spanish: en manos de tus enemigos
  alternatives_spanish:
  - en poder de tus enemigos
  - a manos de tus enemigos
  lexicon: metáfora semítica de 'mano' como dominio o poder
  rationale: La expresión idiomática se vierte con naturalidad en español sin perder la imagen de sometimiento judicial o bélico.
- source_word: ኃጢአት፡ ... ስሕተተ፡ ለሞት፡
  english_pob_choice: a sin leading to death
  chosen_spanish: un pecado que lleva a muerte
  alternatives_spanish:
  - un pecado que conduce a la muerte
  - un pecado mortal
  lexicon: sin entrada léxica específica; sintaxis de finalidad/resultado
  rationale: '''Lleva a muerte'' mantiene la relación causal directa del original y evita la carga técnica posterior de ''pecado mortal''.'
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: justicia
  rationale: Se conserva 'justicia' por la carga covenantal y judicial del término en este pasaje; 'rectitud' se usa solo en 'sé recto' para el adjetivo contextual.
- source_word: ዘርአ
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - simiente
  lexicon: sin entrada léxica específica; término genealógico
  rationale: '''Descendencia'' es claro, bíblico y amplio en español actual, y evita la posible ambigüedad semántica de ''simiente''.'
- source_word: ተክለ፡ ጽድቅ፡
  english_pob_choice: a plant of righteousness
  chosen_spanish: una planta de justicia
  alternatives_spanish:
  - un retoño de justicia
  - un brote de justicia
  lexicon: sin entrada léxica específica; metáfora vegetal
  rationale: Se mantiene la metáfora vegetal literal del texto. 'Planta' reproduce bien la imagen de algo plantado que brota y se multiplica, aunque suene algo arcaico; evita sustituirla por una paráfrasis.
- source_word: በረከት ጻድቅ
  english_pob_choice: every righteous blessing
  chosen_spanish: toda bendición justa
  alternatives_spanish:
  - toda bendición recta
  - toda bendición de justicia
  lexicon: bendición + justo/justa
  rationale: '''Justa'' conserva el adjetivo de cualidad moral/judicial del original y se ajusta al femenino de ''bendición''.'
- source_word: ወወፅአ ... እንዘ ይትፌሣሕ
  english_pob_choice: And he went out from before him rejoicing
  chosen_spanish: Y salió de su presencia gozoso
  alternatives_spanish:
  - y salió de delante de él gozoso
  - y salió gozando
  lexicon: sin entrada léxica específica; fórmula narrativa
  rationale: '''De su presencia'' es una solución natural y reverente para la fórmula de despedida; ''gozoso'' preserva el estado resultante sin convertirlo en gerundio.'
theological_decisions:
- issue: El nombre divino en una cita/eco de 'the Most High God'
  english_pob_reading: the Lord, the Most High God
  chosen_spanish_reading: Yahvé, el Dios Altísimo
  alternative_spanish_readings:
  - el Señor, el Dios Altísimo
  - Dios Altísimo
  rationale: Se sigue el estándar del proyecto para יהוה como 'Yahvé'. Aunque el griego/inglés del contexto usa 'Lord', el auditorio auditado identifica el referente divino; por eso no se enmascara con 'SEÑOR'.
  doctrine_reference: Convención editorial POB sobre el nombre divino en traducción directa del texto base.
- issue: '''No hay justicia en ellos'' frente a lecturas que suavizan la antropología moral'
  english_pob_reading: there is no righteousness with them
  chosen_spanish_reading: no hay justicia en ellos
  alternative_spanish_readings:
  - no hay rectitud en ellos
  - no hay justicia junto a ellos
  rationale: Se mantiene el juicio negativo fuerte del texto y la oposición entre la conducta humana y la justicia. 'Rectitud' es posible, pero 'justicia' preserva mejor la densidad legal/covenantal del pasaje.
  doctrine_reference: 'Antropología moral en el marco de Jubileos: la humanidad sin justicia delante de Dios.'
- issue: '''Hand of your enemies'' versus la lectura textual problemática ''hand of your offense'''
  english_pob_reading: give you into the hand of your enemies
  chosen_spanish_reading: te entregue en manos de tus enemigos[20]
  alternative_spanish_readings:
  - te entregue en la mano de tu ofensa
  - te entregue en manos de tu ofensa
  rationale: La revisión textual del POB adjudica 'enemies' como corrección; se adopta esa lectura principal y se conserva el marcador para indicar la dificultad textual documentada.
  doctrine_reference: Manejo prudente de variantes textuales y de la lógica de juicio en el pasaje.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que corrigió 'memorial' a 'protection', 'hand of your offense' a 'hand of your enemies', y la preferencia de 'a bribe or a present' en lugar de 'gifts'. También ajusté la clausula final para reflejar 'everlasting generations' como 'generaciones eternas' y mantuve el flujo exhortativo del pasaje sin introducir paráfrasis doctrinales.
  spanish_consistency_notes:
  - Se usa 'Dios Altísimo' de manera consistente para el título divino, con 'Yahvé' cuando el texto alude al nombre divino según la convención del proyecto.
  - '''Descendencia'' se usa de forma uniforme para זרע/seed.'
  - '''Justicia'' se reserva para el sustantivo covenantal/legal; ''recto'' aparece solo como adjetivo moral en ''sé recto''.'
  - La metáfora vegetal 'planta de justicia' se conserva de forma literal y coherente con el inglés auditado.
  - Se mantiene un registro bíblico moderno y digno, evitando tanto el arcaísmo excesivo como la paráfrasis libre.
