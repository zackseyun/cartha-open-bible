review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia sacrificial del ge''ez y la corrección auditada de «entrails» frente a «loins». Conserva adecuadamente «grasa», «entrañas», «hígado con los riñones», la orden de remover, y la idea de ofrenda como «aroma agradable… delante de Yahvé». La única desalineación relevante es «que está sobre ellas»: el antecedente de «ellas» queda ambiguo e innecesariamente femenino en español, mientras que el ge''ez/inglés expresa simplemente una relación espacial plural sin fijar ese referente en el español inmediato.'
  spanish_quality_summary: El texto es claro y digno, pero «sobre ellas» suena algo forzado y poco natural porque no hay un antecedente femenino claro; además introduce una precisión gramatical que puede confundir. Una redacción más idiomática y fiel es «La grasa que está sobre ellos» o, mejor aún, «La grasa que está sobre las entrañas, y la que está sobre ellas…»; sin embargo, para no duplicar indebidamente el referente, la solución más limpia es usar masculino genérico plural en paralelo con el inglés auditado.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para el nombre divino, «aroma agradable» para la fórmula sacrificial, y términos anatómicos concretos. «Ofrenda vegetal» es aceptable para la ofrenda de cereal/grano asociada. No hay conflictos con los glosarios principales.'
  issues:
  - severity: medium
    issue: Ambigüedad en «que está sobre ellas»
    rationale: El antecedente femenino plural no está claro en español, y la frase puede sonar discordante al lector. El sentido sacrificial se preserva mejor con «sobre ellos», que funciona como plural no marcado para los elementos anatómicos referidos en conjunto.
  revised_spanish_text: La grasa que está sobre ellos, y la que está sobre las entrañas, y el hígado con los riñones, quitarás. Y todo esto lo ofrecerás como aroma agradable, aceptable delante de Yahvé, con su ofrenda vegetal.
  revision_rationale: Se ajusta únicamente el pronombre de «ellas» a «ellos» para eliminar una ambigüedad gramatical en español y mantener el valor referencial general del original y del inglés auditado, sin alterar el contenido sacrificial del versículo.
