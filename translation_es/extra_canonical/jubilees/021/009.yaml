translation:
  language: es
  text: La grasa que está sobre ellos, y la que está sobre las entrañas, y el hígado con los riñones, quitarás. Y todo esto lo ofrecerás como aroma agradable, aceptable delante de Yahvé, con su ofrenda vegetal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ስብሐ
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la grosura
  lexicon: N/A
  rationale: El contexto sacrificial pide un término físico claro y natural en español. «Grasa» comunica bien la porción grasa del sacrificio sin añadir tecnicismo innecesario.
- source_word: ዘዲቤሆሙ
  english_pob_choice: that is on them
  chosen_spanish: que está sobre ellas
  alternatives_spanish:
  - que está sobre ellos
  - sobre ellos
  lexicon: N/A
  rationale: Refleja la relación espacial del material sacrificial con las vísceras mencionadas, manteniendo una construcción española fluida.
- source_word: መናቅፅ
  english_pob_choice: the entrails
  chosen_spanish: las entrañas
  alternatives_spanish:
  - las vísceras
  - los intestinos
  lexicon: N/A
  rationale: La revisión inglesa corrigió «loins» a «entrails»; «entrañas» es el equivalente más natural y reverente en español bíblico para este contexto sacrificial.
- source_word: ወከብደ ምስለ ኵልያት
  english_pob_choice: the liver with the kidneys
  chosen_spanish: el hígado con los riñones
  alternatives_spanish:
  - el hígado con las vísceras
  - el hígado y los riñones
  lexicon: N/A
  rationale: Mantiene la lista anatómica concreta del texto y del trasfondo levítico, con concordancia natural en español.
- source_word: ትብልእ
  english_pob_choice: you shall remove
  chosen_spanish: quitarás
  alternatives_spanish:
  - retirarás
  - separarás
  lexicon: N/A
  rationale: «Quitarás» transmite una orden directa y clara; evita sobrecargar el verso con un tecnicismo que no añade precisión.
- source_word: መዐዛ ሠናይ
  english_pob_choice: a pleasing fragrance
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - olor agradable
  - fragancia agradable
  lexicon: N/A
  rationale: «Aroma agradable» reproduce la fórmula sacrificial tradicional de forma comprensible, sin convertirla en una locución demasiado rígida.
- source_word: ቅድመ እግዚአብሔር
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: N/A
  rationale: Se sigue el principio editorial de representar el nombre divino como «Yahvé» en el texto principal, preservando el valor relacional de la preposición «delante de».
- source_word: መሥዋዕቱ
  english_pob_choice: with its grain offering
  chosen_spanish: con su ofrenda vegetal
  alternatives_spanish:
  - con su ofrenda de grano
  - con su oblación de cereal
  lexicon: N/A
  rationale: «መሥዋዕቱ» aquí se entiende a la luz del contexto sacrificial como la ofrenda asociada de cereal/grano; «ofrenda vegetal» es una solución española tradicional en ciertos proyectos bíblicos para evitar el anacronismo de «grano» cuando el rito incluye harina preparada.
theological_decisions:
- issue: Nombre divino en una fórmula sacrificial
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del Señor
  - ante el Señor
  rationale: El texto base usa el nombre divino en contexto de culto. Siguiendo la norma del proyecto, se explicita «Yahvé» en vez de enmascarar con «Señor»; esto preserva la referencia al nombre del pacto y evita ocultar la elección original.
  doctrine_reference: Éxodo 3:15; práctica editorial POB sobre יהוה/YHWH
translation_notes:
  revision_awareness: La revisión inglesa corrigió la antigua lectura «loins» a «entrails/entrails», y el texto español refleja esa corrección con «entrañas». También se incorporó la puntuación final del pasaje revisado.
  spanish_consistency_notes:
  - Se evitó «Señor» para יהוה conforme a la política del proyecto; el texto principal usa «Yahvé».
  - Se mantuvo un registro sacrificial concreto y sobrio, sin expandir el sentido más allá del inventario de órganos y grasa.
  - «ofrenda vegetal» se usa como equivalente funcional de la ofrenda de cereal/grano en un contexto ritual; no se añadió nota porque el texto español queda claro sin ambigüedad adicional.
