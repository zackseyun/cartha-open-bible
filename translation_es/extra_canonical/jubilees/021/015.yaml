base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/015.yaml
  text: Keep this command and do it[15], my son, so that you may walk rightly in all your deeds. And at all times be pure in your body, and wash yourself with water before you go up to offer on the altar; and wash your hands and your feet before you approach the altar; and when you have finished offering, return.
  footnotes:
  - marker: '15'
    text: The chapter numbering in the source rows appears to skip from v. 15 to v. 17. No separate English v. 16 is supplied because the provided Ge'ez segmentation contains no distinct row for it.
    reason: segmentation_note
  - marker: a
    text: Or 'go in.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:23Z'
    unchanged: false
    changes_summary: Changed 'come to offer' to 'go up to offer' to reflect the verb more precisely; added final punctuation. No other changes needed.
translation:
  language: es
  text: Guarda este mandamiento y cúmplelo, hijo mío, para que camines rectamente en todas tus obras. Y en todo tiempo sé puro en tu cuerpo, y lávate con agua antes de subir a ofrecer sobre el altar; y lava tus manos y tus pies antes de acercarte al altar; y cuando hayas terminado de ofrecer, vuelve.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ዑቅ / keep this command
  english_pob_choice: Keep this command
  chosen_spanish: Guarda este mandamiento
  alternatives_spanish:
  - Conserva este mandamiento
  - Retén este mandamiento
  lexicon: guardar
  rationale: ‘Guardar’ transmite bien la idea de custodiar y observar un mandamiento en español bíblico moderno, sin debilitar el sentido imperativo.
- source_word: ወገብራ / do it
  english_pob_choice: do it
  chosen_spanish: cúmplelo
  alternatives_spanish:
  - hazlo
  - practícalo
  lexicon: cumplir
  rationale: El contexto no pide solo ejecución mecánica sino observancia fiel de un mandamiento; ‘cúmplelo’ conserva ese matiz de obediencia.
- source_word: ታርትዕ / walk rightly
  english_pob_choice: walk rightly
  chosen_spanish: camines rectamente
  alternatives_spanish:
  - andes rectamente
  - vivas rectamente
  lexicon: caminar/rectamente
  rationale: ‘Caminar’ mantiene la metáfora ética de conducta; ‘rectamente’ expresa la cualidad moral del adverbio sin sobretraducir.
- source_word: ንጹሐ፡ በሥጋከ / be pure in your body
  english_pob_choice: be pure in your body
  chosen_spanish: sé puro en tu cuerpo
  alternatives_spanish:
  - permanece puro en tu cuerpo
  - mantente puro en tu cuerpo
  lexicon: puro/cuerpo
  rationale: ‘Puro’ reproduce la pureza ritual/física del texto ge'ez; ‘cuerpo’ conserva la referencia corporal concreta sin suavizarla a un término más abstracto.
- source_word: ትሑር፡ ለአዕርጎ / wash yourself with water before you go up to offer
  english_pob_choice: wash yourself with water before you go up to offer
  chosen_spanish: lávate con agua antes de subir a ofrecer
  alternatives_spanish:
  - lávate con agua antes de ir a ofrecer
  - lávense con agua antes de subir a ofrecer
  lexicon: lavarse/subir/ofrecer
  rationale: ‘Subir’ refleja el movimiento ascendente implícito en el verbo y preserva el culto en el altar; ‘ofrecer’ comunica el acto sacrificial sin añadir términos ajenos.
- source_word: ዘእንበለ፡ ትቅረብ / before you approach
  english_pob_choice: before you approach
  chosen_spanish: antes de acercarte
  alternatives_spanish:
  - antes de aproximarte
  - antes de presentarte
  lexicon: acercarse
  rationale: ‘Acercarte’ es natural en español y conserva la proximidad ritual al altar sin introducir lenguaje más interpretativo.
- source_word: ወሶበ፡ ፈጸምከ / when you have finished
  english_pob_choice: when you have finished
  chosen_spanish: cuando hayas terminado
  alternatives_spanish:
  - cuando hayas acabado
  - cuando hayas concluido
  lexicon: terminar
  rationale: ‘Terminar’ es directo y mantiene la temporalidad completiva del original.
- source_word: ግባእ / return
  english_pob_choice: return
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - vuélvete
  lexicon: volver
  rationale: La revisión auditada corrigió la lectura de este verbo a ‘return’; ‘vuelve’ es el imperativo natural y preciso en español.
theological_decisions:
- issue: Ritual purity and bodily washing before altar service
  english_pob_reading: At all times be pure in your body, and wash yourself with water before you go up to offer on the altar; and wash your hands and your feet before you approach the altar.
  chosen_spanish_reading: Y en todo tiempo sé puro en tu cuerpo, y lávate con agua antes de subir a ofrecer sobre el altar; y lava tus manos y tus pies antes de acercarte al altar.
  alternative_spanish_readings:
  - mantente ritualmente puro en tu cuerpo
  - lava tu cuerpo con agua
  rationale: El ge'ez distingue pureza corporal continua y lavados específicos antes del servicio; la traducción conserva ambas capas sin convertir toda la instrucción en una sola idea general de higiene.
  doctrine_reference: Pureza ritual en contexto cultual; no se agrega doctrina posterior.
- issue: Final imperative after sacrifice
  english_pob_reading: when you have finished offering, return
  chosen_spanish_reading: cuando hayas terminado de ofrecer, vuelve
  alternative_spanish_readings:
  - cuando acabes de ofrecer, regresa
  - cuando hayas terminado la ofrenda, vuelve
  rationale: La corrección textual revisada favorece ‘return’ en lugar de ‘go in’; la versión española sigue esa lectura y evita introducir un movimiento no atestiguado por el ge'ez.
  doctrine_reference: Crítica textual / revisión de lectura verbal.
translation_notes:
  revision_awareness: 'La base inglesa pasó de ‘come to offer’ a ‘go up to offer’ por precisión verbal, y luego corrigió el último verbo de ‘go in’ a ‘return’ tras revisión del ge''ez. La versión española refleja ambas decisiones: ‘subir a ofrecer’ y ‘vuelve’.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando aparece el nombre divino; aquí no aplica.
  - Se preservó el registro cultual sin sustituirlo por lenguaje eclesiástico posterior.
  - ‘Ofrecer’ se usó de forma consistente para el acto sacrificial, evitando añadir ‘sacrificar’ que podría desplazar el foco del texto.
