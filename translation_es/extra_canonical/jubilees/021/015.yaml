  revised_spanish_text: Guarda este mandamiento y cúmplelo, hijo mío, para que camines rectamente en todas tus obras. Y en todo tiempo sé puro en tu cuerpo, y lávate con agua antes de subir a ofrecer sobre el altar; y lava tus manos y tus pies antes de acercarte al altar; y cuando hayas terminado de ofrecer, vuelve.
  revised_footnotes: []
