translation:
  language: es
  text: Ten cuidado, hijo mío, en cuanto a la sangre; ten mucho cuidado de cubrirla en la tierra[a]. Y no la comas en absoluto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ten mucho cuidado de cubrirla con polvo en la tierra». La traducción principal sigue el ge''ez, que dice simplemente «en la tierra» sin añadir «polvo».'
    reason: previous_rendering
  - marker: b
    text: 'O: «Y no la comas». El ge''ez añade una partícula enfática negativa que puede rendirse como «en absoluto».'
    reason: previous_rendering
lexical_decisions:
- source_word: ተዐቀብ
  english_pob_choice: Take care
  chosen_spanish: Ten cuidado
  alternatives_spanish:
  - Cuídate
  - Presta atención
  lexicon: cuidar / tener cuidado
  rationale: La repetición imperativa en ge'ez pide una exhortación clara y natural en español; 'ten cuidado' conserva la fuerza exhortativa sin añadir interpretación.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: hijo
  rationale: '''Hijo mío'' es una fórmula natural y reverente en español, equivalente al vocativo afectuoso del original.'
- source_word: በደም
  english_pob_choice: concerning blood
  chosen_spanish: con la sangre
  alternatives_spanish:
  - respecto a la sangre
  - acerca de la sangre
  lexicon: sangre
  rationale: El contexto exige el referente directo de la sangre; 'con' mantiene la relación temática de la advertencia sin forzar una perífrasis.
- source_word: ጥቀ
  english_pob_choice: take great care
  chosen_spanish: ten mucho cuidado
  alternatives_spanish:
  - ten sumo cuidado
  - ten grandísimo cuidado
  lexicon: cuidado
  rationale: El adverbio intensivo del ge'ez requiere reforzar la segunda exhortación; 'mucho' es natural y suficientemente enfático en español.
- source_word: ውስተ፡ ምድር
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - en el suelo
  lexicon: tierra
  rationale: '''En la tierra'' reproduce el sentido locativo del ge''ez y evita añadir ''polvo'', que no está en el texto fuente.'
- source_word: ወኢትብልዖ፡ እንከ፡
  english_pob_choice: And do not eat it at all
  chosen_spanish: Y no la comas en absoluto
  alternatives_spanish:
  - Y no la comas
  - Y de ningún modo la comas
  lexicon: comer
  rationale: El pronombre femenino concuerda con 'sangre' y 'en absoluto' refleja la partícula enfática negativa እንከ sin suavizar la prohibición.
theological_decisions:
- issue: Prohibición de comer sangre
  english_pob_reading: And do not eat it at all.
  chosen_spanish_reading: Y no la comas en absoluto.
  alternative_spanish_readings:
  - Y no la comas.
  - Y no la comas de ninguna manera.
  rationale: Se conserva la prohibición total del texto, sin atenuarla. 'En absoluto' expresa bien la fuerza enfática del original.
  doctrine_reference: Prohibición bíblica de ingerir sangre; coherente con la sensibilidad de Levítico 17 y pasajes afines.
translation_notes:
  revision_awareness: 'La revisión del inglés corrigió un objeto omitido y una armonización indebida con Levítico 17:13: el ge''ez no dice ''con polvo'', sino ''en la tierra/ground'', y la partícula negativa final intensifica la prohibición (''en absoluto''). La versión española sigue esa lectura revisada y evita introducir ''polvo''.'
  spanish_consistency_notes:
  - Se mantiene 'sangre' en femenino para la concordancia pronominal ('la comas').
  - Se usa 'tierra' para el locativo del ge'ez, no 'polvo', por fidelidad al texto fuente.
  - El tono es exhortativo y solemne, adecuado a un mandato sapiencial/pactual.
