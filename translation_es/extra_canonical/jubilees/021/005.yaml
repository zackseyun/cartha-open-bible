translation:
  language: es
  text: su pacto. Y tú también, hijo mío, guarda su mandamiento, y su estatuto y su juicio, y no andes tras ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኪዳኖ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  lexicon: ኪዳን / pacto, alianza
  rationale: En español bíblico contemporáneo, «pacto» comunica bien la relación pactal sin imponer un tono eclesiástico más específico que el fuente no exige. «Alianza» también sería viable, pero «pacto» mantiene claridad y continuidad con el lenguaje jurídico-relacional del texto.
- source_word: ወአንተኒ
  english_pob_choice: And you also
  chosen_spanish: Y tú también
  alternatives_spanish:
  - Y además tú
  - Y tú asimismo
  lexicon: አንተ + conector enfático
  rationale: «Y tú también» refleja el valor enfático de la construcción, de manera natural en español y sin añadir contenido.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: vocativo filial
  rationale: «Hijo mío» conserva el tono directo y afectivo del vocativo; es más fluido en español que «mi hijo» en esta posición.
- source_word: ትእዛዞ
  english_pob_choice: his commandment
  chosen_spanish: su mandamiento
  alternatives_spanish:
  - sus mandamientos
  lexicon: mandamiento
  rationale: La forma ge'ez es singular; por eso se traduce en singular. Se evita el plural porque la revisión auditada corrigió una pluralización injustificada.
- source_word: ሥርዐቶ
  english_pob_choice: his statute
  chosen_spanish: su estatuto
  alternatives_spanish:
  - su precepto
  - su ordenanza
  lexicon: statute / ordinance
  rationale: «Estatuto» conserva el valor normativo-institucional del término sin forzarlo a «ordenanza», que en español puede sonar más técnico o eclesiástico. «Precepto» es posible, pero menos específico al matiz legal.
- source_word: ኵነኔሁ
  english_pob_choice: his judgment
  chosen_spanish: su juicio
  alternatives_spanish:
  - su sentencia
  - su decisión
  lexicon: judgment
  rationale: «Juicio» reproduce el campo semántico judicial del original. «Sentencia» sería más estrecho y «decisión» demasiado general.
- source_word: ድኅሬሆሙ
  english_pob_choice: after them
  chosen_spanish: tras ellos
  alternatives_spanish:
  - después de ellos
  - detrás de ellos
  lexicon: after + pronominal object
  rationale: La revisión auditada confirmó que el original dice simplemente «después/tras ellos», sin introducir «impurezas» u otro objeto. En español, «tras ellos» es natural y mantiene la referencia pronominal.
theological_decisions:
- issue: Pacto divino y lenguaje normativo
  english_pob_reading: his covenant ... keep his commandment and his statute and his judgment
  chosen_spanish_reading: su pacto ... guarda su mandamiento, y su estatuto y su juicio
  alternative_spanish_readings:
  - su alianza ... guarda su mandamiento, y su estatuto y su juicio
  - su pacto ... guarda sus mandamientos, y sus estatutos y sus juicios
  rationale: El texto presenta una formulación de pacto seguida de obligaciones normativas. Mantener los sustantivos en singular respeta la morfología del ge'ez y conserva la fuerza de cada término como categoría distinta.
  doctrine_reference: Fidelidad al pacto; distinción entre mandamiento, estatuto y juicio en lenguaje legal-covenantal
- issue: Valor de la frase final
  english_pob_reading: and do not walk after them
  chosen_spanish_reading: y no andes tras ellos
  alternative_spanish_readings:
  - y no camines tras ellos
  - y no vayas tras ellos
  rationale: La expresión conserva el sentido moral de seguir a otros como pauta de conducta. No se introduce un objeto adicional, ya que el audit trail corrigió la lectura anterior y el ge'ez solo permite el pronombre «ellos».
  doctrine_reference: Advertencia contra seguir malos ejemplos o caminos ajenos al pacto
translation_notes:
  revision_awareness: Se incorporó la corrección auditada que restituye el inicio con «su pacto» y la lectura pronominal final «tras ellos», evitando la expansión anterior hacia «impurezas». También se respetó la singularidad morfológica de mandamiento, estatuto y juicio.
  spanish_consistency_notes:
  - Se mantiene «pacto» para ኪዳን en coherencia con el valor bíblico-jurídico del término.
  - Se evita el plural en los tres sustantivos normativos porque la fuente ge'ez está en singular y la revisión auditada corrigió el plural inglés previo.
  - No se usa «SEÑOR» ni «Cristo» porque este versículo no contiene el Tetragrámaton ni lenguaje mesiánico.
  - «Tras ellos» conserva la dependencia pronominal del original y no añade contenido semántico no atestiguado.
