base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/011.yaml
  text: And on all your offerings put salt, and do not let the salt of the covenant be lacking from any of them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:21Z'
    unchanged: false
    changes_summary: Completed the final phrase by adding 'them' to reflect the source's concluding 'from all/any of them' and make the English grammatical and complete.
translation:
  language: es
  text: Y pondrás sal en todas tus ofrendas, y no dejarás que la sal del pacto falte de ninguna de ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወውስተ፡ ኵሉ፡ መሥዋዕቲከ፡
  english_pob_choice: on all your offerings
  chosen_spanish: sobre todas tus ofrendas
  alternatives_spanish:
  - en todas tus ofrendas
  - a todas tus ofrendas
  lexicon: ofrenda
  rationale: El giro preposicional del ge'ez se expresa de manera natural en español con 'sobre' para el acto de añadir sal a las ofrendas; 'ofrendas' conserva el sentido cultual del sustantivo sin introducir un término más técnico que el contexto no exige.
- source_word: ትደይ፡ ፄወ፡
  english_pob_choice: put salt
  chosen_spanish: pondrás sal
  alternatives_spanish:
  - echarás sal
  - colocarás sal
  lexicon: sal
  rationale: El verbo transmite una acción directa y cultual; 'pondrás sal' es claro, digno y corresponde bien al mandato. 'Echarás sal' es posible, pero suena más coloquial.
- source_word: ኪዳን፡
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: pacto
  rationale: '''Pacto'' es el equivalente bíblico más estable para el valor teológico de ኪዳን en este contexto, y mantiene la terminología del lenguaje de la alianza sin diluirla.'
- source_word: ውስተ፡ ኵሉ፡
  english_pob_choice: from any of them
  chosen_spanish: de ninguna de ellas
  alternatives_spanish:
  - de cada una de ellas
  - de ninguna
  lexicon: ninguna
  rationale: La revisión inglesa completó la frase final con 'them' para reflejar el cierre del original; en español, 'de ninguna de ellas' reproduce el sentido distributivo y evita una construcción incompleta.
theological_decisions:
- issue: La expresión 'sal del pacto' y su función obligatoria en las ofrendas
  english_pob_reading: do not let the salt of the covenant be lacking from any of them
  chosen_spanish_reading: no dejarás que la sal del pacto falte de ninguna de ellas
  alternative_spanish_readings:
  - no permitirás que falte la sal del pacto en ninguna de ellas
  - no habrá de faltar la sal del pacto en ninguna de ellas
  rationale: Se conserva la idea de obligación ritual y la fórmula 'sal del pacto' como expresión teológicamente cargada. 'Falte' comunica bien la ausencia prohibida sin convertir el mandato en una simple preferencia litúrgica.
  doctrine_reference: Levítico 2:13; Números 18:19
translation_notes:
  revision_awareness: 'La base inglesa fue completada en su frase final para reflejar el cierre distributivo del ge''ez (''from all/any of them''). La versión española refleja esa completitud con una negación distributiva idiomática: ''de ninguna de ellas''.'
  spanish_consistency_notes:
  - Se mantiene 'pacto' para ኪዳን, coherente con el uso bíblico estándar y con el audit trail en inglés.
  - Se evita 'SEÑOR' u otra sustitución, porque el versículo no contiene el nombre divino.
  - Se conserva un registro culto y directo, sin añadir información no presente en el texto fuente.
