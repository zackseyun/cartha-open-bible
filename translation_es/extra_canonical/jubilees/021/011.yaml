review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del ge''ez y la revisión inglesa: mandato de añadir sal a todas las ofrendas y prohibición de que falte la ''sal del pacto'' en ninguna. Sin embargo, la preposición inicial suena menos natural en español para este contexto ritual; el sentido práctico del original y del inglés se expresa mejor con ''en todas tus ofrendas'' que con ''sobre todas tus ofrendas''.'
  spanish_quality_summary: 'El español es claro y digno. La única mejora necesaria es estilística-semántica menor: ''pondrás sal en todas tus ofrendas'' suena más natural y exacto para español bíblico moderno que ''sobre todas tus ofrendas pondrás sal''. El resto de la oración funciona bien, incluyendo ''la sal del pacto'' y ''de ninguna de ellas''.'
  glossary_alignment: 'La terminología está alineada con el proyecto: ''ofrendas'' para መሥዋዕቲከ፡, ''sal'', y ''pacto'' para ኪዳን. No hay conflicto con los términos teológicos por defecto. ''Pacto'' está bien justificado frente a ''alianza''.'
  issues:
  - severity: low
    issue: La frase 'sobre todas tus ofrendas pondrás sal' es menos natural en español que 'pondrás sal en todas tus ofrendas'.
    rationale: Aunque 'sobre' calca aceptablemente el inglés 'on', en español de uso bíblico actual la acción de sazonar o añadir sal a una ofrenda se expresa con mayor naturalidad mediante 'en'. El cambio no altera el sentido y mejora la legibilidad.
  revised_spanish_text: Y pondrás sal en todas tus ofrendas, y no dejarás que la sal del pacto falte de ninguna de ellas.
  revision_rationale: Se ajusta la preposición y el orden para un español más natural y preciso, sin cambiar el sentido del original ni la carga teológica de 'sal del pacto'.
