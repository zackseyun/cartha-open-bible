  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Sangre', 'vida', 'juicio' y 'contamina' están bien elegidos. 'Presente' es aceptable por el inglés auditado, aunque 'regalo' sería más natural; no es necesario cambiarlo. No aparecen términos sensibles como Yahvé/Mesías/Cristo.
