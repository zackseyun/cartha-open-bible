translation:
  language: es
  text: la sangre, porque es la vida; y no comas sangre. Y no aceptes un presente por sangre humana alguna,[a] para que no sea derramada con impunidad, sin juicio; porque es la sangre derramada la que contamina la tierra, y la tierra no puede ser limpiada de la sangre de un hombre excepto por la sangre de quien la derramó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que no te sea exigida sin juicio».'
    reason: Preserva la alternativa previa documentada en el rastro inglés ('lest it be exacted from you without judgment') en vez de repetir la lectura principal.
lexical_decisions:
- source_word: ደመ / blood
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  lexicon: blood
  rationale: El pasaje usa repetidamente 'sangre' de forma literal y legal; 'sangre' es la equivalencia natural y suficiente en español. En 'blood that is shed' se vuelve 'sangre derramada' para conservar la repetición y el matiz del acto de derramar.
- source_word: ነፍስ / life
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: life
  rationale: '''Es la vida'' expresa de manera directa la relación causal dada por el texto ge''ez: la sangre es vida, no solo símbolo vital.'
- source_word: ደም፡ ... ያንጥኦ / pollutes
  english_pob_choice: pollutes the earth
  chosen_spanish: contamina la tierra
  alternatives_spanish:
  - mancha la tierra
  - ensucia la tierra
  lexicon: pollute
  rationale: '''Contamina'' conserva el sentido de profanación/impureza causado por la sangre, sin perder inteligibilidad en español moderno.'
- source_word: ዘእንበለ፡ ኵነኔ / without judgment
  english_pob_choice: without judgment
  chosen_spanish: sin juicio
  alternatives_spanish:
  - sin sentencia
  - sin condena
  lexicon: judgment
  rationale: '''Sin juicio'' refleja el valor legal del término y mantiene la formulación breve del original; en español bíblico conserva el peso forense del contexto.'
- source_word: በከ፡ / with impunity
  english_pob_choice: with impunity
  chosen_spanish: con impunidad
  alternatives_spanish:
  - sin castigo
  - sin consecuencias
  lexicon: impunity
  rationale: La revisión aplicada corrigió la lectura previa; 'con impunidad' reproduce con precisión el adverbio y su sentido jurídico-moral.
- source_word: ሰብእ / man, human being
  english_pob_choice: human blood
  chosen_spanish: sangre humana
  alternatives_spanish:
  - sangre de un hombre
  - sangre de persona
  lexicon: man
  rationale: '''Humana'' preserva el alcance general del ge''ez y evita restringir innecesariamente a varón individual; luego el texto remata con ''un hombre'' donde el original lo hace.'
- source_word: ኵሉ / any, all
  english_pob_choice: any human blood
  chosen_spanish: alguna
  alternatives_spanish:
  - ninguna
  - cualquier
  lexicon: all
  rationale: '''Alguna'' corresponde a la estructura negativa ''ninguna sangre humana'' en español idiomático, sin alterar el alcance universal.'
- source_word: ይትከዐው / be shed
  english_pob_choice: be shed
  chosen_spanish: sea derramada
  alternatives_spanish:
  - sea vertida
  - sea derramada y quede impune
  lexicon: shed
  rationale: La revisión textual corrigió la mala lectura de 'exacted'; 'sea derramada' sigue exactamente el valor verbal del ge'ez y permite enlazar con la cláusula causal posterior.
theological_decisions:
- issue: La sangre como vida y la prohibición de comer sangre
  english_pob_reading: because it is the life; and do not eat any blood
  chosen_spanish_reading: porque es la vida, y no comas nada de sangre
  alternative_spanish_readings:
  - porque es la vida; y no comas sangre
  - porque es la vida y no ingieras sangre
  rationale: Se conserva la fuerza absoluta de la prohibición alimentaria y la razón dada por el texto, sin suavizarla ni convertirla en una mera costumbre.
  doctrine_reference: Génesis 9:4; Levítico 17:10-14; Hechos 15:20
- issue: La prohibición de recibir un presente relacionado con sangre humana
  english_pob_reading: do not accept a gift concerning any human blood
  chosen_spanish_reading: no aceptes un presente por sangre humana alguna
  alternative_spanish_readings:
  - no aceptes un presente sobre sangre humana alguna
  - no aceptes un soborno por sangre humana alguna
  rationale: '''Presente'' reproduce el sentido amplio de ofrenda/regalo que aparece en la formulación inglesa y evita introducir explícitamente ''soborno'', que el texto no exige. La frase mantiene abierta la referencia a un beneficio recibido en relación con derramamiento de sangre.'
  doctrine_reference: Éxodo 23:8; Deuteronomio 16:19; Proverbios 17:23
- issue: 'La cláusula de justicia retributiva: derramamiento de sangre y purificación de la tierra'
  english_pob_reading: lest it be shed with impunity, without judgment; for it is the blood that is shed which pollutes the earth, and the earth cannot be cleansed from the blood of a man except by the blood of the one who shed it
  chosen_spanish_reading: para que no sea derramada con impunidad, sin juicio; porque es la sangre derramada la que contamina la tierra, y la tierra no puede ser limpiada de la sangre de un hombre excepto por la sangre de quien la derramó
  alternative_spanish_readings:
  - para que no sea derramada impunemente, sin juicio
  - porque es la sangre derramada la que profana la tierra
  rationale: 'La lectura conserva el orden judicial y retributivo del pasaje: impunidad, juicio, contaminación y purificación mediante la sangre del culpable. No se atenúa el vínculo entre derramamiento y expiación/limpieza en el marco narrativo de Jubileos.'
  doctrine_reference: Génesis 9:5-6; Números 35:33; Deuteronomio 19:13
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección importante: la cláusula final ya no se lee como «sea exigido de ustedes sin juicio», sino como «sea derramada con impunidad, sin juicio», a partir de la revisión del ge''ez ይትከዐው y በከ። La versión española refleja esa decisión revisada y mantiene la cadena causal y judicial del original.'
  spanish_consistency_notes:
  - Se conservó 'Yahvé' no porque aparezca aquí, sino para mantener la política del proyecto; este versículo no lo contiene.
  - '''Juicio'' se mantuvo en sentido forense/judicial, no como mera opinión.'
  - '''Sangre humana'' y ''la sangre de un hombre'' quedan ambas en español porque el original alterna una referencia genérica con una individual.'
  - Se evitó 'Cristo' y otros términos no presentes en el pasaje.
  - El registro es bíblico contemporáneo, no arcaizante, pero sin perder solemnidad.
