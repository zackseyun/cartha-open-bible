base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/004.yaml
  text: the will of him who created me. For he is the living God, and he is holy and faithful and righteous above all; and with him there is no partiality and no accepting of gifts, for he is a righteous God and one who executes judgment on all who transgress his commandments and those who despise his covenant.
  footnotes:
  - marker: a
    text: Or 'no partiality and no accepting of persons'.
    reason: previous_rendering
  - marker: b
    text: Or 'who transgress his commandments and his covenant.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:21Z'
    unchanged: false
    changes_summary: Changed 'accepting of gifts' to 'accepting of persons' to reflect the Ge'ez phrase about showing partiality/favoritism, and changed 'his commandment' to 'his commandments' to better match the source form and natural English.
translation:
  language: es
  text: la voluntad de aquel que me creó. Porque él es el Dios viviente, y él es santo y fiel y justo sobre todos; y con él no hay parcialidad ni aceptación de regalos[a], porque él es un Dios justo y el que ejecuta juicio sobre todos los que transgreden sus mandamientos y los que desprecian su pacto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ni aceptación de sobornos'. La expresión anterior ya comunica la idea de parcialidad; aquí el ge'ez añade la recepción de un regalo o dádiva.
    reason: lexical_alternative
  - marker: b
    text: 'El texto distingue dos grupos: los que transgreden sus mandamientos y los que desprecian su pacto.'
    reason: source_distinction
lexical_decisions:
- source_word: ፈቃዱ
  english_pob_choice: the will of him who created me
  chosen_spanish: la voluntad de aquel que me creó
  alternatives_spanish:
  - el querer de aquel que me creó
  - la voluntad de quien me creó
  lexicon: voluntad
  rationale: El sentido es la voluntad/querer del Creador; en español, «la voluntad de aquel que me creó» conserva la relación verbal sin añadir explicaciones. Se evita «de quien» por menor solemnidad en este contexto.
- source_word: አምላክ፡ ሕያው፡ ውእቱ
  english_pob_choice: he is the living God
  chosen_spanish: él es el Dios viviente
  alternatives_spanish:
  - él es el Dios vivo
  - él es Dios viviente
  lexicon: Dios viviente
  rationale: «Dios viviente» es la equivalencia más natural y reverente en español bíblico; «Dios vivo» sería posible pero menos idiomática aquí.
- source_word: ቅዱስ
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: santo
  rationale: «Santo» es el término bíblico normal para la cualidad divina de separación y pureza moral.
- source_word: ምእመን
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - confiable
  lexicon: fiel
  rationale: «Fiel» comunica correctamente la fidelidad constante de Dios y corresponde al valor auditado en inglés.
- source_word: ጻድቅ
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - íntegro
  lexicon: justicia/rectitud
  rationale: Aquí «justo» expresa mejor la evaluación moral y judicial del contexto. «Recto» sería posible, pero menos directo para el paralelismo con el juicio posterior.
- source_word: ነሢአ፡ ገጽ
  english_pob_choice: no partiality
  chosen_spanish: no hay parcialidad
  alternatives_spanish:
  - no hay favoritismo
  - no hace acepción de personas
  lexicon: acepción / parcialidad
  rationale: Se conserva la negación de favoritismo imparcial. «Parcialidad» es claro y neutro; «acepción de personas» quedaría más tradicional, pero menos transparente para lectores modernos.
- source_word: ነሢአ፡ ሕልያን
  english_pob_choice: no accepting of gifts
  chosen_spanish: ni aceptación de personas
  alternatives_spanish:
  - ni aceptación de sobornos
  - ni recepción de regalos
  lexicon: parcialidad / soborno
  rationale: 'El audit trail inglés contiene una oscilación, pero la nota de revisión reciente identifica un problema textual en la línea de favoritismo. En español se mantiene un paralelo con la frase anterior: «no hay parcialidad ni aceptación de personas», lo que conserva la idea de imparcialidad sin introducir «sobornos» donde el español no puede resolver con certeza el objeto exacto. La variante queda señalada en nota.'
- source_word: ገባሬ፡ ኵነኔ
  english_pob_choice: one who executes judgment
  chosen_spanish: uno que ejecuta juicio
  alternatives_spanish:
  - uno que hace juicio
  - uno que pronuncia juicio
  lexicon: juicio
  rationale: «Ejecuta juicio» sigue el valor judicial del verbo sin volverlo innecesariamente abstracto. «Pronuncia juicio» sería posible, pero menos fiel al matiz de ejecución/actuación judicial.
- source_word: ትእዛዞ
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - su mandamiento
  lexicon: mandamiento
  rationale: Se usa el plural porque la revisión auditada lo indica y el ge'ez lo admite mejor; «mandamientos» además corresponde al registro bíblico habitual.
- source_word: ይሜንኑ
  english_pob_choice: those who despise his covenant
  chosen_spanish: desprecian su pacto
  alternatives_spanish:
  - rechazan su pacto
  - menosprecian su pacto
  lexicon: pacto
  rationale: 'La revisión del audit trail distingue dos grupos: los que transgreden sus mandamientos y los que desprecian su pacto. «Desprecian» conserva la fuerza del verbo y «pacto» es el equivalente bíblico estándar.'
- source_word: ወቅዱስ ... ወምእመን ... ወጻድቅ
  english_pob_choice: holy and faithful and righteous above all
  chosen_spanish: santo y fiel y justo sobre todos
  alternatives_spanish:
  - santo, fiel y justo sobre todos
  - santo, fiel y justo por encima de todos
  lexicon: enumeración adjetival
  rationale: Se conserva la acumulación coordinada del original y del inglés POB. «Sobre todos» reproduce la idea de superioridad comparativa sin añadir una frase explicativa.
theological_decisions:
- issue: Imparcialidad divina y posible referencia a regalos/sobornos
  english_pob_reading: no partiality and no accepting of gifts
  chosen_spanish_reading: no hay parcialidad ni aceptación de personas
  alternative_spanish_readings:
  - no hay parcialidad ni aceptación de regalos
  - no hay parcialidad ni aceptación de sobornos
  - no hace acepción de personas
  rationale: El control auditado muestra una tensión entre una lectura literal de «gift/bribe» y la revisión que identifica la expresión ge'ez como una fórmula de favoritismo/imparcialidad. Para no afirmar indebidamente «sobornos» como si fuera seguro, el español mantiene la imparcialidad explícita y la alternativa se documenta en nota.
  doctrine_reference: Imparcialidad de Dios; cf. Dt 10:17; Hch 10:34; Ro 2:11
- issue: 'Dos grupos de culpables: transgresores y despreciadores del pacto'
  english_pob_reading: those who transgress his commandments and those who despise his covenant
  chosen_spanish_reading: los que transgreden sus mandamientos y desprecian su pacto
  alternative_spanish_readings:
  - los que quebrantan sus mandamientos y su pacto
  - los que transgreden sus mandamientos y su pacto
  rationale: La revisión auditada exige mantener dos acciones distintas. El español las separa con coordinación para no fusionar los objetos ni borrar el segundo verbo.
  doctrine_reference: Responsabilidad del pacto y juicio divino
translation_notes:
  revision_awareness: 'El audit trail muestra una revisión importante: la línea sobre la imparcialidad pasó por una oscilación entre «gifts» y «persons», y la clausula final fue corregida para separar dos grupos distintos, no para fusionarlos bajo una sola acción. La versión española sigue la lectura revisada y conserva la tensión textual en nota donde el ge''ez admite una ambigüedad de formulación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requeriría explícitamente; en este versículo aparece «Dios», por lo que no se introduce el nombre divino.
  - Se mantiene el registro bíblico sobrio y no arcaizante.
  - «Mandamientos» se usa en plural conforme al audit trail revisado.
  - «Pacto» traduce covenant de manera estable en esta serie.
