translation:
  language: es
  text: y a andar rectamente en todos sus caminos. Mi alma aborreció los ídolos, para que pudiera cuidar[a] de hacer
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge’ez termina con una cláusula abierta (‘cuidar de hacer’); el objeto de ‘hacer’ aparece en el versículo siguiente.
    reason: La construcción queda intencionalmente incompleta en este versículo y se completa con el siguiente.
lexical_decisions:
- source_word: ወከመ፡ አርትዕ፡ ሐዊረ፡
  english_pob_choice: to walk uprightly
  chosen_spanish: a andar rectamente
  alternatives_spanish:
  - a caminar rectamente
  - a proceder con rectitud
  lexicon: andar; rectamente
  rationale: El ge’ez expresa una marcha/conducta recta; ‘andar rectamente’ conserva la imagen verbal y su tono ético sin volverlo demasiado abstracto.
- source_word: በኵሉ፡ ፍናዊሁ
  english_pob_choice: in all his paths
  chosen_spanish: en todos sus caminos
  alternatives_spanish:
  - en todas sus sendas
  - en todas sus veredas
  lexicon: caminos; sendas
  rationale: ‘Caminos’ es el equivalente español más natural y amplio para la metáfora de conducta o curso de vida.
- source_word: ጣዖተ፡ ጸልአት፡
  english_pob_choice: idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes idolátricas
  - los falsos dioses
  lexicon: ídolos
  rationale: ‘Ídolos’ refleja con precisión el objeto detestado y mantiene el término bíblico normal en español.
- source_word: ነፍስየ
  english_pob_choice: My soul
  chosen_spanish: Mi alma
  alternatives_spanish:
  - Mi ser
  - Mi vida
  lexicon: alma
  rationale: ‘Alma’ reproduce bien la interioridad personal del hebreo/ge’ez sin sobretraducirlo.
- source_word: ከመ፡ እትዐቀብ፡ ለገቢረ፡
  english_pob_choice: that I might observe to do
  chosen_spanish: para que pudiera observar hacer
  alternatives_spanish:
  - para que pudiera cuidar de hacer
  - para que pudiera atender a hacer
  lexicon: observar; hacer
  rationale: La revisión inglesa confirmó que el giro final no es ‘no hacer’, sino una cláusula incompleta que significa ‘observar/tener cuidado de hacer’. En español conviene preservar esa inacabación con una construcción naturalmente subordinada, sin completar el objeto faltante.
theological_decisions:
- issue: La cláusula final queda abierta y remite al siguiente versículo para completar el objeto de 'hacer'.
  english_pob_reading: that I might observe to do
  chosen_spanish_reading: para que pudiera observar hacer
  alternative_spanish_readings:
  - para que pudiera observar lo que debía hacer
  - para que pudiera cuidar de hacerlo
  rationale: La revisión crítica del audit trail indica que el objeto de ‘hacer’ está en el versículo siguiente. Por fidelidad al estado textual, la traducción debe dejar la frase abierta en vez de insertar un complemento que no está en este verso.
  doctrine_reference: Fidelidad textual y continuidad sintáctica
- issue: Uso de 'ídolos' como objeto de aborrecimiento moral y religioso.
  english_pob_reading: My soul hated idols
  chosen_spanish_reading: Mi alma aborreció los ídolos
  alternative_spanish_readings:
  - Mi alma detestó los ídolos
  - Mi alma odió los ídolos
  rationale: ‘Aborrecer’ comunica rechazo intenso sin introducir una carga emocional más fuerte de la necesaria; además conserva un registro bíblico claro en español.
  doctrine_reference: Lenguaje bíblico de rechazo a la idolatría
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión corregida: una versión reciente intentó resolver la clausura sintáctica como ‘from doing them’, pero la revisión crítica la rechazó por invertir el sentido del ge’ez. La presente versión evita esa inversión y conserva la abertura del original, alineándose con la lectura ‘observe to do’.'
  spanish_consistency_notes:
  - He mantenido ‘ídolos’ y no ‘imágenes’ para no estrechar innecesariamente el objeto del odio religioso.
  - ‘Rectamente’ y ‘caminos’ conservan el paralelismo ético/metafórico del verso.
  - La nota a pie marca la clausura sintáctica abierta sin forzar un complemento inexistente en este verso.
