translation:
  language: es
  text: Y lava tus manos y tus pies. Y no se vea sangre sobre ti ni en tu ropa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወትሐፀብ፡ ... እደዊከ፡ ወእገሪከ።
  english_pob_choice: wash your hands and your feet
  chosen_spanish: lava tus manos y tus pies
  alternatives_spanish:
  - lava tus manos y tus pies con agua
  - lávate las manos y los pies
  lexicon: hand, foot
  rationale: El ge'ez usa una forma imperativa de lavado seguida de “tus manos y tus pies”. En español, el imperativo simple “lava” conserva la instrucción directa y “tus manos y tus pies” refleja con claridad el poseedor singular del original. No se añadió “con agua” porque no está explícito en el texto fuente.
- source_word: ወኢያስተርኢ፡ ... ኵሉ፡ ደም፡
  english_pob_choice: let no blood be seen
  chosen_spanish: no se vea sangre
  alternatives_spanish:
  - que no se vea sangre
  - no aparezca sangre
  lexicon: blood / be seen
  rationale: 'La construcción negativa impersonal del inglés POB refleja el pasivo/estativo del ge''ez: que la sangre no sea visible. “No se vea sangre” suena natural en español y conserva la fuerza visual sin reinterpretar el mandato.'
- source_word: በዲቤክሙ፡
  english_pob_choice: on you
  chosen_spanish: en ti
  alternatives_spanish:
  - sobre ti
  - sobre vosotros
  lexicon: you (singular/plural context)
  rationale: El contexto en español puede leerse de manera singular o colectiva; el inglés POB eligió “you” sin marcar número. “En ti” mantiene la posibilidad de un destinatario representativo y evita forzar una pluralidad que el texto no especifica explícitamente en la traducción auditada.
- source_word: አልባሲክሙ
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropas
  - prendas
  lexicon: garment, clothing
  rationale: “Vestidos” reproduce bien el sentido de prendas exteriores y conserva un registro bíblico claro en español. “Ropas” también sería posible, pero “vestidos” conecta mejor con el tono formal del mandato.
theological_decisions:
- issue: Purificación visible de sangre en manos, pies y ropa
  english_pob_reading: and wash your hands and your feet. And let no blood be seen on you or on your garments.
  chosen_spanish_reading: Y lava tus manos y tus pies. Y no se vea sangre en ti ni en tus vestidos.
  alternative_spanish_readings:
  - Y lávate las manos y los pies. Y no se vea sangre sobre ti ni sobre tus vestidos.
  - Y lava tus manos y tus pies, para que no haya sangre visible en ti ni en tus vestidos.
  rationale: El texto no introduce aquí una explicación teológica adicional; presenta una instrucción de limpieza ritual y de ausencia visible de sangre. La versión española conserva el carácter práctico y ritual del mandato sin explicitar más de lo que el texto fuente dice.
  doctrine_reference: pureza ritual / mandato ceremonial
translation_notes:
  revision_awareness: La comparación con el paquete fuente y el audit trail inglés muestra acuerdo alto y ausencia de revisiones aplicadas. Por eso la redacción española sigue de cerca la estructura del original, con ajuste idiomático mínimo para naturalidad en español.
  spanish_consistency_notes:
  - Se mantuvo “manos y pies” en orden paralelo al original.
  - Se evitó introducir términos interpretativos como “purificación” o “ritual” en el texto principal, reservando esa explicación para la decisión teológica.
  - Se prefirió “vestidos” para conservar un registro bíblico, pero sin arcaizar en exceso la sintaxis.
