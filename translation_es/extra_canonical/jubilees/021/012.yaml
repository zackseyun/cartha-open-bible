review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue la dirección principal de la revisión inglesa auditada: la lista se entiende como maderas permitidas para el altar, no como especies prohibidas. También preserva bien la distinción entre «ofrendas» y «altar» y usa «Yahvé» conforme a la política del proyecto. Sin embargo, la cláusula central «para que no lleves para el altar madera además de estas» suena poco natural y semánticamente ambigua en español: puede entenderse como ‘no lleves madera adicional aparte de estas’, pero no expresa con claridad que el mandato restringe la selección a las especies listadas. Además, «la madera de la ofrenda» es algo rígido; el inglés auditado conserva esa relación léxica, pero en español conviene una formulación más clara sin perder el vínculo sacrificial.'
  spanish_quality_summary: El texto es mayormente legible, pero requiere una reparación menor de estilo y claridad sintáctica. «Cuida la madera de la ofrenda» es entendible, aunque «ten cuidado con la leña de la ofrenda» o similar suena más idiomático en contexto cultual. La frase «no lleves para el altar madera además de estas» resulta forzada; una redacción como «no lleves al altar otra madera fuera de estas» comunica mejor la restricción. La lista botánica es aceptable como seguimiento del POB inglés, aunque duplica «cedro» por fidelidad a la lista auditada.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para el nombre divino, «ofrendas» para መሥዋዕቲከ, y «altar» en la segunda referencia a ምሥዋዕ según la corrección auditada. No hay conflicto doctrinal relevante. La mejora propuesta afecta claridad idiomática, no terminología teológica.'
  issues:
  - severity: medium
    issue: Construcción ambigua y poco natural en la cláusula restrictiva
    rationale: «para que no lleves para el altar madera además de estas» calca el inglés de manera rígida y no deja tan claro en español que solo deben usarse las especies listadas.
  - severity: low
    issue: «madera de la ofrenda» suena rígido en español cultual
    rationale: Aunque es fiel al vínculo léxico del original y del inglés auditado, una formulación con «leña» y «con» mejora la naturalidad sin cambiar el sentido.
  revised_spanish_text: 'tus ofrendas delante de Yahvé. Y ten cuidado con la leña de la ofrenda, para que no lleves al altar otra madera fuera de estas: ciprés, abeto, almendro, pino, pino resinero, cedro, enebro, clemátide, olivo, mirto, laurel y cedro.'
  revision_rationale: 'Se ajusta la sintaxis para que el mandato restrictivo suene natural y claro en español, preservando la revisión fuente: la madera para el altar debe limitarse a las especies listadas. También se cambia «cuida la madera» por «ten cuidado con la leña», que es más idiomático en este contexto sacrificial sin alterar el contenido.'
