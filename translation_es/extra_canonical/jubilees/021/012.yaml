    text: 'Or ''so that you do not bring wood for the offering from these: vine, fig, myrtle, laurel, cypress, cedar, juniper, date-palm, almond, olive, myrrh, bay, and ash-wood,''.'
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:21Z'
    unchanged: false
    changes_summary: Changed the second occurrence of 'altar' to 'offering' for closer consistency with መሥዋዕት/ምሥዋዕ in the source. Otherwise retained the draft wording and list.
translation:
  language: es
  text: 'tus ofrendas delante de Yahvé. Y ten cuidado con la leña de la ofrenda, para que no lleves al altar otra madera fuera de estas: ciprés, abeto, almendro, pino, pino resinero, cedro, enebro, clemátide, olivo, mirto, laurel y cedro.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: before the Lord
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante el Señor
  - delante del Señor
  lexicon: YHWH -> Yahvé
  rationale: El texto fuente alude al nombre divino; la política del proyecto pide Yahvé en el texto principal, no el sustituto litúrgico 'Señor'.
- source_word: offering
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - sacrificio
  - oblación
  lexicon: מִנְחָה/זֶבַח y campo sacrificial general
  rationale: Aquí el contexto es una ofrenda vinculada al altar y a la madera; 'ofrenda' conserva el sentido amplio sin forzar un término técnico más específico.
- source_word: take care
  english_pob_choice: take care
  chosen_spanish: cuida
  alternatives_spanish:
  - ten cuidado
  - procura
  lexicon: imperativo de advertencia
  rationale: '''Cuida'' transmite con naturalidad la advertencia práctica del original sin añadir interpretación.'
- source_word: wood of the offering
  english_pob_choice: wood of the offering
  chosen_spanish: la madera de la ofrenda
  alternatives_spanish:
  - la madera del sacrificio
  - la madera de la oblación
  lexicon: expresión sacrificial
  rationale: Se conserva la relación explícita entre la madera y la ofrenda, siguiendo la revisión auditada que evitó confundir el término con 'altar' en la segunda aparición.
- source_word: altar
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - santuario
  - mesa del sacrificio
  lexicon: מִזְבֵּחַ
  rationale: El contexto y la revisión del inglés muestran que el objeto prohibido/permitido se refiere al altar; por eso se mantiene 'altar' donde corresponde.
- source_word: cypress, fir, almond, pine, pitch-pine, cedar, juniper, clematis, olive, myrtle, laurel, and cedar
  english_pob_choice: cypress, fir, almond, pine, pitch-pine, cedar, juniper, clematis, olive, myrtle, laurel, and cedar
  chosen_spanish: ciprés, abeto, almendro, pino, pino resinero, cedro, enebro, clemátide, olivo, mirto, laurel y cedro
  alternatives_spanish:
  - ciprés, pino, almendro, pino, pino de resina, cedro, enebro, clemátide, olivo, mirto, laurel y cedro
  - ciprés, abeto, almendra, pino, pino resinero, cedro, enebro, clemátide, olivo, mirto, laurel y cedro
  lexicon: listado botánico tradicional según la versión inglesa auditada
  rationale: Se sigue la lista del POB inglés, que ya audita la identificación de especies. 'Almendro' evita convertir indebidamente el árbol en fruto; 'pino resinero' representa pitch-pine de forma idiomática.
theological_decisions:
- issue: Nombre divino en una exhortación cultual
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del Señor
  - ante Yahvé
  rationale: La instrucción cultual se presenta ante el nombre divino; la convención del proyecto exige preservar el Tetragrámaton en español como Yahvé.
  doctrine_reference: Éxodo 3:15; política editorial del POB en español
- issue: Relación entre 'ofrenda' y 'altar' en la segunda cláusula
  english_pob_reading: wood of the offering ... wood for the altar
  chosen_spanish_reading: madera de la ofrenda ... para el altar
  alternative_spanish_readings:
  - madera de la ofrenda ... para la ofrenda
  - madera del altar ... para el altar
  rationale: La revisión auditada corrigió una confusión entre los términos relacionados con sacrificio y altar; el español conserva esa distinción para no borrar la tensión lexical del original.
  doctrine_reference: Lectura filológica del pasaje; coherencia con la revisión crítica del POB
translation_notes:
  revision_awareness: 'El borrador previo en inglés pasó por una corrección importante: se revirtió una mala lectura que invertía la prohibición y se restauró la referencia correcta al altar, además de descartarse especies botánicas inventadas. El español sigue esa lectura revisada y evita repetir la confusión entre ''ofrenda'' y ''altar'' en la segunda cláusula.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la norma del proyecto para el nombre divino.
  - No se añadió nota al pie porque la corrección textual ya quedó reflejada directamente en el texto español.
  - La lista de maderas conserva el orden y la repetición final de 'cedro' tal como aparece en el texto fuente y en la traducción inglesa auditada.
