  yaml_path: translation/extra_canonical/jubilees/021/012.yaml
  text: 'your offerings before the Lord. And take care with the wood of the offering, that you do not bring wood for the altar in addition to these: cypress, fir, almond, pine, pitch-pine, cedar, juniper, clematis, olive, myrtle, laurel, and cedar.'
