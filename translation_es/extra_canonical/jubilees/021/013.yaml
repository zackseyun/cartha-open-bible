base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/013.yaml
  text: '[called] arsatna and besem[13]; but from among these woods place under the sacrifice upon the altar those proven in appearance. And do not place any split or dark wood, but hard and clean wood, without blemish, sound and freshly grown; and do not place old wood[13], because its fragrance has gone out.'
  footnotes:
  - marker: '13'
    text: The list of woods in vv. 12-14 contains several difficult plant names in Ethiopic transliteration. Some identifications are uncertain, and the sequence may reflect borrowed or regional botanical terms rather than stable English species equivalents.
    reason: lexical_alternative
  - marker: '13'
    text: 'The phrase rendered ''[called] arsatna and besem'' is textually awkward and may preserve corrupt or poorly understood tree names. The sense of the larger instruction is clear: only select, sound, fragrant wood is to be used for the altar fire.'
    reason: textual_variant
  - marker: a
    text: Or 'place under the sacrifice those proven in appearance.'.
    reason: previous_rendering
  - marker: b
    text: Or 'any split wood, but hard'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:23Z'
    unchanged: false
    changes_summary: 'Made minor English refinements for naturalness and register: changed ''such as have been tested in appearance'' to ''those proven in appearance,'' ''new-grown'' to ''freshly grown,'' and added final punctuation. Kept the transliterated plant names and core wording otherwise unchanged.'
translation:
  language: es
  text: '[llamadas[a]] arsatna y besem; pero de entre estas maderas pon bajo el sacrificio sobre el altar[b] las de apariencia probada. Y no pongas ninguna madera partida ni oscura, sino madera dura y limpia, sin defecto, sana y recién crecida; y no pongas madera vieja, porque su fragancia se ha ido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres arsatna y besem se conservan transliterados porque el testimonio ge'ez y el audit trail inglés los tratan como nombres botánicos difíciles o inciertos; no se propone una identificación española segura. La expresión introductoria es textualmente difícil.
    reason: lexical_alternative
  - marker: b
    text: 'La frase refleja dos relaciones espaciales del ge''ez: ''bajo el sacrificio'' y ''sobre el altar''. Se conserva la construcción algo redundante para no perder el detalle del texto fuente.'
    reason: source_note
lexical_decisions:
- source_word: '[called] arsatna and besem'
  english_pob_choice: '[called] arsatna and besem'
  chosen_spanish: '[llamados] arsatna y besem'
  alternatives_spanish:
  - '[llamadas] arsatna y besem'
  - '[conocidos como] arsatna y besem'
  lexicon: transliteración
  rationale: Se conservan los nombres vegetales transliterados porque el texto base los presenta como términos oscuros o técnicamente inciertos; en español no existe identificación botánica segura sin exceder la evidencia. Se marca el carácter textual incierto con una nota.
- source_word: place under the sacrifice upon the altar
  english_pob_choice: place under the sacrifice upon the altar
  chosen_spanish: pon bajo el sacrificio sobre el altar
  alternatives_spanish:
  - coloca bajo el sacrificio sobre el altar
  - pon debajo del sacrificio sobre el altar
  lexicon: poner/colocar
  rationale: 'Se mantiene la doble relación espacial del ge''ez, reflejada en el audit trail inglés: ''under the sacrifice'' y ''upon the altar''. En español se conserva la estructura sin suavizarla para no perder el detalle textual.'
- source_word: those proven in appearance
  english_pob_choice: those proven in appearance
  chosen_spanish: las probadas por su aspecto
  alternatives_spanish:
  - las examinadas por su aspecto
  - las comprobadas en su aspecto
  lexicon: probar/comprobar
  rationale: '''Probadas'' reproduce bien la idea de selección o verificación visible y mantiene la ambigüedad del inglés auditado, que admite una lectura de examen por apariencia. Se evita precisar más de lo que el texto permite.'
- source_word: any split or dark wood
  english_pob_choice: any split or dark wood
  chosen_spanish: ninguna madera partida ni oscura
  alternatives_spanish:
  - ninguna madera hendida ni oscura
  - ninguna madera quebrada ni oscura
  lexicon: split/dark
  rationale: '''Partida'' expresa el daño físico de la madera y ''oscura'' conserva el segundo descriptor añadido en la revisión textual. La pareja mantiene la fuerza negativa del original sin introducir especies o cualidades no atestiguadas.'
- source_word: hard and clean wood
  english_pob_choice: hard and clean wood
  chosen_spanish: madera dura y limpia
  alternatives_spanish:
  - madera fuerte y limpia
  - madera sólida y limpia
  lexicon: hard/clean
  rationale: '''Dura'' y ''limpia'' son las equivalencias más directas y naturales en español para el criterio material de la madera. Se conserva el valor de aptitud ritual sin adornarlo.'
- source_word: without blemish, sound and freshly grown
  english_pob_choice: without blemish, sound and freshly grown
  chosen_spanish: sin defecto, sana y recién crecida
  alternatives_spanish:
  - sin mancha, sana y recién nacida
  - sin defecto, íntegra y recién crecida
  lexicon: blemish/sound/freshly grown
  rationale: '''Sin defecto'' corresponde a una falta de tacha; ''sana'' conserva la idea de integridad o buena condición; ''recién crecida'' refleja el inglés revisado ''freshly grown'' sin forzar una especie botánica concreta.'
- source_word: old wood, because its fragrance has gone out
  english_pob_choice: old wood, because its fragrance has gone out
  chosen_spanish: madera vieja, porque su fragancia se ha ido
  alternatives_spanish:
  - madera antigua, porque su fragancia ha desaparecido
  - madera envejecida, porque su fragancia se ha ido
  lexicon: old/fragrance
  rationale: '''Vieja'' mantiene el contraste con ''recién crecida'' y ''se ha ido'' reproduce la imagen del aroma perdido de forma directa y sobria. ''Fragancia'' conserva el motivo olfativo del texto base.'
theological_decisions:
- issue: Material apto para el altar y pureza ritual de la madera
  english_pob_reading: Only select, sound, fragrant wood is to be used for the altar fire.
  chosen_spanish_reading: Solo debe usarse madera seleccionada, sana y fragante para el sacrificio sobre el altar.
  alternative_spanish_readings:
  - Solo debe usarse madera apta, sana y fragante para el fuego del altar.
  - Solo debe usarse madera escogida, íntegra y fragante para el altar.
  rationale: El versículo regula la idoneidad ritual de la madera sin añadir simbolismo doctrinal. La formulación española conserva la exclusividad, la integridad física y el criterio de fragancia, que el audit trail presenta como sentido global claro.
  doctrine_reference: pureza ritual / culto aceptable
translation_notes:
  revision_awareness: Se incorporó la corrección textual más reciente del audit trail inglés, que restablece 'upon the altar' y 'split or dark wood'. La traducción española refleja ambas precisiones y mantiene los nombres transliterados sin identificarlos botánicamente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' por defecto doctrinal del proyecto solo cuando aparezca el nombre divino; aquí no aparece.
  - Se usó 'sacrificio' para seguir el eco del inglés auditado, sin sustituirlo por 'ofrenda' para no alterar la terminología de la sección.
  - Se evitó 'Cristo', 'Señor' y otras sustituciones no presentes en el texto fuente.
