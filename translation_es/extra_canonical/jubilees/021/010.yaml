  glossary_alignment: 'Buena alineación general con el glosario del proyecto: ''Yahvé'' para el nombre divino, ''libación'' para ሞጻሕቱ, ''ofrenda de cereal'' para ኅብስተ፡ ጽንሓሕ, ''cosa profana'' para la noción ritual de profanación, y ''cargarán con su pecado'' para la responsabilidad cultual. No se requieren notas nuevas; la nota inglesa sobre el posible reanálisis del sintagma inicial no es obligatoria aquí si el español se formula de manera no ambigua.'
