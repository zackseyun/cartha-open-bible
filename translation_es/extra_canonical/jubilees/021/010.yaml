base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/010.yaml
  text: and with its drink offering, for a pleasing aroma, a grain offering to the Lord. And eat its flesh on that day and on the second day, and do not let the sun go down on it on the second day until it is eaten, and do not leave any of it for the third day, because it is not acceptable, because it is a profane thing, and it must not be eaten; and all who eat it will bear their sin. For thus I found written in the book of my forefathers, the former ones, and in the words of Enoch and in the words of Noah.
  footnotes:
  - marker: a
    text: Or 'and with its grain offering, for a pleasing aroma to the Lord.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:53Z'
    unchanged: false
    changes_summary: Changed 'drink offering' to 'grain offering' for lexical accuracy; revised 'offering of pleasing fragrance' to 'for a pleasing aroma' for more natural formal English; clarified the sunset clause as 'do not let the sun go down on it on the second day until it is eaten'; changed 'evil thing set apart' to 'a profane thing' to better reflect the sense of the source; and adjusted 'books' to 'book' to match the singular.
translation:
  language: es
  text: y con su libación, como aroma agradable, una ofrenda de cereal para Yahvé.[a] Y coman su carne en ese día y en el segundo día, y no dejen que se ponga el sol sobre ella en el segundo día hasta que sea comida; y no dejen nada de ella para el tercer día, porque no es aceptable, porque es una cosa profana, y no debe comerse; y todos los que la coman cargarán con su pecado. Porque así lo hallé escrito en el libro de mis antepasados, los antiguos, y en las palabras de Enoc y en las palabras de Noé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''y con su ofrenda de cereal, como aroma agradable para Yahvé''.'
    reason: La auditoría inglesa conserva una alternativa previa para el análisis del sintagma inicial; en español conviene preservarla como nota léxica, ya que el ge’ez ha generado variación de análisis en la historia de revisión.
lexical_decisions:
- source_word: ሞጻሕቱ
  english_pob_choice: drink offering
  chosen_spanish: libación
  alternatives_spanish:
  - ofrenda líquida
  - ofrenda de bebida
  lexicon: ofrenda de bebida / libación
  rationale: El texto ge’ez distingue esta ofrenda de la ofrenda de cereal que sigue; en español, 'libación' comunica con precisión la ofrenda líquida sin mezclarla con la ofrenda de cereal.
- source_word: ኅብስተ፡ ጽንሓሕ
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda de grano
  - ofrenda vegetal
  lexicon: ofrenda de cereal / ofrenda de grano
  rationale: La frase corresponde a una ofrenda alimentaria de cereal/pan; 'ofrenda de cereal' mantiene la distinción terminológica y evita una paráfrasis excesiva.
- source_word: ለእግዚአብሔር
  english_pob_choice: to the Lord
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para el Señor
  lexicon: YHWH -> Yahvé
  rationale: Se preserva el nombre divino explícito del proyecto, sin la sustitución reverencial por 'Señor'.
- source_word: ብላዕ
  english_pob_choice: eat
  chosen_spanish: comerán
  alternatives_spanish:
  - comerá
  - coman
  lexicon: to eat
  rationale: El mandato en contexto plural se vierte naturalmente al español con 'comerán' dentro de una construcción exhortativa coordinada.
- source_word: ኢይዕረብ
  english_pob_choice: do not let the sun go down on it
  chosen_spanish: no dejarán que el sol se ponga sobre ella
  alternatives_spanish:
  - no permitirán que el sol se ponga sobre ella
  - no dejarán caer el sol sobre ella
  lexicon: sun set / go down
  rationale: La construcción española reproduce la imagen semítica con claridad y evita una formulación demasiado idiomática que borre el detalle ritual.
- source_word: ኢይትርፍ
  english_pob_choice: do not leave any of it
  chosen_spanish: no dejarán nada de ella
  alternatives_spanish:
  - no reservarán nada de ella
  - no quedará nada de ella
  lexicon: leave remaining
  rationale: La idea es no conservar restos hasta el tercer día; 'no dejarán nada de ella' expresa adecuadamente la prohibición.
- source_word: ኢይሠጠዎ
  english_pob_choice: it is not acceptable
  chosen_spanish: no es aceptable
  alternatives_spanish:
  - no es agradable
  - no es válido
  lexicon: acceptable
  rationale: La forma negativa transmite la evaluación ritual del texto sin añadir una categoría doctrinal ajena.
- source_word: እኩይ
  english_pob_choice: profane thing
  chosen_spanish: cosa profana
  alternatives_spanish:
  - cosa impura
  - cosa malvada
  lexicon: profane / holy
  rationale: El ge’ez marca una cualidad de profanación ritual; 'cosa profana' conserva mejor esa tensión que 'malvada'.
- source_word: ኃጢአተ
  english_pob_choice: their sin
  chosen_spanish: su pecado
  alternatives_spanish:
  - su culpa
  - el pecado de ellos
  lexicon: sin / guilt
  rationale: '''Su pecado'' mantiene el paralelismo directo con el original y con la formulación auditable del inglés POB.'
- source_word: ነገረ
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - relato
  - enseñanzas
  lexicon: words / sayings
  rationale: Se conserva el valor de 'dichos/palabras' para Enoc y Noé, sin expandir el sentido a 'enseñanzas'.
theological_decisions:
- issue: Nombre divino en la ofrenda
  english_pob_reading: to the Lord
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - para el Señor
  rationale: El texto fuente nombra explícitamente a Dios con el tetragrámaton representado en la tradición del proyecto; la traducción española sigue ese estándar para mantener transparencia textual.
  doctrine_reference: Éxodo 3:15; convención editorial POB sobre YHWH
- issue: Pureza ritual frente a moralidad general
  english_pob_reading: because it is a profane thing
  chosen_spanish_reading: porque es una cosa profana
  alternative_spanish_readings:
  - porque es una cosa impura
  - porque es una cosa mala
  rationale: El contexto trata de la validez ritual del alimento/ofrenda sobrante, no de un juicio moral general; 'profana' conserva esa categoría cultual.
  doctrine_reference: Levítico 19–22; distinción bíblica entre santo/común
- issue: Responsabilidad por comer lo prohibido
  english_pob_reading: all who eat it will bear their sin
  chosen_spanish_reading: todos los que la coman cargarán con su pecado
  alternative_spanish_readings:
  - todos los que la coman llevarán su culpa
  - todos los que la coman serán culpables
  rationale: '''Cargarán con su pecado'' conserva la fuerza de responsabilidad y consecuencia personal sin suavizarla en exceso.'
  doctrine_reference: Levítico 17:4; Números 9:13
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que corrigió la cláusula de la ofrenda a 'drink offering' junto con la 'grain offering', ajustó la referencia al sol y reforzó 'profane thing'. La versión española refleja ambas ofrendas, el límite temporal del segundo día y la evaluación ritual de profanación sin introducir notas no ancladas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología base del proyecto.
  - Se usa 'ofrenda de cereal' para la ofrenda alimentaria, distinguiéndola de la 'libación'.
  - No se emplean marcas de nota porque no hay lectura alternativa que requiera anclaje textual en esta versión.
  - '''pecado'' se conserva para la cláusula de responsabilidad final, en paralelo con el inglés auditado.'
