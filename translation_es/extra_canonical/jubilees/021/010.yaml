  rationale: Se reordenó la frase inicial para expresar con claridad que el texto menciona tanto la libación como la ofrenda de cereal, manteniendo 'Yahvé' según el estándar del proyecto. Se cambió el futuro por imperativos plurales ('coman', 'no dejen') para reflejar mejor el tono prescriptivo ritual en español natural. También se suavizó ligeramente la cláusula de la puesta del sol sin perder la imagen original. Se añadió una nota para conservar la alternativa documentada en la auditoría inglesa sobre el análisis del sintagma inicial.
