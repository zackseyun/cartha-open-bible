  source_alignment_summary: 'El borrador español transmite casi todo el sentido del ge’ez y sigue bien la auditoría inglesa: preserva tanto la libación como la ofrenda de cereal, mantiene la prohibición de dejarlo hasta el tercer día, la idea de no dejar que llegue la puesta del sol del segundo día sin haberlo comido, la inaceptabilidad ritual, la profanación y el llevar el pecado. Sin embargo, hay dos ajustes necesarios para mayor fidelidad y naturalidad: el inicio debe evitar la ambigüedad sintáctica de ''como aroma agradable para Yahvé, una ofrenda de cereal'', y la forma verbal ''comerán'' suena descriptiva/futura más que imperativa en español; conviene un imperativo plural. También ''no dejarán que el sol se ponga sobre ella'' suena algo forzado en español y se puede formular mejor sin perder la imagen.'
