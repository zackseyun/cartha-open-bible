translation:
  language: es
  text: la sangre de los animales salvajes, y de los animales del ganado, y de toda ave que vuela en el cielo. Y si sacrificas una ofrenda como un sacrificio de paz aceptable[a], sacríficala y derrama su sangre sobre el altar; y toda la grosura[b] de tu ofrenda la ofrecerás sobre el altar, junto con flor de harina amasada con aceite; y con su libación la ofrecerás toda junta sobre el altar como una ofrenda de aroma agradable delante de
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un sacrificio de paz de acción de gracias».
    reason: textual_variant
  - marker: b
    text: O «la grasa de tu ofrenda».
    reason: lexical_alternative
lexical_decisions:
- source_word: ደመ
  english_pob_choice: the blood of
  chosen_spanish: la sangre de
  alternatives_spanish:
  - la sangre de los
  - la sangre
  lexicon: Ge'ez ደም
  rationale: El ge'ez introduce explícitamente «la sangre de», por lo que en español conviene conservar esa relación posesiva y no omitirla. «La sangre de» es la forma natural y fiel.
- source_word: ዘአርዌ
  english_pob_choice: wild animals
  chosen_spanish: los animales salvajes
  alternatives_spanish:
  - las fieras
  - los animales silvestres
  lexicon: Ge'ez አርዌ
  rationale: La revisión inglesa aclaró el contraste con el ganado. «Animales salvajes» comunica bien ese contraste en español sin cargar un matiz demasiado zoológico.
- source_word: ወዘእንስሳ
  english_pob_choice: cattle
  chosen_spanish: los animales del ganado
  alternatives_spanish:
  - el ganado
  - las reses
  lexicon: Ge'ez እንስሳ
  rationale: El término apunta al ganado doméstico. «Animales del ganado» mantiene la distinción con los animales salvajes, aunque «el ganado» sería una alternativa más idiomática.
- source_word: ወዘኵሉ ዖፍ
  english_pob_choice: every bird
  chosen_spanish: toda ave
  alternatives_spanish:
  - toda ave
  - cada ave
  lexicon: Ge'ez ዖፍ
  rationale: «Toda ave» reproduce bien el alcance distributivo del original y es natural en español bíblico contemporáneo.
- source_word: ዘይሰርር ውስተ ሰማይ
  english_pob_choice: that flies in the sky
  chosen_spanish: que vuela en el cielo
  alternatives_spanish:
  - que vuela por el cielo
  - que surca el cielo
  lexicon: Ge'ez ዘይሰርር
  rationale: 'La imagen es directa: aves que vuelan en el cielo. «En el cielo» sigue de cerca el original y la tradición bíblica de manera inteligible.'
- source_word: ዘይሰጠው
  english_pob_choice: as an acceptable peace offering
  chosen_spanish: como un sacrificio de paz aceptable
  alternatives_spanish:
  - como una ofrenda de paz aceptable
  - como un sacrificio de paz que sea aceptable
  lexicon: Ge'ez ዘይሰጠው
  rationale: El audit trail corrigió la lectura errónea de «thanksgiving» y afirmó el sentido de «aceptable». En español, «sacrificio de paz aceptable» conserva la categoría sacrificial y el valor de aceptación.
- source_word: ሕርደ
  english_pob_choice: slaughter it
  chosen_spanish: sacrifícala
  alternatives_spanish:
  - mátala
  - degüéllala
  lexicon: Ge'ez ሕርደ
  rationale: En este contexto ritual, «sacrificar» es el verbo adecuado y mantiene el registro de ofrenda. «Sacrifícala» evita una mera descripción de matanza.
- source_word: ወደሞሙ ትክዐዉ
  english_pob_choice: and pour out its blood
  chosen_spanish: y derrama su sangre
  alternatives_spanish:
  - y derrama su sangre
  - y vierte su sangre
  lexicon: Ge'ez ደም
  rationale: 'La revisión inglesa corrigió una lectura pasiva: el sentido es imperativo activo. «Derrama su sangre» es la formulación española más natural para el acto ritual.'
- source_word: ውስተ ምሥዋዕ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: Ge'ez ምሥዋዕ
  rationale: «Sobre el altar» refleja la dirección del gesto sacrificial y suena más fluido que «en el altar».
- source_word: ጽንሑክ
  english_pob_choice: your offering
  chosen_spanish: tu ofrenda
  alternatives_spanish:
  - tu sacrificio
  - tu oblación
  lexicon: Ge'ez ጽንሑክ
  rationale: El poseído de segunda persona singular se conserva con «tu». «Ofrenda» es más general y apropiado al conjunto de elementos rituales listados.
- source_word: ታዐርግ
  english_pob_choice: you shall offer up
  chosen_spanish: la ofrecerás
  alternatives_spanish:
  - la presentarás
  - la subirás
  lexicon: Ge'ez ዐረገ
  rationale: El verbo indica elevación/ascenso en contexto cultual. «Ofrecerás» comunica correctamente la acción sacrificial en español bíblico.
- source_word: ምስለ ስንዳሌ ልውሰ በቅብዕ
  english_pob_choice: together with fine flour mixed with oil
  chosen_spanish: junto con flor de harina amasada con aceite
  alternatives_spanish:
  - junto con flor de harina mezclada con aceite
  - junto con harina fina mezclada con aceite
  lexicon: Ge'ez ስንዳሌ
  rationale: «Flor de harina» es la expresión bíblica tradicional y fiel para harina fina selecta; «amasada con aceite» expresa la mezcla íntima sugerida por el original.
- source_word: ምስለ ሞ፟ጻሕቱ
  english_pob_choice: with its drink offering
  chosen_spanish: con su libación
  alternatives_spanish:
  - con su ofrenda de bebida
  - con su bebida ritual
  lexicon: Ge'ez ሞ፟ጻሕት
  rationale: «Libación» es el término técnico más exacto y transparente para una ofrenda líquida ritual. En español bíblico evita ambigüedad.
- source_word: መዐዛ ሠናይ
  english_pob_choice: an offering of a pleasing fragrance
  chosen_spanish: una ofrenda de aroma agradable
  alternatives_spanish:
  - una ofrenda de grato olor
  - una ofrenda de olor agradable
  lexicon: Ge'ez መዐዛ
  rationale: «Aroma agradable» conserva el valor sensorial y cultual del hebraísmo/semítismo, y es una formulación digna y comprensible en español.
theological_decisions:
- issue: Lectura de la ofrenda de paz
  english_pob_reading: acceptable peace offering
  chosen_spanish_reading: sacrificio de paz aceptable
  alternative_spanish_readings:
  - ofrenda de paz aceptable
  - sacrificio de paz que sea aceptable
  rationale: El texto ge'ez no apoya «acción de gracias»; el sentido corregido es de aceptación. «Sacrificio de paz aceptable» mantiene la categoría ritual y la cualidad de aceptabilidad sin introducir una glosa no sustentada.
  doctrine_reference: Levítico 3; Levítico 7:11-18
- issue: Naturaleza de la acción sobre la sangre
  english_pob_reading: and pour out its blood
  chosen_spanish_reading: y derrama su sangre
  alternative_spanish_readings:
  - y derrama su sangre sobre el altar
  - y vierte su sangre
  rationale: La revisión textual mostró que no es un pasivo de resultado sino una instrucción activa. La sangre se derrama sobre el altar como acto cultual concreto.
  doctrine_reference: Éxodo 29:16; Levítico 1:5
- issue: Destino de la grasa
  english_pob_reading: all the fat of your offering
  chosen_spanish_reading: toda la grosura de tu ofrenda
  alternative_spanish_readings:
  - toda la grasa de tu ofrenda
  - toda la grosura de la ofrenda
  rationale: El ge'ez conserva el posesivo de segunda persona. «Grosura» evita reducir el término a un tecnicismo moderno demasiado restringido y mantiene el lenguaje sacrificial.
  doctrine_reference: Levítico 3:3-5
- issue: Lenguaje del olor agradable
  english_pob_reading: as an offering of a pleasing fragrance before
  chosen_spanish_reading: como una ofrenda de aroma agradable delante de
  alternative_spanish_readings:
  - como un aroma agradable delante de
  - como una ofrenda de grato olor delante de
  rationale: Se conserva la fórmula cultual semítica de aceptación, evitando suavizarla o sustituirla por una explicación interpretativa.
  doctrine_reference: Génesis 8:21; Éxodo 29:18
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección importante: el ge''ez no dice «thanksgiving peace offering», sino «acceptable peace offering»; además, se corrigió la relación activa de «derrama su sangre» y se recuperó el posesivo de «tu ofrenda». La versión española sigue esas revisiones y evita importar la lectura descartada.'
  spanish_consistency_notes:
  - He usado «Yahvé» en otras entradas del proyecto como forma estándar del nombre divino; aquí el fragmento se corta antes de la fórmula final, así que no aparece en el texto.
  - He preferido «sacrificio de paz» a «ofrenda de paz» porque la secuencia incluye el acto de sacrificar y la tradición cultual del pasaje.
  - «Libación» y «aroma agradable» se mantienen como terminología ritual consistente con el registro bíblico del proyecto.
  - La sintaxis conserva una acumulación paratáctica cercana al original, pero ajustada para fluidez natural en español.
