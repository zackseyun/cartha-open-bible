  text: its fragrance, because there is no longer fragrance upon it as at first. Other than these woods, do not place any other, because its fragrance is distinct, and the odor of its fragrance goes up to heaven.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:24Z'
    unchanged: false
    changes_summary: Adjusted the opening to reflect the explicit possessive more closely; replaced 'any different kind' with 'any other' for a more literal and natural rendering; changed 'is known' to 'is distinct' to better reflect the source; retained the formal tone and full sense of the final clause.
translation:
  language: es
  text: su fragancia, porque ya no hay fragancia sobre él como al principio. Fuera de estas maderas, no pongas ningún otro, porque su fragancia es distinta, y el olor de su fragancia sube al cielo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መዐዛሁ
  english_pob_choice: its fragrance
  chosen_spanish: su fragancia
  alternatives_spanish:
  - su aroma
  - su olor
  lexicon: fragrance / aroma / olor
  rationale: El posesivo explícito del ge'ez se refleja con 'su'. 'Fragancia' conserva mejor el registro culto y la idea positiva del texto que 'olor', aunque esta última aparece luego en la frase final para reproducir la repetición semántica.
- source_word: አልቦ እንከ መዐዛ ላዕሌሁ ከመ ቀዳማዊ
  english_pob_choice: because there is no longer fragrance upon it as at first
  chosen_spanish: porque ya no hay fragancia sobre él como al principio
  alternatives_spanish:
  - porque ya no queda fragancia sobre él como al principio
  - porque ya no tiene fragancia como antes
  lexicon: there is no longer / as at first
  rationale: '''Ya no hay'' expresa con naturalidad la desaparición de la fragancia y mantiene la fuerza del original. ''Sobre él'' conserva la imagen locativa del texto fuente, y ''como al principio'' traduce fielmente la comparación temporal.'
- source_word: ዘእንበለ እሉ ዕፀው አልቦ ዘታነብር ባዕደ
  english_pob_choice: Other than these woods, do not place any other
  chosen_spanish: Fuera de estos maderos, no pongas ninguno otro
  alternatives_spanish:
  - Excepto estos maderos, no pongas otro
  - Además de estos maderos, no pongas ningún otro
  lexicon: these woods / any other
  rationale: '''Maderos'' comunica el material leñoso en un español claro y sobrio; ''maderas'' podría sonar más genérico, y ''maderos'' evita la connotación moderna de ''maderas'' como tipo de madera. ''Ninguno otro'' conserva la restricción absoluta del original, aunque ''ningún otro'' es una alternativa natural.'
- source_word: መዐዛሁ ፍሉጥ
  english_pob_choice: because its fragrance is distinct
  chosen_spanish: porque su fragancia es distinta
  alternatives_spanish:
  - porque su fragancia es conocida
  - porque su fragancia es reconocible
  lexicon: distinct / known
  rationale: La revisión inglesa cambió de 'is known' a 'is distinct'; en español 'distinta' reproduce mejor esa diferenciación objetiva. 'Conocida' quedaría más interpretativa y menos precisa respecto al contraste con otras fragancias.
- source_word: ወየዐርግ ፄና መዐዛሁ ውስተ ሰማይ
  english_pob_choice: and the odor of its fragrance goes up to heaven
  chosen_spanish: y el olor de su fragancia sube al cielo
  alternatives_spanish:
  - y el aroma de su fragancia sube al cielo
  - y el perfume de su fragancia asciende al cielo
  lexicon: odor / goes up to heaven
  rationale: '''Olor'' reproduce la reiteración del original y del inglés auditado, que distingue ''fragrance'' y ''odor''. ''Sube al cielo'' conserva la imaginería vertical sin añadir solemnidad innecesaria; ''asciende'' es viable, pero ''sube'' resulta más directo y fiel.'
theological_decisions:
- issue: Imagen de la fragancia que sube al cielo
  english_pob_reading: the odor of its fragrance goes up to heaven
  chosen_spanish_reading: el olor de su fragancia sube al cielo
  alternative_spanish_readings:
  - el aroma de su fragancia asciende al cielo
  - el perfume de su fragancia sube al cielo
  rationale: No hay una doctrina explícita aquí, pero la imagen de la fragancia que asciende se mantiene sin espiritualizarla en exceso ni reducirla a metáfora vaga. Se conserva la concreción sensorial del pasaje.
  doctrine_reference: No aplica; imagen ritual/descriptiva.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del inglés auditado: ''no longer fragrance upon it as at first'', ''any other'', ''distinct'' y el final ''goes up to heaven''. Se evitó trasladar la formulación anterior ''different kind'' y ''is known'', porque el audit trail las corrigió hacia un sentido más literal y natural.'
  spanish_consistency_notes:
  - Se mantuvo 'fragancia' en la primera y segunda mención para respetar la repetición del original, y se reservó 'olor' para la clausula final como reflejo del contraste léxico del texto fuente.
  - Se eligió 'maderos' para el referente vegetal/leñoso, evitando 'leños' por sonar demasiado técnico o regional en español contemporáneo.
  - El texto conserva un tono formal y sobrio, apto para publicación, sin cargarlo de terminología eclesiástica ajena al pasaje.
