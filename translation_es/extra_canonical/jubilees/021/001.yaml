base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/001.yaml
  text: And in the sixth year of the seventh week of this jubilee, Abraham called Isaac his son and instructed him, saying, “I have grown old, and I do not know the day of my death, and I am full of my days.”
  footnotes:
  - marker: a
    text: Or 'my days are fulfilled'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:21Z'
    unchanged: false
    changes_summary: Removed 'of years' as unnecessary and potentially redundant with 'week' in this context; changed 'are completed' to 'are fulfilled' for a more formal and literal rendering of the final clause.
translation:
  language: es
  text: 'Y en el sexto año de la séptima semana de este jubileo, Abraham llamó a Isaac su hijo y le dio instrucciones, diciendo: «He envejecido, y no sé el día de mi muerte, y estoy colmado de días[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis días están cumplidos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ዓመት / year
  english_pob_choice: the sixth year
  chosen_spanish: el sexto año
  alternatives_spanish:
  - el año sexto
  - al sexto año
  lexicon: año
  rationale: El Ge'ez indica un año dentro de la secuencia cronológica. «El sexto año» conserva el orden natural del español y sigue de cerca la sintaxis del inglés POB sin introducir glosa innecesaria.
- source_word: ዘሳብዕ ሱባዔ / seventh week
  english_pob_choice: the seventh week
  chosen_spanish: la séptima semana
  alternatives_spanish:
  - la semana séptima
  - la séptima semana de años
  lexicon: semana
  rationale: El contexto de Jubileos usa «semana» como unidad cronológica de siete años. Se mantiene «la séptima semana» para no añadir explícitamente «de años», ya que el texto y la revisión inglesa lo consideran redundante en este lugar.
- source_word: ጸውዐ / called
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - hizo llamar
  - convocó
  lexicon: llamar
  rationale: El verbo simple «llamó» reproduce el acto de Abraham de llamar a Isaac sin sobreinterpretar el tipo de llamada.
- source_word: ወአዘዞ / instructed him
  english_pob_choice: instructed him
  chosen_spanish: le dio instrucciones
  alternatives_spanish:
  - lo instruyó
  - le ordenó
  lexicon: instruir
  rationale: «Le dio instrucciones» conserva el valor directivo del verbo y suena natural en español. «Lo instruyó» sería más literal, pero menos idiomático aquí; «le ordenó» sugiere una dureza no explicitada por el contexto.
- source_word: አነ ረሳዕኩ / I have grown old
  english_pob_choice: I have grown old
  chosen_spanish: He envejecido
  alternatives_spanish:
  - Me he hecho viejo
  - He llegado a viejo
  lexicon: envejecer
  rationale: La frase expresa envejecimiento en primera persona. «He envejecido» es directa, sobria y fiel al aspecto perfecto del Ge'ez.
- source_word: ዕለተ ሞትየ / the day of my death
  english_pob_choice: the day of my death
  chosen_spanish: el día de mi muerte
  alternatives_spanish:
  - el día en que moriré
  lexicon: día
  rationale: Se mantiene la formulación idiomática «el día de mi muerte», que conserva el sustantivo abstracto del original y evita una paráfrasis prospectiva.
- source_word: ወጸገብኩ መዋዕልየ / I am full of my days
  english_pob_choice: I am full of my days
  chosen_spanish: estoy lleno de mis días
  alternatives_spanish:
  - mis días están cumplidos
  - mis días se han cumplido
  lexicon: estar lleno
  rationale: 'Se sigue la corrección auditada de la gramática ge''ez: la forma es primera persona singular. «Estoy lleno de mis días» conserva la imagen semítica y el matiz idiomático, sin ocultar la tensión entre literalidad e idiomatismo.'
theological_decisions:
- issue: Fórmula idiomática de vejez y plenitud de días
  english_pob_reading: I am full of my days
  chosen_spanish_reading: estoy lleno de mis días
  alternative_spanish_readings:
  - mis días están cumplidos
  - mi vida está cumplida
  rationale: La traducción mantiene la imagen bíblica tradicional de plenitud vital al final de la vida, sin convertirla en una mera paráfrasis. Se preserva así la tensión entre expresión literal y sentido idiomático.
  doctrine_reference: Génesis 25:8; 35:29; Job 42:17
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que eliminó «de años» por redundante y la corrección gramatical que identifica la forma ge'ez como primera persona singular; por eso se tradujo «estoy lleno de mis días» y no una forma impersonal o plural.
  spanish_consistency_notes:
  - Se usa «jubileo» como término técnico del libro, consistente con la tradición de la obra y con el inglés POB.
  - Se mantiene «Isaac» y «Abraham» con ortografía española estándar.
  - No se introdujo «Mesías», «Yahvé» ni otras terminologías no presentes en este versículo.
