base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/021/002.yaml
  text: And behold, I am one hundred and seventy-five years old, and throughout all the days of my life I have remembered the Lord, seeking with all my heart to do his will.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:21Z'
    unchanged: false
    changes_summary: Adjusted number style to formal prose ('one hundred and seventy-five'); changed 'through all' to 'throughout all' for naturalness; rendered ሀሎኩ እንዘ እዜከር more directly as 'I have remembered' instead of 'I have remained mindful'; added final period.
translation:
  language: es
  text: Y he aquí, yo tengo ciento setenta y cinco años, y durante todos los días de mi vida he recordado a Yahvé, procurando con todo mi corazón hacer su voluntad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወናሁ፡
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mirad
  - Y ved
  lexicon: none
  rationale: La partícula introductoria exclamativa se conserva con una fórmula natural en español bíblico sin volverla arcaizante en exceso.
- source_word: ወልደ፡ ምእት፡ ወሰብዓ፡ ወኃምስቱ፡ ዓመት፡
  english_pob_choice: one hundred and seventy-five years old
  chosen_spanish: ciento setenta y cinco años
  alternatives_spanish:
  - ciento setenta y cinco de años
  - ciento setenta y cinco años de edad
  lexicon: none
  rationale: El numeral compuesto se vierte de forma estándar y clara. El texto fuente expresa edad, por lo que 'años' basta en español.
- source_word: ሀሎኩ፡ እንዘ፡ እዜከር፡
  english_pob_choice: I have remembered
  chosen_spanish: he recordado
  alternatives_spanish:
  - he tenido presente
  - he permanecido mindful
  lexicon: none
  rationale: La revisión inglesa desplazó 'remained mindful' hacia una forma más directa. 'He recordado' refleja mejor el valor verbal de la forma y evita una calca poco natural en español.
- source_word: ለእግዚአብሔር፡
  english_pob_choice: the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  lexicon: none
  rationale: 'Se sigue el criterio de la serie: el nombre divino se expresa como ''Yahvé'' y no se enmascara como ''Señor''. Como el contexto etíope corresponde al nombre divino, la traducción lo hace explícito.'
- source_word: ወእንዘ፡ አኀሥሥ፡
  english_pob_choice: seeking
  chosen_spanish: procurando
  alternatives_spanish:
  - buscando
  - esforzándome por
  lexicon: none
  rationale: El participio con sentido durativo se traduce con una forma española natural que conserva la idea de búsqueda/esfuerzo continuo.
- source_word: በኵሉ፡ ልብየ፡
  english_pob_choice: with all my heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - de todo corazón
  - con todo mi ser
  lexicon: none
  rationale: La equivalencia idiomática es directa y fiel al alcance afectivo-volitivo de 'heart' en contexto bíblico.
- source_word: ፈቃደቲሁ፡
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su querer
  - lo que él quiere
  lexicon: none
  rationale: La voluntad divina se expresa con el término español más estable y comprensible, manteniendo el sentido normativo del original.
theological_decisions:
- issue: Nombre divino en un dicho autobiográfico patriarcal
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La política del proyecto exige no ocultar el nombre divino cuando el original lo designa de manera directa. Aquí 'Yahvé' preserva la referencia teológica del texto y la coherencia terminológica del POB en español.
  doctrine_reference: Éxodo 3:15; convención editorial POB para YHWH
- issue: Relación entre recordar a Dios y buscar su voluntad
  english_pob_reading: have remembered the Lord, seeking with all my heart to do his will
  chosen_spanish_reading: he recordado a Yahvé, procurando con todo mi corazón hacer su voluntad
  alternative_spanish_readings:
  - he tenido presente a Yahvé, buscando con todo mi corazón hacer su voluntad
  rationale: La frase une memoria perseverante y orientación práctica. 'He recordado' conserva la acción verbal; 'procurando' mantiene la finalidad ética sin convertirla en mera reflexión interna.
  doctrine_reference: Deuteronomio 6:5; Salmo 119:2
translation_notes:
  revision_awareness: 'La redacción inglesa revisada fue tomada como guía para la claridad sintáctica: se mantuvo el número en forma plena, se prefirió una frase verbal más directa para ሀሎኩ እንዘ እዜከር (''he recordado'') y se conservó la cláusula final de propósito sin ampliarla. No se introdujeron notas porque el pasaje no presenta variantes textuales ni ambigüedades que requieran anclaje adicional en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino conforme al criterio del proyecto.
  - Se usa español formal y publicable, sin arcaísmos innecesarios.
  - La puntuación refleja una sola oración coordinada, como en el original y en la versión inglesa auditada.
