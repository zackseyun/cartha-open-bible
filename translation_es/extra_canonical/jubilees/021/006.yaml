translation:
  language: es
  text: a cosas impuras, o tras imágenes talladas, o tras imágenes fundidas. Y no coman sangre alguna[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez subraya la prohibición con un matiz equivalente a «ninguna sangre» o «sangre alguna»; aquí se expresa de forma natural en español con «sangre alguna».
    reason: lexical_alternative
lexical_decisions:
- source_word: ለርኩሳን
  english_pob_choice: to unclean things
  chosen_spanish: a cosas impuras
  alternatives_spanish:
  - a lo impuro
  - a cosas inmundas
  - a cosas contaminadas
  lexicon: רְקִיע? / Ge'ez ርኩስ (impuro, inmundo)
  rationale: El comienzo del texto ge'ez añade explícitamente la idea de impureza antes de las imágenes; por eso la traducción española debe conservar ese primer objeto directo/preposicional. 'Cosas impuras' comunica el valor genérico y no introduce un término más técnico de lo que permite la fuente.
- source_word: ወድኅሬሆሙ ለገሊፎ
  english_pob_choice: or after carved images
  chosen_spanish: o tras imágenes talladas
  alternatives_spanish:
  - o después de imágenes talladas
  - o tras ídolos tallados
  - o después de figuras talladas
  lexicon: Ge'ez ገሊፎ (tallado, esculpido)
  rationale: '''Tras'' conserva bien la relación de seguimiento/adhesión del original y suena natural en español bíblico contemporáneo. ''Imágenes talladas'' mantiene la referencia material sin añadir ''ídolos'' donde el texto no lo dice de forma explícita.'
- source_word: ወድኅሬሆሙ ለስብክ
  english_pob_choice: or after molten images
  chosen_spanish: o tras imágenes fundidas
  alternatives_spanish:
  - o tras imágenes moldeadas
  - o después de imágenes fundidas
  - o tras ídolos fundidos
  lexicon: Ge'ez ስብክ (fundido, vaciado, moldeado)
  rationale: '''Imágenes fundidas'' sigue de cerca el contraste con ''talladas'' y conserva la fuerza material del término. ''Moldeadas'' sería posible, pero ''fundidas'' refleja mejor el campo semántico de metal vaciado o fundido.'
- source_word: ወኢትብልዑ
  english_pob_choice: And do not eat blood
  chosen_spanish: Y no coman sangre
  alternatives_spanish:
  - Y no coman ninguna sangre
  - Y no coman la sangre
  - Y no coman sangre alguna
  lexicon: Ge'ez ኢትብልዑ (no comáis / no coman)
  rationale: La forma española mantiene el mandato prohibitivo con naturalidad y respeta la revisión inglesa que simplificó 'any blood' a 'blood'. 'Sangre' por sí sola puede funcionar como prohibición genérica en español y evita forzar una redundancia.
theological_decisions:
- issue: La inclusión inicial de 'cosas impuras' junto con las imágenes talladas y fundidas
  english_pob_reading: to unclean things, or after carved images, or after molten images.
  chosen_spanish_reading: a cosas impuras, o tras imágenes talladas, o tras imágenes fundidas.
  alternative_spanish_readings:
  - a lo impuro, o tras imágenes talladas, o tras imágenes fundidas
  - a cosas inmundas, o tras imágenes talladas, o tras imágenes fundidas
  rationale: La auditoría de la fuente ge'ez muestra una primera cláusula omitida en la versión inglesa anterior. La lectura española la conserva sin suavizarla hacia una formulación interpretativa. No se convierte en una sola prohibición general porque el texto enumera categorías distintas.
  doctrine_reference: Pureza ritual / prohibición de idolatría en la tradición de la sección
- issue: El valor de 'sangre' como prohibición absoluta o genérica
  english_pob_reading: And do not eat blood
  chosen_spanish_reading: Y no coman sangre
  alternative_spanish_readings:
  - Y no coman ninguna sangre
  - Y no coman sangre alguna
  rationale: La revisión reciente del inglés eliminó 'any' como innecesario, pero el control del ge'ez indicó que la idea cuantificadora de 'ninguna' sí está presente. En español, sin embargo, 'no coman sangre' ya expresa una prohibición general y evita sobrecargar el verso con una cuantificación que el uso bíblico español puede asumir. Se conserva así la norma sin perder su alcance.
  doctrine_reference: Prohibición de consumir sangre
translation_notes:
  revision_awareness: 'La versión inglesa pasó por una corrección importante: se restauró la cláusula inicial ''to unclean things'' omitida antes, y se discutió si ''any blood'' debía mantenerse o simplificarse. La presente redacción española sigue la fuente ge''ez y la auditoría inglesa, conservando la triple enumeración sobre impureza/imágenes y la prohibición final de sangre.'
  spanish_consistency_notes:
  - Se mantiene 'imágenes talladas' y 'imágenes fundidas' para conservar el paralelismo material del original.
  - Se usa 'tras' para reproducir la idea de seguir o adherirse a esas prácticas.
  - No se introduce 'ídolos' en el texto principal porque la fuente enumera tipos de imágenes y el contexto no obliga a explicitar esa equivalencia.
  - Se adopta 'sangre' sin artículo para una prohibición general, en línea con la revisión inglesa y la naturalidad del español bíblico.
