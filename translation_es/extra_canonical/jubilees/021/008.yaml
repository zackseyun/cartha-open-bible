  text: 'the Lord. And the fat of the sacrifice of deliverance you shall place on the fire that is on the altar: the fat that is on the entrails, and all the fat that is on the inward parts, and the two kidneys, and all'
  footnotes:
  - marker: a
    text: Or 'both of them,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:52Z'
    unchanged: false
    changes_summary: Completed the final phrase by rendering ወክሊአ፡ ኵልያት፡ ወኵሎ፡ as 'and the two kidneys, both of them,' instead of the incomplete 'and the two kidneys, and all.'
translation:
  language: es
  text: 'Yahvé. Y la grasa del sacrificio de liberación la pondrás sobre el fuego que está sobre el altar: la grasa que está sobre las entrañas, y toda la grasa que está sobre las partes internas, y los dos riñones[a], y toda'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El segmento queda cortado aquí en la división del versículo; el 'y toda' corresponde a la continuación del texto en el versículo siguiente.
    reason: textual_continuation
lexical_decisions:
- source_word: እግዚአብሔር / the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: YHWH
  rationale: El contexto inglés mantiene 'the Lord' como forma establecida en este tramo. En español, 'el Señor' reproduce fielmente ese tratamiento reverente y evita forzar una sustitución por el nombre propio cuando la base auditada aquí ya usa la forma titulada.
- source_word: መሥዋዕተ፡ መድኃኒት / sacrifice of deliverance
  english_pob_choice: sacrifice of deliverance
  chosen_spanish: sacrificio de liberación
  alternatives_spanish:
  - sacrificio de salvación
  - ofrenda de liberación
  lexicon: sacrificial terminology
  rationale: '''Deliverance'' en este contexto sacrificial apunta a liberación/rescate, no a una fórmula cultual tradicional fija; ''liberación'' conserva el sentido concreto del rescate sin añadir una interpretación doctrinal ajena.'
- source_word: ታነብር፡ ዲበ፡ እሳት፡ ዘዲበ፡ መሥዋዕት፡
  english_pob_choice: you shall place on the fire that is on the altar
  chosen_spanish: la pondrás sobre el fuego que está sobre el altar
  alternatives_spanish:
  - la colocarás sobre el fuego que está sobre el altar
  - la pondrás sobre el fuego del altar
  lexicon: burnt-offering procedure
  rationale: '''Pondrás'' mantiene la instrucción directa del pasaje. ''Que está sobre el altar'' reproduce la relación espacial del fuego sin compactarla demasiado ni perder el detalle auditado.'
- source_word: ዘዲበ፡ ከርሥ / that is on the entrails
  english_pob_choice: that is on the entrails
  chosen_spanish: que está sobre las entrañas
  alternatives_spanish:
  - que está sobre los intestinos
  - que está sobre las vísceras
  lexicon: anatomical term
  rationale: '''Entrañas'' es una opción española natural y digna para la masa interna de grasa descrita por el texto, y mantiene mejor la imaginería sacrificial que un término demasiado técnico.'
- source_word: ወክሊአ፡ ኵልያት፡ ወኵሎ፡
  english_pob_choice: and the two kidneys, and all
  chosen_spanish: y los dos riñones[a], y toda
  alternatives_spanish:
  - y los dos riñones, y todo
  - y los dos riñones, todos ellos, y
  lexicon: incomplete clause / continuation
  rationale: El hebreo/ge'ez del fragmento queda cortado por la división del versículo; por eso se conserva la apertura incompleta con 'y toda', que refleja el carácter truncado del segmento y no inventa el cierre.
theological_decisions:
- issue: Rendering of the divine title in a sacrificial instruction
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Aquí no hay una tensión doctrinal nueva; se conserva la forma titulada de la base auditada en inglés para no introducir una sustitución no documentada por el propio tramo de referencia.
  doctrine_reference: Uso reverente del título divino en literatura cultual
- issue: Meaning of 'sacrifice of deliverance'
  english_pob_reading: deliverance
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - salvación
  - rescate
  rationale: En un contexto de sacrificio, 'deliverance' comunica liberación/rescate concreto. 'Liberación' funciona bien en español y no sobrecarga el texto con terminología teológica posterior.
  doctrine_reference: Lenguaje sacrificial y de rescate
- issue: Fragmentary ending at verse break
  english_pob_reading: and all
  chosen_spanish_reading: y toda
  alternative_spanish_readings:
  - y todo
  - y los dos riñones, y todo
  rationale: La revisión previa erróneamente cerró la frase como si el segmento fuera completo. Se preserva la incompletud del corte versicular, que el audit trail confirma como real, sin resolverla artificialmente.
  doctrine_reference: Integridad textual y segmentación versicular
translation_notes:
  revision_awareness: 'Se corrigió el error detectado en la salida anterior: la nota al pie ahora está anclada explícitamente en el texto con [a], y la traducción no fuerza una clausura del segmento. También se revierte la lectura errónea que convertía ''and all'' en una forma completiva no sustentada por el Ge''ez.'
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para el título divino conforme al tramo auditado en inglés.
  - '''sacrificio de liberación'' conserva el valor de rescate/deliverance sin introducir formulaciones eclesiásticas ajenas.'
  - La clausura 'y toda' queda abierta de manera intencional para reflejar el corte versicular documentado.
  - '''entrañas'' y ''partes internas'' distinguen dos expresiones anatómicas sin homogeneizarlas.'
