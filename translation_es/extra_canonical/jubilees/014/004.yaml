  text: 'sino el que saldrá de tu propio cuerpo te heredará». Y lo llevó afuera y le dijo: «Mira»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘይወፅእ
  english_pob_choice: the one who comes out
  chosen_spanish: el que saldrá
  alternatives_spanish:
  - el que sale
  - el que saldrá de
  lexicon: salir
  rationale: El ge'ez presenta una acción de salida/procedencia; en español, «saldrá» conserva el sentido de procedencia futura del heredero en el contexto de la promesa. «Saldrá de» queda implícito en la frase siguiente para evitar una repetición torpe.
- source_word: እምከርሥከ
  english_pob_choice: from your own body
  chosen_spanish: de tu propio cuerpo
  alternatives_spanish:
  - de tu entraña
  - de tu propia carne
  - de tu linaje
  lexicon: cuerpo
  rationale: La expresión marca origen físico directo. «Cuerpo» es transparente y fiel en español moderno; «entraña» o «carne» podrían sonar más idiomáticos en registros bíblicos, pero aquí «cuerpo» comunica con claridad el parentesco corporal sin añadir matices no asegurados por el texto.
- source_word: ይወርሰከ
  english_pob_choice: he will inherit you
  chosen_spanish: te heredará
  alternatives_spanish:
  - heredará de ti
  - recibirá tu herencia
  lexicon: heredar
  rationale: Conservo la dureza literal del verbo de herencia. En español, «te heredará» mantiene el objeto directo personal del original y la promesa de sucesión. Otras formas suavizan la construcción y pierden la fuerza inusual del giro.
- source_word: ወአውፅኦ አፍአ
  english_pob_choice: And he brought him outside
  chosen_spanish: Y lo sacó fuera
  alternatives_spanish:
  - Y lo llevó fuera
  - Y lo hizo salir afuera
  lexicon: sacar
  rationale: La secuencia verbal indica acción de conducir hacia fuera. «Lo sacó fuera» es natural y fiel; evita sobreinterpretar el matiz de acompañamiento que tendría «lo llevó fuera».
- source_word: ወይቤሎ
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y le respondió
  lexicon: decir
  rationale: Equivalente directo y suficientemente preciso para la fórmula narrativa.
- source_word: ነጽር
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Observa
  - Mira, pues
  lexicon: ver
  rationale: Imperativo breve y natural en español. «Mira» reproduce la invitación inmediata a contemplar lo señalado, sin cargarlo de solemnidad añadida.
theological_decisions:
- issue: Promesa de herencia vinculada a descendencia corporal
  english_pob_reading: the one who comes out from your own body—he will inherit you
  chosen_spanish_reading: el que saldrá de tu propio cuerpo te heredará
  alternative_spanish_readings:
  - el que saldrá de tu propio cuerpo recibirá tu herencia
  - el que provenga de ti será tu heredero
  rationale: El texto presenta una promesa de sucesión por descendencia física. La forma elegida conserva tanto el origen corporal como el verbo de herencia, sin diluir la relación directa entre ambos elementos.
  doctrine_reference: Gn 15:4; lenguaje de promesa y herencia patriarcal
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ningún cambio requerido en la revisión más reciente; por eso se mantiene una solución directa, con mínima intervención interpretativa y sin notas textuales añadidas.
  spanish_consistency_notes:
  - Se mantiene «heredar» para conservar el valor hereditaria/sucesorio del verbo.
  - Se usa «cuerpo» en sentido físico directo, no como metáfora doctrinal.
  - La frase final queda en imperativo breve («Mira») conforme al contexto narrativo de la cita.
