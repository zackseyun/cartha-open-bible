    issue: 'Inicio español incompleto o demasiado calcado: «todo esto, y derramó...»'
    rationale: El ge'ez/inglés presupone un verbo de acción sobre «all these»; en español, dejar «todo esto» suelto antes de «y derramó» produce una frase torpe y semánticamente incompleta.
  - severity: medium
    issue: «su sangre» es ambiguo en español
    rationale: Después de una referencia plural implícita a víctimas sacrificiales, el posesivo singular puede sonar discordante o referirse al sujeto equivocado. «La sangre de ellos» o una reestructuración elimina la ambigüedad sin alterar el sentido.
  - severity: low
    issue: «los puso» es menos preciso que «los colocó»
    rationale: No es incorrecto, pero «colocó» refleja mejor una disposición ritual deliberada y mantiene un tono más cuidado.
