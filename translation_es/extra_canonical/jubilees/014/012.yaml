translation:
  language: es
  text: Tomó todos estos animales, derramó la sangre de ellos sobre el altar, los dividió por la mitad y los colocó uno frente al otro, cara a cara; pero no dividió las aves. Y las aves descendieron sobre los trozos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ደሞሙ
  english_pob_choice: poured out their blood
  chosen_spanish: derramó su sangre
  alternatives_spanish:
  - vertió su sangre
  - derramó la sangre de ellos
  lexicon: Geez ደመ / ደም
  rationale: La imagen sacrificial del verbo exige un verbo directo y natural en español; «derramó su sangre» conserva el sentido ritual sin añadir explicación. Mantengo el posesivo singular implícito del sujeto colectivo tal como en el inglés POB.
- source_word: ውስተ፡ ምሥዋዕ፡
  english_pob_choice: upon the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: Geez ምሥዋዕ
  rationale: «Sobre el altar» reproduce la relación espacial del original y coincide con el registro sacrificial del pasaje; «en el altar» sería posible, pero menos transparente visualmente.
- source_word: ወ*ነፈቆሙ፡ እማእከል፡
  english_pob_choice: and divided them in the middle
  chosen_spanish: y los dividió por la mitad
  alternatives_spanish:
  - y los partió en medio
  - y los dividió en el centro
  lexicon: Geez ነፈቀ
  rationale: El gesto ritual se expresa con claridad en español con «dividió por la mitad»; mantiene la idea de separación simétrica sin sobreinterpretar la mecánica exacta.
- source_word: ወ*አንበሮሙ፡ *አንጻራቲሆሙ፡ በበገጾሙ፡
  english_pob_choice: and placed them opposite one another, face to face
  chosen_spanish: y los puso uno frente al otro, cara a cara
  alternatives_spanish:
  - y los colocó uno enfrente del otro, cara a cara
  - y los puso frente a frente
  lexicon: Geez አንበረ / አንጻር
  rationale: 'La doble expresión del original se conserva con dos giros españoles equivalentes: «uno frente al otro» y «cara a cara», para retener la intensificación semítica sin sonar rígido.'
- source_word: ወለዐዋፊሰ፡ ኢ*ነተፈ።
  english_pob_choice: but the birds he did not divide
  chosen_spanish: pero no dividió las aves
  alternatives_spanish:
  - pero a las aves no las dividió
  - pero no partió las aves
  lexicon: Geez ወለዐዋፊስ / ነተፈ
  rationale: «Aves» evita una repetición pesada de «pájaros» y mantiene el contraste sacrificial; el verbo «dividir» enlaza con la cláusula anterior y preserva el paralelismo del texto.
- source_word: ወይወርዱ፡ አዕዋፍ፡ ዲበ፡ ክፍሉ፡
  english_pob_choice: And birds came down upon the pieces
  chosen_spanish: Y las aves descendieron sobre los trozos
  alternatives_spanish:
  - Y las aves bajaron sobre los trozos
  - Y las aves se abatieron sobre las partes
  lexicon: Geez ወይወርዱ / ክፍል
  rationale: «Descendieron» conserva el movimiento del original con un registro bíblico claro; «trozos» expresa bien las porciones sacrificadas sin una paréntesis explicativa innecesaria.
theological_decisions:
- issue: Descripción del rito sacrificial con sangre, división del animal y aves que descienden sobre los trozos
  english_pob_reading: all these... poured out their blood upon the altar... but the birds he did not divide. And birds came down upon the pieces
  chosen_spanish_reading: todo esto... derramó su sangre sobre el altar... pero no dividió las aves. Y las aves descendieron sobre los trozos
  alternative_spanish_readings:
  - '... derramó su sangre en el altar...'
  - '... las aves bajaron sobre las partes...'
  rationale: No se suaviza ni alegoriza el rito; la traducción conserva la secuencia ceremonial y la tensión visual del pasaje, tal como el inglés POB la presenta sin expansión interpretativa.
  doctrine_reference: Génesis 15:10-11; Hebreos 9:19-22
translation_notes:
  revision_awareness: El texto griego/etíope disponible y el POB inglés de referencia concuerdan estrechamente; no se observan cambios revisionales en el pasaje proporcionado, y la versión española sigue esa lectura sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «altar» como término cultual estable.
  - Se evita el calco duro de la sintaxis semítica cuando el español permite una expresión natural sin pérdida de contenido.
  - «Aves» se usa de manera uniforme para birds en este versículo, en consonancia con el registro narrativo-sacrificial.
