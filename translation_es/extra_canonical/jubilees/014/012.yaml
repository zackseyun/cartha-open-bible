  revision_rationale: Se repara el arranque sintácticamente defectuoso del borrador, se aclara la referencia de «sangre» evitando ambigüedad pronominal, y se eleva levemente la precisión estilística con «colocó». El resto del contenido se conserva fiel al sentido del original y al audit trail inglés.
