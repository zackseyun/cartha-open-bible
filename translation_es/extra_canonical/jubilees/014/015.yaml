    changes_summary: Changed 'will be enslaved' to 'are enslaved' for more natural and accurate rendering of the relative clause; retained the rest as faithful and formal.
translation:
  language: es
  text: Y también juzgaré a la nación a la cual están esclavizados, y después de esto saldrán de allí con mucho [a]rebaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa de sentido: “posesiones” o “bienes”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወለሕዝብ፡ኒ፡
  english_pob_choice: And I will also judge the nation
  chosen_spanish: Y también juzgaré a la nación
  alternatives_spanish:
  - Y juzgaré también a la nación
  - Pero también juzgaré a la nación
  lexicon: Jubilees 14:15; Ge'ez enclitic ኒ = also
  rationale: El enclítico ge'ez ኒ añade la idea de 'también'; por eso se conserva explícitamente con 'también' en lugar de omitirla.
- source_word: ይትቀነዩ
  english_pob_choice: they are enslaved
  chosen_spanish: están esclavizados
  alternatives_spanish:
  - serán esclavizados
  - están en esclavitud
  lexicon: Jubilees 14:15; verbo de sujeción/servicio en contexto de esclavitud
  rationale: La forma verbal en el contexto profético admite una lectura futura, pero aquí se mantiene una relativa más natural en español con valor de estado presente ('están esclavizados'), siguiendo la revisión inglesa reciente y la relación relativa 'a la cual'.
- source_word: ጥሪት፡ ብዙኅ
  english_pob_choice: much property
  chosen_spanish: mucho [a]rebaño
  alternatives_spanish:
  - muchas posesiones
  - muchos bienes
  lexicon: Jubilees 14:15; ጥሪት = property, possessions, wealth
  rationale: El término ge'ez designa 'posesiones/bienes'; en español 'rebaño' no sería adecuado aquí. Para una lectura fiel y publicable se adopta 'posesiones/bienes', manteniendo el sentido patrimonial del texto.
theological_decisions:
- issue: Tiempo verbal de la esclavitud en la cláusula relativa
  english_pob_reading: to whom they are enslaved
  chosen_spanish_reading: a la cual están esclavizados
  alternative_spanish_readings:
  - a la cual serán esclavizados
  - a la cual están en esclavitud
  rationale: Se conserva una relativa con estado actual por fluidez en español, sin borrar que el contexto es profético. La alternativa futura también sería defendible por el valor profético del imperfecto ge'ez.
  doctrine_reference: No doctrinal issue; temporal aspect of prophecy
translation_notes:
  revision_awareness: La revisión inglesa más reciente recuperó 'also' y volvió al futuro profético ('will be enslaved'), pero el contexto ge'ez también permite una relativa más natural en español; se conserva la marca de 'también' y se ajusta la cláusula para lectura fluida. Se evitó una transliteración mecánica de 'property' y se corrigió la imagen patrimonial a un equivalente español semánticamente válido.
  spanish_consistency_notes:
  - Se traduce יהוה como Yahvé solo cuando aparezca; aquí no aparece.
  - Se mantiene 'esclavizados' para el campo semántico de δοῦλος/servicio forzado en contexto narrativo-profético.
  - '''Propiedad'' en inglés se entiende aquí como bienes/posesiones; en español se prefirió el término patrimonial natural.'
