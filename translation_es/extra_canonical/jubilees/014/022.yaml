translation:
  language: es
  text: Y en este día hicimos el pacto con Abram[14:22], así como lo habíamos hecho en este mes con Noé; y Abram lo renovó como fiesta y como ordenanza para sí mismo para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '14:22'
    text: La primera persona plural («hicimos el pacto») refleja el marco de mediación celestial de Jubileos. Probablemente habla el narrador angélico dentro de la revelación a Moisés.
    reason: cross_reference
lexical_decisions:
- source_word: ተካየድነ ኪዳነ
  english_pob_choice: we made the covenant
  chosen_spanish: hicimos el pacto
  alternatives_spanish:
  - concertamos el pacto
  - establecimos el pacto
  lexicon: קִיּוּם / diathēkē (concepto de pacto; en Ge'ez, ኪዳን)
  rationale: «Pacto» conserva el valor bíblico-jurídico del término mejor que «alianza» en este contexto y evita una lectura meramente diplomática. «Hicimos» reproduce la primera persona plural del texto y el marco narrativo celeste reflejado por el inglés POB.
- source_word: ተካየድነ ... ምስለ፡ ኖኅ፡ ወአብራም
  english_pob_choice: we made it in this month with Noah; and Abram renewed it
  chosen_spanish: lo habíamos hecho en este mes con Noé; y Abram lo renovó
  alternatives_spanish:
  - lo habíamos establecido en este mes con Noé; y Abram lo renovó
  - lo habíamos concertado en este mes con Noé; y Abram lo volvió a confirmar
  lexicon: verbal aspect / reference continuity in the covenant clause
  rationale: «Lo habíamos hecho» mantiene la referencia al pacto ya mencionado sin añadir contenido ajeno. «Renovó» traduce bien la idea de reafirmación del pacto; «volver a confirmar» sería más explicativo que textual.
- source_word: በበዓል፡ ወለሥርዓት
  english_pob_choice: as a festival and as an ordinance
  chosen_spanish: como fiesta y como ordenanza
  alternatives_spanish:
  - como celebración y como ordenanza
  - como festividad y como estatuto
  lexicon: heb. מוֹעֵד / חֹק (fiesta, ordenanza/estatuto)
  rationale: «Fiesta» conserva la dimensión de calendario sagrado; «ordenanza» mantiene la fuerza normativa. «Estatuto» es posible, pero «ordenanza» es más natural en español bíblico y sigue siendo jurídico.
- source_word: ሎቱ እስከ ለዓለም
  english_pob_choice: for himself forever
  chosen_spanish: para sí para siempre
  alternatives_spanish:
  - para él para siempre
  - para sí por siempre
  lexicon: לְעוֹלָם / perpetuity language
  rationale: «Para sí» refleja el dativo/reflexivo del ge'ez sin sobreexplicar. «Para siempre» comunica la duración permanente con naturalidad en español.
theological_decisions:
- issue: Voz plural celestial en la institución del pacto
  english_pob_reading: The first-person plural ('we made the covenant') reflects Jubilees' heavenly mediation framework. It is likely the angelic narrator speaking within the revelation to Moses.
  chosen_spanish_reading: Mantenemos «hicimos» en primera persona plural para conservar el marco de mediación celestial propio de Jubileos.
  alternative_spanish_readings:
  - se hizo el pacto
  - Dios hizo el pacto
  rationale: Eliminar el plural borraría una tensión narrativa y teológica documentada por el POB en inglés. La traducción debe conservar la voz del texto, no normalizarla.
  doctrine_reference: Jubilees heavenly mediation framework / narración angélica revelatoria
- issue: Renovación del pacto como institución festiva y normativa
  english_pob_reading: Abram renewed it as a festival and as an ordinance for himself forever.
  chosen_spanish_reading: Abram lo renovó como fiesta y como ordenanza para sí para siempre.
  alternative_spanish_readings:
  - Abram lo estableció como fiesta y como estatuto perpetuo para sí
  - Abram lo confirmó como celebración y precepto permanente
  rationale: La formulación conserva simultáneamente el aspecto litúrgico y el normativo del pasaje sin absorberlo en un solo concepto. «Ordenanza» mantiene la fuerza de mandato, y la doble expresión evita perder la tensión del original.
  doctrine_reference: Memorial litúrgico y norma pactal en Jubileos
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no hubo cambios necesarios según el control de revisión y el acuerdo alto entre evaluadores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; en este versículo no aparece el nombre divino en forma directa.
  - «Pacto» se conserva de manera consistente para ኪዳን/diathēkē en este contexto.
  - «Ordenanza» se mantiene para el componente normativo, evitando sustituirlo por una paráfrasis menos precisa.
  - El pronombre «lo» conserva la referencia al pacto sin repetir innecesariamente el sustantivo.
