    text: Or 'to Abram as a wife'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:08Z'
    unchanged: false
    changes_summary: Added the omitted subject 'Sarah took' at the beginning to account for the source text and make the sentence complete and natural. No other changes needed.
translation:
  language: es
  text: Sara tomó a Agar, su esclava egipcia, y se la dio a Abram, su marido, como esposa[a]. Y él se llegó a ella, y ella concibió y dio a luz un hijo, y le puso por nombre Ismael, en el quinto año de esta semana; y ese año fue el año ochenta y seis de la vida de Abram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se la dio a Abram como esposa».'
    reason: alternative_rendering_preserved_from_english_audit
lexical_decisions:
- source_word: ሶራ
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sará
  lexicon: PN
  rationale: El nombre propio se adapta a la forma castellana usual y reconocible, sin cambiar la identidad del personaje.
- source_word: ለአጋር፡ ለአአታ፡ ግብጻዊት፡
  english_pob_choice: Hagar, her maidservant, the Egyptian
  chosen_spanish: Agar, su esclava egipcia
  alternatives_spanish:
  - Agar, su sirvienta egipcia
  - Agar, su criada egipcia
  lexicon: δουλος/servile status; ethnonym
  rationale: '''አአታ'' señala condición servil; ''esclava'' conserva la fuerza léxica que la POB suele mantener para este tipo de relación. ''Egipcia'' traduce el etnónimo sin suavizarlo.'
- source_word: ለምታ፡ ትኩኖ፡ ብእሲተ።
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - para esposa
  - por esposa
  lexicon: marital relation
  rationale: El ge'ez añade 'su marido' en la revisión y luego 'como esposa'; en español, 'como esposa' conserva la construcción relacional sin forzar una fórmula jurídica más pesada.
- source_word: ወቦአ፡ ኀቤሃ፡
  english_pob_choice: And he went in to her
  chosen_spanish: Y él se llegó a ella
  alternatives_spanish:
  - Y entró a ella
  - Y estuvo con ella
  lexicon: euphemistic sexual intercourse
  rationale: La expresión hebrea/gé'ez equivalente usa un eufemismo sexual tradicional; 'se llegó a ella' es bíblico, claro y preserva la modestia del original sin perder el sentido.
- source_word: ወፀንሰት፡ ወወለደት፡
  english_pob_choice: she conceived and bore a son
  chosen_spanish: ella concibió y dio a luz un hijo
  alternatives_spanish:
  - concibió y parió un hijo
  - quedó encinta y dio a luz un hijo
  lexicon: reproductive sequence
  rationale: '''Concibió y dio a luz'' reproduce con sobriedad la secuencia de concepción y parto, evitando coloquialismos.'
- source_word: ወጸውዐ፡ ስሞ፡ ይስማዔል፡
  english_pob_choice: he called his name Ishmael
  chosen_spanish: llamó su nombre Ismael
  alternatives_spanish:
  - le puso por nombre Ismael
  - puso su nombre Ismael
  lexicon: naming formula
  rationale: '''Llamó su nombre'' conserva la fórmula semítica tradicional, aún natural en español bíblico, y sigue de cerca el valor del original.'
- source_word: በዓመተ፡ ኃምስ፡ ዘዘሰብዐ፡
  english_pob_choice: in the fifth year of this week
  chosen_spanish: en el quinto año de esta semana
  alternatives_spanish:
  - en el quinto año de esta semana de años
  - en el quinto año de este período
  lexicon: calendaric term
  rationale: '''Semana'' traduce el esquema calendárico de Jubileos de manera directa; aquí no se amplía con explicación para no sobrecargar el verso.'
- source_word: ወውእቱ፡ ዓመት፡ ሰማንያ፡ ወስድስቱ፡ ዓም፡ በሕይወተ፡ አብራም።
  english_pob_choice: and that year was the eighty-sixth year in Abram’s life
  chosen_spanish: y ese año fue el año ochenta y seis de la vida de Abram
  alternatives_spanish:
  - y ese año fue el año ochenta y seis de la vida de Abram
  - y ese fue el año ochenta y seis de la vida de Abram
  lexicon: age formula
  rationale: La construcción mantiene la referencia cronológica exacta y la fuerza contable del original, con un español claro y idiomático.
theological_decisions:
- issue: 'Relación de Agar con Abram: ''wife'' sin borrar la condición de Agar'
  english_pob_reading: gave her to Abram her husband as a wife
  chosen_spanish_reading: se la dio a Abram, su marido, como esposa
  alternative_spanish_readings:
  - se la dio a Abram como esposa
  - se la dio a Abram, su marido, por esposa
  rationale: La revisión del audit trail añade 'her husband'; el español conserva tanto la relación matrimonial de Abram con Sara como la función de Agar como esposa dada, sin suprimir la tensión del pasaje.
  doctrine_reference: Génesis 16:3; Jubileos 14:24
- issue: Eufemismo sexual explícito pero reverente
  english_pob_reading: And he went in to her
  chosen_spanish_reading: Y él se llegó a ella
  alternative_spanish_readings:
  - Y entró a ella
  - Y tuvo relaciones con ella
  rationale: Se conserva el eufemismo bíblico tradicional para no reducir el tono del texto ni hacerlo demasiado moderno o crudo.
  doctrine_reference: Génesis 16:4; Rut 4:13
- issue: 'Cronología de Jubileos: ''week'' como unidad técnica'
  english_pob_reading: in the fifth year of this week
  chosen_spanish_reading: en el quinto año de esta semana
  alternative_spanish_readings:
  - en el quinto año de esta semana de años
  - en el quinto año de este período
  rationale: Se mantiene la terminología técnica del libro de Jubileos; 'semana' no se sustituye por una paráfrasis para no ocultar el sistema cronológico del texto.
  doctrine_reference: Jubileos 1:1; 6:30
translation_notes:
  revision_awareness: El inglés auditado corrigió primero la omisión de 'Sarah took' y luego precisó 'her husband' en la clausula matrimonial. La versión española incorpora ambas correcciones de la revisión más reciente, manteniendo la secuencia narrativa y la relación matrimonial explícita en el texto fuente. No se detectaron variantes textuales mayores adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto cuando el texto lo exija; aquí no aparece.
  - '''Sara'' e ''Ismael'' siguen la forma española estándar de nombres bíblicos.'
  - '''esclava'' se mantiene por la fuerza léxica del original y la práctica POB; no se suaviza a ''sirvienta''.'
  - '''se llegó a ella'' preserva el eufemismo sexual bíblico sin perder inteligibilidad.'
  - '''esta semana'' refleja la unidad calendárica técnica de Jubileos y no una semana literal de siete días si el contexto amplia el sentido.'
