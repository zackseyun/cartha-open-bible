  yaml_path: translation/extra_canonical/jubilees/014/024.yaml
  text: Sarah took Hagar, her maidservant, the Egyptian, and gave her to Abram her husband as a wife. And he went in to her, and she conceived and bore a son, and he called his name Ishmael, in the fifth year of this week; and that year was the eighty-sixth year in Abram’s life.
  footnotes:
