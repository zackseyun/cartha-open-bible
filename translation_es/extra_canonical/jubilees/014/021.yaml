    rationale: Aunque semánticamente cercano, 'pedazos' suena demasiado coloquial en español neutral y no transmite bien el registro sacrificial del pasaje. 'Las partes' o 'las piezas' es más fiel al tono y al contexto cultual.
  - severity: low
