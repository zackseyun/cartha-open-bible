base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/014/021.yaml
  text: And that day passed, and Abram offered up the pieces and the birds and their grain offerings and their drink offerings, and fire consumed them.
  footnotes:
  - marker: a
    text: Or 'their sacrifices'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:06Z'
    unchanged: false
    changes_summary: Changed 'grain offerings' to 'sacrifices' to more broadly reflect the source term and avoid over-specification; retained the rest as accurate and natural.
translation:
  language: es
  text: Y pasó aquel día, y Abram ofreció las partes y las aves, y sus ofrendas de grano[a] y sus libaciones, y el fuego las consumió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “sus sacrificios”, pero en este contexto cultual la expresión apunta con más precisión a ofrendas de grano.
    reason: alternative_reading
lexical_decisions:
- source_word: ወኀለፈ፡ ይእቲ፡ ዕለት፡
  english_pob_choice: And that day passed
  chosen_spanish: Y pasó aquel día
  alternatives_spanish:
  - Y aquel día pasó
  - Y transcurrió aquel día
  lexicon: source narrative perfective
  rationale: Mantiene el avance narrativo simple y natural en español, sin añadir matices inexistentes. 'Pasó' conserva la secuencia temporal del original.
- source_word: አብራም፡
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: proper name
  rationale: Se conserva la forma histórica 'Abram', que corresponde al nombre en este tramo narrativo y evita normalizar prematuramente a 'Abrahán'.
- source_word: ክፍላተ፡ ወአዕዋፈ፡
  english_pob_choice: the pieces and the birds
  chosen_spanish: los pedazos y las aves
  alternatives_spanish:
  - las piezas y las aves
  - los trozos y las aves
  lexicon: cultic offering imagery
  rationale: '''Pedazos'' comunica bien la división física del sacrificio en español y mantiene el paralelismo con ''aves'' sin introducir un término demasiado técnico.'
- source_word: ወመሥዋዕቶሙ፡
  english_pob_choice: and their grain offerings
  chosen_spanish: y sus ofrendas de grano
  alternatives_spanish:
  - y sus ofrendas de cereal
  - y sus ofrendas
  lexicon: minḥah / grain offering
  rationale: La revisión inglesa mostró la tensión entre una lectura amplia ('sacrifices') y la precisión cultual; en español 'ofrendas de grano' preserva la oferta cereal/meal-offering sin convertirla en un genérico vacío. 'De cereal' es posible, pero 'grano' es más transparente.
- source_word: ወሞጻሕቶሙ፡
  english_pob_choice: and their drink offerings
  chosen_spanish: y sus libaciones
  alternatives_spanish:
  - y sus ofrendas líquidas
  - y sus bebidas rituales
  lexicon: drink offering
  rationale: '''Libaciones'' es el equivalente cultual preciso y reconocido en español para ofrendas de líquido derramado.'
- source_word: ወበልዐቶሙ፡ እሳት።
  english_pob_choice: and fire consumed them
  chosen_spanish: y el fuego los consumió
  alternatives_spanish:
  - y el fuego los devoró
  - y el fuego los devoró por completo
  lexicon: divine fire
  rationale: '''Consumió'' reproduce el acto total del fuego sobre las ofrendas con un registro bíblico claro y evita sobreexplicar la acción.'
theological_decisions:
- issue: Lectura cultual de መሥዋዕት junto con ሞጻሕት
  english_pob_reading: their grain offerings and their drink offerings
  chosen_spanish_reading: sus ofrendas de grano y sus libaciones
  alternative_spanish_readings:
  - sus sacrificios y sus libaciones
  - sus ofrendas y sus libaciones
  rationale: 'Sigo la revisión crítica que restablece la precisión cultual: el término no debe diluirse en ''sacrificios'' porque el contexto distingue una ofrenda de grano/meal offering junto con la libación. En español, ''ofrendas de grano'' conserva esa distinción sin forzar una terminología arcaica.'
  doctrine_reference: Cultic terminology / sacrificial sequence in Jubilees 14:21
- issue: El fuego como agente de aceptación/consumo
  english_pob_reading: and fire consumed them
  chosen_spanish_reading: y el fuego los consumió
  alternative_spanish_readings:
  - y fuego los consumió
  - y el fuego los devoró
  rationale: No se añade un sujeto divino explícito; el texto presenta simplemente el fuego como agente consumador. 'Consumió' mantiene la ambigüedad narrativa del original.
  doctrine_reference: Narrative description of sacrificial consumption
translation_notes:
  revision_awareness: La versión inglesa atravesó una revisión que cambió 'grain offerings' por 'sacrifices', pero la revisión posterior revirtió esa decisión por razones de precisión cultual. La redacción española sigue esa lectura más específica y evita la generalización que borraría la distinción entre la ofrenda de grano y las libaciones.
  spanish_consistency_notes:
  - Se mantiene 'Abram' conforme al nombre del relato.
  - Se usa 'Yahvé' no requerido en este versículo porque el texto no contiene el Tetragrámaton ni una referencia directa al nombre divino.
  - '''Libaciones'' se conserva como término técnico reconocible y consistente con traducciones bíblicas en español.'
  - '''Ofrendas de grano'' se eligió para reflejar la precisión cultual sin depender de ''cereal'' o ''harina'', que sonarían más específicos de lo que el contexto exige.'
