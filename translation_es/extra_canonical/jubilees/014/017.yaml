translation:
  language: es
  text: Y en la cuarta generación ellos volverán aquí, porque el pecado de los amorreos no se ha completado[a] hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''todavía no se ha completado hasta ahora''.'
    reason: Preserva la alternativa documentada por el inglés POB de forma más natural en español.
lexical_decisions:
- source_word: וְבַדּוֹר
  english_pob_choice: in the fourth generation
  chosen_spanish: en la cuarta generación
  alternatives_spanish:
  - para la cuarta generación
  - durante la cuarta generación
  lexicon: dōr / generación
  rationale: La expresión temporal natural en español para el numeral ordinal es 'en la cuarta generación'. Conserva el valor cronológico del hebreo/ge'ez sin añadir matices de propósito que el texto no exige.
- source_word: יְשׁוּבוּ
  english_pob_choice: they will return here
  chosen_spanish: ellos volverán aquí
  alternatives_spanish:
  - ellos regresarán aquí
  - volverán acá
  lexicon: šûb / volver, regresar
  rationale: '''Volverán'' reproduce bien el movimiento de retorno y mantiene la sencillez del original. ''Aquí'' conserva el deíctico del texto fuente.'
- source_word: חַטַּאת הָאֱמֹרִיִּם
  english_pob_choice: the sin of the Amorites
  chosen_spanish: el pecado de los amorreos
  alternatives_spanish:
  - la culpa de los amorreos
  - la iniquidad de los amorreos
  lexicon: ḥaṭṭāʾt / pecado; Amorites / amorreos
  rationale: '''Pecado'' es la equivalencia directa y más transparente. ''Ammorreos'' se mantiene como etnónimo tradicional en español bíblico, pero en forma común y no litúrgica.'
- source_word: אִתְפַּשַּׁם / not complete
  english_pob_choice: is not complete
  chosen_spanish: no se ha completado
  alternatives_spanish:
  - no está completo
  - no ha llegado a su plenitud
  lexicon: completion / completarse
  rationale: La revisión inglesa ya eliminó la redundancia de 'yet'. 'No se ha completado' expresa con claridad la idea de un proceso aún no terminado, sin forzar un aspecto ajeno al texto.
- source_word: עַד־עַתָּה
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - todavía hasta ahora
  - hasta este momento
  lexicon: time expression
  rationale: '''Hasta ahora'' es la manera más natural y fiel de reproducir el límite temporal indicado por la fuente.'
theological_decisions:
- issue: Lectura temporal del juicio sobre los amorreos
  english_pob_reading: for the sin of the Amorites is not complete until now
  chosen_spanish_reading: porque el pecado de los amorreos no se ha completado hasta ahora
  alternative_spanish_readings:
  - porque la culpa de los amorreos no se ha completado hasta ahora
  - porque la iniquidad de los amorreos no ha llegado a su plenitud hasta ahora
  rationale: Mantengo la idea de una medida moral aún no colmada. El español 'pecado' conserva la carga ética/jurídica del enunciado sin atenuarla. La formulación evita convertir el texto en una explicación moral abstracta que no está en la fuente.
  doctrine_reference: Génesis 15:16; juicio divino y paciencia histórica
translation_notes:
  revision_awareness: El texto inglés fue revisado para eliminar la redundancia 'not yet complete until now' -> 'not complete until now'. La versión española sigue esa lectura revisada y evita añadir 'todavía' para no reintroducir la misma redundancia; la nota ofrece una alternativa interpretativa sin cambiar el texto principal.
  spanish_consistency_notes:
  - Se usa 'amorreos' como etnónimo bíblico estándar en español, no una paráfrasis etnográfica.
  - '''Hasta ahora'' preserva la limitación temporal sin sobreexplicación.'
  - La nota al pie está anclada en el texto principal mediante [a], conforme a validación.
