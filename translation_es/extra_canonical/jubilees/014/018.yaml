base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/014/018.yaml
  text: And he awoke from his sleep and arose, and the sun had set, and there was a flame. And behold, a smoking furnace and a torch of fire passed between the pieces.
  footnotes:
  - marker: a
    text: Or 'and it became dark'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:06Z'
    unchanged: false
    changes_summary: Replaced 'there was a flame' with 'it became dark' to reflect the clause about darkness; changed the second 'a flame of fire' to 'a torch of fire' for more natural and precise rendering of the paired image.
translation:
  language: es
  text: Y despertó de su sueño y se levantó, y el sol se había puesto, y había una llama. Y he aquí, un horno humeante y una antorcha de fuego[a] pasó entre los pedazos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una tea de fuego»; el ge'ez presenta una imagen que también puede entenderse como una tea encendida, aunque «antorcha» es más clara en español general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነቅሐ፡ እምንዋሙ፡ ወተንሥአ፡
  english_pob_choice: And he awoke from his sleep and arose
  chosen_spanish: Y despertó de su sueño y se levantó
  alternatives_spanish:
  - Y se despertó de su sueño y se puso de pie
  - Y despertó de su sueño y se alzó
  lexicon: despertar; levantarse
  rationale: Conserva la secuencia verbal del ge'ez y del inglés POB sin añadir matices inexistentes. 'Se levantó' comunica bien el acto de incorporarse en español actual.
- source_word: ወፀሓይ፡ ዐረበ፡
  english_pob_choice: and the sun had set
  chosen_spanish: y el sol se había puesto
  alternatives_spanish:
  - y el sol había caído
  - y el sol se había ocultado
  lexicon: ponerse (el sol)
  rationale: Es la forma natural y fiel en español para el ocaso del sol, manteniendo el valor aspectual de pasado anterior.
- source_word: ወነድ፡ ኮነ፡
  english_pob_choice: and there was a flame
  chosen_spanish: y había una llama
  alternatives_spanish:
  - y hubo una llama
  - y apareció una llama
  lexicon: llama
  rationale: El ge'ez describe la presencia de una llama, no oscuridad; se traduce de manera directa y sobria para preservar la corrección textual señalada en la revisión.
- source_word: ወበልባስ፡ እሳት፡
  english_pob_choice: a torch of fire
  chosen_spanish: una antorcha de fuego
  alternatives_spanish:
  - una tea de fuego
  - un haz de fuego
  lexicon: antorcha; fuego
  rationale: '''Antorcha de fuego'' reproduce la imagen compuesta sin sustituirla por una expresión más interpretativa. ''Antorcha'' resulta clara y publicada en español bíblico contemporáneo.'
- source_word: ኀለፈ፡ ማእከለ፡ ክፍል።
  english_pob_choice: passed between the pieces
  chosen_spanish: pasaban entre los pedazos
  alternatives_spanish:
  - pasó entre los pedazos
  - cruzaban entre las mitades
  lexicon: pasar entre; pedazos
  rationale: '''Pedazos'' mantiene la referencia a las piezas del sacrificio. El plural verbal sigue el sujeto compuesto del horno humeante y la antorcha de fuego.'
theological_decisions:
- issue: La cláusula intermedia debe reflejar llama, no oscuridad
  english_pob_reading: and there was a flame
  chosen_spanish_reading: y había una llama
  alternative_spanish_readings:
  - y se hizo oscuro
  - y hubo tinieblas
  rationale: La revisión posterior aludía erróneamente a Génesis 15:17 en hebreo. El ge'ez de Jubileos 14:18 lee explícitamente 'llama', así que la traducción española conserva esa lectura textual.
  doctrine_reference: Fidelidad al testimonio textual de Jubileos frente a armonización con Génesis 15:17
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión: la lectura ''it became dark'' fue descartada por ser una harmonización incorrecta con Génesis 15:17 y se preservó la lectura ge''ez ''there was a flame''. También se incorporó la precisión de ''a torch of fire'' para el segundo miembro de la imagen.'
  spanish_consistency_notes:
  - Se mantiene 'pedazos' para 'pieces' en concordancia con el contexto sacrificial.
  - Se usa 'Yahvé' como norma del proyecto solo cuando aparece el Tetragrámaton; aquí no aplica.
  - No se emplea 'Cristo' ni 'Mesías' porque el verso no contiene lenguaje cristológico.
  - El sujeto plural de 'pasaban' concuerda con 'un horno humeante y una antorcha de fuego'.
