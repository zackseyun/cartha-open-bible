translation:
  language: es
  text: tres años de edad, y una cabra de tres años[a], y un carnero de tres años, y una tórtola y una paloma. Y tomó todo esto en medio del mes[b], y estaba habitando junto a[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una cabra de tres años de edad».'
    reason: lexical_alternative
  - marker: b
    text: La frase «en medio del mes» es explícita en el ge'ez y se conserva por su valor cronológico y litúrgico.
    reason: cultural_note
  - marker: c
    text: El ge'ez deja la preposición abierta; el complemento espacial continúa en el verso siguiente.
    reason: translation_note
lexical_decisions:
- source_word: ዘሠለስቱ፡ ዓመት፡
  english_pob_choice: three years old
  chosen_spanish: tres años de edad
  alternatives_spanish:
  - de tres años
  - tres años viejo
  lexicon: edad
  rationale: El ge'ez inicia con una frase adjetival que modifica el animal mencionado en la continuidad del contexto; en español, 'tres años de edad' conserva el valor descriptivo sin introducir una formulación más pesada.
- source_word: goat
  english_pob_choice: a three-year-old goat
  chosen_spanish: una cabra de tres años
  alternatives_spanish:
  - una cabra de tres años de edad
  - una cabra trienal
  lexicon: cabra
  rationale: '''Cabra'' es el equivalente natural y preciso en español; se mantiene la edad explícita para reflejar la especificación del texto fuente.'
- source_word: ram
  english_pob_choice: a three-year-old ram
  chosen_spanish: un carnero de tres años
  alternatives_spanish:
  - un carnero de tres años de edad
  - un macho cabrío
  lexicon: carnero
  rationale: '''Carnero'' conserva el sentido de macho ovino adulto y evita confundir el animal con otra especie.'
- source_word: turtledove
  english_pob_choice: turtledove
  chosen_spanish: tórtola
  alternatives_spanish:
  - paloma torcaz
  - tórtola común
  lexicon: tórtola
  rationale: '''Tórtola'' es la equivalencia estándar y clara en español para esta ave ritual.'
- source_word: pigeon
  english_pob_choice: pigeon
  chosen_spanish: paloma
  alternatives_spanish:
  - pichón
  - paloma doméstica
  lexicon: paloma
  rationale: '''Paloma'' reproduce el ave del texto de modo natural en español y mantiene el par ave/ave del sacrificio.'
- source_word: in the middle of the month
  english_pob_choice: in the middle of the month
  chosen_spanish: en medio del mes
  alternatives_spanish:
  - a la mitad del mes
  - a mediados del mes
  lexicon: mes
  rationale: Se conserva la marca cronológica explícita del ge'ez, tal como la auditoría inglesa la retuvo por su función cronológica y litúrgica.
- source_word: dwelling by
  english_pob_choice: dwelling by
  chosen_spanish: estaba habitando allí
  alternatives_spanish:
  - moraba allí
  - habitaba allí
  - estaba morando allí
  lexicon: habitar
  rationale: El ge'ez ኀበ admite 'by' o 'at'; como el complemento espacial sigue en el verso siguiente, 'allí' mantiene la conexión sin forzar una localización completa en este verso. 'Estaba habitando' conserva el aspecto progresivo de la redacción inglesa auditada.
theological_decisions:
- issue: Marcación temporal explícita
  english_pob_reading: The clause 'in the middle of the month' is explicit in the Ge'ez and is retained because Jubilees often marks time carefully for liturgical and chronological purposes.
  chosen_spanish_reading: Se retiene 'en medio del mes' de forma explícita.
  alternative_spanish_readings:
  - omitir la frase temporal
  - reformular como 'a mediados del mes'
  rationale: La cronología no es ornamental; forma parte del modo en que Jubileos organiza el relato. Por eso la frase se conserva sin diluirla.
  doctrine_reference: Jubileos 14:10; nota cronológica/litúrgica del texto fuente
translation_notes:
  revision_awareness: Se incorporó la corrección revisada que añade el valor espacial final de ኀበ como 'allí', en vez de cerrar la frase con una lectura que lo neutralice. También se refleja la corrección previa que recupera el inicio 'tres años de edad' y la colocación adecuada de la nota temporal.
  spanish_consistency_notes:
  - Se usa 'tórtola' y 'paloma' para las aves, con registro claro y sin arcaísmo innecesario.
  - '''Habitando allí'' mantiene la continuidad con el siguiente verso y evita interpretar prematuramente el complemento preposicional.'
  - Las notas siguen el orden de los marcadores y cada marcador aparece exactamente en el texto.
