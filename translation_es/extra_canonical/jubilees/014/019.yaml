  yaml_path: translation/extra_canonical/jubilees/014/019.yaml
  text: On that day the LORD made a covenant with Abram, saying, “To your offspring I will give this land, from the river of Egypt to the great river, the river Euphrates.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:06Z'
    unchanged: false
    changes_summary: Changed 'seed' to 'offspring' for more natural formal English while preserving meaning; corrected punctuation by replacing the final colon with a period inside the closing quotation mark.
translation:
  language: es
  text: 'En aquel día Yahvé hizo un pacto con Abram, diciendo: «A tu descendencia daré esta tierra, desde el río de Egipto hasta el gran río, el río Éufrates».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኪዳነ / covenant
  english_pob_choice: a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - estableció un pacto
  - concertó un pacto
  lexicon: pacto
  rationale: El ge'ez expresa la instauración del pacto por Yahvé con Abram. «Hizo un pacto» conserva el carácter verbal del original y es natural en español; «estableció un pacto» sería posible, pero menos directo.
- source_word: እግዚአብሔር / divine name
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: Yahvé
  rationale: La convención del proyecto exige «Yahvé» para el nombre divino cuando el texto fuente lo presenta directamente. Aquí no se usa el ocultamiento tradicional con mayúsculas porque el texto base nombra a Dios como sujeto del pacto.
- source_word: አብራም
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: Abram
  rationale: Se conserva el nombre propio histórico tal como aparece en la fuente. En español bíblico es comprensible y fiel mantener «Abram».
- source_word: ዘርእከ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu linaje
  - tu posteridad
  - tus descendientes
  lexicon: descendencia
  rationale: El término ge'ez corresponde al campo semántico de descendencia/offspring. «Tu descendencia» mantiene el sentido colectivo y la elevación formal mejor que una pluralización explícita.
- source_word: ዛተ ምድረ ... እስከ ... ፈለገ ኤውፍራጢስ
  english_pob_choice: this land, from the river of Egypt to the great river, the river Euphrates
  chosen_spanish: esta tierra, desde el río de Egipto hasta el gran río, el río Éufrates
  alternatives_spanish:
  - esta tierra, desde el río de Egipto hasta el gran río Éufrates
  - esta tierra, desde el río de Egipto hasta el gran río, Éufrates
  lexicon: land / river
  rationale: «Esta tierra» reproduce el demostrativo del original. «Río de Egipto» y «río Éufrates» conservan la estructura genitiva y la precisión geográfica; «el gran río» mantiene el epíteto sin forzarlo a una explicación interpretativa.
theological_decisions:
- issue: Nombrar a YHWH en español
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: La política del proyecto es no enmascarar el nombre divino cuando la fuente subyacente lo expresa. Aquí la escena del pacto se apoya en la presencia nominal de Yahvé como autor de la promesa.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: Semantic force of descendants
  english_pob_reading: offspring
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - descendientes
  - linaje
  rationale: «Descendencia» preserva el valor colectivo y promesal del término sin convertirlo en una mera referencia biológica plural. En este contexto de promesa de tierra, el sentido corporativo es importante.
  doctrine_reference: promesa abrahámica
translation_notes:
  revision_awareness: The English audit trail revised 'seed' to 'offspring' for smoother English while preserving the promise's collective sense; the Spanish draft follows that revision by using a natural collective noun ('descendencia') rather than a literal seed metaphor. No English footnotes were present, so no Spanish footnotes were required.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la norma del proyecto para el nombre divino.
  - Se conserva «Abram» en vez de modernizar a una forma no atestiguada en la fuente.
  - El registro es formal y bíblico, pero evita calcos innecesarios; la puntuación española cierra la cita con comillas angulares.
  - «Éufrates» lleva tilde conforme al uso español.
  - No se introducen notas al pie porque no hay variantes textuales o lexicales obligatorias en el paquete de referencia.
