translation:
  language: es
  text: Mira hacia el cielo y cuenta las estrellas, si puedes contarlas». Y miró hacia el cielo y vio
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሰማይ
  english_pob_choice: heaven
  chosen_spanish: cielo
  alternatives_spanish:
  - cielo
  - los cielos
  lexicon: N/A
  rationale: El ge'ez usa el término de 'cielo/heaven'; en español 'cielo' es la opción natural y más clara. 'Los cielos' sería posible, pero aquí el singular suena mejor para el mandato directo y mantiene el valor espacial del original.
- source_word: ውስተ፡ ... ወነጸረ
  english_pob_choice: Look toward heaven ... And he looked toward heaven
  chosen_spanish: Mira hacia el cielo ... Y miró hacia el cielo
  alternatives_spanish:
  - Mira al cielo ... Y miró al cielo
  - Alza la vista al cielo ... Y alzó la vista al cielo
  lexicon: N/A
  rationale: La revisión inglesa recuperó explícitamente el imperativo 'Look', que está presente en el origen. En español, 'mira hacia el cielo' conserva el mandato y el movimiento de orientación sin sobreinterpretar. Mantengo el paralelismo en la segunda cláusula con 'miró hacia el cielo'.
- source_word: ኈልቍ፡ ከዋክብተ፡ ... ኈልቈቶሙ
  english_pob_choice: count the stars, if you are able to count them
  chosen_spanish: cuenta las estrellas, si puedes contarlas
  alternatives_spanish:
  - cuenta las estrellas, si eres capaz de contarlas
  - enumera las estrellas, si puedes enumerarlas
  lexicon: N/A
  rationale: '''Contar'' reproduce con naturalidad el verbo repetido del original y del inglés auditado. ''Enumerar'' sería más forzado en español y menos idiomático en una orden directa.'
- source_word: ሰማየ፡ ወርእየ፡
  english_pob_choice: And he looked toward heaven and saw
  chosen_spanish: Y miró hacia el cielo y vio
  alternatives_spanish:
  - Y alzó la vista al cielo y vio
  - Y miró al cielo y vio
  lexicon: N/A
  rationale: El final del segmento está truncado en el paquete fuente y el inglés auditado también termina en 'saw'. Conservo la misma apertura incompleta y la coordinación simple del original, sin añadir objeto a 'vio'.
theological_decisions:
- issue: Referencia al ámbito celestial sin sustitución reverencial
  english_pob_reading: heaven
  chosen_spanish_reading: cielo
  alternative_spanish_readings:
  - cielos
  - paraíso
  rationale: En este contexto narrativo el término designa el espacio celestial visible hacia el que se dirige la mirada, no un tecnicismo doctrinal. 'Cielo' evita introducir una perífrasis devocional no exigida por el texto.
  doctrine_reference: Uso contextual de vocabulario cosmológico en narrativa bíblica
- issue: Conservación del final abrupto del fragmento
  english_pob_reading: And he looked toward heaven and saw
  chosen_spanish_reading: Y miró hacia el cielo y vio
  alternative_spanish_readings:
  - Y miró hacia el cielo y vio algo
  - Y miró hacia el cielo y vio
  rationale: El material fuente termina de forma incompleta y la traducción debe respetar ese corte. No se añade objeto implícito a 'vio' para no cerrar artificialmente la escena.
  doctrine_reference: Fidelidad textual y respeto del límite pericopal
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente el imperativo 'Look toward heaven' para reflejar mejor el mandato del original. La versión española sigue esa corrección con 'Mira hacia el cielo'. También conserva el cierre incompleto del fragmento, igual que el texto fuente y el inglés auditado.
  spanish_consistency_notes:
  - Se usa 'cielo' de manera consistente para ሰማይ/ሰማየ.
  - Se preserva la segunda persona singular del mandato ('Mira', 'puedes') porque el contexto directo lo exige.
  - Se mantiene el final abierto del pasaje con 'vio' sin complemento, conforme al corte del material fuente.
