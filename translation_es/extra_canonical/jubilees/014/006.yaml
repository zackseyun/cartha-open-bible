  text: 'las estrellas. Y le dijo: «Así será tu descendencia». Y creyó a Yahvé, y le fue contado por justicia.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ከዋክብተ፡ / stars
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - los astros
  - las luminarias
  lexicon: estrella
  rationale: El sustantivo concreto y natural en español para ከዋክብተ፡ es «estrellas». Mantiene el mismo referente celeste sin introducir un matiz más amplio que no está exigido por el texto.
- source_word: ወይቤ*ሎ፡ / And he said to him
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Y le habló
  - Y dijo a él
  lexicon: decir
  rationale: La forma breve y directa «Y le dijo» conserva la relación interpersonal del original y su sintaxis resulta idiomática en español.
- source_word: ከመዝ፡ ይኩን፡ ዘርእከ። / So will your seed be
  english_pob_choice: So will your seed be
  chosen_spanish: Así será tu descendencia
  alternatives_spanish:
  - Así será tu simiente
  - De este modo será tu descendencia
  lexicon: seed → descendencia
  rationale: «Descendencia» expresa de manera clara y fiel el valor genealógico de ዘርእከ en español contemporáneo. Se evita «simiente» por su arcaísmo y posible ambigüedad.
- source_word: ወአምኖ፡ ለእግዚአብሔር፡ / And he believed the LORD
  english_pob_choice: and he believed the LORD
  chosen_spanish: Y creyó a Yahvé
  alternatives_spanish:
  - Y creyó en Yahvé
  - Y creyó al Señor
  lexicon: believe + divine name
  rationale: Se mantiene «Yahvé» como representación principal del Nombre divino según las normas del proyecto. La construcción «creyó a Yahvé» refleja de forma más directa la confianza dirigida a una persona divina; «creyó en Yahvé» también sería posible, pero la forma elegida preserva mejor la relación verbal del original.
- source_word: ተኈለቍ፡ ጽድቀ። / it was reckoned to him as righteousness
  english_pob_choice: it was reckoned to him as righteousness
  chosen_spanish: y se le contó como justicia
  alternatives_spanish:
  - y le fue contado como justicia
  - y se le consideró como justicia
  lexicon: reckon/count → contar; righteousness → justicia
  rationale: «Se le contó» conserva el valor contable/judicial de ተኈለቍ y es natural en español. «Justicia» mantiene el campo semántico legal/covenantal de צְדָקָה/δικαιοσύνη sin sustituirlo por un término más interpretativo.
theological_decisions:
- issue: Relación entre «creyó» y la aceptación divina de esa fe
  english_pob_reading: and he believed the LORD, and it was reckoned to him as righteousness
  chosen_spanish_reading: Y creyó a Yahvé, y se le contó como justicia
  alternative_spanish_readings:
  - Y creyó en Yahvé, y se le contó como justicia
  - Y confió en Yahvé, y se le contó como justicia
  rationale: 'La formulación conserva la secuencia del texto: acto de fe seguido por imputación/contabilización de justicia. No se suaviza la tensión entre la fe humana y el juicio divino; el verbo «contó» deja visible el lenguaje forense del pasaje.'
  doctrine_reference: Génesis 15:6; Romanos 4:3; Santiago 2:23
- issue: Traducción del Nombre divino en contexto de cita/alusión
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el inglés POB usa «LORD», el texto fuente griego/semítico remite al Nombre divino, y el proyecto pide «Yahvé» como forma principal. Esto evita el ocultamiento del nombre en español y preserva la transparencia del texto.
  doctrine_reference: Éxodo 3:15; Éxodo 6:2-3
translation_notes:
  revision_awareness: La versión inglesa auditada no reporta cambios ni notas textuales; el pasaje se mantiene en alta concordancia con la fuente ge'ez y no requiere revisión adicional.
