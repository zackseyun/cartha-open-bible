review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del ge''ez y del rastro inglés: «las estrellas», «Así será tu descendencia», la referencia a Yahvé, y la imputación de justicia. Sin embargo, la cláusula final puede alinearse mejor con el valor pasivo/judicial de «it was reckoned to him as righteousness» usando una formulación más estándar y precisa en español bíblico.'
  spanish_quality_summary: El español es claro y natural. La única mejora necesaria es estilística y semántica menor en «se le contó como justicia», que suena algo menos idiomática y un poco más débil que «le fue contado por justicia», una fórmula asentada y clara en registro bíblico moderno-digno.
  glossary_alignment: Se respeta correctamente «Yahvé» para el Nombre divino y «justicia» para el campo de δικαιοσύνη/צדקה. «Descendencia» es una buena elección contextual para «seed». No hay conflictos relevantes con la terminología del proyecto.
  issues:
  - severity: medium
    issue: La frase «se le contó como justicia» no refleja de la mejor manera el giro forense-pasivo del original.
    rationale: El ge'ez y el inglés auditado expresan una imputación/consideración judicial. En español, «le fue contado por justicia» o «le fue contado como justicia» comunica con mayor naturalidad ese valor que «se le contó como justicia». Además, la fórmula con «fue contado» conserva mejor la resonancia intertextual con Génesis 15:6 y Romanos 4:3.
  revised_spanish_text: 'las estrellas. Y le dijo: «Así será tu descendencia». Y creyó a Yahvé, y le fue contado por justicia.'
  revision_rationale: Se ajusta únicamente la última cláusula para reflejar mejor la voz pasiva y el matiz forense del original, con una formulación española más natural y más coherente con la intertextualidad bíblica tradicional, sin alterar el sentido del pasaje.
