  text: '«Señor, Señor, ¿cómo sabré que la heredaré?» Y le dijo: «Tráeme una novilla de tres años»,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚኦ፡ እግዚኦ፡
  english_pob_choice: Lord, Lord
  chosen_spanish: Señor, Señor
  alternatives_spanish:
  - Soberano, Soberano
  - Señor mío, Señor mío
  lexicon: እግዚኦ
  rationale: El vocativo duplicado expresa énfasis y súplica directa; en español, «Señor, Señor» conserva la repetición y la naturalidad reverente sin añadir un matiz no presente en el texto.
- source_word: በምንት፡ አአምር፡
  english_pob_choice: by what shall I know
  chosen_spanish: ¿por qué medio sabré
  alternatives_spanish:
  - ¿cómo sabré
  - ¿por qué sabré
  lexicon: ዐወቀ / conocimiento expresado por la pregunta
  rationale: La pregunta no pide explicación abstracta sino un medio o señal por la cual conocerlo; «¿por qué medio sabré» mantiene ese valor instrumental que la traducción inglesa también captó con «by what shall I know».
- source_word: እወርሳ።
  english_pob_choice: I will inherit it
  chosen_spanish: la heredaré
  alternatives_spanish:
  - la recibiré en herencia
  - la poseeré como herencia
  lexicon: ירש / herencia
  rationale: «Heredaré» reproduce el valor patrimonial-jurídico del verbo y conserva la relación con la promesa implícita del texto; el objeto directo femenino («la») sigue la referencia tácita a la herencia prometida.
- source_word: ጣዕዋ፡
  english_pob_choice: a three-year-old heifer
  chosen_spanish: una novilla de tres años
  alternatives_spanish:
  - una becerra de tres años
  - una ternera de tres años
  lexicon: animal sacrificial joven
  rationale: «Novilla» es el equivalente más claro y digno en español para una hembra bovina joven no parida; evita la ambigüedad de «ternera» y conserva la precisión sacrificial del contexto.
theological_decisions:
- issue: Vocativo reverente dirigido a Dios / al Señor
  english_pob_reading: Lord, Lord
  chosen_spanish_reading: Señor, Señor
  alternative_spanish_readings:
  - Soberano, Soberano
  - Señor mío, Señor mío
  rationale: La repetición expresa dependencia y reverencia; no hay base suficiente en este verso para sustituir el título por una formulación más interpretativa. «Señor» es el equivalente estable y transparente.
  doctrine_reference: Tratamiento reverente del discurso directo; no añade ni atenúa la divinidad implícita.
- issue: Modo de conocer la herencia prometida
  english_pob_reading: by what shall I know that I will inherit it?
  chosen_spanish_reading: ¿por qué medio sabré que la heredaré?
  alternative_spanish_readings:
  - ¿cómo sabré que la heredaré?
  - ¿con qué sabré que la heredaré?
  rationale: La construcción evita hacer la pregunta más psicológica de lo que es; el foco está en la autenticación de la promesa por un medio reconocible. «Por qué medio» preserva ese valor sin sobreespecificarlo.
  doctrine_reference: Epistemología narrativa de la promesa; no se introduce incredulidad doctrinal explícita.
translation_notes:
  revision_awareness: La versión inglesa más reciente solo ajustó la puntuación final de la cita directa; no hubo cambios léxicos o teológicos que requirieran reflejo adicional en español. El borrador español incorpora esa misma apertura y cierre de comillas con puntuación normativa.
  spanish_consistency_notes:
  - Se mantiene «Señor» para el vocativo reverente, en concordancia con el patrón del pasaje y sin sustituirlo por «Yahvé», ya que el texto fuente ge'ez y el contexto inmediato no ofrecen un marcador explícito del Tetragrámaton.
  - Se conserva el paralelismo entre pregunta y respuesta con puntuación clara y una coma final conforme al estado revisado del inglés.
  - No se introduce terminología eclesiástica posterior; el lenguaje permanece narrativo y sacrificial, ajustado al contexto patriarcal del pasaje.
