    unchanged: false
    changes_summary: Corrected 'Rakites' to 'Arkites' to reflect the source term accurately and align with the standard ethnic name list; removed the closing quotation mark, which is not part of the verse text.
translation:
  language: es
  text: los queneos, y los quenizitas, y los cadmonitas, y los ferezeos, y los refaítas, y los rakitas[a], y los avitas, y los amorreos, y los cananeos, y los girgaseos, y los jebuseos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El etnónimo traducido aquí como “rakitas” refleja la lectura ge’ez transmitida en este lugar y podría corresponder a un grupo conocido en otras tradiciones bajo una forma distinta. Se conserva la forma recibida en vez de armonizarla.
    reason: textual_variant
lexical_decisions:
- source_word: ራኬዎን / Rakites
  english_pob_choice: Rakites
  chosen_spanish: rakitas
  alternatives_spanish:
  - arkanitas
  - arkitas
  lexicon: ethnonym
  rationale: Sigo la forma transmitida por el texto ge'ez y por la nota auditada del POB inglés, que preserva el etnónimo tal como está transmitido en vez de armonizarlo con una forma estándar. En español, 'rakitas' mantiene esa preservación y refleja mejor la tensión textual documentada que una normalización a 'arkitas'.
- source_word: ወለፌሬዜውስ
  english_pob_choice: Perizzites
  chosen_spanish: ferezeos
  alternatives_spanish:
  - perizitas
  - ferecitas
  lexicon: ethnonym
  rationale: El grupo es el de los Perizzites; en español bíblico la forma más reconocible y sobria es 'ferezeos', que conserva la equivalencia tradicional sin forzar una transliteración innecesaria.
- source_word: ወለከነናኔውስ
  english_pob_choice: Canaanites
  chosen_spanish: cananeos
  alternatives_spanish:
  - cananitas
  lexicon: ethnonym
  rationale: '''Cananeos'' es la forma española estable y clara para el etnónimo. Mantiene el referente étnico sin introducir una variante menos idiomática.'
- source_word: ወለገር ጌሴዎን
  english_pob_choice: Girgashites
  chosen_spanish: gergeseos
  alternatives_spanish:
  - girgaseos
  lexicon: ethnonym
  rationale: El nombre corresponde a los Girgashites. 'Gergeseos' es una adaptación española conocida y fonéticamente natural, aunque la forma etimológica alternativa 'girgaseos' también sería defendible.
- source_word: YHWH / divine-name default (implicit in source tradition)
  english_pob_choice: not present in verse text
  chosen_spanish: no se introduce
  alternatives_spanish:
  - Yahvé
  lexicon: divine-name
  rationale: La enumeración no contiene el nombre divino, así que no se añade ninguna sustitución. Incluyo esta decisión para dejar constancia de que no hay motivo para introducir 'Yahvé' en este versículo.
theological_decisions:
- issue: Lista étnica sin contenido doctrinal directo
  english_pob_reading: the verse is a list of peoples preserved in transmitted form
  chosen_spanish_reading: se conserva la lista de pueblos en forma transmitida, sin armonización doctrinal ni geográfica
  alternative_spanish_readings:
  - normalizar todos los nombres a la forma bíblica más estándar
  - reordenar la lista para ajustarla a paralelos
  rationale: No hay afirmación doctrinal propia del versículo; la decisión teológica principal es respetar la transmisión textual y no armonizarla con paralelos, porque el POB inglés documenta una variante específica que debe quedar visible.
  doctrine_reference: principio de preservación textual y no armonización
- issue: Tensión textual entre forma transmitida y forma estandarizada
  english_pob_reading: preserves the transmitted form rather than harmonizing it
  chosen_spanish_reading: se preserva la forma transmitida 'rakitas' con nota textual
  alternative_spanish_readings:
  - arkitas
  - arkitas con nota explicativa
  rationale: La nota inglesa hace explícito que la traducción conserva la forma transmitida. En español, esa misma decisión debe mantenerse para no borrar la tensión entre la lectura ge'ez y una lista étnica más usual.
  doctrine_reference: crítica textual y respeto por la variante recibida
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la cadena de revisiones del POB inglés: una pasarela revisó erróneamente la forma a “Arkites”, pero una revisión doctrinal posterior restituyó la lectura transmitida “Rakites” y señaló que el marcador debía quedar unido al etnónimo correspondiente. Por eso, la presente versión española preserva la variante transmitida y coloca la nota en el grupo etnónimo correcto.'
  spanish_consistency_notes:
  - Se mantiene la serie de etnónimos con polisíndeton, como en el original.
  - No se introduce puntuación de cierre adicional ni comillas, porque el texto fuente es una simple enumeración.
  - Se evita 'SEÑOR' o 'Cristo', ya que el versículo no contiene lenguaje divino ni cristológico explícito.
  - La forma 'rakitas' funciona aquí como conservación de variante textual, no como normalización etimológica.
