  yaml_path: translation/extra_canonical/jubilees/014/023.yaml
  text: And Abram rejoiced, and he told this whole matter to Sarai his wife, and he believed that he would have offspring, though she was not bearing. And Sarai advised Abram her husband and said to him, “Go in to Hagar, my Egyptian maidservant; perhaps I may build up offspring for you from her.” And Abram listened to the voice of Sarai his wife and said to her, “Do so.” And she took her,
  footnotes:
