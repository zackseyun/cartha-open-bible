    text: Or 'And Sarai took'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:06Z'
    unchanged: false
    changes_summary: Replaced 'seed' with 'offspring' for more natural formal English while preserving meaning and consistency within the verse. Left the final incomplete clause as in the source-derived draft.
translation:
  language: es
  text: 'Y Abram se alegró, y contó todo este asunto a Sarai su esposa, y creyó que tendría descendencia, aunque ella no daba hijos. Y Sarai aconsejó a Abram su esposo, y le dijo: «Entra[a] donde Hagar, mi esclava egipcia; tal vez pueda levantar descendencia para ti por medio de ella». Y Abram escuchó la voz de Sarai su esposa, y le dijo: «Hazlo». Y ella la tomó,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión conserva el giro semítico eufemístico para la unión con Hagar.
    reason: lexical_alternative
lexical_decisions:
- source_word: አብራም / Abram
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: nombre propio
  rationale: Se conserva la forma tradicional del nombre en esta etapa narrativa, en continuidad con el texto fuente y con el uso del POB en inglés.
- source_word: ወተፈሥሐ / rejoiced
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se gozó
  lexicon: léxico verbal
  rationale: «Se alegró» expresa bien el gozo sin sonar demasiado arcaico; mantiene el valor afectivo del verbo ge'ez sin ampliarlo.
- source_word: አይድዐ / told
  english_pob_choice: told
  chosen_spanish: contó
  alternatives_spanish:
  - dijo
  - relató
  lexicon: léxico verbal
  rationale: «Contó todo este asunto» comunica que Abram hizo una narración completa, no solo una frase suelta.
- source_word: ዘንተ ነገረ / this whole matter
  english_pob_choice: this whole matter
  chosen_spanish: todo este asunto
  alternatives_spanish:
  - toda esta cosa
  - todo esto
  lexicon: léxico nominal
  rationale: «Asunto» funciona de manera natural en español para una explicación amplia y preserva el sentido de totalidad del original.
- source_word: ይከውኖ ዘርእ / he would have offspring
  english_pob_choice: he would have offspring
  chosen_spanish: tendría descendencia
  alternatives_spanish:
  - tendría hijos
  - tendría prole
  lexicon: léxico nominal
  rationale: «Descendencia» es una forma digna y fiel para la promesa de posterioridad; evita reducir el sentido solo a hijos inmediatos.
- source_word: ወይእቲሰ አትወልድ / though she was not bearing
  english_pob_choice: though she was not bearing
  chosen_spanish: aunque ella no estaba dando a luz
  alternatives_spanish:
  - aunque ella no estaba alumbrando
  - aunque ella no tenía hijos
  lexicon: aspecto verbal
  rationale: La construcción preserva el hecho presente de infertilidad/ausencia de parto sin sobreadaptar la frase.
- source_word: ባእ ኀበ አጋር / Go in to Hagar
  english_pob_choice: Go in to Hagar
  chosen_spanish: Entra donde Hagar
  alternatives_spanish:
  - Ve con Hagar
  - Acércate a Hagar
  lexicon: léxico idiomático
  rationale: Se mantiene el eufemismo bíblico con una forma española inteligible, sin volverlo explícito en exceso ni perder su carga semántica.
- source_word: ሰአኪትየ ግብጻዊት / my Egyptian maidservant
  english_pob_choice: my Egyptian maidservant
  chosen_spanish: mi esclava egipcia
  alternatives_spanish:
  - mi sierva egipcia
  - mi criada egipcia
  lexicon: léxico social
  rationale: «Esclava» sigue el valor fuerte de la relación de dependencia del término fuente y la preferencia POB por esa fuerza lexical cuando corresponde.
- source_word: እመቦ ከመ አሐንጽ ለከ ዘርአ እምኔሃ / perhaps I may build up offspring for you from her
  english_pob_choice: perhaps I may build up offspring for you from her
  chosen_spanish: tal vez pueda edificar descendencia para ti a partir de ella
  alternatives_spanish:
  - quizá pueda levantar descendencia para ti de ella
  - tal vez pueda construir descendencia para ti de ella
  lexicon: léxico metafórico
  rationale: «Edificar» conserva el valor metafórico de construir/levantar una casa o linaje; «descendencia» evita una interpretación puramente arquitectónica.
- source_word: ወሰምዐ አብራም ቃለ ሶራ / Abram listened to the voice of Sarai
  english_pob_choice: Abram listened to the voice of Sarai
  chosen_spanish: Abram escuchó la voz de Sarai
  alternatives_spanish:
  - Abram obedeció a Sarai
  - Abram atendió a la voz de Sarai
  lexicon: léxico auditivo
  rationale: Se conserva la imagen semítica de «escuchar la voz», sin forzarla necesariamente a «obedecer» en la línea principal.
- source_word: ግበሪ / Do so
  english_pob_choice: Do so
  chosen_spanish: Hazlo
  alternatives_spanish:
  - Así sea
  - Haz eso
  lexicon: léxico imperativo
  rationale: «Hazlo» es una equivalencia breve y natural para la respuesta directa de Abram.
- source_word: ወዥአታ / and she took her
  english_pob_choice: And she took her
  chosen_spanish: Y ella la tomó
  alternatives_spanish:
  - Y Sarai la tomó
  - Y la tomó
  lexicon: pronombre proléptico
  rationale: El objeto femenino se deja en forma proléptica para reflejar la estructura del ge'ez; el referente se completa en el verso siguiente.
theological_decisions:
- issue: La promesa de descendencia a pesar de la esterilidad de Sarai
  english_pob_reading: he believed that he would have offspring, though she was not bearing
  chosen_spanish_reading: creyó que tendría descendencia, aunque ella no estaba dando a luz
  alternative_spanish_readings:
  - creyó que tendría hijos, aunque ella no paría
  - creyó que tendría prole, aunque ella no estaba dando a luz
  rationale: La redacción conserva la tensión entre promesa y esterilidad sin resolverla; «descendencia» mantiene el alcance genealógico del texto.
  doctrine_reference: Génesis/Jubileos sobre promesa de posteridad en contexto de esterilidad
- issue: La expresión idiomática de unión con Hagar
  english_pob_reading: Go in to Hagar
  chosen_spanish_reading: Entra donde Hagar
  alternative_spanish_readings:
  - Ve a Hagar
  - Métete con Hagar
  rationale: Se preserva el carácter eufemístico e histórico de la fórmula bíblica sin hacerla vulgar ni desdibujarla.
  doctrine_reference: Lenguaje bíblico semítico sobre relaciones sexuales
- issue: La relación servil de Hagar
  english_pob_reading: my Egyptian maidservant
  chosen_spanish_reading: mi esclava egipcia
  alternative_spanish_readings:
  - mi sierva egipcia
  - mi criada egipcia
  rationale: «Esclava» refleja mejor la fuerza social del término y evita suavizar indebidamente la condición de Hagar.
  doctrine_reference: Ética y vocabulario bíblico sobre esclavitud/servidumbre
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: mantiene «descendencia» para seed/offspring y conserva la clausula final abierta («Y ella la tomó,»), además de reflejar el objeto femenino proléptico del ge''ez con «la».'
  spanish_consistency_notes:
  - Se mantiene «Abram» y «Sarai» de manera consistente en todo el versículo.
  - «Descendencia» se usa de forma estable para seed/offspring en este pasaje.
  - «Esclava» refleja la preferencia POB por la fuerza léxica de δοῦλος/terminología análoga cuando el contexto lo exige.
  - El texto final queda incompleto a propósito para respetar la clausula truncada del original y del audit trail inglés.
