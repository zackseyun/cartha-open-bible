    unchanged: false
    changes_summary: Removed the initial unnecessary 'that'; adjusted 'a terror of great darkness' to the more natural and source-faithful 'a great terror of darkness'; added the closing quotation mark.
translation:
  language: es
  text: 'Un profundo sueño cayó sobre Abram; y he aquí, un gran terror de oscuridad cayó sobre él. Y se le dijo a Abram: «Sabe con certeza que tu descendencia vivirá como extranjera en una tierra que no le pertenecerá, y los esclavizarán y los afligirán durante cuatrocientos años».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ድንጋፄ / deep sleep
  english_pob_choice: A deep sleep fell upon Abram
  chosen_spanish: Un profundo sueño cayó sobre Abram
  alternatives_spanish:
  - Un sueño profundo cayó sobre Abram
  - Cayó sobre Abram un sueño profundo
  lexicon: sueño profundo
  rationale: El ge'ez expresa un sueño profundo; en español, «un profundo sueño» conserva el sentido sin introducir un tecnicismo innecesario. Se evitó «trance» porque el texto no lo exige.
- source_word: ግርማ፡ ዐቢይ፡ ጽልመት፡
  english_pob_choice: a great terror of darkness
  chosen_spanish: un gran terror de oscuridad
  alternatives_spanish:
  - un gran temor de oscuridad
  - un gran espanto de tinieblas
  - un terror grande de oscuridad
  lexicon: terror / oscuridad
  rationale: La construcción del original une una experiencia de terror con la oscuridad; «terror de oscuridad» sigue de cerca esa relación y mantiene la fuerza retórica de la frase inglesa revisada.
- source_word: አእምሮ፡ አእምር፡
  english_pob_choice: Know with certainty
  chosen_spanish: Sabe con certeza
  alternatives_spanish:
  - Debes saber con certeza
  - Ten por cierto
  lexicon: saber con certeza
  rationale: La duplicación intensiva del ge'ez se refleja bien con «con certeza», que conserva la seguridad enfática sin volver la frase artificial.
- source_word: ፈላሴ / זרע / seed
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: descendencia
  rationale: «Descendencia» es natural en español bíblico contemporáneo y transmite el sentido colectivo de la promesa sin perder la referencia genealógica.
- source_word: ውስተ፡ ምድረ፡ ነኪር / land not theirs
  english_pob_choice: in a land not theirs
  chosen_spanish: en una tierra que no será de ellos
  alternatives_spanish:
  - en una tierra que no les pertenecerá
  - en una tierra ajena
  lexicon: tierra ajena / no será de ellos
  rationale: Se conserva la posesión negada del original y de la traducción inglesa. «Que no será de ellos» mantiene la ambigüedad entre pertenencia jurídica y posesión efectiva sin añadir interpretación.
- source_word: ወይቀንይዎሙ / enslave them
  english_pob_choice: they will enslave them
  chosen_spanish: los esclavizarán
  alternatives_spanish:
  - los someterán como esclavos
  - los harán esclavos
  lexicon: esclavizar
  rationale: El inglés POB eligió «enslave», y en español «esclavizar» conserva la fuerza lexical directa de una acción de sometimiento servil.
- source_word: ወያሐምምዎሙ / afflict them
  english_pob_choice: afflict them
  chosen_spanish: los afligirán
  alternatives_spanish:
  - los oprimirán
  - los maltratarán
  - les causarán aflicción
  lexicon: afligir
  rationale: «Afligir» reproduce el campo semántico de sufrimiento y dureza sin especificar más de lo que el texto dice.
theological_decisions:
- issue: Modo de certeza en la revelación a Abram
  english_pob_reading: Know with certainty
  chosen_spanish_reading: Sabe con certeza
  alternative_spanish_readings:
  - Debes saber con certeza
  - Conoce con certeza
  rationale: La formulación mantiene el carácter de anuncio profético inequívoco. No se introdujo una exhortación más fuerte que la del original.
  doctrine_reference: revelación profética; certeza de la palabra divina
- issue: Destino de la descendencia en tierra ajena
  english_pob_reading: your seed will be aliens in a land not theirs
  chosen_spanish_reading: tu descendencia será extranjera en una tierra que no será de ellos
  alternative_spanish_readings:
  - tu descendencia será forastera en una tierra ajena
  - tu descendencia residirá como extranjeros en una tierra que no les pertenecerá
  rationale: «Extranjera» conserva el matiz de ajenidad y residencia no propia. Se evita suavizar la condición histórica de extrañeza que el texto anuncia.
  doctrine_reference: patriarcado de la promesa; peregrinación/extranjería del pueblo
- issue: Esclavización y aflicción de la descendencia
  english_pob_reading: they will enslave them and afflict them
  chosen_spanish_reading: los esclavizarán y los afligirán
  alternative_spanish_readings:
  - los someterán y los afligirán
  - los harán esclavos y los maltratarán
  rationale: Se preserva la dureza histórica del anuncio sin atenuarla. «Esclavizar» mantiene la fuerza del término que el POB quiso destacar lexicalmente.
  doctrine_reference: opresión de Israel en Egipto; sufrimiento bajo servidumbre
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se eliminó cualquier enlace innecesario al inicio, se mantuvo la formulación natural «un gran terror de oscuridad», y se cerró correctamente la cita directa. La redacción española refleja esa versión establecida y no la variante anterior con orden menos natural.'
  spanish_consistency_notes:
  - Se usó «Abram» de forma consistente, conforme al texto fuente.
  - Se eligió «descendencia» como equivalente general de seed para mantener el registro bíblico sin archaizar en exceso.
  - Se mantuvo «esclavizarán» por coherencia con la decisión POB de conservar la fuerza lexical de enslavement.
  - No se introdujeron notas de pie porque no fue necesario resolver variantes textuales adicionales ni ambigüedades nuevas en español.
