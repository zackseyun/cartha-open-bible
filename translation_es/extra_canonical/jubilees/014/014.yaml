revisions:
- from: 'Un profundo sueño cayó sobre Abram; y he aquí, un gran terror de oscuridad cayó sobre él. Y se le dijo a Abram: «Sabe con certeza que tu descendencia será extranjera en una tierra que no será de ellos, y los esclavizarán y los afligirán durante cuatrocientos años».'
  to: 'Un profundo sueño cayó sobre Abram; y he aquí, un gran terror de oscuridad cayó sobre él. Y se le dijo a Abram: «Sabe con certeza que tu descendencia vivirá como extranjera en una tierra que no le pertenecerá, y los esclavizarán y los afligirán durante cuatrocientos años».'
  rationale: Se ajustó la cláusula sobre la tierra ajena para que el referente posesivo corresponda con «tu descendencia» y para que el español suene más natural y preciso. También se mejoró ligeramente la expresión de extranjería con «vivirá como extranjera», sin alterar el sentido fuente ni las decisiones léxicas principales.
