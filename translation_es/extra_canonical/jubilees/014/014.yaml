review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del ge''ez y del rastro inglés: sueño profundo, terror oscuro, certeza del anuncio, descendencia extranjera, esclavización y aflicción por cuatrocientos años. Sin embargo, «una tierra que no será de ellos» introduce un desajuste de número y referencia, porque el original/inglés apunta a una tierra que no pertenece a la descendencia en conjunto, no «a ellos» como referente plural masculino ambiguo.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión. «será extranjera» concuerda con «descendencia», pero la frase completa suena más natural como «vivirá como extranjera» o «será forastera». Además, «que no será de ellos» resulta algo rígido y referencialmente confuso. El resto del verso fluye bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección «descendencia» por ‘seed’ y «esclavizarán» por ‘enslave’ está bien alineada con las pautas. «Abram» se conserva correctamente.
  issues:
  - severity: medium
    issue: Referencia posesiva imprecisa en «una tierra que no será de ellos»
    rationale: El inglés dice «a land not theirs» y el sentido recae sobre la descendencia prometida como colectivo. En español, «de ellos» crea una referencia plural poco elegante y menos fiel al antecedente singular colectivo «tu descendencia». «que no le pertenecerá» mantiene mejor el vínculo semántico y la naturalidad.
  - severity: low
    issue: Construcción algo forzada en «tu descendencia será extranjera»
    rationale: No es incorrecta, pero en español suena más natural expresar residencia/condición con «vivirá como extranjera» o «será forastera». Esto preserva mejor la idea de sojourn/alien status sin cambiar el sentido.
  revised_spanish_text: 'Un profundo sueño cayó sobre Abram; y he aquí, un gran terror de oscuridad cayó sobre él. Y se le dijo a Abram: «Sabe con certeza que tu descendencia vivirá como extranjera en una tierra que no le pertenecerá, y los esclavizarán y los afligirán durante cuatrocientos años».'
  revision_rationale: Se ajustó la cláusula sobre la tierra ajena para que el referente posesivo corresponda con «tu descendencia» y para que el español suene más natural y preciso. También se mejoró ligeramente la expresión de extranjería con «vivirá como extranjera», sin alterar el sentido fuente ni las decisiones léxicas principales.
