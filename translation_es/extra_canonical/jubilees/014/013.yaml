  yaml_path: translation/extra_canonical/jubilees/014/013.yaml
  text: But Abram drove them away and did not allow the birds to touch them. And it happened, when the sun was setting,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:05Z'
    unchanged: false
    changes_summary: Capitalized the opening conjunction for sentence-initial position. The draft is otherwise accurate and complete for the Ge'ez.
translation:
  language: es
  text: Pero Abram los alejó y no permitió que las aves los tocaran. Y aconteció, cuando el sol se estaba poniendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወ*ይከልኦሙ
  english_pob_choice: drove them away
  chosen_spanish: los alejó
  alternatives_spanish:
  - los ahuyentó
  - los apartó
  lexicon: Partícula narrativa + verbo de impedir/retirar
  rationale: El Ge’ez expresa que Abram los apartó o alejó de allí; en español, 'los alejó' comunica bien la acción sin sobrerrepresentar una violencia que el contexto inmediato no exige con seguridad.
- source_word: አዕዋፍ
  english_pob_choice: birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: Ave/aves
  rationale: '''Aves'' es neutral y digno en español bíblico. Mantiene el registro general del texto y evita un coloquialismo innecesario.'
- source_word: ይልከፍዎሙ
  english_pob_choice: to touch them
  chosen_spanish: tocaran
  alternatives_spanish:
  - los tocaran
  - se acercaran a ellos
  lexicon: tocar/alcanzar
  rationale: El verbo 'tocar' corresponde de forma directa al sentido físico del Ge’ez. Se conserva la idea de impedir el contacto, que es la fuerza del pasaje.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el sol
  lexicon: sol
  rationale: El sustantivo se traduce literalmente por 'el sol'. No requiere nota porque el sintagma español es transparente.
theological_decisions:
- issue: La acción de Abram respecto de las aves no introduce una formulación doctrinal, sino una escena narrativa de protección del sacrificio/ofrenda.
  english_pob_reading: But Abram drove them away and did not allow the birds to touch them.
  chosen_spanish_reading: Pero Abram los alejó y no permitió que las aves los tocaran.
  alternative_spanish_readings:
  - Pero Abram las ahuyentó y no dejó que las aves los tocaran.
  - Pero Abram las apartó y no permitió que las aves los tocaran.
  rationale: Se mantiene el sentido narrativo sin cargar el texto con una interpretación adicional. 'No permitió' conserva la agencia de Abram y la prohibición del contacto, tal como en la lectura inglesa auditada.
  doctrine_reference: No aplica; relato narrativo, sin afirmación doctrinal explícita en este versículo.
translation_notes:
  revision_awareness: La lectura inglesa auditada fue revisada solo por capitalización inicial; el contenido quedó confirmado como exacto y completo para el Ge’ez. La versión española sigue esa misma estructura narrativa sin expandir el final, que en la fuente continúa con la cláusula temporal sobre la puesta del sol.
  spanish_consistency_notes:
  - Se mantiene 'Abram' conforme al texto fuente y al uso habitual en Jubileos.
  - Se conserva la coordinación narrativa 'Pero... Y aconteció...' para reflejar la secuencia del original.
  - No se añade puntuación interpretativa ni se completa la frase final más allá de lo que contiene el segmento fuente.
