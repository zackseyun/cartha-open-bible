review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del ge’ez y del POB inglés: anuncio de muerte serena, reunión con los antepasados y sepultura en edad avanzada favorable. Sin embargo, la frase final puede sonar algo poco natural en español bíblico actual.'
  spanish_quality_summary: La redacción es clara y digna, pero 'a buena vejez' resulta menos idiomático que 'en buena vejez' o una formulación equivalente. Además, la nota de alternativa para 'sepultado' no es necesaria si no resuelve una ambigüedad real del texto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Padres', 'en paz' y 'sepultado' son adecuados. La decisión entre 'sepultado' y 'enterrado' es estilística; 'sepultado' encaja bien con el registro.
  issues:
  - severity: medium
    issue: La expresión 'a buena vejez' suena poco natural en español contemporáneo.
    rationale: Aunque busca reflejar el inglés 'at a good old age', en español la construcción más natural con 'sepultar/ser sepultado' es 'en buena vejez' o 'en una buena vejez'. El sentido de edad avanzada favorable se preserva mejor con una formulación más idiomática.
  - severity: low
    issue: La nota [a] sobre 'serás enterrado' no aporta una distinción semántica relevante.
    rationale: '''Sepultado'' y ''enterrado'' son variantes léxicas cercanas aquí; el original no exige preservar ambas en nota, y la nota puede recargar innecesariamente el texto.'
  revised_spanish_text: Pero tú irás a tus padres en paz, y serás sepultado en buena vejez.
  revision_rationale: Se ajusta la última frase a una construcción más natural en español sin cambiar el sentido del original. Se elimina la nota léxica innecesaria sobre 'enterrado', ya que no preserva una ambigüedad significativa del ge’ez.
