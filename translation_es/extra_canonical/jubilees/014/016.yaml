translation:
  language: es
  text: Pero tú irás a tus padres en paz, y serás sepultado[a] a buena vejez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “serás enterrado”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአንተ፡ ተሐውር፡ ኀበ፡ አበዊከ፡
  english_pob_choice: you will go to your fathers
  chosen_spanish: irás a tus padres
  alternatives_spanish:
  - irás con tus padres
  - serás reunido con tus padres
  lexicon: Lexical rendering of the idiom for joining one’s ancestors/forebears in death.
  rationale: El ge’ez expresa el destino post mortem hacia “tus padres”; en español, “irás a tus padres” conserva la imagen heredada sin añadir una explicación que el texto no da. “Con tus padres” suaviza la construcción pero pierde la dirección del movimiento.
- source_word: በሰላም፡
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en seguridad
  - tranquilo
  lexicon: Peace / peace, wholeness, undisturbed state.
  rationale: “En paz” es la equivalencia natural y fiel para la fórmula de muerte serena. “En seguridad” sería más interpretativo; “tranquilo” cambia el registro y la imagen.
- source_word: ትትቀበር፡
  english_pob_choice: you will be buried
  chosen_spanish: serás sepultado
  alternatives_spanish:
  - serás enterrado
  lexicon: Bury / inter, bury.
  rationale: “Sepultado” mantiene un tono digno y bíblico sin volverse arcaico de manera excesiva. “Enterrado” es válido, pero “sepultado” suele ajustarse mejor al registro bíblico.
- source_word: በርእስ፡ ሠናይ፡
  english_pob_choice: at a good old age
  chosen_spanish: a buena vejez
  alternatives_spanish:
  - en buena vejez
  - a una edad avanzada y buena
  - con buena vejez
  lexicon: Old age, advanced age, with the qualifier “good”.
  rationale: La secuencia ge’ez describe una vejez favorable/llena, no un lugar ni un estado moral. “A buena vejez” reproduce la frase de forma compacta y natural en español, respetando el sentido del ajuste inglés (“at a good old age”).
theological_decisions:
- issue: Destino de los muertos / reunirse con los antepasados
  english_pob_reading: you will go to your fathers
  chosen_spanish_reading: irás a tus padres
  alternative_spanish_readings:
  - serás reunido con tus padres
  - descenderás a tus padres
  rationale: Se conserva la formulación que alude al destino de reunirse con los antepasados sin introducir doctrinas adicionales sobre el estado intermedio. La frase española mantiene la tensión del original, que no desarrolla más el cómo ni el dónde.
  doctrine_reference: Gen 15:15; 25:8; 35:29
- issue: Muerte en paz y vejez favorable
  english_pob_reading: in peace ... at a good old age
  chosen_spanish_reading: en paz ... a buena vejez
  alternative_spanish_readings:
  - en paz ... en avanzada edad
  - en paz ... con larga vejez
  rationale: La combinación expresa una muerte serena y una longevidad cumplida sin exagerar el adjetivo ‘good’. Se evita moralizar la vejez; el texto describe una condición favorable, no un mérito.
  doctrine_reference: Gén 15:15; Job 42:17
translation_notes:
  revision_awareness: La edición inglesa revisada cambió “in a good old age” por “at a good old age” para sonar más natural sin alterar el sentido. La versión española adopta una solución igualmente natural (“a buena vejez”) y mantiene el paralelismo con el hebreo/ ge’ez del dicho funerario.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” en este proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se evita “Señor” y “Cristo” porque no aparecen en el texto fuente.
  - “Padres” se conserva para reproducir el giro semítico de ancestros/antepasados.
  - El registro es bíblico sobrio y publicable, sin arcaísmos innecesarios.
