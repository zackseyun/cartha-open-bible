base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/014/002.yaml
  text: and your reward will be exceedingly great.” And he said[14:2], “Lord, Lord, what will you give me? For I go childless, and the son of Maseq, the son of my maidservant, is Damascus."”
  footnotes:
  - marker: '14:2'
    text: The phrase rendered 'this Eliezer of Damascus' is textually compressed in the Ge'ez, with 'Maseq' and 'Damascus' appearing in close apposition. The sense is that Eliezer of Damascus is the household heir in view.
    reason: segmentation_note
  - marker: a
    text: Or 'is this Damascus Eliezer.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:05Z'
    unchanged: false
    changes_summary: Added the omitted copula 'is' and reordered the final phrase to reflect the source more accurately as 'this Damascus Eliezer' rather than appositionally punctuating it as a fragment.
translation:
  language: es
  text: 'y tu recompensa será sumamente grande.” Y él dijo: “Señor, Señor, ¿qué me darás? Porque me voy sin hijos, y el hijo de Maseq, el hijo de mi criada, es Damasco[a].”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez está comprimido aquí; la referencia tradicional es a Eliezer de Damasco como el heredero de la casa que se tiene en mente, pero el texto fuente literalmente dice solo: «es Damasco».'
    reason: textual_variant
lexical_decisions:
- source_word: ወ*ዐስብከ፡ ይፈደፍድ፡ ጥቀ።
  english_pob_choice: and your reward will be exceedingly great
  chosen_spanish: y tu recompensa será sumamente grande
  alternatives_spanish:
  - y tu galardón será muy grande
  - y tu recompensa será grandísima
  lexicon: recompensa; sumamente grande
  rationale: La idea central es retribución/recompensa abundante. ‘Recompensa’ conserva el sentido relacional y retributivo del texto, y ‘sumamente grande’ refleja bien el intensificador de la fuente y del POB inglés sin endurecer el español.
- source_word: እግዚኦ፡ እግዚኦ፡
  english_pob_choice: Lord, Lord
  chosen_spanish: Señor, Señor
  alternatives_spanish:
  - Soberano, Soberano
  - Señor mío, Señor mío
  lexicon: Señor
  rationale: Aquí el audit trail inglés ya fija ‘Lord, Lord’ como apelación reverente. En español, ‘Señor, Señor’ es natural y fiel; no hay base en este verso para sustituirlo por ‘Yahvé’.
- source_word: ዘእንበለ፡ ውሉድ፡
  english_pob_choice: I go childless
  chosen_spanish: me voy sin hijos
  alternatives_spanish:
  - estoy sin hijos
  - parto sin descendencia
  lexicon: sin hijos; descendencia
  rationale: ‘Go childless’ expresa la condición de partir o continuar sin descendencia. ‘Me voy sin hijos’ mantiene la fuerza idiomática y la relación con la queja de Abraham.
- source_word: ወወልደ፡ ማሴቅ፡ ወልደ፡ አመትየ፡
  english_pob_choice: the son of Maseq, the son of my maidservant
  chosen_spanish: el hijo de Maseq, el hijo de mi criada
  alternatives_spanish:
  - el hijo de Maseq, el hijo de mi sierva
  - el hijo de Maseq, hijo de mi esclava
  lexicon: criada / sierva / esclava
  rationale: La fuente y el POB inglés nombran la relación doméstica de la madre. ‘Criada’ conserva el matiz de servidumbre doméstica sin imponer ‘esclava’ donde el contexto narrativo aquí no exige esa dureza; se mantiene la tensión documental del linaje doméstico.
- source_word: ውእቱ፡ ደማስቆስ፡
  english_pob_choice: is Damascus
  chosen_spanish: es Damasc[o][a]
  alternatives_spanish:
  - es Damasco
  - es el de Damasco
  lexicon: Damasco / Damasco
  rationale: El ajuste revisado del POB inglés subraya que el ge'ez literalmente dice ‘es Damasco’. En español, ‘Damasco’ reproduce el nombre propio en la forma tradicional histórica; se deja la posibilidad de ‘Damasco’ como alternativa, pero el texto principal conserva la forma aquí empleada por la tradición española antigua. La nota anclada explica la lectura textual comprimida y la posible referencia a Eliezer sin añadirla al cuerpo.
theological_decisions:
- issue: Referencia implícita a Eliezer de Damasco sin nombrarlo en el ge'ez
  english_pob_reading: The phrase rendered 'this Eliezer of Damascus' is textually compressed in the Ge'ez; the sense is that Eliezer of Damascus is the household heir in view.
  chosen_spanish_reading: El texto dice simplemente que ‘es Damasc[o][a]’, dejando la identificación implícita como heredero doméstico en la nota.
  alternative_spanish_readings:
  - es este Eliezer de Damasco
  - es Damasco, es decir, Eliezer
  rationale: La revisión más reciente del auditor indica que el ge'ez no añade ‘Eliezer’. Por fidelidad textual, el cuerpo español no lo introduce. La nota permite recordar la referencia interpretativa tradicional sin convertirla en el texto base.
  doctrine_reference: Fidelidad textual y prioridad del testimonio fuente frente a armonización con Génesis 15:2.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrige la armonización con Eliezer: el ge''ez literal no lo nombra, así que el español evita añadirlo al cuerpo del versículo y deja la identificación en una nota textual.'
  spanish_consistency_notes:
  - Se mantuvo ‘Señor, Señor’ por coherencia con la apelación reverente del POB inglés.
  - Se evitó ‘SEÑOR’ como sustituto del nombre divino porque aquí el texto no usa el Tetragrámaton.
  - Se conservó la forma ‘Damasco’ en el cuerpo principal, con nota para la alternativa textual y la posible referencia a Damasco/Eliezer.
  - Se eligió ‘criada’ para reflejar una relación doméstica sin forzar una terminología más dura que no está explícita en la fuente inmediata.
