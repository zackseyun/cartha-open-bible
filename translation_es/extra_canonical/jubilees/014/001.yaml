  rationale: 'Se corrige la decisión léxica inicial para alinearla con la revisión auditada del POB: el término debe entenderse calendáricamente como «luna nueva», no como «cosa/asunto». También se reubica y reescribe la nota para reflejar la razón documentada y mejorar la fidelidad y naturalidad en español.'
