base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/014/001.yaml
  text: And after this new moon[14:1], in the fourth year of this week, on the new moon of the third month, the word of the LORD came to Abram in a dream, saying, “Do not fear, Abram; I am your protector, and your reward will be very great.”
  footnotes:
  - marker: '14:1'
    text: The Ge'ez term can mean 'at dawn' or 'at the beginning', but in Jubilees' calendrical system it frequently designates the 'new moon' of the month.
    reason: cultural_note
  - marker: a
    text: Or 'I am your protector.”'.
    reason: previous_rendering
  - marker: b
    text: Or 'matter[14:1]'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:04Z'
    unchanged: false
    changes_summary: Added the closing quotation mark and period to complete the sentence. The draft otherwise accurately reflects the source.
translation:
  language: es
  text: 'Y después de esta luna nueva[a], en el cuarto año de esta semana, en la luna nueva del tercer mes, la palabra de Yahvé vino a Abram en un sueño, diciendo: «No temas, Abram; yo soy tu protector, y tu recompensa será muy grande».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ge'ez puede significar «al amanecer» o «al comienzo», pero en el sistema calendárico de Jubileos con frecuencia designa la «luna nueva» del mes.
    reason: cultural_note
lexical_decisions:
- source_word: ወእምድኅረዝ / after this matter
  english_pob_choice: And after this matter
  chosen_spanish: Y después de esta cosa[a]
  alternatives_spanish:
  - Y después de este asunto
  - Y después de esto
  lexicon: source phrase with deictic reference to preceding narrative
  rationale: El Ge'ez admite un sentido de 'cosa/asunto/materia'; el audit trail inglés mostró que 'matter' era una alternativa textual, pero la revisión favoreció el valor narrativo general. En español, 'esta cosa' preserva la referencia amplia sin forzar una interpretación específica. La nota marca la variante tradicional/semántica.
- source_word: ቃለ እግዚአብሔር
  english_pob_choice: the word of the LORD
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra del Señor
  lexicon: divine speech formula
  rationale: Se mantiene 'Yahvé' como equivalente del nombre divino en el texto principal, conforme a la norma del proyecto, en vez de la convención de máscara 'SEÑOR'. 'Palabra' conserva el valor de comunicación divina y no requiere paráfrasis.
- source_word: በሕልም
  english_pob_choice: in a dream
  chosen_spanish: en un sueño
  alternatives_spanish:
  - soñando
  - durante un sueño
  lexicon: dream vision context
  rationale: La preposición simple 'en' comunica fielmente el marco visionario y es natural en español; evita un giro más interpretativo.
- source_word: ኢትፍራህ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, Abram
  lexicon: fear prohibition formula
  rationale: '''No temas'' es la formulación bíblica directa y natural, fiel al imperativo negativo. Se conserva el vocativo ''Abram'' como en el original.'
- source_word: አነ ውእቱ
  english_pob_choice: I am your protector
  chosen_spanish: yo soy tu protector
  alternatives_spanish:
  - yo soy tu defensor
  - yo soy tu escudo
  lexicon: self-identification formula with protective sense
  rationale: El inglés POB optó por 'protector', y el contexto textual revisado indica una autoidentificación protectora. En español, 'protector' es claro y no introduce metáforas no atestiguadas por el texto truncado.
- source_word: ወዐስብከ ዐቢይ ጥቀ
  english_pob_choice: and your reward will be very great
  chosen_spanish: y tu recompensa será muy grande
  alternatives_spanish:
  - y tu paga será muy grande
  - y tu galardón será muy grande
  lexicon: reward terminology
  rationale: '''Recompensa'' reproduce bien el sentido retributivo y la referencia al contexto del premio prometido. ''Galardón'' sería más literario, pero menos neutral; ''paga'' podría sonar más contractual que el original.'
theological_decisions:
- issue: Nombre divino en la cita narrativa
  english_pob_reading: the word of the LORD
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - la palabra del Señor
  rationale: Se conserva la distinción del proyecto entre el nombre divino y el título genérico. Dado que la fuente original refiere al tetragrámaton en el marco de una revelación directa, 'Yahvé' evita el ocultamiento del nombre.
  doctrine_reference: Convención editorial POB sobre el Tetragrámaton / nombre divino
- issue: Autoidentificación divina como protector
  english_pob_reading: I am your protector
  chosen_spanish_reading: yo soy tu protector
  alternative_spanish_readings:
  - yo soy tu escudo
  - yo soy tu defensor
  rationale: La revisión inglesa confirma que la cláusula final original fue omitida por accidente y que la frase debe leerse como una promesa de amparo. 'Protector' mantiene la tensión semántica sin imponer una imagen concreta que el texto ge'ez truncado no completa.
  doctrine_reference: Lectura textual revisada de Jubileos 14:1
translation_notes:
  revision_awareness: 'La versión inglesa de POB pasó por una corrección de puntuación y luego por una revisión importante que restauró la cláusula final omitida: «and your reward will be very great». Además, la nota de variante del término inicial quedó mal anclada en inglés después de la revisión; aquí se corrige la idea con un ancla en el segmento inicial español. La frase final se incluye íntegramente, a diferencia del primer borrador inglés truncado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se conserva «Abram» y no «Abraham», conforme al estado narrativo del pasaje.
  - Se mantiene la unidad temporal «en el cuarto año de esta semana, en la luna nueva del tercer mes» sin suavizarla.
  - Se traduce la autoidentificación divina con un término claro y no metafórico para no exceder el texto completo disponible.
