translation:
  language: es
  text: 'Y le dijo: «Yo soy Yahvé, que te saqué de Ur de los caldeos, para darte esta tierra, para que la heredes[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra».
    reason: previous_rendering
lexical_decisions:
- source_word: ወይቤሎ / said to him
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Y le habló
  - Y le respondió
  lexicon: Geez narrative speech formula
  rationale: La fórmula narrativa se expresa de manera natural y sobria en español con «Y le dijo», conservando la relación directa entre el hablante y Abram sin añadir matices no presentes en el texto.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: divine name
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal, en lugar de una máscara tipográfica. El contexto es una autoidentificación divina, por lo que el nombre es pertinente y auditable.'
- source_word: ዘአውፃእኩከ / who brought you out
  english_pob_choice: who brought you out
  chosen_spanish: que te saqué
  alternatives_spanish:
  - que te hice salir
  - que te saqué fuera
  lexicon: deliverance formula
  rationale: «Sacar» reproduce bien el verbo de liberación y conserva la fuerza de la acción divina de extracción desde un lugar de origen, como en el inglés auditado.
- source_word: እምነ ኡር ዘከለዳዊያን / from Ur of the Chaldeans
  english_pob_choice: from Ur of the Chaldeans
  chosen_spanish: de Ur de los caldeos
  alternatives_spanish:
  - de Ur entre los caldeos
  - desde Ur de los caldeos
  lexicon: toponym and ethnonym
  rationale: Se mantiene la designación geográfica tradicional y precisa. «De los caldeos» refleja el genitivo étnico del original y coincide con la forma bíblica conocida en español.
- source_word: ከመ፡ እሀብከ / so that I might give you
  english_pob_choice: so that I might give you
  chosen_spanish: para darte
  alternatives_spanish:
  - para que yo te diera
  - a fin de darte
  lexicon: purpose clause
  rationale: La cláusula de finalidad se vuelve natural en español con «para darte», sin perder el sentido de propósito explícito del original y del inglés POB.
- source_word: ምድረ / the land
  english_pob_choice: this land
  chosen_spanish: esta tierra
  alternatives_spanish:
  - la tierra
  - esta región
  lexicon: land promise
  rationale: El sustantivo «tierra» es la equivalencia bíblica normal y clara en español. Se conserva el demostrativo «esta» porque la revisión del inglés muestra que la frase completa apunta a una tierra concreta prometida.
- source_word: ዛቲ፡ ትረሳ፡ / to inherit it
  english_pob_choice: to inherit it
  chosen_spanish: y que la heredes
  alternatives_spanish:
  - para heredarla
  - para que la poseas como herencia
  lexicon: inheritance formula
  rationale: El verbo «heredar» transmite la idea de recibir por herencia, y el pronombre femenino «la» concuerda con «tierra». Se evita «poseer» porque debilita el matiz hereditario del término.
theological_decisions:
- issue: Nombre divino en una autoidentificación
  english_pob_reading: I am the LORD
  chosen_spanish_reading: Yo soy Yahvé
  alternative_spanish_readings:
  - Yo soy el SEÑOR
  - Yo soy el Señor
  rationale: La autoidentificación divina en primera persona requiere conservar el nombre propio según la directriz del proyecto. «Yahvé» evita ocultar el tetragrámaton y mantiene la transparencia del texto fuente.
  doctrine_reference: Éxodo 3:14–15; uso reverente del Nombre divino
- issue: Promesa de herencia de la tierra
  english_pob_reading: this land to inherit it
  chosen_spanish_reading: esta tierra y que la heredes
  alternative_spanish_readings:
  - esta tierra para heredarla
  - la tierra para poseerla
  rationale: La relación entre donación divina y herencia no debe diluirse. «Hereder» conserva el marco de promesa pactal y la idea de recepción legítima, no mera ocupación.
  doctrine_reference: Génesis 12:7; promesa de la tierra a Abram
translation_notes:
  revision_awareness: La base inglesa revisó el final de la versículo para restaurar la cláusula completa de herencia; la versión española incorpora esa lectura completa en «esta tierra y que la heredes», manteniendo la observación de que el ge’ez suministrado en el paquete está truncado al final de la frase.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estable para el nombre divino, conforme al criterio del proyecto.
  - Se conserva «tierra» como término técnico bíblico para la promesa territorial.
  - El pronombre objeto femenino «la» concuerda con «tierra» y preserva el referente explícito de la herencia.
  - La puntuación abre la cita con comillas latinas y mantiene un estilo bíblico moderno, claro y publicable.
