lexical_decisions:
- source_word: ኤሊኤዜር
  english_pob_choice: Eliezer
  chosen_spanish: Eliezer
  alternatives_spanish:
  - Eliézer
  lexicon: nombre propio
  rationale: El nombre propio aparece explícitamente en la revisión inglesa; en español se conserva la forma bíblica habitual sin añadir adaptación innecesaria. Se mantiene la grafía llana 'Eliezer' para coherencia con el audit trail y legibilidad.
- source_word: ይወርሰኒ
  english_pob_choice: he will inherit me
  chosen_spanish: él me heredará
  alternatives_spanish:
  - me heredará
  - él heredará de mí
  lexicon: heredar
  rationale: El verbo etíope corresponde a la noción de herencia/sucesión. En español, 'me heredará' conserva el objeto directo personal y la relación posesiva implícita del original, evitando suavizarlo con una paráfrasis más general.
- source_word: ዘርአ
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - linaje
  - prole
  lexicon: descendencia
  rationale: En este contexto genealógico, 'seed' no se refiere a semilla agrícola sino a descendencia. 'Descendencia' comunica mejor la tensión textual sobre herencia y posteridad en español moderno.
- source_word: ኢይወርስከዝ
  english_pob_choice: This one will not inherit you
  chosen_spanish: Este no te heredará
  alternatives_spanish:
  - Éste no te heredará
  - Este no será tu heredero
  lexicon: heredar
  rationale: La frase reproduce la negación de la herencia futura. 'Te heredará' conserva el valor verbal del original y el registro directo del diálogo, sin convertirlo en una explicación interpretativa.
theological_decisions:
- issue: Herencia patriarcal y descendencia prometida
  english_pob_reading: he will inherit me, and to me you have not given seed
  chosen_spanish_reading: él me heredará, y no me has dado descendencia
  alternative_spanish_readings:
  - él será mi heredero, y no me has dado descendencia
  - él heredará de mí, y no me has dado linaje
  rationale: El versículo articula la tensión entre herencia y falta de descendencia dentro de una promesa familiar. Se conserva esa tensión sin explicarla ni armonizarla, porque el texto la presenta como argumento del hablante.
  doctrine_reference: tema bíblico de promesa de descendencia y herencia familiar
translation_notes:
  revision_awareness: La revisión inglesa añadió explícitamente el nombre 'Eliezer' y mantuvo el resto de la frase con registro formal. La versión española sigue esa decisión, preservando el énfasis con guion y evitando expandir el texto más allá del packet disponible.
  spanish_consistency_notes:
  - Se mantiene el nombre propio 'Eliezer' según la revisión inglesa y la fuente ge'ez, con ortografía bíblica corriente en español.
  - '''Descendencia'' se usa para ''seed'' por el contexto genealógico; no se traduce como ''semilla'' para evitar ambigüedad botánica.'
  - Se conserva el orden y la puntuación dialogal de la inglesa revisada, con guion para el énfasis en el nombre.
