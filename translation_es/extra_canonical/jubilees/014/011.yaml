base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/014/011.yaml
  text: the oak of Mamre, which is near Hebron. And he built an altar there and offered sacrifice
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:05Z'
    unchanged: false
    changes_summary: Replaced 'slaughtered' with 'offered sacrifice' to more naturally and completely reflect ወዘብሐ in formal English, especially following 'built an altar there.'
translation:
  language: es
  text: la encina de Mamre, que está cerca de Hebrón. Y edificó allí un altar y ofreció sacrificio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ድራይ / oak
  english_pob_choice: the oak
  chosen_spanish: la encina
  alternatives_spanish:
  - el roble
  - el árbol
  - la encina de Mamre
  lexicon: oak
  rationale: En español, «encina» comunica de modo natural y reverente el árbol singular asociado a un lugar concreto. «Roble» es posible, pero menos preciso en registro bíblico. Mantengo el valor nominal del lugar sin convertirlo en una paráfrasis.
- source_word: ዘ*ማምሬ / of Mamre
  english_pob_choice: of Mamre
  chosen_spanish: de Mamre
  alternatives_spanish:
  - de Mamré
  lexicon: Mamre
  rationale: Se conserva el nombre propio tradicional «Mamre» sin adaptar la grafía, porque corresponde al topónimo bíblico establecido y es transparente para el lector hispano.
- source_word: ቅሩበ፡ ኬብሮን / near Hebron
  english_pob_choice: which is near Hebron
  chosen_spanish: que está cerca de Hebrón
  alternatives_spanish:
  - que queda cerca de Hebrón
  - cerca de Hebrón
  lexicon: near
  rationale: «Que está cerca de» reproduce con claridad la relación locativa sin añadir matices innecesarios. «Hebrón» mantiene la forma castellana usual del topónimo.
- source_word: ወሐነጸ፡ / and he built
  english_pob_choice: And he built
  chosen_spanish: Y edificó
  alternatives_spanish:
  - Y construyó
  - Y levantó
  lexicon: build
  rationale: «Edificó» conserva el tono bíblico y formal de la acción de erigir una construcción cultual, más específico que «construyó» en este contexto.
- source_word: ምሥዋዐ፡ / altar
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un ara
  lexicon: altar
  rationale: «Altar» es el equivalente directo y correcto en español bíblico. No hay necesidad de una variante más técnica.
- source_word: ወዘብሐ፡ / offered sacrifice
  english_pob_choice: offered sacrifice
  chosen_spanish: ofreció sacrificio
  alternatives_spanish:
  - sacrificó
  - ofreció un sacrificio
  lexicon: sacrifice
  rationale: Sigo la revisión inglesa que decidió reflejar ወዘብሐ como una acción cultual completa. «Ofreció sacrificio» comunica mejor que un simple «sacrificó» el gesto litúrgico asociado al altar.
theological_decisions:
- issue: La acción cultual vinculada al altar
  english_pob_reading: he built an altar there and offered sacrifice
  chosen_spanish_reading: edificó allí un altar y ofreció sacrificio
  alternative_spanish_readings:
  - edificó allí un altar y sacrificó
  - levantó allí un altar y ofreció un sacrificio
  rationale: 'La formulación mantiene la secuencia cultual del texto: primero el altar, luego la ofrenda sacrificial. Evita reducir el verbo a una matanza física y preserva el carácter religioso de la acción.'
  doctrine_reference: Génesis 12:7-8; Hebreos 11:4 (principio de culto sacrificial)
- issue: El topónimo sagrado y su ubicación
  english_pob_reading: the oak of Mamre, which is near Hebron
  chosen_spanish_reading: la encina de Mamre, que está cerca de Hebrón
  alternative_spanish_readings:
  - el roble de Mamre, que está cerca de Hebrón
  - la encina de Mamre, cerca de Hebrón
  rationale: El texto describe un lugar identificable por un árbol emblemático y su proximidad a Hebrón. La traducción conserva ambos datos sin interpretarlos alegóricamente.
  doctrine_reference: Génesis 13:18; 18:1
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «slaughtered» a «offered sacrifice» para reflejar más plenamente ወዘብሐ en un contexto de altar. La versión española sigue esa revisión y evita un verbo que sugiera mera ejecución animal sin dimensión cultual.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y formal.
  - 'Se conservan los topónimos en formas castellanas usuales: Mamre, Hebrón.'
  - Se usa «edificó» para la construcción del altar por su valor culto-narrativo.
  - «Ofreció sacrificio» preserva la dimensión litúrgica del acto y armoniza con la revisión inglesa.
