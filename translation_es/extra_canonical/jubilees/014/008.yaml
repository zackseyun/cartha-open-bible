  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ከናናዊያን
  english_pob_choice: of the Canaanites
  chosen_spanish: de los cananeos
  alternatives_spanish:
  - de los cananeos
  - de los canaanitas
  lexicon: topónimo/etnónimo
  rationale: «Cananeos» es el etnónimo natural y ampliamente inteligible en español bíblico; evita una transliteración innecesaria y conserva la referencia al pueblo de Canaán.
- source_word: ለእኂዝ፡ ለዓለም፡
  english_pob_choice: as an everlasting possession
  chosen_spanish: como posesión perpetua
  alternatives_spanish:
  - como posesión eterna
  - como heredad perpetua
  lexicon: posesión/eternidad
  rationale: La construcción expresa posesión duradera; «perpetua» mantiene el valor jurídico y de duración continua sin sobrecargar el texto con un matiz más metafísico que el permitido por el contexto.
- source_word: ለከዊነ፡ ለከ፡ አምላከ፡
  english_pob_choice: and to be God to you
  chosen_spanish: y para ser Dios para ti
  alternatives_spanish:
  - y para ser tu Dios
  - y ser Dios para ti
  lexicon: expresión relacional de pacto
  rationale: Se conserva la forma verbal final para reflejar la construcción infinitiva del original y del audit trail inglés; «para ti» mantiene la dirección relacional del pacto sin añadir vocabulario interpretativo.
- source_word: ወለዘርእከ፡ እምድኅሬከ።
  english_pob_choice: and to your seed after you
  chosen_spanish: y para tu descendencia después de ti
  alternatives_spanish:
  - y para tu descendencia después de ti
  - y para tu simiente después de ti
  lexicon: seed/descendencia
  rationale: «Descendencia» comunica naturalmente la idea genealógica en español bíblico contemporáneo. Se evita «simiente» por sonar arcaico, aunque sigue siendo una alternativa posible si se quisiera una correspondencia más técnica.
- source_word: ወይቤ፡
  english_pob_choice: And he said,
  chosen_spanish: 'Y dijo:'
  alternatives_spanish:
  - Y dijo,
  lexicon: verbo introductorio de cita
  rationale: La fórmula de introducción de discurso se normaliza en español con dos puntos; conserva la función narrativa y la transición directa al parlamento siguiente.
theological_decisions:
- issue: Promesa de tierra y relación de pacto
  english_pob_reading: of the Canaanites as an everlasting possession, and to be God to you and to your seed after you.
  chosen_spanish_reading: de los cananeos como posesión perpetua, y para ser Dios para ti y para tu descendencia después de ti.
  alternative_spanish_readings:
  - como posesión eterna, y para ser tu Dios y el de tu descendencia después de ti.
  - como heredad perpetua, y para ser Dios para ti y para tu descendencia después de ti.
  rationale: La redacción mantiene juntas la promesa territorial y la fórmula de pacto sin suavizar su fuerza. «Ser Dios para ti» preserva la relación covenantal de pertenencia y fidelidad; no se expande a una paráfrasis devocional que ocultaría el paralelismo del original.
  doctrine_reference: Pacto abrahámico / promesa de la tierra
- issue: Tensión semántica entre posesión y pueblo
  english_pob_reading: of the Canaanites
  chosen_spanish_reading: de los cananeos
  alternative_spanish_readings:
  - de los canaanitas
  rationale: Se conserva el nombre del pueblo como objeto de la promesa, sin convertirlo en una abstracción geográfica. La formulación no resuelve ni atenúa la tensión ética-histórica presente en el pasaje.
  doctrine_reference: Narrativa de la promesa en Génesis/Jubileos
translation_notes:
  revision_awareness: El inglés POB fue revisado de «that I might be God» a «and to be God», eliminando la lectura final de propósito/tentatividad. La versión española sigue esa revisión con una infinitiva directa («para ser Dios») y no introduce modalización adicional.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים / θεός según el estándar del proyecto.
  - Se evita «SEÑOR» porque el pasaje no contiene el Tetragrámaton en el fragmento suministrado.
  - «Descendencia» se usa de forma consistente para expresiones genealógicas como זרע / seed cuando el contexto no exige «simiente».
  - La puntuación con dos puntos tras «Y dijo» refleja el cierre introductorio de cita en español.
