  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Dios» está bien; no hay nombre divino aquí. «Descendencia» es una buena elección contextual para seed. La única mejora recomendada es idiomática en la fórmula relacional del pacto: preferir «tu Dios» sobre «Dios para ti» en español.'
