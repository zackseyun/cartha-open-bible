  yaml_path: translation/extra_canonical/jubilees/007/028.yaml
  text: For three years the fruit of everything that is eaten shall not be gathered; and in the fourth year its fruit shall be gathered, and the firstfruits acceptable before the LORD Most High, who created heaven and earth and everything, shall be offered up. Let them offer in abundance the first wine and oil as firstfruits on the altar of the LORD, who receives it; and what is left over let the servants of the house of the LORD eat before the altar that receives it.
  footnotes:
  - marker: a
    text: Or 'its fruit shall not be gathered from anything that is eaten'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:50Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Por tres años no se recogerá el fruto de todo lo que se come[a]; y en el cuarto año se recogerá su fruto, y se ofrecerán las primicias aceptables ante Yahvé Altísimo, que creó el cielo y la tierra y todo cuanto hay en ellos. Presenten en abundancia el primer vino y el aceite como primicias sobre el altar de Yahvé, que lo recibe; y lo que quede, que los siervos de la casa de Yahvé lo coman delante del altar que lo recibe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se recogerá su fruto de todo lo que se come».'
    reason: Preserva la nota de redacción alternativa registrada en el audit trail inglés, aunque la traducción principal correcta es «el fruto de todo lo que se come».
lexical_decisions:
- source_word: fruit of everything that is eaten
  english_pob_choice: the fruit of everything that is eaten shall not be gathered
  chosen_spanish: no se recogerá el fruto de todo lo que se come
  alternatives_spanish:
  - no se recogerá el fruto de todo lo que se pueda comer
  - no se recogerá el fruto de todo alimento
  lexicon: fruit / gather
  rationale: 'La revisión inglesa corrige la relación sintáctica de la frase ge''ez: no se trata de “desde” algo, sino del fruto perteneciente a “todo lo que se come”. En español, “el fruto de todo lo que se come” conserva esa genitividad sin forzar la estructura.'
- source_word: shall be gathered
  english_pob_choice: shall be gathered
  chosen_spanish: será recogido
  alternatives_spanish:
  - será juntado
  - será cosechado
  lexicon: gather / collect
  rationale: ‘Recoger’ es el equivalente natural en español para la recolección agrícola del fruto; mantiene el sentido general del inglés sin introducir tecnicismos no necesarios.
- source_word: firstfruits
  english_pob_choice: firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - las primicias ofrecidas
  lexicon: firstfruits
  rationale: ‘Primicias’ es el término bíblico asentado en español y comunica bien la ofrenda inicial y consagrada al santuario.
- source_word: Most High
  english_pob_choice: LORD Most High
  chosen_spanish: Yahvé Altísimo
  alternatives_spanish:
  - Señor Altísimo
  - Yahvé el Altísimo
  lexicon: Most High / divine name
  rationale: Se conserva ‘Yahvé’ conforme a la norma del proyecto para יהוה, y ‘Altísimo’ traduce el epíteto sin ocultarlo bajo un sustituto devocional.
- source_word: first wine and oil
  english_pob_choice: the first wine and oil
  chosen_spanish: el primer vino y el aceite
  alternatives_spanish:
  - el vino nuevo y el aceite
  - el primero vino y el aceite
  lexicon: wine and oil
  rationale: ‘Primer vino’ reproduce la prioridad de la ofrenda; ‘vino nuevo’ sería posible, pero agrega una matización no explicitada aquí. Se mantiene también ‘el aceite’ como sustantivo simple.
- source_word: servants of the house of the LORD
  english_pob_choice: the servants of the house of the LORD
  chosen_spanish: los siervos de la casa de Yahvé
  alternatives_spanish:
  - los esclavos de la casa de Yahvé
  - los servidores de la casa de Yahvé
  lexicon: servants / δοῦλος-like house servants
  rationale: Aquí ‘siervos’ es la opción más natural y reverente en español para el personal del templo/casa de Yahvé, sin convertir innecesariamente el término en ‘esclavos’ en un contexto doméstico-sacral.
theological_decisions:
- issue: Divine name rendering for LORD Most High
  english_pob_reading: LORD Most High
  chosen_spanish_reading: Yahvé Altísimo
  alternative_spanish_readings:
  - Señor Altísimo
  - el Altísimo
  rationale: El texto inglés mantiene la referencia al nombre divino junto con el título; en español, la convención del proyecto exige revelar el nombre divino como ‘Yahvé’ y conservar el título ‘Altísimo’.
  doctrine_reference: Éxodo 3:15; uso proyectual de יהוה
- issue: Offerings as firstfruits on the altar
  english_pob_reading: shall be offered up ... on the altar of the LORD, who receives it
  chosen_spanish_reading: se ofrecerán ... sobre el altar de Yahvé, que lo recibe
  alternative_spanish_readings:
  - serán ofrecidas ... en el altar
  - se presentarán ... ante el altar
  rationale: ‘Ofrecer’ mantiene el acto cultual sin sobreexplicar el mecanismo ritual. ‘Que lo recibe’ preserva la personificación/función del altar indicada por el inglés auditado.
  doctrine_reference: Lexical cultic usage; altar as receiving locus in sacrificial language
- issue: Servants eating before the altar
  english_pob_reading: let the servants of the house of the LORD eat before the altar that receives it
  chosen_spanish_reading: que los siervos de la casa de Yahvé lo coman delante del altar que lo recibe
  alternative_spanish_readings:
  - que los servidores de la casa de Yahvé lo coman ante el altar
  - que los esclavos de la casa de Yahvé lo coman delante del altar
  rationale: Se conserva la distribución del sobrante a los servidores del templo y la localización ritual ‘delante del altar’, sin perder la referencia al altar como receptor.
  doctrine_reference: Cultic distribution of offerings; temple service
translation_notes:
  revision_awareness: La fuente ge'ez disponible en el paquete no contiene texto legible, así que el draft sigue el inglés POB auditado y la revisión aplicada que aclara la sintaxis de 'the fruit of everything that is eaten'. No se introducen notas textuales porque no hay variante anclable en el texto español y el ajuste de revisión ya quedó absorbido en la formulación final.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - ‘Primicias’ y ‘altar’ conservan el registro cultual bíblico sin modernizar en exceso.
  - No se usa ‘Cristo’ ni otros términos doctrinalmente cargados fuera de lo que exige el versículo.
  - ‘Siervos’ se usa por contexto de casa/templo; no se fuerza ‘esclavos’ porque aquí la función doméstico-cultual guía la lectura española.
