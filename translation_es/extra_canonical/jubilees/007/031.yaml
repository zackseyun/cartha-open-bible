translation:
  language: es
  text: 'Y yo también les doy este mandato, hijos míos, conforme al mandato que Enoc dio a su hijo en los primeros jubileos, mientras aún vivía, en la séptima generación: él mandó y dio testimonio a su hijo y a los hijos de sus hijos hasta el día de su muerte.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: command
  english_pob_choice: command
  chosen_spanish: orden
  alternatives_spanish:
  - mandato
  - mandamiento
  lexicon: orden
  rationale: En español, "orden" comunica bien el acto de instruir autoritativamente sin cargar automáticamente el matiz legal o litúrgico de "mandamiento"; aquí se trata de una instrucción transmitida por Enoc y replicada por el hablante.
- source_word: testified
  english_pob_choice: testified
  chosen_spanish: dio testimonio
  alternatives_spanish:
  - atestiguó
  - testificó
  lexicon: dar testimonio
  rationale: '"Dar testimonio" conserva el sentido de declarar solemnemente y de forma pública. Es natural en español bíblico contemporáneo y mantiene la fuerza de la declaración de Enoc.'
- source_word: sons' sons
  english_pob_choice: sons' sons
  chosen_spanish: los hijos de sus hijos
  alternatives_spanish:
  - sus nietos
  - los descendientes de sus hijos
  lexicon: hijos
  rationale: La expresión refleja de manera directa la cadena genealógica del original y evita introducir una equivalencia interpretativa más específica como "nietos", que podría restringir innecesariamente el alcance.
- source_word: first jubilees
  english_pob_choice: first jubilees
  chosen_spanish: los primeros jubileos
  alternatives_spanish:
  - el primer jubileo
  - las primeras jubilares
  lexicon: jubileo
  rationale: Se conserva el plural del inglés POB para la referencia cronológica del texto, sin forzar una singularización que podría alterar la construcción del pasaje.
- source_word: live
  english_pob_choice: while he was still alive
  chosen_spanish: mientras todavía estaba vivo
  alternatives_spanish:
  - mientras aún vivía
  - en vida
  lexicon: vivir
  rationale: La formulación expresa con claridad la circunstancia temporal del original y mantiene el tono narrativo del pasaje.
theological_decisions:
- issue: Transmisión de la autoridad patriarcal/ejemplar
  english_pob_reading: Enoch commanded and testified to his son and to his sons' sons until the day of his death.
  chosen_spanish_reading: Enoc mandó y dio testimonio a su hijo y a los hijos de sus hijos hasta el día de su muerte.
  alternative_spanish_readings:
  - Enoc ordenó y testificó a su hijo y a sus nietos hasta el día de su muerte
  - Enoc dio mandato y testimonio a su hijo y a los descendientes de sus hijos hasta el día de su muerte
  rationale: La redacción mantiene la estructura de autoridad y testimonio heredado, sin suavizarla ni convertirla en una paráfrasis moral general. También preserva la continuidad genealógica del texto.
  doctrine_reference: Transmisión de la instrucción y el testimonio en la tradición antediluviana; no se introduce doctrina adicional.
translation_notes:
  revision_awareness: El pasaje fue revisado previamente y se mantuvo sin cambios en el pase más reciente; la presente redacción sigue el acuerdo alto reportado y no introduce ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se conserva "Enoc" como forma española estándar del nombre propio.
  - Se mantiene una sintaxis bíblica clara y directa, sin calco excesivo del inglés.
  - No se usan términos eclesiásticos más cargados como "mandamiento" o "atestiguó" porque no aportan ventaja clara sobre el sentido narrativo del pasaje.
