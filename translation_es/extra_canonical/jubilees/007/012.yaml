translation:
  language: es
  text: 'Y Cam supo que su padre había maldecido a su hijo menor, y le desagradó que hubiera maldecido a su hijo; y se apartó de su padre, él y sus hijos con él: Cus, Mizraim, Put y Canaán.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: father had cursed his youngest son
  english_pob_choice: had cursed his youngest son
  chosen_spanish: había maldecido a su hijo menor
  alternatives_spanish:
  - había maldecido a su hijo más joven
  - había maldecido a su hijo pequeño
  lexicon: curse = maldecir; youngest = menor
  rationale: «Maldecido» preserva la fuerza verbal de la maldición. «Menor» comunica el valor comparativo de youngest sin introducir una connotación afectiva de tamaño o ternura.
- source_word: it displeased him
  english_pob_choice: it displeased him
  chosen_spanish: le desagradó
  alternatives_spanish:
  - le dolió
  - le molestó
  lexicon: displease = desagradar
  rationale: «Le desagradó» mantiene el juicio emocional/volitivo directo del original sin intensificarlo ni interpretarlo como dolor físico.
- source_word: he separated from his father
  english_pob_choice: he separated from his father
  chosen_spanish: se apartó de su padre
  alternatives_spanish:
  - se separó de su padre
  - se retiró de su padre
  lexicon: separate = apartarse/separarse
  rationale: «Se apartó» suena natural en español y conserva la idea de distanciamiento relacional. Se evita una formulación demasiado literal que suene rígida.
- source_word: Cush and Mizraim and Put and Canaan
  english_pob_choice: Cush and Mizraim and Put and Canaan
  chosen_spanish: Cus, Mizraim, Put y Canaán
  alternatives_spanish:
  - Cush, Mizraim, Put y Canaán
  lexicon: proper names transliteration
  rationale: «Cus» sigue la forma castellana habitual para Cush. «Mizraim», «Put» y «Canaán» se conservan como nombres propios reconocibles y transparentes.
theological_decisions:
- issue: La maldición paterna sobre el hijo menor y la ruptura familiar de Cam
  english_pob_reading: And Ham knew that his father had cursed his youngest son, and it displeased him that he had cursed his son; and he separated from his father
  chosen_spanish_reading: Cam entendió la maldición y reaccionó apartándose de su padre
  alternative_spanish_readings:
  - Cam se enojó con su padre y se apartó de él
  - Cam se sintió ofendido y se separó de su padre
  rationale: 'La formulación española conserva la secuencia causal del texto: conocimiento de la maldición, desagrado ante ella y separación. No se añade una motivación más específica que la que el texto da.'
  doctrine_reference: Narrativa genealógica de Génesis/Jubileos; no implica una tesis doctrinal explícita adicional.
translation_notes:
  revision_awareness: La fuente ge'ez no está disponible en el paquete (texto vacío), por lo que la redacción española se apoya en el texto inglés auditado de POB como representación accesible del pasaje. No hubo revisiones aplicadas ni notas previas; el contexto de revisión indica acuerdo alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y claro, sin añadir explicaciones interpretativas al cuerpo del versículo.
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Los nombres propios se conservan de forma consistente y legible para lectores hispanohablantes.
