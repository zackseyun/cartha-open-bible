translation:
  language: es
  text: 'Y estos son los hijos de Sem: Elam, Asur, Arpajshad —este nació dos años después del diluvio—, y Lud y Aram.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእሉ፡ ውሉደ፡ ሴም፡
  english_pob_choice: And these are the sons of Shem
  chosen_spanish: Y estos son los hijos de Sem
  alternatives_spanish:
  - Y estos son los descendientes de Sem
  - Y estos son los hijos de Sem
  lexicon: hijos / descendientes
  rationale: El ge'ez presenta la fórmula genealógica directa; en español, 'hijos' reproduce con claridad el patrón bíblico y la relación genealógica inmediata sin añadir distancia interpretativa.
- source_word: አሱር
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Asur
  - Asiria
  lexicon: nombre propio
  rationale: Se conserva el nombre personal/toponímico como nombre propio transliterado en forma breve y reconocible en español, siguiendo el valor del original y del contexto genealógico.
- source_word: አርፋክስድ
  english_pob_choice: Arpachshad
  chosen_spanish: Arpajshad
  alternatives_spanish:
  - Arpaxad
  - Arpajshad
  lexicon: nombre propio
  rationale: Se mantiene una transliteración que refleje el valor consonántico del nombre hebreo y sea publicable en español. 'Arpajshad' conserva mejor la secuencia consonántica que una adaptación más castellanizada.
- source_word: ዝንቱ፡ ትውልደ፡ ክልኤ፡ ዓም፡ እምድኅረ፡ አይኅ፡
  english_pob_choice: —this one was born two years after the flood—
  chosen_spanish: —este nació dos años después del diluvio—
  alternatives_spanish:
  - —este nació dos años después del diluvio—
  - —este fue engendrado dos años después del diluvio—
  lexicon: after the flood / born
  rationale: El ge'ez indica el dato temporal del nacimiento; 'nació' es la opción natural y fiel en español para un enunciado cronológico genealógico. 'Diluvio' traduce adecuadamente አይኅ en este contexto.
theological_decisions:
- issue: Cronología del nacimiento de Arpajshad
  english_pob_reading: this one was born two years after the flood
  chosen_spanish_reading: este nació dos años después del diluvio
  alternative_spanish_readings:
  - este fue engendrado dos años después del diluvio
  - este nació dos años después del Diluvio
  rationale: El texto ge'ez añade un dato histórico-cronológico dentro de la genealogía. Se mantiene sin suavizarlo ni convertirlo en glosa; 'diluvio' conserva el referente del juicio de Noé sin cargarlo doctrinalmente más allá de lo que el texto afirma.
  doctrine_reference: Génesis 11:10; Jubileos 7:18
translation_notes:
  revision_awareness: 'La revisión automatizada corrigió un error de segmentación que había arrastrado el contenido de Jubileos 7:19 al presente versículo. Se ha seguido el texto ge''ez de 7:18, que enumera a los hijos de Sem: Elam, Asur, Arpajshad, Lud y Aram, con la nota cronológica sobre Arpajshad.'
  spanish_consistency_notes:
  - Se mantiene 'diluvio' para አይኅ como equivalente estándar en contexto bíblico narrativo.
  - Se conserva 'Sem' como forma tradicional y ampliamente reconocible en español.
  - No se introduce 'Mesías', 'Yahvé' ni otras terminologías no presentes en este versículo.
  - La puntuación con raya larga reproduce la incisión explicativa del original y de la auditoría inglesa.
