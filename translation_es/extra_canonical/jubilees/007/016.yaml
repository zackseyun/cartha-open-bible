translation_notes:
  revision_awareness: La versión corrige la dirección de Ne'elatama'uk a 'hacia el sur', conforme a la revisión auditada que identifica el ge'ez አዜብ como 'south' y no 'north'.
  spanish_consistency_notes:
  - Se mantiene 'Lubar' y las formas propias de los topónimos, sin normalizarlos ni castellanizarlos.
  - Se usa 'oriente' como equivalente natural de 'east' y 'mar' para 'sea', sin ampliar el referente.
  - No se añaden notas al pie porque el texto español no requiere una alternativa textual anclada.
