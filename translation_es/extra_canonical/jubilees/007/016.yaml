translation:
  language: es
  text: 'Y he aquí, estas tres ciudades están cerca del monte Lubar: Sedeqetelebab, delante del monte, hacia el oriente; Ne''elatama''uk, hacia el sur; y Adataneses, hacia el mar.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: cities
  english_pob_choice: these three cities
  chosen_spanish: estas tres ciudades
  alternatives_spanish:
  - estas tres urbes
  - estos tres lugares
  lexicon: ciudad
  rationale: Mantiene el sentido geográfico concreto de la lista y conserva el demostrativo de proximidad del texto base.
- source_word: near Mount Lubar
  english_pob_choice: near Mount Lubar
  chosen_spanish: cerca del monte Lubar
  alternatives_spanish:
  - junto al monte Lubar
  - próximas al monte Lubar
  lexicon: cerca de
  rationale: Expresa relación espacial directa sin añadir implicaciones interpretativas.
- source_word: toward its east
  english_pob_choice: in front of the mountain toward its east
  chosen_spanish: delante del monte, hacia el oriente
  alternatives_spanish:
  - frente al monte, hacia el este
  - ante el monte, hacia el oriente
  lexicon: oriente
  rationale: '''Oriente'' es una equivalencia natural y digna de ''east''; conserva la orientación espacial y el matiz descriptivo de la lista.'
- source_word: toward the south
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - hacia mediodía
  lexicon: sur
  rationale: La revisión auditada corrige la dirección a 'south'; en español se vierte de forma directa y clara como 'sur'.
- source_word: toward the sea
  english_pob_choice: toward the sea
  chosen_spanish: hacia el mar
  alternatives_spanish:
  - al mar
  - en dirección al mar
  lexicon: mar
  rationale: Conserva el rasgo topográfico del original sin precisar qué mar se entiende.
