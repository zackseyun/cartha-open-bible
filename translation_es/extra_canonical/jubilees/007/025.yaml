base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/025.yaml
  text: The thoughts and desires of man imagine what is vain and evil continually, and the Lord destroyed everything from the face of the earth because of the evil of their deeds and because of blood.
  footnotes:
  - marker: a
    text: Or 'are evil continually'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:48Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: rendered the first clause about human thoughts/desires being continually evil, and the second clause about the Lord destroying everything from the face of the earth because of their evil deeds and blood.'
translation:
  language: es
  text: Los pensamientos y deseos del ser humano imaginan continuamente lo vano[a] y lo malo, y Yahvé destruyó todo de la faz de la tierra a causa de la maldad de sus obras y a causa de la sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «piensan vanamente y mal continuamente».'
    reason: Se preserva la alternativa registrada en la auditoría inglesa para la primera cláusula, adaptada a un español natural.
lexical_decisions:
- source_word: ሕሊናሁ / ወፈቃዱ
  english_pob_choice: The thoughts and desires of man
  chosen_spanish: Los pensamientos y deseos del hombre
  alternatives_spanish:
  - Los pensamientos y deseos de los hombres
  - La mente y el deseo del hombre
  lexicon: thoughts/desires
  rationale: El ge'ez nombra dos facultades/impulsos humanos; en español, «pensamientos y deseos» reproduce el paralelismo sin forzar una glosa psicológica excesiva.
- source_word: ይኄሊ፡
  english_pob_choice: imagine
  chosen_spanish: imaginan
  alternatives_spanish:
  - piensan
  - consideran
  lexicon: think/consider/imagine
  rationale: El contexto y la revisión inglesa resaltan el valor de actividad mental; «imaginan» conserva la idea de formar en la mente, no solo de existir o ser.
- source_word: ከንተ፡
  english_pob_choice: vain
  chosen_spanish: lo vano
  alternatives_spanish:
  - vanidad
  - lo inútil
  lexicon: vain/emptiness
  rationale: La revisión inglesa subraya la necesidad de conservar el matiz de vanidad/vanidad vacía; «lo vano» es breve y natural en español bíblico contemporáneo.
- source_word: ወእኩየ፡
  english_pob_choice: evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo perverso
  lexicon: evil/bad
  rationale: Mantiene el paralelismo con «lo vano» y permite una construcción idiomática sin perder la carga moral del término.
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - Dios
  lexicon: divine name/title
  rationale: El testimonio griego/inglés aquí cita el título divino sin preservar explícitamente el nombre; en español, «el Señor» sigue ese expediente auditado y evita introducir una lectura no atestiguada por el texto base de esta unidad.
- source_word: ኵሎ
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - todas las cosas
  lexicon: all/everything
  rationale: «Todo» expresa la totalidad del juicio con naturalidad en español y corresponde al alcance del término.
- source_word: እም ፳፰ ገጸ፡ ምድር
  english_pob_choice: from the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de la faz de la tierra
  - de la superficie de la tierra
  lexicon: face of the earth
  rationale: Conserva la imagen semítica tradicional sin sonar demasiado calcado; «de sobre» refuerza la idea de remoción desde la superficie.
- source_word: እኩይ፡ ምግባሮሙ
  english_pob_choice: the evil of their deeds
  chosen_spanish: la maldad de sus obras
  alternatives_spanish:
  - la maldad de sus hechos
  - el mal de sus obras
  lexicon: evil deeds
  rationale: «Obras» es el equivalente bíblico más natural; «maldad de sus obras» reproduce el juicio moral del original sin simplificarlo a una sola palabra.
- source_word: ደም፡
  english_pob_choice: blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - sangre derramada
  - la sangre derramada
  lexicon: blood
  rationale: Se mantiene el sustantivo simple para no añadir una especificación no explícita, aunque el contexto sugiera sangre derramada.
theological_decisions:
- issue: Extensión del juicio divino
  english_pob_reading: the Lord destroyed everything from the face of the earth
  chosen_spanish_reading: el Señor destruyó todo de sobre la faz de la tierra
  alternative_spanish_readings:
  - el Señor destruyó todo de la faz de la tierra
  - el Señor borró todo de sobre la faz de la tierra
  rationale: La formulación conserva la universalidad del juicio y la imagen espacial del original sin convertirla en una paráfrasis interpretativa.
  doctrine_reference: Juicio divino universal / diluvio en Génesis 6–8 y Jubileos 7
- issue: Relación entre culpa moral y violencia
  english_pob_reading: because of the evil of their deeds and because of blood
  chosen_spanish_reading: a causa de la maldad de sus obras y a causa de la sangre
  alternative_spanish_readings:
  - por la maldad de sus obras y por la sangre
  - a causa de sus obras malas y de la sangre
  rationale: 'Se conserva la doble causalidad del texto: conducta mala y sangre. No se especifica si la sangre alude a derramamiento violento o a culpa de sangre, porque el pasaje no lo desarrolla aquí.'
  doctrine_reference: Responsabilidad moral y violencia de la generación antediluviana
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un borrador que no correspondía al ge''ez y restableció dos núcleos del verso: la actividad mental humana descrita como vana y mala continuamente, y el juicio de destrucción debido a la maldad de las obras y a la sangre. También se advirtió que el ge''ez incluye tanto la idea de ‘pensar/imaginar’ como la de ‘vano’, por lo que la redacción española conserva ambos matices.'
  spanish_consistency_notes:
  - Se mantuvo «el Señor» siguiendo el audit trail inglés para el título divino en esta unidad, sin introducir una normalización a Yahvé que no aparece en el texto auditado.
  - Se prefirió «lo vano» para representar el matiz de emptiness/vanity señalado por la revisión, evitando reducir la cláusula a una simple afirmación de maldad.
  - «De sobre la faz de la tierra» conserva el registro bíblico y la imagen semítica del original sin caer en un calco áspero.
  - «Sangre» se dejó sin ampliación interpretativa para respetar la ambigüedad controlada del pasaje.
