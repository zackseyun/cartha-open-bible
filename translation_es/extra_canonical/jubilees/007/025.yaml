revisions:
- from: Los pensamientos y deseos del hombre imaginan lo vano[a] y lo malo continuamente, y el Señor destruyó todo de sobre la faz de la tierra a causa de la maldad de sus obras y a causa de la sangre.
  to: Los pensamientos y deseos del ser humano imaginan continuamente lo vano[a] y lo malo, y Yahvé destruyó todo de la faz de la tierra a causa de la maldad de sus obras y a causa de la sangre.
  rationale: 'Se ajusta ''el Señor'' a ''Yahvé'' para cumplir la terminología del proyecto; se mejora la naturalidad de la primera cláusula con ''del ser humano''; y se simplifica ''de sobre la faz'' a ''de la faz'' sin pérdida de sentido. Se mantiene la estructura semántica central del original: facultades humanas, imaginación de lo vano y malo, continuidad temporal, destrucción total, y doble causalidad por obras malas y sangre.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:11:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del ge''ez y la auditoría inglesa: conserva ''pensamientos y deseos'', el matiz verbal de actividad mental (''imaginan''), la dupla ''vano y malo'', la continuidad temporal, y la doble causalidad del juicio por obras malas y por sangre. Sin embargo, ''del hombre imaginan'' suena torpe en español porque hace que ''pensamientos y deseos'' aparezcan como sujeto agente autónomo; una formulación con ''del ser humano'' mejora la naturalidad sin perder el sentido. Además, el uso de ''el Señor'' no se alinea con la política terminológica del proyecto, que prefiere ''Yahvé'' en el texto principal cuando no hay razón documentada suficiente para mantener el enmascaramiento tradicional.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero presenta dos problemas de estilo/terminología: 1) ''del hombre imaginan'' es comprensible pero poco idiomático; 2) ''de sobre la faz de la tierra'' es aceptable, aunque ''de la faz de la tierra'' suena más natural en español actual y conserva la imagen bíblica. El resto del versículo lee bien y mantiene un registro bíblico contemporáneo.'
  glossary_alignment: 'Hay desalineación con el glosario del proyecto en እግዚአብሔር: el borrador usa ''el Señor'', pero la pauta general exige ''Yahvé'' en el texto principal. No hay base aquí para preferir una convención de ocultamiento del nombre divino. Los demás términos clave están bien encaminados: ''pensamientos y deseos'', ''imaginan'', ''lo vano'', ''lo malo'', ''la sangre''.'
  issues:
  - severity: medium
    issue: Uso de 'el Señor' en lugar de 'Yahvé'.
    rationale: La política terminológica del proyecto pide 'Yahvé' en el texto principal para el nombre/título divino, salvo excepción documentada. La justificación del borrador apela al inglés auditado, pero no muestra una razón suficiente desde la evidencia fuente para apartarse del estándar del proyecto.
  - severity: low
    issue: '''Los pensamientos y deseos del hombre imaginan'' suena poco natural en español.'
    rationale: Aunque semánticamente posible, en español resulta más idiomático expresar que los pensamientos y deseos 'se inclinan a imaginar' o mantener un genérico humano más natural, como 'del ser humano'. Esto mejora legibilidad sin cambiar el contenido.
  - severity: low
    issue: '''de sobre la faz de la tierra'' es algo pesado.'
    rationale: La imagen tradicional se conserva mejor y con más naturalidad en español con 'de la faz de la tierra'. 'De sobre' no es incorrecto, pero suena más calcado.
  revised_spanish_text: Los pensamientos y deseos del ser humano imaginan continuamente lo vano[a] y lo malo, y Yahvé destruyó todo de la faz de la tierra a causa de la maldad de sus obras y a causa de la sangre.
  revised_footnotes:
  - marker: a
    text: 'O: «piensan vanamente y mal continuamente».'
    reason: Se preserva la alternativa registrada en la auditoría inglesa para la primera cláusula, adaptada a un español natural.
  revision_rationale: 'Se ajusta ''el Señor'' a ''Yahvé'' para cumplir la terminología del proyecto; se mejora la naturalidad de la primera cláusula con ''del ser humano''; y se simplifica ''de sobre la faz'' a ''de la faz'' sin pérdida de sentido. Se mantiene la estructura semántica central del original: facultades humanas, imaginación de lo vano y malo, continuidad temporal, destrucción total, y doble causalidad por obras malas y sangre.'
