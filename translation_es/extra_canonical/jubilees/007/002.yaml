base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/002.yaml
  text: And he kept its fruit, and gathered it in that year, in the seventh month. And he made wine from it, and put it into a vessel, and kept it until the fifth year, until the first day.
  footnotes:
  - marker: a
    text: Or 'until the first day of the first month.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:49Z'
    unchanged: false
    changes_summary: Changed 'guarded' to 'kept' for more natural formal English and adjusted the ending to 'the first day of the first month' for smoother, more accurate phrasing.
translation:
  language: es
  text: Y conservó su fruto, y lo recogió en aquel año, en el séptimo mes. Y hizo vino de él, y lo puso en un recipiente, y lo guardó hasta el quinto año, hasta el primer día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዓመት / year
  english_pob_choice: that year
  chosen_spanish: aquel año
  alternatives_spanish:
  - ese año
  - en ese año
  lexicon: year
  rationale: La referencia temporal apunta al mismo año de la cosecha; «aquel año» reproduce el deíctico del inglés POB sin forzar una precisión no presente en el ge'ez.
- source_word: ወዐቀበ / kept
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - conservó
  - mantuvo
  lexicon: keep
  rationale: «Guardó» expresa bien la idea de preservar algo para uso posterior y mantiene la fuerza de resguardo del contexto de vino almacenado.
- source_word: ፍሬሁ / its fruit
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su fruto
  - el fruto de él
  lexicon: fruit
  rationale: Se conserva el posesivo breve y natural en español; el referente es la vid o su cosecha según el contexto del pasaje.
- source_word: ወወደየ / put into
  english_pob_choice: put it into a vessel
  chosen_spanish: lo puso en un recipiente
  alternatives_spanish:
  - lo puso en un vaso
  - lo colocó en un recipiente
  lexicon: put, vessel
  rationale: «Recipiente» es suficientemente general para no estrechar el sentido del objeto de almacenamiento; evita especificar un tipo de vasija no determinado por el texto.
- source_word: ንዋይ / vessel
  english_pob_choice: vessel
  chosen_spanish: recipiente
  alternatives_spanish:
  - vasija
  - vaso
  lexicon: vessel
  rationale: El ge'ez permite un contenedor genérico; «recipiente» preserva esa amplitud mejor que una forma más concreta.
- source_word: ቀዳሚት / first
  english_pob_choice: the first day
  chosen_spanish: el primer día
  alternatives_spanish:
  - el día primero
  lexicon: first day
  rationale: Se traduce literalmente sin añadir «del mes», porque el límite textual revisado en el audit trail termina en «until the first day».
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail: el final del versículo debe quedar en «hasta el primer día», sin añadir «del primer mes», porque esa expansión fue corregida como una mala delimitación del texto ge''ez. También respeté la lectura inglesa revisada de «kept» como acción de guardar/conservar el fruto y el vino.'
  spanish_consistency_notes:
  - Usé un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - No añadí nota de variante porque el texto español queda alineado con la delimitación final revisada del versículo.
  - Mantuve la secuencia verbal simple para reflejar la parataxis del original.
