base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/005.yaml
  text: And he caused all their flesh to ascend on the altar, and he placed all their offering mixed with oil upon it, and afterward he poured wine into the fire that was on the altar, and put incense on the altar, and caused a pleasing fragrance to ascend, acceptable before the LORD his God.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:46Z'
    unchanged: false
    changes_summary: Changed 'frankincense' to 'incense' for better lexical accuracy, since the source more generally refers to incense/aromatic substance rather than specifically frankincense. No other changes needed.
translation:
  language: es
  text: E hizo subir toda su carne sobre el altar, y puso sobre él toda su ofrenda mezclada con aceite; y después derramó vino en el fuego que estaba sobre el altar, y puso incienso sobre el altar, y hizo subir un aroma agradable, aceptable delante de Yahvé su Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሥጋሆሙ
  english_pob_choice: all their flesh
  chosen_spanish: toda su carne
  alternatives_spanish:
  - toda su carne
  - toda la carne de ellos
  lexicon: σάρξ / carne
  rationale: Conservo la concreción corporal de 'carne' sin suavizarla a una paráfrasis como 'los cuerpos'. El posesivo singular 'su' en español cubre naturalmente el plural del referente colectivo.
- source_word: መሥዋዕቶሙ
  english_pob_choice: their offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su ofrenda
  - sus ofrendas
  lexicon: מִנְחָה / προσφορά / ofrenda
  rationale: El contexto sacrificial pide 'ofrenda' en singular colectivo, porque el inglés POB también trata la acción como una unidad ritual. 'Sus ofrendas' es posible, pero fragmenta innecesariamente la escena.
- source_word: ልዉሰ፡ በቅብዕ
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - ungida con aceite
  lexicon: שמן / aceite
  rationale: '''Mezclada con aceite'' sigue de cerca la relación material indicada por el texto y coincide con el inglés. ''Ungida'' sería más idiomática en ciertos contextos, pero introduce una connotación cultual que el pasaje no exige aquí.'
- source_word: ወይነ
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: יין / vino
  rationale: Mantengo la equivalencia directa y transparente con el término de bebida fermentada usado en el rito.
- source_word: ዘዲበ፡ ምሥዋዕ
  english_pob_choice: that was on the altar
  chosen_spanish: que estaba sobre el altar
  alternatives_spanish:
  - que estaba sobre el altar
  - que ardía sobre el altar
  lexicon: מִזְבֵּחַ / altar
  rationale: La construcción describe ubicación, no solo combustión. 'Estaba sobre el altar' evita añadir una imagen no explicitada, aunque el fuego sea implícito por el contexto inmediato.
- source_word: መዐዛ፡ ሠናየ
  english_pob_choice: a pleasing fragrance
  chosen_spanish: un aroma agradable
  alternatives_spanish:
  - un aroma agradable
  - un olor agradable
  lexicon: רֵיחַ נִיחוֹחַ / aroma agradable
  rationale: '''Aroma agradable'' suena más digno y natural en español bíblico actual que ''olor agradable'', y preserva la noción de fragancia aceptable ante Dios.'
theological_decisions:
- issue: Nombre divino en una fórmula de aceptación cultual
  english_pob_reading: acceptable before the LORD his God
  chosen_spanish_reading: aceptable delante de Yahvé su Dios
  alternative_spanish_readings:
  - aceptable delante del Señor su Dios
  - aceptable ante Yahvé, su Dios
  rationale: Sigo el estándar del proyecto para el Tetragrámaton con 'Yahvé'. Mantengo la relación posesiva 'su Dios' y la idea de aceptación cultual sin suavizarla a una mera aprobación subjetiva.
  doctrine_reference: YHWH rendering policy; sacrificial acceptance formula
- issue: Valor del humo/fragancia ascendente como resultado ritual
  english_pob_reading: caused a pleasing fragrance to ascend
  chosen_spanish_reading: hizo subir un aroma agradable
  alternative_spanish_readings:
  - hizo subir un olor agradable
  - causó que subiera un aroma agradable
  rationale: Conservo el verbo dinámico de ascenso para respetar la imagen del texto fuente y el tono ritual. 'Hizo subir' refleja la acción sin convertirla en mera descripción olfativa.
  doctrine_reference: Sacrificial ascent imagery; ritual language
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'frankincense' por 'incense' por mayor precisión léxica. La redacción española usa 'incienso', que coincide con esa revisión y evita especificar erróneamente la resina concreta.
  spanish_consistency_notes:
  - Usé 'Yahvé' para el nombre divino conforme a la norma del proyecto.
  - Mantuve la sintaxis ritual en una secuencia coordinada cercana al texto fuente, sin ampliar el contenido.
  - Conservé 'incienso' y no 'olíbano', porque el audit trail inglés revisado ya corrigió la especificación demasiado estrecha.
  - Usé 'altar' de manera uniforme para el mismo referente cultual.
  - Elegí un registro bíblico moderno, claro y sobrio, sin calcos arcaizantes innecesarios.
