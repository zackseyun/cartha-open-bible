  yaml_path: translation/extra_canonical/jubilees/007/003.yaml
  text: 'On the new moon of the first month, he made a feast on that day with rejoicing, and he made a burnt offering to the LORD: one young bull, one ram, seven yearling sheep, and one male goat, so that he might make atonement for himself and for his sons.'
  footnotes:
