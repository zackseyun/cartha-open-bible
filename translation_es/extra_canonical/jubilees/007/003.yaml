    text: Or 'And on that day he made a feast'.
    reason: previous_rendering
  - marker: b
    text: Or 'seven sheep'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:45Z'
    unchanged: false
    changes_summary: Updated 'young ox' to 'young bull' for more natural sacrificial terminology, and 'kid of the goats' to 'male goat' for clearer formal English. No other changes needed.
translation:
  language: es
  text: 'En la luna nueva del primer mes, hizo un banquete[a] ese día con alegría, y ofreció un holocausto a Yahvé: un toro joven, un carnero, siete ovejas de un año[b] y un macho cabrío, para que hiciera expiación por sí mismo y por sus hijos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «e hizo un banquete ese día».'
    reason: alternative_reading
  - marker: b
    text: 'O: «siete ovejas»; el ge''ez especifica animales de un año.'
    reason: alternative_reading
lexical_decisions:
- source_word: በ ፳፫ሠርቀ፡ ወርኀ፡ ቀዳሚት።
  english_pob_choice: On the new moon of the first month
  chosen_spanish: En la luna nueva del primer mes
  alternatives_spanish:
  - En la novilunio del primer mes
  - En la luna nueva del primer mes, al comienzo del mes
  lexicon: luna nueva
  rationale: El ge'ez señala explícitamente el inicio calendárico; en español bíblico natural, 'luna nueva' comunica el marcador ritual sin perder el sentido del mes nuevo. 'Novilunio' sería más técnico pero menos transparente para lectura pública.
- source_word: በፍሥሓ፡
  english_pob_choice: with rejoicing
  chosen_spanish: con alegría
  alternatives_spanish:
  - con regocijo
  - gozoso
  lexicon: alegría
  rationale: '''ፍሥሓ'' expresa gozo/alegría festiva. ''Con alegría'' es claro y digno en español moderno; ''regocijo'' también sería válido, pero suena más marcado y menos natural en este sintagma.'
- source_word: ጽንሓሐ፡
  english_pob_choice: a burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda quemada
  - sacrificio totalmente quemado
  lexicon: holocausto
  rationale: El término cultual tradicional en español para este sacrificio es 'holocausto', y preserva la referencia técnica del rito. 'Ofrenda quemada' explicaría el sentido, pero perdería la forma sacrificial establecida.
- source_word: ለእግዚአብሔር፡
  english_pob_choice: to the LORD
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  - a Dios
  lexicon: Yahvé
  rationale: La norma del proyecto exige 'Yahvé' para el nombre divino. Aquí el ge'ez corresponde al nombre de Dios en contexto de sacrificio, por lo que se mantiene el nombre propio y no el reemplazo reverencial.
- source_word: ፳፮
  english_pob_choice: one young bull
  chosen_spanish: un toro joven
  alternatives_spanish:
  - un becerro
  - un novillo
  lexicon: toro joven
  rationale: El texto revisado en inglés prefirió 'young bull' frente a 'young ox'. En español, 'toro joven' o 'novillo' comunican mejor el animal sacrificial que 'becerro'; 'toro joven' conserva la fuerza formal y la claridad.
- source_word: ፳፯
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho carnero
  - un borrego macho
  lexicon: carnero
  rationale: '''Carnero'' es el equivalente directo y estándar para el macho ovino adulto sacrificial.'
- source_word: ዘዘ፡ ዓመት፡
  english_pob_choice: seven yearling sheep
  chosen_spanish: siete corderos de un año
  alternatives_spanish:
  - siete ovejas de un año
  - siete corderos añales
  lexicon: corderos de un año
  rationale: La revisión del inglés resaltó que el ge'ez especifica animales 'de un año'. En español, 'corderos de un año' transmite la edad y mantiene el referente sacrificial; 'ovejas de un año' sería menos preciso por el sexo/edad del animal en este contexto.
- source_word: ፴
  english_pob_choice: one male goat
  chosen_spanish: un macho cabrío
  alternatives_spanish:
  - un macho de las cabras
  - un cabrío macho
  lexicon: macho cabrío
  rationale: '''Macho cabrío'' es la designación española natural y cultual para el macho caprino ofrecido en sacrificio. Evita la perífrasis y conserva el registro bíblico.'
- source_word: ያስተስሪ፡
  english_pob_choice: so that he might make atonement
  chosen_spanish: para que hiciera expiación
  alternatives_spanish:
  - para que hiciera expiación y reconciliación
  - para expiar
  lexicon: hacer expiación
  rationale: El verbo ge'ez expresa el efecto expiatorio del sacrificio. 'Hiciera expiación' reproduce la fuerza técnica sin sustituirla por una explicación más amplia que el texto no desarrolla.
theological_decisions:
- issue: Nombre divino en el contexto sacrificial
  english_pob_reading: to the LORD
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  - al Dios
  rationale: Aunque el inglés usa 'LORD' como convención editorial, el proyecto español pide restaurar el nombre divino donde el origen lo implica. En un rito sacrificial, el referente es el nombre de pacto, por lo que se mantiene 'Yahvé'.
  doctrine_reference: Éxodo 3:15; convención editorial del proyecto sobre יהוה / YHWH
- issue: Expresión del sacrificio expiatorio
  english_pob_reading: so that he might make atonement for himself and for his sons
  chosen_spanish_reading: para que hiciera expiación por sí mismo y por sus hijos
  alternative_spanish_readings:
  - para hacer expiación por sí mismo y por sus hijos
  - para que se expiara a sí mismo y a sus hijos
  rationale: El ge'ez y el inglés auditado presentan el fin expiatorio del rito, no un acto genérico de purificación. 'Hiciera expiación' conserva el valor cultual y evita diluir la categoría sacrificial.
  doctrine_reference: Levítico 16; uso cultual de כפר / expiación
translation_notes:
  revision_awareness: 'El borrador toma en cuenta dos revisiones críticas del audit trail: (1) la omisión en inglés de ''la luna nueva del primer mes'', que en ge''ez es un marcador calendárico explícito; y (2) la precisión sacrificial de ''yearling sheep'', que se refleja en ''corderos de un año''. También integra la revisión de ''young bull'' y ''male goat'' en términos españoles naturales y cultuales.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme a la convención del proyecto para יהוה, en lugar de 'Señor'.
  - '''Holocausto'' se mantiene como término sacrificial técnico; no se sustituye por una explicación.'
  - '''Expiación'' se conserva para el valor cultual del verbo, sin parafrasearlo como simple perdón.'
  - '''Luna nueva'' comunica el inicio del mes de forma bíblica y comprensible en español.'
  - '''Corderos de un año'' refleja el detalle revisado del texto fuente y evita perder la referencia de edad.'
