- source_word: Sedeqetelebab
  english_pob_choice: Sedeqetelebab
  chosen_spanish: Sedeqetelebab
  alternatives_spanish:
  - Sedeqetelebab (transliterado)
  lexicon: proper name transliteration
  rationale: El texto inglés POB conserva el nombre como transliteración del etiópico y no lo traduce en el cuerpo principal. Se mantiene igual en español por auditariedad y porque el significado subyacente es incierto en la forma transmitida.
theological_decisions:
- issue: Nombre de la esposa y posible sentido de justicia/rectitud
  english_pob_reading: Sedeqetelebab is transliterated from the Ethiopic; the name may preserve an underlying meaning related to righteousness, but the form is left as a name in the main text.
  chosen_spanish_reading: Se conserva «Sedeqetelebab» como nombre propio en el texto principal, sin traducirlo como virtud.
  alternative_spanish_readings:
  - «Rectitud»
  - «Justicia»
  - «Sedeqetelebab» con nota explicativa
  rationale: Aunque el nombre podría contener una raíz relacionada con justicia o rectitud, la forma transmitida funciona aquí como nombre propio. Traducirlo en el cuerpo borraría una tensión textual que el POB inglés mantiene.
  doctrine_reference: Principio de transparencia textual y conservación de nombres transmitidos; no hay afirmación doctrinal directa que requiera glosa devocional.
translation_notes:
  revision_awareness: La revisión inglesa trasladó el marcador de nota desde «Noah» al final del versículo para que acompañara al nombre «Sedeqetelebab»; la versión española sigue esa ubicación, anclando la nota en el nombre relevante.
  spanish_consistency_notes:
  - Se mantiene el patrón de la POB de conservar transliteraciones cuando el sentido exacto es incierto o secundario.
  - No se introduce «SEÑOR» ni terminología teológica ajena, porque el versículo no lo requiere.
  - La puntuación y el orden reflejan con naturalidad el español bíblico sin añadir contenido interpretativo.
