translation:
  language: es
  text: Pero Sem permaneció con su padre Noé, y edificó una ciudad cerca de su padre, junto al monte, y la llamó con el nombre de su esposa, Sedeqetelebab[7:15].
  philosophy: optimal-equivalence
  footnotes:
  - marker: '7:15'
    text: Sedeqetelebab está transliterado del etiópico; el nombre puede conservar un sentido subyacente relacionado con la rectitud, pero aquí se mantiene como nombre propio en el texto principal.
    reason: lexical_alternative
