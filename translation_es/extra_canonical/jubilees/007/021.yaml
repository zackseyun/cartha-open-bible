base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/021.yaml
  text: And uncleanness and all lawlessness. For because of these three things the flood came upon the earth[7:21], because of the fornication by which the Watchers committed fornication contrary to the command of their ordinances, going after the daughters of men, and they took for themselves wives from all whom they chose, and they made the beginning of uncleanness.
  footnotes:
  - marker: '7:21'
    text: The sequence Naphidim / Naphil / Elyo reflects difficult giant-group terminology in the Ethiopic text. Some scholars compare these with forms like Nephilim and Elioud, but the exact relationships are debated.
    reason: textual_variant
  - marker: a
    text: Or 'transgressed against the command of their ordinances after the daughters of men'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:46Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez text: restored ''uncleanness,'' ''all lawlessness,'' the causal statement about the flood, the Watchers'' fornication/transgression after the daughters of men, their taking wives, and their making the beginning of uncleanness.'
translation:
  language: es
  text: La impureza y toda iniquidad. Porque por causa de estas tres cosas vino el diluvio sobre la tierra, por la fornicación por la cual los Vigilantes fornicaron contra el mandato de sus ordenanzas, yendo tras las hijas de los hombres, y tomaron para sí mujeres de entre todas las que escogieron, y dieron comienzo a la impureza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወርኵስ / uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - inmundicia ritual
  - impureza moral
  lexicon: רוּחַ/טֻמְאָה semantic field equivalent; Ge'ez ወርኵስ reflects ritual/moral defilement.
  rationale: En español, «impureza» conserva el campo semántico de contaminación moral/ritual sin sonar tan arcaico como «inmundicia». Aquí el contexto del versículo vincula impureza con la conducta sexual y la corrupción, por lo que «impureza» es fiel y natural.
- source_word: ዐመፃ / all lawlessness
  english_pob_choice: all lawlessness
  chosen_spanish: toda iniquidad
  alternatives_spanish:
  - toda ilegalidad
  - toda maldad
  - toda injusticia
  lexicon: ἀνομία / lawlessness semantic range used in POB as moral/covenantal lawlessness.
  rationale: «Iniquidad» transmite bien la idea de desviación culpable y mantiene un registro bíblico claro en español. «Ilegalidad» sería demasiado moderno y técnico; «maldad» perdería el matiz de quebrantamiento de norma.
- source_word: ዝሙት / fornication
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - relación sexual ilícita
  lexicon: Lexical sexual immorality term.
  rationale: Se conserva «fornicación» porque refleja directamente el término fuente y mantiene la fuerza lexical que el POB inglés preserva. En este pasaje, además, el término está ligado a la transgresión de los Vigilantes.
- source_word: ዘዘመዉ / committed fornication
  english_pob_choice: committed fornication
  chosen_spanish: fornicaron
  alternatives_spanish:
  - cometieron fornicación
  - se prostituyeron sexualmente
  lexicon: Verbal cognate construction.
  rationale: «Fornicaron» reproduce con concisión la construcción verbal y evita una expansión innecesaria. La repetición retórica del sustantivo y el verbo en español sigue bien el efecto del original.
- source_word: ትጉሃን / Watchers
  english_pob_choice: Watchers
  chosen_spanish: Vigilantes
  alternatives_spanish:
  - Centinelas
  - Vigiladores
  lexicon: Proper designation for the angelic beings in 1 Enoch/Jubilees tradition.
  rationale: «Vigilantes» es el equivalente español más reconocible y directo para el grupo angelológico llamado Watchers. «Centinelas» puede funcionar, pero es menos estándar en este corpus.
- source_word: በድኅረ፡ አዋልደ፡ ሰብእ፡ / after the daughters of men
  english_pob_choice: going after the daughters of men
  chosen_spanish: yendo tras las hijas de los hombres
  alternatives_spanish:
  - después de las hijas de los hombres
  - siguiendo a las hijas de los hombres
  lexicon: Directional/relational phrase with sexual pursuit nuance.
  rationale: «Yendo tras» conserva el matiz de búsqueda/pursuit sexual que el inglés audit trail explicita con «going after». «Después de» sería demasiado literal y oscuro en español.
- source_word: አንስተ / wives
  english_pob_choice: wives
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - mujeres para sí
  lexicon: Marriage term in context.
  rationale: Se mantiene «mujeres» como en el inglés POB porque el texto fuente dice «mujeres» y no necesariamente enfatiza el estatuto jurídico de «esposas»; además el movimiento narrativo es la apropiación de mujeres escogidas.
- source_word: መቅድመ ርኵሰ / made the beginning of uncleanness
  english_pob_choice: made the beginning of uncleanness
  chosen_spanish: dieron comienzo a la impureza
  alternatives_spanish:
  - hicieron el comienzo de la impureza
  - comenzaron la impureza
  lexicon: Idiomatic causative expression.
  rationale: «Dieron comienzo a» es la forma española más natural para conservar la idea de iniciar algo negativo. «Comenzaron la impureza» suena menos idiomático y puede debilitar el causativo.
theological_decisions:
- issue: Relación causal entre las tres cosas y el diluvio
  english_pob_reading: For because of these three things the flood came upon the earth
  chosen_spanish_reading: Porque por causa de estas tres cosas vino el diluvio sobre la tierra
  alternative_spanish_readings:
  - Pues por estas tres cosas vino el diluvio sobre la tierra
  - Porque a causa de estas tres cosas llegó el diluvio sobre la tierra
  rationale: Se preserva la causalidad explícita del texto y el orden narrativo. «Vino el diluvio» mantiene el valor de acontecimiento que irrumpe sobre la tierra sin introducir interpretación adicional.
  doctrine_reference: No doctrinal claim beyond the etiological explanation in Jubilees.
- issue: Transgresión de los Vigilantes contra el mandato de sus ordenanzas
  english_pob_reading: committed fornication contrary to the command of their ordinances
  chosen_spanish_reading: fornicaron contra el mandato de sus ordenanzas
  alternative_spanish_readings:
  - transgredieron el mandato de sus ordenanzas
  - pecaron contra el mandato de sus ordenanzas
  rationale: El español mantiene la tensión entre sexualidad ilícita y desobediencia normativa sin suavizarla. «Mandato de sus ordenanzas» conserva el lenguaje legal/estatutario del original y del audit trail.
  doctrine_reference: Angelología de Jubileos/1 Enoc; no formulación dogmática cristiana normativa.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió el borrador erróneo previo y restableció el contenido completo del versículo: impureza, iniquidad, causalidad del diluvio, fornicación/transgresión de los Vigilantes, toma de mujeres y comienzo de la impureza. También se evitó insertar notas sin anclaje textual, para corregir el error de validación anterior.'
  spanish_consistency_notes:
  - Se usó «Vigilantes» para Watchers de manera consistente con el corpus apocalíptico.
  - Se prefirió «impureza» sobre «inmundicia» para un registro bíblico moderno y claro.
  - Se mantuvo «fornicación» porque el texto destaca explícitamente la dimensión sexual de la transgresión.
  - No se introdujeron corchetes de notas porque no había necesidad de variantes textuales ancladas en este versículo.
