translation:
  language: es
  text: Estos son los hijos de Noé. Y en el vigésimo octavo jubileo, Noé comenzó a mandar las ordenanzas y los mandamientos a los hijos de sus hijos, y todos los juicios que él conocía; y dio testimonio a sus hijos de que debían practicar la justicia, cubrir la vergüenza de su carne, bendecir a su Creador, honrar al padre y a la madre, amar cada uno a su prójimo, y guardarse de la fornicación, de la impureza y de toda injusticia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ordinances and the commandments
  english_pob_choice: ordinances and the commandments
  chosen_spanish: las ordenanzas y los mandamientos
  alternatives_spanish:
  - los estatutos y los mandamientos
  - las prescripciones y los mandatos
  lexicon: ordenanzas / mandamientos
  rationale: Conserva la doble serie normativa del inglés POB sin fusionarla. «Ordenanzas» y «mandamientos» son formas naturales en español bíblico y mantienen la distinción retórica del original.
- source_word: judgments
  english_pob_choice: all the judgments that he knew
  chosen_spanish: todos los juicios que él conocía
  alternatives_spanish:
  - todas las sentencias que él conocía
  - todas las decisiones jurídicas que él conocía
  lexicon: juicios
  rationale: «Juicios» conserva el valor legal-normativo de the English POB «judgments» y evita reducirlo a simples opiniones o criterios.
- source_word: do righteousness
  english_pob_choice: do righteousness
  chosen_spanish: practicar la justicia
  alternatives_spanish:
  - hacer justicia
  - obrar rectitud
  lexicon: justicia
  rationale: «Practicar la justicia» expresa bien el verbo ético habitual y mantiene la fuerza covenantal/legal de δικαιοσύνη sin sonar artificial.
- source_word: cover the shame of their flesh
  english_pob_choice: cover the shame of their flesh
  chosen_spanish: cubrir la vergüenza de su carne
  alternatives_spanish:
  - cubrir la desnudez de su carne
  - cubrir la vergüenza de su cuerpo
  lexicon: carne
  rationale: Se conserva «carne» porque el inglés POB retiene la literalidad y el lenguaje de vergüenza corporal; «desnudez» sería una aclaración posible, pero el texto recibido dice «shame of their flesh».
- source_word: their Creator
  english_pob_choice: their Creator
  chosen_spanish: su Creador
  alternatives_spanish:
  - su Hacedor
  - su Criador
  lexicon: Creador
  rationale: «Creador» es la forma natural y reverente en español para el título teológico del texto.
- source_word: honor father and mother
  english_pob_choice: honor father and mother
  chosen_spanish: honrar al padre y a la madre
  alternatives_spanish:
  - honrar a padre y madre
  - respetar al padre y a la madre
  lexicon: honrar
  rationale: Mantiene la fórmula proverbial y solemne del mandamiento con sujeto genérico implícito, como en el inglés POB.
- source_word: neighbor
  english_pob_choice: each one love his neighbor
  chosen_spanish: que cada uno amara a su prójimo
  alternatives_spanish:
  - que cada uno amara a su vecino
  - que cada uno amara al otro
  lexicon: prójimo
  rationale: «Prójimo» es el equivalente bíblico más estable y fiel al valor relacional amplio de «neighbor».
- source_word: fornication
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - relaciones sexuales ilícitas
  lexicon: fornicación
  rationale: Se mantiene el término tradicional y técnico para preservar la categoría moral específica que el texto distingue de «uncleanness».
- source_word: uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: impureza
  rationale: «Impureza» reproduce bien la categoría ética y ritual sin sobreespecificar más de lo que permite el texto fuente.
- source_word: injustice
  english_pob_choice: all injustice
  chosen_spanish: toda injusticia
  alternatives_spanish:
  - toda maldad
  - toda iniquidad
  lexicon: injusticia
  rationale: «Injusticia» es la correspondencia directa y mantiene la amplitud de la prohibición final.
theological_decisions:
- issue: Literalidad de la fórmula corporal «shame of their flesh»
  english_pob_reading: cover the shame of their flesh
  chosen_spanish_reading: cubrir la vergüenza de su carne
  alternative_spanish_readings:
  - cubrir la desnudez de su carne
  - cubrir su vergüenza corporal
  rationale: Se conserva la tensión textual entre vergüenza y carne sin suavizarla. La versión española no sustituye el lenguaje por una eufemización más interpretativa.
  doctrine_reference: Antropología bíblica y modestia corporal
- issue: Serie moral acumulativa sin reinterpretar
  english_pob_reading: do righteousness ... bless ... honor ... love ... guard themselves
  chosen_spanish_reading: practicar la justicia ... bendecir ... honrar ... amar ... se guardaran
  alternative_spanish_readings:
  - hacer justicia ... bendecir ... respetar ... amar ... evitar
  - obrar rectitud ... bendecir ... honrar ... amar ... apartarse
  rationale: Se preserva la secuencia exhortativa acumulativa del original, sin condensarla en una sola exhortación general.
  doctrine_reference: Ética pactual y mandamientos familiares
- issue: «Judgments» como normas/juicios legales
  english_pob_reading: all the judgments that he knew
  chosen_spanish_reading: todos los juicios que él conocía
  alternative_spanish_readings:
  - todas las sentencias que él conocía
  - todas las disposiciones que él conocía
  rationale: Se mantiene el lenguaje legal amplio de la fuente. «Juicios» evita perder el peso normativo y la posible referencia a decisiones o sentencias conocidas por Noé.
  doctrine_reference: Ley y juicio en literatura parabíblica
translation_notes:
  revision_awareness: El texto inglés auditado muestra alta concordancia y no tiene notas ni revisiones aplicadas. La redacción española sigue de cerca la secuencia y el contenido del inglés POB, sin depender de una paráfrasis libre ni introducir elementos ajenos al pasaje.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino explícito; aquí el texto habla de «su Creador», por lo que no corresponde introducirlo.
  - Se conserva el registro bíblico estándar con «fornicación», «impureza» e «injusticia» para mantener las categorías morales diferenciadas.
  - Se mantiene el paralelismo de verbos en cadena, ajustando solo la sintaxis para que el español fluya con naturalidad.
