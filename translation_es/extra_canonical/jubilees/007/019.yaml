  text: These are the sons of Noah. And in the twenty-eighth jubilee Noah began to command the ordinances and the commandments to his sons' sons, and all the judgments that he knew; and he testified to his sons that they should do righteousness, and that they should cover the shame of their flesh, and that they should bless their Creator, and honor father and mother, and each one love his neighbor, and guard themselves from fornication and uncleanness and all injustice.
