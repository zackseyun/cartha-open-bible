    timestamp: '2026-04-23T14:49:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y en la séptima semana, en su primer año, en este jubileo, Noé plantó una vid en el monte sobre el cual había descansado el arca, cuyo nombre era Lubar, uno de los montes de Ararat; y en el cuarto año produjo fruto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበሱባዔ፡ ሳብዕ፡
  english_pob_choice: And in the seventh week
  chosen_spanish: Y en la séptima semana
  alternatives_spanish:
  - Y en la semana séptima
  lexicon: '7'
  rationale: El ge'ez expresa un marcador temporal de 'séptima semana'; el inglés POB lo vierte de forma directa, y en español 'semana' preserva el paralelismo calendárico sin añadir interpretación.
- source_word: በ ቀዳማይ፡ ዓመት፡
  english_pob_choice: in its first year
  chosen_spanish: en su primer año
  alternatives_spanish:
  - en el primer año de ella
  lexicon: año
  rationale: Se mantiene el referente de la semana/jubileo como antecedente implícito, como en el inglés POB, con español natural y transparente.
- source_word: ወይነ፡
  english_pob_choice: vine
  chosen_spanish: vid
  alternatives_spanish:
  - parra
  - cepa de vid
  lexicon: vid
  rationale: '''Vid'' es el equivalente más preciso y digno en español para la planta de la uva, y encaja con el sentido botánico del texto.'
- source_word: ኀበ፡ ደብር፡
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: monte
  rationale: '''Monte'' reproduce el valor geográfico y bíblico de ''mountain'' sin perder naturalidad en español; además armoniza con ''uno de los montes de Ararat''.'
- source_word: ዘስሙ፡ ሉባር፡
  english_pob_choice: whose name was Lubar
  chosen_spanish: cuyo nombre era Lubar
  alternatives_spanish:
  - que se llamaba Lubar
  lexicon: nombre
  rationale: La relativa posesiva conserva la relación sintáctica del original y la formulación del POB, manteniendo el nombre propio sin adornos.
- source_word: እምአድባረ፡ አራራት፡
  english_pob_choice: one of the mountains of Ararat
  chosen_spanish: uno de los montes de Ararat
  alternatives_spanish:
  - uno de los montes del Ararat
  - uno de los montes llamados Ararat
  lexicon: Ararat
  rationale: '''De Ararat'' sigue la relación genitiva del texto y la opción del inglés POB; ''montes'' conserva el plural del original y evita simplificar indebidamente.'
- source_word: ገብረ፡ ፍሬ፡
  english_pob_choice: it produced fruit
  chosen_spanish: produjo fruto
  alternatives_spanish:
  - dio fruto
  - fructificó
  lexicon: fruto
  rationale: '''Produjo fruto'' mantiene el aspecto verbal del inglés POB y el sentido agrícola del ge''ez con un español claro y no arcaizante.'
theological_decisions:
- issue: Cronología jubilar/semanal
  english_pob_reading: And in the seventh week, in its first year, in this jubilee
  chosen_spanish_reading: Y en la séptima semana, en su primer año, en este jubileo
  alternative_spanish_readings:
  - Y en la séptima semana, en el primer año de ella, en este jubileo
  rationale: Se conserva la estructura cronológica del texto sin convertirla en una explicación interpretativa. 'Jubileo' se mantiene como término técnico del marco literario.
  doctrine_reference: Calendario jubilar de Jubileos
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el ge'ez, la traducción inglesa POB y la revisión más reciente; no se registraron cambios editoriales, y la redacción española sigue de cerca la estructura del original sin introducir notas textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva 'Ararat' sin españolización para respetar el nombre geográfico tradicional y el uso del texto fuente.
  - No se introduce puntuación interpretativa adicional más allá de la necesaria para reflejar la cláusula coordinada final.
