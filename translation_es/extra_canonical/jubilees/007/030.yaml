translation:
  language: es
  text: Porque así Enoc, el padre de tu padre,[a] mandó a su hijo Matusalén, y Matusalén mandó a su hijo Lamec, y Lamec me mandó todo lo que sus padres le habían mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el padre de tu padre Matusalén, mandó a su hijo».'
    reason: Preserva la lectura alternativa/documentada en la nota del POB inglés y la historia de revisión sobre la sintaxis genealógica.
lexical_decisions:
- source_word: Enoch
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Henoc
  lexicon: Nombre propio bíblico
  rationale: En español bíblico estándar, «Enoc» es la forma más reconocible y fiel del nombre; mantiene la referencia al personaje sin introducir una transliteración menos asentada.
- source_word: commanded
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: verbo de mandato
  rationale: «Mandó» comunica de manera natural el acto de transmitir instrucciones autoritativas. «Ordenó» podría sonar más duro o militar; «encargó» debilita la fuerza del mandato.
- source_word: his son Methuselah
  english_pob_choice: his son Methuselah
  chosen_spanish: a su hijo Matusalén
  alternatives_spanish:
  - a Matusalén, su hijo
  - a su hijo Metusalén
  lexicon: relación filial + nombre propio
  rationale: La sintaxis española necesita conservar con claridad que Matusalén es el complemento directo de «mandó» y a la vez el hijo de Enoc. «Matusalén» es la forma usual del nombre en español.
- source_word: everything
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  lexicon: pronombre totalizador
  rationale: «Todo» reproduce la amplitud del original sin añadir matices no presentes. «Todas las cosas» es más pesado; «todo lo demás» introduce un contraste inexistente.
- source_word: his fathers
  english_pob_choice: his fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres/padres anteriores
  lexicon: parentesco ancestral
  rationale: En este contexto genealógico, «sus padres» conserva la cadena de transmisión familiar indicada por el texto y por el contexto de generaciones sucesivas. «Antepasados» explicita más de lo que el texto exige.
theological_decisions:
- issue: Cadena de transmisión de autoridad genealógica
  english_pob_reading: Enoch, Methuselah, Lamech, and then me—everything transmitted through the fathers is conveyed as commanded instruction.
  chosen_spanish_reading: Enoc, Matusalén y Lamec aparecen como eslabones de una transmisión autoritativa de instrucciones, sin suavizar la fuerza del mandato.
  alternative_spanish_readings:
  - enseñó
  - transmitió
  - dejó
  rationale: El pasaje no habla meramente de pasar información, sino de un encargo autoritativo heredado. «Mandó» mantiene esa fuerza y respeta la estructura del texto.
  doctrine_reference: Transmisión de instrucción patriarcal en genealogías apocalípticas; no introduce doctrinas extrañas, solo preserva la fuerza del mandato.
translation_notes:
  revision_awareness: La revisión inglesa corrigió una mala colocación de «Methuselah» en la cláusula anterior; la versión española refleja correctamente que Matusalén es el hijo al que Enoc mandó, y evita repetir el error sintáctico.
  spanish_consistency_notes:
  - 'Se mantiene el orden genealógico del texto: Enoc -> Matusalén -> Lamec -> yo.'
  - Se usa un español sobrio y publicable, evitando calcos innecesarios.
  - No se introducen notas al pie porque no hay variante textual o ambigüedad que requiera anclaje en este verso.
