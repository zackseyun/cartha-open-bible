base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/020.yaml
  text: And in the twenty-eighth jubilee, Noah began to command the ordinances and the commandments to his children's children, and all the judgments[a] that he knew. And he testified to his children that they should do righteousness, and cover the shame of their flesh, and bless their Creator,[b] and honor father and mother, and love each one his neighbor, and guard their souls from fornication and uncleanness and all iniquity.
  footnotes:
  - marker: a
    text: Or "justice".
    reason: lexical_choice
  - marker: b
    text: Lit. "the one who created them".
    reason: literal_translation
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:46Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez verse: Noah, in the twenty-eighth jubilee, instructs his descendants in ordinances and commandments, exhorts them to righteousness, modesty, blessing the Creator, honoring parents, loving one another, and guarding themselves from fornication.'
translation:
  language: es
  text: Y en el vigésimo octavo jubileo, Noé comenzó a mandar los estatutos y los mandamientos a los hijos de sus hijos, y todos los juicios[a] que conocía. Y dio testimonio a sus hijos de que practicaran la justicia, y cubrieran la vergüenza de su carne, y bendijeran a su Creador[b], y honraran al padre y a la madre, y amaran cada uno a su prójimo, y guardaran sus almas de la fornicación y la impureza y de toda iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el que los creó».
    reason: source_note
lexical_decisions:
- source_word: ወበ፳ወ፰ ኢዮቤልዩ
  english_pob_choice: And in the twenty-eighth jubilee
  chosen_spanish: Y en el vigésimo octavo jubileo
  alternatives_spanish:
  - Y en el jubileo veintiocho
  lexicon: Leslau
  rationale: Conserva el marcador cronológico técnico del texto jubilar sin añadir interpretación.
- source_word: ኖኅ፡ አኀዘ፡ ይእዘዝ
  english_pob_choice: Noah began to command
  chosen_spanish: Noé comenzó a mandar
  alternatives_spanish:
  - Noé comenzó a ordenar
  - Noé empezó a mandar
  lexicon: Leslau
  rationale: ‘Mandar’ expresa la función exhortativa/imperativa del geʿez sin suavizar el verbo.
- source_word: ሥርዐተ፡ ወትእዛዛተ፡
  english_pob_choice: the ordinances and the commandments
  chosen_spanish: los estatutos y los mandamientos
  alternatives_spanish:
  - las ordenanzas y los mandamientos
  - los preceptos y los mandamientos
  lexicon: Leslau
  rationale: ‘Estatutos’ y ‘mandamientos’ mantienen la distinción jurídica y normativa del original y son claros en español bíblico contemporáneo.
- source_word: ፍትሐ
  english_pob_choice: judgments
  chosen_spanish: los juicios
  alternatives_spanish:
  - la justicia
  - las sentencias
  - los decretos judiciales
  lexicon: Leslau
  rationale: El contexto legal junto a ‘estatutos’ y ‘mandamientos’ permite ‘juicios’ como equivalente de decisiones/juzgamientos normativos; se preserva la tensión lexical que en inglés quedó en nota como ‘justice’.
- source_word: ከመ፡ ይግበሩ፡ ጽድቀ፡
  english_pob_choice: that they should do righteousness
  chosen_spanish: de que hicieran justicia
  alternatives_spanish:
  - de que practicaran la justicia
  - de que obraran rectitud
  - de que hicieran rectitud
  lexicon: Leslau
  rationale: ‘Hicieran justicia’ reproduce la fuerza ética-activa de ‘do righteousness’ y enlaza con el campo semántico de ፍትሐ sin forzar una sola equivalencia fija.
- source_word: ኃፍረተ፡ ሥጋሆሙ፡
  english_pob_choice: the shame of their flesh
  chosen_spanish: la vergüenza de su carne
  alternatives_spanish:
  - la vergüenza de su cuerpo
  - la desnudez vergonzosa de su carne
  lexicon: Leslau
  rationale: ‘Carne’ conserva la literalidad y la carga corporal/moral del texto, sin convertirla en una paráfrasis moderna.
- source_word: ለዘፈጠሮሙ
  english_pob_choice: their Creator
  chosen_spanish: su Creador
  alternatives_spanish:
  - a su Creador
  - al que los creó
  - a quien los creó
  lexicon: Leslau
  rationale: La forma posesiva española es natural y mantiene la relación creador-creatura del geʿez; el sentido literal subyacente queda reflejado en la nota.
- source_word: አበ፡ ወእመ፡
  english_pob_choice: father and mother
  chosen_spanish: al padre y a la madre
  alternatives_spanish:
  - al padre y a la madre
  - a padre y madre
  lexicon: Leslau
  rationale: Se conserva el paralelismo nominativo y la obligación de honor en forma idiomática española.
- source_word: አሐዱ፡ አሐዱ፡ ቢጾ፡
  english_pob_choice: each one his neighbor
  chosen_spanish: cada uno a su prójimo
  alternatives_spanish:
  - cada uno a su vecino
  - cada uno al otro
  lexicon: Leslau
  rationale: ‘Prójimo’ comunica la reciprocidad ética del término sin limitarlo a una cercanía geográfica.
- source_word: ይዕቀቡ፡ ነፍሶሙ፡
  english_pob_choice: guard their souls
  chosen_spanish: guardaran sus almas
  alternatives_spanish:
  - cuidaran sus almas
  - guardaran su vida
  lexicon: Leslau
  rationale: ‘Almas’ preserva el sustantivo explícito del original; ‘guardar’ refleja la idea de vigilar/proteger.
- source_word: እምዝሙት፡ ወእምርኵስ፡ ወእምኵሉ፡ ዐመፃ
  english_pob_choice: from fornication and uncleanness and all iniquity
  chosen_spanish: de la fornicación y la impureza y de toda iniquidad
  alternatives_spanish:
  - de la fornicación, la impureza y toda iniquidad
  - de la inmoralidad sexual y la impureza y de toda maldad
  lexicon: Leslau
  rationale: Se mantiene la secuencia moral del original; ‘fornicación’ es la correspondencia tradicional y precisa para זנות/ζωμή-like sexual immorality in this context, while ‘impureza’ y ‘iniquidad’ conservan el alcance ético general.
theological_decisions:
- issue: ¿Cómo traducir ፍትሐ sin borrar su posible solapamiento entre ‘juicios’ y ‘justicia’?
  english_pob_reading: The English POB chose ‘judgments’ and preserved a footnote alternative ‘justice’.
  chosen_spanish_reading: ‘los juicios’ en el texto principal, con nota para la alternativa ‘justicia’.
  alternative_spanish_readings:
  - la justicia
  - las leyes
  rationale: El contexto legal del pasaje favorece ‘juicios’, pero el campo semántico puede tocar ‘justicia’; la nota evita ocultar esa tensión lexical que el POB también documentó.
  doctrine_reference: lexical fidelity / semantic range
- issue: ¿Cómo representar ‘the shame of their flesh’ sin espiritualizarlo?
  english_pob_reading: The English POB keeps a literal body-oriented phrase.
  chosen_spanish_reading: ‘la vergüenza de su carne’.
  alternative_spanish_readings:
  - la vergüenza de su cuerpo
  - su desnudez vergonzosa
  rationale: ‘Carne’ preserva el lenguaje corpóreo y moral del original y evita una glosa que desplace el foco del texto.
  doctrine_reference: anthropology / modesty ethics
- issue: ¿Cómo traducir ‘their Creator’ respetando el sentido literal y la fluidez?
  english_pob_reading: '‘their Creator’ with note: lit. ‘the one who created them’.'
  chosen_spanish_reading: ‘su Creador’, con nota de literalidad.
  alternative_spanish_readings:
  - al que los creó
  - a quien los creó
  rationale: ‘Su Creador’ es natural en español y conserva la relación posesiva; la nota mantiene visible la literalidad del geʿez.
  doctrine_reference: creation theology
translation_notes:
  revision_awareness: 'Se siguió el pasaje corregido que corresponde a Jubileos 7:20, evitando el material sobrante de 7:21 y la nota errónea sobre los ‘vigilantes’. También se incorporó la cláusula final completa: ‘y de toda iniquidad’.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió ‘estatutos’ y ‘mandamientos’ por su claridad bíblica y por corresponder bien al paralelo geʿez.
  - Se conservó la distinción entre ‘juicios’ y ‘justicia’ con nota, en vez de aplanar el campo semántico.
  - Se usó ‘carne’ de forma literal para no diluir la antropología moral del texto.
  - ‘Creador’ se capitaliza como sustantivo reverente en español bíblico, manteniendo la relación posesiva del original.
