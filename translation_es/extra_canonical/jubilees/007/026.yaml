base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/026.yaml
  text: which they shed in the midst of the earth. He destroyed everything, and I and you, my children, and all that entered with us into the ark were left. And behold, I see before me your deeds, that you are not walking in righteousness; for you have begun to walk in the paths of corruption, and you are separating, each one from his neighbor, and you will fight one with another, and you will not be united.
