  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:48Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Ge''ez text: preservation in the ark, Noah''s observation of their deeds, failure to walk in righteousness, walking in corrupt paths, mutual pursuit/conflict, and lack of unity.'
translation:
  language: es
  text: 'lo que derramaron en medio de la tierra. Él destruyó todo; y quedamos yo y ustedes, mis hijos, y todos los que entraron con nosotros en el arca. Y he aquí, veo delante de mí su conducta: que no están caminando en justicia; porque han comenzado a andar por sendas de corrupción, y se están separando, cada uno de su prójimo, y se pelearán unos con otros, y no estarán unidos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘከዐዉ / ከዐወ
  english_pob_choice: which they shed
  chosen_spanish: lo que derramaron
  alternatives_spanish:
  - lo que vertieron
  - lo que derramaron
  lexicon: Ge'ez verb of pouring out / shedding
  rationale: El verbo ge'ez expresa derramar/verter, no destruir. 'Derramaron' conserva la idea de sangre derramada y evita convertir el relativo en objeto de destrucción.
- source_word: ማእከለ፡ ምድር
  english_pob_choice: in the midst of the earth
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en el centro de la tierra
  - en medio de la tierra
  lexicon: Ge'ez locution for location/medio
  rationale: La frase señala el lugar donde se derramó, no el objeto destruido. 'En medio de la tierra' mantiene la ubicación literal y es natural en español bíblico.
- source_word: ደምሰሰ፡ ኵሎ
  english_pob_choice: He destroyed everything
  chosen_spanish: Él destruyó todo
  alternatives_spanish:
  - Él destruyó todo
  - Él lo destruyó todo
  lexicon: Ge'ez verbal clause with totalizing object
  rationale: '''Ėl destruyó todo'' refleja el totalizador ''everything'' sin añadir un objeto específico ajeno al texto.'
- source_word: ተርፍኩ / ተረፍኩ
  english_pob_choice: were left
  chosen_spanish: quedaron
  alternatives_spanish:
  - quedamos
  - quedaron
  lexicon: Ge'ez verb for remaining/surviving
  rationale: '''Quedaron'' conserva el sentido de supervivencia/resto. En la primera persona coordinada con ''yo y ustedes'' funciona como resultado colectivo preservado.'
- source_word: ቅድሜየ
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - delante de mí
  lexicon: Ge'ez prepositional phrase of presence/face-to-face
  rationale: '''Delante de mí'' expresa la visión/presencia inmediata de Noah sin forzar una lectura espacial excesiva.'
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en justicia
  - en rectitud
  lexicon: Ge'ez term for righteousness/justice
  rationale: '''Justicia'' conserva la fuerza moral y relacional del término. Se prefiere sobre ''rectitud'' por ser más transparente en este contexto exhortativo.'
- source_word: ፍኖተ፡ ሙስና
  english_pob_choice: the paths of corruption
  chosen_spanish: sendas de corrupción
  alternatives_spanish:
  - caminos de corrupción
  - sendas de corrupción
  lexicon: Ge'ez phrase for way/path + corruption
  rationale: '''Sendas'' reproduce el plural figurado de caminos y su registro bíblico; ''corrupción'' traduce la degradación moral sin suavizarla.'
- source_word: ትትፋለጡ / ተፋለጠ
  english_pob_choice: you are separating, each one from his neighbor
  chosen_spanish: se están separando, cada uno de su vecino
  alternatives_spanish:
  - se separan, cada uno de su vecino
  - se están separando, cada uno de su vecino
  lexicon: Ge'ez verb meaning separate/divide from
  rationale: La revisión corrigió la idea de 'ir tras'. 'Se están separando' sigue el valor de división/separación y preserva el matiz progresivo del verbo en contexto.
- source_word: ኅቡረ
  english_pob_choice: united
  chosen_spanish: unidos
  alternatives_spanish:
  - unidos
  - juntos
  lexicon: Ge'ez term for together/combined/one
  rationale: '''Unidos'' reproduce la negación final de cohesión comunitaria y es el equivalente más sobrio en español.'
theological_decisions:
- issue: Relación entre derramamiento de sangre y destrucción total
  english_pob_reading: which they shed in the midst of the earth. He destroyed everything.
  chosen_spanish_reading: lo que derramaron en medio de la tierra. Él destruyó todo.
  alternative_spanish_readings:
  - lo que destruyó en medio de la tierra
  - lo que derramaron, y él destruyó todo
  rationale: La puntuación separa el acto humano de derramar sangre del juicio divino de destrucción total, siguiendo el ajuste revisionado del texto ge'ez. Así se evita una falsa atribución del derramar a la destrucción.
  doctrine_reference: Juicio divino sobre la violencia humana; preservación del remanente en el arca.
- issue: Estado moral descrito como caminar en justicia versus caminos de corrupción
  english_pob_reading: you are not walking in righteousness; for you have begun to walk in the paths of corruption
  chosen_spanish_reading: no están caminando en justicia; porque han comenzado a andar por sendas de corrupción
  alternative_spanish_readings:
  - no caminan en justicia; porque han empezado a andar por sendas de corrupción
  - no están andando en justicia; pues han comenzado a andar por sendas de corrupción
  rationale: Se conserva la antítesis moral entre justicia y corrupción sin suavizarla. 'Caminando' y 'andar' reproducen el paralelismo semita del texto.
  doctrine_reference: Ética del pacto y contraste entre vida justa y corrupción.
- issue: Fragmentación social y falta de unidad
  english_pob_reading: and you are separating, each one from his neighbor, and you will fight one with another, and you will not be united
  chosen_spanish_reading: y se están separando, cada uno de su vecino, y se pelearán unos con otros, y no estarán unidos
  alternative_spanish_readings:
  - y se separan, cada uno de su vecino, y pelearán unos con otros, y no estarán unidos
  - y se apartan, cada uno de su vecino, y se enfrentarán unos con otros, y no estarán unidos
  rationale: El texto describe desunión, conflicto y ruptura comunitaria. 'No estarán unidos' mantiene la conclusión negativa sin introducir un término eclesiástico ajeno al contexto.
  doctrine_reference: Unidad comunitaria como bien moral; condena de la violencia fraterna.
translation_notes:
  revision_awareness: Se siguió la última revisión que corrigió el sentido del verbo de derramar y la separación mutua, evitando la antigua lectura de 'middle of the earth' como objeto de destrucción. El español refleja esa forma revisada y mantiene el contraste entre sangre derramada, destrucción total, preservación en el arca, falta de justicia, corrupción, separación y ausencia de unidad.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo; no hay nombre divino explícito en el texto base.
  - '''Justicia'' se eligió para בְּצֶדֶק/בְּצִדְקָה por fidelidad semántica y claridad pastoral.'
  - No se introdujeron notas al pie porque el texto español no requiere variantes ancladas para este versículo.
