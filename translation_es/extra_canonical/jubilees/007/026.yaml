review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la corrección principal del ge''ez: sangre derramada en medio de la tierra, destrucción total, preservación en el arca, evaluación moral de las obras, caminos de corrupción, separación mutua, conflicto y falta de unidad. Sin embargo, hay dos puntos mejorables: ''sus obras'' atenúa el sentido más amplio de ''your deeds/conduct'', y ''cada uno de su vecino'' suena poco natural en español; además, la concordancia verbal con ''yo y ustedes'' mejora con ''quedamos''.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene giros algo calcados: ''quedaron yo y ustedes'' es menos natural que ''quedamos''; ''cada uno de su vecino'' es torpe en español general y debe ser ''cada uno de su prójimo'' o ''separándose unos de otros''. También conviene suavizar ''sus obras'' a ''su conducta'' o ''sus acciones'' según contexto; aquí ''su conducta'' comunica mejor el sentido exhortativo global.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Justicia', 'corrupción' y 'arca' están bien. No aparecen términos sensibles como Yahvé/Mesías. La decisión 'vecino' no es terminológica sino de naturalidad; 'prójimo' encaja mejor en registro bíblico e interpersonal.
  issues:
  - severity: medium
    issue: Concordancia poco natural en 'quedaron yo y ustedes'
    rationale: Aunque comprensible, en español la coordinación con primera persona favorece 'quedamos yo y ustedes' o mejor simplemente 'quedamos'. Esto preserva el sentido de supervivencia colectiva sin tropiezo sintáctico.
  - severity: medium
    issue: 'Expresión poco idiomática: ''cada uno de su vecino'''
    rationale: La preposición 'de' reproduce bien 'from', pero la frase resultante no suena natural. 'Cada uno de su prójimo' es más bíblico y claro, o bien 'separándose unos de otros'.
  - severity: low
    issue: '''Sus obras'' puede sonar demasiado puntual'
    rationale: El contexto evalúa su conducta moral general, no solo actos aislados. 'Su conducta' o 'sus acciones' comunica mejor el alcance del reproche.
  revised_spanish_text: 'lo que derramaron en medio de la tierra. Él destruyó todo; y quedamos yo y ustedes, mis hijos, y todos los que entraron con nosotros en el arca. Y he aquí, veo delante de mí su conducta: que no están caminando en justicia; porque han comenzado a andar por sendas de corrupción, y se están separando, cada uno de su prójimo, y se pelearán unos con otros, y no estarán unidos.'
  revision_rationale: 'Se hicieron ajustes menores de español sin cambiar el sentido fuente: mejor concordancia verbal (''quedamos''), expresión más natural y eclesialmente legible (''cada uno de su prójimo''), y una formulación más abarcadora del reproche moral (''su conducta''). No se requieren notas nuevas porque no se introduce ambigüedad adicional ni se preservan aquí alternativas necesarias del inglés.'
