  text: and a man his neighbor. And everyone sold himself to do injustice and to shed much blood.
  footnotes:
  - marker: a
    text: Or 'And the earth was filled with injustice, and all flesh corrupted its way and did injustice, and they began to pour out much blood on the earth.'.
