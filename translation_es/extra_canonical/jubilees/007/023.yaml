  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:47Z'
    unchanged: false
    changes_summary: 'Replaced the draft with a rendering that more closely follows the Ge''ez: included ''all flesh,'' reflected the repeated idea of doing injustice/corruption, and rendered the final clause as beginning to pour out much blood on the earth. Removed added details about beasts, birds, and moving things that are not present in this verse''s source text.'
translation:
  language: es
  text: y un hombre a su prójimo. Y todos se vendieron para hacer injusticia y para derramar mucha sangre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሰብእሂ፡ ቢጾ።
  english_pob_choice: and a man his neighbor.
  chosen_spanish: y un hombre a su prójimo.
  alternatives_spanish:
  - y un hombre a su vecino
  - y un hombre, a su prójimo
  lexicon: source phrase with human relational object
  rationale: La construcción ge'ez es breve y elíptica; el sentido auditado en inglés es relacional ('his neighbor'). En español, 'a su prójimo' conserva la relación humana sin introducir un verbo o complemento ajenos al texto.
- source_word: ወኵሉ፡ ተሰይጠ፡
  english_pob_choice: And everyone sold himself
  chosen_spanish: Y todos se vendieron
  alternatives_spanish:
  - Y cada uno se vendió
  - Y todos se entregaron
  lexicon: iterative/passive-reflexive verbal idea
  rationale: El inglés POB entiende una autoventa/autoentrega; 'se vendieron' refleja con fuerza esa idea sin convertirla en una mera decisión abstracta. 'Se entregaron' suavizaría demasiado la fuerza económica/moral del verbo.
- source_word: ይግበር፡ ዐመፃ፡
  english_pob_choice: to do injustice
  chosen_spanish: para hacer injusticia
  alternatives_spanish:
  - para practicar injusticia
  - para obrar injusticia
  lexicon: injustice / unrighteous act
  rationale: '''ዐመፃ'' admite ''injusticia'' en español, conservando el valor moral y legal. Se mantiene el paralelismo verbal del original con ''hacer'' para no ampliar el sentido.'
- source_word: ወከመ፡ ይክዐው፡ ደመ፡ ብዙኀ፡
  english_pob_choice: and to shed much blood
  chosen_spanish: y derramar mucha sangre
  alternatives_spanish:
  - y verter mucha sangre
  - y derramar abundante sangre
  lexicon: shed blood
  rationale: '''Derramar sangre'' es la equivalencia idiomática natural y fiel en español. ''Mucha'' reproduce directamente el cuantificador del ge''ez y del inglés auditado.'
theological_decisions:
- issue: Si la frase inicial debe ampliarse con 'la tierra fue llenada de injusticia' como en otra tradición textual.
  english_pob_reading: And a man his neighbor. And everyone sold himself to do injustice and to shed much blood.
  chosen_spanish_reading: y un hombre a su prójimo. Y todos se vendieron para hacer injusticia y derramar mucha sangre.
  alternative_spanish_readings:
  - Y la tierra se llenó de injusticia, y todos se corrompieron en su camino...
  - Y toda carne corrompió su camino...
  rationale: El expediente revisado confirma que esa ampliación pertenece a una lectura previa incorrecta y no al ge'ez provisto para este versículo. Por fidelidad a la base fuente, se omite cualquier referencia a la tierra o a toda carne.
  doctrine_reference: Fidelidad textual y priorización de la base fuente ge'ez sobre lecturas de otra tradición
- issue: Cómo expresar 'sold himself' sin diluir el matiz moral y social.
  english_pob_reading: everyone sold himself
  chosen_spanish_reading: todos se vendieron
  alternative_spanish_readings:
  - todos se corrompieron
  - todos se entregaron
  rationale: '''Se vendieron'' conserva el carácter de autoalienación y degradación que el inglés POB quiso mantener. En español, evita sustituir el acto concreto por una abstracción más débil.'
  doctrine_reference: Antropología moral del pecado como autoentrega a la injusticia
translation_notes:
  revision_awareness: Se revisó el expediente para evitar la lectura errónea que añadía 'la tierra' y 'toda carne', porque el ge'ez provisto aquí contiene una formulación breve sobre 'un hombre a su prójimo' y 'todos se vendieron' para hacer injusticia y derramar mucha sangre. La traducción española sigue esa base textual directa.
  spanish_consistency_notes:
  - Se usa 'injusticia' para ዐመፃ en coherencia con el valor moral-jurídico del término.
  - Se evita 'siervo' porque el verbo de autoventa requiere la fuerza de 'se vendieron'.
  - Se mantiene el orden coordinado simple para reflejar la tersura del ge'ez y del inglés auditado.
  - No se introducen elementos de otras recensiones o versículos cercanos.
