base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/027.yaml
  text: 'My children, [love] one another. For I see, and behold, the demons have begun to sin against you and against your children, and now I fear for you, that after my death you will shed the blood of men on the earth, and you yourselves will be destroyed from the face of the earth. For everyone who sheds the blood of man[7:27], and everyone who eats the blood of any flesh, will all be destroyed from the earth. And no man who eats blood, or who sheds the blood of man on the earth, will be left; neither seed nor descendants will remain to him under heaven. For into Sheol they will go, and into the place of judgment they will descend, and into the darkness of the deep they will all enter by a violent death. Let no blood appear upon you from all the blood there is in all the days in which you slaughter any beast or cattle or whatever creeps on the earth; and do a good work for your souls by covering with earth that which has been poured out on the face of the earth. And do not be like one
    who eats with the blood, but be strong not to eat blood before you; cover the blood, for thus I have been commanded to testify to you and to your children, together with all flesh. And do not eat the life with the flesh, so that your blood, which is your life, may not be required from the hand of any flesh that sheds it on the earth. For the earth will not be cleansed from the blood that has been poured out upon it, except by the blood of the one who poured it out will the earth be cleansed throughout all its generations. And now, my children, listen: do justice and righteousness, so that you may be planted in righteousness over the face of the whole earth, and your glory may be lifted up before my God, who saved me from the waters of the flood. And behold, go and build for yourselves cities, and plant in them every plant that is on the earth, and every fruit-bearing tree.'
  footnotes:
  - marker: '7:27'
    text: The long instruction on blood, homicide, and agricultural firstfruits is compressed into a single extended verse in the surviving row data, though it likely reflects multiple verse units in fuller editions.
    reason: segmentation_note
  - marker: a
    text: Or 'For everyone who sheds the blood of man[7:27]'.
    reason: previous_rendering
