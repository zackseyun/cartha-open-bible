    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Hijos míos, [amen[a]] unos a otros. Porque veo, y he aquí, los demonios han comenzado a pecar contra ustedes y contra sus hijos; y ahora temo por ustedes, que después de mi muerte derramen la sangre de los hombres sobre la tierra, y ustedes mismos sean destruidos de la faz de la tierra. Porque todo el que derrame la sangre del hombre[b], y todo el que coma sangre de cualquier carne, serán destruidos de la tierra. Y ningún hombre que coma sangre, o que derrame la sangre del hombre sobre la tierra, quedará; ni semilla ni descendencia le quedarán debajo del cielo. Pues al Seol irán, y al lugar de juicio descenderán, y en la oscuridad del abismo todos entrarán por una muerte violenta. Que no haya sangre sobre ustedes de toda la sangre que haya en todos los días en que degüellen cualquier bestia, ganado o cualquier cosa que se arrastre sobre la tierra; y hagan una buena obra para sus almas cubriendo con tierra lo que haya sido derramado sobre la faz de la tierra. Y no sean como quien
    come con la sangre, sino manténganse firmes en no comer sangre en presencia de ustedes; cubran la sangre, porque así se me ha mandado advertirles a ustedes y a sus hijos, junto con toda carne. Y no coman la vida junto con la carne, para que su sangre, que es su vida, no sea requerida de mano de ninguna carne que la derrame sobre la tierra. Porque la tierra no será purificada de la sangre que ha sido derramada sobre ella; solo por la sangre de aquel que la derramó será purificada la tierra a través de todas sus generaciones. Y ahora, hijos míos, escuchen: hagan justicia y rectitud, para que sean plantados en justicia sobre la faz de toda la tierra, y su gloria sea levantada delante de mi Dios, que me salvó de las aguas del diluvio. Y he aquí, vayan y construyan para ustedes ciudades, y planten en ellas toda planta que hay sobre la tierra, y todo árbol que dé fruto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El verbo entre corchetes sigue la cautela del inglés POB: el ge’ez preservado en este tramo contiene una exhortación fraterna, pero la forma exacta del verbo no se despliega de manera transparente en la línea citada.'
    reason: textual_variant
  - marker: b
    text: También puede entenderse, de forma más literal, ‘todo el que derrame la sangre del hombre’ como una formulación jurídica general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ውሉድየ፡ አሐዱ፡ ምስለ፡ እኁሁ
  english_pob_choice: My children, [love] one another.
  chosen_spanish: Hijos míos, [amen] unos a otros.
  alternatives_spanish:
  - Hijos míos, ámense unos a otros.
  - Hijos míos, amense mutuamente.
  lexicon: ame-1
  rationale: El ge’ez preserva una exhortación fraterna, pero el texto disponible no explicita el verbo en forma plena en la línea citada; el inglés POB marca [love] como añadido interpretativo. En español mantengo esa misma cautela con un marcador editorial entre corchetes y un verbo breve y natural, sin convertirlo en una paráfrasis más fuerte de lo que el testimonio base permite.
- source_word: ደመ፡ ሰብእ
  english_pob_choice: the blood of man
  chosen_spanish: la sangre del hombre
  alternatives_spanish:
  - la sangre humana
  - la sangre de los hombres
  lexicon: דם/דם־אדם
  rationale: Conservo el singular genérico como en el inglés POB para mantener la fuerza legal/universal del enunciado. En español, 'el hombre' funciona aquí como genérico humano, y evita suavizar el paralelismo repetido con 'sangre de cualquier carne'.
- source_word: ዘሥጋ
  english_pob_choice: any flesh
  chosen_spanish: cualquier carne
  alternatives_spanish:
  - toda carne
  - todo ser vivo
  lexicon: σάρξ/בשר
  rationale: '''Carne'' mantiene la amplitud semántica del hebraísmo subyacente y la oposición con ''sangre''. ''Cualquier carne'' refleja bien el alcance universal del enunciado sin convertirlo en una categoría zoológica demasiado estrecha.'
- source_word: ሲኦል
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - Sheol
  - sepulcro
  lexicon: שׁאול
  rationale: Uso la forma castellana tradicional 'Seol' para el ámbito de los muertos, conservando el término técnico sin reemplazarlo por una equivalencia interpretativa como 'sepulcro' o 'infierno'.
- source_word: ዘነፍስክሙ
  english_pob_choice: your life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su vida misma
  lexicon: נפשׁ
  rationale: Aquí 'vida' es más fiel y claro que 'alma', porque el contraste fuente es entre sangre y vida. Mantengo la relación antropológica concreta sin cargar el término con una tradición doctrinal posterior.
- source_word: ፍትሐ፡ ወጽድቀ፡
  english_pob_choice: justice and righteousness
  chosen_spanish: justicia y rectitud
  alternatives_spanish:
  - justicia y justicia
  - derecho y rectitud
  lexicon: משפט/צדקה
  rationale: La combinación española conserva el par semántico sin aplanarlo. 'Rectitud' ayuda a distinguir el segundo término del primero y evita repetir 'justicia' dos veces, lo que oscurecería la distinción del original.
- source_word: ምሥዋዐ፡ እግዚአብሔር
  english_pob_choice: the sacrifice/altar of the Lord
  chosen_spanish: delante de mi Dios
  alternatives_spanish:
  - ante mi Dios
  - en la presencia de mi Dios
  lexicon: altar/sacrificio, contexto de primera ofrenda
  rationale: El tramo final de este registro viene comprimido y el contexto remite a ofrendas primicias; sin embargo, el texto proveedor aquí termina en la instrucción de plantar y ofrecer el primer fruto. Como la porción inglesa adjunta no desarrolla el sustantivo técnico con suficiente estabilidad para una equivalencia puntual, opto por una formulación prudente donde el foco sigue en la elevación de la gloria delante de Dios.
theological_decisions:
- issue: Prohibición de beber sangre y fundamento de vida en la sangre
  english_pob_reading: Blood belongs to God as life, so consuming blood and shedding innocent blood incur destruction and impurity.
  chosen_spanish_reading: La sangre se trata como portadora de vida y pertenece al ámbito prohibido por Dios; por eso comerla o derramarla trae destrucción y contaminación.
  alternative_spanish_readings:
  - La sangre simboliza solo la violencia.
  - La sangre se prohíbe únicamente por razones rituales.
  rationale: 'La redacción española conserva la tensión legal y vital del pasaje: no reduce la sangre a un mero símbolo ni la limita a higiene ritual. La conexión entre sangre, vida, juicio y purificación queda explícita, como en la lectura POB.'
  doctrine_reference: Génesis 9:4-6; Levítico 17:10-14
- issue: Seol, lugar de juicio y oscuridad profunda
  english_pob_reading: Those who shed blood descend to Sheol, the place of judgment, and the darkness of the deep by violent death.
  chosen_spanish_reading: Los homicidas descienden al Seol, al lugar de juicio y a la oscuridad del abismo por muerte violenta.
  alternative_spanish_readings:
  - Van al sepulcro sin más especificación.
  - Descienden al infierno.
  rationale: 'Conservo los tres escalones del texto: Seol, juicio y oscuridad del abismo. ''Infierno'' introduciría una carga doctrinal posterior no garantizada por el texto; ''sepulcro'' perdería la dimensión judicial.'
  doctrine_reference: Salmo 16:10; Proverbios 15:24
- issue: Justicia y rectitud como condición de plantación/estabilidad en la tierra
  english_pob_reading: Do justice and righteousness, so that you may be planted in righteousness over the face of the whole earth.
  chosen_spanish_reading: Hagan justicia y rectitud, para que sean plantados en justicia sobre la faz de toda la tierra.
  alternative_spanish_readings:
  - Hagan justicia y santidad.
  - Obren bien para prosperar.
  rationale: 'Mantengo la relación causal ética del texto: la conducta justa tiene como telos ser ''plantados'' en justicia. ''Santidad'' no está en el término fuente y ''prosperar'' debilita la formulación covenantal.'
  doctrine_reference: Isaías 5:7; Salmo 1:3
translation_notes:
  revision_awareness: 'El contexto inglés auditado muestra una corrección importante: la línea dada en el paquete ge’ez es más amplia que la frase inicial aislada del inglés anterior, pues incluye la exhortación sobre los demonios, el miedo tras la muerte, la sangre, el Seol, la prohibición de comer sangre, la purificación de la tierra, y la orden final de justicia, rectitud y plantación. Esta versión española sigue el texto ge’ez completo del paquete y conserva las decisiones de la revisión que amplían el alcance del pasaje.'
  spanish_consistency_notes:
  - Uso 'Seol' de manera consistente para ሲኦል, no 'infierno'.
  - Mantengo 'sangre' en toda la sección para conservar el nexo legal y vital del pasaje.
  - Conservo 'justicia y rectitud' como par fijo en el cierre.
  - He preferido 'hijos míos' y 'ustedes' para un registro bíblico claro y uniforme en español latinoamericano.
  - La primera exhortación queda marcada editorialmente por la incertidumbre del verbo en el testimonio fuente, siguiendo la cautela del POB en inglés.
