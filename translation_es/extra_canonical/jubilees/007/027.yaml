    el que come con la sangre, sino sean firmes en no comer sangre delante de ustedes; cubran la sangre, porque así se me ha mandado testificarles a ustedes y a sus hijos, junto con toda carne. Y no coman la vida junto con la carne, para que su sangre, que es su vida, no sea requerida de la mano de ninguna carne que la derrame sobre la tierra. Porque la tierra no será purificada de la sangre que ha sido derramada sobre ella, excepto por la sangre de aquel que la derramó; la tierra será purificada a través de todas sus generaciones. Y ahora, hijos míos, escuchen: hagan justicia y rectitud, para que sean plantados en justicia sobre la faz de toda la tierra, y su gloria sea levantada delante de mi Dios, que me salvó de las aguas del diluvio. Y he aquí, vayan y constrúyanse ciudades, y planten en ellas toda planta que hay sobre la tierra, y todo árbol que dé fruto.'
  to: 'Hijos míos, [amen[a]] unos a otros. Porque veo, y he aquí, los demonios han comenzado a pecar contra ustedes y contra sus hijos; y ahora temo por ustedes, que después de mi muerte derramen la sangre de los hombres sobre la tierra, y ustedes mismos sean destruidos de la faz de la tierra. Porque todo el que derrame la sangre del hombre[b], y todo el que coma sangre de cualquier carne, serán destruidos de la tierra. Y ningún hombre que coma sangre, o que derrame la sangre del hombre sobre la tierra, quedará; ni semilla ni descendencia le quedarán debajo del cielo. Pues al Seol irán, y al lugar de juicio descenderán, y en la oscuridad del abismo todos entrarán por una muerte violenta. Que no haya sangre sobre ustedes de toda la sangre que haya en todos los días en que degüellen cualquier bestia, ganado o cualquier cosa que se arrastre sobre la tierra; y hagan una buena obra para sus almas cubriendo con tierra lo que haya sido derramado sobre la faz de la tierra. Y no sean como quien come
    con la sangre, sino manténganse firmes en no comer sangre en presencia de ustedes; cubran la sangre, porque así se me ha mandado advertirles a ustedes y a sus hijos, junto con toda carne. Y no coman la vida junto con la carne, para que su sangre, que es su vida, no sea requerida de mano de ninguna carne que la derrame sobre la tierra. Porque la tierra no será purificada de la sangre que ha sido derramada sobre ella; solo por la sangre de aquel que la derramó será purificada la tierra a través de todas sus generaciones. Y ahora, hijos míos, escuchen: hagan justicia y rectitud, para que sean plantados en justicia sobre la faz de toda la tierra, y su gloria sea levantada delante de mi Dios, que me salvó de las aguas del diluvio. Y he aquí, vayan y construyan para ustedes ciudades, y planten en ellas toda planta que hay sobre la tierra, y todo árbol que dé fruto.'
