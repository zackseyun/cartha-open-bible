translation:
  language: es
  text: Y se alegró y bebió algo de este vino, él y sus hijos, con gozo. Y llegó la tarde, y entró en su tienda; y, estando embriagado, se acostó y durmió, y quedó descubierto dentro de su tienda mientras dormía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወተፈሥሐ / rejoiced
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se gozó
  lexicon: N/A
  rationale: El Ge'ez expresa un gozo festivo; en español, «se alegró» comunica bien la reacción inmediata sin elevar el registro más de lo necesario. «Se regocijó» sería más solemne, pero menos natural aquí.
- source_word: ወሰትየ፡ እም ፶፯ዝ፡ ፶፰ / drank some of this wine
  english_pob_choice: drank some of this wine
  chosen_spanish: bebió algo de este vino
  alternatives_spanish:
  - bebió de este vino
  - probó este vino
  lexicon: N/A
  rationale: «Algo de este vino» conserva la idea de una cantidad indeterminada, tal como la traducción inglesa auditada. «Probó» sugeriría solo un sorbo y podría estrechar indebidamente el sentido.
- source_word: ውሉዱ / his sons
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijos
  lexicon: N/A
  rationale: El término genérico «hijos» reproduce el referente familiar del contexto y evita añadir una precisión de género que el texto fuente no exige en español.
- source_word: በፍሥሓ / with joy
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  - alegremente
  lexicon: N/A
  rationale: «Con gozo» mantiene un tono bíblico y formal, y refleja bien la carga celebrativa del término sin sonar arcaizante.
- source_word: ምሴተ / evening
  english_pob_choice: evening
  chosen_spanish: la tarde
  alternatives_spanish:
  - la noche
  - el anochecer
  lexicon: N/A
  rationale: En este contexto narrativo, «la tarde» comunica el cambio de tiempo de forma clara y natural en español. «El anochecer» también es posible, pero suena más descriptivo.
- source_word: ቦአ / went into
  english_pob_choice: went into
  chosen_spanish: entró en
  alternatives_spanish:
  - fue a
  - se metió en
  lexicon: N/A
  rationale: «Entró en» es la correspondencia más directa y natural para el movimiento hacia la tienda.
- source_word: ሰቀላሁ / his tent
  english_pob_choice: his tent
  chosen_spanish: su tienda
  alternatives_spanish:
  - su carpa
  - su pabellón
  lexicon: N/A
  rationale: «Tienda» es la forma tradicional y clara en español bíblico para la vivienda portátil patriarcal, y evita modernizaciones innecesarias.
- source_word: እንዘ፡ ይነውም / being drunk ... slept
  english_pob_choice: being drunk he lay down and slept
  chosen_spanish: estando embriagado, se acostó y durmió
  alternatives_spanish:
  - borracho, se acostó y durmió
  - estando ebrio, se acostó y durmió
  lexicon: N/A
  rationale: «Estando embriagado» conserva el participio circunstancial con un registro bíblico sobrio. «Borracho» sería más coloquial y menos digno.
- source_word: ወተከሥተ / he was uncovered
  english_pob_choice: he was uncovered
  chosen_spanish: quedó descubierto
  alternatives_spanish:
  - estaba descubierto
  - se descubrió
  lexicon: N/A
  rationale: «Quedó descubierto» refleja el estado resultante de manera idiomática en español y preserva la pasividad del original sin sonar forzado.
- source_word: በውስተ፡ ሰቀላሁ / inside his tent
  english_pob_choice: inside his tent
  chosen_spanish: dentro de su tienda
  alternatives_spanish:
  - en su tienda
  - dentro de su carpa
  lexicon: N/A
  rationale: «Dentro de su tienda» mantiene la localización explícita del texto y suena natural en español contemporáneo.
theological_decisions:
- issue: El verso presenta consumo de vino y embriaguez sin comentario moral explícito
  english_pob_reading: Narrative description only; no added moral gloss
  chosen_spanish_reading: Descripción narrativa sin glosa moral añadida
  alternative_spanish_readings:
  - con una nota de condena implícita
  - con una formulación interpretativa más fuerte
  rationale: El texto fuente simplemente relata los hechos. La versión española evita introducir evaluación ética no explicitada en el versículo, preservando la transparencia auditada del POB.
  doctrine_reference: Principio de sobriedad textual; evitar inferencias no sostenidas por el versículo
- issue: La frase final indica desnudez accidental dentro de la tienda mientras dormía
  english_pob_reading: he was uncovered inside his tent while he slept
  chosen_spanish_reading: quedó descubierto dentro de su tienda mientras dormía
  alternative_spanish_readings:
  - estaba descubierto dentro de su tienda mientras dormía
  - quedó desnudo dentro de su tienda mientras dormía
  rationale: «Descubierto» conserva la ambigüedad del original y evita intensificar innecesariamente hacia «desnudo», que puede sugerir más de lo que el texto asegura. Se mantiene así la tensión lexical documentada.
  doctrine_reference: Precisión narrativa; evitar sobreinterpretación
- issue: 'Secuencia temporal del relato: tarde, tienda, embriaguez, sueño'
  english_pob_reading: And it became evening... he went into his tent... he slept
  chosen_spanish_reading: Y llegó la tarde... y entró en su tienda... se acostó y durmió
  alternative_spanish_readings:
  - Y fue la tarde...
  - Cuando llegó la noche...
  rationale: Se conserva el orden de eventos del texto para no reordenar la narrativa. «Llegó la tarde» funciona bien en español y mantiene el flujo del relato.
  doctrine_reference: Fidelidad sintáctica narrativa
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios y el cotejo cruzado mostró alto acuerdo (1.0), por lo que este borrador mantiene la lectura estable del POB inglés sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y legible en español.
  - Se preserva «tienda» como término narrativo patrialcal coherente en todo el pasaje.
  - No se añaden notas al pie porque el texto y la traducción inglesa auditada no preservan variantes o ambigüedades que requieran marcación explícita aquí.
