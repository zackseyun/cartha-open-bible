  yaml_path: translation/extra_canonical/jubilees/007/029.yaml
  text: And in the fifth year make the release[7:29], so that you may release it in righteousness and uprightness, and you will be righteous, and all your planting will prosper.
  footnotes:
  - marker: '7:29'
    text: The command about the fifth year is difficult. 'Make the release' renders a term of letting go or leaving off, likely an agricultural practice tied to the preceding firstfruits legislation.
    reason: alternative_reading
  - marker: a
    text: Or 'and all your planting will be righteous and prosperous.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:50Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y en el quinto año practiquen la liberación[a], para que la practiquen con justicia y rectitud, y ustedes serán justos, y toda su siembra prosperará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «practiquen el descanso» o «practiquen la remisión». El término subyacente es difícil y expresa la idea de soltar o dejar de hacer algo, probablemente una práctica agrícola relacionada con la legislación precedente sobre las primicias.'
    reason: alternative_reading
lexical_decisions:
- source_word: “make the release” (Ge'ez term for letting go/leaving off)
  english_pob_choice: make the release
  chosen_spanish: hagan la liberación
  alternatives_spanish:
  - hagan el descanso
  - hagan la remisión
  - dejen libre la tierra
  lexicon: release / liberación
  rationale: La POB inglesa reconoce que el giro es difícil y que expresa dejar ir o cesar; en español, 'liberación' conserva la idea de soltar/liberar sin fijar indebidamente un tecnicismo agrícola que no está explicitado en el testimonio disponible.
- source_word: righteousness and uprightness
  english_pob_choice: righteousness and uprightness
  chosen_spanish: justicia y rectitud
  alternatives_spanish:
  - justicia e integridad
  - rectitud y justicia
  lexicon: δικαιοσύνη / rectitud; semantic pair
  rationale: '''Justicia y rectitud'' mantiene el paralelismo moral y suena natural en español bíblico contemporáneo, sin borrar la distinción entre el valor legal/covenantal de justicia y la rectitud ética.'
- source_word: you will be righteous
  english_pob_choice: and you will be righteous
  chosen_spanish: ustedes serán justos
  alternatives_spanish:
  - serán rectos
  - serán justos y rectos
  lexicon: righteous / just
  rationale: El texto revisado distingue claramente la justicia de las personas de la prosperidad de la siembra; 'serán justos' refleja ese matiz y evita fusionarlo con la cosecha.
- source_word: all your planting will prosper
  english_pob_choice: and all your planting will prosper
  chosen_spanish: toda su siembra prosperará
  alternatives_spanish:
  - toda su plantación prosperará
  - todo lo que planten prosperará
  lexicon: planting / planting will prosper
  rationale: '''Siembra'' comunica de forma natural el conjunto de lo plantado o sembrado y permite conservar la promesa de prosperidad agrícola sin volverla más abstracta de lo que permite la fuente.'
theological_decisions:
- issue: La relación entre la acción del quinto año y la justicia de la comunidad
  english_pob_reading: make the release ... so that you may release it in righteousness and uprightness, and you will be righteous
  chosen_spanish_reading: hagan la liberación, para que la hagan con justicia y rectitud, y ustedes serán justos
  alternative_spanish_readings:
  - hagan la liberación para justicia y rectitud, y serán justos
  - liberen en justicia y rectitud, y ustedes serán justos
  rationale: La formulación en español preserva que la liberación es un mandato ético, no solo un acto económico, y que la rectitud de la comunidad es resultado o acompañamiento del acto prescrito.
  doctrine_reference: Ética del pacto; obediencia que implica justicia comunitaria
- issue: La distinción revisada entre la justicia de las personas y el éxito de la siembra
  english_pob_reading: and you will be righteous, and all your planting will prosper
  chosen_spanish_reading: y ustedes serán justos, y toda su siembra prosperará
  alternative_spanish_readings:
  - y toda su siembra será justa y prosperará
  - y todo lo que planten será justo y prosperará
  rationale: Se evita la fusión interpretativa que la revisión corregida rechazó. La prosperidad recae en la siembra, mientras que la justicia recae en las personas.
  doctrine_reference: Distinción entre estado moral del pueblo y bendición agrícola
translation_notes:
  revision_awareness: 'La revisión más reciente confirmó que el texto debe mantener dos cláusulas distintas: primero, que ustedes serán justos; segundo, que toda su siembra prosperará. La redacción española sigue esa distinción y evita fusionarlas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el original lo exige; en este versículo no aparece.
  - '''Liberación'' se mantiene como solución transparente ante un término difícil, con nota alternativa para no ocultar la incertidumbre.'
  - Se evita 'SEÑOR' y 'Cristo' porque no corresponden al contenido de este versículo.
  - 'Se conserva el paralelismo moral/agropecuario de la revisión: personas justas, siembra próspera.'
