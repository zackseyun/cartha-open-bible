translation:
  language: es
  text: 'Noé despertó de su embriaguez y supo todo lo que le había hecho su hijo menor; y maldijo a su hijo y dijo: «Maldito sea Canaán; un esclavo vil[7:9] será para sus hermanos»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '7:9'
    text: El etiópico tiene una expresión literalmente parecida a «esclavo de bajeza/servidumbre», no la formulación más familiar de Génesis «siervo de siervos».
    reason: lexical_alternative
lexical_decisions:
- source_word: awoke from his wine
  english_pob_choice: awoke from his wine
  chosen_spanish: despertó de su vino
  alternatives_spanish:
  - se despertó de su vino
  - recobró el sentido después del vino
  lexicon: despertar; vino
  rationale: La construcción expresa salir del estado producido por el vino. «Despertó de su vino» conserva la imagen sin añadir interpretación excesiva.
- source_word: knew everything
  english_pob_choice: knew everything
  chosen_spanish: supo todo
  alternatives_spanish:
  - conoció todo
  - se enteró de todo
  lexicon: saber; todo
  rationale: «Supo todo» es natural en español y mantiene el alcance total del conocimiento atribuido a Noé.
- source_word: his youngest son
  english_pob_choice: his youngest son
  chosen_spanish: su hijo menor
  alternatives_spanish:
  - su hijo más joven
  - su hijo menor de edad
  lexicon: hijo; menor
  rationale: «Menor» comunica la relación de edad/posición familiar sin forzar una precisión ajena al texto.
- source_word: cursed be Canaan
  english_pob_choice: Cursed be Canaan
  chosen_spanish: Maldito sea Canaán
  alternatives_spanish:
  - Sea maldito Canaán
  - Canaán sea maldito
  lexicon: maldito; Canaán
  rationale: La fórmula optativa tradicional es fiel y clara en español bíblico.
- source_word: a lowly slave
  english_pob_choice: a lowly slave
  chosen_spanish: un esclavo degradado
  alternatives_spanish:
  - un esclavo humilde
  - un esclavo de bajeza
  lexicon: esclavo; degradado
  rationale: Se conserva el valor fuerte de δοῦλος/esclavitud y se refleja el matiz adicional de humillación/degradación que el audit trail vincula con el ge'ez, evitando suavizarlo a «siervo».
- source_word: shall he be to his brothers
  english_pob_choice: shall he be to his brothers
  chosen_spanish: será para sus hermanos
  alternatives_spanish:
  - será de sus hermanos
  - será entre sus hermanos
  lexicon: ser; hermanos
  rationale: La preposición «para» reproduce la relación de subordinación destinada por la maldición, de modo natural en español.
theological_decisions:
- issue: Retención del lenguaje de esclavitud en la maldición
  english_pob_reading: a lowly slave rather than the more familiar Genesis wording 'servant of servants.'
  chosen_spanish_reading: un esclavo degradado
  alternative_spanish_readings:
  - un siervo de siervos
  - un siervo humilde
  rationale: La lectura POB destaca que el etiópico no dice la formulación más conocida de Génesis, sino una expresión más dura y socialmente marcada. En español conviene preservar esa tensión con «esclavo degradado», no suavizarla con «siervo».
  doctrine_reference: Jubilees 7:9; eco de Génesis 9:25-27
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión aplicada que movió el marcador de nota para que acompañe a «lowly slave», donde corresponde semánticamente. La redacción española coloca el marcador sobre el equivalente léxico relevante: «esclavo degradado[7:9]».'
  spanish_consistency_notes:
  - Se mantiene «Canaán» como nombre propio tradicional.
  - Se usa «esclavo» de manera consistente con la decisión POB documentada para la fuerza léxica, evitando reemplazarla por «siervo».
  - La puntuación reproduce una sola oración narrativa seguida de discurso directo, adecuada para publicación bíblica en español.
