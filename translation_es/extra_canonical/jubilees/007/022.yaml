base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/022.yaml
  text: And they fathered the children of the Naphidim, and all of them were unlike one another, and they devoured one another; and the giants killed the Naphil, and the Naphil killed the Elyo, and the Elyo mankind.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:46Z'
    unchanged: false
    changes_summary: Replaced the unrelated draft with a translation that reflects the source text about the offspring of the Nephilim, their mutual devouring, and successive killing. Preserved key names/titles (Nephilim, Elyo) rather than paraphrasing beyond the source. The final clause remains terse to match the difficult text.
translation:
  language: es
  text: Y engendraron a los hijos de los Nafidim, y todos ellos eran distintos unos de otros; y se devoraban unos a otros; y los gigantes mataron al Nafil, y el Nafil mató al Elyo, y el Elyo a la humanidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ናፊዲም (Nafidim)
  english_pob_choice: children of the Naphidim
  chosen_spanish: los Nafidim
  alternatives_spanish:
  - los Naphidim
  - los Nephilim
  lexicon: transliteración
  rationale: El audit trail inglés distingue Naphidim de Naphil; por eso conviene conservar Nafidim como nombre propio transliterado en español para no borrar la taxonomía del pasaje. 'Nephilim' la mezclaría con otro término distinto del ge'ez.
- source_word: ኢይትማሰሉ
  english_pob_choice: were unlike one another
  chosen_spanish: eran distintos unos de otros
  alternatives_spanish:
  - no se parecían unos a otros
  - eran desemejantes entre sí
  lexicon: equivalencia semántica
  rationale: La idea central es la falta de semejanza entre ellos; 'distintos unos de otros' mantiene la reciprocidad y suena natural en español sin añadir un matiz que el texto no exige.
- source_word: ወይበልዕ
  english_pob_choice: devoured one another
  chosen_spanish: se devoraban unos a otros
  alternatives_spanish:
  - se comían unos a otros
  - se consumían unos a otros
  lexicon: léxico de violencia
  rationale: '''Devoraban'' preserva la fuerza violenta del verbo y coincide con la elección inglesa. ''Se comían'' es posible, pero ''devorar'' es más fuerte y más cercano al registro del pasaje.'
- source_word: ናፊል (Nafil)
  english_pob_choice: the Naphil
  chosen_spanish: el Nafil
  alternatives_spanish:
  - el Naphil
  - el Nephilim
  lexicon: transliteración
  rationale: Como el inglés POB conserva Naphil como término distinto, en español se mantiene Nafil para preservar la distinción con Nafidim y evitar una armonización no fundada en el texto.
- source_word: ኤልዮ (Elyo)
  english_pob_choice: the Elyo
  chosen_spanish: el Elyo
  alternatives_spanish:
  - el Elio
  - el Elyo
  lexicon: transliteración
  rationale: Se conserva Elyo como nombre propio transliterado, siguiendo el audit trail inglés y evitando una adaptación ('Elio') que podría confundir el nombre con una forma española común no atestiguada por el texto.
- source_word: አመሕያው
  english_pob_choice: mankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - la raza humana
  - los seres humanos
  lexicon: equivalencia semántica
  rationale: '''Humanidad'' expresa de forma compacta y digna el colectivo humano; mantiene el sentido general del inglés sin volverlo más interpretativo de lo necesario.'
theological_decisions:
- issue: Taxonomía diferenciada de seres gigantes/linajes
  english_pob_reading: 'The passage preserves multiple distinct labels: Naphidim, Naphil, Elyo, and mankind.'
  chosen_spanish_reading: 'El pasaje preserva rótulos distintos: Nafidim, Nafil, Elyo y la humanidad.'
  alternative_spanish_readings:
  - Unificar todo como 'nefilim' o 'gigantes'
  - Normalizar los nombres con traducciones comunes
  rationale: La revisión de doctrina/consistencia indica que el ge'ez distingue clases o nombres diferentes; la traducción española debe reflejar esa tensión textual en lugar de resolverla artificialmente. Por eso se conservan transliteraciones separadas.
  doctrine_reference: consistency_or_metadata_alignment / source-text taxonomy
translation_notes:
  revision_awareness: 'La versión inglesa pasó de un borrador ajeno al contenido a una traducción que refleja el texto ge''ez sobre el linaje de los Naphidim, su mutua violencia y la sucesión de matanzas entre Naphil y Elyo. También incorporó una corrección de consistencia importante: distinguir Naphidim de Naphil para no conflar términos distintos del original.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin explicar de más la secuencia de nombres.
  - Se evita 'SEÑOR' o terminología litúrgica no presente, porque el verso no contiene el tetragrámaton ni un equivalente contextual.
  - Se conserva la violencia verbal del pasaje con 'devoraban' y 'mató' para no suavizar el texto.
