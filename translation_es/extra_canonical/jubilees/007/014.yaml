translation:
  language: es
  text: Yafet lo vio y tuvo celos de su hermano; él también construyó para sí una ciudad, y le puso el nombre de su esposa, Adataneses[7:14].
  philosophy: optimal-equivalence
  footnotes:
  - marker: '7:14'
    text: Adataneses es una transliteración de la forma etiópica; el nombre es incierto en detalle.
    reason: source_note
lexical_decisions:
- source_word: «became jealous» / envidó
  english_pob_choice: became jealous
  chosen_spanish: tuvo celos de
  alternatives_spanish:
  - envidió a
  - sintió envidia de
  lexicon: celos / envidia
  rationale: El verbo inglés expresa el resentimiento por el bien del hermano; en español, «tuvo celos de» comunica con naturalidad esa reacción relacional sin añadir una carga moral distinta. «Envidió» también sería posible, pero «celos de» sigue de cerca el matiz interpersonal del relato.
- source_word: built for himself a city
  english_pob_choice: built for himself a city
  chosen_spanish: edificó para sí una ciudad
  alternatives_spanish:
  - construyó para sí una ciudad
  - se edificó una ciudad
  lexicon: construir / edificar
  rationale: «Edificó» preserva la solemnidad narrativa y la acción deliberada del original; «para sí» mantiene el dativo reflexivo del texto inglés sin sobrerreformular.
- source_word: called its name after the name of his wife
  english_pob_choice: called its name after the name of his wife
  chosen_spanish: la llamó por el nombre de su esposa
  alternatives_spanish:
  - le puso el nombre de su esposa
  - la nombró con el nombre de su esposa
  lexicon: nombrar / llamar
  rationale: La construcción española más transparente para reproducir la fórmula del relato es «la llamó por el nombre de su esposa», que conserva la relación entre el acto de nombrar y el nombre propio de la mujer. «Le puso el nombre de su esposa» sería más idiomática, pero menos cercana a la estructura auditada.
- source_word: Adataneses
  english_pob_choice: Adataneses
  chosen_spanish: Adataneses
  alternatives_spanish:
  - Adataneses
  lexicon: nombre propio transliterado
  rationale: Se conserva la transliteración del nombre tal como aparece en el POB inglés. No hay base suficiente en el expediente para normalizarlo o corregirlo.
theological_decisions:
- issue: Nombre propio y posible incertidumbre del antropónimo
  english_pob_reading: Adataneses is a transliteration of the Ethiopic form; the name is uncertain in detail.
  chosen_spanish_reading: Adataneses es una transliteración de la forma etiópica; el nombre es incierto en detalle.
  alternative_spanish_readings:
  - La forma del nombre es dudosa.
  - El nombre etiópico es incierto.
  rationale: 'Se mantiene la cautela del expediente inglés: no se pretende resolver la forma del nombre ni reemplazarla por una adaptación especulativa. La incertidumbre se conserva como parte del registro auditable.'
  doctrine_reference: No aplica; decisión onomástica y textual.
translation_notes:
  revision_awareness: El expediente inglés revisó la ubicación del marcador para que el anclaje del comentario sobre el nombre quedara al final de la frase, junto a «Adataneses». La versión española sigue esa misma colocación.
  spanish_consistency_notes:
  - Se usó «Yafet» para el nombre propio, en línea con la forma castellana usual del patriarca.
  - Se conservó «Adataneses» sin intentar harmonizarlo con variantes tradicionales, porque el expediente lo presenta como transliteración incierta.
  - 'Se evitó «SEÑOR» o terminología teológica innecesaria: el verso es narrativo y no contiene un término divino explícito.'
  - La puntuación separa las dos acciones principales del versículo para reflejar la secuencia narrativa del original.
