base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/007/004.yaml
  text: And he prepared the kid first, and put some of its blood on the flesh that was on the altar which he had made; and all its fat he offered up on the altar where he had made the burnt offering, and the ox and the ram and the sheep.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:45Z'
    unchanged: false
    changes_summary: Changed 'placed' to 'put' for naturalness, added 'its' before 'fat' for completeness and clarity, and changed 'caused to ascend' to 'offered up' for more natural formal English while preserving the sacrificial sense.
translation:
  language: es
  text: Y preparó primero el cabrito, y puso parte de su sangre sobre la carne que estaba en el altar que había hecho; y todo su sebo lo ofreció sobre el altar donde había hecho el holocausto del buey, del carnero y de la oveja.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወገብረ፡ ... ቅድመ
  english_pob_choice: he prepared the kid first
  chosen_spanish: y preparó primero el cabrito
  alternatives_spanish:
  - y preparó primero el cordero joven
  - y dispuso primero el cabrito
  lexicon: Geʽez ገብረ / ቅድመ
  rationale: El inglés auditado entiende ፴፭ como el kid y mantiene el orden de prioridad con ‘first’. En español, ‘cabrito’ conserva el sentido de animal joven caprino sin añadir una lectura más específica que la evidencia no exige.
- source_word: ደሙ፡ ዲበ፡ ሥጋ
  english_pob_choice: put some of its blood on the flesh
  chosen_spanish: puso parte de su sangre sobre la carne
  alternatives_spanish:
  - colocó parte de su sangre sobre la carne
  - puso un poco de su sangre sobre la carne
  lexicon: Geʽez ደም / ሥጋ
  rationale: ‘Parte de su sangre’ refleja bien el inglés ‘some of its blood’ y evita exagerar la cantidad. ‘Carne’ conserva el valor físico de ሥጋ sin suavizarlo a un término más interpretativo.
- source_word: ዘምሥዋዕ
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: Geʽez መሥዋዕ / altar
  rationale: Se mantiene ‘altar’ de forma directa y natural en español. ‘Sobre’ comunica la colocación material indicada por el texto.
- source_word: ስብሖ
  english_pob_choice: all its fat
  chosen_spanish: todo su sebo
  alternatives_spanish:
  - toda su grasa
  - todo su sebo graso
  lexicon: Geʽez ስብሕ / grasa, sebo
  rationale: ‘Sebo’ conserva mejor el matiz sacrificial y técnico que ‘grasa’. En contexto cultual, ‘todo su sebo’ es más preciso que un término genérico.
- source_word: አዕረገ፡ ውስተ፡ ምሥዋዕ
  english_pob_choice: he offered up on the altar
  chosen_spanish: lo ofreció sobre el altar
  alternatives_spanish:
  - lo hizo subir sobre el altar
  - lo presentó sobre el altar
  lexicon: Geʽez አዕረገ / sacrificial offering
  rationale: El inglés revisado evita una calca literal de ‘caused to ascend’. En español, ‘lo ofreció’ transmite naturalmente el sentido sacrificial sin perder la acción cultual.
- source_word: ጽንሓሐ፡ ወላህመ፡ ወ ... አባግዐ
  english_pob_choice: the ox and the ram and the sheep
  chosen_spanish: el buey, y el carnero, y la oveja
  alternatives_spanish:
  - el buey, el carnero y la oveja
  - el toro, el carnero y la oveja
  lexicon: Geʽez animal terms
  rationale: ‘Buey’ reproduce bien el animal de sacrificio aludido por el inglés. ‘Carnero’ y ‘oveja’ mantienen la secuencia zoológica sin forzar una equivalencia más técnica de la que aporta el contexto auditado.
theological_decisions:
- issue: Lenguaje sacrificial de ‘ofreció’ frente a una calca mecánica de ‘hizo subir’
  english_pob_reading: he offered up on the altar
  chosen_spanish_reading: lo ofreció sobre el altar
  alternative_spanish_readings:
  - lo hizo subir sobre el altar
  - lo presentó sobre el altar
  rationale: La revisión inglesa fijó la intención sacrificial con ‘offered up’. En español, ‘ofreció’ comunica ese acto cultual de manera transparente y evita una expresión poco natural que podría oscurecer el sentido.
  doctrine_reference: sacrificial cult language in Jubilees; formal equivalence with natural Spanish
- issue: Tratamiento de la sangre y el sebo en contexto de sacrificio
  english_pob_reading: put some of its blood ... all its fat
  chosen_spanish_reading: puso parte de su sangre ... todo su sebo
  alternative_spanish_readings:
  - puso un poco de su sangre ... toda su grasa
  - colocó parte de su sangre ... todo su sebo
  rationale: Se conserva la materialidad del rito sin suavizarla. ‘Sebo’ mantiene la carga ritual del texto, mientras ‘grasa’ sería más general y menos precisa para el registro sacrificial.
  doctrine_reference: sacrificial terminology; lexical precision in cultic context
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió la redacción para mayor naturalidad (‘put’, ‘its fat’, ‘offered up’) sin cambiar el contenido. La propuesta española sigue esa dirección: mantiene la secuencia de acciones y el sentido sacrificial, evitando calcos como ‘causó subir’ o formulaciones poco idiomáticas.'
  spanish_consistency_notes:
  - Se usa ‘altar’ de manera uniforme para ዘምሥዋዕ / ምሥዋዕ.
  - Se mantiene ‘cabrito’ para ፴፭ siguiendo el sentido del inglés auditado.
  - Se conserva ‘sebo’ por consistencia con el registro sacrificial y para diferenciarlo de una grasa genérica.
  - La serie final de animales se traduce con coordinación simple y comas para reflejar el estilo bíblico español sin recargarlo.
