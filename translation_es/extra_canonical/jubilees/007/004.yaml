  glossary_alignment: No hay conflictos con la terminología base del proyecto. El uso de ‘holocausto’ para ‘burnt offering’ y ‘sebo’ en contexto sacrificial es adecuado. No hay nombres divinos ni términos doctrinales del glosario principal en este versículo.
