translation:
  language: es
  text: Que Dios engrandezca a Jafet, y que Dios habite en las moradas de Sem; y que Canaán sea su esclavo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: θεός / אֱלֹהִים
  rationale: La auditoría inglesa ya corrigió «the LORD» a «God» por fidelidad al término divino del trasfondo. En español, «Dios» conserva esa correspondencia sin introducir el Tetragrámaton ni una sustitución litúrgica no sustentada por el fuente.
- source_word: enlarge
  english_pob_choice: enlarge
  chosen_spanish: engrandezca
  alternatives_spanish:
  - aumente
  - expanda
  lexicon: גָּדַל / concept of making great
  rationale: «Engrandezca» comunica bien el valor causativo de hacer grande o prosperar. «Aumente» es más neutro y «expanda» suena menos natural en este contexto de bendición patriarcal.
- source_word: dwell
  english_pob_choice: dwell
  chosen_spanish: habite
  alternatives_spanish:
  - more
  - resida
  lexicon: שָׁכַן / κατοικεῖν
  rationale: «Habite» reproduce con sobriedad el sentido de morar o permanecer. Mantiene el paralelismo con la petición precedente y encaja con el tono bíblico del pasaje.
- source_word: dwellings
  english_pob_choice: dwellings
  chosen_spanish: moradas
  alternatives_spanish:
  - tiendas
  - habitaciones
  lexicon: מִשְׁכָּן / dwellings
  rationale: «Moradas» es una equivalencia amplia y digna para el plural del lugar de residencia. «Tiendas» sería demasiado específico y «habitaciones» demasiado doméstico para este contexto.
- source_word: slave
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: δοῦλος / עֶבֶד
  rationale: La tradición auditada de POB prefiere «slave» para conservar la fuerza lexical. En español, «esclavo» mantiene esa dureza y evita suavizar indebidamente la sujeción de Canaán.
theological_decisions:
- issue: Identidad del destinatario de la bendición divina
  english_pob_reading: May God enlarge Japheth, and may God dwell in the dwellings of Shem
  chosen_spanish_reading: Que Dios engrandezca a Jafet, y que Dios habite en las moradas de Sem
  alternative_spanish_readings:
  - Que Yahvé engrandezca a Jafet, y que Yahvé habite en las moradas de Sem
  rationale: El expediente de revisión señala explícitamente que el término fuente corresponde a «God/Elohim», no al Tetragrámaton. Por eso el español debe usar «Dios» y no «Yahvé» aquí, preservando la distinción teológica y textual documentada.
  doctrine_reference: 'DOCTRINE.md: política de Yahvé para יהוה; aquí el término no es יהוה sino אֱלֹהִים.'
- issue: Fuerza de la relación social de Canaán
  english_pob_reading: and let Canaan be his slave
  chosen_spanish_reading: y que Canaán sea su esclavo
  alternative_spanish_readings:
  - y que Canaán sea su siervo
  rationale: La POB inglesa eligió «slave» por fuerza lexical, y no hay nota que justifique atenuarlo. El español «esclavo» conserva la asimetría social y el peso semántico del original.
  doctrine_reference: Consistencia léxica POB sobre δοῦλος / עֶבֶד.
translation_notes:
  revision_awareness: La revisión más reciente corrigió la segunda mención inglesa de «the LORD» a «God», alineándola con el valor fuente indicado por el expediente. No hay otras variantes textuales o notas auditadas en este versículo, así que el español sigue esa lectura sin añadir glosas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo «Que Dios... y que Dios...» para reflejar la repetición del inglés revisado.
  - Se conservó el nombre «Jafet» y «Sem» según uso bíblico estándar en español.
  - No se introdujo «Yahvé» porque la auditoría explícitamente desautoriza esa opción para este versículo.
