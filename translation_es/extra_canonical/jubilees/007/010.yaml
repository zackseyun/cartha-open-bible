translation:
  language: es
  text: 'Y lo bendijo a Sem y dijo: «Bendito sea Yahvé, el Dios de Sem; y que Canaán sea su esclavo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: YHWH / LORD
  english_pob_choice: LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: YHWH
  rationale: El texto fuente invoca al nombre divino como fórmula de bendición; en el proyecto español se prefiere Yahvé para no ocultar el nombre con una máscara litúrgica.
- source_word: slave
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: δοῦλος / equivalente funcional en contexto
  rationale: La cláusula expresa sujeción servil y el POB inglés retiene 'slave' por fuerza léxica; 'esclavo' comunica esa relación con claridad en español.
- source_word: blessed
  english_pob_choice: blessed
  chosen_spanish: bendijo / Bendito sea
  alternatives_spanish:
  - llamó bendito / sea bendecido
  lexicon: ברך
  rationale: La narración indica una acción de bendecir seguida de una fórmula de bendición; en español conviene mantener ambos valores con verbo narrativo y frase exhortativa.
- source_word: God
  english_pob_choice: the God of Shem
  chosen_spanish: el Dios de Sem
  alternatives_spanish:
  - el Dios de Sem
  lexicon: אֱלֹהִים
  rationale: Dios es la traducción directa y natural del término divino aquí, preservando la relación posesiva sin añadir explicación.
theological_decisions:
- issue: Tratamiento del nombre divino en una fórmula de bendición
  english_pob_reading: Blessed be the LORD, the God of Shem
  chosen_spanish_reading: Bendito sea Yahvé, el Dios de Sem
  alternative_spanish_readings:
  - Bendito sea el SEÑOR, el Dios de Sem
  rationale: Se conserva el nombre propio divino conforme a la política del proyecto y al trasfondo de la bendición, evitando el sustituto tipográfico 'SEÑOR'.
  doctrine_reference: Éxodo 3:15; Deuteronomio 6:4
- issue: Relación de sujeción de Canaán
  english_pob_reading: let Canaan be his slave
  chosen_spanish_reading: que Canaán sea su esclavo
  alternative_spanish_readings:
  - que Canaán sea su siervo
  rationale: El POB inglés eligió 'slave' y el contexto exige conservar la fuerza social y jurídica de la subordinación; 'siervo' suavizaría indebidamente el sentido.
  doctrine_reference: Génesis 9:25-27; Jubileos 7:10
translation_notes:
  revision_awareness: Se corrigió el cierre de comillas faltante en la revisión inglesa más reciente y se mantuvo la terminología consistente con el POB para el nombre divino y 'slave'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma principal para YHWH, conforme al estándar del proyecto.
  - '''esclavo'' se mantiene por coherencia con la fuerza léxica documentada del inglés POB.'
  - La puntuación española se adapta a comillas angulares y mayúsculas iniciales después de dos puntos.
