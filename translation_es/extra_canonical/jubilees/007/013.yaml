translation:
  language: es
  text: Y edificó para sí una ciudad y la llamó por el nombre de su esposa, Ne'elatama'uk[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre de la ciudad se translitera de una forma etiópica difícil, Ne'elatama'uk; la vocalización exacta es incierta.
    reason: source_note
lexical_decisions:
- source_word: built a city
  english_pob_choice: built a city
  chosen_spanish: edificó para sí una ciudad
  alternatives_spanish:
  - construyó una ciudad para sí
  - levantó una ciudad para sí
  lexicon: build/edify
  rationale: «Edificó» conserva el tono elevado y bíblico del relato; «para sí» refleja el dativo reflexivo del inglés POB y del sentido narrativo de posesión o beneficio personal.
- source_word: called its name after the name of his wife
  english_pob_choice: called its name after the name of his wife
  chosen_spanish: llamó su nombre según el nombre de su esposa
  alternatives_spanish:
  - puso su nombre con el nombre de su esposa
  - le dio el nombre de su esposa
  lexicon: call/name
  rationale: La fórmula «llamó su nombre» mantiene la estructura semítica del original y del inglés POB. «Según el nombre de» evita una paráfrasis más libre y conserva la relación nominal entre la ciudad y la esposa.
- source_word: Ne'elatama'uk
  english_pob_choice: Ne'elatama'uk
  chosen_spanish: Ne'elatama'uk
  alternatives_spanish:
  - Ne'elatama'uk
  lexicon: transliteration
  rationale: Se conserva la transliteración porque el testimonio inglés ya señala que el nombre es de vocalización difícil y no ofrece una forma española establecida.
theological_decisions:
- issue: Nombre propio transliterado de vocalización incierta
  english_pob_reading: The city name is transliterated from a difficult Ethiopic form...; the exact vocalization is uncertain.
  chosen_spanish_reading: Se conserva la forma transliterada Ne'elatama'uk y se nota su dificultad formal.
  alternative_spanish_readings:
  - Se adapta fonéticamente el nombre
  - Se traduce el sentido del nombre
  rationale: No hay base suficiente en el audit trail para normalizar o traducir el antropónimo/topónimo. Mantener la transliteración preserva la transparencia textual y la advertencia sobre incertidumbre.
  doctrine_reference: Principio de transparencia textual y de no sobreinterpretar nombres propios inciertos
translation_notes:
  revision_awareness: La revisión inglesa suavizó el orden de palabras y quitó la marca de versículo del cuerpo del texto, manteniendo el nombre transliterado. Esta versión española sigue ese mismo ajuste estilístico, sin añadir material no atestiguado.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece ningún nombre divino.
  - Se conserva el orden narrativo simple y la sintaxis semítica sin introducir equivalentes interpretativos.
  - La transliteración se mantiene idéntica en el cuerpo y en la nota para asegurar trazabilidad.
