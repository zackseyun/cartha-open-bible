base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/008.yaml
  text: Through him he took vengeance for Israel. And the LORD did everything for Israel, and according to his ordinance, which he established with Abraham, so that he might take vengeance on them just as they had enslaved them by force.
  footnotes:
  - marker: a
    text: Or 'so that he might execute vengeance for Israel.'.
    reason: previous_rendering
  - marker: b
    text: Or 'because they had oppressed them violently'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:59Z'
    unchanged: false
    changes_summary: Changed 'covenant' to 'ordinance' to reflect ሥርዐቱ more accurately here; adjusted phrasing to 'so that' for consistency; revised 'with violence' to 'violently' for more natural English while preserving the sense.
translation:
  language: es
  text: Por medio de él tomó venganza por Israel. Y Yahvé hizo todo por Israel, y según su ordenanza, que estableció con Abraham, para que tomara venganza de ellos, tal como los habían esclavizado por la fuerza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቦቱ፡ በቀለ፡ ለእስራኤል
  english_pob_choice: Through him he took vengeance for Israel
  chosen_spanish: Por medio de él ejecutó venganza por Israel
  alternatives_spanish:
  - Por medio de él tomó venganza por Israel
  - Por medio de él hizo justicia a Israel
  lexicon: Ge'ez ቦቱ / በ / ቀለ
  rationale: La construcción indica medio/instrumento, no propósito. «Por medio de él» conserva el valor instrumental; «ejecutó venganza» sigue la línea del inglés revisado y evita suavizar la fuerza jurídica del acto.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: Divine name
  rationale: Siguiendo la norma del proyecto, el nombre divino se vierte como «Yahvé» y no como máscara reverencial.
- source_word: ሥርዐቱ
  english_pob_choice: his ordinance
  chosen_spanish: su ordenanza
  alternatives_spanish:
  - su decreto
  - su disposición
  lexicon: Ge'ez ሥርዐት
  rationale: La revisión inglesa corrigió «covenant» a «ordinance». «Ordenanza» conserva el matiz normativo/jurídico sin introducir una lectura pactal no apoyada por el texto revisado.
- source_word: ዘተካየደ፡ ምስለ፡ አብርሃም
  english_pob_choice: which he established with Abraham
  chosen_spanish: que estableció con Abraham
  alternatives_spanish:
  - que fijó con Abraham
  - que dispuso con Abraham
  lexicon: Ge'ez ተካየደ
  rationale: «Estableció» mantiene el sentido de establecer/fijar una disposición con Abraham, en consonancia con el inglés auditado y sin forzar «pacto».
- source_word: ከመ፡ ይትበቀል፡ ላዕሌሆሙ
  english_pob_choice: so that he might take vengeance on them
  chosen_spanish: para ejecutar venganza sobre ellos
  alternatives_spanish:
  - para vengarse de ellos
  - a fin de tomar venganza de ellos
  lexicon: Ge'ez purpose clause
  rationale: La cláusula final expresa propósito. «Para ejecutar venganza» conserva el registro formal y el paralelismo con la primera mitad del verso.
- source_word: ቀነይዎሙ፡ በግፍዕ
  english_pob_choice: just as they had enslaved them by force
  chosen_spanish: tal como los habían esclavizado por la fuerza
  alternatives_spanish:
  - tal como los habían subyugado por la fuerza
  - así como los habían esclavizado violentamente
  lexicon: Ge'ez ቀነየ / ግፍዕ
  rationale: «Esclavizado» refleja con precisión la fuerza de ቀነይዎሙ y preserva la relación proporcional marcada por «tal como». «Por la fuerza» traduce ግፍዕ de manera natural y transparente.
theological_decisions:
- issue: Nombre divino y forma de la referencia
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Se mantiene la transparencia del nombre divino en español, conforme al estándar del proyecto y al trasfondo hebreo aludido por el texto del Jubileos.
  doctrine_reference: Tetragrámaton / nomen divinum
- issue: Naturaleza de la retribución
  english_pob_reading: take vengeance / execute vengeance
  chosen_spanish_reading: ejecutó venganza / para ejecutar venganza
  alternative_spanish_readings:
  - hizo justicia
  - castigó
  rationale: El verso habla explícitamente de venganza retributiva y proporcional; «venganza» preserva esa tensión teológica y jurídica sin diluirla en una fórmula moral más general.
  doctrine_reference: Retribución divina
- issue: Relación entre juicio y opresión
  english_pob_reading: just as they had enslaved them by force
  chosen_spanish_reading: tal como los habían esclavizado por la fuerza
  alternative_spanish_readings:
  - porque los habían oprimido con violencia
  - así como los habían oprimido
  rationale: La comparación proporcional es parte del sentido del texto; «tal como» evita convertir la frase en causal y preserva el paralelismo de medida.
  doctrine_reference: Justicia proporcional
translation_notes:
  revision_awareness: 'El texto inglés revisado corrigió un error importante: la primera cláusula no es final sino instrumental (''Through him''), y la última cláusula no es causal sino comparativa/proporcional (''just as''). También se sustituyó ''covenant'' por ''ordinance'' para reflejar ሥርዐቱ. La presente traducción sigue esas tres correcciones y evita introducir una lectura pactal no sustentada por el pasaje revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se conserva «venganza» porque el pasaje insiste en la retribución proporcional y no en una mera idea general de justicia.
  - Se evita «pacto»/«alianza» para ሥርዐቱ, ya que la revisión inglesa lo fijó como «ordinance» y el contexto favorece una ordenanza/disposición.
  - 'Se mantiene la estructura de dos miembros paralelos: acción por medio de él y medida de retribución según lo sufrido.'
