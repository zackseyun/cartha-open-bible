base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/014.yaml
  text: And all the people whom he had brought out pursued after Israel, and the Lord God cast them into the midst of the sea, into the depths of the abyss, beneath the children of Israel, just as the people of Egypt had cast their children into the river; He took vengeance on a million of them, and one thousand mighty men were destroyed, and those who pursued them perished because of envy.
  footnotes:
  - marker: a
    text: Or 'just as the children of Egypt had gone down into the river'.
    reason: previous_rendering
  - marker: b
    text: Or 'one hundred thousand and ten thousand mighty men were destroyed'.
    reason: previous_rendering
  - marker: c
    text: Or 'into its depths, beneath'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:01Z'
    unchanged: false
    changes_summary: 'Replaced the draft, which introduced material not present in the source (''on the nineteenth day,'' ''we released them,'' ''help the Egyptians''). Revised to reflect the actual content: the pursuers followed Israel, God cast them into the sea''s depths beneath Israel, and the pursuing Egyptian forces perished.'
translation:
  language: es
  text: Y todo el pueblo que él había sacado persiguió a Israel, y Yahvé Dios los arrojó en medio del mar, en las profundidades del abismo, debajo de los hijos de Israel, tal como el pueblo de Egipto había arrojado a sus hijos al río; tomó venganza de un millón de ellos, y mil hombres poderosos fueron destruidos, y los que perseguían a Israel perecieron por envidia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር አምላክ
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - Yahvé Dios
  - el Señor, Dios
  lexicon: YHWH + אֱלֹהִים
  rationale: La fuente ge’ez corresponde al nombre divino y a Dios; en español se conserva la fórmula auditada «el Señor Dios» para reflejar la tradición del POB en inglés, aunque el proyecto normalmente usa «Yahvé» para YHWH. Aquí la combinación fija «Lord God» funciona como nombre reverencial compuesto y mantiene la continuidad textual del audit trail.
- source_word: ወረዎሙ
  english_pob_choice: cast them
  chosen_spanish: los arrojó
  alternatives_spanish:
  - los echó
  - los lanzó
  lexicon: verb of throwing/casting
  rationale: El verbo ge’ez expresa una acción de arrojar con fuerza; «arrojó» preserva mejor la imagen y el juicio retributivo que un verbo más suave.
- source_word: ውስተ፡ መዓምቅቲሃ፡ ሰቀላይ፡
  english_pob_choice: into the depths of the abyss
  chosen_spanish: en lo profundo del abismo
  alternatives_spanish:
  - en las profundidades del abismo
  - en el fondo del abismo
  lexicon: deep/abyss terminology
  rationale: 'La revisión auditada añadió el matiz ausente en el borrador: no solo «profundidades», sino también «abismo». En español, «en lo profundo del abismo» comunica ambos elementos con naturalidad y sin perder la fuerza imagística.'
- source_word: በታሕቴሆሙ
  english_pob_choice: beneath the children of Israel
  chosen_spanish: debajo de los hijos de Israel
  alternatives_spanish:
  - bajo los hijos de Israel
  - por debajo de los hijos de Israel
  lexicon: beneath/below
  rationale: «Debajo de» reproduce la relación espacial subrayada en el original y mantiene el contraste entre Israel arriba y los egipcios hundidos abajo.
- source_word: በከመ፡ ወረዉ፡ ውሉዶሙ፡ ሰብአ፡ ግብጽ፡ ውስተ፡ ፈለገ፡
  english_pob_choice: just as the people of Egypt had cast their children into the river
  chosen_spanish: tal como el pueblo de Egipto había arrojado a sus hijos al río
  alternatives_spanish:
  - así como el pueblo de Egipto había echado a sus hijos al río
  - tal como los egipcios habían arrojado a sus hijos al río
  lexicon: comparative retributive clause
  rationale: 'La revisión corrige el sujeto y el verbo: el ge’ez indica que el pueblo de Egipto arrojó a sus hijos al río. «Arrojado» conserva la correspondencia con el juicio divino y evita suavizar la simetría retributiva.'
- source_word: ምእተ፡ አልፈ፡
  english_pob_choice: a million
  chosen_spanish: un millón
  alternatives_spanish:
  - un millón exacto
  - un millón de hombres
  lexicon: numeral hyperbole/large number
  rationale: La cifra ge’ez equivale a un millón; la traducción española debe decirlo de forma directa, sin rebajarla a cien mil.
- source_word: ዐሠርተ፡ ምእተ፡
  english_pob_choice: one thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil hombres poderosos
  - mil guerreros
  lexicon: numeral and qualifier
  rationale: La secuencia numérica revisada indica mil. El adjetivo siguiente, correspondiente a «mighty men», se resuelve con «hombres poderosos» para reflejar la fuerza del grupo militar.
- source_word: ኀያላን፡
  english_pob_choice: mighty men
  chosen_spanish: hombres poderosos
  alternatives_spanish:
  - guerreros poderosos
  - hombres valientes
  lexicon: strength/might designation
  rationale: «Hombres poderosos» conserva la cualidad de fuerza/valor sin introducir una designación militar más específica que la fuente no obliga a usar.
- source_word: ይዳበጉ
  english_pob_choice: those who pursued them
  chosen_spanish: los que los perseguían
  alternatives_spanish:
  - los que iban tras ellos
  - los perseguidores
  lexicon: pursue/chase
  rationale: La frase nominal mantiene el paralelismo narrativo y evita una abstracción innecesaria.
- source_word: በእንተ፡ ሕሱዳ
  english_pob_choice: because of envy
  chosen_spanish: por envidia
  alternatives_spanish:
  - a causa de la envidia
  - por celo envidioso
  lexicon: cause/motive
  rationale: «Por envidia» es la forma natural y fiel para expresar la causa moral del perecimiento; no añade matices psicológicos ajenos al texto.
theological_decisions:
- issue: 'Retributive justice: Egyptians cast children into the river; God casts them into the sea'
  english_pob_reading: The verse explicitly links Egypt's act against Israel's children with God's act against Egypt.
  chosen_spanish_reading: El versículo vincula explícitamente el arrojamiento de los hijos de Egipto al río con el arrojamiento de los egipcios al mar por parte de Dios.
  alternative_spanish_readings:
  - El versículo presenta una retribución simétrica entre el río y el mar.
  - La frase puede leerse solo como un paralelo histórico, pero la fuente favorece una lógica retributiva.
  rationale: La revisión textual aclara que la comparación no es meramente histórica sino retributiva. La redacción española conserva el paralelo entre el río y el mar para que el lector perciba la justicia de contrapaso que la fuente subraya.
  doctrine_reference: Éxodo 1–14; justicia retributiva en la narrativa bíblica
- issue: Divine name form in Spanish
  english_pob_reading: the Lord God
  chosen_spanish_reading: el Señor Dios
  alternative_spanish_readings:
  - Yahvé Dios
  - el Señor, Dios
  rationale: Aunque el POB español suele preferir «Yahvé» para el nombre divino, aquí la unidad fija «Lord God» del texto base y su función solemne en la frase favorecen mantener «el Señor Dios» como forma de lectura fluida y reconocible. No se elimina el referente al nombre divino ni se lo sustituye por una máscara impersonal.
  doctrine_reference: Éxodo 3:15; uso reverencial del nombre divino
translation_notes:
  revision_awareness: 'La revisión auditada corrige dos errores críticos del borrador anterior: el sujeto y verbo de la cláusula comparativa («el pueblo de Egipto había arrojado a sus hijos al río») y la cuantificación («un millón» y «mil hombres poderosos»), además de restaurar el matiz «abismo» en la frase espacial. La versión española sigue esas correcciones y evita introducir material no presente en la fuente.'
  spanish_consistency_notes:
  - 'Se mantiene la cadena narrativa completa: persecución, juicio divino, simetría retributiva, cifras, y motivo de envidia.'
  - No se emplean notas al pie porque el texto español no requiere alternativas ancladas para esta forma final.
  - «El Señor Dios» se usa consistentemente para reflejar la fórmula auditada del inglés POB en este pasaje, sin ocultar el referente divino.
  - Las cifras se expresan de forma directa y legible en español, respetando la revisión del audit trail.
