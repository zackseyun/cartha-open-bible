    timestamp: '2026-04-23T14:52:58Z'
    unchanged: false
    changes_summary: Revised 'was sent through your hand' to 'was entrusted into your hand' for more natural and contextually fitting English; changed 'it was not done apart from you' to 'nothing was done apart from you' to reflect the sense of totality more clearly and naturally.
translation:
  language: es
  text: Y los quemó con fuego. Y todo fue puesto en tus manos para que lo hicieras, antes de que se hiciera, y tú estabas presente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአውዐዮሙ፡ በእሳት
  english_pob_choice: And he burned them with fire.
  chosen_spanish: Y los quemó con fuego.
  alternatives_spanish:
  - Y los incendió con fuego.
  - Y los consumió con fuego.
  lexicon: quemar / fuego
  rationale: El Ge'ez expresa una acción de destrucción por fuego; 'quemó con fuego' reproduce la imagen de manera directa y natural en español, sin suavizar la fuerza verbal.
- source_word: ወኵሉ፡ ተፈነወ፡ በእዴከ
  english_pob_choice: And everything was entrusted into your hand
  chosen_spanish: Y todo fue entregado en tu mano
  alternatives_spanish:
  - Y todo fue puesto en tu mano
  - Y todo fue confiado en tu mano
  lexicon: entregar / mano
  rationale: Aunque el inglés POB usa 'entrusted', el Ge'ez permite la idea de ser puesto/entregado bajo responsabilidad. 'Entregado en tu mano' conserva la imagen semítica sin introducir un giro más interpretativo que 'confiado'.
- source_word: ከመ፡ ትግበር
  english_pob_choice: so that you might do it
  chosen_spanish: para que lo hicieras
  alternatives_spanish:
  - para que lo realizaras
  - a fin de que lo hicieras
  lexicon: para que + subjuntivo
  rationale: 'La cláusula final expresa propósito: que la acción recayera en el destinatario. ''Lo hicieras'' mantiene el valor final y evita sobreespecificar el objeto.'
- source_word: ዘእንበለ፡ ይትገበር
  english_pob_choice: before it was done
  chosen_spanish: antes de que se hiciera
  alternatives_spanish:
  - antes de que fuera hecho
  - antes de realizarse
  lexicon: antes de que + subjuntivo
  rationale: La revisión del POB corrigió aquí un malentendido. El Ge'ez significa temporalmente 'antes de que se hiciera'; el español refleja esa relación sin perder naturalidad.
- source_word: ወሀለወከ
  english_pob_choice: and you were present
  chosen_spanish: y tú estabas presente
  alternatives_spanish:
  - y tú estuviste presente
  - y estabas allí
  lexicon: estar presente
  rationale: El término final no implica meramente 'existir', sino presencia efectiva. 'Tú estabas presente' preserva ese matiz de acompañamiento testigo.
theological_decisions:
- issue: Alcance de la autoridad conferida
  english_pob_reading: everything was entrusted into your hand so that you might do it
  chosen_spanish_reading: todo fue entregado en tu mano para que lo hicieras
  alternative_spanish_readings:
  - todo fue confiado en tu mano para que lo hicieras
  - todo fue puesto en tu mano para que lo hicieras
  rationale: La frase presenta delegación total y responsabilidad efectiva; 'entregado en tu mano' conserva el lenguaje bíblico semita sin forzar una formulación eclesiástica posterior.
  doctrine_reference: delegación de autoridad / mayordomía
- issue: Corrección de la relación temporal final
  english_pob_reading: before it was done, and you were present
  chosen_spanish_reading: antes de que se hiciera, y tú estabas presente
  alternative_spanish_readings:
  - antes de que fuera hecho, y tú estabas presente
  - antes de que se realizara, y tú estabas presente
  rationale: La revisión textual indica que el sentido no es exclusión total de otros agentes, sino simultaneidad/presencia previa. El español debe conservar esa corrección sin reintroducir la antigua paráfrasis.
  doctrine_reference: crítica textual / precisión semántica
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente y corrige el error previo de sentido en la cláusula temporal final: no significa ''nada fue hecho aparte de ti'', sino ''antes de que se hiciera, y tú estabas presente''. También mantiene la lectura de entrega de autoridad en ''en tu mano''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma normal del nombre divino en el proyecto, pero este versículo no contiene el Tetragrámaton ni una referencia explícita a él.
  - Se evita 'siervo' porque el texto no usa δοῦλος ni un equivalente que exija ese matiz.
  - Se usa 'presente' para expresar la última cláusula de manera fiel y clara en español.
  - No se incluyen notas al pie porque el texto español ya incorpora la corrección revisional necesaria y no queda una ambigüedad textual que requiera marcador.
