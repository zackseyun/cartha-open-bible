base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/006.yaml
  text: And he burned them with fire. And everything was entrusted into your hand so that you might do it, before it was done, and you were present.
  footnotes:
  - marker: a
    text: Or 'and nothing was done apart from you.'.
    reason: previous_rendering
  revision_pass:
