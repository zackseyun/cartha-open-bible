translation:
  language: es
  text: 'Y debías hablar delante del rey de Egipto, delante de todos sus servidores y delante de su pueblo. Y todo sucedió por tu palabra: diez juicios grandes y graves vinieron sobre la tierra de Egipto, para que los llevaras a cabo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "para ser llevados a cabo".
    reason: Preserva la alternativa pasiva registrada en la nota del inglés POB, mientras el texto principal mantiene la voz activa del Ge'ez y la agencia de Moisés.
lexical_decisions:
- source_word: ትትናገር / speak
  english_pob_choice: were to speak
  chosen_spanish: hablarías
  alternatives_spanish:
  - debías hablar
  - hablarías tú
  lexicon: hablar
  rationale: El Ge’ez presenta una acción futura/mandada en segunda persona; en español, el condicional de mandato o expectativa conserva bien esa fuerza sin volverla demasiado rígida. 'Hablarías' mantiene el valor prospectivo del contexto narrativo.
- source_word: በቅድመ / before
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: delante de
  rationale: Repite la idea de presencia pública de forma natural en español y preserva la triple enumeración del original.
- source_word: ኵሎሙ / all
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  lexicon: todos
  rationale: Traducción directa y clara para el conjunto de los servidores del rey.
- source_word: ወኵሉ ኮነ በቃልከ / everything happened at your word
  english_pob_choice: everything happened at your word
  chosen_spanish: todo sucedió por tu palabra
  alternatives_spanish:
  - todo ocurrió por tu palabra
  - todo fue según tu palabra
  lexicon: palabra
  rationale: '''Por tu palabra'' conserva la causalidad/autoridad del enunciado sin añadir explicación. ''Sucedió'' refleja el carácter narrativo general del pasaje.'
- source_word: ዐሥሩ ኵነኔ ዐበይት ወጸዋጋት / ten great and grievous judgments
  english_pob_choice: ten great and grievous judgments
  chosen_spanish: diez juicios grandes y graves
  alternatives_spanish:
  - diez juicios grandes y dolorosos
  - diez grandes y graves juicios
  lexicon: juicios
  rationale: '''Juicios'' sigue de cerca el término semántico del original y del inglés POB. ''Graves'' comunica el peso aflictivo de ''grievous'' sin convertirlo en un comentario interpretativo más amplio.'
- source_word: መጽአ ውስተ ምድረ ግብጽ / came upon the land of Egypt
  english_pob_choice: came upon the land of Egypt
  chosen_spanish: vinieron sobre la tierra de Egipto
  alternatives_spanish:
  - cayeron sobre la tierra de Egipto
  - sobrevinieron a la tierra de Egipto
  lexicon: venir sobre
  rationale: '''Vinieron sobre'' mantiene la imagen de irrupción/aflicción que el original expresa mejor que una formulación meramente abstracta.'
- source_word: ትግበር / to carry out
  english_pob_choice: for you to carry out
  chosen_spanish: para que tú los llevaras a cabo
  alternatives_spanish:
  - para que tú los ejecutaras
  - para que los realizaras
  lexicon: llevar a cabo
  rationale: La revisión inglesa corrigió la pasiva y dejó claro que la acción corresponde a Moisés. 'Llevar a cabo' comunica agencia activa y funciona bien con 'juicios' en español.
theological_decisions:
- issue: Agency of Moses in executing the judgments
  english_pob_reading: for you to carry out
  chosen_spanish_reading: para que tú los llevaras a cabo
  alternative_spanish_readings:
  - para que fueran ejecutados
  - para que se llevaran a cabo
  rationale: La última revisión del inglés rechaza la pasiva y subraya que Moisés es agente activo. La versión española mantiene esa agencia explícita.
  doctrine_reference: Narrative agency in prophetic/judicial acts; source-text grammar rather than doctrine
- issue: Nature of 'judgments' as punitive acts on Egypt
  english_pob_reading: ten great and grievous judgments
  chosen_spanish_reading: diez juicios grandes y graves
  alternative_spanish_readings:
  - diez castigos grandes y graves
  - diez sentencias grandes y graves
  rationale: '''Juicios'' conserva el término más cercano al original y evita sustituirlo por ''castigos'', que estrecharía el sentido. ''Graves'' deja la carga aflictiva sin sobreexplicarla.'
  doctrine_reference: Lexical preservation of judicial/punitive language in the plague narrative
translation_notes:
  revision_awareness: La versión inglesa más reciente añadió el cierre 'for you to carry out' para reflejar el verbo activo del Ge’ez; la presente redacción española incorpora esa agencia explícita con 'para que tú los llevaras a cabo'.
  spanish_consistency_notes:
  - Se mantiene 'Egipto' y no una perífrasis tradicionalizada como 'la tierra de Mizraim', porque el texto fuente y el audit trail inglés usan 'Egypt'.
  - Se conserva la enumeración triple 'delante de...' para reflejar la estructura del original.
  - No se introduce 'SEÑOR' ni terminología teológica ajena al pasaje; el verso trata de mandato y ejecución de juicios.
