    text: O "para ser llevados a cabo".
    reason: Preserva la alternativa pasiva registrada en la nota del inglés POB, mientras el texto principal mantiene la voz activa del Ge'ez y la agencia de Moisés.
  revision_rationale: Se ajusta el inicio a 'debías hablar' para reflejar mejor el valor de encargo narrativo de 'were to speak' en español natural. Se conserva la agencia activa de Moisés en el cierre, pero se añade la nota de alternativa pasiva documentada en el POB inglés. El resto del versículo ya era fiel y claro.
