base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/001.yaml
  text: And in the sixth year of the third week of the forty-ninth jubilee[1], you departed and lived in the land of Midian for five weeks of years and one year, and you returned to Egypt in the second week, in the second year, in the fiftieth jubilee.
  footnotes:
  - marker: '1'
    text: The chronology is compressed and somewhat difficult in the Ethiopic. 'Five weeks of years and one year' is retained literally to preserve Jubilees' calendrical scheme.
    reason: segmentation_note
  - marker: a
    text: Or 'in the second week.'.
    reason: previous_rendering
  - marker: b
    text: Or 'entered'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:55Z'
    unchanged: false
    changes_summary: Added 'for' before 'five weeks of years and one year' to make the duration idiomatic in English while preserving the source meaning.
translation:
  language: es
  text: Y en el sexto año de la tercera semana del cuadragésimo noveno jubileo,[a] saliste y habitaste en la tierra de Madián durante cinco semanas de años y un año, y regresaste a Egipto en la segunda semana, en el segundo año, en el quincuagésimo jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cronología aquí está condensada y es algo difícil en el etíope. Se conserva literalmente 'cinco semanas de años y un año' para preservar el esquema calendárico de Jubileos.
    reason: segmentation_note
lexical_decisions:
- source_word: ሖርከ፡
  english_pob_choice: you departed
  chosen_spanish: saliste
  alternatives_spanish:
  - partiste
  - te fuiste
  lexicon: verb. movement away from a place
  rationale: El contexto cronológico de Jubileos favorece un verbo de salida. "Saliste" conserva el desplazamiento sin añadir matices no presentes en el ge'ez.
- source_word: ወነበርከ፡
  english_pob_choice: lived
  chosen_spanish: habitaste
  alternatives_spanish:
  - viviste
  - residiste
  lexicon: verb. dwell/live
  rationale: '"Habitar" reproduce el sentido de residencia prolongada con tono bíblico claro en español, sin perder inteligibilidad.'
- source_word: ውስተ፡ ምድረ፡ ምድያም፡
  english_pob_choice: in the land of Midian
  chosen_spanish: en la tierra de Madián
  alternatives_spanish:
  - en la tierra de Midian
  - en Madián
  lexicon: place name + הארץ/land formula
  rationale: '"Madián" sigue la forma hispana tradicional para el nombre propio y mantiene la fórmula territorial exacta del texto.'
- source_word: ፭ሱባዔ፡ ወዓመተ፡ አሐደ፡
  english_pob_choice: five weeks of years and one year
  chosen_spanish: cinco semanas de años y un año
  alternatives_spanish:
  - cinco semanas de años y un año
  - cinco semanas de años y un solo año
  lexicon: chronological idiom in Jubilees
  rationale: Se conserva literalmente la medida calendárica de Jubileos para no borrar su esquema cronológico propio.
- source_word: ገባእከ፡
  english_pob_choice: returned to
  chosen_spanish: regresaste a
  alternatives_spanish:
  - volviste a
  - retornaste a
  lexicon: verb. return
  rationale: La revisión inglesa corrige este verbo a 'returned to'; en español "regresaste a" expresa con naturalidad el retorno a Egipto.
- source_word: በሱባዔ፡ ካልእ፡ በዓመት፡ ካልእ፡ በኢዮቤልው፡ ኃምሳ፡
  english_pob_choice: in the second week, in the second year, in the fiftieth jubilee
  chosen_spanish: en la segunda semana, en el segundo año, en el quincuagésimo jubileo
  alternatives_spanish:
  - en la segunda semana, en el segundo año, en el jubileo cincuenta
  - en la segunda semana, en el segundo año, en el jubileo quincuagésimo
  lexicon: chronological formula
  rationale: La fórmula completa de datación se traduce de manera directa para reflejar la corrección textual señalada en el audit trail.
theological_decisions:
- issue: Conservación del sistema cronológico de Jubileos
  english_pob_reading: The chronology is compressed and somewhat difficult in the Ethiopic; five weeks of years and one year is retained literally to preserve Jubilees' calendrical scheme.
  chosen_spanish_reading: Se mantiene literalmente el esquema de semanas de años y años para no normalizarlo a una cronología moderna.
  alternative_spanish_readings:
  - parafrasear la duración como 'por cinco décadas y un año'
  - suavizar la fórmula a 'durante mucho tiempo'
  rationale: El texto pertenece a una obra con un sistema calendárico técnico propio; traducirlo literalmente conserva la tensión y la estructura del original sin interpretarla en exceso.
  doctrine_reference: Hermenéutica del género apocalíptico/calendárico; fidelidad formal a la cronología interna del texto.
- issue: Corrección de la frase final truncada
  english_pob_reading: in the second week, in the second year, in the fiftieth jubilee
  chosen_spanish_reading: en la segunda semana, en el segundo año, en el quincuagésimo jubileo
  alternative_spanish_readings:
  - en la segunda semana
  - en la segunda semana, en el segundo año
  rationale: La evidencia revisada indica que la lectura inglesa anterior estaba truncada; la cláusula completa debe preservarse para reflejar el testimonio textual más robusto.
  doctrine_reference: Crítica textual y restauración de la lectura completa según revisión auditada.
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrige la clausula final truncada a la fórmula completa de datación ('en la segunda semana, en el segundo año, en el quincuagésimo jubileo') y la revisión lexical que ajusta el verbo final a 'returned to'/'regresaste a'.
  spanish_consistency_notes:
  - Se mantiene 'jubileo' como término técnico uniforme.
  - Se conserva 'semana' para weeks of years, siguiendo la estructura interna de Jubileos.
  - No se introduce 'SEÑOR' ni otro reemplazo teológico ajeno al pasaje.
  - Se usa 'Madián' como forma española estable para el topónimo.
