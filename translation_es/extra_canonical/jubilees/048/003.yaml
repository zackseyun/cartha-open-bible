  text: On the way[3], at the lodging-place, he met you. Did he not desire with all his power to kill you and to save the Egyptians from your hand, when he saw that you had been sent to do this and to execute judgment upon Egypt?
  footnotes:
  - marker: '3'
    text: The verb at the lodging-place may carry the sense of hostile encounter or accusation; compare the Exodus episode where a deadly confrontation occurs on the journey.
    reason: lexical_alternative
  - marker: a
    text: Or 'he came against you to accuse you. And he desired'.
    reason: previous_rendering
  - marker: b
    text: Or 'execute judgment upon Egypt.'.
    reason: previous_rendering
