translation:
  language: es
  text: En el camino, en el lugar de posada, se encontró contigo. ¿No quiso, con todo su poder, matarte y salvar a los egipcios de tu mano, cuando vio que habías sido enviado para hacer esto y para ejecutar juicio[a] sobre Egipto?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘librar a los egipcios de tu mano’.
    reason: alternative_reading
lexical_decisions:
- source_word: ተቀበለ / met "he met you"
  english_pob_choice: he met you
  chosen_spanish: se encontró contigo
  alternatives_spanish:
  - te encontró
  - te salió al encuentro
  lexicon: encounter/meet
  rationale: El contexto de Éxodo 4:24 sugiere un encuentro real con tono hostil, pero el verbo base indica ‘encontrar/encounter’, no ‘acusar’. ‘Se encontró contigo’ conserva la relación semántica sin añadir una acusación inexistente en el ge’ez.
- source_word: አኮሁ
  english_pob_choice: Did he not desire
  chosen_spanish: ¿No quiso...
  alternatives_spanish:
  - ¿Acaso no quiso...
  - ¿No deseó...
  lexicon: interrogative rhetorical particle
  rationale: La partícula introduce una pregunta retórica; por eso se conserva la forma interrogativa en español. ‘Quiso’ funciona de manera natural y mantiene el matiz volitivo del contexto.
- source_word: ፈቀደ
  english_pob_choice: desire
  chosen_spanish: quiso
  alternatives_spanish:
  - deseó
  - tuvo la intención de
  lexicon: will/desire
  rationale: En este contexto la intención voluntaria y resolutiva es más clara en español con ‘quiso’. ‘Deseó’ es posible, pero suena más débil para una acción hostil concreta.
- source_word: ይቅትልከ
  english_pob_choice: to kill you
  chosen_spanish: matarte
  alternatives_spanish:
  - dar muerte a ti
  - asesinarte
  lexicon: kill
  rationale: ‘Matarte’ es el equivalente más directo y natural en español. ‘Asesinarte’ agrega una valoración que el texto no exige.
- source_word: ወያድኅኖሙ ለግብጻውያን
  english_pob_choice: and to save the Egyptians
  chosen_spanish: y salvar a los egipcios
  alternatives_spanish:
  - y librar a los egipcios
  - y rescatar a los egipcios
  lexicon: save/deliver
  rationale: El ge’ez expresa salvar/liberar a los egipcios de la mano de Moisés. ‘Salvar’ mantiene la amplitud del verbo sin forzar una lectura teológica posterior.
- source_word: ይግበር ... ወበቀለ ላዕለ
  english_pob_choice: to execute judgment upon Egypt
  chosen_spanish: para ejecutar juicio sobre Egipto
  alternatives_spanish:
  - para hacer juicio sobre Egipto
  - para traer juicio sobre Egipto
  lexicon: judge/judgment
  rationale: ‘Ejecutar juicio’ preserva el carácter judicial activo del original y coincide con la tradición de POB; ‘sobre Egipto’ mantiene el objeto del juicio sin suavizarlo.
theological_decisions:
- issue: El encuentro en el camino puede leerse como hostil, pero el texto no dice explícitamente ‘acusar’.
  english_pob_reading: he met you
  chosen_spanish_reading: se encontró contigo
  alternative_spanish_readings:
  - te salió al encuentro
  - se enfrentó contigo
  rationale: 'Se conserva la ambigüedad controlada: el lenguaje español no introduce una acusación que el ge’ez no contiene, pero tampoco borra el trasfondo conflictivo heredado de la escena de Éxodo.'
  doctrine_reference: Exodus 4:24-26; source-based narrative parallel
- issue: La oración es retórica y debe cerrar como pregunta.
  english_pob_reading: Did he not desire... and to execute judgment upon Egypt?
  chosen_spanish_reading: ¿No quiso... para ejecutar juicio sobre Egipto?
  alternative_spanish_readings:
  - ¿No deseó... para ejecutar juicio sobre Egipto?
  - ¿No tuvo la intención de... para ejecutar juicio sobre Egipto?
  rationale: La puntuación interrogativa refleja la partícula ge’ez y evita convertir la frase en una afirmación plana. Esto preserva la fuerza retórica del pasaje.
  doctrine_reference: Ge'ez interrogative particle አኮሁ; revision audit
- issue: ‘Salvar a los egipcios’ puede sonar inusual en español, pero corresponde a la fuente.
  english_pob_reading: to save the Egyptians from your hand
  chosen_spanish_reading: salvar a los egipcios de tu mano
  alternative_spanish_readings:
  - librar a los egipcios de tu mano
  - rescatar a los egipcios de tu mano
  rationale: La expresión conserva la imagen de rescate de la mano de Moisés. No se sustituye por una formulación más interpretativa para no perder la fuerza concreta del original.
  doctrine_reference: Narrative deliverance language in Jubilees/Exodus parallel
translation_notes:
  revision_awareness: Se incorporó la revisión que corrige ‘he came against you to accuse you’ por ‘he met you’ y la que exige el cierre interrogativo, reflejando la partícula ge’ez አኮሁ. No se siguió la lectura rechazada de ‘acusar’.
  spanish_consistency_notes:
  - Se mantiene ‘juicio’ en sentido forense, no como simple castigo genérico.
  - Se conserva un registro bíblico claro y moderno, sin recurrir a ‘SEÑOR’ ni a paráfrasis devocionales.
  - La pregunta retórica se mantiene íntegramente para alinear la sintaxis española con el original.
