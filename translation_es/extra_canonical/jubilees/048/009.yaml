base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/009.yaml
  text: And the prince Mastema stood up against you and sought to cast you into Pharaoh’s hand, and he helped the magicians of Egypt, and they stood and acted before you. We indeed permitted them to do evil, but we did not allow healing to be performed by their hands. But the LORD struck them with evil sores, and they were unable to continue resisting, because we made them incapable of performing even one sign of enchantment. And through all the signs and wonders the prince Mastema was put to shame, until, when he grew strong, he cried out to the Egyptians that they should pursue after you with all the power of Egypt, with their chariots and with their horses and with all the multitude of the people of Egypt. And I stood between the Egyptians and Israel, and we delivered Israel from his hand and from the hand of his people, and the LORD brought them out through the midst of the sea as on dry land.
  footnotes:
  - marker: a
    text: Or 'They indeed practiced their arts, and we permitted them so that they might be done by their hands.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:00Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y el príncipe Mastema se levantó contra ti y procuró entregarte en mano de Faraón; y ayudó a los magos de Egipto, y ellos se presentaron y actuaron ante ti. En verdad, les permitimos hacer el mal, pero no permitimos que hubiera sanidad[a] por sus manos. Pero Yahvé los hirió con llagas malignas, y no pudieron seguir resistiendo, porque los incapacitamos para hacer siquiera una señal de encantamiento. Y por todas las señales y maravillas el príncipe Mastema quedó avergonzado, hasta que, cuando se fortaleció, gritó a los egipcios que te persiguieran con toda la fuerza de Egipto, con sus carros y con sus caballos y con toda la multitud del pueblo de Egipto. Y yo me puse entre los egipcios y Israel, y libramos a Israel de su mano y de la mano de su pueblo, y Yahvé los sacó por en medio del mar como por tierra seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no permitimos que se practicara curación por sus manos»; el ge''ez contrasta aquí con el mal permitido antes.'
    reason: alternative_reading
lexical_decisions:
- source_word: መኰንን መስተማ / prince Mastema
  english_pob_choice: the prince Mastema
  chosen_spanish: el príncipe Mastema
  alternatives_spanish:
  - el jefe Mastema
  - el príncipe de Mastema
  lexicon: Mastema
  rationale: Conservo el título ‘príncipe’ porque el POB inglés lo fija así y el etíope presenta un gobernante personificado; ‘Mastema’ se mantiene como nombre propio transliterado.
- source_word: ይፈቅድ ያውድቅ ... ወይረድኡ ሥረያቲሆሙ
  english_pob_choice: sought to cast you into Pharaoh’s hand, and he helped the magicians of Egypt
  chosen_spanish: procuró entregarte en manos de Faraón; y ayudó a los magos de Egipto
  alternatives_spanish:
  - intentó ponerte en mano de Faraón; y ayudó a los magos de Egipto
  - buscó arrojarte en manos de Faraón; y apoyó a los magos de Egipto
  lexicon: unknown/hand
  rationale: ‘Entregarte en manos de’ reproduce el giro semítico del inglés POB (‘into Pharaoh’s hand’) sin perder el matiz de riesgo y captura. ‘Ayudó’ sigue la decisión inglesa frente a una posible lectura más general de ‘apoyó’.
- source_word: ሥረያቲሆሙ ለግብጽ
  english_pob_choice: the magicians of Egypt
  chosen_spanish: los magos de Egipto
  alternatives_spanish:
  - los hechiceros de Egipto
  - los encantadores de Egipto
  lexicon: magicians
  rationale: ‘Magos’ sigue la POB y evita introducir una tonalidad demasiado moderna o peyorativa; ‘hechiceros’ o ‘encantadores’ son posibles, pero ‘magos’ conserva el campo semántico de expertos rituales.
- source_word: እኩየስኬ
  english_pob_choice: We indeed permitted them to do evil
  chosen_spanish: les permitimos hacer el mal
  alternatives_spanish:
  - les permitimos obrar mal
  - les permitimos practicar el mal
  lexicon: evil
  rationale: La revisión auditada corrige una lectura errónea anterior; ‘hacer el mal’ refleja directamente el contraste explícito del ge'ez entre permitir maldad y negar curación.
- source_word: ፈውሳስ ፈናበውሎሙ
  english_pob_choice: we did not allow healing to be performed by their hands
  chosen_spanish: no permitimos que se realizara curación por sus manos
  alternatives_spanish:
  - no permitimos que hicieran curación con sus manos
  - no dejamos que se practicara sanidad por sus manos
  lexicon: healing
  rationale: ‘Curación’ sigue de cerca el sustantivo y preserva el contraste textual con ‘hacer el mal’. Evito ‘sanidad’ porque puede sonar más eclesial que literal en este contexto.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: YHWH
  rationale: Sigo el estándar del proyecto para el nombre divino; la forma subyacente aquí corresponde al tetragrámaton, no a una simple deferencia genérica.
- source_word: በቍስል እኩይ
  english_pob_choice: struck them with evil sores
  chosen_spanish: los hirió con llagas malignas
  alternatives_spanish:
  - los hirió con llagas malas
  - los golpeó con úlceras malignas
  lexicon: sores
  rationale: ‘Llagas’ es más natural y bíblico en español; ‘malignas’ conserva la cualidad negativa del adjetivo sin suavizarlo.
- source_word: ምንተኒ ሕሱደ ትእምርተ
  english_pob_choice: even one sign of enchantment
  chosen_spanish: siquiera una señal de encantamiento
  alternatives_spanish:
  - ni siquiera un solo signo de encantamiento
  - ni una sola señal mágica
  lexicon: sign/enchantment
  rationale: Mantengo ‘señal de encantamiento’ porque el inglés POB preserva la tensión entre ‘sign’ y artes mágicas; ‘encantamiento’ comunica el campo ritual sin reemplazarlo por una paráfrasis moderna.
- source_word: በሰረገላቲሆሙ ወበአፍራሲሆሙ
  english_pob_choice: with their chariots and with their horses
  chosen_spanish: con sus carros y con sus caballos
  alternatives_spanish:
  - en sus carros y en sus caballos
  - con sus carros de guerra y sus caballos
  lexicon: chariots/horses
  rationale: ‘Carros’ es la forma bíblica usual y suficientemente precisa; no añado ‘de guerra’ porque el texto no lo explicita.
- source_word: ወባላሕናሆሙ
  english_pob_choice: we delivered Israel from his hand and from the hand of his people
  chosen_spanish: libramos a Israel de su mano y de la mano de su pueblo
  alternatives_spanish:
  - liberamos a Israel de su mano y de su pueblo
  - rescatamos a Israel de su poder y del poder de su pueblo
  lexicon: delivered/from his hand
  rationale: ‘De su mano’ conserva el modismo semítico de poder/control presente en el inglés POB; ‘libramos’ mantiene el sentido de rescate sin borrar la imaginería.
- source_word: ከመ ... በኵሉ ኃይሎሙ
  english_pob_choice: through the midst of the sea as on dry land
  chosen_spanish: por en medio del mar como por tierra seca
  alternatives_spanish:
  - a través del mar como por tierra seca
  - por el medio del mar como sobre tierra seca
  lexicon: sea/dry land
  rationale: ‘Por en medio del mar’ sigue el ritmo bíblico y el paralelo ‘como por tierra seca’ reproduce el comparativo sin embellecerlo.
theological_decisions:
- issue: Divine name in a passage where the English POB uses 'the LORD'
  english_pob_reading: the LORD struck them ... the LORD brought them out
  chosen_spanish_reading: Yahvé los hirió ... y Yahvé los sacó
  alternative_spanish_readings:
  - el Señor los hirió ... y el Señor los sacó
  - el SEÑOR los hirió ... y el SEÑOR los sacó
  rationale: El proyecto exige transparentar el nombre divino cuando el trasfondo es יהוה; no hay indicio aquí de un simple κύριος genérico independiente del nombre. Mantener ‘Yahvé’ evita la máscara litúrgica.
  doctrine_reference: Tetragrammaton rendering policy
- issue: Contrast between permitted evil and prohibited healing
  english_pob_reading: We indeed permitted them to do evil, but we did not allow healing to be performed by their hands.
  chosen_spanish_reading: les permitimos hacer el mal, pero no permitimos que se realizara curación por sus manos.
  alternative_spanish_readings:
  - les permitimos obrar mal, pero no dejamos que hicieran curación con sus manos.
  - les permitimos hacer el mal, pero no permitimos sanidad por sus manos.
  rationale: 'La fuente ge''ez preserva una antítesis explícita: se permite el mal, pero se restringe la curación. La redacción española debe mantener esa tensión, sin fundirla en una sola idea de ‘artes’ o ‘hechicería’.'
  doctrine_reference: source-critical textual contrast
- issue: Rendering of 'sign of enchantment'
  english_pob_reading: even one sign of enchantment
  chosen_spanish_reading: siquiera una señal de encantamiento
  alternative_spanish_readings:
  - ni siquiera una señal mágica
  - siquiera un signo de hechicería
  rationale: No conviene domesticar el texto como simple ‘milagro’ ni explicarlo demasiado. ‘Encantamiento’ conserva el ámbito de prácticas mágicas, aunque suene más marcado, y mantiene la oposición con las señales divinas.
  doctrine_reference: anti-magic polemic in Exodus tradition
translation_notes:
  revision_awareness: 'La redacción toma en cuenta la revisión de 2026-04-28 que corrigió una lectura errónea anterior: el texto no habla de que se les permitiera ‘practicar sus artes’ en general, sino de una antítesis específica entre hacer el mal y ejercer curación. Por eso la versión española evita cualquier formulación que diluya esa oposición. También se respeta el hilo narrativo del POB inglés, pero se ajusta el nombre divino al estándar español del proyecto.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para el nombre divino conforme al estándar del proyecto.
  - Se mantiene ‘Mastema’ como nombre propio sin traducir ni explicar dentro del texto.
  - ‘Magos’ se conserva para ajustar el registro bíblico y el léxico POB.
  - ‘Curación’ se usa aquí por fidelidad a la oposición del texto; ‘sanidad’ queda solo como alternativa.
  - ‘De su mano’ conserva el modismo semítico de dominio/poder sin sustituirlo por una glosa interpretativa.
