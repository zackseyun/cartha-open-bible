    issue: «fue tras ellos» no refleja con suficiente naturalidad el matiz de persecución
    rationale: Aunque comprensible, en español suena débil y coloquial para un contexto militar. «Los persiguió, a Israel» o «fue en persecución de ellos» preserva mejor el sentido de pursued after.
  - severity: medium
    issue: «al medio del mar» es un giro poco idiomático
    rationale: La expresión natural en español es «en medio del mar». El borrador actual parece calco y reduce la legibilidad.
  - severity: low
    issue: La nota usa «extante», tecnicismo poco natural
    rationale: «Extante» existe, pero no es la opción más clara para lectores generales. «Conservado» o «preservado» comunica mejor la idea editorial.
