  yaml_path: translation/extra_canonical/jubilees/048/010.yaml
  text: And all the people whom he brought out pursued after them[10], after Israel, and Yahweh our God cast them into the midst of the sea, into its depths, beneath the sons of Israel, just as the people of Egypt had cast their sons into the river. A thousand thousand and ten thousand mighty men were destroyed because of one nursing infant of the children of your people whom they had thrown into the river.
  footnotes:
