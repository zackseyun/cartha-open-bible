  to: Y todo el pueblo que él sacó los persiguió[10], a Israel, y Yahvé nuestro Dios los arrojó en medio del mar, a sus profundidades, debajo de los hijos de Israel, así como el pueblo de Egipto había arrojado a sus hijos al río. Mil millares y diez mil hombres poderosos fueron destruidos a causa de un solo niño lactante de los hijos de tu pueblo, a quien ellos habían arrojado al río.
