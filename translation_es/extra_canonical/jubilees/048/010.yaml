translation:
  language: es
  text: Y todo el pueblo que él sacó los persiguió[10], a Israel, y Yahvé nuestro Dios los arrojó en medio del mar, a sus profundidades, debajo de los hijos de Israel, así como el pueblo de Egipto había arrojado a sus hijos al río. Mil millares y diez mil hombres poderosos fueron destruidos a causa de un solo niño lactante de los hijos de tu pueblo, a quien ellos habían arrojado al río.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '10'
    text: La numeración conservada del texto fuente salta del versículo 9 al 14; aquí se regulariza la secuencia en español para facilitar la lectura, preservando todo el contenido conservado.
    reason: source_note
lexical_decisions:
- source_word: Yahweh / the divine name
  english_pob_choice: Yahweh our God
  chosen_spanish: Yahvé nuestro Dios
  alternatives_spanish:
  - el SEÑOR nuestro Dios
  - el Señor nuestro Dios
  lexicon: YHWH
  rationale: La política del proyecto pide Yahvé para el nombre divino, no un sustituto reverencial. Mantiene la referencia personal del nombre y evita la ocultación convencional del hebreo.
- source_word: people whom he brought out
  english_pob_choice: all the people whom he brought out
  chosen_spanish: todo el pueblo que él sacó
  alternatives_spanish:
  - toda la gente que él sacó
  - todo el pueblo que él había sacado
  lexicon: עם / λαός
  rationale: «Pueblo» conserva mejor el valor colectivo y bíblico que «gente». El verbo «sacó» reproduce la salida/liberación sin añadir matices no presentes.
- source_word: pursued after
  english_pob_choice: pursued after them, after Israel
  chosen_spanish: fue tras ellos, tras Israel
  alternatives_spanish:
  - persiguió tras ellos, tras Israel
  - los persiguió, tras Israel
  lexicon: רדף / διώκω
  rationale: «Ir tras» mantiene el doble movimiento del texto sin forzar una redundancia pesada. Conserva la idea de persecución y seguimiento militar.
- source_word: into the midst of the sea, into its depths
  english_pob_choice: into the midst of the sea, into its depths
  chosen_spanish: al medio del mar, a sus profundidades
  alternatives_spanish:
  - en medio del mar, en sus profundidades
  - al centro del mar, en sus profundidades
  lexicon: תוך / βάθος
  rationale: «Al medio» y «a sus profundidades» son naturales en español y conservan la progresión espacial del original.
- source_word: beneath the sons of Israel
  english_pob_choice: beneath the sons of Israel
  chosen_spanish: debajo de los hijos de Israel
  alternatives_spanish:
  - debajo de los hijos de Israel
  - bajo los hijos de Israel
  lexicon: beneath / תחת
  rationale: Se conserva la imagen concreta de colocación «debajo de» sin suavizarla. «Hijos de Israel» mantiene la fórmula bíblica literal.
- source_word: the people of Egypt
  english_pob_choice: the people of Egypt
  chosen_spanish: el pueblo de Egipto
  alternatives_spanish:
  - los egipcios
  - la gente de Egipto
  lexicon: Egipto / מצרים
  rationale: «Pueblo de Egipto» preserva el paralelismo con «pueblo» y evita reducirlo a una mera nacionalidad moderna.
- source_word: had cast their sons into the river
  english_pob_choice: had cast their sons into the river
  chosen_spanish: había arrojado a sus hijos al río
  alternatives_spanish:
  - había echado a sus hijos al río
  - había lanzado a sus hijos al río
  lexicon: cast / השליך
  rationale: «Arrojado» reproduce con fuerza el acto violento de echar al agua y responde al paralelismo con el castigo retributivo.
- source_word: A thousand thousand and ten thousand mighty men
  english_pob_choice: A thousand thousand and ten thousand mighty men
  chosen_spanish: Mil millares y diez mil hombres poderosos
  alternatives_spanish:
  - Un millón y diez mil hombres poderosos
  - Mil millares y diez mil guerreros
  lexicon: numeral idiom / גיבורים
  rationale: La expresión se conserva casi literalmente porque parece un giro idiomático intensificador. «Hombres poderosos» traduce el valor de guerreros/fuertes sin introducir un cargo militar específico no explícito en el texto.
- source_word: nursing infant
  english_pob_choice: one nursing infant
  chosen_spanish: un solo niño lactante
  alternatives_spanish:
  - un solo lactante
  - un niño de pecho
  lexicon: infant / יונק
  rationale: «Niño lactante» comunica la dependencia y la pequeñez del sujeto mejor que una paráfrasis amplia. Se evita «de pecho» por regionalismo y se mantiene la referencia física explícita.
- source_word: because of
  english_pob_choice: because of one nursing infant...
  chosen_spanish: a causa de un solo niño lactante...
  alternatives_spanish:
  - por causa de un solo niño lactante
  - por un solo niño lactante
  lexicon: causal preposition
  rationale: «A causa de» expresa de manera clara la causalidad retributiva. Conserva la fuerza del motivo singular de la destrucción sin añadir interpretación.
theological_decisions:
- issue: Uso del nombre divino
  english_pob_reading: Yahweh our God
  chosen_spanish_reading: Yahvé nuestro Dios
  alternative_spanish_readings:
  - el SEÑOR nuestro Dios
  - el Señor nuestro Dios
  rationale: Se sigue la decisión editorial POB de hacer visible el nombre divino. En un pasaje que contrapone Yahvé al poder egipcio, el nombre propio es teológicamente relevante y no debe quedar enmascarado.
  doctrine_reference: Éxodo 3:15; Éxodo 14:26-28
- issue: Causalidad retributiva por el niño arrojado al río
  english_pob_reading: destroyed because of one nursing infant... whom they had thrown into the river
  chosen_spanish_reading: fueron destruidos a causa de un solo niño lactante... a quien ellos habían arrojado al río
  alternative_spanish_readings:
  - fueron destruidos por un solo niño lactante...
  - fueron destruidos debido a un solo niño lactante...
  rationale: 'Se conserva la relación moral de retribución histórica: el juicio contra Egipto se presenta como respuesta al crimen contra los infantes israelitas. «A causa de» mantiene esa relación sin diluirla.'
  doctrine_reference: Éxodo 1:22; Éxodo 14:27-28
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que sustituyó ‘the LORD’ por ‘Yahweh’ para coherencia con la política POB del nombre divino. También se respetó la corrección previa que restituyó el objeto causal completo (‘one nursing infant...’) para evitar la truncación del miembro causal. El texto español refleja ambas decisiones y conserva la referencia numérica regularizada indicada por la nota 10.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para el nombre divino.
  - Se conservó «hijos de Israel» y «hijos de tu pueblo» como fórmulas bíblicas literales.
  - Se evitó ‘SEÑOR’ para no ocultar el tetragrámaton en la línea principal.
  - Se eligió un registro bíblico moderno y legible, sin calco excesivamente rígido.
