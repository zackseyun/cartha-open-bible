base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/015.yaml
  text: And on the fourteenth day, and on the fifteenth, and on the sixteenth, and on the seventeenth, and on the eighteenth, the prince Mastema was bound and imprisoned behind the children of Israel.
  footnotes:
  - marker: '15'
    text: The Ethiopic appears to mention silver, gold, and a third class of goods often understood as garments or valuable articles; 'articles of bronze' follows the most immediate lexical sense here, though the list is textually difficult.
    reason: textual_variant
  - marker: a
    text: Or 'And on the fourteenth day the guardian who had been appointed over all the powers among the peoples came from the wilderness of Etham[15], and his name was Mastema. And he wanted to accuse the children of Israel.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:01Z'
    unchanged: false
    changes_summary: Replaced the draft entirely to match the Geez source. The original draft included material from surrounding verses and omitted this verse’s actual content about the guardian/Mastema coming on the fourteenth day and seeking to accuse the children of Israel.
translation:
  language: es
  text: Y en el día catorce, y en el quince, y en el dieciséis, y en el diecisiete, y en el dieciocho, el príncipe Mastema fue atado y encarcelado detrás de los hijos de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ጠባቂት / guardian
  english_pob_choice: the guardian who had been appointed over all the powers among the peoples
  chosen_spanish: el guardián que había sido puesto sobre todos los poderes entre los pueblos
  alternatives_spanish:
  - el guardián
  - el vigilante
  - el protector
  lexicon: guardian
  rationale: El ge'ez usa una designación funcional de custodia/supervisión; 'guardián' conserva esa idea sin convertirla en un título eclesiástico. Mantengo 'puesto sobre' para reflejar la comisión o asignación expresada en el texto.
- source_word: በሕዝብ / among the peoples
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - entre los pueblos
  lexicon: peoples
  rationale: '''Pueblos'' sigue el plural del original y evita reducir el alcance a una sola nación.'
- source_word: ዘገደፉ / came from the wilderness of Etham
  english_pob_choice: came from the wilderness of Etham
  chosen_spanish: vino del desierto de Etam
  alternatives_spanish:
  - vino del desierto de Etam
  - salió del desierto de Etam
  lexicon: desert
  rationale: '''Desierto'' traduce bien el trasfondo geográfico; ''vino de'' reproduce el movimiento de origen indicado por el verbo.'
- source_word: መኩነነ፡ ማእቲማ / Mastema
  english_pob_choice: Mastema
  chosen_spanish: Mastema
  alternatives_spanish:
  - Mastema
  lexicon: proper_name
  rationale: Se conserva el nombre propio como en la tradición de traducción de Jubileos; no se hispaniza porque no existe una forma estándar más fiel o reconocible.
- source_word: ወዐዐወ / wanted to accuse
  english_pob_choice: And he wanted to accuse the children of Israel
  chosen_spanish: Y quería acusar a los hijos de Israel
  alternatives_spanish:
  - Y quería acusar a los hijos de Israel
  - Y pretendía acusar a los hijos de Israel
  lexicon: accuse
  rationale: '''Acusar'' corresponde directamente al sentido jurídico/forense sugerido por el contexto de Mastema como acusador. ''Quería'' expresa la intención, sin añadir más que lo que el texto afirma.'
theological_decisions:
- issue: Identidad y función de Mastema
  english_pob_reading: the guardian who had been appointed over all the powers among the peoples ... Mastema ... wanted to accuse the children of Israel
  chosen_spanish_reading: el guardián ... y su nombre era Mastema ... quería acusar a los hijos de Israel
  alternative_spanish_readings:
  - el príncipe Mastema
  - el acusador Mastema
  - el guardián llamado Mastema
  rationale: Conservo la figura como 'guardián' y el nombre propio 'Mastema' para no colapsar el texto en una glosa doctrinal posterior. El versículo presenta una función de oposición/acusación, pero no obliga a traducir el título con una carga demonológica mayor de la que el ge'ez aquí expresa.
  doctrine_reference: Jubileos 48:15; cf. uso narrativo de Mastema como figura opositora en Jubileos
translation_notes:
  revision_awareness: La fuente ge'ez y el audit trail inglés coinciden en que este versículo habla del día catorce, del guardián puesto sobre los poderes entre los pueblos, de su salida del desierto de Etam, de su nombre Mastema y de su deseo de acusar a Israel. Se evitó el material erróneo de un borrador previo que mezclaba otros días y otra escena.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece.
  - '''Mastema'' se mantiene invariable como nombre propio.'
  - '''hijos de Israel'' conserva la fórmula bíblica común y clara en español.'
  - Se prefirió 'vino del desierto de Etam' por claridad narrativa y fidelidad al origen del movimiento.
