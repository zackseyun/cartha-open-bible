  source_alignment_summary: El borrador español no sigue el texto ge'ez ni la revisión vigente del POB inglés. El original enumera los días catorce a dieciocho y afirma que el príncipe Mastema fue atado y encarcelado detrás de los hijos de Israel. El borrador actual traduce una lectura anterior ya descartada sobre un guardián que vino de Etam y quiso acusar a Israel.
  spanish_quality_summary: 'El español del borrador es gramatical, pero transmite un contenido equivocado. La corrección necesaria es directa y puede expresarse con español claro y digno: una serie de fechas coordinadas seguida de la acción principal sobre Mastema.'
  glossary_alignment: No hay conflicto mayor con la glosa del proyecto salvo que el borrador usa 'guardián' siguiendo una lectura inglesa previa ya rechazada. Para መኩነነ፡ conviene 'príncipe' porque así lo fija el POB inglés auditado en este versículo. 'Mastema' debe conservarse como nombre propio.
  issues:
