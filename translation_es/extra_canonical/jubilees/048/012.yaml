revisions:
- from: Y en el día catorce, y en el quince, y en el dieciséis, y en el diecisiete, y en el dieciocho, el ángel Mastema fue atado y contenido para no seguir tras los hijos de Israel.
  to: Y en el día catorce, y en el quince, y en el dieciséis, y en el diecisiete, y en el dieciocho, el ángel Mastema fue atado y retenido, impedido de seguir detrás de los hijos de Israel.
  rationale: 'Se ajusta el español para mayor naturalidad y precisión: ''retenido'' expresa mejor la segunda acción verbal que ''contenido'', y ''impedido de seguir detrás de'' refleja más directamente la idea de ser frenado de perseguir a Israel. No se añaden notas porque no hay variante ni ambigüedad nueva que justificar.'
  reviewer_model: gpt-5.4
