  yaml_path: translation/extra_canonical/jubilees/048/012.yaml
  text: And on the fourteenth day, and on the fifteenth, and on the sixteenth, and on the seventeenth, and on the eighteenth, the angel Mastema was bound and restrained from following after the children of Israel.
  footnotes:
  - marker: a
    text: The binding of Mastema across specific days highlights Jubilees' interest in exact calendrical sequence during Passover and the Exodus.
    reason: cultural_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:53Z'
    unchanged: false
    changes_summary: Removed the stray footnote marker and preserved the source sequence and wording; no other textual changes needed.
translation:
  language: es
  text: Y en el día catorce, y en el quince, y en el dieciséis, y en el diecisiete, y en el dieciocho, el ángel Mastema fue atado y retenido, impedido de seguir detrás de los hijos de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዕለት
  english_pob_choice: day
  chosen_spanish: día
  alternatives_spanish:
  - jornada
  - fecha
  lexicon: Leslau
  rationale: El contexto enumera días consecutivos del calendario; 'día' reproduce de manera natural y precisa la secuencia temporal del original.
- source_word: መልአክ
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  - príncipe
  lexicon: Leslau
  rationale: El audit trail inglés eligió 'angel' como sentido directo de mal'ak; en español 'ángel' conserva esa equivalencia sin introducir el título interpretativo 'príncipe'.
- source_word: ተእስረ
  english_pob_choice: was bound
  chosen_spanish: fue atado
  alternatives_spanish:
  - fue encadenado
  - quedó atado
  lexicon: Leslau
  rationale: '''Atar'' refleja con sobriedad la imagen de sujeción física o restrictiva del verbo pasivo, manteniendo la fuerza concreta del texto.'
- source_word: ተዐግሠ
  english_pob_choice: restrained
  chosen_spanish: contenido
  alternatives_spanish:
  - retenido
  - restringido
  - frenado
  lexicon: Leslau
  rationale: Se añade 'contenido' para expresar el segundo verbo, que en el inglés POB distingue entre ser atado y ser restringido; en español evita repetir 'atado' y preserva la doble idea de sujeción y bloqueo.
- source_word: እምድኅረ
  english_pob_choice: following after
  chosen_spanish: para no seguir tras
  alternatives_spanish:
  - de seguir tras
  - para no ir detrás de
  lexicon: Leslau
  rationale: La construcción expresa impedimento de persecución/seguimiento; 'para no seguir tras' mantiene el matiz relacional de ir detrás de Israel.
- source_word: ደቂቀ ፡ እስራኤል
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los descendientes de Israel
  - el pueblo de Israel
  lexicon: Leslau
  rationale: Se conserva la fórmula tradicional del original y del POB inglés, sin suavizarla a 'el pueblo', porque el texto subraya una designación familiar/covenantal precisa.
theological_decisions:
- issue: Identidad y función de Mastema
  english_pob_reading: the angel Mastema was bound and restrained
  chosen_spanish_reading: el ángel Mastema fue atado y contenido
  alternative_spanish_readings:
  - Mastema fue atado y contenido
  - el príncipe Mastema fue atado y contenido
  rationale: Se mantiene 'ángel' porque el audit trail inglés decidió no leer aquí 'prince'; esto evita importar una jerarquía no apoyada por la forma geʿez citada.
  doctrine_reference: Jubilees' demonology / angelology in the canonical-apocryphal context
- issue: Secuencia calendárica exacta
  english_pob_reading: on the fourteenth... fifteenth... sixteenth... seventeenth... eighteenth
  chosen_spanish_reading: en el día catorce... quince... dieciséis... diecisiete... dieciocho
  alternative_spanish_readings:
  - el catorce... el quince...
  - los días catorce... dieciocho
  rationale: Se conserva la enumeración exacta de días consecutivos, porque el contexto de Jubileos enfatiza el orden calendárico preciso y no un resumen general.
  doctrine_reference: Passover/Exodus chronology in Jubilees
translation_notes:
  revision_awareness: La revisión más reciente eliminó un marcador de nota espurio y confirmó que no hay variante textual ni nota necesaria en este versículo. También corrigió una omisión anterior para incluir 'Israel' al final. Por ello, el español se ciñe al texto completo sin notas accesorias.
  spanish_consistency_notes:
  - Se usa 'ángel' de manera consistente con el audit trail inglés y no 'príncipe'.
  - Se evita 'SEÑOR' porque no aparece el nombre divino en este versículo.
  - '''Mastema'' se conserva como nombre propio transliterado, sin adaptación.'
