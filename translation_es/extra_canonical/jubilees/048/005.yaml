base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/005.yaml
  text: 'And the LORD executed a great vengeance on them for Israel: he struck them with blood, and with frogs, and with gnats, and with dog-flies, and with evil boils that burst out in blisters, and their livestock with death, and with hailstones—by this he destroyed everything that grew for them—and with locusts that devoured what had been left for them from the hail, and with darkness, and with the death of their firstborn, of man and beast; and on all their gods the LORD executed vengeance.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:59Z'
    unchanged: false
    changes_summary: Changed 'sprouted' to 'grew' for more natural formal English, and added 'for them' after 'left' to reflect the source more completely. Otherwise retained the draft.
translation:
  language: es
  text: 'Y Yahvé[a] ejecutó sobre ellos una gran venganza por Israel: los hirió con sangre, con ranas, con mosquitos[b], con moscas de perro[c] y con úlceras malignas que reventaban en ampollas; y a su ganado con muerte, y con piedras de granizo —con esto destruyó todo lo que les crecía[d]—, y con langostas que devoraron lo que les había quedado del granizo, y con tinieblas, y con la muerte de sus primogénitos, tanto de hombres como de animales; y sobre todos sus dioses, Yahvé ejecutó venganza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ge'ez እግዚአብሔር (ʾəgziʾabḥer, «Señor del Universo») es el título etíope estándar que representa el nombre divino YHWH del Vorlage hebreo de Jubileos. Conforme a la convención POB se restablece «Yahvé» en lugar del título enmascarador.
    reason: theological_note
  - marker: b
    text: 'Ge''ez ትነንያ (tənänäya); corresponde a la tercera plaga del Éxodo (heb. כִּנִּים, kinnîm). La identidad exacta del insecto es incierta en la tradición: algunas versiones leen «piojos», otras «jejenes» o «mosquitos». El POB inglés traduce «gnats»; se adopta «mosquitos» como equivalente más comprensible en el español latinoamericano amplio.'
    reason: lexical_alternative
  - marker: c
    text: Ge'ez ጽንጽያ ክልብ (ṣənṣəya kəlb), lit. «mosca de perro»; cuarta plaga del Éxodo (cf. heb. עָרֹב, ʿārōb). Jubileos especifica este tipo de mosca donde otros textos hablan solo de «enjambre». El POB inglés retiene el calco «dog-flies».
    reason: lexical_alternative
  - marker: d
    text: Ge'ez ዘይሠርፅ (zäyśärräṣ), «brotar, crecer, germinar». La revisión del POB inglés (2026-04-23) cambió «sprouted» por «grew» por mayor naturalidad; el español «les crecía» sigue esa naturalidad sin perder el sentido vegetal del ge'ez imperfectivo.
    reason: textual_variant
lexical_decisions:
- source_word: እግዚአብሔር (ʾəgziʾabḥer)
  english_pob_choice: LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  - Dios
  lexicon: Ge'ez ʾəgziʾabḥer, lit. 'Lord of the Universe'; standard Ethiopic title used throughout the Ge'ez Bible to render the Hebrew divine name YHWH. Jubilees was composed in Hebrew; ʾəgziʾabḥer represents the original YHWH of the Hebrew Vorlage.
  rationale: Per POB Spanish project convention, the divine name is rendered 'Yahvé' rather than the masking title 'SEÑOR'. Although the immediate source-language form is the Ge'ez title ʾəgziʾabḥer (analogous to Greek κύριος), this is the Ethiopic Bible's standard proxy for YHWH, not a shift in referent. The English POB uses LORD (small-caps), signaling the divine name. 'Yahvé' preserves the name's transparency in Spanish. The term appears twice in the verse; rendered consistently both times.
- source_word: በቀለ (bäqälä)
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - retribución
  - castigo
  - represalia
  lexicon: 'Ge''ez bäqälä: ''vengeance, revenge, retribution''; cognate with Hebrew נָקַם (nāqam) in sense. The noun form here denotes a judicial or retributive act.'
  rationale: '''Venganza'' is the most direct and formally equivalent Spanish rendering and carries both the punitive and retributive force of the Ge''ez. ''Retribución'' is semantically accurate but less vivid; ''castigo'' (punishment) flattens the vindicatory dimension. The English POB uses ''vengeance'' consistently; Spanish follows suit.'
- source_word: ቍርነነዓን (qʷərnenäʿan)
  english_pob_choice: frogs
  chosen_spanish: ranas
  alternatives_spanish:
  - sapos
  lexicon: 'Ge''ez qʷərnenäʿan: ''frogs''; second Exodus plague (cf. Exod 8:1–15 / MT 7:26–8:11).'
  rationale: '''Ranas'' is unambiguous and standard in biblical Spanish. ''Sapos'' (toads) would import a distinction not present in the source.'
- source_word: ትነንያ (tənänäya)
  english_pob_choice: gnats
  chosen_spanish: mosquitos
  alternatives_spanish:
  - jejenes
  - piojos
  - pulgas
  lexicon: 'Ge''ez tənänäya: the third Exodus plague; corresponds to Hebrew כִּנִּים (kinnîm), variously translated as gnats, lice, or sand fleas across traditions.'
  rationale: The Ge'ez term is ambiguous—its Hebrew equivalent כִּנִּים is itself disputed (gnats, lice, mosquitoes). The English POB chose 'gnats.' In broadly church-readable Latin American Spanish, 'mosquitos' is the most naturally understood term for small biting/stinging insects of the pest variety, and avoids the more specialized 'jejenes.' 'Piojos' (lice) is an alternative attested in some Spanish Bible traditions but risks narrowing to ectoparasites. 'Mosquitos' is chosen as optimal-equivalence; the ambiguity is noted in the footnote.
- source_word: ጽንጽያ ክልብ (ṣənṣəya kəlb)
  english_pob_choice: dog-flies
  chosen_spanish: moscas caninas
  alternatives_spanish:
  - moscas de perro
  - tábanos
  - enjambre de moscas
  lexicon: Ge'ez ṣənṣəya kəlb, lit. 'fly of dog' or 'dog-fly'; fourth Exodus plague (cf. Hebrew עָרֹב, ʿārōb—often rendered 'swarms' or 'flies,' but Jubilees specifies the dog-fly variety).
  rationale: The Ge'ez preserves a specific compound that the English POB retains literally ('dog-flies'). 'Moscas caninas' is a faithful calque that keeps the unusual specificity of the source. 'Tábanos' (horseflies) would introduce a different insect not warranted by the source. 'Moscas de perro' is equally accurate but slightly less dignified in register; 'moscas caninas' matches the text's formal diction.
- source_word: ቍስል (qʷəsl)
  english_pob_choice: boils
  chosen_spanish: úlceras
  alternatives_spanish:
  - llagas
  - furúnculos
  - sarpullido
  lexicon: 'Ge''ez qʷəsl: ''sore, wound, boil, ulcer''; sixth Exodus plague (cf. Exod 9:9–11).'
  rationale: '''Úlceras'' conveys open, suppurating sores and pairs naturally with ''ampollas'' (blisters/pustules) in the next phrase. ''Llagas'' is a common biblical equivalent but slightly more poetic; ''furúnculos'' is medically precise but wooden in context. ''Úlceras malignas'' renders both ቍስል (sore) and እኩይ (evil/malignant) together.'
- source_word: ዐንጸዐንጺ (ʿanṣaʿanṣi)
  english_pob_choice: blisters
  chosen_spanish: ampollas
  alternatives_spanish:
  - pústulas
  - vesículas
  - heridas abiertas
  lexicon: 'Ge''ez ʿanṣaʿanṣi: ''blisters, pustules''; the reduplicated form suggests erupting or bursting sores. The verb ይፈልሕ (yäfälläḥ, ''burst/split open'') governs this noun.'
  rationale: '''Ampollas'' captures the blister/pustule sense and pairs well with ''reventaban'' (burst) to translate ይፈልሕ. ''Pústulas'' is medically precise but more clinical; ''ampollas'' is widely understood in neutral Latin American Spanish.'
- source_word: ዘይሠርፅ ሎሙ (zäyśärräṣ lomu)
  english_pob_choice: grew for them (revised from 'sprouted for them')
  chosen_spanish: les brotaba
  alternatives_spanish:
  - les crecía
  - les germinaba
  - brotaba para ellos
  lexicon: 'Ge''ez yäśärräṣ: ''sprout, grow, shoot up''; imperfect (habitual/ongoing aspect) of the root śärräṣa. The dative pronoun lomu (''for them'') is present in the Ge''ez.'
  rationale: The English POB revision changed 'sprouted' to 'grew' for naturalness, while affirming the dative 'for them.' Spanish 'brotaba' integrates both the vegetative emergence sense (closer to 'sprouted') and the imperfective aspect of the Ge'ez form. 'Les brotaba' incorporates the dative lomu ('for them'). This is consistent with the revision rationale.
- source_word: አማልክቲ (ʾamāläkti)
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - ídolos
  - deidades
  - falsos dioses
  lexicon: 'Ge''ez ʾamāläkti: plural of ʾamlāk, ''god, deity, angel.'' In the context of the Exodus plagues directed against Egypt''s divine beings, the plural clearly refers to the Egyptian gods.'
  rationale: '''Dioses'' is the accurate and unglossed rendering. ''Ídolos'' would editorialize (implying non-existence); ''deidades'' is acceptable but more evasive. The source text makes a theological point by naming these as gods (divine rivals) against whom Yahvé executes judgment—softening this with ''ídolos'' would erase a documented theological dimension.'
theological_decisions:
- issue: Divine name mediation through Ge'ez ʾəgziʾabḥer
  english_pob_reading: LORD (small-caps, signaling YHWH)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: Jubilees is a Hebrew-composed pseudepigraphon; its Ge'ez text represents the only complete surviving form, and the Ethiopic translators consistently rendered YHWH as ʾəgziʾabḥer. The English POB's use of LORD (small-caps) reflects the convention of signaling the Tetragrammaton through the Ge'ez proxy. Following POB Spanish policy, 'Yahvé' is used rather than 'SEÑOR' to maintain transparency about the divine name. While ʾəgziʾabḥer is formally a title (like κύριος), it functions exclusively as YHWH's name in the Ethiopic biblical tradition, so the divine-name transparency policy applies.
  doctrine_reference: 'POB Spanish project default: יהוה / YHWH → ''Yahvé''; divine name mediated via Ge''ez title analogous to κύριος.'
- issue: Judgment 'on all their gods' — Egyptian polytheism acknowledged without euphemism
  english_pob_reading: on all their gods the LORD executed vengeance
  chosen_spanish_reading: sobre todos sus dioses, Yahvé ejecutó venganza
  alternative_spanish_readings:
  - sobre todos sus ídolos
  - contra todas sus deidades
  rationale: Jubilees 48:5 follows a tradition (echoed in Exod 12:12 and Num 33:4) that explicitly frames the plagues as Yahvé's judgment against the gods of Egypt. The Ge'ez ʾamāläkti is the standard term for divine beings. Rendering as 'ídolos' would impose a polemical gloss absent from the source text and would erase the theological claim that a real (if subordinate or defeated) divine contest is in view. 'Dioses' preserves the source's theological directness.
  doctrine_reference: Exod 12:12; Num 33:4; Jubilees theology of Yahvé's supremacy over the gods of the nations.
translation_notes:
  revision_awareness: 'La versión inglesa del POB fue revisada el 2026-04-23 (revisor: azure-gpt-5.4). Los cambios fueron: (1) «sprouted» → «grew» (mayor naturalidad formal en inglés); (2) se añadió «for them» después de «left» para reflejar más fielmente el pronombre dativo ge''ez ሎሙ (lomu) en ዘተረፎሙ. El borrador español incorpora ambos ajustes: «brotaba» (captura la emergencia vegetal del ge''ez yäśärräṣ sin forzar «germinaba») y «les había quedado» (traduce el dativo lomu presente en el texto fuente y en la revisión inglesa).'
  spanish_consistency_notes:
  - «Yahvé» empleado consistentemente para እግዚአብሔር en ambas apariciones del nombre divino dentro del versículo, conforme al valor predeterminado del proyecto POB español.
  - «Tinieblas» preferido sobre «oscuridad» para ጽልመት (ṣəlmät) por su mayor registro bíblico y resonancia litúrgica en español latinoamericano.
  - «Ganado» para እንስሳሆሙ (ʾənśāśāhomu) en el contexto específico del juicio sobre el ganado egipcio; «animales» en la frase final «de hombres como de animales» para el sentido más amplio de ዘእንስሳ, que engloba toda criatura viviente.
  - «Primogénitos» para በኵሮሙ (bäkʷəromu) es el término bíblico español estándar y el más fiel al sentido de la plaga final (cf. Éxod 12:29).
  - «Úlceras malignas que reventaban en ampollas» traduce la frase compuesta እኩይ ቍስል ዘውእቱ ይፈልሕ ዐንጸዐንጺ manteniendo la estructura participial del ge'ez; se evita comprimir en una sola palabra para no perder el detalle de la erupción descrita.
  - «Dioses» para አማልክቲ (ʾamāläkti) no se atenúa con «ídolos» ni «deidades», preservando la tensión teológica del texto fuente sobre el juicio de Yahvé contra las potencias divinas de Egipto.
