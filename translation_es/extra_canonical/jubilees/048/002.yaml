translation:
  language: es
  text: Otra vez, en el segundo año del quincuagésimo jubileo, sabes[a] lo que se te dijo en el monte Sinaí, y lo que el príncipe Mastema quiso hacerte cuando regresabas a Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conocerás» o «sabrás».'
    reason: previous_rendering
  - marker: b
    text: 'O: «cuando entrabas en Egipto».'
    reason: previous_rendering
lexical_decisions:
- source_word: ዳግም፡ በዓመት፡ ካልእ፡ በውስተ፡ ፶ኢዮቤሌው፡
  english_pob_choice: Again, in the second year of the fiftieth jubilee
  chosen_spanish: Otra vez, en el segundo año del quincuagésimo jubileo
  alternatives_spanish:
  - De nuevo, en el segundo año del quincuagésimo jubileo
  - Otra vez, en el segundo año del jubileo quincuagésimo
  lexicon: again / second year / fiftieth jubilee
  rationale: Conserva el valor temporal de ዳግም y la datación relativa del original. ‘Quincuagésimo jubileo’ sigue de cerca el orden del inglés POB, pero suena natural en español.
- source_word: ታአምር፡
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - sabes
  - tú conocerás
  lexicon: to know
  rationale: Sigue la revisión que corrige el futuro a presente contextual. En español, ‘sabes’ expresa memoria/reconocimiento de lo ya dicho.
- source_word: ዘተናገረ፡ ለከ፡ በደብረ፡ ሲና፡
  english_pob_choice: what was spoken to you on Mount Sinai
  chosen_spanish: lo que te fue dicho en el monte Sinaí
  alternatives_spanish:
  - lo que te fue hablado en el monte Sinaí
  - lo que se te dijo en el monte Sinaí
  lexicon: spoken to you / Mount Sinai
  rationale: ‘Te fue dicho’ refleja pasivo de recepción sin forzar un sujeto explícito. ‘Monte Sinaí’ conserva el topónimo bíblico estándar.
- source_word: ወምንተ፡ ፈቀደ፡ ይግበር፡ ምስሌከ፡ መኰንን፡ መስተማ፡
  english_pob_choice: and what the prince Mastema desired to do to you
  chosen_spanish: y lo que el príncipe Mastema quiso hacerte
  alternatives_spanish:
  - y lo que el príncipe Mastema deseó hacerte
  - y lo que el príncipe Mastema quiso hacer contra ti
  lexicon: prince Mastema / desired to do to you
  rationale: ‘Quiso hacerte’ sigue la revisión que acerca el valor léxico de ‘to you’ y evita sobrecargar con una preposición no apoyada por el texto. ‘Mastema’ se conserva como nombre propio/título demoníaco transmitido por la tradición de Jubileos.
- source_word: አመ፡ ትገብእ፡ ግብጸ፡
  english_pob_choice: when you were returning to Egypt
  chosen_spanish: cuando regresabas a Egipto
  alternatives_spanish:
  - cuando volvías a Egipto
  - cuando estabas regresando a Egipto
  lexicon: when you were returning to Egypt
  rationale: La revisión adjudicada corrige ‘entering’ a ‘returning to’; en español ‘regresabas’ expresa bien movimiento de vuelta con naturalidad narrativa.
theological_decisions:
- issue: Referencia al ‘príncipe Mastema’
  english_pob_reading: the prince Mastema
  chosen_spanish_reading: el príncipe Mastema
  alternative_spanish_readings:
  - el príncipe de Mastema
  - el príncipe Mastema, figura enemiga
  rationale: Se mantiene la designación tradicional de Jubileos sin reinterpretarla. ‘Príncipe’ conserva la jerarquía/autoridad atribuida al ser adversario.
  doctrine_reference: Jubileos 10; 48:2; tradición del adversario en literatura del Segundo Templo
translation_notes:
  revision_awareness: 'La redacción sigue las correcciones auditadas: ‘you know’ en lugar de ‘you shall know’, y ‘returning to Egypt’ en lugar de ‘entering Egypt’. También ajusta la datación a una sintaxis española natural (‘en el segundo año del quincuagésimo jubileo’).'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ por norma del proyecto solo cuando aparece el nombre divino; aquí no se requiere.
  - ‘Mastema’ se mantiene transliterado como nombre propio fijo del libro.
  - Se usa voz pasiva perifrástica (‘te fue dicho’) para reflejar el pasivo del original sin añadir un sujeto no expresado.
