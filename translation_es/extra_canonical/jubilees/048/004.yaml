base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/048/004.yaml
  text: But I delivered you from his hand, and you did the signs and wonders which you were sent to do in Egypt against Pharaoh and against all his house and against his servants and against his people.
  footnotes:
  - marker: a
    text: Or 'for which you were sent to do'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:57Z'
    unchanged: false
    changes_summary: Changed 'performed' to 'did' for closer lexical correspondence, and revised 'that you were sent to do' to 'for which you were sent to do' to reflect the explicit prepositional link in the source. Kept the repeated 'against' structure for completeness and formality.
translation:
  language: es
  text: Pero te libré de su mano, e hiciste las señales y prodigios que fuiste enviado a hacer en Egipto contra Faraón y contra toda su casa y contra sus siervos y contra su pueblo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወባላሕኩከ / delivered you from his hand
  english_pob_choice: But I delivered you from his hand
  chosen_spanish: te libré de su mano
  alternatives_spanish:
  - te saqué de su mano
  - te rescaté de su mano
  lexicon: librar
  rationale: ‘Libré’ conserva la fuerza de rescate/liberación del contexto y refleja bien el contraste con ‘su mano’ como dominio o poder. ‘Rescaté’ sería posible, pero ‘libré’ mantiene mejor el registro bíblico y la relación con liberación concreta.
- source_word: ገበርከ፡ ተአምረ፡ ወመንክረ፡
  english_pob_choice: you did the signs and wonders
  chosen_spanish: hiciste las señales y prodigios
  alternatives_spanish:
  - realizaste las señales y maravillas
  - hiciste señales y maravillas
  lexicon: señales / prodigios
  rationale: ‘Señales y prodigios’ conserva la pareja formulaica del texto y evita suavizar ‘wonders’ como ‘maravillas’ cuando el español bíblico puede expresar bien la distinción con ‘prodigios’.
- source_word: ለዛ፡ ተፈነውከ፡ ትግበር፡
  english_pob_choice: which you were sent to do
  chosen_spanish: que fuiste enviado a hacer
  alternatives_spanish:
  - para hacer
  - que te enviaron a hacer
  lexicon: enviar / hacer
  rationale: La construcción española mantiene la relación entre envío y tarea sin forzar el giro inglés. ‘Fuiste enviado a hacer’ refleja bien el pasivo del original y evita introducir una finalidad que no está explícita en el texto.
- source_word: በግብጽ፡ ላዕለ፡ ፈርዖን፡ ወላዕለ፡ ኵሉ፡ ቤቱ፡ ወላዕለ፡ አግብርቱ፡ ወላዕለ፡ ሕዝቡ
  english_pob_choice: in Egypt against Pharaoh and against all his house and against his servants and against his people
  chosen_spanish: en Egipto contra Faraón, y contra toda su casa, y contra sus siervos, y contra su pueblo
  alternatives_spanish:
  - en Egipto contra Faraón y contra toda su casa y contra sus servidores y contra su gente
  - en Egipto, contra Faraón, contra toda su casa, contra sus siervos y contra su pueblo
  lexicon: contra / siervos
  rationale: Se conserva la repetición enfática de ‘contra’ del audit trail inglés, ya que corresponde a la acumulación del original. ‘Siervos’ aquí traduce el grupo social del palacio/casa de Faraón; no se usa ‘esclavos’ porque el término original puede abarcar más que esclavitud servil estricta en este contexto narrativo.
theological_decisions:
- issue: Relación entre el envío y la acción de hacer señales y prodigios
  english_pob_reading: you were sent to do
  chosen_spanish_reading: fuiste enviado a hacer
  alternative_spanish_readings:
  - fuiste enviado para hacer
  - fuiste enviado con el fin de hacer
  rationale: La frase española conserva la agencia divina del envío y la tarea asignada sin añadir un matiz teleológico no explicitado. Esto sigue de cerca la revisión más reciente del audit trail, que prioriza la correspondencia léxica con el ge'ez.
  doctrine_reference: Providencia y misión profética/ministerial en el relato de Éxodo
- issue: Tensión entre ‘señales’ y ‘prodigios’ como pareja técnica
  english_pob_reading: signs and wonders
  chosen_spanish_reading: señales y prodigios
  alternative_spanish_readings:
  - señales y maravillas
  - milagros y prodigios
  rationale: '‘Señales y prodigios’ preserva la formulación técnica y la posible distinción semántica: ‘señales’ como actos significativos y ‘prodigios’ como hechos maravillosos o asombrosos. No se aplanó a ‘milagros’ para no perder esa doble resonancia.'
  doctrine_reference: Lenguaje bíblico de milagros/señales en la narrativa revelatoria
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó ‘performed’ a ‘did’ y aclaró la cláusula relativa como ‘which you were sent to do’. También se respetó la estructura repetida de ‘against’ como rasgo formal del texto fuente.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente de la segunda persona singular (‘te’, ‘hiciste’, ‘fuiste enviado’) conforme al inglés auditado.
  - ‘Yahvé’ no aparece en este versículo, por lo que no se aplica la convención del nombre divino aquí.
  - ‘Siervos’ se conserva por coherencia con el audit trail y por ser un término comprensible en español bíblico, sin imponer ‘esclavos’ donde el contexto narrativo de casa real puede admitir un sentido de dependientes o servidores.
