revisions:
- from: 'Después de que Abraham murió, los llenaron de tierra. Y Abimelec dijo a Isaac: «Apártate de nosotros, porque te has hecho mucho más poderoso que nosotros». Entonces Isaac partió de allí en el primer año de la séptima semana y acampó en el valle de Guerar. Y volvieron a cavar los pozos de agua que los siervos de Abraham, su padre, habían cavado, y que los filisteos habían cegado después de la muerte de Abraham, su padre; y les pusieron los nombres que Abraham, su padre, les había puesto. Y los siervos de Isaac cavaron un pozo en el wadi y hallaron agua viva. Y los pastores de Guerar pelearon con los pastores de Isaac, diciendo: «El agua es nuestra». Isaac llamó Contienda[a] al nombre de aquel pozo, porque contendieron con nosotros. Y cavaron otro pozo, y también pelearon por él; por eso le puso por nombre Hostilidad[b]. Luego se apartó de allí y cavó otro pozo, y no pelearon por él; y le puso por nombre Lugar Amplio[c]. Y Isaac dijo: «Ahora Yahvé nos ha dado espacio, y fructificaremos
    en la tierra». Y subió de allí al Pozo del Juramento en el primer año de la primera semana del cuadragésimo cuarto jubileo. Y Yahvé se le apareció aquella noche, al amanecer del primer día del primer mes, y le dijo: «Yo soy el Dios de Abraham tu padre. No temas, porque yo estoy contigo, y te bendeciré y multiplicaré grandemente tu descendencia como la arena de la tierra, por amor de Abraham, mi siervo». Y allí edificó un altar, donde Abraham, su padre, había edificado primero uno, e invocó el nombre de Yahvé, y ofreció sacrificio al Dios de Abraham, su padre. Y cavaron un pozo y hallaron agua viva. Y los siervos de Isaac cavaron otro pozo y no hallaron agua, y vinieron y le dijeron a Isaac que no habían hallado agua. Y Isaac dijo: «Hoy he jurado a los filisteos, y esto nos ha sucedido». Y llamó al lugar Pozo del Juramento, porque allí juró a Abimelec, a Ahuzat su compañero y a Ficol, el jefe de su ejército. E Isaac entendió aquel día que había jurado por coerción, para hacer paz con
    ellos. Y aquel día Isaac maldijo a los filisteos y dijo: «Malditos sean los filisteos con furor e indignación entre todas las naciones. Que Yahvé los entregue para oprobio, para maldición, para furor y para indignación en mano de naciones pecadoras, en mano de los kitim. Y a los que escapen de la espada del enemigo y de los kitim, que un pueblo justo los arranque[a] de debajo del cielo, porque serán enemigos y aborrecedores de mis hijos en sus generaciones sobre la tierra. Y no se les dejará ningún sobreviviente ni ningún fugitivo en el día del juicio airado. Porque toda la descendencia de los filisteos está destinada a destrucción, desarraigo y remoción de la tierra, y ya no quedará para estos captorim ni remanente ni descendencia sobre la tierra. Porque aunque suba hasta el cielo, de allí será derribado; y si se hunde en la tierra, de allí será arrastrado; y si se esconde entre las naciones, de allí será desarraigado; y si desciende al Seol, allí también se aumentará su juicio, y no
    habrá para él paz allí. Y si va al cautiverio, por mano de los que buscan su vida en los caminos lo matarán, y no le quedará ni nombre ni descendencia en toda la tierra, porque irá a maldición eterna». Y así está escrito y ordenado acerca de él en las tablas celestiales, para hacerle en el día del juicio, a fin de que sea arrancado de la tierra.'
  to: 'Después de que Abraham murió, los llenaron de tierra. Y Abimelec dijo a Isaac: «Apártate de nosotros, porque te has hecho mucho más poderoso que nosotros». Entonces Isaac partió de allí en el primer año de la séptima semana y acampó en el valle de Guerar. Y volvieron a cavar los pozos de agua que los siervos de Abraham, su padre, habían cavado, y que los filisteos habían cegado después de la muerte de Abraham, su padre; y les pusieron los nombres que Abraham, su padre, les había puesto. Y los siervos de Isaac cavaron un pozo en el wadi y hallaron agua viva. Y los pastores de Guerar pelearon con los pastores de Isaac, diciendo: «El agua es nuestra». Isaac llamó a aquel pozo Contienda, porque contendieron con nosotros. Y cavaron otro pozo, y también pelearon por él; por eso le puso por nombre Hostilidad[a]. Luego se apartó de allí y cavó otro pozo, y no pelearon por él; y le puso por nombre Lugar Amplio[b]. Y Isaac dijo: «Ahora Yahvé nos ha dado espacio, y fructificaremos en la tierra».
    Y subió de allí al Pozo del Juramento en el primer año de la primera semana del cuadragésimo cuarto jubileo. Y Yahvé se le apareció aquella noche, al amanecer del primer día del primer mes, y le dijo: «Yo soy el Dios de Abraham tu padre. No temas, porque yo estoy contigo, y te bendeciré y multiplicaré grandemente tu descendencia como la arena de la tierra, por amor de Abraham, mi siervo». Y allí edificó un altar, donde Abraham, su padre, había edificado primero uno, e invocó el nombre de Yahvé, y ofreció sacrificio al Dios de Abraham, su padre. Y cavaron un pozo y hallaron agua viva. Y los siervos de Isaac cavaron otro pozo y no hallaron agua, y vinieron y le dijeron a Isaac que no habían hallado agua. Y Isaac dijo: «En este día he jurado a los filisteos, y esto nos ha sucedido». Y llamó al lugar Pozo del Juramento, porque allí juró a Abimelec, a Ahuzat su compañero y a Ficol, el jefe de su ejército. E Isaac entendió aquel día que había jurado bajo coacción, para hacer paz con ellos.
    Y aquel día Isaac maldijo a los filisteos y dijo: «Malditos sean los filisteos con furor e indignación entre todas las naciones. Que Yahvé los entregue para oprobio, para maldición, para furor y para indignación en mano de naciones pecadoras, en mano de los kitim. Y a los que escapen de la espada del enemigo y de los kitim, que un pueblo justo los arranque[c] en juicio de debajo del cielo, porque serán enemigos y aborrecedores de mis hijos en sus generaciones sobre la tierra. Y no se les dejará ningún sobreviviente ni ningún fugitivo en el día del juicio airado. Porque toda la descendencia de los filisteos está destinada a destrucción, desarraigo y remoción de la tierra, y ya no quedará para estos captorim ni remanente ni descendencia sobre la tierra. Porque aunque suba hasta el cielo, de allí será derribado; y si se hunde en la tierra, de allí será arrastrado; y si se esconde entre las naciones, de allí será desarraigado; y si desciende al Seol, allí también se aumentará su juicio,
    y no habrá para él paz allí. Y si va al cautiverio, por mano de los que buscan su vida en los caminos lo matarán, y no le quedará ni nombre ni descendencia en toda la tierra, porque irá a maldición eterna». Y así está escrito y ordenado acerca de él en las tablas celestiales, para ejecutar esto contra él en el día del juicio, a fin de que sea arrancado de la tierra.'
  rationale: Se corrige la disciplina de notas usando marcadores únicos; se incorpora al texto principal la cláusula fuente-relevante «en juicio»; se mejora la sintaxis de la denominación del pozo; se ajusta «Hoy» a «En este día» para reflejar mejor la solemnidad narrativa; y se pulen algunas expresiones para un español más natural sin alterar el sentido.
