  - severity: medium
    issue: Sintaxis poco natural en la denominación del pozo
    rationale: «Isaac llamó Contienda al nombre de aquel pozo» suena calcado. En español bíblico natural sería «Isaac llamó a aquel pozo Contienda» o «le puso por nombre Contienda».
