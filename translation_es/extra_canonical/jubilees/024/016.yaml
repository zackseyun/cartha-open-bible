theological_decisions:
- issue: Nombre divino en discurso directo y narrativa
  english_pob_reading: the LORD / Yahweh in context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: La política del proyecto exige no mascar el nombre divino. En este pasaje, la intervención divina, el altar y la bendición funcionan mejor con el nombre propio «Yahvé».
  doctrine_reference: Tetragrámaton y transparencia textual del POB
- issue: «Mi siervo» aplicado a Abraham
  english_pob_reading: for the sake of Abraham my servant
  chosen_spanish_reading: por amor de Abraham, mi siervo
  alternative_spanish_readings:
  - por causa de Abraham, mi siervo
  - por amor de Abraham, mi esclavo
  rationale: El texto presenta a Abraham como siervo de Dios en un marco de pacto; «siervo» preserva la relación reverente sin introducir una dureza social que el contexto no exige.
  doctrine_reference: Lenguaje pactal de elección y fidelidad
- issue: Lectura emendada de la cláusula de juicio
  english_pob_reading: let a righteous people root them out in judgment from under heaven
  chosen_spanish_reading: que un pueblo justo los arranque de debajo del cielo
  alternative_spanish_readings:
  - que un pueblo justo los arranque en juicio de debajo del cielo
  - que un pueblo justo los desarraigue en juicio de debajo del cielo
  rationale: La revisión crítica del inglés señala que el ge'ez subyacente contiene una lectio mejor entendida como «in judgment», pero el verbo principal ya comunica el acto de expulsión/desarraigo. En español se deja el juicio como marco del día del juicio y se mantiene fluido el verbo principal; el matiz judicial queda reforzado por «día del juicio airado» y por la clausula final de las tablas celestiales.
  doctrine_reference: Justicia retributiva escatológica
- issue: Destino de los filisteos/captorim y tono profético
  english_pob_reading: destined for destruction and uprooting and removal from the earth
  chosen_spanish_reading: destinada a destrucción, desarraigo y remoción de la tierra
  alternative_spanish_readings:
  - destinada a destrucción, desarraigo y expulsión de la tierra
  - destinada a ruina, desarraigo y remoción de la tierra
  rationale: Se conserva la triple fórmula de ruina/desarraigo/remoción sin suavizarla. «Remoción» sigue de cerca la lista del inglés POB y evita perder la acumulación profética.
  doctrine_reference: Juicio histórico y profético sobre las naciones
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB que ajustó several cláusulas hacia una alineación más estrecha con el ge''ez: «we will be fruitful», «at dawn on the first day of the first month», la aclaración del altar, «remnant or seed», y la preferencia por una lectura más literal en las imágenes de altura/profundidad. También se consideró la observación crítica sobre la posible lectura emendada de la cláusula de juicio (ba-kʷǝnnane), aunque en la versión española se preserva la fluidez del periodo y se refuerza el marco judicial en el contexto inmediato.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se usó «filisteos» en minúscula por tratarse de un etnónimo común en español bíblico.
  - Se conservaron los nombres etiológicos con traducción significativa y nota de alternativa literal.
  - Se evitó traducir mecánicamente «the LORD» como «SEÑOR».
  - 'Se mantuvo la triple cadencia de juicio final: destrucción, desarraigo y remoción.'
  - Se escogió «agua viva» para preservar el giro semítico sin explicarlo en el cuerpo del texto.
