  glossary_alignment: No hay términos del glosario doctrinal principal en juego como Yahvé, Mesías, Espíritu, etc. La decisión «primogenitura» concuerda bien con el razonamiento léxico documentado. La nota alternativa «derecho de primogénito» es apropiada como aclaración española del valor jurídico-hereditario.
