  yaml_path: translation/extra_canonical/jubilees/024/003.yaml
  text: And Jacob cooked lentil stew, and Esau came from the field hungry. And he said to Jacob his brother, "Give me some of this wheat stew." And Jacob said to him, "Sell me your firstborn birthright."
  footnotes:
  - marker: a
    text: Or 'Sell me your birthright first.'.
    reason: previous_rendering
  - marker: b
    text: Or 'Give me some of this lentil stew.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:41Z'
    unchanged: false
    changes_summary: Removed the added word 'red,' which is not clearly supported by the Geez here; simplified the request to match the source more closely; and revised the final clause to reflect the wording about selling the birthright first without the interpretive expansion 'the firstborn share.'
translation:
  language: es
  text: 'Entonces Jacob preparó un guiso de lentejas, y Esaú llegó del campo hambriento. Y le dijo a Jacob, su hermano: «Dame un poco de este guiso de trigo[a]». Y Jacob le dijo: «Véndeme tu primogenitura[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dame un poco de este guiso de lentejas». La fuente ge''ez presenta aquí una lectura distinta de la primera mención del plato.'
    reason: textual_variant
  - marker: b
    text: 'O: «Véndeme tu derecho de primogénito». «Primogenitura» conserva el valor legal y hereditario del término.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ተብሰለ፡ ብርስን
  english_pob_choice: lentil stew
  chosen_spanish: guiso de lentejas
  alternatives_spanish:
  - estofado de lentejas
  - potaje de lentejas
  lexicon: lentil stew
  rationale: La fuente ge'ez y el audit trail inglés coinciden en que el primer plato es de lentejas; «guiso» comunica bien un alimento cocido sin añadir matices no atestiguados.
- source_word: ተብሰል፡ ዘሥርናይ
  english_pob_choice: wheat stew
  chosen_spanish: guiso de trigo
  alternatives_spanish:
  - guiso de grano
  - potaje de trigo
  lexicon: wheat stew
  rationale: Sigo la revisión que corrigió la segunda mención como «wheat stew». En español, «trigo» conserva la rareza textual sin armonizarla con la primera mención de lentejas.
- source_word: ልህቃኒከ / ዘቅድመ፡ ልደት
  english_pob_choice: firstborn birthright
  chosen_spanish: primogenitura
  alternatives_spanish:
  - derecho de primogénito
  - derecho de primogenitura
  lexicon: birthright / firstborn status
  rationale: «Primogenitura» es la forma más natural en español para el derecho del primogénito y preserva el enlace con «firstborn birthright» del audit trail inglés.
theological_decisions:
- issue: Referencia al estatus del primogénito en vez de una simple prioridad temporal
  english_pob_reading: Sell me your firstborn birthright.
  chosen_spanish_reading: Véndeme tu primogenitura.
  alternative_spanish_readings:
  - Véndeme tu derecho de primogénito.
  - Véndeme tu derecho de primogenitura.
  rationale: La revisión final del inglés subraya que no se trata de «primero en el tiempo», sino del estatus del primogénito. «Primogenitura» conserva ese valor heredero/jurídico sin sobreexplicar.
  doctrine_reference: Génesis 25:29-34; prioridad hereditaria del primogénito
- issue: Plato de trigo frente a la expectativa narrativa de lentejas
  english_pob_reading: Give me some of this wheat stew.
  chosen_spanish_reading: Dame un poco de este guiso de trigo.
  alternative_spanish_readings:
  - Dame un poco de este guiso de grano.
  - Dame un poco de este potaje de trigo.
  rationale: Mantengo la anomalía textual indicada por el audit trail. No armonizo a lentejas porque la evidencia revisada señala una lectura distinta en el ge'ez.
  doctrine_reference: Principio de conservación de variantes textuales
- issue: Uso del nombre propio «Yahvé»
  rationale: No aplica en este versículo; no hay divino nombre explícito.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del audit trail: elimina cualquier adición como «rojo», conserva el pedido de Esaú como «guiso de trigo» y traduce la cláusula final como una exigencia sobre la primogenitura del primogénito, no como simple prioridad temporal.'
  spanish_consistency_notes:
  - He usado «guiso» para ambas comidas para mantener consistencia de registro, variando solo el sustantivo («lentejas» / «trigo») donde la fuente exige la diferencia.
  - «Jacob» y «Esaú» se mantienen con grafía bíblica usual en español.
  - La puntuación con comillas angulares y dos puntos sigue el estilo publicable en español, sin alterar el contenido fuente.
