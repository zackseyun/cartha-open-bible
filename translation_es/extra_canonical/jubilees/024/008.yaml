base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/024/008.yaml
  text: Isaac was going to go down to Egypt in the second year of this week, and he went to Gerar, to Abimelech king of the Philistines.
  footnotes:
  - marker: a
    text: Or 'went down'.
    reason: previous_rendering
  - marker: b
    text: Or 'the sixth week'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:42Z'
    unchanged: false
    changes_summary: Removed 'set out to go down' in favor of the more direct 'went down' for naturalness and closer lexical correspondence; combined the clauses with a comma and 'and' for smoother formal English while preserving both movements in the verse.
translation:
  language: es
  text: Isaac iba a bajar a Egipto en el segundo año de esta semana[a], y fue a Gerar, ante Abimélec, rey de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la sexta semana». El ge''ez dice literalmente «de esta semana»; la otra lectura refleja una interpretación cronológica tradicional.'
    reason: Preservar la alternativa documentada en el expediente inglés y evitar que el español pierda esa posibilidad interpretativa.
lexical_decisions:
- source_word: ይረድ
  english_pob_choice: was going to go down
  chosen_spanish: iba a bajar
  alternatives_spanish:
  - iba a descender
  - estaba por bajar
  lexicon: bajar / descender
  rationale: El ge'ez imperfectivo expresa intención o acción incipiente, no un hecho consumado; por eso en español conviene un futuro inminente en pasado ('iba a bajar') y no un pasado simple.
- source_word: ግብጸ
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: Egipto
  rationale: Nombre geográfico estándar en español bíblico, sin necesidad de adaptación.
- source_word: ዘዝ፡ ሱባዔ
  english_pob_choice: this week
  chosen_spanish: esta semana
  alternatives_spanish:
  - la sexta semana
  lexicon: semana
  rationale: El texto ge'ez dice literalmente 'de esta semana'; mantengo esa referencia literal en español y no incorporo 'sexta' en el texto principal, porque la evidencia textual dada favorece el demostrativo.
- source_word: ጌራር
  english_pob_choice: Gerar
  chosen_spanish: Gerar
  lexicon: topónimo propio
  rationale: Se conserva el nombre propio transliterado de forma habitual.
- source_word: ንጉሠ፡ ፍልስጥኤም
  english_pob_choice: king of the Philistines
  chosen_spanish: rey de los filisteos
  alternatives_spanish:
  - rey filisteo
  lexicon: reino/título
  rationale: La construcción posesiva natural en español es 'rey de los filisteos'; mantiene el valor relacional del original sin añadir matices ajenos.
theological_decisions:
- issue: La ambigüedad temporal de 'esta semana' frente a la tradición de leer 'la sexta semana'
  english_pob_reading: this week
  chosen_spanish_reading: esta semana
  alternative_spanish_readings:
  - la sexta semana
  rationale: Dado el aviso de revisión textual, se preserva la literalidad del ge'ez en el cuerpo del texto. La posible correlación cronológica con 'la sexta semana' queda como lectura alternativa, no como sustitución del texto base.
  doctrine_reference: Principio de prioridad textual y cautela ante armonizaciones cronológicas
translation_notes:
  revision_awareness: 'El auditoría inglesa muestra una corrección importante en ይረድ: no debe traducirse como pasado consumado (''went down''), sino como intención o movimiento inminente (''was going to go down''). También se revisó ''the sixth week'' a favor de ''this week''; por eso el español sigue el texto ge''ez literal sin añadir la lectura cronológica no explícita.'
  spanish_consistency_notes:
  - Se usa 'iba a bajar' para conservar la intención inminente y evitar afirmar que Isaac efectivamente descendió a Egipto.
  - '''Abimelec'' se emplea con la grafía española habitual.'
  - No se introducen notas al pie porque no hay marcadores anclados en el texto y se evitó crear notas sin anclaje.
