- from: Isaac iba a bajar a Egipto en el segundo año de esta semana, y fue a Gerar, a Abimelec, rey de los filisteos.
  to: Isaac iba a bajar a Egipto en el segundo año de esta semana[a], y fue a Gerar, ante Abimélec, rey de los filisteos.
  rationale: Se conserva la intención no consumada de bajar a Egipto y la literalidad de 'esta semana', pero se mejora la sintaxis para expresar con claridad que Isaac fue a Gerar y allí se presenta la referencia a Abimélec. Se añade una nota para conservar la alternativa tradicional 'sexta semana' que el expediente inglés documenta, adaptada a la decisión principal española. No se requiere adjudicación adicional.
