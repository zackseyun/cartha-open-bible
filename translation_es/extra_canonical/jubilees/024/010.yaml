base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/024/010.yaml
  text: And to your seed I will give all this land, and I will establish my oath that I swore to Abraham your father. And I will multiply your seed like the stars of heaven, and I will give to your seed all this land. And they will bless themselves
  footnotes:
  - marker: a
    text: Or 'And all the nations of the earth will bless themselves'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:43Z'
    unchanged: false
    changes_summary: Capitalized the opening conjunction for formal translation style. The draft is otherwise accurate and complete for the provided Geez text, though the final clause appears truncated in the source excerpt as given.
translation:
  language: es
  text: Y a tu descendencia daré toda esta tierra, y estableceré mi juramento que juré a Abraham tu padre. Y multiplicaré tu descendencia como las estrellas del cielo, y daré a tu descendencia toda esta tierra. Y se bendecirán[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y todas las naciones de la tierra se bendecirán». Esa expansión no pertenece al texto ge’ez provisto aquí; en este versículo el final es solo «Y se bendecirán».'
    reason: textual_variant
lexical_decisions:
- source_word: ዘርእከ / seed
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - linaje
  lexicon: semilla/descendencia/linaje
  rationale: En este contexto genealógico y pactal, ‘descendencia’ comunica mejor en español la referencia colectiva a los herederos de Abraham que ‘semilla’, que sería más literal pero menos natural. ‘Linaje’ es posible, pero ‘descendencia’ mantiene bien la promesa a la posteridad y evita una lectura demasiado abstracta.
- source_word: እሁብ / I will give
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - te daré
  - entregaré
  lexicon: dar
  rationale: El verbo simple ‘daré’ refleja de forma directa la promesa divina del texto ge’ez. No se añade ‘te’ porque el destinatario ya queda claro por ‘a tu descendencia’.
- source_word: መሐላ / oath
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - promesa jurada
  - juramento solemne
  lexicon: juramento
  rationale: ‘Juramento’ conserva el carácter formal y vinculante del término. ‘Promesa’ suavizaría la fuerza legal del pacto; ‘juramento solemne’ es explicativo pero más pesado.
- source_word: ከመ፡ ከዋክብተ፡ ሰማይ / like the stars of heaven
  english_pob_choice: like the stars of heaven
  chosen_spanish: como las estrellas del cielo
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas de los cielos
  lexicon: estrella/cielo
  rationale: ‘Del cielo’ es la forma más natural y fiel en español para esta comparación bíblica. ‘De los cielos’ sería más semitizante, pero menos idiomática.
- source_word: ወይትባረኩ / they will bless themselves
  english_pob_choice: And they will bless themselves
  chosen_spanish: Y se bendecirán
  alternatives_spanish:
  - Y se bendecirán unos a otros
  - Y serán bendecidos
  lexicon: bendecir(se)
  rationale: 'La forma reflexiva ‘se bendecirán’ conserva la ambigüedad del verbo en el final truncado del pasaje: puede indicar auto-bendición, bendición recíproca o una fórmula de bendición. No se resuelve hacia ‘serán bendecidos’ porque el texto ge’ez provisto no exige esa lectura.'
theological_decisions:
- issue: 'Alcance del último cola: falta la expansión posterior sobre ‘todas las naciones de la tierra’ en el texto proporcionado'
  english_pob_reading: Earlier English revision accidentally included 'And all the nations of the earth will bless themselves', but the final audit corrected it to the shorter clause present in the Geez excerpt.
  chosen_spanish_reading: Y se bendecirán
  alternative_spanish_readings:
  - Y todas las naciones de la tierra se bendecirán
  - Y serán bendecidos
  rationale: Se mantiene estrictamente el cierre atestiguado por el texto ge’ez proporcionado y por la revisión auditada. No se importa la frase sobre las naciones, porque pertenece a la continuación del pasaje y no a este versículo tal como está transmitido aquí.
  doctrine_reference: Texto base y delimitación versicular
translation_notes:
  revision_awareness: La versión inglesa auditada fue corregida para eliminar la cláusula importada sobre «all the nations of the earth», porque no está en el ge’ez provisto. Esta traducción española sigue esa corrección y conserva el final breve y potencialmente ambiguo de la fuente.
  spanish_consistency_notes:
  - Se usó ‘descendencia’ de manera consistente para ዘርእ en un contexto de promesa a los herederos de Abraham.
  - Se evitó ‘SEÑOR’ o ‘Eterno’ porque no aparece el nombre divino en este versículo; el texto habla en primera persona divina sin necesidad de sustitución terminológica.
  - Se conservó la repetición de ‘toda esta tierra’ porque el ge’ez la repite y la duplicación refuerza el énfasis pactal.
