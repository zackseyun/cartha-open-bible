  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado reporta alto acuerdo; por ello la redacción española sigue de cerca el sentido del texto fuente y la decisión léxica ya estabilizada en la POB inglesa.
  spanish_consistency_notes:
