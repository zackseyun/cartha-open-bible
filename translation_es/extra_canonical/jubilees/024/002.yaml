  - No se introducen notas al pie porque el versículo no presenta variantes textuales ni ambigüedades que requieran marcación adicional en esta unidad.
  - Se conserva 'hambre' como término narrativo bíblico consistente para famine, evitando alternar con 'hambruna' sin necesidad contextual.
