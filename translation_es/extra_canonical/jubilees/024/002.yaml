translation:
  language: es
  text: Y en el primer año de la cuarta semana vino hambre sobre la tierra, además del hambre anterior que había habido en los días de Abraham.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “in the first year of the fourth week”
  english_pob_choice: in the first year of the fourth week
  chosen_spanish: en el primer año de la cuarta semana
  alternatives_spanish:
  - en el primer año de la cuarta semana
  - durante el primer año de la cuarta semana
  lexicon: Chronological formula; no fixed lexicon entry number available.
  rationale: La expresión ge'ez y la versión inglesa conservan una fórmula cronológica literal. En español, 'en el primer año de la cuarta semana' reproduce con claridad la secuencia temporal sin añadir interpretación.
- source_word: “a famine came upon the land”
  english_pob_choice: a famine came upon the land
  chosen_spanish: vino un hambre sobre la tierra
  alternatives_spanish:
  - sobrevino un hambre en la tierra
  - vino una hambruna sobre la tierra
  lexicon: רעב / famine as severe deprivation; no fixed lexicon entry number available.
  rationale: '''Hambre'' mantiene la referencia bíblica tradicional a una carestía generalizada, y ''vino sobre la tierra'' preserva el movimiento de irrupción del original y de la POB en inglés. ''Hambruna'' sería más explicativa, pero menos cercana al registro bíblico del pasaje.'
- source_word: “besides”
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - además del
  lexicon: Additive connective; no fixed lexicon entry number available.
  rationale: '''Además de'' expresa de forma natural la relación aditiva y preserva que se trata de otro episodio de hambre, no del mismo evento repetido sin distinción.'
- source_word: “the former famine”
  english_pob_choice: the former famine
  chosen_spanish: el hambre anterior
  alternatives_spanish:
  - la hambre anterior
  - la hambruna anterior
  lexicon: Reference to an earlier famine; no fixed lexicon entry number available.
  rationale: Se mantiene la relación comparativa 'anterior' y el sustantivo 'hambre' para conservar continuidad terminológica con la primera mitad del versículo.
- source_word: “in the days of Abraham”
  english_pob_choice: in the days of Abraham
  chosen_spanish: en los días de Abraham
  alternatives_spanish:
  - en tiempos de Abraham
  - en los días de Abrahán
  lexicon: Formula temporal commemorating a patriarchal era; no fixed lexicon entry number available.
  rationale: La fórmula 'en los días de Abraham' es plenamente bíblica y corresponde directamente al inglés auditado. Se conserva 'Abraham' como forma usual y reconocible en español.
theological_decisions:
- issue: Nature of the calamity as repeated famine rather than a generic hardship
  english_pob_reading: a famine came upon the land, besides the former famine that had been in the days of Abraham
  chosen_spanish_reading: vino un hambre sobre la tierra, además del hambre anterior que había habido en los días de Abraham
  alternative_spanish_readings:
  - vino una hambruna sobre la tierra, además de la hambruna anterior que había habido en los días de Abraham
  - sobrevino un hambre en la tierra, aparte del hambre anterior en los días de Abraham
  rationale: El texto distingue dos episodios de escasez. La redacción española conserva esa distinción y no suaviza el término hacia una crisis genérica; así respeta la referencia histórica comparativa del pasaje.
  doctrine_reference: Narrative historical reference; no doctrinal expansion required.
