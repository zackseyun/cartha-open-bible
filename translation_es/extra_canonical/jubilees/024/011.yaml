  yaml_path: translation/extra_canonical/jubilees/024/011.yaml
  text: By your seed all the nations of the earth will be covenant.[24:11] And now your father obeyed my voice and kept my charge and my commandments and my laws and my statutes and my covenant. And now, listen to my voice and dwell in this land." And he dwelt in Gerar three weeks of years. And Abimelech gave command concerning him
  footnotes:
  - marker: '24:11'
    text: The legal list in the divine speech is textually dense and partially overlapping. The English keeps the sequence distinct rather than collapsing it into a single term like 'laws.'
    reason: segmentation_note
  - marker: a
    text: Or 'my charge and my commandments and my statutes and my covenant'.
    reason: previous_rendering
  - marker: b
    text: Or 'blessed[24:11], because'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:43Z'
    unchanged: false
    changes_summary: Added the omitted phrase 'all the nations of the earth will be blessed' for completeness and adjusted capitalization at the beginning for formal style. Kept the rest substantially unchanged.
translation:
  language: es
  text: Por tu descendencia todas las naciones de la tierra serán benditas, porque tu padre obedeció mi voz y guardó mi mandato, mis mandamientos, mis leyes, mis estatutos y mi pacto[a]. Y ahora, escucha mi voz y habita en esta tierra». Y habitó en Gerar tres semanas de años. Y Abimelec dio orden con respecto a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lista legal en el discurso divino es densa y parcialmente superpuesta en el texto. Por eso se mantiene la secuencia diferenciada, en vez de resumirla en un solo término como «leyes».
    reason: segmentation_note
lexical_decisions:
- source_word: በዘርእከ፡ / your seed
  english_pob_choice: By your seed
  chosen_spanish: Por tu descendencia
  alternatives_spanish:
  - Por tu semilla
  - Por tu linaje
  lexicon: descendencia
  rationale: En español bíblico y contemporáneo, 'descendencia' comunica naturalmente la idea genealógica y la continuidad de la promesa. 'Semilla' sería demasiado literal y poco idiomático; 'linaje' es posible, pero menos directo aquí.
- source_word: ኵሎሙ፡ አሕዛበ፡ ምድር፡
  english_pob_choice: all the nations of the earth
  chosen_spanish: todas las naciones de la tierra
  alternatives_spanish:
  - todos los pueblos de la tierra
  lexicon: nations
  rationale: '''Naciones'' conserva bien el valor bíblico de los pueblos organizados de la tierra y sigue de cerca el sentido del inglés POB. ''Pueblos'' sería viable, pero cambia levemente el matiz.'
- source_word: ይባርኩ / blessed
  english_pob_choice: will be blessed
  chosen_spanish: serán benditas
  alternatives_spanish:
  - serán bendecidas
  - serán bendecidas por Dios
  lexicon: bendecir
  rationale: Se prefiere la forma pasiva adjetival 'benditas' para una promesa solemne y fluida en español. 'Bendecidas' también es válida, pero suena más verbal; 'bendecidas por Dios' añade algo no explícito en el texto.
- source_word: ሰምዐ፡ አቡከ፡ ቃለ፡ ዚአየ፡
  english_pob_choice: your father obeyed my voice
  chosen_spanish: tu padre oyó mi voz
  alternatives_spanish:
  - tu padre obedeció mi voz
  - tu padre escuchó mi voz
  lexicon: voice
  rationale: La fuente ge'ez usa literalmente 'oyó mi voz'; el inglés POB mantiene esa formulación. En español, 'oyó mi voz' conserva el auditable enlace, aunque implica obediencia por contexto. 'Obedeció' explicita la respuesta, pero desplaza la metáfora auditiva.
- source_word: ዑቃቤየ፡
  english_pob_choice: my charge
  chosen_spanish: mi mandato
  alternatives_spanish:
  - mi encargo
  - mi custodia
  lexicon: charge
  rationale: '''Mandato'' es una opción española clara para una obligación divina. ''Encargo'' es posible, pero menos fuerte; ''custodia'' no encaja bien en este contexto.'
- source_word: ትእዛዛትየ፡
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis preceptos
  - mis órdenes
  lexicon: commandments
  rationale: '''Mandamientos'' es el equivalente más natural y preciso para el plural de órdenes divinas.'
- source_word: ሕገጊየ፡
  english_pob_choice: my laws
  chosen_spanish: mis leyes
  alternatives_spanish:
  - mis normas
  - mis preceptos
  lexicon: laws
  rationale: La revisión textual mostró que este término estaba ausente en una versión anterior; se restaura con 'leyes' para reflejar el quinto elemento de la lista. 'Leyes' conserva la distinción frente a 'mandamientos' y 'estatutos'.
- source_word: ሥርዐትየ፡
  english_pob_choice: my statutes
  chosen_spanish: mis estatutos
  alternatives_spanish:
  - mis ordenanzas
  - mis preceptos
  lexicon: statutes
  rationale: '''Estatutos'' es una equivalencia bíblica estable y preserva el carácter normativo formal del término.'
- source_word: ኪዳንየ፡
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: covenant
  rationale: '''Pacto'' es la traducción más sobria y reconocible para ''covenant'' en español bíblico. ''Alianza'' es posible, pero aquí ''pacto'' mantiene mejor la terminología de compromiso jurídico-teológico.'
- source_word: ወኀድር፡ ውስተ፡ ዛምድር፡
  english_pob_choice: dwell in this land
  chosen_spanish: habita en esta tierra
  alternatives_spanish:
  - vive en esta tierra
  - permanece en esta tierra
  lexicon: dwell
  rationale: '''Habita'' conserva el valor bíblico de residencia estable y mantiene el tono imperativo del discurso. ''Vive'' es más moderno, pero menos formal; ''permanece'' suena más estático que habitacional.'
- source_word: ጌራርገ፡ ሠለስተ፡ ሱባዔ፡ ዓመት፡
  english_pob_choice: Gerar three weeks of years
  chosen_spanish: Gerar tres semanas de años
  alternatives_spanish:
  - Gerar tres períodos de siete años
  - Gerar tres semanas-año
  lexicon: weeks of years
  rationale: Se mantiene la expresión técnica 'semanas de años' porque el texto usa una cronología jubilar específica. Aunque suena inusual, es la forma más transparente y auditable.
- source_word: አዘዘ፡
  english_pob_choice: gave command concerning him
  chosen_spanish: dio orden acerca de él
  alternatives_spanish:
  - dio órdenes acerca de él
  - mandó respecto de él
  lexicon: command
  rationale: '''Dio orden acerca de él'' refleja la construcción breve del final y conserva la idea de una disposición oficial. ''Mandó respecto de él'' sería más idiomático, pero algo menos literal.'
theological_decisions:
- issue: Promesa de bendición para las naciones
  english_pob_reading: all the nations of the earth will be blessed
  chosen_spanish_reading: todas las naciones de la tierra serán benditas
  alternative_spanish_readings:
  - todas las naciones de la tierra serán bendecidas
  - todas las naciones de la tierra recibirán bendición
  rationale: Se conserva la promesa universal y su formulación pasiva. 'Serán benditas' comunica el resultado prometido sin introducir un agente explícito que el texto aquí no desarrolla.
  doctrine_reference: Promesa abrahámica; bendición universal de Génesis 12:3 en su tradición de recepción
- issue: Lista legal extensa y parcialmente superpuesta
  english_pob_reading: my charge and my commandments and my laws and my statutes and my covenant
  chosen_spanish_reading: mi mandato, mis mandamientos, mis leyes, mis estatutos y mi pacto
  alternative_spanish_readings:
  - mi encargo, mis mandamientos, mis leyes, mis ordenanzas y mi pacto
  - mi mandato y mis mandamientos y mis estatutos y mi pacto
  rationale: La lista se mantiene completa y distintiva, siguiendo la revisión textual que corrige la omisión de 'my laws'. En español se evita colapsar la serie en un solo término genérico para no borrar la acumulación jurídica del texto.
  doctrine_reference: Tora/pacto como serie normativa del Dios del pacto; distinción entre mandatos, leyes, estatutos y pacto
- issue: '''Oyó mi voz'' frente a ''obedeció mi voz'''
  english_pob_reading: your father obeyed my voice
  chosen_spanish_reading: tu padre oyó mi voz
  alternative_spanish_readings:
  - tu padre obedeció mi voz
  - tu padre escuchó mi voz
  rationale: Se preserva la tensión heredada del original entre audición y obediencia. El contexto muestra que 'oír' implica obediencia, pero la metáfora auditiva no debe borrarse.
  doctrine_reference: Relación entre escuchar y obedecer en lenguaje bíblico semítico
translation_notes:
  revision_awareness: 'La base inglesa revisó este versículo para restaurar la cláusula omitida «all the nations of the earth will be blessed» y una nota crítica posterior señaló que la lista legal debe incluir cinco elementos, no cuatro. La traducción española refleja esas correcciones: conserva la bendición universal, restituye ''mis leyes'' y mantiene la secuencia completa sin fusionarla. También se ajusta el cierre para seguir el final del verso tal como aparece en el audit trail.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige explícitamente; aquí el versículo no contiene el nombre divino en esa forma, sino discurso directo con 'mi voz'.
  - Se prefiere 'pacto' para 'covenant' y 'mandamientos/leyes/estatutos' como serie diferenciada, evitando un único hiperónimo.
  - '''Gerar'' se conserva como topónimo propio; ''tres semanas de años'' se mantiene por transparencia jubilar.'
  - La puntuación y las comillas buscan reflejar el discurso directo sin sobreparafrasear.
