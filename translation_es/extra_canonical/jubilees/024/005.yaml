translation:
  language: es
  text: '«¿Qué me aprovecha este derecho de primogenitura?» Y él le dijo a Jacob: «Te lo doy». Y Jacob dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለምንት፡
  english_pob_choice: What use is this... to me?
  chosen_spanish: ¿Qué me aprovecha... ?
  alternatives_spanish:
  - ¿De qué me sirve... ?
  - ¿Qué utilidad tiene... para mí?
  lexicon: interrogative of benefit/use
  rationale: La pregunta plantea utilidad o provecho, no simple identidad. «Me aprovecha» conserva el valor pragmático y suena natural en español formal.
- source_word: ትውልድ፡
  english_pob_choice: birthright
  chosen_spanish: derecho de primogenitura
  alternatives_spanish:
  - primogenitura
  - herencia del primogénito
  lexicon: inheritance/right of firstborn
  rationale: En español bíblico, «derecho de primogenitura» expresa con claridad el privilegio heredado del primogénito y evita una literalidad extraña.
- source_word: ወሀብኩከ።
  english_pob_choice: I give it to you.
  chosen_spanish: Te lo doy.
  alternatives_spanish:
  - Te lo entrego.
  - Te lo concedo.
  lexicon: give / transfer
  rationale: El verbo transmite una cesión efectiva del derecho. «Te lo doy» es breve y fiel al acto de transferencia.
theological_decisions:
- issue: La escena trata del traspaso del privilegio del primogénito, no de una simple posesión material.
  english_pob_reading: What use is this birthright of the firstborn to me?... I give it to you.
  chosen_spanish_reading: ¿Qué me aprovecha este derecho de primogenitura?... Te lo doy.
  alternative_spanish_readings:
  - ¿Qué me sirve esta primogenitura?...
  - Te la cedo.
  rationale: «Derecho de primogenitura» mantiene el peso legal y familiar del pasaje. No se reduce a un objeto; es un estatus con consecuencias de pacto y herencia.
  doctrine_reference: Gn 25:29–34; Heb 12:16
translation_notes:
  revision_awareness: La revisión inglesa reciente reorganizó la frase inicial para hacerla más natural; el español adopta igualmente una estructura idiomática sin perder el sentido de beneficio/provecho. No hay variantes textuales ni notas críticas adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno.
  - Se preserva el intercambio directo de discurso sin añadir elementos no presentes en el texto.
  - «Derecho de primogenitura» se usa de modo consistente para el valor legal y familiar del término.
