  text: 'Y yo te daré pan y también este guiso de lentejas.” Y Esaú dijo en su corazón: “Estoy por morir;'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኅብስተ፡
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - pan de trigo
  - alimento
  lexicon: ḥubst / bread
  rationale: El original, seguido por la POB inglesa, usa el término básico para ‘pan’. En español, ‘pan’ comunica con naturalidad el sustento ofrecido, sin añadir especificación que el texto no da.
- source_word: ተብሰለ፡ ብርስን።
  english_pob_choice: this lentil stew
  chosen_spanish: este guiso de lentejas
  alternatives_spanish:
  - esta sopa de lentejas
  - este potaje de lentejas
  lexicon: lentejas / cooked lentils
  rationale: La frase describe una preparación de lentejas. ‘Guiso de lentejas’ conserva el carácter de comida cocida y sustanciosa sin forzar una equivalencia culinaria demasiado moderna.
- source_word: בְּלִבּוֹ / 'in his heart'
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí
  - dentro de sí
  lexicon: heart / inner speech
  rationale: La locución reproduce la interioridad del pensamiento de Esaú y mantiene la formulación idiomática común en español bíblico y actual.
- source_word: אֲנִי אֵמוּת / 'I am about to die'
  english_pob_choice: I am about to die
  chosen_spanish: Estoy por morir
  alternatives_spanish:
  - voy a morir
  - estoy a punto de morir
  lexicon: die / imminent death
  rationale: ‘Estoy por morir’ expresa cercanía inminente sin añadir el matiz idiomático ‘a punto de’ si se prefiere una cadencia más directa. Conserva la fuerza de inmediatez del hebreo y del inglés POB.
theological_decisions:
- issue: Speech reported as interior deliberation
  english_pob_reading: And Esau said in his heart
  chosen_spanish_reading: Y Esaú dijo en su corazón
  alternative_spanish_readings:
  - Y Esaú pensó para sí
  - Y Esaú se dijo en su corazón
  rationale: Se conserva la formulación tradicional e inteligible que señala pensamiento interior sin convertirlo en comentario explicativo. No se introduce una paráfrasis psicológica que exceda el texto.
  doctrine_reference: Narrative interior monologue; no doctrinal assertion beyond the source narrative.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó ‘some of’ para reflejar más de cerca el fuente. El español sigue esa misma cercanía al decir simplemente ‘este guiso de lentejas’, sin añadir un cuantificador inexistente en el original.
  spanish_consistency_notes:
  - Se mantiene ‘Esaú’ como forma estable del nombre propio.
  - Se usa el trato narrativo en pasado simple para alinearse con el relato.
  - No se introduce ‘Mesías’, ‘SEÑOR’ ni otro vocabulario no presente en el versículo.
