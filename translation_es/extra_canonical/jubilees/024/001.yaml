base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/024/001.yaml
  text: And it came to pass after Abraham died that the LORD blessed Isaac his son. And he rose up from Hebron and went and dwelt at the Well of the Vision[24:1] in the first year of the third week of this jubilee.
  footnotes:
  - marker: '24:1'
    text: The place-name is rendered literally from the Ge'ez as 'Well of the Vision.' It likely corresponds to the site known from Genesis, but the translation avoids importing the fuller traditional form into the main text.
    reason: cross_reference
  - marker: a
    text: Or 'his son[24:1]. And he rose up from Hebron and went and dwelt at the Well of the Vision'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:40Z'
    unchanged: false
    changes_summary: Removed the added words 'seven years,' which are not represented in the source as part of the verse’s closing dating formula here. Otherwise retained the draft wording as accurate and natural.
translation:
  language: es
  text: Y sucedió que, después de morir Abraham, Yahvé bendijo a Isaac, su hijo. Y se levantó de Hebrón y fue y habitó en el Pozo de la Visión[a], en el primer año de la tercera semana de este jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su hijo. Y se levantó de Hebrón y fue y habitó en el Pozo de la Visión». El marcador sigue aquí porque la nota del POB inglés aclara específicamente la traducción literal del nombre del lugar.'
    reason: alternative_reading
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el SEÑOR
  lexicon: Tetragrámaton / nombre divino
  rationale: La política del proyecto pide explicitar el nombre divino como 'Yahvé' cuando el referente es el nombre propio de Dios. Aunque el inglés POB usa 'the LORD' por convención, en español no se oculta el nombre con una mayúscula funcional ni se sustituye por 'Señor'.
- source_word: ወልዱ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - a su hijo
  - su propio hijo
  lexicon: posesivo relacional
  rationale: La expresión ge'ez es una relación posesiva simple. 'Su hijo' reproduce de manera natural y fiel la relación sin añadir énfasis que el texto no exige.
- source_word: ወኀደረ፡ ኀበ፡ ዐዘቅተ፡ ራእይ፡
  english_pob_choice: dwelt at the Well of the Vision
  chosen_spanish: habitó en el Pozo de la Visión
  alternatives_spanish:
  - se estableció en el Pozo de la Visión
  - moró en el Pozo de la Visión
  lexicon: topónimo literal
  rationale: Sigo la decisión inglesa de conservar el sentido literal del topónimo ge'ez sin importar una forma tradicional más desarrollada. 'Habitó' mantiene el valor de residencia estable, y 'Pozo de la Visión' conserva la transparencia semántica del nombre.
- source_word: ባረኮ፡
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - lo bendijo
  - lo colmó de bendición
  lexicon: bendecir
  rationale: El verbo ge'ez expresa la acción divina de bendecir. En español, 'bendijo' es la forma directa y solemnemente clara, sin necesidad de parafrasear.
theological_decisions:
- issue: Nombre divino frente a la convención inglesa 'LORD'
  english_pob_reading: the LORD blessed Isaac his son
  chosen_spanish_reading: Yahvé bendijo a Isaac, su hijo
  alternative_spanish_readings:
  - el Señor bendijo a Isaac, su hijo
  - el SEÑOR bendijo a Isaac, su hijo
  rationale: La traducción española del proyecto requiere revelar el nombre divino cuando el original lo sustenta. Aquí el ge'ez presenta el nombre sagrado, por lo que 'Yahvé' evita la máscara tipográfica y mantiene la referencia directa.
  doctrine_reference: Éxodo 3:15; convención editorial POB sobre el nombre divino
- issue: Topónimo literal sin harmonización con la forma tradicional conocida
  english_pob_reading: Well of the Vision
  chosen_spanish_reading: Pozo de la Visión
  alternative_spanish_readings:
  - Pozo de la Aparición
  - el pozo llamado Visión
  rationale: 'La nota inglesa ya justifica la literalidad del lugar-name para no importar la forma tradicional completa al texto principal. En español se conserva esa misma tensión: el lector recibe el sentido transparente del ge''ez, mientras la identificación histórica queda abierta en la nota.'
  doctrine_reference: Génesis 16; Génesis 21; tradición toponímica de Beer-lajai-roí
translation_notes:
  revision_awareness: La revisión más reciente eliminó la adición no atestiguada «siete años» del cierre cronológico; por eso la fecha final en español termina simplemente en «en el primer año de la tercera semana de este jubileo», sin expansión interpretativa. También se ajustó la colocación de la nota para que acompañe al topónimo, no a «su hijo».
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'Señor' para el nombre divino, de acuerdo con la política del proyecto.
  - '''Pozo de la Visión'' conserva la literalidad del topónimo y evita una armonización indebida con formas tradicionales.'
  - 'El orden de cláusulas sigue de cerca el paralelismo del original: muerte de Abraham, bendición de Isaac, movimiento desde Hebrón, residencia en el lugar nombrado, y datación jubilar.'
