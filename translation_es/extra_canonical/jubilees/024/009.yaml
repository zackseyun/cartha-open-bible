translation:
  language: es
  text: 'Y Yahvé se le apareció y le dijo: «No bajes a Egipto. Habita en la tierra que yo te diré, y vive como forastero[a] en esa tierra, y estaré contigo y te bendeciré. Porque para ti'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'reside temporalmente'. El verbo sugiere vivir en la tierra como residente no plenamente asentado, no solo permanecer allí.
    reason: Preserva en español el matiz de 'sojourn' que el POB inglés destacó, evitando que 'habita' y la segunda orden queden como simples sinónimos.
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: Divine name
  rationale: El texto ge’ez corresponde al nombre divino; la política española del proyecto pide Yahvé en el texto principal, en vez de una máscara reverencial.
- source_word: ኢትረድ
  english_pob_choice: Do not go down
  chosen_spanish: No bajes
  alternatives_spanish:
  - No desciendas
  - No vayas
  lexicon: Descender / ir hacia Egipto
  rationale: La imagen de descenso está en el verbo original y se conserva de forma natural en español con 'bajes'.
- source_word: ግብጸ
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: Topónimo
  rationale: La preposición reproduce el movimiento direccional del mandato.
- source_word: ንበር
  english_pob_choice: Dwell
  chosen_spanish: Habita
  alternatives_spanish:
  - Vive
  - Permanece
  lexicon: Residencia
  rationale: '''Habita'' mantiene el sentido de residir/asentarse con registro bíblico claro y natural.'
- source_word: ወ*ፍልስ
  english_pob_choice: sojourn
  chosen_spanish: reside
  alternatives_spanish:
  - peregrina
  - mora temporalmente
  lexicon: Residencia temporal
  rationale: '''Reside'' comunica la idea de estancia sin sobrecargar con un calco; preserva la distinción respecto de ''habita''.'
- source_word: ወእሄሉ፡ ምስሌከ
  english_pob_choice: I will be with you
  chosen_spanish: estaré contigo
  alternatives_spanish:
  - seré contigo
  - me quedaré contigo
  lexicon: Compañía divina
  rationale: La fórmula es directa y fiel, con verbo futuro y complemento preposicional natural en español.
- source_word: ወእባርከከ።
  english_pob_choice: and bless you
  chosen_spanish: y te bendeciré
  alternatives_spanish:
  - y te daré bendición
  lexicon: Bendición
  rationale: '''Bendecir'' es el equivalente estable y preciso del verbo original.'
theological_decisions:
- issue: Nombre divino en el discurso directo
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: La política del proyecto exige transparencia respecto del nombre divino cuando la fuente original lo representa directamente; aquí no hay motivo para ocultarlo con un título.
  doctrine_reference: Tetragrámaton / uso del nombre divino
- issue: Traducción de la forma incompleta del versículo
  english_pob_reading: For to you
  chosen_spanish_reading: Porque para ti
  alternative_spanish_readings:
  - Porque a ti
  - Pues para ti
  rationale: La muestra fuente está truncada al final; se conserva el arranque del inciso tal como lo permite el material recibido, sin completar de manera inventada.
  doctrine_reference: Integridad textual y cautela editorial
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'stay in this land' por 'sojourn in that land' para mayor precisión léxica y registro; la versión española refleja esa distinción con 'habita' / 'reside'. El texto fuente recibido parece truncado al final, por lo que la traducción termina de forma igualmente incompleta sin suplir contenido no atestiguado.
  spanish_consistency_notes:
  - Se mantiene Yahvé conforme a la convención del proyecto para el nombre divino.
  - '''Habita'' y ''reside'' preservan la diferencia entre establecimiento y estancia temporal.'
  - No se añadieron notas al pie porque no hay una variante textual adicional anclada en el texto español.
