    changes_summary: Changed 'greater' to 'great' for a more direct rendering; replaced 'Esau was brought low' with 'he departed' to reflect the Ge'ez verb and avoid introducing Esau, who is not in the source; retained the unfinished final clause as in the source/draft.
translation:
  language: es
  text: Y Jacob creció y guardó el mandamiento de su padre, pero Esaú lo rechazó. Y hubo hambre en la tierra, y vino[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula final queda truncada en el testimonio fuente; el español conserva la frase abierta como en el texto recibido.
    reason: source_note
lexical_decisions:
- source_word: አህቀ
  english_pob_choice: grew up
  chosen_spanish: creció
  alternatives_spanish:
  - creció hasta la madurez
  - alcanzó la madurez
  - creció
  lexicon: ability / growth to maturity
  rationale: El Ge'ez indica crecimiento hasta la madurez; en español, «creció» comunica ese desarrollo de manera natural y fiel, sin añadir una idea de grandeza de rango que no es necesaria aquí.
- source_word: ኀለወ
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - observó
  - cumplió
  - guardó
  lexicon: keep / observe / guard
  rationale: La revisión correcta muestra que el verbo expresa conservar u observar el mandamiento, no abandonarlo. «Guardó» conserva bien la fuerza de obediencia fiel al mandamiento paterno.
- source_word: ትእዛዘ፡ አቡሁ
  english_pob_choice: the command of his father
  chosen_spanish: el mandamiento de su padre
  alternatives_spanish:
  - la orden de su padre
  - el precepto de su padre
  lexicon: command / order / decree
  rationale: «Mandamiento» refleja la fuerza normativa del término en este contexto genealógico y moral, y evita debilitarlo a una mera sugerencia.
- source_word: ዐበየ
  english_pob_choice: rejected it
  chosen_spanish: lo rechazó
  alternatives_spanish:
  - lo desechó
  - lo menospreció
  lexicon: reject / refuse / despise
  rationale: La lectura textual correcta atribuye a Esaú el rechazo del mandamiento. «Lo rechazó» es directo, claro y no introduce matices adicionales no exigidos por el pasaje.
- source_word: ዐባር
  english_pob_choice: there was famine upon the land
  chosen_spanish: hubo hambre sobre la tierra
  alternatives_spanish:
  - hubo hambre en la tierra
  - sobrevino hambre sobre la tierra
  lexicon: famine / hunger
  rationale: «Hambre» reproduce la idea de escasez severa. «Sobre la tierra» conserva la formulación espacial del original sin forzar un giro más idiomático que cambie el tono del texto.
- source_word: መጽአ
  english_pob_choice: and he came
  chosen_spanish: y llegó[a]
  alternatives_spanish:
  - y vino
  - y se acercó
  lexicon: come / arrive
  rationale: La cláusula final queda abierta en el testimonio fuente; «llegó» mantiene la incompletitud narrativa en español. El marcador se usa para anclar la observación sobre la continuación truncada.
theological_decisions:
- issue: Relación entre Jacob y Esaú respecto al mandamiento paterno
  english_pob_reading: Jacob kept the command of his father, but Esau rejected it
  chosen_spanish_reading: Jacob guardó el mandamiento de su padre, pero Esaú lo rechazó
  alternative_spanish_readings:
  - Jacob cumplió el mandamiento de su padre, pero Esaú lo rechazó
  - Jacob observó el mandamiento de su padre, pero Esaú lo desechó
  rationale: 'La revisión del texto ge''ez corrige una inversión previa: el pasaje ensalza la obediencia de Jacob y contrasta la negativa de Esaú. La traducción debe conservar ese contraste sin suavizarlo.'
  doctrine_reference: Jubileos 24:7; coherencia interna del retrato de Jacob y Esaú
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: no debe decir que Jacob se apartó del mandamiento ni que Esaú fue añadido indebidamente como sujeto de una acción no atestiguada. La presente redacción sigue la revisión posterior que entiende que Jacob guardó el mandamiento de su padre y que Esaú lo rechazó, y mantiene la cláusula final incompleta del testimonio base.'
  spanish_consistency_notes:
  - Se usa «mandamiento» de forma uniforme para ትእዛዝ en este pasaje.
  - «Esaú» conserva la forma tradicional y clara en español.
  - El marcador [a] está anclado en la última palabra para señalar la cláusula truncada del original.
