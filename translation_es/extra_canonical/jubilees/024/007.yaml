  yaml_path: translation/extra_canonical/jubilees/024/007.yaml
  text: And Jacob grew up, and kept the command of his father, but Esau rejected it. And there was famine upon the land, and he came
  footnotes:
  - marker: a
    text: Or 'and he departed from the command of his father'.
    reason: previous_rendering
  - marker: b
