lexical_decisions:
- source_word: ሞተ፡ ለ*ይሙት።
  english_pob_choice: let him surely die.
  chosen_spanish: «Muerra ciertamente»
  alternatives_spanish:
  - «Ciertamente morirá»
  - «Que ciertamente muera»
  lexicon: No aplica a entrada léxica única; imperativo/jusivo intensificado
  rationale: La forma ge'ez expresa una muerte decretada con fuerza intensiva; en español, un giro breve en subjuntivo captura mejor la fuerza volitiva/jusiva que un futuro plano. «Muerra ciertamente» mantiene la solemnidad y la intensidad del original sin añadir sujeto explícito innecesario.
- source_word: ወአህቀ፡
  english_pob_choice: And Isaac prospered
  chosen_spanish: Y Isaac prosperó
  alternatives_spanish:
  - Y Isaac tuvo éxito
  - Y Isaac fue prosperado
  lexicon: No aplica a entrada léxica única; verbo de prosperidad/éxito
  rationale: El verbo indica que Isaac fue favorecido y le fue bien. «Prosperó» es una equivalencia natural y bíblica en español, y conserva la idea de bienestar material y aumento.
- source_word: በፍልስጥኤም፡
  english_pob_choice: in Philistia
  chosen_spanish: en Filistea
  alternatives_spanish:
  - entre los filisteos
  - en tierra filistea
  lexicon: Topónimo
  rationale: La revisión inglesa prefirió el lugar, no el grupo étnico. «Filistea» refleja directamente el topónimo del texto y mantiene la precisión geográfica del audit trail.
- source_word: ወኮነ፡ ሎቱ፡ ጥሪት፡ ብዙኅ፡
  english_pob_choice: and he had much property
  chosen_spanish: y tuvo muchas posesiones
  alternatives_spanish:
  - y tenía mucha propiedad
  - y poseyó mucho ganado
  lexicon: ጥሪት
  rationale: El sustantivo puede abarcar bienes, posesiones o riqueza en general. «Poseciones» conserva amplitud semántica y evita restringir el sentido a solo ganado o tierra, lo cual el ge'ez no obliga.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «among the Philistines» por «in Philistia» para reflejar más directamente el topónimo del original; la traducción española sigue esa decisión con «en Filistea». No hay otras revisiones textuales o variantes relevantes en el paquete.
  spanish_consistency_notes:
  - Se mantiene «Isaac» como nombre propio sin adaptación.
  - Se usa «Filistea» como nombre geográfico para conservar la precisión del lugar indicada por la revisión inglesa.
  - «Prosperó» y «posesiones» ofrecen un registro bíblico claro y no arcaizante, sin reducir indebidamente la amplitud del original.
