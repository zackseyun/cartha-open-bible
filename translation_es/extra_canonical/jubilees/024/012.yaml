translation:
  language: es
  text: 'y en cuanto a todo lo que era suyo, diciendo: «Todo hombre que lo toque, o cualquier cosa que sea suya,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኵሉ፡ ዘዚአሁ
  english_pob_choice: all that was his
  chosen_spanish: todo lo que era suyo
  alternatives_spanish:
  - todo lo que le pertenecía
  - todo aquello que era de él
  lexicon: posesión/relación de pertenencia
  rationale: El ge'ez expresa pertenencia amplia, y la redacción española debe abarcar tanto personas como objetos sin introducir matices de propiedad legal más fuertes de los que el texto muestra. «Era suyo» conserva la relación posesiva de forma natural en español.
- source_word: ይብል፡
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: speech-introduction
  rationale: El participio/verbo introductorio se vierte de manera directa como participio español para mantener la continuidad sintáctica de la cita.
- source_word: ኵሉ፡ ሰብእ፡
  english_pob_choice: Every man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Toda persona
  - Cada hombre
  lexicon: human generality
  rationale: El griego/semítico de fondo suele usar un sustantivo genérico para «ser humano»; en español, «Todo hombre» conserva la generalidad y el tono de fórmula. Se evita «persona» porque atenúa el eco colectivo del original.
- source_word: ዘይሰክፎ፡
  english_pob_choice: who touches him
  chosen_spanish: que lo toque
  alternatives_spanish:
  - que lo toca
  - que lo alcance
  lexicon: touch/contact
  rationale: La forma relativa expresa contacto físico. «Toque» es la equivalencia más directa y natural en español; «alcance» sería más interpretativo y perdería la literalidad del contacto.
- source_word: ወለኵሉ፡ ዘዚአሁ፡
  english_pob_choice: or anything that is his
  chosen_spanish: o cualquier cosa que sea suya
  alternatives_spanish:
  - o algo que le pertenezca
  - o toda cosa suya
  lexicon: possessive extension
  rationale: La segunda cola amplía la primera a cualquier objeto perteneciente a él. «Cualquier cosa que sea suya» mantiene la amplitud inclusiva sin forzar una categoría jurídica o ritual específica.
theological_decisions:
- issue: Alcance inclusivo de la fórmula de contaminación/contacto
  english_pob_reading: Every man who touches him or anything that is his,
  chosen_spanish_reading: Todo hombre que lo toque, o cualquier cosa que sea suya,
  alternative_spanish_readings:
  - Toda persona que lo toque, o cualquier cosa que sea suya,
  - Todo hombre que lo toque, o cualquier cosa que le pertenezca,
  rationale: No hay indicio en el fragmento de un sentido limitado a varones; sin embargo, la fórmula tradicional usa «hombre» como genérico. Se conserva esa amplitud formulística sin decidir aquí una restricción teológica o social inexistente en el texto.
  doctrine_reference: Uso genérico del lenguaje humano en literatura bíblica/apocalíptica
translation_notes:
  revision_awareness: El pasaje presentado es un fragmento breve; el inglés POB coincide plenamente con el texto ge'ez disponible y el control de revisión indica alta concordancia sin cambios. No se documentan tensiones textuales adicionales en este segmento.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial cuando aparezca el nombre divino; en este fragmento no aparece.
  - Se usa un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - Se conserva la estructura de cita introducida por «diciendo», acorde con el flujo del segmento fuente.
