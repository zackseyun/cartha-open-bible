  yaml_path: translation/extra_canonical/jubilees/024/006.yaml
  text: '"Swear to me today." And he swore to him. And Jacob gave Esau his brother bread and stew, and he ate until he was satisfied. And Esau sold his birthright. Therefore his name was called Edom, because of the wheat stew that Jacob gave him in exchange for his birthright.'
  footnotes:
  - marker: a
    text: Or 'red lentil stew'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:42Z'
    unchanged: false
    changes_summary: Changed 'despised his birthright' to 'sold his birthright' for lexical accuracy with the source verb; made a minor English smoothing from 'gave to Esau' to 'gave Esau.'
translation:
  language: es
  text: «Júrame hoy». Y él le juró. Y Jacob le dio a Esaú, su hermano, pan y guiso, y comió hasta saciarse. Y Esaú vendió su primogenitura. Por eso fue llamado Edom, a causa del guiso[a] de trigo que Jacob le dio a cambio de su primogenitura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice literalmente «trigo»; no «lentejas» ni «rojo».
    reason: textual_variant
lexical_decisions:
- source_word: መሐል፡ ሊተ፡ ዮም፡
  english_pob_choice: Swear to me today.
  chosen_spanish: «Júrame hoy»
  alternatives_spanish:
  - «Júrame hoy mismo»
  - «Hazme hoy un juramento»
  lexicon: jurar
  rationale: El imperativo pide un juramento directo; en español «júrame» conserva la fuerza verbal y el tono breve del original mejor que una perífrasis.
- source_word: ወወሀቦ፡ ያዕቆብ፡ ለ*አኁሁ፡ ዔሳው፡ ኅብስተ፡ ወተብሰለ፡
  english_pob_choice: And Jacob gave Esau his brother bread and stew
  chosen_spanish: Y Jacob dio a Esaú, su hermano, pan y guiso
  alternatives_spanish:
  - Y Jacob le dio a Esaú, su hermano, pan y estofado
  - Y Jacob dio a Esaú, su hermano, pan y potaje
  lexicon: dar; pan; guiso
  rationale: «Guiso» es suficientemente general para el alimento preparado del texto. Se evita especificar «lentejas» porque el ge'ez dice «trigo», no lentejas.
- source_word: ወመጠ፡ ዔሳው፡ *ቀዳሙ፡ ትውልዶ፡
  english_pob_choice: And Esau sold his birthright.
  chosen_spanish: Y Esaú vendió su primogenitura
  alternatives_spanish:
  - Y Esaú cedió su derecho de primogenitura
  - Y Esaú renunció a su primogenitura
  lexicon: primogenitura
  rationale: La revisión inglesa corrigió la lectura errónea «despised» por «sold»; «vendió su primogenitura» reproduce el valor transaccional del verbo ge'ez y mantiene el término bíblico tradicional preciso.
- source_word: በእንተ፡ ተብሰለ፡ ስርናይ፡
  english_pob_choice: because of the wheat stew
  chosen_spanish: a causa del guiso de trigo
  alternatives_spanish:
  - a causa del potaje de trigo
  - por el guiso de trigo
  lexicon: trigo; guiso
  rationale: El texto ge'ez especifica «trigo» (ስርናይ), no «lentejas»; por eso se conserva esa precisión. «Guiso» mantiene la referencia culinaria sin forzar una especie de plato no atestiguada.
theological_decisions:
- issue: Relación entre el texto de Jubileos y la armonización con Génesis 25 sobre el alimento de Esaú
  english_pob_reading: because of the wheat stew that Jacob gave him in exchange for his birthright
  chosen_spanish_reading: a causa del guiso de trigo que Jacob le dio a cambio de su primogenitura
  alternative_spanish_readings:
  - a causa del guiso de lentejas que Jacob le dio a cambio de su primogenitura
  - a causa del guiso rojo que Jacob le dio a cambio de su primogenitura
  rationale: La evidencia ge'ez dice expresamente «trigo» y no incluye el color ni las lentejas. Se evita armonizar el pasaje con Génesis de una manera que borre la especificidad del testimonio de Jubileos.
  doctrine_reference: Fidelidad textual y prioridad del testimonio del manuscrito fuente sobre la armonización intertextual
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del auditorio inglés al leer «sold his birthright» en lugar de «despised his birthright», y corrige la antigua equivalencia de «red lentil stew» porque el ge'ez de Jubileos 24:6 dice «wheat» (ስርናይ). Por eso el español evita cualquier armonización con la forma de Génesis que no esté respaldada por este texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece el nombre divino.
  - Se mantiene «primogenitura» como término bíblico estable para ቀዳሙ፡ ትውልዶ፡.
  - «Guiso» se emplea como equivalente neutro para ወተብሰለ፡, dejando abierta la posibilidad de un plato cocido sin precisar más de lo que el texto permite.
  - Se conserva el orden narrativo breve y repetitivo del original para reflejar su ritmo.
