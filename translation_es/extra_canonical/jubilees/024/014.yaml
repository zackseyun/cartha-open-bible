lexical_decisions:
- source_word: አልህም*ተ፡ ወአባግዐ፡ ወአግማለ፡ ወአእዱገ፡ ወ*ጥሪት፡ ብዙኅ
  english_pob_choice: cattle and sheep and camels and donkeys and much wealth
  chosen_spanish: ganado vacuno, ovejas, camellos y asnos, y mucha riqueza
  alternatives_spanish:
  - ganado y ovejas y camellos y asnos, y mucha riqueza
  - vacas y ovejas y camellos y asnos, y mucha riqueza
  lexicon: ዝርዝር de bienes y animales domésticos
  rationale: El Ge'ez enumera tipos de ganado y bienes acumulados. 'Ganado vacuno' evita la ambigüedad de 'ganado' solo y refleja mejor el valor léxico del primer término; 'riqueza' traduce de forma natural ጥሪት ('wealth/possessions') sin reducirlo a dinero.
- source_word: ወዘርአ፡ በምድረ፡
  english_pob_choice: And he sowed in the land
  chosen_spanish: Y sembró en la tierra
  alternatives_spanish:
  - Y sembró en esa tierra
  - Y plantó en la tierra
  lexicon: sembrar / sembró
  rationale: La acción agrícola es literal; 'sembró' conserva el sentido básico del verbo. 'Plantó' sería más amplio y menos preciso en español para una siembra de cultivo.
theological_decisions:
- issue: Acumulación de bienes como bendición material
  english_pob_reading: cattle and sheep and camels and donkeys and much wealth
  chosen_spanish_reading: ganado vacuno, ovejas, camellos y asnos, y mucha riqueza
  alternative_spanish_readings:
  - ganado y ovejas y camellos y asnos, y mucha riqueza
  rationale: No se espiritualiza ni se moraliza el inventario; se mantiene como descripción concreta de prosperidad material, conforme al tono narrativo del pasaje.
  doctrine_reference: Narrative blessing/prosperity within patriarchal history, without doctrinal expansion
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el texto permanece en alto acuerdo con el control cruzado; por tanto, el español se ajusta directamente al contenido fuente sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y sobrio.
  - Se evita 'SEÑOR' o fórmulas de sustitución no presentes en el fuente.
  - '''Riqueza'' se usa como sustantivo amplio para cubrir posesiones/bienes, compatible con el campo semántico de ጥሪት.'
