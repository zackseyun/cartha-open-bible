translation:
  language: es
  text: Vivía entre los filisteos y cosechó el ciento por uno. Isaac llegó a ser muy grande, y los filisteos le envidiaron. Y todos los pozos que los siervos de Abraham habían cavado durante la vida de Abraham, los filisteos los cegaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፍልስጥኤም / Philistines
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los Filisteos
  lexicon: n/a
  rationale: El etnónimo es el equivalente directo y natural en español bíblico. Se usa minúscula por tratarse de un nombre étnico común en el flujo narrativo, salvo estilo editorial distinto.
- source_word: ዐዘቅተ / wells
  english_pob_choice: the wells
  chosen_spanish: los pozos
  alternatives_spanish:
  - los manantiales
  - los aljibes
  lexicon: n/a
  rationale: El ge'ez y el contexto narrativo apuntan a pozos excavados; 'pozos' es la equivalencia directa y transparente en español.
- source_word: ደፈንዎ / stopped up
  english_pob_choice: stopped up
  chosen_spanish: los cegaron
  alternatives_spanish:
  - los taparon
  - los obstruyeron
  lexicon: n/a
  rationale: '''Cegar un pozo'' es la forma idiomática y precisa en español para ''stopped up'' en este contexto, conserva la imagen física sin sonar mecánico.'
- source_word: ፈድፋደ / very great
  english_pob_choice: became very great
  chosen_spanish: llegó a ser muy grande
  alternatives_spanish:
  - se hizo muy grande
  - creció mucho
  lexicon: n/a
  rationale: La construcción expresa aumento de estatus o prosperidad; 'llegó a ser muy grande' mantiene el sentido de elevación social y material sin añadir matices ajenos.
- source_word: ወኵሎ፡ ዐዘቅተ ... በሕይወተ፡ አብርሃም፡
  english_pob_choice: all the wells that the servants of Abraham had dug during Abraham's lifetime
  chosen_spanish: todos los pozos que los siervos de Abraham habían cavado durante la vida de Abraham
  alternatives_spanish:
  - todos los pozos que los siervos de Abraham habían cavado mientras Abraham vivía
  lexicon: n/a
  rationale: '''Durante la vida de Abraham'' reproduce de modo natural la duración indicada por el original y conserva el énfasis temporal de la cláusula.'
- source_word: ወአዐረገ፡ መእተ፡ ስዊተ፡
  english_pob_choice: reaped a hundredfold
  chosen_spanish: cosechó el ciento por uno
  alternatives_spanish:
  - cosechó cien veces más
  - recogió el ciento por uno
  lexicon: n/a
  rationale: El giro 'ciento por uno' preserva la forma bíblica tradicional sin depender de una paráfrasis interpretativa; 'cosechó' refleja el resultado agrícola del verbo original.
theological_decisions:
- issue: Descripción de prosperidad de Isaac sin aclaración causal explícita
  english_pob_reading: Isaac became very great
  chosen_spanish_reading: Isaac llegó a ser muy grande
  alternative_spanish_readings:
  - Isaac se hizo muy próspero
  - Isaac fue engrandecido
  rationale: El texto presenta la elevación de Isaac como hecho narrativo, no como explicación teológica; la traducción conserva esa sobriedad y no introduce causalidad adicional.
  doctrine_reference: Providencia divina en relato patriarcal, sin explicitación causal en el versículo.
- issue: Tensión entre 'siervos' y posible lectura general de 'servants'
  english_pob_reading: the servants of Abraham
  chosen_spanish_reading: los siervos de Abraham
  alternative_spanish_readings:
  - los esclavos de Abraham
  - los servidores de Abraham
  rationale: '''Siervos'' reproduce el término de manera amplia y comprensible en español bíblico; evita endurecer innecesariamente la relación social con ''esclavos'' si el contexto narrativo no lo exige en esta línea.'
  doctrine_reference: Estatus doméstico/patrimonial en los patriarcas, con matiz lexical abierto.
translation_notes:
  revision_awareness: La revisión inglesa ajustó el inicio a 'among the Philistines' y cerró la frase final con coma por claridad. La versión española sigue ese orden y sentido, con una preposición locativa natural ('entre los filisteos') y puntuación equivalente sin introducir contenido adicional.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece el nombre divino en este versículo.
  - '''Cosechó el ciento por uno'' conserva el valor idiomático de resultado abundante sin expandir el texto.'
  - No se añadieron notas textuales porque el testimonio ge'ez y el inglés auditado coinciden sustancialmente en el sentido.
