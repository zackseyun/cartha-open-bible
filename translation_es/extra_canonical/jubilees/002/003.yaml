translation:
  language: es
  text: Entonces vimos sus obras, y lo bendijimos y le ofrecimos alabanza delante de él por causa de todas sus obras, porque
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአሜሃ፡
  english_pob_choice: And then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y entonces
  - Luego
  lexicon: adverbio/conector temporal
  rationale: Expresa la transición temporal del Ge'ez de manera natural en español, sin recargar el flujo del relato.
- source_word: ርኢነ፡
  english_pob_choice: we saw
  chosen_spanish: vimos
  alternatives_spanish:
  - nosotros vimos
  - observamos
  lexicon: verbo de percepción
  rationale: Mantiene el sujeto plural implícito y la percepción visual directa del original.
- source_word: ምግባሮ፡
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: sustantivo plural con posesivo
  rationale: '"Obras" conserva la amplitud de acciones/hechos y corresponde bien al registro bíblico del pasaje.'
- source_word: ወባረክናሁ፡
  english_pob_choice: we blessed him
  chosen_spanish: lo bendijimos
  alternatives_spanish:
  - lo bendecimos
  - le bendijimos
  lexicon: verbo bendecir con objeto directo pronominal
  rationale: '"Lo bendijimos" reproduce el objeto personal explícito del original y es idiomático en español. Se evita "bendecimos" para no borrar el pasado narrativo.'
- source_word: ወሰብሕነ፡ ቅድሜሁ፡
  english_pob_choice: and offered praise before him
  chosen_spanish: y le ofrecimos alabanza delante de él
  alternatives_spanish:
  - y alabamos delante de él
  - y le alabamos delante de él
  lexicon: verbo de alabanza + locución preposicional
  rationale: El giro ge'ez con 'delante de él' se vierte de forma transparente. "Ofrecimos alabanza" conserva el matiz de acto deliberado y evita la repetición poco natural de "alabamos" en secuencia con "bendijimos".
- source_word: በእንተ፡ ኵሉ፡ ምግባሩ፡
  english_pob_choice: on account of all his works
  chosen_spanish: por causa de todas sus obras
  alternatives_spanish:
  - a causa de todas sus obras
  - por todas sus obras
  lexicon: preposición causal
  rationale: '"Por causa de" refleja bien la relación causal explícita del original y mantiene un tono claro y sobrio.'
- source_word: እስመ፡
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: conjunción causal
  rationale: Se preserva la conjunción causal al final de la cláusula, igual que en el texto fuente, sin completar indebidamente la frase fragmentaria del testimonio conservado.
theological_decisions:
- issue: Alabanza dirigida 'delante de él' sin suavizar la relación reverencial
  english_pob_reading: offered praise before him
  chosen_spanish_reading: le ofrecimos alabanza delante de él
  alternative_spanish_readings:
  - lo alabamos delante de él
  - ofrecimos alabanza delante de él
  rationale: Se conserva la escena reverencial del grupo que alaba ante la presencia divina, evitando convertirla en una fórmula litúrgica más abstracta.
  doctrine_reference: reverencia ante la presencia de Dios
- issue: Mantenimiento del causal explícito y de la cláusula final abierta
  english_pob_reading: because
  chosen_spanish_reading: porque
  alternative_spanish_readings:
  - pues
  - ya que
  rationale: El testimonio conservado termina en una conjunción causal. En español se mantiene esa apertura sin cerrar artificialmente lo que el fragmento no completa.
  doctrine_reference: fidelidad textual / preservación de fragmento
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió una repetición incómoda en 'praised him before him' hacia 'offered praise before him'. La versión española refleja esa corrección con una formulación natural ('le ofrecimos alabanza delante de él') sin duplicar el objeto ni introducir una nota innecesaria.
  spanish_consistency_notes:
  - Se usa 'alabanza' para preservar el sustantivo del acto de praise en vez de convertirlo solo en un verbo repetido.
  - Se mantiene 'delante de él' para reproducir el valor locativo/reverencial de 'before him'.
  - Se conserva el fragmento final con 'porque' sin añadir contenido no atestiguado.
