revisions:
- from: Y en el cuarto día hizo el sol, la luna y las estrellas, y los puso en la bóveda del cielo para que alumbraran sobre toda la tierra y la gobernaran.
  to: Y en el cuarto día hizo el sol, la luna y las estrellas, y los colocó en el firmamento del cielo para que alumbraran sobre toda la tierra y la gobernaran.
  rationale: Se ajusta «bóveda» a «firmamento» para reflejar con más fidelidad el original y la auditoría inglesa, y se sustituye «puso» por «colocó» para una expresión más natural en español sin alterar el significado.
