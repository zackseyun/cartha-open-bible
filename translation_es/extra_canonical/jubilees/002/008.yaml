base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/008.yaml
  text: And on the fourth day he made the sun and the moon and the stars, and set them in the firmament of heaven so that they might give light upon all the earth and rule it,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:20Z'
    unchanged: false
    changes_summary: Added the explicit object 'it' after 'rule' to account for the source's final pronominal element and complete the clause naturally in English.
translation:
  language: es
  text: Y en el cuarto día hizo el sol, la luna y las estrellas, y los colocó en el firmamento del cielo para que alumbraran sobre toda la tierra y la gobernaran.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በ*ዕለት፡ ራብዕት፡
  english_pob_choice: on the fourth day
  chosen_spanish: en el cuarto día
  alternatives_spanish:
  - el cuarto día
  - en el día cuarto
  lexicon: día
  rationale: La referencia temporal es directa y no requiere expansión; «en el cuarto día» conserva la secuencia narrativa con español natural.
- source_word: ገብረ፡
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - fabricó
  lexicon: hacer
  rationale: El verbo etíope indica acción creadora/realizadora. «Hizo» mantiene amplitud semántica sin añadir una técnica de creación que el verso no especifica explícitamente.
- source_word: ፀሐየ፡ ወወርኀ፡ ወከዋክብተ፡
  english_pob_choice: the sun and the moon and the stars
  chosen_spanish: el sol, la luna y las estrellas
  alternatives_spanish:
  - el sol y la luna y las estrellas
  - el sol, la luna, y las estrellas
  lexicon: sol / luna / estrellas
  rationale: Se mantiene la enumeración concreta del original. En español, el orden y la puntuación con comas mejoran la fluidez sin alterar el contenido.
- source_word: ውስተ፡ ምጽናዓተ፡ ሰማይ፡
  english_pob_choice: in the firmament of heaven
  chosen_spanish: en la bóveda del cielo
  alternatives_spanish:
  - en el firmamento del cielo
  - en la expansión del cielo
  lexicon: firmamento
  rationale: «Bóveda del cielo» comunica en español actual la imagen cosmológica del término sin perder el registro bíblico. «Firmamento» es posible, pero puede sonar más técnico o arcaizante.
- source_word: ከመ፡ ያብርሁ፡
  english_pob_choice: so that they might give light
  chosen_spanish: para que alumbraran
  alternatives_spanish:
  - para que dieran luz
  - a fin de que alumbraran
  lexicon: alumbrar
  rationale: «Alumbraran» reproduce la finalidad del verbo sin volverlo mecánico. Conserva el matiz funcional de dar luz.
- source_word: ዲበ፡ ኵሉ፡ ምድር፡
  english_pob_choice: upon all the earth
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra
  - sobre toda la faz de la tierra
  lexicon: tierra
  rationale: «Toda la tierra» refleja el alcance universal del original. La adición de «faz» no es necesaria y endurecería el estilo.
- source_word: ወለኰንኖ፡
  english_pob_choice: and rule it
  chosen_spanish: y la gobernaran
  alternatives_spanish:
  - y la rigieran
  - y la dominaran
  lexicon: gobernar
  rationale: El pronombre final se refiere a la tierra. «Gobernaran» recoge la función de dominio/ordenación en un español claro; «rigieran» sería más formal, pero menos directo.
theological_decisions:
- issue: Función de los astros en la creación
  english_pob_reading: the sun and moon and stars are made and set to give light and rule the earth
  chosen_spanish_reading: el sol, la luna y las estrellas son hechos y puestos para alumbrar y gobernar la tierra
  alternative_spanish_readings:
  - el sol, la luna y las estrellas son creados y puestos para alumbrar y regir la tierra
  rationale: El verso presenta a los astros como criaturas funcionales dentro del orden creado, no como deidades. La traducción conserva esa subordinación al Creador y el doble propósito de iluminar y gobernar.
  doctrine_reference: Génesis 1:14-18; Salmo 136:7-9
translation_notes:
  revision_awareness: La revisión inglesa añadió explícitamente «it» después de «rule» para reflejar el pronombre final del texto fuente. En español se resolvió con «la gobernaran», que hace explícito el objeto femenino singular («la tierra») sin perder la correspondencia con el cierre pronominal del original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma por defecto del nombre divino solo cuando aparezca explícitamente en el texto; este versículo no lo contiene.
  - Se eligió lenguaje bíblico comprensible y contemporáneo, evitando tanto el tecnicismo excesivo como el arcaísmo innecesario.
  - No se añadieron notas al pie porque el sentido literal y el alcance del verso pueden expresarse con claridad en el cuerpo del texto.
