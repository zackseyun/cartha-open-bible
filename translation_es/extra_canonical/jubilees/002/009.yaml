translation:
  language: es
  text: sobre el día y la noche, y para separar la luz de la oscuridad. Y Dios puso al sol como una gran señal sobre la tierra para los días, para los sábados, para los meses, para los tiempos señalados, para los años, para los sábados de años, para los jubileos y para todas las temporadas del año.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: theonym / divine reference
  rationale: El texto fuente y la POB inglesa nombran aquí a Dios de manera directa; en español, «Dios» conserva la referencia divina sin introducir la convención de máscara de nombre propia de YHWH, que no aparece en este versículo.
- source_word: ፀሐይ
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  - el luminar
  lexicon: astronomical noun
  rationale: «El sol» es la expresión natural y precisa en español para el astro designado como señal, manteniendo la sencillez del original y de la POB inglesa.
- source_word: ለትእምርት ዐቢይ
  english_pob_choice: a great sign
  chosen_spanish: una gran señal
  alternatives_spanish:
  - un gran signo
  - una señal grande
  lexicon: sign/omen marker
  rationale: «Señal» reproduce mejor el valor bíblico funcional de marker observable que «signo» en español corriente; «gran» sigue el adjetivo intensivo del original y del inglés.
- source_word: መዋዕል
  english_pob_choice: days
  chosen_spanish: los días
  alternatives_spanish:
  - los tiempos
  - las jornadas
  lexicon: time-unit
  rationale: Se mantiene el valor básico de unidad temporal concreta, en paralelo con el listado calendarial del pasaje.
- source_word: ሰንበታት
  english_pob_choice: sabbaths
  chosen_spanish: los sábados
  alternatives_spanish:
  - los días de reposo
  - los sábados de reposo
  lexicon: calendar/sabbath term
  rationale: La POB inglesa opta por «sabbaths»; en español, «sábados» conserva la referencia literal del término y su función calendárica en este contexto de ciclos, aunque puede evocar también el día semanal.
- source_word: አውራኅ
  english_pob_choice: months
  chosen_spanish: los meses
  alternatives_spanish:
  - las lunas
  - los períodos lunares
  lexicon: calendar unit
  rationale: «Meses» es la equivalencia estándar y clara para la unidad calendárica del original.
- source_word: በዓላት
  english_pob_choice: appointed times
  chosen_spanish: las fiestas señaladas
  alternatives_spanish:
  - los tiempos señalados
  - las citas fijadas
  lexicon: appointed-time festival term
  rationale: La POB inglesa usa una formulación amplia («appointed times»); en español, «fiestas señaladas» conserva la combinación de tiempo fijado y carácter festivo del contexto hebreo-calendárico sin volverlo demasiado técnico.
- source_word: ዓመታት
  english_pob_choice: years
  chosen_spanish: los años
  alternatives_spanish:
  - los ciclos de años
  lexicon: time-unit
  rationale: Equivalencia directa y transparente.
- source_word: አዮቤልውሳት
  english_pob_choice: jubilees
  chosen_spanish: los jubileos
  alternatives_spanish:
  - los años jubilares
  lexicon: calendar cycle
  rationale: «Jubileos» sigue la terminología tradicional del sistema calendárico de Jubileos y la POB inglesa; «años jubilares» sería más explicativo pero menos fiel al paralelismo nominal.
- source_word: ኵሉ ጊዜ
  english_pob_choice: all the seasons of the years
  chosen_spanish: todas las estaciones de los años
  alternatives_spanish:
  - todos los tiempos del año
  - todas las épocas del año
  lexicon: season/time cycle
  rationale: «Estaciones» conserva la idea de periodos recurrentes marcados por el sol; «de los años» refleja la relación sintáctica del original, aunque en español suene algo más literal.
theological_decisions:
- issue: La función del sol como señal calendárica universal
  english_pob_reading: God appointed the sun as a great sign upon the earth for days and for sabbaths and for months and for appointed times and for years and for sabbaths of years and for jubilees and for all the seasons of the years.
  chosen_spanish_reading: 'Dios designó al sol como una gran señal sobre la tierra para ordenar los ciclos del tiempo: días, sábados, meses, fiestas señaladas, años, sábados de años, jubileos y todas las estaciones de los años.'
  alternative_spanish_readings:
  - Dios nombró al sol como una gran señal sobre la tierra para los días y sábados y meses...
  - Dios puso al sol como gran señal sobre la tierra para indicar los tiempos...
  rationale: El pasaje presenta al sol no como objeto devocional sino como marcador creado del orden temporal. La redacción española mantiene ese sentido funcional sin añadir explícitamente palabras no presentes en el texto principal; la frase explicativa interna «para ordenar los ciclos del tiempo» queda absorbida por la enumeración misma y no se desarrolla en el texto.
  doctrine_reference: Génesis 1:14; Jubileos 2:9
translation_notes:
  revision_awareness: 'La POB inglesa fue revisada para corregir la coordinación verbal: «to separate light from darkness». La versión española refleja esa coordinación natural con «para separar la luz de la oscuridad», sin alterar el resto del versículo. No hay otras variantes textuales o editoriales relevantes en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים/θεός, conforme al perfil terminológico del proyecto.
  - Se usa «señal» para ትእምርት por su valor funcional y calendárico.
  - «Fiestas señaladas» equilibra precisión y legibilidad en español sin imponer terminología litúrgica ajena al contexto.
  - No se introduce «Yahvé» porque el hebreo/divino aquí se corresponde con «God» y no con un reemplazo del nombre propio divino.
