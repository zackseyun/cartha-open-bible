revisions:
- from: sobre el día y la noche, y para separar la luz de la oscuridad. Y Dios designó al sol como una gran señal sobre la tierra para los días, para los sábados, para los meses, para las fiestas señaladas, para los años, para los sábados de años, para los jubileos y para todas las estaciones de los años.
  to: sobre el día y la noche, y para separar la luz de la oscuridad. Y Dios puso al sol como una gran señal sobre la tierra para los días, para los sábados, para los meses, para los tiempos señalados, para los años, para los sábados de años, para los jubileos y para todas las temporadas del año.
  rationale: Se ajustó «designó» a «puso» para reflejar mejor la función de establecimiento del sol en el orden creado; «fiestas señaladas» a «tiempos señalados» para mantener la amplitud de appointed times; y «estaciones de los años» a «temporadas del año» para evitar una lectura exclusivamente climática y sonar más natural en español.
