base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/031.yaml
  text: And the Creator of all blessed it[31], but he did not sanctify all peoples and nations to keep sabbath on it; Israel alone—to it alone he granted to eat and drink and keep sabbath on it upon the earth.
  footnotes:
  - marker: '31'
    text: The text states that the Creator blessed the day but did not sanctify all peoples and nations to keep Sabbath on it; Israel alone receives that sanctified earthly observance. This is a theological claim of election in sacred time, not merely an ethnic aside.
    reason: cross_reference
  - marker: a
    text: Or 'he gave to eat and drink'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:28Z'
    unchanged: false
    changes_summary: Removed the unnecessary explanatory words 'that they should' for a more direct and natural rendering while preserving the source sense.
translation:
  language: es
  text: Y el Creador de todo lo bendijo, pero no santificó a todos los pueblos y naciones para guardar el sábado en él; solo a Israel —solo a él— le concedió[a] comer y beber y guardar el sábado en él, sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le dio comer y beber»; aquí el verbo expresa concesión o permiso para ese privilegio, no simplemente provisión de alimento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: and blessed it / blessed
  english_pob_choice: blessed it
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - lo declaró bendito
  - lo bendijo
  lexicon: bendecir
  rationale: El verbo ge'ez expresa la bendición del día por parte del Creador; en español, «lo bendijo» conserva la acción directa sin añadir una interpretación distinta como «declaró bendito».
- source_word: Creator of all
  english_pob_choice: the Creator of all
  chosen_spanish: el Creador de todo
  alternatives_spanish:
  - el Creador de todas las cosas
  - el Creador de todo
  lexicon: crear / Creador
  rationale: «De todo» reproduce con naturalidad la totalidad del original y mantiene el título teológico sin expandirlo innecesariamente.
- source_word: sanctify
  english_pob_choice: sanctify
  chosen_spanish: santificó
  alternatives_spanish:
  - consagró
  - apartó
  lexicon: santificar
  rationale: «Santificó» es el equivalente más directo y digno para el acto de apartar el día y a un pueblo para una observancia sagrada.
- source_word: peoples and nations
  english_pob_choice: peoples and nations
  chosen_spanish: los pueblos y naciones
  alternatives_spanish:
  - los pueblos
  - las naciones
  lexicon: pueblo / nación
  rationale: Se conserva el paralelismo doble del original y de la versión inglesa, sin reducirlo a un solo término.
- source_word: keep sabbath
  english_pob_choice: keep sabbath
  chosen_spanish: guardar el sábado
  alternatives_spanish:
  - observar el sábado
  - celebrar el sábado
  lexicon: sábado / guardar
  rationale: «Guardar el sábado» conserva el valor de observancia normativa que la POB inglesa expresa con 'keep sabbath'.
- source_word: Israel alone—to it alone
  english_pob_choice: Israel alone—to it alone
  chosen_spanish: solo a Israel —solo a él—
  alternatives_spanish:
  - a Israel solamente —solamente a él—
  - solo a Israel —solo para él—
  lexicon: Israel
  rationale: Se mantiene el énfasis exclusivo del texto con una repetición natural en español; «a él» retoma a Israel y evita ambigüedad.
- source_word: granted to eat and drink
  english_pob_choice: granted to eat and drink
  chosen_spanish: le concedió comer y beber
  alternatives_spanish:
  - le permitió comer y beber
  - le concedió el comer y el beber
  lexicon: conceder
  rationale: La revisión inglesa indica que no se trata de 'dar comida' sino de conceder un privilegio o permiso; «concedió» comunica mejor ese matiz que «dio».
- source_word: upon the earth
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: tierra
  rationale: «Sobre la tierra» sigue de cerca la formulación fuente y conserva el cierre espacial del enunciado.
theological_decisions:
- issue: Elección de Israel para la observancia del sábado
  english_pob_reading: The Creator blessed the day but did not sanctify all peoples and nations to keep sabbath on it; Israel alone receives that sanctified earthly observance.
  chosen_spanish_reading: El Creador bendice el día, pero la santificación para guardar el sábado recae exclusivamente en Israel.
  alternative_spanish_readings:
  - Dios bendijo el día para todos por igual
  - solo Israel fue apartado para esa observancia
  rationale: 'La redacción conserva la tensión teológica documentada por la POB: bendición universal del día, pero santificación/observancia sabática particular para Israel. No se suaviza esa exclusividad.'
  doctrine_reference: Elección y santificación del tiempo; distinción entre bendición general y consagración pactal.
translation_notes:
  revision_awareness: La POB inglesa revisó «he gave to eat and drink» a «he granted to eat and drink» para evitar la idea de suministro material. La versión española sigue esa corrección con «le concedió comer y beber», manteniendo el carácter de permiso/privilegio. También conserva la nota teológica de que la bendición del día no equivale a santificación universal.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el original porta el nombre divino; aquí no aparece, por lo que se mantiene «el Creador de todo».
  - «sábado» se emplea como nombre del día de reposo en una formulación verbal («guardar el sábado») acorde con el valor normativo del pasaje.
  - Se mantiene la repetición enfática «solo a Israel —solo a él—» para reflejar la exclusividad textual sin introducir glosas excesivas.
