translation:
  language: es
  text: 'Porque en el primer día creó los cielos de lo alto, y la tierra, y las aguas, y todos los espíritus que ministran delante de él: los ángeles de la presencia, y los ángeles de la santificación, y los ángeles del espíritu de fuego, y los ángeles del espíritu de las nubes, y de la oscuridad, y de la nieve, y del granizo y de la escarcha, y los ángeles de las voces, del trueno y del relámpago, y los ángeles de los espíritus de frío y calor, de invierno y primavera, de siega y verano, y todos los espíritus de sus obras que están en los cielos, y en la tierra, y en los mares, y en lo profundo, y en la oscuridad, y en la noche, y en la luz, y en el alba y en la mañana, que preparó en el conocimiento de su corazón.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሰማያተ፡ እለ፡ መልዕልት፡
  english_pob_choice: the heavens above
  chosen_spanish: los cielos de arriba
  alternatives_spanish:
  - los cielos de lo alto
  - los cielos superiores
  lexicon: Ge'ez ሰማያተ / መልዕልት
  rationale: El hebraísmo/etíope expresa una localización superior, no solo 'cielos' en abstracto; 'de arriba' conserva la relación espacial sin sonar forzado en español.
- source_word: ሰማያተ፡
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  lexicon: Ge'ez ሰማያት
  rationale: Plural coherente con el catálogo cósmico; 'cielos' mantiene la amplitud del texto mejor que el singular.
- source_word: መላእክተ፡ ቅዳሴ፡
  english_pob_choice: the angels of sanctification
  chosen_spanish: los ángeles de la santificación
  alternatives_spanish:
  - los ángeles de la santidad
  - los ángeles de consagración
  lexicon: Ge'ez ቅዳሴ
  rationale: '''Santificación'' conserva el sustantivo abstracto del original y sigue la terminología del pasaje; ''santidad'' sería más idiomático pero menos exacto al matiz verbal/nominal.'
- source_word: መላእክተ፡ መንፈሰ፡ እሳት፡
  english_pob_choice: the angels of the spirit of fire
  chosen_spanish: los ángeles del espíritu de fuego
  alternatives_spanish:
  - los ángeles del espíritu ígneo
  - los ángeles del espíritu del fuego
  lexicon: Ge'ez መንፈሰ / እሳት
  rationale: Se conserva la construcción repetida 'espíritu de...' del original y del POB inglés; 'de fuego' es claro y fiel.
- source_word: መላእክተ፡ መንፈሰ፡ ደመናት፡
  english_pob_choice: the angels of the spirit of clouds
  chosen_spanish: los ángeles del espíritu de las nubes
  alternatives_spanish:
  - los ángeles del espíritu de nubes
  - los ángeles del espíritu nuboso
  lexicon: Ge'ez ደመናት
  rationale: '''Nubes'' sigue el plural del ge''ez y la revisión inglesa que corrigió ''winds'' por ''clouds''; ''de las nubes'' comunica mejor que un abstracto como ''nuboso''.'
- source_word: ለሐመዳ፡ ወለበረድ፡
  english_pob_choice: of snow and hail and frost
  chosen_spanish: de la nieve, y del granizo y del hielo
  alternatives_spanish:
  - de la nieve, y del granizo y de la escarcha
  - de la nieve, y del granizo y del rocío congelado
  lexicon: Ge'ez ሐመዳ / በረድ
  rationale: '''Hielo'' es una equivalencia transparente para ''frost'' en español moderno y evita una expresión poco natural como ''escarcha'' en este catálogo; la tríada conserva la densidad del original.'
- source_word: መላእክተ፡ ቃላት፡ ወነጐድጓዳት፡ ወመብረቅት፡
  english_pob_choice: the angels of the voices and thunder and lightning
  chosen_spanish: los ángeles de las voces, del trueno y del relámpago
  alternatives_spanish:
  - los ángeles de las voces, del trueno y del rayo
  - los ángeles de las voces, de los truenos y de los relámpagos
  lexicon: Ge'ez ቃላት / ነጐድጓድ / መብረቅ
  rationale: '''Voces'' mantiene el plural literal; ''trueno'' y ''relámpago'' son los términos más naturales en español para el par climático sin diluir la enumeración.'
- source_word: መላእክተ፡ መናፍስት፡ ለቍር፡ ወለመዐት፡ ወለክረምት፡ ወለመጸው፡ ወለማእረር፡ ወለሐጋይ፡
  english_pob_choice: the angels of the spirits of cold and heat and winter and spring and harvest and summer
  chosen_spanish: los ángeles de los espíritus de frío y calor, de invierno y primavera, de siega y verano
  alternatives_spanish:
  - los ángeles de los espíritus del frío y del calor, del invierno, de la primavera, de la siega y del verano
  - los ángeles de los espíritus de frío y de calor, de invierno, primavera, siega y verano
  lexicon: Ge'ez ቍር / መዐት / ክረምት / መጸው / ማእረር / ሐጋይ
  rationale: Se conserva la serie de genitivos y estaciones tal como la presenta el texto; 'siega' traduce bien la temporada de cosecha sin convertirla en una frase explicativa.
- source_word: ዘበሰማያት፡ ወዘበምድር፡ ወቀላያተ፡ ... ወጽልመት፡ ወምሉክ፡(ወልሊት)፡ ወብርሃን፡ ወጎህ፡ ወጽባሕ፡
  english_pob_choice: that are in the heavens and on the earth and in the seas and in the depths and in darkness and in night and in light and in dawn and in morning
  chosen_spanish: que están en los cielos, y en la tierra, y en los mares, y en lo profundo, y en la oscuridad, y en la noche, y en la luz, y en el alba y en la mañana
  alternatives_spanish:
  - que están en los cielos, y en la tierra, y en los mares, y en las profundidades, y en la oscuridad, y en la noche, y en la luz, y en el alba y en la mañana
  - que están en los cielos, y en la tierra, y en los mares, y en los abismos, y en la oscuridad, y en la noche, y en la luz, y en el alba y en la mañana
  lexicon: Ge'ez ቀላያት / ምሉክ / ጽልመት / ልሊት / ብርሃን / ጎህ / ጽባሕ
  rationale: '''Lo profundo'' rinde mejor el ámbito de aguas/profundidades que ''abismos'' en un catálogo cosmológico amplio. Se incluye ''noche'' porque el ge''ez transmitido la conserva, aunque el inglés POB base usó otra tradición textual; ''alba'' y ''mañana'' reproducen la doble referencia final sin perder la variante textual.'
- source_word: በአእምሮ፡ ልቡ፡
  english_pob_choice: in the purpose of his heart
  chosen_spanish: con el conocimiento de su corazón
  alternatives_spanish:
  - en el conocimiento de su corazón
  - con la intención de su corazón
  lexicon: Ge'ez አእምሮ / ልብ
  rationale: El audit trail inglés tuvo una revisión hacia 'knowledge', y el ge'ez አእምሮ admite conocimiento/entendimiento; 'con el conocimiento de su corazón' mantiene la concreción cognitiva sin imponer una interpretación teleológica no necesaria.
theological_decisions:
- issue: Catálogo de espíritus angélicos y elementos creados
  english_pob_reading: The list is preserved closely as created spirits and angels without smoothing its density.
  chosen_spanish_reading: Se conserva la enumeración densa de espíritus y ángeles creados, sin armonizarla ni simplificarla.
  alternative_spanish_readings:
  - Se puede suavizar la lista para una lectura más fluida.
  - Se puede agrupar por categorías temáticas.
  rationale: El pasaje presenta una lista acumulativa y textualmente compleja; la fidelidad exige mantener esa densidad en español, aunque resulte poco elegante, porque esa misma aspereza es parte del testimonio textual.
  doctrine_reference: Jubileos 2:2; principio de transparencia textual del POB
translation_notes:
  revision_awareness: Tomé en cuenta la última revisión inglesa que corrigió 'clouds' frente a 'winds', añadió 'night' en la secuencia cosmológica y prefirió 'knowledge' frente a 'purpose' en la clausura. Por eso el español incluye 'de las nubes', mantiene 'noche' y usa 'con el conocimiento de su corazón'.
  spanish_consistency_notes:
  - Se mantiene 'ángeles de la presencia' como fórmula fija del pasaje, sin sustituirla por paráfrasis.
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se preserva la repetición de 'y' en la enumeración para reflejar la estructura del original.
  - Se eligió 'lo profundo' para evitar cargar el verso con una imaginería más específica de la que el texto ofrece.
