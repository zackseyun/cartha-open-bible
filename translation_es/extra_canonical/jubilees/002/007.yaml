translation:
  language: es
  text: un lugar fuera de este firmamento, y apareció la tierra seca. Y en aquel día creó para ella todos los mares, según sus agrupaciones separadas, y todos los ríos, y las acumulaciones de las aguas en los montes y en toda la tierra, y todos los lagos y todo el rocío de la tierra, y la semilla que se siembra, y todo lo que brota, y los árboles frutales, y los bosques, y el jardín de Edén en Edén para deleite, y todas estas cuatro grandes clases[a] las hizo el tercer día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «todas estas cuatro grandes clases» es difícil porque el versículo combina rasgos topográficos, vegetación y Edén en una lista comprimida. El número probablemente resume categorías agrupadas más que cada elemento individual.
    reason: source_note
lexical_decisions:
- source_word: መካን፡ አሐዱ፡ አፍአ፡ እምጽናዓትዝ
  english_pob_choice: one place outside this firmament
  chosen_spanish: un lugar fuera de este firmamento
  alternatives_spanish:
  - un sitio fuera de este firmamento
  - un lugar más allá de este firmamento
  lexicon: 外/firmamento
  rationale: El ge'ez expresa un lugar exterior al firmamento; en español, «fuera de este firmamento» conserva la relación espacial sin añadir matices cosmológicos no explicitados.
- source_word: ወ*አስተርአየ፡ የብስ
  english_pob_choice: and the dry land appeared
  chosen_spanish: y apareció la tierra seca
  alternatives_spanish:
  - y apareció la tierra firme
  - y se hizo visible la tierra seca
  lexicon: tierra seca
  rationale: «Tierra seca» sigue de cerca el contraste con las aguas y mantiene la imagen de una superficie emergida.
- source_word: ኵሎ፡ አብህርተ፡ በበ፡ ምትባኢሆሙ
  english_pob_choice: all the seas according to their separate gatherings
  chosen_spanish: todos los mares, según sus respectivas reuniones
  alternatives_spanish:
  - todos los mares, según sus distintas congregaciones
  - todos los mares, según sus diferentes junturas
  lexicon: reuniones
  rationale: «Mítba'i» remite a reuniones/junturas; «reuniones» conserva el agrupamiento de las aguas sin resolver demasiado la imagen técnica.
- source_word: አፍላገ፡ ወ*ምጉባኢሆሙ፡ ለማያት፡ ውስተ፡ አድባር፡ ወውስተ፡ ኵሉ፡ ምድር
  english_pob_choice: all the rivers, and the gatherings of the waters in the mountains and in all the earth
  chosen_spanish: todos los ríos, y las acumulaciones de las aguas en los montes y en toda la tierra
  alternatives_spanish:
  - todos los ríos, y las reuniones de las aguas en los montes y en toda la tierra
  - todos los ríos, y las junturas de las aguas en los montes y en toda la tierra
  lexicon: acumulaciones
  rationale: El sustantivo ge'ez designa agrupaciones o acumulaciones de aguas; «acumulaciones» es más natural en español que «reuniones» para aguas retenidas en montes y por toda la tierra.
- source_word: ምዕቃባተ
  english_pob_choice: all the lakes
  chosen_spanish: todos los lagos
  alternatives_spanish:
  - todas las albercas
  - todos los estanques
  lexicon: lagos
  rationale: «Lagos» traduce de forma clara y amplia el conjunto de cuerpos de agua estancada que el contexto enumera.
- source_word: ጠለ፡ ምድር
  english_pob_choice: all the dew of the earth
  chosen_spanish: todo el rocío de la tierra
  alternatives_spanish:
  - todo el rocío de la tierra
  - todo el relente de la tierra
  lexicon: rocío
  rationale: «Rocío» es el equivalente más directo y entendido en español para esta humedad natural.
- source_word: ወዘርአ፡ ዘይዘራእ
  english_pob_choice: and the seed that is sown
  chosen_spanish: y la semilla que se siembra
  alternatives_spanish:
  - y la semilla sembrada
  - y la semilla que es sembrada
  lexicon: semilla
  rationale: La forma pasiva/relativa del ge'ez se expresa de modo natural con una relativa activa en español sin perder el sentido.
- source_word: ወኵሎ፡ ዘይበቍል
  english_pob_choice: and everything that sprouts
  chosen_spanish: y todo lo que brota
  alternatives_spanish:
  - y todo lo que germina
  - y todo lo que retoña
  lexicon: brota
  rationale: «Brota» cubre plantas y crecimiento emergente con naturalidad, sin restringirlo solo a semillas.
- source_word: ወዕፀወ፡ እለ፡ ይፈርዩ
  english_pob_choice: and fruit-bearing trees
  chosen_spanish: y los árboles frutales
  alternatives_spanish:
  - y los árboles que dan fruto
  - y los árboles frutíferos
  lexicon: árboles frutales
  rationale: El giro describe árboles que producen fruto; «árboles frutales» es idiomático y preciso en español.
- source_word: ወ*አማተ
  english_pob_choice: and woods
  chosen_spanish: y los bosques
  alternatives_spanish:
  - y los montes arbolados
  - y los bosques y maderas
  lexicon: bosques
  rationale: La revisión auditada corrigió una omisión en inglés para incluir esta entidad vegetal/terrestre; «bosques» es la forma más natural y amplia para el término ge'ez.
- source_word: ወገነተ፡ ኤዶም፡ በኤዶም
  english_pob_choice: and the Garden of Eden in Eden
  chosen_spanish: y el jardín de Edén en Edén
  alternatives_spanish:
  - y el huerto de Edén en Edén
  - y el jardín del Edén en Edén
  lexicon: jardín de Edén
  rationale: Se mantiene «jardín» porque el texto fuente nombra un espacio de deleite, y se conserva la repetición «en Edén» tal como aparece en la fuente.
- source_word: ለ*ተድላ
  english_pob_choice: for delight
  chosen_spanish: para deleite
  alternatives_spanish:
  - para placer
  - para gozo
  lexicon: deleite
  rationale: «Para deleite» conserva el valor final y el tono elevado del pasaje sin desplazarlo a una interpretación más teológica que la fuente no exige.
- source_word: አርባዕተ ዘንተ ዐበይተ ትውልደ
  english_pob_choice: all these four great kinds
  chosen_spanish: todas estas cuatro grandes clases
  alternatives_spanish:
  - todas estas cuatro grandes especies
  - todas estas cuatro grandes categorías
  lexicon: clases
  rationale: La enumeración reúne elementos topográficos, acuáticos y vegetales; «clases» conserva la idea de agrupación sin forzar una taxonomía moderna.
theological_decisions:
- issue: La secuencia cosmológica y la relación entre cielo-firmamento-tierra
  english_pob_reading: one place outside this firmament, and the dry land appeared
  chosen_spanish_reading: un lugar fuera de este firmamento, y apareció la tierra seca
  alternative_spanish_readings:
  - un lugar más allá de este firmamento, y apareció la tierra seca
  - un lugar fuera de este firmamento, y emergió la tierra seca
  rationale: La fuente presenta una cosmología narrativa concreta. «Fuera de este firmamento» mantiene la localización sin reinterpretarla ni suavizarla.
  doctrine_reference: Génesis 1:6-10; cosmología de la creación en literatura del Segundo Templo
- issue: La frase resumida sobre «cuatro grandes clases»
  english_pob_reading: all these four great kinds he made
  chosen_spanish_reading: todas estas cuatro grandes clases las hizo en el tercer día
  alternative_spanish_readings:
  - todas estas cuatro grandes categorías las hizo en el tercer día
  - hizo todas estas cuatro grandes clases en el tercer día
  rationale: La revisión auditada muestra que el número resume categorías agrupadas, no necesariamente ítems uno por uno. En español se conserva la ambigüedad clasificatoria sin explicar más de lo debido.
  doctrine_reference: Literalidad responsable ante listas enumerativas antiguas; principio de conservación de ambigüedad semántica
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada que añade «woods» / «bosques» a la lista y la revisión gramatical que elimina el erróneo «for» en la frase final inglesa. La versión española refleja ambos puntos y conserva la ambigüedad estructural de la enumeración.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde hubiera un nombre divino explícito; aquí no aparece ninguna forma del nombre.
  - Se prefirió «jardín de Edén» por la tradición del término, pero sin introducir mayúsculas o perífrasis no presentes en la fuente.
  - Se mantuvo «tierra seca» y no «tierra firme» para respetar la imagen de aparición contrastada con las aguas.
  - Se tradujo la lista con paralelismo sintáctico estable para preservar el ritmo acumulativo del original.
