  text: one place outside this firmament[7], and the dry land appeared. And on that day he created for it all the seas according to their separate gatherings, and all the rivers and the gatherings of the waters in the mountains and in all the earth, and all the lakes and all the dew of the earth, and the seed that is sown, and everything that sprouts, and fruit-bearing trees, and woods, and the Garden of Eden in Eden for delight, and all these four great kinds he made on the third day.
