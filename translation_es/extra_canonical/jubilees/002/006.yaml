base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/006.yaml
  text: And the waters did so, just as he told them, and they withdrew from the face of the earth.
  footnotes:
  - marker: a
    text: Or 'from upon the face of the earth'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:19Z'
    unchanged: false
    changes_summary: Removed the incomplete final word 'into,' which has no expressed object in the source as given. Kept the rest essentially unchanged, with natural formal English preserved.
translation:
  language: es
  text: Y las aguas hicieron así, tal como él les había dicho, y se retiraron de la superficie de la tierra.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la faz de la tierra»; el ge''ez permite una lectura espacial equivalente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወገብሩ
  english_pob_choice: did so
  chosen_spanish: hicieron así
  alternatives_spanish:
  - así lo hicieron
  - lo hicieron de esa manera
  lexicon: Hacer / አድርገ-
  rationale: El ge'ez expresa cumplimiento de una orden o mandato; «hicieron así» conserva la respuesta obediente sin forzar una paráfrasis más explicativa.
- source_word: በከመ ይቤሎሙ
  english_pob_choice: just as he told them
  chosen_spanish: tal como él les había dicho
  alternatives_spanish:
  - como él les dijo
  - justo como él les había dicho
  lexicon: Decir / decirles
  rationale: «Tal como» reproduce bien la equivalencia de modo del original y mantiene la relación de obediencia al dicho previo. Se usa pluscuamperfecto para reflejar anterioridad respecto de la acción de las aguas.
- source_word: ወተገብሡ
  english_pob_choice: they withdrew
  chosen_spanish: se retiraron
  alternatives_spanish:
  - se apartaron
  - retrocedieron
  lexicon: Retirarse / apartarse
  rationale: El verbo transmite alejamiento o retirada; «se retiraron» es natural en español y mantiene el movimiento de reflujo sin introducir matices no garantizados.
- source_word: እምዲበ ገጸ ለምድር
  english_pob_choice: from the face of the earth
  chosen_spanish: de la superficie de la tierra
  alternatives_spanish:
  - del rostro de la tierra
  - de la faz de la tierra
  lexicon: Preposición compuesta + rostro/superficie
  rationale: La expresión ge'ez equivale espacialmente a la idea de retirar las aguas de la parte visible/superior de la tierra. «Superficie» comunica con claridad el sentido físico; se evita una traducción demasiado literal de «face» que en español puede sonar arcaica o menos transparente.
theological_decisions:
- issue: Imagen espacial de retirada de las aguas
  english_pob_reading: from the face of the earth
  chosen_spanish_reading: de la superficie de la tierra
  alternative_spanish_readings:
  - de la faz de la tierra
  - del rostro de la tierra
  rationale: No hay tensión doctrinal especial; la decisión es principalmente semántica y estilística. «Superficie» conserva el contenido espacial del texto fuente y evita una metáfora que en español puede leerse como formulación bíblica tradicional más que como traducción auditada del ge'ez.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto base en inglés fue revisado para eliminar un final incompleto («into,»), y la redacción estable resultante es «from the face of the earth». La versión española sigue esa lectura consolidada y conserva la alternativa espacial documentada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Las aguas» traduce el plural del sujeto con concordancia natural en español.
  - Se ha preferido una construcción sobria y directa, sin ampliar el contenido más allá del movimiento descrito.
