    text: O «Y declara y di».
    reason: previous_rendering
  revision_rationale: Se corrige la omisión de «ni saquen agua», exigida por el Ge'ez y por el inglés POB. También se ajusta «guarden el sábado» para mejor naturalidad en español y se conserva la nota alternativa documentada en inglés para la apertura discursiva. No se incluye nota sobre «preparado ... el sexto día» porque la revisión inglesa eliminó la variante «en sus moradas» del texto principal; esa variante no necesita preservarse aquí como nota española obligatoria.
