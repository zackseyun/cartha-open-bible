base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/029.yaml
  text: 'Likewise declare and say to the children of Israel the law of this day: that they are to keep sabbath on it, and that they are not to forsake it in the error of their hearts so as to do any work on it that is not fitting, or to do on it their own pleasure, or to prepare on it anything to be eaten or drunk, or to draw water, or to bring in or take out through their gates any burden that they had not prepared for themselves on the sixth day.'
  footnotes:
  - marker: a
    text: Or 'prepared for themselves in their dwellings on the sixth day.'.
    reason: previous_rendering
  - marker: b
    text: Or 'And declare and say'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:55Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Asimismo, declara y di[a] a los hijos de Israel la ley de este día: que guarden el sábado en él, y que no lo abandonen en el error de su corazón, de modo que hagan en él ninguna obra que no conviene, ni hagan en él su propio placer, ni preparen en él nada para comer o beber, ni saquen agua, ni metan o saquen por sus puertas alguna carga que no hubieran preparado para sí el sexto día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y declara y di».
    reason: previous_rendering
lexical_decisions:
- source_word: ከማሁ
  english_pob_choice: Likewise
  chosen_spanish: Asimismo
  alternatives_spanish:
  - Likewise
  - Así
  - De igual manera
  lexicon: adverbio de semejanza / continuidad
  rationale: El Ge'ez ከማሁ expresa continuidad o similitud, mejor reflejada por 'Asimismo' que por un simple 'y'. Mantiene el matiz de reanudación discursiva señalado en la revisión inglesa.
- source_word: ይከውን
  english_pob_choice: they are to keep sabbath
  chosen_spanish: guarden sábado
  alternatives_spanish:
  - observen el sábado
  - descansen en él
  - guarden el sábado
  lexicon: verbo de observancia sabática
  rationale: '''Guarden sábado'' conserva la fuerza normativa del mandato sin introducir una formulación más interpretativa. ''Observen'' sería posible, pero ''guardar'' es más directo para el deber ritual.'
- source_word: በኵሉ፡ መዋዕል
  english_pob_choice: on it
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en ese día
  lexicon: preposición temporal
  rationale: La referencia es al día, no a un espacio físico; 'en él' mantiene la anáfora del día de descanso.
- source_word: በስሕተት፡ ልቦሙ
  english_pob_choice: in the error of their hearts
  chosen_spanish: en el error de su corazón
  alternatives_spanish:
  - en el error de sus corazones
  - en el engaño de su corazón
  - por el error de su corazón
  lexicon: expresión idiomática de desviación interior
  rationale: La expresión singular 'corazón' sigue el estilo bíblico español y conserva el sentido de desvío interior sin diluirlo en una paráfrasis psicológica.
- source_word: ገቢረ፡ ግብር
  english_pob_choice: do any work
  chosen_spanish: hagan ... obra alguna
  alternatives_spanish:
  - hagan cualquier trabajo
  - realicen obra alguna
  lexicon: campo semántico de trabajo/obra
  rationale: '''Obra'' permite reflejar el valor amplio de ግብር/גְּבוּרָה? Aquí, por el contexto sabático, es la categoría general de actividad prohibida. ''Trabajo'' es entendible, pero ''obra'' deja mejor el eco bíblico.'
- source_word: ዘኢይከውን
  english_pob_choice: that is not fitting
  chosen_spanish: que no conviene
  alternatives_spanish:
  - que no es conveniente
  - que no corresponde
  lexicon: adjetivo de conveniencia/aptitud
  rationale: '''Conviene'' reproduce con naturalidad la noción de idoneidad moral o ritual, evitando una explicación excesiva.'
- source_word: ፈቃዶሙ
  english_pob_choice: their own pleasure
  chosen_spanish: su propio placer
  alternatives_spanish:
  - su propio gusto
  - su propia voluntad
  lexicon: deseo/placer propio
  rationale: '''Placer'' traduce bien el deseo personal autodeterminado al que se refiere el texto; ''gusto'' sería más coloquial y ''voluntad'' demasiado abstracta.'
- source_word: ዘይትበላዕ ወዘይስተይ
  english_pob_choice: anything to be eaten or drunk
  chosen_spanish: nada para comer o beber
  alternatives_spanish:
  - algo para comer o beber
  - cualquier cosa que se coma o se beba
  lexicon: infinitivos sustantivados de consumo
  rationale: La construcción española es más fluida y sigue fielmente la idea de preparar comida o bebida para el día.
- source_word: ማይ
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  lexicon: líquido potable / agua
  rationale: El término estándar y más natural en español es 'agua'; no requiere glosa adicional.
- source_word: ዘይጸውር
  english_pob_choice: burden
  chosen_spanish: alguna carga
  alternatives_spanish:
  - algún peso
  - alguna carga
  lexicon: peso/carga transportable
  rationale: '''Carga'' conserva el sentido concreto de algo llevado a través de las puertas; ''peso'' sería menos idiomático en español bíblico.'
- source_word: በሰዱስ
  english_pob_choice: on the sixth day
  chosen_spanish: el sexto día
  alternatives_spanish:
  - el día sexto
  - el sexto día
  lexicon: marcador temporal
  rationale: Se mantiene la referencia temporal exacta sin añadir la glosa incorrecta 'en sus moradas', retirada en la revisión del texto fuente.
theological_decisions:
- issue: Mandato sabático como ley para Israel
  english_pob_reading: the law of this day ... keep sabbath on it
  chosen_spanish_reading: la ley de este día ... guarden sábado en él
  alternative_spanish_readings:
  - la ley de este día ... observen el sábado en él
  - la norma de este día ... guarden sábado en él
  rationale: 'Se conserva el carácter legal y comunitario del pasaje: no es sólo una recomendación, sino una ley dada a Israel. ''Sábado'' se mantiene como día/observancia, sin sustituirlo por una perífrasis que debilite el mandamiento.'
  doctrine_reference: Éxodo 20:8-10; Génesis 2:2-3 como trasfondo sabático
translation_notes:
  revision_awareness: La redacción sigue la revisión del audit trail que corrigió 'Likewise declare and say' a 'Likewise declare and say' y eliminó la adición no atestiguada 'in their dwellings'. La frase final se ajusta al Ge'ez proporcionado, sin introducir elementos ausentes en el texto fuente.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otras sustituciones convencionales porque el pasaje no contiene el Tetragrámaton.
  - '''sábado'' se usa como observancia/día sabático; no se introduce mayúscula litúrgica innecesaria.'
  - No se añadió 'en sus moradas' ni otra glosa espacial, conforme a la revisión textual.
  - '''obra'' y ''carga'' mantienen el registro bíblico y legal del mandato.'
