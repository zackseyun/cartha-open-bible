revisions:
- from: 'Asimismo, declara y di a los hijos de Israel la ley de este día: que guarden sábado en él, y que no lo abandonen en el error de su corazón, de modo que no hagan en él obra alguna que no conviene, ni hagan en él su propio placer, ni preparen en él nada para comer o beber, ni saquen o metan por sus puertas alguna carga que no hubieran preparado para sí el sexto día.'
  to: 'Asimismo, declara y di[a] a los hijos de Israel la ley de este día: que guarden el sábado en él, y que no lo abandonen en el error de su corazón, de modo que hagan en él ninguna obra que no conviene, ni hagan en él su propio placer, ni preparen en él nada para comer o beber, ni saquen agua, ni metan o saquen por sus puertas alguna carga que no hubieran preparado para sí el sexto día.'
  rationale: Se corrige la omisión de «ni saquen agua», exigida por el Ge'ez y por el inglés POB. También se ajusta «guarden el sábado» para mejor naturalidad en español y se conserva la nota alternativa documentada en inglés para la apertura discursiva. No se incluye nota sobre «preparado ... el sexto día» porque la revisión inglesa eliminó la variante «en sus moradas» del texto principal; esa variante no necesita preservarse aquí como nota española obligatoria.
