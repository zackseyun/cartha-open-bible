review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura principal del Ge''ez y sigue la revisión inglesa clave: ከማሁ = «Asimismo» y በሰዱስ = «el sexto día» sin añadir «en sus moradas». Sin embargo, omite un elemento explícito del original y del inglés POB: «ni sacar agua» (ለቀዲሐ፡ ማይ), presente entre las prohibiciones de preparar comida/bebida y de meter/sacar cargas por las puertas.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: «guarden sábado» suena menos natural que «guarden el sábado» en español general eclesial; y la omisión de «sacar agua» deja incompleta la serie prohibitiva. También conviene mantener paralelismo más claro en «meter o sacar por sus puertas».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Hijos de Israel», «sábado», «corazón», «obra», «placer» y «carga» son aceptables. Se recomienda «guarden el sábado» por mayor naturalidad sin pérdida semántica.
  issues:
  - severity: high
    issue: Falta la cláusula «ni sacar agua»
    rationale: El Ge'ez incluye explícitamente ለቀዲሐ፡ ማይ y el inglés POB traduce «or to draw water». Su omisión altera el contenido legal del versículo.
  - severity: medium
    issue: «guarden sábado» suena menos idiomático que «guarden el sábado»
    rationale: Aunque comprensible, en español bíblico general la forma con artículo es más natural y mantiene la misma fuerza normativa.
  - severity: low
    issue: Orden de «saquen o metan» puede ajustarse al paralelismo inglés «bring in or take out»
    rationale: No es error grave, pero «metan o saquen» sigue mejor la secuencia del texto auditado y suena más equilibrado con «por sus puertas».
  revised_spanish_text: 'Asimismo, declara y di[a] a los hijos de Israel la ley de este día: que guarden el sábado en él, y que no lo abandonen en el error de su corazón, de modo que hagan en él ninguna obra que no conviene, ni hagan en él su propio placer, ni preparen en él nada para comer o beber, ni saquen agua, ni metan o saquen por sus puertas alguna carga que no hubieran preparado para sí el sexto día.'
  revised_footnotes:
