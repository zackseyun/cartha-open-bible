- from: 'Él hizo siete grandes obras el primer día. Y en el segundo día hizo el firmamento en medio de las aguas, y las aguas fueron divididas en ese día: la mitad subió arriba, y la mitad descendió debajo del firmamento que está en medio, sobre la faz de toda la tierra. Y esto solamente lo hizo.'
