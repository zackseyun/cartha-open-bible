base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/004.yaml
  text: 'He made seven great works on the first day. And on the second day he made the firmament in the midst of the waters, and the waters were divided on that day: half of them went up above, and half of them went down beneath the firmament that is in the midst, over the face of the whole earth. And this alone he made.'
