translation:
  language: es
  text: y para gloria por encima de todos los días. Esta ley y este testimonio fueron dados a los hijos de Israel como ley perpetua por todas sus generaciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወለስብሐት፡
  english_pob_choice: for glory
  chosen_spanish: para gloria
  alternatives_spanish:
  - y gloria
  - para alabanza
  lexicon: Geez ስብሐት / Hebrew-style doxological noun phrase
  rationale: La preposición prefijada en el original pide una relación final o de destino; por eso se traduce con 'para' y no solo con una coordinación. 'Gloria' conserva el sustantivo doxológico del texto y evita introducir una paráfrasis como 'alabanza'.
- source_word: እምኵሉ፡ መዋዕል።
  english_pob_choice: above all days
  chosen_spanish: sobre todos los días
  alternatives_spanish:
  - por encima de todos los días
  - más que todos los días
  lexicon: comparative superlative idiom
  rationale: La expresión compara esta gloria con la totalidad de los días; 'sobre todos los días' mantiene la relación comparativa de manera directa y cercana al original, sin suavizarla en exceso.
- source_word: ዝንቱ፡ ሕግ፡
  english_pob_choice: This law
  chosen_spanish: Esta ley
  alternatives_spanish:
  - Esta norma
  - Esta instrucción
  lexicon: νόμος / תורה semantic field
  rationale: '''Ley'' es el equivalente más estable y fiel para ḥig/nomos en este contexto, y conserva el carácter normativo del texto.'
- source_word: ወስምዕ፡
  english_pob_choice: and testimony
  chosen_spanish: y testimonio
  alternatives_spanish:
  - y testificación
  - y evidencia
  lexicon: עֵדוּת / testimony
  rationale: '''Testimonio'' reproduce el valor jurídico-covenantal del término mejor que opciones más abstractas o modernas; además encaja con el par ''ley y testimonio'' ya asentado en la tradición bíblica.'
- source_word: ተውህበ፡
  english_pob_choice: was given
  chosen_spanish: fue dada
  alternatives_spanish:
  - le fue dada
  - se dio
  lexicon: passive verbal form
  rationale: El pasivo simple conserva la voz del original sin añadir agente explícito, y funciona naturalmente en español.
- source_word: ለደቂቀ፡ እስራኤል፡
  english_pob_choice: to the children of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - al pueblo de Israel
  lexicon: collective covenant designation
  rationale: Se mantiene la designación bíblica directa del grupo destinatario. 'Hijos de Israel' es más transparente que sustituirlo por una expresión interpretativa.
- source_word: ሕገ፡" ዘለዓለም፡
  english_pob_choice: an everlasting law
  chosen_spanish: ley perpetua
  alternatives_spanish:
  - ley eterna
  - ley para siempre
  lexicon: עוֹלָם / everlasting
  rationale: '''Perpetua'' expresa continuidad duradera sin cargar el español con la posible ambigüedad metafísica de ''eterna''; preserva el valor jurídico de la fórmula.'
- source_word: ለ*ትውልዶሙ።
  english_pob_choice: throughout their generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a lo largo de sus generaciones
  - para sus generaciones
  lexicon: דור / generations
  rationale: '''Por todas sus generaciones'' refleja de manera idiomática la extensión transgeneracional del mandato sin perder el plural posesivo del original.'
theological_decisions:
- issue: Relación entre gloria y la ley/testimonio
  english_pob_reading: and for glory above all days. This law and testimony was given ...
  chosen_spanish_reading: y para gloria sobre todos los días. Esta ley y testimonio fue dada ...
  alternative_spanish_readings:
  - y gloria sobre todos los días
  - y para alabanza sobre todos los días
  rationale: Se conserva la conexión final entre la gloria y el contenido legal del pasaje, evitando convertir la frase en una simple coordinación. Esto mantiene la tensión poética del original sin diluir la prioridad retórica de la gloria.
  doctrine_reference: Doxología bíblica y lenguaje de la alianza
- issue: Carácter normativo permanente del texto
  english_pob_reading: an everlasting law throughout their generations
  chosen_spanish_reading: ley perpetua por todas sus generaciones
  alternative_spanish_readings:
  - ley eterna por todas sus generaciones
  - ley para siempre por todas sus generaciones
  rationale: '''Perpetua'' preserva el alcance duradero y convencional de la fórmula legal-covenantal sin forzar una definición filosófica de eternidad; la frase sigue afirmando vigencia continua a través de las generaciones.'
  doctrine_reference: Permanencia del pacto y normatividad de la instrucción divina
translation_notes:
  revision_awareness: The English POB revision pass only changed 'and glory' to 'and for glory' to better reflect the prefixed preposition in the source. The Spanish draft reflects that prepositional relation with 'para gloria' and otherwise follows the established English audit reading closely while remaining grounded in the Geez source.
  spanish_consistency_notes:
  - Conservo 'ley y testimonio' como par fijo y transparente.
  - Uso 'Yahvé' no es necesario aquí porque el pasaje no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - Mantengo 'hijos de Israel' por fidelidad al designante colectivo del original.
  - '''Perpetua'' se eligió para reproducir el matiz legal de continuidad duradera sin añadir una carga doctrinal ajena al contexto.'
