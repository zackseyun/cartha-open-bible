base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/010.yaml
  text: And it separates between light and darkness[10], and for prosperity, so that everything that sprouts and grows on the earth may prosper. These three kinds he made on the fourth day.
  footnotes:
  - marker: '10'
    text: The clause rendered 'for prosperity' may also be understood as 'for healing' or 'for making flourish,' referring to the beneficial effect of the heavenly lights on earthly growth.
    reason: lexical_alternative
  - marker: a
    text: Or 'between the midst of the light and the midst of the darkness'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:22Z'
    unchanged: false
    changes_summary: Restored omitted elements about separating between the midst of light and the midst of darkness; retained the prosperity clause; adjusted 'shoots' to 'sprouts' for more natural English while preserving sense.
translation:
  language: es
  text: Y separa la luz de la oscuridad, y para prosperidad[a], para que todo lo que brota y crece sobre la tierra prospere. Estas tres clases hizo en el cuarto día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula puede entenderse también como «para sanar» o «para hacer florecer», aludiendo al efecto benéfico de los astros sobre el crecimiento en la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይፈሊጥ / separates between
  english_pob_choice: And it separates between light and darkness
  chosen_spanish: Y separa entre la luz y la oscuridad
  alternatives_spanish:
  - Y separa entre la luz y la tiniebla
  - Y distingue entre la luz y la oscuridad
  lexicon: separar / distinguir
  rationale: El Ge'ez expresa una separación relacional entre dos ámbitos; en español, 'separa entre' conserva la estructura y el sentido, mientras 'distingue' sería una alternativa válida pero algo más interpretativa.
- source_word: ማእከለ፡ ብርሃን፡ ወማእከለ፡ ጽልመት፡
  english_pob_choice: between light and darkness
  chosen_spanish: entre la luz y la oscuridad
  alternatives_spanish:
  - entre la luz y la tiniebla
  - entre la mitad de la luz y la mitad de la oscuridad
  lexicon: entre / luz / oscuridad
  rationale: La revisión inglesa descartó la redacción demasiado literal 'between the midst of...'; en español, 'entre la luz y la oscuridad' es natural y fiel al giro idiomático.
- source_word: ወለ*ጠዐዮ፡
  english_pob_choice: and for prosperity
  chosen_spanish: y para prosperidad
  alternatives_spanish:
  - y para bienestar
  - y para que prospere
  - y para hacer florecer
  lexicon: prosperidad / prosperar
  rationale: La POB inglesa dejó abierta la posibilidad de 'healing' o 'making flourish' en nota. 'Prosperidad' conserva la amplitud de beneficio general sin escoger prematuramente una sola concreción.
- source_word: ዘይሠርፅ፡ ወይለቍፅ፡
  english_pob_choice: everything that sprouts and grows
  chosen_spanish: todo lo que brota y crece
  alternatives_spanish:
  - todo lo que germina y crece
  - todo lo que retoña y crece
  lexicon: brotar / crecer
  rationale: '''Brota'' traduce bien la imagen vegetal inicial y ''crece'' mantiene el progreso del crecimiento sobre la tierra. ''Germina'' sería posible, pero menos cercano a la imagen de brote visible.'
- source_word: ሠለስተ፡ ዘንተ፡ ዘመደ፡
  english_pob_choice: These three kinds
  chosen_spanish: Estas tres cosas
  alternatives_spanish:
  - Estos tres seres
  - Estas tres especies
  lexicon: tres cosas / tres especies
  rationale: '''Kinds'' en la POB inglesa no exige taxonomía técnica en español; ''estas tres cosas'' es claro y evita una lectura más específica de la que el contexto garantiza.'
- source_word: በዕለት፡ ራብዕት።
  english_pob_choice: on the fourth day
  chosen_spanish: en el cuarto día
  alternatives_spanish:
  - el cuarto día
  - el día cuarto
  lexicon: cuarto día
  rationale: Forma temporal directa y natural en español, fiel al original.
theological_decisions:
- issue: La cláusula sobre la función benéfica de los cuerpos celestes puede leerse como prosperidad general o como sanidad/florecimiento
  english_pob_reading: and for prosperity, so that everything that sprouts and grows on the earth may prosper
  chosen_spanish_reading: y para prosperidad, para que todo lo que brota y crece sobre la tierra prospere
  alternative_spanish_readings:
  - y para sanidad, para que todo lo que brota y crece sobre la tierra prospere
  - y para hacer florecer, para que todo lo que brota y crece sobre la tierra prospere
  rationale: La evidencia inglesa conserva una nota de ambigüedad lexical ('healing' / 'making flourish'). 'Prosperidad' es suficientemente amplia en español y no borra la posible referencia a beneficio curativo o vitalizante; se deja constancia en nota.
  doctrine_reference: Lexical ambiguity in the source; no doctrinal claim beyond the text's beneficial effect.
- issue: La separación entre luz y oscuridad puede expresarse como distinción o separación
  english_pob_reading: it separates between light and darkness
  chosen_spanish_reading: separa entre la luz y la oscuridad
  alternative_spanish_readings:
  - distingue entre la luz y la oscuridad
  - separa la luz de la oscuridad
  rationale: Se preserva la imagen de acto ordenador del Creador sin introducir una explicación teológica adicional. La formulación evita suavizar la acción creativa descrita en el texto.
  doctrine_reference: Creation order / divine ordering of cosmos
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que restauró la idea de separación entre luz y oscuridad y la cláusula de prosperidad, y la observación posterior de que el giro ge'ez es un modismo equivalente a 'between light and darkness'; por eso evité una traducción demasiado literal de 'en medio de'. También mantuve 'sprouts and grows' como 'brota y crece' para conservar la progresión vegetal sin forzar el español.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca aquí un lexema divino explícito, sino para mantener la terminología POB general cuando corresponda; en este versículo no se necesitó.
  - Se prefirió 'prosperidad' como sustantivo amplio para no eliminar la nota lexical documentada en inglés.
  - No se introdujo 'Cristo', 'SEÑOR' ni vocabulario eclesiástico no atestiguado por el texto.
