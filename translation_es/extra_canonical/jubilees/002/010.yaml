- from: Y separa entre la luz y la oscuridad[a], y para prosperidad[b], para que todo lo que brota y crece sobre la tierra prospere. Estas tres cosas las hizo en el cuarto día.
  to: Y separa la luz de la oscuridad, y para prosperidad[a], para que todo lo que brota y crece sobre la tierra prospere. Estas tres clases hizo en el cuarto día.
