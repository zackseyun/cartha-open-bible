    unchanged: false
    changes_summary: Changed 'made' to 'did' for more natural rendering of the repeated verb while preserving meaning; added 'This' at the start for a complete, natural English clause.
translation:
  language: es
  text: Esta fue la obra que hizo el segundo día. Y en el tercer día mandó que las aguas se apartaran de delante de la faz de toda la tierra a un solo lugar, y que apareciera la tierra seca.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que las aguas se apartaran de delante de la faz de toda la tierra a un solo lugar, y apareciera la tierra seca»'
    reason: Preserva la nota alternativa del POB inglés sobre la sintaxis del segundo infinitivo/subjuntivo en el mandato.
lexical_decisions:
- source_word: ገብረ፡ ገብረ፡
  english_pob_choice: This was the work that he did
  chosen_spanish: Este fue el trabajo que hizo
  alternatives_spanish:
  - Este fue el trabajo que hizo
  - Este fue la obra que realizó
  lexicon: (no lexicon entry number provided in source packet)
  rationale: La repetición del verbo en ge'ez expresa simplemente la ejecución de la obra; en español, 'hizo' conserva la fuerza verbal natural y evita calco. 'Trabajo' mantiene la referencia a la obra creativa descrita en el contexto.
- source_word: በሳኒታ፡ ዕለት
  english_pob_choice: on the second day
  chosen_spanish: en el segundo día
  alternatives_spanish:
  - en el segundo día
  - el segundo día
  lexicon: (no lexicon entry number provided in source packet)
  rationale: La preposición 'en' reproduce el valor temporal de la expresión sin añadir nada.
- source_word: ወ*በሣልስት፡ ዕለት
  english_pob_choice: And on the third day
  chosen_spanish: Y en el tercer día
  alternatives_spanish:
  - Y en el tercer día
  - Y al tercer día
  lexicon: (no lexicon entry number provided in source packet)
  rationale: '''Y en el tercer día'' sigue de cerca la secuencia temporal del original. ''Al tercer día'' sería idiomático, pero ''en'' conserva mejor la estructura del source packet.'
- source_word: ይኅለፉ
  english_pob_choice: he commanded the waters to pass away
  chosen_spanish: mandó que las aguas se apartaran
  alternatives_spanish:
  - mandó que las aguas se apartaran
  - ordenó que las aguas se retiraran
  lexicon: (no lexicon entry number provided in source packet)
  rationale: El verbo expresa una orden eficaz sobre las aguas; 'se apartaran' comunica bien el alejamiento físico sin introducir una lectura demasiado interpretativa. 'Mandó' corresponde al comando divino en el inglés POB.
- source_word: እምቅድመ፡ ገጸ፡ ለኵላ፡ ምድር
  english_pob_choice: from before the face of the whole earth
  chosen_spanish: de delante de la faz de toda la tierra
  alternatives_spanish:
  - de delante de la faz de toda la tierra
  - de la presencia de toda la tierra
  lexicon: (no lexicon entry number provided in source packet)
  rationale: '''De delante de la faz'' conserva la fórmula semítica del original y del audit trail inglés. ''Presencia'' suaviza la imagen, pero pierde el relieve literal de la expresión.'
- source_word: ውስተ፡ መካን፡ አሐዱ
  english_pob_choice: into one place
  chosen_spanish: a un solo lugar
  alternatives_spanish:
  - a un solo lugar
  - en un solo lugar
  lexicon: (no lexicon entry number provided in source packet)
  rationale: '''A un solo lugar'' reproduce la idea de destino/movimiento hacia un único sitio, como en el inglés POB.'
- source_word: ወያስተርኢ፡ የብስ
  english_pob_choice: and the dry land to appear
  chosen_spanish: y que apareciera la tierra seca
  alternatives_spanish:
  - y que apareciera la tierra seca
  - y que se viera la tierra seca
  lexicon: (no lexicon entry number provided in source packet)
  rationale: '''Apareciera'' mantiene el paralelismo subordinado con ''mandó que...''; ''tierra seca'' traduce ''dry land'' de manera natural y precisa. ''Se viera'' sería más perifrástico y menos directo.'
theological_decisions:
- issue: Modo de expresar la orden divina sobre las aguas y la tierra seca
  english_pob_reading: he commanded the waters to pass away ... and the dry land to appear
  chosen_spanish_reading: mandó que las aguas se apartaran ... y que apareciera la tierra seca
  alternative_spanish_readings:
  - ordenó que las aguas se retiraran ... y que apareciera la tierra seca
  - mandó a las aguas que se apartaran ... y que apareciera la tierra seca
  rationale: El texto describe un acto soberano de Dios sobre la creación. La construcción con 'mandó que' conserva la agencia divina sin añadir sujetos innecesarios ni resolver indebidamente la fuerza del mandato.
  doctrine_reference: Génesis 1:9-10; creación por mandato divino
translation_notes:
  revision_awareness: 'La revisión inglesa reciente sustituyó ''made'' por ''did'' y ajustó la coordinación final a una paralela infinitiva (''and the dry land to appear''). El español sigue esa versión revisada con una cláusula natural y paralela: ''mandó que las aguas se apartaran ... y que apareciera la tierra seca.'' No se requieren notas de variante textual para este versículo.'
  spanish_consistency_notes:
  - Se usa 'tierra seca' para 'dry land', en coherencia con el registro bíblico y sin oscurecer el contraste con las aguas.
  - Se mantiene el orden temporal 'en el segundo día / en el tercer día' para reflejar la secuencia del pasaje.
  - No se emplea 'SEÑOR' ni terminología cristológica, pues el pasaje no contiene esos elementos.
