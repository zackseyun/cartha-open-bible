  text: This was the work that he did on the second day. And on the third day he commanded the waters to pass away from before the face of the whole earth into one place, and the dry land to appear.
  footnotes:
  - marker: a
    text: Or 'to pass away from before the face of the whole earth into one place, and let the dry land appear.'.
    reason: previous_rendering
  revision_pass:
