  to: 'Y el ángel de la presencia dijo a Moisés por la palabra de Yahvé, diciendo: «Escribe todo el relato de la creación: cómo en seis días Yahvé Dios terminó todas sus obras y todo lo que creó, y descansó el séptimo día, y lo santificó para todas las edades, y lo estableció como señal para todos[a]».'
