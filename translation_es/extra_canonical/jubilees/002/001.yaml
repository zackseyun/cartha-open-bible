base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/001.yaml
  text: 'And the angel of the presence said to Moses by the word of the LORD, saying, "Write the whole account of creation: how in six days the LORD God finished all his works and all that he created, and he rested on the seventh day and sanctified it for all ages, and appointed it as a sign for all."'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:12Z'
    unchanged: false
    changes_summary: Changed 'all the account' to 'the whole account' for natural English, and shortened the final phrase from 'for all his works' to 'for all' to better match the source's concluding universal expression.
translation:
  language: es
  text: 'Y el ángel de la presencia dijo a Moisés por la palabra de Yahvé, diciendo: «Escribe todo el relato de la creación: cómo en seis días Yahvé Dios terminó todas sus obras y todo lo que creó, y descansó el séptimo día, y lo santificó para todas las edades, y lo estableció como señal para todos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Para todos» traduce el cierre universal del texto; puede entenderse también como «para todas las cosas» o, en una lectura más interpretativa, «para todas sus obras», pero la fuente y la revisión inglesa favorecen la universalidad simple.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγελος/"angel of the presence"
  english_pob_choice: angel of the presence
  chosen_spanish: ángel de la presencia
  alternatives_spanish:
  - ángel de su presencia
  - ángel de la faz
  lexicon: No aplica
  rationale: Mantengo la designación técnica establecida por la tradición del libro y por el POB en inglés. «De la presencia» suena natural en español y conserva el valor titular sin explicar ni suavizar el término.
- source_word: בְּדְבַר יְהוָה / "by the word of the LORD"
  english_pob_choice: by the word of the LORD
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por mandato de Yahvé
  - según la palabra de Yahvé
  lexicon: No aplica
  rationale: «Palabra de Yahvé» reproduce la mediación verbal indicada por el ge'ez y el audit trail inglés. Se evita «SEÑOR» porque el proyecto exige usar «Yahvé» para el nombre divino.
- source_word: כָּל סֵפֶר / "the whole account of creation"
  english_pob_choice: the whole account of creation
  chosen_spanish: todo el relato de la creación
  alternatives_spanish:
  - todo el registro de la creación
  - la totalidad del relato de la creación
  lexicon: No aplica
  rationale: «Relato» expresa bien la idea de una narración completa; «todo» preserva el alcance total que el inglés revisado reforzó con «the whole».
- source_word: '"in six days"'
  english_pob_choice: in six days
  chosen_spanish: en seis días
  alternatives_spanish:
  - durante seis días
  lexicon: No aplica
  rationale: Correspondencia directa y natural. El ge'ez y el inglés coinciden en la duración de seis días.
- source_word: finished all his works and all that he created
  english_pob_choice: finished all his works and all that he created
  chosen_spanish: terminó todas sus obras y todo lo que había creado
  alternatives_spanish:
  - acabó todas sus obras y todo lo que había creado
  - concluyó todas sus obras y todo lo que había creado
  lexicon: No aplica
  rationale: «Terminó» conserva el sentido completo sin elevar el registro innecesariamente. «Obras» traduce el paralelismo de los actos creados; «todo lo que había creado» refleja el carácter global del cierre.
- source_word: '"rested on the seventh day"'
  english_pob_choice: he rested on the seventh day
  chosen_spanish: descansó en el séptimo día
  alternatives_spanish:
  - reposó en el séptimo día
  lexicon: No aplica
  rationale: «Descansó» es claro y fiel; «reposó» sería posible, pero «descansó» es más transparente para lectores contemporáneos y mantiene la equivalencia del inglés.
- source_word: '"sanctified it for all ages"'
  english_pob_choice: sanctified it for all ages
  chosen_spanish: lo santificó para todas las edades
  alternatives_spanish:
  - lo santificó para siempre
  - lo consagró para todas las edades
  lexicon: No aplica
  rationale: Conservo «santificó» por la carga bíblica tradicional del verbo. «Para todas las edades» refleja el alcance temporal universal del original y del inglés POB.
- source_word: '"appointed it as a sign for all"'
  english_pob_choice: appointed it as a sign for all
  chosen_spanish: lo estableció como señal para todos
  alternatives_spanish:
  - lo designó como señal para todos
  - lo puso como señal para todos
  lexicon: No aplica
  rationale: «Estableció» comunica bien el acto de instituir o fijar algo con valor normativo. «Señal» reproduce el sustantivo del original sin introducir una interpretación adicional.
theological_decisions:
- issue: Nombre divino en un texto de tradición no bíblica canónica
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El proyecto establece «Yahvé» como forma principal para el nombre divino. Aunque el inglés audit trail usa «LORD», aquí el dato de fondo apunta al tetragrámaton y no a un simple título, por lo que se evita el enmascaramiento litúrgico.
  doctrine_reference: Éxodo 3:15; convención editorial del POB en español
- issue: El séptimo día como día santificado y señal universal
  english_pob_reading: he rested on the seventh day and sanctified it for all ages, and appointed it as a sign for all
  chosen_spanish_reading: descansó en el séptimo día, y lo santificó para todas las edades, y lo estableció como señal para todos
  alternative_spanish_readings:
  - reposó...
  - lo consagró...
  - señal para todas las generaciones
  rationale: La formulación conserva tanto el descanso divino como la institución del día con valor perdurable y universal. Se mantiene el alcance amplio de «para todos» porque el texto final revisado del inglés también lo universaliza.
  doctrine_reference: Génesis 2:2-3; Éxodo 31:13
translation_notes:
  revision_awareness: 'La redacción sigue la versión inglesa revisada que prefirió «the whole account» y cerró con «for all». En español se reflejó esa universalidad con «todo el relato» y «para todos», manteniendo la secuencia narrativa del original ge''ez: mandato de escribir, creación en seis días, culminación, descanso, santificación e institución como señal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para el nombre divino, conforme al estándar del proyecto.
  - Se conserva «ángel de la presencia» como término técnico fijo.
  - «Santificó» y «señal» mantienen el lenguaje bíblico tradicional sin añadir glosa interpretativa.
  - La puntuación española usa dos puntos antes de la cita directa y comillas angulares, de acuerdo con el uso editorial en español.
