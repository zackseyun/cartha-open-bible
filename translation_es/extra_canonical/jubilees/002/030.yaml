  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ''sábado'', ''carne'' y ''cielos'' están bien orientados. La principal desalineación es léxica con el propio POB auditado: debe mantenerse ''día de jubileo de jubileos'' o equivalente cercano, no reducirse a ''día de jubileos''.'
