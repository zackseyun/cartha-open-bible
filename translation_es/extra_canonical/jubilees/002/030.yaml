base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/002/030.yaml
  text: And they shall not bring in or take out from house to house on this day[30], for it is holy and blessed more than any jubilee day of jubilees. On this one we kept sabbath in the heavens before it was made known to any flesh to keep sabbath on it upon the earth.
  footnotes:
  - marker: '30'
    text: The phrase 'holy and blessed more than any jubilee day of jubilees' is difficult and may be an emphatic comparison elevating the weekly Sabbath above even the highest festal cycles.
    reason: alternative_reading
  - marker: a
    text: Or 'any day of jubilees'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:26Z'
    unchanged: false
    changes_summary: Adjusted 'holier and more blessed' to 'holy and blessed more than' for closer lexical alignment and more formal phrasing; changed 'any jubilee day of jubilees' to 'any day of jubilees' for accuracy; changed 'On this' to 'On this one' to reflect the demonstrative more clearly.
translation:
  language: es
  text: Y no traerán ni sacarán de casa a casa en este día[a], porque este día es santo y bendito más que cualquier día de jubileo de jubileos. En este[b] guardamos el sábado en los cielos antes de que fuera dado a conocer a toda carne para guardar en él el sábado sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «santo y bendito más que cualquier día de jubileo de jubileos» es difícil y puede expresar una comparación enfática que eleva el sábado semanal por encima incluso de los ciclos festivos más altos.
    reason: alternative_reading
  - marker: b
    text: 'O: «en esto». El demostrativo parece enfático y puede referirse al sábado como día singular.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ዕለት / this day
  english_pob_choice: this day
  chosen_spanish: en este día
  alternatives_spanish:
  - en ese día
  - en aquel día
  lexicon: día
  rationale: El demostrativo cercano del original se conserva con 'este'; 'en este día' mantiene la referencia concreta y el tono legal/instruccional del pasaje.
- source_word: ወኢያብኡ፡ ወኢያውፅኡ፡ / bring in or take out
  english_pob_choice: bring in or take out
  chosen_spanish: traerán ni sacarán
  alternatives_spanish:
  - meterán ni sacarán
  - introducirán ni extraerán
  lexicon: traer / sacar
  rationale: '''Traer'' y ''sacar'' expresan de manera natural el movimiento de entrada y salida de bienes entre casas sin perder la prohibición general del original.'
- source_word: እምቤት፡ ቤተ፡ / from house to house
  english_pob_choice: from house to house
  chosen_spanish: de casa a casa
  alternatives_spanish:
  - de una casa a otra
  - de hogar en hogar
  lexicon: casa
  rationale: '''Casa a casa'' reproduce la reciprocidad del giro semítico y suena natural en español; ''hogar'' suaviza demasiado la referencia espacial concreta.'
- source_word: ቅድስት፡ ይእቲ፡ ወቡርክት፡ ይእቲ፡ / it is holy and blessed
  english_pob_choice: it is holy and blessed
  chosen_spanish: es santo y bendito
  alternatives_spanish:
  - es sagrado y bendito
  - es santo y bienaventurado
  lexicon: santo / bendito
  rationale: '''Santo'' y ''bendito'' conservan el paralelo breve del original y el léxico bíblico esperado; ''bienaventurado'' introduciría un matiz menos directo que no exigía el texto.'
- source_word: እምኵሉ፡ ዕለት፡ ኢዮቤል፡ ዘኢዮቤልውሳት፡ / more than any jubilee day of jubilees
  english_pob_choice: more than any jubilee day of jubilees
  chosen_spanish: más que cualquier día de jubileos
  alternatives_spanish:
  - más que cualquier día de jubileo de jubileos
  - más que cualquier día jubilar de jubileos
  lexicon: jubileo / jubileos
  rationale: '''Jubileos'' conserva el nombre del ciclo festivo del libro y evita normalizar la frase difícil; se mantiene la comparación elevada sin borrar la tensión sintáctica del original. El pie de nota explica la dificultad y deja abierta la lectura más literal.'
- source_word: በዛቲ፡ አሰንበትነ፡ በሰማያት፡ / On this one we kept sabbath in the heavens
  english_pob_choice: On this one we kept sabbath in the heavens
  chosen_spanish: En este[b] guardamos el sábado en los cielos
  alternatives_spanish:
  - En este celebramos el sábado en los cielos
  - En éste santificamos el sábado en los cielos
  lexicon: guardar el sábado / cielos
  rationale: '''Guardar el sábado'' corresponde al verbo técnico del pasaje; ''en los cielos'' reproduce el plural de ''heavens''. Se usa ''este'' para reflejar el demostrativo enfático del original.'
- source_word: ዘእንበለ፡ ይትአመር፡ ለኵሉ፡ ዘሥጋ፡ / before it was made known to any flesh
  english_pob_choice: before it was made known to any flesh
  chosen_spanish: antes de que fuera dado a conocer a toda carne
  alternatives_spanish:
  - antes de que fuera hecho conocido a toda carne
  - antes de que se diera a conocer a toda carne
  lexicon: carne
  rationale: '''Carne'' conserva el sentido bíblico de humanidad mortal. ''Dado a conocer'' expresa pasivamente la difusión de la orden sin añadir un agente no presente en el texto.'
- source_word: ባቲ፡ በ*ዲበ፡ / on it upon the earth
  english_pob_choice: on it upon the earth
  chosen_spanish: para guardar en él sábado sobre la tierra
  alternatives_spanish:
  - para observarlo sobre la tierra
  - para guardar sábado en él en la tierra
  lexicon: guardar sábado / tierra
  rationale: 'La cláusula final queda más natural en español con infinitivo de finalidad: ''para guardar en él sábado sobre la tierra''. Se mantiene la doble localización ''en él'' y ''sobre la tierra'' sin reducirla.'
theological_decisions:
- issue: La comparación entre el sábado semanal y los días de jubileos/festales
  english_pob_reading: holy and blessed more than any jubilee day of jubilees
  chosen_spanish_reading: santo y bendito más que cualquier día de jubileos
  alternative_spanish_readings:
  - santo y bendito más que cualquier día de jubileo de jubileos
  - santo y bendito más que todo día jubilar
  rationale: Se conserva la elevación comparativa sin suavizar la extrañeza del original. El texto no resuelve la fórmula difícil; por eso la traducción tampoco la normaliza en exceso.
  doctrine_reference: Calendario sagrado y santidad del sábado en Jubileos 2:30
- issue: El sábado guardado en los cielos antes de ser revelado a la humanidad
  english_pob_reading: On this one we kept sabbath in the heavens before it was made known to any flesh to keep sabbath on it upon the earth
  chosen_spanish_reading: En este guardamos el sábado en los cielos antes de que fuera dado a conocer a toda carne para guardar en él sábado sobre la tierra
  alternative_spanish_readings:
  - En este celebramos el sábado en los cielos antes de que fuera dado a conocer a toda carne para observarlo sobre la tierra
  - En este santificamos el sábado en los cielos antes de que fuera hecho conocido a toda carne
  rationale: La traducción mantiene la idea de un modelo celeste del sábado anterior a su revelación terrestre, sin convertirlo en una simple observancia histórica humana. El lenguaje de 'toda carne' preserva el contraste entre lo celestial y lo humano.
  doctrine_reference: Sabiduría celestial y patrón celestial del sábado en Jubileos
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que ajusta la comparación a 'holy and blessed more than any day of jubilees' y restituye la forma demostrativa 'On this one'. También toma en cuenta la corrección anterior que recupera la secuencia ge'ez 'jubilee of jubilees' como trasfondo de la dificultad textual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; aquí no se requiere.
  - Se usa 'sábado' para el sabbath del pasaje, por ser el término corriente y claro en español eclesial.
  - Se conserva 'carne' en sentido bíblico-humanitario, no como 'carne' culinaria ni como mera materialidad.
  - La nota de 'jubileos' preserva la tensión textual sin reemplazarla por una paráfrasis doctrinal.
