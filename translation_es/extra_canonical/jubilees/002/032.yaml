translation:
  language: es
  text: sobre ello, sobre la tierra. Y el Creador de todo lo bendijo, el que creó este día para bendición y santidad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ባቲ፡ በ'ዲበ፡ ምድር
  english_pob_choice: on it upon the earth
  chosen_spanish: sobre ello, sobre la tierra
  alternatives_spanish:
  - en ello, sobre la tierra
  - sobre eso, en la tierra
  lexicon: Ge'ez prepositional phrasing; no lexicon entry number provided in source packet
  rationale: 'La secuencia inicial es locativa y redundante en el original, por lo que conservo la duplicación en español con un giro natural: ‘sobre ello, sobre la tierra’. Evita borrar el doble valor preposicional que el texto presenta.'
- source_word: ፈጣሪ ኵሉ
  english_pob_choice: the Creator of all
  chosen_spanish: el Creador de todo
  alternatives_spanish:
  - el Creador de todas las cosas
  - el Creador de todo cuanto existe
  lexicon: Ge'ez participial title for divine creator; no lexicon entry number provided in source packet
  rationale: ‘De todo’ reproduce bien el genitivo totalizador del original y mantiene la fórmula breve del POB inglés sin añadir expansión interpretativa innecesaria.
- source_word: ዘፈጠረ
  english_pob_choice: he who created
  chosen_spanish: el que creó
  alternatives_spanish:
  - el que había creado
  - el que ha creado
  lexicon: Relative clause with perfective verb; no lexicon entry number provided in source packet
  rationale: El relativo explica al Creador como aquel que creó este día. ‘El que creó’ es la forma más directa y fiel en español; no introduzco un pluscuamperfecto que el ge'ez no exige claramente.
- source_word: ዛተ ዕለተ
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - aquel día
  - ese día
  lexicon: Temporal demonstrative; no lexicon entry number provided in source packet
  rationale: ‘Este día’ sigue la deixis del original y se ajusta al habla bíblica en español sin volverlo arcaico.
- source_word: ለበረከት፡ ወለቅድሳት፡
  english_pob_choice: for blessing and holiness
  chosen_spanish: para bendición y santidad
  alternatives_spanish:
  - para bendición y santificación
  - para ser bendición y santidad
  lexicon: Abstract noun pair; no lexicon entry number provided in source packet
  rationale: ‘Bendición y santidad’ conserva el paralelismo nominal del original. ‘Santidad’ es la equivalencia natural de ‘holiness’; ‘santificación’ desplazaría el énfasis hacia el proceso, que el texto no explicita.
theological_decisions:
- issue: El sujeto divino se presenta como ‘el Creador de todo’ sin sustituirlo por una fórmula litúrgica tradicional
  english_pob_reading: the Creator of all
  chosen_spanish_reading: el Creador de todo
  alternative_spanish_readings:
  - el Creador de todas las cosas
  - el Creador de todo cuanto existe
  rationale: El texto atribuye directamente la bendición al Creador universal. Mantengo la designación descriptiva sin convertirla en un título eclesiástico más elaborado.
  doctrine_reference: Creación y bendición divina en lenguaje doxológico; no hay variante doctrinal que exija armonización
- issue: La cláusula relativa mantiene que el día fue creado ‘para bendición y santidad’
  english_pob_reading: this day that he had created for blessing and holiness
  chosen_spanish_reading: este día para bendición y santidad
  alternative_spanish_readings:
  - este día, que había creado para bendición y santidad
  - este día, creado para bendición y santidad
  rationale: Conservo la finalidad explícita del día en el original. La redacción evita forzar una relación temporal o aspectual mayor que la evidenciada por el ge'ez, pero mantiene intacta la idea teológica de un día ordenado para bendición y santidad.
  doctrine_reference: Tiempo sagrado / día consagrado; no se añade desarrollo posterior ajeno al versículo
translation_notes:
  revision_awareness: The English audit trail shows a corrective revision restoring the opening phrase omitted by an earlier draft and clarifying that the Creator blessed the day he had created. The Spanish draft reflects the corrected source order and preserves the relative-clause sense without overcommitting to an English-style tense shift.
  spanish_consistency_notes:
  - Uso ‘Creador de todo’ para mantener la fórmula totalizante y evitar introducir mayúsculas o perífrasis no justificadas.
  - Mantengo ‘bendición y santidad’ como pareja nominal para respetar el paralelismo del original.
  - No empleo ‘SEÑOR’ ni ‘Cristo’; el pasaje no contiene esos términos.
  - La apertura ‘sobre ello, sobre la tierra’ conserva la redundancia locativa del ge'ez sin añadir contenido nuevo.
