translation:
  language: es
  text: Y en el quinto día creó los grandes monstruos marinos en las profundidades de las aguas, porque estos fueron los primeros seres de carne hechos por sus manos, y todo ser que se mueve en las aguas, y todo lo que vuela—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኃምስት / fifth day
  english_pob_choice: the fifth day
  chosen_spanish: el quinto día
  alternatives_spanish:
  - en el quinto día
  - al quinto día
  lexicon: no entry number
  rationale: Mantiene la relación temporal directa del relato y suena natural en español bíblico contemporáneo.
- source_word: አናብርት / great sea monsters
  english_pob_choice: the great sea monsters
  chosen_spanish: los grandes monstruos marinos
  alternatives_spanish:
  - los grandes monstruos del mar
  - los grandes seres marinos
  lexicon: no entry number
  rationale: Conserva el valor intensificado de 'grandes' y el referente acuático de la criatura, sin forzar un término técnico más estrecho de lo que permite el contexto.
- source_word: ቀላያተ፡ ማያት / depths of the waters
  english_pob_choice: the depths of the waters
  chosen_spanish: las profundidades de las aguas
  alternatives_spanish:
  - el fondo de las aguas
  - las honduras de las aguas
  lexicon: no entry number
  rationale: Reproduce la imagen de profundidad plural del original y del inglés POB, con una formulación idiomática en español.
- source_word: ዘሥጋ / fleshly beings
  english_pob_choice: fleshly beings
  chosen_spanish: seres de carne
  alternatives_spanish:
  - criaturas de carne
  - seres carnales
  lexicon: no entry number
  rationale: '''Seres de carne'' preserva la tensión del hebraísmo/semantismo de carne frente a una simplificación doctrinal como ''seres mortales'' o ''animales''. ''Carnales'' se evitó por su carga moral en español.'
- source_word: ወኵሎ ዘይትነወስ / every moving thing that moves
  english_pob_choice: every moving thing that moves
  chosen_spanish: todo ser que se mueve
  alternatives_spanish:
  - toda cosa que se mueve
  - todo ser viviente que se mueve
  lexicon: no entry number
  rationale: Condensa la repetición semítica sin perder el sentido de movimiento, y evita una redundancia rígida en español.
- source_word: ውስተ፡ ማያት / in the waters
  english_pob_choice: in the waters
  chosen_spanish: en las aguas
  alternatives_spanish:
  - dentro de las aguas
  - en el agua
  lexicon: no entry number
  rationale: El plural 'aguas' mantiene mejor el registro poético y la correspondencia con el griego/semítico de entorno acuático.
- source_word: ወኵሎ ዘይሰርር / everything that flies
  english_pob_choice: everything that flies
  chosen_spanish: todo lo que vuela
  alternatives_spanish:
  - toda ave
  - todo ser alado
  lexicon: no entry number
  rationale: Se mantiene la amplitud del original sin limitarlo a aves, ya que el texto usa una expresión general.
theological_decisions:
- issue: Creación de los seres marinos y su lugar entre las primeras criaturas de carne
  english_pob_reading: for these were the first fleshly beings made by his hands
  chosen_spanish_reading: porque estos fueron los primeros seres de carne hechos por sus manos
  alternative_spanish_readings:
  - porque estos fueron los primeros seres carnales hechos por sus manos
  - pues estos fueron los primeros seres de carne que hizo con sus manos
  rationale: Se preserva la afirmación de prioridad creadora y la expresión de agencia divina 'por sus manos' sin suavizarla. 'Seres de carne' conserva la tensión antropológica/creacional del original.
  doctrine_reference: Génesis 1:20-21; Jubileos 2:11
- issue: Alcance de 'everything that flies'
  english_pob_reading: and everything that flies
  chosen_spanish_reading: y todo lo que vuela
  alternative_spanish_readings:
  - y toda ave
  - y todo ser alado
  rationale: La formulación amplia evita introducir una identificación exclusiva con aves que el texto no exige en esta línea particular.
  doctrine_reference: Génesis 1:20-21; Jubileos 2:11
translation_notes:
  revision_awareness: La revisión en inglés solo normalizó 'sea-monsters' a 'sea monsters' por naturalidad estilística; no alteró el contenido. El español sigue esa lectura amplia y mantiene la misma semántica sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantuvo 'seres de carne' para conservar la fuerza lexical de σάρξ/équivalente semítico sin convertirlo en un antropologismo moral.
  - Se usó 'grandes monstruos marinos' en línea con el inglés POB revisado, evitando una traducción excesivamente técnica o mitológica.
  - No se añadió puntuación explicativa ni notas al pie porque el verso presenta una única línea narrativa continua y no requiere desambiguación textual adicional.
