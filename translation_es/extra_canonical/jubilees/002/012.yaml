translation:
  language: es
  text: 'las aves y todos sus géneros. Y el sol se levantó sobre ellas para prosperidad[a], y sobre todo lo que estaba sobre la tierra, todo lo que brota de la tierra, y todo árbol frutal, y toda carne. Estas tres clases las hizo en el quinto día. Y en el sexto día hizo todas las bestias de la tierra, y todo el ganado, y todo lo que se mueve sobre la tierra. Y después de todo esto hizo al ser humano; varón y mujer los hizo, y les dio autoridad sobre todo lo que está en la tierra y en los mares, y sobre todo lo que vuela[b], y sobre las bestias y sobre el ganado y sobre todo lo que se mueve sobre la tierra, y sobre toda la tierra. Y sobre todo esto les dio autoridad. Y cuatro clases hizo en el sexto día. Y todas eran veintidós clases. Y terminó toda su obra en el sexto día: todo lo que está en los cielos y en la tierra y en los mares y en las profundidades y en la luz y en la oscuridad y en todo. Y nos dio una gran señal, el día de reposo, para que trabajáramos seis días y descansáramos en
    el séptimo día de toda obra. Y a todos los ángeles de la presencia y a todos los ángeles de la santificación —estas dos grandes clases— nos dijo: «Descansemos con él en el cielo y en la tierra». Y me dijo: «He aquí, separaré para mí un pueblo de entre todos los pueblos, y guardarán el día de reposo, y los santificaré para mí como mi pueblo, y los bendeciré. Como santifiqué el día de reposo, así los santificaré para mí, y así los bendeciré; y ellos serán mi pueblo, y yo seré su Dios. Y he escogido la descendencia de Jacob de entre todo lo que he visto, y lo he inscrito para mí como mi hijo primogénito, y lo he santificado para mí por los siglos de los siglos. Y les daré a conocer el día de reposo, para que en él descansen de toda obra». Y así hizo una señal por la cual debían guardar el día de reposo con nosotros el séptimo día, para comer y beber y bendecir al que creó todas las cosas, así como bendijo y santificó para sí un pueblo en posesión de entre todas las naciones, y para que
    guardaran el día de reposo juntamente con nosotros. Y hizo ascender su voluntad como un aroma agradable, aceptable delante de él todos los días. Hubo veintidós cabezas de la humanidad desde Adán hasta Jacob, y se hicieron veintidós clases de obra hasta el séptimo día. Esto es bendito y santo, y esto también es bendito y santo; y uno y otro fueron para santidad y para bendición. Y a este se le dio que fueran benditos y santos todos los días, según el testimonio y la ley primera, así como fue santificado y bendito en el séptimo día. Él creó el cielo y la tierra y todo lo que creó en seis días, y Dios hizo santo el séptimo día para todas sus obras. Por tanto, acerca de él mandó que todo el que haga en él alguna obra muera, y cualquiera que lo profane ciertamente morirá. Y manda a los hijos de Israel que guarden este día para santificarlo, y para que no hagan en él ninguna obra, y para que no lo profanen, porque es más santo que todos los días. Y todo el que lo profane ciertamente morirá,
    y todo el que haga en él alguna obra ciertamente morirá para siempre, para que los hijos de Israel guarden este día por todas sus generaciones y no sean arrancados de la tierra, porque es un día santo y un día bendito. Y toda persona que lo guarde y descanse en él de toda su obra será santa y bendita por todos los días, como nosotros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘para prosperidad’ traduce aquí la idea de benevolencia o bienestar asociada al verbo ge'ez; el español puede entenderse también como ‘para bendición’ o ‘para bien’.
    reason: lexical_alternative
  - marker: b
    text: La lista del original ge'ez distingue la categoría aérea de las aves y luego añade seres que se mueven sobre la tierra; por eso aquí se mantiene ‘vuela’ para esta categoría, no ‘se arrastra’.
    reason: textual_variant
lexical_decisions:
- source_word: ትእምርተ ዐቢየ ዕለተ ሰንበታት
  english_pob_choice: a great sign, the sabbath day
  chosen_spanish: una gran señal, el día de reposo
  alternatives_spanish:
  - una gran señal, el día de sábado
  - una gran señal, el día de reposo sabático
  lexicon: signo/señal; sábado/reposo
  rationale: La frase ge'ez corresponde a un marcador de institución del sábado. 'Señal' mantiene la función pactal y 'día de reposo' comunica el valor semántico sin reducirlo al nombre calendario 'sábado'.
- source_word: ዘይትዐለም  / ዘይትነወስ
  english_pob_choice: everything that flies / everything that moves upon the earth
  chosen_spanish: todo lo que vuela / todo lo que se mueve sobre la tierra
  alternatives_spanish:
  - todo lo que voltea
  - todo lo que se arrastra sobre la tierra
  lexicon: volar / moverse
  rationale: El contexto lista primero las aves y luego otros seres terrestres; 'vuela' conserva la fuerza de la categoría aérea y 'se mueve sobre la tierra' evita mezclarla con la categoría terrestre posterior.
- source_word: ወወሀበነ፡ ትእምርተ፡ ዐቢየ፡
  english_pob_choice: he gave us a great sign
  chosen_spanish: nos dio una gran señal
  alternatives_spanish:
  - nos dio un gran signo
  - nos dio una gran marca
  lexicon: señal/signo
  rationale: '''Señal'' es la forma más natural en español para un distintivo dado por Dios con valor visible e identificador. Mantiene el sentido de pacto sin introducir tecnicismos innecesarios.'
