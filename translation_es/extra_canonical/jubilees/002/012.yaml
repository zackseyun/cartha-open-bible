theological_decisions:
- issue: Sabbath terminology and sanctification
  english_pob_reading: the sabbath day ... I will sanctify them ... they will be holy and blessed
  chosen_spanish_reading: el día de reposo ... los santificaré ... serán santos y benditos
  alternative_spanish_readings:
  - el sábado ... los consagraré ... serán sagrados y benditos
  - el día sabático ... los haré santos ...
  rationale: Se conserva la red léxica santa/santificar/santo, porque el pasaje une la santidad del día con la santificación del pueblo. 'Día de reposo' evita confundir el mandamiento con un mero nombre calendárico.
  doctrine_reference: Santificación; teología del sábado; elección pactal
- issue: Authority over creation
  english_pob_reading: gave them authority over everything ... in the seas ... and over everything that flies
  chosen_spanish_reading: les dio autoridad sobre todo ... en los mares ... y sobre todo lo que vuela
  alternative_spanish_readings:
  - les dio dominio sobre todo ...
  - les dio señorío sobre todo ...
  rationale: '''Autoridad'' corresponde al lenguaje de encargo y dominio sin cargar con connotaciones de opresión. Se evita ''señorío'' porque puede sonar más interpretativo que el inglés POB.'
  doctrine_reference: Imago Dei; mayordomía de la creación
- issue: Penalty formulas for Sabbath violation
  english_pob_reading: whoever does any work on it shall die ... whoever defiles it shall surely die ... shall surely die forever
  chosen_spanish_reading: todo el que haga en él alguna obra muera ... cualquiera que lo profane ciertamente muera ... ciertamente morirá para siempre
  alternative_spanish_readings:
  - morirá sin falta
  - será condenado a muerte
  rationale: Se mantiene el carácter penal del texto y la repetición enfática. No se suaviza a mera consecuencia espiritual, porque el original presenta sanción judicial real.
  doctrine_reference: Santidad; juicio; ley del pacto
- issue: Peoplehood and divine ownership
  english_pob_reading: they will be my people, and I will be their God
  chosen_spanish_reading: ellos serán mi pueblo, y yo seré su Dios
  alternative_spanish_readings:
  - serán mi pueblo, y yo seré su Dios
  - serán mi pueblo, y yo seré el Dios de ellos
  rationale: La fórmula pactal se conserva casi literalmente por su peso bíblico y litúrgico. En español, 'seré su Dios' es claro y mantiene reciprocidad relacional.
  doctrine_reference: Pacto; pertenencia divina; elección
- issue: Firstborn son language for Jacob
  english_pob_reading: have written him down as my firstborn son
  chosen_spanish_reading: lo he escrito para mí como mi hijo primogénito
  alternative_spanish_readings:
  - lo he inscrito como mi primogénito
  - lo he registrado como mi hijo primogénito
  rationale: '''Hijo primogénito'' conserva la imagen filial y jurídica. ''Escrito para mí'' refleja el registro divino sin añadir una institución externa.'
  doctrine_reference: Primogenitura; elección patriarcal
translation_notes:
  revision_awareness: 'El texto inglés POB revisó varias veces esta sección: primero ajustó ‘his commands’ a ‘his will’, luego hubo una corrección errónea a ‘creeps’ para la frase sobre el vuelo, y finalmente el control cruzado recuperó ‘flies’ como la lectura correcta. La versión española sigue la última evaluación de alta concordancia: conserva la categoría aérea como ‘todo lo que vuela’ y mantiene la estructura amplia del catálogo de la creación y del sábado sin fusionar indebidamente categorías distintas.'
  spanish_consistency_notes:
  - Se usa ‘día de reposo’ de manera consistente para el sábado institucional y ‘día santo’ para su cualidad.
  - Se usa ‘santificar/santo’ en toda la sección para reflejar la repetición del original.
  - Se usa ‘autoridad’ para el encargo sobre la creación, no ‘señorío’, para mantener el tono descriptivo del texto.
  - Se usa ‘obra’ para la creación y el trabajo humano donde el contexto lo pide, conservando el paralelismo.
  - Se mantiene ‘Yahvé’ en las secciones donde el nombre divino aparece explícitamente en el texto fuente; en este pasaje el foco recae en ‘Dios’, por lo que no se introduce innecesariamente.
