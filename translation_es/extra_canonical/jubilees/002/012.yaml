  text: the birds and all their kinds. And the sun rose over them for prosperity[12], and over everything that was on the earth, everything that sprouts from the earth, and every fruit-bearing tree, and all flesh. These three kinds he made on the fifth day. And on the sixth day he made all the beasts of the earth, and all the cattle, and everything that moves upon the earth. And after all this he made humankind, male and female he made them, and gave them authority over everything that is upon the earth and in the seas, and over everything that flies, and over the beasts and over the cattle and over everything that moves upon the earth, and over all the earth. And over all this he gave them authority. And four kinds he made on the sixth day. And all were twenty-two kinds. And he finished all his work on the sixth day—all that is in the heavens and on the earth and in the seas and in the depths and in the light and in the darkness and in everything. And he gave us a great sign, the sabbath
    day, so that we might work six days and rest on the seventh day from all work. And all the angels of the presence and all the angels of sanctification—these two great kinds—he told us, "Let us rest with him in heaven and on earth." And he said to me, "Behold, I will separate for myself a people from among all the peoples, and they will keep the sabbath, and I will sanctify them for myself as my people, and I will bless them. As I sanctified the sabbath day, so I will sanctify them for myself, and so I will bless them; and they will be my people, and I will be their God. And I have chosen the seed of Jacob from among all that I have seen, and have written him down as my firstborn son, and have sanctified him for myself forever and ever. And I will make known to them the sabbath day, so that they may rest on it from all work." And thus he made a sign by which they should keep sabbath with us on the seventh day, to eat and to drink and to bless him who created all things, just as he blessed
    and sanctified for himself a people for possession from among all the nations, and that they should keep sabbath together with us. And he caused his will to ascend as a pleasing fragrance acceptable before him all the days. There were twenty-two heads of mankind from Adam to Jacob, and twenty-two kinds of work were made until the seventh day. This is blessed and holy, and this also is blessed and holy; and this one and that one were for holiness and for blessing. And to this one it was given that they should be blessed and holy all the days, according to the testimony and the first law, just as it was sanctified and blessed on the seventh day. He created heaven and earth and everything that he created in six days, and God made the seventh day holy for all his works. Therefore he commanded concerning it that everyone who does any work on it shall die, and whoever defiles it shall surely die. And command the children of Israel, and let them keep this day so that they may sanctify it, and
    so that they may not do on it any work, and so that they may not defile it, for it is holier than all days. And everyone who profanes it shall surely die, and everyone who does on it any work shall surely die forever, so that the children of Israel may keep this day throughout their generations and not be uprooted from the land; for it is a holy day and a blessed day. And every person who keeps it and rests on it from all his work will be holy and blessed through all days, like us.
