    el séptimo día de toda obra. Y todos los ángeles de la presencia y todos los ángeles de la santificación —estas dos grandes clases— nos dijo: «Descansemos con él en el cielo y en la tierra». Y me dijo: «He aquí, separaré para mí un pueblo de entre todos los pueblos, y guardarán el día de reposo, y los santificaré para mí como mi pueblo, y los bendeciré. Como santifiqué el día de reposo, así los santificaré para mí, y así los bendeciré; y ellos serán mi pueblo, y yo seré su Dios. Y he escogido la descendencia de Jacob de entre todo lo que he visto, y lo he escrito para mí como mi hijo primogénito, y lo he santificado para mí por los siglos de los siglos. Y les daré a conocer el día de reposo, para que en él descansen de toda obra». Y así hizo una señal por la cual deben guardar el día de reposo con nosotros el séptimo día, para comer y beber y bendecir al que creó todas las cosas, así como bendijo y santificó para sí un pueblo de posesión de entre todas las naciones, y para que guardaran
    el día de reposo juntamente con nosotros. Y hizo subir su voluntad como un aroma agradable, aceptable delante de él todos los días. Hubo veintidós cabezas de la humanidad desde Adán hasta Jacob, y se hicieron veintidós clases de obra hasta el séptimo día. Esto es bendito y santo, y esto también es bendito y santo; y uno y otro fueron para santidad y para bendición. Y a este se le dio que fueran benditos y santos todos los días, según el testimonio y la ley primera, así como fue santificado y bendito en el séptimo día. Él creó el cielo y la tierra y todo lo que creó en seis días, y Dios hizo santo el séptimo día para todas sus obras. Por tanto, acerca de él mandó que todo el que haga en él alguna obra muera, y cualquiera que lo profane ciertamente muera. Y manda a los hijos de Israel, y que guarden este día para santificarlo, y para que no hagan en él ninguna obra, y para que no lo profanen, porque es más santo que todos los días. Y todo el que lo profane ciertamente morirá, y todo el
    que haga en él alguna obra ciertamente morirá para siempre, para que los hijos de Israel guarden este día por todas sus generaciones y no sean arrancados de la tierra, porque es un día santo y un día bendito. Y toda persona que lo guarde y descanse en él de toda su obra será santa y bendita por todos los días, como nosotros.'
