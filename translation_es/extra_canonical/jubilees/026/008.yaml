base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/026/008.yaml
  text: And Rebekah his mother said to him, “Let your curse be on me, my son; only listen to my voice.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:22Z'
    unchanged: false
    changes_summary: Added 'Let' to make the optative sense in 'Your curse be on me' more natural and formal in English; otherwise retained the draft.
translation:
  language: es
  text: 'Y Rebeca, su madre, le dijo: «Que tu maldición caiga sobre mí, hijo mío; solo escucha mi voz».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ርብቃ
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rivca
  - Rebeka
  lexicon: nombre propio bíblico
  rationale: Se mantiene el nombre bíblico en su forma española más estable y reconocible, sin introducir una transliteración menos natural para lectores en español.
- source_word: መርገምከ
  english_pob_choice: your curse
  chosen_spanish: tu maldición
  alternatives_spanish:
  - tu maldición pronunciada sobre ti
  - la maldición que recaiga sobre ti
  lexicon: léxico de maldición/juicio
  rationale: La expresión ge'ez admite una relación posesiva directa; en español, 'tu maldición' conserva la fuerza del giro breve del original y permite reflejar la aceptación sustitutiva de Rebeca.
- source_word: ዳእሙ
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - tan solo
  lexicon: adverbio restrictivo
  rationale: '''Solo'' reproduce de forma natural el valor restrictivo y la concisión del texto fuente.'
- source_word: ቃልየ
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mis palabras
  - lo que digo
  lexicon: léxico de habla/voz
  rationale: Se conserva la imagen concreta del original. 'Mi voz' mantiene la referencia a la autoridad y exhortación materna sin suavizarla en una paráfrasis.
theological_decisions:
- issue: Aceptación vicaria de la maldición
  english_pob_reading: Let your curse be on me, my son
  chosen_spanish_reading: Que tu maldición caiga sobre mí, hijo mío
  alternative_spanish_readings:
  - Tu maldición caiga sobre mí, hijo mío
  - Deja que tu maldición esté sobre mí, hijo mío
  rationale: El ajuste inglés reciente añadió 'Let' para expresar mejor el valor optativo. En español, 'Que ... caiga sobre mí' comunica de modo natural y fiel esa aceptación voluntaria sin convertirla en una orden ni en una simple afirmación estática.
  doctrine_reference: Narrativa patriarcal; lenguaje de sustitución/aceptación de carga sin formulación doctrinal explícita
- issue: Autoridad de la palabra materna
  english_pob_reading: only listen to my voice
  chosen_spanish_reading: solo escucha mi voz
  alternative_spanish_readings:
  - solamente escucha mi voz
  - escucha únicamente mi voz
  rationale: Se conserva la estructura imperativa breve del original. 'Mi voz' mantiene la idea de la palabra autorizada de Rebeca, sin transformar el texto en una paráfrasis interpretativa.
  doctrine_reference: Ética narrativa y autoridad familiar en el relato
translation_notes:
  revision_awareness: El inglés POB fue revisado de 'Your curse be on me' a 'Let your curse be on me' para hacer explícito el matiz optativo. El español adopta una solución equivalente ('Que ... caiga sobre mí') que ya incorpora ese valor sin depender de la literalidad inglesa previa.
  spanish_consistency_notes:
  - Se mantuvo 'Y' inicial para reflejar la continuidad narrativa del relato.
  - Se usó 'Rebeca' como forma española estándar del nombre propio.
  - Se evitó 'SEÑOR' o terminología litúrgica ajena porque el versículo no contiene el nombre divino ni un término técnico que lo requiera.
  - '''voz'' se conservó en singular para seguir de cerca el paralelismo con el original.'
