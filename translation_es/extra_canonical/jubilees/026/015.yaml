translation:
  language: es
  text: 'Isaac le dijo: «Acércate, y déjame tocarte, hijo mío, para ver si eres mi hijo Esaú o no».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቅረብ
  english_pob_choice: Come near
  chosen_spanish: Acércate
  alternatives_spanish:
  - Ven acá
  - Acércate, por favor
  lexicon: imperative of approach
  rationale: La orden pide proximidad física antes del tacto; «acércate» reproduce bien la dirección y la naturalidad del español sin añadir matices no presentes.
- source_word: ወእግስስከ
  english_pob_choice: let me feel you
  chosen_spanish: déjame tocarte
  alternatives_spanish:
  - déjame palparte
  - déjame sentirte
  lexicon: tactile examination
  rationale: El verbo geʽez describe un examen por el tacto; en español «tocarte» comunica el acto de manera clara y neutra. «Palparte» sería más técnico, pero menos natural en este contexto narrativo.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: kinship address
  rationale: 'Se conserva el vocativo afectivo y la posición final típica del español bíblico y contemporáneo: «hijo mío».'
- source_word: እመ፡ ... አኮኑ
  english_pob_choice: whether you are ... or not
  chosen_spanish: para ver si eres ... o no
  alternatives_spanish:
  - a fin de saber si eres ... o no
  - para comprobar si eres ... o no
  lexicon: disjunctive inquiry
  rationale: La construcción expresa una verificación incierta; «para ver si» es fiel, idiomático y mantiene el contraste final «o no».
- source_word: ዔሳው
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: proper name
  rationale: Se translitera el nombre bíblico estándar en español como «Esaú».
theological_decisions:
- issue: Identidad incierta de Isaac respecto al hijo que tiene delante
  english_pob_reading: whether you are my son Esau or not
  chosen_spanish_reading: para ver si eres mi hijo Esaú o no
  alternative_spanish_readings:
  - para saber si eres mi hijo Esaú o no
  - para comprobar si eres mi hijo Esaú o no
  rationale: 'No se suaviza la incertidumbre del texto: Isaac no afirma la identidad, sino que la pone a prueba. El español conserva esa tensión narrativa.'
  doctrine_reference: none
translation_notes:
  revision_awareness: 'El texto coincide con el audit trail inglés y con la revisión más reciente: no hubo cambios necesarios y el acuerdo de control cruzado fue alto.'
  spanish_consistency_notes:
