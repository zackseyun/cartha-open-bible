translation:
  language: es
  text: Y Rebeca tomó las prendas apreciadas[a] de Esaú, su hijo mayor, que estaban con ella en la casa, y vistió con ellas a Jacob, su hijo menor; y puso las pieles de los cabritos jóvenes sobre sus manos y sobre la parte desnuda de su cuello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘vestiduras escogidas’.
    reason: alternative_rendering
lexical_decisions:
- source_word: ዘይሌህቅ
  english_pob_choice: desirable garments
  chosen_spanish: prendas deseables
  alternatives_spanish:
  - vestiduras deseables
  - ropas valiosas
  - prendas escogidas
  lexicon: Geez lexical field of attractiveness/desirability for garments
  rationale: ‘Deseables’ mantiene el matiz de prendas apreciadas o atractivas sin añadir una valoración material específica que el texto no exige. ‘Prendas’ es natural en español y suficientemente amplio para el contexto de ropa distinguida.
- source_word: አልባሰ
  english_pob_choice: garments
  chosen_spanish: prendas
  alternatives_spanish:
  - vestiduras
  - ropas
  - vestidos
  lexicon: Lexical item for clothing/garments
  rationale: ‘Prendas’ evita un registro demasiado litúrgico y conserva amplitud semántica para ropa en general. ‘Vestiduras’ sería más solemne pero más cargado eclesiásticamente; ‘ropas’ es posible, pero ‘prendas’ encaja bien con la selección de ropa especial.
- source_word: ዕርቃነ ክሳዱ
  english_pob_choice: the bare part of his neck
  chosen_spanish: la parte desnuda de su cuello
  alternatives_spanish:
  - la parte descubierta de su cuello
  - el cuello desnudo
  - la zona desnuda de su cuello
  lexicon: Expression of exposed/bare neck area
  rationale: ‘Parte desnuda’ refleja el sentido físico de exposición sin forzar una interpretación anatómica más específica. ‘Descubierta’ sería igualmente viable, pero ‘desnuda’ reproduce mejor la idea de ausencia de cobertura.
theological_decisions:
- issue: No explicit theological tension beyond faithful narrative detail
  english_pob_reading: Rebekah physically disguises Jacob by clothing and placing kid skins on him
  chosen_spanish_reading: Rebeca lo viste con las prendas de Esaú y coloca las pieles sobre sus manos y cuello
  alternative_spanish_readings:
  - Rebeca lo disfrazó con las prendas de Esaú
  - Rebeca le puso encima las pieles de los cabritos
  rationale: El pasaje es narrativo y material; no requiere suavizar ni reinterpretar la acción. La formulación elegida preserva la secuencia concreta de actos sin introducir una moralización o una explicación adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'The English audit note corrected a prior mistranslation by removing an unwarranted ''from'' in the clause about the young kids'' skins. The Spanish draft follows the revised sense directly: no preposición equivalente a ''from'' is added, and the clause is rendered as a simple coordinated action with direct placement on his hands.'
  spanish_consistency_notes:
  - Se conserva el nombre ‘Rebeca’ en lugar de ‘Ribca’ por uso español estándar y claridad lectoral.
  - ‘Jacob, su hijo menor’ mantiene el paralelismo con ‘Esaú, su hijo mayor’.
  - No se introduce ‘de’ antes de ‘las pieles’ para evitar reproducir el error de la revisión previa.
  - La puntuación con punto y coma separa las dos acciones principales como en el inglés auditado.
