    issue: ‘prendas deseables’ suena poco idiomático en español
    rationale: Aunque calca aceptablemente ‘desirable garments’, en español ‘deseables’ aplicado a ropa en este contexto suena rígido o artificial. El sentido es de prendas apreciadas, escogidas o preferidas, no de deseabilidad abstracta.
  - severity: low
    issue: La nota alternativa actual no aporta mucho valor si se mantiene un sustantivo cercano
    rationale: ‘O vestiduras deseables’ apenas cambia el registro. Conviene conservar nota solo si realmente preserva una alternativa significativa de estilo o matiz.
  - severity: low
    issue: Ligera pesadez en ‘las pieles... las puso’
    rationale: La repetición del clítico es admisible, pero una redacción más fluida mejora la lectura sin alterar el sentido.
