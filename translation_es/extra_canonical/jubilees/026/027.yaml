translation:
  language: es
  text: 'Y su padre Isaac le dijo: «¿Quién eres tú?». Y él le dijo: «Yo soy tu primogénito, Esaú, tu hijo; lo he hecho»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lo he hecho» sigue la lectura revisada del inglés POB, que completa el cierre de la frase. El geʿez conservado termina con un verbo de «hacer», y la cláusula en español mantiene esa conclusión breve y directa.
    reason: textual_variant
lexical_decisions:
- source_word: ይስሐቅ / Isaac
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Yitzjak
  lexicon: Isaac
  rationale: Se conserva el nombre propio bíblico en su forma española estable y ampliamente reconocible.
- source_word: አቡሁ / his father
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - el padre de él
  lexicon: padre
  rationale: La relación posesiva se expresa de manera natural en español con «su padre», sin perder la referencia a Isaac.
- source_word: መኑ፡ አንተ፡ / Who are you?
  english_pob_choice: Who are you?
  chosen_spanish: ¿Quién eres tú?
  alternatives_spanish:
  - ¿Quién eres?
  lexicon: interrogativo personal
  rationale: Se mantiene la pregunta directa. Se añade «tú» para dar énfasis enfático equivalente al giro del relato, sin alterar el sentido.
- source_word: አነ፡ በኵርከ፡ ዔሳው፡ / I am your firstborn, Esau
  english_pob_choice: I am your firstborn, Esau your son
  chosen_spanish: Yo soy tu primogénito, Esaú, tu hijo
  alternatives_spanish:
  - Soy tu primogénito, Esaú, tu hijo
  - Yo soy Esaú, tu primogénito, tu hijo
  lexicon: primogénito
  rationale: «Primogénito» recoge con precisión el valor de በኵርከ y corresponde al contenido de la identificación falsa de Esaú en la escena. Se conserva el nombre Esaú en aposición explicativa.
- source_word: ወልድከ፡ / your son
  english_pob_choice: Esau your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo Esaú
  lexicon: hijo
  rationale: El poseedor ya está claro en el discurso; en español «tu hijo» fluye de modo natural y conserva la referencia filial.
- source_word: ገበርኩ፡ / I have done it
  english_pob_choice: I have done it
  chosen_spanish: lo he hecho
  alternatives_spanish:
  - lo hice
  - he hecho eso
  lexicon: hacer
  rationale: La revisión inglesa completó el objeto implícito; en español se explicita con el pronombre neutro «lo» para reflejar el cierre sintáctico y mantener la brevedad del original.
theological_decisions:
- issue: La identidad fingida de Esaú ante Isaac
  english_pob_reading: I am your firstborn, Esau your son; I have done it.
  chosen_spanish_reading: Yo soy tu primogénito, Esaú, tu hijo; lo he hecho.
  alternative_spanish_readings:
  - Soy tu primogénito...
  - Yo soy Esaú, tu primogénito...
  rationale: 'La formulación preserva la tensión narrativa: el hablante afirma ser el primogénito y se presenta como el hijo adecuado ante Isaac. No se suaviza la falsedad implícita ni se explicita moralmente en el texto, porque el pasaje narra la escena sin comentario.'
  doctrine_reference: Génesis 27:18-19; Jubileos 26:27
translation_notes:
  revision_awareness: 'La edición inglesa auditada fue revisada para completar la cláusula final: de «I have done» a «I have done it». La versión española refleja esa revisión con «lo he hecho», manteniendo la clausula breve y el cierre narrativo.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino no pertinente aquí sin cambios; no aparece YHWH en este versículo.
  - Se emplea un español bíblico claro y moderno, evitando arcaísmos innecesarios.
  - «Primogénito» se usa en su sentido literal de orden de nacimiento, coherente con el contexto narrativo.
