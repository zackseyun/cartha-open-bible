translation:
  language: es
  text: Y Esaú fue al campo abierto para cazar, y para atrapar[a], y para traerla a su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «capturar»; el verbo ge'ez aquí tiene el sentido de prender o apoderarse de la presa, no de «buscar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወጌሰ / went
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - salió
  - se fue
  lexicon: go / move away
  rationale: El movimiento narrativo se expresa de forma natural con «fue», sin añadir matices no presentes en el texto fuente.
- source_word: ገዳመ / open country
  english_pob_choice: open country
  chosen_spanish: la tierra abierta
  alternatives_spanish:
  - el campo abierto
  - la región abierta
  lexicon: open country / wilderness edge
  rationale: «La tierra abierta» conserva la idea de espacio no cercado o abierto, y evita imponer un matiz más específico que el Ge'ez no obliga a fijar aquí.
- source_word: ያሥግር / hunt
  english_pob_choice: hunt
  chosen_spanish: cazar
  alternatives_spanish:
  - ir de caza
  - cacear
  lexicon: hunt / hunt game
  rationale: «Cazar» es la correspondencia directa y natural para la acción de caza en español contemporáneo.
- source_word: የአንዝ / catch, seize
  english_pob_choice: to catch
  chosen_spanish: atrapar
  alternatives_spanish:
  - capturar
  - asir
  lexicon: catch / seize / grasp
  rationale: El verbo medio del trío verbal requiere una acción distinta de «cazar»; «atrapar» refleja bien la idea de prender o capturar la presa, y evita omitir el elemento explicitado en la revisión auditada.
- source_word: ያምጽእ / bring
  english_pob_choice: bring
  chosen_spanish: llevarlo
  alternatives_spanish:
  - traerlo
  - presentarlo
  lexicon: bring / carry back
  rationale: «Llevarlo» comunica el transporte de la presa hacia el padre en español fluido. El objeto directo se expresa con «lo» porque el referente implícito es la presa.
- source_word: ለአቡሁ / to his father
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - para su padre
  lexicon: father / recipient phrase
  rationale: La preposición «a» mantiene la dirección personal del acto de entrega, y funciona con naturalidad en español.
theological_decisions:
- issue: No hay un término teológico explícito; se trata de una escena narrativa de caza y entrega filial.
  english_pob_reading: And Esau went to the open country to hunt, and to catch, and to bring it to his father.
  chosen_spanish_reading: Y Esaú fue a la tierra abierta para cazar, y para atrapar[a], y para llevarlo a su padre.
  alternative_spanish_readings:
  - Y Esaú fue al campo abierto para cazar, prender y llevarlo a su padre.
  rationale: Se conserva la secuencia verbal completa sin suavizar el segundo verbo, porque la revisión auditada corrigió una omisión semántica importante. No se introduce interpretación devocional ni se altera el sentido literal de la escena.
  doctrine_reference: No aplica; pasaje narrativo sin carga doctrinal explícita.
translation_notes:
  revision_awareness: La revisión auditada corrigió una traducción anterior que había puesto «to seek» y confirmó que el verbo medio significa «to catch/seize». Por eso el español incluye explícitamente un segundo verbo distinto de «cazar» y evita omitir ese elemento.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y publicable.
  - Se evita «SEÑOR» o terminología litúrgica no presente en el original.
  - «Esaú» conserva la forma bíblica habitual en español.
  - La nota [a] está anclada en el texto y solo ofrece una alternativa lexical documentada.
