  text: «Hijo mío, he envejecido, y ahora mis ojos están demasiado débiles para ver, y no sé el día de mi muerte.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወልድየ
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - hijo mío
  - mi hijo
  lexicon: vocative / kinship term
  rationale: El ge'ez se dirige directamente al hijo; «Hijo mío» conserva el tono afectuoso y la relación filial sin añadir nada que el texto no diga.
- source_word: ረሳዕኩ
  english_pob_choice: I have grown old
  chosen_spanish: he envejecido
  alternatives_spanish:
  - he llegado a viejo
  - me he hecho viejo
  lexicon: state of aging
  rationale: La forma española en perfecto transmite el estado resultante del envejecimiento, equivalente al valor del inglés POB y natural en español.
- source_word: አዕይንትየ ከፍአ ለርእይ
  english_pob_choice: my eyes are too dim to see
  chosen_spanish: mis ojos están demasiado nublados para ver
  alternatives_spanish:
  - mis ojos están demasiado débiles para ver
  - mis ojos ya no ven bien
  lexicon: vision impairment / idiom
  rationale: El original expresa incapacidad visual; «demasiado nublados para ver» mantiene la imagen sin forzar un calco. Conserva la tensión de una vista ya debilitada.
- source_word: ዕለተ ሞትየ
  english_pob_choice: the day of my death
  chosen_spanish: el día de mi muerte
  alternatives_spanish:
  - el día en que moriré
  - el día de mi fallecimiento
  lexicon: idiom of appointed death
  rationale: La expresión se traduce de manera directa y sobria, fiel al sustantivo y al valor temporal del giro.
translation_notes:
  revision_awareness: Se siguió la revisión que eliminó cualquier introducción narrativa no presente en el ge'ez; por eso la cita comienza directamente con la vocativa «Hijo mío» y termina con cierre de comillas correcto. No se añadió nota textual porque el versículo no requiere una alternativa anclada en esta versión española.
  spanish_consistency_notes:
  - Se mantuvo un registro digno y publicable, sin añadir «Y dijo» ni otras fórmulas narrativas ausentes en el texto fuente.
  - Se evitó «SEÑOR» o terminología teológica no pertinente; el pasaje es una declaración personal sobre vejez y ceguera.
  - La puntuación de cita se cerró correctamente para reflejar la corrección textual indicada en la auditoría.
