translation:
  language: es
  text: Y Isaac no lo reconoció, porque sus manos eran vellosas como las manos de su hermano Esaú, así que lo bendijo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que lo bendijera».
    reason: Preserva la alternativa de finalidad previamente documentada en la auditoría inglesa, aunque la lectura principal correcta aquí es consecutiva/resultativa.
lexical_decisions:
- source_word: ወኢያእመረ
  english_pob_choice: did not recognize him
  chosen_spanish: no lo reconoció
  alternatives_spanish:
  - no lo identificó
  - no lo advirtió
  lexicon: reconocer
  rationale: El verbo expresa no identificar a una persona presente; «reconoció» es el equivalente natural y fiel en español. «Identificó» sería posible, pero suena más técnico y menos narrativo.
- source_word: እደዊሁ ... ጸጓር
  english_pob_choice: his hands were hairy
  chosen_spanish: sus manos eran vellosas
  alternatives_spanish:
  - sus manos eran peludas
  - tenía las manos llenas de vello
  lexicon: velloso
  rationale: El rasgo físico de las manos de Esaú pide un adjetivo claro y digno. «Vellosas» conserva el valor descriptivo sin volverse coloquial; «peludas» resulta más crudo en español.
- source_word: እደወ፡ ዔሳው
  english_pob_choice: his brother Esau’s hands
  chosen_spanish: las manos de su hermano Esaú
  alternatives_spanish:
  - las manos de Esaú, su hermano
  lexicon: mano
  rationale: Se conserva la comparación explícita entre las manos de Isaac creyendo tocar a Esaú y las manos de Esaú mismo. El orden español se ajusta a la sintaxis natural sin alterar la relación comparativa.
- source_word: ይባርኮ
  english_pob_choice: so he blessed him
  chosen_spanish: así que lo bendijo
  alternatives_spanish:
  - y lo bendijo
  - por eso lo bendijo
  lexicon: bendecir
  rationale: La revisión inglesa entendió la construcción como resultado, no como propósito. «Así que» reproduce mejor el valor consecutivo del ge'ez que una finalidad del tipo «para que lo bendijera».
theological_decisions:
- issue: Valor consecutivo vs. finalidad en la bendición
  english_pob_reading: so he blessed him
  chosen_spanish_reading: así que lo bendijo
  alternative_spanish_readings:
  - para bendecirlo
  - para que lo bendijera
  rationale: La nota de revisión señala que la cláusula expresa resultado narrativo. En español, una consecutiva preserva esa relación sin introducir una intención inexistente en el pasaje.
  doctrine_reference: Narrative sequence; Genesis 27:23 parallel
translation_notes:
  revision_awareness: La versión inglesa revisada cambió una traducción de finalidad («so that he might bless him») a resultado («so he blessed him») por la sintaxis del ge'ez y la secuencia narrativa de Génesis 27:23. La redacción española sigue esa lectura consecutiva y evita una subordinada final.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Isaac» y «Esaú» conforme al uso bíblico estándar en español.
  - Se evita introducir mayúsculas devocionales o mascarillas como «SEÑOR», porque no hay aquí el Tetragrámaton ni una sustitución contextual.
  - El tono es narrativo, sobrio y publicación-readable, sin expandir el contenido más allá del texto fuente.
