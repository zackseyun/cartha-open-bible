base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/026/005.yaml
  text: And Rebekah called Jacob her son and said to him, “Look, I heard Isaac your father speaking with Esau your brother, saying, ‘Hunt game for me and prepare food for me, and bring it to me, that I may eat and bless you before the LORD before I die.’”
  footnotes:
  - marker: a
    text: Or 'Bring me game'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:52Z'
    unchanged: false
    changes_summary: Changed 'Hunt game for me' to 'Bring me game' to reflect the source more directly, and adjusted punctuation/wording slightly ('that I may eat') for smoother, more formal English while preserving all source elements.
translation:
  language: es
  text: 'Y Rebeca llamó a Jacob, su hijo, y le dijo: «Mira, he oído a Isaac, tu padre, hablando con Esaú, tu hermano, y diciendo: “Sal[a] a cazar para mí y prepárame comida, y tráemela, para que coma y te bendiga delante de Yahvé antes de que muera”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «caza para mí». El audit trail favorece «sal a cazar» porque el primer verbo expresa la acción de cazar, no de traer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወጸውዐት / called
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó a
  lexicon: call
  rationale: Verbo directo y natural en español; conserva la acción narrativa sin añadir matiz no presente en el ge'ez.
- source_word: ያዕቆብሃ፡ ወልዳ / Jacob her son
  english_pob_choice: Jacob her son
  chosen_spanish: Jacob, su hijo
  alternatives_spanish:
  - Jacob, el hijo de ella
  lexicon: son
  rationale: La posesión ya está clara en contexto; «su hijo» es idiomático y fiel.
- source_word: ሰማዕክዎ / I heard
  english_pob_choice: I heard
  chosen_spanish: he oído
  alternatives_spanish:
  - escuché
  lexicon: hear
  rationale: Expresa percepción auditiva pasada con buena fluidez en español sin perder el hecho reportado.
- source_word: ይትናገር / speaking
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - conversando
  lexicon: speak
  rationale: Forma progresiva natural en español para el discurso en curso.
- source_word: አሰግር / Hunt game for me
  english_pob_choice: Hunt game for me
  chosen_spanish: Sal a cazar para mí
  alternatives_spanish:
  - Cázame algo de caza
  - Caza presas para mí
  lexicon: hunt
  rationale: La revisión inglesa y el audit trail indican que el primer verbo es 'to hunt/catch game', no 'bring'; en español, «sal a cazar» comunica ese matiz sin añadir objeto indebido. «Para mí» refleja el dativo del original.
- source_word: ወግበር፡ ሊተ፡ መብልዐ / and prepare food for me
  english_pob_choice: prepare food for me
  chosen_spanish: prepárame comida
  alternatives_spanish:
  - prepara comida para mí
  - prepárame de comer
  lexicon: prepare
  rationale: Mantiene la sencillez del objeto genérico 'food' y el imperativo con clítico, natural en español.
- source_word: ወአብእ፡ ሊተ፡ / and bring it to me
  english_pob_choice: and bring it to me
  chosen_spanish: y tráemela
  alternatives_spanish:
  - y tráela
  - y tráemelo
  lexicon: bring
  rationale: El referente implícito es la comida preparada; el femenino concuerda con «comida».
- source_word: ወእብላዕ / that I may eat
  english_pob_choice: that I may eat
  chosen_spanish: para que coma
  alternatives_spanish:
  - para que yo coma
  - y comeré
  lexicon: eat
  rationale: Finalidad expresada con infinitivo subordinado natural en español, preservando el sentido de propósito.
- source_word: ወእባርከ / and bless you
  english_pob_choice: and bless you
  chosen_spanish: y te bendiga
  alternatives_spanish:
  - y te bendiga él
  lexicon: bless
  rationale: Mantiene el paralelismo verbal y el sentido performativo de la bendición paternal.
- source_word: በቅድመ፡ እግዚአብሔር / before the LORD
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: LORD / divine name
  rationale: El proyecto exige «Yahvé» para יהוה; «delante de» reproduce bien la preposición espacial/ceremonial del original. No se enmascara el nombre divino.
- source_word: ዘ*እንበለ፡ እሙት / before I die
  english_pob_choice: before I die
  chosen_spanish: antes de que muera
  alternatives_spanish:
  - antes de morir
  lexicon: die
  rationale: Conserva la referencia temporal directa en primera persona con un español natural y solemne.
theological_decisions:
- issue: Nombre divino en la fórmula de bendición
  english_pob_reading: before the LORD
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - en presencia de Yahvé
  rationale: Siguiendo la norma del proyecto para יהוה, se usa el nombre propio «Yahvé» en vez de una sustitución reverencial. La escena es una bendición pronunciada bajo la presencia/autoridad divina, por eso «delante de» conserva la fuerza relacional sin alterar el sentido.
  doctrine_reference: Divine name rendering policy; consistency with Yahweh translation default
- issue: Relación entre caza y comida en la orden de Isaac
  english_pob_reading: Hunt game for me and prepare food for me, and bring it to me
  chosen_spanish_reading: Sal a cazar para mí y prepárame comida, y tráemela
  alternative_spanish_readings:
  - Cázame algo de caza y prepárame comida, y tráemela
  rationale: El audit trail corrige una versión inglesa que había confundido el primer verbo con 'bring'. La lectura seguida distingue correctamente entre cazar y traer; el español refleja esa distinción para no borrar la secuencia de acciones.
  doctrine_reference: Textual/source fidelity; lexical distinction of successive imperatives
- issue: Bendición paterna antes de la muerte
  english_pob_reading: that I may eat and bless you before the LORD before I die
  chosen_spanish_reading: para que coma y te bendiga delante de Yahvé antes de que muera
  alternative_spanish_readings:
  - para comer y bendecirte delante de Yahvé antes de morir
  rationale: Se conserva la finalidad de comer antes de pronunciar la bendición, sin convertirla en simple coordinación temporal. La formulación mantiene la solemnidad ritual del acto.
  doctrine_reference: Narrative-theological coherence in patriarchal blessing scenes
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que intentó cambiar «Hunt game for me» por «Bring me game», pero el audit trail posterior lo corrige explícitamente por razones léxicas del ge'ez. La versión española sigue la corrección basada en la fuente original y conserva la distinción entre cazar y traer.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al criterio del proyecto.
  - Se evita «Cristo» y cualquier terminología eclesial no presente en el texto.
  - «Comida» se usa como equivalente amplio de «food», sin especificar un platillo.
  - El objeto pronominal en «tráemela» concuerda con «comida» como referente más natural en español.
  - La puntuación y el discurso directo respetan el tono narrativo solemne del pasaje.
