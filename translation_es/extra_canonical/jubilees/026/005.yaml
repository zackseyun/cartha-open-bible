review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del ge''ez y del audit trail inglés: Rebeca llama a Jacob, reporta haber oído a Isaac hablando con Esaú, y reproduce la secuencia de mandatos: cazar, preparar comida, traerla, para que Isaac coma y bendiga antes de morir. También preserva correctamente la distinción léxica clave entre አሰግር (''cazar'') y ወአብእ (''traer'').'
  spanish_quality_summary: El texto es claro y digno, pero 'Sal[a] a cazar para mí' añade 'sal', que no está en la fuente, y además obliga a una nota innecesaria. En español natural basta 'Caza para mí' o 'Cázame algo de caza'; la primera es más sobria y más cercana al original sin añadir contenido. El resto del versículo lee bien y con buena puntuación.
  glossary_alignment: Se alinea bien con la política del proyecto al usar 'Yahvé' para el nombre divino. No hay conflictos con otros términos clave del glosario. La decisión 'delante de Yahvé' es adecuada.
  issues:
  - severity: medium
    issue: Se añade 'sal' en 'Sal[a] a cazar para mí'.
    rationale: El ge'ez manda cazar, no 'salir' a cazar. Aunque es idiomático en español, introduce una acción no expresada en la fuente. Puede resolverse con 'Caza para mí', que mantiene la distinción frente a 'tráemela' sin expansión.
  - severity: low
    issue: La nota [a] deja de ser necesaria si se corrige el verbo principal.
    rationale: La alternativa documenta bien el audit trail, pero una vez que el texto principal dice 'Caza para mí', la nota ya no aporta una ambigüedad relevante para el lector español.
  revised_spanish_text: 'Y Rebeca llamó a Jacob, su hijo, y le dijo: «Mira, he oído a Isaac, tu padre, hablando con Esaú, tu hermano, y diciendo: “Caza para mí y prepárame comida, y tráemela, para que coma y te bendiga delante de Yahvé antes de que muera”».'
  revision_rationale: Se quita 'sal' para evitar añadir una acción no presente en la fuente y se elimina la nota asociada, ya innecesaria. El resto del texto se mantiene porque refleja fielmente la secuencia verbal, el sentido narrativo y la terminología del proyecto.
