translation:
  language: es
  text: 'Y dijo: «¿Eres en verdad mi hijo Esaú?» Y él dijo: «Soy tu hijo». Y dijo: «Acércamelo, y comeré».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይቤ፡ አንተኑ፡ ወልድየ፡ ዔሳው፡
  english_pob_choice: Are you really my son Esau?
  chosen_spanish: ¿Eres en verdad mi hijo Esaú?
  alternatives_spanish:
  - ¿De veras eres mi hijo Esaú?
  - ¿Eres realmente mi hijo Esaú?
  lexicon: interrogative emphasis; proper name
  rationale: El adverbio enfático del etíope se expresa naturalmente en español con «en verdad», que conserva la duda/verificación del hablante sin endurecer el tono. Se mantiene el nombre propio «Esaú» conforme al antecedente bíblico.
- source_word: ወይቤ፡ አነ፡ ወልድከ፡
  english_pob_choice: I am your son.
  chosen_spanish: Soy tu hijo.
  alternatives_spanish:
  - Yo soy tu hijo.
  - Soy hijo tuyo.
  lexicon: identity statement
  rationale: La afirmación es directa y breve en el original; «Soy tu hijo» reproduce el contenido sin añadir énfasis innecesario. Se evita una construcción más pesada en español.
- source_word: አቅርብ፡ ሊተ፡ ወእብላዕ፡
  english_pob_choice: Bring it near to me, and I will eat.
  chosen_spanish: Acércamelo, y comeré.
  alternatives_spanish:
  - Tráemelo, y comeré.
  - Acércalo a mí, y comeré.
  lexicon: causative imperative; eat
  rationale: El verbo etíope implica ‘hacerlo venir cerca’; en español, «acércamelo» conserva la cercanía solicitada y el movimiento hacia el hablante. «Comeré» se usa como equivalente idiomático del valor prospectivo del original y coincide con la solución inglesa de llevar la acción al futuro inmediato.
theological_decisions:
- issue: Paternidad reconocida en un contexto de engaño narrativo
  english_pob_reading: Are you really my son Esau? / I am your son.
  chosen_spanish_reading: ¿Eres en verdad mi hijo Esaú? / Soy tu hijo.
  alternative_spanish_readings:
  - ¿De veras eres mi hijo Esaú? / Soy tu hijo.
  rationale: 'No se suaviza la tensión narrativa: la pregunta expresa verificación real, no mera cortesía. La respuesta mantiene la brevedad y posible ambigüedad moral del episodio sin comentario explicativo.'
  doctrine_reference: Narrative fidelity; no doctrinal alteration
