  yaml_path: translation/extra_canonical/jubilees/026/017.yaml
  text: “The voice is Jacob’s voice[17], but the hands are Esau’s hands.” And he did not recognize him, because it was a turning from heaven to remove his spirit,
  footnotes:
  - marker: '17'
    text: The chapter's verse segmentation around vv. 17–21 is uneven in the source rows. The recognition formula and blessing sequence have been rendered in the most coherent order from the Ge'ez.
    reason: segmentation_note
  - marker: a
    text: Or 'because it was from heaven to turn away his spirit,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:25Z'
    unchanged: false
    changes_summary: 'Revised the final clause for closer lexical accuracy and more natural English: changed “it was a turn from heaven to remove his spirit” to “it was from heaven to turn away his spirit,” avoiding the awkward noun “a turn” and the stronger, less precise “remove.”'
translation:
  language: es
  text: «La voz es la voz de Jacob[a], pero las manos son las manos de Esaú». Y no lo reconoció, porque era una desviación[b] procedente del cielo para apartar su espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La repetición «la voz es la voz...» conserva el paralelismo enfático del original, que subraya la disonancia entre lo que oye y lo que toca.
    reason: source_note
  - marker: b
    text: 'También podría traducirse: «porque era un desvío del cielo para apartar su espíritu» o «porque era desde el cielo para apartar su espíritu». Se prefiere «desviación ... procedente del cielo» para conservar el sustantivo del original y expresar con naturalidad su procedencia celestial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: قָל / ቃል (voice/word in context)
  english_pob_choice: The voice is Jacob’s voice
  chosen_spanish: La voz es la voz de Jacob
  alternatives_spanish:
  - La voz es de Jacob
  - La voz pertenece a Jacob
  lexicon: voz
  rationale: El contexto exige el sentido auditivo de la repetición enfática, no 'palabra'. En español, la repetición 'la voz es la voz de Jacob' preserva la fórmula semítica y la identificación directa del rasgo reconocido.
- source_word: hands
  english_pob_choice: the hands are Esau’s hands
  chosen_spanish: las manos son las manos de Esaú
  alternatives_spanish:
  - las manos son de Esaú
  - son las manos de Esaú
  lexicon: manos
  rationale: Se conserva la repetición paralela del original y del inglés POB para mantener el contraste entre voz y manos.
- source_word: miṭat / turning
  english_pob_choice: a turning from heaven
  chosen_spanish: una desviación
  alternatives_spanish:
  - un giro
  - un apartamiento
  - una vuelta
  lexicon: desviación
  rationale: La revisión más reciente del inglés restablece el sustantivo de movimiento/desvío. 'Desviación' reproduce mejor ese valor nominal que una traducción meramente verbal y suena natural en español sin perder la idea de una intervención providencial.
- source_word: from heaven
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: cielo
  rationale: '''Desde el cielo'' refleja con claridad el origen de la acción y preserva el matiz de procedencia. ''Cielo'' se usa como equivalente reverente del ámbito divino sin añadir una formulación litúrgica ajena al texto.'
- source_word: la-ʾaḥləfo / remove, turn away
  english_pob_choice: to turn away his spirit
  chosen_spanish: para apartar su espíritu
  alternatives_spanish:
  - para quitar su espíritu
  - para retirar su espíritu
  lexicon: apartar
  rationale: El Ge'ez y la nota del inglés apuntan a un apartamiento o alejamiento del espíritu, no necesariamente a la muerte. 'Apartar' conserva la ambigüedad y el matiz de desviación/diversión providencial.
- source_word: spirit
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su ánimo
  - su aliento
  lexicon: espíritu
  rationale: '''Espíritu'' mantiene el lenguaje bíblico y la posible amplitud semántica del término original, sin reducirlo a ''ánimo'' ni forzarlo a una precisión dogmática no explícita en el verso.'
theological_decisions:
- issue: Causa divina de la falta de reconocimiento
  english_pob_reading: because it was from heaven to turn away his spirit
  chosen_spanish_reading: porque era una desviación desde el cielo para apartar su espíritu
  alternative_spanish_readings:
  - porque era desde el cielo para apartar su espíritu
  - porque venía del cielo para apartar su espíritu
  rationale: La cláusula debe conservar la idea de una acción o disposición ordenada desde el cielo, sin convertirla en una afirmación doctrinal más amplia de lo que el texto dice. 'Desviación desde el cielo' mantiene la causalidad providencial y el carácter deliberativo del pasaje.
  doctrine_reference: Providencia divina / soberanía de Dios en la percepción humana, sin añadir determinismo explícito.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que restauró el sustantivo equivalente a 'turning/deviation' en lugar de la paráfrasis verbal anterior. Se tuvo en cuenta también la nota previa que sugería la posibilidad de 'from heaven to turn away his spirit', pero la forma final española preserva el sustantivo y el enlace causal en una sola frase.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este verso no contiene el tetragrámaton.
  - No se introduce 'Cristo' ni 'Mesías'.
  - '''Espíritu'' se usa en sentido abierto, no como una glosa doctrinal específica del Espíritu Santo.'
  - La puntuación y el orden buscan reflejar la formulación bíblica, no una prosa interpretativa.
