- from: «La voz es la voz de Jacob[a], pero las manos son las manos de Esaú». Y no lo reconoció, porque era una desviación[b] desde el cielo para apartar su espíritu.
  to: «La voz es la voz de Jacob[a], pero las manos son las manos de Esaú». Y no lo reconoció, porque era una desviación[b] procedente del cielo para apartar su espíritu.
  rationale: Se hace una reparación menor para mejorar la naturalidad del español sin perder la estructura del Ge'ez ni la decisión auditada en inglés de conservar el sustantivo 'a turning'. 'Procedente del cielo' suena mejor que 'desde el cielo' después de 'desviación'. También se corrige la nota alternativa para que sea útil y menos repetitiva.
