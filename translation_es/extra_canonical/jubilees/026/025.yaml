  text: forever. Whoever curses you will be cursed, and whoever blesses you will be blessed.” And it happened, after Isaac had finished blessing his son Jacob, and after Jacob had gone out from Isaac his father, that he hid himself;[25]
  footnotes:
  - marker: '25'
    text: The source includes a note-like element suggesting Jacob 'hid himself' after leaving Isaac. This detail is retained because it appears in the Ethiopic wording and is characteristic of Jubilees' retelling.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:55Z'
    unchanged: false
    changes_summary: Removed the unsupported phrase 'that he hid himself;' since it is not present in the provided Ge'ez text. Retained the rest with minor punctuation adjustment for completeness and accuracy.
translation:
  language: es
  text: para siempre. Quien te maldiga será maldito, y quien te bendiga será bendito.” Y sucedió que, después de que Isaac terminó de bendecir a su hijo Jacob, y después de que Jacob salió de la presencia de Isaac su padre, se ocultó;[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula final «se ocultó» se conserva porque está atestiguada en la tradición textual auditada y en la restauración establecida para este registro de Jubileos.
    reason: textual_variant
lexical_decisions:
- source_word: ዘይረግመከ
  english_pob_choice: Whoever curses you will be cursed
  chosen_spanish: Quien te maldiga será maldito
  alternatives_spanish:
  - El que te maldiga será maldito
  - Todo el que te maldiga será maldito
  lexicon: curse -> maldecir / maldito
  rationale: 'Conservo la reciprocidad verbal del original y del inglés POB: la acción humana de maldecir recibe la respuesta pasiva ''será maldito''. ''Maldiga'' es natural y digno en español bíblico sin volverlo mecánico.'
- source_word: ወዘይባርከከ
  english_pob_choice: whoever blesses you will be blessed
  chosen_spanish: quien te bendiga será bendito
  alternatives_spanish:
  - el que te bendiga será bendecido
  - todo el que te bendiga será bendito
  lexicon: bless -> bendecir / bendito
  rationale: '''Bendiga / bendito'' mantiene el paralelismo con la primera cola y conserva el tono de fórmula de bendición del texto fuente. ''Bendecido'' también sería posible, pero ''bendito'' refleja mejor la formulación proverbial heredada del pasaje.'
- source_word: እስከ፡ ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: eternity adverb -> para siempre
  rationale: La expresión idiomática en español más transparente y publicable para la duración indefinida es 'para siempre'. No introduce una precisión doctrinal ajena al texto.
- source_word: ወፅአ፡ ያዕቆብ፡ እምይስሐቅ፡ አቡሁ
  english_pob_choice: after Jacob had gone out from Isaac his father
  chosen_spanish: después de que Jacob salió de Isaac, su padre
  alternatives_spanish:
  - después de que Jacob hubiera salido de Isaac, su padre
  - después de que Jacob salió de su padre Isaac
  lexicon: go out from -> salir de
  rationale: Sigo el sentido narrativo del hebreo/Ge'ez reflejado en el inglés auditado, con orden natural en español. 'Isaac, su padre' preserva la relación filial sin sobrecargar la frase.
- source_word: አኅለቀ
  english_pob_choice: had finished
  chosen_spanish: terminó de
  alternatives_spanish:
  - había terminado de
  - acabó de
  lexicon: finish -> terminar
  rationale: '''Terminó de bendecir'' comunica claramente la acción completada y evita un pretérito pluscuamperfecto innecesariamente pesado en español narrativo.'
- source_word: ይባርኮ
  english_pob_choice: blessing
  chosen_spanish: de bendecir
  alternatives_spanish:
  - bendiciendo
  - para bendecir
  lexicon: bless (verbal noun) -> bendecir
  rationale: El infinitivo sustantivado en español expresa bien la acción finalizada sin introducir un sustantivo abstracto que el texto no exige.
- source_word: እምኵራሑ
  english_pob_choice: he hid himself
  chosen_spanish: se ocultó
  alternatives_spanish:
  - se escondió
  - se apartó
  lexicon: hide -> ocultarse
  rationale: La cláusula final aparece en el aparato de la tradición auditada y en la restauración del texto establecido para el registro, por lo que la mantengo. 'Se ocultó' es una opción formal y comprensible, equivalente a 'he hid himself'.
theological_decisions:
- issue: Bendición/maldición recíprocas en forma oracular
  english_pob_reading: Whoever curses you will be cursed, and whoever blesses you will be blessed
  chosen_spanish_reading: Quien te maldiga será maldito, y quien te bendiga será bendito
  alternative_spanish_readings:
  - El que te maldiga será maldito, y el que te bendiga será bendito
  - Todo el que te maldiga será maldito, y todo el que te bendiga será bendito
  rationale: Mantengo la fuerza retributiva del dicho sin suavizarla. La forma breve con 'quien' conserva el carácter proverbial y la simetría del original.
  doctrine_reference: Bendición patriarcal; retribución verbal en la tradición de Génesis/Jubileos
translation_notes:
  revision_awareness: La revisión más reciente del auditor inglés eliminó una frase previamente sostenida por la nota, pero el paquete de auditoría final restablece la cláusula final «that he hid himself;[25]» y reancla la nota textual. Por eso el español conserva «se ocultó» y coloca la referencia al final de esa cláusula, en coherencia con el estado restaurado del registro.
  spanish_consistency_notes:
  - Uso 'Yahvé' no aplica en este versículo.
  - Mantuve 'bendiga/bendito' y 'maldiga/maldito' para conservar el paralelismo verbal y la tonalidad bíblica.
  - '''Se ocultó'' sigue el valor del añadido narrativo de Jubileos tal como queda restaurado en el expediente auditado.'
  - La puntuación reproduce el cierre de cita y la secuencia narrativa de manera natural en español.
