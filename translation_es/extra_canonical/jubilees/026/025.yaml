  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Isaac», «Jacob», «maldiga/maldito», «bendiga/bendito» y «para siempre» son adecuados. La opción «se ocultó» es aceptable para la cláusula restaurada. La principal corrección es sintáctica y de legibilidad, no terminológica.
