  text: 'he cried out with a very great and bitter cry, and said to his father, “Bless me too, father!” And he said to him, “Your brother came with deceit and has taken away your blessings.” And he said, “Now I know why his name was called Jacob: he has supplanted me these two times. First he took my birthright, and now he has taken my blessing.”'
