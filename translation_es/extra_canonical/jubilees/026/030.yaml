    changes_summary: Adjusted 'exceedingly great' to the more natural 'very great.' Changed 'your blessings' to singular 'your blessing' to match the source and the later singular reference.
translation:
  language: es
  text: 'Y gritó con un clamor muy grande y amargo, y dijo a su padre: «¡Bendíceme también a mí, padre!». Y le dijo: «Tu hermano vino con engaño y ha tomado tus bendiciones». Y dijo: «Ahora sé por qué fue llamado Jacob: me ha suplantado estas dos veces. Primero tomó mi primogenitura, y ahora ha tomado mi bendición».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: በቃል፡ ዐቢይ፡ ወመሪር፡ ጥቀ፡
  english_pob_choice: with a very great and bitter cry
  chosen_spanish: con un clamor muy grande y amargo
  alternatives_spanish:
  - con un grito muy grande y amargo
  - con un clamor sumamente grande y amargo
  lexicon: clamor; grande; amargo
  rationale: El ge'ez expresa intensidad del grito y su carácter amargo. «Clamor» comunica mejor un grito fuerte y audible en español bíblico que «grito» sin perder naturalidad; «muy grande y amargo» refleja el grado del original sin sobrerrepresentar con un adverbio más fuerte que el texto.
- source_word: ባርከኒ፡ ኪያየኒ፡ አባ።
  english_pob_choice: Bless me too, father!
  chosen_spanish: ¡Bendíceme también a mí, padre!
  alternatives_spanish:
  - ¡Bendíceme también, padre!
  - ¡Bendíceme a mí también, padre!
  lexicon: bendecir; también; a mí
  rationale: La petición personal enfática del original se conserva con «también a mí». Mantiene el valor de súplica directa sin añadir énfasis ajeno al pasaje.
- source_word: በረከታቲከ
  english_pob_choice: your blessings
  chosen_spanish: tus bendiciones
  alternatives_spanish:
  - tu bendición
  - tus bendiciones
  lexicon: bendición; plural
  rationale: El ge'ez es plural, por lo que el español debe reflejar pluralidad. «Tus bendiciones» conserva la forma plural y evita borrar la tensión textual documentada en el audit trail.
- source_word: ዐዐቀጸኒ
  english_pob_choice: has supplanted me
  chosen_spanish: me ha suplantado
  alternatives_spanish:
  - me ha desplazado
  - me ha arrebatado el lugar
  lexicon: suplantar
  rationale: «Suplantar» reproduce bien la idea de tomar el lugar de otro, que es la fuerza semántica tradicional de la línea. En español suena más natural y preciso que una paráfrasis explicativa.
- source_word: ነሥአ በረከታቲከ / በረከትየ
  english_pob_choice: has taken away your blessing / now has taken my blessing
  chosen_spanish: ha tomado tus bendiciones / ha tomado mi bendición
  alternatives_spanish:
  - ha arrebatado tus bendiciones / ha arrebatado mi bendición
  - ha quitado tus bendiciones / ha quitado mi bendición
  lexicon: tomar; bendición; bendiciones
  rationale: Se conserva el contraste entre el plural de «tus bendiciones» y el singular de «mi bendición» tal como lo distinguen el ge'ez y la revisión crítica reciente. «Tomado» es fiel al verbo básico del texto y mantiene la progresión narrativa.
theological_decisions:
- issue: Plural de 'tus bendiciones' frente a singular de 'mi bendición'
  english_pob_reading: The audit trail initially singularized the first phrase, but the latest correction notes the Ge'ez plural form for 'your blessings' and singular for 'my blessing'.
  chosen_spanish_reading: «Tus bendiciones» en plural, seguido de «mi bendición» en singular.
  alternative_spanish_readings:
  - «Tu bendición» en singular en ambos casos
  - «Tus dones» / «mi don»
  rationale: 'La versión española debe respetar la distinción morfológica señalada por la revisión más reciente: el hablante acusa a su hermano de haber tomado varias bendiciones, mientras después habla de una sola bendición propia. Uniformar ambos términos ocultaría un dato textual importante.'
  doctrine_reference: fidelidad textual; integridad semántica del original
- issue: Nombre llamado 'Jacob' y el verbo 'suplantar'
  english_pob_reading: 'Now I know why his name was called Jacob: he has supplanted me these two times.'
  chosen_spanish_reading: '«Ahora sé por qué fue llamado Jacob: me ha suplantado estas dos veces».'
  alternative_spanish_readings:
  - «... me ha engañado estas dos veces»
  - «... me ha desplazado estas dos veces»
  rationale: «Suplantado» mantiene el juego de sentido tradicional asociado al nombre y a la acción descrita sin reducirla a mera estafa. La frase conserva el vínculo entre el nombre y la acción que el relato destaca.
  doctrine_reference: onomástica narrativa; correspondencia semántica
translation_notes:
  revision_awareness: La revisión más reciente corrige la armonización indebida que había vuelto singular 'your blessing'; por eso se refleja el plural del ge'ez en 'tus bendiciones'. También se conserva la intensidad moderada de 'very great' con 'muy grande', evitando una intensificación excesiva.
  spanish_consistency_notes:
  - Se usa 'bendición/bendiciones' de modo coherente con el contraste singular-plural del texto fuente.
  - «clamor muy grande y amargo» sigue un registro bíblico natural sin calco rígido.
  - Se mantiene 'Jacob' como nombre propio sin transliteración adicional.
  - No se introduce 'Cristo', 'SEÑOR' ni otra terminología ajena al pasaje.
