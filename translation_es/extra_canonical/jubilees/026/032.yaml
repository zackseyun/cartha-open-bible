translation:
  language: es
  text: 'Con grano, vino y aceite lo he sustentado. ¿Y para ti qué puedo hacer ahora, hijo mío? Y Esaú dijo a Isaac su padre: «¿Tienes solo una bendición, padre? ¡Bendíceme también a mí, padre!»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ስርናይ፡ ወወይን፡ ወቅብዕ፡
  english_pob_choice: with grain and wine and oil
  chosen_spanish: con grano, vino y aceite
  alternatives_spanish:
  - con trigo, vino y aceite
  - con cereal, vino y aceite
  lexicon: grano; vino; aceite
  rationale: El etíope enumera provisiones agrícolas generales; el inglés POB optó por una formulación amplia y natural. «Grano» preserva el valor general sin estrecharlo a trigo, y «aceite» mantiene el paralelo alimentario y de sustento.
- source_word: አጽናዕክዎ፡
  english_pob_choice: I have sustained him
  chosen_spanish: lo he sustentado
  alternatives_spanish:
  - lo he fortalecido
  - lo he sostenido
  lexicon: sustentar; sostener
  rationale: La revisión inglesa pasó de «strengthened him» a «sustained him» para expresar provisión y apoyo, no mera fuerza física. «Sustentado» recoge bien esa idea de mantener con provisión.
- source_word: ምንተ፡ እሬሲ፡
  english_pob_choice: what can I do now
  chosen_spanish: qué puedo hacer ahora
  alternatives_spanish:
  - qué haré ahora
  - qué más puedo hacer ahora
  lexicon: hacer; ahora
  rationale: La pregunta expresa impotencia o límite presente. «Qué puedo hacer ahora» sigue de cerca el sentido del texto fuente y la lectura inglesa auditada.
- source_word: በረከት፡
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendición
  - bendición/favor
  lexicon: bendición
  rationale: «Bendición» es la equivalencia natural en español para la raíz de bendecir y conserva el peso patrimonial y narrativo del intercambio entre padre e hijo.
- source_word: ባርከኒ፡ ኪያየኒ፡
  english_pob_choice: Bless me too
  chosen_spanish: Bendíceme también a mí
  alternatives_spanish:
  - Bendíceme también
  - Bendíceme a mí también
  lexicon: bendecir
  rationale: Se mantiene la petición directa e insistente del original. «También a mí» refleja el valor inclusivo y el pedido adicional de Esaú.
theological_decisions:
- issue: '¿Cómo traducir la provisión de grano, vino y aceite: simple sustento o fortalecimiento?'
  english_pob_reading: I have sustained him
  chosen_spanish_reading: lo he sustentado
  alternative_spanish_readings:
  - lo he fortalecido
  - lo he mantenido
  rationale: La nota inglesa revisada entiende estos bienes como medios de manutención. En español, «sustentar» comunica mejor esa provisión concreta sin introducir una idea ajena de fortaleza moral o física.
  doctrine_reference: Providencia y sustento material en la bendición patriarcal
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde «of grain and wine and oil I have strengthened him» a «with grain and wine and oil I have sustained him»; la traducción española sigue esa lectura revisada de provisión y apoyo.
  spanish_consistency_notes:
  - Se usa un registro digno y directo, apto para lectura eclesial.
  - Se evita «SEÑOR» porque el pasaje no contiene el nombre divino; no hay motivo para introducir terminología de sustitución.
  - «Grano» se conserva como término general para no sobreespecificar el cereal.
  - La puntuación reproduce el intercambio dialogal y la exclamación final de Esaú.
