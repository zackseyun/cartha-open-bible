base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/026/034.yaml
  text: shall be your dwelling[34], and from the dew of heaven above. And by your sword you shall live, and you shall serve your brother; and it shall be that when you rebel and remove the yoke from your neck, then you will commit a complete sin unto death,
  footnotes:
  - marker: '34'
    text: This verse is notably difficult and appears expanded in a way unlike Genesis 27:40. The Ge'ez includes language about sin unto death and the removal of Esau's seed from under heaven. The translation reflects that harder reading rather than normalizing it to the Genesis parallel.
    reason: textual_variant
  - marker: a
    text: Or 'when your father leaves you and removes his yoke'.
    reason: previous_rendering
  - marker: b
    text: Or 'commit all sin'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:59Z'
    unchanged: false
    changes_summary: 'Revised the final clause for lexical accuracy and completeness: replaced ''when you become great and shake his yoke from your neck'' with ''when your father leaves you and removes his yoke from your neck'' to reflect the source wording, and replaced ''sin completely'' with ''commit all sin'' to more closely match the text.'
translation:
  language: es
  text: será tu morada, y del rocío del cielo, de lo alto. Y por tu espada vivirás, y servirás a tu hermano; y sucederá que cuando te rebeles y quites el yugo de tu cuello, entonces cometerás un pecado completo hasta la muerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'La lectura de Jubileos aquí es más amplia que Génesis 27:40: conserva la mención del pecado y de la muerte en vez de reducirla al paralelo breve.'
    reason: textual_variant
lexical_decisions:
- source_word: ይኩን፡ ንብረትከ፡
  english_pob_choice: shall be your dwelling
  chosen_spanish: será tu morada
  alternatives_spanish:
  - será tu habitación
  - será tu lugar de morada
  lexicon: nhabret / dwelling
  rationale: El griego/idioma fuente expresa una frase nominal de residencia; en español, «morada» conserva bien el valor de lugar de habitar sin sonar tan técnico como «habitación».
- source_word: ወእምጠለ፡ ሰማይ፡ እምላዕሉ።
  english_pob_choice: and from the dew of heaven above
  chosen_spanish: y del rocío del cielo, de lo alto
  alternatives_spanish:
  - y del rocío del cielo arriba
  - y del rocío de los cielos desde arriba
  lexicon: dew / heaven above
  rationale: Mantiene la imagen concreta del «rocío» y el complemento espacial «de lo alto», que refleja el énfasis del original sin forzar una expresión más bíblica pero menos directa.
- source_word: ወበመጥባኅትከ፡ ትሐዩ፡
  english_pob_choice: And by your sword you shall live
  chosen_spanish: Y por tu espada vivirás
  alternatives_spanish:
  - Y con tu espada vivirás
  - Y mediante tu espada vivirás
  lexicon: sword / live
  rationale: «Por tu espada» reproduce la instrumentación del texto y mantiene el paralelismo con el hebreo de la tradición de Génesis, sin añadir matices ajenos.
- source_word: ወለእኁከ፡ ትትቀነይ፤
  english_pob_choice: and you shall serve your brother
  chosen_spanish: y servirás a tu hermano
  alternatives_spanish:
  - y serás esclavo de tu hermano
  - y estarás sujeto a tu hermano
  lexicon: serve / brother
  rationale: El auditor inglés eligió «serve» para este punto; en español «servirás» conserva la relación de subordinación con menor dureza que «esclavo», pero sin borrar la dependencia implícita del pasaje.
- source_word: ወይኩን፡ አመ፡ አበይከ፡ ወአስሰልከ፡ አርዑተ፡ እምክሳድከ፡
  english_pob_choice: when you rebel and remove the yoke from your neck
  chosen_spanish: cuando te rebeles y quites el yugo de tu cuello
  alternatives_spanish:
  - cuando te rebeles y apartes el yugo de tu cuello
  - cuando te rebeles y saques el yugo de tu cuello
  lexicon: rebel / remove / yoke / neck
  rationale: La revisión auditada corrigió la falsa lectura de «padre»; el sujeto sigue siendo segunda persona. «Quites» expresa bien la remoción del yugo, y «yugo» preserva la imagen de sujeción.
- source_word: ትኤብስ፡ አበሳ፡ ኵሎ፡ ለሞት፡
  english_pob_choice: then you will commit a complete sin unto death
  chosen_spanish: entonces cometerás un pecado completo para muerte
  alternatives_spanish:
  - entonces cometerás un pecado total para muerte
  - entonces cometerás un pecado entero para muerte
  lexicon: complete sin unto death
  rationale: Se mantiene la lectura difícil y no se normaliza a Génesis. «Pecado completo» sigue el valor de ኵሎ con አበሳ, mientras «para muerte» conserva la finalidad/resultado explícito del cierre.
theological_decisions:
- issue: Relación con el paralelo de Génesis 27:40 y la lectura expandida de Jubileos
  english_pob_reading: The translation reflects that harder reading rather than normalizing it to the Genesis parallel.
  chosen_spanish_reading: La traducción conserva la lectura más difícil de Jubileos y no la aplana hacia Génesis.
  alternative_spanish_readings:
  - Se armoniza con Génesis 27:40
  - Se suaviza el final para que coincida con Génesis
  rationale: El testimonio ge'ez añade material sobre pecado y muerte; por fidelidad textual, la versión española debe conservar esa expansión en vez de sustituirla por la forma breve del paralelo bíblico.
  doctrine_reference: Principio de lectio difficilior y prioridad del testimonio textual transmitido
- issue: 'Intensidad de la clausula final: አበሳ፡ ኵሎ፡ ለሞት፡'
  english_pob_reading: commit a complete sin unto death
  chosen_spanish_reading: cometerás un pecado completo para muerte
  alternative_spanish_readings:
  - cometerás todo pecado para muerte
  - cometerás un pecado mortal completo
  rationale: «Completo» preserva la cualidad totalizante del modificador sin convertirlo en una suma de actos. «Para muerte» mantiene el resultado/fin expresado en el texto fuente.
  doctrine_reference: Teología del pecado y su consecuencia judicial en el lenguaje sapiencial/apocalíptico
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente solo en los puntos confirmados por el control de calidad: se rechazó la falsa lectura de «padre» y se conservó la segunda persona; también se evitó normalizar el cierre a Génesis. Donde el control de calidad prefirió «a complete sin» frente a «all sin», la redacción española adoptó «pecado completo» para reflejar la cualidad totalizante sin perder el sustantivo singular del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton ni un equivalente explícito.
  - Se evita «Cristo/Mesías» porque el pasaje no lo contiene.
  - «Yugo» se conserva de forma literal para preservar la imagen de sumisión y liberación del cuello.
  - La clausula final queda deliberadamente difícil, sin armonizarla con el texto paralelo de Génesis.
