revisions:
- from: Y Jacob oyó la voz de Rebeca, su madre, y fue y tomó dos cabritos buenos y gordos, y los llevó a su madre; y su madre los preparó como alimento, tal como él los amaba.
  to: Y Jacob escuchó la voz de Rebeca, su madre, y fue y tomó dos cabritos buenos y gordos, y los llevó a su madre; y su madre los preparó como alimento, como a él le gustaba.
  rationale: Se ajustó «oyó» a «escuchó» para reflejar mejor el matiz de atención del original y del POB inglés. Se reemplazó «tal como él los amaba» por «como a él le gustaba» para evitar una lectura antinatural en español y transmitir con claridad que se refiere al modo de preparación de la comida.
