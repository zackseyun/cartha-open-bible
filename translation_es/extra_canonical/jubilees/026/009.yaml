  yaml_path: translation/extra_canonical/jubilees/026/009.yaml
  text: And Jacob listened to the voice of Rebekah his mother, and he went and took two good, fat young goats and brought them to his mother, and his mother prepared them as food, such as he loved.
  revision_pass:
    model: gpt-5.4
