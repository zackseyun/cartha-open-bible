    unchanged: false
    changes_summary: Replaced 'young kids of the goats' with the more natural and equally accurate 'young goats.'
translation:
  language: es
  text: Y Jacob escuchó la voz de Rebeca, su madre, y fue y tomó dos cabritos buenos y gordos, y los llevó a su madre; y su madre los preparó como alimento, como a él le gustaba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሰምዐ፡ ... ቃለ፡
  english_pob_choice: listened to the voice of
  chosen_spanish: oyó la voz de
  alternatives_spanish:
  - escuchó la voz de
  - prestó atención a la voz de
  lexicon: heard/listened to
  rationale: El ge'ez y el inglés POB expresan recepción atenta de la voz. En español, «oyó la voz de» conserva la cercanía literal sin sonar forzado, y mantiene la imagen de obedecer una voz autorizada.
- source_word: ክልኤተ፡ መሓስአ፡
  english_pob_choice: two good, fat young goats
  chosen_spanish: dos cabritos buenos y gordos
  alternatives_spanish:
  - dos cabritos buenos y cebados
  - dos cabritos buenos, gordos y jóvenes
  lexicon: goats/kids; good; fat
  rationale: La revisión inglesa cambió a «young goats», y el ge'ez permite una referencia a cabritos/cabras jóvenes. «Cabritos» comunica la edad joven con naturalidad en español; «gordos» preserva el valor de «fat» sin necesidad de ampliar excesivamente.
- source_word: ሠናያነ፡ ወ*ስቡሓነ፡
  english_pob_choice: good, fat
  chosen_spanish: buenos y gordos
  alternatives_spanish:
  - buenos y cebados
  - buenos y robustos
  lexicon: good; fat
  rationale: 'Se mantiene la doble cualidad del original: calidad y abundancia de carne. «Gordos» es directo y transparente, y evita suavizar el rasgo físico que el texto destaca.'
- source_word: ወአምጽኦሙ፡ *ኀበ፡ እሙ፡
  english_pob_choice: brought them to his mother
  chosen_spanish: los llevó a su madre
  alternatives_spanish:
  - los trajo a su madre
  - se los llevó a su madre
  lexicon: brought
  rationale: «Llevó» funciona de modo natural en español narrativo y conserva el movimiento hacia la madre. «Trajo» también sería posible, pero «los llevó» evita ambigüedad de perspectiva en un relato secuencial.
- source_word: ወገብረቶሙ፡ እሙ፡ (መብልዐ፡)
  english_pob_choice: his mother prepared them as food
  chosen_spanish: su madre los preparó como alimento
  alternatives_spanish:
  - su madre los preparó para comer
  - su madre los preparó como comida
  lexicon: prepared them as food
  rationale: «Como alimento» conserva el sustantivo amplio del original y del inglés POB, sin reducirlo al coloquialismo de «comida» ni añadir una finalidad que no aparece explícita.
- source_word: ዘከመ፡ ያፈቅር።
  english_pob_choice: such as he loved
  chosen_spanish: tal como él los amaba
  alternatives_spanish:
  - como a él le gustaban
  - tal como le agradaban
  lexicon: loved
  rationale: El ge'ez expresa la cualidad deseada por Jacob. «Amaba» sigue de cerca el inglés POB y preserva la intensidad afectiva; «gustaban» debilitaría la relación semántica.
theological_decisions:
- issue: Naturaleza de la obediencia de Jacob a la voz de su madre
  english_pob_reading: And Jacob listened to the voice of Rebekah his mother
  chosen_spanish_reading: Y Jacob oyó la voz de Rebeca, su madre
  alternative_spanish_readings:
  - Y Jacob escuchó la voz de Rebeca, su madre
  - Y Jacob prestó atención a la voz de Rebeca, su madre
  rationale: El texto describe obediencia narrativa sin elaborar una doctrina de autoridad; la traducción mantiene esa sencillez y no introduce matices exhortativos que el original no requiere.
  doctrine_reference: Narrative obedience in Genesis/Jubilees parallel tradition
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó «young kids of the goats» por «young goats», y por eso se evitó una expresión redundante o demasiado técnica. El español mantiene la naturalidad narrativa y la equivalencia semántica con el ge'ez y la forma inglesa revisada.
  spanish_consistency_notes:
  - Se usa «Rebeca» como forma estándar en español para el nombre propio.
  - Se evita «carnero» o «corderos», porque el texto especifica cabritos/cabras jóvenes.
  - No se emplea puntuación o léxico litúrgico adicional no presente en la fuente.
