  text: and your seed will be uprooted from under heaven.” And Esau hated Jacob because of the blessing with which his father had blessed him, and he said in his heart, “Now let the days of mourning for my father come near, and I will kill Jacob my brother.”
  footnotes:
  - marker: a
    text: Or 'Let the days of mourning for my father come near'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:58Z'
    unchanged: false
    changes_summary: Changed 'come' to 'come near' to more closely reflect the source verb meaning 'draw near/approach.'
translation:
  language: es
  text: 'y tu descendencia será arrancada de debajo del cielo.” Y Esaú aborreció a Jacob a causa de la bendición con que su padre lo había bendecido, y dijo en su corazón: “Ahora, que se acerquen[a] los días del duelo por mi padre, y mataré a Jacob, mi hermano.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora, que lleguen los días del duelo por mi padre».'
    reason: Equivalente a la nota inglesa que preserva la alternativa sin el matiz explícito de «acercarse/venir cerca».
lexical_decisions:
- source_word: ዘርእከ፡
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: seed / offspring / descendants
  rationale: «Descendencia» comunica de manera natural en español bíblico la idea de posteridad, sin caer en un calco duro; conserva el valor colectivo de la expresión.
- source_word: እመትሕተ፡ ሰማይ፡
  english_pob_choice: from under heaven
  chosen_spanish: de debajo del cielo
  alternatives_spanish:
  - de bajo el cielo
  - de debajo de los cielos
  lexicon: under / beneath + heaven
  rationale: «Debajo del cielo» refleja bien la imagen espacial del original y del inglés POB; es idiomático y mantiene la fuerza de expulsión o remoción total.
- source_word: ዔሳው፡
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: proper name
  rationale: Se usa la forma española usual del nombre bíblico, sin alterar la referencia.
- source_word: በእንተ፡ በረከት፡
  english_pob_choice: because of the blessing
  chosen_spanish: a causa de la bendición
  alternatives_spanish:
  - por la bendición
  - por causa de la bendición
  lexicon: because of / on account of
  rationale: «A causa de» expresa la motivación con claridad y mantiene el tono narrativo.
- source_word: ይእዜኒ፡
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: now / even now
  rationale: Se conserva el matiz temporal añadido por la revisión inglesa; «Ahora» hace visible la urgencia del giro interno de Esau.
- source_word: መዋዕለ፡ ላሐ፡ አቡየ፡
  english_pob_choice: the days of mourning for my father
  chosen_spanish: los días del duelo por mi padre
  alternatives_spanish:
  - los días de luto por mi padre
  - el duelo por mi padre
  lexicon: mourning / mourning period
  rationale: «Duelo» comunica el período de lamento por un difunto y suena natural en español bíblico contemporáneo; «luto» sería una alternativa válida y más tradicional.
- source_word: ይብጻሕ፡
  english_pob_choice: let ... come near
  chosen_spanish: se acerquen
  alternatives_spanish:
  - se aproximen
  - lleguen
  lexicon: draw near / approach
  rationale: La revisión inglesa señaló que el verbo implica acercamiento, no solo llegada; en español plural impersonal («se acerquen») conserva el valor exhortativo/subjuntivo.
- source_word: ወእቀትሎ፡
  english_pob_choice: I will kill
  chosen_spanish: y mataré
  alternatives_spanish:
  - y lo mataré
  - y daré muerte a
  lexicon: kill
  rationale: «Mataré» es directo y fiel; el objeto se entiende por el contexto inmediato y se explicita después con «a Jacob, mi hermano».
theological_decisions:
- issue: La bendición paterna como detonante del odio de Esaú
  english_pob_reading: Esau hated Jacob because of the blessing with which his father had blessed him
  chosen_spanish_reading: Esaú aborreció a Jacob a causa de la bendición con que su padre lo había bendecido
  alternative_spanish_readings:
  - Esaú odió a Jacob por la bendición con que su padre lo había bendecido
  rationale: «Aborreció» conserva la intensidad afectiva del inglés POB y del relato, sin suavizarla con «odió», que es posible pero algo menos matizado en registro bíblico.
  doctrine_reference: Narrative ethics; sibling hostility in Genesis/Jubilees tradition
- issue: El tiempo verbal y el marcador temporal 'now'
  english_pob_reading: Now let the days of mourning for my father come near
  chosen_spanish_reading: Ahora que se acerquen los días del duelo por mi padre
  alternative_spanish_readings:
  - Ahora, que se acerquen los días del luto por mi padre
  - Que ahora se acerquen los días del duelo por mi padre
  rationale: La inclusión de «Ahora» responde a la revisión auditada que recupera ይእዜኒ; el subjuntivo exhortativo reproduce la intención volitiva de Esaú en su pensamiento.
  doctrine_reference: Textual and discourse equivalence; internal speech in narrative
translation_notes:
  revision_awareness: La revisión más reciente del audit trail añadió el valor de inmediatez de ይእዜኒ ('now') y cambió 'come' por 'come near'; por eso la traducción incorpora «Ahora» y «se acerquen» para reflejar ambos ajustes. También se mantuvo la violencia deliberada de Esau y la relación causal con la bendición paterna.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; en este versículo no se requiere.
  - Se usa «Esaú» y «Jacob» con formas españolas estándar, y «bendición» conserva el término relacional del relato.
  - «Duelo» se eligió por naturalidad; «luto» queda recogido como alternativa válida en las decisiones léxicas y en la nota.
  - La nota a se ancla únicamente en «acerquen» mediante [a], evitando notas sueltas.
