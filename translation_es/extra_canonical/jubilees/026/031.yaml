translation:
  language: es
  text: 'Y dijo: «¿No me has reservado una bendición, padre?». E Isaac respondió y dijo a Esaú: «Mira, lo he puesto por señor sobre ti, y a todos sus hermanos le he dado por esclavos; y con abundancia[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y con abundancia».
    reason: alternative_reading
lexical_decisions:
- source_word: በረከተ / blessing
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - la bendición
  lexicon: bendición
  rationale: El inglés revisado aclara que el sentido es indefinido («a blessing»), no el artículo definido. En español, «una bendición» conserva esa indefinición y evita sobredeterminar el texto.
- source_word: አግብርተ / servants
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: esclavo
  rationale: La auditoría inglesa ya venía con «servants», pero el valor léxico de la raíz corresponde a una relación de servidumbre/esclavitud. Dado el marco POB, «esclavos» preserva la fuerza del término y evita suavizarla sin base textual.
- source_word: ሤምክዎ / made him lord over you
  english_pob_choice: I have made him lord over you
  chosen_spanish: lo he puesto por señor sobre ti
  alternatives_spanish:
  - lo he hecho señor sobre ti
  - lo he constituido señor sobre ti
  lexicon: señor
  rationale: «Lo he puesto por señor sobre ti» reproduce la idea de establecimiento/nombramiento del inglés y mantiene la relación jerárquica explícita. «Señor» conserva el tono de dominio sin introducir un título más interpretativo.
- source_word: ወበብዝኀ / and with abundance
  english_pob_choice: and with abundance
  chosen_spanish: y con abundancia
  alternatives_spanish:
  - y abundantemente
  - y en abundancia
  lexicon: abundancia
  rationale: Sigo la lectura inglesa reteniendo la frase final abierta. «Con abundancia» es el equivalente más directo y natural en español, sin completar ni reescribir el cierre incompleto del testimonio.
theological_decisions:
- issue: Relación de dominio y servidumbre entre Jacob y Esaú
  english_pob_reading: I have made him lord over you, and I have given all his brothers to him as servants
  chosen_spanish_reading: lo he puesto por señor sobre ti, y a todos sus hermanos le he dado por esclavos
  alternative_spanish_readings:
  - lo he hecho señor sobre ti, y a todos sus hermanos le he dado por siervos
  rationale: Se mantiene la asimetría fuerte del pasaje, sin suavizar «esclavos» a «siervos». Esto conserva la tensión histórica y teológica del texto, y sigue el criterio POB de no diluir términos de servidumbre cuando el original los apoya.
  doctrine_reference: Génesis 27:29, 37:7; Jubileos 26:31
- issue: Frase final truncada/incompleta
  english_pob_reading: and with abundance
  chosen_spanish_reading: y con abundancia
  alternative_spanish_readings:
  - y en abundancia
  rationale: La frase final se conserva sin suplir contenido ausente. Esto respeta la transmisión del texto disponible y evita introducir una conclusión interpretativa que el testimonio no ofrece.
  doctrine_reference: Principio de crítica textual y respeto al testimonio recibido
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió «the blessing» a «a blessing» por precisión léxica y mantuvo la frase final incompleta. La redacción española sigue esa misma revisión: usa artículo indefinido en «una bendición» y conserva «y con abundancia» sin añadir palabras.'
  spanish_consistency_notes:
  - Se usa «bendición» con artículo indefinido para reflejar el ajuste revisado del inglés.
  - Se mantiene «esclavos» para preservar la fuerza léxica del término de servidumbre.
  - Se conserva la clausula final abierta sin expandirla, siguiendo el estado del texto fuente.
