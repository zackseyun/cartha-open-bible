- source_word: ትሰምዕ
  english_pob_choice: was listening
  chosen_spanish: estaba escuchando
  alternatives_spanish:
  - escuchaba
  - oía
  lexicon: N/A
  rationale: El imperfecto continuo de la frase inglesa se reproduce mejor con una perífrasis progresiva en español. «Escuchando» preserva la atención activa del verbo frente a un simple «oía».
- source_word: ይነግር
  english_pob_choice: spoke
  chosen_spanish: hablaba
  alternatives_spanish:
  - decía
  - le hablaba
  lexicon: N/A
  rationale: El ge'ez indica que Isaac estaba hablando; «hablaba» transmite la acción en curso sin exagerar el contenido del habla. «Le hablaba» sería posible, pero el objeto indirecto no está explícito en la fuente.
- source_word: ለዔሳው
  english_pob_choice: to Esau
  chosen_spanish: a Esaú
  alternatives_spanish:
  - a Esau
  lexicon: N/A
  rationale: Se adapta el nombre a la forma castellana habitual «Esaú». La preposición «a» conserva el destinatario de la acción del verbo.
- source_word: ይስሐቅ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaac
  lexicon: N/A
  rationale: Nombre propio bíblico estándar; se mantiene la forma española común.
