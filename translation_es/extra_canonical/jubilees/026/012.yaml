translation:
  language: es
  text: 'Y Jacob entró donde estaba su padre y le dijo: «Yo soy tu hijo; he hecho como me dijiste. Levántate, siéntate y come de lo que he cazado, padre, para que tu alma me bendiga».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወቦአ፡ ያዕቆብ፡ ኀበ፡ አቡሁ፡
  english_pob_choice: And Jacob went in to his father
  chosen_spanish: Y Jacob entró donde estaba su padre
  alternatives_spanish:
  - Y Jacob fue a su padre
  - Y Jacob entró a su padre
  lexicon: ir/entrar + destino relacional
  rationale: El ge'ez expresa movimiento hacia la presencia del padre; en español, «entró donde estaba su padre» comunica bien la llegada sin forzar un calco poco natural.
- source_word: አነ፡ ወልድከ፡
  english_pob_choice: I am your son
  chosen_spanish: Yo soy tu hijo
  alternatives_spanish:
  - Yo soy tu hijo varón
  - Yo soy tu hijo
  lexicon: yo/ser + filiación
  rationale: «Hijo» reproduce de forma directa y clara la relación filial. No hay indicio aquí de un matiz diferente que exija otra palabra.
- source_word: ገበርኩ፡ በከመ፡ ትቤለኒ፡
  english_pob_choice: I have done as you told me
  chosen_spanish: he hecho como me dijiste
  alternatives_spanish:
  - he hecho conforme me dijiste
  - he cumplido lo que me dijiste
  lexicon: hacer como / obedecer
  rationale: La construcción transmite cumplimiento de una instrucción previa; «he hecho como me dijiste» es fiel y natural en español.
- source_word: ተንሥእ፡ ወንበር፡ ወብላዕ፡
  english_pob_choice: Rise, sit, and eat
  chosen_spanish: Levántate, siéntate y come
  alternatives_spanish:
  - Levántate, ponte a la mesa y come
  - Levántate, toma asiento y come
  lexicon: imperativos sucesivos
  rationale: Se mantienen los tres imperativos en el mismo orden y con un nivel de literalidad adecuado. «Siéntate» preserva el mandato de tomar asiento sin añadir elementos no presentes.
- source_word: እምዘ፡ አሰገርኩ፡
  english_pob_choice: from what I have hunted
  chosen_spanish: de lo que he cazado
  alternatives_spanish:
  - de lo que he cazado
  - de la presa que he cazado
  lexicon: cazar / presa
  rationale: El verbo y su objeto se entienden de caza. «De lo que he cazado» conserva la referencia sin sobreespecificar con «presa».
- source_word: ነፍስከ።
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu alma
  - tu vida
  lexicon: nefesh/psyche -> alma
  rationale: La POB inglesa conserva «soul»; en español, «alma» mantiene el paralelo auditivo y la posible tensión antropológica sin suavizarla hacia «vida».
theological_decisions:
- issue: La bendición ligada al interior de la persona (nefesh/ψυχή/נפש)
  english_pob_reading: so that your soul may bless me
  chosen_spanish_reading: para que tu alma me bendiga
  alternative_spanish_readings:
  - para que tu vida me bendiga
  - para que tu ser me bendiga
  rationale: Se preserva la formulación concreta de la fuente y del POB inglés. «Alma» mantiene la tensión antropológica sin interpretarla como simple vitalidad o mera emoción.
  doctrine_reference: Antropología bíblica; bendición paterna en el relato patriarcal
translation_notes:
  revision_awareness: El texto fuente ge'ez y la traducción inglesa POB coinciden de manera alta; no se registran revisiones ni discrepancias textuales relevantes en el expediente. La redacción española sigue el sentido inmediato del versículo sin introducir variantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «hijo» y no «cristiano» o «siervo» porque el contexto es filial y literal.
  - Se conserva la serie de imperativos para reflejar la progresión del mandato original.
