base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/026/023.yaml
  text: full, which the LORD has blessed. And may the LORD give you—and multiply you—from the dew of heaven and from the dew of the earth[23], and abundance of grain and oil may he multiply for you. Let them serve you,
  footnotes:
  - marker: '23'
    text: The phrase rendered 'the dew of the earth' is unusual; some readers may expect 'fatness of the earth' from Genesis. The translation follows the Ge'ez wording here rather than harmonizing.
    reason: alternative_reading
  - marker: a
    text: Or 'and multiply for you'.
    reason: previous_rendering
  - marker: b
    text: Or 'full of blessing[23]'.
    reason: previous_rendering
  - marker: c
    text: Or 'dew of the earth,'.
    reason: previous_rendering
  - marker: d
    text: Or 'Let peoples serve you,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:55Z'
    unchanged: false
    changes_summary: Changed 'nations' to 'peoples' for a more direct and natural rendering of the plural subject addressed in the final clause; otherwise retained the draft.
translation:
  language: es
  text: lleno, el cual Yahvé ha bendecido. Y que Yahvé te dé —y te multiplique— del rocío del cielo y del rocío de la tierra[a], y abundancia de grano y de aceite te multiplique. Que te sirvan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'del rocío de la tierra' es inusual; algunos lectores esperarían 'la grasa de la tierra' por el paralelo de Génesis. Aquí se sigue el ge'ez, sin armonizar.
    reason: alternative_reading
lexical_decisions:
- source_word: ምሉእ
  english_pob_choice: full
  chosen_spanish: pleno
  alternatives_spanish:
  - lleno
  - completo
  lexicon: Geez ምሉእ = full, complete, whole
  rationale: El contexto muestra que modifica el campo/porción bendecida, no que añada un contenido de 'bendición'. 'Pleno' comunica estado de plenitud sin introducir un complemento no sustentado.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD / LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: Divine name rendering YHWH/እግዚአብሔር
  rationale: Siguiendo la convención POB, el nombre divino se vierte como 'Yahvé' en el texto principal, evitando el reemplazo por 'SEÑOR'.
- source_word: ወያብዝኅከ
  english_pob_choice: multiply you
  chosen_spanish: te multiplique
  alternatives_spanish:
  - te multiplique para ti
  - te haga abundar
  lexicon: Geez verb with direct object suffix
  rationale: La forma verbal lleva objeto directo de segunda persona; por eso en español corresponde 'te multiplique', no una construcción preposicional.
- source_word: እምጠለ፡ ሰማይ፡
  english_pob_choice: from the dew of heaven
  chosen_spanish: del rocío del cielo
  alternatives_spanish:
  - de la humedad del cielo
  - del rocío celestial
  lexicon: Geez ጠለ = dew
  rationale: '''Rocío'' es la equivalencia natural y fiel. ''Cielo'' preserva el contraste con la tierra sin suavizar la imagen agrícola.'
- source_word: እም'ጠለ፡ ምድር፡
  english_pob_choice: from the dew of the earth
  chosen_spanish: del rocío de la tierra[a]
  alternatives_spanish:
  - del rocío de la tierra
  - de la humedad de la tierra
  lexicon: Ge'ez wording retained despite Genesis parallel
  rationale: Se mantiene la redacción inusual del ge'ez, sin armonizarla con Génesis. El marcador señala la nota sobre la posible expectativa de 'grasa/fertilidad' de la tierra en tradiciones paralelas.
- source_word: ስርናይ፡
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: Geez term for grain/cereal
  rationale: '''Grano'' refleja el término amplio sin restringirlo indebidamente a una especie específica.'
- source_word: ቅብእ፡
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - óleo
  lexicon: Geez for oil
  rationale: '''Aceite'' es idiomático y claro en español moderno; ''óleo'' sería más litúrgico pero menos natural aquí.'
- source_word: ይትቀነዩ፡ ለከ
  english_pob_choice: Let them serve you
  chosen_spanish: Que te sirvan
  alternatives_spanish:
  - Que te obedezcan
  - Que te rindan servicio
  lexicon: Geez imperfect/jussive with dative
  rationale: El ge'ez no explicita el sujeto plural; en español, la forma impersonal jussiva 'Que te sirvan' conserva esa apertura sin añadir 'pueblos' o 'naciones'.
theological_decisions:
- issue: Uso del nombre divino en lugar de una máscara reverencial
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: La política del proyecto pide traducir el nombre divino de forma transparente. Dado que el texto fuente usa እግዚአብሔር para el nombre divino, 'Yahvé' preserva la referencia auditable.
  doctrine_reference: Tetragrámaton / YHWH
- issue: La frase inusual 'dew of the earth' frente a paralelos conocidos
  english_pob_reading: dew of the earth
  chosen_spanish_reading: rocío de la tierra
  alternative_spanish_readings:
  - grasa de la tierra
  - fertilidad de la tierra
  rationale: Se mantiene la lectura recibida del ge'ez, aun cuando algunos lectores esperen una armonización con Génesis. No se resuelve la tensión por paráfrasis interpretativa.
  doctrine_reference: Crítica textual y principio de no armonización
- issue: Sujeto de 'Let them serve you'
  english_pob_reading: Let them serve you
  chosen_spanish_reading: Que te sirvan
  alternative_spanish_readings:
  - Que los pueblos te sirvan
  - Que las naciones te sirvan
  rationale: La revisión auditada indica que el ge'ez no incluye un sujeto explícito como 'pueblos' o 'naciones'. El español impersonal mantiene esa ambigüedad sin introducir contenido ausente.
  doctrine_reference: Fidelidad sintáctica al texto base
translation_notes:
  revision_awareness: Se incorporó la corrección auditada de 'multiply you' frente a la lectura previa 'multiply for you', y se evitó añadir un sujeto explícito en la cláusula final, conforme a la revisión textual más reciente. También se corrigió el lugar de la nota sobre 'dew of the earth', manteniéndola anclada a la frase relevante.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera consistente para el nombre divino.
  - Se usa 'rocío' para ambos miembros de la pareja 'del cielo / de la tierra' sin suavizar la imagen.
  - Se preserva la ambigüedad del sujeto en 'Que te sirvan' sin introducir 'pueblos' o 'naciones'.
  - El tono es sobrio y publicable, con sintaxis española natural sin perder la estructura del original.
