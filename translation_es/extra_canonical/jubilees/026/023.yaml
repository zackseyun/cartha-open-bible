- from: pleno, el cual Yahvé ha bendecido. Y que Yahvé te dé —y te multiplique— del rocío del cielo y del rocío de la tierra[a], y abundancia de grano y de aceite te multiplique. Que te sirvan.
  to: lleno, el cual Yahvé ha bendecido. Y que Yahvé te dé —y te multiplique— del rocío del cielo y del rocío de la tierra[a], y abundancia de grano y de aceite te multiplique. Que te sirvan.
  rationale: 'Se hace una reparación menor: ''lleno'' mejora la naturalidad y precisión de ምሉእ en español, y la nota se depura para evitar una falsa alternativa repetida mientras conserva la explicación textual documentada por el POB.'
