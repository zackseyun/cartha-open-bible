base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/026/024.yaml
  text: Let nations and peoples bow down to you. Be lord over your brothers, and let your mother’s sons bow down to you. And all the blessing with which God blessed me and blessed Abraham my father—let it be for you and for your seed.
  footnotes:
  - marker: a
    text: Or 'Let peoples bow down to you.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:55Z'
    unchanged: false
    changes_summary: Changed the opening from indicative to jussive ('Let peoples bow down') to better reflect the blessing/wish form; removed 'the LORD' in favor of 'God' for closer lexical correspondence; added final punctuation. Kept 'seed' as a formal rendering.
translation:
  language: es
  text: Que naciones y pueblos se inclinen ante ti. Sé señor sobre tus hermanos, y los hijos de tu madre se inclinen ante ti. Y toda la bendición con que Dios me bendijo y bendijo a Abraham, mi padre, sea para ti y para tu descendencia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አሕዛብ / ወይስግዱ / ሕዝብ
  english_pob_choice: Let nations and peoples bow down to you.
  chosen_spanish: Naciones y pueblos se inclinarán ante ti.
  alternatives_spanish:
  - Naciones y pueblos se postrarán ante ti.
  - Que naciones y pueblos se inclinen ante ti.
  lexicon: nations; peoples; bow down
  rationale: El Ge'ez menciona tanto 'naciones' como 'pueblos'; por eso la traducción los conserva ambos. 'Se inclinarán' comunica el gesto reverente sin introducir necesariamente una connotación litúrgica más fuerte que el texto base.
- source_word: ኩን፡ እግዚአ፡ ለአኀዊከ፡
  english_pob_choice: Be lord over your brothers
  chosen_spanish: Sé señor sobre tus hermanos
  alternatives_spanish:
  - Sé soberano sobre tus hermanos
  - Gobierna sobre tus hermanos
  lexicon: lord; brothers
  rationale: '''Señor sobre'' reproduce la relación de dominio/autoridad del hebreo conceptual y del inglés POB, sin reemplazarlo por un verbo más interpretativo. Se evita ''dueño'' porque sería demasiado posesivo en español.'
- source_word: ውሉደ፡ እምከ፡
  english_pob_choice: your mother’s sons
  chosen_spanish: los hijos de tu madre
  alternatives_spanish:
  - los hijos de tu madre
  - los hijos de tu madre, tus hermanos
  lexicon: sons; mother
  rationale: La expresión literal se mantiene para conservar el paralelismo con 'tus hermanos' y el matiz genealógico del original. 'Tus hermanos' aquí sería posible, pero borraría la repetición deliberada del texto.
- source_word: ወኵሉን፡ በረከት፡ ... ይኩና፡ ለከ፡ ወለዘርእከ፡
  english_pob_choice: And all the blessing ... let it be for you and for your seed.
  chosen_spanish: Y toda la bendición con que Dios me bendijo y bendijo a Abraham, mi padre, sea para ti y para tu descendencia.
  alternatives_spanish:
  - Y toda la bendición ... sea para ti y para tu descendencia
  - Y toda la bendición ... sea tuya y de tu descendencia
  lexicon: blessing; seed
  rationale: '''Toda la bendición'' conserva el singular colectivo del original. ''Descendencia'' es el equivalente español más claro y fiel para ''seed'' en este contexto de promesa dinástica/patrimonial.'
theological_decisions:
- issue: 'Mención divina: ''Dios'' en lugar de una forma de título substitutivo'
  english_pob_reading: God blessed me and blessed Abraham my father
  chosen_spanish_reading: Dios me bendijo y bendijo a Abraham, mi padre
  alternative_spanish_readings:
  - Yahvé me bendijo y bendijo a Abraham, mi padre
  - el Señor me bendijo y bendijo a Abraham, mi padre
  rationale: El texto fuente disponible dice 'Dios' en el audit trail inglés y no requiere una sustitución por el nombre divino. Por fidelidad al expediente y al Ge'ez, se mantiene 'Dios' sin introducir 'Yahvé' o 'Señor' aquí.
  doctrine_reference: Ninguna; decisión lexical/textual sobre el referente divino en esta cláusula.
translation_notes:
  revision_awareness: La revisión más reciente corrigió la apertura para incluir explícitamente 'nations' junto con 'peoples' y cambió la cláusula final de 'the LORD' a 'God'. La versión española incorpora ambas correcciones y mantiene la forma de bendición desiderativa del texto.
  spanish_consistency_notes:
  - Se conserva el paralelismo entre 'hermanos' e 'hijos de tu madre' sin fusionarlos.
  - Se usa 'descendencia' de manera consistente con el POB inglés 'seed'.
  - La apertura se formula en español como enunciado de bendición con valor jussivo implícito, sin añadir un imperativo explícito que no aparece en la sintaxis española natural.
