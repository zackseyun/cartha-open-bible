review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien los elementos principales del ge''ez y del audit trail inglés: incluye tanto ''naciones'' como ''pueblos'', mantiene la estructura de bendición sobre los hermanos y los hijos de la madre, y preserva la cláusula final sobre la bendición dada por Dios a Jacob y a Abraham. Sin embargo, la primera cláusula está en futuro indicativo (''se inclinarán'') cuando el expediente inglés corregido establece una forma yusiva/jusiva de bendición-deseo (''Let ... bow down''). En español, aquí conviene reflejar ese valor exhortativo/optativo.'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, 'Naciones y pueblos se inclinarán ante ti' suena más predictivo que performativo dentro de una bendición patriarcal. La revisión a 'Que naciones y pueblos se inclinen ante ti' mejora la fidelidad semántica y el flujo retórico. El resto del versículo es plenamente legible; solo se ajusta también la capitalización inicial tras ese cambio.
  glossary_alignment: No hay conflicto relevante con la terminología del proyecto. 'Dios' corresponde correctamente al expediente; 'descendencia' es una buena solución española para 'seed' en este contexto; 'señor sobre tus hermanos' es aceptable aunque algo literal, pero sigue siendo fiel y comprensible. No se requieren notas nuevas.
  issues:
  - severity: medium
    issue: La primera cláusula usa futuro indicativo en lugar de una formulación de deseo/bendición.
    rationale: El audit trail inglés fue corregido expresamente a una forma yusiva ('Let nations and peoples bow down to you'). En una bendición patriarcal, el español debe reflejar mejor ese matiz con 'Que ... se inclinen ante ti' o equivalente, no con un simple futuro predictivo.
  revised_spanish_text: Que naciones y pueblos se inclinen ante ti. Sé señor sobre tus hermanos, y los hijos de tu madre se inclinen ante ti. Y toda la bendición con que Dios me bendijo y bendijo a Abraham, mi padre, sea para ti y para tu descendencia.
  revision_rationale: Se ajusta la primera línea, y por paralelismo también la segunda cláusula de inclinación, para expresar el valor de bendición/deseo presente en el ge'ez y documentado en la revisión del inglés POB. No se introducen cambios léxicos adicionales porque el resto del borrador ya es fiel, claro y conforme al expediente.
