translation:
  language: es
  text: Y puso la comida cocida y el pan que había hecho en la mano de Jacob, su hijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወወሀበቶ
  english_pob_choice: And she gave
  chosen_spanish: Y le dio
  alternatives_spanish:
  - Y dio
  - Y le entregó
  lexicon: dar
  rationale: El ge’ez indica una acción simple de entrega; «le dio» conserva la relación directa entre el sujeto femenino y el destinatario sin sobrecargar con matices ajenos.
- source_word: ትብሲሰ
  english_pob_choice: the cooked dish
  chosen_spanish: el plato cocido
  alternatives_spanish:
  - el guiso cocido
  - la comida cocida
  - el alimento cocido
  lexicon: comida / plato
  rationale: El término designa una preparación cocida; «plato cocido» es una solución sobria y publicable que conserva la referencia a un alimento preparado sin especificar indebidamente un tipo de guiso.
- source_word: ወኅብስተ
  english_pob_choice: and the bread
  chosen_spanish: y el pan
  alternatives_spanish:
  - y el pan hecho
  - y el pan que había preparado
  lexicon: pan
  rationale: El ge’ez nombra claramente pan; se mantiene el sustantivo simple para respetar la paralelía con el alimento cocido.
- source_word: ዘገብረት
  english_pob_choice: that she had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que había preparado
  - que había elaborado
  lexicon: hacer / preparar
  rationale: El verbo expresa fabricación o preparación previa; «había hecho» es fiel y natural en español, y conserva el vínculo con lo ya producido por ella.
- source_word: ውስተ፡ እዴ፡
  english_pob_choice: into the hand
  chosen_spanish: en la mano
  alternatives_spanish:
  - en manos de
  - dentro de la mano de
  lexicon: mano
  rationale: La expresión idiomática del original se puede verter literalmente como una colocación en la mano; en español «en la mano de» conserva la imagen concreta sin forzar un giro artificial.
- source_word: ያዕቆብ፡ ወልዳ።
  english_pob_choice: Jacob her son
  chosen_spanish: Jacob su hijo
  alternatives_spanish:
  - Jacob, su hijo
  - a Jacob, su hijo
  lexicon: Jacob / hijo
  rationale: Se conserva la identificación relacional final del destinatario. El español puede omitir la coma sin pérdida de sentido, manteniendo el orden directo del original.
theological_decisions:
- issue: Referencia familiar y agencia materna sin expansión interpretativa
  english_pob_reading: And she gave ... into the hand of Jacob her son.
  chosen_spanish_reading: Y le dio ... en la mano de Jacob su hijo.
  alternative_spanish_readings:
  - Y se lo dio a Jacob, su hijo.
  - Y entregó ... a Jacob, su hijo.
  rationale: El versículo presenta una acción doméstica concreta sin carga doctrinal especial. Se conserva la sencillez narrativa y la relación madre-hijo, evitando añadir explicaciones no presentes en el texto.
  doctrine_reference: No aplica; narración doméstica de Jubileos 26:11
