revisions:
- from: Y le dio el plato cocido y el pan que había hecho, en la mano de Jacob su hijo.
  to: Y puso la comida cocida y el pan que había hecho en la mano de Jacob, su hijo.
  rationale: Se reemplaza «le dio» por «puso» para armonizar con la imagen concreta «en la mano de», y «el plato cocido» por «la comida cocida» para lograr un español más natural y fiel al sentido general de alimento preparado. Se añade coma en aposición en «Jacob, su hijo» para mayor claridad.
  reviewer_model: gpt-5.4
