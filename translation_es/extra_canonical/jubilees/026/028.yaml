translation:
  language: es
  text: 'como me lo mandaste». Entonces Isaac tembló con un temblor muy grande, y dijo: «¿Quién es entonces este que cazó[a] y capturó la presa, y me la trajo, y comí de todo antes de que tú llegaras, y lo bendije?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «que cazó y atrapó caza». El texto de Jubileos conserva aquí dos verbos distintos: uno para cazar y otro para capturar.'
    reason: Preservar la expansión léxica del ge'ez con una nota ubicada en la frase pertinente.
lexical_decisions:
- source_word: ዘነዐወ፡ ወአሥገረ፡
  english_pob_choice: who hunted and caught game
  chosen_spanish: que cazó y atrapó caza
  alternatives_spanish:
  - que cazó game
  - que cazó y capturó caza
  - que cazó y prendió caza
  lexicon: cazar / atrapar
  rationale: El ge'ez usa dos verbos distintos, así que en español conviene conservar la doble acción. «Cazó y atrapó caza» refleja tanto la caza como la captura, sin reducirlo a un solo verbo.
- source_word: ይስሐቅ፡ ድማመ፡ ዐቢየ፡ ጥቀ፡
  english_pob_choice: Isaac trembled with a very great trembling
  chosen_spanish: Isaac tembló con un temblor muy grande
  alternatives_spanish:
  - Isaac se estremeció con un estremecimiento muy grande
  - Isaac fue tomado por un temblor muy grande
  lexicon: temblar / temblor
  rationale: La repetición enfática del original se conserva con «tembló con un temblor muy grande», que suena natural en español y mantiene la fuerza retórica del hebraísmo semítico.
- source_word: መኑ፡ ውእቱ፡ ዝንቱ፡
  english_pob_choice: Who then is this
  chosen_spanish: ¿Quién es entonces este
  alternatives_spanish:
  - ¿Quién es, pues, este
  - ¿Quién era entonces este
  lexicon: quién / este
  rationale: Se conserva el presente «es» y el demostrativo «este» para seguir de cerca la revisión auditada y la deixis del texto.
- source_word: ዘነዐወ፡ ወአሥገረ፡
  english_pob_choice: hunted and caught game
  chosen_spanish: cazó y atrapó caza
  alternatives_spanish:
  - cazó y capturó la caza
  - cazó y prendió la caza
  lexicon: cazar / atrapar
  rationale: «Atrapar» comunica mejor el segundo verbo que una simple repetición de «cazar», y evita ocultar la expansión propia de Jubileos respecto de Génesis.
- source_word: በላዕኩ፡ እምኵሉ፡
  english_pob_choice: I ate of everything
  chosen_spanish: comí de todo
  alternatives_spanish:
  - comí de todo ello
  - comí de todo lo que había
  lexicon: comer / de todo
  rationale: «Comí de todo» sigue la revisión inglesa y mantiene la idiomaticidad en español sin añadir contenido ausente.
theological_decisions:
- issue: Identificación del que bendijo
  english_pob_reading: and I blessed him
  chosen_spanish_reading: y lo bendije
  alternative_spanish_readings:
  - y le bendije
  - y lo bendije a él
  rationale: Se preserva la referencia personal directa del pasaje sin explicitar más allá del contexto narrativo. El objeto directo «lo» es claro y sobrio en español.
  doctrine_reference: Narrative fidelity; no doctrinal harmonization with Genesis beyond the source wording
- issue: Relación con el mandato previo
  english_pob_reading: as you commanded me
  chosen_spanish_reading: como me lo mandaste
  alternative_spanish_readings:
  - como me mandaste
  - tal como me lo ordenaste
  rationale: Se mantiene el carácter de obediencia explícita del discurso, con un verbo natural en español que conserva la relación de mandato.
  doctrine_reference: Narrative obedience wording; source-level correspondence
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la frase inglesa a «who hunted and caught game», así como el cambio a «trembled with a very great trembling» y «I ate of everything». Por eso el español conserva la duplicación verbal, el temblor enfático y la construcción idiomática «comí de todo».
  spanish_consistency_notes:
  - Se usa «cazó y atrapó caza» para reflejar la duplicación verbal del ge'ez.
  - Se conserva el orden narrativo de mandato, temblor, pregunta y bendición.
  - No se introdujo «SEÑOR» ni «Cristo», porque el verso no contiene esos términos.
  - El pronombre objeto «lo» mantiene la referencia al hombre bendecido sin explicaciones añadidas.
