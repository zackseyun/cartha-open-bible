  to: 'Y ahora, hijo mío, escucha mi voz en esto que te mando: ve a tu rebaño y toma para mí dos cabritos buenos; y yo los prepararé como comida para tu padre, como a él le gusta, y se la llevarás a tu padre, y él comerá, y te bendecirá delante de Yahvé antes de morir, y tú serás bendito.'
