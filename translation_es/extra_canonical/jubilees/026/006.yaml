  text: 'And now, my son, listen to my voice in what I command you: go to your flock and take for me two good young goats, and I will prepare them as food for your father, such as he loves, and you shall bring it to your father, and he will eat, and he will bless you before the LORD before he dies, and you shall be blessed.”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:52Z'
    unchanged: false
    changes_summary: Changed 'two good young kids of the goats' to 'two good young goats' for more natural English while preserving the sense. No other changes needed.
translation:
  language: es
  text: 'Y ahora, hijo mío, escucha mi voz en esto que te mando: ve a tu rebaño y toma para mí dos cabritos buenos; y yo los prepararé como comida para tu padre, como a él le gusta, y se la llevarás a tu padre, y él comerá, y te bendecirá delante de Yahvé antes de morir, y tú serás bendito.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ስማዕ / listen
  english_pob_choice: listen to my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - oye mi voz
  - atiende a mi voz
  lexicon: escuchar
  rationale: Conserva el valor directo de atención obediente a la voz paterna, con un español natural y solemne. “Escucha mi voz” refleja mejor la fórmula bíblica que una simple orden genérica.
- source_word: ወልድየ / my son
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: hijo
  rationale: La forma pospuesta “hijo mío” suena más natural en español bíblico y mantiene el tono afectivo e ինտімo del vocativo.
- source_word: ቃልየ / my voice/word
  english_pob_choice: my voice
  chosen_spanish: mi voz
  alternatives_spanish:
  - mi palabra
  lexicon: voz
  rationale: El contexto inmediato muestra que se trata de la voz del hablante en una instrucción oral, no simplemente de “palabra”. Por eso se mantiene “voz” como en el inglés POB.
- source_word: መርዔት / flock
  english_pob_choice: your flock
  chosen_spanish: tu rebaño
  alternatives_spanish:
  - tus ovejas
  - tu hato
  lexicon: rebaño
  rationale: “Rebaño” es el equivalente amplio y comprensible para el conjunto de animales del que se toman las crías. Conserva el registro pastoral del pasaje.
- source_word: כְּבָשִׂים / goats/young goats
  english_pob_choice: two good young goats
  chosen_spanish: dos cabritos buenos
  alternatives_spanish:
  - dos buenos cabritos
  - dos cabritos jóvenes y buenos
  lexicon: cabrito
  rationale: La combinación geez + revisión inglesa apunta a animales jóvenes. En español, “cabritos” comunica naturalidad y edad juvenil sin añadir una idea no sustentada de manera innecesaria.
- source_word: ሠናያነ / good
  english_pob_choice: good
  chosen_spanish: buenos
  alternatives_spanish:
  - de buena calidad
  - selectos
  lexicon: bueno
  rationale: “Buenos” reproduce la valoración cualitativa simple del texto y encaja con el uso idiomático español.
- source_word: መብልዐ / food
  english_pob_choice: food
  chosen_spanish: como comida
  alternatives_spanish:
  - como alimento
  - para comer
  lexicon: comida
  rationale: “Como comida” sigue de cerca la función del sustantivo y conserva la relación con el propósito doméstico del sacrificio culinario.
- source_word: ያፈቅር / he loves
  english_pob_choice: such as he loves
  chosen_spanish: como a él le gusta
  alternatives_spanish:
  - como él ama
  - tal como le agrada
  lexicon: gustar
  rationale: El español requiere una formulación natural para expresar la preferencia gustativa del padre sin perder el sentido de agrado/paladar que transmite el contexto.
- source_word: ይባርከ / he will bless you
  english_pob_choice: he will bless you
  chosen_spanish: te bendecirá
  alternatives_spanish:
  - te dará su bendición
  - te bendecirá a ti
  lexicon: bendecir
  rationale: Se conserva el verbo tradicional “bendecir”, que es exacto y claro en español bíblico.
- source_word: ቅድመ፡ እግዚአብሔር / before the LORD
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: Yahvé
  rationale: Se sigue el principio del proyecto de restaurar el nombre divino en vez de masking con “SEÑOR”. “Delante de Yahvé” expresa presencia testificadora y conserva solemnidad.
theological_decisions:
- issue: Nombre divino en la fórmula de bendición
  english_pob_reading: before the LORD
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante el Señor
  - delante del Señor
  rationale: El texto geez corresponde al tetragrámaton por la convención del proyecto. Mantener “Yahvé” evita ocultar el nombre divino y hace auditable la lectura teológica.
  doctrine_reference: Éxodo 3:15; política terminológica POB para יהוה/YHWH
- issue: Resultado de la bendición paterna
  english_pob_reading: and you shall be blessed
  chosen_spanish_reading: y tú serás bendito
  alternative_spanish_readings:
  - y serás bendecido
  - y quedará sobre ti la bendición
  rationale: “Serás bendito” conserva la pasiva de resultado y el tono bíblico formal del inglés POB, sin perder inteligibilidad en español.
  doctrine_reference: Formulación bíblica de bendición paternal; Génesis 27 en contexto tipológico
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó ‘kids of the goats’ a ‘young goats’ por naturalidad, sin cambiar el sentido. La traducción española refleja esa lectura con ‘cabritos’ y no introduce notas textuales porque no hay variantes auditadas relevantes en el aparato proporcionado.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme a la terminología del proyecto para יהוה.
  - No se usó ‘Cristo’ ni terminología cristológica ajena al pasaje.
  - 'La frase final conserva la doble bendición: por el padre y delante de Yahvé.'
  - ‘Cabritos’ traduce la juventud del animal sin necesidad de añadir ‘pequeños’ o ‘jóvenes’ redundantes.
