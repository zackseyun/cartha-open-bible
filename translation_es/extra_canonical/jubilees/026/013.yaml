translation:
  language: es
  text: 'Y Isaac dijo a su hijo: “¿Cómo es que lo encontraste tan pronto, hijo mío?”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይቤሎ፡ ይስሐቅ፡ ለወልዱ፡
  english_pob_choice: And Isaac said to his son
  chosen_spanish: Y Isaac dijo a su hijo
  alternatives_spanish:
  - Isaac le dijo a su hijo
  - E Isaac dijo a su hijo
  lexicon: dijo / a su hijo
  rationale: El ge'ez expresa el habla de Isaac dirigida a su hijo; en español, "dijo a su hijo" conserva la relación directa sin introducir explicaciones añadidas. Se evita expandir innecesariamente el sujeto con un pronombre objeto si el contexto ya es claro.
- source_word: ም*ንተ፡ ከመዝ፡
  english_pob_choice: How is it that
  chosen_spanish: ¿Cómo es que
  alternatives_spanish:
  - ¿Cómo es posible que
  - ¿Por qué
  lexicon: cómo es que
  rationale: La frase pregunta por la causa o manera del hallazgo rápido. "Cómo es que" reproduce bien la sorpresa/interrogación idiomática del inglés POB sin forzar una paráfrasis más libre.
- source_word: አፍጠንከ፡
  english_pob_choice: you found it so quickly
  chosen_spanish: lo encontraste tan pronto
  alternatives_spanish:
  - lo hallaste tan rápido
  - lo encontraste tan deprisa
  lexicon: encontraste / tan pronto
  rationale: El verbo ge'ez indica encontrar/hallar con rapidez. "Encontraste tan pronto" mantiene el sentido temporal de rapidez y suena natural en español bíblico contemporáneo.
- source_word: ወልድየ።
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijito mío
  lexicon: hijo mío
  rationale: El vocativo final afectivo se expresa mejor como "hijo mío". Conserva el tono familiar y la entonación afectuosa del original sin caer en diminutivo innecesario.
theological_decisions:
- issue: Tono de la pregunta de Isaac
  english_pob_reading: How is it that you found it so quickly, my son?
  chosen_spanish_reading: ¿Cómo es que lo encontraste tan pronto, hijo mío?
  alternative_spanish_readings:
  - ¿Cómo lo encontraste tan pronto, hijo mío?
  - ¿De qué manera lo hallaste tan pronto, hijo mío?
  rationale: No hay carga doctrinal especial en el versículo; la decisión principal es conservar la sorpresa narrativa de Isaac. La formulación española mantiene la misma tensión interrogativa sin añadir juicios interpretativos.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: La revisión más reciente indica high_agreement y sin cambios; el español se alinea estrechamente con el texto fuente y con la traducción POB en inglés, sin introducir variantes textuales ni notas críticas.
  spanish_consistency_notes:
  - Se mantiene el vocativo afectivo "hijo mío" para coherencia narrativa.
  - Se usa "lo encontraste" porque el objeto está implícito en el contexto inmediato, igual que en la traducción inglesa auditada.
  - No se introducen términos teológicos especiales porque el versículo es puramente narrativo.
