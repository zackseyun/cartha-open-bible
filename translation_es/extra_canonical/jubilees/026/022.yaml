translation:
  language: es
  text: 'Y olió el olor fragante[a] de sus vestidos, y lo bendijo y dijo: «Mira, el olor de mi hijo es como el olor de un campo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el olor de sus vestidos».
    reason: Preserva la alternativa documentada en el English POB para esta frase.
lexical_decisions:
- source_word: መዐዛ / fragrant smell
  english_pob_choice: the fragrant smell of his garments
  chosen_spanish: el fragante olor de sus vestidos
  alternatives_spanish:
  - el olor fragante de sus vestidos
  - el olor perfumado de sus vestidos
  - el aroma de sus vestidos
  lexicon: መዐዛ
  rationale: La voz ge'ez añade una idea de fragancia o buen olor, no solo 'olor'. En español, 'fragante olor' conserva esa intensificación sin volver la frase artificial. 'Vestidos' sigue el sentido de las prendas, como en el relato paralelo, y evita estrechar indebidamente el referente.
- source_word: ጼና / smell
  english_pob_choice: smelled
  chosen_spanish: olió
  alternatives_spanish:
  - percibió el olor de
  - aspiró el olor de
  lexicon: ጼና
  rationale: '''Oler'' comunica de forma natural la percepción del aroma y mantiene la concreción del verbo del original. ''Percibió el olor de'' sería más explicativo, pero menos directo.'
- source_word: ባረኮ / blessed him
  english_pob_choice: blessed him
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - lo bendijo con una bendición
  - lo declaró bendito
  lexicon: ባረከ
  rationale: La acción de bendecir está explícita en el texto fuente y el español 'lo bendijo' es claro, sobrio y fiel. No hay base aquí para expandir a una fórmula más interpretativa.
- source_word: ቤ / said
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le dijo
  - y dijo
  lexicon: እቤ
  rationale: '''Dijo'' reproduce la introducción del discurso. Se conserva la forma narrativa estándar en español.'
- source_word: ጼና ... ገዳም / smell of ... field
  english_pob_choice: the smell of a field
  chosen_spanish: el olor de un campo
  alternatives_spanish:
  - el aroma de un campo
  - el olor del campo
  lexicon: ገዳም
  rationale: El texto fuente compara el olor con el de un campo; 'de un campo' mantiene la comparación abierta y literal. 'Del campo' sugeriría un sentido más idiomático y menos marcado por la comparación explícita.
theological_decisions:
- issue: Bendición patriarcal sin lenguaje doctrinal añadido
  english_pob_reading: blessed him
  chosen_spanish_reading: lo bendijo
  alternative_spanish_readings:
  - lo declaró bendito
  - pronunció una bendición sobre él
  rationale: El pasaje describe un acto de bendición paterna/patriarcal. En español, 'lo bendijo' preserva la simpleza narrativa sin introducir una interpretación litúrgica o eclesial no presente en la fuente.
  doctrine_reference: Narrative blessing; no additional doctrinal expansion warranted
translation_notes:
  revision_awareness: Se incorporó la información revisada por el control de calidad que añadió 'fragante' a 'smell', reflejando መዐዛ en el texto ge'ez. La redacción española evita la omisión detectada en la revisión y conserva el cierre de cita completo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se mantiene 'bendijo' en sentido narrativo simple, sin sustituirlo por terminología eclesiástica.
  - Se conserva la comparación 'como el olor de un campo' sin domesticarla a una paráfrasis idiomática.
