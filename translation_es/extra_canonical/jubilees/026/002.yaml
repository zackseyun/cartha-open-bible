translation:
  language: es
  text: Y ahora toma tu equipo de caza, tu aljaba[a] y tu arco, y sal al campo; caza y atrapa presa para mí, hijo mío, y prepárame comida tal como le agrada a mi alma, y tráemela para que yo coma, y mi alma te bendiga antes de que muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carcaj».
    reason: lexical_alternative
lexical_decisions:
- source_word: ንዋየ፡ ነፃዊከ፡ ምትኃደከ፡ ወቀስትከ፡
  english_pob_choice: your hunting gear, your quiver and your bow
  chosen_spanish: tu equipo de caza, tu aljaba y tu arco
  alternatives_spanish:
  - tu equipo de caza, tu carcaj y tu arco
  - tu pertrecho de caza, tu aljaba y tu arco
  lexicon: hunting gear / quiver / bow
  rationale: El ge'ez enumera el equipo de caza y luego dos piezas concretas, una para llevar flechas y otra para dispararlas. 'Aljaba' comunica bien el recipiente de flechas en español; 'carcaj' es una alternativa posible, pero 'aljaba' resulta más clara y reconocible en registro bíblico. 'Equipo de caza' evita reducir el primer sintagma a un solo objeto no explicitado por el texto.
- source_word: ወነዐው፡ ... ወአንዝ፡
  english_pob_choice: and hunt and catch game for me
  chosen_spanish: caza y atrapa presa para mí
  alternatives_spanish:
  - caza y consigue presa para mí
  - anda de caza y captura presa para mí
  lexicon: hunt / catch / game
  rationale: 'La revisión inglesa distinguió dos verbos: ''hunt'' y ''catch''. En español, ''caza y atrapa'' conserva esa duplicación verbal sin colapsarla en una sola idea. ''Presa'' transmite el objeto de la caza de forma natural y más precisa que un genérico como ''animales''.'
- source_word: መብልዐ፡ ዘከመ፡ ታፈቅር፡ ነፍስየ፡
  english_pob_choice: food for me such as my soul loves
  chosen_spanish: comida como la que ama mi alma
  alternatives_spanish:
  - comida tal como ama mi alma
  - manjar como el que ama mi alma
  lexicon: food / soul loves
  rationale: '''Comida'' es suficientemente amplio y natural. ''Ama mi alma'' conserva la expresión semítica sin convertirla en una paráfrasis psicológica; ''manjar'' sería más literal en tono elevado, pero puede sonar más específico de lo que permite el texto.'
- source_word: ወአንዝ፡ ሊተ፡ *ከመ፡ እብላዕ፡
  english_pob_choice: and bring it to me so that I may eat
  chosen_spanish: y tráemela para que yo coma
  alternatives_spanish:
  - y tráemela para que pueda comerla
  - y llévala a mí para que yo coma
  lexicon: bring / eat
  rationale: '''Tráemela'' mantiene el movimiento hacia el hablante y conserva la referencia al alimento ya mencionado. ''Para que yo coma'' reproduce de forma directa el propósito del verbo.'
- source_word: ወተባርከ፡ ነፍስየ፡
  english_pob_choice: and my soul may bless you
  chosen_spanish: y mi alma te bendiga
  alternatives_spanish:
  - y mi alma te bendiga a ti
  - y mi ser te bendiga
  lexicon: bless / soul
  rationale: '''Mi alma'' mantiene la literalidad semítica del texto y la relación interna entre deseo, comida y bendición. No se sustituye por ''mi ser'' porque el español perdería la señal auditable de la expresión original.'
theological_decisions:
- issue: La duplicación verbal 'hunt' + 'catch' no debe fusionarse.
  english_pob_reading: and hunt and catch game for me
  chosen_spanish_reading: caza y atrapa presa para mí
  alternative_spanish_readings:
  - caza presa para mí
  - caza y consigue presa para mí
  rationale: La revisión del audit trail indica que el ge'ez contiene dos verbos distintos. Por eso la traducción española conserva dos acciones coordinadas. Fusionarlas borraría la expansión de Jubileos respecto de Génesis.
  doctrine_reference: No doctrinal issue; textual-expansive fidelity issue.
- issue: '''My soul'' debe mantenerse como expresión semítica y no reinterpretarse.'
  english_pob_reading: my soul loves / my soul may bless you
  chosen_spanish_reading: mi alma ama / mi alma te bendiga
  alternative_spanish_readings:
  - mi corazón ama / mi corazón te bendiga
  - yo te bendiga
  rationale: El texto repite 'alma' dos veces. Mantenerlo en español preserva la textura semítica y evita una normalización psicológica o estilística que borre el paralelismo.
  doctrine_reference: Anthropological language in Semitic idiom; no doctrinal harmonization.
translation_notes:
  revision_awareness: Se incorporó la revisión que distingue dos verbos en la cláusula de caza ('hunt' y 'catch'), evitando la antigua compactación en una sola acción. También se preservó la estructura semítica de 'mi alma' donde el texto la repite.
  spanish_consistency_notes:
  - Se usa 'Y ahora' para corresponder al giro inicial de transición.
  - Se conserva el tono narrativo directo con imperativos en segunda persona singular.
  - No se introdujo 'Señor' ni sustitutos devocionales; el pasaje no contiene el nombre divino.
  - '''Presa'' funciona aquí como objeto de la caza y evita una paráfrasis excesiva.'
