base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/026/007.yaml
  text: And Jacob said to Rebekah his mother[7], “Mother, will I not lack some of all that my father eats and that pleases him? But I am afraid, my mother, that he will recognize my voice and want to touch me. And you know that I am smooth, while Esau my brother is hairy, and I will appear in his eyes like one who mocks him, and I will do a deed that he did not command me, and he will be angry with me, and I will bring on myself a curse and not a blessing.”
  footnotes:
  - marker: '7'
    text: The verse is textually difficult. The Ge'ez seems to say Isaac would recognize or discern what he eats, then shifts to Jacob's fear that Isaac may detect him by his voice and touch. The translation preserves the sense without over-smoothing.
    reason: segmentation_note
  - marker: a
    text: Or 'does not my father recognize everything that he eats and discern it?'.
    reason: previous_rendering
  - marker: b
    text: Or 'that he may not recognize my voice and may not allow me to touch him.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:52Z'
    unchanged: false
    changes_summary: Adjusted 'discerns it' to 'discern it' for agreement, and changed 'may hear my voice' to 'may not recognize my voice' to better reflect the source sense and the following clause.
translation:
  language: es
  text: 'Y Jacob le dijo a Rebeca, su madre: «Madre, ¿no careceré de algo de todo lo que come mi padre y le agrada? Pero temo, madre mía, que él reconozca mi voz y quiera tocarme. Y tú sabes que yo soy lampiño, mientras que Esaú, mi hermano, es velludo; y pareceré ante sus ojos como uno que se burla de él[a], y haré algo que él no me mandó, y se enojará conmigo, y traeré sobre mí una maldición y no una bendición».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como quien hace burla de él».'
    reason: alternative_reading
lexical_decisions:
- source_word: ኢይምሕክ
  english_pob_choice: will I not lack
  chosen_spanish: ¿no me faltará
  alternatives_spanish:
  - ¿no careceré
  - ¿no me faltará algo de
  lexicon: idiomatic negated lack-question
  rationale: El ge’ez usa una construcción idiomática que expresa carencia; por eso el español natural es una pregunta con «faltar», no una paráfrasis de discernimiento.
- source_word: ወያሠምሮ
  english_pob_choice: that pleases him
  chosen_spanish: que le agrada
  alternatives_spanish:
  - que le gusta
  - que le complace
  lexicon: verb of pleasing
  rationale: El sentido confirmado es el de agradar/complacer, no discernir. «Le agrada» conserva dignidad y claridad en español.
- source_word: እፈርህ
  english_pob_choice: I am afraid
  chosen_spanish: temo
  alternatives_spanish:
  - tengo miedo
  - me da miedo
  lexicon: fear expression
  rationale: «Temo» reproduce bien la fuerza verbal directa y funciona con el estilo bíblico sin sonar arcaico.
- source_word: ይፍቅድ
  english_pob_choice: want to touch me
  chosen_spanish: quiera tocarme
  alternatives_spanish:
  - desee tocarme
  - quiera llegar a tocarme
  lexicon: desire/want
  rationale: La revisión del inglés muestra que el verbo expresa querer/desear, no permitir. «Quiera tocarme» refleja esa intención.
- source_word: ይገሥሠኒ
  english_pob_choice: touch me
  chosen_spanish: tocarme
  alternatives_spanish:
  - palparme
  - echarme mano
  lexicon: touch/contact
  rationale: El verbo se refiere al contacto físico; «tocar» es el equivalente español más claro y natural.
- source_word: ልሙጽ
  english_pob_choice: smooth
  chosen_spanish: lampiño
  alternatives_spanish:
  - liso
  - sin vello
  lexicon: hairless/smooth
  rationale: «Lampiño» comunica de manera natural la ausencia de vello en contraste con «velludo».
- source_word: ጸጓር
  english_pob_choice: hairy
  chosen_spanish: velludo
  alternatives_spanish:
  - peludo
  - muy cubierto de pelo
  lexicon: hairy
  rationale: «Velludo» mantiene el contraste físico y es idiomático en español bíblico.
- source_word: ቅድመ አዕይንቲሁ
  english_pob_choice: in his eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - a sus ojos
  - delante de sus ojos
  lexicon: idiom of perception
  rationale: La expresión fija conserva la idea de percepción/juzgamiento de Isaac.
- source_word: ከመ ዘያስተአኪ
  english_pob_choice: like one who mocks him
  chosen_spanish: como uno que se burla de él
  alternatives_spanish:
  - como quien lo engaña
  - como un burlador
  lexicon: mock/deride
  rationale: El contexto pide una conducta vergonzosa y engañosa; «se burla de él» conserva el matiz de ridículo en la versión inglesa.
- source_word: ወእገብር ግብረ
  english_pob_choice: and I will do a deed
  chosen_spanish: y haré una obra
  alternatives_spanish:
  - y haré un acto
  - y cometeré una acción
  lexicon: deed/action
  rationale: «Obra» mantiene el sustantivo abstracto del original sin cargar demasiado el juicio moral, que viene después con la desobediencia.
- source_word: ዘኢ አዘዘኒ
  english_pob_choice: that he did not command me
  chosen_spanish: que él no me mandó
  alternatives_spanish:
  - que no me ordenó
  - que no me encargó
  lexicon: command
  rationale: «Mandó» es una equivalencia directa y natural en español para el mandato paterno.
- source_word: ወአመጽእ ላዕሌየ መርገመ ወአኮ በረከተ
  english_pob_choice: and I will bring on myself a curse and not a blessing
  chosen_spanish: y traeré sobre mí una maldición y no una bendición
  alternatives_spanish:
  - y me acarrearé una maldición y no una bendición
  - y haré venir sobre mí maldición y no bendición
  lexicon: curse/blessing
  rationale: «Traeré sobre mí» conserva la imagen de cargar la consecuencia sobre uno mismo y coincide con el tono solemne del pasaje.
theological_decisions:
- issue: 'Tensión textual en la primera cláusula: la revisión inglesa corrige una mala lectura previa del ge’ez sobre lo que Jacob teme respecto a la comida de su padre y su respuesta.'
  english_pob_reading: Will I not lack some of all that my father eats and that pleases him?
  chosen_spanish_reading: ¿no me faltará algo de todo lo que come mi padre y que le agrada?
  alternative_spanish_readings:
  - ¿no careceré de algo de todo lo que come mi padre y le agrada?
  - ¿no me faltará parte de todo lo que come mi padre y que le agrada?
  rationale: 'La versión española sigue la lectura corregida del audit trail: Jacob pregunta por la falta de comida apropiada, no por reconocimiento de discernimiento. Se conserva la doble referencia a lo que su padre come y a lo que le agrada.'
  doctrine_reference: Jubilees 26:7; textual audit revision 2026-04-28
- issue: 'Fuerza de la negativa en la cláusula del temor: el ge’ez expresa que Isaac sí podría reconocer la voz de Jacob.'
  english_pob_reading: that he may not recognize my voice and may not allow me to touch him.
  chosen_spanish_reading: que él reconozca mi voz y quiera tocarme
  alternative_spanish_readings:
  - que él no reconozca mi voz y no quiera tocarme
  - que me reconozca por mi voz y quiera tocarme
  rationale: 'La traducción evita invertir la negación: Jacob teme precisamente el reconocimiento de la voz y el contacto físico, como exige el comentario de revisión.'
  doctrine_reference: Jubilees 26:7; textual audit revision 2026-04-28
- issue: Caracterización de Jacob como ‘smooth’ frente a Esaú como ‘hairy’.
  english_pob_reading: I am smooth, while Esau my brother is hairy
  chosen_spanish_reading: yo soy lampiño, mientras que Esaú, mi hermano, es velludo
  alternative_spanish_readings:
  - yo soy liso, mientras que Esaú, mi hermano, es peludo
  - yo soy sin vello, mientras que Esaú, mi hermano, es muy velludo
  rationale: Se mantiene el contraste corporal directo sin suavizarlo teológicamente o narrativamente.
  doctrine_reference: Jubilees 26:7
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail que corrige la primera cláusula a una pregunta sobre carencia de lo que Isaac come y le agrada, y la segunda a la expectativa de que Isaac reconozca la voz de Jacob y quiera tocarlo. También se respetó la advertencia de que el texto ge’ez es difícil y no debe sobre-suavizarse.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - Se prefirió «esclavo/siervo» solo cuando el léxico lo exija; aquí no aplica.
  - Se mantuvo el registro bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - Se conservaron los contrastes físicos y emocionales del pasaje para no borrar la tensión narrativa.
