translation:
  language: es
  text: 'Y vino y bebió. Y su padre Isaac le dijo: «Acércate y bésame, hijo mío». Y él se acercó y lo besó.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይን፡ ወሰትየ።
  english_pob_choice: wine, and he drank.
  chosen_spanish: Y vino y bebió.
  alternatives_spanish:
  - Y trajo vino y bebió.
  - Y bebió vino.
  lexicon: vino
  rationale: El ge'ez presenta la acción del vino y el acto de beber, y el inglés POB la refleja con dos verbos breves. En español, «Y vino y bebió» conserva la concisión y la secuencia narrativa del texto base, aunque «vino» puede sonar menos explícito que «vino [vino]»; la alterna «Y bebió vino» explicita mejor el objeto pero altera el orden. Dado que el contexto inmediato hace claro que se trata de vino, la forma breve es aceptable.
- source_word: ወይቤሎ፡ ይስሐቅ፡ አቡሁ፡
  english_pob_choice: And Isaac his father said to him,
  chosen_spanish: 'Y su padre Isaac le dijo:'
  alternatives_spanish:
  - 'Y Isaac su padre le dijo:'
  - 'Y su padre Isaac habló y le dijo:'
  lexicon: dijo
  rationale: Se mantiene la relación de posesión/filiación («su padre Isaac») como en el inglés POB, sin añadir determinaciones interpretativas. «Dijo» reproduce el verbo de habla directo del original de forma natural en español.
- source_word: ቅረበኒ፡' ወስዐመኒ፡ ወልድየ፡
  english_pob_choice: “Come near and kiss me, my son.”
  chosen_spanish: «Acércate y bésame, hijo mío».
  alternatives_spanish:
  - «Ven cerca y bésame, hijo mío».
  - «Acércate a mí y bésame, hijo mío».
  lexicon: acércate / bésame
  rationale: «Acércate» es el equivalente idiomático natural de «Come near» y preserva la cercanía física implícita. «Bésame» sigue directamente el mandato afectuoso del original y del POB. «Hijo mío» traduce de manera afectiva y sobria el vocativo filial.
- source_word: ወቀርበ፡' ወስዐሞ።
  english_pob_choice: And he came near and kissed him.
  chosen_spanish: Y él se acercó y lo besó.
  alternatives_spanish:
  - Y se acercó y le besó.
  - Y él vino cerca y le besó.
  lexicon: se acercó / lo besó
  rationale: Se conserva la repetición narrativa del movimiento y del beso, como en el inglés POB. «Lo besó» refleja el pronombre de objeto directo natural en español. La variante con «le» sería posible por leísmo en algunas zonas, pero no es preferible en un texto de alcance panhispánico.
theological_decisions:
- issue: Retrato de la bendición/paternidad en una escena de reconocimiento afectuoso
  english_pob_reading: Isaac his father said to him, “Come near and kiss me, my son.”
  chosen_spanish_reading: 'Y su padre Isaac le dijo: «Acércate y bésame, hijo mío».'
  alternative_spanish_readings:
  - 'Y su padre Isaac le dijo: «Acércate y abrázame, hijo mío».'
  - 'Y su padre Isaac le dijo: «Acércate y dame un beso, hijo mío».'
  rationale: No hay una carga doctrinal adicional en el versículo más allá del gesto afectuoso y de reconocimiento entre padre e hijo. Se evita intensificar la escena con «abrázame», porque el original y el POB hablan específicamente de un beso, no de un abrazo. «Bésame» conserva la evidencia textual y el tono familiar sin sobreinterpretación.
  doctrine_reference: No aplica; escena narrativa familiar sin doctrina explícita.
translation_notes:
  revision_awareness: El paso más reciente indica que no hubo cambios necesarios y que el acuerdo con la fuente es alto. Por ello, la versión española sigue de cerca la secuencia breve del texto ge'ez y la formulación ya validada en el inglés POB, sin introducir notas de variante ni decisiones textuales adicionales.
  spanish_consistency_notes:
  - Se usa un español neutral y panhispánico, con puntuación de diálogo estándar.
  - Se mantiene el vocativo «hijo mío» por fidelidad afectiva y claridad.
  - No se introduce «SEÑOR» ni terminología teológica ajena, porque este versículo no contiene el nombre divino ni otros términos doctrinalmente cargados.
