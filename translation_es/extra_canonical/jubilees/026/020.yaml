lexical_decisions:
- source_word: እምዘ፡
  english_pob_choice: from your game
  chosen_spanish: de tu comida
  alternatives_spanish:
  - de tu caza
  - de lo que cazaste
  lexicon: Leslau
  rationale: El contexto inmediato alude a la comida preparada a partir de lo cazado; en español, “de tu comida” conserva el sentido resultante y evita un calco extraño de “juego/caza” sin apoyo contextual adicional.
- source_word: አደንከ፡
  english_pob_choice: your game
  chosen_spanish: tu comida
  alternatives_spanish:
  - tu caza
  - tu presa
  lexicon: Leslau
  rationale: La palabra ge'ez denota lo cazado o conseguido en la caza. Como el español necesita una expresión natural que anticipe el alimento servido, “tu comida” funciona aquí como equivalencia contextual sin perder la referencia al acto previo de cazar.
- source_word: ነፍስየ፡
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: Leslau
  rationale: Se conserva el valor antropológico de “alma”, que corresponde a la formulación bíblica tradicional y al paralelo del inglés POB; “mi vida” sería más interpretativo y suavizaría la fuerza de la bendición deseada.
- source_word: ወአቅረበ፡
  english_pob_choice: and he brought it near to him
  chosen_spanish: Y se lo acercó
  alternatives_spanish:
  - Y lo acercó a él
  - Y lo llevó hasta él
  lexicon: Leslau
  rationale: El verbo indica acercar algo a una persona. En español, “se lo acercó” mantiene la relación direccional y la brevedad del original, además de evitar una repetición pesada del pronombre objeto indirecto.
- source_word: ወበልዐ፡
  english_pob_choice: and he ate
  chosen_spanish: y comió
  alternatives_spanish:
  - y lo comió
  - y después comió
  lexicon: Leslau
  rationale: La acción es simple y directa; no requiere objeto explícito en español porque el alimento está implícito por el contexto inmediato.
- source_word: ወአብአ፡ ሎቱ፡
  english_pob_choice: and he brought him
  chosen_spanish: y se lo trajo a él
  alternatives_spanish:
  - y se lo llevó a él
  - y lo trajo a él
  lexicon: Leslau
  rationale: 'El audit trail muestra una tensión de segmentación: el objeto léxico completo aparece en el verso siguiente. En español se mantiene la referencia abierta con un pronombre neutro (“se lo”) y un dativo explícito (“a él”) para preservar la conexión sintáctica sin inventar un objeto léxico no visible en este segmento.'
theological_decisions:
- issue: Segmentación del objeto final entre versículos
  english_pob_reading: The object of this verb ('wine') appears at the beginning of the following verse due to a segmentation split.
  chosen_spanish_reading: El objeto final queda aludido, no explicitado, porque pertenece al verso siguiente por la división de segmento.
  alternative_spanish_readings:
  - y se lo trajo a él
  - y lo trajo a él
  rationale: La evidencia auditada indica que el complemento directo real no pertenece a este segmento. Por eso el español evita cerrar la frase con un objeto inventado y deja una forma abierta que enlace con el contenido del siguiente versículo.
  doctrine_reference: Textual segmentation / verse-boundary handling
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje final auditado y refleja la corrección de la segmentación: el cierre verbal no debe completarse con un objeto inexistente en este versículo. Se prefirió una solución española que mantenga abierta la referencia para enlazar naturalmente con el siguiente segmento.'
  spanish_consistency_notes:
  - Se mantiene “alma” para ነፍስ, siguiendo el valor bíblico habitual y la decisión inglesa.
  - Se usa un equivalente contextual para አደንከ, porque el segmento en español requiere una referencia comprensible a la comida ya preparada a partir de la caza.
  - La nota al pie conserva la tensión de segmentación documentada en el audit trail y no la resuelve por conjetura en el texto principal.
