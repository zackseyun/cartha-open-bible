  text: 'Y Jacob se acercó a Isaac, su padre, y lo palpó, y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወቀርበ፡
  english_pob_choice: came near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - vino cerca
  lexicon: acercarse
  rationale: El geʽez expresa proximidad física concreta. «Se acercó» conserva la sencillez narrativa del inglés POB y suena natural en español sin añadir matices no presentes en el texto.
- source_word: ያዕቆብ፡
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  lexicon: Jacob
  rationale: Se conserva el nombre bíblico tradicional en español. No hay indicio en el expediente de una forma alternativa que deba imponerse.
- source_word: ኀበ፡ ይስሐቅ፡ አቡሁ፡
  english_pob_choice: Isaac his father
  chosen_spanish: Isaac, su padre
  alternatives_spanish:
  - a Isaac, su padre
  - ante Isaac, su padre
  lexicon: Isaac / padre
  rationale: La relación posesiva se mantiene de forma directa y clara en español. El orden con coma reproduce la aposición narrativa del original.
- source_word: ወገሰ*ሶ፡
  english_pob_choice: he felt him
  chosen_spanish: lo palpó
  alternatives_spanish:
  - lo tocó
  - lo sintió
  lexicon: palpar
  rationale: El verbo geʽez indica comprobación por tacto, no simple contacto. «Palpó» comunica mejor la acción concreta de examinar con las manos que «tocó», y evita sobreinterpretar el alcance perceptivo de «sintió».
- source_word: ወይቤ።
  english_pob_choice: said
  chosen_spanish: 'dijo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'y exclamó:'
  lexicon: decir
  rationale: La clausula introductoria final queda abierta con dos puntos, pues el verso continúa la cita en el siguiente versículo. Mantiene el flujo narrativo del texto fuente.
theological_decisions:
- issue: Percepción táctil de Isaac para verificar la identidad de Jacob
  english_pob_reading: he felt him
  chosen_spanish_reading: lo palpó
  alternative_spanish_readings:
  - lo tocó
  - lo sintió
  rationale: No se espiritualiza ni se suaviza la escena; se conserva la comprobación física explícita. «Palpar» preserva la tensión narrativa del pasaje al mostrar una inspección corporal deliberada.
  doctrine_reference: Ninguna; decisión narrativa y lexical.
translation_notes:
  revision_awareness: El expediente indica acuerdo alto con la traducción inglesa existente y ningún cambio requerido en la revisión más reciente; por eso el borrador sigue de cerca la lectura auditada sin introducir variantes no justificadas.
  spanish_consistency_notes:
  - Se mantiene «Jacob» e «Isaac» como formas bíblicas estándar en español.
  - Se usa un registro sobrio y bíblico, pero no arcaizante.
  - No se añaden palabras como «SEÑOR» o glosas interpretativas porque el versículo no contiene nombres divinos ni términos teológicamente disputados en este fragmento.
