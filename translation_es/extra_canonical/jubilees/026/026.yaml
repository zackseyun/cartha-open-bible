translation:
  language: es
  text: 'Y Esaú, su hermano, volvió de cazar. Él también preparó comida y la llevó a su padre, y le dijo a su padre: «Que se levante mi padre y coma de mi caza, para que tu alma me bendiga».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በጽሐ
  english_pob_choice: came in
  chosen_spanish: vino
  alternatives_spanish:
  - entró
  - llegó
  lexicon: Geez በጽሐ
  rationale: El contexto narra el regreso de Esaú desde la caza; en español, «vino» comunica adecuadamente el movimiento de retorno sin forzar una estructura demasiado literal que suene extraña.
- source_word: እምነዓዊሁ
  english_pob_choice: from his hunting
  chosen_spanish: de su caza
  alternatives_spanish:
  - de su cacería
  - de cazar
  lexicon: Geez ነዓዊ
  rationale: «Caza» mantiene la relación directa con la actividad de Esaú y coincide con el valor natural de la escena; «cacería» sería posible, pero aquí suena algo más explicativo.
- source_word: ውእቱሂ
  english_pob_choice: he also
  chosen_spanish: También él
  alternatives_spanish:
  - y él también
  - él también
  lexicon: Geez ውእቱሂ
  rationale: La partícula enfatiza que Esaú, además, hizo algo paralelo; «También él» conserva bien ese valor enfático en español.
- source_word: መብልዐ
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - alimento
  - manjar
  lexicon: Geez መብልዕ
  rationale: «Comida» es el equivalente más claro y natural en este contexto narrativo; «alimento» sería más formal y menos directo.
- source_word: ይትነሣእ
  english_pob_choice: Let ... arise
  chosen_spanish: Que se levante
  alternatives_spanish:
  - Que mi padre se ponga de pie
  - Que mi padre se alce
  lexicon: Geez ይትነሣእ
  rationale: «Que se levante» reproduce la petición con buena naturalidad y conserva el movimiento físico implícito en el verbo sin añadir más explicación que la requerida por el español.
- source_word: እመሥገርትየ
  english_pob_choice: from my game
  chosen_spanish: de mi caza
  alternatives_spanish:
  - de lo que he cazado
  - de mi presa
  lexicon: Geez መሥገርት
  rationale: Se preserva la referencia a lo obtenido por caza con una expresión breve y fiel; «presa» sería válida, pero puede sonar más técnica o restringida.
- source_word: ትባርከኒ
  english_pob_choice: your soul may bless me
  chosen_spanish: tu alma me bendiga
  alternatives_spanish:
  - tu alma pueda bendecirme
  - me bendiga tu alma
  lexicon: Geez ባረከ
  rationale: Se mantiene «alma» porque el texto fuente habla explícitamente de la «alma» del padre, no de una simple fórmula idiomática; esto preserva la tensión semántica del original y su posible fuerza afectiva.
theological_decisions:
- issue: La expresión «tu alma» como sujeto de la bendición
  english_pob_reading: so that your soul may bless me
  chosen_spanish_reading: para que tu alma me bendiga
  alternative_spanish_readings:
  - para que tú me bendigas
  - para que tu ser me bendiga
  rationale: El texto fuente atribuye la bendición al «alma» del padre; no se normaliza a «tú» para evitar borrar el matiz antropológico del original.
  doctrine_reference: Antropología bíblica y lenguaje del alma en narrativas patriarcales
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «rise» por «arise» para un registro ligeramente más formal; el español adopta un equivalente igualmente formal y natural, «que se levante», sin alterar el sentido narrativo. No se introdujeron notas textuales ni variantes porque el paquete fuente no aporta una tensión textual adicional para esta línea.
  spanish_consistency_notes:
  - Se usa «Esaú» para el nombre propio de forma consistente con el español bíblico estándar.
  - Se mantiene «tu alma» sin sustituirlo por una formulación más idiomática, para respetar el dato semántico del original.
  - Se prefiere un registro sobrio y publicable, evitando un calco excesivo del inglés.
