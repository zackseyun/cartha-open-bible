translation:
  language: es
  text: Él será bendito, y toda su descendencia para siempre.” Y aconteció que, cuando Esaú oyó las palabras de su padre Isaac,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቡሩከ፡ ይኩን፡
  english_pob_choice: Blessed shall he be
  chosen_spanish: Bendito será él
  alternatives_spanish:
  - Será bendecido
  - Sea bendito
  lexicon: bary/እምቤ
  rationale: 'La forma desiderativo-oracular de la bendición se conserva mejor en español con una construcción adjetival y futuro: ‘Bendito será él’. Evita la calca de ‘él será bendecido’ y mantiene el tono solemne del enunciado.'
- source_word: ወኵሉ፡ ዘርኡ፡ እስከ፡ ለዓለም።
  english_pob_choice: and all his seed forever
  chosen_spanish: y toda su descendencia para siempre
  alternatives_spanish:
  - y toda su simiente para siempre
  - y toda su posteridad para siempre
  lexicon: seed/descendencia
  rationale: ‘Descendencia’ comunica de forma natural el sentido genealógico de ‘seed’ en español bíblico contemporáneo sin perder el alcance colectivo y duradero del original. ‘Simiente’ sería más literal pero menos claro para lector general.
- source_word: ወኮነ፡ ሶበ፡
  english_pob_choice: And it happened, when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y sucedió que, cuando
  - Y fue así que, cuando
  lexicon: formula narrativa
  rationale: La fórmula narrativa se mantiene con una equivalencia formal y fluida. ‘Aconteció que’ reproduce bien el giro de transición del relato y conserva el registro bíblico sin sonar arcaico.
- source_word: ነገረ፡
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas dichas
  - el dicho
  lexicon: word(s)
  rationale: ‘Palabras’ es la traducción directa y más natural en español para el contenido verbal oído por Esaú. Mantiene la referencia concreta a lo pronunciado por Isaac.
- source_word: አቡሁ፡ ይስሐቅ፡
  english_pob_choice: his father Isaac
  chosen_spanish: de su padre Isaac
  alternatives_spanish:
  - de su padre, Isaac
  - de su padre, el Isaac
  lexicon: kinship relation
  rationale: Se conserva la relación de parentesco sin añadir explicaciones. El orden español ‘de su padre Isaac’ fluye naturalmente y preserva la identificación del hablante.
theological_decisions:
- issue: La fórmula de bendición sobre la descendencia eterna
  english_pob_reading: Blessed shall he be, and all his seed forever.
  chosen_spanish_reading: Bendito será él, y toda su descendencia para siempre.
  alternative_spanish_readings:
  - Será bendecido y toda su descendencia para siempre.
  - Sea bendito él, y toda su descendencia para siempre.
  rationale: No hay necesidad de suavizar la durabilidad de la bendición. La redacción mantiene el valor pactal y genealógico del texto, con una tonalidad de promesa solemne.
  doctrine_reference: Bendición patriarcal / promesa de descendencia
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que prefirió una apertura más formal y natural ('Blessed shall he be') y mantuvo 'words' para ነገረ, además de la transición narrativa 'And it happened, when...'. No se introdujeron notas textuales porque el paquete fuente no documenta variantes en este versículo.
  spanish_consistency_notes:
  - Se usa ‘bendito’ en lugar de ‘bienaventurado’ porque aquí se trata de la fórmula de bendición sobre una persona y su linaje, no de una bienaventuranza moral general.
  - Se evita ‘simiente’ para facilitar la lectura pública en español, aunque se reconoce su cercanía semántica bíblica.
  - La narración conserva una cadencia bíblica sobria sin depender de arcaísmos como ‘aconteció’ como si fueran fórmulas obligatorias en toda la obra.
