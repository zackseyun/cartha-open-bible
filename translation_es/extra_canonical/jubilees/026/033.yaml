lexical_decisions:
- source_word: ዔሳው / Esau
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: nombre propio
  rationale: Nombre propio bíblico en forma española estable y reconocible; conserva la referencia exacta sin necesidad de adaptación adicional.
- source_word: ቃሎ፡ ወበከየ።
  english_pob_choice: raised his voice and wept
  chosen_spanish: alzó su voz y lloró
  alternatives_spanish:
  - levantó su voz y lloró
  - alzó la voz y lloró
  lexicon: expresión verbal
  rationale: La combinación hebreo-geeza corresponde a una elevación de voz seguida de llanto; 'alzó su voz' mantiene el valor idiomático y 'lloró' preserva el acto explícito sin intensificarlo más de lo que permite el texto.
- source_word: ይስሐቅ፡ ... ወይቤሎ፡
  english_pob_choice: Isaac answered and said to him
  chosen_spanish: Isaac le respondió y le dijo
  alternatives_spanish:
  - Isaac respondió y le dijo
  - Isaac le contestó y dijo
  lexicon: fórmula narrativa
  rationale: Se mantiene la fórmula de respuesta con pronombre dativo explícito para claridad natural en español y fidelidad al movimiento narrativo del original.
- source_word: እምጠለ፡ ምድር፡
  english_pob_choice: away from the dew of the earth
  chosen_spanish: lejos del rocío de la tierra
  alternatives_spanish:
  - apartado del rocío de la tierra
  - lejos de la humedad de la tierra
  lexicon: preposición de separación
  rationale: La revisión inglesa ya decidió que እም aquí expresa separación/salida ('away from'), no solo origen. 'Lejos de' reproduce bien esa fuerza en español sin borrar la relación con 'rocío de la tierra'.
theological_decisions:
- issue: La frase queda incompleta en el testimonio fuente proporcionado
  english_pob_reading: left the verse incomplete as in the source excerpt provided
  chosen_spanish_reading: se deja la cláusula final abierta, conforme al extracto fuente
  alternative_spanish_readings:
  - completar inferencialmente la frase
  - suavizar con puntos suspensivos sin indicar apertura textual
  rationale: El paquete fuente termina abruptamente y la revisión inglesa preservó esa incompletitud. En español se conserva la apertura sin reconstruir contenido no atestiguado.
  doctrine_reference: Principio de fidelidad textual y no ampliación del testimonio disponible
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que corrigió 'from the dew of the earth' a 'away from the dew of the earth' para reflejar mejor el valor de separación de እም en este contexto, y mantiene la clausula final incompleta tal como aparece en el extracto proporcionado.
  spanish_consistency_notes:
  - Se usa 'Esaú' y 'Isaac' en formas españolas estándar y consistentes con el resto de la tradición bíblica en español.
  - Se conserva 'rocío de la tierra' en lugar de generalizar a 'humedad' para no perder la imagen concreta del original.
  - La abertura con comillas se deja sin cierre para reflejar que el pasaje fuente está truncado.
