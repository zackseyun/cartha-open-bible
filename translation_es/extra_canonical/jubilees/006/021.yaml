base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/021.yaml
  text: 'as a command for them: one day in the year, in this month, they shall celebrate the festival. For it is the Feast of Weeks, and it is the Feast of Firstfruits. It is of two kinds and of a double nature.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:49Z'
    unchanged: false
    changes_summary: Capitalized formal festival names for register and revised the final sentence from 'This festival is twofold and of two kinds' to 'It is of two kinds and of a double nature' for more natural English while preserving the repeated twofold expression in the source.
translation:
  language: es
  text: 'como mandamiento para ellos: un día en el año, en este mes, celebrarán la fiesta. Porque es la Fiesta de las Semanas, y es la Fiesta de las Primicias. Es de dos clases y de doble naturaleza.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ትእዛዝ
  english_pob_choice: as a command for them
  chosen_spanish: como mandamiento para ellos
  alternatives_spanish:
  - como orden para ellos
  - como precepto para ellos
  lexicon: mandamiento
  rationale: El contexto indica una instrucción normativa, no solo una orden momentánea. 'Mandamiento' conserva la fuerza prescriptiva del original y encaja bien en español bíblico sin volverse arcaico.
- source_word: ዕለተ አሐተ ለዓመት
  english_pob_choice: one day in the year
  chosen_spanish: un día en el año
  alternatives_spanish:
  - un día al año
  - un solo día en el año
  lexicon: día
  rationale: La expresión remite a una celebración anual de un solo día; 'en el año' sigue de cerca la sintaxis del original y mantiene la referencia temporal precisa.
- source_word: በዝ ወርኅ
  english_pob_choice: in this month
  chosen_spanish: en este mes
  alternatives_spanish:
  - en este mes de él
  - durante este mes
  lexicon: mes
  rationale: La deíxis del original se preserva de forma directa con 'este mes', sin añadir especificación que el pasaje no ofrece aquí.
- source_word: በዓለ
  english_pob_choice: festival
  chosen_spanish: fiesta
  alternatives_spanish:
  - festival
  - solemnidad
  lexicon: fiesta
  rationale: '''Fiesta'' es natural en español y suficientemente amplia para el día festivo cultual descrito; evita una palabra más técnica que el texto no exige.'
- source_word: በዓለ ሱባዔያት
  english_pob_choice: the Feast of Weeks
  chosen_spanish: la Fiesta de las Semanas
  alternatives_spanish:
  - la Fiesta de las Siete Semanas
  - la fiesta de las semanas
  lexicon: semanas
  rationale: Se conserva el nombre tradicional del festival con mayúscula por tratarse de un título formal. 'Semanas' reproduce el sustantivo plural del original.
- source_word: ቀዳሜ ፍሬ
  english_pob_choice: Firstfruits
  chosen_spanish: Primicias
  alternatives_spanish:
  - Primeros frutos
  - las primicias
  lexicon: primicias
  rationale: '''Primicias'' es el equivalente bíblico establecido en español y expresa mejor el valor cultual que una traducción literal de ''primeros frutos''.'
- source_word: ይእቲ ክልኤ ዐጽፍት
  english_pob_choice: It is of two kinds
  chosen_spanish: Es de dos aspectos
  alternatives_spanish:
  - Es de dos clases
  - Es de dos formas
  lexicon: dos aspectos
  rationale: La expresión ge'ez insiste en una doble caracterización. 'Dos aspectos' conserva esa duplicidad sin decidir demasiado rápidamente entre 'clases', 'formas' o 'tipos'.
- source_word: ወለክልኤ
  english_pob_choice: and of a double nature
  chosen_spanish: y de una naturaleza doble
  alternatives_spanish:
  - y de doble naturaleza
  - y de una naturaleza doble
  lexicon: naturaleza
  rationale: La repetición final subraya la doble condición del mismo festival. 'Naturaleza doble' conserva la tensión conceptual del original mejor que una simple paráfrasis unificadora.
theological_decisions:
- issue: Nombre del festival y formulación doble
  english_pob_reading: It is of two kinds and of a double nature.
  chosen_spanish_reading: Es de dos aspectos y de una naturaleza doble.
  alternative_spanish_readings:
  - Es de dos clases y de doble naturaleza.
  - Es de dos formas y de una naturaleza doble.
  rationale: El texto insiste en una doble descripción del mismo acto festivo. La traducción conserva ambas formulaciones en paralelo para no borrar la repetición enfática del original.
  doctrine_reference: Jubileos 6:21; ver también la tipología cultual del calendario festivo en el contexto del libro.
translation_notes:
  revision_awareness: La redacción sigue el texto ge'ez y refleja la revisión inglesa más reciente, que preserva la duplicación final ('of two kinds' / 'of a double nature') en vez de simplificarla. En español se mantiene esa doble formulación para respetar el énfasis del original.
  spanish_consistency_notes:
  - Se usa 'Fiesta' con mayúscula en los nombres cultuales formales, en línea con el tratamiento inglés revisado.
  - Se evita 'SEÑOR' o terminología de sustitución, porque este versículo no contiene el Tetragrámaton ni un equivalente contextual que lo requiera.
  - '''Primicias'' se mantiene como término bíblico establecido para el festival, sin expandirlo a una explicación interpretativa.'
