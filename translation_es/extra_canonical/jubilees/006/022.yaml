  yaml_path: translation/extra_canonical/jubilees/006/022.yaml
  text: For this festival, as it is written and ordained concerning it, celebrate it. For I have written in the book of the first law what I wrote for you, that you should celebrate it at its appointed time, one day in the year. And I told you about its sacrifices, that they should be a memorial, and that the children of Israel should celebrate it in...
  footnotes:
  - marker: a
    text: Or 'As it is written and ordained concerning it, celebrate it.'.
    reason: previous_rendering
  - marker: b
    text: Or 'throughout their generations.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:50Z'
    unchanged: false
    changes_summary: Changed 'engraved' to 'ordained' for more natural sense here; added 'about' before 'its sacrifices' for natural English; completed the final clause with 'their generations' and closed the sentence.
translation:
  language: es
  text: 'En cuanto a esta fiesta, como está escrito y ordenado acerca de ella, celébrala. Porque he escrito en el libro de la primera ley lo que escribí para ti: que la celebres en su tiempo señalado, un día en el año. Y te hablé acerca de sus sacrificios, para que sean un memorial, y para que los hijos de Israel la celebren en…'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዛቲ፡ *በዓል፡
  english_pob_choice: this festival
  chosen_spanish: esta fiesta
  alternatives_spanish:
  - esta festividad
  - este festival
  lexicon: N/A
  rationale: El texto ge'ez especifica “esta fiesta”; en español, “fiesta” transmite mejor el carácter cultual y festivo que “festival”, y evita una palabra menos natural en contexto bíblico.
- source_word: በከመ፡ ... ጽሑፍ፡ ወ*ቍሩጽ፡
  english_pob_choice: as it is written and ordained
  chosen_spanish: como está escrito y ordenado
  alternatives_spanish:
  - como está escrito y establecido
  - según está escrito y ordenado
  lexicon: N/A
  rationale: La revisión inglesa corrigió “engraved” a “ordained”; en español “ordenado” conserva la fuerza normativa sin introducir una imagen ajena. Se mantiene “escrito” como paralelo textual.
- source_word: መጽሐፈ፡ ሕግ፡
  english_pob_choice: book of the first law
  chosen_spanish: libro de la primera ley
  alternatives_spanish:
  - libro de la ley primera
  - libro de la ley inicial
  lexicon: N/A
  rationale: Se sigue la formulación del audit trail inglés “first law”. “Primera ley” conserva el valor de prioridad/origen sin suavizarlo a una paráfrasis como “ley antigua”.
- source_word: ትግበራ፡ በበጊዜሃ፡
  english_pob_choice: that you should celebrate it at its appointed time
  chosen_spanish: para que la celebren en su tiempo señalado
  alternatives_spanish:
  - para que la celebren en el tiempo señalado para ella
  - para que la observen en su tiempo designado
  lexicon: N/A
  rationale: “Tiempo señalado” reproduce la idea de cita/turno fijado; “celebrar” mantiene el verbo cultual del inglés POB y evita una formulación demasiado general como “observar”.
- source_word: ዕለተ፡ ... አሐተ፡ ለ¹¹ዓመት፡
  english_pob_choice: one day in the year
  chosen_spanish: un día en el año
  alternatives_spanish:
  - un día al año
  - un solo día en el año
  lexicon: N/A
  rationale: La lectura del texto apunta a una duración/ocurrencia anual de un solo día; “un día en el año” conserva la literalidad y el valor calendárico.
- source_word: ወቍርባኖሂ፡
  english_pob_choice: its sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas
  - sus sacrificios rituales
  lexicon: N/A
  rationale: “Sacrificios” es la correspondencia más directa y conserva el contenido cultual específico del pasaje. No se atenúa a “ofrendas” para no perder precisión.
- source_word: ዝክራነ፡
  english_pob_choice: a memorial
  chosen_spanish: un memorial
  alternatives_spanish:
  - un recuerdo
  - un conmemorativo
  lexicon: N/A
  rationale: “Memorial” mantiene el sentido técnico de conmemoración ritual y evita diluir el término a un mero “recuerdo”.
- source_word: ደቂቀ፡ እስራኤል፡
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel[a]
  - la casa de Israel
  lexicon: N/A
  rationale: Se conserva la fórmula bíblica tradicional y transparente. La opción “hijos” refleja el lenguaje de descendencia colectiva del original.
theological_decisions:
- issue: La frase normativa sobre la fiesta puede sonar a mera instrucción humana o a mandato ritual con autoridad de pacto.
  english_pob_reading: as it is written and ordained concerning it, celebrate it
  chosen_spanish_reading: como está escrito y ordenado acerca de ella, celebradla
  alternative_spanish_readings:
  - como está escrito y establecido acerca de ella, celebradla
  - según está escrito y ordenado acerca de ella, celebradla
  rationale: 'Se conserva el doble eje: prescripción escrita y disposición normativa. “Ordenado” resalta la obligatoriedad cultual sin introducir lenguaje eclesial posterior.'
  doctrine_reference: Autoridad de la ley del pacto y observancia ritual prescrita.
- issue: El pasaje presenta los sacrificios como memorial, término con fuerte función litúrgica y conmemorativa.
  english_pob_reading: its sacrifices, that they should be a memorial
  chosen_spanish_reading: sus sacrificios, para que sean un memorial
  alternative_spanish_readings:
  - sus sacrificios, para que sirvan de memorial
  - sus sacrificios, para que sean conmemoración
  rationale: “Memorial” conserva la relación entre sacrificio y recuerdo cultual sin rebajarla a simple memoria mental. La redacción mantiene el carácter ritual del texto.
  doctrine_reference: Función memorial de los sacrificios prescritos.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que restituye el inicio con “For this festival”, corrige la base semántica de “engraved” a “ordained”, y elimina la clausula espuria sobre “throughout their generations”. La última parte del ge'ez queda abierta en el testimonio fuente; por eso la versión española termina con la frase completa disponible en el audit trail inglés sin añadir un final no atestiguado.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” según la norma del proyecto solo cuando el texto lo requiera; aquí no aparece.
  - “Fiesta” se prefirió a “festival” por naturalidad bíblica en español.
  - No se añadió material equivalente a “throughout their generations”, porque la revisión textual lo eliminó como hallazgo no sustentado por el ge'ez.
  - Se evitó cualquier nota al pie no anclada en el texto para cumplir la validación.
