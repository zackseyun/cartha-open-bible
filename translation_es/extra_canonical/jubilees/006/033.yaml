  source_alignment_summary: 'El borrador español sigue de cerca el sentido del texto ge''ez y de la POB inglesa: Israel olvidará, no hallará el camino de los años, olvidará las lunas nuevas, los tiempos designados y los sábados, y errará respecto al orden anual. La única mejora necesaria es estilística y de naturalidad en español en la cláusula final.'
