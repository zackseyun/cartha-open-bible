base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/033.yaml
  text: And all the children of Israel will forget, and will not find the path of the years, and they will forget the new moons and appointed times and sabbaths, and they will go wrong as to the whole order of the years.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:49Z'
    unchanged: false
    changes_summary: Replaced 'seasons' with 'appointed times' for better lexical accuracy to the calendrical/festal sense, while preserving the rest of the verse.
translation:
  language: es
  text: Y todos los hijos de Israel olvidarán, y no hallarán el camino de los años, y olvidarán las lunas nuevas y los tiempos señalados y los sábados, y se extraviarán en todo el orden de los años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውሉደ እስራኤል
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los niños de Israel
  - los descendientes de Israel
  lexicon: n/a
  rationale: «Hijos de Israel» es la correspondencia natural y bíblica en español para la expresión de pertenencia colectiva. Mantiene el valor etnónimo del original sin suavizarlo a una paráfrasis más explicativa.
- source_word: ይረስዑ
  english_pob_choice: will forget
  chosen_spanish: olvidarán
  alternatives_spanish:
  - se olvidarán
  - descuidarán
  lexicon: n/a
  rationale: El verbo simple «olvidarán» reproduce directamente la pérdida de memoria/observancia que expresa el texto, sin añadir matiz causal que no está en el original.
- source_word: ፍኖተ ዓመታት
  english_pob_choice: the path of the years
  chosen_spanish: el camino de los años
  alternatives_spanish:
  - la senda de los años
  - el curso de los años
  lexicon: n/a
  rationale: Se conserva la metáfora espacial del original y de la POB inglesa. «Camino» comunica mejor que una paráfrasis temporal más abstracta, y permite mantener la imagen de una trayectoria calendárica.
- source_word: ሠርቀ
  english_pob_choice: new moons
  chosen_spanish: las lunas nuevas
  alternatives_spanish:
  - los novilunios
  - las nuevas lunas
  lexicon: n/a
  rationale: «Lunas nuevas» es una forma clara y bíblicamente reconocible en español para las fases lunares o celebraciones mensuales. Evita tecnicismos innecesarios y conserva la referencia calendárica.
- source_word: ወጊዜ
  english_pob_choice: appointed times
  chosen_spanish: los tiempos señalados
  alternatives_spanish:
  - las citas señaladas
  - los tiempos fijados
  lexicon: n/a
  rationale: La revisión inglesa corrigió «seasons» a «appointed times» para el sentido calendárico/festal. En español, «tiempos señalados» refleja esa precisión y mantiene la idea de momentos designados.
- source_word: ወሰንበተ
  english_pob_choice: sabbaths
  chosen_spanish: los sábados
  alternatives_spanish:
  - los días de reposo
  - los shabbats
  lexicon: n/a
  rationale: «Sábados» sigue de cerca el término básico del original y de la tradición textual, a la vez que es comprensible para lectores amplios. «Días de reposo» interpretaría más de lo que exige el segmento.
- source_word: ሥርዐተ ዘዓመታት
  english_pob_choice: the whole order of the years
  chosen_spanish: todo el orden de los años
  alternatives_spanish:
  - todo el sistema de los años
  - todo el régimen de los años
  lexicon: n/a
  rationale: Se conserva la estructura del original y de la POB inglesa sin intensificar el sentido. «Orden» mantiene el aspecto normativo/calendárico del pasaje mejor que una reformulación más libre.
theological_decisions:
- issue: 'Calendrical/festal terminology: ''appointed times'' vs. ''seasons'''
  english_pob_reading: appointed times
  chosen_spanish_reading: tiempos señalados
  alternative_spanish_readings:
  - tiempos fijados
  - citas señaladas
  rationale: La revisión inglesa indica que el sentido pretendido es festivo-calendárico, no estacional. En español, «tiempos señalados» conserva esa lectura sin perder la conexión con un ciclo establecido por Dios.
  doctrine_reference: Calendario sagrado / tiempos designados en la Torá y literatura afín
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa que sustituyó 'seasons' por 'appointed times', y por eso emplea 'tiempos señalados' en lugar de un término climático o estacional. Se mantuvo el paralelismo del versículo y la secuencia de olvidos del calendario.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de tres miembros: lunas nuevas, tiempos señalados y sábados.'
  - «Orden de los años» se mantiene literal para no borrar la imagen normativa/calendárica del texto.
  - Se evitó «SEÑOR» o lenguaje de sustitución porque no aparece aquí un tetragrama ni una cita directa de κύριος.
