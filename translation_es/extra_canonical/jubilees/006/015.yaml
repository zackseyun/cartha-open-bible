translation:
  language: es
  text: Y dio a Noé y a sus hijos una señal de que nunca más habría un diluvio sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ትእምርተ
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - una muestra
  - un signo
  lexicon: signo / señal
  rationale: El etíope expresa una marca o indicio dado por Dios; en español, «señal» es natural y fiel al valor comunicativo del texto. «Signo» también sería posible, pero «señal» suena más idiomático en este contexto narrativo.
- source_word: ኢይኩን
  english_pob_choice: there should never again be
  chosen_spanish: nunca más habría
  alternatives_spanish:
  - no volvería a haber
  - jamás habría
  lexicon: negación de repetición futura
  rationale: La construcción transmite que el evento no se repetirá; «nunca más habría» conserva el sentido prospectivo sin añadir matices innecesarios. Otras opciones son válidas, pero esta mantiene claridad y solemnidad.
- source_word: አይኅ
  english_pob_choice: a flood
  chosen_spanish: un diluvio
  alternatives_spanish:
  - una inundación
  - un aluvión
  lexicon: flood / deluge
  rationale: En este relato bíblico el término remite al juicio diluviano de Génesis; «diluvio» preserva esa referencia bíblica estable y evita rebajar el alcance del evento a una simple inundación.
theological_decisions:
- issue: La garantía divina de no repetir el juicio por agua sobre toda la tierra
  english_pob_reading: there should never again be a flood upon the earth
  chosen_spanish_reading: nunca más habría un diluvio sobre la tierra
  alternative_spanish_readings:
  - no volvería a haber un diluvio sobre la tierra
  - jamás habría un diluvio sobre la tierra
  rationale: El texto afirma una promesa de no repetición universal. La redacción elegida mantiene el alcance total de «sobre la tierra» y el carácter definitivo de la promesa, sin introducir especificaciones ausentes en el original.
  doctrine_reference: Génesis 9:11; referencia al pacto posterior al diluvio
translation_notes:
  revision_awareness: La revisión más reciente indica alto acuerdo y que no se requirieron cambios; por eso la versión española sigue de cerca el sentido directo del original sin expandirlo ni atenuarlo.
  spanish_consistency_notes:
  - Se mantiene «Noé» como forma estándar en español.
  - Se traduce la señal con lenguaje sencillo y bíblicamente natural.
  - No se introduce «Yahvé» porque el versículo no contiene el nombre divino en la formulación citada, aunque la acción se entiende como divina por el contexto narrativo.
