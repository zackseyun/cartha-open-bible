translation:
  language: es
  text: Y tú, manda a los hijos de Israel que no coman sangre alguna, para que su nombre y su descendencia estén siempre delante de Yahvé nuestro Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאַתָּה / And you
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Y tú mismo
  - Y ahora tú
  lexicon: N/A
  rationale: Conserva el valor enfático del giro de apertura sin recargarlo; el hebreo/etiópico presenta una transición directiva directa, bien reflejada por «Y tú».
- source_word: אֱזֹרֹמ / command
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - da la orden a
  lexicon: N/A
  rationale: «Manda» comunica una instrucción autoritativa de forma natural en español bíblico contemporáneo, sin perder el carácter imperativo del original.
- source_word: בני ישראל / children of Israel
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los descendientes de Israel
  - el pueblo de Israel
  lexicon: N/A
  rationale: Se mantiene la fórmula étnico-covenantal de la fuente y de la tradición textual, evitando una generalización que atenúe la referencia histórica.
- source_word: לא לאכול כל דם / not to eat any blood
  english_pob_choice: not to eat any blood
  chosen_spanish: que no coman ninguna sangre
  alternatives_spanish:
  - que no coman sangre alguna
  - que no ingieran sangre
  lexicon: N/A
  rationale: «Comer» conserva el sentido dietético concreto; «ninguna sangre» reproduce el alcance total de «any blood» con naturalidad en español.
- source_word: שֵׁם וְזַרְעָם / their name and their seed
  english_pob_choice: their name and their seed
  chosen_spanish: su nombre y su descendencia
  alternatives_spanish:
  - su nombre y su semilla
  - su nombre y su linaje
  lexicon: N/A
  rationale: «Descendencia» es la equivalencia más clara y digna para זֶרַע/seed en español bíblico; «semilla» sería demasiado literal y menos idiomática.
- source_word: לִפְנֵי יְהוָה אֱלֹהֵינוּ / before Yahweh our God
  english_pob_choice: before Yahweh our God
  chosen_spanish: delante de Yahvé nuestro Dios
  alternatives_spanish:
  - ante Yahvé nuestro Dios
  - en presencia de Yahvé nuestro Dios
  lexicon: N/A
  rationale: Se conserva el nombre divino como «Yahvé» conforme a la política POB, y «delante de» mantiene la relación espacial/relacional de la preposición sin forzarla a un tecnicismo.
- source_word: כָּל־יָמִים / always
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - todos los días
  - por siempre
  lexicon: N/A
  rationale: «Siempre» es la equivalencia natural y directa para la continuidad permanente expresada en la fuente.
theological_decisions:
- issue: Preservación del nombre divino
  english_pob_reading: before Yahweh our God always
  chosen_spanish_reading: delante de Yahvé nuestro Dios siempre
  alternative_spanish_readings:
  - ante Yahvé nuestro Dios siempre
  - en presencia de Yahvé nuestro Dios siempre
  rationale: La revisión inglesa sustituyó «the LORD» por «Yahweh»; en español se mantiene ese mismo criterio para reflejar el nombre divino sin ocultamiento tipográfico, en coherencia con la política POB.
  doctrine_reference: Tetragrámaton / nombre divino
translation_notes:
  revision_awareness: La base inglesa auditada ya había sido revisada para restaurar «Yahweh» en lugar de «the LORD». El texto español adopta directamente esa decisión y ajusta el sintagma preposicional a una construcción idiomática equivalente en español, sin añadir matices no respaldados por la fuente ge'ez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para el nombre divino, en continuidad con la política POB y la revisión inglesa auditada.
  - Se usa «hijos de Israel» como fórmula estable de identidad colectiva, acorde con el registro bíblico del pasaje.
  - No se introducen notas textuales ni variantes porque el material fuente y el control cruzado muestran alta concordancia y no hay tensión léxica adicional documentada.
