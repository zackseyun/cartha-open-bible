- from: 'Para las fiestas y para memoriales para siempre, y así han sido ordenadas. Y están registradas en las tablas celestiales: trece semanas, cada una de la siguiente, para sus memoriales; de la primera a la segunda, y de la segunda a la tercera, y de la tercera a la cuarta.'
