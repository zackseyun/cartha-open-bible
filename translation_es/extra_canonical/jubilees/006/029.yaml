    changes_summary: Restored omitted opening clause about the feasts and memorials forever and their ordinance; revised 'placed' to 'written' for the heavenly tablets; kept the sequence of thirteen-week intervals in more natural formal English.
translation:
  language: es
  text: 'Para las fiestas y para memoriales para siempre, y así están ordenadas. Y están registradas en las tablas celestiales: trece semanas, una tras otra, para sus memoriales, de la primera a la segunda, y de la segunda a la tercera, y de la tercera a la cuarta.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በዓላት
  english_pob_choice: the feasts
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las solemnidades
  - las celebraciones
  lexicon: fiestas
  rationale: En español, ‘fiestas’ conserva el sentido festivo-cultual del término sin endurecerlo con una fórmula más litúrgica que el texto no exige.
- source_word: ተዝካር
  english_pob_choice: memorials
  chosen_spanish: memoriales
  alternatives_spanish:
  - recuerdos
  - conmemoraciones
  lexicon: memoriales
  rationale: ‘Memoriales’ mantiene la idea de acto/objeto con función de recuerdo ritual o conmemorativo, en línea con la decisión inglesa y sin reducirlo a mero recuerdo mental.
- source_word: ወከመዝ እማንቱ ሥርዓት
  english_pob_choice: and thus they are ordained
  chosen_spanish: y así han sido ordenadas
  alternatives_spanish:
  - y así están ordenadas
  - y así fueron ordenadas
  lexicon: ordenadas
  rationale: La frase expresa disposición normativa; ‘han sido ordenadas’ conserva el valor pasivo sin introducir una voz demasiado arcaica o mecanizada.
- source_word: ውስተ ጽላት ሰማይ
  english_pob_choice: on the heavenly tablets
  chosen_spanish: en las tablas celestiales
  alternatives_spanish:
  - en las tablas del cielo
  - sobre las tablas celestiales
  lexicon: tablas celestiales
  rationale: ‘Tablas celestiales’ refleja el referente técnico de las ‘heavenly tablets’ y evita una paráfrasis que diluya su carácter fijo y literario.
- source_word: ዓሥሩ ወሠላስ ሰንበታት
  english_pob_choice: thirteen weeks
  chosen_spanish: trece semanas
  alternatives_spanish:
  - trece semanas completas
  lexicon: trece semanas
  rationale: La cifra es directa y debe conservarse sin explicitar más de lo que el texto ofrece.
- source_word: አሐቲ አሐቲ እምኔሆን
  english_pob_choice: each one from another
  chosen_spanish: cada una de la siguiente
  alternatives_spanish:
  - cada una de la otra
  - una tras otra
  lexicon: cada una de la siguiente
  rationale: La expresión es algo abrupta en el original; esta solución conserva la relación secuencial sin sobreinterpretar la sintaxis.
- source_word: እምቀዳሚት እስከ ካልእት ...
  english_pob_choice: from the first to the second, and from the second to the third, and from the third to the fourth
  chosen_spanish: de la primera a la segunda, y de la segunda a la tercera, y de la tercera a la cuarta
  alternatives_spanish:
  - desde la primera hasta la segunda, y desde la segunda hasta la tercera, y desde la tercera hasta la cuarta
  lexicon: de la primera a la segunda
  rationale: Se mantiene la cadena ordinal y el paralelismo del original, con una preposición natural en español.
theological_decisions:
- issue: Naturaleza de las ‘tablas celestiales’
  english_pob_reading: And they are recorded on the heavenly tablets
  chosen_spanish_reading: Y están registradas en las tablas celestiales
  alternative_spanish_readings:
  - Y fueron escritas en las tablas celestiales
  - Y quedan inscritas en las tablas celestiales
  rationale: El texto presenta estas tablas como un registro celestial objetivo. ‘Registradas’ expresa el resultado/documentación sin forzar un matiz temporal único que pueda oscurecer la función permanente del libro.
  doctrine_reference: Jubilees heavenly tablets motif; source-text cosmology
- issue: Aspecto verbal de la inscripción
  english_pob_reading: they are recorded
  chosen_spanish_reading: están registradas
  alternative_spanish_readings:
  - han sido registradas
  - fueron registradas
  rationale: Se eligió un presente pasivo perifrástico para reflejar el valor durativo/estable sugerido por la revisión textual inglesa y por la función permanente de las tablas.
  doctrine_reference: Textual revision note on imperfect/present sense
- issue: Ordinance of feasts and memorials
  english_pob_reading: For the feasts and for memorials forever, and thus they are ordained
  chosen_spanish_reading: Para las fiestas y para memoriales para siempre, y así han sido ordenadas
  alternative_spanish_readings:
  - Para las fiestas y memoriales para siempre, y así están ordenadas
  - Para las fiestas y para memoriales eternos, y así han sido ordenadas
  rationale: Se preserva la doble finalidad (‘para las fiestas y para memoriales’) y la duración (‘para siempre’) sin convertirlo en una explicación devocional. El pasivo evita atribuir sujeto explícito donde el original no lo marca aquí.
  doctrine_reference: Jubilees calendrical ordinance motif
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para restaurar la cláusula inicial sobre ‘the feasts and memorials forever’ y para preferir ‘are recorded’ frente a ‘were written’ por el valor imperfectivo del ge’ez. La redacción española sigue esa última decisión con un presente pasivo estable (‘están registradas’) y mantiene la secuencia ordinal de semanas sin añadir contenido extratextual.
  spanish_consistency_notes:
  - Se usa ‘tablas celestiales’ de forma consistente para heavenly tablets.
  - Se conserva ‘memoriales’ para mantener la terminología técnica ya fijada por la POB inglesa.
  - Se mantiene el paralelismo ordinal con ‘de la primera a la segunda…’ para reflejar la estructura acumulativa del original.
  - No se introducen notas al pie porque el pasaje no exige una variante textual o lexical adicional en español más allá de las decisiones ya explicitadas.
