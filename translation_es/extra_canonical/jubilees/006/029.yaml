review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del ge''ez y sigue la revisión inglesa: fiestas, memoriales para siempre, ordenanza, registro en las tablas celestiales, y la secuencia de trece semanas entre primera, segunda, tercera y cuarta. Sin embargo, ''cada una de la siguiente'' no refleja con claridad ''each one from another'' y suena opaco en español; además, ''han sido ordenadas'' debilita el valor presente/normativo que el inglés auditado fijó en ''they are ordained''.'
  spanish_quality_summary: 'El español es mayormente legible y digno, pero tiene dos tropiezos de naturalidad: ''para memoriales'' suena algo calcado aunque tolerable en registro bíblico, y sobre todo ''cada una de la siguiente'' resulta poco idiomático y ambiguo. También conviene alinear mejor el tiempo verbal con ''están ordenadas'' para una lectura más directa y normativa.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Fiestas', 'memoriales' y 'tablas celestiales' están bien encaminados. La principal mejora léxica es cambiar 'cada una de la siguiente' por una formulación secuencial más fiel y natural, como 'una tras otra'.
  issues:
  - severity: medium
    issue: '''cada una de la siguiente'' es poco natural y semánticamente borroso'
    rationale: La expresión española no comunica bien la relación secuencial del ge'ez/inglés ('each one from another'). Puede sugerir dependencia de la siguiente en vez de sucesión entre unidades. 'Una tras otra' o 'cada una a partir de la otra' lee mejor; la primera es la más natural sin alterar el sentido.
  - severity: low
    issue: '''han sido ordenadas'' no sigue de cerca el presente normativo de la revisión inglesa'
    rationale: El inglés auditado fijó 'thus they are ordained'. En español, 'están ordenadas' conserva mejor el valor actual/estable de una ordenanza permanente que 'han sido ordenadas', que resalta más un hecho consumado.
  - severity: low
    issue: Puntuación antes de la serie ordinal
    rationale: Tras 'para sus memoriales' funciona mejor una coma que un punto y coma, porque la serie siguiente explica esa cláusula dentro del mismo flujo sintáctico.
  revised_spanish_text: 'Para las fiestas y para memoriales para siempre, y así están ordenadas. Y están registradas en las tablas celestiales: trece semanas, una tras otra, para sus memoriales, de la primera a la segunda, y de la segunda a la tercera, y de la tercera a la cuarta.'
  revision_rationale: 'Se ajustó el texto para mejorar fidelidad y legibilidad sin apartarse del sentido fuente ni de la auditoría inglesa: ''están ordenadas'' refleja mejor el presente normativo; ''una tras otra'' comunica con claridad la relación secuencial de las trece semanas; y la puntuación se suavizó para un español más natural.'
