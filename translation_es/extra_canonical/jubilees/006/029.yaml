  rationale: 'Se ajustó el texto para mejorar fidelidad y legibilidad sin apartarse del sentido fuente ni de la auditoría inglesa: ''están ordenadas'' refleja mejor el presente normativo; ''una tras otra'' comunica con claridad la relación secuencial de las trece semanas; y la puntuación se suavizó para un español más natural.'
