lexical_decisions:
- source_word: '"and on it the earth became dry" / ወባቲ፡ የብሰት፡ ምድር፡'
  english_pob_choice: and on it the earth became dry
  chosen_spanish: y sobre él la tierra se secó
  alternatives_spanish:
  - y sobre ello la tierra se secó
  - y en él la tierra quedó seca
  lexicon: became dry -> secó / quedó seca
  rationale: El Ge'ez usa una construcción verbal de secado sin añadir explicación causal; en español, «se secó» conserva el cambio de estado de la tierra sin sobretraducción.
- source_word: '"he opened it" / ወአርኀወ'
  english_pob_choice: he opened it
  chosen_spanish: él la abrió
  alternatives_spanish:
  - la abrió
  - él la abrió
  lexicon: opened -> abrir
  rationale: Se mantiene el referente inmediato del objeto abierto en español con pronombre átono femenino acorde con «la tierra».
- source_word: '"saw the earth" / ወርእየ፡ ምድረ'
  english_pob_choice: and saw the earth
  chosen_spanish: y vio la tierra
  alternatives_spanish:
  - y vio la tierra
  - y contempló la tierra
  lexicon: saw -> ver
  rationale: «Vio» reproduce directamente la percepción visual del texto sin añadir matiz devocional que el original no exige.
- source_word: '"the mouths of the depths of the abyss beneath" / አፈ፡ መዓምቅቲሃ፡ ... ለቀላይ፡ ታሕቲት።'
  english_pob_choice: the mouths of the depths of the abyss beneath
  chosen_spanish: las bocas de las profundidades del abismo de abajo
  alternatives_spanish:
  - las bocas de las profundidades del abismo inferior
  - las bocas de los abismos profundos de abajo
  lexicon: mouths -> bocas; depths -> profundidades; abyss beneath -> abismo de abajo
  rationale: El POB inglés conserva la imagen literal de «mouths»; en español, «bocas» retiene esa imagen extraña pero auditable, y «de abajo» refleja el calificativo espacial sin introducir una lectura cosmológica más fuerte de la necesaria.
- source_word: '"were closed" / ተፈጸመ'
  english_pob_choice: were closed
  chosen_spanish: se cerraron
  alternatives_spanish:
  - fueron cerradas
  - se clausuraron
  lexicon: closed -> cerrar
  rationale: La forma pronominal española expresa bien el cierre de las aberturas sin volverlo excesivamente técnico o forzado.
- source_word: '"were opened" / ተርኅወ'
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertas
  - quedaron abiertas
  lexicon: opened -> abrir
  rationale: Se preserva la voz resultativa del pasivo ge'ez con una pasiva refleja natural en español.
- source_word: '"all the mouths of" / ኵሉ፡ አፈ'
  english_pob_choice: all the mouths of
  chosen_spanish: todas las bocas de
  alternatives_spanish:
  - todas las aberturas de
  - todas las bocas de
  lexicon: all -> todas; mouths -> bocas
  rationale: «Todas las bocas de» conserva el sintagma incompleto de la fuente y del inglés auditado, dejando visible que el pasaje se corta ahí.
theological_decisions:
- issue: Mantener la imagen literal de las "bocas" del abismo sin reinterpretarla como "aberturas" en el texto principal
  english_pob_reading: the mouths of the depths of the abyss beneath
  chosen_spanish_reading: las bocas de las profundidades del abismo de abajo
  alternative_spanish_readings:
  - las aberturas de las profundidades del abismo de abajo
  - los accesos de las profundidades del abismo de abajo
  rationale: La lectura auditada del POB conserva una imagen física concreta y algo extraña. Traducirla como «aberturas» suavizaría indebidamente el paralelo con el inglés y reduciría la transparencia del testimonio fuente.
  doctrine_reference: Preservation of source imagery in apocalyptic/cosmological descriptions
- issue: Conservar el final incompleto del versículo sin suplir material ausente
  english_pob_reading: And on the new moon of the seventh month were opened all the mouths of
  chosen_spanish_reading: Y en la luna nueva del séptimo mes se abrieron todas las bocas de
  alternative_spanish_readings:
  - Y en la luna nueva del séptimo mes se abrieron todas las bocas de las profundidades
  - Y en la luna nueva del séptimo mes se abrieron todas las aberturas de
  rationale: El expediente auditado señala que el texto termina abruptamente. Añadir el complemento faltante sería una conjetura no respaldada por el tramo fuente ni por la revisión editorial.
  doctrine_reference: Textual transparency and non-supplementation of incomplete excerpts
translation_notes:
  revision_awareness: 'Se siguió la última revisión del expediente: se mantuvo la frase final incompleta tal como aparece en el extracto fuente, sin suplir el complemento ausente; también se conservaron los cierres y aperturas en voz refleja natural en español, y se corrigió la ubicación del marcador de nota para que aparezca en el texto principal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma base en este proyecto solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se mantuvo «luna nueva» para reflejar el calendario lunar del texto fuente, sin convertirlo en una fecha solar.
  - Se preservó «bocas» como imagen literal coherente con el expediente inglés y con la transparencia del original.
  - La traducción evita completar el complemento final porque el extracto ge'ez y el audit trail inglés terminan truncados.
