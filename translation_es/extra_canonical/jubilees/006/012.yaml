base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/012.yaml
  text: 'And this testimony is written concerning you so that you may keep it always: that you must not eat any blood of beasts or birds or cattle during all the days of the earth. And the man who eats the blood of beast or cattle or birds during all the days of the earth—he and his seed shall be rooted out from the earth.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:35:14Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y este testimonio está escrito acerca de ustedes, para que lo guarden siempre: que no coman nada de sangre de bestia, ave o ganado durante todos los días de la tierra. Y el hombre que coma la sangre de bestia, de ganado o de aves durante todos los días de la tierra, él y su descendencia serán arrancados de la tierra.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዛቲ፡ ስምዕ፡
  english_pob_choice: this testimony
  chosen_spanish: este testimonio
  alternatives_spanish:
  - este testimonio solemne
  - este testimonio dado
  lexicon: testimonio
  rationale: La forma española 'testimonio' reproduce adecuadamente el valor de la declaración normativa/atestiguada del texto. 'Solemne' o 'dado' añaden matices no necesarios en el original.
- source_word: ትዕቀብዋ፡
  english_pob_choice: keep it always
  chosen_spanish: lo guarden siempre
  alternatives_spanish:
  - lo observen siempre
  - lo custodien siempre
  lexicon: guardar
  rationale: '''Guardar'' conserva la idea de observar/custodiar una prescripción. ''Observar'' es posible, pero ''guardar'' mantiene mejor la continuidad bíblica sin volverlo demasiado técnico.'
- source_word: ከመ፡ ኢትብልዑ፡ ... ደመ፡
  english_pob_choice: that you must not eat any blood
  chosen_spanish: que no deben comer sangre alguna
  alternatives_spanish:
  - que no coman sangre
  - que no deban comer ninguna sangre
  lexicon: comer sangre
  rationale: Se conserva la prohibición directa y la fuerza normativa. 'Sangre alguna' refleja bien el sentido de 'any blood' sin sobrecargar la frase.
- source_word: አራዊት፡ ወአዕዋፍ፡ ወእንስሳ፡
  english_pob_choice: beasts or birds or cattle
  chosen_spanish: bestias, aves o ganado
  alternatives_spanish:
  - animales, aves o ganado
  - bestias, pájaros o ganado
  lexicon: bestias/aves/ganado
  rationale: '''Bestias'' reproduce el campo semántico amplio de animales salvajes; ''aves'' y ''ganado'' mantienen la tríada del original y de la versión inglesa POB.'
- source_word: ደመ፡ አርዌ፡ ወዘእንስሳ፡ ወዘአዕዋፍ፡
  english_pob_choice: the blood of beast or cattle or birds
  chosen_spanish: la sangre de bestia, de ganado o de aves
  alternatives_spanish:
  - la sangre de bestia, ganado o aves
  - la sangre de animales, ganado o aves
  lexicon: blood of beast or cattle or birds
  rationale: Se preserva la secuencia del inglés POB y el paralelismo con la primera cláusula. 'Bestia' en singular genérico funciona en español como categoría. Se evita 'animales' porque suaviza la especificidad del texto.
- source_word: ይስሮ፡ ... እምድር።
  english_pob_choice: shall be rooted out from the earth
  chosen_spanish: serán arrancados de la tierra
  alternatives_spanish:
  - serán desarraigados de la tierra
  - serán extirpados de la tierra
  lexicon: rooted out
  rationale: '''Arrancados de la tierra'' mantiene la metáfora vegetal/forense de exclusión total del original y del inglés POB. ''Desarraigados'' es posible, pero ''arrancados'' es más directo en español contemporáneo.'
theological_decisions:
- issue: Prohibición de comer sangre como mandamiento permanente
  english_pob_reading: you must not eat any blood ... during all the days of the earth
  chosen_spanish_reading: no deben comer sangre alguna ... durante todos los días de la tierra
  alternative_spanish_readings:
  - no comerán sangre alguna
  - no han de comer sangre alguna
  rationale: Se conserva el carácter durativo y normativo de la prohibición. 'Durante todos los días de la tierra' se mantiene sin reinterpretarlo, porque el texto delimita la vigencia temporal con esa fórmula.
  doctrine_reference: No se añade explicación doctrinal ajena al pasaje; se preserva la norma tal como aparece en el texto.
- issue: Sanción de expulsión para el transgresor y su descendencia
  english_pob_reading: he and his seed shall be rooted out from the earth
  chosen_spanish_reading: él y su descendencia serán arrancados de la tierra
  alternative_spanish_readings:
  - él y su descendencia serán desarraigados de la tierra
  - él y su linaje serán arrancados de la tierra
  rationale: Se conserva la correlación entre el individuo y su descendencia, y la imagen de exclusión total de la tierra. 'Descendencia' es la forma más neutral y fiel para 'seed'.
  doctrine_reference: Mantiene la lógica punitiva del pasaje sin ampliar el castigo más allá del texto.
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y quedó sin cambios en el audit trail inglés; la versión española sigue de cerca esa lectura estable, sin introducir variantes textuales ni notas innecesarias.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según la terminología del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se mantiene 'descendencia' para 'seed' por consistencia bíblica y neutralidad genealógica.
  - Se conserva el paralelismo de la lista de animales sin modernizarla a una categoría única, para no borrar la cadencia del original.
