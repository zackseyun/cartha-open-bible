translation:
  language: es
  text: Aparecieron las cumbres de los montes, y Noé se alegró. Por eso las instituyó como fiestas conmemorativas para siempre, y así quedaron establecidas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አስተርአየ / appeared
  english_pob_choice: the tops of the mountains appeared
  chosen_spanish: Aparecieron las cumbres de los montes
  alternatives_spanish:
  - Se hicieron visibles las cumbres de los montes
  - Aparecieron las cimas de los montes
  lexicon: appear / hacerse visible
  rationale: El ge'ez presenta la aparición de las partes altas de los montes; en español, 'Aparecieron las cumbres de los montes' conserva la imagen y suena natural, sin añadir elementos.
- source_word: ወተፈሥሐ፡ ኖኅ / Noah rejoiced
  english_pob_choice: Noah rejoiced
  chosen_spanish: Noé se alegró
  alternatives_spanish:
  - Noé se regocijó
  - Noé se llenó de alegría
  lexicon: rejoice / alegrarse
  rationale: '''Se alegró'' expresa bien la reacción de gozo de Noé con un registro claro y bíblico en español moderno.'
- source_word: በዓላተ፡ ለተዝካር፡ ለዓለም / festivals for remembrance forever
  english_pob_choice: festivals for remembrance forever
  chosen_spanish: fiestas para memoria perpetua
  alternatives_spanish:
  - fiestas en memoria perpetua
  - fiestas para recuerdo perpetuo
  lexicon: festival / feast; remembrance / memorial
  rationale: '''Fiestas'' comunica el carácter de observancia celebrativa; ''memoria perpetua'' mantiene el valor conmemorativo y la duración continua. Se evita ''recordatorio'' por sonar menos litúrgico y menos fiel al tono del pasaje.'
- source_word: ወከማሁ፡ ሠርዓዋ / and thus they are ordained
  english_pob_choice: and thus they are ordained
  chosen_spanish: y así quedaron instituidas
  alternatives_spanish:
  - y así están instituidas
  - y así fueron ordenadas
  lexicon: ordain / institute
  rationale: '''Quedaron instituidas'' refleja el resultado establecido y mantiene la voz pasiva implícita del original, con un español natural y solemne.'
theological_decisions:
- issue: The verse links the appearance of the mountain tops with Noah's institution of commemorative feasts, but the source does not explicitly add 'for remembrance' beyond the feast designation itself.
  english_pob_reading: festivals for remembrance forever
  chosen_spanish_reading: fiestas para memoria perpetua
  alternative_spanish_readings:
  - fiestas para recuerdo perpetuo
  - fiestas en memoria perpetua
  rationale: La redacción española conserva el sentido memorial sin ampliar indebidamente la escena. 'Memoria' mantiene mejor el tono cultual y durativo del texto que una paráfrasis explicativa.
  doctrine_reference: Memorial cultic observance / commemorative institution
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: una pass retiró ''for remembrance'' por falta de soporte en el segmento truncado, pero la revisión posterior indicó que esa expresión pertenece al texto auténtico completo. La redacción española la conserva de forma controlada como ''para memoria perpetua'', sin añadir glosa extra.'
  spanish_consistency_notes:
  - Se usa 'Noé' de forma consistente para el personaje.
  - '''Fiestas'' se mantiene como término estable para observancias celebrativas.'
  - No se introduce 'SEÑOR' ni 'Cristo', ya que no aparecen en este versículo.
  - La formulación evita sobretraducción interpretativa y conserva el paralelismo de las dos cláusulas finales.
