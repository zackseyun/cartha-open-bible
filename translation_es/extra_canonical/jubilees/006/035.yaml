translation:
  language: es
  text: Y habrá quienes observarán la luna, porque corrompe las estaciones.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues habrá quienes observarán la luna».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወ / and
  english_pob_choice: And there will be
  chosen_spanish: Y habrá
  alternatives_spanish:
  - Y existirá
  - Y se levantará
  lexicon: Conjunción narrativa + hay futuro
  rationale: El Geʿez comienza con la conjunción ወ, que aquí introduce continuidad narrativa; por eso se conserva con «Y». El futuro impersonal «habrá» refleja bien la existencia/ocurrencia prevista sin sobrerelocalizar la sintaxis.
- source_word: ያስተሐይጹ
  english_pob_choice: will assuredly make observations
  chosen_spanish: observarán sin falta
  alternatives_spanish:
  - harán observaciones
  - observarán ciertamente
  lexicon: Verbo de observación/atención calendárica
  rationale: El verbo describe observación sistemática de la luna en contexto calendárico. «Observarán» mantiene la acción; «sin falta» reproduce la fuerza enfática del futuro con certeza, sin volverlo demasiado idiomático o interpretativo.
- source_word: ወርኀ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - el mes lunar
  - el astro lunar
  lexicon: Sustantivo astronómico
  rationale: La referencia es directamente a la luna como cuerpo celeste observado para el cómputo de tiempos. «La luna» es la forma natural y exacta en español.
- source_word: ታማስን
  english_pob_choice: corrupts
  chosen_spanish: corrompe
  alternatives_spanish:
  - arruina
  - destruye
  - estropea
  lexicon: Verbo de daño/corrupción
  rationale: 'La revisión doctrinal indicó que el geʿez ታማስን expresa más que «disturba»: implica corromper/arruinar. «Corrompe» preserva esa fuerza y el tono polémico del pasaje.'
- source_word: ጊዜያተ፡
  english_pob_choice: the seasons
  chosen_spanish: las estaciones
  alternatives_spanish:
  - los tiempos
  - los períodos
  lexicon: Término temporal/cósmico
  rationale: El plural alude al orden estacional o temporal afectado por la luna. «Las estaciones» comunica bien el marco cósmico-calendárico en español, y corresponde al sentido del inglés auditado.
theological_decisions:
- issue: La relación causal entre la observación lunar y el daño a las estaciones
  english_pob_reading: for it corrupts the seasons
  chosen_spanish_reading: porque ella corrompe las estaciones
  alternative_spanish_readings:
  - pues corrompe las estaciones
  - porque corrompe las estaciones
  rationale: Se explicita la causalidad con «porque», en línea con la revisión inglesa que hizo explícito el motivo. Se mantiene el sujeto «ella» para evitar ambigüedad y para que la luna quede como agente del daño calendario-teológico.
  doctrine_reference: Calendario/judicial-temporal en Jubileos; fidelidad al orden creado frente a cómputos lunares
- issue: Fuerza semántica de ታማስን en contexto polemico
  english_pob_reading: disturbs the seasons
  chosen_spanish_reading: corrompe las estaciones
  alternative_spanish_readings:
  - altera las estaciones
  - perturba las estaciones
  rationale: La nota de revisión prioriza la primacía del original y la carga polémica del pasaje. «Corrompe» conserva la gravedad moral/cósmica mejor que un simple «altera» o «perturba».
  doctrine_reference: Principio de primacía del idioma original y preservación de tensión lexical
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de «For there will be» a «And there will be» por la conjunción inicial del Geʿez, y de «disturbs» a «corrupts» por la fuerza semántica de ታማስን. La traducción española sigue esas dos revisiones: conserva el enlace narrativo con «Y» y traduce el daño lunar con «corrompe».'
  spanish_consistency_notes:
  - Se prefirió «luna» en lugar de perífrasis astronómicas, porque el texto habla directamente del astro.
  - Se mantuvo un registro digno y claro, apto para lectura eclesial moderna.
  - La nota al pie está anclada en «observarán» para ofrecer la alternativa verbal sin duplicar el sentido principal.
