revisions:
- from: Y habrá quienes sin falta observarán la luna[a], porque ella corrompe las estaciones.
  to: Y habrá quienes observarán la luna, porque corrompe las estaciones.[a]
  rationale: Se suaviza una construcción algo rígida para mejorar la naturalidad del español sin apartarse del sentido fuente; se elimina el pronombre enfático innecesario; y se reemplaza la nota por la alternativa realmente documentada en el English POB, anclándola donde corresponde en el texto.
