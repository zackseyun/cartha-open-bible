translation:
  language: es
  text: Pero no deben comer carne con su vida, con su sangre; porque la vida de toda carne está en la sangre, para que no se exija su sangre por sus vidas. De la mano de todo hombre, de la mano de todo ser viviente, exigiré la sangre del hombre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሥጋ / flesh
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - carne viva
  lexicon: σάρξ / בשר semantic field
  rationale: ‘Carne’ conserva el campo semántico básico del original y de la versión inglesa POB sin introducir una reinterpretación antropológica innecesaria.
- source_word: መንፈሱ / its life, its spirit
  english_pob_choice: its life
  chosen_spanish: su vida
  alternatives_spanish:
  - su espíritu
  - su aliento
  lexicon: נפש / ζωή semantic field
  rationale: El contexto explica que se trata de la vida vinculada a la sangre; ‘vida’ es más preciso en español que ‘espíritu’ o ‘aliento’ aquí.
- source_word: ደሙ / blood
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - la sangre
  lexicon: דם semantic field
  rationale: ‘Sangre’ es la correspondencia directa y transparente para el término ge’ez, y mantiene la repetición enfática del pasaje.
- source_word: ነፍሰ፡ ኵሉ፡ ዘሥጋ / the life of all flesh
  english_pob_choice: the life of all flesh
  chosen_spanish: la vida de toda carne
  alternatives_spanish:
  - el alma de toda carne
  - la vida de todo ser
  lexicon: נפש + בשר semantic field
  rationale: Se preserva la relación vida-carne con un español natural; ‘alma’ desplazaría el sentido biológico que el contexto exige.
- source_word: ውስተ፡ ደም / is in the blood
  english_pob_choice: is in the blood
  chosen_spanish: está en la sangre
  alternatives_spanish:
  - reside en la sangre
  - se halla en la sangre
  lexicon: prepositional state / location
  rationale: ‘Está en la sangre’ comunica la afirmación simple del original sin añadir matices filosóficos.
- source_word: ከመ፡ ኢይትኀሠሥ / so that ... may not be sought
  english_pob_choice: so that ... may not be sought
  chosen_spanish: para que no sea buscada
  alternatives_spanish:
  - para que no se exija
  - de modo que no sea reclamada
  lexicon: passive purpose clause
  rationale: La pasiva española conserva el sentido de finalidad/prevención del texto, y evita endurecer el verbo más allá del pasaje.
- source_word: ደምክሙ፡ ውስተ፡ ነፍሳቲክሙ / your blood for your lives
  english_pob_choice: your blood for your lives
  chosen_spanish: la sangre de ustedes por sus vidas
  alternatives_spanish:
  - su sangre por sus vidas
  - su sangre en lugar de sus vidas
  lexicon: possessive plural + purpose/referential phrase
  rationale: ‘La sangre de ustedes por sus vidas’ conserva la extrañeza sintáctica del original y el valor relacional del giro, sin suavizarlo demasiado.
- source_word: እምውስተ፡ እዴ፡ ኵሉ፡ ሰብእ / From the hand of every man
  english_pob_choice: From the hand of every man
  chosen_spanish: De la mano de todo hombre
  alternatives_spanish:
  - De parte de todo hombre
  - De cada hombre
  lexicon: idiom of accountability
  rationale: ‘De la mano de’ mantiene la imagen idiomática de rendición de cuentas; ‘de parte de’ perdería la fuerza literal del hebraísmo.
- source_word: እምእዴ፡ ኵሉ፡ / from the hand of every
  english_pob_choice: from the hand of every living thing
  chosen_spanish: de la mano de todo ser viviente
  alternatives_spanish:
  - de todo ser viviente
  - de la mano de toda criatura
  lexicon: idiom of accountability
  rationale: Se preserva la repetición del hebraísmo ‘mano’ como señal de responsabilidad y reclamación divina.
- source_word: አኀሥሦ / I will require
  english_pob_choice: I will require
  chosen_spanish: exigiré
  alternatives_spanish:
  - pediré cuenta de
  - reclamaré
  lexicon: דרש / require
  rationale: ‘Exigiré’ es directo y mantiene la fuerza judicial de la reclamación sin añadir explicaciones ausentes en el texto.
- source_word: ደመ፡ ሰብእ / the blood of man
  english_pob_choice: the blood of man
  chosen_spanish: la sangre del hombre
  alternatives_spanish:
  - la sangre humana
  - la sangre del ser humano
  lexicon: דם + אדם semantic field
  rationale: ‘Del hombre’ reproduce la formulación general del original y del audit trail inglés; ‘humana’ explicita pero cambia el registro.
theological_decisions:
- issue: Relación entre vida y sangre como principio prohibitivo
  english_pob_reading: the life of all flesh is in the blood
  chosen_spanish_reading: la vida de toda carne está en la sangre
  alternative_spanish_readings:
  - la sangre contiene la vida de toda carne
  - la vida de toda carne reside en la sangre
  rationale: La formulación elegida preserva la afirmación textual sin convertirla en una explicación médica o filosófica.
  doctrine_reference: Génesis 9:4; Levítico 17:11
- issue: Obligación/juicio por derramamiento de sangre
  english_pob_reading: I will require the blood of man
  chosen_spanish_reading: exigiré la sangre del hombre
  alternative_spanish_readings:
  - reclamaré la sangre del hombre
  - pediré cuenta de la sangre del hombre
  rationale: ‘Exigiré’ conserva la dimensión judicial y retributiva del pasaje, en línea con el eco bíblico de responsabilidad por sangre.
  doctrine_reference: Génesis 9:5-6
translation_notes:
  revision_awareness: La versión inglesa revisada cambió ‘lest your blood of your lives be sought’ por ‘so that your blood for your lives may not be sought’. La traducción española sigue esa finalidad más natural con ‘para que no sea buscada la sangre de ustedes por sus vidas’, evitando una construcción arcaica y manteniendo la relación causal/preventiva del original.
  spanish_consistency_notes:
  - Se mantuvo ‘carne’ y ‘sangre’ de forma consistente para el campo semántico central.
  - Se conservó la repetición idiomática ‘de la mano de’ para reflejar el hebraísmo de responsabilidad.
  - No se introdujo ‘Cristo’, ‘SEÑOR’ ni otro equivalente litúrgico, ya que el pasaje no lo requiere.
  - Se optó por ‘vida’ en lugar de ‘espíritu’ para evitar confundir el enunciado con una antropología distinta del contexto.
