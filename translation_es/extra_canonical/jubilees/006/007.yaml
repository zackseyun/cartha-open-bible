revisions:
- from: Pero no comerán carne con su vida, con su sangre; porque la vida de toda carne está en la sangre, para que no sea buscada la sangre de ustedes por sus vidas. De la mano de todo hombre, de la mano de todo ser viviente, exigiré la sangre del hombre.
  to: Pero no deben comer carne con su vida, con su sangre; porque la vida de toda carne está en la sangre, para que no se exija su sangre por sus vidas. De la mano de todo hombre, de la mano de todo ser viviente, exigiré la sangre del hombre.
  rationale: Se corrige la prohibición inicial para expresar mandato normativo en español natural y fiel al original. Se reemplaza ‘sea buscada’ por ‘se exija’ para reflejar el mismo campo judicial que culmina en ‘exigiré la sangre del hombre’. También se aligera la frase posesiva a ‘su sangre por sus vidas’ sin pérdida semántica.
