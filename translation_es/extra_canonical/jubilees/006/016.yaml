  rationale: Se ajusta la cláusula final para conservar el sentido fuente de duración continua de manera idiomática en español ('mientras dure la tierra') y se explicita mejor la idea de repetición negada con 'volviera a haber'. No se requieren notas al pie porque no se introduce nueva ambigüedad ni se pierde una alternativa preservada por el POB inglés.
