translation:
  language: es
  text: Puso su arco en la nube como señal del pacto eterno, para que nunca más volviera a haber aguas de diluvio sobre la tierra para destruirla mientras dure la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቀስተ
  english_pob_choice: his bow
  chosen_spanish: su arco
  alternatives_spanish:
  - su arco de guerra
  - el arco
  lexicon: Léxico contextual de objeto/símbolo del arco
  rationale: El ge'ez designa un arco, y el inglés POB conserva la imagen concreta del arma. En español, 'su arco' mantiene la referencia simple y natural sin añadir explicaciones que el texto no da.
- source_word: ውስተ፡ ደመና
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - en la nube
  - dentro de la nube
  lexicon: Léxico de ubicación preposicional
  rationale: La frase describe el lugar donde se coloca el arco. 'En la nube' sigue de cerca el original y es idiomático en español.
- source_word: ትእምርተ፡ ኪዳን
  english_pob_choice: a sign of the everlasting covenant
  chosen_spanish: como señal del pacto eterno
  alternatives_spanish:
  - como señal del pacto perpetuo
  - como señal del pacto para siempre
  lexicon: קִדָּם / convenio-covenant conceptual field
  rationale: '''Señal'' traduce bien el valor de marcador visible. ''Pacto eterno'' conserva la duración del ge''ez y coincide con el sentido de ''everlasting covenant'' del POB inglés, con español natural y solemne.'
- source_word: ከመ፡ ኢይኩን
  english_pob_choice: that there should never again be
  chosen_spanish: para que nunca más hubiera
  alternatives_spanish:
  - para que no volviera a haber
  - a fin de que nunca más hubiera
  lexicon: Léxico modal de propósito/resultado
  rationale: La construcción final expresa propósito/resulto. 'Para que nunca más hubiera' reproduce la intención negativa sin sobrecargar el español.
- source_word: ማየ፡ አይኅ
  english_pob_choice: floodwaters
  chosen_spanish: aguas de diluvio
  alternatives_spanish:
  - aguas del diluvio
  - aguas de inundación
  lexicon: Campo semántico de catástrofe hídrica
  rationale: '''Aguas de diluvio'' mantiene el vínculo con el relato del diluvio y evita una reducción a una inundación común.'
- source_word: ዲበ፡ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre la superficie de la tierra
  lexicon: Léxico espacial
  rationale: '''Sobre la tierra'' es la equivalencia más natural para el alcance global del juicio.'
- source_word: ለአማስኖታ፡ ኵሎ፡ መዋዕለ፡ ምድር
  english_pob_choice: to destroy it all the days of the earth
  chosen_spanish: para destruirla todos los días de la tierra
  alternatives_spanish:
  - para destruirla mientras dure la tierra
  - para destruirla por todos los días de la tierra
  lexicon: Temporalidad idiomática
  rationale: El griego/ge'ez apunta a una duración total asociada con la existencia de la tierra. La opción española conserva la rareza temporal del original sin reinterpretarla demasiado.
theological_decisions:
- issue: Alcance del pacto
  english_pob_reading: everlasting covenant
  chosen_spanish_reading: pacto eterno
  alternative_spanish_readings:
  - pacto perpetuo
  - pacto para siempre
  rationale: La formulación mantiene la durabilidad absoluta del pacto sin sustituirla por una expresión menos intensa. 'Eterno' es claro, bíblico y fiel al sentido del POB inglés.
  doctrine_reference: Génesis 9:12-17; Jubileos 6:16
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; por eso se conserva una traducción directa, sin notas textuales añadidas.
  spanish_consistency_notes:
  - Se mantiene 'pacto' para covenant y 'señal' para sign, de forma consistente con el registro bíblico en español.
  - Se conserva 'diluvio' para floodwaters por su conexión intertextual con el relato del Génesis.
  - No se introduce 'SEÑOR' ni otros ajustes teológicos no motivados por el texto, ya que el pasaje no contiene el tetragrámaton ni títulos divinos explícitos.
