base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/017.yaml
  text: For this reason it is ordained and written on the heavenly tablets that they should celebrate the Feast of Weeks in this month, once each year, to renew the covenant every year.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:44Z'
    unchanged: false
    changes_summary: Capitalized 'Feast of Weeks' as a festival name; otherwise left the draft unchanged as accurate and natural.
translation:
  language: es
  text: Por esta razón, está ordenado y escrito en las tablas celestiales que celebren la Fiesta de las Semanas en este mes, una vez cada año, para renovar el pacto cada año.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ተሠርዐ፡ ወተጽሕፈ፡
  english_pob_choice: it is ordained and written
  chosen_spanish: está ordenado y escrito
  alternatives_spanish:
  - ha sido ordenado y escrito
  - está decretado y escrito
  lexicon: ordain / write
  rationale: Conserva la coordinación de dos pasivos del original (“ordenado” y “escrito”) y mantiene un registro formal sin añadir matices no presentes en el texto fuente.
- source_word: ውስተ፡ ጽላተ፡ ሰማይ፡
  english_pob_choice: on the heavenly tablets
  chosen_spanish: en las tablas celestiales
  alternatives_spanish:
  - sobre las tablas celestiales
  - en las tablas del cielo
  lexicon: heavenly tablets
  rationale: ‘Tablas celestiales’ reproduce el sustantivo compuesto del original de forma natural en español y evita una paráfrasis explicativa que exceda el texto.
- source_word: ሱባዔ
  english_pob_choice: Feast of Weeks
  chosen_spanish: Fiesta de las Semanas
  alternatives_spanish:
  - Fiesta de las Semanas Santas
  - fiesta de las semanas
  lexicon: Feast of Weeks
  rationale: Se conserva el nombre festivo con mayúsculas por tratarse de un título cultual; ‘Fiesta de las Semanas’ es la forma más directa y transparente en español.
- source_word: በዝ፡ ወርኅ፡
  english_pob_choice: in this month
  chosen_spanish: en este mes
  alternatives_spanish:
  - en este mes mismo
  - durante este mes
  lexicon: this month
  rationale: Traducción directa y idiomática que conserva la referencia temporal del texto sin introducir precisión no dicha.
- source_word: ለሐዲስ፡ ኪዳን፡
  english_pob_choice: to renew the covenant
  chosen_spanish: para renovar el pacto
  alternatives_spanish:
  - para renovar el pacto/covenio
  - para renovar la alianza
  lexicon: covenant
  rationale: ‘Pacto’ mantiene el valor bíblico-jurídico habitual en español y evita reemplazarlo por ‘alianza’, que puede sonar más interpretativo en este contexto.
theological_decisions:
- issue: La finalidad del año y la repetición anual del rito
  english_pob_reading: once each year, to renew the covenant every year
  chosen_spanish_reading: una vez cada año, para renovar el pacto cada año
  alternative_spanish_readings:
  - una vez al año, para renovar el pacto cada año
  - una vez cada año, para renovar el pacto anualmente
  rationale: Se conserva la repetición enfática del original (‘una vez cada año’ / ‘cada año’) porque el texto subraya la periodicidad ritual y su función de renovación del pacto.
  doctrine_reference: Jubilees 6:17 ritual calendar / covenant renewal
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que capitaliza ‘Feast of Weeks’ como nombre festivo y deja intacta la estructura de ‘ordained and written on the heavenly tablets’ y de la cláusula final sobre la renovación del pacto.
  spanish_consistency_notes:
  - Se mantuvo ‘pacto’ de forma consistente para ‘covenant’, por su fuerza jurídica y de alianza en español bíblico.
  - Se usó ‘Fiesta de las Semanas’ con mayúsculas como nombre de festividad, en consonancia con la revisión inglesa.
  - ‘Tablas celestiales’ conserva la imaginería apocalíptica del original sin sustituirla por una expresión más interpretativa.
