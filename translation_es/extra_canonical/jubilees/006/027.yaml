  text: se abrieron las profundidades de la tierra, y las aguas comenzaron a descender a ellas. Y en la luna nueva del décimo mes
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መዓምቅተ፡ ምድር፡
  english_pob_choice: the depths of the earth were opened
  chosen_spanish: se abrieron las profundidades de la tierra
  alternatives_spanish:
  - se abrieron los abismos de la tierra
  - fueron abiertas las profundidades de la tierra
  lexicon: Ge'ez መዓምቅተ / mʿmqt = profundidades, abismos; ምድር = tierra
  rationale: ‘Profundidades’ conserva el valor espacial de lo subterráneo sin añadir una connotación demasiado infernal que ‘abismos’ podría sugerir en español. La voz pasiva se vuelve natural en español con ‘se abrieron’.
- source_word: ወአንዘ፡ ማያት፡ ይረድ፡ ውስቴቱ።
  english_pob_choice: and the waters began to descend into them
  chosen_spanish: y las aguas comenzaron a descender en ellas
  alternatives_spanish:
  - y las aguas empezaron a bajar en ellas
  - y las aguas se pusieron a descender dentro de ellas
  lexicon: Ge'ez ማያት = aguas; ይረድ = descienden, bajan; ውስቴቱ = en ellas / dentro de ellas
  rationale: ‘Descender’ sigue de cerca el verbo de movimiento hacia abajo y mantiene el tono elevado del texto. ‘En ellas’ respeta el antecedente plural (‘las profundidades’) sin forzar una ampliación interpretativa.
- source_word: ወበሠርቀ፡ ወርኅ፡ ዓሥር፡
  english_pob_choice: And on the new moon of the tenth month
  chosen_spanish: Y en la luna nueva del décimo mes
  alternatives_spanish:
  - Y en el novilunio del décimo mes
  - Y en la luna nueva del mes décimo
  lexicon: Ge'ez ወርኅ = mes / luna; ሰርቅ = salida, nueva luna; ዓሥር = diez, décimo
  rationale: ‘Luna nueva’ es la forma española más clara y fiel para el marcador calendárico. Se mantiene ‘décimo mes’ para conservar el orden y el ritmo del original, sin introducir nombres de meses no atestiguados aquí.
theological_decisions:
- issue: Forma de la pasiva y agente implícito en la apertura de las profundidades
  english_pob_reading: the depths of the earth were opened
  chosen_spanish_reading: se abrieron las profundidades de la tierra
  alternative_spanish_readings:
  - fueron abiertas las profundidades de la tierra
  rationale: El texto no explicita agente; por eso conviene una pasiva refleja impersonal en español. Esto mantiene la misma neutralidad del inglés POB y evita añadir un sujeto no presente en la fuente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; la redacción española sigue de cerca el acuerdo alto entre fuente ge'ez y traducción inglesa POB, sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ u otra equivalencia no pertinente, porque este versículo no contiene el nombre divino.
  - ‘Profundidades’ se mantiene como término geográfico/cosmológico, no como interpretación simbólica.
  - ‘Luna nueva’ se usa en sentido calendárico, no devocional.
