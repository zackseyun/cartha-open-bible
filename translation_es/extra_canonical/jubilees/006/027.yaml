    issue: La expresión 'las aguas comenzaron a descender en ellas' es poco idiomática en español.
    rationale: Aunque 'en ellas' refleja literalmente el antecedente plural, en español el verbo 'descender' normalmente pide una construcción de dirección más explícita en este contexto. 'Descender a ellas' o 'descender dentro de ellas' transmite mejor el movimiento de entrada indicado por el ge'ez y por el inglés POB 'into them'.
