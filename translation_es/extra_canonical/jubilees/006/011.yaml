base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/011.yaml
  text: Therefore I have said that you also shall make a covenant with the children of Israel in this month on the mountain, with an oath; and you shall sprinkle blood on them because of all the words of the covenant that God made with them for all days.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:35:15Z'
    unchanged: false
    changes_summary: Adjusted word order for more natural English ('you also shall make'), changed 'upon the mountain' to 'on the mountain' and 'upon them' to 'on them' for idiomatic usage, and rendered እግዚአብሔር as 'God' instead of 'the LORD'.
translation:
  language: es
  text: Por eso he dicho que tú también harás un pacto con los hijos de Israel en este mes, en el monte, con juramento; y rociarás sangre sobre ellos a causa de todas las palabras del pacto que Dios hizo con ellos para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በእንተ፡ ዝንቱ፡ ተናገርኩ፡
  english_pob_choice: Therefore I have said
  chosen_spanish: Por eso he dicho
  alternatives_spanish:
  - Por tanto he dicho
  - Así que he dicho
  lexicon: causal connective + perfect of speech
  rationale: El giro introduce una conclusión causal; «Por eso» comunica mejor la relación inferencial que un calco más rígido. «He dicho» conserva el valor de declaración previa sin añadir matices no presentes.
- source_word: አንተኒ
  english_pob_choice: you also
  chosen_spanish: tú también
  alternatives_spanish:
  - también tú
  - vos también
  lexicon: 2nd person emphatic/additive particle
  rationale: La partícula añade énfasis inclusivo o aditivo; «tú también» conserva ese valor de manera natural en español.
- source_word: ኪዳነ
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - pacto del convenio
  lexicon: covenant term
  rationale: «Pacto» mantiene el lenguaje bíblico y jurídico sin forzar una tradición confesional fija. Es equivalente al inglés POB «covenant» y adecuado para Jubileos.
- source_word: ደቂቀ፡ እስራኤል፡
  english_pob_choice: children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los descendientes de Israel
  lexicon: genealogical covenant people
  rationale: Se conserva la expresión tradicional del referente colectivo; «hijos» refleja bien el idiomático semitismo del original y del inglés auditado.
- source_word: በዝ፡ ወርኅ፡
  english_pob_choice: in this month
  chosen_spanish: en este mes
  alternatives_spanish:
  - en este mes
  - durante este mes
  lexicon: time expression
  rationale: La forma simple «en este mes» es la correspondencia más directa y natural.
- source_word: በዲበ፡ ደብር፡
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - en la montaña
  lexicon: mountain/mountain-top locale
  rationale: «Monte» es más bíblico y fluido en español que «montaña» en este contexto. «En» evita el calco literal de superficie y reproduce bien la localización.
- source_word: ምስለ፡ ማሕላ፡
  english_pob_choice: with an oath
  chosen_spanish: con juramento
  alternatives_spanish:
  - con un juramento
  - bajo juramento
  lexicon: oath formula
  rationale: «Juramento» es el sustantivo natural para un pacto solemnizado. «Con juramento» mantiene la preposición relacional del original sin sobrerredactar.
- source_word: ወ*ትእዛዝ፡
  english_pob_choice: and you shall sprinkle blood on them
  chosen_spanish: y rociarás sangre sobre ellos
  alternatives_spanish:
  - y salpicarás sangre sobre ellos
  - y asperjarás sangre sobre ellos
  lexicon: cultic blood-sprinkling
  rationale: «Rociarás» comunica el acto ritual sin cargarlo de tecnicismo. Se evita «asperjar» por ser más técnico y menos transparente para el lector general, aunque se reconoce como alternativa cultual.
- source_word: ኵሉ፡ ነገረ፡ ኪዳን፡
  english_pob_choice: all the words of the covenant
  chosen_spanish: todas las palabras del pacto
  alternatives_spanish:
  - todas las palabras del pacto
  - todos los términos del pacto
  lexicon: covenant stipulations
  rationale: «Palabras» sigue de cerca el original y el inglés POB, preservando el carácter verbal/declarativo de las estipulaciones del pacto.
- source_word: ዘ*ተካየደ፡ እግዚአብሔር፡
  english_pob_choice: that God made
  chosen_spanish: que Dios hizo
  alternatives_spanish:
  - que Yahvé hizo
  - que el Señor hizo
  lexicon: divine agent in covenant making
  rationale: El texto ge'ez usa el nombre divino, pero la revisión inglesa decidió «God» y no «the LORD». En español, «Dios» preserva esa decisión auditada y evita introducir una forma de sustitución no reflejada en el audit trail.
theological_decisions:
- issue: Nombre divino en la cláusula del pacto
  english_pob_reading: God made with them
  chosen_spanish_reading: Dios hizo con ellos
  alternative_spanish_readings:
  - Yahvé hizo con ellos
  - el Señor hizo con ellos
  rationale: Aunque el proyecto normalmente usa «Yahvé» para יהוה, aquí la revisión inglesa fijó «God» para እግዚአብሔር. Mantener «Dios» en español sigue el registro auditado y evita sobrespecificar una lectura no adoptada por el texto base revisado.
  doctrine_reference: Nombre divino / fidelidad a la revisión auditada
- issue: Lenguaje del pacto y su solemnización
  english_pob_reading: make a covenant ... with an oath; and you shall sprinkle blood
  chosen_spanish_reading: harás un pacto ... con juramento; y rociarás sangre
  alternative_spanish_readings:
  - concertarás una alianza ... con juramento; y asperjarás sangre
  - sellarás un pacto ... con juramento; y rociarás sangre
  rationale: 'Se conserva la secuencia ritual y jurídica: pacto, juramento y sangre. «Rociarás sangre» evita diluir el gesto cultual o transformarlo en una metáfora no atestiguada.'
  doctrine_reference: Teología del pacto / rito sacrificial
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó el orden para fluidez («you also shall make»), cambió locuciones locativas («on the mountain», «on them») y, sobre todo, sustituyó «the LORD» por «God». La redacción española sigue esa revisión sin reintroducir un nombre divino distinto ni un estilo más arcaizante.
  spanish_consistency_notes:
  - Se mantiene la terminología «pacto» para covenant, coherente con este pasaje y con el registro jurídico del libro.
  - Se conserva «hijos de Israel» como grupo pactual colectivo.
  - «Monte» y «en el monte» mantienen un español bíblico claro sin caer en calcos rígidos.
  - No se introdujeron notas al pie porque no hubo una variante textual o alternativa lexical que requiriera anclaje explícito en el verso.
