review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del ge''ez y del English POB auditado: conclusión causal, énfasis aditivo en segunda persona, pacto con los hijos de Israel, marco temporal y locativo, juramento, aspersión de sangre, y referencia a las palabras del pacto hecho por Dios para siempre. Sin embargo, hay un ajuste importante de fidelidad idiomática y semántica en la cláusula final: «para todos los días» suena calcado y no expresa naturalmente el valor durativo de «for all days».'
  spanish_quality_summary: 'El español es claro y mayormente natural, pero puede mejorarse en dos puntos: 1) «para todos los días» resulta poco idiomático en español bíblico moderno; «para siempre» o «por todos los días» sería mejor, y aquí «para siempre» comunica con más naturalidad el valor de permanencia. 2) «sobre ellos» es aceptable, aunque «sobre ellos»/«encima de ellos» no necesita cambio; el resto del verso lee con buena dignidad y claridad.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «pacto», «Dios», «hijos de Israel». No hay conflicto con el default de «Yahvé», porque el audit trail inglés fijó explícitamente «God» para እግዚአብሔር en este lugar. «Rociarás» es una elección razonable para el gesto cultual.'
  issues:
  - severity: medium
    issue: La frase «para todos los días» es un calco poco natural en español.
    rationale: Aunque reproduce de cerca el inglés «for all days», en español suena forzado y puede entorpecer la lectura. El sentido durativo/perpetuo queda mejor expresado por «para siempre», que preserva el significado sin paráfrasis indebida.
  revised_spanish_text: Por eso he dicho que tú también harás un pacto con los hijos de Israel en este mes, en el monte, con juramento; y rociarás sangre sobre ellos a causa de todas las palabras del pacto que Dios hizo con ellos para siempre.
  revision_rationale: 'Se mantiene íntegramente el contenido del borrador, con una sola reparación de estilo y fidelidad idiomática: «para todos los días» se cambia a «para siempre» para expresar de manera natural en español el valor durativo del original y del audit trail inglés («for all days»). No se requieren notas.'
