revisions:
- from: Todos los días de la tierra, la sementera y la siega no cesarán; el frío y el calor, el verano y el invierno, el día y la noche no cambiarán su orden, ni cesarán para siempre.
  to: Mientras dure la tierra, la siembra y la cosecha no cesarán; el frío y el calor, el verano y el invierno, el día y la noche no cambiarán su orden, ni cesarán jamás.
  rationale: Se ajusta el marco temporal a una expresión española natural que preserva la función adverbial del original; se sustituye la pareja agrícola por una formulación más transparente y ampliamente legible; y se cambia el cierre a 'jamás' para eliminar ambigüedad y reflejar claramente que estos ciclos nunca cesarán.
