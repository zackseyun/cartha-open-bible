translation:
  language: es
  text: Mientras dure la tierra, la siembra y la cosecha no cesarán; el frío y el calor, el verano y el invierno, el día y la noche no cambiarán su orden, ni cesarán jamás.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኵሎ፡ መዋዕለ፡ ምድር፡
  english_pob_choice: All the days of the earth
  chosen_spanish: Todos los días de la tierra
  alternatives_spanish:
  - Todos los días de la tierra
  - Durante todos los días de la tierra
  lexicon: all / days / earth
  rationale: Tomo la frase como un marco temporal adverbial, siguiendo la lectura revisada del inglés POB. 'Todos los días de la tierra' conserva el alcance temporal sin volverla extraña en español.
- source_word: ዘርእ፡ ወማእረር፡
  english_pob_choice: seedtime and harvest
  chosen_spanish: la sementera y la siega
  alternatives_spanish:
  - la siembra y la cosecha
  - la sementera y la siega
  lexicon: seedtime / harvest
  rationale: '''Sementera'' y ''siega'' mantienen el paralelismo agrícola y el tono bíblico sin depender de un calco rígido. ''Siembra y cosecha'' sería más transparente, pero menos cercano al registro del texto fuente.'
- source_word: አይትኀደግ፡
  english_pob_choice: shall not cease
  chosen_spanish: no cesarán
  alternatives_spanish:
  - no dejarán de existir
  - no se interrumpirán
  lexicon: cease
  rationale: '''Cesarán'' reproduce bien la idea de continuidad o suspensión en un registro bíblico natural en español.'
- source_word: ቍር፡ ወሙቀት፡
  english_pob_choice: cold and heat
  chosen_spanish: el frío y el calor
  alternatives_spanish:
  - el frío y el calor
  - el frío y la calidez
  lexicon: cold / heat
  rationale: '''El frío y el calor'' es la correspondencia más clara y idiomática. Conserva el binomio climático del original sin sobreinterpretación.'
- source_word: ወሐጋይ፡ ወክረምት፡
  english_pob_choice: summer and winter
  chosen_spanish: el verano y el invierno
  alternatives_spanish:
  - el verano y el invierno
  lexicon: summer / winter
  rationale: Traducción directa y transparente, adecuada para una formulación pública y auditables.
- source_word: ወመዓልት፡ ወሌሊት፡
  english_pob_choice: and day and night
  chosen_spanish: el día y la noche
  alternatives_spanish:
  - el día y la noche
  lexicon: day / night
  rationale: El español exige el artículo singular en la pareja fija; el sentido distributivo permanece intacto.
- source_word: ኢይወልጡ፡ ሥርዓቶሙ፡
  english_pob_choice: shall not change their order
  chosen_spanish: no cambiarán su orden
  alternatives_spanish:
  - no alterarán su orden
  - no cambiarán su orden
  lexicon: order / regulation
  rationale: '''Orden'' refleja con naturalidad la idea de disposición estable. ''Reglamento'' sería demasiado jurídico y no corresponde bien al contexto cósmico.'
- source_word: ወኢይትኀደጉ፡ ለዓለም።
  english_pob_choice: nor shall they cease forever
  chosen_spanish: ni cesarán para siempre
  alternatives_spanish:
  - ni cesarán jamás
  - ni dejarán de existir jamás
  lexicon: forever / cease
  rationale: '''Para siempre'' mantiene el valor durativo-final del cierre. Unido a ''ni'' conserva el paralelismo con la cláusula anterior.'
theological_decisions:
- issue: Estabilidad del orden creado
  english_pob_reading: The cycles of creation will not cease or change their order.
  chosen_spanish_reading: Los ciclos de la creación no cesarán ni cambiarán su orden.
  alternative_spanish_readings:
  - Los ciclos de la creación no se interrumpirán ni alterarán su orden.
  rationale: 'La formulación mantiene la fuerza cosmológica del texto: estaciones, día y noche permanecen bajo un orden fijo. No introduzco lenguaje doctrinal adicional que el versículo no expresa.'
  doctrine_reference: Providencia y orden creado en el discurso apocalíptico/sapiencial bíblico
- issue: Duración indefinida del decreto
  english_pob_reading: nor shall they cease forever.
  chosen_spanish_reading: ni cesarán para siempre.
  alternative_spanish_readings:
  - ni cesarán jamás.
  rationale: El cierre subraya permanencia absoluta sin añadir matices no presentes en el fuente. 'Para siempre' corresponde al valor temporal totalizante del ge'ez y del inglés POB.
  doctrine_reference: Permanencia del orden establecido por Dios
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la puntuación, pero no alteró el contenido semántico; el español sigue esa lectura unificada de 'All the days of the earth' como marco temporal y conserva las dos cláusulas coordinadas sin introducir variantes textuales adicionales.
  spanish_consistency_notes:
  - Usé 'Yahvé' no porque aparezca aquí, sino como norma general del proyecto; este versículo no contiene el tetragrámaton.
  - Opté por 'Mesías/Cristo' no aplica en este versículo.
  - 'Mantuve el paralelismo de pares binarios: frío/calor, verano/invierno, día/noche.'
  - No añadí notas al pie porque el texto español no requiere variantes ancladas para esta sección.
