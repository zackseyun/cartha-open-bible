base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/001.yaml
  text: And on the new moon of the third month he came out of the ark, and he built an altar on that mountain. And he made atonement for the earth, and he took a young goat and made atonement with its blood for all the guilt of the earth, because everything that had been on it had been destroyed, except those that were in the ark with Noah.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:42Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y en la luna nueva del tercer mes salió del arca, y edificó un altar en ese monte. E hizo expiación por la tierra, y tomó un cabrito y con su sangre hizo expiación por toda la culpa de la tierra, porque todo lo que había en ella había sido destruido, excepto los que estaban en el arca con Noé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሠርቁ ... ለወርኅ ሣልስ
  english_pob_choice: on the new moon of the third month
  chosen_spanish: en la luna nueva del tercer mes
  alternatives_spanish:
  - en el novilunio del tercer mes
  - en la nueva luna del tercer mes
  lexicon: luna nueva / novilunio
  rationale: La expresión ge'ez corresponde al marcador temporal lunar del mes, no a una fecha solar ordinaria. 'Luna nueva' es natural y transparente en español bíblico contemporáneo, y conserva la referencia calendárica del POB inglés.
- source_word: ወፅአ እምአ ታቦት
  english_pob_choice: he came out of the ark
  chosen_spanish: salió del arca
  alternatives_spanish:
  - salió del arca/arca de Noé
  - salió de la nave
  lexicon: arca
  rationale: '''Arca'' es el término bíblico establecido para el refugio de Noé y reproduce el valor del inglés POB sin añadir una glosa innecesaria en el texto principal.'
- source_word: ወሐነጸ ምሥዋዐ
  english_pob_choice: he built an altar
  chosen_spanish: edificó un altar
  alternatives_spanish:
  - construyó un altar
  - levantó un altar
  lexicon: altar
  rationale: '''Edificó'' mantiene un registro digno y tradicional acorde con lenguaje cultual, y corresponde de manera directa al acto de construir un altar.'
- source_word: ወአስተስረየ ... ወአስተስረየ
  english_pob_choice: he made atonement ... made atonement with its blood
  chosen_spanish: hizo expiación ... hizo expiación con su sangre
  alternatives_spanish:
  - hizo propiciación ... hizo propiciación con su sangre
  - realizó expiación ...
  lexicon: hizo expiación
  rationale: La raíz ge'ez expresa el acto sacrificial de cobertura/expurgación de culpa. 'Hizo expiación' conserva la tensión teológica y léxica del original mejor que simplificarlo a 'perdonó' o 'limpió'.
- source_word: መሐስአ፡ ጠሊ
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un macho cabrío joven
  - una cría de cabra
  lexicon: cabrito
  rationale: El término designa una cría de cabra ofrecida en sacrificio. 'Cabrito' es natural, preciso y suficientemente sacrificial en español.
- source_word: በደሙ
  english_pob_choice: with its blood
  chosen_spanish: con su sangre
  alternatives_spanish:
  - por su sangre
  - mediante su sangre
  lexicon: sangre
  rationale: La preposición 'con' refleja de forma directa el medio sacrificial señalado por el texto y preserva la relación entre sangre y expiación.
- source_word: በእንተ ኵሉ አበሳ ምድር
  english_pob_choice: for all the guilt of the earth
  chosen_spanish: por toda la culpa de la tierra
  alternatives_spanish:
  - por toda la culpa de la tierra
  - por toda la iniquidad de la tierra
  - por toda la culpa de la tierra/terreno
  lexicon: culpa de la tierra
  rationale: '''አበሳ'' lleva el sentido de culpa/pecado, y el POB inglés eligió ''guilt''. ''Culpa'' reproduce ese matiz jurídico-moral sin debilitar la carga teológica.'
theological_decisions:
- issue: Expiación aplicada a la tierra
  english_pob_reading: he made atonement for the earth
  chosen_spanish_reading: hizo expiación por la tierra
  alternative_spanish_readings:
  - hizo propiciación por la tierra
  - expiaba la tierra
  rationale: La formulación conserva el alcance cósmico del acto sacrificial sobre la tierra misma, tal como lo hace el POB inglés. 'Expiación' evita reducir el gesto a mero simbolismo ritual.
  doctrine_reference: Sacrificio y expiación en lenguaje bíblico; cf. Levítico 16, teología sacrificial del perdón
- issue: Exclusión de los supervivientes del juicio
  english_pob_reading: everything that had been on it had been destroyed, except those that were in the ark with Noah
  chosen_spanish_reading: porque todo lo que había en ella había sido destruido, excepto los que estaban en el arca con Noé
  alternative_spanish_readings:
  - excepto los que estaban en el arca junto con Noé
  - salvo los que estaban en el arca con Noé
  rationale: Se conserva la excepción explícita del juicio universal sin suavizar el contraste entre destrucción total y preservación del arca. La construcción sigue de cerca el audit trail inglés.
  doctrine_reference: Juicio universal y preservación de Noé; cf. Génesis 6–8
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto ge'ez y el inglés POB auditado; no se registran revisiones posteriores ni cambios editoriales en el pasaje, y la concordancia de revisión indica alta conformidad sin ajustes necesarios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma editorial solo cuando aparezca el nombre divino explícito; aquí no hay ocurrencia.
  - Se preserva 'arca' por coherencia con la tradición bíblica y con el inglés POB.
  - Se usa 'hizo expiación' de forma consistente para el lenguaje sacrificial del pasaje.
  - No se introduce glosa doctrinal en el cuerpo del texto; las precisiones quedan en decisiones léxicas y teológicas.
