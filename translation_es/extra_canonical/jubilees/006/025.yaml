lexical_decisions:
- source_word: ተዝካረ
  english_pob_choice: memorial
  chosen_spanish: memorial
  alternatives_spanish:
  - recordatorio
  - monumento conmemorativo
  lexicon: No se proporciona número de lexicón en el material fuente; se evita inventarlo.
  rationale: El ge’ez expresa una idea de recuerdo con valor conmemorativo. «Memorial» conserva ese sentido más solemne y cultual que un simple «recordatorio», y sigue de cerca la elección inglesa de POB.
- source_word: በሠርቀ፡ ወርኅ፡ ቀዳሚ፡
  english_pob_choice: on the new moon of the first month
  chosen_spanish: en la luna nueva del primer mes
  alternatives_spanish:
  - en la novilunio del primer mes
  - al inicio del primer mes
  lexicon: No se proporciona número de lexicón en el material fuente; se evita inventarlo.
  rationale: La expresión alude a la luna nueva como marcador calendárico. «Luna nueva» es natural en español bíblico contemporáneo y comunica el valor temporal del original sin perder precisión.
- source_word: ይግበር፡ ታቦተ
  english_pob_choice: he should make the ark
  chosen_spanish: hiciera el arca
  alternatives_spanish:
  - construyera el arca
  - hiciese el arca
  lexicon: No se proporciona número de lexicón en el material fuente; se evita inventarlo.
  rationale: El verbo transmite una orden de fabricación/construcción. «Hiciera» permite una subordinada natural en español tras «se le dijo que», y «arca» conserva el objeto técnico y tradicional del texto.
theological_decisions:
- issue: Valor conmemorativo de «memorial»
  english_pob_reading: they became for him a memorial
  chosen_spanish_reading: les sirvieron como memorial
  alternative_spanish_readings:
  - fueron para él un recordatorio
  - quedaron como conmemoración para él
  rationale: La frase no describe solo memoria subjetiva, sino un signo con función objetiva de recuerdo. «Memorial» preserva esa densidad semántica sin introducir explicaciones ajenas al texto.
  doctrine_reference: Función memorial/conmemorativa del signo en la narración bíblica
- issue: Secuencia temporal y modalidad de la instrucción
  english_pob_reading: And on the new moon of the first month it was said to him that he should make the ark
  chosen_spanish_reading: Y en la luna nueva del primer mes se le dijo que hiciera el arca
  alternative_spanish_readings:
  - Y en la luna nueva del primer mes se le mandó hacer el arca
  - Y en la luna nueva del primer mes le fue dicho que construyera el arca
  rationale: Se mantiene el pasivo impersonal «se le dijo» como reflejo sobrio del original y de la versión inglesa, evitando agregar un sujeto explícito que el pasaje no nombra.
  doctrine_reference: Narrativa revelacional/instrucción divina
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente propuesta mantiene ese acuerdo alto y conserva la estructura semántica de la traducción inglesa POB, apoyándose en el texto ge’ez para las dos unidades del versículo.
  spanish_consistency_notes:
  - Se mantiene «arca» sin especificar «del pacto» porque el segmento fuente no lo añade.
  - 'Se conserva el orden de las dos cláusulas principales del inglés POB para reflejar la progresión del original: memorial → instrucción para construir el arca.'
  - No se introducen notas al pie porque el segmento no presenta una variante textual relevante en el paquete fuente ni ambigüedad española que requiera desambiguación adicional.
