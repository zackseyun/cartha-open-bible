    rationale: El original ge’ez y el inglés POB incluyen que llegaron a ser memorial «para él». «Les sirvieron como memorial» comunica función, pero atenúa la relación explícita con el referente.
  - severity: low
    issue: «Les sirvieron como memorial» suena algo interpretativo frente a una equivalencia más directa.
    rationale: La formulación con «sirvieron» introduce un matiz instrumental no necesario cuando el texto puede representarse más literalmente y con buen español.
  revised_spanish_text: de modo que llegaron a ser para él un memorial. Y en la luna nueva del primer mes se le dijo que hiciera el arca,
