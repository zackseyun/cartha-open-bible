base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/002.yaml
  text: And he placed the fat on the altar, and he took an ox and a ram and a sheep and kids and salt and a turtledove and a young pigeon, and he offered a burnt offering on the altar, and he set upon them an offering mixed with oil, and he sprinkled wine, and he put incense over everything, and he caused a pleasing fragrance to rise up, acceptable before the Lord.
  footnotes:
  - marker: a
    text: Or 'poured out'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:43Z'
    unchanged: false
    changes_summary: Standardized 'turtle-dove' to 'turtledove' and changed 'the LORD' to 'the Lord' to avoid using the divine-name substitute where the source does not indicate YHWH.
translation:
  language: es
  text: Y puso la grasa sobre el altar, y tomó un toro, un carnero, una oveja, cabritos, sal, una tórtola y un pichón, y ofreció sobre el altar un holocausto, y puso encima una ofrenda mezclada con aceite, y roció vino, y puso incienso sobre todo, y hizo subir un aroma agradable, aceptable delante del Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሥብሐ
  english_pob_choice: fat
  chosen_spanish: grasa
  alternatives_spanish:
  - grosura
  - sebo
  lexicon: semantic equivalent for sacrificial fat
  rationale: En el contexto sacrificial, el sentido es la grasa/grasa ritual que se coloca sobre el altar; 'grasa' es natural y fiel en español, mientras 'sebo' suena más técnico o restringido.
- source_word: ምሥዋዕ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar de sacrificio
  lexicon: altar
  rationale: El referente es claramente el altar de sacrificio; 'altar' conserva la forma breve y clara del texto base.
- source_word: ላህመ
  english_pob_choice: ox
  chosen_spanish: toro
  alternatives_spanish:
  - buey
  - novillo
  lexicon: bovine sacrificial animal
  rationale: '''Toro'' comunica bien el animal grande sacrificial en español moderno y sigue el valor general de ''ox'' en este contexto; ''buey'' puede sonar más específico a animal castrado y ''novillo'' añade una precisión no garantizada.'
- source_word: በሐኰ
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  lexicon: sheep male
  rationale: '''Carnero'' es el equivalente directo y usual para el macho de la oveja.'
- source_word: በገዐ
  english_pob_choice: sheep
  chosen_spanish: oveja
  alternatives_spanish:
  - cordera
  - animal del rebaño
  lexicon: sheep
  rationale: '''Oveja'' reproduce el término genérico sin introducir edad o sexo no presentes en el ge''ez.'
- source_word: አጣሊ
  english_pob_choice: kids
  chosen_spanish: cabritos
  alternatives_spanish:
  - crías de cabra
  - chivos pequeños
  lexicon: young goats
  rationale: '''Cabritos'' conserva el plural y la idea de cabras jóvenes ofrecidas como sacrificio.'
- source_word: ጼወ
  english_pob_choice: turtledove
  chosen_spanish: tórtola
  alternatives_spanish:
  - paloma torcaz
  lexicon: dove/turtledove
  rationale: '''Tórtola'' es el equivalente bíblico natural en español y distingue bien el ave nombrada.'
- source_word: መንጢጠ
  english_pob_choice: young pigeon
  chosen_spanish: pichón
  alternatives_spanish:
  - pichón de paloma
  - palomino
  lexicon: young pigeon
  rationale: '''Pichón'' transmite la idea de una paloma joven sin sobrecargar el texto; ''pichón de paloma'' sería más explícito pero menos fluido.'
- source_word: አዕረገ፡ ጽንሓሐ፡ ውስተ፡ ምሥዋዕ
  english_pob_choice: he offered a burnt offering on the altar
  chosen_spanish: ofreció sobre el altar un holocausto
  alternatives_spanish:
  - hizo subir un holocausto sobre el altar
  - presentó un holocausto sobre el altar
  lexicon: burnt offering
  rationale: '''Holocausto'' es el término tradicional y técnico para la ofrenda totalmente quemada; se mantiene la estructura natural del español con la preposición ''sobre el altar''.'
- source_word: መሥዋዕተ፡ አውሰ፡ በቅብዕ
  english_pob_choice: an offering mixed with oil
  chosen_spanish: una ofrenda mezclada con aceite
  alternatives_spanish:
  - una oblación mezclada con aceite
  - una ofrenda con aceite
  lexicon: offering mixed with oil
  rationale: '''Ofrenda mezclada con aceite'' sigue de cerca la combinación material indicada por el texto y evita una paraprástica interpretación litúrgica.'
- source_word: ነዝኀ
  english_pob_choice: sprinkled
  chosen_spanish: roció
  alternatives_spanish:
  - esparció
  - asperjó
  lexicon: sprinkle/scatter
  rationale: El verbo ge'ez indica rociar/asperjar más que verter; 'roció' es comprensible y conserva la acción breve. 'Asperjó' sería más técnico, pero 'roció' resulta más natural en español común.
- source_word: ወይነ
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - mosto
  lexicon: wine
  rationale: '''Vino'' corresponde directamente al término y mantiene la imagen sacrificial conocida.'
- source_word: ዕጣነ
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  lexicon: incense
  rationale: '''Incienso'' es el equivalente normal y exacto para la sustancia aromática ofrecida.'
- source_word: መዐዛ፡ ሠናየ፡ ዘያሠምር
  english_pob_choice: a pleasing fragrance
  chosen_spanish: un aroma agradable
  alternatives_spanish:
  - una fragancia agradable
  - un olor grato
  lexicon: pleasing fragrance
  rationale: '''Aroma agradable'' expresa bien el hebraísmo/semitismo de olor aceptable sin sonar arcaico.'
theological_decisions:
- issue: Cómo traducir la referencia divina final sin sustituir indebidamente el nombre divino
  english_pob_reading: acceptable before the Lord
  chosen_spanish_reading: aceptable delante del Señor
  alternative_spanish_readings:
  - aceptable delante de Yahvé
  - agradable ante el Señor
  rationale: El contexto fuente dice literalmente 'before the Lord' y el audit trail revisado evitó introducir el sustituto del nombre divino donde el fuente no lo indica explícitamente. 'Señor' mantiene la lectura auditada sin forzar Yahvé en este pasaje.
  doctrine_reference: Uso del nombre divino en la tradición POB y cautela frente a sustitutos no atestiguados en la fuente
translation_notes:
  revision_awareness: 'La versión inglesa fue revisada en dos puntos relevantes para esta línea: se estandarizó ''turtledove'' y se cambió la capitalización de ''the LORD'' a ''the Lord'' para no introducir un sustituto del nombre divino; además, el análisis léxico posterior corrigió el verbo ge''ez ነዝኀ a ''sprinkled'' en lugar de ''poured out''. Por eso el español usa ''roció'' y conserva ''el Señor'' sin nota de nombre divino.'
  spanish_consistency_notes:
  - Se mantuvo 'holocausto' como equivalente culto y estable de la ofrenda totalmente quemada.
  - '''Roció'' refleja la corrección léxica del verbo ge''ez y evita la idea de verter que no corresponde aquí.'
  - Se conservó una sintaxis continua y bíblica, pero en español natural, sin calcos excesivos del orden ge'ez.
  - No se agregó nota al pie porque no había una alternativa textual o léxica que requiriera anclaje en el verso español.
