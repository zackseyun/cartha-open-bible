base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/037.yaml
  text: Therefore years will come upon them when they disturb the order, and they will make a day of testimony an abominable day, and an unclean day a festival day, and they will mix up all the holy days with the unclean, and the unclean day with the holy; for they will go wrong as to months and sabbaths and festivals and jubilees.
  footnotes:
  - marker: a
    text: Or 'and they will make an abominable day a day of testimony'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Por eso vendrán sobre ellos años en los que trastornarán el orden; convertirán el día de testimonio[a] en un día abominable, y un día impuro en día festivo; y mezclarán todos los días santos con los impuros, y el día impuro con el santo; porque se extraviarán en cuanto a los meses, los sábados, las fiestas y los jubileos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y convertirán un día abominable en día de testimonio». La revisión textual favorece, sin embargo, la lectura: «convertirán el día de testimonio en un día abominable».'
    reason: textual_variant
lexical_decisions:
- source_word: ይማስኑ / disturb the order
  english_pob_choice: disturb the order
  chosen_spanish: trastornarán el orden
  alternatives_spanish:
  - alterarán el orden
  - perturbarán el orden
  lexicon: trastornar
  rationale: La idea es de desordenar o poner en confusión un orden establecido, no solo de moverlo ligeramente. «Trastornarán» conserva la fuerza de la perturbación del orden temporal y cultual.
- source_word: ዕለተ፡ ስምዐ፡
  english_pob_choice: day of testimony
  chosen_spanish: día de testimonio
  alternatives_spanish:
  - día del testimonio
  - día de testimonio y testimonio
  lexicon: testimonio
  rationale: Se mantiene la expresión nominal directa de la fuente. «Día de testimonio» es una construcción natural en español y conserva la posible ambigüedad entre un día caracterizado por testimonio y un día designado como testimonio.
- source_word: ምግንተ፡
  english_pob_choice: abominable
  chosen_spanish: abominable
  alternatives_spanish:
  - abominable y repudiable
  - repugnante
  lexicon: abominable
  rationale: El adjetivo «abominable» reproduce bien la evaluación moral fuerte del término; además encaja con la inversión de valores del pasaje sin suavizarla.
- source_word: ወዕለተ፡ ርኵስተ፡
  english_pob_choice: an unclean day
  chosen_spanish: un día impuro
  alternatives_spanish:
  - un día inmundo
  - un día contaminado
  lexicon: impuro
  rationale: «Impuro» es el equivalente más claro y eclesialmente legible para la oposición ritual frente a «santo». Mantiene el contraste cultual del texto.
- source_word: በዓለ፡
  english_pob_choice: festival day
  chosen_spanish: día festivo
  alternatives_spanish:
  - día de fiesta
  - fiesta
  lexicon: fiesta
  rationale: «Día festivo» traduce el valor de día de celebración sin perder que se trata de una categoría temporal. Es más preciso que solo «fiesta».
- source_word: ቅዱሳተ፡ / holy days
  english_pob_choice: the holy days
  chosen_spanish: los días santos
  alternatives_spanish:
  - los días sagrados
  - las fiestas santas
  lexicon: santo
  rationale: Se traduce la pluralidad temporal de los días con «días santos», que conserva el sentido de días apartados para Dios sin introducir una reinterpretación litúrgica.
- source_word: ርኩሳተ፡ / unclean
  english_pob_choice: unclean
  chosen_spanish: impuros
  alternatives_spanish:
  - inmundos
  - contaminados
  lexicon: impuro
  rationale: En plural, «impuro(s)» conserva la oposición ritual y permite una coordinación fluida con «días santos».
- source_word: ርኵስተ፡ ለዕለት፡ ቅድስት፡
  english_pob_choice: the unclean day with the holy
  chosen_spanish: el día impuro con el santo
  alternatives_spanish:
  - el día impuro con el día santo
  - el impuro con el santo
  lexicon: santo
  rationale: Se mantiene el paralelismo antitético del original, evitando expandir innecesariamente la frase. «El santo» funciona como abreviatura sustantivada aceptable en español bíblico.
- source_word: ይስሕቱ፡
  english_pob_choice: they will go wrong
  chosen_spanish: se extraviarán
  alternatives_spanish:
  - se desviarán
  - yerrarán
  lexicon: extraviarse
  rationale: «Se extraviarán» expresa tanto error como desvío práctico respecto del calendario correcto. Es idiomático y no introduce una doctrina ajena.
- source_word: አውራኀ፡
  english_pob_choice: months
  chosen_spanish: los meses
  alternatives_spanish:
  - los novilunios
  - los meses lunares
  lexicon: mes
  rationale: «Meses» es la forma más directa y neutral. Aunque el contexto calendárico sugiere meses lunares, el texto no explicita esa glosa aquí.
- source_word: ሰንበታት፡
  english_pob_choice: sabbaths
  chosen_spanish: los sábados
  alternatives_spanish:
  - los sábados de reposo
  - los días de reposo
  lexicon: sábado
  rationale: En este contexto calendárico, «sábados» es fiel y comprensible en español; preserva el término técnico del calendario sin sustituirlo por una explicación más larga.
- source_word: ወበዓላተ፡
  english_pob_choice: festivals
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las solemnidades
  - las festividades
  lexicon: fiesta
  rationale: «Fiestas» mantiene el término general para celebraciones sagradas del calendario. En combinación con «días festivos» evita redundancia excesiva porque aquí el plural se refiere a categorías calendáricas distintas.
- source_word: ወ*ኢዮቤል፡
  english_pob_choice: jubilees
  chosen_spanish: los jubileos
  alternatives_spanish:
  - los años jubilares
  - los jubileos
  lexicon: jubileo
  rationale: «Jubileos» conserva el tecnicismo del libro y el sistema calendárico específico. «Años jubilares» sería explicativo, pero el texto trata la categoría como término técnico.
theological_decisions:
- issue: Inversión valorativa del día de testimonio y el día impuro
  english_pob_reading: a day of testimony becomes abominable; an unclean day becomes a festival day
  chosen_spanish_reading: el día de testimonio se convierte en un día abominable; un día impuro en día festivo
  alternative_spanish_readings:
  - un día abominable en día de testimonio
  - un día impuro en día de testimonio
  rationale: 'Se sigue la lectura revisada y auditada del texto ge''ez: el día de testimonio es degradado, y el día impuro es exaltado. La españolización debe preservar esa tensión sin revertirla.'
  doctrine_reference: source-grounded textual/theological reading; revision note on mistranslation
translation_notes:
  revision_awareness: La base inglesa original decía «they will make a day of testimony an abominable day», y una nota previa ofrecía la variante invertida. El registro de revisión indica que la lectura correcta del ge'ez es la del día de testimonio convertido en abominable; la versión española sigue esa corrección y conserva una nota breve sobre la variante anterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero en este versículo no aparece el tetragrámaton ni una cita directa que requiera esa sustitución.
  - Se usa «impuro/impuros» para la oposición ritual con «santo/santos», en línea con el léxico del proyecto.
  - «Jubileos» se conserva como tecnicismo calendárico del libro, sin explicar en el texto principal.
