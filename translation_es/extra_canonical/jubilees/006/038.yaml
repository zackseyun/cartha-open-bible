base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/038.yaml
  text: Therefore I command you and testify to you, so that you may testify to them; for after your death your children will corrupt it, so that they will not make the year three hundred and sixty-four days only. Therefore they will go wrong concerning the new moons and seasons and sabbaths and festivals, and they will eat all the blood with all flesh.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:50Z'
    unchanged: false
    changes_summary: Revised 'testify to you/them' to 'make it known to you/them' for better lexical fit and natural English; adjusted word order to 'three hundred and sixty-four days only' for clarity; changed 'as to' to 'concerning'; and rendered the final clause more literally as 'all the blood with all flesh' instead of 'all kinds of blood with all kinds of flesh.'
translation:
  language: es
  text: Por tanto, te mando y te testifico, para que tú les testifiques; porque después de tu muerte tus hijos lo corromperán, de modo que no hagan el año de trescientos sesenta y cuatro días solamente. Por tanto, errarán respecto de las lunas nuevas, las estaciones, los sábados y las fiestas, y comerán toda la sangre con toda carne.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አነ፡ እኤዝዘከ፡
  english_pob_choice: I command you
  chosen_spanish: te mando
  alternatives_spanish:
  - te ordeno
  - te doy mandato
  lexicon: mandar / ordenar
  rationale: El Ge'ez expresa un mandato directo; «te mando» mantiene fuerza imperativa clara en español sin sonar tan jurídico como «te ordeno».
- source_word: ወአስምዕ፡ ለከ፡
  english_pob_choice: and testify to you
  chosen_spanish: y te doy testimonio
  alternatives_spanish:
  - y te testifico
  - y te doy testimonio solemne
  lexicon: testificar / dar testimonio
  rationale: 'Se conserva el peso covenantal indicado por la revisión doctrinal: no basta con «hacer saber». «Dar testimonio» es natural en español y mantiene el valor de testimonio solemne.'
- source_word: ታስምዕ፡ ሎሙ፡
  english_pob_choice: so that you may testify to them
  chosen_spanish: para que tú les des testimonio
  alternatives_spanish:
  - para que tú les testifiques
  - para que tú lo hagas saber a ellos
  lexicon: testificar / dar testimonio
  rationale: La forma final evita la pérdida del matiz de testimonio y sigue la relación de encargo entre el hablante y el destinatario.
- source_word: ያማስኑ፡
  english_pob_choice: will corrupt it
  chosen_spanish: lo corromperán
  alternatives_spanish:
  - lo pervertirán
  - lo deformarán
  lexicon: corromper
  rationale: «Corromper» reproduce bien la idea de alterar algo recibido y coincide con el tono moral del contexto.
- source_word: ኢይገብሩ፡ ዓመተ፡ ...
  english_pob_choice: they will not make the year three hundred and sixty-four days only
  chosen_spanish: no hagan el año de solo trescientos sesenta y cuatro días
  alternatives_spanish:
  - no hagan el año únicamente de trescientos sesenta y cuatro días
  - no hagan el año solo de trescientos sesenta y cuatro días
  lexicon: estructura temporal / numeral
  rationale: «De solo» conserva el sentido restrictivo de «only» y fluye mejor en español que una traducción rígida al final de la frase.
- source_word: ሠርቀ፡ ወጊዜ፡ ወ ሰንበተ፡ ወበዓላተ፡
  english_pob_choice: new moons and seasons and sabbaths and festivals
  chosen_spanish: las lunas nuevas, las estaciones, los sábados y las fiestas
  alternatives_spanish:
  - las nuevas lunas, las estaciones, los sábados y las fiestas
  - las lunas nuevas, los tiempos, los sábados y las fiestas
  lexicon: lunas nuevas / estaciones / sábados / fiestas
  rationale: «Lunas nuevas» sigue la expresión semítica habitual; «estaciones» y «fiestas» mantienen el paralelismo del texto. «Sábados» conserva el plural del original.
- source_word: ወይበልዑ፡ ኵሎ፡ ደመ፡ ምስለ፡ ኵሉ፡ ሥጋ።
  english_pob_choice: and they will eat all the blood with all flesh
  chosen_spanish: y comerán toda la sangre con toda carne
  alternatives_spanish:
  - y comerán toda sangre con toda carne
  - y comerán toda la sangre con toda la carne
  lexicon: sangre / carne
  rationale: Se mantiene la literalidad del giro final, preservando la tensión entre «sangre» y «carne» sin suavizarla a «todo tipo de». «Carne» traduce bien ሥጋ en este contexto.
theological_decisions:
- issue: Peso covenantal de «testificar» frente a «hacer saber»
  english_pob_reading: testify to you / testify to them
  chosen_spanish_reading: te doy testimonio / des testimonio
  alternative_spanish_readings:
  - te hago saber / hagas saber
  - te anuncio / anuncies
  rationale: La revisión doctrinal indicó que el verbo corresponde a un testimonio de pacto. Por eso se evita una reducción meramente informativa y se conserva la solemnidad jurídica-testimonial.
  doctrine_reference: DOCTRINE.md §1; revisión de 2026-04-28 sobre አስምዐ y הֵעִיד
- issue: Restricción calendárica de 364 días
  english_pob_reading: three hundred and sixty-four days only
  chosen_spanish_reading: de solo trescientos sesenta y cuatro días
  alternative_spanish_readings:
  - únicamente de trescientos sesenta y cuatro días
  - solamente de trescientos sesenta y cuatro días
  rationale: La cláusula preserva la acusación de desviación calendárica sin expandirla ni atenuarla. El orden elegido suena natural en español y conserva la exclusividad del número.
  doctrine_reference: Consistencia textual con el pasaje de Jubileos sobre el calendario
- issue: 'Lista litúrgico-temporal: lunas nuevas, estaciones, sábados y fiestas'
  english_pob_reading: new moons and seasons and sabbaths and festivals
  chosen_spanish_reading: las lunas nuevas, las estaciones, los sábados y las fiestas
  alternative_spanish_readings:
  - las nuevas lunas, los tiempos, los sábados y las fiestas
  - las lunas nuevas, los tiempos señalados, los sábados y las fiestas
  rationale: Se conserva la serie sin armonizarla con terminología eclesiástica posterior. «Estaciones» mantiene la ambigüedad temporal del original mejor que una paráfrasis más explicativa.
  doctrine_reference: Doctrina de fidelidad terminológica al calendario sagrado del texto
translation_notes:
  revision_awareness: La versión española se alinea con la revisión más reciente del audit trail en el punto clave de አስምዐ = «testificar», evitando la anterior opción de «hacer saber». También conserva la formulación literal final «toda la sangre con toda carne» y la restricción explícita del año de 364 días, sin añadir explicaciones no presentes en el source.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando aparece el Tetragrámaton; aquí no aparece, así que no se introduce.
  - Se mantiene «carne» para ሥጋ y no se sustituye por «naturaleza humana», porque el contexto habla de alimento y sangre.
  - Se evita «Cristo» y otra terminología cristológica porque el versículo no la contiene.
  - La sintaxis busca ser publicable en español sin perder la cadencia acumulativa de la lista final.
