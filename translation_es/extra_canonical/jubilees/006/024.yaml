translation:
  language: es
  text: y un estatuto[a] para un testimonio perpetuo. Y Noé los instituyó para sí como fiestas por generaciones para siempre,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y una ordenanza para un testimonio perpetuo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወሥርዓት
  english_pob_choice: and an ordinance
  chosen_spanish: y un estatuto
  alternatives_spanish:
  - y una ordenanza
  - y una prescripción
  lexicon: statute / ordinance
  rationale: El ge’ez añade un sustantivo jurídico-normativo al inicio del verso. ‘Estatuto’ comunica bien la fuerza legal y ceremonial sin sonar más eclesiástico que el original. ‘Ordenanza’ también sería posible, pero ‘estatuto’ preserva mejor el registro de norma establecida.
- source_word: ለስምዕ ለዓለም
  english_pob_choice: for a testimony forever
  chosen_spanish: para un testimonio perpetuo
  alternatives_spanish:
  - como testimonio eterno
  - para testimonio para siempre
  lexicon: testimony / witness + forever
  rationale: ‘Testimonio’ refleja el sustantivo de declaración o memorial; ‘perpetuo’ mantiene la duración continua del inglés POB y evita una sola opción devocional fija como ‘eterno’, aunque también sería válida. Se conserva la relación funcional de finalidad con ‘para’.
- source_word: ሠርዓን
  english_pob_choice: ordained them
  chosen_spanish: los estableció
  alternatives_spanish:
  - los ordenó
  - los instituyó
  lexicon: ordain / establish
  rationale: En este contexto, el verbo comunica que Noé fijó o instituó las fiestas. ‘Estableció’ expresa mejor esa acción normativa en español que ‘ordenó’, que puede sonar ambiguo con el sentido de mandar.
- source_word: ለበዓላት
  english_pob_choice: as festivals
  chosen_spanish: como fiestas
  alternatives_spanish:
  - como festividades
  - como celebraciones
  lexicon: feast / festival
  rationale: ‘Fiestas’ es la equivalencia más natural y mantiene la referencia cultual sin sobrecargar el texto. ‘Festividades’ es posible, pero menos directo.
- source_word: ለትውልድ ዘለዓለም
  english_pob_choice: for everlasting generations
  chosen_spanish: para generaciones eternas
  alternatives_spanish:
  - para generaciones perpetuas
  - por generaciones sin fin
  lexicon: generations forever
  rationale: La frase señala duración transgeneracional. ‘Generaciones eternas’ conserva la fuerza idiomática del inglés revisado y resulta fluida en español bíblico contemporáneo. ‘Perpetuas’ sería semánticamente cercana, pero menos natural aquí.
theological_decisions:
- issue: Duración indefinida / perpetuidad
  english_pob_reading: for a testimony forever ... for everlasting generations
  chosen_spanish_reading: para un testimonio perpetuo ... para generaciones eternas
  alternative_spanish_readings:
  - para un testimonio eterno ... para generaciones perpetuas
  - como testimonio para siempre ... para generaciones para siempre
  rationale: 'El verso duplica la idea de permanencia: primero para el testimonio y luego para las generaciones. Se preserva esa tensión de duración continua sin normalizarla a una sola fórmula. ‘Perpetuo’ y ‘eternas’ mantienen la misma dirección semántica que el inglés revisado.'
  doctrine_reference: Memorial/ordenanza perpetua en tradición jubilar; permanencia cultual
translation_notes:
  revision_awareness: 'La base inglesa fue revisada para recuperar el sustantivo inicial omitido por una versión anterior: ''and an ordinance for a testimony forever''. El español refleja ese ajuste con ''y un estatuto''. También se siguió la revisión de ''for the generations forever'' a ''for everlasting generations'' con ''para generaciones eternas''.'
  spanish_consistency_notes:
  - Se mantiene ‘Noé’ para el nombre propio según el uso habitual en español.
  - Se evita ‘SEÑOR’ o cualquier sustitución teológica no indicada, porque el verso no contiene el nombre divino explícito en la fuente provista.
  - Se conserva un tono bíblico claro y sobrio, sin arcaísmos innecesarios.
