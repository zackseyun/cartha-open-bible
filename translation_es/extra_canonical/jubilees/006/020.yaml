translation:
  language: es
  text: Y tú también, manda a los hijos de Israel que guarden esta fiesta por todas sus generaciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአንተሂ፡
  english_pob_choice: And you also
  chosen_spanish: Y tú también
  alternatives_spanish:
  - Y además tú
  - Y tú asimismo
  lexicon: —
  rationale: El geʽez añade un énfasis directo al destinatario; «tú también» conserva esa coordinación enfática con una sintaxis natural en español.
- source_word: አዝዞሙ፡
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - da la orden a
  lexicon: —
  rationale: «Mandar» expresa con claridad el acto imperativo de instrucción/autorización sin volver más rígido el español; mantiene el valor de mandato del original.
- source_word: ለ*ደቂቀ፡⁹ እስራኤል፡
  english_pob_choice: the children of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - al pueblo de Israel
  - a los descendientes de Israel
  lexicon: —
  rationale: Se conserva la expresión heredada del texto fuente y del inglés auditado, que nombra al grupo étnico-covenantal con la fórmula tradicional pero todavía transparente en español.
- source_word: ይዕቀብዋ፡¹⁰
  english_pob_choice: that they keep
  chosen_spanish: que guarden
  alternatives_spanish:
  - que observen
  - que celebren
  lexicon: —
  rationale: El verbo puede abarcar observancia fiel y mantenimiento; «guarden» comunica esa obligación de observar la fiesta con fidelidad, sin reducirla solo a «celebrar».
- source_word: ለዛቲ፡ በዓል፡
  english_pob_choice: this festival
  chosen_spanish: esta fiesta
  alternatives_spanish:
  - esta festividad
  - esta celebración
  lexicon: —
  rationale: «Fiesta» es la equivalencia más natural en español para un tiempo ritual de conmemoración; conserva el carácter festivo y cultual del término.
- source_word: በኵሉ፡ ትዝምዶሙ፡
  english_pob_choice: throughout their generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - de generación en generación
  - a través de sus generaciones
  lexicon: —
  rationale: La expresión temporal heredada se mantiene casi literalmente porque señala continuidad obligatoria en la descendencia; «por todas sus generaciones» es fiel y sobrio en español.
theological_decisions:
- issue: Continuidad obligatoria de la fiesta para Israel
  english_pob_reading: that they keep this festival throughout their generations.
  chosen_spanish_reading: que guarden esta fiesta por todas sus generaciones.
  alternative_spanish_readings:
  - que celebren esta fiesta por todas sus generaciones
  - que observen esta fiesta de generación en generación
  rationale: El sentido no es meramente conmemorativo sino prescriptivo y continuado; «guarden» preserva la obligación de observar el rito a lo largo del linaje israelita.
  doctrine_reference: Memoria cultual y permanencia del mandato en la historia de Israel
translation_notes:
  revision_awareness: La revisión inglesa reciente solo añadió puntuación final; no altera el contenido ni exige ajustes semánticos. La redacción española incorpora esa misma completitud con puntuación final natural.
  spanish_consistency_notes:
  - Se mantiene «Israel» con la fórmula tradicional «hijos de Israel» para conservar el referente colectivo del texto.
  - Se traduce el mandato con un registro sobrio y bíblico, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
