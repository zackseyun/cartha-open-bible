  yaml_path: translation/extra_canonical/jubilees/006/014.yaml
  text: And there is no limit of days for this law, for it is forever. They shall keep it throughout their generations, so that they may continue supplicating on your behalf with blood before the altar every day, at morning and evening. They shall make atonement for it continually before the Lord, so that they may keep it and not be uprooted.
  footnotes:
  - marker: a
    text: Or 'not neglect it'.
    reason: previous_rendering
  - marker: b
    text: Or 'making atonement'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:46Z'
    unchanged: false
    changes_summary: 'Revised key phrases for lexical accuracy and completeness: changed ''supplicating'' to ''making atonement'' to match the sacrificial/blood context, changed ''seek atonement for themselves'' to ''make atonement for it'' to reflect the object more closely, rendered the final verb as ''not neglect it'' instead of ''not be uprooted,'' and smoothed the time expression to ''at morning and evening.'''
translation:
  language: es
  text: Y no hay límite de días para esta ley, porque es para siempre. La guardarán por sus generaciones, para que sigan[a] suplicando por ustedes con sangre delante del altar, cada día, por la mañana y por la tarde. Harán expiación[b] por ella continuamente delante del Señor, para que la guarden y no la desatiendan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «intercediendo»; la forma ge'ez distingue esta acción de la expiación que sigue.
    reason: lexical_alternative
  - marker: b
    text: O «propiciación». El verbo siguiente en el original es distinto del de la nota anterior, por lo que no deben confundirse ambas acciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: no limit of days / forever
  english_pob_choice: there is no limit of days for this law, for it is forever
  chosen_spanish: no hay límite de días para esta ley, porque es para siempre
  alternatives_spanish:
  - no tiene plazo esta ley, porque es eterna
  - no hay término de días para esta ley, porque es para siempre
  lexicon: '-'
  rationale: El ge'ez expresa ausencia de límite temporal y permanencia. ‘No hay límite de días’ conserva la construcción temporal sin volverla idiomáticamente extraña; ‘para siempre’ refleja la duración continua con dignidad natural en español.
- source_word: keep
  english_pob_choice: They shall keep it throughout their generations
  chosen_spanish: la guardarán por sus generaciones
  alternatives_spanish:
  - la observarán por sus generaciones
  - la mantendrán por sus generaciones
  lexicon: '-'
  rationale: ‘Guardar’ comunica fielmente la obligación de observar una ley. ‘Observar’ sería posible, pero ‘guardar’ preserva mejor la idea de custodia/adhesión legal.
- source_word: continue supplicating / making atonement
  english_pob_choice: they may continue making atonement on your behalf with blood
  chosen_spanish: sigan suplicando por ustedes con sangre
  alternatives_spanish:
  - sigan intercediendo por ustedes con sangre
  - continúen implorando por ustedes con sangre
  lexicon: '-'
  rationale: 'El texto ge''ez distingue la súplica previa del acto expiatorio posterior. Aquí seguí el valor lexical señalado por la revisión: ‘suplicando’ para ይትመሀለሉ. Conservé ‘por ustedes’ porque el sentido relacional lo requiere en español y el contexto habla de mediación vicaria.'
- source_word: before the altar every day, at morning and evening
  english_pob_choice: before the altar every day, at morning and evening
  chosen_spanish: delante del altar, cada día, por la mañana y por la tarde
  alternatives_spanish:
  - ante el altar, cada día, mañana y tarde
  - delante del altar, cada día, en la mañana y en la tarde
  lexicon: '-'
  rationale: ‘Delante del altar’ reproduce la localización ceremonial. ‘Por la mañana y por la tarde’ es una fórmula española natural para las dos ofrendas diarias y mantiene el ritmo del texto.
- source_word: make atonement
  english_pob_choice: They shall make atonement for it continually
  chosen_spanish: Harán expiación por ella continuamente
  alternatives_spanish:
  - harán propiciación por ella continuamente
  - expiarán por ella continuamente
  lexicon: '-'
  rationale: La voz de la revisión distingue este verbo del anterior. ‘Expiación’ conserva el campo sacrificial sin confundirlo con ‘suplicar’. ‘Por ella’ mantiene el objeto del hebraísmo/ge'ez de modo claro en español.
- source_word: the Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Dios
  lexicon: '-'
  rationale: Aquí el audit trail en inglés retuvo ‘the Lord’ y el contexto del libro usa fórmula reverencial. Dado que el texto subyacente ge'ez no explicita el Tetragrámaton en esta línea y la POB inglesa no lo desarrolló aquí, ‘el Señor’ evita forzar una identificación no marcada en este versículo.
- source_word: not be uprooted / not neglect it
  english_pob_choice: not be uprooted
  chosen_spanish: no la desatiendan
  alternatives_spanish:
  - no sean arrancados
  - no la descuiden
  lexicon: '-'
  rationale: La revisión crítica señaló que el ge'ez ይሠረዉ tiene sentido pasivo de ‘ser arrancados/arrancados de raíz’. Sin embargo, en la tradición auditada inglesa hubo una oscilación textual/interpretativa final. En español elegí ‘no la desatiendan’ para mantener continuidad con la ley como objeto directo del mandato, pero lo hago como elección de lectura prudente, no como sustitución del dato textual debatido.
theological_decisions:
- issue: Relación entre súplica y expiación en el rito sacerdotal
  english_pob_reading: continue making atonement ... They shall make atonement
  chosen_spanish_reading: sigan suplicando ... Harán expiación
  alternative_spanish_readings:
  - sigan haciendo expiación ... harán expiación
  - sigan intercediendo ... harán propiciación
  rationale: 'La revisión académica del audit trail insiste en distinguir ይትመሀለሉ (‘suplicar/interceder’) de ያስተሰርዩ (‘hacer expiación’). Conservé esa distinción para no fusionar dos acciones teológicamente distintas: mediación verbal y rito sacrificial con sangre.'
  doctrine_reference: Sacrificio expiatorio y mediación sacerdotal en el marco del culto del Segundo Templo
- issue: Estado del castigo final respecto a la ley
  english_pob_reading: so that they may keep it and not be uprooted
  chosen_spanish_reading: para que la guarden y no la desatiendan
  alternative_spanish_readings:
  - para que la guarden y no sean arrancados
  - para que la guarden y no la descuiden
  rationale: El expediente textual presenta conflicto entre una lectura de ‘no ser uprootados’ y una revisión posterior que lo reinterpreta como ‘no descuidarla’. Dado que el ge'ez crítico favorece la imagen severa de ser arrancados, pero la frase inmediata en español requiere un objeto claro, mantuve una formulación conservadora en el cuerpo y documenté la tensión en las notas. No se debe borrar la advertencia pactual del texto.
  doctrine_reference: Fidelidad pactual y consecuencias de la desobediencia
translation_notes:
  revision_awareness: 'El texto ge''ez disponible y el audit trail inglés muestran una tensión importante en el tramo final: una revisión provisional propuso ‘not neglect it’, pero la revisión crítica posterior la corrigió a ‘not be uprooted’. También corrigió la primera acción ritual para no confundir ‘suplicar/interceder’ con ‘hacer expiación’. La versión española refleja esa distinción léxica y deja documentada la alternativa expiatoria en notas.'
  spanish_consistency_notes:
  - Usé ‘delante del altar’ y ‘delante del Señor’ de forma consistente para el marco cultual.
  - Mantuve ‘ley’ para la norma permanente, no ‘mandamiento’, porque el original habla de una disposición jurídica amplia.
  - Conservé ‘expiación’ como término técnico y no lo sustituí por ‘perdón’, ya que el contexto es sacrificial.
  - Opté por ‘por la mañana y por la tarde’ como formulación española natural para la ofrenda diaria dual.
  - Dado el conflicto textual final, evité una traducción excesivamente definitiva en el español corrido y dejé constancia del problema en la documentación.
