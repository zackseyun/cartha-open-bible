base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/034.yaml
  text: For I know, and from now on I will make it known to you—not from my own heart, for the book is written before me, and it is ordained on the heavenly tablets—the divisions of the days, lest they forget the festivals of the covenant and walk according to the festivals of the nations, after their error and after their ignorance.
  footnotes:
  - marker: a
    text: Or 'divisions of the times'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:49Z'
    unchanged: false
    changes_summary: Changed 'make you know' to 'make it known to you' for natural English, and 'divisions of the days' to 'divisions of the times' for better lexical fit with the calendrical context.
translation:
  language: es
  text: Porque yo sé, y desde ahora te lo haré saber—no de mi propio corazón, pues el libro está escrito delante de mí y está ordenado en las tablas celestiales— las divisiones de los días[b], para que no olviden las fiestas del pacto y caminen conforme a las fiestas de las naciones, después de su error y después de su ignorancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'O: «las divisiones de los tiempos».'
    reason: previous_rendering
lexical_decisions:
- source_word: አእምር / know
  english_pob_choice: For I know
  chosen_spanish: Porque yo sé
  alternatives_spanish:
  - Porque conozco
  - Pues yo sé
  lexicon: sin entrada lexicográfica
  rationale: El ge'ez afirma conocimiento real y previo; «yo sé» conserva la fuerza declarativa sin volverla más abstracta. «Porque» mantiene la conexión causal del discurso.
- source_word: አየድዐከ / make it known to you
  english_pob_choice: I will make it known to you
  chosen_spanish: te lo haré saber
  alternatives_spanish:
  - te lo daré a conocer
  - te lo haré conocer
  lexicon: sin entrada lexicográfica
  rationale: La construcción española natural exige un objeto neutro explícito («lo») para referirse al contenido revelado; conserva el sentido de comunicar, no solo de informar.
- source_word: አወኮ / not from my own heart
  english_pob_choice: not from my own heart
  chosen_spanish: no desde mi propio corazón
  alternatives_spanish:
  - no por mi propia mente
  - no por iniciativa mía
  lexicon: sin entrada lexicográfica
  rationale: «Corazón» refleja el centro interior de intención y conocimiento, tal como en el original; se evita reducirlo a mera emoción o psicología moderna.
- source_word: መጽሐፍ ጽሑፍ / the book is written
  english_pob_choice: for the book is written before me
  chosen_spanish: pues el libro está escrito delante de mí
  alternatives_spanish:
  - porque el libro está escrito ante mí
  - ya que el libro está escrito delante de mí
  lexicon: sin entrada lexicográfica
  rationale: «Delante de mí» reproduce la idea de presencia/antecedencia y mantiene la imagen de una revelación ya establecida ante el hablante.
- source_word: ጽላተ ሰማይ / heavenly tablets
  english_pob_choice: the heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas del cielo
  - las tablillas celestiales
  lexicon: sin entrada lexicográfica
  rationale: «Tablas celestiales» es una equivalencia transparente y digna para la imagen de las tablas celestes del texto, sin introducir una connotación litúrgica ajena.
- source_word: ክፋሌሁ / divisions
  english_pob_choice: the divisions of the days
  chosen_spanish: las divisiones de los días
  alternatives_spanish:
  - las divisiones de los tiempos
  - las particiones de los días
  lexicon: sin entrada lexicográfica
  rationale: 'Se sigue la lectura revertida en el audit trail: el ge''ez literalmente dice «días». «Divisiones de los días» preserva el foco calendárico preciso del libro, evitando un desplazamiento más general hacia «tiempos».'
- source_word: በዓላተ ኪዳን / festivals of the covenant
  english_pob_choice: festivals of the covenant
  chosen_spanish: las fiestas del pacto
  alternatives_spanish:
  - las festividades del pacto
  - las fiestas de la alianza
  lexicon: sin entrada lexicográfica
  rationale: «Fiestas» es claro y bíblico en español; «pacto» conserva el término técnico del acuerdo divino. Se evita «alianza» por ser menos consistente con el registro de este proyecto.
- source_word: በዓላት አሕዛብ / festivals of the nations
  english_pob_choice: festivals of the nations
  chosen_spanish: las fiestas de las naciones
  alternatives_spanish:
  - las festividades de las naciones
  - las fiestas de los gentiles
  lexicon: sin entrada lexicográfica
  rationale: «Naciones» conserva la referencia amplia del original sin añadir el matiz interpretativo más específico de «gentiles».
- source_word: ስሕተት / error
  english_pob_choice: their error
  chosen_spanish: su error
  alternatives_spanish:
  - su extravío
  - su engaño
  lexicon: sin entrada lexicográfica
  rationale: «Error» traduce de forma directa y sobria la falta o desvío indicado por el texto, sin intensificar innecesariamente el matiz.
- source_word: ኢያእምርቶሙ / ignorance
  english_pob_choice: their ignorance
  chosen_spanish: su ignorancia
  alternatives_spanish:
  - su falta de conocimiento
  - su desconocimiento
  lexicon: sin entrada lexicográfica
  rationale: «Ignorancia» mantiene el paralelismo con «error» y conserva la doble caracterización del extravío, tal como en el texto fuente.
theological_decisions:
- issue: 'Calendrical precision: «divisions of the days» versus broader «times»'
  english_pob_reading: divisions of the days
  chosen_spanish_reading: las divisiones de los días
  alternative_spanish_readings:
  - las divisiones de los tiempos
  rationale: Aunque «tiempos» puede sonar natural, el ge'ez disponible dice literalmente «días», y Jubileos está marcadamente centrado en el cómputo exacto del calendario. Mantener «días» preserva la precisión y la teología calendárica del pasaje.
  doctrine_reference: Calendario sagrado en Jubileos; fidelidad lexical al testimonio textual
- issue: 'Fuente de la revelación: interioridad humana versus libro/tablas celestiales'
  english_pob_reading: not from my own heart, for the book is written before me, and it is ordained on the heavenly tablets
  chosen_spanish_reading: no desde mi propio corazón, pues el libro está escrito delante de mí y está ordenado en las tablas celestiales
  alternative_spanish_readings:
  - no por mi propia mente, porque el libro está escrito ante mí y está ordenado en las tablas del cielo
  rationale: El texto niega que el conocimiento provenga de la interioridad humana autónoma y lo ancla en una inscripción previa en el libro y en las tablas celestiales. La formulación española conserva esa tensión entre revelación recibida y conocimiento transmitido.
  doctrine_reference: Revelación divina y conocimiento profético no autogenerado
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una ida y vuelta entre «days» y «times»: una revisión elevó «times» por ajuste contextual, pero una revisión posterior la revirtió a «days» por fidelidad al ge''ez y por la centralidad calendárica de Jubileos. La traducción española sigue la lectura final/respaldada de «días». También se ajustó la cláusula verbal a una forma española natural con objeto neutro implícito («te lo haré saber»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «pacto» de forma consistente con la terminología del proyecto; no se sustituyó por «alianza».
  - Se preserva «tablas celestiales» como imagen técnica del texto, evitando paráfrasis teológicas.
  - Se evita «Cristo» por no haber aquí lenguaje de Χριστός/Mesías.
  - La puntuación con rayas refleja la inserción explicativa del inciso en el original y en la tradición del POB.
