    unchanged: false
    changes_summary: 'Revised to reflect the full sense of the source more accurately and naturally: replaced ''increase greatly'' with the more precise pair ''be fruitful and multiply.'''
translation:
  language: es
  text: Y en cuanto a ustedes, sean fecundos y multiplíquense sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአንትሙኒ
  english_pob_choice: And as for you
  chosen_spanish: Y en cuanto a ustedes
  alternatives_spanish:
  - Y ustedes
  - Y por su parte
  lexicon: Conector discursivo + pronombre de 2.ª persona plural
  rationale: La partícula introduce un giro dirigido específicamente a los destinatarios; «en cuanto a ustedes» conserva ese matiz focalizador de «as for you» sin sonar demasiado literal.
- source_word: ለሀቁ
  english_pob_choice: be fruitful
  chosen_spanish: sean fecundos
  alternatives_spanish:
  - sean fructíferos
  - produzcan fruto
  lexicon: Verbo de fertilidad / fruto
  rationale: El sentido base es reproductivo y de fecundidad; «sean fecundos» es natural en español bíblico y mantiene el valor lexical sin reducirlo a una mera idea agrícola.
- source_word: ወ*ብዙአ
  english_pob_choice: multiply
  chosen_spanish: multiplíquense
  alternatives_spanish:
  - auméntense
  - crezcan en número
  lexicon: Verbo de multiplicación / aumento numérico
  rationale: 'La coordinación con el verbo anterior preserva la doble formulación del original y del inglés POB: fecundidad más multiplicación numérica.'
- source_word: ዲበ ምድር
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por toda la tierra
  lexicon: Preposición + sustantivo terrestre
  rationale: «Sobre la tierra» reproduce la relación espacial del original y mantiene el registro bíblico estándar sin oscurecer el alcance territorial.
theological_decisions:
- issue: Preservación de la doble exhortación de fecundidad y multiplicación
  english_pob_reading: be fruitful and multiply
  chosen_spanish_reading: sean fecundos y multiplíquense
  alternative_spanish_readings:
  - fructifiquen y multiplíquense
  - sean fructíferos y aumenten
  rationale: La revisión inglesa corrigió «increase greatly» para reflejar mejor la fuerza completa de la fuente. En español conviene conservar ambos elementos como dos mandatos coordinados, no fusionarlos en una sola idea general de crecimiento.
  doctrine_reference: Génesis 1:28; lenguaje de bendición/población
- issue: Fuerza imperativa dirigida a los destinatarios
  english_pob_reading: And as for you
  chosen_spanish_reading: Y en cuanto a ustedes
  alternative_spanish_readings:
  - Y ustedes
  - Por su parte
  rationale: El arranque no es un simple conector ornamental; marca una aplicación directa a los oyentes. «En cuanto a ustedes» conserva esa focalización sin introducir una interpretación adicional.
  doctrine_reference: Discurso exhortativo bíblico
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «increase greatly upon the earth» a «be fruitful and multiply upon the earth» para ajustarse mejor al sentido completo de la fuente. La versión española sigue esa revisión y la expresa con una pareja verbal explícita de fecundidad y multiplicación.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y claro.
  - «Ustedes» se usa para el plural explícito del destinatario.
  - No se introduce «Cristo», «Señor» ni otra terminología no presente en el versículo.
