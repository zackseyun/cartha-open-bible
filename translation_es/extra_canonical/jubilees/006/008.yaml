    rationale: Aunque 'a imagen de Dios' es idiomático y bíblicamente reconocible, el testimonio fuente y el inglés POB preservan específicamente la idea de 'likeness/semejanza'. En una revisión fuente-orientada conviene mantener esa distinción cuando el español lo permite con naturalidad suficiente.
