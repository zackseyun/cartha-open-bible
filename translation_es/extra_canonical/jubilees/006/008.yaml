translation:
  language: es
  text: Cualquiera que derrame la sangre de un hombre, por un hombre será derramada su sangre; porque a semejanza de Dios hizo al hombre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''Adán''. Aquí, sin embargo, el término se entiende mejor en sentido genérico: ''hombre'' o ''ser humano''.'
    reason: El inglés POB preservó la alternativa previa 'Adam'; en español conviene mantenerla como nota, aclarando que el contexto favorece el sentido genérico.
lexical_decisions:
- source_word: ደመ፡ ሰብእ፡
  english_pob_choice: the blood of a man
  chosen_spanish: la sangre de un hombre
  alternatives_spanish:
  - la sangre de una persona
  - la sangre del hombre
  lexicon: sangre
  rationale: ‘sangre’ conserva el valor literal del sustantivo y ‘un hombre’ reproduce el genérico humano del contexto, en línea con la revisión inglesa que descartó el nombre propio ‘Adam’.
- source_word: በሰብእ፡ ደሙ፡ ይትከዐው፡
  english_pob_choice: by a man shall his blood be shed
  chosen_spanish: por un hombre será derramada su sangre
  alternatives_spanish:
  - por el hombre será derramada su sangre
  - por una persona será derramada su sangre
  lexicon: derramar / sangre
  rationale: La pasiva española mantiene la reciprocidad legal del dicho sin introducir explicaciones ajenas al texto.
- source_word: ለአዳም።
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a Adán
  - a la humanidad
  lexicon: hombre
  rationale: El contexto de Génesis 9:6 y la revisión inglesa indican valor genérico, no el nombre propio; por eso se traduce con el sustantivo común para conservar la base antropológica del argumento.
theological_decisions:
- issue: Imagen de Dios como fundamento del valor humano
  english_pob_reading: for in the likeness of God he made man
  chosen_spanish_reading: porque a imagen de Dios hizo al hombre
  alternative_spanish_readings:
  - porque en la semejanza de Dios hizo al hombre
  - porque Dios hizo al hombre a su imagen
  rationale: ‘a imagen de Dios’ es la forma más natural y transparente en español para expresar la relación de semejanza-teológica del original, sin debilitar el fundamento de la prohibición previa.
  doctrine_reference: Génesis 1:26-27; Génesis 9:6
translation_notes:
  revision_awareness: La revisión inglesa cambió ‘Adam’ por ‘man’ para evitar una lectura como nombre propio; la versión española sigue esa corrección con ‘hombre/al hombre’ y no introduce nota porque el sentido queda claro en el texto mismo.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para el referente divino, conforme al criterio del proyecto.
  - Se conserva el registro bíblico sobrio y directo, sin sustituir la formulación jurídica del paralelismo.
  - No se usa ‘SEÑOR’ ni ‘Cristo’, que no aparecen en este versículo.
