translation:
  language: es
  text: Y Yahvé olió el agradable aroma, y hizo un pacto con él, de que nunca más habría aguas de diluvio para destruir la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: YHWH
  rationale: El testimonio etiópico corresponde al nombre divino; siguiendo la convención del proyecto, se vierte como 'Yahvé' y no como una máscara reverencial genérica.
- source_word: መዐዛ፡ ሠናየ፡
  english_pob_choice: the pleasing fragrance
  chosen_spanish: el agradable aroma
  alternatives_spanish:
  - el olor agradable
  - la fragancia agradable
  lexicon: not provided
  rationale: La imagen sensorial se conserva sin forzar un tecnicismo litúrgico. 'Aroma' comunica bien el sentido de olor grato en español actual y mantiene la relación con el hebreo/greco-oriental de ofrenda aceptada.
- source_word: ተካየደ፡ ምስሌሁ፡ ኪዳነ፡
  english_pob_choice: he made a covenant with him
  chosen_spanish: hizo un pacto con él
  alternatives_spanish:
  - estableció un pacto con él
  - concertó un pacto con él
  lexicon: not provided
  rationale: '''Pacto'' es la forma clara y bíblicamente reconocible en español para ''covenant''; ''hizo'' conserva la simplicidad verbal del pasaje sin añadir solemnidad ajena al texto.'
- source_word: ኢይኩን፡ ማየ፡ አይኅ፡
  english_pob_choice: there should never again be floodwaters
  chosen_spanish: nunca más habría aguas de diluvio
  alternatives_spanish:
  - nunca más volverían a ser aguas de diluvio
  - nunca más habría aguas de inundación
  lexicon: not provided
  rationale: '''Aguas de diluvio'' conserva la referencia tradicional al juicio por el diluvio y evita reducir el término a una simple inundación. ''Habría'' refleja la cláusula prospectiva del pacto.'
- source_word: ዘያማስን፡ ምድረ፡
  english_pob_choice: to destroy the earth
  chosen_spanish: para destruir la tierra
  alternatives_spanish:
  - para arruinar la tierra
  - para aniquilar la tierra
  lexicon: not provided
  rationale: Se mantiene el valor causal/final de la cláusula y el objeto 'la tierra' como en el POB inglés, sin intensificar más de lo que el texto exige.
theological_decisions:
- issue: Nombre divino en un texto que la fuente inglesa vierte con 'the LORD'
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  rationale: El texto base alude al nombre divino, y la política del proyecto pide no enmascararlo. 'Yahvé' preserva la distinción entre nombre propio y título.
  doctrine_reference: Tetragrammaton / nombre del pacto
- issue: Sentido de 'covenant' como acto pactal formal
  english_pob_reading: he made a covenant with him
  chosen_spanish_reading: hizo un pacto con él
  alternative_spanish_readings:
  - estableció un pacto con él
  - concertó un pacto con él
  rationale: '''Pacto'' conserva el peso teológico del compromiso divino con Noé y corresponde al uso bíblico estándar en español.'
  doctrine_reference: Alianza / pacto bíblico
- issue: 'Alcance de la promesa: cese de aguas de juicio universal'
  english_pob_reading: there should never again be floodwaters to destroy the earth
  chosen_spanish_reading: nunca más habría aguas de diluvio para destruir la tierra
  alternative_spanish_readings:
  - nunca más habría inundación para destruir la tierra
  - nunca más volverían aguas de diluvio para destruir la tierra
  rationale: Se mantiene la universalidad y la fuerza preventiva de la promesa sin suavizar el juicio pasado ni la preservación futura.
  doctrine_reference: Pacto noáquico / juicio por el diluvio
translation_notes:
  revision_awareness: La revisión más reciente solo añadió puntuación final; no cambió el contenido. La redacción española sigue de cerca el sentido ya validado por el POB inglés y el texto ge'ez, incluyendo el pacto divino y la promesa de que no habrá más aguas de diluvio para destruir la tierra.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al criterio del proyecto para el nombre divino.
  - '''Pacto'' se mantuvo de forma consistente como traducción de covenant.'
  - '''Aguas de diluvio'' conserva el campo semántico de juicio por inundación catastrófica, no meramente lluvia o crecida.'
