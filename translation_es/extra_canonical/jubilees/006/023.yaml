translation:
  language: es
  text: para sus generaciones en este mes[a], un día cada año. Y en la luna nueva del primer mes, y en la luna nueva del cuarto mes, y en la luna nueva del séptimo mes, y en la luna nueva del décimo mes están los días de recuerdo, y son los días de las estaciones en las cuatro divisiones del año; están escritos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, ‘este mes’.
    reason: previous_rendering
lexical_decisions:
- source_word: ትዝምዶሙ / likely ትውልዶሙ
  english_pob_choice: for their generations in this month
  chosen_spanish: para sus generaciones en este mes
  alternatives_spanish:
  - para sus generaciones en este mes
  - para su descendencia en este mes
  - por sus generaciones en este mes
  lexicon: no entry number
  rationale: El Ge'ez abre con una forma que el revisor identifica como probable error por ትውልዶሙ, ‘sus generaciones’. La frase española conserva esa referencia generacional y la vincula con ‘este mes’, como en el audit trail inglés, sin suavizarla a una formulación meramente temporal.
- source_word: ወበሠርቀ፡ ወርኅ፡ ቀዳሚ
  english_pob_choice: on the new moon of the first month
  chosen_spanish: en la luna nueva del primer mes
  alternatives_spanish:
  - en la luna nueva del primer mes
  - en la novilunio del primer mes
  lexicon: no entry number
  rationale: ‘Luna nueva’ es el equivalente natural y fiel para el valor calendárico de ‘new moon’ en un registro bíblico español contemporáneo. Se mantiene ‘primer mes’ literalmente, sin sustituirlo por un nombre de mes que el texto no da.
- source_word: ወበሠርቀ፡ ወርኅ፡ ራብዕ / ሳብዕ / ዓሥር
  english_pob_choice: on the new moon of the fourth month / seventh month / tenth month
  chosen_spanish: en la luna nueva del cuarto mes / séptimo mes / décimo mes
  alternatives_spanish:
  - en la luna nueva del cuarto mes / séptimo mes / décimo mes
  - en la novilunio del cuarto mes / séptimo mes / décimo mes
  lexicon: no entry number
  rationale: Se conserva la estructura paralela de los cuatro hitos calendáricos. ‘Cuarto, séptimo, décimo’ reproduce el orden y el valor ordinal del original y del inglés POB.
- source_word: ተዝካር
  english_pob_choice: the days of remembrance
  chosen_spanish: los días de recuerdo
  alternatives_spanish:
  - los días de recuerdo
  - los días de memorial
  - los días de rememoración
  lexicon: no entry number
  rationale: ‘Recuerdo’ comunica bien la función conmemorativa sin imponer un término litúrgico más técnico que el texto no exige. Se evita ‘memorial’ por posible tono eclesiástico ajeno al registro del pasaje.
- source_word: ጊዜ / seasons
  english_pob_choice: the days of the seasons
  chosen_spanish: los días de las estaciones
  alternatives_spanish:
  - los días de las estaciones
  - los días de los tiempos
  - los días de las temporadas
  lexicon: no entry number
  rationale: ‘Estaciones’ reproduce el valor astronómico/calendárico de ‘seasons’ en una frase paralela a las lunas nuevas. ‘Temporadas’ suena menos bíblico; ‘tiempos’ sería demasiado amplio.
- source_word: አርባዕቱ መክፈላት
  english_pob_choice: the four divisions of the year
  chosen_spanish: las cuatro divisiones del año
  alternatives_spanish:
  - las cuatro divisiones del año
  - las cuatro partes del año
  - las cuatro secciones del año
  lexicon: no entry number
  rationale: ‘Divisiones’ sigue de cerca la imagen de partición del año y mantiene la relación con los ‘días de las estaciones’. Se evita concretar más allá de lo que el texto ofrece.
- source_word: ጽሑፋት
  english_pob_choice: they are written
  chosen_spanish: están escritos
  alternatives_spanish:
  - están escritos
  - están puestos por escrito
  - están escritos y establecidos
  lexicon: no entry number
  rationale: El cierre se limita a ‘están escritos’, en línea con la revisión inglesa que eliminó ‘and ordained’ por no estar sustentado. En español se mantiene la misma restricción textual.
theological_decisions:
- issue: Calendrical remembrance days as divinely fixed observances
  english_pob_reading: the days of remembrance ... the days of the seasons in the four divisions of the year; they are written
  chosen_spanish_reading: los días de recuerdo ... los días de las estaciones en las cuatro divisiones del año; están escritos
  alternative_spanish_readings:
  - '... están escritos y ordenados'
  - '... han sido establecidos'
  rationale: Se evita añadir ‘ordenados’ o ‘establecidos’, porque la revisión inglesa explícitamente retiró esa ampliación. La formulación española deja la fuerza de fijación en el hecho de que ‘están escritos’, sin sobreinterpretar el efecto jurídico.
  doctrine_reference: Jubilees calendrical law; source-bound textual restraint
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB que eliminó ‘and ordained’ y la corrección posterior que recupera ‘for their generations in this month’. La frase española incorpora esa lectura generacional y mantiene el cierre breve ‘están escritos’ sin añadir mandatos no atestiguados.
  spanish_consistency_notes:
  - Se usa ‘luna nueva’ de forma consistente para las cuatro referencias calendáricas.
  - Se conserva el paralelismo sintáctico del original y del inglés auditado.
  - No se introduce terminología eclesiástica que desplace la imagen calendárica del pasaje.
  - La nota a pie de página queda anclada explícitamente en ‘este mes’, evitando marcadores huérfanos.
