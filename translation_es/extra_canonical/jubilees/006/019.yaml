translation:
  language: es
  text: Pero Abraham solamente lo guardó, e Isaac y Jacob, y sus hijos, lo guardaron hasta tus días. Y en tus días los hijos de Israel lo olvidaron hasta que yo la renové para ellos en este monte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐቀበ / ዐቀብዋ
  english_pob_choice: kept it
  chosen_spanish: lo guardó / lo guardaron
  alternatives_spanish:
  - lo observaron
  - lo conservaron
  lexicon: guardar
  rationale: El etíope expresa la idea de custodiar u observar una práctica; el POB inglés eligió 'kept it'. En español, 'guardar' comunica bien tanto la conservación como la observancia de una ordenanza sin introducir una formulación demasiado técnica.
- source_word: ውሉዱ / ውሉደ እስራኤል
  english_pob_choice: his children / the children of Israel
  chosen_spanish: sus hijos / los hijos de Israel
  alternatives_spanish:
  - su descendencia / la descendencia de Israel
  - sus hijos y descendientes / los descendientes de Israel
  lexicon: hijos
  rationale: La referencia genealógica y colectiva se mantiene con 'hijos', que en español bíblico conserva el sentido de descendencia/pueblo. Evita ampliar innecesariamente a 'descendencia' donde el texto fuente usa una formulación más directa.
- source_word: ኀበዝ፡ ደብር
  english_pob_choice: this mountain
  chosen_spanish: este monte
  alternatives_spanish:
  - esta montaña
  - este monte sagrado
  lexicon: monte
  rationale: '''Monte'' es el equivalente bíblico más natural y sobrio para el lugar de revelación. ''Montaña'' es posible, pero ''monte'' preserva mejor el registro tradicional sin ser arcaizante.'
- source_word: እስከ መዋዕሊከ / በመዋዕሊከ
  english_pob_choice: until your days / in your days
  chosen_spanish: hasta tus días / en tus días
  alternatives_spanish:
  - hasta tu tiempo / en tu tiempo
  - hasta tu época / en tu época
  lexicon: días
  rationale: El poseedor en segunda persona se conserva literalmente, como en el inglés POB. 'Días' aquí tiene valor temporal-idiomático y mantiene el paralelismo del verso.
- source_word: አመ፡ ኀይስክዎሙ
  english_pob_choice: until I renewed it for them
  chosen_spanish: hasta que yo se lo renové
  alternatives_spanish:
  - hasta que yo lo restablecí para ellos
  - hasta que yo se lo devolví
  lexicon: renovar
  rationale: El verbo expresa restauración de una observancia olvidada. 'Renovar' sigue fielmente la elección del POB inglés y preserva la acción divina de reestablecer algo para el pueblo.
- source_word: ባሕቲቱ፡
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solamente
  lexicon: solo
  rationale: La forma adverbial 'solo' reproduce la exclusividad del sujeto Abraham sin añadir una matización teológica extra.
theological_decisions:
- issue: Conservación y olvido de una práctica transmitida patriarcalmente
  english_pob_reading: Abraham alone kept it, and Isaac and Jacob and his children kept it until your days. And in your days the children of Israel forgot it until I renewed it for them on this mountain.
  chosen_spanish_reading: Abraham solo lo guardó, e Isaac y Jacob y sus hijos lo guardaron hasta tus días. Y en tus días los hijos de Israel lo olvidaron hasta que yo se lo renové en este monte.
  alternative_spanish_readings:
  - Abraham únicamente lo conservó, e Isaac y Jacob y sus hijos lo conservaron hasta tus días. Y en tus días los hijos de Israel lo olvidaron hasta que yo lo restauré para ellos en este monte.
  - Abraham solo lo observó, e Isaac y Jacob y sus hijos lo observaron hasta tus días. Y en tus días los hijos de Israel lo olvidaron hasta que yo lo restablecí para ellos en este monte.
  rationale: El texto presenta una transmisión histórica de una observancia, no un desarrollo doctrinal abstracto. La traducción mantiene el contraste entre custodia patriarcal, olvido nacional y restauración divina sin exagerar o suavizar esos movimientos.
  doctrine_reference: Transmisión de la observancia; restauración divina de una práctica olvidada.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo cruzado mostró alto acuerdo con solo observaciones menores; por eso se conserva la estructura de sentido del POB inglés sin añadir notas textuales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino explícito en la fuente; por eso no aparece en el texto.
  - Se preserva el paralelismo 'hasta tus días / en tus días' para reflejar la repetición temporal del original.
  - No se introduce 'Cristo', 'Señor' ni otras equivalencias no presentes en la fuente.
  - El tono es bíblico y sobrio, con 'monte' y 'hijos' para conservar registro canónico legible.
