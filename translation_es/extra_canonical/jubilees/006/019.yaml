- from: Pero Abraham solo lo guardó, e Isaac y Jacob y sus hijos lo guardaron hasta tus días. Y en tus días los hijos de Israel lo olvidaron hasta que yo se lo renové en este monte.
  to: Pero Abraham solamente lo guardó, e Isaac y Jacob, y sus hijos, lo guardaron hasta tus días. Y en tus días los hijos de Israel lo olvidaron hasta que yo la renové para ellos en este monte.
  rationale: 'Se propone una revisión menor para mejorar la claridad idiomática del español sin cambiar el sentido del texto fuente: se reemplaza ''solo'' por ''solamente'', se aligera la coordinación con comas, y se cambia ''se lo renové'' por ''la renové para ellos'' para expresar con más naturalidad la restauración de la observancia olvidada.'
