  yaml_path: translation/extra_canonical/jubilees/006/005.yaml
  text: And as for you, be fruitful and multiply on the earth, and become many upon it, and be a blessing upon it. The fear of you and the dread of you I will put upon everything that is on the earth and in the sea.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:35:13Z'
    unchanged: false
    changes_summary: Changed 'increase' to 'be fruitful' for better lexical accuracy and more natural rendering of the blessing formula; left the rest unchanged.
translation:
  language: es
  text: Y en cuanto a ustedes, sean fecundos y multiplíquense sobre la tierra, y lleguen a ser muchos sobre ella, y sean una bendición sobre ella. El temor de ustedes y el pavor de ustedes pondré sobre todo lo que está en la tierra y en el mar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወተባዝኁ / ተባዝኁ
  english_pob_choice: be fruitful
  chosen_spanish: sean fecundos
  alternatives_spanish:
  - fructifiquen
  - sean fértiles
  lexicon: be fruitful
  rationale: La revisión inglesa corrigió el valor a la fórmula de bendición ‘be fruitful’, que en español se expresa de modo natural con ‘sean fecundos’. Mantiene la imagen de reproducción fecunda sin volverla demasiado técnica.
- source_word: ውስተ፡ ምድር
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en la tierra
  lexicon: earth
  rationale: ‘Sobre la tierra’ conserva mejor la idea de dominio/expansión sobre el ámbito terrestre y sigue de cerca la preposición del texto fuente y del inglés POB.
- source_word: ብዙኁ
  english_pob_choice: become many
  chosen_spanish: háganse muchos
  alternatives_spanish:
  - aumenten mucho
  - vuélvanse numerosos
  lexicon: many
  rationale: ‘Háganse muchos’ reproduce el valor de multiplicación con español claro y solemne, evitando una paráfrasis excesiva.
- source_word: ለበረከት
  english_pob_choice: be a blessing
  chosen_spanish: sean una bendición
  alternatives_spanish:
  - sean bendición
  - resulten en bendición
  lexicon: blessing
  rationale: ‘Sean una bendición’ es la formulación más natural y fiel para expresar la función benéfica concedida a los destinatarios.
- source_word: ፍርሀትክሙ
  english_pob_choice: the fear of you
  chosen_spanish: el temor de ustedes
  alternatives_spanish:
  - su temor
  - el temor hacia ustedes
  lexicon: fear
  rationale: Se mantiene ‘temor’ para conservar la fuerza semítica del sustantivo sin suavizarlo indebidamente.
- source_word: ረዓድክሙ
  english_pob_choice: the dread of you
  chosen_spanish: el pavor de ustedes
  alternatives_spanish:
  - el terror de ustedes
  - el espanto de ustedes
  lexicon: dread
  rationale: ‘Pavor’ distingue este segundo término del primero y preserva la intensificación del paralelismo.
theological_decisions:
- issue: Bendición de dominio humano y efecto sobre criaturas terrestres y marítimas
  english_pob_reading: The verse presents a commission of fecundity and a divinely imposed fear/dread over all creatures on land and in the sea.
  chosen_spanish_reading: El verso presenta una comisión de fecundidad y una disposición divina del temor/pavor sobre todas las criaturas de la tierra y del mar.
  alternative_spanish_readings:
  - mandato de prosperidad
  - bendición de supremacía humana
  rationale: La traducción conserva el mandato y el efecto creados por Dios sin explicar ni atenuar su alcance. ‘Tierra y mar’ sigue el cierre inclusivo del texto.
  doctrine_reference: Génesis 1:28; Jubileos 6:5
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘increase’ por ‘be fruitful’ para reflejar mejor la fórmula de bendición. La versión española adopta directamente ‘sean fecundos’ para alinearse con esa corrección y con la semántica de la bendición original.
  spanish_consistency_notes:
  - Se usó ‘tierra’ para ምድር y se mantuvo ‘mar’ para ባሕር, con estilo natural en español.
  - Se eligió ‘temor’ y ‘pavor’ para conservar la distinción del paralelismo del original.
  - No se introdujeron notas al pie porque no hay variantes textuales o ambigüedades adicionales documentadas en el paquete auditado.
