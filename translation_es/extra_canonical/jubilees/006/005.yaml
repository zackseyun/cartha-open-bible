revisions:
- from: Y en cuanto a ustedes, sean fecundos y multiplíquense sobre la tierra, y háganse muchos sobre ella, y sean una bendición sobre ella. El temor de ustedes y el pavor de ustedes los pondré sobre todo lo que está en la tierra y en el mar.
  to: Y en cuanto a ustedes, sean fecundos y multiplíquense sobre la tierra, y lleguen a ser muchos sobre ella, y sean una bendición sobre ella. El temor de ustedes y el pavor de ustedes pondré sobre todo lo que está en la tierra y en el mar.
  rationale: Se corrige un problema gramatical y semántico serio eliminando ‘los’ para que el objeto del verbo sea ‘el temor... y el pavor...’, conforme a la fuente. Además, se mejora la naturalidad de ‘háganse muchos’ a ‘lleguen a ser muchos’ sin cambiar el sentido. No se requieren notas al pie.
