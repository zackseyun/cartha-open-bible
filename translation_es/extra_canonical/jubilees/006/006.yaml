translation:
  language: es
  text: Y he aquí, les he dado todos los animales, y todo lo que vuela[a] y todo lo que se mueve sobre la tierra, y los peces en las aguas, y todo como alimento; como las plantas verdes, les he dado todo para comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todo lo que se mueve y todo lo que vive’.
    reason: previous_rendering preserved from English audit trail
lexical_decisions:
- source_word: ወናሁ፡ ወሀብኩክሙ
  english_pob_choice: And behold, I have given you
  chosen_spanish: Y he aquí, les he dado
  alternatives_spanish:
  - Y he aquí, os he dado
  - Miren, les he dado
  lexicon: Heb/Ge'ez discourse marker + perfective gift formula
  rationale: Conserva la fórmula solemne de introducción y el acto completado de dar, sin forzar un giro arcaizante innecesario.
- source_word: ኵሎ፡ አራዊተ፡
  english_pob_choice: all the beasts
  chosen_spanish: todos los animales
  alternatives_spanish:
  - todas las bestias
  - todas las fieras
  lexicon: Ge'ez lexical field for wild animals
  rationale: ‘Animales’ comunica el conjunto de manera clara en español moderno; ‘bestias’ puede sonar más duro y ‘fieras’ es demasiado restringido.
- source_word: ዘይሰርር፡
  english_pob_choice: everything that flies
  chosen_spanish: todo lo que vuela
  alternatives_spanish:
  - todo lo que vuela por el aire
  - todo lo volador
  lexicon: Ge'ez participial clause for flying creatures
  rationale: 'La revisión fuente-auditada corrigió esta unidad: no es ‘lo que se mueve’, sino ‘lo que vuela’. ‘Todo lo que vuela’ mantiene la amplitud y la referencia a aves o criaturas aladas.'
- source_word: ዘይትሐወስ፡
  english_pob_choice: everything that moves
  chosen_spanish: todo lo que se mueve
  alternatives_spanish:
  - todo lo que anda
  - todo lo que se arrastra
  lexicon: Ge'ez participial clause for moving/creeping creatures
  rationale: Reproduce el contraste con ‘vuela’ y conserva la amplitud zoológica del término sin especificar indebidamente la modalidad del movimiento.
- source_word: ውስተ፡ ምድር፡
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - por la tierra
  lexicon: Ge'ez prepositional location phrase
  rationale: ‘Sobre la tierra’ es natural y mantiene la idea de extensión en el ámbito terrestre.
- source_word: ወውስተ፡ ማያት፡ ዓሣተ፡
  english_pob_choice: and the fish in the waters
  chosen_spanish: y los peces en las aguas
  alternatives_spanish:
  - y los peces en el agua
  - y los peces de las aguas
  lexicon: Ge'ez noun phrase for aquatic creatures
  rationale: Conserva el plural ‘aguas’ del texto y la enumeración paralela con las criaturas terrestres y aéreas.
- source_word: ወኵሎ፡ ለሲሲት፡
  english_pob_choice: and everything for food
  chosen_spanish: y todo[a] para alimento
  alternatives_spanish:
  - y todo para comer
  - y todo lo destinado a alimento
  lexicon: Ge'ez distributive phrase with alimentary sense
  rationale: ‘Para alimento’ mantiene la fuerza nominal y la amplitud del destinatario. El marcador de nota permite señalar la alternativa natural ‘para comer’ sin introducir un segundo enunciado.
- source_word: ከመ፡ ሐምለ፡ ሣዕር፡
  english_pob_choice: like the green plants
  chosen_spanish: como las plantas verdes
  alternatives_spanish:
  - como la hierba verde
  - como los vegetales verdes
  lexicon: Ge'ez simile comparing provision to green plants
  rationale: ‘Plantas verdes’ sigue de cerca el paralelo con la provisión vegetal; evita estrechar el sentido a una sola especie de planta.
- source_word: ወሀብኩክሙ፡ ኵሎ፡ ትብልዑ።
  english_pob_choice: I have given you everything to eat
  chosen_spanish: les he dado todo para comer
  alternatives_spanish:
  - les he dado todo para que coman
  - les he dado todo para alimento
  lexicon: Ge'ez gift formula + infinitival purpose
  rationale: Mantiene el paralelo con la cláusula anterior y expresa el propósito alimentario de forma idiomática en español.
theological_decisions:
- issue: Alcance de la concesión divina de alimento
  english_pob_reading: I have given you everything to eat
  chosen_spanish_reading: les he dado todo para comer
  alternative_spanish_readings:
  - les he dado todo para alimento
  - les he dado todo para que coman
  rationale: La formulación española conserva la amplitud del permiso/provisión divina sin restringirla a una lista cerrada más allá de la secuencia textual.
  doctrine_reference: Providencia/divina concesión de alimentos en el marco de la creación
- issue: 'Enumeración de criaturas: aves incluidas explícitamente'
  english_pob_reading: everything that flies and everything that moves
  chosen_spanish_reading: todo lo que vuela y todo lo que se mueve sobre la tierra
  alternative_spanish_readings:
  - todo lo que se mueve y todo lo que vive
  - todo lo que vuela y todo lo que anda
  rationale: La revisión fuente-auditada exige reflejar correctamente la distinción entre criaturas voladoras y criaturas terrestres móviles. La traducción evita borrar esa tensión lexical.
  doctrine_reference: Fidelidad a la clasificación creacional del pasaje
translation_notes:
  revision_awareness: 'La fuente ge''ez y la revisión aplicada corrigen el error previo del inglés auditado: ዘይሰርር significa ‘lo que vuela’, no ‘lo que se mueve’; ዘይትሐወስ corresponde a ‘lo que se mueve’ o ‘se arrastra’. La versión española refleja esa distinción explícita.'
  spanish_consistency_notes:
  - Se mantiene ‘he dado’ para conservar el acto perfecto de provisión divina.
  - Se usa ‘animales’ como término amplio y comprensible; no se introduce ‘bestias’ para evitar una restricción o aspereza innecesaria.
  - La nota al pie se ancla únicamente en ‘todo[a] para alimento’, evitando marcadores sueltos.
  - ‘plantas verdes’ sigue la comparación del texto sin convertirla en una paráfrasis botánica más específica.
