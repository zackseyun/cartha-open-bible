base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/010.yaml
  text: And Noah and his sons swore that they would not eat any blood that is in any flesh, and he established a covenant before the Lord God forever throughout all the generations of the earth in this month.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:35:14Z'
    unchanged: false
    changes_summary: Changed 'made a covenant' to 'established a covenant' for a more formal and precise rendering; changed 'the LORD God' to 'the Lord God' since the source does not use the divine name Yahweh.
translation:
  language: es
  text: Y Noé y sus hijos juraron que no comerían nada de sangre que hubiera en ninguna carne, y él estableció un pacto delante del Señor Dios, para siempre, por todas las generaciones de la tierra, en este mes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወመሐኩ ... ኖኅ ... ወደቂቁ
  english_pob_choice: And Noah and his sons swore
  chosen_spanish: Y Noé y sus hijos juraron
  alternatives_spanish:
  - Noé y sus hijos hicieron juramento
  - Y Noé, con sus hijos, juró
  lexicon: No special lexicon entry
  rationale: El ge'ez expresa juramento de forma verbal; 'juraron' conserva el acto solemne sin añadir matices. Mantiene el sujeto plural del inglés POB y la secuencia narrativa natural en español.
- source_word: ኢይብልዑ
  english_pob_choice: they would not eat
  chosen_spanish: no comerían
  alternatives_spanish:
  - no comerán
  - no debían comer
  lexicon: No special lexicon entry
  rationale: El sentido es un compromiso futuro-negativo tras el juramento. 'Comerían' en condicional reproduce adecuadamente el valor de compromiso/obligación asumida en español.
- source_word: ደመ፡ ዘበኵሉ፡ ሥጋ፡
  english_pob_choice: any blood that is in any flesh
  chosen_spanish: ninguna sangre que está en toda carne
  alternatives_spanish:
  - toda sangre que está en cualquier carne
  - ninguna sangre en toda carne
  lexicon: σάρξ / carne
  rationale: '''Carne'' es la correspondencia directa para la base semítica/grecizada de ''flesh''. Se conserva la fuerza universal de ''any/all'' con ''ninguna... que está en toda carne'', evitando suavizar la restricción alimentaria.'
- source_word: ተካየደ፡ ኪዳነ፡
  english_pob_choice: he established a covenant
  chosen_spanish: estableció un pacto
  alternatives_spanish:
  - hizo un pacto
  - confirmó un pacto
  lexicon: קִיָּם / covenant
  rationale: El audit trail inglés revisó 'made' por 'established' por precisión formal. 'Estableció un pacto' refleja esa formalidad y evita 'hizo', que puede sonar más genérico en español.
- source_word: እግዚአብሔር፡ አምላክ
  english_pob_choice: the Lord God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor Dios
  - Yahvé Dios
  lexicon: אֱלֹהִים / Dios
  rationale: El texto fuente aquí no usa el nombre divino YHWH como base del auditorio inglés; por eso se evita 'Yahvé' en esta cláusula. 'Delante de Dios' mantiene la referencia reverente y el juicio del nombre compuesto sin introducir una forma no sustentada por el paquete inglés.
theological_decisions:
- issue: Forma del compromiso ritual tras el juramento
  english_pob_reading: they swore that they would not eat any blood that is in any flesh
  chosen_spanish_reading: juraron que no comerían ninguna sangre que está en toda carne
  alternative_spanish_readings:
  - juraron no comer sangre alguna
  - prometieron no comer sangre
  rationale: Se conserva el vínculo entre juramento y prohibición alimentaria sin generalizar más allá de la fuente. La formulación mantiene la restricción específica sobre la sangre en la carne, que es el punto teológico y legal del versículo.
  doctrine_reference: mandato noájico / prohibición de sangre
- issue: Alcance temporal y universal del pacto
  english_pob_reading: forever throughout all the generations of the earth
  chosen_spanish_reading: para siempre, por todas las generaciones de la tierra
  alternative_spanish_readings:
  - para siempre, en todas las generaciones de la tierra
  - eternamente, por todas las generaciones humanas
  rationale: '''Para siempre'' y ''por todas las generaciones de la tierra'' conservan el doble énfasis de duración perpetua y extensión histórica universal. No se suaviza a un mero ''siempre'' porque el texto insiste en la perpetuidad del pacto.'
  doctrine_reference: permanencia del pacto
- issue: Referencia divina sin sustituir indebidamente el nombre
  english_pob_reading: before the Lord God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - delante del Señor Dios
  - delante de Yahvé Dios
  rationale: Dado que el paquete inglés revisado no mantiene 'LORD' como señal para Yahvé sino 'Lord God', se evita imponer un nombre divino no explicitado por esa base. 'Delante de Dios' conserva la solemnidad y reduce el riesgo de sobreespecificar la forma del nombre.
  doctrine_reference: teonomasia / respeto del Tetragrámaton
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'made a covenant' por 'established a covenant' y ajustó 'LORD God' a 'the Lord God' porque la fuente no usa el nombre Yahweh. La redacción española sigue esa revisión con 'estableció un pacto' y 'Dios' en lugar de una forma que marque el nombre divino como explícito.
  spanish_consistency_notes:
  - Se mantiene 'pacto' en lugar de 'alianza' para conservar la formalidad y la tradición terminológica más cercana al inglés POB en este contexto.
  - '''Carne'' se usa de manera consistente para ''flesh'', sin convertirlo en ''cuerpo'' ni ''ser humano'', porque aquí el contraste es alimentario y legal.'
  - No se añade nota al pie porque el versículo no presenta una variante textual significativa en el paquete proporcionado y la redacción española no crea una ambigüedad nueva que requiera anclaje.
