  yaml_path: translation/extra_canonical/jubilees/006/018.yaml
  text: And this whole festival was celebrated in heaven from the day of creation until the days of Noah—twenty-six jubilees and five weeks of years. And Noah and his sons kept it for seven jubilees and one week of years, until the day of Noah's death. And from the day of Noah's death his sons corrupted it until the days of Abraham, and they ate blood.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:35:46Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y toda esta fiesta se celebró en el cielo desde el día de la creación hasta los días de Noé: veintiséis jubileos y cinco semanas de años. Y Noé y sus hijos la guardaron durante siete jubileos y una semana de años, hasta el día de la muerte de Noé. Y desde el día de la muerte de Noé sus hijos la corrompieron hasta los días de Abraham, y comieron sangre.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዛቲ፡ በዓል
  english_pob_choice: this whole festival
  chosen_spanish: toda esta fiesta
  alternatives_spanish:
  - esta fiesta entera
  - todo este festival
  lexicon: fiesta / festival
  rationale: La fuente refiere una observancia calendárico-cultual; en español 'fiesta' es natural y comprensible, mientras que 'festival' conserva el sentido pero suena más técnico. 'Toda esta fiesta' reproduce el alcance total de la expresión sin endurecer el español.
- source_word: ትትገበር፡ በሰማይ
  english_pob_choice: was celebrated in heaven
  chosen_spanish: se celebró en el cielo
  alternatives_spanish:
  - se observó en el cielo
  - se hacía en el cielo
  lexicon: celebrar / cielo
  rationale: '''Celebró'' mantiene el carácter festivo del pasaje y ''en el cielo'' conserva el lugar celestial. ''Celebrarse'' da una lectura idiomática mejor que un calco literal más pesado.'
- source_word: እስከ፡ መዋዕለ፡ ኖኅ፡ *ዐሥራ፡ ወስድስተ፡ ኢዮቤልዉ፡ ወሱባዔ፡ ዓመት፡ ኃምስተ
  english_pob_choice: until the days of Noah—twenty-six jubilees and five weeks of years
  chosen_spanish: 'hasta los días de Noé: veintiséis jubileos y cinco semanas de años'
  alternatives_spanish:
  - hasta los días de Noé —veintiséis jubileos y cinco semanas de años
  - 'hasta la época de Noé: veintiséis jubileos y cinco semanas de años'
  lexicon: jubiló / semana de años
  rationale: Se conserva la terminología técnica del texto fuente. 'Semanas de años' traduce el valor calendárico sin explicarlo en exceso, siguiendo el patrón del audit trail en inglés.
- source_word: ዐቀብዋ፡ ኖኅ፡ ወደቂቁ
  english_pob_choice: Noah and his sons kept it
  chosen_spanish: Noé y sus hijos la guardaron
  alternatives_spanish:
  - Noé y sus hijos la observaron
  - Noé y sus hijos la mantuvieron
  lexicon: guardar / observar
  rationale: '''Guardar'' comunica la conservación fiel de una práctica o fiesta. ''Observar'' también es posible, pero ''guardar'' conserva mejor la idea de custodia fiel del rito.'
- source_word: ወ*እምዕለተ፡ ሞቱ፡ ለኖኅ፡ አሜሃአ፡ ውሉዱ፡
  english_pob_choice: from the day of Noah's death his sons corrupted it
  chosen_spanish: desde el día de la muerte de Noé sus hijos la corrompieron
  alternatives_spanish:
  - desde el día en que murió Noé sus hijos la corrompieron
  - a partir de la muerte de Noé sus hijos la corrompieron
  lexicon: corromper / corrompieron
  rationale: '''Corrompieron'' refleja la ruptura moral y cultual del mantenimiento anterior. Se preserva el sujeto ''sus hijos'' y el objeto femenino ''la'' para la fiesta.'
- source_word: ወይበልዑ፡ ደመ
  english_pob_choice: and they ate blood
  chosen_spanish: y comieron sangre
  alternatives_spanish:
  - y comieron sangre [a]
  - y se alimentaron de sangre
  lexicon: comer sangre
  rationale: La fuente usa un verbo directo de comer, y el POB inglés lo conserva sin suavizarlo. 'Comieron sangre' mantiene la fuerza legal y ritual del reproche sin paraphrasearlo.
theological_decisions:
- issue: Celebración celestial de una fiesta antes de Moisés y continuidad desde la creación
  english_pob_reading: this whole festival was celebrated in heaven from the day of creation
  chosen_spanish_reading: toda esta fiesta se celebró en el cielo desde el día de la creación
  alternative_spanish_readings:
  - esta fiesta se celebró en el cielo desde la creación
  - toda la fiesta se celebró en el cielo desde el día de la creación
  rationale: Se mantiene la afirmación fuerte de una práctica celestial anterior y superior a la observancia humana. No se atenúa a mera 'institución' porque el texto presenta celebración real, no solo decreto.
  doctrine_reference: cosmología y liturgia celestial en Jubileos
translation_notes:
  revision_awareness: La versión inglesa POB no añade notas ni variantes y fue marcada como sin cambios en la última revisión. El español sigue de cerca esa lectura, sin introducir notas no sustentadas por el aparato existente.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando la fuente lo exigiría; este versículo no contiene el nombre divino explícito.
  - '''Jubileos'' y ''semanas de años'' se mantuvieron como tecnicismos calendáricos consistentes con el registro del libro.'
  - '''Corrompieron'' conserva el juicio moral del pasaje y evita una suavización interpretativa.'
