base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/006/031.yaml
  text: 'And you, command the children of Israel to keep the years according to this reckoning: three hundred and sixty-four days, and it will be a complete year. And it will not disturb its time from its days or from its feasts, for everything will come in them according to their testimony, and they will not omit a day nor disturb a feast.'
  footnotes:
  - marker: a
    text: Or 'And they shall not disturb its time'.
    reason: previous_rendering
  - marker: b
    text: Or 'And command'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:50Z'
    unchanged: false
    changes_summary: Adjusted grammar ('command ... to keep'), rendered በዓላቲሁ consistently as 'feasts,' changed 'fall' to 'come' for a more natural and direct rendering of the verb, and replaced 'pass over a day' with 'omit a day' for better lexical accuracy.
translation:
  language: es
  text: 'Y tú, manda a los hijos de Israel que guarden los años según este cómputo: trescientos sesenta y cuatro días; y será un año completo. Y no alterará su tiempo de sus días ni de sus fiestas, porque todo vendrá en ellos conforme a su testimonio, y no omitirán un día ni alterarán una fiesta.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእንተኒ
  english_pob_choice: And you, command
  chosen_spanish: Y tú, manda
  alternatives_spanish:
  - Y en cuanto a ti, manda
  - Y tú, ordena
  lexicon: emphatic independent pronoun + imperative
  rationale: El giro inicial en ge'ez es enfático y se dirige a Moisés en segunda persona. En español, 'Y tú' conserva ese énfasis sin volver la frase pesada. 'Manda' refleja la fuerza directiva de 'command' con un tono bíblico sobrio.
- source_word: ያዕቀቡ / ይዕቀቡ
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - conserven
  lexicon: guardar / observar
  rationale: '''Guardar los años'' expresa bien la idea de observar un calendario prescrito. ''Guarden'' mantiene la obligación normativa y suena natural en español bíblico contemporáneo.'
- source_word: ሠለስተ ምእተ ወስሳ ወረቡዐ
  english_pob_choice: three hundred and sixty-four days
  chosen_spanish: trescientos sesenta y cuatro días
  alternatives_spanish:
  - 364 días
  lexicon: number phrase
  rationale: Se traduce de forma plena para mayor solemnidad y legibilidad litúrgica, sin alterar el valor numérico.
- source_word: ፍጹመ ዓመተ
  english_pob_choice: it will be a complete year
  chosen_spanish: será un año completo
  alternatives_spanish:
  - será un año perfecto
  - será un año íntegro
  lexicon: complete year
  rationale: '''Completo'' comunica bien la idea de un año íntegro y terminado, sin introducir matices no sostenidos por el texto.'
- source_word: ወኢያማስን
  english_pob_choice: it will not disturb its time
  chosen_spanish: no alterará su tiempo
  alternatives_spanish:
  - no perturbará su tiempo
  - no trastornará su tiempo
  lexicon: disturb / alter
  rationale: El verbo ge'ez expresa la idea de no desajustar ni alterar el calendario. 'Alterará' es claro y abarca la noción de desorden temporal sin sonar artificial.
- source_word: ወኢያማስኑ
  english_pob_choice: they will not omit a day nor disturb a feast
  chosen_spanish: no omitirán un día ni alterarán una fiesta
  alternatives_spanish:
  - no dejarán pasar un día ni trastornarán una fiesta
  - no suprimirán un día ni alterarán una fiesta
  lexicon: omit a day / disturb a feast
  rationale: '''Omitir'' reproduce con precisión la ausencia de un día; ''alterarán una fiesta'' mantiene el paralelo con el desajuste festivo. Se evita ''pasar por alto'', menos exacto aquí.'
- source_word: በዓላቲሁ
  english_pob_choice: feasts
  chosen_spanish: fiestas
  alternatives_spanish:
  - festividades
  - celebraciones
  lexicon: feasts
  rationale: '''Fiestas'' es el equivalente español más natural y mantiene la referencia calendárica/cultual del texto.'
- source_word: በከመ ስምዖሙ
  english_pob_choice: according to their testimony
  chosen_spanish: conforme a su testimonio
  alternatives_spanish:
  - según su testimonio
  - según su declaración
  lexicon: testimony
  rationale: '''Conforme a'' preserva el valor normativo; ''testimonio'' mantiene el término de la fuente y el matiz de testificación/validación de un orden dado.'
theological_decisions:
- issue: Autoridad normativa del calendario dado a Israel
  english_pob_reading: command the children of Israel to keep the years according to this reckoning
  chosen_spanish_reading: manda a los hijos de Israel que guarden los años según este cómputo
  alternative_spanish_readings:
  - ordena a los hijos de Israel que guarden los años según este cálculo
  - manda a los hijos de Israel a guardar los años según este cómputo
  rationale: Se conserva la estructura mandativa y la referencia a un cómputo calendárico prescriptivo. 'Cómputo' es más técnico que 'cálculo' y se ajusta mejor al contexto de regulación del tiempo sagrado.
  doctrine_reference: Orden cultual/calendárica en Jubileos; no hay dogma doctrinal añadido, solo preservación de la prescripción textual.
- issue: Sujeto singular de 'no alterará su tiempo'
  english_pob_reading: it will not disturb its time
  chosen_spanish_reading: no alterará su tiempo
  alternative_spanish_readings:
  - no alterarán su tiempo
  - no se alterará su tiempo
  rationale: El audito revisado identifica el verbo como singular masculino, referido al año o al cómputo. En español se mantiene el singular 'no alterará' para respetar esa concordancia.
  doctrine_reference: Coherencia gramatical con el referente temporal singular del texto base.
- issue: Paralelismo entre días y fiestas
  english_pob_reading: from its days or from its feasts
  chosen_spanish_reading: desde sus días ni desde sus fiestas
  alternative_spanish_readings:
  - de sus días ni de sus fiestas
  - desde sus días ni de sus festividades
  rationale: Se mantiene el paralelismo temporal/cultual del pasaje. 'Fiestas' conserva la terminología del audit trail y evita suavizar el vínculo con el calendario sagrado.
  doctrine_reference: Calendario sagrado y su orden interno en Jubileos.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que corrige la gramática del verbo singular ('no alterará') y conserva la formulación revisada 'omitirá un día'/'no omitirán un día' con español natural. Se integró además la observación de énfasis inicial ('Y tú') sin necesidad de notas, para evitar marcadores sin anclaje.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiere; aquí no aparece el nombre divino.
  - '''Fiestas'' se mantuvo de forma consistente para בָּעֲלָט־/feasts, evitando alternar con ''festividades'' dentro del versículo.'
  - No se introdujeron notas al pie porque el texto español no requiere lecturas alternativas ancladas en este caso.
  - Se evitó 'Cristo/Mesías' y cualquier terminología cristológica, ya que el pasaje trata del calendario de Israel.
