translation:
  language: es
  text: Y subieron de la tierra de Egipto y llegaron a la tierra de Canaán, y le contaron a su padre todo lo que les había sucedido, y cómo el gobernante de la tierra les había hablado con dureza y había apresado a Simeón hasta...
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወዐርጉ
  english_pob_choice: And they went up
  chosen_spanish: Y subieron
  alternatives_spanish:
  - Y fueron
  - Y ascendieron
  lexicon: subir
  rationale: El verbo ge'ez expresa movimiento hacia arriba o de retorno desde Egipto a Canaán; «subieron» comunica bien el desplazamiento geográfico sin sobrecargar el registro.
- source_word: እምድረ፡ ግብጽ
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - desde la tierra de Egipto
  lexicon: tierra
  rationale: «De la tierra de Egipto» sigue la construcción del original y mantiene el tono narrativo bíblico natural en español.
- source_word: በጽሑ፡ ምድረ፡ ከናአን
  english_pob_choice: came to the land of Canaan
  chosen_spanish: llegaron a la tierra de Canaán
  alternatives_spanish:
  - vinieron a la tierra de Canaán
  - llegaron a la tierra de Canaán
  lexicon: llegar
  rationale: «Llegaron» reproduce el valor de arribar al destino con claridad idiomática en español.
- source_word: ነገሩ
  english_pob_choice: they told
  chosen_spanish: contaron
  alternatives_spanish:
  - dijeron
  - relataron
  lexicon: contar
  rationale: «Contaron» refleja un relato de hechos detallados, acorde con «everything that had happened to them».
- source_word: ኵሎ፡ ዘከመ፡ ረከቦሙ
  english_pob_choice: everything that had happened to them
  chosen_spanish: todo lo que les había sucedido
  alternatives_spanish:
  - todo lo que les había pasado
  - todo cuanto les había sucedido
  lexicon: suceder
  rationale: La construcción es amplia y narrativa; «les había sucedido» mantiene el sentido de acontecimientos acaecidos sin añadir interpretación.
- source_word: ወአፎ
  english_pob_choice: and how
  chosen_spanish: y cómo
  alternatives_spanish:
  - y de qué manera
  - y que
  lexicon: cómo
  rationale: La revisión auditada indica que el término significa «how», no solo una simple conjunción. «Y cómo» preserva la relación explicativa.
- source_word: መኰንነ፡ ብሔር
  english_pob_choice: the ruler of the land
  chosen_spanish: el gobernante de la tierra
  alternatives_spanish:
  - el príncipe de la tierra
  - el jefe de la región
  lexicon: gobernante
  rationale: «Gobernante» captura el rango de autoridad sin introducir un título moderno demasiado específico; «de la tierra» mantiene el genitivo del original.
- source_word: ዐጹባጺበ፡
  english_pob_choice: had spoken harshly
  chosen_spanish: les había hablado con dureza
  alternatives_spanish:
  - les había hablado ásperamente
  - les había tratado con dureza
  lexicon: dureza
  rationale: La expresión transmite la severidad del habla sin exagerar ni suavizar el tono.
- source_word: አሐዘ፡ ለስምዖን
  english_pob_choice: had seized Simeon
  chosen_spanish: había apresado a Simeón
  alternatives_spanish:
  - había detenido a Simeón
  - había tomado a Simeón
  lexicon: apresar
  rationale: «Apresar» conserva la fuerza de captura o detención coercitiva, acorde con el contexto narrativo.
- source_word: እስከ፡ ሶበ፡
  english_pob_choice: until...
  chosen_spanish: hasta...
  alternatives_spanish:
  - hasta entonces
  - hasta que
  lexicon: hasta
  rationale: La sintaxis queda abierta porque la frase continúa en el siguiente versículo; «hasta...» refleja mejor la interrupción textual que cerrar artificialmente la cláusula.
theological_decisions:
- issue: Nominal restraint in the narrative title for the Egyptian authority
  english_pob_reading: the ruler of the land
  chosen_spanish_reading: el gobernante de la tierra
  alternative_spanish_readings:
  - el señor de la tierra
  - el príncipe de la tierra
  rationale: No se introduce un título interpretativo adicional; se mantiene una designación funcional acorde con el relato y con la cautela del texto fuente.
  doctrine_reference: Narrative fidelity / lexical restraint
- issue: Open-ended clause at verse boundary
  english_pob_reading: until...
  chosen_spanish_reading: hasta...
  alternative_spanish_readings:
  - hasta entonces
  - hasta que
  rationale: La fuente ge'ez enlaza con la continuación del siguiente versículo; cerrar la frase en español añadiría una conclusión inexistente en esta unidad textual.
  doctrine_reference: Syntax and verse-boundary continuity
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada dos veces: primero para completar la frase final como «until then», y luego para corregirla a una estructura abierta («until...») por razones sintácticas. La traducción española sigue la lectura más reciente y la sintaxis abierta del ge''ez, sin cerrar artificialmente la cláusula final.'
  spanish_consistency_notes:
  - Se mantiene «Canaán» con tilde, de uso estándar en español.
  - Se conserva el nombre propio «Simeón» según la forma habitual en español bíblico.
  - No se usa «SEÑOR» para la autoridad egipcia; el texto distingue claramente entre un gobernante humano y el nombre divino.
  - La puntuación con puntos suspensivos refleja que el segmento continúa en el versículo siguiente.
