  text: And the famine became very severe in the land of Canaan, and Jacob heard that there was grain in Egypt, and he sent ten of his sons to get grain for him from Egypt. But Benjamin he did not send. And the ten sons of Jacob arrived in Egypt with those who were traveling.
  revision_pass:
