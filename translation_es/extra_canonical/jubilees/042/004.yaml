    timestamp: '2026-04-23T14:52:35Z'
    unchanged: false
    changes_summary: Replaced 'food' with 'grain' for better lexical accuracy and consistency with the source term; otherwise retained the draft.
translation:
  language: es
  text: Y el hambre se agravó mucho en la tierra de Canaán, y Jacob oyó que había grano en Egipto, y envió a diez de sus hijos para que consiguieran grano para él en Egipto. Pero a Benjamín no lo envió. Y los diez hijos de Jacob llegaron a Egipto con los que viajaban.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ረኃብ
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez
  - carestía
  lexicon: No aplica
  rationale: El ge'ez expresa una hambruna intensa; en español bíblico, 'hambre' comunica de forma natural la severidad del juicio sin introducir un tecnicismo innecesario. Añadí 'gran' para reflejar 'very severe' del contexto inglés y la fuerza del original.
- source_word: ሲሲተ
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - alimento
  - víveres
  lexicon: No aplica
  rationale: La revisión inglesa corrigió 'food' a 'grain' por fidelidad léxica; en español, 'grano' conserva esa precisión sin limitarse a una especie concreta de cereal.
- source_word: ዐሠርተ ደቂ / ዐሠርቱ ደቂ
  english_pob_choice: ten sons
  chosen_spanish: sus diez hijos / los diez hijos de Jacob
  alternatives_spanish:
  - diez hijos
  - diez de sus hijos
  lexicon: No aplica
  rationale: '''Hijos'' reproduce el parentesco explícito. En la primera cláusula, ''sus diez hijos'' hace claro el referente de Jacob; en la última, ''los diez hijos de Jacob'' mantiene la referencia total del grupo al llegar a Egipto.'
- source_word: በጽሑ ግብጸ
  english_pob_choice: arrived in Egypt
  chosen_spanish: llegaron a Egipto
  alternatives_spanish:
  - arribaron a Egipto
  - entraron en Egipto
  lexicon: No aplica
  rationale: '''Llegaron'' es la forma más natural y fiel para el simple dato narrativo de arribo.'
- source_word: ዘየሐውር
  english_pob_choice: those who were traveling
  chosen_spanish: los que iban de viaje
  alternatives_spanish:
  - los viajeros
  - los que viajaban
  lexicon: No aplica
  rationale: La frase ge'ez describe acompañantes en tránsito. 'Los que iban de viaje' mantiene el carácter descriptivo sin convertirlo en un sustantivo más interpretativo.
theological_decisions:
- issue: Designación del lugar sagrado-político Egipto/Canaán sin añadir implicación teológica
  english_pob_reading: plain narrative geographical reference
  chosen_spanish_reading: referencia geográfica narrativa simple
  alternative_spanish_readings:
  - referencia tipológica
  - lectura providencial explícita
  rationale: El verso solo narra la hambruna y el envío de los hijos; no introduce comentario doctrinal. La traducción conserva ese nivel narrativo.
  doctrine_reference: Narrativa histórica simple; no hay afirmación doctrinal añadida.
translation_notes:
  revision_awareness: La base inglesa fue revisada de 'food' a 'grain'; la traducción española sigue esa revisión con 'grano'. No se detectan otras variantes textuales o decisiones léxicas documentadas que requieran nota.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' en vez de 'Santiago' por fidelidad al nombre patriarcal del texto fuente.
  - '''Egipto'' y ''Canaán'' se conservan como topónimos estándar.'
  - El registro es formal y bíblico, pero en español actual natural, sin calcos excesivos.
