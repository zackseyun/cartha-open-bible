translation:
  language: es
  text: Lo puso en sus sacos, y no lo supieron. Y él les mandó que trajeran a su hermano menor, porque le habían dicho que su padre estaba vivo y que también su hermano menor estaba vivo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውስተ፡ አሕስሊሆሙ፡
  english_pob_choice: into their sacks
  chosen_spanish: en sus sacos
  alternatives_spanish:
  - en sus costales
  - dentro de sus sacos
  lexicon: N/A
  rationale: El ge'ez expresa ubicación/entrada en los sacos; "en sus sacos" reproduce de forma natural la relación espacial sin añadir precisión innecesaria. "Costales" sería posible, pero "sacos" conserva mejor la correspondencia directa con el texto base y el registro bíblico.
- source_word: ወኢያእመሩ።
  english_pob_choice: and they did not know it
  chosen_spanish: y no lo supieron
  alternatives_spanish:
  - y no se dieron cuenta
  - y no lo supieron
  lexicon: N/A
  rationale: La negativa indica ignorancia/percepción no advertida. "No lo supieron" mantiene la sencillez del inglés POB y del sentido original; "no se dieron cuenta" es una alternativa idiomática válida, pero menos cercana al enunciado textual.
- source_word: ወአዘዞሙ፡
  english_pob_choice: And he commanded them
  chosen_spanish: Y él les mandó
  alternatives_spanish:
  - Y él les ordenó
  - Y les dio la orden
  lexicon: N/A
  rationale: El verbo transmite mandato/autorización con autoridad. "Mandó" es una buena equivalencia bíblica y natural en español; "ordenó" también es posible, pero "mandó" evita una rigidez mayor sin perder fuerza.
- source_word: ከመ፡ ያምጽኡ፡ እኅዋሆሙ፡ ዘይ
  english_pob_choice: to bring their youngest brother
  chosen_spanish: que trajeran a su hermano menor
  alternatives_spanish:
  - que llevaran a su hermano menor
  - que presentaran a su hermano menor
  lexicon: N/A
  rationale: El mandato subordinado pide que lo traigan de vuelta/presenten ante él. "Trajeran" es natural y fiel al valor de movimiento hacia el hablante/mandante en español bíblico.
- source_word: እኅዋሆሙ
  english_pob_choice: their brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano
  - a su hermano pequeño
  lexicon: N/A
  rationale: El contexto inmediato exige especificarlo como "menor"; el posesivo singular de hermano se conserva con la referencia familiar plural de los sujetos. "Hermano pequeño" sería menos preciso que "menor" en registro bíblico.
- source_word: ዘይ
  english_pob_choice: because they had told him that their father was alive and their youngest brother also
  chosen_spanish: porque le habían dicho que su padre estaba vivo, y también su hermano menor
  alternatives_spanish:
  - porque le habían dicho que su padre vivía, y también su hermano menor
  - porque le habían dicho que su padre estaba vivo y que también existía su hermano menor
  lexicon: N/A
  rationale: La causalidad está explícita en la secuencia. "Estaba vivo" traduce bien la afirmación sobre el padre; "también su hermano menor" conserva la coordinación final del original y la economía del inglés POB sin sobreexplicar.
theological_decisions:
- issue: Referencia familiar y preservación del sentido narrativo sin atenuar la autoridad del mandato
  english_pob_reading: And he commanded them to bring their youngest brother, because they had told him that their father was alive and their youngest brother also.
  chosen_spanish_reading: Y él les mandó que trajeran a su hermano menor, porque le habían dicho que su padre estaba vivo, y también su hermano menor.
  alternative_spanish_readings:
  - Y él les ordenó que trajeran a su hermano menor, porque le habían dicho que su padre estaba vivo y que también tenían un hermano menor.
  - Y él les mandó traer a su hermano menor, porque le habían dicho que su padre estaba vivo y también su hermano menor.
  rationale: 'No hay una cuestión doctrinal fuerte, pero sí una decisión narrativa: conservar el mandato con suficiente autoridad y dejar intacta la información familiar que motiva la orden. Se evita suavizar el lenguaje o sustituirlo por una paráfrasis interpretativa.'
  doctrine_reference: N/A
