translation:
  language: es
  text: Y los puso bajo custodia. Y después de eso los soltó, y retuvo a Simeón aparte, y a los nueve[a] [los envió].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y a los nueve'.
    reason: rendering_history_due_to_truncated_source
lexical_decisions:
- source_word: ወንጸዎሙ / put them in custody
  english_pob_choice: And he put them in custody
  chosen_spanish: Y los puso bajo custodia
  alternatives_spanish:
  - Y los encarceló
  - Y los dejó presos
  - Y los puso en custodia
  lexicon: custodia
  rationale: La idea es de detención o retención bajo vigilancia, no necesariamente de prisión formal. 'Bajo custodia' conserva ese matiz y suena natural en español contemporáneo.
- source_word: ፈትሖሙ / released them
  english_pob_choice: he released them
  chosen_spanish: los soltó
  alternatives_spanish:
  - los liberó
  - los dejó ir
  lexicon: soltar
  rationale: El verbo español más directo para la acción física/jurídica de dejarlos ir es 'soltar'; evita una carga interpretativa más fuerte que 'liberar'.
- source_word: ስምዖንን፡ ባሕቲተ / Simeon alone
  english_pob_choice: kept Simeon alone
  chosen_spanish: dejó a Simeón solo
  alternatives_spanish:
  - retuvo solo a Simeón
  - mantuvo a Simeón aparte
  lexicon: solo/aparte
  rationale: '''Solo'' reproduce la separación explícita del texto sin añadir una connotación emocional. ''Dejó'' sigue de cerca la secuencia del relato.'
- source_word: ወተስዐተ / and the nine
  english_pob_choice: and the nine [he sent away]
  chosen_spanish: y a los nueve[a] [los envió]
  alternatives_spanish:
  - y a los nueve [los mandó ir]
  - y a los nueve [los despachó]
  lexicon: nueve
  rationale: El número se conserva literalmente como grupo restante. La edición inglesa advierte que el verbo final está implícito por segmentación; en español se mantiene la misma solución editorial entre corchetes.
theological_decisions:
- issue: Detención y liberación de los hermanos
  english_pob_reading: And he put them in custody. And after that he released them
  chosen_spanish_reading: Y los puso bajo custodia. Y después de eso los soltó
  alternative_spanish_readings:
  - Y los encarceló. Y después de eso los liberó
  - Y los retuvo. Y después de eso los dejó ir
  rationale: No hay carga doctrinal especial aquí; la decisión es principalmente lexical y narrativa. 'Bajo custodia' y 'soltó' preservan la secuencia de detención y liberación sin exagerar la forma de la detención.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió '[he sent away]' para resolver el verbo final ausente por una segmentación defectuosa. La versión española sigue esa decisión editorial con el mismo tipo de inserción entre corchetes, sin intentar reconstruir más allá de lo justificado por el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene 'Simeón' con acento en la forma española estándar.
  - Se evita 'SEÑOR' u otra sustitución no pertinente; el versículo no contiene el nombre divino.
  - Se usa una solución editorial transparente para el segmento truncado, coherente con el audit trail inglés.
