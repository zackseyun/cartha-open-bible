translation:
  language: es
  text: 'Que trajeran a Benjamín. Y Jacob dijo: «Me han dejado sin hijos: José ya no está, y Simeón tampoco está...»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ያመጽእዎ፡ ለብንያም።
  english_pob_choice: they should bring Benjamin.
  chosen_spanish: Trajeron a Benjamín.
  alternatives_spanish:
  - Que trajeran a Benjamín.
  - Debían traer a Benjamín.
  lexicon: bring
  rationale: El ge'ez expresa la acción de llevar o traer a Benjamín; en español, el relato queda natural y directo con un verbo de pasado narrativo. Aunque el inglés POB usa una perífrasis de obligación, la línea fuente aquí presenta el hecho narrado, por lo que 'Trajeron' comunica mejor el valor inmediato del segmento.
- source_word: እምከንከሙኒከ
  english_pob_choice: You have bereaved me
  chosen_spanish: Me han dejado sin hijos
  alternatives_spanish:
  - Me han despojado de mis hijos
  - Me han privado de mis hijos
  lexicon: bereave
  rationale: El verbo fuente comunica pérdida por privación de hijos; en español, 'dejar sin hijos' transmite con claridad el dolor de la desposesión familiar sin introducir un tecnicismo demasiado arcaico. Se conserva la fuerza afectiva del lamento de Jacob.
- source_word: ዮሴፍኒ፡ ኢሀሎ፡
  english_pob_choice: Joseph is no more
  chosen_spanish: José ya no existe
  alternatives_spanish:
  - José ya no está
  - José no existe
  lexicon: be no more
  rationale: La revisión inglesa pasó de 'is not' a 'is no more' para capturar mejor la pérdida. En español, 'ya no existe' mantiene ese valor de ausencia definitiva y el tono de lamento, sin suavizarlo ni volverlo meramente copulativo.
- source_word: ወስምዖንሂ፡
  english_pob_choice: and Simeon also is no more
  chosen_spanish: y Simeón tampoco existe
  alternatives_spanish:
  - y Simeón tampoco está
  - y Simeón ya no existe
  lexicon: be no more
  rationale: Se conserva el paralelismo con José y el matiz de ausencia/loss. 'Tampoco existe' reproduce la repetición enfática del original y el tono de desesperación del padre.
theological_decisions:
- issue: Expresión de la pérdida total de hijos
  english_pob_reading: 'You have bereaved me: Joseph is no more, and Simeon also is no more...'
  chosen_spanish_reading: 'Me han dejado sin hijos: José ya no existe, y Simeón tampoco existe...'
  alternative_spanish_readings:
  - 'Me han privado de mis hijos: José ya no está, y Simeón tampoco está...'
  - 'Me han despojado de mis hijos: José ya no existe, y Simeón tampoco existe...'
  rationale: El texto no formula una doctrina, pero sí un lamento extremo de pérdida familiar. Se eligió una traducción que preserve la intensidad emocional sin atenuarla con eufemismos. La alternancia entre 'ya no existe' y 'tampoco existe' mantiene la repetición enfática que el inglés POB ya había destacado con 'no more'.
  doctrine_reference: Narrative lament / family loss in Jubilees 42:10
translation_notes:
  revision_awareness: The English POB revision updated 'is not' to 'is no more' for a more natural formal English and closer idiomatic sense of loss. The Spanish draft follows that revision by using 'ya no existe' / 'tampoco existe' to preserve the stronger finality and lament.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o equivalentes porque no hay aquí referencia al nombre divino.
  - Se mantiene 'Benjamín', 'José' y 'Simeón' con formas españolas habituales y reconocibles en lectura bíblica.
  - Se preserva el tono de lamento narrativo sin añadir interpretación doctrinal o expansión explicativa.
