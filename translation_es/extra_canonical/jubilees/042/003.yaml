    changes_summary: Changed 'first years' to 'former years' for more natural and accurate sense, and changed 'silver' to 'gold' to match በወርቅ.
translation:
  language: es
  text: Durante los siete años de abundancia lo había guardado. Y los egipcios vinieron a José para que les diera alimento, y él abrió los almacenes donde estaba el grano de los años anteriores, y lo vendió a los pueblos de la tierra por oro.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በ፯ሰብዓቱ፡ ዓመት፡ ዘሠምር፡ ወዐቀቦ
  english_pob_choice: in the seven years of abundance and had kept it
  chosen_spanish: en los siete años de abundancia, y lo había guardado
  alternatives_spanish:
  - en los siete años de abundancia, y lo conservó
  - durante los siete años de abundancia, y lo había preservado
  lexicon: abundance / keep
  rationale: ‘Abundancia’ reproduce the harvest context; ‘lo había guardado’ preserves the perfective sense of having stored it up without over-explaining.
- source_word: ግብጽ
  english_pob_choice: the Egyptians
  chosen_spanish: los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: Egypt / Egyptians
  rationale: The Ge'ez plural verb and object suffix support a plural subject, so Spanish likewise uses the people rather than the land-name.
- source_word: የሀቦሙ፡ ሲሲተ
  english_pob_choice: that he might give them food
  chosen_spanish: para que les diera alimento
  alternatives_spanish:
  - para que les diera comida
  - para darles alimento
  lexicon: give food
  rationale: ‘Alimento’ is dignified and broad, while keeping the intended act of provision.
- source_word: ከሠተ፡ መዛግብተ
  english_pob_choice: he opened the storehouses
  chosen_spanish: abrió los graneros
  alternatives_spanish:
  - abrió los almacenes
  - abrió los depósitos
  lexicon: storehouses
  rationale: ‘Graneros’ is the most natural Spanish equivalent for storage buildings for grain in this context.
- source_word: ዘቀዳሚ፡ ዓመት
  english_pob_choice: of the former years
  chosen_spanish: de los años anteriores
  alternatives_spanish:
  - de los años pasados
  - de los años previos
  lexicon: former years
  rationale: ‘Años anteriores’ preserves the temporal reference more naturally than a literal ‘primeros años’.
- source_word: በወርቅ
  english_pob_choice: for gold
  chosen_spanish: por oro
  alternatives_spanish:
  - a cambio de oro
  - por oro fino
  lexicon: gold
  rationale: The source specifies gold, and Spanish ‘por oro’ is direct and clear; it avoids importing ‘silver’ from an earlier discarded reading.
theological_decisions:
- issue: Reference to Joseph as provider within famine relief
  english_pob_reading: The Egyptians came to Joseph so that he might give them food
  chosen_spanish_reading: los egipcios vinieron a José para que les diera alimento
  alternative_spanish_readings:
  - los egipcios acudieron a José para que les diera alimento
  - los egipcios llegaron a José para que les diera alimento
  rationale: The verse presents Joseph as the human agent of provision; Spanish keeps the straightforward historical narration without adding theological interpretation.
  doctrine_reference: Providence and stewardship in narrative context
translation_notes:
  revision_awareness: This draft reflects the latest audit trail correction from ‘silver’ to ‘gold’ and the plural reading ‘the Egyptians came’; no prior footnote is needed for the resolved ‘Egypt/Egyptians’ ambiguity in this span.
  spanish_consistency_notes:
  - Usé ‘Yahvé’ solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Mantengo ‘José’ y ‘los egipcios’ consistentemente en un registro narrativo claro.
  - No empleé ‘Cristo’ ni terminología eclesiástica ajena al relato.
  - ‘Alimento’ y ‘graneros’ conservan el sentido de provisión y almacenamiento de grano sin sobrerrepresentar el texto.
