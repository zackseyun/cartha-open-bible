  yaml_path: translation/extra_canonical/jubilees/042/005.yaml
  text: And Joseph recognized them, but they did not recognize him. And he spoke harshly with them and said to them, “Are you not spies, and have you come to observe the exposed parts of the land?”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:36Z'
    unchanged: false
    changes_summary: Removed the awkward and obscure phrase 'men of the eye,' which is not natural English here and is sufficiently conveyed by 'spies.' Also adjusted word order slightly to 'spoke harshly with them' for more natural formal English.
translation:
  language: es
  text: 'Y José los reconoció, pero ellos no lo reconocieron. Y les habló con dureza y les dijo: «¿Acaso no son espías, y han venido a observar las partes expuestas del país?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአእመሮሙ / recognized them
  english_pob_choice: recognized them
  chosen_spanish: los reconoció
  alternatives_spanish:
  - los identificó
  - los reconoció plenamente
  lexicon: reconocer
  rationale: El etíope expresa reconocimiento personal e identificativo; en español, «reconoció» transmite de forma natural que José supo quiénes eran, sin añadir matices no presentes.
- source_word: ኢያእመርዎ / did not recognize him
  english_pob_choice: did not recognize him
  chosen_spanish: no lo reconocieron
  alternatives_spanish:
  - no lo identificaron
  - no supieron quién era
  lexicon: reconocer
  rationale: 'Se conserva la reciprocidad del contraste: José sí los reconoce, ellos no a él. «Reconocer» mantiene el paralelismo y la claridad.'
- source_word: ዐጹባጺበ / harshly
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - ásperamente
  - con severidad
  lexicon: dureza
  rationale: La frase adverbial española «con dureza» es idiomática y preserva la fuerza del trato áspero sin sobreinterpretar el tono.
- source_word: አኮኑ፡ ሰብአ፡ ዓይን፡ / spies, men of the eye
  english_pob_choice: spies
  chosen_spanish: espías
  alternatives_spanish:
  - hombres del ojo
  - hombres de vista
  lexicon: espía
  rationale: Sigo la revisión auditada del inglés POB, que eliminó la expresión oscura «men of the eye» y la consideró suficientemente expresada por «spies». En español, «espías» comunica el sentido evidente y evita un calco incomprensible.
- source_word: ታስተሓይዪ፡ ጸባረ፡ ምድር፡ / observe the exposed parts of the land
  english_pob_choice: observe the exposed parts of the land
  chosen_spanish: observar las partes descubiertas de la tierra
  alternatives_spanish:
  - observar los lugares abiertos de la tierra
  - explorar las zonas expuestas de la tierra
  lexicon: observar / partes descubiertas
  rationale: «Partes descubiertas» refleja de manera bastante literal la imagen del texto fuente y coincide con la línea del inglés POB, que conserva la idea de áreas expuestas o vulnerables del territorio.
theological_decisions:
- issue: La acusación de espionaje como interpretación del reconocimiento de José
  english_pob_reading: Are you not spies, and have you come to observe the exposed parts of the land?
  chosen_spanish_reading: ¿No son espías, y han venido a observar las partes descubiertas de la tierra?
  alternative_spanish_readings:
  - ¿Acaso no son espías y han venido a observar las zonas expuestas de la tierra?
  - ¿No son espías y han venido a espiar las partes descubiertas de la tierra?
  rationale: El versículo presenta una acusación narrativa, no una evaluación doctrinal. Mantengo el carácter acusatorio directo sin suavizarlo ni expandirlo, y conservo la relación entre espionaje y reconocimiento del territorio.
  doctrine_reference: Narrative accusation; no special doctrinal issue.
translation_notes:
  revision_awareness: La revisión inglesa eliminó la frase oscura «men of the eye» por considerarla innecesaria e ininteligible en contexto, dejando solo «spies». La versión española sigue esa decisión y evita cualquier calco de esa expresión, manteniendo la lectura revisada del POB y la claridad del relato.
  spanish_consistency_notes:
  - Se usa «José» y no «Yosef» para mantener la forma bíblica castellana estándar y legible.
  - Se evita «SEÑOR» u այլ sustitución porque el versículo no contiene el tetragrámaton ni una cita divina.
  - «Partes descubiertas de la tierra» conserva la imagen espacial del original sin modernizarla a un sentido militar técnico excesivo.
  - No se introducen notas al pie porque no quedó una alternativa textual significativa que requiriera marcarse en el texto español.
