translation:
  language: es
  text: Él despidió a sus hermanos, y llenó sus costales de grano, y también les puso su dinero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፈነወ
  english_pob_choice: He sent away / He sent his brothers away
  chosen_spanish: despidió
  alternatives_spanish:
  - envió lejos
  - mandó despedidos
  lexicon: verbo de alejamiento/despido; no se inventa una acepción de envío documental no presente
  rationale: El ge'ez indica que los hermanos fueron enviados fuera/dejados ir; en español, «despidió» comunica bien la acción de hacerlos partir sin añadir matices ajenos. «Envió lejos» suena más pesado y menos natural.
- source_word: አሕስሊሆሙ፡ ስርናየ፡
  english_pob_choice: he filled their sacks with grain
  chosen_spanish: llenó sus costales de grano
  alternatives_spanish:
  - llenó sus sacos de grano
  - colmó sus costales de grano
  lexicon: frase nominal de contención; el texto habla de recipientes de provisión
  rationale: «Costales» es claro y bíblico en español para recipientes de carga/provisión; «sacos» es alternativa válida. «Llenó ... de grano» sigue de cerca el sentido del original sin forzar equivalencias técnicas.
- source_word: ወወርቆሙኒ
  english_pob_choice: their money
  chosen_spanish: su dinero
  alternatives_spanish:
  - su oro
  - su plata
  lexicon: sustantivo de valor/moneda; evitar armonización con el hebreo
  rationale: El audit trail aclara que el ge'ez no exige «plata»; el término puede referirse a dinero o metal valioso. «Su dinero» es la opción más amplia y fiel al dato revisado.
- source_word: ሎሙ
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - en favor de ellos
  lexicon: preposición dativa de beneficio
  rationale: El ge'ez significa «para ellos», no «en ellos». «Para ellos» conserva el dativo de beneficio y evita introducir una ubicación física no sustentada por el texto.
translation_notes:
  revision_awareness: La redacción sigue la revisión crítica que corrigió el valor de ወወርቆሙኒ a «money» y ሎሙ a «for them», evitando la armonización con el hebreo de Génesis y manteniendo la lectura propia del ge'ez de Jubileos.
  spanish_consistency_notes:
  - Se mantiene «grano» como término general de provisión, sin especificar cereal.
  - Se usa «dinero» por la amplitud semántica indicada por la revisión; no se estrecha a «plata».
  - El orden natural del español coloca primero la acción de despedir, luego el llenado de los costales y finalmente la mención del dinero.
