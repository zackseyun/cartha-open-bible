translation:
  language: es
  text: Y la lluvia fue retenida[a] sobre la tierra, porque no hubo chubasco que descendiera. Y la tierra quedó estéril, pero en la tierra de Egipto solamente hubo alimento, porque José había reunido semilla para la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'la lluvia se negó a darse'.
    reason: source_note
lexical_decisions:
- source_word: ወአበየ፡ ዝናም፡ ተውህቦ
  english_pob_choice: the rain was withheld / Lit. 'the rain refused to be given'
  chosen_spanish: la lluvia fue retenida
  alternatives_spanish:
  - la lluvia fue negada
  - la lluvia se negó a darse
  lexicon: lluvia; retener/retenerse
  rationale: La construcción ge'ez presenta una negación de concesión muy fuerte; en español, 'fue retenida' comunica bien el sentido pasivo de privación sin forzar una personificación extraña, mientras conserva la idea de que no se entregó la lluvia.
- source_word: ምትነ፡ ዘይወርድ
  english_pob_choice: shower that came down
  chosen_spanish: chubasco que descendiera
  alternatives_spanish:
  - aguacero que cayera
  - lluvia que viniera
  lexicon: chubasco; descender/bajar
  rationale: '''Chubasco'' refleja una lluvia breve e intensa y evita repetir ''lluvia''. ''Descendiera'' sigue de cerca el verbo de bajada del original y mantiene el matiz de movimiento desde lo alto.'
- source_word: ወዐብረተ፡ ምድር
  english_pob_choice: the land became barren
  chosen_spanish: la tierra quedó estéril
  alternatives_spanish:
  - la tierra se volvió estéril
  - la tierra se secó
  lexicon: estéril; quedar
  rationale: '''Estéril'' expresa bien la falta de fruto/producción. ''Quedó'' reproduce el resultado estado-consecutivo del texto sin añadir proceso no explicitado.'
- source_word: ሲሲተ፡
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - sustento
  lexicon: alimento
  rationale: '''Alimento'' es neutral y amplio, apto para un registro bíblico. Mantiene la idea de provisión sin precisar más de lo que el texto dice.'
- source_word: አስተጋብአ፡ ዮሴፍ፡ ዘርአ፡ ለምድር፡
  english_pob_choice: Joseph had gathered seed for the land
  chosen_spanish: José había reunido grano para la tierra
  alternatives_spanish:
  - José había juntado semilla para la tierra
  - José había almacenado grano para la tierra
  lexicon: reunir; grano/semilla; tierra
  rationale: El sustantivo ge'ez puede referirse a semilla/grano para siembra. 'Grano' funciona mejor en español aquí porque el contexto es la provisión agrícola previa a la escasez y evita la ambigüedad de 'semilla' como un término demasiado técnico o limitado.
theological_decisions:
- issue: Providencia en la escasez y preservación de Egipto
  english_pob_reading: In the land, famine-like barrenness came because rain was withheld, but Egypt had food because Joseph had gathered seed.
  chosen_spanish_reading: La falta de lluvia produce esterilidad general, mientras Egipto conserva alimento por la previsión de José.
  alternative_spanish_readings:
  - La tierra padeció hambre general, pero Egipto tuvo provisión.
  - La sequía afectó la tierra, pero Egipto quedó abastecido.
  rationale: El texto presenta un contraste providencial sin introducir explícitamente 'hambre' en la primera cláusula. La redacción elegida mantiene la tensión narrativa entre juicio/escasez y provisión preservada por medio de José.
  doctrine_reference: Providencia divina y preservación mediante medios humanos
- issue: Causalidad de la lluvia retenida
  english_pob_reading: the rain was withheld, because there was no shower that came down
  chosen_spanish_reading: la lluvia fue retenida, porque no hubo chubasco que descendiera
  alternative_spanish_readings:
  - la lluvia fue detenida, porque no cayó lluvia alguna
  - la lluvia se negó a darse, porque no descendió ningún chubasco
  rationale: Se conserva la explicación causal tal como aparece en el texto y se evita suavizar el giro idiomático del original. La segunda cláusula explica el estado de la primera sin convertirla en paráfrasis libre.
  doctrine_reference: Lenguaje descriptivo narrativo, sin alegorización
translation_notes:
  revision_awareness: Se incorporó la conjunción inicial 'Y' conforme a la revisión de gramática y se evitó reproducir la nota inglesa como alternativa casi idéntica. La formulación del primer miembro busca reflejar el giro ge'ez literal sin sobrecargar el español.
  spanish_consistency_notes:
  - Se usa 'Y' al inicio de la frase, en consonancia con el texto fuente y la revisión aplicada.
  - Se mantiene 'Yahvé' no aplicable aquí; no hay sustituciones terminológicas por tradición eclesiástica.
  - '''José'' se conserva como nombre propio estándar en español.'
  - Se evita 'SEÑOR' o lenguaje de sustitución no presente en el texto.
  - La nota [a] está anclada explícitamente en 'retenida' y ofrece la observación literal sin duplicar la idea principal.
