revisions:
- from: Y la lluvia fue retenida[a] de la tierra, porque no hubo chubasco que descendiera. Y la tierra quedó estéril, pero en la tierra de Egipto solamente hubo alimento, porque José había reunido grano para la tierra.
  to: Y la lluvia fue retenida[a] sobre la tierra, porque no hubo chubasco que descendiera. Y la tierra quedó estéril, pero en la tierra de Egipto solamente hubo alimento, porque José había reunido semilla para la tierra.
  rationale: Se mantiene la estructura y el sentido del borrador, pero se corrige 'grano' a 'semilla' para reflejar mejor ዘርአ y el POB inglés 'seed for the land'. También se mejora la naturalidad de 'retenida sobre la tierra' y se pule la nota literal al español idiomático sin perder el giro fuente.
