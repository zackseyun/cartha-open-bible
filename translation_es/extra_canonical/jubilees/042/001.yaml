lexical_decisions:
- source_word: “And in the first year of the third week of the forty-fifth jubilee”
  english_pob_choice: And in the first year of the third week of the forty-fifth jubilee
  chosen_spanish: Y en el primer año de la tercera semana del cuadragésimo quinto jubileo
  alternatives_spanish:
  - Y en el primer año de la tercera semana del quincuagésimo jubileo
  - Y en el primer año de la tercera semana del jubileo cuarenta y cinco
  lexicon: Temporal/calendrical phrase
  rationale: Mantengo la estructura técnica del cómputo jubilar sin suavizarla, porque el geʿez presenta una secuencia cronológica precisa y el inglés POB la conserva literalmente. 'Jubileo' es el equivalente natural y ya establecido; 'cuadragésimo quinto' preserva el ordinal sin perder el valor del conteo.
- source_word: “while the famine was coming into the land”
  english_pob_choice: while the famine was coming into the land
  chosen_spanish: mientras el hambre venía a la tierra
  alternatives_spanish:
  - mientras venía el hambre a la tierra
  - mientras la hambruna llegaba a la tierra
  lexicon: Calamity/famine phrase
  rationale: El geʿez indica una llegada/proceso en curso; 'venía a la tierra' conserva el imperfecto y la imagen de movimiento hacia la tierra. 'Hambruna' sería posible, pero 'hambre' refleja mejor la brevedad y el paralelismo sobrio del texto base, sin añadir una abstracción no necesaria.
theological_decisions:
- issue: Calendrical precision without doctrinal expansion
  english_pob_reading: A precise historical marker within Jubilees, with no added theological comment.
  chosen_spanish_reading: Marcador cronológico preciso, sin glosa interpretativa añadida.
  alternative_spanish_readings:
  - Fecha simbólica con explicación doctrinal
  - Cronología profética desarrollada
  rationale: El pasaje solo fija el tiempo narrativo. No introduzco ninguna lectura tipológica o doctrinal adicional que el verso no exige; la fidelidad exige mantener el dato cronológico en su función narrativa.
  doctrine_reference: Narrative chronology in Jubilees; no explicit doctrinal assertion in v. 1
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el acuerdo interrevisor fue alto; por ello el español sigue de cerca la formulación inglesa ya auditada, ajustada únicamente a la sintaxis natural del español.
  spanish_consistency_notes:
  - '''Jubileo'' se conserva como término técnico del libro.'
  - '''hambre'' se usa en sentido de calamidad de escasez, no de apetito.'
  - Se mantiene el orden solemne de la frase para reflejar la cronología original.
