translation:
  language: es
  text: Y esta es la tierra que le tocó a Cam, como la porción que debía poseer para siempre, para él y para sus hijos por todas sus generaciones para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: the land that came out
  english_pob_choice: the land that came out
  chosen_spanish: la tierra que salió
  alternatives_spanish:
  - la tierra que resultó
  - la tierra que salió asignada
  lexicon: —
  rationale: Mantiene la imagen de origen/surgimiento del texto inglés auditado sin añadir una glosa interpretativa más fuerte. En español, 'salió' conserva el movimiento del territorio 'que salió' para Cam.
- source_word: Ham
  english_pob_choice: Ham
  chosen_spanish: Cam
  alternatives_spanish:
  - Jam
  lexicon: —
  rationale: Se conserva el nombre bíblico tradicional en español, 'Cam', que corresponde al personaje del texto fuente y es el uso bíblico más reconocible en español.
- source_word: the portion which he was to occupy forever
  english_pob_choice: the portion which he was to occupy forever
  chosen_spanish: como la porción que él debía poseer para siempre
  alternatives_spanish:
  - como la porción que debía ocupar para siempre
  - como la porción destinada a su posesión para siempre
  lexicon: —
  rationale: '''Poseer'' expresa mejor la idea de herencia/tenencia permanente que ''ocupar'', evitando una lectura meramente física. ''Debía'' refleja la obligación o asignación implícita del inglés auditado sin exagerarla.'
- source_word: for himself and for his sons
  english_pob_choice: for himself and for his sons
  chosen_spanish: para él y para sus hijos
  alternatives_spanish:
  - para sí y para sus hijos
  - para él mismo y para sus hijos
  lexicon: —
  rationale: Reproduce la referencia personal y hereditaria de forma natural en español. 'Para él' mantiene la economía del original sin perder el sentido reflexivo heredado.
- source_word: throughout their generations forever
  english_pob_choice: throughout their generations forever
  chosen_spanish: por todas sus generaciones para siempre
  alternatives_spanish:
  - a través de todas sus generaciones para siempre
  - durante todas sus generaciones para siempre
  lexicon: —
  rationale: '''Por todas sus generaciones'' es la forma más natural y fiel para el alcance genealógico continuo del texto, y conserva el doble énfasis de permanencia con ''para siempre''.'
theological_decisions:
- issue: Permanencia de la posesión territorial
  english_pob_reading: the portion which he was to occupy forever ... throughout their generations forever
  chosen_spanish_reading: la porción que él debía poseer para siempre ... por todas sus generaciones para siempre
  alternative_spanish_readings:
  - la porción que debía ocupar para siempre
  - la porción que le correspondía para siempre
  rationale: El pasaje presenta una asignación territorial duradera con lenguaje de herencia y continuidad genealógica. 'Poseer' comunica mejor esa estabilidad que un verbo más neutral, sin borrar la tensión entre ocupación histórica y derecho permanente implícita en el texto.
  doctrine_reference: Herencia/posesión territorial en literatura bíblica antigua; permanencia genealógica
- issue: Nombre divino no aplicable aquí, pero preservación del tono genealógico-jurídico
  english_pob_reading: land ... portion ... sons ... generations ... forever
  chosen_spanish_reading: tierra ... porción ... hijos ... generaciones ... para siempre
  alternative_spanish_readings:
  - heredad ... descendientes ... para siempre
  rationale: Se mantiene el registro legal-genealógico del enunciado sin sustituirlo por términos eclesiales o devocionales que no están en el fuente. 'Hijos' conserva el enlace familiar explícito del texto.
  doctrine_reference: Lenguaje genealógico y de herencia en narrativas bíblicas
translation_notes:
  revision_awareness: La versión inglesa auditada recibió solo un ajuste estilístico menor de puntuación y fluidez, sin cambio de sentido. La traducción española sigue esa misma lectura estable y no requiere notas textuales ni variantes adicionales.
  spanish_consistency_notes:
  - Se conservó un registro sobrio y bíblico, evitando paraphrasear el valor jurídico de 'portion'.
  - No se introdujo ninguna terminología eclesiástica ajena al pasaje; el texto permanece en el campo semántico de tierra, porción, hijos y generaciones.
  - El doble 'para siempre' se mantuvo para reflejar la insistencia del original auditado en la permanencia.
