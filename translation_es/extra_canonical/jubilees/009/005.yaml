translation:
  language: es
  text: Y para Jafet salió la tercera porción, más allá del río Tina, hacia el norte de la desembocadura de sus aguas, y se extiende hacia el noreste hasta toda la región de Gog y hasta toda la tierra al oriente de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: third portion
  english_pob_choice: the third portion
  chosen_spanish: la tercera porción
  alternatives_spanish:
  - la tercera parte
  - la tercera asignación
  - la tercera lotería
  lexicon: porción
  rationale: «Porción» conserva la idea de una repartición territorial sin introducir un término más interpretativo. «Parte» sería posible, pero «porción» mantiene mejor el matiz de distribución hereditaria o asignada.
- source_word: beyond the river Tina
  english_pob_choice: beyond the river Tina
  chosen_spanish: más allá del río Tina
  alternatives_spanish:
  - al otro lado del río Tina
  - del lado opuesto del río Tina
  lexicon: más allá
  rationale: «Más allá» reproduce la relación espacial amplia del inglés sin precisar un lado cardinal no explicitado por el texto.
- source_word: toward the north of the outflow of its waters
  english_pob_choice: toward the north of the outflow of its waters
  chosen_spanish: hacia el norte de la desembocadura de sus aguas
  alternatives_spanish:
  - al norte de la salida de sus aguas
  - hacia el norte del desagüe de sus aguas
  lexicon: desembocadura
  rationale: «Desembocadura» comunica de manera natural la idea de un punto donde las aguas salen o desembocan; «salida» sería más literal pero menos idiomática en español bíblico contemporáneo.
- source_word: extends northeastward
  english_pob_choice: it extends northeastward
  chosen_spanish: se extiende hacia el noreste
  alternatives_spanish:
  - se prolonga al noreste
  - se extiende norteste
  lexicon: se extiende
  rationale: «Se extiende hacia el noreste» conserva el movimiento direccional sin forzar una construcción adverbial poco natural en español.
- source_word: the whole region of Gog
  english_pob_choice: the whole region of Gog
  chosen_spanish: toda la región de Gog
  alternatives_spanish:
  - todo el territorio de Gog
  - la entera región de Gog
  lexicon: región
  rationale: «Región» mantiene el carácter geográfico amplio del segmento y evita intensificar indebidamente el alcance.
- source_word: all the country east of it
  english_pob_choice: all the country east of it
  chosen_spanish: toda la tierra al oriente de ella
  alternatives_spanish:
  - todo el país al oriente de ella
  - toda la región al este de ella
  lexicon: oriente
  rationale: «Oriente» sigue el registro bíblico y geográfico tradicional sin recurrir a «este» en un contexto que suena más cartográfico moderno. «Tierra» preserva la amplitud territorial del inglés.
theological_decisions:
- issue: How to render the territorial allocation language for Japheth
  english_pob_reading: And for Japheth came out the third portion...
  chosen_spanish_reading: Y para Jafet salió la tercera porción...
  alternative_spanish_readings:
  - Y a Jafet le correspondió la tercera porción...
  - Y para Jafet se asignó la tercera porción...
  rationale: El inglés POB mantiene una formulación de reparto que suena casi oracular y evita explicitar un agente. «Salió» reproduce esa pasividad idiomática y el carácter de suerte/lotación sin añadir un sujeto no presente.
  doctrine_reference: Narrative territorial allotment; no doctrinal claim beyond the text.
- issue: Directional and geographic precision without over-specifying the map
  english_pob_reading: toward the north of the outflow of its waters... northeastward...
  chosen_spanish_reading: hacia el norte de la desembocadura de sus aguas... hacia el noreste...
  alternative_spanish_readings:
  - al norte de la salida de sus aguas... al nordeste...
  rationale: Se conserva la secuencia direccional del texto fuente y de la traducción inglesa auditada, evitando imponer una identificación geográfica moderna que no está en el verso.
  doctrine_reference: Geographic description; no doctrinal issue.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que eliminó un «there» innecesario y mantuvo intactas las cláusulas geográficas. En español no se introduce ningún equivalente innecesario y se conserva el encadenamiento espacial del verso.
  spanish_consistency_notes:
  - Se mantiene «Jafet» para el nombre propio, en consonancia con uso bíblico en español.
  - Se usa «oriente» para conservar un registro bíblico sobrio y coherente con la cartografía textual del pasaje.
  - No se añaden notas textuales porque el paquete fuente no contiene variantes ni aparato crítico para este versículo.
