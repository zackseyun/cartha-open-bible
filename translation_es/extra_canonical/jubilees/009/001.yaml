  source_alignment_summary: 'El borrador español sigue bien la revisión inglesa auditada: mantiene a Sem en la primera cláusula, incluye correctamente a Madai en la segunda, preserva la posesión territorial, las islas y las fronteras, y refleja la corrección clave de «sus dos hermanos». La nota de fragmentariedad también corresponde al rastro de auditoría. Sin embargo, «hasta donde llega al centro del mar» debilita el matiz de acercamiento de እስከ ይቀርብ መንገለ ባሕረ ሜአት, mejor representado por «hasta donde se acerca al centro del mar» o equivalente. Además, en español «desde el occidente de sus dos hermanos» suena algo torpe para un reparto geográfico; «al occidente de sus dos hermanos» preserva mejor la relación espacial indicada por la revisión inglesa.'
