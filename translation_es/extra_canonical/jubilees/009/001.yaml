  to: Y para el sur salió su porción[a], para Sem, hasta donde se acerca al centro del mar. Y para Madai salió una porción, para que poseyera al occidente de sus dos hermanos, hasta las islas y hasta sus fronteras.
  rationale: 'Se ajustan dos expresiones para reflejar mejor el matiz del ge''ez y mejorar la naturalidad del español: «se acerca» preserva la idea de aproximación al centro del mar, y «al occidente de sus dos hermanos» expresa con mayor claridad la ubicación territorial de Madai. No se requieren cambios en la nota ni en la terminología principal.'
