base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/009/001.yaml
  text: And for the south there came out his portion[1], for Shem, as far as it approaches the middle of the sea. And for Madai there came out a portion, that he should possess from the west of his two brothers, as far as the islands and as far as their borders.
  footnotes:
  - marker: '1'
    text: The opening land-allotment section is fragmentary in the supplied chapter rows. The English for vv. 1-8 follows the chapter's evident sequence of the divisions among Shem, Ham, and Japheth, but some place-names and boundaries remain textually uncertain.
    reason: segmentation_note
  - marker: a
    text: Or 'seize from the west for the possession of his brothers'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:55Z'
    unchanged: false
    changes_summary: Replaced the draft, which introduced material not in the source (Ham, second lot, Gihon, Garden) and omitted Madai and the western/islands/borders elements. Revised to reflect the Geez more fully and accurately, using 'portion' for መክፈልት and preserving the verse's formal register.
translation:
  language: es
  text: Y para el sur salió su porción[a], para Sem, hasta donde se acerca al centro del mar. Y para Madai salió una porción, para que poseyera al occidente de sus dos hermanos, hasta las islas y hasta sus fronteras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La sección inicial de reparto territorial es fragmentaria en las líneas del capítulo suministradas; por eso la traducción sigue la secuencia evidente de las divisiones, aunque algunos nombres de lugares y límites siguen siendo textualmente inciertos.
    reason: source_note
lexical_decisions:
- source_word: መክፈልት
  english_pob_choice: portion
  chosen_spanish: porción
  alternatives_spanish:
  - lote
  - parte
  - heredad
  lexicon: —
  rationale: El texto habla de una asignación territorial; «porción» conserva la idea de reparto sin introducir un tecnicismo más cargado que el ge'ez no exige aquí.
- source_word: ውሳጥያቲሁ ለደቡብ
  english_pob_choice: for the south
  chosen_spanish: para el sur
  alternatives_spanish:
  - hacia el sur
  - en el sur
  lexicon: —
  rationale: La construcción indica la dirección o región del reparto; «para el sur» reproduce de manera natural la función distributiva del original.
- source_word: እስከ ይቀርብ መንገለ ባሕረ ሜአት
  english_pob_choice: as far as it approaches the middle of the sea
  chosen_spanish: hasta donde llega al centro del mar
  alternatives_spanish:
  - hasta que se acerca al medio del mar
  - hasta el punto donde toca el centro del mar
  lexicon: —
  rationale: «Llega al centro del mar» expresa con claridad el sentido espacial de acercamiento/llegada sin sobrecargar el español con un calco torpe de «se aproxima».
- source_word: ለክአኢሆሙ አኅዊሁ
  english_pob_choice: from the west of his two brothers
  chosen_spanish: desde el occidente de sus dos hermanos
  alternatives_spanish:
  - al occidente de sus dos hermanos
  - desde el oeste de sus dos hermanos
  lexicon: —
  rationale: «Occidente» conserva un registro bíblico digno; «sus dos hermanos» sigue la revisión textual que corrige la lectura previa y refleja el valor de «kǝʾe» como ‘dos’.
- source_word: የአኅዝ
  english_pob_choice: possess
  chosen_spanish: poseyera
  alternatives_spanish:
  - tomara posesión de
  - poseyese
  lexicon: —
  rationale: En un contexto de reparto de tierras, «poseyera» mantiene la idea de tenencia hereditaria mejor que «seizara», que sería demasiado fuerte en español.
- source_word: ደስያት ወጽነፊሆን
  english_pob_choice: as far as the islands and as far as their borders
  chosen_spanish: hasta las islas y hasta sus fronteras
  alternatives_spanish:
  - hasta las islas y hasta sus límites
  - hasta las islas y hasta sus confines
  lexicon: —
  rationale: «Fronteras» conserva la referencia espacial concreta del texto; «confines» o «límites» son posibles, pero menos directos para un lector actual.
theological_decisions:
- issue: Terminología de reparto territorial sin introducir lectura eclesial posterior
  english_pob_reading: portion / possess / borders
  chosen_spanish_reading: porción / poseyera / fronteras
  alternative_spanish_readings:
  - lote / heredara / confines
  - heredad / tomara posesión / límites
  rationale: El pasaje describe asignaciones de territorio entre linajes; la formulación elegida mantiene ese marco histórico sin trasladarlo a vocabulario litúrgico o confesional ajeno al texto.
  doctrine_reference: N/A
- issue: Preservación de la incertidumbre textual indicada por la tradición auditada
  english_pob_reading: some place-names and boundaries remain textually uncertain
  chosen_spanish_reading: centro del mar / occidente / islas / fronteras
  alternative_spanish_readings:
  - medio del mar / oeste / costas / confines
  rationale: Aunque el verso es fragmentario y algunas coordenadas siguen inciertas, la traducción evita expandir el texto y conserva los hitos espaciales que sí están atestiguados.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrigió una inserción errónea de Ham, el segundo lote, Gihón y el jardín, y que restableció a Madai con el occidente, las islas y las fronteras. También se tuvo en cuenta la corrección de 'sus dos hermanos' frente a una lectura anterior defectuosa.
  spanish_consistency_notes:
  - Se mantiene «porción» de manera consistente para መክፈልት.
  - Se usa «poseyera» para el valor de tenencia territorial, no «seizara».
  - «Occidente» se eligió por registro bíblico y cohesión con «sur» y «fronteras».
  - Se evita traducir «mar» como un término técnico distinto, porque el contexto no obliga a ello.
