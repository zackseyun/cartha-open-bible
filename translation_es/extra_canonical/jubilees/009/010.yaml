revisions:
- from: 'Y dijo[10]: «Que una décima parte de ellos permanezca delante de él, y que nueve partes desciendan al lugar del juicio». Y dijo a uno de nosotros[a] que enseñáramos a Noé todos sus remedios, porque'
  to: 'Y dijo[10]: «Que una décima parte de ellos permanezca delante de él, y que nueve partes desciendan al lugar del juicio». Y le dijo a uno de nosotros que le enseñáramos a Noé todos sus remedios, porque'
  rationale: 'Se elimina la nota [a] porque conserva una alternativa que contradice la revisión fuente ya asentada. Se ajusta «Y dijo a uno de nosotros» a «Y le dijo a uno de nosotros» para español más natural sin cambiar el sentido: el hablante se dirige a uno del grupo para que enseñen a Noé sus remedios.'
