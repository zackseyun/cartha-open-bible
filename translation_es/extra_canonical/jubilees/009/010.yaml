translation:
  language: es
  text: 'Y dijo[10]: «Que una décima parte de ellos permanezca delante de él, y que nueve partes desciendan al lugar del juicio». Y le dijo a uno de nosotros que le enseñáramos a Noé todos sus remedios, porque'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '10'
    text: La expresión «que una décima parte de ellos permanezca» conserva la explicación distintiva del capítulo para la actividad demoníaca posterior al diluvio.
    reason: cross_reference
lexical_decisions:
- source_word: ይቤ / he said
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y habló
  - Y respondió
  lexicon: decir
  rationale: El ge'ez presenta un verbo de decir; el español natural y fiel es «dijo». Mantiene la continuidad narrativa sin añadir matices no presentes.
- source_word: ፈውሶሙ / their remedies
  english_pob_choice: all their remedies
  chosen_spanish: todos sus remedios
  alternatives_spanish:
  - todas sus curas
  - todos sus sanamientos
  lexicon: remedios
  rationale: La POB inglesa opta por 'remedies', preservando el sentido de medios de curación o tratamiento. «Remedios» comunica ese valor en español sin forzar una terminología médica moderna.
- source_word: እምኔነ / of us
  english_pob_choice: one of us
  chosen_spanish: uno de nosotros
  alternatives_spanish:
  - uno de los nuestros
  lexicon: uno de nosotros
  rationale: La revisión auditada muestra que el sujeto no es 'one of us' actuando por sí mismo, sino que se habla a uno del grupo. En español se conserva la relación preposicional con «a uno de nosotros».
theological_decisions:
- issue: Distribución de los demonios tras el diluvio
  english_pob_reading: let a tenth of them remain before him, and let nine parts descend into the place of judgment
  chosen_spanish_reading: Que una décima parte de ellos permanezca delante de él, y que nueve partes desciendan al lugar del juicio
  alternative_spanish_readings:
  - Que una décima parte de ellos quede delante de él, y nueve partes bajen al lugar del juicio
  - Que permanezca una décima parte de ellos ante él, y que nueve partes desciendan al lugar del juicio
  rationale: Se mantiene la imagen específica y la tensión doctrinal del texto de Jubileos sobre la actividad demoníaca posterior al diluvio. «Lugar del juicio» conserva la localización escatológica sin interpretarla.
  doctrine_reference: Jubilees 9:10; cross-reference note in English POB
- issue: Destino y destinatario de la enseñanza a Noé
  english_pob_reading: And he told one of us that we should teach Noah all their remedies
  chosen_spanish_reading: Y dijo a uno de nosotros que enseñáramos a Noé todos sus remedios
  alternative_spanish_readings:
  - Y ordenó a uno de nosotros que enseñáramos a Noé todos sus remedios
  - Y le dijo a uno de nosotros que enseñáramos a Noé todos sus remedios
  rationale: La corrección auditada exige conservar que el habla va dirigida a uno de los miembros del grupo celestial, no que ese miembro sea el sujeto principal. El subjuntivo plural «enseñáramos» refleja la idea de instrucción compartida en el grupo de 'nosotros'.
  doctrine_reference: Applied revision note from source audit
translation_notes:
  revision_awareness: 'Se corrigió la relación sintáctica señalada por la revisión auditada: el ge''ez indica «y a uno de nosotros dijo», no «y uno de nosotros dijo». Se conservó además la formulación distintiva sobre la décima parte y las nueve partes en el lugar del juicio.'
  spanish_consistency_notes:
  - Se usó «Y dijo» para el verbo de habla principal, en línea con el texto fuente.
  - Se mantuvo «remedios» como equivalente directo de la POB inglesa 'remedies'.
  - Se conservó «lugar del juicio» para no suavizar el marco escatológico del pasaje.
  - Los corchetes de nota aparecen exactamente en el texto donde se anclan las observaciones y no se han dejado notas sueltas.
