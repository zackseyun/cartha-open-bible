translation:
  language: es
  text: Y se extiende hasta todos los montes de fuego, y se extiende hacia el occidente hasta el mar de Atel, y se extiende hacia el occidente hasta que llega al mar de Mauk, ese mar en el que todo lo que desciende en él[a] no se destruye.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ese mar al que desciende todo lo que no es destruido».'
    reason: Preservar la alternativa histórica registrada en el inglés POB, que invierte la relación entre «desciende» y «no es destruido».
lexical_decisions:
- source_word: mountains of fire
  english_pob_choice: all the mountains of fire
  chosen_spanish: todos los montes de fuego
  alternatives_spanish:
  - todas las montañas de fuego
  - los montes ardientes
  lexicon: mountains
  rationale: «Montes» conserva el registro bíblico y geográfico; «de fuego» sigue de cerca el valor descriptivo del original y del inglés POB sin añadir interpretación.
- source_word: toward the west / westward
  english_pob_choice: toward the west ... westward
  chosen_spanish: hacia el occidente ... al occidente
  alternatives_spanish:
  - hacia el oeste ... al oeste
  - rumbo al occidente
  lexicon: west
  rationale: «Occidente» es un equivalente elevado y claro en español bíblico; se mantienen ambas ocurrencias para reflejar el paralelismo del original.
- source_word: sea of Atel / sea of Mauk
  english_pob_choice: the sea of Atel / the sea of Mauk
  chosen_spanish: el mar de Atel / el mar de Mauk
  alternatives_spanish:
  - el mar Atel / el mar Mauk
  lexicon: sea
  rationale: Se conserva la forma nominal con «mar de» para respetar los topónimos transmitidos por la tradición textual y evitar normalizarlos indebidamente.
- source_word: everything that descends is not destroyed
  english_pob_choice: that sea into which everything that descends is not destroyed
  chosen_spanish: ese mar en el que todo lo que desciende no es destruido
  alternatives_spanish:
  - ese mar en el que todo lo que baja no perece
  - ese mar al que desciende todo lo que no es destruido
  lexicon: not destroyed
  rationale: 'La revisión auditada corrige la inversión del sentido: la negación califica a «es destruido», no a «desciende». «No es destruido» preserva la forma pasiva y evita introducir un verbo no atestiguado.'
theological_decisions:
- issue: Persistencia del límite geográfico y del mar como lugar donde lo que desciende no perece
  english_pob_reading: that sea into which everything that descends is not destroyed
  chosen_spanish_reading: ese mar en el que todo lo que desciende no es destruido
  alternative_spanish_readings:
  - ese mar en el que todo lo que baja no perece
  - ese mar donde todo lo que entra no se destruye
  rationale: No hay razón para suavizar ni alegorizar la clausula; el texto presenta una afirmación extraordinaria sobre ese mar. La redacción española mantiene la afirmación tal como la revisión crítica la estableció.
  doctrine_reference: preservación del sentido literal del pasaje apocalíptico/geográfico
translation_notes:
  revision_awareness: 'La redacción corrige la inversión previamente detectada en el segmento final: la negación modifica ''es destruido'', no ''desciende''. Se evitó trasladar la antigua nota alternativa porque el error ya fue resuelto en el texto principal.'
  spanish_consistency_notes:
  - Se usa «occidente» de forma consistente para west/westward.
  - Se mantiene «mar de + nombre propio» para los topónimos.
  - Se evita «destruirse» para conservar la pasiva verbal del source review.
  - No se incluyen notas al pie porque la lectura textual está resuelta en la línea principal.
