  glossary_alignment: No hay términos del glosario principal en juego. «Montes», «occidente» y «mar de Atel/Mauk» son apropiados. La decisión clave es mantener la relación semántica de «everything that descends is not destroyed», mejor expresada en español como «todo lo que desciende en él no se destruye».
