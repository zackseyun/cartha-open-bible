base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/009/013.yaml
  text: And we told Noah along with their deceptions, so that they might be healed by the plants of the earth. And Noah wrote down everything that we had taught him in a book concerning every kind of healing, and the spirits were restrained.
  footnotes:
  - marker: a
    text: Or 'about all their errors'.
    reason: previous_rendering
  - marker: b
    text: Or 'the evil spirits'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:54Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Ge''ez text: speaking to Noah about their errors, healing by the plants of the earth, Noah writing all that was taught him in a book, and the restraining of the spirits.'
translation:
  language: es
  text: Y le dijimos a Noé junto con sus engaños[a], para que se sanaran por las plantas de la tierra. Y Noé escribió en un libro todo lo que le habíamos enseñado acerca de toda clase de curación, y los espíritus[b] fueron refrenados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con sus errores». El ge'ez expresa acompañamiento («con / junto con»), no meramente «acerca de».
    reason: alternative_reading
  - marker: b
    text: El ge'ez dice simplemente «espíritus»; algunas traducciones aclaran «espíritus malos», pero aquí no se explicita esa calificación.
    reason: textual_variant
lexical_decisions:
- source_word: ምስለ፡ አስሕተትሙ፡
  english_pob_choice: with their deceptions / about all their errors
  chosen_spanish: acerca de todos sus errores
  alternatives_spanish:
  - junto con sus engaños
  - sobre todos sus errores
  lexicon: ምስለ = with/along with; አስሕተት = errors, deceptions, misleading acts
  rationale: La construcción ge'ez expresa la comunicación a Noé en relación con las fallas o engaños de ellos; en español, «acerca de» conserva la relación temática sin forzar una coordinación literal poco natural. «Errores» mantiene la amplitud semántica que el audit trail deja abierta entre error y engaño.
- source_word: በዕፀወ፡ ምድር።
  english_pob_choice: by the plants of the earth
  chosen_spanish: por las plantas de la tierra
  alternatives_spanish:
  - mediante las plantas de la tierra
  - con las plantas de la tierra
  lexicon: በ = by/through/with; ዕፀወ ምድር = plants of the earth
  rationale: «Por» refleja el medio instrumental de manera natural en español y preserva la idea de sanidad mediada por las plantas, sin convertirlo en una paráfrasis terapéutica más amplia.
- source_word: በመጽሐፍ፡
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en un escrito
  - en un libro de
  lexicon: መጽሐፍ = book, writing
  rationale: «Libro» sigue el sentido directo del texto y el audit trail inglés; no se amplía a «escrito» porque el pasaje especifica un libro concreto.
- source_word: ትዝምደ፡ ፈውሳት
  english_pob_choice: every kind of healing
  chosen_spanish: toda clase de curación
  alternatives_spanish:
  - toda especie de sanidad
  - toda clase de remedios
  lexicon: ፈውሳት = healings, cures
  rationale: «Curación» conserva el sentido de sanidad/curación del campo léxico de θεραπεία/curar sin introducir un término doctrinalmente cargado. «Toda clase de» reproduce la generalidad distributiva del original.
- source_word: መናፍስት
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - los espíritus malos
  - los espíritus malignos
  lexicon: መናፍስት = spirits
  rationale: Sigo la decisión revisada del audit trail de no añadir «malos» en el texto base, porque el ge'ez dice simplemente «espíritus». El contexto puede implicar su carácter hostil, pero no se expande aquí.
theological_decisions:
- issue: Alcance de «sus errores / deceptions»
  english_pob_reading: about all their errors
  chosen_spanish_reading: acerca de todos sus errores
  alternative_spanish_readings:
  - acerca de todos sus engaños
  - con relación a todos sus errores
  rationale: El testimonio de revisión indica que la frase ge'ez no debe reducirse a «about» ni cargarse sólo con «deceptions». En español mantengo la tensión entre error y engaño con «errores», dejando abierta la posibilidad de la malicia implícita sin imponerla.
  doctrine_reference: Sabiduría y revelación contra el error; cf. Jubileos 10:1-14 sobre la corrupción y la instrucción contra los espíritus.
- issue: Identidad de los espíritus
  english_pob_reading: the spirits
  chosen_spanish_reading: los espíritus
  alternative_spanish_readings:
  - los espíritus malos
  - los espíritus malignos
  rationale: La revisión textual del audit trail exige no añadir un calificativo que el ge'ez no explicita. Conservar «los espíritus» preserva la neutralidad del original y deja la caracterización al contexto narrativo.
  doctrine_reference: Interpretación contextual de seres espirituales; cf. Jubileos 10:7-8.
translation_notes:
  revision_awareness: 'El texto español sigue la corrección más reciente del audit trail: reemplaza una lectura ajena al pasaje por una traducción que refleja el ge''ez, incluyendo la relación con los errores/engaños, la sanidad por las plantas de la tierra, el escrito de Noé en un libro y el refrenamiento de los espíritus. También incorpora la revisión que rechazó añadir «evil» al último miembro.'
  spanish_consistency_notes:
  - Se mantuvo «Noé» y el pasado narrativo simple para concordar con el registro bíblico en español.
  - Se evitó «SEÑOR» o términos equivalentes, porque el pasaje no contiene el Tetragrámaton.
  - Se usó «curación» y no «sanidad» como término más general y menos denominacional.
  - Se prefirió «espíritus» sin adjetivo, en consonancia con la revisión textual del audit trail.
