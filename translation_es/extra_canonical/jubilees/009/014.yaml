    rationale: No es imprescindible, pero la cláusula inicial parece elíptica en la fuente. Aun así, la reparación puede hacerse sin nota, porque no se introduce nueva ambigüedad en español.
  revised_spanish_text: Los límites de todo esto fueron para los hijos de Noé. Y entregó todo lo que había escrito a Sem, su hijo, porque lo amó en gran manera.
