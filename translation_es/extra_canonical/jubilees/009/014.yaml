base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/009/014.yaml
  text: And Noah slept with his fathers[14], and he was buried on Mount Lubar in the land of Ararat. Nine hundred and fifty years he completed in his life, nineteen jubilees and two weeks and five years. And in his life on earth he surpassed the sons of men, except Enoch, because of the righteousness in which he was perfect. For Enoch’s task was created as a testimony for the generations of the world, so that he should recount all the deeds of generation after generation until the day of judgment.
  footnotes:
  - marker: '14'
    text: '''Nineteen jubilees and two weeks and five years'' equals 950 years. The chapter intentionally preserves both the total and the jubilean reckoning.'
    reason: cultural_note
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:55Z'
    unchanged: true
    changes_summary: 'Replaced the unrelated draft with a translation matching the Ge''ez source: rendered the opening as the boundaries/allotments for the sons of Noah, and the second clause as Noah giving all that he had written to Shem his son because he loved him exceedingly. [TRUNCATION DETECTED — revision reverted]'
translation:
  language: es
  text: Los límites de todo esto fueron para los hijos de Noé. Y entregó todo lo que había escrito a Sem, su hijo, porque lo amó en gran manera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እኩያን፡ እምድኅሬሆሙ፡
  english_pob_choice: The boundaries of all these were
  chosen_spanish: Los límites de todas estas cosas fueron
  alternatives_spanish:
  - Los linderos de todas estas cosas fueron
  - Las fronteras de todas estas cosas fueron
  lexicon: límite; linderos; fronteras
  rationale: El Ge'ez presenta una idea de delimitación o reparto territorial; en español, «límites» conserva bien el sentido general sin forzar una imagen demasiado técnica. «Linderos» y «fronteras» son posibles, pero «límites» es más natural y suficientemente preciso.
- source_word: ለውሉደ፡ ኖኅ።
  english_pob_choice: for the sons of Noah
  chosen_spanish: para los hijos de Noé
  alternatives_spanish:
  - para los hijos de Noé
  - para los descendientes de Noé
  lexicon: hijos; descendientes
  rationale: La fórmula genealógica admite «hijos» o «descendientes». Se mantiene «hijos» porque preserva la correspondencia directa con el paralelismo genealógico y con el contexto narrativo.
- source_word: ወወሀበ፡ ኵሎ፡ ዘጸሐፈ፡
  english_pob_choice: And he gave all that he had written
  chosen_spanish: Y entregó todo lo que había escrito
  alternatives_spanish:
  - Y dio todo lo que había escrito
  - Y puso en manos de otro todo lo que había escrito
  lexicon: entregar; dar
  rationale: «Entregó» transmite mejor el acto deliberado de pasar escritos a otro destinatario que un simple «dio». Se mantiene «todo lo que había escrito» para no añadir contenido ajeno al texto.
- source_word: ለሴም፡ ወልዱ፡
  english_pob_choice: to Shem his son
  chosen_spanish: a Sem, su hijo
  alternatives_spanish:
  - a Sem, su hijo
  - a Sem, el hijo de él
  lexicon: Sem; hijo
  rationale: Se conserva el nombre propio bíblico en forma española tradicional «Sem». La aposición «su hijo» mantiene la relación familiar sin sobrecargar la sintaxis.
- source_word: ዘይፈህቅ፡
  english_pob_choice: because he loved him exceedingly
  chosen_spanish: porque lo amó en gran manera
  alternatives_spanish:
  - porque lo amó muchísimo
  - porque lo amaba grandemente
  lexicon: amar; en gran manera
  rationale: El adverbio intensivo del Ge'ez pide una intensificación clara. «En gran manera» conserva un registro digno y bíblico sin caer en una formulación rígida o arcaizante.
theological_decisions:
- issue: Alcance de la expresión genealógica y patrimonial
  english_pob_reading: The boundaries of all these were for the sons of Noah.
  chosen_spanish_reading: Los límites de todas estas cosas fueron para los hijos de Noé.
  alternative_spanish_readings:
  - Los límites de todo esto fueron para los hijos de Noé.
  - Los repartos de estas cosas fueron para los hijos de Noé.
  rationale: La frase parece referirse a asignaciones o delimitaciones vinculadas a la descendencia de Noé. «Límites» mantiene la ambigüedad respetando el texto sin convertirla en una especificación patrimonial más cerrada que la fuente.
  doctrine_reference: Genesis 10 / Jubilees allotment traditions
- issue: Relación entre acción y afecto en la entrega a Sem
  english_pob_reading: And he gave all that he had written to Shem his son, because he loved him exceedingly.
  chosen_spanish_reading: Y entregó todo lo que había escrito a Sem, su hijo, porque lo amó en gran manera.
  alternative_spanish_readings:
  - Y dio todo lo que había escrito a Sem, su hijo, porque lo amó muchísimo.
  rationale: La cláusula causal se conserva sin expandirla a una motivación interpretativa adicional. La intensidad del amor se expresa de forma directa para reflejar el énfasis del original, sin convertirlo en una explicación doctrinal.
  doctrine_reference: Narrative emphasis; filial affection
translation_notes:
  revision_awareness: 'El historial de revisiones muestra que un borrador previo fue reemplazado por una traducción no pertinente y luego restaurado; por eso esta versión sigue el Ge''ez recibido y el resumen de corrección más reciente, que indica dos acciones: la delimitación para los hijos de Noé y la entrega de lo escrito a Sem por amor intenso.'
  spanish_consistency_notes:
  - Se usa «Noé» y «Sem» en formas bíblicas españolas estándar.
  - Se mantiene un español sobrio y publicable, sin introducir terminología eclesiástica ajena al pasaje.
  - No se añade nota al pie porque el packet no preserva una nota cultural específica en este versículo y el texto fuente no exige una variante textual explícita.
