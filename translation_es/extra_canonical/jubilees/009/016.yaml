    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the Ge''ez: burial in Lubar, the mountain in the land of Ararat, and the statement that he completed 950 years of life.'
translation:
  language: es
  text: Y fue sepultado en el monte Lubar, en la tierra de Ararat. Y completó 950 años de su vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወተቀብረ፡
  english_pob_choice: And he was buried
  chosen_spanish: Y fue sepultado
  alternatives_spanish:
  - Y lo sepultaron
  - Y fue enterrado
  lexicon: sepultar
  rationale: El ge'ez indica una acción pasiva de sepultura; "sepultado" conserva el tono digno y bíblico sin perder claridad en español. "Enterrado" es posible, pero "sepultado" se ajusta mejor al registro tradicional y a la idea de deposición funeraria.
- source_word: '*ውስተ፡ ሉባር፡ ደብር፡'
  english_pob_choice: on Mount Lubar
  chosen_spanish: en el monte Lubar
  alternatives_spanish:
  - sobre el monte Lubar
  - en Lubar, el monte
  lexicon: monte / montaña
  rationale: La construcción ge'ez corresponde a "Mount Lubar" como topónimo compuesto. En español, "monte Lubar" comunica natural y fielmente el sentido; se evita la forma más áspera "Lubar, la montaña". No se usa "sobre" porque en español bíblico puede sonar menos natural aquí.
- source_word: በምድረ፡ አራራት።
  english_pob_choice: in the land of Ararat
  chosen_spanish: en la tierra de Ararat
  alternatives_spanish:
  - en la región de Ararat
  - en el país de Ararat
  lexicon: tierra
  rationale: '"Tierra" reproduce bien el valor territorial del ge''ez y coincide con el uso bíblico de un territorio llamado Ararat. "Región" explicita demasiado; "país" introduce una precisión moderna no exigida por el texto.'
- source_word: ፱፻ወ፶ዓመተ፡
  english_pob_choice: 950 years
  chosen_spanish: 950 años
  alternatives_spanish:
  - novecientos cincuenta años
  lexicon: números
  rationale: Se conserva el número en cifra para lectura clara y publicación-readable. El contenido exacto es un dato cronológico, sin necesidad de expansión interpretativa.
- source_word: ፈጸመ፡
  english_pob_choice: he completed
  chosen_spanish: completó
  alternatives_spanish:
  - llegó a completar
  - cumplió
  lexicon: completar
  rationale: '"Completó" refleja de manera directa el aspecto conclusivo del verbo, tal como en la traducción inglesa. "Cumplió" podría sonar más idiomático con años de vida, pero "completó" preserva mejor la fuerza del original y de la POB.'
- source_word: በሕይወቱ፡
  english_pob_choice: of his life
  chosen_spanish: de vida
  alternatives_spanish:
  - en su vida
  - de su vida
  lexicon: vida
  rationale: La expresión española más natural es "años de vida". Se mantiene la idea de duración vital sin añadir una paráfrasis innecesaria. La inglesa prefería "of his life"; en español, el giro queda implícito en el sustantivo "vida".
theological_decisions:
- issue: Sepultura en un monte y territorio identificado
  english_pob_reading: And he was buried on Mount Lubar in the land of Ararat.
  chosen_spanish_reading: Y fue sepultado en el monte Lubar, en la tierra de Ararat.
  alternative_spanish_readings:
  - Y fue sepultado en Lubar, el monte, en la tierra de Ararat.
  - Y fue sepultado sobre el monte Lubar, en la tierra de Ararat.
  rationale: No hay motivo en el texto para espiritualizar o reinterpretar el lugar; se conserva la localización concreta. La traducción mantiene la identificación topográfica sin resolver innecesariamente la tensión entre nombre propio y apelativo común.
  doctrine_reference: Topografía narrativa literal; sin implicación doctrinal adicional.
- issue: Duración completa de la vida
  english_pob_reading: And he completed 950 years of his life.
  chosen_spanish_reading: Y completó 950 años de vida.
  alternative_spanish_readings:
  - Y completó 950 años de su vida.
  - Y cumplió 950 años de vida.
  rationale: El texto afirma una vida completa de 950 años; la versión española conserva el hecho cuantitativo sin añadir sentido doctrinal. Se evita cualquier lectura figurada que no esté sustentada por el pasaje.
  doctrine_reference: Cronología narrativa; no doctrinal.
translation_notes:
  revision_awareness: La revisión más reciente corrigió un borrador ajeno al versículo y fijó como lectura correcta la sepultura en Lubar, el monte en la tierra de Ararat, y el dato de 950 años de vida. La presente versión sigue esa lectura revisada y evita las notas previas no ancladas en el texto.
  spanish_consistency_notes:
  - Se usa "monte" para mantener coherencia con el nombre geográfico compuesto "Mount Lubar" y con el registro bíblico en español.
  - Se emplea "sepultado" en lugar de "enterrado" por tono más literario y tradicional, sin alterar el sentido.
  - Se mantiene el número "950" para legibilidad editorial, equivalente exacto del dato fuente.
  - No se introducen notas al pie porque el versículo no presenta una alternativa textual o lexical que requiera anclaje explícito.
