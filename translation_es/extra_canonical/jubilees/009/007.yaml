translation:
  language: es
  text: Y se extiende hasta acercarse al oeste de Fara, y vuelve hacia Aferag, y se extiende hacia el oriente, hacia las aguas del Mar de Me'at.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: extends
  english_pob_choice: And it extends
  chosen_spanish: y se extiende
  alternatives_spanish:
  - y se alarga
  - y se prolonga
  lexicon: extend
  rationale: El verbo español «se extiende» reproduce bien la idea territorial o geográfica de continuidad lineal sin añadir matiz interpretativo. Mantiene el tono descriptivo del pasaje.
- source_word: west of Fara
  english_pob_choice: west of Fara
  chosen_spanish: al oeste de Fara
  alternatives_spanish:
  - hacia el oeste de Fara
  - por el oeste de Fara
  lexicon: west
  rationale: «Al oeste de» expresa de forma natural la localización espacial indicada por el inglés y conserva el nombre propio «Fara» sin expansión explicativa.
- source_word: returns toward Aferag
  english_pob_choice: and it returns toward Aferag
  chosen_spanish: y vuelve hacia Aferag
  alternatives_spanish:
  - y regresa hacia Aferag
  - y retorna hacia Aferag
  lexicon: return
  rationale: «Vuelve hacia» preserva el movimiento de retorno con español corriente y evita solemnidad innecesaria. «Regresa» sería igualmente posible, pero «vuelve» resulta más directo en una descripción geográfica.
- source_word: eastward
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: east
  rationale: Se eligió «hacia el oriente» porque mantiene el registro formal y corresponde bien a una delimitación geográfica. Es una alternativa natural a «hacia el este».
- source_word: Sea of Me'at
  english_pob_choice: Sea of Me'at
  chosen_spanish: Mar de Me'at
  alternatives_spanish:
  - mar de Me'at
  lexicon: sea
  rationale: Se conserva el nombre geográfico con mayúscula inicial en «Mar» por tratarse de una denominación propia en el texto fuente, siguiendo el patrón del inglés auditado.
theological_decisions:
- issue: Tratamiento de nombres geográficos y toponimia sagrada del pasaje
  english_pob_reading: A descriptive boundary line with named locations, no theological term expansion.
  chosen_spanish_reading: Una línea descriptiva de límites con topónimos propios, sin expansión teológica.
  alternative_spanish_readings:
  - Una paráfrasis más libre con aclaraciones geográficas
  - Una traducción más literal con orden sintáctico calcado
  rationale: El pasaje no presenta una tensión doctrinal explícita; por eso se prioriza la precisión geográfica y la transparencia textual. Se evita añadir explicaciones no presentes en el fuente.
