translation:
  language: es
  text: Y se extiende hacia el norte hasta los límites de Gadir, y llega a la orilla de las aguas del gran mar, hasta acercarse al río Gihón; y sigue por el sur de las aguas de Gihón hasta la ribera de este río.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: toward the north
  english_pob_choice: toward the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - al norte
  - en dirección al norte
  lexicon: north
  rationale: «Hacia el norte» conserva la dirección geográfica sin sonar rígido en español.
- source_word: limits of Gadir
  english_pob_choice: limits of Gadir
  chosen_spanish: hasta los límites de Gadir
  alternatives_spanish:
  - hasta los confines de Gadir
  - hasta el borde de Gadir
  lexicon: Gadir
  rationale: «Límites» reproduce bien el valor fronterizo de la expresión y mantiene el topónimo sin aclaraciones no presentes en el texto.
- source_word: coast of the waters of the great sea
  english_pob_choice: coast of the waters of the great sea
  chosen_spanish: la orilla de las aguas del gran mar
  alternatives_spanish:
  - la costa de las aguas del gran mar
  - la ribera de las aguas del gran mar
  lexicon: sea
  rationale: «Orilla»/«aguas» hace natural en español la imagen de borde costero y preserva la repetición de «aguas» del texto base.
- source_word: river Gihon
  english_pob_choice: river Gihon
  chosen_spanish: río Gihón
  alternatives_spanish:
  - río Gihon
  lexicon: river
  rationale: Se adapta el nombre propio a la acentuación habitual del español sin alterar la identificación del río.
- source_word: it goes along the south of the waters of Gihon to the bank of this river
  english_pob_choice: it goes along the south of the waters of Gihon to the bank of this river
  chosen_spanish: sigue por el sur de las aguas de Gihón hasta la ribera de este río
  alternatives_spanish:
  - va por el sur de las aguas de Gihón hasta la orilla de este río
  - se extiende por el sur de las aguas de Gihón hasta la ribera de este río
  lexicon: bank / south of
  rationale: «Sigue por el sur» conserva el marcador geográfico principal y «ribera» traduce bien el borde fluvial final; «aguas de Gihón» mantiene la formulación repetida del original.
theological_decisions:
- issue: Boundary geography described by repeated water markers
  english_pob_reading: The revised English reading keeps the repeated 'waters' language and the specific south/bank boundary, avoiding a mistranslation that placed Gihon 'in the middle of this land.'
  chosen_spanish_reading: La versión española conserva las repeticiones de «aguas» y los marcadores «sur» / «ribera», sin reinterpretar el límite geográfico.
  alternative_spanish_readings:
  - reducir la frase a una sola referencia a ‘el mar’
  - decir que el río Gihón ‘atraviesa el medio de esta tierra’
  rationale: El pasaje es principalmente descriptivo y geográfico; la traducción debe preservar sus límites y relaciones espaciales tal como aparecen en el texto revisado.
  doctrine_reference: No aplica; pasaje geográfico de Jubileos 9:3.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente, que corrigió ‘the coast of the waters of the sea’ a ‘the coast of the waters of the great sea’ y rechazó la lectura errónea que hacía del Gihón un río central de la tierra.
  spanish_consistency_notes:
  - Se mantiene ‘Gihón’ como forma española del nombre propio.
  - Se conserva ‘aguas del gran mar’ para reflejar la repetición y precisión del texto revisado.
  - No se introduce una nota al pie porque no hay variantes textuales que deban anclarse explícitamente en esta cláusula.
