translation:
  language: es
  text: Diecinueve jubileos, dos semanas y cinco años, que vivió en la tierra más tiempo que los hijos de los hombres, a causa de la justicia en la que fue perfecto, excepto Enoc. Porque a Enoc se le asignó un papel como testimonio para las generaciones del mundo, para que relatara todas las obras a las generaciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፲ወ፱ እዮቤልው፡ ወክልኤ፡ ሱባዔ፡ ወ፭ዓመተ።
  english_pob_choice: Nineteen jubilees, two weeks, and five years
  chosen_spanish: Diecinueve jubileos, dos semanas y cinco años
  alternatives_spanish:
  - Diecinueve jubileos, dos semanas, y cinco años
  - Diecinueve jubileos, dos semanas y cinco años cumplidos
  lexicon: jubilee -> jubileo; week -> semana; year -> año
  rationale: El ge'ez enumera una suma de tiempo sin glosa interpretativa; el español conserva la misma secuencia y tono cronístico. Se evita añadir explicaciones que no están en el texto fuente.
- source_word: ዘአፈድፈደ፡ ሐዩዎ፡ *ዲበ፡ ምድር፡ እምውሉደ፡ ሰብእ፡
  english_pob_choice: which he lived on earth longer than the children of men
  chosen_spanish: durante los cuales vivió en la tierra más tiempo que los hijos de los hombres
  alternatives_spanish:
  - que vivió en la tierra más tiempo que los hijos de los hombres
  - durante los cuales habitó en la tierra por más tiempo que los hijos de los hombres
  lexicon: live on earth -> vivir en la tierra; children of men -> hijos de los hombres
  rationale: Se mantiene la comparación temporal y el contraste antropológico del original. 'Vivir en la tierra' preserva el valor locativo sin volverlo idiomáticamente plano.
- source_word: በእንተ፡ ጽድቅ፡ ዘባቲ፡ *ፍጹመ፡ ኮነ፡
  english_pob_choice: because of the righteousness in which he was perfect
  chosen_spanish: a causa de la justicia en la que fue perfecto
  alternatives_spanish:
  - por la justicia en la que fue perfecto
  - a causa de la rectitud en la que fue perfecto
  lexicon: righteousness -> justicia; perfect -> perfecto
  rationale: '''Justicia'' conserva el campo semántico habitual para δικαιοσύνη/צדקה en un registro bíblico amplio. ''Perfecto'' reproduce el estado resultante sin suavizar la afirmación.'
- source_word: ዘእንበለ፡ ሄኖክ።
  english_pob_choice: except for Enoch
  chosen_spanish: excepto Enoc
  alternatives_spanish:
  - salvo Enoc
  - excepto con Enoc
  lexicon: except -> excepto; Enoch -> Enoc
  rationale: La frase funciona como excepción al sujeto anterior; el español puede sostenerla de forma directa y breve.
- source_word: እስመ፡ ገብሩ፡ ለሄኖክ፡ ተፈጥሮተ፡
  english_pob_choice: For Enoch's role was created
  chosen_spanish: Porque para Enoc se creó una función
  alternatives_spanish:
  - Porque para Enoc se creó un oficio
  - Porque Enoc fue creado para una función
  lexicon: role/function -> función; created -> se creó
  rationale: El ge'ez expresa una finalidad o cometido creado para Enoc. 'Función' es más literal y menos eclesiástico que 'oficio' o 'ministerio', y preserva la tensión de un propósito asignado.
- source_word: ለስምዕ፡ ለትዝምደ፡ ዓለም፡
  english_pob_choice: as a testimony to the generations of the world
  chosen_spanish: como testimonio para las generaciones del mundo
  alternatives_spanish:
  - como testimonio a las generaciones del mundo
  - como testimonio para las generaciones de la tierra
  lexicon: testimony -> testimonio; generations of the world -> generaciones del mundo
  rationale: '''Testimonio'' sigue de cerca el valor sustantivo del original y del inglés POB. ''Del mundo'' mantiene la amplitud universal de la expresión.'
- source_word: ከመ፡ ይንገር፡ ኵሎ፡ ግብረ፡ ለትውልደ።
  english_pob_choice: so that he might recount all the deeds to the generations
  chosen_spanish: para que contara todas las obras a las generaciones
  alternatives_spanish:
  - para que relatara todas las obras a las generaciones
  - para que narrara todas las obras a las generaciones
  lexicon: recount -> contar/relatar; deeds -> obras; generations -> generaciones
  rationale: '''Contara'' reproduce el propósito verbal sin alargar el período. ''Obras'' es una traducción amplia y bíblicamente comprensible para deeds/acts.'
theological_decisions:
- issue: Función creada para Enoc
  english_pob_reading: For Enoch's role was created as a testimony to the generations of the world
  chosen_spanish_reading: Porque para Enoc se creó una función como testimonio para las generaciones del mundo
  alternative_spanish_readings:
  - Porque para Enoc se creó un oficio como testimonio para las generaciones del mundo
  - Porque Enoc fue instituido como testimonio para las generaciones del mundo
  rationale: La fuente no dice simplemente que Enoc exista como testigo, sino que algo respecto de Enoc fue 'creado' con finalidad testimonial. 'Función' conserva la idea de cometido asignado sin convertirla en categoría ministerial cristiana posterior.
  doctrine_reference: Providencia / vocación designada; tipología de testimonio
- issue: Excepción de Enoc respecto del grupo anterior
  english_pob_reading: except for Enoch
  chosen_spanish_reading: excepto Enoc
  alternative_spanish_readings:
  - salvo Enoc
  - excepto con Enoc
  rationale: La excepción debe mantenerse nítida porque el texto contrasta a Enoc con los demás en el juicio sobre duración y/o perfección. El español lo expresa sin reordenar la lógica del pasaje.
  doctrine_reference: Excepción literaria y teológica en la tradición de Enoc
- issue: Righteousness/perfect
  english_pob_reading: because of the righteousness in which he was perfect
  chosen_spanish_reading: a causa de la justicia en la que fue perfecto
  alternative_spanish_readings:
  - por la justicia en la que fue perfecto
  - a causa de la rectitud en la que fue perfecto
  rationale: '''Justicia'' mantiene el valor moral-relacional fuerte del término y evita reducirlo a mera virtud privada. ''Perfecto'' se conserva porque el texto lo afirma explícitamente, aun cuando suene fuerte en español.'
  doctrine_reference: Justicia/rectitud; integridad completa
translation_notes:
  revision_awareness: 'La revisión indicada en el expediente corrige un desajuste total entre el ge''ez y una traducción inglesa previa que pertenecía a otro pasaje. Este borrador español sigue el contenido del ge''ez proporcionado: duración de vida, excepción de Enoc y su función testimonial, sin elementos de la construcción de la torre ni de ladrillos/asfalto.'
  spanish_consistency_notes:
  - Se usa 'Enoc' como forma española estándar del nombre.
  - Se conserva 'jubileos' sin explicar el sistema cronológico porque el verso no lo glosa.
  - No se introduce 'Mesías', 'Señor' ni otra terminología no presente en el texto fuente.
  - '''Función'' se eligió deliberadamente para evitar un sesgo eclesiástico no evidenciado por el ge''ez.'
