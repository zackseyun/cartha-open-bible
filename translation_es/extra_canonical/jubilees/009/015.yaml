  lexicon: Sustantivo relacional
  rationale: '''Hijos'' es la manera más natural en español para ውሉዱ en este contexto. Mantiene la relación paterna y evita una expansión innecesaria.'
- source_word: ወኖመ ኖኅ ምስለ አበዊሁ
  english_pob_choice: And Noah slept with his fathers
  chosen_spanish: Y Noé durmió con sus padres
  alternatives_spanish:
  - Y Noé se acostó con sus padres
  - Y Noé reposó con sus padres
  lexicon: Eufemismo funerario
  rationale: Conservo el eufemismo bíblico de muerte/reposo con un giro idiomático claro en español. 'Con sus padres' sigue el paralelismo del original y del audit trail inglés.
theological_decisions:
- issue: Eufemismo de muerte en 'durmió con sus padres'
  english_pob_reading: And Noah slept with his fathers
  chosen_spanish_reading: Y Noé durmió con sus padres
  alternative_spanish_readings:
  - Y Noé reposó con sus padres
  - Y Noé fue reunido con sus padres
  rationale: Mantengo el lenguaje tradicional bíblico sin explicitar la muerte en forma directa, porque el original y la traducción inglesa usan un eufemismo funerario. 'Con sus padres' conserva la formulación relacional del texto.
  doctrine_reference: Uso bíblico de la muerte como 'dormir' / reunirse con los padres
- issue: Relación afectiva entre el sujeto y el objeto amado
  english_pob_reading: he loved him more than all his sons
  chosen_spanish_reading: lo amó más que a todos sus hijos
  alternative_spanish_readings:
  - lo amaba más que a todos sus hijos
  - lo prefirió por encima de todos sus hijos
  rationale: 'No suavizo el verbo ni lo convierto en mera preferencia: el texto afirma una afección superior en un marco familiar. ''Amó'' preserva la intensidad y evita añadir una lectura psicológica más débil.'
  doctrine_reference: Lenguaje relacional/paterno sin implicaciones doctrinales adicionales
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: el texto anterior era un pasaje no relacionado y fue reemplazado por la lectura que corresponde al Ge''ez. La redacción española sigue la forma ahora validada: causal inicial + amor comparativo + eufemismo de muerte.'
  spanish_consistency_notes:
  - Uso 'Noé' con acento gráfico estándar en español.
  - Mantengo 'hijos' en lugar de 'descendientes' para no diluir la relación inmediata del comparativo.
  - Conservo un registro bíblico natural y legible, sin introducir terminología eclesiástica ajena al original.
