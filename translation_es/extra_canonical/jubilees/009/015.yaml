lexical_decisions:
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, ya que
  lexicon: Conjunción causal
  rationale: Introduzco la relación causal de la cláusula inicial con una conjunción natural en español. 'Porque' comunica bien el valor explicativo de እስመ sin volver la frase rígida.
- source_word: ያፈቅር
