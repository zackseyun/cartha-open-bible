revisions:
- from: Y para Tubal salió una quinta porción[a] en medio de la lengua que se acerca a la porción de Lud, hasta la otra lengua, dentro de la región más allá de la otra lengua[b].
  to: Y para Tubal salió una quinta porción[a] en medio de la lengua que se acerca a la porción de Lud, hasta la otra lengua, en la región más allá de la otra lengua[b].
  rationale: Se conserva la asignación correcta a Tubal y la literalidad de 'lengua', pero se mejora la legibilidad de la cláusula final con 'en la región más allá de la otra lengua'. También se corrige la nota [a] para reflejar que 'Y para Lud' fue una lectura previa ya descartada, no una alternativa equivalente vigente.
