base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/009/011.yaml
  text: And for Tubal there came out a fifth portion in the midst of the tongue that approaches toward the portion of Lud, as far as the other tongue, into the region beyond the other tongue.
  footnotes:
  - marker: a
    text: Or 'And for Lud'.
    reason: previous_rendering
  - marker: b
    text: Or 'within the region of the other tongue'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:54Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation reflecting the Ge''ez text: assigned the verse to Lud, included the fifth portion, the central ''tongue'' that approaches Lud''s portion, and the extent to the other tongue/region. Kept formal wording where the geography is obscure.'
translation:
  language: es
  text: Y para Tubal salió una quinta porción[a] en medio de la lengua que se acerca a la porción de Lud, hasta la otra lengua, en la región más allá de la otra lengua[b].
  philosophy: formal
  footnotes:
  - marker: a
    text: 'Lectura anterior: «Y para Lud».'
    reason: previous_rendering
  - marker: b
    text: 'O: «dentro de la región de la otra lengua».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወለቱቤልሂ
  english_pob_choice: And for Tubal
  chosen_spanish: Y para Tubal
  alternatives_spanish:
  - Y para Lud
  - Y a Tubal
  lexicon: Tubal
  rationale: El Ge'ez leído en la revisión más reciente asigna la porción a Tubal, no a Lud. En español, 'para Tubal' conserva la distribución territorial del pasaje sin añadir interpretación.
- source_word: መክፈልት፡ ኃምስ
  english_pob_choice: a fifth portion
  chosen_spanish: una quinta porción
  alternatives_spanish:
  - una quinta parte
  - la quinta porción
  lexicon: porción
  rationale: '''Porción'' reproduce bien la idea de reparto territorial; ''quinta'' expresa el ordinal numérico. ''Parte'' es posible, pero menos consistente con la terminología de reparto del texto.'
- source_word: ማእከለ፡ ልሳን
  english_pob_choice: in the midst of the tongue
  chosen_spanish: en medio de la lengua
  alternatives_spanish:
  - en el centro de la lengua
  - en medio del territorio/lengua
  lexicon: lengua
  rationale: Se conserva 'lengua' por la metáfora geográfica del original y del audit trail inglés. 'En medio de' refleja 'in the midst of' sin suavizar la imagen.
- source_word: ልሳን
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - idioma
  - franja
  - territorio
  lexicon: lengua
  rationale: La revisión inglesa mantiene 'tongue' como término geográfico literal. 'Lengua' preserva esa tensión y evita sustituirla por una explicación no atestiguada.
- source_word: ማዕዶተ፡ ልሳን
  english_pob_choice: the other tongue
  chosen_spanish: la otra lengua
  alternatives_spanish:
  - la otra franja
  - el otro territorio
  lexicon: lengua
  rationale: '''La otra lengua'' sigue de cerca el lenguaje fuente y la traducción auditada, manteniendo el paralelo con la primera ''lengua''.'
- source_word: ውስተ፡ ማዕዶተ፡ ልሳን
  english_pob_choice: into the region beyond the other tongue
  chosen_spanish: dentro de la región más allá de la otra lengua
  alternatives_spanish:
  - en la región más allá de la otra lengua
  - al otro lado de la otra lengua
  lexicon: región
  rationale: La revisión textual indicó que el sentido de ማዕዶተ es 'beyond/across'. En español, 'más allá de' preserva ese valor espacial y 'dentro de la región' traduce la idea de pertenencia territorial.
theological_decisions:
- issue: Topónimo/segmento geográfico literal en un texto no narrativo
  english_pob_reading: tongue / other tongue as geographic descriptors
  chosen_spanish_reading: lengua / la otra lengua
  alternative_spanish_readings:
  - franja
  - territorio
  rationale: No se convierte la metáfora geográfica en una explicación moderna; se conserva la literalidad para respetar la forma del texto fuente y su ambigüedad documental.
  doctrine_reference: N/A
- issue: Asignación correcta de la porción tras la revisión crítica
  english_pob_reading: And for Tubal
  chosen_spanish_reading: Y para Tubal
  alternative_spanish_readings:
  - Y para Lud
  rationale: La revisión del Ge'ez corrige una lectura previa errónea. La traducción española debe reflejar esa adjudicación para no perpetuar la contradicción interna del versículo.
  doctrine_reference: Textual criticism / source fidelity
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrige la atribución a Tubal y la dirección espacial de ማዕዶተ como 'más allá de'; además, se evitó la lectura anterior errónea que asignaba la porción a Lud. Se mantuvo la metáfora geográfica 'lengua' porque el audit trail inglés la conserva y el Ge'ez la respalda.
  spanish_consistency_notes:
  - Se usa 'Tubal' y 'Lud' como nombres propios transliterados de forma estándar.
  - Se preserva 'lengua' de manera consistente para el término geográfico literal.
  - '''Porción'' se mantiene como término de reparto territorial, acorde con el inglés auditado.'
  - La preposición 'para' reproduce la asignación distributiva del texto sin añadir explicaciones.
