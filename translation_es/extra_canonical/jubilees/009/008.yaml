base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/009/008.yaml
  text: And the angel of the spirits, Mastema, came and said, “Lord, Creator, let some of them remain before me, and let them listen to my voice and do all that I tell them; for if some of them are not left to me from among them, I will not be able to exercise the authority of my will over the children of men, for these are for corrupting and leading astray before my judgment, for great is the wickedness of the children of men.”
  footnotes:
  - marker: a
    text: Or 'And the angel of the spirits who were left came'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:55Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: the coming of the angel of the spirits, his plea that some remain under him, their hearing and obeying him, his inability otherwise to exercise authority over humanity, and the statement about corrupting, leading astray, and the great wickedness of the children of men.'
translation:
  language: es
  text: 'Y el ángel de los espíritus, Mastema, vino y dijo: «Señor, Creador, deja que algunos de ellos queden delante de mí, y que escuchen mi voz y hagan todo lo que yo les diga; porque, si algunos de entre ellos no me son dejados, no podré ejercer la autoridad de mi voluntad sobre los hijos de los hombres, pues estos son para corromper y extraviar ante mi juicio, porque grande es la maldad de los hijos de los hombres».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መልአከ፡ መናፍስት፡
  english_pob_choice: the angel of the spirits
  chosen_spanish: el ángel de los espíritus
  alternatives_spanish:
  - el ángel de los vientos
  - el ángel de los seres espirituales
  lexicon: ángel; espíritus
  rationale: Conservo la construcción literal del original y del inglés POB. En este contexto, 'espíritus' es la lectura natural y mantiene la referencia sobrenatural sin reemplazarla por una explicación interpretativa.
- source_word: መስተማ፡
  english_pob_choice: Mastema
  chosen_spanish: Mastema
  alternatives_spanish:
  - Mastema
  lexicon: nombre propio
  rationale: El ge'ez nombra explícitamente a Mastema; se conserva como nombre propio sin traducir.
- source_word: እግዚኦ፡ ፈጣሪ፡
  english_pob_choice: Lord, Creator
  chosen_spanish: Señor, Creador
  alternatives_spanish:
  - Señor, Hacedor
  - Dueño, Creador
  lexicon: κύριος / creador
  rationale: '''Señor'' y ''Creador'' reproducen el doble vocativo del original y del audit trail inglés. ''Señor'' aquí no sustituye Yahvé en el texto base, sino que refleja el vocativo dirigido al Creador.'
- source_word: አትርፍ፡ እምኔሆሙ፡
  english_pob_choice: let some of them remain before me
  chosen_spanish: deja que algunos de ellos queden delante de mí
  alternatives_spanish:
  - deja que algunos de ellos permanezcan delante de mí
  - deja que algunos de ellos sigan delante de mí
  lexicon: permanecer / quedar
  rationale: '''Queden delante de mí'' conserva la posición relacional del original (''before me'') y la petición de que un grupo permanezca bajo supervisión o presencia del hablante.'
- source_word: ወይስምዑ፡ ቃለየ፡
  english_pob_choice: and let them listen to my voice
  chosen_spanish: y que escuchen mi voz
  alternatives_spanish:
  - y que oigan mi voz
  - y que presten atención a mi voz
  lexicon: escuchar; voz
  rationale: '''Escuchen mi voz'' reproduce el paralelismo idiomático hebreo-semítico de obedecer atendiendo a la voz. ''Escuchar'' evita reducirlo solo a percepción auditiva.'
- source_word: ወይግበሩ፡ ኵሎ፡ ዘእቤሎሙ፡
  english_pob_choice: and do all that I tell them
  chosen_spanish: y hagan todo lo que yo les diga
  alternatives_spanish:
  - y hagan todo lo que les ordene
  - y hagan todo cuanto yo les diga
  lexicon: hacer; decir/ordenar
  rationale: 'Sigo de cerca el valor de mandato del original: ''diga'' mantiene el registro de instrucción, sin intensificar innecesariamente a ''ordenar''.'
- source_word: '*ስልጣነ፡ ፈቃድየ፡'
  english_pob_choice: the authority of my will
  chosen_spanish: la autoridad de mi voluntad
  alternatives_spanish:
  - el poder de mi voluntad
  - el dominio de mi voluntad
  lexicon: autoridad; voluntad
  rationale: Se conserva la expresión compuesta del inglés POB porque refleja el enlace entre potestad y voluntad del hablante. 'Autoridad' mantiene fuerza jurídica/gubernativa.
- source_word: ለአማስኖ፡ ወለአስሕቶ፡
  english_pob_choice: for corrupting and leading astray
  chosen_spanish: para corromper y extraviar
  alternatives_spanish:
  - para corromper y hacer errar
  - para corromper y desviar
  lexicon: corromper; extraviar
  rationale: '''Extraviar'' comunica el sentido de desviar del camino correcto y conserva el paralelo con ''leading astray'' sin suavizar la culpa moral.'
- source_word: ቅድመ፡ ኵነኔየ፡
  english_pob_choice: before my judgment
  chosen_spanish: antes de mi juicio
  alternatives_spanish:
  - delante de mi juicio
  - en presencia de mi juicio
  lexicon: antes de; juicio
  rationale: '''Antes de mi juicio'' sigue el inglés POB y mantiene la idea temporal/forense de la rendición de cuentas.'
- source_word: ዐቢይ፡ እከዮሙ፡
  english_pob_choice: great is the wickedness of the children of men
  chosen_spanish: grande es la maldad de los hijos de los hombres
  alternatives_spanish:
  - grande es la iniquidad de los hijos de los hombres
  - muy grande es la maldad de los hijos de los hombres
  lexicon: maldad; hijos de los hombres
  rationale: '''Maldad'' preserva el juicio moral directo del original y del inglés POB. ''Hijos de los hombres'' se mantiene como giro bíblico tradicional y literal.'
theological_decisions:
- issue: Identidad de Mastema como figura personal maligna
  english_pob_reading: The angel of the spirits, Mastema, came
  chosen_spanish_reading: El ángel de los espíritus, Mastema, vino
  alternative_spanish_readings:
  - El ángel de los espíritus vino
  - Mastema, el ángel de los espíritus, vino
  rationale: El ge'ez nombra a Mastema de forma explícita. La traducción conserva el nombre propio y la estructura, evitando borrar la identidad personal del interlocutor.
  doctrine_reference: Jubilees 10; tradición de Mastema como jefe de los espíritus malignos en Jubileos
- issue: Sentido de 'authority of my will'
  english_pob_reading: exercise the authority of my will over the children of men
  chosen_spanish_reading: ejercer la autoridad de mi voluntad sobre los hijos de los hombres
  alternative_spanish_readings:
  - imponer el poder de mi voluntad sobre los hijos de los hombres
  - hacer valer mi voluntad sobre los hijos de los hombres
  rationale: La frase mantiene la unión entre autoridad y voluntad sin convertirla en una paráfrasis psicológica. En Jubileos, el hablante busca poder operativo sobre la humanidad, no solo deseo interno.
  doctrine_reference: Angelology in Jubilees; divine and demonic authority motifs
- issue: Relación entre corrupción y extravío humano
  english_pob_reading: these are for corrupting and leading astray before my judgment
  chosen_spanish_reading: pues estos son para corromper y extraviar antes de mi juicio
  alternative_spanish_readings:
  - pues estos están destinados a corromper y extraviar ante mi juicio
  - pues estos sirven para corromper y extraviar
  rationale: Se mantiene el lenguaje de destino/finalidad sin suavizar el papel destructor atribuido a estos seres. 'Antes de mi juicio' conserva la escena forense del original.
  doctrine_reference: Jubilees' demonology; judgment and moral accountability
translation_notes:
  revision_awareness: The English audit trail shows an earlier unrelated draft and a correction restoring the Ge'ez reading that explicitly names Mastema and describes his request regarding some spirits remaining under his control. This Spanish draft follows the corrected reading, preserving the proper name, the petition for some to remain before him, the obedience formula, the inability to exercise authority otherwise, and the concluding moral assessment of humanity.
  spanish_consistency_notes:
  - Usé 'ángel de los espíritus' de forma consistente con el inglés POB y con la sintaxis del ge'ez.
  - Conservé 'Mastema' como nombre propio sin glosa para no perder la referencia técnica del libro de Jubileos.
  - No sustituí 'Señor' por 'Yahvé' porque aquí el vocativo corresponde al hablante dirigiéndose al Creador, no al tetragrámaton del texto base.
  - '''Escuchen mi voz'' mantiene el valor semítico de obediencia, no solo de audición.'
  - '''Antes de mi juicio'' conserva el marco escatológico/forense del pasaje.'
