translation:
  language: es
  text: La tercera lengua. Y a Mesek le correspondió la sexta porción, toda la región[a] de más allá de la tercera lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'región de'.
    reason: Conserva la alternativa documentada en el English POB ('Or "region of"').
lexical_decisions:
- source_word: ልሳን / tongue
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - idioma
  - lenguaje
  lexicon: n/a
  rationale: El texto ge'ez usa 'tongue' en sentido de lengua/idioma; en español 'lengua' conserva esa equivalencia sin introducir una paráfrasis más interpretativa.
- source_word: ሣልስት / third
  english_pob_choice: third
  chosen_spanish: tercera
  alternatives_spanish:
  - tercer
  lexicon: n/a
  rationale: Se mantiene el ordinal simple y natural en español, concordando con 'lengua'.
- source_word: ወለሞስክ / for Mesek
  english_pob_choice: for Mesek
  chosen_spanish: a Mesek
  alternatives_spanish:
  - para Mesek
  lexicon: n/a
  rationale: '''A Mesek'' conserva el dativo/direccional del ge''ez de manera idiomática; ''para'' también sería posible, pero ''a'' suena más directo en este contexto de distribución territorial.'
- source_word: መክፈልት / came forth, portion
  english_pob_choice: came forth; sixth portion
  chosen_spanish: le salió la sexta porción
  alternatives_spanish:
  - le tocó la sexta porción
  - surgió la sexta porción
  lexicon: n/a
  rationale: '''Le salió'' reproduce con naturalidad la idea de adjudicación o salida por sorteo/reparto implícita en ''came forth'' sin añadir interpretación excesiva.'
- source_word: ማዕዶተ / region beyond
  english_pob_choice: region beyond
  chosen_spanish: región más allá
  alternatives_spanish:
  - región al otro lado
  - región de מעבר
  lexicon: n/a
  rationale: La revisión inglesa favorece 'region beyond'; en español 'más allá' conserva ese matiz espacial de 'del otro lado' sin fijar más geografía de la que ofrece la fuente.
theological_decisions:
- issue: Distribución territorial de los descendientes
  english_pob_reading: The third tongue. And for Mesek came forth the sixth portion, all the region beyond the third tongue.
  chosen_spanish_reading: La tercera lengua. Y a Mesek le salió la sexta porción, toda la región más allá de la tercera lengua.
  alternative_spanish_readings:
  - La tercera lengua. Y para Mesek salió la sexta porción, toda la región del otro lado de la tercera lengua.
  rationale: No se amplía el texto con explicaciones genealógicas o geográficas adicionales; se conserva la formulación escueta del reparto territorial tal como aparece en la fuente.
  doctrine_reference: 'No aplica: pasaje de delimitación geográfica/genealógica en Jubileos, sin afirmación doctrinal directa.'
translation_notes:
  revision_awareness: Se atendió la revisión que corrigió el borrador ajeno al texto y la observación posterior sobre 'region beyond'. En español se refleja esa decisión con 'región más allá', evitando 'región de' y manteniendo el sentido espacial de la última cláusula.
  spanish_consistency_notes:
  - Se mantiene 'lengua' para traducir el valor semántico de tongue/idioma en paralelo con la tradición de la POB.
  - Se conserva el nombre propio 'Mesek' según el audit trail inglés.
  - No se usan notas al pie porque no hay una alternativa textual necesaria que requiera anclaje en este verso breve.
