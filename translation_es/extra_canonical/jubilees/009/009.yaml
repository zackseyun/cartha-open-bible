  yaml_path: translation/extra_canonical/jubilees/009/009.yaml
  text: And the prince of spirits, Mastema, came and said, "Lord, Creator, leave some of them to me, and let them listen to my voice and do everything that I tell them; for if none of them is left to me, I will not be able to exercise the authority of my will among the children of men, because they are for corrupting and leading astray before my judgment, for great is the evil of the sons of men."
  footnotes:
  - marker: '9'
    text: The Ethiopic reads 'angel/prince of spirits'; the adversarial figure is rendered as Mastema in light of Jubilees' recurring terminology and the immediate context of demonic spirits.
    reason: lexical_alternative
