    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y el príncipe de los espíritus, Mastema, vino y dijo: «Señor, Creador, déjame algunos de ellos, y que escuchen mi voz y hagan todo lo que yo les diga; porque si ninguno me es dejado, no podré ejercer la autoridad de mi voluntad entre los hijos de los hombres, pues ellos están para corromper y extraviar ante mi juicio, porque grande es la maldad de los hijos de los hombres».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mal'aka manāfest / prince of spirits
  english_pob_choice: the prince of spirits
  chosen_spanish: el príncipe de los espíritus
  alternatives_spanish:
  - el príncipe de espíritu
  - el jefe de los espíritus
  lexicon: prince / spirits
  rationale: Conservo el título completo porque el ajuste revisado del inglés subraya que la fuente ge'ez dice explícitamente «príncipe de los espíritus». «De los espíritus» mantiene el plural y la relación de dominio sin suavizarla.
- source_word: Mastema
  english_pob_choice: Mastema
  chosen_spanish: Mastema
  alternatives_spanish:
  - Mastemá
  lexicon: Mastema
  rationale: Se conserva el nombre propio tal como funciona en Jubileos y en el audit trail inglés; no hay base para castellanizarlo.
- source_word: Lord, Creator
  english_pob_choice: Lord, Creator
  chosen_spanish: Señor, Creador
  alternatives_spanish:
  - Señor, el Creador
  - Señor, Hacedor
  lexicon: Lord / Creator
  rationale: «Señor, Creador» reproduce la doble vocación con naturalidad en español y conserva la apelación reverente sin introducir una sustitución doctrinal.
- source_word: leave some of them to me
  english_pob_choice: leave some of them to me
  chosen_spanish: déjame algunos de ellos
  alternatives_spanish:
  - déjame parte de ellos
  - entrégame algunos de ellos
  lexicon: leave / some
  rationale: «Déjame algunos de ellos» expresa la petición de asignación parcial sin añadir matices no presentes en el texto.
- source_word: listen to my voice
  english_pob_choice: listen to my voice
  chosen_spanish: escuchen mi voz
  alternatives_spanish:
  - oigan mi voz
  - atiendan a mi voz
  lexicon: hear / voice
  rationale: En español, «escuchar mi voz» transmite mejor la idea de obediencia y atención personal que «oír».
- source_word: do everything that I tell them
  english_pob_choice: do everything that I tell them
  chosen_spanish: hagan todo lo que yo les diga
  alternatives_spanish:
  - cumplan todo lo que yo les mande
  - hagan cuanto yo les diga
  lexicon: do / tell
  rationale: La formulación sigue de cerca el mandato completo con un español natural y sin perder la fuerza imperativa.
- source_word: exercise the authority of my will
  english_pob_choice: exercise the authority of my will
  chosen_spanish: ejercer la autoridad de mi voluntad
  alternatives_spanish:
  - ejercer el dominio de mi voluntad
  - hacer valer la autoridad de mi voluntad
  lexicon: authority / will
  rationale: 'Se mantiene la construcción inusual del inglés porque refleja un giro conceptual del texto: la «autoridad» vinculada a la «voluntad» de Mastema.'
- source_word: children of men
  english_pob_choice: children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos de la humanidad
  - los seres humanos
  lexicon: children of men
  rationale: Se conserva la expresión bíblica tradicional del sintagma, ya que está cargada de resonancias literarias y se repite en el contexto.
- source_word: corrupting and leading astray
  english_pob_choice: corrupting and leading astray
  chosen_spanish: corromper y extraviar
  alternatives_spanish:
  - corromper y desviar
  - pervertir y extraviar
  lexicon: corrupt / lead astray
  rationale: «Extraviar» refleja bien la idea de hacer perder el camino; «corromper» preserva el daño moral explícito.
- source_word: before my judgment
  english_pob_choice: before my judgment
  chosen_spanish: antes de mi juicio
  alternatives_spanish:
  - delante de mi juicio
  - ante mi juicio
  lexicon: before / judgment
  rationale: «Antes de mi juicio» sigue de cerca el inglés POB y mantiene la referencia temporal/jurídica sin forzar una imagen espacial.
- source_word: great is the evil of the sons of men
  english_pob_choice: for great is the evil of the sons of men
  chosen_spanish: porque grande es la maldad de los hijos de los hombres
  alternatives_spanish:
  - porque grande es el mal de los hijos de los hombres
  - pues grande es la maldad de los seres humanos
  lexicon: great / evil / sons of men
  rationale: «Maldad» conserva el valor moral del sustantivo inglés y evita diluirlo en un general «mal»; la clausula final permanece plenamente reconocible en español bíblico.
theological_decisions:
- issue: Identidad y título de Mastema
  english_pob_reading: The revised English keeps Mastema as the adversarial figure and restores the title 'the prince of spirits'.
  chosen_spanish_reading: Mastema es presentado como «el príncipe de los espíritus», sin ocultar el nombre propio ni reducir el título.
  alternative_spanish_readings:
  - «el príncipe Mastema»
  - «el ángel de los espíritus»
  rationale: La revisión inglesa aclara que el ge'ez contiene explícitamente «príncipe de los espíritus». Por eso el español debe conservar tanto el nombre propio como el título completo, evitando una lectura que diluya el carácter adversarial documentado en Jubileos.
  doctrine_reference: Jubilees 9:9; audit trail revision on prince of spirits
- issue: Naturaleza de la petición de autoridad de Mastema
  english_pob_reading: I will not be able to exercise the authority of my will among the children of men
  chosen_spanish_reading: no podré ejercer la autoridad de mi voluntad entre los hijos de los hombres
  alternative_spanish_readings:
  - no podré imponer mi voluntad entre los hijos de los hombres
  - no podré hacer valer mi voluntad entre los hijos de los hombres
  rationale: El inglés POB preserva una formulación peculiar; el español mantiene esa tensión sin normalizarla en exceso. No se reemplaza por un simple «imponer mi voluntad» porque el texto habla explícitamente de «autoridad de mi voluntad».
  doctrine_reference: Jubilees 9:9; source-language nuance
translation_notes:
  revision_awareness: This draft incorporates the English audit revision that restored the source nuance 'the prince of spirits' for Mastema and therefore renders the title fully in Spanish as 'el príncipe de los espíritus' without dropping 'of spirits'. The previous English footnote alternative about 'the prince Mastema' is not reproduced as a footnote because the user requested no unanchored footnotes and every marker must appear in the translation text.
  spanish_consistency_notes:
  - Se usa «Mastema» como nombre propio invariable.
  - Se conserva «hijos de los hombres» por consistencia bíblica y porque el contexto literario de Jubileos lo favorece.
  - No se usa «SEÑOR» en mayúsculas como sustituto; «Señor» traduce la apelación directa del hablante.
  - La frase «autoridad de mi voluntad» se mantiene deliberadamente poco domesticada para reflejar la peculiaridad del original y del audit trail inglés.
