translation:
  language: es
  text: Los dejamos para que quedaran sujetos delante de Satanás en la tierra. Y el remedio[a] de todas sus enfermedades...
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez disponible aquí es una frase nominal fragmentaria, no un verbo completo como 'sanó' o 'curó'.
    reason: source_note
lexical_decisions:
- source_word: አተርፍነ
  english_pob_choice: We left them
  chosen_spanish: Los dejamos
  alternatives_spanish:
  - Los dejamos allí
  - Los dejamos permanecer
  lexicon: Ge'ez አተርፍነ, primera persona plural perfectiva de 'dejar/quedar'
  rationale: El texto ge'ez, según la revisión auditada, solo afirma 'dejamos/ dejamos permanecer', no 'dejamos una décima parte'. En español, 'Los dejamos' reproduce con claridad el valor básico sin añadir contenido no atestiguado.
- source_word: ይትኰነኑ
  english_pob_choice: might be subject
  chosen_spanish: quedaran sujetos
  alternatives_spanish:
  - fueran sometidos
  - estuvieran sujetos
  lexicon: Ge'ez forma pasiva/reflexiva de subordinación/sujeción
  rationale: '''Quedaran sujetos'' conserva la idea de estado de sujeción y suena natural en español bíblico contemporáneo. ''Fueran sometidos'' podría sugerir más fuertemente una acción puntual de sometimiento que el estado resultante.'
- source_word: ቅድመ ሰይጣን
  english_pob_choice: before Satan
  chosen_spanish: delante de Satanás
  alternatives_spanish:
  - ante Satanás
  - frente a Satanás
  lexicon: Locución preposicional ge'ez de presencia/posición
  rationale: '''Delante de'' mantiene la imagen espacial de presencia frente a un personaje personal. Se evita suavizar a ''ante'' en este caso porque el español común admite bien la expresión más concreta.'
- source_word: ዲበ ምድር
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra de
  lexicon: Ge'ez locativo con 'tierra'
  rationale: '''En la tierra'' es el equivalente más directo y natural para un locativo general sin forzar una lectura cosmológica específica.'
- source_word: ወፈውሰ ደዌሆሙ
  english_pob_choice: the remedy for all their diseases
  chosen_spanish: el remedio de todas sus enfermedades
  alternatives_spanish:
  - la curación de todas sus enfermedades
  - el tratamiento de todas sus enfermedades
  lexicon: Ge'ez noun phrase with construct sense; English audit notes noun/fragments rather than verb
  rationale: La auditoría inglesa corrigió un verbo inventado y dejó una frase nominal fragmentaria. 'El remedio de todas sus enfermedades' conserva la estructura nominal y el sentido de medicina/remedio sin afirmar indebidamente una acción verbal completa.
theological_decisions:
- issue: Destino de los dejados frente a Satanás
  english_pob_reading: We left them so that they might be subject before Satan on the earth.
  chosen_spanish_reading: Los dejamos para que quedaran sujetos delante de Satanás en la tierra.
  alternative_spanish_readings:
  - Los dejamos para que fueran sometidos delante de Satanás en la tierra
  - Los dejamos para que quedaran bajo Satanás en la tierra
  rationale: La formulación española mantiene la tensión demonológica y la idea de sujeción sin introducir una lectura doctrinal adicional. 'Quedaran sujetos' conserva tanto pasividad como estado resultante.
  doctrine_reference: Jubileos 10:12; cf. la teología del dominio de fuerzas espirituales hostiles en literatura del Segundo Templo
- issue: Naturaleza fragmentaria del segundo hemistiquio
  english_pob_reading: And the remedy for all their diseases...
  chosen_spanish_reading: Y el remedio de todas sus enfermedades...
  alternative_spanish_readings:
  - Y sanó todas sus enfermedades.
  - Y la curación de todas sus enfermedades...
  rationale: La revisión del inglés indicó que el ge'ez disponible es nominal y está truncado; por fidelidad no se completa como acción verbal. El español mantiene el fragmento y los puntos suspensivos para señalar la incompletitud del testimonio.
  doctrine_reference: Principio de transparencia textual y manejo de fragmentos en traducción auditada
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar la expansión 'a tenth of them' y para evitar traducir como verbo 'we healed' un segmento ge'ez que la revisión identifica como sintagma nominal fragmentario. Esta propuesta española sigue esas correcciones y conserva la incompletitud con puntos suspensivos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - '''Satanás'' se conserva como nombre propio demonológico estándar en español.'
  - Se mantiene un tono bíblico formal sin arcaísmos innecesarios.
  - No se añade contenido inexistente como 'una décima parte' ni 'sanó' para el segundo miembro.
