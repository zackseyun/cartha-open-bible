  yaml_path: translation/extra_canonical/jubilees/010/006.yaml
  text: And you know how your Watchers, the fathers of these spirits, acted in my days. As for these spirits that are living, imprison them and hold them fast in the place of judgment, and do not let them bring corruption upon the sons of your servant, O my God, for these are malignant and were created in order to destroy.
  footnotes:
  - marker: a
    text: Or 'sons of your servant, my God, for'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:51Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y ustedes saben cómo tus Vigilantes, los padres de estos espíritus, actuaron en mis días. En cuanto a estos espíritus que viven, enciérrenlos y ténganlos firmemente sujetos en el lugar de juicio, y no los dejen traer corrupción sobre los hijos de tu siervo, oh Dios mío,[a] porque estos son malignos y fueron creados para destruir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los hijos de tu siervo, mi Dios, porque'.
    reason: Preserva la alternativa registrada en la nota inglesa de rendering previo, adaptada al español.
lexical_decisions:
- source_word: Watchers
  english_pob_choice: Watchers
  chosen_spanish: Vigilantes
  alternatives_spanish:
  - Centinelas
  - Vigilantes celestiales
  lexicon: watcher
  rationale: Se conserva el nombre funcional del ser sobrenatural con un término español transparente. 'Vigilantes' comunica mejor el sentido de 'Watchers' que una transliteración o un calco técnico opaco.
- source_word: spirits
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - alientos
  - seres espirituales
  lexicon: spirit
  rationale: Aquí el contexto pide seres personales asociados a contaminación y destrucción, por lo que 'espíritus' mantiene el valor semántico sin aclaraciones indebidas.
- source_word: imprison them and hold them fast
  english_pob_choice: imprison them and hold them fast
  chosen_spanish: enciérrenlos y tenganlos firmemente sujetos
  alternatives_spanish:
  - encarcélenlos y reténganlos con firmeza
  - aprisionenlos y manténganlos sujetos
  lexicon: bind/imprison
  rationale: 'La doble acción del inglés se refleja con dos verbos españoles para preservar el énfasis: privarlos de libertad y mantenerlos bajo control.'
- source_word: place of judgment
  english_pob_choice: place of judgment
  chosen_spanish: el lugar de juicio
  alternatives_spanish:
  - el sitio del juicio
  - el lugar del tribunal
  lexicon: judgment
  rationale: Se mantiene la fórmula sustantiva directa, que conserva el carácter legal/forense del texto.
- source_word: sons of your servant
  english_pob_choice: sons of your servant
  chosen_spanish: los hijos de su siervo
  alternatives_spanish:
  - los hijos de tu siervo
  - los hijos de tu servidor
  lexicon: servant
  rationale: '''Siervo'' preserva la terminología bíblica de dependencia respecto de Dios; se mantiene el registro reverente del posesivo contextual en español.'
- source_word: my God
  english_pob_choice: my God
  chosen_spanish: ¡oh Dios mío!
  alternatives_spanish:
  - Dios mío
  - mi Dios
  lexicon: God
  rationale: Se explicita la vocativa con '¡oh!' para evitar la ambigüedad que el auditor inglés corrigió. En español, esto hace claro que es invocación directa a Dios.
- source_word: malignant
  english_pob_choice: malignant
  chosen_spanish: malignos
  alternatives_spanish:
  - malvados
  - perversos
  lexicon: evil
  rationale: '''Malignos'' conserva el matiz de malicia activa y peligrosa del inglés sin desplazarlo a un moralismo más genérico.'
- source_word: created in order to destroy
  english_pob_choice: created in order to destroy
  chosen_spanish: fueron creados para destruir
  alternatives_spanish:
  - fueron creados para arruinar
  - fueron creados con el fin de destruir
  lexicon: create/destroy
  rationale: 'La construcción final mantiene la teleología explícita del original: su creación está orientada a la destrucción.'
theological_decisions:
- issue: Identidad y función de los Watchers
  english_pob_reading: Watchers as superhuman fathers of these spirits
  chosen_spanish_reading: Vigilantes como padres de estos espíritus
  alternative_spanish_readings:
  - Centinelas como padres de estos espíritus
  - los Vigilantes, padres de estos espíritus
  rationale: Se conserva la lectura sobrenatural del término, sin reducirlo a simples guardianes humanos.
  doctrine_reference: '1 Enoc/Jubileos: tradición de los Vigilantes caídos'
- issue: Vocativo a Dios en la clausura
  english_pob_reading: O my God as direct address
  chosen_spanish_reading: ¡oh Dios mío! como vocativo directo
  alternative_spanish_readings:
  - Dios mío
  - ¡Dios mío!
  rationale: La revisión inglesa muestra que 'O' evita que la frase se lea como aposición. En español, '¡oh!' cumple la misma función y preserva la invocación.
  doctrine_reference: Uso vocativo en lenguaje bíblico
- issue: Finalidad destructiva de los espíritus
  english_pob_reading: were created in order to destroy
  chosen_spanish_reading: fueron creados para destruir
  alternative_spanish_readings:
  - fueron creados para hacer destrucción
  - fueron creados con el propósito de destruir
  rationale: Se mantiene la fuerza teleológica del pasaje sin suavizar la atribución de intención destructiva.
  doctrine_reference: Antropología/angelología del texto de Jubileos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que añadió 'O' para clarificar el vocativo de 'my God'; en español se resolvió con '¡oh Dios mío!' sin introducir una nota innecesaria. También se respetó que el texto fuente ge'ez no estaba disponible en la carga, por lo que la redacción se apoya en el audit trail inglés y en la coherencia interna del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino YHWH; aquí el texto dice 'my God', por lo que corresponde 'Dios'.
  - Se emplea 'Vigilantes' como término técnico consistente con la tradición de Jubileos y el sentido del inglés POB.
  - '''Siervo'' mantiene el registro bíblico para ''servant'' en una fórmula de dependencia respecto de Dios.'
  - No se añadió nota al pie porque la única nota inglesa trataba una ambigüedad ya resuelta en la redacción española.
