translation:
  language: es
  text: Y Yahvé envió un viento poderoso contra la torre, y la derribó sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: The Lord
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Soberano
  lexicon: YHWH
  rationale: La norma del proyecto pide Yahvé para el nombre divino. Aunque el inglés dice ‘the Lord’, aquí corresponde el nombre propio del pacto, no un título genérico, y el contexto de Jubileos remite al nombre divino.
- source_word: mighty wind
  english_pob_choice: mighty wind
  chosen_spanish: viento poderoso
  alternatives_spanish:
  - viento fuerte
  - gran viento
  - viento impetuoso
  lexicon: רוּחַ / πνεῦμα
  rationale: ‘Poderoso’ conserva la fuerza intensiva del adjetivo sin introducir una lectura más específica de ‘espíritu’. En español suena natural y mantiene el registro solemne del texto.
- source_word: sent ... against
  english_pob_choice: sent ... against
  chosen_spanish: envió ... contra
  alternatives_spanish:
  - mandó ... contra
  - lanzó ... contra
  lexicon: שלח
  rationale: ‘Envió ... contra’ reproduce bien el movimiento causativo y la dirección hostil implícita en el inglés auditado, sin sobreinterpretar el verbo.
- source_word: threw it down upon the earth
  english_pob_choice: threw it down upon the earth
  chosen_spanish: la derribó sobre la tierra
  alternatives_spanish:
  - la echó abajo sobre la tierra
  - la precipitó a tierra
  - la hizo caer sobre la tierra
  lexicon: נפל / השליך
  rationale: ‘Derribó’ expresa la caída causada por la acción del viento con una construcción natural en español. ‘Sobre la tierra’ conserva la localización del original sin añadir matices.
theological_decisions:
- issue: Nombre divino frente a título genérico
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Señor Yahvé
  rationale: La política del proyecto evita ocultar el nombre divino bajo una forma sustitutiva. No hay indicio aquí de que el inglés quisiera un mero título; por eso se mantiene el nombre propio.
  doctrine_reference: Éxodo 3:15; tradición textual del Tetragrámaton
- issue: Naturaleza del agente causal
  english_pob_reading: a mighty wind
  chosen_spanish_reading: un viento poderoso
  alternative_spanish_readings:
  - un viento violento
  - un gran viento
  rationale: El texto presenta un agente creado enviado por Dios; no hay base suficiente en este verso para convertirlo en una teofanía o en un ‘espíritu’ personal. ‘Viento poderoso’ preserva la ambigüedad controlada del original.
  doctrine_reference: Salmo 104:4; Génesis 8:1
translation_notes:
  revision_awareness: La revisión inglesa eliminó un ‘and look,’ final que había dejado la frase truncada. Por eso el español sigue la forma cerrada del texto revisado y no añade una continuación artificial.
  spanish_consistency_notes:
  - Se mantiene Yahvé conforme a la terminología del proyecto.
  - Se usa una construcción verbal simple y directa para evitar calcos innecesarios.
  - No se introduce nota textual porque el verso revisado en inglés ya quedó completo y no presenta variante activa en el texto base.
