base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/030.yaml
  text: 'And Ham his father, and Cush and Mizraim his brothers, said to him: ''Because you have settled in a land which is not yours, and which did not fall to you by lot, do not do so; for if you do so, you and your sons will fall in the land and be accursed through rebellion; because by rebellion you have settled, and by rebellion your sons will fall, and you will be uprooted forever.'''
  footnotes:
  - marker: a
    text: Or 'for if you do so, you and your sons will fall in the land and be accursed through rebellion; because by rebellion you have settled, and by rebellion your sons will fall, and you will be uprooted forever.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:57Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y Ham, su padre, y Cus y Mizraim, sus hermanos, le dijeron: «Porque te has establecido en una tierra que no es tuya, y que no te tocó por sorteo, no lo hagas; porque si lo haces, tú y tus hijos caerán en la tierra y serán malditos por la rebelión; porque por rebelión te has establecido, y por rebelión caerán tus hijos, y serás arrancado para siempre»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque si haces eso, tú y tus hijos caerán en la tierra y serán malditos por la rebelión; porque por rebelión te has establecido, y por rebelión caerán tus hijos, y serás arrancado para siempre»'
    reason: previous_rendering
lexical_decisions:
- source_word: ገበርከ፡ ከመዝ፡
  english_pob_choice: do so
  chosen_spanish: hagas así / lo haces
  alternatives_spanish:
  - procedas así
  - obres de ese modo
  lexicon: N/A
  rationale: La forma del mandato negativo y la repetición condicional se reproducen de manera natural en español con «hagas así» y «lo haces», conservando el paralelismo del original sin añadir paráfrasis.
- source_word: ውስተ፡ ምድር፡ እንተ፡ አኮነ፡ እንቲአከ፡
  english_pob_choice: in a land which is not yours
  chosen_spanish: en una tierra que no es tuya
  alternatives_spanish:
  - en una tierra que no te pertenece
  - en una tierra ajena
  lexicon: N/A
  rationale: «No es tuya» expresa con claridad la idea de pertenencia/no posesión del terreno, manteniendo la sencillez del ge'ez y la lectura inglesa.
- source_word: ወኢወፀአ፡ ለከ በዕፁ፡
  english_pob_choice: which did not fall to you by lot
  chosen_spanish: que no te tocó por sorteo
  alternatives_spanish:
  - que no te cayó por sorteo
  - que no te correspondió por suerte
  lexicon: N/A
  rationale: El giro idiomático de la herencia por sorteo se expresa en español con «te tocó por sorteo», que mantiene la imagen distributiva sin volverla jurídica en exceso.
- source_word: ርጉማን፡
  english_pob_choice: be accursed
  chosen_spanish: serán malditos
  alternatives_spanish:
  - quedarán malditos
  - serán malditos por maldición
  lexicon: N/A
  rationale: «Malditos» conserva la fuerza del pasivo resultativo. Se evita suavizarlo a «condenados» porque el texto habla de maldición, no de una idea genérica de castigo.
- source_word: በሀከከ፡
  english_pob_choice: through rebellion
  chosen_spanish: por la rebelión
  alternatives_spanish:
  - por rebelión
  - a causa de la rebelión
  lexicon: N/A
  rationale: «Por la rebelión» reproduce la causalidad del sustantivo abstracto en español con naturalidad, manteniendo el enlace repetido del original.
- source_word: ወርጉማን፡ በሀከከ፡
  english_pob_choice: and you will be uprooted forever
  chosen_spanish: y serás arrancado para siempre
  alternatives_spanish:
  - y serás desarraigado para siempre
  - y serás extirpado para siempre
  lexicon: N/A
  rationale: El verbo de arranque/desarraigo se vierte con «arrancado», imagen directa y transparente; «desarraigado» sería más interpretativo y menos literal en el plano figurado.
theological_decisions:
- issue: Maldición ligada a rebelión
  english_pob_reading: accursed through rebellion / by rebellion
  chosen_spanish_reading: malditos por la rebelión / por la rebelión
  alternative_spanish_readings:
  - malditos a causa de la rebelión
  - bajo maldición por rebelión
  rationale: Se conserva la conexión explícita entre maldición y rebelión, sin convertirla en una generalidad moral. La formulación duplica el énfasis causal del texto fuente.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión aplicada al audit trail corrige una omisión importante: el inicio del versículo nombra a Ham, Cus y Mizraim como quienes hablan. La redacción española incorpora ese segmento inicial y mantiene el resto del veredicto textual sin adoptar la frase incompleta anterior.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «Mizraim» como nombre propio, siguiendo la forma del source/POB English.
  - Se conserva la repetición de «por la rebelión» para reflejar el paralelismo del original.
  - No se introduce vocabulario eclesiástico ajeno al relato ni se suaviza la imaginería de maldición y desarraigo.
