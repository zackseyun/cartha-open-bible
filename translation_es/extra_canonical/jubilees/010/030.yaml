revisions:
- from: 'Y Ham, su padre, y Cus y Mizraim, sus hermanos, le dijeron: «Porque te has establecido en una tierra que no es tuya, y que no te tocó por sorteo, no hagas así; porque si lo haces, tú y tus hijos caerán en la tierra y serán malditos[a] por la rebelión; porque por rebelión te has establecido, y por rebelión caerán tus hijos, y serás arrancado para siempre» .'
  to: 'Y Ham, su padre, y Cus y Mizraim, sus hermanos, le dijeron: «Porque te has establecido en una tierra que no es tuya, y que no te tocó por sorteo, no lo hagas; porque si lo haces, tú y tus hijos caerán en la tierra y serán malditos por la rebelión; porque por rebelión te has establecido, y por rebelión caerán tus hijos, y serás arrancado para siempre»[a].'
  rationale: 'Se ajusta el mandato a un español más natural («no lo hagas»), se corrige la puntuación final y se reemplaza la nota léxica por una nota que sí preserva la alternativa documentada en el POB inglés: una variante de formulación de la cláusula completa, no solo de «malditos».'
