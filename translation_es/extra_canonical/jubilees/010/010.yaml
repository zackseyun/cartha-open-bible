translation:
  language: es
  text: 'Y dijo: «Que quede delante de él una décima parte de ellos, y que nueve partes desciendan al lugar de juicio».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “Let a tenth of them remain before him”
  english_pob_choice: Let a tenth of them remain before him
  chosen_spanish: «Que quede delante de él una décima parte de ellos»
  alternatives_spanish:
  - «Que permanezca ante él la décima parte de ellos»
  - «Que una décima parte de ellos quede delante de él»
  lexicon: remaining / permanecer / quedar
  rationale: El inglés POB expresa una permanencia o retención delante de una figura personal. En español, «que quede» es natural y fiel al matiz de permanencia; «delante de él» conserva la orientación relacional del pasaje sin añadir explicación.
- source_word: “nine parts”
  english_pob_choice: nine parts
  chosen_spanish: «nueve partes»
  alternatives_spanish:
  - «nueve porciones»
  - «las otras nueve partes»
  lexicon: part / portion
  rationale: «Partes» reproduce de forma directa la división proporcional del texto. «Porciones» sería posible, pero «partes» es más transparente y sobrio para un registro bíblico moderno.
- source_word: “the place of judgment”
  english_pob_choice: the place of judgment
  chosen_spanish: «el lugar de juicio»
  alternatives_spanish:
  - «el lugar del juicio»
  - «el sitio de juicio»
  lexicon: judgment / judgment place
  rationale: «Lugar de juicio» conserva la construcción nominal del original y del inglés POB. No se especifica más allá de lo que el texto exige; «juicio» mantiene la carga forense y escatológica sin convertirlo en una paráfrasis.
theological_decisions:
- issue: Destino del remanente y de la mayoría en una escena de juicio
  english_pob_reading: A tenth remains before him, while nine parts descend into the place of judgment.
  chosen_spanish_reading: Una décima parte permanece delante de él, y nueve partes descienden al lugar de juicio.
  alternative_spanish_readings:
  - «una décima parte se queda ante él, y nueve partes bajan al lugar de juicio»
  - «una décima parte queda delante de él, y nueve partes descienden al lugar del juicio»
  rationale: La formulación española conserva la asimetría entre el remanente retenido y la mayoría que desciende al juicio. Se evita suavizar «desciendan», porque el movimiento hacia abajo forma parte de la imagen judicial del versículo.
  doctrine_reference: Juicio escatológico / retribución
- issue: Referencia pronominal a la figura ante quien quedan o descienden
  english_pob_reading: before him
  chosen_spanish_reading: «delante de él»
  alternative_spanish_readings:
  - «ante él»
  - «en su presencia»
  rationale: «Delante de él» es idiomático y preciso en español. «En su presencia» explicitaría la relación personal, pero introduce una interpretación más amplia que el texto no exige.
  doctrine_reference: Lenguaje relacional en escena judicial
translation_notes:
  revision_awareness: La fuente ge'ez no proporcionó texto en el paquete, y el control de revisión indica alta concordancia sin cambios. La propuesta española sigue directamente la traducción auditada en inglés POB y mantiene sus decisiones léxicas sin ampliar el contenido.
  spanish_consistency_notes:
  - Se mantiene «juicio» como término forense básico, coherente con el estilo POB y con el inglés auditado.
  - Se usa «desciendan» para conservar el movimiento direccional del original y de la traducción inglesa.
  - No se introduce «Mesías», «Yahvé» ni otros términos no presentes en el versículo.
  - La puntuación con comillas angulares sigue el uso estándar en español bíblico moderno.
