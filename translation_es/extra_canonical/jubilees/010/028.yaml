revisions:
- from: desde la tierra de Sinar. Y Cam y sus hijos fueron a la tierra que le fue repartida, la cual había recibido[a].
  to: de la tierra de Sinar. Y Cam y sus hijos fueron a la tierra que le fue asignada y que recibió[a].
  rationale: 'Se hace una reparación menor de estilo y precisión: ''de'' suena más natural que ''desde'' en este segmento, y ''le fue asignada y que recibió'' preserva mejor en español la doble idea del ge''ez y de la auditoría inglesa: tierra asignada legítimamente y luego recibida/obtenida, sin sugerir usurpación.'
