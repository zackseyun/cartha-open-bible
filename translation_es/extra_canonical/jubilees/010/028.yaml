base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/028.yaml
  text: from the land of Shinar[28]. And Ham and his sons went into the land that was apportioned to him, which he acquired.
  footnotes:
  - marker: '28'
    text: The territorial description of Canaan's settlement is compressed and somewhat difficult. 'To the west, that is, to the sea' represents the inheritance region he should have taken rather than the Lebanon region where he actually settled.
    reason: segmentation_note
  - marker: a
    text: Or 'that he had seized for himself.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:58Z'
    unchanged: false
    changes_summary: 'Replaced the draft, which appears to reflect a different verse, with a rendering that matches the Ge''ez text: እምድረ ሲናአር = ''from the land of Shinar''; ወሖሩ ካም ወውሉዱ = ''And Ham and his sons went''; ውስተ ምድር እንተ አሕዝት ሎቱ ዘረከበ = ''into the land that he had seized for himself.'''
translation:
  language: es
  text: de la tierra de Sinar. Y Cam y sus hijos fueron a la tierra que le fue asignada y que recibió[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “y que obtuvo”.'
    reason: alternative_reading
lexical_decisions:
- source_word: እምድረ፡ ሲናአር
  english_pob_choice: from the land of Shinar
  chosen_spanish: desde la tierra de Sinar
  alternatives_spanish:
  - de la tierra de Sinar
  - desde la tierra de Shinar
  lexicon: Ge'ez እምድረ = de/desde la tierra; Sinar = topónimo bíblico
  rationale: Mantengo el topónimo bíblico en forma transparente y uso 'desde' para reflejar el valor de procedencia del ge'ez, sin añadir información no presente.
- source_word: ወሖሩ፡ ካም፡ ወውሉዱ፡
  english_pob_choice: And Ham and his sons went
  chosen_spanish: Y Cam y sus hijos fueron
  alternatives_spanish:
  - Y Cam y sus hijos fueron a
  - Y Cam y sus hijos se fueron
  lexicon: Ge'ez ወ = y; ሖሩ = fueron/iban; ካም = Cam; ውሉዱ = sus hijos
  rationale: '''Fueron'' reproduce el movimiento sin sobredeterminar dirección adicional en la primera cláusula; el destino aparece en la cláusula siguiente.'
- source_word: ውስተ፡ ምድር፡ እንተ፡ አሕዝት፡ ሎቱ፡ ዘረከበ
  english_pob_choice: into the land that was apportioned to him, which he acquired
  chosen_spanish: a la tierra que le fue repartida, la cual había recibido
  alternatives_spanish:
  - a la tierra que le fue asignada, la cual había obtenido
  - a la tierra que le correspondió, la cual había recibido
  lexicon: Ge'ez ውስተ = en/a; አሕዝት = hizo poseer, asignó, repartió; ሎቱ = a él; ዘረከበ = recibió/acogió/obtuvo
  rationale: 'Sigo la lectura revisada de la POB inglesa: la tierra es ''repartida'' o asignada, no ''tomada por la fuerza''. ''Había recibido'' conserva la idea de adquisición/recepción sin perder la tensión del verbo ge''ez.'
theological_decisions:
- issue: La tierra fue otorgada/asignada, no presentada como usurpación
  english_pob_reading: the land that was apportioned to him, which he acquired
  chosen_spanish_reading: la tierra que le fue repartida, la cual había recibido
  alternative_spanish_readings:
  - la tierra que le fue asignada, la cual había obtenido
  - la tierra que le correspondió, la cual había recibido
  rationale: La revisión más reciente corrigió una posible lectura de 'seized for himself' y entiende el ge'ez como lenguaje de herencia repartida. En español conviene reflejar esa distribución legítima con 'repartida'/'recibido' para no introducir una connotación de apropiación ilícita.
  doctrine_reference: tema bíblico de la asignación de herencia/lote
- issue: Nombre geográfico bíblico
  english_pob_reading: Shinar
  chosen_spanish_reading: Sinar
  alternative_spanish_readings:
  - Shinar
  rationale: '''Sinar'' es la forma tradicional en español bíblico y evita una transliteración híbrida innecesaria.'
  doctrine_reference: toponimia bíblica
translation_notes:
  revision_awareness: 'El borrador sigue la corrección editorial más reciente que alineó el verso con el ge''ez: procedencia ''desde la tierra de Sinar'', movimiento de Cam y sus hijos, y destino como tierra repartida/recibida. Se evitó la lectura anterior de ''seized for himself'' por estar marcada como errónea en la revisión posterior.'
  spanish_consistency_notes:
  - Se usa 'Cam' para el nombre propio bíblico según uso español estándar.
  - Se evita 'Señor' o equivalentes porque el verso no contiene lenguaje divino.
  - La puntuación separa las dos cláusulas como en el inglés POB, preservando el ritmo breve del original.
  - '''Tierra'' se mantiene literal para conservar el campo semántico geográfico y de herencia.'
