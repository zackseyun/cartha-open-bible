base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/029.yaml
  text: And Canaan saw the land of Lebanon as far as the brook of Egypt, that it was very good, and he did not go into the land of his inheritance to the west of the sea, and he dwelt in the land of Lebanon, from the east and from the west, from the border of the Jordan and from the border of the sea.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:58Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Ge''ez text: Canaan seeing the land of Lebanon to the brook of Egypt, judging it very good, not going to his inherited land, and dwelling in Lebanon with its stated boundaries.'
translation:
  language: es
  text: Y Canaán vio la tierra del Líbano hasta el arroyo de Egipto, que era muy buena, y no fue a la tierra de su herencia, al occidente del mar, sino que habitó en la tierra del Líbano, desde el oriente y desde el occidente, desde el límite del Jordán y desde el límite del mar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወርእየ / saw
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - contempló
  lexicon: ver
  rationale: El relato enfatiza percepción y evaluación; 'vio' conserva la observación directa sin añadir matices no presentes en el texto.
- source_word: ምድረ፡ ሊባኖስ / land of Lebanon
  english_pob_choice: land of Lebanon
  chosen_spanish: la tierra del Líbano
  alternatives_spanish:
  - el país del Líbano
  - la región del Líbano
  lexicon: tierra
  rationale: '''Tierra'' reproduce de forma natural el valor geográfico del original y coincide con el sentido narrativo de asentamiento y herencia.'
- source_word: መሐዘ፡ ግብጽ / brook of Egypt
  english_pob_choice: brook of Egypt
  chosen_spanish: arroyo de Egipto
  alternatives_spanish:
  - torrente de Egipto
  - wadi de Egipto
  lexicon: arroyo
  rationale: '''Arroyo'' comunica en español el curso de agua pequeño sin forzar un tecnicismo; ''torrente'' sería posible, pero menos estable en lectura general.'
- source_word: ከመ፡ ሠናይ፡ ይእቲ፡ ጥቀ / that it was very good
  english_pob_choice: that it was very good
  chosen_spanish: que era muy buena
  alternatives_spanish:
  - que era muy bueno
  - que era sumamente buena
  lexicon: bueno/buena
  rationale: Se conserva el predicado evaluativo. 'Buena' concuerda con 'la tierra' y mantiene el juicio de valor explícito del texto.
- source_word: ምድረ፡ ርስት / land of his inheritance
  english_pob_choice: land of his inheritance
  chosen_spanish: la tierra de su herencia
  alternatives_spanish:
  - la tierra que había de heredar
  - su tierra heredada
  lexicon: herencia
  rationale: '''Herencia'' expresa el término patrimonial/jurídico de posesión asignada sin introducir una paráfrasis sobre el proceso de heredar.'
- source_word: መንገለ፡ ዐረብ፡ ባሕር / west of the sea
  english_pob_choice: to the west of the sea
  chosen_spanish: al occidente del mar
  alternatives_spanish:
  - al oeste del mar
  - del lado occidental del mar
  lexicon: occidente
  rationale: '''Occidente'' preserva el valor direccional formal del pasaje y su tono geográfico tradicional, con sintaxis clara en español.'
- source_word: ወኀደረ / dwelt
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - moró
  - residió
  lexicon: habitar
  rationale: '''Habitó'' es idiomático, solemne y suficientemente cercano a la permanencia durativa del verbo original.'
- source_word: እምጽባሕ፡ ወእምዐረብ / from the east and from the west
  english_pob_choice: from the east and from the west
  chosen_spanish: desde el oriente y desde el occidente
  alternatives_spanish:
  - del oriente y del occidente
  - desde el este y desde el oeste
  lexicon: orient/occident
  rationale: Se mantiene el paralelismo direccional con vocabulario elevado y bíblicamente reconocible, sin depender de anglicismos.
- source_word: ዮርዳኖስ / Jordan
  english_pob_choice: Jordan
  chosen_spanish: Jordán
  alternatives_spanish:
  - río Jordán
  lexicon: toponym
  rationale: '''Jordán'' es la forma española normal del topónimo bíblico y evita una expansión innecesaria.'
- source_word: ባሕር / sea
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - océano
  - la mar
  lexicon: sea/mar
  rationale: '''Mar'' es la correspondencia natural en español y se ajusta al paralelismo geográfico del pasaje.'
theological_decisions:
- issue: Evaluación de la tierra como 'muy buena'
  english_pob_reading: that it was very good
  chosen_spanish_reading: que era muy buena
  alternative_spanish_readings:
  - que era muy buena en extremo
  - que era sumamente buena
  rationale: Se conserva la valoración positiva sin intensificarla más allá del adverbio geez/english 'very'. No se introduce una lectura moral o tipológica adicional.
  doctrine_reference: Génesis/Jubileos geografía de la tierra; valoración descriptiva, no doctrinal.
- issue: Término de pertenencia hereditaria
  english_pob_reading: land of his inheritance
  chosen_spanish_reading: la tierra de su herencia
  alternative_spanish_readings:
  - la tierra que le correspondía
  - su tierra heredada
  rationale: '''Herencia'' mantiene el sentido de asignación patrimonial heredada, importante para la trama de distribución territorial, sin convertirlo en una explicación interpretativa.'
  doctrine_reference: Motivo bíblico de herencia territorial.
- issue: Límites geográficos finales
  english_pob_reading: from the border of the Jordan and from the border of the sea
  chosen_spanish_reading: desde el límite del Jordán y desde el límite del mar
  alternative_spanish_readings:
  - desde la frontera del Jordán y desde la frontera del mar
  - desde el borde del Jordán y desde el borde del mar
  rationale: '''Límite'' conserva el valor fronterizo formal y funciona bien en paralelismo repetido. No se sustituye por expresiones más coloquiales que debilitarían el tono del pasaje.'
  doctrine_reference: Descripción territorial, sin carga doctrinal específica.
translation_notes:
  revision_awareness: 'La revisión reciente corrigió un borrador ajeno al pasaje y estableció como base el texto ge''ez de Jubileos 10:29: Canaan ve la tierra del Líbano hasta el arroyo de Egipto, la juzga muy buena, no va a su tierra de herencia y habita en el Líbano con sus límites. La traducción española sigue esa lectura revisada y no conserva el contenido descartado del borrador anterior.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general de la colección, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se usa 'Jordán' y no 'río Jordán' para preservar concisión y paralelismo.
  - Se evita 'SEÑOR' o sustituciones reverenciales porque el texto no presenta aquí el nombre divino.
