translation:
  language: es
  text: 'lugar de juicio. Y uno de nosotros dijo[a]: «Enseñemos a Noé todos sus remedios, porque'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula inicial del testimonio conservado es un sintagma nominal incompleto; no se añade aquí un verbo ausente en el ge'ez.
    reason: source_note
lexical_decisions:
- source_word: መካነ፡ ደይን።
  english_pob_choice: place of judgment.
  chosen_spanish: lugar de juicio.
  alternatives_spanish:
  - lugar de sentencia.
  - sitio de juicio.
  lexicon: መካነ = lugar/sitio; ደይን = juicio, sentencia
  rationale: El ge'ez ofrece solo una frase nominal breve, no una oración completa. Por eso se conserva como sintagma nominal en español, sin añadir verbo. «Lugar de juicio» sigue de cerca el valor léxico y evita completar indebidamente el texto.
- source_word: ወለአሐዱ፡ እምኔነ፡ ይቤ፡
  english_pob_choice: And one of us said
  chosen_spanish: Y uno de nosotros dijo
  alternatives_spanish:
  - Y uno de nosotros habló
  - Y uno de nosotros respondió
  lexicon: አሐዱ = uno; እምኔነ = de nosotros; ይቤ = dijo
  rationale: La construcción se rinde de forma directa y natural en español. Se conserva «uno de nosotros» para reflejar el plural inclusivo del original.
- source_word: ንምሀር፡
  english_pob_choice: Let us teach
  chosen_spanish: Enseñemos
  alternatives_spanish:
  - Démonos a enseñar
  - Aprendamos
  lexicon: ንምሀር = enseñemos / instruyamos
  rationale: El subjuntivo exhortativo español transmite bien la invitación colectiva del original. «Enseñemos» es natural y fiel al matiz volitivo.
- source_word: ለኖኅ፡
  english_pob_choice: Noah
  chosen_spanish: a Noé
  alternatives_spanish:
  - a Noah
  lexicon: Nombre propio Noé
  rationale: Se usa la forma española establecida del nombre bíblico, con el caso preposicional exigido por el verbo.
- source_word: ኵሎ፡ ፈውሶሙ፡
  english_pob_choice: all their remedies
  chosen_spanish: todas sus curaciones
  alternatives_spanish:
  - todos sus remedios
  - todos sus tratamientos
  lexicon: ኵሎ = todos/todas; ፈውስ = remedio, curación
  rationale: «Curaciones» mantiene el campo semántico de sanación/remedio sin imponer un tecnicismo médico moderno. El posesivo plural «sus» conserva la referencia a los remedios de los seres mencionados en el contexto inmediato.
theological_decisions:
- issue: Fragmento incompleto y cláusula nominal sin verbo
  english_pob_reading: Verse 1 is incomplete ... The translation follows the chapter's sense as preserved across the immediate context.
  chosen_spanish_reading: El pasaje se deja incompleto en español, sin completar la cláusula inicial.
  alternative_spanish_readings:
  - El lugar de juicio fue establecido.
  - Se estableció el lugar de juicio.
  rationale: El ge'ez conservado solo dice «lugar de juicio»; añadir un verbo sería una expansión no respaldada por el testimonio fuente. Se mantiene la tensión textual y la incompletitud del fragmento, tal como exige el control textual.
  doctrine_reference: Crítica textual y fidelidad al testimonio manuscrito
- issue: «sus curaciones» como objeto de enseñanza
  english_pob_reading: Let us teach Noah all their remedies
  chosen_spanish_reading: Enseñemos a Noé todas sus curaciones
  alternative_spanish_readings:
  - Enseñemos a Noé todos sus remedios
  - Le enseñemos a Noé todas sus curaciones
  rationale: Se conserva el sentido de remedios/curaciones sin imponer una lectura doctrinal. La frase refleja la idea de transmitir conocimiento curativo, tal como el texto sugiere, sin reinterpretarla.
  doctrine_reference: Transmisión de saber remedial en contexto narrativo
translation_notes:
  revision_awareness: Se revisó la tentación de completar la apertura como una oración verbal («fue establecido»), pero el control textual indica que eso es una adición injustificada. La redacción final conserva el fragmento nominal del original y evita residuos en inglés.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o «Cristo» porque el pasaje no contiene esos términos.
  - No se añadió puntuación explicativa que hiciera parecer completa la cláusula inicial.
  - El marcador [a] aparece exactamente donde corresponde en el texto español.
