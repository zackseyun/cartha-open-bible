translation:
  language: es
  text: Y fue sepultado en Lubar, un monte en la tierra de Ararat. Cumplió novecientos cincuenta años de vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወተቀብረ፡
  english_pob_choice: And he was buried
  chosen_spanish: Y fue sepultado
  alternatives_spanish:
  - Y fue enterrado
  - Y fue puesto en sepultura
  lexicon: Gəʿəz ተቀበረ / pasivo de “sepultar, enterrar”
  rationale: La forma pasiva indica que el sujeto recibió sepultura. «Sepultado» mantiene el registro bíblico y es natural en español, sin introducir matices adicionales.
- source_word: '*ውስተ፡ ሉባር፡ ደብር፡'
  english_pob_choice: in Lubar, a mountain
  chosen_spanish: en Lubar, un monte
  alternatives_spanish:
  - en Lubar, una montaña
  - en Lubar, una colina
  lexicon: ውስተ / en; ደብር / monte, montaña
  rationale: «Monte» conserva bien el valor geográfico-bíblico de ደብር y suena más idiomático en español que «montaña» en este contexto narrativo.
- source_word: በምድረ፡ አራራት።
  english_pob_choice: in the land of Ararat
  chosen_spanish: en la tierra de Ararat
  alternatives_spanish:
  - en el país de Ararat
  - en la región de Ararat
  lexicon: በምድረ / en la tierra de; አራራት / Ararat
  rationale: «Tierra» refleja con precisión el sustantivo geográfico de origen y coincide con la formulación auditada en inglés.
- source_word: ፱፻ወ፶ዓመተ፡ ፈጸመ፡ በሕይወቱ፡
  english_pob_choice: He completed nine hundred and fifty years in his life.
  chosen_spanish: Cumplió novecientos cincuenta años de vida.
  alternatives_spanish:
  - Vivió novecientos cincuenta años.
  - Completó novecientos cincuenta años de su vida.
  lexicon: ፈጸመ / completed, fulfilled; በሕይወቱ / in his life
  rationale: «Cumplió» transmite la idea de completar un período de vida sin sonar forzado. «De vida» mantiene la construcción compacta y clara en español.
theological_decisions:
- issue: Edad/longevidad expresada como completitud de vida
  english_pob_reading: He completed nine hundred and fifty years in his life.
  chosen_spanish_reading: Cumplió novecientos cincuenta años de vida.
  alternative_spanish_readings:
  - Vivió novecientos cincuenta años.
  - Completó novecientos cincuenta años de su vida.
  rationale: No se suaviza ni se interpreta alegóricamente la cifra; se conserva como dato narrativo literal de longevidad, tal como en el texto fuente y en el POB inglés.
  doctrine_reference: Lectura literal-histórica del relato de Jubileos; sin implicaciones doctrinales añadidas
translation_notes:
  revision_awareness: El inglés POB añadió explícitamente el dato del sepulcro en Lubar y reordenó la cláusula final para mayor naturalidad; la versión española sigue esa lectura auditada y conserva ambos datos sin omitir ninguno.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando aparezca el nombre divino; en este versículo no hay instancia del Tetragrámaton.
  - «Monte» se usa aquí como equivalente geográfico de ደብር sin necesidad de variar a «montaña».
  - La cifra se conserva en palabras, acorde con el estilo bíblico en español.
