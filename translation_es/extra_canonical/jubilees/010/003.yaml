translation:
  language: es
  text: 'Y oró delante de Yahvé, su Dios, y dijo: «Dios de los espíritus de toda carne, que me has mostrado misericordia y me has salvado a mí y a mis hijos de las aguas del diluvio, y no me has hecho perecer como has hecho perecer a los hijos de perdición—»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: יהוה / divine name usage
  rationale: 'Aunque el inglés POB dice "the Lord", el contexto de oración al Dios de Israel y la política terminológica del proyecto favorecen reproducir el nombre divino como "Yahvé" en español, evitando el reemplazo por una máscara reverencial. El vocativo queda natural en español: "delante de Yahvé su Dios".'
- source_word: God of the spirits of all flesh
  english_pob_choice: God of the spirits of all flesh
  chosen_spanish: Dios de los espíritus de toda carne
  alternatives_spanish:
  - Dios de los espíritus de toda la humanidad
  - Dios de los espíritus de todos los seres humanos
  lexicon: רוּחַ / πνεῦμα; σάρξ
  rationale: Se conserva la expresión literal y solemne del título. "Carne" mantiene el contraste semítico entre lo viviente y lo mortal, sin diluirlo en una paráfrasis antropológica.
- source_word: showed mercy
  english_pob_choice: have shown mercy
  chosen_spanish: me has mostrado misericordia
  alternatives_spanish:
  - has tenido misericordia de mí
  - me has tratado con misericordia
  lexicon: חנן / רחם; χάρις / misericordia
  rationale: '"Mostrar misericordia" refleja bien la acción benévola recibida y mantiene un registro bíblico claro en español sin volverlo arcaico.'
- source_word: saved
  english_pob_choice: saved
  chosen_spanish: me has salvado
  alternatives_spanish:
  - me has librado
  - me has rescatado
  lexicon: ישע / rescue language
  rationale: '"Salvar" es la opción más directa y ampliamente inteligible para la preservación de la vida frente al diluvio; conserva el valor de rescate del original.'
- source_word: waters of the flood
  english_pob_choice: waters of the flood
  chosen_spanish: las aguas del diluvio
  alternatives_spanish:
  - las aguas del desastre
  - las aguas del cataclismo
  lexicon: מבול / κατακλυσμός
  rationale: '"Diluvio" es el equivalente estable para el evento del Génesis y mantiene la referencia tradicional sin perder claridad.'
- source_word: sons of perdition
  english_pob_choice: sons of perdition
  chosen_spanish: los hijos de perdición
  alternatives_spanish:
  - los hijos de la perdición
  - los destinados a perdición
  lexicon: אבדון / perdition terminology
  rationale: Se conserva la construcción heredada del original y del inglés POB, que funciona como expresión identificable de condena/perdición. En español, "hijos de perdición" es fiel y solemne.
theological_decisions:
- issue: Uso del nombre divino en la oración
  english_pob_reading: the Lord his God
  chosen_spanish_reading: Yahvé su Dios
  alternative_spanish_readings:
  - el Señor su Dios
  - el Dios de él
  rationale: La política del proyecto pide traducir el nombre divino como "Yahvé". Aquí no se trata de un simple título genérico, sino del Dios invocado en oración; por eso se conserva el nombre propio reverente.
  doctrine_reference: Representación del Tetragrámaton en la traducción POB
- issue: Contraste entre salvación y perdición
  english_pob_reading: saved me and my sons from the waters of the flood, and have not caused me to perish as you caused the sons of perdition to perish
  chosen_spanish_reading: me has salvado a mí y a mis hijos de las aguas del diluvio, y no me has hecho perecer como has hecho perecer a los hijos de perdición
  alternative_spanish_readings:
  - me has librado...
  - no me has dejado perecer...
  rationale: 'Se preserva la asimetría del texto: el hablante afirma ser rescatado por misericordia, mientras que otros son descritos como objeto de juicio. La repetición de "perecer" mantiene el paralelismo con el original y no suaviza la tensión teológica.'
  doctrine_reference: Juicio divino y preservación por misericordia
translation_notes:
  revision_awareness: No applied revisions; English POB audit trail indicates no changes needed and cross-check status is high_agreement/agree. The Spanish draft therefore follows the stable English reading closely while rendering divine-name policy and semitic phrasing in natural Spanish.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y publicable, con sintaxis fluida en español.
  - '"Yahvé" se usa consistentemente para el nombre divino conforme a la política del proyecto.'
  - '"Carne" se conserva para preservar el contraste antropológico-semítico del título.'
  - No se introducen notas al pie porque el pasaje no presenta variantes textuales ni ambigüedades que requieran marcación en esta línea de trabajo.
