base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/021.yaml
  text: And they built it for forty-three years. Its breadth was 204 cubits[21], and the height of a brick was one third of one cubit; and its height amounted to 5,433 cubits and 2 palms, and twelve stades.
  footnotes:
  - marker: '21'
    text: The tower measurements in the Ethiopic are notoriously difficult, and some numerals/units may be corrupt. The translation preserves the transmitted figures as literally as possible, but the exact dimensions remain uncertain.
    reason: textual_variant
  - marker: a
    text: Or 'and the extent of one wall was thirteen stades, and of the other thirty stades.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:57Z'
    unchanged: false
    changes_summary: Clarified the measure phrase to 'one third of one cubit' for natural English and corrected 'twelve stades' to 'thirteen stades' to reflect the source numeral.
translation:
  language: es
  text: Y lo construyeron durante cuarenta y tres años. Su anchura era de 204 codos[a], y la altura de un ladrillo era de un tercio de un codo; su altura llegaba a 5.433 codos y 2 palmos, y doce estadios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las medidas de la torre en el etíope son notoriamente difíciles, y algunos números o unidades pueden estar corruptos. La traducción conserva las cifras transmitidas tan literalmente como es posible, pero las dimensiones exactas siguen siendo inciertas.
    reason: textual_variant
lexical_decisions:
- source_word: ማያት፡ በምድረ፡ ሰናአር
  english_pob_choice: they built it
  chosen_spanish: lo construyeron
  alternatives_spanish:
  - lo edificaron
  - lo levantaron
  lexicon: construir / edificar
  rationale: El verbo español principal debe reflejar una acción de construcción literal. 'Construyeron' mantiene el sentido directo del Ge'ez y evita una paráfrasis excesiva.
- source_word: አርብዓ፡ ዓመተ፡ ወሠለስተ፡ ዓመተ፡
  english_pob_choice: forty-three years
  chosen_spanish: cuarenta y tres años
  alternatives_spanish:
  - 43 años
  lexicon: número cardinal compuesto
  rationale: Se conserva el valor numérico transmitido sin añadir interpretación. La forma en palabras es más natural en registro bíblico en español.
- source_word: ጽፍሑ፡ ፪፻ወ፬
  english_pob_choice: Its breadth was 204 cubits
  chosen_spanish: Su anchura era de 204 codos
  alternatives_spanish:
  - Su ancho era de 204 codos
  - Medía 204 codos de ancho
  lexicon: measure / breadth
  rationale: '''Anchura'' es el sustantivo más claro y formal en español para breadth. Se conserva ''codos'' como unidad literal, sin intentar armonizar cifras o unidades.'
- source_word: ሐምሳ፡ ምእት፡ ወአርባዐቱ፡ ምእት፡ ወሰላሳ፡ ወሰለስቱ
  english_pob_choice: 5,433 cubits
  chosen_spanish: 5.433 codos
  alternatives_spanish:
  - 5,433 codos
  - cinco mil cuatrocientos treinta y tres codos
  lexicon: numeral transmission
  rationale: Se mantiene la cifra transmitida por la tradición textual, pero en formato tipográfico español con punto decimal para millares. No se corrige ni se normaliza la cifra más allá de su presentación en español.
- source_word: ኑኅ፡ ሐምሳ፡ ምእት፡ ወአርባዐቱ፡ ምእት፡ ወሰላሳ፡ ወሰለስቱ
  english_pob_choice: 5,433 cubits and 2 palms
  chosen_spanish: 5.433 codos y 2 palmos
  alternatives_spanish:
  - 5,433 codos y 2 palmos
  lexicon: measure / palms
  rationale: '''Palmos'' traduce de forma transparente la unidad pequeña adicional. Se conserva la combinación de medidas sin intentar resolver una posible dificultad numérica del texto transmitido.'
- source_word: ወ፲ወ፪ ምዕራፍ
  english_pob_choice: twelve stades
  chosen_spanish: doce estadios
  alternatives_spanish:
  - 12 estadios
  lexicon: measure / stade
  rationale: El Ge'ez transmite claramente el numeral doce; por fidelidad a la fuente, se evita toda interpolación de 'una pared' u otras frases ausentes del texto base. 'Estadios' mantiene la unidad antigua de medida.
theological_decisions:
- issue: Tratamiento de las medidas extraordinarias y del texto difícil
  english_pob_reading: The translation preserves the transmitted figures as literally as possible, but the exact dimensions remain uncertain.
  chosen_spanish_reading: Se conservan las cifras transmitidas literalmente, aunque las dimensiones exactas siguen siendo inciertas.
  alternative_spanish_readings:
  - Las medidas exactas son inciertas.
  - El texto es corrupto en parte.
  rationale: 'La nota debe reflejar la tensión textual documentada: el pasaje preserva cifras transmitidas, pero su exactitud es incierta. En español conviene expresar esta cautela sin resolver artificialmente la dificultad.'
  doctrine_reference: Crítica textual; no doctrinal
translation_notes:
  revision_awareness: 'El contexto de revisión inglés muestra una corrección importante: el Ge''ez lee claramente doce estadios (፲ወ፪), no trece, y no contiene interpolaciones sobre ''la extensión de una pared'' ni ''la otra''. Esta versión española sigue la lectura final revisada y omite esas interpolaciones, conservando solo las medidas presentes en la fuente etíope.'
  spanish_consistency_notes:
  - Se prefirió 'construyeron' por claridad y fidelidad al acto de edificar una estructura.
  - Se usó 'anchura' en lugar de 'ancho' para un registro bíblico más sobrio.
  - Se mantuvo la cifra transmitida como 5.433 en formato español.
  - No se añadió ninguna frase equivalente a las interpolaciones removidas en la revisión del inglés.
  - '''Estadios'' se dejó en plural llano, acorde con el valor de medida antigua.'
