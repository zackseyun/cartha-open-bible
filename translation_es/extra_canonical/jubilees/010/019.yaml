  yaml_path: translation/extra_canonical/jubilees/010/019.yaml
  text: For they departed from the land of Ararat eastward to Shinar, and in his days they built the city and the tower, saying, “Come, let us go up by it into heaven.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:56Z'
    unchanged: false
    changes_summary: Changed 'ascend' to 'go up' for more natural formal English and closer idiomatic rendering of the invitation formula, while preserving the sense of ascent into heaven.
translation:
  language: es
  text: 'Porque salieron de la tierra de Ararat hacia el oriente, a Sinar; y en sus días edificaron la ciudad y la torre, diciendo: «Vengan, subamos por ella hasta el cielo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሲናአር / Shinar
  english_pob_choice: Shinar
  chosen_spanish: Sinar
  alternatives_spanish:
  - Shinar
  lexicon: topónimo
  rationale: En español bíblico puede aparecer 'Sinar' o 'Shinar'; se elige 'Sinar' para una forma más natural y tradicional en español, manteniendo el mismo topónimo bíblico.
- source_word: ፈለሱ፡ እምድረ፡ አራራት፡ መንገለ፡ ጽባሕ፡
  english_pob_choice: they departed from the land of Ararat eastward
  chosen_spanish: salieron de la tierra de Ararat hacia el oriente
  alternatives_spanish:
  - partieron de la tierra de Ararat hacia el oriente
  - se movieron desde la tierra de Ararat hacia el oriente
  lexicon: verb movement / direction
  rationale: '''Salieron'' expresa de forma clara y natural el movimiento de salida; ''hacia el oriente'' conserva la dirección del original sin sobrecargar el estilo.'
- source_word: ሐነጽዎ፡ ለሀገር፡ ወለማኅፈድ፡
  english_pob_choice: they built the city and the tower
  chosen_spanish: edificaron la ciudad y la torre
  alternatives_spanish:
  - construyeron la ciudad y la torre
  - levantaron la ciudad y la torre
  lexicon: build / construct
  rationale: '''Edificaron'' conserva un registro bíblico y formal, y corresponde bien a la construcción de la ciudad y la torre.'
- source_word: ንዕርግ፡
  english_pob_choice: let us go up
  chosen_spanish: subamos
  alternatives_spanish:
  - ascendamos
  - subamos hacia arriba
  lexicon: motion verb
  rationale: La revisión inglesa favoreció 'go up' sobre 'ascend'. En español, 'subamos' es la equivalencia natural y formal; 'ascendamos' sería más literal pero menos idiomático.
- source_word: ቦቱ፡ ውስተ፡ ሰማይ / into heaven
  english_pob_choice: into heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - al cielo
  - hacia el cielo
  lexicon: heaven / sky
  rationale: '''Hasta el cielo'' mantiene la idea de movimiento hacia lo alto con una fórmula española muy clara. Dado el contexto de la torre y la cita de ascenso, ''cielo'' comunica mejor la meta espacial del enunciado.'
theological_decisions:
- issue: Lenguaje de ascenso humano hacia el cielo
  english_pob_reading: Come, let us go up by it into heaven.
  chosen_spanish_reading: Venid, subamos por ella hasta el cielo.
  alternative_spanish_readings:
  - Venid, subamos por ella al cielo.
  - Venid, ascendamos por ella al cielo.
  rationale: Se conserva la pretensión humana de ascender por la torre; no se espiritualiza ni se atenúa el desafío implícito del texto.
  doctrine_reference: Narrativa de soberbia humana en la tradición de Babel/torre; cf. Génesis 11.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'ascend' por 'go up' para acercarse a una fórmula idiomática más natural sin alterar el sentido de subida. La versión española sigue esa misma preferencia al usar 'subamos', que es natural, formal y fiel al gesto verbal del original.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo requiera; aquí no aparece.
  - Se mantiene el tono narrativo simple y directo del pasaje, con puntuación española estándar.
  - No se introduce terminología doctrinal ajena al relato; el foco permanece en el movimiento, la construcción y la frase de invitación.
  - '''Sinar'' se prefiere como topónimo españolizado común, sin cambiar la referencia geográfica.'
