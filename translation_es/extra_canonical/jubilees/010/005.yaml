lexical_decisions:
- source_word: bless
  english_pob_choice: bless
  chosen_spanish: bendíceme
  alternatives_spanish:
  - bendícenos
  - favorece
  lexicon: bendecir
  rationale: El imperativo pide una acción de Dios en favor del hablante; «bendecir» conserva el matiz de invocar bien y favor divino sin sustituirlo por un término más genérico como «favorecer».
- source_word: increase
  english_pob_choice: increase
  chosen_spanish: aumentemos
  alternatives_spanish:
  - crezcamos
  - nos hagamos numerosos
  lexicon: aumentar
  rationale: «Aumentar» reproduce de forma clara el crecimiento numérico esperado en el contexto y se coordina bien con los otros verbos de multiplicación y llenura.
- source_word: multiply
  english_pob_choice: multiply
  chosen_spanish: nos multipliquemos
  alternatives_spanish:
  - nos reproduzcamos
  - seamos muchos
  lexicon: multiplicar
  rationale: Se mantiene la fuerza de reproducción abundante del original. La forma reflexiva en español expresa adecuadamente el crecimiento del grupo bajo la acción divina.
- source_word: fill the earth
  english_pob_choice: fill the earth
  chosen_spanish: llenemos la tierra
  alternatives_spanish:
  - poblemos la tierra
  - llenemos la tierra de habitantes
  lexicon: llenar
  rationale: «Llenar la tierra» es la correspondencia más directa y transparente; preserva el ritmo bíblico sin añadir explicaciones que el texto no da.
theological_decisions:
- issue: Petición de bendición para descendencia y expansión humana
  english_pob_reading: But bless me and my sons, that we may increase and multiply and fill the earth.
  chosen_spanish_reading: Pero bendíceme a mí y a mis hijos, para que aumentemos, nos multipliquemos y llenemos la tierra.
  alternative_spanish_readings:
  - Pero bendícenos a mí y a mis hijos, para que aumentemos, nos multipliquemos y llenemos la tierra.
  - Pero bendíceme y bendice a mis hijos, para que aumentemos, nos multipliquemos y llenemos la tierra.
  rationale: El inglés POB entiende una sola súplica dirigida a Dios por el hablante y su descendencia. Mantener «bendíceme a mí y a mis hijos» conserva esa estructura y la intención de fertilidad/expansión sin introducir un cambio doctrinal o narrativo.
  doctrine_reference: Génesis 1:28; bendición de fecundidad y multiplicación
translation_notes:
  revision_awareness: La fuente ge'ez no está disponible en el paquete proporcionado (texto vacío), así que el borrador español se apoya en el texto inglés POB auditado y en la coherencia intrabíblica del pasaje, sin afirmar lecturas más allá de lo que ese testimonio permite.
  spanish_consistency_notes:
  - Se usa «bendíceme» como forma directa de súplica y «aumentemos / nos multipliquemos / llenemos» para mantener el paralelismo verbal.
  - Se evita «señor» o «SEÑOR» porque no aparece en el texto fuente provisto.
  - Se mantiene un español digno y bíblico, pero no arcaizante.
