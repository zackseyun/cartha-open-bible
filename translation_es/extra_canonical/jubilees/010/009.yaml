  text: And the chief of the spirits, Mastema, came and said, “Lord, Creator, let some of them remain before me, and let them listen to my voice and do all that I tell them; for if some of them are not left to me, I will not be able to exercise the authority of my will over the sons of men. For these are for corruption and for leading astray before my judgment, because the wickedness of the sons of men is great.”
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:51Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y el jefe de los espíritus, Mastema, vino y dijo: «Señor, Creador, deja que algunos de ellos permanezcan delante de mí, y que escuchen mi voz y hagan todo lo que yo les diga; porque, si no se me deja a algunos de ellos, no podré ejercer la autoridad de mi voluntad sobre los hijos de los hombres. Pues estos son para la corrupción y para extraviar ante mi juicio, porque grande es la maldad de los hijos de los hombres».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: chief of the spirits
  english_pob_choice: the chief of the spirits
  chosen_spanish: el jefe de los espíritus
  alternatives_spanish:
  - el príncipe de los espíritus
  - el principal de los espíritus
  lexicon: jefe
  rationale: El inglés POB conserva el título jerárquico sin suavizarlo. «Jefe» comunica mando y primacía de forma natural en español, sin introducir connotaciones eclesiásticas ajenas.
- source_word: Mastema
  english_pob_choice: Mastema
  chosen_spanish: Mastema
  alternatives_spanish:
  - Mastema
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio tal como aparece en la tradición textual y en el audit trail inglés, sin normalizarlo ni reemplazarlo por una glosa.
- source_word: Lord, Creator
  english_pob_choice: Lord, Creator
  chosen_spanish: Señor, Creador
  alternatives_spanish:
  - Señor y Creador
  - Soberano, Creador
  lexicon: κύριος / θεός como título
  rationale: El pedido directivo reproduce dos apelativos vocativos. «Señor, Creador» es una correspondencia sobria y transparente; se evita «Yahvé» porque el testimonio fuente aquí está mediado por el vocativo inglés y no por una cita explícita del nombre divino.
- source_word: let some of them remain before me
  english_pob_choice: let some of them remain before me
  chosen_spanish: deja que algunos de ellos permanezcan delante de mí
  alternatives_spanish:
  - deja que algunos de ellos queden ante mí
  - deja que algunos de ellos estén delante de mí
  lexicon: permanecer/estar delante
  rationale: «Permanecer delante de mí» conserva la imagen de presencia y disponibilidad personal, más cercana al valor del inglés que una paraphrasis como «a mi servicio».
- source_word: listen to my voice
  english_pob_choice: listen to my voice
  chosen_spanish: escuchen mi voz
  alternatives_spanish:
  - oigan mi voz
  - atiendan a mi voz
  lexicon: escuchar la voz
  rationale: La fórmula bíblica «escuchar la voz» es natural en español y retiene la idea de obediencia implícita al oír, sin explicitarla de más.
- source_word: do all that I tell them
  english_pob_choice: do all that I tell them
  chosen_spanish: hagan todo lo que yo les diga
  alternatives_spanish:
  - cumplan todo lo que yo les mande
  - hagan todo cuanto yo les ordene
  lexicon: mandato/obediencia
  rationale: «Decir» mantiene el registro del inglés POB, que no intensifica a «mandar» en esta cláusula. En español suena fluido y conserva la dependencia verbal.
- source_word: exercise the authority of my will
  english_pob_choice: exercise the authority of my will
  chosen_spanish: ejercer la autoridad de mi voluntad
  alternatives_spanish:
  - ejercer el poder de mi voluntad
  - hacer valer la autoridad de mi voluntad
  lexicon: autoridad de la voluntad
  rationale: Se conserva la formulación conceptual del inglés POB sin sustituirla por una abstracción interpretativa. «Autoridad de mi voluntad» es comprensible y mantiene la tensión entre poder y querer.
- source_word: sons of men
  english_pob_choice: sons of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los seres humanos
  - la humanidad
  lexicon: hijos de los hombres
  rationale: Se preserva la expresión semítica tradicional del original/audited wording, en vez de naturalizarla a «seres humanos», porque el POB inglés mantiene el giro literal y su valor literario.
- source_word: for corruption
  english_pob_choice: for corruption
  chosen_spanish: para la corrupción
  alternatives_spanish:
  - para corromper
  - para la ruina
  lexicon: corrupción
  rationale: «Corrupción» sigue el sustantivo del inglés y permite la lectura moral/espiritual sin forzar una explicación más específica que la fuente no da.
- source_word: for leading astray
  english_pob_choice: for leading astray
  chosen_spanish: para extraviar
  alternatives_spanish:
  - para desviar
  - para engañar
  lexicon: extraviar
  rationale: «Extraviar» es una equivalencia compacta que conserva la idea de apartar del camino correcto. Evita duplicar innecesariamente con «engañar» si el foco está en desorientar moralmente.
- source_word: before my judgment
  english_pob_choice: before my judgment
  chosen_spanish: antes de mi juicio
  alternatives_spanish:
  - delante de mi juicio
  - ante mi juicio
  lexicon: antes de/ante
  rationale: La preposición «antes de» sigue la textura del inglés POB. Aunque «ante» podría sonar más formal, aquí «antes de mi juicio» transmite bien la relación temporal/presencial sin oscurecerla.
- source_word: the wickedness of the sons of men is great
  english_pob_choice: the wickedness of the sons of men is great
  chosen_spanish: grande es la maldad de los hijos de los hombres
  alternatives_spanish:
  - la maldad de los hijos de los hombres es grande
  - es grande la maldad de los hijos de los hombres
  lexicon: maldad grande
  rationale: Se mantiene el orden enfático del inglés POB en una construcción igualmente natural en español, preservando el énfasis sobre la magnitud de la maldad.
theological_decisions:
- issue: Identidad y rango de Mastema
  english_pob_reading: the chief of the spirits, Mastema
  chosen_spanish_reading: el jefe de los espíritus, Mastema
  alternative_spanish_readings:
  - el principal de los espíritus, Mastema
  - el príncipe de los espíritus, Mastema
  rationale: La formulación conserva el estatus superior atribuido a Mastema sin resolverlo doctrinalmente en una categoría posterior. «Jefe» mantiene el sentido funcional de autoridad sin importar un título más técnico.
  doctrine_reference: angelología / demonología de 1 Enoc y Jubileos
- issue: Relación de la voluntad de Mastema con los seres humanos
  english_pob_reading: exercise the authority of my will over the sons of men
  chosen_spanish_reading: ejercer la autoridad de mi voluntad sobre los hijos de los hombres
  alternative_spanish_readings:
  - hacer valer la autoridad de mi voluntad sobre los hijos de los hombres
  - ejercer mi dominio sobre los hijos de los hombres
  rationale: Se evita reducir la frase a simple poder externo. La fuente presenta una autoridad vinculada a la voluntad de Mastema; la traducción conserva esa tensión para no borrar el matiz antropológico y moral.
  doctrine_reference: agencia espiritual y tentación humana
- issue: Finalidad moral de los espíritus
  english_pob_reading: for these are for corruption and for leading astray before my judgment
  chosen_spanish_reading: pues estos son para la corrupción y para extraviar antes de mi juicio
  alternative_spanish_readings:
  - pues estos son para corromper y para desviar ante mi juicio
  - pues estos son para ruina y para engañar antes de mi juicio
  rationale: 'La frase final mantiene la doble finalidad negativa: corrupción y extravío. No se atenúa a una lectura meramente psicológica; la traducción conserva la intención de daño moral activa que el texto atribuye a estos espíritus.'
  doctrine_reference: pecado, tentación y juicio divino
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el pasaje llegó con alta concordancia y sin cambios requeridos en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Mastema» como nombre propio invariable.
  - Se usa «los hijos de los hombres» de forma consistente para conservar el giro semítico del texto fuente.
  - «Señor» y «Creador» se conservan como vocativos separados, según la sintaxis del pasaje.
  - No se introduce «Mesías», «Cristo» ni «Yahvé» porque no aparecen en este versículo ni en el audit trail inglés proporcionado.
