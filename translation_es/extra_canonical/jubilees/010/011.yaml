base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/011.yaml
  text: 'He knew that they were not walking in uprightness and were not striving in righteousness. And we acted according to all his word: all the evil ones that were cruel we bound in the place of judgment, and a tenth of them'
  footnotes:
  - marker: '11'
    text: The Ethiopic at the start of v. 11 is difficult. The sense appears to be that Noah needed instruction because the spirits were not acting with strength/uprightness/righteousness. The translation renders the broader contextual sense rather than forcing each difficult clause woodenly.
    reason: segmentation_note
  - marker: a
    text: Or 'And one of us said that we should teach Noah all their medicines[11], because he knew'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:56Z'
    unchanged: false
    changes_summary: Completed the final clause by rendering ወዓሥራተሙ as 'and a tenth of them,' preserving the source text rather than leaving the sentence unfinished. No other changes made.
translation:
  language: es
  text: 'Él sabía que no caminaban en rectitud ni se esforzaban en justicia. Y actuamos conforme a toda su palabra: a todos los malvados que eran crueles los atamos en el lugar de juicio, y la décima parte de ellos.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ያአምር
  english_pob_choice: He knew
  chosen_spanish: Él sabía
  alternatives_spanish:
  - Él conocía
  - Sabía
  lexicon: saber
  rationale: El Ge'ez comienza con una afirmación simple de conocimiento; el audit trail corrigió una lectura previa más amplia y dejó solo 'He knew'. 'Sabía' expresa ese conocimiento directo sin añadir objeto no presente en el versículo.
- source_word: በርቱዕ
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - integridad
  - honradez
  - justeza
  lexicon: rectitud
  rationale: '''Rectitud'' conserva el valor moral y relacional del término sin forzar una imagen física (''andar derecho'') que el español podría sugerir de forma excesivamente literal.'
- source_word: ዘየሐውሩ
  english_pob_choice: walking
  chosen_spanish: caminaban
  alternatives_spanish:
  - andaban
  - iban
  lexicon: caminar
  rationale: Se conserva la metáfora de conducta como 'caminar', pero en español 'caminaban' funciona naturalmente y mantiene el sentido ético del original.
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  - justificación
  lexicon: justicia
  rationale: El contexto es de conducta ética y obediencia; 'justicia' transmite mejor el campo bíblico de conducta correcta que una traducción más teórica.
- source_word: ወገበርነ፡ ... ቃሉ
  english_pob_choice: And we acted according to all his word
  chosen_spanish: Y actuamos conforme a toda su palabra
  alternatives_spanish:
  - Y obramos según toda su palabra
  - Y hicimos conforme a toda su palabra
  lexicon: actuar conforme a
  rationale: '''Actuamos conforme a'' reproduce la obediencia descrita sin endurecer la frase. ''Palabra'' mantiene el referente al mandato o instrucción recibida.'
- source_word: እኩያነ
  english_pob_choice: evil ones
  chosen_spanish: malvados
  alternatives_spanish:
  - malos
  - malhechores
  - impíos
  lexicon: malvado
  rationale: '''Malvados'' conserva el sentido moral personal del término y evita neutralizar el juicio ético implícito en el contexto.'
- source_word: እለ፡ ይጸውጉ
  english_pob_choice: that were cruel
  chosen_spanish: que eran crueles
  alternatives_spanish:
  - que eran feroces
  - que eran violentos
  - que eran despiadados
  lexicon: cruel
  rationale: El inglés POB eligió 'cruel' y el español lo refleja directamente; es una manera clara de expresar la dureza y violencia del grupo sin añadir matices no atestiguados.
- source_word: አሰርነ፡
  english_pob_choice: we bound
  chosen_spanish: los atamos
  alternatives_spanish:
  - los sujetamos
  - los encadenamos
  - los apresamos
  lexicon: atar
  rationale: '''Atar'' es fiel al valor básico del verbo y suficiente para el acto punitivo descrito; no se introduce ''encadenar'' porque el original no lo especifica.'
- source_word: መካነ፡ ደይን
  english_pob_choice: place of judgment
  chosen_spanish: lugar de juicio
  alternatives_spanish:
  - lugar de condena
  - sitio de juicio
  - lugar del juicio
  lexicon: juicio
  rationale: '''Lugar de juicio'' conserva la formulación sobria del audit trail y permite la ambigüedad entre juicio como proceso o sentencia, sin explicitar más de lo que el texto dice.'
- source_word: ወዓሥራተሙ
  english_pob_choice: and a tenth of them
  chosen_spanish: y a la décima parte de ellos
  alternatives_spanish:
  - y a un décimo de ellos
  - y la décima parte de ellos
  lexicon: décima parte
  rationale: La revisión aprobada completó el segmento final como 'and a tenth of them'. En español, 'a la décima parte de ellos' preserva el valor partitivo y la incompletitud relativa del cierre versicular sin añadir un verbo inexistente.
theological_decisions:
- issue: Conocimiento previo de Noé sin expandir a un objeto no atestiguado
  english_pob_reading: He knew
  chosen_spanish_reading: Él sabía
  alternative_spanish_readings:
  - Él conocía
  - Sabía que
  rationale: La revisión del audit trail descartó la frase extensa sobre 'medicines' por pertenecer al versículo anterior. Por eso el español se limita al conocimiento expresado en el inicio del versículo, sin introducir contenido extra.
  doctrine_reference: Transparencia textual y respeto al alcance inmediato del verso
- issue: Relación entre 'uprightness' y 'righteousness' como par ético
  english_pob_reading: not walking in uprightness and were not striving in righteousness
  chosen_spanish_reading: no caminaban en rectitud ni se esforzaban en justicia
  alternative_spanish_readings:
  - no andaban en integridad ni procuraban justicia
  - no vivían rectamente ni buscaban justicia
  rationale: Se conserva el paralelismo ético del original. 'Caminaban' y 'se esforzaban' mantienen la imagen verbal, mientras 'rectitud' y 'justicia' preservan la doble dimensión moral sin sobreinterpretarla.
  doctrine_reference: Ética bíblica y paralelismo semítico
- issue: Alcance de 'a tenth of them' en un cierre fragmentario
  english_pob_reading: and a tenth of them
  chosen_spanish_reading: y a la décima parte de ellos
  alternative_spanish_readings:
  - y un décimo de ellos
  - y a la décima parte de ellos los ...
  rationale: La fuente termina con una expresión incompleta en el verso proporcionado; el español debe reflejar esa clausura sin inventar una continuación. La forma elegida conserva el fragmento cuantitativo de manera legible.
  doctrine_reference: Fidelidad textual frente a completación inferida
translation_notes:
  revision_awareness: The English audit trail shows one revision removing an erroneous phrase about teaching Noah 'all their medicines' from v. 11 because it belongs to the previous verse; the final accepted reading is simply 'He knew...'. Another revision completed the verse with 'and a tenth of them,' which is reflected here as a literal fragmentary ending. No unanchored footnotes are included because the prior validation failure was caused by a marker not present in the text.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque no aparece aquí ningún Tetragrámaton ni cita directa del nombre divino.
  - Se usa 'justicia' en sentido ético, no como término técnico de doctrina de justificación.
  - La sintaxis mantiene la estructura de dos miembros paralelos antes de la cláusula narrativa final.
  - No se añade puntuación explicativa ni glosas que expandan el alcance del verso.
