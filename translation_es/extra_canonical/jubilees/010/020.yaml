translation:
  language: es
  text: Y comenzaron a construir, y en la cuarta semana hicieron ladrillos con fuego, y los ladrillos les sirvieron de piedra, y el barro con que los revocaron era asfalto que sale del mar y de los manantiales de agua en la tierra de Sinar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአንዙ፡ ይሕንጹ፡
  english_pob_choice: And they began to build
  chosen_spanish: Y comenzaron a construir
  alternatives_spanish:
  - Y empezaron a edificar
  - Y comenzaron a edificar
  lexicon: Ge'ez ይሕንጹ ('to build')
  rationale: ‘Comenzaron’ reproduce el inicio aspectual. ‘Construir’ suena natural en español y evita una calca rígida; ‘edificar’ también es posible, pero es más marcado y menos neutral.
- source_word: በሱባዔ፡ ራብዕ፡
  english_pob_choice: in the fourth week
  chosen_spanish: en la cuarta semana
  alternatives_spanish:
  - durante la cuarta semana
  - en la semana cuarta
  lexicon: Ge'ez ሱባዔ ('week')
  rationale: Se conserva el valor temporal exacto con ‘cuarta semana’. La preposición ‘en’ refleja el marco narrativo del original.
- source_word: ንንፈሱ፡ በእሳት፡
  english_pob_choice: they made brick with fire
  chosen_spanish: hicieron ladrillo con fuego
  alternatives_spanish:
  - fabricaron ladrillo con fuego
  - cocieron ladrillos con fuego
  lexicon: Ge'ez ንንፈሱ ('brick') + በእሳት ('with fire')
  rationale: Se mantiene la expresión directa del texto y la fuerza material del proceso. ‘Hicieron ladrillo con fuego’ sigue la audacia de la fuente sin explicarla en exceso.
- source_word: ወከኖሙ፡ ንንፋስ፡ ከመ፡ እብን፡
  english_pob_choice: the bricks served them as stone
  chosen_spanish: y los ladrillos les sirvieron como piedra
  alternatives_spanish:
  - y los ladrillos les sirvieron de piedra
  - y los ladrillos fueron para ellos como piedra
  lexicon: Ge'ez ከመ ('as/like') + እብን ('stone')
  rationale: ‘Servir como’ transmite la comparación funcional del original. ‘Piedra’ conserva la imagen léxica sin suavizarla.
- source_word: ዘይመርጉ፡ ሱቱ፡ አስፋሌጦስ፡
  english_pob_choice: the clay with which they plastered was asphalt
  chosen_spanish: el barro con que los revocaron era asfalto
  alternatives_spanish:
  - el barro con que los enlucieron era asfalto
  - el barro con que los revistieron era asfalto
  lexicon: Ge'ez ሱቱ ('plaster/clay') + አስፋሌጦስ ('asphalt')
  rationale: ‘Revocaron’ mantiene la idea de cubrir una pared con barro/mezcla. ‘Asfalto’ sigue el equivalente ya fijado por la POB inglesa y es inteligible en español contemporáneo.
- source_word: ዘይወፅእ፡ እምነ፡ ባሕር፡ ወእምአንቅዐተ፡
  english_pob_choice: that comes out of the sea and from the springs of water
  chosen_spanish: que sale del mar y de los manantiales de agua
  alternatives_spanish:
  - que sale del mar y de las fuentes de agua
  - que brota del mar y de los manantiales de agua
  lexicon: Ge'ez ባሕር ('sea') + አንቅዐተ ('springs')
  rationale: ‘Sale’ reproduce el movimiento de procedencia sin añadir interpretación. ‘Manantiales de agua’ conserva la explicitud de la fuente; ‘fuentes’ sería más breve, pero menos transparente.
- source_word: ዘይወፅእ፡ እምነ፡ ባሕር፡
  english_pob_choice: that comes out of the sea
  chosen_spanish: que sale del mar
  alternatives_spanish:
  - que procede del mar
  - que brota del mar
  lexicon: Ge'ez ወፅአ ('come out')
  rationale: ‘Sale’ es la opción más neutral y fiel para la procedencia física indicada por la fuente.
- source_word: አንቅዐተ
  english_pob_choice: springs of water
  chosen_spanish: manantiales de agua
  alternatives_spanish:
  - fuentes de agua
  - ojos de agua
  lexicon: Ge'ez አንቅዐተ ('springs')
  rationale: ‘Manantiales de agua’ es claro y de registro bíblico contemporáneo; evita ambigüedad geográfica y mantiene la imagen natural.
- source_word: ሱባዔ፡ ራብዕ፡
  english_pob_choice: the fourth week
  chosen_spanish: la cuarta semana
  alternatives_spanish:
  - la semana cuarta
  lexicon: Ge'ez ራብዕ ('fourth')
  rationale: Orden natural en español; no se altera el contenido numérico.
theological_decisions:
- issue: Tratamiento de la creación humana de ladrillo y asfalto en una narrativa histórica antigua
  english_pob_reading: Plain historical description with no added doctrinal gloss
  chosen_spanish_reading: Descripción histórica llana, sin glosa doctrinal añadida
  alternative_spanish_readings:
  - Relato figurado
  - Texto etiológico
  rationale: La fuente presenta una descripción material concreta del trabajo de construcción. La traducción no introduce simbolismo ni explicación teológica no señalada por el texto.
  doctrine_reference: Principio de sobriedad histórica del texto; no aplica doctrina dogmática específica
- issue: ‘Asphalt’ as a material term
  english_pob_reading: asphalt
  chosen_spanish_reading: asfalto
  alternative_spanish_readings:
  - betún
  - brea
  rationale: ‘Asfalto’ coincide con la opción auditada en inglés y es comprensible en español moderno. ‘Betún’ o ‘brea’ podrían sugerir matices distintos y no son necesarios aquí.
  doctrine_reference: No aplica
- issue: ‘Sea’ and ‘springs of water’ as source locations
  english_pob_reading: that comes out of the sea and from the springs of water in the land of Shinar
  chosen_spanish_reading: que sale del mar y de los manantiales de agua en la tierra de Sinar
  alternative_spanish_readings:
  - que sale del mar y de las fuentes de agua en la tierra de Sinar
  rationale: Se conserva la procedencia doble sin armonizarla ni resolverla. No se sustituye ‘Sinar’ por un topónimo moderno, porque el texto lo nombra como designación antigua.
  doctrine_reference: Respeto del referente geográfico bíblico; no hay implicación doctrinal especial
translation_notes:
  revision_awareness: El audit trail inglés indica unchanged=true y cross-check high_agreement/agreement=1.0, sin revisiones aplicadas. Por ello, el borrador español sigue de cerca la lectura aprobada, con ajustes únicamente de naturalidad y claridad en español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - ‘Sinar’ se conserva como topónimo tradicional del corpus bíblico.
  - No se introduce ‘Cristo’, ‘Mesías’, ni terminología teológica ajena al texto.
  - La metáfora material ‘ladrillo... como piedra’ se conserva sin suavizarse.
