base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/026.yaml
  text: And the Lord sent a mighty wind against the tower, and overthrew it upon the earth, and behold,
  footnotes:
  - marker: a
    text: Or 'into the storehouse, and it cast them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:57Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Geʽez text: ''the Lord sent,'' ''a mighty wind,'' ''into the storehouse,'' ''and it cast them upon the earth,'' and retained the final ''and behold,'' which is present in the source.'
translation:
  language: es
  text: Y Yahvé envió un viento poderoso contra la torre, y la derribó sobre la tierra, y he aquí,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase queda suspendida en este punto del texto fuente; el versículo termina con una fórmula de atención equivalente a 'y he aquí', dejando abierto lo que sigue.
    reason: Explicar el cierre abrupto del versículo sin introducir una falsa variante.
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: YHWH
  rationale: La convención del proyecto para el nombre divino es 'Yahvé'. Aunque el inglés POB dice 'the Lord', el texto geʽez representa el nombre divino; en español se evita la sustitución reverencial por 'el Señor' para mantener la transparencia del texto fuente.
- source_word: ነፋሰ፡ ዐቢየ፡
  english_pob_choice: a mighty wind
  chosen_spanish: un gran viento
  alternatives_spanish:
  - un viento poderoso
  - un viento fuerte
  lexicon: רוּחַ / viento
  rationale: '''Grande'' comunica el rasgo de intensidad de manera natural en español y mantiene el sentido de un viento extraordinario o poderoso sin añadir matices innecesarios.'
- source_word: ውስተ፡ ማኅፈድ
  english_pob_choice: against the tower
  chosen_spanish: contra la torre
  alternatives_spanish:
  - sobre la torre
  - contra ella
  lexicon: preposición + sustantivo
  rationale: El contexto revisado indica que ማኅፈድ significa 'torre' y que la relación espacial se entiende mejor como 'contra'. 'Contra la torre' refleja el impacto directo y evita seguir la lectura errónea de 'storehouse'.
- source_word: ወገፍታአ፡
  english_pob_choice: and overthrew it
  chosen_spanish: y la derribó
  alternatives_spanish:
  - y la volteó
  - y la hizo caer
  lexicon: verbo de derribo/volteo
  rationale: '''Derribó'' expresa bien el colapso de la torre en español. Se conserva la acción transitiva sobre la torre, coherente con la corrección textual del audit trail.'
- source_word: ውስተ፡ ምድር፡
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - a tierra
  - en la tierra
  lexicon: literal spatial preposition
  rationale: '''Sobre la tierra'' sigue de cerca el valor de caída hacia la tierra y coincide con el tono del inglés POB sin sonar artificial.'
- source_word: ወናሁ
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí, pues
  lexicon: formula de atención
  rationale: '''Y he aquí'' es la forma española más estable para esta fórmula narrativa y preserva el cierre abrupto del versículo tal como aparece en la fuente.'
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: El texto base geʽez usa el nombre divino, y la política del proyecto manda representarlo como 'Yahvé'. Esto mantiene la transparencia respecto al original y evita una convención eclesiástica de ocultamiento del nombre.
  doctrine_reference: Éxodo 3:15; convención editorial POB para YHWH
- issue: Naturaleza de la acción sobre la torre
  english_pob_reading: against the tower, and overthrew it
  chosen_spanish_reading: contra la torre, y la derribó
  alternative_spanish_readings:
  - sobre la torre, y la volteó
  - contra la torre, y la hizo caer
  rationale: La revisión textual corrige una lectura previa errónea. El sentido reconocido por el audit trail es que el viento actúa contra la torre y la derriba; la traducción conserva esa relación sin suavizar el colapso.
  doctrine_reference: Ninguna especial; decisión textual y semántica
translation_notes:
  revision_awareness: La base inglesa fue revisada desde una lectura equivocada de 'storehouse' y de un objeto plural implícito a la corrección documentada 'against the tower, and overthrew it'. La versión española sigue esa revisión y evita reproducir la lectura descartada. También conserva la clausula final abierta 'and behold' del texto fuente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino según la convención del proyecto.
  - Se evita 'SEÑOR' como máscara reverencial.
  - '''Torre'' refleja la revisión textual más reciente y el consenso del audit trail.'
  - La fórmula final se deja abierta con 'y he aquí' para respetar el corte del verso.
