  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: ''Yahvé'' respeta la política del nombre divino; ''torre'', ''derribó'' y ''tierra'' preservan el sentido revisado. No hay conflicto terminológico mayor.'
