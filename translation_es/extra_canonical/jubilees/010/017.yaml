base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/017.yaml
  text: nineteen jubilees and two weeks of years and five years. And during his life on the earth he surpassed the sons of men[17], except Enoch, because of the righteousness in which he was perfect. For Enoch was appointed as a testimony for the generations of the world, to recount all the deeds of generation after generation until the day of judgment.
  footnotes:
  - marker: '17'
    text: The phrase about Enoch is textually dense. The translation understands it to mean that Noah surpassed all other humans in lifespan except Enoch, while Enoch's distinctive role was as a witness for future generations until the day of judgment.
    reason: alternative_reading
  - marker: a
    text: Or 'sign'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:58Z'
    unchanged: false
    changes_summary: Changed 'in his life' to 'during his life' for more natural English; revised 'Enoch’s task was ordained as a testimony' to the more direct and source-faithful 'Enoch was appointed as a sign'; retained the rest with minor smoothing.
translation:
  language: es
  text: diecinueve jubileos, dos semanas de años y cinco años. Y durante su vida en la tierra superó a los hijos de los hombres, excepto Enoc[17], por causa de la justicia en la que fue perfecto. Porque Enoc fue establecido como testimonio para las generaciones del mundo, para relatar todas las obras de generación tras generación hasta el día del juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '17'
    text: El pasaje sobre Enoc es textualmente denso. La traducción entiende que Noé superó a todos los demás humanos en duración de vida, excepto Enoc, mientras que la función distintiva de Enoc fue la de testimonio para las generaciones futuras hasta el día del juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: ጽድቅ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: Lexical rendering based on the source term for covenantal/moral rightness.
  rationale: En este contexto, la palabra corresponde mejor a 'justicia' por su fuerza moral y relacional en español bíblico; 'rectitud' es posible, pero aquí 'justicia' conserva mejor el valor evaluativo del texto sin volverlo técnico en exceso.
- source_word: ፍጹመ
  english_pob_choice: perfect
  chosen_spanish: fue perfecto
  alternatives_spanish:
  - fue completo
  - fue íntegro
  lexicon: Lexical rendering for completeness/perfection.
  rationale: '''Perfecto'' refleja de manera directa el valor del adjetivo en el texto y mantiene la tensión clásica del enunciado; ''íntegro'' o ''completo'' suavizan la afirmación y desplazan el foco lexical.'
- source_word: ስምዕ
  english_pob_choice: testimony / sign (audit trail notes lexical tension)
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - señal
  lexicon: The source term denotes witness/testimony rather than a generic sign.
  rationale: Aunque el inglés POB revisado osciló entre 'sign' y 'testimony', la revisión crítica incluida en el expediente señala que el ge'ez ስምዕ significa 'testimonio' o 'witness'. Por eso se eligió 'testimonio' en el texto principal y se evita 'señal' como traducción principal.
- source_word: ኵሎ፡ ግብረ፡ ለትውልደ፡
  english_pob_choice: all the deeds of generation after generation
  chosen_spanish: todas las obras de generación tras generación
  alternatives_spanish:
  - todos los hechos de generación tras generación
  - todas las acciones de generación en generación
  lexicon: Deeds/works/acts in a historical-recounting sense.
  rationale: '''Obras'' conserva el carácter de acciones realizadas y encaja con el registro bíblico; ''hechos'' también sería posible, pero ''obras'' mantiene mejor la cadencia del texto y su amplitud semántica.'
- source_word: በእንተ፡
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: Causal preposition expressing the ground for superiority.
  rationale: '''Por causa de'' reproduce con claridad la relación causal sin sonar excesivamente literal ni sustituir la motivación moral del texto.'
theological_decisions:
- issue: Enoc como testimonio para las generaciones del mundo
  english_pob_reading: Enoch was appointed as a sign/testimony for the generations of the world, to recount all the deeds of generation after generation until the day of judgment.
  chosen_spanish_reading: Enoc fue establecido como testimonio para las generaciones del mundo, para relatar todas las obras de generación tras generación hasta el día del juicio.
  alternative_spanish_readings:
  - Enoc fue puesto como señal para las generaciones del mundo
  - Enoc fue nombrado como testigo para las generaciones del mundo
  rationale: El expediente de revisión indica que 'sign' es una lectura menos precisa que 'testimony/witness' para ስምዕ. Por eso el español principal usa 'testimonio', preservando la función de Enoc como figura que da testimonio histórico y moral a las generaciones futuras, sin borrar la posible resonancia de testigo personal.
  doctrine_reference: Jubileos 10:17; revisión lexical del término ge'ez ስምዕ en el expediente de auditoría
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que suavizó 'in his life' a 'during his life' y reemplazó una formulación más interpretativa por otra más directa. También se incorporó la revisión lexical posterior que corrige 'sign' a 'testimony' para el ge'ez ስምዕ, evitando arrastrar al español una equivalencia que el expediente mismo considera imprecisa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto para el nombre divino, aunque este versículo no lo contiene.
  - Se usa 'Enoc' y no 'Henoc' para mantener consistencia con el expediente en español contemporáneo.
  - '''Justicia'' y ''perfecto'' conservan el tono bíblico sin forzar una paráfrasis explicativa.'
  - La nota 17 se ancla en 'vida en la tierra' para reflejar la densidad textual señalada por el auditor, sin alterar el flujo principal del versículo.
