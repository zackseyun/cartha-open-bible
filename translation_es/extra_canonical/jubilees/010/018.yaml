base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/018.yaml
  text: And in the thirty-third jubilee, in the first year of the second week, Peleg took for himself a wife whose name was Lomna, daughter of Shinar, and she bore him a son in the fourth year of this week. And he called his name Reu, for he said, “Behold, the children of men have become evil through the counsel of wickedness to build for themselves a city and a tower in the land of Shinar.”
  footnotes:
  - marker: a
    text: Or 'in the land.'.
    reason: previous_rendering
  - marker: b
    text: Or 'counsel of wickedness, to build'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:58Z'
    unchanged: false
    changes_summary: Changed 'Sinaar' to 'Shinar' for consistency with the source name; rendered 'Look' as 'Behold' for a more formal register; translated the final clause more literally as 'through the counsel of wickedness' and retained 'in the land' rather than adding 'of Shinar,' which is not present in the source text here.
translation:
  language: es
  text: 'Y en el trigésimo tercer jubileo, en el primer año de la segunda semana, Peleg tomó para sí una esposa, cuyo nombre era Lomna, hija de Shinar, y ella le dio a luz un hijo en el cuarto año de esta semana. Y llamó su nombre Reu, porque dijo: «He aquí, los hijos de los hombres se han vuelto malos por el consejo de la maldad, para edificarse una ciudad y una torre en la tierra[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la tierra de Shinar».
    reason: textual_variant
lexical_decisions:
- source_word: ትውልድ፡ ለዕለተ፡ ደይን
  english_pob_choice: And in the thirty-third jubilee, in the first year of the second week
  chosen_spanish: Y en el trigésimo tercer jubileo, en el primer año de la segunda semana
  alternatives_spanish:
  - Y en el jubileo treinta y tres, en el primer año de la segunda semana
  - Y en el trigésimo tercer jubileo, en el primer año de la segunda hebdómada
  lexicon: jubileo / semana
  rationale: El ge'ez corresponde al marco cronológico técnico de Jubileos; 'jubileo' y 'semana' comunican el sistema del libro con claridad natural en español.
- source_word: ፋሌክ
  english_pob_choice: Peleg
  chosen_spanish: Peleg
  alternatives_spanish:
  - Péleg
  lexicon: nombre propio
  rationale: Se conserva la forma del nombre usada en la tradición textual base en inglés, evitando una adaptación no atestiguada por el audit trail.
- source_word: ብእሲተ
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  - una esposa para sí
  lexicon: esposa
  rationale: El contexto matrimonial exige 'esposa'; 'mujer' sería más ambiguo en español.
- source_word: ሎምና፡ ወለተ፡ ሲናአር
  english_pob_choice: whose name was Lomna, daughter of Shinar
  chosen_spanish: cuyo nombre era Lomna, hija de Shinar
  alternatives_spanish:
  - que se llamaba Lomna, hija de Shinar
  - de nombre Lomna, hija de Shinar
  lexicon: nombre propio / filiación
  rationale: Mantiene la filiación explícita del texto y la forma formal del inglés revisado, sin añadir identificación adicional.
- source_word: ወለደት
  english_pob_choice: she bore him a son
  chosen_spanish: ella le dio a luz un hijo
  alternatives_spanish:
  - ella le parió un hijo
  - ella le tuvo un hijo
  lexicon: dar a luz
  rationale: '''Dar a luz'' es claro, digno y fiel al sentido de parto del verbo.'
- source_word: ራገው
  english_pob_choice: Reu
  chosen_spanish: Reu
  alternatives_spanish:
  - Ragau
  lexicon: nombre propio
  rationale: Se sigue la forma del nombre adoptada en el texto inglés POB, que la trata como nombre propio fijo.
- source_word: ውሉደ፡ ሰብእ
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos de los seres humanos
  - los hombres
  lexicon: expresión idiomática
  rationale: La expresión preserva el giro semítico del original y del inglés POB sin volverla genérica en exceso.
- source_word: እኩያነ
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - perversos
  lexicon: maldad
  rationale: '''Malos'' reproduce el adjetivo moral de forma directa; la frase siguiente ya explicita ''maldad''.'
- source_word: በምክረ፡ ዐግ
  english_pob_choice: through the counsel of wickedness
  chosen_spanish: por el consejo de la maldad
  alternatives_spanish:
  - mediante el consejo de la maldad
  - a causa del consejo de la maldad
  lexicon: consejo / maldad
  rationale: '''Consejo'' conserva la fuerza deliberativa del sustantivo; ''maldad'' traduce el genitivo cualitativo sin suavizarlo.'
- source_word: ከመ፡ ይሕንፁ፡ ሎሙ፡ ሀገረ፡ ወማኅፈደ፡
  english_pob_choice: to build for themselves a city and a tower
  chosen_spanish: para edificarse una ciudad y una torre
  alternatives_spanish:
  - para construir para sí una ciudad y una torre
  - para edificar para sí una ciudad y una torre
  lexicon: edificar / construir
  rationale: '''Edificarse'' refleja el reflexivo de finalidad del original; ''edificar'' mantiene el tono elevado del texto.'
- source_word: ውስተ፡ ምድረ
  english_pob_choice: in the land of Shinar / in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra de Shinar
  - en el país
  lexicon: landa / tierra
  rationale: Dado que el audit trail inglés revisado retuvo 'in the land' sin explicitar 'of Shinar', se conserva la forma abierta 'en la tierra' y se evita añadir una especificación no presente en la línea inglesa final. La nota permite reconocer la variante constructiva discutida.
theological_decisions:
- issue: El alcance de la expresión final sobre la ubicación
  english_pob_reading: retained 'in the land' rather than adding 'of Shinar,' which is not present in the source text here
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - en la tierra de Shinar
  - en el país de Shinar
  rationale: Se respeta la lectura revisada del POB inglés que no añade una especificación ausente en esa línea, aunque el trasfondo de Jubileos y la revisión gramatical discuten la posibilidad constructa. La nota deja visible la tensión textual sin resolverla artificialmente.
  doctrine_reference: Crítica textual y sintaxis del pasaje
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que cambió 'Look' por 'Behold', ajustó el nombre 'Sinaar' a 'Shinar', y luego recibió una revisión gramatical que argumentó por 'in the land of Shinar' debido al estado constructo del ge'ez. La presente versión española sigue la forma final inglesa en el cuerpo ('en la tierra') para no añadir lo que esa línea inglesa no muestra, pero anota la variante textual/gramatical en nota.
  spanish_consistency_notes:
  - Se mantiene 'jubileo' y 'semana' para el marco cronológico técnico del libro.
  - '''Yahvé'' no aparece en este versículo; no aplica terminología divina.'
  - Se conserva el registro formal con 'He aquí' para reflejar 'Behold'.
  - '''Maldad'' se usa de modo sustantivo y adjetival para reproducir la densidad moral del original sin introducir una glosa interpretativa.'
  - La nota [a] está anclada explícitamente en 'la tierra' para evitar el error de marcador no presente en el texto.
