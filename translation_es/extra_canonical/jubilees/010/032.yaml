translation:
  language: es
  text: ¡Maldito eres tú, y maldito serás más que todos los hijos de Noé, por la maldición con la que nos comprometimos por juramento delante del santo juez y delante de Noé, nuestro padre!
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ርጉም / cursed
  english_pob_choice: Cursed are you / cursed shall you be
  chosen_spanish: ¡Maldito eres tú, y maldito serás!
  alternatives_spanish:
  - ¡Maldición sobre ti!
  - ¡Eres maldito, y maldito serás!
  lexicon: maldecir / maldito
  rationale: El etíope expresa un estado de maldición sobre la persona, no solo un deseo imprecatorio. «Maldito» conserva la fuerza adjetival y formula el paralelismo con claridad en español.
- source_word: ἐ/እምኵሎሙ ውሉደ ኖኅ / beyond all the sons of Noah
  english_pob_choice: beyond all the sons of Noah
  chosen_spanish: más que todos los hijos de Noé
  alternatives_spanish:
  - por encima de todos los hijos de Noé
  - entre todos los hijos de Noé
  lexicon: comparative particle / hierarchy expression
  rationale: La frase establece una comparación de grado en la maldición; «más que» expresa naturalmente la idea de superación o intensificación sin añadir sentido ajeno al texto.
- source_word: በመርገም / by the curse
  english_pob_choice: by the curse
  chosen_spanish: por la maldición
  alternatives_spanish:
  - con la maldición
  - mediante la maldición
  lexicon: curse / oath-curse formula
  rationale: En español, «por» introduce bien el medio o fundamento de la maldición; sin embargo, para mantener la relación instrumental del original y evitar sobreexplicar, se prefirió la formulación «por la maldición con que...», que conserva el valor causal/instrumental.
- source_word: ተማራዕነ፡ በመሐላ / we bound ourselves by an oath
  english_pob_choice: with which we bound ourselves by an oath
  chosen_spanish: con que nos obligamos con juramento
  alternatives_spanish:
  - por la cual nos comprometimos con juramento
  - con la cual nos atamos por juramento
  lexicon: bind ourselves by an oath / oath-binding
  rationale: «Nos obligamos con juramento» refleja la autoimposición solemne del pacto verbal. «Obligamos» comunica el acto de vincularse legalmente y es más idiomático que un calco de «atarse».
- source_word: ማኅደረ፡ ሴም / the holy judge and before Noah our father
  english_pob_choice: before the holy judge and before Noah our father
  chosen_spanish: delante del santo juez y delante de Noé, nuestro padre
  alternatives_spanish:
  - ante el santo juez y ante Noé, nuestro padre
  - en presencia del santo juez y de Noé, nuestro padre
  lexicon: before / in presence of
  rationale: «Delante de» conserva el sentido espacial-ceremonial de comparecer ante una autoridad. Se mantiene «santo juez» porque el texto lo presenta como título reverente sin necesidad de sustituirlo por una fórmula eclesiástica.
theological_decisions:
- issue: Characterization of the addressee as accursed and the comparative curse beyond the sons of Noah
  english_pob_reading: Cursed are you, and cursed shall you be beyond all the sons of Noah
  chosen_spanish_reading: ¡Maldito eres tú, y maldito serás más que todos los hijos de Noé!
  alternative_spanish_readings:
  - ¡Maldito eres tú, y maldito serás por encima de todos los hijos de Noé!
  - ¡Maldito eres tú, y maldito serás entre todos los hijos de Noé!
  rationale: La traducción conserva el doble golpe de la maldición y su intensificación comparativa. No se suaviza ni se interpreta moralmente; se mantiene el tono judicial-ritual del pasaje.
  doctrine_reference: Jubilees 10:32; formula de maldición solemne en contexto de juramento
- issue: Nature of the oath-bound curse before God and Noah
  english_pob_reading: by the curse with which we bound ourselves by an oath before the holy judge and before Noah our father
  chosen_spanish_reading: por la maldición con que nos obligamos con juramento delante del santo juez y delante de Noé, nuestro padre
  alternative_spanish_readings:
  - por la maldición con la cual nos comprometimos bajo juramento ante el santo juez y ante Noé, nuestro padre
  - por el juramento con que nos atamos a esta maldición delante del santo juez y delante de Noé, nuestro padre
  rationale: Se preserva que la maldición está ligada a un juramento previo y a una comparecencia solemne. «Nos obligamos con juramento» evita banalizar la seriedad jurídica del acto y mantiene la relación entre juramento y maldición.
  doctrine_reference: Jubilees 10:32; juramento solemne ante autoridad divina y patriarcal
translation_notes:
  revision_awareness: 'La versión inglesa auditada recibió una revisión menor: se ajustó el orden para mayor formalidad («cursed shall you be») y se cambió ''by which'' por ''with which'' para naturalidad idiomática sin alterar el sentido. La propuesta española sigue esa lectura formal y conserva el paralelismo, la intensificación comparativa y la fórmula juramentada del original ge''ez.'
  spanish_consistency_notes:
  - Se usa «maldito» para mantener la fuerza declarativa del texto, en paralelo con la traducción inglesa auditada.
  - Se mantiene «Noé» y no se introduce terminología eclesiástica para «santo juez», ya que el original presenta un título reverente sin especificación doctrinal adicional.
  - No se añaden notas de pie porque el texto español no requiere variantes textuales o léxicas adicionales para esta línea.
