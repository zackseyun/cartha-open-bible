translation:
  language: es
  text: En rebelión has vivido, y en rebelión caerán tus hijos, y serás arrancado para siempre. No habites.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּהַקַק / ba-hakaka
  english_pob_choice: In rebellion
  chosen_spanish: en rebelión
  alternatives_spanish:
  - en sedición
  - en tu morada
  lexicon: N/A
  rationale: La revisión del POB corrigió la lectura errónea de ‘dwelling’ y estableció el sentido de rebelión/sedición; ‘en rebelión’ conserva el valor abstracto y el paralelismo del versículo.
- source_word: חָדַרְכֶּם / ḫadarkəmu
  english_pob_choice: you have dwelt
  chosen_spanish: has habitado
  alternatives_spanish:
  - habitas
  - has vivido
  lexicon: N/A
  rationale: 'El pasivo/estado narrativo se expresa en español natural con perfecto: ‘has habitado’, que refleja la acción ya realizada y evita el futuro incorrecto.'
- source_word: דְּקִיק / children
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus descendientes
  - tus niños
  lexicon: N/A
  rationale: ‘Hijos’ es la forma directa y fiel para los descendientes del destinatario; mantiene el paralelismo con ‘caerán’.
- source_word: וַתִּסֵּר / wa-təsser
  english_pob_choice: you will be uprooted
  chosen_spanish: serás arrancado
  alternatives_spanish:
  - serás desarraigado
  - serás extirpado
  lexicon: N/A
  rationale: ‘Arrancado’ comunica la imagen de ser quitado de raíz, respetando el sentido de uprooted/eradicated sin sobretraducir.
- source_word: אִתְחַדַּר / do not dwell
  english_pob_choice: Do not dwell
  chosen_spanish: No habites
  alternatives_spanish:
  - No vivas
  - No permanezcas
  lexicon: N/A
  rationale: La prohibición final se mantiene en modo imperativo negativo, con un verbo que conserva el eco verbal del texto y su fuerza exhortativa.
theological_decisions:
- issue: Caída de los hijos en rebelión
  english_pob_reading: and in rebellion your children will fall
  chosen_spanish_reading: y en rebelión caerán tus hijos
  alternative_spanish_readings:
  - y tus hijos caerán en rebelión
  - y por la rebelión caerán tus hijos
  rationale: Se conserva la repetición de ‘en rebelión’ como marco causal o locativo del juicio, sin suavizar la dureza del enunciado.
  doctrine_reference: Juicio corporativo y consecuencias generacionales en lenguaje sapiencial/narrativo
- issue: Arrancado para siempre
  english_pob_reading: you will be uprooted forever
  chosen_spanish_reading: serás arrancado para siempre
  alternative_spanish_readings:
  - serás desarraigado para siempre
  - serás extirpado para siempre
  rationale: ‘Arrancado’ preserva la metáfora vegetal del desarraigo y la permanencia (‘para siempre’), sin introducir una explicación interpretativa adicional.
  doctrine_reference: Imagen de expulsión definitiva y juicio irreversible
translation_notes:
  revision_awareness: La revisión más reciente corrigió una mala lectura de la frase inicial como ‘dwelling’ y señaló explícitamente que el texto habla de ‘rebellion’, además de la necesidad de mantener el perfecto ‘you have dwelt’, la caída de los hijos y la cláusula final ‘you will be uprooted forever’. Esta versión sigue esa corrección y evita introducir nombres o elementos ausentes del griego/geʿez.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro, no arcaizante.
  - ‘En rebelión’ se usa de forma consistente para la primera y segunda ocurrencia del término.
  - No se añade contenido inexistente como ‘Shem’ o ‘por suerte/lote’.
  - La frase final ‘No habites’ reproduce la prohibición breve del original sin expandirla.
