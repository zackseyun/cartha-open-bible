revisions:
- from: En rebelión has habitado, y en rebelión caerán tus hijos, y serás arrancado para siempre. No habites.
  to: En rebelión has vivido, y en rebelión caerán tus hijos, y serás arrancado para siempre. No habites.
  rationale: Se ajusta levemente la redacción para mejorar la naturalidad del español y mantener una línea de segunda persona singular consistente y digna. No se cambia el sentido establecido por la revisión inglesa ni se añaden notas, porque no hay una ambigüedad nueva en español que lo requiera.
