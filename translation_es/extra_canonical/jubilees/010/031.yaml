review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente la lectura revisada del POB inglés: ‘en rebelión’, perfecto para la primera cláusula, caída de los hijos, desarraigo permanente y prohibición final. Sin embargo, la concordancia verbal en español no es internamente coherente: ‘has habitado’ es segunda persona singular, mientras que ‘serás arrancado’ y ‘No habites’ también son singulares, pero la fuente/inglés parecen dirigirse a un destinatario plural en la forma verbal subyacente según el expediente. Dado que el español actual mezcla además un singular íntimo con un tono genérico, conviene regularizar la línea para una lectura digna y natural.'
  spanish_quality_summary: El texto es claro y legible, pero ‘has habitado’ suena algo más coloquial y menos solemne que ‘has vivido’ o una forma plural. Además, para un registro bíblico más estable y neutral, la concordancia de persona debe unificarse. ‘Serás arrancado’ funciona bien; ‘No habites’ preserva la repetición verbal de modo adecuado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales (‘en rebelión’, ‘tus hijos’, ‘serás arrancado’, ‘No habites’) son fieles y naturales. No se requieren notas léxicas adicionales; la nota inglesa conservaba una lectura previa ya superada y no es necesario trasladarla al español como nota textual aquí.
  issues:
  - severity: medium
    issue: Concordancia de número/persona necesita regularización
    rationale: 'El borrador usa singular (‘has habitado’, ‘tus’, ‘serás’, ‘No habites’), pero el expediente de fuente y la forma verbal etíope transliterada sugieren posible plural en la primera cláusula. Aunque el inglés POB quedó en singular implícito por contexto, en español conviene una línea consistente. La solución más segura es mantener singular coherente en todo el versículo con una forma más natural y estable: ‘has vivido’.'
  - severity: low
    issue: ‘has habitado’ suena ligeramente rígido en español bíblico moderno
    rationale: No es incorrecto, pero ‘habitar’ en perfecto compuesto aquí resulta algo duro. ‘Has vivido’ suena más natural sin perder el sentido general de dwell/live. No obstante, para conservar el eco del mandato final, puede mantenerse ‘habitado’; la revisión propuesta prioriza legibilidad.
  revised_spanish_text: En rebelión has vivido, y en rebelión caerán tus hijos, y serás arrancado para siempre. No habites.
  revision_rationale: Se ajusta levemente la redacción para mejorar la naturalidad del español y mantener una línea de segunda persona singular consistente y digna. No se cambia el sentido establecido por la revisión inglesa ni se añaden notas, porque no hay una ambigüedad nueva en español que lo requiera.
