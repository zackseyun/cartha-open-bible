  glossary_alignment: No hay términos del glosario principal en disputa. Los topónimos «Asur», «Babilonia» y «Sinar» son aceptables en español bíblico. «Ruina» es una buena elección para «Overthrow» dada la explicación auditada de nombre de devastación; conviene conservar esa incertidumbre y matiz en una nota al pie.
