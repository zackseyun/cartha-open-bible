translation:
  language: es
  text: Está entre Asur y Babilonia, en la tierra de Sinar. Y le pusieron por nombre «Ruina»[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre traducido «Ruina» refleja un nombre de devastación tras el colapso de la torre. La forma subyacente es incierta en la tradición etiópica.
    reason: lexical_alternative
lexical_decisions:
- source_word: It is between Asshur and Babylon in the land of Shinar
  english_pob_choice: It is between Asshur and Babylon in the land of Shinar
  chosen_spanish: Está entre Asur y Babilonia, en la tierra de Sinar
  alternatives_spanish:
  - Se encuentra entre Asur y Babilonia, en la tierra de Sinar
  - Está entre Asur y Babilonia, en la tierra de Shinar
  lexicon: Asshur / Babylon / Shinar proper names
  rationale: Conservo los nombres propios geográficos con la forma española más establecida y clara. «Está entre» refleja la ubicación sin añadir matices inexistentes; «Sinar» es la forma tradicional y transparente en español para la región bíblica, aunque «Shinar» sería una transliteración posible.
- source_word: And they called its name
  english_pob_choice: And they called its name
  chosen_spanish: Y le pusieron por nombre
  alternatives_spanish:
  - Y llamaron su nombre
  - Y le dieron por nombre
  lexicon: קרא / qaraʾ naming formula
  rationale: El plural del texto fuente y la revisión inglesa se reflejan en «pusieron»/«llamaron», que suena natural en español y mantiene la acción de nombrar sin forzar un calco. «Le pusieron por nombre» es idiomático y conserva el valor formular de la designación.
- source_word: Overthrow
  english_pob_choice: Overthrow
  chosen_spanish: «Ruina»
  alternatives_spanish:
  - «Derrocamiento»
  - «Destrucción»
  - «Desplome»
  lexicon: lexical uncertain ruin-name
  rationale: La nota inglesa indica un nombre de ruina tras la caída de la torre y que la forma subyacente es incierta en la tradición etiópica. «Ruina» comunica ese sentido nominal de desolación sin cargarlo hacia una abstracción política como «derrocamiento» ni hacia un término demasiado técnico.
theological_decisions:
- issue: Nombre de lugar de ruina tras la torre
  english_pob_reading: The name rendered 'Overthrow' reflects a ruin-name after the tower's collapse. The underlying form is uncertain in the Ethiopic tradition.
  chosen_spanish_reading: El nombre se vierte como «Ruina», entendiendo un topónimo de devastación posterior al derrumbe de la torre.
  alternative_spanish_readings:
  - «Derrocamiento» como nombre
  - «Caída» como nombre
  - «Destrucción» como nombre
  rationale: La traducción debe preservar la tensión entre un nombre significativo y la incertidumbre formal del término fuente. «Ruina» mantiene el valor semántico de desolación sin fingir certeza léxica donde la tradición etiópica es incierta.
  doctrine_reference: No aplica; decisión lexical/textual sobre un topónimo interpretativo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió «And he called» a «And they called», y capitalizó el inicio de la oración; la versión española refleja el plural y comienza como oración completa.
  spanish_consistency_notes:
  - He usado «Y le pusieron por nombre» para reflejar el plural confirmado por la revisión textual.
  - He preferido «Sinar» como forma española tradicional, dejando «Shinar» como alternativa en nota.
  - La puntuación y capitalización siguen un estilo editorial moderno y publicable, sin suavizar la fuerza del nombre de ruina.
