base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/027.yaml
  text: And it was between Asshur and Babylon, in the land of Shinar; and he called its name Overthrow, in the fourth week, in the first year at its beginning, in the thirty-fourth jubilee, they were dispersed.
  footnotes:
