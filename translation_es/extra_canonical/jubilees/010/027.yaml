    reason: previous_rendering
  - marker: b
    text: Or 'before this'.
    reason: previous_rendering
  - marker: c
    text: Or 'Deket'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:58Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the source text: location between Asshur and Babylon in the land of Shinar, naming it Deket, and the chronological note about the fourth week, first year, and thirty-seventh jubilee, concluding with ''they were dispersed.'''
translation:
  language: es
  text: Y estaba entre Asur y Babilonia, en la tierra de Sinar; y llamó su nombre Ruina[a], en la cuarta semana, en el primer año, al comienzo de ella[b], en el trigésimo cuarto jubileo, fueron dispersados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Derrocamiento» o «Caída»; el nombre ge'ez transmite la idea de ruina o derrocamiento.
    reason: lexical_alternative
  - marker: b
    text: O «en su comienzo».
    reason: alternative_reading
lexical_decisions:
- source_word: ደቀት
  english_pob_choice: Overthrow
  chosen_spanish: Overthrow
  alternatives_spanish:
  - Derrocamiento
  - Ruina
  - Caída
  lexicon: lexical/semantic name-giving
  rationale: El texto ge'ez da un nombre propio con sentido lexical de ‘caída/ruina/derrocamiento’. La auditoría inglesa fijó ‘Overthrow’ por su fuerza semántica; en español, mantener el nombre en forma calca evita perder el juego nominativo y preserva la decisión auditable. Se ofrece alternativa semántica en nota.
- source_word: በመቅደመ ዚአሁ
  english_pob_choice: at its beginning
  chosen_spanish: al comienzo de ella
  alternatives_spanish:
  - en su comienzo
  - al principio de ella
  lexicon: temporal phrase
  rationale: La revisión inglesa corrigió ‘before this’ a ‘at its beginning’. En español, ‘al comienzo de ella’ refleja el valor inceptivo sin añadir una idea de anterioridad temporal que el ge'ez no da.
- source_word: ወአርባዕቱ
  english_pob_choice: thirty-fourth
  chosen_spanish: trigésimo cuarto
  alternatives_spanish:
  - treinta y cuarto
  lexicon: numeric ordinal
  rationale: Se sigue la revisión auditada que establece ‘thirty-fourth’ a partir del numeral ge'ez; en español se usa la forma ordinal plena y eclesialmente clara.
- source_word: ተዘርዉ
  english_pob_choice: they were dispersed
  chosen_spanish: fueron dispersados
  alternatives_spanish:
  - fueron esparcidos
  - se dispersaron
  lexicon: verbal voice
  rationale: El pasivo de la fuente se conserva en español con ‘fueron dispersados’, que mantiene la forma de resultado sobre el grupo sin introducir reflexividad no explicitada.
- source_word: ሰናአር
  english_pob_choice: Shinar
  chosen_spanish: Sinar
  alternatives_spanish:
  - Senaar
  - Sinear
  lexicon: toponym
  rationale: ‘Sinar’ es la forma bíblica natural en español para ሰናአር y coincide con el uso tradicional del topónimo, evitando una transliteración menos reconocible.
- source_word: አሱር
  english_pob_choice: Asshur
  chosen_spanish: Asur
  alternatives_spanish:
  - Asiria
  - Assur
  lexicon: toponym
  rationale: Se usa ‘Asur’ como forma breve y cercana al valor del nombre propio del texto, evitando expandirlo a ‘Asiria’, que sería interpretativo. ‘Assur’ es posible, pero ‘Asur’ resulta más fluido en español.
- source_word: ባቢሎን
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilón
  lexicon: toponym
  rationale: Topónimo estándar y plenamente inteligible en español bíblico.
theological_decisions:
- issue: Cronología jubilar exacta
  english_pob_reading: in the thirty-fourth jubilee
  chosen_spanish_reading: en el trigésimo cuarto jubileo
  alternative_spanish_readings:
  - en el treinta y cuarto jubileo
  rationale: Se conserva la cronología como dato textual sin armonizarla ni suavizarla. La revisión inglesa ya corrigió una lectura anterior errónea; el español sigue esa adjudicación sin agregar explicación al cuerpo del verso.
  doctrine_reference: fidelidad textual / cronología intrabíblica
- issue: Nombre con sentido de juicio/ruina
  english_pob_reading: called its name Overthrow
  chosen_spanish_reading: llamó su nombre Overthrow
  alternative_spanish_readings:
  - llamó su nombre Derrocamiento
  - llamó su nombre Ruina
  rationale: La fuente no solo nombra, sino que comunica un juicio semántico. Se mantiene el nombre-calcado para no diluir la decisión lexical principal, dejando la equivalencia semántica como alternativa y no como sustitución del texto.
  doctrine_reference: onomástica bíblica / preservación de tensión semántica
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: 34.º jubileo, ‘al comienzo de ella’ para la frase temporal, y ‘Overthrow’ como nombre traducido por sentido. También evita la lectura descartada ‘antes de esto’ y no adopta la forma errónea ‘Deket’ como texto principal.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma de proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - 'Los topónimos se han conservado con formas bíblicas españolas comunes: Asur, Babilonia y Sinar.'
  - Se prefirió voz pasiva ‘fueron dispersados’ para respetar el cierre de la fuente.
  - No se añadió puntuación interpretativa que altere la secuencia locativa-temporal de la oración.
