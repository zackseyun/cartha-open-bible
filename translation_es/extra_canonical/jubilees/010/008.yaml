translation:
  language: es
  text: Y Yahvé, nuestro Dios, nos dijo que atáramos a todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: And the Lord our God
  english_pob_choice: And the Lord our God
  chosen_spanish: Y Yahvé, nuestro Dios
  alternatives_spanish:
  - Y el Señor nuestro Dios
  - Y el Señor, nuestro Dios
  lexicon: YHWH -> Yahvé; θεός -> Dios
  rationale: El texto fuente y el contexto del POB distinguen el nombre divino; en español se conserva el nombre propio Yahvé en lugar de un sustituto reverencial. Se mantiene el posesivo 'nuestro' para reproducir la relación de pertenencia del original.
- source_word: told us
  english_pob_choice: told us
  chosen_spanish: nos dijo
  alternatives_spanish:
  - nos ordenó
  - nos mandó
  lexicon: אמר/λέγω-like reporting verb -> decir; injunctive force context-sensitive
  rationale: La forma inglesa es un relato directo de mandato comunicado. 'Nos dijo' preserva el valor de comunicación verbal sin intensificar más allá de lo que el texto evidencia; el infinitivo 'mandó/ordenó' añadiría fuerza normativa no explícita en el pequeño fragmento disponible.
- source_word: bind all of them
  english_pob_choice: bind all of them
  chosen_spanish: atáramos a todos
  alternatives_spanish:
  - los atáramos a todos
  - atar a todos ellos
  lexicon: bind -> atar; all of them -> a todos
  rationale: '''Atar'' reproduce el sentido básico de sujetar o amarrar. El complemento ''a todos'' refleja el alcance total del objeto sin sobrecargar la frase; el sujeto elíptico del español permite una construcción natural con ''nos dijo que atáramos''.'
theological_decisions:
- issue: Identificación del referente divino
  english_pob_reading: The Lord our God
  chosen_spanish_reading: Yahvé, nuestro Dios
  alternative_spanish_readings:
  - El Señor, nuestro Dios
  - Dios, nuestro Señor
  rationale: La convención del proyecto exige evitar el ocultamiento del nombre divino cuando el trasfondo lo sustenta. Aquí el audit trail no documenta una razón para sustituirlo por una fórmula litúrgica, así que se conserva Yahvé.
  doctrine_reference: Nombre divino en el Pentateuco/Jubileos; convención POB para יהוה
- issue: Valor de la instrucción
  english_pob_reading: told us to bind all of them
  chosen_spanish_reading: nos dijo que los atáramos a todos
  alternative_spanish_readings:
  - nos mandó atarlos a todos
  - nos ordenó que los atáramos a todos
  rationale: Sin un comentario de audit trail que exija una traducción más jurídica, se mantiene una redacción que comunica mandato sin añadir matiz interpretativo. La forma con subjuntivo en español expresa adecuadamente la subordinación del mandato.
  doctrine_reference: Modalidad imperativa en relato narrativo
- issue: Alcance del objeto
  english_pob_reading: all of them
  chosen_spanish_reading: a todos
  alternative_spanish_readings:
  - a todos ellos
  - a todos los demás
  rationale: El inglés no aporta un referente más específico en este fragmento aislado. 'A todos' conserva la totalidad sin inventar determinantes contextuales ausentes en el material fuente.
  doctrine_reference: Principio de no añadir referencialidad no atestiguada
translation_notes:
  revision_awareness: La revisión más reciente marca el texto como sin cambios necesarios y el control cruzado reporta alta concordancia (1.0); por ello no se incorporan variantes ni notas de corrección textual.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme a la terminología predeterminada del proyecto.
  - Se conserva un español fluido y publicable sin introducir glosas explicativas que no aparecen en el breve testimonio disponible.
  - No se añadieron notas al pie porque el texto y el audit trail no documentan una alternativa textual significativa que deba preservarse en esta línea.
