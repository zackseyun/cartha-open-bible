translation:
  language: es
  text: Y habitó en la tierra de Media, cerca de los hermanos de su mujer, hasta este día. Y llamó a su morada, y a la morada de sus hijos, Media, por Madai, el padre de ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውስተ፡ ምድረ፡ ሜድቂን፡
  english_pob_choice: in the land of Media
  chosen_spanish: en la tierra de Media
  alternatives_spanish:
  - en la tierra de Media
  - en el país de Media
  lexicon: Media
  rationale: La fuente ge'ez y el texto inglés señalan un territorio geográfico; «tierra» conserva bien ese valor bíblico y suena natural en español.
- source_word: ኀበ፡ አኀወ፡ ብእሲቱ፡
  english_pob_choice: near his wife’s brothers
  chosen_spanish: cerca de los hermanos de su mujer
  alternatives_spanish:
  - cerca de los hermanos de su mujer
  - junto a los hermanos de su esposa
  lexicon: hermanos
  rationale: El plural está claramente respaldado por la revisión inglesa. «Mujer» mantiene un registro bíblico claro; «esposa» queda como alternativa más explícita en español moderno.
- source_word: ወሰመየ፡ ምገባሪሁ፡ ወምገባረ፡ ውሉዱ፡
  english_pob_choice: And he called his dwelling-place, and the dwelling-place of his sons
  chosen_spanish: Y llamó a su morada, y a la morada de sus hijos
  alternatives_spanish:
  - Y llamó a su morada, y a la morada de sus hijos
  - Y llamó su lugar de habitación y el de sus hijos
  lexicon: morada
  rationale: El inglés POB usa «dwelling-place», y «morada» reproduce ese sustantivo sin cargarlo con matices eclesiásticos no presentes en la fuente.
- source_word: ሜዲቂን፡
  english_pob_choice: Media
  chosen_spanish: Media
  alternatives_spanish:
  - Media
  lexicon: Media
  rationale: Se conserva el topónimo tal como aparece en la tradición bíblica y en el audit trail inglés.
- source_word: እስመ፡ ማዳይ፡ አቡሆሙ።
  english_pob_choice: after Madai their father
  chosen_spanish: conforme a Madai, su padre
  alternatives_spanish:
  - después de Madai, su padre
  - en honor de Madai, su padre
  lexicon: Madai
  rationale: La preposición inglesa «after» aquí expresa derivación/nombramiento, no secuencia temporal; «conforme a» comunica que el nombre procede de su padre, sin introducir una noción ajena como simple posteridad temporal.
theological_decisions:
- issue: Referencia al nombre del territorio y su relación con el antepasado Madai
  english_pob_reading: Media, after Madai their father
  chosen_spanish_reading: Media, conforme a Madai, su padre
  alternative_spanish_readings:
  - Media, después de Madai, su padre
  - Media, en honor de Madai, su padre
  rationale: El texto no presenta una afirmación doctrinal sino una etimología/nominación tradicional. La redacción elegida evita sobreinterpretar el vínculo como puramente cronológico o devocional y conserva la relación genealógica como fundamento del nombre.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió el singular por plural en «her brothers» -> «brothers»; la traducción española refleja directamente ese plural con «los hermanos de su mujer». No se requieren otras notas de revisión.
  spanish_consistency_notes:
  - Se mantiene «Media» como topónimo fijo en todo el segmento.
  - Se evita «SEÑOR» o terminología cristianizada no presente en el pasaje.
  - «Morada» reproduce de forma consistente el inglés auditado «dwelling-place».
