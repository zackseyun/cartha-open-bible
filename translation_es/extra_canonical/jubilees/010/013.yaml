  to: Y le dijimos a Noé todas sus medicinas, para que fueran sanados por las plantas de la tierra. Y Noé escribió en un libro todo lo que le habíamos enseñado, todas las clases de remedios curativos, y los espíritus fueron restringidos.
  rationale: Se corrige el pronombre indirecto a 'le' para concordar con 'Noé'. Se alisa la expresión 'remedios de curación' a 'remedios curativos' por naturalidad, sin pérdida semántica. Se cambia 'quedaron restringidos' por 'fueron restringidos' para un español más idiomático y fiel a la idea de contención pasiva del texto.
