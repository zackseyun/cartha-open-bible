    changes_summary: Restored the opening clause about telling Noah their medicines and healing by the plants of the earth, which was omitted in the draft. Removed 'evil' and 'from following the sons of Noah,' which are not present in the source here. Kept the second sentence formal and close to the source.
translation:
  language: es
  text: Y le dijimos a Noé todas sus medicinas, para que fueran sanados por las plantas de la tierra. Y Noé escribió en un libro todo lo que le habíamos enseñado, todas las clases de remedios curativos, y los espíritus fueron restringidos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ነገርናሁ / we told him
  english_pob_choice: And we told Noah
  chosen_spanish: Y les dijimos a Noé
  alternatives_spanish:
  - Y le dijimos a Noé
  - Y nos dirigimos a Noé
  lexicon: decir / hablar
  rationale: El ge'ez expresa una acción de comunicar instrucciones o información a Noé; el plural 'les' preserva el sujeto plural implícito del original y del inglés POB ('we told').
- source_word: ምስለ አስሕተትሙ / their medicines
  english_pob_choice: all their medicines
  chosen_spanish: todas sus medicinas
  alternatives_spanish:
  - todos sus remedios
  - todas sus medicinas
  lexicon: medicina / remedio
  rationale: '''Medicinas'' mantiene el sentido concreto del texto fuente y del POB inglés; ''remedios'' sería posible, pero ''medicinas'' conserva mejor la referencia a recursos curativos específicos.'
- source_word: ከመ ይፈውሱ በዕፀወ ምድር / that they might be healed by the plants of the earth
  english_pob_choice: so that they might be healed by the plants of the earth
  chosen_spanish: para que fueran sanados por las plantas de la tierra
  alternatives_spanish:
  - para que sanaran por las plantas de la tierra
  - para que fueran curados por las plantas de la tierra
  lexicon: sanar / curar
  rationale: Se conserva la pasiva/mediopasiva del original con 'fueran sanados'; 'plantas de la tierra' traduce de modo sobrio y directo la imagen botánica del texto.
- source_word: ወጸሐፈ ኖኅ / Noah wrote
  english_pob_choice: And Noah wrote down
  chosen_spanish: Y Noé escribió
  alternatives_spanish:
  - Y Noé escribió en un libro
  - Y Noé anotó
  lexicon: escribir
  rationale: El verbo básico del original es 'escribir'; 'anotó' sería demasiado libre. El complemento 'en un libro' sigue la segunda cláusula del texto fuente.
- source_word: በመጽሐፍ / in a book
  english_pob_choice: in a book
  chosen_spanish: en un libro
  alternatives_spanish:
  - en un libro
  - en el libro
  lexicon: libro
  rationale: La forma indefinida 'en un libro' refleja el texto fuente y el POB inglés, sin precisar un libro concreto.
- source_word: ትዝምደ ፈውሳት / all the kinds of healing remedies
  english_pob_choice: all the kinds of healing remedies
  chosen_spanish: todas las clases de remedios de curación
  alternatives_spanish:
  - todas las clases de remedios curativos
  - todos los tipos de remedios de curación
  lexicon: remedios de curación
  rationale: 'Se preserva la acumulación semántica del original: no solo ''remedios'', sino ''remedios de curación'', para mantener el énfasis en su función terapéutica.'
- source_word: መናፍስት / spirits
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - los espíritus
  - los seres espirituales
  lexicon: espíritus
  rationale: El término se mantiene literalmente porque el texto no especifica 'malvados' en este versículo; así se evita añadir una calificación inexistente en la fuente.
theological_decisions:
- issue: Identidad y calificación moral de los espíritus
  english_pob_reading: the spirits were restrained
  chosen_spanish_reading: los espíritus quedaron restringidos
  alternative_spanish_readings:
  - los espíritus fueron restringidos
  - los espíritus fueron detenidos
  rationale: Se evita introducir 'malos' o 'malignos', ya que el pasaje presente no los califica así. 'Quedaron restringidos' conserva la idea de limitación/contención sin sobreinterpretar.
  doctrine_reference: Angelología / demonología en literatura jubiléica
translation_notes:
  revision_awareness: La versión inglesa revisada restauró la cláusula inicial sobre las medicinas y la sanidad por las plantas de la tierra, y eliminó 'evil' y 'from following the sons of Noah' por no estar en el original de este versículo. La traducción española sigue esa revisión y mantiene ambas proposiciones del texto fuente.
  spanish_consistency_notes:
  - Se usa 'Noé' de manera constante para el nombre propio.
  - Se mantiene el plural inclusivo 'les dijimos' para reflejar el sujeto plural implícito del original y del POB inglés.
  - No se añade 'malos' a 'espíritus', en consonancia con la revisión inglesa y el ge'ez conservado.
