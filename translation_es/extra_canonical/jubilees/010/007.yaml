translation:
  language: es
  text: Y no permitas que dominen a los espíritus de los vivos, porque solo tú conoces su juicio; y no permitas que tengan poder sobre los hijos de los justos, desde ahora y para siempre.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: rule over
  english_pob_choice: rule over
  chosen_spanish: dominen
  alternatives_spanish:
  - gobiernen
  - se enseñoreen de
  lexicon: dominar
  rationale: El inglés POB conserva la idea de ejercer señorío o control sobre otros. En español, 'dominen' comunica esa fuerza relacional sin sonar innecesariamente técnico. 'Gobiernen' sería más institucional y menos preciso aquí; 'se enseñoreen de' es posible, pero más marcado y menos natural en este contexto.
- source_word: spirits of the living
  english_pob_choice: spirits of the living
  chosen_spanish: los espíritus de los vivos
  alternatives_spanish:
  - las almas de los vivos
  - los seres vivientes
  lexicon: espíritu
  rationale: Mantengo 'espíritus' porque el texto distingue un ámbito espiritual específico; 'almas' introduciría una equivalencia doctrinal no asegurada por el original, y 'seres vivientes' perdería la referencia al componente espiritual.
- source_word: judgment
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - veredicto
  lexicon: juicio
  rationale: '''Juicio'' reproduce bien la evaluación/división judicial que el contexto sugiere. ''Sentencia'' desplaza el matiz hacia la decisión final; ''veredicto'' suena más jurídico moderno que el registro bíblico deseado.'
- source_word: sons of the righteous
  english_pob_choice: sons of the righteous
  chosen_spanish: los hijos de los justos
  alternatives_spanish:
  - los descendientes de los justos
  - los hijos de los rectos
  lexicon: hijo
  rationale: Conservo la filiación literal de la frase. 'Descendientes' suavizaría la imagen y podría ser más interpretativa; 'rectos' no es incorrecto, pero 'justos' sigue la equivalencia más estable para δικαιοσύνη/campo afín en este tipo de texto.
- source_word: forevermore
  english_pob_choice: forevermore
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: para siempre
  rationale: '''Para siempre'' es la forma más natural y fiel en español contemporáneo para un cierre temporal absoluto. ''Eternamente'' intensifica el registro; ''por siempre'' es también posible, pero menos estándar.'
theological_decisions:
- issue: Autoridad de los espíritus sobre los vivos
  english_pob_reading: The request asks that they not rule over the spirits of the living, preserving a distinction between human/created spirits and governing powers.
  chosen_spanish_reading: Se mantiene la restricción sobre el dominio de poderes espirituales respecto de los espíritus de los vivos.
  alternative_spanish_readings:
  - Se entiende como no ejercer gobierno sobre las personas vivas
  - Se puede leer como no dominar la vida espiritual de los vivos
  rationale: 'La traducción conserva la tensión del original y del inglés POB: no reduce ''espíritus'' a ''personas'' ni espiritualiza el pasaje más allá de lo que el texto permite. Esto deja abierta la interpretación de una esfera espiritual real sin forzar una glosa doctrinal.'
  doctrine_reference: Angelología / antropología bíblica
- issue: Conocimiento exclusivo del juicio por Dios
  english_pob_reading: for you alone know their judgment
  chosen_spanish_reading: porque solo tú conoces su juicio
  alternative_spanish_readings:
  - porque solo tú conoces el juicio de ellos
  - porque tú solo sabes cómo serán juzgados
  rationale: 'La formulación preserva la exclusividad divina del conocimiento judicial sin introducir explicaciones adicionales. ''Su juicio'' mantiene la ambigüedad fuente: juicio como evaluación o destino judicial.'
  doctrine_reference: Omnisciencia divina / juicio divino
- issue: Permanencia temporal absoluta
  english_pob_reading: from now and forevermore
  chosen_spanish_reading: desde ahora y para siempre
  alternative_spanish_readings:
  - de ahora en adelante y para siempre
  - desde este momento y por siempre
  rationale: La expresión conserva el paralelismo temporal y la amplitud absoluta del cierre, sin añadir matices escatológicos no explícitos.
  doctrine_reference: Duración perpetua
translation_notes:
  revision_awareness: El contexto fuente no contiene texto ge'ez recuperable en el paquete; se trabajó con el texto inglés POB y el registro de alta concordancia como audit trail, sin revisiones aplicadas. La redacción española busca reflejar fielmente la petición negativa y el cierre temporal, manteniendo la referencia a 'espíritus de los vivos' y 'hijos de los justos' sin suavizarlos.
  spanish_consistency_notes:
  - Se conserva 'justos' para alineación con el léxico bíblico estándar de δικαιοσύνη y campos afines.
  - Se evita 'SEÑOR' u otro sustituto para no introducir un masking convention que el texto fuente no exige.
  - No se añaden notas textuales porque no hay variantes ni notas auditadas en el material provisto.
