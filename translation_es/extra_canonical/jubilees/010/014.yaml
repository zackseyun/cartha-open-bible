    changes_summary: Replaced the causal 'because' with the relative clause 'whom he loved' to better reflect the source structure, and removed 'much' for a more direct, formal rendering.
translation:
  language: es
  text: Y le entregó todo lo que había escrito a Sem, su hijo, a quien amaba más que a todos sus hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወወሀበ / gave
  english_pob_choice: he gave
  chosen_spanish: le entregó
  alternatives_spanish:
  - le dio
  - le entregó
  lexicon: dar / entregar
  rationale: El ge'ez expresa una acción de dar/ceder un objeto concreto; «entregó» conserva el sentido de transferencia intencional y suena natural en español formal. «Le dio» sería correcto, pero menos preciso en el matiz de transmisión de lo escrito.
- source_word: ኵሎ ዘጸሐፈ / all that he had written
  english_pob_choice: all that he had written
  chosen_spanish: todo lo que había escrito
  alternatives_spanish:
  - todo lo que escribió
  - todo lo escrito
  lexicon: todo / escribir
  rationale: La forma española mantiene el valor de totalidad del original y el pluscuamperfecto conserva la anterioridad del acto de escribir respecto de dar. «Todo lo escrito» es posible, pero el verbo explícito ayuda a seguir la estructura del verso.
- source_word: ለሴም፡ ወልዱ / to Shem, his son
  english_pob_choice: to Shem, his son
  chosen_spanish: a Sem, su hijo
  alternatives_spanish:
  - a Sem, su hijo
  - a Sem, el hijo
  lexicon: Sem / hijo
  rationale: Se conserva el nombre propio bíblico estándar «Sem» en español y la aposición «su hijo» refleja fielmente la relación filial del texto.
- source_word: ዘይፈህቅ / whom he loved
  english_pob_choice: whom he loved
  chosen_spanish: a quien amaba
  alternatives_spanish:
  - a quien amaba
  - que amaba
  lexicon: amar / relativo
  rationale: El relativo del inglés auditado refleja mejor la estructura fuente que una causalidad. En español, «a quien amaba» mantiene el vínculo relativo y el régimen verbal apropiado con antecedente personal.
theological_decisions:
- issue: Preferencia afectiva de Noé por Sem
  english_pob_reading: whom he loved more than all his sons
  chosen_spanish_reading: a quien amaba más que a todos sus hijos
  alternative_spanish_readings:
  - que amaba mucho más que a todos sus hijos
  - a quien amaba por encima de todos sus hijos
  rationale: Se mantiene la comparación explícita («más que a todos sus hijos») sin suavizarla. Esto preserva la tensión narrativa del pasaje y evita convertirla en una mera intensificación vaga.
  doctrine_reference: Narrative emphasis; no doctrinal gloss required
translation_notes:
  revision_awareness: La revisión más reciente corrigió el inglés para reemplazar la causalidad («because») por una cláusula relativa («whom he loved») y eliminó el intensificador «much». La redacción española sigue esa estructura revisada, sin reintroducir una lectura causal.
  spanish_consistency_notes:
  - Se usa «Sem» de forma consistente con la onomástica bíblica habitual en español.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no pertinente al pasaje.
  - La sintaxis española conserva la relación relativa entre la entrega y el amor, evitando una paráfrasis causal.
