translation:
  language: es
  text: Porque lo amó más que a todos sus hijos. Y Noé durmió con sus padres.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኪያሁ (kiyāhu)
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a él mismo
  lexicon: pronombre acusativo independiente
  rationale: El ge'ez usa un pronombre de objeto directo; en contexto el referente es Shem, no Arpajshad. En español, 'lo' conserva la referencia masculina singular sin añadir un nombre que el texto no da.
- source_word: ያፈቅር (ya-fäqir)
  english_pob_choice: he loved
  chosen_spanish: lo amó
  alternatives_spanish:
  - lo amaba
  - lo quiso
  lexicon: verbo de amor/afecto
  rationale: '''Amó'' refleja bien la acción verbal pasada y mantiene la fuerza relacional del original. ''Quiso'' sería menos explícito; ''amaba'' suaviza el tiempo perfectivo.'
- source_word: ፈድፋደ (fäd-fädä)
  english_pob_choice: more than all
  chosen_spanish: más que a todos
  alternatives_spanish:
  - más que todos
  - por encima de todos
  lexicon: comparativo de superioridad
  rationale: La construcción española 'más que a todos' expresa la comparación con personas de manera natural y clara.
- source_word: ውሉዱ (wəluḏu)
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: sustantivo filial
  rationale: '''Hijos'' cubre el sentido del plural familiar del ge''ez y evita estrechar innecesariamente a ''hijos varones'' si el contexto ya los identifica.'
- source_word: ወኖመ (wä-nōmä)
  english_pob_choice: And ... slept
  chosen_spanish: Y ... durmió
  alternatives_spanish:
  - Y ... se durmió
  - Y ... descansó
  lexicon: verbo de dormir/morir
  rationale: '''Durmió'' conserva la fórmula reverente de muerte implícita en el hebraísmo y el audit trail inglés.'
- source_word: ኖኅ (Nōḥ)
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noé
  lexicon: nombre propio bíblico
  rationale: '''Noé'' es la forma española estándar y plenamente reconocible para el nombre propio.'
- source_word: ምስለ፡ አበዊሁ (məslä abäwihu)
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres
  lexicon: fórmula funeraria/ancestral
  rationale: La expresión idiomática puede verterse como 'con sus padres' en español bíblico natural; 'antepasados' explicita la idea, pero 'padres' mantiene la fórmula tradicional sin cambiar el sentido.
theological_decisions:
- issue: Referencia del pronombre en la primera cláusula
  english_pob_reading: For he loved him more than all his sons.
  chosen_spanish_reading: Porque lo amó más que a todos sus hijos.
  alternative_spanish_readings:
  - Porque amó a Arpajshad más que a todos sus hijos.
  - Porque lo amó más que a todos sus hijos, refiriéndose a Arpajshad.
  rationale: El ajuste revisado del audit trail corrige una inserción no fundada de 'Arpajshad'. El ge'ez contiene un pronombre directo sin nombre explícito, por lo que la traducción española debe dejar la referencia implícita y no resolverla erróneamente.
  doctrine_reference: Fidelidad textual y control de referentes en traducción bíblica
- issue: Eufemismo de muerte en la segunda cláusula
  english_pob_reading: And Noah slept with his fathers.
  chosen_spanish_reading: Y Noé durmió con sus padres.
  alternative_spanish_readings:
  - Y Noé reposó con sus padres.
  - Y Noé murió y fue reunido con sus padres.
  rationale: '''Durmió con sus padres'' conserva el giro reverente de muerte del texto y del inglés POB, sin añadir elementos ausentes como sepultura o lugar.'
  doctrine_reference: Lenguaje bíblico de muerte/reunión ancestral
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó por corrección crítica la mención de 'Arpachshad', que había sido una inserción errónea. La lectura actual del ge'ez presenta un pronombre de objeto ('him') sin antecedente nominal expreso en la cláusula; por eso el español evita nombrar al referente y sigue el texto tal como está auditado. También se retiró material extraneous sobre entierro o monte, que no pertenece a este versículo.
  spanish_consistency_notes:
  - Se mantiene 'Noé' como forma española estándar del nombre propio.
  - Se preserva la fórmula reverente 'durmió con sus padres' para la muerte, en armonía con el audit trail inglés.
  - No se introduce 'Arpajshad' porque el texto fuente revisado no lo contiene en esta cláusula.
  - El estilo es sobrio y bíblico, pero sin calco innecesario del orden del inglés.
