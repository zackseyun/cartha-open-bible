base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/010/035.yaml
  text: That land was named Canaan. And Japheth and his sons went toward the sea and dwelt in the land of their portion. And Madai saw the land of the sea[35], and it did not please him, and he asked from Elam and Asshur and Arpachshad, the brothers of his wife, a portion, and he dwelt there.
  footnotes:
  - marker: '35'
    text: The clause about Madai and 'his wife's brother' is awkward in Ethiopic. The translation takes Elam, Asshur, and Arpachshad as the parties from whom he requested a portion, with Arpachshad especially linked by marriage.
    reason: segmentation_note
  - marker: a
    text: Or 'And Japheth'.
    reason: previous_rendering
  - marker: b
    text: Or 'the brother of his wife'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:58Z'
    unchanged: false
    changes_summary: Added the omitted final clause 'and he dwelt there' and revised 'his wife’s brother' to the more natural and precise 'the brother of his wife.'
translation:
  language: es
  text: Aquella tierra fue llamada Canaán. Y Jafet y sus hijos se fueron hacia el mar y habitaron en la tierra de su porción. Y Madai vio la tierra del mar, y no le agradó; y pidió a Elam, a Asur y a Arfaxad[a], los hermanos de su esposa, una porción, y habitó allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula sobre Madai y 'los hermanos de su esposa' es algo torpe en ge'ez. Esta traducción entiende que pidió una porción a Elam, Asur y Arfaxad, quedando Arfaxad especialmente vinculado por parentesco matrimonial.
    reason: segmentation_note
lexical_decisions:
- source_word: ተሰምየት፡ ይእቲ፡ ምድር፡ ከናአን
  english_pob_choice: That land was named Canaan.
  chosen_spanish: Aquella tierra fue llamada Canaán.
  alternatives_spanish:
  - Esa tierra fue llamada Canaán.
  - La tierra recibió el nombre de Canaán.
  lexicon: nombrar / llamar
  rationale: El ge'ez presenta una pasiva de nombramiento; en español, 'fue llamada' conserva bien el acto de asignar nombre sin añadir matices ajenos. 'Aquella' mantiene el valor deíctico de 'That' sin rigidez innecesaria.
- source_word: መንገለ፡ ባሕር
  english_pob_choice: toward the sea
  chosen_spanish: hacia el mar
  alternatives_spanish:
  - en dirección al mar
  - junto al mar
  lexicon: dirección / localización
  rationale: La expresión indica movimiento orientado al mar; 'hacia el mar' es la opción más natural y fiel. 'Mar' evita sonar técnico o geográfico donde el contexto es narrativo.
- source_word: መክፈልቶሙ
  english_pob_choice: the land of their portion
  chosen_spanish: la tierra de su porción
  alternatives_spanish:
  - la tierra de su repartimiento
  - la tierra de su heredad
  lexicon: porción / herencia
  rationale: Se mantiene el lenguaje de reparto sin sustituirlo por 'heredad', que podría introducir connotaciones más específicamente bíblicas o legales de las que aquí se evidencian. 'Su porción' refleja con sobriedad la idea de territorio asignado.
- source_word: ምድረ፡ ባሕር
  english_pob_choice: the land of the sea
  chosen_spanish: la tierra del mar
  alternatives_spanish:
  - la región del mar
  - la tierra junto al mar
  lexicon: tierra / región
  rationale: La construcción ge'ez es literal y algo áspera; 'la tierra del mar' preserva esa relación nominal sin suavizarla demasiado. Se evita expandir el sentido a 'junto al mar' en el texto principal para no perder la posible ambigüedad topográfica.
- source_word: አስተብቍዓ
  english_pob_choice: he asked ... a portion
  chosen_spanish: pidió ... una porción
  alternatives_spanish:
  - solicitó ... una porción
  - suplicó ... una porción
  lexicon: pedir / solicitar
  rationale: '''Pidió'' conserva la sencillez del relato y evita intensificar a ''suplicó'', que no está exigido por la fuente. El complemento explícito ''una porción'' mantiene la referencia territorial.'
- source_word: እምኀበ፡ አኀወ፡ ብእሲቱ
  english_pob_choice: from Elam and Asshur and Arpachshad, the brother of his wife
  chosen_spanish: a Elam, a Asur y a Arfaxad, los hermanos de su esposa
  alternatives_spanish:
  - a Elam, a Asur y a Arfaxad, los hermanos de la esposa de él
  - a Elam, a Asur y a Arfaxad, los hermanos de su mujer
  lexicon: hermanos / parentesco
  rationale: La revisión textual indica que el plural del ge'ez exige 'los hermanos', no el singular. 'Esposa' es más neutral y claro en español bíblico contemporáneo que 'mujer', sin alterar el parentesco indicado por el texto.
- source_word: ወኀደረ
  english_pob_choice: and he dwelt there
  chosen_spanish: y habitó allí
  alternatives_spanish:
  - y se quedó allí
  - y residió allí
  lexicon: habitar / residir
  rationale: '''Habitó'' reproduce el registro bíblico tradicional sin caer en arcaísmo excesivo. ''Allí'' resuelve el deíctico final añadido en la revisión inglesa.'
theological_decisions:
- issue: Tratamiento del nombre divino y títulos teológicos
  english_pob_reading: No explicit divine-name language appears in this verse.
  chosen_spanish_reading: No aparece lenguaje explícito del nombre divino en este versículo.
  alternative_spanish_readings:
  - —
  rationale: No se introduce terminología de Yahvé, Señor o Cristo porque el texto no la contiene. Mantener la ausencia es la decisión más fiel.
  doctrine_reference: fidelidad textual
translation_notes:
  revision_awareness: 'Se incorporó la cláusula final presente en la revisión más reciente: ''y habitó allí''. También se reflejó la corrección del parentesco a plural (''los hermanos de su esposa'') conforme al análisis del ge''ez, y se preservó la frase inicial omitida en la primera versión inglesa: ''Aquella tierra fue llamada Canaán''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o cualquier máscara del nombre divino porque el versículo no contiene el Tetragrámaton ni un equivalente contextual.
  - Se prefirió 'Asur' y 'Arfaxad' como formas bíblicas habituales en español para los nombres propios, coherentes con la tradición lectora pero sin depender de una versión española específica.
  - Se mantuvo 'porción' para conservar el campo semántico del reparto territorial, que en español podría desplazarse indebidamente con términos más interpretativos.
