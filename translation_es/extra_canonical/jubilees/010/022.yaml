translation:
  language: es
  text: 'Y Yahvé nuestro Dios nos dijo[a]: «Mira, son un solo pueblo, y esto es lo que han comenzado a hacer; y ahora nada les será retenido. Vamos, descendamos y confundamos sus lenguas, para que uno no oiga el habla del otro, y sean dispersados entre ciudades y naciones, y ya no permanezca con ellos un solo propósito hasta el día del juicio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación recuerda el relato de Babel, pero en Jubileos se presenta dentro del marco de revelación en primera persona, no como una mera cita de Génesis.
    reason: cross_reference
lexical_decisions:
- source_word: Lord our God
  english_pob_choice: the Lord our God
  chosen_spanish: Yahvé nuestro Dios
  alternatives_spanish:
  - el Señor nuestro Dios
  - nuestro Dios
  lexicon: YHWH
  rationale: La tradición editorial POB usa ‘Yahvé’ para el nombre divino; aquí mantiene el matiz de nombre propio y evita la sustitución reverencial por ‘Señor’. El posesivo ‘nuestro Dios’ conserva la relación del hablante con Dios sin diluir el nombre.
- source_word: one people
  english_pob_choice: they are one people
  chosen_spanish: son un solo pueblo
  alternatives_spanish:
  - son un pueblo único
  - son una sola gente
  lexicon: עם / ἔθνος
  rationale: ‘Un solo pueblo’ comunica la unidad colectiva con naturalidad en español y preserva la idea de un cuerpo humano-político, no solo de individuos.
- source_word: nothing will be withheld from them
  english_pob_choice: nothing will be withheld from them
  chosen_spanish: nada les será impedido
  alternatives_spanish:
  - nada les será retenido
  - nada se les negará
  lexicon: מנע / ἀφαιρεθήσεται
  rationale: La pasiva española ‘les será impedido’ expresa la idea de restricción eficaz sin introducir un objeto implícito que el español requeriría de forma menos clara. ‘Retenido’ o ‘negado’ son posibles, pero ‘impedido’ comunica mejor la capacidad frustrada de su proyecto.
- source_word: confuse their tongues
  english_pob_choice: confuse their tongues
  chosen_spanish: confundamos sus lenguas
  alternatives_spanish:
  - mezclemos sus lenguas
  - trastornemos sus lenguas
  lexicon: לבלל / συγχέω
  rationale: ‘Confundamos’ es el equivalente directo y bíblicamente reconocible para el acto de Babel, manteniendo el mismo campo semántico de confusión lingüística sin suavizarlo.
- source_word: one will not hear another’s speech
  english_pob_choice: so that one will not hear another’s speech
  chosen_spanish: para que uno no entienda el habla del otro
  alternatives_spanish:
  - para que uno no oiga la voz del otro
  - para que uno no escuche el lenguaje del otro
  lexicon: שמע / ἀκούω
  rationale: En español, ‘oír’ podría dejar el sentido demasiado físico; ‘entienda el habla’ explicita la incomunicación resultante que el contexto requiere, sin alejarse del núcleo de ‘no oír/comprender’. Se conserva ‘habla’ para reflejar el carácter lingüístico del pasaje.
- source_word: scattered into cities and nations
  english_pob_choice: they will be scattered into cities and nations
  chosen_spanish: sean dispersados entre ciudades y naciones
  alternatives_spanish:
  - sean esparcidos por ciudades y naciones
  - sean dispersados en ciudades y naciones
  lexicon: פוץ / διασπείρω
  rationale: ‘Dispersados’ mantiene la imagen de separación territorial y social. ‘Entre’ evita la impresión de que todos entran simultáneamente en cada ciudad, y respeta el sentido distributivo del desplazamiento.
- source_word: one purpose will no longer remain with them
  english_pob_choice: one purpose will no longer remain with them
  chosen_spanish: ya no permanezca con ellos un solo propósito
  alternatives_spanish:
  - ya no permanezca entre ellos un mismo propósito
  - ya no tengan un mismo propósito
  lexicon: זמם / βουλή
  rationale: ‘Propósito’ recoge el sentido de plan, intención o designio compartido. Se conserva la construcción con ‘permanezca’ para reflejar la continuidad perdida, no solo la existencia de una idea.
- source_word: until the day of judgment
  english_pob_choice: until the day of judgment
  chosen_spanish: hasta el día del juicio
  alternatives_spanish:
  - hasta el día del juicio final
  - hasta el día del juicio de Dios
  lexicon: יום הדין / κρίσεως
  rationale: ‘Día del juicio’ es la forma más directa y natural en español para el cierre escatológico. ‘Juicio final’ añade una precisión no explícita aquí; ‘de Dios’ puede inferirse, pero no es necesaria en la frase.
theological_decisions:
- issue: The Lord our God in Jubilees is part of an angelic first-person revelation framework, not a simple quotation of Genesis.
  english_pob_reading: The wording echoes the Babel account but should not be treated as a mere quotation of Genesis; Jubilees embeds it in the angelic first-person revelation framework.
  chosen_spanish_reading: 'Y Yahvé nuestro Dios nos dijo: ...'
  alternative_spanish_readings:
  - 'Y el Señor nuestro Dios nos dijo: ...'
  - 'Y Dios nuestro nos dijo: ...'
  rationale: La formulación conserva el marco de revelación directa en primera persona plural (‘nos dijo’) y no la presenta como cita bíblica indirecta. ‘Yahvé’ preserva la señalización teológica del nombre divino conforme al proyecto POB.
  doctrine_reference: Jubileos 10:22; marco narrativo de revelación angelical en Jubileos
- issue: Divine initiative in the plural command ‘Come, let us go down’
  english_pob_reading: Come, let us go down
  chosen_spanish_reading: Vamos, descendamos
  alternative_spanish_readings:
  - Vengan, descendamos
  - Bajemos
  rationale: ‘Vamos, descendamos’ conserva el plural exhortativo y la coordinación del discurso divino/angelical sin perder solemnidad. ‘Bajemos’ sería más breve, pero debilita la estructura exhortativa del original.
  doctrine_reference: Génesis 11:7; Jubileos 10:22
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la revisión más reciente; el veredicto de control cruzado fue de alta concordancia. La redacción española sigue ese texto base y conserva el único matiz auditado: la alusión a Babel dentro del marco narrativo propio de Jubileos.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino según la convención POB en español.
  - Se preserva el plural inclusivo ‘descendamos’ para reflejar la voz del pasaje sin convertirla en una fórmula litúrgica posterior.
  - ‘Habla’ y ‘lenguas’ se distinguen para evitar aplanar la diferencia entre idiomas y acto de hablar.
  - No se introduce ‘Cristo’ ni terminología eclesiástica ajena al pasaje.
