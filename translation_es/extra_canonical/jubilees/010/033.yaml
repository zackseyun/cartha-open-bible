translation:
  language: es
  text: ante el príncipe santo, y ante Noé, nuestro padre. Pero no les escuchó, y habitó en la tierra.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ቅድሜሁ / לפניו
  english_pob_choice: before him / before the holy prince
  chosen_spanish: ante el príncipe santo
  alternatives_spanish:
  - delante del príncipe santo
  - ante él, ante el príncipe santo
  lexicon: before = ante/delante de
  rationale: El revisión del POB en inglés eliminó la duplicación pronominal y dejó solo la referencia al ‘holy prince’. En español, ‘ante el príncipe santo’ reproduce con naturalidad la relación espacial/relacional sin añadir un pronombre redundante que el texto revisado ya no sostiene.
- source_word: መኰንን ቅዱስ
  english_pob_choice: the holy prince
  chosen_spanish: el príncipe santo
  alternatives_spanish:
  - el príncipe sagrado
  - el príncipe santo
  lexicon: holy/sacred = santo
  rationale: ‘Santo’ es la equivalencia más directa y transparente en español para el adjetivo sacro aplicado a una figura titulada. Se mantiene el orden natural nominal en español.
- source_word: ኖኅ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noé
  lexicon: Noah = Noé
  rationale: Nombre bíblico estándar en español.
- source_word: አቡነ
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro padre
  lexicon: our father = nuestro padre
  rationale: Se conserva el valor inclusivo de parentesco/cercanía del original y del POB inglés, sin convertirlo en título eclesiástico distinto.
- source_word: ወኢሰምዖሙ
  english_pob_choice: But he did not listen to them
  chosen_spanish: Pero no les escuchó
  alternatives_spanish:
  - Pero no los escuchó
  - Pero no les hizo caso
  lexicon: hear/listen = escuchar
  rationale: ‘Escuchar’ refleja mejor el sentido volitivo de oír y atender. ‘Les’ preserva el complemento dativo del español cuando el objeto son personas.
- source_word: ወኀደረ፡ ምድረ፡
  english_pob_choice: and he dwelt in the land
  chosen_spanish: y habitó en la tierra
  alternatives_spanish:
  - y vivió en la tierra
  - y moró en la tierra
  lexicon: dwelt = habitar/morar
  rationale: ‘Habitar’ comunica el asentamiento estable que sugiere el original sin arcaizar demasiado. ‘La tierra’ sigue el referente genérico del texto proporcionado, sin añadir un topónimo no atestiguado.
theological_decisions:
- issue: Identidad y rango del ‘holy prince’
  english_pob_reading: the holy prince
  chosen_spanish_reading: el príncipe santo
  alternative_spanish_readings:
  - el príncipe sagrado
  - el ángel príncipe santo
  rationale: El texto fuente y el POB inglés conservan una expresión titulada ambigua. En español se preserva esa ambigüedad sin explicitar una identificación doctrinal que el segmento no desarrolla.
  doctrine_reference: Principio de sobriedad textual; no sobreespecificar seres celestiales sin apoyo del pasaje.
- issue: Relación filial de ‘our father’
  english_pob_reading: our father
  chosen_spanish_reading: nuestro padre
  alternative_spanish_readings:
  - nuestro padre
  - padre nuestro
  rationale: Se mantiene la lectura relacional y no litúrgica. ‘Padre nuestro’ podría sonar como fórmula fija en español; ‘nuestro padre’ evita esa asociación.
  doctrine_reference: Respeto al sentido referencial inmediato del texto, sin liturgizar la expresión.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para ajustarse al Geʽez provisto: se eliminó material no presente en este segmento, se dejó solo ‘before the holy prince’ sin duplicación pronominal, y se conservó la clausula final simple ‘he dwelt in the land’. La traducción española sigue esa forma revisada y no reintroduce el material descartado.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no aparece ningún tetragrama ni una cita directa del nombre divino en este versículo.
  - Se mantiene el registro bíblico sobrio, pero sin arcaísmos innecesarios.
  - ‘Tierra’ se conserva de modo genérico, ya que el segmento fuente no especifica el territorio con mayor detalle.
