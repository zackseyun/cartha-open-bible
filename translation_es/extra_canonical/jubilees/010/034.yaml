translation:
  language: es
  text: Líbano, desde Hamat hasta la entrada de Egipto, él y sus descendientes hasta este día. Y por esto,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Λιβάνος / Lebanon
  english_pob_choice: Lebanon
  chosen_spanish: Líbano
  alternatives_spanish:
  - Lebanon
  lexicon: topónimo
  rationale: Se conserva el topónimo bíblico en forma española usual y claramente reconocible.
- source_word: from Hamath as far as the entrance of Egypt
  english_pob_choice: from Hamath as far as the entrance of Egypt
  chosen_spanish: desde Hamat hasta la entrada de Egipto
  alternatives_spanish:
  - desde Hamat hasta la puerta de Egipto
  - desde Hamat hasta el ingreso de Egipto
  lexicon: prepositional phrase / geographic extent
  rationale: ‘Entrada’ comunica bien el límite geográfico del hebreo/geez sin introducir una imagen innecesaria; se mantiene el paralelismo de extensión territorial.
- source_word: he and his descendants
  english_pob_choice: he and his descendants
  chosen_spanish: él y sus descendientes
  alternatives_spanish:
  - ello y sus descendientes
  lexicon: pronoun + kinship term
  rationale: La revisión auditada aclara que el referente es Canaán, no la tierra. En español, ‘él’ preserva el referente personal explícito del texto revisado.
- source_word: to this day
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  lexicon: temporal expression
  rationale: ‘Hasta este día’ reproduce el carácter formular bíblico y mantiene el registro elevado del texto.
- source_word: And because of this
  english_pob_choice: And because of this
  chosen_spanish: Y por esto,
  alternatives_spanish:
  - Y a causa de esto,
  - Y por esta razón,
  lexicon: connective
  rationale: Se conserva el conector causal final tal como exige el texto base, dejando la frase abierta como en el original transmitido.
theological_decisions:
- issue: Referencia del pronombre en 'he and his descendants'
  english_pob_reading: he and his descendants
  chosen_spanish_reading: él y sus descendientes
  alternative_spanish_readings:
  - ello y sus descendientes
  - él y su descendencia
  rationale: La nota de revisión indica que el pronombre remite a Canaán. Traducirlo con sujeto personal evita atribuir descendencia a la tierra y respeta la corrección textual documentada.
  doctrine_reference: Ninguna doctrina particular; decisión de referencia textual y gramatical.
translation_notes:
  revision_awareness: 'La traducción incorpora la revisión más reciente que corrigió una lectura errónea: el sujeto de ''he and his descendants'' es Canaán, no la tierra. También se preserva el final conector ''And because of this,'' que fue omitido en un borrador previo.'
  spanish_consistency_notes:
  - Se usa ‘Líbano’ como topónimo estándar en español.
  - Se evita ‘SEÑOR’ u otra sustitución porque el versículo no contiene el nombre divino.
  - Se mantiene el estilo bíblico sobrio y sintácticamente directo, sin ampliar el contenido más allá del tramo textual dado.
