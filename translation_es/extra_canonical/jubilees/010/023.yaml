  text: And the Lord went down, and we went down with him, to see the city and the tower that the sons of men had built. And he confused all their tongues, and they no longer heard one another’s speech, and they ceased building the city and the tower. Therefore the whole land of Shinar was called Babel, because there the Lord confused all the tongues of the sons of men, and from there they were scattered into their cities, each according to his tongue and according to his nation.
  revision_pass:
