translation:
  language: es
  text: Y Yahvé descendió, y descendimos con él, para ver la ciudad y la torre que habían construido los hijos de los hombres. Y confundió todas sus lenguas, y ya no entendían el habla unos de otros, y dejaron de edificar la ciudad y la torre. Por eso toda la tierra de Sinar fue llamada Babel, porque allí Yahvé confundió todas las lenguas de los hijos de los hombres, y desde allí fueron esparcidos a sus ciudades, cada uno según su lengua y según su nación.
  philosophy: optimal-equivalence
