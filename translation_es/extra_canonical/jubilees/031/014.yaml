    rationale: La política del proyecto establece 'Yahvé' para יהוה/YHWH en el texto principal. La defensa del borrador no demuestra una excepción contextual firme; más bien apela a la forma inglesa 'Lord'. Dado el estándar del proyecto, conviene normalizar a 'Yahvé'.
