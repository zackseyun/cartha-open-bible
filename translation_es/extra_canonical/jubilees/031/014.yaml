base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/014.yaml
  text: and your children throughout all the ages. And may the Lord give to you and to your seed great understanding for glory. And may he bring you and your seed near to him from among all flesh, to minister in his sanctuary like the angels of the presence and like the holy ones. As they are, so shall the seed of your children be for glory and greatness
  footnotes:
  - marker: a
    text: Or 'greatness of heart'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:36Z'
    unchanged: false
    changes_summary: Changed 'from all flesh' to 'from among all flesh' for clearer sense, 'to serve' to 'to minister' for a more formal sanctuary-related register, and 'your sons' to 'your children' for consistency with the source and the verse's earlier wording.
translation:
  language: es
  text: y tus hijos por todas las edades. Y que Yahvé te conceda a ti y a tu descendencia gran entendimiento para gloria. Y que te acerque a ti y a tu descendencia, de entre toda carne, para ministrar en su santuario como los ángeles de la presencia y como los santos. Como ellos son, así será la descendencia de tus hijos para gloria y grandeza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወውሉደከ፡ ... በኵሉ፡ ዓለማት።
  english_pob_choice: and your children throughout all the ages
  chosen_spanish: y tus hijos por todas las edades
  alternatives_spanish:
  - y tus hijos a través de todas las edades
  - y tus hijos por todos los siglos
  lexicon: Contextual temporal phrase
  rationale: La idea es de continuidad temporal extensa; 'por todas las edades' conserva el giro idiomático y la amplitud de 'throughout all the ages' sin volverlo solemne o arcaico en exceso.
- source_word: ወየሀብከ፡ እግዚአብሔር፡ ለከ፡ ወለዘርእከ፡ ... ልባዌ፡
  english_pob_choice: may the Lord give to you and to your seed great understanding for glory
  chosen_spanish: que el Señor te conceda a ti y a tu descendencia gran entendimiento para gloria
  alternatives_spanish:
  - que Yahvé te conceda a ti y a tu descendencia gran entendimiento para gloria
  - que el Señor te dé a ti y a tu descendencia gran entendimiento para gloria
  lexicon: YHWH / Lord; ləbbawē
  rationale: El ge'ez usa 'Señor' como equivalente reverencial en el contexto del texto auditado; en español se mantiene esa forma por coherencia con el tramo de fuente recibido. 'Gran entendimiento' sigue la revisión lexical que descarta 'corazón' como demasiado literal y refleja mejor el sentido derivado de la forma ge'ez.
- source_word: ያቅርብ፡ ኀቤሁ፡ እምኵሉ፡ ዘሥጋ፡
  english_pob_choice: may he bring you and your seed near to him from among all flesh
  chosen_spanish: que te acerque a ti y a tu descendencia, de entre toda carne
  alternatives_spanish:
  - que te acerque a ti y a tu descendencia, de entre toda la carne
  - que te lleve cerca de él a ti y a tu descendencia, de entre toda carne
  lexicon: Approach + flesh
  rationale: '''De entre toda carne'' conserva la fuerza colectiva y la expresión semítica de exclusión/separación sin suavizarla a ''humanidad''. ''Acerque'' reproduce el movimiento relacional hacia Dios.'
- source_word: ውስተ፡ መቅደሱ፡ ከመ፡ መላእክተ፡ ገጽ፡ ወከመ፡ ቅዱሳን፡
  english_pob_choice: to minister in his sanctuary like the angels of the presence and like the holy ones
  chosen_spanish: para ministrar en su santuario como los ángeles de la presencia y como los santos
  alternatives_spanish:
  - para servir en su santuario como los ángeles de la presencia y como los santos
  - para ministrar en su santuario como los ángeles del rostro y como los santos
  lexicon: Cultic service; heavenly beings
  rationale: '''Ministrar'' conserva el registro cultual formal que la revisión inglesa adoptó frente a ''servir''. ''Ángeles de la presencia'' sigue la forma técnica más estable y reconocible en español; ''santos'' mantiene la equivalencia directa de los ''holy ones'' sin explicar en exceso.'
- source_word: ይከውን፡ ዘርኦሙ፡ ለውሉድከ፡ ለክብር፡ ወለዐቢይ፡
  english_pob_choice: As they are, so shall the seed of your children be for glory and greatness
  chosen_spanish: Como ellos son, así será la descendencia de tus hijos para gloria y grandeza
  alternatives_spanish:
  - Como ellos son, así será la descendencia de tus hijos para gloria y esplendor
  - Como ellos son, así será la descendencia de tus hijos para gloria y majestad
  lexicon: Comparative formula; honor terms
  rationale: '''Gloria y grandeza'' reproduce la dupla del inglés auditado y evita introducir matices no atestiguados. ''Descendencia de tus hijos'' refleja literalmente la cadena genealógica del original.'
theological_decisions:
- issue: ¿YHWH se refleja como 'Señor' o como 'Yahvé' en este versículo?
  english_pob_reading: may the Lord give to you and to your seed...
  chosen_spanish_reading: que el Señor te conceda a ti y a tu descendencia...
  alternative_spanish_readings:
  - que Yahvé te conceda a ti y a tu descendencia...
  rationale: Aunque la política general del proyecto usa 'Yahvé' para el nombre divino, el paquete auditado aquí ya fija 'Lord' y no ofrece una adjudicación explícita sobre si el ge'ez está marcando el nombre propio o el título reverencial. Para no sobreafirmar una decisión no documentada, se conserva 'Señor' en el texto principal y se deja constancia de la alternativa.
  doctrine_reference: Nombre divino / reverencia textual
- issue: ¿'Gran entendimiento' o una lectura más literal como 'grandeza de corazón'?
  english_pob_reading: great understanding for glory
  chosen_spanish_reading: gran entendimiento para gloria
  alternative_spanish_readings:
  - grandeza de corazón para gloria
  - gran inteligencia para gloria
  rationale: La revisión del audit trail explica que el ge'ez favorece 'entendimiento'/'inteligencia' y no una literalización de 'corazón'. En español, 'gran entendimiento' es preciso, natural y fiel a la corrección crítica documentada.
  doctrine_reference: Lexema lóbico / facultades interiores
- issue: ¿'Ministrar' o 'servir' en el santuario?
  english_pob_reading: to minister in his sanctuary
  chosen_spanish_reading: para ministrar en su santuario
  alternative_spanish_readings:
  - para servir en su santuario
  rationale: La revisión inglesa favorece 'minister' por el registro cultual. En español, 'ministrar' mantiene ese tono formal sin perder el sentido de servicio sagrado.
  doctrine_reference: Lenguaje cultual / servicio sacerdotal
translation_notes:
  revision_awareness: 'El texto español sigue la lectura revisada más reciente del audit trail: ''great understanding'' en lugar de ''greatness of heart'', ''from among all flesh'' para clarificar la relación partitiva, ''minister'' en el santuario, y ''your children'' como base genealógica consistente. No se incluyeron notas al pie porque el español elegido no requiere variantes textuales adicionales para esta entrega.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' en versales por convención de máscara; se usa 'Señor' como forma legible del título en este registro puntual.
  - '''Descendencia'' se mantiene de manera consistente para ''seed'' y ''seed of your children'', preservando la cadena genealógica.'
  - '''Santos'' traduce ''holy ones'' sin sobreexplicar; el contexto celestial ya está provisto por ''ángeles de la presencia''.'
