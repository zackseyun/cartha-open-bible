    changes_summary: Added the implied opening verb “He embraced” to account for the initial phrase and make the sentence complete in natural English; retained the rest with only punctuation normalization.
translation:
  language: es
  text: 'Abrazó el cuello de Jacob, su hijo, y lloró sobre su cuello. Y la oscuridad se apartó de los ojos de Isaac, y vio a los dos hijos de Jacob, Leví y Judá, y dijo: «¿Son estos tus hijos, hijo mío?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ክሳደ፡ / neck
  english_pob_choice: the neck of Jacob his son
  chosen_spanish: el cuello de Jacob, su hijo
  alternatives_spanish:
  - el cuello de Jacob, su hijo
  - a Jacob, su hijo
  lexicon: neck
  rationale: El ge'ez nombra explícitamente el ‘cuello’ antes de Jacob; por eso la traducción conserva esa imagen corporal y evita una paráfrasis que borre el detalle. La forma española fluye de manera natural sin perder la precisión del texto fuente.
- source_word: ወበከየ፡ / wept
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró
  - se puso a llorar
  lexicon: weep/cry
  rationale: ‘Lloró’ comunica fielmente la acción de duelo o emoción intensa expresada por el verbo, en español claro y digno.
- source_word: ጽላሌ፡ / dimness
  english_pob_choice: the dimness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - la oscuridad
  - la opacidad
  - la vista nublada
  lexicon: dimness
  rationale: La idea central es la pérdida de claridad visual; ‘oscuridad’ mantiene la imagen fuerte del texto y es idiomática en español. ‘Vista nublada’ sería más explicativa que literal.
- source_word: ይስሐቅ፡ / Isaac’s eyes
  english_pob_choice: Isaac’s eyes
  chosen_spanish: los ojos de Isaac
  alternatives_spanish:
  - los ojos de Isaac
  lexicon: eyes
  rationale: Se conserva la relación posesiva simple del original, sin añadir matices interpretativos.
- source_word: ወርእየ፡ / saw
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio
  - alcanzó a ver
  lexicon: see
  rationale: ‘Vio’ es la equivalencia directa y suficiente para el evento narrativo.
- source_word: ክልኤሆሙ፡ / the two of them
  english_pob_choice: the two sons of Jacob, Levi and Judah
  chosen_spanish: a los dos hijos de Jacob, Leví y Judá
  alternatives_spanish:
  - a los dos hijos de Jacob, Leví y Judá
  lexicon: two
  rationale: La expresión mantiene el énfasis numérico y aclara inmediatamente quiénes son los dos hijos identificados por el texto.
- source_word: ውሉደ፡ ለያዕቆብ፡ / sons of Jacob
  english_pob_choice: the sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los hijos de Jacob
  lexicon: son/child
  rationale: ‘Hijos’ reproduce la referencia genealógica de forma natural y fiel.
- source_word: ወይቤ፡ / and he said
  english_pob_choice: and he said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y dijo
  lexicon: say
  rationale: Equivalencia directa y narrativa.
theological_decisions:
- issue: Forma de la pregunta final de Isaac
  english_pob_reading: Are these your sons, my son?
  chosen_spanish_reading: «¿Son estos tus hijos, hijo mío?»
  alternative_spanish_readings:
  - «¿Son estos tus hijos, hijo mío?»
  - «¿Estos son tus hijos, hijo mío?»
  rationale: La pregunta conserva la ambigüedad filial del original y la ternura del vocativo final. ‘Hijo mío’ mantiene el tono relacional sin intensificarlo indebidamente.
  doctrine_reference: Narrative speech fidelity; no doctrinal expansion
- issue: Nombre divino no presente
  english_pob_reading: No divine name or theological title appears in this verse
  chosen_spanish_reading: No se introduce terminología teológica adicional
  alternative_spanish_readings:
  - —
  rationale: El verso es puramente narrativo y no requiere decisiones sobre Yahvé, Mesías o Espíritu.
  doctrine_reference: Textual neutrality
translation_notes:
  revision_awareness: La revisión inglesa reciente restauró la idea de un abrazo al cuello; el ge'ez apoya además el sustantivo 'cuello' explícito. La traducción española integra ambos rasgos sin necesidad de nota marginal, porque el texto final ya refleja ese detalle.
  spanish_consistency_notes:
  - Se usó ‘Jacob’ y ‘Isaac’ de manera estable, sin variantes hispanizadas.
  - ‘Leví’ y ‘Judá’ siguen la forma bíblica usual en español.
  - Se evitó ‘SEÑOR’ o cualquier sustitución cultual porque el verso no contiene el nombre divino.
  - La puntuación española usa comillas angulares para la cita directa final.
