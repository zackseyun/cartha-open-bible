  text: y se estremecerán todas las naciones, y se estremecerán todos los pueblos. En ti estará el auxilio de Jacob,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይትሀወኩ / "shall be shaken"
  english_pob_choice: shall be shaken
  chosen_spanish: se estremecerán
  alternatives_spanish:
  - serán sacudidas
  - temblarán
  lexicon: Geez ተሀወከ / estar sacudido, estremecerse
  rationale: El verbo inglés "shaken" puede corresponder a sacudirse o estremecerse; en español "se estremecerán" conserva la imagen de conmoción colectiva sin sonar excesivamente física o mecánica.
- source_word: ኵሎሙ አሕዛብ / "all the nations"
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todas las gentes
  - todas las etnias
  lexicon: Geez አሕዛብ / nations, gentiles
  rationale: '"Naciones" reproduce el alcance colectivo del término y mantiene la correspondencia más natural con el inglés auditado.'
- source_word: ወኵሉ ሕዝብ / "all the peoples"
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - toda la gente
  - todas las comunidades
  lexicon: Geez ሕዝብ / people, people-group
  rationale: '"Pueblos" distingue bien del versículo anterior y refleja la repetición paralela de grupos humanos amplios.'
- source_word: ረድኤተ / "help"
  english_pob_choice: help
  chosen_spanish: auxilio
  alternatives_spanish:
  - ayuda
  - socorro
  lexicon: Geez ረድኤት / help, aid, assistance
  rationale: '"Auxilio" conserva un matiz de ayuda eficaz y favorable, con tono bíblico sobrio, sin añadir una carga doctrinal no explicitada.'
- source_word: ለያዕቆብ / "of Jacob"
  english_pob_choice: of Jacob
  chosen_spanish: de Jacob
  alternatives_spanish:
  - para Jacob
  - a Jacob
  lexicon: Nombre propio Jacob
  rationale: La construcción posesiva sencilla es la más fiel al genitivo de pertenencia o beneficio del original.
theological_decisions:
- issue: Destino universal de conmoción antes del auxilio de Jacob
  english_pob_reading: and all the nations shall be shaken, and all the peoples shall be shaken. In you shall be the help of Jacob,
  chosen_spanish_reading: y se estremecerán todas las naciones, y se estremecerán todos los pueblos. En ti estará el auxilio de Jacob,
  alternative_spanish_readings:
  - y todas las naciones serán sacudidas, y todos los pueblos serán sacudidos. En ti estará la ayuda de Jacob
  - y temblarán todas las naciones, y temblarán todos los pueblos. En ti estará el socorro de Jacob
  rationale: La formulación mantiene la paralelía intensa del original sin introducir agentes, causas o precisiones ausentes. "En ti" conserva la referencia relacional del texto tal como viene en el audit trail inglés.
  doctrine_reference: Paralelismo poético y lenguaje profético de conmoción de las naciones
- issue: Función de "auxilio" como don relacional, no como término técnico
  english_pob_reading: the help of Jacob
  chosen_spanish_reading: el auxilio de Jacob
  alternative_spanish_readings:
  - la ayuda de Jacob
  - el socorro de Jacob
  rationale: Se evita convertir la frase en una categoría doctrinal especializada. "Auxilio" permite tanto la idea de ayuda brindada como la de apoyo/preservación, sin sobreinterpretación.
  doctrine_reference: Benignidad y preservación de Jacob en lenguaje poético
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el texto ge'ez y el audit trail inglés; no se registran revisiones aplicadas y la última pasada indicó que no se necesitan cambios.
  spanish_consistency_notes:
  - Se conserva la repetición del verbo en ambas líneas para reflejar el paralelismo del original.
  - Se mantiene "Jacob" sin glosa para respetar el nombre bíblico tal como aparece en el texto fuente.
  - La puntuación reproduce la cesura breve del verso y deja la frase final abierta, como en el texto auditado inglés.
