translation:
  language: es
  text: contigo. Y sé, hijo mío, que fue por causa mía que viniste, y este día será bendito.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ምስሌከ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con él
  - con ella
  - con ustedes
  lexicon: Geez ምስ- + 2ms suffix; simple comitative phrase
  rationale: La forma expresa compañía directa en segunda persona singular; en español, «contigo» es la realización natural y breve de ese sentido.
- source_word: አእምር
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - yo sé
  - conozco
  lexicon: Geez ידע/conocimiento verbal; primera persona singular de saber
  rationale: El verbo comunica conocimiento cierto; «sé» mantiene la franqueza y naturalidad del original sin añadir énfasis innecesario.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo mío
  lexicon: vocativo filial con posesivo de primera persona
  rationale: «Hijo mío» conserva el tono afectivo del vocativo y suena más directo en español que una estructura demasiado literal.
- source_word: ከመስ፡ በእንቲአየ፡ መጻእከ፡
  english_pob_choice: it was for my sake you came
  chosen_spanish: fue por causa mía que viniste
  alternatives_spanish:
  - viniste por mi causa
  - viniste por mi bien
  - viniste a causa de mí
  lexicon: causal phrase + 2ms perfective 'you came'
  rationale: «Por causa mía» reproduce bien la relación causal y preserva el foco en la razón de la venida; la inversión con «fue... que» refleja la estructura enfática del original y del inglés POB.
- source_word: ወዛቲ፡ ዕለት፡ ትኩን፡ ቡርክት፡
  english_pob_choice: and this day shall be blessed
  chosen_spanish: y este día será bendito
  alternatives_spanish:
  - y este día será bendecido
  - y este día será una bendición
  lexicon: passive/resultative blessing formula
  rationale: «Será bendito» conserva la fórmula bíblica tradicional y el matiz resultativo del pasivo mejor que una paráfrasis más libre.
theological_decisions:
- issue: Blessing language for the day
  english_pob_reading: this day shall be blessed
  chosen_spanish_reading: este día será bendito
  alternative_spanish_readings:
  - este día será bendecido
  - este día será una bendición
  rationale: El texto no desarrolla la fuente de la bendición, sino el estado proclamado sobre el día; «bendito» mantiene esa declaración solemne sin explicitar más de lo debido.
  doctrine_reference: Bendición declarativa en lenguaje bíblico; cf. fórmulas de bendición sobre tiempos y personas en la literatura veterotestamentaria.
translation_notes:
  revision_awareness: La versión inglesa revisada solo añadió el punto final y no cambió el contenido; la traducción española sigue fielmente el mismo sentido auditado sin introducir notas textuales.
  spanish_consistency_notes:
  - Se mantuvo tratamiento en segunda persona singular coherente con el sufijo poseído y el vocativo filial.
  - No se empleó «SEÑOR» ni terminología cristológica ajena al pasaje, pues el versículo no contiene esos términos.
  - «Bendito» se eligió por su registro bíblico y porque reproduce mejor el estado proclamado que una expansión explicativa.
