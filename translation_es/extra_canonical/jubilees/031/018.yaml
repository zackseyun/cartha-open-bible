    rationale: 'El texto abre/cierran comillas de forma inconsistente: ''Y sea maldito todo pueblo que te maldiga”. Y a Judá...'' mezcla cierre tipográfico sin apertura correspondiente y dificulta la lectura editorialmente limpia.'
  - severity: low
    issue: '''Delante de tu rostro'' suena demasiado literal'
    rationale: Aunque refleja el original de forma bastante directa, en español moderno y digno resulta más natural 'ante ti' o 'ante tu presencia'. Mantiene mejor la legibilidad sin perder el valor reverencial del giro.
  revised_spanish_text: '«Y sea maldito todo pueblo que te maldiga». Y a Judá le dijo: «Que Yahvé te dé fuerza y poder, para que aplastes a todos los que te odian. Sé gobernante, tú y uno de tus hijos, sobre los hijos de Jacob. Que tu nombre y el nombre de tus hijos anden y recorran toda la tierra y sus regiones. Entonces las naciones temerán ante ti»,”'
  revision_rationale: Se corrige la puntuación de comillas para ajustarla al español y se reemplaza 'delante de tu rostro' por 'ante ti' para evitar un calco rígido y mejorar la naturalidad sin alterar el sentido. Se conserva el resto del borrador porque representa fielmente el contenido fuente y las decisiones auditadas del POB.
