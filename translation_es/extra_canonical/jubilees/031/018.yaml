  text: and cursed be every people that curses you.” And to Judah he said, “May the Lord give you strength and power, so that you may tread down all who hate you. Be a ruler, you and one of your sons, over the sons of Jacob. May your name and the name of your sons go about and travel through all the earth and its regions. Then nations shall fear before your face,”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:38Z'
    unchanged: false
    changes_summary: Changed 'nation' to 'people' for lexical accuracy with ሕዝብ; added 'so that you may' to reflect ከመ; adjusted 'go out and pass through' to 'go about and travel through' to better reflect the paired verbs; changed 'the regions of it' to 'its regions' for natural English.
translation:
  language: es
  text: '«Y sea maldito todo pueblo que te maldiga». Y a Judá le dijo: «Que Yahvé te dé fuerza y poder, para que aplastes a todos los que te odian. Sé gobernante, tú y uno de tus hijos, sobre los hijos de Jacob. Que tu nombre y el nombre de tus hijos anden y recorran toda la tierra y sus regiones. Entonces las naciones temerán ante ti»,”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሕዝብ
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: obl.-lex.1
  rationale: El etiópico ሕዝብ designa un colectivo de personas; el ajuste inglés de 'nation' a 'people' confirma que aquí no conviene una lectura político-estatal. 'Pueblo' suena natural en español y conserva el valor colectivo sin sobrerredefinirlo.
- source_word: እግዚአ ብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Dios
  lexicon: obl.-lex.2
  rationale: La pauta del proyecto exige 'Yahvé' para el nombre divino. En este contexto no hay motivo para ocultarlo tras 'Señor'; además, el original ge'ez identifica la referencia divina sin ambigüedad.
- source_word: ኀይለ፡ ወጽንዐ፡
  english_pob_choice: strength and power
  chosen_spanish: fuerza y poder
  alternatives_spanish:
  - fortaleza y poder
  - fuerza y valentía
  lexicon: obl.-lex.3
  rationale: La pareja léxica pide dos términos cercanos pero no idénticos. 'Fuerza y poder' reproduce la duplicación enfática de forma clara en español sin introducir connotaciones ajenas.
- source_word: ከመ፡ ትኪዶሙ
  english_pob_choice: so that you may tread down
  chosen_spanish: para que aplastes
  alternatives_spanish:
  - para que pisotees
  - de modo que sometas
  lexicon: obl.-lex.4
  rationale: La revisión inglesa añadió 'so that you may' por ከመ, y el verbo expresa la imagen de dominio sobre enemigos. 'Aplastes' conserva la fuerza figurada de pisotear/derribar y suena más idiomático que un calco rígido.
- source_word: መኰንነ
  english_pob_choice: Be a ruler
  chosen_spanish: Sé gobernante
  alternatives_spanish:
  - Sé príncipe
  - Sé un soberano
  lexicon: obl.-lex.5
  rationale: El sustantivo/imperativo de autoridad se traduce con un mandato directo. 'Gobernante' mantiene el sentido de ejercicio de dominio sin cargar innecesariamente con títulos monárquicos específicos que el contexto no obliga a fijar.
- source_word: ዘየሐውር፡ ወዘያንሶሱ፡
  english_pob_choice: go about and travel through
  chosen_spanish: anden y recorran
  alternatives_spanish:
  - vayan y pasen
  - anden y pasen
  lexicon: obl.-lex.6
  rationale: La pareja verbal sugiere movimiento continuo por toda la tierra. 'Anden y recorran' transmite bien la idea de circular/extenderse sin reducirla a un solo verbo ni volverla demasiado literal en castellano.
- source_word: ውልድ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - descendientes
  - hijos varones
  lexicon: obl.-lex.7
  rationale: Aunque el inglés usa 'sons', en español 'hijos' mantiene la filiación y es más natural; el contexto de linaje permite incluir descendencia masculina sin necesidad de forzar una especificación que el verso ya deja implícita.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El proyecto prescribe Yahvé como forma principal para יהוה/identificación divina. Aquí la fuente ge'ez refiere inequívocamente a Dios, así que no hay razón textual para sustituir el nombre por una máscara devocional.
  doctrine_reference: Norma editorial del POB sobre el tetragrámaton
- issue: Finalidad de la fuerza dada a Judá
  english_pob_reading: May the Lord give you strength and power, so that you may tread down all who hate you
  chosen_spanish_reading: Que Yahvé te dé fuerza y poder, para que aplastes a todos los que te odian
  alternative_spanish_readings:
  - Que Yahvé te dé fuerza y poder, de modo que sometas a todos los que te odian
  rationale: La partícula ከመ marca propósito; conservarlo evita convertir el enunciado en una simple afirmación de capacidad. 'Aplastes' mantiene la imagen de derrota completa de los enemigos sin suavizarla.
  doctrine_reference: Tensión léxica conservada entre capacidad concedida y acción resultante
- issue: Alcance de la promesa a la descendencia de Judá
  english_pob_reading: Be a ruler, you and one of your sons, over the sons of Jacob
  chosen_spanish_reading: Sé gobernante, tú y uno de tus hijos, sobre los hijos de Jacob
  alternative_spanish_readings:
  - Sé gobernante, tú y uno de tus hijos, sobre los descendientes de Jacob
  rationale: 'La formulación conserva la posibilidad de una referencia doble: Judá mismo y uno de sus hijos. No se homogeneiza a un plural general para no borrar esa tensión genealógica.'
  doctrine_reference: Lectura genealógica directa del texto
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que ajustó 'people', añadió la finalidad explícita de ከመ y naturalizó el par verbal de movimiento ('go about and travel through') como circulación extendida por la tierra y sus regiones. También conserva la estructura poética de bendición/maldición y la progresión hacia el mandato a Judá.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme a la terminología del proyecto.
  - '''Pueblo'' se usó para ሕዝብ en lugar de ''nación'', en línea con la revisión inglesa.'
  - Se eligió 'hijos' para los descendientes de Judá por fluidez y porque el contexto de linaje lo sostiene.
  - No se introdujeron notas al pie porque no había una variante textual o alternativa lexical que requiriera anclaje explícito en el versículo.
