translation:
  language: es
  text: 'Betel. Y Jacob recordó la oración con la cual su padre había bendecido a Leví y a Judá, y se regocijó y bendijo al Dios de sus padres Abraham e Isaac. Y dijo: «Ahora sé que tengo una esperanza eterna, y también mis hijos, delante del Dios de todos». Y así se decretó respecto de los dos, y quedó escrito para ellos como un testimonio eterno y justo[a] en las tablas celestiales, tal como Isaac los bendijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testimonio eterno».
    reason: alternative_reading
lexical_decisions:
- source_word: YHWH / divine-name background implicit in "God of his fathers Abraham and Isaac"
  english_pob_choice: God of his fathers Abraham and Isaac
  chosen_spanish: el Dios de sus padres Abraham e Isaac
  alternatives_spanish:
  - el Dios de sus padres, Abraham e Isaac
  - Dios de sus padres Abraham e Isaac
  lexicon: Dios
  rationale: El pasaje no nombra aquí el tetragrámaton, sino a Dios en una fórmula patriarcal estable. En español, «el Dios de sus padres» conserva la relación de pacto sin introducir «Yahvé» donde el texto fuente no lo explicita.
- source_word: rejoiced
  english_pob_choice: rejoiced
  chosen_spanish: se regocijó
  alternatives_spanish:
  - se alegró
  - se llenó de alegría
  lexicon: regocijarse
  rationale: «Se regocijó» mantiene un matiz más solemne y bíblico que «se alegró», sin dejar de ser natural en español.
- source_word: everlasting hope
  english_pob_choice: everlasting hope
  chosen_spanish: una esperanza eterna
  alternatives_spanish:
  - una esperanza perpetua
  - una esperanza para siempre
  lexicon: esperanza
  rationale: La pareja adjetival «eterna / eterno» refleja bien el paralelo con «testimonio eterno» y evita una paráfrasis que suavice el alcance durativo.
- source_word: testimony
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio
  - declaración
  lexicon: testimonio
  rationale: «Testimonio» es el equivalente más directo y transparente para semʿa; conserva la fuerza judicial/documental del término.
- source_word: righteous
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo
  lexicon: justicia
  rationale: El adjetivo ge'ez añadido en la revisión exige su presencia en español. «Justo» es idiomático y preserva el componente de rectitud/correctitud legal del testimonio.
- source_word: heavenly tablets
  english_pob_choice: heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas celestiales
  - las tablas del cielo
  lexicon: tablas
  rationale: Se conserva la expresión técnica apocalíptica del texto. «Celestiales» mantiene el registro culto y la referencia al archivo divino.
- source_word: it was ordained concerning the two of them
  english_pob_choice: it was ordained concerning the two of them
  chosen_spanish: se decretó respecto de los dos
  alternatives_spanish:
  - se decretó respecto de los dos
  - se ordenó acerca de ambos
  lexicon: decretar
  rationale: La pasiva impersonal española reproduce la decisión establecida por autoridad superior sin introducir sujetos no presentes.
theological_decisions:
- issue: Naturaleza del registro en las tablas celestiales
  english_pob_reading: it was recorded for them as an everlasting, righteous testimony on the heavenly tablets
  chosen_spanish_reading: quedó escrito para ellos como un testimonio eterno y justo en las tablas celestiales
  alternative_spanish_readings:
  - quedó escrito para ellos como un testimonio eterno en las tablas celestiales
  - se registró para ellos como un testimonio eterno y justo en las tablas celestiales
  rationale: La revisión textual indica singularidad verbal («it was recorded») y la presencia explícita de «justo». La traducción española mantiene la idea de un registro divino permanente, sin diluir la dimensión normativa del testimonio.
  doctrine_reference: Registro celestial / memoria divina en literatura apocalíptica y del pacto
- issue: Esperanza de Jacob y sus hijos delante de Dios
  english_pob_reading: Now I know that I have an everlasting hope, and my children also, before the God of all
  chosen_spanish_reading: Ahora sé que tengo una esperanza eterna, y también mis hijos, delante del Dios de todos
  alternative_spanish_readings:
  - Ahora sé que tengo una esperanza eterna para mí y para mis hijos, delante del Dios de todos
  - Ahora sé que tengo una esperanza eterna, y también mis hijos, ante el Dios de todos
  rationale: «Delante de» conserva una relación de comparecencia/presencia ante Dios sin cargarla de matices litúrgicos posteriores. Se mantiene la inclusión de «mis hijos» como parte de la esperanza, conforme al texto inglés auditado.
  doctrine_reference: Esperanza del pacto / bendición generacional
translation_notes:
  revision_awareness: 'El texto fuente ge''ez no fue provisto en el payload, pero el audit trail inglés y las revisiones recientes aclaran dos puntos críticos: (1) el testimonio debe ser «eterno y justo», no solo «eterno»; y (2) el verbo del registro es singular («quedó escrito»), no plural. La versión española incorpora ambos ajustes y conserva el matiz documental-celestial del pasaje.'
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para el Dios de los padres y para «el Dios de todos».
  - Se mantiene «tablas celestiales» como término técnico estable.
  - Se evita introducir «Cristo» o lenguaje cristológico ajeno al pasaje.
  - «Justo» se añade para reflejar la revisión textual sin sobreinterpretar el término como una categoría moral amplia.
  - La nota al pie conserva la alternativa heredada del inglés para «testimonio eterno» mientras el texto principal refleja la forma revisada completa.
