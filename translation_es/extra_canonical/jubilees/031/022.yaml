base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/022.yaml
  text: He had seen the sons of Jacob his son truly. And he went out from between his feet and fell down and bowed to him. And he blessed them and rested there near Isaac his father that night[22], and they ate and drank.
  footnotes:
  - marker: '22'
    text: The line 'he went out from between his feet' is obscure in English because it reflects a literal idiom in the source; it likely describes Jacob withdrawing from Isaac's immediate presence before bowing.
    reason: segmentation_note
  - marker: a
    text: Or 'in righteousness'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:39Z'
    unchanged: false
    changes_summary: Capitalized the opening for formal register and removed 'with joy,' which is not represented in the source. Otherwise retained the draft's wording as accurate and complete.
translation:
  language: es
  text: Había visto verdaderamente a los hijos de Jacob, su hijo. Y salió de entre sus pies[a] y cayó y se postró ante él. Y los bendijo y reposó allí cerca de Isaac, su padre, aquella noche, y comieron y bebieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase 'salió de entre sus pies' es oscura en español porque refleja un modismo literal del texto fuente; probablemente describe que Jacob se apartó de la presencia inmediata de Isaac antes de postrarse.
    reason: segmentation_note
lexical_decisions:
- source_word: ዘበጽድቅ
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - en verdad
  - ciertamente
  lexicon: n/a
  rationale: La revisión inglesa descartó 'in righteousness' y fijó el sentido adverbial de certeza. En español, 'verdaderamente' transmite con naturalidad ese valor de verdad/realidad sin introducir la carga moral de 'justicia'.
- source_word: ውሉደ፡ ለያዕቆብ፡ ወልዱ
  english_pob_choice: the sons of Jacob his son
  chosen_spanish: los hijos de Jacob, su hijo
  alternatives_spanish:
  - los hijos de Jacob, su hijo
  - los hijos de Jacob, su descendiente
  lexicon: n/a
  rationale: Sigo la relación posesiva del original tal como quedó en el inglés auditado. Mantengo la aparente tensión referencial sin resolverla por paráfrasis, porque el texto fuente la conserva.
- source_word: ወወፅአ፡ እማእከለ፡ እገሪሁ
  english_pob_choice: he went out from between his feet
  chosen_spanish: salió de entre sus pies
  alternatives_spanish:
  - salió de entre sus pies
  - salió de su presencia
  lexicon: n/a
  rationale: Conservo la imagen idiomática literal, como hizo el inglés POB, porque el fuente es oscuro y la auditoría la señaló como idiomática. No lo sustituyo por una explicación interpretativa en el texto principal.
- source_word: ወወድቀ፡ ወሰገደ፡ ሎቱ
  english_pob_choice: fell down and bowed to him
  chosen_spanish: cayó y se postró ante él
  alternatives_spanish:
  - cayó y se postró ante él
  - cayó y se inclinó ante él
  lexicon: n/a
  rationale: '''Se postró'' conserva el gesto de homenaje solemne de ''bowed to him'' mejor que un simple ''se inclinó''.'
- source_word: ወባረኮሙ
  english_pob_choice: he blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - los bendijo
  lexicon: n/a
  rationale: Traducción directa y estable; el plural se mantiene conforme al objeto del verbo en la fuente y en el audit trail.
- source_word: ወአዕረፈ፡ ህየ
  english_pob_choice: rested there
  chosen_spanish: reposó allí
  alternatives_spanish:
  - reposó allí
  - descansó allí
  lexicon: n/a
  rationale: '''Reposó'' es suficientemente digno y natural en español bíblico sin forzar una tonalidad litúrgica ajena.'
- source_word: ቅሩበ፡ ይስሐቅ፡ አቡሁ
  english_pob_choice: near Isaac his father
  chosen_spanish: cerca de Isaac, su padre
  alternatives_spanish:
  - cerca de Isaac, su padre
  - junto a Isaac, su padre
  lexicon: n/a
  rationale: '''Cerca de'' reproduce la cercanía espacial sin añadir implicaciones relacionales no explícitas; ''su padre'' mantiene el genitivo del original.'
- source_word: ወበልዑ፡ ወሰትዩ፡
  english_pob_choice: they ate and drank
  chosen_spanish: comieron y bebieron
  alternatives_spanish:
  - comieron y bebieron
  lexicon: n/a
  rationale: Equivalencia directa y idiomática en español.
theological_decisions:
- issue: Sentido de ዘበጽድቅ en el primer segmento
  english_pob_reading: truly, not 'in righteousness'
  chosen_spanish_reading: verdaderamente, no 'en justicia'
  alternative_spanish_readings:
  - en justicia
  - en rectitud
  rationale: La revisión más reciente del inglés entiende el adverbio como marcador de verdad, no como referencia ética. En español, 'verdaderamente' evita importar una categoría moral que el pasaje aquí no exige.
  doctrine_reference: Fidelidad al sentido contextual; evitar moralización indebida del sintagma.
- issue: Conservación del idiomático 'salió de entre sus pies'
  english_pob_reading: literal idiom retained with explanatory note in English
  chosen_spanish_reading: salió de entre sus pies, con la misma literalidad
  alternative_spanish_readings:
  - salió de su presencia
  - se apartó de él
  rationale: La tradición POB conserva la imagen obscura y la explica en nota. En español mantengo la expresión literal para no perder la huella del original ni su tensión semántica.
  doctrine_reference: Principio de transparencia textual y nota explicativa para pasaje oscuro.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió el valor de ዘበጽድቅ de 'in righteousness' a 'truly'. También retiró 'with joy' por no estar en la fuente. La presente redacción sigue esa revisión y conserva la literalidad idiomática de 'he went out from between his feet' sin expandirla en el texto principal.
  spanish_consistency_notes:
  - Mantengo un registro formal y bíblico, pero con sintaxis española natural.
  - Evito 'SEÑOR' porque no hay aquí una sustitución del nombre divino en el pasaje.
  - Conservo 'postró' como verbo de homenaje solemne y 'reposó' como solución sobria para 'rested'.
  - No añado elementos afectivos como 'con alegría', ya que la revisión del audit trail los removió por no estar en la fuente.
