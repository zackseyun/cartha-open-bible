base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/024.yaml
  text: 'And it was reckoned to him as righteousness. And Jacob told his father during the night everything: how the Lord had shown him great mercy, and how he had made all his ways prosper and had protected him from everything.'
  footnotes:
  - marker: a
    text: Or 'And righteousness passed over to him.'.
    reason: previous_rendering
  - marker: b
    text: Or 'everything that the Lord had done with him, the great mercy'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:41Z'
    unchanged: false
    changes_summary: Adjusted 'God' to 'the Lord' for እግዚአ ብሔር; rendered ምስሌሁ more naturally as 'with him'; changed 'prospered all his ways' to 'had made all his ways prosper' for clearer English; simplified the ending to 'from everything' to reflect እምኵሉ without adding 'evil'; and slightly refined the opening to 'passed over to him.'
translation:
  language: es
  text: 'Y le fue contado[a] por justicia. Y Jacob le contó a su padre durante la noche todo: cómo Yahvé le había mostrado gran misericordia, y cómo había hecho prosperar todos sus caminos y lo había protegido de todo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Y le fue imputado por justicia”.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወተኈለቈ / ἐλογίσθη (idiom of reckoning)
  english_pob_choice: And it was reckoned to him as righteousness.
  chosen_spanish: Y le fue contado como justicia.
  alternatives_spanish:
  - Y le fue imputado como justicia.
  - Y le fue considerado como justicia.
  lexicon: λογίζομαι / reckoning idiom
  rationale: El giro bíblico estándar en español para la idea de “was reckoned/counted” es “le fue contado”. Conserva la pasiva impersonal y la relación forense del texto sin volverlo explicativo ni doctrinalmente estrecho.
- source_word: ጽድቀ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: צדק / δικαιοσύνη
  rationale: En este contexto de contabilización divina, “justicia” es la equivalencia más natural y fiel para el valor covenantal/legal del término. “Rectitud” es posible, pero suena más moral; “justificación” añade una lectura demasiado técnica para el versículo.
- source_word: እግዚአ ብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: יהוה
  rationale: La política del proyecto pide “Yahvé” para el nombre divino. Aunque el audit trail inglés dice “the Lord”, aquí corresponde explicitar el nombre divino detrás del ge'ez, no ocultarlo con una sustitución reverencial.
- source_word: ሣህለ፡ ዐቢየ
  english_pob_choice: great mercy
  chosen_spanish: gran misericordia
  alternatives_spanish:
  - gran favor
  - gran bondad
  lexicon: חסד / ἔλεος
  rationale: “Gran misericordia” refleja con precisión la intensidad del sintagma y mantiene el tono bíblico sin perder naturalidad en español.
- source_word: ፍኖቲሁ
  english_pob_choice: all his ways
  chosen_spanish: todos sus caminos
  alternatives_spanish:
  - todas sus sendas
  - todas sus maneras
  lexicon: דרך / ὁδοί
  rationale: “Caminos” es la forma más transparente y bíblicamente estable en español, y conserva la pluralidad del original.
- source_word: ተማኅፀኖ እምኵሉ
  english_pob_choice: had protected him from everything
  chosen_spanish: lo había protegido de todo
  alternatives_spanish:
  - lo había guardado de todo
  - lo había protegido de todo mal
  lexicon: שמר / προστατεύω
  rationale: El cierre del ge'ez es amplio (“de todo”), y no conviene añadir “mal” sin base textual. “Lo había protegido de todo” reproduce esa amplitud y sigue el registro del POB inglés revisado.
theological_decisions:
- issue: Reckoning/counting as righteousness
  english_pob_reading: And it was reckoned to him as righteousness.
  chosen_spanish_reading: Y le fue contado como justicia.
  alternative_spanish_readings:
  - Y le fue imputado como justicia.
  - Y le fue considerado como justicia.
  rationale: El texto preserva el idioma bíblico de imputación sin forzar una explicación doctrinal posterior. En español, “le fue contado” mantiene la tensión entre valoración divina y declaración judicial.
  doctrine_reference: Gn 15:6; Sal 106:31
- issue: Divine name in a cited historical narrative
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: Dado que el source payload es ge'ez y el audit trail inglés usa “the Lord” para እግዚአ ብሔር, el español de este proyecto sigue la convención de restituir el nombre divino como Yahvé, en lugar de enmascararlo.
  doctrine_reference: Convención terminológica del proyecto para יהוה
translation_notes:
  revision_awareness: La revisión más reciente corrigió el inglés a “it was reckoned to him as righteousness” y aclaró que እግዚአ ብሔር corresponde a “the Lord”. También simplificó el final a “from everything”, por lo que la versión española evita añadir “mal” y conserva la amplitud del original. Se mantuvo la estructura en dos oraciones y se decidió una formulación española idiomática que refleja el idiomático bíblico de imputación.
  spanish_consistency_notes:
  - Se usa “Yahvé” conforme a la terminología por defecto del proyecto para el nombre divino.
  - Se conserva “justicia” para ጽድቀ, evitando “justificación” por ser más interpretativo.
  - Se mantiene el alcance amplio de “de todo” sin introducir la especificación “mal”.
  - La construcción “le fue contado” es una solución bíblica estable en español y respeta la pasiva del original.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto donde corresponden.
