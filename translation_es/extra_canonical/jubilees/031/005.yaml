translation:
  language: es
  text: 'y déjame verlo antes de morir.” Y Jacob fue a su padre Isaac y a su madre Rebeca, a la casa de su padre Abraham. Y llevó consigo a dos de sus hijos: Leví y Judá.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእርአዮ፡ ዘእንበለ፡ እሙት።
  english_pob_choice: and let me see him before I die.
  chosen_spanish: y déjame verlo antes de morir.
  alternatives_spanish:
  - y permíteme verlo antes de morir.
  - y concédeme verlo antes de que muera.
  lexicon: ver / morir
  rationale: 'El ge''ez expresa una petición directa: ‘déjame verlo’ antes de la muerte. En español, ‘déjame verlo’ conserva la fuerza coloquial y la inmediatez del ruego sin añadir matices no presentes en el texto.'
- source_word: ወሖረ፡ ያዕቆብ፡ ኀበ፡ አቡሁ፡ ይስሐቅ፡ ወኀበ፡ እሙ፡ ርብቃ፡
  english_pob_choice: And Jacob went to his father Isaac and to his mother Rebekah,
  chosen_spanish: Y Jacob fue a donde estaban su padre Isaac y su madre Rebeca,
  alternatives_spanish:
  - Y Jacob fue a su padre Isaac y a su madre Rebeca,
  - Y Jacob se dirigió a su padre Isaac y a su madre Rebeca,
  lexicon: ir a / a donde estaban
  rationale: El giro ge'ez con ኀበ puede implicar dirección y lugar de encuentro. ‘Fue a donde estaban’ preserva la referencia espacial que el español simple ‘fue a’ puede perder, sin sobretraducir.
- source_word: ውስተ፡ *ቤቱ፡ ለአቡሁ፡ አብርሃም።
  english_pob_choice: to the house of his father Abraham.
  chosen_spanish: a la casa de su padre Abraham.
  alternatives_spanish:
  - a la casa de su padre Abraham.
  - a la casa de su padre, Abraham.
  lexicon: house
  rationale: '‘Casa’ reproduce el sentido inmediato y estable del texto: el hogar/población doméstica asociada con Abraham. No se introduce ‘hogar’ porque el sustantivo concreto del original permite una traducción directa y clara.'
- source_word: ወክልኤተ፡ እምውሉዱ፡ ነሥአ፡
  english_pob_choice: And he took with him two of his sons, Levi and Judah.
  chosen_spanish: 'Y llevó consigo a dos de sus hijos: Leví y Judá.'
  alternatives_spanish:
  - 'Y tomó consigo a dos de sus hijos: Leví y Judá.'
  - 'Y llevó con él a dos de sus hijos: Leví y Judá.'
  lexicon: take
  rationale: El ge'ez enfatiza el acto de llevar consigo. ‘Llevó consigo’ comunica mejor acompañamiento y movimiento conjunto que un simple ‘tomó’ en español.
theological_decisions:
- issue: Identificación de los hijos nombrados
  english_pob_reading: Levi and Judah
  chosen_spanish_reading: Leví y Judá
  alternative_spanish_readings:
  - Levi y Judá
  - Leví y Judas
  rationale: Se conservan los nombres bíblicos en la forma española usual y reconocible, sin alterar la tradición textual.
  doctrine_reference: Nombres propios bíblicos / onomástica bíblica
translation_notes:
  revision_awareness: 'La traducción española sigue de cerca el texto ge''ez, manteniendo el mismo contenido que la versión inglesa POB: la petición de ver al destinatario antes de morir, el viaje de Jacob a casa de Isaac y Rebeca, y la compañía de dos hijos nombrados Leví y Judá. No se registran revisiones posteriores ni variantes activas en el expediente.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa puntuación narrativa estándar en español, con dos puntos antes de la lista de nombres para reflejar la enumeración del texto.
  - Se conserva el orden de los nombres y de las cláusulas del original sin añadir interpretaciones narrativas.
