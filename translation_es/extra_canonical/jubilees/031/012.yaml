translation:
  language: es
  text: los dos juntos. Y un espíritu de profecía descendió a su boca. Y tomó a Leví con su mano derecha
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለክልኤሆሙ፡ ኀቡረ።
  english_pob_choice: the two of them together
  chosen_spanish: los dos juntos
  alternatives_spanish:
  - ambos juntos
  - los dos a la vez
  lexicon: numeral + collective/adverbial phrase
  rationale: El ge'ez expresa de forma compacta la idea de dos personas actuando juntas. «Los dos juntos» conserva la dualidad y el matiz de simultaneidad/compañía sin forzar una duplicación innecesaria.
- source_word: መንፈሰ፡ ትንቢት፡
  english_pob_choice: a spirit of prophecy
  chosen_spanish: un espíritu de profecía
  alternatives_spanish:
  - un espíritu profético
  - el espíritu de profecía
  lexicon: רוּחַ/πνεῦμα + sustantivo de cualidad
  rationale: Se mantiene la fórmula nominal del original y del inglés auditado. «Espíritu de profecía» preserva la construcción directa y la posible ambigüedad entre un espíritu caracterizado por la profecía y la acción profética misma.
- source_word: ወረደ፡ ውስተ፡ አፉሁ፡
  english_pob_choice: came down into his mouth
  chosen_spanish: descendió en su boca
  alternatives_spanish:
  - descendió dentro de su boca
  - cayó en su boca
  lexicon: verb of descent + prepositional phrase
  rationale: «Descendió» refleja el movimiento desde arriba propio del original. «En su boca» es más natural en español que un calco rígido de «dentro de», y conserva la imagen de la inspiración/profecía que llega a la boca.
- source_word: ወአንዘ፡ ... በየማናዊ፡
  english_pob_choice: he took Levi with his right hand
  chosen_spanish: tomó a Leví con su mano derecha
  alternatives_spanish:
  - tomó a Leví de su mano derecha
  - agarró a Leví con su mano derecha
  lexicon: verb of taking + right hand
  rationale: «Tomó a Leví» sigue de cerca el acto verbal del ge'ez y del inglés. «Con su mano derecha» preserva la instrumentalidad y la imagen corporal sin añadir una interpretación más específica que el texto no exige.
theological_decisions:
- issue: Naturaleza de «espíritu de profecía»
  english_pob_reading: a spirit of prophecy
  chosen_spanish_reading: un espíritu de profecía
  alternative_spanish_readings:
  - un espíritu profético
  - la inspiración profética
  rationale: Se conserva la expresión sustantiva porque el texto no explicita si se trata del Espíritu Santo, de un impulso profético o de un estado carismático. La formulación mantiene la tensión semántica sin resolverla prematuramente.
  doctrine_reference: carismas proféticos; pneumatología bíblica
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó 'both of them together' a 'the two of them together' por mayor naturalidad. La versión española sigue esa decisión con «los dos juntos», sin introducir desarrollo interpretativo adicional.
  spanish_consistency_notes:
  - Se usa «Leví» como forma española estable del nombre.
  - Se evita «SEÑOR» u otra sustitución, porque este versículo no contiene el nombre divino.
  - «Espíritu» va en minúscula porque no hay marcador explícito de Espíritu Santo en el texto.
