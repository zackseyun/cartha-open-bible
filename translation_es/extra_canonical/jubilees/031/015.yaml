  language: en
  yaml_path: translation/extra_canonical/jubilees/031/015.yaml
  text: and holiness. And may he make them great throughout all the ages. And they shall be princes and judges and chiefs for all the seed of the sons of Jacob. They shall speak the word of the Lord in righteousness[15], and they shall judge all his judgments in righteousness, and they shall declare his ways to Jacob and his paths to Israel. The blessing of the Lord shall be in their mouths
  footnotes:
  - marker: '15'
    text: The clause rendered 'his paths to Israel' is textually difficult; some interpreters understand a stronger sense such as 'his ordinances' or 'his discipline' for Israel.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:36Z'
    unchanged: false
    changes_summary: Removed 'be given' to more closely reflect the source, which simply states that the blessing of the Lord shall be in their mouths. No other changes needed.
translation:
  language: es
  text: y santidad. Y que los engrandezca en todos los tiempos. Y serán príncipes, jueces y jefes para toda la descendencia de los hijos de Jacob. Hablarán la palabra de Yahvé en justicia, y juzgarán todos sus juicios en justicia, y declararán sus caminos a Jacob y sus sendas[a] a Israel. La bendición de Yahvé estará en sus labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula traducida como 'sus sendas a Israel' es textualmente difícil; algunos intérpretes entienden un sentido más fuerte, como 'sus ordenanzas' o 'su disciplina' para Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወለቅዱስ
  english_pob_choice: and holiness
  chosen_spanish: y santidad
  alternatives_spanish:
  - y lo santo
  - y santificación
  lexicon: קדש / ἁγιότης (conceptual field)
  rationale: El ge'ez expresa el sustantivo abstracto de santidad; en español, 'santidad' conserva el valor nominal sin forzar una frase verbal. Se evita expandir a 'lo santo' porque el contexto enumera rasgos o dones, no una perífrasis.
- source_word: ይነግሩ
  english_pob_choice: They shall speak
  chosen_spanish: Hablarán
  alternatives_spanish:
  - Dirán
  - Proclamarán
  lexicon: אמר / λαλέω (campo de hablar/proclamar)
  rationale: '''Hablarán'' reproduce el acto de comunicar la palabra divina sin añadir un matiz litúrgico o misionero más fuerte que el del texto.'
- source_word: ቃሎ ለእግዚአብሔር
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - la palabra del Señor
  - la palabra de Dios
  lexicon: דבר יהוה
  rationale: Se conserva 'Yahvé' según la terminología del proyecto para el nombre divino. 'Palabra' mantiene el paralelismo con la cláusula siguiente y el valor revelatorio del dicho.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: צדק / δικαιοσύνη
  rationale: '''Justicia'' es la equivalencia principal del campo legal-covenantal del texto. ''En rectitud'' sería posible, pero ''justicia'' es más consistente con el juicio y las ''sendas'' del contexto inmediato.'
- source_word: ወኵሎ ኵነኔሁ
  english_pob_choice: all his judgments
  chosen_spanish: todos sus juicios
  alternatives_spanish:
  - todos sus decretos
  - todos sus sentencias
  lexicon: משפט / κρίμα
  rationale: '''Juicios'' conserva la referencia a decisiones judiciales o sentencias divinas sin reexplicarlas. Otras opciones estrechan demasiado el sentido.'
- source_word: ይኴንኑ
  english_pob_choice: they shall judge
  chosen_spanish: juzgarán
  alternatives_spanish:
  - sentenciarán
  - fallarán
  lexicon: שפט / κρίνω
  rationale: '''Juzgarán'' es la forma natural y fiel para el acto judicial. ''Fallarán'' suena más técnico o jurídico en español moderno y podría endurecer innecesariamente el estilo.'
- source_word: ፍኖቶ
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - sus procedimientos
  lexicon: דרך / ὁδός
  rationale: '''Caminos'' mantiene la imagen bíblica tradicional y el paralelismo con ''sendas''. En español suena natural y permite conservar la duplicación poética.'
- source_word: ወአስርኖ
  english_pob_choice: and his paths
  chosen_spanish: y sus sendas
  alternatives_spanish:
  - y sus veredas
  - y sus caminos
  lexicon: אֹרַח / τρίβος
  rationale: '''Sendas'' diferencia esta segunda imagen de ''caminos'' y refleja mejor la variación poética del original. Se evita repetir ''caminos'' para no perder el paralelismo.'
- source_word: በረከተ
  english_pob_choice: The blessing
  chosen_spanish: La bendición
  alternatives_spanish:
  - La bendición divina
  - La bendición
  lexicon: ברכה / εὐλογία
  rationale: '''Bendición'' es la equivalencia directa y suficientemente solemne. No se añade ''divina'' porque Yahvé ya queda explícito en la frase.'
- source_word: ውስተ ኵሉ ዓለማት
  english_pob_choice: throughout all the ages
  chosen_spanish: en todos los tiempos
  alternatives_spanish:
  - por todas las edades
  - por todos los siglos
  lexicon: עולם / αἰών
  rationale: La frase ge'ez expresa duración a través de las edades; 'en todos los tiempos' comunica la continuidad sin imponer un registro temporal más poético pero menos claro.
theological_decisions:
- issue: Nombre divino en la 'palabra del Señor'
  english_pob_reading: the word of the Lord
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - la palabra del Señor
  - la palabra de Dios
  rationale: El proyecto pide no ocultar el nombre divino cuando el trasfondo original corresponde a יהוה. Aunque la tradición inglesa usa 'Lord', en español se explicita 'Yahvé' para ser coherente con la política terminológica del POB.
  doctrine_reference: Nombre divino / tetragrámaton
- issue: Expresión final de la bendición
  english_pob_reading: The blessing of the Lord shall be in their mouths
  chosen_spanish_reading: La bendición de Yahvé estará en sus labios
  alternative_spanish_readings:
  - La bendición de Yahvé estará en sus bocas
  - La bendición de Yahvé estará en su boca
  rationale: '''En sus labios'' preserva la imagen idiomática y poética del texto, y suena más natural y sobrio que ''en sus bocas''. Se evita ''será dada'' porque la revisión textual del audit trail corrigió justamente esa adición no sustentada.'
  doctrine_reference: Transmisión de bendición / lenguaje poético
- issue: Tensión textual en 'his paths to Israel'
  english_pob_reading: his paths to Israel
  chosen_spanish_reading: sus sendas a Israel
  alternative_spanish_readings:
  - sus caminos a Israel
  - sus ordenanzas para Israel
  - su disciplina para Israel
  rationale: Se mantiene la lectura más literal del audit trail con 'sendas', pero sin resolver la dificultad textual en favor de una paráfrasis interpretativa. Se conserva así la ambigüedad documentada entre caminos, rutas normativas y posibles ordenanzas.
  doctrine_reference: Problema textual / semántica de אֹרַח-ὁδός
- issue: 'Estilo de liderazgo: príncipes, jueces y jefes'
  english_pob_reading: princes and judges and chiefs
  chosen_spanish_reading: príncipes, jueces y jefes
  alternative_spanish_readings:
  - gobernantes, jueces y jefes
  - príncipes, magistrados y jefes
  rationale: '''Príncipes, jueces y jefes'' reproduce la triple serie sin sustituir términos por equivalentes eclesiásticos o modernos que alterarían el tono genealógico-político del pasaje.'
  doctrine_reference: Autoridad tribal / gobierno justo
translation_notes:
  revision_awareness: 'La redacción refleja la revisión más reciente del audit trail, que eliminó ''será dada'' para ajustarse al testimonio fuente: la bendición de Yahvé simplemente ''estará en sus labios''. También se preserva la dificultad textual de la cláusula final sin resolverla de forma interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino en coherencia con la política del proyecto.
  - '''sendas'' se usa para diferenciar la segunda imagen poética de ''caminos'' en la cláusula anterior.'
  - No se introducen términos eclesiásticos como 'pastores' o 'obispos'; el pasaje habla de autoridad civil/tribal.
  - Se conserva la repetición de 'en justicia' para reflejar la estructura paralela del original.
