base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/020.yaml
  text: and in you shall the salvation of Israel be found. And on the day you sit on the throne of the glory of your righteousness[20], there shall be great peace for all the seed of the sons of the beloved. Blessed be the one who blesses you, and all who hate you and afflict you, and those who curse you, shall be rooted out and destroyed.
  footnotes:
  - marker: '20'
    text: The phrase about sitting 'on the throne of the honor of your righteousness' is dense and may be construed more compactly as 'on the glorious throne of your righteousness.'
    reason: segmentation_note
  - marker: a
    text: Or 'his sons forever'.
    reason: previous_rendering
  - marker: b
    text: Or 'And when you sit'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:39Z'
    unchanged: false
    changes_summary: Replaced 'honor' with 'glory' for ክብር, and corrected 'of the beloved' to 'of his sons forever' to reflect ውሉዱ and ለፍቅር more accurately.
translation:
  language: es
  text: y en ti se hallará la salvación de Israel. Y en el día en que te sientes sobre el trono de la gloria de tu justicia[a], habrá gran paz para toda la descendencia de los hijos del amado. Bendito sea el que te bendice, y todos los que te aborrecen y te afligen, y los que te maldicen, serán arrancados de raíz y destruidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase sobre sentarte «sobre el trono de la gloria de tu justicia» es densa y también puede entenderse de forma más compacta como «sobre el glorioso trono de tu justicia».
    reason: segmentation_note
lexical_decisions:
- source_word: ትትረከብ / be found
  english_pob_choice: shall be found
  chosen_spanish: será hallada
  alternatives_spanish:
  - será encontrada
  - se hallará
  lexicon: no inventar
  rationale: En español, 'ser hallada' conserva bien la pasiva impersonal del original y el valor de descubrimiento/manifestación de la salvación en Israel.
- source_word: መድኃኒተ፡ እስራኤል
  english_pob_choice: the salvation of Israel
  chosen_spanish: la salvación de Israel
  alternatives_spanish:
  - el rescate de Israel
  - la liberación de Israel
  lexicon: no inventar
  rationale: '''Salvación'' es la correspondencia natural y suficientemente amplia para መድኃኒት en este contexto, sin forzar un matiz más militar o político que el texto no exige.'
- source_word: ወአመ፡ ዕለት፡
  english_pob_choice: And on the day / And when
  chosen_spanish: Y en el día en que
  alternatives_spanish:
  - Y cuando
  - Y el día en que
  lexicon: no inventar
  rationale: Se conserva el sustantivo temporal 'día', porque el texto ge'ez lo expresa explícitamente; así no se diluye la marca temporal que el audit trail señaló como relevante.
- source_word: ትነብር፡ ውስተ፡ መንበረ፡
  english_pob_choice: you sit on the throne
  chosen_spanish: te sientes sobre el trono
  alternatives_spanish:
  - te sientas en el trono
  - te sientes en el trono
  lexicon: no inventar
  rationale: '''Sentarte sobre el trono'' reproduce el sentido entronizatorio del giro verbal sin añadir solemnidad ajena. En español, ''sobre'' mantiene la imagen de entronización más cerca del paralelo original.'
- source_word: ክብር፡ ጽድቅከ፡
  english_pob_choice: the glory of your righteousness
  chosen_spanish: la gloria de tu justicia
  alternatives_spanish:
  - la gloria de tu rectitud
  - el honor de tu justicia
  lexicon: no inventar
  rationale: Se sigue la revisión que corrige ክብር como 'gloria'. 'Justicia' preserva el valor legal/covenantal de צְדָקָה/ጽድቅ en español bíblico contemporáneo.
- source_word: ዐቢይ፡ ሰላም፡
  english_pob_choice: there shall be great peace
  chosen_spanish: habrá gran paz
  alternatives_spanish:
  - habrá mucha paz
  - reinará gran paz
  lexicon: no inventar
  rationale: '''Gran paz'' reproduce la intensidad del adjetivo sin añadir una perífrasis interpretativa excesiva. ''Habrá'' conserva la futura promesa.'
- source_word: ለኵሉ፡ ዘርአ፡ ውሉዱ፡ ለፍቅር
  english_pob_choice: for all the seed of the sons of the beloved
  chosen_spanish: para toda la descendencia de los hijos del amado
  alternatives_spanish:
  - para toda la descendencia de los hijos del amado/aquel a quien ama
  - para toda la descendencia de sus hijos
  lexicon: no inventar
  rationale: Se conserva la construcción difícil sin neutralizarla. 'Del amado' refleja el valor de ለፍቅር como genitivo/relacional ligado a 'amado'; 'hijos' mantiene ውሉዱ como descendencia/linaje filial. No se adopta 'para siempre' porque la revisión textual la rechazó.
- source_word: ቡሩክ
  english_pob_choice: Blessed
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Sea bendito
  lexicon: no inventar
  rationale: '''Bendito sea'' es una fórmula española idiomática que mantiene el carácter declarativo de la bendición sin perder solemnidad.'
- source_word: ይጸልኡከ
  english_pob_choice: hate you
  chosen_spanish: te aborrecen
  alternatives_spanish:
  - te odian
  - te detestan
  lexicon: no inventar
  rationale: '''Aborrecen'' conserva un tono fuerte y bíblico para el odio hostil que el pasaje enumera.'
- source_word: ይሣቅዩከ
  english_pob_choice: afflict you
  chosen_spanish: te afligen
  alternatives_spanish:
  - te oprimen
  - te atormentan
  lexicon: no inventar
  rationale: '''Afligen'' es la equivalencia más amplia y fiel para la acción de causar sufrimiento o opresión sin especificarla de más.'
- source_word: ይረግሙከ
  english_pob_choice: curse you
  chosen_spanish: te maldicen
  alternatives_spanish:
  - te maldicen con maldición
  - te lanzan maldiciones
  lexicon: no inventar
  rationale: '''Maldicen'' corresponde de modo directo y claro al acto verbal de maldecir.'
- source_word: ይሠረዉ፡ ወይትሐጐሉ
  english_pob_choice: shall be rooted out and destroyed
  chosen_spanish: serán arrancados de raíz y destruidos
  alternatives_spanish:
  - serán desarraigados y destruidos
  - serán arrancados y aniquilados
  lexicon: no inventar
  rationale: '''Arrancados de raíz'' comunica la imagen intensiva del hebraísmo/idioma bíblico para extirpación total, y ''destruidos'' mantiene el segundo verbo sin sobreinterpretarlo.'
theological_decisions:
- issue: La salvación de Israel vinculada a la persona dirigida como receptor del oráculo
  english_pob_reading: and in you shall the salvation of Israel be found
  chosen_spanish_reading: y en ti será hallada la salvación de Israel
  alternative_spanish_readings:
  - y por ti será hallada la salvación de Israel
  - y en ti se encontrará la salvación de Israel
  rationale: Se mantiene la preposición 'en ti', porque el original sitúa la salvación 'en' la persona destinataria y no meramente 'por medio de' ella. Esto preserva la densidad tipológica del pasaje sin añadir una explicitación doctrinal no requerida por el texto.
  doctrine_reference: tipología mesiánica / bendición patriarcal
- issue: Relación entre 'gloria' y 'justicia' en el trono
  english_pob_reading: the throne of the glory of your righteousness
  chosen_spanish_reading: el trono de la gloria de tu justicia
  alternative_spanish_readings:
  - el trono glorioso de tu justicia
  - el trono de la gloria de tu rectitud
  rationale: Se evita suavizar la construcción. 'Gloria de tu justicia' conserva la relación genitiva y la posible tensión entre esplendor real y rectitud moral/judicial.
  doctrine_reference: realeza justa / justicia entronizada
- issue: Identidad de 'los hijos del amado'
  english_pob_reading: all the seed of the sons of the beloved
  chosen_spanish_reading: toda la descendencia de los hijos del amado
  alternative_spanish_readings:
  - toda la descendencia de sus hijos
  - toda la descendencia de los hijos del Amado
  rationale: La revisión textual rechaza leer esto como 'para siempre'. Se conserva la frase difícil sin normalizarla, porque el texto ya transmite una cadena genealógica/relacional compleja que no conviene borrar.
  doctrine_reference: bendición genealógica / continuidad del linaje
- issue: 'Destino de los enemigos: eliminación total'
  english_pob_reading: shall be rooted out and destroyed
  chosen_spanish_reading: serán arrancados de raíz y destruidos
  alternative_spanish_readings:
  - serán desarraigados y destruidos
  - serán eliminados y destruidos
  rationale: La traducción mantiene la severidad del juicio sin atenuarlo. 'Arrancados de raíz' conserva el valor imagético de extirpación total que el texto sugiere.
  doctrine_reference: juicio retributivo / maldición pactal
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión textual que corrigió 'honor' por 'gloria' para ክብር y desechó la lectura 'para siempre' en favor de 'de los hijos del amado'; también se atendió la observación de que ወአመ፡ ዕለት፡ debe reflejarse con el sustantivo 'día', no solo con 'cuando'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención del proyecto no aplicable aquí porque el versículo no contiene el Tetragrámaton ni κύριος.
  - Se prefirió 'justicia' sobre 'rectitud' por la mejor continuidad con el léxico bíblico español y la relación con el trono.
  - No se domesticó 'hijos del amado' a una paráfrasis más fluida, para respetar la tensión textual documentada.
  - La puntuación conserva el paralelismo de bendición y maldición del original.
