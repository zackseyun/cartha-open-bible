review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del ge''ez y del audit trail inglés: Isaac bendice al Dios de Abraham, quien no privó al hijo de su siervo Isaac de su misericordia y su justicia. Sin embargo, la frase final ''de parte del hijo de su siervo Isaac'' no refleja bien la construcción ''from the son of his servant Isaac''; en español suena impropia y puede invertir o enturbiar la relación. La idea es que Dios no retiró/negó esos atributos al hijo de su siervo Isaac.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'de parte del hijo...' es poco natural en español bíblico y moderno. Una redacción como 'al hijo de su siervo Isaac' expresa con claridad el complemento indirecto afectado por 'no había negado/retirado'. El resto del verso lee bien.
  glossary_alignment: '''Dios'', ''misericordia'' y ''justicia'' están alineados con las pautas del proyecto. La elección de ''siervo'' aquí es defendible por contexto formular y legibilidad, aunque el proyecto suele preferir ''esclavo'' en otros entornos; no requiere cambio en este caso. No hay términos del glosario mayor en conflicto.'
  issues:
  - severity: medium
    issue: La locución 'de parte del hijo de su siervo Isaac' no corresponde bien al sentido de la fuente.
    rationale: La fuente, reflejada también por el inglés, expresa que Dios no negó su misericordia y justicia al hijo de su siervo Isaac. 'De parte de' en español normalmente indica procedencia o agente y crea ambigüedad semántica.
  - severity: low
    issue: '''no había retenido'' es posible, pero ''no había negado'' o ''no había retirado'' resulta más idiomático con atributos dados a una persona.'
    rationale: En español, se suele 'retener' algo que uno aún no entrega; con misericordia y justicia hacia una persona, 'negar' comunica mejor la privación evitada y mantiene fidelidad al sentido.
  revised_spanish_text: Y Isaac bendijo al Dios de su padre Abraham, que no había negado su misericordia ni su justicia al hijo de su siervo Isaac.
  revision_rationale: Se corrige el tramo final para expresar con naturalidad y precisión que Dios no privó al hijo de su siervo Isaac de su misericordia y su justicia. También se ajusta 'retenido' a 'negado' por mayor idiomaticidad en español sin apartarse del sentido de la fuente.
