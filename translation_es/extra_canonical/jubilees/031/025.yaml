translation:
  language: es
  text: Y Isaac bendijo al Dios de su padre Abraham, que no había negado su misericordia ni su justicia al hijo de su siervo Isaac.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አምላከ / God
  english_pob_choice: the God of his father Abraham
  chosen_spanish: el Dios de su padre Abraham
  alternatives_spanish:
  - el Dios de su padre Abraham
  lexicon: Dios
  rationale: ‘Dios’ es la equivalencia natural y fiel para el término teológico principal; mantiene la relación de pacto expresada por la fórmula posesiva ‘de su padre Abraham’.
- source_word: ዘአኀደገ / had not withheld
  english_pob_choice: had not withheld
  chosen_spanish: no había retenido
  alternatives_spanish:
  - no había negado
  - no había apartado
  lexicon: retener
  rationale: ‘Retener’ expresa con precisión la idea de no haber privado ni dejado de conceder algo beneficioso, en paralelo con el inglés auditado.
- source_word: ምሕረተ / mercy
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordia
  lexicon: misericordia
  rationale: ‘Misericordia’ conserva el valor bíblico de compasión activa y favor inmerecido, en un registro digno y ampliamente inteligible.
- source_word: ጽድቀ / righteousness
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia
  lexicon: justicia
  rationale: En este contexto relacional y pactual, ‘justicia’ comunica mejor la fidelidad recta de Dios que una traducción puramente abstracta.
- source_word: ወልደ ገብሩ / son of his servant
  english_pob_choice: the son of his servant
  chosen_spanish: el hijo de su siervo
  alternatives_spanish:
  - el hijo de su siervo
  - el hijo de su esclavo
  lexicon: siervo
  rationale: Aunque ‘esclavo’ puede ser más literal para δοῦλος/siervo en otros contextos del proyecto, aquí el sintagma ge’ez apunta a la condición de servidor dentro de una relación de casa/casa patriarcal; ‘siervo’ evita una dureza innecesaria en español y sigue el uso consagrado en esta fórmula genealógica.
theological_decisions:
- issue: Cómo expresar la benedición dirigida al Dios de Abraham sin domesticación litúrgica
  english_pob_reading: And Isaac blessed the God of his father Abraham
  chosen_spanish_reading: Y Isaac bendijo al Dios de su padre Abraham
  alternative_spanish_readings:
  - Entonces Isaac bendijo al Dios de su padre Abraham
  - Y Isaac alabó al Dios de su padre Abraham
  rationale: ‘Bendijo’ mantiene el acto verbal de alabanza/invocación tal como está en el texto fuente y en el audit trail; no se suaviza a una paráfrasis como ‘alabó’, que perdería la forma concreta del enunciado.
  doctrine_reference: Benediction language in patriarchal narratives; divine blessing formula
- issue: Relación entre ‘misericordia’ y ‘justicia’ como atributos divinos no opuestos
  english_pob_reading: his mercy and his righteousness
  chosen_spanish_reading: su misericordia ni su justicia
  alternative_spanish_readings:
  - su misericordia y su justicia
  - su misericordia y su rectitud
  rationale: La coordinación negativa ‘ni’ refleja fielmente la ausencia de retención de ambos dones/atributos en la secuencia del texto fuente y preserva la simetría semítica; ‘justicia’ mantiene el peso legal-covenantal del término.
  doctrine_reference: 'Divine attributes: mercy and righteousness/justice in covenant context'
