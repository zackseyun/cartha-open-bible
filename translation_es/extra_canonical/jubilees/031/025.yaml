revisions:
- from: Y Isaac bendijo al Dios de su padre Abraham, que no había retenido su misericordia ni su justicia de parte del hijo de su siervo Isaac.
  to: Y Isaac bendijo al Dios de su padre Abraham, que no había negado su misericordia ni su justicia al hijo de su siervo Isaac.
  rationale: Se corrige el tramo final para expresar con naturalidad y precisión que Dios no privó al hijo de su siervo Isaac de su misericordia y su justicia. También se ajusta 'retenido' a 'negado' por mayor idiomaticidad en español sin apartarse del sentido de la fuente.
  reviewer_model: gpt-5.4
