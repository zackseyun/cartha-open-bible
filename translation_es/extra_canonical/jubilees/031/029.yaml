  - severity: medium
    issue: '"en cuanto a que" es una opción poco natural para el valor causal de እንተ፡ ባቲ፡'
    rationale: Aunque no es imposible, en español bíblico fluido "porque", "ya que" o "puesto que" expresan mejor el sentido conjuntivo/causal reconocido por la auditoría inglesa.
  - severity: low
    issue: '"date prisa para cumplirlo" es aceptable, pero puede fluir mejor como "apresúrate a cumplirlo"'
    rationale: La construcción con infinitivo introducido por 'a' suena más natural y elevada en este registro.
