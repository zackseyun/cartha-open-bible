  yaml_path: translation/extra_canonical/jubilees/031/029.yaml
  text: in that you have seen me alive, and I also have seen you, my son. Prosper and fulfill the vow that you have vowed, and do not delay your vow, for you will be called to account concerning the vow, and now hasten to perform it.
  footnotes:
  - marker: a
    text: Or 'the day on which'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:42Z'
    unchanged: false
    changes_summary: Replaced 'do the vow' with 'fulfill the vow' for natural formal English; replaced 'will be sought out concerning the vow' with 'will be called to account concerning the vow' to better reflect the sense of being required/held accountable. Kept the rest substantially unchanged.
translation:
  language: es
  text: porque me has visto vivo, y también yo te he visto, hijo mío. Prospera y cumple el voto que has hecho, y no retrases tu voto, porque se te pedirá cuenta acerca del voto, y ahora apresúrate a cumplirlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እንተ፡ ባቲ፡
  english_pob_choice: in that
  chosen_spanish: en cuanto a que
  alternatives_spanish:
  - porque
  - ya que
  - puesto que
  - en que
  lexicon: conjunction/causal-conditional sense in Ge'ez
  rationale: La revisión indicó que no debe leerse como un literal ‘el día en que’, sino como una conexión explicativa/causal. ‘En cuanto a que’ conserva la relación sintáctica sin forzar un antecedente inexistente y suena natural en español formal.
- source_word: ርእክኒ፡ ሕያወየ፡
  english_pob_choice: you have seen me alive
  chosen_spanish: me has visto vivo
  alternatives_spanish:
  - has visto que estoy vivo
  - me has visto con vida
  lexicon: ver + adjetivo de estado
  rationale: ‘Vivo’ comunica el estado de vida de manera directa y fiel; ‘con vida’ es posible, pero un poco más perifrástico. Se mantiene el paralelismo con ‘yo te he visto’.
- source_word: ወርኢኩከ፡ አነሂ፡ ወልድየ።
  english_pob_choice: and I also have seen you, my son
  chosen_spanish: y también yo te he visto, hijo mío
  alternatives_spanish:
  - y yo también te he visto, hijo mío
  - y también te he visto yo, hijo mío
  lexicon: paralelismo enfático
  rationale: Se conserva el énfasis recíproco (‘también yo’) sin recargar el español. ‘Hijo mío’ refleja el vocativo afectivo del original.
- source_word: ተስፋሕ፡
  english_pob_choice: Prosper
  chosen_spanish: Prospera
  alternatives_spanish:
  - Ten prosperidad
  - Sé prosperado
  - Que prosperes
  lexicon: imperative prosperity language
  rationale: El imperativo directo es claro y dignificado en español. ‘Prospera’ mantiene la concisión del mandato.
- source_word: ወግበር፡ ጸሎተ፡
  english_pob_choice: and fulfill the vow
  chosen_spanish: y cumple el voto
  alternatives_spanish:
  - y realiza el voto
  - y haz el voto
  - y paga el voto
  lexicon: vow language
  rationale: ‘Cumplir el voto’ expresa bien la obligación de llevar a término lo prometido. ‘Voto’ es más natural y preciso en español bíblico que ‘promesa’ aquí.
- source_word: ወአታጕንዲ፡ ጸሎተከ፡
  english_pob_choice: and do not delay your vow
  chosen_spanish: y no retrases tu voto
  alternatives_spanish:
  - y no tardes en cumplir tu voto
  - y no demores tu voto
  lexicon: prohibition + delay
  rationale: Se preserva la relación con ‘voto’ y el mandato negativo. ‘Retrasar’ conserva la idea de aplazamiento sin introducir un objeto distinto.
- source_word: እስመ፡ ትትኀሠሥ፡ ጸሎተ፡
  english_pob_choice: for you will be called to account concerning the vow
  chosen_spanish: porque se te pedirá cuenta acerca del voto
  alternatives_spanish:
  - porque serás llamado a cuentas por el voto
  - pues se te exigirá cuenta del voto
  lexicon: accountability/legal obligation
  rationale: ‘Se te pedirá cuenta’ refleja la rendición de cuentas implicada en el texto y evita una traducción demasiado interpretativa. ‘Acerca del voto’ conserva el objeto del examen.
- source_word: ወይእዜኒ፡ ጕጕአ፡ ትግበራ፡
  english_pob_choice: and now hasten to perform it
  chosen_spanish: y ahora date prisa para կատարarlo
  alternatives_spanish:
  - y ahora apresúrate a hacerlo
  - y ahora apresúrate a cumplirlo
  lexicon: hasten + perform
  rationale: Se mantiene la urgencia del mandato final. El verbo final debería ser un español plenamente integrado; aquí se requiere una forma final de ‘cumplirlo’/‘hacerlo’ para expresar la ejecución del voto con naturalidad.
theological_decisions:
- issue: rendición de cuentas por el voto
  english_pob_reading: you will be called to account concerning the vow
  chosen_spanish_reading: se te pedirá cuenta acerca del voto
  alternative_spanish_readings:
  - serás llamado a cuentas por el voto
  - se te exigirá cuenta del voto
  rationale: El texto no solo exhorta a cumplir, sino que introduce responsabilidad moral ante Dios. ‘Pedirá cuenta’ mantiene la fuerza ética sin especificar indebidamente el sujeto humano.
  doctrine_reference: ética del voto / responsabilidad ante Dios
translation_notes:
  revision_awareness: Se incorporó la corrección de la revisión que rechaza ‘the day on which’ y se entendió እንተ፡ ባቲ፡ como una conjunción causal o explicativa (‘en cuanto a que’), no como referencia temporal. También se siguió la revisión de ‘will be called to account concerning the vow’ frente a lecturas más débiles de búsqueda o requisa.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque el pasaje no contiene el tetragrámaton ni un equivalente directo en la fuente dada.
  - ‘Voto’ se mantuvo de forma consistente para גְלָה/‘vow’ en el texto inglés auditable; no se sustituyó por ‘promesa’ para conservar el tono ritual-jurídico.
  - No se añadieron notas al pie porque el texto español no requiere una variante textual anclada y el único matiz relevante quedó resuelto en la redacción principal.
