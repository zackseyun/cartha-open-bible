    rationale: El inglés auditado conserva una alternativa previa ('and Judah with his left hand'). Aunque el texto principal español debe seguir la lectura clarificada, es apropiado preservar esa alternativa en nota, ya que forma parte del historial de decisión y puede interesar al lector textual.
  revised_spanish_text: 'y puso su mano izquierda sobre Judá[a], y se volvió primero hacia Leví y comenzó a bendecirlo, y le dijo: «Que te bendiga el Dios de todos, el Señor de todas las edades»'
