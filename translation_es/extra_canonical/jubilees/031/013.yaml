base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/013.yaml
  text: 'and his left hand on Judah, and he turned toward Levi first and began to bless him, and said to him: “May the God of all, the Lord of all the ages, bless you'
  footnotes:
  - marker: a
    text: Or 'and Judah with his left hand'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:35Z'
    unchanged: false
    changes_summary: Removed the second 'first' before 'began to bless him' as an unnecessary repetition in English; the sense of priority is already conveyed by 'turned toward Levi first.'
translation:
  language: es
  text: 'y puso su mano izquierda sobre Judá[a], y se volvió primero hacia Leví y comenzó a bendecirlo, y le dijo: «Que te bendiga el Dios de todos, el Señor de todas las edades»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y a Judá con su mano izquierda».'
    reason: Preserva la alternativa de formulación registrada en la nota del POB inglés, sin volver ambigua la lectura principal en español.
lexical_decisions:
- source_word: and his left hand on Judah
  english_pob_choice: and his left hand on Judah
  chosen_spanish: y su mano izquierda sobre Judá
  alternatives_spanish:
  - y con su mano izquierda sobre Judá
  - y puso su mano izquierda sobre Judá
  lexicon: mano izquierda
  rationale: El ge'ez presenta a Judá como objeto de la acción, no como sujeto; por eso en español se expresa como aposición posesiva breve y natural. Se evita una formulación que sugiera que Judá es quien actúa.
- source_word: turned toward Levi first
  english_pob_choice: he turned toward Levi first
  chosen_spanish: se volvió primero hacia Leví
  alternatives_spanish:
  - se volvió hacia Leví primero
  - dirigió primero su atención a Leví
  lexicon: volverse hacia
  rationale: El movimiento de orientación se conserva de forma directa y natural. 'Primero' mantiene la prioridad ya explicitada en el contexto sin repetirla innecesariamente.
- source_word: began to bless him
  english_pob_choice: began to bless him
  chosen_spanish: comenzó a bendecirlo
  alternatives_spanish:
  - empezó a bendecirlo
  - y comenzó a bendecirlo
  lexicon: bendecir
  rationale: '''Bendecir'' conserva la acción ritual de pronunciar una bendición sobre alguien. No se añade material interpretativo.'
- source_word: the God of all
  english_pob_choice: the God of all
  chosen_spanish: el Dios de todos
  alternatives_spanish:
  - el Dios de todo
  - el Dios de todo cuanto existe
  lexicon: Dios de todos
  rationale: La construcción posesiva reproduce el genitivo totalizador del original y del inglés auditado. 'De todos' es una forma idiomática y suficientemente amplia para el sentido universal.
- source_word: the Lord of all the ages
  english_pob_choice: the Lord of all the ages
  chosen_spanish: el Señor de todas las edades
  alternatives_spanish:
  - el Señor de todos los siglos
  - el Señor de todas las eras
  lexicon: Señor de todas las edades
  rationale: Se mantiene la correspondencia con la formulación auditada del inglés POB y el valor temporal totalizante. 'Edades' evita limitar el sentido a 'siglos' y conserva la amplitud del giro semítico.
theological_decisions:
- issue: Renderización de 'the God of all, the Lord of all the ages' sin suavizar su alcance universal
  english_pob_reading: May the God of all, the Lord of all the ages, bless you
  chosen_spanish_reading: Que te bendiga el Dios de todos, el Señor de todas las edades
  alternative_spanish_readings:
  - Que te bendiga Dios, Señor de todos los tiempos
  - Que te bendiga el Dios de todo, el Señor eterno
  rationale: Se conserva la doble designación divina y su amplitud absoluta. No se reduce a un mero 'Dios' ni se sustituye por una formulación más doctrinalmente interpretativa que el texto no exige.
  doctrine_reference: Teología bíblica del señorío universal de Dios; doxología patriarcal
- issue: Preservar la prioridad narrativa de Leví frente a Judá sin duplicar innecesariamente 'primero'
  english_pob_reading: he turned toward Levi first and began to bless him
  chosen_spanish_reading: se volvió primero hacia Leví y comenzó a bendecirlo
  alternative_spanish_readings:
  - se volvió hacia Leví primero y comenzó a bendecirlo
  - se dirigió primero a Leví y comenzó a bendecirlo
  rationale: La prioridad ya está marcada por 'primero'; duplicarla en la cláusula de bendición sería redundante. La traducción conserva el orden y el énfasis narrativo del texto revisado.
  doctrine_reference: Crítica textual y coherencia narrativa
translation_notes:
  revision_awareness: La redacción sigue el texto ge'ez de Jubileos 31:13 y respeta la revisión auditada que eliminó la repetición innecesaria de 'first' en inglés. También toma en cuenta la aclaración revisora de que Judá es objeto de la acción con 'su mano izquierda sobre Judá', evitando una lectura ambigua en español.
  spanish_consistency_notes:
  - Se usa 'Leví' y 'Judá' con acentuación tradicional en español bíblico.
  - Se mantiene 'Señor' para 'Lord' dentro de la fórmula fija 'Señor de todas las edades', coherente con el registro bíblico en español y con el paralelismo auditado del inglés.
  - No se introducen notas de pie porque no hay una alternativa textual que requiera anclaje visible en este versículo.
