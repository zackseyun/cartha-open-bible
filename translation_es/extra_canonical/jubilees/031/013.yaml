    rationale: La expresión 'y su mano izquierda sobre Judá' depende fuertemente del contexto anterior y en español suena truncada. Expresar el verbo 'puso' hace explícita la acción ya implicada por el ge'ez y por el contexto del versículo previo, sin introducir interpretación nueva.
  - severity: low
