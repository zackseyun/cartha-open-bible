translation:
  language: es
  text: 'Y que prospere todo lo que hagas, todo por lo que has orado[a]”. Y le dijo a Rebeca: “Ve con Jacob tu hijo”. Y Rebeca fue con Jacob su hijo, y Débora con ella, y llegaron a'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'todo por lo que has orado en oración'; el original conserva una repetición enfática del lenguaje de oración.
    reason: Preservar en nota la repetición enfática del original sin forzar el español del texto principal.
lexical_decisions:
- source_word: ይሥመር / prosper
  english_pob_choice: prosper
  chosen_spanish: prospere
  alternatives_spanish:
  - haga prosperar
  - te haga prosperar
  lexicon: prosperar
  rationale: El ge'ez expresa la idea de éxito/florecimiento de la acción, y la redacción inglesa conserva 'prosper'. En español, 'prospere' mantiene el valor desiderativo sin añadir un objeto explícito ajeno al texto.
- source_word: ጸሎተ / prayer
  english_pob_choice: all for which you have prayed in prayer
  chosen_spanish: todo por lo que has orado en oración
  alternatives_spanish:
  - todo lo que has pedido en oración
  - todo por lo que has suplicado en oración
  lexicon: orar
  rationale: La revisión inglesa corrigió 'vowed' a 'prayed' para reflejar el verbo real de orar. En español, 'has orado en oración' preserva esa repetición enfática del original sin convertirla en un voto o promesa.
- source_word: ሪርብቃ / Rebekah
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebekah
  lexicon: nombre propio bíblico
  rationale: La forma castellana estándar es 'Rebeca'; es clara para lectura eclesial y no altera el referente.
- source_word: ሖሪ / go
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Id
  lexicon: ir
  rationale: Imperativo singular natural en español, fiel al mandato directo de Isaac a Rebeca.
- source_word: ወልዳ / her son
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo propio
  - el hijo que tienes
  lexicon: hijo
  rationale: La revisión textual señala que el ge'ez incluye explícitamente 'tu hijo'. En español, 'tu hijo' reproduce esa precisión relacional sin sobreexplicar.
- source_word: ወሖረት / went
  english_pob_choice: Rebekah went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - partió
  lexicon: ir
  rationale: '''Fue con Jacob'' comunica el desplazamiento de manera natural y conserva la sobriedad narrativa del texto.'
- source_word: ደቦራ / Deborah
  english_pob_choice: Deborah
  chosen_spanish: Débora
  alternatives_spanish:
  - Deborah
  lexicon: nombre propio bíblico
  rationale: Forma española usual del nombre propio.
- source_word: በጽሑ / they came to
  english_pob_choice: they came to
  chosen_spanish: llegaron a
  alternatives_spanish:
  - vinieron a
  - arribaron a
  lexicon: llegar
  rationale: La cláusula queda incompleta en el testimonio, y la versión española también debe quedar abierta. 'Llegaron a' preserva la inconclusión sin rellenar el destino.
theological_decisions:
- issue: Oración como expresión de dependencia, no voto
  english_pob_reading: have prayed in prayer
  chosen_spanish_reading: has orado en oración
  alternative_spanish_readings:
  - has hecho una oración
  - has suplicado en oración
  rationale: La revisión inglesa descartó la lectura de voto y mantuvo la referencia explícita a la oración. La versión española evita desplazar el sentido hacia una promesa religiosa y conserva la intensificación semítica.
  doctrine_reference: Lexical fidelity to prayer language; no doctrinal expansion beyond the source
- issue: Mandato a Rebeca con precisión relacional
  english_pob_reading: Go with Jacob your son
  chosen_spanish_reading: Ve con Jacob, tu hijo
  alternative_spanish_readings:
  - Ve con Jacob
  - Ve con tu hijo Jacob
  rationale: La corrección del audit trail muestra que 'your son' pertenece al texto. Incluirlo en español evita borrar un detalle textual relevante y mantiene la autoridad del hablante en la escena.
  doctrine_reference: Source-critical fidelity; narrative precision
translation_notes:
  revision_awareness: La base inglesa fue revisada para sustituir 'have vowed in prayer' por 'have prayed in prayer', y para restaurar 'your son' en el mandato a Rebeca. La cláusula final permanece incompleta porque el testimonio ge'ez también se corta en 'and they came to'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo no contiene el nombre divino explícito en el tramo dado.
  - Se prefirió 'Rebeca' y 'Débora' como formas españolas comunes de los nombres propios bíblicos.
  - Se conservó la sintaxis fragmentaria al final para respetar la ruptura textual del testimonio.
  - La nota a pie de página no introduce una lectura diferente, sino una alternativa idiomática compatible con el énfasis del original.
