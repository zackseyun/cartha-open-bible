translation:
  language: es
  text: 'en ocasión de su sacrificio, y también a su madre, Rebeca. E Isaac dijo: «Que venga mi hijo Jacob»,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውስተ፡
  english_pob_choice: at
  chosen_spanish: en
  alternatives_spanish:
  - a
  - junto a
  lexicon: preposición de ubicación
  rationale: El ge'ez ውስተ expresa ubicación o presencia en un lugar o situación; en español, «en» comunica naturalmente la idea de estar presente en/participar de un sacrificio sin forzar una dirección concreta.
- source_word: መሥዋዕቱ፡
  english_pob_choice: his sacrifice
  chosen_spanish: su sacrificio
  alternatives_spanish:
  - su ofrenda
  - su holocausto
  lexicon: sacrificio
  rationale: El término denota un acto sacrificial. «Sacrificio» conserva la referencia general del original sin introducir una especificación cultual más estrecha que la que el contexto evidencia.
- source_word: ወኀበ፡ እሙሂ፡ ርብቃ፡
  english_pob_choice: and also to his mother Rebekah
  chosen_spanish: y también a su madre Rebeca
  alternatives_spanish:
  - y también a su madre, Rebeca
  - y asimismo a Rebeca, su madre
  lexicon: añadición coordinada
  rationale: La construcción ge'ez introduce otro destinatario además del sacrificio. «Y también» reproduce el valor aditivo del conector, y «su madre Rebeca» mantiene el orden natural en español sin perder la relación familiar.
- source_word: ይስሐቅ፡
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaac
  lexicon: nombre propio
  rationale: Nombre propio transmitido directamente en español, sin ajuste adicional.
- source_word: ይምጻእ፡
  english_pob_choice: Let ... come
  chosen_spanish: Que venga
  alternatives_spanish:
  - Déjenlo venir
  - Que se acerque
  lexicon: verbo de movimiento / exhortación
  rationale: La forma desiderativa/jussiva se expresa de modo natural con «que venga», que conserva el matiz de invitación u orden suave del original.
- source_word: ወልድየ፡ ያዕቆብ፡
  english_pob_choice: my son Jacob
  chosen_spanish: mi hijo Jacob
  alternatives_spanish:
  - mi hijo, Jacob
  - Jacob, mi hijo
  lexicon: relación filial
  rationale: La frase literal del ge'ez es «mi hijo Jacob». «Mi hijo Jacob» preserva la relación filial y suena fluido en español bíblico contemporáneo.
theological_decisions:
- issue: Presencia en el sacrificio como escena ritual, no como simple localización espacial
  english_pob_reading: at his sacrifice
  chosen_spanish_reading: en su sacrificio
  alternative_spanish_readings:
  - en el momento de su sacrificio
  - durante su sacrificio
  rationale: «En su sacrificio» mantiene la escena de participación/presencia que sugiere el ge'ez ውስተ sin sobreespecificar una relación temporal que el texto no desarrolla. Evita convertir la frase en una paráfrasis más interpretativa que el original.
  doctrine_reference: Neutralidad narrativa; fidelidad semántica al marco sacrificial
- issue: Discurso directo de Isaac como invitación/mandato
  english_pob_reading: Let my son Jacob come
  chosen_spanish_reading: Que venga mi hijo Jacob
  alternative_spanish_readings:
  - Dejad venir a mi hijo Jacob
  - Permitan que venga mi hijo Jacob
  rationale: La forma española con subjuntivo introduce la exhortación requerida por el original. No se añade intensidad o solemnidad extra no presente en el texto fuente.
  doctrine_reference: Aspecto jussivo del verbo; estilo bíblico en español
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió «to his sacrifice» por «at his sacrifice» para reflejar mejor ውስተ. La traducción española sigue esa corrección con una preposición locativa natural («en») y mantiene sin cambios el resto del segmento.
  spanish_consistency_notes:
  - Se mantiene «Rebeca» como forma española estándar del nombre bíblico.
  - Se conserva «Jacob» en lugar de una forma adaptada al hebreo o al griego, por ser el nombre bíblico usual en español.
  - No se introdujo «Yahvé» ni otros términos divinos porque el verso no los contiene.
  - El registro busca ser bíblico y publicable sin depender de calcos del inglés.
