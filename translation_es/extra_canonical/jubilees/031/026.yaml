base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/026.yaml
  text: And in the morning Jacob told his father Isaac the prayer that he had prayed to the Lord[26], and the vision that he had seen, and how he had built an altar, and that everything was prepared for the sacrifice to be offered before the Lord.
  footnotes:
  - marker: '26'
    text: Although the Ge'ez uses prayer-related wording, the immediate context of Bethel, altar, sacrifice, and Isaac's warning not to delay indicates a vow in view here.
    reason: alternative_reading
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:42Z'
    unchanged: false
    changes_summary: Changed “vow that he had vowed” to “prayer that he had prayed” to match ጸሎተ/ዘጸለየ. Removed the trailing “as,” which is unsupported and leaves the sentence incomplete. Kept the rest substantially the same for accuracy and natural formal English.
translation:
  language: es
  text: Y por la mañana Jacob le contó a su padre Isaac la oración que había hecho a Yahvé[a], la visión que había visto, y cómo había edificado un altar, y que todo estaba preparado para el sacrificio que se ofrecería delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aunque el ge'ez usa aquí vocabulario de oración, el contexto inmediato de Betel, el altar, el sacrificio y la advertencia de Isaac de no demorarse indican que también hay en vista la idea de un voto.
    reason: alternative_reading
lexical_decisions:
- source_word: ጸሎተ / ዘጸለየ
  english_pob_choice: the prayer that he had prayed
  chosen_spanish: la oración que había orado
  alternatives_spanish:
  - la plegaria que había hecho
  - la oración que había ofrecido
  lexicon: Ge'ez ጸሎት / ጸለየ
  rationale: El texto ge'ez usa un sustantivo de ‘oración’ y un verbo correspondiente; por eso se conserva la referencia a una oración, no a un voto. ‘Había orado’ mantiene la fuerza verbal sin desplazar el sentido hacia otra categoría religiosa. ‘Orar’ es claro y digno en español.
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: Nombre divino YHWH / traducción contextual del tetragrámaton
  rationale: Según el estándar del proyecto, el nombre divino se rinde como ‘Yahvé’ en el texto principal. Aunque el inglés POB usa ‘Lord’, aquí la base original apunta al nombre divino, y el español debe hacerlo visible.
- source_word: ወሬአየ / ዘርእየ
  english_pob_choice: the vision that he had seen
  chosen_spanish: la visión que había visto
  alternatives_spanish:
  - la visión que había contemplado
  - lo que había visto en visión
  lexicon: Ge'ez ራዕይ / ver
  rationale: ‘Visión’ conserva el sustantivo del original y ‘había visto’ reproduce el paralelo verbal con naturalidad. No se expande a ‘revelación’ porque el texto dice específicamente visión.
- source_word: ኀነጸ፡ ምሥዋዐ፡
  english_pob_choice: he had built an altar
  chosen_spanish: había edificado un altar
  alternatives_spanish:
  - había construido un altar
  - había levantado un altar
  lexicon: Ge'ez ምሥዋዕ / edificar
  rationale: ‘Edificado un altar’ es más elevado y bíblico, y mantiene la acción material del original. ‘Construido’ sería posible, pero ‘edificar’ preserva mejor la dignidad del contexto sacrificial.
- source_word: ቅድመ፡ እግዚአብሔር፡
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: Ge'ez preposición de presencia
  rationale: ‘Delante de’ expresa bien la orientación cultual del sacrificio y su carácter público/coram Deo. Se evita ‘ante’ solo por fluidez, aunque sería equivalente.
theological_decisions:
- issue: ¿‘oración’ o ‘voto’ en la primera cláusula?
  english_pob_reading: The English audit trail initially considered ‘vow’, but the revision restored ‘prayer’ to match the Ge'ez ጸሎተ / ዘጸለየ.
  chosen_spanish_reading: ‘la oración que había orado’
  alternative_spanish_readings:
  - ‘el voto que había hecho’
  - ‘la promesa que había prometido’
  rationale: La evidencia ge'ez favorece ‘oración’, y el contexto de Betel con altar y sacrificio no autoriza sustituirla por ‘voto’. Se conserva la tensión exegética implícita del registro auditado, pero sin imponer una lectura que el texto base no sostiene en esta línea.
  doctrine_reference: Sobriedad textual y prioridad del dato original sobre harmonización interpretativa.
- issue: 'Referencia divina: ‘Lord’ inglés frente al nombre divino en el original'
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque el inglés POB traduce con ‘Lord’, el proyecto establece ‘Yahvé’ para el nombre divino en el texto principal. Esto hace explícita la identidad del referente y evita la máscara reverencial en español.
  doctrine_reference: Convención editorial del POB en español sobre el Tetragrámaton.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada desde una lectura de ‘vow’ a ‘prayer’ para ajustarse a ጸሎተ / ዘጸለየ, y se eliminó el ‘as’ final no sustentado. La redacción española sigue esa decisión revisada y mantiene la secuencia completa: oración, visión, altar y preparación del sacrificio.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ conforme a la convención del proyecto para el nombre divino.
  - Se usa ‘altar’ y ‘sacrificio’ en registro bíblico formal, sin añadir elementos no presentes en el ge'ez.
  - ‘Delante de Yahvé’ conserva la orientación cultual del original sin sobreinterpretar la escena.
  - La cláusula de la oración queda explícita con nota para señalar la alternativa histórica ‘voto’, ya descartada por la revisión auditada.
