  to: Y por la mañana Jacob le contó a su padre Isaac la oración que había hecho a Yahvé[a], la visión que había visto, y cómo había edificado un altar, y que todo estaba preparado para el sacrificio que se ofrecería delante de Yahvé.
  rationale: 'Se cambia ‘la oración que había orado’ por ‘la oración que había hecho’ para evitar un calco duro y mantener un español natural sin perder el sentido fuente. Se conserva ‘Yahvé’ por la convención del proyecto. Se matiza la nota al pie para alinearla con la explicación del rastro inglés: el texto ge''ez dice ‘oración’, aunque el contexto sugiera también un trasfondo de voto.'
