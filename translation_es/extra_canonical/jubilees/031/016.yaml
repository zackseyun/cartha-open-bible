review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en varios puntos importantes: conserva a ''tu madre'' como sujeto de la imposición del nombre, usa ''Yahvé'' conforme al proyecto, y refleja bien la asociación con los hijos de Jacob y la imagen de la mesa. Sin embargo, no preserva fielmente dos decisiones ya asentadas en el audit trail: (1) ''llamó tu nombre Leví'' y ''te llamó por tu nombre'' suenan calcos poco naturales y además la segunda cláusula no reproduce bien el énfasis de ''verdaderamente did she call your name''; (2) el final queda artificialmente truncado en español (''para todos los [a]'') pese a que el audit trail documenta que debe restaurarse ''for all generations''.'
  spanish_quality_summary: La lectura general es comprensible, pero presenta giros poco idiomáticos ('llamó tu nombre', 'te llamó por tu nombre') y una frase final gramaticalmente incompleta. En español bíblico natural y digno conviene 'puso por nombre Leví' y 'en verdad así te puso por nombre', además de cerrar la oración final con 'para todas las generaciones'.
  glossary_alignment: 'Buena alineación con el glosario en el uso de ''Yahvé'' y ''descendencia''. No hay conflictos relevantes de terminología teológica. La única excepción es estilística: conviene apartarse del calco ''llamar el nombre'' en favor de ''poner por nombre'' por claridad y naturalidad en español, sin pérdida de sentido.'
  issues:
  - severity: medium
    issue: Calco poco natural en 'Tu madre llamó tu nombre Leví'
    rationale: Aunque refleja el giro semítico, en español contemporáneo suena forzado. 'Tu madre te puso por nombre Leví' conserva el sentido y mejora la legibilidad.
  - severity: medium
    issue: La cláusula 'y verdaderamente te llamó por tu nombre' no expresa bien el énfasis original
    rationale: El original reafirma la adecuación/verdad del nombre dado. En español, 'y en verdad así te puso por nombre' o similar transmite mejor la fuerza afirmativa sin sonar torpe.
  - severity: high
    issue: El final 'Y tu mesa estará llena para todos los [a]' es incompleto y contradice la revisión documentada
    rationale: El audit trail establece que debe restaurarse 'for all generations' porque la omisión se debió a truncamiento del expediente. El español no debe dejar una frase abierta ni sostener una nota basada en una decisión ya corregida.
  revised_spanish_text: para que bendigan a toda la descendencia del amado. Tu madre te puso por nombre Leví, y en verdad así te puso por nombre. Tú serás unido a Yahvé y serás compañero de todos los hijos de Jacob. Su mesa será tuya, y tú y tus hijos comerán de ella. Y tu mesa estará llena para todas las generaciones.
  revision_rationale: 'Se ajusta el español a una forma natural y fiel: ''te puso por nombre'' comunica correctamente la imposición del nombre; ''en verdad así te puso por nombre'' preserva el énfasis de በአማን sin calco torpe; se elimina la nota textual y se restituye el final completo ''para todas las generaciones'' conforme a la corrección más reciente y explícita del audit trail. También se mejora ligeramente ''Su mesa será la tuya'' a ''Su mesa será tuya'' por fluidez idiomática.'
