base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/016.yaml
  text: that they may bless all the seed of the beloved. Your mother called your name Levi, and truly did she call your name. You shall be joined to the Lord and be the companion of all the sons of Jacob. Let his table be yours, and you and your sons shall eat from it. And your table shall be full for all generations,
  footnotes:
  - marker: a
    text: Or 'For your name was called Levi, and truly your name was called.'.
    reason: previous_rendering
  - marker: b
    text: Or 'And your table shall be full for all.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:37Z'
    unchanged: false
    changes_summary: Added 'For' to reflect ኪያከ; changed 'rightly' to 'truly' for በአማን; removed the comma before 'and be the companion'; shortened the final phrase to 'for all' to avoid adding 'generations,' which is not in the source.
translation:
  language: es
  text: para que bendigan toda la descendencia del amado. Tu madre llamó tu nombre Leví, y verdaderamente te llamó por tu nombre. Tú serás unido a Yahvé y serás compañero de todos los hijos de Jacob. Su mesa será la tuya, y tú y tus hijos comerán de ella. Y tu mesa estará llena para todos los [a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posible lectura, siguiendo la formulación alternativa preservada en el audit trail, es: «Y tu mesa estará llena para todos»; el expediente ge''ez disponible aquí parece truncado en este punto.'
    reason: textual_variant
lexical_decisions:
- source_word: ዘርአ፡ ለፍቅር
  english_pob_choice: the seed of the beloved
  chosen_spanish: la descendencia del amado
  alternatives_spanish:
  - la simiente del amado
  - la descendencia del amado
  lexicon: seed -> descendencia; beloved -> amado
  rationale: En español bíblico contemporáneo, 'descendencia' comunica con claridad la idea genealógica sin forzar un calco arcaico. 'Amado' conserva el valor relacional del original sin añadir identificación explícita.
- source_word: እምከ፡ ስመከ፡ ሌዊ
  english_pob_choice: Your mother called your name Levi
  chosen_spanish: Tu madre llamó tu nombre Leví
  alternatives_spanish:
  - Tu madre llamó tu nombre Leví
  - Tu madre puso por nombre Leví
  lexicon: call one’s name -> llamar el nombre; mother -> madre
  rationale: 'Se conserva la estructura activa que el informe de revisión confirmó: el sujeto es ''tu madre''. ''Llamó tu nombre'' refleja de manera fiel el giro semítico del original y mantiene la transparencia auditiva.'
- source_word: በአማን
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - verdaderamente
  - en verdad
  lexicon: in truth -> verdaderamente
  rationale: '''Verdaderamente'' expresa con naturalidad el énfasis de verdad del original y evita suavizarlo a una mera corrección estilística.'
- source_word: ይትወሀብ፡ / ትኩን
  english_pob_choice: You shall be joined to the Lord
  chosen_spanish: Tú serás unido a Yahvé
  alternatives_spanish:
  - Tú serás unido a Yahvé
  - Tú serás ligado a Yahvé
  - Tú serás unido al Señor
  lexicon: be joined/attached -> ser unido; divine name -> Yahvé
  rationale: '''Ser unido'' conserva la pasiva de adhesión del original. Se emplea ''Yahvé'' conforme al criterio del proyecto para el nombre divino, en lugar de una sustitución por ''Señor''.'
- source_word: ወሱታፌ፡ ኵሎሙ፡ ውሉደ፡ ያዕቆብ
  english_pob_choice: be the companion of all the sons of Jacob
  chosen_spanish: serás compañero de todos los hijos de Jacob
  alternatives_spanish:
  - serás compañero de todos los hijos de Jacob
  - serás asociado con todos los hijos de Jacob
  lexicon: companion / association -> compañero; sons of Jacob -> hijos de Jacob
  rationale: '''Compañero'' preserva la idea de asociación cercana tal como la recoge la versión inglesa auditada. ''Hijos de Jacob'' sigue el patrón genealógico del texto.'
- source_word: مائدة / table
  english_pob_choice: Let his table be yours ... And your table shall be full
  chosen_spanish: Su mesa será la tuya ... Y tu mesa estará llena
  alternatives_spanish:
  - Su mesa será la tuya
  - La mesa de él será la tuya
  - Y tu mesa estará llena
  lexicon: table -> mesa
  rationale: '''Mesa'' es la opción natural en español y mantiene la imagen de banquete/provisión sin introducir interpretaciones no atestiguadas.'
- source_word: ለኵሉ
  english_pob_choice: for all
  chosen_spanish: para todos los
  alternatives_spanish:
  - para todos los
  - para todo
  lexicon: all -> todos
  rationale: Se sigue la revisión que corrigió la expansión indebida a 'generaciones'. En español, 'para todos los' deja abierta la finalización del sintagma cuando el texto de base está truncado en el expediente, sin inventar un complemento.
theological_decisions:
- issue: Nombre divino en una cita/juramento de bendición
  english_pob_reading: You shall be joined to the Lord
  chosen_spanish_reading: Tú serás unido a Yahvé
  alternative_spanish_readings:
  - Tú serás unido al Señor
  - Tú serás unido a Dios
  rationale: El proyecto exige 'Yahvé' para יהוה. Dado que el contexto es una declaración de pertenencia y vínculo con la deidad, 'Yahvé' preserva la referencia del nombre divino sin ocultarla bajo una sustitución litúrgica.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Relación de pertenencia y alianza expresada por 'unido'
  english_pob_reading: You shall be joined to the Lord
  chosen_spanish_reading: Tú serás unido a Yahvé
  alternative_spanish_readings:
  - Tú serás ligado a Yahvé
  - Tú te unirás a Yahvé
  rationale: La pasiva mantiene el matiz de ser incorporado o adherido por designio divino, sin convertirlo en mera decisión subjetiva. Esto conserva la tensión entre iniciativa divina y relación personal.
  doctrine_reference: Unión / pertenencia covenantal
- issue: Final abierto por texto ge'ez truncado en el expediente
  english_pob_reading: And your table shall be full for all generations
  chosen_spanish_reading: Y tu mesa estará llena para todos los
  alternative_spanish_readings:
  - Y tu mesa estará llena para todas las generaciones
  - Y tu mesa estará llena para todos
  rationale: La revisión documentada indica que el expediente ge'ez está truncado en este punto y que la lectura ampliada a 'generations' pertenece a otra evidencia no segura aquí. En español se evita inventar el complemento y se deja la frase abierta con fidelidad prudente al expediente disponible.
  doctrine_reference: Crítica textual / prudencia de traducción
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió el sujeto de 'tu madre llamó tu nombre Leví' y la nota de que el cierre del verso en el expediente ge'ez está truncado. Sin embargo, el texto fuente efectivamente provisto aquí termina en ወለኵሉ, por lo que la traducción española evita añadir 'generaciones' y conserva un final abierto, con nota de variante textual.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - Se mantiene 'Leví' con acento en la pronunciación española habitual, pero sin alterar el nombre propio.
  - '''Mesa'' se conserva como imagen literal de provisión/banquete; no se parafrasea como ''banquete'' para no añadir interpretación.'
  - La frase final se deja abierta por fidelidad al expediente suministrado, sin ocultar la tensión textual documentada.
