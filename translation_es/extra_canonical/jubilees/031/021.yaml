lexical_decisions:
- source_word: እምድር
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - desde la tierra
  - fuera de la tierra
  lexicon: earth / land
  rationale: El geʽez expresa procedencia con እም, que corresponde naturalmente a 'de' en español. 'Tierra' mantiene la ambigüedad útil entre suelo/tierra física y 'la tierra' como ámbito castigado, sin forzar una paráfrasis.
- source_word: ርጉማነ
  english_pob_choice: accursed
  chosen_spanish: malditos
  alternatives_spanish:
  - malditos por Dios
  - maldecidos
  lexicon: curse / accursed
  rationale: '''Malditos'' reproduce el estado pasivo/resultativo del término sin introducir un sujeto explícito que el texto no da. ''Maldecidos'' suena menos idiomático en español bíblico moderno.'
- source_word: ወተመይጠ፡ ሰዐሞ፡ ዳግመ፡
  english_pob_choice: And he turned and kissed him again
  chosen_spanish: Y se volvió y lo besó otra vez
  alternatives_spanish:
  - Y volvió y lo besó de nuevo
  - Y se giró y lo besó otra vez
  lexicon: turn / kiss again
  rationale: La secuencia verbal admite 'se volvió' como giro físico. 'Otra vez' conserva la repetición enfática de ዳግመ sin sonar excesivamente literal.
- source_word: ወሐቀፎ
  english_pob_choice: and embraced him
  chosen_spanish: y lo abrazó
  alternatives_spanish:
  - y lo estrechó entre sus brazos
  - y lo recibió en un abrazo
  lexicon: embrace
  rationale: '''Abrazó'' es la equivalencia directa y clara para el gesto de afecto físico, adecuada para un registro bíblico readable.'
- source_word: ወተፈሥሐ፡ ዐቢየ፡
  english_pob_choice: and he rejoiced greatly
  chosen_spanish: y se alegró grandemente
  alternatives_spanish:
  - y se gozó mucho
  - y se llenó de gran alegría
  lexicon: rejoice greatly
  rationale: '''Se alegró grandemente'' sigue de cerca la construcción intensiva y preserva el tono bíblico sin caer en arcaísmo excesivo.'
theological_decisions:
- issue: Estado de maldición en lugar de una acción futura explícita
  english_pob_reading: shall become accursed
  chosen_spanish_reading: serán malditos
  alternative_spanish_readings:
  - serán objeto de maldición
  - quedarán malditos
  rationale: El geʽez presenta un resultado/estado de maldición. 'Serán malditos' conserva la fuerza teológica de condena sin añadir matices explicativos no presentes en el texto.
  doctrine_reference: Bendición y maldición en el marco del lenguaje pactal bíblico
translation_notes:
  revision_awareness: La revisión más reciente indicó 'No changes needed' y el cotejo cruzado reportó acuerdo alto; por eso el borrador sigue de cerca la lectura inglesa auditada y el geʽez sin introducir notas o divergencias innecesarias.
  spanish_consistency_notes:
  - Se usa 'malditos' en sentido resultativo, coherente con el valor de ርጉማነ.
  - Se mantiene 'tierra' en minúscula porque el contexto del fragmento no exige mayúscula onomástica.
  - La frase queda abierta porque el testigo fuente está truncado en 'porque'; no se completa el contenido faltante.
