  text: She heard, “Behold, Jacob your son has come.” And she kissed him. And she saw his two sons and recognized them, and said to him, “Are these your sons, my son?” And she embraced them and kissed them and blessed them, saying, “In you shall the seed of Abraham be honored, and you shall become a blessing.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:33Z'
    unchanged: false
    changes_summary: Capitalized the opening for formal register and removed 'on the earth,' which is not supported by the source text here. Kept the rest substantially unchanged as accurate and natural.
translation:
  language: es
  text: 'Ella oyó: «Mira, tu hijo Jacob ha llegado». Y lo besó. Y vio a sus dos hijos, y los reconoció, y le dijo: «¿Son estos tus hijos, hijo mío?». Y los abrazó, y los besó, y los bendijo, diciendo: «Por medio de ustedes será honrada la descendencia de Abraham, y ustedes llegarán a ser una bendición»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ናሁ፡ ... በጽሐ
  english_pob_choice: Behold, Jacob your son has come.
  chosen_spanish: Mira, tu hijo Jacob ha llegado.
  alternatives_spanish:
  - He aquí, tu hijo Jacob ha llegado.
  - Mira, ha llegado Jacob, tu hijo.
  lexicon: —
  rationale: «ናሁ» introduce una llamada de atención; en español bíblico natural puede ser «Mira» o «He aquí». Se eligió «Mira» por claridad y fluidez. «በጽሐ» expresa llegada, por lo que «ha llegado» conserva el valor sin sobrecargar el tono.
- source_word: ወሰዐመቶ
  english_pob_choice: And she kissed him.
  chosen_spanish: Y lo besó.
  alternatives_spanish:
  - Y lo abrazó y besó.
  - Y le dio un beso.
  lexicon: —
  rationale: El verbo etiópico indica un beso literal; se mantiene de forma directa y breve.
- source_word: ወአእመረትሙ
  english_pob_choice: and recognized them
  chosen_spanish: y los reconoció
  alternatives_spanish:
  - y los identificó
  - y supo quiénes eran
  lexicon: —
  rationale: «Reconoció» preserva el sentido de identificar a personas ya conocidas, sin añadir matices no presentes.
- source_word: ወሐቀፈቶሙ
  english_pob_choice: And she embraced them
  chosen_spanish: Y los abrazó
  alternatives_spanish:
  - Y los estrechó en sus brazos
  - Y los recibió con un abrazo
  lexicon: —
  rationale: El gesto físico es claro; «abrazó» es el equivalente natural y fiel en español.
- source_word: ወባረ ከቶሙ
  english_pob_choice: and blessed them
  chosen_spanish: y los bendijo
  alternatives_spanish:
  - y pronunció bendición sobre ellos
  - y los declaró benditos
  lexicon: —
  rationale: «Bendijo» corresponde al acto de impartir bendición sin añadir interpretaciones.
- source_word: ዘርአ፡ አብርሃም
  english_pob_choice: the seed of Abraham
  chosen_spanish: la descendencia de Abraham
  alternatives_spanish:
  - la simiente de Abraham
  - los descendientes de Abraham
  lexicon: —
  rationale: En español moderno, «descendencia» comunica el referente colectivo y mantiene dignidad; «simiente» es más literal pero menos natural.
- source_word: ትከውኑ፡ ለበረከት
  english_pob_choice: you shall become a blessing
  chosen_spanish: llegarás a ser una bendición
  alternatives_spanish:
  - serás una bendición
  - te convertirás en bendición
  lexicon: —
  rationale: «Llegarás a ser» refleja el proceso futuro implícito en la forma verbal y evita una simplificación excesiva.
theological_decisions:
- issue: Abrahamic blessing formula
  english_pob_reading: In you shall the seed of Abraham be honored, and you shall become a blessing.
  chosen_spanish_reading: En ti será honrada la descendencia de Abraham, y llegarás a ser una bendición.
  alternative_spanish_readings:
  - En ti será honrada la simiente de Abraham, y serás una bendición.
  - En ti será glorificada la descendencia de Abraham, y te convertirás en bendición.
  rationale: El texto no habla de una identidad sacramental sino de una promesa de honor y bendición vinculada a la línea de Abraham. «Honrada» mantiene el sentido de dar honra/reconocimiento; «glorificada» o «bendecida» desplazarían el matiz.
  doctrine_reference: Génesis 12:2-3; 22:18; 28:14
- issue: Removal of unsupported expansion
  english_pob_reading: you shall become a blessing
  chosen_spanish_reading: llegarás a ser una bendición
  alternative_spanish_readings:
  - serás una bendición
  - te convertirás en una bendición
  rationale: La revisión inglesa eliminó «on the earth» por no estar sustentado por el ge'ez. La español se mantiene igualmente sin expansión locativa y conserva el futuro promesal.
  doctrine_reference: Textual fidelity principle; Jubilees 31:7 source reading
- issue: Identification of the two sons
  english_pob_reading: Are these your sons, my son?
  chosen_spanish_reading: ¿Son estos tus hijos, hijo mío?
  alternative_spanish_readings:
  - ¿Estos son tus hijos, hijo mío?
  - ¿Son estos tus hijos, mi hijo?
  rationale: Se conserva la pregunta directa y el vocativo afectuoso «hijo mío», que refleja el trato familiar del texto sin añadir títulos eclesiásticos.
  doctrine_reference: Narrative speech register
translation_notes:
  revision_awareness: La versión inglesa revisada quitó la expansión «on the earth» por falta de apoyo en el ge'ez, y el español sigue esa decisión sin añadir ninguna localización extra. El resto del enunciado inglés se conserva en el sentido general, con ajustes naturales de orden y estilo para español.
  spanish_consistency_notes:
  - Se mantiene el trato familiar entre la hablante y Jacob con «hijo mío», sin introducir solemnización artificial.
  - Se usa «bendijo» y no una fórmula litúrgica más cargada, porque el texto narra un acto de bendición patriarcal.
  - «Descendencia de Abraham» conserva el valor colectivo de la expresión fuente y evita una traducción demasiado arcaica.
  - No se añadió ninguna referencia espacial equivalente a «on the earth», en coherencia con la revisión auditada.
