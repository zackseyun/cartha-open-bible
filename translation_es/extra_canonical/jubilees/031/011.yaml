translation:
  language: es
  text: «Verdaderamente, son mis hijos». Y se acercaron a él, y se volvió, los besó y los abrazó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አማን
  english_pob_choice: '"Truly"'
  chosen_spanish: “Verdaderamente”
  alternatives_spanish:
  - “Ciertamente”
  - “En verdad”
  lexicon: אמת / ἀληθῶς (adverbial force of certainty)
  rationale: El adverbio abre una afirmación solemne de certeza; “verdaderamente” conserva ese énfasis sin sonar excesivamente arcaico. No se añadió una nota textual porque el valor es directo y no crea ambigüedad en español.
- source_word: ውሉድየ፡ እሙንቱ
  english_pob_choice: '"they are my children"'
  chosen_spanish: “ellos son mis hijos”
  alternatives_spanish:
  - “son mis hijos”
  - “son mis niños”
  lexicon: יְלָדַי / children; possessive force retained
  rationale: Se mantiene “hijos” para reflejar la relación filial y el plural directo del ge'ez; “niños” sería más débil y menos relacional en este contexto. Se conserva “ellos” para reproducir el sujeto explícito del original y del inglés auditado.
- source_word: ወቀርቡ፡ ኀቤሁ
  english_pob_choice: and they came near to him
  chosen_spanish: Y se acercaron a él
  alternatives_spanish:
  - Y vinieron cerca de él
  - Y se aproximaron a él
  lexicon: וַיִּגְּשׁוּ אֵלָיו / came near to him
  rationale: “Se acercaron” es la forma natural y fiel en español para la aproximación física o relacional del original. “Aproximarse” es correcto pero más técnico; “vinieron cerca” suena menos idiomático.
- source_word: ወተመይጠ
  english_pob_choice: and he turned
  chosen_spanish: y él se volvió
  alternatives_spanish:
  - y se volvió
  - y volvió su rostro
  lexicon: וַיִּפֶן / turned
  rationale: “Se volvió” expresa el giro corporal sin introducir contenido no atestiguado. Se conserva el pronombre explícito “él” para claridad narrativa, aunque el verbo ya lo sugiera.
- source_word: ወሰዐሞሙ
  english_pob_choice: and kissed them
  chosen_spanish: los besó
  alternatives_spanish:
  - los besó a ellos
  - y los besó
  lexicon: נשק / kissed
  rationale: “Los besó” reproduce el acto con naturalidad. No se enfatiza afectivamente más de lo que permite el texto.
- source_word: ወሐቀፎሙ
  english_pob_choice: and embraced them
  chosen_spanish: y los abrazó
  alternatives_spanish:
  - y los estrechó en sus brazos
  - y los recibió en un abrazo
  lexicon: חבק / embraced
  rationale: “Abrazó” es la correspondencia más directa y transparente para el gesto corporal final. “Estrechó en sus brazos” sería posible, pero más interpretativo.
theological_decisions:
- issue: Afirmación de filiación en la primera cláusula
  english_pob_reading: '"Truly, they are my children."'
  chosen_spanish_reading: “Verdaderamente, ellos son mis hijos”.
  alternative_spanish_readings:
  - “Ciertamente, ellos son mis hijos”.
  - “En verdad, ellos son mis hijos”.
  rationale: Se conserva la afirmación frontal de pertenencia/filiación sin suavizarla. Aunque no hay una carga doctrinal desarrollada aquí, la frase funciona como reconocimiento paternal explícito y merece un equivalente igualmente fuerte en español.
  doctrine_reference: Relación de filiación/paternidad humana; no hay doctrina técnica añadida en este verso.
translation_notes:
  revision_awareness: La revisión más reciente en inglés solo añadió puntuación final y no cambió el contenido; la corrección importante previa fue restaurar la cláusula inicial omitida (“Truly, they are my children”). La versión española incluye ambas cláusulas y sigue de cerca el orden y contenido del ge'ez, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se usa ‘ellos’ para reflejar el sujeto explícito del original y la formulación auditada en inglés.
  - Se evita ‘Cristo’, ‘Señor’ o cualquier terminología no presente en el texto fuente.
  - La puntuación española sigue el estilo editorial moderno con comillas angulares/inglesas adaptadas a una cita directa breve.
