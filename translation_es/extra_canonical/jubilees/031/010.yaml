translation:
  language: es
  text: 'Porque se te parecen.” Y le dijo que en verdad eran sus hijos. Y dijo: “Ahora veo que son realmente tus hijos.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይመስሉከ።
  english_pob_choice: For they resemble you.
  chosen_spanish: Porque se te parecen.
  alternatives_spanish:
  - Porque se asemejan a ti.
  - Pues se parecen a ti.
  lexicon: parecer(se)
  rationale: El Ge’ez expresa semejanza física o perceptible. En español, ‘se te parecen’ conserva la relación directa con Isaac/Jacob sin volverlo demasiado formal ni introducir un matiz interpretativo adicional.
- source_word: ውሉዱ
  english_pob_choice: they were indeed his sons
  chosen_spanish: eran sus hijos
  alternatives_spanish:
  - eran realmente sus hijos
  - eran en verdad sus hijos
  lexicon: hijo
  rationale: El texto fuente, según el control revisado, habla de ‘sus hijos’, no de ‘nietos’. ‘Hijos’ mantiene la lectura literal y la lógica del diálogo.
- source_word: በአማን
  english_pob_choice: indeed / truly
  chosen_spanish: en verdad
  alternatives_spanish:
  - de verdad
  - realmente
  lexicon: verdad
  rationale: La partícula enfatiza certeza. ‘En verdad’ es natural en español bíblico contemporáneo y reproduce el énfasis sin añadir solemnidad excesiva.
theological_decisions:
- issue: 'Relación de filiación: hijos, no nietos'
  english_pob_reading: they were indeed his sons
  chosen_spanish_reading: eran sus hijos
  alternative_spanish_readings:
  - eran sus nietos
  - eran tus nietos
  rationale: La revisión crítica del texto ge’ez indica ውሉድከ, ‘tus hijos’. Por eso no se conserva la lectura anterior ‘nietos’, que alteraría el sentido del pasaje y la argumentación narrativa.
  doctrine_reference: Fidelidad textual; no se introduce una relación familiar no sustentada por el fuente.
translation_notes:
  revision_awareness: La historia de revisión del inglés mostró un ajuste importante de ‘grandsons’ a ‘sons’ tras verificación del ge’ez. La versión española sigue la lectura corregida y no conserva la nota anterior sobre ‘nietos’, porque ya no corresponde al texto validado.
  spanish_consistency_notes:
  - Se usa ‘se te parecen’ para mantener la referencia directa al interlocutor.
  - Se evita ‘Cristo’, ‘SEÑOR’ u otra terminología no presente en el pasaje.
  - La frase final ‘Ahora veo que son realmente tus hijos’ conserva el paralelismo del inglés auditado, pero con sintaxis natural en español.
