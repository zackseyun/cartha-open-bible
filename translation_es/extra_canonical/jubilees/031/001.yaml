  - severity: medium
    issue: Comilla de cierre al final pese a que la cita continúa
    rationale: El audit trail indica que ‘Y aparten’ sigue como imperativo abierto hacia el siguiente versículo. Cerrar con » aquí contradice esa continuidad sintáctica.
