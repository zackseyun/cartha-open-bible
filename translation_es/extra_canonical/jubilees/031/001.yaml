base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/001.yaml
  text: And on the new moon of the month Jacob spoke to all the people of his house, saying, “Purify yourselves and change your garments, and let us rise and go up to Bethel, where I prayed to him in the day when I fled from the face of Esau my brother, and he was with me and brought me back into this land in peace. And put away
  footnotes:
