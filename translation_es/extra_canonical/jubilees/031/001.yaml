    changes_summary: Changed 'wash your garments' to 'change your garments' for better lexical accuracy of the source verb; simplified 'to the place where' to 'where' for more natural English without loss of meaning. The trailing fragment 'And they gave up' is retained as in the draft since the source continues beyond this excerpt.
translation:
  language: es
  text: 'Y en la luna nueva del mes Jacob habló a todos los de su casa, diciendo: «Purifíquense y cambien sus vestidos, y levantémonos y subamos a Betel, donde le oré el día en que huí de delante de Esaú, mi hermano, y él estuvo conmigo y me trajo de vuelta a esta tierra en paz. Y aparten'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በሠርቀ፡ ወርኅ፡
  english_pob_choice: on the new moon of the month
  chosen_spanish: en la luna nueva del mes
  alternatives_spanish:
  - en el novilunio del mes
  - en el primer día del mes
  lexicon: follows the source phrase as revised in the English audit trail
  rationale: La revisión inglesa corrigió ‘in the first month’ a ‘on the new moon of the month’; en español, ‘luna nueva’ comunica con claridad el valor calendárico sin desplazar el sentido al de ‘primer mes’.
- source_word: ንጽሑ፡
  english_pob_choice: Purify yourselves
  chosen_spanish: Purifíquense
  alternatives_spanish:
  - Límpiense
  - Santifíquense
  lexicon: imperative plural reflexive from the source
  rationale: El mandato pide una acción ritual/moral de limpieza; ‘purificarse’ conserva mejor esa amplitud que ‘lavarse’ o ‘santificarse’.
- source_word: ወወልጡ፡ አልባሲክሙ፡
  english_pob_choice: change your garments
  chosen_spanish: cambien sus vestidos
  alternatives_spanish:
  - cambien sus ropas
  - cámbiense de ropa
  lexicon: garment-changing as source action
  rationale: La revisión inglesa descartó ‘wash your garments’ y fijó ‘change your garments’; ‘vestidos’ mantiene dignidad y exactitud sin sonar arcaico.
- source_word: ንዕርግ፡
  english_pob_choice: let us rise and go up
  chosen_spanish: levantémonos y subamos
  alternatives_spanish:
  - pongámonos en marcha y subamos
  - levantémonos y vayamos
  lexicon: motion idiom
  rationale: La doble exhortación del origen se conserva con dos verbos coordinados; ‘subamos’ mantiene el movimiento hacia Betel.
- source_word: ቤቴል፡
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bet-el
  lexicon: proper noun
  rationale: Se conserva el nombre propio en forma castellana común y reconocible.
- source_word: ጸለይኩ፡ ሎቱ፡
  english_pob_choice: where I prayed to him
  chosen_spanish: donde oré a él
  alternatives_spanish:
  - donde le oré
  - en donde le oré
  lexicon: prayer verb plus preposition
  rationale: ‘Oré a él’ sigue de cerca la construcción del original y evita introducir una paráfrasis interpretativa.
- source_word: እምገጸ፡ ዔሳው፡ እኁየ፡
  english_pob_choice: from the face of Esau my brother
  chosen_spanish: de delante de Esaú, mi hermano
  alternatives_spanish:
  - de la presencia de Esaú, mi hermano
  - de ante Esaú, mi hermano
  lexicon: idiom for fleeing
  rationale: ‘De delante de’ reproduce el valor idiomático bíblico de huir de la presencia de alguien sin suavizarlo demasiado; ‘mi hermano’ se mantiene como aposición.
- source_word: ወሜጠኒ፡
  english_pob_choice: brought me back
  chosen_spanish: me trajo de vuelta
  alternatives_spanish:
  - me devolvió
  - me hizo volver
  lexicon: return verb
  rationale: La revisión inglesa fijó ‘brought me back’; ‘me trajo de vuelta’ conserva el matiz de retorno físico al país.
- source_word: ውስተ፡ ዛቲ፡ ምድር፡
  english_pob_choice: into this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - en esta tierra
  - a esta tierra
  lexicon: directional preposition
  rationale: El movimiento del verbo de retorno hace natural ‘a esta tierra’; expresa llegada sin perder la referencia territorial.
- source_word: በሰላም።
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - en seguridad
  lexicon: peace formula
  rationale: ‘En paz’ es la correspondencia más directa y transparente para la fórmula de llegada segura.
- source_word: ወአስስሉ፡
  english_pob_choice: And put away
  chosen_spanish: Y aparten
  alternatives_spanish:
  - Y quiten
  - Y eliminen
  lexicon: imperative continuation
  rationale: La revisión identificó un imperativo plural que continúa el discurso de Jacob; ‘aparten’ conserva la orden abierta y no introduce todavía el objeto, que aparece en el verso siguiente.
theological_decisions:
- issue: Temporal marker at the beginning of the verse
  english_pob_reading: on the new moon of the month
  chosen_spanish_reading: en la luna nueva del mes
  alternative_spanish_readings:
  - en el primer día del mes
  - en el novilunio del mes
  rationale: Se sigue la corrección filológica del audit trail, evitando la lectura errónea de ‘primer mes’. No se traslada a un calendario litúrgico ajeno al texto; ‘luna nueva’ preserva el marcador temporal original.
  doctrine_reference: source chronology / calendrical precision
- issue: Open quotation across the verse boundary
  english_pob_reading: And put away
  chosen_spanish_reading: Y aparten»
  alternative_spanish_readings:
  - Y quiten»
  - Y eliminen»
  rationale: La frase final queda deliberadamente abierta porque el objeto de la acción aparece en el versículo siguiente. Se mantiene la continuación del discurso sin cerrarlo artificialmente.
  doctrine_reference: discourse continuity / textual syntax
- issue: God’s assistance in Jacob’s return
  english_pob_reading: he was with me and brought me back into this land in peace
  chosen_spanish_reading: él estuvo conmigo y me trajo de vuelta a esta tierra en paz
  alternative_spanish_readings:
  - él estuvo conmigo y me devolvió a esta tierra en paz
  - él estuvo conmigo y me hizo volver a esta tierra en paz
  rationale: La formulación conserva tanto la compañía divina como el acto de retorno, sin convertirlo en una paráfrasis doctrinalmente más explícita que el texto.
  doctrine_reference: divine providence / narrative testimony
translation_notes:
  revision_awareness: 'El texto español sigue la corrección textual y gramatical del audit trail: ‘luna nueva’ en lugar de ‘primer mes’, ‘cambien sus vestidos’ en vez de ‘laven sus vestidos’, ‘me trajo de vuelta’ para reflejar el verbo de retorno, y la cláusula final queda abierta porque el mandato continúa en el siguiente versículo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando aparezca el nombre divino en el texto; en este versículo no aparece.
  - Se mantiene ‘Betel’ como nombre propio estándar en español.
  - Se conserva el tono bíblico sobrio sin recurrir a arcaísmos innecesarios.
  - No se añaden notas al pie porque el versículo no requiere variantes ancladas en el texto español actual.
