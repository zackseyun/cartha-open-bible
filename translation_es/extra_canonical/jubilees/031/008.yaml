translation:
  language: es
  text: Y Jacob entró adonde estaba Isaac, su padre, en la habitación donde estaba acostado[a], y sus dos hijos estaban con él. Y tomó la mano de su padre, y se inclinó y lo besó. Y Isaac se aferró a…
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde estaba acostado allí»; el ge''ez incluye un elemento resumptivo equivalente a «allí», que en español normalmente suena redundante.'
    reason: Preservar la alternativa documentada en la auditoría inglesa y explicar por qué el texto principal omite el resumptivo.
lexical_decisions:
- source_word: ወቦአ፡ ያዕቆብ፡ ኀበ፡ ይስሐቅ፡ አቡሁ፡
  english_pob_choice: And Jacob went in to Isaac his father
  chosen_spanish: Y Jacob entró donde estaba Isaac, su padre
  alternatives_spanish:
  - Y Jacob fue donde estaba Isaac, su padre
  - Y Jacob entró a ver a Isaac, su padre
  lexicon: entró / fue / ir
  rationale: El ge'ez expresa movimiento hacia Isaac con el complemento 'a/ante'. 'Entró' conserva el ingreso a la estancia, y 'donde estaba Isaac, su padre' reproduce el referente sin forzar una paráfrasis.
- source_word: ውስተ፡ ጽርሕ፡ ኀበ፡ ይስክብ፡ ህየ፡
  english_pob_choice: into the room where he was lying
  chosen_spanish: en la habitación donde estaba acostado
  alternatives_spanish:
  - en la habitación donde yacía
  - en el cuarto donde estaba acostado
  lexicon: habitación / cuarto; acostado / yacía
  rationale: La fuente indica el lugar físico y la posición de Isaac. 'Habitación' es natural y precisa en español; 'estaba acostado' comunica el estado sin una calca dura. 'Donde estaba acostado' deja espacio para la nota del 'allí' redundante del ge'ez.
- source_word: ወክልኤቱ፡ ደቂቁ፡ ምስሌሁ፡
  english_pob_choice: and his two children were with him
  chosen_spanish: y sus dos hijos estaban con él
  alternatives_spanish:
  - y sus dos hijos estaban junto a él
  - y sus dos hijos lo acompañaban
  lexicon: estaban con él / junto a él
  rationale: La relación de compañía es directa; 'estaban con él' es el paralelo más fiel y transparente.
- source_word: ወአንዘ፡ እዴ፡ አቡሁ፡
  english_pob_choice: And he took the hand of his father
  chosen_spanish: Y tomó la mano de su padre
  alternatives_spanish:
  - Y extendió la mano de su padre
  - Y sostuvo la mano de su padre
  lexicon: tomó la mano / extendió la mano
  rationale: La revisión inglesa corrigió 'stretched out' a 'took', y el ge'ez apoya la acción de tomar la mano. 'Tomó la mano' es la equivalencia más natural y exacta.
- source_word: ወደነነ፡ ሰዐሞ፡
  english_pob_choice: and he bent down and kissed him
  chosen_spanish: y se inclinó y lo besó
  alternatives_spanish:
  - e inclinándose lo besó
  - y bajó la cabeza y lo besó
  lexicon: se inclinó / se postró levemente
  rationale: El gesto corporal de reverencia se expresa de modo directo con 'se inclinó', sin añadir más intensidad que la fuente exige.
- source_word: ይስሐቅ፡
  english_pob_choice: And Isaac clung to
  chosen_spanish: Y Isaac se aferró a…
  alternatives_spanish:
  - Y Isaac se aferró a
  - Y Isaac se abrazó a
  lexicon: se aferró a
  rationale: La cláusula está truncada en el texto fuente y la auditoría inglesa la deja incompleta. En español se conserva la incompletud con puntos suspensivos para no inventar el objeto del verbo.
