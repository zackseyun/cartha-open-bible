translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: ''where he was lying'' se entendió de forma natural en español como ''donde estaba acostado'', y ''took the hand of his father'' como ''tomó la mano de su padre''. También se preservó la truncación final del texto fuente sin intentar completarla.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología por defecto en otros contextos, aunque aquí no aparece.
  - Se evitó 'SEÑOR' y 'Cristo' porque el versículo no los contiene.
  - Se usó un registro sobrio y bíblico, con español natural y sin calcos innecesarios.
