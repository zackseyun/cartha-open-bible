  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Los nombres propios están bien: «Isaac», «Rebeca», «Jacob». «Espíritu» preserva adecuadamente መንፈስ. La consistencia léxica en «cámara» para ambas ocurrencias de ማኅፈድ está bien documentada y debe mantenerse.'
