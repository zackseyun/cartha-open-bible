translation:
  language: es
  text: Y llegó a su padre Isaac y a su madre Rebeca. Y Rebeca salió de la cámara a la puerta de la cámara para besar a Jacob y abrazarlo, porque su espíritu había revivido cuando...[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La partícula final queda abierta en el texto fuente; por eso se deja con puntos suspensivos para señalar que la cláusula continúa.
    reason: textual_variant
lexical_decisions:
- source_word: ወመጽአ፡ ኀበ፡ አቡሁ፡ ይስሐቅ፡ ወኀበ፡ እሙ፡ ርብቃ።
  english_pob_choice: And he came to his father Isaac and to his mother Rebekah.
  chosen_spanish: Y llegó a su padre Isaac y a su madre Rebeca.
  alternatives_spanish:
  - Y vino a su padre Isaac y a su madre Rebeca.
  - Y fue a su padre Isaac y a su madre Rebeca.
  lexicon: ኀበ / መጽአ
  rationale: Llegó comunica el movimiento de llegada sin forzar un destino explícito distinto del texto. Conserva el paralelismo con la doble mención de padre y madre.
- source_word: ወወፅአት፡ ርብቃ፡ እማኅፈድ፡
  english_pob_choice: And Rebekah came out from the chamber
  chosen_spanish: Y Rebeca salió de la cámara
  alternatives_spanish:
  - Y Rebeca salió del aposento
  - Y Rebeca salió de la habitación
  lexicon: ወፅአ / ማኅፈድ
  rationale: Cámara mantiene una palabra de registro digno y preserva el espacio interior indicado por ማኅፈድ sin modernizar demasiado ni imponer una lectura doméstica más específica que la del texto.
- source_word: '*ውስተ፡ አንቀጸ፡ ማኅፈድ፡'
  english_pob_choice: to the door of the chamber
  chosen_spanish: a la puerta de la cámara
  alternatives_spanish:
  - a la puerta del aposento
  - a la entrada de la cámara
  lexicon: አንቀጽ
  rationale: Puerta responde al sentido espacial de አንቀጽ en este contexto; mantener cámara en ambos miembros conserva la repetición del Ge'ez, que la revisión doctrinal señaló como importante.
- source_word: ከመ፡ ትስዐሞ፡ ለያዕቆብ፡ ወትሕቀፎ፡
  english_pob_choice: to kiss Jacob and embrace him
  chosen_spanish: para besar a Jacob y abrazarlo
  alternatives_spanish:
  - para besar a Jacob y estrecharlo
  - para besar a Jacob y acogerlo en un abrazo
  lexicon: ትስዐሞ / ትሕቀፎ
  rationale: Besar y abrazarlo son equivalentes naturales y directos para los gestos afectivos, sin añadir intensidad o matiz no presente en el original.
- source_word: እስመ፡ ሐይወ፡ መንፈሳ፡
  english_pob_choice: for her spirit had revived
  chosen_spanish: porque su espíritu había revivido
  alternatives_spanish:
  - porque su espíritu había vuelto a la vida
  - porque su ánimo había revivido
  lexicon: መንፈስ
  rationale: Espíritu conserva la posible tensión entre fuerza vital y interioridad personal en el original; ánimo sería interpretativo y perdería esa amplitud.
- source_word: በጊዜ፡
  english_pob_choice: at that time / when...
  chosen_spanish: cuando...
  alternatives_spanish:
  - en ese momento
  - a esa hora
  lexicon: በጊዜ
  rationale: La revisión textual indica que la partícula queda pendiente y funciona como conector temporal; cuando... preserva la cláusula suspendida mejor que cerrar artificialmente el sentido.
theological_decisions:
- issue: Cláusula temporal suspendida por el corte de versículo
  english_pob_reading: for her spirit had revived at that time / when...
  chosen_spanish_reading: porque su espíritu había revivido cuando...
  alternative_spanish_readings:
  - porque su espíritu había revivido en ese momento.
  - porque su espíritu había revivido entonces.
  rationale: El expediente revisado advierte que በጊዜ introduce una subordinación temporal que queda cortada. Mantener cuando... conserva la tensión textual y evita resolver artificialmente lo que el fuente deja abierto.
  doctrine_reference: principio de fidelidad textual y preservación de ambigüedad no resuelta
- issue: Repetición de ማኅፈድ en dos miembros del sintagma
  english_pob_reading: from the chamber to the door of the chamber
  chosen_spanish_reading: de la cámara a la puerta de la cámara
  alternative_spanish_readings:
  - del aposento a la puerta del aposento
  - de la habitación a la puerta de la habitación
  rationale: Se conserva la repetición léxica para reflejar el paralelismo del Ge'ez, conforme a la revisión que marcó como inconsistente traducir un miembro como 'house' y el otro como 'chamber'.
  doctrine_reference: consistencia léxica y prioridad del paralelismo original
translation_notes:
  revision_awareness: 'La redacción toma en cuenta las revisiones del expediente: se evita cerrar la cláusula temporal con una fórmula conclusiva y se preserva la repetición de ማኅፈድ mediante cámara / puerta de la cámara, en vez de alternar entre ''casa'' y ''cámara''.'
  spanish_consistency_notes:
  - Se usa Rebeca de forma consistente para ርብቃ.
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita del nombre divino.
  - 'Se mantiene un registro bíblico claro pero no arcaizante: llegó, salió, cámara, puerta, espíritu.'
