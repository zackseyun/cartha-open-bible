  source_alignment_summary: 'El borrador español refleja bien el sentido del ge''ez y sigue correctamente el expediente inglés en dos puntos cruciales: mantiene la repetición de ማኅፈድ como «cámara … cámara» y conserva la cláusula final abierta con «cuando...». Sin embargo, el anclaje de la nota al pie está mal ubicado: la nota explica la partícula final abierta, pero el marcador aparece después de los puntos suspensivos en vez de anclarse en «cuando...[a]» o en la partícula/construcción final misma.'
