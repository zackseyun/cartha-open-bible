base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/003.yaml
  text: And he went up on the new moon of the seventh month, to Bethel. And he built an altar in the place where he had lodged, and he set up there a pillar, and he sent to his father Isaac that he should come to him.
  footnotes:
  - marker: a
    text: Or 'in the first month, in the seventh year'.
    reason: previous_rendering
  - marker: b
    text: Or 'where he had lodged there'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:32Z'
    unchanged: false
    changes_summary: Changed 'slept' to 'lodged' for a more accurate and formal rendering of the verb for spending the night/staying in a place. Added final period.
translation:
  language: es
  text: Y subió en la luna nueva del séptimo mes[a], a Betel. Y edificó un altar en el lugar donde se había hospedado[b], y levantó allí una columna, y envió a llamar a su padre Isaac para que viniera a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría entenderse como «en el día de luna nueva del séptimo mes».
    reason: alternative_reading
  - marker: b
    text: O «donde se había alojado»; la idea es que había pernoctado allí, no simplemente que había dormido.
    reason: lexical_clarity
lexical_decisions:
- source_word: ወዐርገ፡
  english_pob_choice: And he went up
  chosen_spanish: Y subió
  alternatives_spanish:
  - Y fue
  - Y ascendió
  lexicon: Ge'ez ዐረገ / ዐርገ, movimiento ascendente
  rationale: El verbo indica un movimiento ascendente hacia Betel; «subió» comunica bien el desplazamiento geográfico en español y conserva la dirección del original sin forzar un tono excesivamente literal.
- source_word: አመ፡ ሠርቀ፡ ወርኅ፡ ሳብዕ፡
  english_pob_choice: on the new moon of the seventh month
  chosen_spanish: en la luna nueva del séptimo mes
  alternatives_spanish:
  - el día de luna nueva del séptimo mes
  - en el novilunio del séptimo mes
  lexicon: Ge'ez ሠርቀ ወርኅ, expresión calendárica
  rationale: La revisión de la fuente corrigió una lectura errónea; el ge'ez señala la luna nueva, no «primer mes» ni «séptimo año». «Luna nueva» es natural y fiel en español bíblico contemporáneo.
- source_word: ቤቴል።
  english_pob_choice: to Bethel
  chosen_spanish: a Betel
  alternatives_spanish:
  - hasta Betel
  lexicon: Topónimo hebreo tradicional
  rationale: Se conserva «Betel» como forma estable en español bíblico, acorde con el lugar mencionado en la tradición textual.
- source_word: ወሐነጸ፡ ምሥዋዐ፡
  english_pob_choice: And he built an altar
  chosen_spanish: Y edificó un altar
  alternatives_spanish:
  - Y construyó un altar
  - Y levantó un altar
  lexicon: Ge'ez ሐነጸ, construir/edificar; ምሥዋዕ, altar
  rationale: «Edificó» mantiene el registro bíblico y refleja bien el acto de construir el altar.
- source_word: ውስተ፡ መካን፡ ኀበ፡ ኖመ፡ ህየ፡
  english_pob_choice: in the place where he had lodged
  chosen_spanish: en el lugar donde había posado
  alternatives_spanish:
  - en el lugar donde había hospedado
  - en el lugar donde había pasado la noche
  lexicon: Ge'ez መካን, lugar; ኖመ, alojarse/lodgarse
  rationale: El audit trail inglés corrigió «slept» a «lodged». En español, «posado» es una solución sobria y fiel al valor de alojarse o pasar la noche sin añadir un matiz de permanencia que el texto no exige.
- source_word: ወአቀመ፡ ህየ፡ ሐውልተ፡
  english_pob_choice: and he set up there a pillar
  chosen_spanish: y levantó allí una columna
  alternatives_spanish:
  - y erigió allí una piedra memorial
  - y puso allí un pilar
  lexicon: Ge'ez ሐውልት, pilar/columna/piedra erguida
  rationale: «Columna» transmite la idea de un monumento erguido de manera clara en español. Se evita imponer de entrada una interpretación más específica como «piedra memorial» sin que el texto lo explicite.
- source_word: ወፈነወ፡ ኀበ፡ አቡሁ፡ ይስሐቅ፡ ከመ፡ ይምጻእ፡ ኀቤሁ፡
  english_pob_choice: and he sent to his father Isaac that he should come to him
  chosen_spanish: y envió a su padre Isaac para que viniera a él
  alternatives_spanish:
  - y mandó a su padre Isaac que viniera a él
  - y envió a su padre Isaac, para que acudiera a él
  lexicon: Ge'ez ፈነወ, enviar; ይምጻእ, venir
  rationale: «Envió ... para que viniera a él» preserva la relación de propósito del ge'ez sin volverla demasiado interpretativa. «Acudiera» sería posible, pero introduce mayor matiz de respuesta voluntaria que no está en el texto.
theological_decisions:
- issue: 'Cronología litúrgica: «luna nueva del séptimo mes»'
  english_pob_reading: The revised English reading follows the Ge'ez phrase as a calendrical marker, rejecting the earlier mistaken rendering 'first month, seventh year'.
  chosen_spanish_reading: Se traduce como «la luna nueva del séptimo mes», siguiendo la lectura corregida y rechazando la lectura errónea anterior.
  alternative_spanish_readings:
  - el primer mes del séptimo año
  - en el séptimo año, en el primer mes
  rationale: No hay base textual para introducir «año» en español; la fuente ge'ez y la revisión crítica apuntan a un marcador mensual/lunar. La traducción debe reflejar esa corrección para evitar un error cronológico.
  doctrine_reference: Fidelidad textual y cronológica; criterio de crítica textual aplicada al calendario bíblico.
- issue: 'Objeto erguido: «columna» frente a «piedra memorial»'
  english_pob_reading: and he set up there a pillar
  chosen_spanish_reading: Se mantiene «columna» como término general.
  alternative_spanish_readings:
  - piedra memorial
  - pilar
  rationale: El texto no especifica que sea una piedra, y traducirlo así estrecharía indebidamente el referente. «Columna» conserva la ambigüedad útil del original y evita sobreinterpretación.
  doctrine_reference: Preservación de la indeterminación léxica del original.
translation_notes:
  revision_awareness: 'La fuente ge''ez fue revisada críticamente en el audit trail inglés: se corrigió una lectura cronológica errónea («primer mes, séptimo año») a «luna nueva del séptimo mes», y se afinó el verbo del alojamiento de «slept» a «lodged». La versión española sigue esas correcciones y evita introducir elementos no sustentados por el texto.'
  spanish_consistency_notes:
  - Se mantiene «Betel» como topónimo bíblico estable.
  - Se usa «Yahvé» por defecto solo cuando el texto base lo exige; aquí no aparece el nombre divino.
  - Se conserva un registro bíblico claro y sobrio, sin arcaísmos innecesarios.
  - «Posado» se usa en sentido de alojamiento temporal, no como imagen poética de aves.
