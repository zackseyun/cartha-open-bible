review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente la lectura fuente corregida: «luna nueva del séptimo mes», subida a Betel, construcción de un altar, erección de una columna/pilar y mensaje enviado a Isaac para que vaya a él. Sin embargo, dos elecciones no preservan bien el sentido/documentación: «había posado» suena poco natural y algo impreciso para alojarse/pernoctar, y «envió a su padre Isaac» en español sugiere que lo despachó a otro lugar, cuando el ge''ez/inglés significa que envió un mensaje o mensajeros a Isaac para que viniera.'
  spanish_quality_summary: El texto es en general claro y de registro bíblico adecuado, pero necesita una reparación menor para naturalidad y precisión semántica. «Se hospedó» o «se alojó» lee mejor que «había posado», y «envió a llamar a su padre Isaac» evita la ambigüedad grave de «envió a su padre Isaac». También conviene ajustar la nota b, porque la explicación actual repite el mismo español en vez de aclarar la fuerza de ‘lodged’.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Betel», «altar» y «columna» son adecuados. No aparecen términos teológicos sensibles del glosario principal. La revisión propuesta mantiene la indeterminación de ሐውልት con «columna» y conserva el marcador calendárico «luna nueva».
  issues:
  - severity: medium
    issue: «había posado» es poco natural y semánticamente débil para ኖመ / ‘had lodged’
    rationale: Aunque puede entenderse, en español general bíblico latinoamericano «posar» en este uso suena anticuado o regional y no comunica tan claramente alojarse/pernoctar como «se hospedó» o «se alojó». El audit trail inglés precisamente distingue esto de ‘slept’.
  - severity: high
    issue: «envió a su padre Isaac» altera el sentido del verbo de enviar
    rationale: La frase española sugiere que Jacob envió/despachó a Isaac, no que envió a Isaac un recado para que viniera. El original y el inglés dicen ‘he sent to his father Isaac that he should come to him’; en español debe hacerse explícito el objeto implícito del envío (mensaje/mensajeros/llamado).
  - severity: low
    issue: La nota b no ayuda a resolver la ambigüedad española creada por «posado»
    rationale: 'La nota actual dice literalmente lo mismo que el texto principal y luego comenta una revisión del inglés. Es mejor aclarar la alternativa semántica relevante para español: ‘se hospedó’ o ‘pasó la noche’, sin volver a la lectura previa ‘durmió’ como base.'
  revised_spanish_text: Y subió en la luna nueva del séptimo mes[a], a Betel. Y edificó un altar en el lugar donde se había hospedado[b], y levantó allí una columna, y envió a llamar a su padre Isaac para que viniera a él.
  revised_footnotes:
  - marker: a
    text: También podría entenderse como «en el día de luna nueva del séptimo mes».
    reason: alternative_reading
  - marker: b
    text: O «donde se había alojado»; la idea es que había pernoctado allí, no simplemente que había dormido.
    reason: lexical_clarity
  revision_rationale: 'Se corrigen dos puntos para alinear mejor el español con la fuente y con el audit trail inglés: 1) «se había hospedado» expresa de manera natural y fiel el sentido de alojarse/pernoctar; 2) «envió a llamar a su padre Isaac» comunica correctamente que Jacob mandó un recado para que Isaac viniera, en vez de sugerir erróneamente que lo despachó. La nota b se rehace para aclarar la decisión léxica en español.'
