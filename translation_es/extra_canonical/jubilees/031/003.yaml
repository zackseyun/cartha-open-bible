  rationale: 'Se corrigen dos puntos para alinear mejor el español con la fuente y con el audit trail inglés: 1) «se había hospedado» expresa de manera natural y fiel el sentido de alojarse/pernoctar; 2) «envió a llamar a su padre Isaac» comunica correctamente que Jacob mandó un recado para que Isaac viniera, en vez de sugerir erróneamente que lo despachó. La nota b se rehace para aclarar la decisión léxica en español.'
