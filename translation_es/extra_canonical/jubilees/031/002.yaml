translation:
  language: es
  text: los dioses extraños que están entre ustedes'. Y le dieron los dioses extraños, y lo que estaba en sus orejas y lo que estaba en sus cuellos, y los ídolos que Raquel había robado a Labán, su hermano. Y ella se los dio todos a Jacob, y él los quemó, y los trituró, y los destruyó, y los escondió debajo de la encina[a] que estaba en la tierra de Siquem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terebinto»; la especie exacta detrás del término ge'ez es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: አማልክተ፡ ነኪር፡
  english_pob_choice: foreign gods
  chosen_spanish: dioses extraños
  alternatives_spanish:
  - dioses extranjeros
  - ídolos extranjeros
  lexicon: ግዕዝ አማልክት / הנכר
  rationale: El giro subraya la extrañeza/ajenidad de los dioses frente al culto de Israel. En español, 'dioses extraños' conserva esa fuerza semántica sin introducir explícitamente 'ídolos' antes de tiempo.
- source_word: ወመጠውዎሙ፡
  english_pob_choice: they gave him
  chosen_spanish: les dieron
  alternatives_spanish:
  - se los dieron
  - le dieron
  lexicon: verbo dar con pronombre de objeto indirecto y directo
  rationale: El ge'ez marca que el objeto se entrega a Jacob. 'Les dieron' refleja el plural del sujeto implícito y prepara el complemento directo 'los dioses extraños'.
- source_word: ወዘውስተ፡ እዘኒሆሙ፡
  english_pob_choice: what was in their ears
  chosen_spanish: lo que estaba en sus orejas
  alternatives_spanish:
  - lo que tenían en sus orejas
  - lo que llevaban en las orejas
  lexicon: oreja / oído
  rationale: '''Orejas'' sigue de cerca el concreto ge''ez y evita espiritualizar el detalle. Aunque ''oídos'' podría sonar más natural, ''orejas'' mantiene mejor la imagen corporal de adornos.'
- source_word: ወዘውስተ፡ ክሳውዲሆሙ፡
  english_pob_choice: what was on their necks
  chosen_spanish: lo que estaba en sus cuellos
  alternatives_spanish:
  - lo que llevaban en el cuello
  - lo que tenían al cuello
  lexicon: cuello / garganta
  rationale: La frase conserva el paralelismo con 'orejas' y mantiene el sentido de adornos colgantes o llevados en el cuello sin forzar una identificación más específica.
- source_word: ወጣዖተ፡
  english_pob_choice: the idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes
  - los amuletos
  lexicon: idolo
  rationale: Aquí el texto ya explicita una categoría cultual. 'Ídolos' es la correspondencia más directa y evita diluir el aspecto idolátrico.
- source_word: ወአማስኖ፡
  english_pob_choice: and destroyed them
  chosen_spanish: y los destruyó
  alternatives_spanish:
  - y los arruinó
  - y los aniquiló
  lexicon: destruir
  rationale: La revisión auditada muestra que el verbo fue omitido en una traducción previa. 'Destruyó' conserva el valor verbal sin sobrecargarlo con una intensificación mayor que la del ge'ez.
- source_word: ድርዋስ / tree term
  english_pob_choice: oak
  chosen_spanish: encina
  alternatives_spanish:
  - roble
  - terebinto
  lexicon: árbol de refugio/ritual
  rationale: El audit trail inglés reconoce incertidumbre botánica. 'Encina' funciona como equivalente español tradicional y digno para un árbol grande y sagrado, sin cerrar indebidamente la especie.
theological_decisions:
- issue: Identificación del término divino en el contexto de los 'dioses extraños'
  english_pob_reading: foreign gods
  chosen_spanish_reading: dioses extraños
  alternative_spanish_readings:
  - dioses extranjeros
  - ídolos extranjeros
  rationale: No se introduce un lenguaje eclesiástico que borre la tensión cultual del pasaje. 'Extraños' conserva la alteridad religiosa y la proximidad semántica al hebreo/ge'ez de divinidades ajenas.
  doctrine_reference: Monoteísmo bíblico y rechazo de la idolatría
- issue: Verbo de la acción sobre los objetos idolátricos
  english_pob_reading: he burned them, and crushed them, and destroyed them, and hid them
  chosen_spanish_reading: los quemó, y los trituró, y los destruyó, y los escondió
  alternative_spanish_readings:
  - los quemó, los molió y los escondió
  - los quemó, los quebrantó y los escondió
  rationale: Se preserva la secuencia completa de acciones atestiguada en el ge'ez y confirmada por la revisión. 'Trituró' mantiene la violencia material del acto sin interpretar más allá del texto.
  doctrine_reference: Purificación de la casa de Jacob y rechazo radical de la idolatría
- issue: Objeto del escondimiento final bajo el árbol
  english_pob_reading: under the oak that was in the land of Shechem
  chosen_spanish_reading: debajo de la encina que estaba en la tierra de Siquem
  alternative_spanish_readings:
  - debajo del roble que estaba en la tierra de Siquem
  - debajo del terebinto que estaba en la tierra de Siquem
  rationale: La especie del árbol es incierta. Se evita afirmar con demasiada seguridad una identificación botánica específica y se conserva la nota de incertidumbre mediante una palabra española natural.
  doctrine_reference: Cuidado filológico en pasajes con flora incierta
translation_notes:
  revision_awareness: 'La redacción incorpora las correcciones auditadas del pasaje: mantiene el pronombre de segunda persona plural en la cita («entre vosotros»), conserva la cláusula completa de entrega («y les dieron los dioses extraños»), e incluye el verbo omitido en una traducción previa («y los destruyó»). También refleja la alternativa botánica señalada por el POB inglés para el árbol final.'
  spanish_consistency_notes:
  - 'Se conserva la secuencia narrativa del original: cita, entrega de los objetos, acciones de Jacob y ocultamiento final.'
  - Se mantiene la distinción entre los objetos idolátricos en general ('dioses extraños') y la categoría explícita de 'ídolos'.
  - La puntuación reproduce una cadencia bíblica legible en español sin modernizar en exceso la sintaxis.
  - Se prefirió 'encina' como término principal y se dejó la alternativa 'terebinto' en nota por la incertidumbre léxica.
