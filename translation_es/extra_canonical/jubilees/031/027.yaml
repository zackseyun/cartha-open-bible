base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/027.yaml
  text: he had prayed, and when he came, he might set him on a donkey. And Isaac said to Jacob his son, “I am not able to come with you, for I am old and not able to endure the journey. Go, my son, in peace, for I am one hundred sixty-five years old today. I am no longer able to travel. Set your mother on a beast and let her go."”
  footnotes:
  - marker: a
    text: Or 'I am no longer able to ride on a beast and travel.'.
    reason: previous_rendering
  - marker: b
    text: Or 'when he came, he set him on a donkey.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:43Z'
    unchanged: false
    changes_summary: Corrected 'had vowed' to 'had prayed'; rendered the arrival/action more naturally as 'when he came, he set him on a donkey'; changed 'the way' to 'the journey'; completed the final clause by rendering the sense as 'ride on a beast and travel.'
translation:
  language: es
  text: 'Había orado, y al llegar, pudiera ponerlo sobre un asno.[a] Entonces Isaac dijo a Jacob su hijo: «No puedo ir contigo, porque soy viejo y no puedo soportar el viaje. Ve, hijo mío, en paz, porque hoy tengo ciento sesenta y cinco años. Ya no puedo viajar. Pon a tu madre sobre una bestia y déjala ir».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando llegó, lo pondría sobre un asno». El ge'ez permite una idea prospectiva/subjuntiva más que un simple pasado narrativo.
    reason: Preservar la alternativa documentada en la auditoría inglesa sobre el valor verbal de ይጽዐኖ.
  - marker: b
    text: O «Ya no puedo montar en una bestia y viajar». Una traducción anterior entendía así la cláusula final, pero la revisión auditada prefirió «Ya no puedo viajar. Pon a tu madre sobre una bestia y déjala ir» por la referencia explícita a «tu madre».
    reason: Conservar la alternativa previa documentada y explicar por qué el texto principal sigue la corrección auditada.
lexical_decisions:
- source_word: ይጽዐኖ
  english_pob_choice: when he came, he might set him on a donkey
  chosen_spanish: cuando llegó, podría ponerlo sobre un asno
  alternatives_spanish:
  - cuando llegó, lo pondría sobre un asno
  - cuando llegó, pudiera ponerlo sobre un asno
  lexicon: Ge'ez verbal imperfect/subjunctive in indirect discourse
  rationale: Sigo la revisión auditada que entiende el verbo como valor subjuntivo/hipotético dentro del marco narrativo, no como pasado simple. «Ponerlo sobre un asno» conserva el sentido de carga/montura sin forzar un calco.
- source_word: አድግ
  english_pob_choice: donkey / beast
  chosen_spanish: asno / bestia
  alternatives_spanish:
  - burro / bestia de carga
  - mula / bestia
  lexicon: animal de montura o carga
  rationale: «Asno» es claro y natural en español bíblico moderno; en la cláusula final uso «bestia» para preservar la amplitud del inglés POB «beast» y del contexto narrativo.
- source_word: ጸለየ
  english_pob_choice: he had prayed
  chosen_spanish: Él había orado
  alternatives_spanish:
  - había orado
  - había hecho oración
  lexicon: verbo de oración
  rationale: La evidencia revisada corrige la lectura anterior de «había jurado» a «había orado». En español, «orar» refleja bien el acto de petición a Dios sin introducir una paráfrasis.
- source_word: ሪማእኩ
  english_pob_choice: I am old
  chosen_spanish: soy viejo
  alternatives_spanish:
  - estoy viejo
  - soy anciano
  lexicon: edad/vejez
  rationale: «Soy viejo» reproduce la sencillez del original y del inglés auditado. «Anciano» sería más formal, pero menos inmediato.
- source_word: ተዐግሦ
  english_pob_choice: not able to endure the journey
  chosen_spanish: no puedo soportar el viaje
  alternatives_spanish:
  - no puedo soportar la jornada
  - no puedo aguantar el camino
  lexicon: resistencia física al trayecto
  rationale: «Viaje» sigue la revisión inglesa y evita el arcaísmo de «camino» cuando aquí se trata del trayecto completo. «Soportar» preserva la idea de resistencia física.
- source_word: ሖር
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: imperativo de despedida
  rationale: «Ve» es el imperativo natural y sobrio para esta bendición de despedida.
- source_word: በሰላም
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - en tranquilidad
  lexicon: fórmula de despedida
  rationale: «En paz» es la equivalencia más idiomática y fiel para la despedida hebrea/ge'ez de bienestar.
- source_word: ጻዐና
  english_pob_choice: Set your mother on a beast
  chosen_spanish: Pon a tu madre sobre una bestia
  alternatives_spanish:
  - Coloca a tu madre sobre una bestia
  - Sube a tu madre en una bestia
  lexicon: verbo causativo de poner/montar
  rationale: La revisión detectó que el texto final se refería a la madre de Jacob, no a la capacidad de Isaac de montar. «Pon» mantiene la orden directa y «bestia» conserva la amplitud del animal de carga/montura.
theological_decisions:
- issue: Despedida de bendición y paz
  english_pob_reading: Go, my son, in peace
  chosen_spanish_reading: Ve, hijo mío, en paz
  alternative_spanish_readings:
  - Vete, hijo mío, en paz
  - Ve en paz, hijo mío
  rationale: No hay tensión doctrinal especial, pero sí una fórmula de bendición. Mantengo el orden y el tono paternal sin intensificarlo litúrgicamente.
  doctrine_reference: Narrative blessing formula; no doctrinal assertion beyond a peaceful send-off.
- issue: Edad avanzada de Isaac
  english_pob_reading: I am one hundred sixty-five years old today
  chosen_spanish_reading: hoy tengo ciento sesenta y cinco años
  alternative_spanish_readings:
  - hoy cumplo ciento sesenta y cinco años
  - hoy soy de ciento sesenta y cinco años
  rationale: «Tengo» es la forma más natural en español contemporáneo para expresar edad. Conservo «hoy» para la puntualidad temporal del original.
  doctrine_reference: Chronological statement in narrative context.
translation_notes:
  revision_awareness: 'This draft follows the audited revision stream: it adopts the corrected reading ''he had prayed''; it reflects the revised imperfect/subjunctive nuance ''when he came, he might set him on a donkey''; it uses ''journey'' rather than ''way''; and it restores the final reference to Jacob''s mother, avoiding the earlier mistranslation that made Isaac the rider throughout the closing clause.'
  spanish_consistency_notes:
  - Usé «asno» en el primer half-line to match the donkey/donkey-beast sense, and «bestia» in the closing imperative to preserve the broader animal term in the source and English audit.
  - Mantuve un registro bíblico claro pero moderno, avoiding archaic forms like «mancebo» or «acometir» that are not warranted.
  - No introduje 'Mesías', 'Yahvé' o theological terms not present in the verse.
  - I preserved the direct speech structure and the final mother-reference as a distinct clause, since the audit trail identifies this as a major correction.
