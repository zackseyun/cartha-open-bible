translation:
  language: es
  text: '[Con alegría.] Y colocó a los dos hijos de Jacob, uno a su derecha y uno a su izquierda,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በፍሥሐ።
  english_pob_choice: '[With joy.]'
  chosen_spanish: '[Con alegría.]'
  alternatives_spanish:
  - Con gozo.
  - Con júbilo.
  lexicon: N/A
  rationale: El ge'ez expresa una circunstancia adverbial de gozo; en español, «con alegría» conserva el valor adverbial y suena natural. Se mantiene entre corchetes porque el contexto auditado indica una posible desincronización de límite de versículo, pero aquí se traduce tal como está en el paquete fuente.
- source_word: ወአኖመ፡
  english_pob_choice: And he placed
  chosen_spanish: Y colocó
  alternatives_spanish:
  - Y puso
  - Y colocó
  lexicon: N/A
  rationale: El verbo se rinde con «colocó» para reflejar una acción deliberada de situar a los hijos en posiciones específicas, como marca el audit trail inglés. «Puso» es posible, pero «colocó» preserva mejor la idea espacial y resulta idiomático en español.
- source_word: ክልኤሆሙ፡ ውሉዱ፡ ለያዕቆብ፡
  english_pob_choice: the two sons of Jacob
  chosen_spanish: a los dos hijos de Jacob
  alternatives_spanish:
  - a los dos hijos de Jacob
  - a los dos hijos de Jacob
  lexicon: N/A
  rationale: Se mantiene la relación posesiva explícita «de Jacob». «Hijos» corresponde literalmente a «sons» y evita una ampliación innecesaria.
- source_word: በየማኑ፡
  english_pob_choice: at his right hand
  chosen_spanish: a su derecha
  alternatives_spanish:
  - a su mano derecha
  - a su derecha
  lexicon: N/A
  rationale: En español, «a su derecha» comunica con claridad la posición espacial sin calco excesivo. «A su mano derecha» sería más literal, pero menos natural.
- source_word: በፀጋሙ፡
  english_pob_choice: at his left
  chosen_spanish: a su izquierda
  alternatives_spanish:
  - a su izquierda
  - a su mano izquierda
  lexicon: N/A
  rationale: «A su izquierda» es la equivalencia natural y precisa para la ubicación opuesta a la derecha; mantiene el paralelismo del versículo.
theological_decisions:
- issue: Marcador circunstancial de gozo al inicio del segmento
  english_pob_reading: '[With joy.]'
  chosen_spanish_reading: '[Con alegría.]'
  alternative_spanish_readings:
  - '[Con gozo.]'
  - '[Con júbilo.]'
  rationale: 'No hay tensión doctrinal, pero sí una cuestión de segmentación textual: el audit trail indica que la frase probablemente pertenece al final del versículo anterior. Se traduce igualmente aquí por fidelidad al paquete fuente, dejando visible el paréntesis editorial.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó una construcción más pesada por «And he placed», y el control posterior detectó que «With joy» quedó desplazado al inicio de este segmento. Por ello, el español adopta «colocó» y conserva la nota circunstancial al comienzo, sin añadir notas al pie no ancladas.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y digno, con sintaxis natural en español.
  - No se usa «SEÑOR» ni «Cristo»; este verso no involucra términos divinos o cristológicos.
  - La frase inicial entre corchetes responde al estado del fuente auditado y no introduce contenido doctrinal nuevo.
