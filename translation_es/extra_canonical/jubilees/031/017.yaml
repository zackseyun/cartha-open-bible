base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/031/017.yaml
  text: May your table be full, and may your food not fail for all ages. And all who hate you shall fall before you, and all your adversaries shall be rooted out and perish. And the one who blesses you,
  footnotes:
  - marker: a
    text: Or 'And blessed be the one who blesses you,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:37Z'
    unchanged: false
    changes_summary: Restored the opening blessing about the table being full, which was omitted in the draft, and kept the rest essentially unchanged for accuracy and natural formal English.
translation:
  language: es
  text: Que tu mesa esté llena, y que tu alimento no falte para siempre. Y todos los que te odian caerán delante de ti, y todos tus adversarios serán arrancados de raíz y perecerán. Y el que te bendice[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y bendito sea el que te bendice». La frase verbal corresponde al versículo siguiente en la división del texto.'
    reason: textual_variant
lexical_decisions:
- source_word: ትውልድ
  english_pob_choice: all ages
  chosen_spanish: por todos los siglos
  alternatives_spanish:
  - por todas las generaciones
  - por todos los tiempos
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: all ages'
  rationale: El giro ge'ez apunta a una duración continua y solemne; en español, «por todos los siglos» conserva el alcance temporal amplio y la cadencia bíblica sin restringirlo a «generaciones», que sería más específico.
- source_word: ትኩን ማዕድከ ምልእተ
  english_pob_choice: May your table be full
  chosen_spanish: Que tu mesa esté llena
  alternatives_spanish:
  - Sea llena tu mesa
  - Que tu mesa rebose
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: May your table be full'
  rationale: Se mantiene la imagen concreta de la mesa como figura de abundancia. «Que tu mesa esté llena» reproduce la bendición sin añadir matices no presentes en el texto.
- source_word: እክልከ
  english_pob_choice: your food
  chosen_spanish: tu alimento
  alternatives_spanish:
  - tu comida
  - tu provisión
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: your food'
  rationale: «Alimento» suena más amplio y digno que «comida» y puede abarcar provisión alimentaria sin salir de la imagen del versículo.
- source_word: ወኢይሕፀፅ
  english_pob_choice: may not fail
  chosen_spanish: no falte
  alternatives_spanish:
  - no faltará
  - no disminuya
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: may not fail'
  rationale: La construcción desiderativa en español queda natural con «que ... no falte», manteniendo el tono de bendición/petición implícito.
- source_word: ወኵሎሙ እለ ይጸልኡከ
  english_pob_choice: all who hate you
  chosen_spanish: todos los que te odian
  alternatives_spanish:
  - todos los que te aborrecen
  - todos los que te detestan
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: all who hate you'
  rationale: «Odiar» es el equivalente directo y fuerte del verbo, y preserva la oposición hostil del texto.
- source_word: ቅድሜከ ይደቁ
  english_pob_choice: shall fall before you
  chosen_spanish: caerán delante de ti
  alternatives_spanish:
  - se postrarán delante de ti
  - caerán ante ti
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: shall fall before you'
  rationale: «Caerán delante de ti» mantiene la dirección espacial y el sentido de derrota; «se postrarán» sería más interpretativo y podría suavizar la imagen de caída.
- source_word: ወኵሎሙ ዐርከ
  english_pob_choice: all your adversaries
  chosen_spanish: todos tus adversarios
  alternatives_spanish:
  - todos tus enemigos
  - todos los que se te oponen
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: all your adversaries'
  rationale: «Adversarios» refleja oposición activa y encaja con el paralelismo del versículo; evita homogeneizarlo con «enemigos» si el original distingue matiz.
- source_word: ይሠረዉ
  english_pob_choice: be rooted out
  chosen_spanish: serán arrancados de raíz
  alternatives_spanish:
  - serán desarraigados
  - serán arrancados
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: be rooted out'
  rationale: La expresión idiomática española «arrancados de raíz» conserva la metáfora vegetal del original y el vigor del juicio.
- source_word: ይትሐጐሉ
  english_pob_choice: perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - morirán
  - se perderán
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: perish'
  rationale: «Perecerán» mantiene el valor formal y solemne de destrucción total; es más fuerte y más bíblico que «morirán».
- source_word: ወዘይባርከከ
  english_pob_choice: the one who blesses you
  chosen_spanish: el que te bendice
  alternatives_spanish:
  - quien te bendice
  - el que te bendiga
  lexicon: 'Jubilees 31:17 (Ge''ez source); English POB: the one who blesses you'
  rationale: Se preserva el sujeto participial sin añadir la cláusula de resultado que corresponde al versículo siguiente. «El que te bendice» sigue de cerca el griego/semítico subyacente y evita adelantar la pasiva de bendición.
theological_decisions:
- issue: Límite del versículo y omisión de la pasiva final de bendición
  english_pob_reading: And the one who blesses you,
  chosen_spanish_reading: Y el que te bendice,
  alternative_spanish_readings:
  - Y bendito sea el que te bendice
  - Y el que te bendiga
  rationale: El audit trail indica que el cierre de 31:17 termina solo con el sintagma sujeto, mientras la cláusula verbal pertenece a 31:18. Por eso se evita completar la frase con una bendición pasiva en español.
  doctrine_reference: Jubilees 31:17-18 verse boundary / textual segmentation
- issue: Oposición entre quienes odian y quienes bendicen
  english_pob_reading: all who hate you ... the one who blesses you
  chosen_spanish_reading: todos los que te odian ... el que te bendice
  alternative_spanish_readings:
  - todos los que te aborrecen ... el que te bendiga
  - todos tus enemigos ... el que te bendice
  rationale: 'Se conserva el contraste ético y relacional del texto: hostilidad frente a bendición. No se suaviza a lenguaje más general como «enemigos» salvo en la segunda cola, donde el original habla de adversarios.'
  doctrine_reference: Benediction formula in Jubilees 31:17; Genesis 27:29 allusion
translation_notes:
  revision_awareness: 'El inglés auditado restauró la cláusula inicial sobre la mesa llena y luego corrigió el final del versículo para que termine solo en «the one who blesses you», dejando la pasiva para 31:18. La versión española sigue ambas decisiones: incluye la bendición inicial completa y deja el cierre en forma nominal sin adelantar el verbo posterior.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto, aunque este versículo no contiene el nombre divino explícito.
  - Se eligió un registro bíblico claro y moderno, evitando calcos innecesarios pero conservando las imágenes de mesa, caída y desarraigo.
  - «Alimento» se usa con amplitud semántica para abarcar la provisión continua sin añadir explicaciones.
