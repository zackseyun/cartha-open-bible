    issue: «por todos los siglos» con «tu alimento no falte» resulta algo rígido
    rationale: Aunque defendible, en español amplio suena menos natural en una bendición de provisión continua y puede sentirse formulaico. El sentido de duración indefinida del ge'ez/English POB se expresa con más claridad en «para siempre» o «por todos los tiempos».
  revised_spanish_text: Que tu mesa esté llena, y que tu alimento no falte para siempre. Y todos los que te odian caerán delante de ti, y todos tus adversarios serán arrancados de raíz y perecerán. Y el que te bendice[a],
  revised_footnotes:
  - marker: a
    text: 'O: «Y bendito sea el que te bendice». La frase verbal corresponde al versículo siguiente en la división del texto.'
    reason: textual_variant
  revision_rationale: 'Se hace una reparación menor de estilo y naturalidad: «para siempre» comunica mejor la duración continua de la bendición en español contemporáneo y eclesial legible, sin alterar el sentido de «for all ages». Se conserva todo lo demás, incluida la nota sobre el límite del versículo.'
