translation:
  language: es
  text: «No temas, madre; ten la certeza de que haré tu voluntad y andaré en rectitud, y nunca corromperé mis caminos.»
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አትፍርሂ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas, madre
  lexicon: temer
  rationale: El imperativo negativo directo de la fuente se expresa de manera natural y solemne con «No temas». Mantiene la fuerza exhortativa sin añadir matiz interpretativo innecesario.
- source_word: እሞ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  - madre mía
  lexicon: madre
  rationale: La vocativa «mother» del texto inglés corresponde simplemente a «madre» en español, sin necesidad de coloquialismo o afectividad aumentada.
- source_word: ትእመኒ
  english_pob_choice: be assured
  chosen_spanish: ten la certeza
  alternatives_spanish:
  - estate segura
  - confía
  lexicon: certeza
  rationale: La forma ge'ez transmite una exhortación de seguridad/confianza. «Ten la certeza» conserva el valor de aseguramiento con un español digno y claro.
- source_word: ፈቃደኪ
  english_pob_choice: your will
  chosen_spanish: tu voluntad
  alternatives_spanish:
  - tu deseo
  - lo que tú quieres
  lexicon: voluntad
  rationale: La equivalencia más directa y transparente es «voluntad», que preserva la fuerza de la expresión de obediencia al querer de la madre.
- source_word: ወበርትዕ
  english_pob_choice: walk in uprightness
  chosen_spanish: andaré en rectitud
  alternatives_spanish:
  - caminaré en rectitud
  - andaré con integridad
  lexicon: rectitud
  rationale: La imagen de caminar/andar en conducta correcta se vierte naturalmente como «andaré en rectitud», manteniendo el lenguaje moral de la fuente.
- source_word: ወኢያማስን፡ ፍናውየ፡ ለዓለም
  english_pob_choice: I will never corrupt my ways
  chosen_spanish: nunca corromperé mis caminos
  alternatives_spanish:
  - jamás pervertiré mis caminos
  - nunca echaré a perder mis caminos
  lexicon: corromper
  rationale: La secuencia final expresa negación intensa sobre desviar o corromper el propio modo de andar. «Corromperé mis caminos» reproduce de forma sobria la metáfora ética del original y coincide con la lectura auditada en inglés.
theological_decisions:
- issue: Lenguaje de obediencia moral y fidelidad a la conducta correcta
  english_pob_reading: I will do your will and walk in uprightness, and I will never corrupt my ways.
  chosen_spanish_reading: haré tu voluntad y andaré en rectitud, y nunca corromperé mis caminos
  alternative_spanish_readings:
  - haré lo que tú quieres y caminaré con integridad, y nunca desviaré mis caminos
  rationale: No hay herejía o carga doctrinal adicional; la decisión es conservar el paralelismo ético del texto. «Rectitud» y «corromper» mantienen el contraste entre conducta justa y desviación moral.
  doctrine_reference: Ética bíblica / obediencia y conducta recta
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó la puntuación de apertura/cierre de comillas, sin cambiar el contenido. La versión española adopta una apertura y cierre de cita normales en español y sigue fielmente el contenido auditado.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - «Andar en rectitud» y «corromper mis caminos» conservan la metáfora moral del original sin suavizarla.
