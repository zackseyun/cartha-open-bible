    reason: lexical_alternative
  revision_rationale: 'Se ajusta un punto léxico importante para reflejar la decisión auditada del POB inglés y la secuencia del ge''ez: ''he tocado'' queda en el texto principal, mientras ''desposado'' preserva el verbo adicional de compromiso matrimonial y ''pienso tomar'' mantiene el matiz de intención. También se simplifican las notas para que sirvan mejor al lector español.'
