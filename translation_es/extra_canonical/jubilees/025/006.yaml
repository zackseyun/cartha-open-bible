revisions:
- from: 'Entonces Jacob habló con Rebeca, su madre, y le dijo: «Mira, ahora soy hijo de nueve semanas de años[a], y no conozco mujer, ni me he acercado a una, ni me he desposado[b], ni pienso tomar para mí esposa de entre las hijas de Canaán»[c].'
  to: 'Entonces Jacob habló con Rebeca, su madre, y le dijo: «Mira, ahora soy hijo de nueve semanas de años[a], y no conozco mujer, ni he tocado a una, ni me he desposado[b], ni pienso tomar para mí esposa de entre las hijas de Canaán»[c].'
  rationale: 'Se ajusta un punto léxico importante para reflejar la decisión auditada del POB inglés y la secuencia del ge''ez: ''he tocado'' queda en el texto principal, mientras ''desposado'' preserva el verbo adicional de compromiso matrimonial y ''pienso tomar'' mantiene el matiz de intención. También se simplifican las notas para que sirvan mejor al lector español.'
  reviewer_model: gpt-5.4
