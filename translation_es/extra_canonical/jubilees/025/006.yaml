base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/025/006.yaml
  text: Then Jacob spoke with Rebekah his mother and said to her[25:6], “Look, I am now a son of nine weeks of years, and I do not know a woman, nor have I touched one, nor have I become engaged, nor do I intend to take a wife for myself from the daughters of Canaan.”
  footnotes:
  - marker: '25:6'
    text: '''Nine weeks of years'' equals sixty-three years, but the main text preserves Jubilees’ own chronological idiom.'
    reason: cultural_note
  - marker: a
    text: Or 'nor have I approached one, nor will I take'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:47Z'
    unchanged: false
    changes_summary: Changed 'do I intend to take' to 'will I take' for a more direct and formal rendering of the verb, while preserving the source sense. Kept 'weeks of years' as the literal expression.
translation:
  language: es
  text: 'Entonces Jacob habló con Rebeca, su madre, y le dijo: «Mira, ahora soy hijo de nueve semanas de años[a], y no conozco mujer, ni he tocado a una, ni me he desposado[b], ni pienso tomar para mí esposa de entre las hijas de Canaán»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «hijo de nueve semanas de años»; el texto conserva el giro cronológico propio de Jubileos.
    reason: cultural_note
  - marker: b
    text: 'O: «ni me he comprometido en matrimonio».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ni pienso tomar esposa». El verbo expresa intención, no solo futuro simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: “son of nine weeks of years”
  english_pob_choice: a son of nine weeks of years
  chosen_spanish: hijo de nueve semanas de años
  alternatives_spanish:
  - hijo de nueve semanas de años, es decir, sesenta y tres años
  - un hombre de nueve semanas de años
  lexicon: none
  rationale: Mantiene el idiomario cronológico propio de Jubileos sin normalizarlo en la línea principal; el español conserva la rareza deliberada del original y del POB inglés.
- source_word: ወኢይሔሊኒ / intend to take
  english_pob_choice: do I intend to take / will I take
  chosen_spanish: pienso tomar
  alternatives_spanish:
  - intento tomar
  - tomaré
  lexicon: none
  rationale: La revisión inglesa mostró que el verbo expresa intención. «Pienso tomar» comunica esa fuerza volitiva sin convertirla en simple futuro ni en una fórmula demasiado moderna.
- source_word: ወአፈፃርኩ
  english_pob_choice: nor have I become engaged
  chosen_spanish: ni me he desposado
  alternatives_spanish:
  - ni me he comprometido en matrimonio
  - ni he contraído esponsales
  lexicon: none
  rationale: «Desposarse» da en español una referencia comprensible al compromiso matrimonial previo, preservando la distinción del verbo que la auditoría inglesa indicó que estaba ausente en un borrador previo.
- source_word: ኢያአምር ወአገስስኩ
  english_pob_choice: I do not know a woman, nor have I touched one
  chosen_spanish: no conozco mujer, ni me he acercado a una
  alternatives_spanish:
  - no conozco mujer, ni la he tocado
  - no sé de mujer, ni me he aproximado a una
  lexicon: none
  rationale: Se conserva la secuencia de negaciones corporales/sexuales. «Me he acercado a una» refleja la alternativa textual ya documentada en el POB inglés para el verbo de aproximación, sin perder la reserva eufemística del español.
- source_word: בנות כנען / daughters of Canaan
  english_pob_choice: daughters of Canaan
  chosen_spanish: las hijas de Canaán
  alternatives_spanish:
  - las mujeres de Canaán
  - las jóvenes de Canaán
  lexicon: none
  rationale: Traducción directa del grupo nominal, manteniendo el eco genealógico y étnico del original.
theological_decisions:
- issue: Cronología idiomática de Jubileos
  english_pob_reading: a son of nine weeks of years
  chosen_spanish_reading: hijo de nueve semanas de años
  alternative_spanish_readings:
  - sesenta y tres años
  - un hijo de nueve semanas de años
  rationale: Se preserva la cronología interna del libro en la línea principal, como hace el POB inglés, y se evita ocultar su sistema de cómputo peculiar.
  doctrine_reference: no aplica
- issue: Secuencia de negaciones sobre pureza matrimonial
  english_pob_reading: I do not know a woman, nor have I touched one, nor have I become engaged, nor will I take a wife
  chosen_spanish_reading: no conozco mujer, ni me he acercado a una, ni me he desposado, ni pienso tomar para mí esposa
  alternative_spanish_readings:
  - no he conocido mujer, ni la he tocado, ni me he comprometido, ni tomaré esposa
  - no conozco mujer, ni la he tocado, ni me he prometido, ni pienso tomar esposa
  rationale: 'La formulación respeta la cadena de negaciones y el matiz incremental: conocimiento sexual, contacto, compromiso previo y decisión matrimonial futura. No se diluye ninguna etapa.'
  doctrine_reference: pureza sexual y matrimonio
- issue: Restricción matrimonial con Canaán
  english_pob_reading: from the daughters of Canaan
  chosen_spanish_reading: de entre las hijas de Canaán
  alternative_spanish_readings:
  - de las hijas de Canaán
  - de las mujeres cananeas
  rationale: «De entre» conserva la idea de selección/extracción desde un grupo determinado, sin suavizar el rechazo étnico del pasaje.
  doctrine_reference: matrimonio endogámico en el relato patriarcal
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió dos puntos clave: primero, restauró el verbo omitido que corresponde a «nor have I become engaged»; segundo, revirtió un futuro simple que debilitaba el matiz de intención en el verbo final. El español refleja ambas correcciones mediante una secuencia completa de negaciones y «pienso tomar».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde no aparece en este versículo; aquí no corresponde.
  - Se mantuvo «Canaán» con tilde normativa en español bíblico.
  - Se evitó «SEÑOR» y «Cristo» porque no están en el pasaje.
  - La puntuación española usa comillas angulares y coma vocativa natural.
  - No se incorporó la glosa numérica de sesenta y tres años en la línea principal para respetar el idiomario de Jubileos.
