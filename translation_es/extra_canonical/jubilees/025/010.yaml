base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/025/010.yaml
  text: And despite all this that he has commanded me[25:10], these twenty-two years Esau has been urging me and pressing me, speaking to me and saying, ‘My brother, take a wife, one of the sisters of my two wives,’ but I have not been willing to do as he did.
  footnotes:
  - marker: '25:10'
    text: The phrase 'for these twenty-two years' is retained from the Ethiopic as given; it likely refers to a prolonged period of pressure from Esau rather than a single event.
    reason: cultural_note
  - marker: a
    text: Or 'And with all this[25:10],'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:49Z'
    unchanged: false
    changes_summary: Reordered the opening to reflect the Geez more closely ('with all this' and 'these twenty-two years'), retained both verbs ('urging me and pressing me') for completeness, and simplified the concessive structure for more natural formal English.
translation:
  language: es
  text: 'A pesar de todo esto que me ha mandado[a], estos veintidós años Esaú me ha estado instando y presionando, hablándome y diciendo: «Hermano mío, toma una esposa, una de las hermanas de mis dos esposas»; pero yo no he querido hacer como él hizo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «estos veintidós años» conserva el lapso prolongado que el ge'ez sugiere; se entiende como una presión continua de Esaú, no como un único episodio.
    reason: cultural_note
lexical_decisions:
- source_word: ወ'ምስለ፡ ኵሉ፡
  english_pob_choice: And despite all this
  chosen_spanish: Y, a pesar de todo esto
  alternatives_spanish:
  - Y con todo esto
  - Y pese a todo esto
  lexicon: concessive connective
  rationale: El ge'ez introduce una concesión; en español, «a pesar de» expresa con naturalidad la idea de oposición o contraste antes del resto de la cláusula. Mantiene el tono de la revisión inglesa sin volverlo demasiado literal.
- source_word: ዘአዘዘኒ
  english_pob_choice: that he has commanded me
  chosen_spanish: que me ha mandado
  alternatives_spanish:
  - que me ha ordenado
  - que me ha comandado
  lexicon: mandar/ordenar
  rationale: El verbo transmite la noción de un mandato o imposición. «Mandar» es claro y bíblicamente inteligible en español, sin perder la fuerza de la obligación.
- source_word: ዕሥራ፡ ወክልኤተ፡ ዓመተ፡
  english_pob_choice: these twenty-two years
  chosen_spanish: durante estos veintidós años
  alternatives_spanish:
  - por estos veintidós años
  - estos veintidós años
  lexicon: duración temporal
  rationale: La construcción española necesita una preposición para expresar duración de modo natural. «Durante» comunica bien el periodo prolongado señalado por el texto y conserva el matiz de insistencia repetida.
- source_word: ይትናገረኒ፡ ወይብል፡
  english_pob_choice: speaking to me and saying
  chosen_spanish: hablándome y diciendo
  alternatives_spanish:
  - hablándome y diciéndome
  - mientras me hablaba y decía
  lexicon: verbos de habla progresiva
  rationale: La duplicación verbal se conserva para reflejar la acumulación retórica del original. «Hablándome y diciendo» reproduce la secuencia sin añadir información ajena.
- source_word: እኁየ፡
  english_pob_choice: My brother
  chosen_spanish: Hermano mío
  alternatives_spanish:
  - mi hermano
  - hermano
  lexicon: vocativo familiar
  rationale: «Hermano mío» mantiene el tono directo del discurso y suena más solemne que «mi hermano» en español bíblico contemporáneo.
- source_word: ንሣእ፡ ብእሲተ፡ አሐተ፡ እኅትነ፡ ለአንስቲያየ፡ ክልኤቲ፡
  english_pob_choice: take a wife, one of the sisters of my two wives
  chosen_spanish: toma una esposa, una de las hermanas de mis dos esposas
  alternatives_spanish:
  - toma mujer, una de las hermanas de mis dos esposas
  - toma por esposa una de las hermanas de mis dos esposas
  lexicon: wife/spouse terms
  rationale: Se conserva la mención específica de «esposa» para reflejar la relación doméstica del pasaje. «Toma una esposa» sigue de cerca el contenido del mandato y es idiomático en contexto narrativo.
- source_word: ኢይፈቅድ፡ እግበር፡ ከመ፡ ገብረ፡ ውእቱ።
  english_pob_choice: I have not been willing to do as he did
  chosen_spanish: yo no he querido hacer como él hizo
  alternatives_spanish:
  - no he estado dispuesto a hacer como él hizo
  - no he querido obrar como él obró
  lexicon: voluntad/acción comparativa
  rationale: «No he querido» expresa la negativa voluntaria del hablante y conserva la oposición con la presión anterior. «Como él hizo» mantiene la comparación simple y directa del original y de la POB inglesa.
theological_decisions:
- issue: La frase inicial concesiva y la referencia al mandato recibido podrían suavizarse en español si se priorizara fluidez sobre tensión textual.
  english_pob_reading: And despite all this that he has commanded me
  chosen_spanish_reading: Y, a pesar de todo esto que me ha mandado
  alternative_spanish_readings:
  - Y con todo esto que me ha mandado
  - Y pese a todo esto que me ha mandado
  rationale: Se preserva el contraste entre la imposición previa y la resistencia posterior. Esto evita diluir la tensión narrativa del pasaje.
  doctrine_reference: Principio de fidelidad semántica y retención de contraste discursivo
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que restituyó la fuerza concesiva de la apertura y la referencia al mandato recibido, manteniendo además la repetición de los verbos de insistencia para no perder el énfasis del original. La formulación española evita depender mecánicamente del inglés y ajusta la sintaxis al español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no ocurre.
  - Se conserva la progresión verbal doble («instando y presionando» / «hablándome y diciendo») para reflejar el estilo acumulativo del original.
  - «Esposa» se mantiene por la referencia concreta del texto; no se reemplaza por «mujer» salvo que el contexto lo exija.
  - La estructura concesiva inicial se mantiene para reflejar la tensión narrativa del pasaje.
