translation:
  language: es
  text: Pero yo, hijo mío, te amo sobremanera, y mi corazón y mi afecto te bendecirán en todo tiempo, de día y en las vigilias de la noche[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase final es textualmente trabajosa en esta línea; el sentido se entiende mejor como un merismo: ''de día y en las vigilias de la noche''.'
    reason: textual_variant
lexical_decisions:
- source_word: አፈቅረከ፡ ጥቀ፡ ፈድፋደ፡
  english_pob_choice: love you exceedingly
  chosen_spanish: te amo sobremanera
  alternatives_spanish:
  - te amo muchísimo
  - te amo en gran manera
  - te amo intensamente
  lexicon: amar
  rationale: El ge'ez intensifica el verbo de amor; la combinación inglesa 'love you exceedingly' pide una intensificación natural en español. 'Sobremanera' mantiene registro digno y fuerte sin volverse coloquial.
- source_word: ወልብየ፡ ወምሕረትየ፡
  english_pob_choice: my heart and my affection
  chosen_spanish: mi corazón y mi afecto
  alternatives_spanish:
  - mi corazón y mi compasión
  - mi corazón y mi misericordia
  - mi corazón y mi amor
  lexicon: corazón / afecto
  rationale: El binomio ge'ez apunta a interioridad afectiva; 'afecto' conserva el matiz de disposición amorosa sin forzar 'misericordia', que sería demasiado teológico para este contexto íntimo.
- source_word: ይባርከከ፡
  english_pob_choice: will bless you
  chosen_spanish: te bendecirán
  alternatives_spanish:
  - te bendecirá
  - te alabarán
  - te favorecerán
  lexicon: bendecir
  rationale: 'Sigo la lectura del plural en el inglés POB (''my heart and my affection will bless you''), por lo que en español el verbo concuerda en plural: ''te bendecirán''.'
- source_word: በኵሉ፡ ጊዜ፡
  english_pob_choice: at all times
  chosen_spanish: en todo tiempo
  alternatives_spanish:
  - siempre
  - en todo momento
  - en todo tiempo y ocasión
  lexicon: siempre / todo tiempo
  rationale: '''En todo tiempo'' reproduce la universalidad temporal del original con un giro bíblico claro y natural en español.'
- source_word: '''ዕለት፡ ወዐቃቤ፡ ለያልይ፡'''
  english_pob_choice: by day and in the watches of the night
  chosen_spanish: de día y en las vigilias de la noche
  alternatives_spanish:
  - de día y en las guardias de la noche
  - de día y en las vigilias nocturnas
  - de día y en las horas de la noche
  lexicon: vigilias / noche
  rationale: La merismia final se conserva con 'de día y en las vigilias de la noche', que refleja el sentido explicado por el POB inglés y mantiene el contraste día/noche sin sobreinterpretar la expresión.
theological_decisions:
- issue: Intensidad del amor paternal en un contexto sapiencial/testamentario
  english_pob_reading: But I, my son, love you exceedingly
  chosen_spanish_reading: Pero yo, hijo mío, te amo sobremanera
  alternative_spanish_readings:
  - Pero yo, hijo mío, te amo muchísimo
  - Pero yo, hijo mío, te amo en gran manera
  rationale: No hay una carga doctrinal polémica aquí, pero sí una afectividad explícita que conviene mantener con fuerza. 'Sobremanera' preserva el énfasis sin rebajarlo a un modismo demasiado moderno.
  doctrine_reference: N/A
- issue: Lectura merística del cierre temporal
  english_pob_reading: by day and in the watches of the night
  chosen_spanish_reading: de día y en las vigilias de la noche
  alternative_spanish_readings:
  - de día y de noche
  - de día y en la noche
  - de día y en las guardias de la noche
  rationale: Sigo la nota inglesa que identifica el cierre como merismo. 'Vigilias de la noche' conserva la imagen de turnos/noches vigiladas y evita convertirla en mera duplicación plana.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo entre revisiones es alto, así que esta versión sigue la lectura estable del POB inglés y del griego/ge'ez de base sin añadir conjeturas.
  spanish_consistency_notes:
  - Mantengo 'Dios' y 'Yahvé' según las normas generales del proyecto, aunque este versículo no los menciona.
  - Conservo un tono afectivo y solemne coherente con una versión bíblica pública.
  - Uso 'vigilias' para preservar el merismo y evitar una simplificación excesiva a 'noche' solamente.
