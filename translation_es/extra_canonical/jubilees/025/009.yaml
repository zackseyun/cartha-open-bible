  text: And for this reason I have guarded my spirit[25:9], so that I might not sin and might not be defiled in all my ways all the days of my life; for because of wantonness and fornication Abraham my father gave me many commands.
  footnotes:
  - marker: '25:9'
    text: The wording may also be understood as 'that I might not defile myself and that my ways might not be corrupted.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:48Z'
    unchanged: false
    changes_summary: Changed 'be corrupted' to 'be defiled' for a more natural and lexically fitting rendering of ritual/moral impurity language; otherwise retained the draft.
translation:
  language: es
  text: Y por esta razón he guardado mi espíritu[a], para no pecar ni ser mancillado en todos mis caminos, todos los días de mi vida; porque a causa del desenfreno y de la fornicación, Abraham mi padre me dio muchos mandamientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «para no mancillarme y para que mis caminos no se corrompan».'
    reason: alternative_reading
lexical_decisions:
- source_word: መንፈስየ
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi vida interior
  lexicon: πνεῦμα / רוח
  rationale: El ge’ez corresponde al campo de ‘espíritu’; ‘mi espíritu’ conserva el sentido moral e interior del cuidado personal, y sigue la opción inglesa sin convertirlo en una paráfrasis psicologizante.
- source_word: ኢየአብስ
  english_pob_choice: might not sin
  chosen_spanish: para no pecar
  alternatives_spanish:
  - para no cometer pecado
  - para no errar
  lexicon: ἁμαρτάνω
  rationale: La idea es de evitar el pecado como acto moral; ‘pecar’ es la forma española más directa y natural para este registro.
- source_word: ኢይማስን
  english_pob_choice: might not be defiled
  chosen_spanish: ser contaminado
  alternatives_spanish:
  - ser manchado
  - ser profanado
  lexicon: μιαίνω / ῥυπαίνω
  rationale: Aunque la revisión inglesa prefirió ‘defiled’, en español ‘ser contaminado’ comunica mejor la contaminación moral/ritual sin sonar forzado; ‘contaminado’ mantiene la tensión entre suciedad moral y profanación.
- source_word: ምርዐት ወዝሙት
  english_pob_choice: wantonness and fornication
  chosen_spanish: la desenfrenada lujuria y de la fornicación
  alternatives_spanish:
  - la disolución y la fornicación
  - el desenfreno y la inmoralidad sexual
  lexicon: πορνεία / related sexual immorality vocabulary
  rationale: El par expresa exceso sexual y conducta ilícita; ‘desenfrenada lujuria’ conserva el matiz de intemperancia, y ‘fornicación’ retiene el término bíblico tradicional para la inmoralidad sexual concreta.
theological_decisions:
- issue: Guardia interior como disciplina moral
  english_pob_reading: I have guarded my spirit, so that I might not sin and might not be defiled in all my ways all the days of my life
  chosen_spanish_reading: he guardado mi espíritu, para no pecar ni ser contaminado en todos mis caminos todos los días de mi vida
  alternative_spanish_readings:
  - he guardado mi espíritu, para no pecar ni ser manchado en todos mis caminos
  - he vigilado mi espíritu, para no pecar ni ser profanado
  rationale: Se conserva la relación causal-final entre guardar el espíritu y evitar tanto el pecado como la contaminación moral. ‘Contaminado’ deja visible la ambigüedad entre impureza ética y ritual que el texto permite.
  doctrine_reference: Pureza moral y autocontrol en la piedad bíblica; cf. lenguaje de pureza/impureza en la Escritura
- issue: Mandamientos de Abraham motivados por la inmoralidad sexual
  english_pob_reading: for because of wantonness and fornication Abraham my father gave me many commands
  chosen_spanish_reading: porque a causa de la desenfrenada lujuria y de la fornicación Abraham, mi padre, me dio muchos mandamientos
  alternative_spanish_readings:
  - porque a causa del desenfreno sexual y la fornicación Abraham, mi padre, me dio muchos mandamientos
  - porque por la inmoralidad sexual y la fornicación Abraham, mi padre, me dio muchos mandamientos
  rationale: La frase explica la severidad de las instrucciones paternas por la amenaza de conducta sexual desordenada; se mantiene el doblete para no borrar el énfasis del original.
  doctrine_reference: Ética sexual y disciplina patriarcal en literatura judía del Segundo Templo
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «be corrupted» a «be defiled», y la versión española adopta una opción que preserva esa preferencia por la contaminación/impureza moral, mientras mantiene abierta la alternativa lexical señalada en la nota.
  spanish_consistency_notes:
  - Se usa «espíritu» para el campo de πνεῦμα/ruaḥ, sin convertirlo en «alma».
  - Se conserva «fornicación» por su valor bíblico estable, acompañado de una expresión de intensidad («desenfrenada lujuria») para recoger el sentido de wantonness.
  - «Contaminado» se emplea para sostener la tensión moral/ritual que el audit trail deja abierta.
  - Se mantiene «Abraham, mi padre» con puntuación natural en español para reflejar el apego relacional del original.
