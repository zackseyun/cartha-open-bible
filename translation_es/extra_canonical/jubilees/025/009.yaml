revisions:
- from: Y por esta razón he guardado mi espíritu[a], para no pecar ni ser contaminado en todos mis caminos todos los días de mi vida; porque a causa de la desenfrenada lujuria y de la fornicación Abraham, mi padre, me dio muchos mandamientos.
  to: Y por esta razón he guardado mi espíritu[a], para no pecar ni ser mancillado en todos mis caminos, todos los días de mi vida; porque a causa del desenfreno y de la fornicación, Abraham mi padre me dio muchos mandamientos.
  rationale: Se ajusta 'ser contaminado' a 'ser mancillado' para reflejar mejor el matiz de impureza moral/ritual señalado por la revisión inglesa. Se simplifica 'la desenfrenada lujuria' a 'el desenfreno' para representar con más fidelidad y naturalidad el doblete 'wantonness and fornication'. También se pulen puntuación y fluidez sin alterar el sentido.
