base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/025/007.yaml
  text: For I remember the word of Abraham our father, for he commanded me not to take a wife from the daughters of Canaan, but to take a wife for myself from the seed of my father’s house and from my kin.
  footnotes:
  - marker: a
    text: 'Or ''what Abraham our father told me: that he commanded me''.'
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:47Z'
    unchanged: false
    changes_summary: Removed the awkward phrase 'from what' and replaced it with a more natural construction using a colon. Simplified 'but that I should take' to 'but to take' for smoother, more formal English while preserving the source meaning.
translation:
  language: es
  text: Porque recuerdo la palabra de Abraham nuestro padre, pues él me mandó no tomar esposa de las hijas de Canaán, sino tomar para mí una esposa de la descendencia de la casa de mi padre y de mi parentela.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እስመ / for
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: N/A
  rationale: La conjunción ge'ez introduce la razón del recuerdo; en español, 'Porque' reproduce bien la relación causal sin endurecer el tono.
- source_word: ነገረ፡ አብርሃም፡ አቡነ፡ / the word of Abraham our father
  english_pob_choice: the word of Abraham our father
  chosen_spanish: la palabra de Abraham, nuestro padre
  alternatives_spanish:
  - lo que Abraham, nuestro padre, me dijo
  - el dicho de Abraham, nuestro padre
  lexicon: N/A
  rationale: Se conserva la forma nominal del original y el matiz de 'word' como dicho autorizado, no como una paráfrasis más libre.
- source_word: አዘዘኒ / he commanded me
  english_pob_choice: he commanded me
  chosen_spanish: él me mandó
  alternatives_spanish:
  - él me ordenó
  - me dio mandamiento
  lexicon: N/A
  rationale: '''Mandó'' expresa con naturalidad el valor imperativo del verbo sin elevarlo artificialmente a un registro bíblico arcaizante.'
- source_word: ብእሲተ፡ እምአወልደ፡ ከናአን / a wife from the daughters of Canaan
  english_pob_choice: a wife from the daughters of Canaan
  chosen_spanish: esposa de las hijas de Canaán
  alternatives_spanish:
  - mujer de entre las hijas de Canaán
  - esposa tomada de las hijas de Canaán
  lexicon: N/A
  rationale: '''Esposa'' responde al contexto matrimonial; ''de las hijas de Canaán'' refleja la pertenencia/origen indicado por la preposición, sin añadir matices que el texto no exige.'
- source_word: እምዘርአ፡ ቤተ፡ አቡየ፡ / from the seed of my father’s house
  english_pob_choice: from the seed of my father’s house
  chosen_spanish: de la descendencia de la casa de mi padre
  alternatives_spanish:
  - de la simiente de la casa de mi padre
  - de la estirpe de la casa de mi padre
  lexicon: N/A
  rationale: '''Descendencia'' mantiene la referencia genealógica y evita ''simiente'', que en español puede sonar excesivamente técnico o arcaico; conserva el enlace con la casa paterna.'
- source_word: ወእምዘመድየ / and from my kin
  english_pob_choice: and from my kin
  chosen_spanish: y de mi parentela
  alternatives_spanish:
  - y de mis parientes
  - y de mi familia
  lexicon: N/A
  rationale: '''Parentela'' preserva el matiz colectivo y genealógico de parentesco más cercano al sentido bíblico que ''familia'' en este contexto.'
theological_decisions:
- issue: Norma matrimonial de separación de Canaán y pertenencia al linaje paterno
  english_pob_reading: not to take a wife from the daughters of Canaan, but to take a wife for myself from the seed of my father’s house and from my kin
  chosen_spanish_reading: no tomara esposa de las hijas de Canaán, sino que tomara para mí esposa de la descendencia de la casa de mi padre y de mi parentela
  alternative_spanish_readings:
  - no tomara esposa entre las hijas de Canaán, sino una esposa de la descendencia de la casa de mi padre y de mi parentela
  - no tomara mujer de las hijas de Canaán, sino de la descendencia de la casa de mi padre y de mi parentela
  rationale: Se conserva la oposición entre la prohibición cananea y la obligación de buscar esposa dentro del linaje paterno y la parentela, sin suavizar la tensión étnico-genealógica del pasaje.
  doctrine_reference: Génesis 24:3-4; Génesis 28:1-2
translation_notes:
  revision_awareness: La revisión inglesa más reciente favorece una sintaxis más directa con apposición ('the word of Abraham our father, for he commanded me'). En español se optó por una causal inicial natural ('Porque recuerdo...') y se mantuvo la distinción entre la palabra recordada y el mandato, sin introducir una nota textual porque el español puede reflejar ambas relaciones sin ambigüedad adicional.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se evitó 'SEÑOR' y 'Cristo', irrelevantes para este versículo.
  - '''Parentela'' se mantiene como término genealógico consistente con el registro POB para kinship.'
  - No se empleó 'simiente' en el texto principal para evitar un castellano innecesariamente arcaico, aunque se conserva como alternativa léxica documentada.
