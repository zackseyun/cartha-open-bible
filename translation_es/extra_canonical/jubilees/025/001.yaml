translation:
  language: es
  text: Y en este jubileo, en el segundo año de esta semana, Rebeca llamó a Jacob, su hijo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበካልእ፡ ዓመት፡
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - en el año segundo
  - al segundo año
  lexicon: year
  rationale: El ge'ez expresa de forma directa el orden temporal; en español, «en el segundo año» conserva la relación cronológica sin añadir matices no presentes en el texto.
- source_word: ዘዝ፡ ሱባዔ፡
  english_pob_choice: this week
  chosen_spanish: de esta semana
  alternatives_spanish:
  - de esta semana [año/periodo]
  - de esta semana de jubileo
  lexicon: week
  rationale: La revisión inglesa corrigió la lectura previa de «the seventh week» a «this week», por el demostrativo del ge'ez. «Semana» mantiene el valor básico de ሱባዔ y el demostrativo «esta» refleja el texto fuente.
- source_word: በዝ፡ አምቤልዉ፡
  english_pob_choice: in this jubilee
  chosen_spanish: en este jubileo
  alternatives_spanish:
  - en este jubileo [a]
  - en este año jubilar
  lexicon: jubilee
  rationale: Se conserva «jubileo» para el término técnico del ciclo jubilar, siguiendo la elección inglesa y evitando sustituirlo por una perífrasis más interpretativa.
- source_word: ጸውዐት፡
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - hizo llamar
  - convocó
  lexicon: call
  rationale: El verbo simple «llamó» reproduce con naturalidad la acción verbal del original sin sobrecargarla con una interpretación causal o ceremonial.
- source_word: ያዕቆብሃ፡ ወልዳ፡
  english_pob_choice: Jacob her son
  chosen_spanish: a Jacob, su hijo
  alternatives_spanish:
  - a Jacob, su hijo varón
  - a Jacob, su hijo
  lexicon: son
  rationale: El posesivo español («su hijo») expresa la relación filial de manera clara y fiel; no hace falta añadir «varón», que no está enfatizado en el texto.
theological_decisions:
- issue: Referencia temporal al ciclo jubilar y a la semana mencionada antes
  english_pob_reading: this week in this jubilee
  chosen_spanish_reading: esta semana en este jubileo
  alternative_spanish_readings:
  - la séptima semana de este jubileo
  - esta semana del jubileo
  rationale: 'La lectura se alinea con la corrección del audit trail: el demostrativo del ge''ez apunta a «esta semana», no a «la séptima semana». La frase mantiene la continuidad narrativa sin convertir una referencia demostrativa en una numeración no atestiguada aquí.'
  doctrine_reference: Ninguna; decisión de cronología textual.
translation_notes:
  revision_awareness: 'El audit trail inglés indica una revisión importante: se corrigió una lectura previa de «the seventh week of this jubilee» a «this week in this jubilee» por fidelidad al demostrativo del ge''ez. La versión española sigue esa revisión y conserva el orden temporal sencillo del original.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin arcaísmos innecesarios.
  - «Jubileo» se usa como término técnico consistente con la tradición de la obra y con el inglés POB.
  - No se añadió nota al pie porque la revisión textual ya quedó reflejada en la traducción principal y no hay alternativa textual adicional que requiera anclaje.
