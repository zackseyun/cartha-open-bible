translation:
  language: es
  text: Y oí previamente que le habían nacido hijas a Labán, tu hermano, y puse mi corazón en ellas, para tomar una esposa de entre ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሰማዕኩ፡ እምቀዲሙ
  english_pob_choice: I heard previously
  chosen_spanish: yo oí antes
  alternatives_spanish:
  - oí previamente
  - supe antes
  lexicon: hear / listen
  rationale: El ge’ez expresa primero la recepción de información; ‘oí antes’ conserva el valor de haber recibido esa noticia con anterioridad, sin añadir una inferencia que el texto no exige. Mantengo el orden simple y directo del original.
- source_word: ከመ፡ ትወልዲ፡ አዋልደ፡ ለላባ፡ እኁኪ
  english_pob_choice: that daughters had been born to Laban, your brother
  chosen_spanish: que le habían nacido hijas a Labán, tu hermano
  alternatives_spanish:
  - que habían nacido hijas a Labán, tu hermano
  - que a Labán, tu hermano, le nacieron hijas
  lexicon: be born / give birth
  rationale: ‘Le habían nacido’ refleja bien el matiz idiomático de nacimiento referido a una persona en español y conserva el pasivo/resultativo del inglés POB. ‘Le’ hace visible la relación de pertenencia familiar del texto.
- source_word: ወላዕሌሆን፡ አንበርኩ፡ ልብየ፡
  english_pob_choice: and I set my heart on them
  chosen_spanish: y puse mi corazón en ellas
  alternatives_spanish:
  - y fijé mi corazón en ellas
  - y me propuse conseguirlas
  lexicon: heart / set
  rationale: La imagen semítica de ‘poner el corazón’ es transparente en español y conserva la fuerza de deseo intencional del original. Evita reducirlo a un mero ‘gustar’, que sería demasiado débil.
- source_word: ከመ፡ እንሣእ፡ እምኔሆን፡ ብእሲተ።
  english_pob_choice: that I might take a wife from among them
  chosen_spanish: para tomar esposa de entre ellas
  alternatives_spanish:
  - para tomar una esposa de entre ellas
  - para tomarme esposa de entre ellas
  lexicon: take wife
  rationale: ‘Tomar esposa’ reproduce el giro tradicional y el valor de elección matrimonial del texto. ‘De entre ellas’ mantiene la idea de selección dentro del grupo de hijas de Labán; ‘esposa’ evita una lectura genérica ambigua.
theological_decisions:
- issue: Matrimonio por elección dentro de la familia de Labán
  english_pob_reading: that I might take a wife from among them
  chosen_spanish_reading: para tomar esposa de entre ellas
  alternative_spanish_readings:
  - para tomar una esposa de entre ellas
  - para casarme con una de ellas
  rationale: El pasaje presenta una intención matrimonial concreta, no una afirmación doctrinal. La traducción conserva la intención narrativa sin cargarla con formulaciones interpretativas adicionales.
  doctrine_reference: No aplica; decisión narrativa/lexical.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que ajustó los tiempos a un pasado más natural (‘heard previously’, ‘had been born’, ‘set’). En español se reflejó ese valor retrospectivo con un pretérito simple más un pluscuamperfecto en la subordinada.
  spanish_consistency_notes:
  - Se mantuvo ‘Labán’ como nombre propio sin adaptación adicional.
  - Se usó ‘esposa’ en singular porque el propósito es tomar una mujer de entre las hijas, no varias.
  - No se introdujo ‘Cristo’, ‘SEÑOR’ ni otra terminología ajena al texto.
  - La formulación conserva el tono sobrio y narrativo propio del libro de Jubileos.
