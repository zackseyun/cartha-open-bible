  language: en
  yaml_path: translation/extra_canonical/jubilees/025/002.yaml
  text: And she spoke to him, saying, “My son, do not take for yourself a wife from the daughters of Canaan, as Esau your brother did, who took for himself two wives from the daughters of Canaan, and they have made my spirit bitter by all their unclean conduct.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:45Z'
    unchanged: false
    changes_summary: Capitalized the opening for formal style and changed 'and spoke to him' to 'And she spoke to him' to account for the feminine verb in the source. No other changes needed.
translation:
  language: es
  text: 'Y ella le habló, diciendo: «Hijo mío, no tomes para ti mujer de las hijas de Canaán, como hizo Esaú tu hermano, que tomó para sí dos mujeres de las hijas de Canaán; y ellas han amargado mi espíritu con toda su conducta impura».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתְּנַגְּרְתֹּו / she spoke to him
  english_pob_choice: And she spoke to him
  chosen_spanish: Y ella le habló
  alternatives_spanish:
  - Y le habló
  - Y ella le dijo
  lexicon: n/a
  rationale: El verbo femenino del ge'ez exige marcar explícitamente la hablante. En español, 'habló' comunica el acto de dirigirse a alguien sin añadir contenido no presente; se conserva además 'ella' para reflejar la marca de género y la revisión inglesa.
- source_word: בְּנִי / my son
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  lexicon: n/a
  rationale: '''Hijo mío'' suena natural y solemne en español bíblico; mantiene la relación afectiva/directiva del vocativo sin alterar el sentido.'
- source_word: אַל־תִּקַּח ... אִשָּׁה / do not take ... a wife
  english_pob_choice: do not take for yourself a wife
  chosen_spanish: no tomes para ti mujer
  alternatives_spanish:
  - no tomes para ti una mujer
  - no te cases con una mujer
  lexicon: n/a
  rationale: Se conserva la fuerza verbal de 'tomar' como en la fuente y en la traducción inglesa. 'Mujer' reproduce el alcance de 'wife' sin imponer un giro idiomático más interpretativo como 'casarte'.
- source_word: בְּנוֹת כְּנַעַן / daughters of Canaan
  english_pob_choice: from the daughters of Canaan
  chosen_spanish: de las hijas de Canaán
  alternatives_spanish:
  - de las mujeres de Canaán
  - entre las hijas de Canaán
  lexicon: n/a
  rationale: Se preserva literalmente la referencia étnica del texto. 'Hijas de Canaán' sigue de cerca la formulación de la fuente y del inglés POB.
- source_word: כְּאֵשָׂו אָחִיךָ / as Esau your brother did
  english_pob_choice: as Esau your brother did
  chosen_spanish: como hizo Esaú tu hermano
  alternatives_spanish:
  - como lo hizo Esaú, tu hermano
  - como hizo tu hermano Esaú
  lexicon: n/a
  rationale: Orden natural en español, manteniendo el contraste ejemplar negativo entre el destinatario y Esaú.
- source_word: שְׁתֵּי נָשִׁים / two wives
  english_pob_choice: two wives
  chosen_spanish: dos mujeres
  alternatives_spanish:
  - dos esposas
  - dos mujeres como esposas
  lexicon: n/a
  rationale: La fuente ge'ez dice literalmente 'dos mujeres'. Aunque el sentido es matrimonial, se conserva la forma del original y del inglés POB sin introducir una glosa ajena.
- source_word: וַתְּמָרְרָה ... לְמְנַפְשֵׁהּ / they have made bitter my spirit
  english_pob_choice: they have made my spirit bitter
  chosen_spanish: han amargado mi espíritu
  alternatives_spanish:
  - han hecho amarga mi alma
  - han entristecido mi espíritu
  lexicon: n/a
  rationale: '''Espíritu'' refleja el ge''ez/semítico y la elección inglesa. ''Amargado'' conserva la metáfora afectiva sin suavizarla ni sustituirla por una explicación psicológica.'
- source_word: בְּכָל־מַעֲשֵׂיהֶם / by all their conduct
  english_pob_choice: by all their unclean conduct
  chosen_spanish: con toda su conducta impura
  alternatives_spanish:
  - por toda su conducta impura
  - con todas sus acciones impuras
  lexicon: n/a
  rationale: '''Conducta impura'' expresa la valoración moral de la fuente y el adjetivo inglés ''unclean'' de forma clara en español bíblico contemporáneo. Se evita ''inmunda'' por sonar más arcaico y menos transparente para lectores modernos.'
theological_decisions:
- issue: Descripción moral de la conducta de las esposas cananeas
  english_pob_reading: unclean conduct
  chosen_spanish_reading: conducta impura
  alternative_spanish_readings:
  - conducta inmunda
  - conducta no pura
  rationale: La fuente evalúa la conducta con un término de pureza/impureza, no solo con desaprobación social. 'Impura' preserva esa carga semántica sin volver el texto excesivamente arcaico.
  doctrine_reference: Pureza ritual y moral en la literatura del Segundo Templo; cf. categorías de pureza/impureza en la Torá.
- issue: Preservación de 'espíritu' frente a posibles equivalentes idiomáticos
  english_pob_reading: my spirit bitter
  chosen_spanish_reading: mi espíritu
  alternative_spanish_readings:
  - mi alma
  - mi ánimo
  rationale: '''Espíritu'' mantiene la antropología y la resonancia semítica de la fuente. ''Alma'' o ''ánimo'' reducirían o desplazarían el campo semántico documentado por el texto y la versión inglesa.'
  doctrine_reference: Antropología bíblica en literatura semítica; distinción entre espíritu, alma y ánimo según contexto.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió la apertura de 'and spoke to him' a 'And she spoke to him' para reflejar el género femenino del verbo en la fuente; esta draft española adopta esa corrección y la hace explícita con 'Y ella le habló'. No se requieren otras divergencias respecto al texto inglés auditado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Canaán'' conserva la forma bíblica tradicional con tilde según uso español.'
  - Se evita 'esposa/esposas' porque la fuente y el audit trail inglés conservan la literalidad de 'wife(s)' sin forzar una normalización interpretativa.
