translation:
  language: es
  text: Porque toda su conducta es fornicación e impureza, y no hay justicia con ellos, porque todo ello es malo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኵሉ፡ ምግባሮሙ፡
  english_pob_choice: all their conduct
  chosen_spanish: todo su proceder
  alternatives_spanish:
  - toda su conducta
  - todo lo que hacen
  lexicon: todo; proceder; conducta
  rationale: El ge'ez habla del conjunto de sus acciones o manera de obrar. «Proceder» conserva el sentido global de conducta habitual sin sonar demasiado técnico o arcaico; «todo su proceder» refleja bien el alcance total del original.
- source_word: ዝሙት፡
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - adulterio
  lexicon: fornicación
  rationale: La elección inglesa ya fija el término moral fuerte. En español, «fornicación» reproduce con precisión el valor léxico tradicional y la gravedad del término sin diluirlo en una paráfrasis.
- source_word: ወምርጓት፡
  english_pob_choice: and impurity
  chosen_spanish: e impureza
  alternatives_spanish:
  - e inmundicia
  - y suciedad ritual
  lexicon: impureza
  rationale: «Impureza» conserva la amplitud semántica de contaminación moral o ritual que puede abarcar el término, y sigue de cerca la decisión inglesa sin forzar una especificación no atestiguada.
- source_word: ጽድቀ፡
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: justicia
  rationale: El sustantivo bíblico admite «justicia» y «rectitud». Se eligió «justicia» por ser natural en español bíblico y por conservar el contraste directo con la maldad del miembro final.
- source_word: እኩይ፡
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - mal
  lexicon: malo
  rationale: 'El ge''ez concluye con una evaluación simple de maldad. «Malo» mantiene la brevedad del original y funciona bien en la cláusula explicativa final: «porque es malo».'
theological_decisions:
- issue: Contraste moral absoluto entre la conducta del grupo y la ausencia de justicia
  english_pob_reading: there is no righteousness with them, for it is evil
  chosen_spanish_reading: no hay justicia con ellos, porque es malo
  alternative_spanish_readings:
  - no hay rectitud con ellos, porque es malo
  - no hay justicia en ellos, porque es malo
  rationale: 'La formulación conserva el contraste doctrinal del texto: la ausencia de justicia/rectitud en ellos se explica por la maldad de su proceder. «Con ellos» sigue de cerca la idea relacional del original y evita una interiorización excesiva que no está exigida por el texto.'
  doctrine_reference: Sabiduría bíblica/ética del pacto; contraste entre justicia y maldad en la conducta humana.
translation_notes:
  revision_awareness: Se siguió la lectura inglesa ya estabilizada en el audit trail, que no presenta notas ni revisiones sustantivas; el pasaje fue mantenido sin cambios por el revisor más reciente y la concordancia cruzada fue de alta aprobación.
  spanish_consistency_notes:
  - Se mantuvo «justicia» en lugar de «rectitud» para conservar el paralelismo y la naturalidad bíblica en español.
  - Se evitó «SEÑOR» o cualquier sustitución no pertinente, porque el pasaje no contiene el nombre divino ni una cita del mismo.
  - «Fornicación» e «impureza» se conservaron como términos morales fuertes, coherentes con el inglés POB y con el tenor acusatorio del versículo.
