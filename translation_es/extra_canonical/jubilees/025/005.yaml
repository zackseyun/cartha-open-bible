    reason: segmentation_note
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:47Z'
    unchanged: false
    changes_summary: Improved natural English and removed the awkward duplicated phrase "from my father’s house" at the end, while preserving the contrast that the wife should not be from this land but from the speaker’s father’s house and kindred.
translation:
  language: es
  text: Y ahora[a], hijo mío, escucha mi voz y haz la voluntad de tu madre, y no tomes para ti una esposa de las hijas de esta tierra; sino que tomarás para ti una esposa de la casa de mi padre y de mi parentela. Y Dios Altísimo te bendecirá, y tus hijos serán una descendencia justa y una simiente santa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verso contiene cierta repetición alrededor de «de la casa de mi padre», probablemente por estilo enfático o por ruido local de segmentación en la línea extraída. El texto principal sigue la forma depurada auditada.
    reason: segmentation_note
lexical_decisions:
- source_word: ስማዕ፡ ቃለየ፡
  english_pob_choice: listen to my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - oye mi voz
  - escucha mi palabra
  lexicon: oír/escuchar; voz/palabra
  rationale: La fuente pide atención obediente a la voz materna; «escucha mi voz» conserva el valor idiomático y la relación entre voz y obediencia sin volverlo demasiado literal o torpe.
- source_word: ወግበር፡ ፈቃደ፡ ለአምከ፡
  english_pob_choice: do the will of your mother
  chosen_spanish: haz la voluntad de tu madre
  alternatives_spanish:
  - cumple la voluntad de tu madre
  - haz lo que quiere tu madre
  lexicon: hacer/cumplir la voluntad
  rationale: «Voluntad» refleja bien la expresión de intención/deseo directivo del original y mantiene el paralelismo con la formulación inglesa auditada.
- source_word: ብእሲተ፡
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa/mujer
  lexicon: esposa
  rationale: En contexto matrimonial, «esposa» es la opción más clara y digna en español; evita la ambigüedad de «mujer».
- source_word: እምአዋልደ፡ ዝምድር፡
  english_pob_choice: from the daughters of this land
  chosen_spanish: de las hijas de esta tierra
  alternatives_spanish:
  - entre las hijas de esta tierra
  - de las mujeres de esta tierra
  lexicon: hijas/tierra
  rationale: Se conserva la referencia genealógica y territorial de la frase; «esta tierra» sigue la oposición del pasaje entre el entorno local y la familia paterna.
- source_word: እምቤተ፡ አቡየ፡' ወዘእንበለ፡ እምዘመደ፡' አቡየ፡'
  english_pob_choice: from my father’s house and from my father’s kindred
  chosen_spanish: de la casa de mi padre y de mi parentela
  alternatives_spanish:
  - de la casa de mi padre y de la familia de mi padre
  - de mi casa paterna y de mi parentela
  lexicon: casa/parentela
  rationale: «Casa de mi padre» preserva la imagen doméstico-genealógica; «parentela» traduce bien el término de clan/consanguinidad sin imponer una formulación eclesiástica o moderna ajena.
- source_word: አምላከ፡ ልዑል፡
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - Dios, el Altísimo
  lexicon: Dios/Altísimo
  rationale: La fórmula reverente y compacta «Dios Altísimo» corresponde naturalmente al epíteto y mantiene el tono bíblico sin necesidad de mayúsculas excesivas o perifrasis.
- source_word: ትውልደ፡ ጽድቅ፡
  english_pob_choice: a righteous offspring
  chosen_spanish: una descendencia justa
  alternatives_spanish:
  - una descendencia recta
  - un linaje justo
  lexicon: descendencia/justicia
  rationale: «Descendencia» reproduce el valor colectivo y generacional; «justa» conserva el campo semántico de justicia/rectitud sin forzar una lectura estrictamente forense.
- source_word: ወዘርአ፡ ቅዱሰ።
  english_pob_choice: and a holy seed
  chosen_spanish: y una simiente santa
  alternatives_spanish:
  - y una descendencia santa
  - y una progenie santa
  lexicon: simiente/santa
  rationale: Se conserva «simiente» para respetar la imagen semítica y la distinción de la segunda expresión respecto de «descendencia»; «santa» mantiene la cualidad de consagración.
theological_decisions:
- issue: Contraste matrimonial entre las hijas de la tierra y la casa paterna
  english_pob_reading: do not take for yourself a wife from the daughters of this land; rather, from my father’s house and from my father’s kindred you shall take a wife for yourself
  chosen_spanish_reading: no tomes para ti una esposa de las hijas de esta tierra; más bien, de la casa de mi padre y de mi parentela tomarás para ti una esposa
  alternative_spanish_readings:
  - no tomes para ti una esposa de las hijas de esta tierra, sino de la casa de mi padre y de mi parentela
  - no tomes una esposa entre las hijas de esta tierra; al contrario, toma una de la casa de mi padre y de mi parentela
  rationale: La construcción mantiene la prohibición y la alternativa positiva sin añadir una condición eclesial ni suavizar el contraste familiar/étnico del texto.
  doctrine_reference: endogamia familiar en el relato patriarcal; fidelidad al linaje prometido
- issue: Bendición divina asociada a la descendencia
  english_pob_reading: And God Most High will bless you, and your children will be a righteous offspring and a holy seed
  chosen_spanish_reading: Y Dios Altísimo te bendecirá, y tus hijos serán una descendencia justa y una simiente santa
  alternative_spanish_readings:
  - Y Dios Altísimo te bendecirá, y tus hijos serán un linaje justo y una descendencia santa
  - Y Dios Altísimo te bendecirá, y tus hijos serán una prole justa y santa
  rationale: Se conserva la promesa de bendición como resultado de la obediencia matrimonial, y se mantienen dos expresiones paralelas para la posteridad sin fusionarlas indebidamente.
  doctrine_reference: bendición patriarcal y transmisión de santidad/justicia a la descendencia
translation_notes:
  revision_awareness: La revisión inglesa eliminó una repetición final de «from my father’s house» y reforzó la oposición entre las hijas de esta tierra y la casa/parentela del padre. La versión española sigue esa forma revisada, sin duplicar la frase final, y conserva la estructura contrastiva del verso.
  spanish_consistency_notes:
  - Se usa «Dios Altísimo» para mantener la fórmula reverente del epíteto sin reemplazarlo por un título eclesiástico diferente.
  - Se distingue «descendencia» y «simiente» para respetar la duplicación del texto fuente; no se colapsan en una sola palabra.
  - Se prefiere «esposa» por claridad matrimonial y porque el contexto no requiere la ambigüedad de «mujer».
