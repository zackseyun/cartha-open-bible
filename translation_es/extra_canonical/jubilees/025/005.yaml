  yaml_path: translation/extra_canonical/jubilees/025/005.yaml
  text: And now[25:5], my son, listen to my voice and do the will of your mother, and do not take for yourself a wife from the daughters of this land; rather, from my father’s house and from my father’s kindred you shall take a wife for yourself. And God Most High will bless you, and your children will be a righteous offspring and a holy seed.
  footnotes:
