base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/025/011.yaml
  text: I swear before you all the days of my life that I will not take a wife for myself from the daughters of the seed of Canaan, and that I will not act wickedly as Esau did.
  footnotes:
  - marker: a
    text: Or 'and that I will not do as Esau did.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:49Z'
    unchanged: false
    changes_summary: Replaced interpretive 'act wickedly' with the more literal and neutral 'do as Esau did,' which better reflects the source without adding evaluation not explicit in the verse.
translation:
  language: es
  text: Juro delante de ti todos los días de mi vida que no tomaré mujer de entre las hijas de la descendencia de Canaán, y que no obraré malvadamente como hizo Esaú.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እምሕለ፡
  english_pob_choice: I swear
  chosen_spanish: Juro
  alternatives_spanish:
  - Afirmo con juramento
  - Juro solemnemente
  lexicon: jurar
  rationale: El juramento está explícito en el ge'ez; «juro» comunica de forma directa y natural el acto solemne sin añadir paráfrasis.
- source_word: ቅድሜኪ፡
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: delante de
  rationale: La preposición expresa bien la idea de presencia inmediata en español bíblico moderno y es clara para lectura pública.
- source_word: ኵሎ፡ መዋዕለ፡ ሕይወትየ፡
  english_pob_choice: all the days of my life
  chosen_spanish: todos los días de mi vida
  alternatives_spanish:
  - durante todos los días de mi vida
  - en todos los días de mi vida
  lexicon: todos los días de mi vida
  rationale: Es la equivalencia más natural y fiel para la fórmula temporal del texto.
- source_word: ብእሲተ፡
  english_pob_choice: a wife for myself
  chosen_spanish: mujer para mí
  alternatives_spanish:
  - esposa para mí
  - una mujer para mí
  lexicon: mujer / esposa
  rationale: El ge'ez indica una esposa; en español «mujer para mí» suena más sobrio y mantiene el paralelismo con la restricción matrimonial sin sobrecargar con terminología más interpretativa.
- source_word: እምአዋልደ፡ ዘርአ፡ ከናአን፡
  english_pob_choice: from the daughters of the seed of Canaan
  chosen_spanish: de entre las hijas de la descendencia de Canaán
  alternatives_spanish:
  - de entre las hijas de la simiente de Canaán
  - de entre las hijas de la semilla de Canaán
  lexicon: descendencia
  rationale: «Seed» se rinde aquí como «descendencia» para conservar el sentido genealógico sin introducir el arcaísmo «simiente» ni la ambigüedad botánica de «semilla».
- source_word: ወኢያአኪ፡ ገቢረ፡
  english_pob_choice: and that I will not act wickedly
  chosen_spanish: y que no actuaré impíamente
  alternatives_spanish:
  - y que no haré mal
  - y que no obraré malvadamente
  lexicon: actuar impíamente
  rationale: El texto ge'ez contiene una valoración moral explícita ('act wickedly / do evil'), por lo que «actuar impíamente» preserva el juicio ético sin hacer una paráfrasis más fuerte que el dato textual.
- source_word: በከመ፡ ገብረ፡ ዔሳው።
  english_pob_choice: as Esau did
  chosen_spanish: como hizo Esaú
  alternatives_spanish:
  - como hizo Esaú
  - como obró Esaú
  lexicon: como hizo Esaú
  rationale: La comparación final es formulada de modo simple en el original; «como hizo Esaú» refleja el paralelismo y evita añadir contenido ajeno.
theological_decisions:
- issue: Evaluación moral del ejemplo de Esaú
  english_pob_reading: and that I will not act wickedly as Esau did
  chosen_spanish_reading: y que no actuaré impíamente como hizo Esaú
  alternative_spanish_readings:
  - y que no haré como hizo Esaú
  - y que no me portaré como Esaú
  rationale: 'El ge''ez no deja la frase en una comparación moralmente neutra: incluye un verbo de hacer mal. Por eso se mantiene una formulación ética explícita en español, sin suavizarla a una simple imitación negativa.'
  doctrine_reference: Ética bíblica / valoración moral del comportamiento patriarcal
translation_notes:
  revision_awareness: Se siguió la revisión textual más reciente del contexto inglés solo en cuanto a la estructura básica de la cláusula, pero se rechazó su atenuación de 'act wickedly' porque el audit trail posterior indica que el ge'ez sí la contiene explícitamente. Por eso el español conserva la evaluación moral.
  spanish_consistency_notes:
  - Se usa «Canaán» con acento gráfico estándar en español.
  - Se mantiene el tono solemne y juramentario del texto.
  - No se emplea «Cristo», «SEÑOR» ni otras terminologías no presentes en este versículo.
  - La fórmula «como hizo Esaú» conserva la brevedad del original y la clausura comparativa final.
