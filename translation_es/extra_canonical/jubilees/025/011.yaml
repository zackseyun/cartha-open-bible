review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del ge''ez: juramento solemne, duración vitalicia, negativa a tomar esposa de la línea cananea y rechazo del comportamiento de Esaú. También acierta al mantener la valoración moral explícita de ወኢያአኪ frente a la revisión inglesa más neutral ya corregida. Sin embargo, «actuaré impíamente» desplaza el sentido hacia irreverencia religiosa, mientras que la evidencia auditada apunta más directamente a «hacer mal / obrar mal / actuar malvadamente».'
  spanish_quality_summary: El texto es claro y digno, pero tiene dos puntos mejorables de naturalidad y precisión. «Tomaré para mí mujer» suena algo rígido; «tomaré mujer» es más idiomático. Más importante, «impíamente» no es la opción más natural ni la más exacta para el matiz ético general del verbo ge'ez; «malvadamente» o «haré mal» comunican mejor el sentido.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La decisión clave es léxica/semántica: para ወኢያአኪ፡ ገቢረ፡ conviene evitar «impíamente» y usar una formulación de maldad ética general. No se requieren notas para preservar alternativas, pues la variación inglesa previa ya queda resuelta en el texto principal.'
  issues:
  - severity: medium
    issue: «actuaré impíamente» no expresa con precisión óptima el valor de ወኢያአኪ
    rationale: «Impíamente» en español sugiere falta de piedad o irreverencia hacia Dios, mientras que la justificación auditada habla de «do evil / act wickedly», una maldad ética más amplia. «Obraré malvadamente» preserva mejor el juicio moral explícito sin estrecharlo teológicamente.
  - severity: low
    issue: «tomaré para mí mujer» suena algo calcado
    rationale: Aunque comprensible, en español bíblico actual «tomaré mujer» es más natural y conserva el sentido matrimonial de ብእሲተ sin pérdida semántica.
  revised_spanish_text: Juro delante de ti todos los días de mi vida que no tomaré mujer de entre las hijas de la descendencia de Canaán, y que no obraré malvadamente como hizo Esaú.
  revision_rationale: Se ajusta el español para mejorar naturalidad idiomática («tomaré mujer») y para reflejar con mayor precisión el valor moral explícito del ge'ez («obraré malvadamente») sin reducirlo a mera irreverencia religiosa ni suavizarlo a una comparación neutra.
