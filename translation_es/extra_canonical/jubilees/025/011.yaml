revisions:
- from: Juro delante de ti todos los días de mi vida que no tomaré para mí mujer de entre las hijas de la descendencia de Canaán, y que no actuaré impíamente como hizo Esaú.
  to: Juro delante de ti todos los días de mi vida que no tomaré mujer de entre las hijas de la descendencia de Canaán, y que no obraré malvadamente como hizo Esaú.
