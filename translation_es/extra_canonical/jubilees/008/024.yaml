base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/024.yaml
  text: And the earth was filled with violence. And after this, they sinned against the beasts and the birds and everything that moves and everything that walks on the earth, and much blood was shed on the earth.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez text: the earth being filled with violence, sinning against beasts, birds, and all moving creatures, and much blood being shed on the earth.'
translation:
  language: es
  text: Y la tierra se llenó de violencia. Y después de esto, pecaron contra las bestias, contra las aves y contra todo lo que se mueve y todo lo que anda sobre la tierra, y se derramó mucha sangre sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐመፃ
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - violencia injusta
  - opresión
  lexicon: —
  rationale: El ge'ez expresa la idea de violencia o injusticia activa; «violencia» reproduce bien la fuerza semántica y la formulación del inglés POB sin añadir interpretación.
- source_word: አበሱ
  english_pob_choice: they sinned
  chosen_spanish: pecaron
  alternatives_spanish:
  - cometieron pecado
  - faltaron
  lexicon: —
  rationale: El verbo apunta a una acción de culpa moral contra criaturas vivas; «pecaron» mantiene el sentido directo y es idiomático en español bíblico contemporáneo.
- source_word: ዘይትሐወስ
  english_pob_choice: everything that moves
  chosen_spanish: todo lo que se mueve
  alternatives_spanish:
  - todo ser que se mueve
  - todo lo que se desplaza
  lexicon: —
  rationale: La expresión abarca criaturas móviles; «todo lo que se mueve» conserva la amplitud del original y la equivalencia del POB inglés.
- source_word: ዘያንሶሱ
  english_pob_choice: everything that walks on the earth
  chosen_spanish: todo lo que anda sobre la tierra
  alternatives_spanish:
  - todo lo que camina sobre la tierra
  - todo ser que anda por la tierra
  lexicon: —
  rationale: La imagen concreta es de seres que andan o se desplazan sobre la tierra; «anda» evita sonar demasiado técnico y sigue el registro bíblico natural.
- source_word: ትክዐወ ደም ብዙኅ
  english_pob_choice: much blood was shed
  chosen_spanish: se derramó mucha sangre
  alternatives_spanish:
  - hubo mucho derramamiento de sangre
  - mucha sangre fue derramada
  lexicon: —
  rationale: El giro pasivo se expresa de forma natural en español con «se derramó»; «sangre» es la equivalencia habitual y clara para el hebreo/etíope de derramamiento violento.
theological_decisions:
- issue: Alcance de la culpa humana contra la creación no humana
  english_pob_reading: they sinned against the beasts and the birds and everything that moves and everything that walks on the earth
  chosen_spanish_reading: pecaron contra las bestias, contra las aves y contra todo lo que se mueve y todo lo que anda sobre la tierra
  alternative_spanish_readings:
  - pecaron contra las bestias y las aves, y contra todo lo que se mueve y anda sobre la tierra
  - pecaron contra los animales y las aves
  rationale: 'Se conserva la extensión del texto: la culpa no se limita a humanos, sino que incluye daño contra la creación animal y terrenal. No se reduce a «animales» porque el original enumera grupos e imágenes concretas.'
  doctrine_reference: Doctrina de la creación / responsabilidad moral humana sobre la creación
- issue: Violencia como condición global de la tierra
  english_pob_reading: And the earth was filled with violence
  chosen_spanish_reading: Y la tierra se llenó de violencia
  alternative_spanish_readings:
  - Y la tierra quedó llena de violencia
  - Y la tierra estaba llena de violencia
  rationale: El aoristo narrativo se vierte con pasado perfecto simple para reflejar un estado completado y total de corrupción en la tierra.
  doctrine_reference: Juicio moral sobre la corrupción generalizada
- issue: Derramamiento de sangre como resultado de la violencia
  english_pob_reading: and much blood was shed on the earth
  chosen_spanish_reading: y se derramó mucha sangre sobre la tierra
  alternative_spanish_readings:
  - y hubo mucho derramamiento de sangre sobre la tierra
  - y mucha sangre fue derramada sobre la tierra
  rationale: La pasiva impersonal española mantiene el énfasis en el hecho consumado sin introducir un agente no expresado por el texto.
  doctrine_reference: Violencia y sangre como signos de juicio y corrupción
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada desde un borrador unrelated sobre una ciudad y el nombre de la esposa de Ne'elatama'uk; la traducción española sigue la lectura revisada y acordada con el ge'ez, centrada en la tierra llena de violencia, el pecado contra animales y aves, y el derramamiento de mucha sangre.
  spanish_consistency_notes:
  - Se mantiene «tierra» de forma consistente para ምድር, como en el inglés POB.
  - Se conserva una estructura repetitiva y paralela para reflejar el ritmo acumulativo del original.
  - No se introduce «SEÑOR», «Cristo» ni otras terminologías ajenas al pasaje.
