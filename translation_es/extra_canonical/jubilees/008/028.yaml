    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated genealogical draft with a translation that reflects the Ge''ez text: ''he blessed the God of gods'' and ''who had put the word of the Lord in his mouth.'''
translation:
  language: es
  text: Y bendijo al Dios de dioses, que había puesto la palabra de Yahvé en su boca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: God of gods
  english_pob_choice: the God of gods
  chosen_spanish: el Dios de dioses
  alternatives_spanish:
  - Dios sobre dioses
  - Dios de los dioses
  lexicon: Dios / dioses
  rationale: Conservo la construcción comparativa del original y del inglés POB. En español, "el Dios de dioses" comunica de forma directa la supremacía divina sin suavizar la frase.
- source_word: word
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - la palabra de Yahvé
  - el mensaje del Señor
  lexicon: palabra / Señor
  rationale: '"Palabra" es la correspondencia más natural para נִבָּא/נְבָר? en el contexto transmitido por el texto ge''ez y el audit trail inglés. Mantengo "Señor" porque el inglés POB fijó esa forma en esta cláusula, aunque el proyecto normalmente prefiere "Yahvé" cuando el referente es el nombre divino.'
- source_word: mouth
  english_pob_choice: in his mouth
  chosen_spanish: en su boca
  alternatives_spanish:
  - en su boca
  - sobre sus labios
  lexicon: boca
  rationale: '"En su boca" reproduce la imagen concreta del original y del inglés POB sin añadir interpretación.'
theological_decisions:
- issue: Título divino superior frente a plural de dioses
  english_pob_reading: God of gods
  chosen_spanish_reading: el Dios de dioses
  alternative_spanish_readings:
  - Dios sobre dioses
  - Dios de los dioses
  rationale: La formulación mantiene la tensión retórica del superlativo semítico sin convertirla en una paráfrasis más explicativa. No se borra el contraste entre el único Dios verdadero y los demás seres divinos o pretendidos dioses.
  doctrine_reference: Monoteísmo bíblico y lenguaje de supremacía divina
- issue: '"Señor" en la frase "word of the Lord"'
  english_pob_reading: the word of the Lord
  chosen_spanish_reading: la palabra del Señor
  alternative_spanish_readings:
  - la palabra de Yahvé
  - la palabra del Señor
  rationale: Aunque el proyecto prefiere "Yahvé" para יהוה, aquí sigo el rastro auditado del inglés POB, que ya fijó "Lord" en esta cláusula. En una frase dependiente de ese audit trail, "Señor" evita introducir una decisión no documentada y conserva la referencia reverencial del texto base.
  doctrine_reference: Tratamiento del nombre divino en traducción asistida por audit trail
translation_notes:
  revision_awareness: 'El pasaje corregido en el audit trail reemplazó un borrador genealógico ajeno al versículo por una traducción basada en el ge''ez: "he blessed the God of gods" y "who had put the word of the Lord in his mouth". La redacción española sigue esa forma final aprobada, sin depender del borrador descartado.'
  spanish_consistency_notes:
  - 'Conservo el paralelismo sintáctico del inglés POB y del ge''ez: bendición + relativo explicativo.'
  - No incorporo nota textual porque el audit trail ya converge con alta confianza y no registra variantes relevantes.
  - Mantengo "Señor" sólo en la cláusula heredada del audit trail inglés; no lo extrapolo fuera de este contexto.
