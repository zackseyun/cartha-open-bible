lexical_decisions:
- source_word: ራፋ
  english_pob_choice: Rafa
  chosen_spanish: Rafa
  alternatives_spanish:
  - Rafa
  lexicon: source-name transliteration
  rationale: Se conserva el nombre propio tal como aparece en el texto ge'ez y en la traducción inglesa auditada.
- source_word: ወይወርድ
  english_pob_choice: And it goes down
  chosen_spanish: Y baja
  alternatives_spanish:
  - Y desciende
  - Y va bajando
  lexicon: verb of downward movement
  rationale: ‘Baja’ reproduce el movimiento descendente de forma natural en español y mantiene el valor direccional sin añadir matices no documentados.
- source_word: መንገበ፡ ጽንፉ
  english_pob_choice: toward the bank
  chosen_spanish: hasta la orilla
  alternatives_spanish:
  - hacia la orilla
  - junto a la ribera
  lexicon: border-edge/riverbank
  rationale: ‘Orilla’ expresa la idea de margen o borde de un río y resulta idiomática en español para el contexto fronterizo.
- source_word: ለመጻእ፡ ጢና፡ ፈለገ።
  english_pob_choice: toward the Tina River
  chosen_spanish: del río Tina
  alternatives_spanish:
  - hacia el río Tina
  - junto al río Tina
  lexicon: proper-name river phrase
  rationale: La revisión inglesa y el ge'ez apuntan al río Tina como referente; en español, ‘del río Tina’ integra naturalmente la frase de destino/orientación con el sustantivo ya identificado.
- source_word: ዛቲ፡ መክፈልት፡ ወፅአት፡ በዕፁ።
  english_pob_choice: This portion came out by lot
  chosen_spanish: Esta porción salió por sorteo
  alternatives_spanish:
  - Esta porción salió por lotes
  - Esta parte salió por sorteo
  lexicon: lot/cast lots
  rationale: ‘Sorteo’ transmite la acción de echar suertes o asignar por sorteo con claridad moderna; ‘porción’ mantiene el sentido de la parte territorial.
theological_decisions:
- issue: Distribución territorial por sorteo
  english_pob_reading: This portion came out by lot.
  chosen_spanish_reading: Esta porción salió por sorteo.
  alternative_spanish_readings:
  - Esta porción fue asignada por suerte
  - Esta parte salió por sorteo
  rationale: El ge'ez describe asignación por sorteo sin elaborar más; ‘salió por sorteo’ conserva la pasiva idiomática de la distribución sin introducir interpretación adicional.
  doctrine_reference: Joshua 18:6; Números 26:55
translation_notes:
  revision_awareness: 'La última revisión eliminó material no sustentado por el ge''ez y fijó dos unidades: la dirección descendente hacia el río Tina y la cláusula final independiente sobre la porción que salió por sorteo. La presente versión respeta esa segmentación y omite cualquier añadido sobre otras fronteras o regiones.'
  spanish_consistency_notes:
  - Se mantiene ‘Rafa’ como nombre propio sin transliteración alternativa.
  - ‘río Tina’ se usa de forma consistente como topónimo ya explícito en el texto auditado.
  - No se añade ningún marcador de nota al pie porque el texto español no requiere variantes obligatorias para esta línea.
