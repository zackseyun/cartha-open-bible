translation:
  language: es
  text: Y aconteció que, al comienzo del trigésimo tercer jubileo, repartieron la tierra en tres porciones para Sem, Cam y Jafet, cada uno según su herencia, en el primer año de la primera semana, mientras uno de nosotros, que había sido enviado, moraba con ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: in the beginning of the thirty-third jubilee
  english_pob_choice: in the beginning of the thirty-third jubilee
  chosen_spanish: al comienzo del trigésimo tercer jubileo
  alternatives_spanish:
  - en el principio del trigésimo tercer jubileo
  - al inicio del trigésimo tercer jubileo
  lexicon: jubileo
  rationale: Conservo la estructura temporal del POB inglés y vierto 'beginning' como 'al comienzo' para un español natural. Mantengo 'jubileo' como término técnico de la obra, sin sustituirlo por una glosa interpretativa.
- source_word: they divided the earth into three portions
  english_pob_choice: they divided the earth into three portions
  chosen_spanish: repartieron la tierra en tres porciones
  alternatives_spanish:
  - dividieron la tierra en tres partes
  - distribuyeron la tierra en tres porciones
  lexicon: dividir/repartir
  rationale: '''Repartieron'' comunica bien la asignación territorial y evita un calco demasiado rígido. ''Porciones'' preserva la idea de distribución concreta sin añadir matices ajenos.'
- source_word: for Shem and Ham and Japheth
  english_pob_choice: for Shem and Ham and Japheth
  chosen_spanish: para Sem, Cam y Jafet
  alternatives_spanish:
  - a Sem, Cam y Jafet
  - para Sem, Jam y Jafet
  lexicon: nombres propios
  rationale: Uso las formas castellanas habituales de los nombres bíblicos (Sem, Cam, Jafet), que son claras para lectura eclesial y fieles a la identificación tradicional.
- source_word: each according to his inheritance
  english_pob_choice: each according to his inheritance
  chosen_spanish: cada uno según su herencia
  alternatives_spanish:
  - cada cual conforme a su heredad
  - cada uno conforme a su posesión
  lexicon: inheritance / herencia
  rationale: '''Herencia'' conserva el sentido patrimonial y asignativo del reparto. ''Heredad'' es posible, pero ''herencia'' resulta más transparente en español moderno.'
- source_word: in the first year in the first week
  english_pob_choice: in the first year in the first week
  chosen_spanish: en el primer año de la primera semana
  alternatives_spanish:
  - en el primer año, en la primera semana
  - durante el primer año de la primera semana
  lexicon: chronological formula
  rationale: Mantengo la fórmula cronológica de manera directa, respetando la secuencia técnica del texto sin explicarla ni suavizarla.
- source_word: one of us who had been sent
  english_pob_choice: one of us who had been sent
  chosen_spanish: uno de nosotros, que había sido enviado
  alternatives_spanish:
  - uno de nosotros, enviado
  - uno de nosotros, que fue enviado
  lexicon: agentive passive
  rationale: Conservo el pasivo perfecto 'había sido enviado' para reflejar con precisión la subordinada explicativa y el estado previo implícito en el inglés del POB.
- source_word: was dwelling with them
  english_pob_choice: was dwelling with them
  chosen_spanish: moraba con ellos
  alternatives_spanish:
  - habitaba con ellos
  - estaba viviendo con ellos
  lexicon: dwelling
  rationale: '''Moraba'' es más solemne y tradicional, y conserva el matiz de residencia continuada. Es suficientemente claro en español bíblico sin volverse arcaizante de más.'
theological_decisions:
- issue: Reparto de la tierra entre los tres hijos de Noé
  english_pob_reading: the earth was divided into three portions for Shem, Ham, and Japheth
  chosen_spanish_reading: la tierra fue repartida en tres porciones para Sem, Cam y Jafet
  alternative_spanish_readings:
  - la tierra se dividió en tres porciones para Sem, Cam y Jafet
  - se asignó la tierra en tres porciones para Sem, Cam y Jafet
  rationale: El español mantiene la acción distributiva sin interpretar si se trata solo de división geográfica o de asignación hereditaria; 'repartida' y 'porciones' preservan esa tensión legal/territorial.
  doctrine_reference: Génesis 10; Jubileos 8:10
- issue: Referencia temporal por 'jubileo' y 'semana'
  english_pob_reading: in the first year in the first week
  chosen_spanish_reading: en el primer año de la primera semana
  alternative_spanish_readings:
  - durante el primer año de la primera semana
  - en el primer año de esa primera semana
  rationale: No se explica ni se armoniza la cronología; se conserva la terminología propia del sistema calendárico de Jubileos, que el POB trata como parte del contenido del texto.
  doctrine_reference: Jubileos 1–2; 8:10
- issue: Identidad del mensajero celeste
  english_pob_reading: one of us who had been sent
  chosen_spanish_reading: uno de nosotros, que había sido enviado
  alternative_spanish_readings:
  - uno de nosotros, enviado
  - uno de los nuestros, que había sido enviado
  rationale: Se mantiene la primera persona plural y la pasiva sin identificar más al mensajero. El texto permite una referencia celestial sin que el español la vuelva más específica de lo que el original y el POB requieren.
  doctrine_reference: Jubileos 8:10; comparación con lenguaje de corte celestial
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; la concordancia de revisión indica acuerdo alto y ningún ajuste adicional. Por eso no introduzco variantes textuales ni notas de aparato, y la redacción española sigue de cerca la lectura estable del POB inglés.
  spanish_consistency_notes:
  - Uso 'Yahvé' no aplica en este versículo.
  - '''Mesías/Cristo'' no aparece en el pasaje.'
  - Mantengo un español bíblico claro y no añado explicación doctrinal fuera de lo que el texto exige.
  - Los nombres propios siguen la forma castellana estándar para mejor legibilidad congregacional.
