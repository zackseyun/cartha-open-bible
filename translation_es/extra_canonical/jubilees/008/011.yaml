  revision_rationale: Se reemplaza 'suertes' por 'lotes' para lograr un español más natural y claro sin perder el sentido distributivo del original y de la POB inglesa. También se ajusta 'repartió' a 'dividió' para alinearse mejor con 'divided', y se ordena la cláusula final para mayor fluidez.
