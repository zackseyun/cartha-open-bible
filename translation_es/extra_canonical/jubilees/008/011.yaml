translation:
  language: es
  text: Y llamó a sus hijos, y ellos se acercaron a él, ellos y sus hijos, y dividió la tierra en los lotes que sus tres hijos poseerían. Y extendieron sus manos y tomaron el escrito del seno de Noé, su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: called his sons
  english_pob_choice: And he called his sons
  chosen_spanish: Y llamó a sus hijos
  alternatives_spanish:
  - Y convocó a sus hijos
  - Y hizo venir a sus hijos
  lexicon: llamar
  rationale: El verbo básico expresa bien la convocatoria familiar del pasaje sin añadir matices ceremoniales que el texto no exige.
- source_word: came near to him
  english_pob_choice: they came near to him
  chosen_spanish: ellos se acercaron a él
  alternatives_spanish:
  - se llegaron a él
  - vinieron cerca de él
  lexicon: acercarse
  rationale: ‘Acercarse’ reproduce de forma natural la proximidad física y narrativa del original.
- source_word: their children
  english_pob_choice: they and their children
  chosen_spanish: ellos y sus hijos
  alternatives_spanish:
  - ellos y sus descendientes
  - ellos junto con sus hijos
  lexicon: hijos / hijos
  rationale: ‘Hijos’ mantiene la referencia inmediata y literal de la escena; ‘descendientes’ sería más interpretativo.
- source_word: divided the earth into the lots
  english_pob_choice: he divided the earth into the lots
  chosen_spanish: repartió la tierra en las suertes
  alternatives_spanish:
  - dividió la tierra en lotes
  - asignó la tierra por suertes
  lexicon: suerte
  rationale: ‘Suertes’ conserva el lenguaje técnico de reparto por porción/lotación hereditaria que la POB inglesa refleja con ‘lots’.
- source_word: would possess
  english_pob_choice: that his three sons would possess
  chosen_spanish: que poseerían sus tres hijos
  alternatives_spanish:
  - que sus tres hijos poseerían
  - que serían posesión de sus tres hijos
  lexicon: poseer
  rationale: ‘Poseerían’ conserva el sentido de tenencia futura sin sobrecargarlo con formulaciones ajenas al texto.
- source_word: bosom
  english_pob_choice: the bosom of Noah their father
  chosen_spanish: el seno de Noé, su padre
  alternatives_spanish:
  - el regazo de Noé, su padre
  - el pecho de Noé, su padre
  lexicon: seno
  rationale: ‘Seno’ conserva el valor bíblico de lugar cercano al cuerpo donde se guarda algo, evitando ‘regazo’ si suena demasiado doméstico o infantil.
- source_word: writing
  english_pob_choice: the writing
  chosen_spanish: el escrito
  alternatives_spanish:
  - la escritura
  - el documento
  lexicon: escrito
  rationale: ‘Escrito’ es suficientemente literal y neutro para el objeto que toman; ‘documento’ moderniza demasiado y ‘escritura’ puede sonar más abstracto.
theological_decisions:
- issue: Divine/authorized allocation of the earth by lots
  english_pob_reading: he divided the earth into the lots that his three sons would possess
  chosen_spanish_reading: repartió la tierra en las suertes que poseerían sus tres hijos
  alternative_spanish_readings:
  - repartió la tierra en las suertes que heredarían sus tres hijos
  - repartió la tierra en las porciones que poseerían sus tres hijos
  rationale: El pasaje habla de una distribución predeterminada por lotes; ‘suertes’ preserva ese carácter asignativo sin convertirlo en una simple división geográfica.
  doctrine_reference: Distribución providencial de la tierra en la narrativa de Jubileos; no implica una doctrina sistemática adicional en este verso.
translation_notes:
  revision_awareness: La redacción inglesa auditada tuvo una revisión menor de estilo ('which' > 'that') sin cambio de sentido; la versión española conserva ese sentido estable y no necesita marcar variación textual.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - ‘Suertes’ se usa en sentido de repartición por lotes, coherente con el registro bíblico del pasaje.
  - ‘Escrito’ y no ‘escritura’ evita ambigüedad con el acto de escribir o con la Escritura canónica.
