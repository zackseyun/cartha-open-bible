base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/020.yaml
  text: These are the sons of Noah. And in the twenty-eighth jubilee and the seventh week, Noah began to command the ordinances and the commandments to the children of his sons, and all that he knew of justice; and he testified to his sons that they should do righteousness and cover the shame of their flesh, and bless their Creator, and honor father and mother, and love each his brother, and guard their souls from fornication,
  footnotes:
  - marker: a
    text: Or "But Noah's sons, in the twenty-eighth jubilee, while Noah was commanding the ordinances and the commandments for the children of his sons, and all that he knew of justice, and was testifying to his sons".
    reason: previous_rendering
  - marker: b
    text: Or 'in the twenty-eighth jubilee,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: Noah instructing his descendants in the twenty-eighth jubilee to practice righteousness, cover their nakedness, bless their Creator, honor father and mother, love one another, and guard themselves from fornication.'
translation:
  language: es
  text: Estos son los hijos de Noé. Y en el vigésimo octavo jubileo y la séptima semana, Noé comenzó a prescribir los estatutos y los mandamientos a los hijos de sus hijos, y todo lo que sabía acerca de la justicia; y les dio testimonio de que practicaran la justicia y cubrieran la vergüenza de su carne, y bendijeran a su Creador, y honraran a padre y madre, y amaran cada uno a su hermano, y guardaran sus almas de la fornicación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አሎ፡ ... ውሉደ፡ ኖኅ፡
  english_pob_choice: These are the sons of Noah.
  chosen_spanish: Estos son los hijos de Noé.
  alternatives_spanish:
  - Estos son los descendientes de Noé.
  lexicon: Ge'ez አሎ = 'these are'; ውሉደ = 'sons/children of'
  rationale: El sujeto demostrativo pide una apertura nominativa clara en español. 'Hijos' reproduce mejor el paralelismo con 'hijos de sus hijos' y conserva la referencia genealógica sin añadir matices no presentes.
- source_word: ፳፰ ወስብዓቲቱ ... አዩቤልውሳት
  english_pob_choice: in the twenty-eighth jubilee and the seventh week
  chosen_spanish: en el vigésimo octavo jubileo y la séptima semana
  alternatives_spanish:
  - en el jubileo vigésimo octavo y la séptima semana
  lexicon: ወስብዓቲቱ = 'and the seventh'; አዩቤልውሳት = 'jubilees'
  rationale: Se conserva la coordinación explícita entre jubileo y semana, porque el texto fuente la incluye y la revisión señaló su omisión como pérdida de sentido.
- source_word: የአዝዝ
  english_pob_choice: began to command
  chosen_spanish: comenzó a ordenar
  alternatives_spanish:
  - comenzó a mandar
  - empezó a prescribir
  lexicon: amharic/Ge'ez-like verbal form with inceptive force
  rationale: La revisión textual entiende aquí un verbo incoativo ('comenzó a'), no un simple circunstancial. 'Ordenar' mantiene la fuerza normativa de 'command the ordinances and the commandments' sin exigir un español demasiado arcaico.
- source_word: ሥርዐተ፡ ወትእዛዘ፡
  english_pob_choice: the ordinances and the commandments
  chosen_spanish: los estatutos y los mandamientos
  alternatives_spanish:
  - las ordenanzas y los mandamientos
  - los decretos y los mandamientos
  lexicon: 'ἢ corresponding legal-religious terms: statutes/commandments'
  rationale: '''Estatutos'' refleja bien el valor normativo-jurídico de ''ordinances'' en un registro bíblico comprensible. ''Mandamientos'' mantiene el paralelo directo con el inglés POB.'
- source_word: ጽድቀ
  english_pob_choice: justice / righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia y rectitud
  lexicon: צדק / δικαιοσύνη semantic field
  rationale: Aquí el contexto combina conocimiento y testimonio moral; 'justicia' cubre el campo semántico y permite luego conservar 'hicieran justicia'. No se fuerza 'rectitud' porque el texto no exige separar éticamente dos términos distintos.
- source_word: ኃፍረተ፡ ሥጋሆሙ
  english_pob_choice: the shame of their flesh
  chosen_spanish: la vergüenza de su carne
  alternatives_spanish:
  - la desnudez de su carne
  - la vergüenza de su cuerpo
  lexicon: flesh/body shame idiom
  rationale: Se mantiene la tensión literal del giro 'shame of their flesh' con 'vergüenza de su carne', sin suavizarlo a una paráfrasis moralizante. En español suena duro, pero el texto laico-religioso lo justifica.
- source_word: ወያፍቅሩ፡ አበ፡ ወእመ፡
  english_pob_choice: honor father and mother
  chosen_spanish: honraran a padre y madre
  alternatives_spanish:
  - honraran al padre y a la madre
  - honraran a su padre y a su madre
  lexicon: honor parents
  rationale: La formulación breve preserva el paralelismo bíblico. Se evita introducir posesivos que no están en el original, aunque 'a su padre y a su madre' sería una clarificación posible.
theological_decisions:
- issue: The act of 'covering the shame of their flesh' as moral modesty versus literal veiling
  english_pob_reading: cover the shame of their flesh
  chosen_spanish_reading: cubrieran la vergüenza de su carne
  alternative_spanish_readings:
  - cubrieran su desnudez
  - velaran la vergüenza de su carne
  rationale: La lectura POB conserva la expresión corporal-moral sin resolverla en una sola interpretación. En español se mantiene la misma tensión, porque el contexto incluye modestia sexual y no solo vestimenta.
  doctrine_reference: Génesis 9:22–23; ética de modestia en Jubileos
- issue: '''Guard their souls from fornication'' as sexual purity and self-preservation'
  english_pob_reading: guard their souls from fornication
  chosen_spanish_reading: guardaran sus almas de la fornicación
  alternative_spanish_readings:
  - se guardaran de la fornicación
  - preservaran sus vidas de la fornicación
  rationale: '''Almas'' reproduce el objeto interno del mandato en el texto fuente y el énfasis de custodia espiritual. ''Fornicación'' conserva el léxico moral tradicional del pasaje sin reemplazarlo por una paraphrase moderna.'
  doctrine_reference: ética sexual bíblica; sabiduría moral de Jubileos
- issue: '''Bless their Creator'' and the divine referent'
  english_pob_reading: bless their Creator
  chosen_spanish_reading: bendijeran a su Creador
  alternative_spanish_readings:
  - bendijeran al que los creó
  - bendijeran a su Hacedor
  rationale: El texto fuente habla de 'su Creador' y no necesita una sustitución por 'Hacedor'. 'Bendecir' mantiene el paralelismo cultual y relacional.
  doctrine_reference: Dios como Creador; lenguaje doxológico
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un borrador irrelevante y estableció la lectura base adecuada: ''These are the sons of Noah... in the twenty-eighth jubilee and the seventh week... Noah began to command...''. También señaló una omisión previa de ''and the seventh week''; por eso la traducción la incluye explícitamente. No se incorporan las notas inglesas a pie de página porque no añaden una variante necesaria al texto español y podrían introducir marcadores sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene 'jubileo' y 'semana' como unidades cronológicas técnicas del libro de Jubileos.
  - Se usa 'carne' para mantener el campo semántico bíblico del pasaje, no 'cuerpo', salvo en una alternativa no adoptada.
  - Se conserva el paralelismo verbal con infinitivos/mandatos encadenados en una sola oración, como en el original.
  - No se usa 'SEÑOR' ni otros reemplazos porque este versículo no contiene el nombre divino en la forma fuente dada.
