base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/021.yaml
  text: 'and the Lord forever. And he knew that a blessed portion and a blessing had come to Shem and to his sons for the generations of eternity: all the land of Edom, and all the land of the Red Sea, and all the land of the east and India, and on the Red Sea and its mountains, and all the land of Bashan, and all the land of Lebanon and the islands of Caphtor, and all the mountains of Senir and Amana, and the mountains of Asshur in the south, and all the land of Elam, Asshur, and Babylon, and Susa and Media, and all the mountains of Ararat, and all the region beyond the sea, beyond the mountains of Asshur toward the north.'
  footnotes:
  - marker: a
    text: Or 'a blessed and broad portion'.
    reason: previous_rendering
  - marker: b
    text: Or 'And he knew'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:53Z'
    unchanged: false
    changes_summary: Removed material not represented in this source segment, restored the territorial list assigned to Shem, and rendered key place names and phrases more completely and naturally in formal English.
translation:
  language: es
  text: 'y Yahvé para siempre. Y supo que una porción bendita y una bendición había llegado a Sem y a sus hijos por las generaciones de la eternidad: toda la tierra de Edom, y toda la tierra del Mar Rojo, y toda la tierra del oriente y la India, y junto al Mar Rojo y sus montes, y toda la tierra de Basán, y toda la tierra del Líbano y las islas de Caftor, y todos los montes de Senir y de Amana, y los montes de Asur al sur, y toda la tierra de Elam, Asur, y Babilonia, y Susa y Media, y todos los montes de Ararat, y toda la región más allá del mar, más allá de los montes de Asur hacia el norte.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእግዚአብሔር
  english_pob_choice: and the Lord forever
  chosen_spanish: y Yahvé para siempre
  alternatives_spanish:
  - y el Señor para siempre
  - y Yahvé eternamente
  lexicon: YHWH
  rationale: El contexto inmediato conserva la referencia divina sin máscara; en el estándar del proyecto, YHWH se vierte como «Yahvé». Se mantiene «para siempre» para reflejar ለዓለም / forever, con la posibilidad de «eternamente» como alternativa estilística.
- source_word: መክፈልተ፡ በረከት፡ ወቡራኬ፡
  english_pob_choice: a blessed portion and a blessing
  chosen_spanish: una porción bendita y una bendición
  alternatives_spanish:
  - una porción bendita y una bendición
  - una porción de bendición y bendición
  lexicon: מֶחְלֶקֶת / ברכה
  rationale: La revisión confirmó que no hay idea de «broad»; el sentido es una porción bendita y además una bendición. «Porción bendita» conserva el sustantivo concreto y el valor adjetival sin sobreexplicar.
- source_word: ከመ፡ በጽሐ፡
  english_pob_choice: he knew that ... had come
  chosen_spanish: supo que ... había llegado
  alternatives_spanish:
  - conoció que ... había llegado
  - reconoció que ... había llegado
  lexicon: ידע
  rationale: «Supo» expresa bien el conocimiento adquirido sin sonar arcaico; «había llegado» refleja la idea de haber venido/alcanzado, que el inglés auditado ya entiende como llegada de esa porción.
- source_word: ለትውልድ፡ ዘለዓለም፡
  english_pob_choice: for the generations of eternity
  chosen_spanish: por las generaciones de la eternidad
  alternatives_spanish:
  - por las generaciones de la eternidad
  - por generaciones eternas
  lexicon: לְדֹרֹת עוֹלָם
  rationale: Se conserva la estructura semítica del original y la formulación auditada en inglés. «De la eternidad» evita simplificar a «eternas», que perdería el sustantivo abstracto presente en el texto.
- source_word: toponyms_list
  english_pob_choice: Edom, Red Sea, east and India, ... Ararat, beyond the sea, beyond the mountains of Asshur toward the north
  chosen_spanish: Edom, Mar Rojo, el oriente y la India, ... Ararat, más allá del mar, más allá de los montes de Asur hacia el norte
  alternatives_spanish:
  - Edom, Mar Rojo, el oriente y la India, ... Ararat, más allá del mar, más allá de los montes de Asur hacia el norte
  - Edom, el Mar Rojo, el oriente y la India, ... Ararat, más allá del mar, más allá de los montes de Asur hacia el norte
  lexicon: toponymy
  rationale: Se respeta la lista territorial extensa y su orden, con nombres propios transliterados o naturalizados según uso español inteligible. «Mar Rojo» evita redundancia preposicional excesiva y mantiene la referencia geográfica estable.
theological_decisions:
- issue: Referencia divina final del segmento
  english_pob_reading: and the Lord forever
  chosen_spanish_reading: y Yahvé para siempre
  alternative_spanish_readings:
  - y el Señor para siempre
  - y Yahvé eternamente
  rationale: El proyecto requiere nombrar el tetragrámaton como «Yahvé» en el texto principal. Dado el testigo ge'ez y la tradición textual de Jubileos, no se sustituye por «SEÑOR».
  doctrine_reference: Convención POB para YHWH / fidelidad al nombre divino
- issue: Caracterización de la porción heredada por Sem
  english_pob_reading: a blessed portion and a blessing
  chosen_spanish_reading: una porción bendita y una bendición
  alternative_spanish_readings:
  - una porción de bendición y una bendición
  - una porción bendita y una bendición
  rationale: La revisión textual descarta «broad» y confirma doble expresión de bendición. Se preserva la duplicación sin armonizarla en una sola idea, para no borrar la intensidad del hebraísmo.
  doctrine_reference: Preservación de paralelismo semítico y duplicación enfática
translation_notes:
  revision_awareness: Se incorporó la revisión que corrige «broad» a «blessed» y se tradujo el tramo inicial conservado en el bloque de texto aunque pertenezca de hecho al cierre de la unidad anterior, porque el paquete fuente lo incluye explícitamente. También se mantuvo íntegra la larga lista territorial asignada a Sem.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «porción bendita y una bendición» para reflejar la corrección de la revisión y evitar la falsa lectura de «ancha».
  - Los topónimos se mantienen en una forma reconocible en español sin normalizarlos a categorías geográficas genéricas.
  - No se añadieron notas al pie porque no había alternativas que requirieran anclaje explícito en el texto español.
