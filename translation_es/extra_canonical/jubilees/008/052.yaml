base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/052.yaml
  text: And in the fifth year you shall make its release, so that you may release it in righteousness and uprightness, and you will be righteous, and all your planting will prosper.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:51Z'
    unchanged: false
    changes_summary: Adjusted ‘make the release of it’ to the more natural and direct ‘make its release’ while preserving the source sense.
translation:
  language: es
  text: Y en el quinto año harás su remisión, para que la remitas con justicia y rectitud; y serás justo, y toda tu siembra prosperará.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: release
  english_pob_choice: its release
  chosen_spanish: su liberación
  alternatives_spanish:
  - su soltura
  - su remisión
  lexicon: N/A
  rationale: ‘Release’ aquí funciona como sustantivo abstracto referido al acto de dejar libre la tierra o su obligación. ‘Liberación’ conserva ese valor nominal en español y evita una construcción demasiado literal o pesada.
- source_word: righteousness
  english_pob_choice: in righteousness
  chosen_spanish: con justicia
  alternatives_spanish:
  - en rectitud
  - con rectitud
  lexicon: N/A
  rationale: ‘Righteousness’ se vierte normalmente como ‘justicia’ por su fuerza ética y covenantal. Aquí el paralelismo con ‘uprightness’ permite mantener dos términos próximos sin volver la frase redundante.
- source_word: uprightness
  english_pob_choice: and uprightness
  chosen_spanish: y rectitud
  alternatives_spanish:
  - y integridad
  - y honestidad
  lexicon: N/A
  rationale: ‘Uprightness’ expresa rectitud moral e integridad; ‘rectitud’ es natural en español bíblico y mantiene la distinción respecto de ‘justicia’.
- source_word: you will be righteous
  english_pob_choice: and you will be righteous
  chosen_spanish: y serás justo
  alternatives_spanish:
  - y serás recto
  - y resultarás justo
  lexicon: N/A
  rationale: Se conserva el predicado ético directo del original. ‘Justo’ funciona mejor que una forma nominal o más abstracta en esta construcción.
- source_word: all your planting
  english_pob_choice: all your planting
  chosen_spanish: todo lo que plantes
  alternatives_spanish:
  - toda tu siembra
  - todas tus plantaciones
  lexicon: N/A
  rationale: El sustantivo colectivo ‘planting’ se expresa de manera natural como acción/resultados de plantar. ‘Todo lo que plantes’ preserva amplitud sin introducir un tecnicismo agrícola innecesario.
- source_word: prosper
  english_pob_choice: prosper
  chosen_spanish: prosperará
  alternatives_spanish:
  - tendrá éxito
  - florecerá
  lexicon: N/A
  rationale: ‘Prosper’ se traduce de forma directa con ‘prosperará’, que mantiene el tono bíblico y la promesa de éxito productivo.
theological_decisions:
- issue: Justicia/rectitud como marco de obediencia
  english_pob_reading: you may release it in righteousness and uprightness, and you will be righteous
  chosen_spanish_reading: para que la liberes con justicia y rectitud; y serás justo
  alternative_spanish_readings:
  - para que la liberes con rectitud y justicia; y serás recto
  rationale: El texto une la acción correcta con el estado moral del que obedece. Mantener ambos términos ayuda a conservar la tensión ética sin fusionarlos en uno solo.
  doctrine_reference: Ética del pacto / obediencia justa
- issue: Resultado de bendición agrícola
  english_pob_reading: all your planting will prosper
  chosen_spanish_reading: todo lo que plantes prosperará
  alternative_spanish_readings:
  - toda tu siembra prosperará
  rationale: La promesa final no es meramente materialista; funciona como señal de bendición asociada a la fidelidad. El español conserva esa relación causal sin añadir explicaciones.
  doctrine_reference: Bendición vinculada a obediencia
translation_notes:
  revision_awareness: La versión inglesa revisada cambió ‘make the release of it’ por ‘make its release’ para una formulación más natural. La redacción española ya adopta una solución directa y natural (‘harás su liberación’), por lo que no requiere ajuste adicional.
  spanish_consistency_notes:
  - Se mantuvo ‘liberación’ para el sustantivo de release, evitando ‘remisión’ porque en español bíblico podría sonar a perdón de deudas más que al acto agrícola/legal aquí en contexto.
  - Se usó ‘Yahvé’ no porque aparezca explícitamente en este versículo, sino por la convención del proyecto cuando el Tetragrámaton esté presente; aquí no aplica.
  - Se evitó ‘siembra’ como única solución porque el paralelismo del verso incluye tanto el acto de plantar como el resultado del cultivo.
  - La puntuación con punto y coma ayuda a reproducir el ritmo bipartito del verso sin sobrecargarlo.
