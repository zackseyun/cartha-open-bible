base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/019.yaml
  text: '"...the LORD in the dwelling of Shem." And he knew and he knew that the Garden of Eden is the holy of holies and the dwelling of the LORD, and Mount Sinai is in the midst of the wilderness, and Mount Zion is in the midst of the navel of the earth; these three were created as holy places facing one another.'
  footnotes:
  - marker: a
    text: Or 'The LORD dwelt in the dwelling of Shem,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: 'Replaced the draft, which reflected a different verse, with a translation matching the Ge''ez text: the LORD dwelling in Shem''s dwelling, recognition of Eden as the holy of holies and the LORD''s dwelling, Sinai in the midst of the wilderness, Zion in the midst of the earth, and the concluding statement about these three holy places.'
translation:
  language: es
  text: '"...Yahvé en la morada de Sem.[a]" Y supo que el jardín de Edén es el santo de los santos y la morada de Yahvé, y el monte Sinaí está en medio del desierto, y el monte Sion está en medio del ombligo de la tierra; estos tres fueron creados como lugares santos, unos frente a otros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Yahvé moró en la morada de Sem".'
    reason: Preserva la alternativa de la traducción previa documentada en la nota del POB inglés, a la vez que el texto principal mantiene correctamente el fragmento que continúa la bendición del versículo anterior.
lexical_decisions:
- source_word: እግዚአብሔር / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: YHWH
  rationale: La pauta del proyecto pide usar "Yahvé" para el nombre divino, y aquí el contexto del dicho previo sobre la morada de Sem mantiene esa referencia. Evito el disfraz con "SEÑOR" para conservar la transparencia fuente-textual.
- source_word: ውስተ፡ መሓድሪሁ፡ ለሴም።
  english_pob_choice: in the dwelling of Shem
  chosen_spanish: en la morada de Sem
  alternatives_spanish:
  - en la habitación de Sem
  - en la casa de Sem
  lexicon: locative + noun of dwelling
  rationale: '"Morada" reproduce bien el sentido de residencia/dwelling sin perder solemnidad. "Casa" sería más idiomática pero menos precisa; "habitación" suena demasiado restringida.'
- source_word: ገነት፡ ኤዶም፡
  english_pob_choice: the Garden of Eden
  chosen_spanish: el jardín de Edén
  alternatives_spanish:
  - el huerto de Edén
  - el paraíso de Edén
  lexicon: גן עדן
  rationale: '"Jardín" sigue la elección del POB en inglés y es inteligible en español; "huerto" es posible, pero puede sonar menos natural en este contexto enumerativo. "Paraíso" introduciría una identificación interpretativa no explícita en el ge''ez.'
- source_word: ቅድስተ፡ ቅዱሳን፡
  english_pob_choice: the holy of holies
  chosen_spanish: el santo de los santos
  alternatives_spanish:
  - el lugar santísimo
  - el santísimo
  lexicon: קדשׁ הקדשים
  rationale: Aunque "lugar santísimo" es muy común, "santo de los santos" refleja de manera más literal la construcción semítica y mantiene la correspondencia con la formulación auditable del original.
- source_word: ማኅደሩ፡ ለእግዚአብሔር፡
  english_pob_choice: the dwelling of the LORD
  chosen_spanish: la morada de Yahvé
  alternatives_spanish:
  - la morada del Señor
  - la residencia de Yahvé
  lexicon: dwelling / abode
  rationale: '"Morada" conserva la idea de habitación sagrada y encaja con la primera cláusula. Mantengo el nombre divino de forma consistente con la política del proyecto.'
- source_word: ወደብረ፡ ሲና፡ ማእከለ፡ ገዳም፡
  english_pob_choice: Mount Sinai is in the midst of the wilderness
  chosen_spanish: el monte Sinaí está en medio del desierto
  alternatives_spanish:
  - el monte Sinaí está en medio de la soledad
  - el monte Sinaí está en medio del yermo
  lexicon: midst of the wilderness
  rationale: '"Desierto" es la equivalencia española más clara y natural para este uso geográfico; "yermo" o "soledad" son más literarios, pero menos transparentes para el lector general.'
- source_word: ወደብረ፡ ጽዮን፡ ማእከለ፡ ሕንብርት፡
  english_pob_choice: Mount Zion is in the midst of the navel of the earth
  chosen_spanish: el monte Sion está en medio del ombligo de la tierra
  alternatives_spanish:
  - el monte Sion está en el centro de la tierra
  - el monte Sion está en el ombligo de la tierra
  lexicon: navel of the earth
  rationale: Conservo "ombligo de la tierra" porque el auditorio POB valora la literalidad auditable y la imagen geográfica-teológica del texto. "Centro" suavizaría la metáfora y perdería parte de la tensión original.
- source_word: ሠለስቲሆሙ ዝንቱ መንጸረ ዝንቱ
  english_pob_choice: these three were created as holy places facing one another
  chosen_spanish: estos tres fueron creados como lugares santos que se enfrentan entre sí
  alternatives_spanish:
  - estos tres fueron creados como lugares santos opuestos uno al otro
  - estos tres fueron creados como lugares santos frente a frente
  lexicon: facing one another
  rationale: '"Que se enfrentan entre sí" expresa la relación recíproca de orientación/vis-à-vis sin añadir una imagen arquitectónica demasiado específica. "Frente a frente" también sería viable, pero aquí preferí una formulación algo más formal.'
theological_decisions:
- issue: La frase abreviada sobre Yahvé en la morada de Sem procede como fragmento que completa la bendición del versículo anterior, y el inglés POB advirtió la alternativa "The LORD dwelt..." que fue descartada.
  english_pob_reading: '"...the LORD in the dwelling of Shem." And he knew'
  chosen_spanish_reading: '"...Yahvé en la morada de Sem." Y supo'
  alternative_spanish_readings:
  - '"Yahvé moró en la morada de Sem."'
  - '"...el Señor en la morada de Sem."'
  rationale: Evito un pretérito declarativo que convertiría el fragmento en una afirmación pasada independiente. La redacción española mantiene la continuidad con la bendición optativa del contexto y respeta el carácter fragmentario señalado en el audit trail.
  doctrine_reference: Jubilees 8:18-19; audit note on optative continuation
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una lectura que hacía depender el pasaje de una bendición profética sobre Sem. La revisión estableció que 8:19 inicia con un fragmento nominal/continuativo sobre Yahvé en la morada de Sem, seguido por la afirmación de que Edén es el santo de los santos y la morada de Yahvé, Sinaí está en el desierto, Sion en el ombligo de la tierra, y que los tres fueron creados como lugares santos en relación recíproca. La traducción española sigue esa revisión y evita convertir el fragmento inicial en una oración verbal independiente.
  spanish_consistency_notes:
  - Uso coherente de Yahvé para el nombre divino en toda la cláusula.
  - '"Morada" se repite de modo consistente para dwelling/abode.'
  - '"Monte" se conserva para Sinai y Zion conforme al registro bíblico usual en español.'
  - '"Santo de los santos" mantiene una fórmula transparente y literal para la construcción semítica.'
  - No se añadieron notas al pie porque el texto final no requiere variantes ancladas para ser publicable y no debe haber marcadores sin anclaje.
