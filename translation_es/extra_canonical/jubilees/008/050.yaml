translation:
  language: es
  text: 'Durante tres años no se recogerá el fruto de todo lo que se come; pero en el cuarto año su fruto será santo: las primicias aceptables delante de Yahvé Altísimo, que creó el cielo y la tierra y todo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: for three years
  english_pob_choice: For three years
  chosen_spanish: Por tres años
  alternatives_spanish:
  - Durante tres años
  - Tres años
  lexicon: chronological duration
  rationale: Expresa duración continua de manera natural en español sin alterar el sentido legal de la norma.
- source_word: the fruit of anything that is eaten
  english_pob_choice: the fruit of anything that is eaten
  chosen_spanish: el fruto de todo lo que se come
  alternatives_spanish:
  - el fruto de cualquier cosa que se come
  - el fruto de todo lo comestible
  lexicon: fruit / edible produce
  rationale: Conserva el alcance amplio de la formulación inglesa y evita ambigüedad sobre el antecedente, siguiendo la revisión aplicada al texto inglés.
- source_word: shall not be gathered
  english_pob_choice: shall not be gathered
  chosen_spanish: no se recogerá
  alternatives_spanish:
  - no se cosechará
  - no será recogido
  lexicon: collect / gather produce
  rationale: ‘Recoger’ es el verbo más natural en español para cosechar o reunir fruto en un contexto agrícola, manteniendo el valor pasivo de la prohibición.
- source_word: its fruit shall be holy
  english_pob_choice: its fruit shall be holy
  chosen_spanish: su fruto será santo
  alternatives_spanish:
  - su fruto será consagrado
  - su fruto será sagrado
  lexicon: holy / set apart
  rationale: ‘Santo’ preserva la idea de estar apartado para Dios y mantiene continuidad terminológica bíblica en español.
- source_word: the firstfruits acceptable before the Most High LORD
  english_pob_choice: the firstfruits acceptable before the Most High LORD
  chosen_spanish: las primicias aceptables delante del Altísimo Yahvé
  alternatives_spanish:
  - las primicias aceptables ante el Altísimo Yahvé
  - las primicias agradables delante del Altísimo Yahvé
  lexicon: firstfruits / acceptable / Most High LORD
  rationale: ‘Primicias’ es el equivalente bíblico estable; ‘aceptables’ conserva la evaluación de aprobación, y ‘Altísimo Yahvé’ refleja el nombre divino del original en lugar de la sustitución reverencial.
- source_word: who created heaven and earth and everything
  english_pob_choice: who created heaven and earth and everything
  chosen_spanish: que creó el cielo y la tierra y todo
  alternatives_spanish:
  - que hizo el cielo y la tierra y todo
  - que creó los cielos y la tierra y todo
  lexicon: create / heaven and earth / everything
  rationale: ‘Creó’ sigue el acto creador; ‘el cielo y la tierra’ reproduce la fórmula directa del texto, y ‘todo’ conserva la amplitud absoluta del cierre.
theological_decisions:
- issue: Rendering of the divine name in a legal/ritual instruction
  english_pob_reading: Most High LORD
  chosen_spanish_reading: Altísimo Yahvé
  alternative_spanish_readings:
  - Altísimo Señor
  - Altísimo Dios
  rationale: Se conserva Yahvé según el criterio del proyecto para יהוה, y ‘Altísimo’ mantiene el epíteto divino del pasaje sin recurrir al masking de ‘SEÑOR’.
  doctrine_reference: Name of God / Tetragrammaton rendering policy
- issue: Meaning of ‘holy’ applied to the fruit
  english_pob_reading: its fruit shall be holy
  chosen_spanish_reading: su fruto será santo
  alternative_spanish_readings:
  - su fruto será consagrado
  - su fruto quedará apartado
  rationale: '‘Santo’ preserva la fuerza cultual del texto: el fruto queda dedicado a Dios, no simplemente ‘limpio’ o ‘permitido’.'
  doctrine_reference: Holiness / consecration in cultic law
- issue: Scope of the prohibition over produce
  english_pob_reading: the fruit of anything that is eaten shall not be gathered
  chosen_spanish_reading: el fruto de todo lo que se come no se recogerá
  alternative_spanish_readings:
  - no se recogerá el fruto de toda planta comestible
  - el fruto de toda cosa comestible no se recogerá
  rationale: La redacción evita ambigüedad y sigue la revisión inglesa que aclara que la prohibición abarca el fruto de todo lo que es comestible.
  doctrine_reference: Agrarian law / firstfruits regulation
translation_notes:
  revision_awareness: The English audit trail shows one Tier-1 revision correcting an awkward and ambiguous phrase to clarify that the prohibition applies to the fruit of anything edible. The Spanish draft follows that clarified sense directly and does not retain the earlier ambiguity. No additional textual or theological revisions were introduced beyond source-grounded lexical choices.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino de acuerdo con la terminología por defecto del proyecto.
  - Se mantiene ‘primicias’ como término técnico bíblico.
  - Se conserva la secuencia temporal y legal del enunciado sin añadir explicación interpretativa.
  - No se incluyeron notas al pie porque no hay una ambigüedad residual que requiera marcación en el texto español.
