translation:
  language: es
  text: Y no seas como uno que come con la sangre, sino ten cuidado de que no coman sangre delante de ti. Cubre la sangre[a], porque así se me ha mandado dar testimonio ante ti y tus hijos, junto con toda carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Derrama la sangre».'
    reason: previous_rendering
lexical_decisions:
- source_word: blood
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - la sangre
  lexicon: Heb./Ge'ez background reflects the biblical prohibition associated with blood as life-bearing substance; Spanish uses the straightforward lexical equivalent.
  rationale: «Sangre» es el equivalente natural y fiel en español; mantiene el término técnico-bíblico sin suavizarlo ni sustituirlo por una perífrasis.
- source_word: cover
  english_pob_choice: Cover the blood
  chosen_spanish: Cubre la sangre
  alternatives_spanish:
  - Cubre la sangre con tierra
  - Entierra la sangre
  - Vierte la sangre
  lexicon: The English audit trail revised away from 'pour out' to 'cover', aligning with the underlying command to conceal blood rather than to describe earlier disposal.
  rationale: La revisión auditada exige «cubrir» y no «derramar» o «verter». En español, «Cubre la sangre» conserva la fuerza imperativa y la corrección textual.
- source_word: all flesh
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda criatura
  - toda la humanidad
  lexicon: Biblical phrase with broad creaturely scope, not restricted to humans.
  rationale: «Toda carne» reproduce la fórmula bíblica y preserva su amplitud referencial. Aunque suene semitica, es comprensible y más fiel que restringirla a «toda la humanidad».
theological_decisions:
- issue: Command to testify to descendants and all flesh
  english_pob_reading: for thus I have been commanded to testify to you and to your children together with all flesh
  chosen_spanish_reading: porque así se me ha mandado testificarles a ti y a tus hijos, junto con toda carne
  alternative_spanish_readings:
  - porque así se me ha mandado dar testimonio a ti y a tus hijos, junto con toda carne
  - porque así he sido mandado a testificar contra ti y contra tus hijos, junto con toda carne
  rationale: Mantengo «testificarles» como verbo de testimonio solemne, siguiendo el valor del inglés POB. No añado «contra» porque el pasaje no lo exige explícitamente en el texto auditado; «a ti y a tus hijos» conserva el destinatario directo.
  doctrine_reference: Testimonio profético y transmisión generacional de la instrucción divina
- issue: Eating with the blood as prohibited conduct
  english_pob_reading: And do not be like one who eats with the blood
  chosen_spanish_reading: Y no seas como uno que come con la sangre
  alternative_spanish_readings:
  - Y no seas como el que come sangre
  - Y no imites al que come con la sangre
  rationale: «Come con la sangre» conserva la redacción del POB y su tensión interpretativa; evita simplificar prematuramente a «come sangre», que podría borrar el matiz del giro preposicional del texto inglés.
  doctrine_reference: Prohibición de ingerir sangre en la legislación bíblica
translation_notes:
  revision_awareness: 'El audit trail inglés registra una corrección explícita: la lectura anterior «Pour out the blood» fue sustituida por «Cover the blood» para reflejar la revisión del texto ge''ez y la correspondencia con el mandato de cubrir la sangre. La versión española sigue esa corrección y evita conservar la lectura ya descartada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando corresponda; en este versículo no aparece el nombre divino en el texto auditado.
  - «Carne» se conserva en sentido bíblico colectivo para reflejar la fórmula «all flesh».
  - Se evita el calco rígido cuando el español requiere fluidez, pero sin alterar el contenido normativo del mandato.
