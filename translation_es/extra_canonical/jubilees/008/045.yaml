  rationale: Se conserva la corrección textual principal «Cubre la sangre» y la fórmula bíblica «toda carne». Se ajusta la cláusula final para un español más natural y digno, sin alterar el sentido del original auditado. La nota al pie se simplifica para reflejar la alternativa preservada por el inglés POB sin lenguaje de proceso interno.
