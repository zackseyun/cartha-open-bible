review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el sentido general del inglés POB y la revisión clave de «Cover the blood». También conserva adecuadamente «toda carne». Sin embargo, el español presenta una construcción menos natural en «testificarles a ti y a tus hijos», y la nota al pie explica el historial editorial en vez de limitarse a una alternativa de traducción útil para el lector.
  spanish_quality_summary: El texto es mayormente claro y fiel, con buen registro bíblico. Conviene pulir la sintaxis a «dar testimonio ante ti y tus hijos» o similar para evitar una combinación poco idiomática de clítico más complemento duplicado. La nota al pie debe reformularse en estilo de nota de traducción, no de proceso interno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sangre» y «toda carne» están bien. La elección «Cubre la sangre» concuerda con el audit trail. No hay nombres divinos ni términos cristológicos implicados aquí.
  issues:
  - severity: medium
    issue: «testificarles a ti y a tus hijos» suena poco natural en español
    rationale: Aunque reproduce de cerca el inglés, la combinación de «les» con «a ti y a tus hijos» resulta torpe y menos legible. «dar testimonio ante ti y tus hijos» conserva el sentido solemne sin perder fidelidad.
  - severity: low
    issue: La nota al pie contiene lenguaje metatextual del proceso editorial
    rationale: 'Una nota para el lector debe presentar la alternativa de traducción («O: “Derrama la sangre”») y, si hace falta, una razón breve; no debería depender de la expresión interna «audit trail corregido».'
  revised_spanish_text: Y no seas como uno que come con la sangre, sino ten cuidado de que no coman sangre delante de ti. Cubre la sangre[a], porque así se me ha mandado dar testimonio ante ti y tus hijos, junto con toda carne.
  revised_footnotes:
