  rationale: 'Se hicieron ajustes menores de estilo y precisión: ‘por medio de este río’ mejora la naturalidad del español frente a ‘por en medio de este río’, y ‘entra en el Gran Mar’ refleja mejor el movimiento hidrográfico de ‘goes into’ sin alterar el sentido fuente. Se conserva intacta la decisión clave ‘aguas de los abismos’ con su nota alternativa singular.'
