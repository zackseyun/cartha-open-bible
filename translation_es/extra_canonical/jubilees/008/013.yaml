translation:
  language: es
  text: Y su mitad va hacia el occidente por medio de este río, y continúa hasta acercarse a las aguas de los abismos[a], de donde sale este río; y sus aguas se vierten en el Mar de Me'at. Y este río entra en el Gran Mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las aguas del abismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: its half
  english_pob_choice: And its half
  chosen_spanish: Y su mitad
  alternatives_spanish:
  - Y la mitad de él
  - Y su otra mitad
  lexicon: literal territorial division
  rationale: ‘mitad’ conserva la lectura literal de manfaqu indicada por la revisión inglesa; ‘su mitad’ mantiene la referencia al tramo o porción del río/territorio sin añadir interpretación.
- source_word: waters of the abysses
  english_pob_choice: waters of the abysses
  chosen_spanish: las aguas de los abismos
  alternatives_spanish:
  - las aguas del abismo
  - las aguas de los profundos
  lexicon: abyss/deeps
  rationale: ‘abismos’ refleja el plural del ge'ez señalado en la revisión inglesa y conserva la imagen cosmológica de múltiples profundidades mejor que un singular abstracto.
- source_word: Sea Me'at
  english_pob_choice: Sea Me'at
  chosen_spanish: Mar de Me'at
  alternatives_spanish:
  - Mar Me'at
  - mar de Me'at
  lexicon: proper name with common noun
  rationale: Se mantiene el nombre propio transliterado y se naturaliza con artículo y mayúscula inicial en español bíblico; ‘Mar de Me'at’ comunica claramente que se trata de una denominación geográfica.
- source_word: Great Sea
  english_pob_choice: Great Sea
  chosen_spanish: Gran Mar
  alternatives_spanish:
  - Mar Grande
  - el Gran Mar
  lexicon: traditional geographic designation
  rationale: ‘Gran Mar’ es una equivalencia sobria y fiel para el nombre geográfico, sin introducir una identificación interpretativa adicional.
theological_decisions:
- issue: Pluralidad de los ‘abismos’
  english_pob_reading: waters of the abysses
  chosen_spanish_reading: aguas de los abismos
  alternative_spanish_readings:
  - aguas del abismo
  - aguas de las profundidades
  rationale: La revisión inglesa adoptó el plural para reflejar la cosmología del original; el español conserva ese plural para no aplanar la imagen a un único ‘abismo’.
  doctrine_reference: Cosmología del texto de Jubileos; fidelidad semántica al término plural
- issue: Dirección de flujo y alcance geográfico
  english_pob_reading: goes toward the west ... until it approaches ... and its waters pour into ... goes into the Great Sea
  chosen_spanish_reading: va hacia el occidente ... continúa ... hasta acercarse ... se vierten ... va al Gran Mar
  alternative_spanish_readings:
  - se dirige al oeste
  - fluye al occidente
  rationale: La secuencia verbal conserva el movimiento progresivo y la culminación geográfica sin añadir metáforas devocionales o interpretaciones simbólicas.
  doctrine_reference: Texto narrativo-geográfico; precisión descriptiva
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés mantuvo ‘its half’ y ‘waters of the abysses’; el español sigue ambas decisiones para reflejar la lectura literal y el plural cosmológico confirmados en el audit trail.
  spanish_consistency_notes:
  - Se usó ‘Gran Mar’ con mayúsculas para mantener el carácter de nombre propio geográfico.
  - ‘occidente’ se eligió por registro bíblico sobrio, equivalente de ‘west’ sin arcaísmo excesivo.
  - No se introdujo ‘SEÑOR’ ni otros equivalentes teológicos ajenos al pasaje, ya que el verso es descriptivo y no contiene referencias directas al nombre divino.
