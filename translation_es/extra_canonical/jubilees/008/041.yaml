translation:
  language: es
  text: Y ningún hombre que coma sangre o que derrame la sangre del hombre sobre la tierra quedará; ni semilla ni descendientes le quedarán bajo el cielo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: blood
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - vida
  - sangre derramada
  lexicon: blood
  rationale: La fuente habla de comer sangre y de derramar la sangre del hombre; en español, "sangre" conserva de forma directa la imagen legal y ritual del texto sin suavizarla. "Vida" podría captar el valor de la sangre en algunos contextos, pero aquí borraría la mención concreta del acto prohibido.
- source_word: man
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - la persona
  lexicon: man
  rationale: El paralelo "la sangre del hombre" mantiene la formulación general del original y del inglés POB. "El ser humano" sería claro, pero desplazaría la cadencia del juicio formulado en el texto.
- source_word: seed
  english_pob_choice: seed
  chosen_spanish: su semilla
  alternatives_spanish:
  - su descendencia
  - su progenie
  lexicon: seed
  rationale: Conserva la metáfora genealógica básica. "Semilla" es algo más literal y corresponde al alcance amplio del inglés POB; en español moderno puede sonar duro, pero aquí mantiene el carácter bíblico y patrimonial del término.
- source_word: descendants
  english_pob_choice: descendants
  chosen_spanish: sus descendientes
  alternatives_spanish:
  - su linaje
  - su posteridad
  lexicon: descendants
  rationale: '"Descendientes" explicita el sentido genealógico de manera inteligible en español contemporáneo y evita ambigüedad con "semilla". Mantiene la doble expresión del original, sin fusionar los dos términos.'
theological_decisions:
- issue: 'Alcance del juicio: exclusión total y extinción de linaje'
  english_pob_reading: And no man who eats blood or who sheds the blood of man on the earth will be left; nor will seed or descendants remain for him under heaven.
  chosen_spanish_reading: Y ningún hombre que coma sangre o que derrame la sangre del hombre sobre la tierra quedará; ni su semilla ni sus descendientes permanecerán para él debajo del cielo.
  alternative_spanish_readings:
  - no quedará nadie de él
  - no permanecerá su linaje
  rationale: 'La redacción española conserva la fuerza absoluta del juicio: no solo no quedará el individuo, sino que también se extingue su continuidad genealógica. Se evita suavizar "will be left" o "remain" para no reducir el alcance de la condena que expresa el texto.'
  doctrine_reference: Juicio divino y responsabilidad por la sangre; continuidad del linaje bajo bendición o maldición en el lenguaje bíblico
translation_notes:
  revision_awareness: El texto fuente proporcionado para Ge'ez aparece vacío, y el control de revisión indica alta concordancia y que no se requieren cambios. Por ello, la versión española sigue de cerca la forma auditada del inglés POB, sin introducir notas textuales adicionales ni variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene "sangre" de manera uniforme para blood.
  - Se conserva la repetición de "semilla" y "descendientes" porque el inglés POB distingue ambos términos y el texto intensifica el juicio al duplicarlos.
  - Se usa "debajo del cielo" para reflejar la expresión espacial del original y del inglés POB, en lugar de una paráfrasis como "en la tierra" solamente.
