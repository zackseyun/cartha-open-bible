base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/007.yaml
  text: And in the sixth year she bore him a son, and he called his name Peleg, because in his days, when he was born, the sons of Noah began to divide the earth among themselves. For this reason he called his name Peleg.
  footnotes:
  - marker: a
    text: 'The name Peleg (Ge''ez: ፋሌክ, Fālēk) reflects the Hebrew root פלג (plg), meaning ''to divide'' or ''to split'', corresponding to the division of the earth described in this verse.'
    reason: lexical_choice
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:51Z'
    unchanged: false
    changes_summary: 'Adjusted punctuation and wording to more closely reflect the source: kept the birth of Peleg, rendered the causal clause more directly, and retained the naming repetition without adding extraneous wording.'
translation:
  language: es
  text: Y en el sexto año ella le dio a luz un hijo, y llamó su nombre Peleg[a], porque en sus días, cuando nació, los hijos de Noé comenzaron a dividir la tierra entre sí. Por esta razón llamó su nombre Peleg.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre Peleg refleja el hebreo פלג (plg), «dividir» o «partir», en alusión a la división de la tierra mencionada en este versículo.
    reason: lexical_choice
lexical_decisions:
- source_word: በሳድስ፡ ዓመት፡
  english_pob_choice: in the sixth year
  chosen_spanish: en el sexto año
  alternatives_spanish:
  - en el año sexto
  - durante el sexto año
  lexicon: Leslau
  rationale: Reproduce de manera directa el marcador temporal del nacimiento; 'en el sexto año' es natural en español y conserva la referencia cronológica exacta.
- source_word: ወለደት፡ ሎቱ፡ ወልደ፡
  english_pob_choice: she bore him a son
  chosen_spanish: le nació un hijo
  alternatives_spanish:
  - le dio a luz un hijo
  - le parió un hijo
  lexicon: Leslau
  rationale: El geʿez expresa el parto de la mujer; 'le nació un hijo' mantiene el hecho del alumbramiento con un español fluido y sobrio, sin perder la relación maternal implícita.
- source_word: ፋሌክ፡
  english_pob_choice: Peleg
  chosen_spanish: Peleg
  alternatives_spanish:
  - Falec
  lexicon: Leslau
  rationale: Se conserva la forma bíblica usual en español 'Peleg', en línea con la decisión inglesa POB, y se mantiene el juego etimológico en nota.
- source_word: ይትካፈሉ
  english_pob_choice: to divide
  chosen_spanish: dividir
  alternatives_spanish:
  - repartir
  - apartar
  lexicon: Leslau
  rationale: El verbo indica la acción central de partir la tierra entre los descendientes de Noé; 'dividir' reproduce mejor la fuerza léxica que 'repartir'.
- source_word: ምድረ፡
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: Leslau
  rationale: '''La tierra'' refleja el objeto dividido en el texto y coincide con el valor general de la expresión en el contexto narrativo.'
- source_word: በበይናቲሆሙ፡
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - entre ellos
  - mutuamente
  lexicon: Leslau
  rationale: '''Entre sí'' expresa con precisión la reciprocidad de la acción sin introducir explicaciones ajenas al texto.'
theological_decisions:
- issue: Nombre Peleg y su etimología de 'dividir'
  english_pob_reading: The name Peleg reflects the division of the earth described in the verse.
  chosen_spanish_reading: El nombre Peleg se conserva y se señala su relación con 'dividir' en nota.
  alternative_spanish_readings:
  - Falec, con explicación etimológica
  - Peleg, 'División'
  rationale: El texto fuente presenta un juego de palabras entre el nombre y la división de la tierra. En español conviene preservar el nombre tradicional 'Peleg' y explicar la relación léxica en una nota, sin sustituir el nombre por una traducción que borraría la forma patrimonial del personaje.
  doctrine_reference: Génesis 10:25; 1 Crónicas 1:19
- issue: Alcance de 'earth' en el relato
  english_pob_reading: the earth among themselves
  chosen_spanish_reading: la tierra entre sí
  alternative_spanish_readings:
  - la tierra entre ellos
  - la tierra para repartírsela
  rationale: No se debe suavizar el alcance del reparto. 'La tierra' mantiene el objeto amplio del reparto narrado, sin especificar más de lo que el texto dice.
  doctrine_reference: Jubileos 8:7 / Génesis 10:25
translation_notes:
  revision_awareness: 'El registro revisado corrige el límite del versículo para incluir solo Jubilees 8:7: el nacimiento de Peleg y la división de la tierra entre los hijos de Noé, sin material de los versículos 5–6. La redacción española sigue esa delimitación y conserva la repetición del nombre con su motivación causal.'
  spanish_consistency_notes:
  - Se usa 'Peleg' de forma consistente, no 'Falec', para alinearse con el equivalente bíblico estándar en español y con la decisión inglesa auditada.
  - Se mantiene 'dividir' en vez de 'repartir' como verbo principal para conservar el eco etimológico señalado por el texto fuente.
  - '''Entre sí'' conserva la reciprocidad del acto sin introducir un sujeto distinto ni una lectura distributiva más fuerte que la del original.'
