  revised_footnotes:
  - marker: a
    text: El nombre Peleg refleja el hebreo פלג (plg), «dividir» o «partir», en alusión a la división de la tierra mencionada en este versículo.
    reason: lexical_choice
  revision_rationale: Se corrige la expresión del nacimiento para reflejar con mayor fidelidad el sujeto femenino explícito del original y del POB inglés ('ella le dio a luz un hijo'). Se conserva la repetición de 'llamó su nombre Peleg' por su valor formal en la fuente. La nota se mantiene, con redacción ligeramente afinada y razón normalizada como decisión léxica.
