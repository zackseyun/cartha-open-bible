    issue: '''le nació un hijo'' no refleja con precisión el verbo de dar a luz con sujeto femenino'
    rationale: El geʿez y el POB inglés expresan que ella dio a luz un hijo para él. En español, 'le nació un hijo' es entendible pero cambia el ángulo semántico y atenúa la acción materna explícita.
  - severity: low
    issue: La razón etimológica en la nota podría vincularse más explícitamente al nombre propio conservado
    rationale: La nota actual es correcta, pero puede formularse ligeramente mejor como explicación del nombre Peleg, manteniendo el juego hebreo sin ambigüedad.
