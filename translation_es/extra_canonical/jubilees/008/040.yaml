- from: Porque todo el que derrame la sangre del hombre, y todo el que coma sangre de cualquier carne, todos ellos serán destruidos de la tierra.
  to: Todo el que derrame la sangre del hombre, y todo el que coma sangre de cualquier carne, todos ellos serán destruidos de la faz de la tierra.
  rationale: 'Se hace una reparación mínima para mejorar fidelidad contextual y naturalidad española: se elimina «Porque» y se ajusta la expresión final a «de la faz de la tierra», manteniendo intactos el paralelismo legal, la reanudación «todos ellos» y la fuerza judicial del pasaje.'
  reviewer_model: gpt-5.4
