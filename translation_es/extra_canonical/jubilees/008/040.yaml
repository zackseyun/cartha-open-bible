translation:
  language: es
  text: Todo el que derrame la sangre del hombre, y todo el que coma sangre de cualquier carne, todos ellos serán destruidos de la faz de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: everyone who sheds the blood of man
  english_pob_choice: For everyone who sheds the blood of man
  chosen_spanish: Porque todo el que derrame la sangre del hombre
  alternatives_spanish:
  - Porque cualquiera que derrame la sangre del hombre
  - Porque todo el que derrama sangre humana
  lexicon: todo el que + derramar + sangre + hombre
  rationale: Conserva el paralelismo repetido de la cláusula fuente y el valor legal/forense de «sheds the blood». «Del hombre» refleja de forma sobria el genitivo humano sin añadir interpretaciones.
- source_word: everyone who eats the blood of any flesh
  english_pob_choice: everyone who eats the blood of any flesh
  chosen_spanish: todo el que coma sangre de cualquier carne
  alternatives_spanish:
  - todo el que coma la sangre de toda carne
  - todo el que coma sangre de cualquier ser vivo
  lexicon: comer sangre
  rationale: «Coma» mantiene la forma general/genericidad del hebraísmo legal y «de cualquier carne» reproduce el alcance amplio de any flesh sin restringir indebidamente el referente.
- source_word: all of them
  english_pob_choice: all of them will be destroyed
  chosen_spanish: todos ellos serán destruidos de la tierra
  alternatives_spanish:
  - todos serán destruidos de la tierra
  - serán destruidos todos ellos de la tierra
  lexicon: todos ellos + ser destruidos de la tierra
  rationale: Se conserva el énfasis resumptivo del sujeto plural retomado tras el «todo el que» singular de la cláusula anterior. «De la tierra» mantiene la expresión fuente sin explicitar más allá del texto.
theological_decisions:
- issue: Generalized judgment on bloodshed and blood consumption
  english_pob_reading: For everyone who sheds the blood of man, and everyone who eats the blood of any flesh, all of them will be destroyed from the earth.
  chosen_spanish_reading: Porque todo el que derrame la sangre del hombre, y todo el que coma sangre de cualquier carne, todos ellos serán destruidos de la tierra.
  alternative_spanish_readings:
  - '...será destruido de la tierra'
  - '...serán borrados de la tierra'
  rationale: 'La lectura mantiene la sanción colectiva e impersonal del pasaje: no se singulariza la pena, sino que el grupo queda sujeto a destrucción. «Destruidos» preserva la fuerza del juicio sin introducir una imagen no atestiguada como «borrados».'
  doctrine_reference: Jubileos 8:40; prohibición de la sangre en el marco legal del pacto
- issue: Source syntax with resumptive plural after singular distributive subject
  english_pob_reading: all of them will be destroyed
  chosen_spanish_reading: todos ellos serán destruidos
  alternative_spanish_readings:
  - todos serán destruidos
  - serán destruidos todos ellos
  rationale: La fuente presenta una dislocación o reanudación plural; el español la refleja con naturalidad mediante «todos ellos», evitando perder el carácter resumptivo que la revisión inglesa aclaró.
  doctrine_reference: Observación sintáctica del pasaje según la revisión auditada
translation_notes:
  revision_awareness: La revisión inglesa más reciente ya resolvió la dislocación sintáctica del original con «all of them will be destroyed»; la versión española sigue esa decisión sin añadir notas innecesarias. No se requieren variantes textuales adicionales porque el contexto auditado no aporta alternativas consolidadas en español.
  spanish_consistency_notes:
  - Se mantiene «sangre» en ambos miembros de la cláusula para preservar la repetición del original.
  - Se usa «tierra» sin mayúscula, conforme al sentido geográfico general del pasaje.
  - No se introduce «SEÑOR» ni terminología litúrgica ajena, porque el versículo no contiene el Tetragrámaton ni un título divino explícito.
