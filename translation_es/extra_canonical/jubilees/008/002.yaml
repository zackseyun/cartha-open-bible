translation:
  language: es
  text: Y ella le dio a luz un hijo en el tercer año de esta semana, y le puso por nombre Kainam. Y el niño creció.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወልደ፡ / bore
  english_pob_choice: she bore him a son
  chosen_spanish: le dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  - dio a luz un hijo
  lexicon: parir / dar a luz
  rationale: El ge'ez expresa el nacimiento mediante el verbo de alumbramiento; en español, «le dio a luz un hijo» conserva el hecho natal con registro claro y digno sin introducir un giro excesivamente literal.
- source_word: በዓመተ፡ ሣልስ፡ በሱባዔ፡ / in the third year of this week
  english_pob_choice: in the third year of this week
  chosen_spanish: en el tercer año de esta semana
  alternatives_spanish:
  - en el tercer año de este período
  - en el tercer año de esta hebdómada
  lexicon: año / semana
  rationale: Se mantiene la referencia temporal peculiar de Jubileos con «esta semana», reflejando la división septenaria del texto, en lugar de normalizarla a un giro más interpretativo.
- source_word: ስሞ፡ ቃይናም፡ / called his name Kainam
  english_pob_choice: called his name Kainam
  chosen_spanish: llamó su nombre Kainam
  alternatives_spanish:
  - le puso por nombre Kainam
  - puso su nombre Kainam
  lexicon: llamar / nombre
  rationale: «Llamó su nombre» reproduce bien la fórmula narrativa semítica del original y mantiene la correspondencia con el patrón bíblico tradicional sin cambiar el sentido.
- source_word: ወልህቀ፡ ወልድ፡ / And the child grew
  english_pob_choice: And the child grew
  chosen_spanish: Y el niño crecía
  alternatives_spanish:
  - Y el niño creció
  - Y el hijo crecía
  lexicon: crecer
  rationale: Se incorpora el segmento omitido en la versión inglesa según la revisión aplicada. El imperfecto «crecía» refleja adecuadamente un desarrollo continuo indicado por el ge'ez.
theological_decisions:
- issue: 'Referencia temporal propia de Jubileos: "week" como unidad cronológica del relato'
  english_pob_reading: third year of this week
  chosen_spanish_reading: tercer año de esta semana
  alternative_spanish_readings:
  - tercer año de este período
  - tercer año de esta hebdómada
  rationale: No se suaviza la unidad cronológica porque pertenece al sistema interno de Jubileos; traducirla de manera directa preserva la estructura literaria y teológica del libro.
  doctrine_reference: cronología interna de Jubileos
translation_notes:
  revision_awareness: 'La revisión aplicada corrige una omisión del inglés POB: el ge''ez añade ''And the child grew'', por lo que el español lo incluye explícitamente. No se conserva la nota alternativa del inglés porque la formulación base en español no requiere una doble lectura separada.'
  spanish_consistency_notes:
  - Se usa «Kainam» para mantener la forma propia del testimonio y la tradición editorial del contexto inglés.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el nombre divino en este versículo.
  - Se mantiene «esta semana» como calco funcional del esquema jubilar, no como semana de siete días en sentido ordinario.
