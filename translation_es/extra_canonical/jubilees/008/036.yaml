translation:
  language: es
  text: Yahvé destruyó todo de la faz de la tierra por la maldad de sus obras y por la sangre que habían derramado en medio de la tierra; destruyó todo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: YHWH
  rationale: El texto auditado usa el nombre divino explícito “Yahweh”; en español se conserva como “Yahvé” conforme al estándar del proyecto, evitando la máscara litúrgica “SEÑOR”.
- source_word: destroyed everything
  english_pob_choice: destroyed everything
  chosen_spanish: destruyó todo
  alternatives_spanish:
  - destruyó todas las cosas
  - arrasó todo
  lexicon: שׁחת / ἀπόλλυμι (valor destructivo global)
  rationale: “Destruyó todo” reproduce de forma natural y sobria la destrucción total indicada por el inglés POB, sin intensificar más allá del alcance del pasaje.
- source_word: from the face of the earth
  english_pob_choice: from the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de la faz de la tierra
  - de sobre la superficie de la tierra
  lexicon: פְּנֵי הָאָרֶץ
  rationale: Se mantiene la imagen semítica de la ‘faz’ de la tierra, con ‘de sobre’ para conservar la idea de remoción completa y el registro bíblico del original.
- source_word: because of the wickedness of their deeds
  english_pob_choice: because of the wickedness of their deeds
  chosen_spanish: por la maldad de sus obras
  alternatives_spanish:
  - a causa de la maldad de sus obras
  - por la maldad de sus hechos
  lexicon: רָעָה + מַעֲשִׂים
  rationale: ‘Maldad de sus obras’ conserva el vínculo entre conducta y culpa moral; ‘obras’ sigue bien el alcance de ‘deeds’ y su tono bíblico.
- source_word: because of the blood which they had poured out
  english_pob_choice: because of the blood which they had poured out
  chosen_spanish: por la sangre que habían derramado
  alternatives_spanish:
  - por la sangre que habían vertido
  - por la sangre derramada por ellos
  lexicon: דָּם + שָׁפַךְ
  rationale: ‘Derramado sangre’ es la equivalencia española más estable para el hebraísmo/idioma de violencia homicida; ‘vertido’ es posible, pero menos idiomático en español bíblico actual.
- source_word: in the midst of the earth
  english_pob_choice: in the midst of the earth
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en el corazón de la tierra
  - en medio del país
  lexicon: בְּקֶרֶב הָאָרֶץ
  rationale: Se conserva la localización enfática ‘en medio de la tierra’, que subraya la gravedad pública y extendida del derramamiento de sangre.
theological_decisions:
- issue: Nombre divino explícito versus máscara litúrgica
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: La política del proyecto exige preservar el nombre divino cuando el audit trail lo explicita; no se sustituye por un título indirecto.
  doctrine_reference: Tetragrámaton / uso del nombre divino en traducción
- issue: Totalidad del juicio
  english_pob_reading: destroyed everything
  chosen_spanish_reading: destruyó todo
  alternative_spanish_readings:
  - arrasó todo
  - aniquiló todo
  rationale: Se mantiene la afirmación total sin agregar matices interpretativos; la repetición final ‘destruyó todo’ refuerza la totalidad como en el inglés auditado.
  doctrine_reference: Juicio divino y destrucción total
translation_notes:
  revision_awareness: La revisión más reciente sustituyó “the LORD” por “Yahweh” sin otros cambios; la versión española sigue esa revisión y conserva la misma estructura y alcance semántico del inglés auditado.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para YHWH conforme al estándar del proyecto.
  - Se conserva la repetición final de la cláusula para reflejar el énfasis total del versículo.
  - No se introducen términos doctrinales no presentes en el texto base.
