revisions:
- from: Este mar se llama la lengua del Mar de Egipto. Y desde allí se extiende hacia el norte hasta la desembocadura del Mar Grande, al borde de las aguas, y avanza hacia el occidente hasta Afra, y sigue hasta aproximarse a las aguas del río Gihón, al lado norte de las aguas del Gihón.
  to: Este mar se llama la lengua del Mar de Egipto. Y desde allí se extiende hacia el norte hasta la boca del Mar Grande, al borde de las aguas, y avanza hacia el occidente hasta Afra[a], y sigue hasta aproximarse a las aguas del río Gihón, al norte de las aguas del Gihón.
  rationale: 'Se hacen ajustes menores de fidelidad e idiomaticidad: ''boca del Mar Grande'' en lugar de ''desembocadura'', se mejora la locución final a ''al norte de'', y se preserva la alternativa textual sobre Afra en una nota anclada.'
