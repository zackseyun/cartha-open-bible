review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del geográfico geʽez y del English POB: cláusula de nombre del mar, extensión hacia el norte, llegada a la boca/desembocadura del Mar Grande, continuación hacia el oeste hasta Afra, y aproximación a las aguas del río Gihón por su lado norte. No obstante, hay dos puntos mejorables para fidelidad y claridad: (1) ''desembocadura del Mar Grande'' suena menos natural para la ''mouth'' de un mar y puede sugerir un río que desemboca; ''boca del Mar Grande'' preserva mejor la imagen topográfica. (2) El original/POB conserva una alternativa para ''toward the west to Afra''; conviene preservarla en nota en español.'
  spanish_quality_summary: El español es claro y digno, pero 'desembocadura del Mar Grande' resulta algo forzado en este contexto marítimo. También 'al lado norte' es comprensible, aunque 'al norte de' es más idiomático y limpio en español sin pérdida de sentido. El resto del verso fluye bien.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Los nombres geográficos están bien conservados: ''Mar de Egipto'', ''Mar Grande'', ''Afra'', ''Gihón''. ''Lengua'' como accidente geográfico está bien. Se recomienda mantener una nota para la alternativa documentada del English POB.'
  issues:
  - severity: medium
    issue: '''desembocadura del Mar Grande'' es una elección poco idiomática y potencialmente imprecisa'
    rationale: En español, 'desembocadura' se asocia más naturalmente con ríos. Para la imagen de 'mouth of the Great Sea' aquí, 'boca del Mar Grande' conserva mejor la metáfora espacial del original sin introducir una relación fluvial indebida.
  - severity: low
    issue: Falta la nota alternativa heredada para 'toward the west to Afra'
    rationale: El rastro de auditoría inglés preserva una lectura previa significativa ('toward the west of Afra'). Aunque el texto principal correcto es 'hacia el occidente hasta Afra', la alternativa debe conservarse en nota en español.
  - severity: low
    issue: '''al lado norte de las aguas del Gihón'' puede mejorarse estilísticamente'
    rationale: '''Al norte de las aguas del Gihón'' es más natural en español general y refleja el mismo valor locativo de ''on the north side of''.'
  revised_spanish_text: Este mar se llama la lengua del Mar de Egipto. Y desde allí se extiende hacia el norte hasta la boca del Mar Grande, al borde de las aguas, y avanza hacia el occidente hasta Afra[a], y sigue hasta aproximarse a las aguas del río Gihón, al norte de las aguas del Gihón.
  revised_footnotes:
  - marker: a
    text: O 'hacia el occidente de Afra'.
    reason: Conservar la alternativa documentada en el rastro de auditoría inglés para la frase direccional.
  revision_rationale: 'Se hacen ajustes menores de fidelidad e idiomaticidad: ''boca del Mar Grande'' en lugar de ''desembocadura'', se mejora la locución final a ''al norte de'', y se preserva la alternativa textual sobre Afra en una nota anclada.'
