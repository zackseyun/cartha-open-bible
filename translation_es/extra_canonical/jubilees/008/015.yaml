base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/015.yaml
  text: This sea is named the tongue of the Egyptian Sea. And it extends from there northward to the mouth of the Great Sea, at the waters' edge, and it goes along toward the west to Afra, and it goes on until it approaches the waters of the Gihon River, on the north side of the waters of Gihon.
  footnotes:
  - marker: a
    text: Or 'toward the west of Afra'.
    reason: previous_rendering
  - marker: b
    text: Or 'waters of Gihon River'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: Replaced the draft with a fuller rendering that accounts for the opening clause about the sea's name and the subsequent boundary movements. Removed unsupported wording such as 'his portion,' 'western side,' and 'that looks toward the north,' and rendered the directional and geographic phrases more directly from the Geez.
translation:
  language: es
  text: Este mar se llama la lengua del Mar de Egipto. Y desde allí se extiende hacia el norte hasta la boca del Mar Grande, al borde de las aguas, y avanza hacia el occidente hasta Afra[a], y sigue hasta aproximarse a las aguas del río Gihón, al norte de las aguas del Gihón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hacia el occidente de Afra'.
    reason: Conservar la alternativa documentada en el rastro de auditoría inglés para la frase direccional.
lexical_decisions:
- source_word: “This sea is named” / Geez opening naming clause
  english_pob_choice: This sea is named the tongue of the Egyptian Sea.
  chosen_spanish: Este mar se llama la lengua del Mar de Egipto.
  alternatives_spanish:
  - A este mar se le llama la lengua del Mar de Egipto.
  - Este mar recibe el nombre de la lengua del Mar de Egipto.
  lexicon: nombre/llamarse; lengua como designación geográfica
  rationale: Conservo la cláusula de nominación explícita y traduzco 'tongue' como 'lengua' en sentido geográfico, no como órgano. 'Se llama' es natural y fiel al valor nominativo del original.
- source_word: northward
  english_pob_choice: it extends from there northward
  chosen_spanish: se extiende hacia el norte
  alternatives_spanish:
  - se extiende al norte
  - se alarga hacia el norte
  lexicon: dirección cardinal
  rationale: '''Hacia el norte'' reproduce la direccionalidad sin añadir matices. Mantiene el movimiento fronterizo del texto.'
- source_word: mouth of the Great Sea
  english_pob_choice: to the mouth of the Great Sea
  chosen_spanish: hasta la desembocadura del Mar Grande
  alternatives_spanish:
  - hasta la boca del Mar Grande
  - hasta la entrada del Mar Grande
  lexicon: desembocadura; mar grande
  rationale: '''Desembocadura'' es la forma geográfica más idiomática para ''mouth'' en español y preserva la imagen de un punto de salida o apertura de aguas.'
- source_word: waters' edge
  english_pob_choice: at the waters' edge
  chosen_spanish: al borde de las aguas
  alternatives_spanish:
  - en la orilla de las aguas
  - al filo de las aguas
  lexicon: borde/orilla
  rationale: '''Al borde de las aguas'' conserva el sentido de límite físico sin exagerar la concreción topográfica más allá del texto.'
- source_word: toward the west to Afra
  english_pob_choice: it goes along toward the west to Afra
  chosen_spanish: avanza hacia el occidente hasta Afra
  alternatives_spanish:
  - va hacia el occidente hasta Afra
  - se dirige al oeste hasta Afra
  lexicon: occidente/oeste; dirección + destino
  rationale: Sigo la revisión que distingue dirección y destino. 'Occidente' es válido y solemne; 'hasta Afra' conserva el movimiento hacia un punto concreto.
- source_word: waters of the Gihon River
  english_pob_choice: the waters of the Gihon River
  chosen_spanish: las aguas del río Gihón
  alternatives_spanish:
  - las aguas del río Gihón
  - las aguas de Gihón, el río
  lexicon: Gihón; río
  rationale: Mantengo 'río Gihón' como nombre propio geográfico y conservo el sustantivo plural 'aguas' para reflejar la referencia local del original.
theological_decisions:
- issue: Nominal identification of a sea by geographic designation
  english_pob_reading: This sea is named the tongue of the Egyptian Sea.
  chosen_spanish_reading: Este mar se llama la lengua del Mar de Egipto.
  alternative_spanish_readings:
  - Este mar recibe el nombre de la lengua del Mar de Egipto.
  - Este mar se llama la lengua del mar egipcio.
  rationale: No hay afirmación doctrinal directa, pero sí una designación geográfica que conviene mantener sin suavizarla. 'Mar de Egipto' conserva el referente tradicional sin sustituirlo por una explicación interpretativa.
  doctrine_reference: Geographic naming; no doctrinal claim
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: mantiene la cláusula inicial de nombre del mar, conserva la secuencia de movimientos direccionales y evita añadidos no sustentados como ''his portion'' o ''western side''. También incorpora la corrección auditada ''toward the west to Afra'' mediante ''hacia el occidente hasta Afra''.'
  spanish_consistency_notes:
  - He usado 'Mar Grande' y 'Mar de Egipto' con mayúscula inicial por tratarse de nombres geográficos en este contexto.
  - He mantenido 'Gihón' con acento para la forma española del nombre propio.
  - He evitado 'SEÑOR' u otras sustituciones teológicas no pertinentes, pues el versículo es puramente geográfico.
  - No se añadieron notas al pie porque no había marcadores anclados en el texto español.
