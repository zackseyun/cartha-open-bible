translation:
  language: es
  text: Porque así Enoc, el padre de tu abuelo, mandó a Matusalén, su hijo; y Matusalén mandó a Lamec, su hijo; y Lamec me mandó todo lo que sus padres le mandaron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: commanded
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: mandar
  rationale: El inglés POB usa 'commanded' en una cadena de transmisión de instrucciones familiares. En español, 'mandó' conserva bien la fuerza directiva sin sonar más militar o solemne que el contexto admite. 'Ordenó' endurecería innecesariamente el tono; 'encargó' debilita la idea de mandato.
- source_word: father's father
  english_pob_choice: your father's father
  chosen_spanish: el padre de tu padre
  alternatives_spanish:
  - el abuelo de tu padre
  - tu abuelo
  lexicon: padre / abuelo
  rationale: La secuencia genealógica del inglés POB dice literalmente 'your father's father'. En español, 'el padre de tu padre' mantiene la forma relacional exacta y evita introducir una aclaración interpretativa ('abuelo') que no está en el texto auditado.
- source_word: his son
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - a su hijo
  lexicon: hijo
  rationale: '''Su hijo'' reproduce la relación posesiva de forma natural y fiel. No hace falta una paráfrasis añadida.'
- source_word: all the things
  english_pob_choice: all the things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo lo que
  - todas las instrucciones
  lexicon: todo / cosa
  rationale: El inglés POB mantiene una formulación amplia. 'Todas las cosas' conserva esa amplitud sin restringir prematuramente el contenido a 'instrucciones', aunque el contexto lo implica.
theological_decisions:
- issue: Transmisión de autoridad y tradición familiar
  english_pob_reading: Enoch commanded Methuselah... Methuselah commanded Lamech... Lamech commanded me all the things that his fathers commanded him.
  chosen_spanish_reading: Enoc... mandó...; Matusalén... mandó...; y Lamec me mandó todas las cosas que sus padres le mandaron.
  alternative_spanish_readings:
  - Enoc... ordenó...
  - Enoc... encargó...
  rationale: El texto presenta una cadena de transmisión autorizada dentro de la línea patriarcal. 'Mandó' conserva esa autoridad sin sobreinterpretar el contenido como legislación formal ni suavizarlo a simple consejo.
  doctrine_reference: Tradición patriarcal / autoridad de la transmisión familiar en Jubileos
