revisions:
- from: Porque así Enoc, el padre de tu padre, mandó a Matusalén, su hijo; y Matusalén mandó a Lamec, su hijo; y Lamec me mandó todas las cosas que sus padres le mandaron.
  to: Porque así Enoc, el padre de tu abuelo, mandó a Matusalén, su hijo; y Matusalén mandó a Lamec, su hijo; y Lamec me mandó todo lo que sus padres le mandaron.
  rationale: Se corrige la expresión genealógica para que el español comunique la referencia familiar de forma inteligible y coherente con la cadena patriarcal del versículo. También se mejora 'todas las cosas' a 'todo lo que' por naturalidad idiomática, manteniendo el mismo sentido amplio. No se requieren notas al pie.
  reviewer_model: gpt-5.4
