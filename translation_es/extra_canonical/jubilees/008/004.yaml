translation:
  language: es
  text: '...y la luna y las estrellas en todas las señales del cielo. Y él lo escribió y no dijo nada al respecto...'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወርኅ
  english_pob_choice: the moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  - la luna (el satélite)
  lexicon: astrocelestial
  rationale: La referencia es al astro lunar; en español bíblico y moderno, «la luna» es la forma natural y exacta.
- source_word: ወከዋክብት
  english_pob_choice: the stars
  chosen_spanish: las estrellas
  alternatives_spanish:
  - las estrellas
  - los astros
  lexicon: astrocelestial
  rationale: El plural apunta a cuerpos celestes visibles; «estrellas» es la equivalencia normal y más clara en español.
- source_word: ውስተ ኵሉ ትእምረ ሰማይ
  english_pob_choice: in all the signs of heaven
  chosen_spanish: en todas las señales del cielo
  alternatives_spanish:
  - en todas las señales del cielo
  - en todas las señales del cielo/los cielos
  - en todos los signos del cielo
  lexicon: signs/omens
  rationale: «ትእምረ» puede abarcar señales o presagios; «señales» mantiene la amplitud semántica sin cargar de forma técnica «signos» en español. Se conserva «del cielo» para reflejar el genitivo del original.
- source_word: ወጸሐፋ
  english_pob_choice: And he wrote it down
  chosen_spanish: Y él lo escribió
  alternatives_spanish:
  - Y él lo escribió
  - Y lo copió
  lexicon: writing
  rationale: El verbo puede expresar escribir/copiar según contexto. Dado el texto disponible y la corrección auditada de la segmentación, «lo escribió» es la opción más neutral y fiel al acto de consignarlo por escrito.
- source_word: ወአነገረ
  english_pob_choice: and said nothing about it
  chosen_spanish: y no dijo nada al respecto
  alternatives_spanish:
  - y no dijo nada al respecto
  - y no lo anunció
  - y no habló de ello
  lexicon: speech
  rationale: El audit trail señala que la forma puede ser problemática y probablemente refleje una lectura negativa («no habló»). En español, «no dijo nada al respecto» preserva el sentido prudente del contexto sin introducir elementos no atestiguados.
theological_decisions:
- issue: Astros del cielo y lectura de señales/omens
  english_pob_reading: the moon and the stars in all the signs of heaven
  chosen_spanish_reading: la luna y las estrellas en todas las señales del cielo
  alternative_spanish_readings:
  - la luna y las estrellas en todos los signos del cielo
  - la luna y las estrellas en todas las señales/omenes del cielo
  rationale: El texto ge'ez conserva una referencia astronómica amplia ligada a señales del cielo. «Señales» mantiene la neutralidad del original y evita imponer una interpretación técnica posterior, mientras sigue dejando ver la asociación con el orden celeste.
  doctrine_reference: Jubileos 8:4; audit revision on segmentation and misalignment
translation_notes:
  revision_awareness: 'El contexto auditado indica una corrección importante: el inglés anterior estaba desalineado por un error de segmentación y traducía otra porción del versículo. El texto ge''ez suministrado contiene solo el final de 8:3 y el inicio de 8:4; por eso la versión española sigue la lectura revisada y evita incorporar la nota antigua sobre los Vigilantes, que pertenece a otro segmento. También se toma en cuenta que ወአነገረ puede ser un error por ወኢነገረ; por prudencia, se traduce de manera que no fuerce una conclusión textual más allá del soporte disponible.'
  spanish_consistency_notes:
  - Se mantiene «Y él» para conservar la referencia verbal explícita del sujeto del original.
  - Se prefiere un español sobrio y publicable, evitando calcos como «signos del cielo» si suenan demasiado técnicos en este contexto.
  - No se incorpora la antigua nota sobre los Vigilantes porque el paquete fuente indica que corresponde a otra sección y no a este pasaje.
