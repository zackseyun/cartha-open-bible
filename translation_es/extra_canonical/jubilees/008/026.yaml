base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/026.yaml
  text: which they shed in the midst of the earth, He destroyed everything; and I and you, my children, and all who entered with us into the ark were left. And now, behold, I see before me your deeds, that you are not walking in righteousness, for you have begun to walk in the path of corruption, and you are separating, each one from his neighbor, and are jealous of one another, and are not united together.
