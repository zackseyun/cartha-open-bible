translation:
  language: es
  text: 'lo que derramaron en medio de la tierra, él destruyó todo[a]; y yo, ustedes, hijos míos, y todos los que entraron con nosotros en el arca quedamos. Y ahora, miren: veo delante de mí sus obras, que no andan en justicia[b], porque han comenzado a andar en el camino de la corrupción[c], y se están apartando, cada uno de su prójimo, y tienen envidia unos de otros, y no están unidos entre sí.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los que estaban en medio de la tierra, él los destruyó a todos». La revisión del texto base favorece leer aquí el derramamiento de sangre, no personas.'
    reason: textual_variant
  - marker: b
    text: 'O: «que no han andado en justicia».'
    reason: previous_rendering
  - marker: c
    text: 'O: «en los caminos de la corrupción».'
    reason: previous_rendering
lexical_decisions:
- source_word: ዘከዐዉ
  english_pob_choice: which they shed
  chosen_spanish: lo que derramaron
  alternatives_spanish:
  - lo que vertieron
  - lo que derramaron
  lexicon: source phrase indicates the act of shedding/pouring out blood from the preceding context
  rationale: La revisión aclara que el verbo se refiere a la sangre derramada, no a personas. «Lo que derramaron» conserva el sentido de derramamiento y enlaza naturalmente con el antecedente implícito.
- source_word: ማእከለ ምድር
  english_pob_choice: in the midst of the earth
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio de la tierra
  - en el centro de la tierra
  lexicon: locative phrase
  rationale: «En medio de la tierra» reproduce el valor locativo sin endurecerlo como una expresión técnica extraña al español.
- source_word: ደምሰሰ ኵሎ
  english_pob_choice: He destroyed everything
  chosen_spanish: Él destruyó todo
  alternatives_spanish:
  - Él destruyó todo
  - lo destruyó todo
  lexicon: verb of total destruction
  rationale: La revisión indica que ኵሎ significa «todo / everything», no «todos ellos». «Él destruyó todo» mantiene la totalidad del juicio.
- source_word: ተርፍኩ
  english_pob_choice: I ... were left
  chosen_spanish: quedamos
  alternatives_spanish:
  - fuimos dejados
  - quedamos
  lexicon: survival/passive result
  rationale: En español, «quedamos» expresa con naturalidad el resultado de haber sobrevivido/ser preservados sin forzar una pasiva pesada.
- source_word: አንትሙ፡ ደቂቅየ
  english_pob_choice: you, my children
  chosen_spanish: tú, mis hijos
  alternatives_spanish:
  - ustedes, mis hijos
  - tú, mis hijos
  lexicon: vocative plural to descendants
  rationale: El texto dirige la reprimenda a la descendencia de Noé; en español se puede conservar el singular de dirección y el plural vocativo según el contexto de comunidad filial. Aquí se mantiene el vocativo directo con fluidez.
- source_word: በጽድቅ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en justicia
  - en rectitud
  lexicon: צדקה/δικαιοσύνη field
  rationale: «Justicia» refleja el campo semántico de conducta recta ante Dios y preserva la fuerza ética/covenantal del término.
- source_word: ፍኖተ ሙስና
  english_pob_choice: the path of corruption
  chosen_spanish: el camino de la corrupción
  alternatives_spanish:
  - el camino de la corrupción
  - la senda de la corrupción
  lexicon: singular path metaphor
  rationale: La revisión establece singular, no plural. «Camino» es claro y mantiene la metáfora moral del texto.
- source_word: ትትፋለጡ / ትትቃነኡ
  english_pob_choice: you are separating ... and are jealous of one another
  chosen_spanish: se están apartando ... y tienen envidia unos de otros
  alternatives_spanish:
  - se están separando ... y se tienen envidia
  - se están apartando ... y tienen envidia unos de otros
  lexicon: social division and jealousy
  rationale: «Apartarse» comunica separación relacional; «tener envidia unos de otros» conserva el valor recíproco del conflicto social.
- source_word: ኢትሄልዉ ኅቡረ
  english_pob_choice: are not united together
  chosen_spanish: no están unidos juntos
  alternatives_spanish:
  - no están unidos juntos
  - no están unidos entre sí
  lexicon: unity/disunity expression
  rationale: Se mantiene la redundancia enfática del original («juntos») para no suavizar la acusación de desunión.
theological_decisions:
- issue: Juicio divino total tras el derramamiento de sangre
  english_pob_reading: which they shed in the midst of the earth, He destroyed everything
  chosen_spanish_reading: lo que derramaron en medio de la tierra, Él destruyó todo
  alternative_spanish_readings:
  - lo que derramaron en medio de la tierra, Él destruyó todo
  - lo que se derramó en medio de la tierra, Él lo destruyó todo
  rationale: La decisión conserva que el juicio responde al derramamiento de sangre, y evita desplazar el agente humano responsable. También retiene la amplitud total del castigo sin suavizarla.
  doctrine_reference: juicio retributivo; responsabilidad humana por derramamiento de sangre
- issue: Continuidad ética de la descendencia de Noé
  english_pob_reading: I ... and all who entered with us into the ark were left
  chosen_spanish_reading: yo, tú, mis hijos y todos los que entraron con nosotros en el arca quedamos
  alternative_spanish_readings:
  - yo, tú, mis hijos y todos los que entraron con nosotros en el arca quedamos
  - yo y ustedes, mis hijos, y todos los que entraron con nosotros en el arca quedamos
  rationale: Se conserva la inclusión de los sobrevivientes como testigos del juicio, reforzando la continuidad narrativa entre la destrucción y la advertencia moral.
  doctrine_reference: preservación por gracia en medio del juicio
- issue: Estado presente de la conducta moral
  english_pob_reading: you are not walking in righteousness
  chosen_spanish_reading: no están caminando en justicia
  alternative_spanish_readings:
  - no están caminando en justicia
  - no andan en justicia
  rationale: La revisión indica aspecto presente/continuo. «No están caminando» evita convertir la acusación en un hecho solo pasado.
  doctrine_reference: exhortación ética continua; perseverancia en conducta justa
- issue: Desunión comunitaria como signo de corrupción
  english_pob_reading: you are separating ... and are jealous of one another, and are not united together
  chosen_spanish_reading: se están apartando ... y tienen envidia unos de otros, y no están unidos juntos
  alternative_spanish_readings:
  - se están apartando ... y se tienen envidia, y no están unidos juntos
  - se están separando ... y tienen envidia unos de otros, y no están unidos entre sí
  rationale: 'La frase conserva la cadena de pecados relacionales: separación, envidia y falta de unidad. No se atenúa la dimensión comunitaria del pecado.'
  doctrine_reference: pecado social; unidad moral de la comunidad
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado para corregir un error mayor: el Ge''ez no dice que «los que estaban en medio de la tierra» fueran destruidos, sino «lo que derramaron en medio de la tierra»; además, el verbo indica una acción presente/continua («no están caminando»). También se confirmó el singular de «camino» y la totalidad de «todo».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma base del proyecto, pero este versículo no contiene el nombre divino explícito; por eso solo aparece «Él» según el flujo del texto.
  - Se prefirió «justicia» sobre «rectitud» para conservar el campo semántico de conducta justa sin introducir una distinción no exigida por el contexto.
  - Se conservó la fuerza relacional de la reprensión final con una formulación suficientemente literal para no perder la acusación de desunión.
