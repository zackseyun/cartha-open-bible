translation:
  language: es
  text: 'y engendraron hijos: los Naphidim. Y todos ellos eran distintos unos de otros, y se devoraban unos a otros; y el gigante mató al Naphil, y el Naphil mató al Elyo, y el Elyo a la humanidad, y un hombre a otro.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sons
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  lexicon: hijos
  rationale: En este contexto genealógico, 'hijos' transmite de manera natural la generación de descendencia sin forzar una distinción de sexo que el texto no explicita en la cláusula inglesa revisada.
- source_word: begot
  english_pob_choice: begot
  chosen_spanish: engendraron
  alternatives_spanish:
  - tuvieron
  - procrearon
  lexicon: engendrar
  rationale: '''Engendraron'' conserva el valor genealógico y formal del verbo, más cercano al registro bíblico y al sentido de producir descendencia.'
- source_word: Naphidim
  english_pob_choice: Naphidim
  chosen_spanish: Naphidim
  alternatives_spanish:
  - Nafidim
  - Nefidim
  lexicon: nombre propio transliterado
  rationale: Se conserva la transliteración del nombre propio tal como aparece en la fuente inglesa POB, evitando una normalización no documentada.
- source_word: were all unlike one another
  english_pob_choice: they were all unlike one another
  chosen_spanish: todos ellos eran distintos unos de otros
  alternatives_spanish:
  - todos eran desemejantes entre sí
  - todos eran diferentes entre sí
  lexicon: ser distinto / desemejante
  rationale: '''Distintos unos de otros'' expresa con claridad la diversidad mutua sin añadir una interpretación más fuerte de la necesaria.'
- source_word: devoured one another
  english_pob_choice: they devoured one another
  chosen_spanish: se devoraban unos a otros
  alternatives_spanish:
  - se consumían unos a otros
  - se destruían unos a otros
  lexicon: devorar
  rationale: '''Se devoraban unos a otros'' preserva la imagen violenta y concreta del inglés, que a su vez refleja el motivo de autoaniquilación del pasaje.'
- source_word: giant
  english_pob_choice: giant
  chosen_spanish: el gigante
  alternatives_spanish:
  - el gigante / el ser gigante
  - el gigante
  lexicon: gigante
  rationale: Se mantiene 'gigante', el equivalente directo y ya suficientemente claro en español.
- source_word: Naphil
  english_pob_choice: Naphil
  chosen_spanish: Naphil
  alternatives_spanish:
  - Nafil
  - Nefil
  lexicon: nombre propio transliterado
  rationale: Se conserva la forma transliterada del nombre propio para mantener la correspondencia con el audit trail inglés.
- source_word: Elyo
  english_pob_choice: Elyo
  chosen_spanish: Elyo
  alternatives_spanish:
  - Elyo
  lexicon: nombre propio transliterado
  rationale: Se mantiene el nombre propio sin adaptación ortográfica adicional, dado que el testigo inglés ya fija esta forma.
- source_word: humankind
  english_pob_choice: humankind
  chosen_spanish: la humanidad
  alternatives_spanish:
  - el género humano
  - los seres humanos
  lexicon: humanidad
  rationale: '''La humanidad'' traduce el alcance colectivo de ''humankind'' de manera idiomática y precisa en español.'
- source_word: one man another
  english_pob_choice: one man another
  chosen_spanish: un hombre a otro
  alternatives_spanish:
  - unos a otros
  - uno al otro
  lexicon: uno a otro
  rationale: La frase mantiene la reciprocidad fragmentaria del original, con una formulación breve y fiel al cierre acumulativo del versículo.
theological_decisions:
- issue: Secuencia de violencia mutua y destrucción entre grupos nombrados
  english_pob_reading: and they were all unlike one another, and they devoured one another; and the giant killed the Naphil, and the Naphil killed the Elyo, and the Elyo humankind, and one man another.
  chosen_spanish_reading: Y todos ellos eran distintos unos de otros, y se devoraban unos a otros; y el gigante mató al Naphil, y el Naphil mató al Elyo, y el Elyo a la humanidad, y un hombre a otro.
  alternative_spanish_readings:
  - y se destruían unos a otros
  - y se mataban unos a otros
  rationale: La traducción conserva el escalamiento de violencia descrito en el texto inglés sin suavizarlo ni moralizarlo. El orden de los sujetos y objetos se mantiene para reflejar la cadena causal y recíproca del pasaje.
  doctrine_reference: Narrative anthropology in Jubilees; no doctrinal clarification added beyond the source
translation_notes:
  revision_awareness: La puntuación inglesa revisada separa con dos puntos la referencia a los Naphidim y conserva una cadena de cláusulas coordinadas; la versión española sigue esa estructura para preservar la legibilidad sin alterar el orden ni el contenido.
  spanish_consistency_notes:
  - Se conservan como nombres propios transliterados Naphidim, Naphil y Elyo, siguiendo el testimonio inglés auditado.
  - Se usa 'humanidad' para humankind, que en español comunica el colectivo humano con naturalidad y sin pérdida semántica.
  - No se introducen notas textuales ni alternativas porque el paquete fuente no ofrece variantes adicionales ni tensiones textuales documentadas.
