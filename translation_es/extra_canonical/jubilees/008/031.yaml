translation:
  language: es
  text: Y Noé comenzó a mandar a sus nietos con ordenanzas, mandamientos y todos los juicios que él conocía, y les dio testimonio de que debían hacer justicia, cubrir la vergüenza de su carne[a], bendecir a su Creador, honrar a padre y madre, amar cada uno a su hermano, y guardar sus almas de la fornicación, la impureza y toda injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'vergüenza de su desnudez'; se mantiene 'carne' para conservar la formulación del POB y el peso moral del término.
    reason: alternative_reading
lexical_decisions:
- source_word: ordinances and commandments and all the judgments
  english_pob_choice: ordinances and commandments and all the judgments
  chosen_spanish: ordenanzas y mandamientos y todos los juicios
  alternatives_spanish:
  - preceptos y mandamientos y todos los juicios
  - estatutos y mandamientos y todos los juicios
  lexicon: ordenanzas; mandamientos; juicios
  rationale: Conservo la triple acumulación del inglés y del trasfondo legal del pasaje sin nivelar los términos. 'Ordenanzas' y 'mandamientos' son naturales en español bíblico; 'juicios' mantiene el sentido de decisiones/normas judiciales.
- source_word: do righteousness
  english_pob_choice: do righteousness
  chosen_spanish: hicieran justicia
  alternatives_spanish:
  - practicaran justicia
  - hicieran rectitud
  lexicon: justicia
  rationale: '''Justicia'' preserva el valor ético-covenantal del sustantivo hebreo-griego subyacente y encaja bien con una exhortación moral. ''Rectitud'' sería posible, pero menos directo aquí.'
- source_word: cover the shame of their flesh
  english_pob_choice: cover the shame of their flesh
  chosen_spanish: cubrieran la vergüenza de su carne
  alternatives_spanish:
  - cubrieran la vergüenza de su cuerpo
  - cubrieran la desnudez de su carne
  lexicon: carne
  rationale: Mantengo 'carne' porque el texto no habla solo de cuerpo físico sino de una formulación moral ligada a pudor y vergüenza. No suavizo a 'cuerpo' para no borrar la expresión tradicional y su tensión semántica.
- source_word: bless their Creator
  english_pob_choice: bless their Creator
  chosen_spanish: bendijeran a su Creador
  alternatives_spanish:
  - alabaran a su Creador
  - bendijeran a su Hacedor
  lexicon: bendecir; Creador
  rationale: '''Bendecir'' reproduce la exhortación relacional del original y del inglés POB. ''Creador'' es el equivalente más transparente y solemne para el poseedor divino de la creación.'
- source_word: guard their souls
  english_pob_choice: guard their souls
  chosen_spanish: guardaran sus almas
  alternatives_spanish:
  - guardaran sus vidas
  - cuidaran sus almas
  lexicon: alma
  rationale: Conservo 'almas' porque el inglés POB mantiene 'souls' y el contexto pide vigilancia interior y moral. 'Vidas' reduciría el alcance espiritual.
- source_word: fornication and uncleanness
  english_pob_choice: fornication and uncleanness
  chosen_spanish: la fornicación y de la impureza
  alternatives_spanish:
  - la inmoralidad sexual y la impureza
  - la fornicación y la inmundicia
  lexicon: fornicación; impureza
  rationale: '''Fornicación'' y ''impureza'' reflejan términos bíblicos establecidos sin modernizar en exceso. ''Inmundicia'' podría sonar más ritual, pero ''impureza'' conserva amplitud moral y cultual.'
- source_word: all injustice
  english_pob_choice: all injustice
  chosen_spanish: toda injusticia
  alternatives_spanish:
  - toda maldad
  - toda iniquidad
  lexicon: injusticia
  rationale: '''Injusticia'' es la correspondencia más directa y mantiene la generalidad del cierre. No la reemplazo por ''iniquidad'' para evitar un giro más tradicional que menos transparente.'
theological_decisions:
- issue: Obediencia patriarcal como instrucción moral universal
  english_pob_reading: Noah began to command his sons' sons... and he testified to his sons
  chosen_spanish_reading: Y Noé comenzó a dar órdenes a los hijos de sus hijos... y dio testimonio a sus hijos
  alternative_spanish_readings:
  - Y Noé comenzó a enseñar a los hijos de sus hijos... y testificó a sus hijos
  - Y Noé empezó a mandar a los hijos de sus hijos... y les dio testimonio
  rationale: '''Dar órdenes'' conserva el carácter imperativo fuerte del texto, mientras que ''dio testimonio'' mantiene la idea de exhortación solemne, no solo instrucción casual. Evito suavizar la autoridad patriarcal que el pasaje documenta.'
  doctrine_reference: Sabiduría patriarcal y transmisión de la ley/moral familiar en literatura del Segundo Templo
- issue: Contenido ético de 'cover the shame of their flesh'
  english_pob_reading: cover the shame of their flesh
  chosen_spanish_reading: cubrieran la vergüenza de su carne
  alternative_spanish_readings:
  - cubrieran su desnudez
  - cubrieran la vergüenza de su cuerpo
  rationale: Mantener 'vergüenza de su carne' preserva la tensión moral y corporal del enunciado sin interpretarlo como una mera norma de vestimenta. La frase sigue siendo deliberadamente sobria y ambigua, como en el inglés POB.
  doctrine_reference: Pudor, santidad corporal y ética de la pureza en tradiciones bíblicas antiguas
- issue: Lista de vicios y prohibiciones finales
  english_pob_reading: fornication and uncleanness and all injustice
  chosen_spanish_reading: la fornicación y de la impureza y de toda injusticia
  alternative_spanish_readings:
  - la inmoralidad sexual y la impureza y toda injusticia
  - la fornicación y la inmundicia y toda injusticia
  rationale: Conservo la tríada moral sin fusionarla en un término moderno único. Esto preserva tanto la amplitud sexual como la dimensión general de injusticia ética.
  doctrine_reference: Ética de santidad y pureza moral
translation_notes:
  revision_awareness: El último control de revisión indicó 'No changes needed' y una concordancia alta (1.0). Esta traducción sigue ese acuerdo sin introducir ajustes innecesarios respecto del inglés POB auditado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no requerido aquí porque el versículo no contiene el nombre divino; se usó 'Creador' según el inglés auditado.
  - Se preservó la serie ética con paralelismo cercano al inglés POB para no diluir la enumeración.
  - '''Fornicación'', ''impureza'' e ''injusticia'' se dejaron en registro bíblico claro y no eufemístico.'
