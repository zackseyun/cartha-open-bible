base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/031.yaml
  text: And Noah began to command his sons' sons with ordinances and commandments and all the judgments that he knew, and he testified to his sons that they should do righteousness, and cover the shame of their flesh, and bless their Creator, and honor father and mother, and love each his brother, and guard their souls from fornication and uncleanness and all injustice.
  revision_pass:
