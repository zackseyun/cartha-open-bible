base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/003.yaml
  text: And his father taught him writing. And he went to seek for himself a place where he might seize a city for himself. And he found a writing which the ancients had cut on a rock, and he read what was in it. And he copied it, and he found from what was in it that there was in it the teaching of the Watchers, by which they used to observe the omens of the sun.
  footnotes:
  - marker: a
    text: Or 'And the boy grew, and his father'.
    reason: previous_rendering
  - marker: b
    text: Or 'And he understood it,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:49Z'
    unchanged: false
    changes_summary: 'Added the final clauses omitted from the draft: that he understood it and discovered in it the teaching of the Watchers, by which they observed the omens/signs of the sun. Kept the rest substantially unchanged.'
translation:
  language: es
  text: Y su padre le enseñó a escribir. Y fue a buscar para sí un lugar donde pudiera tomar para sí una ciudad. Y halló un escrito que los antiguos habían tallado en una roca, y leyó lo que había en él. Y lo copió, y halló, por lo que había en él, que allí estaba la enseñanza de los Vigilantes, por la cual acostumbraban observar los presagios del sol.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መጽሐፈ / writing
  english_pob_choice: writing
  chosen_spanish: escribir / un escrito
  alternatives_spanish:
  - escritura
  - libro
  - inscripción
  lexicon: lexical equivalence
  rationale: 'El contexto pide dos matices: la acción pedagógica de aprender a escribir y el objeto hallado como un texto grabado. Por eso se traduce la primera ocurrencia como el verbo ''escribir'' y la segunda como ''un escrito'', que mantiene la forma textual sin forzar ''libro''.'
- source_word: ቀደምት ... ውስተ ኰኵሕ
  english_pob_choice: which the ancients had cut on a rock
  chosen_spanish: que los antiguos habían tallado en una roca
  alternatives_spanish:
  - que los antiguos habían cortado en una piedra
  - que los antiguos habían esculpido en una roca
  lexicon: lexical equivalence
  rationale: '''Tallado'' comunica bien la acción de grabar en piedra y conserva la imagen material del original. ''Roca'' es más natural en español que ''piedra'' en este tipo de inscripción antigua.'
- source_word: ወአዕለዎ
  english_pob_choice: he copied it
  chosen_spanish: lo copió
  alternatives_spanish:
  - lo transcribió
  - lo reprodujo
  lexicon: lexical equivalence
  rationale: La revisión textual corrigió el error anterior ('lo entendió') a una acción de copia/transcripción. 'Lo copió' es la opción más directa y publicable; 'lo transcribió' sería más técnico.
- source_word: ትምህርተ፡ ትጉሃን
  english_pob_choice: the teaching of the Watchers
  chosen_spanish: la enseñanza de los Vigilantes
  alternatives_spanish:
  - la instrucción de los Vigilantes
  - la doctrina de los Vigilantes
  lexicon: lexical equivalence
  rationale: Se conserva el nombre técnico 'Vigilantes', ya usado para el grupo angelical de 1 Enoc/Jubileos, y 'enseñanza' refleja bien el contenido transmitido sin imponer una formulación doctrinal posterior.
- source_word: ይሬስዩ፡ ሰገለ፡ ፀሓይ
  english_pob_choice: observe the omens of the sun
  chosen_spanish: observar los signos del sol
  alternatives_spanish:
  - observar los presagios del sol
  - vigilar los signos del sol
  lexicon: lexical equivalence
  rationale: '''Signos'' mantiene el campo semántico de presagios/omen sin introducir una interpretación excesiva. ''Del sol'' conserva la relación directa con el fenómeno astronómico.'
theological_decisions:
- issue: Naturaleza del conocimiento transmitido por los Vigilantes
  english_pob_reading: the teaching of the Watchers, by which they used to observe the omens of the sun
  chosen_spanish_reading: la enseñanza de los Vigilantes, por la cual acostumbraban observar los signos del sol
  alternative_spanish_readings:
  - la doctrina de los Vigilantes, por la cual observaban los presagios del sol
  - la instrucción de los Vigilantes, con la que solían observar los signos del sol
  rationale: La frase conserva la atribución polémica a los Vigilantes como origen de una práctica de adivinación/lectura de señales celestes, sin suavizarla a una simple observación astronómica.
  doctrine_reference: Jubileos 8:3; tradición enociana sobre los Vigilantes
- issue: 'Secuencia narrativa: leer, copiar y discernir el contenido'
  english_pob_reading: he read what was in it... he copied it... he found from what was in it
  chosen_spanish_reading: leyó lo que había en él... lo copió... halló, por lo que había en él
  alternative_spanish_readings:
  - leyó lo que estaba en él... lo transcribió... descubrió por lo que había en él
  rationale: 'Se mantiene la secuencia corregida por la revisión: leer, copiar y luego inferir/descubrir el contenido. ''Halló, por lo que había en él'' preserva la construcción causal del texto y evita añadir ''entendió'' que la revisión rechazó.'
  doctrine_reference: Jubileos 8:3; revisión textual de Ge'ez
translation_notes:
  revision_awareness: 'La base ge''ez y la revisión reciente corrigen dos puntos clave respecto a un borrador previo: no debe incluirse ''And the boy grew'' porque falta en el texto fuente, y el verbo final debe reflejar ''copió/transcribió'' en lugar de ''entendió''. La versión española sigue la lectura revisada que añade las cláusulas finales sobre la enseñanza de los Vigilantes y los signos del sol.'
  spanish_consistency_notes:
  - Se usa 'Vigilantes' como término técnico consistente con la tradición enociana y con el inglés auditado.
  - Se evita 'SEÑOR' o equivalentes porque el pasaje no contiene el nombre divino.
  - Se mantiene 'Y' al inicio de cada cola para reflejar la parataxis del original sin sonar artificial.
  - No se introducen notas al pie porque no hay alternativas textuales que requieran anclaje explícito en esta breve sección.
