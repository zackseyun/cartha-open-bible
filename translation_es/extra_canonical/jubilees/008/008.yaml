translation:
  language: es
  text: Y en el sexto año ella le dio a luz un hijo, y él le puso por nombre Péleg, porque en los días en que él nació los hijos de Noé comenzaron a dividir la tierra entre sí; por eso le puso por nombre Péleg.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “he called his name”
  english_pob_choice: he called his name Peleg
  chosen_spanish: él llamó su nombre Péleg
  alternatives_spanish:
  - le puso por nombre Péleg
  - llamó su nombre Péleg
  lexicon: Llamar un nombre / poner por nombre
  rationale: Mantengo la construcción semítica directa que refleja el valor narrativo del original y del inglés POB, sin volverla innecesariamente idiomática con una paráfrasis más libre. 'Le puso por nombre' sería natural en español, pero 'llamó su nombre' preserva mejor la formulación tradicional del relato.
- source_word: “Peleg”
  english_pob_choice: Peleg
  chosen_spanish: Péleg
  alternatives_spanish:
  - Peleg
  - Péleg
  lexicon: Nombre propio
  rationale: Conservo el nombre propio, adaptando la acentuación gráfica al español para facilitar la lectura; la forma básica del nombre se mantiene intacta.
- source_word: “divide the earth among themselves”
  english_pob_choice: divide the earth among themselves
  chosen_spanish: dividir la tierra entre sí
  alternatives_spanish:
  - repartir la tierra entre ellos
  - dividir la tierra entre unos y otros
  lexicon: Dividir / repartir
  rationale: '''Dividir la tierra entre sí'' sigue de cerca el sentido del inglés POB y conserva la idea de reparto interno entre los hijos de Noé. ''Repartir'' sería posible, pero ''dividir'' mantiene mejor la resonancia etimológica del nombre Peleg en el contexto narrativo.'
theological_decisions:
- issue: Etiología del nombre de Peleg vinculada a la división de la tierra
  english_pob_reading: because in the days when he was born the sons of Noah began to divide the earth among themselves; therefore he called his name Peleg
  chosen_spanish_reading: porque en los días en que él nació los hijos de Noé comenzaron a dividir la tierra entre sí; por eso llamó su nombre Péleg
  alternative_spanish_readings:
  - porque en sus días los hijos de Noé empezaron a repartirse la tierra
  - porque cuando nació los hijos de Noé comenzaron a dividir la tierra
  rationale: Conservo el motivo explicativo del nombre sin suavizarlo ni reinterpretarlo. El texto presenta una explicación narrativa del nombre, no una afirmación doctrinal; por eso la traducción mantiene la causalidad explícita y la conexión con la división de la tierra.
  doctrine_reference: Ninguna doctrina específica; nota etiológica/narrativa
translation_notes:
  revision_awareness: La fuente ge'ez aportada no contiene texto legible en este paquete, así que el draft se construye a partir del inglés POB auditado y su aprobación de alta concordancia; no se introducen cambios de sentido respecto del testimonio disponible.
  spanish_consistency_notes:
  - Uso 'Péleg' como nombre propio estable en español para uniformidad editorial.
  - Mantengo 'hijos de Noé' y 'tierra' en sentido geográfico/territorial, sin introducir connotaciones adicionales.
  - Conservo la estructura causal 'porque... por eso...' para reflejar la etiología del nombre.
