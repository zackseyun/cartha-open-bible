- from: Me mandó todo lo que sus padres le habían mandado. Y yo también les mando a ustedes, hijos míos, conforme a cómo Enoc mandó a su hijo en los primeros jubileos, mientras él vivía, en la séptima generación; mandó y dio testimonio a su hijo y a los hijos de su hijo hasta el día de su muerte.
  to: Me mandó todo lo que sus padres le habían mandado. Y yo también les mando, hijos míos, tal como Enoc mandó a su hijo en los primeros jubileos, mientras aún vivía, en la séptima generación; le mandó y le dio testimonio a su hijo y a los hijos de su hijo hasta el día de su muerte.
