base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/039.yaml
  text: He commanded me all that his fathers had commanded him. And I also command you, my children, according to how Enoch commanded his son in the first jubilees, while he was alive, in the seventh generation; he commanded and testified to his son and to his son's children until the day of his death.
  footnotes:
  - marker: a
    text: Or 'made it heard'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:53Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Ge''ez text: Noah says he was commanded what his fathers commanded, and he in turn commands his children according to Enoch''s instruction to his son in the first jubilees, while alive in the seventh generation, continuing until the day of his death.'
translation:
  language: es
  text: Me mandó todo lo que sus padres le habían mandado. Y yo también les mando, hijos míos, tal como Enoc mandó a su hijo en los primeros jubileos, mientras aún vivía, en la séptima generación; le mandó y le dio testimonio a su hijo y a los hijos de su hijo hasta el día de su muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አዘዘኒ / commanded me
  english_pob_choice: He commanded me
  chosen_spanish: Me mandó
  alternatives_spanish:
  - Me ordenó
  - Me dio mandato
  lexicon: mandar
  rationale: “Mandó” expresa bien la idea de encargo/mandato y mantiene la sencillez del ge'ez. “Ordenó” suena más autoritario en español y “dio mandato” es más explícito pero menos natural aquí.
- source_word: ኵሎ ዘአዘዝዎ አበዊሁ / all that his fathers had commanded him
  english_pob_choice: all that his fathers had commanded him
  chosen_spanish: todo lo que sus padres le habían mandado
  alternatives_spanish:
  - todo lo que sus padres le habían ordenado
  - todo cuanto sus padres le habían mandado
  lexicon: mandar
  rationale: “Sus padres” refleja el plural del ge'ez y “le habían mandado” conserva el valor de mandato recibido sin añadir matices ajenos.
- source_word: አዘዝክሙ / I also command you
  english_pob_choice: I also command you
  chosen_spanish: yo también les mando a ustedes
  alternatives_spanish:
  - yo también les ordeno
  - yo también les doy mandato
  lexicon: mandar
  rationale: Se conserva el paralelismo con el primer miembro y el destinatario plural. “Les mando” es claro y fiel sin volverse solemne de más.
- source_word: ውሉድየ / my children
  english_pob_choice: my children
  chosen_spanish: hijos míos
  alternatives_spanish:
  - mis hijos
  - hijos míos
  lexicon: children
  rationale: “Hijos míos” mantiene el tono directo y afectivo del discurso, además de encajar naturalmente en español.
- source_word: በከመ / according to how
  english_pob_choice: according to how
  chosen_spanish: conforme a cómo
  alternatives_spanish:
  - según cómo
  - tal como
  lexicon: according-to
  rationale: “Conforme a cómo” reproduce la relación de modo/medida del original sin convertirla en una paráfrasis más libre.
- source_word: ሄኖክ / Enoch
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Enoc
  lexicon: proper_name
  rationale: Se usa la forma española estándar “Enoc”.
- source_word: በቀዳሚ እዮቤልውሳት / in the first jubilees
  english_pob_choice: in the first jubilees
  chosen_spanish: en los primeros jubileos
  alternatives_spanish:
  - en el primer jubileo
  - en los primeros jubileos
  lexicon: jubilees
  rationale: Se preserva el plural del texto fuente. Aunque la expresión es inusual, no conviene singularizarla sin apoyo textual.
- source_word: እንዘ ሕያው ውእቱ / while he was alive
  english_pob_choice: while he was alive
  chosen_spanish: mientras él vivía
  alternatives_spanish:
  - estando él vivo
  - mientras estaba vivo
  lexicon: alive
  rationale: “Mientras él vivía” es una equivalencia idiomática fiel y digna; evita un calco rígido.
- source_word: ትዝምዳ ሳባዕ / in the seventh generation
  english_pob_choice: in the seventh generation
  chosen_spanish: en la séptima generación
  alternatives_spanish:
  - en la séptima generación
  lexicon: generation
  rationale: La forma es directa y exacta; mantiene el orden conceptual del original.
- source_word: አዘዘ ወአስምዐ / he commanded and testified
  english_pob_choice: he commanded and testified
  chosen_spanish: mandó y dio testimonio
  alternatives_spanish:
  - mandó y testificó
  - ordenó y dio testimonio
  lexicon: bear_witness
  rationale: “Dar testimonio” es la manera más natural en español para expresar el valor de “testified” sin perder el contenido jurídico/solemne.
- source_word: ለወልዱ ወለውሉደ ውሉዱ / to his son and to his son's children
  english_pob_choice: to his son and to his son's children
  chosen_spanish: a su hijo y a los hijos de su hijo
  alternatives_spanish:
  - a su hijo y a sus nietos
  - a su hijo y a los hijos de su hijo
  lexicon: descendants
  rationale: “Los hijos de su hijo” sigue más de cerca la formulación fuente que “sus nietos”, aunque ambos se refieren al mismo grupo.
- source_word: እስከ አመ ዕለተ ሞቱ / until the day of his death
  english_pob_choice: until the day of his death
  chosen_spanish: hasta el día de su muerte
  alternatives_spanish:
  - hasta el día de su muerte
  lexicon: death
  rationale: Equivalencia directa y natural en español.
theological_decisions:
- issue: Alcance de la cadena de transmisión patrimonial y moral
  english_pob_reading: He commanded me all that his fathers had commanded him. And I also command you, my children...
  chosen_spanish_reading: Me mandó todo lo que sus padres le habían mandado. Y yo también les mando a ustedes, hijos míos...
  alternative_spanish_readings:
  - Me encargó todo lo que sus padres le habían encargado
  - Me transmitió todo lo que sus padres le habían mandado
  rationale: La frase mantiene la idea de continuidad de mandato entre generaciones sin suavizarla en mera información. “Mandó” conserva el carácter normativo del texto.
  doctrine_reference: Transmisión intergeneracional de mandatos patriarcales en Jubileos; fidelidad a la instrucción recibida.
- issue: Valor de 'testified' en el contexto
  english_pob_reading: he commanded and testified
  chosen_spanish_reading: mandó y dio testimonio
  alternative_spanish_readings:
  - mandó y testificó
  - mandó y atestiguó
  rationale: En español, “dio testimonio” preserva el tono solemne y el sentido de declaración pública/solemne que el audit trail atribuye al verbo ge'ez.
  doctrine_reference: Testimonio solemne como forma de exhortación autorizada.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada. Esta versión no incluye marcadores ni notas, porque el texto español puede transmitir el sentido completo sin ambigüedad textual adicional en este versículo.
  spanish_consistency_notes:
  - Se mantiene “mandar” para el campo de mandamiento/orden en todo el versículo para conservar la cohesión léxica.
  - Se usa “Enoc” y “jubileos” de forma consistente con la tradición española, sin introducir términos eclesiásticos ajenos al texto.
  - Se conserva la estructura de paralelismo y sucesión generacional del original, evitando simplificar “los hijos de su hijo” a una glosa interpretativa.
