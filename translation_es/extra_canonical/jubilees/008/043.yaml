  source_alignment_summary: 'El borrador sigue de cerca el inglés auditado: prohibición de que haya sangre ''sobre'' la persona, referencia a toda la sangre en los días cuando se mata un animal o ave, y cierre con lo que se mueve sobre la tierra. Sin embargo, ''sacrifiquen'' estrecha indebidamente el sentido de ''slaughter'', que en este contexto incluye degollar/matar animales en general y no necesariamente un sacrificio ritual.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse en fidelidad y naturalidad. 'Que no haya sangre sobre ustedes' funciona y preserva la imagen. La secuencia 'de toda la sangre que haya en todos los días' suena algo rígida pero aceptable. El ajuste principal es reemplazar 'sacrifiquen' por 'maten' o similar para evitar una lectura cultual no exigida por la fuente.
  glossary_alignment: 'No hay términos del glosario principal en disputa. La decisión clave es léxica: ''slaughter'' no debe traducirse como ''sacrificar'' sin evidencia contextual suficiente. El resto (''sangre'', ''bestia'', ''ganado'', ''ave'', ''sobre la tierra'') es compatible con el proyecto.'
