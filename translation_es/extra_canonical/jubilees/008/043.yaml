base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/043.yaml
  text: Let no blood appear upon you from all the blood that there shall be in all the days in which you slaughter any beast or cattle or bird or whatever moves upon the earth.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:51Z'
