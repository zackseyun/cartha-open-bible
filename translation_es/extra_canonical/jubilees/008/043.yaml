    changes_summary: Smoothed the opening for natural English by changing 'from all the blood there shall be' to 'from all the blood that there shall be'; otherwise retained the draft's wording.
translation:
  language: es
  text: Que no haya sangre sobre ustedes[a] de toda la sangre que haya en todos los días en que maten cualquier bestia, ganado, ave o cualquier ser que se mueva sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «sobre ustedes». La expresión conserva la imagen del texto de que la sangre no quede como carga o marca sobre la persona.'
    reason: theological_note
lexical_decisions:
- source_word: blood / blood appear upon you
  english_pob_choice: Let no blood appear upon you
  chosen_spanish: Que no haya sangre sobre ustedes
  alternatives_spanish:
  - No aparezca sangre sobre ustedes
  - Que no se vea sangre sobre ustedes
  lexicon: blood -> sangre; appear upon you -> haber sobre ustedes
  rationale: El inglés evita un giro más literal de 'aparecer' y expresa la prohibición como ausencia de sangre sobre la persona. En español, 'que no haya sangre sobre ustedes' comunica con naturalidad la misma idea sin añadir un sujeto implícito extraño.
- source_word: all the blood that there shall be
  english_pob_choice: all the blood that there shall be
  chosen_spanish: toda la sangre que haya
  alternatives_spanish:
  - toda la sangre que existirá
  - toda la sangre que habrá
  lexicon: blood -> sangre; there shall be -> haya/habrá
  rationale: La construcción subordinada del inglés se vierte con subjuntivo natural en español ('que haya'), conservando el sentido distributivo y prospectivo sin volverlo rígido.
- source_word: slaughter
  english_pob_choice: slaughter
  chosen_spanish: sacrifiquen
  alternatives_spanish:
  - maten
  - degollen
  - sacrifiquen o degollen
  lexicon: slaughter -> sacrificar
  rationale: En este contexto ritual, el verbo español 'sacrificar' recoge mejor el acto de matar animales para uso cultual o alimentario que un simple 'matar'. Mantiene la amplitud del pasaje sin estrecharlo innecesariamente.
- source_word: beast or cattle or bird or whatever moves upon the earth
  english_pob_choice: any beast or cattle or bird or whatever moves upon the earth
  chosen_spanish: cualquier bestia, ganado, ave o cualquier ser que se mueva sobre la tierra
  alternatives_spanish:
  - cualquier animal, ganado, ave o cualquier ser que se mueva sobre la tierra
  - cualquier bestia, res o ave o cualquier cosa que se mueva sobre la tierra
  lexicon: beast -> bestia; cattle -> ganado; bird -> ave; whatever moves upon the earth -> cualquier ser que se mueva sobre la tierra
  rationale: Se conserva la enumeración del inglés y su amplitud inclusiva. 'Ser que se mueva sobre la tierra' reproduce de forma fiel y clara el alcance de 'whatever moves upon the earth', sin reducirlo solo a animales.
theological_decisions:
- issue: Prohibición de sangre y lenguaje de impureza/culpa implícita
  english_pob_reading: Let no blood appear upon you
  chosen_spanish_reading: Que no haya sangre sobre ustedes
  alternative_spanish_readings:
  - No tengan sangre sobre ustedes
  - Que no se les cargue sangre
  rationale: El texto inglés presenta una prohibición formulada como resultado visible sobre la persona; la versión española conserva esa forma sin introducir categorías doctrinales adicionales. 'Sobre ustedes' mantiene la imagen de responsabilidad o mancha sin explicitar más de lo que el pasaje dice.
  doctrine_reference: Ley sobre sangre; cf. Génesis 9:4; Levítico 17:10-14; Hechos 15:20
translation_notes:
  revision_awareness: La revisión inglesa reciente solo suavizó la apertura con 'that there shall be' y no cambió el contenido. La traducción española sigue esa misma lectura sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene 'sangre' de forma uniforme para blood; no se usan equivalentes como 'culpa' o 'mancha' en el texto principal porque no están explícitos en el inglés POB.
  - '''sacrifiquen'' preserva el matiz ritual del pasaje y evita estrechar el verbo a ''matar'' o expandirlo a un lenguaje más interpretativo.'
