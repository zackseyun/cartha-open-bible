translation:
  language: es
  text: Porque veo, y he aquí, los demonios han comenzado a extraviarlos a ustedes y a sus hijos. Y ahora temo por ustedes, que después de mi muerte derramen sangre humana sobre la tierra, y ustedes también sean destruidos de sobre la faz de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አጋንንት
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - demonios malignos
  lexicon: 'Geʽez: አጋንንት'
  rationale: El contexto exige seres personales que desvían a las personas; «demonios» comunica bien esa fuerza en español y mantiene la lectura del inglés POB.
- source_word: ወጠኑ ላዕሌክሙ ወላዕለ ውሉድክሙ
  english_pob_choice: have begun to lead you and your children astray
  chosen_spanish: han comenzado a extraviarlos a ustedes y a sus hijos
  alternatives_spanish:
  - han empezado a desviarlos a ustedes y a sus hijos
  - han comenzado a hacerlos errar a ustedes y a sus hijos
  lexicon: 'Geʽez: ወጠኑ ...'
  rationale: «Extraviar» conserva la idea de desviar del camino correcto sin añadir una explicación doctrinal ajena al texto.
- source_word: እሬኢ፡ አነ፡ ወናሁ
  english_pob_choice: For I see, and behold
  chosen_spanish: Porque veo, y he aquí
  alternatives_spanish:
  - Pues veo, y he aquí
  - Veo, y he aquí
  lexicon: Conector discursivo en Geʽez
  rationale: La frase introduce la razón de la advertencia; «Porque veo» refleja la causalidad inicial y «y he aquí» conserva el énfasis de observación inmediata.
- source_word: ደመ፡ ሰብእ
  english_pob_choice: human blood
  chosen_spanish: sangre humana
  alternatives_spanish:
  - sangre de hombre
  - sangre de seres humanos
  lexicon: 'Geʽez: ደመ ሰብእ'
  rationale: «Sangre humana» es natural en español y retiene la cualidad humana del sustantivo sin convertirlo en perífrasis.
- source_word: ይተርፍ ... እምገጸ ምድር
  english_pob_choice: you too will be destroyed from the face of the earth
  chosen_spanish: ustedes también sean destruidos de sobre la faz de la tierra
  alternatives_spanish:
  - ustedes también sean borrados de la faz de la tierra
  - ustedes también perezcan de la faz de la tierra
  lexicon: 'Geʽez: እምገጸ ምድር'
  rationale: «De sobre la faz de la tierra» reproduce el giro semítico del original y de la tradición del inglés POB sin suavizar el alcance del juicio.
theological_decisions:
- issue: Agentes demoníacos como causa del extravío
  english_pob_reading: the demons have begun to lead you and your children astray
  chosen_spanish_reading: los demonios han comenzado a extraviarlos a ustedes y a sus hijos
  alternative_spanish_readings:
  - espíritus malignos han comenzado a desviarlos a ustedes y a sus hijos
  - los demonios han empezado a hacerlos errar
  rationale: El texto atribuye el desvío a demonios reales; no se atenúa a una influencia abstracta para no borrar la fuerza demonológica del pasaje.
  doctrine_reference: Jubileos 8:27; lectura coherente con la antropología moral del texto
- issue: Juicio por derramamiento de sangre humana
  english_pob_reading: you will shed human blood upon the earth
  chosen_spanish_reading: derramen sangre humana sobre la tierra
  alternative_spanish_readings:
  - derramen sangre de seres humanos sobre la tierra
  - viertan sangre humana sobre la tierra
  rationale: «Derramar sangre» es la formulación idiomática bíblica y conserva la imputación moral de homicidio que el texto anuncia.
  doctrine_reference: Génesis 9:6 como trasfondo conceptual; Jubileos 8:27
translation_notes:
  revision_awareness: El texto fuente geʽez de Jubileos 8:27 corresponde a la advertencia de Noé sobre la acción de los demonios y el temor de que, tras su muerte, sus descendientes derramen sangre humana y sean destruidos de la faz de la tierra. Se evitó el material ajeno de una redacción previa que pertenecía a otro versículo (la exhortación sobre justicia y rectitud de Jubileos 8:34).
  spanish_consistency_notes:
  - Se usó «demonios» de manera consistente con el inglés POB y con el valor personal del término en el contexto.
  - Se mantuvo «tierra» y la expresión idiomática «de sobre la faz de la tierra» para conservar el tono semítico del pasaje.
  - No se introdujo «Mesías», «Yahvé» ni otros términos no presentes en este versículo.
  - La puntuación separa con claridad la observación inicial, la advertencia y el temor final, siguiendo la estructura del original.
