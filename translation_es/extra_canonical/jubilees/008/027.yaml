base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/027.yaml
  text: For I see, and behold, the demons have begun to lead you and your children astray. And now I fear for you, that after my death you will shed human blood upon the earth, and you too will be destroyed from the face of the earth.
  footnotes:
  - marker: a
    text: Or 'And now, my children, hear and do justice and righteousness, so that you may be planted in righteousness over the face of all the earth, and your glory may be lifted up before my God, who saved me from the waters of the flood.'.
    reason: previous_rendering
