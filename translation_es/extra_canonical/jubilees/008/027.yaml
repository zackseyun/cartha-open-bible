    issue: «Porque veo, y he aquí» es algo calcado
    rationale: Aunque es fiel y aceptable, en español más idiomático podría ser «Porque veo que, miren» o «Porque veo, y miren». Sin embargo, «he aquí» sigue siendo plenamente comprensible en registro bíblico y no requiere corrección.
