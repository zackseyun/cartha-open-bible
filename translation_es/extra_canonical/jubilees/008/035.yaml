translation:
  language: es
  text: Y después de esto pecaron contra las bestias, las aves y todo lo que se mueve, y todo lo que camina sobre la tierra; y se derramó mucha sangre en la tierra; y en toda imaginación y deseo del hombre había vanidad y mal continuamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: sinned against
  english_pob_choice: they sinned against
  chosen_spanish: pecaron contra
  alternatives_spanish:
  - pecaron frente a
  - cometieron pecado contra
  lexicon: pecar
  rationale: 'Conserva la fuerza relacional de la preposición inglesa y del original: no es solo una descripción general del mal, sino una culpa dirigida contra criaturas de Dios.'
- source_word: the beasts and the birds and everything that moves and everything that walks upon the earth
  english_pob_choice: the beasts and the birds and everything that moves and everything that walks upon the earth
  chosen_spanish: las bestias, las aves y todo lo que se mueve, y todo lo que camina sobre la tierra
  alternatives_spanish:
  - los animales, las aves y todo ser viviente que se mueve y camina sobre la tierra
  - las fieras, las aves y todo lo que anda y se mueve sobre la tierra
  lexicon: bestias / aves / mover / caminar
  rationale: Mantiene la serie acumulativa del texto inglés sin suavizarla. 'Bestias' conserva el contraste bíblico tradicional con 'aves' y con las criaturas terrestres; 'todo lo que se mueve' y 'todo lo que camina' reflejan la amplitud del original.
- source_word: much blood was shed
  english_pob_choice: much blood was shed
  chosen_spanish: se derramó mucha sangre
  alternatives_spanish:
  - hubo mucho derramamiento de sangre
  - mucha sangre fue derramada
  lexicon: derramar sangre
  rationale: La construcción pasiva se vuelve natural en español sin perder el carácter de violencia masiva expresado por el original.
- source_word: every imagination and desire of man
  english_pob_choice: every imagination and desire of man
  chosen_spanish: toda imaginación y deseo del hombre
  alternatives_spanish:
  - todo pensamiento y deseo del hombre
  - toda imaginación y anhelo del hombre
  lexicon: imaginación / deseo
  rationale: '''Imaginación'' mantiene el campo semántico de la facultad interior o el diseño mental; ''deseo'' conserva el componente apetitivo. ''Del hombre'' reproduce el genérico humano del inglés.'
- source_word: imagined vanity and evil continually
  english_pob_choice: imagined vanity and evil continually
  chosen_spanish: imaginaba vanidad y mal continuamente
  alternatives_spanish:
  - maquinaba vanidad y mal sin cesar
  - pensaba vanidad y mal continuamente
  lexicon: vanidad / mal / continuamente
  rationale: '''Imaginar'' retiene la idea de concebir o forjar interiormente. ''Vanidad'' traduce la vacuidad/inutilidad moral, y ''mal'' conserva la amplitud ética del inglés sin especificarla indebidamente. ''Continuamente'' refleja el adverbio final sin intensificarlo.'
theological_decisions:
- issue: Universal corruption expressed by human inward imagination
  english_pob_reading: every imagination and desire of man imagined vanity and evil continually
  chosen_spanish_reading: toda imaginación y deseo del hombre imaginaba vanidad y mal continuamente
  alternative_spanish_readings:
  - todo pensamiento y deseo del hombre pensaba en vanidad y mal continuamente
  - toda intención y deseo del hombre maquinaba vanidad y mal continuamente
  rationale: 'Se conserva la antropología moral del pasaje: no solo actos externos, sino la interioridad humana orientada persistentemente al mal. La formulación española evita atenuar la gravedad del diagnóstico.'
  doctrine_reference: Génesis 6:5; Mateo 15:19
translation_notes:
  revision_awareness: No se aplicaron revisiones al texto inglés base; el español se alinea directamente con la lectura auditada de alta concordancia y sin cambios recientes.
  spanish_consistency_notes:
  - Se usa 'Dios' implícitamente solo donde el contexto lo exige; este versículo no lo menciona explícitamente.
  - Se mantiene 'bestias' como término bíblico general para conservar el paralelismo con 'aves' y las criaturas terrestres.
  - Se conserva el registro solemne y acumulativo del original, evitando paráfrasis explicativas.
