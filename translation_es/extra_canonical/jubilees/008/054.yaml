translation:
  language: es
  text: Y yo también les mando, mis hijos, como Enoc mandó a su hijo en el primer jubileo, cuando aún estaba vivo, en la séptima generación. Mandó y dio testimonio a su hijo y a los hijos de su hijo hasta el día de su muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: commanded
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: mandar
  rationale: En este contexto narrativo de transmisión patriarcal, «mandó» conserva la fuerza directiva sin sonar excesivamente jurídico en español. «Ordenó» sería posible, pero más duro; «encargó» suaviza demasiado el mandato.
- source_word: testified
  english_pob_choice: testified
  chosen_spanish: hizo testimonio
  alternatives_spanish:
  - dio testimonio
  - atestiguó
  lexicon: testificar
  rationale: La construcción «hizo testimonio» sigue de cerca el valor formal del inglés POB y mantiene el matiz de declaración solemne. «Dio testimonio» y «atestiguó» son alternativas naturales, pero aquí se preserva la cadencia del texto fuente sin perder inteligibilidad.
- source_word: sons and his sons' sons
  english_pob_choice: his son and to his sons' sons
  chosen_spanish: a su hijo y a los hijos de su hijo
  alternatives_spanish:
  - a su hijo y a sus nietos
  - a su hijo y a los hijos de sus hijos
  lexicon: descendencia intergeneracional
  rationale: Se prefiere la formulación literal «los hijos de su hijo» para conservar la relación genealógica explícita del original. «Nietos» sería más idiomático, pero introduce una equivalencia interpretativa no necesaria.
- source_word: first jubilees
  english_pob_choice: in the first jubilees
  chosen_spanish: en el primer jubileo
  alternatives_spanish:
  - en los primeros jubileos
  - en el jubileo primero
  lexicon: jubileo
  rationale: El singular reproduce la forma del inglés POB y del referente textual. «Primer jubileo» es claro y fiel; el plural sugeriría una referencia distinta.
- source_word: while he was still alive
  english_pob_choice: while he was still alive
  chosen_spanish: cuando aún estaba vivo
  alternatives_spanish:
  - mientras todavía vivía
  - siendo aún vivo
  lexicon: estar vivo
  rationale: «Cuando aún estaba vivo» es una expresión natural en español y mantiene el contraste temporal enfático del pasaje.
theological_decisions:
- issue: Transmisión de autoridad patriarcal y testimonio solemne
  english_pob_reading: And I also command you, my sons, as Enoch commanded his son ... He commanded and testified ...
  chosen_spanish_reading: Y yo también les mando a ustedes, mis hijos, como Enoc mandó a su hijo ... Mandó e hizo testimonio ...
  alternative_spanish_readings:
  - Y yo también les ordeno ...
  - Y yo también les encargo ...
  rationale: El texto presenta una cadena de autoridad y testimonio, no solo una exhortación informal. «Mandar» conserva mejor esa solemnidad y continuidad hereditaria sin introducir un tono eclesiástico posterior.
  doctrine_reference: Transmisión de enseñanza patriarcal; testimonio solemne en literatura deuterocanónica/apócrifa
translation_notes:
  revision_awareness: La versión inglesa POB está marcada como sin cambios en la revisión más reciente y muestra alto acuerdo en la verificación cruzada; por ello, el español sigue de cerca la sintaxis y las decisiones léxicas ya estabilizadas sin introducir variaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general de proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se conserva «jubileo» en singular conforme al inglés POB y al referente del pasaje.
  - Se usa un registro solemne y legible, evitando arcaísmos innecesarios.
