translation:
  language: es
  text: Porque descenderán al Seol, y al lugar de juicio caerán, y todos irán a las tinieblas del abismo por una muerte violenta.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Sheol
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - abismo de los muertos
  - morada de los muertos
  lexicon: término técnico del trasfondo bíblico para el lugar de los muertos
  rationale: Conservo el préstamo tradicional «Seol» porque el POB inglés mantiene «Sheol» como término especial y el contexto no exige explicarlo con un sustituto interpretativo. En español, «Seol» es la forma reconocible y auditable del mismo término.
- source_word: place of judgment
  english_pob_choice: place of judgment
  chosen_spanish: lugar de juicio
  alternatives_spanish:
  - lugar del juicio
  - sitio de juicio
  lexicon: frase locativa con valor judicial/escatológico
  rationale: «Lugar de juicio» reproduce de manera directa la función del sintagma sin añadir explicaciones. «Juicio» conserva la fuerza legal/escatológica del original y del POB inglés.
- source_word: darkness of the deep
  english_pob_choice: darkness of the deep
  chosen_spanish: oscuridad de las profundidades
  alternatives_spanish:
  - tinieblas del abismo
  - oscuridad del fondo
  lexicon: imagen poética de profundidad/abismo
  rationale: «Profundidades» mantiene la imagen de lo hondo o abismal sin forzar una equivalencia más específica que el texto no obliga a fijar. «Tinieblas del abismo» sería más interpretativa; «oscuridad de las profundidades» conserva mejor la sintaxis y el tono del POB inglés.
- source_word: violent death
  english_pob_choice: violent death
  chosen_spanish: muerte violenta
  alternatives_spanish:
  - muerte por violencia
  - muerte violenta y repentina
  lexicon: expresión causal de modo de morir
  rationale: La frase española estándar «muerte violenta» comunica fielmente el sentido de una muerte causada por violencia, sin ampliar a «repentina» ni introducir una glosa no presente en el fuente.
theological_decisions:
- issue: Traducción del destino de los muertos y del juicio
  english_pob_reading: The verse distinguishes Sheol, the place of judgment, and the darkness of the deep, describing a violent death leading there.
  chosen_spanish_reading: El versículo distingue el Seol, el lugar de juicio y la oscuridad de las profundidades, describiendo una muerte violenta que conduce allí.
  alternative_spanish_readings:
  - El versículo habla del infierno y del juicio final
  - El versículo presenta la tumba y un castigo posterior
  rationale: Evito reemplazar «Seol» por «infierno» o «tumba» porque esas opciones alteran el trasfondo semántico y pueden borrar la distinción entre el lugar de los muertos y el lugar de juicio. La redacción española conserva la tensión terminológica del inglés POB y del trasfondo bíblico.
  doctrine_reference: trasfondo bíblico de Seol y juicio escatológico
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el control cruzado reportó alta concordancia (1.0), por lo que la redacción española se alinea estrechamente con el POB inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Seol» como término técnico, en coherencia con el POB inglés «Sheol».
  - Se evita «SEÑOR» u այլ sustituciones no pertinentes porque el versículo no contiene el nombre divino.
  - Se conserva un registro sobrio y bíblico, con sintaxis paralela que refleja las repeticiones del original y del inglés auditado.
