lexical_decisions:
- source_word: secretly
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: —
  rationale: «En secreto» comunica de forma natural la idea de acción oculta sin añadir matices innecesarios; conserva la fuerza narrativa del inglés POB y del sentido fuente de clandestinidad.
- source_word: divided it among themselves
  english_pob_choice: they divided it among themselves
  chosen_spanish: lo dividieron entre ellos
  alternatives_spanish:
  - lo repartieron entre sí
  - lo distribuyeron entre ellos
  lexicon: —
  rationale: «Dividieron» mantiene la partición del referente textual; «entre ellos» expresa la repartición interna sin sobreinterpretar si el acto fue exactamente igualitario o no.
- source_word: told it to Noah
  english_pob_choice: they told it to Noah
  chosen_spanish: se lo contaron a Noé
  alternatives_spanish:
  - lo contaron a Noé
  - se lo dijeron a Noé
  lexicon: —
  rationale: «Contaron» conserva el valor de comunicar una noticia o dato; el dativo pronominal «se lo» reproduce con naturalidad la transferencia a Noé y evita una literalidad dura.
theological_decisions:
- issue: Manner of concealment
  english_pob_reading: secretly among themselves
  chosen_spanish_reading: en secreto entre ellos
  alternative_spanish_readings:
