translation:
  language: es
  text: 'Porque a causa de estas tres cosas vino el diluvio sobre la tierra: a saber, por la fornicación con la cual los Vigilantes se contaminaron con las hijas de los hombres, tomando para sí mujeres de entre todas las que eligieron, y dieron comienzo a la impureza.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: fornication
  english_pob_choice: fornication
  chosen_spanish: fornicación
  alternatives_spanish:
  - inmoralidad sexual
  - adulterio
  lexicon: fornicación
  rationale: El inglés POB mantiene el valor lexical fuerte y específico de una transgresión sexual. En español, 'fornicación' conserva esa fuerza y el registro bíblico sin diluirlo en una expresión más genérica.
- source_word: Watchers
  english_pob_choice: Watchers
  chosen_spanish: Vigilantes
  alternatives_spanish:
  - Vigilias
  - Ángeles vigilantes
  lexicon: Vigilantes
  rationale: '''Watchers'' se traduce de forma directa y transparente como ''Vigilantes'', manteniendo el término técnico del relato sin introducir una identificación interpretativa adicional en el texto principal.'
- source_word: defiled themselves
  english_pob_choice: defiled themselves
  chosen_spanish: se contaminaron
  alternatives_spanish:
  - se mancharon
  - se profanaron
  lexicon: contaminarse
  rationale: '''Se contaminaron'' conserva la idea de impureza ritual/moral que el inglés expresa con ''defiled themselves'' y enlaza bien con ''impureza'' al final de la frase.'
- source_word: uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - inmoralidad
  lexicon: impureza
  rationale: '''Impureza'' reproduce el campo semántico de ''uncleanness'' en un español bíblico claro y menos cargado que ''inmundicia'', manteniendo la tensión moral y cultual del texto.'
theological_decisions:
- issue: La causa múltiple del diluvio
  english_pob_reading: For because of these three things the flood came upon the earth
  chosen_spanish_reading: Porque a causa de estas tres cosas vino el diluvio sobre la tierra
  alternative_spanish_readings:
  - Pues por estas tres cosas vino el diluvio sobre la tierra
  - Porque por estas tres cosas vino el diluvio sobre la tierra
  rationale: Se conserva la relación causal explícita y el énfasis numérico de 'these three things'. 'A causa de' hace natural en español la fuerza explicativa sin perder solemnidad.
  doctrine_reference: Génesis 6:1–4; Judas 6
- issue: La unión sexual ilícita de los Vigilantes con mujeres humanas
  english_pob_reading: because of the fornication by which the Watchers defiled themselves with the daughters of men, taking for themselves wives from all whom they chose
  chosen_spanish_reading: por la fornicación con la cual los Vigilantes se contaminaron con las hijas de los hombres, tomando para sí mujeres de entre todas las que eligieron
  alternative_spanish_readings:
  - por la inmoralidad sexual con la cual los Vigilantes se contaminaron con las hijas de los hombres, tomando para sí mujeres de entre todas las que eligieron
  - por la fornicación con que los Vigilantes se profanaron al tomar mujeres de entre todas las que eligieron
  rationale: 'La redacción mantiene la lectura del POB: la causa del juicio es una transgresión sexual concreta, descrita con el lenguaje del texto. No se suaviza ni se reinterpreta como mera desobediencia general.'
  doctrine_reference: Génesis 6:2, 4; 2 Pedro 2:4; Judas 6
- issue: Inicio de la impureza
  english_pob_reading: and they made a beginning of uncleanness
  chosen_spanish_reading: y comenzaron una impureza
  alternative_spanish_readings:
  - e iniciaron la impureza
  - y dieron comienzo a la impureza
  rationale: Se conserva la idea de inicio o inauguración de una condición de impureza. La construcción española es algo condensada, pero refleja la estructura breve del original sin añadir contenido.
  doctrine_reference: Levítico 11–15; Jubileos 7–8
translation_notes:
  revision_awareness: 'El texto de base coincide con la última revisión: no hubo cambios necesarios y el juicio de revisión indica acuerdo alto. La versión española conserva esa estabilidad, sin introducir glosas interpretativas no respaldadas por el pasaje o por el POB inglés.'
  spanish_consistency_notes:
  - Se usa 'Vigilantes' con mayúscula por tratarse de un nombre técnico del grupo en el relato.
  - Se mantiene 'Yahvé' como convención del proyecto solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - '''Fornicación'' e ''impureza'' se mantienen como par léxico coherente para reflejar la progresión moral del versículo.'
  - La puntuación con dos puntos tras 'a saber' reproduce la enumeración explicativa del inglés POB.
