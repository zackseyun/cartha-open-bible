translation:
  language: es
  text: Porque la tierra no será purificada de la sangre derramada sobre ella[b]; solo por la sangre de quien la derramó será purificada la tierra por todas sus generaciones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «excepto por la sangre de quien la derramó será purificada la tierra»; la lectura inglesa previa señaló esta alternativa restrictiva.
    reason: previous_rendering
  - marker: b
    text: O «de la sangre derramada sobre ella, solo»; la puntuación puede entenderse como restrictiva sobre el verbo o sobre el complemento.
    reason: previous_rendering
lexical_decisions:
- source_word: blood
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - vida
  - derramamiento de sangre
  lexicon: blood
  rationale: «Sangre» conserva el valor sacrificial y jurídico del enunciado. En español, «derramamiento de sangre» puede explicar la acción, pero el texto contrasta la sangre derramada con la sangre del homicida, así que la forma breve mantiene la correspondencia semántica.
- source_word: cleansed
  english_pob_choice: be cleansed
  chosen_spanish: ser purificada
  alternatives_spanish:
  - ser limpiada
  - ser expiada
  lexicon: cleanse
  rationale: «Purificada» comunica bien la idea ritual/moral de limpieza de culpa en un contexto de sangre. «Limpiada» suena más genérica; «expiada» introduce un matiz más técnico que el español lector general puede no captar de inmediato.
- source_word: shed upon it
  english_pob_choice: that is shed upon it
  chosen_spanish: derramada sobre ella
  alternatives_spanish:
  - vertida sobre ella
  - derramada en ella
  lexicon: shed
  rationale: «Derramada» es el equivalente natural para sangre en español bíblico moderno y conserva la imagen de sangre derramada sobre la tierra.
- source_word: only by
  english_pob_choice: only by
  chosen_spanish: sólo por
  alternatives_spanish:
  - únicamente por
  - excepto por
  lexicon: only by
  rationale: La revisión inglesa resolvió la tensión sintáctica usando «only by». «Sólo por» transmite la misma restricción en español sin introducir una construcción poco natural.
- source_word: the one who shed it
  english_pob_choice: the one who shed it
  chosen_spanish: quien la derramó
  alternatives_spanish:
  - el que la derramó
  - el derramador de ella
  lexicon: the one who shed it
  rationale: «Quien la derramó» mantiene la referencia personal sin rigidizarla. El pronombre «la» remite naturalmente a «sangre» en español.
- source_word: generations
  english_pob_choice: throughout all its generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a través de todas sus generaciones
  - por todas las generaciones
  lexicon: generations
  rationale: La fórmula conserva el alcance temporal total de la frase inglesa y suena suficientemente bíblica y natural en español.
theological_decisions:
- issue: Relación entre la sangre derramada y la purificación de la tierra
  english_pob_reading: The earth will not be cleansed from the blood that is shed upon it; only by the blood of the one who shed it will the earth be cleansed.
  chosen_spanish_reading: La tierra no será purificada de la sangre derramada sobre ella; sólo por la sangre de quien la derramó será purificada la tierra.
  alternative_spanish_readings:
  - La tierra no será purificada sino por la sangre de quien la derramó
  - La tierra no será limpiada de la sangre derramada sobre ella
  rationale: 'Se conserva la tensión retributiva del texto: la sangre derramada contamina la tierra, y la purificación se vincula a la sangre del responsable. No se suaviza a una formulación meramente moral o metafórica.'
  doctrine_reference: Justicia retributiva y contaminación por sangre en legislación bíblica
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente sustituyó «except by» por «only by» para resolver la tensión sintáctica, y luego ajustó la puntuación con punto y coma para separar las cláusulas. La versión española sigue esa misma decisión: mantiene la restricción con «sólo por» y separa las dos proposiciones con punto y coma.'
  spanish_consistency_notes:
  - Se usa «tierra» para earth, sin reinterpretarla como «suelo» o «mundo».
  - Se conserva la repetición de «purificada» para reflejar el paralelismo del inglés y del sentido fuente.
  - El pronombre de objeto directo femenino «la» retoma «sangre» de manera natural en español.
  - Se prefiere «sólo» como restrictivo, en correspondencia con la lectura revisada del inglés POB.
