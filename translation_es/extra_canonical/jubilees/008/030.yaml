lexical_decisions:
- source_word: sons of Ham
  english_pob_choice: sons of Ham
  chosen_spanish: los hijos de Cam
  alternatives_spanish:
  - los descendientes de Cam
  - la descendencia de Cam
  lexicon: Cam / nombre propio bíblico
  rationale: La relación genealógica se expresa de manera directa y natural en español con «los hijos de Cam». «Descendientes» sería posible, pero el texto enumera hijos como encabezado genealógico, por lo que conviene mantener esa forma.
- source_word: Cush
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  lexicon: topónimo/etnónimo bíblico
  rationale: Se conserva el nombre propio en forma española habitual «Cus», que es clara y readable en español bíblico.
- source_word: Mizraim
  english_pob_choice: Mizraim
  chosen_spanish: Mizraim
  alternatives_spanish:
  - Mizraím
  lexicon: topónimo/etnónimo bíblico
  rationale: Se mantiene el nombre propio en su forma bíblica reconocible. La variante acentuada «Mizraím» también sería posible en español, pero aquí se prefiere la forma más estable en listados genealógicos.
- source_word: Put
  english_pob_choice: Put
  chosen_spanish: Put
  alternatives_spanish:
  - Put
  lexicon: topónimo/etnónimo bíblico
  rationale: Se conserva el nombre propio sin adaptación adicional, siguiendo la forma breve y reconocible del texto fuente.
- source_word: Canaan
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canaan
  lexicon: topónimo bíblico
  rationale: Se usa la forma española asentada «Canaán», que es la más transparente y reconocible para lectores en español.
theological_decisions:
- issue: Lista genealógica sin expansión interpretativa
  english_pob_reading: 'And the sons of Ham: Cush and Mizraim and Put and Canaan.'
  chosen_spanish_reading: 'Y los hijos de Cam: Cus, Mizraim, Put y Canaán.'
  alternative_spanish_readings:
  - 'Y de Cam: Cus, Mizraim, Put y Canaán.'
  - Los descendientes de Cam fueron Cus, Mizraim, Put y Canaán.
  rationale: El versículo es una enumeración genealógica simple. No se añade glosa ni se reordena la relación familiar; se mantiene la estructura de encabezado seguida por la lista de nombres.
  doctrine_reference: Génesis 10:6; 1 Crónicas 1:8
translation_notes:
  revision_awareness: El texto en inglés de la POB y la revisión más reciente coinciden sin cambios; no hay notas ni variantes textuales documentadas para este versículo. La traducción española sigue directamente la lectura estable del registro auditado.
  spanish_consistency_notes:
  - Se mantiene el orden enumerativo del original y del inglés POB.
  - Se conservan los nombres propios bíblicos en formas españolas estándar cuando están firmemente asentadas (Cam, Cus, Canaán) y en forma bíblica estable cuando conviene a la uniformidad genealógica (Mizraim, Put).
  - No se introducen mayúsculas ni glosas adicionales, porque el versículo funciona como una lista genealógica breve.
