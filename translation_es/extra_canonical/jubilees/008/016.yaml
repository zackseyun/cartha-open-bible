base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/016.yaml
  text: And it goes toward the border of this river, and it goes toward the east until it approaches the garden of Eden, toward its north, to the north, and from the east of all the land of Eden, and to all the east, and it turns within the east and comes until it approaches the east of the mountain whose name is
  footnotes:
  - marker: a
    text: Or 'along the road of Dungagu to the river, and it goes along the road eastward'.
    reason: previous_rendering
  - marker: b
    text: Or 'toward the northeast and to all the land of Eden'.
    reason: previous_rendering
  - marker: c
    text: Or 'eastward to the mountain'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: Replaced the draft, which omitted most of the Ge'ez place and direction terms and introduced unsupported references to the Great Sea, Africa, and the river Gihon. Revised to more closely follow the source wording and sequence, preserving the incomplete ending.
translation:
  language: es
  text: Y va hacia el borde de este río, y va hacia el oriente hasta que se acerca al jardín de Edén, hacia su norte, al norte, y desde el oriente de toda la tierra de Edén, y a todo el oriente, y gira dentro del oriente y llega hasta que se acerca al oriente del monte cuyo nombre es
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መንገበ፡ ድንጋጉ፡ ለዝ፡ ፈለግ።
  english_pob_choice: toward the border of this river
  chosen_spanish: hacia el borde de este río
  alternatives_spanish:
  - hacia la ribera de este río
  - hacia el límite de este río
  lexicon: dengag = border/boundary/edge; falag = river
  rationale: ‘Borde’ conserva la idea espacial de límite o margen sin introducir una localización técnica más precisa de la que da el ge'ez. ‘Ribera’ también sería posible, pero ‘borde’ sigue mejor la relación de borde/límite indicada por el texto y por la corrección del audit trail.
- source_word: ወተሐውር፡ መንገበ፡' ጽባሕ፡
  english_pob_choice: and it goes toward the east
  chosen_spanish: y va hacia el oriente
  alternatives_spanish:
  - y va hacia el este
  - y se dirige al oriente
  lexicon: sebahi = east/orient
  rationale: ‘Oriente’ es natural en español bíblico y mantiene el valor direccional sin perder el matiz geográfico del original. ‘Este’ sería igualmente válido, pero ‘oriente’ conserva mejor el registro solemne.
- source_word: ኀበ፡ *ገነት፡ ዘኤዶም፡
  english_pob_choice: the garden of Eden
  chosen_spanish: el jardín de Edén
  alternatives_spanish:
  - el huerto de Edén
  - el jardín del Edén
  lexicon: ganet = garden/paradise
  rationale: ‘Jardín de Edén’ es claro y corresponde al valor básico de ‘garden’. ‘Huerto’ es posible en tradición bíblica, pero ‘jardín’ evita imponer una formulación más fijada de otra tradición cuando el texto solo pide el sentido de un recinto plantado.
- source_word: መንገበ፡ ሰሜኑ፡ ለሰሜን፡
  english_pob_choice: toward its north, to the north
  chosen_spanish: hacia su norte, al norte
  alternatives_spanish:
  - hacia el norte de él, al norte
  - hacia su lado norte, al norte
  lexicon: samen = north
  rationale: La doble dirección del ge'ez se conserva con una repetición española igualmente explícita. ‘Hacia su norte’ suena algo literal, pero refleja bien el énfasis direccional del original y del audit trail.
- source_word: ወእምጽባሒሃ፡ ለኵላ፡ ምድረ፡ ኤዶም፡
  english_pob_choice: and from the east of all the land of Eden
  chosen_spanish: y desde el oriente de toda la tierra de Edén
  alternatives_spanish:
  - y desde el este de toda la tierra de Edén
  - y desde la parte oriental de toda la tierra de Edén
  lexicon: sebahiha = its east/from its east
  rationale: ‘Desde el oriente’ expresa con claridad el valor locativo/oriental del sintagma y conserva la relación con ‘tierra de Edén’. No se reduce a ‘noreste’, porque esa simplificación fue corregida en el audit trail.
- source_word: ወለኵሉ፡ ጽባሕ፡
  english_pob_choice: and to all the east
  chosen_spanish: y a todo el oriente
  alternatives_spanish:
  - y a todo el este
  - y hacia todo el oriente
  lexicon: sebahi = east/orient
  rationale: ‘A todo el oriente’ refleja el alcance total del movimiento direccional sin reinterpretarlo como una sola dirección cardinal más estrecha.
- source_word: ወይትመየጥ፡ ውስተ፡ ጽባሕ፡
  english_pob_choice: and it turns within the east
  chosen_spanish: y se vuelve dentro del oriente
  alternatives_spanish:
  - y gira dentro del oriente
  - y da vuelta dentro del oriente
  lexicon: temayeg = turn/return
  rationale: ‘Se vuelve’ mantiene el sentido de cambio de dirección sin añadir una imagen mecánica más fuerte. ‘Dentro del oriente’ sigue la estructura del original, aunque suene algo sobrio, porque el texto preserva la secuencia topográfica.
- source_word: ወይመጽእ፡ እስከ፡ ይቀርብ፡ መንገበ፡ ጽባሒሁ፡ ለደብር፡ ዘስሙ፡
  english_pob_choice: and comes until it approaches the east of the mountain whose name is
  chosen_spanish: y llega hasta que se acerca al oriente del monte cuyo nombre es
  alternatives_spanish:
  - y viene hasta que se acerca al oriente del monte cuyo nombre es
  - y llega hasta acercarse al oriente del monte cuyo nombre es
  lexicon: dabr = mountain
  rationale: '‘Monte’ es el equivalente natural y bíblico en español para ‘mountain’. ‘Al oriente del monte’ sigue la corrección del audit trail: no es ‘hacia el monte’, sino una relación de orientación respecto del monte.'
theological_decisions:
- issue: Conservar el cierre incompleto del verso
  english_pob_reading: 'the verse ends mid-phrase: ''whose name is'''
  chosen_spanish_reading: 'el verso queda incompleto: ''cuyo nombre es'''
  alternative_spanish_readings:
  - cerrar la frase de manera interpretativa
  - suplir el nombre ausente
  rationale: El texto fuente y el audit trail terminan abruptamente; completar el nombre sería inventar información no presente en el testimonio. Mantener la interrupción respeta la evidencia textual y la transparencia editorial.
  doctrine_reference: Principio de fidelidad textual y no-adición (cf. Ap 22:18 como principio general, sin usarlo como fuente del verso).
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrige errores importantes del borrador anterior: se eliminó cualquier referencia a camino/road, al Mar Grande, a África y al Gihón; se preservó la secuencia direccional del ge''ez y el final truncado. También se incorporó la corrección de que el término inicial expresa borde/límite del río, no un nombre propio.'
  spanish_consistency_notes:
  - Se mantiene 'Edén' con mayúscula como topónimo.
  - Se usa 'oriente' de forma consistente para el eje direccional principal, evitando alternar innecesariamente con 'este'.
  - '''Monte'' se emplea para el final del verso porque el texto habla de un monte sin dar aún su nombre.'
  - No se añadieron notas al pie porque el verso no requiere alternativas textuales ancladas en esta sección y el cierre truncado ya queda visible en el cuerpo del texto.
