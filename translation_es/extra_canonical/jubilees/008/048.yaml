translation:
  language: es
  text: 'Y ahora, hijos míos, escuchen: hagan justicia y rectitud, para que sean plantados en rectitud sobre la faz de toda la tierra, y su gloria sea levantada delante de mi Dios, que me salvó de las aguas del diluvio.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: listen
  english_pob_choice: listen
  chosen_spanish: escuchen
  alternatives_spanish:
  - oigan
  - presten atención
  lexicon: escuchar / oír
  rationale: El imperativo busca una apelación directa y solemne; «escuchen» comunica bien la exhortación y mantiene el tono discursivo de la fuente.
- source_word: do justice and righteousness
  english_pob_choice: do justice and righteousness
  chosen_spanish: hagan justicia y rectitud
  alternatives_spanish:
  - practiquen justicia y rectitud
  - hagan justicia y justicia
  lexicon: justicia / rectitud
  rationale: Se conserva la pareja ética de la traducción inglesa. «Rectitud» ayuda a distinguir el segundo término sin forzar una repetición poco natural en español.
- source_word: be planted
  english_pob_choice: be planted
  chosen_spanish: sean plantados
  alternatives_spanish:
  - se establezcan
  - se arraiguen
  lexicon: plantar / ser plantado
  rationale: La imagen agrícola debe mantenerse; «sean plantados» conserva la pasiva y la metáfora de implantación en justicia.
- source_word: face of the whole earth
  english_pob_choice: face of the whole earth
  chosen_spanish: la faz de toda la tierra
  alternatives_spanish:
  - el rostro de toda la tierra
  - sobre toda la tierra
  lexicon: faz / tierra
  rationale: «La faz de toda la tierra» es una expresión idiomática reverente y muy cercana a la formulación de la fuente, sin perder inteligibilidad.
- source_word: glory may be lifted up
  english_pob_choice: your glory may be lifted up
  chosen_spanish: su gloria sea levantada
  alternatives_spanish:
  - su gloria sea exaltada
  - su gloria sea elevada
  lexicon: levantar / gloria
  rationale: «Sea levantada» preserva la imagen de elevación y evita introducir un matiz más interpretativo que «exaltada».
- source_word: my God
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios y Señor
  lexicon: Dios
  rationale: Se sigue el valor simple de posesión relacional de la fuente, sin añadir títulos no presentes.
- source_word: waters of the flood
  english_pob_choice: waters of the flood
  chosen_spanish: las aguas del diluvio
  alternatives_spanish:
  - las aguas del cataclismo
  - las aguas del aluvión
  lexicon: diluvio / aguas
  rationale: «Diluvio» es el equivalente más natural y tradicional para el evento del juicio por aguas, manteniendo el sentido bíblico reconocido.
theological_decisions:
- issue: Ethical pairing of justice/righteousness
  english_pob_reading: do justice and righteousness
  chosen_spanish_reading: hagan justicia y rectitud
  alternative_spanish_readings:
  - practiquen justicia y rectitud
  - hagan justicia y justicia
  rationale: La formulación conserva la doble exigencia moral sin colapsar los dos términos en uno solo. «Rectitud» permite respetar la posible distinción semántica entre acción justa y conformidad recta.
  doctrine_reference: ética bíblica; justicia y rectitud como respuesta pactal
- issue: Imagery of being planted in righteousness
  english_pob_reading: so that you may be planted in righteousness
  chosen_spanish_reading: para que sean plantados en rectitud
  alternative_spanish_readings:
  - para que sean arraigados en rectitud
  - para que sean establecidos en rectitud
  rationale: Se preserva la metáfora de plantación, importante para la retórica del pasaje. No se sustituye por una explicación abstracta.
  doctrine_reference: imagen de arraigo/plantación en la justicia de Dios
- issue: Divine deliverance from the flood waters
  english_pob_reading: who saved me from the waters of the flood
  chosen_spanish_reading: que me salvó de las aguas del diluvio
  alternative_spanish_readings:
  - que me libró de las aguas del diluvio
  - que me rescató de las aguas del diluvio
  rationale: «Salvó» reproduce bien la acción divina reportada en la fuente y mantiene el vínculo con la narración del diluvio.
  doctrine_reference: salvación divina; preservación de Noé
translation_notes:
  revision_awareness: La fuente original ge'ez está vacía en el paquete disponible; por tanto, esta redacción se basa en el texto inglés POB auditado, que fue revisado y confirmado sin cambios en el último pase. No se detectaron variantes que requirieran nota textual adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí la fuente auditada dice «my God»; por fidelidad al texto se usa «mi Dios».
  - Se preserva un registro solemne y bíblico sin recurrir a calcos excesivamente rígidos.
  - No se añadieron notas al pie porque el texto inglés no presentaba notas ni alternativas significativas en este versículo.
