translation:
  language: es
  text: y un hombre contra su prójimo. Y todos se vendieron para hacer iniquidad y derramar mucha sangre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሰብእሂ፡ ቢጾ።
  english_pob_choice: and a man his neighbor.
  chosen_spanish: y un hombre a su prójimo.
  alternatives_spanish:
  - y un hombre contra su prójimo
  - y un hombre a su vecino
  lexicon: Heb./Ge'ez relational phrase; proximate sense of interpersonal hostility
  rationale: La expresión apunta a la relación humana inmediata, con valor distributivo o recíproco. 'Prójimo' conserva la cercanía interpersonal y permite la ambigüedad del original entre referencia a cada hombre con otro hombre y el contexto de violencia mutua.
- source_word: ተሰይጠ፡
  english_pob_choice: sold himself
  chosen_spanish: se vendieron
  alternatives_spanish:
  - se entregaron
  - se dieron por vendidos
  lexicon: sell oneself = self-alienation / self-subjection
  rationale: El verbo español 'venderse' conserva la fuerza moral de autonegación y entrega voluntaria al mal. El plural sigue el sujeto colectivo 'todos' del texto fuente.
- source_word: ይግበር፡ ዐመፃ፡
  english_pob_choice: to do iniquity
  chosen_spanish: para hacer iniquidad
  alternatives_spanish:
  - para practicar maldad
  - para cometer injusticia
  lexicon: iniquity, wrongdoing
  rationale: '''Iniquidad'' reproduce la densidad moral del término sin reducirlo a un solo acto aislado; ''hacer'' mantiene la construcción final final del original y del inglés POB.'
- source_word: ይክዐው፡ ደመ፡ ብዙኀ፡
  english_pob_choice: to shed much blood
  chosen_spanish: derramar mucha sangre
  alternatives_spanish:
  - derramar mucha sangre
  - verter mucha sangre
  lexicon: shed blood
  rationale: '''Derramar sangre'' es la equivalencia natural en español para el hebraísmo de violencia homicida. ''Mucha'' preserva el cuantificador intensivo del original y del inglés.'
theological_decisions:
- issue: 'Relational phrase: ''a man his neighbor'''
  english_pob_reading: and a man his neighbor.
  chosen_spanish_reading: y un hombre a su prójimo.
  alternative_spanish_readings:
  - y un hombre contra su prójimo
  - y un hombre con su prójimo
  rationale: No se explicita en el texto una relación gramatical completa; la formulación breve debe conservar la tensión del original. 'A su prójimo' mantiene la referencia interpersonal sin forzar una interpretación única (hostilidad, proximidad o mutua referencia).
  doctrine_reference: ética de la violencia humana y responsabilidad interpersonal
translation_notes:
  revision_awareness: 'El audio-trail inglés incluido en el paquete está desalineado con el texto ge''ez, y además hay una revisión previa que documenta esa desalineación como mistranslation. Por eso la redacción española sigue directamente el Ge''ez: un enunciado breve sobre el prójimo, la autoentrega al mal y el derramamiento de mucha sangre, sin importar la frase inglesa errónea de Ham/Noé.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiriera; aquí no aparece ningún nombre divino.
  - '''Iniquidad'' se conservó por la carga moral/jurídica del pasaje.'
  - No se introdujo 'Cristo', 'Señor' ni otros términos no presentes en la fuente.
  - 'La sintaxis española mantiene paralelismo con el original: relación humana / autoentrega / propósito moral / violencia sanguinaria.'
