  text: For Shem and for his sons to possess it forever, for his generations forever. And Noah rejoiced because this portion came forth for Shem and for his sons, and he remembered all that he had spoken with his mouth in prophecy, for he said, “Blessed be the Lord God of Shem, and may he dwell...
  footnotes:
