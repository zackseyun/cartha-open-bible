revisions:
- from: 'Para Sem y para sus hijos, para poseerla para siempre, por sus generaciones para siempre. Y Noé se alegró porque esta porción salió para Sem y para sus hijos, y recordó todo lo que había hablado con su boca en profecía, pues dijo: «Bendito sea Yahvé, Dios de Sem, y que habite…»'
  to: 'Fue para Sem y para sus hijos, para que la poseyeran[a] para siempre, por sus generaciones para siempre. Y Noé se alegró porque esta porción le correspondió a Sem y a sus hijos, y recordó todo lo que había hablado con su boca en profecía, pues dijo: «Bendito sea Yahvé, Dios de Sem, y que habite…»'
  rationale: Se suavizó la sintaxis inicial para hacerla natural en español sin perder el infinitivo final del ge'ez ('para que la poseyeran'). Se cambió 'salió para Sem' por 'le correspondió a Sem' para expresar mejor la idea de reparto de una porción. Se añadió una nota con la variante documentada en el audit trail inglés. Se mantuvo 'Yahvé' conforme a la terminología del proyecto y la elipsis final del texto truncado.
