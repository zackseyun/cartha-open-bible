translation:
  language: es
  text: 'Y por sorteo le tocó a Sem la parte central de la tierra, la cual debía tomar como herencia para sí y para sus hijos por generaciones para siempre: desde la mitad de la cordillera de Rafa, desde la boca[a] de las aguas que salen del río Tina.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desembocadura». El texto conserva una imagen topográfica antigua literalmente «boca de las aguas».
    reason: Preservar la alternativa más idiomática usada en el borrador previo, a la vez que se explica por qué el texto principal mantiene una formulación más cercana a la imagen fuente.
lexical_decisions:
- source_word: by lot
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - por lote
  lexicon: suerte / sorteo
  rationale: Conserva la imagen de asignación por designación aleatoria o repartición providencial sin introducir una interpretación más fuerte que el texto. "Por sorteo" es natural y transparente en español para este tipo de reparto.
- source_word: the middle of the earth
  english_pob_choice: the middle of the earth
  chosen_spanish: el medio de la tierra
  alternatives_spanish:
  - el centro de la tierra
  - la parte central de la tierra
  lexicon: medio / centro
  rationale: Mantiene la correspondencia directa con "middle" sin precisar más de lo que el pasaje ofrece. "Centro" podría sonar más idiomático, pero "medio" conserva mejor la forma y la amplitud del original.
- source_word: inheritance
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - posesión
  - patrimonio
  lexicon: herencia
  rationale: '"Herencia" reproduce el valor patrimonial/jurídico del término y encaja bien con la concesión territorial del pasaje.'
- source_word: for generations forever
  english_pob_choice: for generations forever
  chosen_spanish: por generaciones para siempre
  alternatives_spanish:
  - por generaciones eternas
  - por todas las generaciones
  lexicon: generaciones / forever
  rationale: Refleja la secuencia de duración del inglés POB sin domesticar la fuerza de permanencia. "Para siempre" traduce la idea de perpetuidad sin convertirla en una paráfrasis teológica.
- source_word: the mountain range of Rafa
  english_pob_choice: the mountain range of Rafa
  chosen_spanish: la cordillera de Rafa
  alternatives_spanish:
  - la cadena montañosa de Rafa
  - el macizo de Rafa
  lexicon: topografía
  rationale: '"Cordillera" es el equivalente geográfico más natural para "mountain range" y mantiene el nombre propio tal como aparece en el texto fuente/auditado.'
- source_word: from the mouth of the waters
  english_pob_choice: from the mouth of the waters
  chosen_spanish: desde la desembocadura de las aguas
  alternatives_spanish:
  - desde la boca de las aguas
  - desde el desagüe de las aguas
  lexicon: boca / desembocadura
  rationale: '"Desembocadura" preserva la imagen de salida de aguas en español de forma clara y respetuosa, evitando un calco menos idiomático como "boca".'
- source_word: river Tina
  english_pob_choice: river Tina
  chosen_spanish: el río Tina
  alternatives_spanish:
  - el río Tína
  lexicon: topónimo
  rationale: Conserva el nombre propio del río según el inglés auditado, con artículo castellano natural.
theological_decisions:
- issue: Reparto por sorteo como asignación providencial de territorio
  english_pob_reading: And by lot there came out for Shem...
  chosen_spanish_reading: Y por sorteo le tocó a Sem...
  alternative_spanish_readings:
  - Y por suerte le correspondió a Sem...
  - Y por sorteo salió para Sem...
  rationale: La formulación destaca el acto de asignación sin introducir sujeto explícito añadido. "Le tocó" transmite el resultado del sorteo con naturalidad y mantiene la pasividad implícita del original.
  doctrine_reference: Providencia divina y reparto de la herencia territorial
- issue: Duración perpetua de la herencia
  english_pob_reading: for generations forever
  chosen_spanish_reading: por generaciones para siempre
  alternative_spanish_readings:
  - por generaciones eternas
  - por todas las generaciones
  rationale: Se conserva la afirmación de permanencia sin suavizarla a un mero largo plazo. La expresión no resuelve la tensión entre tiempo genealógico y perpetuidad absoluta, sino que la deja visible como en el fuente.
  doctrine_reference: Permanencia de la posesión concedida
- issue: Límite geográfico específico con nombres propios
  english_pob_reading: from the middle of the mountain range of Rafa, from the mouth of the waters from the river Tina
  chosen_spanish_reading: desde la mitad de la cordillera de Rafa, desde la desembocadura de las aguas del río Tina
  alternative_spanish_readings:
  - desde el centro de la cordillera de Rafa, desde la boca de las aguas del río Tina
  rationale: Se respeta el encadenamiento de localizaciones y se evita armonizar o explicar los límites geográficos más allá de lo que el texto aporta.
  doctrine_reference: Geografía tradicional de la distribución hereditaria
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: "And by lot there came out..." fue suavizado respecto de la versión anterior, y "for generations forever" reemplaza "for the generations of eternity". La versión española refleja esa fluidez con "Y por sorteo le tocó a Sem... por generaciones para siempre" sin perder la fuerza de permanencia.'
  spanish_consistency_notes:
  - Se mantiene "Sem" para Shem conforme al uso español bíblico habitual y al audit trail inglés.
  - Se conserva "Yahvé" como norma del proyecto solo cuando el nombre divino aparece; en este versículo no aplica.
  - No se introduce ningún término eclesiástico no sustentado por el texto; la herencia se trata como patrimonio territorial.
  - La puntuación con dos puntos reproduce la enumeración topográfica del inglés auditado.
