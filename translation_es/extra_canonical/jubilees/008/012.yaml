  to: 'Y por sorteo le tocó a Sem la parte central de la tierra, la cual debía tomar como herencia para sí y para sus hijos por generaciones para siempre: desde la mitad de la cordillera de Rafa, desde la boca[a] de las aguas que salen del río Tina.'
  rationale: Se ajusta el español para que sea más natural y, al mismo tiempo, más fiel a la imagen geográfica del texto auditado. «La parte central» mejora la legibilidad respecto de «el medio», y «la boca de las aguas que salen del río Tina» evita la posible sobreinterpretación de «desembocadura» como el final del río. Se añade una nota breve para conservar la alternativa española más idiomática sin perder la metáfora espacial del original.
