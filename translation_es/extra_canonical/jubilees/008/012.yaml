  language: en
  yaml_path: translation/extra_canonical/jubilees/008/012.yaml
  text: 'And by lot there came out for Shem the middle of the earth, which he was to take as an inheritance for himself and for his sons for generations forever: from the middle of the mountain range of Rafa, from the mouth of the waters from the river Tina.'
  revision_pass:
