base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/051.yaml
  text: Let them bring up in abundance the first of the wine and oil as firstfruits to the altar of Yahweh, who receives it; and what is left let the slaves of the house of Yahweh eat before the altar that receives it.
  revision_pass:
    model: gpt-5.4-mini
