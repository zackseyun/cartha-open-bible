    rationale: La POB inglesa dice «the first of the wine and oil as firstfruits». En español, repetir «primicias» en sustantivo y complemento vuelve la frase pesada y menos natural. «Lo primero del vino y del aceite como primicias» conserva mejor la relación semántica sin parafrasear en exceso.
  revised_spanish_text: Que traigan en abundancia lo primero del vino y del aceite como primicias al altar de Yahvé, que la recibe; y lo que quede, que lo coman los esclavos de la casa de Yahvé delante del altar que la recibe.
  revision_rationale: Se hizo una reparación menor para mejorar la naturalidad y ajustar mejor la estructura semántica de «the first ... as firstfruits», evitando la duplicación innecesaria de «primicias». Se conservaron «Yahvé», «esclavos» y la repetición de «que la recibe» por fidelidad al inglés POB auditado.
