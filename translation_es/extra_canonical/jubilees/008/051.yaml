    unchanged: false
    changes_summary: Replaced LORD with Yahweh for consistency with POB policy, and changed servants to slaves to reflect the mandated rendering where applicable.
translation:
  language: es
  text: Que traigan en abundancia lo primero del vino y del aceite como primicias al altar de Yahvé, que la recibe; y lo que quede, que lo coman los esclavos de la casa de Yahvé delante del altar que la recibe.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: firstfruits
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - ofrenda de primicias
  - primeros frutos
  lexicon: —
  rationale: En español bíblico, «primicias» expresa de manera natural la ofrenda inicial consagrada a Dios; se mantiene además la repetición conceptual de la fuente inglesa con «ofrenda de primicias».
- source_word: wine
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - mosto
  lexicon: —
  rationale: «Vino» es la equivalencia estándar y más transparente en español para el producto mencionado por la fuente.
- source_word: oil
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  lexicon: —
  rationale: La fuente habla de «oil» de forma general; en español «aceite» conserva esa generalidad sin añadir especificación no explicitada.
- source_word: altar of Yahweh
  english_pob_choice: altar of Yahweh
  chosen_spanish: altar de Yahvé
  alternatives_spanish:
  - altar del Señor
  lexicon: —
  rationale: 'Se sigue la política del proyecto para יהוה/YHWH: «Yahvé» en el texto principal, manteniendo la referencia cultual directa del altar.'
- source_word: who receives it
  english_pob_choice: who receives it
  chosen_spanish: que la recibe
  alternatives_spanish:
  - que lo recibe
  - que lo acepta
  lexicon: —
  rationale: El antecedente inmediato es «ofrenda de primicias», femenino en español; «la recibe» conserva el sentido de aceptación/recepción sin introducir matices ajenos.
- source_word: slaves
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: —
  rationale: La POB inglesa fijó «slaves» por fuerza léxica; en español «esclavos» preserva esa dureza semántica mejor que «siervos».
- source_word: house of Yahweh
  english_pob_choice: house of Yahweh
  chosen_spanish: casa de Yahvé
  alternatives_spanish:
  - casa del Señor
  lexicon: —
  rationale: Se mantiene la terminología del templo/santuario según la política de traducción del nombre divino en este proyecto.
- source_word: before the altar
  english_pob_choice: before the altar
  chosen_spanish: delante del altar
  alternatives_spanish:
  - ante el altar
  lexicon: —
  rationale: «Delante del altar» es idiomático en español y conserva la relación espacial/ritual sin alterar el sentido.
theological_decisions:
- issue: Nombre divino en la escena cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: La política del proyecto requiere no enmascarar el nombre divino; por eso se traduce consistentemente con «Yahvé» en el cuerpo del texto.
  doctrine_reference: Tetragrámaton / política POB para יהוה
- issue: Derecho semántico de δοῦλος / 'slaves'
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  rationale: La lectura inglesa documenta una decisión lexical deliberada para conservar la fuerza social y jurídica del término; la española sigue esa decisión para no suavizarla indebidamente.
  doctrine_reference: Lexicografía bíblica / equivalencia semántica
- issue: Repetición de 'who receives it' y 'altar that receives it'
  english_pob_reading: who receives it; ... altar that receives it
  chosen_spanish_reading: que la recibe; ... altar que la recibe
  alternative_spanish_readings:
  - que la acepta; ... altar que la acepta
  rationale: Se preserva la repetición del original y de la POB inglesa para reflejar la relación cultual entre ofrenda y altar sin resolverla en una sola fórmula más libre.
  doctrine_reference: Estilo de repetición retórica / fidelidad estructural
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó 'LORD' por 'Yahweh' y 'servants' por 'slaves'; la presente propuesta sigue explícitamente esa revisión. No hay notas textuales añadidas porque el paquete fuente no ofrece variantes ni ambigüedades textuales adicionales para este versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para el nombre divino, en línea con la política del proyecto.
  - Se eligió «esclavos» en concordancia con la revisión inglesa y con la preferencia léxica mandatada cuando el contexto pide la fuerza de δοῦλος.
  - 'La estructura de la cláusula conserva el paralelismo del inglés POB: ofrenda al altar / lo que queda para consumo delante del altar.'
