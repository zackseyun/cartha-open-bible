    rationale: La variante 'cuadragésimo noveno' afecta al numeral del jubileo, no a la cláusula final; el marcador debe ir junto a 'vigésimo noveno'.
  revised_spanish_text: En el vigésimo noveno[a] jubileo, en la primera semana, en su primer año, Arpajsad tomó para sí una esposa, y su nombre fue Rasu'eja, la hija de Susán, la hija de Elam, y le dio a luz.
  revised_footnotes:
