    text: O 'cuadragésimo noveno'.
    reason: previous_rendering
  revision_rationale: Se reubicó la nota textual al numeral, que es donde realmente aplica la variante previa, y se puso en español. Además, se suavizó la cláusula final a 'y le dio a luz', que aunque sigue elipsis por el corte versicular, suena mejor que 'y ella le dio a luz' y preserva el vínculo con el siguiente versículo sin añadir contenido no atestiguado.
