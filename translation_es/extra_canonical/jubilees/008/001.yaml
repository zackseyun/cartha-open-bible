revisions:
- from: En el vigésimo noveno jubileo, en la primera semana, en su primer año, Arpajsad tomó para sí una esposa, y su nombre fue Rasu'eja, la hija de Susán, la hija de Elam, y ella le dio a luz[a].
  to: En el vigésimo noveno[a] jubileo, en la primera semana, en su primer año, Arpajsad tomó para sí una esposa, y su nombre fue Rasu'eja, la hija de Susán, la hija de Elam, y le dio a luz.
  rationale: Se reubicó la nota textual al numeral, que es donde realmente aplica la variante previa, y se puso en español. Además, se suavizó la cláusula final a 'y le dio a luz', que aunque sigue elipsis por el corte versicular, suena mejor que 'y ella le dio a luz' y preserva el vínculo con el siguiente versículo sin añadir contenido no atestiguado.
