    issue: Cláusula final española poco idiomática
    rationale: '''y ella le dio a luz'' queda sintácticamente incompleta en español y no suena natural como final de versículo. El original expresa que ella dio a luz en relación con él, pero el objeto pleno continúa en el versículo siguiente; en español conviene una formulación que pueda sostener el corte versicular sin sonar defectuosa.'
  - severity: low
