base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/001.yaml
  text: In the twenty-ninth jubilee, in the first week, in its first year, Arpachshad took a wife for himself, and her name was Rasu'eja, the daughter of Susan, the daughter of Elam, and she bore him
  footnotes:
  - marker: a
    text: Or 'forty-ninth'.
    reason: previous_rendering
  - marker: b
    text: Or 'and she bore to him.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:49Z'
    unchanged: false
    changes_summary: Added the final clause 'and she bore to him' to account for the concluding source words ወወለደት፡ ሎቱ፡, which were omitted in the draft. Kept the rest unchanged.
translation:
  language: es
  text: En el vigésimo noveno[a] jubileo, en la primera semana, en su primer año, Arpajsad tomó para sí una esposa, y su nombre fue Rasu'eja, la hija de Susán, la hija de Elam, y le dio a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuadragésimo noveno'.
    reason: previous_rendering
lexical_decisions:
- source_word: ወበ፬ሥራ፡ ... እዮቤልው፡
  english_pob_choice: In the twenty-ninth jubilee
  chosen_spanish: En el vigésimo noveno jubileo
  alternatives_spanish:
  - En el jubileo vigésimo noveno
  - En el vigésimo noveno jubileo[a]
  lexicon: jubileo
  rationale: El contexto editorial corrige el OCR ge'ez que mostraba un número erróneo; la revisión auditada establece que el texto debe reflejar el vigésimo noveno jubileo. En español, 'vigésimo noveno' mantiene la cronología y el orden natural de la fórmula.
- source_word: በሱባዔ፡ ቀዳሚ፡
  english_pob_choice: in the first week
  chosen_spanish: en la primera semana
  alternatives_spanish:
  - en la semana primera
  lexicon: semana
  rationale: '''Semana'' expresa fielmente el sentido calendárico sin forzar un calco. Se conserva la secuencia temporal del original.'
- source_word: በቀዳሚሁ፡ ነሥአ፡
  english_pob_choice: in its first year, Arpachshad took
  chosen_spanish: en su primer año, Arpajsad tomó
  alternatives_spanish:
  - en su primer año, Arpajsad tomó para sí
  - en su primer año, Arpajsad recibió
  lexicon: tomar esposa
  rationale: El ge'ez indica que Arpachshad 'tomó' una esposa; se mantiene el verbo 'tomó' como en el audit trail inglés. Se conserva el sentido matrimonial sin suavizarlo a una formulación más interpretativa.
- source_word: ሎቱ፡ አርፋክስድ፡ ብእሲተ፡
  english_pob_choice: Arpachshad took a wife for himself
  chosen_spanish: Arpajsad tomó para sí una esposa
  alternatives_spanish:
  - Arpajsad tomó una esposa para sí
  - Arpajsad tomó mujer para sí
  lexicon: esposa
  rationale: '''Esposa'' comunica con claridad el valor relacional de ''wife'' y evita ambigüedad. ''Para sí'' refleja el dativo posesivo del original y del inglés POB.'
- source_word: ራሱእያ፡
  english_pob_choice: Rasu'eja
  chosen_spanish: Rasu'eja
  alternatives_spanish:
  - Rasueja
  - Rasú'eja
  lexicon: nombre propio
  rationale: Se conserva la transliteración auditada del nombre propio tal como aparece en el inglés POB. Se mantiene el apóstrofo para reflejar la segmentación del nombre y evitar normalización no atestiguada.
- source_word: ወለተ፡ ሱሳን፡ ወለተ፡ ኤላም፡
  english_pob_choice: the daughter of Susan, the daughter of Elam
  chosen_spanish: la hija de Susán, la hija de Elam
  alternatives_spanish:
  - la hija de Susan, hija de Elam
  - la hija de Susán, hija de Elam
  lexicon: hija de
  rationale: Se conserva la doble filiación explícita del original. 'Susán' ajusta la forma del nombre a una grafía castellana legible sin alterar la identificación. 'Hija de' mantiene la cadena genealógica del texto.
- source_word: ወወለደት፡ ሎቱ፡
  english_pob_choice: and she bore him
  chosen_spanish: y ella le dio a luz
  alternatives_spanish:
  - y ella le dio a luz[a]
  - y ella le dio a luz a él
  lexicon: dio a luz
  rationale: El verbo ge'ez expresa el nacimiento en relación con él; en español, 'dar a luz' es la forma natural y fiel. Se evita una traducción excesivamente literal que sonaría impropia en español bíblico contemporáneo.
theological_decisions:
- issue: Cronología del jubileo frente al error OCR
  english_pob_reading: In the twenty-ninth jubilee
  chosen_spanish_reading: En el vigésimo noveno jubileo
  alternative_spanish_readings:
  - En el cuadragésimo noveno jubileo
  rationale: La revisión textual auditada corrige el número leído erróneamente en el borrador. La traducción debe seguir la corrección crítica, no el OCR defectuoso.
  doctrine_reference: Crítica textual / transmisión del texto
- issue: Relación matrimonial expresada por 'took a wife for himself'
  english_pob_reading: Arpachshad took a wife for himself
  chosen_spanish_reading: Arpajsad tomó para sí una esposa
  alternative_spanish_readings:
  - Arpajsad se casó con una mujer
  - Arpajsad tomó una esposa
  rationale: Se conserva el verbo 'tomó' porque el original y el audit trail inglés lo mantienen; no se reemplaza por una formulación más interpretativa. 'Para sí' conserva la fuerza posesiva/dativa sin añadir doctrina implícita.
  doctrine_reference: Narrativa genealógica / matrimonio
- issue: Cláusula final de nacimiento
  english_pob_reading: and she bore him
  chosen_spanish_reading: y ella le dio a luz
  alternative_spanish_readings:
  - y le dio a luz
  - y ella le dio a luz a él
  rationale: La forma española debe expresar el acto de dar a luz sin forzar el objeto clítico en una frase extraña. Se respeta la nota del audit trail de que el objeto directo completo continúa en el siguiente versículo, por lo que no se añade nada más allá de lo atestiguado aquí.
  doctrine_reference: Narrativa genealógica / nacimiento
translation_notes:
  revision_awareness: Se siguió el texto ge'ez y el auditor inglés. La revisión crítica corrige el número a 'vigésimo noveno' porque el ge'ez contiene un probable error OCR; además, se incorporó la cláusula final de nacimiento que el borrador inglés había omitido inicialmente. La frase final en español se mantiene abierta para no duplicar el objeto que inicia el versículo siguiente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se mantiene 'Arpajsad' con grafía española coherente para el nombre propio, siguiendo la transliteración acostumbrada en POB.
  - Se evita 'Cristo/Mesías', 'SEÑOR' y otras terminologías no pertinentes a este versículo.
  - 'La sintaxis española conserva la secuencia temporal del original: jubileo > semana > año > matrimonio > genealogía > nacimiento.'
