translation:
  language: es
  text: Y haz una buena obra para tus almas, cubriendo lo que está derramado en la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: good deed
  english_pob_choice: good deed
  chosen_spanish: buena obra
  alternatives_spanish:
  - obra buena
  - acto bueno
  lexicon: good deed -> obra buena / buena obra
  rationale: La expresión inglesa es general y no introduce un término técnico específico; «buena obra» conserva naturalidad en español y mantiene el valor moral de la acción sin cargarla con una formulación más doctrinal de lo que exige el texto.
- source_word: souls
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - seres
  lexicon: soul -> alma
  rationale: «Almas» reproduce el término antropológico-religioso del original y del inglés POB, sin reducirlo a «vida» ni expandirlo innecesariamente.
- source_word: covering what is poured out
  english_pob_choice: covering what is poured out
  chosen_spanish: cubriendo lo que está derramado
  alternatives_spanish:
  - cubriendo lo derramado
  - cubriendo lo que ha sido derramado
  lexicon: cover / pour out -> cubrir / derramar
  rationale: La imagen de «cubrir» se conserva literalmente. «Lo que está derramado» refleja el estado resultante del derramamiento con una construcción natural en español, evitando una paráfrasis explicativa.
- source_word: face of the earth
  english_pob_choice: face of the earth
  chosen_spanish: sobre la superficie de la tierra
  alternatives_spanish:
  - sobre la faz de la tierra
  - en la superficie de la tierra
  lexicon: face of the earth -> superficie/faz de la tierra
  rationale: «Superficie de la tierra» comunica la imagen espacial con claridad moderna. Se evita depender de la expresión idiomática tradicional «faz de la tierra» para mantener un registro más transparente, aunque sigue siendo una alternativa válida.
theological_decisions:
- issue: El sentido de "good deed" como acción meritoria o simplemente benéfica
  english_pob_reading: And do a good deed for your souls
  chosen_spanish_reading: Y haz una buena obra para tus almas
  alternative_spanish_readings:
  - Y realiza una buena acción para tus almas
  - Y haz un acto bueno para tus almas
  rationale: Se mantiene la formulación abierta del inglés POB sin convertirla en una categoría doctrinal más específica. «Buena obra» deja el texto en su nivel moral-práctico, como hace el inglés.
  doctrine_reference: Soteriology / ethical exhortation
- issue: El alcance de "what is poured out" como referencia concreta o figurada
  english_pob_reading: what is poured out
  chosen_spanish_reading: lo que está derramado
  alternative_spanish_readings:
  - lo derramado
  - lo que ha sido derramado
  rationale: El texto inglés conserva la ambigüedad de la imagen; la versión española también la preserva sin identificar de manera explícita qué es lo derramado.
  doctrine_reference: Figurative language / ritual imagery
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios y que existe alto acuerdo con el control cruzado; por eso la traducción española sigue de cerca el valor semántico del inglés POB sin introducir expansión interpretativa.
