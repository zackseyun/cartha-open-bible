base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/022.yaml
  text: all the land of Eden, and all the land of the Erythraean Sea, and all the land of the east, and India, and on the Erythraean Sea and its mountains, and all the land of Bashan, and all the land of Lebanon and the islands of Caphtor, and all the mountains of Senir and Amana, and the mountains of Asshur in the north, and all the land of Elam, Asshur, and Babylon, and Susa and Media, and all the mountains of Ararat, and all the region beyond the sea beyond the mountains of Asshur toward the north—a blessed and spacious land, and all that is in it is very good.
  footnotes:
  - marker: a
    text: Or 'in the south'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
