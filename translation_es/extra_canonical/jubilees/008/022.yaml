    changes_summary: Added a comma after 'Eden' for clarity; changed 'Susan' to 'Susa' and 'Madai' to 'Media' for standard English forms; otherwise retained the draft.
translation:
  language: es
  text: 'toda la tierra de Edén, y toda la tierra del mar Eritreo, y toda la tierra del oriente, e India, y junto al mar Eritreo y sus montes, y toda la tierra de Basán, y toda la tierra del Líbano, y las islas de Caftor, y todos los montes de Senir y de Amana, y los montes de Asur hacia el norte[a], y toda la tierra de Elam, Asur y Babilonia, y Susa y Media, y todos los montes de Ararat, y toda la región al otro lado del mar, más allá de los montes de Asur hacia el norte: una tierra bendita y espaciosa, y todo lo que hay en ella es muy bueno.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La revisión textual del expediente corrige una lectura previa ‘hacia el sur’; el ge’ez aquí apunta ‘hacia el norte’.
    reason: textual_variant
lexical_decisions:
- source_word: ደቡብ፡ / መንገለ፡ መስዕ፡
  english_pob_choice: toward the north
  chosen_spanish: hacia el norte
  alternatives_spanish:
  - en el norte
  - al norte
  lexicon: N/A
  rationale: 'El contexto de la revisión auditada corrige una lectura previa errónea de ‘south’ y confirma la dirección ‘toward the north’. En español conviene conservar la relación espacial exacta con una forma natural y explícita: ‘hacia el norte’.'
- source_word: ምድረ፡ ቡርክት፡ ወስፍሕት፡
  english_pob_choice: a blessed and spacious land
  chosen_spanish: una tierra bendita y espaciosa
  alternatives_spanish:
  - una tierra bendita y amplia
  - una tierra bienaventurada y espaciosa
  lexicon: N/A
  rationale: ‘Bendita’ traduce la idea de bendición sin forzar el tono litúrgico de ‘bienaventurada’; ‘espaciosa’ conserva el sentido de amplitud física del adjetivo. La pareja mantiene el paralelismo de la fuente.
- source_word: ወኵሉ፡ ዘውስቴታ፡ ጥቀ፡ ሠናይ።
  english_pob_choice: and all that is in it is very good
  chosen_spanish: y todo lo que hay en ella es muy bueno
  alternatives_spanish:
  - y todo lo que hay en ella es sumamente bueno
  - y todo lo que hay en ella es muy excelente
  lexicon: N/A
  rationale: ‘Muy bueno’ reproduce con sobriedad la afirmación totalizadora del original y del POB inglés, sin intensificar más allá de lo atestiguado.
- source_word: ገዘረ / topographic list of regions
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - territorio
  - país
  lexicon: N/A
  rationale: ‘Tierra’ es la forma más estable en español para la enumeración de regiones geográficas extensas y mantiene la cadencia del texto enumerativo.
- source_word: አርእሱም of toponyms such as ኤዶም, ሴም, አሱር, ባቢሎን, ሱሳ, ሜዳ
  english_pob_choice: Eden, Erythraean Sea, east, India, Bashan, Lebanon, Caphtor, Senir, Amana, Asshur, Elam, Babylon, Susa, Media, Ararat
  chosen_spanish: Edén, mar Eritreo, oriente, India, Basán, Líbano, Cafthor, Senir, Amana, Asur, Elam, Babilonia, Susa, Media, Ararat
  alternatives_spanish:
  - Eden, mar Rojo, oriente, India, Basán, Líbano, Caftor, Senir, Amana, Asiria, Elam, Babilonia, Susa, Media, Ararat
