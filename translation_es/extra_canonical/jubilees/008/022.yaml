  text: ደቡብ፡ ምድረ፡ ቡርክት፡ ወስፍሕት፡ ወኵሉ፡ ዘውስቴታ፡ ጥቀ፡ ሠናይ። ወለካም፡ ወጠቅዐ፡ ወገብረ፡ ሎቱ፡ ፲ ፻ርአ፡ ፪ ወአደነ፡ ኀፍረተ። ወረገሞ፡ እግዚአብሔር፡ ለአርዌ፡ ምድር፡ ፳፫ ወተምዕዖ፡ ለዓለም፡ ወለብእሲትኒ፡ ፬ ተምዕዓ፡ ፭ እስመ፡ ሰምዐት፡ ቃለ፡ አርዌ፡ ምድር፡ ወበልዐት፡ ወይቤላ፡ አብዝኆ፡ አበዝኅ፡ ለኀዘንኪ፡ ወለፃዕርኪ'፡ ፮ በሐዘን፡ ፯ ለዲ፡ ውሉደ፡ ወኀበ፡ ምትኪ፡ ፳፬ ምግባእኪ፡ ፰ ውእቱ፡ ይኴንነኪ። ወለአዳምሂ፡ ይቤሎ፡ እስመ፡ ሰማዕከ፡ ቃለ፡ ብእሲትከ'፡ ፳፭ ወበላዕከ፡ እምውእቱ፡ ፱ ዕፀ፡ ዘአዘዝኩከ፡ ፲፰ ከመ፡ ኢትብላዕ፡ እምኔሁ፡ ርግምት፡ ትኩን፡ ምድር፡ በእንቲአከ፡ ፲፩ አስዋከ፡ ፲፪ ወአሜካላ፡ ይብቍልከ፡ ፲፫ ወብላዕ፡ ኀብስተከ፡ በሐፈ፡ ፲፬ ገጽከ፡ እስከ፡ አመ፡ ትገብእ፡ ውስተ፡ ምድር፡ ፲፭ *እንተ፡ እምኔሃ፡ ፲፮ ተነሣእከ፡ እስመ፡ ምድር፡ ፲፯ አንተ፡ ወውስተ፡ ምድር፡ ፲፰ ትገብእ። ፲፱ ወገብረ፡ ሎሙ፡ አልባሰ፡ ዘማዕስ፡ ወአልበሶሙ፡ ወፈነዎሙ፡ እምገነት፡ ፳፮ ኤዶም። ወበይእቲ፡ ዕለት፡ እንተ፡ ወፅአ፡ እምገነት፡ አዳም፡ ፳፰ ዐጠነ፡ ለመዐዛ፡ ሠናይ፡ ዕጣነ፡ ፳፯ ስኂነ፡ ወቀንአተ፡ ፳፩ ወማየ፡ ልብን፡ ፳፪ ወሰንበለ፡ ፳፫ በጽባሕ፡ ምስለ፡ ትንሣኤ፡ ፀሐይ፡ እምዕለት፡ ፳፬ ከደነ፡ ኀፍረተ። ወበይእቲ፡ ዕለት፡ ተፈጽመ፡ አፈ፡ ኵሉ፡ አራዊት፡ ወዘእንስሳ፡ ወዘአዕዋፍ፡ ፳፰ ወዘያንሶሱ፡ ወዘይትሐወስ፡ እምነቢብ፡ እስመ፡ ኵሎሙ፡ ይትናገሩ፡ ዝንተ፡ *ምስለ፡ ዝንቱ፡ ፲ ክንፈረ፡ ፳፮ አሐደ፡ ፳፯ ወልሳነ፡ አሐደ፡ ፳፰ ወፈነወ፡ ፳፱ እምገነት፡ ፳፰ ኤዶም፡ ለኵሉ፡ ፳፰ ዘሥጋ፡ ዘሀሎ፡ ፳፱ ውስተ፡ ገነት፡ ፳፩ ኤዶም፡ ወተዘርዉ፡ ኵሉ፡ ዘሥጋ፡ በበ፡ ዘመዶሙ፡ ወበበ፡ ፍጥረቶሙ፡ ፳፪ ውስተ፡ መካን፡ ዘተፈጥረ፡ ሎሙ። ወለአዳም፡ ባሕቲቱ፡
