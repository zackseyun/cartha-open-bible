review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien el sentido básico del inglés POB: una exhortación/predicción a ir, construir ciudades y plantar toda clase de vegetación y árboles que dan fruto. Sin embargo, «se construirán ciudades» introduce un matiz reflexivo menos natural y potencialmente distinto de «build for yourselves cities», que en español se expresa mejor como «se construirán ciudades para ustedes» o más naturalmente «construirán ciudades para ustedes mismos».'
  spanish_quality_summary: El texto es mayormente claro y fiel, pero «Y, he aquí» suena torpe por la coma tras «Y», y «se construirán ciudades» resulta poco idiomático en español moderno. También conviene explicitar el sentido de beneficio en «for yourselves» con «para ustedes mismos» para no perder ese matiz del POB.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. «Ciudades», «planta» y «árbol frutal» están bien elegidos. La principal mejora es sintáctica y de matiz semántico, no terminológica.
  issues:
  - severity: medium
    issue: «se construirán ciudades» es una formulación poco natural y algo ambigua
    rationale: Puede leerse como reflexivo o pasivo refleja impropia; el inglés POB expresa una acción intencional realizada en beneficio propio. En español suena más claro «construirán ciudades para ustedes mismos».
  - severity: low
    issue: Puntuación torpe en «Y, he aquí»
    rationale: En español la coma después de «Y» no ayuda y hace el inicio más forzado. «Y he aquí» o simplemente «Y miren» sería más natural; dado el tono del POB, «Y he aquí» funciona bien.
  - severity: low
    issue: Se pierde parcialmente el matiz de «for yourselves»
    rationale: El borrador insinúa beneficio propio con el clítico «se», pero no lo comunica con precisión suficiente. «Para ustedes mismos» preserva mejor el matiz sin sobretraducir.
  revised_spanish_text: Y he aquí, ustedes irán y construirán ciudades para ustedes mismos, y plantarán en ellas toda planta que hay sobre la tierra, y todo árbol frutal.
  revision_rationale: Se ajusta la sintaxis para que el español suene natural y preserve mejor el matiz de beneficio propio de «for yourselves». También se corrige la puntuación inicial. No hacen falta notas al pie.
