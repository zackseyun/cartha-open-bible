translation:
  language: es
  text: Y todo lo que está hacia el norte pertenece a Jafet, y todo lo que está hacia el sur pertenece a Sem. Y sigue así hasta que llega a Karaso[a] — esto está en el seno de la lengua que mira hacia el sur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al sur pertenece a Jafet, y todo lo que está hacia el norte pertenece a Sem. Y sigue así hasta que llega a Karaso — esto está en el seno de la lengua que mira hacia el norte»; esta lectura fue rechazada por el control de revisión por invertir los puntos cardinales.'
    reason: textual_variant
lexical_decisions:
- source_word: north / south cardinal directions
  english_pob_choice: north belongs to Japheth, and all that is toward the south belongs to Shem
  chosen_spanish: hacia el norte / hacia el sur
  alternatives_spanish:
  - al norte / al sur
  - del norte / del sur
  lexicon: directions
  rationale: 'Conservo la inversión corregida del texto auditado: Jafet queda al norte y Sem al sur. Uso ''hacia'' para reflejar la orientación territorial del pasaje sin forzar una relación posesiva más rígida que la del original.'
- source_word: belongs to
  english_pob_choice: belongs to
  chosen_spanish: pertenece a
  alternatives_spanish:
  - es de
  - corresponde a
  lexicon: possession/allotment
  rationale: '''Pertenece a'' transmite bien la asignación territorial en español bíblico sin sonar arcaico; mantiene la fuerza de reparto geográfico del texto.'
- source_word: Karaso
  english_pob_choice: Karaso
  chosen_spanish: Karaso
  alternatives_spanish:
  - Karaso
  lexicon: proper name
  rationale: Se conserva el nombre propio sin transliteración adicional, ya que el audit trail inglés lo mantiene sin glosa ni equivalentes alternos documentados.
- source_word: bosom of the tongue
  english_pob_choice: in the bosom of the tongue
  chosen_spanish: en el seno de la lengua
  alternatives_spanish:
  - en el interior de la lengua
  - en el regazo de la lengua
  lexicon: topographical metaphor
  rationale: '''Seno'' reproduce con naturalidad la metáfora espacial de ''bosom'' y preserva el carácter figurado del relieve (''lengua'' como promontorio o franja de tierra).'
- source_word: looks toward the south
  english_pob_choice: looks toward the south
  chosen_spanish: mira hacia el sur
  alternatives_spanish:
  - se orienta al sur
  - da hacia el sur
  lexicon: orientation
  rationale: '''Mira hacia el sur'' mantiene la imagen direccional del pasaje y corresponde al ajuste revisado del audito: la lengua se orienta al sur, no al norte.'
theological_decisions:
- issue: Geographic allotment of Japheth and Shem
  english_pob_reading: north belongs to Japheth, and all that is toward the south belongs to Shem
  chosen_spanish_reading: Jafet al norte y Sem al sur
  alternative_spanish_readings:
  - Sem al norte y Jafet al sur
  rationale: 'Sigo la revisión de gran importancia textual: el borrador anterior invertía los puntos cardinales. La lectura corregida preserva la distribución geográfica que el audit trail identifica como la del ge''ez y evita repetir el error doctrinal/geográfico.'
  doctrine_reference: No aplica doctrina; se trata de una corrección geográfica y textual
translation_notes:
  revision_awareness: 'El texto fuente disponible no contiene el ge''ez íntegro en esta ficha, pero el audit trail inglés documenta una corrección importante: se invirtieron los puntos cardinales en un borrador previo. La redacción española sigue la lectura revisada y evita reintroducir la variante rechazada.'
  spanish_consistency_notes:
  - Uso 'Jafet' y 'Sem' de forma consistente con la tradición bíblica española y con el inglés POB.
  - Mantengo 'Yahvé' fuera del texto porque este versículo no contiene el nombre divino.
  - Conservo la estructura repetitiva del original para reflejar la distribución geográfica y el cierre descriptivo del pasaje.
  - La nota al pie marca la variante textual histórica, no una preferencia estilística.
