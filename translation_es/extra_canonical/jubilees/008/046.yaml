    timestamp: '2026-05-03T07:41:50Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y no coman sangre con la carne, para que no se pida cuenta de su sangre, que es su vida, de mano de toda carne[a] que derrama sangre sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda criatura de carne'. El texto conserva el idiomismo bíblico 'toda carne' para expresar alcance universal.
    reason: Preservar el hebraísmo y evitar ambigüedad en español.
lexical_decisions:
- source_word: blood
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - la vida
  - vida
  lexicon: Lexical equivalence general
  rationale: El texto fuente prohibe comer sangre junto con la carne; ‘sangre’ conserva la referencia literal corregida en el tramo auditado frente a la lectura errónea anterior.
- source_word: the flesh
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - carne humana
  - la carne de la víctima
  lexicon: Lexical equivalence general
  rationale: ‘Carne’ es la correspondencia directa y natural en español para el sentido material del pasaje, sin suavizar la prohibición.
- source_word: your blood
  english_pob_choice: your blood
  chosen_spanish: vuestra sangre
  alternatives_spanish:
  - tu sangre
  lexicon: Lexical equivalence general
  rationale: Se mantiene el plural reverencial/comunitario del mandato bíblico con ‘vuestra’, acorde con el plural del español dirigido a un grupo.
- source_word: your life
  english_pob_choice: your life
  chosen_spanish: vuestra vida
  alternatives_spanish:
  - vuestra alma
  - vuestra existencia
  lexicon: Lexical equivalence general
  rationale: ‘Vida’ conserva la fuerza semítica del vínculo entre sangre y vida, sin convertirlo en una interpretación más abstracta.
- source_word: all flesh
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda criatura viviente
  - toda persona
  lexicon: Lexical equivalence general
  rationale: ‘Toda carne’ preserva el idiomismo bíblico sin reemplazarlo por una paráfrasis; mantiene la amplitud antropológica del original.
- source_word: sheds blood
  english_pob_choice: sheds blood
  chosen_spanish: derrama sangre
  alternatives_spanish:
  - vierte sangre
  - mata derramando sangre
  lexicon: Lexical equivalence general
  rationale: ‘Derrama sangre’ es el equivalente idiomático directo y claro en español para el acto de derramar sangre.
theological_decisions:
- issue: Relación entre sangre y vida
  english_pob_reading: your blood, which is your life
  chosen_spanish_reading: vuestra sangre, que es vuestra vida
  alternative_spanish_readings:
  - la vida con la carne
  - vuestra vida, que está en la sangre
  rationale: 'Se conserva la tensión del pasaje: la sangre no se presenta como mero alimento sino como portadora de la vida, y por eso no debe comerse con la carne.'
  doctrine_reference: Jubileos 8:46; cf. prohibiciones de sangre en la Torá
- issue: Alcance de ‘all flesh’
  english_pob_reading: all flesh that sheds blood on the earth
  chosen_spanish_reading: toda carne que derrama sangre sobre la tierra
  alternative_spanish_readings:
  - toda carne que derrama sangre en la tierra
  - toda criatura que derrama sangre
  rationale: La formulación conserva el alcance universal del juicio/requerimiento sin diluir el hebraísmo ‘toda carne’.
  doctrine_reference: Jubileos 8:46
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde una lectura anterior errónea (‘the life with the flesh’) a ‘blood with the flesh’, y también se normalizó ‘every flesh’ a ‘all flesh’. La presente versión española sigue esa lectura corregida y no introduce notas basadas en la forma depurada anterior.
  spanish_consistency_notes:
  - Se mantuvo ‘sangre’ como lectura principal para evitar la antigua confusión con ‘vida’.
  - Se conservó el idiomatismo bíblico ‘toda carne’ por coherencia con el registro POB y por fidelidad al original.
  - No se usaron notas al pie porque no hay una alternativa textual necesaria que deba anclarse en el verso español.
