base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/046.yaml
  text: And do not eat blood with the flesh, lest your blood, which is your life, be required from the hand of all flesh that sheds blood on the earth.
  footnotes:
  - marker: a
    text: Or 'the life with the flesh'.
    reason: previous_rendering
  - marker: b
    text: Or 'every flesh'.
    reason: previous_rendering
  revision_pass:
