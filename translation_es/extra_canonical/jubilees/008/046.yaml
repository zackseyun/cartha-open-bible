  - severity: medium
    issue: '''se requiera vuestra sangre'' es poco idiomático'
    rationale: Aunque calca de cerca el inglés, en español bíblico natural la idea se expresa mejor como 'se pida cuenta de su sangre' o 'se demande su sangre'. Esto preserva el sentido de responsabilidad por derramamiento de sangre.
