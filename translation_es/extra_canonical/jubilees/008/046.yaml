revisions:
- from: Y no comáis sangre con la carne, para que no se requiera vuestra sangre, que es vuestra vida, de la mano de toda carne que derrama sangre sobre la tierra.
  to: Y no coman sangre con la carne, para que no se pida cuenta de su sangre, que es su vida, de mano de toda carne[a] que derrama sangre sobre la tierra.
  rationale: Se ajustó el registro al español neutral latinoamericano ('coman', 'su') y se reemplazó la construcción poco natural 'se requiera vuestra sangre' por 'se pida cuenta de su sangre', que transmite con más claridad la idea de exigir responsabilidad por la sangre derramada. Se mantuvo 'toda carne' por fidelidad al idiomismo bíblico, con nota aclaratoria.
