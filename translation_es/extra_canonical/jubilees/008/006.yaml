base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/008/006.yaml
  text: For he said, “I was indeed sent,” and in the fourth year Shelah was born and grew up; and he took for himself a wife, and her name was Melka, the daughter of Kebed, his father’s brother, in the first year of the fifth week of the thirty-first jubilee.
  footnotes:
  - marker: a
    text: Or 'Shelah was born; and Shelah took for himself a wife, and her name was Melka, the daughter of Kebed, his father’s brother, in the first year of the third week of the fifth jubilee.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:52Z'
    unchanged: false
    changes_summary: 'Revised to match the Geʽez clause order and content: removed incorrect jubilee/week/year details at the start, corrected the genealogy from ''daughter of Madai, the son of Japheth'' to ''daughter of Kebed, his father’s brother,'' and rendered the verse as the birth of Shelah followed by his marriage, preserving the naming statement.'
translation:
  language: es
  text: 'Porque dijo: «En verdad fui enviado», y en el cuarto año nació Sélah y creció; y tomó para sí una esposa, y su nombre fue Melca, hija de Kebed, hermano de su padre, en el primer año de la quinta semana del trigésimo primer jubileo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይቤ / "I was indeed sent"
  english_pob_choice: I was indeed sent
  chosen_spanish: «En verdad fui enviado»
  alternatives_spanish:
  - «Ciertamente fui enviado»
  - «De veras fui enviado»
  lexicon: No aplica
  rationale: El geʽez expresa una afirmación enfática en primera persona pasiva/causativa. En español, «fui enviado» conserva el valor verbal y la pasiva implícita; «en verdad» reproduce la fuerza enfática sin añadir glosa interpretativa.
- source_word: ወልህቀ
  english_pob_choice: grew up
  chosen_spanish: creció
  alternatives_spanish:
  - creció y se desarrolló
  - fue creciendo
  lexicon: No aplica
  rationale: El audit trail inglés preserva el crecimiento como hecho narrativo separado. «Creció» es breve y natural en español, sin perder el matiz de maduración.
- source_word: ብእሲተ
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa para sí
  lexicon: No aplica
  rationale: En este contexto matrimonial, «esposa» es el equivalente claro y digno en español. Evita la ambigüedad de «mujer».
- source_word: ወስማ
  english_pob_choice: her name was
  chosen_spanish: su nombre fue
  alternatives_spanish:
  - se llamaba
  - su nombre era
  lexicon: No aplica
  rationale: La construcción mantiene el tono genealógico-formal del texto fuente. «Fue» refleja la formulación narrativa del original sin coloquializarla.
- source_word: ለተ፡ ኬቤድ
  english_pob_choice: the daughter of Kebed, his father’s brother
  chosen_spanish: hija de Kebed, hermano de su padre
  alternatives_spanish:
  - hija de Kebed, su tío paterno
  - hija de Kebed, el hermano de su padre
