lexical_decisions:
- source_word: ወበዐመተ / “in the year”
  english_pob_choice: And in the year
  chosen_spanish: Y en el año
  alternatives_spanish:
  - Y cuando
  - Y al tiempo en que
  lexicon: año
  rationale: El ge’ez conserva una cláusula temporal explícita; en español, «en el año» reproduce con naturalidad esa marca de tiempo sin borrar la redundancia estilística del original.
- source_word: ቆመ ኀበ ፈርዖን / “stood before Pharaoh”
  english_pob_choice: stood before Pharaoh
  chosen_spanish: se presentó delante de Faraón
  alternatives_spanish:
  - estuvo delante de Faraón
  - compareció ante Faraón
  lexicon: presentarse / delante de
  rationale: La expresión idiomática en español transmite la idea de comparecer en presencia de un superior; «delante de» conserva la literalidad espacial del giro sin sonar tan legalista como «ante» en este contexto narrativo.
- source_word: ዮሴፍ / Joseph
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: José
  rationale: El nombre bíblico se adapta a la forma española estándar y reconocible.
- source_word: ወልደ ሠላሳ ክረምተ / “was thirty years old”
  english_pob_choice: he was thirty years old
  chosen_spanish: tenía treinta años
  alternatives_spanish:
  - era de treinta años
  - era de treinta años de edad
  lexicon: edad / tener años
  rationale: En español actual, «tenía treinta años» comunica con claridad la edad sin cargar la frase.
theological_decisions:
- issue: Preservación de la repetición explícita del evento de comparecer ante Faraón
  english_pob_reading: And in the year Joseph stood before Pharaoh, he was thirty years old when he stood before Pharaoh.
  chosen_spanish_reading: Y en el año en que José se presentó delante de Faraón, tenía treinta años cuando se presentó delante de Faraón.
  alternative_spanish_readings:
  - Y José tenía treinta años cuando se presentó delante de Faraón.
  rationale: La fuente ge’ez repite la acción de presentarse delante de Faraón; aunque resulta redundante, la repetición forma parte del tejido textual y debe mantenerse para no perder el énfasis del original.
  doctrine_reference: Fidelidad textual / preservación de repeticiones del testimonio manuscrito
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección revisada que restaura la cláusula inicial omitida en una versión anterior: la mención de «en el año» debe preservarse junto con la repetición de la comparecencia ante Faraón.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el pasaje no contiene el nombre divino ni una cita que lo requiera.
  - Se usa «Faraón» consistentemente como nombre/título propio narrativo.
  - Se mantiene la repetición de «se presentó delante de Faraón» para reflejar la redundancia explícita del ge’ez.
