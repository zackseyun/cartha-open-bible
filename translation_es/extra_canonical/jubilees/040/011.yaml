revisions:
- from: Y en el año en que José se presentó delante de Faraón, tenía treinta años cuando se presentó delante de Faraón.[a]
  to: Y en el año que José se presentó ante Faraón, tenía treinta años cuando se presentó ante Faraón.[a]
  rationale: Se ajusta ligeramente la sintaxis para acercarse mejor a la forma repetitiva del ge'ez y de la auditoría inglesa, y se mejora la naturalidad del español con «ante Faraón» sin pérdida de significado. Se conserva la nota alternativa documentada.
