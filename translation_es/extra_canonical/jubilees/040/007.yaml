  text: And he appointed him second in all his kingdom, and made him ruler over all Egypt, and caused him to ride on Pharaoh’s second chariot. And he clothed him with garments of fine linen, and put a gold chain on his neck, and they proclaimed before him, “El, El,” and “Abrer”; and he gave him his signet ring into his hand, and set him over all his house, and magnified him, and said to him, “Only with respect to the throne alone will I be greater than you.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:31Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y lo puso segundo en todo su reino, y lo hizo gobernante sobre todo Egipto, y lo hizo montar en el segundo carro de Faraón. Y lo vistió con vestiduras de lino fino, y le puso una cadena de oro en el cuello; y proclamaron delante de él: «El, El», y «Abrer»; y le dio su anillo de sello en la mano, y lo puso sobre toda su casa, y lo engrandeció, y le dijo: «Solo en cuanto al trono seré mayor que tú».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዳግመ፡ ... ሰረገላሁ፡ ካዕብ፡ ዘፈርዖን
  english_pob_choice: second chariot of Pharaoh
  chosen_spanish: el segundo carro de Faraón
  alternatives_spanish:
  - el segundo carro de Faraón
  - el carro secundario de Faraón
  lexicon: carro
  rationale: La expresión indica el carro de rango secundario asociado a Faraón; «segundo carro» conserva la relación jerárquica y la concreción del original sin volverlo más interpretativo.
- source_word: ልብሰ፡ ...
  english_pob_choice: garments of fine linen
  chosen_spanish: vestiduras de lino fino
  alternatives_spanish:
  - vestiduras de lino fino
  - ropas de lino fino
  lexicon: vestidura
  rationale: «Vestiduras» mantiene un registro solemne y plural; «lino fino» corresponde al valor textual de tela de calidad, sin añadir detalles no presentes.
- source_word: ማዕተቤ፡
  english_pob_choice: signet ring
  chosen_spanish: anillo de sello
  alternatives_spanish:
  - anillo de sello
  - anillo sigilar
  lexicon: anillo
  rationale: En español bíblico contemporáneo, «anillo de sello» es claro y fiel a la función administrativa del objeto.
- source_word: ወአዐበዮ፡
  english_pob_choice: magnified him
  chosen_spanish: lo engrandeció
  alternatives_spanish:
  - lo engrandeció
  - lo exaltó
  lexicon: engrandecer
  rationale: «Engrandeció» conserva el sentido de elevar en honor/rango sin introducir matices excesivamente teológicos ni psicológicos.
theological_decisions:
- issue: Aclamaciones rituales «El, El» y «Abrer»
  english_pob_reading: they proclaimed before him, “El, El,” and “Abrer”
  chosen_spanish_reading: 'proclamaron delante de él: «El, El», y «Abrer»'
  alternative_spanish_readings:
  - 'clamaron delante de él: «El, El», y «Abrer»'
  - 'proclamaron ante él: «El, El», y «Abrer»'
  rationale: Se conserva la forma transliterada, porque el texto transmite una proclamación ceremonial específica y la evidencia disponible no autoriza identificarla con seguridad como traducción semántica en español.
  doctrine_reference: Preservación del testimonio textual y de términos no resueltos por la fuente
- issue: Límite de superioridad respecto del trono
  english_pob_reading: Only with respect to the throne alone will I be greater than you
  chosen_spanish_reading: Solo con respecto al trono seré mayor que tú
  alternative_spanish_readings:
  - Solo en cuanto al trono seré mayor que tú
  - Solo respecto del trono seré más grande que tú
  rationale: La formulación mantiene la restricción única del dominio del trono y evita ampliar el alcance de la frase. «Mayor» reproduce la comparación de rango mejor que «más grande» en español contemporáneo.
  doctrine_reference: Jerarquía política explícita en el relato, sin expansión doctrinal
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el testimonio ge'ez y la traducción inglesa POB; no se documentaron revisiones recientes ni variantes textuales relevantes en el paquete aportado.
  spanish_consistency_notes:
  - Se mantiene «Faraón» con mayúscula como nombre/título del soberano egipcio.
  - Se usa «Y lo...» para conservar la cadena narrativa consecutiva del original.
  - Se conserva la transliteración ceremonial «El, El» y «Abrer» por falta de base suficiente para una equivalencia semántica segura en español.
