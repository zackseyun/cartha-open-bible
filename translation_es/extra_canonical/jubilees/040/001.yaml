  yaml_path: translation/extra_canonical/jubilees/040/001.yaml
  text: 'And it happened to them just as he had interpreted for them: Pharaoh restored the chief cupbearer to his office, and he killed the baker, as Joseph had interpreted for them. And the chief cupbearer left Joseph in the prison house, even though he had informed him of what would happen, and he did not remember to inform Pharaoh of what Joseph had told him, for he forgot.'
  footnotes:
  - marker: a
    text: Or 'forgot Joseph in the prison house, though he knew what would happen'.
    reason: previous_rendering
  - marker: b
    text: Or 'And it happened just as Joseph had interpreted for them:'.
    reason: previous_rendering
  - marker: c
    text: Or 'the chief baker'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:28Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y sucedió con ellos tal como él les había interpretado: el faraón devolvió al jefe copero[a] a su cargo, y mató al panadero, tal como José les había interpretado. Y el jefe copero dejó a José en la casa de la prisión, aunque José le había informado de lo que sucedería, y no recordó informar al faraón de lo que José le había dicho, porque se olvidó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «copero principal».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወበከመ፡ ፈከረ፡ ሎሙ
  english_pob_choice: as he had interpreted for them
  chosen_spanish: tal como él les había interpretado
  alternatives_spanish:
  - como les había interpretado
  - tal como había interpretado para ellos
  lexicon: Ge'ez ፈከረ = interpretar, explicar un sueño/visión
  rationale: El pronombre implícito se conserva con «él» para reflejar que el referente ya está en contexto sin repetir innecesariamente «José». «Tal como» mantiene la correspondencia exacta con el cumplimiento de la interpretación.
- source_word: ፈርዖን
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: Nombre/título real egipcio
  rationale: En español, el título se lexicaliza naturalmente como «el faraón»; mantiene el registro bíblico sin forzar mayúsculas innecesarias en medio de la oración.
- source_word: ሊቀ፡ መዘርት
  english_pob_choice: chief cupbearer
  chosen_spanish: jefe copero
  alternatives_spanish:
  - copero principal
  - mayordomo del vino
  lexicon: Título cortesano compuesto
  rationale: «Jefe copero» conserva la relación jerárquica de ሊቀ con un sustantivo funcional y es transparente en español. «Copero principal» es posible, pero menos idiomático; «mayordomo del vino» añade contenido no explicitado.
- source_word: ወለሐባዚስ
  english_pob_choice: the baker
  chosen_spanish: el panadero
  alternatives_spanish:
  - el hornero
  lexicon: Oficio artesanal alimentario
  rationale: Se mantiene el oficio básico sin añadir «principal», porque el ge'ez no lo expresa aquí. «Panadero» es claro y fiel; «hornero» sería más regional o menos inmediato.
- source_word: ወረሰዮ፡ ሊቀ፡ መዘርት፡ ለዮሴፍ፡ ቤተ፡ ሞቅሕ፡
  english_pob_choice: left Joseph in the prison house
  chosen_spanish: dejó a José en la casa de la prisión
  alternatives_spanish:
  - lo dejó en la cárcel
  - lo dejó en la casa de la prisión
  lexicon: Ge'ez ወረሰዮ = dejar/poner/abandonar; ቤተ፡ ሞቅሕ = casa de prisión
  rationale: Se evita «olvidó» porque el texto fuente y la revisión establecen que el verbo significa «dejó/colocó». «Casa de la prisión» reproduce la expresión fuente sin suavizarla hacia una cárcel moderna, manteniendo la textura semítica del pasaje.
- source_word: አይድዖ
  english_pob_choice: he had informed him of what would happen
  chosen_spanish: le había informado de lo que sucedería
  alternatives_spanish:
  - le había dado a saber lo que ocurriría
  - le había avisado lo que pasaría
  lexicon: Ge'ez causativo de 'hacer saber/informar'
  rationale: La revisión auditada corrige la lectura errónea de «sabía» a «le había informado». «Sucediera/sucedería» preserva el contenido prospectivo del anuncio.
- source_word: ኢተዘከረ
  english_pob_choice: he did not remember
  chosen_spanish: no recordó
  alternatives_spanish:
  - no se acordó
  - no se recordó
  lexicon: Ge'ez ዘከረ = recordar
  rationale: «No recordó» es directo y formal. Se evita duplicar con «olvidó» demasiado pronto; el cierre causal ya explica la razón final con «porque se olvidó».
- source_word: ረሳዐ
  english_pob_choice: for he forgot
  chosen_spanish: porque se olvidó
  alternatives_spanish:
  - porque olvidó
  - pues había olvidado
  lexicon: Ge'ez ረሳዐ = olvidar
  rationale: Se distingue correctamente del verbo anterior que significa recordar. «Porque se olvidó» mantiene la causalidad final y evita mezclar los dos verbos distintos del versículo.
theological_decisions:
- issue: Tratamiento del nombre divino y del marco narrativo
  english_pob_reading: No direct divine-name issue in this verse; narrative reporting remains neutral.
  chosen_spanish_reading: No se introduce ninguna sustitución devocional; el versículo se presenta como relato histórico.
  alternative_spanish_readings:
  - usar lenguaje más litúrgico o devocional
  - añadir explicaciones doctrinales
  rationale: El texto no contiene el nombre divino ni una afirmación doctrinal directa; por tanto, la traducción debe ser sobria y narrativa, sin sobreinterpretación.
  doctrine_reference: Principio de transparencia textual y no amplificación interpretativa.
- issue: Diferencia entre 'informar' y 'saber' en la cláusula del copero
  english_pob_reading: he had informed him of what would happen
  chosen_spanish_reading: le había informado de lo que sucedería
  alternative_spanish_readings:
  - había sabido lo que sucedería
  - le había hecho saber lo que sucedería
  rationale: La revisión fuente-grounded muestra que el copero no 'sabía' por sí mismo; José le había comunicado el contenido. Mantener esta relación protege la causalidad narrativa y evita una mala lectura del verbo causativo.
  doctrine_reference: Fidelidad semántica al testimonio textual.
translation_notes:
  revision_awareness: La redacción española sigue la corrección auditada que distingue ወረሰዮ como 'dejó/colocó' y no 'olvidó', y አይድዖ como 'le había informado' y no 'había sabido'. También respeta la revisión que mantiene el pronombre implícito en la primera cláusula y evita sobretraducir 'el baker' como 'chief baker'.
  spanish_consistency_notes:
  - Se conserva «casa de la prisión» para alinearse con el patrón POB de mantener expresiones semíticas cuando el texto fuente las usa.
  - Se usa «faraón» en minúscula interna por norma española, salvo inicio de frase.
  - Se prefieren verbos simples y precisos («dejó», «informó», «recordó», «se olvidó») para reflejar el paralelismo verbal del original.
  - 'La nota a pie de página marca la única ambigüedad léxica relevante en español: «jefe copero» frente a «copero principal».'
