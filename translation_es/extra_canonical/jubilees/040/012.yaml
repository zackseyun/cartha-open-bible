  rationale: Se preserva el tono cronístico sin añadir inferencias teológicas; el enunciado funciona como marcador histórico dentro del relato de José.
  doctrine_reference: Ninguna; observación narrativa cronológica.
translation_notes:
  revision_awareness: El pasaje coincide con la versión inglesa auditada sin cambios sustantivos; el punto más delicado sigue siendo la cláusula final de rendimiento, donde el inglés POB ya optó por una formulación que mantiene la tensión del testimonio ge'ez. No hay revisiones aplicadas en el flujo inglés reciente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca aquí, sino para respetar la terminología del proyecto en caso de futuras secciones; en este versículo no aparece ningún nombre divino.
  - '''tal como'' y ''hubo'' conservan un registro narrativo bíblico moderno sin caer en calcos innecesarios.'
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no motivadas por el texto.
