translation:
  language: es
  text: 'Y en ese año murió Isaac. Y aconteció, tal como José había hablado acerca de la interpretación de sus dos sueños, tal como le había dicho: hubo siete años de abundancia en toda la tierra de Egipto, y la tierra de Egipto produjo en gran manera; una medida rendía mil ochocientas[a] medidas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase ge'ez sobre el rendimiento agrícola presenta dificultad textual, pero el testimonio base auditado aquí se entiende como 'una medida rendía mil ochocientas medidas'; se conserva esa cifra en el texto principal sin forzar una reconstrucción más allá de la evidencia disponible.
    reason: source_note
lexical_decisions:
- source_word: ዓመት / year
  english_pob_choice: that year
  chosen_spanish: en ese año
  alternatives_spanish:
  - aquel año
  - en aquel año
  lexicon: GEEZ ዓመት
  rationale: Mantiene la referencia temporal deíctica del pasaje con un español natural y publicado; 'en ese año' preserva la proximidad contextual sin sonar arcaico.
- source_word: ሞተ / died
  english_pob_choice: Isaac died
  chosen_spanish: murió Isaac
  alternatives_spanish:
  - Isaac falleció
  lexicon: GEEZ ሞተ
  rationale: '''Murió'' es la equivalencia directa y sobria para el evento de muerte; evita suavizar el verbo.'
- source_word: በከመ / just as
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justamente como
  lexicon: GEEZ በከመ
  rationale: '''Tal como'' transmite la comparación exacta del relato y su fuerza repetitiva en español claro.'
- source_word: ወኮነ ሰብዐቱ ክረምት ዘጽጋብ / there were seven years of abundance
  english_pob_choice: there were seven years of abundance
  chosen_spanish: hubo siete años de abundancia
  alternatives_spanish:
  - fueron siete años de abundancia
  - vinieron siete años de abundancia
  lexicon: GEEZ ሰብዐቱ ክረምት ዘጽጋብ
  rationale: '''Hubo'' expresa existencia narrativa sin cargar el texto con una estructura extraña; ''abundancia'' corresponde bien al sentido de prosperidad/cosecha abundante.'
- source_word: ፈርየት / produced exceedingly
  english_pob_choice: produced exceedingly
  chosen_spanish: produjo en gran manera
  alternatives_spanish:
  - produjo muchísimo
  - dio fruto en gran abundancia
  lexicon: GEEZ ፈርየት
  rationale: La fórmula conserva el énfasis intensivo del original y de la POB inglesa sin introducir una interpretación agrícola más específica que la que exige el contexto.
- source_word: አሐቲ መስፈርት ዐሠርተ ወሰመትነ ምእተ መስፈረ / one measure yielding eighteen hundred measures
  english_pob_choice: one measure yielding eighteen hundred measures
  chosen_spanish: una medida por dieciocho medidas
  alternatives_spanish:
  - una medida producía mil ochocientas medidas
  - una medida rendía mil ochocientas medidas
  lexicon: GEEZ መስፈርት
  rationale: La cifra del texto ge'ez es difícil y el audit trail inglés conserva una formulación equivalente muy breve. En español se mantiene la relación de rendimiento con 'por' para no cerrar indebidamente una ambigüedad numérica/textual que el testimonio base presenta.
theological_decisions:
