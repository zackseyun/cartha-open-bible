revisions:
- from: 'Y en ese año murió Isaac. Y aconteció, tal como José había hablado acerca de la interpretación de sus dos sueños, tal como le había dicho: hubo siete años de abundancia en toda la tierra de Egipto, y la tierra de Egipto produjo en gran manera, una medida por dieciocho [a] medidas.'
  to: 'Y en ese año murió Isaac. Y aconteció, tal como José había hablado acerca de la interpretación de sus dos sueños, tal como le había dicho: hubo siete años de abundancia en toda la tierra de Egipto, y la tierra de Egipto produjo en gran manera; una medida rendía mil ochocientas[a] medidas.'
  rationale: Se corrigió la cifra final para ajustarla al sentido fijado en el POB inglés ('eighteen hundred'), y se reemplazó la construcción poco natural 'por dieciocho medidas' por 'rendía mil ochocientas medidas', que expresa claramente el rendimiento. Se mantuvo el resto del texto, con una nota revisada que reconoce la dificultad textual sin alterar indebidamente el contenido principal.
