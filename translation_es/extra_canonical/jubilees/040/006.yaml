translation:
  language: es
  text: 'Y Yahvé concedió a José favor y misericordia[a] ante los ojos del faraón, y el faraón dijo a sus siervos: «No encontraremos un hombre sabio y entendido como este hombre, porque el espíritu de Yahvé está con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse «gracia y misericordia». Se eligió «favor» para seguir de cerca el par léxico del texto fuente y la decisión auditada en inglés.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሞገሰ፡ ወምሕረተ፡
  english_pob_choice: favor and mercy
  chosen_spanish: favor y misericordia
  alternatives_spanish:
  - gracia y misericordia
  - favor y compasión
  lexicon: favor; misericordia
  rationale: El par ge’ez coincide bien con la lectura inglesa auditada 'favor and mercy'. 'Favor' conserva la recepción benévola; 'misericordia' mantiene el componente de compasión/clemencia sin suavizarlo a mera cortesía.
- source_word: በቅድመ፡ አዕይንቲሁ፡
  english_pob_choice: in Pharaoh’s sight
  chosen_spanish: ante los ojos del faraón
  alternatives_spanish:
  - a la vista del faraón
  - en presencia del faraón
  lexicon: ante los ojos de
  rationale: La expresión idiomática ge’ez corresponde naturalmente a una fórmula de percepción/aprobación pública. 'Ante los ojos de' preserva el matiz de favor reconocido por el faraón.
- source_word: ብእሴ፡ ጠቢበ፡ ወማእምረ፡
  english_pob_choice: a man wise and understanding
  chosen_spanish: un hombre sabio y entendido
  alternatives_spanish:
  - un hombre sabio y prudente
  - un hombre sabio y de entendimiento
  lexicon: wise; understanding
  rationale: '''Sabio y entendido'' reproduce la doble cualidad del original y del inglés auditado, sin forzar una ampliación interpretativa. ''Entendido'' comunica capacidad de discernimiento más que simple información.'
- source_word: መንፈሰ፡ እግዚአብሔር፡
  english_pob_choice: the spirit of the Lord
  chosen_spanish: el espíritu de Yahvé
  alternatives_spanish:
  - el Espíritu de Yahvé
  - el espíritu del Señor
  lexicon: spirit; Yahweh
  rationale: El texto ge’ez nombra explícitamente a እግዚአብሔር; por la convención del proyecto, se rinde como 'Yahvé' en español. 'espíritu' mantiene el sentido personal/activo sin capitalizar obligatoriamente, ya que el pasaje habla de la presencia capacitadora de Dios en José.
theological_decisions:
- issue: Renderización del nombre divino en una cita de 'the Lord' / እግዚአብሔር
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: El proyecto exige 'Yahvé' para יהוה/እግዚአብሔር cuando el texto fuente lo expresa directamente. Aunque el inglés POB usa 'the Lord', aquí no se enmascara el nombre divino.
  doctrine_reference: Convención editorial POB sobre el Tetragrámaton / nombre divino
- issue: Presencia del espíritu divino en José
  english_pob_reading: for the spirit of the Lord is with him
  chosen_spanish_reading: porque el espíritu de Yahvé está con él
  alternative_spanish_readings:
  - porque el Espíritu de Yahvé está con él
  - porque el espíritu del Señor está con él
  rationale: La lectura conserva la causalidad explícita del original y la afirmación de acompañamiento divino. Se evita una paráfrasis más explicativa para no debilitar la fuerza teológica de la frase.
  doctrine_reference: Acompañamiento y capacitación del Espíritu en la narrativa bíblica
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; el presente borrador sigue la lectura auditada inglesa y el ge’ez sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de acuerdo con la terminología proyectual para el nombre divino.
  - Se conservó 'siervos' para los funcionarios de Faraón, en línea con el registro cortesano del pasaje y el uso tradicional comprensible en español.
  - La estructura general sigue la sintaxis del texto fuente y del inglés auditado, con adaptación natural al español.
