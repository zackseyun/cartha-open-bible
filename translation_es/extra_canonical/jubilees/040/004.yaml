revisions:
- from: 'Y dijo delante de Faraón que ambos sueños eran uno, y le dijo: «Siete años de abundancia vendrán en toda la tierra de Egipto, y después de esto[a] vendrán siete años de hambre, un hambre tal que no habrá habido en toda la tierra».'
  to: 'Y dijo delante de Faraón que sus dos sueños eran uno, y le dijo: «Siete años de abundancia vendrán en toda la tierra de Egipto, y después de esto[a] vendrán siete años de hambre, un hambre como no ha habido en toda la tierra».'
  rationale: Se ajusta «ambos sueños» a «sus dos sueños» para reflejar con mayor claridad el posesivo conservado en la auditoría inglesa, y se reemplaza «no habrá habido» por «como no ha habido» para una comparación más natural y fiel al sentido de hambruna sin precedentes. Se mantiene «después de esto» con nota alternativa, conforme a la revisión basada en el demostrativo singular del ge'ez.
