    changes_summary: Removed 'a' before the second 'famine' for a more formal rendering of the construction, and simplified 'such a famine as has not been like it' to the more natural and accurate 'such famine as has not been in all the earth.'
translation:
  language: es
  text: 'Y dijo delante de Faraón que sus dos sueños eran uno, y le dijo: «Siete años de abundancia vendrán en toda la tierra de Egipto, y después de esto[a] vendrán siete años de hambre, un hambre como no ha habido en toda la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de ello».'
    reason: lexical_alternative
lexical_decisions:
- source_word: before Pharaoh
  english_pob_choice: before Pharaoh
  chosen_spanish: delante de Faraón
  alternatives_spanish:
  - ante Faraón
  - en presencia de Faraón
  lexicon: prepositional phrase
  rationale: «Delante de» comunica la comparecencia pública sin forzar un tono excesivamente literal; mantiene la escena judicial/cortesana del original.
- source_word: both his dreams were one
  english_pob_choice: both his dreams were one
  chosen_spanish: ambos sueños eran uno
  alternatives_spanish:
  - los dos sueños eran uno
  - sus dos sueños eran uno
  lexicon: dual unity statement
  rationale: Conserva la afirmación de unidad entre los dos sueños sin explicitar más de lo que el texto dice.
- source_word: Seven years of abundance
  english_pob_choice: Seven years of abundance
  chosen_spanish: Siete años de abundancia
  alternatives_spanish:
  - Siete años de prosperidad
  - Siete años de plenitud
  lexicon: abundance noun phrase
  rationale: «Abundancia» es el equivalente directo y mantiene el contraste con el hambre posterior.
- source_word: after this
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - después de ello
  - luego de esto
  lexicon: temporal demonstrative
  rationale: Sigue la revisión más cercana al ge'ez, que usa un demostrativo singular; en español, «después de esto» refleja esa forma sin perder naturalidad.
- source_word: famine
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - hambruna
  - escasez de alimento
  lexicon: famine
  rationale: «Hambre» reproduce el valor semítico del término y evita introducir una terminología más técnica que el texto no requiere.
- source_word: such famine as has not been in all the earth
  english_pob_choice: such famine as has not been in all the earth
  chosen_spanish: un hambre tal que no habrá habido en toda la tierra
  alternatives_spanish:
  - un hambre como no ha habido en toda la tierra
  - un hambre que no ha existido en toda la tierra
  lexicon: comparative famine clause
  rationale: Mantiene la fuerza comparativa y el alcance universal del original; «no habrá habido» conserva el sentido de singularidad extrema sin añadir un comparativo extraño al español.
theological_decisions:
- issue: Unidad de los dos sueños
  english_pob_reading: both his dreams were one
  chosen_spanish_reading: ambos sueños eran uno
  alternative_spanish_readings:
  - los dos sueños eran uno
  - sus dos sueños eran uno
  rationale: No se interpreta alegóricamente ni se armoniza con explicaciones posteriores; se conserva la afirmación simple de identidad/unidad entre ambos sueños.
  doctrine_reference: Principio de fidelidad textual; no doctrinal expansion
- issue: Extensión universal de la hambruna
  english_pob_reading: such famine as has not been in all the earth
  chosen_spanish_reading: un hambre tal que no habrá habido en toda la tierra
  alternative_spanish_readings:
  - un hambre como no ha habido en toda la tierra
  - un hambre que no ha existido en toda la tierra
  rationale: Se conserva el alcance totalizante («en toda la tierra») sin suavizar la intensidad del juicio anunciado.
  doctrine_reference: Lectura histórica-literaria del relato
- issue: Referencia temporal revisada
  english_pob_reading: after this
  chosen_spanish_reading: después de esto
  alternative_spanish_readings:
  - después de ello
  - luego de esto
  rationale: Se sigue la revisión que corrige la forma más cercana al ge'ez, evitando la lectura pluralizada «después de ellos».
  doctrine_reference: Prioridad del dato fuente sobre la paráfrasis contextual
translation_notes:
  revision_awareness: La redacción incorpora la revisión más reciente que favorece «after this» frente a «after them» y conserva la formulación formal sin el artículo innecesario antes de la segunda ocurrencia de «hambre».
  spanish_consistency_notes:
  - Se usa «Faraón» como nombre propio del gobernante egipcio, no como título traducido.
  - Se mantiene «hambre» en lugar de «hambruna» para reflejar la densidad semítica del original y la elección inglesa.
  - La estructura mantiene un solo enunciado narrativo con cita directa, coherente con el tono de la fuente.
