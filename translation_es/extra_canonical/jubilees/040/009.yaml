  to: Y la tierra de Egipto prosperó ante Faraón por causa de José, porque Yahvé estaba con él y le concedió favor y misericordia sobre[a] toda su generación, a la vista de todos los que lo conocían y de todos los que oían hablar de él. Y el reino de Faraón quedó bien ordenado, y no había adversario ni había mal.
