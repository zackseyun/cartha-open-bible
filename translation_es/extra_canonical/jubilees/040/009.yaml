base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/040/009.yaml
  text: And the land of Egypt prospered before Pharaoh because of Joseph, for the Lord was with him and gave him favor and mercy over all his generation, in the sight of all who knew him and all who heard of him. And Pharaoh’s kingdom was well ordered, and there was no adversary and no evil.
  footnotes:
  - marker: a
    text: Or 'before all his kin'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:33Z'
    unchanged: false
    changes_summary: Changed 'was at peace' to 'prospered' for better lexical fit; adjusted 'over all his kin' to 'before all his kin' to reflect the preposition more accurately; simplified 'heard report of him' to 'heard of him'; and rendered the final phrase as 'no evil' rather than 'no evil one' for a more natural and likely more accurate sense.
translation:
  language: es
  text: Y la tierra de Egipto prosperó ante Faraón por causa de José, porque Yahvé estaba con él y le concedió favor y misericordia sobre[a] toda su generación, a la vista de todos los que lo conocían y de todos los que oían hablar de él. Y el reino de Faraón quedó bien ordenado, y no había adversario ni había mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El original usa una preposición de relación alta o superior ('sobre'), no 'ante' ni 'delante de'; por eso se conserva 'sobre toda su generación'.
    reason: source_note
lexical_decisions:
- source_word: ወትሠናአወት / prospered
  english_pob_choice: prospered
  chosen_spanish: prosperó
  alternatives_spanish:
  - estuvo en paz
  - floreció
  lexicon: prosperar
  rationale: El texto revisado de POB prefirió 'prospered' frente a 'was at peace'; en español, 'prosperó' conserva el sentido de bonanza/orden favorable sin introducir una paz explícita que el texto no exige.
- source_word: በቅድሜሁ / before him
  english_pob_choice: before Pharaoh
  chosen_spanish: ante Faraón
  alternatives_spanish:
  - delante de Faraón
  - en presencia de Faraón
  lexicon: ante
  rationale: '''Ante Faraón'' reproduce bien la relación de presencia/corte indicada por el original y es idiomático en español bíblico contemporáneo.'
- source_word: ለፈርዖን / Pharaoh
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: Faraón
  rationale: Nombre/título fijado por uso bíblico en español; se mantiene con mayúscula como designación regia.
- source_word: እግዚአብሔር / the Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: Yahvé
  rationale: Se sigue el criterio del proyecto para el nombre divino. Aquí no hay motivo para masking por κύριος griego; el nombre divino en la fuente ge'ez se vierte directamente como 'Yahvé'.
- source_word: ምስሌሁ / with him
  english_pob_choice: was with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estuvo con él
  lexicon: estar con
  rationale: El imperfecto expresa compañía continua y favorecimiento permanente, como en el inglés auditado.
- source_word: ወወሀቦ ሞገሰ ወምሕረተ / gave him favor and mercy
  english_pob_choice: gave him favor and mercy
  chosen_spanish: le concedió favor y misericordia
  alternatives_spanish:
  - le dio favor y misericordia
  - le otorgó gracia y misericordia
  lexicon: gracia/favor, misericordia
  rationale: '''Concedió'' refleja acción benéfica otorgada. Se conserva la distinción entre favor y misericordia sin sustituirlos por un solo término más abstracto. ''Favor'' sigue el audit trail; ''misericordia'' corresponde directamente al sustantivo fuente.'
- source_word: ላዕለ / over,upon
  english_pob_choice: over all his generation
  chosen_spanish: sobre toda su generación
  alternatives_spanish:
  - ante toda su generación
  - encima de toda su generación
  lexicon: sobre
  rationale: 'Se sigue la corrección del último control de calidad: ላዕለ indica ''sobre/upon'', no ''before''. ''Toda su generación'' respeta el valor de ዘመዱ como ''su generación'' y evita la lectura incorrecta de ''parentela''.'
- source_word: ዘመዱ / his generation
  english_pob_choice: all his generation
  chosen_spanish: toda su generación
  alternatives_spanish:
  - toda su parentela
  - todos sus parientes
  lexicon: generación
  rationale: La revisión auditable señala que el sentido aquí es 'generation', no 'kin'. 'Generación' es el equivalente español más transparente para el contexto de contemporáneos/descendencia colectiva.
- source_word: በቅድመ / in the sight of
  english_pob_choice: in the sight of
  chosen_spanish: a la vista de
  alternatives_spanish:
  - en presencia de
  - delante de
  lexicon: a la vista de
  rationale: Expresa visualidad y notoriedad, concordando con el paralelo inglés y el matiz de testigos.
- source_word: ስምዐ / heard of him
  english_pob_choice: heard of him
  chosen_spanish: oían hablar de él
  alternatives_spanish:
  - oían de él
  - habían oído de él
  lexicon: oír hablar de
  rationale: La frase española natural conserva la idea de reportes/noticia sobre José sin añadir 'rumor' ni 'reporte' explícito.
- source_word: መንግሥተ፡ ፈርዖን / Pharaoh’s kingdom
  english_pob_choice: Pharaoh’s kingdom
  chosen_spanish: el reino de Faraón
  alternatives_spanish:
  - el dominio de Faraón
  - el gobierno de Faraón
  lexicon: reino
  rationale: '''Reino'' es la equivalencia directa y tradicionalmente comprensible para መንግሥት en este contexto político.'
- source_word: ወረጐዐት / well ordered
  english_pob_choice: was well ordered
  chosen_spanish: quedó bien ordenado
  alternatives_spanish:
  - estuvo bien ordenado
  - quedó bien dispuesto
  lexicon: ordenar
  rationale: '''Quedó'' expresa el estado resultante de la administración de José; ''bien ordenado'' mantiene la idea de buen orden sin sobreinterpretar paz interior o justicia institucional.'
- source_word: አልቦ ሰይጣነ / no adversary
  english_pob_choice: no adversary
  chosen_spanish: no había adversario
  alternatives_spanish:
  - no había enemigo
  - no había opositor
  lexicon: adversario
  rationale: '''Adversario'' reproduce el valor relacional/opositor del término sin cargarlo innecesariamente con guerra literal.'
- source_word: አልቦ እኩየ / no evil
  english_pob_choice: no evil
  chosen_spanish: ni mal
  alternatives_spanish:
  - ni maldad
  - ni cosa mala
  lexicon: mal
  rationale: La revisión confirmó que el cierre debe ser 'no evil' y no 'evil one'. 'Ni mal' es conciso y fiel al valor amplio de mal/daño.
theological_decisions:
- issue: Nombre divino en un texto que no pasa por κύριος griego
  english_pob_reading: the Lord was with him
  chosen_spanish_reading: Yahvé estaba con él
  alternative_spanish_readings:
  - el Señor estaba con él
  rationale: Dado el criterio del proyecto y la fuente ge'ez que nombra directamente a Dios, se evita el sustituto litúrgico 'el Señor' para mantener transparencia textual.
  doctrine_reference: Tetragrámaton / nombre propio divino
- issue: Relación entre favor y misericordia
  english_pob_reading: gave him favor and mercy
  chosen_spanish_reading: le concedió favor y misericordia
  alternative_spanish_readings:
  - le concedió gracia y misericordia
  - le dio favor y compasión
  rationale: Se preservan dos dones distintos, como en el inglés auditado, sin fusionarlos en una sola noción piadosa. 'Misericordia' mantiene el peso benévolo del original.
  doctrine_reference: Providencia divina / gracia y misericordia
- issue: Final de la cláusula negativa
  english_pob_reading: there was no adversary and no evil
  chosen_spanish_reading: no había adversario ni mal
  alternative_spanish_readings:
  - no había enemigo ni maldad
  - no había adversario ni cosa mala
  rationale: La revisión textual descartó la lectura personalizante 'evil one'. En español, 'mal' conserva la amplitud moral/aflictiva del término sin introducir una figura personal ausente.
  doctrine_reference: Mal / oposición
- issue: '''over all his generation'''
  english_pob_reading: over all his generation
  chosen_spanish_reading: sobre toda su generación
  alternative_spanish_readings:
  - sobre todos sus contemporáneos
  - sobre toda su descendencia
  rationale: 'Se sigue la corrección de la revisión final: la preposición es ''over/upon'' y el sustantivo apunta a generación. ''Sobre toda su generación'' mantiene ambas fuerzas sin cerrar indebidamente el sentido.'
  doctrine_reference: Providencia en una generación histórica
translation_notes:
  revision_awareness: 'Se siguió la última revisión auditable que corrige dos puntos clave: (1) el verbo final se entiende mejor como ''prospered'' y no como ''was at peace''; (2) ላዕለ + ዘመድ debe reflejarse como ''sobre toda su generación'', no ''antes/debajo de su parentela''. También se evitó personalizar el cierre como ''evil one'', porque la revisión lo descartó a favor de ''no evil''.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se conservó 'Faraón' con mayúscula como título/nombre propio.
  - Se usó 'favor y misericordia' para respetar la duplicidad del original y del audit trail inglés.
  - '''Generación'' se eligió en lugar de ''parentela'' para no contradecir la corrección final del texto fuente.'
  - 'La cláusula negativa final queda breve y natural en español: ''ni mal''.'
