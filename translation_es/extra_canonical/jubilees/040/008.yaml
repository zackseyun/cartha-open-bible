base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/040/008.yaml
  text: And Joseph went out through all the land of Egypt, and all Pharaoh’s princes loved him, and all his servants, and all who did the king’s work, because he walked uprightly and there was no pride, or arrogance of heart, or partiality, and no taking of bribes; for he judged uprightly for all the peoples of the earth.
  footnotes:
  - marker: a
    text: Or 'or haughtiness of face, or partiality in his thoughts'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:33Z'
    unchanged: false
    changes_summary: Replaced 'contempt of face' with 'haughtiness of face' for more natural and accurate formal English, and 'acceptance of persons in his thoughts' with 'partiality in his thoughts' to better convey the idiom without awkwardness. Kept the rest unchanged.
translation:
  language: es
  text: Y José salió por toda la tierra de Egipto, y todos los príncipes de Faraón lo amaron, y todos sus siervos, y todos los que hacían la obra del rey, porque andaba rectamente y no había orgullo, ni altivez de corazón, ni parcialidad, y no recibía sobornos; porque juzgaba rectamente para todos los pueblos de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወመበለ፡ ዮሴፍ፡ ውስተ፡ ኵሉ፡ ምድረ፡ ግብጽ፡
  english_pob_choice: And Joseph went out through all the land of Egypt
  chosen_spanish: José salió por toda la tierra de Egipto
  alternatives_spanish:
  - José fue por toda la tierra de Egipto
  - José recorrió toda la tierra de Egipto
  lexicon: Go out / travel through
  rationale: El ge'ez describe a José moviéndose por toda la tierra; «salió por toda la tierra» conserva el valor dinámico del recorrido sin añadir matices no presentes.
- source_word: አፍቀርዎ፡ ኵሎሙ፡ መኳንንቲሁ፡ ለፈርዖን፡ ወኵሎሙ፡ ላእካኒሁ፡ ወኵሎሙ፡ እለ፡ ይገብሩ፡ ግብረ፡ ንጉሥ፡
  english_pob_choice: all Pharaoh’s princes loved him, and all his servants, and all who did the king’s work
  chosen_spanish: todos los príncipes de Faraón lo amaron, y todos sus siervos, y todos los que hacían la obra del rey
  alternatives_spanish:
  - todos los príncipes de Faraón lo amaban, y todos sus servidores, y todos los que hacían la obra del rey
  - todos los príncipes de Faraón lo amaron, y todos sus esclavos, y todos los que hacían la obra del rey
  lexicon: Love / servants / king's work
  rationale: Se mantiene la secuencia social del original. «Siervos» aquí conserva la relación de servicio cortesano; «esclavos» sería demasiado fuerte para el registro español y no es necesario en este contexto.
- source_word: ርቱዐ፡ የሐውር፡
  english_pob_choice: because he walked uprightly
  chosen_spanish: porque andaba rectamente
  alternatives_spanish:
  - porque caminaba rectamente
  - porque procedía rectamente
  lexicon: Walk uprightly
  rationale: «Andaba rectamente» reproduce la imagen bíblica de conducta continua sin volverse arcaizante, y corresponde al sentido moral de ርቱዐ.
- source_word: ትዕቢተ፡ ወአዐብዮ፡ ልብ፡
  english_pob_choice: pride, or arrogance of heart
  chosen_spanish: orgullo, ni altivez de corazón
  alternatives_spanish:
  - orgullo, ni arrogancia de corazón
  - soberbia, ni altivez de corazón
  lexicon: Pride / arrogance of heart
  rationale: «Altivez de corazón» conserva la localización interna del vicio en el corazón y responde al paralelismo del texto. «Arrogancia» también es posible, pero «altivez» suena más cercano al campo semántico de elevación insolente.
- source_word: አሢሦተ፡ ገጽ፡
  english_pob_choice: partiality
  chosen_spanish: parcialidad
  alternatives_spanish:
  - acepción de personas
  - favoritismo
  lexicon: Partiality / seeking the face
  rationale: La revisión inglesa corrigió aquí el sentido a «partiality». En español, «parcialidad» es la opción más directa y natural para el sesgo injusto; «acepción de personas» es más tradicional, pero menos inmediato para lectores modernos.
- source_word: ነሢአ፡ ሕልያነ፡
  english_pob_choice: no taking of bribes
  chosen_spanish: ni aceptación de sobornos
  alternatives_spanish:
  - ni tomar sobornos
  - ni recibir sobornos
  lexicon: Bribes / gifts
  rationale: El auditorio textual indica «taking of bribes». «Aceptación de sobornos» preserva la idea jurídica y moral de recibir dádivas ilícitas con registro formal y claro.
- source_word: ይኴንን፡ ለኵሉ፡ አሕዛበ፡ ምድር።
  english_pob_choice: for all the peoples of the earth
  chosen_spanish: para todos los pueblos de la tierra
  alternatives_spanish:
  - para todos los pueblos de la tierra
  - para toda la gente de la tierra
  lexicon: Judge uprightly / peoples of the earth
  rationale: «Pueblos» conserva el plural del original y su alcance universal. «De la tierra» sigue el matiz cósmico/geográfico del ge'ez sin convertirlo en un universalismo abstracto.
theological_decisions:
- issue: Integridad moral y función judicial de José
  english_pob_reading: because he walked uprightly ... for he judged uprightly for all the peoples of the earth
  chosen_spanish_reading: porque andaba rectamente ... porque juzgaba rectamente para todos los pueblos de la tierra
  alternative_spanish_readings:
  - porque vivía rectamente ... porque juzgaba rectamente para todos los pueblos de la tierra
  - porque procedía rectamente ... porque juzgaba con rectitud para todos los pueblos de la tierra
  rationale: Se mantiene la conexión entre conducta justa y juicio justo sin suavizarla. El texto presenta a José como modelo de rectitud ética y judicial, no solo como administrador eficiente.
  doctrine_reference: Ética bíblica y justicia imparcial en el gobierno
- issue: Rechazo de favoritismo y soborno
  english_pob_reading: there was no pride, or arrogance of heart, or partiality, and no taking of bribes
  chosen_spanish_reading: no había orgullo, ni altivez de corazón, ni parcialidad, ni aceptación de sobornos
  alternative_spanish_readings:
  - no había orgullo, ni arrogancia de corazón, ni parcialidad, ni recepción de sobornos
  - no había soberbia, ni altivez de corazón, ni favoritismo, ni aceptación de sobornos
  rationale: Se conserva la acumulación de defectos morales y judiciales como una lista negativa completa. No se reduce «parcialidad» a un mero matiz social, porque el contexto es la justicia de quien juzga.
  doctrine_reference: Imparcialidad judicial y condena del soborno
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrige errores importantes en la línea de «partiality» y «taking of bribes». La traducción española sigue esa lectura corregida: evita cualquier equivalente de «haughtiness of face» o «partiality in his thoughts», y vierte con claridad «parcialidad» y «aceptación de sobornos» conforme al ge''ez y al informe de revisión.'
  spanish_consistency_notes:
  - Se usó «Faraón» como nombre-título estándar en español bíblico.
  - Se mantuvo «siervos» para el contexto cortesano-administrativo, sin forzar «esclavos».
  - Se prefirió «rectamente» para reproducir el adverbio moral y judicial repetido por el texto.
  - No se introdujeron notas al pie porque la versión española no necesita una alternativa textual anclada en el versículo para este caso.
