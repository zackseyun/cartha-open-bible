base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/040/013.yaml
  text: And Joseph gathered food for each city within the city until they were full of grain, until they were unable to count and measure it because of its abundance.
  footnotes:
  - marker: a
    text: Or 'from city to city'.
    reason: previous_rendering
  - marker: b
    text: Or 'until the grain was beyond measure'.
    reason: previous_rendering
  - marker: c
    text: Or 'until they could no longer count it, and it was measured no more'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:33Z'
    unchanged: false
    changes_summary: Changed 'stored up' to 'gathered' for closer lexical fit, and 'in city after city' to 'from city to city' to reflect movement/collection. Revised 'was filled up' to 'was beyond measure' for more natural English and better alignment with the sense of immeasurable abundance.
translation:
  language: es
  text: Y José reunió alimento para cada ciudad, poniéndolo en ella, hasta que quedaron llenas de grano, hasta que no pudieron contarlo ni medirlo por causa de su abundancia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዮሴፍ
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Josef
  - José
  lexicon: nombre propio
  rationale: El nombre bíblico estándar en español es «José»; corresponde al inglés POB «Joseph» y a la forma tradicional inteligible en español.
- source_word: አስተጋብአ
  english_pob_choice: gathered
  chosen_spanish: juntó
  alternatives_spanish:
  - reunió
  - acumuló
  - guardó
  lexicon: verbo de recolección
  rationale: El contexto y la revisión inglesa favorecen la idea de reunir provisiones, no de moverlas entre ciudades; «juntó» comunica bien la acción de reunir alimentos para almacenamiento.
- source_word: ሲሳተ፡ ለሀገር፡ ውስተ፡ ሀገር
  english_pob_choice: for each city within the city
  chosen_spanish: para cada ciudad dentro de la ciudad
  alternatives_spanish:
  - de ciudad en ciudad
  - en cada ciudad
  - para la ciudad dentro de la ciudad
  lexicon: idioma ge'ez de destino/localización
  rationale: La revisión textual explicó que la expresión ge'ez no significa movimiento «de ciudad a ciudad», sino almacenamiento destinado a cada ciudad dentro de su propia ciudad. Mantengo una traducción literal moderada para preservar la rareza del giro.
- source_word: መልአ
  english_pob_choice: were full of grain
  chosen_spanish: estuvieron llenas de grano
  alternatives_spanish:
  - se llenaron de grano
  - quedaron llenas de grano
  lexicon: verbo de plenitud
  rationale: «መልአ» significa llenar/estar lleno; el español debe reflejar la plenitud concreta de los depósitos o ciudades con grano, sin convertirlo en «beyond measure».
- source_word: ስርናየ
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - cereal
  lexicon: sustantivo agrícola
  rationale: «Grano» es el equivalente más amplio y fiel al término inglés POB, sin restringir indebidamente la especie del cereal.
- source_word: ይስእኑ ኍልቈቶ ወሰፈረ
  english_pob_choice: they were unable to count and measure it
  chosen_spanish: no pudieron contarlo ni medirlo
  alternatives_spanish:
  - ya no podían contarlo ni medirlo
  - fueron incapaces de contarlo y medirlo
  lexicon: construcción de imposibilidad
  rationale: La revisión gramatical indica que un solo verbo de incapacidad gobierna tanto contar como medir; el español mantiene esa relación con «no pudieron... ni...».
- source_word: እምነ፡ ብዝኁ
  english_pob_choice: because of its abundance
  chosen_spanish: por causa de su abundancia
  alternatives_spanish:
  - a causa de su abundancia
  - debido a su abundancia
  lexicon: frase causal
  rationale: 'La causalidad explícita es importante: la imposibilidad de contar y medir se debe a la abundancia del grano. «Por causa de» conserva el valor causal de forma clara y bíblica.'
theological_decisions:
- issue: Acumulación providencial de alimento en contexto de provisión
  english_pob_reading: Joseph gathered food ... because of its abundance.
  chosen_spanish_reading: Y José juntó alimentos ... por causa de su abundancia.
  alternative_spanish_readings:
  - Y José almacenó alimentos ...
  - Y José reunió alimentos ...
  rationale: El verso presenta la administración de provisión en una escala extraordinaria; no introduce doctrina adicional, pero sí conviene evitar verbos que alteren la imagen de recolección y almacenamiento prudente.
  doctrine_reference: Providencia y mayordomía en el relato de José (cf. Gén 41:48-49 como paralelo temático)
- issue: 'Naturaleza de la abundancia: llenura concreta antes que lenguaje figurado'
  english_pob_reading: until they were full of grain, until they were unable to count and measure it.
  chosen_spanish_reading: hasta que estuvieron llenas de grano, hasta que no pudieron contarlo ni medirlo.
  alternative_spanish_readings:
  - hasta que el grano fue más que medible
  - hasta que el grano fue innumerable
  rationale: 'La revisión textual rechaza una paráfrasis abstracta como «más que medible» en favor de una secuencia concreta: plenitud de grano, luego imposibilidad de contarlo y medirlo. Mantener ambas etapas evita borrar la tensión literaria.'
  doctrine_reference: Lectura narrativa literal de abundancia y provisión en la historia de José
translation_notes:
  revision_awareness: 'Tomé en cuenta las dos revisiones clave del audit trail: (1) el giro ge''ez no debe leerse como movimiento «de ciudad a ciudad», sino como provisión destinada a cada ciudad dentro de su propia ciudad; (2) la cláusula sobre el grano expresa llenura concreta seguida de imposibilidad de contarlo y medirlo, no una sola idea abstracta de «sin medida». Por eso no incluí notas de pie, ya que no era necesario preservar alternativas textuales en el cuerpo español.'
  spanish_consistency_notes:
  - Usé «José» de manera consistente como nombre propio bíblico estándar en español.
  - Mantuve «grano» y no «trigo» para no restringir indebidamente el cereal.
  - Conservé una sintaxis paralela con dos cláusulas temporales introducidas por «hasta que», en línea con la estructura del original y del audit trail.
  - Evité «SEÑOR» o terminología teológica ajena al verso, porque aquí no aparece un nombre divino explícito.
