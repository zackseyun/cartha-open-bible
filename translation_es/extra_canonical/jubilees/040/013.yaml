- from: Y José juntó alimentos para cada ciudad dentro de la ciudad, hasta que estuvieron llenas de grano, hasta que no pudieron contarlo ni medirlo por causa de su abundancia.
  to: Y José reunió alimento para cada ciudad, poniéndolo en ella, hasta que quedaron llenas de grano, hasta que no pudieron contarlo ni medirlo por causa de su abundancia.
