translation:
  language: es
  text: Entonces el copero principal se acordó de José y habló de él al rey, y lo hizo salir de la casa de la prisión, y le contó delante de él sus dos sueños.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: chief cupbearer
  english_pob_choice: chief cupbearer
  chosen_spanish: el copero principal
  alternatives_spanish:
  - el jefe de los coperos
  - el principal copero
  lexicon: N/A
  rationale: ‘Copero principal’ conserva el cargo cortesano del original y suena natural en español bíblico moderno; evita una paráfrasis más larga y mantiene la relación de rango implícita en el texto.
- source_word: remembered
  english_pob_choice: remembered
  chosen_spanish: se acordó de
  alternatives_spanish:
  - recordó
  - se recordó de
  lexicon: N/A
  rationale: ‘Se acordó de’ expresa el acto de traer a la memoria de forma idiomática y fiel al valor narrativo del verbo.
- source_word: prison house
  english_pob_choice: prison house
  chosen_spanish: la casa de la prisión
  alternatives_spanish:
  - la cárcel
  - el calabozo
  lexicon: N/A
  rationale: ‘Casa de la prisión’ sigue de cerca la estructura del original y preserva el matiz de edificio/casa de encierro sin reducirlo demasiado a ‘cárcel’.
- source_word: both dreams
  english_pob_choice: both dreams
  chosen_spanish: ambos sueños
  alternatives_spanish:
  - los dos sueños
  - sus dos sueños
  lexicon: N/A
  rationale: El ge’ez marca posesivo masculino singular en ‘sus sueños’, pero la revisión final del inglés POB dejó ‘both dreams’; en español ‘ambos sueños’ comunica la dualidad sin introducir un posesivo no explicitado en el texto inglés final.
theological_decisions:
- issue: Presencia o ausencia del posesivo en ‘dreams’
  english_pob_reading: both dreams
  chosen_spanish_reading: ambos sueños
  alternative_spanish_readings:
  - sus dos sueños
  - ambos sus sueños
  rationale: El texto ge’ez evidencia posesivo en la forma, pero el audit trail inglés terminó en ‘both dreams’ tras una revisión discutida. Para no forzar una solución interpretativa en español, se mantiene una expresión dual neutra y exacta en la superficie castellana.
  doctrine_reference: Fidelidad textual y cautela ante variantes menores
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail inglés para la forma final ‘both dreams’, pero se verificó además el ge’ez, que contiene posesivo; por eso la traducción española evita añadir ‘sus’ de manera explícita y conserva solo la dualidad con ‘ambos sueños’.
  spanish_consistency_notes:
  - Se mantuvo ‘José’ y no ‘Yosef’ para coherencia con el texto castellano bíblico estándar del proyecto.
  - Se eligió ‘copero principal’ como equivalente estable para el cargo de corte.
  - No se añadieron notas al pie porque no había un marcador anclado en el texto español.
