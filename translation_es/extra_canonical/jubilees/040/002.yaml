base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/040/002.yaml
  text: And in those days Pharaoh dreamed two dreams in one night concerning the matter of the famine that would come upon all the earth. And he awoke from his sleep and called all the interpreters of dreams who were in Egypt, and the diviners, and he told them both his dreams, but they were not able to understand.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:30Z'
    unchanged: false
    changes_summary: Revised the final clause from 'make known their meaning' to 'understand' to more directly reflect the source's wording about lacking understanding, while keeping the rest unchanged.
translation:
  language: es
  text: Y en aquellos días, Faraón soñó dos sueños en una noche, acerca del asunto del hambre que vendría sobre toda la tierra. Y despertó de su sueño, y llamó a todos los intérpretes de sueños que estaban en Egipto, y a los adivinos, y les contó sus dos sueños, pero no pudieron entender[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Entender» refleja la revisión del inglés POB, que cambió una idea de “dar a conocer su significado” por la de falta de comprensión directa del contenido de los sueños.
    reason: source_note
lexical_decisions:
- source_word: ሐለመ / dreamed
  english_pob_choice: dreamed
  chosen_spanish: soñó
  alternatives_spanish:
  - tuvo sueños
  lexicon: No aplica
  rationale: El ge'ez expresa que Faraón tuvo una experiencia onírica; «soñó» reproduce de forma natural y directa la acción verbal sin añadir matices ajenos.
- source_word: መፈክራነ፡ ሕልም / interpreters of dreams
  english_pob_choice: interpreters of dreams
  chosen_spanish: interpretadores de sueños
  alternatives_spanish:
  - intérpretes de sueños
  - explicadores de sueños
  lexicon: No aplica
  rationale: «Interpretadores de sueños» conserva la función técnica del grupo mencionado en la fuente y sigue de cerca la elección inglesa, sin cambiarla por un término más litúrgico o explicativo.
- source_word: ረቂቀ / diviners
  english_pob_choice: diviners
  chosen_spanish: adivinos
  alternatives_spanish:
  - adivinos/augures
  - encantadores
  lexicon: No aplica
  rationale: La fuente distingue otro grupo aparte de los intérpretes; «adivinos» mantiene esa distinción con un término español claro y suficientemente amplio.
- source_word: አእምሮ / understand
  english_pob_choice: understand
  chosen_spanish: entender
  alternatives_spanish:
  - comprender
  - descifrar
  lexicon: No aplica
  rationale: El cierre del versículo indica incapacidad de entender, no meramente de explicar. «Entender» refleja con precisión la lectura revisada del inglés POB y evita sobreinterpretar como falta de poder para declarar el sentido.
theological_decisions:
- issue: Alcance de «toda la tierra» en el hambre
  english_pob_reading: concerning the matter of the famine that would come upon all the earth
  chosen_spanish_reading: acerca del asunto del hambre que vendría sobre toda la tierra
  alternative_spanish_readings:
  - respecto del asunto del hambre que vendría sobre toda la tierra
  - sobre el tema del hambre que vendría sobre toda la tierra
  rationale: Se conserva el alcance universal de la frase sin atenuarla. «Asunto» traduce de modo sobrio el giro abstracto del original y del inglés POB.
  doctrine_reference: Narrative scope; no doctrinal issue.
- issue: Incapacidad final de los especialistas
  english_pob_reading: but they were not able to understand
  chosen_spanish_reading: pero no pudieron entender
  alternative_spanish_readings:
  - pero no pudieron comprender
  - pero no pudieron descifrarlo
  rationale: 'Se sigue la revisión inglesa que prioriza la falta de comprensión. En español, «entender» mantiene la tensión: aun con intérpretes y adivinos, no lograron captar el sentido de los sueños.'
  doctrine_reference: Narrative clarity; no doctrinal issue.
translation_notes:
  revision_awareness: La base inglesa fue revisada en la cláusula final, pasando de «make known their meaning» a «understand» para reflejar más directamente la falta de comprensión. La versión española sigue esa revisión con «no pudieron entender» y conserva intactos los demás elementos narrativos del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - «Faraón» se conserva como nombre/título tradicional y transparente en español.
  - Se evitó «SEÑOR» o ajustes cristianizantes; el versículo es narrativo y no contiene terminología divina directa.
  - La sintaxis española conserva la acumulación de sujetos («los interpretadores… y los adivinos») como en el original, sin fusionarlos.
