    text: «Entender» refleja la revisión del inglés POB, que cambió una idea de “dar a conocer su significado” por la de falta de comprensión directa del contenido de los sueños.
    reason: source_note
  revision_rationale: Se corrige una expresión española importante para reflejar con precisión «both his dreams» como «sus dos sueños» y se mejora la naturalidad de «interpretadores» a «intérpretes» sin alterar el sentido fuente. La nota existente se conserva porque sigue siendo pertinente.
