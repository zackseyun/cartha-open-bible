translation:
  language: es
  text: Y el rey llamó a José por nombre Pontifans[a], y le dio por esposa a la hija de Potifar, la hija de Sawes[b], de Heliópolis, jefe de la guardia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Psonthomphanes». La forma ge''ez atestiguada aquí es Pontifans.'
    reason: textual_variant
  - marker: b
    text: 'O: «un sacerdote». El ge''ez conserva aquí Sawes, una forma transmitida y probablemente corrupta, que no se ha emendado en esta revisión.'
    reason: textual_variant
lexical_decisions:
- source_word: ጶንጢፋንስ
  english_pob_choice: Pontifans
  chosen_spanish: Pontifans
  alternatives_spanish:
  - Psonthomphanes
  lexicon: nombre propio
  rationale: El ge'ez lee ጶንጢፋንስ; el POB inglés revisado corrigió la forma previa a Pontifans para seguir el testimonio etiópico, no la armonización con Génesis/LXX. En español se conserva el nombre propio sin adaptar, con nota sobre la variante anterior.
- source_word: ሳውፅ
  english_pob_choice: Sawes
  chosen_spanish: Sawes
  alternatives_spanish:
  - un sacerdote
  - sacerdote
  lexicon: nombre propio / lectura corrupta
  rationale: El texto ge'ez presenta ሳውፅ, que la auditoría inglesa trata como una forma corrupta heredada y no como una emendación al sentido 'sacerdote'. En español se mantiene la forma transmitida 'Sawes' para respetar el testimonio textual, con nota aclaratoria.
- source_word: ወሀቦ ወለተ ... ብእሲተ
  english_pob_choice: he gave Joseph as wife the daughter of Potiphar, the daughter of Sawes
  chosen_spanish: le dio por esposa a la hija de Potifar, la hija de Sawes
  alternatives_spanish:
  - le dio como esposa
  - le entregó por esposa
  lexicon: frase verbal + parentesco
  rationale: La secuencia expresa concesión matrimonial; 'le dio por esposa' reproduce con naturalidad el valor relacional del original sin añadir matices no atestiguados. Se conserva la doble filiación tal como aparece en la tradición textual.
- source_word: ሊቀ ዐቀብት
  english_pob_choice: chief of the guards
  chosen_spanish: jefe de la guardia
  alternatives_spanish:
  - capitán de la guardia
  - jefe de los guardias
  lexicon: título administrativo
  rationale: La frase denota cargo oficial de vigilancia/guardia. 'Jefe de la guardia' es transparente en español y mantiene el rango administrativo sin sobreinterpretar el título.
theological_decisions:
- issue: Tratamiento del nombre divino ausente en el versículo
  english_pob_reading: No divine-name issue in this verse
  chosen_spanish_reading: Sin incidencia teológica directa en el texto base
  alternative_spanish_readings:
  - —
  rationale: El versículo no contiene יהוה, θεός ni una cita divina; por tanto no se requiere decisión sobre Yahvé/Señor ni ajuste doctrinal adicional.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió dos puntos clave del inglés POB: (1) la forma del nombre propio debe ser Pontifans, no la variante armonizada con la LXX; (2) Sawes no debe normalizarse a ''sacerdote'', sino preservarse como lectura textual transmitida. La nota sobre Pontifans también recupera la variante histórica Psonthomphanes documentada en el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene 'José' para יוסף/Ἰωσήφ conforme al estándar POB y al uso hispano común.
  - Se conservan los nombres propios sin hispanizarlos cuando la tradición textual exige una forma específica no transparente.
  - La puntuación y el orden sintáctico siguen el español moderno, sin alterar las relaciones semánticas del original.
