  to: Y ahora, que Faraón establezca supervisores en toda la tierra de Egipto, y que almacenen grano en los graneros[a] de las ciudades, en cada ciudad, durante los días[b] de los años de abundancia. Y será provisión para los siete años de hambre, y la tierra no perecerá ante el hambre, porque el hambre será muy severa.
  rationale: 'Se mantiene la traducción principal casi intacta porque es fiel al sentido del fuente y a las revisiones auditadas, pero se corrigen dos puntos menores: la nota [a] se alinea con la alternativa documentada por el POB (''en las ciudades''), y el cierre explicita el referente de ''muy severa'' para evitar ambigüedad en español. También se normaliza la redacción de la nota [b].'
