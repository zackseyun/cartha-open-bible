    changes_summary: No changes needed.
translation:
  language: es
  text: Y ahora, que Faraón establezca supervisores en toda la tierra de Egipto, y que almacenen grano en los graneros[a] de las ciudades, en cada ciudad, durante los días[b] de los años de abundancia. Y será provisión para los siete años de hambre, y la tierra no perecerá ante el hambre, porque el hambre será muy severa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las ciudades». El ge''ez dice literalmente «en las casas de las ciudades», expresión que aquí designa depósitos de grano.'
    reason: previous_rendering
  - marker: b
    text: 'O: «durante los años». El ge''ez conserva el giro literal «durante los días de los años», que se mantiene para reflejar el giro semítico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይስራዕ፡ ፈርዖን፡
  english_pob_choice: let Pharaoh appoint
  chosen_spanish: que Faraón establezca
  alternatives_spanish:
  - que Faraón nombre
  - que Faraón designe
  lexicon: appoint
  rationale: El ge'ez pide una acción de establecer/nombrar funcionarios; 'establezca' conserva la iniciativa regia sin sonar demasiado administrativo. 'Nombre' y 'designe' son válidas, pero 'establezca' funciona bien en español bíblico actual.
- source_word: መኰንነ
  english_pob_choice: overseers
  chosen_spanish: supervisores
  alternatives_spanish:
  - inspectores
  - administradores
  - intendentes
  lexicon: overseer
  rationale: El término apunta a funcionarios encargados de supervisar el acopio. 'Supervisores' es transparente y no carga una jerarquía eclesiástica ajena al contexto; 'intendentes' sería más tradicional pero menos claro hoy.
- source_word: በቤተ፡ አህጉር
  english_pob_choice: in the storehouses of the cities
  chosen_spanish: en los graneros de las ciudades
  alternatives_spanish:
  - en las casas de las ciudades
  - en los almacenes de las ciudades
  lexicon: house/storehouse
  rationale: La revisión auditada señala que 'casa(s) de las ciudades' funciona aquí como 'graneros/almacenes'. En español, 'graneros' comunica el sentido de depósito de grano sin forzar la imagen. Se conserva 'de las ciudades' para reflejar la distribución local.
- source_word: በመዋዕለ፡ ዓመታት
  english_pob_choice: during the days of the years of abundance
  chosen_spanish: durante los días de los años de abundancia
  alternatives_spanish:
  - durante los años de abundancia
  - en los días de abundancia
  lexicon: days of the years
  rationale: Se mantiene el giro semítico 'días de los años' porque el informe de revisión lo marca como matiz presente en el ge'ez. Aunque suena menos natural, es una huella textual importante que no conviene aplanar.
- source_word: ሲሳተ፡
  english_pob_choice: provision
  chosen_spanish: provisión
  alternatives_spanish:
  - alimento
  - sustento
  - reserva
  lexicon: provision
  rationale: '''Provisión'' reproduce bien la idea de reserva anticipada para el tiempo de hambre y mantiene el registro bíblico contemporáneo.'
- source_word: ረኃብ
  english_pob_choice: famine
  chosen_spanish: hambre
  alternatives_spanish:
  - famine
  - escasez
  - carestía
  lexicon: famine
  rationale: En español bíblico 'hambre' comunica el juicio de escasez masiva y preserva la naturalidad del texto. 'Carestía' o 'escasez' serían más abstractas.
- source_word: ኢትትሐጐል፡ ምድር፡ እምቅድመ፡ ገጸ፡ ረኃብ
  english_pob_choice: the land will not perish before the face of the famine
  chosen_spanish: la tierra no perecerá ante el hambre
  alternatives_spanish:
  - la tierra no perecerá delante del hambre
  - la tierra no será destruida por el hambre
  lexicon: perish before the face of
  rationale: '''Ante el hambre'' transmite la idea de ''en presencia de'' sin el calco más duro ''delante del rostro''. ''Perecerá'' conserva la fuerza del verbo sin volverlo demasiado interpretativo.'
- source_word: ኀያል፡
  english_pob_choice: very severe
  chosen_spanish: muy severa
  alternatives_spanish:
  - muy intensa
  - muy grave
  - extremadamente fuerte
  lexicon: severe/strong
  rationale: '''Severa'' expresa la intensidad de la hambruna con un adjetivo natural en español. La forma femenina concuerda con ''hambre'' entendida implícitamente como calamidad/escasez.'
theological_decisions:
- issue: Divine-name masking and Christological terminology
  english_pob_reading: No direct divine-name or Christological language appears in this verse.
  chosen_spanish_reading: No aparece lenguaje del nombre divino ni cristológico en este versículo.
  alternative_spanish_readings:
  - No aplica.
  - Sin decisión teológica especial.
  rationale: No hay necesidad de aplicar los valores por defecto de Yahvé o Mesías/Cristo en este pasaje; el contenido es administrativo y providencial, no confesional.
  doctrine_reference: No aplica
- issue: Severity of the famine as a providential test
  english_pob_reading: the land will not perish before the face of the famine, for it will be very severe
  chosen_spanish_reading: la tierra no perecerá ante el hambre, porque será muy severa
  alternative_spanish_readings:
  - la tierra no será destruida por el hambre, porque será muy fuerte
  - la tierra no perecerá frente a la hambruna, porque será muy intensa
  rationale: La formulación conserva el aviso de una calamidad real y extrema sin suavizarla. No se añade interpretación moral; sólo se traduce la urgencia del texto.
  doctrine_reference: Providencia divina y preservación en tiempos de juicio
- issue: Semitic idiom preservation
  english_pob_reading: during the days of the years of abundance
  chosen_spanish_reading: durante los días de los años de abundancia
  alternative_spanish_readings:
  - durante los años de abundancia
  - durante el tiempo de abundancia
  rationale: Se preserva el giro idiomático porque la revisión textual lo identifica como lectura significativa del ge'ez. En un texto fuente-auditado, la forma menos fluida puede ser la más fiel.
  doctrine_reference: Fidelidad textual / equivalencia semítica
translation_notes:
  revision_awareness: 'La revisión auditada corrige dos puntos clave del borrador inglés previo: (1) no omitir ''storehouses'' al traducir በቤተ፡ አህጉር, entendido aquí como depósitos/graneros de las ciudades; (2) no aplanar el giro በመዋዕለ፡ ዓመታት, que literalmente aporta ''los días de los años''. La versión española incorpora ambos matices de forma explícita.'
  spanish_consistency_notes:
  - Se mantiene 'grano' para el contenido almacenado, no 'alimento' general, porque el contexto agrícola y el audit trail lo exigen.
  - '''hambre'' se usa con sentido de hambruna; no se introduce ''hambruna'' en el cuerpo para conservar la correspondencia con el inglés POB, aunque podría usarse en una alternativa.'
  - No se emplea 'SEÑOR' ni 'Cristo', ya que el versículo no contiene lenguaje divino o cristológico.
  - La puntuación y el orden reflejan el paralelismo del original sin convertirlo en prosa interpretativa.
