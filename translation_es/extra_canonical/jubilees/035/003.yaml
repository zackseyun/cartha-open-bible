translation:
  language: es
  text: 'Y tú, mi hijo, sabes desde el día en que naciste hasta este día todos mis hechos y todo lo que hay en mi corazón: que amo a tu padre sobremanera.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - hijo mío
  lexicon: Leslau
  rationale: El vocativo afectivo se rinde de manera natural como «mi hijo»; mantiene cercanía y evita una inversión innecesaria del orden en español.
- source_word: ታአምር
  english_pob_choice: know
  chosen_spanish: conocerás
  alternatives_spanish:
  - sabrás
  - reconocerás
  lexicon: Leslau
  rationale: Aquí el verbo expresa conocimiento personal y reconocido por experiencia; «conocerás» conserva ese matiz relacional sin volverlo excesivamente abstracto.
- source_word: ምግባርየ
  english_pob_choice: deeds
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  - conducta
  lexicon: Leslau
  rationale: Aunque el inglés POB eligió «deeds», en español «obras» comunica con claridad las acciones visibles de una vida; «conducta» sería posible, pero pierde algo del peso concreto del término.
- source_word: ዘውስተ ልብየ
  english_pob_choice: all that is in my heart
  chosen_spanish: todo lo que hay en mi corazón
  alternatives_spanish:
  - todo lo que está en mi corazón
  - todo lo que llevo en mi corazón
  lexicon: Leslau
  rationale: La expresión preserva la interioridad del hebraísmo semítico subyacente; «hay» suena natural en español y mantiene el sentido literal sin paráfrasis.
- source_word: ጥቀ
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - muchísimo
  - en gran manera
  - en extremo
  lexicon: Leslau
  rationale: «Sobremanera» es un equivalente digno y preciso para la intensidad del adverbio; evita el tono más coloquial de «muchísimo».
theological_decisions:
- issue: Amor intensificado hacia el padre
  english_pob_reading: I love your father exceedingly.
  chosen_spanish_reading: amo a tu padre sobremanera.
  alternative_spanish_readings:
  - lo amo muchísimo
  - amo a tu padre en gran manera
  rationale: Se conserva la afirmación afectiva intensa sin suavizarla. No se añade lenguaje doctrinal ni se desplaza el foco del amor declarado por el hablante.
  doctrine_reference: none
translation_notes:
  revision_awareness: El testimonio fuente y el audit trail inglés coinciden en la lectura restaurada del verso completo; se evitó reproducir el error previo de truncación y la inversión de interlocutores. No hay necesidad de nota de variante textual porque el texto ge'ez proporcionado ya refleja la forma corregida.
  spanish_consistency_notes:
  - Se mantiene «mi hijo» para el vocativo directo y «tu padre» para el poseedor, siguiendo la relación del discurso en la fuente.
  - No se usa «SEÑOR» ni terminología litúrgica ajena, porque el pasaje no contiene el nombre divino.
  - «Obras» y «corazón» conservan el paralelismo entre conducta externa e interioridad presente en el original.
