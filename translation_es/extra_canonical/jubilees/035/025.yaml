translation:
  language: es
  text: 'Y en el sexto año de esta semana, Isaac llamó a sus dos hijos, Esaú y Jacob, y vinieron a él. Y les dijo: “Hijos míos, voy por el camino de mis padres, a la casa eterna donde están mis padres.”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: in the sixth year of this week
  english_pob_choice: And in the sixth year of this week
  chosen_spanish: Y en el sexto año de esta semana
  alternatives_spanish:
  - Y en el sexto año de aquella semana
  - Y en el sexto año de ese ciclo
  lexicon: Jubilees chronological formula
  rationale: La revisión auditada corrigió el demostrativo al valor inmediato de la fórmula ge'ez, por lo que 'esta semana' conserva mejor la deixis cronológica característica del libro. 'Aquella semana' debilitaría esa inmediatez; 'ciclo' explicita demasiado y no está exigido por el texto.
- source_word: called
  english_pob_choice: Isaac called his two sons
  chosen_spanish: llamó a sus dos hijos
  alternatives_spanish:
  - convocó a sus dos hijos
  - hizo llamar a sus dos hijos
  lexicon: καλέω / lexical call formula
  rationale: '''Llamó'' es la opción más directa y natural en español para una llamada personal a la presencia del padre. ''Convocó'' introduce un matiz más formal o público que el contexto no requiere.'
- source_word: the eternal house
  english_pob_choice: the eternal house where my fathers are
  chosen_spanish: la casa eterna donde están mis padres
  alternatives_spanish:
  - la morada eterna donde están mis padres
  - la casa eterna donde se hallan mis padres
  lexicon: house / dwelling metaphor
  rationale: Mantengo 'casa eterna' porque sigue de cerca la metáfora espacial del original y de la versión inglesa auditada. 'Morada' es posible, pero 'casa' preserva mejor la imagen concreta. 'Están' evita una perífrasis innecesaria y conserva la sencillez del enunciado.
theological_decisions:
- issue: Expresión de la muerte como ida al destino de los padres
  english_pob_reading: I am going on the way of my fathers, to the eternal house where my fathers are.
  chosen_spanish_reading: voy por el camino de mis padres, a la casa eterna donde están mis padres
  alternative_spanish_readings:
  - voy al camino de mis padres, a la casa eterna donde están mis padres
  - me voy por el camino de mis padres, a la casa eterna donde están mis padres
  rationale: La formulación conserva el eufemismo narrativo de 'ir por el camino de mis padres' sin convertirlo en una explicación doctrinal. 'Camino' mantiene la metáfora heredada y 'casa eterna' reproduce la imagen de destino post-mortem sin añadir precisiones no presentes en el texto.
  doctrine_reference: lenguaje bíblico narrativo sobre la muerte y el destino de los antepasados
translation_notes:
  revision_awareness: La versión española sigue la lectura revisada 'this week' de la auditoría reciente, no la forma anterior 'that week'. No se requiere nota textual adicional porque la decisión ya quedó resuelta por el estado revisado del expediente.
  spanish_consistency_notes:
  - Se mantuvo 'Isaac', 'Esaú' y 'Jacob' con la ortografía española usual.
  - Se conservó el registro solemne y narrativo sin arcaísmos innecesarios.
  - No se introdujo 'SEÑOR' ni otras sustituciones teológicas ajenas al texto, ya que este versículo no contiene el Tetragrámaton ni equivalentes directos.
