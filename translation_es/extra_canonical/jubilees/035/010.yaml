base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/035/010.yaml
  text: He will kill him after your death. And you know all that he has done from the day his brother Jacob went to Haran until this day, how with all his heart he has forsaken us and has done
  revision_pass:
    model: gemini-3.1-pro-preview
    timestamp: '2026-04-23T21:04:29Z'
    unchanged: false
    changes_summary: Corrected the first clause to an independent sentence ('He will kill him after your death'). Fixed a major translation error where Jacob was incorrectly identified as the one whose conduct was being measured, rather than the one who went to Haran. Changed 'left us' to 'forsaken us' for better register.
translation:
  language: es
  text: Él lo matará después de tu muerte. Y tú conoces todo lo que ha hecho desde el día en que su hermano Jacob se fue a Harán hasta este día, cómo con todo su corazón nos ha abandonado y ha hecho
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይቅትሎ
  english_pob_choice: He will kill him
  chosen_spanish: Él lo matará
  alternatives_spanish:
  - Lo matará
  - Él lo matará
  lexicon: Ge'ez verbal form of 'kill'
  rationale: La forma verbal exige una acción futura dirigida a un objeto masculino; en español, el objeto directo clítico 'lo' hace explícita la referencia y conserva la fuerza directa del enunciado.
- source_word: እምድኅረ፡ ሞትከ
  english_pob_choice: after your death
  chosen_spanish: después de tu muerte
  alternatives_spanish:
  - tras tu muerte
  - después de que mueras
  lexicon: temporal construction
  rationale: La construcción temporal se expresa de forma natural en español con 'después de tu muerte', sin añadir matices interpretativos.
- source_word: ኵሎ፡ መጠነ፡ ገብረ፡
  english_pob_choice: all that he has done
  chosen_spanish: todo lo que ha hecho
  alternatives_spanish:
  - todo cuanto ha hecho
  - todo lo que hizo
  lexicon: totality + perfective verbal sense
  rationale: '''መጠነ'' señala totalidad o medida completa; ''todo lo que ha hecho'' conserva esa amplitud y el perfecto español refleja el estado resultante hasta el presente.'
- source_word: እምዕለተ፡ ሖረ፡ ያዕቆብ፡ እኁሁ፡ ውስተ፡ ካራን፡
  english_pob_choice: from the day his brother Jacob went to Haran
  chosen_spanish: desde el día en que su hermano Jacob fue a Harán
  alternatives_spanish:
  - desde el día en que Jacob, su hermano, fue a Harán
  - desde el día que su hermano Jacob fue a Harán
  lexicon: temporal starting point + proper noun
  rationale: 'La lectura revisada del inglés POB corrige el referente: el que va a Harán es Jacob, no Esaú. El español mantiene esa estructura y evita ambigüedad con el orden de los complementos.'
- source_word: ኀደገነ
  english_pob_choice: has forsaken us
  chosen_spanish: nos ha abandonado
  alternatives_spanish:
  - nos ha dejado
  - nos ha forsacado
  lexicon: verb of leaving/abandoning
  rationale: El Ge'ez expresa abandono con una carga relacional fuerte; 'abandonar' comunica mejor esa ruptura que un simple 'dejar'. En esta cláusula no es necesario forzar un arcaísmo como 'forsacar' en el texto principal.
theological_decisions:
- issue: Referencia del sujeto que viaja a Harán
  english_pob_reading: his brother Jacob went to Haran
  chosen_spanish_reading: su hermano Jacob fue a Harán
  alternative_spanish_readings:
  - Jacob, su hermano, fue a Harán
  - su hermano fue a Harán
  rationale: 'Se sigue la revisión auditada que corrige una mala identificación previa: Jacob es el que fue a Harán. Mantenerlo así evita atribuir a otro personaje la acción de la cláusula temporal.'
  doctrine_reference: Coherencia narrativa y fidelidad textual
- issue: Intensidad del abandono
  english_pob_reading: has forsaken us
  chosen_spanish_reading: nos ha abandonado
  alternative_spanish_readings:
  - nos ha dejado
  - nos ha desamparado
  rationale: '''Abandonar'' preserva la fuerza relacional y moral del inglés POB ''forsaken'' sin introducir un giro más solemne que el texto no exige. ''Desamparar'' sería viable, pero ''abandonar'' es más directo y publicable en español moderno.'
  doctrine_reference: Lexical force in relational language
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió tres puntos: la primera cláusula debe leerse como una oración independiente (''He will kill him after your death''); el referente temporal es Jacob, no otro personaje; y ''left us'' fue elevado a ''forsaken us''. El español refleja esas correcciones sin revertir a la lectura errónea previa.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - No se introducen notas de pie porque el texto base y la revisión inglesa no preservan variantes textuales activas para este versículo.
  - '''Jacob'' se conserva como forma usual en el corpus POB para el patriarca, y ''Harán'' sigue la ortografía española estándar.'
