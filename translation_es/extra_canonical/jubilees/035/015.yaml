    changes_summary: Adjusted word order to 'Jacob his brother' for closer alignment with the source, and revised 'nor will he do good, but only evil' to 'nor will he do anything but evil' to reflect the construction more naturally and accurately.
translation:
  language: es
  text: su impureza y después de su error, él y sus hijos. Y tú me dices que le haga jurar que no matará a Jacob su hermano. Aunque jure, no guardará su juramento, ni hará más que maldad. Y si desea matar a Jacob su hermano, será entregado en la mano de Jacob, y no escapará de su mano, porque caerá en su mano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ርኵሶን፡
  english_pob_choice: their uncleanness
  chosen_spanish: su impureza
  alternatives_spanish:
  - su inmundicia
  - su contaminación ritual
  lexicon: N/A
  rationale: El ge'ez expresa una condición de impureza; en español, «impureza» conserva el valor moral/ritual sin cargar de manera excesiva con una imagen más cruda. «Inmundicia» es posible, pero suena más marcado; «contaminación ritual» explicita demasiado una precisión no dada por el texto inmediato.
- source_word: ወድኅረ፡ ስሕተቶን፡
  english_pob_choice: after their error
  chosen_spanish: después de su error
  alternatives_spanish:
  - después de su extravío
  - tras su desvío
  lexicon: N/A
  rationale: «Error» reproduce bien la idea de falta/desviación sin añadir una interpretación más específica que el texto no exige. Las alternativas son válidas, pero menos directas para un registro bíblico moderno.
- source_word: ያዕቆብሃ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: N/A
  rationale: Se conserva el nombre bíblico en la forma castellana habitual «Jacob», que corresponde al personaje del pasaje.
- source_word: መሐለ
  english_pob_choice: swears
  chosen_spanish: jure
  alternatives_spanish:
  - haga juramento
  - jure solemnemente
  lexicon: N/A
  rationale: El verbo exigido por el contexto es jurar; «jure» mantiene naturalidad en español y el valor verbal directo del original.
- source_word: ኢይገብር፡ ኂሩተ፡ ዘእንበለ፡ እኩይ፡
  english_pob_choice: will not do anything but evil
  chosen_spanish: ni hará otra cosa que maldad
  alternatives_spanish:
  - ni hará sino mal
  - ni hará nada más que mal
  lexicon: N/A
  rationale: La construcción ge'ez enfatiza exclusividad negativa. «Otra cosa que maldad» conserva ese sentido sin sonar forzado; «sino mal» sería más breve, pero algo menos transparente al valor enfático.
- source_word: ይትወሀብ፡ ወኢያመሥጥ፡ እምእዴሁ፡
  english_pob_choice: he will be given into Jacob’s hand, and he will not escape from his hand
  chosen_spanish: será entregado en mano de Jacob, y no escapará de su mano
  alternatives_spanish:
  - será puesto en mano de Jacob, y no se librará de su mano
  - caerá en mano de Jacob, y no huirá de su mano
  lexicon: N/A
  rationale: «Ser entregado en mano de» refleja el pasivo del original y mantiene el matiz bíblico de quedar bajo el poder de otro. «No escapará de su mano» preserva la imagen de fuga imposible sin añadir explicaciones.
- source_word: ይወርድ
  english_pob_choice: will fall into his hand
  chosen_spanish: caerá en su mano
  alternatives_spanish:
  - caerá en sus manos
  - vendrá a sus manos
  lexicon: N/A
  rationale: La imagen final del texto es la de caer bajo control; «caerá en su mano» sigue de cerca el original y evita diluir el paralelismo con la cláusula anterior.
theological_decisions:
- issue: Relación entre impureza/error y la culpabilidad moral de los hijos
  english_pob_reading: their uncleanness and after their error, he and his children.
  chosen_spanish_reading: por su impureza y después de su error, él y sus hijos.
  alternative_spanish_readings:
  - a causa de su impureza y después de su error, él y sus hijos
  - por su impureza y tras su extravío, él y sus hijos
  rationale: El texto es sintácticamente difícil. La redacción española conserva la yuxtaposición de impureza y error sin resolverla artificialmente. No se amplía a una explicación causal más fuerte que la que el pasaje permite.
  doctrine_reference: No aplica; decisión de sintaxis y semántica textual.
- issue: Fuerza de la amenaza contra Jacob y garantía de protección divina
  english_pob_reading: he will be given into Jacob’s hand, and he will not escape from his hand, for he will fall into his hand.
  chosen_spanish_reading: será entregado en mano de Jacob, y no escapará de su mano, porque caerá en su mano.
  alternative_spanish_readings:
  - será dado en mano de Jacob, y no escapará de su mano, porque caerá en su mano
  - caerá en mano de Jacob y no escapará de su mano
  rationale: La cláusula conserva la tensión entre intención humana y determinación providencial del desenlace. «En mano de Jacob» mantiene el hebraísmo/semítismo del original, importante para no suavizar la imagen de dominio o entrega.
  doctrine_reference: Providencia divina y protección de Jacob dentro del relato de Jubileos.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para acercar el orden a «Jacob his brother» y para reforzar la exclusividad de la maldad con «anything but evil». La versión española sigue esa revisión, evitando una traducción que sugiera simplemente ausencia de bondad; mantiene en cambio la fuerza de una conducta exclusivamente mala.
  spanish_consistency_notes:
  - Se mantiene «Jacob» como forma del nombre en todo el pasaje.
  - Se conserva «mano» en las dos cláusulas finales para respetar el paralelismo del original.
  - No se usa «Señor» como máscara del nombre divino porque el verso no contiene una mención explícita de YHWH.
  - «Impureza» y «error» se dejan en paralelo sin armonizarlos, porque el original también los yuxtapone sin aclaración adicional.
