translation:
  language: es
  text: 'Y tú, no temas por Jacob, porque el guardián de Jacob es grande, poderoso y honrado, y más alabado que el guardián de Esaú. Y Rebeca envió y llamó a Esaú, y él vino a ella. Y ella le dijo: «Hijo mío, te pido una sola cosa; di que la harás, hijo mío».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Jacob’s guardian
  english_pob_choice: Jacob’s guardian
  chosen_spanish: el guardián de Jacob
  alternatives_spanish:
  - el protector de Jacob
  - el custodio de Jacob
  lexicon: guardian
  rationale: Conservo la imagen de un guardián/protector personal sin convertirla en una explicación más libre. «Guardián» mantiene bien la relación posesiva y la fuerza de tutela del inglés POB.
- source_word: great and mighty and honored
  english_pob_choice: great and mighty and honored
  chosen_spanish: grande, poderoso y honrado
  alternatives_spanish:
  - grande, fuerte y honrado
  - grande, poderoso y venerado
  lexicon: great / mighty / honored
  rationale: La triple acumulación se mantiene en español con adjetivos separados. «Poderoso» rinde mejor la fuerza de mighty que «fuerte» en este contexto, y «honrado» conserva el valor de reconocido/estimado sin cambiar el tono del texto.
- source_word: more praised than Esau’s guardian
  english_pob_choice: more praised than Esau’s guardian
  chosen_spanish: más alabado que el guardián de Esaú
  alternatives_spanish:
  - más loado que el guardián de Esaú
  - más celebrado que el guardián de Esaú
  lexicon: praised
  rationale: Sigo la corrección auditada que entiende el comparativo como un rasgo del guardián de Jacob, no como una acción de Rebeca. «Alabado» preserva la comparación de honra/elogio sin introducir una idea de poder que no está en la revisión.
- source_word: And Rebekah sent and called Esau
  english_pob_choice: And Rebekah sent and called Esau
  chosen_spanish: Y Rebeca envió y llamó a Esaú
  alternatives_spanish:
  - Y Rebeca mandó a buscar a Esaú
  - Y Rebeca envió a llamar a Esaú
  lexicon: sent and called
  rationale: Incluyo ambos verbos para reflejar el hebraísmo/idioma narrativo conservado por el POB inglés y la revisión que corrige la omisión de «envió». «Envió y llamó» es directa y fiel sin sobreexplicar.
- source_word: My son, I ask one request from you
  english_pob_choice: My son, I ask one request from you
  chosen_spanish: Hijo mío, te pido una sola cosa
  alternatives_spanish:
  - Hijo mío, te hago una petición
  - Hijo mío, te ruego una cosa
  lexicon: one request
  rationale: «Una sola cosa» reproduce el énfasis de singularidad de la petición con naturalidad en español. Evito formas demasiado formales o amplificadas.
- source_word: say that you will do it
  english_pob_choice: say that you will do it
  chosen_spanish: di que la harás
  alternatives_spanish:
  - di que lo harás
  - promete que lo harás
  lexicon: do it
  rationale: «La harás» retoma la petición femenina implícita en «una sola cosa»/«petición» y mantiene la referencia sin forzar el género del objeto en español. La formulación es idiomática y compacta.
theological_decisions:
- issue: Jerarquía y cualidades del guardián de Jacob frente al de Esaú
  english_pob_reading: Jacob’s guardian is great and mighty and honored, and more praised than Esau’s guardian
  chosen_spanish_reading: el guardián de Jacob es grande, poderoso y honrado, y más alabado que el guardián de Esaú
  alternative_spanish_readings:
  - el guardián de Jacob es grande, fuerte y honrado, y más alabado que el guardián de Esaú
  - el guardián de Jacob es grande, poderoso y estimado, y más alabado que el guardián de Esaú
  rationale: Mantengo la comparación explícita entre guardianes como la lee el POB inglés y la revisión textual. No suavizo la frase en una mera afirmación de superioridad general, porque el texto conserva una comparación concreta de honor/alabanza.
  doctrine_reference: ángeles/guardianes en literatura antigua; comparación de honor, no definición dogmática
translation_notes:
  revision_awareness: La versión inglesa auditada fue corregida para eliminar una lectura errónea que atribuía a Rebeca una acción de alabanza a Isaac; el texto final conserva que Rebeca envió y llamó a Esaú, y que el comparativo 'más alabado' describe al guardián de Jacob. La traducción española refleja esa corrección y evita la omisión de 'envió'.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino explícito.
  - Mantengo «guardián» en singular y «Esaú» con acento, de acuerdo con la norma editorial española.
  - 'Conservo el orden narrativo de dos acciones: primero Rebeca envió y llamó, luego habló a Esaú.'
