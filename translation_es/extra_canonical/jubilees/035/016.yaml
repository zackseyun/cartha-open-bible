  text: And you, do not fear for Jacob, for Jacob’s guardian is great and mighty and honored, and more praised than Esau’s guardian.” And Rebekah sent and called Esau, and he came to her. And she said to him, “My son, I ask one request from you; say that you will do it, my son.”
