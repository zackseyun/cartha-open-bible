translation:
  language: es
  text: Y te juro que lo amaré, y que no buscaré hacerle mal todos los días de mi vida, sino solo bien.” Y él le juró sobre todo este asunto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: I swear to you
  english_pob_choice: I swear to you
  chosen_spanish: te juro
  alternatives_spanish:
  - te lo juro
  - juro por ti
  lexicon: jurar
  rationale: “Te juro” reproduce el acto solemne de prometer con juramento de manera natural en español y conserva la relación directa del hablante con la segunda persona.
- source_word: I will love him
  english_pob_choice: I will love him
  chosen_spanish: lo amaré
  alternatives_spanish:
  - le amaré
  - lo querré
  lexicon: amar
  rationale: Se mantiene el verbo “amar” para conservar la fuerza explícita del compromiso afectivo expresado en el texto fuente. El objeto directo masculino singular se expresa con ‘lo’ en español estándar.
- source_word: I will not seek evil against him
  english_pob_choice: I will not seek evil against him
  chosen_spanish: no buscaré mal contra él
  alternatives_spanish:
  - no procuraré mal contra él
  - no intentaré hacerle mal
  lexicon: buscar mal
  rationale: La construcción ‘buscar mal’ refleja de forma bastante directa la oposición de buscar el mal contra alguien, sin suavizar la intención hostil que el inglés mantiene.
- source_word: all the days of my life
  english_pob_choice: all the days of my life
  chosen_spanish: todos los días de mi vida
  alternatives_spanish:
  - durante todos los días de mi vida
  - en todos los días de mi vida
  lexicon: todos los días de mi vida
  rationale: Es una equivalencia idiomática natural y precisa para la duración total de la vida.
- source_word: but only good
  english_pob_choice: but only good
  chosen_spanish: sino solo bien
  alternatives_spanish:
  - sino únicamente bien
  - sino solo lo bueno
  lexicon: bien
  rationale: ‘Bien’ conserva el contraste moral general del texto y evita restringir indebidamente el alcance de ‘good’ a una sola categoría.
- source_word: And he swore to her concerning all this matter
  english_pob_choice: And he swore to her concerning all this matter
  chosen_spanish: Y ella le juró sobre todo este asunto
  alternatives_spanish:
  - Y él le juró sobre todo este asunto
  - Y él le hizo juramento sobre todo este asunto
  lexicon: jurar
  rationale: El contexto de la unidad narrativa sugiere una respuesta juramentada dentro del diálogo. Se conserva la formulación amplia ‘sobre todo este asunto’ para reflejar la totalidad del compromiso. La ambigüedad de género en el resumen inglés se mantiene sin forzar una identificación más allá del contexto disponible.
theological_decisions:
- issue: Nature of the oath and moral commitment
  english_pob_reading: The speaker swears love and exclusive benevolence, rejecting evil intent for life
  chosen_spanish_reading: El juramento expresa amor y benevolencia exclusiva, rechazando toda intención de mal durante toda la vida
  alternative_spanish_readings:
  - El juramento expresa una promesa afectiva y ética
  - El juramento enfatiza una fidelidad moral continua
  rationale: 'La traducción conserva el valor ético del juramento sin ampliarlo más allá del texto: no solo promete afecto, sino también ausencia de malicia y orientación exclusiva al bien.'
  doctrine_reference: Ética del juramento y fidelidad moral en el habla
- issue: Responder with a sworn affirmation
  english_pob_reading: And he swore to her concerning all this matter
  chosen_spanish_reading: La respuesta finaliza con un juramento respecto de todo el asunto
  alternative_spanish_readings:
  - La respuesta confirma solemnemente todo el asunto
  - La respuesta ratifica por juramento lo dicho
  rationale: Se preserva la solemnidad del acto de jurar y su alcance total sobre la materia tratada, sin añadir detalles sobre la fórmula exacta del juramento.
  doctrine_reference: Solemnidad del juramento y confirmación verbal
translation_notes:
  revision_awareness: El pasaje en inglés POB fue revisado y quedó sin cambios; la versión española se alinea con esa lectura estable. No hay notas textuales ni variantes documentadas en el paquete fuente, por lo que no se introducen notas al pie.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ fuera del texto porque el versículo no contiene el nombre divino.
  - Se evita ‘siervo’/‘esclavo’ porque no aparece δοῦλος ni equivalente en este versículo.
  - Se conserva un registro sobrio y narrativo, acorde con el tono del juramento.
  - No se añadieron marcadores de nota al pie para evitar anclajes sin correspondencia en el texto.
