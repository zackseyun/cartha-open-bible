revisions:
- from: Y te juro que lo amaré, y que no buscaré mal contra él todos los días de mi vida, sino solo bien.” Y ella le juró sobre todo este asunto.
  to: Y te juro que lo amaré, y que no buscaré hacerle mal todos los días de mi vida, sino solo bien.” Y él le juró sobre todo este asunto.
  rationale: Se corrige el sujeto de la oración final para ajustarlo al inglés POB auditado ('él ... a ella') y se mejora la naturalidad de 'buscar mal contra él' a 'buscar hacerle mal', manteniendo el mismo sentido de no procurar daño. No se requieren notas al pie.
