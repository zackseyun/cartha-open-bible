translation:
  language: es
  text: 'Y les mando, hijos míos: practiquen la justicia y la rectitud en la tierra, para que Yahvé traiga sobre ustedes todo lo que Yahvé dijo que haría para Abraham y para su descendencia.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: righteousness
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia y rectitud
  lexicon: δικαιοσύνη / צדקה
  rationale: ‘Justicia’ conserva el campo moral y relacional del término en español bíblico contemporáneo, sin debilitarlo a una simple corrección legal. Se coordina con ‘rectitud’ para reflejar la doble formulación del inglés POB.
- source_word: uprightness
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - integridad
  lexicon: יָשָׁר / ὀρθότης
  rationale: ‘Rectitud’ reproduce la idea de conducta recta e íntegra, y permite mantener la pareja semántica con ‘justicia’ sin fusionarlas en un solo término.
- source_word: the earth
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - en el mundo
  lexicon: אֶרֶץ
  rationale: ‘Sobre la tierra’ sigue de cerca la preposición del inglés POB y conserva el sentido de ámbito de vida y acción humana; ‘en la tierra’ también sería posible, pero ‘sobre’ mantiene mejor la huella del original auditado.
- source_word: Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: יהוה
  rationale: Se mantiene el nombre divino según la política POB en español. ‘Yahvé’ es la forma estándar elegida para el texto principal.
theological_decisions:
- issue: Repetición del nombre divino en dos miembros de la cláusula
  english_pob_reading: so that Yahweh may bring upon you all that Yahweh said he would do
  chosen_spanish_reading: para que Yahvé haga venir sobre ustedes todo lo que Yahvé dijo que haría
  alternative_spanish_readings:
  - para que Yahvé traiga sobre ustedes todo lo que Yahvé dijo que haría
  - para que Yahvé cumpla sobre ustedes todo lo que Yahvé dijo que haría
  rationale: La repetición explícita de Yahvé se conserva para reflejar el patrón del texto fuente y la audit trail inglesa, sin suavizarla con pronombres o sustituciones que oculten la insistencia teológica.
  doctrine_reference: Nombre divino y fidelidad del pacto
translation_notes:
  revision_awareness: El inglés POB revisado sustituyó ‘the LORD’ por ‘Yahweh’ y volvió más directa la exhortación (‘do righteousness and uprightness on the earth’). La versión española sigue esa revisión, conserva la duplicación del nombre divino y evita un calco excesivamente rígido donde el español permite una formulación natural.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para el nombre divino.
  - Se evita ‘SEÑOR’ por la política terminológica del proyecto.
  - ‘Justicia’ y ‘rectitud’ se conservan como pareja semántica diferenciada.
  - ‘Mis hijos’ reproduce el tono parentético/exhortativo del original auditado.
