translation:
  language: es
  text: 'Y Jacob le dijo: «Haré todo lo que me has mandado, porque este asunto será para mí honor y grandeza, y justicia delante de Dios: el honrarlos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  lexicon: N/A
  rationale: Nombre propio bíblico establecido en español; mantiene claridad y reconocimiento sin alterar la forma del original.
- source_word: ዘአዘዝክኒ
  english_pob_choice: that you have commanded me
  chosen_spanish: que me has mandado
  alternatives_spanish:
  - que me has ordenado
  - que me has encomendado
  lexicon: N/A
  rationale: El verbo expresa una orden dada a Jacob por una interlocutora femenina singular; 'mandado' conserva bien el valor de mandato sin sonar artificial.
- source_word: ክብረ ፡ ወዕበየ
  english_pob_choice: an honor and greatness
  chosen_spanish: honor y grandeza
  alternatives_spanish:
  - honra y grandeza
  - honor e importancia
  lexicon: N/A
  rationale: La pareja nominal se traduce de forma directa y digna; 'grandeza' preserva el énfasis en elevación o peso de la acción.
- source_word: ወጽድቀ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: N/A
  rationale: '''Justicia'' mantiene el valor ético-forense del término en un registro bíblico natural en español; ''rectitud'' sería posible, pero atenúa el eco legal/moral del pasaje.'
- source_word: ቅድመ እግዚአብሔር
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en presencia de Dios
  lexicon: N/A
  rationale: '''Delante de Dios'' conserva la preposición relacional y el matiz de evaluación divina que funciona bien en español bíblico contemporáneo.'
- source_word: ከመ አክብሮሙ
  english_pob_choice: that I should honor them
  chosen_spanish: para honrarlos
  alternatives_spanish:
  - para que yo los honre
  - a fin de honrarlos
  lexicon: N/A
  rationale: La finalidad del infinitivo refleja adecuadamente el ge'ez y el sentido de propósito; 'honrarlos' evita una paráfrasis excesiva.
theological_decisions:
- issue: Relación entre 'justicia' y aceptación delante de Dios
  english_pob_reading: and righteousness before God
  chosen_spanish_reading: y justicia delante de Dios
  alternative_spanish_readings:
  - y rectitud delante de Dios
  - y una cosa justa delante de Dios
  rationale: Se conserva la tensión ética del enunciado sin convertirlo en una declaración doctrinal más amplia; 'justicia' permanece como cualidad evaluada por Dios, tal como en el inglés POB.
  doctrine_reference: Sabiduría bíblica/ética del texto, sin formulación dogmática explícita.
translation_notes:
  revision_awareness: Se respetó la revisión que aísla estrictamente Jubileos 35:2 y se evitó incorporar material del versículo 1; la traducción sigue solo la respuesta de Jacob contenida en el texto fuente proporcionado.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para እግዚአብሔር, conforme al estándar del proyecto.
  - Se evitó 'Señor' porque el pasaje no presenta aquí la sustitución litúrgica del nombre divino, sino la referencia general a Dios.
  - No se añadieron frases ausentes del fuente, como referencias a los 'días de la vida de Jacob'.
