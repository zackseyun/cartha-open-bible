  yaml_path: translation/extra_canonical/jubilees/035/007.yaml
  text: And behold, I have completed all the days of my life that I was to live.” And Jacob laughed because of the words of his mother, because his mother had told him that she would die, yet she remained opposite him, and her strength was upon her, and she had not grown weak in strength, for she went in and went out and saw,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:02Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy and more natural formal English: changed ''laughed at the words'' to ''laughed because of the words''; replaced the awkward ''she sat opposite him, vigorous over her'' with ''she remained opposite him, and her strength was upon her''; changed ''from her strength'' to ''in strength'' for a more faithful rendering.'
translation:
  language: es
  text: «Y he aquí, he completado todos los días de mi vida que debía vivir». Y Jacob rió a causa de las palabras de su madre, porque su madre le había dicho que ella moriría; sin embargo, ella permanecía frente a él, y su fuerza estaba sobre ella, y no se había debilitado en fuerza, pues entraba y salía y veía.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዓመት / days of my life
  english_pob_choice: all the days of my life that I was to live
  chosen_spanish: todos los días de mi vida que debía vivir
  alternatives_spanish:
  - todos los días de mi vida que tenía que vivir
  - todos los días de mi vida que me correspondía vivir
  lexicon: vida; días; deber
  rationale: Conserva la idea de totalidad temporal y la obligación/medida implícita en el griego-audit English without volverlo más interpretativo de lo que exige el ge'ez.
- source_word: ወበሐቀ፡ ያዕቆብ፡ ... የስቆ
  english_pob_choice: Jacob laughed because of the words of his mother
  chosen_spanish: Jacob rió a causa de las palabras de su madre
  alternatives_spanish:
  - Jacob se rió por las palabras de su madre
  - Jacob se rió a causa de lo que dijo su madre
  lexicon: reír; causa; palabras
  rationale: Sigue la revisión inglesa que corrigió 'laughed at' a 'laughed because of'; 'a causa de' preserva la relación causal sin añadir tono burlón innecesario.
- source_word: ትመውት
  english_pob_choice: she would die
  chosen_spanish: ella moriría
  alternatives_spanish:
  - ella iba a morir
  - ella iba a fallecer
  lexicon: morir
  rationale: ‘Moriría’ es natural y directo en español, y conserva el futuro en discurso referido sin suavizar el verbo.
- source_word: ትነብር፡ አንጻሪሁ
  english_pob_choice: she remained opposite him
  chosen_spanish: ella seguía frente a él
  alternatives_spanish:
  - ella permanecía frente a él
  - ella estaba enfrente de él
  lexicon: permanecer; frente a
  rationale: La imagen espacial del ge'ez se expresa con una fórmula clara en español; 'frente a él' evita una literalidad pesada.
- source_word: ወኀይላ፡ ላዕሌሃ
  english_pob_choice: her strength was upon her
  chosen_spanish: su fuerza estaba sobre ella
  alternatives_spanish:
  - su fuerza reposaba sobre ella
  - la fuerza estaba sobre ella
  lexicon: fuerza; sobre
  rationale: Mantiene la metáfora de 'estar sobre' como carga/presencia de vigor, sin normalizarla a 'estaba vigorosa' y perder la imagen textual.
- source_word: ወኢደክመት፡ እምኀይላ
  english_pob_choice: she had not grown weak in strength
  chosen_spanish: no se había debilitado en fuerzas
  alternatives_spanish:
  - no se había debilitado en vigor
  - no había decaído en fuerza
  lexicon: debilitarse; fuerzas; vigor
  rationale: ‘En fuerzas’ refleja bien la repetición enfática del original/audit English, conservando el énfasis en la capacidad física.
- source_word: ትበውእ፡ ወትወፅእ፡ ወትሬኢ
  english_pob_choice: for she went in and went out and saw
  chosen_spanish: pues entraba y salía y veía
  alternatives_spanish:
  - porque entraba y salía y veía
  - pues iba y venía y veía
  lexicon: entrar; salir; ver
  rationale: ‘Entraba y salía’ es la equivalencia más natural del hebraísmo/idioma de actividad continua; 'veía' conserva la facultad activa mencionada en el texto.
theological_decisions:
- issue: Aging and vitality of Jacob's mother
  english_pob_reading: her strength was upon her, and she had not grown weak in strength
  chosen_spanish_reading: su fuerza estaba sobre ella, y no se había debilitado en fuerzas
  alternative_spanish_readings:
  - estaba vigorosa
  - seguía fuerte
  rationale: Se preserva la descripción concreta de vigor físico sin convertirla en un resumen interpretativo. No se introduce lenguaje doctrinal donde el texto solo describe condición corporal.
  doctrine_reference: Descriptive narrative; no doctrinal assertion.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente y su ajuste hacia mayor precisión: causalidad en la risa de Jacob, oposición espacial ''frente a él'' en lugar de una construcción opaca, y la metáfora de la fuerza ''sobre ella'' mantenida con claridad en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene 'Jacob' y no se introduce terminología litúrgica adicional.
  - El registro es bíblico-formal pero en español contemporáneo, evitando arcaísmos innecesarios.
  - No se añade puntuación exegética externa; la cláusula final conserva la serie verbal del original.
