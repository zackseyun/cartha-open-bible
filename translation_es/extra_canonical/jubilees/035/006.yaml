base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/035/006.yaml
  text: 'And she said to him, “My son, all my days I have not seen in you any deed of crookedness, but only uprightness. Yet I will tell you the truth, my son: I shall die in this year, and I shall not live beyond this year, for I saw in a dream the day of my death, that I would not live beyond one hundred and fifty-five years.”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:32Z'
    unchanged: false
    changes_summary: Revised 'I shall not pass this year in my life' to the more natural and accurate 'I shall not live beyond this year.' Kept the rest substantially unchanged.
translation:
  language: es
  text: 'Y le dijo: «Hijo mío, en todos mis días no he visto en ti ningún acto torcido[a], sino solo rectitud. Pero te diré la verdad, hijo mío: moriré este año, y no viviré más allá de este año, porque vi en un sueño el día de mi muerte, que no viviría más allá de ciento cincuenta y cinco años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Acto torcido» preserva la imagen moral del original de algo desviado o torcido; también podría traducirse como «acto de perversidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: “all my days I have not seen in you any deed of crookedness, but only uprightness”
  english_pob_choice: any deed of crookedness / only uprightness
  chosen_spanish: ninguna obra de torcedura / solo rectitud
  alternatives_spanish:
  - ningún acto de perversidad / solo rectitud
  - ninguna obra torcida / solo rectitud
  lexicon: crookedness; uprightness
  rationale: «Torcedura» conserva la imagen moral de algo desviado o torcido sin convertirla demasiado pronto en una abstracción interpretativa; «rectitud» mantiene el contraste directo con la cualidad positiva del original.
- source_word: “I shall die in this year”
  english_pob_choice: I shall die in this year
  chosen_spanish: moriré en este año
  alternatives_spanish:
  - moriré este año
  - en este año moriré
  lexicon: die; this year
  rationale: La forma simple «moriré en este año» reproduce el futuro y el marco temporal sin añadir énfasis innecesario; «este año» sería más idiomático, pero «en este año» sigue siendo claro y fiel.
- source_word: “I shall not live beyond this year”
  english_pob_choice: I shall not live beyond this year
  chosen_spanish: no viviré más allá de este año
  alternatives_spanish:
  - no pasaré este año en mi vida
  - no sobreviviré este año
  lexicon: live beyond; beyond this year
  rationale: Sigo la revisión auditada que corrigió la expresión menos natural a una equivalencia clara en español. «Vivir más allá de este año» expresa con precisión el límite temporal del original.
- source_word: “one hundred and fifty-five years”
  english_pob_choice: one hundred and fifty-five years
  chosen_spanish: ciento cincuenta y cinco años
  alternatives_spanish:
  - 155 años
  lexicon: numeral phrase
  rationale: Se mantiene la cifra en palabras, como es habitual en texto bíblico publicado, y sin alterar el valor numérico del original.
theological_decisions:
- issue: Moral contrast between crookedness and uprightness
  english_pob_reading: deed of crookedness ... only uprightness
  chosen_spanish_reading: obra de torcedura ... solo rectitud
  alternative_spanish_readings:
  - acto de perversidad ... solo rectitud
  - obra torcida ... solo rectitud
  rationale: El pasaje presenta un contraste moral directo sin requerir ampliación doctrinal. «Torcedura» preserva la imagen de desviación, mientras «rectitud» mantiene la oposición ética explícita.
  doctrine_reference: Ética bíblica; lenguaje de integridad/rectitud sin expansión doctrinal
- issue: Statement of impending death based on a dream
  english_pob_reading: for I saw in a dream the day of my death
  chosen_spanish_reading: porque vi en un sueño el día de mi muerte
  alternative_spanish_readings:
  - porque soñé el día de mi muerte
  - porque en un sueño vi el día de mi muerte
  rationale: 'Se conserva el fundamento narrativo de la declaración: la visión en sueño como motivo del anuncio. No se añade interpretación profética adicional.'
  doctrine_reference: Revelación onírica en narrativa antigua; no doctrinally loaded
- issue: Temporal limit of lifespan
  english_pob_reading: would not live beyond one hundred and fifty-five years
  chosen_spanish_reading: no viviría más allá de ciento cincuenta y cinco años
  alternative_spanish_readings:
  - no pasaría de ciento cincuenta y cinco años
  - no llegaría a vivir más de ciento cincuenta y cinco años
  rationale: 'La lectura revisada del inglés ya fijó la idea correcta: no sobrepasar esa edad. La versión española la expresa de forma directa y natural sin perder el límite temporal.'
  doctrine_reference: Cronología narrativa; límite de vida anunciado
translation_notes:
  revision_awareness: La revisión en inglés aclaró que la frase final no significa ‘pasar este año en mi vida’, sino ‘no vivir más allá de este año’. La traducción española sigue esa corrección y conserva el resto del enunciado sin amplificación.
  spanish_consistency_notes:
  - Se usa «hijo mío» para reproducir el vocativo afectuoso del original.
  - «Rectitud» se mantiene como término ético positivo en contraste con «torcedura».
  - La numeración se deja en palabras, no en cifras, para mayor registro bíblico y legibilidad.
  - No se introduce «Cristo», «SEÑOR» ni terminología cristianizada ajena al texto de Jubileos.
