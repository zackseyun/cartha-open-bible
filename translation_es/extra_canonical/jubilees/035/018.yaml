translation:
  language: es
  text: y no buscarán el mal contra su hermano, sino solo amor, para que prosperen, hijos míos, y sean honrados en medio de la tierra, y ningún enemigo se alegre por causa de ustedes, y lleguen a ser una bendición y objeto de misericordia[a] ante los ojos de todos los que los aman.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «una misericordia». Se expresa de manera más natural en español como «objeto de misericordia», conservando la idea de favor o compasión visibles ante quienes los aman.
    reason: Evitar una formulación española poco idiomática sin perder la decisión léxica del POB sobre mercy.
lexical_decisions:
- source_word: evil
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - el daño
  lexicon: mal
  rationale: El contexto contrapone buscar el mal con buscar solo el amor; «el mal» conserva la amplitud moral del contraste sin estrecharlo a una sola forma de daño.
- source_word: brother
  english_pob_choice: brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano de sangre
  - su prójimo
  lexicon: hermano
  rationale: La referencia es relacional y colectiva; «su hermano» mantiene la cercanía fraterna del original sin introducir una explicación ajena al texto.
- source_word: love
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - amar
  - la caridad
  lexicon: amor
  rationale: El sustantivo conserva la oposición estilística con «el mal» y refleja la fuerza ética del pasaje mejor que una paráfrasis verbal.
- source_word: prosper
  english_pob_choice: prosper
  chosen_spanish: prosperen
  alternatives_spanish:
  - les vaya bien
  - tengan éxito
  lexicon: prosperar
  rationale: «Prosperen» es una equivalencia directa, clara y sobria, adecuada para un registro bíblico contemporáneo.
- source_word: honored
  english_pob_choice: be honored
  chosen_spanish: sean honrados
  alternatives_spanish:
  - sean glorificados
  - reciban honor
  lexicon: honrar
  rationale: «Sean honrados» conserva la pasiva de resultado del inglés y el sentido de reconocimiento público en medio de la tierra.
- source_word: midst of the land
  english_pob_choice: in the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en medio del país
  - en la tierra
  lexicon: tierra
  rationale: «La tierra» preserva el valor amplio del escenario territorial del texto y evita reducirlo a una entidad política moderna.
- source_word: enemy
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - opositor
  lexicon: enemigo
  rationale: «Enemigo» mantiene el paralelismo narrativo con la imagen de oposición y triunfo social del pasaje.
- source_word: become a blessing
  english_pob_choice: you may become a blessing
  chosen_spanish: lleguen a ser una bendición
  alternatives_spanish:
  - se conviertan en bendición
  - sean una bendición
  lexicon: bendición
  rationale: La frase conserva el dinamismo de transformación del inglés y el sustantivo bíblico tradicional sin exceso de literalismo.
- source_word: mercy
  english_pob_choice: a mercy
  chosen_spanish: una misericordia
  alternatives_spanish:
  - un acto de misericordia
  - compasión
  lexicon: misericordia
  rationale: Aunque suena menos natural que otras opciones, «misericordia» preserva la forma sustantiva y la posible personificación del favor que el POB mantiene en inglés.
theological_decisions:
- issue: 'Final benediction: blessing and mercy before observers'
  english_pob_reading: you may become a blessing and a mercy before the eyes of all who love you
  chosen_spanish_reading: lleguen a ser una bendición y una misericordia ante los ojos de todos los que los aman
  alternative_spanish_readings:
  - sean una bendición y una misericordia a los ojos de todos los que los aman
  - se conviertan en bendición y misericordia
  rationale: Se conserva la doble designación del cierre, sin suavizar «misericordia», porque el texto la usa como resultado visible de la conducta fraterna y la audiencia humana del reconocimiento.
