  yaml_path: translation/extra_canonical/jubilees/035/014.yaml
  text: And now my heart is troubled because of all his deeds, and neither he nor his seed will be saved, for they are those who will be destroyed from the earth and those who will be uprooted from under heaven, because he has forsaken the God of Abraham and gone after his wives and after
  footnotes:
