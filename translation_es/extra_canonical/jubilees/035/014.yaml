translation:
  language: es
  text: Y ahora mi corazón está turbado a causa de todas sus obras, y ni él ni su descendencia serán salvados, porque serán destruidos de la tierra[a] y arrancados de debajo del cielo, porque ha abandonado al Dios de Abraham y ha ido tras sus esposas y tras
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrancados de la tierra y destruidos de debajo del cielo».
    reason: previous_rendering
lexical_decisions:
- source_word: ልብየ / heart
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi corazón interior
  - mi ánimo
  lexicon: heart
  rationale: «Corazón» es la forma natural y fiel en español para el asiento de la inquietud interior; conserva la fuerza afectiva y volitiva del ge'ez sin volver el texto artificial.
- source_word: ይትሀወክ / troubled
  english_pob_choice: is troubled
  chosen_spanish: está turbado
  alternatives_spanish:
  - está inquieto
  - está perturbado
  lexicon: troubled
  rationale: «Turbado» comunica bien la agitación interior y mantiene un tono bíblico digno en español. «Perturbado» o «inquieto» serían posibles, pero menos ajustados al registro de una confesión solemne.
- source_word: ምግባራቲሁ / deeds
  english_pob_choice: his deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: deeds
  rationale: «Obras» es una equivalencia bíblica estable para hechos o acciones morales, y refleja adecuadamente el juicio sobre el conjunto de su conducta.
- source_word: ወኢኮነ ውእቱ ወዘርኡ / neither he nor his seed
  english_pob_choice: neither he nor his seed
  chosen_spanish: ni él ni su descendencia
  alternatives_spanish:
  - ni él ni su simiente
  - ni él ni sus hijos
  lexicon: seed
  rationale: «Descendencia» preserva el sentido genealógico de «seed» en un registro natural y claro para el español contemporáneo; «simiente» sería más literal pero menos comunicativo.
- source_word: ይትሐጐሉ / will be destroyed
  english_pob_choice: will be destroyed
  chosen_spanish: serán destruidos
  alternatives_spanish:
  - serán aniquilados
  - perecerán
  lexicon: destroyed
  rationale: La revisión textual indicó que este verbo corresponde a «destroyed», no a «uprooted». «Serán destruidos» conserva la pasiva y la gravedad del juicio.
- source_word: ይሤረዉ / will be uprooted
  english_pob_choice: will be uprooted
  chosen_spanish: serán arrancados
  alternatives_spanish:
  - serán desarraigados
  - serán arrancados de raíz
  lexicon: uprooted
  rationale: «Arrancados» mantiene la imagen agrícola de expulsión violenta; «desarraigados» también es posible, pero «arrancados» corresponde mejor a la fuerza verbal del original y al paralelismo con «destruidos».
- source_word: እምነ ምድር / from the earth
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de sobre la tierra
  - de la faz de la tierra
  lexicon: earth
  rationale: «De la tierra» es directo y fiel, y evita añadir matices no exigidos por el texto. La nota de alternativa cubre la posibilidad de un giro más idiomático.
- source_word: እምታሕተ ሰማይ / from under heaven
  english_pob_choice: from under heaven
  chosen_spanish: de debajo del cielo
  alternatives_spanish:
  - de debajo de los cielos
  - de bajo el cielo
  lexicon: heaven
  rationale: «Debajo del cielo» conserva el paralelismo semítico y el alcance cósmico del original, con un español fluido. «Cielo» se usa aquí como equivalente idiomático de «heaven» en este contexto.
- source_word: አምላኮ ‛ለአብርሃም / the God of Abraham
  english_pob_choice: the God of Abraham
  chosen_spanish: el Dios de Abraham
  alternatives_spanish:
  - el Dios de Abrahán
  lexicon: God of Abraham
  rationale: Se mantiene la fórmula bíblica habitual en español, con «Dios» para el nombre divino y «Abraham» según la forma más extendida y reconocible.
- source_word: ኀደገ / has forsaken
  english_pob_choice: has forsaken
  chosen_spanish: ha abandonado
  alternatives_spanish:
  - ha dejado
  - ha desamparado
  lexicon: forsaken
  rationale: «Ha abandonado» expresa bien la ruptura de fidelidad implícita en el verbo, sin cargarlo con una tonalidad demasiado arcaica.
- source_word: ወሖረ ድኅረ / gone after
  english_pob_choice: gone after
  chosen_spanish: se ha ido tras
  alternatives_spanish:
  - ha seguido tras
  - ha ido detrás de
  lexicon: gone after
  rationale: «Se ha ido tras» reproduce la idea de seguir/dirigirse detrás de algo o alguien, y funciona con naturalidad en español.
- source_word: አንስቲያሁ / his wives
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus mujeres-esposas
  lexicon: wives
  rationale: «Esposas» es claro y digno; evita ambigüedad y no fuerza un término menos natural como «mujeres».
theological_decisions:
- issue: Juicio sobre la descendencia junto con el individuo
  english_pob_reading: neither he nor his seed will be saved
  chosen_spanish_reading: ni él ni su descendencia serán salvados
  alternative_spanish_readings:
  - ni él ni su simiente serán salvados
  - ni él ni sus hijos serán salvados
  rationale: Se conserva la afirmación de juicio corporativo e intergeneracional sin suavizarla. «Descendencia» mantiene el alcance genealógico del original y evita reducirlo a un sentido meramente doméstico.
  doctrine_reference: 'Patrística/bíblica: juicio sobre casa o linaje; no se introduce una doctrina sistemática externa.'
- issue: Orden de los verbos de sentencia en la revisión textual
  english_pob_reading: those who will be destroyed from the earth and those who will be uprooted from under heaven
  chosen_spanish_reading: los que serán destruidos de la tierra y los que serán arrancados de debajo del cielo
  alternative_spanish_readings:
  - los que serán arrancados de la tierra y los que serán destruidos de debajo del cielo
  rationale: 'La revisión de auditoría corrige el intercambio de verbos en el inglés. El español sigue el texto ge''ez y conserva ambos verbos en el orden semántico correcto: primero destrucción, luego desarraigo/arranque.'
  doctrine_reference: Crítica textual / fidelidad al testimonio ge'ez.
- issue: Referencia al Dios de Abraham como causa del alejamiento
  english_pob_reading: because he has forsaken the God of Abraham
  chosen_spanish_reading: porque él ha abandonado al Dios de Abraham
  alternative_spanish_readings:
  - porque ha abandonado al Dios de Abraham
  rationale: Se mantiene la referencia explícita al Dios de Abraham como fundamento teológico del reproche. No se sustituye por «Señor» para preservar el nombre/divinidad tal como lo exige el proyecto.
  doctrine_reference: Nombre divino y fidelidad al pacto en la tradición abrahámica.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada: primero se corrigió la puntuación, y luego una revisión textual mayor mostró que los verbos habían quedado invertidos. Por eso el español sigue el orden correcto del ge''ez: «destruidos de la tierra» y «arrancados de debajo del cielo». El pasaje conservado aquí termina de manera abrupta, como en el fragmento fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente exige explícitamente el nombre divino יהוה; aquí no aparece.
  - Se prefirió «Dios» para አምላኮ, conforme al estándar del proyecto.
  - Se mantuvo el registro bíblico sobrio sin archaismos innecesarios.
  - La frase final queda abierta porque el fragmento fuente está incompleto.
