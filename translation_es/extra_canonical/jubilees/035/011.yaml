base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/035/011.yaml
  text: He has dealt wickedly with us; he has gathered your flocks, and he has plundered all your possessions from before your face. And while we ask and request from him what is ours, he acts like a man who has mercy on us.
  footnotes:
  - marker: a
    text: Or 'and all your possessions have gone'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:03Z'
    unchanged: false
    changes_summary: Clarified the opening to account for the verb of acting/dealing ('He has dealt wickedly with us'), added conjunctions for readability, rendered the request phrase more naturally as 'ask and request from him what is ours,' and changed 'serves as' to the more idiomatic 'acts like' while preserving the sense.
translation:
  language: es
  text: Ha obrado perversamente con nosotros; se ha apoderado de tus rebaños y ha saqueado todos tus bienes de delante de ti. Y mientras le pedimos y le rogamos lo que es nuestro, actúa como un hombre que tiene misericordia de nosotros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ምስሌነ / 'He has dealt wickedly with us'
  english_pob_choice: He has dealt wickedly with us
  chosen_spanish: Él ha obrado perversamente con nosotros
  alternatives_spanish:
  - Él ha actuado mal con nosotros
  - Él nos ha tratado mal
  lexicon: Geʽez መሪዕቶከ / obrar perversamente
  rationale: El verbo inicial expresa conducta dañina y perversa, no solo un trato genérico. ‘Ha obrado perversamente’ conserva la fuerza moral del original y el sentido de acción deliberada.
- source_word: ጥሪትከ / 'your flocks'
  english_pob_choice: your flocks
  chosen_spanish: tus rebaños
  alternatives_spanish:
  - tus ganados
  - tus ovejas y rebaños
  lexicon: Geʽez término de ganado/rebaño
  rationale: ‘Rebaños’ es fiel, natural y amplio en español para un conjunto de animales de pastoreo.
- source_word: ወኵሎ፡ ጥሪትከ / 'all your possessions'
  english_pob_choice: all your possessions
  chosen_spanish: todas tus posesiones
  alternatives_spanish:
  - todos tus bienes
  - todo lo que poseías
  lexicon: Geʽez ኵሎ + sustantivo de bienes
  rationale: 'La revisión auditada corrige la idea de ‘have gone’: el verbo implica saqueo/plunder. ‘Posesiones’ mantiene el alcance material sin añadir matices ajenos.'
- source_word: እምቅድመ፡ ገጽከ / 'from before your face'
  english_pob_choice: from before your face
  chosen_spanish: de delante de tu rostro
  alternatives_spanish:
  - de delante de ti
  - de tu presencia
  lexicon: idiom of presence/front
  rationale: Se conserva el modismo espacial del original. ‘Rostro’ refleja literalmente ‘face’ y mantiene la textura semítica del giro.
- source_word: ናስተበቍዕ ወንስእሎ / 'we ask and request from him'
  english_pob_choice: we ask and request from him
  chosen_spanish: le pedimos y le rogamos
  alternatives_spanish:
  - le pedimos y le suplicamos
  - le solicitamos y le pedimos
  lexicon: demand/request verbs
  rationale: La pareja verbal intensifica la solicitud. ‘Rogar’ conserva la insistencia y el tono dependiente mejor que un simple ‘pedir’ repetido.
- source_word: ይሬሲ ከመ፡ ዘብእሲ / 'he acts like a man'
  english_pob_choice: he acts like a man
  chosen_spanish: actúa como un hombre
  alternatives_spanish:
  - se comporta como un hombre
  - obra como un hombre
  lexicon: comparison with man's conduct
  rationale: ‘Actúa como’ reproduce el valor comparativo del pasaje revisado en inglés. ‘Hombre’ se mantiene como término genérico de persona masculina adulta, sin suavizar la comparación.
- source_word: ዘይምሕረነ / 'who has mercy on us'
  english_pob_choice: who has mercy on us
  chosen_spanish: que tiene misericordia de nosotros
  alternatives_spanish:
  - que se apiada de nosotros
  - que nos muestra misericordia
  lexicon: mercy
  rationale: ‘Misericordia’ es el equivalente más estable y eclesialmente inteligible, manteniendo el valor compasivo del original.
theological_decisions:
- issue: El verbo de saqueo frente a una lectura de simple movimiento
  english_pob_reading: he has plundered all your possessions
  chosen_spanish_reading: ha saqueado todas tus posesiones
  alternative_spanish_readings:
  - todas tus posesiones se han ido
  - han desaparecido todas tus posesiones
  rationale: La revisión crítica indica que el geʽez ሄደ aquí significa ‘robar/saquear’, no ‘irse’. La traducción española debe reflejar el acto de despojo, no una mera pérdida pasiva.
  doctrine_reference: Fidelidad textual y semántica del testimonio narrativo
- issue: La comparación final sugiere una falsa postura de compasión
  english_pob_reading: he acts like a man who has mercy on us
  chosen_spanish_reading: actúa como un hombre que tiene misericordia de nosotros
  alternative_spanish_readings:
  - se comporta como un hombre que se compadece de nosotros
  - obra como un hombre misericordioso con nosotros
  rationale: La frase comunica apariencia o conducta simulada. ‘Actúa como’ preserva esa comparación y evita convertirla en una afirmación moral más fuerte de la que el texto sostiene.
  doctrine_reference: Retórica narrativa y acusación implícita
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail que corrige la lectura de ሄደ como ‘saquear’ y ajusta la cláusula final a una comparación idiomática (‘acts like’). No se retuvo la antigua nota alternativa de ‘and all your possessions have gone’, porque el control crítico posterior la marca como error de traducción.
  spanish_consistency_notes:
  - Se mantuvo un registro semítico en ‘de delante de tu rostro’ para reflejar el modismo original.
  - Se evitó ‘señor’ o lenguaje litúrgico no presente en el original; el pasaje es narrativo y acusatorio.
  - ‘Misericordia’ se usa de modo consistente para el campo semántico de compasión/clemencia.
  - La cláusula inicial conserva un juicio moral fuerte (‘ha obrado perversamente’) acorde con el audit trail inglés.
