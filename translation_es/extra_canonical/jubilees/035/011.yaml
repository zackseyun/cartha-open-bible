revisions:
- from: Él ha obrado perversamente con nosotros; ha reunido tus rebaños, y ha saqueado todas tus posesiones de delante de tu rostro. Y mientras le pedimos y le rogamos lo que es nuestro, actúa como un hombre que tiene misericordia de nosotros.
  to: Ha obrado perversamente con nosotros; se ha apoderado de tus rebaños y ha saqueado todos tus bienes de delante de ti. Y mientras le pedimos y le rogamos lo que es nuestro, actúa como un hombre que tiene misericordia de nosotros.
  rationale: Se ajusta el verbo de los rebaños para reflejar mejor el agravio implícito en el original y el contexto inmediato de saqueo; se reemplaza el calco rígido 'de delante de tu rostro' por la forma idiomática 'de delante de ti'; y se pule el inicio quitando el sujeto explícito innecesario. No se requieren notas nuevas porque no se preserva aquí ninguna alternativa auditada en inglés que deba anclarse, y los cambios solo mejoran fidelidad y español natural.
