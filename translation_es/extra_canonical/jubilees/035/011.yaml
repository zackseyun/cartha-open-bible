review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica y refleja correctamente la corrección clave del geʽez: no una pérdida pasiva sino un despojo activo (''ha saqueado''). También conserva la comparación final de apariencia compasiva. Sin embargo, ''ha reunido tus rebaños'' no encaja bien con el contexto de agravio y puede sonar neutral o incluso beneficioso en español; el sentido requiere más claramente que él se ha apropiado de los rebaños. Además, ''de delante de tu rostro'' es demasiado calcado y poco natural en español; puede conservarse el modismo de presencia con una forma más idiomática.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero necesita dos ajustes de legibilidad y precisión semántica: sustituir ''ha reunido tus rebaños'' por una expresión de apropiación/despojo, y suavizar el calco ''de delante de tu rostro'' a ''de delante de ti''. También conviene evitar el sujeto explícito inicial ''Él'' por innecesario en español.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ''Misericordia'' está bien; ''posesiones'' es aceptable aunque ''bienes'' también sería natural. La principal cuestión léxica es contextual: el verbo aplicado a los rebaños debe reflejar agravio, no simple reunión.'
  issues:
  - severity: medium
    issue: '''ha reunido tus rebaños'' suena semánticamente débil y poco congruente con el contexto de despojo'
    rationale: En la secuencia 'ha obrado perversamente... ha saqueado todas tus posesiones', el verbo para los rebaños debe implicar que los ha juntado para llevárselos o apoderarse de ellos. 'Reunir' en español puede sonar neutral.
  - severity: low
    issue: '''de delante de tu rostro'' es un calco poco natural'
    rationale: Aunque reproduce literalmente 'from before your face', en español general resulta más claro y digno 'de delante de ti' o 'de tu presencia' sin perder el matiz de despojo a la vista de la persona.
  - severity: low
    issue: El sujeto explícito 'Él' no aporta contraste necesario
    rationale: En español bíblico narrativo moderno, 'Ha obrado perversamente con nosotros' fluye mejor y mantiene el referente sin pesadez.
  revised_spanish_text: Ha obrado perversamente con nosotros; se ha apoderado de tus rebaños y ha saqueado todos tus bienes de delante de ti. Y mientras le pedimos y le rogamos lo que es nuestro, actúa como un hombre que tiene misericordia de nosotros.
  revision_rationale: Se ajusta el verbo de los rebaños para reflejar mejor el agravio implícito en el original y el contexto inmediato de saqueo; se reemplaza el calco rígido 'de delante de tu rostro' por la forma idiomática 'de delante de ti'; y se pule el inicio quitando el sujeto explícito innecesario. No se requieren notas nuevas porque no se preserva aquí ninguna alternativa auditada en inglés que deba anclarse, y los cambios solo mejoran fidelidad y español natural.
