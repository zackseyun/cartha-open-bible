  text: 'And she went in to Isaac and said to him, “I ask one request of you: make Esau swear that he will not devise evil against Jacob and will not pursue him in hostility, for you know Esau’s mind, that he has been cruel from his youth, and there is no goodness in him, for he desires'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:03Z'
    unchanged: false
    changes_summary: 'Revised wording for accuracy and naturalness: changed ''One request I ask from you'' to ''I ask one request of you''; rendered ኢያሕስም as ''will not devise evil against'' rather than ''will not hate''; changed ''thoughts'' to ''mind''; and ''harsh'' to ''cruel.'' Preserved the apparent incompleteness of the source at the end (''for he desires'').'
translation:
  language: es
  text: 'Y ella fue a Isaac y le dijo: «Te pido una sola cosa: haz que Esaú jure que no ideará mal contra Jacob ni lo perseguirá con hostilidad, pues tú conoces la mente de Esaú: que ha sido cruel desde su juventud, y no hay bondad en él, porque desea[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto etiópico parece quedar incompleto al final; se conserva la frase abierta sin suplir un complemento no atestiguado.
    reason: textual_variant
lexical_decisions:
- source_word: ሞትኪ። ወቦአት፡ ኀበ፡ ይስሐቅ፡ ወትቤሎ፡
  english_pob_choice: And she went in to Isaac and said to him
  chosen_spanish: Y ella entró a Isaac y le dijo
  alternatives_spanish:
  - Y fue a donde estaba Isaac y le dijo
  - Y se acercó a Isaac y le dijo
  lexicon: entró a / le dijo
  rationale: La acción indica acceso a Isaac en contexto narrativo; «entró a» mantiene naturalidad y cercanía al hebraísmo/semitismo del movimiento hacia él sin sobretraducir.
- source_word: አሐተ፡ ስእለተ፡ አስተበቍዕ፡ በኀቤከ፡
  english_pob_choice: I ask one request of you
  chosen_spanish: Te pido una sola cosa
  alternatives_spanish:
  - Te hago una sola petición
  - Te pido una petición
  lexicon: petición / cosa
  rationale: El giro idiomático español «te pido una sola cosa» suena natural y conserva el valor de petición puntual del original y del POB inglés revisado.
- source_word: ከመ፡ ኢያሕስም፡
  english_pob_choice: will not devise evil against
  chosen_spanish: que no ideará mal contra
  alternatives_spanish:
  - que no tramará mal contra
  - que no pensará mal contra
  lexicon: idear mal / tramar mal
  rationale: La revisión inglesa descartó «hate» y fue hacia una acción de maquinación hostil. «Ideará mal contra» mantiene esa intención sin volverlo demasiado interpretativo.
- source_word: ወኢይስድዶ፡ በጸልኢ፡
  english_pob_choice: and will not pursue him in hostility
  chosen_spanish: ni lo perseguirá con hostilidad
  alternatives_spanish:
  - ni lo perseguirá con odio
  - ni lo acosará con hostilidad
  lexicon: perseguir con hostilidad
  rationale: «Hostilidad» conserva el tono relacional y hostil del original y del POB, sin introducir una psicología específica como «odio».
- source_word: አንተ፡ ታአምር፡ ሕሊናሁ፡ ለዔሳው፡
  english_pob_choice: for you know Esau’s mind
  chosen_spanish: pues tú conoces la mente de Esaú
  alternatives_spanish:
  - pues tú conoces el pensamiento de Esaú
  - porque tú conoces la intención de Esaú
  lexicon: mente
  rationale: La revisión inglesa cambió «thoughts» por «mind»; «mente» en español refleja mejor el conjunto interior/volitivo sin estrecharlo a pensamientos aislados.
- source_word: ከመ፡ ጸዋን፡ ውእቱ፡ እምንእሱ፡
  english_pob_choice: that he has been cruel from his youth
  chosen_spanish: que ha sido cruel desde su juventud
  alternatives_spanish:
  - que ha sido duro desde su juventud
  - que ha sido áspero desde su juventud
  lexicon: cruel / juventud
  rationale: La revisión inglesa precisó «cruel»; «cruel» es el equivalente directo y suficientemente fuerte en español para la dureza moral del retrato.
- source_word: ወአልቦ፡ ላዕሌሁ፡ ኂሩተ፡
  english_pob_choice: and there is no goodness in him
  chosen_spanish: y no hay bondad en él
  alternatives_spanish:
  - y no hay bien en él
  - y no hay rectitud en él
  lexicon: bondad
  rationale: «Bondad» comunica adecuadamente la ausencia de cualidad benéfica que expresa el original y mantiene el registro bíblico en español.
- source_word: እስመ፡ ይፈቅድ፡
  english_pob_choice: for he desires
  chosen_spanish: porque desea
  alternatives_spanish:
  - pues él desea
  - porque anhela
  lexicon: desea
  rationale: El texto fuente parece quedar truncado en este punto; se conserva la incompletitud con una subordinada final abierta, siguiendo el POB inglés revisado.
theological_decisions:
- issue: Representación del carácter moral de Esaú
  english_pob_reading: he has been cruel from his youth, and there is no goodness in him
  chosen_spanish_reading: ha sido cruel desde su juventud, y no hay bondad en él
  alternative_spanish_readings:
  - ha sido duro desde su juventud, y no hay bien en él
  - ha sido áspero desde su juventud, y no hay rectitud en él
  rationale: Se mantiene el juicio moral fuerte del texto sin suavizarlo. «Cruel» preserva la carga ética; «bondad» expresa la ausencia de bien moral reconocida en el pasaje.
  doctrine_reference: Carácter moral y responsabilidad humana en narrativas sapienciales/apócrifas; no se atenúa el testimonio del texto.
- issue: Final aparentemente incompleto
  english_pob_reading: for he desires
  chosen_spanish_reading: porque desea
  alternative_spanish_readings:
  - pues desea
  - porque anhela
  rationale: El POB inglés revisado decidió preservar la aparente incompletitud. En español se deja igualmente abierto, sin cerrar el sentido con una adición no atestiguada.
  doctrine_reference: Fidelidad textual y preservación de lecturas no resueltas.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: «ask one request of you» > «I ask one request of you», «will not devise evil against» en lugar de «will not hate», «mind» en vez de «thoughts», «cruel» en vez de «harsh», y se conservó el final aparentemente truncado («for he desires»). La traducción española refleja esas decisiones y no reintroduce lecturas anteriores descartadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se prefirió «bondad» sobre «bien» por fluidez y precisión contextual.
  - Se evitó «odio» para no retroceder a la lectura anterior descartada por la revisión del POB.
  - El cierre en «porque desea» queda deliberadamente abierto y se marca con nota textual.
