  text: '«Eso está en mi corazón: que todos mis días piense bien de todos. ¿Y por qué no debería hacer esto?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘውስተ፡ ልብየ፡
  english_pob_choice: that is in my heart
  chosen_spanish: «Eso está en mi corazón»
  alternatives_spanish:
  - «eso está en mi corazón»
  - «está en mi corazón»
  lexicon: heart -> corazón; idiom of inward resolve
  rationale: El giro ge'ez expresa lo que está interiormente asentado en el hablante. «En mi corazón» conserva el valor idiomático y el matiz de disposición interior sin añadir contenido ajeno.
- source_word: ከመ፡ ኵሎ፡ መዋዕለ፡
  english_pob_choice: that all my days
  chosen_spanish: «que todos mis días»
  alternatives_spanish:
  - «todos mis días»
  - «en todos mis días»
  lexicon: all days -> todos mis días
  rationale: La frase se entiende como una duración continua a lo largo de la vida; «todos mis días» es natural en español y sigue de cerca la construcción temporal del original.
- source_word: እሐሊ፡ ሠናየ፡ ለኵሉ።
  english_pob_choice: I think good for all
  chosen_spanish: «piense el bien para todos»
  alternatives_spanish:
  - «piense bien para todos»
  - «piense el bien de todos»
  lexicon: think good -> pensar el bien / hacer el bien mentalmente
  rationale: El ge'ez combina la idea de pensar con la cualidad de «bueno» aplicada a todos. En español, «pensar el bien para todos» mantiene la intención benevolente sin forzar una literalidad poco idiomática.
- source_word: ወአፎ፡ ኢይገብር፡ ዘንተ፡ ነገረ፡
  english_pob_choice: And why should I not do this thing?
  chosen_spanish: «¿Y por qué no debería hacer esta cosa?»
  alternatives_spanish:
  - «¿Y por qué no haría esta cosa?»
  - «¿Y por qué no debería hacer esto?»
  lexicon: do this thing -> hacer esta cosa / hacer esto
  rationale: La pregunta retórica queda bien en español con «¿por qué no debería...?». «Esta cosa» reproduce el sustantivo indefinido del original sin añadir una motivación interpretativa que el texto proporcionado no contiene.
theological_decisions:
- issue: El texto fuente proporcionado no incluye la cláusula adicional sobre honrar al padre y al hermano, aunque una lectura previa la había conservado.
  english_pob_reading: Earlier English wording retained 'that I should honor my father and my brother?' in a previous rendering, but the latest audit revision removed it because it is not in the provided source string.
  chosen_spanish_reading: Se omite la cláusula adicional y se traduce solo lo que está en el texto fuente dado.
  alternative_spanish_readings:
  - «... para que yo honre a mi padre y a mi hermano?»
  - «... que yo honre a mi padre y a mi hermano?»
  rationale: La disciplina textual exige no restaurar una frase no presente en el string ge'ez suministrado. Mantenerla habría excedido la base auditable.
  doctrine_reference: Fidelidad textual / crítica textual
