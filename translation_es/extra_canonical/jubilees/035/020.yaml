review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el texto inglés auditado: mantiene la hipérbole afectiva, la exclusividad del vínculo fraternal, la metáfora de haber sido ''sembrados'' en el vientre, y la pregunta retórica final. No obstante, ''no es para mí cosa grande amarle'' suena forzado y no expresa bien el sentido idiomático de ''this is no great thing for me, that I should love him'', que en contexto significa que no le resulta extraño ni difícil amar a su hermano. Además, ''seno'' para ''belly'' aquí puede sonar menos corporal y menos natural que ''vientre'', y la alternancia no añade claridad suficiente en español.'
  spanish_quality_summary: 'El español es en general claro y digno, pero hay dos puntos de mejora: 1) ''no es para mí cosa grande amarle'' es poco natural; 2) ''tu seno'' en este contexto puede sugerir pecho/pechos más que abdomen o matriz, creando ambigüedad innecesaria. Una leve revisión mejora la legibilidad sin perder la imaginería del original.'
  glossary_alignment: 'Buena alineación general con las decisiones POB: ''carne'' preserva la fuerza léxica de flesh; ''hermano'' es correcto; ''sembrados'' mantiene la metáfora fuerte del original. No hay conflictos con la terminología global del proyecto. La revisión propuesta conserva esas decisiones y solo ajusta la sintaxis e imagen corporal para un español más fiel e inteligible.'
  issues:
  - severity: medium
    issue: 'Expresión poco natural: ''no es para mí cosa grande amarle'''
    rationale: Aunque calca la estructura inglesa, en español suena torpe y opaca. El sentido contextual es que no le resulta extraordinario ni difícil amar a su hermano. 'No es gran cosa para mí amarlo' comunica mejor ese valor sin apartarse del original.
  - severity: medium
    issue: '''tu seno'' introduce ambigüedad corporal'
    rationale: En español bíblico y general, 'seno' suele asociarse al pecho o regazo. Aquí el paralelo con 'vientre' y el contexto de nacimiento favorecen 'vientre' también en la segunda cláusula, o una formulación equivalente. Esto evita confusión y mantiene la imagen del nacimiento compartido.
