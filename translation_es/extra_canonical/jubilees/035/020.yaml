translation:
  language: es
  text: Y Jacob, mi hermano, lo amo más que a toda carne, y no tengo en toda la tierra ningún hermano excepto él solo. Y no es gran cosa para mí amarlo, porque él es mi hermano, y juntos fuimos sembrados en tu vientre, y juntos salimos de tu vientre. Y si no amo a mi hermano, ¿a quién amaré?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠγάπησα / love
  english_pob_choice: I love him more than all flesh
  chosen_spanish: lo amo más que a toda carne
  alternatives_spanish:
  - lo amo más que a toda la humanidad
  - lo amo más que a toda la gente
  lexicon: amare
  rationale: Conservo el verbo directo de afecto fuerte y el contraste absoluto con "toda carne". "Humanidad" suaviza el contraste léxico; "gente" lo vuelve menos solemne y menos cercano a la fórmula de fuente.
- source_word: σάρξ / flesh
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - humanidad
  - ser humano
  lexicon: sarx
  rationale: '"Carne" mantiene la tensión semántica del original y la elección inglesa, sin reinterpretarla como un mero colectivo humano.'
- source_word: brother
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - consanguíneo
  lexicon: adelphos
  rationale: '"Hermano" es la correspondencia directa y conserva la fuerza familiar del argumento: la prioridad del vínculo de sangre/parentesco inmediato.'
- source_word: womb / belly
  english_pob_choice: your womb / your belly
  chosen_spanish: tu vientre / tu seno
  alternatives_spanish:
  - tu vientre / tu barriga
  - tu matriz / tu vientre
  lexicon: koilia
  rationale: 'Distingo dos imágenes corporales en español: "vientre" para womb y "seno" para belly. "Seno" evita un registro demasiado coloquial y preserva el paralelismo poético del original.'
theological_decisions:
- issue: Intensificación absoluta del afecto con exclusión de todos los demás vínculos
  english_pob_reading: I love him more than all flesh, and I have no brother in all the earth except him alone.
  chosen_spanish_reading: lo amo más que a toda carne, y no tengo en toda la tierra ningún hermano excepto él solo.
  alternative_spanish_readings:
  - lo amo más que a toda la humanidad, y no tengo en toda la tierra otro hermano que él
  - lo amo sobre todos, y no tengo en la tierra hermano sino a él
  rationale: Mantengo la exclusividad y la hipérbole del pasaje sin reducirla a una frase idiomática genérica. La formulación española conserva el alcance totalizante de la afirmación.
  doctrine_reference: Consanguinidad y lealtad familiar en narrativa patriarcal; no se introduce una lectura doctrinal ajena.
- issue: Lenguaje corporal de concepción y nacimiento
  english_pob_reading: together we were sown in your womb, and together we came out from your belly.
  chosen_spanish_reading: juntos fuimos sembrados en tu vientre, y juntos salimos de tu seno.
  alternative_spanish_readings:
  - juntos fuimos concebidos en tu vientre, y juntos salimos de tu vientre
  - juntos fuimos sembrados en tu matriz, y juntos salimos de tu barriga
  rationale: '"Sembrados" conserva la metáfora de origen compartido con la misma dureza imagística que la fuente. No la sustituyo por "concebidos" porque esa opción borra la imagen agrícola que parece intencionalmente audaz.'
  doctrine_reference: Antropología narrativa del nacimiento compartido; se preserva la metáfora sin suavizarla.
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto fuente y la lectura inglesa quedaron sin cambios tras la última pasada; no hay revisiones aplicadas ni puntos textuales disputados en el paquete auditado.
  spanish_consistency_notes:
  - Se usa "carne" de modo consistente con el valor léxico de σάρξ cuando el contexto exige el contraste absoluto del original.
  - Se mantiene "hermano" en todo el versículo para preservar la repetición retórica.
  - '"Vientre" y "seno" se alternan solo para evitar cacofonía y reflejar dos imágenes corporales distintas en el inglés POB.'
