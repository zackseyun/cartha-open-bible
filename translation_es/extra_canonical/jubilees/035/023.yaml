translation:
  language: es
  text: 'Y ella llamó a Jacob a la vista de Esaú, y lo instruyó conforme a las palabras que había hablado con Esaú. Y él dijo: «Haré lo que deseas. Créeme, que ningún mal saldrá de mí ni de mis hijos contra Esaú, y no seré primero en nada excepto en amor».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tendré precedencia en nada excepto en amor».'
    reason: Preserva en español la alternativa semántica de qadāmiya como precedencia/primacía, útil donde «ser primero» podría sonar demasiado literal.
lexical_decisions:
- source_word: ta'amananni
  english_pob_choice: Trust me that
  chosen_spanish: Confía en mí
  alternatives_spanish:
  - Créeme
  - Pon tu confianza en mí
  lexicon: ’amana / creer, confiar
  rationale: El verbo ge’ez expresa confianza o credibilidad, no ocultamiento. «Confía en mí» preserva el valor exhortativo y relacional del ruego de confianza mejor que una traducción de escondimiento.
- source_word: kama
  english_pob_choice: that
  chosen_spanish: para que / que
  alternatives_spanish:
  - que
  - de modo que
  lexicon: conjunción completiva
  rationale: El contexto aquí es el contenido de la confianza y la declaración resultante. En español, «Confía en mí, para que... » puede sonar teleológico; por eso se ofrece la lectura más natural del contenido con «que» en la estructura de la cita implícita, manteniendo la relación marcada por el texto fuente.
- source_word: qadāmiya
  english_pob_choice: I will not be first in anything except in love
  chosen_spanish: no seré primero en nada excepto en amor
  alternatives_spanish:
  - no tendré precedencia en nada excepto en amor
  - no iré delante de nada excepto en amor
  lexicon: qadām / ser primero, ir delante
  rationale: Se conserva la noción de precedencia/primacía del original. «Primero» es claro en español y mantiene la tensión semántica de prioridad, no de mera superioridad moral.
- source_word: ba-feqr
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - en el amor
  - por amor
  lexicon: feqr / amor
  rationale: Se mantiene el sustantivo abstracto sin añadir artículo, para reflejar la formulación breve del original y la fraseología del POB en inglés.
- source_word: wa-'ikawwen
  english_pob_choice: I will not be
  chosen_spanish: no seré
  alternatives_spanish:
  - no estaré
  - no resultaré
  lexicon: verbo de existencia/futuro
  rationale: La forma verbal en primera persona futura se traduce de manera directa y natural, conservando el valor de declaración personal.
theological_decisions:
- issue: Primacía en amor frente a otras formas de precedencia
  english_pob_reading: I will not be first in anything except in love
  chosen_spanish_reading: no seré primero en nada excepto en amor
  alternative_spanish_readings:
  - no tendré precedencia en nada excepto en amor
  - no iré delante de nada excepto en amor
  rationale: 'La frase conserva la tensión interpretativa: la única primacía legítima es la del amor. No se suaviza a una generalidad moral, porque el texto presenta una afirmación comparativa concreta.'
  doctrine_reference: 1 Corintios 13:1-13; Romanos 12:10
- issue: Garantía de no causar mal contra Esaú ni sus descendientes
  english_pob_reading: no evil may come out from me or from my children against Esau
  chosen_spanish_reading: ningún mal salga de mí ni de mis hijos contra Esaú
  alternative_spanish_readings:
  - no salga de mí ni de mis hijos ningún mal contra Esaú
  - ningún mal proceda de mí ni de mis hijos contra Esaú
  rationale: Se preserva la idea de procedencia del mal desde la persona y su descendencia hacia Esaú, sin introducir culpa colectiva extra al texto.
  doctrine_reference: Génesis 27–33; Jubileos 35:23
- issue: Instrucción previa de ella a Jacob
  english_pob_reading: she called Jacob before Esau’s eyes and instructed him according to the words that she had spoken with Esau
  chosen_spanish_reading: llamó a Jacob delante de los ojos de Esaú, y lo instruyó conforme a las palabras que había hablado con Esaú
  alternative_spanish_readings:
  - llamó a Jacob ante la vista de Esaú
  - mandó llamar a Jacob a la vista de Esaú
  rationale: Se mantiene la referencia visual/escénica «delante de los ojos de Esaú», que subraya la publicidad o el carácter observado del acto, sin convertirlo en un modismo más general.
  doctrine_reference: Jubileos 35:23
translation_notes:
  revision_awareness: 'Se incorporó la corrección de revisión fuente-grounded: el ge’ez no significa «ocúltame» sino «confía en mí», y la última cláusula se entiende como una declaración de no ser primero en nada excepto en amor. Por ello no se usan notas heredadas que ya no corresponden al texto revisado.'
  spanish_consistency_notes:
  - Se mantiene «Esaú» con tilde diacrítica estándar en español.
  - Se evita «Cristo» o terminología cristológica porque el versículo no la contiene.
  - Se traduce «amor» sin glosa añadida, respetando la brevedad y la tensión del original.
  - La puntuación reproduce dos enunciados narrativos y una cita directa final con comillas angulares españolas.
