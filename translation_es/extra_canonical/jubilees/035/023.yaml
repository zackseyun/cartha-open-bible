revisions:
- from: 'Y ella llamó a Jacob delante de los ojos de Esaú, y lo instruyó conforme a las palabras que había hablado con Esaú. Y él dijo: «Haré lo que te agrade. Confía en mí, para que ningún mal salga de mí ni de mis hijos contra Esaú, y no seré primero en nada excepto en amor».'
  to: 'Y ella llamó a Jacob a la vista de Esaú, y lo instruyó conforme a las palabras que había hablado con Esaú. Y él dijo: «Haré lo que deseas. Créeme, que ningún mal saldrá de mí ni de mis hijos contra Esaú, y no seré primero en nada excepto en amor».[a]'
  rationale: 'Se hace una reparación menor pero necesaria para alinear el español con la evidencia fuente: se elimina el matiz final de «para que» y se expresa el contenido de la confianza con «Créeme, que...». Además, se mejora la idiomaticidad de la escena visual y se conserva la cláusula de primacía en amor. La nota española es útil para aclarar la fuerza de «primero» como precedencia.'
