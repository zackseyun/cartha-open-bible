base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/035/008.yaml
  text: and her teeth were strong, and no sickness at all had come upon her in all the days of her life. And Jacob said to her, “Blessed am I, mother, if my days draw near to the days of your life, and if my strength remains upon me like this, according to your strength. You will not die, for you speak with me in vain concerning your death.”
  footnotes:
  - marker: a
    text: Or 'Do not die'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:02Z'
    unchanged: false
    changes_summary: 'Adjusted two phrases for closer lexical accuracy and more natural formal English: changed ''had touched her'' to ''had come upon her'' and ''to your days of life'' to ''to the days of your life''; also revised ''idly'' to ''in vain'' for a more fitting rendering of the closing clause.'
translation:
  language: es
  text: 'y sus dientes eran fuertes, y ninguna enfermedad le había sobrevenido en todos los días de su vida. Y Jacob le dijo: «Bienaventurado soy yo, madre, si mis días se acercan a los días de tu vida, y si mi fuerza permanece en mí así, conforme a tu fuerza. No morirás[a], porque hablas conmigo en vano acerca de tu muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No mueras». La revisión del texto inglés favorece el indicativo «No morirás» como reflejo del verbo ge''ez.'
    reason: textual_variant
lexical_decisions:
- source_word: “her teeth were strong”
  english_pob_choice: and her teeth were strong
  chosen_spanish: y sus dientes eran fuertes
  alternatives_spanish:
  - y sus dientes estaban fuertes
  - y sus dientes eran firmes
  lexicon: dientes; fuertes
  rationale: El adjetivo inglés describe la robustez física de los dientes; en español, «eran fuertes» comunica bien la idea sin endurecer el estilo. «Firmes» sería posible, pero suena menos natural para esta referencia corporal.
- source_word: “no sickness at all had come upon her”
  english_pob_choice: and no sickness at all had come upon her
  chosen_spanish: y ninguna enfermedad había venido sobre ella
  alternatives_spanish:
  - y ninguna enfermedad la había alcanzado
  - y ninguna enfermedad había caído sobre ella
  lexicon: enfermedad; venir sobre
  rationale: La imagen de algo que «viene sobre» una persona se conserva con «había venido sobre ella», que sigue de cerca el sentido del inglés y del ge'ez. «La había alcanzado» es natural, pero desplaza levemente la metáfora.
- source_word: “Blessed am I”
  english_pob_choice: Blessed am I
  chosen_spanish: Bienaventurado soy yo
  alternatives_spanish:
  - Bendito soy yo
  - Feliz soy yo
  lexicon: bienaventurado
  rationale: Se mantiene un registro reverente y bíblico. «Bienaventurado» conserva mejor la carga formulística de la expresión que «bendito» o «feliz».
- source_word: “the days of your life”
  english_pob_choice: the days of your life
  chosen_spanish: los días de tu vida
  alternatives_spanish:
  - tu tiempo de vida
  - los años de tu vida
  lexicon: días de tu vida
  rationale: La frase se traduce de modo casi literal porque el giro es idiomático y claro en español. Además, preserva la imagen temporal del original.
- source_word: “You will not die”
  english_pob_choice: You will not die
  chosen_spanish: No morirás
  alternatives_spanish:
  - No mueras
  - No vas a morir
  lexicon: morir; futuro
  rationale: La revisión inglesa aclaró que el verbo ge'ez es indicativo, no prohibitivo. Por eso se eligió el futuro «No morirás» y no una orden negativa como «No mueras».
- source_word: “you speak with me in vain concerning your death”
  english_pob_choice: you speak with me in vain concerning your death
  chosen_spanish: hablas conmigo en vano acerca de tu muerte
  alternatives_spanish:
  - hablas conmigo inútilmente acerca de tu muerte
  - hablas conmigo sin fundamento acerca de tu muerte
  lexicon: en vano; hablar acerca de
  rationale: «En vano» reproduce bien el valor de futilidad del cierre y mantiene el tono de la línea inglesa revisada. «Inútilmente» sería comprensible, pero menos idiomático en este contexto.
theological_decisions:
- issue: La frase final puede sonar como amonestación o como consolación respecto a la muerte de Rebeca.
  english_pob_reading: You will not die, for you speak with me in vain concerning your death.
  chosen_spanish_reading: No morirás, porque hablas conmigo en vano acerca de tu muerte.
  alternative_spanish_readings:
  - No mueras, porque hablas conmigo en vano acerca de tu muerte.
  - No morirás, porque hablas conmigo inútilmente acerca de tu muerte.
  rationale: 'Se sigue la revisión textual que entiende la forma verbal como indicativa, no imperativa. La traducción conserva la tensión: Jacob no promete inmortalidad; más bien rechaza la idea de una muerte inmediata y considera vacías esas palabras.'
  doctrine_reference: Observación de forma verbal y sentido contextual, sin implicación doctrinal adicional.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que ajustó «had touched her» a «had come upon her», «to your days of life» a «to the days of your life», y especialmente «Do not die» a «You will not die». La versión española sigue esa última decisión y evita una lectura imperativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparecería el nombre divino; en este versículo no aparece.
  - Se usó «Bienaventurado» para conservar el tono bíblico sin forzar formulaciones eclesiásticas.
  - Se preservó la metáfora de enfermedad que «viene sobre» una persona para respetar el paralelo semántico del original.
