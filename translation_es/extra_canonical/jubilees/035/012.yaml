base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/035/012.yaml
  text: And he is bitter against you because you blessed Jacob, your perfect and upright son; for there is no evil at all in him, but only goodness. And from the time he came from Haran until this day he has not deprived us of anything, for everything comes to us in its time every day, and he rejoices with all his heart whenever we receive from his hand, and he blesses us. He has not separated himself from us from the time he came from Haran until this day, and he dwells with us continually in the house while honoring us.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:03Z'
    unchanged: false
    changes_summary: Changed 'but only our goodness' to 'but only goodness' for lexical accuracy and natural English, and changed 'whenever we take from his hand' to 'whenever we receive from his hand' for more natural formal register.
translation:
  language: es
  text: Y se irrita contra ti porque bendijiste a Jacob, tu hijo perfecto y recto; porque en él no hay ningún mal, sino solo bondad. Y desde el tiempo en que vino de Harán hasta este día no nos ha privado de nada, porque todo nos llega a su tiempo cada día, y se alegra con todo su corazón siempre que recibimos de su mano, y nos bendice. No se ha apartado de nosotros desde el tiempo en que vino de Harán hasta este día, y habita con nosotros continuamente en la casa, honrándonos.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እኩየ
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - mal
  - maldad
  - maldad alguna
  lexicon: lexical equivalent for moral evil/ill
  rationale: El contexto contrasta con 'bondad' y no requiere endurecer a 'maldad'; 'mal' conserva la oposición amplia y suena natural en español. Se evita 'maldad' porque puede sonar más interpretativa que el antónimo simple del hebreo/gee'ez implícito.
- source_word: ኂሩትነ
  english_pob_choice: goodness
  chosen_spanish: bondad
  alternatives_spanish:
  - bondad
  - lo bueno
  - rectitud
  lexicon: lexical equivalent for goodness
  rationale: '''Bondad'' reproduce el sentido positivo general de calidad moral sin introducir un matiz técnico no pedido por el texto. Mantiene el contraste directo con ''mal''.'
- source_word: ፍጹማዊ፡ ወፈትዐ
  english_pob_choice: perfect and upright
  chosen_spanish: perfecto y recto
  alternatives_spanish:
  - perfecto y recto
  - íntegro y recto
  - intachable y recto
  lexicon: lexical equivalent for moral wholeness and uprightness
  rationale: '''Perfecto y recto'' sigue de cerca la audit trail inglesa y conserva el elogio de integridad. ''Íntegro'' sería posible, pero aquí ''perfecto'' preserva el eco tradicional del texto fuente.'
- source_word: እምካራን
  english_pob_choice: from Haran
  chosen_spanish: de Harán
  alternatives_spanish:
  - de Harán
  lexicon: proper place name
  rationale: Nombre propio transliterado de manera estándar en español bíblico.
- source_word: ይመጽእ ለነ በበጊዜሁ
  english_pob_choice: everything comes to us in its time every day
  chosen_spanish: todo nos llega a su tiempo cada día
  alternatives_spanish:
  - todo nos llega a su tiempo cada día
  - todo nos viene a su tiempo cada día
  - todo llega a nosotros a su debido tiempo cada día
  lexicon: temporal distribution phrase
  rationale: '''Nos llega'' comunica la llegada periódica de provisión sin sonar mecánico. ''A su tiempo'' preserva la idea de oportunidad/estación; ''cada día'' mantiene el valor distributivo del original.'
- source_word: ንነሥእ እምእዴሁ
  english_pob_choice: we receive from his hand
  chosen_spanish: recibimos de su mano
  alternatives_spanish:
  - recibimos de su mano
  - tomamos de su mano
  - recibimos de él
  lexicon: idiomatic source metaphor
  rationale: Se conserva la metáfora concreta de 'mano' por su fuerza relacional y providencial. 'Recibimos' sigue la revisión inglesa y evita el posible matiz de apropiación de 'tomamos'.
- source_word: ይትፌሣሕ በኵሉ ልቡ
  english_pob_choice: he rejoices with all his heart
  chosen_spanish: se alegra con todo su corazón
  alternatives_spanish:
  - se alegra con todo su corazón
  - se regocija con todo su corazón
  - se alegra de corazón
  lexicon: joy idiom
  rationale: '''Se alegra con todo su corazón'' es idiomático, claro y fiel al énfasis totalizante del original. ''Regocija'' sería más formal, pero menos natural para una lectura amplia.'
- source_word: ይነብር ምስሌነ ዘልፈ ውስተ ቤት
  english_pob_choice: he dwells with us continually in the house
  chosen_spanish: habita con nosotros continuamente en la casa
  alternatives_spanish:
  - habita con nosotros continuamente en la casa
  - permanece con nosotros continuamente en la casa
  - vive con nosotros continuamente en la casa
  lexicon: residence and permanence
  rationale: '''Habita'' conserva un registro bíblico sobrio sin caer en formulación litúrgica fija. ''Continuamente'' refleja ''continually'' y mantiene la permanencia.'
theological_decisions:
- issue: Valor moral absoluto del enunciado 'no hay mal en él, sino solo bondad'
  english_pob_reading: there is no evil at all in him, but only goodness
  chosen_spanish_reading: en él no hay ningún mal, sino solo bondad
  alternative_spanish_readings:
  - en él no hay ningún mal, sino solo bondad
  - en él no hay mal alguno, sino solo bondad
  - en él no hay nada malo, sino solo bondad
  rationale: Se preserva la exclusión total ('ningún mal') y el contraste exclusivo ('solo bondad') sin suavizar la afirmación. La formulación evita introducir una antropología más amplia que la del versículo.
  doctrine_reference: integridad moral / elogio de rectitud
- issue: Relación de bendición, provisión y honor en la casa
  english_pob_reading: he blesses us ... he dwells with us continually in the house while honoring us
  chosen_spanish_reading: nos bendice ... habita con nosotros continuamente en la casa, honrándonos
  alternative_spanish_readings:
  - nos bendice ... habita con nosotros continuamente en la casa, honrándonos
  - nos bendice ... habita con nosotros continuamente en la casa y nos honra
  rationale: 'Se conserva la estructura relacional del original: bendición, permanencia y honor. ''Honrándonos'' mantiene el participio final y el matiz de convivencia respetuosa sin convertirlo en una cláusula más interpretativa.'
  doctrine_reference: honor familiar / convivencia pactal
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió dos puntos: ''our goodness'' pasó a ''goodness'', y ''whenever we take from his hand'' a ''whenever we receive from his hand''. La versión española sigue esa lectura revisada con ''bondad'' sin posesivo y ''recibimos de su mano''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como preferencia general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa 'Harán' como topónimo bíblico estándar en español.
  - Se preserva la metáfora 'de su mano' porque es parte del sentido providencial del texto y no resulta extraña en español bíblico.
  - No se introducen notas de pie porque el pasaje no presenta una variante textual o ambigüedad que requiera anclaje explícito en el texto español.
