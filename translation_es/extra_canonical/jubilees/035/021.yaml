translation:
  language: es
  text: Y yo mismo te pido que amonestes a Jacob acerca de mí y acerca de mis hijos, porque sé que sin duda él reinará sobre mí y sobre mis hijos, porque el día en que mi padre lo bendijo lo puso en alto y me puso abajo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ba-enta
  english_pob_choice: concerning me and concerning my children
  chosen_spanish: acerca de mí y acerca de mis hijos
  alternatives_spanish:
  - respecto de mí y respecto de mis hijos
  - sobre mí y sobre mis hijos
  lexicon: Ge'ez preposition ba-enta
  rationale: El contexto revisado del POB inglés favorece ‘concerning/regarding’ y no ‘on behalf of’. En español, ‘acerca de’ transmite con claridad que la amonestación trata sobre la situación de Esau y sus hijos, sin implicar representación.
- source_word: admonish
  english_pob_choice: admonish
  chosen_spanish: amonestes
  alternatives_spanish:
  - reprendas
  - exhortees
  lexicon: verb of warning/reproof
  rationale: ‘Amonestar’ conserva el matiz de advertencia o reprensión contenida en el inglés POB, con tono bíblico natural en español.
- source_word: reign over
  english_pob_choice: reign over
  chosen_spanish: reinará sobre
  alternatives_spanish:
  - gobernará sobre
  - se enseñoreará de
  lexicon: royal rule language
  rationale: ‘Reinar sobre’ reproduce el valor de dominio o gobierno del inglés sin introducir una connotación más técnica o más dura que la del texto fuente.
- source_word: made him high and me low
  english_pob_choice: he made him high and me low
  chosen_spanish: lo puso en alto y a mí en bajo
  alternatives_spanish:
  - lo exaltó y me humilló
  - lo elevó y me rebajó
  lexicon: elevation/lowing idiom
  rationale: La pareja ‘alto/bajo’ preserva la imagen comparativa del original y del POB inglés. ‘Exaltó/humilló’ sería más interpretativo; ‘poner en alto / en bajo’ mantiene la tensión lexical sin forzarla.
theological_decisions:
- issue: Relación de bendición y subordinación entre Jacob y Esaú
  english_pob_reading: Because on the day my father blessed him he made him high and me low.
  chosen_spanish_reading: porque el día en que mi padre lo bendijo lo puso en alto y a mí en bajo.
  alternative_spanish_readings:
  - porque cuando mi padre lo bendijo lo exaltó y me humilló
  - porque en el día en que mi padre lo bendijo lo puso por encima de mí y me dejó por debajo
  rationale: La formulación conserva la tensión narrativa de la bendición patriarcal y el contraste de estatus sin suavizarlo. No se sustituye por lenguaje más doctrinal o más abstracto.
  doctrine_reference: Génesis 27:27-29; Jubileos 35:21
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios; la única corrección necesaria fue anclar la nota al marcador correspondiente en el texto español.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita ‘señor’ o ‘Cristo’ por no corresponder al pasaje.
  - ‘Jacob’ se conserva como nombre propio sin transliteración.
  - La nota al pie está anclada en ‘acerca de’, coherente con la revisión del POB inglés de ‘on my behalf’ a ‘concerning/regarding’.
