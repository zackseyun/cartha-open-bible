translation:
  language: es
  text: Y comieron y bebieron ella y sus hijos aquella noche; y murió aquella misma noche, en el tercer año de la séptima semana del cuadragésimo primer jubileo. Y sus dos hijos, Esaú y Jacob, la sepultaron en la cueva doble, cerca de Sara, la madre de su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: and they ate and drank
  english_pob_choice: And they ate and drank
  chosen_spanish: Y comieron y bebieron
  alternatives_spanish:
  - Y estuvieron comiendo y bebiendo
  - Y comieron y tomaron
  lexicon: comer; beber
  rationale: El texto fuente expresa una secuencia simple de acciones pasadas; en español, el paralelismo directo conserva la sobriedad narrativa sin añadir aspecto continuo ni matices no presentes.
- source_word: she and her sons
  english_pob_choice: she and her sons
  chosen_spanish: ella y sus hijos
  alternatives_spanish:
  - ella con sus hijos
  - ella y sus hijos varones
  lexicon: ella; hijos
  rationale: La referencia incluye a la madre junto con sus hijos; 'sus hijos' es la forma natural y suficientemente precisa en español, sin introducir restricción de sexo que el pasaje no explicita aquí.
- source_word: she died in that night
  english_pob_choice: she died in that night
  chosen_spanish: murió en esa misma noche
  alternatives_spanish:
  - murió aquella noche
  - falleció esa noche
  lexicon: morir
  rationale: '''En esa misma noche'' preserva la cercanía temporal y el énfasis del inglés POB ''in that night'' sin volverlo innecesariamente idiomático o más débil.'
- source_word: the third year of the seventh week of the forty-first jubilee
  english_pob_choice: the third year of the seventh week of the forty-first jubilee
  chosen_spanish: en el tercer año de la séptima semana del cuadragésimo primer jubileo
  alternatives_spanish:
  - en el tercer año de la séptima semana del cuadragésimo primer jubileo
  - en el tercer año de la semana séptima del jubileo cuarenta y uno
  lexicon: año; semana; jubileo
  rationale: Se conserva la cronología técnica propia de Jubileos con equivalencia formal y sin normalizarla a categorías modernas; 'cuadragésimo primer jubileo' mantiene el orden y la referencia exacta.
- source_word: buried her in the double cave
  english_pob_choice: buried her in the double cave
  chosen_spanish: la sepultaron en la cueva doble
  alternatives_spanish:
  - la enterraron en la cueva doble
  - la sepultaron en la cueva gemela
  lexicon: sepultar; cueva doble
  rationale: '''Sepultar'' mantiene el registro bíblico-formal y evita perder la imagen tradicional de una tumba/cueva funeraria. ''Cueva doble'' traduce literalmente la expresión sin sustituirla por una interpretación más libre.'
- source_word: near Sarah, the mother of their father
  english_pob_choice: near Sarah, the mother of their father
  chosen_spanish: cerca de Sara, la madre de su padre
  alternatives_spanish:
  - junto a Sara, la madre de su padre
  - cerca de Sara, madre de su padre
  lexicon: cerca de; madre de su padre
  rationale: Se conserva la relación de parentesco tal como aparece, incluso si suena algo rígida en español, porque el texto parece subrayar la ubicación junto a la sepultura de Sara y no solo una referencia general a la antepasada.
theological_decisions:
- issue: Cronología sacralizada de Jubileos
  english_pob_reading: the third year of the seventh week of the forty-first jubilee
  chosen_spanish_reading: en el tercer año de la séptima semana del cuadragésimo primer jubileo
  alternative_spanish_readings:
  - en el tercer año de la séptima semana del cuadragésimo primer jubileo
  - en el tercer año del séptimo período del cuadragésimo primer jubileo
  rationale: No se interpreta la cronología con categorías externas ni se la explica; se conserva la estructura propia del libro como dato narrativo-teológico interno.
  doctrine_reference: No doctrinal expansion; calendrical framework of Jubilees
- issue: Sepultura junto a Sara
  english_pob_reading: buried her in the double cave near Sarah, the mother of their father
  chosen_spanish_reading: la sepultaron en la cueva doble, cerca de Sara, la madre de su padre
  alternative_spanish_readings:
  - la enterraron en la cueva doble, cerca de Sara, la madre de su padre
  - la sepultaron en la cueva doble junto a Sara, la madre de su padre
  rationale: Se mantiene la localización junto a Sara como dato de continuidad genealógica y funeraria, sin convertirlo en una formulación interpretativa sobre el estado de Sara o la santidad del lugar.
  doctrine_reference: Patriarchal burial tradition; no added doctrinal claim
translation_notes:
  revision_awareness: La revisión más reciente indica que el pasaje quedó sin cambios y con alto acuerdo entre revisiones; por eso este borrador sigue de cerca la lectura inglesa auditada y no introduce variantes textuales nuevas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva 'sepultaron' para el tono narrativo bíblico y 'cueva doble' para reflejar la expresión técnica del relato sin suavizarla.
  - No se añadieron notas al pie porque el inglés POB no las documenta y el español no crea ambigüedad nueva de relevancia textual.
