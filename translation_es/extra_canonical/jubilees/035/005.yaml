  yaml_path: translation/extra_canonical/jubilees/035/005.yaml
  text: 'which you commanded me: that I should honor my father and my brother. Tell me, then, what crookedness you have seen in me;'
  footnotes:
  - marker: a
    text: Or 'my mother'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:31Z'
    unchanged: false
    changes_summary: Restored the omitted opening clause about the command to honor father and mother, removed unsupported additions ('and I will turn away from it, and let mercy be upon me'), and adjusted wording for closer lexical accuracy and formal natural English.
translation:
  language: es
  text: '«Lo que me mandaste: que honrara a mi padre y a mi hermano. Dime, pues, qué desviación[a] has visto en mí;»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «torcedura»; la imagen contrasta con lo recto y puede entenderse como desviación moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: ከመ፡ አክብር፡ አበየ፡ ወእኅየየ
  english_pob_choice: that I should honor my father and my brother
  chosen_spanish: que honrara a mi padre y a mi hermano
  alternatives_spanish:
  - que debía honrar a mi padre y a mi hermano
  - que debía dar honor a mi padre y a mi hermano
  lexicon: honrar = reconocer honor/deber de respeto; padre/hermano = parentesco literal
  rationale: El ge'ez distingue 'padre' y 'hermano'; la corrección auditada del inglés confirma que no debe leerse 'madre'. 'Honrar' conserva el deber moral expresado por el mandato sin añadir matices no presentes.
- source_word: ዘአዘዝክኒ፡
  english_pob_choice: which you commanded me
  chosen_spanish: lo que me mandaste
  alternatives_spanish:
  - lo que me ordenaste
  - lo que me habías mandado
  lexicon: mandar/ordenar = dar una instrucción o mandato
  rationale: '''Mandaste'' reproduce con naturalidad el valor de un mandato personal pasado. ''Lo que'' introduce la cláusula dependiente de forma fluida en español sin expandir el sentido.'
- source_word: ምንተ ርኢኪ፡
  english_pob_choice: what ... have you seen in me
  chosen_spanish: qué ... has visto en mí
  alternatives_spanish:
  - qué has visto en mí
  - qué has percibido en mí
  lexicon: ver = observar, percibir
  rationale: 'La pregunta es directa y literal: no se amplía a ''percibir''. ''Has visto'' mantiene el contraste entre la conducta esperada y la evaluación del interlocutor.'
- source_word: ጥውየተ
  english_pob_choice: crookedness
  chosen_spanish: torcedura
  alternatives_spanish:
  - desviación
  - perversidad
  - torcedumbre
  lexicon: torcido/recto = desviación moral
  rationale: '''Torcedura'' conserva la imagen física de algo torcido y evita sobrecargar el verso con un término moral más interpretativo como ''perversidad''. Permite reflejar la tensión lexical del original.'
theological_decisions:
- issue: Lectura del parentesco en la cláusula de honor
  english_pob_reading: father and my brother, with a prior footnote noting a possible 'mother' in earlier rendering
  chosen_spanish_reading: mi padre y mi hermano
  alternative_spanish_readings:
  - mi padre y mi madre
  - mi padre y mi hermano [with note about prior mistaken rendering]
  rationale: El expediente revisado corrige explícitamente 'mother' a 'brother' por base ge'ez. La traducción española sigue la lectura corregida y no conserva la variante errónea en el texto principal.
  doctrine_reference: Fidelidad textual y corrección de lectura base
- issue: Retención del juicio moral implícito en 'crookedness'
  english_pob_reading: what crookedness have you seen in me
  chosen_spanish_reading: qué torcedura has visto en mí
  alternative_spanish_readings:
  - qué maldad has visto en mí
  - qué perversidad has visto en mí
  rationale: '''Torcedura'' mantiene la metáfora de lo torcido frente a lo recto, sin convertirla prematuramente en una acusación abstracta. Esto preserva la tensión semántica que el POB inglés dejó abierta.'
  doctrine_reference: Justicia/rectitud como imagen moral
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del texto inglés de POB, que restauró la cláusula sobre honrar al padre y al hermano y corrigió la lectura de 'mother' a 'brother' conforme al ge'ez. También evita añadir frases no respaldadas como 'me apartaré de ello' o 'y ten misericordia de mí'.
  spanish_consistency_notes:
  - Se mantiene 'mandaste' para el acto de orden divina o paterna, coherente con una traducción sobria y auditables.
  - Se usa 'mi hermano' conforme a la revisión textual, evitando la lectura tradicional pero incorrecta 'mi madre'.
  - La puntuación con comillas angulares se adapta a norma española sin alterar el contenido.
