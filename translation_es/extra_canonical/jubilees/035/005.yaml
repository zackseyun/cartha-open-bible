    rationale: Aunque refleja de cerca 'crookedness', en español neutral suena física o mecánica más que ética. 'Desviación' mantiene la idea de apartarse de lo recto y mejora la legibilidad sin paraphrasear excesivamente.
  - severity: low
    issue: Capitalización inicial mejorable
    rationale: Dentro de las comillas, 'lo que me mandaste' en minúscula puede sentirse como fragmento mal ensamblado. 'Lo que me mandaste' mejora la presentación sin cambiar el sentido.
