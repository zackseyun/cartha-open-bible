translation:
  language: es
  text: Y ámense unos a otros, hijos míos, entre sí, amando cada uno a su hermano como un hombre ama su propia vida, y que cada uno procure—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: And love one another, my sons, among yourselves
  english_pob_choice: And love one another, my sons, among yourselves
  chosen_spanish: Y ámense unos a otros, hijos míos, entre ustedes
  alternatives_spanish:
  - Yámense unos a otros, hijos míos, entre ustedes
  - Y amen unos a otros, hijos míos, entre ustedes
  lexicon: ἀγαπάω / amor mutuo exhortativo
  rationale: Conserva el mandato exhortativo y el vocativo paternal. 'Ámense' expresa bien la reciprocidad de 'one another' y es natural en español bíblico actual.
- source_word: each loving his brother as a man loves his own life
  english_pob_choice: each loving his brother as a man loves his own life
  chosen_spanish: amando cada uno a su hermano como un hombre ama su propia vida
  alternatives_spanish:
  - cada uno amando a su hermano como un hombre ama su propia vida
  - cada uno amando a su hermano como a su propia vida
  lexicon: amor fraternal comparado con el amor a la propia vida
  rationale: Mantiene la comparación explícita de medida y el paralelismo del original. 'Su propia vida' preserva el sentido de intensa auto-preferencia sin suavizarlo.
- source_word: and let a man seek—
  english_pob_choice: and let a man seek—
  chosen_spanish: y que un hombre busque—
  alternatives_spanish:
  - y busque un hombre—
  - y que el hombre busque—
  lexicon: verb of seeking with subject 'a man'
  rationale: 'Sigue la corrección auditada: ''a man'' funciona como sujeto, no objeto. ''Que un hombre busque—'' mantiene el arranque abierto y la continuidad al versículo siguiente.'
theological_decisions:
- issue: Force of the final clause left open into the next verse
  english_pob_reading: and let a man seek—
  chosen_spanish_reading: y que un hombre busque—
  alternative_spanish_readings:
  - y un hombre busque—
  - y busque el hombre—
  rationale: Se preserva la incompletitud sintáctica tal como queda en el texto auditado, sin completar el objeto implícito. Esto evita introducir contenido no presente en el verso.
  doctrine_reference: fidelidad textual / continuidad literaria
translation_notes:
  revision_awareness: La revisión más reciente corrigió la clausula final para que 'man' sea sujeto de 'seek', no objeto. La traducción española refleja esa lectura y conserva el guion final como señal de continuidad con el siguiente versículo.
  spanish_consistency_notes:
  - Se usa 'hijos míos' como vocativo afectivo coherente con el texto inglés.
  - Se prefiere 'busque' para conservar el valor abierto del verbo y el corte sintáctico del verso.
  - No se introdujo 'Cristo', 'Señor' ni otros términos ajenos al segmento.
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
