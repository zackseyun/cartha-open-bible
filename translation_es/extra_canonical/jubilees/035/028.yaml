revisions:
- from: Y ámense unos a otros, hijos míos, entre ustedes, amando cada uno a su hermano como un hombre ama su propia vida, y que un hombre busque—
  to: Y ámense unos a otros, hijos míos, entre sí, amando cada uno a su hermano como un hombre ama su propia vida, y que cada uno procure—
  rationale: Se mejora la naturalidad del español sin apartarse del sentido auditado. 'Entre sí' expresa de forma más elegante la reciprocidad interna del grupo, y 'que cada uno procure—' mantiene la cláusula abierta y exhortativa, preservando que el sujeto es humano/general y no objeto del verbo.
