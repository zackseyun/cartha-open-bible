    changes_summary: Changed ‘for a burial place’ to ‘as a burial place’ to better reflect the source phrasing and keep the English natural.
translation:
  language: es
  text: Sepúltame cerca de Abraham, mi padre, en la cueva doble, en el campo de Efrón el hitita. Abraham la adquirió allí, en la tierra de Canaán, como lugar de sepultura. En la tumba que yo mismo cavé allí para mí, sepúltame.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: double cave
  english_pob_choice: the double cave
  chosen_spanish: la cueva doble
  alternatives_spanish:
  - la cueva de doble cámara
  - la cueva doble de sepultura
  lexicon: No inventar entrada léxica; mantener la referencia al rasgo físico del sepulcro.
  rationale: «Cueva doble» reproduce de forma natural en español la idea del inglés sin añadir especificación no atestiguada. «De doble cámara» explicaría más, pero va más allá de lo que exige el texto fuente.
- source_word: acquired as a burial place
  english_pob_choice: acquired as a burial place
  chosen_spanish: adquirió como lugar de sepultura
  alternatives_spanish:
  - adquirió para sepultura
  - compró como sepulcro
  lexicon: Mantener el valor de adquisición/posesión y el destino funerario.
  rationale: «Como lugar de sepultura» refleja el matiz funcional de uso final sin mecanizar «for». «Para sepultura» también sería posible, pero «como» sigue de cerca la revisión inglesa y suena natural en español.
- source_word: tomb
  english_pob_choice: the tomb
  chosen_spanish: la tumba
  alternatives_spanish:
  - el sepulcro
  - la sepultura
  lexicon: Elegir el término más general y transparente para Spanish church readership.
  rationale: «Tumba» es claro y neutral en español contemporáneo. «Sepulcro» sería más solemne y «sepultura» más funcional; aquí no se requiere una distinción técnica adicional.
theological_decisions:
- issue: Patriarchal burial place and covenant land
  english_pob_reading: Abraham acquired the burial place in the land of Canaan
  chosen_spanish_reading: Abraham la adquirió como lugar de sepultura allí, en la tierra de Canaán
  alternative_spanish_readings:
  - Abraham la compró como lugar de sepultura allí, en la tierra de Canaán
  - Abraham la adquirió para sepultura allí, en la tierra de Canaán
  rationale: «Adquirió» preserva el registro sobrio del texto y evita introducir un énfasis comercial que el inglés auditado no desarrolla explícitamente. El lugar en Canaán se mantiene para conservar la dimensión histórica y territorial.
  doctrine_reference: Génesis 23; continuidad patriarcal y promesa de la tierra
- issue: Self-prepared burial place
  english_pob_reading: In the tomb which I dug for myself there, bury me.
  chosen_spanish_reading: En la tumba que yo mismo cavé allí, sepúltame
  alternative_spanish_readings:
  - En la tumba que yo preparé allí, sepúltame
  - En el sepulcro que yo mismo hice allí, sepúltame
  rationale: «Cavé» conserva la concreción física del acto y evita suavizarlo en una fórmula más general como «preparé». La auto-preparación del sepulcro se mantiene como dato narrativo, sin ampliar su sentido teológico.
  doctrine_reference: Sepultura ancestral; preparación anticipada de la muerte
translation_notes:
  revision_awareness: Tomé como guía la última revisión inglesa que ajustó «for a burial place» a «as a burial place», reflejando ese mismo matiz con «como lugar de sepultura» en español. No hay variantes textuales adicionales en el paquete fuente para esta unidad.
  spanish_consistency_notes:
  - Usé «Yahvé» en concordancia con el estándar del proyecto cuando aparezca el Nombre divino; aquí no ocurre.
  - Conservé «Abraham» y «Canaán» como nombres propios establecidos.
  - Elegí verbos en imperativo de sepultura («Sepúltame») para reproducir el tono directo del original y del inglés auditado.
  - Mantuve un registro digno y sobrio, sin añadir glosas interpretativas no presentes en el texto.
