    issue: Ambigüedad del relativo en «que Abraham adquirió»
    rationale: En español, la oración de relativo puede parecer modificar «el campo de Efrón el hitita» más que el sitio funerario mencionado. Reordenar la frase evita un posible desliz referencial.
  - severity: low
    issue: Matiz incompleto en «la tumba que yo mismo cavé allí»
    rationale: El inglés auditado dice «which I dug for myself there». Añadir «para mí» preserva explícitamente la auto-destinación de la tumba sin volver la frase pesada.
  revised_spanish_text: Sepúltame cerca de Abraham, mi padre, en la cueva doble, en el campo de Efrón el hitita. Abraham la adquirió allí, en la tierra de Canaán, como lugar de sepultura. En la tumba que yo mismo cavé allí para mí, sepúltame.
  revision_rationale: Se reestructuró la sintaxis para eliminar la ambigüedad del relativo y se añadió «para mí» para reflejar con mayor fidelidad «for myself». No hacen falta notas, porque la revisión no introduce nueva ambigüedad ni conserva alternativas necesarias en nota.
