translation:
  language: es
  text: Y en el primer año de la primera semana, en el cuadragésimo quinto jubileo, Rebeca llamó a su hijo Jacob y le instruyó acerca de su padre y acerca de su hermano, para que los honrara todos los días de su vida.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዓመት ... ዘሱባዔ ... ቀዳማይ ... በዘአርብዓ፡ ወኀምስቱ፡ ኢዮቤልው
  english_pob_choice: in the first year of the first week, in the forty-fifth jubilee
  chosen_spanish: en el primer año de la primera semana, en el cuadragésimo quinto jubileo
  alternatives_spanish:
  - en el primer año de la primera semana, en el jubileo cuarenta y cinco
  - en el año primero de la primera semana, en el cuadragésimo quinto jubileo
  lexicon: año; semana; jubileo
  rationale: Mantiene la secuencia cronológica y la forma numérica del texto fuente; 'jubileo' conserva el término técnico del libro de Jubileos sin reemplazarlo por una glosa interpretativa.
- source_word: ርብቃ
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Ribca
  lexicon: Rebeca
  rationale: Nombre propio bíblico estándar en español, fiel al referente del texto original.
- source_word: ጸውዐቶ ... ያዕቆብ፡ ወልዳ፡
  english_pob_choice: Rebekah called Jacob her son
  chosen_spanish: Rebeca llamó a su hijo Jacob
  alternatives_spanish:
  - Rebeca llamó a Jacob, su hijo
  - Rebeca llamó a Jacob, su hijo
  lexicon: llamar; hijo
  rationale: '''Llamó a su hijo Jacob'' reproduce el acto verbal y la relación filial sin añadir elementos no expresados.'
- source_word: ወአዘዘቶ
  english_pob_choice: and instructed him
  chosen_spanish: y le instruyó
  alternatives_spanish:
  - y le mandó
  - y le enseñó
  lexicon: instruir
  rationale: '''Instruyó'' conserva el matiz de enseñanza/encargo con autoridad que refleja bien el verbo del texto y la traducción inglesa auditada.'
- source_word: በእንተ፡ አቡሁ፡ ወበእንተ፡ እኁሁ፡
  english_pob_choice: concerning his father and concerning his brother
  chosen_spanish: acerca de su padre y acerca de su hermano
  alternatives_spanish:
  - respecto de su padre y respecto de su hermano
  - sobre su padre y sobre su hermano
  lexicon: acerca de
  rationale: '''Acerca de'' mantiene la repetición y la relación temática del original sin introducir causalidad o finalidad ajena al texto.'
- source_word: ከመ፡ ያክብሮሙ፡ ኵሎ፡
  english_pob_choice: that he should honor them all the days of his life
  chosen_spanish: para que los honrara todos los días de su vida
  alternatives_spanish:
  - para que los honrase todos los días de su vida
  - a fin de que los honrara todos los días de su vida
  lexicon: honrar; días de su vida
  rationale: '''Honrara'' expresa adecuadamente el deber filial y fraternal. ''Todos los días de su vida'' sigue de cerca la fórmula temporal del texto fuente.'
theological_decisions:
- issue: Deber filial y fraternal como mandato moral
  english_pob_reading: Rebekah instructs Jacob concerning his father and brother so that he should honor them all the days of his life.
  chosen_spanish_reading: Rebeca instruye a Jacob respecto de su padre y su hermano para que los honre toda su vida.
  alternative_spanish_readings:
  - Rebeca manda a Jacob acerca de su padre y su hermano para que los respete toda su vida.
  - Rebeca le enseña a Jacob sobre su padre y su hermano para que los honre mientras viva.
  rationale: El texto presenta una instrucción orientada a la honra debida a padre y hermano; 'honrar' conserva mejor la fuerza ética que alternativas más débiles como 'respetar'.
  doctrine_reference: Éxodo 20:12; Efesios 6:2-3
- issue: Relación de Rebeca con Jacob dentro de la escena narrativa
  english_pob_reading: Rebekah called Jacob her son
  chosen_spanish_reading: Rebeca llamó a su hijo Jacob
  alternative_spanish_readings:
  - Rebeca hizo llamar a Jacob, su hijo
  - Rebeca convocó a Jacob, su hijo
  rationale: La escena es doméstica y directa; 'llamó' evita sobreinterpretar un contexto ceremonial o público.
  doctrine_reference: Génesis 27:6-10
translation_notes:
