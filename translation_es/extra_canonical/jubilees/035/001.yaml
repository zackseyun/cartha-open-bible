  - Se mantuvo la repetición de 'acerca de' para reflejar el paralelismo del original.
  - Se usó el pretérito perfecto simple narrativo estándar en español bíblico contemporáneo.
  - No se introdujeron notas al pie porque el expediente no presenta variantes ni ambigüedades documentadas que lo requieran.
