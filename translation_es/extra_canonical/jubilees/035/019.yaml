translation:
  language: es
  text: 'Y él dijo: «Haré todo lo que me has dicho, y te sepultaré el día de tu muerte junto a Sara, la madre de mi padre, tal como has deseado, para que sus huesos estén junto a tus huesos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: I will do everything that you have told me
  english_pob_choice: I will do everything that you have told me
  chosen_spanish: Haré todo lo que me has dicho
  alternatives_spanish:
  - Haré todo cuanto me has dicho
  - Haré todo lo que me dijiste
  lexicon: hacer; todo; decir
  rationale: Conserva la promesa total expresada en el inglés POB sin añadir matices; en español, el presente perfecto simple futuro equivalente 'haré' comunica compromiso decidido de manera natural y fiel.
- source_word: I will bury you
  english_pob_choice: I will bury you
  chosen_spanish: te sepultaré
  alternatives_spanish:
  - te enterraré
  - te daré sepultura
  lexicon: sepultar; enterrar
  rationale: '''Sepultar'' mantiene el tono más formal y bíblico que ''enterrar'', sin perder el sentido básico. Evita un giro demasiado litúrgico como ''dar sepultura'' que suaviza la acción.'
- source_word: on the day of your death
  english_pob_choice: on the day of your death
  chosen_spanish: el día de tu muerte
  alternatives_spanish:
  - el día que mueras
  - el día de tu fallecimiento
  lexicon: día; muerte
  rationale: Reproduce con claridad la referencia temporal directa; 'muerte' conserva el valor concreto del texto, mientras que 'fallecimiento' sería más eufemístico y menos fiel al registro narrativo.
- source_word: near Sarah, my father’s mother
  english_pob_choice: near Sarah, my father’s mother
  chosen_spanish: junto a Sara, la madre de mi padre
  alternatives_spanish:
  - cerca de Sara, la madre de mi padre
  - junto a Sara, la abuela de mi padre
  lexicon: junto a; madre; padre
  rationale: '''Junto a'' refleja proximidad física para sepultura. ''La madre de mi padre'' sigue de cerca la relación familiar indicada por el inglés POB, evitando introducir ''abuela'' como inferencia interpretativa aunque sea el sentido natural.'
- source_word: just as you have desired
  english_pob_choice: just as you have desired
  chosen_spanish: tal como has deseado
  alternatives_spanish:
  - como has deseado
  - tal como lo has querido
  lexicon: desear; querer
  rationale: '''Deseado'' conserva el eco del inglés POB y la petición expresada por el difunto. Se mantiene el tratamiento de segunda persona singular conforme al diálogo del versículo.'
- source_word: so that her bones may be near your bones
  english_pob_choice: so that her bones may be near your bones
  chosen_spanish: para que sus huesos estén junto a tus huesos
  alternatives_spanish:
  - para que sus huesos estén cerca de los tuyos
  - a fin de que sus huesos queden junto a los tuyos
  lexicon: huesos; junto a
  rationale: '''Huesos'' preserva la imaginería corporal concreta; ''estén junto a'' expresa proximidad física sin añadir interpretación. ''Tus huesos'' mantiene el paralelismo con el texto fuente.'
theological_decisions:
- issue: Sepultura cercana como deseo de comunión familiar en la muerte
  english_pob_reading: Burial near Sarah so that her bones may be near your bones.
  chosen_spanish_reading: Sepultarlo junto a Sara para que sus huesos estén junto a los de él.
  alternative_spanish_readings:
  - enterrarlo cerca de Sara para que sus huesos estén cerca de los suyos
  - darle sepultura junto a Sara para que permanezcan próximos
  rationale: El texto presenta un arreglo funerario familiar, no una doctrina explícita; la traducción debe preservar la materialidad y la proximidad ósea sin convertirla en metáfora espiritual.
  doctrine_reference: Génesis 23; práctica sepulcral familiar en el relato patriarcal
- issue: Relación de parentesco expresada desde la perspectiva del hablante
  english_pob_reading: Sarah, my father’s mother
  chosen_spanish_reading: Sara, la madre de mi padre
  alternative_spanish_readings:
  - Sara, mi abuela paterna
  - Sara, la abuela de mi padre
  rationale: La expresión mantiene la perspectiva narrativa del hablante y evita normalizarla demasiado en una sola etiqueta de parentesco. En un registro bíblico sobrio, la construcción analítica conserva la transparencia del dato genealógico.
  doctrine_reference: Ninguna; observación genealógica/narrativa
translation_notes:
  revision_awareness: 'La versión inglesa auditada recibió una corrección menor: se cerraron las comillas de la cita directa. No hubo cambios de contenido ni decisiones léxicas sustantivas; por eso la redacción española sigue de cerca el sentido confirmado del texto inglés final.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'sepultaré' en lugar de 'enterraré' por registro bíblico sobrio, sin alterar el sentido.
  - Se conserva la relación 'la madre de mi padre' para reflejar la formulación narrativa del fuente y el inglés POB.
