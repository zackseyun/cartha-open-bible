translation:
  language: es
  text: 'Y él dijo: «Haré todo lo que pidas, y no rechazaré tu petición». Y ella le dijo: «Te pido que, el día en que yo muera, me lleves y me entierres cerca de Sara, la madre de tu padre, y que tú y Jacob[a] se amen uno al otro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que tú y Jacob se amen uno al otro» conserva la reciprocidad del original; en español también podría expresarse «se quieran mutuamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: I will do everything that you ask
  english_pob_choice: I will do everything that you ask
  chosen_spanish: Haré todo lo que pidas
  alternatives_spanish:
  - Haré cuanto me pidas
  - Haré todo cuanto pidas
  lexicon: do / ask
  rationale: Conserva la promesa total sin añadir matices; «pidas» mantiene el valor general de solicitud del inglés POB y resulta natural en español.
- source_word: I will not refuse your request
  english_pob_choice: I will not refuse your request
  chosen_spanish: no rechazaré tu petición
  alternatives_spanish:
  - no me negaré a tu petición
  - no rehusaré tu petición
  lexicon: refuse / request
  rationale: «Rechazar» transmite bien la negativa explícita y evita un giro demasiado idiomático que debilite la fuerza del original.
- source_word: on the day I die
  english_pob_choice: on the day I die
  chosen_spanish: el día en que yo muera
  alternatives_spanish:
  - el día de mi muerte
  - cuando yo muera
  lexicon: die
  rationale: Mantiene el marco temporal concreto del inglés y su tono solemne sin volverlo demasiado abstracto.
- source_word: carry me and bury me near Sarah
  english_pob_choice: carry me and bury me near Sarah
  chosen_spanish: me lleves y me entierres cerca de Sara
  alternatives_spanish:
  - me cargues y me entierres cerca de Sara
  - me transportes y me entierres cerca de Sara
  lexicon: carry / bury / near
  rationale: «Llevar» conserva la acción de trasladar a la persona; «entierres cerca de» reproduce el lugar de sepultura sin forzar una formulación funeraria más técnica.
- source_word: Sarah, the mother of your father
  english_pob_choice: Sarah, the mother of your father
  chosen_spanish: Sara, la madre de tu padre
  alternatives_spanish:
  - Sara, la madre de tu padre
  - Sara, tu abuela
  lexicon: Sarah / mother of your father
  rationale: Se preserva la relación genealógica explícita del texto fuente en vez de sustituirla por un equivalente más interpretativo como «abuela».
- source_word: that you and Jacob will love one another
  english_pob_choice: that you and Jacob will love one another
  chosen_spanish: que tú y Jacob se amen uno al otro
  alternatives_spanish:
  - que tú y Jacob se quieran mutuamente
  - que tú y Jacob se amen recíprocamente
  lexicon: love one another
  rationale: «Amarse» mantiene la reciprocidad del original y evita una paráfrasis más moderna que podría sonar menos solemne. Se conserva la tensión pronominal del plural en una forma natural para el español bíblico.
