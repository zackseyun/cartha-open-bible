  rationale: Se mantiene la relación exacta indicada por el texto, sin deducir un término más familiar que reduzca la transparencia genealógica.
  doctrine_reference: source-transparency / genealogical specificity
- issue: Reciprocal love between family members
  english_pob_reading: that you and Jacob will love one another
  chosen_spanish_reading: que tú y Jacob se amen uno al otro
  alternative_spanish_readings:
