base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/035/013.yaml
  text: And Isaac said to her, “I also know and see Jacob’s conduct toward us, that with all his heart he honors us. I loved Esau before Jacob from the time he was born first, but now I love Jacob more than Esau, because he has made his deeds very evil, and there is no righteousness in him, for all his ways are injustice and violence, and there is no righteousness around him.”
  footnotes:
  - marker: a
    text: Or 'because his deeds are more evil'.
    reason: previous_rendering
  - marker: b
    text: Or 'and there is no righteousness in him.”'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:33Z'
    unchanged: false
    changes_summary: Adjusted 'very evil' to 'more evil' to reflect the comparative sense of አብዝኀ, and changed the final phrase from 'around him' to 'in him' for lexical accuracy and consistency with the earlier clause.
translation:
  language: es
  text: 'Y dijo Isaac a ella: «También yo conozco y veo la conducta de Jacob hacia nosotros, que con todo su corazón nos honra. Amé a Esaú antes que a Jacob, desde que nació primero; pero ahora amo más a Jacob que a Esaú, porque ha hecho muy malas sus obras[a], y no hay justicia en él[b], porque todos sus caminos son injusticia y violencia, y no hay justicia alrededor de él[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha hecho sus obras más malas».'
    reason: alternative_reading
  - marker: b
    text: 'O: «y no hay rectitud en él».'
    reason: spanish_lexical_alternative
  - marker: c
    text: 'O idiomáticamente: «y no hay justicia en él en absoluto».'
    reason: source_nuance
lexical_decisions:
- source_word: ይስሐቅ / Isaac
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Yitzhak
  lexicon: N/A
  rationale: Nombre propio bíblico conservado en su forma castellana estándar, conforme al texto fuente y al uso eclesial amplio.
- source_word: ግብረ፡ ያዕቆብ / Jacob’s conduct
  english_pob_choice: Jacob’s conduct
  chosen_spanish: la conducta de Jacob
  alternatives_spanish:
  - las obras de Jacob
  - el proceder de Jacob
  lexicon: N/A
  rationale: '''ግብር'' aquí se refiere al comportamiento/obra observable; ''conducta'' conserva el alcance general y encaja con el juicio moral del pasaje.'
- source_word: በኵሉ፡ ልቡ / with all his heart
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con toda su alma
  lexicon: N/A
  rationale: Expresión idiomática natural en español para una entrega total e ինտencional, sin añadir contenido ajeno.
- source_word: ያከብረነ / he honors us
  english_pob_choice: he honors us
  chosen_spanish: nos honra
  alternatives_spanish:
  - nos muestra honor
  - nos respeta
  lexicon: N/A
  rationale: '''Honra'' comunica adecuadamente la deferencia debida a los padres/tutores y mantiene el sentido directo del verbo.'
- source_word: አፈቅር ... እምነ / I loved ... before
  english_pob_choice: I loved ... before
  chosen_spanish: Amé ... antes que
  alternatives_spanish:
  - Amaba ... más que
  - Amé ... primero que
  lexicon: N/A
  rationale: '''Antes que'' expresa prioridad temporal, y ''Amé'' mantiene el perfecto simple narrativo del relato.'
- source_word: አብዝኀ፡ አእክዮ፡ ምግባሪሁ / has made his deeds very evil
  english_pob_choice: has made his deeds very evil
  chosen_spanish: ha hecho muy malas sus obras[a]
  alternatives_spanish:
  - ha hecho sus obras más malas
  - ha hecho sus obras sumamente malas
  lexicon: N/A
  rationale: La revisión textual indica un intensificador, no un comparativo estricto. 'Muy malas' preserva el valor adverbial de አብዝኀ y evita la comparación de grado. 'Obras' rinde ምግባሪሁ de forma bíblica y clara.
- source_word: ጽድቀ / righteousness
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: N/A
  rationale: En este contexto forense/moral, 'justicia' es la equivalencia más natural y mantiene la oposición con injusticia y violencia.
- source_word: ዐመፃ / injustice
  english_pob_choice: injustice
  chosen_spanish: injusticia
  alternatives_spanish:
  - maldad
  - iniquidad
  lexicon: N/A
  rationale: Corresponde de manera directa al contraste moral del pasaje y evita cargar el término con matices no requeridos.
- source_word: ግፍዕ / violence
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - opresión
  - abusos
  lexicon: N/A
  rationale: '''Violencia'' conserva la fuerza del término junto a ''injusticia'', sin suavizarlo.'
- source_word: አውዶ / around him
  english_pob_choice: around him
  chosen_spanish: en él[b]
  alternatives_spanish:
  - a su alrededor
  - en torno a él
  lexicon: N/A
  rationale: Se mantiene la nota de la revisión sobre la clausula final, pero en español se preserva la idea de ausencia interior en paralelo con la primera afirmación. La repetición subraya el alcance total del juicio moral; el marcador permite la alternativa más literal indicada por el audit trail.
theological_decisions:
- issue: Preferencia moral entre Jacob y Esaú basada en sus obras
  english_pob_reading: Isaac says he loves Jacob more than Esau because Esau’s deeds are evil and Jacob honors them with all his heart.
  chosen_spanish_reading: Isaac afirma que ama más a Jacob que a Esaú porque las obras de Esaú son muy malas, mientras Jacob los honra con todo su corazón.
  alternative_spanish_readings:
  - Isaac ama más a Jacob porque Esaú ha obrado peor.
  - Isaac muestra preferencia por Jacob por la conducta moral de ambos.
  rationale: El pasaje presenta una evaluación moral explícita ligada a la conducta; la traducción debe conservar la tensión ética sin suavizar la preferencia expresada por Isaac.
  doctrine_reference: Sabiduría moral narrativa; retribución ética en la literatura del Segundo Templo.
- issue: Registro de 'righteousness' como 'justicia' frente a 'rectitud'
  english_pob_reading: there is no righteousness in him / around him
  chosen_spanish_reading: no hay justicia en él
  alternative_spanish_readings:
  - no hay rectitud en él
  - no hay justicia a su alrededor
  rationale: '''Justicia'' reproduce mejor la oposición con ''injusticia y violencia'' y conserva la carga relacional/judicial del término en este contexto.'
  doctrine_reference: Justicia/rectitud en lenguaje bíblico; contraste moral.
- issue: 'Última cláusula: alcance de la ausencia de justicia'
  english_pob_reading: and there is no righteousness in him.
  chosen_spanish_reading: y no hay justicia en él
  alternative_spanish_readings:
  - y no hay justicia alrededor de él
  - y no hay justicia en torno a él
  rationale: Aunque la revisión textual rescata un matiz espacial ('alrededor de él'), el sentido global del versículo insiste en la ausencia total de justicia. La formulación española elegida conserva la naturalidad y permite la repetición enfática del juicio moral.
  doctrine_reference: Lexicografía contextual de አውዶ; juicio moral totalizador.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente para recuperar el valor adverbial/intensificador de አብዝኀ ('muy') y la lectura final de አውዶ ('alrededor de él'), pero se optó por una redacción española más fluida y coherente con la repetición final del juicio moral. Se evitó traducir mecánicamente como comparativo ('más malo') porque el expediente textual favorece un intensificador. También se mantuvo la negación final sobre 'justicia' con repetición enfática, en paralelo al original.
  spanish_consistency_notes:
  - Se usa 'justicia' de modo consistente para ג/צדק/צדקה cuando el contexto es moral-jurídico.
  - '''Conducta'' se reserva aquí para ግብር por claridad narrativa.'
  - Las notas [a] y [b] están ancladas explícitamente en el texto para cumplir con la validación y conservar variantes significativas.
