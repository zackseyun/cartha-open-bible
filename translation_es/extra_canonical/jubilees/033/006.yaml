translation:
  language: es
  text: 'y no se lo contó a nadie. Y cuando Jacob vino y él la buscó[a], ella le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo ge'ez aquí fue revisado en el audit trail para indicar que Jacob es quien la buscó; por eso la traducción sigue esa relación sujeto-objeto.
    reason: textual_variant
lexical_decisions:
- source_word: ፈድፋደ ፡ ... ወኢለመኑሂ ፡ ሰብአ
  english_pob_choice: and she told no one
  chosen_spanish: y no se lo contó a nadie
  alternatives_spanish:
  - y no lo contó a nadie
  - y no se lo dijo a nadie
  lexicon: contar / decir
  rationale: El Ge'ez expresa que no informó a nadie; en español, 'no se lo contó a nadie' conserva el sentido idiomático sin introducir un objeto inexistente en el texto fuente. Se evita añadir un 'it' explícito que el inglés revisado eliminó por innecesario.
- source_word: ወሶበ ፡ መጽአ ፡ ያዕቆብ
  english_pob_choice: And when Jacob came
  chosen_spanish: Y cuando Jacob vino
  alternatives_spanish:
  - Y cuando Jacob llegó
  - Y cuando Jacob llegó allí
  lexicon: venir / llegar
  rationale: El verbo de movimiento se rinde de forma natural con 'vino', manteniendo el punto de referencia narrativo desde la perspectiva de la escena sin forzar un matiz adicional.
- source_word: ወኀሠሣ ፡ ትቤሎ
  english_pob_choice: he sought her, she said to him
  chosen_spanish: 'él la buscó[a], ella le dijo:'
  alternatives_spanish:
  - 'él la buscó, ella le dijo:'
  - 'él la buscó y ella le dijo:'
  lexicon: buscar
  rationale: 'La revisión inglesa corrigió el sujeto y objeto: ''he sought her''. En español se conserva esa relación pronominal con ''él la buscó''. El segundo miembro prepara la cita directa y refleja el hebraísmo/turno narrativo de forma fluida.'
theological_decisions:
- issue: Relación sujeto-objeto en 'sought'
  english_pob_reading: he sought her
  chosen_spanish_reading: él la buscó
  alternative_spanish_readings:
  - ella lo buscó
  - él la buscó a ella
  rationale: La corrección textual/auditiva del inglés muestra que el sujeto es Jacob y el objeto es la mujer. En español se preserva esa relación sin ambigüedad y sin invertirla.
  doctrine_reference: Coherencia textual y sintáctica; no doctrinal
translation_notes:
  revision_awareness: El inglés POB fue revisado para eliminar un objeto innecesario en 'told no one' y, más importante, para corregir la relación verbal en 'he sought her'. La versión española sigue la lectura revisada y evita la inversión anterior de sujeto y objeto.
  spanish_consistency_notes:
  - Se usa 'Jacob' de forma consistente con el nombre propio del texto fuente y del audit trail.
  - '''No se lo contó a nadie'' mantiene naturalidad en español y evita calco innecesario.'
  - La cita final con dos puntos conserva la transición narrativa del original sin añadir contenido.
