translation:
  language: es
  text: la criada de Raquel[a], la concubina de su padre, bañándose en agua en un lugar apartado; y la amó. Y se escondió, y de noche entró en la casa de Bilhá y la encontró durmiendo sola en su cama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sierva de Raquel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ለአኪተ ፡ ራሔል
  english_pob_choice: the maidservant of Rachel
  chosen_spanish: la criada de Raquel
  alternatives_spanish:
  - la sierva de Raquel
  - la esclava de Raquel
  lexicon: servant/slave terminology
  rationale: El audit trail corrige la lectura que omitía 'maidservant'; en español, 'criada' comunica relación servil doméstica sin forzar más de lo que el contexto evidencia. 'Sierva' sería posible, pero aquí puede sonar más genérico y menos concreto; 'esclava' es más fuerte y no queda tan garantizado por el contexto inmediato.
- source_word: ዐቅብተ ፡ አቡሁ
  english_pob_choice: the concubine of his father
  chosen_spanish: la concubina de su padre
  alternatives_spanish:
  - la mujer secundaria de su padre
  lexicon: concubine terminology
  rationale: '''Concubina'' es la equivalencia directa y transparente para la relación descrita; mantiene la fuerza del término sin eufemismo.'
- source_word: በማይ ፡ በኅቡእ
  english_pob_choice: bathing in water in a secluded place
  chosen_spanish: bañándose en agua en un lugar apartado
  alternatives_spanish:
  - bañándose en agua en un lugar oculto
  - lavándose en agua en secreto
  lexicon: bath/bathe terminology
  rationale: '''En un lugar apartado'' preserva el valor de ''secluded place'' con español natural; ''en secreto'' introduciría una inferencia mayor que la del ge''ez.'
- source_word: ወአፍቀራ
  english_pob_choice: and he loved her
  chosen_spanish: y la amó
  alternatives_spanish:
  - y la quiso
  - y la amaba
  lexicon: love terminology
  rationale: '''Amó'' sigue de cerca la declaración simple del texto y conserva la intensidad verbal sin añadir matiz progresivo.'
- source_word: ቦአ ፡ ቤተ ፡ ባላን
  english_pob_choice: he entered the house of Bilhah
  chosen_spanish: entró en la casa de Bilhá
  alternatives_spanish:
  - entró a la casa de Bilhá
  lexicon: house entry terminology
  rationale: Se mantiene la referencia explícita a Bilhá del texto y del audit trail, con la preposición española más natural para 'enter the house of'.
- source_word: እንዘ ፡ ትነውም ፡ ውስተ ፡ ዐራታ ፡ ባሕቲታ
  english_pob_choice: found her sleeping alone in her bed
  chosen_spanish: la encontró durmiendo sola en su cama
  alternatives_spanish:
  - la encontró sola en su cama mientras dormía
  lexicon: sleep/bed terminology
  rationale: '''Durmiendo sola en su cama'' refleja la situación final sin añadir ''en su casa'', que el control textual señaló como no presente al final del versículo. ''Sola'' mantiene el énfasis del ge''ez en la soledad.'
theological_decisions:
- issue: Identidad de la mujer observada por Reuben
  english_pob_reading: the maidservant of Rachel, the concubine of his father
  chosen_spanish_reading: la criada de Raquel, la concubina de su padre
  alternative_spanish_readings:
  - Raquel, la concubina de su padre
  rationale: Se evita la lectura errónea que convertiría a Raquel en la mujer bañándose. El audit trail confirma que la referencia es a Bilhá, criada de Raquel y concubina de Jacob, y la traducción española debe preservar esa distinción narrativa.
  doctrine_reference: Fidelidad textual y coherencia narrativa; no se trata de una cuestión doctrinal, sino de precisión exegética.
- issue: Lugar de reposo final de la mujer
  english_pob_reading: sleeping alone in her bed
  chosen_spanish_reading: durmiendo sola en su cama
  alternative_spanish_readings:
  - sola en su cama
  rationale: Se evita añadir 'en su casa' porque el control textual indicó que no pertenece a la frase final. La formulación elegida conserva la soledad y el lugar de descanso sin expansión innecesaria.
  doctrine_reference: Principio de suficiencia textual y restricción semántica.
translation_notes:
  revision_awareness: 'El registro inglés pasó por una corrección importante: se restauró ''maidservant'' para evitar identificar a Raquel como la mujer que se bañaba, y se ajustó la clausula final para eliminar ''in her house'', no presente en el cierre del ge''ez. La versión española sigue esa revisión y evita reproducir la lectura errónea corregida.'
  spanish_consistency_notes:
  - Se usa 'Bilhá' con acento, forma habitual en español bíblico, para la referencia al nombre propio.
  - '''Criada'' se emplea aquí como solución sobria para un vínculo servil doméstico; no se usa ''sierva'' ni ''esclava'' en el texto principal para no cargar indebidamente el matiz.'
  - '''Lugar apartado'' traduce el sentido de ''secluded place'' sin introducir una dimensión moral que el texto no formula explícitamente.'
