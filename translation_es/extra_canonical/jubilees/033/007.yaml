revisions:
- from: «No soy pura para ti, porque he sido deshonrada aparte de ti; pues Rubén me ha deshonrado y se acostó conmigo de noche, mientras yo estaba dormida, y no lo supe hasta que me descubrió la falda y se acostó conmigo».
  to: «No soy pura para ti, porque he sido contaminada aparte de ti; pues Rubén me ha contaminado y se acostó conmigo de noche, mientras yo estaba dormida, y no lo supe hasta que me levantó la falda y se acostó conmigo».
  rationale: Se reemplaza «deshonrada» por «contaminada» para conservar el campo léxico de pureza/impureza del original y de la POB inglesa. También se ajusta «me descubrió la falda» a «me levantó la falda» por mayor naturalidad en español sin perder fidelidad narrativa. No se requieren notas al pie porque no se preservó ninguna alternativa en el inglés ni se crea una ambigüedad nueva que necesite aclaración.
