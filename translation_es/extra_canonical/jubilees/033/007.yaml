  text: “I am not pure for you, because I have been defiled apart from you; for Reuben has defiled me and lay with me at night while I was asleep, and I did not know until he uncovered my skirt and lay with me.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:58Z'
    unchanged: false
    changes_summary: Changed 'clean' to 'pure' for more natural/formal register, 'away from you' to 'apart from you' for closer sense, and 'sleeping' to 'asleep' for smoother English. Also changed 'polluted me' to 'defiled me' for consistency with 'have been defiled.'
translation:
  language: es
  text: «No soy pura para ti, porque he sido contaminada aparte de ti; pues Rubén me ha contaminado y se acostó conmigo de noche, mientras yo estaba dormida, y no lo supe hasta que me levantó la falda y se acostó conmigo».
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: unclean / defiled
  english_pob_choice: not pure / have been defiled / defiled me
  chosen_spanish: no soy pura / he sido deshonrada / me ha deshonrado
  alternatives_spanish:
  - no soy limpia
  - he sido contaminada
  - me ha contaminado
  lexicon: pureza/impureza; deshonra moral y sexual
  rationale: El ge'ez expresa una condición de impureza o contaminación ritual/moral después del acto sexual ilícito; en español, «pura» conserva el registro formal de la POB inglesa y evita reducirlo a higiene física.
- source_word: apart from you
  english_pob_choice: apart from you
  chosen_spanish: aparte de ti
  alternatives_spanish:
  - lejos de ti
  - separada de ti
  lexicon: separación; exclusión
  rationale: «Aparte de ti» reproduce la idea de separación o desvío respecto de la relación esperada sin introducir un matiz espacial más fuerte que el texto no exige.
- source_word: lay with me at night
  english_pob_choice: lay with me at night
  chosen_spanish: se acostó conmigo de noche
  alternatives_spanish:
  - durmió conmigo de noche
  - yació conmigo por la noche
  lexicon: eufemismo sexual
  rationale: «Se acostó conmigo» es un equivalente claro y sobrio para la relación sexual; «de noche» conserva el complemento temporal del original.
- source_word: while I was asleep
  english_pob_choice: while I was asleep
  chosen_spanish: mientras yo estaba dormida
  alternatives_spanish:
  - cuando yo dormía
  - en mi sueño
  lexicon: estado de inconsciencia
  rationale: El ge'ez subraya que ella no estaba consciente; «estaba dormida» es la formulación natural y precisa en español.
- source_word: uncovered my skirt
  english_pob_choice: uncovered my skirt
  chosen_spanish: me descubrió la falda
  alternatives_spanish:
  - me levantó la falda
  - me quitó la falda
  lexicon: prenda inferior / exposición sexual
  rationale: «Descubrió la falda» mantiene el gesto de quitar o alzar la cobertura de la prenda sin forzar una identificación anatómica no explícita en el texto.
theological_decisions:
- issue: Impureza moral/sexual tras el acto de Rubén
  english_pob_reading: I am not pure for you, because I have been defiled apart from you
  chosen_spanish_reading: No soy pura para ti, porque he sido deshonrada aparte de ti
  alternative_spanish_readings:
  - No soy limpia para ti, porque he sido contaminada aparte de ti
  - No soy pura para ti, porque he sido contaminada aparte de ti
  rationale: La línea transmite una pérdida de pureza ligada a una agresión sexual. «Deshonrada» hace explícita la dimensión sexual y relacional sin borrar la noción de impureza que la POB preserva con «pure».
  doctrine_reference: Pureza ritual y deshonra sexual en narrativas patriarcales del Antiguo Oriente; cf. Gn 34 en términos temáticos, sin equiparar los textos
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: «pure» en lugar de «clean», «apart from you» en lugar de «away from you», y «defiled me» para coherencia interna. La versión española refleja esos ajustes con «pura», «aparte de ti» y «deshonrada/deshonrado».'
  spanish_consistency_notes:
  - Se conservó un registro sobrio y formal, evitando paráfrasis interpretativa.
  - No se usó «Cristo», «SEÑOR» ni terminología eclesial ajena al pasaje.
  - La traducción mantiene la repetición de la deshonra/impureza para reflejar el énfasis del original.
