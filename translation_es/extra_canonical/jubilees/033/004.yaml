lexical_decisions:
- source_word: ውስተ ፡ ቤታ
  english_pob_choice: in her house
  chosen_spanish: en su casa
  alternatives_spanish:
  - dentro de su casa
  - en la casa de ella
  lexicon: ቤት
  rationale: El inicio ge'ez añade un marco locativo independiente. En español, «en su casa» comunica la misma escena de manera natural y fiel sin sobrerrepresentar la preposición.
- source_word: ወሰከበ ፡ ምስሌሃ
  english_pob_choice: And he lay with her
  chosen_spanish: Y se acostó con ella
  alternatives_spanish:
  - Y yació con ella
  - Y se acostó junto a ella
  lexicon: שכב / ሰከበ
  rationale: Para conservar el valor sexual del verbo y el registro bíblico sin caer en un calco duro, «se acostó con ella» es la equivalencia más transparente en español.
- source_word: ወርእየቶ
  english_pob_choice: and saw him
  chosen_spanish: y lo vio
  alternatives_spanish:
  - y lo vio a él
  - y lo miró
  lexicon: ראה
  rationale: El sufijo objeto masculino singular del ge'ez exige el pronombre explícito «lo». «Lo vio» mantiene la precisión y la naturalidad del español.
- source_word: ሮቤን
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rubén
  lexicon: ראובן
  rationale: Se usa la forma castellana corriente del nombre bíblico para legibilidad e identificación inmediata.
- source_word: ወከሠተት ፡ ክንፋ
  english_pob_choice: she uncovered the edge of her covering
  chosen_spanish: descubrió el borde de su cobertor
  alternatives_spanish:
  - descubrió el borde de su manta
  - destapó el borde de su cobertura
  lexicon: כסה / cobertura
  rationale: «Cobertor» conserva el objeto de cobertura de forma clara y digna; «borde» traduce fielmente la idea de un extremo o orilla del velo/cubierta.
- source_word: ወአኀዘቶ
  english_pob_choice: and seized him
  chosen_spanish: lo agarró
  alternatives_spanish:
  - lo sujetó
  - lo asió
  lexicon: אחז
  rationale: El verbo expresa aprehensión física directa. «Lo agarró» es natural en español y mantiene la fuerza del acto.
theological_decisions:
- issue: Relato sexual explícito sin eufemismo atenuante
  english_pob_reading: And he lay with her
  chosen_spanish_reading: Y se acostó con ella
  alternative_spanish_readings:
  - Y yació con ella
  - Y tuvo relaciones con ella
  rationale: El relato debe conservar la crudeza narrativa del original y del audit trail inglés; no se introduce un eufemismo moderno que diluya la escena.
  doctrine_reference: Narrative fidelity; lexical transparency
- issue: Identificación masculina explícita en la escena
  english_pob_reading: and saw him
  chosen_spanish_reading: y lo vio
  alternative_spanish_readings:
  - y lo vio a él
  - y vio que era él
  rationale: El ge'ez incluye objeto masculino singular; la traducción debe dejar visible esa referencia para no perder información textual.
  doctrine_reference: Textual accuracy
translation_notes:
  revision_awareness: Se incorporó el marco locativo inicial («en su casa») según la revisión de hueco de segmento; también se preservó el objeto masculino explícito de «lo vio» conforme a la corrección del audit trail. La redacción española mantiene la secuencia completa sin omitir detalles del texto ge'ez.
  spanish_consistency_notes:
  - Se mantiene «Rubén» como forma española estándar del nombre.
  - Se conserva el tono narrativo sobrio y directo, sin modernizar en exceso el lenguaje bíblico.
  - Se usa «cobertor» para evitar términos eclesiásticos no motivados por el texto.
