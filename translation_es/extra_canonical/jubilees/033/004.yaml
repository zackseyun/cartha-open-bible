  rationale: Se ajusta la nota b para que refleje la variante inglesa documentada sin introducir un cambio léxico ajeno al source trail, y se mejora la naturalidad de la narrativa española sustituyendo «he aquí» por «y resulta que». No se requieren cambios doctrinales ni de fondo.
