translation:
  language: es
  text: Jacob se indignó mucho con Rubén, porque se había acostado con Bilhá, porque había descubierto la falda[a] de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manto» o «vestidura». La expresión alude a un modismo de violación sexual/incesto; literalmente habla de descubrir la cobertura o falda del padre, no su cama.
    reason: Preservar la fidelidad a ክዳነ y aclarar la resonancia idiomática que el español moderno puede no captar de inmediato.
lexical_decisions:
- source_word: ወተምዐ ... ጥቀ ላዕለ
  english_pob_choice: was very angry with
  chosen_spanish: se indignó mucho contra
  alternatives_spanish:
  - se enojó muchísimo con
  - ardió de gran ira contra
  lexicon: רָגַז / θυμός
  rationale: El ge'ez expresa una fuerte reacción de ira; en español, «se indignó mucho contra» mantiene la intensidad y el matiz relacional sin sonar artificial.
- source_word: ሰከበ ምስለ ባላን
  english_pob_choice: had lain with Bilhah
  chosen_spanish: se había acostado con Bilhá
  alternatives_spanish:
  - había yacido con Bilhá
  - había tenido relaciones con Bilhá
  lexicon: שָׁכַב
  rationale: La acción sexual se expresa de modo sobrio y directo. «Se había acostado con» conserva el valor idiomático y la carga narrativa sin volverlo eufemístico en exceso.
- source_word: ከሠተ ክዳነ አቡሁ
  english_pob_choice: had uncovered his father's bed
  chosen_spanish: había descubierto la cama de su padre
  alternatives_spanish:
  - había descubierto el lecho de su padre
  - había descubierto la cama paterna
  lexicon: גִּלָּה עֶרְוָה / כָּר
  rationale: El audit trail inglés corrigió «skirt» a «bed» por fidelidad al testigo ge'ez y al eco idiomático de la desnudez/violación sexual. En español, «cama» es natural y mantiene el paralelo con el inglés revisado; «lecho» es una alternativa más solemne.
theological_decisions:
- issue: Eco intertextual del idioma de la desnudez sexual
  english_pob_reading: had uncovered his father's bed
  chosen_spanish_reading: había descubierto la cama de su padre
  alternative_spanish_readings:
  - había descubierto el lecho de su padre
  - había descubierto la desnudez de su padre
  rationale: Se conserva la imagen concreta de la cama/lecho para reflejar la alusión intertextual a fórmulas legales sobre la exposición sexual. «Desnudez» explicita el sentido, pero borra la imagen textual presente en el ge'ez.
  doctrine_reference: Deuteronomio 22:30; 27:20
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «skirt» a «bed» tras una revisión de fidelidad; la versión española sigue esa corrección y evita el término tradicional «falda» o «skirt», que no corresponde al testigo ge'ez ni al sentido intertextual.
  spanish_consistency_notes:
  - Se usa «Rubén» y «Bilhá» con acentuación española estándar para nombres bíblicos.
  - Se prefirió «cama» en vez de «lecho» por claridad moderna; ambas opciones quedan documentadas.
  - No se introdujo un calco de «SEÑOR» ni terminología doctrinal ajena al pasaje.
