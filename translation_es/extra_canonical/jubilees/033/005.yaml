translation:
  language: es
  text: Y ella se avergonzó delante de él, y quitó su mano de encima de él, y él huyó. Y ella se lamentó por este asunto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ተኀፍረት
  english_pob_choice: was ashamed
  chosen_spanish: se avergonzó
  alternatives_spanish:
  - tuvo vergüenza
  - quedó avergonzada
  lexicon: vergüenza / avergonzarse
  rationale: El ge'ez expresa vergüenza o quedar avergonzada; en español, 'se avergonzó' conserva el sentido natural y directo sin introducir una causa no explicitada.
- source_word: እምኔሁ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: delante de / ante
  rationale: La revisión inglesa favorece la lectura espacial o de presencia, no causal. 'Delante de él' reproduce bien esa relación sin añadir 'por causa de él'.
- source_word: ኀደገት እዴሃ እምላዕሌሁ
  english_pob_choice: she removed her hand from upon him
  chosen_spanish: retiró su mano de sobre él
  alternatives_spanish:
  - quitó su mano de encima de él
  - apartó su mano de él
  lexicon: retirar / de sobre
  rationale: La construcción concreta 'de sobre él' conserva la imagen física del original y del inglés auditado, manteniendo la fuerza corporal de la acción.
- source_word: ጐየ
  english_pob_choice: he fled
  chosen_spanish: él huyó
  alternatives_spanish:
  - huyó
  - escapó
  lexicon: huir
  rationale: '''Huyó'' es la correspondencia directa y sobria para la acción de escapar rápidamente.'
- source_word: ትላሑ
  english_pob_choice: she lamented over this matter
  chosen_spanish: se lamentó por este asunto
  alternatives_spanish:
  - lloró por este asunto
  - se dolió de este asunto
  lexicon: lamentarse
  rationale: El verbo expresa duelo o lamento; 'por este asunto' sigue el ajuste revisado del inglés y evita intensificar indebidamente con 'mucho' u otro adverbio no atestiguado.
theological_decisions:
- issue: Causa de la vergüenza
  english_pob_reading: before him
  chosen_spanish_reading: delante de él
  alternative_spanish_readings:
  - por causa de él
  - a causa de él
  rationale: Se mantiene la lectura revisada del POB inglés, que evita atribuir una causalidad no segura al texto fuente. En español, 'delante de él' deja la vergüenza situada en presencia de la persona, sin forzar interpretación moral adicional.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: cambió de una lectura causal (''because of him'') a una de presencia (''before him''), sustituyó ''released'' por ''removed'', y eliminó el intensificador ''greatly''. La versión española refleja esos ajustes sin añadir intensificación ni causalidad implícita.'
  spanish_consistency_notes:
  - Se mantiene la referencia corporal 'mano de sobre él' para conservar el paralelismo con el original y con la traducción auditada.
  - Se usa 'se lamentó' en tono sobrio, sin adverbios añadidos.
  - No se introduce vocabulario eclesiástico técnico donde el pasaje narra una acción concreta y doméstica.
