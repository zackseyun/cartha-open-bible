lexical_decisions:
- source_word: ይስሐቅ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Itzjak
  lexicon: nombre propio
  rationale: El nombre propio bíblico se mantiene en la forma castellana estándar y transparente para lectores hispanos; la forma hebrea transliterada no aporta claridad adicional en este contexto.
- source_word: ብእሲቱ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su esposa
  lexicon: término relacional
  rationale: La relación conyugal se expresa con «esposa», que es clara y digna en español moderno. «Su mujer» sería posible, pero es menos específico y más ambiguo en registro.
- source_word: ሠርቁ ፡ ለወርኀ ፡ ፱
  english_pob_choice: on the new moon of the ninth month
  chosen_spanish: en la luna nueva del noveno mes
  alternatives_spanish:
  - en el novilunio del noveno mes
  - en el comienzo del noveno mes lunar
  lexicon: expresión calendárica
  rationale: Se conserva la referencia calendárica literal del ge'ez. «Luna nueva» comunica con naturalidad el valor de ሠርቁ; «novilunio» es más técnico, pero menos usual en español general.
- source_word: ሮቤን
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  - Rubén
  lexicon: nombre propio
  rationale: Se usa la forma bíblica habitual en español «Rubén», ampliamente reconocible y fiel al nombre tradicional castellano.
- source_word: ባላንን
  english_pob_choice: Bilhah
  chosen_spanish: Bilhá
  alternatives_spanish:
  - Bilhá
  - Bilha
  lexicon: nombre propio
  rationale: Se adapta el nombre a la forma bíblica castellana más cercana, con acento gráfico para reflejar la pronunciación común en español.
