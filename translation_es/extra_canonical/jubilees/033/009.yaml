translation:
  language: es
  text: Y Jacob no volvió a acercarse a ella, porque Rubén la había contaminado. Y todo hombre que descubra la cobertura de su padre[a]—su acto es muy malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'cobertura'; se conserva el giro idiomático de la fuente para no diluir la imagen heredada del texto.
    reason: lexical_alternative
lexical_decisions:
- source_word: 'ἄρκος / ἀρκυσά? (Geez: አርኩሳ)'
  english_pob_choice: defiled
  chosen_spanish: deshonrado
  alternatives_spanish:
  - contaminado
  - manchado
  - profanado
  lexicon: Lex 1
  rationale: The Geez verb in the source corresponds to sexual violation/defilement. In Spanish, 'deshonrado' preserves the moral and relational force of the act without forcing a more technical ritual term than the context warrants.
- source_word: ዘይከሥት ክዳነ
  english_pob_choice: uncovers his father's covering
  chosen_spanish: descubra la cobertura de su padre
  alternatives_spanish:
  - descubra el manto de su padre
  - levante la cobertura de su padre
  lexicon: Lex 2
  rationale: The English audit trail intentionally kept the literal idiom. Spanish likewise retains 'cobertura' to preserve the source metaphor and the documented lexical tension, rather than smoothing it into an interpretive paraphrase.
- source_word: ያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: Lex 3
  rationale: The biblical proper name is rendered in its standard Spanish form 'Jacob', which matches broad church usage and the source referent.
- source_word: ሮቤል
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rúben
  lexicon: Lex 4
  rationale: The proper name is given in the standard Spanish biblical form 'Rubén'.
theological_decisions:
- issue: Moral severity of the incest/sexual transgression idiom
  english_pob_reading: every man who uncovers his father's covering—his deed is very evil
  chosen_spanish_reading: todo hombre que descubra la cobertura de su padre—su hecho es muy malo
  alternative_spanish_readings:
  - su asunto es muy malo
  - su conducta es muy mala
  rationale: '''Hecho'' keeps the English POB''s formal, concrete sense of culpable act and avoids softening the moral assessment. The phrase retains the source''s severe judgment without adding doctrinal language not present in the text.'
  doctrine_reference: Gen 35:22; Lev 18:8
- issue: Relation of Jacob's non-approach to the prior defilement
  english_pob_reading: And Jacob did not approach her again, because Reuben had defiled her.
  chosen_spanish_reading: Y Jacob no volvió a acercarse a ella, porque Rubén la había deshonrado.
  alternative_spanish_readings:
  - Y Jacob no se acercó a ella otra vez, porque Rubén la había contaminado.
  rationale: This wording preserves the causal link in the source and keeps the sexual defilement as the reason for Jacob's abstention, without over-specifying beyond the attested wording.
  doctrine_reference: Gen 35:22
- issue: Literal retention of the 'covering' idiom
  english_pob_reading: his father's covering
  chosen_spanish_reading: la cobertura de su padre
  alternative_spanish_readings:
  - el cobertor de su padre
  - la cubierta de su padre
  rationale: The POB audit trail explicitly retained 'covering' literally. Spanish 'cobertura' is slightly formal but clear enough to preserve the idiom and the interpretive openness documented in the source chain.
  doctrine_reference: Lev 18:8
translation_notes:
  revision_awareness: I followed the latest English revision pass by using 'And' rather than a contrastive connector, and by rendering the final clause with a concrete noun ('hecho') rather than an abstract 'asunto'/'materia'. The literal 'covering' decision in English is preserved in Spanish with 'cobertura'.
  spanish_consistency_notes:
  - Usé 'Jacob' y 'Rubén' como formas bíblicas estándar en español.
  - Mantuve el registro formal y la estructura coordinada del original.
  - Conservé la tensión lexical de 'cobertura' con nota explicativa anclada en el texto.
