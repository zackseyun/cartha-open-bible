revisions:
- from: Y Jacob no volvió a acercarse a ella, porque Rubén la había deshonrado. Y todo hombre que descubra la cobertura de su padre[a]—su hecho es muy malo.
  to: Y Jacob no volvió a acercarse a ella, porque Rubén la había contaminado. Y todo hombre que descubra la cobertura de su padre[a]—su acto es muy malo.
  rationale: Se ajusta 'deshonrado' a 'contaminado' para reflejar mejor la fuerza sexual-moral de 'defiled' en la cadena de evidencia. Se cambia 'su hecho' por 'su acto' para un español más natural sin perder la concreción moral de 'deed'. Se corrige la redacción de la nota al pie.
