translation:
  language: es
  text: Y Jacob fue y acampó al sur de Migdal-edar. Y fue donde su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሖረ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - partió
  lexicon: verbo de movimiento narrativo
  rationale: El ge’ez expresa un movimiento narrativo simple; «fue» mantiene la secuencia breve y natural del texto sin añadir matices de viaje no explícitos.
- source_word: ወኀደረ
  english_pob_choice: camped
  chosen_spanish: acampó
  alternatives_spanish:
  - plantó su campamento
  - se estableció
  lexicon: verbo de asentamiento temporal
  rationale: «Acampó» reproduce de forma directa la acción de establecerse temporalmente en un lugar, con buen registro bíblico en español y sin sobrecargar la frase.
- source_word: መንገለ ደቡብ
  english_pob_choice: south of
  chosen_spanish: al sur de
  alternatives_spanish:
  - a la parte sur de
  - hacia el sur de
  lexicon: expresión direccional
  rationale: La revisión inglesa eliminó «to the south of» por ser torpe; en español «al sur de» expresa de modo natural la misma relación espacial.
- source_word: መግደላደራፋፍ
  english_pob_choice: Migdal-edar
  chosen_spanish: Migdal-edar
  alternatives_spanish:
  - Migdal Édar
  - Migdal-Édar
  lexicon: topónimo
  rationale: Se conserva el nombre propio transliterado, como en la tradición de estudio bíblico, porque el texto fuente lo presenta como topónimo identificable.
- source_word: ኀበ አቡሁ
  english_pob_choice: he went to his father
  chosen_spanish: fue a su padre
  alternatives_spanish:
  - se fue con su padre
  - fue donde estaba su padre
  lexicon: frase de dirección/encuentro
  rationale: El ge’ez es breve y literalmente direccional; «fue a su padre» conserva esa concisión. En español, añadir «a casa de» o «donde estaba» iría más allá del dato explícito.
theological_decisions:
- issue: Relación espacial y narrativa sin sobreinterpretación
  english_pob_reading: And Jacob went and camped south of Migdal-edar. And he went to his father.
  chosen_spanish_reading: Y Jacob fue y acampó al sur de Migdal-edar. Y fue a su padre.
  alternative_spanish_readings:
  - Y Jacob partió y acampó al sur de Migdal-edar. Y fue a su padre.
  - Y Jacob fue y acampó al sur de Migdal-edar, y se fue a su padre.
  rationale: No hay carga doctrinal añadida en el versículo; la decisión principal es preservar la secuencia narrativa y la relación espacial sin ampliar quién es el padre ni el motivo de la visita.
  doctrine_reference: No aplica; versículo narrativo sin afirmación doctrinal explícita.
translation_notes:
  revision_awareness: El inglés POB recibió una revisión menor que sustituyó «to the south of» por «south of» por naturalidad estilística y añadió puntuación final; la versión española sigue ese mismo ajuste natural con «al sur de» y puntuación completa, sin cambio de sentido.
  spanish_consistency_notes:
  - Se mantiene «Jacob» como forma estándar del nombre propio bíblico en español.
  - Se conserva «Migdal-edar» transliterado de manera uniforme para evitar introducir una traducción interpretativa del topónimo.
  - El paralelismo narrativo con dos oraciones breves se conserva para reflejar la simplicidad del original.
