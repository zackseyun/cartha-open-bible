translation:
  language: es
  text: 'Su obra es muy mala, porque es abominable delante de Yahvé. Por eso está escrito y ordenado en las tablas celestiales que un hombre no se acueste con la esposa de su padre y no descubra la cobertura de su padre[a], porque es impuro. Ciertamente deben morir juntos: el hombre que se acueste con la esposa de su padre y también la mujer, porque han cometido una obra impura sobre la tierra. Y no haya impureza delante de nuestro Dios entre el pueblo que él ha escogido para sí como reino. Y de nuevo está escrito por segunda vez: «Maldito sea el que se acueste con la esposa de su padre, porque ha descubierto la vergüenza de su padre[b]». Y digan todos los santos de Yahvé: «Así sea, así sea». Y tú, Moisés, manda a los hijos de Israel que guarden esta palabra, porque es una sentencia de muerte, y es impura, y no hay expiación para siempre para expiar al hombre que ha hecho esto, sino ponerlo a muerte, matarlo y apedrearlo, y arrancarlo de en medio del pueblo de nuestro Dios. Porque no permanecerá
    vivo ni un solo día sobre la tierra ningún hombre que haga esto en Israel, pues es abominable e impuro. Y no digan: «Rubén quedó con vida y se le concedió perdón después de acostarse con la concubina de su padre, y también ella, aunque tenía marido, y aunque Jacob su padre aún vivía». Porque hasta entonces la ordenanza, el juicio y la ley no habían sido revelados plenamente para todos; pero en tus días es como la ley de los tiempos y de los días, y como una ley eterna para las generaciones eternas. Y para esta ley no hay término de días, ni perdón para ella, sino que ambos sean arrancados de en medio del pueblo; el día en que lo hicieron, los matarán. Y tú, Moisés, escríbelo para Israel, para que lo guarden y no obren según este asunto y no pequen con un pecado de muerte, porque el Juez, Yahvé nuestro Dios, es uno que no hace acepción de personas y no acepta soborno. Y diles esta palabra de la ordenanza, para que oigan y estén alerta y se vigilen a sí mismos, y no sean destruidos ni
    arrancados de la tierra. Porque todos los que lo hacen sobre la tierra son impuros, contaminados, mancillados y corrompidos delante de nuestro Dios. Y no hay pecado mayor que la inmundicia sexual que cometen sobre la tierra, porque Israel es un pueblo santo para Yahvé su Dios, y un pueblo de herencia, y un pueblo sacerdotal, y un pueblo del reino, y un pueblo plantado; y no debe verse tal impureza en medio del pueblo santo. Y en el tercer año de esta semana Jacob y todos sus hijos fueron y habitaron en la casa de Abraham, cerca de Isaac su padre y Rebeca su madre. Y estos son los nombres de los hijos de Jacob: el primogénito, Rubén; y Simeón; y Leví; y Judá; y Isacar; y Zabulón, los hijos de Lea; y los hijos de Raquel, José y Benjamín; y los hijos de Bilhá, Dan y Neftalí; y los hijos de Zilpa, Gad y Aser; y Dina, la única hija de Lea, la hija de Jacob. Y fueron y se inclinaron ante Isaac y Rebeca, y cuando los vieron bendijeron a Jacob y a todos sus hijos. E Isaac se alegró mucho porque
    vio a los hijos de Jacob su hijo menor, y los bendijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la falda de su padre». El ge'ez usa aquí un término distinto del de la cita posterior y probablemente refleja la imagen jurídica de la «cobertura» del padre, por lo que no se traduce como «vergüenza».
    reason: lexical_alternative
  - marker: b
    text: Aquí el ge'ez usa un término diferente del de la cláusula anterior; por eso se traduce «vergüenza» y no «cobertura».
    reason: lexical_alternative
lexical_decisions:
- source_word: እኩይ ፡ ነገሩ ፡ ጥቀ
  english_pob_choice: His deed is very evil
  chosen_spanish: Su obra es muy mala
  alternatives_spanish:
  - Su hecho es muy malo
  - Su acción es muy mala
  lexicon: source phrase / no lexicon number
  rationale: Se conserva la valoración fuerte del ge'ez al inicio del versículo. 'Obra' mantiene un registro más amplio y bíblico que 'acción', y 'muy mala' reproduce 'very evil' sin suavizar la censura.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: source phrase / no lexicon number
  rationale: La norma del proyecto pide Yahvé para el nombre divino en el texto principal; aquí el contexto es una afirmación legal/cultual delante de Dios, no una cita indirecta que requiera máscara.
- source_word: ኪዳነተ
  english_pob_choice: his father’s skirt
  chosen_spanish: la desnudez de su padre
  alternatives_spanish:
  - el manto de su padre
  - la cobertura de su padre
  lexicon: source phrase / no lexicon number
  rationale: En este versículo el paralelismo legal exige una expresión sexual de prohibición; 'desnudez' preserva el eco de Levítico y permite distinguirlo de 'vergüenza' en la frase siguiente, donde el ge'ez usa otro término. La tradición española entiende mejor esta línea que 'falda' o 'falda/manto' en una formulación moderna y digna.
- source_word: ኀፍረተ
  english_pob_choice: his father’s shame
  chosen_spanish: la vergüenza de su padre
  alternatives_spanish:
  - la desnudez de su padre
  - el deshonor de su padre
  lexicon: source phrase / no lexicon number
  rationale: 'Aquí se mantiene la distinción léxica señalada por la revisión: ''vergüenza'' refleja la ofensa pública y familiar, distinta de ''desnudez'' en la primera cláusula.'
- source_word: ኪዳነተ / ኀፍረተ
  english_pob_choice: uncover
  chosen_spanish: descubrir
  alternatives_spanish:
  - desnudar
  - poner al descubierto
  lexicon: source phrase / no lexicon number
  rationale: '''Descubrir'' conserva el idioma bíblico-jurídico tradicional para la fórmula sexual, sin volverla más explícita de lo que permite el original.'
- source_word: ርኩስ / ርኵስ
  english_pob_choice: unclean
  chosen_spanish: impuro
