  text: 'አቡሁ ፡ እኩይ ፡ ነገሩ ፡ ጥቀ ፡ እስመ ፡ ምኑን ፡ ውእቱ ፡ በቅድመ ፡ እግዚአብሔር ። በእንተዝ ፡

