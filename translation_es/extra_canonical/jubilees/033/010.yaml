    ወይሳኮር፤ ወዛብሎን፡ ውሉዳ፡ ለልያ፤ ወውሉዳ፡ ለራሔል፡ ዮሴፍ፡ ወብንያም፤ ወውሉደ፡ ባላን፡

    ዳን፡ ወንፍታሌም፤ ወውሉደ፡ ዛላፋን፡ ጋድ፡ ወአሴር፤ ወዲና፡ ወለተ፡ ልያ፡ ባሕቲታ፡ ወለተ፡

