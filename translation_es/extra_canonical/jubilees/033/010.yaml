    ወኢይኩን፡ ርኵስ፡ ቅድመ፡ አምላክ፡ በውስተ፡ ሕዝብ፡ ዘንረየ፡ ሎቱ፡ ለምልክና፡። ወካዕበ፡

    ጽሑፍ፡ ዳግመ፡ ርጉመ፡ ለይኩን፡ ዘይስክብ፡ ምስለ፡ ብእሲተ፡ አቡሁ፡ እስመ፡ ከሠተ፡ ኀፍረተ፡

    አቡሁ፡ ወይቤሉ፡ ኵሎሙ፡ ቅዱሳኒሁ፡ ለእግዚአብሔር፡ ለይኩን፡ ለይኩን። ወአንተኒ፡ ሙሴ፡

