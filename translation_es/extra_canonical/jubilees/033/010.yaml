  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del ge''ez y del rastro auditado en inglés, incluyendo la adición inicial «Su obra es muy mala» y la distinción posterior entre «vergüenza» y la primera expresión de descubrimiento. Sin embargo, el punto léxico principal no está alineado con la revisión inglesa documentada: ኪዳነተ fue auditado como «his father’s skirt/covering», no como «desnudez». La nota intenta justificar el cambio, pero el proyecto pide preservar la distinción léxica del original en el texto principal, no desplazarla a nota. También conviene suavizar una construcción poco natural («no hagan conforme a este asunto») y mejorar «se ha escogido» a una forma más idiomática.'
  spanish_quality_summary: 'El español es mayormente claro, digno y legible. Hay algunas formulaciones algo rígidas o poco naturales: «él se ha escogido para sí» suena forzado; «no hagan conforme a este asunto» es calco; «a ellos se los matará» puede mejorarse. El resto mantiene buen registro jurídico-religioso. Las notas están bien formadas, pero la nota [a] hoy compensa una decisión principal que debería corregirse en el texto.'
  glossary_alignment: 'Buen alineamiento con las normas del proyecto en «Yahvé», «Dios», y el registro jurídico-cultual. La principal desviación glosarial/lexical es ኪዳነተ: el texto español usa «desnudez», mientras el expediente auditado exige reflejar la diferencia con ኀፍረተ, preferiblemente «cobertura» o equivalente. «Vergüenza» para ኀፍረተ sí preserva la distinción requerida.'
  issues:
  - severity: high
    issue: La primera cláusula sexual traduce ኪዳነተ como «la desnudez de su padre».
    rationale: La auditoría inglesa documentó que el ge'ez distingue ኪዳነተ («skirt/covering») de ኀፍረተ («shame»). El español actual borra esa distinción en el texto principal y la relega a nota, contrariando la revisión aplicada.
  - severity: medium
    issue: «el pueblo que él se ha escogido para sí como reino» suena poco idiomático.
    rationale: En español natural y digno, «ha escogido para sí» o «ha elegido para sí» es mejor. El sentido fuente no cambia.
  - severity: medium
    issue: «no hagan conforme a este asunto» es un calco rígido.
    rationale: «no obren según este asunto» o «no actúen de acuerdo con esto» comunica mejor el valor normativo sin perder fidelidad.
  - severity: low
    issue: «a ellos se los matará» es pesado.
    rationale: «los matarán» o «se les dará muerte» mantiene el sentido con mejor fluidez.
