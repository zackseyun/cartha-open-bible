revisions:
- from: 'Su obra es muy mala, porque es abominable delante de Yahvé. Por eso está escrito y ordenado en las tablas celestiales que un hombre no se acueste con la esposa de su padre y no descubra la desnudez de su padre[a], porque es impuro. Ciertamente deben morir juntos: el hombre que se acueste con la esposa de su padre y también la mujer, porque han cometido una obra impura sobre la tierra. Y no haya impureza delante de nuestro Dios entre el pueblo que él se ha escogido para sí como reino. Y de nuevo está escrito por segunda vez: “Maldito sea el que se acueste con la esposa de su padre, porque ha descubierto la vergüenza de su padre[b]”. Y digan todos los santos de Yahvé: “Así sea, así sea”. Y tú, Moisés, manda a los hijos de Israel que guarden esta palabra, porque es una sentencia de muerte, y es impura, y no hay expiación para siempre para expiar al hombre que ha hecho esto, sino ponerlo a muerte, matarlo y apedrearlo, y arrancarlo de en medio del pueblo de nuestro Dios. Porque no permanecerá
    vivo ni un solo día sobre la tierra ningún hombre que haga esto en Israel, pues es abominable e impuro. Y no digan: “Rubén quedó con vida y se le concedió perdón después de acostarse con la concubina de su padre, y también ella, aunque tenía marido, y aunque Jacob su padre aún vivía”. Porque hasta entonces la ordenanza, el juicio y la ley no habían sido revelados plenamente para todos; pero en tus días es como la ley de los tiempos y de los días, y como una ley eterna para las generaciones eternas. Y para esta ley no hay término de días, ni perdón para ella, sino que ambos sean arrancados de en medio del pueblo; el día en que lo hicieron, a ellos se los matará. Y tú, Moisés, escríbelo para Israel, para que lo guarden y no hagan conforme a este asunto y no pequen con un pecado de muerte, porque el Juez, Yahvé nuestro Dios, es uno que no hace acepción de personas y no acepta soborno. Y diles esta palabra de la ordenanza, para que oigan y estén alerta y se vigilen a sí mismos, y no sean
    destruidos ni arrancados de la tierra. Porque todos los que lo hacen sobre la tierra son impuros, contaminados, mancillados y corrompidos delante de nuestro Dios. Y no hay pecado mayor que la inmundicia sexual que cometen sobre la tierra, porque Israel es un pueblo santo para Yahvé su Dios, y un pueblo de herencia, y un pueblo sacerdotal, y un pueblo del reino, y un pueblo plantado; y no debe verse tal impureza en medio del pueblo santo. Y en el tercer año de esta semana Jacob y todos sus hijos fueron y habitaron en la casa de Abraham, cerca de Isaac su padre y Rebeca su madre. Y estos son los nombres de los hijos de Jacob: el primogénito, Rubén; y Simeón; y Leví; y Judá; y Isacar; y Zabulón, los hijos de Lea; y los hijos de Raquel, José y Benjamín; y los hijos de Bilhá, Dan y Neftalí; y los hijos de Zilpa, Gad y Aser; y Dina, la única hija de Lea, la hija de Jacob. Y fueron y se inclinaron ante Isaac y Rebeca, y cuando los vieron bendijeron a Jacob y a todos sus hijos. E Isaac se alegró
    mucho porque vio a los hijos de Jacob su hijo menor, y los bendijo.'
