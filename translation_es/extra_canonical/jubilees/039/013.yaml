  yaml_path: translation/extra_canonical/jubilees/039/013.yaml
  text: And he remained there two years. And in those days Pharaoh king of Egypt was angry with his two eunuchs, with the chief cupbearer and with the chief baker, and he put them into prison.
  revision_pass:
    model: gpt-5.4
