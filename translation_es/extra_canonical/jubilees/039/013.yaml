    unchanged: false
    changes_summary: Completed the final clause by supplying the implied destination, 'prison,' which is required by the source context and removes the incomplete ending. No other changes needed.
translation:
  language: es
  text: Y permaneció allí dos años. Y en aquellos días el faraón, rey de Egipto, se enojó contra sus dos eunucos, contra el jefe de los coperos y contra el jefe de los panaderos, y los puso en prisión.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ነበረ ህየ ካልአ ዓመተ
  english_pob_choice: And he remained there two years.
  chosen_spanish: Y permaneció allí dos años.
  alternatives_spanish:
  - Y estuvo allí dos años.
  - Y se quedó allí dos años.
  lexicon: remaining / remain; duration expression
  rationale: El ge'ez expresa permanencia durante un período; 'permaneció' conserva el sentido de continuidad sin añadir matices no presentes. 'Allí' reproduce el referente locativo implícito del contexto.
- source_word: ፈርዖን ንጉሠ ግብጽ
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: el faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, rey de Egipto
  - el faraón, rey de Egipto
  lexicon: Pharaoh / king of Egypt
  rationale: Se conserva el título propio 'faraón' y el complemento explicativo 'rey de Egipto' para reflejar el patrón nominal del original y del audit trail inglés.
- source_word: ተምዐዐ
  english_pob_choice: was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se airó
  - se indignó
  lexicon: be angry / become angry
  rationale: El verbo ge'ez indica enojo o ira; 'se enojó' es natural en español y fiel al cambio de estado emocional sin intensificarlo indebidamente.
- source_word: ክልኤቱ ሕፁዋኒሁ
  english_pob_choice: his two eunuchs
  chosen_spanish: sus dos eunucos
  alternatives_spanish:
  - sus dos funcionarios
  - sus dos servidores de la corte
  lexicon: eunuchs
  rationale: Se mantiene 'eunucos' porque el término es específico y está atestiguado en el texto fuente; no se sustituye por un eufemismo sin base textual.
- source_word: ሊቀ መዛርት
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el copero principal
  - el jefe de los mayordomos de bebida
  lexicon: chief cupbearer
  rationale: '''Jefe de los coperos'' conserva el título funcional con un español claro y digno; evita una paráfrasis excesiva y mantiene la jerarquía implícita.'
- source_word: ሊቀ ሐበዝት
  english_pob_choice: the chief baker
  chosen_spanish: el jefe de los panaderos
  alternatives_spanish:
  - el panadero principal
  - el jefe de los pasteleros
  lexicon: chief baker
  rationale: '''Panaderos'' traduce el oficio de forma directa y comprensible. ''Jefe de los panaderos'' respeta la estructura titular del original y del inglés auditado.'
- source_word: ወወደዮሙ ውስተ
  english_pob_choice: and he put them into prison
  chosen_spanish: y los puso en prisión
  alternatives_spanish:
  - y los encarceló
  - y los metió en la cárcel
  lexicon: put into prison
  rationale: El audit trail inglés completa la cláusula con 'prison'. 'Puso en prisión' mantiene esa completación sin añadir un término más moderno o más coloquial que altere el registro.
theological_decisions:
- issue: Tratamiento de los eunucos en un contexto narrativo cortesano
  english_pob_reading: his two eunuchs
  chosen_spanish_reading: sus dos eunucos
  alternative_spanish_readings:
  - sus dos funcionarios
  - sus dos servidores
  rationale: Se conserva el término específico del original y del inglés POB porque el pasaje depende de la terminología cortesana concreta; suavizarlo borraría una distinción histórica del relato.
  doctrine_reference: Fidelidad histórica y lexical en narrativa bíblica
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para completar la cláusula final con 'prison'. La versión española incorpora directamente esa resolución y mantiene sin cambios el resto del contenido semántico relevante.
  spanish_consistency_notes:
  - Se mantiene 'faraón' en minúscula como título común en español cuando no abre la frase.
  - '''coperos'' y ''panaderos'' conservan el paralelismo titular de ''chief cupbearer'' y ''chief baker''.'
  - No se introduce puntuación interpretativa adicional ni se amplía el contexto más allá de la unidad versicular.
