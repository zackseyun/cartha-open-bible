translation:
  language: es
  text: Levanté mi voz, y él corrió y dejó su vestidura en mi mano cuando yo lo sujeté, y rompió la puerta.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: አልዐልኩ፡ ቃለየ፡
  english_pob_choice: I raised my voice
  chosen_spanish: Levanté mi voz
  alternatives_spanish:
  - Alcé mi voz
  - Elevé mi voz
  lexicon: Ge'ez አልዐልኩ = ‘I lifted/raised’; ቃለየ = ‘my voice’
  rationale: Conserva la imagen directa de alzar la voz, con español natural y digno. ‘Levanté mi voz’ mantiene la fuerza idiomática sin volverla interpretativa.
- source_word: ጐየ፡
  english_pob_choice: he ran
  chosen_spanish: corrió
  alternatives_spanish:
  - huyó
  - salió corriendo
  lexicon: Ge'ez ጐየ = ‘ran’
  rationale: ‘Corrió’ sigue de cerca el verbo del original y armoniza con el relato de escape repentino. ‘Huyó’ añade una lectura de fuga que el verbo por sí solo no exige.
- source_word: ወኀደገ፡ ልብሶ፡
  english_pob_choice: left his garment
  chosen_spanish: dejó su vestido
  alternatives_spanish:
  - dejó su ropa
  - soltó su manto
  lexicon: Ge'ez ኀደገ = ‘left/abandoned’; ልብስ = ‘garment, clothing’
  rationale: ‘Vestido’ conserva el sentido amplio de prenda/vestidura en español bíblico sin especificar más de lo que el texto da. ‘Manto’ sería demasiado específico; ‘ropa’ es más general pero menos cercano al singular del original.
- source_word: ውስተ፡ እዴየ፡
  english_pob_choice: in my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi mano
  - dentro de mi mano
  lexicon: Ge'ez ውስተ = ‘in’; እዴየ = ‘my hand’
  rationale: Traducción directa y transparente; no requiere nota adicional porque el sentido físico es claro en español.
- source_word: በጊዜ፡ አንተ፡ አኀዝክዎ፡
  english_pob_choice: when I seized him
  chosen_spanish: cuando yo lo sujeté
  alternatives_spanish:
  - cuando lo agarré
  - cuando lo tomé
  lexicon: Ge'ez አኀዝክዎ = ‘I seized him/held him’
  rationale: ‘Sujeté’ comunica la acción de aferrar o retener sin sonar excesivamente violento en español; preserva la tensión narrativa de ‘seized’. 'Lo agarré' sería más coloquial; 'lo tomé' sería ambiguo.
- source_word: ሰበረ፡ ማዕጾ
  english_pob_choice: he broke the door
  chosen_spanish: rompió la puerta
  alternatives_spanish:
  - quebró la puerta
  - forzó la puerta
  lexicon: Ge'ez ሰበረ = ‘broke’; ማዕጾ = ‘door’
  rationale: Se sigue la revisión inglesa más reciente que prefirió ‘door’ sobre ‘door-bar’. ‘Rompió la puerta’ refleja el verbo con naturalidad; ‘forzó’ introduciría una interpretación no obligada por el Ge'ez.
theological_decisions:
- issue: Naturaleza del objeto roto
  english_pob_reading: he broke the door
  chosen_spanish_reading: rompió la puerta
  alternative_spanish_readings:
  - rompió la tranca
  - rompió el cerrojo
  - rompió el batiente
  rationale: La evidencia auditada favorece ‘door’ como sentido principal de ማዕጾ, no un ‘door-bar’. Por eso se evita una palabra más técnica o tradicional que estreche indebidamente el referente.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada en dos puntos relevantes: añadió la coordinación ‘and’ tras ‘voice’ para mayor naturalidad, y luego ajustó ‘door-bar’ a ‘door’ por acuerdo con el ge''ez. La traducción española sigue esas decisiones y evita sobreespecificar el objeto roto.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se usa español bíblico claro pero no arcaizante, conservando la secuencia narrativa y la tensión física del episodio.
  - El pronombre de objeto directo ‘lo’ preserva la referencia masculina singular del original.
