base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/039/017.yaml
  text: 'And as he interpreted for them, so it happened to them: Pharaoh restored the chief cupbearer to his service, but the baker he killed, just as Joseph had interpreted for them. But the chief cupbearer forgot Joseph in the prison-house, although he had told him what would happen[a], and he did not remember to make it known to Pharaoh what Joseph had told him, for he forgot.[39:17]'
  footnotes:
  - marker: '39:17'
    text: The final sentence is awkward in the transmitted Ethiopic. The sense appears to be that the chief cupbearer forgot Joseph and did not report Joseph’s interpretation to Pharaoh, despite knowing its truth.
    reason: textual_variant
  - marker: a
    text: Or 'though he knew what would happen'.
    reason: previous_rendering
  - marker: b
    text: 'Or ''And as he interpreted for them[39:17], so it happened to them: Pharaoh restored the chief cupbearer to his service, but the baker he killed, just as Joseph had interpreted for them. But the chief cupbearer forgot Joseph in the prison-house, although he had told him what would happen, and he did not remember to make it known to Pharaoh what Joseph had told him, for he forgot.''.'
    reason: previous_rendering
