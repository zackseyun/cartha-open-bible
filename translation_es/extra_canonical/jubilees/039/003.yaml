translation:
  language: es
  text: En la casa del egipcio, por causa de José. Y todo lo que él hacía, Yahvé lo hacía prosperar. Y el egipcio dejó todo en manos de José, porque vio que Yahvé estaba con él, y todo lo que él hacía, Yahvé lo hacía prosperar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: house of the Egyptian
  english_pob_choice: in the house of the Egyptian
  chosen_spanish: en la casa del egipcio
  alternatives_spanish:
  - en casa del egipcio
  - en la casa del egipcio
  lexicon: בית / οἶκος
  rationale: La construcción abre una frase locativa simple; en español, «en la casa del egipcio» conserva el sentido literal y la claridad narrativa sin añadir elementos interpretativos.
- source_word: because of Joseph
  english_pob_choice: because of Joseph
  chosen_spanish: por causa de José
  alternatives_spanish:
  - a causa de José
  - por José
  lexicon: בעבור / διὰ
  rationale: «Por causa de José» reproduce la relación causal explícita del texto y evita suavizarla a una simple coordinación narrativa.
- source_word: the LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: יהוה
  rationale: La norma del proyecto pide traducir el nombre divino como «Yahvé»; aquí se conserva también en la cláusula repetida de prosperidad para mantener coherencia terminológica.
- source_word: made to prosper
  english_pob_choice: made to prosper
  chosen_spanish: lo hacía prosperar
  alternatives_spanish:
  - le daba prosperidad
  - hacía prosperar todo lo que hacía
  lexicon: צלח / prosper
  rationale: 'La formulación española mantiene el valor causativo del verbo: no solo prosperó, sino que Yahvé causaba su prosperidad en lo que hacía.'
- source_word: everything that he did
  english_pob_choice: everything that he did
  chosen_spanish: todo lo que él hacía
  alternatives_spanish:
  - todo cuanto hacía
  - todo lo que hacía
  lexicon: כל אשר עשה
  rationale: Se conserva el alcance totalizador del original con una expresión natural en español. El pronombre explícito «él» ayuda a la claridad referencial.
- source_word: left everything in Joseph’s hand
  english_pob_choice: left everything in Joseph’s hand
  chosen_spanish: dejó todo en mano de José
  alternatives_spanish:
  - dejó todo en las manos de José
  - puso todo en manos de José
  lexicon: נתן בידי / ἐν χειρί
  rationale: «En mano de José» mantiene una imagen bíblica compacta y fiel; en español moderno resulta más fluida que una literalidad rígida con artículo plural.
- source_word: the LORD was with him
  english_pob_choice: the LORD was with him
  chosen_spanish: Yahvé estaba con él
  alternatives_spanish:
  - Yahvé era con él
  - el SEÑOR estaba con él
  lexicon: יהוה עמו
  rationale: Se conserva la fórmula relacional directa y bíblica con el nombre divino explícito, coherente con el resto del versículo.
theological_decisions:
- issue: Repetición del motivo de prosperidad
  english_pob_reading: the LORD made to prosper ... and everything that he did the LORD made to prosper
  chosen_spanish_reading: Yahvé lo hacía prosperar ... y todo lo que él hacía, Yahvé lo hacía prosperar
  alternative_spanish_readings:
  - Yahvé lo hacía prosperar ... y todo lo que hacía le prosperaba
  - Yahvé le daba éxito en todo lo que hacía
  rationale: La repetición está en el testimonio textual y funciona retóricamente para subrayar la acción divina. Se mantiene en español sin comprimirla, para no borrar el énfasis narrativo.
  doctrine_reference: Providencia divina; bendición de Yahvé en favor de José
translation_notes:
  revision_awareness: La versión inglesa revisada restauró la frase inicial «in the house of the Egyptian because of Joseph» y mantuvo la repetición final de prosperidad. La traducción española conserva ambas, sin seguir la formulación inglesa previa que podía confundir la sintaxis, y evita introducir una nota crítica no anclada en el texto final.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se mantiene el tono narrativo bíblico sin arcaísmos innecesarios.
  - No se añadieron notas al pie porque no había una alternativa textual que requiriera anclaje explícito en este verso.
