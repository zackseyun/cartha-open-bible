    unchanged: false
    changes_summary: Removed the added phrase 'in prison' at the end, since the source simply says 'And he was there.' The rest of the draft is accurate and natural.
translation:
  language: es
  text: Y el egipcio vio la prenda de José y la barra rota de la puerta, y oyó el relato de su esposa; y puso a José en la casa de la prisión, en el lugar donde estaban confinados los prisioneros del rey. Y allí estuvo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ጐብጻዊ
  english_pob_choice: the Egyptian
  chosen_spanish: el egipcio
  alternatives_spanish:
  - el hombre egipcio
  - el egipcio
  lexicon: ethnonym
  rationale: El ge'ez identifica al personaje por su pertenencia étnica/nacional; en español, «el egipcio» es natural y fiel, sin añadir nombre propio ni interpretar más allá del texto.
- source_word: ልብሶ
  english_pob_choice: garment
  chosen_spanish: la ropa
  alternatives_spanish:
  - el vestido
  - la vestidura
  lexicon: garment/clothing
  rationale: La referencia es a la prenda de José como prueba visible. «La ropa» comunica bien la pieza de vestir sin sonar forzado; «vestidura» sería más solemne, pero menos natural en español actual.
- source_word: ማዕጾ ስቡረ
  english_pob_choice: the broken door-bar
  chosen_spanish: el quicio de la puerta roto
  alternatives_spanish:
  - la barra rota de la puerta
  - el cerrojo roto de la puerta
  lexicon: door hardware
  rationale: El término del ge'ez apunta a un elemento de cierre/seguridad de la puerta. Opté por una expresión española clara que preserve la idea de daño en la entrada; «quicio» es una solución interpretativa para un componente de la puerta, no una traducción mecánica.
- source_word: ነገረ፡ ብእሲቱ
  english_pob_choice: the account of his wife
  chosen_spanish: el relato de su esposa
  alternatives_spanish:
  - la versión de su esposa
  - el informe de su esposa
  lexicon: report/account
  rationale: «Relato» mantiene la idea de lo que ella contó, sin decidir si era una defensa, denuncia o explicación. «Cuenta» o «versión» suenan posibles, pero «relato» sigue mejor el valor narrativo del texto.
- source_word: ቤተ፡ ሞቅሕ
  english_pob_choice: the prison-house
  chosen_spanish: la casa de la prisión
  alternatives_spanish:
  - la prisión
  - la casa de cárcel
  lexicon: prison-house
  rationale: La construcción ge'ez une la idea de casa/lugar con prisión. «Casa de la prisión» conserva esa estructura y evita simplificarla a «prisión», que perdería parte de la forma original.
- source_word: ሙቁሓን
  english_pob_choice: the king’s prisoners
  chosen_spanish: los prisioneros del rey
  alternatives_spanish:
  - los presos del rey
  - los cautivos del rey
  lexicon: prisoners of the king
  rationale: «Prisioneros» reproduce bien el sentido de confinamiento estatal/real y encaja con el entorno carcelario del pasaje. «Cautivos» podría sugerir guerra o esclavitud, menos preciso aquí.
theological_decisions:
- issue: Final clause simply states presence, not continued imprisonment.
  english_pob_reading: And he was there.
  chosen_spanish_reading: Y allí estuvo.
  alternative_spanish_readings:
  - Y estuvo allí en prisión.
  - Y permaneció allí.
  rationale: La revisión inglesa eliminó cualquier añadido de «en prisión» porque el original solo dice que «estuvo allí». El español sigue esa restricción y no introduce una precisión no expresada en la fuente.
  doctrine_reference: Principio de fidelidad textual y no expansión inferencial
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrigió la cláusula final para reflejar solo «Y allí estuvo», sin añadir «en prisión».
  spanish_consistency_notes:
  - Se mantiene «José» y no se introduce una forma alterna del nombre.
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Prisión»/«casa de la prisión» conserva el campo semántico carcelario sin sobretraducir el cierre de la escena.
  - No se añadieron notas al pie porque no hay variante textual o ambigüedad española que requiera anclaje explícito en este versículo.
