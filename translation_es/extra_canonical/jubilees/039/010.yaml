review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del ge''ez y del POB inglés: el egipcio ve la prenda de José, ve el elemento de cierre de la puerta roto, oye el relato de su esposa, encarcela a José en el lugar donde están los prisioneros del rey, y la cláusula final se limita correctamente a «Y allí estuvo». Sin embargo, «quicio de la puerta» no corresponde al sentido de ‘door-bar/cerrojo/tranca’, sino a la parte de la bisagra o marco, y por tanto no preserva fielmente la evidencia fuente ni la decisión inglesa auditada.'
  spanish_quality_summary: El español es en general claro y digno. No obstante, «el quicio de la puerta roto» suena semánticamente inexacto y algo extraño en contexto narrativo. «La ropa de José» es comprensible, pero «la prenda de José» o «la vestidura de José» se ajustan mejor al singular del inglés auditado; aun así, no es un error grave. «La casa de la prisión» es literal pero algo tieso; «la casa de prisión» o simplemente «la prisión» serían más naturales, aunque la forma actual sigue siendo entendible.
  glossary_alignment: 'No hay términos teológicos sensibles del glosario principal en este versículo. La revisión necesaria es léxica: el componente de la puerta debe reflejar barra/tranca/cerrojo, no quicio. El resto de las elecciones está básicamente alineado con el POB y con un español eclesial legible.'
  issues:
  - severity: high
    issue: «quicio de la puerta roto» traduce incorrectamente el elemento dañado de la puerta.
    rationale: La fuente y el POB inglés indican ‘broken door-bar’, es decir, una barra, tranca o cerrojo de cierre. «Quicio» en español refiere al gozne/eje o parte del marco donde gira la puerta, no al mecanismo de cierre. Esto altera el detalle narrativo de la evidencia física.
  - severity: low
    issue: «la ropa de José» podría afinarse a singular.
    rationale: El POB inglés tiene ‘garment’ en singular. «La ropa» puede funcionar colectivamente, pero «la prenda» o «la vestidura» preservan mejor el singular sin perder naturalidad. No es indispensable para la comprensión, pero mejora la precisión.
  revised_spanish_text: Y el egipcio vio la prenda de José y la barra rota de la puerta, y oyó el relato de su esposa; y puso a José en la casa de la prisión, en el lugar donde estaban confinados los prisioneros del rey. Y allí estuvo.
  revision_rationale: Se corrige el elemento de la puerta para reflejar fielmente el sentido de ‘door-bar’ en la fuente y en el POB inglés. También se ajusta «ropa» a «prenda» para corresponder mejor al singular auditado. No se requieren notas, porque la revisión elimina la ambigüedad principal sin crear otra nueva.
