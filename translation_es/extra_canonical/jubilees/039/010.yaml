revisions:
- from: Y el egipcio vio la ropa de José y el quicio de la puerta roto, y oyó el relato de su esposa; y puso a José en la casa de la prisión, en el lugar donde estaban confinados los prisioneros del rey. Y allí estuvo.
  to: Y el egipcio vio la prenda de José y la barra rota de la puerta, y oyó el relato de su esposa; y puso a José en la casa de la prisión, en el lugar donde estaban confinados los prisioneros del rey. Y allí estuvo.
  rationale: Se corrige el elemento de la puerta para reflejar fielmente el sentido de ‘door-bar’ en la fuente y en el POB inglés. También se ajusta «ropa» a «prenda» para corresponder mejor al singular auditado. No se requieren notas, porque la revisión elimina la ambigüedad principal sin crear otra nueva.
