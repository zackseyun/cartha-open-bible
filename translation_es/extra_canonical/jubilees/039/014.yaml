translation:
  language: es
  text: la cárcel, a la casa del jefe de los guardias, en la cárcel donde estaba preso José.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሞቅሕ / prison
  english_pob_choice: the prison
  chosen_spanish: la cárcel
  alternatives_spanish:
  - la prisión
  - el calabozo
  lexicon: cárcel
  rationale: El texto fuente repite la idea de 'prisión/cárcel' al inicio y al final; 'cárcel' es natural en español y mantiene el valor locativo sin volverlo más técnico de lo que exige el contexto.
- source_word: ቤቱ ለሊቀ ዐቀብተ / house of the chief of the keepers
  english_pob_choice: house of the chief of the keepers
  chosen_spanish: a la casa del jefe de los guardias
  alternatives_spanish:
  - a la casa del principal de los custodios
  - a la casa del jefe de los carceleros
  lexicon: casa; jefe; guardias
  rationale: '''Chief of the keepers'' describe al responsable de los custodios de la prisión; ''jefe de los guardias'' comunica bien la función en español sin introducir una equivalencia más interpretativa como ''carceleros''.'
- source_word: ዮሴፍ / Joseph
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: José
  rationale: Nombre propio bíblico estándar en español.
theological_decisions:
- issue: Repetición de 'prison' y relación locativa final
  english_pob_reading: the prison ... in the prison where Joseph was confined
  chosen_spanish_reading: la cárcel ... en la cárcel donde estaba preso José
  alternative_spanish_readings:
  - la cárcel ... en la cárcel donde José estaba encerrado
  - la prisión ... en la prisión donde José estaba confinado
  rationale: Se conserva la repetición del sustantivo para reflejar el énfasis y la estructura de la fuente, tal como la revisión inglesa decidió mantener 'prison' repetido. 'Estaba preso' reproduce el estado de confinamiento sin añadir matices no atestiguados.
  doctrine_reference: No aplica; se trata de una decisión de fidelidad léxica y sintáctica, no doctrinal.
translation_notes:
  revision_awareness: 'La versión inglesa revisada añadió el artículo definido inicial por naturalidad, eliminó el ''there'' final redundante y mantuvo la repetición de ''prison''. La versión española sigue esa misma pauta: inicia de modo natural con artículo definido, omite cualquier adición equivalente a ''allí'', y conserva la repetición de ''cárcel'' para no debilitar la correspondencia con la fuente.'
  spanish_consistency_notes:
  - Se prefirió 'cárcel' sobre 'prisión' por naturalidad y fluidez en español, sin perder el sentido del lugar de encierro.
  - Se mantuvo una estructura sintáctica breve y paratáctica, acorde con el original y con la auditoría inglesa.
  - No se introdujeron términos eclesiásticos ni doctrinales ajenos al pasaje.
