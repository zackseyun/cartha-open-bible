translation:
  language: es
  text: días ante Dios. Y José recordó este asunto y rehusó acostarse con ella. Y ella lo instó durante un año y otro más, pero él rehusó escuchar. Y luego[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo ge‘ez final está desalineado o incompleto en el expediente de esta unidad; el inglés auditado también lo trata como incierto ('él/ella hizo cierto' o posible supresión). Por eso no se reconstruye aquí una cláusula más específica.
    reason: textual_variant
lexical_decisions:
- source_word: መዋዕለ፡ ቅድመ፡ እግዚአብሔር።
  english_pob_choice: days before God.
  chosen_spanish: días antes de Dios
  alternatives_spanish:
  - días delante de Dios
  - días ante Dios
  lexicon: Geez መዋዕለ / ቅድመ / እግዚአብሔር
  rationale: El sintagma recibido en ge‘ez aparece como una frase de tiempo literal; se mantiene su valor léxico sin convertirlo en una paráfrasis. 'Antes de Dios' conserva la preposición y la rareza del giro, ya que el testigo inglés también dejó una huella de segmentación aquí.
- source_word: ወተዘከረ፡ ዮሴፍ፡
  english_pob_choice: And Joseph remembered
  chosen_spanish: Y José recordó
  alternatives_spanish:
  - Y José se acordó
  - Y José hizo memoria
  lexicon: Geez ወተዘከረ
  rationale: Se traduce con el verbo normal de memoria en español, conservando el sujeto explícito. La alternativa más literal 'se acordó' es posible, pero 'recordó' suena más clara y digna en este contexto narrativo.
- source_word: ዘንተ፡ ነገረ፡
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - este hecho
  lexicon: Geez ዘንተ ነገረ
  rationale: '''Asunto'' reproduce bien el referente concreto y narrativo sin endurecer la frase. ''Hecho'' también sería posible, pero ''asunto'' sigue más de cerca el matiz de un caso tratado en la narración.'
- source_word: ወአፈቀደ፡ ይስክብ፡ ምስሌሃ።
  english_pob_choice: and refused to lie with her.
  chosen_spanish: y rehusó acostarse con ella
  alternatives_spanish:
  - y se negó a acostarse con ella
  - y rechazó acostarse con ella
  lexicon: Geez ይስክብ ምስሌሃ
  rationale: Se conserva la fuerza sexual del giro sin suavizarlo con eufemismos. 'Acostarse con ella' es la equivalencia natural en español para este contexto, y mantiene la claridad moral y narrativa.
- source_word: ወአስተብቍዐቶ፡ *ዓመተ፡ አሐደ፡ ወካልአ፡
  english_pob_choice: And she urged him for one year and a second
  chosen_spanish: Y ella lo instó durante un año y otro más
  alternatives_spanish:
  - Y ella lo apremió por un año y otro más
  - Y ella lo instó por un año y un segundo
  lexicon: Geez ወአስተብቍዐቶ / ዓመተ አሐደ ወካልአ
  rationale: La estructura es temporal y repetitiva; 'durante un año y otro más' reproduce el sentido sin forzar una calca incómoda. Se evita introducir exactitudes no sustentadas más allá de la duplicación temporal del texto.
- source_word: ወአበየ፡ ሰሚዐ።
  english_pob_choice: but he refused to listen.
  chosen_spanish: pero él rehusó escuchar
  alternatives_spanish:
  - pero él se negó a escuchar
  - pero no quiso oír
  lexicon: Geez አበየ / ሰሚዐ
  rationale: '''Rehusó escuchar'' conserva la resistencia deliberada a oírla. Se prefiere ''escuchar'' a ''oír'' porque el verbo aquí implica atención voluntaria, no mera percepción sonora.'
- source_word: ወአጠየቀ፡
  english_pob_choice: And she/he made certain [or remove]
  chosen_spanish: Y ella [a]
  alternatives_spanish:
  - Y él hizo cierto
  - Y él/ella dejó constancia
  lexicon: Geez ወአጠየቀ
  rationale: El testigo ge‘ez final está segmentado de forma problemática respecto del inglés auditado. Dado que el valor exacto no puede fijarse con seguridad en esta unidad, se deja una marca de inestabilidad textual y se evita inventar un sujeto o acción no garantizados por el expediente.
theological_decisions:
- issue: Gestión de una posible desalineación de segmento al inicio y al final del verso
  english_pob_reading: The English audit trail notes that 'days before God' may belong to the end of the previous verse, and that the last clause may reflect a missegmented verb from the next verse.
  chosen_spanish_reading: Se conserva el material tal como está en el testimonio recibido, señalando la inestabilidad textual con una nota y evitando armonizar artificialmente el segmento.
  alternative_spanish_readings:
  - Suprimir la frase inicial por considerarla arrastre del verso anterior
  - Completar la cláusula final con una reconstrucción interpretativa
  rationale: La transparencia textual exige no ocultar un problema de segmentación. La traducción refleja el estado del expediente y no una reconstrucción conjetural.
  doctrine_reference: Principio de transparencia textual y respeto al testimonio manuscrito en la edición crítica
- issue: Expresión del consentimiento/rechazo sexual en el relato
  english_pob_reading: refused to lie with her
  chosen_spanish_reading: rehusó acostarse con ella
  alternative_spanish_readings:
  - se negó a acostarse con ella
  - rehusó yacer con ella
  rationale: Se mantiene la fuerza narrativa y moral del relato sin rebajar la referencia sexual. 'Acostarse con ella' es idiomático y fiel al valor del hebraísmo/semítica subyacente que el inglés ya había interpretado.
  doctrine_reference: Fidelidad semántica y claridad moral en narraciones bíblicas
translation_notes:
  revision_awareness: Se corrigió la omisión del arrastre inicial señalado en la revisión y se evitó repetir la mistraducción final del inglés auditado. La versión española conserva la inestabilidad textual con una nota anclada en el cierre del verso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija explícitamente; aquí el testigo dice 'Dios'.
  - Se mantiene el tono narrativo sobrio y no litúrgico.
  - Se evita normalizar la clausura textual con una reconstrucción no sustentada.
  - La nota [a] está anclada en el texto para cumplir validación y señalar la incertidumbre final.
