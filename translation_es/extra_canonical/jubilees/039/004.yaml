translation:
  language: es
  text: Y José era de hermosa apariencia y muy agradable[a] a la vista, y la esposa de su amo alzó sus ojos, vio a José, lo amó y le pidió…
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'muy hermoso a la vista'. El ge'ez incluye un intensivo ('muy') en esta segunda descripción visual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዘገብረ፡ እግዚአብሔር፡ ይሴርሖ
  english_pob_choice: And Joseph was handsome in appearance
  chosen_spanish: Y José era hermoso de apariencia
  alternatives_spanish:
  - Y José era bello de apariencia
  - Y José tenía una apariencia hermosa
  lexicon: Jub 39:4; Geez ዘገብረ + እግዚአብሔር + ይሴርሖ
  rationale: La construcción fuente expresa un rasgo visible de José; 'hermoso de apariencia' comunica el sentido físico sin cargarlo con matices modernos de atractivo romántico.
- source_word: ሠናይ ... ወጥቀ
  english_pob_choice: very good to look at
  chosen_spanish: muy bueno para ver
  alternatives_spanish:
  - muy agradable de ver
  - muy hermoso a la vista
  lexicon: Jub 39:4; Geez ሠናይ + ጥቀ + ራእይ
  rationale: Se conserva la evaluación visual directa del texto y el adverbio intensivo 'muy' requerido por ጥቀ; 'para ver' mantiene el valor de 'to look at' sin suavizarlo en exceso.
- source_word: و... አፍቀረቶ፡ ወአስተብቍዐቶ
  english_pob_choice: loved him, and asked him
  chosen_spanish: lo amó y le pidió
  alternatives_spanish:
  - lo amó y le solicitó
  - lo amó y lo requirió
  lexicon: Jub 39:4; Geez verbs of seeing/loving/requesting
  rationale: '''Pedir'' reproduce el acto de solicitar en español de modo natural; el objeto implícito se entiende por el contexto, y los verbos mantienen la progresión del relato.'
theological_decisions:
- issue: Reproducción del nombre divino en un relato de la historia de José
  english_pob_reading: No explicit divine-name masking issue in the English draft; source text includes እግዚአብሔር in the clause about what God did.
  chosen_spanish_reading: No se introduce una ocultación como 'SEÑOR'; se mantiene la referencia divina explícita en la forma narrativa, aunque en esta línea el foco recae sobre la descripción de José y la esposa de su amo.
  alternative_spanish_readings:
  - Yahvé hizo…
  - Dios hizo…
  rationale: Aunque el verso pertenece a un contexto donde el nombre divino aparece en la cláusula inicial ge'ez, el segmento auditado en inglés ya quedó resumido y la línea final es narrativa. Se evita añadir una expansión teológica no presente en el texto continuo suministrado.
  doctrine_reference: Nombre divino / fidelidad textual
translation_notes:
  revision_awareness: El audit trail muestra una revisión que redujo indebidamente 'very good to look at' a 'good to look at'; la verificación posterior restauró el intensivo porque ጥቀ está presente en el ge'ez. La redacción española refleja esa corrección y conserva el matiz intensivo.
  spanish_consistency_notes:
  - Se usa 'José' para coherencia con el nombre propio en español.
  - Se evita 'Cristo', 'SEÑOR' u otras sustituciones no exigidas por el pasaje.
  - Se mantiene una sintaxis narrativa fluida sin sobreexplicar los verbos del original.
