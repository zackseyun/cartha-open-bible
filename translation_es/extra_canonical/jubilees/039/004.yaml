revisions:
- from: Y José era hermoso[a] de apariencia y muy bueno[b] para ver, y la esposa de su amo alzó sus ojos, vio a José, lo amó y le pidió…
  to: Y José era de hermosa apariencia y muy agradable[a] a la vista, y la esposa de su amo alzó sus ojos, vio a José, lo amó y le pidió…
  rationale: Se reemplaza la expresión calcada 'muy bueno para ver' por una formulación idiomática en español que preserva el sentido visual e intensivo del ge'ez y del POB inglés. También se simplifican las notas para conservar solo una alternativa útil.
