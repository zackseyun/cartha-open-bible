revisions:
- from: Todo lo que hacía, Yahvé lo hacía prosperar. Y lo dejó todo en su mano, y el jefe de la cárcel no sabía nada de lo que estaba con él, porque José lo hacía todo y Yahvé lo llevaba a cumplimiento.
  to: Todo lo que hacía, Yahvé lo hacía prosperar. Y lo dejó todo en su mano, y el jefe de la prisión no sabía nada de lo que estaba con él, porque José lo hacía todo y Yahvé lo llevaba a buen término.
  rationale: 'Se hicieron ajustes menores de naturalidad y precisión: «prisión» refleja mejor el ámbito institucional del cargo, y «llevaba a buen término» comunica de manera más idiomática la idea de consumación eficaz expresada por el verbo final. Se conservó «en su mano» por su fidelidad al giro del original y «Yahvé» conforme a la política terminológica del proyecto.'
