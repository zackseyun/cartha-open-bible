    changes_summary: Changed the opening to 'Whatever he did' for natural and accurate English, and smoothed 'the chief of the keepers of the prison' to 'the chief keeper of the prison.'
translation:
  language: es
  text: Todo lo que hacía, Yahvé lo hacía prosperar. Y lo dejó todo en su mano, y el jefe de la prisión no sabía nada de lo que estaba con él, porque José lo hacía todo y Yahvé lo llevaba a buen término.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: nombre divino
  rationale: El ge'ez usa el nombre divino; siguiendo la política del proyecto, se vierte como «Yahvé» y no como una máscara de mayúsculas. En esta sección no hay motivo para sustituirlo por una forma eclesiástica genérica.
- source_word: ይሴርሖ
  english_pob_choice: made to prosper
  chosen_spanish: lo hacía prosperar
  alternatives_spanish:
  - le hacía prosperar
  - lo prosperaba
  lexicon: hacer prosperar
  rationale: La forma causativa expresa que Dios provoca el éxito de la acción de José. «Lo hacía prosperar» conserva mejor la fuerza causal que un simple «prosperaba».
- source_word: ወኀደገ፡ ኵሎ፡ በእዴሁ፡
  english_pob_choice: And he left everything in his hand
  chosen_spanish: Y lo dejó todo en su mano
  alternatives_spanish:
  - Y dejó todo en sus manos
  - Y se lo dejó todo
  lexicon: dejar en la mano de alguien
  rationale: La imagen de confianza y delegación se mantiene de forma literal y natural en español. «En su mano» conserva el giro semítico del original.
- source_word: ሊቀ፡ ዐቀብተ፡ ሞቅሕ
  english_pob_choice: the chief keeper of the prison
  chosen_spanish: el jefe de la cárcel
  alternatives_spanish:
  - el jefe de los carceleros
  - el jefe de la prisión
  lexicon: cargo carcelario
  rationale: El ge'ez describe al responsable principal del lugar de reclusión. «Jefe de la cárcel» es claro y suficientemente fiel; evita añadir precisión institucional no explicitada por el texto.
- source_word: ዘያአምር፡ ምስሌሁ፡ ምንተኒ፡
  english_pob_choice: knew nothing that was with him
  chosen_spanish: no sabía nada de lo que estaba con él
  alternatives_spanish:
  - no sabía nada de cuanto estaba con él
  - no conocía nada de lo que había con él
  lexicon: no saber nada de
  rationale: La construcción busca reflejar la ignorancia total del supervisor respecto de todo lo confiado a José. «Lo que estaba con él» preserva la referencia amplia del original sin sobreinterpretarla.
- source_word: ዮሴፍ፡ ኵሎ፡ ይገብር፡
  english_pob_choice: because Joseph did everything
  chosen_spanish: porque José lo hacía todo
  alternatives_spanish:
  - porque José hacía todo
  - porque José cumplía todo
  lexicon: hacer todo
  rationale: El ge'ez subraya la plena diligencia de José. «Lo hacía todo» suena natural en español y conserva el alcance total del verbo.
- source_word: ወእግዚአብሔር፡ ይፈጽም
  english_pob_choice: and the LORD brought it to completion
  chosen_spanish: y Yahvé lo llevaba a cumplimiento
  alternatives_spanish:
  - y Yahvé lo completaba
  - y Yahvé lo consumaba
  lexicon: llevar a cumplimiento
  rationale: El verbo final expresa consumación o completitud, no solo éxito inicial. «Llevar a cumplimiento» preserva esa culminación sin perder transparencia.
theological_decisions:
- issue: Providencia divina sobre la acción humana
  english_pob_reading: Whatever he did, the LORD made to prosper ... Joseph did everything and the LORD brought it to completion.
  chosen_spanish_reading: Todo lo que hacía, Yahvé lo hacía prosperar ... porque José lo hacía todo y Yahvé lo llevaba a cumplimiento.
  alternative_spanish_readings:
  - Todo cuanto hacía, Yahvé lo prosperaba
  - Todo lo que emprendía, Yahvé lo hacía prosperar
  rationale: El texto mantiene la tensión entre la actividad responsable de José y la acción eficaz de Yahvé. La versión española conserva ambos polos sin diluir la causalidad divina ni la diligencia humana.
  doctrine_reference: Providencia divina; cooperación entre acción humana y obra de Dios
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: abre con una cláusula general equivalente a «Whatever he did» y usa «chief keeper of the prison» como cargo principal, evitando una perífrasis más pesada. No se incorporaron notas porque el pasaje no presenta variantes textuales ni alternativas obligatorias en la tradición auditada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se mantiene «hacer prosperar» para la acción causativa de Dios, en continuidad con el POB inglés.
  - «En su mano» conserva el giro semítico y la idea de delegación total.
  - El cierre con «llevar a cumplimiento» preserva la culminación implícita en el verbo final sin introducir una paráfrasis excesiva.
