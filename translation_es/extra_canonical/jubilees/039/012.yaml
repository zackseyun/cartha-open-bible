  yaml_path: translation/extra_canonical/jubilees/039/012.yaml
  text: Whatever he did, the LORD made to prosper. And he left everything in his hand, and the chief keeper of the prison knew nothing that was with him, because Joseph did everything and the LORD brought it to completion.
  revision_pass:
