revisions:
- from: Y habitó Jacob en la tierra de su peregrinación, en la tierra de Canaán. Estos son los descendientes de Jacob. Y José, con diecisiete años de edad, fue llevado a Egipto, y Potifar, oficial de Faraón, jefe de la guardia, lo compró.
  to: Y habitó Jacob en la tierra del peregrinaje de su padre, en la tierra de Canaán. Estas son las generaciones de Jacob. Y José, con diecisiete años de edad, fue llevado a Egipto, y Potifar, oficial de Faraón, jefe de la guardia, lo compró.
  rationale: Se corrige la cláusula inicial para incluir explícitamente ‘de su padre’, conforme al texto fuente y al inglés auditado, y se restaura la fórmula narrativa ‘Estas son las generaciones de Jacob’ para preservar su función estructural. El resto del versículo se mantiene por ser fiel, claro y natural en español.
