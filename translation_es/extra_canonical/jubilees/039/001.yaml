  language: en
  yaml_path: translation/extra_canonical/jubilees/039/001.yaml
  text: And Jacob dwelt in the land of his father’s sojourning, in the land of Canaan. These are the generations of Jacob. And Joseph, being seventeen years old, was brought down into Egypt, and Potiphar, an officer of Pharaoh, chief of the guards, bought him.
  revision_pass:
