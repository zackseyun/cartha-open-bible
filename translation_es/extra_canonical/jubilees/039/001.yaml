    timestamp: '2026-04-23T14:52:22Z'
    unchanged: false
    changes_summary: Removed the unnecessary conjunction before 'These are the generations of Jacob' for more natural English, and revised 'a eunuch of Pharaoh' to 'an officer of Pharaoh' to better reflect the title in context while preserving the formal register.
translation:
  language: es
  text: Y habitó Jacob en la tierra del peregrinaje de su padre, en la tierra de Canaán. Estas son las generaciones de Jacob. Y José, con diecisiete años de edad, fue llevado a Egipto, y Potifar, oficial de Faraón, jefe de la guardia, lo compró.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “land of his father’s sojourning”
  english_pob_choice: the land of his father’s sojourning
  chosen_spanish: la tierra de su peregrinación
  alternatives_spanish:
  - la tierra de su estancia como forastero
  - la tierra de su sojourn
  lexicon: ׁגור/גּוּר; translational idiom for sojourning/pilgrimage
  rationale: ‘Peregrinación’ preserves the sense of residencia no permanente y suena natural en español bíblico sin borrar la idea de extranjería implícita en el genitivo inglés.
- source_word: “generations”
  english_pob_choice: These are the generations of Jacob
  chosen_spanish: Estos son los descendientes de Jacob
  alternatives_spanish:
  - Estas son las generaciones de Jacob
  - Esta es la descendencia de Jacob
  lexicon: תּוֹלְדֹת
  rationale: ‘Descendientes’ comunica el valor genealógico e histórico de תּוֹלְדֹת en español actual y evita una literalidad rígida que podría sonar opaca; se mantiene el plural del hebreo/uso fórmula narrativa.
- source_word: “being seventeen years old”
  english_pob_choice: being seventeen years old
  chosen_spanish: con diecisiete años de edad
  alternatives_spanish:
  - cuando tenía diecisiete años
  - siendo de diecisiete años
  lexicon: age construction
  rationale: La construcción con ‘con’ es idiomática en español bíblico formal y conserva el dato de edad sin añadir una cláusula interpretativa excesiva.
- source_word: “brought down into Egypt”
  english_pob_choice: was brought down into Egypt
  chosen_spanish: fue llevado a Egipto
  alternatives_spanish:
  - fue hecho bajar a Egipto
  - descendió a Egipto
  lexicon: descent idiom in biblical narrative
  rationale: En español, ‘bajado/llevado’ literal sería pesado; ‘fue llevado a Egipto’ conserva el hecho narrativo y el movimiento sin forzar un calco.
- source_word: “an officer of Pharaoh”
  english_pob_choice: an officer of Pharaoh
  chosen_spanish: oficial de Faraón
  alternatives_spanish:
  - funcionario de Faraón
  - eunuco de Faraón
  lexicon: פַּרְעֹה / court title
  rationale: La revisión inglesa abandonó ‘eunuch’ por ‘officer’ para reflejar mejor el título en contexto; ‘oficial’ en español conserva la dignidad cortesana y evita introducir una especificación corporal no asegurada por la lectura auditada.
- source_word: “chief of the guards”
  english_pob_choice: chief of the guards
  chosen_spanish: jefe de la guardia
  alternatives_spanish:
  - capitán de la guardia
  - jefe de los guardias
  lexicon: פּרַעֹה / court/guard title
  rationale: ‘Jefe de la guardia’ reproduce bien la función jerárquica con registro bíblico claro y evita una precisión militar no explicitada por el texto.
- source_word: “bought him”
  english_pob_choice: bought him
  chosen_spanish: lo compró
  alternatives_spanish:
  - lo adquirió
  - lo compró para sí
  lexicon: קנה / purchase
  rationale: ‘Lo compró’ es la forma más directa y fiel para la transacción esclavista del relato, manteniendo la fuerza narrativa del acto.
theological_decisions:
- issue: Formula genealógica y continuidad del pacto
  english_pob_reading: These are the generations of Jacob
  chosen_spanish_reading: Estos son los descendientes de Jacob
  alternative_spanish_readings:
  - Estas son las generaciones de Jacob
  - Esta es la descendencia de Jacob
  rationale: La fórmula no introduce una doctrina nueva, pero sí marca continuidad narrativa y genealógica. ‘Descendientes’ hace explícito el referente humano de la fórmula sin perder su función estructural en el relato.
  doctrine_reference: No doctrinal issue; narrative genealogical formula.
- issue: Tratamiento del descenso a Egipto
  english_pob_reading: was brought down into Egypt
  chosen_spanish_reading: fue llevado a Egipto
  alternative_spanish_readings:
  - fue bajado a Egipto
  - fue conducido a Egipto
  rationale: Se evita cargar el verso con una metáfora de descenso que en español puede sonar forzada; el sentido teológico-narrativo de providencia y traslado forzoso queda preservado por el contexto.
  doctrine_reference: Providence in narrative displacement; no direct doctrinal assertion.
translation_notes:
  revision_awareness: The English audit trail shows one revision removing an unnecessary conjunction before the genealogical formula and another replacing 'eunuch' with 'officer'. The Spanish draft follows the revised English sense, especially for Potiphar’s title, while rendering the genealogy formula naturally in Spanish without a conjunction that the source does not require.
  spanish_consistency_notes:
  - Usar ‘Faraón’ con mayúscula como nombre/título regnal convencional en español bíblico.
  - Mantener ‘Yahvé’ only when the divine name appears; it does not appear in this verse.
  - Conservar ‘Potifar’ como forma habitual del nombre propio en español.
  - Evitar ‘siervo’ para δοῦλος aquí, porque no aparece en el verso y no corresponde al esclavista act.
