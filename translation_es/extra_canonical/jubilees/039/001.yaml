review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del texto fuente y del POB en inglés: Jacob habita en Canaán, aparece la fórmula genealógica, José tiene diecisiete años, es llevado a Egipto y Potifar lo compra como alto oficial de Faraón. Sin embargo, hay un desajuste importante en ‘la tierra de su peregrinación’, porque el inglés auditado dice explícitamente ‘his father’s sojourning’ y el geʽez refleja ‘de su padre’; además, ‘peregrinación’ puede sugerir viaje devocional más que residencia como forastero.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene reparar dos puntos para mayor fidelidad y naturalidad bíblica: (1) ‘de su peregrinación’ debe ser ‘del peregrinaje de su padre’ o equivalente; (2) en la fórmula narrativa, ‘Estas son las generaciones de Jacob’ preserva mejor la función estructural que ‘descendientes’, que reduce la fórmula a un mero listado biológico. El resto del versículo fluye bien.'
  glossary_alignment: No hay términos del glosario principal en conflicto. ‘Oficial de Faraón’ refleja correctamente la revisión inglesa frente a ‘eunuco’. ‘Jefe de la guardia’ y ‘lo compró’ son adecuados. La principal corrección lexical es mantener el referente ‘de su padre’ y preferir la fórmula tradicional ‘generaciones’ por su valor narrativo.
  issues:
  - severity: high
    issue: Omisión de ‘de su padre’ en la primera cláusula
    rationale: El texto inglés auditado y el geʽez indican ‘the land of his father’s sojourning’. El borrador dice ‘la tierra de su peregrinación’, cambiando el poseedor y perdiendo un dato explícito del sentido fuente.
  - severity: medium
    issue: ‘Peregrinación’ puede desviar el sentido de residencia forastera
    rationale: En español moderno, ‘peregrinación’ suele evocar viaje religioso. Aquí el sentido es estancia o residencia como forastero. ‘Peregrinaje de su padre’ aún funciona en registro bíblico, pero con el posesivo correcto; también habría sido posible ‘estancia como forastero’.
  - severity: medium
    issue: ‘Descendientes’ atenúa la fórmula estructural ‘generations’
    rationale: La fórmula bíblica introduce una sección narrativa/genealógica. ‘Descendientes’ comunica el contenido, pero no tan bien la función literaria tradicional. ‘Generaciones’ es inteligible en español e integra mejor el patrón bíblico.
  revised_spanish_text: Y habitó Jacob en la tierra del peregrinaje de su padre, en la tierra de Canaán. Estas son las generaciones de Jacob. Y José, con diecisiete años de edad, fue llevado a Egipto, y Potifar, oficial de Faraón, jefe de la guardia, lo compró.
  revision_rationale: Se corrige la cláusula inicial para incluir explícitamente ‘de su padre’, conforme al texto fuente y al inglés auditado, y se restaura la fórmula narrativa ‘Estas son las generaciones de Jacob’ para preservar su función estructural. El resto del versículo se mantiene por ser fiel, claro y natural en español.
