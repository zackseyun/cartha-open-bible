  text: And that woman saw that he would not lie with her, and she accused him before his master, saying, “Your Hebrew slave, whom you love, wanted to force me[39:8] so as to lie with me; and it happened that when
  footnotes:
  - marker: '39:8'
    text: The accusation term rendered “force me” could also be understood more generally as “assault me” or “mock me,” but the surrounding clauses point to an attempted sexual charge.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:26Z'
    unchanged: false
    changes_summary: 'Replaced ''came in to violate me'' with ''wanted to force me'' to reflect the source more closely: the verb indicates desire/intention to compel rather than explicit motion (''came in''), and preserves the formal tone without paraphrase. Kept the unfinished ending as in the source verse.'
translation:
  language: es
  text: 'Y aquella mujer vio que él no se acostaría con ella, y lo acusó delante de su amo, diciendo: «Tu esclavo hebreo, a quien amas, quiso forzarme[a] para acostarse conmigo; y sucedió que cuando'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo traducido «forzarme» también podría entenderse de modo más general como «agredirme» o «burlarse de mí», pero el contexto inmediato apunta a una acusación de intento de abuso sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ይእቲ፡ ብእሲት፡
  english_pob_choice: And that woman
  chosen_spanish: Y aquella mujer
  alternatives_spanish:
  - Y esa mujer
  - Y la mujer aquella
  lexicon: woman
  rationale: «Aquella mujer» conserva la deixis narrativa del relato y suena natural en español sin añadir información.
- source_word: ከመ፡ *አይስክብ፡ ምስሌሃ፡
  english_pob_choice: he would not lie with her
  chosen_spanish: él no se acostaría con ella
  alternatives_spanish:
  - él no yacería con ella
  - él no tendría relaciones con ella
  lexicon: lie with
  rationale: «Acostarse con» comunica la relación sexual en español de forma clara y no más explícita de lo que exige el texto.
- source_word: ቅድመ፡ እግዚአ፡
  english_pob_choice: before his master
  chosen_spanish: delante de su amo
  alternatives_spanish:
  - ante su señor
  - en presencia de su amo
  lexicon: master
  rationale: «Amo» sigue la decisión léxica del inglés POB para δοῦλος/ὡς esclavo y mantiene la relación de posesión/autoridad del contexto.
- source_word: ገብርከ፡ ዕብራዊ፡
  english_pob_choice: Your Hebrew slave
  chosen_spanish: Tu esclavo hebreo
  alternatives_spanish:
  - Tu siervo hebreo
  - Tu esclavo de los hebreos
  lexicon: slave
  rationale: «Esclavo» preserva la fuerza lexical del original y del audit trail; «siervo» suavizaría indebidamente el término.
- source_word: ዘታፈቅር፡
  english_pob_choice: whom you love
  chosen_spanish: a quien amas
  alternatives_spanish:
  - que amas
  - a quien tú amas
  lexicon: love
  rationale: La cláusula relacional se expresa de modo directo y natural en español, sin alterar la dependencia del acusador respecto al amo.
- source_word: ይትዐገላኒ፡
  english_pob_choice: wanted to force me
  chosen_spanish: quiso forzarme
  alternatives_spanish:
  - quiso violentarme
  - quiso agredirme
  - quiso obligarme
  lexicon: force
  rationale: «Forzarme» reproduce la intención de coacción recogida por la revisión inglesa, sin convertirla en una acción consumada ni diluirla en un sentido demasiado general.
- source_word: ከመ፡ ይስክብ፡ ምስሌየ፡
  english_pob_choice: so as to lie with me
  chosen_spanish: para acostarse conmigo
  alternatives_spanish:
  - para yacer conmigo
  - con la intención de acostarse conmigo
  lexicon: lie with
  rationale: La frase final conserva la finalidad sexual indicada por el original y encaja con el castellano bíblico contemporáneo.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que cambió «came in to violate me» por «wanted to force me» para reflejar mejor la intención de coacción del verbo ge'ez y mantener el final abierto de la frase, que continúa en el siguiente versículo.
  spanish_consistency_notes:
  - Se preservó «esclavo» como término técnico coherente con la línea POB para δοῦλος.
  - Se evitó «SEÑOR» para እግዚአ፡ porque aquí el contexto inmediato exige «amo»/«maestro», no el nombre divino.
  - Se mantuvo el tono narrativo formal y la cláusula incompleta, conforme al texto fuente.
