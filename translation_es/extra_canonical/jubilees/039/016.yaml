base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/039/016.yaml
  text: And both of them dreamed a dream[39:16], the chief cupbearer and the chief baker, and they told Joseph.
  footnotes:
  - marker: '39:16'
    text: The Ethiopic row reads literally “and they told them to Joseph”; this is understood as “they told them to Joseph,” i.e., they related their dreams to him.
    reason: segmentation_note
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:28Z'
    unchanged: false
    changes_summary: 'Removed the erroneous pronoun ''them'' in ''they told them to Joseph'' to accurately reflect the singular indirect object and produce natural English: ''they told Joseph.'''
translation:
  language: es
  text: Y ambos soñaron un sueño, el jefe de los coperos y el jefe de los panaderos, y se lo[a] contaron a José.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez presenta aquí una formulación literal irregular, algo como “y les contaron a José”; se entiende que le relataron a José sus sueños.
    reason: segmentation_note
lexical_decisions:
- source_word: ወሐለሙ፡ ክልኤሆሙ፡ ሕልመ፡
  english_pob_choice: And both of them dreamed a dream
  chosen_spanish: Y ambos soñaron un sueño
  alternatives_spanish:
  - Y los dos soñaron un sueño
  - Y ambos tuvieron un sueño
  lexicon: Geez ሕልመ = sueño; ወሐለሙ = soñaron; ክልኤሆሙ = ambos / los dos
  rationale: Conserva la duplicación semítica 'soñaron un sueño' presente en el inglés POB y refleja con naturalidad en español la repetición enfática del original.
- source_word: ሊቀ፡ መዛርት፡
  english_pob_choice: the chief cupbearer
  chosen_spanish: el jefe de los coperos
  alternatives_spanish:
  - el copero principal
  - el principal copero
  lexicon: Geez ሊቀ = jefe/principal; መዛርት = coperos/copero
  rationale: '''Jefe de los coperos'' mantiene el valor titular y es transparente en español. ''Copero principal'' también sería posible, pero suena menos natural en una enumeración de cargos.'
- source_word: ሊቀ፡ ሐበዝት፡
  english_pob_choice: the chief baker
  chosen_spanish: el jefe de los panaderos
  alternatives_spanish:
  - el panadero principal
  - el principal panadero
  lexicon: Geez ሊቀ = jefe/principal; ሐበዝት = panaderos/panadero
  rationale: Se conserva la misma construcción titular que en la primera mitad del versículo para mantener paralelismo y claridad.
- source_word: ወነገርዎ፡ ለዮሴፍ።
  english_pob_choice: and they told Joseph
  chosen_spanish: y se lo contaron a José
  alternatives_spanish:
  - y le contaron [sus sueños] a José
  - y contaron esto a José
  lexicon: Geez ነገረ = contar/relatar; pronominal object implied by context
  rationale: La forma ge'ez es resumida y el audit trail inglés corrige un objeto indirecto singular. En español, 'se lo contaron a José' expresa de modo natural que le narraron los sueños a José sin añadir un objeto explícito que el texto no desarrolla.
theological_decisions:
- issue: Referencia personal a José
  english_pob_reading: and they told Joseph
  chosen_spanish_reading: y se lo contaron a José
  alternative_spanish_readings:
  - y se lo contaron a José
  rationale: No hay tensión doctrinal; se preserva la referencia histórica y narrativa al mismo José del contexto. Se mantiene el nombre propio, sin sustitución interpretativa.
  doctrine_reference: no aplica
translation_notes:
  revision_awareness: El texto inglés revisado corrige el pronombre erróneo ('them') en la cláusula final y deja claro que el destinatario singular es José. La versión española sigue esa revisión y evita cualquier forma que sugiera un objeto plural.
  spanish_consistency_notes:
  - Se emplea 'José' para Ἰωσήφ, como es estándar y fiel al nombre propio.
  - Se conserva 'jefe de los coperos' y 'jefe de los panaderos' para reflejar los títulos paralelos del original.
  - La secuencia verbal 'soñaron... se lo contaron' mantiene el orden narrativo del versículo y su brevedad.
