base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/039/011.yaml
  text: There in the prison, the LORD gave Joseph favor and mercy before the chief of the keepers of the prison-house[39:11], because he saw that the LORD was with him, and everything
  footnotes:
  - marker: '39:11'
    text: The title here uses the same keeper/guard root as earlier, but in the prison setting it refers to the prison official rather than Potiphar’s household office.
    reason: lexical_alternative
  - marker: a
    text: Or 'And the LORD gave'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:26Z'
    unchanged: false
    changes_summary: Reordered the objects for more natural English and to reflect that both 'favor' and 'mercy' are given before the chief. Kept the final phrase unchanged despite its apparent incompleteness, since the source as provided also ends with 'and everything.'
translation:
  language: es
  text: Allí en la cárcel, Yahvé concedió a José favor y misericordia delante del jefe de los guardias[a] de la cárcel, porque vio que Yahvé estaba con él, y todo
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El título aquí usa la misma raíz de «guardián/guarda» que antes, pero en el contexto de la cárcel se refiere al funcionario de la prisión, no a un cargo doméstico de la casa de Potifar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ህየ፡ ውስተ፡ ሞቅሕ፡
  english_pob_choice: There in the prison
  chosen_spanish: Allí en la cárcel
  alternatives_spanish:
  - Allí en la prisión
  - Allí en la casa de prisión
  lexicon: locative phrase / prison
  rationale: El Ge'ez abre con un marcador locativo explícito; en español, «Allí en la cárcel» comunica de forma natural la ubicación y preserva el sentido de recinto carcelario. «Prisión» es posible, pero «cárcel» resulta más directo y legible aquí.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: divine name
  rationale: La política terminológica de POB pide «Yahvé» para el nombre divino en el texto principal, en lugar de enmascararlo con «SEÑOR». Aquí el contexto no exige otra forma.
- source_word: ሞገሰ፡ ... ወምሕረተ፡
  english_pob_choice: favor and mercy
  chosen_spanish: favor y misericordia
  alternatives_spanish:
  - gracia y misericordia
  - favor y compasión
  lexicon: grace / favor / mercy
  rationale: «ሞገሰ» se rinde mejor como «favor» y «ምሕረተ» como «misericordia». Mantener ambos sustantivos evita diluir la doble concesión del texto, que el audit trail conserva como dos objetos separados.
- source_word: በቅድሜሁ ለሊቀ ዐቀብተ ቤተ ሞቅሕ
  english_pob_choice: before the chief of the keepers of the prison-house
  chosen_spanish: delante del jefe de los guardianes de la cárcel
  alternatives_spanish:
  - delante del jefe de los guardianes de la prisión
  - ante el jefe de los guardias de la cárcel
  lexicon: keeper / guard / prison official
  rationale: El audit trail indica que el mismo raíz de «keeper/guard» aquí designa al funcionario de la prisión, no un cargo doméstico. «Jefe de los guardianes de la cárcel» mantiene la función y evita una tradición interpretativa que oscurezca el cargo.
- source_word: ርእየ፡ ከመ፡ እግዚአብሔር፡ ምስሌሁ፡
  english_pob_choice: because he saw that the LORD was with him
  chosen_spanish: porque vio que Yahvé estaba con él
  alternatives_spanish:
  - porque veía que Yahvé estaba con él
  - porque reconoció que Yahvé estaba con él
  lexicon: see / with him
  rationale: «vio» refleja el valor perceptivo directo del verbo sin sobreexplicarlo. «estaba con él» conserva la fórmula relacional del texto y el sentido de presencia acompañante.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: POB en español usa «Yahvé» como representación transparente del nombre divino. Esto evita la convención de sustitución litúrgica y conserva la identidad del referente en el pasaje.
  doctrine_reference: Divine name / tetragrammaton policy
- issue: 'Doble concesión divina: favor y misericordia'
  english_pob_reading: gave Joseph favor and mercy
  chosen_spanish_reading: concedió a José favor y misericordia
  alternative_spanish_readings:
  - dio a José favor y misericordia
  - concedió favor y misericordia a José
  rationale: El texto mantiene dos dones distintos. «Concedió» es más idiomático en español que un simple «dio» y preserva la iniciativa divina sin perder la estructura de la fuente.
  doctrine_reference: Providencia divina / favor inmerecido
translation_notes:
  revision_awareness: La revisión inglesa restableció la frase inicial «There in the prison» y mantuvo la conclusión abierta «and everything», además de reordenar los objetos para claridad. La versión española sigue esa restauración locativa, conserva el final incompleto como en la fuente proporcionada y mantiene la doble serie nominal «favor y misericordia».
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera uniforme para el nombre divino.
  - «cárcel» se emplea de forma consistente para el recinto; la nota ofrece «prisión» como alternativa válida.
  - Se mantuvo el final abierto «y todo» porque el texto fuente y el audit trail inglés también quedan incompletos.
