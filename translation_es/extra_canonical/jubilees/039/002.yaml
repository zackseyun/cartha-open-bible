translation:
  language: es
  text: Para el faraón, el jefe de los guardias. Y puso a José sobre toda su casa, y se manifestó la bendición de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለፈርዖን፡ ሊቀ፡ ዐቀብት።
  english_pob_choice: For Pharaoh, the chief of the guards.
  chosen_spanish: Para el faraón, el jefe de los guardias.
  alternatives_spanish:
  - Para el faraón, el capitán de la guardia.
  - Para el faraón, el principal de los guardias.
  lexicon: פַּרְעֹה / Φαραώ; 'chief of the guards' as an administrative/military office
  rationale: El ge'ez abre con una frase de relación/oficio vinculada a Faraón. 'Jefe de los guardias' conserva la idea de cargo sin sobreinterpretar el título; 'capitán de la guardia' es posible, pero añade un matiz más militar que el texto no obliga a fijar.
- source_word: ወሤሞ፡ ለዮሴፍ፡ ዲበ፡ ኵሉ፡ ቤቱ፡
  english_pob_choice: And he appointed Joseph over all his house
  chosen_spanish: Y puso a José sobre toda su casa
  alternatives_spanish:
  - Y nombró a José sobre toda su casa
  - Y estableció a José sobre toda su casa
  lexicon: שׂוּם / ἔθηκεν con complemento de autoridad sobre una casa
  rationale: '''Puso'' refleja bien el verbo de establecimiento/apuntamiento y mantiene la sobriedad del original. ''Nombró'' sería también viable, pero ''puso sobre'' reproduce mejor la relación de autoridad expresada por el complemento.'
- source_word: ወኮነት፡ በረከተ፡ እግዚአብሔር፡
  english_pob_choice: and the blessing of the LORD came to be
  chosen_spanish: y vino a ser la bendición de Yahvé
  alternatives_spanish:
  - y la bendición de Yahvé llegó
  - y llegó a ser la bendición de Yahvé
  lexicon: בְּרָכָה / εὐλογία; יהוה
  rationale: La construcción del source enfatiza el hecho de llegar a existir/manifestarse, no solo un movimiento espacial de 'venir sobre'. 'Vino a ser' conserva ese matiz de devenir. Se usa 'Yahvé' porque el POB español debe mostrar el nombre divino de forma explícita cuando el hebreo subyacente corresponde al tetragrámaton, en lugar de ocultarlo tras 'SEÑOR'.
theological_decisions:
- issue: Nombre divino en la cláusula final
  english_pob_reading: the blessing of the LORD
  chosen_spanish_reading: la bendición de Yahvé
  alternative_spanish_readings:
  - la bendición del Señor
  - la bendición del Dios de Israel
  rationale: Aunque el inglés POB usa 'LORD' por convención, la política española del proyecto exige renderizar יהוה como 'Yahvé'. Aquí no se trata de una cita indirecta que obligue a disfrazar el nombre divino, sino de una referencia directa al nombre de Dios en la fórmula del texto.
  doctrine_reference: Éxodo 3:15; convención textual del POB español para יהוה
translation_notes:
  revision_awareness: La revisión inglesa eliminó material añadido sobre la casa del egipcio y dejó una clausula final más breve; la versión española sigue ese estado revisado y no incorpora expansión interpretativa. También toma en cuenta que la apertura del verso no es una simple repetición narrativa sino una frase de encuadre sobre Faraón y el jefe de los guardias.
  spanish_consistency_notes:
  - Se mantiene 'José' como forma estable del nombre propio.
  - Se preserva 'casa' con valor de household/household administration, sin convertirlo en 'palacio' o 'hogar'.
  - Se evita 'SEÑOR' para יהוה y se usa 'Yahvé' conforme a la política del proyecto.
  - La sintaxis busca ser publicable y clara sin añadir información ausente del texto fuente.
