translation:
  language: es
  text: para acostarse con ella. Pero él guardó su alma y recordó a Yahvé y las palabras que Jacob su padre solía recitar de las palabras de Abraham[a], que ningún hombre debe cometer inmoralidad sexual con una mujer casada, porque la sentencia de muerte ha sido decretada para él en el cielo delante del Dios Altísimo, y el pecado queda registrado contra él en los libros eternos continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El añadido sobre Jacob recitando palabras recibidas de Abraham es una expansión característica de Jubileos; fundamenta el rechazo de José en instrucción patriarcal transmitida, no solo en escrúpulo personal.
    reason: cross_reference
lexical_decisions:
- source_word: ከመ፡ ይስከብ፡ ምስሌሃ
  english_pob_choice: to lie with her
  chosen_spanish: para acostarse con ella
  alternatives_spanish:
  - para yacer con ella
  - para unirse a ella sexualmente
  lexicon: sin entrada numerada
  rationale: La frase expresa el acto sexual prohibido; en español, «acostarse con ella» es natural y suficientemente directo sin suavizar la fuerza del original.
- source_word: ወአመጠወ፡ ነፍሶ፡
  english_pob_choice: But he guarded his soul
  chosen_spanish: Pero él guardó su alma
  alternatives_spanish:
  - Pero él guardó su vida
  - Pero él se guardó a sí mismo
  lexicon: sin entrada numerada
  rationale: Mantiene la metáfora del original y del inglés auditado, donde «soul» se preserva como «alma».
- source_word: ወተዘከረ፡ ለእግዚአብሔር፡
  english_pob_choice: remembered the LORD
  chosen_spanish: recordó a Yahvé
  alternatives_spanish:
  - se acordó de Yahvé
  - recordó al Señor
  lexicon: sin entrada numerada
  rationale: Se usa «Yahvé» según el estándar del proyecto para el Tetragrámaton; «recordó» conserva el sentido de traer a la mente y orientar la conducta.
- source_word: ዘያነብብ፡ ያዕቆብ፡ አቡሁ፡
  english_pob_choice: that Jacob his father used to recite
  chosen_spanish: que Jacob su padre solía recitar
  alternatives_spanish:
  - que Jacob su padre leía habitualmente
  - que Jacob su padre acostumbraba repetir
  lexicon: sin entrada numerada
  rationale: «Recitar» refleja el carácter transmitido y formulado de las palabras; «solía» reproduce el valor habitual del imperfecto.
- source_word: ከመ፡ አልቦ፡ ... ዘይዜሙ፡
  english_pob_choice: that no man should commit fornication
  chosen_spanish: que ningún hombre debe cometer fornicación
  alternatives_spanish:
  - que ningún hombre ha de cometer fornicación
  - que no hay hombre que cometa fornicación
  lexicon: sin entrada numerada
  rationale: La revisión auditada corrige la lectura descriptiva y exige un valor prescriptivo/prohibitivo; «debe» expresa esa fuerza normativa en español sin perder el matiz legal.
- source_word: በብእሲት፡ እንተ፡ ባቲ፡ ምት
  english_pob_choice: with a woman who has a husband
  chosen_spanish: con una mujer que tiene marido
  alternatives_spanish:
  - con una mujer casada
  - con una mujer que pertenece a otro hombre
  lexicon: sin entrada numerada
  rationale: «Tiene marido» sigue de cerca la relación formulada en el original y evita decidir por una expresión más interpretativa como «casada».
- source_word: ቦ፡ ኵነኔ፡ ሞት፡
  english_pob_choice: the judgment of death
  chosen_spanish: el juicio de muerte
  alternatives_spanish:
  - la sentencia de muerte
  - el castigo de muerte
  lexicon: sin entrada numerada
  rationale: Se conserva la formulación legal del original y del inglés auditado, manteniendo la tensión entre juicio y sentencia.
- source_word: በሰማያት፡ በቅድመ፡ እግዚአብሔር፡ ልዑል፡
  english_pob_choice: in heaven before the Most High God
  chosen_spanish: en el cielo delante del Dios Altísimo
  alternatives_spanish:
  - en el cielo ante el Dios Altísimo
  - en los cielos delante del Dios Altísimo
  lexicon: sin entrada numerada
  rationale: «Delante de» conserva la orientación relacional del original; «Dios Altísimo» sigue de cerca el epíteto sin liturgizarlo más allá del texto.
- source_word: በኵሉ፡
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: sin entrada numerada
  rationale: La revisión auditada corrigió la adición indebida de «before the LORD»; «continuamente» refleja solo el adverbio final presente en ge'ez.
theological_decisions:
- issue: Tetragrammaton in this verse
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: El proyecto exige «Yahvé» para יהוה; la aparición en el contexto no requiere ocultamiento litúrgico.
  doctrine_reference: Project terminology default for YHWH
- issue: Prohibitive force of Jacob/Abraham instruction
  english_pob_reading: that no man should commit fornication
  chosen_spanish_reading: que ningún hombre debe cometer fornicación
  alternative_spanish_readings:
  - que no haya hombre que cometa fornicación
  - que ningún hombre cometa fornicación
  rationale: La nota auditada señala que la frase funciona como prohibición, no como mera descripción. En español, «debe» preserva el valor normativo sin convertirlo en un mandato ajeno al texto.
  doctrine_reference: Textual syntax / imperative force in Jubilees 39:5
- issue: Eternal record of sin
  english_pob_reading: the sin is recorded against him in the eternal books continually
  chosen_spanish_reading: el pecado queda registrado contra él en los libros eternos continuamente
  alternative_spanish_readings:
  - el pecado es anotado contra él en los libros eternos continuamente
  - el pecado está inscrito contra él en los libros eternos continuamente
  rationale: Se mantiene el motivo de registro celestial presente en el texto y en el inglés auditado, sin añadir la expansión errónea «before the LORD».
  doctrine_reference: Heavenly books motif in Jubilees
translation_notes:
  revision_awareness: 'Se incorporó la revisión que corrigió dos puntos del audit trail en inglés: la cláusula final solo dice «continuamente», sin «before the LORD», y la construcción previa se entiende como prohibición («que ningún hombre debe cometer fornicación»), no como simple descripción.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conservó «alma» por la metáfora de ነፍሶ, en vez de reducirla a «vida».
  - «Fornicación» se conservó por la fuerza lexical del original y del inglés auditado; no se suavizó a un término más general.
  - Los corchetes de nota están anclados en el texto exactamente donde corresponden.
