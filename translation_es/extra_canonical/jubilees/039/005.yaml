base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/039/005.yaml
  text: to lie with her. But he guarded his soul and remembered the LORD and the words that Jacob his father used to recite from the words of Abraham[39:5], that no man should commit fornication with a woman who has a husband, for the judgment of death has been ordained for him in heaven before the Most High God, and the sin is recorded against him in the eternal books continually.
  footnotes:
  - marker: '39:5'
    text: The clause about Jacob reciting words received from Abraham is an expansion characteristic of Jubilees, grounding Joseph’s refusal in transmitted patriarchal instruction rather than only personal scruple.
