  revision_rationale: Se elimina la nota redundante porque no ofrece una alternativa real al texto principal. Además, se sustituye «se apoderó de él» por «lo agarró» en ambas ocurrencias para reflejar de manera más natural y concreta la acción física del original, sin cambiar el sentido. El resto del versículo se mantiene esencialmente igual por buena fidelidad al source y al audit trail inglés.
