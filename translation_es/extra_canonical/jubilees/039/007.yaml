base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/039/007.yaml
  text: And she seized him in the house to force him to lie with her[39:7], and she shut the doors of the house and seized him, but he left his garment in her hand and broke the door-bar and ran outside from before her face. And she saw
  footnotes:
  - marker: '39:7'
    text: 'The sequence is textually dense: she shuts the doors, seizes him, he leaves the garment, breaks the door-bar, and flees. The exact order may reflect compressed narration in the Ethiopic segmentation.'
    reason: segmentation_note
  - marker: a
    text: Or 'in the house'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
