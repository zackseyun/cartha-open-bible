    unchanged: false
    changes_summary: Added the final clause 'And she saw' to account for the closing source word ወርእየት, which was omitted in the draft. Kept the rest unchanged.
translation:
  language: es
  text: Y ella lo agarró en la casa para obligarlo a acostarse con ella, y cerró las puertas de la casa y lo agarró; pero él dejó su vestido en su mano, rompió la barra de la puerta y salió corriendo afuera de su presencia. Y ella vio.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወአንዘተ
  english_pob_choice: And she seized him
  chosen_spanish: Y ella se apoderó de él
  alternatives_spanish:
  - Y ella lo sujetó
  - Y ella lo agarró
  lexicon: an-za-ta
  rationale: El verbo expresa una acción física de aprehensión. «Se apoderó de él» conserva la fuerza de dominio y captura sin sonar demasiado coloquial. Mantiene la duplicación verbal del hebreo/gee'z según el audit trail inglés.
- source_word: በቤት፡
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - dentro de la casa
  - en la habitación
  lexicon: bayt
  rationale: La preposición y el sustantivo remiten de manera directa al espacio doméstico. «En la casa» es natural en español y respeta el valor locativo.
- source_word: ከመ፡ ትትበአስ፡ ይስክብ፡ ምስሌሃ፡
  english_pob_choice: to force him to lie with her
  chosen_spanish: para obligarlo a acostarse con ella
  alternatives_spanish:
  - para forzarlo a yacer con ella
  - para obligarlo a dormir con ella
  lexicon: skb / lie with
  rationale: El giro eufemístico exige un español claro pero no innecesariamente crudo. «Acostarse con ella» comunica la relación sexual implícita; «obligarlo» expresa el componente coercitivo que el inglés POB retiene con «force».
- source_word: ወዐጸወት፡ ኆኅተ፡ ቤት፡
  english_pob_choice: and she shut the doors of the house
  chosen_spanish: y cerró las puertas de la casa
  alternatives_spanish:
  - y cerró las puertas de la casa por dentro
  - y echó llave a las puertas de la casa
  lexicon: ʿṣwt / door, house
  rationale: «Cerró las puertas» reproduce la acción sin añadir un detalle no atestiguado como «por dentro» o «con llave». Se mantiene el plural de «puertas» como en el inglés POB.
- source_word: ወኀደገ፡ ልብሶ፡ ውስተ፡ እዴሃ፡
  english_pob_choice: and he left his garment in her hand
  chosen_spanish: y dejó su vestido en su mano
  alternatives_spanish:
  - y dejó su manto en su mano
  - y abandonó su prenda en su mano
  lexicon: lbso / in her hand
  rationale: «Vestido» sigue de cerca la opción del inglés POB para ልብሶ, y «en su mano» preserva la imagen concreta de la prenda retenida mientras él escapa.
- source_word: ወሰበረ፡ ማዕጾ፡
  english_pob_choice: and broke the door-bar
  chosen_spanish: rompió la barra de la puerta
  alternatives_spanish:
  - quebró el cerrojo de la puerta
  - rompió el trabe de la puerta
  lexicon: door-bar
  rationale: El inglés POB eligió una pieza específica de la puerta, no simplemente la puerta. «Barra de la puerta» conserva ese matiz y suena comprensible en español.
- source_word: ወጐየ፡ አፍአ፡ እምቅድመ፡ ገጻ።
  english_pob_choice: and ran outside from before her face
  chosen_spanish: y salió corriendo fuera de su presencia
  alternatives_spanish:
  - y corrió afuera delante de ella
  - y huyó afuera de su vista
  lexicon: gwy / face / presence
  rationale: La expresión literal «de su rostro» sonaría forzada en español. «Fuera de su presencia» comunica el valor relacional y visual de la frase final manteniendo el sentido de escape delante de ella.
- source_word: ወርእየት፡
  english_pob_choice: And she saw
  chosen_spanish: Y ella vio
  alternatives_spanish:
  - Y la vio
  - Y vio
  lexicon: rʾy
  rationale: La revisión inglesa añadió la cláusula final omitida antes. «Y ella vio» preserva el sujeto explícito y el cierre abrupto del versículo.
theological_decisions:
- issue: Representación del acto sexual coercitivo
  english_pob_reading: to force him to lie with her
  chosen_spanish_reading: para obligarlo a acostarse con ella
  alternative_spanish_readings:
  - para forzarlo a yacer con ella
  - para obligarlo a dormir con ella
  rationale: El pasaje presenta coerción sexual, y el español debe comunicarla sin suavizarla. «Obligarlo» mantiene la violencia de la acción; «acostarse con ella» conserva el eufemismo narrativo sin convertirlo en una paráfrasis más explícita de lo que exige el texto.
  doctrine_reference: Integridad textual y claridad moral del relato bíblico.
- issue: Última cláusula añadida por revisión textual
  english_pob_reading: And she saw
  chosen_spanish_reading: Y ella vio
  alternative_spanish_readings:
  - Y vio
  - Y la vio
  rationale: La revisión del inglés POB confirmó que el final del versículo debe incluir la observación visual. Se traduce de forma directa para no perder la clausura narrativa del source text.
  doctrine_reference: Crítica textual y completitud del versículo.
translation_notes:
  revision_awareness: 'El inglés POB fue revisado en dos puntos relevantes: primero, se corrigió la omisión inicial de «And she seized him»; segundo, se añadió la cláusula final «And she saw». La presente versión española incorpora ambas correcciones y conserva la secuencia narrativa condensada del texto ge''ez.'
  spanish_consistency_notes:
  - Se mantiene «Y ella» con sujeto explícito para reflejar la repetición verbal del original y la revisión inglesa.
  - Se traduce ልብሶ como «vestido» siguiendo la opción del audit trail inglés, aunque «manto» sería posible según contexto; no se fuerza una actualización terminológica sin apoyo textual adicional.
  - «Fuera de su presencia» evita una calca de «from before her face» y conserva el valor relacional/visual de la expresión.
