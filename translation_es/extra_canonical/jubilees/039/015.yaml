revisions:
- from: Y el jefe de los guardias de la prisión puso a José para atenderlos y servir delante de ellos.
  to: Y el jefe de los guardias de la prisión encargó a José atenderlos y servirles.
  rationale: La revisión mantiene el sentido del original y del POB en inglés, pero mejora la precisión de la asignación («encargó») y la naturalidad del español («servirles» en lugar de «servir delante de ellos»). No se requieren notas porque no se introduce ninguna ambigüedad nueva ni se pierde una alternativa significativa preservada por el inglés.
