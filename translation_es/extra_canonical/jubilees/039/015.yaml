  text: Y el jefe de los guardias de la prisión encargó a José atenderlos y servirles.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሊቀ፡ ዐቀብተ፡ ሞቅሕ
  english_pob_choice: the chief of the keepers of the prison
  chosen_spanish: el jefe de los guardias de la prisión
  alternatives_spanish:
  - el jefe de los carceleros
  - el principal de los guardias de la prisión
  - el jefe de los custodios de la prisión
  lexicon: jefe; guardia; prisión
  rationale: El ge'ez designa a una autoridad sobre los custodios de la prisión. «Jefe de los guardias» conserva esa relación jerárquica sin volver más técnico el oficio de lo que exige el contexto. «Prisión» mantiene el sentido del lugar de reclusión.
- source_word: ለዮሴፍ፡
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  lexicon: José
  rationale: Nombre propio bíblico en español estándar.
- source_word: ይትአከኮሙ
  english_pob_choice: to attend them
  chosen_spanish: para atenderlos
  alternatives_spanish:
  - para cuidarlos
  - para servirles
  - para asistirlos
  lexicon: atender
  rationale: El verbo expresa la tarea de estar al cuidado o al servicio de otros. «Atenderlos» conserva esa amplitud sin introducir una función específica no garantizada por el texto.
- source_word: ወይትለአክ፡ ቅድሜሆሙ
  english_pob_choice: and to minister before them
  chosen_spanish: y servir delante de ellos
  alternatives_spanish:
  - y ministrar delante de ellos
  - y servir ante ellos
  - y prestarles servicio delante de ellos
  lexicon: servir; delante de
  rationale: «Servir» traduce con naturalidad la idea de prestar servicio. «Delante de ellos» conserva la orientación espacial/social del original y evita cargar «ministrar» con una connotación litúrgica que el contexto no exige.
theological_decisions:
- issue: Naturaleza del cargo de José en la prisión
  english_pob_reading: appointed Joseph to attend them and to minister before them
  chosen_spanish_reading: puso a José para atenderlos y servir delante de ellos
  alternative_spanish_readings:
  - lo nombró para atenderlos y servir delante de ellos
  - lo puso a cargo de atenderlos y servir delante de ellos
  rationale: El versículo describe una asignación de funciones dentro de la prisión, no un oficio religioso. La redacción española mantiene el carácter práctico y subordinado de la tarea sin ampliar el texto.
  doctrine_reference: Narrative context; no doctrinal claim beyond the text
