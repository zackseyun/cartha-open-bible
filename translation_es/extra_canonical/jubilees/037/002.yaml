translation:
  language: es
  text: 'Isaac había dado los derechos de primogenitura a Jacob, su hijo menor, y ellos se enojaron mucho. Y contendieron con su padre, diciendo: «¿Por qué le dio los derechos de primogenitura a Jacob, que es menor, mientras tú eres el mayor, y te dejó a un lado?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: rights of the firstborn
  english_pob_choice: rights of the firstborn
  chosen_spanish: derechos de primogenitura
  alternatives_spanish:
  - derechos del primogénito
  - la primogenitura
  lexicon: derecho / primogenitura
  rationale: La frase inglesa señala un conjunto de derechos, no solo el estatus abstracto; en español, «derechos de primogenitura» conserva ese valor jurídico-familiar sin perder naturalidad.
- source_word: firstborn
  english_pob_choice: firstborn
  chosen_spanish: primogenitura
  alternatives_spanish:
  - primogénito
  - primogenitura
  lexicon: primogénito / primogenitura
  rationale: Aquí el énfasis está en la prerrogativa de nacimiento, por eso se usa «primogenitura»; evita confundir el don con la persona misma.
- source_word: Jacob his younger son
  english_pob_choice: Jacob his younger son
  chosen_spanish: Jacob, su hijo menor
  alternatives_spanish:
  - Jacob, su hijo más joven
  - Jacob, el menor de sus hijos
  lexicon: joven / menor
  rationale: «Menor» reproduce bien la oposición de edad/orden fraternal del contexto y resulta más preciso que una simple referencia a juventud.
- source_word: they were exceedingly angry
  english_pob_choice: they were exceedingly angry
  chosen_spanish: se enojaron muchísimo
  alternatives_spanish:
  - se irritaron muchísimo
  - estaban furiosísimos
  lexicon: anger
  rationale: «Se enojaron muchísimo» expresa con claridad la intensidad del original sin elevar innecesariamente el registro.
- source_word: contended with their father
  english_pob_choice: contended with their father
  chosen_spanish: contendieron con su padre
  alternatives_spanish:
  - discutieron con su padre
  - altercaron con su padre
  lexicon: contend
  rationale: «Contendieron» conserva la idea de disputa formal y mantiene una resonancia bíblica adecuada sin caer en un calco torpe.
- source_word: leave you aside
  english_pob_choice: leave you aside
  chosen_spanish: te dejó a un lado
  alternatives_spanish:
  - te apartó
  - te dejó de lado
  lexicon: leave aside
  rationale: La expresión española mantiene el sentido de exclusión o desconsideración presente en el original; «a un lado» preserva la imagen y la fuerza retórica.
theological_decisions:
- issue: Primogenitura como privilegio de la línea elegida
  english_pob_reading: rights of the firstborn
  chosen_spanish_reading: derechos de primogenitura
  alternative_spanish_readings:
  - derechos del primogénito
  - la primogenitura
  rationale: No se reduce a una simple prioridad familiar; la frase conserva el peso narrativo y covenantal del privilegio transferido a Jacob.
  doctrine_reference: Patriarchal blessing / birthright motif in Genesis-Jubilees tradition
translation_notes:
  revision_awareness: 'La revisión inglesa corrigió un error importante del contexto narrativo: el reclamo va dirigido al padre, con Esau/Isaac en la escena, no a una presencia genérica de los hijos. La redacción española sigue esa lectura y mantiene el contraste de edad («menor» / «mayor») y la acusación de haber sido dejado aparte.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y cualquier sustitución litúrgica ajena al texto; aquí no hay nombres divinos en el verso.
  - Se usa «contendieron» para reflejar una disputa formal, coherente con un registro bíblico sobrio.
  - No se añadió nota al pie porque no hay una alternativa textual que requiera anclaje explícito en el español final.
