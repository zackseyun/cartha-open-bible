base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/037/010.yaml
  text: And there came to them from Moab and from the sons of Ammon one thousand chosen men who were hired; and from Philistia one thousand chosen men fit for war; and from Edom and from the Horites one thousand chosen men trained for battle; and from the Kittim strong men fit for war.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:11Z'
    unchanged: false
    changes_summary: Reordered 'who were hired' to modify the Ammonite/Moabite contingent more naturally; removed the added word 'men' before 'fit for war' in the Philistia clause; changed 'seasoned fighters' to 'trained for battle' for a more formal rendering closer to the source; retained 'strong men fit for war' for the Kittim.
translation:
  language: es
  text: Y vinieron a ellos desde Moab y desde los hijos de Amón mil hombres escogidos que fueron contratados; y desde Filistea mil hombres escogidos aptos para la guerra; y desde Edom y desde los horeos mil hombres escogidos adiestrados para la batalla; y desde los quitim hombres fuertes aptos para la guerra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዕደወ / hired
  english_pob_choice: who were hired
  chosen_spanish: que fueron alquilados
  alternatives_spanish:
  - que fueron contratados
  - mercenarios
  lexicon: No se inventa número de léxico; se sigue el valor relacional del participio pasivo en el contexto militar.
  rationale: ‘Alquilados’ conserva la fuerza concreta de que estos hombres fueron tomados a sueldo, sin suavizar el matiz hacia una simple contratación. ‘Mercenarios’ sería posible, pero en español introduce una carga interpretativa más fuerte que el texto no explicita.
- source_word: ኅሩያነ / chosen
  english_pob_choice: chosen men
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - varones escogidos
  - hombres seleccionados
  lexicon: No se inventa número de léxico; se refleja el participio de elección con un sustantivo humano natural en español.
  rationale: ‘Escogidos’ reproduce el valor de selección sin forzar un tecnicismo. ‘Varones’ es posible, pero ‘hombres’ es más natural en español contemporáneo y suficientemente fiel al referente militar.
- source_word: መስተቃትላነ / fit for war
  english_pob_choice: fit for war
  chosen_spanish: aptos para la guerra
  alternatives_spanish:
  - idóneos para la guerra
  - preparados para la guerra
  lexicon: No se inventa número de léxico; se preserva la aptitud funcional del grupo, no solo su valentía.
  rationale: ‘Aptos para la guerra’ sigue de cerca el sentido de capacidad/factura militar sin convertirlo en una descripción moral. ‘Preparados para la guerra’ sería interpretativamente posible, pero desplaza el énfasis desde aptitud a preparación.
- source_word: መስተባእሳነ / trained for battle
  english_pob_choice: trained for battle
  chosen_spanish: adiestrados para la batalla
  alternatives_spanish:
  - entrenados para la batalla
  - experimentados en combate
  lexicon: No se inventa número de léxico; se conserva el matiz de formación militar ya adquirida.
  rationale: ‘Adiestrados’ refleja bien la idea de entrenamiento previo y capacidad adquirida. ‘Entrenados’ también sería claro, pero ‘adiestrados’ mantiene un tono un poco más formal y cercano a la terminología militar.
- source_word: ፍልስጥኤም / Philistia
  english_pob_choice: Philistia
  chosen_spanish: Filistea
  alternatives_spanish:
  - la Filistea
  - Filistia
  lexicon: No se inventa número de léxico; se traduce el nombre territorial con la forma española más estable.
  rationale: ‘Filistea’ es la designación territorial habitual en español bíblico y evita una transliteración menos reconocible. Se omite el artículo para mantener fluidez narrativa.
- source_word: ኬጢዎን / Kittim
  english_pob_choice: Kittim
  chosen_spanish: quitim
  alternatives_spanish:
  - kittim
  - los quitim
  lexicon: No se inventa número de léxico; se mantiene el nombre étnico/toponímico en forma española transliterada.
  rationale: ‘Quitim’ ofrece una grafía española más natural que ‘Kittim’ y conserva el referente histórico-literario del texto.
theological_decisions:
- issue: Distribución de los contingentes aliados y su carácter militar
  english_pob_reading: The verse lists four contingents, each identified by origin and military quality, with the Ammon/Moab group singled out as hired men.
  chosen_spanish_reading: El versículo enumera cuatro contingentes, cada uno identificado por su origen y cualidad militar, y el grupo de Moab y de los hijos de Amón queda caracterizado como alquilado.
  alternative_spanish_readings:
  - Los de Moab y Amón fueron simplemente contratados.
  - El texto destaca solo el número, no la condición de los contingentes.
  rationale: La traducción conserva la estructura acumulativa del texto y el énfasis particular en que el primer contingente fue ‘alquilado’. No se diluye esa diferencia en una redacción genérica, porque forma parte del retrato militar y político del pasaje.
  doctrine_reference: No aplica una doctrina sistemática específica; decisión de lectura histórica y literaria basada en el texto base.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: coloca ‘que fueron alquilados’ de manera que modifique naturalmente a los contingentes de Moab y de los hijos de Amón; mantiene el paralelismo de las otras tres cláusulas y conserva ‘aptos para la guerra’ / ‘adiestrados para la batalla’ como fórmulas formales cercanas al original.'
  spanish_consistency_notes:
  - Se conserva un paralelismo de cuatro miembros con repetición de ‘mil hombres escogidos’ donde el texto lo pide.
  - Se evita introducir ‘mercenarios’ como glosa principal para no cargar el pasaje con una interpretación más fuerte que la evidencia.
  - ‘Yahvé’ no aparece en este versículo; por tanto, no se aplica la convención del nombre divino.
  - Se mantiene un registro bíblico formal pero con sintaxis natural en español.
