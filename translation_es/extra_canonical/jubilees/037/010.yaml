  to: Y vinieron a ellos desde Moab y desde los hijos de Amón mil hombres escogidos que fueron contratados; y desde Filistea mil hombres escogidos aptos para la guerra; y desde Edom y desde los horeos mil hombres escogidos adiestrados para la batalla; y desde los quitim hombres fuertes aptos para la guerra.
