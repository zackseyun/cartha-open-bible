    text: O “arruinar nuestros caminos”.
    reason: lexical_alternative
lexical_decisions:
- source_word: በተፋቅሮ፡ ወበሰላም፡
  english_pob_choice: remain in love and in peace
  chosen_spanish: permanecer en amor y en paz
  alternatives_spanish:
  - quedarnos en amor y en paz
  - seguir en amor y en paz
  lexicon: ἀγάπη / εἰρήνη; Geez relational idiom
  rationale: Conservo el paralelismo afectivo y relacional del original con una formulación natural en español; 'permanecer' refleja continuidad, y 'en amor y en paz' mantiene el alcance comunitario sin añadir matices no presentes.
- source_word: ብእሲ፡ ምስለ፡ እኁሁ፡
  english_pob_choice: a man with his brother
  chosen_spanish: un hombre con su hermano
  alternatives_spanish:
  - cada hombre con su hermano
  - un hombre con el otro
  lexicon: idiom of mutual human relation
  rationale: La construcción es proverbial e inclusiva; 'un hombre con su hermano' conserva la simetría del hebraísmo/idioma semítico y sigue siendo inteligible en español.
- source_word: ኢናማስን፡ ፍኖዊነ።
  english_pob_choice: not corrupt our ways
  chosen_spanish: no corromper nuestros caminos
  alternatives_spanish:
  - no trastornar nuestros caminos
  - no arruinar nuestros caminos
  lexicon: דרך / ways; verb of ruining/corrupting
  rationale: 'Sigo la revisión más reciente y el valor léxico adjudicado al verbo: no es solo ''molestar'', sino corromper/arruinar. ''Caminos'' refleja el plural del original y el idioma bíblico de conducta o proceder.'
- source_word: ኃይለ፡ ... ይጸንዕ፡ እምኃይሉ፡
  english_pob_choice: our strength is stronger than his strength
  chosen_spanish: nuestra fuerza es más fuerte que su fuerza
  alternatives_spanish:
  - nuestro poder es más fuerte que su poder
  - nuestra fuerza prevalece sobre la suya
  lexicon: strength / force
  rationale: Mantengo la repetición de 'fuerza' para reflejar la comparación directa del texto y la revisión que armonizó el término repetido; 'más fuerte que' es más natural que 'más poderosa' y conserva el énfasis.
- source_word: ሖውር፡ ላዕሌሁ፡
  english_pob_choice: Go up against him
  chosen_spanish: Sube contra él
  alternatives_spanish:
  - Ve contra él
  - Sube en su contra
  lexicon: ascend/go up against
  rationale: El imperativo de ataque se expresa de forma breve y directa en español; 'sube contra él' conserva la imagen direccional del original.
- source_word: ወንቅትሎ፡ ወናሐጕሎ፡ ውሉዱ፡
  english_pob_choice: let us kill him and destroy his sons
  chosen_spanish: matemos a él y destruyamos a sus hijos
  alternatives_spanish:
  - matémoslo y destruyamos a sus hijos
  - lo matemos y destruyamos a sus hijos
  lexicon: kill / destroy / sons
  rationale: Conservo la coordinación violenta y el plural 'hijos' del original. La forma con 'a él' reproduce el objeto explícito de la fuente, aunque en español sea menos idiomática; se prioriza la transparencia textual.
theological_decisions:
- issue: Permanencia de la tensión entre paz y violencia
  english_pob_reading: the speakers reject peace and choose violence despite the call to remain in love and peace
  chosen_spanish_reading: los hablantes rechazan la paz y eligen la violencia pese al llamado a permanecer en amor y paz
  alternative_spanish_readings:
  - los hablantes se niegan a reconciliarse y optan por la violencia
  - rechazan hacer las paces y llaman a la agresión
  rationale: Mantengo la oposición moral y narrativa del pasaje sin suavizarla; el texto contrapone explícitamente la comunión pacífica con la decisión de matar y destruir.
  doctrine_reference: ética bíblica de paz y rechazo de la violencia fratricida
- issue: Alcance de 'caminos' como conducta
  english_pob_reading: our ways
  chosen_spanish_reading: nuestros caminos como proceder de vida
  alternative_spanish_readings:
  - nuestros caminos
  - nuestra conducta
  rationale: '''Caminos'' conserva el idioma bíblico y, por el contexto, comunica proceder moral. No lo reduzco a mera geografía ni lo reemplazo del todo por una abstracción moderna.'
  doctrine_reference: uso bíblico de 'camino' para conducta y vida
- issue: Comparación de fuerza duplicada
  english_pob_reading: our strength is stronger than his strength, and we are stronger than he
  chosen_spanish_reading: nuestra fuerza es más fuerte que su fuerza, y somos más fuertes que él
  alternative_spanish_readings:
  - nuestro poder es más fuerte que el suyo, y somos más fuertes que él
  - nuestra fuerza supera la de él, y somos más fuertes que él
  rationale: Conservo la duplicación retórica de 'fuerza' para no borrar la insistencia del original ni la revisión auditada; la frase final mantiene el mismo término para el miembro comparativo.
  doctrine_reference: retórica semítica de paralelismo y comparación enfática
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente sobre 'corrupt our ways' y 'stronger than he', pero también toma en cuenta la nota previa que ofrecía 'trouble our path' como alternativa histórica. En español se privilegia 'corromper nuestros caminos' por concordar mejor con el juicio léxico más reciente y con el plural del original; el final queda deliberadamente abierto para corresponder al fragmento conservado.
  spanish_consistency_notes:
  - Usé 'Yahvé' no porque aparezca en este fragmento, sino como norma del proyecto cuando corresponda; aquí no fue necesario.
  - Mantuve 'fuerza' de manera repetida para reflejar la estructura comparativa del original.
  - Conservé 'hijos' en plural y no lo singularicé, siguiendo la fuente.
  - El texto español termina abruptamente con 'Pero si no subes' para reflejar que el fragmento fuente está incompleto.
