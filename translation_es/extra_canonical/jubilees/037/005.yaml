translation:
  language: es
  text: 'y que debíamos permanecer en amor y en paz, un hombre con su hermano, y no corromper nuestros caminos[a].” Pero le dijeron: “No te escucharemos para hacer las paces con él, porque nuestra fuerza es más fuerte que su fuerza, y somos más fuertes que él. Sube contra él, y matémoslo y destruyamos a sus hijos. Pero si no subes'
  philosophy: optimal-equivalence
  footnotes:
