lexical_decisions:
- source_word: ወበዕለተ፡ ሞተ፡
  english_pob_choice: On the day ... died
  chosen_spanish: Y en el día en que murió
  alternatives_spanish:
  - El día que murió
  - El día en que falleció
  lexicon: chronological expression
  rationale: La construcción temporal del ge’ez introduce un marco narrativo directo; «en el día en que» conserva la referencia al mismo día sin añadir matices inexistentes. Se mantiene «murió» porque el texto es sobrio y factual, y no exige una paráfrasis eufemística.
- source_word: ይስሐቅ፡ አቡሁ፡
  english_pob_choice: Isaac, the father of Jacob and Esau
  chosen_spanish: Isaac, el padre de Jacob y de Esaú
  alternatives_spanish:
  - Isaac, padre de Jacob y de Esaú
  - Isaac, el padre de Jacob y Esaú
  lexicon: appositional kinship title
  rationale: «El padre de Jacob y de Esaú» refleja con claridad la aposición explicativa del original y del inglés auditado. Se conserva la repetición de la preposición para mayor naturalidad y precisión.
- source_word: ውሉደ፡ ዔሳው፡
  english_pob_choice: the sons of Esau
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los descendientes de Esaú
  - los hijos de Esaú
  lexicon: kinship/plural collective
  rationale: El término es una referencia genealógica directa; «hijos» reproduce el parentesco literal y coincide con el sentido narrativo del pasaje. «Descendientes» sería posible, pero ampliaría el alcance sin necesidad textual.
theological_decisions:
- issue: Referencia genealógica e identidad de Isaac y Esaú
  english_pob_reading: Isaac, the father of Jacob and Esau; the sons of Esau
  chosen_spanish_reading: Isaac, el padre de Jacob y de Esaú; los hijos de Esaú
  alternative_spanish_readings:
  - Isaac, padre de Jacob y de Esaú; los descendientes de Esaú
  rationale: No hay carga doctrinal explícita en este versículo; la decisión teológica es mantener la genealogía tal como funciona en la narrativa del libro, sin elevarla a formulación interpretativa. La lectura española conserva la estructura relacional que el texto usa para situar el evento.
  doctrine_reference: Narrative genealogy / plain-sense historical reference
translation_notes:
  revision_awareness: La revisión más reciente marcó el versículo como sin cambios necesarios, con acuerdo alto entre controles y sin problemas de revisión; por ello se mantiene una traducción directa, sobria y alineada con el texto fuente y el audit trail inglés.
  spanish_consistency_notes:
  - Se preserva el registro narrativo sobrio del original.
  - No se introduce terminología eclesiástica ajena al pasaje.
  - La frase queda abierta al final porque el segmento fuente proporcionado también queda truncado en «que», sin objeto completado en el paquete disponible.
