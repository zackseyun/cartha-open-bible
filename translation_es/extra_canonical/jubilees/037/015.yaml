translation:
  language: es
  text: 'Entonces Judá dijo a Jacob su padre, diciéndole: «Tensa tu arco, padre, y envía tus flechas, y derriba al enemigo y mata al adversario; y que tengas fortaleza, pues no mataremos a tu hermano, porque tal es él, y porque es tu pariente le daremos honra.» Entonces Jacob tensó su arco y lanzó una flecha, y golpeó a Esaú su hermano en el pecho derecho y lo mató. Y nuevamente lanzó una flecha y golpeó a Adorán el arameo en el pecho izquierdo, y lo derribó y lo mató. Entonces los hijos de Jacob y sus esclavos salieron por los cuatro costados de la torre. Y Judá salió primero, y Neftalí y Gad con él, y cincuenta esclavos con él[b], por el lado sur de la torre, y mataron a todos los que hallaron ante ellos, y ninguno de ellos escapó. Y Leví y Dan y Aser salieron por el lado este de la torre, y cincuenta hombres con ellos[c], y mataron a los guerreros de Moab y Amón. Y Rubén e Isacar y Zabulón salieron por el lado norte de la torre, y cincuenta hombres con ellos[d], y mataron a los combatientes
    de Filistea. Y Simeón y Benjamín y Enoc hijo de Rubén salieron por el lado oeste de la torre, y cincuenta hombres con ellos[e], y mataron de entre Edom y los horeos cuatrocientos hombres fuertes y belicosos. Y seiscientos huyeron, y cuatro de los hijos de Esaú huyeron con ellos, y dejaron a su padre tendido y muerto, tal como había caído en el monte que está en Adurim. Y los hijos de Jacob los persiguieron hasta el monte Seir. Pero Jacob sepultó a su hermano en el monte que está en Adurim, y regresó a su casa, y lo consolaron allí[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «y los alimentaron allí». Lectura anterior del borrador, corregida mediante revisión de fuente (abril 2026): el verbo ge''ez yāstazānege''ewwo (de la raíz astaznagga''a) significa ''consolaron/dieron consuelo'', no ''alimentaron''.'
    reason: textual_variant
  - marker: b
    text: 'Lectura anterior del borrador: «Y Judá salió primero, y Neftalí y Gad con él, por el lado sur de la torre» (sin mención de los cincuenta esclavos). El texto ge''ez incluye explícitamente ወ፶ ፡ አግብርት ፡ ምስሌሁ (''y cincuenta esclavos/siervos con él''); detalle restituido en revisión de abril 2026.'
    reason: textual_variant
  - marker: c
    text: 'Lectura anterior del borrador: «Y Leví y Dan y Aser salieron por el lado este de la torre, y mataron» (sin los cincuenta hombres). El texto ge''ez incluye ወ፶ ፡ ምስሌሆሙ (''y cincuenta con ellos''); detalle restituido en revisión de abril 2026.'
    reason: textual_variant
  - marker: d
    text: 'Lectura anterior del borrador: «Y Rubén e Isacar y Zabulón salieron por el lado norte de la torre, y mataron» (sin los cincuenta hombres). El texto ge''ez incluye ወ፶ ፡ ዕድ ፡ ምስሌሆሙ (''y cincuenta hombres con ellos''); detalle restituido en revisión de abril 2026.'
    reason: textual_variant
  - marker: e
    text: 'Lectura anterior del borrador: «Y Simeón y Benjamín y Enoc hijo de Rubén salieron por el lado oeste de la torre, y mataron» (sin los cincuenta hombres). El texto ge''ez incluye ወ፶ ፡ ምስሌሆሙ (''y cincuenta con ellos''); detalle restituido en revisión de abril 2026.'
    reason: textual_variant
lexical_decisions:
- source_word: አግብርት (agbərt, ge'ez pl.)
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: Leslau, Comparative Dictionary of Ge'ez; agbər = servant/slave (household dependent under ownership)
  rationale: El inglés POB eligió 'slaves' deliberadamente en la revisión final (mayo 2026) para preservar el lenguaje de propiedad del ge'ez አግብርት. El español 'esclavos' mantiene esa misma fuerza. 'Siervos' (la forma tradicional de Reina-Valera) suavizaría la relación de dependencia; 'esclavos' respeta la decisión documentada del POB. Nótese que los grupos de Leví, Rubén y Simeón llevan 'cincuenta hombres' (ዕድ / 'ədd), reflejando un vocablo ge'ez distinto para esos contingentes.
- source_word: yāstazānege'ewwo (ge'ez, de la raíz astaznagga'a)
  english_pob_choice: comforted him
  chosen_spanish: consolaron
  alternatives_spanish:
  - alimentaron
  lexicon: Leslau, Comparative Dictionary of Ge'ez; astaznagga'a = consolar, dar consuelo
  rationale: '''Consolaron'' traduce directamente el verbo ge''ez que significa ''consolar/dar consuelo''. La lectura anterior ''los alimentaron'' era error de confusión con otra raíz y fue corregida mediante revisión de fuente (abril 2026). La alternativa se preserva en nota de pie únicamente para documentar la corrección.'
- source_word: tensa tu arco (idioma militar ge'ez)
  english_pob_choice: bend your bow
  chosen_spanish: tensa tu arco
  alternatives_spanish:
  - dobla tu arco
  - prepara tu arco
  lexicon: Uso militar estándar del ge'ez y del hebreo bíblico (דָּרַךְ קֶשֶׁת); pasar la cuerda y tensar el arco
  rationale: En español, 'tensa tu arco' expresa con precisión el acto de armar/preparar el arco para disparar. 'Dobla' podría malentenderse como doblar físicamente la madera; 'tensa' transmite la acción militar de cargar el arco, manteniendo la equivalencia semántica con el original.
- source_word: pariente/kinsman (ge'ez qurb / descendiente de la misma sangre)
  english_pob_choice: kinsman
  chosen_spanish: pariente
  alternatives_spanish:
  - familiar
  - consanguíneo
  lexicon: Ge'ez context de parentesco por sangre / clan
  rationale: '''Pariente'' es el término neutral estándar en español latinoamericano para referirse a un familiar de sangre, y mantiene la dinámica de honor de clan que fundamenta el argumento de Judá. ''Familiar'' es ambiguo (puede referirse a miembro del hogar sin parentesco de sangre); ''consanguíneo'' es excesivamente técnico para prosa narrativa.'
- source_word: strong and warlike (descriptor ge'ez para combatientes selectos)
  english_pob_choice: strong and warlike
  chosen_spanish: fuertes y belicosos
  alternatives_spanish:
  - fuertes y aguerridos
  - fuertes y guerreros
  lexicon: Ge'ez descriptor militar compuesto; cfr. Charles 1895 pp. 226-230
  rationale: '''Fuertes y belicosos'' rinde de forma transparente ''strong and warlike'': ''belicoso'' captura la disposición combativa/marcial. ''Aguerridos'' (endurecido por la batalla) o ''guerreros'' (combatientes) son también defendibles, pero ''belicosos'' permanece más fiel a la fuerza adjetival descriptiva del original sin añadir matices no documentados.'
- source_word: honra / honor (ge'ez kerama; cf. hono[u]r)
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  lexicon: Uso bíblico-narrativo del español; honra = honor personal/de clan
  rationale: '''Honra'' preserva la dimensión de honor personal y de clan implícita en el contexto, y es la forma establecida en el registro narrativo bíblico en español. El moderno ''honor'' es igualmente aceptable, pero ''honra'' encaja mejor con el tono digno y arcaizante de la narración de Jubileos.'
- source_word: 'lo derribó (ge''ez: lo hizo caer / lo echó atrás)'
  english_pob_choice: drove him back
  chosen_spanish: lo derribó
  alternatives_spanish:
  - lo rechazó
  - lo hizo retroceder
  lexicon: Ge'ez verbo de acción bélica; impacto de flecha que derriba
  rationale: En el contexto de una flecha que golpea el pecho izquierdo, 'lo derribó' (knocked him down/back) refleja la consecuencia física del impacto antes del golpe mortal. 'Rechazó' tiene connotaciones de repeler un ataque activo; 'hizo retroceder' es más exacto pero verboso. 'Derribó' es conciso y expresivo dentro de la economía narrativa del pasaje.
theological_decisions:
- issue: Jacob mata a Esaú con una flecha — inversión del relato canónico del Génesis
  english_pob_reading: Then Jacob bent his bow and sent forth an arrow and struck Esau his brother on his right breast and killed him.
  chosen_spanish_reading: Entonces Jacob tensó su arco y lanzó una flecha, y golpeó a Esaú su hermano en el pecho derecho y lo mató.
  rationale: En el Génesis canónico, Esaú sobrevive a Jacob. Jubileos reescribe la historia patriarcal de modo que Jacob mata a Esaú en combate. El texto español no armoniza ni atenúa esta diferencia; se traduce con fidelidad a la fuente ge'ez, preservando la lógica narrativa propia del libro de los Jubileos como literatura del segundo templo.
  doctrine_reference: Comparar Gén 36:6-8; Heb 11:9 — la tradición bíblica canónica no registra esta batalla. El relato de Jubileos es una expansión haggádica autónoma con autoridad textual propia dentro de su corpus.
- issue: Ambigüedad de 'porque tal es él' en el discurso de Judá
  english_pob_reading: for we will not kill your brother, because he is such, and because he is your kinsman we will give him honor
  chosen_spanish_reading: pues no mataremos a tu hermano, porque tal es él, y porque es tu pariente le daremos honra
  alternative_spanish_readings:
  - porque así es él
  - porque eso es él
  rationale: La frase 'porque tal es él' conserva deliberadamente la opacidad del original ge'ez, que parece remitir anafóricamente al hecho de que Esaú es hermano de Jacob sin explicitarlo. Clarificar esta frase introduciría una interpretación no respaldada por la fuente. La ambigüedad está documentada en la versión inglesa del POB y se preserva en español.
  doctrine_reference: Sin referencia doctrinal específica; es decisión de fidelidad textual ante una frase sintácticamente elíptica del original.
translation_notes:
  revision_awareness: 'Este versículo llegó al borrador español tras una cadena de revisiones documentadas (abril–mayo 2026). Dos categorías principales de cambio afectan la traducción española: (1) corrección de error de traducción — el verbo ge''ez yāstazānege''ewwo fue inicialmente renderizado como ''los alimentaron'' (fed) cuando el significado correcto es ''los consolaron'' (comforted/consoled); la revisión del 28 de abril 2026 (adjudicador: auto_apply_tier2_source_grounded) estableció la lectura correcta. (2) Restitución de detalle omitido — los contingentes de cincuenta esclavos/hombres que acompañaban a cada grupo de hijos de Jacob (sur: Judá; este: Leví; norte: Rubén; oeste: Simeón) estaban ausentes del borrador inicial y fueron repuestos a partir del texto ge''ez explícito (ወ፶ ፡ አግብርት/ዕድ ፡ ምስሌሁ/ምስሌሆሙ). La revisión de mayo 2026 (gpt-5.4-mini) también normalizó ''servants'' → ''slaves'' en inglés para consistencia con el lenguaje de propiedad; el español sigue esta decisión con ''esclavos''.
    La fila ge''ez está etiquetada como ''verso 38'' en el corpus de trabajo pero pertenece a la misma unidad narrativa de Jub 37:15 (nota de segmentación documentada en la fuente inglesa).'
  spanish_consistency_notes:
  - «Esclavos» se usa consistentemente para el ge'ez አግብርት (agbərt), siguiendo el valor por defecto del POB para lenguaje de propiedad (equivalente a δοῦλος); los contingentes de los otros grupos usan «hombres» (ዕድ), distinción preservada del texto ge'ez.
  - '«Consolaron» y no «alimentaron»: se sigue la lectura corregida de la fuente ge''ez, no el borrador previo.'
  - 'Nombres propios de tribus en formas españolas bíblicas estándar: Neftalí, Leví, Rubén, Isacar, Zabulón, Simeón, Benjamín, Enoc. Gad y Dan no requieren adaptación.'
  - 'Topónimos: Adurim y monte Seir se mantienen en sus formas transliteradas de la fuente (Charles 1895); Moab, Amón, Filistea, Edom y los horeos se usan en sus formas convencionales del español bíblico.'
  - «Adorán el arameo» preserva el nombre propio de la fuente ge'ez sin equivalencia canónica conocida; no se busca armonización con otras tradiciones.
  - 'La estructura narrativa paralela y repetitiva (sur/este/norte/oeste) se mantiene íntegramente: refleja el estilo del ge''ez y es significativa para la imagen táctica del pasaje.'
  - «Honra» en lugar de «honor» para preservar el registro narrativo digno del texto; ambas formas son admisibles pero «honra» es más resonante en el contexto de clan patriarcal.
