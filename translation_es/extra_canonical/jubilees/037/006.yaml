base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/037/006.yaml
  text: 'with us, we will harm you also. And now listen to us: let us send to Aram and to Philistia and to Moab and to Ammon, and let us choose for ourselves select men, eager for battle, and let us go against him and fight with him and uproot him from the land before he grows strong."'
  revision_pass:
    model: gemini-3.1-pro-preview
    timestamp: '2026-04-23T21:04:24Z'
    unchanged: false
    changes_summary: Changed 'take' to 'choose' to better reflect the root ኅረየ; changed 'chosen' to 'select' to avoid redundancy; changed 'go up against' to 'go against'; changed 'wipe him' to 'uproot him' for a more accurate rendering of ሠረወ.
translation:
  language: es
  text: 'con nosotros, también te haremos daño.[a] Y ahora escúchanos: enviemos a Aram y a Filistea y a Moab y a Amón, y elijamos para nosotros hombres selectos,[b] ávidos de combate, y vayamos contra él y combatamos con él y arranquémoslo[c] de la tierra antes de que se fortalezca.[d]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El versículo comienza en medio de un discurso que continúa desde 37:5; «con nosotros» retoma la condición planteada: si Jacob no acepta someterse, sus enemigos le causarán daño.'
    reason: cross_reference
  - marker: b
    text: Geez ኅሩያነ (ḥruyane) deriva de la misma raíz ኅረየ que el verbo «elijamos» (ንኅረይ). Para evitar la redundancia «elijamos hombres elegidos», el adjetivo se vierte como «selectos», siguiendo la decisión explícita de la revisión del POB inglés.
    reason: lexical_alternative
  - marker: c
    text: 'Geez ሠረወ (śarrawa): arrancar de raíz, extirpar; imagen de extracción radical completa. Alternativa igualmente fiel: «erradiquémoslo».'
    reason: lexical_alternative
  - marker: d
    text: 'Geez የአዝዝ (ye''azez), raíz አዘዘ: puede significar «crecer en poder/fortaleza» o «tomar el mando/dar órdenes». El contexto bélico apoya «se fortalezca»; la lectura «antes de que tome el mando» es igualmente posible desde el original.'
    reason: textual_variant
lexical_decisions:
- source_word: ናሐስም (naḥasem)
  english_pob_choice: we will harm you
  chosen_spanish: te haremos daño
  alternatives_spanish:
  - te causaremos perjuicio
  - te dañaremos
  - te maltrataremos
  lexicon: Geez; raíz ሐሰ/ሐሰሰ — causar mal, perjudicar, dañar
  rationale: La perífrasis 'haremos daño' es la más natural en español neutro moderno para el sentido amenazante del geez y evita el calco 'te harmaremos'. Transmite tanto la intencionalidad como la violencia implícita del original.
- source_word: ስምዐነ (sem'ane)
  english_pob_choice: listen to us
  chosen_spanish: escúchanos
  alternatives_spanish:
  - óyenos
  - atiéndenos
  lexicon: Geez; raíz ሰምዐ — oír, escuchar, obedecer
  rationale: El imperativo 'escúchanos' es la forma más directa y digna en español moderno para el imperativo geez de segunda persona. 'Óyenos' resulta algo arcaico; 'atiéndenos' suaviza demasiado la urgencia del original.
- source_word: ንፈኑ (nefenu)
  english_pob_choice: let us send
  chosen_spanish: enviemos
  alternatives_spanish:
  - mandemos mensajeros a
  lexicon: Geez; raíz ፈነወ — enviar, despachar
  rationale: El cohortativo 'enviemos' traduce con precisión el cohortativo geez. El objeto implícito (mensajeros o emisarios) no se explicita en el texto fuente y se omite en español siguiendo el mismo criterio del POB inglés.
- source_word: ንኅረይ ለርእስነ ኅሩያነ ሰብአ (neḥrey le-re'sena ḥruyane seb'a)
  english_pob_choice: choose for ourselves select men
  chosen_spanish: elijamos para nosotros hombres selectos
  alternatives_spanish:
  - escojamos hombres escogidos
  - seleccionemos hombres elegidos
  lexicon: Geez; raíz ኅረየ — elegir, escoger; el participio ኅሩያነ deriva de la misma raíz
  rationale: 'El geez usa la raíz ኅረየ tanto en el verbo (ንኅረይ = ''elijamos'') como en el adjetivo (ኅሩያነ = ''selectos/elegidos''). La revisión del POB inglés del 23-abr-2026 cambió explícitamente ''chosen men'' por ''select men'' para evitar la redundancia. El español ''elijamos…hombres selectos'' aplica la misma estrategia: ''elijamos…hombres elegidos'' reproduciría la redundancia; ''selectos'' rompe la cadena léxica manteniendo el énfasis sobre la calidad de los hombres reclutados.'
- source_word: ይዳበጉ ውስተ ቀትል (yedabequ westa qetl)
  english_pob_choice: eager for battle
  chosen_spanish: ávidos de combate
  alternatives_spanish:
  - ansiosos por la batalla
  - prestos al combate
  - ardientes para la matanza
  lexicon: Geez; raíz ዳበቀ — precipitarse hacia, ser ardiente/ansioso; ቀትል — matanza, combate, batalla
  rationale: '''Ávidos de combate'' captura el ardor y la urgencia de ዳበቀ mejor que ''ansiosos'', que conlleva cierta ansiedad pasiva. ቀትል designa literalmente matanza/carnicería, pero en contexto militar funciona como combate. ''Combate'' en español conserva la dureza del término sin los matices excesivamente cruentos que podría tener ''matanza'' fuera de contexto.'
- source_word: ንሠርዎ (neśerwo)
  english_pob_choice: uproot him
  chosen_spanish: arranquémoslo
  alternatives_spanish:
  - erradiquémoslo
  - extirpémoslo de raíz
  - desarraiguémoslo
  lexicon: Geez; raíz ሠረወ — arrancar de raíz, extirpar (imagen de planta extraída del suelo)
  rationale: 'La revisión del POB inglés cambió ''wipe him'' por ''uproot him'' para reflejar con exactitud la metáfora radical de ሠረወ. El español ''arranquémoslo'' (de arrancar) replica la misma imagen botánica: extracción violenta desde la raíz. ''Erradiquémoslo'' también sería fiel (lat. radicalis = raíz) pero resulta más abstracto en uso coloquial.'
- source_word: የአዝዝ (ye'azez)
  english_pob_choice: grows strong
  chosen_spanish: se fortalezca
  alternatives_spanish:
  - tome el mando
  - cobre poder
  - se imponga
  lexicon: Geez; raíz አዘዘ — (1) crecer en fuerza, prevalecer; (2) mandar, dar órdenes
  rationale: 'La raíz አዘዘ es semánticamente ambivalente: poder/fuerza física-militar y autoridad/mando. El POB inglés eligió ''grows strong'', priorizando el sentido de ganar poderío. El español ''se fortalezca'' sigue esa elección; la alternativa ''antes de que tome el mando'' es igualmente válida desde el geez y se registra en nota.'
translation_notes:
  revision_awareness: 'La revisión del 23-abr-2026 (gemini-3.1-pro-preview) introdujo tres cambios sustanciales al borrador inglés previo: (1) «choose» en lugar de «take» para reflejar mejor la raíz ኅረየ; (2) «select men» en lugar de «chosen men» para evitar la redundancia léxica producida por el uso de la misma raíz en verbo y adjetivo; (3) «uproot him» en lugar de «wipe him» como traducción más exacta de ሠረወ. La traducción española incorpora explícitamente estas tres decisiones: «elijamos», «hombres selectos» y «arranquémoslo».'
  spanish_consistency_notes:
  - 'Nombres geográficos según convención española estándar: Aram (sin modificación), Filistea (para ፊልስጥኤም), Moab (sin modificación), Amón (con tilde, forma española consolidada de Ammon/עַמּוֹן).'
  - 'Los cohortativos geez se rinden sistemáticamente con subjuntivo en primera persona del plural en español: enviemos, elijamos, vayamos, combatamos, arranquémoslo.'
  - El versículo no contiene ningún nombre divino (יהוה/θεός) ni término teológico de los enumerados en los valores predeterminados del proyecto; las convenciones de traducción para Yahvé, Mesías, δοῦλος, etc. no aplican aquí.
  - El cierre del discurso directo se marca con » al final, coherente con las convenciones de puntuación en español latinoamericano moderno para un parlamento que se inicia en un versículo anterior.
