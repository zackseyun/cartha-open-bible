  text: and bow your neck under his yoke. We will not listen to this word." And they sent to Aram, and to Aduram, the friend of their father, and they hired with them one thousand warriors for battle.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:41Z'
    unchanged: false
    changes_summary: 'Removed the unnecessary pronoun ''you'' for smoother imperative sense, simplified ''this word'' punctuation, and revised the final clause to more directly reflect the Ge''ez: ''one thousand warriors for battle'' instead of the interpretive expansion ''one thousand seasoned warriors, chosen men.'''
translation:
  language: es
  text: y doblen el cuello bajo su yugo. No escucharemos esta palabra.” Y enviaron a Aram y a Aduram, el amigo de su padre, y contrataron con ellos mil guerreros para la batalla.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ታበውአ፡ ክሳደከ፡ ታሕተ፡ አርዑቱ፡
  english_pob_choice: and bow your neck under his yoke
  chosen_spanish: y doblegad vuestro cuello bajo su yugo
  alternatives_spanish:
  - y inclinad vuestro cuello bajo su yugo
  - y someted vuestro cuello bajo su yugo
  lexicon: cuello; yugo; doblar/inclinar
  rationale: La imagen ge'ez conserva el paralelismo corporal de someter el cuello bajo el yugo; en español, 'doblegar el cuello' transmite bien la metáfora de sumisión sin añadir elementos ajenos. 'Vuestro' mantiene el imperativo plural implícito del contexto.
- source_word: '*ኢንሰምዕ፡ ንሕነሰ፡ *ዘንተ፡ ነገረ።'
  english_pob_choice: We will not listen to this word.
  chosen_spanish: No escucharemos esta palabra.
  alternatives_spanish:
  - No oiremos esta palabra.
  - No prestaremos oído a esta palabra.
  lexicon: escuchar/oír; palabra
  rationale: '''Escuchar'' comunica rechazo deliberado de lo dicho, más natural en español que un calco literal de ''oír'' para esta negativa expresa. ''Esta palabra'' sigue de cerca el deíctico del inglés POB y del ge''ez.'
- source_word: ወፈነዉ፡ ውስተ፡ አራም፡ ወኀበ፡ አዱራም፡ ኀበ፡ ዐርከ፡ አቡሆሙ፡
  english_pob_choice: And they sent to Aram, and to Aduram, the friend of their father
  chosen_spanish: Y enviaron a Aram y a Aduram, el amigo de su padre
  alternatives_spanish:
  - Y mandaron a Aram y a Aduram, el amigo de su padre
  - Y enviaron a Aram y a Aduram, amigo de su padre
  lexicon: enviar; amigo del padre
  rationale: '''Enviaron'' refleja de forma directa la acción del original y del POB. Se conserva ''el amigo de su padre'' sin ampliar la identidad de Aduram, porque el texto fuente solo lo describe así.'
- source_word: ፲፻ መስተባእሳነ፡
  english_pob_choice: one thousand warriors for battle
  chosen_spanish: mil guerreros para la batalla
  alternatives_spanish:
  - mil hombres de guerra
  - mil combatientes para la batalla
  lexicon: guerreros; batalla
  rationale: '''Guerreros'' comunica el sentido bélico sin introducir la interpretación adicional de ''escogidos'' o ''experimentados'', que fue eliminada en la revisión inglesa. ''Para la batalla'' reproduce el propósito militar sin exagerar el adjetivo.'
theological_decisions:
- issue: Imperativo plural implícito y tono de sumisión
  english_pob_reading: and bow your neck under his yoke
  chosen_spanish_reading: y doblegad vuestro cuello bajo su yugo
  alternative_spanish_readings:
  - y doblega tu cuello bajo su yugo
  - y someted vuestro cuello bajo su yugo
  rationale: El texto exhorta a someterse al dominio representado por el yugo. En español se preserva la fuerza imperativa plural sin convertirla en una paráfrasis moralizante. No hay cambio doctrinal, pero sí una elección estilística para mantener la dureza de la imagen.
  doctrine_reference: Tema narrativo de sumisión política/violencia; sin carga doctrinal sistemática específica
- issue: Identidad no expandida de Aduram
  english_pob_reading: Aduram, the friend of their father
  chosen_spanish_reading: Aduram, el amigo de su padre
  alternative_spanish_readings:
  - Aduram, amigo de su padre
  - Aduram, el amigo de su padre
  rationale: Se evita identificar a Aduram con más precisión que la que da el texto. La frase queda como un descriptor relacional, no como título o nombre propio ampliado.
  doctrine_reference: Principio de no añadir información no atestiguada por la fuente
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó el pronombre innecesario ''you'' en el primer miembro, simplificó la puntuación de ''this word'' y corrigió la última cláusula para volverla más literal respecto del ge''ez: ''one thousand warriors for battle''. La traducción española sigue esa revisión, evitando añadir ''ustedes'' explícito, manteniendo una negativa directa y usando ''mil guerreros para la batalla'' sin expandir a ''escogidos'' o ''experimentados''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se mantiene un registro sobrio y narrativo, acorde con la prosa de Jubileos.
  - No se introducen notas al pie porque el pasaje no presenta una alternativa textual o semántica que requiera anclaje explícito en el texto español.
