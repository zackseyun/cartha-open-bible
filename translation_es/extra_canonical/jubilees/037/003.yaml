revisions:
- from: '«Jacob es menor; a Jacob tu padre le dio la primogenitura, y a ti te dejó».[a] Y Esaú les dijo: «Porque yo vendí mi primogenitura a Jacob por un pequeño plato de guiso de lentejas. Y el día en que mi padre me envió a cazar y traerle presa, para que comiera y me bendijera, Jacob vino con astucia y llevó a mi padre comida y bebida, y mi padre lo bendijo y me puso bajo su mano. Y ahora nuestro padre nos ha hecho jurar, a mí y a él, que no buscaremos mal el uno contra su hermano».'
  to: '«Jacob es menor; a Jacob tu padre le dio la primogenitura, y a ti te abandonó».[a] Y Esaú les dijo: «Porque yo vendí mi primogenitura a Jacob por un pequeño plato de guiso de lentejas. Y el día en que mi padre me envió a cazar y traerle presa, para que comiera y me bendijera, Jacob vino con astucia y llevó a mi padre comida y bebida, y mi padre lo bendijo y me puso bajo su mano. Y ahora nuestro padre nos ha hecho jurar, a mí y a él, que no buscaremos mal, cada uno contra su hermano»'
  rationale: Se ajusta el pasaje para reflejar con mayor precisión el sentido de abandono en ኀደገ, se mantiene la causalidad de «Porque», se conserva la imagen semítica «bajo su mano», y se pule la cláusula final para un español más natural sin perder el paralelismo recíproco. La nota alternativa se conserva, armonizada con la corrección principal.
  reviewer_model: gpt-5.4
