base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/037/003.yaml
  text: '"Jacob is younger; to Jacob your father gave the birthright, and you he abandoned." And Esau said to them, "For I sold my birthright to Jacob for a little dish of lentil stew. And on the day my father sent me to hunt and bring him game, so that he might eat and bless me, Jacob came by craftiness and brought my father food and drink, and my father blessed him and set me under his hand. And now our father has made us swear, me and him, that we will not seek evil, each against his brother."'
  footnotes:
  - marker: a
    text: Or 'And Esau said to them, "I sold'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:11Z'
    unchanged: false
    changes_summary: Removed redundant 'firstborn birthright' to 'birthright'; supplied the explicit subject 'Jacob' in the second sentence for clarity and completeness; adjusted 'that he might' to 'so that he might'; kept the formal sense of subordination in 'set me under his hand'; and restored the final clause about the father making them swear not to seek evil against one another, which was omitted from the draft.
translation:
  language: es
  text: '«Jacob es menor; a Jacob tu padre le dio la primogenitura, y a ti te abandonó».[a] Y Esaú les dijo: «Porque yo vendí mi primogenitura a Jacob por un pequeño plato de guiso de lentejas. Y el día en que mi padre me envió a cazar y traerle presa, para que comiera y me bendijera, Jacob vino con astucia y llevó a mi padre comida y bebida, y mi padre lo bendijo y me puso bajo su mano. Y ahora nuestro padre nos ha hecho jurar, a mí y a él, que no buscaremos mal, cada uno contra su hermano»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jacob es más joven; a Jacob tu padre le dio la primogenitura, y a ti te abandonó».'
    reason: alternative_reading
lexical_decisions:
- source_word: ያዕቆብ፡ ይንእስ፡ ... ወሀቦ፡ አቡከ፡ ልህቃነ፡ ወኪያከ፡ ኀደገ።
  english_pob_choice: Jacob is younger; ... your father gave the birthright, and you he abandoned
  chosen_spanish: Jacob es menor; ... a ti te dejó
  alternatives_spanish:
  - Jacob es más joven; ... y te abandonó
  - Jacob es el menor; ... y a ti te dejó
  lexicon: Jubileos, relato patriarcal; comparecencia de ይንእስ (ser menor/ younger) y ልህቃነ (derecho de primogenitura / birthright)
  rationale: Mantengo la tensión entre 'más joven' y 'menor' con una redacción natural en español que preserve la comparación de edad/estatus. 'Te dejó' refleja el tono abrupto de ኀደገ mejor que una paráfrasis más suave; el contexto ya explica que Esaú fue desplazado del privilegio.
- source_word: ልህቃነ
  english_pob_choice: birthright
  chosen_spanish: primogenitura
  alternatives_spanish:
  - derecho de primogenitura
  - herencia de primogénito
  lexicon: derecho del primogénito; tradición de herencia familiar
  rationale: '''Primogenitura'' es el equivalente español más establecido y conserva el contenido jurídico-familiar del término sin añadir explicaciones ajenas al texto.'
- source_word: እስመ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conjunción causal
  rationale: Inicio causal directo que corresponde al griego/semítico del pasaje y encaja con el tono explicativo de Esaú.
- source_word: በተጠብቦት፡
  english_pob_choice: by craftiness
  chosen_spanish: con astucia
  alternatives_spanish:
  - con engaño
  - con maña
  lexicon: astucia / craftiness
  rationale: '''Astucia'' conserva la fuerza de maniobra hábil y negativa sin exagerar hacia un engaño que el contexto no explicita de forma única.'
- source_word: ረሰየኒ፡ ታሕተ፡ እዴሁ
  english_pob_choice: set me under his hand
  chosen_spanish: me puso bajo su mano
  alternatives_spanish:
  - me sometió a su autoridad
  - me colocó debajo de su mano
  lexicon: idioma de subordinación/autoridad
  rationale: Se conserva el giro semítico de subordinación sin sustituirlo por una abstracción más interpretativa; 'bajo su mano' mantiene la imagen y el tono del original.
- source_word: ኢነትኃሠሥ፡ በእኩይ፡ አሐዱ፡ ላዕለ፡ እኁሁ
  english_pob_choice: that we will not seek evil, each against his brother
  chosen_spanish: que no buscaremos mal el uno contra su hermano
  alternatives_spanish:
  - que no procuraremos mal uno contra otro
  - que no buscaremos hacer mal al hermano del otro
  lexicon: mal / evil; reciprocal brother language
  rationale: '''Buscar mal'' reproduce el verbo de intención hostil sin ampliar a ''hacer daño'' o ''venganza''. ''El uno contra su hermano'' conserva la reciprocidad y el paralelismo semítico.'
theological_decisions:
- issue: Primogenitura como privilegio pactal/familiar
  english_pob_reading: birthright
  chosen_spanish_reading: primogenitura
  alternative_spanish_readings:
  - derecho de primogénito
  - derecho de primogenitura
  rationale: No se interpreta como un tema doctrinal abstracto, sino como la prerrogativa familiar transmitida por el padre; 'primogenitura' mantiene esa carga histórica y legal.
  doctrine_reference: Génesis 25:31-34; lenguaje bíblico de herencia y prerrogativa del primogénito
- issue: Subordinación expresada con imagen corporal
  english_pob_reading: set me under his hand
  chosen_spanish_reading: me puso bajo su mano
  alternative_spanish_readings:
  - me sometió a su autoridad
  - me puso bajo su autoridad
  rationale: La POB inglesa conserva la imagen de 'hand' por su valor semítico; en español también se retiene la imagen para no perder el color del original ni suavizarla prematuramente.
  doctrine_reference: Uso semítico de 'mano' para poder/autoridad en la Biblia
translation_notes:
  revision_awareness: Se corrigió la falta de la primera cláusula del discurso («Jacob es menor; ...») que estaba ausente en un borrador anterior de la tradición inglesa, y se incorporó el cierre sobre el juramento de no buscar mal entre hermanos, presente en el texto ge'ez y en la revisión inglesa más reciente. La versión española sigue esa estructura completa y evita reducir 'primogenitura' a una glosa redundante.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - '''Primogenitura'' se mantiene como término técnico estable en español bíblico, pero sin imponer una terminología eclesiástica ajena al contexto narrativo.'
  - Se conserva 'mano' en la imagen de subordinación para respetar el semitismo del pasaje.
  - El cierre 'el uno contra su hermano' mantiene reciprocidad literal, sin sustituirla por un plural más interpretativo.
