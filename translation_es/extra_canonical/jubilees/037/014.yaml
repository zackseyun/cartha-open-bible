translation:
  language: es
  text: 'Durante todo esto, Jacob no sabía que venían contra él para matarlo. Y estaba de duelo por Lea, su esposa, hasta que se acercaron a la torre con cuatro mil hombres, guerreros y combatientes escogidos. Entonces le enviaron hombres honorables, diciendo: «Mira, tu hermano ha venido contra ti para combatir contra ti, con cuatrocientos hombres ceñidos con la espada, y llevan escudos y armas de guerra». Porque amaban a Jacob más que a Esaú, y le dijeron que Jacob era un hombre bondadoso y misericordioso, más que Esaú. Entonces Jacob se alarmó cuando se acercaron a la torre, y cerró las puertas de la torre, y se puso sobre las almenas, y habló con su hermano Esaú, y dijo: «El consuelo con que has venido es un buen consuelo, para consolarme acerca de mi esposa que ha muerto. ¿Es este el juramento que juraste a tu padre y a tu madre? Además, antes de que hayan muerto, has quebrantado el juramento, y en el momento en que juraste a tu padre fuiste condenado». Y entonces Esaú respondió y le
    dijo: «No hay juramento justo para los hijos de los hombres, ni para las bestias de la tierra; porque lo que juran, conspiran unos contra otros con maldad, para que cada uno pueda matar a su enemigo y adversario. Y tú me odias a mí y a mis hijos para siempre, y no se guarda hermandad contigo. Oye esta palabra que te declaro: si el jabalí pudiera cambiar su piel y sus cerdas volverse suaves como lana, o si sobre su cabeza brotaran cuernos como los de un ciervo o de una oveja, entonces conservaré la hermandad contigo. Y si los pechos separados de su madre volvieran y mamaran de nuevo, entonces me reconciliaré contigo como hermano. Y si los lobos hacen paz con los corderos, para no devorarlos ni oprimirlos, y si sus corazones son buenos hacia ellos, entonces habrá paz en mi corazón hacia ti. Y si el león se hace amigo del buey y queda uncido con él bajo un mismo yugo, y ara con él y hace paz con él, entonces yo haré paz contigo. Y cuando el cuervo se vuelva blanco como el ave raza[a], entonces
    sabré que te he amado y haré paz contigo. ¡Sé destruido, y sean destruidos tus hijos, y no haya paz para ti!». Y cuando Jacob vio que él era malo en su corazón hacia él, y que con toda su alma intentaba matarlo, y que venía enfurecido como un jabalí salvaje que se lanza sobre la lanza que lo atraviesa y lo mata y no se vuelve atrás de ella, entonces dijo a los suyos y a sus siervos que lo atacaran, junto con todos sus compañeros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre del ave es incierto en ge'ez; algunos intérpretes piensan en una especie notablemente blanca, pero la referencia zoológica exacta no es segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: እሁሁ / throughout all this
  english_pob_choice: Throughout all this
  chosen_spanish: Durante todo esto
  alternatives_spanish:
  - En todo esto
  - A lo largo de todo esto
  lexicon: —
  rationale: La expresión introduce la continuidad narrativa; «Durante todo esto» suena natural en español y conserva la idea de simultaneidad prolongada sin añadir interpretación.
- source_word: ፵፻
  english_pob_choice: four thousand
  chosen_spanish: cuatro mil
  alternatives_spanish:
  - cuatro mil hombres
  lexicon: —
  rationale: El ge'ez lee ፵፻, que corresponde a cuatro mil; se mantiene el dato numérico del testimonio fuente, aun cuando el informe de los mensajeros menciona cuatrocientos.
- source_word: ፬፻
  english_pob_choice: four hundred
  chosen_spanish: cuatrocientos
  alternatives_spanish:
  - cuatrocientos hombres
  lexicon: —
  rationale: El segundo número del pasaje es distinto del primero y debe conservarse; la diferencia numérica forma parte del texto transmitido.
- source_word: ብእሲቱ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: —
  rationale: «Esposa» es más digno y preciso en este contexto narrativo; «mujer» sería posible, pero menos específico en español actual.
- source_word: ቅኑታነ ሰይፍ
  english_pob_choice: girded with the sword
  chosen_spanish: ceñidos con la espada
  alternatives_spanish:
  - ceñidos de espada
  - armados con espada
  lexicon: —
  rationale: Se conserva la imagen de portar la espada ceñida, que es más cercana al giro semítico y más concreta que un simple «armados».
- source_word: ጸጋዊ ወመሓሪ
  english_pob_choice: a gracious and merciful man
  chosen_spanish: un hombre bondadoso y misericordioso
  alternatives_spanish:
  - un hombre lleno de gracia y misericordia
  - un hombre gracioso y misericordioso
  lexicon: —
  rationale: «Gracioso» en español moderno sería equívoco; se opta por «bondadoso» para ጸጋዊ y «misericordioso» para መሓሪ, manteniendo el elogio ético sin perder el matiz de gracia/favor.
- source_word: ኑዛዜ
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - consolación
  - alivio
  lexicon: —
  rationale: Aquí el término expresa el pretendido motivo benigno de Esaú; «consuelo» conserva el valor relacional y no técnico.
- source_word: መሐላ
  english_pob_choice: oath
  chosen_spanish: juramento
  alternatives_spanish:
  - promesa solemne
  - voto
  lexicon: —
  rationale: «Juramento» es el equivalente más directo en español para el acto vinculante de la fórmula del pacto.
- source_word: ካዕበ፡ ዘእንበለ፡ ይመቱ
  english_pob_choice: You have broken the oath
  chosen_spanish: Además, antes de que hayan muerto, has quebrantado el juramento
  alternatives_spanish:
  - Y antes de que mueran, has quebrantado el juramento
  - De nuevo, antes de que hayan muerto, has quebrantado el juramento
  lexicon: —
  rationale: 'Se preserva la tensión textual señalada por la revisión: el pasaje añade una referencia temporal («antes de que hayan muerto») que no debe omitirse. «Además» intenta reflejar el valor discursivo de ካዕበ; la formulación sigue siendo una traducción aproximada por la densidad sintáctica del ge''ez.'
- source_word: በእኩየ
  english_pob_choice: with evil
  chosen_spanish: con maldad
  alternatives_spanish:
  - con lo malo
  - con malicia
  lexicon: —
  rationale: La frase describe la intención engañosa de los juramentos; «maldad» comunica bien el sentido moral y narrativo sin forzar una abstracción excesiva.
- source_word: ሰብአ ክቡርን
  english_pob_choice: honorable men
  chosen_spanish: hombres honorables
  alternatives_spanish:
  - hombres de honor
  - varones distinguidos
  lexicon: —
  rationale: Se conserva el valor de dignidad pública del término sin volverlo eclesiástico.
- source_word: ይትቃተሉከ
  english_pob_choice: fight you
  chosen_spanish: pelear contigo
  alternatives_spanish:
  - combatir contigo
  - luchar contigo
  lexicon: —
  rationale: «Pelear» mantiene el registro narrativo directo y claro, sin exagerar el matiz militar.
- source_word: መፍለስ ዘይመጽእ ውስተ ረምሕ
  english_pob_choice: a wild boar rushing upon the spear
  chosen_spanish: como un jabalí salvaje que se lanza sobre la lanza
  alternatives_spanish:
  - como un jabalí furioso que embiste la lanza
  - como un puerco salvaje que corre contra la lanza
  lexicon: —
  rationale: Se conserva la comparación vívida y la imagen de agresión autodestructiva. «Jabalí salvaje» es una equivalencia natural en español para el referente animal.
theological_decisions:
- issue: La referencia divina o doctrinal es mínima; el pasaje trata la falsedad del juramento, la hostilidad entre hermanos y la providencia narrativa sin formulación explícita de Dios.
  english_pob_reading: No explicit theological gloss beyond the moral contrast between Esau's speech and Jacob's situation.
  chosen_spanish_reading: No se añade glosa doctrinal explícita; se conserva el conflicto moral y familiar tal como aparece en el texto.
  alternative_spanish_readings:
  - Añadir una nota sobre la ética del juramento
  - Introducir una glosa sobre la reconciliación fraterna
  rationale: El deber aquí es no sobredeterminar el texto. La escena debe quedar abierta a su sentido narrativo y moral sin cargarla con interpretaciones externas no atestiguadas por el pasaje.
  doctrine_reference: Principio de sobriedad exegética y respeto al alcance textual
translation_notes:
  revision_awareness: La revisión del inglés corrigió una harmonización errónea de 400 a 4000 para la primera cifra, y señaló una omisión significativa en la cláusula temporal «antes de que hayan muerto». La presente versión conserva ambas cifras distintas (cuatro mil / cuatrocientos) y explicita la cláusula temporal para no perder el matiz del ge'ez. También evita suavizar el lenguaje de hostilidad de Esaú o reemplazar la tensión del juramento por una formulación más general.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - Se mantiene «juramento» de forma consistente para መሐላ.
