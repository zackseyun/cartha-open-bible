revisions:
- from: 'Durante todo esto, Jacob no sabía que venían contra él para matarlo. Y estaba de duelo por Lea, su esposa, hasta que se acercaron a la torre con cuatro mil hombres, guerreros y combatientes escogidos. Entonces le enviaron hombres honorables, diciendo: «Mira, tu hermano ha venido contra ti para pelear contigo, con cuatrocientos hombres ceñidos con la espada, y llevan escudos y armas de guerra». Porque amaban a Jacob más que a Esaú, y le dijeron que Jacob era un hombre bondadoso y misericordioso, más que Esaú. Entonces Jacob se alarmó cuando se acercaron a la torre, y cerró las puertas de la torre, y se puso sobre las almenas, y habló con su hermano Esaú, y dijo: «El consuelo con que has venido es un buen consuelo, para consolarme acerca de mi esposa que ha muerto. ¿Es este el juramento que juraste a tu padre y a tu madre? Además, antes de que hayan muerto, has quebrantado el juramento, y en el momento en que juraste a tu padre fuiste condenado». Y entonces Esaú respondió y le dijo:
    «No hay juramento recto para los hijos de los hombres, ni para las bestias de la tierra; porque lo que juran, conspiran unos contra otros con maldad, para que cada uno pueda matar a su enemigo y adversario. Y tú me odias a mí y a mis hijos para siempre, y no hay con ustedes observancia de hermandad. Oye esta palabra que te declaro: si el jabalí pudiera cambiar su piel y sus cerdas volverse suaves como lana, o si sobre su cabeza brotaran cuernos como los de un ciervo o de una oveja, entonces conservaré la hermandad contigo. Y si las ubres separadas de su madre volvieran y mamaran de nuevo, entonces me reconciliaré contigo como hermano. Y si los lobos hacen paz con los corderos, para no devorarlos ni oprimirlos, y si sus corazones son buenos hacia ellos, entonces habrá paz en mi corazón hacia ti. Y si el león se hace amigo del buey y se une con él bajo un mismo yugo, y ara con él y hace paz con él, entonces yo haré paz contigo. Y cuando el cuervo se vuelva blanco como el ave raza[a], entonces
    sabré que te he amado y haré paz contigo. ¡Sean destruidos, y sean destruidos tus hijos, y no haya paz para ti!» Y cuando Jacob vio que él era malo en su corazón hacia él, y que con toda su alma intentaba matarlo, y que venía enfurecido como un jabalí salvaje que se lanza sobre la lanza que lo atraviesa y lo mata y no se vuelve atrás de ella, entonces dijo a los suyos y a sus siervos que lo atacaran, junto con todos sus compañeros.'
