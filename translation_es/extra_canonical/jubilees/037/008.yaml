  text: 'Pero ellos le dijeron: «Así has actuado desde tu juventud hasta este día, y tú…»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዝኒ፡ *ከመ፡ ገብርከ፡
  english_pob_choice: This is how you have acted
  chosen_spanish: Así has actuado
  alternatives_spanish:
  - Así te has comportado
  - De esta manera has procedido
  lexicon: actuar / comportarse
  rationale: El ge'ez expresa una conducta reiterada o característica; «has actuado» reproduce la valoración directa sin añadir intensificadores como «just» que fueron retirados en la revisión inglesa por no estar sustentados en la fuente.
- source_word: ዘእምውርዝትከ፡
  english_pob_choice: from your youth
  chosen_spanish: desde tu juventud
  alternatives_spanish:
  - desde tu niñez
  - desde tus años jóvenes
  lexicon: juventud
  rationale: La referencia temporal apunta a la etapa temprana de la vida; «juventud» es natural en español bíblico y conserva el alcance amplio del original mejor que una restricción a «niñez».
- source_word: እስከ፡ ዛቲ፡ ዕለት፡
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: día
  rationale: «Este día» sigue de cerca la deixis del original y mantiene el tono acusatorio/formal del pasaje.
- source_word: ወአንተ፡
  english_pob_choice: and you
  chosen_spanish: y tú…
  alternatives_spanish:
  - y tú
  - y en cuanto a ti…
  lexicon: pronombre enfático
  rationale: La revisión inglesa observó que el verso termina en una continuación incompleta; el español conserva esa apertura con puntos suspensivos, reflejando el final abrupto sin cerrarlo artificialmente.
