base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/037/007.yaml
  text: And their father said to them, "Do not go, and do not make war with him, lest you fall."
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:10Z'
    unchanged: false
    changes_summary: Removed 'before him' because it is not clearly represented in the source; otherwise retained the wording and structure.
translation:
  language: es
  text: 'Y su padre les dijo: «No vayan y no hagan guerra con él, no sea que caigan».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አቡሆሙ
  english_pob_choice: their father said to them
  chosen_spanish: su padre les dijo
  alternatives_spanish:
  - su padre les habló
  - el padre de ellos les dijo
  lexicon: אָב / πατήρ / father
  rationale: La construcción posesiva se conserva de manera natural en español con «su padre». «Les dijo» reproduce el acto de hablar directo sin añadir matices inexistentes.
- source_word: ኢትሖሩ
  english_pob_choice: Do not go
  chosen_spanish: No vayan
  alternatives_spanish:
  - No vayan allá
  - No vayan a él
  lexicon: verb of motion
  rationale: El mandato negativo se expresa con el subjuntivo en español. El ge’ez solo exige la prohibición de ir; no se añade un destino explícito.
- source_word: ወኢትግበሩ፡ ምስሌሁ፡ ፀብአ፡
  english_pob_choice: and do not make war with him
  chosen_spanish: y no hagan guerra con él
  alternatives_spanish:
  - y no entren en guerra con él
  - y no combatan con él
  lexicon: war / fight
  rationale: «Hacer guerra» conserva el valor idiomático del original y la fuerza bélica de la frase. «Con él» refleja el objeto personal marcado en el texto fuente.
- source_word: ከመ፡ ኢትደቁ፡
  english_pob_choice: lest you fall
  chosen_spanish: no sea que caigan
  alternatives_spanish:
  - para que no caigan
  - para que no sean derrotados
  lexicon: fall / stumble / perish
  rationale: El verbo del original permite la idea general de caída o desastre. En español, «no sea que caigan» mantiene la advertencia sin especificar derrota militar más allá de lo que el texto evidencia.
theological_decisions:
- issue: Tono de advertencia y resultado implícito
  english_pob_reading: lest you fall
  chosen_spanish_reading: no sea que caigan
  alternative_spanish_readings:
  - para que no caigan
  - no vayan a caer
  rationale: La advertencia se mantiene como posibilidad de caída, sin ampliar el resultado a muerte o derrota explícita, porque el hebraísmo/semítico del giro solo asegura el peligro de caer.
  doctrine_reference: Advertencia narrativa; no introduce una afirmación doctrinal adicional.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «before him» por no estar claramente representado en la fuente. La redacción española omite igualmente cualquier complemento equivalente y se limita a la prohibición y la advertencia final.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «No vayan» mantiene el imperativo negativo natural para una prohibición plural en español.
  - «No sea que caigan» conserva la cautela del original sin sobretraducir el alcance de la caída.
