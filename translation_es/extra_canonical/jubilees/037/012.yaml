translation:
  language: es
  text: «Te mataremos». Y se llenó de ira e indignación cuando vio que sus hijos lo obligaban a ir delante de ellos y guiarlos hasta Jacob, su hermano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ንቀትለከ።
  english_pob_choice: we will kill you
  chosen_spanish: No te mataremos
  alternatives_spanish:
  - Te mataremos
  - Vamos a matarte
  lexicon: ምቅታል / matar
  rationale: La forma geʽez expresa una amenaza directa en primera persona plural; en español, «No te mataremos» conserva esa fuerza sin añadir matices innecesarios. Se evita suavizar a «te haremos daño» porque el inglés POB tomó el verbo fuerte «kill».
- source_word: መዐተ፡ ወቍጥዓ፡
  english_pob_choice: wrath and indignation
  chosen_spanish: ira e indignación
  alternatives_spanish:
  - furor e indignación
  - cólera e indignación
  lexicon: ira / indignación
  rationale: La dobleta semántica se mantiene con dos sustantivos coordinados. «Ira» es más natural en registro bíblico español que «cólera», y conserva bien la intensidad de la lectura inglesa.
- source_word: ይትኤገልዎ፡
  english_pob_choice: were forcing him to go before them and lead them
  chosen_spanish: lo obligaban a ir delante de ellos y guiarlos
  alternatives_spanish:
  - lo forzaban a ir delante de ellos y guiarlos
  - lo compelían a ir delante de ellos y guiarlos
  lexicon: forzar / obligar; ir delante; guiar
  rationale: El verbo geʽez indica coacción. «Obligaban» comunica la presión ejercida sobre él en un español claro y digno. «Ir delante de ellos y guiarlos» reproduce el doble movimiento del inglés POB sin expandir el sentido.
- source_word: ወሉዶ፡
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: hijo / hijo varón
  rationale: El contexto ya identifica a los sujetos como hijos; no hace falta añadir «varones». La posesión se conserva con «sus hijos».
- source_word: ከመ፡ ... ይትኤገልዎ፡ ከመ፡
  english_pob_choice: to lead them to Jacob his brother
  chosen_spanish: y guiarlos hasta Jacob, su hermano
  alternatives_spanish:
  - y conducirlos hasta Jacob, su hermano
  - y llevarlos hasta Jacob, su hermano
  lexicon: guiar / conducir
  rationale: Se mantiene la relación fraterna explicitada por el texto fuente y la lectura inglesa. «Hasta» refleja el destino del desplazamiento y «guiarlos» conserva el sentido de acompañamiento forzado.
theological_decisions:
