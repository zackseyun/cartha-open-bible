lexical_decisions:
- source_word: ወይቤልዎ፡ ለአቡሆሙ
  english_pob_choice: And they said to their father
  chosen_spanish: Y dijeron a su padre
  alternatives_spanish:
  - Y le dijeron a su padre
  - Entonces dijeron a su padre
  lexicon: אמר/λέγω-type speech formula; pronominal indirect object
  rationale: El ge'ez expresa una fórmula directa de habla. «Le dijeron a su padre» conserva la relación pronominal; «a su padre» sigue la sintaxis natural del español sin añadir matices.
- source_word: ፃእ፡
  english_pob_choice: Go out
  chosen_spanish: Sal
  alternatives_spanish:
  - Ve afuera
  - Sal fuera
  lexicon: salir
  rationale: La orden es imperativa y concreta. «Sal» es el equivalente más natural y fiel en español; evita el calco innecesario de una construcción duplicada.
- source_word: '*ምስሌሆሙ፡'
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  - en compañía de ellos
  lexicon: preposición de compañía
  rationale: «Con ellos» reproduce de modo directo la relación de compañía del original. La opción «junto con ellos» es posible, pero más pesada para el ritmo del verso.
- source_word: ወምርሖሙ፡
  english_pob_choice: and lead them
  chosen_spanish: y condúcelos
  alternatives_spanish:
  - y guíalos
  - y llévalos
  lexicon: conducir/guía
  rationale: El verbo indica dirigir al grupo. «Condúcelos» mantiene la fuerza de mando y dirección del texto; «guíalos» suaviza un poco el tono, y «llévalos» puede sonar menos preciso.
theological_decisions:
- issue: Truncation of the verse in the source packet
  english_pob_reading: And they said to their father, "Go out with them and lead them; and if not,
  chosen_spanish_reading: 'Y dijeron a su padre: «Sal con ellos y condúcelos; y si no,'
  alternative_spanish_readings:
  - 'Y dijeron a su padre: «Sal con ellos y guíalos; y si no,'
  - 'Y dijeron a su padre: «Sal con ellos y llévalos; y si no,'
  rationale: El packet fuente y la POB inglesa terminan de forma incompleta. Para no inventar el final, la versión española también queda abierta en el mismo punto, respetando la interrupción del testimonio disponible.
  doctrine_reference: Fidelidad textual / integridad del testimonio transmitido
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios y que el acuerdo entre testigos fue alto; por eso se mantiene la lectura inglesa auditada y se refleja la misma truncación en español.
  spanish_consistency_notes:
  - Se usa «padre» sin mayúscula porque el contexto no exige tratamiento honorífico especial.
  - Se prefirió el imperativo singular «Sal» y «condúcelos» para conservar la fuerza directa del mandato.
  - Se dejó el corte final con nota porque la fuente y la traducción inglesa auditada terminan incompletas.
