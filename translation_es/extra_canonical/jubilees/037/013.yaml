translation:
  language: es
  text: Él fue delante para guiarlos hasta Jacob su hermano. Entonces recordó[a] todo el mal que había estado oculto en su corazón contra Jacob su hermano, y no recordó el juramento que había jurado a su padre y a su madre, que no buscaría ningún mal contra Jacob todos sus días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Entonces recordó'.
    reason: previous_rendering
  - marker: b
    text: O 'contra Jacob su hermano todos sus días'.
    reason: textual_variant
lexical_decisions:
- source_word: ይሖር፡ ቅድመ፡ ይምርሖሙ፡ ኀበ፡ ያዕቆብ፡ እኁሁ።
  english_pob_choice: He went in front to lead them to Jacob his brother.
  chosen_spanish: Él fue delante para guiarlos hasta Jacob su hermano.
  alternatives_spanish:
  - Fue delante para conducirlos hasta Jacob su hermano.
  - Iba delante para llevarlos hasta Jacob su hermano.
  lexicon: go in front / lead
  rationale: El geʽez contiene tanto la idea de ir delante como la de guiarlos. "Fue delante" conserva el movimiento narrativo, y "para guiarlos hasta" expresa la función directiva sin sobretraducir. Se mantiene "su hermano" por correspondencia explícita con እኁሁ.
- source_word: ተዘከረ፡
  english_pob_choice: Then he remembered
  chosen_spanish: Entonces recordó
  alternatives_spanish:
  - Entonces se acordó
  - Entonces vino a su memoria
  lexicon: remember
  rationale: La revisión muestra que la frase inicial omitida en el inglés debe estar presente. "Recordó" es natural en español y conserva el hecho de memoria interior sin añadir matices no evidentes.
- source_word: ኵሎ፡ እኩየ፡ *እንተ፡ ሀለወት፡ ውስተ፡ ልቡ፡
  english_pob_choice: all the evil that had been hidden in his heart
  chosen_spanish: todo el mal que había estado oculto en su corazón
  alternatives_spanish:
  - toda la maldad que había estado escondida en su corazón
  - todo el mal escondido en su corazón
  lexicon: evil hidden in his heart
  rationale: '"Mal" sigue el campo semántico del texto y evita intensificar a "maldad" donde el sustantivo puede ser más general. "Había estado oculto" refleja el participio/pasado de estado, y "en su corazón" preserva la localización interna.'
- source_word: መሐላ፡
  english_pob_choice: the oath
  chosen_spanish: el juramento
  alternatives_spanish:
  - el voto
  - la promesa jurada
  lexicon: oath
  rationale: '"Juramento" es el equivalente estándar y formal para una obligación bajo pacto; mantiene el peso legal del término mejor que "promesa".'
- source_word: ኵሎ፡ እኩየ፡ *ኵሎ፡ መዋዕሊሁ፡ *ላዕሌሁ፡ ለያዕቆብ፡
  english_pob_choice: that he would not seek any evil against Jacob all his days.
  chosen_spanish: que no buscaría ningún mal contra Jacob todos sus días.
  alternatives_spanish:
  - que no buscaría mal alguno contra Jacob todos sus días
  - que no se propondría ningún mal contra Jacob en todos sus días
  lexicon: seek any evil / all his days / against Jacob
  rationale: Se conserva la estructura negativa y la restricción temporal completa. El ajuste de la revisión deja fuera "su hermano" al final, porque el geʽez no lo repite en esa clausula final.
theological_decisions:
- issue: Redundant mention of Jacob as brother in the final clause
  english_pob_reading: against Jacob his brother all his days
  chosen_spanish_reading: contra Jacob todos sus días
  alternative_spanish_readings:
  - contra Jacob su hermano todos sus días
  - contra Jacob, su hermano, todos sus días
  rationale: La corrección textual indica que el geʽez final solo dice "contra Jacob". Se conserva la repetición de "su hermano" en las menciones previas, pero no se la arrastra indebidamente a la cláusula final.
  doctrine_reference: Textual fidelity / source-critical accuracy
- issue: Interior evil remembered before the oath is not softened
  english_pob_reading: he remembered all the evil that had been hidden in his heart ... and he did not remember the oath
  chosen_spanish_reading: recordó todo el mal que había estado oculto en su corazón ... y no recordó el juramento
  alternative_spanish_readings:
  - se acordó de todo el mal que había estado oculto en su corazón ... y no se acordó del juramento
  - trajo a la memoria todo el mal que había estado oculto en su corazón ... y no trajo a la memoria el juramento
  rationale: El texto subraya el contraste entre memoria del mal y olvido del juramento. La traducción mantiene esa tensión sin explicarla ni atenuarla.
  doctrine_reference: Narrative moral emphasis
translation_notes:
  revision_awareness: La versión anterior omite la primera proposición del versículo; esta redacción la restaura. También atiende la revisión textual que elimina 'su hermano' de la cláusula final, aunque lo conserva en las referencias anteriores porque allí sí está en el geʽez. Los marcadores de nota se anclan ahora explícitamente en el texto.
  spanish_consistency_notes:
  - Se usa 'Jacob' de forma uniforme para el nombre propio.
  - Se mantiene 'su hermano' en las dos primeras referencias, conforme al geʽez.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes.
  - La puntuación separa las dos grandes acciones narrativas con un punto.
  - Los marcadores de nota están presentes exactamente en el texto donde se anclan.
