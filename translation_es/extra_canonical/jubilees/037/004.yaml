translation:
  language: es
  text: Pero ahora nuestro padre nos[a] hizo jurar, a mí y a él, que no buscaríamos el mal, cada uno contra su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'me hizo jurar, a mí y a él'.
    reason: Preserva la alternativa documentada en la nota del POB inglés sobre una lectura singular previa.
lexical_decisions:
- source_word: made us swear
  english_pob_choice: made us swear
  chosen_spanish: nos hizo jurar
  alternatives_spanish:
  - nos obligó a jurar
  - nos hizo prometer bajo juramento
  lexicon: jurar
  rationale: El inglés revisado corrige el sujeto/objeto a plural ('made us swear'). En español, 'nos hizo jurar' conserva el valor causativo y jurídico del juramento sin añadir una paraphrase excesiva.
- source_word: our father
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro padre
  lexicon: padre
  rationale: Se mantiene la referencia familiar directa y natural en español, sin necesidad de expansión.
- source_word: each against his brother
  english_pob_choice: each against his brother
  chosen_spanish: el uno contra su hermano
  alternatives_spanish:
  - cada uno contra su hermano
  - uno contra su hermano
  lexicon: cada uno / el uno
  rationale: La construcción refleja la reciprocidad distributiva del inglés y evita suavizar la tensión relacional del original.
theological_decisions:
- issue: Negarse a buscar el mal contra un hermano
  english_pob_reading: we should not seek evil, each against his brother
  chosen_spanish_reading: que no buscaríamos el mal el uno contra su hermano
  alternative_spanish_readings:
  - que no buscaríamos mal el uno contra su hermano
  - que no procuraríamos el mal contra su hermano
  rationale: '''Buscar el mal'' conserva la fuerza intencional y moral del inglés, en vez de interpretarlo como mero daño accidental.'
  doctrine_reference: Ética fraterna / prohibición de hostilidad entre hermanos
translation_notes:
  revision_awareness: La revisión reciente corrigió el error anterior de número en 'made us swear' y no introdujo cambios posteriores; por eso la redacción española sigue el plural coherente con el inglés auditado.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o sustituciones litúrgicas porque el versículo no involucra el nombre divino.
  - Se prefirió 'jurar' frente a 'prometer' para conservar la fuerza del juramento.
  - No se añadió nota al pie porque no queda una alternativa textual documentada que requiera anclaje en el verso.
