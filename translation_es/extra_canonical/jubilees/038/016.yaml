translation:
  language: es
  text: Y estos son los reyes que reinaron en Edom antes de que reinara un rey sobre los hijos de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ነገሥት
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - soberanos
  lexicon: reyes
  rationale: El geʽez usa el plural de «rey», y la equivalencia directa en español es «reyes». Mantiene la relación simple y narrativa del texto sin añadir matices políticos no presentes.
- source_word: እለ፡ ነገሡ፡ በ*ኤዶም፡
  english_pob_choice: who reigned in Edom
  chosen_spanish: que reinaron en Edom
  alternatives_spanish:
  - que gobernaron en Edom
  - que fueron reyes en Edom
  lexicon: reinar
  rationale: «Reinaron» reproduce el verbo de gobierno real del original y conserva el paralelismo con «reinara» más adelante. «Gobernaron» sería más general y menos preciso.
- source_word: ዘእንበለ፡
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - previo a que
  lexicon: antes de
  rationale: La construcción temporal del texto compara dos reinados. En español, «antes de que» permite conservar con naturalidad el valor preposicional-oracional del original sin perder claridad.
- source_word: ይንግሥ፡ ንጉሥ፡
  english_pob_choice: a king reigned
  chosen_spanish: reinara un rey
  alternatives_spanish:
  - reinaría un rey
  - reinó un rey
  lexicon: reinar
  rationale: El subjuntivo «reinara» encaja con «antes de que» y refleja la subordinación temporal. «Un rey» mantiene el sustantivo explícito del geʽez y del inglés POB.
- source_word: ለውሉደ፡ እስራኤል፡
  english_pob_choice: over the children of Israel
  chosen_spanish: sobre los hijos de Israel
  alternatives_spanish:
  - sobre los hijos de Israel
  - sobre el pueblo de Israel
  lexicon: hijos de Israel
  rationale: Se preserva la expresión tradicional y literal del original y del inglés POB. Aunque «pueblo de Israel» sería más idiomático, suaviza la fórmula heredada por el texto.
theological_decisions:
- issue: Título real en Edom y referencia histórica comparativa
  english_pob_reading: And these are the kings who reigned in Edom before a king reigned over the children of Israel.
  chosen_spanish_reading: Y estos son los reyes que reinaron en Edom antes de que reinara un rey sobre los hijos de Israel.
  alternative_spanish_readings:
  - Y estos son los reyes que gobernaron en Edom antes de que hubiera un rey sobre los hijos de Israel.
  - Y estos son los reyes de Edom, anteriores al reinado de un rey sobre los hijos de Israel.
  rationale: El texto presenta una comparación histórica neutral, no una interpretación teológica desarrollada. La versión española conserva esa relación cronológica sin intensificarla ni explicarla más allá del dato narrativo.
  doctrine_reference: Narrative-historical statement; no doctrinal expansion required.
translation_notes:
  revision_awareness: La revisión inglesa solo añadió puntuación final; no afectó el contenido léxico ni la estructura. La versión española sigue de cerca esa forma final con puntuación estándar.
  spanish_consistency_notes:
  - Se usa «Edom» con grafía común en español bíblico.
  - Se mantiene la fórmula «hijos de Israel» por fidelidad al original y al registro bíblico tradicional.
  - No se introduce «Cristo», «SEÑOR» ni otros equivalentes no presentes en el verso.
