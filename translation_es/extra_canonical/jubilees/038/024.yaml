  rationale: 'Se mantiene intacto el texto principal porque es fiel al ge''ez y al POB inglés auditado. Solo se corrige el aparato de notas: se reemplaza la nota errónea y redundante sobre «Mayṭabigo» por la variante realmente documentada «Meṭabigo», y se elimina la nota infundada sobre «Metebedzaab».'
