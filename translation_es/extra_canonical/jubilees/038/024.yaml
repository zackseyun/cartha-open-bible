lexical_decisions:
- source_word: ወሞተ፡
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - murió
  lexicon: morrer / morir
  rationale: El ge'ez expresa la acción simple de morir; en español, «murió» es directo, claro y fiel al hecho narrado.
- source_word: ህየንቴሁ፡
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su lugar
  - en su stead
  lexicon: sustitución / sucesión
  rationale: Sigo la revisión del inglés que corrige «after him» a «in his place». En español, «en su lugar» comunica con naturalidad la sucesión en el oficio.
- source_word: መይጠቢጎ፡
  english_pob_choice: Mayṭabigo
  chosen_spanish: Mayṭabigo
  alternatives_spanish:
  - Maṭabigo
  - Meṭabigo
  lexicon: transliteración de nombre propio
  rationale: Conservo la forma con y que el audit trail corrige como lectura ge'ez correcta; no la adapto al español porque es un nombre propio no traducible.
- source_word: ወለተ፡
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - hija de
  lexicon: genealogical relation
  rationale: La fórmula genealógica se vierte de manera estándar y transparente como «hija de».
theological_decisions:
- issue: Fórmula de sucesión real
  english_pob_reading: reigned in his place
  chosen_spanish_reading: reinó en su lugar
  alternative_spanish_readings:
  - reinó en su lugar
  - reinó después de él
  rationale: No hay una tensión teológica especial; la cuestión es lexical y formulaica. Mantengo la idea de sucesión legítima y directa que refleja el ge'ez y la revisión inglesa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La revisión inglesa corrigió dos puntos relevantes: (1) ህየንቴሁ debe entenderse como «in his place», no simplemente «after him»; por eso el español usa «en su lugar». (2) La forma ge''ez del nombre es Mayṭabigo, con y; por eso la transliteración principal conserva esa consonante.'
  spanish_consistency_notes:
  - Usé nombres propios transliterados de forma consistente porque el pasaje es genealógico y no hay equivalente español establecido.
  - Mantuve una sintaxis paratáctica cercana al original, adecuada para una lista genealógica.
  - Evité «Cristo», «SEÑOR» u otras sustituciones no pertinentes al texto.
