translation:
  language: es
  text: Y murió Baelunán, hijo de Achbor, y reinó Adath en su lugar; y el nombre de su esposa fue Mayṭabigo[a], hija de Maṭarego, hija de Metebedzaab.
  philosophy: optimal-equivalence
