lexical_decisions:
- source_word: እሉ፡ ነገሥት፡
  english_pob_choice: These are the kings
  chosen_spanish: Estos son los reyes
  alternatives_spanish:
  - Estos son los monarcas
  - Estos son los soberanos
  lexicon: እሉ -> estos; ነገሥት -> reyes
  rationale: El ge'ez usa un demostrativo plural seguido de 'reyes'; en español, 'Estos son los reyes' conserva la identificación de un grupo ya mencionado o enumerado, con registro natural y fiel.
- source_word: እለ፡ ነገሡ፡
  english_pob_choice: who reigned
  chosen_spanish: que reinaron
  alternatives_spanish:
  - que gobernaron
  - que ejercieron el reinado
  lexicon: እለ -> que; ነገሡ -> reinaron
  rationale: El verbo expresa la acción de reinar; 'reinaron' reproduce de forma directa la relación verbal sin añadir matices ajenos como dominio político general.
- source_word: በምድረ፡ ኤዶም።
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en el país de Edom
  - en la región de Edom
  lexicon: በምድረ -> en la tierra de; ኤዶም -> Edom
  rationale: '''Tierra'' corresponde bien al valor territorial del original y mantiene la formulación bíblica tradicional sin ocultar el nombre propio Edom.'
