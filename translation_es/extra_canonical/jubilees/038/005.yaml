    issue: '''cincuenta esclavos'' endurece indebidamente el valor de ''servants'' del audit trail inglés'
    rationale: El expediente inglés no documenta una decisión para intensificar a 'slave/esclavo'. Cambiar a 'esclavos' introduce una precisión social más fuerte que no está sustentada por la evidencia provista.
  - severity: low
    issue: La justificación léxica del borrador contradice el audit trail inglés
    rationale: Afirma que la POB inglesa eligió 'servants' para reflejar un valor léxico fuerte, pero el texto inglés efectivamente usa 'servants', no 'slaves'. La revisión debe alinearse con el expediente.
  - severity: low
    issue: La cláusula final puede sonar más natural en español con sujeto explícito
    rationale: '''No escapó de ellos ni uno solo'' es comprensible, pero ''ninguno de ellos escapó, ni uno solo'' refleja más directamente ''none of them escaped, not even one'' y mejora la fluidez.'
  revised_spanish_text: Y Judá salió primero, y Neftalí y Gad con él, y cincuenta siervos con él, hacia el lado sur de la torre; y mataron a todos los que hallaron delante de ellos, y ninguno de ellos escapó, ni uno solo.
  revision_rationale: 'Se revisa ''esclavos'' a ''siervos'' para seguir más fielmente el audit trail inglés (''servants'') sin introducir una intensificación social no documentada. También se suaviza la cláusula final a una forma más natural en español y más cercana al inglés auditado: ''ninguno de ellos escapó, ni uno solo''. No se requieren notas.'
