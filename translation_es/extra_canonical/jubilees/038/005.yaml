  yaml_path: translation/extra_canonical/jubilees/038/005.yaml
  text: And Judah went out first, and Naphtali and Gad with him, and fifty servants with him, toward the south side of the tower; and they killed all whom they found before them, and none of them escaped, not even one.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:13Z'
    unchanged: false
    changes_summary: Changed 'in front' to 'first' for more natural formal English and adjusted 'not one of them escaped' to 'none of them escaped' for smoother style while preserving the emphatic 'not even one.'
translation:
  language: es
  text: Y Judá salió primero, y Neftalí y Gad con él, y cincuenta siervos con él, hacia el lado sur de la torre; y mataron a todos los que hallaron delante de ellos, y ninguno de ellos escapó, ni uno solo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወወፅአ፡ ... ፍጹመ
  english_pob_choice: And Judah went out first
  chosen_spanish: Y Judá salió primero
  alternatives_spanish:
  - Y Judá salió en primer lugar
  - Y Judá salió delante
  lexicon: salir; primero
  rationale: El ge'ez indica que Judá salió el primero. «Primero» conserva la prioridad temporal y evita la imagen espacial más débil de «delante».
- source_word: ወ*፶*ደቅ፡ ምስሌሁ
  english_pob_choice: and fifty servants with him
  chosen_spanish: y cincuenta esclavos con él
  alternatives_spanish:
  - y cincuenta siervos con él
  - y cincuenta servidores con él
  lexicon: esclavo
  rationale: La POB inglesa eligió «servants» para reflejar el valor léxico fuerte; en español, «esclavos» preserva mejor esa fuerza que «siervos», que suena más eclesiástico y menos literal.
- source_word: እንተ፡ ገጸ፡ ደቡብ፡ ለማኅፈድ
  english_pob_choice: toward the south side of the tower
  chosen_spanish: hacia el lado sur de la torre
  alternatives_spanish:
  - hacia el lado meridional de la torre
  - hacia el costado sur de la torre
  lexicon: lado sur; torre
  rationale: «Hacia el lado sur de la torre» comunica de forma natural la localización direccional sin añadir matices no presentes en el original.
- source_word: ወቀተሉ፡ ኵሎ፡ ዘረከቡ፡ በቅድሜሆሙ
  english_pob_choice: and they killed all whom they found before them
  chosen_spanish: y mataron a todos los que hallaron delante de ellos
  alternatives_spanish:
  - y mataron a todos los que encontraron ante sí
  - y dieron muerte a todos los que se encontraron delante de ellos
  lexicon: matar; hallar delante de
  rationale: «Hallaron delante de ellos» mantiene el sentido de encuentro directo y el orden de la frase. «Encontraron» es posible, pero «hallaron» se alinea mejor con el registro bíblico sin arcaísmo excesivo.
- source_word: ወአልቦ፡ ዘአምለጠ፡ እምኔሆሙ፡ ወአሐዱኒ
  english_pob_choice: and none of them escaped, not even one
  chosen_spanish: y no escapó de ellos ni uno solo
  alternatives_spanish:
  - y ninguno de ellos escapó, ni uno solo
  - y no se les escapó ninguno, ni uno
  lexicon: escapar; ni uno solo
  rationale: «No escapó de ellos ni uno solo» reproduce el énfasis absoluto del ge'ez y del inglés, manteniendo el negativo reforzado con una fórmula natural en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «first» frente a «in front» y «none of them escaped» frente a «not one of them escaped», reflejando en español «salió primero» y «no escapó de ellos ni uno solo» para conservar el énfasis sin forzar la sintaxis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «esclavos» según la fuerza léxica del texto fuente y la pauta del proyecto para δοῦλος cuando corresponde.
  - No se añadieron notas al pie porque no hay variante textual o ambigüedad que requiera anclaje explícito en esta línea.
