translation:
  language: es
  text: Y después de esto, los hijos de Jacob salieron, ellos y sus esclavos, dividiéndose en cuatro líneas de batalla.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ܘܐܢܚܢܕܝܢ / 'went out'
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - partieron
  lexicon: out -> salir
  rationale: '''Salieron'' reproduce de manera natural el movimiento de salida indicado por el texto y conserva el tono narrativo breve del original.'
- source_word: sons of Jacob
  english_pob_choice: sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los descendientes de Jacob
  - los hijos de Jacob
  lexicon: sons -> hijos
  rationale: Se mantiene la formulación directa y bíblica 'los hijos de Jacob', que es fiel y transparente en español.
- source_word: servants
  english_pob_choice: servants
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus criados
  lexicon: δουλος -> esclavo
  rationale: Aunque el etíope aporta el sustantivo para los subordinados del grupo, en la línea terminológica del POB 'esclavos' conserva la fuerza social del término sin suavizarla a 'siervos'.
- source_word: dividing themselves
  english_pob_choice: dividing themselves
  chosen_spanish: dividiéndose
  alternatives_spanish:
  - se dividieron
  - se separando
  lexicon: gerund / reciprocal division
  rationale: El gerundio español 'dividiéndose' refleja el participio/gerundio verbal del ge'ez y conserva la idea de auto-distribución del grupo sin añadir elementos ajenos.
- source_word: four battle lines
  english_pob_choice: four battle lines
  chosen_spanish: en cuatro líneas de batalla
  alternatives_spanish:
  - en cuatro filas de combate
  - en cuatro líneas de guerra
  lexicon: military formation
  rationale: '''Líneas de batalla'' comunica el sentido militar con naturalidad en español y sigue de cerca la decisión auditada del inglés POB.'
theological_decisions:
- issue: Military organization of Jacob's group
  english_pob_reading: dividing themselves into four battle lines
  chosen_spanish_reading: dividiéndose en cuatro líneas de batalla
  alternative_spanish_readings:
  - dividiéndose en cuatro divisiones de batalla
  - repartiéndose en cuatro líneas de batalla
  rationale: No hay una carga doctrinal especial, pero sí una imagen militar concreta. Se preserva sin suavizarla ni transformar la escena en una mera distribución logística.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la omisión de la idea de 'dividiéndose' y eliminó 'with them'; por eso el español incluye explícitamente el gerundio y no añade un equivalente de 'con ellos'.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' y no 'Ya'qub' para coherencia bíblica en español.
  - Se usa 'líneas de batalla' en vez de una paráfrasis interpretativa más amplia.
  - No se introduce nota al pie porque no hay una variante textual que requiera anclaje explícito en esta unidad.
