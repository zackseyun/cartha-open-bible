translation:
  language: es
  text: En aquel tiempo Jacob tensó su arco y lanzó una flecha, y alcanzó a Esaú, su hermano, en el lado derecho del pecho, y lo mató.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይእተ፡' ሶቤ፡
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: Temporal formula
  rationale: La fórmula temporal admite varias equivalencias; «En aquel tiempo» conserva el valor narrativo sin volverla excesivamente moderna ni demasiado interpretativa.
- source_word: ወሰቀ፡ ያዕቆብ፡ ቀስተ፡
  english_pob_choice: Jacob bent his bow
  chosen_spanish: Jacob tensó su arco
  alternatives_spanish:
  - Jacob inclinó su arco
  - Jacob dobló su arco
  lexicon: Arma / acción verbal
  rationale: El verbo ge'ez sugiere el gesto de preparar el arco para disparar. «Tensó» comunica con naturalidad y precisión esa acción en español.
- source_word: ወፈነወ፡ ፡' ሐጸ፡
  english_pob_choice: and sent out an arrow
  chosen_spanish: y lanzó una flecha
  alternatives_spanish:
  - y disparó una flecha
  - y envió una flecha
  lexicon: Acción de tiro con arco
  rationale: «Lanzó» es una forma idiomática y clara en español para el disparo de una flecha; mantiene la imagen sin calco excesivo.
- source_word: ወነደፎ፡ ለዔሳው፡ እኁሁ፡ *ጥቦ፡ የማናዊ፡
  english_pob_choice: and struck Esau his brother in the right breast
  chosen_spanish: e hirió a Esaú, su hermano, en el pecho derecho
  alternatives_spanish:
  - e hirió a Esaú, su hermano, en el lado derecho del pecho
  - y alcanzó a Esaú, su hermano, en el pecho derecho
  lexicon: Anatomical phrase
  rationale: Se mantiene «pecho derecho» como equivalente directo del ge'ez y del inglés auditado. «En» reproduce bien la localización interna de la herida, y la especificación «derecho» conserva la precisión del texto.
- source_word: ወገደሎ።
  english_pob_choice: and killed him
  chosen_spanish: y lo mató
  alternatives_spanish:
  - y lo mató allí
  - y lo dio muerte
  lexicon: Narrative death formula
  rationale: La expresión breve y directa coincide con la fuerza narrativa del original y del inglés POB, sin añadir elementos no atestiguados.
theological_decisions:
- issue: Violencia narrativa y literalidad del relato
  english_pob_reading: Jacob physically killed Esau in the scene as translated
  chosen_spanish_reading: Jacob mató a Esaú en la escena narrada
  alternative_spanish_readings:
  - Jacob derrotó a Esaú
  - Jacob hirió mortalmente a Esaú
  rationale: El texto fuente y el audit trail en inglés presentan una acción directa de muerte; no corresponde suavizarla a mera derrota o herida mortal si el original afirma mató.
  doctrine_reference: Fidelity to source narrative; no doctrinal smoothing
- issue: Relación fraterna en la escena
  english_pob_reading: Esau his brother
  chosen_spanish_reading: Esaú, su hermano
  alternative_spanish_readings:
  - Esaú su hermano
  - su hermano Esaú
  rationale: Se conserva la aposición fraterna explícita como en el original y en el inglés auditado, sin enfatizar más de lo necesario.
  doctrine_reference: Narrative precision
- issue: Precisión espacial de la herida
  english_pob_reading: in the right breast
  chosen_spanish_reading: en el pecho derecho
  alternative_spanish_readings:
  - en el lado derecho del pecho
  - en el seno derecho
  rationale: «En el pecho derecho» traduce de manera fiel y publicable la localización del impacto. Se evita «seno» por su posible tono arcaico o ambiguo en español actual.
  doctrine_reference: Lexical precision
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión menor de 'on the right breast' a 'in the right breast' por naturalidad, sin cambio de sentido. La versión española sigue esa localización interna con «en el pecho derecho».
  spanish_consistency_notes:
  - Se mantiene «Jacob» y «Esaú» como nombres propios bíblicos usuales en español.
  - Se prefiere un registro bíblico claro y moderno, evitando arcaísmos innecesarios.
  - No se introducen notas al pie porque no hay variantes textuales o semánticas obligatorias que el español requiera explicitar aquí.
