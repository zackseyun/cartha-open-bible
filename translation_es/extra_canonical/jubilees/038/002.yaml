  source_alignment_summary: 'El borrador sigue bien el sentido básico del ge''ez y del inglés POB: marco temporal, preparación del arco, disparo de la flecha, impacto en Esaú y resultado mortal. Sin embargo, «hirió» atenúa ligeramente el valor de «struck» y «pecho derecho» suena menos natural que una formulación anatómica más clara en español.'
