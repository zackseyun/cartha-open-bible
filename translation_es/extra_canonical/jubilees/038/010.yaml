translation:
  language: es
  text: Pero Jacob sepultó a su hermano en el monte[a] que está en Adurim, y volvió a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'montaña'. El ge'ez aquí señala un accidente topográfico, no una región en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወያዕቆብሰ፡ ... እኅዋሁ፡
  english_pob_choice: Jacob buried his brother
  chosen_spanish: Jacob sepultó a su hermano
  alternatives_spanish:
  - Jacob enterró a su hermano
  - Jacob dio sepultura a su hermano
  lexicon: Jacob / enterrar / sepultar
  rationale: El ge'ez indica que Jacob realizó el entierro de su hermano. 'Sepultó' conserva el sentido formal y narrativo de un acto funerario deliberado, y evita la posible banalidad de 'enterró'. 'Dio sepultura' es una opción válida, pero menos directa.
- source_word: ወገር፡ ... ውስተ፡ አዱፊም፡
  english_pob_choice: in the mountain that is in Adurim
  chosen_spanish: en el monte[a] que está en Adurim
  alternatives_spanish:
  - en la montaña que está en Adurim
  - en la región que está en Adurim
  - en la comarca que está en Adurim
  lexicon: wagar
  rationale: La revisión más reciente que sustituyó 'mountain' por 'region' fue rechazada en el control posterior, porque el término ge'ez corresponde mejor a una referencia topográfica concreta. En español, 'monte' comunica bien esa forma y mantiene la ambigüedad natural entre monte/montaña/cerro sin perder el dato geográfico.
- source_word: ወገብአ፡ ውስተ፡ ቤቱ።
  english_pob_choice: and he returned to his house
  chosen_spanish: y volvió a su casa
  alternatives_spanish:
  - y regresó a su casa
  - y retornó a su casa
  lexicon: return / house
  rationale: '''Volvió a su casa'' es la forma más natural y fiel al cierre narrativo del versículo. ''Casa'' refleja el hebraísmo narrativo de residencia/hogar tal como lo preserva la versión inglesa.'
theological_decisions:
- issue: 'Localización funeraria: topografía concreta frente a generalización'
  english_pob_reading: in the mountain that is in Adurim
  chosen_spanish_reading: en el monte que está en Adurim
  alternative_spanish_readings:
  - en la región que está en Adurim
  - en la montaña que está en Adurim
  rationale: La evidencia de revisión muestra tensión entre una generalización ('region') y la lectura topográfica específica ('mountain/hill'). Se preserva la referencia concreta porque está mejor sustentada por el ge'ez y evita borrar un rasgo del lugar.
  doctrine_reference: No aplica; decisión de topografía textual, no doctrinal.
translation_notes:
  revision_awareness: La historia de revisión muestra una oscilación entre 'hill-country', 'region' y 'mountain'. El control textual posterior favorece la lectura topográfica concreta ('mountain/hill'), por lo que el español evita la generalización y conserva el dato espacial del original.
  spanish_consistency_notes:
  - Se usa 'sepultó' para mantener un registro bíblico sobrio y preciso.
  - Se usa 'monte' como equivalente natural de una referencia topográfica concreta en español bíblico contemporáneo.
  - No se introduce 'SEÑOR' ni otra terminología no presente en el verso.
  - '''Su casa'' conserva el cierre narrativo simple del original.'
