  glossary_alignment: No hay términos de glosario mayor implicados aparte de nombres propios. «Saúl» sigue la forma española normal; «Salman» conserva la forma fijada por el POB; «en su lugar» respeta la decisión léxica auditada para ህየንቴሁ. No se observan conflictos con las pautas terminológicas del proyecto.
