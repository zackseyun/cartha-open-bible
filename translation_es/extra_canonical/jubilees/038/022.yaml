translation:
  language: es
  text: Y Salman murió, y Saúl, de Rejobot junto al río,[a] reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de él».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወሞተ፡ (womote)
  english_pob_choice: And Salman died
  chosen_spanish: Y Salman murió
  alternatives_spanish:
  - Y Salman falleció
  - Y murió Salman
  lexicon: muerte / morir
  rationale: El ge'ez expresa de manera directa la muerte; «murió» conserva la simplicidad narrativa del original. Se mantiene «Salman» como nombre propio sin adaptación.
- source_word: ሰልመን፡ (Salmen/Salman)
  english_pob_choice: Salman
  chosen_spanish: Salman
  alternatives_spanish:
  - Salmen
  lexicon: nombre propio
  rationale: La forma inglesa del POB ya fija «Salman»; en español se conserva esa forma estable y reconocible, sin introducir una transliteración no documentada.
- source_word: ሳኡል፡ (Saul)
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: nombre propio
  rationale: 'Se usa la forma española habitual con acento gráfico: «Saúl».'
- source_word: ዘእም፡ ራኦቦት፡ ፈለግ።
  english_pob_choice: from Rehoboth by the River
  chosen_spanish: de Rejobot junto al río
  alternatives_spanish:
  - de Rejobot del río
  - de Rejobot junto al Río
  lexicon: topónimo / expresión locativa
  rationale: El ge'ez vincula el lugar con el río; la revisión inglesa optó por «by the River» para naturalidad sin perder ese vínculo. En español, «junto al río» conserva la relación espacial sin forzar una construcción posesiva poco natural. «Rejobot» refleja la adaptación fonética española del topónimo.
- source_word: ህየንቴሁ፡ (in his place / in his stead)
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - después de él
  lexicon: sucesión / reemplazo
  rationale: La revisión inglesa precisó el valor de sustitución. «En su lugar» reproduce mejor esa idea en español que «después de él», que solo marcaría secuencia temporal sin la noción de reemplazo.
theological_decisions:
- issue: Expresión de sucesión real sin implicación doctrinal adicional
  english_pob_reading: Saul ... reigned in his place
  chosen_spanish_reading: Saúl ... reinó en su lugar
  alternative_spanish_readings:
  - Saúl ... reinó después de él
  - Saúl ... reinó en su puesto
  rationale: El texto describe una sucesión política o dinástica, no una afirmación doctrinal específica. «Reinó en su lugar» preserva la relación de reemplazo y la sobriedad narrativa del pasaje.
  doctrine_reference: n/a
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que cambió «of the River» por «by the River» para una redacción más natural, y la revisión posterior que precisó «after him» como «in his place». La versión española refleja ambas decisiones: mantiene la asociación con el río mediante una locución locativa natural y conserva el matiz de sucesión/reemplazo con «en su lugar».'
  spanish_consistency_notes:
  - Se preserva la narración breve y paratáctica del original con dos cláusulas coordinadas por «y».
  - Se evita «SEÑOR» u otra terminología teológica ajena porque el versículo no contiene lenguaje divino explícito.
  - «Rejobot» se usa como adaptación española coherente con la tradición de transliterar topónimos bíblicos de manera legible para el lector hispano.
