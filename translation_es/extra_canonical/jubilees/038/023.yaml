  text: Y murió Saúl, y Baelunan hijo de Achbor reinó en su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሞተ፡ ሳኡል፡
  english_pob_choice: And Saul died
  chosen_spanish: Y murió Saúl
  alternatives_spanish:
  - Y Saúl murió
  - Y falleció Saúl
  lexicon: morir
  rationale: El ge'ez expresa una muerte simple y directa; en español, 'murió' reproduce con naturalidad y sin suavizar el hecho.
- source_word: ህየንቴሁ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su sitio
  - después de él
  lexicon: en su lugar
  rationale: La revisión inglesa corrigió 'after him' a 'in his place' por precisión semántica. 'En su lugar' conserva esa relación de sucesión/emplazamiento con buena naturalidad en español.
- source_word: ባኤሉናን፡ ወልደ፡ አክቡር።
  english_pob_choice: Baelunan son of Achbor
  chosen_spanish: Baelunan hijo de Achbor
  alternatives_spanish:
  - Baelunan, hijo de Achbor
  - Baelunan, el hijo de Achbor
  lexicon: relación filial
  rationale: Se mantiene el patronímico de forma sobria y fiel al original, sin añadir elementos no presentes en el texto fuente.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la sucesión de 'after him' a 'in his place' para reflejar con más precisión el ge'ez ህየንቴሁ; la versión española adopta directamente ese sentido.
  spanish_consistency_notes:
  - Se conserva 'Saúl' y el nombre propio 'Baelunan' como transliteraciones consistentes con el auditable inglés POB.
  - No se introduce 'Cristo', 'SEÑOR' ni otras convenciones ajenas al pasaje.
  - La sintaxis española sigue el paralelismo breve del original, con puntuación mínima y lectura pública fluida.
