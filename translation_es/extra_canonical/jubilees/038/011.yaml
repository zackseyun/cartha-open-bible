translation:
  language: es
  text: Y los hijos de Jacob subyugaron a los hijos de Esaú en el monte Seír, y doblaron la cerviz para llegar a ser esclavos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መገብዎሙ / English 'subdued'
  english_pob_choice: subdued
  chosen_spanish: subyugaron
  alternatives_spanish:
  - sometieron
  - dominaron
  lexicon: subyugar
  rationale: El ge'ez y el inglés POB expresan una acción de sometimiento militar/político. «Subyugar» conserva esa fuerza sin suavizarla como «presionaron» y encaja con el registro bíblico en español.
- source_word: አትሐቱ ክሳዶሙ / English 'bowed their necks'
  english_pob_choice: bowed their necks
  chosen_spanish: inclinaron su cuello
  alternatives_spanish:
  - doblaron su cuello
  - inclinaron el cuello
  lexicon: inclinar / cuello
  rationale: Se mantiene la imagen corporal del original. «Inclinaron su cuello» preserva la metáfora de sumisión sin reinterpretarla como obediencia generalizada.
- source_word: ከመ ይኩኑ አግብርተ / English 'so that they might become slaves'
  english_pob_choice: become slaves
  chosen_spanish: para llegar a ser esclavos
  alternatives_spanish:
  - para hacerse esclavos
  - a fin de ser esclavos
  lexicon: esclavo
  rationale: «Esclavos» refleja con precisión el valor léxico de አግብርተ y la elección inglesa «slaves». Se evita «siervos» porque diluiría la dureza del término original.
- source_word: ደቂቀ ዔሳው / English 'the sons of Esau'
  english_pob_choice: sons of Esau
  chosen_spanish: los hijos de Esaú
  alternatives_spanish:
  - los descendientes de Esaú
  lexicon: hijos
  rationale: «Hijos» sigue de cerca la fórmula genealógica del texto y coincide con el inglés auditado.
- source_word: ውሉደ ያዕቆብ / English 'the sons of Jacob'
  english_pob_choice: sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los descendientes de Jacob
  lexicon: hijos
  rationale: Se conserva la fórmula genealógica estándar del pasaje, sin ampliar el sentido a «descendientes».
theological_decisions:
- issue: Lenguaje de esclavitud y sometimiento entre linajes
  english_pob_reading: subdued ... bowed their necks so that they might become slaves
  chosen_spanish_reading: subyugaron ... inclinaron su cuello para llegar a ser esclavos
  alternative_spanish_readings:
  - sometieron ... se humillaron para ser esclavos
  - dominaron ... bajaron la cabeza para hacerse esclavos
  rationale: El texto presenta una relación de victoria y sometimiento, no solo una derrota militar abstracta. Se mantiene la dureza del resultado final con «esclavos» y la imagen de sumisión corporal.
  doctrine_reference: Lexical force of δοῦλος/servitude language; narrative of dominion and subjugation in ancient warfare
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'pressed' por 'subdued' y dejó intacta la clausula final de esclavitud. La redacción española refleja esa lectura revisada con un verbo fuerte de sometimiento y conserva la metáfora del cuello inclinado, sin suavizar el término final.
  spanish_consistency_notes:
  - Se mantuvo «Esaú» y «Jacob» en formas bíblicas estándar.
  - Se usó «esclavos» de forma consistente con la fuerza léxica documentada del original y del inglés POB.
  - No se introdujeron notas porque no hay variantes textuales ni ambigüedades requeridas por el audit trail.
