  source_alignment_summary: 'El borrador español transmite bien la secuencia básica del ge''ez y del inglés auditado: los hijos de Jacob someten a los hijos de Esaú en el monte Seír, y estos aceptan una condición de sumisión para hacerse esclavos. Se preservan correctamente las fórmulas genealógicas y la fuerza de «esclavos». Sin embargo, la segunda cláusula pierde naturalidad y precisión idiomática en español con «inclinaron su cuello», donde el plural posesivo del original/inglés se expresa mejor como «doblaron la cerviz» o «inclinaron el cuello».'
