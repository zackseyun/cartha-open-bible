  glossary_alignment: 'Alineación sólida con la terminología del proyecto: «Esaú», «Jacob» y «esclavos» están bien. «Subyugaron» es aceptable para ''subdued'', aunque «sometieron» también sería posible; no requiere cambio. No hay conflictos con términos teológicos principales del glosario.'
