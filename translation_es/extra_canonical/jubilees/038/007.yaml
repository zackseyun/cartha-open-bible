translation:
  language: es
  text: Y salieron Rubén, Isacar y Zabulón hacia el lado norte de la torre, y cincuenta estaban con ellos; y mataron a los combatientes de los filisteos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወወፅኡ / went out
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - salieron fuera
  lexicon: go out
  rationale: «Salieron» expresa con naturalidad el movimiento de salida y conserva la sencillez del geʽez y del inglés auditado, sin añadir matices innecesarios.
- source_word: ገጸ ሰሜን / toward the north side
  english_pob_choice: toward the north side
  chosen_spanish: hacia el lado norte
  alternatives_spanish:
  - hacia el norte
  - en dirección al lado norte
  lexicon: north side
  rationale: «Hacia el lado norte» mantiene la referencia espacial concreta de «side» y evita reducirla demasiado a un simple rumbo cardinal.
- source_word: ማኅፈድ / tower
  english_pob_choice: tower
  chosen_spanish: la torre
  alternatives_spanish:
  - el torreón
  - la atalaya
  lexicon: tower
  rationale: «Torre» es el equivalente directo y claro en español, y es plenamente adecuado para el registro narrativo bíblico.
- source_word: ፶ / fifty
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - '50'
  lexicon: fifty
  rationale: Se conserva el numeral en palabra para un estilo bíblico más fluido y solemne en español.
- source_word: መስተባእሳኒሆሙ / fighting men
  english_pob_choice: fighting men
  chosen_spanish: los hombres de combate
  alternatives_spanish:
  - los combatientes
  - los hombres de guerra
  lexicon: fighting men
  rationale: «Hombres de combate» reproduce de forma bastante literal la fuerza del inglés auditado «fighting men» y mantiene el énfasis en su función militar sin volverlo más interpretativo que el texto fuente.
- source_word: ፍልስጥኤም / Philistines
  english_pob_choice: Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - Filisteos
  lexicon: Philistines
  rationale: Se mantiene el etnónimo bíblico habitual en español, en minúscula por tratarse de un nombre común de pueblo dentro de la oración.
theological_decisions:
- issue: Descripción de los combatientes derrotados
  english_pob_reading: they killed the fighting men of the Philistines
  chosen_spanish_reading: mataron a los hombres de combate de los filisteos
  alternative_spanish_readings:
  - mataron a los combatientes de los filisteos
  - mataron a los hombres de guerra de los filisteos
  rationale: No se suaviza ni se amplía la referencia a combate; se conserva el carácter militar explícito del pasaje, en línea con la revisión inglesa que prefirió una expresión más literal que «warriors».
  doctrine_reference: Narrativa histórica/épica; no implica decisión doctrinal específica.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «warriors» a «fighting men» para ganar literalidad y formalidad; la traducción española refleja esa misma decisión con «hombres de combate», evitando una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene el orden enumerativo de los tres nombres propios para reflejar la secuencia del original.
  - No se introduce una mayúscula en «filisteos» porque funciona como nombre de pueblo dentro de la frase y no como encabezado.
  - «Torre» se conserva como sustantivo simple y no se sustituye por un término más técnico sin evidencia adicional.
