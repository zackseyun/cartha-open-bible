base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/038/003.yaml
  text: And again he shot an arrow, and it struck Adoran the Aramean in the left breast, and he drove him back and killed him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:12Z'
    unchanged: false
    changes_summary: Changed 'sent out an arrow' to the more natural 'shot an arrow'; changed 'struck ... on the left breast' to 'it struck ... in the left breast' for more idiomatic English while preserving the sense. Retained 'drove him back and killed him' as a faithful rendering of the final actions.
translation:
  language: es
  text: Y otra vez disparó una flecha, y ésta hirió a Adorán el arameo en el pecho izquierdo, y lo hizo retroceder y lo mató.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፈነወ፡ ሐጸ፡''
  english_pob_choice: he shot an arrow
  chosen_spanish: disparó una flecha
  alternatives_spanish:
  - lanzó una flecha
  - tiró una flecha
  lexicon: Geez ፈነወ = enviar / soltar / disparar según contexto; ሐጸ፡ = flecha
  rationale: 'El contexto bélico pide una imagen natural en español: no se trata de “enviar” una flecha, sino de dispararla. ‘Disparó una flecha’ conserva la acción y la vivacidad del original sin endurecer el español.'
- source_word: ጥቦ፡ ፀጋማዊ
  english_pob_choice: in the left breast
  chosen_spanish: en el pecho izquierdo
  alternatives_spanish:
  - en el costado izquierdo
  - en el lado izquierdo del pecho
  lexicon: Geez ጥቦ = pecho / seno / zona del torso; ፀጋማዊ = izquierdo
  rationale: ‘Pecho’ es la equivalencia más clara y digna en español para la zona anatómica descrita. ‘Pecho izquierdo’ mantiene la precisión sin sobreinterpretar como corazón o costado.
- source_word: ወሰደዶ
  english_pob_choice: he drove him back
  chosen_spanish: lo hizo retroceder
  alternatives_spanish:
  - lo empujó hacia atrás
  - lo rechazó
  lexicon: Geez verbal idiom meaning cause to go back / drive back
  rationale: La fuerza idiomática del verbo en español se expresa mejor con ‘hacer retroceder’. Es más natural que una traducción literal, y preserva la idea de retirada forzada por el impacto.
- source_word: አዶራንሃ፡'' አረማዊ
  english_pob_choice: Adoran the Aramean
  chosen_spanish: Adorán el arameo
  alternatives_spanish:
  - Adorán el sirio
  - Adorán el arameo
  lexicon: Nombre propio + gentilicio étnico
  rationale: ‘Arameo’ corresponde de manera directa al etnónimo del texto y evita reemplazarlo por ‘sirio’, que puede ser históricamente más amplio o menos preciso en este contexto.
theological_decisions:
- issue: Uso de lenguaje violento en una narración histórica/legendaria sin suavización
  english_pob_reading: and killed him
  chosen_spanish_reading: y lo mató
  alternative_spanish_readings:
  - y lo asesinó
  - y lo dio muerte
  rationale: La cláusula final debe conservar la simpleza narrativa del original. ‘Lo mató’ es directo, fiel y no añade connotaciones jurídicas o morales que el texto no explicita en esta línea.
  doctrine_reference: Fidelidad narrativa y no ampliación interpretativa
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘sent out an arrow’ por ‘shot an arrow’ y ‘on the left breast’ por una redacción más idiomática; la versión española sigue esa misma naturalidad con ‘disparó una flecha’ y ‘en el pecho izquierdo’, manteniendo el valor semántico y el ritmo narrativo del pasaje.
  spanish_consistency_notes:
  - Se mantiene ‘arameo’ como gentilicio estable y preciso para el personaje.
  - Se evita ‘SEÑOR’ o fórmulas litúrgicas porque el verso no contiene el Tetragrámaton ni un título divino.
  - El registro es narrativo, sobrio y no explicativo, acorde con una sección de acción bélica.
