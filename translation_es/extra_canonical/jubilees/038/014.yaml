  yaml_path: translation/extra_canonical/jubilees/038/014.yaml
  text: And they continued paying tribute to Jacob until the day when he went down into Egypt.
  footnotes:
  - marker: a
    text: Or 'remained waiting on'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:18Z'
    unchanged: false
    changes_summary: Changed 'serving' to 'waiting on' to better reflect the sense of attending upon Jacob while preserving formal, natural English.
translation:
  language: es
  text: Y siguieron tributando a Jacob hasta el día en que descendió a Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይጸብሑ
  english_pob_choice: continued paying tribute to
  chosen_spanish: siguieron tributando a
  alternatives_spanish:
  - continuaron pagando tributo a
  - siguieron rindiendo tributo a
  lexicon: ġez. ጸብሐ
  rationale: El contexto y la revisión inglesa indican la idea de pagar tributo, no de servir o atender personalmente. 'Tributando' conserva el valor político-económico de la relación y suena natural en español bíblico moderno.
- source_word: ወነበሩ
  english_pob_choice: continued
  chosen_spanish: siguieron
  alternatives_spanish:
  - continuaron
  - permanecieron
  lexicon: ġez. ነበረ
  rationale: La forma expresa continuidad de la acción; 'siguieron' comunica bien esa duración sin endurecer la frase.
- source_word: ውስተ፡ ግብጽ
  english_pob_choice: into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - a la tierra de Egipto
  - hacia Egipto
  lexicon: topónimo
  rationale: El movimiento de descenso hacia Egipto se expresa de forma natural en español con 'a Egipto'; 'descendió' conserva la dirección del original y del inglés.
theological_decisions:
- issue: Relación de Jacob con quienes le tributaban
  english_pob_reading: they continued paying tribute to Jacob
  chosen_spanish_reading: siguieron tributando a Jacob
  alternative_spanish_readings:
  - continuaron pagando tributo a Jacob
  - siguieron rindiendo tributo a Jacob
  rationale: 'Se mantiene la tensión política del texto: no es un simple servicio doméstico, sino una sumisión con tributo. No se suaviza a lenguaje de cortesía o dependencia general.'
  doctrine_reference: Contexto histórico-narrativo de Génesis/Jubileos; relación de sujeción política
- issue: Movimiento hacia Egipto
  english_pob_reading: until the day when he went down into Egypt
  chosen_spanish_reading: hasta el día en que descendió a Egipto
  alternative_spanish_readings:
  - hasta el día en que bajó a Egipto
  - hasta el día en que fue a Egipto
  rationale: '''Descendió'' preserva la formulación bíblica tradicional y la dirección geográfica implícita. No se reemplaza por una paráfrasis que borre la imagen del descenso.'
  doctrine_reference: Lenguaje narrativo bíblico sobre el descenso a Egipto
translation_notes:
  revision_awareness: La auditoría inglesa corrigió una lectura previa de 'waiting on/serving' a 'paying tribute to'. La versión española sigue la revisión más reciente y evita cualquier término que sugiera mero servicio personal.
  spanish_consistency_notes:
  - Se usa 'tributando' para reflejar la carga política/económica del verbo ge'ez, en consonancia con la revisión inglesa final.
  - No se emplea 'SEÑOR' ni otra sustitución teológica; el verso no contiene un término divino en esta unidad.
  - '''Descendió a Egipto'' mantiene el giro bíblico estándar sin añadir explicaciones no presentes en la fuente.'
