translation:
  language: es
  text: Y Asam murió, y Adath hijo de Barad, que hirió a Madián en el campo de Moab, reinó en su lugar; y el nombre de su ciudad era Avith.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሞተ፡ አሳም፡
  english_pob_choice: And Asam died
  chosen_spanish: Y Asam murió
  alternatives_spanish:
  - Y Asam falleció
  lexicon: muerte
  rationale: El geʽez usa el verbo simple de morir; en español 'murió' es directo, natural y fiel. 'Falleció' suaviza el tono y no es necesario.
- source_word: ወነግሠ፡ ህየንቴሁ፡
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó después de él
  - reinó en su lugar[a]
  lexicon: reinar / en lugar de
  rationale: La revisión auditada indica que ህየንቴሁ significa 'en su lugar' o 'en su stead', no simplemente 'después de él'. Por eso se conserva 'en su lugar' como reflejo más preciso del valor posicional/sucesorio.
- source_word: ዘቀተለ፡ ምዕድያምሃ፡
  english_pob_choice: who struck Midian
  chosen_spanish: que hirió a Madián
  alternatives_spanish:
  - que golpeó a Madián
  - que mató a Madián
  lexicon: herir / golpear
  rationale: El verbo admite la idea de infligir golpe o derrota; 'hirió' mantiene la fuerza verbal sin exagerar a 'mató', que no está explicitado en el verso español ni en el audit trail.
- source_word: በሐቅለ፡ ሞአብ፡
  english_pob_choice: in the field of Moab
  chosen_spanish: en el campo de Moab
  alternatives_spanish:
  - en la llanura de Moab
  - en el campo de Moab
  lexicon: campo
  rationale: '''Campo'' reproduce bien el lugar de combate indicado por el geʽez y coincide con el sentido de escenario abierto sin introducir una especificación geográfica no documentada.'
- source_word: ወስመ፡
  english_pob_choice: and the name of his city was Avith
  chosen_spanish: y el nombre de su ciudad era Avit
  alternatives_spanish:
  - y el nombre de su ciudad era Avith
  lexicon: nombre / ciudad
  rationale: Se translitera el topónimo con ortografía española más simple, 'Avit', manteniendo la identificación del nombre propio sin anglicismo innecesario.
theological_decisions:
- issue: Sucesión real expresada como 'en su lugar'
  english_pob_reading: reigned in his place
  chosen_spanish_reading: reinó en su lugar
  alternative_spanish_readings:
  - reinó después de él
  rationale: La lectura fuente distingue sucesión directa en la misma posición, no solo posterioridad temporal. El español conserva esa relación sin añadir contenido doctrinal.
  doctrine_reference: Sucesión / reemplazo político-histórico
translation_notes:
  revision_awareness: La lectura inglesa revisada pasó de 'reigned after him' a 'reigned in his place' tras la adjudicación del geʽez ህየንቴሁ; la versión española adopta directamente esa precisión sin necesidad de nota textual adicional.
  spanish_consistency_notes:
  - Se mantiene 'Madián' como exónimo bíblico habitual en español.
  - Se conserva la secuencia narrativa coordinada con 'Y'.
  - No se introduce una nota al pie porque la versión española adoptó la lectura revisada directamente y no requiere alternativa visible.
