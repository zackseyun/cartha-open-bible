translation:
  language: es
  text: hasta este día, en la tierra de Edom. Y Balaq hijo de Beor reinó en Edom, y el nombre de su ciudad fue Denaba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እስከ፡ ዛቲ፡ ዕለት፡
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: temporal formula
  rationale: La fórmula temporal expresa continuidad hasta el presente; 'hasta este día' conserva bien el matiz bíblico y la estructura breve del original, sin volverla más explicativa de lo necesario.
- source_word: በምድረ፡ ኤዶም።
  english_pob_choice: in the land of Edom
  chosen_spanish: en la tierra de Edom
  alternatives_spanish:
  - en el país de Edom
  - en la tierra de Edóm
  lexicon: land/territory
  rationale: '''Tierra'' reproduce naturalmente el valor territorial del genitivo geográfico y mantiene la formulación bíblica estándar; se conserva ''Edom'' como nombre propio tradicional.'
- source_word: ወነግሠ፡
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - fue rey
  lexicon: rule/reign
  rationale: El verbo 'reinó' expresa con precisión el hecho de ejercer realeza, que es el valor más directo del original y del inglés auditado.
- source_word: ባላቅ፡ ወልደ፡ ቤዖር፡
  english_pob_choice: Balaq son of Beor
  chosen_spanish: Balaq hijo de Beor
  alternatives_spanish:
  - Balac hijo de Beor
  - Balaq, hijo de Beor
  lexicon: proper names and patronymic
  rationale: Se mantiene la transliteración del nombre tal como aparece en el texto fuente/audit trail. 'Hijo de' reproduce el patronímico de forma clara y natural en español.
- source_word: ወስመ፡
  english_pob_choice: and the name of his city was Denaba
  chosen_spanish: y el nombre de su ciudad fue Denaba
  alternatives_spanish:
  - y el nombre de su ciudad era Denaba
  - y su ciudad se llamaba Denaba
  lexicon: name formula
  rationale: La construcción nominal sigue de cerca el patrón bíblico y refleja el dato del nombre de la ciudad sin añadir matices no presentes en la fuente.
theological_decisions:
- issue: Temporal formula and historical claim
  english_pob_reading: to this day ... And Balaq son of Beor reigned in Edom
  chosen_spanish_reading: hasta este día ... Y Balaq hijo de Beor reinó en Edom
  alternative_spanish_readings:
  - hasta hoy ... Y Balaq hijo de Beor gobernó en Edom
  - hasta el día de hoy ... Y Balaq hijo de Beor fue rey en Edom
  rationale: No hay una tensión teológica explícita en el versículo; la decisión principal es histórica y temporal. Se conserva la afirmación directa del reinado sin suavizarla, porque la fuente la presenta como dato narrativo.
  doctrine_reference: None
translation_notes:
  revision_awareness: La revisión inglesa solo ajustó la puntuación para separar con más claridad la cláusula temporal de la cláusula narrativa y añadió la conjunción 'And' al inicio de la nueva oración. La versión española refleja esa segmentación con punto y 'Y'.
  spanish_consistency_notes:
  - Se usa 'Edom' de forma uniforme como nombre propio geográfico.
  - Se conserva 'Balaq' siguiendo el audit trail inglés, sin normalizar a 'Balac' para evitar introducir una forma no atestiguada en el paquete dado.
  - 'La sintaxis respeta la secuencia de dos oraciones del inglés revisado: una cláusula temporal seguida de una afirmación narrativa.'
