base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/038/001.yaml
  text: And after this Judah spoke to Jacob his father and said to him, “Bend your bow, father, and send forth your arrows, and cast down the enemy and kill the adversary; and let there be strength for you, for we will not kill your brother, for he is your companion and he is like you; let us give him honor.”
  footnotes:
  - marker: a
    text: Or 'Take your bow, father, and put your arrows in the quiver'.
    reason: previous_rendering
  - marker: b
    text: Or 'because we will kill your brothers’ enemy. Your hand is with you, and your help is with you; we will give it to you for honor.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:43Z'
    unchanged: false
    changes_summary: Revised 'Bend your bow' to 'Take your bow' for better lexical fit, and 'send out your arrows' to 'put your arrows in the quiver' to reflect the likely sense of preparing arrows rather than shooting them. Kept the rest largely intact, with minor smoothing for natural formal English.
translation:
  language: es
  text: 'Y después de esto Judá habló a Jacob su padre y le dijo: «Toma tu arco, padre, y [a] lanza tus flechas, y derriba al enemigo y mata al adversario; y haya para ti fuerza, porque no mataremos a tu hermano, pues él es tu compañero y es como tú; le daremos honor[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El Ge'ez y la revisión inglesa favorecen «lanza»/«send forth» más que la lectura anterior «envía» en sentido general; aquí el verbo se entiende como el acto de disparar las flechas.
    reason: lexical_alternative
  - marker: b
    text: «Honor» traduce el valor del final del versículo; también podría verterse «honra», pero se mantiene «honor» por su registro más estable y por reflejar el sustantivo abstracto del fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምስከ / bend your bow
  english_pob_choice: Bend your bow, father
  chosen_spanish: Toma tu arco, padre
  alternatives_spanish:
  - Dobla tu arco, padre
  - Bende tu arco, padre
  lexicon: arco
  rationale: El Ge'ez, confirmado por la revisión, expresa la acción de preparar el arco; en español, «tomar tu arco» comunica esa preparación con naturalidad. «Dobla» es más literal, pero suena menos idiomático y puede sugerir deformación física más que disposición para disparar.
- source_word: ፈኑ / send forth your arrows
  english_pob_choice: send forth your arrows
  chosen_spanish: lanza tus flechas
  alternatives_spanish:
  - suelta tus flechas
  - dispara tus flechas
  lexicon: flecha
  rationale: La revisión inglesa volvió a «send forth your arrows», que en contexto de combate se expresa bien como «lanza tus flechas». «Dispara» sería posible, pero «lanza» preserva mejor el registro elevado y la imagen del acto bélico.
- source_word: አሕፃከ / enemy
  english_pob_choice: the enemy
  chosen_spanish: al enemigo
  alternatives_spanish:
  - al adversario
  - al opresor
  lexicon: enemigo
  rationale: El término designa al enemigo concreto del pasaje; «enemigo» es la equivalencia más directa y clara.
- source_word: ጸረዊ / adversary
  english_pob_choice: the adversary
  chosen_spanish: adversario
  alternatives_spanish:
  - opositor
  - contrario
  lexicon: adversario
  rationale: «Adversario» conserva el paralelismo semántico con «enemigo» sin suavizar la fuerza del segundo miembro.
- source_word: ኀይለ / strength
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: fuerza
  rationale: «Fuerza» es la forma más natural en español para la idea de vigor o capacidad otorgada al destinatario.
- source_word: አኅዋከ / your brother
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano de sangre
  - tu propio hermano
  lexicon: hermano
  rationale: La revisión inglesa exige mantener la referencia al hermano, no a un enemigo. «Tu hermano» sigue de cerca el sentido del Ge'ez.
- source_word: ወንቤከ / companion
  english_pob_choice: he is your companion
  chosen_spanish: es tu compañero
  alternatives_spanish:
  - es tu aliado
  - es tu compañero de camino
  lexicon: compañero
  rationale: El contexto define la relación como compañía o asociación cercana; «compañero» mantiene esa cercanía sin introducir matices políticos no explícitos.
- source_word: ወመምስአከ / like you
  english_pob_choice: he is like you
  chosen_spanish: y es como tú
  alternatives_spanish:
  - y es semejante a ti
  - y es igual a ti
  lexicon: como tú
  rationale: «Como tú» reproduce de modo simple y fiel la comparación del texto, sin exagerar la identidad ni atenuar la semejanza.
- source_word: ንህቦ ለክብር / let us give him honor
  english_pob_choice: let us give him honor
  chosen_spanish: le daremos honor
  alternatives_spanish:
  - le tributaremos honor
  - le daremos honra
  lexicon: honor
  rationale: El valor central es la concesión de honor; «le daremos honor» mantiene una forma española clara y directa, con un leve ajuste de persona para fluidez narrativa en este versículo de discurso.
theological_decisions:
- issue: El sujeto y la acción no son una exhortación a matar al hermano, sino una instrucción sobre el enemigo y, luego, una restricción respecto al hermano
  english_pob_reading: we will not kill your brother, for he is your companion and he is like you; let us give him honor
  chosen_spanish_reading: no mataremos a tu hermano, pues él es tu compañero y es como tú; le daremos honor
  alternative_spanish_readings:
  - no mataremos a tu hermano, porque es tu compañero y es como tú; le daremos honor
  - mataremos al enemigo de tu hermano, pues tu mano está contigo
  rationale: 'La revisión textual muestra que la lectura sobre «enemigo del hermano» y «tu mano está contigo» no está sustentada por el Ge''ez. La traducción española sigue la lectura corregida y conserva la tensión: no se mata al hermano, sino que se le honra.'
  doctrine_reference: crítica textual y fidelidad al testimonio fuente
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la falsa lectura «Take your bow... put your arrows in the quiver» y también la revisión posterior que descartó la expansión errónea «brothers’ enemy / your hand is with you / give it to you». La versión española sigue la lectura apoyada por el Ge''ez: preparar el arco, lanzar las flechas, derribar al enemigo, matar al adversario, afirmar fuerza, negar la matanza del hermano y ofrecerle honor.'
  spanish_consistency_notes:
  - Se conserva «Jacob» como nombre propio tradicional ya presente en el texto fuente en español de proyecto.
  - Se usa «Y» al inicio de la frase según el flujo narrativo, y comillas angulares por norma tipográfica española.
  - «Arco» y «flechas» se mantienen consistentes con la imaginería bélica del pasaje.
  - No se emplea «Señor» ni terminología eclesiástica ajena al texto; el versículo no contiene el nombre divino.
