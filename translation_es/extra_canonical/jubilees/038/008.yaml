base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/038/008.yaml
  text: And Simeon and Benjamin and Enoch, the son of Reuben, went out to the west side of the tower, and fifty were with them; and they killed four hundred valiant warriors of Edom and the Horites.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:16Z'
    unchanged: false
    changes_summary: Revised word order for natural English, added commas for clarity, changed 'toward' to 'to' for direct movement, rendered 'men fit for battle' more naturally as 'valiant warriors,' and clarified that the four hundred belonged to Edom and the Horites rather than preserving the awkward 'killed of Edom.'
translation:
  language: es
  text: Y Simeón, Benjamín y Enoc, hijo de Rubén, salieron al lado occidental de la torre, y cincuenta estaban con ellos; y mataron a cuatrocientos guerreros valientes de Edom y de los horeos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ስምዖን
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: nombre propio
  rationale: El hebreo/canónico del nombre corresponde a Simeón; en español bíblico es la forma habitual y mantiene identificación clara con la tradición bíblica y el contexto genealógico.
- source_word: ብንያም
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: nombre propio
  rationale: Se usa la forma española con tilde, estándar en la Biblia en español y fiel al nombre propio del original.
- source_word: ወልደ፡ ሮቤል
  english_pob_choice: the son of Reuben
  chosen_spanish: hijo de Rubén
  alternatives_spanish:
  - el hijo de Rubén
  lexicon: expresión filial
  rationale: La construcción genitiva se vierte de modo natural en español. Se preserva la filiación sin añadir artículo innecesario, y se mantiene Rubén como forma bíblica tradicional.
- source_word: ገጸ፡ ዐረቢሁ
  english_pob_choice: to the west side
  chosen_spanish: al lado occidental
  alternatives_spanish:
  - hacia el lado occidental
  - al lado de occidente
  lexicon: dirección espacial
  rationale: La frase geez apunta a un lado/dirección concreta; 'occidental' evita ambigüedad y reproduce el valor direccional con español digno y claro.
- source_word: ማኅፈድ
  english_pob_choice: tower
  chosen_spanish: torre
  alternatives_spanish:
  - torre fortificada
  lexicon: sustantivo arquitectónico
  rationale: '''Torre'' es la equivalencia directa y suficientemente precisa en español; el contexto militar no exige ampliar más allá del sustantivo básico.'
- source_word: ፶
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - '50'
  lexicon: número
  rationale: Se conserva el número en palabras por fluidez litúrgica y porque el texto fuente lo expresa verbalmente como cantidad acompañante.
- source_word: መስተቃትላነ
  english_pob_choice: valiant warriors
  chosen_spanish: guerreros valientes
  alternatives_spanish:
  - hombres valientes para la batalla
  - hombres aptos para la guerra
  lexicon: descripción militar
  rationale: La expresión geez describe combatientes valerosos; 'guerreros valientes' mantiene la fuerza bélica sin forzar un calco técnico que en español sonaría menos natural.
- source_word: ኤዶማ ... ሖሬዎን
  english_pob_choice: of Edom and the Horites
  chosen_spanish: de Edom y de los horeos
  alternatives_spanish:
  - de Edom y de los horitas
  lexicon: gentilicios
  rationale: '''Horeos'' es una forma bíblica estable en español para el grupo étnico. Se mantiene la doble pertenencia con repetición de ''de'' para reflejar con claridad la coordinación del original y del audit trail inglés revisado.'
theological_decisions:
- issue: 'Identidad del grupo derrotado: Edom y los horeos'
  english_pob_reading: they killed four hundred valiant warriors of Edom and the Horites
  chosen_spanish_reading: mataron a cuatrocientos guerreros valientes de Edom y de los horeos
  alternative_spanish_readings:
  - mataron a cuatrocientos guerreros valientes de Edom y los horeos
  - mataron a cuatrocientos de Edom y de los horeos, guerreros valientes
  rationale: Sigo la revisión inglesa que aclara que los cuatrocientos pertenecen a ambos grupos, evitando una lectura ambigua o fragmentada. La formulación española conserva esa relación sin añadir implicaciones doctrinales o históricas no presentes en el texto.
  doctrine_reference: No aplica; decisión de referencia histórica y sintáctica
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que ordena de forma más natural la oración, aclara que los cincuenta estaban con ellos, y entiende que los cuatrocientos pertenecen a Edom y a los horeos, no como un complemento fragmentado. No se añadió nota porque el español puede expresar esa claridad directamente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; este verso no lo contiene.
  - Se conserva un registro bíblico sobrio y público, sin introducir glosas interpretativas.
  - Se eligió 'oreos' por consistencia con la forma española bíblica tradicional del etnónimo, equivalente a 'Horites'.
