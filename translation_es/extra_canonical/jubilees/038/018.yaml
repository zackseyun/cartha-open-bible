translation:
  language: es
  text: Su ciudad era Danaba. Y Balaq murió, y Jobab hijo de Zarah, de Boser, reinó en su lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Su ciudad era Danaba. Y Balaq murió, y Jobab hijo de Zarah, de Boser, reinó después de él".'
    reason: Preserva la alternativa documentada en el English POB ('reigned after him') frente a la revisión fuente-correcta 'in his place'.
lexical_decisions:
- source_word: ሀገሩ፡ ደናባ።
  english_pob_choice: His city was Danaba.
  chosen_spanish: Su ciudad era Danaba.
  alternatives_spanish:
  - La ciudad de él era Danaba.
  - Su ciudad fue Danaba.
  lexicon: ciudad
  rationale: El ge'ez afirma de forma simple una relación posesiva con 'su ciudad'; el español natural y fiel es 'Su ciudad era Danaba'. Mantengo el imperfecto 'era' para reflejar la descripción de estado, no un evento puntual.
- source_word: ወሞተ፡ ባላቅ፡
  english_pob_choice: And Balaq died,
  chosen_spanish: Y Balaq murió,
  alternatives_spanish:
  - Y Balaq falleció,
  - Y Balaq murió entonces,
  lexicon: morir
  rationale: El verbo directo 'murió' conserva la sobriedad del relato y corresponde al valor léxico básico del original.
- source_word: ዮባብ፡ ወልደ፡ ዛራ፡
  english_pob_choice: Jobab son of Zarah
  chosen_spanish: Jobab hijo de Zarah
  alternatives_spanish:
  - Jobab, hijo de Zarah
  - Jobab, el hijo de Zarah
  lexicon: hijo de
  rationale: La construcción genealógica se traduce de forma estándar y transparente en español con 'hijo de'.
- source_word: ዘእም፡ ቦሴር።
  english_pob_choice: from Boser
  chosen_spanish: de Boser
  alternatives_spanish:
  - procedente de Boser
  - de la ciudad de Boser
  lexicon: de
  rationale: El ge'ez marca procedencia con 'de'; en español la preposición simple conserva esa relación sin sobredeterminar si se trata de origen, pertenencia o residencia.
- source_word: ህየንቴሁ፡
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en su lugar, en vez de él
  lexicon: en su lugar
  rationale: La revisión fuente-correcta mostró que la idea es sucesión inmediata o reemplazo, no solo posterioridad temporal. 'En su lugar' expresa con naturalidad la equivalencia de función.
theological_decisions:
- issue: Expresión de sucesión del reinado tras la muerte de Balaq
  english_pob_reading: Jobab ... reigned in his place.
  chosen_spanish_reading: Jobab ... reinó en su lugar.
  alternative_spanish_readings:
  - Jobab ... reinó después de él.
  - Jobab ... reinó en vez de él.
  rationale: La fuente revisada corrige una lectura meramente temporal. 'En su lugar' conserva la idea de reemplazo efectivo sin añadir más que el texto implica.
  doctrine_reference: Narrative succession; no doctrinal assertion beyond historical replacement.
translation_notes:
  revision_awareness: 'Se incorporó la corrección fuente-cercana señalada en la revisión: la frase inicial ''His city was Danaba'' no debe omitirse, y ''ህየንቴሁ'' se entiende mejor como ''en su lugar'' que como ''después de él''.'
  spanish_consistency_notes:
  - Se mantiene 'Balaq' y 'Jobab' conforme al audit trail inglés, sin normalizar a formas bíblicas tradicionales no atestiguadas aquí.
  - Se conserva 'Zarah' y 'Boser' tal como aparecen en el contexto auditado.
  - No se emplean marcadores de nota al pie porque no se requiere alternativa textual anclada en esta línea.
