translation:
  language: es
  text: Y huyeron seiscientos, y con ellos huyeron cuatro de los hijos de Esaú; y dejaron a su padre muerto, tal como había caído en la región montañosa que está en Adurim[a]. Y los hijos de Jacob los persiguieron hasta el monte Seír.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice «Adufim», probablemente una corrupción escribal de «Adurim».
    reason: textual_variant
lexical_decisions:
- source_word: ወሰደ ድዎሙ / pursued them
  english_pob_choice: pursued them
  chosen_spanish: los persiguieron
  alternatives_spanish:
  - los siguieron
  - los persiguieron tras ellos
  lexicon: seguir / perseguir
  rationale: El griego/inglés auditado entiende una persecución directa; en español, «perseguir» conserva esa fuerza sin la redundancia de «tras ellos». Se evita una paráfrasis más débil como «seguirlos» porque la escena es de huida y persecución militar.
- source_word: አዱፊም / Adurim
  english_pob_choice: Adurim
  chosen_spanish: Adurim
  alternatives_spanish:
  - Adufim
  lexicon: topónimo
  rationale: El texto ge'ez conserva አዱፊም (Adufim), pero el testimonio auditado indica que probablemente es una corrupción gráfica de Adurim. En el texto principal se mantiene la forma establecida «Adurim» por claridad y continuidad, y la variante manuscrita se documenta en nota.
- source_word: ቅቱለ / slain
  english_pob_choice: slain
  chosen_spanish: muerto
  alternatives_spanish:
  - muerto a espada
  - abatido
  lexicon: matar / morir
  rationale: El contexto presenta al padre como ya caído y muerto; «muerto» comunica el estado resultante sin añadir un instrumento no explicitado por el ge'ez. «Slain» puede sonar más violento en inglés, pero el español aquí sigue fielmente el hecho narrado.
- source_word: ደብረ ሴኢር / Mount Seir
  english_pob_choice: Mount Seir
  chosen_spanish: el monte Seír
  alternatives_spanish:
  - Monte Seír
  lexicon: topónimo
  rationale: Se mantiene el nombre propio con artículo natural en español bíblico moderno. «Seír» preserva la transliteración habitual del topónimo.
theological_decisions:
- issue: Descripción de la muerte del padre de Esaú
  english_pob_reading: they left their father slain, as he had fallen
  chosen_spanish_reading: dejaron a su padre muerto, cuando cayó
  alternative_spanish_readings:
  - dejaron a su padre asesinado, cuando cayó
  - dejaron a su padre muerto, pues había caído
  rationale: La formulación evita añadir una imputación causal explícita («asesinado») que el verso no desarrolla aquí, pero conserva el resultado de muerte y caída. «Cuando cayó» refleja la relación temporal del texto sin forzar una explicación adicional.
  doctrine_reference: Narrativa histórica; precisión textual sin expansión causal
translation_notes:
  revision_awareness: El audit trail inglés revisó «pursued after them» a «pursued them» por naturalidad; la versión española sigue esa lectura directa con «los persiguieron». También se retiene la decisión revisada sobre el topónimo, añadiendo una nota transparente sobre la lectura ge'ez Adufim frente a la forma establecida Adurim.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo porque no aparece en el pasaje.
  - Se usa el pretérito narrativo simple («huyeron», «dejaron», «persiguieron») por coherencia con la prosa histórica.
  - «Hijos de Jacob» y «hijos de Esaú» se conservan literalmente, sin sustituciones interpretativas.
