  text: 'And six hundred fled, and four of the sons of Esau fled with them; and they left their father slain, as he had fallen in the hill-country which is in Add footnote: "Ge''ez reads Adufim, likely a scribal corruption of Adurim.". And the sons of Jacob pursued them as far as Mount Seir.'
