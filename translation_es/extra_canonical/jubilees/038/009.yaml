    text: El ge'ez dice «Adufim», probablemente una corrupción escribal de «Adurim».
    reason: textual_variant
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre el topónimo afectado por la variante textual, y se ajusta «cuando cayó» a «tal como había caído» para reflejar mejor el sentido del texto auditado sin alterar la fluidez del español.
