review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido general del geʽez según el rastro de auditoría inglés: los hijos de Edom siguen bajo un yugo de servidumbre impuesto por los doce hijos de Jacob, hasta hoy. También refleja bien la corrección crítica de ''doce'' frente al error OCR previo. Sin embargo, ''no han sacudido'' es menos fiel al valor de ''cast off'' en este contexto que una formulación como ''no se han quitado'' o ''no se han librado de''.'
  spanish_quality_summary: El texto es claro y digno, pero 'no han sacudido el yugo' suena algo forzado en español bíblico-natural. 'Quitarse de encima' sería demasiado coloquial; 'no se han quitado el yugo' conserva la imagen y mejora la naturalidad. El resto del verso lee bien. La nota léxica con 'esclavitud' es útil y no crea confusión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Hijos', 'Jacob' y 'servidumbre' son adecuados. La decisión de mantener 'servidumbre' en el texto principal y 'esclavitud' como alternativa en nota concuerda con el audit trail inglés.
  issues:
  - severity: medium
    issue: Verbo principal 'no han sacudido'
    rationale: Aunque comprensible, 'sacudir el yugo' no es la expresión más natural ni la más precisa para 'have not cast off' en este contexto. En español, el verbo puede sugerir agitar físicamente el yugo más que despojarse de él.
  - severity: low
    issue: Anclaje de la nota al sustantivo en vez de la frase
    rationale: La nota léxica está bien, pero el contraste 'servidumbre/esclavitud' afecta a toda la expresión 'yugo de servidumbre'. Mantener el marcador en el término sigue siendo aceptable; no requiere cambio adicional.
  revised_spanish_text: Y los hijos de Edom no se han quitado el yugo de servidumbre[a] que los doce hijos de Jacob habían puesto sobre ellos, hasta este día.
  revised_footnotes:
  - marker: a
    text: O ‘esclavitud’.
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a una expresión más fiel y natural en español para la imagen de 'cast off the yoke', sin alterar el contenido ni el registro. Se conserva la nota léxica existente porque sigue siendo pertinente.
