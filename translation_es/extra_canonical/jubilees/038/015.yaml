translation:
  language: es
  text: Y los hijos de Edom no se han quitado el yugo de servidumbre[a] que los doce hijos de Jacob habían puesto sobre ellos, hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘esclavitud’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ውሉደ፡ ኤዶም፡
  english_pob_choice: the sons of Edom
  chosen_spanish: los hijos de Edom
  alternatives_spanish:
  - los descendientes de Edom
  - los hijos de Esaú
  lexicon: hijos
  rationale: Mantiene la relación genealógica y étnica del original sin introducir una paráfrasis más interpretativa. 'Hijos' es el equivalente directo y claro en español bíblico para este uso.
- source_word: ኢነገኁ፡
  english_pob_choice: have not cast off
  chosen_spanish: no han sacudido
  alternatives_spanish:
  - no han arrojado
  - no han quitado de sí
  lexicon: sacudir
  rationale: El verbo expresa la imagen de quitar de sí un yugo sin caer en un calco torpe. 'Sacudir' conserva la fuerza idiomática de deshacerse de algo impuesto.
- source_word: እምአርዑተ፡ ቅኔ፡
  english_pob_choice: the yoke of servitude
  chosen_spanish: el yugo de servidumbre
  alternatives_spanish:
  - el yugo de servicio
  - el yugo de esclavitud
  lexicon: yugo / servidumbre
  rationale: '''Yugo de servidumbre'' reproduce bien la metáfora de opresión y el matiz de sujeción. Se evita ''esclavitud'' porque el audit trail inglés eligió ''servitude'', y ''servidumbre'' conserva esa amplitud sin endurecer innecesariamente el término.'
- source_word: ዘሠርዑ፡
  english_pob_choice: that ... had laid upon them
  chosen_spanish: que ... habían puesto sobre ellos
  alternatives_spanish:
  - que ... habían echado sobre ellos
  - que ... habían impuesto sobre ellos
  lexicon: poner sobre
  rationale: '''Poner sobre ellos'' sigue de cerca la imagen de carga impuesta sin sobretraducirla. ''Impuesto'' sería posible, pero ''puesto sobre'' refleja con más sencillez la formulación del texto.'
- source_word: ፲ወ፪ቱ / 12
  english_pob_choice: the twelve sons of Jacob
  chosen_spanish: los doce hijos de Jacob
  alternatives_spanish:
  - los doce hijos de Israel
  - los doce descendientes de Jacob
  lexicon: doce hijos
  rationale: 'Se sigue la corrección crítica indicada por la revisión más reciente: el sentido histórico-textual es ''doce'', no una lectura OCR errónea. ''Hijos de Jacob'' mantiene la referencia genealógica exacta del pasaje.'
- source_word: እስከ፡ ዛቲ፡ ዕለት።
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: hasta este día
  rationale: Fórmula bíblica natural en español, fiel y sobria, que conserva el valor temporal continuo del original.
theological_decisions:
- issue: La relación entre Edom e Israel aparece como una sujeción prolongada y no meramente simbólica.
  english_pob_reading: And the sons of Edom have not cast off the yoke of servitude that the twelve sons of Jacob had laid upon them, to this day.
  chosen_spanish_reading: Y los hijos de Edom no han sacudido el yugo de servidumbre que los doce hijos de Jacob habían puesto sobre ellos, hasta este día.
  alternative_spanish_readings:
  - Y los hijos de Edom no han quitado de sí el yugo de servidumbre que los doce hijos de Jacob habían puesto sobre ellos, hasta este día.
  - Y los hijos de Edom no han arrojado el yugo de servidumbre que los doce hijos de Jacob habían puesto sobre ellos, hasta este día.
  rationale: La formulación española conserva el sentido de una sujeción histórica persistente. No se suaviza el tono político-social del texto ni se sustituye por una lectura espiritualizante.
  doctrine_reference: Relación Edom-Israel en la tradición de Jubileos; no se introduce una interpretación doctrinal adicional.
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión importante: primero corrigió una lectura errónea sobre ''catorce y quince'' y luego la auditoría posterior confirmó que el texto debía leerse como ''doce hijos de Jacob''. La versión española sigue esa corrección textual y no refleja la lectura OCR errónea.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Servidumbre'' conserva el registro formal y el matiz de opresión del inglés POB sin desplazarlo a ''esclavitud'' en el texto principal.'
  - El marcador de nota [a] aparece exactamente anclado en 'servidumbre' para ofrecer la alternativa léxica sin afectar la lectura principal.
