- from: Y los hijos de Edom no han sacudido el yugo de servidumbre[a] que los doce hijos de Jacob habían puesto sobre ellos, hasta este día.
  to: Y los hijos de Edom no se han quitado el yugo de servidumbre[a] que los doce hijos de Jacob habían puesto sobre ellos, hasta este día.
  rationale: Se ajusta el verbo principal a una expresión más fiel y natural en español para la imagen de 'cast off the yoke', sin alterar el contenido ni el registro. Se conserva la nota léxica existente porque sigue siendo pertinente.
