translation:
  language: es
  text: Y Jacob envió a sus hijos para que hicieran las paces, y ellos hicieron las paces con ellos; y les impusieron un yugo de servidumbre,[a] para que pagaran tributo a Jacob y a sus hijos todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sirvieran a Jacob». El contexto revisado favorece «pagaran tributo» como el sentido más preciso del verbo ge’ez.
    reason: previous_rendering
lexical_decisions:
- source_word: ይቀትልዎሙ / make peace
  english_pob_choice: they should make peace
  chosen_spanish: hicieran paz
  alternatives_spanish:
  - buscaran la paz
  - hicieran las paces
  lexicon: Hebreo/aramaico semítico en contexto narrativo; español idiomático para reconciliación
  rationale: La idea central es la acción de reconciliarse o concertar paz. «Hicieran paz» conserva la estructura causal de la frase y refleja bien el valor verbal sin añadir matices no presentes. «Hicieran las paces» es más idiomático, pero algo más coloquial.
- source_word: ወገብሩ ... ሰላመ / made peace with them
  english_pob_choice: they made peace with them
  chosen_spanish: hicieron paz con ellos
  alternatives_spanish:
  - se reconciliaron con ellos
  - concertaron paz con ellos
  lexicon: Expresión verbal de relación hostil que pasa a paz
  rationale: Se mantiene la repetición del verbo/idea de paz del texto fuente. «Se reconciliaron» añade una lectura más interior o personal que no es necesaria aquí.
- source_word: አርዑተ፡ ቅኔ / yoke of service
  english_pob_choice: a yoke of service
  chosen_spanish: un yugo de tributo
  alternatives_spanish:
  - un yugo de servidumbre
  - un yugo de servicio
  lexicon: Metáfora de dominio político con obligación tributaria
  rationale: La revisión auditada corrigió el valor del verbo de la fuente a «pagar tributo», así que el complemento debe reflejar la carga fiscal/política. «Tributo» evita el debilitamiento de la idea a mera «servidumbre» y se alinea con la corrección fuente-grounded.
- source_word: ይጽብሑ / pay tribute
  english_pob_choice: pay tribute
  chosen_spanish: pagaran tributo
  alternatives_spanish:
  - tributaran
  - pagaran impuestos
  lexicon: Verbo económico-político
  rationale: «Pagaran tributo» es la equivalencia más clara y directa en español para el valor revisado del ge’ez. «Tributaran» es posible pero menos transparente para lectura pública.
- source_word: יَعقوب / Jacob
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Santiago
  lexicon: Nombre propio bíblico
  rationale: Se conserva la forma estándar bíblica en español, correspondiente al nombre del patriarca.
theological_decisions:
- issue: Naturaleza del ‘yugo’ impuesto por Jacob y sus hijos
  english_pob_reading: a yoke of service, so that they should pay tribute to Jacob and his sons all their days
  chosen_spanish_reading: un yugo de tributo, para que pagaran tributo a Jacob y a sus hijos todos sus días
  alternative_spanish_readings:
  - un yugo de servidumbre
  - una obligación de servicio
  rationale: 'La revisión fuente indica que el peso de la cláusula es fiscal: dominación con obligación de tributo, no simple servicio doméstico o labor general. Mantener «yugo» conserva la metáfora de sometimiento político.'
  doctrine_reference: Criterio de fidelidad semántica al testimonio textual fuente-grounded; sin carga doctrinal específica
translation_notes:
  revision_awareness: 'El audit trail inglés registra una revisión importante: la lectura anterior «serve Jacob» fue corregida a «pay tribute to Jacob» por un análisis del verbo ge’ez ይጽብሑ. El español refleja esa corrección y evita la traducción suavizada «servir».'
  spanish_consistency_notes:
  - Se conserva «Jacob» en todo el registro, sin variación onomástica.
  - Se evita «SEÑOR» u այլ masking because no aplica a este pasaje.
  - «Paz» se usa de forma verbal/narrativa para corresponder al patrón repetido del original, no como saludo litúrgico.
