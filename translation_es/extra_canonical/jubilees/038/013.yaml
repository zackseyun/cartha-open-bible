revisions:
- from: Y Jacob envió a sus hijos para que hicieran paz, y ellos hicieron paz con ellos; y les impusieron un yugo de tributo[a], para que pagaran tributo a Jacob y a sus hijos todos sus días.
  to: Y Jacob envió a sus hijos para que hicieran las paces, y ellos hicieron las paces con ellos; y les impusieron un yugo de servidumbre,[a] para que pagaran tributo a Jacob y a sus hijos todos sus días.
  rationale: Se revisa para mejorar la naturalidad del español sin apartarse del sentido fuente. «Hicieran las paces» / «hicieron las paces» expresa idiomáticamente la reconciliación. «Yugo de servidumbre» conserva la metáfora de sometimiento político, y la cláusula final mantiene la precisión auditada de ይጽብሑ como «pagaran tributo».
