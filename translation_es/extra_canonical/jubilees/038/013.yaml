review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta correctamente la secuencia principal del ge’ez según la auditoría inglesa: Jacob envía a sus hijos para hacer paz, ellos hacen paz con los otros, les imponen una carga de sometimiento, y el resultado es que paguen tributo a Jacob y a sus hijos continuamente. Sin embargo, «hicieran paz» y «hicieron paz» suenan poco idiomáticos en español bíblico actual, y «yugo de tributo» no expresa tan naturalmente como el original la idea de sometimiento impuesto con obligación tributaria.'
  spanish_quality_summary: El texto es comprensible, pero necesita una reparación de estilo para sonar natural y digno en español amplio de iglesia. «Hicieran las paces» / «hicieron las paces» es más idiomático que «hicieran paz». Además, «un yugo de servidumbre» preserva mejor la metáfora de dominio, mientras la cláusula final ya especifica que esa servidumbre consistía en pagar tributo. Así se evita la formulación algo extraña «yugo de tributo».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El punto léxico clave es ይጽብሑ, que debe mantenerse como «pagar tributo», no simplemente «servir». La nota alternativa puede conservar «sirvieran a Jacob» como lectura previa. Para አርዑተ፡ ቅኔ, conviene distinguir en español la metáfora de sometimiento («yugo de servidumbre») del resultado fiscal explícito («pagaran tributo»).
  issues:
  - severity: medium
    issue: «hicieran paz» / «hicieron paz» es poco idiomático en español
    rationale: Aunque calca de cerca la estructura, en español natural la expresión esperada es «hacer las paces» o «concertar paz». La opción actual suena forzada y resta legibilidad pública.
  - severity: medium
    issue: «yugo de tributo» suena antinatural y estrecha demasiado la metáfora
    rationale: El original y la POB inglesa distinguen entre la imagen del yugo impuesto y la finalidad de pagar tributo. En español, «yugo de servidumbre» o formulación equivalente conserva mejor el sometimiento, mientras la frase siguiente aclara la obligación tributaria.
  - severity: low
    issue: La nota al pie está bien orientada, pero su razón debe corresponder a la alternativa léxica previa
    rationale: La nota puede mantenerse con una formulación ligeramente más limpia, anclada en «pagaran tributo», para explicar la lectura alternativa anterior «sirvieran a Jacob».
