    reason: previous_rendering
  revision_rationale: Se revisa para mejorar la naturalidad del español sin apartarse del sentido fuente. «Hicieran las paces» / «hicieron las paces» expresa idiomáticamente la reconciliación. «Yugo de servidumbre» conserva la metáfora de sometimiento político, y la cláusula final mantiene la precisión auditada de ይጽብሑ como «pagaran tributo».
