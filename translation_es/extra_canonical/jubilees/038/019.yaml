translation:
  language: es
  text: Yobab murió, y Asam, de la región montañosa de Temán, reinó en su lugar.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reinó después de él».'
    reason: alternative_previous_rendering
lexical_decisions:
- source_word: ወሞተ፡ ዮባብ፡
  english_pob_choice: And Jobab died
  chosen_spanish: Yobab murió
  alternatives_spanish:
  - Yobab falleció
  - Murió Yobab
  lexicon: Ge'ez ወሞተ = murió; nombre propio transcrito según la forma del texto fuente y el contexto de Jubileos/Genesis.
  rationale: Mantengo la secuencia simple de hecho narrativo con el verbo común 'murió'. 'Yobab' sigue la forma del nombre en la fuente dada.
- source_word: ወነግሠ፡ ህየንቴሁ፡
  english_pob_choice: reigned in his place
  chosen_spanish: reinó en su lugar
  alternatives_spanish:
  - reinó después de él
  - reinará en su lugar
  lexicon: Ge'ez ወነግሠ = reinó; ህየንቴሁ = en su lugar / en su stead.
  rationale: Sigo la revisión auditada que corrigió 'after him' por 'in his place', porque la forma ge'ez apunta a sucesión sustitutiva, no solo posterioridad temporal.
- source_word: አሳም፡
  english_pob_choice: Asam
  chosen_spanish: Asam
  alternatives_spanish:
  - Asam
  - Asaam
  lexicon: Nombre propio transcrito desde el texto ge'ez; no se normaliza a una forma bíblica distinta sin base explícita en el expediente.
  rationale: Conservo la transliteración auditada 'Asam' tal como aparece en el texto fuente y en la POB inglesa.
- source_word: '*ዘእም፡ ደብረ፡ ቴማን'
  english_pob_choice: from the hill country of Teman
  chosen_spanish: del país montañoso de Temán
  alternatives_spanish:
  - de la región montañosa de Temán
  - del territorio montañoso de Temán
  lexicon: Ge'ez ደብረ literalmente remite a montaña/montañoso; la revisión inglesa optó por 'hill country' como equivalente natural contextual. Temán se translitera como topónimo.
  rationale: '''País montañoso'' conserva el valor geográfico colectivo de ደብረ sin sonar forzado en español y refleja la decisión inglesa de no reducirlo a una sola ''montaña''. Mantengo ''Temán'' como topónimo reconocido en español bíblico.'
theological_decisions:
- issue: Forma de sucesión real
  english_pob_reading: reigned in his place
  chosen_spanish_reading: reinó en su lugar
  alternative_spanish_readings:
  - reinó después de él
  - ocupó su lugar como rey
  rationale: La lectura refleja sucesión legítima y reemplazo, no mera cronología. No hay carga doctrinal adicional, pero sí una relación de continuidad de gobierno que conviene preservar con precisión.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'La última revisión del inglés cambió ''mountain'' por ''hill country'' para reflejar mejor ደብረ, y una revisión posterior confirmó que ህየንቴሁ significa ''en su lugar'' más que ''después de él''. La versión española sigue ambas decisiones: ''país montañoso'' y ''en su lugar''.'
  spanish_consistency_notes:
  - Uso 'Temán' con tilde como adaptación española del topónimo, coherente con lectura bíblica en español.
  - Conservo la puntuación narrativa breve y la coordinación simple del original.
  - No empleo 'SEÑOR' ni otros equivalentes teológicos irrelevantes aquí.
