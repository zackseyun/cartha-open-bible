translation:
  language: es
  text: Su ciudad era Aw'it. Y Adat murió, y Salman de Amaseqa reinó en su lugar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Salman de Amaseqa reinó después de él».'
    reason: alternative_reading
lexical_decisions:
- source_word: ሀገሩ
  english_pob_choice: His city was Aw'it.
  chosen_spanish: Su ciudad era Aw'it.
  alternatives_spanish:
  - La ciudad de él era Aw'it.
  - Su ciudad fue Aw'it.
  lexicon: house/city possessive construction
  rationale: El ge'ez presenta un posesivo simple con 'su ciudad'; en español 'Su ciudad era Aw'it' conserva el orden natural y el valor de pertenencia sin añadir interpretación.
- source_word: ወሞተ
  english_pob_choice: And Adath died
  chosen_spanish: Y Adat murió
  alternatives_spanish:
  - Y Adat falleció.
  - Y Adat murió y fue sepultado.
  lexicon: died
  rationale: '''Murió'' reproduce el sentido básico y directo del verbo sin suavizarlo, manteniendo el paralelo narrativo del texto fuente.'
- source_word: ወነግሠ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - se hizo rey
  lexicon: reign
  rationale: '''Reinó'' es el equivalente más directo y solemne para un acto de sucesión real, acorde con el relato genealógico.'
- source_word: ህየንቴሁ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su puesto
  - en su stead
  lexicon: in place of
  rationale: El ge'ez expresa sucesión inmediata; 'en su lugar' es la forma idiomática y fiel en español, mientras que 'después de él' pierde la relación de sustitución.
theological_decisions:
- issue: Sucesión real y sustitución del gobernante
  english_pob_reading: Salman from Amaseqa reigned in his place.
  chosen_spanish_reading: Salman de Amaseqa reinó en su lugar.
  alternative_spanish_readings:
  - Salman de Amaseqa reinó después de él.
  - Salman de Amaseqa reinó en lugar suyo.
  rationale: La revisión inglesa corrigió la idea temporal de 'after him' hacia la sustitución directa. El español preserva esa relación de reemplazo, que es la lectura mejor apoyada por el ge'ez.
  doctrine_reference: Historia narrativa / sucesión dinástica; sin implicación doctrinal específica
translation_notes:
  revision_awareness: El texto inglés fue revisado para recuperar la cláusula inicial omitida en el borrador y para corregir 'after him' por 'in his place'; la versión española sigue esa revisión y refleja ambas decisiones del ge'ez.
  spanish_consistency_notes:
  - Se mantiene 'Aw'it' como nombre propio transliterado, coherente con el inglés POB y con el texto ge'ez.
  - Se usa 'Amaseqa' sin adaptar la forma del topónimo para conservar la correspondencia auditables con la fuente.
  - La puntuación separa las dos cláusulas narrativas con 'Y' y una coma, en estilo bíblico claro pero moderno.
