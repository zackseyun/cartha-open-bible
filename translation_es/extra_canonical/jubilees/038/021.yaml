review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien las dos cláusulas del ge''ez y mantiene la corrección clave del inglés auditado: incluir «Su ciudad era Aw''it» y traducir ህየንቴሁ con sentido de sustitución («en su lugar»). Sin embargo, la nota al pie está anclada indebidamente a «en su lugar», como si fuera una ambigüedad del texto español principal, cuando la alternativa «después de él» es solo una variante de traducción previa ya superada en la auditoría inglesa.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Su ciudad era Aw''it. Y Adat murió, y Salman de Amaseqa reinó en su lugar» se lee bien. El único ajuste necesario es editorial: retirar la nota porque no hace falta preservar en español una alternativa inferior que el expediente inglés identifica como rendering previo, no como nota exegética necesaria.'
  glossary_alignment: 'No hay términos del glosario principal en juego. Los nombres propios se conservan de forma coherente con el expediente dado: Aw''it, Adat, Salman, Amaseqa. «Reinó» para ወነግሠ y «en su lugar» para ህየንቴሁ están bien alineados con la decisión léxica documentada.'
  issues:
  - severity: medium
    issue: Nota al pie innecesaria y mal justificada
    rationale: 'La nota «O: “Salman de Amaseqa reinó después de él”» preserva una traducción previa menos precisa. El expediente inglés la marca como previous_rendering, no como alternativa textual o léxica que deba mantenerse. En español introduce ambigüedad innecesaria y debilita la corrección hacia el sentido de sustitución.'
  revised_spanish_text: Su ciudad era Aw'it. Y Adat murió, y Salman de Amaseqa reinó en su lugar.
  revision_rationale: 'Se aprueba el texto base con una reparación menor: eliminar la nota al pie, porque no corresponde a una ambigüedad del original sino a una traducción previa menos exacta ya corregida. El texto principal queda fiel al ge''ez, al expediente inglés y al español natural.'
