  text: And Levi and Dan and Asher went out toward the east side of the tower, and fifty were with them; and they killed the warriors of Moab and Ammon.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:14Z'
    unchanged: false
    changes_summary: Replaced 'fighting men' with 'warriors' for a more natural formal rendering of the combatants, while preserving the sense. No other changes needed.
translation:
  language: es
  text: Y Levi, Dan y Aser salieron hacia el lado oriental de la torre, y cincuenta iban con ellos; y mataron a los guerreros de Moab y de Amón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወጽኡ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - partieron
  lexicon: Geez verbal motion expression
  rationale: El verbo expresa salida o desplazamiento desde un lugar; «salieron» es natural en español y conserva el movimiento sin añadir matices no presentes.
- source_word: ገጸ ጽባሕ
  english_pob_choice: toward the east side
  chosen_spanish: hacia el lado oriental
  alternatives_spanish:
  - hacia el lado de oriente
  - al lado este
  lexicon: Geographical directional phrase
  rationale: «Lado oriental» comunica con claridad la orientación espacial y mantiene un registro formal; evita una paráfrasis más libre.
- source_word: ፶
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - '50'
  lexicon: Numeral
  rationale: Se conserva el numeral en palabras, como corresponde a un texto bíblico de tono elevado y lectura continua.
- source_word: መስተቃትላኒሆሙ
  english_pob_choice: warriors
  chosen_spanish: guerreros
  alternatives_spanish:
  - combatientes
  - hombres de guerra
  lexicon: Combatant noun
  rationale: La revisión inglesa sustituyó «fighting men» por «warriors» para un registro más natural y formal; «guerreros» refleja bien ese valor sin volverlo técnico ni arcaizante.
- source_word: ለሞአብ፡ ወለዐሞን
  english_pob_choice: of Moab and Ammon
  chosen_spanish: de Moab y de Amón
  alternatives_spanish:
  - de Moab y Amón
  - de Moab y de los amonitas
  lexicon: Proper names and prepositional coordination
  rationale: Se mantiene la coordinación explícita con «de» en ambos nombres para reproducir el paralelismo del original y evitar ambigüedad de alcance.
theological_decisions:
- issue: Designación de los combatientes derrotados
  english_pob_reading: they killed the warriors of Moab and Ammon
  chosen_spanish_reading: mataron a los guerreros de Moab y de Amón
  alternative_spanish_readings:
  - mataron a los combatientes de Moab y de Amón
  - mataron a los hombres de guerra de Moab y de Amón
  rationale: No hay un problema doctrinal específico, pero la traducción debe preservar el carácter militar del grupo derrotado. «Guerreros» mantiene la fuerza del inglés revisado y del ge'ez sin suavizarlo.
  doctrine_reference: None
- issue: Referencia a Levi, Dan y Aser como sujetos coordinados
  english_pob_reading: And Levi and Dan and Asher
  chosen_spanish_reading: Y Levi, Dan y Aser
  alternative_spanish_readings:
  - Leví, Dan y Aser
  - Y Leví, Dan y Aser
  rationale: No se introduce ninguna interpretación teológica; solo se conserva la coordinación narrativa. Se mantiene «Levi» sin acento en el nombre propio, siguiendo uso bíblico común del español del proyecto cuando el nombre funciona como forma tradicional estable.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «fighting men» por «warriors» para un registro más natural. La traducción española sigue ese ajuste con «guerreros» y no añade información ausente en el ge'ez. No se detectan variantes textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se usa «Amón» con tilde por la forma española estándar del nombre propio bíblico.
  - La puntuación coordina los tres nombres propios con coma y «y» final, de acuerdo con el español bíblico moderno.
  - No se agregan notas de pie porque el versículo no presenta alternativas textuales o léxicas que requieran anclaje explícito.
