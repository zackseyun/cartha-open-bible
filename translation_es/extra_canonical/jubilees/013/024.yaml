base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/013/024.yaml
  text: And one who had escaped came and told Abram that his brother’s son had been taken captive[24]. And he armed the servants born in his house . . . Upon Abram and upon his seed is the first tithe for the LORD, and the LORD made it an ordinance forever, that they should give it to the priests who minister before him[24],
  footnotes:
  - marker: '24'
    text: The verse is textually difficult and appears segmentationally compressed in this edition. After 'he armed the servants born in his house' the text shifts abruptly to the institution of the tithe. A fuller underlying narrative likely stood here.
    reason: segmentation_note
  - marker: '24'
    text: '''The first tithe'' could also be rendered ''the chief tithe'' or understood as an initial tithe associated with first produce; the Ge''ez wording is unusual.'
    reason: lexical_alternative
  - marker: a
    text: Or 'he imposed the first tithe'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:04Z'
    unchanged: false
    changes_summary: Changed 'laid' to 'imposed' for a more natural and precise rendering of the obligation placed upon Abram and his seed; otherwise retained the draft.
translation:
  language: es
  text: Y uno que había escapado vino y le contó a Abram que el hijo de su hermano había sido llevado cautivo. Y armó a los siervos nacidos en su casa[a] . . . Sobre Abram y sobre su descendencia está[b] el primer diezmo[c] para Yahvé, y Yahvé lo estableció como ordenanza para siempre, para que se lo dieran a los sacerdotes que ministran delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El versículo es textualmente difícil y parece estar segmentado de manera comprimida en esta edición. Después de «armó a los siervos nacidos en su casa», el texto cambia abruptamente a la institución del diezmo. Es probable que aquí existiera una narración subyacente más completa.
    reason: segmentation_note
  - marker: b
    text: «Está» intenta reflejar la cláusula nominal del ge'ez sin añadir un verbo de imposición que la fuente no expresa explícitamente.
    reason: source_note
  - marker: c
    text: «El primer diezmo» también podría entenderse como «el diezmo principal» o como un diezmo inicial asociado con las primicias; la formulación ge'ez es inusual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዚድኅነ፡
  english_pob_choice: one who had escaped
  chosen_spanish: uno que había escapado
  alternatives_spanish:
  - el que había escapado
  - un fugitivo
  lexicon: escape/escaper
  rationale: La forma narrativa exige una expresión natural en español sin añadir matices no presentes; «uno que había escapado» conserva la indefinición del original y del inglés POB.
- source_word: ወልደ፡ እኁሁ።
  english_pob_choice: his brother’s son
  chosen_spanish: el hijo de su hermano
  alternatives_spanish:
  - su sobrino
  - el hijo del hermano de él
  lexicon: brother's son
  rationale: Se mantiene la relación familiar literal del texto. «Sobrino» sería idiomático, pero es una equivalencia interpretativa que no replica tan de cerca la formulación de la fuente.
- source_word: ዐሥራተ፡ ቀዳሚ፡
  english_pob_choice: the first tithe
  chosen_spanish: el primer diezmo
  alternatives_spanish:
  - el diezmo primero
  - el diezmo principal
  lexicon: tithe / first
  rationale: «Primer diezmo» reproduce la estructura del ge'ez y del inglés POB. Se conserva la tensión léxica indicada por la auditoría entre «first» y posibles sentidos como «chief».
- source_word: ለእግዚአብሔር፡
  english_pob_choice: for the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - a Yahvé
  lexicon: divine name
  rationale: Siguiendo la convención del proyecto, el nombre divino se vierte como «Yahvé» y no se enmascara con «SEÑOR». «Para» conserva la dirección/destino del diezmo en la frase nominal.
- source_word: ሠርዖ፡ ሥርዐተ፡ ለዓለም፡
  english_pob_choice: made it an ordinance forever
  chosen_spanish: lo estableció como ordenanza para siempre
  alternatives_spanish:
  - lo hizo un estatuto perpetuo
  - lo instituyó como ordenanza eterna
  lexicon: ordinance forever
  rationale: «Ordenanza» traduce el marco legal-normativo; «para siempre» mantiene la duración del adverbio sin sobrerreformular con lenguaje eclesiástico más fijo.
- source_word: ከመ፡ የሀብዎ፡ ለካህናት፡
  english_pob_choice: that they should give it to the priests
  chosen_spanish: para que lo dieran a los sacerdotes
  alternatives_spanish:
  - para que se lo dieran a los sacerdotes
  - para darlo a los sacerdotes
  lexicon: priests / give
  rationale: «Sacerdotes» es la equivalencia directa y transparente. Se mantiene el subjuntivo final del propósito; no se añade explicación cultual ajena a la fuente.
- source_word: ቅድሜሁ፡
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: before him
  rationale: «Delante de él» conserva la proximidad espacial y cultual del giro sin intensificarlo innecesariamente. Es una equivalencia natural en español bíblico moderno.
theological_decisions:
- issue: Nombre divino en un pasaje sobre el diezmo
  english_pob_reading: the LORD / forever
  chosen_spanish_reading: Yahvé / para siempre
  alternative_spanish_readings:
  - SEÑOR / para siempre
  - el Señor / eternamente
  rationale: Se sigue la norma del proyecto de representar el nombre divino por «Yahvé». La permanencia jurídica del mandato se expresa con «para siempre», que corresponde bien al valor de la ordenanza perpetua sin introducir un tono litúrgico no documentado.
  doctrine_reference: Tetragrámaton / nomen divinum
- issue: Naturaleza de 'the first tithe'
  english_pob_reading: the first tithe could also be rendered 'the chief tithe' or understood as an initial tithe associated with first produce
  chosen_spanish_reading: el primer diezmo
  alternative_spanish_readings:
  - el diezmo principal
  - el diezmo inicial
  rationale: Se mantiene la ambigüedad textual documentada por la POB inglesa. «Primer diezmo» permite tanto una lectura ordinal como la posibilidad de un diezmo inicial vinculado a primicias, sin resolver indebidamente la tensión.
  doctrine_reference: lexical ambiguity / tithe institution
- issue: Estructura verbless del ge'ez en la cláusula del diezmo
  english_pob_reading: Upon Abram and upon his seed is the first tithe for the LORD
  chosen_spanish_reading: Sobre Abram y sobre su descendencia está el primer diezmo para Yahvé
  alternative_spanish_readings:
  - A Abram y a su descendencia pertenece el primer diezmo para Yahvé
  - Sobre Abram y sobre su descendencia recae el primer diezmo para Yahvé
  rationale: Se refleja la cláusula nominal sin introducir un sujeto verbal inexistente. «Está» funciona como copulativo en español y evita atribuir la acción a un agente no expresado, conforme a la revisión más reciente.
  doctrine_reference: verbless clause / copular translation
translation_notes:
  revision_awareness: 'La revisión más reciente del auditorio inglés corrigió la cláusula del diezmo: de una formulación con verbo activo (''he imposed'') a una cláusula nominal (''is the first tithe''), porque el ge''ez es verbless. La versión española sigue esa corrección y evita cualquier sujeto implícito de imposición. También conserva la nota de dificultad textual: el pasaje está segmentacionalmente comprimido y el salto abrupto del relato al diezmo permanece reflejado mediante la elipsis.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino, conforme al estándar del proyecto.
  - Se mantiene «primer diezmo» para conservar la ambigüedad léxica documentada en la auditoría inglesa.
  - «Sacerdotes» y «delante de él» preservan el marco cultual sin introducir terminología eclesiástica posterior.
  - La elipsis con puntos suspensivos reproduce la compresión textual señalada por la fuente y la POB inglesa.
