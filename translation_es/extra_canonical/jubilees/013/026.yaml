    text: '''From seed'' likely refers to agricultural produce or yield, not merely seed reserved for sowing.'
    reason: cultural_note
  - marker: a
    text: 'Or ''limit of days[26], for he ordained it for the generations forever: that they should give a tenth of everything to the LORD, from seed''.'
    reason: previous_rendering
  revision_pass:
