    timestamp: '2026-04-23T14:50:04Z'
    unchanged: false
    changes_summary: Added final punctuation only; the draft is otherwise accurate, complete, and natural.
translation:
  language: es
  text: 'Y para esta ley no hay límite de días, porque la estableció para las generaciones para siempre: que dieran la décima parte de todo a Yahvé, de la semilla[a] y del vino y del aceite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Semilla» probablemente se refiere al producto o rendimiento agrícola, no solo a semilla reservada para sembrar.
    reason: cultural_note
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: divine-name
  rationale: La fuente ge'ez corresponde al nombre divino; en el proyecto, el equivalente normal es «Yahvé» en vez de ocultarlo con mayúsculas o sustituirlo por un título genérico.
- source_word: ወሰነ መዋዕል
  english_pob_choice: there is no limit of days
  chosen_spanish: no hay límite de días
  alternatives_spanish:
  - no tiene término de días
  - no hay fin de días
  lexicon: idiom/temporal-limit
  rationale: La frase expresa ausencia de límite temporal para esta ley; «límite de días» conserva la imagen y suena natural en español.
- source_word: ዓሥራተ
  english_pob_choice: a tenth
  chosen_spanish: un diezmo
  alternatives_spanish:
  - la décima parte
  - un décimo
  lexicon: tithe/measure
  rationale: El contexto es tributario/cultual y el castellano bíblico estándar entiende bien «diezmo»; mantiene la fuerza técnica del término.
- source_word: እምዘርእ
  english_pob_choice: from seed
  chosen_spanish: de la semilla
  alternatives_spanish:
  - del grano
  - de la cosecha
  - del producto de la tierra
  lexicon: agricultural-yield
  rationale: La nota inglesa aclara que el término apunta probablemente al producto agrícola, no solo a semilla para sembrar. «Semilla» conserva la literalidad de la fuente; la nota explica la amplitud posible.
- source_word: እምወይን
  english_pob_choice: from wine
  chosen_spanish: del vino
  alternatives_spanish:
  - del mosto
  lexicon: food/drink
  rationale: Coincide directamente con la fuente y con la tradición lexical del pasaje.
- source_word: እምቅብእ
  english_pob_choice: from oil
  chosen_spanish: del aceite
  alternatives_spanish:
  - del aceite de oliva
  lexicon: food/drink
  rationale: La fuente nombra el aceite de manera general; «aceite» preserva la amplitud sin añadir especificación no atestiguada.
theological_decisions:
- issue: Alcance permanente de la ley
  english_pob_reading: for the generations forever
  chosen_spanish_reading: para las generaciones para siempre
  alternative_spanish_readings:
  - por las generaciones para siempre
  - para todas las generaciones, para siempre
  rationale: Se mantiene la afirmación de permanencia sin suavizarla. La doble expresión reproduce la fuerza acumulativa del original y del audit trail inglés.
  doctrine_reference: perpetuity of the ordinance / covenantal statute
- issue: Nombre divino en una ordenanza de diezmos
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La convención del proyecto exige el nombre divino explícito cuando el original lo porta; esto evita la sustitución litúrgica y conserva la transparencia textual.
  doctrine_reference: divine name / textual transparency
translation_notes:
  revision_awareness: Seguí el audit trail inglés y el ajuste posterior que movió la nota de 'seed' para que acompañe la palabra correcta. También conservé la puntuación final y la estructura de la cláusula, sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se mantiene «diezmo» por su valor técnico y eclesial reconocido en español.
  - 'La cadencia respeta el paralelismo de la fuente: ley sin límite temporal, fundamento eterno, y contenido del diezmo.'
  - La nota a pie señala la amplitud semántica de «semilla» sin desmentir la literalidad del texto principal.
