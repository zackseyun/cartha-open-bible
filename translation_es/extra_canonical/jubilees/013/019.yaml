    unchanged: false
    changes_summary: Added the closing quotation comma to complete the direct speech punctuation; otherwise retained the draft as accurate and natural.
translation:
  language: es
  text: 'En aquel año, cuando Lot había sido hecho cautivo, Yahvé dijo a Abram, después que Lot se había separado de él, en el cuarto año de esta semana: «Levanta tus ojos desde el lugar donde estás habitando, hacia el norte y hacia el sur, hacia el oeste y hacia el este»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el este,». La cita continúa en el versículo siguiente; la puntuación puede variar según se mantenga o no la unidad del discurso en esta línea.
    reason: textual_variant
lexical_decisions:
- source_word: ἥ/ἐν ἐκείνῳ τῷ ἔτει (year formula in context)
  english_pob_choice: In that year
  chosen_spanish: En aquel año
  alternatives_spanish:
  - En ese año
  - En aquel tiempo
  lexicon: none
  rationale: La fórmula temporal es directa y funciona naturalmente en español con un deíctico temporal simple; 'aquel' conserva el valor de referencia narrativa distante sin sobrerrefinarlo.
- source_word: ἐπιάσθη / captivation context for Lot
  english_pob_choice: when Lot had been taken captive
  chosen_spanish: cuando Lot había sido hecho cautivo
  alternatives_spanish:
  - cuando Lot había sido capturado
  - cuando Lot había sido llevado cautivo
  lexicon: none
  rationale: '''Hecho cautivo'' mantiene el matiz pasivo y el valor de cautiverio, sin convertirlo en una captura meramente técnica ni suavizarlo a ''llevado''.'
- source_word: κύριος / divine name in source tradition
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: project default YHWH -> Yahvé
  rationale: El proyecto prescribe 'Yahvé' para el nombre divino; aquí corresponde por el contenido narrativo del pasaje, evitando el ocultamiento mediante 'SEÑOR'.
- source_word: ἀπὸ τοῦ χωρίου / from the place where you are dwelling
  english_pob_choice: from the place where you are dwelling
  chosen_spanish: desde el lugar donde estás habitando
  alternatives_spanish:
  - desde el lugar donde vives
  - desde el lugar en que habitas
  lexicon: none
  rationale: '''Estás habitando'' conserva el aspecto progresivo del participio/gerundio contextual sin volverlo demasiado literario para español moderno.'
- source_word: πρὸς βορρᾶν καὶ νότον καὶ δύσιν καὶ ἀνατολήν / directional list
  english_pob_choice: northward and southward and westward and eastward
  chosen_spanish: hacia el norte y hacia el sur, hacia el oeste y hacia el este
  alternatives_spanish:
  - al norte y al sur, al oeste y al este
  - hacia el norte, el sur, el oeste y el este
  lexicon: none
  rationale: Se conserva la serie direccional completa y paralela; 'hacia' reproduce el valor de orientación sin imponer un matiz de destino. Se omite cualquier nota de variante porque el texto español no introduce una ambigüedad adicional respecto del cierre sintáctico del discurso.
theological_decisions:
- issue: Rendering the divine name in a non-masked form
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: La política terminológica del proyecto exige traducir יהוה como 'Yahvé'. No se trata de una opción devocional estilística sino de transparencia textual conforme al marco POB.
  doctrine_reference: Tetragrammaton / divine name policy
- issue: Maintaining the direct-speech boundary without overcommitting punctuation beyond the source verse
  english_pob_reading: lift up your eyes ... eastward,
  chosen_spanish_reading: Levanta tus ojos ... hacia el este»[a]
  alternative_spanish_readings:
  - Levanta tus ojos ... hacia el este
  - Levanta tus ojos ... hacia el este,
  - Levanta tus ojos ... hacia el este:”
  rationale: El hebreo/etíope y el aparato inglés muestran que la cita continúa en el versículo siguiente; por eso el español cierra la comilla solo como señal tipográfica de esta unidad de redacción, mientras la continuación narrativa queda implícita en la división versicular. La nota marcada explica la alternativa de puntuación compatible con la continuidad del discurso.
  doctrine_reference: Discourse segmentation / punctuation continuity
translation_notes:
  revision_awareness: 'Se atendió la corrección editorial más reciente del audit trail sobre la puntuación del discurso directo: la cita continúa en el versículo siguiente. El español se ajusta para ser publicable y consistente con esa continuidad, evitando añadir una nota no anclada.'
  spanish_consistency_notes:
  - '''Yahvé'' se usa conforme al estándar del proyecto para יהוה.'
  - '''Lot'' y ''Abram'' se mantienen como formas tradicionales estables.'
  - La secuencia direccional conserva paralelismo sintáctico y no introduce glosas interpretativas.
  - La nota al pie está anclada explícitamente en el cierre de la cita para evitar ambigüedad de puntuación.
