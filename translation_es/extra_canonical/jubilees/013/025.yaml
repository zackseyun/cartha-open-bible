  english_pob_choice: possess it
  chosen_spanish: lo poseyeran
  alternatives_spanish:
  - lo tuvieran en posesión
  - lo heredaran
  lexicon: verbo de posesión
  rationale: El sentido básico es posesión estable del objeto referido. 'Poseyeran' conserva la fuerza de posesión plena y continua mejor que un verbo más general como 'tener'.
theological_decisions:
- issue: Duración de la posesión
  english_pob_reading: that they might possess it forever.
