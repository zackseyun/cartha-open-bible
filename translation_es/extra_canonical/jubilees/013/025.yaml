  rationale: 'No hay tensión teológica adicional en el texto breve: la idea central es posesión perpetua. ''Poseyeran'' mantiene la estabilidad de la posesión sin sobreinterpretar el modo de obtención.'
  doctrine_reference: permanencia de la posesión en el contexto narrativo
