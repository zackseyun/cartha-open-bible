    reason: textual_critical
  revision_rationale: Se corrige una formulación poco natural en español ('tomaron cautivas a' ciudades) por 'capturaron', que preserva el sentido de cautiverio sin personificación forzada. También se suaviza la puntuación inicial y se afina la nota textual para alinearla mejor con el rastro inglés y el anclaje en el texto.
