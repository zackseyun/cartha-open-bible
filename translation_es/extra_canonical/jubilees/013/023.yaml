revisions:
- from: Y Targal[a], rey de las naciones; y mataron al rey de Gomorra, y el rey de Sodoma huyó, y muchos cayeron en el betún[b] del valle de los sodomitas junto al Mar Salado. Y tomaron cautivas a Sodoma, Adma y Zeboím; y tomaron también cautivo a Lot, hijo del hermano de Abram, y todas sus posesiones, y llegaron hasta Dan.
  to: Y Targal[a], rey de las naciones, y mataron al rey de Gomorra, y el rey de Sodoma huyó, y muchos cayeron en el betún[b] del valle de los sodomitas junto al Mar Salado. Y capturaron Sodoma, Adma y Zeboím, y capturaron también a Lot, hijo del hermano de Abram, y todas sus posesiones, y llegaron hasta Dan.
  rationale: Se corrige una formulación poco natural en español ('tomaron cautivas a' ciudades) por 'capturaron', que preserva el sentido de cautiverio sin personificación forzada. También se suaviza la puntuación inicial y se afina la nota textual para alinearla mejor con el rastro inglés y el anclaje en el texto.
