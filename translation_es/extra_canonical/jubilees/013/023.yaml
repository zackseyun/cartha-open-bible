base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/013/023.yaml
  text: And Targal[a], king of nations; and they killed the king of Gomorrah, and the king of Sodom fled, and many fell into the bitumen of the valley of the Sodomites[b] by the Salt Sea. And they took captive Sodom and Admah and Zeboiim, and they took captive Lot also, the son of Abram's brother, and all his possessions, and they went as far as Dan.
  footnotes:
  - marker: a
    text: Ge'ez Targāl, corresponding to Tidal in Genesis 14:1.
    reason: lexical_choice
  - marker: b
    text: Ge'ez ba-qab'a baqalā Sadomāwyān (lit. 'in the oil/bitumen of the valley of the Sodomites'). This corresponds to the 'bitumen pits in the valley of Siddim' in Genesis 14:10. Charles (1902) considered the text corrupt and emended to 'through wounds', but the Ge'ez is comprehensible as a rendering of the Genesis tradition.
    reason: textual_critical
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:05Z'
    unchanged: false
    changes_summary: Added commas for apposition; revised 'struck' to 'killed' for lexical accuracy; revised 'the Salt Sea valley' to 'the valley of Siddim by the Salt Sea' to reflect the source more fully; revised 'took ... and they took Lot also' wording only minimally for natural English; changed 'the king of Sodom' action to 'drove away' to reflect the distinct verb.
translation:
  language: es
  text: Y Targal[a], rey de las naciones, y mataron al rey de Gomorra, y el rey de Sodoma huyó, y muchos cayeron en el betún[b] del valle de los sodomitas junto al Mar Salado. Y capturaron Sodoma, Adma y Zeboím, y capturaron también a Lot, hijo del hermano de Abram, y todas sus posesiones, y llegaron hasta Dan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Geʿez Targāl, correspondiente a Tidal en Génesis 14:1.
    reason: lexical_choice
  - marker: b
    text: El geʿez qabʿa aquí se entiende como 'betún' o 'asfalto' y corresponde a la tradición de las pozas de betún de Génesis 14:10; no se sigue la enmienda que lo entiende como 'heridas'.
    reason: textual_critical
lexical_decisions:
- source_word: ወተርጋል
  english_pob_choice: And Targal
  chosen_spanish: Y Targal
  alternatives_spanish:
  - Y Tidal
  - Y Tarqal
  lexicon: Leslau; correspondencia con Génesis 14:1
  rationale: Se conserva la forma propia de este testimonio geʿez, siguiendo la decisión inglesa de mantener Targal y no sustituirla por la forma de Génesis, porque el texto auditado la presenta así.
- source_word: ንጉሠ፡ አሕዛብ
  english_pob_choice: king of nations
  chosen_spanish: rey de las naciones
  alternatives_spanish:
  - rey de pueblos
  - rey de los gentiles
  lexicon: Leslau
  rationale: '''Naciones'' mantiene el valor colectivo de አሕዛብ sin sobrecargarlo con una lectura étnico-teológica más específica de lo que exige el contexto.'
- source_word: ወጐየ
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fled
  - escapó
  lexicon: Leslau
  rationale: El verbo geʿez indica huida; 'huyó' es natural en español y preserva la diferencia con el otro verbo de la línea sobre matar/killing.
- source_word: በቀብአ
  english_pob_choice: into the bitumen
  chosen_spanish: en el betún
  alternatives_spanish:
  - en el asfalto
  - en la brea
  lexicon: Leslau
  rationale: El audit trail inglés identifica el sentido aquí como 'bitumen' por el paralelo de Génesis 14:10. 'Betún' es un equivalente español directo y sobrio, más preciso que una paráfrasis. Se evita 'brea' por posible desplazamiento estilístico.
- source_word: ሰዶማውያን
  english_pob_choice: of the Sodomites
  chosen_spanish: de los sodomitas
  alternatives_spanish:
  - de Sidim
  - de Sodoma
  lexicon: Leslau
  rationale: Se mantiene la forma explícita del geʿez, que dice 'Sodomitas', aunque el paralelo bíblico clásico suele hablar del valle de Sidim.
- source_word: ወብዙኃን ወደቁ
  english_pob_choice: and many fell
  chosen_spanish: y muchos cayeron
  alternatives_spanish:
  - y muchos se precipitaron
  - y muchos murieron
  lexicon: Leslau
  rationale: '''Cayeron'' reproduce la imagen verbal sin añadir la causa de muerte, que no está explicitada en el geʿez.'
- source_word: ወፄወዉ፡ ሰዶማ፡ ወአዳማ፡ ወሴቦኢም
  english_pob_choice: And they took captive Sodom and Admah and Zeboiim
  chosen_spanish: Y tomaron cautivas a Sodoma, Adma y Zeboím
  alternatives_spanish:
  - Y capturaron Sodoma, Adma y Zeboím
  - Y se llevaron cautivas a Sodoma, Adma y Zeboím
  lexicon: Leslau
  rationale: El verbo geʿez de captura se vierte con 'tomaron cautivas', siguiendo la fuerza de cautiverio del texto. Se conserva la enumeración de ciudades tal como aparece en el audit trail inglés.
- source_word: ወፄወውዎ፡ ለሎጥሂ
  english_pob_choice: and they took Lot also
  chosen_spanish: y tomaron también cautivo a Lot
  alternatives_spanish:
  - y capturaron también a Lot
  - y se llevaron también a Lot
  lexicon: Leslau
  rationale: Se mantiene el paralelismo con la captura de las ciudades y se evita una expresión más libre que diluya el verbo de cautiverio.
- source_word: ወልደ፡ እኁሁ፡ ለአብራም
  english_pob_choice: the son of Abram's brother
  chosen_spanish: hijo del hermano de Abram
  alternatives_spanish:
  - sobrino de Abram
  - hijo del hermano de Abram
  lexicon: Leslau; paralelismo con Génesis 14:12
  rationale: Aunque 'sobrino' sería idiomático en español, se prefiere la formulación literal del parentesco que el texto expresa, porque la tradición auditada la conserva así.
- source_word: ወኵሎ፡ ጥሪቶ
  english_pob_choice: and all his possessions
  chosen_spanish: y todas sus posesiones
  alternatives_spanish:
  - y toda su hacienda
  - y todo lo que tenía
  lexicon: Leslau
  rationale: '''Poseciones'' transmite el alcance material general del sustantivo sin restringirlo a una categoría económica más específica.'
- source_word: ዳን
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Dán
  lexicon: Leslau
  rationale: Se conserva el topónimo bíblico estándar en español.
theological_decisions:
- issue: Topónimo / tradición textual en el valle de la batalla
  english_pob_reading: the valley of the Sodomites by the Salt Sea
  chosen_spanish_reading: el valle de los sodomitas junto al Mar Salado
  alternative_spanish_readings:
  - el valle de Sidim junto al Mar Salado
  - el valle de Sodoma junto al Mar Salado
  rationale: El geʿez leído por el audit trail dice explícitamente 'Sodomitas', y la tarea pide respetar el testimonio textual aun cuando el paralelo de Génesis use otra forma. 'Junto al Mar Salado' refleja el cierre locativo sin imponer una armonización no atestiguada en el verso dado.
  doctrine_reference: Principio de prioridad del testimonio textual sobre la armonización con pasajes paralelos
- issue: Verbo de la acción sobre el rey de Sodoma
  english_pob_reading: the king of Sodom fled
  chosen_spanish_reading: el rey de Sodoma huyó
  alternative_spanish_readings:
  - el rey de Sodoma escapó
  - el rey de Sodoma se dio a la fuga
  rationale: 'Se sigue la corrección textual aceptada en el audit trail: el geʿez crítico lee huida, no gobierno ni desplazamiento forzado. ''Huyó'' conserva la dinámica narrativa y la distinción frente a ''mataron''.'
  doctrine_reference: Criterio de crítica textual y lectura contextual
translation_notes:
  revision_awareness: 'Se incorporó la revisión textual más reciente del audit trail: el verbo correcto para el rey de Sodoma es ''huyó'', no un valor de dominio o desplazamiento forzado. También se respetó la observación de que el geʿez conserva la referencia a ''Sodomitas'' y el material de betún, evitando armonizar prematuramente con la formulación de Génesis cuando el testimonio aquí es explícito.'
  spanish_consistency_notes:
  - Se mantiene 'Abram' en lugar de 'Abraham' porque el texto fuente y el audit trail inglés usan Abram.
  - '''Mar Salado'' se conserva como topónimo bíblico común y comprensible en español.'
  - Se usa 'tomaron cautivo/a' para conservar la fuerza de captura del relato sin suavizarla.
  - Se evitó 'SEÑOR' y otras sustituciones no pertinentes, porque no aparecen nombres divinos en este verso.
