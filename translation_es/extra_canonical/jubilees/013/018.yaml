translation:
  language: es
  text: Y le dolió en el corazón que el hijo de su hermano[a] hubiera sido separado de él, porque no tenía hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «su sobrino»; se mantiene «el hijo de su hermano» para conservar la relación genealógica explícita del texto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወአእከዮ፡ በልቡ፡
  english_pob_choice: it was grievous in his heart
  chosen_spanish: le dolió en el corazón
  alternatives_spanish:
  - fue doloroso en su corazón
  - se le hizo amargo en el corazón
  lexicon: gāʿa / dolor del corazón (expresión idiomática de aflicción interior)
  rationale: El ge’ez expresa una aflicción interior, no solo una emoción superficial. «Le dolió en el corazón» conserva el sentido idiomático y suena natural en español bíblico contemporáneo.
- source_word: ወልደ፡ እኁሁ፡
  english_pob_choice: his brother’s son
  chosen_spanish: el hijo de su hermano
  alternatives_spanish:
  - el sobrino de él
  - el hijo de su hermano
  lexicon: relación de parentesco directa
  rationale: La frase literal en español mantiene la relación genealógica explícita del original. «Sobrino» sería posible en uso amplio, pero puede introducir una equivalencia interpretativa no requerida por el texto.
- source_word: እምኔሁ፡
  english_pob_choice: had been separated from him
  chosen_spanish: hubiera sido separado de él
  alternatives_spanish:
  - había sido separado de él
  - se le había separado de él
  lexicon: separar, voz pasiva / resultativa
  rationale: La revisión inglesa corrigió a una pasiva, y el ge’ez también favorece esa lectura. El subjuntivo pluscuamperfecto en español encaja bien con la subordinación explicativa tras una valoración afectiva pasada.
- source_word: አልቦ፡ ውሉደ፡
  english_pob_choice: for he had no children
  chosen_spanish: porque no tenía hijos
  alternatives_spanish:
  - pues no tenía hijos
  - ya que no tenía hijos
  lexicon: no tener hijos
  rationale: La causalidad del original se expresa de forma directa y sobria. «No tenía hijos» reproduce sin sobreinterpretación la razón dada.
theological_decisions:
- issue: Relación de parentesco y posible implicación genealógica
  english_pob_reading: his brother’s son
  chosen_spanish_reading: el hijo de su hermano
  alternative_spanish_readings:
  - el sobrino de él
  rationale: No hay necesidad de convertir la expresión en un término de parentesco más general; el texto remarca la cercanía familiar concreta. Mantenerla evita borrar la tensión narrativa sobre la pérdida del descendiente del hermano.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente en inglés cambió «had separated» por «had been separated» para reflejar mejor la pasiva del fuente; la redacción española sigue esa lectura pasiva con «hubiera sido separado».
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando arcaísmos innecesarios.
  - Se preservó la relación familiar explícita del original en vez de reemplazarla por un término más general.
  - La pasiva se expresó en español de forma natural para no perder la corrección textual de la revisión inglesa.
