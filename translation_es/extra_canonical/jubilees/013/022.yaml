lexical_decisions:
- source_word: ለዘርእከ
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: זרע / σπέρμα
  rationale: ‘Descendencia’ comunica de manera natural en español la idea de posteridad prometida, sin perder la referencia colectiva hereditaria del término de origen. ‘Simiente’ sería más literal pero menos idiomático para lectura pública.
- source_word: ኬብሮን
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebron
  lexicon: topónimo
  rationale: Se usa la forma usual española del nombre propio bíblico, con acento gráfico conforme al uso en español.
- source_word: ኮዶላጎሞር
  english_pob_choice: Chedorlaomer
  chosen_spanish: Chedorlaomer
  alternatives_spanish:
  - Quedorlaomer
  lexicon: nombre propio
  rationale: Se conserva la transliteración del POB inglés como nombre propio auditado. ‘Quedorlaomer’ sería la forma tradicional española, pero aquí se mantiene la forma derivada del testigo POB para no introducir una normalización no documentada.
- source_word: ንጉሠ፡ ኤላም
  english_pob_choice: king of Elam
  chosen_spanish: rey de Elam
  alternatives_spanish:
  - rey de Elam
  lexicon: realeza/título
  rationale: ‘Rey de’ traduce directamente el título real sin añadir matices. ‘Elam’ se mantiene como nombre geográfico propio.
- source_word: ንጉሠ፡ ሴናአር
  english_pob_choice: king of Shinar
  chosen_spanish: rey de Sinar
  alternatives_spanish:
  - rey de Senaar
  lexicon: topónimo
  rationale: ‘Sinar’ es la forma breve y clara en español; ‘Senaar’ sería una transliteración más cercana a algunas tradiciones, pero menos transparente para el lector contemporáneo.
- source_word: ንጉሠ፡ ሴላሰር
  english_pob_choice: king of Ellasar
  chosen_spanish: rey de Elasar
  alternatives_spanish:
  - rey de Ellasar
  lexicon: topónimo
  rationale: Se adopta ‘Elasar’ como forma española fluida del nombre, manteniendo el referente del original sin duplicar consonantes innecesariamente en castellano.
theological_decisions:
- issue: Promesa de la tierra a la descendencia
  english_pob_reading: for I will give it to your seed.
  chosen_spanish_reading: porque lo daré a tu descendencia.
  alternative_spanish_readings:
  - porque se lo daré a tu simiente.
  - porque lo entregaré a tu linaje.
  rationale: La frase conserva el sentido de promesa y posesión futura sin ampliar el contenido. ‘Descendencia’ retiene la referencia colectiva y hereditaria que el texto presenta.
  doctrine_reference: Promesa del pacto / herencia de la descendencia
