translation:
  language: es
  text: 'delante de él. Y el rey de Sodoma se acercó y se inclinó delante de él, y dijo: «Nuestro señor Abram,»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቅድሜሁ / לפניו (before him)
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: preposición de relación espacial/persona
  rationale: El ge'ez expresa posición de respeto o proximidad personal; «delante de él» suena natural en español y conserva la relación directa sin cargar el texto con un matiz demasiado ceremonial que no exige el original.
- source_word: ወበጽሐ፡ ንጉሠ፡ ሰዶም፡ (the king of Sodom came near)
  english_pob_choice: the king of Sodom came near
  chosen_spanish: el rey de Sodoma se acercó
  alternatives_spanish:
  - el rey de Sodoma vino cerca
  - el rey de Sodoma llegó cerca
  lexicon: verbo de aproximación
  rationale: «Se acercó» es la forma más idiomática y fiel para el movimiento de aproximación del verbo; mantiene la acción narrativa sin introducir un destino o llegada no explicitados.
- source_word: ወሰገደ፡ ቅድሜሁ፡ (bowed before him)
  english_pob_choice: bowed before him
  chosen_spanish: se inclinó delante de él
  alternatives_spanish:
  - se postró delante de él
  - se arrodilló delante de él
  lexicon: verbo de reverencia corporal
  rationale: El gesto es una reverencia física; «se inclinó» preserva el rango semántico amplio de la acción sin forzar una postración total si el término original no la especifica con claridad.
- source_word: እግዚእነ፡ አብራም፡ (our lord Abram)
  english_pob_choice: Our lord Abram
  chosen_spanish: Nuestro señor Abram
  alternatives_spanish:
  - Nuestro amo Abram
  - Nuestro señor, Abram
  lexicon: título de respeto / vocativo
  rationale: La fórmula vocativa transmite deferencia. «Señor» mantiene el valor de respeto del original y del inglés POB; «amo» resultaría demasiado servil en español moderno para este contexto narrativo.
theological_decisions:
- issue: Título de respeto aplicado a Abram
  english_pob_reading: Our lord Abram
  chosen_spanish_reading: Nuestro señor Abram
  alternative_spanish_readings:
  - Nuestro amo Abram
  - Nuestro señor, Abram
  rationale: El texto presenta una fórmula de subordinación o respeto social, no una afirmación doctrinal. Se conserva el tratamiento honorífico sin sobreinterpretarlo teológicamente.
  doctrine_reference: Jer 22:18; 1 S 25:24 como paralelos de lenguaje de respeto, no de doctrina
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se mantiene la alineación con el texto inglés POB y el testimonio ge'ez sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - 'Se conserva el orden narrativo breve del original: aproximación, reverencia y discurso directo.'
  - No se usa puntuación explicativa adicional que altere la sobriedad del verso.
  - Se mantiene «Abram» y no «Abraham», porque el pasaje pertenece al tramo pre-cambio de nombre.
