translation:
  language: es
  text: serán innumerables. Levántate, recorre la tierra a lo largo y a lo ancho, y mírala toda.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኢይትኍለቍ
  english_pob_choice: will be innumerable
  chosen_spanish: serán innumerables
  alternatives_spanish:
  - no se podrán contar
  - serán incontables
  lexicon: numerabilidad / incontable
  rationale: El ge'ez expresa una imposibilidad de contar; en español, “serán innumerables” conserva el valor de cantidad incalculable con un tono natural y bíblico, sin convertirlo en una paráfrasis más amplia.
- source_word: ተንሥእ
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Alzate
  - Ponte en pie
  lexicon: levantarse / ponerse en pie
  rationale: El imperativo pide incorporarse para la acción siguiente. “Levántate” es claro, digno y corresponde bien al movimiento físico implícito en el contexto.
- source_word: አንሶሱ
  english_pob_choice: walk through
  chosen_spanish: recorre
  alternatives_spanish:
  - camina por
  - atraviesa
  lexicon: caminar / recorrer
  rationale: “Recorre” comunica la acción de pasar por toda la extensión de la tierra con naturalidad en español, manteniendo la idea de inspección o tránsito completo.
- source_word: ውስተ ምድር ውስተ ኑኃ ወርኅባ
  english_pob_choice: through the land in its length and its breadth
  chosen_spanish: la tierra a lo largo y a lo ancho
  alternatives_spanish:
  - la tierra en su longitud y en su anchura
  - la tierra por su largo y su ancho
  lexicon: longitud / anchura
  rationale: La expresión idiomática española “a lo largo y a lo ancho” reproduce de forma fiel y elegante la totalidad espacial del original y del inglés POB, sin introducir tecnicismos innecesarios.
- source_word: ወርኢ ኵሎ
  english_pob_choice: see it all
  chosen_spanish: y mírala toda
  alternatives_spanish:
  - y véelo todo
  - y contempla todo
  lexicon: ver / mirar
  rationale: El mandato final combina observación y examen. “Mírala toda” mantiene el objeto femenino (“la tierra”) y el sentido de examinarla por completo, en línea con el inglés POB.
theological_decisions:
- issue: Extensión total de la tierra como mandato de observación
  english_pob_reading: walk through the land in its length and its breadth, and see it all
  chosen_spanish_reading: recorre la tierra a lo largo y a lo ancho, y mírala toda
  alternative_spanish_readings:
  - camina por la tierra en su longitud y en su anchura, y véela toda
  - atraviesa la tierra por completo, y obsérvala toda
  rationale: No hay carga doctrinal especial aquí, pero sí una imagen de posesión/inspección total. La redacción conserva esa totalidad sin sobreexplicarla ni suavizarla.
  doctrine_reference: None
