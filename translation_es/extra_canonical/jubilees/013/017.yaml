  text: And he said, “You are God Most High, my God forever and ever.” And in the seventh year of this week, Lot separated from him, and Lot settled in Sodom; and the men of Sodom were very sinful.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:02Z'
    unchanged: false
    changes_summary: Changed 'fourth year' to 'seventh year' to match the source phrase indicating the seventh year. No other changes needed.
translation:
  language: es
  text: 'Y dijo: «Tú eres Dios Altísimo, mi Dios por los siglos de los siglos». Y en el séptimo año de esta semana, Lot se separó de él, y Lot se estableció en Sodoma; y los hombres de Sodoma eran muy pecadores.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: أملاك / አምላክ (God)
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: θεός / אֱלֹהִים default
  rationale: El término divino se vierte de manera directa como «Dios», que es el equivalente natural y reverente en español; no hay indicio aquí de que deba preservarse un nombre propio distinto.
- source_word: ልዑል (Most High)
  english_pob_choice: God Most High
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - Dios, el Altísimo
  - Altísimo
  lexicon: epíteto divino
  rationale: La construcción «Dios Altísimo» conserva el título como epíteto divino compacto y fluido en español, siguiendo de cerca la función del original y del inglés POB.
- source_word: ለዓለመ ዓለም (forever and ever)
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y siempre
  - eternamente
  lexicon: fórmula temporal litúrgica
  rationale: La fórmula tradicional española comunica con claridad la duración intensiva de la expresión semítica sin endurecer el ritmo de la frase.
- source_word: በ፯ብዑ ዓመት (in the seventh year)
  english_pob_choice: in the seventh year
  chosen_spanish: en el séptimo año
  alternatives_spanish:
  - durante el séptimo año
  lexicon: ordinal temporal
  rationale: 'Se sigue la corrección del audit trail: la fuente señala claramente el séptimo año, no el cuarto. «En el séptimo año» es la forma más directa y natural.'
- source_word: ዘዝሱባዔ (of this week)
  english_pob_choice: of this week
  chosen_spanish: de esta semana
  alternatives_spanish:
  - de esta semana de años
  - de este ciclo
  lexicon: calendario jubilar
  rationale: Se conserva «semana» porque el contexto jubilar usa semanas de años; la frase queda inteligible en español sin añadir glosa en el texto principal.
- source_word: ተፈልጠ ሎጥ እምኔሁ (Lot separated from him)
  english_pob_choice: Lot separated from him
  chosen_spanish: Lot se separó de él
  alternatives_spanish:
  - Lot se apartó de él
  - Lot se desligó de él
  lexicon: verbo de separación
  rationale: «Se separó de él» reproduce el valor básico del verbo con neutralidad y claridad; «apartó» sería posible, pero aquí la separación personal/lóci se expresa bien con «se separó».
- source_word: ወኀደረ ሎጥ ውስተ ሰዶም (Lot settled in Sodom)
  english_pob_choice: Lot settled in Sodom
  chosen_spanish: Lot se estableció en Sodoma
  alternatives_spanish:
  - Lot habitó en Sodoma
  - Lot se asentó en Sodoma
  lexicon: verbo de residencia
  rationale: «Se estableció» mantiene la idea de asentamiento con dignidad narrativa; «habitó» sería más estático y «se asentó» más coloquial.
- source_word: ሰዶም (Sodom)
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodoma
  lexicon: topónimo
  rationale: Topónimo bíblico estándar en español.
- source_word: ኃጥኣን ጥቀ (very sinful)
  english_pob_choice: very sinful
  chosen_spanish: muy pecadores
  alternatives_spanish:
  - sumamente pecadores
  - muy impíos
  lexicon: adjetivo moral
  rationale: «Pecadores» conserva el matiz moral y personal del adjetivo; el adverbio «muy» refleja el intensificador del original. «Impíos» sería más interpretativo y menos directo.
theological_decisions:
- issue: 'Titulación divina de Abraham/Lot: «God Most High, my God forever and ever»'
  english_pob_reading: You are God Most High, my God forever and ever.
  chosen_spanish_reading: Tú eres Dios Altísimo, mi Dios por los siglos de los siglos.
  alternative_spanish_readings:
  - Tú eres Dios, el Altísimo, mi Dios eternamente.
  - Tú eres el Dios Altísimo, mi Dios para siempre.
  rationale: Se mantiene la identificación confesional y la acumulación de títulos sin suavizarla. «Dios Altísimo» conserva la alta cristología/teología del epíteto sin introducir vocabulario doctrinal ajeno al pasaje.
  doctrine_reference: Título divino y doxología bíblica; no se requiere armonización doctrinal adicional.
- issue: 'Marcador temporal jubilar: «week»'
  english_pob_reading: in the seventh year of this week
  chosen_spanish_reading: en el séptimo año de esta semana
  alternative_spanish_readings:
  - en el séptimo año de este ciclo
  - durante el séptimo año de esta semana de años
  rationale: Se preserva la terminología del sistema jubilar, aunque resulte poco usual fuera de este contexto. Traducirlo como «semana de años» en el texto principal sería más explicativo, pero añadiría una glosa que no está en la fuente inmediata.
  doctrine_reference: Cronología jubilar de Jubileos; fidelidad al sistema calendárico del texto.
- issue: Descripción moral de Sodoma
  english_pob_reading: and the men of Sodom were very sinful.
  chosen_spanish_reading: y los hombres de Sodoma eran muy pecadores.
  alternative_spanish_readings:
  - y los hombres de Sodoma eran sumamente pecadores.
  - y los hombres de Sodoma eran muy impíos.
  rationale: «Pecadores» sigue la evaluación moral explícita del texto sin convertirla en una sentencia más técnica o eclesiástica. La intensidad se conserva con «muy».
  doctrine_reference: Juicio moral del relato; vocabulario descriptivo, no técnico.
translation_notes:
  revision_awareness: La revisión auditada corrigió «fourth year» a «seventh year» para ajustarse a la fuente ge’ez; el español adopta esa lectura revisada. No se detectan otras variantes significativas en el texto base proporcionado.
  spanish_consistency_notes:
  - Se usa «Dios» para አምላክ con el epíteto «Altísimo» como complemento.
  - Se mantiene «Sodoma» como topónimo bíblico estándar.
  - Se conserva la fórmula intensiva «por los siglos de los siglos» para la duración eterna.
  - No se añadieron notas al texto porque no surgieron variantes textuales o ambigüedades que exigieran anclaje explícito.
