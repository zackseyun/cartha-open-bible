translation:
  language: es
  text: Porque toda la tierra que ves te la daré a ti y a tu descendencia para siempre. Y haré tu descendencia como la arena del mar; si un hombre pudiera contar el polvo de la tierra, también así tu descendencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula queda en suspenso y continúa en el versículo siguiente: «tu descendencia no será contada».'
    reason: Aclaración textual sobre la continuación sintáctica con el versículo 21.
lexical_decisions:
- source_word: ኵላ፡ ምድር፡ እንተ፡ ትሬኢ፡
  english_pob_choice: all the land that you see
  chosen_spanish: toda la tierra que ves
  alternatives_spanish:
  - toda la tierra que contemplas
  - toda la tierra que miras
  lexicon: land/earth/territory
  rationale: “Tierra” comunica bien el terreno prometido y evita la abstracción de “país” o “territorio”; “que ves” sigue de cerca el sentido de la vista en el original y mantiene la relación con la promesa delimitada por lo visible.
- source_word: እሁብ፡
  english_pob_choice: I will give
  chosen_spanish: te la daré
  alternatives_spanish:
  - la daré
  - te la concederé
  lexicon: give
  rationale: Se conserva el valor de dádiva/promesa con un verbo natural en español. “Te la daré” integra el objeto ya mencionado y suena más idiomático sin perder la fuerza de la promesa.
- source_word: ወለዘርእከ፡
  english_pob_choice: to you and to your seed
  chosen_spanish: a ti y a tu descendencia
  alternatives_spanish:
  - a ti y a tu simiente
  - a ti y a tu semilla
  lexicon: seed/offspring
  rationale: “Descendencia” transmite el valor colectivo de zera‘ mejor que “simiente” o “semilla” en español contemporáneo, sin perder la referencia genealógica y de promesa.
- source_word: እስከ፡ ለዓለም፡
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: everlasting/perpetual
  rationale: “Para siempre” es la forma más clara y bíblica en español para una duración indefinida y permanente.
- source_word: ኆፃ፡ ባሕር፡
  english_pob_choice: the sand of the sea
  chosen_spanish: la arena del mar
  alternatives_spanish:
  - la arena de la orilla del mar
  - la arena junto al mar
  lexicon: sand/sea
  rationale: Se mantiene la imagen comparativa de abundancia con el giro usual en español bíblico y actual.
- source_word: ይክል፡ ሰብእ፡ ኍልቆ፡
  english_pob_choice: if a man can count
  chosen_spanish: si un hombre pudiera contar
  alternatives_spanish:
  - si alguien pudiera contar
  - si un hombre puede contar
  lexicon: count/number
  rationale: “Pudiera” refleja bien la condición hipotética del original y preserva el tono proverbial. “Un hombre” mantiene la forma general del sujeto humano.
- source_word: ኆፃ፡ ምድር፡
  english_pob_choice: the dust of the earth
  chosen_spanish: el polvo de la tierra
  alternatives_spanish:
  - el polvo del suelo
  - el polvo de la tierra
  lexicon: dust/earth
  rationale: Se conserva la correspondencia literal y la imaginería de incontabilidad. “Tierra” aquí mantiene el contraste con la promesa territorial, aunque el español admita “suelo”.
theological_decisions:
- issue: Alcance de la promesa territorial
  english_pob_reading: For all the land that you see I will give to you and to your seed forever.
  chosen_spanish_reading: Porque toda la tierra que ves te la daré a ti y a tu descendencia para siempre.
  alternative_spanish_readings:
  - Porque toda la tierra que miras te la concederé a ti y a tu simiente para siempre.
  rationale: La formulación conserva una promesa concreta de tierra visible, sin espiritualizarla ni convertirla en una abstracción. “Descendencia” mantiene el carácter corporativo de la promesa a largo plazo.
  doctrine_reference: Génesis 13:14-15; promesa patriarcal de herencia territorial
- issue: Cláusula final y tensión de numerabilidad
  english_pob_reading: And I will make your seed like the sand of the sea; if a man can count the dust of the earth, then your seed also
  chosen_spanish_reading: Y haré tu descendencia como la arena del mar; si un hombre pudiera contar el polvo de la tierra, también tu descendencia.
  alternative_spanish_readings:
  - Y haré tu descendencia como la arena del mar; si un hombre pudiera contar el polvo de la tierra, tu descendencia también.
  - Y haré tu descendencia como la arena del mar; si un hombre pudiera contar el polvo de la tierra, también tu descendencia podría contarse.
  rationale: Se evita introducir un verbo final que no aparece en el verso y que el audit trail corrigió por generar choque con el versículo siguiente. La frase queda deliberadamente abierta, respetando la continuidad con la negación de numerabilidad en el versículo 21.
  doctrine_reference: Jubileos 13:21; continuidad textual de la promesa de innumerabilidad
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: se descartó completar el último miembro con “can be counted” porque el verbo pertenece a la continuación del versículo 21. Por eso el español evita añadir un verbo equivalente al final y deja la frase coordinada abierta, como exige el flujo textual.'
  spanish_consistency_notes:
  - Se mantuvo “descendencia” para zera‘, siguiendo la convención POB y evitando “simiente” por su menor naturalidad en español moderno.
  - Se usó “tierra” para el objeto de la promesa territorial y “polvo” para la imagen de incontabilidad, conservando la distinción semántica.
  - No se introdujo “Cristo”, “SEÑOR” ni vocabulario litúrgico ajeno al texto.
  - El cierre con nota indica la dependencia del versículo 21 y preserva la tensión textual en lugar de resolverla artificialmente.
