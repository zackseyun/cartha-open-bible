base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/013/015.yaml
  text: And Pharaoh sent away Sarai, Abram’s wife, and expelled him from the land of Egypt. And he went to the place where he had pitched his tent at first, to the place of the altar, between Bethel on the west and Ai on the east, and he blessed the LORD his God who had brought him back in peace.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:03Z'
    unchanged: false
    changes_summary: Moved 'to the place of the altar' earlier to better reflect the source order and clarify that Abram returned both to his former tent site and altar location. No other changes needed.
translation:
  language: es
  text: Y el faraón despidió a Sarai, la mujer de Abram, y lo expulsó de la tierra de Egipto. Y fue al lugar donde había instalado su tienda al principio, al lugar del altar, entre Betel al occidente y Hai al oriente, y bendijo a Yahvé, su Dios, que lo había hecho volver en paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ብእሲተ፡ አብራም፡
  english_pob_choice: Abram’s wife
  chosen_spanish: la mujer de Abram
  alternatives_spanish:
  - la esposa de Abram
  - Sarai, la esposa de Abram
  lexicon: lexical kinship/relational noun
  rationale: El ge'ez expresa literalmente 'mujer de Abram'; en español 'la mujer de Abram' conserva la relación sin añadir un matiz más formal que el texto no exige. 'Esposa' es posible, pero desplaza ligeramente el registro y no es necesario para la fidelidad.
- source_word: አፍለሶ፡
  english_pob_choice: expelled him
  chosen_spanish: lo expulsó
  alternatives_spanish:
  - lo echó
  - lo desterró
  lexicon: verb of removal/expulsion
  rationale: '''Expulsó'' mantiene la fuerza del verbo y encaja con el paralelo de desalojo desde Egipto. ''Desterró'' sería más jurídico de lo que sugiere el contexto.'
- source_word: ወሖረ፡
  english_pob_choice: And he went
  chosen_spanish: Y él fue
  alternatives_spanish:
  - Y fue
  - Y volvió
  lexicon: motion verb
  rationale: El verbo simple de movimiento se vierte de forma directa; 'volvió' podría sonar interpretativo porque el regreso se expresa ya por el complemento de lugar y por la bendición posterior.
- source_word: ደብተራሁ፡
  english_pob_choice: his tent
  chosen_spanish: su tienda
  alternatives_spanish:
  - su carpa
  - su pabellón
  lexicon: tent/dwelling term
  rationale: '''Tienda'' es el término bíblico tradicional y claro en español para la estructura de habitación temporal de los patriarcas.'
- source_word: መካን፡ ምሥዋዕ፡
  english_pob_choice: the place of the altar
  chosen_spanish: el lugar del altar
  alternatives_spanish:
  - el sitio del altar
  - el lugar donde estaba el altar
  lexicon: locative noun phrase
  rationale: 'Se conserva la estructura locativa del original y el orden revisado del POB en inglés: primero el lugar donde acampó al principio y luego el lugar del altar, evitando fusionarlos en una sola expresión.'
- source_word: እምጽባሓ፡ ወቤቴል፡ እምባሕር፡
  english_pob_choice: between Bethel on the west and Ai on the east
  chosen_spanish: entre Betel al occidente y Hai al oriente
  alternatives_spanish:
  - entre Betel al oeste y Hai al este
  - entre Betel hacia el occidente y Hai hacia el oriente
  lexicon: toponymic orientation phrase
  rationale: '''Occidente/oriente'' reproduce el contraste direccional del texto con un registro bíblico natural; se mantiene ''Hai'' como forma española habitual del topónimo bíblico.'
- source_word: ባረከ፡
  english_pob_choice: he blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - bendecía
  lexicon: verb of blessing
  rationale: '''Bendijo'' es la equivalencia directa para el acto de alabar/bendecir a Dios en contexto devocional, sin introducir la ambigüedad de ''alabó''.'
- source_word: እግዚአብሔር፡ አምላኩ፡
  english_pob_choice: the LORD his God
  chosen_spanish: Yahvé, su Dios
  alternatives_spanish:
  - el Señor, su Dios
  - Yahvé Dios
  lexicon: divine-name rendering
  rationale: 'Se sigue el estándar del proyecto para יהוה/YHWH: ''Yahvé''. ''Su Dios'' conserva el posesivo del texto; no se sustituye por ''Señor'' como máscara.'
theological_decisions:
- issue: Nombre divino en una acción de bendición tras el regreso
  english_pob_reading: the LORD his God who had brought him back in peace
  chosen_spanish_reading: Yahvé, su Dios, que lo había hecho volver en paz
  alternative_spanish_readings:
  - el Señor, su Dios, que lo había hecho volver en paz
  - Yahvé, su Dios, que lo había traído de vuelta en paz
  rationale: El texto no presenta aquí una cita griega de κύριος sino el nombre divino en el material subyacente, por lo que el proyecto requiere 'Yahvé'. 'Hecho volver' mantiene la idea de retorno causado/provisto por Dios sin forzar un verbo más interpretativo que 'traído de vuelta'.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: Orden de retorno al lugar del altar y de la tienda
  english_pob_reading: he went to the place where he had pitched his tent at first, to the place of the altar, between Bethel on the west and Ai on the east
  chosen_spanish_reading: fue al lugar donde había plantado su tienda al principio, al lugar del altar, entre Betel al occidente y Hai al oriente
  alternative_spanish_readings:
  - fue al lugar donde había plantado su tienda al principio, entre Betel al occidente y Hai al oriente, al lugar del altar
  - fue al lugar del altar donde había plantado su tienda al principio, entre Betel al occidente y Hai al oriente
  rationale: La revisión inglesa desplazó 'to the place of the altar' para reflejar mejor el orden del original y aclarar que Abram volvió tanto al sitio de su tienda como al altar. El español sigue esa misma decisión para no perder la secuencia ni fusionar indebidamente dos referencias locativas.
  doctrine_reference: Narrative source order / locative precision
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del POB en inglés que reordenó la cláusula locativa para reflejar mejor la secuencia del original: primero el lugar donde había plantado su tienda al principio, luego el lugar del altar, y después la delimitación geográfica entre Betel y Hai. No añadí notas textuales porque el pasaje no presenta variantes relevantes en el paquete de fuente provisto.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se preservó 'Sarai' como nombre propio sin normalizarlo a 'Sara', siguiendo el texto fuente.
  - '''Hai'' se usa como topónimo bíblico español habitual, paralelo a ''Betel''.'
  - El registro es sobrio y bíblico, evitando arcaísmos innecesarios y sin suavizar la fuerza de 'expulsó'.
