base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/013/029.yaml
  text: 'Give us the persons whom you rescued, but let the goods be yours.” And Abram said to him, “I have lifted up my hands to God Most High: from a thread even to a sandal strap, I will not take anything that is yours, lest you should say, ‘I have made Abram rich’—except only what the young men have eaten, and the share of the men who went with me, Aner and Eshcol and Mamre; let them take their share.”'
  footnotes:
  - marker: a
    text: Or 'Give me'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:05Z'
    unchanged: false
    changes_summary: Changed 'give us' to 'Give me' to match the singular addressee, and adjusted 'not from a thread even to a sandal strap will I take' to the more natural and accurate 'from a thread even to a sandal strap, I will not take.'
translation:
  language: es
  text: '“Danos[a] las personas que rescataste, pero los bienes sean tuyos.” Y Abram le dijo: “He alzado mis manos a Dios Altísimo: desde un hilo hasta una correa de sandalia, no tomaré nada de lo que es tuyo, para que no digas: ‘Yo enriquecí a Abram’; excepto lo que han comido los jóvenes y la parte de los hombres que fueron conmigo, Aner, Eshcol y Mamre; que ellos tomen su parte.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Entréganos», según el valor explícitamente plural del ge'ez.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጸግወነ
  english_pob_choice: Give us
  chosen_spanish: Danos
  alternatives_spanish:
  - Dame
  - Entréganos
  lexicon: Ge'ez ጸግወ-
  rationale: El Ge'ez en plural incluye al hablante y su grupo; por eso el español debe reflejar el plural con «danos». «Dame» seguiría una armonización con Génesis, pero no con el texto fuente de Jubileos.
- source_word: ነፍሰ፡ እለ፡ ባሳሕከ
  english_pob_choice: the persons whom you rescued
  chosen_spanish: las personas que rescataste
  alternatives_spanish:
  - las almas que rescataste
  - los hombres que rescataste
  lexicon: Ge'ez ነፍሰ / እለ / ባሳሕከ
  rationale: «Personas» conserva el sentido amplio de ነፍሰ sin restringirlo a varones; «rescataste» expresa el valor verbal de salvar/liberar que tiene el contexto.
- source_word: ወምህርካሁሰ፡ ይኩንከ፡ ለከ።
  english_pob_choice: but let the goods be yours
  chosen_spanish: pero las cosas sean tuyas
  alternatives_spanish:
  - pero los bienes sean tuyos
  - pero la riqueza sea tuya
  lexicon: Ge'ez ምህር / ለከ
  rationale: «Cosas» reproduce de forma amplia el valor de los bienes materiales sin introducir un término demasiado técnico; el posesivo plural concuerda con el referente colectivo implícito.
- source_word: አነሣእ እደየ
  english_pob_choice: I have lifted up my hands
  chosen_spanish: He alzado mi mano
  alternatives_spanish:
  - He levantado mis manos
  - Alzo mi mano
  lexicon: Ge'ez idiom for oath-taking
  rationale: La expresión idiomática de juramento se conserva en español con una fórmula natural y solemne. Aunque el plural aparece en el inglés, el sentido idiomático en español se puede expresar con singular genérico como en el uso bíblico tradicional, sin alterar el juramento.
- source_word: ኀበ፡ አምላክ፡ ልዑል
  english_pob_choice: to God Most High
  chosen_spanish: a Dios Altísimo
  alternatives_spanish:
  - ante Dios Altísimo
  - al Dios Altísimo
  lexicon: Ge'ez አምላክ / ልዑል
  rationale: «A Dios Altísimo» mantiene la dirección del juramento y la designación divina. «Altísimo» conserva el título teológico del texto.
- source_word: እምፈትል፡ እስከ፡ ተታነ፡ እሣእነ
  english_pob_choice: from a thread even to a sandal strap, I will not take anything that is yours
  chosen_spanish: no tomaré nada de lo que es tuyo, ni siquiera un hilo hasta una correa de sandalia
  alternatives_spanish:
  - desde un hilo hasta una correa de sandalia no tomaré nada de lo tuyo
  - ni un hilo ni una correa de sandalia tomaré de lo que es tuyo
  lexicon: Ge'ez material minimum formula
  rationale: Se preserva la fórmula de extremos mínimos con «hilo» y «correa de sandalia», y se adapta la sintaxis al español para que el negador gobierne naturalmente la cláusula.
- source_word: እመ፡ አነሥእ ... ኢትኩን፡ በሃሌ፡ አነ፡ አብዐልከዎ
  english_pob_choice: lest you should say, 'I have made Abram rich'
  chosen_spanish: 'para que no digas: ‘Yo enriquecí a Abram’'
  alternatives_spanish:
  - 'no sea que digas: ‘Yo hice rico a Abram’'
  - 'para que no puedas decir: ‘Yo he enriquecido a Abram’'
  lexicon: Ge'ez causative of wealth / boast formula
  rationale: «Enriquecí» reproduce bien la idea de causar riqueza sin volver la frase torpe; mantiene la posible jactancia del interlocutor.
- source_word: ዳእሙ፡ ዘበልዑ፡ ወራዙት፡ ወመክፈልቶሙ
  english_pob_choice: except only what the young men have eaten
  chosen_spanish: excepto solo lo que han comido los jóvenes
  alternatives_spanish:
  - salvo solo lo que los jóvenes han comido
  - excepto únicamente lo que comieron los jóvenes
  lexicon: Ge'ez exception clause
  rationale: Se mantiene la exclusión limitada por el consumo real de los jóvenes, sin ampliar el sentido a otras concesiones.
- source_word: ወመክፈልቶሙ ለዕደው ... ይነሥኡ መክፈልቶሙ
  english_pob_choice: and the share of the men who went with me, Aner and Eshcol and Mamre; let them take their share
  chosen_spanish: y la parte de los hombres que fueron conmigo, Aner, Eshcol y Mamre; ellos tomen su parte
  alternatives_spanish:
  - y la porción de los hombres que fueron conmigo...
  - y la parte correspondiente a los hombres que fueron conmigo...
  lexicon: Ge'ez share/portion terminology
  rationale: «Parte» es la opción más natural y conserva la distribución de botín; el mandato final se mantiene en tercera persona plural como en el original.
theological_decisions:
- issue: Referencia a Dios en juramento
  english_pob_reading: to God Most High
  chosen_spanish_reading: a Dios Altísimo
  alternative_spanish_readings:
  - ante Dios Altísimo
  - al Dios Altísimo
  rationale: El texto presenta un juramento ante la deidad suprema. «A Dios Altísimo» es fiel y solemne sin introducir un matiz litúrgico posterior.
  doctrine_reference: Génesis 14:22; lenguaje de juramento en contextos patriarcales
- issue: Posible armonización con la singularidad del interlocutor
  english_pob_reading: Give us
  chosen_spanish_reading: Danos
  alternative_spanish_readings:
  - Dame
  rationale: La lectura ge'ez es plural y debe conservarse aunque difiera de la forma más conocida en Génesis. Mantener el plural evita borrar una variación textual documentada.
  doctrine_reference: Crítica textual / variación redaccional en Jubileos
- issue: Negación de enriquecimiento atribuible
  english_pob_reading: lest you should say, 'I have made Abram rich'
  chosen_spanish_reading: 'para que no digas: ‘Yo enriquecí a Abram’'
  alternative_spanish_readings:
  - 'no sea que digas: ‘Yo hice rico a Abram’'
  rationale: 'Se conserva la preocupación ética del patriarca: no aceptar bienes que permitan atribuir su prosperidad a otro humano. La formulación no suaviza esa tensión.'
  doctrine_reference: Integridad patriarcal; dependencia de Dios en la riqueza
- issue: Excepción por consumo y participación de aliados
  english_pob_reading: except only what the young men have eaten, and the share of the men who went with me
  chosen_spanish_reading: excepto solo lo que han comido los jóvenes, y la parte de los hombres que fueron conmigo
  alternative_spanish_readings:
  - salvo solo lo que los jóvenes han comido, y la porción de los hombres que fueron conmigo
  rationale: La excepción distingue entre consumo necesario y botín repartible. Se mantiene la legitimidad de la parte de los aliados sin ampliar el derecho de Abram sobre ella.
  doctrine_reference: Justicia distributiva en contexto de botín y alianza
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección más reciente del audit trail, pero se volvió al plural original del Ge'ez («Give us») porque la revisión posterior lo señalaba como mistranslation y el texto fuente confirma el plural. También se conservó la estructura idiomática del juramento y la fórmula de mínima posesión con sintaxis española natural.
  spanish_consistency_notes:
  - Se usa «Dios Altísimo» en lugar de «SEÑOR» porque el pasaje en Ge'ez nombra a Dios como አምላክ ልዑል y el audit trail inglés lo reflejó como God Most High.
  - Se evita «Cristo» o terminología eclesiástica no presente; el texto permanece en registro bíblico sobrio.
  - «Jóvenes» traduce de modo inclusivo el grupo de ወራዙት sin forzar un tecnicismo.
  - La cláusula final mantiene el plural «ellos tomen» para reflejar que la porción pertenece a los aliados nombrados.
