revisions:
- from: Y en el cuadragésimo primer jubileo, en el tercer año de la primera semana, regresó a este lugar y ofreció un sacrificio sobre él, y llamó sobre el nombre de Yahvé.
  to: Y en el cuadragésimo primer jubileo, en el tercer año de la primera semana, regresó a este lugar y allí ofreció un sacrificio, e invocó el nombre de Yahvé.
  rationale: Se reemplaza 'sobre él' por 'allí' para evitar una referencia dura y ambigua en español, manteniendo que ofreció un sacrificio en ese lugar. Se cambia 'llamó sobre el nombre de Yahvé' por 'invocó el nombre de Yahvé', que preserva el sentido bíblico de apelación cultual al nombre divino en español natural y digno. No hacen falta notas, porque la nota inglesa preserva una lectura anterior descartada, no una alternativa que deba mantenerse en el texto español principal.
