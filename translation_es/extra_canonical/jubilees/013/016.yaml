base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/013/016.yaml
  text: And in the forty-first jubilee, in the third year of the first week, he returned to this place and offered a sacrifice upon it, and he called on the name of the LORD.
  footnotes:
  - marker: a
    text: Or 'he entered that place and built there an altar'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:02Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y en el cuadragésimo primer jubileo, en el tercer año de la primera semana, regresó a este lugar y allí ofreció un sacrificio, e invocó el nombre de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ገብአ / returned
  english_pob_choice: he returned to this place
  chosen_spanish: regresó a este lugar
  alternatives_spanish:
  - volvió a este lugar
  - retornó a este lugar
  lexicon: retornó / regresar
  rationale: El ge'ez indica un regreso, no una entrada ni la construcción de un altar. 'Regresó' refleja bien el movimiento de vuelta en español natural y conserva el sentido narrativo.
- source_word: ወአዕረገ፡ በዲቤሁ፡ ጽንሓሐ፡
  english_pob_choice: offered a sacrifice upon it
  chosen_spanish: ofreció un sacrificio sobre él
  alternatives_spanish:
  - ofreció un sacrificio en él
  - presentó un sacrificio sobre él
  lexicon: ofrecer sacrificio / sacrificio
  rationale: La frase ge'ez habla de ofrecer un sacrificio, no de edificar un altar. 'Sobre él' conserva la referencia al lugar previamente mencionado, siguiendo el paralelo conceptual del texto fuente.
- source_word: በስመ፡ እግዚአብሔር
  english_pob_choice: on the name of the LORD
  chosen_spanish: sobre el nombre de Yahvé
  alternatives_spanish:
  - invocó el nombre de Yahvé
  - llamó en el nombre de Yahvé
  lexicon: Yahvé / nombre
  rationale: El patrón bíblico aquí es invocar el nombre divino. Mantengo 'llamó sobre el nombre de Yahvé' para reflejar el giro semítico del original y el uso POB de 'Yahvé' en lugar de una máscara como 'SEÑOR'.
theological_decisions:
- issue: Divine name rendering
  english_pob_reading: he called on the name of the LORD
  chosen_spanish_reading: llamó sobre el nombre de Yahvé
  alternative_spanish_readings:
  - invocó el nombre de Yahvé
  - clamó al nombre de Yahvé
  rationale: El ge'ez nombra directamente a Dios con el equivalente del nombre divino. Según la terminología base del proyecto, se debe transparentar el nombre como 'Yahvé' en el texto principal.
  doctrine_reference: Tetragrammaton / divine-name transparency
translation_notes:
  revision_awareness: La revisión aplicada corrigió un error previo que hablaba de 'entró en ese lugar y construyó allí un altar'. El ge'ez confirma 'regresó a este lugar y ofreció un sacrificio sobre él', así que la traducción española evita la harmonización con Génesis y mantiene el sacrificio explícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente conforme al criterio del proyecto para el nombre divino.
  - '''sacrificio'' se conserva como sustantivo explícito para no diluir el acto cultual en una frase genérica.'
  - El numeral y la estructura temporal siguen la fórmula narrativa del original sin ampliaciones interpretativas.
