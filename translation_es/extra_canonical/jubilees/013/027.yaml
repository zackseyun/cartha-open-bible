translation:
  language: es
  text: y de ganado y de ovejas. Y les dio a sus sacerdotes para que comieran y bebieran con alegría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አልህምት / cattle
  english_pob_choice: cattle
  chosen_spanish: ganado mayor
  alternatives_spanish:
  - ganado
  - reses
  - bueyes
  lexicon: Vocabulary for domestic herd animals
  rationale: «Ganado mayor» expresa de manera natural el conjunto de animales de cría grande al que alude el texto, sin reducirlo indebidamente a una sola especie. Evita una mecanización que podría sonar extraña en español y mantiene la amplitud del término inglés POB.
- source_word: አባግዕ / sheep
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - carneros
  - corderos
  lexicon: Vocabulary for ovine animals
  rationale: «Ovejas» es la correspondencia más directa y comprensible en español para el animal mencionado, conservando el sentido genérico del plural sin añadir edad o sexo que el texto no especifica.
- source_word: ወውእቱ፡ ወሀበ፡
  english_pob_choice: And he gave
  chosen_spanish: Y se los dio
  alternatives_spanish:
  - Y les dio
  - Y dio de ellos
  lexicon: Verbal construction of giving with pronominal object
  rationale: Se explicita el objeto pronominal en español para evitar ambigüedad y reflejar que los bienes mencionados fueron entregados a los sacerdotes. La forma pronominal mantiene fluidez y respeta el movimiento del original.
- source_word: ለካህናቲሁ / his priests
  english_pob_choice: to his priests
  chosen_spanish: a sus sacerdotes
  alternatives_spanish:
  - a los sacerdotes de él
  - a sus ministros
  lexicon: Religious office term
  rationale: «Sacerdotes» corresponde de forma directa a la función cultual indicada por el texto. Se evita «ministros» o perífrasis más interpretativas, porque el original distingue claramente un grupo sacerdotal.
- source_word: ለበሊዕ፡ ወለሰትይ፡
  english_pob_choice: to eat and to drink
  chosen_spanish: para que comieran y bebieran
  alternatives_spanish:
  - para comer y beber
  - a comer y beber
  lexicon: Purpose clause for consumption
  rationale: La subordinada final en español comunica con claridad la finalidad del don. Se conserva el paralelismo de comer y beber sin añadir matices que no están en el texto.
- source_word: በፍሥሓ፡
  english_pob_choice: with rejoicing
  chosen_spanish: con alegría
  alternatives_spanish:
  - con regocijo
  - gozosamente
  lexicon: Affect / joyful manner
  rationale: «Con alegría» transmite el valor afectivo y celebrativo del término de manera natural en español actual. «Regocijo» sería posible, pero suena más marcado y menos transparente para una lectura pública.
theological_decisions:
- issue: Giving sacred provisions to priests
  english_pob_reading: And he gave it to his priests to eat and to drink with rejoicing.
  chosen_spanish_reading: Y se los dio a sus sacerdotes para que comieran y bebieran con alegría.
  alternative_spanish_readings:
  - Y se lo dio a sus sacerdotes para comer y beber con alegría.
  - Y lo entregó a sus sacerdotes para que comieran y bebieran gozosos.
  rationale: El pasaje describe una provisión ofrecida a los sacerdotes sin desarrollar más teología explícita. La traducción mantiene el carácter de don y el tono celebrativo, sin introducir interpretación adicional sobre ritualidad o distribución.
  doctrine_reference: Descripción narrativa cultual; no implica una formulación doctrinal específica
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo capitalizó la conjunción inicial y añadió puntuación final; no alteró el contenido. Por ello, la versión española sigue de cerca el sentido estable del texto inglés auditado y del ge'ez, sin necesidad de notas textuales.
  spanish_consistency_notes:
  - Se mantiene «sacerdotes» como término cultual consistente, en vez de sustituirlo por opciones eclesiales posteriores.
  - «Con alegría» conserva el matiz de celebración del original sin elevarlo a una fórmula litúrgica fija.
  - La coordinación «de ganado mayor y de ovejas» refleja el paralelismo simple del texto fuente y evita ampliaciones no evidenciadas.
