translation:
  language: es
  text: …del sol y de la luna, todo está en la mano de Yahvé. ¿Por qué busco? Si él quiere…
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለፀሓይ ወለወርኅ
  english_pob_choice: the sun and the moon
  chosen_spanish: el sol y la luna
  alternatives_spanish:
  - el sol y la luna
  - del sol y de la luna
  lexicon: sol / luna
  rationale: El ge'ez aporta una secuencia genitiva fragmentaria; en español se conserva la referencia explícita a los dos astros sin añadir elementos no atestiguados. Dado que el segmento queda continuado desde el versículo anterior en la revisión, se mantiene con puntos suspensivos para reflejar el carácter fragmentario.
- source_word: ኵሉ
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo
  - todos
  lexicon: todo
  rationale: El término intensifica el conjunto de lo mencionado. En español, 'todo' funciona de manera natural y conserva la idea de totalidad sin forzar pluralidad innecesaria.
- source_word: በእዴ፡ እግዚአብሔር
  english_pob_choice: in the hand of the Lord
  chosen_spanish: en la mano del Señor
  alternatives_spanish:
  - en la mano del Señor
  - en la mano de Yahvé
  lexicon: mano / Señor
  rationale: La imagen idiomática se preserva literalmente. Aunque el proyecto prefiere 'Yahvé' para el nombre divino, el contexto auditado inglés usa 'Lord' y aquí la fórmula tradicional 'Señor' resulta natural en español para la expresión fija 'en la mano de'.
- source_word: ለምንት፡ አነ፡ እትኃሠሥ
  english_pob_choice: Why do I search?
  chosen_spanish: ¿Por qué busco?
  alternatives_spanish:
  - ¿Por qué busco?
  - ¿Por qué sigo buscando?
  lexicon: buscar
  rationale: El verbo ge'ez transmite la acción de buscar. '¿Por qué busco?' reproduce la forma directa y breve del original fragmentario sin ampliar el aspecto de manera no exigida.
- source_word: በእመ፡ ፈቀደ
  english_pob_choice: If he wills
  chosen_spanish: Si él quiere
  alternatives_spanish:
  - Si él quiere
  - Si lo quiere
  lexicon: querer / voluntad
  rationale: La cláusula condicional expresa voluntad/divina permisión. 'Si él quiere' conserva el valor condicional-volitivo de forma idiomática en español y evita una paráfrasis más interpretativa.
theological_decisions:
- issue: El nombre divino en una fórmula fija de autoridad
  english_pob_reading: the hand of the Lord
  chosen_spanish_reading: la mano del Señor
  alternative_spanish_readings:
  - la mano de Yahvé
  rationale: Aunque el estándar del proyecto favorece 'Yahvé' para יהוה, aquí el auditable inglés de POB ya fija 'Lord' en una expresión estable. En español, 'el Señor' mantiene la fórmula reconocible y no altera el sentido teológico de soberanía y control.
  doctrine_reference: Soberanía divina / providencia
- issue: Segmentación fragmentaria del texto y relación de la cláusula final
  english_pob_reading: '... Why do I search? If he wills...'
  chosen_spanish_reading: … ¿Por qué busco? Si él quiere…
  alternative_spanish_readings:
  - … ¿Por qué busco, si él quiere?
  - … ¿Por qué busco? Si él lo quiere…
  rationale: La revisión auditada indica que 'If he wills' inicia la continuación y no debe fusionarse con la pregunta precedente. Se preserva la fragmentación con puntos suspensivos para no falsear la sintaxis del testimonio conservado.
  doctrine_reference: Integridad textual / lectura por fragmentos
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió dos problemas: eliminó añadidos no sustentados (''signs of the stars'') y restauró la mención explícita del sol y la luna, además de reconocer que ''If he wills'' pertenece a la continuación fragmentaria. La versión española sigue esa segmentación y no incorpora material ajeno al fragmento conservado.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para 'Lord' por consistencia con la frase fija 'en la mano del Señor' y por la lectura auditada del texto inglés.
  - Se conservan puntos suspensivos iniciales y finales para reflejar que la unidad es un fragmento de continuidad textual.
  - No se introducen 'estrellas' ni otros signos astrales, conforme a la revisión crítica.
  - '''Si él quiere'' se deja separado de la pregunta para respetar la observación de segmentación del revisor.'
