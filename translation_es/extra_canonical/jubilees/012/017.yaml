    issue: Uso de 'Señor' en lugar de 'Yahvé'
    rationale: La política del proyecto exige 'Yahvé' en el texto principal para el nombre divino. El hecho de que el inglés auditado diga 'Lord' no basta para apartarse de la convención española establecida, y 'en la mano de Yahvé' es natural y fiel.
  revised_spanish_text: …del sol y de la luna, todo está en la mano de Yahvé. ¿Por qué busco? Si él quiere…
  revision_rationale: Se corrige únicamente la referencia divina para ajustarla al estándar terminológico del proyecto, sin alterar la segmentación fragmentaria ni el sentido del texto fuente.
