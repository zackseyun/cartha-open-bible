review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la segmentación fragmentaria auditada: mantiene el arranque genitivo con puntos suspensivos, conserva ''todo está en la mano...'' y separa correctamente ''Si él quiere…'' como inicio de la continuación, no como complemento de la pregunta. Sin embargo, no sigue la preferencia terminológica del proyecto para el nombre divino.'
  spanish_quality_summary: 'El español es claro y natural. ''¿Por qué busco?'' es aceptable, pero ''¿Por qué he de buscar?'' o ''¿Por qué sigo buscando?'' sonarían más plenos; aun así, la formulación actual es legible. El ajuste principal necesario es terminológico: ''del Señor'' debe cambiarse a ''de Yahvé'' según la política del proyecto, y la frase sigue siendo idiomática en español.'
  glossary_alignment: 'Desalineación con el glosario del proyecto en እግዚአብሔር / ''Lord'': el texto principal debe usar ''Yahvé'' en vez de ''Señor'' salvo justificación documentada muy fuerte. Aquí no hay razón suficiente para mantener la convención de enmascaramiento inglesa en español.'
  issues:
