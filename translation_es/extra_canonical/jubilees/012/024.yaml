  yaml_path: translation/extra_canonical/jubilees/012/024.yaml
  text: And I will be God to you and to your son and to your son's son and to all your seed. Do not fear from now and unto all the generations of the earth; I am your God." And he said to me,
  footnotes:
  - marker: a
    text: Or 'and forever, throughout'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:02Z'
    unchanged: false
    changes_summary: Changed 'through all the generations' to 'throughout all the generations' for more natural English, and removed 'the Lord God' in favor of 'he' since the source only says 'and he said to me.'
translation:
  language: es
  text: 'Y yo seré Dios para ti, para tu hijo, para el hijo de tu hijo y para toda tu descendencia. No temas desde ahora y hasta[a] todas las generaciones de la tierra; yo soy tu Dios”. Y me dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La preposición aquí expresa alcance temporal, 'hasta' o 'y hasta', con 'todas las generaciones de la tierra'; el texto no añade una palabra independiente para 'para siempre'.
    reason: textual_clarification
lexical_decisions:
- source_word: አምላከ / አምላክከ
  english_pob_choice: God / your God
  chosen_spanish: Dios / tu Dios
  alternatives_spanish:
  - Dios para ti / tu Dios
  - seré tu Dios
  lexicon: أ/ה
  rationale: 'El ge''ez expresa identidad y relación de pacto: ''seré Dios para ti'' y ''yo soy tu Dios''. En español, ''Dios'' mantiene la fuerza relacional sin recurrir a una fórmula eclesiástica más interpretativa. Se conserva el paralelismo entre la promesa y la autoidentificación final.'
- source_word: ኢትፍራህ
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: ירא / φοβέομαι
  rationale: La prohibición directa se vierte de manera natural y fiel con 'No temas', que preserva el tono bíblico y la carga exhortativa del original.
- source_word: እምይእዜ
  english_pob_choice: from now
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde este momento
  lexicon: מן עתה / ἀπὸ τοῦ νῦν
  rationale: '''Desde ahora'' reproduce con claridad el punto de inicio temporal sin añadir matices ausentes en el texto fuente.'
- source_word: ኵሉ ትዝምደ ምድር
  english_pob_choice: all the generations of the earth
  chosen_spanish: todas las generaciones de la tierra
  alternatives_spanish:
  - todas las generaciones de la tierra
  - todas las generaciones del mundo
  lexicon: דור / γενεά
  rationale: '''Generaciones'' conserva el sentido de sucesión histórica del ge''ez. ''De la tierra'' refleja literalmente la extensión geográfica/humana del original, evitando suavizarlo a un universalismo no explícito.'
- source_word: ወለወልድከ ወለወልደ ወልድከ
  english_pob_choice: and to your son and to your son's son
  chosen_spanish: para tu hijo, para el hijo de tu hijo
  alternatives_spanish:
  - para tu hijo y para el hijo de tu hijo
  - para tu hijo y para tu nieto
  lexicon: בן / υἱός
  rationale: La expresión semítica se conserva con la repetición relacional del hebreo implícito. 'Hijo de tu hijo' evita introducir un término interpretativo como 'nieto', que en español es idiomático pero menos transparente respecto de la forma del original.
- source_word: እከውንከ
  english_pob_choice: I will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré
  - me seré
  lexicon: היה / εἰμί
  rationale: El futuro de 'ser' en español expresa adecuadamente la promesa pactal de identidad y presencia. 'Seré' corresponde mejor al valor estable del original que 'estaré'.
theological_decisions:
- issue: 'Promesa de pacto: ''I will be God to you'''
  english_pob_reading: And I will be God to you... I am your God.
  chosen_spanish_reading: Y yo seré Dios para ti... yo soy tu Dios.
  alternative_spanish_readings:
  - Y yo seré tu Dios...
  - Yo seré Dios para ti... yo soy tu Dios.
  rationale: La formulación mantiene la estructura promesa/identificación del original, importante para el lenguaje de pacto. No se reemplaza por una formulación eclesiástica más interpretativa, y se preserva la tensión entre futuro ('seré') y presente ('soy').
  doctrine_reference: Teología bíblica del pacto; autoidentificación divina
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la vieja lectura inglesa “and forever, throughout” porque el ge'ez no contiene un equivalente explícito de “para siempre”; por eso el español evita introducir eternidad no atestiguada y conserva únicamente la extensión temporal hasta las generaciones de la tierra. También se respetó la omisión de “el Señor Dios” en la última cláusula, ya que el fuente dice simplemente “y me dijo”.
  spanish_consistency_notes:
  - Se usó 'Dios' y no 'SEÑOR' porque el pasaje no contiene el tetragrámaton ni un motivo de ocultamiento nominal.
  - Se mantuvo 'No temas' por ser la forma bíblica natural y directa en español.
  - Se conservó 'hijo de tu hijo' para no convertir una expresión semítica transparente en una equivalencia interpretativa ('nieto').
  - 'La puntuación refleja el cierre de cita y la transición a la fórmula narrativa final: ''Y me dijo:'''
