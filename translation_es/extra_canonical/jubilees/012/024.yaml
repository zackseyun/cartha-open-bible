    issue: Marcador de nota al pie mal ubicado
    rationale: La nota explica el valor de la preposición en la frase temporal ('y hasta / hasta todas las generaciones de la tierra'), pero el marcador [a] está colocado después de 'yo soy tu Dios', donde no guarda relación con la explicación.
  - severity: low
    issue: Necesidad de ajuste editorial mínimo en la nota
    rationale: La nota actual dice 'puede leerse también como “hasta” o “y hasta”', pero el español principal ya usa 'y hasta' implícitamente en la coordinación de 'desde ahora y hasta...'. Conviene mantener la explicación enfocada en que el original expresa alcance temporal 'hasta' y no incluye 'para siempre'.
  revised_spanish_text: 'Y yo seré Dios para ti, para tu hijo, para el hijo de tu hijo y para toda tu descendencia. No temas desde ahora y hasta[a] todas las generaciones de la tierra; yo soy tu Dios”. Y me dijo:'
  revised_footnotes:
  - marker: a
    text: La preposición aquí expresa alcance temporal, 'hasta' o 'y hasta', con 'todas las generaciones de la tierra'; el texto no añade una palabra independiente para 'para siempre'.
    reason: textual_clarification
  revision_rationale: Se conserva la traducción principal porque es fiel y legible. Solo se corrige el anclaje de la nota para que coincida con el elemento fuente que explica y se afina su redacción para reflejar con más precisión la decisión auditada sobre 'unto' frente a una lectura errónea de 'forever'.
