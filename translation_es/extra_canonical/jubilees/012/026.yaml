translation:
  language: es
  text: Y abrí su boca, sus oídos y sus labios, y comencé a hablar con él en hebreo, en la lengua de la creación. Y tomó los libros de sus padres, y estaban escritos en hebreo, y los copió y comenzó desde entonces a estudiarlos. Y le di a conocer todo lo que no podía entender, y los estudió durante los seis meses de lluvia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወፈታሕኩ፡ አፉሁ፡ ወአዛኒሁ፡ ወከናፍሪሁ
  english_pob_choice: And I opened his mouth and his ears and his lips
  chosen_spanish: Y abrí su boca, sus oídos y sus labios
  alternatives_spanish:
  - Y le abrí la boca, los oídos y los labios
  - Abrí su boca, sus oídos y sus labios
  lexicon: abrir; boca; oídos; labios
  rationale: El ge'ez enumera tres aberturas corporales y el inglés POB las conserva de forma literal. En español, 'abrí su boca, sus oídos y sus labios' mantiene la secuencia y la fuerza corporal sin añadir explicación interpretativa.
- source_word: እትናገር፡ ምስሌሁ፡ በዕብራይስጥ፡ በልሳነ፡ ፍጥረታት
  english_pob_choice: I began to speak with him in Hebrew, in the language of creation
  chosen_spanish: comencé a hablar con él en hebreo, en la lengua de la creación
  alternatives_spanish:
  - empecé a hablar con él en hebreo, en la lengua de la creación
  - comencé a hablarle en hebreo, la lengua de la creación
  lexicon: hablar; hebreo; lengua; creación
  rationale: '''Lengua de la creación'' sigue de cerca el giro del texto y del inglés POB. Se conserva ''hebreo'' como designación de idioma sin sustituirlo por una paráfrasis más amplia.'
- source_word: ወነሥአ፡ መጻሕፍተ፡ አበዊሁ፡ ወጽሑፋት፡ እማንቱ፡ ዕብራይስጢ
  english_pob_choice: And he took the books of his fathers, and they were written in Hebrew
  chosen_spanish: Y tomó los libros de sus padres, y estaban escritos en hebreo
  alternatives_spanish:
  - Y tomó los libros de sus padres, escritos en hebreo
  - Y tomó los libros de sus padres, y eran hebreos en su escritura
  lexicon: tomar; libros; padres; escrito; hebreo
  rationale: '''Libros de sus padres'' reproduce la referencia ancestral sin precisar ''antepasados'', porque el texto y el inglés POB mantienen la formulación más directa. ''Estaban escritos en hebreo'' conserva la pasiva descriptiva.'
- source_word: ወደገሞን፡ ወአኀዘ፡ ይትመሀሮን፡ እምአሜሃ
  english_pob_choice: and he copied them and began from then on to study them
  chosen_spanish: y los copió y desde entonces comenzó a estudiarlos
  alternatives_spanish:
  - y los copió y comenzó desde entonces a estudiarlos
  - y los transcribió y desde entonces comenzó a estudiarlos
  lexicon: copiar; desde entonces; estudiar
  rationale: '''Copió'' sigue el inglés POB y preserva el acto de reproducir los escritos. ''Desde entonces'' transmite la idea temporal de un comienzo a partir de ese momento sin añadir matiz doctrinal.'
- source_word: ወአነ፡ አየድዖ፡ ኵሎ፡ ዘይስእኖ
  english_pob_choice: And I made known to him everything that he was unable to understand
  chosen_spanish: Y le hice conocer todo lo que no podía entender
  alternatives_spanish:
  - Y le di a conocer todo lo que no podía entender
  - Y le hice saber todo lo que no podía entender
  lexicon: hacer conocer; entender
  rationale: '''Hice conocer'' conserva la forma factitiva del original y del inglés POB. ''Entender'' expresa la incapacidad cognitiva sin convertirla en una afirmación más fuerte que la del texto.'
- source_word: ወተምህሮን፡ ስድስተ፡ ወርኀ፡ ዘናም፡
  english_pob_choice: and he studied them during the six rainy months
  chosen_spanish: y los estudió durante los seis meses de lluvia
  alternatives_spanish:
  - y los estudió durante los seis meses lluviosos
  - y los estudió durante los seis meses de lluvia
  lexicon: estudiar; seis; meses; lluvia
  rationale: '''Meses de lluvia'' es la traducción más directa de la expresión estacional del texto; evita normalizarla a un adjetivo cuando el sustantivo conserva mejor el ritmo y la referencia climática.'
theological_decisions:
- issue: Designación de la lengua sagrada/originaria
  english_pob_reading: in the language of creation
  chosen_spanish_reading: en la lengua de la creación
  alternative_spanish_readings:
  - en el idioma de la creación
  - en la lengua primordial
  rationale: El POB inglés mantiene 'language of creation' como expresión tradicional del pasaje. En español, 'lengua de la creación' conserva el carácter solemne y no interpreta más allá de lo que dice el texto.
  doctrine_reference: Génesis 11; tradición enoc-jubilar sobre el hebreo primordial
- issue: Referencia temporal final
  english_pob_reading: during the six rainy months
  chosen_spanish_reading: durante los seis meses de lluvia
  alternative_spanish_readings:
  - durante los seis meses lluviosos
  - a lo largo de los seis meses de lluvia
  rationale: No se espiritualiza ni se identifica el período con una estación litúrgica; se conserva la referencia climática concreta del texto.
  doctrine_reference: Contexto agrícola y calendárico de Jubileos
translation_notes:
  revision_awareness: La fuente ge'ez y la traducción inglesa POB coinciden estrechamente; el borrador español sigue esa lectura sin introducir expansión interpretativa. No hay revisiones aplicadas en el expediente reciente, y el cotejo cruzado reporta alta concordancia.
  spanish_consistency_notes:
  - Se preservó 'hebreo' de forma consistente como nombre de idioma, no como etnónimo.
  - Se mantuvo la estructura narrativa en primera persona singular con series coordinadas unidas por 'y'.
  - Se evitó sustituir 'libros' por 'escrituras' o 'rollos' porque la evidencia disponible y el POB inglés hablan de 'books'.
  - No se añadieron notas al pie porque el texto y el audit trail no documentan variantes significativas para este versículo.
