  text: And I opened his mouth and his ears and his lips, and I began to speak with him in Hebrew, in the language of creation. And he took the books of his fathers, and they were written in Hebrew, and he copied them and began from then on to study them. And I made known to him everything that he was unable to understand, and he studied them during the six rainy months.
  revision_pass:
