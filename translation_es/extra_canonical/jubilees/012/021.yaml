base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/012/021.yaml
  text: And he said[12:21], "Shall I return to Ur of the Chaldeans, who seek my face so that I should return to them? And what shall I do here in this place? Make the right path straight before you in the hand of your servant, that he may do it, and let me not walk in the error of my heart, my God." And he finished speaking and praying, and behold, one was sent
  footnotes:
  - marker: '12:21'
    text: The middle of this verse is difficult in the segmented Ge'ez. The translation preserves the sense of Abram asking God to make the right path straight before him and not let him follow his own erring heart.
    reason: segmentation_note
  - marker: a
    text: Or 'where they seek my life so that I should go in to them?'.
    reason: previous_rendering
  - marker: b
    text: Or 'Make straight before me the right path, and let it be done by the hand of your servant,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:03Z'
    unchanged: false
    changes_summary: Revised 'seek my face' to 'seek my life' for idiomatic accuracy; changed 'return to them' to 'go in to them' to better reflect the source; adjusted 'Or what' to 'And what' for smoother coordination; changed 'before you' to 'before me' and simplified word order in the petition for a more natural and faithful rendering; added 'one' in 'behold, one was sent' to account for the passive verb's implied subject.
translation:
  language: es
  text: 'Y dijo: «¿Volveré a Ur de los caldeos, quienes buscan mi rostro[a] para que yo vuelva a ellos? ¿Y qué haré aquí en este lugar? Endereza el camino recto delante de ti[b] por la mano de tu siervo, para que él lo haga, y no me dejes andar en el error de mi corazón, Dios mío». Y terminó de hablar y de orar, y he aquí, uno fue enviado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quienes buscan mi vida». Aquí se conserva «mi rostro», de acuerdo con la lectura del Ge''ez adoptada en la revisión inglesa.'
    reason: alternative_reading
  - marker: b
    text: El original aquí apoya «delante de ti», no «delante de mí».
    reason: textual_variant
lexical_decisions:
- source_word: ውስተ፡ ኡር፡ ዘከለዳውያን፡
  english_pob_choice: Ur of the Chaldeans
  chosen_spanish: Ur de los caldeos
  alternatives_spanish:
  - Ur de los caldeos
  - Ur de Caldea
  lexicon: toponym
  rationale: Mantiene el nombre propio bíblico tradicional y el genitivo étnico natural en español, sin añadir glosa innecesaria.
- source_word: የኀሥሡ፡ ገጽየ፡
  english_pob_choice: who seek my face
  chosen_spanish: quienes buscan mi rostro
  alternatives_spanish:
  - quienes buscan mi rostro
  - quienes me buscan
  - quienes buscan mi presencia
  lexicon: seek + face idiom
  rationale: Se conserva literalmente la expresión semítica 'buscar el rostro', porque el audit trail rechazó reemplazarla por una lectura de 'buscar mi vida'. En español suena bíblica y deja visible la tensión idiomática.
- source_word: ከመ፡ እግባእ፡ ኀቤሆሙ፡
  english_pob_choice: so that I should return to them
  chosen_spanish: para que yo vuelva a ellos
  alternatives_spanish:
  - para que yo vuelva a ellos
  - para regresar a ellos
  lexicon: return/come back
  rationale: '''Vuelva a ellos'' refleja el movimiento de retorno indicado por el Ge''ez y mantiene la relación causal introducida por ''para que''.'
- source_word: ወሚመ፡ እገበር፡ ዝየ፡ በዝ፡ መካን፡
  english_pob_choice: And what shall I do here in this place?
  chosen_spanish: ¿Y qué haré aquí en este lugar?
  alternatives_spanish:
  - ¿Y qué haré aquí en este lugar?
  - ¿Y qué debo hacer aquí, en este lugar?
  lexicon: question of action/location
  rationale: Conserva la pregunta coordinada del texto y el valor local ('aquí en este lugar') sin sobrecargarlo con explicaciones.
- source_word: ፍኖተ፡ ርቱዐ፡
  english_pob_choice: the right path
  chosen_spanish: el camino recto
  alternatives_spanish:
  - el camino recto
  - la senda recta
  - el camino correcto
  lexicon: path/straight/right
  rationale: '''Camino recto'' reproduce bien el valor direccional-moral de ''right path'' en español bíblico moderno.'
- source_word: በቅድሜከ፡
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - delante de ti
  - ante ti
  lexicon: before you
  rationale: La revisión mostró que el Ge'ez pide la colocación 'before you'. 'Delante de ti' es natural en español y conserva la relación espacial/relacional.
- source_word: ኪያሃ፡ ሠርኅ፡
  english_pob_choice: Make straight
  chosen_spanish: Endereza
  alternatives_spanish:
  - Endereza
  - Haz recto
  - Allana
  lexicon: make straight
  rationale: Imperativo directo y claro, fiel al verbo de enderezar/rectificar el camino.
- source_word: በእዴ፡ ገብርከ፡
  english_pob_choice: in the hand of your servant
  chosen_spanish: en manos de tu siervo
  alternatives_spanish:
  - en manos de tu siervo
  - por la mano de tu siervo
  lexicon: hand of your servant
  rationale: '''En manos de'' conserva la imagen idiomática semítica y suena natural en español; ''siervo'' se ajusta al contexto de súplica reverente.'
- source_word: ይግበር፡
  english_pob_choice: that he may do it
  chosen_spanish: para que él lo haga
  alternatives_spanish:
  - para que él lo haga
  - que él lo haga
  lexicon: do
  rationale: Respeta la lectura activa confirmada por la revisión y hace explícito el sujeto implícito ('él').
- source_word: ወኢይሖር፡ በስሕተት፡ ልብየ፡
  english_pob_choice: and let me not walk in the error of my heart
  chosen_spanish: y no me dejes andar en el error de mi corazón
  alternatives_spanish:
  - y no me dejes andar en el error de mi corazón
  - y no permita mi corazón el error de mi andar
  lexicon: walk in error of heart
  rationale: Mantiene la metáfora moral de 'andar' y 'error de mi corazón' sin neutralizar la fuerza antropológica del hebraísmo.
- source_word: አምላኪየ፡
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - Dios mío
  - mi Dios
  lexicon: address to God
  rationale: '''Dios mío'' es la forma más idiomática y reverente en español, manteniendo la vocación directa.'
- source_word: ወናሁ፡ ተፈነወ፡
  english_pob_choice: and behold, one was sent
  chosen_spanish: y he aquí, uno fue enviado
  alternatives_spanish:
  - y he aquí, uno fue enviado
  - y he aquí, fue enviado uno
  lexicon: behold + passive
  rationale: Sigue la revisión que añade el sujeto implícito 'uno' para el pasivo, sin identificarlo más allá de lo que el texto da.
theological_decisions:
- issue: Buscar el rostro vs. buscar la vida
  english_pob_reading: who seek my face
  chosen_spanish_reading: quienes buscan mi rostro
  alternative_spanish_readings:
  - quienes buscan mi vida
  rationale: 'La última revisión inglesa volvió al sentido del Ge''ez: ''mi rostro''. En español se conserva la metáfora, evitando imponer una lectura de hostilidad que el texto no sostiene.'
  doctrine_reference: Semitismo bíblico / teología de la presencia
- issue: '''Before you'' en la petición del camino'
  english_pob_reading: Make the right path straight before you
  chosen_spanish_reading: Endereza delante de ti el camino recto
  alternative_spanish_readings:
  - Endereza delante de mí el camino recto
  - Endereza el camino recto delante de ti
  rationale: La revisión textual confirmó 'before you', no 'before me'. La formulación española mantiene la dirección hacia Dios como destinatario de la petición y respeta la sintaxis más probable del Ge'ez.
  doctrine_reference: Fidelidad textual y oración dirigida a Dios
- issue: '''Hand of your servant'' y sujeto activo'
  english_pob_reading: in the hand of your servant, that he may do it
  chosen_spanish_reading: en manos de tu siervo, para que él lo haga
  alternative_spanish_readings:
  - por la mano de tu siervo, para que él lo haga
  - en la mano de tu siervo, para que lo haga
  rationale: La revisión inglesa corrige una pasiva errónea y hace explícito un sujeto activo. El español conserva la imagen y la agencia del siervo sin convertirlo en mero instrumento pasivo.
  doctrine_reference: Agencia humana bajo la dirección divina
- issue: '''One was sent'' sin identificar al enviado'
  english_pob_reading: behold, one was sent
  chosen_spanish_reading: he aquí, uno fue enviado
  alternative_spanish_readings:
  - he aquí, fue enviado uno
  - he aquí, alguien fue enviado
  rationale: El texto no identifica al enviado; por eso se deja indefinido. Esto evita añadir interpretaciones no respaldadas por el pasaje.
  doctrine_reference: Precaución exegética / no sobreespecificar
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones: una corrección importante restauró ''quienes buscan mi rostro'' frente a una lectura errónea de ''mi vida''; otra confirmó ''delante de ti'' y el valor activo de ''para que él lo haga''. La traducción española sigue esas correcciones y evita las lecturas descartadas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aparece en el verso.
  - '''Mesías/Cristo'' no aplica en este versículo.'
  - '''Siervo'' se usa por la fórmula reverente de la petición y por la imagen de agencia subordinada, no como traducción de δοῦλος en abstracto.'
  - Se conserva la metáfora de 'rostro' y 'corazón' para respetar el lenguaje semítico del pasaje.
  - La puntuación de apertura y cierre de comillas sigue el español estándar y separa claramente la cita directa.
