  text: su nombre, Lot.[a] Y Nahor, su hermano, tomó para sí una esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "su nombre fue Lot". La frase también puede entenderse como continuación sintáctica del versículo anterior.'
