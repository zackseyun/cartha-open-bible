lexical_decisions:
- source_word: ስሞ (his name)
  english_pob_choice: his name was Lot / his name Lot
  chosen_spanish: su nombre fue Lot
  alternatives_spanish:
  - su nombre Lot
  - se llamaba Lot
  lexicon: nombre
  rationale: El ge'ez presenta una identificación nominal breve; en español, 'su nombre fue Lot' comunica de modo natural la identificación y conserva la relación con el contexto sintáctico señalado en la auditoría inglesa, sin introducir material ajeno.
- source_word: ነሥአ (took for himself)
  english_pob_choice: took for himself
  chosen_spanish: tomó para sí
  alternatives_spanish:
  - tomó
  - se tomó para sí
  lexicon: tomar
  rationale: '''Tomó para sí'' reproduce el valor reflexivo/intencional del verbo como acción deliberada de tomar esposa, manteniendo la fuerza del original sin paraphrasearlo.'
- source_word: ብእሲተ (wife / woman)
  english_pob_choice: a wife
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una mujer para esposa
  lexicon: mujer/esposa
  rationale: El término ge'ez corresponde literalmente a 'mujer'. Dado que el inglés POB usa 'wife', en español 'una mujer' conserva la literalidad base del término fuente; no obstante, en este contexto matrimonial puede leerse como mujer/esposa, por lo que no se fuerza una especificación no explicitada por el texto.
theological_decisions:
- issue: Relación entre la cláusula nominal y el contexto inmediato
  english_pob_reading: his name Lot
  chosen_spanish_reading: su nombre fue Lot
  alternative_spanish_readings:
