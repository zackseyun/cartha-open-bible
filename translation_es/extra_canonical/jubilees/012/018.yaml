translation:
  language: es
  text: Él hace llover en la mañana y en la tarde; y si quiere, no lo hace caer. Y todo está en su mano.[a] Y oró
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su mano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ያዘንም፡
  english_pob_choice: He causes it to rain
  chosen_spanish: Él hace llover
  alternatives_spanish:
  - Él causa que llueva
  - Él hace que llueva
  lexicon: llover
  rationale: El ge'ez afirma directamente la acción de hacer llover; en español, 'hace llover' comunica esa causalidad sin volverla innecesariamente pesada.
- source_word: ነግሀ፡ ወሰርከ፡
  english_pob_choice: in the morning and in the evening
  chosen_spanish: en la mañana y en la tarde
  alternatives_spanish:
  - por la mañana y por la tarde
  - en la mañana y en la noche
  lexicon: mañana/tarde
  rationale: La pareja temporal se conserva de forma natural en español. 'Tarde' es más neutral que 'evening' en muchos contextos bíblicos hispanos y evita especificar de más.
- source_word: ወእመ፡ ፈቀደ፡
  english_pob_choice: and if he wills
  chosen_spanish: y si quiere
  alternatives_spanish:
  - y si él quiere
  - y si lo desea
  lexicon: querer
  rationale: La cláusula condicional expresa voluntad divina. 'Quiere' mantiene la sencillez del original y el sentido de voluntad eficaz.
- source_word: ኢያወርድ፡
  english_pob_choice: he does not make it come down
  chosen_spanish: no lo hace caer
  alternatives_spanish:
  - no lo hace descender
  - no lo deja bajar
  lexicon: hacer caer
  rationale: El verbo con negación indica que no provoca la caída de la lluvia. 'Hacer caer' reproduce bien la imagen y suena más natural que una construcción demasiado literal.
- source_word: ወኵሉ፡ ውስተ፡ እዴሁ።
  english_pob_choice: And everything is in his hand.
  chosen_spanish: Y todo está en su mano.
  alternatives_spanish:
  - Y todo está en su poder.
  - Y todo está en sus manos.
  lexicon: mano
  rationale: Se mantiene la metáfora de dominio y control. 'En su mano' es la forma más directa y tradicional de la imagen bíblica sin perder claridad en español.
- source_word: ወጸለየ፡
  english_pob_choice: And he prayed
  chosen_spanish: Y oró
  alternatives_spanish:
  - Y él oró
  - Y rezó
  lexicon: orar
  rationale: La forma verbal breve conserva el inicio narrativo que ya se anticipa en el segmento fuente, aunque en la división canónica corresponde al siguiente versículo.
theological_decisions:
- issue: Voluntad divina y causalidad de la lluvia
  english_pob_reading: He causes it to rain ... and if he wills, he does not make it come down.
  chosen_spanish_reading: Él hace llover ... y si quiere, no lo hace caer.
  alternative_spanish_readings:
  - Si quiere, hace llover ...
  - si quiere, no deja que caiga
  rationale: La fuente distingue entre el acto de hacer llover y la posibilidad de retener la lluvia según su voluntad. La traducción mantiene esa tensión sin fusionar ambas cláusulas.
  doctrine_reference: Providencia divina; soberanía de Dios sobre la creación.
- issue: Frase final 'in his hand'
  english_pob_reading: And everything is in his hand.
  chosen_spanish_reading: Y todo está en su mano.
  alternative_spanish_readings:
  - Y todo está en su poder.
  - Y todo está en sus manos.
  rationale: La imagen de la mano expresa control soberano. Se conserva la metáfora bíblica en lugar de sustituirla por una abstracción.
  doctrine_reference: Providencia; soberanía divina
translation_notes:
  revision_awareness: 'La revisión inglesa corrige dos puntos del audit trail: quita ''si quiere'' de la primera cláusula, y reconoce que ''And he prayed'' pertenece al segmento textual recibido aunque narrativamente abre el siguiente versículo. La versión española sigue esa corrección al no añadir una condición en la primera cláusula y al incluir el arranque ''Y oró'' como cierre del segmento fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito.
  - Se mantiene 'mano' en singular para reflejar la metáfora del control soberano.
  - '''oró'' se deja al final porque el texto fuente lo incluye, aunque funciona como enlace al versículo siguiente en la división canónica.'
