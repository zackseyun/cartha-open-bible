translation:
  language: es
  text: para que los adoren y los alaben. «Calla, hijo mío, no sea que te maten». Y les dijo estas palabras a sus dos hermanos, y ellos se enojaron con él, y él guardó silencio.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ያምልክዎሙ
  english_pob_choice: they worship them
  chosen_spanish: los adoren
  alternatives_spanish:
  - les rindan culto
  - los veneren
  lexicon: amplio culto/adoración
  rationale: El verbo ge’ez indica rendir adoración; en español bíblico moderno, «adoren» comunica mejor el acto de culto sin perder la fuerza religiosa. «Rindan culto» sería posible, pero resulta más técnico y menos fluido aquí.
- source_word: ወይስብሕዎሙ
  english_pob_choice: and praise them
  chosen_spanish: y los alaben
  alternatives_spanish:
  - y los ensalcen
  - y les den alabanza
  lexicon: alabar
  rationale: «Alaben» reproduce la segunda acción distinta del original, manteniendo el paralelismo con la adoración. No se fusiona con el verbo anterior para no borrar la duplicación expresiva.
- source_word: አርምም
  english_pob_choice: Be silent
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Quédate callado
  lexicon: callar
  rationale: El imperativo breve conserva el tono urgente y directo del original. «Calla» es natural en español y mantiene la advertencia inmediata.
- source_word: ከመ፡ አይቅትሉከ
  english_pob_choice: lest they kill you
  chosen_spanish: no sea que te maten
  alternatives_spanish:
  - para que no te maten
  - no sea que te maten a ti
  lexicon: amenaza/propósito negativo
  rationale: La construcción de finalidad negativa con riesgo futuro se expresa de manera idiomática con «no sea que». Evita una literalidad torpe y conserva el temor explícito a la muerte.
- source_word: ወነገረ፡
  english_pob_choice: And he spoke these words to his two brothers...
  chosen_spanish: Y les dijo estas palabras a sus dos hermanos
  alternatives_spanish:
  - Y habló estas palabras a sus dos hermanos
  - Y les habló a sus dos hermanos
  lexicon: decir/hablar
  rationale: La revisión del audit trail muestra que el verbo final completa la frase como «y dijo». En español, «les dijo estas palabras» refleja bien el valor de declaración seguido del contenido citado, sin sobrecargar la estructura.
theological_decisions:
- issue: Adoración dirigida a otros seres versus alabanza humana
  english_pob_reading: they worship them and praise them
  chosen_spanish_reading: los adoren y los alaben
  alternative_spanish_readings:
  - les rindan culto y los alaben
  - los veneren y los alaben
  rationale: Se conserva la distinción entre adoración y alabanza porque el texto nombra ambas acciones. No se suaviza a una sola idea devocional.
  doctrine_reference: distinción entre adoración debida a Dios y alabanza como acción verbal
- issue: Amenaza de muerte como motivo de silencio
  english_pob_reading: lest they kill you
  chosen_spanish_reading: no sea que te maten
  alternative_spanish_readings:
  - para que no te maten
  - por miedo a que te maten
  rationale: La advertencia expresa peligro real; la redacción escogida mantiene el matiz preventivo sin introducir una psicología que el texto no exige.
  doctrine_reference: providencia y prudencia frente a persecución
translation_notes:
  revision_awareness: 'La nota de revisión indica que el cierre del versículo quedó truncado en una iteración previa y que la frase final debe incluir la continuación completa: el hablante se dirige a sus dos hermanos, ellos se enojan con él y él guarda silencio. La presente redacción incorpora esa secuencia completa y evita el error de terminar en un verbo de habla incompleto. También se corrige la colocación de la nota al anclarla en el texto.'
  spanish_consistency_notes:
  - Se usa «alaben» como paralelo distinto de «adoren» para no fusionar dos verbos del original.
  - Se mantiene el registro bíblico sobrio, con puntuación moderna y comillas cerradas.
  - Se evita «SEÑOR» o equivalentes, porque este pasaje no contiene el tetragrámaton ni un marco de sustitución para el nombre divino.
