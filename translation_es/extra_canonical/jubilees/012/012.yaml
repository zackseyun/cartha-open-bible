base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/012/012.yaml
  text: And in the sixtieth year of the life of Abram, that is, in the fourth week, in its fourth year, Abram arose by night and burned the house of idols, and he burned everything that was in the house, and no one knew it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:00Z'
    unchanged: false
    changes_summary: Changed 'no person knew it' to the more natural formal rendering 'no one knew it.'
translation:
  language: es
  text: Y en el año sesenta de la vida de Abram, esto es, en la cuarta semana, en su cuarto año, Abram se levantó de noche y quemó la casa de los ídolos, y quemó todo lo que había en la casa, y nadie lo supo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በዓመት፡ ዘስሳ፡ ዘሕይወቱ፡ አብራም፡
  english_pob_choice: in the sixtieth year of the life of Abram
  chosen_spanish: en el año sesenta de la vida de Abram
  alternatives_spanish:
  - en el sexagésimo año de la vida de Abram
  - cuando Abram cumplía sesenta años
  lexicon: año; vida
  rationale: El ge'ez expresa literalmente la edad cronológica de Abram. 'Año sesenta' conserva la estructura fuente con tono bíblico claro; 'sexagésimo' sería igualmente correcto, pero menos transparente al patrón del original.
- source_word: ሱባዔ፡ ራብዕ፡
  english_pob_choice: in the fourth week
  chosen_spanish: en la cuarta semana
  alternatives_spanish:
  - en la semana cuarta
  - en la cuarta semana de años
  lexicon: semana
  rationale: En Jubileos, 'semana' funciona como unidad cronológica de años; 'cuarta semana' preserva el término técnico sin explicarlo de más. No se añade 'de años' porque el contexto ya lo hace evidente en esta sección.
- source_word: በዓመት፡ ራብዕ፡
  english_pob_choice: in its fourth year
  chosen_spanish: en su cuarto año
  alternatives_spanish:
  - en el cuarto año de ella
  - en el cuarto de sus años
  lexicon: año
  rationale: '''Su cuarto año'' reproduce la referencia interna a la ''semana'' anterior y suena natural en español, manteniendo la correlación cronológica del pasaje.'
- source_word: ተንሥአ፡ ... በሌሊት፡
  english_pob_choice: Abram arose by night
  chosen_spanish: Abram se levantó de noche
  alternatives_spanish:
  - Abram se levantó durante la noche
  - Abram se alzó de noche
  lexicon: levantarse; noche
  rationale: '''Se levantó de noche'' es una equivalencia idiomática fiel al movimiento nocturno del verbo y evita un calco menos natural.'
- source_word: ወአውዐየ፡ ቤተ፡ ጣዖታት፡
  english_pob_choice: and burned the house of idols
  chosen_spanish: y quemó la casa de los ídolos
  alternatives_spanish:
  - y incendió la casa de los ídolos
  - y quemó el templo de ídolos
  lexicon: quemar; casa; ídolos
  rationale: La combinación 'casa de los ídolos' sigue de cerca la expresión fuente y la auditoría inglesa. 'Quemó' mantiene el acto destructivo sin añadir una connotación de incendio accidental.
- source_word: ወአውዐየ፡ ኵሎ፡ በውስተ፡ ቤት፡
  english_pob_choice: and he burned everything that was in the house
  chosen_spanish: y quemó todo lo que había en la casa
  alternatives_spanish:
  - y quemó todo lo que estaba en la casa
  - y quemó todo cuanto estaba en la casa
  lexicon: todo; casa
  rationale: '''Todo lo que había en la casa'' es la forma más natural en español y conserva la totalidad absoluta del original sin añadir detalle interpretativo.'
- source_word: ወሰብእ፡ አልቦ፡ ዘአእመረ።
  english_pob_choice: and no one knew it
  chosen_spanish: y nadie lo supo
  alternatives_spanish:
  - y nadie lo conoció
  - y ningún hombre lo supo
  lexicon: nadie; saber
  rationale: La revisión inglesa prefirió 'no one knew it' por naturalidad formal; 'nadie lo supo' reproduce fielmente el sentido de ignorancia del hecho y es idiomático en español.
theological_decisions:
- issue: Destrucción de la casa de ídolos por Abram
  english_pob_reading: burned the house of idols
  chosen_spanish_reading: quemó la casa de los ídolos
  alternative_spanish_readings:
  - incendió la casa de los ídolos
  - destruyó la casa de los ídolos
  rationale: El texto presenta una acción concreta de demolición por fuego contra un lugar idolátrico; 'quemó' es la traducción más directa y mantiene la violencia narrativa sin suavizarla ni amplificarla.
  doctrine_reference: Narrativa de Jubileos 12:12; destrucción de idolatría
- issue: Ignorancia pública del acto
  english_pob_reading: and no one knew it
  chosen_spanish_reading: y nadie lo supo
  alternative_spanish_readings:
  - y nadie se enteró
  - y no lo supo nadie
  rationale: La forma enfatiza que el acto quedó oculto a todos; 'nadie lo supo' conserva el cierre del relato sin introducir un matiz distinto como 'enterarse'.
  doctrine_reference: Jubileos 12:12; ocultamiento del acto
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del texto inglés, que sustituyó 'no person knew it' por la forma más natural 'no one knew it'. La versión española adopta igualmente una formulación natural ('nadie lo supo') sin alterar el contenido ni introducir ambigüedad adicional.
  spanish_consistency_notes:
  - Se conserva 'Abram' de acuerdo con el texto fuente y el audit trail en inglés.
  - '''Casa de los ídolos'' mantiene el paralelismo del inglés POB y la concreción del ge''ez.'
  - No se añaden notas de pie porque el pasaje no presenta variantes textuales ni tensiones léxicas que requieran explicación adicional en español.
