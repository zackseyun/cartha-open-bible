base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/012/025.yaml
  text: 'The Lord God [said]: ''Open his mouth and his ears, so that he may hear and speak with his mouth in the language that has been revealed, for it has ceased from the mouths of all the children of men from the day of the overthrow.''[12:25]'
  footnotes:
  - marker: '12:25'
    text: 'The final phrase likely refers to the loss of the primordial language after the judgment associated with Babel; the Ge''ez wording is compressed: ''from the day of the overthrow.'''
    reason: cross_reference
  - marker: a
    text: Or 'May the Lord God open his mouth and his ears[12:25], so that he may hear and speak with his mouth in the language that has been revealed, for it has ceased from the mouths of all the children of men from the day of the overthrow.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:03Z'
    unchanged: false
    changes_summary: Added 'May the Lord God' to reflect the opening invocation in the source, changed 'that' to 'so that' for smoother formal English, and rendered the verb as 'has been revealed' for a more natural expression while preserving the sense.
translation:
  language: es
  text: 'Yahvé Dios [dijo]: «Abre su boca y sus oídos, para que oiga y hable con su boca en la lengua que ha sido revelada, porque ha cesado de las bocas de todos los hijos de los hombres desde el día del derribo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La frase final probablemente alude a la pérdida de la lengua primordial después del juicio asociado con Babel; la redacción ge’ez es comprimida: «desde el día del derribo».'
    reason: cross_reference
lexical_decisions:
- source_word: እግዚአብሔር፡ አምላክ፡
  english_pob_choice: The Lord God
  chosen_spanish: El Señor Dios
  alternatives_spanish:
  - Yahvé Dios
  - El Señor Yahvé
  lexicon: YHWH / θεός
  rationale: El audit trail inglés abre con la invocación divina; en español, «Señor Dios» reproduce la forma solemne y readable del rótulo compuesto sin introducir una transliteración que el texto fuente no exige aquí. Dado que el pasaje ge’ez no explicita el tetragrámaton de forma separada, no fuerzo «Yahvé» en el cuerpo principal.
- source_word: ፍታሕ
  english_pob_choice: Open
  chosen_spanish: Abre
  alternatives_spanish:
  - Abrad
  - Que se abra
  lexicon: imperative verb
  rationale: El revisado inglés final tomó el imperativo «Open», y el comentario de revisión indica que el verbo ge’ez es un imperativo de segunda persona singular. Por eso uso el mandato directo «Abre».
- source_word: አፉሁ፡ ወአዛኒሁ፡
  english_pob_choice: his mouth and his ears
  chosen_spanish: su boca y sus oídos
  alternatives_spanish:
  - la boca y los oídos de él
  - su boca y su oído
  lexicon: body-parts possessive
  rationale: El ge’ez tiene posesivos marcados; en español, la posesión natural es «su». Mantengo el plural «oídos» como en el inglés auditado.
- source_word: ይስማዕ፡ ወይትበብ፡
  english_pob_choice: so that he may hear and speak
  chosen_spanish: para que oiga y hable
  alternatives_spanish:
  - a fin de que oiga y hable
  - para que escuche y hable
  lexicon: purpose clause
  rationale: La cláusula final expresa finalidad. «Oiga» conserva mejor el matiz perceptivo de ይስማዕ que «escuche»; «hable» es el equivalente natural y directo para ወይትበብ.
- source_word: በአፉሁ፡ በልሳን፡ እንተ፡ ታስተርኢ፡
  english_pob_choice: with his mouth in the language that has been revealed
  chosen_spanish: con su boca en la lengua que ha sido revelada
  alternatives_spanish:
  - con su boca en el idioma que ha sido revelado
  - con su boca en la lengua revelada
  lexicon: language / revealed
  rationale: «Lengua» mantiene la metáfora idiomática del texto y coincide con la formulación auditada inglesa. «Ha sido revelada» conserva la voz pasiva y la idea de algo dado a conocer; «idioma» es posible, pero «lengua» es más cercano al registro bíblico y al paralelismo del pasaje.
- source_word: እስመ፡ አዐረፈ፡ እምአፈ፡ ኵሉ፡ ውሉደ፡ ሰብእ፡
  english_pob_choice: for it has ceased from the mouths of all the children of men
  chosen_spanish: porque ha cesado de las bocas de todos los hijos de los hombres
  alternatives_spanish:
  - porque cesó de las bocas de todos los hijos de los hombres
  - porque ha dejado de estar en las bocas de todos los hijos de los hombres
  lexicon: cease / mouths of all the children of men
  rationale: Conservo la construcción bastante literal del auditado inglés para no perder la conexión con la observación textual sobre la lengua primordial. «Ha cesado» expresa el estado resultante; «de las bocas» reproduce el giro semítico y evita suavizarlo indebidamente.
- source_word: እምዕለተ፡ ድቀት
  english_pob_choice: from the day of the overthrow
  chosen_spanish: desde el día del derribo
  alternatives_spanish:
  - desde el día de la caída
  - desde el día del derrumbamiento
  lexicon: temporal phrase / overthrow
  rationale: El audit trail inglés conserva «overthrow», y la nota explica que el ge’ez es comprimido. «Derribo» refleja mejor la idea de una acción de abatimiento/derrocamiento que una simple caída, y permite mantener la tensión semántica sin convertirla en una interpretación más específica de lo que el texto da.
theological_decisions:
- issue: Invocación divina inicial y forma de nombrar a Dios
  english_pob_reading: The Lord God [said]
  chosen_spanish_reading: El Señor Dios [dijo]
  alternative_spanish_readings:
  - Yahvé Dios [dijo]
  - El Señor Yahvé [dijo]
  rationale: La fuente ge’ez y el inglés auditado presentan una invocación divina al inicio, pero no obligan aquí a desplegar el tetragrámaton en la forma principal. «El Señor Dios» es solemne, transparente y evita introducir una decisión terminológica adicional sin apoyo explícito del dato disponible.
  doctrine_reference: Divine name handling / reverence in translation
- issue: Relación entre lenguaje revelado y pérdida lingüística primordial
  english_pob_reading: the language that has been revealed ... it has ceased from the mouths of all the children of men from the day of the overthrow
  chosen_spanish_reading: la lengua que ha sido revelada ... ha cesado ... desde el día del derribo
  alternative_spanish_readings:
  - el idioma que ha sido revelado ... ha cesado ... desde el día de la caída
  - la lengua revelada ... dejó de estar en uso ...
  rationale: 'Mantengo la formulación de lengua «revelada» y el cese generalizado para preservar la nota histórica/teológica del pasaje: la lengua dada a conocer existe frente a una pérdida ocurrida tras un juicio antiguo. No suavizo la tensión ni la convierto en una simple observación cultural.'
  doctrine_reference: Primeval history / judgment and linguistic loss
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la frase inicial a una orden directa («Open...») y movió la nota final al cierre del versículo. También se incorporó la observación crítica de que el verbo ge’ez es imperativo, no un jussivo de tercera persona. La nota sobre el cierre se mantiene como referencia cruzada, pero anclada al final del versículo en español.
  spanish_consistency_notes:
  - Se usa «Señor Dios» de forma consistente como equivalente solemne del opening auditado inglés, sin introducir máscara tipográfica de nombre divino no exigida por el dato fuente.
  - «Lengua» se mantiene uniformemente para el idioma revelado, evitando alternar con «idioma» para no diluir la metáfora bíblica.
  - El imperativo singular «Abre» preserva la fuerza del mandato observada en la revisión crítica del ge’ez.
  - La nota [a] está anclada únicamente al final del versículo, conforme a la corrección pedida.
