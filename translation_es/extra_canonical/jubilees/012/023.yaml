    changes_summary: Removed the initial 'bless you' because the source begins with 'I will make your name great,' not 'I will bless you.' Kept the rest essentially unchanged for accuracy and natural formal English.
translation:
  language: es
  text: Y haré grande tu nombre, y serás bendecido en la tierra, y en ti serán benditas todas las naciones de la tierra. Y a los que te bendigan, yo los bendeciré, y a los que te maldigan, yo los maldeciré.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወአዐቢ፡ ስመከ፡
  english_pob_choice: And I will make your name great
  chosen_spanish: Y haré grande tu nombre
  alternatives_spanish:
  - Y haré tu nombre grande
  - Y engrandeceré tu nombre
  lexicon: 'Gk/Eng audit: make great / engrandecer'
  rationale: El ge'ez expresa primero la idea de hacer grande el nombre; en español, «haré grande tu nombre» reproduce con naturalidad esa construcción sin añadir el matiz más interpretativo de «engrandeceré», aunque esta alternativa también sería válida.
- source_word: ቡሩከ፡ ውስተ፡ ምድር፡
  english_pob_choice: you will be blessed in the earth
  chosen_spanish: serás bendecido en la tierra
  alternatives_spanish:
  - serás bendecido en la tierra
  - recibirás bendición en la tierra
  lexicon: bless/passive; earth/land
  rationale: El pasivo se conserva como pasivo en español para mantener la forma del original. «En la tierra» refleja el alcance territorial/general del ge'ez sin forzar «en el país» ni «en la tierra prometida».
- source_word: ወይትባረኩ፡ ብከ፡ ኵሎሙ፡ አሕዛበ፡ ምድር፡
  english_pob_choice: in you all the nations of the earth will be blessed
  chosen_spanish: en ti serán benditas todas las naciones de la tierra
  alternatives_spanish:
  - en ti serán benditas todas las naciones de la tierra
  - por ti serán benditas todas las naciones de la tierra
  lexicon: passive blessing; nations; earth
  rationale: La construcción pasiva «serán benditas» sigue de cerca el valor del verbo ge'ez y del inglés POB. Se opta por «en ti» porque el texto fuente y la revisión inglesa conservan esa preposición; «por ti» sería interpretativamente posible, pero desplaza el foco de la localización/fuente implícita.
- source_word: ወለእለ፡ ይባርኩከ፡ እባርኮሙ፡
  english_pob_choice: And those who bless you I will bless
  chosen_spanish: Y a los que te bendigan, yo los bendeciré
  alternatives_spanish:
  - Y a los que te bendigan, yo los bendeciré
  - Y bendeciré a los que te bendigan
  lexicon: bless/bless
  rationale: Se mantiene la relación recíproca entre el verbo de los demás y el de Dios. El orden español con anticipación del complemento («a los que te bendigan») resulta claro y fiel.
- source_word: ወለእለ፡ ይረግሙከ፡ እረግሞሙ።
  english_pob_choice: and those who curse you I will curse
  chosen_spanish: y a los que te maldigan, yo los maldeciré
  alternatives_spanish:
  - y a los que te maldigan, yo los maldeciré
  - y a los que te maldigan, los maldeciré
  lexicon: curse/curse
  rationale: «Maldigan/maldeciré» conserva la correspondencia verbal del texto. Se evita una paráfrasis más explicativa para no suavizar la reciprocidad judicial del pasaje.
theological_decisions:
- issue: 'Bendición pasiva: «serás bendecido» / «serán benditas»'
  english_pob_reading: you will be blessed ... all the nations ... will be blessed
  chosen_spanish_reading: serás bendecido ... serán benditas
  alternative_spanish_readings:
  - recibirás bendición ... recibirán bendición
  - serás bendecido ... serán bendecidas
  rationale: Se conserva el pasivo porque el texto presenta la bendición como algo que acontece sobre Abram y sobre las naciones, no solo como una acción indirecta. En «las naciones», el femenino plural concuerda con el sustantivo implícito y evita ambigüedad.
  doctrine_reference: Bendición pactal y universalidad de la promesa
- issue: Alcance de «la tierra»
  english_pob_reading: in the earth / of the earth
  chosen_spanish_reading: en la tierra ... de la tierra
  alternative_spanish_readings:
  - en el mundo
  - en la tierra prometida
  rationale: La fuente no restringe el alcance a un territorio específico ni lo universaliza mediante «mundo». «La tierra» conserva la amplitud del original y la fórmula bíblica heredada sin sobreinterpretar.
  doctrine_reference: Promesa a Abraham y alcance de las naciones
- issue: Relación entre quienes bendicen/maldicen y la respuesta divina
  english_pob_reading: those who bless you I will bless, and those who curse you I will curse
  chosen_spanish_reading: a los que te bendigan, yo los bendeciré ... a los que te maldigan, yo los maldeciré
  alternative_spanish_readings:
  - bendeciré a los que te bendigan ... maldeciré a los que te maldigan
  rationale: La repetición explícita de «yo» subraya la simetría retributiva que el texto enfatiza. No se atenúa ni se moraliza la formulación.
  doctrine_reference: Retribución divina en la promesa patriarcal
translation_notes:
  revision_awareness: El inglés POB fue revisado para eliminar un «I will bless you» inicial que no estaba respaldado por el ge'ez; la versión española sigue esa corrección y comienza, como el fuente, con «Y haré grande tu nombre».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; este versículo no lo contiene.
  - Se mantiene «bendecir»/«maldecir» de forma consistente para reflejar el paralelismo verbal del pasaje.
  - «Naciones de la tierra» conserva la fórmula bíblica sin sustituirla por «pueblos» o «mundo».
