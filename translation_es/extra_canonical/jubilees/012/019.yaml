base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/012/019.yaml
  text: And in that night he said, "My God, God Most High, you alone are God to me, and you created all things, and all that exists is the work of your hands. I have chosen you and your dominion; deliver me."
  footnotes:
  - marker: a
    text: Or 'your praise'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:03Z'
    unchanged: false
    changes_summary: Revised opening to match the source more closely ('And in that night he said' instead of 'And he prayed in that night'). Rendered ኵሎ/ኵሉ consistently as 'all things/all that exists.' Changed 'your favor' to 'your praise' to reflect መሰክንከ more accurately, and added the final omitted petition 'deliver me' for completeness.
translation:
  language: es
  text: 'Y en aquella noche dijo: «Mi Dios, Dios Altísimo, solo tú eres Dios para mí, y tú creaste todas las cosas, y todo lo que existe es obra de tus manos. Te he escogido a ti y a tu dominio; líbrame».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አምላኪየ / አምላከ ልዑል
  english_pob_choice: My God, God Most High
  chosen_spanish: Mi Dios, Dios Altísimo
  alternatives_spanish:
  - Mi Dios, Dios Supremo
  - Mi Dios, Dios el Altísimo
  lexicon: Dios / Altísimo
  rationale: El hebreo-etíope de apelación directa se conserva de forma natural en español con 'Mi Dios'. 'God Most High' se vierte como 'Dios Altísimo', que mantiene el título superlativo sin añadir un artículo innecesario.
- source_word: ባሕቲትከ
  english_pob_choice: you alone
  chosen_spanish: solo tú
  alternatives_spanish:
  - tú solamente
  - únicamente tú
  lexicon: solo
  rationale: La exclusividad recae sobre la persona de Dios; 'solo tú' suena natural y fiel al énfasis del original y del inglés POB.
- source_word: ኵሎ ፈጠርከ
  english_pob_choice: you created all things
  chosen_spanish: tú creaste todas las cosas
  alternatives_spanish:
  - tú creaste todo
  - tú hiciste todas las cosas
  lexicon: crear
  rationale: '''Creaste'' conserva el acto creador. ''Todas las cosas'' sigue de cerca la formulación auditada del inglés POB y evita reducir el alcance a un simple ''todo'' si se desea mayor literalidad.'
- source_word: ኵሉ ኮነ ዘሀሎ
  english_pob_choice: all that exists
  chosen_spanish: todo lo que existe
  alternatives_spanish:
  - todo lo existente
  - todo cuanto existe
  lexicon: existir
  rationale: La frase distingue existencia presente y resultante; 'todo lo que existe' reproduce bien ese alcance sin forzar una abstracción.
- source_word: ግብረ እደዊከ
  english_pob_choice: the work of your hands
  chosen_spanish: obra de tus manos
  alternatives_spanish:
  - trabajo de tus manos
  - hechura de tus manos
  lexicon: obra / manos
  rationale: '''Obra de tus manos'' es la equivalencia estable y reverente para la metáfora de manufactura divina.'
- source_word: መሰክንከ / መኰንንከ
  english_pob_choice: your dominion
  chosen_spanish: tu dominio
  alternatives_spanish:
  - tu señorío
  - tu gobierno
  lexicon: dominio
  rationale: La revisión textual indicada en el audit trail corrige la lectura hacia 'dominion/rule'. En español, 'tu dominio' conserva el sentido de gobierno soberano sin domesticarlo a una formulación eclesiástica menos directa.
- source_word: አድኅነኒ
  english_pob_choice: deliver me
  chosen_spanish: líbrame
  alternatives_spanish:
  - sálvame
  - rescátame
  lexicon: librar
  rationale: '''Líbrame'' transmite adecuadamente la petición de rescate/liberación en una fórmula breve y bíblica.'
theological_decisions:
- issue: Exclusividad monoteísta en la declaración 'solo tú eres Dios para mí'
  english_pob_reading: you alone are God to me
  chosen_spanish_reading: solo tú eres Dios para mí
  alternative_spanish_readings:
  - tú solo eres Dios para mí
  - solo tú eres mi Dios
  rationale: La frase mantiene la afirmación de exclusividad teológica sin convertirla en una paráfrasis. 'Eres Dios para mí' conserva la relación personal explicitada por el inglés POB.
  doctrine_reference: Monoteísmo y confesión exclusiva de YHWH como único Dios
- issue: Lectura revisada de 'your dominion' a partir de la corrección textual del audit trail
  english_pob_reading: your dominion
  chosen_spanish_reading: tu dominio
  alternative_spanish_readings:
  - tu señorío
  - tu reino
  rationale: El historial de revisión identifica una OCR y justifica 'dominion/rule' en lugar de 'praise'. La traducción española sigue esa decisión revisada y evita el error anterior.
  doctrine_reference: Soberanía divina y gobierno de Dios
- issue: Petición final de liberación
  english_pob_reading: deliver me
  chosen_spanish_reading: líbrame
  alternative_spanish_readings:
  - sálvame
  - rescátame
  rationale: El imperativo de petición queda claro y conciso en español con 'líbrame', sin debilitar el matiz de rescate implícito.
  doctrine_reference: Dependencia humana de la salvación y liberación divina
translation_notes:
  revision_awareness: 'Se siguió el pasaje ya corregido por el audit trail: se mantuvo la apertura ''Y en aquella noche dijo'', se adoptó la lectura revisada de ''all things / all that exists'', y se evitó reproducir la lectura errónea anterior de ''praise''. No se añadieron notas innecesarias porque el texto español puede expresar todas las decisiones de forma directa y no requiere un marcador anclado.'
  spanish_consistency_notes:
  - Se usó 'Dios Altísimo' para el título divino, coherente con el registro bíblico en español.
  - Se evitó 'SEÑOR' como sustituto del nombre divino, porque el texto aquí contiene una invocación y título, no una sustitución editorial del tetragrámaton.
  - '''Dominio'' se escogió por la corrección textual documentada en el audit trail y por mantener el campo semántico de gobierno soberano.'
  - La puntuación y el orden sintáctico buscan ser publicables en español sin alejarse del texto fuente.
