base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/012/020.yaml
  text: Deliver me from the hand of evil spirits that rule over the thoughts of the heart of man, and do not let them lead me astray from following you, my God. And establish me and my seed forever, so that we may not go astray from now and forever." And he said,
  footnotes:
  - marker: a
    text: Or 'And establish me and my seed before you forever'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:02Z'
    unchanged: false
    changes_summary: Added 'before you' to reflect ኪያየ, retained formal wording, and included the closing narrative phrase 'And he said,' present in the source. Adjusted 'who' to 'that' for a more formal register.
translation:
  language: es
  text: 'Líbrame de la mano de los espíritus malos que dominan los pensamientos del corazón del hombre, y no permitas que me extravíen y deje de seguirte, mi Dios. Y establéceme, a mí y a mi descendencia, para siempre, para que no nos extraviemos desde ahora y para siempre. Y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እምእዴ / 'from the hand of'
  english_pob_choice: from the hand of evil spirits
  chosen_spanish: de la mano de los espíritus malos
  alternatives_spanish:
  - del poder de los espíritus malos
  - del dominio de los espíritus malos
  lexicon: mano
  rationale: Se conserva la imagen concreta de 'mano' del original y del inglés POB, que sugiere poder o control sin reinterpretarlo demasiado. 'Espíritus malos' refleja el valor de መናፍስት እኩያን sin introducir una categoría doctrinal más técnica.
- source_word: መናፍስት እኩያን
  english_pob_choice: evil spirits
  chosen_spanish: espíritus malos
  alternatives_spanish:
  - espíritus malignos
  - espíritus perversos
  lexicon: espíritu
  rationale: '''Espíritus malos'' es natural en español y mantiene la fuerza ética del adjetivo. ''Malos'' evita sobrecargar con un matiz demonológico no explicitado por el texto.'
- source_word: ይስልጡ፡ ውስተ፡ ሕሊና፡ ልበ፡ ሰብእ
  english_pob_choice: that rule over the thoughts of the heart of man
  chosen_spanish: que dominan los pensamientos del corazón del hombre
  alternatives_spanish:
  - que gobiernan los pensamientos del corazón del hombre
  - que ejercen dominio sobre los pensamientos del corazón del hombre
  lexicon: dominar
  rationale: '''Dominar'' reproduce bien la idea de autoridad/control sobre los pensamientos y es idiomático en español. ''Pensamientos del corazón'' conserva la antropología semítica del original sin convertirla en una paráfrasis psicológica.'
- source_word: አይስሕቱኒ
  english_pob_choice: do not let them lead me astray
  chosen_spanish: no les permitas desviarme
  alternatives_spanish:
  - no permitas que me extravíen
  - no dejes que me engañen
  lexicon: desviar
  rationale: '''Desviarme'' reproduce el movimiento de apartarse del camino/seguimiento expresado por el contexto y mantiene la imagen bíblica de extravío. ''No les permitas'' conserva la estructura peticional del original.'
- source_word: እምድኅሬከ
  english_pob_choice: from following you
  chosen_spanish: de seguirte
  alternatives_spanish:
  - de ir tras de ti
  - de caminar detrás de ti
  lexicon: seguir
  rationale: El infinitivo con enclítico 'seguirte' es fluido y fiel al sentido de adherirse o ir detrás de la persona invocada. Evita introducir una nota explicativa innecesaria.
- source_word: ወትረሰየኒ
  english_pob_choice: And establish me
  chosen_spanish: Y afírmame a mí
  alternatives_spanish:
  - Y establéceme
  - Y consígueme firmeza
  lexicon: afirmar
  rationale: '''Afirmar'' comunica bien la idea de establecer/fijar con estabilidad, y ''a mí'' preserva el pronombre enfático del original. Se evita ''establecer'' por posible ambigüedad administrativa en español moderno.'
- source_word: ኪያየ ወዘርእየ
  english_pob_choice: me and my seed
  chosen_spanish: a mí y a mi descendencia
  alternatives_spanish:
  - a mí y a mi simiente
  - a mí y a mi linaje
  lexicon: descendencia
  rationale: '''Descendencia'' es la opción más clara y bíblica en español contemporáneo para ''seed'' en este contexto genealógico. Conserva la referencia a la continuidad familiar sin cargar el texto con arcaísmo.'
- source_word: ወኢንስሐት
  english_pob_choice: so that we may not go astray
  chosen_spanish: para que no nos extraviemos
  alternatives_spanish:
  - para que no nos desviemos
  - para que no nos apartemos
  lexicon: extraviarse
  rationale: '''Extraviarnos'' expresa bien el sentido de apartarse del camino correcto y mantiene el paralelismo con ''desviarme'' antes. La primera persona plural sigue el sujeto colectivo del original.'
- source_word: ወይቤ
  english_pob_choice: And he said,
  chosen_spanish: 'Y dijo:'
  alternatives_spanish:
  - 'Y él dijo:'
  - 'Y respondió:'
  lexicon: decir
  rationale: Se conserva la fórmula narrativa breve del cierre del versículo/segmento. 'Y dijo:' es la forma más natural y suficientemente literal en español.
theological_decisions:
- issue: ¿Cómo traducir la relación entre los espíritus malos y los pensamientos del corazón sin exagerar el alcance antropológico?
  english_pob_reading: that rule over the thoughts of the heart of man
  chosen_spanish_reading: que dominan los pensamientos del corazón del hombre
  alternative_spanish_readings:
  - que gobiernan los pensamientos del corazón del hombre
  - que ejercen dominio sobre los pensamientos del corazón del hombre
  rationale: 'La formulación conserva la tensión del original: una influencia/control real sobre la interioridad humana, pero sin convertirla en una declaración filosófica más amplia de lo que el texto exige. ''Corazón'' se mantiene como centro interior de pensamiento y voluntad, siguiendo el lenguaje semítico.'
  doctrine_reference: Antropología bíblica; influencia espiritual en la interioridad humana
- issue: Cómo entender 'afírmame a mí y a mi descendencia para siempre' a la luz de la revisión textual
  english_pob_reading: And establish me and my seed forever
  chosen_spanish_reading: Y afírmame a mí y a mi descendencia para siempre
  alternative_spanish_readings:
  - Y afírmame a mí y a mi descendencia delante de ti para siempre
  - Y establéceme a mí y a mi descendencia para siempre
  rationale: La lectura revisada elimina 'delante de ti', porque el ge'ez no lo respalda. El español sigue la revisión y conserva el alcance temporal 'para siempre' sin añadir una localización espacial no atestiguada.
  doctrine_reference: Fidelidad textual; continuidad pactal y genealógica
- issue: Cómo verter el verbo final de exclusión del extravío
  english_pob_reading: so that we may not go astray from now and forever
  chosen_spanish_reading: para que no nos extraviemos desde ahora y para siempre
  alternative_spanish_readings:
  - para que no nos apartemos desde ahora y para siempre
  - para que no nos desviemos desde ahora y para siempre
  rationale: '''Extraviarnos'' preserva la idea de desviación moral o relacional sin suavizarla. La secuencia ''desde ahora y para siempre'' reproduce el paralelismo temporal del original.'
  doctrine_reference: Perseverancia/guardia divina en lenguaje de súplica
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión textual que corrigió la falsa adición de ''before you'' y la confirmó como no presente en el ge''ez. Por eso la traducción española omite cualquier equivalente locativo y sigue la lectura revisada: ''Y afírmame a mí y a mi descendencia para siempre''. También se incorporó el cierre narrativo ''Y dijo:'' presente en el texto fuente.'
  spanish_consistency_notes:
  - Se mantuvo 'espíritus malos' en lugar de 'espíritus malignos' para conservar sencillez y continuidad con el valor léxico del inglés POB.
  - Se evitó 'Señor' como sustituto reverencial porque el pasaje no usa el tetragrámaton ni requiere esa convención.
  - '''Descendencia'' traduce de manera consistente el valor genealógico de ''seed'' en este contexto.'
  - La sintaxis busca una lectura pública y reverente sin alejarse del orden semántico del original.
