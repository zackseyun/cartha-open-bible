translation:
  language: es
  text: para rescatarlos, y se encendió fuego sobre él, y fue quemado con fuego y murió en Ur de los caldeos
  philosophy: formal
lexical_decisions:
- source_word: ከመ፡ ያድኅኖሙ፡
  english_pob_choice: to rescue them
  chosen_spanish: para rescatarlos
  alternatives_spanish:
  - para librarlos
  - para salvarlos
  lexicon: ያድኅኖሙ -> rescatar/librar/salvar
  rationale: El infinitivo final expresa propósito. «Rescatar» conserva con precisión la idea de sacar a otros de un peligro o de una situación de muerte, sin añadir el matiz más amplio y a veces soteriológico de «salvarlos».
- source_word: ወነደደ፡ እሳት፡ ላዕሌሁ፡
  english_pob_choice: and fire was kindled over him
  chosen_spanish: y el fuego fue encendido sobre él
  alternatives_spanish:
  - y se encendió fuego sobre él
  - y el fuego ardió sobre él
  lexicon: ወነደደ፡ እሳት፡ -> fue encendido el fuego / se encendió fuego
  rationale: La revisión inglesa prefirió «fire was kindled», que refleja mejor el verbo causativo/pasivo. En español, «fue encendido» mantiene esa pasividad y formalidad. «Sobre él» conserva la relación espacial del original.
- source_word: ወውዐየ፡ በእሳት፡
  english_pob_choice: and he was burned with fire
  chosen_spanish: y fue quemado con fuego
  alternatives_spanish:
  - y ardió en el fuego
  - y fue consumido por el fuego
  lexicon: ወውዐየ፡ + በእሳት፡ -> ser quemado con fuego
  rationale: Se conserva la repetición instrumental del original y del POB revisado («with fire»). «Quemado con fuego» es algo enfático en español, pero reproduce la construcción sin suavizarla ni sustituirla por una paráfrasis.
- source_word: ወሞተ፡ በኡር፡ ዘከለዳዊያን፡
  english_pob_choice: and died in Ur of the Chaldeans
  chosen_spanish: y murió en Ur de los caldeos
  alternatives_spanish:
  - y murió en Ur de los caldeos
  - y falleció en Ur de los caldeos
  lexicon: በኡር፡ ዘከለዳዊያን፡ -> en Ur de los caldeos
  rationale: Se conserva el topónimo tradicional en forma clara y reconocible en español bíblico. «Murió» es la correspondencia directa y más neutral.
theological_decisions:
- issue: El texto presenta juicio por fuego sin desarrollar una explicación causal adicional.
  english_pob_reading: fire was kindled over him, and he was burned with fire and died
  chosen_spanish_reading: el fuego fue encendido sobre él, y fue quemado con fuego y murió
  alternative_spanish_readings:
  - el fuego cayó sobre él, y fue consumido por el fuego y murió
  - ardió en el fuego y murió
  rationale: No se añaden explicaciones narrativas ni simbolismos que el texto no ofrece. La formulación mantiene el hecho del juicio con fuego de manera sobria y directa.
  doctrine_reference: Narrativa de juicio divino / providencia en el relato de Jubileos; no se formula una doctrina adicional más allá del sentido literal del pasaje.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente, que corrige «the fire blazed» a «fire was kindled» y «burned in the fire» a «burned with fire». La versión española refleja esa mayor literalidad y mantiene la repetición instrumental del original ge'ez.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene el registro bíblico formal sin recurrir a calcos excesivamente duros.
  - Se conserva la repetición de «fuego» para no diluir el paralelismo del original.
