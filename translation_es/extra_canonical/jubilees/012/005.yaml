base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/012/005.yaml
  text: There is no spirit in them, because they are the work of hands; and you carry them on your shoulders, and from them there is no help for you, except great shame.
  footnotes:
  - marker: a
    text: Or 'shoulders. They are a burden to you, and from them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:00Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: No hay espíritu en ellos, porque son obra de manos; y tú los llevas sobre tus hombros[a], y de ellos no hay para ti ayuda, sino gran vergüenza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombros, y de ellos».
    reason: Refleja de manera mínima la nota de variante/herencia del English POB sin reintroducir la glosa no respaldada de 'son una carga para ti'.
lexical_decisions:
- source_word: መንፈስ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - espíritu vital
  lexicon: ruḥ / pneuma semantic range
  rationale: El contexto contrasta la vida o capacidad propia de los ídolos con la ausencia de aquello que anima; en español, «espíritu» conserva la amplitud semántica sin forzar una glosa interpretativa.
- source_word: ግብረ፡ እደው
  english_pob_choice: the work of hands
  chosen_spanish: obra de manos
  alternatives_spanish:
  - hechura de manos
  - trabajo de manos
  lexicon: idiom for man-made objects
  rationale: La expresión subraya que los ídolos son fabricados por humanos; «obra de manos» es natural en español bíblico y reproduce bien el sentido idiomático.
- source_word: መታክፍቲሆሙ
  english_pob_choice: you carry them on your shoulders
  chosen_spanish: tú los llevas sobre tus hombros
  alternatives_spanish:
  - los cargas sobre tus hombros
  - los llevas sobre la espalda
  lexicon: burden-carrying imagery
  rationale: «Llevar sobre los hombros» mantiene la imagen concreta del ídolo transportado por su adorador, sin añadir la idea de carga como explicación separada.
- source_word: ረድኤት
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - socorro
  - auxilio
  lexicon: help / aid
  rationale: «Ayuda» refleja de manera directa la falta de beneficio real procedente de los ídolos y es idiomática en español actual.
- source_word: ሐሳር፡ ዐቢይ
  english_pob_choice: great shame
  chosen_spanish: gran vergüenza
  alternatives_spanish:
  - gran oprobio
  - gran deshonra
  lexicon: shame / disgrace
  rationale: «Vergüenza» comunica bien la deshonra pública y moral implicada; «gran» conserva el intensificador del original.
theological_decisions:
- issue: Ausencia de vida/espíritu en los ídolos
  english_pob_reading: There is no spirit in them
  chosen_spanish_reading: No hay espíritu en ellos
  alternative_spanish_readings:
  - No tienen espíritu
  - No hay aliento en ellos
  rationale: La formulación mantiene la afirmación negativa sin convertirla en una explicación más específica de la que da el texto. «Espíritu» respeta el término amplio del original.
  doctrine_reference: Narrativa antি-idolátrica; distinción entre el Dios viviente y las imágenes hechas por البشر
- issue: Relación entre ídolos y vergüenza
  english_pob_reading: except great shame
  chosen_spanish_reading: sino gran vergüenza
  alternative_spanish_readings:
  - excepto gran vergüenza
  - sino una gran deshonra
  rationale: La construcción «sino» reproduce la exclusión final del texto y evita suavizar el contraste. «Gran vergüenza» preserva el énfasis moral y público.
  doctrine_reference: Crítica bíblica a la idolatría y su humillación final
translation_notes:
  revision_awareness: 'La revisión reciente corrigió una adición injustificada en inglés sobre que los ídolos son ‘a burden to you’. El español evita cualquier expansión equivalente y sigue de cerca el Ge''ez: simplemente indica que los llevan sobre los hombros y que de ellos no hay ayuda.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Obra de manos» conserva el tono bíblico sin introducir tecnicismos.
  - No se añadió ninguna explicación de carga en el texto principal; esa posibilidad solo aparece como nota alternativa, en línea con el historial de revisión.
