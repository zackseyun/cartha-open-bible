review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del ge''ez y del English POB: niega vida/espíritu en los ídolos, afirma que son obra humana, que el adorador los lleva, y que no proviene de ellos ayuda sino vergüenza. Sin embargo, la nota al pie introduce de nuevo la explicación ''son una carga para ti'', añadidura ya retirada del audit trail inglés por no tener apoyo en la fuente.'
  spanish_quality_summary: El español es claro y legible. 'No hay espíritu en ellos', 'obra de manos' y 'gran vergüenza' funcionan bien en registro bíblico natural. Puede mantenerse 'y tú los llevas sobre tus hombros', aunque el pronombre explícito no es necesario; el problema principal es la nota, no la redacción principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'espíritu', 'ayuda' y 'vergüenza' son elecciones adecuadas. La frase idiomática 'obra de manos' preserva bien el sentido anti-idolátrico. La decisión sobre መታክፍቲሆሙ debe evitar glosas como 'carga' si no están en la fuente.
  issues:
  - severity: high
    issue: La nota al pie añade 'La idea es que son una carga para ti'
    rationale: Esa explicación fue eliminada explícitamente del English POB por carecer de correspondencia en el ge'ez. Mantenerla en español contradice el audit trail y agrega sentido no atestiguado.
  - severity: low
    issue: La nota 'O «hombros»' no ofrece una alternativa real útil
    rationale: Repite prácticamente la misma palabra del texto y no aclara una ambigüedad genuina. Si se conserva una nota, debe reflejar la alternativa documentada sin expansión interpretativa.
  revised_spanish_text: No hay espíritu en ellos, porque son obra de manos; y tú los llevas sobre tus hombros[a], y de ellos no hay para ti ayuda, sino gran vergüenza.
  revised_footnotes:
  - marker: a
    text: O «hombros, y de ellos».
    reason: Refleja de manera mínima la nota de variante/herencia del English POB sin reintroducir la glosa no respaldada de 'son una carga para ti'.
  revision_rationale: 'Se requiere una corrección pequeña pero necesaria: eliminar de la nota la explicación añadida que no está en la fuente y ajustar la nota para que preserve solo la alternativa documentada sin expansión interpretativa. El texto principal puede mantenerse.'
