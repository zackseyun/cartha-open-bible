translation:
  language: es
  text: ¿Delante de ellos? Y si les digo[a] la verdad, me matarán, porque sus almas se aferran a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les hablo justicia» o «les hablo rectitud». La fuente usa un sustantivo de justicia/rectitud; aquí se traduce «la verdad» por la fuerza contextual de «decirles la verdad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ጽድቀ (ṣədqa)
  english_pob_choice: speak righteousness / speak the truth
  chosen_spanish: hablo justicia
  alternatives_spanish:
  - hablo la verdad
  - hablo rectitud
  - hablo justicia
  lexicon: צדקה / δικαιοσύνη
  rationale: 'El hebreo/etíope subyacente expresa el sustantivo de justicia/rectitud, no un adverbio equivalente a ''bien''. En español, ''hablar justicia'' conserva el valor sustantivo y deja visible la tensión entre ''justicia'' y ''verdad'' que refleja la revisión inglesa: una formulación más natural podría ser ''hablo la verdad'', pero eso suaviza la forma nominal del original.'
- source_word: ተለውት፡ ነፍሶሙ፡ ኀቤሆሙ፡
  english_pob_choice: their souls cling to them
  chosen_spanish: sus almas se pegan a ellos
  alternatives_spanish:
  - sus almas están unidas a ellos
  - sus almas se aferran a ellos
  lexicon: נפש / ψυχή
  rationale: La imagen literal es de adhesión o unión estrecha. 'Se pegan a ellos' preserva la metáfora de manera transparente en español, aunque 'se aferran a ellos' o 'están unidas a ellos' sonarían más naturales en registro bíblico.
theological_decisions:
- issue: Relación entre 'justicia' y 'verdad' en la primera cola
  english_pob_reading: 'The English audit trail shows a tension: earlier ''speak righteousness'' was revised to ''speak the truth'' for idiomatic naturalness, while the source noun remains ጽድቀ.'
  chosen_spanish_reading: 'Conservar una formulación nominal: ''les hablo justicia''.'
  alternative_spanish_readings:
  - si les hablo la verdad
  - si les hablo rectamente
  rationale: En español, 'hablar justicia' mantiene la fuerza conceptual del sustantivo fuente y evita borrar la tensión documentada entre precisión lexical y naturalidad idiomática. Se deja abierta la posibilidad semántica de 'verdad' sin imponerla en el texto principal.
  doctrine_reference: No doctrinal issue; lexical-semantic tension only.
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra dos ajustes relevantes: primero, ''rightly'' fue corregido a ''righteousness'' para reflejar ጽድቀ; después, se propuso ''speak the truth'' por idiomatismo. El español principal conserva la forma sustantiva del original (''justicia'') para no perder esa tensión documentada, mientras la nota ofrece ''la verdad'' como lectura alternativa natural.'
  spanish_consistency_notes:
  - Se mantiene 'almas' para ነፍሶሙ sin reinterpretarlo como 'vida' o 'personas'.
  - Se conserva una sintaxis breve y directa, adecuada al tono sentencioso del pasaje.
  - No se introduce 'SEÑOR' ni otros sustitutos teológicos, porque el versículo no contiene el nombre divino.
