translation:
  language: es
  text: Y se levantaron en la noche y quisieron rescatar a sus dioses de entre el fuego. Y Harán se precipitó[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Arán corrió». La revisión auditada prefirió «Harán se precipitó» por la forma bíblica del nombre y porque el verbo aquí sugiere un movimiento súbito.'
    reason: previous_rendering
lexical_decisions:
- source_word: ወተንሥኡ / arose
  english_pob_choice: arose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se alzaron
  - se pusieron de pie
  lexicon: levantarse
  rationale: Expresa de manera natural la acción de ponerse en movimiento y salir en la noche sin añadir matices no presentes en el texto.
- source_word: በሌሊት / in the night
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  lexicon: noche
  rationale: Mantiene el sentido temporal de manera clara y pública en español.
- source_word: ወፈቀዱ / wanted
  english_pob_choice: wanted
  chosen_spanish: quisieron
  alternatives_spanish:
  - quisieron hacerlo
  - deseaban
  lexicon: querer
  rationale: En este contexto, el deseo se orienta a una acción concreta; «quisieron» comunica intención volitiva sin sobreexplicar.
- source_word: ያድኅኑ / rescue
  english_pob_choice: rescue
  chosen_spanish: rescatar
  alternatives_spanish:
  - salvar
  - librar
  lexicon: rescatar
  rationale: «Rescatar» conserva la idea de sacar algo o alguien de una situación peligrosa, adecuada para intentar sacar los ídolos del fuego.
- source_word: አማልክቲሆሙ / their gods
  english_pob_choice: their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - a sus ídolos
  - a sus divinidades
  lexicon: dios
  rationale: El ge'ez dice literalmente «sus dioses»; en español se conserva esa forma, aunque el contexto puede sugerir ídolos.
- source_word: እማእከለ፡ እሳት / from the midst of the fire
  english_pob_choice: from the midst of the fire
  chosen_spanish: de en medio del fuego
  alternatives_spanish:
  - de entre las llamas
  - del medio del fuego
  lexicon: fuego
  rationale: Reproduce de cerca la imagen del original y de la tradición inglesa auditada, con español idiomático.
- source_word: ወሰረረ፡ አራን / And Haran rushed
  english_pob_choice: And Haran rushed
  chosen_spanish: Y Harán se precipitó
  alternatives_spanish:
  - Y Harán corrió
  - Y Harán se lanzó
  lexicon: precipitarse
  rationale: La revisión inglesa estableció «rushed» para ሰረረ, y en español «se precipitó» comunica bien la idea de lanzarse con rapidez. Se mantiene «Harán» por nomenclatura bíblica establecida.
theological_decisions:
- issue: Designación de «sus dioses» en un contexto de idolatría
  english_pob_reading: their gods
  chosen_spanish_reading: a sus dioses
  alternative_spanish_readings:
  - a sus ídolos
  - a sus falsos dioses
  rationale: El texto fuente usa la designación literal «sus dioses». Aunque el contexto posterior sugiere idolatría, la traducción no debe resolver el término de forma interpretativa sin necesidad textual.
  doctrine_reference: Éxodo 20:3-5; Isaías 44:9-20
- issue: 'Segmentación textual: la cláusula final pertenece al inicio del versículo siguiente según la revisión auditada'
  english_pob_reading: And Haran rushed
  chosen_spanish_reading: Y Harán se precipitó
  alternative_spanish_readings:
  - Y Harán corrió
  rationale: La nota auditada indica que esta cláusula corresponde al comienzo de Jubileos 12:14, pero se conserva aquí porque el paquete de fuente solicitado la incluye en esta sección. La traducción refleja el texto recibido sin normalizar la división de versículos.
  doctrine_reference: Principios editoriales de segmentación y fidelidad textual
translation_notes:
  revision_awareness: La auditoría inglesa revisó la cláusula final de «And Aran ran» a «And Haran rushed» y señaló que corresponde al inicio de Jubilees 12:14 por una división de versículo errónea en la fuente suministrada. La presente versión conserva el contenido recibido en esta sección y adopta «Harán» para el nombre propio conforme a la nomenclatura bíblica estándar.
  spanish_consistency_notes:
  - Se usa «Harán» de forma consistente, siguiendo la revisión auditada que identifica el nombre ge'ez አራን con el bíblico Harán.
  - Se conserva «dioses» en plural porque el original habla literalmente de «sus dioses», sin sustituirlo por una glosa interpretativa.
  - La expresión «de en medio del fuego» mantiene la imagen espacial del original sin suavizarla.
  - Se mantiene el registro narrativo sobrio y directo, apto para lectura pública.
