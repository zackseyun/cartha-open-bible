translation:
  language: es
  text: delante de Taré, su padre. Y lo enterraron en Ur de los caldeos. Y Taré salió de Ur de los caldeos, él y sus hijos, para ir a la tierra de Líbano y a la tierra de Canaán; y se estableció en la tierra de Harán, y Abram vivió con Taré su padre en Harán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - antes de
  lexicon: Geez ቅድመ → before/in front of
  rationale: En este contexto de secuencia narrativa, 'ante' conserva bien la relación temporal/posicional sin sonar tan dependiente de una construcción verbal como 'antes de'.
- source_word: ታራ፡ አቡሁ
  english_pob_choice: Terah his father
  chosen_spanish: Taré su padre
  alternatives_spanish:
  - Taré, su padre
  - Taré, el padre de Abram
  lexicon: Nombre propio + posesivo relacional
  rationale: Se mantiene el nombre propio con acento español 'Taré' y el vínculo posesivo directo del original y del inglés POB.
- source_word: ቀበርዎ
  english_pob_choice: they buried him
  chosen_spanish: lo enterraron
  alternatives_spanish:
  - lo sepultaron
  lexicon: Geez ቀበረ → bury
  rationale: '''Enterrar'' es claro y natural en español; ''sepultar'' es una alternativa posible, pero no necesaria aquí.'
- source_word: ኡር፡ ዘከለዳዊያን
  english_pob_choice: Ur of the Chaldeans
  chosen_spanish: Ur de los caldeos
  alternatives_spanish:
  - Ur de Caldea
  - Ur de los caldeanos
  lexicon: Topónimo tradicional
  rationale: Se conserva la forma histórica del topónimo con 'de los caldeos', como en el inglés POB, porque corresponde al lugar identificado en la fuente.
- source_word: ወወፅአ
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  lexicon: Geez ወፀአ → go out, depart
  rationale: '''Salió'' reproduce el movimiento de salida con naturalidad en español.'
- source_word: ውስተ፡ ምድረ፡ ሊባኖስ
  english_pob_choice: into the land of Lebanon
  chosen_spanish: a la tierra de Líbano
  alternatives_spanish:
  - hacia la tierra de Líbano
  - a la tierra del Líbano
  lexicon: Geographic phrase
  rationale: Se conserva el paralelismo con 'a la tierra de Canaán' y el nombre geográfico recibido en el texto fuente.
- source_word: ውስተ፡ ምድረ፡ ከናአን
  english_pob_choice: into the land of Canaan
  chosen_spanish: a la tierra de Canaán
  alternatives_spanish:
  - hacia la tierra de Canaán
  lexicon: Biblical toponym
  rationale: Se mantiene el topónimo bíblico tradicional en español con artículo explícito 'la tierra de Canaán'.
- source_word: ወኀደረ
  english_pob_choice: he settled
  chosen_spanish: se estableció
  alternatives_spanish:
  - habitó
  - se asentó
  lexicon: Geez ኀደረ → dwell, settle
  rationale: '''Se estableció'' comunica adecuadamente el sentido de fijar residencia sin añadir matices no presentes.'
- source_word: ምድረ፡ ካራን
  english_pob_choice: the land of Haran
  chosen_spanish: la tierra de Harán
  alternatives_spanish:
  - la tierra de Harán
  lexicon: Topónimo
  rationale: Se conserva el topónimo con acento español 'Harán' y la estructura nominal del original.
- source_word: አብራም፡ ... ኀደረ
  english_pob_choice: Abram lived
  chosen_spanish: Abram vivió
  alternatives_spanish:
  - Abram habitó
  lexicon: Name + verb of dwelling
  rationale: '''Vivió'' es una traducción directa y natural del hecho de residir, en paralelo con el verbo anterior.'
theological_decisions:
- issue: Toponymic wording for the route and settlement of Terah
  english_pob_reading: Terah went out from Ur of the Chaldeans, he and his sons, to go into the land of Lebanon and into the land of Canaan, and he settled in the land of Haran
  chosen_spanish_reading: Taré salió de Ur de los caldeos, él y sus hijos, para ir a la tierra de Líbano y a la tierra de Canaán; y se estableció en la tierra de Harán
  alternative_spanish_readings:
  - Taré salió de Ur de los caldeos, él y sus hijos, para ir hacia el país del Líbano y hacia el país de Canaán; y se asentó en la tierra de Harán
  rationale: La fuente geez y el inglés POB presentan una secuencia de desplazamiento y asentamiento sin interpretación teológica añadida. La versión española preserva la ruta y el cierre narrativo sin convertirlos en paráfrasis, manteniendo los topónimos tal como aparecen en el audit trail.
  doctrine_reference: N/A
- issue: Treatment of Abram's residence with Terah
  english_pob_reading: Abram lived with Terah his father in Haran
  chosen_spanish_reading: Abram vivió con Taré su padre en Harán
  alternative_spanish_readings:
  - Abram habitó con Taré su padre en Harán
  rationale: No hay tensión doctrinal específica en el enunciado; se preserva el dato narrativo de convivencia/residencia con el padre, evitando expandirlo a una explicación.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El último pase de revisión solo añadió puntuación final al inglés POB; no introdujo cambios de sentido. La redacción española sigue de cerca la secuencia y el valor léxico del geez, con ajuste mínimo para naturalidad en español.
  spanish_consistency_notes:
  - Se mantuvo 'Taré' como forma española consistente del nombre propio.
  - 'Se conservaron los topónimos bíblicos en forma tradicional: ''Ur de los caldeos'', ''Canaán'', ''Harán''.'
  - Se evitó 'SEÑOR' u otras sustituciones no presentes; el pasaje no contiene el nombre divino.
  - Se mantuvo la secuencia narrativa con conectores simples ('Y', 'y') para reflejar el encadenamiento del original.
