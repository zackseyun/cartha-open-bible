  yaml_path: translation/extra_canonical/jubilees/012/016.yaml
  text: two weeks of years[12:16]. And in the sixth week, in its fifth year, Abram sat up through the night at the beginning of the seventh month to observe the stars from evening until dawn, to see what would be the character of the year with respect to the rains. And he was there alone, sitting and observing, and a word came into his heart, and he said[12:16], “All the signs of the stars and their signs...
  footnotes:
  - marker: '12:16'
    text: '''Week'' here is calendrical shorthand for a week of years. Jubilees regularly counts time by jubilees, weeks, and years.'
    reason: cultural_note
  - marker: '12:16'
    text: The opening phrase of the month may also be understood more specifically as the rising or new-moon beginning of the seventh month.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:02Z'
    unchanged: false
    changes_summary: Added the omitted final clause, rendering ኵሉ፡ ተአምረ፡ ከዋክብት፡ ወተአምራሁ፡ as 'All the signs of the stars and their signs...' to account for the source text. Kept the rest unchanged.
translation:
  language: es
  text: 'dos semanas de años[a]. Y en la sexta semana, en su quinto año, Abram pasó la noche sentado, al comienzo del séptimo mes[b], para observar las estrellas desde la tarde hasta el alba, para ver cuál sería el carácter del año respecto de las lluvias. Y estaba allí solo, sentado y observando, y una palabra vino a su corazón, y dijo: «Todos los signos de las estrellas y sus signos...»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Semanas» aquí es una abreviatura calendárica de semanas de años. Jubileos suele contar el tiempo por jubileos, semanas y años.
    reason: cultural_note
  - marker: b
    text: La frase sobre el comienzo del mes también puede entenderse más específicamente como el inicio del séptimo mes con la salida de la luna nueva, es decir, el novilunio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ክልኤ፡ ሱባዔ፡ ዓመታት።
  english_pob_choice: two weeks of years
  chosen_spanish: dos semanas de años
  alternatives_spanish:
  - dos semanas de años y años
  - dos períodos de siete años
  lexicon: week -> semana; years -> años
  rationale: Conserva la unidad cronológica técnica de Jubileos. En español, «semanas de años» reproduce la construcción calendárica sin explicar de más el valor de siete años, que queda en nota.
- source_word: በሳድስ፡ ሱባዔ፡ በዓመት፡ ኃምስ፡
  english_pob_choice: in the sixth week, in its fifth year
  chosen_spanish: en la sexta semana, en su quinto año
  alternatives_spanish:
  - en la sexta semana, en el quinto año
  - en la sexta semana, durante su quinto año
  lexicon: week -> semana; year -> año
  rationale: Sigue el paralelismo cronológico del hebraísmo/cálculo jubilar y su formulación inglesa auditada, con español natural.
- source_word: አብራም፡ በሌሊት፡ ... እምበርክ፡ እስከ፡ ነግህ፡
  english_pob_choice: Abram sat up through the night ... from evening until dawn
  chosen_spanish: Abram se mantuvo despierto durante la noche ... desde la tarde hasta el alba
  alternatives_spanish:
  - Abram estuvo despierto toda la noche ... desde el anochecer hasta el amanecer
  - Abram veló durante la noche ... desde la tarde hasta el alba
  lexicon: sat up through the night -> se mantuvo despierto durante la noche; evening -> tarde; dawn -> alba
  rationale: «Se mantuvo despierto» expresa la idea de permanecer en vigilia sin añadir una acción no dicha; «alba» conserva el contraste temporal claro y sobrio.
- source_word: ከመ፡ ያበይነ፡ ከዋክብተ፡ ... ይርአይ፡ ምንተ፡ ይከውን፡ ግብረ፡ ዓመት፡ በዝናማት፡
  english_pob_choice: to observe the stars ... to see what would be the character of the year with respect to the rains
  chosen_spanish: para observar las estrellas ... para ver cuál sería el carácter del año respecto de las lluvias
  alternatives_spanish:
  - para observar las estrellas ... para ver cómo sería el año en cuanto a las lluvias
  - para mirar las estrellas ... para saber qué clase de año habría en relación con las lluvias
  lexicon: observe -> observar; character of the year -> carácter del año; with respect to the rains -> respecto de las lluvias
  rationale: Mantiene el lenguaje interpretativo de la edición inglesa sin suavizar el sentido predictivo/astrológico del pasaje.
- source_word: ወሀሎ፡ ውእቱ፡ ባሕቲቱ፡
  english_pob_choice: And he was there alone
  chosen_spanish: y estaba allí solo
  alternatives_spanish:
  - y él estaba allí solo
  - y permanecía allí solo
  lexicon: alone -> solo
  rationale: Reproduce la sencillez narrativa del texto y conserva la insistencia en la soledad de Abram.
- source_word: ወመጽአ፡ ውስተ፡ ልቡ፡ ቃል፡
  english_pob_choice: and a word came into his heart
  chosen_spanish: y una palabra vino a su corazón
  alternatives_spanish:
  - y una palabra entró en su corazón
  - y le vino un pensamiento al corazón
  lexicon: word -> palabra; heart -> corazón
  rationale: Prefiere «palabra» porque esa es la lectura auditada; evita sustituirla por «pensamiento», que debilitaría la formulación fuente.
- source_word: ኵሉ፡ ተአምረ፡ ከዋክብት፡ ወተአምራሁ፡
  english_pob_choice: All the signs of the stars and their signs...
  chosen_spanish: Todos los signos de las estrellas y sus señales...
  alternatives_spanish:
  - Todos los signos de las estrellas y sus signos...
  - Todas las señales de las estrellas y sus señales...
  lexicon: signs/signs -> signos/señales
  rationale: Conserva la duplicación del original y la solución inglesa revisada. «Signos» y «señales» permiten mantener la repetición sin forzar sinonimia exacta.
theological_decisions:
- issue: Cronología técnica de Jubileos (weeks of years)
  english_pob_reading: Week here is calendrical shorthand for a week of years. Jubilees regularly counts time by jubilees, weeks, and years.
  chosen_spanish_reading: «semanas de años» como abreviatura calendárica técnica
  alternative_spanish_readings:
  - «semanas» sin explicación
  - «períodos de siete años»
  rationale: No se traduce como una semana ordinaria, porque el contexto de Jubileos usa un esquema cronológico propio. La nota preserva la abreviatura y su valor técnico.
  doctrine_reference: Cronología intrabíblica de Jubileos; no doctrinal, sino textual-histórica
- issue: Posible matiz astral/observacional del pasaje
  english_pob_reading: to observe the stars ... to see what would be the character of the year with respect to the rains
  chosen_spanish_reading: observación de las estrellas con expectativa sobre el carácter del año respecto de las lluvias
  alternative_spanish_readings:
  - observación meramente científica
  - observación para pronóstico agrícola
  rationale: 'La traducción conserva la ambigüedad del texto: no añade una evaluación teológica ni reduce la escena a simple ciencia. El resultado queda abierto a la lectura narrada por Jubileos.'
  doctrine_reference: Interpretación narrativa de Jubileos; no doctrina definicional
translation_notes:
  revision_awareness: 'Se incorporó la cláusula final añadida en la revisión del inglés POB: «All the signs of the stars and their signs...», reflejándola en español como «Todos los signos de las estrellas y sus señales...». El resto sigue el texto revisado y el paralelismo cronológico del original ge''ez.'
  spanish_consistency_notes:
  - Se mantuvo «Abram» en lugar de una variante abreviada por fidelidad al relato.
  - Se prefirió «alba» para εσφόρω/amanecer, evitando duplicación innecesaria de términos.
  - Se conservó la duplicación final de «signos/señales» para no borrar la tensión lexical del original.
  - Se usó «Yahvé» solo cuando no aparece en este versículo; aquí no corresponde introducirlo.
