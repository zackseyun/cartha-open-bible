    changes_summary: Added 'came' to complete the clause 'the word of the LORD came to him'; restored the omitted final phrase 'and I will bless you'; and closed the quotation properly.
translation:
  language: es
  text: 'Y la palabra de Yahvé vino a él por medio de mí, diciendo: “Sal de tu tierra, de tu parentela y de la casa de tu padre, a la tierra que yo te mostraré, y te convertiré en una nación grande y numerosa, y te bendeciré”.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: word of the LORD
  english_pob_choice: the word of the LORD came to him by my hand
  chosen_spanish: la palabra de Yahvé vino a él por medio de mí
  alternatives_spanish:
  - la palabra de Yahvé llegó a él por medio de mí
  - la palabra del Señor vino a él por medio de mí
  lexicon: word / LORD
  rationale: Mantengo ‘palabra’ para λόγος/dabar-equivalente y ‘Yahvé’ para el nombre divino, según el criterio del proyecto. ‘Vino a él’ refleja la cláusula completa restaurada en la revisión inglesa, evitando la supresión del movimiento verbal.
- source_word: kindred
  english_pob_choice: from your land and from your kindred and from your father's house
  chosen_spanish: de tu parentela
  alternatives_spanish:
  - de tu familia
  - de tus parientes
  lexicon: kinship term
  rationale: ‘Parentela’ conserva el alcance genealógico y de clan de ‘kindred’ sin reducirlo solo a ‘familia nuclear’.
- source_word: father's house
  english_pob_choice: from your father's house
  chosen_spanish: de la casa de tu padre
  alternatives_spanish:
  - de la casa paterna
  - de la casa de tu familia
  lexicon: house / household
  rationale: ‘Casa’ conserva el sentido de hogar/casa patriarcal, no solo edificio físico.
- source_word: land that I will show you
  english_pob_choice: the land that I will show you
  chosen_spanish: a la tierra que yo te mostraré
  alternatives_spanish:
  - a la tierra que te mostraré
  - a la tierra que yo te haré ver
  lexicon: land / show
  rationale: ‘Mostraré’ es la correspondencia natural y fiel para ‘show you’ en este contexto de promesa y guía.
- source_word: great and numerous nation
  english_pob_choice: a great and numerous nation
  chosen_spanish: una nación grande y numerosa
  alternatives_spanish:
  - una gran nación numerosa
  - un pueblo grande y numeroso
  lexicon: nation
  rationale: ‘Nación’ sigue la elección inglesa y preserva el matiz colectivo-político. ‘Grande y numerosa’ reproduce ambos adjetivos sin suavizarlos.
- source_word: bless
  english_pob_choice: and I will bless you
  chosen_spanish: y te bendeciré
  alternatives_spanish:
  - y te daré bendición
  - y te favoreceré
  lexicon: bless
  rationale: ‘Bendeciré’ es la equivalencia normal y transparente en español bíblico para ‘bless’.
theological_decisions:
- issue: Divine name versus title
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: El proyecto manda usar ‘Yahvé’ como forma principal del nombre divino, en vez de la convención de máscara ‘SEÑOR’. No hay aquí una razón contextual para reemplazarlo.
  doctrine_reference: Onomástica del Tetragrámaton; política terminológica del POB español
- issue: Agency in the quotation introduction
  english_pob_reading: the word of the LORD came to him by my hand
  chosen_spanish_reading: la palabra de Yahvé vino a él por medio de mí
  alternative_spanish_readings:
  - la palabra de Yahvé le llegó por medio de mí
  - la palabra de Yahvé le vino por mi mano
  rationale: ‘Por medio de mí’ conserva la mediación del hablante sin forzar ‘mano’ en un español menos natural. Mantiene la tensión entre medio humano e iniciativa divina, que la revisión inglesa también confirmó.
  doctrine_reference: Revelación mediada; profecía transmitida por agente humano
- issue: Scope of the blessing promise
  english_pob_reading: and I will bless you
  chosen_spanish_reading: y te bendeciré
  alternative_spanish_readings:
  - y te daré bendición
  - y te favoreceré
  rationale: Se restaura la cláusula final añadida en la revisión inglesa, conservando la promesa explícita de bendición en continuidad con el texto fuente ge’ez y el audit trail.
  doctrine_reference: Promesa patriarcal; bendición divina
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la apertura de la cláusula para incluir ‘came’, restauró la frase final ‘and I will bless you’ y cerró apropiadamente la cita. La redacción española incorpora esas correcciones explícitamente, sin seguir la versión abreviada anterior.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino, conforme al estándar del proyecto.
  - ‘Palabra’ se conserva de modo literal y solemne; no se sustituye por ‘mensaje’ para no debilitar la formulación fuente.
  - La cita se cierra con comillas españolas y puntuación final interna consistente con el estilo editorial del POB.
