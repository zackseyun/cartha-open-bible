translation:
  language: es
  text: Les contó este asunto a sus dos hermanos, y ellos se enojaron con él, y guardaron silencio. Y en el cuadragésimo jubileo, en la segunda semana, en su séptimo año, Abram tomó para sí una esposa, y su nombre fue Sarai, la hija de[a]
  philosophy: optimal-equivalence
  footnotes:
