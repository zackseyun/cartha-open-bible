    text: La cláusula 'la hija de su padre' es textualmente difícil en este contexto. El ge'ez, tal como está segmentado aquí, parece vincular a Sarai con Téraj; algunos testigos e intérpretes entienden de otra manera la relación familiar.
    reason: textual_variant
lexical_decisions:
- source_word: He told this matter
  english_pob_choice: He told this matter
  chosen_spanish: Les contó este asunto
  alternatives_spanish:
  - Les dijo esto
  - Les comunicó este asunto
  lexicon: contó / asunto
  rationale: El relato habla de comunicar una noticia específica a los dos hermanos; 'les contó este asunto' conserva el carácter de relato/noticia sin volverlo excesivamente formal.
- source_word: two brothers
  english_pob_choice: his two brothers
  chosen_spanish: sus dos hermanos
  alternatives_spanish:
  - sus dos hermanos
  - a sus dos hermanos
  lexicon: hermanos
  rationale: '''Sus dos hermanos'' refleja de forma natural la relación familiar indicada por el contexto narrativo.'
- source_word: they were angry with him
  english_pob_choice: they were angry with him
  chosen_spanish: ellos se enojaron con él
  alternatives_spanish:
  - se irritaron con él
  - se indignaron con él
  lexicon: enojarse
  rationale: '''Se enojaron'' es claro y directo en español moderno, y mantiene la reacción emocional fuerte del texto.'
- source_word: they kept silent
  english_pob_choice: they kept silent
  chosen_spanish: guardaron silencio
  alternatives_spanish:
  - callaron
  - se quedaron callados
  lexicon: guardar silencio
  rationale: '''Guardaron silencio'' expresa bien la acción plural y evita la ambigüedad de una forma singular; además refleja el ajuste textual del audit trail.'
- source_word: fortieth jubilee
  english_pob_choice: fortieth jubilee
  chosen_spanish: el cuadragésimo jubileo
  alternatives_spanish:
  - el jubileo cuadragésimo
  lexicon: jubileo
  rationale: Se conserva 'jubileo' como término técnico del calendario de Jubileos, con orden natural en español.
- source_word: second week
  english_pob_choice: second week
  chosen_spanish: la segunda semana
  alternatives_spanish:
  - en la segunda semana
  lexicon: semana
  rationale: La expresión cronológica se vierte de manera directa y legible.
- source_word: in its seventh year
  english_pob_choice: in its seventh year
  chosen_spanish: en su séptimo año
  alternatives_spanish:
  - en el séptimo año de ésta
  lexicon: año
  rationale: '''Su'' retoma de forma breve el jubileo/semana mencionados y mantiene la secuencia temporal.'
- source_word: took for himself a wife
  english_pob_choice: Abram took for himself a wife
  chosen_spanish: Abram tomó para sí una esposa
  alternatives_spanish:
  - Abram tomó esposa
  - Abram se casó
  lexicon: tomar para sí / esposa
  rationale: La fórmula conserva el matiz del original y evita sustituirlo por una paráfrasis interpretativa como 'se casó'.
- source_word: daughter of
  english_pob_choice: the daughter of
  chosen_spanish: la hija de
  alternatives_spanish:
  - la hija de su padre
  - la hija de
  lexicon: hija
  rationale: El texto fuente en este segmento queda truncado al final con una relación familiar incompleta; se preserva literalmente sin resolver la dificultad textual.
theological_decisions:
- issue: Relación familiar final truncada y textualemente difícil
  english_pob_reading: the daughter of his father
  chosen_spanish_reading: la hija de
  alternative_spanish_readings:
  - la hija de su padre
  - la hija de Teraj
  rationale: El segmento ge'ez transmitido termina en una frase incompleta. En vez de completar o armonizar el texto, se deja en suspenso la relación familiar final para respetar el testimonio disponible y la dificultad textual señalada en el audit trail.
  doctrine_reference: Crítica textual / preservación del alcance del testimonio manuscrito
translation_notes:
  revision_awareness: La versión en inglés fue revisada para corregir el sujeto plural de 'they kept silent' y para añadir la frase inicial 'He told'. También se conservó la terminación truncada del segmento fuente sin intentar completar la cláusula final.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - '''Jubileo'' se mantiene como término técnico del libro de Jubileos.'
  - Se evita 'se casó' para no suavizar la forma verbal del original; 'tomó para sí una esposa' conserva el paralelo semítico.
  - No se añaden notas al pie porque el segmento no contiene marcadores anclables y la cláusula final queda simplemente truncada.
