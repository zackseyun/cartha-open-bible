translation:
  language: es
  text: su padre, y ella fue su esposa. Y Arán su hermano tomó una esposa para sí en el tercer año de la tercera semana, y ella le dio a luz un hijo en el séptimo año de esta semana, y le puso por nombre
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ብእሲተ
  english_pob_choice: his wife / a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa para sí
  lexicon: no aplica
  rationale: El contexto matrimonial pide un equivalente natural y digno en español. 'Esposa' comunica relación conyugal de forma clara y evita la ambigüedad de 'mujer'.
- source_word: ነሥአ
  english_pob_choice: took a wife for himself
  chosen_spanish: tomó para sí una esposa
  alternatives_spanish:
  - tomó una esposa para sí
  - tomó una mujer
  lexicon: no aplica
  rationale: Sigue de cerca la acción de tomar esposa, conservando el matiz reflexivo 'para sí' sin sonar forzado en español.
- source_word: ወለደት
  english_pob_choice: she bore him a son
  chosen_spanish: ella le dio a luz un hijo
  alternatives_spanish:
  - ella le parió un hijo
  - ella le tuvo un hijo
  lexicon: no aplica
  rationale: '''Dar a luz'' es el equivalente natural y respetuoso en español para el verbo de parto; mantiene el sujeto femenino explícito.'
- source_word: ወጸውዐ
  english_pob_choice: he named him
  chosen_spanish: le puso por nombre
  alternatives_spanish:
  - lo nombró
  - le llamó
  lexicon: no aplica
  rationale: La revisión inglesa observó que la fórmula está incompleta; en español, 'le puso por nombre' reproduce una fórmula nominativa abierta y pública sin añadir un nombre inexistente.
- source_word: እኁሁ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - el hermano de él
  lexicon: no aplica
  rationale: Forma relacional simple y transparente; no requiere marcación especial en español.
theological_decisions:
- issue: Genealogical/historical naming formula left incomplete in the source segment
  english_pob_reading: he named him
  chosen_spanish_reading: le puso por nombre
  alternative_spanish_readings:
  - lo llamó
  - lo nombró
  rationale: El segmento fuente termina antes de dar el nombre; por eso conviene una fórmula abierta que deje visible la interrupción textual sin suplir información ausente.
  doctrine_reference: Ninguna; decisión textual y estilística, no doctrinal.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió 'took a wife for himself' y 'he named him' frente a formulaciones más literales pero menos naturales. Como el pasaje en Geez termina abruptamente, el español también queda abierto al final.
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y publicable, sin añadir el nombre final que no aparece en el segmento proporcionado.
  - '''Arán'' conserva la forma ya usada en el contexto en español para Aran.'
  - No se introdujeron notas al pie porque no hay variante textual o ambigüedad que el fragmento permita resolver con mayor precisión.
