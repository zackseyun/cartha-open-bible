  yaml_path: translation/extra_canonical/jubilees/012/006.yaml
  text: '[They are a deception] to those who make them, and confusion of heart to those who worship them. Do not worship them." And his father said to him, "I too know, my son, but what can I do for a people who have made me serve?'
  footnotes:
  - marker: a
    text: Or 'who have made me go astray?'.
    reason: previous_rendering
  - marker: b
    text: Or 'Shame belongs to those who make them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:01Z'
    unchanged: false
    changes_summary: Changed the final clause from 'who have set me' to 'who have made me go astray' to account for the source sense of being led astray/caused to err, and completed the unfinished sentence naturally.
translation:
  language: es
  text: '[Son] un engaño[a] para los que las hacen, y confusión de corazón para los que las adoran. «No las adores». Y su padre le dijo: «Yo también lo sé, hijo mío, pero ¿qué puedo hacer por un pueblo que me ha hecho servir[b]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'son una decepción'; el sustantivo reproduce el sentido del pasaje sin añadir 'vergüenza'.
    reason: lexical_alternative
  - marker: b
    text: El verbo refleja el sentido de 'servir' en la revisión textual; no significa 'me ha hecho extraviarme'.
    reason: textual_variant
lexical_decisions:
- source_word: ለእለ፡ ይገብርዎሙ
  english_pob_choice: '[They are a deception] to those who make them'
  chosen_spanish: '[Son] una engaño[a] para los que las hacen'
  alternatives_spanish:
  - '[Son] un engaño para los que las hacen'
  - Engañan a los que las hacen
  lexicon: deception / engaño
  rationale: El ge’ez presenta la frase como un predicado incompleto que continúa el pensamiento del versículo anterior; por eso se conserva la idea de 'decepción/engaño' sin introducir 'vergüenza' como contenido inexistente en el texto fuente. Se usa 'engaño' como sustantivo natural en español.
- source_word: ወከሕተት፡ ልብ፡
  english_pob_choice: confusion of heart
  chosen_spanish: confusión de corazón
  alternatives_spanish:
  - confusión del corazón
  - perturbación del corazón
  - confusión interior
  lexicon: heart / confusion
  rationale: Se mantiene la metáfora semítica de 'corazón' como sede interior del pensamiento y la voluntad. 'Confusión de corazón' conserva la fuerza literal y la paralela del inglés auditado.
- source_word: አታምልክዎሙ
  english_pob_choice: Do not worship them
  chosen_spanish: No las adores
  alternatives_spanish:
  - No las adoréis
  - No las rindas culto
  lexicon: worship / adorar
  rationale: '''Adorar'' es el equivalente más directo y claro en español para el acto religioso de culto a ídolos. Se usa la segunda persona singular por la forma del discurso directo en español bíblico fluido.'
- source_word: እትአዘዝ
  english_pob_choice: made me serve
  chosen_spanish: me ha hecho servir
  alternatives_spanish:
  - me ha obligado a servir
  - me ha puesto a servir
  - me ha sometido a servir
  lexicon: serve / servir
  rationale: La revisión más reciente corrige la lectura errónea 'go astray' y confirma el sentido de 'servir'. 'Me ha hecho servir' reproduce la causalidad del original sin sobreinterpretar si la idea es obligación, sumisión o desempeño de servicio idolátrico.
theological_decisions:
- issue: Referencia al culto idolátrico y la responsabilidad de quienes fabrican ídolos
  english_pob_reading: '[They are a deception] to those who make them, and confusion of heart to those who worship them. Do not worship them.'
  chosen_spanish_reading: '[Son] un engaño para los que las hacen, y confusión de corazón para los que las adoran. No las adores.'
  alternative_spanish_readings:
  - Son una vergüenza para los que las hacen, y confusión de corazón para los que las adoran.
  - Son un engaño para quienes las fabrican, y confusión de corazón para quienes las veneran.
  rationale: Se evita introducir 'vergüenza' porque la revisión del texto fuente indica que ese término no está explícito aquí. La exhortación mantiene el rechazo al culto idolátrico con lenguaje transparente y fiel al auditable source trail.
  doctrine_reference: Ex 20:4-5; Sal 115:4-8
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que corrige el final a 'made me serve' y rechaza la interpretación anterior 'go astray'. También evita la interpolación de 'shame' y conserva el enlace implícito con el versículo previo mediante una frase nominal breve.
  spanish_consistency_notes:
  - Se mantiene 'adorar' para el culto a ídolos, coherente con el español bíblico y con el inglés auditado.
  - '''Corazón'' se conserva como sede interior de la confusión, sin sustituirlo por una paráfrasis psicológica.'
  - No se usa 'SEÑOR' ni lenguaje de máscara para el nombre divino porque este versículo no lo contiene explícitamente.
  - La frase inicial se deja abrupta porque el hebreo/ge’ez subyacente y el audit trail muestran continuidad con el versículo anterior.
