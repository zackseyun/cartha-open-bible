base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/026.yaml
  text: This house I have built for myself[26], to put my name upon it on the earth. It is given to you and to your seed forever, and it will be called the house of Abraham. It is given to you and to your seed forever, because you will build my house and establish my name before God forever. Your seed and your name will stand throughout all the generations of the earth.”
  footnotes:
  - marker: '26'
    text: '''This house I have built for myself'' may refer to Abraham''s cultic site, but the following lines also sound dynastic (''house of Abraham''). The ambiguity is likely intentional.'
    reason: segmentation_note
  - marker: a
    text: Or 'and my people, the house of Abraham.'.
    reason: previous_rendering
  - marker: b
    text: Or 'because you have built my house and established my name'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:30Z'
    unchanged: false
    changes_summary: Revised to reflect 'on the earth' more literally; restored 'my people, the house of Abraham' instead of the interpretive 'it will be called'; changed future verbs to perfects ('have built,' 'established') to match the source; retained the repeated grant formula.
translation:
  language: es
  text: «Esta casa la he edificado para mí[a], para poner mi nombre sobre ella en la tierra. Te es dada a ti y a tu descendencia para siempre, y será llamada[b] la casa de Abraham. Te es dada a ti y a tu descendencia para siempre, porque tú edificarás mi casa y establecerás mi nombre ante Dios para siempre. Tu descendencia y tu nombre permanecerán a lo largo de todas las generaciones de la tierra.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Esta casa la he edificado para mí» puede referirse al sitio cultual que Abraham erigió, pero las líneas siguientes tienen también resonancia dinástica («la casa de Abraham»). La ambigüedad es probablemente intencional.
    reason: theological_note
  - marker: b
    text: O bien «y mi pueblo, la casa de Abraham». Esta lectura alternativa proviene de la forma ge'ez ወጎሳመይ, identificada como error de OCR en lugar del correcto ወተሰምየ (watasamya, «será llamada/nombrada»). Se conserva aquí como variante textual documentada.
    reason: textual_variant
lexical_decisions:
- source_word: ዘርእ (zer'a)
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - progenie
  - posteridad
  lexicon: Ge'ez ዘርእ, primary meaning 'seed/grain,' used metonymically for offspring/lineage in covenant promise contexts throughout Jubilees.
  rationale: The English POB preserves the literal 'seed' for translational transparency. In Spanish, 'simiente' is the etymological equivalent but carries an archaic register that strains readability outside specialized liturgical contexts. 'Descendencia' is the standard modern term for the same metonymic use in biblical promise language and is widely understood. The word appears twice in this verse in the repeated grant formula; consistency and clarity favour 'descendencia' here, with the literal sense preserved in the lexical record.
- source_word: ቤተ (beta)
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - linaje
  lexicon: Ge'ez ቤት/ቤተ = house (physical structure, household, dynasty). Cognate with Hebrew בַּיִת.
  rationale: '''Casa'' carries both the physical and dynastic senses that the source exploits in this verse (''this house I have built'' = cultic site; ''the house of Abraham'' = lineage/dynasty). Spanish ''casa'' replicates this semantic range naturally. No other rendering preserves both senses simultaneously.'
- source_word: ትሐንጽ / ተሃነጽ (tə-ḥannaṣ — Ge'ez imperfect)
  english_pob_choice: will build
  chosen_spanish: edificarás
  alternatives_spanish:
  - construirás
  - has edificado (incorrect perfect)
  lexicon: Ge'ez imperfect/jussive of ሐነጸ (ḥanaṣa, 'to build'). The imperfect stem in Ge'ez expresses future or ongoing action.
  rationale: 'The revision pass of 2026-04-23 incorrectly rendered this as a perfect (''have built''), which was corrected in the 2026-04-28 review: the verb is Ge''ez imperfect (future), confirmed by the prophetic context in which Abraham speaks to Jacob about Jacob''s future building of a sacred site. Spanish future indicative ''edificarás'' faithfully reflects the Ge''ez imperfect and the narrative register.'
- source_word: ታቀውም / ይቀውም (from root ቆምē, 'to stand/establish')
  english_pob_choice: establish / will stand
  chosen_spanish: establecerás / permanecerán
  alternatives_spanish:
  - afirmarás / se mantendrán
  - confirmarás / durarán
  lexicon: 'Ge''ez root ቆምē used twice: ታቀውም (2nd sg. imperfect, ''you will establish'') and ይቀውም (3rd sg. imperfect, ''will stand/endure''). Same root, two rendered senses.'
  rationale: Spanish lacks a single verb that covers both 'establish (a name)' and 'stand/endure across generations' as naturally as the Ge'ez root does. Following the English POB, 'establecerás' captures the active causative sense ('to make stand/to establish') and 'permanecerán' captures the intransitive endurance sense ('to remain standing'). A lexical note documents the shared root.
- source_word: ወተሰምየ / ወጎሳመይ (OCR corrected)
  english_pob_choice: it will be called
  chosen_spanish: será llamada
  alternatives_spanish:
  - y mi pueblo (lectura OCR errónea)
  - y mi gente
  lexicon: 'Correct Ge''ez: ወተሰምየ (wa-tasamya), passive of ሰምየ (''to name, to be called''). OCR misread as ወጎሳመይ, which would derive from a modern Ethiopic root gosa (''people/tribe'').'
  rationale: The corrected Ge'ez text unambiguously yields 'será llamada' (passive naming construction). The OCR-error reading 'y mi pueblo, la casa de Abraham' is documented in English footnote [a] and preserved in Spanish footnote [b] for text-critical transparency, but the main text follows the corrected reading.
theological_decisions:
- issue: Cultic site vs. dynastic 'house'
  english_pob_reading: 'This house I have built for myself (footnote 26: ambiguity between cultic site and dynastic reference is likely intentional)'
  chosen_spanish_reading: Esta casa la he edificado para mí[a]
  alternative_spanish_readings:
  - Este santuario que he construido para mí (enfatiza el sitio cultual)
  - Esta casa que he fundado (enfatiza el linaje)
  rationale: 'The English POB preserves the deliberate ambiguity: ''casa'' in Ge''ez (ቤተ) can mean both a physical sacred site Abraham erected and the dynastic ''house of Abraham'' that follows. Spanish ''casa'' sustains the same ambiguity. No explanatory gloss is introduced; the footnote (anchored at [a]) flags the dual reference for the reader.'
  doctrine_reference: Covenant theology in Second Temple Judaism; Jubilees' re-narration of Abrahamic promise (cf. Gen 12:2–3; 17:7–8). The 'house of Abraham' formula recurs in Second Temple texts as both lineage and sacred community.
- issue: Future vs. perfect tense of the verbs 'build' and 'establish my name'
  english_pob_reading: because you will build my house and establish my name before God forever
  chosen_spanish_reading: porque tú edificarás mi casa y establecerás mi nombre ante Dios para siempre
  alternative_spanish_readings:
  - porque tú has edificado mi casa y has establecido mi nombre (lectura perfecta incorrecta)
  rationale: 'The Ge''ez verbs ትሐንጽ and ታቀውም are imperfect, indicating future action. The revision pass of 2026-04-23 mistakenly read them as perfects; this was adjudicated and corrected on 2026-04-28. Theologically the distinction matters: Abraham is prophesying Jacob''s future covenantal role (building a sacred house, perpetuating the divine name), not retrospectively crediting past acts. Spanish future indicative (''edificarás'', ''establecerás'') is therefore both grammatically accurate and theologically necessary.'
  doctrine_reference: Patriarchal prophecy and typological succession in Jubilees; Jacob as inheritor and fulfiller of Abrahamic covenant obligations (cf. Jub. 22:10–30).
- issue: 'Naming formula: ''será llamada la casa de Abraham'' vs. ''y mi pueblo, la casa de Abraham'''
  english_pob_reading: and it will be called the house of Abraham
  chosen_spanish_reading: y será llamada[b] la casa de Abraham
  alternative_spanish_readings:
  - y mi pueblo, la casa de Abraham (lectura del error OCR ወጎሳመይ)
  rationale: 'The OCR-corrupted form ወጎሳመይ led the 2026-04-23 revision pass to introduce ''my people, the house of Abraham,'' which carries a distinct ecclesial/communal nuance (Abraham''s people as a defined community). The 2026-04-28 review restored the correct ወተሰምየ: a passive naming formula meaning ''it shall be called/named.'' The Spanish preserves ''será llamada'' (passive, 3rd sg. feminine agreeing with ''casa''). The alternative is preserved in footnote [b] for transparency.'
  doctrine_reference: 'Naming theology in the Hebrew Bible and Jubilees: placing the divine name or a patriarch''s name upon a site/people as a mark of ownership and covenant bond (cf. Deut 28:10; Jer 7:11).'
translation_notes:
  revision_awareness: 'Esta traducción incorpora las correcciones establecidas en las revisiones del 2026-04-28 (adjudicador: claude-opus-4-7): (1) Se restituye «será llamada la casa de Abraham» en lugar de «y mi pueblo, la casa de Abraham», al reconocer que ወጎሳመይ es un error de OCR del texto ge''ez correcto ወተሰምየ; (2) Se mantienen los verbos «edificarás» y «establecerás» en tiempo futuro (no perfectos), reflejando los imperfectos ge''ez ትሐንጽ y ታቀውም, conforme al contexto profético en que Abraham habla de las acciones futuras de Jacob. Ambas correcciones se documentan en las notas al pie para plena auditoría del proceso de traducción.'
  spanish_consistency_notes:
  - «Descendencia» se usa de forma consistente para el ge'ez ዘርእ (literalmente «simiente») en las dos ocurrencias del versículo, en línea con el lenguaje bíblico moderno en español.
  - «Casa» (ge'ez ቤተ) se mantiene sin glosar en todas sus ocurrencias, preservando la ambigüedad cultica/dinástica documentada en el English POB.
  - «Edificar» (ge'ez ሐነጸ) se usa tanto para la acción pasada de Abraham («he edificado») como para la acción futura de Jacob («edificarás»), reflejando el mismo lexema ge'ez.
  - 'La raíz ge''ez ቆምē aparece dos veces con sentidos distintos: ታቀውም → «establecerás» (causativo activo) e ይቀውም → «permanecerán» (intransitivo de duración). La elección léxica diferenciada se documenta en las decisiones léxicas.'
  - «Para siempre» traduce ge'ez ለዓለም de manera consistente en las dos apariciones de la fórmula de donación («te es dada a ti y a tu descendencia para siempre»).
  - Los marcadores de nota al pie en el texto español ([a], [b], [c]) son únicos y se anclan en los términos o cláusulas directamente relevantes.
