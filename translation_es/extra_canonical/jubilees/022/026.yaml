  to: «Esta casa la he edificado para mí[a], para poner mi nombre sobre ella en la tierra. Te es dada a ti y a tu descendencia para siempre, y será llamada[b] la casa de Abraham. Te es dada a ti y a tu descendencia para siempre, porque tú edificarás mi casa y establecerás mi nombre ante Dios para siempre. Tu descendencia y tu nombre permanecerán a lo largo de todas las generaciones de la tierra.»
  rationale: 'Se conserva la traducción sustantiva del borrador porque está bien alineada con la fuente y con las decisiones adjudicadas del POB inglés. Solo se hace una reparación menor de estilo y precisión temporal en la cláusula final ("a lo largo de todas las generaciones de la tierra") para expresar mejor la idea de permanencia intergeneracional, y se elimina la nota [c] por no ser necesaria para el lector final: la forma futura ya está correctamente reflejada en el texto principal.'
