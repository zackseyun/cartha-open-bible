review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y las decisiones adjudicadas del inglés POB: mantiene la doble concesión "te es dada... para siempre", corrige correctamente la lectura OCR a "será llamada la casa de Abraham", y conserva el futuro profético en "edificarás... establecerás". También preserva la ambigüedad de "casa" entre sitio cultual y casa dinástica. La única desviación relevante es estilístico-gramatical: "en todas las generaciones de la tierra" suena menos natural y algo impreciso frente a "a lo largo de/todas las generaciones de la tierra" o "por todas las generaciones de la tierra", dado que el sentido es duración a través de generaciones, no ubicación dentro de ellas.'
  spanish_quality_summary: 'El español es claro, digno y mayormente natural. "Esta casa la he edificado para mí" es aceptable, aunque "he construido" sería más corriente; sin embargo, "edificado" encaja bien con el registro bíblico. "Te es dada" también funciona. La mejora principal es pulir la cláusula final para sonar más idiomática en español bíblico moderno: "permanecerán a lo largo de todas las generaciones de la tierra". Además, la nota [c] no es necesaria como variante textual en el sentido del proyecto; explica historia editorial inglesa más que una alternativa que deba preservarse al lector español. Puede simplificarse o eliminarse.'
  glossary_alignment: 'Buena alineación terminológica general: ቤተ -> "casa" preserva la ambigüedad; ዘርእ -> "descendencia" es una elección española natural; los verbos imperfectos se reflejan con futuro; no hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé/Mesías. La documentación lexical/theológica está bien enfocada, aunque la nota [c] conviene no presentar como variante principal al lector final.'
  issues:
  - severity: medium
    issue: La frase final "en todas las generaciones de la tierra" es poco idiomática para expresar duración a través del tiempo.
    rationale: El Ge'ez y el inglés POB expresan permanencia a lo largo de las generaciones. En español, "en todas las generaciones" puede entenderse, pero suena menos natural que "a lo largo de todas las generaciones" o "por todas las generaciones".
  - severity: low
    issue: La nota [c] explica una revisión editorial previa más que una variante que el lector necesite en nota al pie.
    rationale: El requisito pide preservar alternativas significativas cuando el inglés las preservó o cuando el español crea nueva ambigüedad. Aquí el futuro ya está correctamente en el texto; la historia de una revisión errónea previa no necesita mantenerse como nota anclada.
  revised_spanish_text: «Esta casa la he edificado para mí[a], para poner mi nombre sobre ella en la tierra. Te es dada a ti y a tu descendencia para siempre, y será llamada[b] la casa de Abraham. Te es dada a ti y a tu descendencia para siempre, porque tú edificarás mi casa y establecerás mi nombre ante Dios para siempre. Tu descendencia y tu nombre permanecerán a lo largo de todas las generaciones de la tierra.»
  revised_footnotes:
