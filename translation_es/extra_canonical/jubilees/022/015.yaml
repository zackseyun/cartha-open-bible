translation:
  language: es
  text: Que el Dios Altísimo te conceda todas las bendiciones con las que me bendijo, y con las que bendijo a Noé y a Adán. Que reposen sobre la santa cabeza de tu descendencia[a] por todas las generaciones y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de generación en generación’.
    reason: alternative_reading
lexical_decisions:
- source_word: የሀብከ፡ / give you
  english_pob_choice: give you
  chosen_spanish: te conceda
  alternatives_spanish:
  - te dé
  - te otorgue
  lexicon: give / grant
  rationale: ‘Conceda’ conserva el valor de otorgamiento benéfico y suena natural en una bendición solemne. Evita un calco demasiado plano de ‘dar’ y mantiene el tono optativo del texto.
- source_word: አምላከ፡ ልዑል፡ / Most High God
  english_pob_choice: Most High God
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: God Most High / Most High God
  rationale: ‘Dios Altísimo’ reproduce el título con dignidad y fluidez en español. Mantiene la referencia al título divino sin introducir una reformulación interpretativa.
- source_word: በረከታተ፡ / blessings
  english_pob_choice: blessings
  chosen_spanish: bendiciones
  alternatives_spanish:
  - bendición
  - favores
  lexicon: blessing(s)
  rationale: El plural ‘bendiciones’ corresponde al acumulativo del pasaje y preserva el carácter concreto de los dones invocados. ‘Favores’ suavizaría indebidamente el registro bíblico.
- source_word: ባረከኒ / he blessed me
  english_pob_choice: he blessed me
  chosen_spanish: me bendijo
  alternatives_spanish:
  - me ha bendecido
  - me dio su bendición
  lexicon: bless
  rationale: ‘Me bendijo’ es directo, fiel y mantiene el paralelismo con las otras bendiciones mencionadas. No hay razón para temporalizarlo con perfecto compuesto en español.
- source_word: ኖኅ / Noah
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noé
  lexicon: Noah
  rationale: Nombre bíblico estándar en español.
- source_word: አዳም / Adam
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adán
  lexicon: Adam
  rationale: Nombre bíblico estándar en español.
- source_word: ያዕርፉ / may they rest
  english_pob_choice: May they rest
  chosen_spanish: Que reposen
  alternatives_spanish:
  - Que descansen
  - Que permanezcan
  lexicon: rest
  rationale: ‘Reposen’ conserva el valor de permanencia benéfica y el tono de oración. En español suena más solemne que ‘descansen’ y más preciso que ‘permanezcan’.
- source_word: ዲበ፡ ድማኅ፡ ቅዱስ፡ / holy head
  english_pob_choice: holy head
  chosen_spanish: santa cabeza
  alternatives_spanish:
  - cabeza santa
  - sagrada cabeza
  lexicon: holy / head
  rationale: ‘Santa cabeza’ mantiene la literalidad de ‘holy head’ sin perder naturalidad en español. ‘Sagrada’ sería posible, pero ‘santa’ conserva mejor el registro bíblico de consagración.
- source_word: ዘርእከ፡ / your offspring
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu linaje
  - tu simiente
  lexicon: offspring / seed
  rationale: ‘Descendencia’ traduce con claridad el sentido de posteridad/descendientes y evita ‘simiente’, que en español puede sonar arcaico o excesivamente técnico. Mantiene el criterio revisado del inglés POB de no usar ‘seed’ como calco rígido.
theological_decisions:
- issue: Extensión temporal de la bendición
  english_pob_reading: for all generations and forever
  chosen_spanish_reading: por todas las generaciones y para siempre
  alternative_spanish_readings:
  - de generación en generación y para siempre
  - por generaciones y para siempre
  rationale: El ge’ez, según la revisión auditada, explicita ‘para todas las generaciones’; por eso ‘por todas las generaciones’ conserva el cuantificador total mejor que la fórmula idiomática ‘de generación en generación’. Se mantiene además ‘para siempre’ para reflejar la duración indefinida final.
  doctrine_reference: Perpetuidad de la bendición patriarcal; transmisión intergeneracional de la promesa
- issue: Identidad del sujeto de la bendición
  english_pob_reading: the Most High God
  chosen_spanish_reading: Dios Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Altísimo
  rationale: Se conserva explícitamente ‘Dios’ para evitar ambigüedad y mantener la referencia directa al sujeto divino del texto. No se sustituye por ‘Señor’, porque el hebreo/gee'z aquí no exige la convención litúrgica de ocultamiento del nombre divino.
  doctrine_reference: Teología del Nombre divino y bendición patriarcal
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del POB en inglés, que prefirió ‘offspring’ y ajustó la duración a ‘for all generations’. La versión española adopta ‘descendencia’ y ‘por todas las generaciones’ para reflejar ambas decisiones sin perder el paralelismo ni la solemnidad del original ge’ez.
  spanish_consistency_notes:
  - Se preservó el patrón de bendición desiderativa con ‘Que…’ en lugar de un indicativo narrativo.
  - Se mantuvo ‘Dios Altísimo’ en vez de ‘Señor’ para no introducir una convención de ocultamiento que el texto base no requiere.
  - ‘Descendencia’ funciona aquí como término colectivo para linaje/posteridad, coherente con la revisión inglesa que evitó ‘seed’.
  - La nota textual sobre ‘de generación en generación’ se conserva como alternativa española legítima, aunque el cuerpo principal prioriza la cuantificación explícita del ge’ez.
