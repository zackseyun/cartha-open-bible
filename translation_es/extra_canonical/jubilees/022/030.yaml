base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/030.yaml
  text: And he blessed Jacob and said[30], “My son, in whom with all my heart and all my affection I rejoice, may Your grace and Your mercy rest upon him and upon his seed always.”
  footnotes:
  - marker: '30'
    text: The wording shifts awkwardly between second and third person ('your grace ... upon him'). The translation preserves the prayer-like sense without forcing strict grammatical regularity.
    reason: textual_variant
  - marker: a
    text: Or 'my grace and my mercy rest upon him and upon all his seed always'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:30Z'
    unchanged: false
    changes_summary: Changed 'in all my affection' to 'all my affection' for more natural English; changed 'your grace and your mercy' to 'my grace and my mercy' to match the first-person speaker and source suffixes; changed 'be upon him' to 'rest upon him' to reflect the verb more naturally; changed 'upon his seed all the days' to 'upon all his seed always' for completeness and smoother formal English.
translation:
  language: es
  text: 'Y bendijo a Jacob y dijo: «Hijo mío, en quien con todo mi corazón y todo mi afecto me regocijo, que tu gracia y tu misericordia[a] reposen sobre él y sobre su descendencia para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto geʽez presenta una irregularidad de persona: la bendición se formula con sufijos de segunda persona («tu gracia», «tu misericordia») aunque recae «sobre él».'
    reason: textual_variant
lexical_decisions:
- source_word: ወባረኮ፡ ለያዕቆብ፡
  english_pob_choice: And he blessed Jacob
  chosen_spanish: Y bendijo a Jacob
  alternatives_spanish:
  - Y él bendijo a Jacob
  - Y bendijo a Jacob
  lexicon: ברך / εὐλογέω
  rationale: Se conserva el verbo pleno «bendijo» sin suavizarlo; el sujeto implícito se mantiene como en el español bíblico natural, ya que el contexto identifica claramente al hablante.
- source_word: ወይቤ፡
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y dijo
  lexicon: אמר / λέγω
  rationale: «Dijo» es la equivalencia directa y más natural en español para introducir la cita.
- source_word: ወልድየ፡
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Mi hijo
  - Hijo mío
  lexicon: בְּנִי / υἱέ μου
  rationale: «Hijo mío» suena más idiomático y reverente en español bíblico contemporáneo que «Mi hijo», sin cambiar la relación filial expresada por el original.
- source_word: ዘበኵሉ፡ ልብየ፡ ወዘበምሕረትየ፡
  english_pob_choice: in whom with all my heart and all my affection I rejoice
  chosen_spanish: en quien con todo mi corazón y toda mi afecto me regocijo
  alternatives_spanish:
  - en quien con todo mi corazón y todo mi afecto me regocijo
  - en quien con todo mi corazón y toda mi afecto me regocijo
  lexicon: לֵב / σπλάγχνα / χαίρω
  rationale: Se preserva la doble expresión afectiva del original. Se mantiene «me regocijo» para reflejar el verbo de gozo del texto; «corazón» y «afecto» reproducen el alcance interno y emotivo. Se deja la tensión de concordancia en el texto con una nota, porque el audito inglés también conserva la formulación cercana al original y la frase exige decisión estilística en español.
- source_word: ሣህለከ፡
  english_pob_choice: Your grace
  chosen_spanish: tu gracia
  alternatives_spanish:
  - tu gracia
  - tu favor
  lexicon: חֵן / χάρις
  rationale: 'El sufijo de segunda persona se conserva como «tu», siguiendo el análisis del audit trail: la frase se dirige a Dios. «Gracia» mantiene la terminología bíblica habitual y el valor de favor inmerecido.'
- source_word: ምሕረትከ፡
  english_pob_choice: Your mercy
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu misericordia
  - tu compasión
  lexicon: רַחֲמִים / ἔλεος
  rationale: «Misericordia» es la correspondencia más estable en español para el término de misericordia/clemencia divina; se evita «compasión» por ser menos precisa en este contexto litúrgico.
- source_word: ይትፈሣሕ፡
  english_pob_choice: rest upon him
  chosen_spanish: reposen sobre él
  alternatives_spanish:
  - resten sobre él
  - reposen sobre él
  lexicon: שׁכן / ἐπισκηνόω / ἐπιπίπτω (según contexto de bendición)
  rationale: «Reposen» comunica de modo natural la idea de permanencia de gracia y misericordia sobre alguien. Se usa plural para concordar con «tu gracia y tu misericordia».
- source_word: ወላዕለ፡ ዘርኡ፡ ኵሎ፡ መዋዕለ።
  english_pob_choice: and upon his seed always
  chosen_spanish: y sobre su descendencia para siempre
  alternatives_spanish:
  - y sobre su descendencia para siempre
  - y sobre su descendencia todos los días
  lexicon: זֶרַע / σπέρμα
  rationale: «Descendencia» transmite el valor colectivo de זֶרַע sin sonar arcaico. «Para siempre» recoge el alcance durativo de «always/all the days» en el español más natural y publicable.
theological_decisions:
- issue: 'Destino de la bendición: segunda persona en el dador divino vs. tercera persona en el receptor humano'
  english_pob_reading: Your grace and Your mercy rest upon him
  chosen_spanish_reading: tu gracia y tu misericordia reposen sobre él
  alternative_spanish_readings:
  - tu gracia y tu misericordia reposen sobre él
  - mi gracia y mi misericordia reposen sobre él
  rationale: Se sigue el cotejo revisado que identifica los sufijos ge’ez como segunda persona dirigida a Dios. En español, esto se expresa coherentemente con «tu»; la lectura alternativa con «mi» se descarta por contradecir el análisis de los sufijos.
  doctrine_reference: Gramática y referencia pronominal del texto fuente; no hay necesidad de armonización doctrinal externa.
- issue: Permanencia de la bendición sobre la descendencia
  english_pob_reading: upon his seed always
  chosen_spanish_reading: sobre su descendencia para siempre
  alternative_spanish_readings:
  - sobre su descendencia para siempre
  - sobre toda su descendencia para siempre
  - sobre su descendencia todos los días
  rationale: El audit trail corrige la lectura equivocada que hacía «all» modificar «seed». El español conserva la idea de duración continua con «para siempre», que es el equivalente más natural y suficientemente amplio para መዋዕለ.
  doctrine_reference: Consistencia semántica con el texto ge’ez y la revisión crítica del audit trail.
translation_notes:
  revision_awareness: 'La revisión más reciente del audit trail corrigió una mala lectura de la persona gramatical: no es «mi gracia», sino «tu gracia» y «tu misericordia», porque los sufijos ge’ez son de segunda persona. También corrigió el alcance de «all»: modifica «days»/«all the days», no «seed». La presente versión española sigue esa corrección y evita trasladar la lectura errónea previa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto, pero aquí el pronombre poseído «tu» responde al texto fuente y al audit trail, que indican una alocución directa a Dios sin necesidad de nombrarlo explícitamente.
  - Se usa «descendencia» para זֶרַע por ser más claro que «simiente» en español contemporáneo, sin perder el valor colectivo.
  - Se conserva una formulación algo tensa en la cláusula afectiva para no diluir la densidad del original ni borrar la irregularidad señalada por el aparato crítico.
