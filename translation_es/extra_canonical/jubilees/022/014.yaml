revisions:
- from: Sé fuerte delante de los hombres[a], y mientras domines entre toda la descendencia de Set, entonces tus caminos[b] y los caminos de tus hijos serán justificados, para que lleguen a ser un pueblo santo.
  to: Sé fuerte delante de los hombres, y mientras gobiernes[a] entre toda la descendencia de Set, entonces tus caminos[b] y los caminos de tus hijos serán justificados, para que lleguen a ser un pueblo santo.
  rationale: Se trasladó la nota de ambigüedad al lugar correcto y se ajustó 'domines' a 'gobiernes' para mejorar la naturalidad del español manteniendo el posible sentido de autoridad. Se conservó el plural 'caminos' conforme a la revisión crítica documentada.
