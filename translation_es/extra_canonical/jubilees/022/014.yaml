base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/014.yaml
  text: Be strong before men[14], and while you rule among all the seed of Seth, then your ways and the ways of your sons will be justified, so that they may become a holy people.
  footnotes:
  - marker: '14'
    text: The wording is difficult. The Ge'ez explicitly says 'seed of Seth'; the clause about Jacob's status among them may also carry the sense of being exalted or ruling among humankind.
    reason: segmentation_note
  - marker: a
    text: Or 'your way and the way'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:25Z'
    unchanged: false
    changes_summary: Changed 'ways' to singular 'way' for both occurrences to better reflect the singular form and improve consistency; otherwise retained the draft.
translation:
  language: es
  text: Sé fuerte delante de los hombres, y mientras gobiernes[a] entre toda la descendencia de Set, entonces tus caminos[b] y los caminos de tus hijos serán justificados, para que lleguen a ser un pueblo santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El ge''ez es difícil: esta cláusula también puede dar la idea de ser exaltado o de ejercer dominio en medio de la humanidad. El texto dice explícitamente ''la descendencia de Set''.'
    reason: source_note
  - marker: b
    text: El testimonio textual revisado favorece el plural 'caminos' en ambos miembros, no el singular.
    reason: textual_variant
lexical_decisions:
- source_word: ኩን፡ ኃያለ፡
  english_pob_choice: Be strong
  chosen_spanish: Sé fuerte
  alternatives_spanish:
  - Ten fuerza
  - Mantente fuerte
  lexicon: Geez ኃያለ (strong, mighty)
  rationale: El imperativo pide fortaleza; en español natural y digno, 'sé fuerte' comunica bien el mandato sin añadir contenido ajeno.
- source_word: በቅድመ፡ ሰብእ፡
  english_pob_choice: before men
  chosen_spanish: delante de los hombres
  alternatives_spanish:
  - ante los hombres
  - en presencia de los hombres
  lexicon: Geez ቅድመ (before, in front of) + ሰብእ (men/humankind)
  rationale: '''Delante de'' expresa la relación espacial/social de manera clara y bíblica en español, sin volverla excesivamente literal.'
- source_word: ዘርአ፡ ሴት፡
  english_pob_choice: all the seed of Seth
  chosen_spanish: toda la descendencia de Set
  alternatives_spanish:
  - toda la simiente de Set
  - todos los descendientes de Set
  lexicon: Geez ዘርእ/ዘርአ (seed, offspring, descendants)
  rationale: '''Descendencia'' evita el arcaísmo de ''simiente'' y conserva el sentido genealógico. Se mantiene ''Set'' como nombre propio estándar en español.'
- source_word: ፍናዊከ፡ ወ*ፍናዊ፡ ውሉድከ፡
  english_pob_choice: your way and the ways of your sons
  chosen_spanish: tus caminos y los caminos de tus hijos
  alternatives_spanish:
  - tu camino y el camino de tus hijos
  - tus sendas y las sendas de tus hijos
  lexicon: Geez ፍናዊ (plural of 'way') + ውሉድ (children/sons)
  rationale: La revisión textual indica plural; por eso se traduce con plural en ambos miembros. 'Caminos' es idiomático y suficientemente amplio para conductas o maneras de vivir.
- source_word: ይጸድቃ፡
  english_pob_choice: will be justified
  chosen_spanish: serán justificados
  alternatives_spanish:
  - serán declarados justos
  - quedarán justificados
  lexicon: Geez ጽድቅ / ይጸድቃ (be justified, be made right)
  rationale: '''Justificados'' preserva la fuerza jurídica/relacional del verbo sin diluirlo en una mera mejora moral.'
- source_word: ሕዝብ፡ ቅዱስ፡
  english_pob_choice: a holy people
  chosen_spanish: un pueblo santo
  alternatives_spanish:
  - un pueblo consagrado
  - un pueblo sagrado
  lexicon: Geez ሕዝብ (people) + ቅዱስ (holy, set apart)
  rationale: '''Pueblo santo'' es la fórmula más directa y bíblicamente reconocible para una comunidad apartada para Dios.'
theological_decisions:
- issue: Lectura de 'before men' y posible idea de exaltación o dominio
  english_pob_reading: The wording is difficult... may also carry the sense of being exalted or ruling among humankind.
  chosen_spanish_reading: delante de los hombres... mientras domines entre toda la descendencia de Set
  alternative_spanish_readings:
  - ante los hombres... mientras seas exaltado entre toda la descendencia de Set
  - en medio de los hombres... mientras reinas entre toda la descendencia de Set
  rationale: La frase española conserva la doble posibilidad de presencia pública y dominio/autoridad mediante 'mientras domines', sin escoger una paráfrasis más fuerte que la evidencia.
  doctrine_reference: Sabiduría bíblica / lenguaje de bendición y liderazgo
- issue: Forma plural de 'ways' y consistencia con la revisión crítica
  english_pob_reading: your ways and the ways of your sons
  chosen_spanish_reading: tus caminos y los caminos de tus hijos
  alternative_spanish_readings:
  - tu camino y el camino de tus hijos
  rationale: La evidencia revisada del ge'ez favorece el plural; la traducción lo respeta para no borrar la decisión textual documentada.
  doctrine_reference: Crítica textual / fidelidad al plural del original
- issue: '''Justified'' aplicado a caminos y descendencia'
  english_pob_reading: your ways ... will be justified
  chosen_spanish_reading: serán justificados
  alternative_spanish_readings:
  - serán declarados justos
  - quedarán vindicados
  rationale: '''Justificados'' permite mantener la tensión entre rectitud, vindicación y aprobación divina sin escoger un equivalente más interpretativo.'
  doctrine_reference: Justicia / vindicación divina
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión que corrigió el singular al plural en 'ways'/'caminos'. Por eso se refleja el plural en ambas ocurrencias y se evita seguir la lectura singular descartada. También conserva la nota de dificultad sobre la frase inicial, sin resolverla de manera excesiva.
  spanish_consistency_notes:
  - Se usa 'Yahvé' únicamente cuando el texto lo requiera; aquí no aparece.
  - '''Set'' se conserva como forma breve y estándar del nombre propio en español.'
  - '''Justificados'' mantiene el lenguaje forense/relacional del original sin convertirlo en moralismo genérico.'
  - Se prefiere 'caminos' para 'ways' por claridad, manteniendo el paralelismo entre la descendencia y sus conductas.
