lexical_decisions:
- source_word: ሰይፈ፡ ጸላኢ፡
  english_pob_choice: the sword of the adversary
  chosen_spanish: la espada del adversario
  alternatives_spanish:
  - la espada del enemigo
  - la espada del opresor
  lexicon: սword/espada; adversary/enemy
  rationale: Conservo la imagen concreta de 'espada' y traduzco ጸላኢ con 'adversario' para mantener el matiz personal y hostil del término sin intensificarlo innecesariamente.
- source_word: ኢሞአኒ፡
  english_pob_choice: has not overcome me
  chosen_spanish: no me ha vencido
  alternatives_spanish:
  - no me ha derrotado
  - no me ha superado
  lexicon: overcome/vencer
  rationale: '''Vencer'' transmite bien la idea de prevalecer o someter en español bíblico claro, preservando el sentido verbal de victoria sobre una persona.'
- source_word: በኵሉ፡ ዘወሀብከኒ፡
  english_pob_choice: in all that you have given me
  chosen_spanish: en todo lo que me has dado
  alternatives_spanish:
  - en todo cuanto me has dado
  - en todo lo que me concediste
  lexicon: all that / given
  rationale: Sigo de cerca la cláusula original y la redacción inglesa revisada, manteniendo el alcance total de lo dado sin añadir especificaciones.
- source_word: ወለውሉድየ፡
  english_pob_choice: and my children
  chosen_spanish: a mí y a mis hijos
  alternatives_spanish:
  - y a mis hijos
  - para mí y para mis hijos
  lexicon: my children
  rationale: El ge'ez vincula el don tanto al hablante como a su descendencia; por eso conservo explícitamente 'a mí y a mis hijos' para reflejar la estructura inclusiva del enunciado.
- source_word: መዋዕለ፡ ሕይወትየ፡
  english_pob_choice: all the days of my life
  chosen_spanish: todos los días de mi vida
  alternatives_spanish:
  - durante todos los días de mi vida
  - en todos los días de mi vida
  lexicon: days of my life
  rationale: Esta expresión temporal idiomática se traduce de manera natural y fiel en español con la fórmula establecida 'todos los días de mi vida'.
- source_word: እስከ፡ ዛቲ፡ ዕለት።
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: until this day
  rationale: '''Hasta este día'' conserva la deíxis del original y coincide con el registro formal de la traducción inglesa.'
theological_decisions:
- issue: El sujeto implícito de 'has not overcome me' y su fuerza de protección divina en el contexto
  english_pob_reading: The sword of the adversary has not overcome me in all that you have given me and my children all the days of my life until this day.
  chosen_spanish_reading: La espada del adversario no me ha vencido en todo lo que me has dado, a mí y a mis hijos, todos los días de mi vida, hasta este día.
  alternative_spanish_readings:
  - La espada del adversario no ha podido contra mí...
  - La espada del adversario no me ha derrotado...
  rationale: Mantengo la formulación directa del hecho de no haber sido vencido, sin explicitar más de lo que el texto permite. La protección implícita recae en el hablante como testimonio de preservación, no en una paráfrasis doctrinal.
  doctrine_reference: Providencia divina y preservación histórica del hablante; sin formulación dogmática adicional.
translation_notes:
  revision_awareness: El inglés auditado fue suavemente estilizado en la revisión ('given me' y 'and my children'), pero el sentido no cambió. La versión española sigue esa forma final revisada y conserva la sintaxis de beneficio sin depender de la redacción previa más literal.
  spanish_consistency_notes:
  - Se mantiene 'adversario' para ጸላኢ, coherente con un enemigo personal o activo.
  - Se usa 'vencido' en lugar de 'derrotado' para reflejar mejor el matiz de prevalecer sobre alguien.
  - No se introduce 'SEÑOR' ni 'Cristo'; el pasaje no lo requiere.
  - La puntuación separa con comas los complementos extensos para claridad, sin alterar la relación sintáctica del original.
