lexical_decisions:
- source_word: ወአኅለቀ
  english_pob_choice: And he finished
  chosen_spanish: Y terminó
  alternatives_spanish:
  - Y acabó
  - Y dio fin
  lexicon: Geez verbal construction of completion
  rationale: El verbo expresa conclusión de una acción; «terminó» comunica naturalmente el cierre del proceso sin añadir matices no respaldados por el texto.
- source_word: ይኤዝዞ
  english_pob_choice: commanding
  chosen_spanish: de mandarle
  alternatives_spanish:
  - de ordenarle
  - de darle instrucciones
  lexicon: Geez imperative/command sense
  rationale: La forma verbal sostiene la idea de dar una orden o mandato. «Mandarle» conserva el valor directivo de manera fluida en español y mantiene el objeto implícito sin sobrecargar el verso.
- source_word: ይባርኮ
  english_pob_choice: blessing him
  chosen_spanish: y de bendecirle
  alternatives_spanish:
  - y de bendecirlo
  - y de bendecir a él
  lexicon: Geez bless/benediction sense
  rationale: «Bendecirle» preserva el sentido de acción benevolente dirigida a una persona; se mantiene el paralelismo con «mandarle» y el registro bíblico natural en español.
theological_decisions:
- issue: Objeto implícito en «commanding»
  english_pob_reading: he finished commanding and blessing him
  chosen_spanish_reading: Y terminó de mandarle y de bendecirle
  alternative_spanish_readings:
  - Y terminó de mandarlo y bendecirlo
  - Y terminó mandándole y bendiciéndole
  rationale: El texto ge'ez, según la revisión inglesa, no exige repetir un objeto explícito para ambos verbos. En español, la construcción con infinitivo y pronombre enclítico refleja bien la dependencia verbal y evita introducir una duplicación no atestiguada.
  doctrine_reference: Fidelidad semántica al sintagma verbal; sin implicación doctrinal específica
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el objeto extra de «commanding him» para reflejar mejor la construcción original, manteniendo el sentido de la frase. La propuesta española sigue ese ajuste y evita duplicar innecesariamente el complemento.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible para lectura pública.
  - Se evita «Señor» o formulaciones litúrgicas ajenas, porque aquí no aparece el nombre divino ni un título que requiera sustitución terminológica.
  - «Mandarle» se usa en sentido de dar mandato, no como simple envío.
