base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/001.yaml
  text: And it came to pass in the first week[1], in the forty-fourth jubilee, in the second year of that week—the year in which Abraham died—that Isaac and Ishmael came from the Well of the Oath to celebrate the Feast of Weeks, this feast of the firstfruits of the harvest, with Abraham their father.
  footnotes:
  - marker: '1'
    text: 'The opening chronology is literal: ''in the first week, in the forty-second jubilee, in the second year.'' Jubilees regularly dates events by jubilees and weeks of years; this should not be simplified away.'
    reason: cross_reference
  - marker: a
    text: Or 'forty-second'.
    reason: previous_rendering
  - marker: b
    text: Or 'that first feast of the harvest'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:23Z'
    unchanged: false
    changes_summary: 'Made minor stylistic revisions: removed the unnecessary comma after ''Oath'' for smoother English, and capitalized ''Feast of Weeks'' as a festival name. No substantive translation changes.'
translation:
  language: es
  text: Y aconteció en la primera semana[a], en el cuadragésimo cuarto jubileo, en el segundo año de aquella semana —el año en que murió Abraham—, que Isaac e Ismael vinieron desde el Pozo del Juramento para celebrar la Fiesta de las Semanas, esta fiesta de las primicias de la cosecha, con Abraham su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cronología de Jubileos se expresa por semanas de años y jubileos; no se ha simplificado la datación.
    reason: cross_reference
lexical_decisions:
- source_word: בְּשֻׁבָעֵי / first week
  english_pob_choice: in the first week
  chosen_spanish: en la primera semana
  alternatives_spanish:
  - en la semana primera
  - en la primera semana de años
  lexicon: n/a
  rationale: Conservo la cronología característica de Jubileos con «semana» para years-weeks; «primera semana» es natural en español y mantiene la estructura técnica sin suavizarla.
- source_word: אַרְבָּעִים וְאַרְבַּע / forty-fourth jubilee
  english_pob_choice: forty-fourth jubilee
  chosen_spanish: en el cuadragésimo cuarto jubileo
  alternatives_spanish:
  - en el jubileo cuarenta y cuatro
  - en el 44.º jubileo
  lexicon: n/a
  rationale: La revisión crítica corrigió el número a cuarenta y cuatro; «cuadragésimo cuarto» es la forma más digna y clara en español para un dato cronológico formal.
- source_word: אֵבֶל / feast of Weeks
  english_pob_choice: Feast of Weeks
  chosen_spanish: Fiesta de las Semanas
  alternatives_spanish:
  - Fiesta de las semanas
  - Fiesta de Pentecostés
  lexicon: n/a
  rationale: «Fiesta de las Semanas» conserva el nombre bíblico y evita introducir el nombre eclesial «Pentecostés», que no está en el texto ni en la tradición terminológica preferida aquí.
- source_word: firstfruits of the harvest
  english_pob_choice: this first feast of the harvest
  chosen_spanish: esta fiesta de las primicias de la cosecha
  alternatives_spanish:
  - esta primera fiesta de la cosecha
  - esta fiesta de los primeros frutos de la cosecha
  lexicon: n/a
  rationale: La revisión indica que Ge'ez apunta a «primicias»; en español, «primicias de la cosecha» expresa el sentido técnico y litúrgico con claridad, y «esta» sigue el demostrativo del texto fuente.
- source_word: Well of the Oath
  english_pob_choice: Well of the Oath
  chosen_spanish: Pozo del Juramento
  alternatives_spanish:
  - Pozo del Pacto
  - Pozo del Juramento solemnizado
  lexicon: n/a
  rationale: «Well» se traduce naturalmente como «Pozo»; «Oath» como «Juramento» mantiene el vínculo con el nombre propio bíblico del lugar sin interpretarlo como pacto.
theological_decisions:
- issue: Cronología jubilar específica y no simplificada
  english_pob_reading: 'The opening chronology is literal: ''in the first week, in the forty-fourth jubilee, in the second year.'' Jubilees regularly dates events by jubilees and weeks of years; this should not be simplified away.'
  chosen_spanish_reading: Conservé «en la primera semana» y «en el cuadragésimo cuarto jubileo» sin normalizar la cronología.
  alternative_spanish_readings:
  - en el año segundo
  - en la segunda semana
  rationale: El texto de Jubileos usa un sistema técnico de datación; la traducción debe preservar esa estructura para que el lector pueda auditar la secuencia histórica y no perder la lógica interna del libro.
  doctrine_reference: N/A
- issue: Nombre festivo y referencia a primicias
  english_pob_reading: Feast of Weeks, this first feast of the harvest
  chosen_spanish_reading: Fiesta de las Semanas, esta fiesta de las primicias de la cosecha
  alternative_spanish_readings:
  - Pentecostés, esta primera fiesta de la cosecha
  - Fiesta de las Semanas, aquella primera fiesta de la cosecha
  rationale: La fuente distingue el nombre de la fiesta y su carácter como primicias; la traducción debe mantener ambas dimensiones sin sustituirlas por un término litúrgico posterior no requerido por el texto.
  doctrine_reference: Levítico 23:15-21; Éxodo 23:16
- issue: Posible ambigüedad del demostrativo
  english_pob_reading: this feast of the firstfruits of the harvest
  chosen_spanish_reading: esta fiesta de las primicias de la cosecha
  alternative_spanish_readings:
  - aquella fiesta de las primicias de la cosecha
  rationale: La revisión textual favorece «this»; en español, «esta» refleja mejor la proximidad discursiva del original y la lectura revisada.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica principal del audit trail: el número es «cuadragésimo cuarto» (no «cuadragésimo segundo»). También se adoptó la revisión que precisa «primicias de la cosecha» y el demostrativo «esta». La mayúscula en el nombre de la fiesta sigue el uso de nombre festivo en español.'
  spanish_consistency_notes:
  - Mantengo «Yahvé» como forma por defecto en el proyecto, pero en este versículo no aparece el nombre divino.
  - Uso «Pozo del Juramento» como topónimo transparente y consistente con la tradición del pasaje.
  - Conservo «Fiesta de las Semanas» para evitar confundir el nombre bíblico con un equivalente eclesial posterior.
  - «Primicias» se usa en sentido técnico agrícola y cultual, no como simple ‘primeros frutos’ literales.
