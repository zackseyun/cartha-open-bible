base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/018.yaml
  text: And you, my son Jacob, remember my words and keep the commandments of Abraham your father. Separate yourself from the nations, and do not eat with them, and do not act according to their deeds, and do not become their companion; for their deeds are unclean, and all their ways are defilement and abomination and uncleanness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:27Z'
    unchanged: false
    changes_summary: Changed 'defiled' to 'unclean' for a more natural predicate adjective matching ርኩስ, and adjusted 'pollution' to 'defilement' for a more formal and idiomatic rendering of the list of impurities.
translation:
  language: es
  text: Y tú también, hijo mío Jacob, recuerda mis palabras y guarda los mandamientos de Abraham tu padre. Sepárate[a] de las naciones, y no comas con ellas, y no obres conforme a sus obras, y no te hagas su compañero; porque sus obras son impuras, y todos sus caminos son contaminación, abominación e inmundicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sepárate» traduce la idea de apartarse con fuerza reflexiva; también puede entenderse como «apártate».
    reason: alternative_reading
lexical_decisions:
- source_word: ተዘከር፡ ቃለየ፡
  english_pob_choice: remember my words
  chosen_spanish: recuerda mis palabras
  alternatives_spanish:
  - acuérdate de mis palabras
  - recuerda lo que te he dicho
  lexicon: זכר / ἀναμιμνῄσκω (remember)
  rationale: «Recuerda» mantiene el imperativo directo y la memoria obediente; «mis palabras» sigue de cerca el objeto del original sin añadir matices ajenos.
- source_word: ወዕቀብ፡ ትእዛዛተ፡ አብርሃም፡ አቡከ፡
  english_pob_choice: keep the commandments of Abraham your father
  chosen_spanish: guarda los mandamientos de Abraham tu padre
  alternatives_spanish:
  - observa los mandamientos de Abraham tu padre
  - cumple los mandamientos de Abraham tu padre
  lexicon: שמר / τηρέω (keep, guard)
  rationale: «Guarda» preserva la idea de custodiar y obedecer; «mandamientos» traduce con naturalidad «commandments» sin atenuar el carácter normativo.
- source_word: ተፈለጥ፡ እምአሕዛብ፡
  english_pob_choice: Separate yourself from the nations
  chosen_spanish: Sepárate de las naciones
  alternatives_spanish:
  - apártate de las naciones
  - aléjate de las naciones
  lexicon: בדל / χωρίζω (separate, set apart)
  rationale: «Sepárate» refleja una acción reflexiva y concreta; «las naciones» conserva el sentido étnico-covenantal del término sin suavizarlo a «gente» o «paganos».
- source_word: ወኢትብላዕ፡ ምስሌሆሙ፡
  english_pob_choice: do not eat with them
  chosen_spanish: no comas con ellas
  alternatives_spanish:
  - no comas junto con ellas
  - no participes de su mesa
  lexicon: אכל / ἐσθίω (eat)
  rationale: «Con ellas» es la forma más directa y natural en español; mantiene la prohibición de mesa compartida sin introducir una explicitación no presente en el texto.
- source_word: ወኢትግበር፡ በከመ፡ ምግባሪሆሙ፡
  english_pob_choice: do not act according to their deeds
  chosen_spanish: no obres conforme a sus obras
  alternatives_spanish:
  - no actúes conforme a sus obras
  - no hagas como ellos hacen
  lexicon: עשה / ποιέω (do, act)
  rationale: «Obres» conserva el valor ético de conducta habitual; «conforme a sus obras» sigue la estructura del original y de la versión inglesa auditable.
- source_word: ወኢትኩኖሙ፡ ቢጸ፡
  english_pob_choice: do not become their companion
  chosen_spanish: no te hagas su compañero
  alternatives_spanish:
  - no te unas a ellos
  - no seas su compañero
  lexicon: חבר / σύντροφος (companion, associate)
  rationale: «No te hagas su compañero» refleja bien el verbo de devenir y conserva la relación personal de asociación; «compañero» es suficientemente fuerte sin suavizar a mera amistad.
- source_word: ግብሮሙ፡ ርኩስ፡
  english_pob_choice: their deeds are unclean
  chosen_spanish: sus obras son impuras
  alternatives_spanish:
  - sus obras son inmundas
  - sus obras son impuras e inmundas
  lexicon: טמא / ἀκάθαρτος (unclean, impure)
  rationale: Se eligió «impuras» como adjetivo natural en español para ርኩስ, en línea con la revisión inglesa que prefirió «unclean» frente a «defiled».
- source_word: ወኵሉ፡ ፍናዊሆሙ፡ ጐግኒ፡ ወምናኔ፡ ወስቆራር።
  english_pob_choice: all their ways are defilement and abomination and uncleanness
  chosen_spanish: todos sus caminos son contaminación, abominación e inmundicia
  alternatives_spanish:
  - todos sus caminos son defilement, abominación e inmundicia
  - todos sus caminos son impureza, abominación e inmundicia
  lexicon: דרך / ὁδός (way)
  rationale: «Caminos» reproduce la metáfora conductual; «contaminación» traduce el primer término de la lista con un sustantivo formal y auditable, y se conserva la acumulación retórica de términos de impureza como en el original y en la POB inglesa.
theological_decisions:
- issue: Separación de las naciones como señal de fidelidad del pacto
  english_pob_reading: Separate yourself from the nations
  chosen_spanish_reading: Sepárate de las naciones
  alternative_spanish_readings:
  - apártate de las naciones
  - hazte distinto de las naciones
  rationale: La formulación mantiene la exigencia de distinción comunitaria y ritual sin convertirla en una generalización antietnica moderna. El texto habla de separación de prácticas y asociaciones, no de superioridad moral étnica.
  doctrine_reference: Santidad del pueblo del pacto; distinción comunitaria en la tradición de Génesis/Jubileos.
- issue: 'Cadena de impureza: impuro / contaminación / abominación / inmundicia'
  english_pob_reading: their deeds are unclean, and all their ways are defilement and abomination and uncleanness
  chosen_spanish_reading: sus obras son impuras, y todos sus caminos son contaminación, abominación e inmundicia
  alternative_spanish_readings:
  - sus obras son inmundas, y todos sus caminos son impureza, abominación e inmundicia
  - sus obras son impuras, y todos sus caminos son defilement, abominación e inmundicia
  rationale: Se preserva la acumulación semántica de términos de pureza ritual/moral sin colapsarlos en un solo equivalente. «Impuras» funciona como predicado; la lista final mantiene un registro léxico elevado y evita borrar la tensión entre contaminación, abominación e inmundicia.
  doctrine_reference: Lenguaje bíblico de pureza e impureza; Levítico 11–15; marco de santidad.
translation_notes:
  revision_awareness: 'La redacción inglesa más reciente cambió «defiled» por «unclean» y «pollution» por «defilement» para ajustarse mejor al valor natural de ርኩስ y al registro de impureza. La versión española sigue esa revisión: usa un predicado natural («impuras») y conserva una lista nominal formal («contaminación, abominación e inmundicia») sin sustituirla por lenguaje más explicativo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparezca el Tetragrámaton; aquí no hay referencia directa, por lo que no se introduce.
  - «Naciones» se conserva para reflejar el contraste del texto con el grupo del pacto.
  - Se evita «siervo» porque el original no contiene δοῦλος ni un equivalente de servicio personal, sino separación y conducta.
  - El cierre retiene la triple acumulación de impureza para no suavizar la intensidad del original.
