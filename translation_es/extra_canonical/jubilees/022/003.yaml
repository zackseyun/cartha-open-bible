translation:
  language: es
  text: Porque Isaac tenía muchas posesiones en Beerseba, e iba a ver sus posesiones y volvía a su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ብዙኅ ጥሪቱ
  english_pob_choice: many possessions
  chosen_spanish: muchas posesiones
  alternatives_spanish:
  - muchos bienes
  - gran hacienda
  lexicon: Ge'ez ጥሪት
  rationale: El sustantivo indica bienes/posesiones materiales; en español «posesiones» conserva el sentido concreto sin añadir una lectura más técnica o eclesiástica. «Bienes» es posible, pero «posesiones» sigue de cerca la fuerza léxica del texto fuente y del inglés auditado.
- source_word: የሐውር
  english_pob_choice: would go
  chosen_spanish: iba
  alternatives_spanish:
  - solía ir
  - iría
  lexicon: Ge'ez verbal imperfect habitual
  rationale: El imperfecto ge'ez expresa acción repetida o habitual en pasado. «Iba» reproduce bien esa habitualidad en español natural y evita un futuro de matiz inadecuado.
- source_word: ይስሐቅ ... ይዋሑ ጥሪተ
  english_pob_choice: Isaac would go and look at his possessions
  chosen_spanish: Isaac iba y miraba sus posesiones
  alternatives_spanish:
  - Isaac iba a ver sus posesiones
  - Isaac iba y contemplaba sus posesiones
  lexicon: Ge'ez verb of seeing/looking
  rationale: El texto revisado y la auditoría inglesa corrigen la lectura errónea de un banquete; el verbo significa mirar/ver. «Miraba» es claro, sobrio y compatible con el aspecto habitual del original.
- source_word: ይገብእ ኀበ አቡሁ
  english_pob_choice: return to his father
  chosen_spanish: volvía a su padre
  alternatives_spanish:
  - regresaba a su padre
  - volvía junto a su padre
  lexicon: Ge'ez imperfect + motion back to father
  rationale: El ge'ez expresa retorno habitual. «Volvía» conserva el aspecto imperfectivo y es idiomático en español. «A su padre» sigue el texto sin expandir innecesariamente la relación espacial.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una lectura errónea ('prepared a feast and brought it to his father') a la lectura fuente 'would go and look at his possessions and return to his father'. La redacción española sigue la lectura corregida y evita la glosa descartada.
  spanish_consistency_notes:
  - Se mantiene el nombre geográfico «Beer-seba» como forma transliterada estable.
  - Se conserva la repetición de «Isaac» para reflejar el paralelismo del original y del inglés auditado.
  - No se añadió ninguna nota de pie porque no hay variantes textuales o alternativas teológicas que requieran anclaje explícito en el verso.
