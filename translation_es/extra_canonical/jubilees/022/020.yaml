base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/020.yaml
  text: They have no heart to understand, and their eyes do not see what they have made, and how they go astray when they say to wood, ‘You are my god,’ and to stone, ‘You are my lord and my deliverer.’ And they have no heart.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:27Z'
    unchanged: false
    changes_summary: Changed ‘what their works are’ to ‘what they have made’ for more natural and accurate rendering of the source; smoothed punctuation in the final idol-address clause by removing the extra repeated ‘you are.’
translation:
  language: es
  text: 'No tienen corazón para entender, y sus ojos no ven lo que han hecho, y cómo se extravían cuando dicen a la madera: «Tú eres mi dios», y a la piedra: «Tú eres mi señor y mi libertador». Y no tienen corazón.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ልበ፡ ለሐልዮ
  english_pob_choice: no heart to understand
  chosen_spanish: no tienen corazón para entender
  alternatives_spanish:
  - no tienen mente para entender
  - no tienen entendimiento para comprender
  lexicon: corazón; entender
  rationale: El ge’ez usa «corazón» como sede de pensamiento, intención y discernimiento. En español, «no tienen corazón para entender» conserva esa fuerza semítica sin volverla una paráfrasis abstracta.
- source_word: አዕይንቲሆሙ፡ ዘይሬኢ፡
  english_pob_choice: their eyes do not see
  chosen_spanish: sus ojos no ven
  alternatives_spanish:
  - sus ojos no perciben
  - sus ojos no miran
  lexicon: ojos; ver
  rationale: La imagen es visual y directa; «ver» reproduce la negación de percepción del original sin añadir matices interpretativos.
- source_word: ምንተ፡ ገብሮሙ
  english_pob_choice: what they have made
  chosen_spanish: lo que han hecho
  alternatives_spanish:
  - lo que han fabricado
  - sus obras
  lexicon: hacer; fabricar
  rationale: La revisión inglesa corrigió «what their works are» a «what they have made». En español, «lo que han hecho» es natural y fiel; «sus obras» sería demasiado interpretativo en este contexto.
- source_word: ይስኅቱ
  english_pob_choice: they go astray
  chosen_spanish: se extravían
  alternatives_spanish:
  - se desvían
  - andan errados
  lexicon: errar; extraviarse
  rationale: «Se extravían» comunica la idea de desviación y error sin exagerar la carga doctrinal; mantiene el movimiento de apartarse al hablar a los ídolos.
- source_word: ወለዕፅ
  english_pob_choice: to wood
  chosen_spanish: al árbol
  alternatives_spanish:
  - a la madera
  - al leño
  lexicon: árbol; madera
  rationale: El sustantivo ge’ez puede referir material leñoso o árbol; «al árbol» sigue la formulación española más natural para el objeto idolátrico, preservando la imagen concreta del texto.
- source_word: አምላኪየ
  english_pob_choice: my god
  chosen_spanish: mi dios
  alternatives_spanish:
  - mi Dios
  - mi deidad
  lexicon: Dios
  rationale: La frase refleja la proclamación idolátrica literal; «mi dios» conserva el valor exacto y evita mayúscula reverencial inapropiada en la boca del ídolo.
- source_word: ወለእብን
  english_pob_choice: to stone
  chosen_spanish: a la piedra
  alternatives_spanish:
  - al pedernal
  - a una roca
  lexicon: piedra
  rationale: «Piedra» es la equivalencia directa y clara para el paralelo con «wood»; no hace falta especificar un tipo de roca.
- source_word: እግዚእየ
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi soberano
  - mi dueño
  lexicon: señor
  rationale: El contexto es idolátrico y formulaico; «mi señor» conserva la relación de dominio sin introducir terminología eclesiástica más cargada.
- source_word: መባሕሕየ
  english_pob_choice: my deliverer
  chosen_spanish: mi libertador
  alternatives_spanish:
  - mi salvador
  - mi redentor
  lexicon: libertador
  rationale: «Libertador» reproduce la idea de uno que rescata o libera, y evita sobrecargar el término con posibles resonancias doctrinales no explicitadas por el texto.
- source_word: ወአሀቡ፡ ሎሙ፡ ልብ
  english_pob_choice: And they have no heart.
  chosen_spanish: Y no tienen corazón.
  alternatives_spanish:
  - Y carecen de corazón.
  - Y no tienen entendimiento.
  lexicon: corazón
  rationale: Se conserva la repetición final del miembro semítico para mantener el énfasis retórico del original, tal como refleja la versión inglesa.
theological_decisions:
- issue: Antropología del “corazón” como sede del entendimiento
  english_pob_reading: They have no heart to understand ... And they have no heart.
  chosen_spanish_reading: No tienen corazón para entender ... Y no tienen corazón.
  alternative_spanish_readings:
  - No tienen entendimiento para comprender ...
  - No tienen mente para entender ...
  rationale: El texto repite «corazón» para subrayar la ceguera interior, no solo la incapacidad intelectual. Mantenerlo en español preserva la tensión semítica y el énfasis retórico del pasaje.
  doctrine_reference: Antropología bíblica; lenguaje semítico del corazón como centro de pensamiento y voluntad
- issue: Referencia idolátrica directa a madera y piedra
  english_pob_reading: when they say to wood, ‘You are my god,’ and to stone, ‘You are my lord and my deliverer.’
  chosen_spanish_reading: 'cuando dicen al árbol: «Tú eres mi dios», y a la piedra: «Tú eres mi señor y mi libertador»'
  alternative_spanish_readings:
  - 'cuando dicen a la madera: «Tú eres mi dios»'
  - 'cuando dicen al leño: «Tú eres mi dios»'
  rationale: Se conserva la interpelación directa al objeto inanimado para no suavizar la ironía idolátrica ni convertirla en una explicación abstracta.
  doctrine_reference: Crítica profética de la idolatría; exclusividad de Dios frente a ídolos inertes
translation_notes:
  revision_awareness: The Spanish draft follows the latest revision pass that corrected the middle clause to refer to what they have made rather than their works, and it preserves the smoothed final idol-address clause with a single natural rendering of the repeated address.
  spanish_consistency_notes:
  - Usé «Yahvé» no porque aparezca en este versículo, sino como project default only when the divine name is explicit; aquí no corresponde.
  - Mantuve «mi señor» en minúscula por tratarse de una voz idolátrica, no de un título reverencial.
  - Elegí «al árbol» siguiendo el source's wood/tree ambiguity in a natural Spanish form; this keeps the concrete idol image without over-specifying the material.
