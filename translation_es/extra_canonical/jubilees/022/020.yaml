    rationale: 'El original y el inglés coordinan de forma aditiva: no ven lo que han hecho, y no ven cómo se extravían. «Ni» puede sonar a reestructuración negativa no necesaria; «y cómo» reproduce mejor la secuencia.'
  revised_spanish_text: 'No tienen corazón para entender, y sus ojos no ven lo que han hecho, y cómo se extravían cuando dicen a la madera: «Tú eres mi dios», y a la piedra: «Tú eres mi señor y mi libertador». Y no tienen corazón.'
