revisions:
- from: Y comió y bebió, y bendijo al Dios Altísimo, que creó el cielo y la tierra, que hizo todo el fruto de la tierra, y se lo dio a los hijos de los hombres para que comieran, bebieran y bendijeran a su Creador.
  to: Y comió y bebió, y bendijo al Dios Altísimo, que creó el cielo y la tierra, que hizo todo lo que produce la tierra, y se lo dio a los hijos de los hombres para comer, beber y bendecir a su Creador.
  rationale: Se ajustó 'todo el fruto de la tierra' a 'todo lo que produce la tierra' para reflejar con más naturalidad y amplitud el sentido de 'produce of the earth' documentado en la auditoría inglesa. También se simplificó la cláusula final a una serie infinitiva ('para comer, beber y bendecir') para expresar mejor la finalidad general del don divino en español claro y formal. No se requieren notas.
