base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/007.yaml
  text: And he ate and drank, and blessed the Most High God, who created heaven and earth, who made all the produce of the earth, and gave it to the children of men to eat and drink and bless their Creator.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:24Z'
    unchanged: false
    changes_summary: Changed 'fatness of the earth' to 'produce of the earth' for more natural and contextually fitting English; removed repeated 'to' before coordinated infinitives for smoother formal style.
translation:
  language: es
  text: Y comió y bebió, y bendijo al Dios Altísimo, que creó el cielo y la tierra, que hizo todo lo que produce la tierra, y se lo dio a los hijos de los hombres para comer, beber y bendecir a su Creador.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበልዐ፡ ወሰትየ፡
  english_pob_choice: And he ate and drank
  chosen_spanish: Y comió y bebió
  alternatives_spanish:
  - Y comió y tomó
  - Y comió y bebió de ello
  lexicon: n/a
  rationale: La pareja verbal simple reproduce con naturalidad el paralelismo breve del ge'ez y del inglés auditado, sin añadir un objeto no expresado en el texto.
- source_word: ወባረኮ፡
  english_pob_choice: and blessed
  chosen_spanish: y bendijo
  alternatives_spanish:
  - y alabó
  - y dio bendición
  lexicon: n/a
  rationale: ‘Bendijo’ conserva el valor de pronunciar una bendición sobre Dios, que es el sentido reflejado en el contexto inmediato y en la versión inglesa.
- source_word: ለአምላክ፡ ልዑል፡
  english_pob_choice: the Most High God
  chosen_spanish: al Dios Altísimo
  alternatives_spanish:
  - al Dios Supremo
  - al Altísimo Dios
  lexicon: n/a
  rationale: ‘Dios Altísimo’ es la forma española más transparente y reverente para el epíteto, manteniendo la construcción teológica del original sin convertirlo en un título difuso.
- source_word: ዘፈጠረ፡ ሰማየ፡ ወምድረ፡
  english_pob_choice: who created heaven and earth
  chosen_spanish: que creó el cielo y la tierra
  alternatives_spanish:
  - que hizo el cielo y la tierra
  - que creó los cielos y la tierra
  lexicon: n/a
  rationale: ‘Creó el cielo y la tierra’ sigue el lenguaje bíblico estándar y refleja con fidelidad el acto creador atribuido a Dios.
- source_word: ዘገብረ፡ ኵሎ፡ ስብሐ፡ ምድር፡
  english_pob_choice: who made all the produce of the earth
  chosen_spanish: que hizo todo el fruto de la tierra
  alternatives_spanish:
  - que hizo toda la producción de la tierra
  - que hizo todo lo producido por la tierra
  lexicon: n/a
  rationale: La revisión inglesa escogió ‘produce of the earth’ para evitar ‘fatness’; en español, ‘fruto de la tierra’ comunica de forma natural el sentido de lo que la tierra produce, sin perder la idea de provisión creada.
- source_word: ወወሀቦሙ፡ ለውሉደ፡ ሰብእ፡
  english_pob_choice: and gave it to the children of men
  chosen_spanish: y se lo dio a los hijos de los hombres
  alternatives_spanish:
  - y lo dio a los hijos de los hombres
  - y se lo dio a la humanidad
  lexicon: n/a
  rationale: ‘Hijos de los hombres’ conserva la expresión heredada del texto fuente y la fórmula bíblica, que la edición inglesa también mantiene.
- source_word: ይብልዑ፡ ወይስተዩ፡ ወይባርኩ፡ ፈጣሪሆሙ።
  english_pob_choice: to eat and drink and bless their Creator
  chosen_spanish: para que comieran, bebieran y bendijeran a su Creador
  alternatives_spanish:
  - para comer, beber y bendecir a su Creador
  - para que coman, beban y bendigan a su Creador
  lexicon: n/a
  rationale: La subordinación final expresa con claridad el propósito dado por Dios. ‘Su Creador’ sigue el posesivo del original y evita interpretar el texto de manera más específica que la fuente.
theological_decisions:
- issue: Epíteto divino 'Most High God'
  english_pob_reading: the Most High God
  chosen_spanish_reading: el Dios Altísimo
  alternative_spanish_readings:
  - el Dios Supremo
  - el Altísimo Dios
  rationale: Se conserva el título elevado de Dios sin sustituirlo por una fórmula litúrgica distinta. ‘Altísimo’ comunica el rango supremo de Dios y mantiene la resonancia bíblica del epíteto.
  doctrine_reference: Nombres y títulos divinos en traducción bíblica; fidelidad al epíteto del texto.
- issue: Finalidad de la comida y la bebida como acto de adoración
  english_pob_reading: to eat and drink and bless their Creator
  chosen_spanish_reading: para que comieran, bebieran y bendijeran a su Creador
  alternative_spanish_readings:
  - para comer, beber y bendecir a su Creador
  - para que coman, beban y bendigan a su Creador
  rationale: 'La cláusula final conserva el propósito explícito: los seres humanos reciben la provisión para participar de ella y responder con bendición al Creador. No se añade una explicación doctrinal ajena al enunciado.'
  doctrine_reference: Providencia creadora y respuesta de bendición; teología de la creación.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó ‘fatness of the earth’ por ‘produce of the earth’ y eliminó una repetición innecesaria de ‘to’. La redacción española sigue esa lectura revisada con una solución natural (‘fruto de la tierra’) y mantiene la coordinación final limpia sin repetición de preposición.
  spanish_consistency_notes:
  - Se mantiene ‘Dios Altísimo’ para el epíteto divino, coherente con el uso de ‘Dios’ en lugar de un sustituto reverencial.
  - ‘Creador’ conserva la relación posesiva del original y la formulación de la versión inglesa auditada.
  - No se introducen notas textuales porque el paquete no documenta variantes relevantes en este versículo.
