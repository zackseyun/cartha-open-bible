translation:
  language: es
  text: Mi Dios, que tu misericordia y tu paz[a] estén sobre tu siervo y sobre la descendencia de sus hijos, para que sean para ti un pueblo escogido y una heredad de entre todas las naciones de la tierra, desde ahora y por todos los días de las generaciones de la tierra, por todos los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tu misericordia y tu paz».'
    reason: previous_rendering
lexical_decisions:
- source_word: አምላኪየ
  english_pob_choice: My God
  chosen_spanish: Mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: vocative divine address
  rationale: El ge'ez expresa una invocación directa a Dios; en español, 'Mi Dios' conserva el vocativo y el posesivo afectivo sin introducir una formulación litúrgica ajena al texto.
- source_word: ሣህልከ
  english_pob_choice: your mercy
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu favor
  - tu bondad
  lexicon: חסד / mercy-like covenant mercy sense
  rationale: La base semántica apunta a la misericordia/favor divino. 'Misericordia' es la opción más natural y fiel en español, manteniendo la amplitud de un favor compasivo.
- source_word: ወሰላምከ
  english_pob_choice: your peace
  chosen_spanish: tu paz
  alternatives_spanish:
  - tu bienestar
  - tu shalom
  lexicon: שלום / peace
  rationale: '''Paz'' reproduce el valor básico del término y funciona bien en español devocional sin perder la referencia a bienestar integral.'
- source_word: ገብርከ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  lexicon: δοῦλος / servant-servant-of-God language
  rationale: Aquí el contexto es una súplica reverente a Dios; en español 'siervo' es la forma idiomática y devocionalmente clara para este registro, aunque el campo léxico subyacente puede ser más fuerte.
- source_word: ዘርአ ውሉዱ
  english_pob_choice: seed of his sons
  chosen_spanish: la descendencia de sus hijos
  alternatives_spanish:
  - la simiente de sus hijos
  - la prole de sus hijos
  lexicon: seed / offspring / descendants
  rationale: '''Descendencia'' comunica de manera natural la idea genealógica del texto. ''Simiente'' sería más literal pero menos transparente en español moderno.'
- source_word: ሕዝበ ኅሩየ
  english_pob_choice: a chosen people
  chosen_spanish: un pueblo escogido
  alternatives_spanish:
  - un pueblo elegido
  lexicon: chosen people
  rationale: '''Escogido'' preserva el matiz electivo y es una fórmula bíblica ampliamente inteligible en español.'
- source_word: ወርስተ
  english_pob_choice: an inheritance
  chosen_spanish: una heredad
  alternatives_spanish:
  - una herencia
  lexicon: inheritance / heritage
  rationale: '''Heredad'' conserva el tono bíblico-jurídico de una posesión recibida por asignación, más preciso que ''herencia'' en este contexto.'
- source_word: እምኵሉ አሕዛበ ምድር
  english_pob_choice: from among all the nations of the earth
  chosen_spanish: de entre todas las naciones de la tierra
  alternatives_spanish:
  - de entre todos los pueblos de la tierra
  lexicon: nations / peoples
  rationale: '''Naciones'' corresponde al término etnopolítico del texto y evita diluir la referencia histórica en ''pueblos''.'
- source_word: እምይእዜ
  english_pob_choice: from now
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  lexicon: temporal now-from
  rationale: '''Desde ahora'' es natural y conserva el inicio temporal continuo del texto.'
- source_word: እስከ ኵሉ መዋዕለ ዘትውልደ ምድር
  english_pob_choice: for all the days of the generations of the earth
  chosen_spanish: por todos los días de las generaciones de la tierra
  alternatives_spanish:
  - por todos los días de las generaciones de la humanidad
  - a lo largo de todas las generaciones de la tierra
  lexicon: generations / days / earth
  rationale: La estructura temporal se mantiene de forma bastante literal para no perder la cadencia semítica y la extensión total del alcance.
- source_word: ለኵሉ ዓለማት
  english_pob_choice: for all ages
  chosen_spanish: por todas las edades
  alternatives_spanish:
  - por siempre
  - por todos los siglos
  lexicon: ages / worlds
  rationale: '''Edades'' traduce de manera sobria el plural de ''ages/worlds'' sin forzar una equivalencia exclusivamente litúrgica como ''siglos''.'
theological_decisions:
- issue: Vocative address to God omitted in previous English draft
  english_pob_reading: My God, may your mercy and your peace...
  chosen_spanish_reading: Mi Dios, que tu misericordia y tu paz...
  alternative_spanish_readings:
  - Dios mío, que tu misericordia y tu paz...
  rationale: El ge'ez contiene explícitamente la invocación 'Mi Dios'; debía aparecer en español para reflejar la súplica completa y evitar la omisión del ruego personal.
  doctrine_reference: Oración/vocativo directo a Dios en lenguaje devocional
- issue: Nature of the blessing as covenantal favor and peace
  english_pob_reading: may your mercy and your peace be upon...
  chosen_spanish_reading: que tu misericordia y tu paz estén sobre...
  alternative_spanish_readings:
  - que tu favor y tu paz estén sobre...
  - que tu misericordia y tu paz reposen sobre...
  rationale: '''Estén sobre'' reproduce bien la imagen de una bendición que descansa sobre personas. ''Misericordia'' mantiene el componente de bondad compasiva sin reducirlo a simple benevolencia.'
  doctrine_reference: Bendición divina y lenguaje de favor misericordioso
translation_notes:
  revision_awareness: Se corrigió la omisión del vocativo explícito 'Mi Dios' presente en el ge'ez. También se evitó depender del borrador inglés para el inicio de la oración, y se mantuvo una traducción que preserve la secuencia de bendición, elección e heredad sin suavizar el lenguaje genealógico y covenantal del original.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma estándar del proyecto cuando el texto requiera el nombre divino; aquí no aparece el Tetragrámaton en el versículo, sino una invocación a Dios.
  - '''Siervo'' se prefirió por ser una súplica dirigida a Dios en registro bíblico-natural del español; no se neutralizó como ''sirviente''.'
  - '''Heredad'' se mantuvo para reflejar mejor el matiz de posesión asignada y no simplemente ''herencia'' en sentido moderno.'
  - La frase final 'por todas las edades' conserva el plural intensivo del original sin convertirlo en una fórmula exclusivamente eclesiástica.
