review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido base del ge'ez y sí incorpora correctamente አምላኪየ como «Mi Dios», en línea con la revisión inglesa. También conserva misericordia, paz, siervo, descendencia, pueblo escogido y la extensión temporal general. Sin embargo, la cláusula final «por todas las edades» no recoge tan bien como podría el valor idiomático de ለኵሉ ዓለማት en registro bíblico español; «por todos los siglos» o «para todas las edades» sería más natural y fiel al cierre enfático. Además, la nota al pie actual no aporta una alternativa real útil al lector, sino una reformulación metalingüística del mismo texto.
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: 1) «que tu misericordia y tu paz estén sobre» suena algo menos idiomático tras «Mi Dios» que «sean sobre» o «reposen sobre», aunque sigue siendo comprensible; 2) «por todas las edades» es menos natural en español bíblico general que «por todos los siglos». La redacción en conjunto es legible y reverente. La nota al pie debe simplificarse para reflejar la alternativa documentada en inglés sin comentario innecesario.'
  glossary_alignment: No hay conflicto con los términos de proyecto. «Mi Dios», «misericordia», «paz», «siervo», «pueblo escogido» y «heredad» son aceptables en contexto. La elección de «siervo» está justificada por el registro devocional. El ajuste recomendado a «por todos los siglos» mejora la adecuación idiomática sin alterar la teología.
  issues:
  - severity: medium
    issue: La nota al pie [a] no corresponde de forma limpia a la nota inglesa auditada.
    rationale: La nota inglesa solo preserva la alternativa «Or 'May your mercy and your peace'». La nota española actual añade explicación interpretativa («el texto puede leerse…») que no es necesaria y no refleja una alternativa léxica distinta.
  - severity: medium
    issue: «por todas las edades» suena poco idiomático como cierre temporal solemne.
    rationale: Aunque «edades» puede defenderse léxicamente, en español bíblico amplio «por todos los siglos» expresa mejor el alcance durativo y la solemnidad de ለኵሉ ዓለማት.
  revised_spanish_text: Mi Dios, que tu misericordia y tu paz[a] estén sobre tu siervo y sobre la descendencia de sus hijos, para que sean para ti un pueblo escogido y una heredad de entre todas las naciones de la tierra, desde ahora y por todos los días de las generaciones de la tierra, por todos los siglos.
  revised_footnotes:
  - marker: a
    text: 'O: «Tu misericordia y tu paz».'
    reason: previous_rendering
  revision_rationale: 'Se conserva la traducción general porque es fiel al ge''ez y a la auditoría inglesa, pero se hace una reparación menor: se sustituye «por todas las edades» por «por todos los siglos» para una clausura más natural y solemne en español bíblico, y se corrige la nota [a] para que refleje de manera precisa la alternativa documentada sin explicación añadida.'
