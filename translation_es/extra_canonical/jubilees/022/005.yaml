base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/005.yaml
  text: And he brought a peace offering and made a great feast of rejoicing before Ishmael his brother. And Rebekah made fresh cakes from new grain and gave them to Jacob her son[5], so that he might bring them to Abraham, his father, from the firstfruits of the land, that he might eat and bless the Creator of all before he died.
  footnotes:
  - marker: '5'
    text: The phrase 'that first feast of the harvest' likely identifies the Feast of Weeks as a firstfruits/harvest festival.
    reason: lexical_alternative
  - marker: a
    text: Or "his father's father".
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:25Z'
    unchanged: false
    changes_summary: Removed an unnecessary comma after 'peace offering' for smoother English and added commas around 'his father's father' for clarity. No substantive translation changes were needed.
translation:
  language: es
  text: Y él presentó una ofrenda de paz y celebró un gran banquete de regocijo delante de Ismael, su hermano. Y Rebeca hizo tortas frescas de grano nuevo y se las dio a Jacob, su hijo, para que las llevara a Abraham, su padre[a], de las primicias de la tierra, para que comiera y bendijera al Creador de todo antes de morir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición genealógica del pasaje es tensa: el Ge''ez revisado lee literalmente ''su padre'', aunque Abraham es, en sentido familiar amplio, el antepasado de Jacob. Se conserva la forma literal en el texto principal.'
    reason: textual_variant
lexical_decisions:
- source_word: “peace offering” / ወምዐ፡ መድኃኒተ፡
  english_pob_choice: peace offering
  chosen_spanish: ofrenda de paz
  alternatives_spanish:
  - ofrenda de comunión
  - ofrenda de paz y comunión
  lexicon: sacrificial offering terminology
  rationale: El inglés POB usa el valor sacrificial específico 'peace offering'. En español, 'ofrenda de paz' conserva la forma breve y respeta el matiz cultual sin introducir una glosa interpretativa más amplia como 'comunión', que sería menos directa para este pasaje.
- source_word: ወገብረ፡ ፯ዝዐ፡ ፍሥሓ፡
  english_pob_choice: made a great feast of rejoicing
  chosen_spanish: celebró un gran banquete de regocijo
  alternatives_spanish:
  - hizo un gran banquete de alegría
  - preparó un gran festín de regocijo
  lexicon: banquet / rejoicing
  rationale: '''Banquete'' comunica bien la comida festiva, y ''regocijo'' reproduce el matiz de alegría ritual o celebrativa que el POB conserva con ''rejoicing''. ''Celebró'' es más natural que un calco de ''hizo'' en español sin perder el sentido.'
- source_word: በቅድመ፡ ይስማዔል፡ እኁሁ፡
  english_pob_choice: before Ishmael his brother
  chosen_spanish: delante de Ismael, su hermano
  alternatives_spanish:
  - en presencia de Ismael, su hermano
  - ante Ismael, su hermano
  lexicon: prepositional ceremonial setting
  rationale: '''Delante de'' mantiene la escena pública/ceremonial del original y del inglés POB. ''En presencia de'' también sería posible, pero ''delante de'' resulta más directo y bíblico en español contemporáneo.'
- source_word: ጻፍንተ፡ ሐዳሰ፡ እምስርናይ፡ ኅዲስ፡
  english_pob_choice: fresh cakes from new grain
  chosen_spanish: tortas frescas de grano nuevo
  alternatives_spanish:
  - pasteles frescos de grano nuevo
  - tortas nuevas de cereal nuevo
  lexicon: food offering / grain cakes
  rationale: '''Tortas'' es una solución amplia y natural para cakes en contexto antiguo; ''grano nuevo'' preserva el vínculo con la cosecha nueva y evita una expansión innecesaria.'
- source_word: ወወሀበተ፡ ለያዕቆብ፡ ወልዳ፡
  english_pob_choice: gave them to Jacob her son
  chosen_spanish: se las dio a Jacob, su hijo
  alternatives_spanish:
  - las entregó a Jacob, su hijo
  - se las dio a su hijo Jacob
  lexicon: simple transfer
  rationale: '''Se las dio'' conserva la sencillez del gesto y el objeto indirecto implícito. Se mantiene ''Jacob, su hijo'' para reflejar el vínculo explícito del texto.'
- source_word: ከመ፡ ይብእ፡ ለአብርሃም፡ አቡሁ፡
  english_pob_choice: so that he might bring them to Abraham, his father
  chosen_spanish: para que las llevara a Abraham, su padre[a]
  alternatives_spanish:
  - para que las llevara a Abraham, su padre
  - para que las llevara a Abraham, su ancestro
  lexicon: kinship term
  rationale: El Ge'ez del pasaje y la revisión crítica favorecen 'his father'. En español conviene conservar 'su padre' y anotar la ambigüedad genealógica en nota, sin forzar una expansión interpretativa dentro del texto principal.
- source_word: እምቀዳሚ፡ ፍሬ፡ ምድር፡
  english_pob_choice: from the firstfruits of the land
  chosen_spanish: de las primicias de la tierra
  alternatives_spanish:
  - de los primeros frutos de la tierra
  - de la primicia de la tierra
  lexicon: firstfruits terminology
  rationale: '''Primicias'' es el término bíblico más establecido para ''firstfruits'' y conserva el trasfondo cultual del pasaje mejor que una paráfrasis general como ''primeros frutos''.'
- source_word: ከመ፡ ይብላዕ፡ ወይባርከ፡ ፈጣሪ፡ ኵሉ፡
  english_pob_choice: that he might eat and bless the Creator of all
  chosen_spanish: para que comiera y bendijera al Creador de todo
  alternatives_spanish:
  - para que comiera y alabara al Creador de todo
  - para que comiera y bendijera al Creador de todas las cosas
  lexicon: bless / Creator of all
  rationale: '''Bendijera'' reproduce la acción verbal del original y del POB. ''Creador de todo'' es una formulación sobria y fiel para ''Creator of all'', sin añadir ''cosas'' que el texto no exige.'
theological_decisions:
- issue: Conservation of sacrificial and festal language
  english_pob_reading: peace offering and great feast of rejoicing
  chosen_spanish_reading: ofrenda de paz y gran banquete de regocijo
  alternative_spanish_readings:
  - ofrenda de comunión y gran festín de alegría
  - sacrificio de paz y gran banquete festivo
  rationale: El pasaje une sacrificio y celebración. En español se conserva esa unión sin espiritualizarla ni sustituirla por lenguaje litúrgico posterior que podría ocultar el carácter narrativo y cultual del episodio.
  doctrine_reference: Lexical-cultural fidelity to biblical sacrificial vocabulary
- issue: Kinship term for Abraham
  english_pob_reading: Abraham, his father
  chosen_spanish_reading: Abraham, su padre
  alternative_spanish_readings:
  - Abraham, su antepasado
  - Abraham, su padre[a]
  rationale: La tradición textual revisada del Ge'ez respalda 'su padre', aunque la relación genealógica en sentido moderno es de abuelo/antepasado. Mantener el término literal en el texto evita borrar la tensión documentada; la nota permite orientar al lector sin corregir el texto base.
  doctrine_reference: Textual criticism / genealogical language in biblical narrative
- issue: Blessing before death
  english_pob_reading: that he might eat and bless the Creator of all before he died
  chosen_spanish_reading: para que comiera y bendijera al Creador de todo antes de morir
  alternative_spanish_readings:
  - para que comiera y alabara al Creador de todo antes de morir
  - para que comiera, bendijera al Creador de todo y muriera
  rationale: Se conserva el sentido narrativo de un acto final de bendición antes de la muerte, sin convertirlo en una fórmula doctrinal más amplia. 'Bendijera' mantiene la carga teológica del acto de dar bendición a Dios.
  doctrine_reference: Biblical blessing formula
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que eliminó una coma innecesaria y, en otra etapa, discutió si Abraham debía leerse como 'his father's father' o 'his father'. La lectura más reciente y el control del Ge'ez favorecen 'his father'; por eso el español conserva 'su padre' y marca la tensión genealógica en nota, sin ampliarla dentro del cuerpo del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto solo cuando aparece el nombre divino; en este versículo no aparece, por lo que se mantiene 'Creador de todo'.
  - Se preserva 'primicias' como término cultual estable, en coherencia con el trasfondo festivo-sacrificial del pasaje.
  - Se evita 'siervo' o 'sirviente' porque el pasaje no contiene δοῦλος ni un equivalente funcional relevante.
  - '''Regocijo'' se conserva para reflejar el tono celebrativo, aunque ''alegría'' sería posible; aquí el matiz ritual es importante.'
