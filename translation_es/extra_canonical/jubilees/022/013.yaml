base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/013.yaml
  text: And he came near and kissed him. And he said, “Blessed be my son Jacob and all his sons by the Lord Most High, to all the ages. May the Lord give you a righteous seed; and may he sanctify some of your offspring in the midst of all the earth. Let the nations serve you, and let all the nations bow down before your seed.”
  footnotes:
  - marker: a
    text: Or 'from your offspring may he sanctify himself'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:27Z'
    unchanged: false
    changes_summary: 'Revised several phrases for closer lexical accuracy and more natural formal English: changed ''to the Lord Most High for all ages'' to ''by the Lord Most High, to all the ages''; changed ''a seed of righteousness'' to ''a righteous seed''; replaced ''may he sanctify some of your offspring'' with ''from your offspring may he sanctify himself'' to reflect the source more fully; and changed ''Nations will desire you'' to ''Let the nations serve you'' to match the verb more accurately.'
translation:
  language: es
  text: 'Y se acercó y lo besó. Y dijo: «Bendito sea mi hijo Jacob y todos sus hijos por Yahvé Altísimo, por todos los siglos. Que Yahvé te dé una descendencia justa; y de tu descendencia santifique algunos [a] en medio de toda la tierra. Que las naciones te sirvan, y que todas las naciones se inclinen ante tu descendencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de tu descendencia santifique parte».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወስዐሞ፡ ወይቤ፡
  english_pob_choice: And he came near and kissed him. And he said,
  chosen_spanish: 'Y se acercó y lo besó. Y dijo:'
  alternatives_spanish:
  - 'Y se acercó y lo besó. Y le dijo:'
  - 'Entonces se acercó y lo besó. Y dijo:'
  lexicon: Ge'ez verbal sequence and direct speech introduction
  rationale: La secuencia narrativa simple se vierte de forma directa y natural en español. «Lo besó» mantiene el objeto masculino implícito en el contexto, y «Y dijo» preserva la coordinación del original sin añadir énfasis no documentado.
- source_word: እግዚአብሔር፡ ልዑል፡ ለኵሉ፡ ዓለማት፡
  english_pob_choice: the Lord Most High, to all the ages
  chosen_spanish: Yahvé Altísimo, por todos los siglos
  alternatives_spanish:
  - el Señor Altísimo, por todos los siglos
  - Yahvé, el Altísimo, por todos los siglos
  lexicon: divine name and epithet
  rationale: Se usa «Yahvé» según la terminología del proyecto para יהוה / divine name, y «Altísimo» para ልዑል. «Por todos los siglos» refleja bien la expresión temporal totalizante del original y del audit trail inglés.
- source_word: ዘርአ፡ ጽድቅ፡
  english_pob_choice: a righteous seed
  chosen_spanish: una descendencia justa
  alternatives_spanish:
  - una simiente justa
  - una descendencia de justicia
  lexicon: זרע / seed
  rationale: «Descendencia» es el equivalente más claro en español bíblico para la idea de linaje/progenie. «Justa» conserva el valor adjetival de צְדָקָה/צֶדֶק en una formulación natural; «simiente» es posible, pero más marcada y menos transparente para lectores modernos.
- source_word: ይቀድስ፡
  english_pob_choice: may he sanctify some of your offspring
  chosen_spanish: santifique algunos
  alternatives_spanish:
  - consagre algunos
  - haga santos a algunos
  lexicon: קדש / sanctify
  rationale: El verbo activo se mantiene como «santifique», y el partitivo implícito se expresa con «algunos» según la revisión auditada del inglés. No se introduce un reflexivo que el ge'ez no exige.
- source_word: በማእከለ፡ ኵላ፡ ምድር፡
  english_pob_choice: in the midst of all the earth
  chosen_spanish: en medio de toda la tierra
  alternatives_spanish:
  - en medio de toda la tierra
  - en toda la tierra
  lexicon: locative phrase
  rationale: «En medio de» reproduce con fidelidad la localización central del original y del inglés auditado, con una construcción natural en español.
- source_word: ይትቀነዩ፡ ለከ፡ አሕዛብ፡
  english_pob_choice: Let the nations serve you
  chosen_spanish: Que las naciones te sirvan
  alternatives_spanish:
  - Que las naciones te sirvan
  - Las naciones te servirán
  lexicon: עבד / serve
  rationale: La revisión inglesa corrigió una lectura anterior más débil; «te sirvan» comunica la fuerza volitiva/jussiva. Se evita «desear» porque no corresponde al verbo del original.
- source_word: ይስግዱ፡ በቅድመ፡ ዘርእከ፡ ኵሎሙ፡ አሕዛብ።
  english_pob_choice: let all the nations bow down before your seed
  chosen_spanish: que todas las naciones se inclinen ante tu descendencia
  alternatives_spanish:
  - que todas las naciones se postren ante tu descendencia
  - que todas las naciones se inclinen delante de tu descendencia
  lexicon: prosternation language
  rationale: «Se inclinen» es un equivalente sobrio y claro de la postración, apto para español bíblico contemporáneo. «Ante» conserva la relación preposicional sin arcaísmo excesivo.
theological_decisions:
- issue: Divine name in the blessing
  english_pob_reading: by the Lord Most High, to all the ages
  chosen_spanish_reading: por Yahvé Altísimo, por todos los siglos
  alternative_spanish_readings:
  - por el Señor Altísimo, por todos los siglos
  - por Yahvé, el Altísimo, por todos los siglos
  rationale: El texto nombra al Dios supremo en una fórmula de bendición. Conforme a la pauta del proyecto, se mantiene el nombre divino como «Yahvé» en vez de ocultarlo bajo «Señor». «Altísimo» preserva el título teológico del original.
  doctrine_reference: Tetragrámaton / divine name rendering policy
- issue: Seed language and corporate posterity
  english_pob_reading: a righteous seed
  chosen_spanish_reading: una descendencia justa
  alternative_spanish_readings:
  - una simiente justa
  - una descendencia de justicia
  rationale: La expresión no se limita a un descendiente individual; el contexto habla de línea/descendencia. «Descendencia» conserva el alcance corporativo y evita estrechar indebidamente el sentido.
  doctrine_reference: Seed / offspring covenant language
- issue: Sanctification from offspring
  english_pob_reading: may he sanctify some of your offspring
  chosen_spanish_reading: santifique algunos
  alternative_spanish_readings:
  - consagre algunos de tu descendencia
  - santifique parte de tu descendencia
  rationale: La revisión textual indica que el partitivo implícito debe conservarse. El español expresa esto con «algunos» y deja abierta la referencia a una porción de la descendencia, sin convertir el verbo en reflexivo ni alterar la agencia divina.
  doctrine_reference: קדש / sanctification and partitive reading
translation_notes:
  revision_awareness: Se incorporó la revisión textual que corrige la cláusula jussiva final a «Que las naciones te sirvan» y se mantuvo la lectura partitiva de la santificación de algunos de la descendencia, evitando el reflexivo rechazado por el control de calidad. También se conservó la fórmula de bendición con el nombre divino explícito.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino.
  - «Descendencia» se emplea para זרע / seed en sentido corporativo y covenantal.
  - Se mantiene «santifique» como verbo activo para קדש, con objeto partitivo explícito.
  - La puntuación de cita directa sigue el español estándar con comillas angulares.
  - El pie de nota [a] está anclado en el texto exactamente donde aparece la alternativa semántica relevante.
