  to: Y no lo abandones ni lo dejes, desde ahora y hasta los días de la eternidad. Que tus ojos estén abiertos[a] sobre él y sobre su descendencia, para que lo guardes, lo bendigas y lo santifiques para un pueblo de tu heredad. Y bendícelo con todas tus bendiciones, desde ahora y por todos los días de la eternidad[b], y renueva tu pacto y tu misericordia con él y con su descendencia, conforme a toda tu voluntad, por todas las generaciones de la tierra.”
