base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/031.yaml
  text: And do not forsake him, and do not leave him, from now and unto the days of eternity. And let your eyes be open upon him and upon his seed, that you may keep him and bless him and sanctify him for a people of your inheritance. And bless him with all your blessings from now and for all the days forever, and renew your covenant and your mercy with him and with his seed according to all your will throughout all the generations of the earth.”
  footnotes:
  - marker: a
    text: Or 'open over him and over his seed'.
    reason: previous_rendering
  - marker: b
    text: Or 'from now and forever'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:31Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy and more natural formal English: changed ''abandon'' to ''leave'' for the second verb, ''upon'' to ''over,'' and ''as a people for your inheritance'' to ''for a people of your inheritance'' to better reflect the source construction while preserving readability.'
translation:
  language: es
  text: Y no lo abandones ni lo dejes, desde ahora y hasta los días de la eternidad. Que tus ojos estén abiertos[a] sobre él y sobre su descendencia, para que lo guardes, lo bendigas y lo santifiques para un pueblo de tu heredad. Y bendícelo con todas tus bendiciones, desde ahora y por todos los días de la eternidad[b], y renueva tu pacto y tu misericordia con él y con su descendencia, conforme a toda tu voluntad, por todas las generaciones de la tierra.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «abiertos sobre él y sobre su descendencia».'
    reason: alternative_rendering
  - marker: b
    text: 'También: «desde ahora y para siempre».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወአትኅድጎ / ወአትትሐየዮ
  english_pob_choice: do not forsake him / do not leave him
  chosen_spanish: no lo abandones ni lo dejes
  alternatives_spanish:
  - no lo desampares ni lo abandones
  - no lo dejes ni lo desampares
  lexicon: abandonar; dejar
  rationale: El ge'ez usa dos verbos cercanos pero no idénticos; el audit trail inglés distingue 'forsake' y 'leave'. En español, 'abandonar' y 'dejar' conservan esa duplicación sin suavizarla en una sola idea.
- source_word: እምይእዜ ... ወእስከ መዋዕለ ዘለዓለም
  english_pob_choice: from now and unto the days of eternity
  chosen_spanish: desde ahora y hasta los días de la eternidad
  alternatives_spanish:
  - desde ahora y para siempre
  - desde ahora y hasta la eternidad
  lexicon: desde ahora; hasta; días de la eternidad
  rationale: Se conserva la estructura temporal completa, incluyendo 'días de', que el pasaje recalca. 'Hasta los días de la eternidad' suena natural y refleja mejor el plural del original que una simple fórmula adverbial.
- source_word: አዕይንቲከ ክሡታተ ላዕሌሁ ወላዕለ ዘርኡ
  english_pob_choice: let your eyes be open over him and over his seed
  chosen_spanish: tus ojos estén abiertos sobre él y sobre su descendencia
  alternatives_spanish:
  - tus ojos estén abiertos para él y para su descendencia
  - tus ojos estén puestos sobre él y sobre su descendencia
  lexicon: ojos estén abiertos; sobre; descendencia
  rationale: El giro se traduce de modo idiomático en español manteniendo la imagen de vigilancia/cuidado. 'Sobre' conserva la relación preposicional del ge'ez y del inglés revisado.
- source_word: ከመ ትዕቀቦ ወከመ ትባርኮ ወከመ ትቀድሶ
  english_pob_choice: that you may keep him and bless him and sanctify him
  chosen_spanish: para que lo guardes, lo bendigas y lo santifiques
  alternatives_spanish:
  - para que lo preserves, lo bendigas y lo santifiques
  - para que lo cuides, lo bendigas y lo apartes como santo
  lexicon: guardar; bendecir; santificar
  rationale: '''Guardar'' preserva la idea de custodiar/proteger. ''Santificar'' se mantiene por ser el verbo técnico más fiel y reconocido para apartar para Dios.'
- source_word: ለሕዝብ ዘለርስትከ
  english_pob_choice: for a people of your inheritance
  chosen_spanish: para un pueblo de tu heredad
  alternatives_spanish:
  - como un pueblo de tu herencia
  - para un pueblo que es tu heredad
  lexicon: pueblo; heredad
  rationale: '''Heredad'' comunica la relación posesiva y pactal mejor que ''herencia'' en español bíblico contemporáneo, sin ocultar la fuerza del original.'
- source_word: በኵሉ በረከታቲከ
  english_pob_choice: with all your blessings
  chosen_spanish: con todas tus bendiciones
  alternatives_spanish:
  - con todas tus bendiciones abundantes
  - con todas las bendiciones que tienes
  lexicon: bendiciones
  rationale: Se mantiene la pluralidad y la amplitud total del original con una formulación simple y fiel.
- source_word: ወሐድስ ኪዳነከ ወሣህለከ
  english_pob_choice: renew your covenant and your mercy
  chosen_spanish: renueva tu pacto y tu misericordia
  alternatives_spanish:
  - renueva tu alianza y tu misericordia
  - renueva tu pacto y tu favor
  lexicon: pacto; misericordia
  rationale: '''Pacto'' sigue el término de la tradición POB para el vínculo formal; ''misericordia'' traduce ሣህል/ḥesed con la ambigüedad de lealtad amorosa que el español bíblico puede sostener.'
- source_word: ምስሌሁ ወምስለ ዘርኡ
  english_pob_choice: with him and with his seed
  chosen_spanish: con él y con su descendencia
  alternatives_spanish:
  - con él y con su simiente
  - con él y con su linaje
  lexicon: descendencia
  rationale: '''Descendencia'' es neutro, claro y mantiene el valor colectivo de ''seed'' sin biologizarlo innecesariamente.'
- source_word: በኵሉ ፈቃድከ
  english_pob_choice: according to all your will
  chosen_spanish: conforme a toda tu voluntad
  alternatives_spanish:
  - según toda tu voluntad
  - de acuerdo con toda tu voluntad
  lexicon: voluntad
  rationale: '''Conforme a'' reproduce adecuadamente la relación normativa del original y evita una simplificación causal.'
theological_decisions:
- issue: La petición de que Dios no abandone a Jacob y que sus ojos estén abiertos sobre él y su descendencia
  english_pob_reading: do not forsake him ... let your eyes be open over him and over his seed
  chosen_spanish_reading: no lo abandones ni lo dejes ... tus ojos estén abiertos sobre él y sobre su descendencia
  alternative_spanish_readings:
  - no lo desampares ni lo abandones ... tus ojos estén abiertos para él
  - no lo abandones ... que tus ojos lo favorezcan
  rationale: Se conserva la duplicación de negativa y la imagen de vigilancia activa sin convertirla en mero favor abstracto. El texto presenta una petición de cuidado pactual, no solo de benevolencia general.
  doctrine_reference: Cuidado pactual divino; intercesión patriarcal en el marco del pacto
- issue: La expresión 'para un pueblo de tu heredad'
  english_pob_reading: for a people of your inheritance
  chosen_spanish_reading: para un pueblo de tu heredad
  alternative_spanish_readings:
  - como un pueblo de tu herencia
  - para un pueblo que es tu heredad
  rationale: '''Heredad'' preserva el trasfondo de pertenencia pactual y evita diluir la relación posesiva entre Dios y el pueblo en una formulación más genérica.'
  doctrine_reference: Elección pactual y pertenencia del pueblo a Dios
- issue: '''Renueva tu pacto y tu misericordia'''
  english_pob_reading: renew your covenant and your mercy
  chosen_spanish_reading: renueva tu pacto y tu misericordia
  alternative_spanish_readings:
  - renueva tu alianza y tu misericordia
  - renueva tu pacto y tu favor
  rationale: Se mantiene la tensión entre vínculo formal ('pacto') y lealtad compasiva ('misericordia'). 'Favor' reduciría indebidamente la densidad del término.
  doctrine_reference: Fidelidad del pacto y חסד/ḥesed como misericordia leal
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto ge''ez y el ajuste inglés más reciente: conserva la doble negativa (''forsake/leave''), la secuencia temporal ampliada (''days of eternity''), y la preposición de vigilancia (''over/upon'') sin forzar un calco torpe en español. También mantiene ''covenant and mercy'' como dos elementos distintos, tal como refleja el audit trail.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; aquí no aparece el nombre divino explícito en el segmento final traducido.
  - '''Descendencia'' se mantiene de forma consistente para זרע/seed.'
  - '''Pacto'' se prefiere sobre ''alianza'' por coherencia con el estilo POB, aunque ambas serían posibles según contexto.'
  - '''Santificar'' se conserva como verbo técnico para preservar el lenguaje cultual del original.'
