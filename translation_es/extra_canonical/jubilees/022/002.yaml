translation:
  language: es
  text: Y Abraham se alegró porque habían llegado sus dos hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወተፈሥሐ፡
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se gozó
  lexicon: Gk/Eng equivalent of expressive joy
  rationale: El verbo ge’ez expresa gozo o alegría; en español, «se alegró» comunica bien el estado emocional sin sonar arcaico, y mantiene el tono sobrio del versículo. «Se regocijó» es posible, pero suena más marcado y menos natural en español moderno.
- source_word: እስመ፡
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: causal conjunction
  rationale: La partícula causal se vierte con «porque», que es la opción más clara y directa en español para introducir la causa de la alegría de Abraham.
- source_word: ክልኤሆሙ፡ ደቂቁ፡
  english_pob_choice: both his sons
  chosen_spanish: sus dos hijos
  alternatives_spanish:
  - ambos sus hijos
  - los dos hijos que tenía
  lexicon: dual/collective kinship expression
  rationale: La expresión ge’ez indica a ambos hijos de Abraham; «sus dos hijos» preserva el sentido dual de manera natural en español. «Ambos sus hijos» resulta poco idiomático.
- source_word: መጽኡ።
  english_pob_choice: had come
  chosen_spanish: habían llegado
  alternatives_spanish:
  - habían venido
  - habían acudido
  lexicon: arrival verb
  rationale: El verbo indica llegada/venida al lugar. «Habían llegado» es la formulación más fluida y precisa en español; «habían venido» también sería viable, pero resalta menos la idea de arribo.
theological_decisions:
- issue: Referencia a los hijos de Abraham sin expansión interpretativa
  english_pob_reading: And Abraham rejoiced because both his sons had come.
  chosen_spanish_reading: Y Abraham se alegró porque habían llegado sus dos hijos.
  alternative_spanish_readings:
  - Y Abraham se alegró porque habían venido sus dos hijos.
  rationale: El texto no nombra a los hijos ni añade explicación teológica; la traducción conserva esa sobriedad y evita identificar a los hijos por inferencia. No hay tensión doctrinal especial que resolver aquí; solo se mantiene la referencia relacional del texto.
  doctrine_reference: Narrativa histórica simple; sin implicaciones doctrinales directas
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios y el cotejo externo indicó alta concordancia. Por eso se mantiene una traducción directa y sobria, con ajustes solo de naturalidad en español.
  spanish_consistency_notes:
  - Se conserva el nombre propio «Abraham» según el texto fuente y el audit trail en inglés.
  - No se introduce terminología eclesiástica innecesaria; el pasaje es narrativo y breve.
  - Se mantiene el valor causal de la partícula inicial con «porque».
