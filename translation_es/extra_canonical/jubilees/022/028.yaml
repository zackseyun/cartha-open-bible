base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/028.yaml
  text: And both of them lay down together on one bed[28], and Jacob slept in the bosom of Abraham, his father’s father. And he kissed him seven times, and his compassion and his heart rejoiced over him.
  footnotes:
  - marker: '28'
    text: The final clause is difficult; the sense is that Abraham's affection and inward disposition remained warmly fixed on Jacob.
    reason: segmentation_note
  - marker: a
    text: Or 'and his compassion and his heart were upon him.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:29Z'
    unchanged: false
    changes_summary: 'Revised the final clause for closer lexical accuracy: replaced interpretive ''his affection and his heart rejoiced over him'' with the more literal ''his compassion and his heart were upon him.'''
translation:
  language: es
  text: Y ambos se acostaron juntos en una sola cama[a], y Jacob durmió en el seno de Abraham, el padre de su padre. Y lo besó siete veces, y su compasión y su corazón se alegraron por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La última cláusula es difícil; el sentido es que la compasión y la disposición interior de Abraham permanecían cálidamente fijadas en Jacob. Otra posible traducción: «y su compasión y su corazón estaban sobre él».'
    reason: source_note
lexical_decisions:
- source_word: ወሰከቡ፡ ክልኤሆሙ፡ ኅቡረ፡
  english_pob_choice: And both of them lay down together
  chosen_spanish: Y ambos se acostaron juntos
  alternatives_spanish:
  - Y los dos se acostaron juntos
  - Y ambos se recostaron juntos
  lexicon: Ge'ez ወሰከቡ / ኅቡረ
  rationale: La escena describe una acción corporal concreta de acostarse/recostarse; «se acostaron» es natural en español y mantiene la sencillez del original. «Ambos» conserva el énfasis distributivo de «both of them».
- source_word: ውስተ፡ ዐራት፡ አሐቲ፡
  english_pob_choice: on one bed
  chosen_spanish: en una sola cama
  alternatives_spanish:
  - sobre una sola cama
  - en una cama
  lexicon: Ge'ez ዐራት አሐቲ
  rationale: «Una sola cama» expresa la unidad numérica sin sonar forzado. «En» es idiomático en español para ubicación al acostarse.
- source_word: ያዕቆብ፡ ውስተ፡ ሕፅነ፡ አብርሃም፡ አቡ፡ አቡሁ፡
  english_pob_choice: Jacob slept in the bosom of Abraham, his father’s father
  chosen_spanish: Jacob durmió en el seno de Abraham, el padre de su padre
  alternatives_spanish:
  - Jacob durmió en el seno de Abraham, su abuelo paterno
  - Jacob durmió en el regazo de Abraham, el padre de su padre
  lexicon: Ge'ez ሕፅነ
  rationale: «Seno» reproduce la imagen corporal-relacional del original y del inglés auditado. Mantengo la glosa explicativa «el padre de su padre» para no reemplazarla por un término interpretativo único, aunque «abuelo paterno» es una alternativa válida y más idiomática.
- source_word: ወሰዐሞ፡ ስብዐ፡
  english_pob_choice: And he kissed him seven times
  chosen_spanish: Y lo besó siete veces
  alternatives_spanish:
  - Y lo besó siete veces seguidas
  - Y lo besó siete veces
  lexicon: Ge'ez ወሰዐሞ / ስብዐ
  rationale: La repetición cuantificada se traduce de forma directa. «Lo» conserva la referencia pronominal a Jacob sin añadir explicaciones.
- source_word: ወትሤ*ሖ፡ ምሕረቱ፡
  english_pob_choice: his compassion
  chosen_spanish: su compasión
  alternatives_spanish:
  - su misericordia
  - su afecto
  lexicon: Ge'ez ምሕረት
  rationale: «Compasión» sigue la elección auditada del inglés POB y deja visible el matiz afectivo. «Misericordia» sería posible, pero en español puede sonar más teológica y menos afectiva que el contexto narrativo sugiere.
- source_word: ወልቡ፡ ላዕሌሁ።
  english_pob_choice: and his heart rejoiced over him
  chosen_spanish: y su corazón se alegraron sobre él
  alternatives_spanish:
  - y su corazón se alegró por él
  - y su corazón se regocijó sobre él
  lexicon: Ge'ez ልብ / ላዕሌሁ
  rationale: 'Se preserva la imagen de una disposición interior dirigida «sobre él», como en la lectura auditada. La forma verbal en plural con un sujeto compuesto en español resulta menos natural; por eso se hace concordar con el conjunto («su compasión y su corazón») manteniendo el sentido del rejoicing/rejoicing-over documented in the audit trail. Nota: la construcción puede leerse con cierta tensión, pero no se elimina el movimiento afectivo del original.'
theological_decisions:
- issue: 'Relación afectiva final: compasión + corazón + alegría sobre Jacob'
  english_pob_reading: his compassion and his heart rejoiced over him
  chosen_spanish_reading: su compasión y su corazón se alegraron sobre él
  alternative_spanish_readings:
  - su compasión y su corazón se regocijaron sobre él
  - su compasión y su corazón estuvieron puestos sobre él
  rationale: El resumen de revisión y la corrección posterior muestran que el verbo real del ge'ez es «rejoiced/delight»; por eso no se adopta la lectura errónea «were upon him». Se mantiene la tensión entre interioridad («corazón») y afecto compasivo, en vez de diluirla en una paráfrasis emocional más libre.
  doctrine_reference: Hermenéutica de cercanía lexical al texto base; no hay una doctrina controvertida, pero sí una decisión de fidelidad verbal frente a una revisión errónea.
translation_notes:
  revision_awareness: 'La tradición auditada contiene una corrección importante y luego una reversión: una revisión propuso «were upon him», pero el control posterior señaló correctamente que el ge''ez tiene un verbo de gozo/delicia y que la lectura más fiel es «rejoiced over him». Por eso el español conserva el movimiento afectivo y no adopta la forma estática errónea.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en otros pasajes según el estándar del proyecto, pero aquí no aparece el tetragrámaton ni un sustituto necesario.
  - Se conserva «Jacob» y «Abraham» como nombres propios establecidos en español bíblico.
  - «Seno» se mantiene como término corporal-relacional, aunque «regazo» o «pecho» podrían ser alternativas en otros contextos; aquí «seno» sigue mejor la tradición semántica del pasaje.
