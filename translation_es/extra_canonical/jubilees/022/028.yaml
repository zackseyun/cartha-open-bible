  rationale: 'Se hace una reparación menor para mejorar la naturalidad del español sin apartarse del ge''ez ni de la auditoría inglesa final: se conserva el verbo de regocijo/rejoicing y se reemplaza «sobre él» por «por él», que comunica mejor en español el afecto dirigido hacia Jacob. Además, se normaliza el marcador de nota al formato alfabético exigido y se conserva la alternativa más literal en la nota.'
