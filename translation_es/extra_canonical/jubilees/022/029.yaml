  text: And he blessed him with all his heart and said, “The Most High God, the God of all and Creator of all, who brought me out from Ur of the Chaldeans to give me this land as an everlasting possession, and that I might establish a holy seed—may the Most High be blessed forever.”
  footnotes:
  - marker: a
    text: Or 'and to establish a holy seed'.
    reason: previous_rendering
  - marker: b
    text: Or 'may he be blessed forever.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:30Z'
    unchanged: false
    changes_summary: Made a minor punctuation improvement by replacing the comma before the final blessing with an em dash for clearer English flow; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: 'Y lo bendijo con todo su corazón y dijo: «El Dios Altísimo, el Dios de todo y Creador de todo, que me sacaste de Ur de los caldeos para darme esta tierra como posesión perpetua, y para que yo establezca una descendencia santa[a]—sea bendito el Altísimo para siempre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y para establecer una descendencia santa».'
    reason: alternative_reading
  - marker: b
    text: 'O: «sea bendito para siempre».'
    reason: alternative_reading
lexical_decisions:
- source_word: ባረኮ / blessed him
  english_pob_choice: And he blessed him
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - lo colmó de bendición
  - lo bendijo con todo su corazón
  lexicon: bless
  rationale: El verbo principal se mantiene de forma directa y natural en español. Conservé la idea de intensificación con 'con todo su corazón' porque está explícita en el texto fuente y en el POB inglés.
- source_word: አምላከ፡ ልዑል
  english_pob_choice: The Most High God
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: God / Most High
  rationale: '''Dios Altísimo'' conserva el título sin añadir formulación litúrgica ajena. En la cláusula final repetí ''el Altísimo'' para reflejar la repetición del ge''ez, como hizo la revisión inglesa.'
- source_word: አምላከ፡ ኵሉ / ወፈጣሪ፡ ኵሉ
  english_pob_choice: the God of all and Creator of all
  chosen_spanish: Dios de todo y Creador de todo
  alternatives_spanish:
  - Dios de todas las cosas y Creador de todas las cosas
  - Dios de todo y hacedor de todo
  lexicon: all / creator
  rationale: '''De todo'' y ''Creador de todo'' siguen de cerca la estructura paralela del original y del POB inglés, sin forzar un giro más explicativo que el necesario.'
- source_word: እም፡ ኡር፡ ዘከለዳውያን
  english_pob_choice: who brought me out from Ur of the Chaldeans
  chosen_spanish: que me sacaste de Ur de los caldeos
  alternatives_spanish:
  - que me sacaste de Ur de los caldeos
  - que me hiciste salir de Ur de los caldeos
  lexicon: bring out
  rationale: '''Sacar'' reproduce bien el movimiento de salida y es idiomático en español bíblico contemporáneo.'
- source_word: የሀበኒ፡ ዛተ፡ ምድረ፡ አርስ
  english_pob_choice: to give me this land as an everlasting possession
  chosen_spanish: para darme esta tierra como posesión perpetua
  alternatives_spanish:
  - para darme esta tierra como heredad perpetua
  - para darme esta tierra como posesión eterna
  lexicon: land / everlasting possession
  rationale: '''Posesión perpetua'' conserva la dimensión de tenencia duradera sin cargarla con una sola tradición de ''heredad''. ''Tierra'' y ''posesión'' corresponden bien al original y al inglés auditado.'
- source_word: ከመ፡ ይትባረክ፡ ልዑል፡ ለዓለም
  english_pob_choice: may the Most High be blessed forever
  chosen_spanish: sea bendito el Altísimo para siempre
  alternatives_spanish:
  - sea bendito el Altísimo por siempre
  - bendito sea el Altísimo para siempre
  lexicon: blessed forever
  rationale: La pasiva desiderativa se traduce con 'sea bendito'. Conservé explícitamente 'el Altísimo' para no perder la repetición del título que el POB inglés recuperó tras la revisión.
theological_decisions:
- issue: Repetición del título divino en la bendición final
  english_pob_reading: may the Most High be blessed forever
  chosen_spanish_reading: sea bendito el Altísimo para siempre
  alternative_spanish_readings:
  - sea bendito él para siempre
  - bendito sea para siempre
  rationale: El ge'ez repite ልዑል ('el Altísimo') en la cláusula final; por eso no lo sustituí por un pronombre. Esto preserva la misma tensión reverencial y la referencia explícita al título divino.
  doctrine_reference: Jubilees 22:29; revisión auditada de la lectura final
translation_notes:
  revision_awareness: Seguí la revisión auditada que ajusta la cláusula final a un sujeto distinto en 'para que yo estableciera una descendencia santa' y que restituye la repetición de 'el Altísimo' en la bendición final. La puntuación con raya larga ayuda a reflejar la transición del discurso sin alterar el contenido.
  spanish_consistency_notes:
  - Usé 'Dios Altísimo' para አምላከ ልዑል y 'el Altísimo' en la bendición final para respetar la repetición del título.
  - Mantuve 'Ur de los caldeos' como topónimo bíblico estable.
  - Conservé el paralelismo de 'Dios de todo y Creador de todo' sin suavizarlo.
  - La nota [a] queda anclada en 'descendencia santa' y la nota [b] en la bendición final, evitando marcadores sin anclaje.
