revisions:
- from: 'Y lo bendijo con todo su corazón y dijo: «Dios Altísimo, Dios de todo y Creador de todo, que me sacaste de Ur de los caldeos para darme esta tierra como posesión perpetua, y para que yo estableciera una descendencia santa[a]—sea bendito el Altísimo para siempre[b]».'
  to: 'Y lo bendijo con todo su corazón y dijo: «El Dios Altísimo, el Dios de todo y Creador de todo, que me sacaste de Ur de los caldeos para darme esta tierra como posesión perpetua, y para que yo establezca una descendencia santa[a]—sea bendito el Altísimo para siempre[b]».'
  rationale: 'Se hicieron dos ajustes menores: añadí los artículos en la invocación inicial para que el español refleje mejor el valor apelativo del original y del POB inglés, y cambié «estableciera» por «establezca» para preservar con mayor naturalidad el matiz de finalidad en primera persona singular. El resto del texto y las notas se mantienen, ya que son fieles al source y a la auditoría inglesa.'
