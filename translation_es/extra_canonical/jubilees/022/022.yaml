review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del ge''ez y sigue la revisión inglesa al mantener la metáfora de erradicación: advertencia a Jacob de no tomar esposa del linaje cananeo, porque esa descendencia será arrancada de la tierra. Sin embargo, omite explícitamente el cuantificador «cualquiera/alguna» presente en እም፡ ኵሉ፡ ዘርአ፡ y en el inglés «any of the seed», por lo que conviene reforzar ese matiz.'
  spanish_quality_summary: El texto es claro y digno, pero «hijo mío Jacob» suena algo trabado en español; «mi hijo Jacob» o «Jacob, hijo mío» es más natural. Además, la nota al pie propone «desarraigada», que en español cambia levemente la imagen hacia pérdida de raíces más que acto de arrancar; no es incorrecta, pero como alternativa es menos precisa que «arrancada»/«destruida».
  glossary_alignment: No hay términos del glosario maestro especialmente involucrados. «Descendencia» para «seed» está bien en ambos casos. «Arrancada de la tierra» preserva adecuadamente la metáfora agrícola documentada en el rastro POB.
  issues:
  - severity: medium
    issue: Falta el matiz de universalidad/indefinición de «any of the seed»
    rationale: «De entre la descendencia de las hijas de Canaán» puede sonar genérico, pero no explicita tan claramente «de ninguna / de cualquiera de». El ge'ez y el inglés auditado incluyen ese alcance prohibitivo.
  - severity: low
    issue: 'Vocativo algo poco natural: «hijo mío Jacob»'
    rationale: Es comprensible, pero en español más natural y eufónico sería «mi hijo Jacob» o «Jacob, hijo mío», sin pérdida de sentido.
  - severity: low
    issue: La nota alternativa «desarraigada» debilita la precisión de la metáfora
    rationale: '«Desarraigar» puede funcionar, pero la revisión inglesa enfatiza «uprooted» en sentido de arrancar/erradicar. Conviene una nota más alineada, como «O: “será destruida de la tierra”», si se desea preservar la alternativa previa inglesa.'
  revised_spanish_text: Ten cuidado, mi hijo Jacob, de no tomar mujer de entre ninguna de las descendientes de las hijas de Canaán, porque toda su descendencia[a] será arrancada de la tierra.
  revised_footnotes:
  - marker: a
    text: 'O: «será destruida de la tierra».'
    reason: alternative_rendering_preserved_from_english_audit
  revision_rationale: Se ajusta el vocativo a un español más natural («mi hijo Jacob»), se explicita mejor el alcance prohibitivo de «any of the seed» con «ninguna», y se conserva la metáfora principal «será arrancada de la tierra». La nota alternativa se alinea mejor con la variante histórica del rastro inglés que con «desarraigada», que en español introduce un matiz menos directo.
