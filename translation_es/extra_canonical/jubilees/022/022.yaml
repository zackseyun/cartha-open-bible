base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/022.yaml
  text: Take heed, my son Jacob, that you do not take a wife from any of the seed of the daughters of Canaan, for all his seed is to be uprooted from the earth.
  footnotes:
  - marker: a
    text: Or 'is for destruction from the earth'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:58Z'
    unchanged: false
    changes_summary: Adjusted 'from any seed' to the more natural 'from any of the seed'; replaced interpretive 'is destined for uprooting' with the more direct 'is for destruction,' which better reflects the source without expansion.
translation:
  language: es
  text: Ten cuidado, mi hijo Jacob, de no tomar mujer de entre ninguna de las descendientes de las hijas de Canaán, porque toda su descendencia[a] será arrancada de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será destruida de la tierra».'
    reason: alternative_rendering_preserved_from_english_audit
lexical_decisions:
- source_word: ተዐቀብ፡ ... ከመ፡
  english_pob_choice: Take heed ... that you do not
  chosen_spanish: Ten cuidado ... de no
  alternatives_spanish:
  - Presta atención ... no
  - Guárdate ... de no
  lexicon: imperative admonition
  rationale: El Ge'ez expresa una advertencia directa e imperativa; «Ten cuidado» comunica bien la urgencia sin sonar arcaico. «De no» reproduce la construcción exhortativa negativa de forma natural en español.
- source_word: ወልድየ፡ ያዕቆብ፡
  english_pob_choice: my son Jacob
  chosen_spanish: hijo mío Jacob
  alternatives_spanish:
  - mi hijo Jacob
  - Jacob, hijo mío
  lexicon: kinship vocative
  rationale: Se conserva el tono afectivo del vocativo. «Hijo mío» es idiomático en español y mantiene el énfasis de cercanía del original.
- source_word: ብእሲተ፡
  english_pob_choice: a wife
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - mujer para casarte
  lexicon: marriage partner
  rationale: Aunque el español puede usar «esposa», el contexto de elegir mujer para matrimonio hace que «mujer» sea fiel y sobrio. Evita introducir una relación ya consumada que el texto no dice.
- source_word: እም፡ ኵሉ፡ ዘርአ፡ አዋልደ፡ ከናአን፡
  english_pob_choice: from any of the seed of the daughters of Canaan
  chosen_spanish: de entre la descendencia de las hijas de Canaán
  alternatives_spanish:
  - de ninguna de las hijas de Canaán
  - de la descendencia de las hijas de Canaán
  lexicon: seed / descendants
  rationale: «Descendencia» conserva el valor colectivo de «seed». La formulación «de entre» refleja la selección prohibida de un grupo dentro de otro, y evita una traducción demasiado rígida o genealógica.
- source_word: ኵሉ፡ ዘርአ፡ ለሥራዊ፡ እምድር።
  english_pob_choice: for all his seed is to be uprooted from the earth
  chosen_spanish: porque toda su descendencia será arrancada de la tierra
  alternatives_spanish:
  - porque toda su descendencia será desarraigada de la tierra
  - porque toda su descendencia será destruida de la tierra
  lexicon: uprooted / eradication metaphor
  rationale: «Arrancada» preserva la metáfora agrícola de «uprooted» señalada en la revisión, y en español suena más natural que un calco. «Desarraigada» es una alternativa posible, pero «arrancada» mantiene mejor el movimiento literal de expulsión/erradicación.
theological_decisions:
- issue: Alcance de la condena sobre la descendencia de Canaán
  english_pob_reading: for all his seed is to be uprooted from the earth
  chosen_spanish_reading: porque toda su descendencia será arrancada de la tierra
  alternative_spanish_readings:
  - porque toda su descendencia será destruida de la tierra
  - porque toda su descendencia será desarraigada de la tierra
  rationale: Se conserva la tensión entre metáfora agrícola y juicio total. «Arrancada» mantiene la imagen de uprooting sin suavizarla a mera pérdida o exilio, y no sustituye el juicio por una explicación más abstracta.
  doctrine_reference: Juicio divino / lenguaje de exterminio o erradicación en textos de alianza
- issue: Naturaleza normativa de la advertencia matrimonial
  english_pob_reading: Take heed ... that you do not take a wife
  chosen_spanish_reading: Ten cuidado ... de no tomar mujer
  alternative_spanish_readings:
  - No tomes mujer
  - Guárdate de tomar mujer
  rationale: La forma elegida conserva el tono exhortativo y preventivo del original sin convertirlo en un mandato jurídico más fuerte de lo que exige el texto.
  doctrine_reference: Prescripciones matrimoniales de pureza de linaje / separación de Canaán
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB que prefirió una formulación más directa del juicio final y mantuvo la imagen de ‘uprooted’. Se evitó traducir de manera mecánica desde el inglés cuando el Ge'ez permitía una advertencia más natural en español, especialmente en la expresión del vocativo y la prohibición matrimonial.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el nombre divino aparece; en este versículo no aparece explícitamente.
  - «Descendencia» se mantiene como equivalente colectivo de ‘seed’ para conservar el alcance genealógico.
  - La nota de pie de página preserva la alternativa léxica relevante sin duplicar la afirmación principal.
  - Se evita «esposa» para no imponer una relación ya establecida; «mujer» refleja la instrucción sobre elección matrimonial.
