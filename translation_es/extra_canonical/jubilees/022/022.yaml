revisions:
- from: Ten cuidado, hijo mío Jacob, de no tomar mujer de entre la descendencia de las hijas de Canaán, porque toda su descendencia[a] será arrancada de la tierra.
  to: Ten cuidado, mi hijo Jacob, de no tomar mujer de entre ninguna de las descendientes de las hijas de Canaán, porque toda su descendencia[a] será arrancada de la tierra.
  rationale: Se ajusta el vocativo a un español más natural («mi hijo Jacob»), se explicita mejor el alcance prohibitivo de «any of the seed» con «ninguna», y se conserva la metáfora principal «será arrancada de la tierra». La nota alternativa se alinea mejor con la variante histórica del rastro inglés que con «desarraigada», que en español introduce un matiz menos directo.
