base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/024.yaml
  text: And for all who worship idols and for the profane[24], there is no hope in the land of the living; for they will go down to Sheol, and they will go to the place of judgment, and they will have no memorial upon the earth. As the sons of Sodom were removed from the earth, so all who worship idols will be removed.
  footnotes:
  - marker: '24'
    text: The term 'Sheol' is retained rather than translated as 'hell' or 'grave' because the text distinguishes descent to Sheol from entry into a 'place of judgment.'
    reason: alternative_reading
  - marker: a
    text: Or 'the unclean'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:28Z'
    unchanged: false
    changes_summary: Changed 'profane' to 'unclean' for better lexical fit with the source term; changed 'walk into' to 'go to' for more natural formal English; changed 'on the earth' to 'upon the earth' for register consistency; changed 'taken away' to 'removed' to better match the repeated verb and preserve consistency.
translation:
  language: es
  text: Y para todos los que adoran ídolos y para los profanos[a], no hay esperanza en la tierra de los vivientes; porque descenderán a Seol, e irán al lugar de juicio, y no tendrán memoria en la tierra. Así como los hijos de Sodoma fueron removidos de la tierra, así todos los que adoran ídolos serán removidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los impuros». Sin embargo, la decisión léxica auditada favorece «los profanos» como mejor correspondencia de este término.
    reason: lexical_alternative
lexical_decisions:
- source_word: ጣዖተ
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - ídolos falsos
  lexicon: source term for cultic idols; standard Spanish equivalent preserves the concrete object of worship
  rationale: El término del original designa objetos de culto idolátrico; «ídolos» es el equivalente directo, claro y natural en español bíblico contemporáneo.
- source_word: ጽሉአን
  english_pob_choice: the profane / the unclean
  chosen_spanish: los profanos
  alternatives_spanish:
  - los impuros
  - los impíos
  - los aborrecidos
  lexicon: 'lexical tension: root related to being hated/odious; English audit shows revision oscillation between ''unclean'' and ''profane'''
  rationale: El expediente anglosajón documenta que la revisión de «unclean» a «profane» responde mejor al valor léxico de ጽሉአን. En español, «profanos» conserva la idea de lo irreverente/impío sin imponer «impuros», que introduce una categoría ritual distinta.
- source_word: ተስፋ
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  - expectativa
  lexicon: standard hope vocabulary
  rationale: «Esperanza» es la equivalencia natural y fiel para ተስፋ en este contexto escatológico.
- source_word: ሲኦል
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - Sheol
  - sepulcro
  - el lugar de los muertos
  lexicon: transliteration of underworld term
  rationale: Se conserva el nombre técnico como «Seol», siguiendo la decisión auditada de no traducirlo como «infierno» o «sepulcro», porque el texto lo distingue del «lugar de juicio».
- source_word: መካነ፡ ደይን
  english_pob_choice: place of judgment
  chosen_spanish: lugar de juicio
  alternatives_spanish:
  - sitio de juicio
  - lugar de condena
  lexicon: judicial/eschatological phrase
  rationale: La frase se mantiene de forma literal y transparente; «lugar de juicio» preserva la distinción del texto entre descenso al Seol y acceso al lugar de juicio.
- source_word: ዝክረ
  english_pob_choice: memorial
  chosen_spanish: memoria
  alternatives_spanish:
  - recuerdo
  - memorial
  - conmemoración
  lexicon: memorial/remembrance term
  rationale: «Memoria» expresa con naturalidad la ausencia de recuerdo o conmemoración pública sobre la tierra, evitando un tecnicismo demasiado rígido en español.
- source_word: እምድር
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de sobre la tierra
  - de la faz de la tierra
  lexicon: source of removal expression
  rationale: «De la tierra» refleja el movimiento de ser removidos desde el ámbito terrenal; es más sobrio que expansiones idiomáticas no requeridas por el texto.
theological_decisions:
- issue: 'Destino de los idólatras: Seol y lugar de juicio como realidades diferenciadas'
  english_pob_reading: The term 'Sheol' is retained rather than translated as 'hell' or 'grave' because the text distinguishes descent to Sheol from entry into a 'place of judgment.'
  chosen_spanish_reading: Se mantiene «Seol» y se traduce «lugar de juicio», preservando dos destinos distintos.
  alternative_spanish_readings:
  - traducir Seol como «infierno»
  - traducir Seol como «sepulcro»
  rationale: La lectura auditada señala una distinción conceptual que se perdería si Seol se vertiera como «infierno» o «sepulcro». El español conserva esa tensión con transliteración más frase judicial explícita.
  doctrine_reference: estado de los muertos / juicio escatológico
- issue: 'Valor de ጽሉአን: profanidad versus impureza ritual'
  english_pob_reading: the profane
  chosen_spanish_reading: los profanos
  alternative_spanish_readings:
  - los impuros
  - los aborrecidos
  - los impíos
  rationale: La revisión más reciente del audit trail favorece «profane» por fidelidad léxica. En español, «profanos» evita confundir este grupo con impureza ritual o con una mera condena moral, manteniendo la ambigüedad documentada.
  doctrine_reference: pureza/impureza; impiedad
- issue: Remoción de Sodoma como paralelo de eliminación de idólatras
  english_pob_reading: As the sons of Sodom were removed from the earth, so all who worship idols will be removed.
  chosen_spanish_reading: Así como los hijos de Sodoma fueron removidos de la tierra, así todos los que adoran ídolos serán removidos.
  alternative_spanish_readings:
  - fueron quitados de la tierra
  - fueron llevados de la tierra
  rationale: «Removidos» conserva la repetición y el paralelismo del inglés auditado, y permite mantener la imagen de expulsión/eliminación sin suavizarla.
  doctrine_reference: juicio ejemplar sobre Sodoma
translation_notes:
  revision_awareness: El borrador sigue el texto fuente ge'ez y el expediente inglés revisado. Se atendió la tensión documentada en ጽሉአን, donde el flujo de revisiones pasó de «profane» a «unclean» y volvió a «profane» por revisión léxica; por eso el español adopta «profanos» y deja constancia de la alternativa. También se preservó la distinción entre Seol y el lugar de juicio, y el paralelo verbal de «removidos» para reflejar la repetición del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene «Seol» como transliteración técnica, no como «infierno».
  - «Ídolos» y «adoran ídolos» conservan el registro cultual directo del texto.
  - «Profanos» se eligió para no colapsar la tensión léxica con «impuros».
  - Se evitó «memorial» en favor de «memoria» por naturalidad, sin perder la idea de ausencia de recuerdo público.
