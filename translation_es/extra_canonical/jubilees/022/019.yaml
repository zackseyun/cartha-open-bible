base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/019.yaml
  text: They sacrifice their sacrifices to the dead, and they worship demons, and they eat in the graves[19], and all their works are vanity and emptiness.
  footnotes:
  - marker: '19'
    text: '''They eat in the graves'' likely refers to funerary or necromantic cult meals.'
    reason: cultural_note
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:26Z'
    unchanged: false
    changes_summary: Changed 'over the graves' to 'in the graves' for closer alignment with the source, and 'nothingness' to 'emptiness' for a more natural formal rendering of the paired terms.
translation:
  language: es
  text: Sacrifican sus sacrificios a los muertos, y adoran a los demonios, y comen en las tumbas[a], y todas sus obras son vanidad y vacío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Comen en las tumbas’ probablemente se refiere a comidas funerarias o a un culto necromántico.
    reason: cultural_note
lexical_decisions:
- source_word: መሥዋዕቶሙ
  english_pob_choice: their sacrifices
  chosen_spanish: sus sacrificios
  alternatives_spanish:
  - sus ofrendas
  - sus sacrificios rituales
  lexicon: sacrificio
  rationale: El ge'ez expresa literalmente ‘sus sacrificios’; ‘sacrificios’ conserva el valor cultual y coincide con la opción del POB inglés.
- source_word: ለአብድነት
  english_pob_choice: to the dead
  chosen_spanish: a los muertos
  alternatives_spanish:
  - a los difuntos
  - a los muertos/los muertos
  lexicon: muerto
  rationale: La referencia es a los muertos como destinatarios del culto; ‘muertos’ mantiene la fuerza directa y la ambigüedad cultual sin suavizarla.
- source_word: ወለአጋንንት
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - demonios
  lexicon: demonios
  rationale: ‘Demonios’ es la correspondencia más directa y preserva el sentido religioso del pasaje.
- source_word: ይበልዑ፡ ወበውስተ፡ መቃብራት፡
  english_pob_choice: they eat in the graves
  chosen_spanish: comen en las tumbas
  alternatives_spanish:
  - comen en las sepulturas
  - comen en las tumbas
  lexicon: tumba
  rationale: ‘Tumbas’ comunica con claridad el lugar sepulcral en español moderno; la nota explica la posible referencia a comidas funerarias o necrománticas.
- source_word: ከንቱ፡ ወበከ።
  english_pob_choice: vanity and emptiness
  chosen_spanish: vanidad y vacío
  alternatives_spanish:
  - vanidad y vacío
  - vanidad y vacuidad
  lexicon: vacío
  rationale: La pareja ge'ez pide dos términos de nulidad; ‘vanidad y vacío’ mantiene el paralelismo y sigue la revisión inglesa de ‘emptiness’.
theological_decisions:
- issue: Referencia cultual a muertos y demonios
  english_pob_reading: They sacrifice their sacrifices to the dead, and they worship demons
  chosen_spanish_reading: Sacrifican sus sacrificios a los muertos, y adoran a los demonios
  alternative_spanish_readings:
  - Ofrecen sus sacrificios a los muertos, y adoran a los demonios
  - Sacrifican sus sacrificios a los difuntos, y adoran a los demonios
  rationale: Se conserva el carácter condenatorio del pasaje y la secuencia cultual literal, sin suavizar la identificación de la práctica como idolátrica/necromántica.
  doctrine_reference: Deuteronomio 32:17; Salmo 106:37
- issue: ‘Comen en las tumbas’ como práctica ritual
  english_pob_reading: they eat in the graves
  chosen_spanish_reading: comen en las tumbas
  alternative_spanish_readings:
  - comen sobre las tumbas
  - comen en los sepulcros
  rationale: Se sigue la revisión inglesa que prefiere ‘in the graves’; en español ‘en las tumbas’ conserva esa localización y deja abierta la interpretación de banquetes funerarios o cultos a los muertos.
  doctrine_reference: Isaías 65:4; Ezequiel 18:6
- issue: ‘Vanity and emptiness’ como juicio total sobre las obras
  english_pob_reading: all their works are vanity and emptiness
  chosen_spanish_reading: todas sus obras son vanidad y vacío
  alternative_spanish_readings:
  - todas sus obras son vanidad y nada
  - todas sus obras son vanidad y vacuidad
  rationale: ‘Vacío’ reproduce la segunda cola del paralelismo sin introducir un sentido más fuerte que el del texto, y mantiene la cadencia formal del POB.
  doctrine_reference: Eclesiastés 1:2; Salmo 94:11
translation_notes:
  revision_awareness: 'La versión inglesa reciente ajustó ‘over the graves’ a ‘in the graves’ para alinearse más con el ge''ez, y ‘nothingness’ a ‘emptiness’ para un par más natural. La traducción española sigue esos dos ajustes: ‘en las tumbas’ y ‘vacío’.'
  spanish_consistency_notes:
  - Se mantiene ‘demonios’ para ἀγγέλους/espíritus malignos en este contexto porque el pasaje describe adoración ilícita.
  - Se evita ‘SEÑOR’ porque no hay aquí un equivalente del nombre divino.
  - ‘Muertos’ se conserva en plural para reflejar el objeto cultual colectivo del texto.
  - El orden y la repetición de ‘sus sacrificios’ reproducen la estructura enfática del original.
