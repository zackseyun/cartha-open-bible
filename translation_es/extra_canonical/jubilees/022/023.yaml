base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/023.yaml
  text: For because of the transgression of Ham, Canaan erred, and all his seed will be destroyed from the earth; and there will be no remnant from him, nor anyone who escapes, on the day of judgment.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:27Z'
    unchanged: false
    changes_summary: Replaced 'one who escapes' with 'anyone who escapes' for more natural formal English. Kept the rest unchanged, as it accurately reflects the source.
translation:
  language: es
  text: Porque, por la transgresión de Cam, Canaán se extravió, y toda su descendencia será borrada de la tierra; y no quedará de él remanente ni nadie que escape, en el día del juicio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እስመ
  english_pob_choice: For because
  chosen_spanish: Porque a causa de
  alternatives_spanish:
  - Pues por
  - Porque por
  lexicon: conjunction causal
  rationale: El texto etiópico introduce una causalidad explícita; en español, «porque a causa de» mantiene la relación causal reforzada sin sonar mecánico. Evita duplicar el sentido con una simple repetición de «por».
- source_word: በአበሳ፡ ካም፡
  english_pob_choice: the transgression of Ham
  chosen_spanish: la transgresión de Cam
  alternatives_spanish:
  - el pecado de Cam
  - la culpa de Cam
  lexicon: noun phrase
  rationale: «Transgresión» conserva el peso jurídico-moral del término sin reducirlo a una simple falla moral; se mantiene el nombre bíblico «Cam» según la forma española estándar.
- source_word: ስሕተ፡ ከናአን፡
  english_pob_choice: Canaan erred
  chosen_spanish: Canaán se extravió
  alternatives_spanish:
  - Canaán erró
  - Canaán se desvió
  lexicon: verbo de desviación moral
  rationale: El verbo etiópico implica desviación/error en conducta; «se extravió» comunica esa pérdida de rumbo moral y preserva una cierta tensión interpretativa sin imponer una lectura más específica que la fuente.
- source_word: ወኵሉ፡ ዘርአ፡
  english_pob_choice: all his seed
  chosen_spanish: toda su descendencia
  alternatives_spanish:
  - toda su simiente
  - todos sus descendientes
  lexicon: collective noun
  rationale: «Descendencia» transmite bien el sustantivo colectivo bíblico y es comprensible en español contemporáneo. «Simiente» sería más literal, pero menos natural para lectura pública.
- source_word: ይደመሰስ፡ እምድር፡
  english_pob_choice: will be destroyed from the earth
  chosen_spanish: será destruida de la tierra
  alternatives_spanish:
  - será borrada de la tierra
  - será eliminada de la tierra
  lexicon: destruction formula
  rationale: La pasiva expresa una eliminación completa desde la esfera terrenal. «Ser destruida de la tierra» conserva la contundencia del original; el femenino concuerda con «descendencia» como colectivo.
- source_word: ወኵሉ፡ ተረፉ፡
  english_pob_choice: there will be no remnant from him
  chosen_spanish: no habrá de él remanente
  alternatives_spanish:
  - no quedará de él remanente
  - no habrá de él resto
  lexicon: remnant term
  rationale: «Remanente» reproduce el lenguaje bíblico técnico de остаток/remnant y deja visible la fuerza totalizadora del enunciado.
- source_word: ወዘይድኅን፡ አልቦ፡ እምኔሁ፡
  english_pob_choice: nor anyone who escapes
  chosen_spanish: ni nadie que escape
  alternatives_spanish:
  - ni quien escape
  - ni ninguno que escape
  lexicon: escape phrase
  rationale: La revisión inglesa optó por «anyone who escapes» para mayor naturalidad; en español, «nadie que escape» preserva esa naturalidad y mantiene el valor universal de la negación.
- source_word: አመ፡ ዕለተ፡ ደይን፡
  english_pob_choice: on the day of judgment
  chosen_spanish: en el día del juicio
  alternatives_spanish:
  - el día del juicio
  - en el día del juicio final
  lexicon: eschatological time phrase
  rationale: «Día del juicio» es la forma más directa y fiel; «final» añadiría una precisión no requerida por el texto.
theological_decisions:
- issue: Alcance de la condena sobre Canaán y su descendencia
  english_pob_reading: Canaan erred, and all his seed will be destroyed from the earth
  chosen_spanish_reading: Canaán se extravió, y toda su descendencia será destruida de la tierra
  alternative_spanish_readings:
  - Canaán erró, y toda su descendencia será destruida de la tierra
  - Canaán se desvió, y toda su descendencia será destruida de la tierra
  rationale: La fuente presenta una conexión causal entre la transgresión de Cam y el extravío/condena de Canaán. La traducción conserva esa relación sin suavizarla ni convertirla en una explicación secundaria. «Se extravió» mantiene la ambigüedad entre error moral y desviación de conducta que el etiópico permite.
  doctrine_reference: Juicio divino y responsabilidad genealógica en la literatura de Jubileos; no se armoniza aquí con lecturas canónicas posteriores.
- issue: Formulación absoluta de ausencia de escape
  english_pob_reading: there will be no remnant from him, nor anyone who escapes
  chosen_spanish_reading: no habrá de él remanente ni nadie que escape
  alternative_spanish_readings:
  - no quedará de él remanente ni nadie que escape
  - no habrá de él remanente ni nadie que se salve
  rationale: Se mantiene la doble negación enfática del texto, evitando diluir el alcance del juicio. «Escape» se traduce sin cargarlo con la idea de salvación, que no aparece en la fuente.
  doctrine_reference: Lenguaje de juicio total en la apocalíptica/intertestamentaria.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada mínimamente para reemplazar «one who escapes» por «anyone who escapes» por naturalidad. La presente traducción refleja ese mismo alcance universal con «nadie que escape», sin añadir notas textuales porque no hay variantes relevantes en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Cam» y «Canaán» en la forma española bíblica estándar.
  - Se conserva el lenguaje de juicio total sin atenuarlo.
  - No se introduce «Cristo», «SEÑOR» ni terminología eclesial ajena al texto.
  - «Descendencia» funciona como colectivo singular, coherente con el verbo en singular femenino en español.
