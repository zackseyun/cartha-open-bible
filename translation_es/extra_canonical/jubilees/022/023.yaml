revisions:
- from: Porque a causa de la transgresión de Cam, Canaán se extravió, y toda su descendencia será destruida de la tierra; y no habrá de él remanente ni nadie que escape, en el día del juicio.
  to: Porque, por la transgresión de Cam, Canaán se extravió, y toda su descendencia será borrada de la tierra; y no quedará de él remanente ni nadie que escape, en el día del juicio.
