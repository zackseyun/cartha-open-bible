review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del ge''ez y del POB inglés: causalidad por la transgresión de Cam, error/desviación de Canaán, destrucción total de su descendencia, ausencia de remanente o escapado, y marco escatológico del día del juicio. Sin embargo, dos giros españoles suenan poco naturales o algo desviados del español bíblico claro: «será destruida de la tierra» y «no habrá de él remanente».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita pulido idiomático. «Porque a causa de» es algo cargado, aunque tolerable; el mayor problema es «será destruida de la tierra», que en español natural pide «destruida de sobre la tierra» o mejor «borrada de la tierra». También «no habrá de él remanente» resulta forzado; «no quedará de él remanente» preserva el tecnicismo bíblico con mejor legibilidad.
  glossary_alignment: No hay términos del glosario principal en conflicto. «Cam», «Canaán», «juicio» y «remanente» están bien. «Se extravió» es aceptable para el verbo de error moral; «descendencia» funciona bien para «seed».
  issues:
  - severity: medium
    issue: «será destruida de la tierra» es poco idiomático en español
    rationale: Aunque intenta seguir de cerca el inglés/source, en español moderno y eclesial suena antinatural. «Será borrada de la tierra» o «será destruida de sobre la tierra» transmite mejor la idea de eliminación total.
  - severity: medium
    issue: «no habrá de él remanente» suena forzado
    rationale: La construcción con «haber de él» no fluye en español actual. «No quedará de él remanente» conserva el valor de remnant y la fuerza totalizante del juicio.
  - severity: low
    issue: «Porque a causa de» duplica la causalidad
    rationale: No es incorrecto, pero es pesado. «Porque, por la transgresión de Cam,» o «Pues por la transgresión de Cam» sería más natural. Aun así, no impide la comprensión.
  revised_spanish_text: Porque, por la transgresión de Cam, Canaán se extravió, y toda su descendencia será borrada de la tierra; y no quedará de él remanente ni nadie que escape, en el día del juicio.
  revision_rationale: 'Se ajustó el español para mayor naturalidad y legibilidad sin cambiar el sentido del original ni del POB inglés: se simplificó la causalidad inicial, se reemplazó una pasiva poco idiomática por «será borrada de la tierra», y se mejoró la expresión del remanente con «no quedará de él remanente». No hacen falta notas.'
