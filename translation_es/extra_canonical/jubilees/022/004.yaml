- from: Y en aquellos días, Ismael vino a ver a su padre, y los dos se juntaron; e Isaac inmoló un sacrificio como ofrenda de agradecimiento y lo presentó sobre el altar que su padre había hecho en Hebrón.
  to: Y en aquellos días, Ismael vino a ver a su padre, y los dos vinieron juntos; e Isaac inmoló un sacrificio como ofrenda de agradecimiento y lo ofreció sobre el altar que su padre había hecho en Hebrón.
  rationale: Se reemplaza 'se juntaron' por 'vinieron juntos' para reflejar mejor el verbo de movimiento conjunto del original y mantener un registro más digno. Se cambia 'lo presentó' por 'lo ofreció' para ajustarse mejor al contexto sacrificial y al inglés POB auditado.
