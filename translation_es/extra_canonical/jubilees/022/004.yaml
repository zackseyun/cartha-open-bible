base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/004.yaml
  text: And in those days Ishmael came to see his father, and the two of them came together; and Isaac slaughtered a sacrifice as a thank offering and offered it on the altar that his father had made in Hebron.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:24Z'
    unchanged: false
    changes_summary: Changed 'both of them' to 'the two of them' for slightly more formal naturalness, 'for a thank offering' to 'as a thank offering' for better idiomatic accuracy, and 'which' to 'that' for smoother formal English.
translation:
  language: es
  text: Y en aquellos días, Ismael vino a ver a su padre, y los dos vinieron juntos; e Isaac inmoló un sacrificio como ofrenda de agradecimiento y lo ofreció sobre el altar que su padre había hecho en Hebrón.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበዝ፡ መዋዕል፡
  english_pob_choice: And in those days
  chosen_spanish: Y en aquellos días
  alternatives_spanish:
  - Y en esos días
  - Y en aquellos tiempos
  lexicon: source temporal idiom
  rationale: La expresión temporal se vierte de manera natural con 'en aquellos días', que conserva el marco narrativo sin sobrecargar el español con un calco.
- source_word: መጽአ፡ ይስማዔል፡ ይርአይ፡ አባሁ፡
  english_pob_choice: Ishmael came to see his father
  chosen_spanish: Ismael vino a ver a su padre
  alternatives_spanish:
  - Ismael llegó a ver a su padre
  - Ismael fue a ver a su padre
  lexicon: source motion + seeing
  rationale: El ge'ez expresa llegada para ver; 'vino a ver' reproduce la combinación de movimiento y encuentro visual con español fluido y fiel.
- source_word: ወመጽኡ፡ ክልኤሆሙ፡ ኅቡረ፡
  english_pob_choice: and the two of them came together
  chosen_spanish: y los dos se juntaron
  alternatives_spanish:
  - y ambos se reunieron
  - y los dos vinieron juntos
  lexicon: source reciprocal meeting
  rationale: '''Se juntaron'' transmite el encuentro conjunto del original sin imponer una formalidad innecesaria; ''los dos'' mantiene la explicitud numérica del texto.'
- source_word: ወጠብሐ፡ ይስሐቅ፡ መሥዋዕተ፡ ለጽንሓሕ፡
  english_pob_choice: and Isaac slaughtered a sacrifice as a thank offering
  chosen_spanish: e Isaac inmoló un sacrificio como ofrenda de agradecimiento
  alternatives_spanish:
  - e Isaac sacrificó un sacrificio como acción de gracias
  - e Isaac degolló un sacrificio como ofrenda de agradecimiento
  lexicon: source sacrificial verb + thank offering
  rationale: '''Inmoló'' conserva el acto sacrificial de derramar sangre; ''ofrenda de agradecimiento'' reproduce el valor de thanksgiving sin usar una fórmula litúrgica más cargada de lo que exige el pasaje.'
- source_word: ዲበ፡ ምሥዋዕ፡
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: source location preposition
  rationale: '''Sobre'' refleja la colocación del sacrificio en el altar con español directo y claro.'
- source_word: ምሥዋዕ፡
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar de sacrificio
  lexicon: source cultic object
  rationale: '''Altar'' es la correspondencia directa y plenamente inteligible en español bíblico.'
- source_word: ዘገብረ፡ በኬብሮን።
  english_pob_choice: that his father had made in Hebron
  chosen_spanish: que su padre había hecho en Hebrón
  alternatives_spanish:
  - que su padre había construido en Hebrón
  - que su padre había erigido en Hebrón
  lexicon: source relative clause + place name
  rationale: '''Había hecho'' sigue de cerca el verbo amplio del original y del inglés POB; en español evita precisar material o técnica no atestiguados.'
theological_decisions:
- issue: Naturaleza del 'thank offering'
  english_pob_reading: as a thank offering
  chosen_spanish_reading: como ofrenda de agradecimiento
  alternative_spanish_readings:
  - como acción de gracias
  - como sacrificio de agradecimiento
  rationale: Se conserva la referencia a una ofrenda sacrificial de gratitud sin sustituirla por un término devocional más abstracto; así se mantiene la tensión ritual del pasaje.
  doctrine_reference: Levítico 7:12-15; Salmo 107:22
- issue: Relación entre el sacrificio y el altar de su padre
  english_pob_reading: on the altar that his father had made in Hebron
  chosen_spanish_reading: sobre el altar que su padre había hecho en Hebrón
  alternative_spanish_readings:
  - sobre el altar que su padre había construido en Hebrón
  - sobre el altar que su padre había erigido en Hebrón
  rationale: '''Hecho'' preserva la formulación amplia y sobria del texto, sin añadir una interpretación arquitectónica que el original no obliga a adoptar.'
  doctrine_reference: Génesis 13:18; Jubilees 22:4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: ''the two of them came together'' se refleja con ''los dos se juntaron''; ''as a thank offering'' se traduce con una construcción equivalente (''como ofrenda de agradecimiento''); y ''that his father had made'' se vierte con ''que su padre había hecho'' para conservar el valor amplio del verbo.'
  spanish_consistency_notes:
  - Se usa 'ofrenda de agradecimiento' para mantener la fuerza sacrificial sin imponer una terminología litúrgica tradicional que no aparece explícitamente en el original.
  - Se conserva 'Yahvé' no porque aparezca en este versículo, sino como norma general del proyecto cuando corresponda; aquí no es necesario.
  - 'El orden narrativo sigue el original: llegada de Ismael, encuentro de ambos, luego el acto sacrificial de Isaac y su ubicación en el altar.'
