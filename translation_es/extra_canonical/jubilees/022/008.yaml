translation:
  language: es
  text: Y ahora te doy gracias, mi Dios, porque me has mostrado este día. He aquí, tengo ciento setenta y cinco años; soy de edad avanzada y completo en días, y todos mis días han sido de paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይእዜኒ / And now
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora pues
  - Y ahora mismo
  lexicon: conjunction/adverbial temporal
  rationale: Mantiene la transición inmediata del original sin añadir matiz inferencial innecesario.
- source_word: አትኃነይ / I thank
  english_pob_choice: I thank you
  chosen_spanish: te doy gracias
  alternatives_spanish:
  - te agradezco
  - te doy alabanzas
  lexicon: gratitude formula
  rationale: «Dar gracias» expresa bien la acción verbal de agradecimiento en español y conserva el destinatario directo.
- source_word: ለከ / you
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: 2nd person pronoun
  rationale: El objeto directo/indirecto pronominal en español es la forma natural y clara aquí.
- source_word: አምላኪየ / my God
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  lexicon: divine address
  rationale: Respeta el vocativo personal sin redundancia idiomática.
- source_word: እስመ / because
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: causal conjunction
  rationale: Introduce la causa de la gratitud de forma directa y natural.
- source_word: አርአይከኒ / you have shown me
  english_pob_choice: you have shown me
  chosen_spanish: me has mostrado
  alternatives_spanish:
  - me has hecho ver
  - me has enseñado
  lexicon: revelation/visual cognition
  rationale: «Mostrar» sigue de cerca el sentido de hacer ver o poner ante la vista, sin sobrerinterpretar como instrucción.
- source_word: ዛተ ዕለተ / this day
  english_pob_choice: this day
  chosen_spanish: esto hoy
  alternatives_spanish:
  - este día
  - hoy
  lexicon: temporal deixis
  rationale: El original alude a lo que ha sido mostrado en el día presente; «esto hoy» preserva la deixis y evita una repetición pesada de «día» más adelante.
- source_word: ፻ወ፸ወ፭ ክረምት / one hundred seventy-five years
  english_pob_choice: one hundred seventy-five years old
  chosen_spanish: ciento setenta y cinco años
  alternatives_spanish:
  - ciento setenta y cinco años de edad
  lexicon: age expression
  rationale: La edad se expresa de forma estándar en español; el contexto ya implica «años de edad».
- source_word: ፍጹመ፡ መዋዕል / complete in days
  english_pob_choice: complete in days
  chosen_spanish: completo en días
  alternatives_spanish:
  - consumado en días
  - pleno de días
  lexicon: Hebraic age formula
  rationale: «Completo en días» conserva la formulación idiomática del original y la tensión hebraizante sin forzar una paráfrasis más interpretativa.
- source_word: ኵሉ መዋዕልየ / all my days
  english_pob_choice: all my days
  chosen_spanish: todos mis días
  alternatives_spanish:
  - todos los días de mi vida
  lexicon: temporal totality
  rationale: Expresa la totalidad de la vida con naturalidad y sin extender el sentido más allá del texto.
- source_word: ኮናኒ ሰላመ / have been peace
  english_pob_choice: have been peace
  chosen_spanish: han sido paz
  alternatives_spanish:
  - han sido paz y tranquilidad
  - han sido de paz
  lexicon: state predication
  rationale: Conserva la predicación nominal del original; «paz» funciona como estado global de vida sin añadir explicaciones.
theological_decisions:
- issue: Declaración de edad y plenitud de vida
  english_pob_reading: Behold, I am one hundred seventy-five years old, advanced and complete in days
  chosen_spanish_reading: He aquí, tengo ciento setenta y cinco años; estoy avanzado y completo en días
  alternative_spanish_readings:
  - He aquí, soy de ciento setenta y cinco años, anciano y completo en días
  - He aquí, tengo ciento setenta y cinco años de edad, consumado en días
  rationale: La frase preserva la auto-descripción de edad y la fórmula tradicional de plenitud de días sin suavizar la expresión hebraizante. «Avanzado» traduce el ajuste editorial del POB para evitar repetir «viejo/old» y mantiene la idea de edad avanzada sin cargarla de connotaciones negativas.
  doctrine_reference: N/A
- issue: Predicación de la vida como paz
  english_pob_reading: and all my days have been peace
  chosen_spanish_reading: y todos mis días han sido paz
  alternative_spanish_readings:
  - y todos mis días han sido de paz
  - y toda mi vida ha sido paz
  rationale: Se mantiene la afirmación literal de una existencia marcada por la paz como cualidad total de los días. No se expande a una interpretación moral o escatológica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB en inglés: cambió la fórmula inicial a «I thank you» y reemplazó «old» por «advanced» para evitar redundancia con la edad numérica. La versión española refleja esa misma intención mediante «te doy gracias» y «estoy avanzado», manteniendo además la fórmula «completo en días».'
  spanish_consistency_notes:
  - Se usa «Dios» y no un equivalente de masking para el nombre divino en este pasaje, porque el texto fuente aquí es una dirección vocativa personal («mi Dios») sin necesidad de reconstrucción del tetragrama.
  - Se evita «anciano» como traducción principal de «old/advanced» para no introducir una tonalidad distinta a la intención editorial del POB; «avanzado» conserva la nota de edad avanzada sin duplicar «años».
  - La estructura semítica «completo en días» se conserva deliberadamente, ya que una paráfrasis como «pleno de vida» borraría la fórmula tradicional presente en el fuente.
