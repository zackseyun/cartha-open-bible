review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del original y del POB inglés: agradecimiento a Dios, motivo causal, declaración de edad, plenitud de días y resumen de una vida en paz. Sin embargo, «me has mostrado esto hoy» no refleja con precisión «you have shown me this day / me has mostrado este día», y «estoy avanzado» suena poco natural e incompleto en español para expresar edad avanzada.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos giros poco naturales: «esto hoy» y «estoy avanzado». Además, «han sido paz» es literalmente defendible, pero en español suena más natural y todavía fiel como «han sido de paz».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «mi Dios» es correcto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión de conservar una fórmula semítica de plenitud de días es aceptable en español.
  issues:
  - severity: medium
    issue: «me has mostrado esto hoy»
    rationale: El original y el POB inglés apuntan a «este día», no a «esto hoy». La redacción actual cambia el objeto mostrado y debilita la referencia temporal específica.
  - severity: medium
    issue: «estoy avanzado»
    rationale: En español general no funciona bien solo para edad; suena elíptico o extraño. «de edad avanzada» conserva el sentido del POB inglés revisado y mejora la legibilidad.
  - severity: low
    issue: «han sido paz»
    rationale: Es muy literal, pero en español resulta rígido. «han sido de paz» preserva el sentido de una vida caracterizada por la paz con mejor naturalidad.
  revised_spanish_text: Y ahora te doy gracias, mi Dios, porque me has mostrado este día. He aquí, tengo ciento setenta y cinco años; soy de edad avanzada y completo en días, y todos mis días han sido de paz.
  revision_rationale: 'Se corrigen dos puntos de fidelidad y naturalidad: «este día» refleja directamente el original, y «soy de edad avanzada» expresa de manera idiomática el sentido de «advanced». También se suaviza «han sido paz» a «han sido de paz», que suena natural en español sin perder el valor aspectual de toda la vida marcada por la paz. No hacen falta notas.'
