base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/025.yaml
  text: Do not fear, my son Jacob, and do not be dismayed, son of Abraham. The Most High God will keep you from corruption, and he will deliver you from every path of error.
  footnotes:
  - marker: a
    text: Or 'from corruption and from every path of error; he will deliver you.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:29Z'
    unchanged: false
    changes_summary: 'Revised the second clause for closer lexical accuracy and completeness: rendered ሙስና as ''corruption'' rather than ''destruction,'' included both prepositional phrases explicitly (''from corruption and from every path of error''), and translated ይባልሕከ as ''he will deliver you.'''
translation:
  language: es
  text: No temas, hijo mío, Jacob, y no te desalientes, hijo de Abraham. El Dios Altísimo te guardará de la corrupción[a] y te librará de todo camino de error.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Corrupción» conserva el sentido amplio del término fuente: deterioro, ruina o corrupción moral, según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አትፍራህ / አትደንግፅ
  english_pob_choice: Do not fear / do not be dismayed
  chosen_spanish: No temas / no te desalientes
  alternatives_spanish:
  - No tengas miedo / no te acobardes
  - No temas / no te espantes
  lexicon: fear; be dismayed; exhortation
  rationale: «No temas» reproduce bien la prohibición de temer; «no te desalientes» comunica el matiz de perder ánimo o quedar abatido, sin cargar innecesariamente con un sentido de terror físico que «espantes» sugeriría en español.
- source_word: ወልድየ፡ ያዕቆብ፤ ወልደ፡ አብርሃም
  english_pob_choice: my son Jacob ... son of Abraham
  chosen_spanish: hijo mío Jacob ... hijo de Abraham
  alternatives_spanish:
  - mi hijo Jacob ... descendiente de Abraham
  - mi hijo Jacob ... hijo de Abraham
  lexicon: son; kinship address
  rationale: 'Se conserva la dirección filial doble del texto: «hijo mío Jacob» para la apelación afectiva, y «hijo de Abraham» para mantener el parentesco y la evocación patriarcal del original.'
- source_word: አምላከ፡ ልዑል
  english_pob_choice: The Most High God
  chosen_spanish: El Dios Altísimo
  alternatives_spanish:
  - El Dios de lo alto
  - Dios Altísimo
  lexicon: Most High God
  rationale: «Dios Altísimo» es la forma natural y fiel para «Most High God» en español bíblico contemporáneo; mantiene el título divino sin oscurecerlo con perífrasis innecesarias.
- source_word: ሙስና
  english_pob_choice: corruption
  chosen_spanish: corrupción
  alternatives_spanish:
  - ruina
  - destrucción
  lexicon: corruption; decay; moral/physical corruption
  rationale: La revisión inglesa corrigió «destruction» a «corruption»; «corrupción» preserva la tensión semántica del término entre deterioro, ruina y corrupción moral, sin imponer una sola lectura más estrecha de la que el fuente exige.
- source_word: ፍኖተ፡ ስሕተት
  english_pob_choice: every path of error
  chosen_spanish: todo camino de error
  alternatives_spanish:
  - toda senda de error
  - toda vía de error
  lexicon: path; error
  rationale: «Camino de error» mantiene la metáfora de la vía o trayectoria desviada. «Todo» refleja bien «every» sin forzar pluralidades en español que sonarían menos naturales aquí.
- source_word: ይባልሕከ
  english_pob_choice: he will deliver you
  chosen_spanish: te librará
  alternatives_spanish:
  - te rescatará
  - te liberará
  lexicon: deliver; rescue
  rationale: «Librar» es un equivalente bíblico claro para «deliver» y funciona con el objeto implícito del peligro o extravío del contexto. Conserva el valor de rescate sin sustituirlo por un registro más técnico o más abstracto.
theological_decisions:
- issue: Título divino «Most High God» en un texto atribuido a la tradición de Jubileos
  english_pob_reading: The Most High God
  chosen_spanish_reading: El Dios Altísimo
  alternative_spanish_readings:
  - Dios Altísimo
  - El Altísimo Dios
  rationale: Se conserva el título superlativo para Dios sin reemplazarlo por un nombre distinto; en español, «El Dios Altísimo» comunica tanto la grandeza como la identidad divina del hablante del texto.
  doctrine_reference: Dios como el Altísimo; lenguaje reverencial bíblico
- issue: Paralelismo de protección y liberación en las dos cláusulas finales
  english_pob_reading: will keep you from corruption, and he will deliver you from every path of error
  chosen_spanish_reading: te guardará de la corrupción y te librará de todo camino de error
  alternative_spanish_readings:
  - te guardará de la corrupción y te rescatará de todo camino de error
  - te preservará de la corrupción y te librará de todo camino de error
  rationale: 'El texto fuente presenta dos acciones paralelas: guardar de la corrupción y librar de la senda errónea. «Guardar» y «librar» reproducen esa estructura sin fusionar ambos complementos en una sola cláusula.'
  doctrine_reference: Providencia protectora; preservación del justo
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «preserve you from destruction» a «keep you from corruption», y luego ajustó la sintaxis para separar claramente las dos cláusulas: «will keep you from corruption, and he will deliver you from every path of error». La traducción española sigue esa lectura revisada y evita mezclar ambos complementos en una sola proposición.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto, pero este versículo no contiene el nombre divino; por eso aquí se traduce simplemente «Dios Altísimo».
  - Se prefirió «librará» para mantener un verbo bíblico natural y concordante con la liberación del error; no se introdujo «Cristo» ni otras formulaciones ajenas al texto.
  - La nota al pie anclada en [a] explica la amplitud semántica de «corrupción» sin alterar el texto principal.
