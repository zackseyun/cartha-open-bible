base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/022/016.yaml
  text: And may he cleanse you from all uncleanness and impurity, so that he may forgive all your transgressions and your sins of ignorance[16]. And may he strengthen you and bless you, and may you inherit the whole earth.
  footnotes:
  - marker: '16'
    text: The phrase rendered 'sins of ignorance' is textually difficult; the Ge'ez seems to distinguish deliberate transgressions from errors done without full knowledge.
    reason: lexical_alternative
  - marker: a
    text: Or 'impurity[16], so that he may forgive all your transgressions and your sins of ignorance.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:25Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y que te limpie de toda inmundicia e impureza, para que perdone todas tus transgresiones y tus pecados de ignorancia[16]. Y que te fortalezca y te bendiga, y que heredes toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '16'
    text: La expresión traducida como 'pecados de ignorancia' es textualmente difícil; el ge'ez parece distinguir entre transgresiones deliberadas y errores cometidos sin pleno conocimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ያንጽሕከ / cleanse
  english_pob_choice: cleanse
  chosen_spanish: te limpie
  alternatives_spanish:
  - te purifique
  - te lave
  lexicon: limpiar
  rationale: El verbo español 'limpiar' mantiene la acción de quitar contaminación/impureza sin introducir una carga ritual más fuerte de la que exige el texto ge'ez.
- source_word: ርኵሰት / uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - inmundicia ritual
  lexicon: inmundicia
  rationale: '''Inmundicia'' conserva el campo semántico de suciedad moral/ritual y evita reducir el término solo a lo ceremonial.'
- source_word: ወርኩስ / impurity
  english_pob_choice: impurity
  chosen_spanish: impureza
  alternatives_spanish:
  - contaminación
  - suciedad
  lexicon: impureza
  rationale: '''Impureza'' es el equivalente más directo y mantiene la distinción con ''inmundicia'' en el par del original.'
- source_word: ያስተስሪ / forgive
  english_pob_choice: forgive
  chosen_spanish: perdone
  alternatives_spanish:
  - perdone
  - borre
  lexicon: perdonar
  rationale: '''Perdone'' expresa el acto de remitir culpas con claridad y se ajusta al paralelismo con ''transgresiones'' y ''pecados''.'
- source_word: አበሳከ / your transgressions
  english_pob_choice: your transgressions
  chosen_spanish: tus transgresiones
  alternatives_spanish:
  - tus rebeliones
  - tus faltas
  lexicon: transgresión
  rationale: '''Transgresiones'' conserva la fuerza jurídica/moral del término y corresponde bien a la opción inglesa auditada.'
- source_word: ዘበአያእምሮ ጌገይከ / sins of ignorance
  english_pob_choice: sins of ignorance
  chosen_spanish: pecados de ignorancia
  alternatives_spanish:
  - pecados por ignorancia
  - faltas cometidas sin saber
  lexicon: pecado
  rationale: Se mantiene la formulación tradicional de sentido, porque el propio audit trail destaca la dificultad textual y la distinción entre pecados deliberados y errores cometidos sin pleno conocimiento.
- source_word: ያኃይለከ / strengthen you
  english_pob_choice: strengthen you
  chosen_spanish: te fortalezca
  alternatives_spanish:
  - te dé fuerzas
  - te robustezca
  lexicon: fortalecer
  rationale: '''Fortalezca'' reproduce el sentido de conferir fuerza, con español natural y sobrio.'
- source_word: ወይባርከ / bless you
  english_pob_choice: bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te bendiga
  - te favorezca
  lexicon: bendecir
  rationale: '''Bendiga'' es el equivalente estándar y fiel para la acción divina de impartir bendición.'
- source_word: ወትረስ ኵላ ምድረ / inherit the whole earth
  english_pob_choice: inherit the whole earth
  chosen_spanish: heredes toda la tierra
  alternatives_spanish:
  - poses toda la tierra
  - recibas toda la tierra como herencia
  lexicon: heredar
  rationale: '''Heredes'' mantiene la imagen patrimonial de posesión recibida, central en el original y en la redacción inglesa.'
theological_decisions:
- issue: Distinción entre impureza ritual/moral y pecados de ignorancia
  english_pob_reading: The Ge'ez seems to distinguish deliberate transgressions from errors done without full knowledge.
  chosen_spanish_reading: El texto distingue entre transgresiones y pecados de ignorancia, sin fusionarlos.
  alternative_spanish_readings:
  - El texto equipara las expresiones como una sola idea de culpa.
  - El texto solo habla de impureza general sin distinción moral.
  rationale: 'La redacción española conserva la doble línea: primero limpieza de impureza/inmundicia, luego perdón de transgresiones y pecados de ignorancia, respetando la tensión textual señalada en la nota inglesa.'
  doctrine_reference: Jubilees 22:16; nota textual POB sobre 'sins of ignorance'
translation_notes:
  revision_awareness: 'Se respetó la corrección reciente del aparato inglés: la nota debe anclarse en ''pecados de ignorancia'' y no en ''impureza''. Por eso el marcador [16] se colocó al final de esa frase en el texto español.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino explícito en el texto fuente.
  - Se usó 'impureza' e 'inmundicia' como par complementario para reflejar dos términos ge'ez distintos, evitando colapsarlos en una sola palabra española.
  - Se prefirió 'heredes' para conservar el matiz de herencia/promesa territorial del cierre del versículo.
