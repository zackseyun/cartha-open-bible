revisions:
- from: Y que él renueve su pacto contigo, para que seas para él un pueblo como herencia por todas las edades, y que él sea Dios para ti y para tu descendencia en verdad y justicia todos los días de la tierra.
  to: Y que él renueve su pacto contigo, para que seas para él un pueblo por herencia para todas las edades, y que él sea Dios para ti y para tu descendencia en verdad y justicia todos los días de la tierra.
  rationale: Se corrige «como herencia» a «por herencia» para evitar un matiz comparativo ajeno a la fuente y preservar la idea de posesión pactal. Se ajusta «por todas las edades» a «para todas las edades» por mayor naturalidad y precisión durativa en español. No se requieren notas al pie porque no se introduce nueva ambigüedad significativa.
