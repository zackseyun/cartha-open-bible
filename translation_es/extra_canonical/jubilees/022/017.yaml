    unchanged: false
    changes_summary: Added 'an' in 'for an inheritance' for more natural English while preserving the source sense; otherwise retained the draft.
translation:
  language: es
  text: Y que él renueve su pacto contigo, para que seas para él un pueblo por herencia para todas las edades, y que él sea Dios para ti y para tu descendencia en verdad y justicia todos los días de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወ*የሐድስ፡ ኪዳኖ፡ ምስሌከ፡
  english_pob_choice: may he renew his covenant with you
  chosen_spanish: renueve su pacto contigo
  alternatives_spanish:
  - renueve su alianza contigo
  - renueve su convenio contigo
  lexicon: קִדּוּשׁ/בְּרִית (conceptual equivalent for covenant)
  rationale: El ge’ez expresa la renovación de un pacto/alianza; «pacto» es claro y fiel en español bíblico, y mantiene el peso relacional y jurídico del término sin suavizarlo a una mera promesa.
- source_word: ትኩኖ፡ ሕዝበ፡ ለርስት፡
  english_pob_choice: you may be for him a people for an inheritance
  chosen_spanish: seas para él un pueblo como herencia
  alternatives_spanish:
  - seas para él un pueblo para herencia
  - seas para él un pueblo de herencia
  lexicon: עם / נחלה
  rationale: «Herencia» conserva la idea de pertenencia heredada o poseída por derecho. En español, «como herencia» comunica mejor la relación idiomática que un calco rígido, sin perder el valor de נחלה/κληρονομία.
- source_word: አምላከ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - ser Dios
  lexicon: θεός / אֱלֹהִים
  rationale: Se mantiene el término estándar «Dios» para preservar la identificación divina sin añadir artículos o perífrasis innecesarias. El paralelismo con el texto base queda natural en español.
- source_word: ዘበሀልወ፡ ወዘበጽድቅ፡
  english_pob_choice: in truth and righteousness
  chosen_spanish: en verdad y justicia
  alternatives_spanish:
  - en verdad y rectitud
  - con verdad y justicia
  lexicon: אֱמֶת / צֶדֶק
  rationale: «Verdad» y «justicia» reproducen de modo directo la pareja semántica y el tono bíblico. «Rectitud» sería posible, pero «justicia» conserva mejor la fuerza covenantal/legal del término.
- source_word: በኵሉ፡ መዋዕለ፡ ምድር።
  english_pob_choice: all the days of the earth
  chosen_spanish: todos los días de la tierra
  alternatives_spanish:
  - durante todos los días de la tierra
  - mientras dure la tierra
  lexicon: לְכָל־יְמֵי הָאָרֶץ
  rationale: La traducción sigue de cerca la imagen temporal del original. «Todos los días de la tierra» conserva la formulación poética y la continuidad de duración que el inglés POB también mantiene.
theological_decisions:
- issue: Relación entre pacto y herencia del pueblo
  english_pob_reading: that you may be for him a people for an inheritance for all ages
  chosen_spanish_reading: para que seas para él un pueblo como herencia por todas las edades
  alternative_spanish_readings:
  - para que seas para él un pueblo para herencia por todas las edades
  - para que seas para él un pueblo de herencia por todas las edades
  rationale: El texto presenta al pueblo como posesión pactal de Dios, no solo como beneficiario pasivo. «Como herencia» preserva la imagen sin convertirla en una abstracción doctrinal.
  doctrine_reference: teología del pacto; elección y posesión del pueblo
- issue: Veracidad y rectitud como marco de la relación divina
  english_pob_reading: in truth and righteousness
  chosen_spanish_reading: en verdad y justicia
  alternative_spanish_readings:
  - en verdad y rectitud
  - con verdad y justicia
  rationale: Se mantiene el doblete moral/jurídico como descripción de la fidelidad divina hacia la descendencia. No se diluye en «bondad» o «fidelidad» porque el texto distingue estos términos.
  doctrine_reference: fidelidad divina; justicia covenantal
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «an» en «for an inheritance» por naturalidad idiomática, sin cambiar el sentido. La presente propuesta sigue esa misma lectura natural en español con «como herencia», manteniendo la relación posesiva/pactual del original.
  spanish_consistency_notes:
  - Se usa «pacto» para ברית/ኪዳን en este pasaje, coherente con el peso jurídico-relacional del original.
  - Se usa «herencia» para נחלה, evitando reducir el pueblo a una metáfora decorativa.
  - Se conserva «Dios» y no se introduce «SEÑOR» porque el texto fuente no usa aquí el nombre divino ocultado por un sustituto.
