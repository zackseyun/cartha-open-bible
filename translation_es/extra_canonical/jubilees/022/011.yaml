  yaml_path: translation/extra_canonical/jubilees/022/011.yaml
  text: And he called Jacob and said, “My son Jacob, may the God of all bless you and strengthen you to do righteousness and his will before him. And may he choose you and your seed, that you may be for him a people of inheritance according to his will all the days.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:55Z'
    unchanged: false
    changes_summary: Changed 'a people for inheritance' to 'a people of inheritance' for more natural and accurate formal English, and smoothed 'for all the days' to 'all the days.'
translation:
  language: es
  text: 'Y llamó a Jacob y dijo: «Hijo mío, Jacob, que el Dios de todos te bendiga y te fortalezca para hacer justicia y su voluntad delante de él. Y que te elija a ti y a tu descendencia, para que sean para él un pueblo de herencia según su voluntad todos los días».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይባርከ / bless
  english_pob_choice: bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te bendiga abundantemente
  - te conceda bendición
  lexicon: bendecir
  rationale: La petición es la fórmula verbal normal en español para el deseo de bendición divina; conserva el matiz optativo del original sin añadir contenido no explicitado.
- source_word: አምላከ ኵሉ / God of all
  english_pob_choice: the God of all
  chosen_spanish: el Dios de todos
  alternatives_spanish:
  - el Dios de todo
  - el Dios de toda cosa
  lexicon: Dios
  rationale: Se conserva la referencia universal del título divino con una construcción natural en español. 'De todos' refleja el alcance total mejor que una paráfrasis más libre.
- source_word: ያኃይለከ / strengthen you
  english_pob_choice: strengthen you
  chosen_spanish: te fortalezca
  alternatives_spanish:
  - te dé fuerzas
  - te capacite
  lexicon: fortalecer
  rationale: '''Fortalecer'' transmite la idea de dar capacidad/fuerza para actuar, y encaja bien con el complemento de finalidad ''para hacer justicia''.'
- source_word: ጽድቅ / righteousness
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia y rectitud
  lexicon: justicia
  rationale: En este contexto práctico y covenantal, 'justicia' comunica la conducta recta y conforme a la voluntad divina; se mantiene la fuerza ética del término sin convertirlo en una abstracción doctrinal.
- source_word: ፈቃዱ / his will
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su querer
  - lo que él quiere
  lexicon: voluntad
  rationale: '''Voluntad'' es la equivalencia más clara y estable en español bíblico para la disposición/querer divino, preservando el paralelo con ''justicia''.'
- source_word: በቅድመ ዚአሁ / before him
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: delante de
  rationale: '''Delante de él'' conserva la localización relacional del original y evita una formulación demasiado idiomática que pudiera borrar la imagen de comparecer ante Dios.'
- source_word: ወይኅረይ / may he choose
  english_pob_choice: may he choose you and your seed
  chosen_spanish: que te elija a ti y a tu descendencia
  alternatives_spanish:
  - que te escoja a ti y a tu descendencia
  - que te seleccione
  lexicon: elegir
  rationale: '''Elegir'' mantiene la idea de selección divina; se usa la duplicación pronominal ''te elija a ti'' para reflejar el énfasis del original y la cadencia del español.'
- source_word: ዘርእከ / your seed
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: descendencia
  rationale: '''Descendencia'' es claro y bíblicamente transparente para lectores modernos, evitando ''simiente'' por su posible oscuridad en español contemporáneo.'
- source_word: ሕዝበ ዘርስት / a people of inheritance
  english_pob_choice: a people of inheritance
  chosen_spanish: un pueblo de herencia
  alternatives_spanish:
  - un pueblo heredado
  - un pueblo para herencia
  lexicon: herencia
  rationale: Se conserva la construcción inusual del original y de la revisión inglesa ('people of inheritance'), evitando diluirla en una expresión más explicativa. 'De herencia' mantiene el vínculo nominal con la noción de pertenencia hereditaria.
- source_word: በኵሉ መዋዕለ / all the days
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - por todos los días
  - todos tus días
  lexicon: todos los días
  rationale: La frase se vierte de manera natural y exacta en español, sin añadir el posesivo 'tus' que no está en el original.
theological_decisions:
- issue: Título divino universal
  english_pob_reading: the God of all
  chosen_spanish_reading: el Dios de todos
  alternative_spanish_readings:
  - el Dios de todo
  rationale: La expresión conserva el alcance universal del título divino y evita limitarlo a un grupo humano concreto; no se sustituye por un equivalente litúrgico que oscurezca el sentido directo del original.
  doctrine_reference: Monoteísmo y soberanía universal de Dios
- issue: Finalidad ética de la bendición
  english_pob_reading: strengthen you to do righteousness and his will before him
  chosen_spanish_reading: te fortalezca para hacer justicia y su voluntad delante de él
  alternative_spanish_readings:
  - te fortalezca para obrar rectamente y hacer su voluntad delante de él
  - te fortalezca para hacer rectitud y su voluntad
  rationale: 'Se mantiene la doble finalidad: capacidad moral (''justicia'') y obediencia a la voluntad divina. No se reduce a mero éxito material ni a bendición genérica.'
  doctrine_reference: Vida obediente / santificación práctica
- issue: Pueblo de herencia
  english_pob_reading: a people of inheritance
  chosen_spanish_reading: un pueblo de herencia
  alternative_spanish_readings:
  - un pueblo para herencia
  - un pueblo heredado
  rationale: Se conserva la tensión del giro nominal, que señala pertenencia y elección divina. La formulación evita normalizar demasiado la frase y respeta la revisión inglesa que precisó el inglés formal sin reinterpretarlo.
  doctrine_reference: Elección y pertenencia del pueblo de Dios
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó 'a people for inheritance' a 'a people of inheritance' y suavizó 'for all the days' a 'all the days'. La traducción española sigue esa lectura revisada con 'un pueblo de herencia' y 'todos los días', manteniendo el tono formal y la estructura optativa del pasaje.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino solo cuando aparezca יהוה/YHWH; aquí no aparece, por lo que se mantiene 'Dios'.
  - Se conserva un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - '''Justicia'' se emplea en sentido ético-covenantal, no solo forense, acorde con el contexto de obediencia.'
  - No se añaden notas de pie porque el pasaje no presenta una variante textual o ambigüedad que requiera anclaje en el texto español.
