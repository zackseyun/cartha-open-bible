translation:
  language: es
  text: Pero tú, hijo mío Jacob, que el Dios Altísimo te ayude, y que el Dios del cielo te bendiga y te aparte de su impureza y de todo su error.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አምላከ፡ ልዑል
  english_pob_choice: the Most High God
  chosen_spanish: el Dios Altísimo
  alternatives_spanish:
  - el Dios Supremo
  - el Altísimo Dios
  lexicon: אֱלֹהִים / θεός -> Dios; epíteto de altura/supremacía -> Altísimo
  rationale: El ge'ez expresa literalmente ‘Dios del Altísimo’/‘Dios Altísimo’ con el calificativo de supremacía. ‘Dios Altísimo’ mantiene el sentido sin forzar una paráfrasis y corresponde bien al valor reverencial que la POB inglesa marcó con ‘Most High God’. En español, ‘el Dios Altísimo’ suena natural y solemne.
- source_word: አምላከ፡ ሰማይ፡
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios del cielo
  alternatives_spanish:
  - el Dios de los cielos
  - el Dios celestial
  lexicon: אֱלֹהִים / θεός -> Dios; genitivo de localización/origen -> del cielo
  rationale: Se conserva la construcción relacional directa del original y de la POB inglesa. ‘Del cielo’ es idiomático y fiel; ‘de los cielos’ sería posible, pero añade pluralidad no exigida por el texto.
- source_word: ይርዳእከ
  english_pob_choice: may ... help you
  chosen_spanish: que ... te ayude
  alternatives_spanish:
  - que ... te socorra
  - que ... te auxilie
  lexicon: verbo de ayuda/socorro -> ayudar
  rationale: La súplica pide asistencia divina; ‘te ayude’ reproduce con claridad la oración benedictiva sin elevar innecesariamente el registro ni cambiar el matiz a rescate urgente.
- source_word: ወያግኅሥከ እምነ
  english_pob_choice: and remove you from
  chosen_spanish: y te aparte de
  alternatives_spanish:
  - y te aleje de
  - y te quite de
  lexicon: verbo de separación/alejamiento -> apartar/alejar
  rationale: El verbo ge'ez expresa alejamiento o exclusión de una condición. ‘Te aparte de’ comunica bien la acción divina de sacar a Jacob de esa esfera, y encaja con la estructura de bendición.
- source_word: ርእዮሙ
  english_pob_choice: their uncleanness
  chosen_spanish: su impureza
  alternatives_spanish:
  - su inmundicia
  - su contaminación
  lexicon: término de impureza ritual/moral -> impureza
  rationale: La POB inglesa eligió ‘uncleanness’, y ‘impureza’ preserva esa amplitud de lo ritual y moral sin cargarlo con un término demasiado técnico. El singular posesivo ‘su’ refleja el referente colectivo de ‘their’ en español natural.
- source_word: ስሕተቶሙ
  english_pob_choice: their error
  chosen_spanish: su error
  alternatives_spanish:
  - su extravío
  - su engaño
  lexicon: desvío/error -> error, extravío
  rationale: ‘Error’ es la opción más directa y sobria para mantener la fuerza general del original. ‘Extravío’ es una alternativa válida, pero ‘error’ conserva la amplitud semántica del texto y coincide con la POB inglesa.
theological_decisions:
- issue: Bendición invocatoria dirigida a Jacob en segunda persona singular
  english_pob_reading: may the ... help you ... bless you ... remove you
  chosen_spanish_reading: que el ... te ayude ... te bendiga ... te aparte
  alternative_spanish_readings:
  - que ... os ayude ... os bendiga ... os aparte
  rationale: El texto es una bendición directa a Jacob, singular. El español mantiene el singular para preservar la dirección personal de la invocación y la continuidad con ‘hijo mío Jacob’.
  doctrine_reference: Bendición patriarcal / oración de intercesión en estilo bíblico
- issue: ‘The God of heaven’ as a divine epithet rather than a separate deity
  english_pob_reading: the God of heaven
  chosen_spanish_reading: el Dios del cielo
  alternative_spanish_readings:
  - el Dios celestial
  rationale: Se conserva el epíteto bíblico como designación del único Dios, no como una entidad distinta. ‘Del cielo’ evita ambigüedad y mantiene la solemnidad del ruego.
  doctrine_reference: Monoteísmo bíblico; epítetos divinos en lenguaje de bendición
- issue: Deliverance from uncleanness and error as moral-ritual separation
  english_pob_reading: remove you from their uncleanness and from all their error
  chosen_spanish_reading: te aparte de su impureza y de todo su error
  alternative_spanish_readings:
  - te libre de su inmundicia y de todo su extravío
  rationale: La oración no solo pide protección externa sino separación de contaminación e inseguridad moral/espiritual. ‘Impureza’ y ‘error’ mantienen ese doble campo sin introducir interpretaciones más fuertes que el texto.
  doctrine_reference: Santificación / preservación de la fidelidad al pacto
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el control cruzado informó alto acuerdo; por tanto, la redacción española sigue de cerca el texto fuente y la POB inglesa sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para אֱלֹהִים/θεός y no se sustituye por ‘SEÑOR’, porque el texto fuente nombra explícitamente a Dios con epítetos.
  - Se preserva la estructura de bendición directa en segunda persona singular.
  - ‘Impureza’ se usa como término amplio para la uncleanness ritual/moral del original, sin precisar más allá de lo que el texto exige.
