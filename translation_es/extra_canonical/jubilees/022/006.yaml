translation:
  language: es
  text: Y también Isaac envió por mano de Jacob a Abraham lo mejor de la ofrenda de acción de gracias, para que comiera y bebiera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፈነወ
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - remitió
  lexicon: send
  rationale: El verbo etíope expresa envío o remisión de algo por medio de una persona. «Envió» conserva la relación de agencia y el movimiento del regalo sin introducir una tonalidad más autoritaria que la del contexto.
- source_word: በእዴ፡ ያዕቆብ
  english_pob_choice: by the hand of Jacob
  chosen_spanish: por mano de Jacob
  alternatives_spanish:
  - por medio de Jacob
  - a través de Jacob
  lexicon: by the hand of
  rationale: La fórmula literal «por mano de» conserva el giro semítico del texto fuente y refleja bien que Jacob fue el intermediario del envío.
- source_word: ዘይሤኒ፡ መሥዋዕተ
  english_pob_choice: the best of the thank offering
  chosen_spanish: de la mejor ofrenda de acción de gracias
  alternatives_spanish:
  - de la mejor porción de la ofrenda de acción de gracias
  - de la ofrenda de acción de gracias, la mejor parte
  lexicon: best / thank offering
  rationale: «Mejor» reproduce el superlativo valorativo del origen; «ofrenda de acción de gracias» conserva el sentido cultual y evita sustituirlo por un término más general como «sacrificio» sin necesidad.
- source_word: ለአብርሃም
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - para Abraham
  lexicon: to
  rationale: La preposición «a» es la más natural en español para destinatario personal y mantiene la sencillez del enunciado.
- source_word: ወይብላዕኒ፡ ወይስተይኒ
  english_pob_choice: that he might eat and drink
  chosen_spanish: para que comiera y bebiera
  alternatives_spanish:
  - para que él comiera y bebiera
  - a fin de que comiera y bebiera
  lexicon: eat and drink
  rationale: La finalidad se expresa con «para que»; el subjuntivo imperfecto transmite bien el propósito. «Comiera y bebiera» es idiomático y fiel al paralelismo del original.
theological_decisions:
- issue: Nature of the gift as cultic thanksgiving offering
  english_pob_reading: thank offering
  chosen_spanish_reading: ofrenda de acción de gracias
  alternative_spanish_readings:
  - ofrenda de gratitud
  - sacrificio de acción de gracias
  rationale: El pasaje no requiere explicitar un tipo sacrificial más técnico que el que ofrece el POB en inglés. «Ofrenda de acción de gracias» conserva la referencia devocional y cultual sin sobreinterpretar.
  doctrine_reference: Cultic terminology in Jubilees; no doctrinal dispute implied in the verse.
- issue: Purpose clause indicating hospitality or sharing
  english_pob_reading: that he might eat and drink
  chosen_spanish_reading: para que comiera y bebiera
  alternative_spanish_readings:
  - para que él comiera y bebiera
  - para comer y beber
  rationale: 'La cláusula final expresa el propósito del envío: que Abraham participara del don. La traducción mantiene la finalidad explícita y no la convierte en una simple coordinación de acciones.'
  doctrine_reference: Narrative purpose in Jubilees 22:6.
translation_notes:
  revision_awareness: The English POB record shows no footnotes and no applied revisions; the cross-check summary reports high agreement and no changes needed, so the Spanish draft follows the source closely without introducing speculative variants.
