  text: of Canaan. How then should we steal any goods? Look, we and our sacks—search them. And with whomever you find the cup in the sack of any one man among us, let him be put to death; and we and our donkeys also will become slaves to our lord.
  revision_pass:
    model: gemini-3.1-pro-preview
    timestamp: '2026-04-23T21:04:36Z'
    unchanged: false
    changes_summary: Changed 'anything' to 'any goods' to accurately reflect the source word ንዋየ (property/goods).
translation:
  language: es
  text: '«De Canaán. ¿Cómo, pues, habríamos de robar algún bien? Mira, nosotros y nuestros sacos: examínalos. Y con aquel en cuyo saco halles la copa entre cualquiera de nosotros, que sea condenado[a] a muerte; y nosotros y nuestros asnos también seremos esclavos de nuestro señor».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sea puesto a muerte».'
    reason: alternative_reading
lexical_decisions:
- source_word: ንዋየ
  english_pob_choice: goods
  chosen_spanish: bien
  alternatives_spanish:
  - mercancía
  - posesiones
  - cosas
  lexicon: n/a
  rationale: The revision pass specifies that the source means property/goods, not an indefinite 'anything'. En Spanish, 'bien' in singular collective use can render 'goods' naturally without narrowing to a specific commodity; plural 'bienes' would be also possible, but singular 'algún bien' preserves the open-ended sense of property without sounding overly technical.
- source_word: ምነተኒ
  english_pob_choice: any goods
  chosen_spanish: algún bien
  alternatives_spanish:
  - algo
  - ningún bien
  - cualquier bien
  lexicon: n/a
  rationale: The English audit trail explicitly corrected 'anything' to 'any goods'. 'Algún bien' best reflects an indefinite object of theft while staying idiomatic in Spanish.
- source_word: ፍትን
  english_pob_choice: search them
  chosen_spanish: examínalos
  alternatives_spanish:
  - búscalos
  - revísalos
  - explóralos
  lexicon: n/a
  rationale: The command is an imperative to inspect the sacks. 'Examínalos' preserves the directness and judicial tone of the challenge better than a looser 'búscalos'.
- source_word: ወአሕስሊነሂ
  english_pob_choice: our donkeys
  chosen_spanish: nuestros asnos
  alternatives_spanish:
  - nuestros burros
  - nuestros animales de carga
  lexicon: n/a
  rationale: '''Asnos'' is the most direct, dignified, and source-faithful rendering of the pack animals named in the source.'
- source_word: አሐዱ ብእሲ
  english_pob_choice: any one man
  chosen_spanish: cualquiera de nosotros
  alternatives_spanish:
  - alguno de nosotros
  - a un hombre entre nosotros
  lexicon: n/a
  rationale: The phrase localizes the threat to the one in whose sack the cup is found. Spanish reads more naturally with 'cualquiera de nosotros' while preserving the distributive force.
theological_decisions:
- issue: Capital punishment for the supposed thief
  english_pob_reading: let him be put to death
  chosen_spanish_reading: que sea condenado a muerte
  alternative_spanish_readings:
  - que muera
  - que sea ejecutado
  - que sea puesto a muerte
  rationale: The source expresses a legal/death-sentence formula. 'Condenado a muerte' keeps the juridical force without adding a specific execution method not present in the source.
  doctrine_reference: legal-juridical wording; no doctrinal expansion
- issue: Servitude to the lord
  english_pob_reading: we and our donkeys also will become slaves to our lord
  chosen_spanish_reading: nosotros y nuestros asnos también seremos esclavos de nuestro señor
  alternative_spanish_readings:
  - seremos siervos
  - quedaremos como esclavos
  rationale: The POB audit trail uses 'slaves' for δοῦλος/serf language when lexical force matters. 'Esclavos' preserves the strong social/legal force of the pledge; 'señor' renders the master without masking the asymmetry.
  doctrine_reference: lexical force of slavery/service terms
translation_notes:
  revision_awareness: The Spanish draft follows the final English revision that changed 'anything' to 'any goods' because the source word ንዋየ means property/goods. No further English-stage doctrinal changes were introduced; the rest of the rendering is built directly from the Ge‘ez source and the audited English phrasing.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exige explícitamente; aquí no aparece el nombre divino.
  - Se conservó «esclavos» por coherencia con la preferencia POB para fuerza léxica de servidumbre.
  - «Sacos» y «copa» siguen la imaginería concreta del relato sin añadir interpretaciones.
  - La nota textual alterna una formulación jurídica más literal sin desplazar el texto principal.
