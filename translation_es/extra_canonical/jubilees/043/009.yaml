base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/043/009.yaml
  text: And they came to Joseph, and all of them bowed down before him with their faces to the ground. And Joseph said to them, "You have done evil." And they said, "What shall we say, and how shall we clear ourselves? Our Lord has found the guilt of your servants."
  footnotes:
  - marker: a
    text: Or 'Our lord has found the guilt of his servants.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:08Z'
    unchanged: false
    changes_summary: Removed 'house' because it is not in the source, changed 'fell before him' to 'bowed down before him' for better lexical accuracy, and completed the final clause by rendering the possessive object as 'his servants.'
translation:
  language: es
  text: 'Y llegaron a José, y todos se inclinaron ante él con el rostro en tierra. Y José les dijo: «Han hecho mal». Y ellos dijeron: «¿Qué diremos, y cómo nos justificaremos? Nuestro Señor ha hallado la culpa de tus siervos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la culpa de vuestros siervos».
    reason: variation_in_spanish_address
lexical_decisions:
- source_word: ወሰገዱ ... በገጾሙ ውስተ ምድር
  english_pob_choice: bowed down before him with their faces to the ground
  chosen_spanish: se inclinaron ante él con el rostro en tierra
  alternatives_spanish:
  - se postraron ante él con el rostro en tierra
  - se inclinaron delante de él, con la cara pegada al suelo
  lexicon: inclinarse / postrarse; rostro en tierra
  rationale: El ge'ez expresa una reverencia corporal completa. 'Se inclinaron' conserva el gesto sin imponer un matiz más ritual que el texto no exige; 'con el rostro en tierra' reproduce la imagen corporal del original y del inglés POB.
- source_word: እኩየ ገበርክሙ
  english_pob_choice: You have done evil
  chosen_spanish: Han hecho mal
  alternatives_spanish:
  - Han obrado mal
  - Han hecho lo malo
  lexicon: hacer mal
  rationale: El valor directo es acusatorio y moral. 'Han hecho mal' es breve, natural y suficientemente fuerte; evita suavizar el juicio a una mera imprudencia.
- source_word: ምነት ንበል ወምነት ንትዋቀስ
  english_pob_choice: What shall we say, and how shall we clear ourselves?
  chosen_spanish: ¿Qué diremos, y cómo nos justificaremos?
  alternatives_spanish:
  - ¿Qué diremos, y cómo nos defenderemos?
  - ¿Qué diremos, y cómo nos limpiaremos de culpa?
  lexicon: justificarse
  rationale: La pregunta pide cómo responder ante la acusación y cómo quedar exentos de culpa. 'Justificarnos' mantiene el matiz jurídico de 'clear ourselves' mejor que un simple 'defendernos'.
- source_word: እግዚእነ
  english_pob_choice: Our Lord
  chosen_spanish: Nuestro Señor
  alternatives_spanish:
  - Nuestro Dueño
  - Nuestro Amo
  lexicon: Señor
  rationale: El contexto y la revisión del inglés POB indican que aquí la frase se refiere a Dios, no a José. En español, 'Nuestro Señor' conserva esa referencia reverente; se evita 'señor' en minúscula por la ambigüedad humana.
- source_word: አበሳሆሙ
  english_pob_choice: the guilt of your servants
  chosen_spanish: la culpa de sus siervos
  alternatives_spanish:
  - la culpa de sus esclavos
  - el pecado de sus siervos
  lexicon: culpa / siervos
  rationale: '''Culpa'' sigue la elección inglesa y encaja con el paralelo de Génesis 44:16. ''Siervos'' suaviza el peso de δοῦλος-like language, pero aquí el ge''ez y el contexto cortés ante una autoridad permiten esta forma como auto-denominación humilde; ''esclavos'' sería demasiado duro para esta fórmula de deferencia.'
theological_decisions:
- issue: Referente de 'Our Lord'
  english_pob_reading: Our Lord has found the guilt of your servants.
  chosen_spanish_reading: Nuestro Señor ha hallado la culpa de sus siervos.
  alternative_spanish_readings:
  - Nuestro Señor ha hallado la culpa de vuestros siervos.
  - Nuestro Señor ha hallado nuestra culpa.
  rationale: La revisión inglesa más reciente corrige el referente a Dios. En español, 'Nuestro Señor' comunica ese referente divino; se conserva la dependencia reverente en tercera persona porque el discurso está dirigido a José pero atribuye el hallazgo final a Dios.
  doctrine_reference: Genesis 44:16 parallel; divine providence and revelation of guilt
- issue: Valor de la fórmula de autodenominación humilde
  english_pob_reading: your servants
  chosen_spanish_reading: sus siervos
  alternative_spanish_readings:
  - vuestros siervos
  - los siervos de usted
  rationale: La expresión es una fórmula de sumisión delante de una autoridad superior. 'Sus siervos' mantiene el tono respetuoso sin forzar un registro excesivamente arcaico; en contexto, el posesivo español puede sonar reverencial y no necesita especificar el poseedor con pronombre explícito.
  doctrine_reference: Courtly speech / deferential address in biblical narrative
translation_notes:
  revision_awareness: La base inglesa fue revisada para quitar 'house', corregir 'fell before him' a 'bowed down before him' y, sobre todo, ajustar la cláusula final para que el referente sea 'Our Lord' = Dios y el objeto sea 'your servants'. La traducción española sigue esa lectura corregida y evita fijar la variante antigua con 'lord' humano.
  spanish_consistency_notes:
  - Se usa 'José' y no 'Joseph' conforme al estándar español del proyecto.
  - Se mantiene 'Señor' con mayúscula para reflejar el referente divino indicado por la auditoría revisada.
  - '''Culpa'' se emplea de manera consistente con el campo semántico judicial del pasaje.'
  - No se introduce 'casa' porque el texto fuente revisado no la contiene.
