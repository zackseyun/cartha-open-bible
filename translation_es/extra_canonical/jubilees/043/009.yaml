review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del ge''ez y del English POB en casi toda la frase: llegada a José, reverencia corporal, acusación de haber obrado mal, y la doble pregunta sobre qué decir y cómo quedar exentos de culpa. Sin embargo, falla en el tramo final más importante del registro: el English POB auditado corrigió explícitamente ''your servants'', y el español mantiene ''sus siervos'', desplazando el referente y perdiendo la autoidentificación directa de los hermanos ante José. La nota al pie invierte erróneamente la lectura principal y la alternativa.'
  spanish_quality_summary: El español es claro y natural. 'Con el rostro en tierra' y '¿cómo nos justificaremos?' son legibles y dignos. No obstante, 'sus siervos' en discurso directo dirigido a José suena ambiguo en español y contradice el sentido contextual. También conviene alinear la nota con la lectura principal correcta. El resto del estilo es adecuado para una Biblia eclesial moderna.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. La principal cuestión léxica es la fórmula de sumisión: aquí debe reflejarse como ''tus siervos'' o ''vuestros siervos'', no ''sus siervos''. ''Siervos'' es aceptable en esta fórmula cortesana; no es necesario forzar ''esclavos'' en este contexto narrativo. ''Nuestro Señor'' para referencia divina es correcto según la revisión inglesa y el paralelo de Génesis 44:16.'
  issues:
  - severity: high
    issue: El texto principal dice 'la culpa de sus siervos' en lugar de 'la culpa de tus/vuestros siervos'.
    rationale: Esto contradice la revisión auditada del English POB, que corrigió precisamente ese punto. En el contexto, los hermanos hablan a José y se refieren a sí mismos como sus siervos; 'sus' introduce ambigüedad o un referente equivocado.
  - severity: medium
    issue: La nota al pie presenta como alternativa la lectura correcta y deja como principal la incorrecta.
    rationale: La nota 'O «la culpa de vuestros siervos»' invierte la jerarquía textual documentada. Si se conserva nota, la principal debe ser la lectura correcta; la alternativa podría reflejar 'tus siervos'/'vuestros siervos' como variación de tratamiento en español, no 'sus siervos'.
  - severity: low
    issue: Posible mejora estilística en la fórmula de tratamiento.
    rationale: Dado que el resto del diálogo usa 'les dijo' y no marca voseo ni distinción peninsular, 'tus siervos' resulta más natural en español bíblico neutral que 'vuestros siervos'. Pero ambas conservan el sentido mejor que 'sus siervos'.
