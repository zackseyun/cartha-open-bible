translation:
  language: es
  text: Y José vio que el corazón de todos era uno, cada uno con el otro, para bien; y lloró,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወርእየ፡ ዮሴፍ፡
  english_pob_choice: And Joseph saw
  chosen_spanish: Y José vio
  alternatives_spanish:
  - Y José miró
  - José vio
  lexicon: verb of seeing; proper name Joseph
  rationale: El ge'ez expresa percepción visual directa; «vio» es la correspondencia natural y fiel al inglés POB, sin añadir matices de observación reflexiva que «miró» podría sugerir.
- source_word: ልበ፡ ኵሎሙ፡
  english_pob_choice: the heart of all of them
  chosen_spanish: el corazón de todos
  alternatives_spanish:
  - el corazón de todos ellos
  - el corazón de cada uno
  lexicon: heart = center of inner life / intention
  rationale: «Corazón» conserva el valor antropológico-bíblico de centro interior, voluntad o disposición. «De todos» refleja el plural sin recargar el español con un pronombre innecesario.
- source_word: ዕሩይ፡ ብእሲ፡ ምስለ፡ ካልኡ፡
  english_pob_choice: was united, each man with the other
  chosen_spanish: estaba unido, cada hombre con el otro
  alternatives_spanish:
  - estaba concorde, cada uno con el otro
  - era uno, cada hombre con el otro
  lexicon: united / each man with the other
  rationale: «Unido» reproduce la idea de cohesión interna y concordia del grupo. Se mantiene la expresión distributiva «cada hombre con el otro» porque el POB inglés la conserva y el ge'ez enfatiza la relación mutua.
- source_word: ለሠናይ
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para lo bueno
  - en bien
  lexicon: good = benefit / favorable outcome
  rationale: «Para bien» es la forma más natural en español para expresar finalidad o resultado favorable sin introducir una interpretación excesiva. Preserva el alcance relacional y moral de la frase.
- source_word: ወበአከ፡
  english_pob_choice: and he wept
  chosen_spanish: y lloró
  alternatives_spanish:
  - y lloró amargamente
  - y se echó a llorar
  lexicon: weep / wept
  rationale: El verbo simple «lloró» comunica fielmente la acción sin añadir intensidad no atestiguada en el texto. Mantiene el paralelismo con la brevedad del original y del POB inglés.
theological_decisions:
- issue: Unidad interior del grupo como signo moral
  english_pob_reading: the heart of all of them was united
  chosen_spanish_reading: el corazón de todos estaba unido
  alternative_spanish_readings:
  - el corazón de todos era uno
  - todos tenían un mismo corazón
  rationale: La formulación conserva la tensión entre una unidad interior real y una descripción corporativa del grupo. No se suaviza a una mera amistad externa, porque el texto habla del centro interior compartido.
  doctrine_reference: Sabiduría bíblica sobre concordia/fraternidad; no dogmático, pero sí antropología bíblica
- issue: Sentido de 'for good'
  english_pob_reading: for good
  chosen_spanish_reading: para bien
  alternative_spanish_readings:
  - para el bien
  - con buen propósito
  rationale: Se evita concretar indebidamente si se trata de benevolencia moral, beneficio práctico o ambas cosas. «Para bien» mantiene esa amplitud semántica.
  doctrine_reference: Providencia y benevolencia en narrativa bíblica
translation_notes:
  revision_awareness: La revisión más reciente indica que el inglés POB y el testimonio fuente están en alta concordancia y que no se requirieron cambios; por tanto, el español sigue de cerca esa lectura sin introducir expansiones.
  spanish_consistency_notes:
  - Se mantiene «José» para Ἰωσήφ/יוסף según el estándar español del proyecto.
  - Se conserva «corazón» como término antropológico central, no reducido a mero afecto.
  - No se añaden notas textuales porque no hay variantes ni tensiones documentadas en el paquete fuente proporcionado.
