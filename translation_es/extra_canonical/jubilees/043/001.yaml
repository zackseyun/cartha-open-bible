    text: Or "put each man's money in the middle of his bag".
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:37Z'
    unchanged: false
    changes_summary: Changed 'considered a plan' to 'devised a plan' for more natural and precise English; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: 'Y José ideó un plan para poder conocer sus pensamientos, si había entre ellos un pensamiento de paz. Y dijo al hombre que estaba a cargo de su casa: “Llena todos sus sacos de grano, y vuelve a poner su dinero en medio de sus sacos[a]; y pon mi copa de plata, la copa de la que bebo, en el saco del menor”. Y los despidió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: “vuelve a poner el dinero de cada uno en medio de su bolsa”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወሐለየ፡ ... ሕሊና፡
  english_pob_choice: devised a plan by which he might know their thoughts
  chosen_spanish: ideó un plan para poder conocer sus pensamientos
  alternatives_spanish:
  - pensó un plan para conocer sus pensamientos
  - concibió un plan para conocer sus pensamientos
  lexicon: ḥlina / cognate phrase of intent and thought; plan-making verb in context
  rationale: El ge'ez expresa una intención deliberada de José para discernir sus pensamientos; “ideó un plan” conserva la iniciativa deliberada sin forzar un sentido meramente mental de “pensó”. “Conocer sus pensamientos” sigue el valor de discernir lo interior, no solo observar conducta.
- source_word: እመ፡ ቦሙ፡ ሕሊና፡ ሰላም፡
  english_pob_choice: whether there was a thought of peace among them
  chosen_spanish: si había entre ellos un pensamiento de paz
  alternatives_spanish:
  - si había entre ellos paz
  - si había entre ellos un ánimo de paz
  lexicon: ḥlina + salām
  rationale: Se mantiene la repetición de “pensamiento” para reflejar el paralelismo con el texto fuente y la posible tensión entre una disposición interna y una paz relacional. “Pensamiento de paz” es más literal y transparente que simplificar a “paz”.
- source_word: ለብእሲ፡ ዘላዕለ፡ ቤቱ፡
  english_pob_choice: the man who was over his house
  chosen_spanish: el hombre que estaba sobre su casa
  alternatives_spanish:
  - el hombre que estaba a cargo de su casa
  - el hombre que gobernaba su casa
  lexicon: פקיד-idiom / household overseer
  rationale: “Estaba sobre su casa” preserva la construcción semítica/etiópica del original y la decisión auditada del POB inglés, que evita domesticarla demasiado. En español, “a cargo de” sería más natural, pero menos fuente-cercano.
- source_word: ኵሎ፡ አሕስሊሆሙ፡ እክለ፡
  english_pob_choice: Fill all their sacks with grain
  chosen_spanish: Llena todos sus costales de grano
  alternatives_spanish:
  - Llena todos sus sacos de grano
  - Llena todos sus costales con grano
  lexicon: sack / grain
  rationale: “Costales” funciona bien en español bíblico y conserva un objeto de carga grande; “grano” traduce directamente እክለ፡ sin expandir a “alimento” o “víveres”.
- source_word: ወ*ወርቆሙኒ፡ አግብእ፡ ሎሙ፡ ማእከለ፡ መዋዲቶሙ፡
  english_pob_choice: put their money back in the middle of their bags
  chosen_spanish: vuelve a poner su dinero en medio de sus bolsas
  alternatives_spanish:
  - devuelve su dinero al centro de sus bolsas
  - pon otra vez su dinero en medio de sus bolsas
  lexicon: warq / money; return-put-back phrase
  rationale: 'Se sigue la corrección revisada del audit trail: el ge''ez tiene plural “su dinero” y “sus bolsas”, y el verbo comunica devolución, no solo colocación. “Vuelve a poner” conserva el matiz de reponerlo, aunque “bolsas” puede sonar menos bíblico que “costales”; aquí se mantiene por fidelidad al plural fuente.'
- source_word: ወኮራየ፡ ... ዘ*ብሩር፡
  english_pob_choice: my silver cup, the cup from which I drink
  chosen_spanish: mi copa de plata, la copa de la que bebo
  alternatives_spanish:
  - mi copa de plata, la copa con que bebo
  - mi copa de plata, la copa de la cual bebo
  lexicon: kōrāy / silver cup
  rationale: “Copa de plata” refleja el material explícito del texto; “la copa de la que bebo” preserva la relación funcional sin añadir una lectura ceremonial.
- source_word: ወፈነዎሙ።
  english_pob_choice: And he sent them away
  chosen_spanish: Y los despidió
  alternatives_spanish:
  - Y los envió
  - Y los mandó salir
  lexicon: send away / dismiss
  rationale: El verbo final indica despedida/envío. “Los despidió” suena natural y conserva la acción de dejarlos partir sin exagerar la intención.
theological_decisions:
- issue: Discerning whether the brothers had a peaceful disposition
  english_pob_reading: whether there was a thought of peace among them
  chosen_spanish_reading: si había entre ellos un pensamiento de paz
  alternative_spanish_readings:
  - si había entre ellos paz
  - si tenían intenciones pacíficas
  rationale: La formulación conserva la tensión del original entre estado interno y relación externa. “Pensamiento de paz” no fuerza una interpretación más amplia ni reduce el sentido a una simple ausencia de conflicto.
  doctrine_reference: lexical-semantics / narrative characterization
translation_notes:
  revision_awareness: 'La redacción refleja la revisión más reciente del POB inglés: se siguió la corrección que restituyó el plural de ''their money'' y ''their bags'' en lugar del singular anterior, y se mantuvo el ajuste de ''devised a plan'' como acción deliberada de José.'
  spanish_consistency_notes:
  - Se eligió 'José' para el nombre propio conforme al uso español habitual y al equivalente del inglés POB.
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usó puntuación de diálogo con comillas latinas para claridad editorial y lectura eclesial en español.
  - '''Costales'' y ''bolsas'' reproducen el cambio de términos del original sin armonizarlos artificialmente; esto conserva la diversidad léxica del pasaje.'
