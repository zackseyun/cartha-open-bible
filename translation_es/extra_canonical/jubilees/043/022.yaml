translation:
  language: es
  text: Y por orden de Faraón les dio carros y provisiones para el viaje.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በቃለ፡ አፈ፡ ፈርዖን፡
  english_pob_choice: by the command of Pharaoh
  chosen_spanish: por orden de Faraón
  alternatives_spanish:
  - por la palabra de Faraón
  - según la orden de Faraón
  lexicon: Command/royal order
  rationale: La expresión ge'ez corresponde a una orden o mandato emitido por Faraón; en español, 'por orden de Faraón' comunica de forma natural la relación de autoridad sin introducir una formulación más dura o más arcaica que el original no exige.
- source_word: ሰረገላተ፡
  english_pob_choice: wagons
  chosen_spanish: carros
  alternatives_spanish:
  - carretas
  - carrozas
  lexicon: Vehicle for transport
  rationale: El término designa vehículos para transporte; 'carros' es la opción más neutral y comprensible en español bíblico moderno, sin forzar una especificación técnica que el contexto no da.
- source_word: ወስንቀ፡
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - víveres
  - alimentos
  lexicon: Supplies for travel
  rationale: El contexto de viaje requiere suministros; 'provisiones' conserva el alcance amplio del término y evita reducirlo solo a comida, aunque incluye esa idea.
theological_decisions:
- issue: Agency of Pharaoh under divine narrative order
  english_pob_reading: And by the command of Pharaoh he gave them wagons and provisions for the journey.
  chosen_spanish_reading: Y por orden de Faraón les dio carros y provisiones para el viaje.
  alternative_spanish_readings:
  - Y por mandato de Faraón les dio carros y provisiones para el viaje.
  - Y conforme a la orden de Faraón les dio carros y provisiones para el viaje.
  rationale: El versículo presenta una acción administrativa bajo autoridad real, sin carga doctrinal compleja. La redacción española conserva la agencia de Faraón como autoridad humana dentro del relato, sin añadir matices teológicos que el texto no explicita.
  doctrine_reference: Narrative providence/royal authority in biblical historiography
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el original ge'ez y la POB inglesa, con un veredicto de cuestiones menores בלבד; no se documentaron revisiones aplicadas. Por eso la versión española sigue de cerca la lectura inglesa, ajustándola a un español natural y fiel al sentido del original.
  spanish_consistency_notes:
  - Se mantiene 'Faraón' con mayúscula como nombre/título propio en uso bíblico español.
  - '''Carros'' y ''provisiones'' conservan el paralelismo simple del original sin ampliar innecesariamente el contenido.'
  - No se introducen notas al pie porque no hay variantes textuales ni ambigüedades decisivas que el audit trail documente para este verso.
