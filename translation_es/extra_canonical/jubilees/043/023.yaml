    changes_summary: Changed 'colored garments' to 'garments of color' for a more formal rendering of the construct phrase; removed the trailing comma.
translation:
  language: es
  text: Y les dio a todos ellos mudas de ropa[a] y plata. Y a su padre también le envió vestidos y plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Mudas de ropa’ refleja el modismo detrás de la frase; también podría entenderse como ‘vestidos de variedad’ o ‘vestidos de color’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወወሀቦሙ፡ ለኵሎሙ፡ አልባሰ፡ ኅብር፡ ወብሩረ።
  english_pob_choice: And he gave all of them changes of garments and silver.
  chosen_spanish: Y les dio a todos ellos mudas de vestidos y plata.
  alternatives_spanish:
  - Y les dio a todos ellos cambios de vestidos y plata.
  - Y les dio a todos ellos vestidos de variedad y plata.
  - Y les dio a todos ellos vestidos de color y plata.
  lexicon: ኅብር (xebr)
  rationale: La auditoría inglesa decidió por el modismo hebreo paralelo 'changes of garments', no por un sentido literal de color. En español, 'mudas de vestidos' transmite naturalmente la idea de prendas de recambio o cambio de ropa, conservando el valor idiomático sin imponer una descripción cromática que el contexto no exige.
- source_word: ወብሩረ
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - dinero
  - moneda de plata
  - oro
  lexicon: ብር
  rationale: El Ge'ez corresponde a 'silver' y la POB inglesa mantiene el metal, no una abstracción monetaria. 'Plata' es la equivalencia directa y sobria en español.
- source_word: ወለአቡሆሙ*ኒ፡ ፈነወ፡ አልባሰ፡ ውብሩረ።
  english_pob_choice: And to their father also he sent garments and silver.
  chosen_spanish: Y a su padre también le envió vestidos y plata.
  alternatives_spanish:
  - Y a su padre también le envió prendas y plata.
  - Y también envió a su padre vestidos y plata.
  lexicon: አቡሆሙ
  rationale: Conservo la misma estructura que la primera cola y el paralelismo entre 'their father' y 'su padre'. 'Le envió' expresa con claridad el sujeto beneficiario y evita una formulación más pesada.
theological_decisions:
- issue: Representación de la dádiva de prendas como gesto de honor, no como simple mercancía.
  english_pob_reading: And he gave all of them changes of garments and silver. And to their father also he sent garments and silver.
  chosen_spanish_reading: Y les dio a todos ellos mudas de vestidos y plata. Y a su padre también le envió vestidos y plata.
  alternative_spanish_readings:
  - Y les dio a todos ellos cambios de vestidos y plata.
  - Y les dio a todos ellos vestidos de color y plata.
  rationale: El pasaje funciona como un acto de favor y distinción hacia los hermanos y el padre. La opción elegida mantiene ese gesto honorífico sin añadir interpretaciones teológicas ajenas al texto. Evita además reforzar una lectura cromática que la revisión auditada descartó.
  doctrine_reference: Providencia y favor familiar en contexto narrativo; no hay afirmación doctrinal directa, por lo que se preserva el sentido narrativo simple.
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de 'colored garments' a 'garments of color' y luego a 'changes of garments' para reflejar mejor el modismo ge'ez paralelo a Génesis 45:22. La versión española sigue esa decisión final y evita una literalidad cromática que la revisión ya descartó.
  spanish_consistency_notes:
  - Mantengo 'plata' de forma uniforme en ambos miembros del versículo para conservar el paralelismo del original.
  - Uso 'mudas de vestidos' como equivalente idiomático de 'changes of garments' para evitar una traducción mecánica desde el inglés.
  - No introduzco 'Cristo', 'SEÑOR' ni terminología doctrinal ajena; el versículo es narrativo y no contiene un término teológico explícito.
