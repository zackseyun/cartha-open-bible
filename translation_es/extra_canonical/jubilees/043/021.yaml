revisions:
- from: y sobre toda la tierra de Egipto. Y dile a mi padre de todo mi honor y de todo lo que me ha sido dado.
  to: y sobre toda la tierra de Egipto. Y cuéntale a mi padre acerca de todo el honor que he recibido y de todo lo que se me ha dado.
  rationale: Se ajusta la sintaxis para un español más natural y eclesialmente legible, evitando el calco «de todo mi honor». «el honor que he recibido» conserva el sentido de honra/estatus recibido sin introducir expansión interpretativa. Se mantiene la no explicitación del agente en «lo que se me ha dado», conforme al POB revisado.
