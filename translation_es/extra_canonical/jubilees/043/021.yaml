lexical_decisions:
- source_word: “over all the land of Egypt”
  english_pob_choice: and over all the land of Egypt.
  chosen_spanish: y sobre toda la tierra de Egipto.
  alternatives_spanish:
  - y por toda la tierra de Egipto
  - y sobre toda la tierra de Egipto
  lexicon: over = sobre; land = tierra; Egypt = Egipto
  rationale: El ge’ez expresa cobertura o dominio territorial; «sobre toda la tierra de Egipto» mantiene ese sentido con español natural y fiel, sin añadir matices ajenos.
- source_word: “tell”
  english_pob_choice: And tell my father of all my honor and of all that has been given to me.
  chosen_spanish: Y dile a mi padre...
  alternatives_spanish:
  - Y cuéntale a mi padre...
  - Y dile a mi padre...
  lexicon: tell = decir/decirle
  rationale: «Dile a mi padre» conserva el mandato directo del original y encaja mejor con el tono narrativo que una paráfrasis como «cuéntale».
- source_word: “honor”
  english_pob_choice: all my honor
  chosen_spanish: de todo mi honor
  alternatives_spanish:
  - de todo mi honor
  - de toda mi honra
  lexicon: honor = honor
  rationale: Se conserva «honor» porque es transparente en español moderno y refleja adecuadamente el valor de prestigio, dignidad o grandeza personal presente en el contexto.
- source_word: “all that has been given to me”
  english_pob_choice: all that has been given to me
  chosen_spanish: de todo lo que me ha sido dado
  alternatives_spanish:
  - de todo lo que me ha sido dado
  - de todo lo que se me ha dado
  lexicon: given = dar; passive = me ha sido dado
  rationale: La forma pasiva refleja de manera más exacta la idea de recepción sin introducir el agente explícito, igual que el texto final inglés depurado por el POB.
theological_decisions:
- issue: Agent of the gift is not explicit in the final source line
  english_pob_reading: all that has been given to me
  chosen_spanish_reading: todo lo que me ha sido dado
  alternative_spanish_readings:
  - todo lo que Dios me ha dado
  - todo lo que me fue dado
  rationale: Se evita nombrar a Dios porque la línea fuente final no lo dice explícitamente. Esto preserva la redacción más literal adoptada por el POB revisado.
  doctrine_reference: source transparency / non-expansion principle
translation_notes:
  revision_awareness: 'This draft follows the latest English revision that removed the interpretive expansion about wealth and glory and retained the more literal sense of the Ge’ez: a territorial clause followed by a command to tell the father of all honor and of all that has been given.'
  spanish_consistency_notes:
  - Se mantiene «honor» en lugar de «gloria» para no reintroducir la expansión interpretativa eliminada en la revisión inglesa.
  - No se añade el nombre de Dios ni un contenido explicativo adicional, porque el último texto fuente en inglés ya suprimió esa especificación.
  - La sintaxis española conserva dos miembros coordinados por «Y» para reflejar la estructura narrativa simple del original.
