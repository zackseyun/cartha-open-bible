base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/043/019.yaml
  text: for preservation[19], go down, you and your households, so that you may not be consumed by the famine and not be distressed on account of your possessions. For God sent me before you quickly, so that they may live.
  footnotes:
  - marker: '19'
    text: The phrase rendered 'for preservation' could also be understood more specifically as 'for a remnant' or 'for survival.'
    reason: lexical_alternative
  - marker: a
    text: Or 'and not perish'.
    reason: previous_rendering
  - marker: b
    text: Or 'so that he might keep you alive'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:39Z'
    unchanged: false
    changes_summary: Added 'quickly' to reflect ለሠሪዕ, changed 'because of' to the more formal 'on account of,' and supplied the object 'you' with 'keep alive' for completeness and natural English.
translation:
  language: es
  text: Dense prisa y desciendan, ustedes y sus familias, para preservación[a], para que no sean consumidos por el hambre y no se angustien a causa de sus posesiones. Porque Dios me envió delante de ustedes con rapidez, para que vivan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para un remanente» o «para supervivencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשֵׁרִיד / for preservation
  english_pob_choice: for preservation
  chosen_spanish: para preservación
  alternatives_spanish:
  - para un remanente
  - para sobrevivencia
  - para salvación
  lexicon: preservación
  rationale: El sentido base es de conservación/continuidad de vida; ‘preservación’ mantiene la amplitud del inglés POB y permite la nota alternativa de ‘remanente’ o ‘supervivencia’ sin fijar una sola lectura estrecha.
- source_word: πf/imperative 'go down' / Geez imperative
  english_pob_choice: go down
  chosen_spanish: desciendan
  alternatives_spanish:
  - bajen
  - vayan abajo
  - desciendan pronto
  lexicon: descender
  rationale: El mandato de movimiento hacia Egipto se expresa de forma natural en español con ‘desciendan’; conserva el valor direccional sin añadir paráfrasis.
- source_word: households
  english_pob_choice: your households
  chosen_spanish: sus familias
  alternatives_spanish:
  - sus casas
  - sus hogares
  - toda su casa
  lexicon: casa/familia
  rationale: ‘Familias’ comunica bien el grupo doméstico completo en español actual y evita una traducción demasiado material de ‘households’.
- source_word: consumed by the famine
  english_pob_choice: be consumed by the famine
  chosen_spanish: sean consumidos por el hambre
  alternatives_spanish:
  - perezcan por el hambre
  - sean devorados por el hambre
  lexicon: consumir
  rationale: ‘Consumidos’ conserva la fuerza pasiva del verbo y la imagen del hambre como agente devastador, sin suavizarla.
- source_word: be distressed on account of your possessions
  english_pob_choice: be distressed on account of your possessions
  chosen_spanish: se angustien a causa de sus posesiones
  alternatives_spanish:
  - se aflijan por sus posesiones
  - se preocupen por sus bienes
  lexicon: angustiarse
  rationale: La revisión académica corrigió el falso ‘perish’; el ge’ez apunta a tristeza/aflicción/preocupación. ‘Angustiarse’ cubre ese campo semántico y ‘a causa de’ refleja bien la relación causal.
- source_word: God sent me before you quickly
  english_pob_choice: God sent me before you quickly
  chosen_spanish: Dios me envió delante de ustedes con rapidez
  alternatives_spanish:
  - Dios me envió antes que ustedes rápidamente
  - Dios me envió delante de ustedes pronto
  lexicon: enviar delante / rapidez
  rationale: ‘Delante de ustedes’ expresa la prioridad y adelantamiento; ‘con rapidez’ refleja el valor adverbial de ለሠሪዕ mejor que un mero ‘pronto’.
- source_word: they may live
  english_pob_choice: they may live
  chosen_spanish: ellos vivan
  alternatives_spanish:
  - puedan vivir
  - se mantengan con vida
  - vivan
  lexicon: vivir
  rationale: La corrección textual indica plural (‘ellos’) y no un singular causativo. En español, ‘vivan’ mantiene la finalidad y la lectura plural sin sobreinterpretar el agente.
theological_decisions:
- issue: La frase de preservación puede entenderse como ‘remanente’ o ‘supervivencia’ sin perder el sentido providencial.
  english_pob_reading: for preservation
  chosen_spanish_reading: para preservación
  alternative_spanish_readings:
  - para un remanente
  - para sobrevivencia
  rationale: No se estrecha el sentido a una doctrina técnica de ‘remanente’, aunque esa posibilidad queda abierta en nota. La redacción conserva la intención providencial de salvación de vida.
  doctrine_reference: Providencia divina y preservación del pueblo en medio del hambre.
- issue: El destinatario de ‘que ellos vivan’ es plural y no singular.
  english_pob_reading: so that they may live
  chosen_spanish_reading: para que ellos vivan
  alternative_spanish_readings:
  - para que vivan
  - para que tengan vida
  rationale: La revisión indica que el verbo ge’ez es plural y se refiere a las familias y animales. Se mantiene ese plural explícito para no borrar la referencia colectiva.
  doctrine_reference: Cuidado providencial sobre la casa completa, no solo sobre una persona.
- issue: No convertir ‘no se angustien’ en ‘no perezcan’.
  english_pob_reading: and not be distressed
  chosen_spanish_reading: y no se angustien
  alternative_spanish_readings:
  - y no se aflijan
  - y no se preocupen
  rationale: La evidencia revisada corrige un error de traducción. Se preserva la tensión emocional real del texto, que habla de aflicción o inquietud por las posesiones, no de muerte.
  doctrine_reference: Precisión semántica y honestidad textual.
translation_notes:
  revision_awareness: 'La draft sigue la revisión más reciente que corrigió dos puntos críticos: el verbo ge’ez ተከዘ significa ‘estar angustiado/afligido’, no ‘perecer’; y ይሕየዉ es plural (‘ellos vivan’), no un singular causativo. También incorpora la observación de alineación de notas: la nota de ‘preservación’ se ancla en la frase correspondiente, no en el mandato inicial.'
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para እግዚአብሔር/אלהים según el estándar del proyecto.
  - Se usa español neutral y eclesialmente legible, evitando giros arcaizantes innecesarios.
  - ‘Desciendan’ respeta el movimiento geográfico implícito sin ampliar el texto.
  - No se introduce ‘Cristo’, ‘SEÑOR’ ni otros equivalentes no requeridos por el original.
