review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general y las correcciones clave del rastro POB: distingue correctamente entre ser consumidos por el hambre y angustiarse por las posesiones, y conserva el plural final «para que ... vivan». Sin embargo, hay un desajuste importante en la ubicación semántica de «para preservación»: en la evidencia inglesa auditada, esa idea corresponde a la nota léxica asociada al término ge''ez relevante, mientras que la cláusula principal también exige conservar el matiz adverbial de rapidez en el envío. En español, la secuencia actual «para preservación, desciendan...» suena mal vinculada sintácticamente y menos fiel a la progresión del texto.'
  spanish_quality_summary: El texto es mayormente claro, pero «para preservación» al inicio resulta poco natural en español y crea una frase difícil de leer. «Con rapidez» es aceptable, pero la oración fluye mejor si se mantiene el imperativo inicial de prisa y luego el descenso. También conviene simplificar el final a «para que vivan», ya que «ellos» no es necesario en español y suena algo pesado.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Dios» está bien. Las opciones «familias», «hambre», «posesiones» y «vivan» son compatibles con el sentido fuente. La nota alternativa sobre «preservación / remanente / supervivencia» debe conservarse, pero anclada en la frase correcta y con una formulación española más natural.
  issues:
  - severity: high
    issue: 'Inicio español mal estructurado: «para preservación[a], desciendan...»'
    rationale: Aunque el rastro inglés conserva «for preservation» con nota, en español esa colocación inicial produce una construcción torpe y poco idiomática. El mandato inicial ge'ez exige primero un llamado urgente a bajar; la idea léxica de preservación debe preservarse de manera inteligible, no como calco extraño.
  - severity: medium
    issue: El borrador omite el valor exhortativo inicial de prisa como mandato independiente
    rationale: La evidencia ge'ez comienza con un elemento de urgencia («Hurry» / «quickly»). El español actual solo retiene «con rapidez» más adelante, lo cual deja débil el arranque imperativo del versículo.
  - severity: low
    issue: Pronombre explícito «ellos» en «para que ellos vivan»
    rationale: El plural debe mantenerse, pero en español «para que vivan» ya expresa ese plural con más naturalidad. El pronombre explícito no añade claridad suficiente.
  - severity: low
    issue: La nota b introduce una gama de sinónimos no preservada por el audit trail inglés
    rationale: La nota inglesa conservada en este estado no exige una nota española adicional sobre «angustien». Puede retirarse para evitar sobreanotar donde no hay ambigüedad nueva en español.
  revised_spanish_text: Dense prisa y desciendan, ustedes y sus familias, para preservación[a], para que no sean consumidos por el hambre y no se angustien a causa de sus posesiones. Porque Dios me envió delante de ustedes con rapidez, para que vivan.
  revised_footnotes:
  - marker: a
    text: 'O: «para un remanente» o «para supervivencia».'
    reason: lexical_alternative
  revision_rationale: Se reordenó la oración para que el español conserve tanto la urgencia inicial del ge'ez como la nota léxica sobre «preservación» sin producir una construcción antinatural. Se eliminó la nota secundaria sobre «angustien» porque no es necesaria para reflejar el estado auditado. Se simplificó el final a «para que vivan», manteniendo el plural de manera idiomática.
