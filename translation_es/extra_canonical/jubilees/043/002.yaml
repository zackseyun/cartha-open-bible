translation:
  language: es
  text: Y él hizo como José le había dicho, y llenó todos sus costales[a] con grano, y puso su dinero en sus costales; y puso la copa en el costal de Benjamín. Y al amanecer, se fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llenó todos sus costales con grano y su dinero, y lo puso en sus costales».'
    reason: alternative_reading
lexical_decisions:
- source_word: filled all their sacks with grain
  english_pob_choice: filled all their sacks with grain
  chosen_spanish: llenó todos sus costales con grano
  alternatives_spanish:
  - llenó todos sus sacos con grano
  - llenó todos sus costales de grano
  lexicon: llenar; costal/saco; grano
  rationale: La sintaxis ge'ez separa la acción de llenar los recipientes con grano de la acción siguiente de poner el dinero. 'Costales' comunica bien el recipiente de viaje en español general; 'sacos' es posible, pero 'costales' suena más natural en este contexto narrativo.
- source_word: their money in their sacks
  english_pob_choice: put their money in their sacks
  chosen_spanish: puso su dinero en sus costales
  alternatives_spanish:
  - puso el dinero en sus costales
  - puso su dinero en los costales
  lexicon: poner; dinero
  rationale: Se mantiene el objeto poseído por ellos, como en el inglés POB. En español, 'su dinero' conserva la referencia colectiva sin necesidad de repetir 'el dinero'.
- source_word: put the cup in Benjamin's sack
  english_pob_choice: he put the cup in Benjamin's sack
  chosen_spanish: puso la copa en el costal de Benjamín
  alternatives_spanish:
  - puso la copa en el saco de Benjamín
  - puso la copa en la bolsa de Benjamín
  lexicon: copa; costal/saco
  rationale: '''Copa'' sigue el valor del objeto en el relato. ''Costal de Benjamín'' es una forma natural y clara para el recipiente individual.'
- source_word: when morning dawned
  english_pob_choice: when morning dawned
  chosen_spanish: Y cuando amanecía
  alternatives_spanish:
  - Y cuando despuntó la mañana
  - Y al amanecer
  lexicon: amanecer
  rationale: '''Amanecía'' reproduce bien el inicio del alba con un español fluido. ''Al amanecer'' sería también correcto, pero menos narrativo aquí.'
theological_decisions:
- issue: None substantive; narrative report of obedience and concealment
  english_pob_reading: And he did as Joseph told him
  chosen_spanish_reading: Y él hizo como José le había dicho
  alternative_spanish_readings:
  - Y hizo lo que José le había dicho
  - Y procedió como José le había dicho
  rationale: No hay tensión teológica especial en este versículo; se preserva la obediencia explícita al mandato de José con una formulación directa y natural.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'La revisión más reciente del inglés ajustó la sintaxis para separar mejor las dos acciones: primero llenar los sacos con grano, luego poner el dinero en ellos. La presente traducción sigue esa separación y evita la ambigüedad que tendría agrupar ''grano y dinero'' bajo un solo verbo.'
  spanish_consistency_notes:
  - Se mantiene 'José' como forma estable del nombre propio.
  - Se usa 'Benjamín' para el nombre propio y 'copa' para el objeto, sin sustituir por terminología litúrgica.
  - 'El texto conserva el orden narrativo de acciones del original: obediencia, llenado con grano, colocación del dinero, colocación de la copa, salida al amanecer.'
