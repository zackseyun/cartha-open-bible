revisions:
- from: 'Y Judá dijo: «Te ruego, mi señor, que tu siervo hable una palabra al oído de mi señor. Su madre dio a luz dos hermanos[a] a tu siervo, nuestro padre. Uno salió y se perdió, y nadie lo ha hallado; y él solo queda de su madre, y tu siervo…»'
  to: 'Y Judá dijo: «Te ruego, mi señor, que tu siervo hable una palabra ante mi señor. Su madre dio a luz dos hermanos[a] a tu siervo, nuestro padre. Uno salió y se perdió, y nadie lo ha hallado; y solo él queda de su madre, y tu siervo…»'
  rationale: 'Se hicieron dos ajustes menores de estilo para un español más natural sin apartarse de la fuente: «ante mi señor» en lugar de «al oído de mi señor» para reflejar mejor la fórmula de audiencia respetuosa, y «solo él queda» en lugar de «él solo queda» por fluidez. Se mantuvo la estructura revisada exigida por la auditoría: «Su madre dio a luz dos hermanos a tu siervo, nuestro padre» y la elipsis final.'
