  text: And Judah said, "I beg you, my lord, let your servant speak a word in my lord's hearing. His mother bore two brothers to your servant, our father. One went out and was lost, and no one has found him; and he alone remains from his mother, and your servant..."
  footnotes:
  - marker: a
    text: Or 'Our father, your servant, had two sons from one mother.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:09Z'
    unchanged: false
    changes_summary: Changed 'this one' to 'he' for a more natural and less deictic rendering of the pronoun. Added ellipsis because the source segment ends incompletely with 'and your servant,' and the draft should reflect the unfinished clause rather than imply completion.
translation:
  language: es
  text: 'Y Judá dijo: «Te ruego, mi señor, que tu siervo hable una palabra ante mi señor. Su madre dio a luz dos hermanos[a] a tu siervo, nuestro padre. Uno salió y se perdió, y nadie lo ha hallado; y solo él queda de su madre, y tu siervo…»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» sigue de cerca el ge'ez አኀወ; en español también podría expresarse como «hijos», pero aquí se conserva el término más cercano al léxico de la fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: በዝ፡ ጽዋዕ፡ ወኪያሁ፡ ሰረቅክሙኒ
  english_pob_choice: let your servant speak a word in my lord's hearing
  chosen_spanish: que tu siervo hable una palabra al oído de mi señor
  alternatives_spanish:
  - que tu siervo diga una palabra en presencia de mi señor
  - que tu siervo pronuncie una palabra en el oído de mi señor
  lexicon: oído
  rationale: La imagen ge'ez corresponde a hablar en el oído/a la escucha de alguien, no solo a hablar “delante de”. En español, «al oído» conserva la cercanía idiomática sin sonar excesivamente literal.
- source_word: ክልኤተ፡ አኀወ
  english_pob_choice: two brothers
  chosen_spanish: dos hermanos
  alternatives_spanish:
  - dos hijos
  - dos varones
  lexicon: hermano
  rationale: El ge'ez usa «hermanos»; aunque el contexto filiativo permite entender ‘hijos’, la lectura más cercana al léxico fuente es «hermanos». En español, aquí comunica naturalmente la relación entre los dos varones.
- source_word: ወለደት
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: dar a luz
  rationale: «Dio a luz» refleja el valor concreto de ‘bore’ y preserva la referencia materna explícita del original sin sonar arcaico.
- source_word: ወአልቦ፡ ዘተረክበ
  english_pob_choice: no one has found him
  chosen_spanish: nadie lo ha hallado
  alternatives_spanish:
  - nadie lo ha encontrado
  - no se ha hallado a nadie
  lexicon: hallar
  rationale: «Hallar» mantiene bien el sentido de descubrimiento/búsqueda del pasivo ge'ez, y se ajusta a un registro bíblico claro en español.
- source_word: ተረፈ
  english_pob_choice: he alone remains
  chosen_spanish: él solo queda
  alternatives_spanish:
  - él solo permanece
  - solo él ha quedado
  lexicon: quedar
  rationale: El valor de remanencia es mejor en español con «queda». Se conserva la idea de sobreviviente/remanente sin añadir una interpretación doctrinal.
theological_decisions:
- issue: Elipsis final de una cláusula incompleta
  english_pob_reading: and your servant...
  chosen_spanish_reading: y tu siervo…
  alternative_spanish_readings:
  - y tu siervo
  - y tu siervo, ...
  rationale: El segmento fuente termina abruptamente; la elipsis en español señala que la frase queda incompleta y evita sugerir una continuación que no está en el texto recibido.
  doctrine_reference: Fidelidad textual / crítica de forma
- issue: Relación filial expresada por el ge'ez frente a posible paráfrasis idiomática
  english_pob_reading: His mother bore two brothers to your servant, our father.
  chosen_spanish_reading: Su madre dio a luz dos hermanos a tu siervo, nuestro padre.
  alternative_spanish_readings:
  - Nuestro padre, tu siervo, tuvo dos hijos de una sola madre.
  - Su madre tuvo dos hijos para tu siervo, nuestro padre.
  rationale: 'Se conserva la estructura sintáctica y el léxico del original: madre, dar a luz, dos hermanos, a tu siervo, nuestro padre. Esto evita suavizar la formulación a una paráfrasis más libre.'
  doctrine_reference: Precisión semántica / transparencia textual
translation_notes:
  revision_awareness: 'Se incorporó la revisión que corrige la paráfrasis anterior: se mantiene ‘dos hermanos’ en lugar de ‘dos hijos’, ‘dio a luz’ en lugar de ‘tuvo/had’, y se conserva la clausula final incompleta con puntos suspensivos, siguiendo el audit trail y la revisión más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el nombre divino como equivalente directo en esta sección.
  - Se mantiene «mi señor»/«tu señor» como tratamiento respetuoso en diálogo narrativo, sin sustituirlo por lenguaje eclesiástico.
  - La puntuación con comillas y puntos suspensivos sigue el carácter fragmentario del pasaje recibido.
