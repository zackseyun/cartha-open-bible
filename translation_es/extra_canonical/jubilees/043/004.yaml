translation:
  language: es
  text: 'Y corrió tras ellos y les dijo estas palabras. Y ellos le dijeron: «Lejos esté de tus esclavos hacer esta cosa, y robar de la casa de tu señor cualquier dinero[a] o oro. El dinero que hallamos antes en nuestros sacos, nosotros, tus esclavos, lo volvimos a traer de la tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cualquier riqueza o oro». El Ge'ez ንዋየ indica riqueza, bienes o dinero, no plata.
    reason: lexical_alternative
lexical_decisions:
- source_word: أ/Ge'ez ወሮጸ፡ ድኅሬሆሙ፡
  english_pob_choice: And he ran after them
  chosen_spanish: Y corrió tras ellos
  alternatives_spanish:
  - Y fue corriendo detrás de ellos
  - Y corrió detrás de ellos
  lexicon: run after; pursue
  rationale: El Ge'ez expresa persecución física inmediata; «corrió tras ellos» mantiene la acción directa sin añadir matices narrativos que el texto no exige.
- source_word: ወይቤሎሙ፡ በከመ፡ ዝንቱ፡ ነገር።
  english_pob_choice: and spoke to them according to this word
  chosen_spanish: y les habló conforme a esta palabra
  alternatives_spanish:
  - y les habló según esta palabra
  - y les dijo estas palabras
  lexicon: speak according to this word
  rationale: «Conforme a esta palabra» conserva la correspondencia formal del original y el registro bíblico sin sustituirla por una paráfrasis más libre.
- source_word: ሐሰ፡ ሎሙ፡ ለአግብርቲከ፡
  english_pob_choice: Far be it from your servants
  chosen_spanish: Lejos esté de tus esclavos
  alternatives_spanish:
  - No permita Dios que tus esclavos
  - Lejos sea de tus esclavos
  lexicon: far be it; your servants
  rationale: El POB inglés usa «servants» de manera consistente con fuerza servil; aquí «esclavos» preserva esa fuerza léxica. «Lejos esté» reproduce la fórmula idiomática de rechazo con buena naturalidad en español.
- source_word: አይገብሩ፡ ዘንተሰ፡ ነገረ፡
  english_pob_choice: to do this thing
  chosen_spanish: hacer esta cosa
  alternatives_spanish:
  - hacer esto
  - cometer esta acción
  lexicon: do this thing
  rationale: «Esta cosa» sigue de cerca el demostrativo del original y del inglés auditado; aunque suena algo literal, aquí conserva la formulación jurídica/narrativa del pasaje.
- source_word: ወአይሰርቁ፡ እምቤተ፡ እግዚእከ፡
  english_pob_choice: and to steal from your lord's house
  chosen_spanish: y robar de la casa de tu señor
  alternatives_spanish:
  - y hurtar de la casa de tu señor
  - y robar de la casa de tu amo
  lexicon: steal from; lord's house
  rationale: «Casa de tu señor» refleja la relación jerárquica del texto y la elección inglesa de «lord», evitando términos litúrgicos ajenos al contexto narrativo.
- source_word: ምነተኒ፡ ንዋየ፡ ወወርቀኒ፡
  english_pob_choice: any money or gold
  chosen_spanish: cualquier dinero o oro
  alternatives_spanish:
  - algún dinero o oro
  - cualquier riqueza u oro
  lexicon: neway = wealth/money; gold
  rationale: La revisión auditada corrigió la lectura de «silver» a «money» porque ንዋየ significa riqueza/bienes/dinero, no plata. «Dinero» es la opción más natural en español para esa decisión lexical.
- source_word: ዘረከብነ፡ ቀዳሙ፡ ውስተ፡ አኅጢነ፡
  english_pob_choice: The money that we found before in our sacks
  chosen_spanish: El dinero que hallamos antes en nuestros sacos
  alternatives_spanish:
  - El dinero que encontramos antes en nuestros sacos
  - El dinero que hallamos primero en nuestros sacos
  lexicon: found before in our sacks
  rationale: «Hallamos antes» mantiene el sentido de recuperación previa del dinero dentro de los sacos, sin introducir la precisión explicativa «primero» que no aparece en el texto.
- source_word: እምድረ፡
  english_pob_choice: from the land
  chosen_spanish: desde la tierra
  alternatives_spanish:
  - de la tierra
  - desde el país
  lexicon: land
  rationale: «Tierra» reproduce el valor geográfico básico del término y coincide con el lenguaje bíblico del pasaje, evitando una especificación moderna como «país».
theological_decisions:
- issue: El título relacional dirigido al dueño en la escena
  english_pob_reading: your lord's house
  chosen_spanish_reading: la casa de tu señor
  alternative_spanish_readings:
  - la casa de tu amo
  - la casa de tu dueño
  rationale: No hay necesidad de elevar «señor» a un tratamiento teológico aquí; el contexto es doméstico y jerárquico. «Señor» conserva el registro del original y del inglés auditado sin convertirlo en título divino.
  doctrine_reference: Jerarquía social / no-teológico
- issue: La fórmula de rechazo «Far be it from...»
  english_pob_reading: Far be it from your servants
  chosen_spanish_reading: Lejos esté de tus esclavos
  alternative_spanish_readings:
  - No permita Dios que tus esclavos
  - Lejos sea de tus esclavos
  rationale: La frase expresa repudio enfático, no una afirmación doctrinal. «Lejos esté» reproduce la fuerza idiomática sin añadir un sujeto divino que el original aquí no formula explícitamente.
  doctrine_reference: Retórica semítica / fórmula idiomática
- issue: El valor de ንዋየ en el inciso del dinero
  english_pob_reading: any money or gold
  chosen_spanish_reading: cualquier dinero o oro
  alternative_spanish_readings:
  - cualquier riqueza o oro
  - cualquier bien o oro
  rationale: La decisión auditada descarta «plata» por falta de base en el Ge'ez. «Dinero» recoge el valor funcional del término en español contemporáneo y preserva la tensión con «oro» como segundo elemento del par.
  doctrine_reference: Precisión lexical / coherencia intertextual
translation_notes:
  revision_awareness: Se siguió la última revisión auditada que corrigió la lectura de ንዋየ de «silver/plata» a «money/dinero». El texto inglés de POB y el historial de revisión coinciden en no introducir «plata». No se detectaron otros cambios pendientes en el pass más reciente.
  spanish_consistency_notes:
  - Se mantuvo «esclavos» para አግብርቲከ conforme al uso léxico POB y para conservar la fuerza servil del original.
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera explícitamente; este versículo no contiene el nombre divino en forma directa, así que no aparece.
  - Se evitó «SEÑOR» como sustituto devocional, salvo en «tu señor», que aquí es relacional y no una máscara del nombre divino.
  - Se conservó el paralelismo «dinero o oro» para reflejar el par semítico del texto y la auditoría inglesa revisada.
