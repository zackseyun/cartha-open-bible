translation:
  language: es
  text: 'Y los abrazó al cuello y lloró[a], pero ellos no lo reconocieron, y también lloraron. Y él les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula 'no lo reconocieron' puede indicar tanto asombro continuado como un reconocimiento todavía no pleno en medio de la revelación de José.
    reason: alternative_reading
lexical_decisions:
- source_word: ወሐቀፈ፡ ክሳውዲሆሙ፡
  english_pob_choice: he embraced their necks
  chosen_spanish: lo abrazó por el cuello
  alternatives_spanish:
  - los abrazó al cuello
  - abrazó sus cuellos
  lexicon: abrazar
  rationale: La imagen concreta es de un abrazo al cuello, no solo un saludo genérico. En español, 'lo abrazó por el cuello' conserva la cercanía física y el movimiento afectivo del original sin sonar forzado.
- source_word: ወበከየ፡
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - se puso a llorar
  - sollozó
  lexicon: llorar
  rationale: El verbo simple 'lloró' reproduce bien el valor narrativo directo del verbo ge'ez y mantiene el paralelismo con 'también lloraron'.
- source_word: ኢያእመርዎ፡
  english_pob_choice: they did not recognize him
  chosen_spanish: no lo reconocieron
  alternatives_spanish:
  - no lo identificaron
  - no lo conocieron
  lexicon: reconocer
  rationale: '''Reconocer'' es la opción natural y fiel para el sentido de identificación personal. ''Conocer'' sería menos preciso en este contexto narrativo.'
- source_word: ወአንከ፡ ይብከዩ።
  english_pob_choice: and they also wept
  chosen_spanish: y también lloraron
  alternatives_spanish:
  - y asimismo lloraron
  - y lloraron también
  lexicon: llorar
  rationale: La coordinación mantiene el paralelismo con el llanto de José y expresa la reacción emocional de ellos de manera clara y directa.
- source_word: ወይቤሎሙ፡
  english_pob_choice: And he said to them
  chosen_spanish: 'Y él les dijo:'
  alternatives_spanish:
  - 'Y les dijo:'
  - 'Y él respondió:'
  lexicon: decir
  rationale: La fórmula narrativa normal en español es 'les dijo'. Se conserva el dos puntos porque introduce discurso directo en la continuación del pasaje.
theological_decisions:
- issue: La cláusula de no reconocimiento puede sugerir una falta de identificación momentánea o un retraso en el reconocimiento pleno.
  english_pob_reading: The clause 'they did not recognize him' may reflect either continued astonishment or delayed full recognition in the midst of Joseph's disclosure.
  chosen_spanish_reading: '''no lo reconocieron'' puede reflejar tanto asombro continuado como un reconocimiento aún no pleno en medio de la revelación de José.'
  alternative_spanish_readings:
  - '''no llegaron a reconocerlo'''
  - '''no lo identificaron de inmediato'''
  rationale: No hay necesidad de suavizar la tensión interpretativa. La redacción española conserva la ambigüedad auditada por el POB inglés y permite ambas posibilidades semánticas.
  doctrine_reference: Narrative ambiguity in the Joseph cycle; no doctrinal claim beyond the source text.
translation_notes:
  revision_awareness: Se siguió el pasaje ge'ez dado y el texto inglés auditado. La revisión más reciente indicó que no había cambios necesarios; por eso la redacción española conserva la misma estructura narrativa y la misma ambigüedad interpretativa del reconocimiento.
  spanish_consistency_notes:
  - Se usó 'lloró' / 'lloraron' para mantener el paralelismo verbal.
  - Se evitó introducir 'Cristo', 'Señor' u otra terminología no presente en el pasaje.
  - Se mantuvo 'no lo reconocieron' sin explicitar una resolución interpretativa que el texto no exige.
