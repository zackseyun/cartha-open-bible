  - severity: medium
    issue: La formulación 'por el cuello' suena algo menos natural que 'al cuello' en este contexto afectivo
    rationale: En español narrativo de abrazo afectuoso, 'los abrazó al cuello' preserva mejor la imagen semítica y suena más idiomático que 'por el cuello', que puede sugerir asir más que abrazar.
