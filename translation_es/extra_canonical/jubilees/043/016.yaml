- from: 'Y lo abrazó por el cuello y lloró[a], pero ellos no lo reconocieron, y también lloraron. Y él les dijo:'
  to: 'Y los abrazó al cuello y lloró[a], pero ellos no lo reconocieron, y también lloraron. Y él les dijo:'
  rationale: Se corrige la primera cláusula para reflejar el plural del original ('sus cuellos') y evitar el error de referente singular. 'Los abrazó al cuello' conserva la imagen concreta del abrazo afectuoso y mejora la naturalidad del español sin apartarse del sentido fuente. Se mantiene la nota por preservar la ambigüedad interpretativa documentada en el POB inglés.
