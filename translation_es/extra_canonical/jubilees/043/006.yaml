translation:
  language: es
  text: '«seremos esclavos de nuestro señor»[a]. Y les dijo: «No así. El hombre con quien fue hallado[a]—él solo'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición textual presenta aquí una tensión: el Ge''ez apunta a una forma activa equivalente a «lo encontré», mientras la revisión inglesa reciente prefirió el pasivo «fue hallado». Se conserva el pasivo en el texto principal por fluidez, pero la alternativa activa queda implícita en la decisión léxica.'
    reason: textual_variant
lexical_decisions:
- source_word: ንትቀነይ / "we will be slaves"
  english_pob_choice: we will be slaves to our lord
  chosen_spanish: seremos esclavos de nuestro señor
  alternatives_spanish:
  - seremos siervos de nuestro señor
  - quedaremos como esclavos de nuestro señor
  lexicon: δοῦλος / esclavo (equivalente funcional en español); 'señor' como equivalente de 'lord' en habla reverente/contextual
  rationale: El Ge'ez conserva la autodeclaración de servidumbre/esclavitud; 'esclavos' mantiene la fuerza léxica que la tradición POB prefiere para δοῦλος y evita suavizarla a 'siervos' sin base textual.
- source_word: ወይቤሎሙ / 'And he said to them'
  english_pob_choice: And he said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Y dijo a ellos
  - Y les respondió
  lexicon: verbo de habla directo; pronombre dativo duplicado natural en español
  rationale: '''Les dijo'' es la forma natural y fiel para introducir el discurso directo sin añadir matices de respuesta que no están en el texto.'
- source_word: አኮ፡ ከማሁ / 'Not so'
  english_pob_choice: Not so
  chosen_spanish: No así
  alternatives_spanish:
  - De ninguna manera
  - No es así
  lexicon: negación idiomática breve
  rationale: '''No así'' reproduce la concisión de la negativa ge''ez y la fórmula bíblica sin expandir el sentido más allá de lo necesario.'
- source_word: በኀበ፡ ብእሲ፡ ዘረከብክዎ፡ ኪያሁ፡ ባሕቲቶ / 'The man with whom I found it—he alone'
  english_pob_choice: The man with whom it is found—he alone
  chosen_spanish: El hombre con quien fue hallado[a]—él solo
  alternatives_spanish:
  - El hombre con quien lo encontré—él solo
  - El hombre en cuya casa fue hallado—él solo
  lexicon: hallar / ser hallado
  rationale: La pauta del documento fuente y la auditoría inglesa muestran tensión entre una lectura pasiva y la forma activa del Ge'ez; en español se mantiene 'fue hallado' para no introducir un sujeto explícito que el inglés revisado quiso evitar, aunque la nota registra la alternativa activa porque la forma verbal ge'ez sí permite/insinúa esa tensión.
theological_decisions:
- issue: Grado de esclavitud autodesignada ante el señor
  english_pob_reading: we will be slaves to our lord
  chosen_spanish_reading: seremos esclavos de nuestro señor
  alternative_spanish_readings:
  - seremos siervos de nuestro señor
  - quedaremos como esclavos de nuestro señor
  rationale: La traducción conserva la dureza social y jurídica del término sin atenuarlo por eufemismo. En el contexto narrativo no hay indicio de metáfora espiritual, sino una declaración literal de sujeción.
  doctrine_reference: Uso bíblico de esclavitud/servicio en lenguaje narrativo; no implica doctrina soteriológica.
- issue: Tensión entre pasivo español y forma verbal ge'ez explícitamente activa
  english_pob_reading: The man with whom it is found—he alone
  chosen_spanish_reading: El hombre con quien fue hallado—él solo
  alternative_spanish_readings:
  - El hombre con quien lo encontré—él solo
  - El hombre con quien se halla—él solo
  rationale: La revisión inglesa oscila entre un pasivo más natural y la advertencia del auditor de que el ge'ez emplea una forma activa de primera persona. El español principal conserva el pasivo por fluidez y por el eco narrativo, mientras la nota deja visible la alternativa activa para no borrar la tensión textual.
  doctrine_reference: 'Principios de crítica textual y de fidelidad formal: no ocultar variantes de sujeto cuando el dato fuente es significativo.'
translation_notes:
  revision_awareness: 'El expediente de revisión es inconsistente: una pasada reciente corrigió el inglés a un pasivo más natural («it is found»), pero la auditoría posterior señaló que el Ge''ez contiene una forma activa de primera persona («I found it»). Por eso el español principal mantiene una lectura gramaticalmente natural y la documentación explica explícitamente la tensión textual, sin ocultarla.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aparece en el texto principal.
  - Se usa «esclavos» para mantener el valor léxico fuerte que el proyecto asocia con δοῦλος y equivalentes narrativos.
  - Se mantiene un registro bíblico claro y moderno, evitando arcaísmos innecesarios como «dijéronle» o «no es así» cuando no aportan precisión adicional.
