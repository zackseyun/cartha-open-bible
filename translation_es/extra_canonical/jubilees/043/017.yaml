  yaml_path: translation/extra_canonical/jubilees/043/017.yaml
  text: Do not weep over me, but hurry and bring my father to me, and you see that it is my mouth that speaks, and the eyes of my brother Benjamin also see. For behold, this is the second year of the famine,
  footnotes:
  - marker: a
    text: Or 'you shall see'.
    reason: previous_rendering
  - marker: b
    text: Or 'that the famine has continued'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:53:11Z'
    unchanged: false
    changes_summary: 'Revised for closer lexical accuracy and completeness: changed ''my mouth is speaking'' to ''it is my mouth that speaks''; rendered Benjamin clause more naturally as ''the eyes of my brother Benjamin also see''; replaced the unsupported ''there are still five years of famine remaining'' with the source-based ''this is the second year that the famine has continued''; and adjusted register with ''behold.'''
translation:
  language: es
  text: No lloren por mí, sino apresúrense y tráiganme a mi padre, y ven[a] que es mi boca la que habla, y los ojos de mi hermano Benjamín también ven. Porque he aquí, este es el segundo año de la hambruna[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «verán». El ge'ez puede entenderse en presente o futuro, pero aquí el presente encaja mejor con la constatación inmediata de la escena.
    reason: previous_rendering
  - marker: b
    text: O «del hambre»; el ge'ez expresa simplemente «de la hambruna» o «de hambre», sin expansión adicional.
    reason: alternative_reading
lexical_decisions:
- source_word: ኢትብከዩ
  english_pob_choice: Do not weep over me
  chosen_spanish: No lloren por mí
  alternatives_spanish:
  - No lloréis por mí
  - No derramen lágrimas por mí
  lexicon: weeping/crying
  rationale: El imperativo prohibitivo se expresa con naturalidad en español con «No lloren por mí». Mantiene el sentido directo de duelo o llanto sin añadir matices no presentes en el ge'ez.
- source_word: ወአፍጥኑ
  english_pob_choice: but hurry
  chosen_spanish: pero apúrense
  alternatives_spanish:
  - pero apresúrense
  - pero hagan pronto
  lexicon: hurry/haste
  rationale: «Apúrense» comunica urgencia de forma idiomática y transparente. Conserva el contraste con la prohibición anterior.
- source_word: ወእምጽእዎ ለአቡየ ኀቤየ
  english_pob_choice: and bring my father to me
  chosen_spanish: y traigan a mi padre a mí
  alternatives_spanish:
  - y traigan a mi padre hasta mí
  - y hagan venir a mi padre a mí
  lexicon: bring/cause to come
  rationale: El ge'ez indica llevar o hacer venir a Jacob hacia José. «Traigan a mi padre a mí» conserva el movimiento relacional del original sin forzar una expresión más elaborada.
- source_word: ወትሬእዩ
  english_pob_choice: you see
  chosen_spanish: ustedes ven
  alternatives_spanish:
  - ustedes verán
  - verán
  lexicon: see/perceive
  rationale: Se sigue la revisión inglesa que favorece presente inmediato sobre futuro. En español, «ustedes ven» refleja mejor la constatación actual en la escena.
- source_word: ዘይነብብ አፉየ
  english_pob_choice: it is my mouth that speaks
  chosen_spanish: es mi boca la que habla
  alternatives_spanish:
  - es mi boca la que está hablando
  - mi boca es la que habla
  lexicon: mouth/speaks
  rationale: La formulación enfatizada del original se conserva con una construcción ecuacional natural en español. «La que habla» expresa con fidelidad la identidad del hablante sin diluir la fuerza del énfasis.
- source_word: ወአዕይንቲሁኒ ለአኁየ ብንያም ይሬእያ
  english_pob_choice: and the eyes of my brother Benjamin also see
  chosen_spanish: y los ojos de mi hermano Benjamín también ven
  alternatives_spanish:
  - y también ven los ojos de mi hermano Benjamín
  - y los ojos de mi hermano Benjamín también lo ven
  lexicon: eyes/see
  rationale: El ge'ez personifica la percepción con «los ojos». El español conserva esa imagen sin convertirla en una paráfrasis sobre la mirada de manera excesiva. Se mantiene el nombre propio «Benjamín».
- source_word: እስመ ናሁ ዝንቱ ካልእ ዓም ዘዐባር
  english_pob_choice: For behold, this is the second year of the famine
  chosen_spanish: Porque miren, este es el segundo año de la hambruna
  alternatives_spanish:
  - Porque miren, este es el segundo año del hambre
  - Porque, miren, este es el segundo año de la escasez
  lexicon: famine/second year
  rationale: La revisión inglesa corrigió una expansión indebida y volvió a la referencia simple «of the famine». «Hambruna» comunica mejor un hambre generalizada y devastadora que «hambre» en español contemporáneo. Se conserva «segundo año» como referencia temporal exacta.
theological_decisions:
- issue: Lectura de la referencia temporal sobre la hambruna
  english_pob_reading: this is the second year of the famine
  chosen_spanish_reading: este es el segundo año de la hambruna
  alternative_spanish_readings:
  - este es el segundo año del hambre
  - este es el segundo año de la escasez
  rationale: La fuente ge'ez solo dice «de la hambruna»; la revisión inglesa descartó cualquier expansión sobre años restantes. En español, «hambruna» preserva la gravedad del evento y evita suavizarlo a un hambre genérica.
  doctrine_reference: Génesis 45:6 / contexto narrativo de la hambruna en José
- issue: Énfasis sobre la boca que habla
  english_pob_reading: it is my mouth that speaks
  chosen_spanish_reading: es mi boca la que habla
  alternative_spanish_readings:
  - mi boca es la que habla
  - habla mi boca
  rationale: La fuente subraya la identificación del orador visible y audible; no se debe perder el énfasis retórico. La construcción ecuacional española preserva esa focalización sin añadir un giro interpretativo.
  doctrine_reference: Retórica narrativa bíblica; paralelo con Génesis 45:12
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail inglés: se evitó la expansión no sustentada sobre cinco años restantes, se privilegió el presente en la percepción («ustedes ven»), y se mantuvo el énfasis original en la boca que habla y en la referencia temporal simple al segundo año de la hambruna.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca explícitamente en este versículo, sino para mantener la política terminológica del proyecto cuando corresponda en el libro.
  - Se prefirió «hambruna» frente a «hambre» por claridad narrativa y gravedad del contexto.
  - Se conservó el paralelismo corporal («boca», «ojos») del original sin convertirlo en interpretación psicológica.
