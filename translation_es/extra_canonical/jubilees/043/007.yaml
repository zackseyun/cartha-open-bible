translation:
  language: es
  text: «Yo lo tomaré como esclavo, y ustedes pueden irse en paz a sus casas». Y mientras registraban sus bienes, comenzando por el mayor y terminando con el menor, fue hallado en el saco de Benjamín.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: እነሥእ
  english_pob_choice: I will take him as a slave
  chosen_spanish: Yo lo tomaré como esclavo
  alternatives_spanish:
  - Yo lo tomaré como siervo
  - Será tomado como esclavo
  lexicon: first-person singular active verb; lexical force of δοῦλος in context corresponds to slavery
  rationale: El ge'ez expresa una acción en primera persona activa, no una pasiva. Por eso el español debe conservar «yo lo tomaré». Para መ/δοῦλος la opción marcada en el POB inglés es «slave», así que «esclavo» conserva la fuerza léxica sin suavizarla a «siervo».
- source_word: በሰላም
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz y sin conflicto
  - tranquilamente
  lexicon: שלום/peace formula
  rationale: La expresión formulaica se vierte naturalmente como «en paz» en español, manteniendo el sentido de salida segura y no hostil.
- source_word: ቤቲክሙ
  english_pob_choice: to your houses
  chosen_spanish: a sus casas
  alternatives_spanish:
  - a sus hogares
  - a sus casas de ustedes
  lexicon: house/home plural addressee
  rationale: El plural de segunda persona se expresa de forma natural con «sus casas» en español, sin forzar una repetición innecesaria de posesivos.
- source_word: ይፈትኑ ... ንዋዮሙ
  english_pob_choice: they were searching in their goods
  chosen_spanish: mientras registraban sus bienes
  alternatives_spanish:
  - mientras buscaban entre sus pertenencias
  - mientras examinaban sus cosas
  lexicon: search/examine goods, possessions
  rationale: «Registrar» comunica bien la idea de inspeccionar o revisar pertenencias en busca de algo oculto; «bienes» mantiene un registro relativamente formal y amplio para ንዋይ.
- source_word: እምዘ፡ ይልህቅ፡ ቀደሙ፡ ወፈጸሙ፡ በኀበ፡ ዘይንእስ
  english_pob_choice: beginning with the eldest and finishing with the youngest
  chosen_spanish: comenzando por el mayor y terminando con el menor
  alternatives_spanish:
  - desde el mayor hasta el menor
  - empezando por el mayor y acabando con el menor
  lexicon: elder/youngest contrast
  rationale: La secuencia distributiva se expresa de modo natural en español con «comenzando... terminando...», conservando la progresión de edad sin añadir interpretaciones.
- source_word: ሐስለ፡ ብንያም
  english_pob_choice: Benjamin's sack
  chosen_spanish: el saco de Benjamín
  alternatives_spanish:
  - la bolsa de Benjamín
  - el costal de Benjamín
  lexicon: sack/bag receptacle
  rationale: «Saco» es el equivalente más directo y transparente para un recipiente de grano o pertenencias en este contexto, y coincide con la traducción inglesa.
theological_decisions:
- issue: Direct speech vs. passive construal in Joseph's declaration
  english_pob_reading: I will take him as a slave
  chosen_spanish_reading: Yo lo tomaré como esclavo
  alternative_spanish_readings:
  - Será tomado como esclavo
  - Yo lo tomaré como siervo
  rationale: La revisión del POB inglés corrigió una pasiva errónea; el ge'ez muestra una acción activa en primera persona. El español debe reflejar esa agencia explícita y mantener la dureza lexical de «esclavo» que el POB preserva.
  doctrine_reference: Faithful source form; lexical integrity over euphemism
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que corrigió el inglés desde una pasiva («shall be taken as a slave») a una activa («I will take him as a slave»). La versión española sigue la lectura activa del ge'ez y evita heredar la forma pasiva corregida.
  spanish_consistency_notes:
  - Se mantuvo «esclavo» por consistencia con la decisión léxica inglesa documentada y la fuerza del término en el contexto.
  - «En paz» traduce la fórmula de seguridad de salida sin introducir matices inexistentes en el fuente.
  - Se conservó el orden narrativo de inspección de mayor a menor y el resultado localizado en el saco de Benjamín.
