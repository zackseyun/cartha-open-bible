  text: And it happened[3], when they had gone out from there, Joseph said to the man of his house, "Pursue them, run and overtake them, saying, 'Instead of good you have repaid me evil; you have stolen from me the silver cup from which my lord drinks.' And bring back to me their youngest brother, and bring him quickly before I enter into my judgment."
  footnotes:
