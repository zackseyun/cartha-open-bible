translation:
  language: es
  text: 'Y sucedió que, cuando habían salido de allí, José dijo al hombre de su casa: «Persíguelos[a], corre y alcánzalos, diciendo: “En lugar de bien me habéis pagado mal; me habéis robado la copa de plata de la que bebe mi señor”. Y devuélveme a su hermano menor, y tráemelo de prisa antes de que entre en mi juicio[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La orden ge'ez expresa la idea de ir tras ellos o perseguirlos; aquí no se sigue la lectura anterior «levántate».
    reason: source_note
  - marker: b
    text: La cláusula final es textualmente difícil en esta segmentación. Se conserva de forma cercana al original con sentido urgente, sin resolverla mediante paráfrasis.
    reason: textual_variant
lexical_decisions:
- source_word: ደግፎሙ
  english_pob_choice: Pursue them / Get up, run after them
  chosen_spanish: Persegue a ellos
  alternatives_spanish:
  - Ve tras ellos
  - Persíguelos
  - Corre tras ellos
  lexicon: pursue / correr tras
  rationale: El ge'ez indica la idea de perseguirlos; la revisión inglesa confirmó que no es «Get up» sino una orden de salir tras ellos. En español, «perseguir» conserva la urgencia sin añadir contenido no atestiguado.
- source_word: ህየንተ፡ ሠናይት፡ ዐሠይክሙኒ፡ እኩየ፡
  english_pob_choice: Instead of good you have repaid me evil
  chosen_spanish: En lugar de bien me habéis pagado mal
  alternatives_spanish:
  - Me habéis pagado mal en lugar de bien
  - En vez de bien, me habéis hecho mal
  lexicon: instead of / repay / evil
  rationale: «En lugar de» expresa con precisión el contraste del original; «pagado mal» conserva la relación de retribución. Se mantiene el orden natural del español sin perder el paralelismo bien/mal.
- source_word: ጽዋዐ፡ ብሩር፡ በዘይሰቲ፡ እግዚእየ፡
  english_pob_choice: the silver cup from which my lord drinks
  chosen_spanish: la copa de plata de la que bebe mi señor
  alternatives_spanish:
  - la copa de plata de la que bebe mi señor
  - la copa de plata de donde bebe mi señor
  lexicon: cup / silver / drink
  rationale: «Copa de plata» sigue de cerca el léxico del texto. «De la que bebe» suena natural en español y mantiene la referencia al recipiente del que bebe el señor.
- source_word: ወአገብአ፡ ሊተ፡ ለ*አኁሆሙ፡ ዘይንእስ፡
  english_pob_choice: And bring back to me their youngest brother
  chosen_spanish: Y devuélveme a su hermano menor
  alternatives_spanish:
  - Y tráeme a su hermano menor de vuelta
  - Y trae de regreso a su hermano menor
  lexicon: bring back / youngest brother
  rationale: La revisión inglesa aclaró que la frase pertenece a la orden al mayordomo y significa traer de vuelta al hermano menor de ellos. En español, «devuélveme» comunica bien la idea de restitución sin introducir ambigüedad de propiedad.
- source_word: ዘእንበለ፡ እባእ፡ ውስተ፡ ምኵናንየ።
  english_pob_choice: before I enter into my judgment
  chosen_spanish: antes de que entre en mi juicio
  alternatives_spanish:
  - antes de que entre en juicio
  - antes de entrar en mi juicio
  lexicon: before / enter / judgment
  rationale: La revisión descartó «lest» y confirmó el valor temporal de «before». «Entrar en mi juicio» preserva la expresión difícil del original y la tensión semántica documentada por el audit trail.
theological_decisions:
- issue: El sentido de «mi juicio» en la cláusula final
  english_pob_reading: before I enter into my judgment
  chosen_spanish_reading: antes de que entre en mi juicio
  alternative_spanish_readings:
  - antes de que entre en juicio
  - antes de entrar en mi juicio
  rationale: Se conserva la formulación extraña porque el texto fuente y la auditoría inglesa la mantienen como cláusula difícil. No se suaviza a una paráfrasis interpretativa para no borrar la tensión textual.
  doctrine_reference: Principio de fidelidad textual en pasajes difíciles; no aplica una corrección doctrinal.
translation_notes:
  revision_awareness: 'La traducción incorpora la revisión que corrige la extensión indebida de la cita y la mala lectura de la segunda mitad del versículo: la orden de devolver al hermano menor pertenece al mandato dado al hombre de la casa, y la cláusula final se entiende temporalmente como «antes de que entre en mi juicio», no como «para que no entre en juicio».'
  spanish_consistency_notes:
  - Se usa «José» y «copa de plata» de forma consistente con el audit trail en español bíblico moderno.
  - Se conserva la tensión de la cláusula final con una formulación cercana al original, sin domesticarla.
  - «Hermano menor» refleja el vínculo familiar del objeto directo en la orden al mayordomo, no una forma posesiva dirigida a los hermanos.
