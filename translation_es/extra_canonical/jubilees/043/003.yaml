revisions:
- from: 'Y sucedió que, cuando habían salido de allí, José dijo al hombre de su casa: «Persegue a[a] ellos, corre y alcánzalos, diciendo: “En lugar de bien me habéis pagado mal; me habéis robado la copa de plata de la que bebe mi señor. Y devuélveme a su hermano menor, y tráemelo de prisa antes de que entre en mi juicio”»[b].'
  to: 'Y sucedió que, cuando habían salido de allí, José dijo al hombre de su casa: «Persíguelos[a], corre y alcánzalos, diciendo: “En lugar de bien me habéis pagado mal; me habéis robado la copa de plata de la que bebe mi señor”. Y devuélveme a su hermano menor, y tráemelo de prisa antes de que entre en mi juicio[b]».'
  rationale: 'Se corrige un error gramatical serio («Persegue») y se sustituye por «Persíguelos», que reproduce fielmente la orden de perseguir y suena natural en español. También se limpia la puntuación de la cita para mayor claridad, manteniendo las decisiones de fondo ya bien resueltas por el audit trail: «en lugar de», «me habéis robado», la referencia a «su hermano menor» como instrucción al mayordomo, y «antes de que entre en mi juicio» como cláusula difícil conservada de cerca al original.'
