translation:
  language: es
  text: Y rasgaron sus vestidos, cargaron sus asnos, regresaron a la ciudad y llegaron a la casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሠጠጡ፡ አልባሲሆሙ፡
  english_pob_choice: they tore their garments
  chosen_spanish: desgarraron sus vestidos
  alternatives_spanish:
  - rasgaron sus vestidos
  - rompieron sus vestidos
  lexicon: torear/rasgar vestiduras
  rationale: El ge'ez expresa el acto de rasgar la ropa en señal de duelo; en español, «desgarraron» comunica bien la acción física sin sonar excesivamente arcaico. «Vestidos» mantiene el referente material del texto.
- source_word: ዲበ፡ አእዱጊሆሙ፡
  english_pob_choice: loaded their donkeys
  chosen_spanish: cargaron sus asnos
  alternatives_spanish:
  - pusieron carga sobre sus asnos
  - aparejaron sus asnos
  lexicon: cargar/asno
  rationale: La forma verbal conserva la idea de poner carga sobre los animales. «Asnos» es el equivalente directo y natural para el contexto narrativo.
- source_word: ወተመይጡ፡ ሀገረ፡
  english_pob_choice: returned to the city
  chosen_spanish: regresaron a la ciudad
  alternatives_spanish:
  - volvieron a la ciudad
  - retornaron a la ciudad
  lexicon: volver/regresar
  rationale: El ge'ez indica un movimiento de retorno; «regresaron» es claro y digno en español moderno. «La ciudad» preserva el objeto definido del original.
- source_word: ወበጽሑ፡ ቤተ፡
  english_pob_choice: and came to the house
  chosen_spanish: y llegaron a la casa
  alternatives_spanish:
  - y vinieron a la casa
  - y entraron en la casa
  lexicon: llegar/casa
  rationale: El cierre ge'ez añade que llegaron a la casa. «Llegaron a la casa» refleja ese final sin introducir el matiz de entrada que el texto no dice explícitamente.
theological_decisions:
- issue: Relato puramente narrativo de acciones sucesivas
  english_pob_reading: And they tore their garments, and loaded their donkeys, and returned to the city and came to the house.
  chosen_spanish_reading: Y desgarraron sus vestidos, cargaron sus asnos, y regresaron a la ciudad, y llegaron a la casa.
  alternative_spanish_readings:
  - Y rasgaron sus vestidos, cargaron sus asnos, y volvieron a la ciudad, y llegaron a la casa.
  rationale: No hay carga doctrinal explícita; conviene mantener la secuencia simple de acciones y no añadir interpretaciones como duelo ritual o entrada formal.
  doctrine_reference: Narrative precision; no doctrinal decision required
translation_notes:
  revision_awareness: The English audit trail shows a revision that restored the final clause 'and came to the house' from the source words ወበጽሑ፡ ቤተ፡. The Spanish draft includes this clause explicitly as 'y llegaron a la casa'.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y continuo.
  - «Desgarraron» y «llegaron» conservan la acción sin sobreexplicación.
  - No se usa «SEÑOR» ni terminología teológica no presente en el versículo.
