  to: 'una multitud numerosa. Y digan a mi padre que aún estoy vivo, y miren: ustedes mismos ven que Dios me ha hecho como padre de Faraón y como gobernador de su casa,'
  rationale: Se corrige «di» a «digan» para reflejar el destinatario plural del original y mantener coherencia con «ustedes mismos ven». No se requieren notas al pie.
