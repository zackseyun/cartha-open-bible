translation:
  language: es
  text: 'una multitud numerosa. Y digan a mi padre que aún estoy vivo, y miren: ustedes mismos ven que Dios me ha hecho como padre de Faraón y como gobernador de su casa,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሕዝብ፡ ብዙኃን
  english_pob_choice: a numerous people
  chosen_spanish: una multitud numerosa
  alternatives_spanish:
  - un pueblo numeroso
  - gente numerosa
  lexicon: pueblo / multitud / numeroso
  rationale: El geʽez combina la idea de pueblo con abundancia; en español, «multitud numerosa» conserva la fuerza colectiva y cuantitativa sin imponer una fórmula bíblica más interpretativa de lo necesario.
- source_word: እግዚአብሔር
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: Dios
  rationale: La referencia es al término estándar para Dios, y el inglés POB ya lo fija como «God»; en español la forma natural y reverente es «Dios».
- source_word: አቡየ
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - a mi padre
  lexicon: padre
  rationale: La forma directa mantiene la relación filial explícita del texto sin añadir matices pastorales o honoríficos ajenos al contexto.
- source_word: ለፈርዖን
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el Faraón
  lexicon: Faraón
  rationale: Se mantiene el nombre/título histórico habitual en español bíblico, con mayúscula inicial por tratarse de un título personal fijo.
- source_word: እመብል፡ ውስተ፡ ቤቱ
  english_pob_choice: ruler in his house
  chosen_spanish: gobernador de su casa
  alternatives_spanish:
  - señor de su casa
  - administrador de su casa
  lexicon: gobernador / casa
  rationale: «Gobernador» refleja la función de autoridad reconocida por el inglés POB («ruler») sin desplazar el sentido doméstico/palatino de «su casa»; «administrador» es posible, pero algo más interpretativo.
theological_decisions:
- issue: Dios exaltando a José en relación con Faraón
  english_pob_reading: God has made me as a father to Pharaoh and as ruler in his house
  chosen_spanish_reading: Dios me ha hecho como padre de Faraón y como gobernador de su casa
  alternative_spanish_readings:
  - Dios me ha hecho padre de Faraón y gobernador de su casa
  - Dios me ha puesto como padre de Faraón y como gobernador de su casa
  rationale: Se conserva la comparación explícita «como padre» y «como gobernador», tal como el inglés POB mantiene el doble paralelismo. No se suaviza a una mera idea de asesoría, porque el texto documenta una relación de autoridad y cuidado en la corte.
  doctrine_reference: Providencia divina; exaltación de José en la administración de Egipto
translation_notes:
  revision_awareness: La redacción sigue la revisión aprobada en inglés que eliminó una coma innecesaria antes de la segunda coordinación; en español se mantiene la coordinación fluida sin coma antes de «y como gobernador de su casa».
  spanish_consistency_notes:
  - Se usa «Dios» y no «Yahvé» porque el texto fuente geʽez aquí corresponde al inglés POB «God», no a un caso de ὁ κύριος que requiera aclaración del nombre divino.
  - Se conserva el paralelismo con «como padre ... y como gobernador ...» para reflejar la estructura del texto fuente.
  - «Una multitud numerosa» reproduce el valor colectivo y cuantitativo del arranque sin añadir verbos ni sujetos implícitos.
