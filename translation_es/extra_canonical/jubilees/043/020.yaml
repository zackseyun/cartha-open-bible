review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del geʽez y del rastro inglés: José sigue vivo y Dios lo ha puesto en una posición de autoridad respecto de Faraón y de su casa. Sin embargo, hay un problema de persona verbal: el original y el inglés dicen «tell my father», mientras que el español dice «Y di a mi padre», que singulariza al destinatario. Dado que el contexto inmediato incluye «ustedes mismos ven», conviene mantener plural coherente: «digan a mi padre».'
  spanish_quality_summary: El español es claro y natural, pero la concordancia pragmática mejora si se usa imperativo plural. «Gobernador de su casa» es aceptable y digno; la puntuación con dos puntos tras «miren» funciona bien. El segmento inicial «una multitud numerosa» suena algo redundante, pero no es incorrecto y preserva el énfasis del inglés.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios» para እግዚአብሔር y «Faraón» están bien. No aplica Yahvé/Mesías/etc. «Gobernador» para «ruler» es compatible con la decisión auditada.
  issues:
  - severity: medium
    issue: Imperativo singular «di» donde el original requiere plural
    rationale: El inglés POB tiene «tell my father», dirigido al mismo grupo implícito en «you yourselves see». El español «di» cambia el número del destinatario y reduce la fidelidad discursiva.
  - severity: low
    issue: «Una multitud numerosa» es algo pleonástico
    rationale: Aunque conserva bien la idea de abundancia, en español puede sonar pesado. No obstante, no exige cambio porque sigue siendo fiel y comprensible.
  revised_spanish_text: 'una multitud numerosa. Y digan a mi padre que aún estoy vivo, y miren: ustedes mismos ven que Dios me ha hecho como padre de Faraón y como gobernador de su casa,'
  revision_rationale: Se corrige «di» a «digan» para reflejar el destinatario plural del original y mantener coherencia con «ustedes mismos ven». No se requieren notas al pie.
