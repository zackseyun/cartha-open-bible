translation:
  language: es
  text: Y ya no pudo contenerse[a], y les dijo que era José. Y habló con ellos en lengua hebrea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge’ez literal puede leerse ‘se contuvo’; el sentido narrativo favorece ‘ya no pudo contenerse’.
    reason: textual_variant
lexical_decisions:
- source_word: ተዐገሦ
  english_pob_choice: he could no longer restrain himself / he restrained himself
  chosen_spanish: ya no pudo contenerse
  alternatives_spanish:
  - se contuvo
  - se refrenó
  lexicon: self-restraint / restraint
  rationale: El ge’ez expresa la idea de contención personal; el contexto narrativo exige la falta de dominio de sí que conduce a la revelación. Por eso el español conserva la fuerza de ‘contenerse’ y explicita la falta de continuidad con ‘ya no pudo’.},{
theological_decisions:
- issue: Lectura del sentido contextual frente a una forma ge’ez literal aparentemente incompleta
  english_pob_reading: And he could no longer restrain himself
  chosen_spanish_reading: Y ya no pudo contenerse
  alternative_spanish_readings:
  - Y se contuvo
  - Y se refrenó
  rationale: El texto fuente, leído en contexto con la revelación de identidad, exige una traducción que refleje la ruptura de la contención. El audit trail inglés reconoce esta necesidad contextual, aunque la forma ge’ez conservada sea más breve.
  doctrine_reference: Narrative coherence; no doctrinal issue
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que eliminó ‘no longer’ por no aparecer explícitamente en el ge’ez, pero también la adjudicación posterior que indicó que el sentido contextual y el paralelo con Génesis 45:1 requieren expresar la imposibilidad de seguir conteniéndose. La redacción española adopta la solución contextual sin ocultar la tensión textual mediante nota.
  spanish_consistency_notes:
  - Se usa ‘José’ para el nombre propio, conforme al POB inglés y al uso español estándar.
  - ‘lengua hebrea’ conserva el referente lingüístico explícito del texto fuente; no se sustituye por ‘hebreo’ adjetival para mantener claridad.
  - La nota al pie se ancla en ‘contenerse’ para cubrir la alternativa literal del ge’ez y la solución contextual.
