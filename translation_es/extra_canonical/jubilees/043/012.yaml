translation:
  language: es
  text: Nuestro padre lo ama, y su vida está ligada a la suya. Y sucederá que, cuando vayamos a tu siervo, nuestro padre, si el muchacho no está con nosotros, él morirá, y afligiremos a nuestro padre de dolor hasta la muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አቡነ / our father
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro padre
  - nuestro anciano
  lexicon: familial kinship term
  rationale: Mantengo el parentesco directo del fuente y el valor narrativo de posesión relacional; no sustituyo por una forma eclesiástica.
- source_word: ያፈቅሮ / loves him
  english_pob_choice: loves him
  chosen_spanish: lo ama
  alternatives_spanish:
  - lo ama
  - lo quiere
  lexicon: love/affection verb
  rationale: '''Ama'' reproduce bien la fuerza afectiva del ge''ez sin debilitarla a mera preferencia.'
- source_word: ወነፍሱኒ እስርት እምነፍስዝ / his life is bound up with his life
  english_pob_choice: his life is bound up with his life
  chosen_spanish: su vida está ligada a la vida de él
  alternatives_spanish:
  - su vida está ligada a la suya
  - su vida está unida a la vida de él
  lexicon: life bound up imagery
  rationale: Conservo la imagen de unión/ligadura sin suavizarla; 'de él' evita ambigüedad de referente en español.
- source_word: ወሬዛ / boy
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el muchacho
  - el niño
  lexicon: child/young male
  rationale: '''Muchacho'' conserva la referencia a un joven varón de forma natural en español y evita infantilizarlo en exceso.'
- source_word: ይመውት / he will die
  english_pob_choice: he will die
  chosen_spanish: él morirá
  alternatives_spanish:
  - él morirá
  - morirá
  lexicon: die
  rationale: Sigo la corrección auditada que elimina el sustantivo añadido; el pronombre explícito ayuda a identificar al padre sin introducir léxico no presente.
- source_word: ወንቀጽዕ / we will afflict
  english_pob_choice: we will afflict
  chosen_spanish: afligiremos
  alternatives_spanish:
  - afligiremos
  - le causaremos aflicción
  lexicon: afflict
  rationale: '''Afligiremos'' expresa la acción de causar dolor/aflicción con fuerza suficiente y sin volver al desacreditado ''bring down''.'
- source_word: በሐዘን እስክ / with sorrow to death
  english_pob_choice: with sorrow to death
  chosen_spanish: con dolor hasta la muerte
  alternatives_spanish:
  - con dolor hasta la muerte
  - hasta la muerte por dolor
  lexicon: sorrow/death
  rationale: '''Dolor'' comunica el lamento interno; ''hasta la muerte'' preserva el desenlace intensivo del giro ge''ez.'
theological_decisions:
- issue: Referencia del sujeto que muere por dolor
  english_pob_reading: if the boy is not with us, that he will die
  chosen_spanish_reading: si el muchacho no está con nosotros, él morirá
  alternative_spanish_readings:
  - si el muchacho no está con nosotros, el muchacho morirá
  - si el muchacho no está con nosotros, morirá
  rationale: Mantengo la referencia contextual al padre sin introducir 'el anciano' ni repetir innecesariamente un nombre ausente; el pronombre explícito deja clara la lectura del pasaje.
  doctrine_reference: Narrative clarity; no doctrinal alteration
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que corrigió el inglés para hacer más natural la referencia a 'his life' y eliminar 'the old man'; por eso el español evita añadir cualquier equivalente de 'anciano' y conserva la relación de vida sin expandir el sujeto más allá del fuente.
  spanish_consistency_notes:
  - Usé 'nuestro padre' de manera consistente para reflejar el parentesco del original.
  - Evité 'SEÑOR' y cualquier terminología litúrgica no motivada por este pasaje.
  - No añadí notas al pie porque no hay una variante española necesaria que requiera anclaje en el texto.
