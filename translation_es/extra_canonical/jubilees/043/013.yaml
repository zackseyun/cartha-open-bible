base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/043/013.yaml
  text: And I[13], your slave, remain alone instead of the boy as a slave to my lord, and let the young man go with his brothers, for I became surety for him from the hand of your slave, our father. And if I do not bring him back, your slave will bear the blame before our father all our days.’
  footnotes:
  - marker: '13'
    text: 'This verse is compressed and somewhat irregular in the transmitted Ge''ez. The translation preserves the main sense: Judah offers himself in place of the boy and explains his obligation to his father.'
    reason: segmentation_note
  - marker: a
    text: Or 'became surety for the boy to my lord, so that the old man might live and the boy might remain with his brothers, because you entrusted him from his mother to your servant, our father, saying, ‘If I do not bring him back, your servant'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:40Z'
    unchanged: false
    changes_summary: 'Revised for accuracy and completeness: changed ''in place of the boy as a slave'' to ''for the boy'' to reflect surety language; restored ''might live'' for the old man; clarified that the boy remains with his brothers; rendered the verb as ''you entrusted him'' rather than ''I received him''; and smoothed the closing clause to ''bear the blame before our father all our days.'' [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: Y yo, tu esclavo, quedaré solo en lugar del muchacho, esclavo de mi señor, y que el joven vaya con sus hermanos, porque salí fiador por él de manos de tu esclavo, nuestro padre. Y si no lo vuelvo a traer, tu esclavo llevará la culpa delante de nuestro padre todos nuestros días’.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘tu esclavo’ traduce con fuerza lexical el término de subordinación del original; el POB inglés ha insistido en no suavizarlo a ‘siervo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ገብርከ
  english_pob_choice: your slave
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  lexicon: δοῦλος / slave terminology in POB policy; Ge'ez rendering of subjection term
  rationale: El contexto y el audit trail inglés sostienen una autoidentificación de dependencia servil; se conserva 'esclavo' para mantener la fuerza lexical, evitando suavizarlo a 'siervo' sin base textual.
- source_word: ባሕቱ / ባሕቱ፡ ህየንቴሁ
  english_pob_choice: alone instead of the boy
  chosen_spanish: quedaré solo en lugar del muchacho
  alternatives_spanish:
  - permaneceré solo en vez del muchacho
  lexicon: placeholder / substitution phrase
  rationale: 'La fórmula expresa sustitución personal: quedar solo en lugar del muchacho. ''En lugar de'' es idiomático y fiel al sentido sustitutivo.'
- source_word: ለሕፃን
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: παῖς / child, boy; contextually the younger brother
  rationale: '''Muchacho'' refleja bien la edad/relación en español y evita la ambigüedad de ''niño'' o el matiz más amplio de ''joven''.'
- source_word: ገብረ
  english_pob_choice: as a slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: δοῦλος
  rationale: Se mantiene la repetición enfática del término de esclavitud para no suavizar el vínculo de subordinación que el inglés POB preserva.
- source_word: ወይሖር
  english_pob_choice: let ... go
  chosen_spanish: que ... vaya
  alternatives_spanish:
  - déjalo ir
  lexicon: verbal permissive / jussive
  rationale: La construcción exhortativa/jusiva en español se expresa con 'que ... vaya', natural y fiel al valor de permiso/mandato.
- source_word: ምስለ፡ አኀዊሁ
  english_pob_choice: with his brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - junto con sus hermanos
  lexicon: prepositional phrase
  rationale: La preposición simple 'con' comunica adecuadamente la compañía del grupo sin añadir énfasis innecesario.
- source_word: ተሀበይክዎ
  english_pob_choice: I became surety for him
  chosen_spanish: salí fiador por él
  alternatives_spanish:
  - me hice garante por él
  - respondí por él
  lexicon: surety / guarantee language
  rationale: '''Salir fiador'' es la equivalencia española más transparente para la obligación asumida por otro; conserva el contenido jurídico de ''became surety''.'
- source_word: እምአደሁ
  english_pob_choice: from the hand of your slave, our father
  chosen_spanish: de manos de tu esclavo, nuestro padre
  alternatives_spanish:
  - de la mano de tu esclavo, nuestro padre
  lexicon: idiom of source/origin/charge
  rationale: Se conserva la imagen semítica 'de manos de' para reflejar que la responsabilidad provino de su custodia/cargo, como sugiere el audit trail.
- source_word: ይሌብከ
  english_pob_choice: will bear the blame
  chosen_spanish: llevará la culpa
  alternatives_spanish:
  - cargará con la culpa
  - soportará la culpa
  lexicon: culpa / blame
  rationale: '''Llevar la culpa'' es natural en español y mantiene la idea de asumir la responsabilidad o el reproche.'
theological_decisions:
- issue: Autoidentificación de José/Judá como 'esclavo'
  english_pob_reading: your slave
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  rationale: Se conserva la dureza social del término sin eufemizarlo. El pasaje enfatiza sumisión y sustitución; suavizarlo alteraría la tensión narrativa.
  doctrine_reference: Lexical/theological transparency policy for δοῦλος
- issue: Valor de 'fiador' en la confesión de responsabilidad
  english_pob_reading: I became surety for him
  chosen_spanish_reading: salí fiador por él
  alternative_spanish_readings:
  - me comprometí por él
  - respondí por él
  rationale: La escena trata de una obligación asumida ante otro. 'Fiador' comunica responsabilidad legal y personal sin introducir doctrinas ajenas.
  doctrine_reference: Genesis 44:32-33 parallel / surety language
- issue: Referencia relacional al 'padre' y culpa futura
  english_pob_reading: before our father all our days
  chosen_spanish_reading: delante de nuestro padre todos nuestros días
  alternative_spanish_readings:
  - ante nuestro padre todos nuestros días
  - en presencia de nuestro padre todos nuestros días
  rationale: '''Delante de'' conserva el matiz de quedar expuesto ante la autoridad paterna y evita una abstracción excesiva.'
  doctrine_reference: Narrative accountability / family obligation
translation_notes:
  revision_awareness: 'El borrador español se ajusta al último pass revisado del audit trail, pero toma en serio la corrección posterior del revisor sobre el error mayor de sentido: el ge''ez no dice que el anciano ''viva'' ni que el muchacho deba ''quedarse'' por la madre; la línea correcta es una oferta de sustitución y liberación del muchacho con sus hermanos, con la confesión de fianza y culpa si no lo devuelve. También se preserva el lenguaje de ''esclavo'' conforme a la política POB tras la revisión que restauró ese término.'
  spanish_consistency_notes:
  - He mantenido 'esclavo' de forma consistente para el término de subordinación, en línea con el POB inglés y la política de traducción.
  - '''Fiador'' se usa por su claridad jurídica en español y por su cercanía al valor de ''surety''.'
  - No se introdujeron términos eclesiásticos tradicionales que apaguen la tensión narrativa del texto.
  - El cierre 'todos nuestros días' reproduce la duración enfática del original sin amplificación.
