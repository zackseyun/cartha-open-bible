    unchanged: false
    changes_summary: 'Changed ''fear this'' to ''do this'' for lexical accuracy; changed ''my slave'' to ''my servant'' for better register and consistency with the opening; removed unsupported additions ''with this cup'' and ''Yet you stole it from me,'' which are not present in the source. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: '«Miren, somos esclavos de nuestro señor, nosotros y también nuestros asnos». Y José les dijo: «¡Lejos esté de mí hacer esto![10] Ustedes, vayan a sus casas; pero su hermano menor será mi esclavo, porque han hecho el mal. ¿No sabían que un hombre ciertamente adivina con su copa, como yo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '10'
    text: La frase traducida «¡Lejos esté de mí hacer esto!» es difícil. El sentido más amplio es la negativa enfática de José a la propuesta de los hermanos de que todos se conviertan en esclavos, seguida de su insistencia en que solo el hermano hallado con la copa quedará retenido.
    reason: textual_variant
lexical_decisions:
- source_word: እግብርቲ / አግብርት
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: δοῦλος / esclavo
  rationale: El contexto y la revisión inglesa restauran la fuerza de dependencia servil; en español, «esclavos» conserva esa carga lexical mejor que «siervos», que suaviza indebidamente el término.
- source_word: እግዚእነ
  english_pob_choice: our lord
  chosen_spanish: nuestro señor
  alternatives_spanish:
  - nuestro dueño
  - nuestro amo
  lexicon: κύριος / señor
  rationale: En este contexto relacional, «nuestro señor» comunica la relación de subordinación sin introducir una connotación adicional que el texto no exige.
- source_word: አእዱጊነሂ
  english_pob_choice: our donkeys also
  chosen_spanish: también nuestros asnos
  alternatives_spanish:
  - también nuestros burros
  - y nuestros asnos también
  lexicon: ὄνος / asno
  rationale: «Asnos» mantiene el referente animal y el registro sobrio del relato; «burros» sería más coloquial y menos adecuado para una traducción bíblica formal.
- source_word: እግዚአብሔር አገሰ አፈረሀ
  english_pob_choice: God forbid that I should do this
  chosen_spanish: ¡Lejos esté de mí hacer esto!
  alternatives_spanish:
  - ¡Dios no lo permita!
  - ¡Que Dios me libre de hacer esto!
  lexicon: μὴ γένοιτο / fórmula de rechazo enfático
  rationale: La expresión ge'ez es difícil y la POB inglesa opta por un rechazo enfático. En español, «¡Lejos esté de mí hacer esto!» conserva esa fuerza idiomática sin añadir contenido no atestiguado.
- source_word: ኑክሙ / አብያቲክሙ
  english_pob_choice: You, go to your houses
  chosen_spanish: Ustedes, vayan a sus casas
  alternatives_spanish:
  - Vayan a sus casas
  - Regresen a sus casas
  lexicon: imperativo de ir / casa
  rationale: Se mantiene el mandato directo y el plural claro. «Vayan a sus casas» es natural en español y fiel al sentido de dispersarse/regresar.
- source_word: እኩየ ገበርክሙ
  english_pob_choice: because you have done evil
  chosen_spanish: porque han hecho el mal
  alternatives_spanish:
  - porque hicieron el mal
  - porque actuaron mal
  lexicon: κακός / mal
  rationale: «Han hecho el mal» refleja bien una acusación moral general sin precisar más de lo que el texto ofrece.
- source_word: ብእሲ ጽዋዖ
  english_pob_choice: a man surely divines with his cup
  chosen_spanish: un hombre ciertamente adivina con su copa
  alternatives_spanish:
  - un hombre sin duda adivina con su copa
  - un hombre realmente adivina por medio de su copa
  lexicon: cup / copa; divining
  rationale: «Copa» sigue la revisión inglesa y el contexto narrativo de la copa; «adivina» conserva la idea de práctica adivinatoria sin suavizarla. La frase queda deliberadamente extraña, porque el texto fuente presenta esa afirmación como tal.
- source_word: አነ
  english_pob_choice: as I do
  chosen_spanish: como yo
  alternatives_spanish:
  - igual que yo
  - tal como yo
  lexicon: comparative identity
  rationale: La comparación final es breve y directa; «como yo» transmite la equivalencia sin sobreinterpretación.
theological_decisions:
- issue: Término de servidumbre para los hermanos y el hermano menor
  english_pob_reading: slaves / my slave
  chosen_spanish_reading: esclavos / mi esclavo
  alternative_spanish_readings:
  - siervos / mi siervo
  - criados / mi criado
  rationale: La POB inglesa mantiene «slave» por fuerza lexical. En español, «esclavo» conserva la tensión social y narrativa; «siervo» diluye el peso del término y no refleja bien la insistencia del pasaje.
  doctrine_reference: 'DOCTRINE.md: preservar la fuerza semántica de δοῦλος cuando el original la exige.'
- issue: Rechazo enfático de José
  english_pob_reading: God forbid that I should do this
  chosen_spanish_reading: ¡Lejos esté de mí hacer esto!
  alternative_spanish_readings:
  - ¡Dios no lo permita!
  - ¡Que Dios me libre de hacer esto!
  rationale: La fórmula no expresa una doctrina nueva, sino una negativa intensa. La traducción elegida conserva el rechazo enfático sin borrar la dificultad textual señalada por la POB.
  doctrine_reference: Nota textual de la POB sobre la frase difícil; evitar suavizar o normalizar indebidamente la expresión.
- issue: Adivinación con la copa
  english_pob_reading: a man surely divines with his cup, as I do
  chosen_spanish_reading: un hombre ciertamente adivina con su copa, como yo
  alternative_spanish_readings:
  - un hombre adivina con su copa, como yo
  - un hombre sin duda practica adivinación con su copa, como yo
  rationale: Se conserva la afirmación de adivinación porque el testimonio de la fuente y la auditoría inglesa la mantienen. No se intenta armonizar el pasaje con categorías teológicas posteriores ni eliminar su aspereza narrativa.
  doctrine_reference: Principio POB de no borrar tensiones teológicas o narrativas documentadas.
translation_notes:
  revision_awareness: La versión inglesa auditada corrigió una lectura previa errónea («fear this») a «do this», restauró «slave» frente a «servant» en el caso de δοῦλος, y eliminó añadidos no respaldados sobre la copa y el robo. La redacción española sigue esa última lectura auditada.
  spanish_consistency_notes:
  - Se mantiene «esclavos» y «esclavo» para δοῦλος, conforme a la política POB y a la revisión más reciente.
  - Se usa «Yahvé» solo cuando el hebreo/etiópico o el contexto lo exijan; aquí el nombre divino de la fuente se traduce como «Dios» por el uso del texto dado y la auditoría inglesa.
  - Se conserva «copa» y no se añade información sobre robo o manipulación que no aparece en el texto fuente.
  - La puntuación y el discurso directo siguen un formato bíblico moderno, claro y publicable en español.
