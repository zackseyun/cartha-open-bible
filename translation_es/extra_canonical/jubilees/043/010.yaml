  text: his slaves. Look, we are slaves to our lord, we and our donkeys also." And Joseph said to them, "God forbid that I should do this[10]. You, go to your houses; but your youngest brother shall be my slave, because you have done evil. Did you not know that a man surely divines with his cup, as I do?
  footnotes:
  - marker: '10'
    text: The phrase rendered 'God forbid that I should do this' is difficult. The broader sense is Joseph's emphatic refusal of the brothers' proposal that all become slaves, followed by his insistence that only the one found with the cup will remain.
    reason: textual_variant
  - marker: a
    text: Or 'Look[10], we are slaves to our lord, we and our donkeys also." And Joseph said to them, "God forbid that I should do this.'.
    reason: previous_rendering
  revision_pass:
