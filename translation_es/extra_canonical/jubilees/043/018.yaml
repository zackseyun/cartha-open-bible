  revision_rationale: Se reemplaza «no habrá arado» por «no se arará» para expresar con mayor fidelidad y naturalidad la ausencia de la labor agrícola de arar. También se ajusta el paralelismo con «ni habrá fruto de árboles» para mantener una sintaxis más fluida en español sin alterar el sentido.
