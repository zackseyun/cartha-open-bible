lexical_decisions:
- source_word: ወዓዲ፡ ... ሀሎ፡
  english_pob_choice: And there are still five years
  chosen_spanish: Y todavía quedan cinco años
  alternatives_spanish:
  - Y aún hay cinco años
  - Y quedan todavía cinco años
  lexicon: no lexicon entry number available
  rationale: La partícula de continuación y la idea de resto temporal se expresan con «todavía quedan», que comunica con naturalidad la persistencia de un período por delante sin perder el sentido de remanente temporal del ge'ez.
- source_word: ኃምስቱ፡ ዓመት፡
  english_pob_choice: five years
  chosen_spanish: cinco años
  alternatives_spanish:
  - cinco años restantes
  lexicon: no lexicon entry number available
  rationale: Se conserva el valor literal del período temporal sin expansión interpretativa.
- source_word: ወአልቦ፡ ማእረር፡
  english_pob_choice: there will be no plowing
  chosen_spanish: no habrá arado
  alternatives_spanish:
  - no habrá labranza
  - no se arará
  lexicon: no lexicon entry number available
  rationale: El sustantivo concreto «arado» reproduce la ausencia de labor agrícola indicada por el texto; «labranza» sería más general, y «no se arará» cambia la estructura nominal del original.
- source_word: ወአልቦ፡ ፍሬ፡ ዕፅ፡
  english_pob_choice: no fruit of trees
  chosen_spanish: ni fruto de árboles
  alternatives_spanish:
  - ni fruto de los árboles
  - ni fruto de los árboles frutales
  lexicon: no lexicon entry number available
  rationale: Se mantiene la construcción breve y paralela del original. «Fruto de árboles» deja el referente abierto como en el ge'ez, sin forzar una especificación adicional.
- source_word: ወአልቦ፡ ሐፅስ።
  english_pob_choice: no harvest
  chosen_spanish: ni cosecha
  alternatives_spanish:
  - ni recolección
  - ni siega
  lexicon: no lexicon entry number available
  rationale: «Cosecha» es el equivalente más natural y amplio en español para la ausencia de recolección agrícola final mencionada por el texto.
theological_decisions:
- issue: Enumeración de carencias agrícolas como juicio o sequía prolongada
  english_pob_reading: no plowing, and no fruit of trees, and no harvest
  chosen_spanish_reading: no habrá arado, ni fruto de árboles, ni cosecha
  alternative_spanish_readings:
  - no habrá labranza, ni fruto de árboles, ni cosecha
  - no habrá arado, ni fruto de los árboles, ni cosecha
  rationale: El verso enumera privaciones concretas en paralelo. La traducción conserva esa forma de juicio económico-agrícola sin añadir explicaciones causales que el texto no da.
  doctrine_reference: Principio de suficiencia textual y preservación del paralelismo descriptivo
translation_notes:
  revision_awareness: La traducción sigue la revisión inglesa que añadió explícitamente «five years» para reflejar por completo el texto fuente; por eso el español inicia con «Y todavía quedan cinco años». No se introdujeron notas porque el verso no presenta variantes textuales ni tensiones léxicas que requieran aclaración adicional.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y directo, apto para lectura pública.
  - Se evitó «SEÑOR» o terminología doctrinal ajena al contenido, ya que el verso no contiene nombres divinos ni referencias cristológicas.
  - Se preservó la paralelidad negativa con «ni» en lugar de reescrituras explicativas.
