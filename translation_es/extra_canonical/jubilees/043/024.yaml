translation:
  language: es
  text: y diez asnos cargados de grano. Y los envió. Ellos subieron y dijeron a su padre que José estaba vivo, y que él repartía grano a todos los pueblos de la tierra y gobernaba.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐሠርተ፡ አእዱገ፡
  english_pob_choice: ten donkeys
  chosen_spanish: diez asnos
  alternatives_spanish:
  - diez burros
  - diez bestias de carga
  lexicon: source lexical item for animal of burden
  rationale: «Asnos» conserva el valor básico de animal de carga sin modernizarlo de modo coloquial ni reducirlo a «burros», que en español puede sonar demasiado informal. «Bestias de carga» explicaría la función, pero pierde la sencillez del original.
- source_word: ዘይወስዱ፡ ስርናየ፡
  english_pob_choice: carrying grain
  chosen_spanish: cargados de grano
  alternatives_spanish:
  - que llevaban grano
  - transportando grano
  lexicon: participle/action of carrying + grain
  rationale: «Cargados de grano» refleja la idea de animales o cargas que llevan grano con naturalidad en español y mantiene la imagen concreta del texto.
- source_word: ፈነዎሙ።
  english_pob_choice: he sent them away
  chosen_spanish: los envió
  alternatives_spanish:
  - los despidió
  - los mandó lejos
  lexicon: send away / dismiss
  rationale: El verbo ge’ez indica que Jacob los despachó; «los envió» es fiel y sobrio. «Los despidió» añade connotación de despedida que no está explicitada, aunque sería posible.
- source_word: ወዐርጉ፡
  english_pob_choice: they went up
  chosen_spanish: Ellos subieron
  alternatives_spanish:
  - subieron
  - se encaminaron hacia arriba
  lexicon: go up / ascend
  rationale: «Subieron» conserva el movimiento ascendente literal y funciona bien en español bíblico sin sonar forzado.
- source_word: ዜነዉ፡
  english_pob_choice: told
  chosen_spanish: dijeron
  alternatives_spanish:
  - contaron
  - anunciaron
  lexicon: report / tell
  rationale: En este contexto, «dijeron a su padre» comunica el reporte sin sobrecargarlo. «Contaron» también sería viable, pero «dijeron» sigue de cerca el enunciado directo.
- source_word: ዮሴፍ፡ ሕያው፡
  english_pob_choice: Joseph was alive
  chosen_spanish: José estaba vivo
  alternatives_spanish:
  - José vivía
  - José seguía con vida
  lexicon: alive / living
  rationale: «Estaba vivo» reproduce con claridad el estado de vida comunicado al padre. «Seguía con vida» enfatiza persistencia, pero el texto solo afirma la vida presente.
- source_word: ይበፍር፡ ስርናየ፡
  english_pob_choice: distributing grain
  chosen_spanish: repartía grano
  alternatives_spanish:
  - distribuía grano
  - vendía grano
  lexicon: dispense / distribute grain
  rationale: «Repartía» expresa la acción de distribuir con naturalidad. «Distribuía» es más formal, pero «repartía» mantiene mejor el movimiento concreto del abastecimiento.
- source_word: ለኵሉ፡ አሕዛበ፡ ምድር፡
  english_pob_choice: to all the peoples of the earth
  chosen_spanish: a todos los pueblos de la tierra
  alternatives_spanish:
  - a todas las naciones de la tierra
  - a toda la gente de la tierra
  lexicon: all peoples/nations of the earth
  rationale: «Pueblos» refleja bien el plural colectivo de las naciones o grupos humanos. «Naciones» sería posible, pero «pueblos» evita una lectura demasiado moderna y mantiene amplitud étnica.
- source_word: ይኴንን፡
  english_pob_choice: ruling
  chosen_spanish: gobernaba
  alternatives_spanish:
  - reinaba
  - estaba gobernando
  lexicon: rule / govern
  rationale: «Gobernaba» transmite el ejercicio real de autoridad en español contemporáneo. «Reinaba» sería más monárquico de lo necesario; «estaba gobernando» suena menos natural.
theological_decisions:
- issue: Joseph’s authority over the peoples of the earth
  english_pob_reading: he was distributing grain to all the peoples of the earth and ruling
  chosen_spanish_reading: él repartía grano a todos los pueblos de la tierra y gobernaba
  alternative_spanish_readings:
  - él distribuía grano a todas las naciones de la tierra y reinaba
  - él repartía grano a toda la gente de la tierra y mandaba
  rationale: El texto atribuye a José una autoridad amplia vinculada al suministro de grano y al gobierno. «Gobernaba» conserva el sentido de autoridad sin introducir una formulación más monárquica que el contexto no exige.
  doctrine_reference: No doctrinal issue; narrative description of Joseph’s delegated authority.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que solo añadió puntuación final. No se requieren notas de variante textual ni cambios de sentido respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «José» para יוסף conforme al estándar del proyecto.
  - Se usa verbo en pasado simple e imperfecto para reflejar la secuencia narrativa y el trasfondo descriptivo.
  - No se introduce «Mesías», «SEÑOR» ni otros equivalentes no presentes en el pasaje.
  - La frase final conserva una estructura coordinada cercana al inglés POB, pero ajustada a la sintaxis natural del español.
