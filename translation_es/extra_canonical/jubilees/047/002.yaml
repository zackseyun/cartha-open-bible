base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/047/002.yaml
  text: That was a time of affliction upon the children of Israel, and Pharaoh, king of Egypt, commanded concerning them that they should throw all their children, every male that was born, into the river.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:52Z'
    unchanged: false
    changes_summary: Reordered 'Pharaoh, king of Egypt' for more natural English and changed 'sons' to 'children' to reflect the source more fully, while retaining 'every male that was born' for specificity.
translation:
  language: es
  text: Era un tiempo de aflicción para los hijos de Israel, y Faraón, rey de Egipto, ordenó respecto de ellos que arrojaran al río a todos sus niños, a todo varón que naciera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኢዮቤልው፡ ዘውእቱ፡ መዋዕለ፡ ምንዳቤ፡
  english_pob_choice: That was a time of affliction
  chosen_spanish: Era un tiempo de aflicción
  alternatives_spanish:
  - Fue un tiempo de aflicción
  - Era un tiempo de angustia
  lexicon: aflicción
  rationale: La expresión ge'ez indica un período caracterizado por opresión o sufrimiento; «aflicción» conserva bien ese valor y mantiene un tono bíblico sobrio sin intensificar más allá del texto.
- source_word: ውሉደ፡ እስራኤል
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los descendientes de Israel
  lexicon: hijos
  rationale: «Hijos de Israel» es la correspondencia más directa y tradicional para esta fórmula de pueblo, y respeta la referencia colectiva del original sin hacerla más explicativa de lo necesario.
- source_word: ፈርዖን፡ ትእዛዘ፡ ላዕሌሆሙ፡
  english_pob_choice: Pharaoh, king of Egypt, commanded concerning them
  chosen_spanish: Faraón, rey de Egipto, ordenó acerca de ellos
  alternatives_spanish:
  - Faraón, rey de Egipto, mandó acerca de ellos
  - Faraón, rey de Egipto, dio una orden contra ellos
  lexicon: ordenó
  rationale: El verbo ge'ez expresa una orden real dirigida contra el pueblo. «Ordenó» conserva la fuerza autoritativa y el sentido de mandato sin añadir una implicación más fuerte que la evidenciada por el texto.
- source_word: ይግድፉ፡ ውሉዶሙ፡ ኵሎ፡ ርሰ፡ ዘተወልደ፡ ውስተ፡ ፈለግ
  english_pob_choice: that they should throw all their children, every male that was born, into the river
  chosen_spanish: que arrojaran al río a todos sus hijos, a todo varón que naciera
  alternatives_spanish:
  - que echaran al río a todos sus hijos, a todo varón que naciera
  - que lanzaran al río a todos sus hijos, a todo varón que naciera
  lexicon: arrojar al río
  rationale: «Arrojar al río» reproduce el acto violento con claridad en español y sigue la decisión inglesa de conservar «children» junto con la especificación «every male that was born». «A todo varón que naciera» refleja el valor distributivo del original sin introducir una formulación más técnica que el texto no exige.
theological_decisions:
- issue: Alcance de «hijos» frente a «hijos varones»
  english_pob_reading: all their children, every male that was born
  chosen_spanish_reading: todos sus hijos, a todo varón que naciera
  alternative_spanish_readings:
  - todos sus hijos varones
  - todos sus niños varones
  rationale: La revisión inglesa prefirió «children» para reflejar mejor el sustantivo amplio del fuente, sin perder la restricción posterior a los varones. En español, «hijos» mantiene esa amplitud inicial y la segunda frase conserva la especificación masculina, evitando reducir el mandato a solo varones desde la primera cláusula.
  doctrine_reference: Éxodo 1:16; Éxodo 1:22
- issue: Relación entre «Faraón, rey de Egipto» y el título real
  english_pob_reading: Pharaoh, king of Egypt
  chosen_spanish_reading: Faraón, rey de Egipto
  alternative_spanish_readings:
  - Faraón, rey egipcio
  - el rey de Egipto, Faraón
  rationale: Se mantiene la aposición titulada tal como la estructura del texto la presenta, porque comunica de forma transparente la identificación histórica del gobernante sin confundirla con un nombre propio separado.
  doctrine_reference: Génesis 41:46; Éxodo 1:8
translation_notes:
  revision_awareness: La revisión inglesa más reciente reordenó el título a «Pharaoh, king of Egypt» por naturalidad y cambió «sons» por «children» para reflejar mejor el fuente; la versión española sigue esa misma intención al usar una aposición natural y al conservar «hijos» con la especificación posterior «a todo varón que naciera».
  spanish_consistency_notes:
  - He traducido el marco narrativo de manera sobria y directa, sin suavizar el carácter opresivo de «aflicción».
  - He mantenido la imagen concreta de arrojar al río, en línea con el mandato violento del pasaje y con la precisión de nacimiento masculino del original.
  - No se añaden notas de pie porque el verso no introduce una ambigüedad textual o léxica que requiera alternativa editorial en español.
