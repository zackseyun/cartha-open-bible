- from: Era un tiempo de aflicción para los hijos de Israel, y Faraón, rey de Egipto, ordenó acerca de ellos que arrojaran al río a todos sus hijos, a todo varón que naciera.
  to: Era un tiempo de aflicción para los hijos de Israel, y Faraón, rey de Egipto, ordenó respecto de ellos que arrojaran al río a todos sus niños, a todo varón que naciera.
  rationale: Se ajusta «hijos» a «niños» para reflejar mejor la amplitud del sustantivo fuente y la decisión inglesa de conservar «children» antes de la especificación masculina. También se reemplaza «acerca de ellos» por «respecto de ellos» para un español más natural sin cambiar el sentido.
