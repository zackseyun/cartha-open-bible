    timestamp: '2026-04-23T14:52:53Z'
    unchanged: false
    changes_summary: 'Replaced unrelated draft text with a translation that matches the Ge''ez: includes the time phrase, Tarmut, Pharaoh, bathing in the river, hearing the voice while crying, and speaking to her maidservants.'
translation:
  language: es
  text: Y en aquellos días, Tarmut[a], la hija de Faraón, salió a bañarse en el río, y oyó tu voz mientras llorabas, y dijo a sus doncellas que te sacaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nombre de la hija de Faraón en Jubileos, correspondiente a Thermouthis en Josefo (Antigüedades 2.224).
    reason: historical_context
lexical_decisions:
- source_word: ታርሙት
  english_pob_choice: Tarmut
  chosen_spanish: Tarmut
  alternatives_spanish:
  - Tarmuth
  lexicon: Leslau
  rationale: Se conserva la transliteración del nombre propio usada por el POB en inglés, sin adaptar la forma al español más allá de la ortografía mínima del nombre.
- source_word: ወጽአት
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: Leslau
  rationale: El verbo simple 'salió' reproduce el movimiento de salida de forma natural en español y corresponde al valor básico del verbo en el contexto narrativo.
- source_word: ትትሐፀብ
  english_pob_choice: to bathe
  chosen_spanish: a bañarse
  alternatives_spanish:
  - para bañarse
  - a lavarse
  lexicon: Leslau
  rationale: '''Bañarse'' expresa de modo directo la acción de bañarse en el río; evita una paráfrasis excesiva y mantiene el sentido narrativo.'
- source_word: በውስተ፡ ፈለግ
  english_pob_choice: in the river
  chosen_spanish: en el río
  alternatives_spanish:
  - a la orilla del río
  - dentro del río
  lexicon: Leslau
  rationale: La preposición 'en' refleja adecuadamente el escenario locativo dado por el texto fuente.
- source_word: ወሰምዐት፡ ቃለከ፡ እንዘ፡ ትበኪ
  english_pob_choice: she heard your voice crying
  chosen_spanish: oyó tu voz mientras llorabas
  alternatives_spanish:
  - oyó tu voz que lloraba
  - oyó tu voz, llorando
  lexicon: Leslau
  rationale: El geʿez indica que ella oyó la voz del interlocutor 'mientras llorabas'; 'mientras llorabas' conserva la relación temporal y evita personificar indebidamente la voz.
- source_word: አዕጋሪቲሃ
  english_pob_choice: her maidens
  chosen_spanish: sus criadas
  alternatives_spanish:
  - sus doncellas
  - sus sirvientas
  lexicon: Leslau
  rationale: '''Criadas'' es una opción clara y digna para el séquito femenino de la hija de Faraón; preserva el carácter de asistentes femeninas sin sobreactuar el matiz social.'
- source_word: ያውፅኣከ
  english_pob_choice: bring you out
  chosen_spanish: te sacaran
  alternatives_spanish:
  - te trajeran fuera
  - te hicieran salir
  lexicon: Leslau
  rationale: En el mandato indirecto español, 'que te sacaran' corresponde de manera natural a la idea de hacer salir/sacar al niño desde el lugar donde estaba.
theological_decisions:
- issue: Identidad de Yahvé no aparece de forma explícita en este verso
  english_pob_reading: No theological rendering issue in the English POB for this verse
  chosen_spanish_reading: No se introduce ninguna equivalencia teológica adicional; el verso permanece narrativo
  alternative_spanish_readings:
  - Agregar 'Señor' o una lectura devocional implícita
  rationale: El pasaje no contiene el nombre divino ni un título teológico que requiera decisión doctrinal; por eso la traducción se mantiene estrictamente narrativa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente que corrigió el contenido para ajustarlo al geʿez de Jubileos 47:5: Tarmut sale a bañarse en el río, oye la voz del niño mientras llora y ordena a sus criadas que lo saquen. Se evita arrastrar material de versículos previos o una imagen de cesta/arca que no pertenece a este segmento.'
  spanish_consistency_notes:
  - Se usa 'Faraón' para Pharaoh, en línea con el uso bíblico estándar en español y el contexto narrativo.
  - Se mantiene el tiempo introductorio 'Y en aquellos días' para reflejar la fórmula narrativa del texto fuente.
  - '''Criadas'' traduce el grupo femenino de asistentes sin introducir connotaciones adicionales.'
  - La puntuación conserva una sola oración compuesta, como en el flujo narrativo del original.
