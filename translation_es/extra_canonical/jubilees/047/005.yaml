  yaml_path: translation/extra_canonical/jubilees/047/005.yaml
  text: And in those days Tarmut[a], the daughter of Pharaoh, went out to bathe in the river, and she heard your voice crying, and she told her maidens to bring you out.
  footnotes:
  - marker: a
    text: The name given to Pharaoh's daughter in Jubilees, corresponding to Thermouthis in Josephus (Antiquities 2.224).
    reason: historical_context
  revision_pass:
