translation:
  language: es
  text: Y en la séptima semana[a], en el séptimo año, en el cuadragésimo séptimo jubileo, tu padre vino de la tierra de Canaán, y tú naciste en la cuarta semana, en el sexto año, en el cuadragésimo octavo jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en la séptima semana del séptimo año".'
    reason: Preserva la alternativa/lectura anterior documentada en la POB inglesa, aunque el texto principal mantiene correctamente las dos coordenadas cronológicas separadas.
lexical_decisions:
- source_word: ወበሱባዔ / week
  english_pob_choice: week
  chosen_spanish: semana
  alternatives_spanish:
  - heptada
  - período de siete años
  lexicon: week = jubilee chronology unit
  rationale: En Jubileos, 'week' designa una unidad cronológica de siete años; 'semana' es natural en español y puede conservar ese valor técnico en contexto, mientras que 'heptada' sería más marcado y menos transparente para lectores generales.
- source_word: ዓመት / year
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - año calendario
  lexicon: year = chronological year
  rationale: '''Año'' reproduce el valor cronológico simple del texto y, junto con ''semana'', mantiene la fórmula técnica de datación sin sobreexplicarla.'
- source_word: ኢዮቤልዉ / jubilee
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - jubileo
  lexicon: jubilee = jubilee cycle
  rationale: '''Jubileo'' es el equivalente español estándar y conserva el término técnico del ciclo cronológico del libro.'
- source_word: አቡከ / your father
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu padre
  lexicon: father = paternal referent
  rationale: Se mantiene la relación posesiva directa del segundo singular, sin necesidad de perífrasis.
- source_word: እምድረ ከናአን / from the land of Canaan
  english_pob_choice: from the land of Canaan
  chosen_spanish: de la tierra de Canaán
  alternatives_spanish:
  - desde la tierra de Canaán
  - de la región de Canaán
  lexicon: land = territory/land
  rationale: '''Tierra de Canaán'' sigue de cerca el referente territorial del original y del inglés auditado, con una formulación natural en español.'
- source_word: ተወለድከ / you were born
  english_pob_choice: you were born
  chosen_spanish: naciste
  alternatives_spanish:
  - fuiste nacido
  lexicon: born = birth event
  rationale: '''Naciste'' es la forma natural y fiel para el evento pasivo de nacimiento en español actual; evita la rigidez de un pasivo perifrástico.'
theological_decisions:
- issue: Cronología técnica de 'week' dentro del sistema de Jubileos
  english_pob_reading: And in the seventh week, in the seventh year ... in the fourth week, in the sixth year ...
  chosen_spanish_reading: Y en la séptima semana, en el séptimo año ... en la cuarta semana, en el sexto año ...
  alternative_spanish_readings:
  - Y en la séptima semana del séptimo año ...
  - Y en la séptima semana, del séptimo año ...
  rationale: 'Se evita ''de la séptima año/semana'' porque alteraría la jerarquía cronológica del sistema jubilar. La revisión fuente-auditada exige conservar dos coordenadas separadas: semana y año dentro de esa semana.'
  doctrine_reference: Jubilees chronological system
- issue: Referencia a 'jubileo' como unidad histórica y no como celebración litúrgica
  english_pob_reading: in the forty-seventh jubilee / in the forty-eighth jubilee
  chosen_spanish_reading: en el cuadragésimo séptimo jubileo / en el cuadragésimo octavo jubileo
  alternative_spanish_readings:
  - en el quincuagésimo ciclo
  - en el jubileo 47/48
  rationale: Se preserva el término técnico 'jubileo' como unidad de cómputo histórico, sin reinterpretarlo como fiesta religiosa ni modernizarlo como 'ciclo' en el texto principal.
  doctrine_reference: Jubilees chronology
translation_notes:
  revision_awareness: La versión inglesa fue corregida a partir de una lectura errónea de 'in the seventh week of the seventh year' a 'in the seventh week, in the seventh year'. La traducción española sigue esa revisión y refleja dos dataciones paralelas, no una subordinación posesiva.
  spanish_consistency_notes:
  - Se usa 'semana' para la unidad jubilar porque el contexto deja claro que no se trata de siete días ordinarios.
  - Se mantiene 'jubileo' de forma uniforme para las dos ocurrencias, preservando la terminología técnica del libro.
  - No se introducen notas al pie porque no hay una ambigüedad textual adicional que deba marcarse en el verso final.
