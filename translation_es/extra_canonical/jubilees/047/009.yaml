base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/047/009.yaml
  text: And wages were paid, and she nursed you. And after this, when you had grown up, they brought you to Pharaoh’s daughter, and you became her son. And your father Amram taught you writing, and when you had completed three weeks of years, he brought you into the court.
  footnotes:
  - marker: a
    text: Or 'And he protected and sheltered you.'.
    reason: previous_rendering
  - marker: b
    text: Or 'your sister took you and gave you'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:56Z'
    unchanged: false
    changes_summary: 'Replaced the draft entirely to match the Ge''ez source: restored the opening clause about protection, the role of the sister and Pharaoh’s daughter, adoption language, Amram teaching writing, and the completion of three weeks of years before being brought into the court. Removed material about leaving the court and seeing an Egyptian, which belongs to a different context and is not in this verse.'
translation:
  language: es
  text: Y se pagaron los salarios, y ella te amamantó. Y después de esto, cuando hubiste crecido, te llevaron a la hija de Faraón, y viniste a ser su hijo. Y tu padre Amram te enseñó a escribir, y cuando hubiste completado tres semanas de años, te llevó a la corte.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ዐስበ፡
  english_pob_choice: And wages were paid
  chosen_spanish: Y se pagaron los salarios
  alternatives_spanish:
  - Y se pagaron las pagas
  - Y se dieron salarios
  lexicon: Ge'ez ዐስበ = pagar salario / wages
  rationale: El control textual revisado corrige la lectura anterior de 'proteger y amparar' y confirma la idea de pago de salario. 'Salarios' comunica bien el sentido económico y conserva la concreción del original.
- source_word: ወሐፀነተከ።
  english_pob_choice: and she nursed you
  chosen_spanish: y ella te crió
  alternatives_spanish:
  - y ella te amamantó
  - y ella te amparó mientras te amamantaba
  lexicon: Ge'ez ሐፀነ = amamantar / criar, with feminine subject
  rationale: El Ge'ez indica una mujer como sujeto; en español 'crió' puede abarcar la crianza y el cuidado infantil sin forzar un detalle biológico demasiado específico. 'Amamantó' es posible, pero 'crió' resulta más natural en un registro bíblico amplio.
- source_word: ልሂቀከ፡ ወሰዱከ
  english_pob_choice: when you had grown up, they brought you
  chosen_spanish: cuando hubiste crecido, te llevaron
  alternatives_spanish:
  - cuando creciste, te llevaron
  - cuando hubiste crecido, te trajeron
  lexicon: Ge'ez ልሂቀ = crecer / hacerse grande; ወሰዱ = llevar / traer
  rationale: La revisión auditada muestra que la frase habla del crecimiento previo y de que 'ellos' lo llevaron. 'Te llevaron' mantiene la pluralidad del sujeto y evita introducir a la hermana, que no está en este versículo.
- source_word: ለወለተ፡ ፈርዖን፡
  english_pob_choice: to Pharaoh’s daughter
  chosen_spanish: a la hija de Faraón
  alternatives_spanish:
  - a la hija del Faraón
  - ante la hija de Faraón
  lexicon: Ge'ez construct phrase for Pharaoh's daughter
  rationale: Se conserva la relación posesiva de forma clara y natural en español. 'Faraón' mantiene el nombre propio tradicional sin alterar el sentido.
- source_word: ወኮንከ፡ ውሉዳ፡
  english_pob_choice: and you became her son
  chosen_spanish: y viniste a ser su hijo
  alternatives_spanish:
  - y llegaste a ser su hijo
  - y fuiste hecho su hijo
  lexicon: Ge'ez ኮነ = llegar a ser / convertirse en
  rationale: '''Viniste a ser'' comunica con fidelidad el valor de devenir del verbo sin imponer una formulación jurídica más fuerte de la que el texto explícitamente da. Refleja la adopción o incorporación filial indicada por el contexto.'
- source_word: መጽሐፈ፡
  english_pob_choice: writing
  chosen_spanish: a escribir
  alternatives_spanish:
  - la escritura
  - letras
  lexicon: Ge'ez መጽሐፍ = escrito / libro / writing
  rationale: El inglés POB eligió 'writing' por el sentido de instrucción básica en letras. En español, 'a escribir' es la opción más natural y suficientemente abierta para cubrir alfabetización o instrucción escrita.
- source_word: ፈጸምከ፡ ሠለስተ፡ ሱባዔ፡ አብአከ፡ ውስተ፡ ዐጸደ፡
  english_pob_choice: when you had completed three weeks of years, he brought you into the court
  chosen_spanish: y cuando hubiste completado tres semanas de años, te llevó al palacio
  alternatives_spanish:
  - y cuando hubiste completado tres semanas de años, te llevó a la corte
  - y al completar tres semanas de años, te llevó al palacio
  lexicon: Ge'ez ሠለስተ ሱባዔ = three weeks; formulaic Jubilee chronology
  rationale: '''Tres semanas de años'' conserva la cronología jubilar literal del texto. ''Palacio'' se elige para ዐጸደ en este contexto cortesano como equivalente español claro; ''corte'' sigue siendo una alternativa viable, pero ''palacio'' evita ambigüedad con un recinto judicial.'
theological_decisions:
- issue: Adopción/filialidad respecto de la hija de Faraón
  english_pob_reading: and you became her son
  chosen_spanish_reading: y viniste a ser su hijo
  alternative_spanish_readings:
  - y fuiste hecho su hijo
  - y llegaste a ser su hijo
  rationale: El texto afirma un cambio de estatus filial, pero no desarrolla el mecanismo legal. 'Viniste a ser' conserva la transición sin sobrerregularla con una formulación moderna de adopción que podría exceder el dicho explícito.
  doctrine_reference: Narrative identity and adoption language in the Exodus tradition; cf. Ex 2:10
- issue: Cronología jubilar literal
  english_pob_reading: three weeks of years
  chosen_spanish_reading: tres semanas de años
  alternative_spanish_readings:
  - tres semanas-años
  - tres semanas anuales
  rationale: La expresión es técnica en Jubileos y no debe suavizarse. Se mantiene la literalidad para preservar la estructura calendárica del libro y su sistema de cómputo.
  doctrine_reference: Jubilees chronology / calendrical framework
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente que restauró la línea de pago de salarios y la acción de amamantar/criar, corrigió el sujeto femenino, eliminó la hermana como agente de esta cláusula y mantuvo el crecimiento previo antes de ser llevado ante la hija de Faraón. También toma en cuenta que el texto no habla aquí de salir del palacio ni de ver a un egipcio.
  spanish_consistency_notes:
  - Se mantuvo 'Faraón' con mayúscula como nombre propio consistente en el proyecto.
  - Se usó 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó 'Mesías'/'Cristo' porque no aparece terminología mesiánica en el pasaje.
  - '''Palacio'' se reservó en la nota como alternativa a ''corte'' para reflejar el valor espacial/cortesano de ዐጸደ sin sobretraducir.'
