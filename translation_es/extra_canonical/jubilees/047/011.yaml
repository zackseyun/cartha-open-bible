base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/047/011.yaml
  text: And you killed him and hid him in the sand. And on the second day you found two of the sons of Israel fighting, and you said to the one who was doing wrong, “Why are you striking?”
  footnotes:
  - marker: a
    text: Or 'And on the second day you found two of the sons of Israel fighting, and you said to the one who was doing wrong, “Why are you striking your companion?”'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:55Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: included ''on the second day,'' ''you found,'' ''two of the sons of Israel fighting,'' and Moses'' question to the wrongdoer. Rendered ዘይትአገሎ as ''the one who was doing wrong'' and ትዘብጥ as ''are you striking.'''
translation:
  language: es
  text: 'Y lo mataste y lo escondiste en la arena. Y al segundo día encontraste a dos de los hijos de Israel peleando, y le dijiste al que obraba mal: «¿Por qué golpeas?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወቀተልኮ፡ ወኀባእኮ፡ ውስተ፡ ኆፃ።
  english_pob_choice: And you killed him and hid him in the sand.
  chosen_spanish: Y mataste a ese hombre y lo escondiste en la arena.
  alternatives_spanish:
  - Y lo mataste y lo escondiste en la arena.
  - Y mataste a él y lo ocultaste en la arena.
  lexicon: قتل / esconder / arena
  rationale: 'El geʿez expresa dos acciones directas: matar y esconder en la arena. En español, «ese hombre» hace explícito el referente implícito sin añadir contenido ajeno, y «arena» sigue de cerca el sustantivo del texto fuente.'
- source_word: ወበሳኒታ፡ ዕለት፡ ረከብከ፡ ፪
  english_pob_choice: And on the second day you found two
  chosen_spanish: Y al segundo día encontraste a dos
  alternatives_spanish:
  - Y en el segundo día hallaste a dos
  - Y al día siguiente encontraste a dos
  lexicon: יום שני / encontrar
  rationale: «Al segundo día» reproduce con naturalidad la referencia temporal del geʿez. «Encontraste» conserva el valor de hallazgo del verbo sin forzar una lectura más interpretativa.
- source_word: ውሉደ፡ እስራኤል፡
  english_pob_choice: the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los hijos de Israel
  - de los hijos de Israel
  lexicon: בני ישראל / hijos de Israel
  rationale: Se mantiene la fórmula bíblica tradicional y transparente, que corresponde bien al genitivo colectivo del original.
- source_word: ይትበአሱ፡
  english_pob_choice: fighting
  chosen_spanish: peleando
  alternatives_spanish:
  - peleando
  - discutiendo
  - luchando
  lexicon: pelear / contender
  rationale: El contexto de la escena pide un conflicto físico o violento; «peleando» es claro en español y no introduce una especificación mayor que la del texto.
- source_word: ዘይትአገሎ፡
  english_pob_choice: the one who was doing wrong
  chosen_spanish: el que estaba obrando mal
  alternatives_spanish:
  - el que estaba haciendo mal
  - el que estaba actuando injustamente
  lexicon: hacer mal / obrar mal
  rationale: La expresión geʿez señala al culpable o al que actuaba incorrectamente. «Obrando mal» conserva el juicio moral sin precisar más de lo que el texto dice.
- source_word: ትዘብጥ፡
  english_pob_choice: Why are you striking?
  chosen_spanish: ¿Por qué golpeas?
  alternatives_spanish:
  - ¿Por qué pegas?
  - ¿Por qué estás golpeando?
  lexicon: golpear / herir
  rationale: El verbo puede expresar un golpe físico; «golpeas» es breve, natural y fiel al cuestionamiento directo del original. No se añade objeto porque el geʿez no lo incluye en este versículo.
theological_decisions:
- issue: Objeto omitido en la pregunta final
  english_pob_reading: Why are you striking?
  chosen_spanish_reading: ¿Por qué golpeas?
  alternative_spanish_readings:
  - ¿Por qué golpeas a tu compañero?
  - ¿Por qué lo golpeas?
  rationale: El geʿez transmitido termina con el verbo sin objeto explícito. Por eso se evita añadir «a tu compañero» u otro complemento que no está en el texto fuente.
  doctrine_reference: Fidelidad textual y mínima inferencia; no se amplía el alcance del reproche más allá de la evidencia del manuscrito.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un borrador ajeno al texto geʿez y señaló dos puntos clave: incluir la muerte y ocultamiento en la arena, y no añadir el objeto «your companion» a la pregunta final. Esta versión sigue esa corrección y evita la expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» como fórmula bíblica estable.
  - Se conserva el foco verbal en segunda persona singular, coherente con el discurso directo del texto.
  - No se introduce «compañero» ni otro objeto en la pregunta final, porque el geʿez no lo contiene.
  - «Arena» se usa de manera literal y no se sustituye por una paráfrasis más general como «tierra» o «polvo».
