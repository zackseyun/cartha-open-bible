base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/047/010.yaml
  text: And you were in the court of the king for three weeks of years until the day when you went out from the court of the king and saw an Egyptian striking your fellow countryman, one of your brothers.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:56Z'
    unchanged: false
    changes_summary: 'Replaced the draft, which reflected Exodus 2:12–13 rather than this verse. Restored the verse’s actual content: Moses being in the king’s court for three weeks of years, going out from the royal court, and seeing an Egyptian striking his fellow countryman.'
translation:
  language: es
  text: Y estuviste en la corte del rey durante tres semanas de años, hasta el día en que saliste de la corte del rey y viste a un egipcio golpeando a tu compatriota, uno de tus hermanos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውስተ፡ ዐጸድ፡ መንግሥት፡
  english_pob_choice: in the court of the king
  chosen_spanish: en la corte del rey
  alternatives_spanish:
  - en el patio del rey
  - en la presencia del rey
  lexicon: corte / palacio real
  rationale: El ge'ez habla de estar 'en la corte' o recinto real; el inglés POB fija 'court of the king'. 'Corte del rey' conserva la ubicación institucional y evita ampliar indebidamente a 'palacio'.
- source_word: ሠለስተ፡ ሱባዔ፡ ዓመተ፡
  english_pob_choice: three weeks of years
  chosen_spanish: tres semanas de años
  alternatives_spanish:
  - tres sietes de años
  - tres ciclos de siete años
  lexicon: semana de años / período septenario
  rationale: La expresión reproduce una unidad septenaria literal. 'Semanas de años' preserva la rareza técnica del original y la decisión inglesa, sin convertirla en un mero 'período de años'.
- source_word: ወፃእከ፡ እምዐጸደ፡ መንግሥት፡
  english_pob_choice: when you went out from the court of the king
  chosen_spanish: cuando saliste de la corte del rey
  alternatives_spanish:
  - cuando saliste del patio del rey
  - cuando saliste del palacio del rey
  lexicon: salir de la corte
  rationale: '''Salir de la corte del rey'' mantiene el mismo marco institucional que el inglés auditado y evita interpretar más de lo necesario.'
- source_word: ለግብጻዊ፡ እንዘ፡ *ይዘብጦ፡
  english_pob_choice: an Egyptian striking
  chosen_spanish: a un egipcio golpeando
  alternatives_spanish:
  - a un egipcio azotando
  - a un egipcio pegando
  lexicon: golpear / strike
  rationale: '''Golpeando'' comunica el valor verbal básico de ''striking'' sin introducir violencia más específica que la que el texto sostiene.'
- source_word: ለካልእከ፡ ዘእምነ፡
  english_pob_choice: your fellow countryman, one of your brothers
  chosen_spanish: a tu paisano, uno de tus hermanos
  alternatives_spanish:
  - a tu compatriota, uno de tus hermanos
  - a tu hermano de pueblo, uno de tus hermanos
  lexicon: paisano / hermano
  rationale: El término parece referirse al compatriota o miembro del mismo pueblo. 'Paisano' es natural en español y conserva la relación de pertenencia étnica/nacional; 'uno de tus hermanos' reproduce la apposición del inglés.
theological_decisions:
- issue: Relación entre 'fellow countryman' y 'one of your brothers'
  english_pob_reading: your fellow countryman, one of your brothers
  chosen_spanish_reading: a tu paisano, uno de tus hermanos
  alternative_spanish_readings:
  - a tu compatriota, uno de tus hermanos
  - a tu hermano, uno de tu pueblo
  rationale: El texto no exige una fraternidad literal de sangre; mantiene una designación de pertenencia al mismo pueblo. Se conserva la tensión entre lazos nacionales y fraternales sin resolverla en una sola categoría.
  doctrine_reference: Éxodo 2:11-13; Jubileos 47:10 en contexto narrativo de Moisés y sus hermanos israelitas
translation_notes:
  revision_awareness: 'La versión española sigue la corrección revisada del expediente: este versículo no corresponde a la escena de matar y ocultar al egipcio, sino a la estadía de Moisés en la corte del rey durante tres semanas de años, su salida de la corte y la visión de un egipcio golpeando a su paisano. La redacción española fue ajustada para reflejar ese contenido exacto.'
  spanish_consistency_notes:
  - Se conserva 'corte del rey' de manera uniforme para el mismo sintagma del verso.
  - '''Semanas de años'' se mantiene literal para respetar la unidad temporal peculiar del texto.'
  - '''Paisano'' y ''uno de tus hermanos'' se usan juntos para reflejar la doble referencia étnica/fraternal del original.'
