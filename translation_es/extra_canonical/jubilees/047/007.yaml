  text: 'Y ella le dijo: «Ve». Y fue y llamó a tu madre Jocabed, y le dio su salario, y te amamantó.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Go
  english_pob_choice: Go.
  chosen_spanish: «Ve»
  alternatives_spanish:
  - «Vete»
  - «Anda»
  lexicon: imperative of ir
  rationale: El mandato breve del inglés se vierte naturalmente al imperativo singular «Ve», sin añadir matiz reflexivo que no está en el original.
- source_word: your mother Jochebed
  english_pob_choice: your mother Jochebed
  chosen_spanish: «tu madre, Jocabed»
  alternatives_spanish:
  - «tu madre Jocabed»
  - «tu madre, Jochebed»
  lexicon: proper name / kinship phrase
  rationale: Se conserva la relación de parentesco y el nombre propio. Se usa «Jocabed» como forma española habitual del nombre bíblico, manteniendo la identificación inequívoca.
- source_word: gave her wages
  english_pob_choice: she gave her wages
  chosen_spanish: «le dio su salario»
  alternatives_spanish:
  - «le pagó su salario»
  - «le dio su paga»
  lexicon: wages / payment
  rationale: «Salario» expresa con claridad la idea de remuneración por servicio. «Su paga» sería posible, pero «salario» es más preciso y digno en registro bíblico.
- source_word: nursed you
  english_pob_choice: she nursed you
  chosen_spanish: «ella te amamantó»
  alternatives_spanish:
  - «ella te crió»
  - «ella te dio de mamar»
  lexicon: nurse (infant)
  rationale: Aquí «nursed» se refiere al acto literal de amamantar, no a criar en general. «Amamantó» preserva esa concreción fisiológica.
