lexical_decisions:
- source_word: ሑሪ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: imperative of motion
  rationale: El ge'ez usa un imperativo breve de movimiento; «Ve» comunica la orden de forma natural y directa en español, sin añadir matices no presentes en el texto.
- source_word: ወሖረት
  english_pob_choice: And she went
  chosen_spanish: Y fue
  alternatives_spanish:
  - Y se fue
  - Y fue ella
  lexicon: motion verb
  rationale: La forma simple «fue» reproduce el movimiento narrativo con concisión y sin sobreexplicar el sujeto, que ya queda claro por el contexto.
- source_word: ወጸውዐታ
  english_pob_choice: and called
  chosen_spanish: llamó
  alternatives_spanish:
  - mandó llamar
  - convocó
  lexicon: call/invite summon
  rationale: «Llamó» es el equivalente más directo y transparente para la acción de llamar a la madre; evita cargar el verbo con connotaciones más fuertes de convocatoria que no aparecen en el pasaje.
- source_word: ለእምከ፡ ለአዮካቤድ
  english_pob_choice: your mother, Jochebed
  chosen_spanish: tu madre, Jocabed
  alternatives_spanish:
  - tu madre, Jochebed
  - tu madre, Yokébed
  lexicon: proper name / kinship term
  rationale: Se conserva el sentido del parentesco explícito y se adapta el nombre propio a una forma española estable y legible, Jocabed, sin perder la identificación auditiva con Jochebed.
- source_word: ወወሀበታ
  english_pob_choice: and gave you to her
  chosen_spanish: y te la entregó
  alternatives_spanish:
  - y te lo dio a ella
  - y te entregó a ella
  lexicon: give/hand over
  rationale: El ge'ez expresa la transferencia de la persona al cuidado de otra; «te la entregó» mantiene la idea de entrega/traspaso que ya estaba enfatizada por la secuencia narrativa, aunque la referencia pronominal en español resulta algo marcada. Se deja la tensión entre el simple dar y el acto de entregar.
theological_decisions:
- issue: Referencia implícita al destino del niño mediante la entrega a la madre
  english_pob_reading: and gave you to her
  chosen_spanish_reading: y te la entregó
  alternative_spanish_readings:
  - y te dio a ella
  - y te entregó a ella
  rationale: No se amplía el relato hacia adopción, crianza real o filiación legal; la traducción conserva solo el acto textual de entrega a la madre, tal como lo muestra el ge'ez y el ajuste revisado en inglés.
  doctrine_reference: Narrative fidelity; no doctrinal expansion
translation_notes:
  revision_awareness: 'La revisión inglesa descartó por irrelevante un borrador anterior sobre Faraón y el aprendizaje de escritura; el texto base correcto aquí es una escena breve y directa: orden, movimiento, llamada a la madre y entrega del niño. La versión española sigue ese pasaje revisado y no reintroduce material ajeno.'
  spanish_consistency_notes:
  - Se mantiene el trato de segunda persona singular («te») porque el inglés auditado conserva el pronombre y la voz narrativa directa del original.
  - Se usa Jocabed para favorecer la pronunciación española común, aunque se reconoce la forma inglesa auditada Jochebed como equivalente identificable.
  - No se introduce «Señor» ni ninguna terminología teológica ajena; el versículo es narrativo y no contiene títulos divinos explícitos.
