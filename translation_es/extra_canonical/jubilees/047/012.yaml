base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/047/012.yaml
  text: Your brother. And he became angry and was indignant and said[12], “Who appointed you a ruler and a judge over us? Do you intend to kill me as you killed the Egyptian yesterday?” And you feared and fled because of this matter.
  footnotes:
  - marker: '12'
    text: This verse corresponds to verse 48 in the source manuscript numbering. The Ge'ez text here ends abruptly at 'in the week' (በሱባዔ፡).
    reason: textual_note
  - marker: a
    text: Or 'quarreled'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:56Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation matching the Ge''ez text: addressed ''your brother,'' included anger/quarreling, the question about being appointed ruler and judge, the intent to kill ''me,'' the comparison with killing the Egyptian ''yesterday,'' and the concluding fear and flight because of this matter.'
translation:
  language: es
  text: 'Tu hermano. Y se enojó y se indignó y dijo[a]: «¿Quién te nombró gobernante y juez sobre nosotros? ¿Acaso piensas matarme como mataste al egipcio ayer?». Y tuviste miedo y huíste por causa de este asunto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo corresponde al versículo 48 en la numeración del manuscrito fuente. El texto ge'ez aquí termina abruptamente.
    reason: textual_note
lexical_decisions:
- source_word: እኅዋከ / Your brother
  english_pob_choice: Your brother.
  chosen_spanish: Tu hermano.
  alternatives_spanish:
  - Tu hermano
  lexicon: brother
  rationale: El arranque abrupto del texto ge'ez se conserva como vocativo o fragmento nominal. En español, 'Tu hermano' reproduce la referencia directa sin añadir conectores no atestiguados.
- source_word: ወተምዐዐ / was angry
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se airó
  - se enfureció
  lexicon: be angry
  rationale: La primera expresión de enojo se rinde con un verbo natural y sobrio en español. 'Se enojó' comunica bien el estado emocional sin intensificar más de lo que exige el texto.
- source_word: ወተቈጥዐ / was indignant
  english_pob_choice: was indignant
  chosen_spanish: se indignó
  alternatives_spanish:
  - se enfureció
  - se irritó
  lexicon: be indignant / be angry
  rationale: Mantiene la segunda ocurrencia como refuerzo semántico distinto de la primera, respetando la acumulación del ge'ez. 'Indignado' preserva la carga de enojo intenso sin colapsarla en simple 'quarsear'.
- source_word: መኑ፡ ሤመከ፡ መልአከ፡ ወመኰንነ፡
  english_pob_choice: Who appointed you a ruler and a judge over us?
  chosen_spanish: ¿Quién te nombró gobernador y juez sobre nosotros?
  alternatives_spanish:
  - ¿Quién te puso como gobernante y juez sobre nosotros?
  - ¿Quién te estableció como jefe y juez sobre nosotros?
  lexicon: appoint / ruler / judge
  rationale: '''Nombró'' expresa la idea de designación. ''Gobernador'' y ''juez'' son los equivalentes más transparentes para el par ''ruler and judge'' en español bíblico moderno, evitando una formulación demasiado eclesiástica.'
- source_word: ትቀትለኒ፡
  english_pob_choice: Do you intend to kill me
  chosen_spanish: ¿Acaso piensas matarme
  alternatives_spanish:
  - ¿Tienes intención de matarme
  - ¿Quieres matarme
  lexicon: kill me
  rationale: El objeto directo 'me' se mantiene como en el ge'ez y en la revisión inglesa final. 'Piensas matarme' conserva la intención/potencialidad interrogada por el hablante.
- source_word: በከመ፡ ቀተልኮ፡ ትማልም፡ ለግብጻዊ።
  english_pob_choice: as you killed the Egyptian yesterday
  chosen_spanish: como mataste al egipcio ayer
  alternatives_spanish:
  - como mataste al egipcio ayer mismo
  - como mataste al egipcio el día de ayer
  lexicon: kill / Egyptian / yesterday
  rationale: Se conserva la comparación temporal y étnica de forma directa. 'Al egipcio' evita ambigüedad sobre la víctima y 'ayer' mantiene la referencia temporal breve del original.
- source_word: ወፈራህከ፡ ወጐየይከ፡
  english_pob_choice: And you feared and fled
  chosen_spanish: Y tuviste miedo y huíste
  alternatives_spanish:
  - Y tuviste miedo y escapaste
  - Y temiste y huíste
  lexicon: fear / flee
  rationale: La secuencia verbal se conserva. 'Tuviste miedo' es idiomático y claro; 'huíste' refleja el movimiento de huida exigido por el texto.
theological_decisions:
- issue: Identidad del interlocutor en un fragmento abrupto
  english_pob_reading: Your brother.
  chosen_spanish_reading: Tu hermano.
  alternative_spanish_readings:
  - Tu hermano — como fragmento de discurso
  - Hermano tuyo
  rationale: El manuscrito ge'ez, junto con la nota inglesa, preserva un comienzo abrupto. No se completa el pensamiento ni se suaviza la irregularidad textual.
  doctrine_reference: textual transparency / source fidelity
- issue: Acumulación de ira con dos verbos cercanos
  english_pob_reading: became angry and was indignant
  chosen_spanish_reading: se enojó y se indignó
  alternative_spanish_readings:
  - se airó y se indignó
  - se enojó y se airó
  rationale: Se evita reducir ambos verbos a un solo 'se enojó'. La duplicación expresa el énfasis del ge'ez y conserva la tensión lexical documentada por la revisión inglesa.
  doctrine_reference: lexical transparency
- issue: Título civil 'ruler and judge'
  english_pob_reading: a ruler and a judge over us
  chosen_spanish_reading: gobernador y juez sobre nosotros
  alternative_spanish_readings:
  - gobernante y juez sobre nosotros
  - jefe y juez sobre nosotros
  rationale: '''Gobernador'' comunica autoridad política sin importar una carga anacrónica religiosa. ''Juez'' mantiene la función de arbitraje/autoridad legal del binomio.'
  doctrine_reference: source semantics
- issue: Preservación del objeto directo de la amenaza
  english_pob_reading: Do you intend to kill me
  chosen_spanish_reading: ¿Acaso piensas matarme?
  alternative_spanish_readings:
  - ¿Acaso piensas matarte?
  - ¿Acaso piensas quitarme la vida?
  rationale: La nota revisada en inglés fijó 'me'; en español se conserva explícitamente para no borrar el contraste entre la víctima implícita y el egipcio mencionado a continuación.
  doctrine_reference: textual fidelity
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que corrigió una traducción previa errónea y la nota textual inglesa que observa el corte abrupto del versículo en la numeración del manuscrito. También se respetó la revisión léxica que privilegia 'was indignant' para el segundo verbo de enojo.
  spanish_consistency_notes:
  - Se prefirió 'gobernador y juez' para un español claro y sobrio, sin convertirlo en lenguaje eclesiástico.
  - Se mantuvo la duplicación de emociones ('se enojó y se indignó') para no aplanar el énfasis del original.
  - Se conservó la segunda persona singular en todo el discurso directo, en coherencia con el texto fuente y la versión inglesa auditada.
  - Se usó 'huíste' como forma tradicional con tilde en la segunda persona singular del pretérito; puede modernizarse a 'huiste' según la norma editorial del proyecto si se prefiere una ortografía sin tilde.
