base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/047/003.yaml
  text: And they continued casting them in for seven months[3], until the day when you were born. And your mother hid you for three months, and they became aware of her because of you. And she made for you a basket, and coated it with pitch and asphalt, and placed it among the reeds by the bank of the river, and put you in it for seven days. And your mother came by night and nursed you, and by day Miriam your sister guarded you from the birds.
  footnotes:
  - marker: '3'
    text: The phrase about Miriam likely means she guarded the child by day, specifically from birds or other danger near the riverbank.
    reason: segmentation_note
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:53Z'
    unchanged: false
    changes_summary: Changed 'kept throwing them in' to 'continued casting them in' for a more formal register while preserving the sense. No other changes needed.
translation:
  language: es
  text: Y siguieron arrojándolos durante siete meses, hasta el día en que naciste. Y tu madre te ocultó durante tres meses, y se dieron cuenta de ella por causa tuya. Y te hizo una canasta, y la recubrió con betún y asfalto, y la colocó entre los juncos, a la orilla del río, y te puso en ella por siete días. Y tu madre venía de noche y te amamantaba, y de día Miriam, tu hermana, te guardaba de las aves[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase sobre Miriam puede significar que vigilaba al niño de día, específicamente de las aves u otro peligro cercano a la ribera.
    reason: alternative_reading
lexical_decisions:
- source_word: ይገድፉ
  english_pob_choice: continued casting them in
  chosen_spanish: siguieron arrojándolos
  alternatives_spanish:
  - continuaron echándolos
  - siguieron lanzándolos
  lexicon: n/a
  rationale: El geʿez expresa una acción reiterada o continuada; en español, «siguieron arrojándolos» conserva el valor durativo sin sonar forzado. «Arrojar» refleja mejor la violencia del contexto que un simple «echar».
- source_word: ሤለስተ፡ ወርኀ
  english_pob_choice: three months
  chosen_spanish: tres meses
  alternatives_spanish:
  - por tres meses
  - durante tres meses
  lexicon: n/a
  rationale: El texto señala el lapso durante el cual la madre ocultó al niño; «durante tres meses» expresa con claridad esa duración en español.
- source_word: ወገነሩ፡ በእንቲአሃ
  english_pob_choice: they became aware of her because of you
  chosen_spanish: se dieron cuenta de ella por causa tuya
  alternatives_spanish:
  - la descubrieron por tu causa
  - la notaron por causa tuya
  lexicon: n/a
  rationale: La frase conserva la relación causal y la referencia indirecta a la madre. «Se dieron cuenta de ella» mantiene la idea de advertir su presencia; «por causa tuya» preserva la causalidad explícita del original.
- source_word: ሤፍተ
  english_pob_choice: basket
  chosen_spanish: canasta
  alternatives_spanish:
  - cesto
  - canastilla
  lexicon: n/a
  rationale: «Canasta» comunica bien el objeto y funciona en registro bíblico natural. Se evita una paráfrasis que podría diluir la imagen concreta.
- source_word: ፒሳ ወአስፋ
  english_pob_choice: pitch and asphalt
  chosen_spanish: betún y asfalto
  alternatives_spanish:
  - brea y asfalto
  - brea y pez
  lexicon: n/a
  rationale: Se conserva la doble sustancia del texto fuente. «Betún» puede cubrir el campo de un material impermeabilizante oscuro, y «asfalto» mantiene la segunda materia mencionada en el audit trail.
- source_word: ውስተ፡ ሣዕር
  english_pob_choice: among the reeds
  chosen_spanish: entre los juncos
  alternatives_spanish:
  - entre los cañaverales
  - entre los juncos del río
  lexicon: n/a
  rationale: «Juncos» es una equivalencia natural y legible para el vegetal ribereño del pasaje; mantiene la escena junto al agua sin sobreespecificar.
- source_word: ኀበ፡ ድንጋገ፡ ፈለግ
  english_pob_choice: by the bank of the river
  chosen_spanish: a la orilla del río
  alternatives_spanish:
  - junto a la ribera del río
  - al borde del río
  lexicon: n/a
  rationale: «A la orilla del río» es la formulación más natural en español y conserva la ubicación liminal del niño.
- source_word: ትመጽእ፡ በሌሊት፡ ወታጠብወከ
  english_pob_choice: your mother came by night and nursed you
  chosen_spanish: tu madre venía de noche y te amamantaba
  alternatives_spanish:
  - tu madre venía de noche y te daba de mamar
  - tu madre llegaba de noche y te amamantaba
  lexicon: n/a
  rationale: «Amamantar» es el verbo más directo y digno para el acto de lactar. «Venía de noche» conserva la idea de visitas repetidas o habituales, acorde con el valor aspectual del original.
- source_word: ማርያ
  english_pob_choice: Miriam your sister
  chosen_spanish: Miriam, tu hermana
  alternatives_spanish:
  - Miriam tu hermana
  - tu hermana Miriam
  lexicon: n/a
  rationale: Se mantiene el nombre propio tal como en el texto fuente y se coloca en apposición natural en español.
theological_decisions:
- issue: Preservación de la secuencia narrativa y del sujeto implícito en segunda persona
  english_pob_reading: The passage addresses the child directly as a recalled narrative of infancy.
  chosen_spanish_reading: El pasaje se mantiene en segunda persona, como relato dirigido al niño.
  alternative_spanish_readings:
  - narración en tercera persona
  - cambio a primera persona implícita
  rationale: La segunda persona es parte del efecto retórico del texto y del audit trail en inglés. Mantenerla evita desdibujar la relación discursiva del pasaje.
  doctrine_reference: No aplica; decisión discursiva/narrativa.
- issue: Identificación de la guardia de Miriam frente a las aves
  english_pob_reading: Miriam your sister guarded you from the birds.
  chosen_spanish_reading: Miriam, tu hermana, te guardaba de las aves.
  alternative_spanish_readings:
  - Miriam, tu hermana, te cuidaba de las aves
  - Miriam, tu hermana, te protegía de las aves
  rationale: «Guardaba» conserva la vigilancia activa indicada por el inglés y por la nota auditada, que sugiere protección concreta en la ribera, específicamente de aves o de otro peligro cercano.
  doctrine_reference: No aplica; nota de sentido contextual.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que ajustó la apertura a un registro más formal: «continued casting them in»; por eso la traducción adopta «siguieron arrojándolos», manteniendo el valor durativo y la violencia del gesto. No se introdujeron cambios doctrinales ni expansiones interpretativas adicionales.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto en otros contextos, aunque este versículo no lo contiene.
  - Se conservó «Miriam» como forma del nombre propia del audit trail.
  - Se evitó «Señor» y otras sustituciones no presentes en el texto fuente.
  - «Betún y asfalto» reproduce la duplicación material del original sin normalizarla a un solo término.
