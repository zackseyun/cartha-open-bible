translation:
  language: es
  text: '...para traerte, y él te llevó a ella. Y te sacó de la canasta y tuvo compasión de ti. Y tu hermana le dijo: «¿Quieres que vaya y te llame a una de las mujeres hebreas, para que lo críe y lo amamante?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ከመ፡ ያምጽአከ፡
  english_pob_choice: '...to bring you'
  chosen_spanish: '...para hacerte venir'
  alternatives_spanish:
  - '...para traerte'
  - '...para llevarte'
  lexicon: 'base verbal sense: causar venir / traer'
  rationale: El contexto narrativo exige expresar la acción causal de hacer que él llegue hasta ella; 'hacerte venir' conserva el valor de causa sin forzar un calco mecánico.
- source_word: ወአምጽአከ፡ ኀቤሃ።
  english_pob_choice: and he brought you to her
  chosen_spanish: y él te llevó hasta ella
  alternatives_spanish:
  - y te trajo a ella
  - y te llevó a ella
  lexicon: bring/lead to
  rationale: '''Llevó hasta ella'' comunica el movimiento dirigido y suena natural en español; mantiene la relación de destino indicada por el ge''ez.'
- source_word: ወአውፅአተከ፡ እምሤፍቅ፡
  english_pob_choice: And she took you out of the basket
  chosen_spanish: Y ella te sacó de la canasta
  alternatives_spanish:
  - Y ella te sacó del cesto
  - Y te sacó de la canasta
  lexicon: take out, basket
  rationale: '''Sacó de la canasta'' reproduce la acción concreta del texto y conserva una imagen clara y bíblica en español.'
- source_word: ወመሐረተከ።
  english_pob_choice: and had compassion on you
  chosen_spanish: y tuvo compasión de ti
  alternatives_spanish:
  - y se compadeció de ti
  - y mostró compasión por ti
  lexicon: have compassion
  rationale: '''Tener compasión de'' es la equivalencia estable en español para la compasión activa del verbo.'
- source_word: እኅትከ፡
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu hermana
  lexicon: sister
  rationale: Mantiene la relación de parentesco directa sin añadir especificación innecesaria.
- source_word: እሖርኑ፡ ወእጸውዕ፡ ለኪ፡
  english_pob_choice: Shall I go and call for you
  chosen_spanish: ¿Iré y llamaré para ti
  alternatives_spanish:
  - ¿Deberé ir y llamar para ti
  - ¿Iré a llamarte
  lexicon: go and call
  rationale: 'La pregunta voluntativa se expresa con naturalidad como decisión ofrecida: ''¿Iré y llamaré para ti?''. Preserva el sentido de iniciativa de la hermana.'
- source_word: አሐተ፡ እምነ፡ ዕብራዊያት፡
  english_pob_choice: one of the Hebrew women
  chosen_spanish: a una de las mujeres hebreas
  alternatives_spanish:
  - a una mujer hebrea
  - a una de las hebreas
  lexicon: Hebrew women
  rationale: '''Mujeres hebreas'' sigue el plural del original y el audit trail inglés; evita una reducción innecesaria del grupo.'
- source_word: '*እንተ፡ ታሐፅኖ፡ ወታጠብዎ፡'
  english_pob_choice: who will rear him and nurse him
  chosen_spanish: para que lo críe y lo amamante para ti
  alternatives_spanish:
  - que lo críe y lo amamante
  - para que lo críe y lo alimente de pecho para ti
  lexicon: rear, nurse/suckle
  rationale: 'El ge''ez distingue dos verbos: uno para criar/educar y otro para amamantar/succionar. ''Críe y lo amamante'' preserva esa doble acción; ''para ti'' mantiene el dativo de beneficio del original y del audit trail revisado.'
theological_decisions:
- issue: Compasión materna/protectora en la escena
  english_pob_reading: she had compassion on you
  chosen_spanish_reading: tuvo compasión de ti
  alternative_spanish_readings:
  - se compadeció de ti
  - mostró compasión por ti
  rationale: No se introduce ninguna lectura doctrinal añadida; se conserva la compasión como gesto concreto de misericordia humana en la narración.
  doctrine_reference: Narrative mercy / compassion
- issue: Función de la hermana como mediadora
  english_pob_reading: your sister said to her
  chosen_spanish_reading: tu hermana le dijo
  alternative_spanish_readings:
  - tu hermana habló con ella
  - tu hermana le respondió
  rationale: Se mantiene la acción discursiva simple sin sobreinterpretar el rol de la hermana más allá del texto.
  doctrine_reference: Narrative mediation
- issue: Doble verbo de crianza y amamantamiento
  english_pob_reading: who will rear him and nurse him
  chosen_spanish_reading: para que lo críe y lo amamante para ti
  alternative_spanish_readings:
  - que lo críe y lo amamante
  - para que lo críe y lo alimente de pecho para ti
  rationale: 'La revisión del audit trail corrige una omisión: el ge''ez tiene dos verbos distintos. La redacción española conserva ambos sin borrar la tensión léxica.'
  doctrine_reference: Lexical precision / infant care
translation_notes:
  revision_awareness: El texto inglés previo omitía la primera mitad del ge'ez y había una revisión sobre el último tramo; la presente redacción incorpora la acción inicial de 'hacerte venir / te llevó hasta ella / te sacó de la canasta' y conserva el doble sentido verbal final de criar y amamantar, conforme al pasaje fuente y al control de revisiones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene un español neutral y eclesialmente legible, evitando arcaísmos innecesarios.
  - No se añadieron notas al pie porque todo el contenido pudo integrarse en el texto sin necesidad de alternativas ancladas.
