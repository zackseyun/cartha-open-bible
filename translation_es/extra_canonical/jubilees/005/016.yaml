base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/016.yaml
  text: And he is not one who shows partiality, nor one who accepts a bribe, when he says that he will execute judgment on each. Even if one gave everything that is on the earth, he would not show partiality or accept it, nor would he receive anything from his hand, for he is a righteous judge.
  footnotes:
  - marker: a
    text: Or 'nor would he be swayed from his hand'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:14Z'
    unchanged: false
    changes_summary: Revised 'receives gifts' to 'accepts a bribe' for better lexical precision and consistency with the judicial context; changed 'if he says' to 'when he says' for more natural English while preserving the sense.
translation:
  language: es
  text: Y él no muestra parcialidad, ni acepta soborno, cuando dice que hará juicio a cada uno. Aunque uno diera todo lo que hay en la tierra, no mostraría parcialidad ni lo aceptaría, ni recibiría nada de su mano, porque es un juez justo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይነሥእ ገጸ
  english_pob_choice: shows partiality
  chosen_spanish: mostrar parcialidad
  alternatives_spanish:
  - hacer acepción de personas
  - favorecer a alguien
  lexicon: Ge'ez ይነሥእ / ገጸ
  rationale: La imagen expresa tratar con sesgo o favoritismo judicial; en español bíblico y moderno, 'mostrar parcialidad' comunica bien el sentido sin depender de una fórmula demasiado arcaica.
- source_word: ይነሥእ ሕሊና
  english_pob_choice: accepts a bribe
  chosen_spanish: acepta soborno
  alternatives_spanish:
  - recibe soborno
  - acepta dádiva
  lexicon: Ge'ez ሕሊና
  rationale: El contexto judicial del pasaje y la revisión inglesa favorecen un término explícito como 'soborno'; 'dádiva' sería más literal pero menos claro en español actual.
- source_word: ይገበር ዘንተ ለለ
  english_pob_choice: he will execute judgment on each
  chosen_spanish: ejecutará juicio sobre cada uno
  alternatives_spanish:
  - hará juicio a cada uno
  - dictará sentencia sobre cada uno
  lexicon: Ge'ez משפט/judicial formula
  rationale: El giro señala acción judicial concreta; 'ejecutará juicio' conserva la fuerza forense del original y armoniza con el estilo de la POB.
- source_word: ወሀበ ኵሎ ዘውስተ ምድር
  english_pob_choice: one gave everything that is on the earth
  chosen_spanish: uno diera todo lo que hay en la tierra
  alternatives_spanish:
  - uno diera todo lo que está sobre la tierra
  - se diera todo lo que hay en la tierra
  lexicon: Ge'ez ኵሎ / ዘውስተ ምድር
  rationale: '''Lo que hay en la tierra'' expresa el alcance total del objeto sin forzar una calca; el subjuntivo imperfecto mantiene la concesión del pasaje.'
- source_word: ኢይትሜጠው እምእዴሁ
  english_pob_choice: nor would he receive anything from his hand
  chosen_spanish: ni recibiría nada de su mano
  alternatives_spanish:
  - ni aceptaría nada de su mano
  - ni tomaría nada de su mano
  lexicon: Ge'ez ይትሜጠው
  rationale: La revisión del audit trail corrigió el sentido a 'receive/accept'; 'de su mano' reproduce la imagen idiomática de recibir de alguien y evita introducir una lectura incorrecta de 'ser influido'.
- source_word: መኰንን ጽድቅ
  english_pob_choice: a righteous judge
  chosen_spanish: un juez justo
  alternatives_spanish:
  - un juez recto
  - un juez de justicia
  lexicon: Ge'ez መኰንን / ጽድቅ
  rationale: '''Justo'' comunica naturalmente la cualidad moral-jurídica de ጽድቅ; ''recto'' sería posible, pero ''juez justo'' es idiomático y fiel.'
theological_decisions:
- issue: Divine impartiality in judgment
  english_pob_reading: He is not one who shows partiality, nor one who accepts a bribe... for he is a righteous judge.
  chosen_spanish_reading: Él no es parcial ni acepta soborno... porque es un juez justo.
  alternative_spanish_readings:
  - no hace acepción de personas ni acepta soborno
  - no favorece a nadie ni acepta soborno
  rationale: El texto presenta la imparcialidad como atributo del juicio divino; la traducción conserva el paralelismo entre no parcialidad, rechazo del soborno y justicia del juez.
  doctrine_reference: Deuteronomio 10:17; 2 Crónicas 19:7; Hechos 10:34
- issue: Meaning of the final verb phrase
  english_pob_reading: nor would he receive anything from his hand
  chosen_spanish_reading: ni recibiría nada de su mano
  alternative_spanish_readings:
  - ni aceptaría nada de su mano
  - ni tomaría nada de su mano
  rationale: 'Se sigue la corrección textual del audit trail: el verbo no significa ''ser movido'', sino recibir/aceptar. La formulación española conserva la imagen de la mano como fuente de entrega o soborno.'
  doctrine_reference: Éxodo 23:8; Deuteronomio 16:19
translation_notes:
  revision_awareness: Se incorporó la corrección del audit trail que rechaza la lectura 'would be swayed' para el verbo final; por ello la traducción española usa 'recibiría nada de su mano' y no introduce una nota alternativa innecesaria. También se mantuvo la preferencia revisada por un lenguaje judicial explícito ('acepta soborno') coherente con el contexto.
  spanish_consistency_notes:
  - Se usa 'Y él' para iniciar con claridad la cláusula, sin introducir un título no presente en el pasaje.
  - '''Juez justo'' conserva la relación entre justicia y función judicial, evitando sustituirla por una formulación más abstracta.'
  - No se emplea 'SEÑOR' ni otro reemplazo, pues el verso no contiene el Nombre divino.
  - La frase condicional/concesiva se vierte con 'Aunque' para reflejar la fuerza del 'Even if' del contexto revisado en inglés.
