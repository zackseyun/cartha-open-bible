  yaml_path: translation/extra_canonical/jubilees/005/010.yaml
  text: And their fathers were watching, and after this they were bound in the depths of the earth forever, until the day of the great judgment, for judgment upon all who corrupted their ways and their deeds before the Lord.
  footnotes:
  - marker: a
    text: Or 'for the judgment of all'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:41Z'
    unchanged: false
    changes_summary: Changed 'afterward' to 'after this' for a more direct rendering of the sequence marker; otherwise retained the draft.
translation:
  language: es
  text: Y sus padres estaban vigilando, y después de esto fueron atados en lo profundo de la tierra para siempre, hasta el día del gran juicio, para juicio[a] contra todos los que corrompieron sus caminos y sus obras delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el juicio de todos». La frase ge''ez también puede entenderse como una construcción genitiva, aunque el contexto y la preposición favorecen el sentido de juicio dirigido contra todos.'
    reason: alternative_reading
lexical_decisions:
- source_word: ይኔጽሩ
  english_pob_choice: were watching
  chosen_spanish: estaban mirando
  alternatives_spanish:
  - observaban
  - estaban vigilando
  lexicon: ver/observar/vigilar
  rationale: El ge'ez expresa una acción continua de ver o vigilar; 'estaban mirando' conserva la simultaneidad y la duratividad sin añadir un matiz demasiado interpretativo. 'Observaban' también sería posible, pero 'mirando' resulta más natural en español contemporáneo.
- source_word: እምድኅረዝ
  english_pob_choice: after this
  chosen_spanish: después de esto
  alternatives_spanish:
  - después
  - luego de esto
  lexicon: secuencia temporal
  rationale: La revisión inglesa prefirió 'after this' por su relación más directa con el marcador de secuencia. 'Después de esto' reproduce esa proximidad temporal de forma clara en español.
- source_word: ተአስሩ
  english_pob_choice: were bound
  chosen_spanish: fueron atados
  alternatives_spanish:
  - fueron encadenados
  - quedaron atados
  lexicon: atar/encadenar
  rationale: '''Atados'' refleja el pasivo y el sentido básico de quedar sujetos o presos. ''Encadenados'' es más específico pero introduce un detalle no explícito en el ge''ez.'
- source_word: ውስተ መዓምቅቲሃ ለምድር
  english_pob_choice: in the depths of the earth
  chosen_spanish: en lo profundo de la tierra
  alternatives_spanish:
  - en las profundidades de la tierra
  - en el abismo de la tierra
  lexicon: profundidad/abismo de la tierra
  rationale: La expresión ge'ez apunta a la profundidad interior de la tierra; 'en lo profundo de la tierra' suena natural y conserva la imagen sin cargarla con un término doctrinal más técnico como 'abismo'.
- source_word: እስከ ለዓለም
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por toda la eternidad
  - para la eternidad
  lexicon: duración indefinida
  rationale: La frase funciona como intensificador durativo. 'Para siempre' es la equivalencia más directa y comprensible en español, sin exagerar hacia una formulación más abstracta.
- source_word: ዕለተ ኵነኔ ዐባይ
  english_pob_choice: the day of the great judgment
  chosen_spanish: el día del gran juicio
  alternatives_spanish:
  - el día del juicio grande
  - el día del juicio mayor
  lexicon: juicio final/gran juicio
  rationale: '''Gran juicio'' conserva el artículo y la cualidad intensiva del original. ''Mayor'' o ''grande'' pueden funcionar, pero ''gran juicio'' es idiomático y fiel.'
- source_word: ኵነኔ ዲበ
  english_pob_choice: for judgment upon
  chosen_spanish: para juicio sobre
  alternatives_spanish:
  - para juicio contra
  - para el juicio sobre
  lexicon: preposición de juicio
  rationale: La revisión inglesa destacó el valor direccional de la preposición equivalente a 'upon/over/against'. 'Sobre' reproduce esa fuerza mejor que 'de' o una paráfrasis más débil.
- source_word: ኵሎሙ እለ አማሰኑ ፍኖቶሆሙ ወ ምግባሪሆሙ
  english_pob_choice: all who corrupted their ways and their deeds
  chosen_spanish: todos los que corrompieron sus caminos y sus obras
  alternatives_spanish:
  - todos los que pervirtieron sus caminos y sus obras
  - todos los que arruinaron sus caminos y sus obras
  lexicon: corromper/torcer caminos y obras
  rationale: '''Corrompieron'' sigue de cerca el valor moral de la raíz y encaja con ''ways and deeds''. ''Pervirtieron'' también es posible, pero ''corrompieron'' mantiene el paralelo con el lenguaje bíblico sin perder claridad.'
- source_word: ቅድመ እግዚአብሔር
  english_pob_choice: before the Lord
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante el Señor
  - delante del Señor
  lexicon: divine name
  rationale: La pauta del proyecto requiere 'Yahvé' para el nombre divino. 'Delante de' reproduce la relación de presencia/comparecencia del original, más concreta que una simple marca locativa.
theological_decisions:
- issue: Identidad del destinatario divino al final del versículo
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del Señor
  - ante Yahvé
  rationale: El ge'ez usa el nombre divino donde el inglés POB traduce 'the Lord'. Según la directriz del proyecto, se debe recuperar el nombre propio 'Yahvé' en el texto principal, manteniendo la relación de comparecencia moral 'delante de'.
  doctrine_reference: Tetragrammaton / nombre divino en traducción bíblica
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente sustituyó ''afterward'' por ''after this'' para reflejar mejor el marcador temporal; también ajustó ''for the judgment of all'' a ''for judgment upon all'' por la fuerza direccional de la preposición. La redacción española sigue esas dos decisiones: ''después de esto'' y ''para juicio sobre''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la norma terminológica del proyecto para el nombre divino.
  - '''Gran juicio'' conserva la intensificación sin convertirla en una explicación doctrinal.'
  - '''Lo profundo de la tierra'' evita introducir ''abismo'' si el contexto no exige esa equivalencia técnica.'
