    rationale: Aunque semánticamente posible, en este contexto de seres retenidos y posterior juicio, el verbo comunica mejor vigilancia/observación sostenida que simplemente mirar. 'Estaban vigilando' preserva el aspecto durativo y mejora el registro.
  - severity: medium
    issue: '''para juicio sobre'' es poco natural en español bíblico actual'
    rationale: La auditoría inglesa corrigió a 'judgment upon all' para reflejar la fuerza de la preposición. En español, 'juicio sobre todos' puede sonar descriptivo más que punitivo. 'Juicio contra todos' comunica con más claridad que el juicio recae adversativamente sobre ellos.
