  text: And it came to pass, when the children of men began to multiply on the face of the earth, and daughters were born to them, that in a certain year of this jubilee the angels of God saw them, that they were beautiful to look upon; and they took wives for themselves from all whom they chose, and they bore children for them, and these were the giants.
