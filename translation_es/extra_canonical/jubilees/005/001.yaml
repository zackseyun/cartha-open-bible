translation:
  language: es
  text: Y aconteció que, cuando los hijos de los hombres comenzaron a multiplicarse sobre la faz de la tierra, y les nacieron hijas, en cierto año de este jubileo los ángeles de Dios las vieron, que eran hermosas de ver; y tomaron para sí mujeres de entre todas las que eligieron, y les dieron hijos, y estos fueron los gigantes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወኮነ፡ አመ፡
  english_pob_choice: And it came to pass, when
  chosen_spanish: Y aconteció que, cuando
  alternatives_spanish:
  - Y sucedió que, cuando
  - Y fue así que, cuando
  lexicon: N/A
  rationale: La fórmula narrativa idiomática en español más natural y fiel a la cadencia del texto es "Y aconteció que, cuando"; conserva el valor introductorio sin endurecer el registro.
- source_word: ደቂቀ፡ እጓለ፡ እመሕያው፡
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - los hijos de la humanidad
  - los seres humanos
  lexicon: N/A
  rationale: Se mantiene la expresión tradicional y literal para reproducir el sintagma semítico del original, que en español es transparente y no requiere paráfrasis.
- source_word: ይብዝኁ፡ ዲበ፡ ገጸ፡ ለምድር፡
  english_pob_choice: multiply on the face of the earth
  chosen_spanish: comenzaron a multiplicarse sobre la faz de la tierra
  alternatives_spanish:
  - se multiplicaron sobre la superficie de la tierra
  - se hicieron muchos sobre la faz de la tierra
  lexicon: N/A
  rationale: '"Sobre la faz de la tierra" conserva la imagen bíblica del original; "comenzaron a multiplicarse" expresa el imperfectivo inicial del evento.'
- source_word: አዋልድ፡ ተወልዳ፡ ሎሙ፡
  english_pob_choice: daughters were born to them
  chosen_spanish: les nacieron hijas
  alternatives_spanish:
  - les fueron nacidas hijas
  - nacieron para ellos hijas
  lexicon: N/A
  rationale: '"Les nacieron hijas" es una construcción natural en español que mantiene el sentido pasivo/benefactivo del original sin forzar una perífrasis.'
- source_word: መላእክተ፡ እግዚአብሔር፡
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - los mensajeros de Dios
  - los ángeles del Señor
  lexicon: N/A
  rationale: Se traduce de forma directa y consistente con el valor léxico básico del término; el audit trail en inglés no introdujo una restricción teológica que exija otra opción.
- source_word: በአሐቲ፡ ዓመት፡ ዘኢዮቤልው፡ ዝንቱ፡
  english_pob_choice: in a certain year of this jubilee
  chosen_spanish: en un cierto año de este jubileo
  alternatives_spanish:
  - en un año determinado de este jubileo
  - en un año de este jubileo
  lexicon: N/A
  rationale: '"En un cierto año" reproduce la indeterminación del original y del inglés POB; "jubileo" conserva el término técnico del contexto de Jubileos.'
- source_word: ሠናያት፡ ለርእይ፡
  english_pob_choice: they were beautiful to look upon
  chosen_spanish: que eran hermosas de ver
  alternatives_spanish:
  - que eran hermosas a la vista
  - que eran bellas de mirar
  lexicon: N/A
  rationale: '"Hermosas de ver" preserva la valoración estética del original con un español sobrio y natural. Se evita intensificar o moralizar el juicio.'
- source_word: ነሥእዎን፡ ሎሙ፡ አንስቲያ፡
  english_pob_choice: they took wives for themselves
  chosen_spanish: tomaron para sí mujeres
  alternatives_spanish:
  - tomaron esposas para sí
  - se tomaron mujeres para sí
  lexicon: N/A
  rationale: El original y el inglés dicen literalmente "mujeres"; se mantiene esa tensión sin sustituirla por "esposas", que suavizaría el alcance lexical. La construcción "para sí" refleja el carácter deliberado del acto.
- source_word: ወወለዳ፡ ሎሙ፡ ውሉደ፡
  english_pob_choice: and they bore children for them
  chosen_spanish: y les dieron a luz hijos
  alternatives_spanish:
  - y les parieron hijos
  - y les engendraron hijos
  lexicon: N/A
  rationale: '"Dar a luz" es la opción española más directa y digna para el acto de parir; conserva el sujeto femenino implícito y evita una reformulación interpretativa.'
- source_word: እምኵሎን፡ እለ፡ ኀረዩ፡
  english_pob_choice: from all whom they chose
  chosen_spanish: de entre todas las que eligieron
  alternatives_spanish:
  - de entre todas las que escogieron
  - de entre las que seleccionaron
  lexicon: N/A
  rationale: Se mantiene la referencia femenina y el matiz de elección selectiva del original. "De entre" reproduce bien la partícula de separación/selección.
- source_word: እርይት / giants
  english_pob_choice: these were the giants
  chosen_spanish: estos fueron los gigantes
  alternatives_spanish:
  - estos fueron los gigantes
  - estos eran los gigantes
  lexicon: N/A
  rationale: Se conserva el sustantivo tradicional "gigantes" siguiendo el inglés POB y el sentido del pasaje, sin introducir una glosa o interpretación adicional.
theological_decisions:
- issue: Identificación de los seres celestiales
  english_pob_reading: the angels of God
  chosen_spanish_reading: los ángeles de Dios
  alternative_spanish_readings:
  - los hijos de Dios
  - los seres celestiales de Dios
  rationale: El texto fuente y el audit trail en inglés nombran explícitamente a los ángeles; por eso se evita sustituirlos por una interpretación diferente. Se conserva la lectura directa sin ampliar el contenido más allá del testimonio textual.
  doctrine_reference: Jubileos 5:1; cf. el propio audit trail inglés
- issue: Relación entre las mujeres tomadas y su descendencia
  english_pob_reading: they took wives for themselves ... and they bore children for them, and these were the giants
  chosen_spanish_reading: tomaron para sí mujeres ... y les dieron a luz hijos, y estos fueron los gigantes
  alternative_spanish_readings:
  - tomaron esposas ... y les nacieron hijos
  - tomaron mujeres ... y procrearon hijos
  rationale: La formulación mantiene la secuencia causal del original sin precisar más de lo que el texto dice. Se conserva la asociación directa entre la unión y el nacimiento de los gigantes, como en el inglés POB.
  doctrine_reference: Jubileos 5:1
