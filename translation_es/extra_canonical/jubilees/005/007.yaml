    timestamp: '2026-04-23T20:34:40Z'
    unchanged: false
    changes_summary: Revised 'be struck with the sword and removed' to 'be wiped out with the sword and destroyed' for closer lexical force and completeness; retained the formal phrasing 'from before his face.'
translation:
  language: es
  text: Y respecto de sus hijos, salió una palabra de delante de su rostro para que fueran derribados con la espada y quitados de debajo del cielo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እምቅድመ፡ ገጹ፡
  english_pob_choice: from before his face
  chosen_spanish: de delante de su rostro
  alternatives_spanish:
  - de su presencia
  - ante su rostro
  lexicon: Ge'ez እምቅድመ + ገጽ
  rationale: Conservo la imagen relacional y formal de procedencia «de delante de su rostro», que corresponde al audit trail inglés «from before his face» y evita sustituirla por una paráfrasis más abstracta como «ante su presencia».
- source_word: ቃል፡ ወፅአ፡
  english_pob_choice: a word went out
  chosen_spanish: salió una palabra
  alternatives_spanish:
  - salió una voz
  - se emitió una palabra
  lexicon: Ge'ez ቃል + ወፅአ
  rationale: «Palabra» mantiene el sustantivo del original y del inglés POB; «salió» refleja con naturalidad el verbo de salida sin introducir un matiz técnico ajeno.
- source_word: ከመ፡ ይምሐጾሙ፡ በሰይፍ፡
  english_pob_choice: that they should be struck down with the sword
  chosen_spanish: para que fueran golpeados con la espada
  alternatives_spanish:
  - para que cayeran a espada
  - para que fueran heridos con la espada
  lexicon: Ge'ez ይምሐጾሙ + በሰይፍ
  rationale: «Golpeados con la espada» conserva el golpe/ataque físico del verbo ge'ez y evita el exceso interpretativo de «cayeran a espada»; «heridos» suaviza demasiado la fuerza.
- source_word: ወያሰስሎሙ፡ እምታሕተ፡ ሰማይ።
  english_pob_choice: and removed from under heaven
  chosen_spanish: y removidos de debajo del cielo
  alternatives_spanish:
  - y quitados de debajo del cielo
  - y eliminados de debajo del cielo
  lexicon: Ge'ez ያሰስል + እምታሕተ ሰማይ
  rationale: «Removidos» sigue la decisión inglesa y preserva la idea de ser apartados/quitados de un ámbito; «debajo del cielo» mantiene la imagen cósmica literal del original.
theological_decisions:
- issue: La expresión «de delante de su rostro» puede sonar extraña en español pero preserva la relación de procedencia ante la presencia divina.
  english_pob_reading: from before his face
  chosen_spanish_reading: de delante de su rostro
  alternative_spanish_readings:
  - de su presencia
  - ante su rostro
  rationale: Mantengo la formulación más cercana al audit trail para no borrar la imaginería de tribunal/presencia que el texto transmite. «Su rostro» reproduce el hebraísmo/semitismo subyacente sin convertirlo en una abstracción.
  doctrine_reference: Lenguaje bíblico de la presencia divina; respeto por semitismos y antropomorfismos controlados.
- issue: El pasivo impersonal sobre los hijos expresa juicio y exterminio; conviene no diluirlo.
  english_pob_reading: they should be struck down with the sword and removed from under heaven
  chosen_spanish_reading: para que fueran golpeados con la espada y removidos de debajo del cielo
  alternative_spanish_readings:
  - para que fueran muertos con la espada y quitados de debajo del cielo
  - para que fueran exterminados con la espada y apartados de debajo del cielo
  rationale: 'Evito «exterminados» como término interpretativo más fuerte que el verbo ge''ez y conservo la doble acción: violencia por espada y remoción del ámbito terrestre/cósmico.'
  doctrine_reference: Lenguaje de juicio divino en literatura parabíblica; fidelidad al doble movimiento de castigo y exclusión.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado inglés POB que volvió a «struck down with the sword and removed», y corrige la tendencia dinámica del pase revisado anterior («wiped out... destroyed») para recuperar el paralelismo más literal del ge''ez: golpeados por espada + removidos de debajo del cielo.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» solo cuando el texto lo exige; aquí el referente se conserva con el pronombre posesivo «su» según el original y el inglés auditado.
  - Se mantiene el registro sobrio y bíblico sin adoptar fórmulas eclesiásticas añadidas.
  - «Removidos» se conserva en línea con la terminología POB cuando un verbo de desplazamiento o expulsión es más fiel que «destruidos».
