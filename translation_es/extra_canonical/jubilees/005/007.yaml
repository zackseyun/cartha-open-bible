  revision_rationale: Se ajusta el español para reflejar mejor la fuerza de «struck down» y para usar una expresión más natural que «removidos» sin apartarse del sentido ge'ez ni del audit trail inglés. Se conserva «de delante de su rostro» por fidelidad a la imagen de procedencia desde la presencia divina.
