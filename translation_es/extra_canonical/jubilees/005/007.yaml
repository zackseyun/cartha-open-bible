  yaml_path: translation/extra_canonical/jubilees/005/007.yaml
  text: And concerning their sons, a word went out from before his face that they should be struck down with the sword and removed from under heaven.
  footnotes:
  - marker: a
    text: Or 'wiped out with the sword and destroyed'.
    reason: previous_rendering
  revision_pass:
