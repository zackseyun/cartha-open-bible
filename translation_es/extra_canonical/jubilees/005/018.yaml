translation:
  language: es
  text: Se ha escrito y ordenado que se mostrará misericordia a todos los que se aparten de todo su error, una vez cada año[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión “una vez cada año” se mantiene literal para conservar la posible teología calendárica de Jubileos sobre una misericordia o expiación recurrente.
    reason: cross_reference
lexical_decisions:
- source_word: ተጽሕፈ / it has been written
  english_pob_choice: It has been written
  chosen_spanish: Se ha escrito
  alternatives_spanish:
  - Está escrito
  - Ha sido escrito
  lexicon: γράφω / כתוב-type formula of authoritative inscription
  rationale: Conserva la fórmula impersonal y pasiva de autoridad normativa sin añadir sujeto explícito; en español suena natural y mantiene el peso de decreto.
- source_word: ወተሠርዐ / ordained
  english_pob_choice: ordained
  chosen_spanish: ordenado
  alternatives_spanish:
  - decretado
  - establecido
  lexicon: קבע / τάσσω-type legal-festal ordering
  rationale: ‘Ordenado’ conserva la idea de disposición normativa ya fijada, en paralelo con ‘se ha escrito’, y evita cargar el texto con un matiz eclesiástico no presente en el original.
- source_word: ይትመሐር / mercy will be shown
  english_pob_choice: mercy will be shown
  chosen_spanish: se mostrará misericordia
  alternatives_spanish:
  - habrá misericordia
  - se tendrá misericordia
  lexicon: רחם / ἐλεέω passive mercy formula
  rationale: La pasiva impersonal refleja bien el giro del inglés POB y evita introducir un sujeto no expresado. ‘Misericordia’ mantiene el término teológico básico del pasaje.
- source_word: ለኵሉ እለ ተመይጡ / to all who turn
  english_pob_choice: to all who turn
  chosen_spanish: a todos los que se aparten
  alternatives_spanish:
  - a todos los que vuelvan
  - a todos los que se conviertan
  lexicon: שוב / turn back, return
  rationale: ‘Apartarse’ expresa el giro moral de abandonar el error sin forzar un vocabulario específicamente técnico de conversión que el verso no exige por sí solo.
- source_word: እም*ኵሉ፡ ጌጋዮሙ / from all their error
  english_pob_choice: from all their error
  chosen_spanish: de todo su error
  alternatives_spanish:
  - de todos sus errores
  - de toda su equivocación
  lexicon: עון / πλάνη / error
  rationale: ‘Error’ preserva la amplitud moral/doctrinal del término. El singular colectivo ‘todo su error’ sigue de cerca el original y el inglés POB, manteniendo la idea de totalidad.
- source_word: ምዕረ ለለ ዓመት / once each year
  english_pob_choice: once each year
  chosen_spanish: una vez cada año
  alternatives_spanish:
  - una vez al año
  - cada año
  lexicon: temporal recurrence formula
  rationale: ‘Una vez cada año’ conserva explícitamente la recurrencia anual destacada por el POB y evita suavizarla en una frase idiomática menos transparente.
theological_decisions:
- issue: Misericordia anual y teología calendárica
  english_pob_reading: The phrase 'once each year' may reflect Jubilees' calendrical theology of recurring atonement or mercy. The wording is kept explicit rather than generalized.
  chosen_spanish_reading: La frase ‘una vez cada año’ se mantiene explícita para conservar la idea de una misericordia recurrente ligada al calendario.
  alternative_spanish_readings:
  - una vez al año
  - anualmente
  rationale: El texto no debe generalizarse a una mera frecuencia estilística; en Jubileos, la repetición anual puede tener peso teológico propio. Por eso se preserva la referencia temporal exacta.
  doctrine_reference: Jubilees calendrical theology; recurring atonement/mercy motif
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó ‘he will show mercy’ por la pasiva más neutral ‘mercy will be shown’. La redacción española sigue esa elección y la refleja con una pasiva impersonal equivalente.
  spanish_consistency_notes:
  - Se conserva el registro jurídico-formal del versículo con dos pasivas impersonalizadas.
  - ‘Misericordia’ se mantiene como término teológico central, sin reemplazarlo por ‘favor’ o ‘perdón’, porque el inglés POB retuvo ‘mercy’.
  - ‘Error’ se conserva en singular colectivo para seguir el alcance total de ‘all their error’.
  - La referencia temporal anual queda explícita y no se reduce a un adverbio genérico.
