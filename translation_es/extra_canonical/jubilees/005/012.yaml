base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/012.yaml
  text: And he made for all his works a new and righteous nature[5:12], so that they should not sin in all their nature forever, but should all be righteous, each according to its kind, all the days.
  footnotes:
  - marker: '5:12'
    text: The clause is textually and semantically difficult. The translation preserves the sense of a renewed, righteous ordering of creation according to kind rather than smoothing it into a generic statement.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:41Z'
    unchanged: false
    changes_summary: Removed the unnecessary word 'whole' before 'nature' for better lexical fidelity and more natural English; otherwise retained the draft.
translation:
  language: es
  text: Y hizo para todas sus obras una naturaleza nueva y justa[a], para que no pequen en toda su naturaleza para siempre, sino que todos sean justos, cada uno según su especie, todos los días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión ge’ez es difícil: puede entenderse como una ‘naturaleza’ o condición renovada y justa, o como una ordenación nueva de la creación. Se conserva aquí la ambigüedad básica del original y del testimonio inglés auditado.'
    reason: textual_variant
lexical_decisions:
- source_word: ግብረ፡ ፍጥረተ፡ ሐዳሰ፡
  english_pob_choice: a new and righteous nature
  chosen_spanish: una naturaleza nueva y justa
  alternatives_spanish:
  - un nuevo orden de la creación y justo
  - una creación nueva y justa
  - una naturaleza renovada y justa
  lexicon: ሐዳሰ = new/renewed; ፍጥረት = creation/nature; ግብር = work/works
  rationale: La combinación ge’ez es sintácticamente difícil y la tradición auditada en inglés conserva el valor de una realidad creada/ordenada nueva y justa. En español, ‘naturaleza’ mantiene el campo semántico de la disposición o condición propia de lo creado, y ‘nueva y justa’ reproduce el carácter renovado y recto sin suavizar la tensión textual.
- source_word: ወጻድቅተ፡
  english_pob_choice: righteous
  chosen_spanish: justa
  alternatives_spanish:
  - recta
  - justificada
  lexicon: 'צָדִיק / δικαιος field: righteous/just'
  rationale: ‘Justa’ es el equivalente más natural y bíblico en español para el valor moral/jurídico de ‘righteous’. ‘Recta’ podría funcionar, pero aquí ‘justa’ conserva mejor el paralelo con ‘ser justos’ en la cláusula siguiente.
- source_word: እይረብቡ፡
  english_pob_choice: they should not sin
  chosen_spanish: para que no pecaran
  alternatives_spanish:
  - para que no pecasen
  - para que no yeran
  - para que no cometieran pecado
  lexicon: sin = pecado / to sin
  rationale: El verbo español ‘pecar’ comunica de forma directa el sentido de ‘sin’. Se conserva el propósito causal (‘para que’) y la negación futura/volitiva del texto.
- source_word: በበ፡ ትዝምዳ፡
  english_pob_choice: each according to its kind
  chosen_spanish: cada uno según su especie
  alternatives_spanish:
  - cada uno según su clase
  - cada cual según su género
  - cada uno según su tipo
  lexicon: kind = species/kind/class
  rationale: ‘Especie’ es la opción más precisa y formal para el valor taxonómico de ‘kind’ en este contexto de creación. ‘Cada uno’ refleja el distributivo del original y mantiene la fluidez en español.
- source_word: ኵሉ፡ መዋዕለ።
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - en todos los días
  - por todos los días
  - cada día
  lexicon: all the days = all days / continually
  rationale: ‘Todos los días’ es la correspondencia más natural y transparente para la duración continua expresada por el texto, sin introducir una paráfrasis adicional como ‘siempre’.
theological_decisions:
- issue: La cláusula difícil sobre una ‘naturaleza nueva y justa’ para ‘todas sus obras’
  english_pob_reading: The translation preserves the sense of a renewed, righteous ordering of creation according to kind rather than smoothing it into a generic statement.
  chosen_spanish_reading: Se conserva la idea de una ordenación renovada y justa de la creación/las obras, sin convertirla en una afirmación más genérica.
  alternative_spanish_readings:
  - Hizo para todas sus obras una nueva creación y justicia
  - Hizo para todas sus obras un nuevo orden justo
  rationale: El texto ge’ez presenta una construcción semánticamente difícil. La redacción española evita domesticar la frase en exceso y mantiene la tensión entre ‘naturaleza’, ‘nueva’ y ‘justa’, junto con la idea distributiva ‘según su especie’.
  doctrine_reference: Doctrina de la creación y del orden creado; preservación de tensión textual en lugar de armonización interpretativa
translation_notes:
  revision_awareness: La redacción sigue el pasaje auditado en inglés después de la revisión que eliminó ‘whole’ antes de ‘nature’. La versión española evita añadir equivalentes innecesarios y conserva la dificultad textual principal del miembro ge’ez.
  spanish_consistency_notes:
  - Se usa ‘justa/justos’ de manera consistente para el campo de righteousness.
  - Se traduce ‘kind’ como ‘especie’ por su valor distributivo-creacional, no como ‘clase’ genérico.
  - Se mantiene una sola nota para la cláusula difícil, anclada en ‘justa’.
