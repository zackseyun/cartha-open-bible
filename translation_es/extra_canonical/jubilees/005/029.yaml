base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/029.yaml
  text: And in the fourth month the fountains of the great deep were closed[5:29], and the floodgates of heaven were restrained; and at the beginning of the seventh month all the mouths of the depths of the earth were opened, and the waters began to descend into the lower deep.
  footnotes:
  - marker: '5:29'
    text: 'The wording may seem paradoxical: after the fountains of the deep are ''closed,'' the mouths of the earth''s depths are ''opened'' so that the waters descend into the lower deep. The translation preserves this cosmological sequence rather than harmonizing it away.'
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:38Z'
    unchanged: false
    changes_summary: Changed 'on the new moon of the seventh month' to 'at the beginning of the seventh month' for a more direct and natural rendering of the time expression while preserving the sense. Kept the rest unchanged.
translation:
  language: es
  text: Y en el cuarto mes se cerraron los manantiales del gran abismo, y las compuertas del cielo fueron contenidas; y al comienzo del séptimo mes se abrieron todas las bocas de las profundidades de la tierra, y las aguas comenzaron a descender al abismo inferior[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La formulación puede parecer paradójica: después de que se cierran los manantiales del abismo, se abren las bocas de las profundidades de la tierra para que las aguas desciendan al abismo inferior. La traducción conserva esta secuencia cosmológica en lugar de armonizarla.'
    reason: textual_variant
lexical_decisions:
- source_word: “closed” / ተፈጸመ
  english_pob_choice: were closed
  chosen_spanish: se cerraron
  alternatives_spanish:
  - fueron cerrados
  - quedaron cerrados
  lexicon: cerrar
  rationale: El pasivo inglés expresa el cierre de los manantiales; en español, la pasiva refleja mantiene naturalidad y conserva la acción sin añadir agente.
- source_word: “fountains of the great deep” / አንቅዐተ ቀላይ ዐቢይ
  english_pob_choice: fountains of the great deep
  chosen_spanish: los manantiales del gran abismo
  alternatives_spanish:
  - las fuentes del gran abismo
  - los surtidores del gran abismo
  lexicon: manantial / abismo
  rationale: '''Manantiales'' comunica bien la imagen de fuentes de agua; ''gran abismo'' mantiene el campo cósmico y no suaviza la imaginería del original.'
- source_word: “floodgates of heaven” / መገብሕብሕተ ሰማይ
  english_pob_choice: floodgates of heaven
  chosen_spanish: las compuertas del cielo
  alternatives_spanish:
  - las esclusas del cielo
  - las cataratas del cielo
  lexicon: compuerta
  rationale: '''Compuertas'' reproduce el sentido de aperturas controladoras de agua y evita introducir una imagen más interpretativa que ''floodgates''.'
- source_word: “were restrained” / ተአኀዘ
  english_pob_choice: were restrained
  chosen_spanish: quedaron contenidas
  alternatives_spanish:
  - fueron restringidas
  - quedaron detenidas
  lexicon: contener
  rationale: '''Quedaron contenidas'' expresa bien la idea de freno o contención del flujo en un español claro y digno.'
- source_word: “at the beginning of the seventh month” / በሠርቀ ወርኀ ሳብዕ
  english_pob_choice: at the beginning of the seventh month
  chosen_spanish: al comienzo del séptimo mes
  alternatives_spanish:
  - a principios del séptimo mes
  - en el inicio del séptimo mes
  lexicon: comienzo
  rationale: Sigue de cerca la revisión inglesa, evitando una referencia técnica a la luna nueva que el pasaje revisado dejó de lado.
- source_word: “all the mouths of the depths of the earth” / ኵሉ አፈወ መዓምቅተ ምድር
  english_pob_choice: all the mouths of the depths of the earth
  chosen_spanish: todas las bocas de los abismos de la tierra
  alternatives_spanish:
  - todas las aberturas de las profundidades de la tierra
  - todos los bocas de los abismos de la tierra
  lexicon: boca / abismo
  rationale: '''Bocas'' conserva la metáfora física del original y del inglés; ''abismos'' mantiene la profundidad subterránea/cósmica sin desmitologizarla.'
- source_word: “were opened” / ተርኀወ
  english_pob_choice: were opened
  chosen_spanish: se abrieron
  alternatives_spanish:
  - fueron abiertas
  - quedaron abiertas
  lexicon: abrir
  rationale: La pasiva refleja es idiomática en español y reproduce la apertura de múltiples 'bocas' con naturalidad.
- source_word: “lower deep” / ታሕቲት
  english_pob_choice: lower deep
  chosen_spanish: el abismo inferior
  alternatives_spanish:
  - el profundo abismo inferior
  - las profundidades inferiores
  lexicon: abismo
  rationale: '''Abismo inferior'' retiene la relación espacial del original y del inglés, sin interpretar cosmológicamente más allá de lo dicho.'
theological_decisions:
- issue: 'Secuencia cosmológica aparentemente paradójica: cierre de manantiales del gran abismo, luego apertura de las bocas de los abismos de la tierra para que el agua descienda al abismo inferior.'
  english_pob_reading: The translation preserves this cosmological sequence rather than harmonizing it away.
  chosen_spanish_reading: La traducción conserva la secuencia cosmológica paradójica en vez de armonizarla.
  alternative_spanish_readings:
  - Se suaviza la secuencia para evitar la paradoja.
  - Se interpreta simbólicamente la imagen del abismo.
  rationale: El texto presenta dos movimientos distintos y no idénticos; la versión española debe mantener la tensión conceptual sin resolverla artificialmente.
  doctrine_reference: Principio de transparencia textual y fidelidad a la imaginería cosmológica del pasaje
translation_notes:
  revision_awareness: Se reflejó la revisión inglesa más reciente al traducir la marca temporal como 'al comienzo del séptimo mes', en lugar de una referencia técnica a la luna nueva, manteniendo el sentido temporal y la naturalidad del español. También se preservó la secuencia cosmológica sin suavizar la aparente paradoja, en línea con el audit trail.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca aquí, sino como norma general; este versículo no contiene el nombre divino.
  - Se mantuvo 'abismo' para conservar la imaginería cósmica y la continuidad con el inglés POB.
  - Se evitó 'SEÑOR' o fórmulas eclesiásticas añadidas que no están en el texto base.
