translation:
  language: es
  text: Y el arca fue y descansó sobre la cima de Lubar, uno de los montes de Ararat.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሖረት፡ ... ወአዕረፈት፡
  english_pob_choice: And the ark went and came to rest
  chosen_spanish: Y el arca fue y descansó
  alternatives_spanish:
  - Y el arca fue y reposó
  - Y el arca partió y quedó en reposo
  lexicon: The verbs express movement followed by settling/resting.
  rationale: 'Conservo la secuencia verbal del ge''ez: primero el desplazamiento del arca y luego su reposo. «Descansó» comunica con naturalidad el asentamiento final sin perder el valor de reposo físico del original.'
- source_word: ታቦት፡
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el cofre
  - el arca sagrada
  lexicon: Standard biblical term for the ark.
  rationale: «Arca» es el equivalente bíblico establecido en español y mantiene la referencia al arca de Noé sin añadir especificaciones no presentes en el texto.
- source_word: ዲበ፡ ርእሰ፡ ሉባር፡
  english_pob_choice: on the summit of Lubar
  chosen_spanish: sobre la cima de Lubar
  alternatives_spanish:
  - en la cumbre de Lubar
  - encima de la cima de Lubar
  lexicon: Locative phrase with summit/top.
  rationale: «Cima» transmite «summit» con buena claridad y dignidad; «sobre» refleja la relación espacial del texto sin calcar excesivamente.
- source_word: አሐዱ፡ እምአድባረ፡ አራራት።
  english_pob_choice: one of the mountains of Ararat
  chosen_spanish: uno de los montes de Ararat
  alternatives_spanish:
  - uno de los montes del Ararat
  - uno de los montes de la región de Ararat
  lexicon: Partitive expression identifying Lubar as one mountain among a range.
  rationale: «Uno de los montes de Ararat» reproduce la partícula partitiva del original y la formulación de la POB inglesa sin introducir interpretaciones geográficas adicionales.
theological_decisions:
- issue: Name of the mountain region Ararat
  english_pob_reading: Ararat as a mountain region with multiple mountains
  chosen_spanish_reading: Ararat como región/montes de Ararat, no como una única montaña
  alternative_spanish_readings:
  - Ararat como un monte singular
  - Ararat como la montaña de Ararat
  rationale: El texto distingue entre Lubar y «uno de los montes de Ararat», por lo que en español conviene mantener el plural partitivo y no homogeneizarlo en una sola montaña.
  doctrine_reference: Ge 8:4; Jubileos 5:28
translation_notes:
  revision_awareness: La revisión inglesa más reciente no requirió cambios y la concordancia con la fuente es alta; por tanto, la redacción española sigue de cerca la estructura del original sin añadir notas textuales.
  spanish_consistency_notes:
  - He mantenido un registro bíblico sobrio y legible, evitando arcaísmos innecesarios.
  - No he introducido mayúsculas devocionales ni glosas interpretativas que el texto no exija.
  - «Lubar» se conserva como nombre propio transliterado, ya que el texto fuente lo presenta así.
