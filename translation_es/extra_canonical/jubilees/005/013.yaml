translation:
  language: es
  text: Y todo esto fue ordenado y escrito en las tablas celestiales, y no hay injusticia; y todos los que se apartan del camino que les fue ordenado para andar por él—
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שָׂרַע / ordered, ordained
  english_pob_choice: ordained
  chosen_spanish: ordenado
  alternatives_spanish:
  - ordenado/ordendado
  - decretado
  - establecido
  lexicon: ordained
  rationale: El pasaje repite la idea de una disposición establecida por autoridad divina; en español, 'ordenado' conserva bien ese valor jurídico-teleológico y permite reflejar la repetición del verbo en la cláusula inicial.
- source_word: written on the heavenly tablets
  english_pob_choice: written on the heavenly tablets
  chosen_spanish: escrito en las tablas celestiales
  alternatives_spanish:
  - inscrito en las tablas celestiales
  - escrito en las tablas del cielo
  lexicon: heavenly tablets
  rationale: '''Tablas celestiales'' es una expresión transparente y fiel al imaginario apocalíptico del texto, evitando una paráfrasis excesiva.'
- source_word: no injustice
  english_pob_choice: there is no injustice
  chosen_spanish: no hay injusticia
  alternatives_spanish:
  - no existe injusticia
  - no hay agravio
  lexicon: injustice
  rationale: '''Injusticia'' reproduce con precisión el sustantivo abstracto del original y mantiene la formulación breve del texto fuente.'
- source_word: depart from the path
  english_pob_choice: depart from the path
  chosen_spanish: se apartan del camino
  alternatives_spanish:
  - se desvían del camino
  - abandonan el camino
  lexicon: depart
  rationale: '''Apartarse del camino'' es la equivalencia idiomática natural en español para una salida moral o religiosa de la senda prescrita.'
- source_word: ordained for them to walk in
  english_pob_choice: ordained for them to walk in
  chosen_spanish: que les fue ordenado para que anden en él
  alternatives_spanish:
  - que les fue ordenado para caminar en él
  - que se les ordenó recorrer
  lexicon: walk
  rationale: '''Andar en él'' conserva el valor bíblico de conducta/proceder sin caer en un calco duro; la forma final con em dash respeta que la frase continúa en el siguiente versículo.'
theological_decisions:
- issue: Separación de cláusulas sobre injusticia y los que se apartan
  english_pob_reading: And there is no injustice; and all who depart from the path...
  chosen_spanish_reading: y no hay injusticia; y todos los que se apartan del camino...
  alternative_spanish_readings:
  - y no hay injusticia para todos los que se apartan...
  - y no hay injusticia en cuanto a todos los que se apartan...
  rationale: La revisión auditada corrige una lectura errónea que unía 'no hay injusticia' con 'los que se apartan'. En español se preserva la separación estricta para evitar implicar que el apartarse no sea injusto.
  doctrine_reference: justicia divina / retribución moral
- issue: Final abierto por continuidad de versículo
  english_pob_reading: to walk in.
  chosen_spanish_reading: para que anden en él—
  alternative_spanish_readings:
  - para andar en él—
  - para que lo sigan—
  rationale: El guion final marca que el sentido continúa en el versículo siguiente, conforme a la revisión textual. 'Anden en él' mantiene el campo semántico de conducta prescrita.
  doctrine_reference: continuidad textual / división versicular
translation_notes:
  revision_awareness: Se incorporó la corrección auditada que separa la cláusula 'no hay injusticia' de la siguiente sobre los que se apartan, evitando la falsa relación causal o concesiva. También se reflejó la revisión que pide un cierre abierto al final del versículo mediante un guion largo, porque la sintaxis continúa en el versículo 14. Se mantuvo la repetición léxica de 'ordenado' para reproducir el mismo verbo ge'ez que aparece en ambas cláusulas relevantes.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el pasaje no contiene el nombre divino en esta cláusula.
  - '''Tablas celestiales'' conserva el término técnico del libro y su registro apocalíptico.'
  - No se introducen notas al pie porque el texto final no requiere variantes ancladas para esta sección.
