  yaml_path: translation/extra_canonical/jubilees/005/031.yaml
  text: And the waters receded from upon the earth in the fifth week, in its seventh year; and on the seventeenth day in the second month the earth was dry.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:41Z'
    unchanged: false
    changes_summary: Changed 'disappeared from above the earth' to 'receded from upon the earth' for more natural and lexically precise wording; changed 'thereof' to 'its' for natural English.
translation:
  language: es
  text: Y las aguas se retiraron de sobre la tierra en la quinta semana, en su séptimo año; y el día diecisiete del segundo mes la tierra quedó seca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወነጽፈ፡ ማያት፡
  english_pob_choice: the waters receded
  chosen_spanish: las aguas se retiraron
  alternatives_spanish:
  - las aguas retrocedieron
  - las aguas desaparecieron
  lexicon: n/a
  rationale: El verbo ge'ez expresa el retiro o retroceso de las aguas; «se retiraron» conserva la imagen física y sigue de cerca la decisión inglesa revisada, sin volverlo abstracto como «desaparecieron».
- source_word: በሱባዔ፡ ኃምስ፡ በሳብዕ፡ ዓመት፡
  english_pob_choice: in the fifth week, in its seventh year
  chosen_spanish: en la quinta semana, en su séptimo año
  alternatives_spanish:
  - en la quinta semana, en el séptimo año de ella
  - en la quinta semana, en su séptimo año de esa semana
  lexicon: n/a
  rationale: Se mantiene la relación posesiva del original con «su», que en español resulta natural y preserva la referencia interna al ciclo de la semana sin explicitar más de lo que el texto dice.
- source_word: ወአመ፡ *ዐሡሩ፡ ወሰብዑ፡ ዕለት፡
  english_pob_choice: on the seventeenth day
  chosen_spanish: el día diecisiete
  alternatives_spanish:
  - en el día diecisiete
  - el diecisiete
  lexicon: n/a
  rationale: El ge'ez marca el día del mes; «el día diecisiete» es idiomático en español y conserva el dato cronológico sin introducir una preposición innecesaria.
- source_word: በካልእ፡ ወርኀ፡
  english_pob_choice: in the second month
  chosen_spanish: del segundo mes
  alternatives_spanish:
  - en el segundo mes
  - del segundo mes
  lexicon: n/a
  rationale: «Del segundo mes» integra naturalmente el complemento temporal ligado al día diecisiete y mantiene la referencia calendárica precisa.
- source_word: የብሰት፡ ምድር።
  english_pob_choice: the earth was dry
  chosen_spanish: la tierra quedó seca
  alternatives_spanish:
  - la tierra estaba seca
  - la tierra fue secada
  lexicon: n/a
  rationale: El estado resultante es el foco; «quedó seca» comunica la condición alcanzada, acorde con el cierre narrativo del versículo y sin sugerir una acción distinta.
theological_decisions:
- issue: Cronología del diluvio y secado de la tierra
  english_pob_reading: The verse marks the waters receding and the earth becoming dry at a precise calendrical point.
  chosen_spanish_reading: 'El versículo conserva la secuencia temporal exacta sin interpretación adicional: retiro de las aguas, quinta semana/ séptimo año, y secado de la tierra el día diecisiete del segundo mes.'
  alternative_spanish_readings:
  - Añadir una paráfrasis explicativa del proceso.
  - Reordenar los datos cronológicos para hacerlos más narrativos.
  rationale: No hay tensión doctrinal que resolver; la prioridad es respetar la precisión cronológica del original y no suavizarla ni expandirla.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «receded from upon the earth» por mayor precisión léxica. La versión española adopta esa misma relación semántica con «se retiraron de sobre la tierra», reflejada aquí como «se retiraron de sobre la tierra»? No; se optó por la forma más natural «se retiraron de sobre la tierra» / «las aguas se retiraron de sobre la tierra», manteniendo el movimiento de alejamiento y la localización superior implícita en el original.
  spanish_consistency_notes:
  - Se usa «tierra» para ምድር, siguiendo el sentido cosmológico del pasaje.
  - Se preserva «semana» como unidad estructural del libro de Jubileos.
  - No se introduce «SEÑOR» ni terminología cristológica, ya que el versículo no contiene nombres divinos ni títulos mesiánicos.
  - La formulación es neutral y apta para lectura pública, con puntuación española estándar.
