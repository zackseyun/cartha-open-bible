translation:
  language: es
  text: Y envió una espada entre ellos, para que cada uno matara a su prójimo; y comenzaron a matarse unos a otros hasta que todos cayeron a espada y fueron borrados de la tierra.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወፈነወ / sent
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  lexicon: send
  rationale: El ge'ez expresa el envío de la espada como acto causativo. «Envió» reproduce de manera natural el movimiento de hacer llegar algo entre ellos sin añadir un matiz de mando que el contexto no exige.
- source_word: ሰይፈ / sword
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - una espada de guerra
  - una espada [como arma]
  lexicon: sword
  rationale: «Espada» es la equivalencia directa y digna en español. Se evita especificar más allá del texto, que solo dice que fue enviada una espada entre ellos.
- source_word: ከመ ይቅትል ፩፪ቢጹ / so that each might kill his fellow
  english_pob_choice: so that each might kill his fellow
  chosen_spanish: para que cada uno matara a su compañero
  alternatives_spanish:
  - para que cada uno matara a su hermano
  - para que uno matara al otro
  lexicon: kill his fellow
  rationale: «Su compañero» mantiene la idea relacional de un igual o cercano sin forzar «hermano», que sería más específico de lo que garantiza el texto. «Para que» expresa la finalidad causal del envío.
- source_word: ወወጠኑ ይቅትሉ / they began to kill
  english_pob_choice: they began to kill one another
  chosen_spanish: comenzaron a matarse unos a otros
  alternatives_spanish:
  - empezaron a matarse unos a otros
  - comenzaron a darse muerte entre sí
  lexicon: begin to kill one another
  rationale: «Comenzaron a matarse unos a otros» refleja el inicio recíproco de la acción. «Matarse unos a otros» es más idiomático en español que una construcción literal más pesada.
- source_word: ኵሎሙ ውስተ ሰይፍ / all fell by the sword
  english_pob_choice: they all fell by the sword
  chosen_spanish: todos cayeron a espada
  alternatives_spanish:
  - todos murieron a espada
  - todos perecieron a espada
  lexicon: fall by the sword
  rationale: «Cayeron a espada» conserva la fórmula bíblica/semítica de muerte violenta por arma, sin perder claridad en español.
- source_word: ተደምሰሱ እምነ ምድር / were wiped out from the earth
  english_pob_choice: were wiped out from the earth
  chosen_spanish: fueron borrados de la tierra
  alternatives_spanish:
  - fueron exterminados de la tierra
  - fueron eliminados de la tierra
  lexicon: wipe out from the earth
  rationale: «Borrados de la tierra» sigue de cerca la fuerza totalizante de la expresión. Se evita «exterminados» por introducir un matiz histórico moderno no necesario aquí.
theological_decisions:
- issue: Violent judgment expressed through internal strife rather than direct battlefield defeat
  english_pob_reading: And he sent a sword among them ... they began to kill one another ... were wiped out from the earth.
  chosen_spanish_reading: Y envió una espada entre ellos ... comenzaron a matarse unos a otros ... fueron borrados de la tierra.
  alternative_spanish_readings:
  - Y envió una espada contra ellos
  - Y envió una espada en medio de ellos
  rationale: La redacción mantiene que la destrucción ocurre mediante conflicto interno provocado, no por un ataque exterior ordinario. «Entre ellos» conserva la imagen de inserción del juicio sin interpretarla de más.
  doctrine_reference: Providencia y juicio divino en narración deuterocanónica/pseudepigráfica
- issue: Total destruction formula
  english_pob_reading: were wiped out from the earth
  chosen_spanish_reading: fueron borrados de la tierra
  alternative_spanish_readings:
  - fueron exterminados de la tierra
  - fueron eliminados de la tierra
  rationale: La frase conserva el alcance total del juicio. «Borrados» mantiene la imagen de desaparición completa que el inglés POB también preserva.
  doctrine_reference: Lenguaje de juicio total en literatura bíblica
translation_notes:
  revision_awareness: El inglés POB revisó «his sword» a «a sword» por precisión léxica. La versión española sigue esa revisión con «una espada», sin añadir posesivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparece; aquí no aparece explícitamente.
  - Se mantiene un registro bíblico claro y no arcaizante.
  - Se preserva la fuerza recíproca de la acción con «unos a otros».
  - «Borrados de la tierra» conserva el cierre totalizante del original sin suavizarlo.
