translation:
  language: es
  text: Y el día veintisiete de ese mes abrió el arca y envió fuera de ella bestias, ganado, aves y todo lo que se mueve.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֶ֥מֶ / twenty-seventh thereof
  english_pob_choice: on the twenty-seventh thereof
  chosen_spanish: al vigésimo séptimo de ese mes
  alternatives_spanish:
  - en el vigésimo séptimo
  - el día veintisiete de ese mes
  lexicon: temporal expression
  rationale: El inglés revisado usa 'on' para una fecha del calendario. En español, 'al vigésimo séptimo de ese mes' comunica de forma natural la referencia a un día específico del mes sin forzar una preposición literalista.
- source_word: אַרְחָה / opened
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - descorrió
  - abrió la puerta del arca
  lexicon: פתח
  rationale: El verbo simple 'abrió' reproduce con claridad la acción de abrir el arca. 'Descorrió' sería más específico pero añade un matiz no requerido por el hebreo/gee'z ni por el inglés POB.
- source_word: תֵּבָה / ark
  english_pob_choice: ark
  chosen_spanish: arca
  alternatives_spanish:
  - arca de Noé
  lexicon: תיבה
  rationale: '''Arca'' es la equivalencia directa y suficiente en español; el contexto ya identifica el arca de Noé, por lo que no es necesario expandirla en el texto principal.'
- source_word: beasts and cattle and birds and everything that moves
  english_pob_choice: beasts and cattle and birds and everything that moves
  chosen_spanish: bestias, ganado, aves y todo lo que se mueve
  alternatives_spanish:
  - animales salvajes, animales domésticos, aves y todo ser que se mueve
  - bestias, animales, aves y todo ser viviente
  lexicon: אֲרָיוֹת / בְּהֵמָה / עוֹף / todo lo que se moves
  rationale: La secuencia mantiene la lista concreta del original y del inglés POB. 'Ganado' preserva la distinción frente a 'bestias'; 'aves' traduce el campo de aves sin sobreinterpretar. 'Todo lo que se mueve' sigue de cerca la formulación fuente y evita sustituirla por una generalización más interpretativa.
theological_decisions:
- issue: Preservar la concreción zoológica del pasaje sin suavizarla a una fórmula genérica
  english_pob_reading: beasts and cattle and birds and everything that moves
  chosen_spanish_reading: bestias, ganado, aves y todo lo que se mueve
  alternative_spanish_readings:
  - animales y aves y otros seres vivientes
  - animales salvajes, domésticos y aves
  rationale: El texto describe la liberación de categorías de criaturas tras el diluvio. Mantener la enumeración ayuda a respetar la amplitud del pasaje y su tono narrativo sin introducir una lectura teológica adicional.
  doctrine_reference: Génesis 8:17; Jubileos 5:32
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'in the twenty-seventh' a 'on the twenty-seventh' para una fecha más natural. La español sigue esa misma decisión con una expresión temporal idiomática ('al vigésimo séptimo de ese mes') sin añadir notas textuales, porque no hay variante de contenido sino de naturalidad temporal.
  spanish_consistency_notes:
  - Se mantiene 'arca' y no 'arca de Noé' en el texto principal para conservar la concisión y porque el referente es inequívoco en el contexto.
  - Se conserva 'bestias' junto a 'ganado' para reflejar la distinción lexical del original y del inglés POB.
  - Se usa 'todo lo que se mueve' como calco controlado del cierre descriptivo, evitando una paráfrasis más explicativa.
