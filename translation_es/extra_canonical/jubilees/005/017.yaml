  to: 'Y acerca de los hijos de Israel está escrito y ordenado: si se vuelven a él en justicia, él perdonará todas sus transgresiones y remitirá todos sus pecados.'
  rationale: Se reemplaza 'absolverá' por 'remitirá' para mantener la distinción entre los dos verbos de perdón presentes en la auditoría inglesa, pero con una expresión más natural y bíblicamente idiomática en español para 'pecados'. No se requieren notas.
