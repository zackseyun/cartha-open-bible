translation:
  language: es
  text: 'Y acerca de los hijos de Israel está escrito y ordenado: si se vuelven a él en justicia, él perdonará todas sus transgresiones y remitirá todos sus pecados.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ተጽሕፈ፡ ወተሠርዐ፡
  english_pob_choice: it has been written and ordained
  chosen_spanish: está escrito y ordenado
  alternatives_spanish:
  - ha sido escrito y establecido
  - está escrito y dispuesto
  lexicon: written/ordained
  rationale: Conservo la doble idea de texto fijado y decreto establecido. 'Ordenado' refleja mejor el matiz de disposición normativa que un simple 'escrito'.
- source_word: ተመይጡ፡ ኀቤሁ፡
  english_pob_choice: if they turn to him
  chosen_spanish: si se vuelven a él
  alternatives_spanish:
  - si se convierten a él
  - si retornan a él
  lexicon: turn/return
  rationale: La forma española 'se vuelven a él' mantiene la imagen de retorno personal presente en el source, sin cargarla demasiado con una terminología técnica que el contexto no exige.
- source_word: በጽድቅ፡
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: righteousness/justice
  rationale: '''Justicia'' conserva el campo semántico bíblico de conducta recta y relación conforme al pacto. ''Rectitud'' sería posible, pero ''justicia'' es más natural aquí y mantiene la equivalencia con el patrón bíblico del término.'
- source_word: የኀድግ፡
  english_pob_choice: he will forgive
  chosen_spanish: perdonará
  alternatives_spanish:
  - perdonará
  - remitirá
  lexicon: forgive
  rationale: '''Perdonará'' comunica bien la remisión de culpas para español bíblico contemporáneo. ''Remitirá'' sería más formal, pero menos transparente para lectura pública.'
- source_word: ኵሎ፡ አበሳሆሙ፡
  english_pob_choice: all their transgressions
  chosen_spanish: todas sus transgresiones
  alternatives_spanish:
  - todas sus rebeliones
  - todas sus faltas
  lexicon: transgression
  rationale: '''Transgresiones'' sigue de cerca el valor jurídico-moral del término y preserva su fuerza, evitando suavizarlo a ''faltas''.'
- source_word: ይስሬ፡ ኵሎ፡ ኀጢአቶሙ።
  english_pob_choice: pardon all their sins
  chosen_spanish: absolverá todos sus pecados
  alternatives_spanish:
  - perdonará todos sus pecados
  - eximirá de todos sus pecados
  lexicon: pardon/absolve
  rationale: '''Absolverá'' distingue este segundo verbo del primero y refleja la idea de declarar libre de culpa. Mantiene una diferencia semántica que la POB inglesa preserva entre ''forgive'' y ''pardon''.'
theological_decisions:
- issue: 'Doble verbo de perdón: forgive / pardon'
  english_pob_reading: he will forgive all their transgressions and pardon all their sins
  chosen_spanish_reading: perdonará todas sus transgresiones y absolverá todos sus pecados
  alternative_spanish_readings:
  - perdonará todas sus transgresiones y perdonará todos sus pecados
  - perdonará todas sus transgresiones y remitirá todos sus pecados
  rationale: 'La fuente distingue dos acciones relacionadas pero no idénticas; en español conviene conservar esa diferenciación para no borrar la tensión léxica. ''Perdonará'' y ''absolverá'' permiten reflejar dos matices complementarios: remisión y declaración de culpa levantada.'
  doctrine_reference: Soteriología bíblica; lenguaje de perdón y absolución
- issue: Condición de retorno 'en justicia'
  english_pob_reading: if they turn to him in righteousness
  chosen_spanish_reading: si se vuelven a él en justicia
  alternative_spanish_readings:
  - si se convierten a él con rectitud
  - si retornan a él con justicia
  rationale: El source vincula el retorno con una cualidad ética de justicia. Mantener 'en justicia' preserva la relación entre arrepentimiento práctico y conducta recta sin imponer una formulación doctrinal extraña al texto.
  doctrine_reference: Arrepentimiento y obediencia del pacto
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el control cruzado reportó alta concordancia; por ello esta versión sigue de cerca el texto inglés POB y el source ge'ez sin introducir variantes no motivadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando corresponda en el proyecto; aquí el pasaje usa un referente pronominal ('él'), por lo que no se introduce el nombre.
  - Se conserva un registro bíblico moderno y claro, evitando calcos duros donde el español natural permite una formulación equivalente.
  - No se añadió puntuación explicativa ni notas al pie porque el source y el audit trail no documentan variantes textuales o alternativas obligatorias en este versículo.
