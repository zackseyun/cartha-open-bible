translation:
  language: es
  text: Pero solo Noé halló favor delante de los ojos de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ባሕቲቱ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - él solo
  lexicon: adverbio de exclusión
  rationale: 'El ge''ez expresa exclusividad: Noé, y no otros, fue el único que halló favor. En español, «solo» comunica la misma restricción con naturalidad y sin añadir énfasis interpretativo excesivo.'
- source_word: ረከበ፡ ሞገሰ፡
  english_pob_choice: found favor
  chosen_spanish: halló favor
  alternatives_spanish:
  - encontró favor
  - obtuvo favor
  lexicon: locución verbal de gracia/favor
  rationale: La lectura inglesa fija «found favor» como equivalente de la expresión semítica de aceptación favorable. «Halló favor» conserva ese valor idiomático y es transparente en español bíblico contemporáneo.
- source_word: በቅድመ፡ *አዕይንቲሁ፡
  english_pob_choice: before the eyes of
  chosen_spanish: delante de los ojos de
  alternatives_spanish:
  - ante los ojos de
  - a la vista de
  lexicon: preposición + imagen antropomórfica
  rationale: 'Se mantiene la imagen auditada del inglés POB: no se suaviza a una mera fórmula abstracta porque el original conserva la metáfora de estar bajo la mirada de Dios. «Delante de los ojos de» es plenamente comprensible en español.'
- source_word: ለእግዚአብሔር፡
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: nombre divino (YHWH)
  rationale: Aunque el inglés POB usa «the Lord», la política terminológica del proyecto indica «Yahvé» para יהוה/YHWH. Aquí el referente es el nombre divino, por lo que se explicita en español sin máscara reverencial.
theological_decisions:
- issue: Sujeto exclusivo de la gracia divina
  english_pob_reading: But Noah alone found favor before the eyes of the Lord.
  chosen_spanish_reading: Pero solo Noé halló favor delante de los ojos de Yahvé.
  alternative_spanish_readings:
  - Pero Noé únicamente halló favor delante de los ojos de Yahvé.
  - Solo Noé halló favor delante de los ojos de Yahvé.
  rationale: 'La frase preserva la exclusividad teológica del texto: en medio del juicio general, Noé es el único receptor de favor. El adverbio «solo» mantiene esa tensión sin expandir el sentido hacia mérito humano.'
  doctrine_reference: Gracia/favor divino en contexto de juicio; elección y preservación de Noé.
translation_notes:
  revision_awareness: El registro inglés POB permanece sin revisiones y con alta concordancia respecto del ge'ez; no se documentan variantes textuales ni cambios editoriales que requieran reflejo adicional en español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme a la terminología española del proyecto para el nombre divino.
  - Se mantiene la imagen corporal/relacional «delante de los ojos de» porque está respaldada por la fuente y por la traducción inglesa auditada.
  - No se introduce puntuación o división adicional que altere el énfasis exclusivo del enunciado.
