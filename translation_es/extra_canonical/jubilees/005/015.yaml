translation:
  language: es
  text: En cuanto a todos, él juzgará al grande conforme a su grandeza, y al pequeño conforme a su pequeñez, y a cada uno conforme a su camino.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በእንተ፡ ኵሉ፡
  english_pob_choice: Concerning all
  chosen_spanish: En cuanto a todos
  alternatives_spanish:
  - Con respecto a todos
  - Acerca de todos
  lexicon: preposición de relación + cuantificador universal
  rationale: El ge'ez introduce el alcance del enunciado con una relación general sobre ‘todos’; «En cuanto a» conserva ese valor discursivo sin sonar forzado en español.
- source_word: ዐቢይ
  english_pob_choice: the great
  chosen_spanish: el grande
  alternatives_spanish:
  - el mayor
  - el poderoso
  lexicon: adjetivo sustantivado
  rationale: La forma española sustantivada mantiene la simetría con «el pequeño» y conserva la idea de estatura/condición sin introducir una interpretación no señalada por el texto.
- source_word: በከመ፡ ዐበየ፡
  english_pob_choice: according to his greatness
  chosen_spanish: conforme a su grandeza
  alternatives_spanish:
  - según su grandeza
  - de acuerdo con su grandeza
  lexicon: correspondencia proporcional
  rationale: «Conforme a» expresa adecuadamente el juicio proporcional del original y del POB inglés, manteniendo la equivalencia de medida o condición.
- source_word: ወለንኡስ*ሂ፡
  english_pob_choice: the small
  chosen_spanish: el pequeño
  alternatives_spanish:
  - el menor
  - el humilde
  lexicon: adjetivo sustantivado
  rationale: «El pequeño» preserva el paralelismo con «el grande» y evita cargar el término con matices sociales o morales no explícitos en el verso.
- source_word: በከመ፡ ንእሰ፡
  english_pob_choice: according to his smallness
  chosen_spanish: conforme a su pequeñez
  alternatives_spanish:
  - según su pequeñez
  - de acuerdo con su pequeñez
  lexicon: correspondencia proporcional
  rationale: «Pequeñez» refleja la cualidad abstracta del ge'ez, manteniendo la medida proporcional del juicio sin reinterpretar el término como inferioridad moral.
- source_word: አሐዱ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - uno cada uno
  lexicon: distributive singular
  rationale: «Cada uno» es la forma natural y fiel para el distributivo singular; conserva el alcance individual del juicio.
- source_word: ፍኖቱ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su proceder
  lexicon: metáfora moral de conducta
  rationale: «Camino» reproduce la metáfora bíblica de conducta o modo de vida, y coincide con la elección del POB inglés.
theological_decisions:
- issue: Juicio proporcional según condición o medida
  english_pob_reading: he will judge the great according to his greatness, and the small according to his smallness, and each one according to his way
  chosen_spanish_reading: él juzgará al grande conforme a su grandeza, y al pequeño conforme a su pequeñez, y a cada uno conforme a su camino
  alternative_spanish_readings:
  - él juzgará al grande según su grandeza, y al pequeño según su pequeñez, y a cada uno según su camino
  - él juzgará al grande de acuerdo con su grandeza, y al pequeño de acuerdo con su pequeñez, y a cada uno de acuerdo con su camino
  rationale: La formulación mantiene la idea de juicio proporcional sin suavizarla ni convertirla en un principio moral genérico. La repetición de la medida correspondiente en grande/pequeño/camino es parte del sentido del texto y debe permanecer visible.
  doctrine_reference: retribución/jucio proporcional
translation_notes:
  revision_awareness: La revisión más reciente indica acuerdo alto y ningún cambio necesario; por eso la redacción española sigue de cerca el valor semántico confirmado por el POB inglés y el ge'ez sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene «el grande / el pequeño» para conservar el paralelismo del original.
  - Se evita «SEÑOR» u այլ terminología no presente; el verso no contiene el nombre divino.
  - «Camino» se usa en sentido de conducta, no como referencia geográfica.
