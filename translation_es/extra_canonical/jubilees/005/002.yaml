base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/002.yaml
  text: And lawlessness increased on the earth, and all flesh corrupted its way, from men to cattle, and to beasts, and to birds, and to everything that moves on the earth. All of them corrupted their ways and their ordinances, and they began to devour one another; and lawlessness increased on the earth, and every imagination of the thoughts of all the children of men was thus evil all the days.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:08Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y la maldad aumentó sobre la tierra, y toda carne corrompió su camino, desde los hombres hasta el ganado, y hasta las bestias, y hasta las aves, y hasta todo lo que se mueve sobre la tierra. Todos ellos corrompieron sus caminos y sus ordenanzas, y comenzaron a devorarse unos a otros; y la maldad aumentó sobre la tierra, y todo designio de los pensamientos de todos los hijos de los hombres fue así malo todos los días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐመፃ
  english_pob_choice: lawlessness
  chosen_spanish: iniquidad
  alternatives_spanish:
  - ilegalidad
  - anarquía
  - falta de ley
  lexicon: —
  rationale: El inglés POB usa 'lawlessness' para captar la ausencia/violación de orden justo; en español 'iniquidad' comunica mejor el peso moral y jurídico sin sonar artificial. 'Ilegalidad' es demasiado estrecho; 'anarquía' sugiere desorden político más que corrupción moral.
- source_word: ዘሥጋ
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda humanidad
  - todo ser viviente
  lexicon: —
  rationale: Se conserva la equivalencia tradicional y la amplitud semántica de 'flesh' en sentido colectivo. 'Toda humanidad' limitaría el alcance, y 'todo ser viviente' borraría la oposición con la humanidad que el contexto mantiene.
- source_word: አማሰነ ፍኖተ
  english_pob_choice: corrupted its way
  chosen_spanish: corrompió su camino
  alternatives_spanish:
  - pervirtió su camino
  - arruinó su camino
  lexicon: —
  rationale: '''Corrompió su camino'' reproduce bien la idea ética de desviación del curso debido. ''Pervirtió'' es posible, pero menos cercano al paralelismo con ''corrupted their ways'' del versículo.'
- source_word: ፍኖቶሙ ወሥርዐቶሙ
  english_pob_choice: their ways and their ordinances
  chosen_spanish: sus caminos y sus ordenanzas
  alternatives_spanish:
  - sus caminos y sus estatutos
  - sus conductas y sus normas
  lexicon: —
  rationale: '''Ordenanzas'' mantiene el tono normativo del paralelo con ''ordinances'' sin forzar una terminología eclesiástica. ''Estatutos'' sería posible, pero ''ordenanzas'' refleja mejor el registro jurídico general del pasaje.'
- source_word: ይትበልዑ በበይናቲሆሙ
  english_pob_choice: began to devour one another
  chosen_spanish: comenzaron a devorarse unos a otros
  alternatives_spanish:
  - empezaron a destruirse entre sí
  - comenzaron a comerse unos a otros
  lexicon: —
  rationale: Se preserva la imagen fuerte del original y del inglés POB. 'Devorarse' mantiene la literalidad figurada sin suavizar la violencia; 'destruirse entre sí' perdería el matiz alimentario/depredador.
- source_word: ኵሉ ሕሊና አእምሮ
  english_pob_choice: every imagination of the thoughts
  chosen_spanish: toda imaginación de los pensamientos
  alternatives_spanish:
  - todo designio de los pensamientos
  - todo impulso de la mente
  lexicon: —
  rationale: Se conserva la estructura acumulativa del hebraísmo/idiomatismo reflejado en el inglés POB. 'Imaginación' reproduce 'imagination'; 'pensamientos' mantiene el segundo sustantivo sin simplificar a una sola idea mental.
- source_word: እኩይ
  english_pob_choice: evil
  chosen_spanish: mala
  alternatives_spanish:
  - malvada
  - perversa
  - mala en extremo
  lexicon: —
  rationale: '''Mala'' evita sobreteologizar o intensificar innecesariamente; conserva la valoración moral directa del texto. ''Perversa'' sería más fuerte, pero menos neutral y menos fiel al simple predicado del original.'
theological_decisions:
- issue: El alcance de 'all flesh' incluye humanidad y animales bajo el juicio moral de la corrupción.
  english_pob_reading: all flesh corrupted its way, from men to cattle, and to beasts, and to birds, and to everything that moves on the earth
  chosen_spanish_reading: toda carne corrompió su camino, desde los hombres hasta el ganado, y hasta las bestias, y hasta las aves, y hasta todo lo que se mueve sobre la tierra
  alternative_spanish_readings:
  - toda humanidad corrompió su camino
  - todo ser viviente corrompió su camino
  rationale: El texto distingue expresamente entre 'los hombres' y otras categorías de criaturas. Por eso 'toda carne' conserva la amplitud total sin borrar la enumeración zoológica que sigue; una reducción a 'humanidad' falsearía el alcance del versículo.
  doctrine_reference: Creación y corrupción universal; juicio moral sobre el orden creado.
- issue: La frase final expresa una disposición continua y total, no un acto aislado.
  english_pob_reading: every imagination of the thoughts of all the children of men was thus evil all the days
  chosen_spanish_reading: toda imaginación de los pensamientos de todos los hijos de los hombres fue así mala todos los días
  alternative_spanish_readings:
  - todo designio de los pensamientos... fue malo todo el tiempo
  - toda intención de los pensamientos... fue mala continuamente
  rationale: Se conserva la acumulación semítica y la extensión temporal absoluta ('todos los días'). Esto evita diluir la afirmación en una mera tendencia ocasional y mantiene el juicio moral del pasaje.
  doctrine_reference: Depravación humana general según el marco narrativo del diluvio.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios según el último pase; no hay notas textuales ni variantes registradas. La presente redacción sigue de cerca la lectura inglesa aprobada, pero vuelve al texto fuente ge'ez para sostener las decisiones léxicas clave y mantener el paralelismo de la enumeración y las repeticiones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no porque aparezca aquí un nombre divino explícito, sino como norma del proyecto cuando corresponda; en este versículo no interviene.
  - Se mantiene 'iniquidad' de forma consistente para 'lawlessness' en vez de alternar con 'anarquía' o 'ilegalidad', para conservar el registro moral-jurídico.
  - '''Toda carne'' y la serie ''hombres, ganado, bestias, aves'' se dejan explícitas para evitar una generalización reductiva.'
  - Se conserva la duplicación de 'y' y de la cláusula de aumento para reflejar el paralelismo enfático del original.
