  to: Y la maldad aumentó sobre la tierra, y toda carne corrompió su camino, desde los hombres hasta el ganado, y hasta las bestias, y hasta las aves, y hasta todo lo que se mueve sobre la tierra. Todos ellos corrompieron sus caminos y sus ordenanzas, y comenzaron a devorarse unos a otros; y la maldad aumentó sobre la tierra, y todo designio de los pensamientos de todos los hijos de los hombres fue así malo todos los días.
  rationale: 'Se hacen dos ajustes menores para mejorar fidelidad contextual y legibilidad en español: ''iniquidad'' pasa a ''maldad'' para reflejar mejor el sentido amplio de corrupción/lawlessness en el pasaje, y ''imaginación de los pensamientos'' se sustituye por ''designio de los pensamientos'', que preserva la acumulación mental del original con español más natural. El resto del borrador puede mantenerse.'
