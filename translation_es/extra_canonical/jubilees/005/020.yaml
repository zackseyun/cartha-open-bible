translation:
  language: es
  text: Y Dios dijo que destruiría todo lo que está sobre la tierra seca[a], desde el ser humano hasta el ganado, hasta las bestias, y hasta las aves del cielo, y hasta todo lo que se mueve sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien «la tierra firme». El Ge'ez የብስ (yabəs) subraya el carácter seco de la tierra en contraste con las aguas, en paralelo con el hebreo יַבָּשָׁה (Gn 1:9-10; 7:22).
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚአብሔር (ʾƎgziʾabḥer)
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: 'Ge''ez: ʾƎgziʾabḥer, lit. ''Master of all''; standard Ethiopic honorific for the divine name'
  rationale: 'El Ge''ez እግዚአብሔር es el equivalente etíope del griego κύριος del LXX: un título honorífico que en la tradición bíblica etíope representa el nombre divino, no una mera forma de cortesía. El POB en inglés sigue la convención de ''the Lord'', análoga a la mascarada del ''SEÑOR'' en traducciones castellanas. El estilo del POB en español exige transparencia sobre el nombre divino, por lo que se usa ''Yahvé'' siguiendo el patrón del proyecto, con nota explicativa.'
- source_word: ይደመስስ (yədamassəs)
  english_pob_choice: would destroy
  chosen_spanish: destruiría
  alternatives_spanish:
  - sea destruido (voz pasiva, discurso directo)
  lexicon: 'Ge''ez: 3.ª persona singular imperfecto activo de damassasa, ''destruir, aniquilar'''
  rationale: La revisión aplicada (2026-04-28) confirma que ይደመስስ es verbo activo en 3.ª persona con objeto acusativo ኵሎ ('todo'). Esto señala discurso indirecto dependiente de ወይቤ ('dijo'). En español se traduce con el condicional pasado 'destruiría' en oración subordinada sustantiva ('dijo que destruiría…'), preservando la voz activa y el discurso indirecto frente a la formulación pasiva-directa anterior.
- source_word: የብስ (yabəs)
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra firme
  - lo seco
  lexicon: 'Ge''ez: yabəs, ''seco, tierra seca''; paralelo semántico al hebreo יַבָּשָׁה'
  rationale: '''Tierra seca'' calca el contraste explícito con las aguas que subyace al término (cf. Gn 1:9-10 en contexto de diluvio). ''Tierra firme'' es igualmente válida pero neutraliza el matiz de sequedad que el término refleja en el contexto del juicio diluviano.'
- source_word: እሰብእ (ʾəsabəʾ)
  english_pob_choice: man
  chosen_spanish: el ser humano
  alternatives_spanish:
  - el hombre
  - la humanidad
  lexicon: 'Ge''ez: ʾəsabəʾ, ''ser humano, persona, gente'''
  rationale: '''El ser humano'' evita el sesgo de género de ''el hombre'' y refleja mejor el término genérico del Ge''ez, que abarca a toda la especie, en consonancia con el español moderno y neutral latinoamericano del proyecto.'
- source_word: እንስሳ (ʾənsəsa)
  english_pob_choice: cattle
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales domésticos
  - las bestias de carga
  lexicon: 'Ge''ez: ʾənsəsa, ''animales domésticos, ganado'''
  rationale: '''Ganado'' captura la distinción entre animales domésticos (እንስሳ) y bestias salvajes (አራዊት) que la enumeración preserva: la lista va de lo más cercano al ser humano a lo más distante.'
- source_word: አራዊት (ʾarawit)
  english_pob_choice: beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - las fieras
  - los animales salvajes
  lexicon: 'Ge''ez: ʾarawit, ''animales salvajes, fieras'''
  rationale: '''Las bestias'' es el calco natural de ''beasts'' del POB inglés y mantiene la distinción con ''ganado'' (አራዊት vs. እንስሳ). ''Las fieras'' sería más enfático; ''animales salvajes'' más explicativo. ''Bestias'' resulta digno y claro en el español eclesiástico moderno.'
- source_word: አዕዋፈ ሰማይ (ʾaʿwafä samay)
  english_pob_choice: the birds of heaven
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - los pájaros del cielo
  lexicon: 'Ge''ez: ʾaʿwafä, ''aves''; samay, ''cielo'''
  rationale: '''Las aves del cielo'' es la expresión bíblica estándar en español, fiel al término Ge''ez y concordante con el lenguaje diluvial de Génesis (cf. Gn 6:7; 7:3). ''Pájaros'' tiene un registro menos solemne.'
- source_word: ዘይትሐወስ ውስተ ምድር (zä-yətḥawwas wəstä mədr)
  english_pob_choice: whatever moves on the earth
  chosen_spanish: todo lo que se mueve sobre la tierra
  alternatives_spanish:
  - cuanto se arrastra por la tierra
  - todo lo que repta sobre la tierra
  lexicon: 'Ge''ez: yətḥawwas, participio de tḥawwasa, ''moverse, desplazarse''; mədr, ''tierra, suelo'''
  rationale: '''Todo lo que se mueve sobre la tierra'' es una traducción precisa y amplía sin reducir al mero ''reptarse''. El Ge''ez yətḥawwas cubre movimiento en general (no solo reptiles), por lo que ''se mueve'' es preferible a ''se arrastra'' para no estrechar el alcance léxico.'
theological_decisions:
- issue: Discurso indirecto vs. discurso directo en la orden divina
  english_pob_reading: And the Lord said that He would destroy everything that is on the dry land…
  chosen_spanish_reading: Y Yahvé dijo que destruiría todo lo que está sobre la tierra seca…
  alternative_spanish_readings:
  - 'Y el Señor dijo: «Que sea destruido todo lo que está sobre la tierra seca…»'
  - 'Y Yahvé ordenó: «Destruiré todo lo que está sobre la tierra seca…»'
  rationale: 'La revisión de 2026-04-28 estableció definitivamente que ይደመስስ es un imperfecto activo de 3.ª persona que rige discurso indirecto. El español refleja esto con ''dijo que destruiría'': oración subordinada sustantiva en condicional pasado, sin comillas de discurso directo. Cualquier formulación de discurso directo o de voz pasiva traicionaría la morfología Ge''ez documentada.'
  doctrine_reference: Juicio divino del diluvio; Jubileos 5 como expansión haggádica de Gn 6:7
- issue: 'Nombre divino: Yahvé vs. el Señor para Ge''ez እግዚአብሔር'
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  rationale: Jubileos se conserva en Ge'ez y el hebreo original (perdido en su mayor parte) habría usado el Tetragrama (יהוה). El Ge'ez እግዚአብሔር es la convención honorífica etíope para el nombre divino —equivalente funcional del griego κύριος del LXX— y no un nombre propio distinto. El mandato del POB en español de usar 'Yahvé' en lugar de convenciones de enmascaramiento aplica aquí, con la explicación de que la fuente etíope emplea el título-forma, no el Tetragrama directo.
  doctrine_reference: Tradición de preservación del nombre divino en textos del Segundo Templo; política de transparencia del POB
translation_notes:
  revision_awareness: 'Dos revisiones documentadas afectan directamente la traducción española. (1) La revisión de 2026-04-28 (tier 2, categoría: mistranslation) estableció que ይደመስስ es un verbo activo en discurso indirecto —no un imperativo pasivo—, lo que en español exige ''dijo que destruiría…'' y prohíbe cualquier formulación de tipo ''que sea destruido…''. (2) La revisión gramatical posterior (2026-04-28, categoría: grammar) eliminó la coma antes de ''that'' en inglés, confirmando la sintaxis de subordinada sustantiva sin pausa; el español no requiere coma entre ''dijo'' y la cláusula ''que'' en este tipo de construcción, lo cual ya es la norma en español moderno. Ambas revisiones confluyen en la forma verbal ''destruiría'' dentro de una oración subordinada directa sin marcas de discurso directo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de 'el Señor'/'el SEÑOR' conforme al estilo del POB en español para el nombre divino, con explicación de la mediación del Ge'ez እግዚአብሔር.
  - La enumeración con 'hasta… hasta… y hasta… y hasta…' replica la estructura aditiva del Ge'ez (múltiples marcadores እስከ/ወእስከ), preservando el efecto retórico de totalidad del juicio.
  - Se evita 'hombre' en favor de 'ser humano' para reflejar el genérico Ge'ez ʾəsabəʾ sin sesgo de género, conforme al español neutro latinoamericano del proyecto.
  - Se mantiene 'bestias' (vs. 'fieras' o 'animales salvajes') como equivalente digno de 'beasts' del POB inglés, conservando la distinción léxica con 'ganado' (እንስሳ vs. አራዊት).
