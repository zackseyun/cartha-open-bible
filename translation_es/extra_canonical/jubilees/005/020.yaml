revisions:
- from: Y Yahvé[a] dijo que destruiría todo lo que está sobre la tierra seca[b], desde el ser humano hasta el ganado, hasta las bestias, y hasta las aves del cielo, y hasta todo lo que se mueve sobre la tierra.
  to: Y Dios dijo que destruiría todo lo que está sobre la tierra seca[a], desde el ser humano hasta el ganado, hasta las bestias, y hasta las aves del cielo, y hasta todo lo que se mueve sobre la tierra.
  rationale: Se reemplaza 'Yahvé' por 'Dios' porque la fuente inmediata Ge'ez usa እግዚአብሔር, y en esta unidad no hay base suficiente para transparentarlo como el Tetragrama sin sobreinterpretar la evidencia. Se elimina la nota asociada al nombre divino por la misma razón. Se conserva el resto del texto porque refleja fielmente la sintaxis de discurso indirecto y la enumeración léxica del original.
  reviewer_model: gpt-5.4
