    text: O bien «la tierra firme». El Ge'ez የብስ (yabəs) subraya el carácter seco de la tierra en contraste con las aguas, en paralelo con el hebreo יַבָּשָׁה (Gn 1:9-10; 7:22).
    reason: lexical_alternative
