  yaml_path: translation/extra_canonical/jubilees/005/027.yaml
  text: And the waters stood upon the surface of the earth for five months, one hundred and fifty days.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:34Z'
    unchanged: false
    changes_summary: Added 'for' before the duration to make the English natural and grammatically complete while preserving the source sense.
translation:
  language: es
  text: Y las aguas estuvieron sobre la superficie de la tierra durante cinco meses, ciento cincuenta días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሀሎ፡ / stood
  english_pob_choice: stood
  chosen_spanish: estuvieron
  alternatives_spanish:
  - permanecieron
  - se mantuvieron
  lexicon: Lexical equivalence for stative presence
  rationale: El geez expresa una permanencia de las aguas; en español, 'estuvieron' comunica bien ese estado continuado sin añadir matices causales. 'Permanecieron' también sería válido, pero 'estuvieron' sigue de cerca la sencillez del enunciado.
- source_word: ማያት፡ / waters
  english_pob_choice: waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - las aguas del diluvio
  - el agua
  lexicon: Lexical equivalence for מים / waters
  rationale: El plural 'las aguas' conserva el sentido colectivo del texto y evita reducirlo a una masa singular. No se explicita 'del diluvio' porque no está en la línea fuente.
- source_word: ዲበ፡ ገጸ፡ ምድር፡ / upon the surface of the earth
  english_pob_choice: upon the surface of the earth
  chosen_spanish: sobre la superficie de la tierra
  alternatives_spanish:
  - encima de la superficie de la tierra
  - sobre la faz de la tierra
  lexicon: Spatial preposition + surface expression
  rationale: '''Sobre la superficie de la tierra'' reproduce con claridad la imagen espacial del original y del inglés POB. ''La faz de la tierra'' sería idiomática, pero desplaza el léxico de ''superficie'' presente en el audit trail.'
- source_word: ኃምስተ፡ አውራኀ፡ / five months
  english_pob_choice: five months
  chosen_spanish: cinco meses
  alternatives_spanish:
  - por cinco meses
  - durante cinco meses
  lexicon: Duration expression
  rationale: El geez presenta una duración temporal; en español, el sintagma 'durante cinco meses' es natural y transparente. Se mantiene el numeral cardinal simple para fidelidad al dato.
- source_word: '*ምእተ፡ ወኃምሳ፡ ዕለተ፡ / one hundred and fifty days'
  english_pob_choice: one hundred and fifty days
  chosen_spanish: ciento cincuenta días
  alternatives_spanish:
  - 150 días
  - ciento y cincuenta días
  lexicon: Numeral phrase
  rationale: Se conserva la forma verbal completa 'ciento cincuenta días', acorde con estilo bíblico y lectura fluida. La puntuación separa las dos medidas temporales sin alterar su relación de equivalencia.
theological_decisions:
- issue: Relación entre 'cinco meses' y 'ciento cincuenta días'
  english_pob_reading: The verse states both durations without commenting on their equivalence.
  chosen_spanish_reading: El versículo conserva ambas duraciones como afirmaciones paralelas, sin glosa explicativa.
  alternative_spanish_readings:
  - Los cinco meses equivalen a ciento cincuenta días.
  - Las aguas estuvieron cinco meses, es decir, ciento cincuenta días.
  rationale: La fuente y el inglés POB simplemente yuxtaponen las dos duraciones. Añadir una ecuación explícita sería interpretativo y no está requerido por el texto breve.
  doctrine_reference: No aplica; se trata de un dato temporal narrativo.
translation_notes:
  revision_awareness: El inglés POB fue revisado para añadir 'for' antes de la duración, dejando claro que la frase temporal es de duración continua. El español adopta esa naturalidad con 'durante', sin expandir el contenido del versículo.
  spanish_consistency_notes:
  - Se mantiene 'las aguas' en plural para coherencia con el sentido colectivo del texto.
  - '''Tierra'' se conserva en sentido físico, no como ''mundo''.'
  - No se añade 'diluvio' ni otra especificación ausente del original.
