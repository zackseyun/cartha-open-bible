base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/003.yaml
  text: And the Lord saw the earth, and behold, it was ruined, and all flesh had corrupted its order, and all who were on the earth had done evil before his eyes.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:09Z'
    unchanged: false
    changes_summary: Changed 'order' to 'way' for better lexical accuracy and more natural rendering of the source term; otherwise retained the draft.
translation:
  language: es
  text: Y Yahvé vio la tierra, y he aquí que estaba arruinada, y toda carne había corrompido su orden[a], y todos los que estaban sobre la tierra habían hecho el mal delante de sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “su regla” o “su orden establecido”; aquí se retiene “orden” por la lectura del término geʿez como orden/ordenanza divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: YHWH / divine name
  rationale: La política española del proyecto pide Yahvé para el nombre divino cuando el texto fuente corresponde al nombre propio de Dios. Aunque el inglés POB usa 'the Lord', aquí se evita el ocultamiento convencional y se preserva la referencia al nombre divino.
- source_word: ምድር
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: earth/land
  rationale: '''La tierra'' reproduce de forma natural el campo semántico del geʿez y coincide con el inglés POB. ''El mundo'' sería más interpretativo y menos ajustado al sustantivo concreto.'
- source_word: ማሰነት / አማሰነት
  english_pob_choice: it was ruined
  chosen_spanish: estaba arruinada
  alternatives_spanish:
  - estaba destruida
  - estaba devastada
  lexicon: ruin/ruined
  rationale: '''Arruinada'' transmite el estado resultante de corrupción y ruina con español actual y sobrio. Evita intensificar indebidamente hacia destrucción total, que el contexto no exige.'
- source_word: ሥርዓታ
  english_pob_choice: its order
  chosen_spanish: su orden
  alternatives_spanish:
  - su regla
  - su orden establecido
  - su ordenamiento
  lexicon: order/rule/ordinance
  rationale: Se conserva 'orden' porque la revisión doctrinal señaló que el término geʿez apunta a orden/régimen/ordenanza, no a 'camino'. 'Su orden' mantiene la tensión entre orden creado y norma divina sin sobreexplicar.
- source_word: ኵሉ፡ ዘሤጋ
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todos los seres humanos
  lexicon: flesh
  rationale: '''Toda carne'' conserva la fuerza bíblica y el alcance colectivo del original. ''Humanidad'' aclararía, pero suavizaría el eco semántico de carne en el texto fuente.'
- source_word: ቅድመ፡ አዕይንቲሁ
  english_pob_choice: before his eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - a la vista de él
  lexicon: before his eyes
  rationale: '''Delante de sus ojos'' es idiomático en español y fiel a la imagen antropomórfica. Mantiene el sentido evaluativo de la expresión sin volverla abstracta.'
- source_word: ኵሉ፡ ዘሀሎ፡ ውስተ፡ ምድር
  english_pob_choice: all who were on the earth
  chosen_spanish: todos los que estaban sobre la tierra
  alternatives_spanish:
  - todos los que vivían sobre la tierra
  - todos los habitantes de la tierra
  lexicon: those on the earth
  rationale: '''Estaban sobre la tierra'' sigue de cerca la construcción espacial del original y del inglés POB. ''Vivían'' añade una inferencia no explícita en el texto.'
theological_decisions:
- issue: Nombre divino y convención de traducción
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Aunque la fuente inglesa usa una convención reverencial, el proyecto español exige Yahvé cuando el original apunta al nombre divino. Esto conserva transparencia textual y evita una sustitución litúrgica no motivada por el original.
  doctrine_reference: DOCTRINE.md §1
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail, pero corrige la oscilación inglesa entre 'order' y 'way' en favor de 'order', que fue respaldada por la revisión doctrinal y por el valor léxico señalado para el geʿez śərʿata.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la norma del proyecto para el nombre divino.
  - '''Toda carne'' preserva el registro bíblico y la ambigüedad colectiva del original.'
  - La nota sobre 'orden' conserva la tensión lexical documentada y evita desplazarla a 'camino'.
