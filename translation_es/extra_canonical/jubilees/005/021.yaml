translation:
  language: es
  text: Y le ordenó a Noé que hiciera para sí un arca, para que se salvara de las aguas del Diluvio.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአዘዞ
  english_pob_choice: And he commanded Noah
  chosen_spanish: Y le ordenó a Noé
  alternatives_spanish:
  - Y mandó a Noé
  - Y dio orden a Noé
  lexicon: ordenar / mandar
  rationale: El verbo geʽez expresa una instrucción autoritativa; en español, "ordenó" conserva bien la fuerza sin sonar excesivamente rígido. Se mantiene el objeto indirecto "le" por claridad narrativa.
- source_word: ይግበር፡ ሎቱ፡ ታቦተ፡
  english_pob_choice: to make for himself an ark
  chosen_spanish: que hiciera para sí un arca
  alternatives_spanish:
  - que se hiciera un arca
  - que construyera para sí un arca
  lexicon: hacer / arca
  rationale: El texto original usa el verbo de hacer/construir con "arca". "Hiciera para sí" refleja el matiz reflexivo/dativo de beneficio del geʽez y conserva la sencillez del paralelo inglés.
- source_word: ይድኀኖ፡
  english_pob_choice: so that he might be saved
  chosen_spanish: para que fuera salvo
  alternatives_spanish:
  - para que se salvara
  - para que pudiera ser salvado
  lexicon: salvar / ser salvo
  rationale: La forma pasiva expresa el resultado buscado por la orden divina. "Fuera salvo" mantiene el valor de finalidad y evita introducir una construcción más interpretativa que el original.
- source_word: እምነ፡ ማየ፡ አይኅ።
  english_pob_choice: from the waters of the Flood
  chosen_spanish: de las aguas del Diluvio
  alternatives_spanish:
  - de las aguas del diluvio
  - de las aguas del gran diluvio
  lexicon: agua / diluvio
  rationale: Se conserva la mayúscula en "Diluvio" por tratarse de un evento narrativo concreto y tradicionalmente reconocido, sin añadir calificativos no presentes en el fuente.
theological_decisions:
- issue: Finalidad de la construcción del arca
  english_pob_reading: so that he might be saved from the waters of the Flood
  chosen_spanish_reading: para que fuera salvo de las aguas del Diluvio
  alternative_spanish_readings:
  - para que se salvara de las aguas del Diluvio
  - a fin de ser salvo de las aguas del Diluvio
  rationale: El versículo presenta la preservación de Noé como propósito explícito de la orden. Se mantiene la pasiva verbal para respetar el énfasis en la acción salvadora que recae sobre Noé sin convertirlo en agente principal.
  doctrine_reference: Providencia y salvación divina en el relato del diluvio (Génesis 6–7; Jubileos 5:21)
- issue: Naturaleza del arca como medio de rescate
  english_pob_reading: make for himself an ark
  chosen_spanish_reading: hiciera para sí un arca
  alternative_spanish_readings:
  - se hiciera un arca
  - construyera un arca para sí
  rationale: No se añade interpretación tipológica ni eclesiológica; el texto se limita al instrumento de preservación narrativo que el mandato prescribe.
  doctrine_reference: Narrativa del diluvio y obediencia a la instrucción divina
translation_notes:
  revision_awareness: La revisión más reciente marcó el texto como sin cambios necesarios (high_agreement; unchanged=true), por lo que este borrador sigue de cerca el sentido confirmado por el audit trail inglés y el geʽez original.
  spanish_consistency_notes:
  - Se mantiene "arca" para el objeto construido por Noé, sin sustituirlo por términos más específicos como "barco" o "navío".
  - '"Diluvio" se capitaliza por consistencia editorial con la referencia narrativa específica.'
  - El estilo es formal y readable, evitando arcaísmos innecesarios pero conservando la solemnidad del relato.
