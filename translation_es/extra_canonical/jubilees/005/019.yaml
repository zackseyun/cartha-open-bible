base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/019.yaml
  text: But for all those who corrupted their ways and their plans before the Flood[5:19], no favor was shown, except to Noah alone; for favor was shown to him on behalf of his sons, whom he saved from the waters of the Flood because of him, since his heart was righteous in all his ways, according to what had been commanded concerning him, and he did not deviate from anything that had been appointed for him.
  footnotes:
  - marker: '5:19'
    text: The wording 'before the Flood' is interpretive for a difficult phrase involving 'the waters of the Flood.' The sense is that no one else received favorable regard in that generation except Noah.
    reason: lexical_alternative
  - marker: a
    text: Or 'on account of his sons'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:17Z'
    unchanged: false
    changes_summary: Replaced 'partiality' with 'favor' for more natural and contextually fitting English while preserving the sense of showing regard; otherwise left the draft unchanged.
translation:
  language: es
  text: Pero a todos los que corrompieron sus caminos y sus planes antes del Diluvio, no se les mostró favor[a], excepto a Noé solamente; pues se le mostró favor en favor de sus hijos[b], a quienes salvó de las aguas del Diluvio por causa de él, porque su corazón era justo en todos sus caminos, conforme a lo que había sido mandado respecto de él, y no se desvió de nada de lo que le había sido asignado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «no se les mostró parcialidad». El inglés POB cambió de «partiality» a «favor»; en español se prefiere «favor» por ser más natural aquí y por ajustarse al sentido de beneplácito mostrado a Noé.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por el bien de sus hijos». La idea es beneficio a favor de los hijos, no que el favor se debiera a ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: አማሰኑ ፍኖዊሆሙ ወምክርሙ
  english_pob_choice: corrupted their ways and their plans
  chosen_spanish: corrompieron sus caminos y sus planes
  alternatives_spanish:
  - pervirtieron sus caminos y sus planes
  - corrompieron su conducta y sus pensamientos
  lexicon: corromper / camino / plan
  rationale: El Ge'ez habla de corrupción de ‘caminos’ y ‘planes’; ‘caminos’ mantiene la metáfora moral de conducta, y ‘planes’ conserva el paralelo mental/volitivo sin reducirlo a una sola idea.
- source_word: ገጾሙ
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - parcialidad
  - benevolencia
  - aceptación favorable
  lexicon: favor
  rationale: Se conserva ‘favor’ porque el texto inglés revisado abandonó ‘partiality’ en favor de una expresión más natural, y el contexto aquí trata de un trato favorable o benigno, no de parcialidad en sentido técnico.
- source_word: በእንተ ውሉዱ
  english_pob_choice: on behalf of his sons
  chosen_spanish: por causa de sus hijos
  alternatives_spanish:
  - en favor de sus hijos
  - por consideración a sus hijos
  lexicon: por causa de / por el bien de
  rationale: El auditorio inglés fue corregido a ‘on behalf of his sons’; en español, ‘por causa de’ refleja bien la mediación o beneficio respecto de los hijos sin introducir una lectura causal errónea de ‘por culpa de’.
- source_word: እማየ አይኅ
  english_pob_choice: the waters of the Flood
  chosen_spanish: las aguas del Diluvio
  alternatives_spanish:
  - las aguas del Flood
  - las aguas del diluvio
  lexicon: Diluvio
  rationale: ‘Diluvio’ es la forma española natural y reverente para el evento bíblico; mantiene el sentido del agua destructora sin calcar ‘Flood’ en inglés.
- source_word: ጻድቅ ይእቲ ልቡ
  english_pob_choice: his heart was righteous
  chosen_spanish: su corazón era justo
  alternatives_spanish:
  - su corazón era recto
  - su corazón era justo y recto
  lexicon: justo / recto
  rationale: ‘Justo’ comunica la cualidad moral y judicial de צדיק/צדק en español bíblico moderno; ‘recto’ es viable, pero ‘justo’ encaja mejor con el contexto de obediencia y fidelidad.
- source_word: በኵሉ ፍኖዊሁ
  english_pob_choice: in all his ways
  chosen_spanish: en todos sus caminos
  alternatives_spanish:
  - en toda su conducta
  - en todas sus sendas
  lexicon: caminos
  rationale: Se conserva la imaginería semítica de ‘caminos’ porque el texto la usa explícitamente y porque en español bíblico es idiomática y clara.
- source_word: ኢተዐደወ እምኵሉ ዘሥሩዕ ሎቱ
  english_pob_choice: he did not deviate from anything that had been appointed for him
  chosen_spanish: no se desvió de nada de lo que le había sido asignado
  alternatives_spanish:
  - no se apartó de nada de lo que le había sido ordenado
  - no se desvió de nada de lo que se había dispuesto para él
  lexicon: desviarse / asignar
  rationale: ‘Desviarse’ reproduce bien la idea de no apartarse del camino/mandato; ‘asignado’ preserva la noción de algo dispuesto o determinado para él sin forzar una formulación excesivamente interpretativa.
theological_decisions:
- issue: ¿Cómo rendir el favor mostrado a Noé sin introducir una noción técnica ajena?
  english_pob_reading: no favor was shown, except to Noah alone; for favor was shown to him
  chosen_spanish_reading: no se les mostró favor, excepto a Noé solo; pues se le mostró favor
  alternative_spanish_readings:
  - no se mostró parcialidad, excepto para Noé solo
  - no se les mostró benevolencia, excepto a Noé solo
  rationale: El hilo del pasaje es la atención favorable de Dios a Noé frente a los demás corruptos. ‘Favor’ mantiene la relación de beneplácito/aceptación sin imponer el matiz de favoritismo o sesgo que ‘parcialidad’ puede sugerir en español.
  doctrine_reference: Divine favor / gracia especial en contraste con juicio
- issue: La relación entre la salvación de los hijos y el favor concedido a Noé
  english_pob_reading: on behalf of his sons, whom he saved ... because of him
  chosen_spanish_reading: por causa de sus hijos, a quienes salvó ... por medio de él
  alternative_spanish_readings:
  - por el bien de sus hijos
  - en favor de sus hijos
  rationale: La construcción ge'ez permite entender que el favor se extiende respecto de los hijos y que ellos fueron salvados por medio de Noé. La elección española deja visible esa mediación sin resolverla unilateralmente hacia una sola explicación causal.
  doctrine_reference: Representative mediation within narrative salvation
- issue: La justicia del corazón de Noé y su conformidad con el mandato
  english_pob_reading: since his heart was righteous in all his ways, according to what had been commanded concerning him
  chosen_spanish_reading: porque su corazón era justo en todos sus caminos, conforme a lo que había sido mandado respecto de él
  alternative_spanish_readings:
  - pues su corazón era recto en todos sus caminos, conforme a lo mandado acerca de él
  - porque su corazón era justo en todos sus caminos, según lo que se le había ordenado
  rationale: Se mantiene la conexión moral entre corazón justo, conducta íntegra y obediencia a lo mandado. ‘Respecto de él’ conserva la referencia abierta del original sin añadir un agente explícito que el texto no nombra aquí.
  doctrine_reference: Righteousness and obedience
- issue: No desviarse de lo asignado
  english_pob_reading: he did not deviate from anything that had been appointed for him
  chosen_spanish_reading: no se desvió de nada de lo que le había sido asignado
  alternative_spanish_readings:
  - no se apartó de nada de lo que le había sido ordenado
  - no se desvió de nada de lo que le había sido dispuesto
  rationale: El texto final conserva la tensión entre mandato, designio y asignación. ‘Asignado’ permite abarcar tanto lo ordenado como lo dispuesto sin cerrar el sentido en una sola categoría dogmática.
  doctrine_reference: Faithful perseverance / obedience
translation_notes:
  revision_awareness: Tomé como base la última redacción inglesa revisada, que sustituyó «partiality» por «favor», y atendí además la corrección posterior del sentido de በእንተ como «on behalf of» en relación con los hijos. Mantuve la estructura sintáctica general del inglés auditado, pero prioricé el original ge'ez para decidir entre «por causa de / en favor de» y para conservar la doble mención de caminos y planes. No introduje variantes textuales no respaldadas por el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Diluvio» se usa de modo consistente para አይኅ / Flood.
  - Se conserva la metáfora bíblica de «caminos» en lugar de reemplazarla por una abstracción moderna.
  - «Favor» se usa en sentido de beneplácito favorable, no de favoritismo humano.
  - La frase «por medio de él» deja visible la mediación narrativa sin convertirla en explicación doctrinal cerrada.
