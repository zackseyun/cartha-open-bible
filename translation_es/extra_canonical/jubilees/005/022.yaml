  text: And Noah made the ark in every respect as He commanded him, in the twenty-sixth jubilee of years, in the fifth week, in the fifth year.
  footnotes:
  - marker: a
    text: Or 'as he had been commanded'.
    reason: previous_rendering
  revision_pass:
