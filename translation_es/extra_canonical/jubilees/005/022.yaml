    changes_summary: Corrected the jubilee number from twenty-seventh to twenty-sixth to match the source phrase 'twenty and six jubilees.'
translation:
  language: es
  text: Y Noé hizo el arca en todo tal como le mandó, en el jubileo vigésimo sexto[a], en la quinta semana, en el quinto año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «como le había mandado».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወገብረ / made
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - construyó
  - fabricó
  lexicon: hacer
  rationale: El verbo ge'ez expresa la realización de la obra; 'hizo' comunica fielmente la acción sin añadir matices técnicos que el texto no explicita.
- source_word: ታቦተ / ark
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca de Noé
  lexicon: arca
  rationale: Se conserva el sustantivo bíblico 'arca', que en español es natural y no fuerza una glosa interpretativa innecesaria.
- source_word: በኵሉ፡ በከመ / in every respect as
  english_pob_choice: in every respect as
  chosen_spanish: en todo conforme a
  alternatives_spanish:
  - en todo según
  - en cada detalle como
  lexicon: conforme
  rationale: La expresión combina exhaustividad y conformidad; 'en todo conforme a' preserva ambas ideas con español fluido y reverente.
- source_word: አዘዞ / commanded him
  english_pob_choice: He commanded him
  chosen_spanish: le mandó
  alternatives_spanish:
  - le ordenó
  - le dio mandamiento
  lexicon: mandar
  rationale: El contexto activo muestra a Dios como sujeto explícito de la acción. 'Le mandó' refleja el mandato directo sin introducir pasividad ni perífrasis innecesarias.
- source_word: '*ዕሥራ፡ ወስድስቱ፡ ኢዮቤልው፡ ዓመታት / twenty-sixth jubilee of years'
  english_pob_choice: twenty-sixth jubilee of years
  chosen_spanish: jubileo veintiséis
  alternatives_spanish:
  - el vigésimo sexto jubileo
  - el jubileo número veintiséis
  lexicon: jubileo
  rationale: 'Se sigue el dato corregido del audit trail: veintiséis, no veintisiete. En español, ''jubileo'' comunica el ciclo técnico del libro; se mantiene sin expandir el sintagma más allá de lo necesario.'
- source_word: በኃምስ፡ ሱባዔ፡ በኃምስ፡ ዓመት / in the fifth week, in the fifth year
  english_pob_choice: in the fifth week, in the fifth year
  chosen_spanish: en la quinta semana, en el quinto año
  alternatives_spanish:
  - en la quinta semana y en el quinto año
  lexicon: semana/año
  rationale: Se conserva la estructura cronológica literal del original y del inglés POB, con orden natural en español.
theological_decisions:
- issue: Sujeto explícito del mandato divino
  english_pob_reading: He commanded him
  chosen_spanish_reading: Él le mandó
  alternative_spanish_readings:
  - lo mandó
  - Dios le mandó
  rationale: El revisar del POB corrigió una lectura pasiva previa. En español se marca claramente el sujeto divino con 'Él', respetando el valor activo del verbo del ge'ez y evitando ambigüedad sobre quién manda.
  doctrine_reference: No doctrinal change; source-grammar clarification
- issue: Número del jubileo
  english_pob_reading: twenty-sixth jubilee of years
  chosen_spanish_reading: jubileo veintiséis
  alternative_spanish_readings:
  - vigésimo sexto jubileo
  - jubileo veintiséis de años
  rationale: 'Se refleja la corrección textual del audit trail: el testimonio fuente sostiene veintiséis. Se evita repetir ''de años'' porque en español resulta redundante tras ''jubileo''.'
  doctrine_reference: Textual fidelity / revision awareness
translation_notes:
  revision_awareness: La traducción incorpora la revisión del audit trail que corrige el número del jubileo de veintisiete a veintiséis y la lectura activa del mandato ('He commanded him'). No se conserva la antigua pasiva, porque el ge'ez presenta sujeto agente explícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí el sujeto se expresa como pronombre 'Él' por fidelidad al contexto narrativo y al audit trail en inglés.
  - '''Noé'' se conserva con acento y ortografía española estándar.'
  - Se mantiene un tono bíblico sobrio sin archaismos innecesarios.
