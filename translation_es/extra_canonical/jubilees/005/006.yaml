  yaml_path: translation/extra_canonical/jubilees/005/006.yaml
  text: And against his angels whom he had sent to the earth he was exceedingly angry[5:6], so as to strip them of all their dominion; and he told us to bind them in the depths of the earth, and behold, they are bound within them and separated.
  footnotes:
  - marker: '5:6'
    text: The first-person plural 'he told us' reflects the revelatory frame of Jubilees, in which the angelic mediator recounts divine actions. The verse likely refers to the binding of the offending angels in the subterranean depths.
    reason: cross_reference
  - marker: a
    text: Or 'angry[5:6], to strip them'.
    reason: previous_rendering
  - marker: b
    text: Or 'in their midst'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:41Z'
    unchanged: false
    changes_summary: Changed 'uproot them from all their dominion' to 'strip them of all their dominion' for better lexical fit and natural English; simplified the final clause from 'are kept separate' to 'separated' to more closely match the source without expansion.
translation:
  language: es
  text: Y se enfureció grandemente con sus ángeles, a quienes había enviado a la tierra[a], para despojarlos de toda su autoridad; y nos dijo que los atáramos en las profundidades de la tierra, y he aquí, están atados dentro de ellas[b] y separados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con gran ira, para despojarlos».'
    reason: alternative_reading
  - marker: b
    text: 'O: «en medio de ellas».'
    reason: alternative_reading
lexical_decisions:
- source_word: ፈድፋደ / exceedingly angry
  english_pob_choice: he was exceedingly angry
  chosen_spanish: estuvo extremadamente airado
  alternatives_spanish:
  - estuvo muy enojado
  - ardió en gran ira
  lexicon: airado
  rationale: ‘Airado’ conserva el registro elevado y la intensidad del pasaje mejor que un coloquial como ‘enojado’. ‘Extremadamente’ refleja el adverbio de grado del ge’ez y mantiene la fuerza de la acusación sin añadir explicación.
- source_word: ይሠርዎሙ / strip them of all their dominion
  english_pob_choice: to strip them of all their dominion
  chosen_spanish: despojarlos de toda su autoridad
  alternatives_spanish:
  - quitarlos de todo su dominio
  - arrancarlos de todo su poder
  lexicon: despojar
  rationale: ‘Despojar’ reproduce bien la idea de privar a alguien de un ámbito de poder. ‘Autoridad’ comunica el alcance jurisdiccional de ‘dominion’ en español bíblico moderno, evitando un calco rígido de ‘dominio’ donde podría sonar más abstracto o menos natural.
- source_word: ንእስሮሙ / bind them
  english_pob_choice: bind them
  chosen_spanish: los atáramos
  alternatives_spanish:
  - los sujetáramos
  - los encadenáramos
  lexicon: atar
  rationale: ‘Atar’ es la equivalencia directa y sobria para el acto de sujetar/restringir. ‘Encadenar’ agrega una imagen no explicitada por el texto; ‘sujetar’ es posible, pero ‘atar’ mantiene mejor la concreción narrativa.
- source_word: መዓምቅቲሃ / depths of the earth
  english_pob_choice: the depths of the earth
  chosen_spanish: las profundidades de la tierra
  alternatives_spanish:
  - los abismos de la tierra
  - las honduras de la tierra
  lexicon: profundidad
  rationale: ‘Profundidades’ traduce con claridad el plural intensivo del original y conserva el matiz subterráneo. ‘Abismos’ sería más interpretativo y cargado teológicamente; ‘honduras’ es posible pero menos estándar en español actual.
- source_word: ማእከሎሙ / within them
  english_pob_choice: within them
  chosen_spanish: dentro de ellas
  alternatives_spanish:
  - en medio de ellas
  - en su interior
  lexicon: dentro
  rationale: Aunque el antecedente gramatical del sufijo puede ser ‘las profundidades’, en español ‘dentro de ellas’ evita la ambigüedad de ‘en medio de ellas’ y refleja la lectura revisada del audit trail. La forma sigue el referente locativo inanimado sin introducir una imagen social de ‘en medio’.
- source_word: ብሕትዋን / separated
  english_pob_choice: separated
  chosen_spanish: separados
  alternatives_spanish:
  - apartados
  - aislados
  lexicon: separado
  rationale: ‘Separados’ es fiel al cierre breve del texto y mantiene la terminología simple del audit trail. ‘Apartados’ o ‘aislados’ podrían sonar más explicativos y desplazar el énfasis narrativo.
theological_decisions:
- issue: Marco revelatorio en primera persona plural
  english_pob_reading: he told us
  chosen_spanish_reading: nos dijo
  alternative_spanish_readings:
  - nos mandó
  - nos ordenó
  rationale: Se conserva el marco apocalíptico de Jubileos, donde el mediador angélico relata la acción divina en primera persona plural. ‘Nos dijo’ sigue de cerca el audit trail inglés y deja abierta la relación entre decir y mandar sin imponer una explícita orden que el texto ge’ez no formula de manera inequívoca.
  doctrine_reference: Jubilees revelatory frame / mediador angélico
- issue: Condena de los ángeles rebeldes y su confinamiento subterráneo
  english_pob_reading: bind them in the depths of the earth, and behold, they are bound within them and separated
  chosen_spanish_reading: atarlos en las profundidades de la tierra… están atados dentro de ellas y separados
  alternative_spanish_readings:
  - encadenarlos en el abismo… están encerrados y apartados
  - ponerlos bajo custodia en lo profundo de la tierra…
  rationale: 'La redacción conserva el doble movimiento: mandato de confinamiento y constatación del estado actual. ‘Separados’ se mantiene sin expandir a una imagen penitenciaria más específica, respetando la sobriedad del pasaje y su referencia al castigo de seres angélicos rebeldes.'
  doctrine_reference: Angelology / judgment of rebellious angels
translation_notes:
  revision_awareness: Tomé como base la revisión más reciente del audit trail inglés, especialmente el ajuste de ‘strip them of all their dominion’ y la clausula final ‘within them and separated’. También tuve en cuenta la observación sobre la sintaxis de resultado (‘so as to strip them’), por lo que en español opté por una construcción natural con infinitivo final (‘para despojarlos de...’) sin forzar una coordinación extraña. No seguí la formulación anterior con ‘uproot them’, que el audit trail ya descartó.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como terminología por defecto solo cuando corresponde al tetragrámaton; en este versículo no aparece.
  - Se usó ‘ángeles’ y no ‘mensajeros’, porque el texto y el audit trail hablan de seres celestiales rebeldes, no de enviados humanos.
  - ‘Autoridad’ se eligió para ‘dominion’ por claridad en español bíblico, sin convertirla en una afirmación doctrinal adicional sobre soberanía política.
