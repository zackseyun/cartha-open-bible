base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/024.yaml
  text: And the Lord opened seven floodgates of heaven and the openings of the fountains of the great deep[5:24], seven openings in all, and the floodgates poured down water from heaven for forty days and forty nights.
  footnotes:
  - marker: '5:24'
    text: The phrase 'seven openings in all' (lit. 'seven mouths in number') is preserved from the Ge'ez, emphasizing the structured cosmology of the deep rather than reducing it to a generic flood description.
    reason: cultural_note
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:28Z'
    unchanged: false
    changes_summary: Removed an unnecessary comma for smoother flow; revised 'mouths' to 'openings' for more natural English while preserving the image; changed 'seven mouths in number' to 'seven openings in all' for clarity and naturalness; added 'for' before 'forty days and forty nights' for idiomatic English.
translation:
  language: es
  text: Y Yahvé abrió siete compuertas del cielo y las aberturas de las fuentes del gran abismo, siete aberturas en total[a], e hicieron caer agua desde el cielo durante cuarenta días y cuarenta noches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase 'siete aberturas en total' (lit. 'siete bocas en número') preserva el giro del ge'ez y subraya la cosmología estructurada del abismo, en lugar de reducir el pasaje a una descripción genérica del diluvio.
    reason: cultural_note
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: YHWH
  rationale: El texto ge'ez corresponde al nombre divino; siguiendo el criterio del proyecto, se vierte con el nombre explícito 'Yahvé' en vez de una máscara devocional genérica.
- source_word: መገብሕብሕተ
  english_pob_choice: floodgates
  chosen_spanish: compuertas
  alternatives_spanish:
  - portones
  - esclusas
  lexicon: gate/opening imagery
  rationale: '''Compuertas'' comunica bien la imagen de aberturas que dejan pasar agua y conserva el sentido de dispositivo hidráulico sin exagerar el término.'
- source_word: አፈወ
  english_pob_choice: openings
  chosen_spanish: aberturas
  alternatives_spanish:
  - bocas
  - aperturas
  lexicon: opening
  rationale: La revisión inglesa prefirió 'openings' para suavizar la literalidad de 'mouths'. En español, 'aberturas' preserva la imagen espacial y evita una metáfora demasiado áspera en el cuerpo principal.
- source_word: ቀላይ ዐቢይ
  english_pob_choice: the great deep
  chosen_spanish: el gran abismo
  alternatives_spanish:
  - la gran profundidad
  - el abismo profundo
  lexicon: deep/abyss
  rationale: '''Gran abismo'' refleja el lenguaje bíblico tradicional para el océano primigenio/subterráneo y mantiene la densidad cosmológica del original.'
- source_word: ፵መዋዕለ ወ፵ሌልየ
  english_pob_choice: forty days and forty nights
  chosen_spanish: cuarenta días y cuarenta noches
  lexicon: forty days and forty nights
  rationale: Se conserva la fórmula temporal exacta, ya plenamente natural en español bíblico.
theological_decisions:
- issue: El nombre divino en una narración de juicio/cosmos
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: No se usa una sustitución reverencial porque el proyecto pide transparencia respecto al nombre divino cuando el testimonio original lo sostiene.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: La cosmología del diluvio y las 'aberturas' del abismo
  english_pob_reading: seven openings in all
  chosen_spanish_reading: siete aberturas en total
  alternative_spanish_readings:
  - siete bocas en total
  - siete aperturas en total
  rationale: Se preserva la estructura numérica y la imagen de un cosmos ordenado con aberturas reales, evitando reducir el pasaje a una simple descripción meteorológica.
  doctrine_reference: Cosmología bíblica del diluvio
translation_notes:
  revision_awareness: 'La revisión inglesa reciente cambió ''mouths'' por ''openings'' para mayor naturalidad, pero mantuvo la nota sobre la expresión literal ge''ez. La versión española sigue esa decisión: usa ''aberturas'' en el texto principal y conserva en nota el valor imagístico del original. También se mantuvo ''for forty days and forty nights'' como duración idiomática en español.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - Se evita 'SEÑOR' como máscara, salvo que el contexto exija otra decisión auditada.
  - '''Gran abismo'' y ''aberturas'' conservan la cosmología estructurada del pasaje.'
  - La sintaxis española busca fluidez sin perder la acumulación de imágenes del original.
