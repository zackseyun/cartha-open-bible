translation:
  language: es
  text: Y las aguas subieron sobre la tierra hasta quince codos; las aguas subieron por encima de todos los montes altos, y el arca fue levantada de la tierra y flotó sobre la superficie de las aguas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወልህቀ፡ ማያት፡ ዲበ፡ ምድር፡ *ዐሠርት፡ ወኃምስተ፡ በእመት፡
  english_pob_choice: the waters rose upon the earth fifteen cubits
  chosen_spanish: las aguas subieron sobre la tierra quince codos
  alternatives_spanish:
  - las aguas se elevaron sobre la tierra quince codos
  - las aguas crecieron sobre la tierra quince codos
  lexicon: māyāt -> aguas; ʿaśärt wəḫāmstə -> quince; bəʾmət -> codos; ʿalä -> sobre/encima de
  rationale: El geʽez presenta literalmente que las aguas ‘subieron’ sobre la tierra con una medida de quince codos. ‘Subieron’ conserva el movimiento vertical sin sonar forzado en español; ‘codos’ mantiene la unidad de medida tradicional y precisa.
- source_word: ተለዐለ፡ ማያት፡ ዲበ፡ ኵሉ፡ ደብር፡ ነዋኅ፡
  english_pob_choice: the waters rose high above all the high mountains
  chosen_spanish: las aguas subieron por encima de todos los montes altos
  alternatives_spanish:
  - las aguas se alzaron por encima de todos los montes altos
  - las aguas quedaron por encima de todos los montes altos
  lexicon: tälʿälä -> subieron/se alzaron; dēbr -> montes/montañas; nəwaḥ -> altos
  rationale: ‘Montes altos’ reproduce la duplicación de altura del original y del inglés POB (‘high mountains’). ‘Por encima de’ expresa la relación espacial con claridad y evita ambigüedad.
- source_word: ወተለዐለት፡ ታቦት፡ እምዲበ፡ ምድር፡
  english_pob_choice: and the ark was lifted up from the earth
  chosen_spanish: y el arca fue levantada de la tierra
  alternatives_spanish:
  - y el arca se levantó de la tierra
  - y el arca fue alzada de la tierra
  lexicon: tābōt -> arca; tälʿälä -> fue levantada/alzada; ʾəm-dībä -> de encima/de
  rationale: ‘Fue levantada’ conserva la pasiva del original y del inglés POB, destacando que el arca recibe la acción. ‘De la tierra’ corresponde de forma natural al desplazamiento desde la superficie terrestre.
- source_word: ወተንሰፈ፡ ዲበ፡ ገጸ፡ ማያት።
  english_pob_choice: and floated on the surface of the waters
  chosen_spanish: y flotó sobre la superficie de las aguas.
  alternatives_spanish:
  - y se mantuvo sobre la superficie de las aguas
  - y navegó sobre la superficie de las aguas
  lexicon: tänsäfä -> flotó/extendió-se sobre; gäṣä māyāt -> superficie de las aguas
  rationale: ‘Flotó’ es la equivalencia española más directa y clara para la imagen de mantenerse sobre el agua. ‘Superficie de las aguas’ conserva la formulación concreta del original y del inglés POB.
theological_decisions:
- issue: Descripción del diluvio y del arca sin interpretaciones adicionales
  english_pob_reading: A literal narrative of rising waters and the ark's floating
  chosen_spanish_reading: Una narración literal de aguas que suben y un arca que flota
  alternative_spanish_readings:
  - Una lectura más interpretativa del juicio del diluvio
  - Una formulación teológica explícita sobre preservación providencial
  rationale: El texto es narrativo y descriptivo; no añade comentario doctrinal. La traducción española debe preservar esa sobriedad y no introducir explicaciones que el versículo no expresa.
  doctrine_reference: Génesis 7:17-20; Jubileos 5:26
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios (high_agreement; agreement 1.0), así que el borrador español sigue de cerca esa lectura estable sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita divina directa.
  - ‘Arca’ se conserva como término técnico narrativo bíblico.
  - ‘Codos’ se usa para la medida antigua de longitud, coherente con el valor del original y con el inglés auditado.
