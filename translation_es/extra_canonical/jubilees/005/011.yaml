base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/005/011.yaml
  text: And he destroyed all from their places, and not one of them remained whom he had not judged according to all their wickedness.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:40Z'
    unchanged: false
    changes_summary: Changed 'did not judge' to 'had not judged' for smoother, more natural English sequence while preserving the source sense.
translation:
  language: es
  text: Y destruyó a todos en sus lugares, y no quedó ninguno de ellos a quien no hubiera juzgado según toda su maldad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወደምሰሰ
  english_pob_choice: And he destroyed all from their places
  chosen_spanish: Y destruyó a todos de sus lugares
  alternatives_spanish:
  - Y los destruyó a todos desde sus lugares
  - Y destruyó a todos de sus sitios
  lexicon: destruir
  rationale: El ge’ez expresa una acción total de destrucción o arrasamiento; «destruyó» conserva la fuerza completa sin introducir matices no presentes. «De sus lugares» sigue el sentido locativo del original y del inglés POB, sin forzar una lectura de expulsión que el verso no especifica.
- source_word: ኵሉ
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - todo
  - a todos ellos
  lexicon: todo / todos
  rationale: El término totalizador exige plural personal en español por el contexto de seres juzgados y destruidos. «A todos» mantiene naturalidad y el alcance exhaustivo del texto.
- source_word: ኢ*ተርፈ
  english_pob_choice: not one of them remained
  chosen_spanish: no quedó ninguno de ellos
  alternatives_spanish:
  - no permaneció uno de ellos
  - no se salvó ninguno de ellos
  lexicon: quedar / permanecer
  rationale: El ge’ez indica que ninguno quedó remanente. «No quedó ninguno de ellos» es idiomático en español y preserva la ausencia total de sobrevivientes/remanentes sin añadir la idea de salvación.
- source_word: አሐዱ
  english_pob_choice: one
  chosen_spanish: ninguno
  alternatives_spanish:
  - uno
  - ni uno
  lexicon: ninguno
  rationale: Aunque el original usa «uno», el sentido en español debe expresar la negación total ya construida por la frase. «Ninguno» transmite con claridad que no quedó ni una sola persona.
- source_word: እምኔሆሙ
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de entre ellos
  - entre ellos
  lexicon: de ellos
  rationale: Se conserva la referencia pronominal directa del original. No hace falta una perífrasis más explicativa, porque el contexto ya determina el grupo.
- source_word: ዘአኰነነ
  english_pob_choice: whom he had not judged
  chosen_spanish: a quien no hubiera juzgado
  alternatives_spanish:
  - a quien no había juzgado
  - que no hubiera juzgado
  lexicon: juzgar
  rationale: La forma relativa con valor anterior encaja bien en español con el pluscuamperfecto de subjuntivo en una subordinada relativa negativa. «Juzgado» preserva el acto judicial del original y del inglés POB, sin reemplazarlo por «condenado», que sería más interpretativo.
- source_word: በኵሉ፡ እኪዮሙ
  english_pob_choice: according to all their wickedness
  chosen_spanish: según toda su maldad
  alternatives_spanish:
  - conforme a toda su maldad
  - de acuerdo con toda su maldad
  lexicon: según / maldad
  rationale: «Según» refleja adecuadamente la medida o criterio del juicio. «Maldad» traduce el término moral global del original y mantiene la fuerza ética del inglés POB «wickedness» sin suavizarla.
theological_decisions:
- issue: Naturaleza del juicio divino sobre el grupo mencionado
  english_pob_reading: he had not judged according to all their wickedness
  chosen_spanish_reading: a quien no hubiera juzgado según toda su maldad
  alternative_spanish_readings:
  - a quien no había juzgado según toda su maldad
  - a quien no condenara según toda su maldad
  rationale: El verso presenta un acto judicial divino previo a la destrucción. Mantener «juzgado» conserva la tensión entre juicio y destrucción sin convertir el veredicto en una simple condena explícita que el texto no formula de ese modo.
  doctrine_reference: Juicio divino; retribución moral
- issue: Alcance total de la destrucción
  english_pob_reading: And he destroyed all from their places, and not one of them remained
  chosen_spanish_reading: Y destruyó a todos de sus lugares, y no quedó ninguno de ellos
  alternative_spanish_readings:
  - Y los destruyó a todos desde sus lugares, y no quedó uno de ellos
  - Y destruyó a todos de sus lugares, y no permaneció ninguno de ellos
  rationale: La formulación conserva el alcance absoluto del enunciado sin añadir detalles como exilio, dispersión o eliminación física específica más allá de lo que el texto afirma.
  doctrine_reference: Juicio total; remanente inexistente
translation_notes:
  revision_awareness: La redacción inglesa reciente cambió de «did not judge» a «had not judged» para reflejar una secuencia más natural; la versión española sigue esa relación temporal con «no hubiera juzgado», que mantiene la anterioridad relativa sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usó «juzgar» en sentido judicial, coherente con el valor del original y con la audit trail inglesa.
  - Se evitó «condenar» para no cerrar la tensión entre juicio y sentencia que el texto no explicita.
  - La estructura negativa total «no quedó ninguno de ellos» refleja mejor el absoluto del original que una versión con solo «uno» en español.
