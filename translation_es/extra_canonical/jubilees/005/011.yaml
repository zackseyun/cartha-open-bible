    issue: 'Expresión poco natural: «Y destruyó a todos de sus lugares»'
    rationale: Aunque intenta conservar el locativo del original/inglés, en español suena calcado y ambiguo. «Y destruyó a todos en sus lugares» comunica mejor que la destrucción los alcanzó donde estaban, sin introducir expulsión u otro matiz.
  revised_spanish_text: Y destruyó a todos en sus lugares, y no quedó ninguno de ellos a quien no hubiera juzgado según toda su maldad.
  revision_rationale: Se reemplaza «de sus lugares» por «en sus lugares» para dar un español natural y claro, manteniendo el sentido locativo de la fuente y del inglés POB. No se requieren notas adicionales.
