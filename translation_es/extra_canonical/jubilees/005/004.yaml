translation:
  language: es
  text: 'Y dijo: «Destruiré al hombre y a toda carne sobre la faz de la tierra, a quien creé».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El inglés POB tenía una nota «Or 'from upon'», pero la revisión textual del Ge'ez confirma aquí solo «upon»; por eso no se introduce «de / desde sobre» en español.
    reason: textual_variant
lexical_decisions:
- source_word: ወይቤ / And he said
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: אמר / λέγω
  rationale: El sujeto está implícito en el contexto y el español fluye naturalmente con «Y dijo». Se conserva el encadenamiento narrativo sin añadir material innecesario.
- source_word: አይመሰለ / I will destroy
  english_pob_choice: I will destroy
  chosen_spanish: Destruiré
  alternatives_spanish:
  - Arrasaré
  - Haré perecer
  lexicon: אבד / ἀπόλλυμι
  rationale: El verbo expresa destrucción total. «Destruiré» comunica con claridad el valor fuerte del original y coincide con el tono del pasaje, sin suavizarlo a una pérdida parcial.
- source_word: ለሰብእ / man
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - al ser humano
  - a la humanidad
  lexicon: אדם
  rationale: El singular colectivo «el hombre» refleja el sustantivo genérico del original. En español, con complemento directo marcado por «al», mantiene el valor humano colectivo sin volverlo abstracto.
- source_word: ወለኵሉ ዘሥጋ / and all flesh
  english_pob_choice: and all flesh
  chosen_spanish: y a toda carne
  alternatives_spanish:
  - y a toda criatura
  - y a todo ser viviente
  lexicon: בשר / σάρξ
  rationale: Se conserva «carne» por la fuerza semántica de σάρξ / בשר y por la tradición bíblica del término, sin sustituirlo por una generalización como «criatura».
- source_word: በመልዕልተ ገጸ ምድር / upon the face of the earth
  english_pob_choice: upon the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie de la tierra
  - en la faz de la tierra
  lexicon: πρόσωπον τῆς γῆς / פני הארץ
  rationale: «Faz» reproduce el valor idiomático de «face» en un registro bíblico natural en español. «Sobre» corresponde al Ge'ez aquí, y evita la lectura revisada «from upon» descartada por la revisión textual.
- source_word: ዘፈጠርኩ / which I created
  english_pob_choice: which I created
  chosen_spanish: a quien creé
  alternatives_spanish:
  - que creé
  - el cual creé
  lexicon: ברא
  rationale: Aunque el antecedente puede leerse colectivamente, en español «a quien creé» mantiene la relación con «al hombre» y permite abarcar también el colectivo humano. No se añade una explicitación más amplia que el texto no exige.
theological_decisions:
- issue: Alcance de «destruiré» respecto del juicio divino
  english_pob_reading: I will destroy man and all flesh upon the face of the earth, which I created.
  chosen_spanish_reading: Destruiré al hombre y a toda carne sobre la faz de la tierra, a quien creé.
  alternative_spanish_readings:
  - Arrasaré al hombre y a toda carne sobre la faz de la tierra, a quien creé.
  - Haré perecer al hombre y a toda carne sobre la faz de la tierra, a quien creé.
  rationale: El verbo mantiene el juicio total anunciado en el original sin introducir una interpretación adicional. «Destruiré» es suficientemente fuerte y fiel al alcance universal del enunciado.
  doctrine_reference: Juicio divino y destrucción total en el contexto del diluvio (Jubileos 5:4).
- issue: Relación entre «man» y «all flesh»
  english_pob_reading: man and all flesh
  chosen_spanish_reading: al hombre y a toda carne
  alternative_spanish_readings:
  - al ser humano y a toda carne
  - a la humanidad y a toda carne
  rationale: Se conserva la duplicación del original sin fusionar ambos términos. Esto preserva la tensión retórica entre la humanidad y la totalidad de la vida corpórea.
  doctrine_reference: Antropología bíblica y lenguaje de juicio universal.
translation_notes:
  revision_awareness: La revisión más reciente del audit trail corrige 'from upon' a 'upon' por el Ge'ez `በመልዕልተ`; el español sigue esa corrección y no conserva la variante descartada. También se ajusta el futuro a una forma natural en español («Destruiré»), equivalente al 'will' revisado del inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, pero aquí el versículo solo presenta una fórmula narrativa sin el nombre.
  - Se conserva «carne» para σάρξ / בשר, en coherencia con el léxico bíblico del proyecto.
  - Se evita introducir «SEÑOR» o una paráfrasis interpretativa que no está en la fuente.
