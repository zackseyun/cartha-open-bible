  yaml_path: translation/extra_canonical/jubilees/005/008.yaml
  text: And he said, “My spirit shall not abide upon man forever, for they too are flesh; and their days shall be one hundred and twenty years.”
  footnotes:
  - marker: a
    text: Or 'in man'.
    reason: previous_rendering
  - marker: b
    text: Or 'they are flesh'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:40Z'
    unchanged: false
    changes_summary: Changed 'upon man' to 'in man' for more natural and likely more accurate sense, and removed 'too' as an unnecessary addition not explicit in the source.
translation:
  language: es
  text: 'Y dijo: «Mi espíritu no permanecerá sobre el ser humano[a] para siempre, porque también ellos[b] son carne; y sus días serán de ciento veinte años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre el hombre».
    reason: lexical_alternative
  - marker: b
    text: El Ge'ez añade un matiz de «también» o «ellos también».
    reason: source_note
lexical_decisions:
- source_word: መንፈስየ
  english_pob_choice: My spirit
  chosen_spanish: Mi espíritu
  alternatives_spanish:
  - Mi aliento
  - Mi soplo
  lexicon: רוּחַ / πνεῦμα
  rationale: El Ge'ez expresa el posesivo de primera persona sobre 'espíritu'; en español, 'mi espíritu' reproduce con naturalidad la referencia personal. 'Aliento' o 'soplo' serían posibles por el campo semántico, pero aquí el contexto de juicio y permanencia favorece 'espíritu'.
- source_word: ዲበ፡ ሰብእ
  english_pob_choice: upon man
  chosen_spanish: sobre el ser humano
  alternatives_spanish:
  - sobre el hombre
  - en el ser humano
  lexicon: preposición + אדם / ἄνθρωπος
  rationale: El audit trail corrigió una harmonización a 'in man' y confirmó 'upon man'. En español, 'sobre el ser humano' conserva la dirección de 'sobre' sin sonar forzado; 'el hombre' sería más literal pero puede sonar genérico masculino, y 'en el ser humano' no respeta la preposición del Ge'ez.
- source_word: ሥጋ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - cuerpo
  lexicon: σάρξ
  rationale: La equivalencia directa y auditada es 'flesh' = 'carne'. 'Naturaleza humana' suaviza demasiado la tensión antropológica del texto y 'cuerpo' cambia el alcance semántico.
- source_word: ምእት፡ ወዕሥራ፡ ዓመት
  english_pob_choice: one hundred and twenty years
  chosen_spanish: ciento veinte años
  alternatives_spanish:
  - 120 años
  - ciento veinte años
  lexicon: número + tiempo
  rationale: Se mantiene la cifra verbalizada por claridad litúrgica y lectura pública. La forma coincide con el contenido fuente sin añadir interpretación.
theological_decisions:
- issue: Duración de la permanencia del espíritu y la relación con la condición carnal humana
  english_pob_reading: My spirit shall not abide in man forever, for they are flesh
  chosen_spanish_reading: Mi espíritu no permanecerá sobre el ser humano para siempre, porque ellos también son carne
  alternative_spanish_readings:
  - Mi espíritu no permanecerá en el ser humano para siempre, porque son carne
  - Mi espíritu no permanecerá entre los hombres para siempre, porque son carne
  rationale: Se preserva la lectura del Ge'ez con 'sobre' y el énfasis de 'también' que el enclítico confirma. No se armoniza con el texto bíblico más conocido de Génesis, porque aquí el audit trail documenta una formulación distinta en Jubileos.
  doctrine_reference: Jubileos 5:8; cf. Génesis 6:3 como paralelo temático, no como sustituto textual
translation_notes:
  revision_awareness: 'El registro inglés pasó por una corrección importante: se revirtió la armonización de ''in man'' a ''upon man'' y se restauró el matiz de ''too''/''also''. La versión española sigue esa lectura corregida y evita la forma harmonizada con Génesis, manteniendo la preposición y el énfasis documentados en el Ge''ez.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma principal del nombre divino cuando aparezca, pero en este versículo el sujeto es 'mi espíritu', por lo que no corresponde aplicarlo.
  - Se emplea 'carne' para σάρξ/ሥጋ siguiendo el sentido lexicográfico auditado.
  - Se evita 'siempre' como absoluto descontextualizado; 'para siempre' refleja el adverbio de duración sin intensificarlo.
  - La puntuación busca una lectura pública clara y conserva el paralelismo del verso.
