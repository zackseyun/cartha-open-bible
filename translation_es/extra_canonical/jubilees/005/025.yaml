translation:
  language: es
  text: Y los manantiales del abismo también hicieron subir aguas, hasta que todo el mundo quedó lleno de agua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአንቅዐተ፡ ቀላይሂ፡
  english_pob_choice: the fountains of the deep
  chosen_spanish: los manantiales del abismo
  alternatives_spanish:
  - las fuentes del abismo
  - los manantiales de lo profundo
  lexicon: Ge'ez ቀላይ / “deep, abyss, the deep waters”
  rationale: El ge'ez nombra las aguas profundas/abismales; en español, “abismo” comunica mejor la profundidad caótica que “lo profundo” y mantiene el contraste cosmológico del pasaje. “Manantiales” conserva la imagen de brotes o surgimientos de agua.
- source_word: ያዐርጉ፡ ማያተ፡
  english_pob_choice: sent up waters
  chosen_spanish: hicieron subir aguas
  alternatives_spanish:
  - levantaron aguas
  - subieron aguas
  lexicon: Ge'ez ዐረገ / causative sense “hacer subir, elevar”
  rationale: La forma causativa pide una expresión activa; “hicieron subir” sigue de cerca la fuerza verbal sin sonar forzada en español. “Aguas” mantiene el plural del original y del inglés POB.
- source_word: ኵሉ፡ ዓለም፡
  english_pob_choice: the whole world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - toda la tierra
  - el mundo entero
  lexicon: Ge'ez ዓለም / world, age, inhabited world
  rationale: “Todo el mundo” reproduce con naturalidad la amplitud total del referente y conserva la equivalencia funcional del inglés. “Toda la tierra” sería posible, pero el ge'ez y el inglés POB usan una amplitud de “mundo” más que una localización meramente terrestre.
theological_decisions:
- issue: Alcance total de la inundación
  english_pob_reading: the whole world was full of water
  chosen_spanish_reading: todo el mundo quedó lleno de agua
  alternative_spanish_readings:
  - toda la tierra quedó llena de agua
  - el mundo entero se llenó de agua
  rationale: El texto subraya la totalidad del juicio mediante la inundación. Mantengo “todo el mundo” para conservar esa amplitud sin introducir una restricción geográfica que el pasaje no expresa.
  doctrine_reference: Narrativa del Diluvio en Jubileos; juicio universal por agua
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se documentaron cambios editoriales ni tensiones textuales adicionales en el pasaje, y el hebraísmo/ge''ez se refleja de forma estable en español.'
  spanish_consistency_notes:
  - Se mantiene “mundo” en coherencia con la amplitud del inglés POB y del ge'ez.
  - Se evita “SEÑOR” u otra convención de ocultamiento porque el versículo no contiene el Tetragrámaton.
  - No se introduce “Cristo/Mesías” ni terminología doctrinal ajena al texto.
