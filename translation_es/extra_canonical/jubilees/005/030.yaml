translation:
  language: es
  text: Y en la luna nueva del décimo mes aparecieron las cumbres de los montes, y en la luna nueva del primer mes apareció la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በሠርቀ፡ ወርኀ፡ ዓሥር፡
  english_pob_choice: on the new moon of the tenth month
  chosen_spanish: en la luna nueva del décimo mes
  alternatives_spanish:
  - en la novilunio del décimo mes
  - en el primer día del décimo mes lunar
  lexicon: moon/new moon; month; ordinal
  rationale: La expresión ge'ez indica una referencia calendárica a la luna nueva del mes décimo. "Luna nueva" conserva el valor de señal temporal que usa la POB en inglés y suena natural en español bíblico sin ocultar la imagen astronómica.
- source_word: አርእስተ፡ አድባር፡
  english_pob_choice: the tops of the mountains
  chosen_spanish: las cumbres de los montes
  alternatives_spanish:
  - las cimas de los montes
  - las partes altas de los montes
  lexicon: head/tops; mountains
  rationale: '"Cumbres" transmite bien la idea de las partes superiores visibles. Se eligió "montes" para mantener un registro bíblico natural en español, como equivalente estilístico de "mountains".'
- source_word: በሠርቀ፡ ለ*ወርኀ፡ ቀዳማይ፡
  english_pob_choice: on the new moon of the first month
  chosen_spanish: en la luna nueva del primer mes
  alternatives_spanish:
  - en la novilunio del primer mes
  - en el primer día del primer mes lunar
  lexicon: moon/new moon; first month
  rationale: Se conserva la misma construcción que en la primera mitad para mantener la correspondencia temporal del original y la lectura auditada de la POB inglesa.
- source_word: አስተርአየት፡ ምድር፡
  english_pob_choice: the earth appeared
  chosen_spanish: apareció la tierra
  alternatives_spanish:
  - se mostró la tierra
  - la tierra quedó visible
  lexicon: appear/show; earth/land
  rationale: '"Apareció" reproduce el valor de manifestación visible del verbo sin añadir interpretaciones. "Tierra" mantiene la ambigüedad bíblica posible entre la tierra emergida y la tierra en sentido general, tal como en el inglés POB.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés POB permanece confirmado con alta concordancia, así que la traducción española sigue de cerca su segmentación y decisiones léxicas sin necesidad de variantes textuales.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo sintáctico de dos miembros unidos por "y" para reflejar el hebraísmo/estilo narrativo del original.
  - Se prefirió "luna nueva" como equivalente estable de la marca temporal astronómico-calendárica, coherente con una traducción bíblica legible en español.
  - No se introdujeron notas doctrinales porque el pasaje es puramente narrativo y el paquete fuente no presenta tensión teológica relevante.
