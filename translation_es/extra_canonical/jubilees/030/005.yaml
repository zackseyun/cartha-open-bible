review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien el sentido general del testimonio fuente y del rastro POB en inglés: una prohibición normativa futura, la contaminación de una hija de Israel y un decreto celestial de destrucción contra los hombres de Siquem. Sin embargo, «para contaminar» suena más final que infinitivo complementario y menos idiomático tras «no debe hacerse»; además, el punto y coma no refleja tan bien la continuidad argumental del original/inglés como una coma.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad bíblica española. «No debe hacerse desde ahora, contaminar…» fluye mejor como construcción impersonal normativa. «Contaminar» es posible, pero «profanar» comunica con más precisión la deshonra/impureza sexual y moral en registro bíblico sin sonar técnico. La nota sobre Siquem no es necesaria, porque no resuelve una ambigüedad real creada por el español.
  glossary_alignment: 'No hay conflicto con la terminología marco del proyecto. «Hija de Israel», «cielo», «decretado» y «espada» están bien alineados. El ajuste principal es estilístico-lexical: preferir «profanar» sobre «contaminar» en este contexto por mayor adecuación semántica y eclesial.'
  issues:
  - severity: medium
    issue: 'Construcción poco natural: «no debe hacerse desde ahora, para contaminar…»'
    rationale: 'Tras una formulación impersonal normativa, el infinitivo final con «para» suena algo forzado en español. La simple aposición infinitiva («…hacerse desde ahora: profanar…» / «…hacerse desde ahora el profanar…») o la versión sin «para» refleja mejor la prohibición general.'
  - severity: medium
    issue: «Contaminar» debilita o desplaza el matiz de impureza/deshonra sexual
    rationale: En este contexto de deshonra de Dina y de una hija de Israel, «profanar» expresa mejor el ultraje y la violación de santidad/comunidad que el más amplio «contaminar».
  - severity: low
    issue: Nota al pie innecesaria sobre «Siquem»
    rationale: La forma española del topónimo es estándar y no requiere explicación; la nota tampoco aporta una alternativa textual ni una aclaración exegética indispensable.
  revised_spanish_text: 'Y así no debe hacerse desde ahora: profanar a una hija de Israel, pues en el cielo se ha decretado contra ellos que todos los hombres de Siquem sean destruidos por la espada.'
  revision_rationale: 'Se mejora la naturalidad y precisión semántica del español manteniendo intacto el sentido fuente y el análisis POB: la acción prohibida se formula de manera más idiomática y «profanar» refleja mejor la impureza/deshonra moral-sexual del contexto. También se elimina una nota innecesaria.'
