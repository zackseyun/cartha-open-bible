    changes_summary: Changed 'should be destroyed' to 'be destroyed' for a more formal rendering of the ordained result; otherwise retained the draft.
translation:
  language: es
  text: Y así no debe hacerse desde ahora, para contaminar a una hija de Israel; pues en el cielo se ha decretado contra ellos que todos los hombres de Siquem[a] sean destruidos por la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Siquem» sigue la forma española habitual del topónimo bíblico; el texto alude a los varones de la ciudad.
    reason: cultural_note
lexical_decisions:
- source_word: ዲናሃ፡ እኅቶሙ
  english_pob_choice: a daughter of Israel
  chosen_spanish: una hija de Israel
  alternatives_spanish:
  - la hija de Israel
  - una muchacha de Israel
  lexicon: Hebreo/etiópico de parentesco e identidad colectiva
  rationale: Conservo la expresión de pertenencia colectiva del inglés POB y la hago natural en español. «Hija de Israel» mantiene el vínculo étnico/covenantal y evita suavizarlo en una paráfrasis genérica.
- source_word: አይትገበር
  english_pob_choice: must not be done
  chosen_spanish: no debe hacerse
  alternatives_spanish:
  - no se debe hacer
  - no ha de hacerse
  lexicon: negación de obligación/prescripción
  rationale: «No debe hacerse» reproduce bien la fuerza normativa del pasaje sin forzar un calco. Conserva el tono de prohibición general del texto.
- source_word: ለአርኵሶ
  english_pob_choice: to defile
  chosen_spanish: para contaminar
  alternatives_spanish:
  - para profanar
  - para defile
  - para manchar
  lexicon: impureza moral/sexual
  rationale: «Contaminar» comunica la idea de profanación/impureza en español moderno. «Profanar» sería posible, pero aquí «contaminar» conserva mejor el efecto de corrupción sobre la hija de Israel.
- source_word: በሰማይ፡ ተሠርዐ
  english_pob_choice: in heaven it has been ordained
  chosen_spanish: en el cielo se ha decretado
  alternatives_spanish:
  - en el cielo ha sido ordenado
  - en el cielo se ha dispuesto
  lexicon: decretar/ordenar divinamente
  rationale: El perfecto pasivo expresa una decisión ya fijada. «Se ha decretado» conserva la solemnidad jurídica y el carácter de resolución celestial.
- source_word: ያጥፍእዎሙ፡ በሰይፍ
  english_pob_choice: be destroyed by the sword
  chosen_spanish: sean destruidos por la espada
  alternatives_spanish:
  - sean exterminados por la espada
  - sean matados a espada
  lexicon: destrucción violenta mediante arma
  rationale: «Sean destruidos por la espada» sigue muy de cerca el sentido del inglés POB y mantiene la gravedad del juicio. «Exterminados» es más fuerte, pero menos literal.
- source_word: ለኵሎሙ ዐደወ ሴቄማ
  english_pob_choice: all the men of Shechem
  chosen_spanish: todos los hombres de Siquem
  alternatives_spanish:
  - todos los varones de Siquem
  - todos los hombres de Sikem
  lexicon: topónimo y colectivo masculino
  rationale: «Siquem» es la forma española estable y reconocible del topónimo bíblico. «Hombres» conserva el colectivo masculino explícito del original y del inglés POB.
theological_decisions:
- issue: Carácter retributivo y decretado del juicio contra Siquem
  english_pob_reading: for in heaven it has been ordained against them that all the men of Shechem be destroyed by the sword
  chosen_spanish_reading: pues en el cielo se ha decretado contra ellos que todos los hombres de Siquem sean destruidos por la espada
  alternative_spanish_readings:
  - pues en el cielo ha sido ordenado contra ellos que todos los hombres de Siquem sean destruidos por la espada
  - pues en el cielo se ha dispuesto contra ellos que todos los hombres de Siquem sean destruidos por la espada
  rationale: Mantengo la idea de un decreto celestial previo y específico, sin suavizarlo a una mera previsión. La forma escogida preserva la tensión teológica entre orden divino y juicio histórico tal como la refleja el inglés POB.
  doctrine_reference: Providencia y juicio divino en literatura del Segundo Templo
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «be destroyed» frente a una forma modal más débil. El español adopta una pasiva/impersonal de valor resultativo («sean destruidos») para reflejar ese matiz formal y decretado.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aparece y no se introduce.
  - «Siquem» se mantiene sin transliteración alternativa para coherencia con el uso bíblico español estándar.
  - No se añade puntuación interpretativa adicional más allá de lo exigido por el español moderno.
