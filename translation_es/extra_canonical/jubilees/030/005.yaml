base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/005.yaml
  text: And thus it must not be done from now on, to defile a daughter of Israel, for in heaven it has been ordained against them that all the men of Shechem be destroyed by the sword,
  revision_pass:
    model: gpt-5.4
