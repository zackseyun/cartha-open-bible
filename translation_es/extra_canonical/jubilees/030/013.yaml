  rationale: La puntuación refleja el cambio de voz reconocido en el audit trail y ayuda a distinguir la cita directa del comentario interpretativo, sin alterar el contenido.
  doctrine_reference: Genesis 34:14 parallel; narrative speaker distinction
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión que eliminó comillas, pero el análisis posterior recomendó restaurarlas para clarificar el cambio de hablante. La redacción española adopta esa claridad sin añadir contenido extra.
  spanish_consistency_notes:
  - Se usó «prepucio» para la referencia anatómica concreta, en lugar de un equivalente más abstracto.
  - Se conservó «Israel» y «naciones» de manera literal para mantener la estructura del juicio en el texto fuente.
  - No se añadió nota al pie porque no hay una alternativa textual o léxica que requiera marcador anclado en esta breve unidad.
