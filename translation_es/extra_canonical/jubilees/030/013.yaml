lexical_decisions:
- source_word: ቍልፈተ
  english_pob_choice: foreskin
  chosen_spanish: prepucio
  alternatives_spanish:
  - foreskin
  - incircuncisión
  lexicon: 'lexical_field: male genital circumcision mark'
  rationale: En español, «prepucio» es el equivalente directo y más preciso de la referencia anatómica; evita la abstracción de «incircuncisión», que en este contexto perdería el rasgo concreto del texto fuente.
- source_word: ጽእለት
  english_pob_choice: reproach
  chosen_spanish: afrenta
  alternatives_spanish:
  - oprobio
  - reproche
  - vergüenza
  lexicon: 'lexical_field: shame/disgrace'
  rationale: «Afrenta» comunica bien el valor de deshonra pública y social del término, con un tono natural en español bíblico contemporáneo; conserva la fuerza negativa sin sonar artificioso.
- source_word: ርኵስ
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - no limpio
  - ritualmente impuro
  lexicon: 'lexical_field: ritual impurity'
  rationale: «Impuro» mantiene la noción de impureza ritual o cultual sin introducir explicaciones ajenas al verso; en español es claro y no fuerza una equivalencia moral exclusiva.
theological_decisions:
- issue: Speaker boundary between the quoted Jacobite refusal and the angelic comment
  english_pob_reading: The first sentence is a direct quote; the second is explanatory commentary.
  chosen_spanish_reading: Mantener comillas para la negativa citada y dejar fuera de ellas la observación sobre Israel.
  alternative_spanish_readings:
