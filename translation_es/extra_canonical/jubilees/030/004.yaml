base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/004.yaml
  text: And they spoke with them deceitfully and dealt treacherously with them and misled them. And Simeon and Levi entered Shechem unexpectedly and executed judgment on all the men of Shechem, and they killed every male whom they found in it, and they left none in it; they killed them all in agony, because they had disgraced Dinah their sister.
  footnotes:
  - marker: a
    text: Or 'with the edge of the sword'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:27Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y hablaron con ellos con engaño y procedieron traicioneramente con ellos, y los desviaron. Y Simeón y Leví entraron inesperadamente en Siquem y ejecutaron juicio sobre todos los hombres de Siquem; y mataron a todo varón que hallaron en ella, y no dejaron ninguno en ella; los mataron a todos en agonía[a], porque habían deshonrado a Dina, su hermana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con el filo de la espada'. El audit trail revisado, sin embargo, entiende aquí 'en agonía' por la lectura ge'ez del término correspondiente a dolor/tormento, ligado a la circuncisión.
    reason: textual_variant
lexical_decisions:
- source_word: በአኩይ፡
  english_pob_choice: deceitfully
  chosen_spanish: con engaño
  alternatives_spanish:
  - de manera engañosa
  - engañosamente
  lexicon: engaño
  rationale: El adverbio inglés 'deceitfully' pide una expresión natural en español que conserve la intención de fraude o falsedad. 'Con engaño' es claro y evita un calco rígido.
- source_word: ወኀብለይዎሙ
  english_pob_choice: dealt treacherously with them
  chosen_spanish: procedieron traicioneramente con ellos
  alternatives_spanish:
  - obraron traidoramente con ellos
  - los trataron traidoramente
  lexicon: traicionar
  rationale: La idea es de perfidia o ruptura de confianza. 'Procedieron traicioneramente' mantiene el matiz verbal y la gravedad moral del texto.
- source_word: ወአስፈጥዎሙ
  english_pob_choice: misled them
  chosen_spanish: los desviaron
  alternatives_spanish:
  - los engañaron
  - los extraviaron
  lexicon: desviar
  rationale: El contexto sugiere inducir a error o apartar del camino esperado. 'Desviaron' conserva la imagen de hacerlos ir por un rumbo falso sin añadir más de lo que el texto pide.
- source_word: ስምዖን፡ ወሌዊ፡
  english_pob_choice: Simeon and Levi
  chosen_spanish: Simeón y Leví
  alternatives_spanish:
  - Simeón y Levi
  lexicon: nombres propios
  rationale: Se conserva la forma española habitual de los nombres bíblicos, plenamente transparente en castellano.
- source_word: ወቦኡ፡ ... ግብተ፡
  english_pob_choice: entered Shechem unexpectedly
  chosen_spanish: entraron inesperadamente en Siquem
  alternatives_spanish:
  - entraron de improviso en Siquem
  - irrumpieron inesperadamente en Siquem
  lexicon: entrar
  rationale: '''Unexpectedly'' se expresa bien como ''inesperadamente''; el movimiento de entrada se mantiene sin sobredimensionar con ''irrumpir''.'
- source_word: ወገብሩ፡ ኵነኔ፡ ላዕለ፡ ኵሎሙ፡ ዐደወ፡ ሰቂማ፡
  english_pob_choice: executed judgment on all the men of Shechem
  chosen_spanish: ejecutaron juicio sobre todos los hombres de Siquem
  alternatives_spanish:
  - hicieron juicio sobre todos los hombres de Siquem
  - ejercieron juicio sobre todos los hombres de Siquem
  lexicon: juicio
  rationale: '''Ejecutaron juicio'' conserva la fuerza judicial del giro semítico sin sustituirlo por una formulación más interpretativa como ''castigaron''.'
- source_word: ወኢያትረፉ፡ ውስቴታ
  english_pob_choice: they left none in it
  chosen_spanish: no dejaron ninguno en ella
  alternatives_spanish:
  - no dejaron a nadie en ella
  - no dejaron ninguno dentro
  lexicon: dejar
  rationale: La referencia es a la ciudad de Siquem; en español 'en ella' resulta natural y fiel al antecedente femenino implícito de la ciudad.
- source_word: በ፵ዐር፡
  english_pob_choice: in agony
  chosen_spanish: en agonía
  alternatives_spanish:
  - en tormento
  - con dolor
  lexicon: agonía
  rationale: La revisión del audit trail corrige la lectura anterior de 'edge of the sword' y señala el sentido de dolor/tormento ligado a la circuncisión. 'En agonía' refleja bien esa violencia padecida.
- source_word: ገመፉ
  english_pob_choice: because they had disgraced
  chosen_spanish: porque habían deshonrado
  alternatives_spanish:
  - porque habían avergonzado
  - porque habían ultrajado
  lexicon: deshonrar
  rationale: '''Disgraced'' se traduce con el valor moral de deshonra pública; ''deshonrar'' mantiene la gravedad del acto contra Dina.'
theological_decisions:
- issue: La frase final describe la causa de la matanza como la deshonra infligida a Dina, no como un simple conflicto militar.
  english_pob_reading: because they had disgraced Dinah their sister
  chosen_spanish_reading: porque habían deshonrado a Dina, su hermana
  alternative_spanish_readings:
  - porque habían avergonzado a Dina, su hermana
  - porque habían ultrajado a Dina, su hermana
  rationale: La traducción conserva la conexión causal explícita del texto y el carácter moral de la ofensa; no atenúa el motivo narrativo de la represalia.
  doctrine_reference: Narrativa de Jubileos 30:4 en relación con Génesis 34; juicio retributivo en contexto histórico-narrativo.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para corregir una armonización previa con Génesis 34:26 ('with the edge of the sword'). La nota de revisión indica que el ge'ez leído en el testimonio base expresa 'in agony/torment', y por eso la versión española adopta 'en agonía' y no una frase sobre la espada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma POB cuando aparezca el nombre divino; en este versículo no se presenta.
  - '''Siquem'' se conserva como topónimo bíblico estándar en español.'
  - Se usa 'juicio' en sentido forense-narrativo, no como veredicto doctrinal abstracto.
  - 'La secuencia verbal sigue de cerca el orden del original para preservar la progresión: engaño, traición, desvío, entrada, juicio y muerte.'
