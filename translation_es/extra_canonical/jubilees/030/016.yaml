translation:
  language: es
  text: 'Por tanto, te he mandado, diciendo: «Da este testimonio a Israel: Mira lo que les sucedió a los siquemitas y a sus hijos, cómo fueron entregados en las manos de los dos hijos de Jacob, y los mataron con tormento[a], y les fue contado como justicia, y fue escrito para ellos como justicia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Con tormento» traduce una frase difícil que también puede entenderse como «con angustia» o, en algunas tradiciones textuales, posiblemente «con espada». El sentido general es que los siquemitas fueron abatidos violentamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Bear this witness
  english_pob_choice: Bear this witness
  chosen_spanish: Da este testimonio
  alternatives_spanish:
  - Da este testimonio en Israel
  - Da este testimonio a Israel
  lexicon: testimonio
  rationale: «Bear this witness» es un mandato formal de testificar; «dar testimonio» conserva la fuerza judicial/profética sin volverlo explicativo. Se evita una paráfrasis más libre.
- source_word: Shechemites
  english_pob_choice: Shechemites
  chosen_spanish: siquemitas
  alternatives_spanish:
  - los habitantes de Siquem
  lexicon: toponym/adjectival
  rationale: El gentilicio español «siquemitas» reproduce el referente étnico/geográfico de forma natural y precisa.
- source_word: delivered into the hands of
  english_pob_choice: were delivered into the hands of
  chosen_spanish: fueron entregados en manos de
  alternatives_spanish:
  - fueron puestos en manos de
  - cayeron en manos de
  lexicon: hand(s) idiom
  rationale: La expresión bíblica en español se entiende bien con «entregados en manos de», que conserva la imagen de entrega/poder ajeno.
- source_word: with torment
  english_pob_choice: with torment
  chosen_spanish: con tormento
  alternatives_spanish:
  - con angustia
  - con espada
  lexicon: torment/distress/sword
  rationale: Se conserva la elección principal del POB inglés. «Tormento» es la opción más cercana y mantiene la tensión textual; se deja constancia de las alternativas históricas/textuales sin cerrar indebidamente el sentido.
- source_word: it was reckoned to them as righteousness
  english_pob_choice: it was reckoned to them as righteousness
  chosen_spanish: les fue contado como justicia
  alternatives_spanish:
  - les fue considerado justicia
  - les fue contado por justicia
  lexicon: reckon/impute
  rationale: «Contado como justicia» refleja bien el verbo de imputación/consideración sin forzar una terminología confesional posterior; mantiene la correlación con la cláusula paralela.
- source_word: it was written for them for righteousness
  english_pob_choice: it was written for them for righteousness
  chosen_spanish: fue escrito para ellos como justicia
  alternatives_spanish:
  - fue escrito para ellos por justicia
  - les fue escrito como justicia
  lexicon: written for them
  rationale: «Para ellos» sigue de cerca el valor de beneficio/reference del original y evita el falso matiz epistolar de «escrito a ellos». «Como justicia» mantiene el paralelismo semántico con la cláusula anterior.
theological_decisions:
- issue: Relación entre violencia y justicia atribuida en el texto
  english_pob_reading: and it was reckoned to them as righteousness, and it was written for them for righteousness
  chosen_spanish_reading: y les fue contado como justicia, y fue escrito para ellos como justicia
  alternative_spanish_readings:
  - y les fue contado por justicia, y fue escrito por justicia para ellos
  - y se les consideró justo, y se registró para ellos como justicia
  rationale: 'Se conserva la tensión del texto: la acción violenta es seguida por una evaluación positiva en términos de justicia. No se suaviza la formulación ni se reinterpreta doctrinalmente el pasaje.'
  doctrine_reference: retribución/cuento de justicia en la literatura de Jubileos; lenguaje de imputación
- issue: Sentido de la expresión verbal difícil traducida como 'with torment'
  english_pob_reading: with torment
  chosen_spanish_reading: con tormento
  alternative_spanish_readings:
  - con angustia
  - con espada
  rationale: No se elimina la ambigüedad heredada del testimonio textual. «Con tormento» conserva el núcleo semántico de violencia intensa y permite lecturas alternativas señaladas por la tradición textual.
  doctrine_reference: crítica textual y variantes léxicas en Jubileos
translation_notes:
  revision_awareness: El texto español incorpora la revisión que mueve la referencia de la nota al sintagma «con tormento» y evita la formulación inglesa problemática «written to them»; por eso se traduce «fue escrito para ellos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito solo donde aparezca el nombre divino; aquí no aparece ninguno.
  - Se conserva «justicia» para reflectar la correspondencia con el inglés POB y el paralelismo interno, sin sustituirlo por una glosa doctrinal.
  - La puntuación usa comillas angulares españolas para el discurso directo y coloca la nota exactamente sobre el sintagma ambiguo.
