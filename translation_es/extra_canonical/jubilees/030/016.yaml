  text: 'Therefore I have commanded you, saying, ''Bear this witness to Israel: See what happened to the Shechemites and to their sons, how they were delivered into the hands of the two sons of Jacob, and they killed them with torment[16], and it was reckoned to them as righteousness, and it was written for them for righteousness.'''
