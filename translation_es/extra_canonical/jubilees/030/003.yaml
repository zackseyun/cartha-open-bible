translation:
  language: es
  text: Y ella tenía doce años. Y él pidió a su padre y a sus hermanos que se le diera por esposa. Y Jacob y sus hijos se enojaron a causa de los hombres de Siquem, porque habían profanado a Dina, su hermana.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወሰተ፡ ፲ወ፪ዓመት
  english_pob_choice: And she was twelve years old.
  chosen_spanish: Y ella tenía doce años.
  alternatives_spanish:
  - Y ella era de doce años.
  - Y tenía doce años.
  lexicon: edad expresada con verbo de posesión/ser
  rationale: El ge'ez indica edad de forma directa; en español natural, 'tenía doce años' comunica la edad sin forzar un calco.
- source_word: አስተብቍዓ፡ እምኀበ፡ አቡሁ፡ ትትወሀብ፡ ሎቱ፡ ብእሲተ፡ ወእምኀበ፡ አኀዊሃ
  english_pob_choice: he asked from her father and from her brothers that she be given to him as a wife
  chosen_spanish: pidió a su padre y a sus hermanos que se le diera por esposa
  alternatives_spanish:
  - solicitó a su padre y a sus hermanos que se le entregara por esposa
  - pidió a su padre y a sus hermanos que le dieran por mujer
  lexicon: pedir / dar por esposa
  rationale: Conserva la idea de solicitud a los parientes varones y la pasiva de 'ser dada'. 'Por esposa' mantiene el matiz relacional sin introducir una formulación más idiomática pero menos exacta como 'casarse'.
- source_word: ዐደወ፡ ሰቂማ
  english_pob_choice: the men of Shechem
  chosen_spanish: los hombres de Siquem
  alternatives_spanish:
  - los varones de Siquem
  - la gente de Siquem
  lexicon: construct plural / men of
  rationale: 'La revisión reciente del inglés fue corregida por la auditoría: ዐደወ es plural constructo de ''hombres de'', no ''ciudad de''. En español, ''hombres de Siquem'' refleja con precisión el valor del original.'
- source_word: አርኰስዋ፡ ለዲና፡
  english_pob_choice: because they had defiled Dinah their sister
  chosen_spanish: porque habían profanado a Dina, su hermana
  alternatives_spanish:
  - porque habían contaminado a Dina, su hermana
  - porque habían deshonrado a Dina, su hermana
  lexicon: defile / profane
  rationale: '''Profanado'' conserva la fuerza moral y cultual de la deshonra sexual sin rebajarla a un mero agravio social. ''Contaminado'' o ''deshonrado'' son posibles, pero menos precisos para esta carga semántica.'
theological_decisions:
- issue: Cómo referir a Shequem en el motivo de enojo
  english_pob_reading: the men of Shechem
  chosen_spanish_reading: los hombres de Siquem
  alternative_spanish_readings:
  - la ciudad de Siquem
  - la gente de Siquem
  rationale: La corrección textual/audit trail exige mantener el referente humano plural, no la ciudad. 'Hombres de Siquem' preserva la lectura documentada sin introducir un cambio interpretativo.
  doctrine_reference: Fidelidad textual y semántica; no aplica una decisión doctrinal propiamente dicha.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión que cambió erróneamente 'the men of Shechem' por 'the city of Shechem'; la auditoría posterior la corrigió. Esta versión española sigue la corrección respaldada por el ge'ez y evita la lectura errónea. No se incorporan otros cambios no sustentados por el texto fuente.
  spanish_consistency_notes:
  - Se mantiene 'Dina' como forma hispana estable del nombre.
  - Se usa 'Siquem' para el topónimo en español bíblico estándar, mientras el sentido del constructo se preserva con 'hombres de'.
  - El tono es sobrio y bíblico, pero con sintaxis española natural.
  - No se traduce 'Yahvé' porque este versículo no contiene el nombre divino.
