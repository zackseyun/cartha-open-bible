translation:
  language: es
  text: 'Y por esta razón le inscriben un testimonio de favor[a] en las tablas celestiales: bendición y justicia delante del Dios de todos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Geʿez: ስምዐ ፡ ሞገስ (semʿa mogas). La expresión sugiere un testimonio formal de aprobación o gracia divina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይጽሕፉ
  english_pob_choice: they inscribe
  chosen_spanish: le inscriben
  alternatives_spanish:
  - le escriben
  - se inscribe
  lexicon: Leslau
  rationale: Conserva el verbo activo plural del geʿez y la imagen de registro formal; en español, «inscriben» refleja mejor un acto solemne de anotación que «escriben».
- source_word: ስምዐ
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testimonio formal
  - declaración
  lexicon: Leslau
  rationale: Mantiene el sentido de un registro o declaración atestiguada; «testimonio» es el equivalente más natural y fiel en español.
- source_word: ሞገስ
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  lexicon: Leslau
  rationale: Sigue la decisión inglesa de «favor» para conservar la idea de aprobación divina inscrita para él, sin diluirla en un sentido meramente emocional de «gracia».
- source_word: ጽላተ ሰማይ
  english_pob_choice: the heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas del cielo
  - las tablas celestes
  lexicon: Leslau
  rationale: «Tablas celestiales» reproduce de forma clara y digna la imagen de un registro celestial; evita introducir una explicación interpretativa no explicitada por el texto.
- source_word: በረከተ
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendiciones
  - bendecimiento
  lexicon: Leslau
  rationale: «Bendición» es la equivalencia directa y natural en español para el sustantivo del texto.
- source_word: ጽድቀ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: Leslau
  rationale: Se conserva el valor moral-jurídico de δικαιοσύνη/ṣədq en un español bíblico claro; «justicia» mantiene el paralelismo con «bendición» y el peso covenantal del pasaje.
- source_word: አምላከ ኵሉ
  english_pob_choice: the God of all
  chosen_spanish: el Dios de todos
  alternatives_spanish:
  - el Dios de todo
  - el Dios de todo el universo
  lexicon: Leslau
  rationale: Traducción directa y sobria del genitivo; preserva la universalidad del título sin añadir expansión interpretativa.
theological_decisions:
- issue: El registro celestial como testimonio de aprobación divina
  english_pob_reading: a testimony of favor on the heavenly tablets
  chosen_spanish_reading: un testimonio de favor en las tablas celestiales
  alternative_spanish_readings:
  - un testimonio de gracia en las tablas celestiales
  - un testimonio de aceptación en las tablas celestiales
  rationale: La frase española conserva el carácter formal del expediente celestial y la ambigüedad controlada de ሞገስ, que puede abarcar favor/gracia/aceptación sin reducirse a una sola nuance.
  doctrine_reference: angelology / divine record motif in Second Temple literature
- issue: Pareado final de bendición y justicia delante de Dios
  english_pob_reading: blessing and righteousness before the God of all
  chosen_spanish_reading: bendición y justicia delante del Dios de todos
  alternative_spanish_readings:
  - bendición y rectitud delante del Dios de todos
  - bendición y justificación delante del Dios de todos
  rationale: Se respeta el paralelismo del texto con dos sustantivos coordinados y se evita reespecificar 'justicia' en términos doctrinales posteriores que el texto no exige.
  doctrine_reference: biblical righteousness / covenantal standing
translation_notes:
  revision_awareness: Se tuvo en cuenta que el expediente inglés ya corrigió un arrastre de versículos vecinos y que la lectura estable para este versículo es el registro de favor en las tablas celestiales, con 'favor' como decisión léxica principal para ሞገስ.
  spanish_consistency_notes:
  - Se mantuvo el estilo sobrio y documental del POB, evitando paráfrasis devocionales.
  - «Tablas celestiales» se conservó como imagen técnica del registro divino, no como metáfora libre.
  - No se sustituyó «Dios» por una perífrasis; el texto fuente usa un título universal y directo.
  - Se prefirió «justicia» para conservar la fuerza bíblica del término sin cargarlo con explicaciones doctrinales ajenas al contexto inmediato.
