translation:
  language: es
  text: 'porque es una abominación delante de Yahvé. Por eso he escrito para ustedes en las palabras de la ley todos los hechos[a] de los siquemitas, los que hicieron contra Dina, y cómo hablaron los hijos de Jacob, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obras». «Hechos» se prefiere aquí porque en español comunica con más naturalidad las acciones cometidas; el ge'ez usa un plural colectivo referido a los siquemitas.
    reason: lexical_alternative
lexical_decisions:
- source_word: በቅድመ እግዚአብሔር
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: YHWH
  rationale: El texto fuente alude al nombre divino; en español se conserva el nombre propio Yahvé según el criterio del proyecto, en vez de una máscara reverencial como «el SEÑOR».
- source_word: ምኑን ... በእንተዝ
  english_pob_choice: because it is an abomination ... Therefore
  chosen_spanish: porque es una abominación ... Por eso
  alternatives_spanish:
  - pues es una abominación ... Por tanto
  - porque resulta abominable ... Por eso
  lexicon: βδέλυγμα / abominación
  rationale: La frase ge'ez expresa una valoración fuerte de repulsión ritual/moral; «abominación» mantiene mejor la fuerza lexical y formal que una simple paráfrasis como «abominable».
- source_word: ውስተ፡ ቃለ፡ ሕግ
  english_pob_choice: in the words of the law
  chosen_spanish: en las palabras de la ley
  alternatives_spanish:
  - en las palabras de la Ley
  - según las palabras de la ley
  lexicon: λόγος / ley
  rationale: Se conserva la locución concreta del original y del audit trail inglés. «Ley» con mayúscula sería posible, pero aquí la referencia es al cuerpo legal/citación textual, por lo que se deja en minúscula.
- source_word: ግብሮሙ
  english_pob_choice: the deeds of the Shechemites
  chosen_spanish: todas las obras que hicieron los siquemitas
  alternatives_spanish:
  - todos los hechos que hicieron los siquemitas
  - todas las acciones de los siquemitas
  lexicon: ἔργα / deeds
  rationale: El Ge'ez usa plural posesivo y verbo plural; el antecedente colectivo son los habitantes de Siquem, no la ciudad como nombre singular. «Obras» reproduce la amplitud de ἔργα/«deeds» y mantiene el matiz de acciones concretas.
- source_word: ላዕለ፡ ዲና
  english_pob_choice: against Dinah
  chosen_spanish: contra Dina
  alternatives_spanish:
  - a Dina
  - sobre Dina
  lexicon: preposición de hostilidad
  rationale: La preposición señala agresión/hostilidad, por lo que «contra» es la opción más precisa y natural en español.
- source_word: ደቂ፡ ያዕቆብ
  english_pob_choice: the sons of Jacob
  chosen_spanish: los hijos de Jacob
  alternatives_spanish:
  - los hijos de Yaacob
  - los hijos de Jacob
  lexicon: formula genealógica
  rationale: Se conserva la fórmula genealógica estándar y formal del texto, en concordancia con la revisión inglesa que prefirió «the sons of Jacob».
theological_decisions:
- issue: Nombre divino en una obra extra-canónica con referencia al texto de la ley
  english_pob_reading: before the LORD
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - delante del Señor
  - ante el Señor
  rationale: Aunque el inglés POB usa «LORD» por convención editorial, el texto fuente alude al nombre divino; el proyecto exige recuperar Yahvé en español cuando corresponde. No se interpreta como una mera fórmula piadosa sino como referencia al Dios de Israel.
  doctrine_reference: Uso del nombre divino (YHWH) según la política terminológica del proyecto
- issue: Sintagma final truncado por el discurso directo
  english_pob_reading: and how the sons of Jacob spoke, saying,
  chosen_spanish_reading: 'y cómo hablaron los hijos de Jacob, diciendo:'
  alternative_spanish_readings:
  - y cómo hablaron los hijos de Jacob, diciendo
  - 'y cómo dijeron los hijos de Jacob:'
  rationale: El versículo termina introduciendo cita directa; se conserva el gerundio introductorio «diciendo» con dos puntos para reflejar el corte del texto y su función de enlace discursivo.
  doctrine_reference: Convenciones narrativas y de cita directa en traducción bíblica
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para preferir una formulación más formal («it is an abomination») y para resolver el plural del pasaje como «the Shechemites». La versión española sigue esas decisiones, recupera el nombre divino Yahvé conforme a la política del proyecto y mantiene el cierre abierto del discurso directo.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» de forma consistente con el proyecto.
  - «Hijos de Jacob» conserva la fórmula genealógica formal adoptada en la revisión inglesa.
  - «Obras» responde al plural del ge'ez y a la lectura auditada de los siquemitas como sujeto colectivo.
  - El registro es formal y bíblico, pero con sintaxis española natural.
