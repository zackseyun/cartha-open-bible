translation:
  language: es
  text: Y es abominable para Israel. Y Israel no será limpiado[a] de esta impureza, quien tiene esposa de entre las hijas de las naciones,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «purificado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ርኵስ
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - contaminación ritual
  lexicon: 'Spanish lexical decision: semantic field of ritual impurity/uncleanness'
  rationale: El inglés POB usa 'uncleanness' para mantener el campo ritual. En español, 'impureza' comunica bien la idea de contaminación ritual sin sonar tan áspero como 'inmundicia'. Se conserva la tensión cultual del término sin moralizarlo indebidamente.
- source_word: ወኢይነጽሕ
  english_pob_choice: will not be cleansed
  chosen_spanish: no será limpiado
  alternatives_spanish:
  - no será purificado
  - no quedará limpio
  lexicon: 'Spanish lexical decision: passive cleansing/purification verb'
  rationale: '''Limpiado'' sigue de cerca la pasiva del original y mantiene la imaginería de limpieza ritual. ''Purificado'' es posible, pero puede desplazar el matiz concreto de limpieza. Se dejó ''limpiado'' para conservar la correspondencia con ''uncleanness''/''impureza''.'
- source_word: ዘቦ፡ ብእሲት
  english_pob_choice: who has a wife
  chosen_spanish: tiene una esposa
  alternatives_spanish:
  - que tiene esposa
  - si tiene una esposa
  lexicon: 'Spanish lexical decision: possessive relationship in the Ge''ez relative construction'
  rationale: La revisión inglesa aclaró que la frase expresa posesión de esposa, no mera presencia de 'una mujer'. 'Tiene una esposa' reproduce esa relación de pertenencia de manera natural en español y evita la ambigüedad de una traducción más literal pero engañosa.
- source_word: ዘቦ፡ ብእሲት
  english_pob_choice: who has a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposa
  lexicon: 'Spanish lexical decision: relational noun choice'
  rationale: Se eligió 'esposa' porque el contexto exige una relación matrimonial específica. 'Mujer' sería demasiado genérico y replicaría la ambigüedad corregida en el audit trail inglés.
- source_word: ውእቱ ለእስራኤል
  english_pob_choice: it is abominable for Israel
  chosen_spanish: es abominable para Israel
  alternatives_spanish:
  - es abominación para Israel
  - es detestable para Israel
  lexicon: 'Spanish lexical decision: evaluative predicate'
  rationale: '''Abominable'' sigue el inglés POB y conserva la fuerza evaluativa del original. ''Detestable'' sería aceptable, pero ''abominable'' mantiene mejor la conexión con lenguaje de abominación cultual.'
theological_decisions:
- issue: Impureza ritual vs. inmoralidad general
  english_pob_reading: uncleanness
  chosen_spanish_reading: impureza
  alternative_spanish_readings:
  - inmundicia
  - contaminación ritual
  rationale: El contexto de Jubileos aquí trata una impureza asociada al matrimonio con mujeres de las naciones. Traducirlo como 'impureza' mantiene la categoría ritual sin convertirla en una simple acusación moral abstracta.
  doctrine_reference: Levítico 15; Esdras 9–10; Nehemías 13
- issue: Relación matrimonial explícita
  english_pob_reading: who has a wife
  chosen_spanish_reading: si tiene una esposa
  alternative_spanish_readings:
  - que tiene una esposa
  - quien tiene una esposa
  rationale: 'La evidencia ge''ez revisada muestra una relación posesiva: un israelita con esposa extranjera. El español debe reflejar esa posesión para no diluir la restricción legal del pasaje.'
  doctrine_reference: Génesis 6:1–4; Deuteronomio 7:3–4; Jubileos 30
- issue: Afirmación de imposibilidad de limpieza ritual
  english_pob_reading: will not be cleansed
  chosen_spanish_reading: no será limpiado
  alternative_spanish_readings:
  - no será purificado
  - no quedará limpio
  rationale: Se mantiene la fuerza de una declaración normativa negativa. 'No será limpiado' conserva la pasiva del original y la continuidad con el campo de pureza/impureza.
  doctrine_reference: Números 19; Levítico 11–15
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente, que añadió el sujeto explícito «it is» y corrigió la cláusula final a «who has a wife». La traducción española refleja ambos puntos: conserva un predicado explícito («es abominable») y traduce la frase final con posesión matrimonial («tiene una esposa») en vez de una referencia genérica a «una mujer».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «impureza»/«limpiado» para preservar el campo léxico ritual sin sobreinterpretarlo.
  - «Esposa» se usa deliberadamente por la aclaración textual del audit trail; no se deja la ambigüedad de «mujer».
  - La puntuación divide dos cláusulas coordinadas como en el inglés auditado, manteniendo el ritmo sentencioso del original.
