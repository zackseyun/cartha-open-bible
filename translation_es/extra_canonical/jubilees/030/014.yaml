revisions:
- from: Y es abominable para Israel. Y Israel no será limpiado[a] de esta impureza, si tiene[b] una esposa[c] de entre las hijas de las naciones,
  to: Y es abominable para Israel. Y Israel no será limpiado[a] de esta impureza, quien tiene esposa de entre las hijas de las naciones,
  rationale: Se reemplaza 'si tiene una esposa' por 'quien tiene esposa' para reflejar la revisión auditada del ge'ez como relativa posesiva, no condicional. Se eliminan las notas que solo justificaban esa formulación menos precisa y se conserva la alternativa léxica útil entre 'limpiado' y 'purificado'. No requiere adjudicación adicional porque la corrección es directa y bien sustentada por el audit trail.
