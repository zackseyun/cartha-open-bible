translation:
  language: es
  text: Y en el día en que los hijos de Jacob mataron a Siquem, se escribió para ellos en el cielo un registro[a] de que habían hecho justicia, rectitud y venganza contra los pecadores, y fue inscrito para bendición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «subió para ellos un registro». Esta fue una traducción anterior, pero la revisión auditada favorece «se escribió para ellos un registro» por el pasivo del verbo ge''ez.'
    reason: preserve_audit_trail_previous_rendering
lexical_decisions:
- source_word: “a record was written for them” / Ge'ez passive taṣeḥfa lomu maṣḥaf
  english_pob_choice: a record was written for them
  chosen_spanish: fue escrito para ellos en el cielo un registro
  alternatives_spanish:
  - se levantó para ellos un registro
  - se hizo un registro para ellos
  lexicon: record / book / register
  rationale: La revisión auditada corrigió el sentido a pasivo (‘was written’), así que en español conviene mantener la acción de escritura y no una imagen de ascenso. ‘Registro’ comunica bien el valor documental y evita forzar ‘libro’ donde el contexto habla de una inscripción celestial.
- source_word: righteousness
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: righteousness
  rationale: ‘Justicia’ es el equivalente más natural y fiel en español bíblico contemporáneo; conserva el valor moral y judicial del término sin introducir una lectura doctrinal más específica como ‘justificación’.
- source_word: uprightness
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - integridad
  - honradez
  lexicon: uprightness
  rationale: ‘Rectitud’ diferencia este segundo término de ‘justicia’ y preserva la duplicación semántica del original, sin neutralizarla en un solo vocablo.
- source_word: vengeance
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - castigo
  - retribución
  lexicon: vengeance
  rationale: ‘Venganza’ mantiene la tensión lexical del texto fuente. ‘Castigo’ o ‘retribución’ suavizarían el término y perderían la fuerza de la formulación.
- source_word: sinners
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - malvados
  - transgresores
  lexicon: sinner
  rationale: ‘Pecadores’ es la correspondencia directa y clara en español bíblico, y conserva el contraste moral del pasaje.
- source_word: for blessing
  english_pob_choice: written down for blessing
  chosen_spanish: fue inscrito para bendición
  alternatives_spanish:
  - quedó escrito para bendición
  - se escribió para bendecirlos
  lexicon: write / bless
  rationale: ‘Inscrito’ responde bien al registro celestial y refuerza la idea de una inscripción formal. ‘Para bendición’ conserva la finalidad exacta sin añadir un objeto no explícito.
theological_decisions:
- issue: Heavenly record written for human action
  english_pob_reading: a record was written for them in heaven
  chosen_spanish_reading: fue escrito para ellos en el cielo un registro
  alternative_spanish_readings:
  - un registro subió por ellos al cielo
  - en el cielo se levantó un registro para ellos
  rationale: La fuente revisada exige ‘escrito’, no ‘subió’. Mantener ‘en el cielo’ conserva el marco celestial sin añadir especulación sobre el modo de inscripción.
  doctrine_reference: Jubilees 30:20; revision note on passive taṣeḥfa
- issue: Moral valuation of the killing of Shechem
  english_pob_reading: they had performed righteousness and uprightness and vengeance on the sinners
  chosen_spanish_reading: habían practicado justicia, rectitud y venganza contra los pecadores
  alternative_spanish_readings:
  - habían hecho justicia e integridad contra los pecadores
  - habían ejecutado justicia y retribución
  rationale: El texto presenta explícitamente una evaluación positiva de la acción; la traducción conserva esa tensión sin suavizarla. ‘Venganza’ mantiene el choque teológico del pasaje.
  doctrine_reference: Jubilees 30:20; ethical valuation in source text
translation_notes:
  revision_awareness: 'La versión española sigue la corrección auditada del pasaje: el verbo clave se entiende como pasivo (‘fue escrito’), no como ‘subió’. Además, se preserva la triple valoración moral del texto (justicia, rectitud, venganza) y el cierre con finalidad de bendición.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ sólo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se mantuvo el registro celestial con ‘en el cielo’ y ‘registro/inscrito’ para reflejar el lenguaje documental del pasaje.
  - La nota al pie está anclada en el sustantivo ‘registro[a]’ para que cada marcador aparezca exactamente en el texto.
