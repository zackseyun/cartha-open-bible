  - severity: low
    issue: La redacción 'de que habían practicado' resulta menos natural en español
    rationale: 'Después de ''un registro ... que'', la construcción sin ''de'' suena más idiomática: ''que habían hecho/practicado justicia...''.'
  - severity: low
