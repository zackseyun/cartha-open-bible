- from: Cualquiera que lo profane ciertamente morirá[a], y será apedreado con piedras. Y no hay límite de días para esta ley, ni remisión ni expiación alguna, sino que el hombre que haya profanado a una hija en medio de todo Israel debe ser arrancado[b], porque ha dado de su descendencia a Moloc y ha obrado malvadamente para profanarlo.
  to: Quien la profane ciertamente morirá[a], y será apedreado con piedras. Y no hay límite de días para esta ley, ni remisión ni expiación alguna, sino que el hombre que haya profanado a una hija en medio de todo Israel ha de ser extirpado[b], porque ha dado de su descendencia a Moloc[c] y ha obrado malvadamente para profanarla.
  rationale: 'Se hacen ajustes menores pero importantes: se mejora la naturalidad inicial con ''Quien''; se refuerza el idiomatismo jurídico de ይሤረው con ''ha de ser extirpado''; se corrige la referencia pronominal final a ''profanarla''; y se añade la nota textual sobre la cláusula abrupta de Moloc, ya documentada en el expediente inglés.'
