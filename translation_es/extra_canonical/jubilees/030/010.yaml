base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/010.yaml
  text: whoever defiles it shall surely die[10], and he shall be stoned with stones. And there is no limit of days for this law, and no remission or any atonement, except that the man should be rooted out who has defiled a daughter in the midst of all Israel, because he has given of his seed to Molech and has acted wickedly so as to defile it.
  footnotes:
  - marker: '10'
    text: The Molech clause is abrupt in context. The Ethiopic text preserves it, and it may function as a broader analogy between illicit seed and cultic defilement.
    reason: textual_variant
  - marker: a
    text: Or 'they should put to death at once the man'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:29Z'
    unchanged: false
    changes_summary: Made a minor stylistic improvement by removing the unnecessary second 'nor' in 'no remission or any atonement' for smoother formal English; otherwise retained the draft.
translation:
  language: es
  text: Quien la profane ciertamente morirá[a], y será apedreado con piedras. Y no hay límite de días para esta ley, ni remisión ni expiación alguna, sino que el hombre que haya profanado a una hija en medio de todo Israel ha de ser extirpado[b], porque ha dado de su descendencia a Moloc[c] y ha obrado malvadamente para profanarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La fórmula intensiva reproduce el énfasis del original: expresa certeza de muerte, no mera posibilidad.'
    reason: lexical_alternative
  - marker: b
    text: El verbo refleja el valor pasivo del ge'ez, corregido en el audit trail inglés desde una lectura activa de ejecución a la idea de ser desarraigado o extirpado de la comunidad.
    reason: textual_variant
  - marker: c
    text: La cláusula sobre Moloc es abrupta en el contexto. El texto etiópico la conserva, y puede funcionar como una analogía más amplia entre descendencia ilícita y profanación cultual.
    reason: textual_variant
lexical_decisions:
- source_word: ዘያረኵስ / defiles
  english_pob_choice: defiles
  chosen_spanish: profanar
  alternatives_spanish:
  - contaminar
  - manchar
  lexicon: profanar
  rationale: 'El contexto es cultual y legal: la acción es una profanación de carácter sagrado, no solo una contaminación física. ''Profanar'' conserva mejor la fuerza ritual-jurídica del verbo que ''contaminar'' o ''manchar''.'
- source_word: ሞተ ለይሙት / shall surely die
  english_pob_choice: shall surely die
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - morirá sin falta
  - morirá de seguro
  lexicon: morir
  rationale: La duplicación enfática del ge'ez se reproduce con una construcción adverbial natural en español. 'Ciertamente morirá' comunica el énfasis sin sonar mecánico.
- source_word: ወበእብን ይትወገር / stoned with stones
  english_pob_choice: stoned with stones
  chosen_spanish: apedreado con piedras
  alternatives_spanish:
  - lapidado
  - muerto a pedradas
  lexicon: apedrear
  rationale: Se mantiene la imagen explícita de la pena de lapidación. 'Lapidado' es correcto, pero 'apedreado con piedras' refleja más de cerca la repetición enfática del original y del audit trail inglés.
- source_word: አልቦ ለዝ ሕግ ዐቅመ መዋዕለ / there is no limit of days for this law
  english_pob_choice: There is no limit of days for this law
  chosen_spanish: no hay límite de días para esta ley
  alternatives_spanish:
  - esta ley no tiene plazo
  - para esta ley no hay término de días
  lexicon: límite de días
  rationale: La frase indica que la vigencia no está limitada temporalmente. 'Límite de días' sigue de cerca el sentido del original y del inglés auditado, sin forzar una formulación más interpretativa.
- source_word: አልቦ ኅድገተ / no remission
  english_pob_choice: no remission
  chosen_spanish: ni remisión
  alternatives_spanish:
  - ni perdón
  - ni dispensa
  lexicon: remisión
  rationale: '''Remisión'' es el equivalente más cercano a la idea de condonación o cancelación de la pena. ''Perdón'' sería demasiado amplio y menos jurídico.'
- source_word: ወኵሉ ስርየተ / any atonement
  english_pob_choice: any atonement
  chosen_spanish: ni expiación alguna
  alternatives_spanish:
  - ni ningún sacrificio expiatorio
  - ni ninguna reparación
  lexicon: expiación
  rationale: La pareja 'remisión / expiación' conserva la doble negación del inglés auditado y distingue entre condonar y reparar sacrificialmente. 'Expiación' es la opción más técnica y fiel al campo semántico.
- source_word: ይሤረው / the man should be rooted out
  english_pob_choice: the man should be rooted out
  chosen_spanish: el hombre que haya profanado ... debe ser arrancado
  alternatives_spanish:
  - debe ser cortado
  - debe ser extirpado
  lexicon: arrancar
  rationale: El revisión auditada corrigió una lectura activa de muerte y afirmó el valor pasivo de 'ser uprooted/eradicated'. 'Arrancado' conserva la metáfora de expulsión/extirpación y evita introducir una ejecución no explicitada en el ge'ez.
- source_word: ወሀቦ ለሞሎክ / has given of his seed to Molech
  english_pob_choice: has given of his seed to Molech
  chosen_spanish: ha dado de su descendencia a Moloc
  alternatives_spanish:
  - ha dado de su semilla a Moloc
  - ha ofrecido su descendencia a Moloc
  lexicon: descendencia
  rationale: '''Descendencia'' traduce el sentido genealógico de ''seed'' en este contexto, con mayor claridad para el español que ''semilla'' y sin perder la alusión a prole/linaje.'
- source_word: ወአበሰ ለአርኵ / has acted wickedly so as to defile it
  english_pob_choice: has acted wickedly so as to defile it
  chosen_spanish: ha obrado malvadamente para profanarlo
  alternatives_spanish:
  - ha obrado perversamente para profanarlo
  - ha hecho el mal para profanarlo
  lexicon: obrar malvadamente
  rationale: Se preserva la relación entre conducta moral y efecto cultual. 'Malvadamente' corresponde al adverbio enfático del original y conecta con la profanación final.
theological_decisions:
- issue: La expresión pasiva 'ser arrancado' frente a una lectura de ejecución inmediata
  english_pob_reading: the man should be rooted out
  chosen_spanish_reading: debe ser arrancado
  alternative_spanish_readings:
  - debe ser eliminado
  - debe ser muerto
  rationale: La revisión textual del inglés auditado corrige explícitamente la lectura hacia un pasivo de exclusión/extirpación. Mantener 'ser arrancado' conserva la tensión entre sanción comunitaria y metáfora de desarraigo sin añadir una modalidad de castigo no asegurada por el ge'ez.
  doctrine_reference: Ninguna; decisión exegética y lexical sobre el alcance de la pena
- issue: La cláusula abrupta de Moloc y su relación con la profanación
  english_pob_reading: because he has given of his seed to Molech and has acted wickedly so as to defile it
  chosen_spanish_reading: porque ha dado de su descendencia a Moloc y ha obrado malvadamente para profanarlo
  alternative_spanish_readings:
  - porque ha ofrecido su descendencia a Moloc y la ha profanado
  - porque entregó su semilla a Moloc y la contaminó
  rationale: La conexión entre la entrega de descendencia a Moloc y la profanación final se conserva sin suavizar la abrupta coordinación del texto. 'Profanarlo' mantiene el referente final de la profanación del acto o del ámbito tratado en el pasaje, tal como la nota inglesa admite una analogía más amplia entre semilla ilícita y profanación cultual.
  doctrine_reference: No aplica; observación de coherencia textual y cultual
translation_notes:
  revision_awareness: La revisión más importante del audit trail inglés corrige 'they should put to death at once the man' a 'the man should be rooted out'; por eso el español evita toda formulación de ejecución activa y conserva la metáfora de desarraigo. También se retiene la cláusula de Moloc como en el texto ge'ez, siguiendo la nota de que su presencia es abrupta pero está atestiguada por el original.
  spanish_consistency_notes:
  - Se usa 'Moloc' para el nombre propio, conforme al uso español estándar y al audit trail inglés.
  - Se mantiene 'remisión' / 'expiación' como par conceptual jurídico-ritual.
  - Se evita 'SEÑOR' u otra sustitución reverencial porque no corresponde a este versículo.
  - Se conserva una sintaxis solemne y directa, apta para lectura pública.
