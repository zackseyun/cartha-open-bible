translation:
  language: es
  text: Y la descendencia de Leví fue escogida para el sacerdocio y para ser levitas, para que ministraran delante de Yahvé como lo hacemos siempre[a]. Y Leví y sus hijos serán bendecidos para siempre, porque mostró celo al ejecutar justicia y juicio y venganza sobre todos los que se levantaron contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Como lo hacemos siempre» refleja la perspectiva del hablante angélico dentro del marco de revelación de Jubileos en Sinaí.
    reason: cross_reference
lexical_decisions:
- source_word: YHWH / LORD
  english_pob_choice: LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: default project terminology for יהוה
  rationale: El texto de referencia habla de Yahvé; en español se evita la sustitución por una convención de máscara como «SEÑOR» y se mantiene el nombre divino según el estándar del proyecto.
- source_word: chosen for the priesthood and to be Levites
  english_pob_choice: chosen for the priesthood and to be Levites
  chosen_spanish: fue escogida para el sacerdocio y para ser levitas
  alternatives_spanish:
  - fue escogida para el sacerdocio y para los levitas
  - fue escogida para el sacerdocio y para el servicio levítico
  lexicon: source-driven phrase with contextual clarification
  rationale: «Para ser levitas» refleja mejor la revisión auditada que corrigió la lectura literal de dos preposiciones; evita sugerir que la descendencia fue escogida en favor de los levitas, cuando la idea es que fue designada para pertenecer a esa función/identidad.
- source_word: minister before the LORD
  english_pob_choice: minister before the LORD
  chosen_spanish: ministraran delante de Yahvé
  alternatives_spanish:
  - sirvieran delante de Yahvé
  - oficiaran delante de Yahvé
  lexicon: minister = servir / ministrar in cultic context
  rationale: «Ministrar» conserva el sentido cultual de servicio sagrado frente a Dios y mantiene un registro eclesial comprensible sin desplazar el matiz de servicio ritual.
- source_word: as we do at all times
  english_pob_choice: as we do at all times
  chosen_spanish: como lo hacemos en todo tiempo
  alternatives_spanish:
  - como lo hacemos siempre
  - como lo hacemos constantemente
  lexicon: adverbial temporal phrase
  rationale: La frase conserva la perspectiva del hablante angélico documentada en la nota inglesa, con un español natural y directo.
- source_word: zealous
  english_pob_choice: zealous
  chosen_spanish: tuvo celo
  alternatives_spanish:
  - fue celoso
  - estuvo lleno de celo
  lexicon: celo / zeal
  rationale: «Tuvo celo» transmite la motivación intensa sin sugerir connotaciones modernas negativas de «celoso».
- source_word: execute righteousness and judgment and vengeance
  english_pob_choice: execute righteousness and judgment and vengeance
  chosen_spanish: ejecutar justicia y juicio y venganza
  alternatives_spanish:
  - hacer justicia, juicio y venganza
  - aplicar justicia, juicio y venganza
  lexicon: lexical sequence from source
  rationale: Se conserva la secuencia triple del original y la tensión entre justicia, juicio y venganza sin suavizarla, dado que el inglés POB no la resolvió en una sola idea.
theological_decisions:
- issue: Divine name in a quoted/heavenly speech context
  english_pob_reading: before the LORD ... as we do at all times
  chosen_spanish_reading: delante de Yahvé ... como lo hacemos en todo tiempo
  alternative_spanish_readings:
  - delante del Señor
  - delante de Dios
  rationale: Aunque la voz narrativa es angélica y reproduce un marco de revelación, la referencia al nombre divino se mantiene explícita según la norma del proyecto; no se lo sustituye por una convención litúrgica genérica.
  doctrine_reference: project terminology on יהוה / YHWH
- issue: Vengeance associated with righteousness and judgment
  english_pob_reading: he was zealous to execute righteousness and judgment and vengeance on all who rose up against Israel
  chosen_spanish_reading: tuvo celo para ejecutar justicia y juicio y venganza sobre todos los que se levantaron contra Israel
  alternative_spanish_readings:
  - tuvo celo por hacer justicia y juicio y venganza
  - tuvo celo para ejecutar rectitud y juicio y venganza
  rationale: La versión española conserva la atribución positiva del celo de Leví tal como aparece en el texto fuente y no la reformula en términos más suaves; tampoco se sustituye «justicia» por una abstracción menos judicial.
  doctrine_reference: source-bound ethical and covenantal language
translation_notes:
  revision_awareness: La redacción incorpora la revisión auditada que corrigió la relación de «para el sacerdocio y para ser levitas», así como la ubicación del marcador de nota al final de la frase «como lo hacemos en todo tiempo». No se introdujeron cambios adicionales frente al último pase de revisión, que marcó el texto como sin cambios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Se conserva «justicia y juicio y venganza» sin fusionar los términos, para respetar la acumulación retórica del original.
  - «Ministrar» se usa en sentido cultual y no como equivalente genérico de trabajo religioso.
  - No se emplea «Cristo» ni terminología cristológica ajena al pasaje.
