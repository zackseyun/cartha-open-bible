revisions:
- from: Y la descendencia de Leví fue escogida para el sacerdocio y para ser levitas, para que ministraran delante de Yahvé como lo hacemos en todo tiempo[a]. Y Leví y sus hijos serán bendecidos para siempre, porque él tuvo celo para ejecutar justicia y juicio y venganza sobre todos los que se levantaron contra Israel.
  to: Y la descendencia de Leví fue escogida para el sacerdocio y para ser levitas, para que ministraran delante de Yahvé como lo hacemos siempre[a]. Y Leví y sus hijos serán bendecidos para siempre, porque mostró celo al ejecutar justicia y juicio y venganza sobre todos los que se levantaron contra Israel.
  rationale: 'La revisión es menor y no cambia el contenido: sustituye una expresión temporal algo calcada por una forma española más natural y suaviza una construcción rígida (''tuvo celo para ejecutar'') a una formulación más idiomática que preserva el mismo sentido. No se requiere adjudicación adicional.'
