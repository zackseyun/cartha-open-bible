base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/001.yaml
  text: And in the first year of the sixth week[1], he went up to Salem, east of Shechem, in peace, in the fourth month.
  footnotes:
  - marker: '1'
    text: The opening clause is textually difficult. The Ge'ez appears to place the event in the first year of the sixth week and locates the movement in relation to Shalem and the region east of Shechem. The subject is Jacob, returning to Canaan.
    reason: segmentation_note
  - marker: a
    text: Or 'in the seventh month'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:27Z'
    unchanged: false
    changes_summary: Changed 'Shalem' to the more standard 'Salem' and simplified 'which is to the east of Shechem' to 'east of Shechem' for more natural formal English while preserving the source sense.
translation:
  language: es
  text: Y en el primer año de la sexta semana, subió a Salem[a], al oriente de Siquem, en paz, en el cuarto mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación del movimiento y del sujeto es textual y narrativamente difícil; el auditorio inglés aclara que el referente es Jacob y que el pasaje sitúa su llegada en relación con Salem y la región al oriente de Siquem.
    reason: source_note
lexical_decisions:
- source_word: ዐርገ፡ ሰሌማሃ
  english_pob_choice: he went up to Salem
  chosen_spanish: subió a Salem
  alternatives_spanish:
  - fue a Salem
  - ascendió a Salem
  lexicon: subir / ascender
  rationale: El verbo ge'ez indica movimiento hacia arriba o llegada; en español bíblico natural, «subió» conserva el sentido direccional sin sobrecargar el texto. «Ascendió» suena más solemne pero menos fluido; «fue» pierde la idea de ascenso.
- source_word: ሰሌማሃ
  english_pob_choice: Salem
  chosen_spanish: Salem
  alternatives_spanish:
  - Sálém
  - Shalem
  lexicon: topónimo
  rationale: Se mantiene la forma breve y estándar «Salem», coherente con la revisión inglesa que prefirió esa grafía. «Shalem» reproduce más de cerca una transliteración, pero no es la forma más natural para lectores hispanos.
- source_word: ዘመንገለ፡ ጽባሒሁ፡ ለሰቂማ
  english_pob_choice: east of Shechem
  chosen_spanish: al oriente de Siquem
  alternatives_spanish:
  - al este de Siquem
  - en el oriente de Siquem
  lexicon: preposición direccional / topónimo
  rationale: «Al oriente de» conserva el registro bíblico y refleja bien la relación espacial del original. «Al este de» sería igualmente claro, pero «oriente» mantiene mejor el color bíblico sin ser arcaizante en exceso.
- source_word: በቀዳሚ፡ ዓመት፡ ዘ"ሱባዔ፡ ፮ይስ
  english_pob_choice: in the first year of the sixth week
  chosen_spanish: en el primer año de la sexta semana
  alternatives_spanish:
  - durante el primer año de la sexta semana
  - en el primer año de la semana sexta
  lexicon: marco cronológico
  rationale: La cronología jubilar se expresa de forma directa y técnica. «Semana» traduce la unidad calendárica del texto, y el orden numeral se conserva sin invertir la sintaxis innecesariamente.
- source_word: በወርኅ ፬ይ
  english_pob_choice: in the fourth month
  chosen_spanish: en el cuarto mes
  alternatives_spanish:
  - en el mes cuarto
  - en el cuarto período lunar
  lexicon: calendario
  rationale: La revisión inglesa corrigió una lectura errónea a «fourth month»; el español debe reflejar esa lectura segura. «Mes» es la equivalencia natural y exacta en este contexto calendárico.
- source_word: ወበቀዳሚ
  english_pob_choice: And in the first year
  chosen_spanish: Y en el primer año
  alternatives_spanish:
  - Y en el año primero
  - Y en el primer año de
  lexicon: conjunción + marcador temporal
  rationale: Se conserva la apertura narrativa con «Y», y «en el primer año» sigue de manera transparente la cronología del original. La adición de «de» queda integrada en la frase completa por la unidad temporal del texto.
theological_decisions:
- issue: Referencia del sujeto implícito y la localización geográfica
  english_pob_reading: The subject is Jacob, returning to Canaan.
  chosen_spanish_reading: El sujeto queda implícito en el versículo y se mantiene sin explicitar en el texto; la nota de auditoría identifica a Jacob como referente narrativo.
  alternative_spanish_readings:
  - Jacob subió a Salem
  - y Jacob subió a Salem
  rationale: El original no nombra al sujeto en este segmento; para no introducir una explicitación que el verso no ofrece, el texto español conserva el sujeto implícito. La aclaración pertenece a la auditoría, no al cuerpo del versículo.
  doctrine_reference: Principio de no sobreinterpretación textual; fidelidad a la elipsis del original.
- issue: Lectura del mes frente a la nota alternativa textual
  english_pob_reading: in the fourth month
  chosen_spanish_reading: en el cuarto mes
  alternative_spanish_readings:
  - en el séptimo mes
  rationale: La revisión textual documentada corrigió una lectura previa errónea; por eso el español adopta la forma respaldada por la edición estándar. No se preserva la antigua alternativa porque está descartada por la evidencia textual dada.
  doctrine_reference: Crítica textual y prioridad de la lectura revisada en la edición base.
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión importante: se normalizó el topónimo a «Salem» y, sobre todo, se corrigió el mes a «the fourth month» tras una lectura previa equivocada que había producido «the seventh month». La versión española sigue esa lectura revisada y evita conservar la variante errónea. También se respetó la dificultad segmentaria del inicio del versículo, sin forzar una explicitación del sujeto que el hebreo/ge''ez no expresa de manera directa en este tramo.'
  spanish_consistency_notes:
  - Uso de «Yahvé» no aplica en este versículo.
  - Se mantiene «Siquem» como forma española estándar del topónimo.
  - «Oriente» se usa con valor direccional bíblico, no como término cosmológico.
  - La puntuación separa los complementos cronológicos para facilitar la lectura sin alterar la estructura del original.
