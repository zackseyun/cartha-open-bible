revisions:
- from: La quemarán con fuego, porque ha profanado el nombre de la casa de su padre, y será arrancada de Israel. Y no se hallará en Israel ningún fornicario ni persona profanada[a] en todos los días de las generaciones de la tierra[b], porque Israel es santo para Yahvé, y todo hombre que lo profane ciertamente morirá; lo apedrearán con piedras.
  to: La quemarán con fuego, porque ha profanado el nombre de la casa de su padre, y será arrancada de Israel. Y no se hallará en Israel ningún fornicario ni persona impura en todos los días de las generaciones de la tierra[a], porque Israel es santo para Yahvé, y todo hombre que profane a Israel ciertamente morirá; lo apedrearán con piedras.
  rationale: Se corrige ‘persona profanada’ a ‘persona impura’ para reflejar mejor el sentido de contaminación ritual/moral y evitar una formulación poco idiomática en español. También se explicita ‘a Israel’ en lugar de ‘lo’ para eliminar ambigüedad referencial sin apartarse del sentido del original. Se mantiene la nota sobre la fórmula temporal intensiva, pero se elimina la nota léxica innecesaria creada por la redacción anterior.
  reviewer_model: gpt-5.4
