    text: Or 'throughout all the generations of the earth'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:28Z'
    unchanged: false
    changes_summary: Added the missing object 'her' after 'burn' for completeness and capitalized the opening word. Also adjusted 'through all' to 'throughout all' for more natural formal English.
translation:
  language: es
  text: La quemarán con fuego, porque ha profanado el nombre de la casa de su padre, y será arrancada de Israel. Y no se hallará en Israel ningún fornicario ni persona impura en todos los días de las generaciones de la tierra[a], porque Israel es santo para Yahvé, y todo hombre que profane a Israel ciertamente morirá; lo apedrearán con piedras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “a lo largo de todas las generaciones de la tierra”. El geʿez conserva una fórmula temporal intensiva que puede leerse con matiz de duración continua.'
    reason: alternative_reading
lexical_decisions:
- source_word: ያውዕይዋ፡ በእሳት፡
  english_pob_choice: They shall burn her with fire
  chosen_spanish: La quemarán con fuego
  alternatives_spanish:
  - La quemarán en fuego
  - La quemarán con fuego y ella
  lexicon: burn; fire
  rationale: El geʿez tiene un sujeto implícito plural y un objeto femenino explícito; el español lo expresa naturalmente con futuro perifrástico simple. Mantengo “con fuego” para reflejar el medio de ejecución sin añadir detalles ajenos.
- source_word: አርኰሰት፡ ስመ፡ ቤተ፡ አቡሃ፡
  english_pob_choice: she has defiled the name of her father's house
  chosen_spanish: ha profanado el nombre de la casa de su padre
  alternatives_spanish:
  - ha contaminado el nombre de la casa de su padre
  - ha deshonrado el nombre de la casa de su padre
  lexicon: defile; name; house of father
  rationale: “Profanar” conserva el peso ritual y moral del verbo en este contexto. “Casa de su padre” sigue el giro semítico sin sustituirlo por una paráfrasis más libre como “familia” o “linaje”.
- source_word: ወትሠረው፡ እምእስራኤል።
  english_pob_choice: and she shall be rooted out from Israel
  chosen_spanish: y será arrancada de Israel
  alternatives_spanish:
  - y será expulsada de Israel
  - y será extirpada de Israel
  lexicon: root out; Israel
  rationale: “Arrancada” reproduce la imagen de desarraigo del original y del inglés auditado. “Expulsada” suaviza demasiado; “extirpada” es posible, pero menos natural en español bíblico contemporáneo.
- source_word: ወኢይት ረከብ፡ ዘማ፡ ወርኵስ፡ በውስተ፡ እስራኤል።
  english_pob_choice: And let no fornicator or defiled person be found in Israel
  chosen_spanish: Y no se hallará en Israel ningún fornicario ni persona profanada
  alternatives_spanish:
  - Y no se encontrará en Israel ningún fornicador ni impuro
  - Y no habrá en Israel ningún fornicario ni profanado
  lexicon: fornicator; defiled person; found
  rationale: Conservo la forma impersonal/prescriptiva del inglés POB con “no se hallará”, que funciona bien en español legal-bíblico. “Persona profanada” traduce el paralelismo con el verbo de contaminación ritual sin imponer de entrada una sola lectura moral.
- source_word: ኵሎ፡ መዋዕለ፡ ትውልደ፡ ምድር።
  english_pob_choice: throughout all the days of the generations of the earth
  chosen_spanish: en todos los días de las generaciones de la tierra
  alternatives_spanish:
  - por todas las generaciones de la tierra
  - durante todos los días de las generaciones de la tierra
  lexicon: all the days; generations of the earth
  rationale: Sigo la revisión que corrigió el inglés a “all the days of the generations of the earth”; el español mantiene el idiomático “en todos los días” para preservar el temporal intensivo sin forzar un calco pesado.
- source_word: ቅዱስ፡ እስራኤል፡ ለእግዚአብሔር፡
  english_pob_choice: for Israel is holy to the LORD
  chosen_spanish: porque Israel es santo para Yahvé
  alternatives_spanish:
  - porque Israel es santo para el Señor
  - porque Israel es consagrado a Yahvé
  lexicon: holy; LORD
  rationale: Se mantiene “Yahvé” según la convención del proyecto para el nombre divino. “Santo” preserva el valor de consagración/separación del pueblo.
- source_word: ወኵሉ፡ ሰብእ፡ ዘአርኰሰ፡ ሞተ፡ ለይሙት፡
  english_pob_choice: and every man who defiles it shall surely die
  chosen_spanish: y todo hombre que lo profane ciertamente morirá
  alternatives_spanish:
  - y todo hombre que lo contamine sin duda morirá
  - y todo hombre que lo profane morirá de seguro
  lexicon: defile; surely die
  rationale: “Profane” enlaza con la elección anterior y mantiene el tono ritual-jurídico. “Ciertamente morirá” reproduce el énfasis del hebraísmo sin añadir explicaciones.
- source_word: በእብን፡ ይውግርዎ።
  english_pob_choice: they shall stone him with stones
  chosen_spanish: lo apedrearán con piedras
  alternatives_spanish:
  - lo lapidarán con piedras
  - lo apedrearán
  lexicon: stone; stones
  rationale: “Apedrearán con piedras” conserva el paralelismo enfático del original y del inglés. “Lapidarán” es correcto pero menos transparente para lectura pública amplia.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: Israel is holy to the LORD
  chosen_spanish_reading: Israel es santo para Yahvé
  alternative_spanish_readings:
  - Israel es santo para el Señor
  - Israel es santo ante Yahvé
  rationale: El proyecto exige traducir יהוה como “Yahvé” en el texto principal. Aquí el contexto habla de santidad del pueblo respecto del nombre divino, por lo que se mantiene el referente explícito sin ocultarlo tras una sustitución litúrgica.
  doctrine_reference: Nombre divino / tetragrámaton
- issue: Lenguaje de pureza sexual y ritual
  english_pob_reading: fornicator or defiled person
  chosen_spanish_reading: fornicario ni persona profanada
  alternative_spanish_readings:
  - fornicario ni impuro
  - adúltero ni profanado
  rationale: El pasaje combina transgresión sexual y contaminación ritual; “persona profanada” conserva la ambigüedad del original y evita reducir el término solo a impureza moral o sexual.
  doctrine_reference: Pureza ritual y santidad comunitaria
- issue: Muerte por lapidación
  english_pob_reading: they shall stone him with stones
  chosen_spanish_reading: lo apedrearán con piedras
  alternative_spanish_readings:
  - lo lapidarán
  - lo matarán a pedradas
  rationale: Mantengo la repetición enfática del original porque subraya el acto legal de ejecución. En español, “apedrear con piedras” comunica con claridad la forma concreta sin perder el énfasis.
  doctrine_reference: Sanción legal en la Torá y literatura afín
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para añadir el objeto femenino explícito (“her”) en la primera cláusula y para ajustar la expresión temporal a “throughout all the days of the generations of the earth”. La redacción española sigue esa revisión y conserva el valor intensivo de la fórmula temporal del geʿez.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para el tetragrámaton conforme a la terminología del proyecto.
  - Se conserva “profanar/profanada” para el campo semántico ritual-moral, en lugar de sustituirlo sistemáticamente por “impuro”.
  - 'La estructura de ejecución legal se traduce de forma transparente para lectura pública: quemar con fuego, arrancar de Israel, apedrear con piedras.'
