    issue: ‘persona profanada’ traduce de forma imprecisa ‘defiled person’
    rationale: En español, ‘profanada’ suele describir algo o alguien sobre quien se cometió una profanación. Aquí el sentido es el de una persona contaminada/impura. ‘Persona impura’ comunica mejor la fuerza ritual y moral sin distorsión.
  - severity: medium
    issue: Ambigüedad del pronombre en ‘todo hombre que lo profane’
    rationale: El antecedente de ‘lo’ puede no percibirse con claridad. Dado que el sentido es profanar a Israel en cuanto pueblo santo/comunidad santa, conviene explicitar ‘a Israel’ para evitar opacidad innecesaria en español.
  - severity: low
    issue: La nota a sobreexplica una ambigüedad innecesaria creada por una elección deficiente
    rationale: Si el texto principal se corrige a ‘persona impura’, la nota lexical alternativa deja de ser necesaria y conviene suprimirla para no introducir ruido interpretativo.
