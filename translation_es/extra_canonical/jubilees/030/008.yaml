base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/008.yaml
  text: They shall burn her with fire, because she has defiled the name of her father's house, and she shall be rooted out from Israel. And let no fornicator or defiled person be found in Israel throughout all the days of the generations of the earth, for Israel is holy to the LORD, and every man who defiles it shall surely die; they shall stone him with stones.
  footnotes:
