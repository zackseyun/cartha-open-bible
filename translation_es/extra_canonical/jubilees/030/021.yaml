translation:
  language: es
  text: 'Y sacaron a Dina, su hermana, de la casa de Siquem, y saquearon todo lo que había en Siquem: sus ovejas, sus vacas, sus asnos y todas sus posesiones y toda su riqueza, y lo llevaron todo a Jacob, su padre.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: house of Shechem
  english_pob_choice: the house of Shechem
  chosen_spanish: la casa de Siquem
  alternatives_spanish:
  - la casa de Shequem
  - la casa de Siquem
  lexicon: house / proper name
  rationale: Se conserva la referencia literal al lugar y el nombre propio bíblico con forma española reconocible y cercana al original inglés POB.
- source_word: plundered everything
  english_pob_choice: they plundered everything
  chosen_spanish: saquearon todo lo que había
  alternatives_spanish:
  - saquearon todo
  - despojaron de todo
  lexicon: plunder
  rationale: '"Saqueo" comunica bien la acción de despojo violento sin añadir matices no presentes; "todo lo que había" refleja el alcance inclusivo del verbo y del sustantivo del texto fuente.'
- source_word: possessions and all their wealth
  english_pob_choice: all their possessions and all their wealth
  chosen_spanish: todas sus posesiones y toda su riqueza
  alternatives_spanish:
  - todos sus bienes y toda su riqueza
  - todas sus posesiones y todos sus bienes
  lexicon: possessions / wealth
  rationale: Se mantienen dos términos en paralelo como en el inglés auditado. "Riqueza" conserva el posible matiz de bienes acumulados; se deja la leve tensión entre posesiones materiales y riqueza cuantiosa.
- source_word: brought everything to Jacob their father
  english_pob_choice: and they brought everything to Jacob their father
  chosen_spanish: y lo llevaron todo a Jacob, su padre
  alternatives_spanish:
  - y llevaron todo a Jacob, su padre
  - y trajeron todo a Jacob, su padre
  lexicon: bring
  rationale: '"Llevaron" es natural en español cuando el movimiento se expresa desde la perspectiva de los sujetos. El pronombre "lo" recoge el objeto totalizante "everything" y evita pérdida del final revisado del verso.'
theological_decisions:
- issue: Nombre del lugar y conservación del relato patriarcal
  english_pob_reading: Shechem / Jacob their father
  chosen_spanish_reading: Siquem / Jacob, su padre
  alternative_spanish_readings:
  - Shequem / Jacob, su padre
  - Siquem / Jacob su padre
  rationale: No hay decisión doctrinal, pero sí fidelidad narrativa al conservar los nombres propios y la relación de paternidad explícita, que forma parte del cierre del versículo en la fuente ge'ez y en la revisión inglesa.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se incorporó la cláusula final restaurada por la revisión auditable del inglés POB: el verso no termina en «toda su riqueza», sino que añade «y lo llevaron todo a Jacob, su padre». Por eso la traducción española incluye explícitamente ese final.'
  spanish_consistency_notes:
  - Se usó una cadencia de lista con dos puntos para reflejar la acumulación del original sin perder fluidez en español.
  - Se prefirió «Siquem» como forma española estable del topónimo, manteniendo la identificación con el Shechem del inglés auditado.
  - Se evitó sustituir la cláusula final por una nota interpretativa; el cierre revisado del verso permanece en el texto principal.
