lexical_decisions:
- source_word: እስመ፡ ከመዝ፡
  english_pob_choice: For thus
  chosen_spanish: Porque así
  alternatives_spanish:
  - Pues así
  - Porque de este modo
  lexicon: connector/resultative causal
  rationale: La secuencia introductoria expresa razón o fundamento; «Porque así» conserva el valor explicativo de la apertura sin volverla excesivamente solemne o arcaizante.
- source_word: ተሠርዐ፡
  english_pob_choice: it has been ordained
  chosen_spanish: ha sido ordenado
  alternatives_spanish:
  - ha sido establecido
  - ha sido dispuesto
  lexicon: divine passive / decree language
  rationale: El pasivo comunica una decisión ya fijada. «Ordenado» mantiene la fuerza normativa del texto y suena natural en español bíblico moderno.
- source_word: ወተጽሕፈ፡
  english_pob_choice: and written
  chosen_spanish: y escrito
  alternatives_spanish:
  - y registrado
  - y anotado
  lexicon: inscription/documentation
  rationale: La coordinación simple preserva la doble idea de decreto e inscripción. «Escrito» corresponde directamente al original sin añadir matiz interpretativo.
- source_word: ጽላተ፡ ሰማይ፡
  english_pob_choice: the heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas del cielo
  - las tablas celestes
  lexicon: heavenly tablets
  rationale: Se conserva la imagen técnica del texto con una forma idiomática en español. «Celestiales» mantiene el vínculo con el ámbito divino sin reemplazar la imagen por una explicación.
- source_word: በእንተ፡
  english_pob_choice: concerning
  chosen_spanish: respecto de
  alternatives_spanish:
  - acerca de
  - en cuanto a
  lexicon: prepositional relation / topic marker
  rationale: La expresión señala asunto o referencia temática. «Respecto de» es sobria y precisa en español escrito.
- source_word: ኵሉ፡ ዘርአ፡ እስራኤል፤
  english_pob_choice: all the seed of Israel
  chosen_spanish: toda la descendencia de Israel
  alternatives_spanish:
  - toda la simiente de Israel
  - todo el linaje de Israel
  lexicon: seed / offspring / lineage
  rationale: «Descendencia» comunica la idea colectiva de «seed» sin el arcaísmo fuerte de «simiente». Mantiene el alcance total indicado por «all».
theological_decisions:
- issue: Destino/autoridad de lo escrito en las tablas celestiales
  english_pob_reading: it has been ordained and written on the heavenly tablets
  chosen_spanish_reading: ha sido ordenado y escrito en las tablas celestiales
  alternative_spanish_readings:
  - ha sido decretado y escrito en las tablas celestiales
  - ha sido dispuesto y escrito en las tablas celestiales
  rationale: El texto presenta una fórmula de autoridad preestablecida. «Ordenado» conserva la idea de decreto/mandato sin sobretraducir a un lenguaje técnico ajeno al pasaje.
  doctrine_reference: Providencia divina y registro celestial en la literatura de Jubileos
translation_notes:
  revision_awareness: 'La versión inglesa POB y la revisión más reciente coinciden plenamente con la lectura del ge’ez: un enunciado causal seguido de un pasivo de decreto y una referencia a las tablas celestiales acerca de toda la descendencia de Israel. No se detectaron cambios editoriales ni tensiones textuales que exijan nota.'
  spanish_consistency_notes:
  - Se preserva «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece.
  - Se mantiene el registro bíblico sobrio sin introducir glosas explicativas no presentes en la fuente.
  - «Tablas celestiales» se deja como imagen textual reconocible, sin sustituirla por un término doctrinal más interpretativo.
