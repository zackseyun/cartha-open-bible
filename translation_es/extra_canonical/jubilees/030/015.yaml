  to: o si hay una de sus hijas que él ha dado a un hombre de cualquiera de las naciones. Porque es plaga sobre plaga[a], y maldición sobre maldición; y vendrá todo juicio, plaga y maldición. Y si hace esta cosa, o si cierra sus ojos ante los que hacen impureza y ante los que contaminan el santuario de Yahvé y ante los que profanan su santo nombre, todo el pueblo, en conjunto, será juzgado por toda la impureza y la profanación. Y no habrá acepción de personas, ni se recibirá de su mano fruto, ni sacrificio, ni holocausto, ni grasa, ni la fragancia de un aroma agradable, para que sea aceptado. Así es con todo varón o mujer en Israel que contamina su santuario.
