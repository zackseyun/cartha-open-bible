base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/015.yaml
  text: or if there is one from his daughters whom he has given to a man from any of the nations. For it is plague upon plague[15], and curse upon curse; and every judgment and plague and curse will come. And if he does this thing, or if he closes his eyes to those who do uncleanness and to those who defile the sanctuary of the LORD and to those who profane his holy name, all the people together will be judged for all the uncleanness and profanation. And there will be no partiality, and no receiving from his hand fruit or sacrifice or burnt offering or fat or the fragrance of a pleasing aroma, so that it should be accepted. So it is with every man or woman in Israel who defiles his sanctuary.
  footnotes:
  - marker: '15'
    text: Verse 15 is unusually dense and likely compresses several legal and cultic statements. The translation preserves the sequence of uncleanness, public guilt, lack of partiality, and rejected offerings without heavy smoothing.
    reason: segmentation_note
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:31Z'
    unchanged: false
    changes_summary: Revised only the final clause from 'So it is with' to 'So it is with every man or woman in Israel who defiles his sanctuary' for smoother formal English while preserving the sense; otherwise the draft is accurate and complete for this verse segment.
translation:
  language: es
  text: o si hay una de sus hijas que él ha dado a un hombre de cualquiera de las naciones. Porque es plaga sobre plaga[a], y maldición sobre maldición; y vendrá todo juicio, plaga y maldición. Y si hace esta cosa, o si cierra sus ojos ante los que hacen impureza y ante los que contaminan el santuario de Yahvé y ante los que profanan su santo nombre, todo el pueblo, en conjunto, será juzgado por toda la impureza y la profanación. Y no habrá acepción de personas, ni se recibirá de su mano fruto, ni sacrificio, ni holocausto, ni grasa, ni la fragancia de un aroma agradable, para que sea aceptado. Así es con todo varón o mujer en Israel que contamina su santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La secuencia 'plaga sobre plaga, y maldición sobre maldición' reproduce la densidad del original, que acumula juicio sobre juicio sin suavizar la repetición.
    reason: segmentation_note
lexical_decisions:
- source_word: አሕዛብ / nations
  english_pob_choice: any of the nations
  chosen_spanish: cualquiera de las naciones
  alternatives_spanish:
  - las naciones
  - cualquier nación
  lexicon: gentes/naciones
  rationale: Mantengo la referencia étnico-cultual amplia del texto, sin convertirla en un término técnico posterior. 'Cualquiera de las naciones' reproduce la apertura del plural y el matiz de pertenencia externa al pueblo de Israel.
- source_word: መቅሠፍት / plague
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - castigo
  - azote
  lexicon: plaga
  rationale: '''Plaga'' conserva la fuerza de calamidad/jucio que la POB refleja con ''plague'' y funciona bien con la repetición enfática ''plaga sobre plaga''. ''Azote'' sería posible, pero ''plaga'' queda más cercano al patrón del texto.'
- source_word: መርገም / curse
  english_pob_choice: curse
  chosen_spanish: maldición
  alternatives_spanish:
  - anatema
  - maldecimiento
  lexicon: maldición
  rationale: '''Maldición'' es la equivalencia natural y transparente en español para el paralelismo del pasaje. ''Anatema'' introduciría una carga eclesial posterior que el contexto no requiere.'
- source_word: ተዐወረ አዕይንቲሁ / closes his eyes
  english_pob_choice: closes his eyes
  chosen_spanish: cierra sus ojos
  alternatives_spanish:
  - hace la vista gorda
  - se hace el ciego
  lexicon: cerrar los ojos
  rationale: Conservo la imagen verbal literal del original y de la POB. En español moderno, 'cierra sus ojos' es entendible y retiene la idea de omisión deliberada sin reemplazarla por una paráfrasis coloquial.
- source_word: ያረኵሱ / defile
  english_pob_choice: defile
  chosen_spanish: profanan
  alternatives_spanish:
  - contaminan
  - manchan
  lexicon: profanar
  rationale: La POB distingue la profanación del santuario y del nombre. 'Profanar' es la opción más precisa en contexto sagrado, y evita reducir el verbo a suciedad ritual general.
- source_word: መቅደሶ / his sanctuary
  english_pob_choice: his sanctuary
  chosen_spanish: el santuario de Yahvé
  alternatives_spanish:
  - su santuario
  - su santuario santo
  lexicon: santuario
  rationale: En el verso, el santuario es de Yahvé por contexto inmediato. Opté por explicitar el poseedor divino para claridad española y coherencia con el uso del nombre divino, sin oscurecer la referencia del posesivo original.
- source_word: ስሞ፡ ቅዱሰ፡ / his holy name
  english_pob_choice: his holy name
  chosen_spanish: su santo nombre
  alternatives_spanish:
  - su nombre santo
  - el santo nombre de Yahvé
  lexicon: nombre santo
  rationale: Mantengo la estructura posesiva del texto. 'Santo' antes de 'nombre' es natural y conserva la dignidad sacra del sintagma.
- source_word: አድልዎ ለገጽ / partiality / receiving of face
  english_pob_choice: no partiality
  chosen_spanish: no habrá acepción de personas
  alternatives_spanish:
  - no habrá favoritismo
  - no se hará distinción de personas
  lexicon: acepción de personas
  rationale: La frase tradicional 'acepción de personas' comunica con precisión la idea jurídica de imparcialidad y mantiene la correspondencia con el lenguaje bíblico técnico, mientras evita una simplificación meramente psicológica.
- source_word: እምእዴሁ / from his hand
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su mano propia
  - de él
  lexicon: mano
  rationale: Preservo el hebraísmo/semitismo de 'mano' como fuente de entrega o recepción, que en español bíblico sigue siendo inteligible y no requiere normalización.
- source_word: ፍሬ፣ መሥዋዕተ፣ ጽንሓሐ፣ ስብሐ፣ ትምዐዘ መዐዛ ሠናይ / fruit, sacrifice, burnt offering, fat, fragrance of a pleasing aroma
  english_pob_choice: fruit or sacrifice or burnt offering or fat or the fragrance of a pleasing aroma
  chosen_spanish: fruto, ni sacrificio, ni holocausto, ni grasa, ni la fragancia de un aroma agradable
  alternatives_spanish:
  - fruto, sacrificio, holocausto, sebo y olor grato
  - ofrenda, sacrificio, holocausto, grasa y aroma agradable
  lexicon: ofrendas/sacrificios
  rationale: Conservo la serie cultual sin suavizarla. 'Holocausto' es la equivalencia estable para burnt offering; 'grasa' mantiene la literalidad del texto, aunque en español bíblico también podría decirse 'sebo'. 'Fragancia de un aroma agradable' retiene la acumulación semítica del original y de la POB.
- source_word: ይትወከፎ / be accepted
  english_pob_choice: it should be accepted
  chosen_spanish: sea aceptado
  alternatives_spanish:
  - sea recibido
  - sea aceptable
  lexicon: aceptar/recibir
  rationale: El pasivo expresa el resultado cultual esperado; 'sea aceptado' mantiene el valor sacrificial y la correspondencia con la POB.
- source_word: ዘያረኵስ መቅደሶ / who defiles his sanctuary
  english_pob_choice: who defiles his sanctuary
  chosen_spanish: que profana su santuario
  alternatives_spanish:
  - que contamina su santuario
  - que deshonra su santuario
  lexicon: profanar
  rationale: La cláusula final resume el alcance general de la advertencia. 'Profana' guarda la misma raíz conceptual que en la primera mitad del verso y preserva el paralelismo.
theological_decisions:
- issue: Imparcialidad del juicio comunitario
  english_pob_reading: all the people together will be judged
  chosen_spanish_reading: todo el pueblo, en conjunto, será juzgado
  alternative_spanish_readings:
  - toda la asamblea será juzgada
  - todo el pueblo será juzgado junto
  rationale: 'Sigo el sentido corporativo fuerte del texto: la culpa no queda aislada al agente, sino que alcanza al pueblo como conjunto. ''En conjunto'' preserva la idea de colectividad sin introducir un término técnico que no aparece en el contexto.'
  doctrine_reference: responsabilidad comunitaria / juicio corporativo
- issue: Lenguaje de profanación del santuario y del nombre
  english_pob_reading: those who defile the sanctuary of the LORD and those who profane his holy name
  chosen_spanish_reading: los que profanan el santuario de Yahvé y los que profanan su santo nombre
  alternative_spanish_readings:
  - los que contaminan el santuario de Yahvé y los que blasfeman su santo nombre
  - los que profanan su santuario y su nombre santo
  rationale: 'Mantengo dos actos relacionados pero distintos: violación del espacio sagrado y profanación del nombre. No fusiono ambos, porque el texto los coordina como ofensas separadas.'
  doctrine_reference: santidad del nombre divino y del espacio sagrado
- issue: Rechazo de ofrendas en contexto de culpa ritual
  english_pob_reading: no receiving from his hand fruit or sacrifice or burnt offering or fat or the fragrance of a pleasing aroma
  chosen_spanish_reading: no se recibirá de su mano fruto, ni sacrificio, ni holocausto, ni grasa, ni la fragancia de un aroma agradable
  alternative_spanish_readings:
  - no se aceptará de su mano fruto, sacrificio, holocausto, grasa ni olor grato
  - no recibirá nada de su mano como ofrenda
  rationale: 'El punto teológico es la invalidez cultual de ofrendas cuando persiste la impureza/profanación. Conservo la lista extensa para no borrar la tensión legal: no basta la ofrenda si hay impureza no corregida.'
  doctrine_reference: pureza ritual / integridad del culto
translation_notes:
  revision_awareness: 'Se siguió la lectura final del inglés auditado, incluyendo la clausula conclusiva más amplia: ''every man or woman in Israel who defiles his sanctuary'' quedó resumida en español como ''todo varón o mujer en Israel que profana su santuario''. No se aplanó la densidad legal del verso ni se omitió la lista cultual de rechazo de ofrendas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - Se mantiene 'Mesías/Cristo' fuera del verso porque no aparece aquí.
  - Se conserva 'profanar' de manera consistente para santuario y nombre santo.
  - Se usa 'esclavo' no porque no aplique en este verso, sino porque no hay δοῦλος aquí; no se introdujo terminología ajena.
  - La puntuación conserva la acumulación paratáctica del original y de la POB, con comas y 'ni' repetidos para la serie cultual.
