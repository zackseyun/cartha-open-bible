  source_alignment_summary: 'El borrador español sigue de cerca la secuencia principal del texto fuente y del POB inglés: hija dada a un hombre de las naciones, acumulación de plaga/maldición, culpa por tolerar impureza, juicio corporativo, falta de parcialidad y rechazo de ofrendas. Sin embargo, hay un desajuste léxico importante: el texto distingue entre los que hacen ''impureza'' y los que ''contaminan/profanan el santuario''; el borrador repite ''profanan'' para ambos, borrando la distinción presente en el inglés y reflejada en el source payload. También conviene ajustar la última cláusula para mantener la misma distinción con ''contamina su santuario'' en vez de ''profana su santuario''.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Acepción de personas' es comprensible en registro bíblico, y la sintaxis general funciona bien. No obstante, 'Así ocurre con' suena algo interpretativo frente a la cláusula conclusiva más directa del POB; 'Así es con' o una formulación equivalente conserva mejor la compresión del original. La repetición cultual extensa está bien preservada.
  glossary_alignment: 'Buen alineamiento con los términos del proyecto: ''Yahvé'' se usa correctamente; el lenguaje cultual se mantiene; no hay conflictos con los glosarios mayores. La principal corrección es no aplanar el contraste entre impureza/profanación: ይገብሩ ርኵሰ corresponde mejor a ''hacen impureza'' o ''cometen impureza'', mientras ያረኵሱ መቅደሶ corresponde mejor a ''contaminan/profanan su santuario''.'
  issues:
  - severity: high
    issue: Se pierde la distinción entre impureza general y contaminación/profanación del santuario
    rationale: El source payload y el POB inglés distinguen 'those who do uncleanness' de 'those who defile the sanctuary'. El borrador usa 'profanan' para ambos, lo que fusiona dos ofensas separadas.
  - severity: medium
    issue: La cláusula final repite 'profana su santuario' donde conviene reflejar 'defiles/contaminates'
    rationale: Para preservar el paralelismo con la distinción anterior y evitar sobreusar 'profanar', 'contamina su santuario' refleja mejor la categoría ritual del pasaje.
  - severity: low
    issue: '''Así ocurre con'' añade un matiz explicativo algo más libre'
    rationale: Una forma más literal y compacta como 'Así es con' conserva mejor el cierre resumido del texto inglés/gez.
  revised_spanish_text: o si hay una de sus hijas que él ha dado a un hombre de cualquiera de las naciones. Porque es plaga sobre plaga[a], y maldición sobre maldición; y vendrá todo juicio, plaga y maldición. Y si hace esta cosa, o si cierra sus ojos ante los que hacen impureza y ante los que contaminan el santuario de Yahvé y ante los que profanan su santo nombre, todo el pueblo, en conjunto, será juzgado por toda la impureza y la profanación. Y no habrá acepción de personas, ni se recibirá de su mano fruto, ni sacrificio, ni holocausto, ni grasa, ni la fragancia de un aroma agradable, para que sea aceptado. Así es con todo varón o mujer en Israel que contamina su santuario.
  revised_footnotes:
  - marker: a
    text: La secuencia 'plaga sobre plaga, y maldición sobre maldición' reproduce la densidad del original, que acumula juicio sobre juicio sin suavizar la repetición.
    reason: segmentation_note
  revision_rationale: 'La revisión corrige el punto principal de fidelidad semántica: el texto distingue entre hacer impureza, contaminar el santuario y profanar el nombre santo. También ajusta la cláusula final para conservar ese contraste ritual y simplifica levemente el cierre para sonar más natural sin alejarse del original. La nota existente se conserva, con razón mejor alineada al comentario del POB inglés sobre la densidad del verso.'
