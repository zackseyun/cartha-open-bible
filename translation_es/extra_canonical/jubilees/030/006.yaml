base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/006.yaml
  text: because they had committed shame in Israel. And the LORD delivered them into the hand of Jacob's sons so that they might destroy them with the sword and do this to them, and so that it might not be done again,
  footnotes:
  - marker: a
    text: Or 'kill them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:59Z'
    unchanged: false
    changes_summary: Replaced interpretive 'execute judgment on them' with the more direct 'kill them with the sword' to reflect the source more closely. Removed the added expansion 'in Israel, to defile an Israelite virgin,' which is not present in this verse's source text. Kept the final clause concise as 'so that it might not be done again' to match the extant wording without importing material from context.
translation:
  language: es
  text: porque habían cometido una deshonra en Israel. Y Yahvé los entregó en manos de los hijos de Jacob, para que los destruyeran con la espada y les hicieran esto, y para que no volviera a hacerse.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኀፍረተ (shame/disgrace)
  english_pob_choice: committed shame
  chosen_spanish: habían cometido vergüenza
  alternatives_spanish:
  - habían cometido deshonra
  - habían cometido una vergüenza
  - habían obrado vergonzosamente
  lexicon: Ge'ez ኀፍረት / ኀፍረሰ semántica de vergüenza, deshonra, afrenta
  rationale: La frase ge'ez expresa una acción que trae deshonra pública; 'cometido vergüenza' conserva la estructura causal del texto fuente y el sustantivo de afrenta sin suavizarlo a una simple paráfrasis moral.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: nombre divino
  rationale: Se sigue el estándar del proyecto para el tetragrámaton/nombre divino. Aquí el ge'ez nombra a Dios como agente que entrega, por lo que 'Yahvé' es el equivalente auditable y no una máscara litúrgica.
- source_word: መጠዎሙ ... ውስተ እዴ፣ 'deliver into the hand'
  english_pob_choice: delivered them into the hand
  chosen_spanish: los entregó en manos
  alternatives_spanish:
  - los puso en manos
  - los entregó en la mano
  lexicon: idioma semítico de entrega a poder/control
  rationale: '''En manos de'' reproduce el giro bíblico de sujeción o dominio; en español pluraliza naturalmente ''manos'' y evita la calca dura ''en la mano''.'
- source_word: ይሠርውዎሙ
  english_pob_choice: destroy them
  chosen_spanish: los destruyeran
  alternatives_spanish:
  - los mataran
  - los exterminaran
  - los aniquilaran
  lexicon: Ge'ez ሠረወ con valor de destruir/erradicar
  rationale: La revisión auditada corrigió 'kill them' a 'destroy them' por la fuerza del verbo ge'ez, que sugiere erradicación o exterminio más que el mero acto de matar. 'Destruyeran' preserva esa intensidad sin introducir una precisión técnica no explicitada.
- source_word: በሰይፍ
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - a espada
  - por la espada
  lexicon: arma / instrumento de violencia judicial o bélica
  rationale: '''Con la espada'' es la equivalencia española más natural y fiel al instrumento indicado.'
- source_word: ይግበሩ ላዕሌሆሙ ዝንተ
  english_pob_choice: do this to them
  chosen_spanish: les hicieran esto
  alternatives_spanish:
  - les hicieran así
  - lo hicieran contra ellos
  - les hicieran esto mismo
  lexicon: demostrativo anafórico + verbo genérico de acción
  rationale: El ge'ez usa una referencia demostrativa abierta que no especifica el acto en detalle. 'Esto' mantiene la vaguedad intencional del original sin expandir el contenido.
- source_word: ወከመ፡ ኢይኩን
  english_pob_choice: and so that it might not be done again
  chosen_spanish: y para que no se volviera a hacer
  alternatives_spanish:
  - y para que no sucediera otra vez
  - y para que no volviera a ocurrir
  - y para que no se hiciera de nuevo
  lexicon: finalidad negativa / impersonal
  rationale: La clausula final es impersonal y preventiva. 'No se volviera a hacer' conserva la pasiva/impersonalidad española y el valor de repetición prohibida, sin añadir objetos o especificaciones ausentes.
theological_decisions:
- issue: Nombre divino en un contexto de castigo y entrega
  english_pob_reading: the LORD delivered them
  chosen_spanish_reading: Yahvé los entregó
  alternative_spanish_readings:
  - el Señor los entregó
  - Dios los entregó
  rationale: El texto atribuye la acción a Dios mediante el nombre divino, no a un título genérico. Mantener 'Yahvé' preserva la identificación auditable del agente divino y la política terminológica del proyecto.
  doctrine_reference: Éxodo 3:15; uso del nombre divino en traducciones directas
- issue: 'Alcance del acto violento: destruir vs. matar'
  english_pob_reading: destroy them with the sword
  chosen_spanish_reading: los destruyeran con la espada
  alternative_spanish_readings:
  - los mataran con la espada
  - los exterminaran con la espada
  rationale: La revisión textual más reciente corrigió la lectura hacia una destrucción más fuerte que 'matar'. En español, 'destruyeran' mantiene esa fuerza, pero sin forzar una terminología teológica adicional que el verso no formula.
  doctrine_reference: Jubileos 30:6 en relación con la retribución y la preservación de la pureza del pacto
translation_notes:
  revision_awareness: Se siguió la revisión auditada más reciente que reemplazó 'kill them with the sword' por la lectura más fuerte 'destroy them with the sword', y se mantuvo el cierre breve 'so that it might not be done again' sin importar expansiones contextuales que fueron eliminadas en la corrección. También se respetó el nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - 'Se mantuvo la terminología del proyecto para el nombre divino: ''Yahvé''.'
  - '''Espada'' se usó de manera consistente para בְּ/בַּסֶּיֶף / በሰይፍ.'
  - No se añadió una nota de pie porque el texto español no contiene ambigüedad adicional que requiera marcador.
  - La sintaxis española conserva la relación causal ('porque') y final ('para que') del original sin convertirla en paráfrasis interpretativa.
