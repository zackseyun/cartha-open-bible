review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el mandato a Moisés y la prohibición matrimonial con las naciones, pero se desvía en un punto clave: el ge''ez ወአስምዕ፡ ላዕሌሆሙ, según la auditoría inglesa, aquí significa ‘testificar/advertirles’, no ‘dar testimonio contra ellos’. El añadido ‘contra’ endurece y desplaza el sentido hacia una formulación judicial adversativa que el POB inglés revisado evitó. También conviene ajustar la nota para reflejar la alternativa documentada en inglés.'
  spanish_quality_summary: El español es claro y de registro adecuado, pero ‘da testimonio contra ellos’ suena algo forzado en este contexto exhortativo. ‘Adviérteles’ o ‘dales testimonio’ sería más natural; ‘adviérteles’ además comunica bien el valor idiomático de advertencia solemne. El resto del versículo es legible y fiel. ‘Tomar esposas para sus hijos’ es comprensible, aunque algo literal; no requiere cambio obligado.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. Los términos ‘Moisés’, ‘hijos de Israel’, ‘naciones’ y ‘esposas’ son aceptables. La principal corrección es semántica/idiomática en el verbo de advertencia/testimonio.
  issues:
  - severity: high
    issue: ‘da testimonio contra ellos’ introduce un matiz no respaldado por la auditoría inglesa
    rationale: La revisión inglesa cambió ‘make it heard to them’ a ‘testify to them’, no ‘against them’. El ge'ez puede tener fuerza de advertencia o testimonio dirigido a ellos, pero ‘contra ellos’ en español sobreinterpreta el pasaje.
  - severity: medium
    issue: La nota al pie actual no refleja bien la alternativa auditada
    rationale: La nota ‘O “dar testimonio a ellos”’ suena poco natural en español y no corresponde al alternante inglés documentado, que es ‘hacerlo oír a ellos / hacer que lo oigan’.
  revised_spanish_text: Y tú, Moisés, ordena a los hijos de Israel y adviérteles[a] que no deben dar ninguna de sus hijas a las naciones, ni tomar esposas para sus hijos de entre las hijas de las naciones.
  revised_footnotes:
  - marker: a
    text: O ‘haz que lo oigan’.
    reason: Refleja la alternativa más literal documentada en la auditoría inglesa previa (‘make it heard to them’), mientras el texto principal usa una expresión española más natural para el sentido idiomático de advertencia/testimonio.
  revision_rationale: Se reemplaza ‘da testimonio contra ellos’ por ‘adviérteles’ para conservar el sentido idiomático ge'ez reconocido por la auditoría inglesa (‘testify to them’ con fuerza de advertencia), sin añadir el matiz adversativo de ‘contra’. Se actualiza la nota para preservar la alternativa literal histórica de forma natural en español.
