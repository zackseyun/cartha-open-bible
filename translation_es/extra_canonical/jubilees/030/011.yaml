revisions:
- from: Y tú, Moisés, ordena a los hijos de Israel y da testimonio contra ellos[a] de que no deben dar ninguna de sus hijas a las naciones, ni tomar esposas para sus hijos de entre las hijas de las naciones.
  to: Y tú, Moisés, ordena a los hijos de Israel y adviérteles[a] que no deben dar ninguna de sus hijas a las naciones, ni tomar esposas para sus hijos de entre las hijas de las naciones.
  rationale: Se reemplaza ‘da testimonio contra ellos’ por ‘adviérteles’ para conservar el sentido idiomático ge'ez reconocido por la auditoría inglesa (‘testify to them’ con fuerza de advertencia), sin añadir el matiz adversativo de ‘contra’. Se actualiza la nota para preservar la alternativa literal histórica de forma natural en español.
