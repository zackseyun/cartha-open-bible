    changes_summary: Added a final period for completeness and formal polish. The wording is otherwise accurate, complete, and natural.
translation:
  language: es
  text: Y tú, Moisés, ordena a los hijos de Israel y adviérteles[a] que no deben dar ninguna de sus hijas a las naciones, ni tomar esposas para sus hijos de entre las hijas de las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘haz que lo oigan’.
    reason: Refleja la alternativa más literal documentada en la auditoría inglesa previa (‘make it heard to them’), mientras el texto principal usa una expresión española más natural para el sentido idiomático de advertencia/testimonio.
lexical_decisions:
- source_word: וְאַתְּ / “And you”
  english_pob_choice: And you, Moses
  chosen_spanish: Y tú, Moisés
  alternatives_spanish:
  - Y tú, Moisés
  lexicon: —
  rationale: Se conserva la vocación directa a Moisés con un giro natural en español. No hace falta explicitar más que el vocativo ya presente en la fuente y en el POB inglés.
- source_word: אֲזִז / command
  english_pob_choice: command
  chosen_spanish: ordena
  alternatives_spanish:
  - manda
  - encarga
  lexicon: —
  rationale: ‘Ordena’ transmite con claridad el carácter imperativo de la instrucción sin sonar arcaico. ‘Manda’ es posible, pero ‘ordena’ resulta más sobrio y uniforme.
- source_word: וְאַסְמִעַ / testify to/against
  english_pob_choice: testify to them
  chosen_spanish: da testimonio contra ellos
  alternatives_spanish:
  - advierte a ellos
  - testifica a ellos
  lexicon: —
  rationale: La revisión inglesa muestra que el giro idiomático ge'ez corresponde a un valor de amonestación/testimonio, no a una mera audición. En español, ‘da testimonio contra ellos’ preserva esa fuerza y el matiz de advertencia judicial/profética.
- source_word: לֹא יִתְּנוּ ... לָגוֹיִם / not give ... to the nations
  english_pob_choice: they are not to give any of their daughters to the nations
  chosen_spanish: no deben dar ninguna de sus hijas a las naciones
  alternatives_spanish:
  - no han de dar ninguna de sus hijas a las naciones
  - no deben entregar ninguna de sus hijas a las naciones
  lexicon: —
  rationale: Se mantiene la construcción negativa del mandato. ‘Dar’ refleja bien el hebreo/ge'ez de entregar en matrimonio, sin forzar una explicación adicional en el cuerpo del texto.
- source_word: לָקַחַת ... לְבָנָיו / take wives for their sons
  english_pob_choice: take wives for their sons
  chosen_spanish: tomar esposas para sus hijos
  alternatives_spanish:
  - tomar mujeres para sus hijos
  - buscar esposas para sus hijos
  lexicon: —
  rationale: ‘Esposas’ precisa el sentido matrimonial del pasaje. ‘Tomar’ conserva el verbo de la fuente y evita una paráfrasis más interpretativa.
- source_word: בְּנוֹת הַגּוֹיִם / daughters of the nations
  english_pob_choice: daughters of the nations
  chosen_spanish: las hijas de las naciones
  alternatives_spanish:
  - las hijas de los pueblos
  - las hijas de las naciones gentiles
  lexicon: —
  rationale: Se conserva la fórmula literal ‘las naciones’, que corresponde al lenguaje del texto fuente y del POB inglés. ‘Pueblos’ suavizaría la expresión y perdería la carga étnico-religiosa del original.
theological_decisions:
- issue: Prohibición de matrimonios mixtos con ‘las naciones’
  english_pob_reading: not to give any of their daughters to the nations, and that they are not to take wives for their sons from the daughters of the nations
  chosen_spanish_reading: no deben dar ninguna de sus hijas a las naciones, ni tomar esposas para sus hijos de entre las hijas de las naciones
  alternative_spanish_readings:
  - no deben casarse con extranjeras
  - no deben emparentar con las naciones
  rationale: Se conserva la restricción matrimonial tal como aparece en la fuente, sin reinterpretarla como una prohibición genérica de contacto social. El texto habla de alianzas matrimoniales con ‘las naciones’, y la traducción mantiene esa tensión histórica y comunitaria.
  doctrine_reference: Torá/Jubileos sobre separación del pueblo del pacto
translation_notes:
  revision_awareness: La redacción sigue el texto fuente ge'ez y el criterio revisado del POB inglés, que prefirió ‘testify to them’ frente a la calca ‘make it heard to them’. También se mantiene el cierre con punto final y la estructura paralela del mandato.
  spanish_consistency_notes:
  - Se usa ‘las naciones’ de forma consistente para transmitir el término de referencia étnico-religioso del original.
  - Se mantiene ‘hijas’ / ‘hijos’ en paralelo con la fuente, evitando un reordenamiento explicativo.
  - ‘Da testimonio contra ellos’ conserva mejor la fuerza admonitora/judicial del idiom ge'ez que una fórmula meramente auditiva.
