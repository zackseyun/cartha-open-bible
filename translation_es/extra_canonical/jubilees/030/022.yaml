    changes_summary: Changed ‘the LORD’ to ‘Yahweh’ for consistency with POB rendering of the divine name.
translation:
  language: es
  text: y trajeron todo a Jacob, su padre. Y él les habló por haber destruido[a] la ciudad, porque temía a los que habitaban en la tierra, los cananeos y los perizitas. Y el terror de Yahvé estaba sobre todas las ciudades alrededor de Siquem, y no se levantaron para perseguir a los hijos de Jacob, porque el pavor había caído sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'matar la ciudad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: brought it all
  english_pob_choice: they brought it all
  chosen_spanish: lo llevaron todo
  alternatives_spanish:
  - trajeron todo
  - lo trajeron todo
  lexicon: llevar / traer
  rationale: El inglés POB usa un verbo de traslado con objeto total. En español, 'llevar' funciona bien desde la perspectiva del grupo que regresa hacia Jacob; 'lo' recoge el conjunto de bienes sin añadir precisión no atestiguada.
- source_word: their father
  english_pob_choice: Jacob their father
  chosen_spanish: Jacob, su padre
  alternatives_spanish:
  - a Jacob, su padre
  - Jacob su padre
  lexicon: Jacob
  rationale: Se conserva la aposición explícita del parentesco, naturalizando la sintaxis española con coma para fluidez y claridad.
- source_word: he spoke with them about
  english_pob_choice: And he spoke with them about
  chosen_spanish: Y él les habló acerca de
  alternatives_spanish:
  - Y les habló de
  - Y les habló acerca de
  lexicon: hablar acerca de
  rationale: La frase transmite conversación o reprensión sobre un hecho. 'Habló acerca de' conserva ese alcance sin introducir una interpretación más fuerte que el texto.
- source_word: destroyed the city
  english_pob_choice: destroyed the city
  chosen_spanish: haber destruido la ciudad
  alternatives_spanish:
  - haber arrasado la ciudad
  - haber matado la ciudad
  lexicon: destruir
  rationale: El audit trail inglés ya resolvió la idiomática ge'ez hacia 'destroyed' por naturalidad. En español, 'destruir' reproduce esa solución y evita el calco duro de 'matar la ciudad', que suena extraño.
- source_word: those who lived in the land
  english_pob_choice: those who lived in the land
  chosen_spanish: a los que habitaban en la tierra
  alternatives_spanish:
  - a los que vivían en la tierra
  - a los habitantes de la tierra
  lexicon: habitar
  rationale: '''Habitar'' conserva un matiz más bíblico y formal que ''vivir'', sin perder inteligibilidad. Se mantiene la referencia general a los pobladores locales.'
- source_word: the Canaanites and the Perizzites
  english_pob_choice: the Canaanites and the Perizzites
  chosen_spanish: los cananeos y los perizitas
  alternatives_spanish:
  - los cananeos y los ferezeos
  lexicon: etnónimos
  rationale: Se sigue de cerca el nombre tribal en forma castellana estándar. 'Perizitas' corresponde al transliterado del paquete fuente y evita sustituirlo por una forma tradicional no atestiguada en este expediente.
- source_word: the terror of Yahweh
  english_pob_choice: the terror of Yahweh
  chosen_spanish: el terror de Yahvé
  alternatives_spanish:
  - el temor de Yahvé
  - el pavor de Yahvé
  lexicon: terror
  rationale: Se conserva 'terror' porque el inglés POB lo documenta explícitamente y comunica la fuerza temible de la intervención divina. 'Temor' o 'pavor' suavizarían o desplazarían el término.
- source_word: on all the cities around Shechem
  english_pob_choice: on all the cities around Shechem
  chosen_spanish: sobre todas las ciudades alrededor de Siquem
  alternatives_spanish:
  - sobre todas las ciudades en torno a Siquem
  - sobre todas las ciudades de alrededor de Siquem
  lexicon: alrededor
  rationale: '''Alrededor de Siquem'' es una construcción transparente y fiel. ''Siquem'' es la forma castellana habitual del topónimo.'
- source_word: they did not rise up to pursue
  english_pob_choice: they did not rise up to pursue
  chosen_spanish: no se levantaron para perseguir
  alternatives_spanish:
  - no se alzaron para perseguir
  - no se pusieron en pie para perseguir
  lexicon: levantarse / perseguir
  rationale: '''Levantarse para perseguir'' reproduce el giro semítico subyacente sin exagerar la imagen. Mantiene el matiz de reacción militar ausente.'
- source_word: the sons of Jacob
  english_pob_choice: the sons of Jacob
  chosen_spanish: a los hijos de Jacob
  alternatives_spanish:
  - a los hijos de Jacob
  lexicon: hijos de Jacob
  rationale: Se conserva la expresión familiar y genealógica estándar sin variación.
- source_word: dread had fallen on them
  english_pob_choice: dread had fallen on them
  chosen_spanish: el pavor había caído sobre ellos
  alternatives_spanish:
  - el espanto había caído sobre ellos
  - el temor había caído sobre ellos
  lexicon: pavor
  rationale: '''Caído sobre ellos'' mantiene la metáfora de invasión súbita. ''Pavor'' recoge mejor la intensidad del sustantivo final que ''temor''.'
theological_decisions:
- issue: Divine name rendering
  english_pob_reading: the terror of Yahweh
  chosen_spanish_reading: el terror de Yahvé
  alternative_spanish_readings:
  - el terror del SEÑOR
  - el terror de Jehová
  rationale: La política POB usa 'Yahvé' para יהוה; aquí la lectura inglesa ya fue revisada a Yahweh. En español se sigue la terminología proyectiva del proyecto y no el ocultamiento reverencial tradicional.
  doctrine_reference: Nombre divino en traducción bíblica; consistencia editorial POB.
- issue: Violent idiom for the city
  english_pob_reading: destroyed the city
  chosen_spanish_reading: haber destruido la ciudad
  alternative_spanish_readings:
  - haber arrasado la ciudad
  - haber matado la ciudad
  rationale: Se evita borrar la tensión idiomática, pero se adopta la solución ya adjudicada en inglés para no repetir el giro literal 'matar la ciudad', que en español sería innecesariamente opaco.
  doctrine_reference: Metonimia/idioma semítico; fidelidad semántica sin calco mecánico.
- issue: Fear as divine protection
  english_pob_reading: the terror of Yahweh was on all the cities ... and they did not rise up to pursue
  chosen_spanish_reading: el terror de Yahvé estaba sobre todas las ciudades ... y no se levantaron para perseguir
  alternative_spanish_readings:
  - el temor de Yahvé estaba sobre todas las ciudades ...
  - el pavor de Yahvé estaba sobre todas las ciudades ...
  rationale: 'La formulación preserva la relación causal: la presencia temible de Yahvé impide la persecución. No se suaviza a una simple ''protección'' para respetar la expresión del texto.'
  doctrine_reference: Providencia divina y temor reverencial/temor judicial en narrativa bíblica.
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado desde ''killed the city'' a ''destroyed the city'', y también de ''the LORD'' a ''Yahweh''. La versión española sigue esas dos decisiones: evita el calco literal idiomático y conserva el nombre divino en forma explícita conforme al estándar POB.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma principal del nombre divino, coherente con el proyecto.
  - '''Perizitas'' se conserva por fidelidad al expediente; no se sustituye por una forma tradicional no documentada aquí.'
  - El tono es narrativo y sobrio, sin añadir explicaciones interpretativas.
  - La única nota al pie marca la alternativa lexical heredada del dossier inglés y se ancla en 'destruido'.
