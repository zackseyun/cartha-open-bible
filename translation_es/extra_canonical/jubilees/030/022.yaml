  yaml_path: translation/extra_canonical/jubilees/030/022.yaml
  text: and they brought it all to Jacob their father. And he spoke with them about their having destroyed the city, because he feared those who lived in the land, the Canaanites and the Perizzites. And the terror of Yahweh was on all the cities around Shechem, and they did not rise up to pursue the sons of Jacob, because dread had fallen on them.
  footnotes:
