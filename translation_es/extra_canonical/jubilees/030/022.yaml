  to: y trajeron todo a Jacob, su padre. Y él les habló por haber destruido[a] la ciudad, porque temía a los que habitaban en la tierra, los cananeos y los perizitas. Y el terror de Yahvé estaba sobre todas las ciudades alrededor de Siquem, y no se levantaron para perseguir a los hijos de Jacob, porque el pavor había caído sobre ellos.
