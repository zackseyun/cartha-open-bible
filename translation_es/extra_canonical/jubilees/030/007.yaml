base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/007.yaml
  text: Thus, there shall not be in Israel one who defiles an Israelite virgin. And if there is any man in Israel who wishes to give his daughter, or even his sister, to any man from the seed of the nations, he shall surely die, and they shall stone him with stones, because he has committed shame in Israel. And as for the woman,
  footnotes:
