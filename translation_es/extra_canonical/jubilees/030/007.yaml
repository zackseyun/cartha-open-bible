    text: Or ', and the woman also.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:58Z'
    unchanged: false
    changes_summary: Added the opening clause to reflect the first sentence of the source, and completed the final phrase so the woman's inclusion is not omitted.
translation:
  language: es
  text: Así, no debe haber en Israel nadie que profane a una virgen israelita. Y si hay algún hombre en Israel que quiera dar a su hija, o incluso a su hermana, a algún hombre de la descendencia de las naciones, ciertamente morirá, y lo apedrearán con piedras, porque ha cometido vergüenza en Israel. Y en cuanto a la mujer,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y la mujer también». El giro del texto principal queda abierto porque la frase introduce a la mujer para la continuación del versículo siguiente, no para repetir la pena anterior.'
    reason: previous_rendering
lexical_decisions:
- source_word: ይሀብ / give
  english_pob_choice: give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - dar en matrimonio
  lexicon: N/A
  rationale: El contexto exige una entrega matrimonial o de unión, pero el ge'ez y el inglés auditado usan el verbo general “give”. En español, “dar” conserva esa amplitud sin introducir una especificación no explicitada por el texto fuente.
- source_word: ድንግለ፡ እስራኤላዊት / Israelite virgin
  english_pob_choice: Israelite virgin
  chosen_spanish: virgen israelita
  alternatives_spanish:
  - virgen de Israel
  - doncella israelita
  lexicon: N/A
  rationale: Se conserva el sustantivo directo “virgen” y el adjetivo étnico “israelita”, reflejando la referencia de pureza sexual y pertenencia a Israel sin suavizarla con un término más interpretativo.
- source_word: እኅተ / sister
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - hermana carnal
  - parienta
  lexicon: N/A
  rationale: El parentesco explícito es “hermana”; no hay base en el texto para ampliar o reinterpretar como parienta. “Hermana” es el equivalente natural y fiel.
- source_word: ዘእምዘርአ፡ አሕዛብ / seed of the nations
  english_pob_choice: seed of the nations
  chosen_spanish: descendencia de las naciones
  alternatives_spanish:
  - linaje de las naciones
  - simiente de las naciones
  lexicon: N/A
  rationale: “Descendencia” transmite el sentido genealógico de “seed” sin el posible arcaísmo o ambigüedad de “simiente” en español moderno. “De las naciones” mantiene la oposición étnica del original.
- source_word: ኀፍረተ / shame
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - afrenta
  - deshonra
  lexicon: N/A
  rationale: “Vergüenza” reproduce el efecto de oprobio público del término sin elevarlo a una lectura excesivamente técnica. Se conserva la acusación social y moral del texto.
- source_word: ወለብእሲትሂ / and as for the woman
  english_pob_choice: And as for the woman,
  chosen_spanish: Y en cuanto a la mujer,
  alternatives_spanish:
  - Y la mujer también,
  - Y respecto de la mujer,
  lexicon: N/A
  rationale: La revisión auditada indica que la frase introduce a la mujer como objeto para la cláusula siguiente, no como sujeto de la pena anterior. “En cuanto a” preserva esa función sintáctica en español.
theological_decisions:
- issue: Castigo legal por profanar una virgen israelita y por entregar a una hija o hermana a un hombre de las naciones
  english_pob_reading: the offender shall surely die, and they shall stone him with stones
  chosen_spanish_reading: ciertamente morirá, y lo apedrearán con piedras
  alternative_spanish_readings:
  - morirá irremisiblemente, y lo lapidarán
  - sin duda morirá, y lo apedrearán
  rationale: Se mantiene el lenguaje penal fuerte del texto, evitando suavizar la sanción. “Apedrear con piedras” conserva la redundancia enfática del hebreo/gee'z reflejada en el inglés auditado.
  doctrine_reference: pena legal/covenantal en la ley de pureza matrimonial del libro de Jubileos
- issue: La cláusula final sobre la mujer no pertenece a la pena anterior
  english_pob_reading: And as for the woman,
  chosen_spanish_reading: Y en cuanto a la mujer,
  alternative_spanish_readings:
  - Y la mujer también,
  - Y respecto de la mujer,
  rationale: La revisión textual señalada en el audit trail muestra que la mujer queda vinculada a la continuación inmediata del pasaje. La traducción evita arrastrarla erróneamente a la misma acusación o castigo del varón.
  doctrine_reference: coherencia sintáctica y textual del pasaje
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que restablece la cláusula inicial sobre la virgen israelita y completa la referencia final a la mujer como transición al siguiente versículo. También toma en cuenta la nota crítica de que la frase final no debe leerse como una simple continuación de la condena anterior.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” fuera del texto porque este versículo no contiene el nombre divino.
  - Se evitó “SEÑOR” y “Cristo” por no ser pertinentes aquí.
  - Se preservó el contraste étnico/jurídico entre “Israel”, “virgen israelita” y “descendencia de las naciones” sin suavizarlo.
  - La puntuación deja claro que la mención de la mujer está incompleta a propósito y apunta al versículo siguiente.
