base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/030/002.yaml
  text: And there Shechem[2], the son of Hamor the Hivite, the prince of the land, saw Dinah, Jacob's daughter, and he seized her and lay with her and defiled her, and she was a young girl.
  footnotes:
  - marker: '2'
    text: The final clause of v.2 literally indicates that Dinah was a young girl; v.3 then specifies that she was twelve years old.
    reason: lexical_alternative
  - marker: a
    text: Or 'humbled her'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:27Z'
    unchanged: false
    changes_summary: Reordered the opening apposition to more natural English ('Shechem, the son of Hamor') while preserving the source. Changed 'a little girl' to 'a young girl' for more natural formal register and better fit to the source.
translation:
  language: es
  text: Y allí Siquem, hijo de Hamor el heveo, príncipe de la tierra, vio a Dina, hija de Jacob, y la tomó y se acostó con ella y la mancilló[a], y ella era una muchacha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la contaminó»; el verbo expresa la idea de volverla impura o mancillarla.
    reason: lexical_alternative
  - marker: b
    text: El final del versículo indica literalmente que Dina era una muchacha; el v. 3 especifica que tenía doce años.
    reason: lexical_alternative
lexical_decisions:
- source_word: አርኰሳ / arkwasa
  english_pob_choice: defiled her
  chosen_spanish: la contaminó
  alternatives_spanish:
  - la defiló
  - la mancilló
  - la humilló
  lexicon: source verb of defilement/impurity
  rationale: El pasaje de Jubileos enfatiza la impureza ritual y moral producida por el acto; en español, "contaminar" comunica bien esa noción de profanación/impureza sin forzar un giro demasiado eclesiástico. Se evita "humilló" porque diluye el matiz de impureza señalado por la revisión inglesa.
- source_word: ውስተ፡ ቤተ፡ ሴኬም።
  english_pob_choice: there Shechem
  chosen_spanish: Y allí Shequem
  alternatives_spanish:
  - Y allí Shequem
  - Y en ese lugar Shequem
  lexicon: locative opening with proper name
  rationale: Se conserva la apertura locativa con "Y allí" para reflejar el énfasis narrativo del texto fuente. "Shequem" sigue la forma española usual del nombre del lugar/personaje sin perder la identidad propia del original.
- source_word: ንስቲት
  english_pob_choice: a young girl
  chosen_spanish: una muchacha
  alternatives_spanish:
  - una joven
  - una niña
  - una muchacha joven
  lexicon: age descriptor
  rationale: El audit trail inglés corrige "little girl" a "young girl"; en español, "muchacha" reproduce la idea de una joven en edad menor/adolescente sin infantilizarla ni añadir una precisión no explicitada por el texto.
theological_decisions:
- issue: Término de impureza sexual/ritual tras el acto con Dina
  english_pob_reading: defiled her
  chosen_spanish_reading: la contaminó
  alternative_spanish_readings:
  - la mancilló
  - la profanó
  - la humilló
  rationale: Jubileos 30 presenta el hecho bajo la categoría de contaminación/impureza, no solo como abuso. "La contaminó" preserva esa tensión teológica y conecta con el lenguaje de pureza de la obra. Se evita suavizarlo con "humilló", que sería menos preciso doctrinalmente.
  doctrine_reference: pureza ritual y contaminación sexual en Jubileos 30
- issue: Referencia a la edad de Dina sin especificación exacta en el verso
  english_pob_reading: and she was a young girl
  chosen_spanish_reading: y ella era una muchacha
  alternative_spanish_readings:
  - y era una niña
  - y era una joven
  rationale: La nota inglesa aclara que el verso la llama "young girl" y que el v.3 precisará su edad. En español se conserva la vaguedad relativa del original con "muchacha", evitando una edad concreta que el versículo no da.
  doctrine_reference: coherencia narrativa con Jubileos 30:3
translation_notes:
  revision_awareness: He seguido el pasaje hebreo/gee'z y el audit trail inglés. La revisión más reciente desplazó la apposición inicial para naturalidad en inglés y corrigió el último verbo de "humbled" a "defiled"; por eso en español se prioriza una construcción natural con "Y allí Shequem, hijo de Hamor..." y se mantiene un verbo de impureza fuerte, no un término atenuado. También se reflejó la nota del inglés sobre la edad de Dina mediante una nota al pie.
  spanish_consistency_notes:
  - Se usa "Yahvé" en esta serie cuando el texto fuente requiere el nombre divino; aquí no aparece.
  - Se mantiene "Shequem" como forma española del nombre propio, consistente con uso bíblico en español.
  - '"contaminó" se eligió por su valor de impureza/profanación, no como eufemismo.'
  - La puntuación y la coordinación siguen un registro bíblico moderno, claro y publicable.
