revisions:
- from: Y allí Shequem[a], hijo de Hamor el heveo, príncipe de la tierra, vio a Dina, hija de Jacob, y la tomó y se acostó con ella y la contaminó, y ella era una muchacha[b].
  to: Y allí Siquem, hijo de Hamor el heveo, príncipe de la tierra, vio a Dina, hija de Jacob, y la tomó y se acostó con ella y la mancilló[a], y ella era una muchacha[b].
  rationale: 'Se corrige la alternativa al pie para alinearla con la decisión léxica documentada del POB: el verbo ge''ez expresa defilement, no simplemente humillación. Se adopta ''Siquem'' por mayor naturalidad y reconocimiento en español bíblico, y ''la mancilló'' por registro más idiomático y digno que preserva el matiz de impureza sexual/ritual. Se mantienen la estructura narrativa y la nota sobre la edad de Dina.'
