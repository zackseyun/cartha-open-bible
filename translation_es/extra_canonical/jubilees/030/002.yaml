review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del ge''ez y el audit trail inglés: Shequem/Siquem ve a Dina, la toma, se acuesta con ella, la contamina/defile, y la cláusula final indica que ella era una muchacha joven. Sin embargo, la nota alternativa ''la humilló'' ya no representa la decisión vigente del POB inglés, que cambió explícitamente a ''defiled her'' por razones léxicas y teológicas. Además, en español ''se acostó con ella'' resulta demasiado suave junto al contexto de coerción; ''se acostó con'' puede mantenerse, pero ''se acostó con ella'' tras ''la tomó'' sigue siendo aceptable. El punto principal a corregir es la nota alternativa y una mejora de naturalidad onomástica.'
  spanish_quality_summary: El español es claro y legible, pero 'Shequem' es menos natural y menos estándar en español bíblico general que 'Siquem'. 'La contaminó' comunica impureza, aunque suena algo mecanicista en una persona; 'la mancilló' expresa mejor la deshonra/impureza sexual en registro bíblico-digno. La frase final 'ella era una muchacha' es natural y fiel. Se recomienda ajustar el nombre propio y sustituir la nota alternativa por una que preserve la alternativa española más plausible para el matiz de impureza.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La cuestión clave es mantener el valor de አርኰሳ como impureza/defilement, no retroceder a 'humilló'. 'La mancilló' o 'la contaminó' cumplen mejor que 'la humilló'.
  issues:
  - severity: medium
    issue: La nota al pie a ofrece 'O «la humilló»'.
    rationale: El audit trail inglés documenta un cambio deliberado de 'humbled her' a 'defiled her' por precisión léxica y teológica. Mantener 'la humilló' como alternativa principal reintroduce una lectura descartada.
  - severity: low
    issue: Uso de 'Shequem' en lugar de 'Siquem'.
    rationale: '''Siquem'' es la forma más natural y reconocible en español bíblico para el personaje/lugar Shechem. ''Shequem'' no es incorrecto, pero suena menos idiomático.'
  - severity: low
    issue: '''La contaminó'' es fiel pero menos idiomático para una persona en este contexto.'
    rationale: En español eclesiástico/literario, 'la mancilló' suele comunicar mejor impureza sexual y deshonra sin perder el matiz de defilement.
