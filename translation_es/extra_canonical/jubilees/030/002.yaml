    reason: lexical_alternative
  - marker: b
    text: El final del versículo indica literalmente que Dina era una muchacha; el v. 3 especifica que tenía doce años.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la alternativa al pie para alinearla con la decisión léxica documentada del POB: el verbo ge''ez expresa defilement, no simplemente humillación. Se adopta ''Siquem'' por mayor naturalidad y reconocimiento en español bíblico, y ''la mancilló'' por registro más idiomático y digno que preserva el matiz de impureza sexual/ritual. Se mantienen la estructura narrativa y la nota sobre la edad de Dina.'
