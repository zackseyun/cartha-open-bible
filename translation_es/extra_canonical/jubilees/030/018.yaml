translation:
  language: es
  text: Y así le inscriben en las tablas celestiales bendición y justicia delante del Dios de todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: blessing
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - bendiciones
  - bienaventuranza
  lexicon: No aplica
  rationale: El inglés POB conserva el sustantivo general blessing; en español, «bendición» es la equivalencia directa y natural en registro bíblico. «Bienaventuranza» sería más interpretativa y suele sonar más marcada por el uso litúrgico.
- source_word: righteousness
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: No aplica
  rationale: El término griego/semítico subyacente en este tipo de formulación suele abarcar la idea de conducta y estado justo ante Dios; «justicia» mantiene mejor la amplitud semántica que «rectitud», y evita introducir una lectura técnica de «justificación» que el contexto no exige.
- source_word: heavenly tablets
  english_pob_choice: heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablillas celestiales
  - las tablas del cielo
  lexicon: No aplica
  rationale: Se conserva la imagen apocalíptica de las «heavenly tablets» de forma transparente y reconocible. «Tablas celestiales» sigue de cerca la metáfora sin suavizarla ni reemplazarla por una paráfrasis.
- source_word: God of all
  english_pob_choice: the God of all
  chosen_spanish: el Dios de todos
  alternatives_spanish:
  - el Dios de todo
  - el Dios universal
  lexicon: No aplica
  rationale: La construcción posesiva se mantiene de manera directa. «El Dios de todos» es idiomático y preserva la idea de soberanía universal sin añadir una glosa doctrinal.
theological_decisions:
- issue: Inscripción en las tablas celestiales como imagen de registro divino
  english_pob_reading: They inscribe for him on the heavenly tablets blessing and righteousness before the God of all.
  chosen_spanish_reading: Y así le inscriben en las tablas celestiales bendición y justicia delante del Dios de todos.
  alternative_spanish_readings:
  - Y así escriben para él en las tablas celestiales bendición y justicia delante del Dios de todos.
  - Y así lo registran en las tablas celestiales con bendición y justicia delante del Dios de todos.
  rationale: El verbo «inscriben» conserva la idea de registro formal y escrito que sugiere el inglés POB. «Le» mantiene el destinatario indirecto del beneficio. La expresión «delante del Dios de todos» preserva el marco de audiencia celestial y la referencia soberana sin reinterpretarla.
  doctrine_reference: Apocalíptica judía; imaginería de los registros celestiales y juicio/ memoria divina.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo mostró alto acuerdo; por ello, el español se mantiene estrechamente alineado con la lectura inglesa auditada, sin introducir variantes textuales ni notas de variante.
  spanish_consistency_notes:
  - Se mantiene el tratamiento tradicional de «Dios» para θεός/אֱלֹהים según el consenso del proyecto.
  - Se conserva el léxico de registro celestial con «inscriben» para no diluir la imaginería del pasaje.
  - No se usa «SEÑOR» porque el texto inglés no muestra un reemplazo de nombre divino aquí; la referencia es genérica a Dios como soberano universal.
