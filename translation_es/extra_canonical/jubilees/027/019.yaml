translation:
  language: es
  text: Porque sé que sus caminos prosperarán en todo adondequiera que vaya, hasta que regrese a nosotros en paz y lo veamos en paz.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አአምር
  english_pob_choice: I know
  chosen_spanish: sé
  alternatives_spanish:
  - conozco
  - estoy seguro de
  lexicon: conocer / saber
  rationale: El verbo expresa conocimiento cierto del hablante; en español, «sé» reproduce de manera natural y directa esa certeza sin añadir énfasis no atestiguado.
- source_word: ይሤራኅ
  english_pob_choice: will prosper
  chosen_spanish: prosperarán
  alternatives_spanish:
  - tendrán éxito
  - les irá bien
  lexicon: prosperar
  rationale: La forma verbal transmite resultado favorable del caminar/obrar. «Prosperarán» conserva el matiz de avance exitoso sin ampliar el sentido más allá del texto.
- source_word: ፍኖዊሁ
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - su camino
  lexicon: camino / senda
  rationale: El plural posesivo refleja el original y el inglés POB. «Caminos» es claro en español y mantiene la idea de conductas o trayectorias.
- source_word: በኵሉ
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo aspecto
  lexicon: todo / en todo
  rationale: La expresión adverbial resume la totalidad de manera concisa y idiomática, sin sobreespecificar.
- source_word: ውእደ
  english_pob_choice: wherever
  chosen_spanish: adondequiera que
  alternatives_spanish:
  - dondequiera que
  - por dondequiera que
  lexicon: adondequiera que / dondequiera que
  rationale: Como el movimiento está implícito en «vaya», «adondequiera que» es la opción más natural para una dirección de desplazamiento.
- source_word: ሖረ
  english_pob_choice: he goes
  chosen_spanish: vaya
  alternatives_spanish:
  - va
  - ande
  lexicon: ir
  rationale: 'El subjuntivo español corresponde bien al valor generalizador de la cláusula relativa temporal/futural: «adondequiera que vaya».'
- source_word: እስከ፡ አመ፡ ይገብእ
  english_pob_choice: until he returns
  chosen_spanish: hasta que regrese
  alternatives_spanish:
  - hasta que vuelva
  - hasta que retorne
  lexicon: regresar / volver
  rationale: «Regrese» mantiene el movimiento de vuelta y suena natural en español contemporáneo; preserva la idea de retorno sin cambio de sentido.
- source_word: በሰላም
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - en seguridad
  lexicon: paz
  rationale: El sustantivo «paz» reproduce el estado resultante y mantiene la duplicación enfática del original al aparecer dos veces.
theological_decisions:
- issue: Repetición de «en paz» al final de la cláusula
  english_pob_reading: we see him in peace
  chosen_spanish_reading: lo veamos en paz
  alternative_spanish_readings:
  - lo veamos con paz
  - lo veamos seguro
  rationale: El original repite la idea de paz tanto para el regreso como para la visión final. Mantener ambas ocurrencias conserva la insistencia afectiva del pasaje sin interpretarla.
  doctrine_reference: No aplica; decisión de estilo y semántica narrativa.
translation_notes:
  revision_awareness: La traducción se alinea con la revisión vigente marcada como sin cambios, y con el alta concordancia del control cruzado; no se detectaron notas textuales ni tensiones léxicas que exigieran anotación adicional.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se mantiene un español neutro y sobrio, apto para lectura eclesial amplia.
  - No se introducen mayúsculas teológicas innecesarias; «paz» se conserva en minúscula por funcionar como sustantivo común.
