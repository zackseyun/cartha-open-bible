  - severity: low
    issue: '''ropa para vestir'' es correcto pero algo cotidiano'
    rationale: En este contexto bíblico-litúrgico, 'vestido para vestir' o 'vestido que ponerme' suena más digno y más cercano a la noción de 'clothing' sin perder claridad.
