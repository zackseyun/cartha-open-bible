translation:
  language: es
  text: 'Y Jacob oró esta oración a Yahvé, diciendo: «Si Yahvé está conmigo y me guarda en este camino por el que voy, y me da pan para comer y vestido para vestir,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: YHWH
  rationale: El texto ge'ez corresponde al nombre divino; la pauta del proyecto pide renderizar YHWH como «Yahvé» en el texto principal, en lugar de ocultarlo con una forma genérica.
- source_word: ጸሎተ / prayed a prayer
  english_pob_choice: prayed a prayer
  chosen_spanish: oró una oración
  alternatives_spanish:
  - rezó una oración
  - hizo una oración
  lexicon: lexema verbal de oración
  rationale: Mantiene la repetición enfática del hebraísmo/semítica original y sigue de cerca la estructura del inglés auditado sin sonar completamente rígido en español.
- source_word: ፍኖት / road
  english_pob_choice: road
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - sendero
  lexicon: camino
  rationale: «Camino» es la opción más natural y fiel para la vía por la que Jacob va; conserva la imagen concreta del trayecto.
- source_word: ኅብስተ / bread
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: pan
  rationale: «Pan» es la traducción directa y tradicional de la petición de sustento básico, sin ampliar innecesariamente el referente.
- source_word: ልብሰ / clothing
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestido
  - vestidura
  lexicon: vestimenta
  rationale: «Ropa» comunica con claridad la necesidad básica en español moderno; evita un registro demasiado arcaico o ceremonial.
theological_decisions:
- issue: Nombre divino en una plegaria patriarcal
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: La fuente original usa el nombre divino, no un título genérico. En una oración de Jacob, preservarlo en español mantiene la transparencia textual y el criterio POB de no enmascarar el nombre.
  doctrine_reference: Tetragrámaton / nombre propio divino
translation_notes:
  revision_awareness: La revisión más reciente indica «unchanged; no changes needed», y la concordancia interrevisores es alta. Por ello, el borrador español sigue de cerca la lectura estable del inglés auditado y del ge'ez, sin introducir variantes textuales no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Yahvé» conforme al estándar del proyecto.
  - Se usa un español sencillo y eclesialmente legible, evitando arcaísmos innecesarios.
  - La frase queda abierta con coma final porque el segmento fuente también continúa la oración; no se añade puntuación conclusiva para no cerrar prematuramente el verso.
