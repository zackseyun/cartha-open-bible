translation:
  language: es
  text: Y Isaac consoló a Rebeca acerca de Jacob, su hijo, y lo bendijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይናዘዛ
  english_pob_choice: comforted
  chosen_spanish: consoló
  alternatives_spanish:
  - alentó
  - consuelo a
  lexicon: 'Ge''ez ወይናዘዛ; English POB: comforted'
  rationale: El verbo ge'ez expresa consuelo/solaz; en español, «consoló» comunica de forma natural el alivio ofrecido por Isaac a Rebeca sin añadir matices ajenos.
- source_word: ለርብቃ
  english_pob_choice: Rebekah
  chosen_spanish: a Rebeca
  alternatives_spanish:
  - a Rebeca
  lexicon: 'Ge''ez ርብቃ; English POB: Rebekah'
  rationale: Se conserva el nombre propio en la forma española corriente «Rebeca», con la preposición requerida por el objeto indirecto.
- source_word: በእንተ፡ ያዕቆብ፡ ወልዳ
  english_pob_choice: concerning Jacob her son
  chosen_spanish: acerca de Jacob, su hijo
  alternatives_spanish:
  - por Jacob, su hijo
  - sobre Jacob, su hijo
  lexicon: 'Ge''ez በእንተ + nombre + relación filial; English POB: concerning Jacob her son'
  rationale: La construcción ge'ez indica referencia/tema; «acerca de» reproduce esa relación sin forzar causalidad. «Su hijo» mantiene explícita la relación filial presente en el original.
- source_word: ወባረኮ
  english_pob_choice: and he blessed him
  chosen_spanish: y lo bendijo
  alternatives_spanish:
  - y le bendijo
  - y lo bendijo a él
  lexicon: 'Ge''ez ባረኮ; English POB: and he blessed him'
  rationale: El verbo es el de bendecir; en español «lo bendijo» es claro y fiel. El objeto pronominal se entiende por el contexto inmediato con Jacob como referente.
theological_decisions:
- issue: Relación entre el consuelo de Isaac y la bendición final
  english_pob_reading: And Isaac comforted Rebekah concerning Jacob her son, and he blessed him.
  chosen_spanish_reading: Y Isaac consoló a Rebeca acerca de Jacob, su hijo, y lo bendijo.
  alternative_spanish_readings:
  - Y Isaac consoló a Rebeca por Jacob, su hijo, y lo bendijo.
  rationale: 'El texto presenta dos acciones coordinadas sin elaborar más su conexión: primero consuelo respecto a Jacob, luego bendición. La redacción española conserva esa secuencia simple sin inferir causas o circunstancias adicionales.'
  doctrine_reference: Narrativa patriarcal; fidelidad al orden y a la relación entre consuelo y bendición
translation_notes:
  revision_awareness: La revisión previa indicó acuerdo alto y ningún cambio necesario; esta entrega corrige la validación eliminando cualquier nota sin ancla y mantiene la lectura base confirmada por el audit trail inglés y el texto ge'ez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el original lo exige; aquí no aparece el nombre divino.
  - Se evita «siervo»/«Cristo»/«SEÑOR» porque no corresponden al contenido de este versículo.
  - La puntuación refleja una sola cláusula coordinada en español, acorde con el breve paralelismo narrativo del original.
