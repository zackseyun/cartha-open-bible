revisions:
- from: Y Jacob se levantó de madrugada y tomó la piedra que había colocado junto a su cabeza, y la levantó como un pilar[a] como señal, y derramó aceite sobre su cima. Y llamó el nombre de aquel lugar Betel, aunque antes el nombre de esa región era Luz.
  to: Y Jacob se levantó de madrugada y tomó la piedra que había colocado junto a su cabeza, y la erigió como pilar[a], como señal, y derramó aceite sobre su cima. Y llamó el nombre de aquel lugar Betel, aunque antes el nombre de esa región era Luz.
  rationale: Se ajusta la frase central para preservar los dos elementos semánticos del original ('pilar' y 'señal') con español natural y claro. También se sustituye 'la levantó' por 'la erigió' para reflejar mejor el acto de poner la piedra en pie como monumento conmemorativo.
