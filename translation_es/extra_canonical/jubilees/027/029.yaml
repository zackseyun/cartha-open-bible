  text: And Jacob rose early in the morning and took the stone that he had placed by his head, and he set it up as a pillar for a sign, and he poured oil on its top. And he called the name of that place Bethel, though formerly the name of that region was Luz.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:05Z'
    unchanged: false
    changes_summary: Changed 'put' to 'placed' for a slightly more formal register; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Y Jacob se levantó de madrugada y tomó la piedra que había colocado junto a su cabeza, y la erigió como pilar[a], como señal, y derramó aceite sobre su cima. Y llamó el nombre de aquel lugar Betel, aunque antes el nombre de esa región era Luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «columna».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ነሥአ / took
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - recogió
  lexicon: tomar
  rationale: El gesto es simplemente de tomar la piedra que ya había quedado allí; 'tomó' reproduce con naturalidad el acto sin añadir matiz de traslado.
- source_word: አቀሞ / set it up
  english_pob_choice: set it up
  chosen_spanish: la levantó
  alternatives_spanish:
  - la erigió
  - la puso en pie
  lexicon: levantar
  rationale: La imagen es la de erigir la piedra en posición vertical. 'La levantó' es claro y fiel, y evita un calco rígido.
- source_word: ሐውልተ / pillar
  english_pob_choice: pillar
  chosen_spanish: pilar
  alternatives_spanish:
  - columna
  - monumento
  lexicon: pilar
  rationale: '''Pilar'' conserva la función conmemorativa y vertical del término, sin cargarlo con asociaciones arquitectónicas ajenas.'
- source_word: ትእምርት / for a sign
  english_pob_choice: for a sign
  chosen_spanish: como señal
  alternatives_spanish:
  - como signo
  - como memorial
  lexicon: señal
  rationale: '''Señal'' expresa el valor identificador/conmemorativo del objeto. En español es más natural que ''signo'' en este contexto narrativo.'
- source_word: ወከዐወ፡ ቅብአ / poured oil
  english_pob_choice: poured oil
  chosen_spanish: derramó aceite
  alternatives_spanish:
  - ungió con aceite
  - vertió aceite
  lexicon: derramar
  rationale: El ge'ez describe la acción material de verter aceite sobre la piedra; 'derramó aceite' conserva la escena sin introducir explícitamente una unción ritual que el texto no desarrolla aquí.
- source_word: Bethel / בית-אל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Bethel
  lexicon: Betel
  rationale: Se mantiene la forma española habitual 'Betel' para el topónimo, fácilmente reconocible y fiel al nombre hebreo.
- source_word: Luz
  english_pob_choice: Luz
  chosen_spanish: Luz
  lexicon: Luz
  rationale: Se conserva el topónimo tradicional sin cambios.
theological_decisions:
- issue: La piedra erigida 'como señal'
  english_pob_reading: as a pillar for a sign
  chosen_spanish_reading: la levantó como un pilar como señal
  alternative_spanish_readings:
  - la erigió como un pilar como señal
  - la puso en pie como un pilar como señal
  rationale: No se suaviza la materialidad del gesto ni se reemplaza por lenguaje devocional posterior; se mantiene el carácter memorial y visible del acto de Jacob.
  doctrine_reference: Narrativa patriarcal / memorial de pacto
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue ajustada solo de ''put'' a ''placed''; la traducción española sigue el contenido plenamente estable de la revisión: Jacob toma la piedra, la erige como señal, derrama aceite sobre ella y nombra el lugar Betel, antes Luz.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio 'Jacob' y el topónimo 'Betel' sin artículo añadido.
  - 'Se conserva el orden narrativo del original: levantarse, tomar la piedra, erigirla, derramar aceite, nombrar el lugar, y contrastar con el nombre anterior Luz.'
  - No se introduce terminología sacrificial o sacerdotal; el gesto permanece descriptivo y memorial.
