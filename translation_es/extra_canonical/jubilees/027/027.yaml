base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/027/027.yaml
  text: And behold, I will be with you and will keep you wherever you go, and I will bring you back into this land in peace. For I will not leave you until I have done everything that I have told you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:05Z'
    unchanged: false
    changes_summary: Changed 'look' to 'behold' for a more formal register and closer rendering of the opening particle; removed the closing quotation mark since none is opened in the draft. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: Y he aquí, yo estaré contigo y te guardaré por dondequiera que vayas, y te haré volver a esta tierra en paz. Porque no te dejaré hasta que haya hecho todo lo que te he dicho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወነየ፡ ... እሄሉ፡
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí, pues
  lexicon: particle of attention / announcement
  rationale: El giro de apertura introduce solemnemente una declaración divina; «he aquí» conserva el valor de llamada de atención y el registro elevado del inglés POB sin volverlo artificial en español.
- source_word: አነ፡ እሄሉ፡ ምስሌከ፡
  english_pob_choice: I will be with you
  chosen_spanish: yo estaré contigo
  alternatives_spanish:
  - estaré contigo
  - yo estaré a tu lado
  lexicon: 1st person future + with
  rationale: La construcción española natural para presencia acompañante es «estar contigo»; mantiene la cercanía y la continuidad futura del original.
- source_word: ወእዐቅበከ፡ በኵለን፡
  english_pob_choice: and will keep you wherever you go
  chosen_spanish: y te guardaré por dondequiera que vayas
  alternatives_spanish:
  - y te preservaré dondequiera que vayas
  - y te protegeré adondequiera que vayas
  lexicon: keep / guard
  rationale: «Guardar» conserva el sentido de custodia y protección continua del verbo original y del inglés POB; «por dondequiera que vayas» expresa la idea de movimiento en cualquier lugar.
- source_word: ወእዴ፡ ሖርከ፡
  english_pob_choice: and I will bring you back
  chosen_spanish: y te haré volver
  alternatives_spanish:
  - y te devolveré
  - y te traeré de vuelta
  lexicon: return / bring back
  rationale: '«Te haré volver» reproduce bien el valor causativo del verbo: no solo regresar, sino ser llevado de vuelta por la acción divina.'
- source_word: ውስተ፡ ዛ፡ ምድር፡
  english_pob_choice: into this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a esta tierra
  - a esta tierra misma
  lexicon: land
  rationale: En español, con «hacer volver», la preposición «a» es más natural que «a esta tierra» sin perder la referencia local; el demonstrativo conserva la deixis del original.
- source_word: በሰላም።
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz
  - con paz
  lexicon: peace
  rationale: «En paz» es la equivalencia más idiomática y fiel para el estado de regreso pacífico expresado en el texto.
- source_word: እስመ፡ ኢየኀድገከ፡
  english_pob_choice: For I will not leave you
  chosen_spanish: Porque no te dejaré
  alternatives_spanish:
  - Porque no te abandonaré
  - Pues no te dejaré
  lexicon: not leave / not abandon
  rationale: «Dejar» mantiene la fidelidad al inglés POB y al valor relacional de no apartarse; «abandonar» intensifica más de lo que exige el texto.
- source_word: እስከ፡ ሶበ፡ እገብር፡ ኵሎ፡
  english_pob_choice: until I have done everything
  chosen_spanish: hasta que haya hecho todo
  alternatives_spanish:
  - hasta haber hecho todo
  - hasta que haga todo
  lexicon: until / done everything
  rationale: El subjuntivo perfecto español comunica correctamente anterioridad respecto al momento de no dejar, conservando el valor de término completo.
- source_word: ዘእቤለከ።
  english_pob_choice: that I have told you
  chosen_spanish: lo que te he dicho
  alternatives_spanish:
  - lo que te he hablado
  - lo que te he ordenado
  lexicon: say/tell
  rationale: «Decir» es la opción más directa y neutral para el verbo de comunicación; «te he dicho» mantiene el vínculo personal del original y del inglés POB.
theological_decisions:
- issue: Divine presence and protection in a promise to the patriarch
  english_pob_reading: God promises presence, guarding, return, and fulfillment of speech.
  chosen_spanish_reading: Dios promete estar con Jacob, guardarlo en su camino, hacerlo volver a la tierra y cumplir íntegramente lo dicho.
  alternative_spanish_readings:
  - Dios promete acompañarlo y protegerlo hasta su regreso
  - Dios asegura su fidelidad hasta completar la promesa
  rationale: 'La formulación española conserva el carácter de promesa completa: presencia, custodia, retorno y cumplimiento. No se suaviza ni se espiritualiza el contenido narrativo concreto.'
  doctrine_reference: Providencia y fidelidad divina en las promesas del pacto
translation_notes:
  revision_awareness: La base inglesa revisada cambió ‘look’ por ‘behold’ para un registro más formal; la versión española adopta «he aquí» para reflejar ese mismo nivel solemne. No se añadieron notas textuales porque el testimonio fuente y el inglés auditado coinciden sustancialmente.
  spanish_consistency_notes:
  - Se conserva «Yahvé» en la política general del proyecto cuando corresponda; este versículo no contiene el nombre divino explícito en el texto fuente.
  - Se usa el futuro para las promesas divinas («estaré», «guardaré», «haré volver», «dejaré») como en el inglés POB.
  - No se introduce vocabulario eclesiástico ajeno al registro narrativo del libro.
