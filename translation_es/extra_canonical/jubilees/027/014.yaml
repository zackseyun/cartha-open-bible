translation:
  language: es
  text: Y que él te dé las bendiciones[a] de mi padre Abraham, a ti y a tu descendencia después de ti, para que heredes la tierra de tu peregrinación y toda la tierra que Dios dio a Abraham. Ve, hijo mío, en paz.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «las bendiciones» refleja el plural del ge'ez; el paralelo de Génesis en otras tradiciones suele aparecer en singular.
    reason: textual_variant
lexical_decisions:
- source_word: በረከታቲሁ
  english_pob_choice: the blessings
  chosen_spanish: las bendiciones
  alternatives_spanish:
  - la bendición
  lexicon: ברכה / blessing
  rationale: El ge'ez aquí es plural, y la revisión inglesa corrigió el singular a plural. En español, «las bendiciones» preserva ese plural sin forzar una lectura colectiva singular que no está sustentada por el fuente.
- source_word: ፍልሰትከ
  english_pob_choice: your sojourning
  chosen_spanish: tu peregrinación
  alternatives_spanish:
  - tu estancia
  - tu morada como forastero
  lexicon: גר / sojourn, dwell as alien
  rationale: El término expresa residencia transitoria o como forastero. «Peregrinación» comunica bien esa condición en español bíblico contemporáneo y evita reducirlo a un simple viaje.
- source_word: ምድረ፡ … ወኵላ፡ ምድረ፡
  english_pob_choice: the land ... and all the land
  chosen_spanish: la tierra ... y toda la tierra
  alternatives_spanish:
  - el país ... y todo el país
  lexicon: ארץ / land, earth, country
  rationale: «Tierra» mantiene la amplitud semántica del término semítico y su resonancia bíblica; «país» sonaría más restringido y moderno de lo que el contexto warrants.
- source_word: እግዚአብሔር
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: אלהים / God
  rationale: El texto fuente nombra a Dios de forma directa, y la auditoría inglesa también usa «God». En español se conserva «Dios» sin introducir una convención de sustitución que no está en este pasaje.
- source_word: ሖር፡ ወልድየ፡ በሰላም
  english_pob_choice: Go, my son, in peace
  chosen_spanish: Ve, hijo mío, en paz
  alternatives_spanish:
  - Anda, hijo mío, en paz
  lexicon: הלך / go
  rationale: «Ve» es la forma imperativa natural y fiel. «Hijo mío» reproduce el vocativo afectivo, y «en paz» conserva el cierre benediccional sin ampliar el sentido.
theological_decisions:
- issue: Plural de «bendiciones» frente al singular tradicional en el paralelo de Génesis
  english_pob_reading: the blessings
  chosen_spanish_reading: las bendiciones
  alternative_spanish_readings:
  - la bendición
  rationale: La evidencia ge'ez pluraliza el sustantivo; por eso no se suaviza a singular para armonizar automáticamente con el paralelo hebreo. Se preserva así la tensión textual documentada.
  doctrine_reference: Textual fidelity to source wording; no doctrinal change implied
- issue: «Tierra de tu peregrinación» como lenguaje de herencia y extranjería
  english_pob_reading: the land of your sojourning
  chosen_spanish_reading: la tierra de tu peregrinación
  alternative_spanish_readings:
  - la tierra donde peregrinas
  - la tierra de tu estancia como forastero
  rationale: La frase mantiene la idea de una posesión prometida dentro de una situación de extranjería temporal. No se reemplaza por una formulación más general que borre ese matiz.
  doctrine_reference: Patriarchal promise and inheritance language
- issue: «Dios» sin sustitución litúrgica por «Señor»
  english_pob_reading: God gave to Abraham
  chosen_spanish_reading: Dios dio a Abraham
  alternative_spanish_readings:
  - el Señor dio a Abraham
  rationale: El fuente nombra a Dios directamente; no hay necesidad de introducir una máscara reverencial. La opción mantiene transparencia con el texto base.
  doctrine_reference: Divine-name handling in source-transparent translation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que confirma que no había cambios adicionales necesarios, y la corrección previa que ajustó el inglés de singular a plural por el plural ge'ez. La versión española adopta explícitamente ese plural.
  spanish_consistency_notes:
  - Se mantuvo «Dios» conforme al texto fuente y la auditoría inglesa.
  - Se evitó «SEÑOR» o «el Señor» para no introducir una convención no presente aquí.
  - Se conservó el tono benediccional y la despedida final con «en paz».
  - La frase «tu descendencia» reproduce el sentido inclusivo de la genealogía/promise line without adding interpretive expansion.
