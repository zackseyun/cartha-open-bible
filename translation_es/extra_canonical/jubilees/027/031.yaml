translation:
  language: es
  text: y si vuelvo en paz a la casa de mi padre, entonces Yahvé será mi Dios; y esta piedra que he levantado como pilar y como señal en este lugar será casa de Yahvé. Y de todo lo que me des, sin falta te daré la décima parte, Dios mío.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: N/A
  rationale: El texto ge’ez corresponde al nombre divino; la pauta del proyecto pide Yahvé en el texto principal cuando el original remite al nombre divino, y no el sustituto reverencial 'Señor'.
- source_word: ቤተ፡ አቡየ / my father’s house
  english_pob_choice: my father’s house
  chosen_spanish: la casa de mi padre
  alternatives_spanish:
  - la casa de mi padre
  lexicon: N/A
  rationale: Se mantiene de forma directa la relación de posesión y parentesco, con el giro natural en español.
- source_word: በሰላም / in peace
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz
  lexicon: N/A
  rationale: '''En paz'' es la equivalencia natural y fiel en español para la fórmula de retorno pacífico.'
- source_word: አሡር / a tenth
  english_pob_choice: a tenth
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  lexicon: N/A
  rationale: El sustantivo español tradicional y transparente para la fracción diez por ciento es 'el diezmo'; conserva el sentido cuantitativo y el uso cultual.
- source_word: ሐውልተ፡ ለትእምርት / pillar for a sign
  english_pob_choice: pillar for a sign
  chosen_spanish: como pilar, como señal
  alternatives_spanish:
  - como columna, como señal
  - como piedra conmemorativa, como señal
  lexicon: N/A
  rationale: '''Pilar'' refleja el objeto erigido; ''señal'' conserva la función indicativa del ge’ez. Se evita ''columna'' por posible resonancia arquitectónica más marcada y se mantiene la duplicación del original mediante dos miembros.'
theological_decisions:
- issue: Nombre divino y confesión de pertenencia
  english_pob_reading: then the Lord will be my God
  chosen_spanish_reading: Yahvé será mi Dios
  alternative_spanish_readings:
  - el Señor será mi Dios
  rationale: 'La confesión expresa relación de pacto: el texto no oculta el nombre divino y la identidad del Dios invocado. ''Yahvé'' preserva esa referencia auditable.'
  doctrine_reference: Teología del pacto; uso del Nombre divino
- issue: Destino del pilar/piedra como casa de Yahvé
  english_pob_reading: this stone ... will be the house of the Lord
  chosen_spanish_reading: esta piedra ... será casa de Yahvé
  alternative_spanish_readings:
  - esta piedra ... será la casa de Yahvé
  - este lugar será casa de Yahvé
  rationale: Se conserva la tensión del original entre la piedra erigida y la designación del lugar/casa. La redacción mantiene la referencia concreta sin suavizarla hacia una paráfrasis más libre.
  doctrine_reference: Voto patriarcal; lugar santo
translation_notes:
  revision_awareness: El pasaje coincide con la versión inglesa auditada y con la revisión más reciente, marcada como unchanged; no se identifican cambios necesarios respecto del texto fuente o del criterio POB en inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino conforme a la convención del proyecto.
  - Se usó 'diezmo' por ser el equivalente consagrado y claro de 'a tenth' en este contexto votivo.
  - Se conservó la estructura condicional y votiva del original sin expandirla interpretativamente.
