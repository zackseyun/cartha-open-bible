  revision_rationale: Se añadió 'entonces' para reflejar la lógica condicional del voto, se suavizó la coordinación 'como pilar y como señal' para mejor español, y se cambió 'el diezmo' por 'la décima parte' para representar más directamente el sentido de 'a tenth' del original.
