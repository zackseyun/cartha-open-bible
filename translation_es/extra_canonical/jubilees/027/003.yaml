translation:
  language: es
  text: y hasta que él aparte de ti su ira y olvide todo lo que le hiciste. Entonces enviaré y te haré volver desde allí.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መዐተ / anger
  english_pob_choice: he turns his anger away from you
  chosen_spanish: aparte de ti su ira
  alternatives_spanish:
  - desvíe de ti su ira
  - retire de ti su ira
  - aparte su enojo de ti
  lexicon: Lexical rendering of the Ge'ez accusative object 'anger' as the thing turned away, not as the subject.
  rationale: La revisión inglesa corrigió la gramática para mostrar que la ira es el objeto que él aparta. En español, 'aparte de ti su ira' conserva esa relación y suena natural; evita la imagen menos clara de que 'la ira' se vaya por sí sola.
- source_word: ይረስዕ / forgets
  english_pob_choice: he forgets all that you did to him
  chosen_spanish: olvide todo lo que le hiciste
  alternatives_spanish:
  - olvid(e) todo lo que le hiciste
  - olvide todo cuanto le hiciste
  - se olvide de todo lo que le hiciste
  lexicon: Standard cognitive verb sense for 'forget' in a reconciliation context.
  rationale: '''Olvide'' conserva la fuerza de la memoria que cesa respecto a una ofensa pasada. Mantengo el complemento ''todo lo que le hiciste'' para no suavizar el alcance del recuerdo.'
- source_word: ወፈነውየ / I will send
  english_pob_choice: Then I will send and bring you back from there
  chosen_spanish: Entonces enviaré y te haré volver desde allí
  alternatives_spanish:
  - Entonces enviaré y te traeré desde allí
  - Entonces mandaré y te haré regresar desde allí
  lexicon: Verbal sequence of sending and bringing back.
  rationale: '''Enviaré'' y ''te haré volver'' reflejan la doble acción del original y del inglés POB, conservando el matiz de causar el regreso sin añadir un verbo más idiomático pero menos transparente como ''traer''.'
theological_decisions:
- issue: Agency of anger and reconciliation
  english_pob_reading: he turns his anger away from you
  chosen_spanish_reading: él aparte de ti su ira
  alternative_spanish_readings:
  - su ira se aparte de ti
  - él retire su enojo
  rationale: La revisión inglesa muestra que el sujeto es él, no la ira. El español mantiene esa agencia y evita una lectura impersonal que debilitaría la restitución relacional del pasaje.
  doctrine_reference: Narrative reconciliation / forgiveness motif in Genesis-Jubilees tradition
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del inglés POB, que corrige la antigua lectura 'his anger leaves you' por una estructura activa en la que él aparta su ira de ti. No se incorporan notas textuales porque en este versículo no se preservó una alternativa editorial con anclaje en el texto español.
  spanish_consistency_notes:
  - Se usa 'ira' para mantener el registro bíblico y la correspondencia con el objeto del verbo en la revisión inglesa.
  - Se evita 'SEÑOR' o terminología de sustitución porque aquí no hay el Tetragrámaton en el texto fuente.
  - Se conserva la coordinación verbal 'enviaré y te haré volver' para reflejar la secuencia del original sin expandir el sentido.
