  source_alignment_summary: 'El borrador español conserva fielmente el sentido del ge''ez según la evidencia disponible y coincide con la traducción inglesa auditada: Rebeca entra y habla a Isaac; expresa fuerte aversión hacia su vida; la causa son las dos hijas de Het; y se especifica que Esaú las tomó para sí como esposas.'
