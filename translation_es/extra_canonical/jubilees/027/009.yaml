translation:
  language: es
  text: 'Y Rebeca entró y dijo a Isaac: «Aborrezco mi vida a causa de las dos hijas de Het que Esaú se ha tomado por esposas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወቦአት፡ ርብቃ፡ ወትቤሎ፡ ለይስሐቅ፡
  english_pob_choice: And Rebekah went in and said to Isaac
  chosen_spanish: Y Rebeca entró y dijo a Isaac
  alternatives_spanish:
  - Y Rebeca fue y dijo a Isaac
  - Entonces Rebeca entró y habló a Isaac
  lexicon: Rebekah/Rebeca; went in/entró; said/dijo
  rationale: El ge'ez indica movimiento de entrada antes del habla; 'entró' conserva el sentido sin añadir más que el texto exige. 'Dijo a Isaac' sigue de cerca la estructura narrativa del POB inglés y es natural en español.
- source_word: ገእዝኩ፡ ሕይወትየ፡
  english_pob_choice: I loathe my life
  chosen_spanish: Aborrezco mi vida
  alternatives_spanish:
  - Desprecio mi vida
  - Me disgusta mi vida
  lexicon: loathe/aborrecer
  rationale: '''Aborrecer'' mantiene la fuerza afectiva negativa del original mejor que un debilitado ''disgustar''. ''Mi vida'' es la referencia directa al estado personal, como en el inglés POB.'
- source_word: '*እምክልኤሆን፡ አዋልደ፡¹⁸ ኬጥ፡'
  english_pob_choice: because of the two daughters of Heth
  chosen_spanish: a causa de las dos hijas de Het
  alternatives_spanish:
  - por las dos hijas de Het
  - a causa de las dos hijas de Heth
  lexicon: daughters of Heth/hijas de Het
  rationale: Se conserva 'Het' como transliteración breve y ampliamente inteligible; el nombre puede aparecer también como 'Heth'. 'A causa de' refleja la relación causal del original.
- source_word: እለ፡ ነሥአ፡ ዔሳው፡ ሎቱ፡¹⁹ አንስትያ፡
  english_pob_choice: whom Esau has taken for himself as wives
  chosen_spanish: que Esaú se ha tomado por esposas
  alternatives_spanish:
  - que Esaú ha tomado para sí como esposas
  - que Esaú ha tomado como mujeres
  lexicon: has taken for himself as wives/se ha tomado por esposas
  rationale: '''Se ha tomado'' conserva la iniciativa reflexiva de ''for himself''. ''Esposas'' traduce con precisión el plural matrimonial sin suavizarlo a ''mujeres''.'
translation_notes:
  revision_awareness: The latest revision pass reported no changes needed (high agreement). The Spanish draft therefore follows the stable English POB reading and the Ge'ez source closely, without introducing speculative variants.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece.
  - Se mantiene la referencia a Esaú y las hijas de Het de forma literal y narrativa.
  - El tono es sobrio y bíblico, pero no arcaizante.
