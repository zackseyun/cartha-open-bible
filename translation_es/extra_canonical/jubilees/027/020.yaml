    timestamp: '2026-04-23T14:51:03Z'
    unchanged: false
    changes_summary: Replaced 'a complete man' with 'a blameless man' for more natural and accurate formal English; retained the rest unchanged.
translation:
  language: es
  text: No temas por él, hermana mía, porque es recto en su camino[a], y es un hombre irreprochable, y es fiel, y no será abandonado. No llores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en sus caminos».'
    reason: previous_rendering
lexical_decisions:
- source_word: ኢትፍርሂ፡
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas por él
  lexicon: fear
  rationale: Imperativo negativo natural en español; 'No temas' conserva la fuerza exhortativa y la relación de cercanía del discurso directo.
- source_word: በፍኖቱ፡
  english_pob_choice: in his way
  chosen_spanish: en su camino
  alternatives_spanish:
  - en su senda
  - en su vía
  lexicon: way/path
  rationale: El singular del ge'ez se refleja mejor con 'camino' que con 'caminos'; por estilo español puede quedar sin nota adicional, aunque la nota marca la alternativa singular frente a una posible lectura idiomática.
- source_word: ፍጹም
  english_pob_choice: blameless
  chosen_spanish: irreprochable
  alternatives_spanish:
  - sin culpa
  - intachable
  lexicon: blameless
  rationale: '''Irreprochable'' comunica adecuadamente la evaluación moral sin sonar excesivamente técnica; evita confundir ''completo'' con el valor revisado y connota inocencia/moralidad.'
- source_word: ብእሲ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - varón
  - persona
  lexicon: man/person
  rationale: '''Hombre'' es la correspondencia directa y natural en este contexto de caracterización moral.'
- source_word: ወፍጹም፡ ውእቱ፡ ብእሲ፡
  english_pob_choice: and he is a blameless man
  chosen_spanish: y es un hombre irreprochable
  alternatives_spanish:
  - y es un hombre sin culpa
  - y es un varón intachable
  lexicon: blameless man
  rationale: Conserva la estructura copulativa y la valoración moral explícita del original y del audit trail en inglés.
- source_word: ወ³⁰ምእመን፡ ውእቱ፡
  english_pob_choice: and he is faithful
  chosen_spanish: y es fiel
  alternatives_spanish:
  - y es leal
  - y permanece fiel
  lexicon: faithful
  rationale: '''Fiel'' es el equivalente español más directo y eclesialmente transparente para la cualidad de confiabilidad/constancia.'
- source_word: ወኢይትገደፍ፡
  english_pob_choice: and he will not be forsaken
  chosen_spanish: y no será abandonado
  alternatives_spanish:
  - y no será desamparado
  - y no será dejado
  lexicon: forsaken/abandoned
  rationale: '''Abandonado'' expresa bien el sentido pasivo de no quedar desamparado; evita introducir un sujeto no presente en el ge''ez.'
- source_word: ኢትብከዪ።
  english_pob_choice: Do not weep.
  chosen_spanish: No llores.
  alternatives_spanish:
  - No llores tú
  - No estés llorando
  lexicon: weep
  rationale: Imperativo negativo natural y breve en español; mantiene el cierre directo y emotivo.
theological_decisions:
- issue: Valor moral de la persona descrita
  english_pob_reading: upright / blameless / faithful
  chosen_spanish_reading: recto / irreprochable / fiel
  alternative_spanish_readings:
  - justo / sin culpa / leal
  - recto / intachable / constante
  rationale: La tríada del texto apunta a integridad moral y confiabilidad, no a una afirmación doctrinal especializada; se mantiene la evaluación ética sin sobreteologizar.
  doctrine_reference: Integridad moral en lenguaje sapiencial/narrativo; cf. uso bíblico de 'recto' e 'irreprochable'.
- issue: Sentido de 'not be forsaken'
  english_pob_reading: he will not be forsaken
  chosen_spanish_reading: no será abandonado
  alternative_spanish_readings:
  - no será desamparado
  - no será dejado
  rationale: La pasiva expresa permanencia y protección; 'abandonado' mantiene el peso relacional y narrativo sin cargarlo con una doctrina explícita de salvación.
  doctrine_reference: Providencia y preservación divina en lenguaje narrativo.
translation_notes:
  revision_awareness: El inglés POB pasó de 'complete man' a 'blameless man' y añadió explícitamente 'he will not be forsaken'; la versión española sigue esa revisión, evitando el valor de 'completo' y reflejando la cláusula final ausente en la primera redacción inglesa. También se respetó la lectura singular de 'way'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparece el nombre divino; aquí no aparece, así que no se introduce.
  - '''Recto'' mantiene la evaluación de conducta y no sustituye a ''irreprochable''; ambos rasgos se preservan por separado.'
  - La nota [a] está anclada en 'camino' para reflejar la alternativa singular/idiomática sin duplicar notas.
