revisions:
- from: Y Jacob salió de la Fuente del Juramento para ir a Harán en el primer año de la segunda semana del cuadragésimo cuarto jubileo. Y llegó a Luz, que está en los montes, es decir, Betel, en la luna nueva del primer mes de esta semana. Y llegó a un cierto lugar al atardecer, y se apartó de su camino hacia el occidente de la senda[a] aquella noche, y durmió allí, porque el sol se había puesto.
  to: Y Jacob salió de la Fuente del Juramento para ir a Harán en el primer año de la segunda semana del cuadragésimo cuarto jubileo. Y llegó a Luz, que está en los montes, es decir, Betel, en la luna nueva del primer mes de esta semana. Y llegó a cierto lugar al atardecer, y se apartó de su camino hacia el lado occidental del camino[a] aquella noche, y durmió allí, porque el sol se había puesto.
  rationale: 'Se hicieron dos ajustes menores de estilo y claridad: «un cierto lugar» pasó a «cierto lugar» para un español más natural, y «hacia el occidente de la senda» se reformuló como «hacia el lado occidental del camino» para expresar con más claridad la relación espacial indicada por la revisión de la fuente. No cambia el sentido.'
