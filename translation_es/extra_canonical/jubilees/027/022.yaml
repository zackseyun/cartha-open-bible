base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/027/022.yaml
  text: And Jacob went out from the Well of the Oath to go to Haran in the first year of the second week of the forty-fourth jubilee. And he came to Luz, which is in the mountains, that is, Bethel, on the new moon of the first month of this week. And he came to a certain place at evening, and he turned aside from his road to the west of the road that night, and he slept there, because the sun had set.
  footnotes:
  - marker: a
    text: Or 'and he turned aside from the road that night'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:35Z'
    unchanged: false
    changes_summary: Added 'a certain' before 'place' to reflect the indefinite sense of the source term, and smoothed 'on that night' to 'that night' for more natural English while preserving meaning.
translation:
  language: es
  text: Y Jacob salió de la Fuente del Juramento para ir a Harán en el primer año de la segunda semana del cuadragésimo cuarto jubileo. Y llegó a Luz, que está en los montes, es decir, Betel, en la luna nueva del primer mes de esta semana. Y llegó a cierto lugar al atardecer, y se apartó de su camino hacia el lado occidental del camino[a] aquella noche, y durmió allí, porque el sol se había puesto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y se apartó de su camino aquella noche». La revisión del ge''ez añade la dirección «hacia el lado occidental del camino», que el texto principal conserva.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወወፅአ፡ ... እምዐዘቆተ፡ መሐላ፡
  english_pob_choice: went out from the Well of the Oath
  chosen_spanish: salió de la Fuente del Juramento
  alternatives_spanish:
  - salió del Pozo del Juramento
  - partió de la Fuente del Juramento
  lexicon: salir; fuente/pozo; juramento
  rationale: El ge'ez indica literalmente una salida desde el lugar llamado por el juramento. 'Fuente' conserva bien el nombre propio ya fijado por la POB y evita una rigidez innecesaria; 'Juramento' corresponde directamente a መሐላ.
- source_word: ቀዳሚ፡ ዘሱባዔ፡ ካልእ፡ *ዘአርብዓ፡ ወአርባዕቱ፡ ኢዮቤል
  english_pob_choice: the first year of the second week of the forty-fourth jubilee
  chosen_spanish: el primer año de la segunda semana del cuadragésimo cuarto jubileo
  alternatives_spanish:
  - el primer año de la segunda semana del jubileo cuadragésimo cuarto
  - el primer año de la segunda semana del jubileo cuarenta y cuatro
  lexicon: año; semana; jubileo
  rationale: Se conserva la estructura calendárica técnica del texto. 'Cuadragésimo cuarto' es más natural y fiel al valor ordinal que 'cuarenta y cuatro' en este registro.
- source_word: ሉዛ፡ ... ይእቲ፡ ቤቴል፡
  english_pob_choice: Luz, which is in the mountains, that is, Bethel
  chosen_spanish: Luz, que está en los montes, es decir, Betel
  alternatives_spanish:
  - Luz, que está en las montañas, es decir, Betel
  - Luz, que está en el monte, es decir, Betel
  lexicon: montes; Betel
  rationale: '''Montes'' reproduce el plural del sentido ge''ez y suena más bíblico que ''montañas''; ''es decir'' mantiene la glosa identificadora sin cargarla de interpretación.'
- source_word: በሠርቀ፡ ወርኅ፡
  english_pob_choice: on the new moon
  chosen_spanish: en la luna nueva
  alternatives_spanish:
  - en el novilunio
  - en la nueva luna
  lexicon: luna nueva; novilunio
  rationale: La expresión técnica calendárica se traduce de forma transparente y bíblica como 'luna nueva', que en español conserva el valor de marcador temporal.
- source_word: መካነ፡ መሴየ፡
  english_pob_choice: a certain place
  chosen_spanish: un cierto lugar
  alternatives_spanish:
  - un lugar determinado
  - un lugar
  lexicon: cierto; lugar
  rationale: El ge'ez e inglés auditan un indefinido; 'un cierto lugar' conserva esa indefinición sin perder naturalidad.
- source_word: ወተገኅሠ፡ እምፍኖቱ፡ ... ለመንገደ፡ ዛቲ፡ ሌሊት፡
  english_pob_choice: and he turned aside from the road that night
  chosen_spanish: y se apartó de su camino hacia el occidente de la senda[a] aquella noche
  alternatives_spanish:
  - y se desvió de su camino aquella noche
  - y se apartó de la vía aquella noche
  lexicon: apartarse; camino/senda; occidente
  rationale: La revisión crítica señala que el ge'ez no solo dice que se apartó, sino que lo hizo 'hacia el occidente de la senda'. Por eso se conserva la dirección. 'Camino' traduce ፍኖት con naturalidad, y 'senda' permite mantener la referencia al camino como vía concreta. La frase es algo densa, pero evita omitir una cláusula significativa.
- source_word: ኖመ፡ ... እስመ፡ ዐረበ፡ ፀሐይ
  english_pob_choice: he slept there, because the sun had set
  chosen_spanish: durmió allí, porque el sol se había puesto
  alternatives_spanish:
  - se acostó allí, porque el sol se había puesto
  - durmió allí, pues el sol se había puesto
  lexicon: dormir; ponerse el sol
  rationale: El verbo principal es simple y directo; 'durmió' reproduce el hecho narrativo sin inferir más que el texto. 'Se había puesto' refleja el perfecto anterior a la acción de dormir.
theological_decisions:
- issue: El nombre divino del lugar 'Well of the Oath' y la política de nomenclatura bíblica
  english_pob_reading: Well of the Oath
  chosen_spanish_reading: Fuente del Juramento
  alternative_spanish_readings:
  - Pozo del Juramento
  - Fuente del Juramento
  rationale: No hay aquí el tetragrámaton, pero sí un topónimo ligado a juramento. Se mantiene 'Fuente' porque es el equivalente ya asentado en la POB inglesa y evita una restricción innecesaria en español; no se sustituye por un término eclesiástico tradicional sin base textual.
  doctrine_reference: toponymy and lexical consistency
translation_notes:
  revision_awareness: La redacción española incorpora la revisión más reciente del audit trail al conservar la precisión direccional («hacia el occidente de la senda») que fue señalada como omitida en un pase anterior. También mantiene la indefinición de «un cierto lugar», acorde con la actualización del texto inglés auditable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como política general del proyecto solo cuando aparezca el nombre divino; aquí no aparece.
  - Se conserva la estructura calendárica técnica («semana», «jubileo») sin domesticarla a un idioma litúrgico distinto.
  - «Luna nueva» se usa como marcador temporal bíblico estándar, no como referencia astronómica explicativa.
  - La glosa «es decir, Betel» mantiene la identificación explícita sin añadir interpretación.
  - La nota al pie marca la variante textual ya documentada en el audit trail y distingue la lectura breve de la lectura con dirección explícita.
