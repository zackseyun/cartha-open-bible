base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/027/016.yaml
  text: And after Jacob had arisen to go to Mesopotamia, the spirit of Rebekah was grieved over her son, and she wept.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:03Z'
    unchanged: false
    changes_summary: Changed 'risen' to 'arisen' for more natural formal English after 'had'; changed 'after her son' to 'over her son' to better reflect mourning/grief in English without implying sequence.
translation:
  language: es
  text: Y después de que Jacob se puso en camino para ir a Mesopotamia, el espíritu de Rebeca se entristeció por su hijo, y lloró.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወኮነ፡ እምድኅረ፡ *ተንሥአ፡ ያዕቆብ፡ ሰሐዊረ፡³⁸ መስጶጦሚያ፡³⁹
  english_pob_choice: And after Jacob had arisen to go to Mesopotamia
  chosen_spanish: Y después de que Jacob hubo partido para ir a Mesopotamia
  alternatives_spanish:
  - Y después de que Jacob se levantó para ir a Mesopotamia
  - Y después de que Jacob hubo subido para ir a Mesopotamia
  lexicon: Jubileos 27:16
  rationale: El geʽez indica una secuencia posterior a que Jacob se puso en marcha; en español, 'hubo partido' conserva el valor de inicio de acción sin sonar tan literal como 'arisen'. 'Partir' comunica el arranque del viaje, y 'Mesopotamia' sigue la forma ya fijada en la POB inglesa.
- source_word: መንፈሰ፡ ርብቃ፡
  english_pob_choice: the spirit of Rebekah
  chosen_spanish: el espíritu de Rebeca
  alternatives_spanish:
  - el ánimo de Rebeca
  - el espíritu interior de Rebeca
  lexicon: Jubileos 27:16
  rationale: '''Espíritu'' reproduce con fidelidad la expresión del original y mantiene la posible amplitud semántica de la voz geʽez, sin reducirla a mera emoción. No se añade ''Santo'' ni se explica más de lo que el texto dice.'
- source_word: ድኅረ፡ ወልዳ፡
  english_pob_choice: over her son
  chosen_spanish: por su hijo
  alternatives_spanish:
  - a causa de su hijo
  - por su hijo, es decir, por la situación de su hijo
  lexicon: Jubileos 27:16
  rationale: La revisión inglesa corrigió una expresión temporal ambigua a una de lamento. En español, 'se entristeció por su hijo' expresa bien el objeto del dolor sin introducir una causa doctrinal o psicológica ajena al texto.
- source_word: ወትበኪ።
  english_pob_choice: and she wept
  chosen_spanish: y ella lloró
  alternatives_spanish:
  - y lloró
  - y se puso a llorar
  lexicon: Jubileos 27:16
  rationale: '''Lloró'' es la forma más natural y fiel en español para el acto de llanto final. Se mantiene el sujeto explícito para claridad narrativa.'
theological_decisions:
- issue: ‘Espíritu de Rebeca’ como expresión antropológica, no necesariamente doctrinalmente técnica
  english_pob_reading: the spirit of Rebekah was grieved over her son
  chosen_spanish_reading: el espíritu de Rebeca se entristeció por su hijo
  alternative_spanish_readings:
  - Rebeca se angustió por su hijo
  - el ánimo de Rebeca se llenó de dolor por su hijo
  rationale: El pasaje describe duelo o aflicción del interior de Rebeca. 'Espíritu' conserva la formulación del texto fuente y evita normalizarla a una mera emoción, mientras 'se entristeció' comunica el resultado afectivo sin elevarlo a una categoría doctrinal no explicitada.
  doctrine_reference: Antropología bíblica; lenguaje de lamento y aflicción interior
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'arisen' por 'arisen' y, más importante, 'after her son' por 'over her son' para aclarar el matiz de duelo. La traducción española refleja ese ajuste con 'se entristeció por su hijo', evitando una lectura temporal errónea.
  spanish_consistency_notes:
  - Se mantiene 'Mesopotamia' como topónimo histórico establecido.
  - Se usa 'espíritu' en línea con la expresión fuente, sin expandirla a una paráfrasis psicológica.
  - No se introducen notas al pie porque el verso es breve y no presenta variantes textuales o léxicas obligatorias para el lector español.
