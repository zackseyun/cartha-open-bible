translation:
  language: es
  text: Y que Dios Todopoderoso te bendiga, te haga fructífero y te multiplique, y que llegues a ser una asamblea de naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአምላከ፡ ሰዳይ፡
  english_pob_choice: God Almighty
  chosen_spanish: Dios Todopoderoso
  alternatives_spanish:
  - Dios Omnipotente
  - el Dios Todopoderoso
  lexicon: אֱלֹהִים / θεός
  rationale: El ge'ez corresponde al título de Dios en sentido de poder soberano; la equivalencia más natural y fiel en español bíblico es 'Dios Todopoderoso'. Mantiene el énfasis de poder sin introducir una perífrasis innecesaria.
- source_word: ይባርከ፡
  english_pob_choice: bless
  chosen_spanish: te bendiga
  alternatives_spanish:
  - te bendiga favorablemente
  - te conceda bendición
  lexicon: ברך / εὐλογέω
  rationale: '''Bendiga'' transmite de forma directa la acción de conferir favor y bienestar. En español religioso es la opción más clara y no fuerza un matiz ajeno al texto.'
- source_word: ያልህቀ፡
  english_pob_choice: make you fruitful
  chosen_spanish: te haga fructífero
  alternatives_spanish:
  - te haga fecundo
  - te haga dar fruto
  lexicon: פרה
  rationale: El verbo expresa fecundidad/fruitfulness. 'Fructífero' conserva la imagen bíblica y es idiomático; 'fecundo' es posible, pero menos transparente para lectura pública.
- source_word: ያብዝኀከ፡
  english_pob_choice: multiply you
  chosen_spanish: te multiplique
  alternatives_spanish:
  - te aumente
  - te haga crecer en número
  lexicon: רבה
  rationale: '''Multiplique'' reproduce con precisión la idea de aumento numérico, en paralelo con el hebraísmo bíblico de bendición y descendencia.'
- source_word: መክብበ፡ አሕዛብ፡
  english_pob_choice: an assembly of nations
  chosen_spanish: una asamblea de naciones
  alternatives_spanish:
  - una congregación de naciones
  - una reunión de naciones
  lexicon: קהל + גוים
  rationale: '''Asamblea'' conserva el valor colectivo y formal de መክብበ, sin sustituirlo por un término eclesial técnico. ''Naciones'' mantiene el referente étnico-político de አሕዛብ.'
theological_decisions:
- issue: Título divino equivalente a 'God Almighty'
  english_pob_reading: God Almighty
  chosen_spanish_reading: Dios Todopoderoso
  alternative_spanish_readings:
  - Dios Omnipotente
  rationale: No hay indicio de que el texto requiera ocultar el nombre divino ni reemplazarlo por una convención litúrgica. El título resalta la soberanía y capacidad creadora de Dios, por lo que 'Todopoderoso' preserva el sentido teológico de plenitud de poder.
  doctrine_reference: Génesis 17:1; Apocalipsis 1:8
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado mostró alta concordancia (1.0). La redacción española sigue de cerca el sentido del ge'ez y el POB inglés, sin añadir notas textuales porque no hay variantes ni tensiones documentadas en el expediente.
  spanish_consistency_notes:
  - 'Se mantiene el orden de bendición en tres miembros: bendecir, hacer fructífero, multiplicar.'
  - '''Asamblea de naciones'' conserva el tono colectivo y evita una lectura eclesiástica no sustentada.'
  - No se usa 'SEÑOR' porque el testimonio fuente aquí expresa el título divino, no una sustitución reverencial del nombre.
