  yaml_path: translation/extra_canonical/jubilees/027/006.yaml
  text: And Jacob said to Rebekah his mother, “Look, you know that my father has become old and does not see, because his eyes are dim. And if I leave him, it will be evil in his sight, because I have left him and gone away from you.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:01Z'
    unchanged: false
    changes_summary: Added the closing quotation mark and period. Kept the wording otherwise, since it is accurate and natural for the source.
translation:
  language: es
  text: 'Y Jacob dijo a Rebeca su madre: «Mira, tú sabes que mi padre ha envejecido y no ve, porque sus ojos están empañados. Y si lo dejo, será malo ante sus ojos[a], porque lo he dejado y me he ido de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Será malo ante sus ojos» conserva una expresión semítica del original que vincula la percepción visual con la evaluación moral o personal; en español también podría entenderse como «le parecerá mal».
    reason: alternative_reading
lexical_decisions:
- source_word: ያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - יעקב
  lexicon: nombre propio
  rationale: Se conserva el nombre bíblico usual en español como equivalente directo del nombre propio del original.
- source_word: ለርብቃ፡ እሙ፡
  english_pob_choice: Rebekah his mother
  chosen_spanish: Rebeca su madre
  alternatives_spanish:
  - Rebeca, su madre
  - Rebeca, la madre de él
  lexicon: nombre propio / relación familiar
  rationale: «Rebeca» es la forma establecida en español; «su madre» mantiene la relación explícita del original sin añadir interpretación.
- source_word: ናሁ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Observa
  lexicon: partícula de atención
  rationale: La partícula introduce una apelación directa. «Mira» conserva el tono exhortativo y es natural en español contemporáneo.
- source_word: ታእምሪ
  english_pob_choice: you know
  chosen_spanish: tú sabes
  alternatives_spanish:
  - sabes
  - ya sabes
  lexicon: verbo cognitivo
  rationale: Se mantiene la fuerza de conocimiento compartido, sin sobretraducir como fórmula devocional.
- source_word: ረሰአ
  english_pob_choice: has become old
  chosen_spanish: ha envejecido
  alternatives_spanish:
  - se ha vuelto viejo
  - ha llegado a viejo
  lexicon: edad / vejez
  rationale: «Ha envejecido» expresa bien el estado resultante del proceso de hacerse viejo y suena natural en español.
- source_word: ወኢይሬኢ
  english_pob_choice: does not see
  chosen_spanish: no ve
  alternatives_spanish:
  - no puede ver
  - está ciego
  lexicon: percepción visual
  rationale: La traducción simple mantiene la afirmación directa del texto; no se intensifica a una condición médica más fuerte que la fuente.
- source_word: ክቡዳ፡ አዕይንቲሁ
  english_pob_choice: his eyes are dim
  chosen_spanish: sus ojos están empañados
  alternatives_spanish:
  - sus ojos están débiles
  - sus ojos están oscurecidos
  lexicon: imagen visual / metáfora
  rationale: «Empañados» comunica la idea de visión debilitada y conserva la imagen idiomática sin introducir una metáfora ajena.
- source_word: እኩይ፡ ውእቱ
  english_pob_choice: it will be evil in his sight
  chosen_spanish: será malo a sus ojos
  alternatives_spanish:
  - será malo ante sus ojos
  - le parecerá mal
  lexicon: juicio / evaluación
  rationale: Se conserva la expresión semítica de evaluación por la vista («a sus ojos») en lugar de normalizarla del todo, porque el original la pone en paralelo con la visión física.
- source_word: አኀድጎ
  english_pob_choice: I have left him
  chosen_spanish: lo he dejado
  alternatives_spanish:
  - lo he abandonado
  - lo he dejado solo
  lexicon: relación / separación
  rationale: «Lo he dejado» reproduce la acción con neutralidad y mantiene el paralelismo con la cláusula siguiente.
- source_word: ወአሐውር፡ እምኔክሙ
  english_pob_choice: and gone away from you
  chosen_spanish: y me he ido de ustedes
  alternatives_spanish:
  - y me he alejado de ustedes
  - y me he ido de ustedes
  lexicon: desplazamiento / separación
  rationale: «Me he ido de ustedes» conserva el sentido de alejarse de la familia sin forzar una especificación espacial no presente en el texto.
theological_decisions:
- issue: Tratamiento de la expresión evaluativa «malo a sus ojos»
  english_pob_reading: it will be evil in his sight
  chosen_spanish_reading: será malo a sus ojos
  alternative_spanish_readings:
  - le parecerá mal
  - será malo ante sus ojos
  rationale: Se conserva la locución semítica porque el texto conecta la ceguera de Isaac con su evaluación de la ausencia de Jacob; suavizarla perdería esa relación literaria.
  doctrine_reference: No aplica; decisión literaria y semántica, no doctrinal.
- issue: Referencia al deterioro visual de Isaac
  english_pob_reading: his eyes are dim
  chosen_spanish_reading: sus ojos están empañados
  alternative_spanish_readings:
  - sus ojos están débiles
  - está casi ciego
  rationale: «Empañados» mantiene el valor descriptivo de la fuente y evita definir el estado con más precisión clínica de la que ofrece el texto.
  doctrine_reference: No aplica; descripción narrativa.
translation_notes:
  revision_awareness: El texto inglés revisado solo añadió la comilla de cierre y el punto final; la redacción base se mantuvo por ser fiel y natural. La versión española refleja esa misma estabilidad textual y cierra la cita de manera equivalente.
  spanish_consistency_notes:
  - Se usa «Jacob» y «Rebeca» con las formas españolas habituales para nombres bíblicos.
  - Se mantiene el paralelismo entre la ceguera física y la evaluación de Isaac con «a sus ojos».
  - «Ustedes» traduce el plural implícito del final, que en español resulta más claro que un singular ambiguo.
