review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del ge''ez y del POB inglés: Jacob habla a Rebeca, menciona la vejez y la mala vista de su padre, y teme que dejarlo sea visto negativamente porque se habría alejado de ellos. Sin embargo, hay un pequeño problema de español y de matiz en «será malo a sus ojos», donde la preposición suena poco natural; «ante sus ojos» preserva mejor la imagen semítica y el sentido evaluativo.'
  spanish_quality_summary: 'El texto es claro y mayormente natural. «Sus ojos están empañados» funciona, aunque «están debilitados» u «oscurecidos» también serían posibles. La principal reparación necesaria es idiomática: en español bíblico y general se dice «malo ante sus ojos» o «le parecerá mal», no «malo a sus ojos». Además, el anclaje de la nota debe ir sobre la frase pertinente, no después de las comillas finales.'
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. Los nombres propios y el registro son adecuados. La decisión de conservar una expresión semítica es válida, pero debe ajustarse a una formulación española más fiel e inteligible: «ante sus ojos».'
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «será malo a sus ojos»'
    rationale: Aunque intenta conservar el semitismo, «a sus ojos» con «será malo» suena forzado en español. «Será malo ante sus ojos» preserva la imagen y mejora la legibilidad.
  - severity: low
    issue: Ubicación del marcador de nota
    rationale: La nota explica una frase interna, por lo que el marcador debe colocarse junto a «ante sus ojos», no fuera de la cita completa.
  revised_spanish_text: 'Y Jacob dijo a Rebeca su madre: «Mira, tú sabes que mi padre ha envejecido y no ve, porque sus ojos están empañados. Y si lo dejo, será malo ante sus ojos[a], porque lo he dejado y me he ido de ustedes».'
  revised_footnotes:
  - marker: a
    text: «Será malo ante sus ojos» conserva una expresión semítica del original que vincula la percepción visual con la evaluación moral o personal; en español también podría entenderse como «le parecerá mal».
    reason: alternative_reading
  revision_rationale: Se hizo una reparación menor para que la expresión semítica suene natural en español sin perder el matiz del original. También se reubicó el marcador de nota en la frase que la nota explica.
