  text: y mi padre se enojará y me maldecirá. No iré; solo si él me envía iré.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አቡየ
  english_pob_choice: my father
  chosen_spanish: mi padre
  alternatives_spanish:
  - mi papá
  lexicon: padre
  rationale: El posesivo y el sustantivo son directos; ‘mi padre’ conserva el parentesco sin añadir matiz afectivo no requerido por el texto.
- source_word: ወይትመዓዕ
  english_pob_choice: will be angry
  chosen_spanish: se enojará
  alternatives_spanish:
  - se indignará
  - se enfurecerá
  lexicon: enojarse
  rationale: El verbo expresa con naturalidad la reacción de enojo prevista; ‘indignarse’ o ‘enfurecerse’ intensifican más de lo que exige el contexto.
- source_word: ወይረግመኒ
  english_pob_choice: curse me
  chosen_spanish: me maldecirá
  alternatives_spanish:
  - me condenará con una maldición
  - me echará una maldición
  lexicon: maldecir
  rationale: ‘Maldecir’ reproduce el valor verbal básico sin suavizarlo ni sustituirlo por una perífrasis menos directa.
- source_word: ኢየሐውር
  english_pob_choice: I will not go
  chosen_spanish: No iré
  alternatives_spanish:
  - No voy a ir
  - No iré allá
  lexicon: ir
  rationale: La negación simple y el futuro expresan la negativa volitiva con claridad y concisión en español.
- source_word: ባሕቱ
  english_pob_choice: only if
  chosen_spanish: solo si
  alternatives_spanish:
  - excepto si
  - a menos que
  lexicon: solo si
  rationale: ‘Solo si’ refleja bien la condición limitada del original y mantiene el valor restrictivo de la cláusula.
- source_word: ፈነወኒ
  english_pob_choice: he sends me
  chosen_spanish: él me envía
  alternatives_spanish:
  - él me manda
  - me manda
  lexicon: enviar
  rationale: ‘Enviar’ conserva la idea de ser mandado con encargo o autorización; ‘manda’ es posible, pero ‘envía’ resulta más neutral y claro.
theological_decisions:
- issue: La relación entre el mandato del padre y la obediencia del hablante
  english_pob_reading: I will not go; only if he sends me will I go.
  chosen_spanish_reading: No iré; solo si él me envía iré.
  alternative_spanish_readings:
  - No iré, a menos que él me envíe.
  - No iré; iré solo si él me envía.
  rationale: La formulación conserva la dependencia de la acción respecto del envío del padre, sin suavizar la tensión entre la negativa inicial y la excepción condicional.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa auditada no introdujo notas ni revisiones; el griego/no ge‘ez original disponible en el expediente no muestra variantes aprovechables en el texto inglés. La propuesta española sigue de cerca esa lectura estable.
  spanish_consistency_notes:
  - Se mantiene ‘padre’ en minúscula por referirse al progenitor del hablante, no como título divino.
  - Se prefiere un futuro simple en español para reflejar la voluntad/firmeza del enunciado (‘will be angry’, ‘will curse’, ‘will go’).
  - No se añade ningún elemento explicativo que no esté sugerido por el texto fuente.
