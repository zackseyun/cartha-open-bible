translation:
  language: es
  text: Dios Altísimo lo guardará de todo mal y estará con él, porque no lo abandonará todos sus días.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አምላክ፡ ልዑል፡
  english_pob_choice: The Most High God
  chosen_spanish: Dios Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - Dios, el Altísimo
  lexicon: Dios; Altísimo
  rationale: El geʽez expresa literalmente ‘Dios, el Altísimo’. En español, ‘Dios Altísimo’ conserva la construcción reverente y natural; evita el calco pesado de ‘el Más Alto Dios’ y mantiene el título divino sin ocultarlo.
- source_word: የዐቅቦ
  english_pob_choice: will guard him
  chosen_spanish: lo guardará
  alternatives_spanish:
  - lo protegerá
  - lo custodiará
  lexicon: guardar
  rationale: El verbo indica protección vigilante y preservadora. ‘Guardar’ reproduce bien esa fuerza y coincide con la equivalencia auditada del inglés, sin agregar matices ajenos.
- source_word: እምኵሉ፡ እኩይ
  english_pob_choice: from every evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de todo lo malo
  - de todo maldad
  lexicon: mal
  rationale: La frase abarca cualquier mal o daño; ‘de todo mal’ es la forma más directa y bíblicamente inteligible en español, conservando la amplitud del original.
- source_word: ወይሄሉ፡ ምስሌሁ
  english_pob_choice: and will be with him
  chosen_spanish: y estará con él
  alternatives_spanish:
  - y permanecerá con él
  - y será con él
  lexicon: estar con
  rationale: La construcción expresa compañía continua. ‘Estará con él’ es idiomática y fiel, sin sobrecargar el texto con una paráfrasis explicativa.
- source_word: ኢየኀድጎ
  english_pob_choice: he will not forsake him
  chosen_spanish: no lo abandonará
  alternatives_spanish:
  - no lo dejará
  - no lo desamparará
  lexicon: abandonar
  rationale: El sentido es de no dejar ni abandonar. ‘Abandonará’ comunica claramente la permanencia fiel; ‘desamparará’ es posible, pero más marcadamente tradicional.
- source_word: ኵሎ፡ መዋዕሊሁ
  english_pob_choice: all his days
  chosen_spanish: en todos sus días
  alternatives_spanish:
  - todos sus días
  - durante todos sus días
  lexicon: días
  rationale: La expresión temporal es durativa. ‘En todos sus días’ mantiene el ritmo y el alcance total del original, sin perder naturalidad en español.
theological_decisions:
- issue: Título divino y presencia protectora
  english_pob_reading: The Most High God will guard him ... and will be with him
  chosen_spanish_reading: Dios Altísimo lo guardará ... y estará con él
  alternative_spanish_readings:
  - El Dios Altísimo lo guardará ... y estará con él
  - Dios, el Altísimo, lo guardará ... y estará con él
  rationale: El texto atribuye a Dios Altísimo una protección activa y compañía continua. La redacción escogida conserva ambas afirmaciones sin convertirlas en lenguaje meramente devocional o explicativo.
  doctrine_reference: Providencia divina; fidelidad de Dios
- issue: Negación absoluta de abandono
  english_pob_reading: for he will not forsake him all his days
  chosen_spanish_reading: porque no lo abandonará en todos sus días
  alternative_spanish_readings:
  - porque no lo dejará en todos sus días
  - porque no lo desamparará todos sus días
  rationale: La cláusula final enfatiza una negativa total y prolongada. ‘No lo abandonará’ conserva la fuerza del juramento/promesa sin introducir una fórmula litúrgica no atestiguada por el original.
  doctrine_reference: Perseverancia de la protección divina
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo externo mostró alta concordancia; por ello se mantiene la lectura base del inglés POB, ajustada al español con equivalencia óptima y sin ampliar el alcance semántico del geʽez.
  spanish_consistency_notes:
  - Se conserva ‘Dios’ para አምላክ y ‘Altísimo’ para ልዑል, evitando sustituir el título por perífrasis más largas.
  - Se traduce el campo semántico de protección con ‘guardar’ y ‘abandonar’, que preserva la tensión entre cuidado activo y fidelidad continua.
  - No se introducen notas textuales porque el testimonio fuente y el audit trail inglés coinciden de manera alta y no presentan variantes relevantes.
