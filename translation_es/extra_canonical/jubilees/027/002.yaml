translation:
  language: es
  text: Y ahora, hijo mío, escucha mi voz. Levántate y huye a Labán, mi hermano, a Harán, y quédate con él unos pocos días, hasta que la ira de tu hermano se aparte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “listen to my voice”
  english_pob_choice: listen to my voice
  chosen_spanish: escucha mi voz
  alternatives_spanish:
  - oye mi voz
  - atiende a mi voz
  lexicon: Geʽez imperative + object phrase
  rationale: Conserva la imagen directa de oír/obedecer la voz del hablante; en español bíblico y moderno, «escucha mi voz» comunica bien la petición con naturalidad.
- source_word: “rise and flee”
  english_pob_choice: Rise and flee
  chosen_spanish: Levántate y huye
  alternatives_spanish:
  - Levántate y escapa
  - Alzate y huye
  lexicon: Geʽez verbal sequence
  rationale: 'Mantiene la doble acción imperativa del original: levantarse y huir. «Huye» refleja con más fuerza la urgencia que una paráfrasis más suave.'
- source_word: “to Laban my brother”
  english_pob_choice: to Laban my brother
  chosen_spanish: a Labán, mi hermano
  alternatives_spanish:
  - a Labán, mi hermano
  - a mi hermano Labán
  lexicon: Proper name + kinship apposition
  rationale: Preserva la aposición del texto fuente y el orden que subraya la relación familiar con Labán.
- source_word: “to Haran”
  english_pob_choice: to Haran
  chosen_spanish: a Harán
  alternatives_spanish:
  - a Harán
  lexicon: Toponym
  rationale: Se mantiene el nombre propio geográfico estándar en español bíblico.
- source_word: “stay with him a few days”
  english_pob_choice: stay with him a few days
  chosen_spanish: quédate con él unos pocos días
  alternatives_spanish:
  - quédate con él algunos días
  - permanece con él unos días
  lexicon: Geʽez duration phrase
  rationale: «Quédate con él» reproduce la idea de permanecer temporalmente. «Unos pocos días» refleja más literalmente la brevedad expresada por el original que simplemente «unos días».
- source_word: “your brother’s anger turns away”
  english_pob_choice: until your brother’s anger turns away
  chosen_spanish: hasta que la ira de tu hermano se aparte
  alternatives_spanish:
  - hasta que la ira de tu hermano se calme
  - hasta que pase el enojo de tu hermano
  lexicon: Hebraic anger idiom in the source tradition
  rationale: «Se aparte» conserva la metáfora de alejamiento/cese de la ira sin suavizarla demasiado. «Calme» o «pase» explicitan más la sensación, pero reducen la imagen verbal.
theological_decisions:
- issue: Directive to flee from the brother’s anger
  english_pob_reading: Rise and flee ... until your brother’s anger turns away
  chosen_spanish_reading: Levántate y huye ... hasta que la ira de tu hermano se aparte
  alternative_spanish_readings:
  - '... hasta que tu hermano deje de estar enojado'
  - '... hasta que se calme el enojo de tu hermano'
  rationale: El texto presenta una instrucción prudencial frente a una amenaza familiar inmediata; la traducción conserva el carácter concreto y no lo convierte en un consejo abstracto.
  doctrine_reference: Narrative prudence; no doctrinal assertion beyond the cited action and timeframe
translation_notes:
  revision_awareness: The English POB text for Jubilees 27:2 is unchanged in the latest revision pass, and cross-check review reports full agreement with no footnotes or unresolved issues. The Spanish draft therefore follows the stable English audit trail while rendering the Geʽez source directly and idiomatically.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo donde aparezca el nombre divino; en este versículo no aparece.
  - Se conserva el tono de mandato narrativo con verbos en imperativo.
  - No se introducen notas textuales porque el paquete fuente no aporta variantes ni ambigüedades documentadas en la tradición auditada.
