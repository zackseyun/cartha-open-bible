translation:
  language: es
  text: Y si Jacob toma mujer[a] de entre las hijas de la tierra como estas, ¿por qué he de seguir viviendo? Porque las hijas de Canaán son malas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “mujer”; aquí puede entenderse como “esposa” por el contexto matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ብእሲተ
  english_pob_choice: wife
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - mujer / esposa
  lexicon: Geez ብእሲተ
  rationale: El contexto habla de tomar una mujer para matrimonio; en español bíblico contemporáneo, 'mujer' puede conservar el sentido relacional sin forzar un término más técnico. 'Esposa' sería posible, pero aquí 'tomar mujer' sigue de cerca la construcción del original y mantiene la amplitud semántica que el inglés POB dejó en 'wife'.
- source_word: እምውስተ አዋልደ ምድር
  english_pob_choice: from among the daughters of the land
  chosen_spanish: de entre las hijas de la tierra
  alternatives_spanish:
  - de entre las hijas del país
  - de entre las mujeres del país
  lexicon: Geez አዋልደ ምድር
  rationale: Conservo 'hijas de la tierra' porque el giro es literal y coincide con el tono del texto fuente. 'Tierra' mantiene el contraste étnico/geográfico del pasaje, y la formulación del inglés POB no explica ni suaviza esa imagen.
- source_word: እለ ከመ፡ እሉ፡ ... ለምንት
  english_pob_choice: like these, why
  chosen_spanish: como estas, ¿por qué
  alternatives_spanish:
  - como estas, ¿para qué
  - de este modo, ¿por qué
  lexicon: Geez comparative/interrogative sequence
  rationale: La secuencia del original funciona como comparación seguida de interrogación. En español, 'como estas' reproduce la comparación; '¿por qué' refleja la pregunta existencial del POB 'why should I still live?' sin agregar interpretación adicional.
- source_word: እንከ አሐዩ
  english_pob_choice: should I still live
  chosen_spanish: he de seguir viviendo
  alternatives_spanish:
  - debo seguir viviendo
  - seguiré viviendo
  lexicon: Geez verbal clause of continued life
  rationale: La forma española 'he de seguir viviendo' comunica continuidad y tensión retórica, equivalente al valor de 'still live' en el inglés POB. Evita una paráfrasis más libre y mantiene el lamento implícito del hablante.
- source_word: እኩያት
  english_pob_choice: evil
  chosen_spanish: malas
  alternatives_spanish:
  - malvadas
  - malignas
  - malas en extremo
  lexicon: Geez እኩያት
  rationale: '''Malas'' es la opción más natural y sobria en español para este juicio moral. ''Malvadas'' intensifica el matiz, pero el POB inglés usa ''evil'' sin amplificación; por eso se conserva un término directo y comprensible.'
- source_word: አዋልደ ከናአን
  english_pob_choice: the daughters of Canaan
  chosen_spanish: las hijas de Canaán
  alternatives_spanish:
  - las mujeres de Canaán
  - las hijas del cananeo
  lexicon: Geez ethnonymic construct
  rationale: Mantengo la designación étnico-literaria 'hijas de Canaán' porque es la forma que reproduce la fuente y el inglés POB. No se sustituye por una formulación más explicativa, para conservar el contraste de linaje y pertenencia del pasaje.
theological_decisions:
- issue: Valor del lamento de Rebeca respecto a la supervivencia
  english_pob_reading: why should I still live?
  chosen_spanish_reading: ¿por qué he de seguir viviendo?
  alternative_spanish_readings:
  - ¿por qué seguiría viviendo?
  - ¿por qué tendría que seguir viviendo?
  rationale: La pregunta expresa desesperación/repudio ante la perspectiva matrimonial, no una simple duda informativa. 'He de seguir viviendo' conserva el tono retórico y el sentido existencial del inglés POB sin convertirlo en una afirmación doctrinal ajena al pasaje.
  doctrine_reference: Narrative speech in Jubilees; no doctrinal expansion beyond the lament statement.
translation_notes:
  revision_awareness: 'El último pase de revisión indicó ''unchanged: true'' y el control cruzado marcó acuerdo alto (1.0), por lo que no se introdujeron cambios de sentido respecto del inglés POB. La redacción española sigue de cerca el texto fuente y el auditable POB, sin añadir aclaraciones no sustentadas.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el contraste étnico 'hijas de la tierra' / 'hijas de Canaán' sin normalizarlo a un lenguaje más interpretativo.
  - El registro es bíblico contemporáneo, no arcaizante; se evita 'si todavía viviera' por sonar menos natural que 'he de seguir viviendo'.
