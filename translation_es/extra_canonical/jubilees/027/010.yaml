review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del ge''ez y del POB inglés: condición hipotética sobre Jacob, origen de la esposa, comparación ''como estas'', lamento existencial y juicio sobre las hijas de Canaán. No hay desviaciones teológicas. Sin embargo, la elección ''mujer'' para ብእሲተ, aunque defendible, en español actual suena menos natural que ''esposa'' tras ''toma'', y además requiere una nota innecesaria.'
  spanish_quality_summary: 'La redacción es clara y digna. ''¿por qué he de seguir viviendo?'' funciona bien. El principal ajuste es estilístico-lexical: ''tomar esposa'' comunica mejor el sentido matrimonial en español contemporáneo y evita ambigüedad. El resto del verso es natural y fiel.'
  glossary_alignment: No hay términos del glosario maestro especialmente implicados aquí. 'Canaán' está bien. La decisión sobre ብእሲተ debe priorizar legibilidad española sin perder el sentido de 'wife'; 'esposa' encaja mejor en este contexto matrimonial.
  issues:
  - severity: medium
    issue: '''toma mujer'' suena más calcado y menos natural que ''toma esposa'' en español actual'
    rationale: Aunque 'tomar mujer' existe en registro bíblico tradicional, el encargo pide español moderno pero digno. Dado que el sentido contextual es inequívocamente matrimonial y el POB inglés eligió 'wife', 'esposa' preserva mejor el significado para lectores contemporáneos.
  - severity: low
    issue: La nota [a] deja de ser necesaria si se usa 'esposa'
    rationale: La nota explica una ambigüedad creada por la elección 'mujer'. Al resolverla en el texto principal, se mejora la fluidez y se evita sobreanotar.
  revised_spanish_text: Y si Jacob toma esposa de entre las hijas de la tierra como estas, ¿por qué he de seguir viviendo? Porque las hijas de Canaán son malas.
  revision_rationale: Se sustituye 'mujer' por 'esposa' para reflejar con mayor naturalidad el sentido matrimonial de ብእሲተ/'wife' en español contemporáneo y eliminar una nota aclaratoria innecesaria. El resto del texto se mantiene por ser fiel, claro y bien alineado con la fuente y el POB inglés.
