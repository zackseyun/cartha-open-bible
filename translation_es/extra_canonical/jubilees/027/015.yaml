  text: And Isaac sent Jacob away, and he went to Mesopotamia, to Laban son of Bethuel the Syrian, the brother of Rebekah, Jacob's mother.
  footnotes:
  - marker: a
    text: Or 'his mother'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:02Z'
    unchanged: false
    changes_summary: Changed “Jacob’s mother” to “his mother” to more directly reflect the source wording while preserving natural English. No other changes needed.
translation:
  language: es
  text: Y Isaac envió a Jacob, y este fue a Mesopotamia, a Labán hijo de Betuel el sirio, hermano de Rebeca, madre de Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወፈነዎ (sent away, dismissed)
  english_pob_choice: sent Jacob away
  chosen_spanish: despidió a Jacob
  alternatives_spanish:
  - envió a Jacob
  - mandó a Jacob
  lexicon: envió/despidió
  rationale: El ge'ez expresa el acto de enviar o despedir; en español, "despidió" comunica bien la salida ordenada y natural de Jacob sin volverlo demasiado mecánico. Mantiene la iniciativa de Isaac.
- source_word: መስጶጦሚያ (Mesopotamia)
  english_pob_choice: Mesopotamia
  chosen_spanish: Mesopotamia
  alternatives_spanish:
  - Mesopotamia
  lexicon: Mesopotamia
  rationale: Nombre geográfico propio ya asentado en español y fiel al original.
- source_word: ላባ፡³⁶ ወልደ፡ ባቱኤል፡ (Laban son of Bethuel)
  english_pob_choice: Laban son of Bethuel
  chosen_spanish: Laban hijo de Betuel
  alternatives_spanish:
  - Labán hijo de Betuel
  lexicon: hijo de
  rationale: La relación filial es explícita en el original. Se conserva la filiación sin añadir títulos interpretativos.
- source_word: ሶርያዊ፡ (the Syrian)
  english_pob_choice: the Syrian
  chosen_spanish: el sirio
  alternatives_spanish:
  - el arameo
  - de Siria
  lexicon: sirio
  rationale: '"Sirio" sigue de cerca la tradición de traducción del etnónimo en este contexto y es inteligible para el lector español. Se evita expandir a una identificación más interpretativa sin necesidad textual.'
- source_word: እኁሃ፡ (brother of)
  english_pob_choice: the brother of Rebekah
  chosen_spanish: hermano de Rebeca
  alternatives_spanish:
  - hermano de Rebeca
  lexicon: hermano de
  rationale: Se mantiene la relación de parentesco tal como aparece en el texto.
- source_word: እሙ፡³⁷ ለያዕቆብ፡ (his mother / Jacob's mother)
  english_pob_choice: Jacob's mother
  chosen_spanish: madre de Jacob
  alternatives_spanish:
  - su madre
  - la madre de Jacob
  lexicon: madre de
  rationale: 'El audít trail en inglés pasó por una corrección relevante: el ge''ez explicita a Jacob al final de la frase. En español, "madre de Jacob" hace visible esa referencia y evita la ambigüedad de "su madre".'
theological_decisions:
- issue: Tratamiento del nombre divino y referencias teológicas
  english_pob_reading: No explicit divine-name rendering in this verse
  chosen_spanish_reading: Sin marca especial; no aparece una referencia directa al nombre divino
  alternative_spanish_readings:
  - N/A
  rationale: El versículo no contiene término divino ni carga doctrinal que requiera decisión teológica adicional.
  doctrine_reference: No aplica
- issue: 'Relación de parentesco final: ''his mother'' vs. ''Jacob''s mother'''
  english_pob_reading: Later English revision briefly had 'his mother'; final correction restored 'Jacob's mother'
  chosen_spanish_reading: madre de Jacob
  alternative_spanish_readings:
  - su madre
  rationale: La lectura final revisada del texto fuente y el control cruzado confirman que el final del versículo identifica explícitamente a la madre como perteneciente a Jacob. La traducción española debe conservar esa explicitud.
  doctrine_reference: Fidelidad textual y precisión referencial
- issue: Topónimo y etnónimo 'Syrian'
  english_pob_reading: the Syrian
  chosen_spanish_reading: el sirio
  alternative_spanish_readings:
  - el arameo
  rationale: Aunque "arameo" podría reflejar mejor algunos trasfondos históricos, el texto auditado y la tradición de traducción aquí favorecen "sirio". Se evita desplazar el sentido hacia una reconstrucción histórica no explicitada por esta línea.
  doctrine_reference: Precisión histórico-lexical
translation_notes:
  revision_awareness: Se siguió el texto fuente ge'ez y el control de revisiones del inglés. La revisión más reciente del inglés había suavizado erróneamente el final a 'his mother', pero el auditor posterior corrigió que el ge'ez dice explícitamente 'Jacob's mother'; por eso la versión española conserva la referencia a Jacob en la cláusula final. No se introdujeron notas textuales porque el resultado español puede expresar la lectura correcta directamente sin ambigüedad.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' en lugar de 'Jacobo' para consistencia con el paquete inglés/audit y con el nombre propio ya fijado en la serie.
  - Se usa 'Mesopotamia' como topónimo estable.
  - Se prefirió 'madre de Jacob' para evitar ambigüedad y reflejar la explicitud del fuente final.
