base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/027/008.yaml
  text: And Rebekah said to Jacob, “I will go in and speak, and he will send you.”
  footnotes:
  - marker: a
    text: Or 'he will send for you'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:01Z'
    unchanged: false
    changes_summary: Changed 'send you' to 'send for you' to more naturally and accurately convey the sense of summoning Jacob after Rebekah goes in and speaks.
translation:
  language: es
  text: 'Y Rebeca dijo a Jacob: «Yo entraré y hablaré, y él te enviará».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él te mandará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወትቤሎ፡ ርብቃ፡ ለያዕቆብ፡
  english_pob_choice: And Rebekah said to Jacob
  chosen_spanish: Y Rebeca dijo a Jacob
  alternatives_spanish:
  - Y Rebeca le dijo a Jacob
  - Entonces Rebeca dijo a Jacob
  lexicon: אָמַר / λέγω / decir
  rationale: Conserva una narración directa y natural en español. Se omite el pronombre dativo explícito porque el destinatario ya queda claro por el complemento "a Jacob"; se mantiene el nombre propio en forma usual "Rebeca".
- source_word: አነ፡ እበውእ፡
  english_pob_choice: I will go in
  chosen_spanish: Yo entraré
  alternatives_spanish:
  - Entraré
  - Yo iré adentro
  lexicon: בוא / εἰσέρχομαι / entrar
  rationale: El sentido literal es de movimiento hacia el interior; "entraré" es idiomático en español y mantiene la dirección interna sin añadir matices no presentes en el ge'ez.
- source_word: ወእነግር፡
  english_pob_choice: and speak
  chosen_spanish: y hablaré
  alternatives_spanish:
  - y diré
  - y le hablaré
  lexicon: אמר / λαλέω / hablar
  rationale: '"Hablaré" conserva la acción verbal general sin sobreespecificar el contenido. En español resulta más natural que repetir "diré" después de "entrar".'
- source_word: ወይፈንወከ።
  english_pob_choice: he will send you
  chosen_spanish: él te enviará
  alternatives_spanish:
  - él te mandará
  - él te hará partir
  lexicon: שלח / ἀποστέλλω / enviar
  rationale: La revisión inglesa reciente que proponía "send for you" fue rechazada por la auditoría textual; el ge'ez sostiene el valor de "enviar" dirigido a la persona, no "mandar llamar". En español "enviará" refleja ese envío/salida y evita introducir la idea de convocatoria.
theological_decisions:
- issue: 'Naturaleza de la acción final: envío vs. convocatoria'
  english_pob_reading: he will send you
  chosen_spanish_reading: él te enviará
  alternative_spanish_readings:
  - él te mandará
  - él te llamará
  rationale: La nota de revisión inglesa fue corregida por una evaluación posterior que señaló que el verbo ge'ez significa 'enviar a ti', no 'mandar a llamar'. Por fidelidad al texto fuente, el español conserva el sentido de envío y no el de convocatoria.
  doctrine_reference: No aplica; decisión de traducción narrativa, no doctrinal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'send you' por 'send for you', pero la auditoría posterior la consideró errónea y restableció el sentido de 'send you'. El español sigue esa decisión basada en el ge'ez.
  spanish_consistency_notes:
  - Se usa "Rebeca" y "Jacob" de forma uniforme y pública, sin abreviaturas.
  - '"Te enviará" conserva el objeto directo de segunda persona y evita introducir un agente implícito no atestiguado.'
  - La puntuación con comillas angulares es adecuada para publicación en español.
