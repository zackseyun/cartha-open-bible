  yaml_path: translation/extra_canonical/jubilees/027/025.yaml
  text: And he spoke with Jacob and said, “I am the Lord, the God of Abraham your father and the God of Isaac. The land on which you are lying asleep I will give to you and to your seed after you.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:04Z'
    unchanged: false
    changes_summary: Changed 'are sleeping' to 'are lying asleep' to more closely reflect the source verb while keeping natural formal English; added closing quotation punctuation.
translation:
  language: es
  text: 'Y habló con Jacob y dijo: «Yo soy Yahvé, el Dios de Abraham, tu padre, y el Dios de Isaac. La tierra donde estás acostado, dormido[a], te la daré a ti y a tu descendencia después de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «sobre la cual estás acostado». La expresión combina la postura física de Jacob con el contexto de que está dormido al recibir la promesa.
    reason: source_nuance
lexical_decisions:
- source_word: ወተናገረ፡ ምስለ፡ ያዕቆብ፡ ወይቤ፡
  english_pob_choice: And he spoke with Jacob and said
  chosen_spanish: Y habló con Jacob y dijo
  alternatives_spanish:
  - Y habló con Jacob y le dijo
  - Entonces habló con Jacob y dijo
  lexicon: hablar; decir
  rationale: El gueʽez expresa una secuencia narrativa simple de hablar y decir; en español, «y habló... y dijo» reproduce con naturalidad esa doblez verbal sin añadir énfasis inexistente.
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: YHWH / divine name
  rationale: El contexto de la fórmula patriarcal identifica el nombre divino del pacto; conforme a los criterios del proyecto, se usa «Yahvé» en lugar de ocultarlo tras «Señor».
- source_word: አምላከ፡ አብርሃም፡ አቡከ፡ ወአምላከ፡ ይስሐቅ፡
  english_pob_choice: the God of Abraham your father and the God of Isaac
  chosen_spanish: el Dios de Abraham, tu padre, y el Dios de Isaac
  alternatives_spanish:
  - el Dios de Abraham, tu padre, y Dios de Isaac
  - el Dios de Abraham tu padre y el Dios de Isaac
  lexicon: Dios
  rationale: Se conserva la repetición del título para Abraham e Isaac, porque el texto la presenta como fórmula de identificación y alianza, no como simple estilo redundante.
- source_word: ምድረ፡ እንተ፡ ዲቤሃ፡ አንተ፡ ትነውም፡
  english_pob_choice: The land on which you are lying asleep
  chosen_spanish: La tierra sobre la cual estás acostado
  alternatives_spanish:
  - La tierra sobre la que estás acostado
  - La tierra en la que estás acostado
  lexicon: acostarse / estar acostado
  rationale: La revisión inglesa corrigió el sentido a «lying asleep»; en español, «estás acostado» refleja mejor la postura física implicada sin introducir un verbo de sueño que el gueʽez no exige de manera directa en esta cláusula.
- source_word: እሁብ፡ ወለዘርእከ፡ እምድኅሬከ።
  english_pob_choice: I will give to you and to your seed after you
  chosen_spanish: te la daré a ti y a tu descendencia después de ti
  alternatives_spanish:
  - la daré a ti y a tu descendencia después de ti
  - te la daré a ti y a tu simiente después de ti
  lexicon: descendencia / seed
  rationale: «Descendencia» comunica con claridad moderna el valor de la promesa a la línea posterior; se evita «simiente» por sonar arcaico en español, aunque sigue siendo una alternativa posible de registro bíblico.
theological_decisions:
- issue: Identidad del hablante divino
  english_pob_reading: I am the Lord
  chosen_spanish_reading: Yo soy Yahvé
  alternative_spanish_readings:
  - Yo soy el Señor
  rationale: La teofanía patriarcal apunta al nombre del Dios del pacto, no solo a un título genérico; por eso se explicita Yahvé conforme a la política terminológica del proyecto.
  doctrine_reference: Éxodo 3:15; Génesis 28:13 (paralelo temático)
- issue: Promesa de tierra y descendencia
  english_pob_reading: The land ... I will give to you and to your seed after you
  chosen_spanish_reading: La tierra ... te la daré a ti y a tu descendencia después de ti
  alternative_spanish_readings:
  - La tierra ... la daré a ti y a tu descendencia después de ti
  - La tierra ... te la daré a ti y a tu simiente después de ti
  rationale: Se mantiene la promesa literal de posesión y herencia genealógica sin espiritualizarla ni generalizarla.
  doctrine_reference: Génesis 12:7; 28:13-14
translation_notes:
  revision_awareness: La redacción toma en cuenta la revisión más reciente del inglés POB, que corrigió «are sleeping» a «are lying asleep» para acercarse mejor al verbo de la fuente. En español se optó por «estás acostado», que conserva la imagen física sin añadir una noción de sueño que no está explícita en la cláusula final del gueʽez.
  spanish_consistency_notes:
  - Se conserva «Yahvé» según la convención del proyecto para יהוה, incluso donde el inglés POB dice «the Lord».
  - Se mantiene la repetición de «el Dios de Abraham... y el Dios de Isaac» para reflejar la fórmula patriarcal del original.
  - «Descendencia» se usa como equivalente natural de «seed»; no se opta por «simiente» por estilo español contemporáneo.
  - La nota al pie marca la posible alternativa de relación sintáctica en la frase sobre la postura de Jacob, pero no cambia el sentido principal.
