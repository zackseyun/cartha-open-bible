revisions:
- from: Y soñó aquella noche, y he aquí, una escalera estaba puesta sobre la tierra, y su extremo llegaba hasta el cielo. Y he aquí, los ángeles de Dios subían y bajaban por ella, y he aquí, Dios estaba[a] sobre ella.
  to: Y soñó aquella noche, y he aquí, una escalera estaba puesta en la tierra, y su extremo llegaba hasta el cielo. Y he aquí, los ángeles de Dios subían y bajaban por ella, y he aquí, Dios estaba[a] sobre ella.
  rationale: 'Se hace una reparación menor: «en la tierra» mejora la naturalidad y mantiene el sentido fuente; la nota al pie se corrige para reflejar con mayor exactitud la alternativa auditada «above it» sin alterar la lectura principal «sobre ella».'
  reviewer_model: gpt-5.4
