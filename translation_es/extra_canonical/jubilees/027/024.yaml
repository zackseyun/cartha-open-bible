base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/027/024.yaml
  text: And he dreamed that night, and behold, a ladder was set on the earth, and its top reached to heaven. And behold, the angels of God were going up and coming down on it, and behold, God stood upon it.
  footnotes:
  - marker: a
    text: Or 'above it'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:05Z'
    unchanged: false
    changes_summary: Replaced 'look' with the more formal 'behold'; changed 'the Lord' to 'God' to match እግዚአብሔር consistently in this verse; adjusted 'set up on the earth' to 'set on the earth' for closer wording; and revised 'stood upon it' to 'stood above it' to better reflect the final phrase.
translation:
  language: es
  text: Y soñó aquella noche, y he aquí, una escalera estaba puesta en la tierra, y su extremo llegaba hasta el cielo. Y he aquí, los ángeles de Dios subían y bajaban por ella, y he aquí, Dios estaba[a] sobre ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por encima de ella».
    reason: alternative_reading
lexical_decisions:
- source_word: ወሐለመ፡ / he dreamed
  english_pob_choice: And he dreamed that night
  chosen_spanish: Y soñó aquella noche
  alternatives_spanish:
  - Y soñó en aquella noche
  - Y tuvo un sueño esa noche
  lexicon: dream / soñar
  rationale: Conservo el simple evento onírico sin añadir matices no presentes; «aquella noche» mantiene el referente temporal inmediato del relato y evita una redundancia pesada.
- source_word: መዓርግ፡ / ladder
  english_pob_choice: a ladder
  chosen_spanish: una escalera
  alternatives_spanish:
  - una escalera de mano
  - una escala
  lexicon: ladder / escalera
  rationale: «Escalera» es el equivalente natural y suficientemente amplio en español; «escala» suena más literaria o ambigua, y «escalera de mano» introduce una especificación no dada.
- source_word: ትክልት፡ ውስተ፡ ምድር፡ / set on the earth
  english_pob_choice: was set on the earth
  chosen_spanish: estaba puesta sobre la tierra
  alternatives_spanish:
  - estaba colocada sobre la tierra
  - estaba asentada en la tierra
  lexicon: set / poner, colocar
  rationale: La pasiva resultativa del ge'ez se refleja bien con «estaba puesta»; «sobre la tierra» conserva la imagen física del apoyo sin convertirla en una interpretación más abstracta.
- source_word: ወርእሳ፡ ትበጽፍ፡ ውስተ፡ ሰማይ፡ / its top reached to heaven
  english_pob_choice: and its top reached to heaven
  chosen_spanish: y su extremo llegaba hasta el cielo
  alternatives_spanish:
  - y su cima llegaba al cielo
  - y su parte superior alcanzaba el cielo
  lexicon: top / extremo; heaven / cielo
  rationale: «Extremo» traduce con naturalidad el punto superior sin imponer una imagen demasiado técnica; «cielo» es el término español más directo para ሰማይ en este contexto cosmológico narrativo.
- source_word: መላእክተ፡ እግዚአብሔር፡ / angels of God
  english_pob_choice: the angels of God
  chosen_spanish: los ángeles de Dios
  alternatives_spanish:
  - los ángeles de Yahvé
  - los mensajeros de Dios
  lexicon: angel / ángel; God / Dios
  rationale: El texto ge'ez nombra explícitamente a Dios, y la POB inglesa también corrigió la antigua lectura con «God»; por eso conservo «Dios» y no introduzco «Yahvé» aquí.
- source_word: የዐርጉ፡ ወይወርዱ፡ / were going up and coming down
  english_pob_choice: were going up and coming down
  chosen_spanish: subían y bajaban
  alternatives_spanish:
  - iban subiendo y bajando
  - ascendían y descendían
  lexicon: go up / suben; come down / bajan
  rationale: El paralelismo simple del original se expresa de forma fluida con verbos comunes; «ascendían y descendían» sería correcto pero más elevado de lo necesario.
- source_word: ባቲ፡ / on it
  english_pob_choice: on it
  chosen_spanish: por ella
  alternatives_spanish:
  - sobre ella
  - en ella
  lexicon: on / sobre, por
  rationale: «Por ella» comunica el movimiento sobre la escalera sin sonar rígido en español; además evita que el segundo «sobre» del versículo resulte mecánicamente repetido. Como el ge'ez admite la oscilación «en/ sobre», esta opción mantiene la imagen sin cerrar innecesariamente la preposición.
- source_word: ይቀውም፡ ውስቴታ፡ / God stood upon it
  english_pob_choice: God stood upon it
  chosen_spanish: Dios estaba sobre ella
  alternatives_spanish:
  - Dios se hallaba sobre ella
  - Dios estaba en ella
  lexicon: stand / estar de pie; upon it / sobre ella
  rationale: 'La cláusula final presenta una dificultad textual/espacial: el ge''ez permite tanto «en ella» como «sobre ella», mientras que la revisión inglesa debatió «above it» y luego volvió a «upon it». En español, «estaba sobre ella» conserva la lectura más directa sin forzar una imagen de posición corporal que el contexto no precisa con nitidez.'
theological_decisions:
- issue: Nombre divino en la escena de la escalera
  english_pob_reading: God stood above it / upon it; the angels of God
  chosen_spanish_reading: Dios estaba sobre ella; los ángeles de Dios
  alternative_spanish_readings:
  - Yahvé estaba sobre ella; los ángeles de Yahvé
  - el Señor estaba sobre ella; los ángeles del Señor
  rationale: El ge'ez usa እግዚአብሔር y la auditoría inglesa consolidó «God» en esta revisión. No corresponde introducir el nombre Yahvé aquí, porque la fuente inmediata no exige esa equivalencia y la frase ya es consistente con «Dios» en ambos miembros.
  doctrine_reference: Divine name correspondence; lexical consistency in source-based translation
- issue: 'Relación espacial final: ''upon it'''
  english_pob_reading: stood upon it
  chosen_spanish_reading: estaba sobre ella
  alternative_spanish_readings:
  - estaba encima de ella
  - estaba en ella
  rationale: La fuente y la auditoría inglesa dejan una pequeña tensión espacial entre «upon», «above» y la posibilidad ge'ez de «in it». En español, «sobre ella» es la forma más neutral y auditable; evita fijar una interpretación más precisa de la que el texto garantiza.
  doctrine_reference: Textual and spatial ambiguity preservation
translation_notes:
  revision_awareness: La traducción inglesa fue revisada para preferir «behold», uniformar «God» en lugar de «the Lord», y oscilar entre «above it» y «upon it» para la frase final. La evidencia ge'ez apoya la imagen de la escalera sobre la tierra con ángeles que suben y bajan por ella, y deja cierta flexibilidad en la última preposición; por eso la versión española conserva la tensión con una formulación sobria y no la resuelve de modo excesivamente interpretativo.
  spanish_consistency_notes:
  - Se conserva «Dios» de manera uniforme, conforme al texto fuente y a la revisión inglesa.
  - «He aquí» reproduce el valor discursivo de ወናሁ sin modernizarlo a un mero «mira».
  - Se mantiene «tierra»/«cielo» como pares cosmológicos directos, sin alegorizar la escena.
  - La nota a pie de página marca la alternativa espacial legítima en español sin alterar el texto principal.
