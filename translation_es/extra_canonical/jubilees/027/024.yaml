review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del ge''ez y del POB inglés: sueño nocturno, escalera puesta en la tierra, extremo que llega al cielo, ángeles de Dios que suben y bajan sobre ella, y Dios sobre ella. Sin embargo, hay dos ajustes de fidelidad y estilo: «sobre la tierra» suena menos preciso que «en la tierra» para «set on the earth», y la nota «encima de ella» no preserva la alternativa documentada inglesa, que era «above it»; en español conviene reflejarla como «por encima de ella».'
  spanish_quality_summary: El español es claro y digno, pero «estaba[a] sobre la tierra»/«estaba sobre ella» repite «sobre» de forma algo pesada, y la nota actual no representa bien la alternativa textual. «Su extremo» es entendible, aunque «su parte superior» o «su cima» serían algo más naturales; no es un error. La cláusula final «Dios estaba sobre ella» es legible, pero «estaba de pie» sería demasiado interpretativo; mantener «estaba» es prudente.
  glossary_alignment: 'Se alinea con la terminología del proyecto en los puntos relevantes: እግዚአብሔር se traduce como «Dios», no «Señor» ni «Yahvé», conforme a la evidencia inmediata y la auditoría inglesa; «ángeles de Dios» también está bien. No hay conflicto con otros términos base del glosario.'
  issues:
  - severity: medium
    issue: La nota al pie no refleja la alternativa auditada en inglés.
    rationale: El POB inglés conserva «Or 'above it'». La nota española «O «encima de ella»» no es incorrecta como español corriente, pero para auditoría y precisión conviene «O «por encima de ella»», que corresponde mejor a «above it» y distingue esa alternativa de la lectura principal «sobre ella».
  - severity: low
    issue: «Puesta sobre la tierra» puede sonar menos natural y ligeramente menos ajustado que «puesta en la tierra».
    rationale: Para un objeto fijado o establecido respecto del suelo, «en la tierra» suena más idiomático en español bíblico moderno y preserva bien la imagen de estar colocada en/ sobre el suelo. No afecta gravemente el sentido, pero mejora la naturalidad sin paraprasear.
  revised_spanish_text: Y soñó aquella noche, y he aquí, una escalera estaba puesta en la tierra, y su extremo llegaba hasta el cielo. Y he aquí, los ángeles de Dios subían y bajaban por ella, y he aquí, Dios estaba[a] sobre ella.
  revised_footnotes:
  - marker: a
    text: O «por encima de ella».
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor: «en la tierra» mejora la naturalidad y mantiene el sentido fuente; la nota al pie se corrige para reflejar con mayor exactitud la alternativa auditada «above it» sin alterar la lectura principal «sobre ella».'
