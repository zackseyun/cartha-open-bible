  verdict: revise
  source_alignment_summary: El ge’ez y la traducción inglesa expresan un ruego en primera persona para no quedar privada de sus dos hijos en un mismo día. El borrador español conserva la idea general de pérdida de ambos hijos en un solo día, pero introduce una formulación causativa y perceptiva ('No me dejes ver la pérdida') que no refleja bien el valor de 'ser privada/quedar sin' presente en 'be bereaved'.
  spanish_quality_summary: 'La frase actual suena poco idiomática y algo forzada en español: ''la pérdida de ambos de mis hijos'' es torpe, y ''No me dejes ver'' desplaza el foco del duelo sufrido al acto de presenciarlo. Una redacción más natural y fiel es ''No permitas que pierda a mis dos hijos en un solo día''.'
  glossary_alignment: No hay términos de glosario mayor implicados. La principal cuestión léxica es representar con naturalidad y precisión el sentido de bereavement. 'Mis dos hijos' es más idiomático que 'ambos de mis hijos' en este contexto y preserva la fuerza dual del original.
  issues:
  - severity: high
    issue: La expresión 'No me dejes ver la pérdida' no corresponde bien al sentido de 'Let me not be bereaved'.
    rationale: El original expresa quedar privada de los hijos, no meramente ver o presenciar una pérdida.
  - severity: medium
    issue: La construcción 'ambos de mis hijos' es poco natural en español.
    rationale: En español fluido se espera 'mis dos hijos' o 'ambos hijos'; la forma actual suena calcada y torpe.
  revised_spanish_text: 'Y ella le dijo: «No permitas que pierda a mis dos hijos en un solo día».

