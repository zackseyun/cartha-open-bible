  text: 'Y ella le dijo: «No permitas que pierda a mis dos hijos en un solo día».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኢይሥአን
  english_pob_choice: Let me not be bereaved
  chosen_spanish: No me dejes ver la pérdida
  alternatives_spanish:
  - No me hagas quedar privada
  - No permitas que quede despojada
  lexicon: iverb of bereavement/loss
  rationale: El ge’ez expresa la idea de quedar sin hijos por muerte o pérdida; en español, «ver la pérdida» comunica bien el resultado doloroso sin forzar un tecnicismo. «Privada» o «despojada» son posibles, pero suenan más abstractas y menos naturales en este lamento.
- source_word: እምክልኤቱ
  english_pob_choice: of both
  chosen_spanish: de ambos
  alternatives_spanish:
  - de los dos
  - de los dos a la vez
  lexicon: dual quantity / two together
  rationale: La forma dual apunta claramente a los dos hijos. «De ambos» conserva la fuerza numérica y el tono directo del lamento.
- source_word: ውሉድየ
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos varones
  - mis hijos
  lexicon: children/sons
  rationale: El término puede referirse a hijos, con posible énfasis masculino en el contexto. En español, «mis hijos» es la forma más natural y fiel al sentido familiar del pasaje; «mis hijos varones» explicita más de lo que el texto exige.
- source_word: በአሐቲ፡ ዕለት
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en el mismo día
  lexicon: time expression
  rationale: «En un solo día» reproduce el sentido de simultaneidad y la carga emocional del original con buena fluidez en español.
theological_decisions:
- issue: Tensión entre literalidad y español idiomático en un lamento de duelo
  english_pob_reading: Let me not be bereaved of both my sons in one day.
  chosen_spanish_reading: No me dejes ver la pérdida de ambos de mis hijos en un solo día.
  alternative_spanish_readings:
  - No permitas que pierda a mis dos hijos en un solo día.
  - No me dejes quedar sin mis dos hijos en un solo día.
  rationale: 'No hay una decisión doctrinal controvertida aquí, pero sí una tensión estilística: el original no formula una simple emoción, sino la experiencia de quedar sin los dos hijos en un día. La redacción elegida mantiene el carácter de lamento y evita suavizar el impacto del enunciado.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo total y que no eran necesarios cambios; por ello, la propuesta sigue de cerca el sentido ya validado en inglés y el ge’ez base.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y sobrio.
  - Se evita «SEÑOR» porque no aparece el nombre divino en este versículo.
  - Se preserva la idea de pérdida/bereavement sin convertirla en simple tristeza emocional.
  - «Mis hijos» se usa como equivalente natural de ውሉድየ sin añadir información no explicitada.
