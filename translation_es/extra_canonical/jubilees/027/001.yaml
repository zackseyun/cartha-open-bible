review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del ge''ez: el asunto de Esaú fue comunicado a Rebeca en un sueño; luego ella envió a llamar a Jacob, su hijo menor, y le advirtió sobre la hostilidad homicida de su hermano. Sin embargo, la opción «está rabiando contra ti» no refleja con suficiente precisión la decisión auditada del POB inglés («is bearing a grudge against you») ni el valor de resentimiento/vindicta del verbo ge''ez ይትቄየመከ፡. También la nota actual presenta como alternativa la formulación más precisa, lo que indica que el texto principal debería ajustarse.'
  spanish_quality_summary: 'El español es fluido y legible. «Se le anunció ... el asunto» funciona, aunque es un poco rígido; aun así, es aceptable y fiel. El problema principal de calidad es léxico-estilístico: «rabiando» suena más coloquial e impulsivo, y desplaza el sentido desde rencor/vindicta hacia furia momentánea. «Te guarda rencor» o «te tiene rencor» sería más natural y exacto en español eclesial general.'
  glossary_alignment: 'No hay términos del glosario mayor comprometidos en este versículo. Los nombres propios «Rebeca», «Esaú» y «Jacob» están bien. La decisión clave es semántica, no terminológica: ተቄየመ debe reflejar resentimiento hostil, no mera rabia pasajera ni el hebraísmo «consolarse».'
  issues:
  - severity: medium
    issue: «está rabiando contra ti» no reproduce bien el matiz de ይትቄየመከ፡
    rationale: El audit trail inglés corrigió explícitamente hacia «is bearing a grudge against you». «Rabiar» enfatiza enojo intenso o explosivo, mientras que el ge'ez y la revisión inglesa apuntan más a rencor/resentimiento vindicativo.
  - severity: low
    issue: La nota al pie contiene una alternativa mejor que el texto principal
    rationale: Si la alternativa «te guarda rencor» es la más fiel al source y al POB inglés, debe ir en el texto principal y no quedar relegada a nota.
  revised_spanish_text: 'Y se le anunció a Rebeca en un sueño el asunto de Esaú, su hijo mayor. Y Rebeca envió y llamó a Jacob, su hijo menor, y le dijo: «Mira, Esaú, tu hermano, te guarda rencor, para matarte».'
  revised_footnotes: []
  revision_rationale: Se mantiene la primera cláusula porque es fiel y suficientemente natural. Se reemplaza «está rabiando contra ti[a]» por «te guarda rencor» para alinearse con el sentido ge'ez de resentimiento/vindicta y con la revisión auditada del POB inglés («is bearing a grudge against you»). La nota ya no es necesaria porque la mejor opción pasa al texto principal.
