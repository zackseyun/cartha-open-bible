base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/027/001.yaml
  text: And the matter of Esau her older son was told to Rebekah in a dream. And Rebekah sent and called Jacob her younger son and said to him, “Look, Esau your brother is bearing a grudge against you, to kill you.”
  footnotes:
  - marker: a
    text: Or 'is consoling himself concerning you'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:59Z'
    unchanged: false
    changes_summary: Reordered the first clause for more natural English and rendered ነገሩ as 'the matter' rather than 'the words.' Revised 'is threatening you so as to kill you' to the more literal 'is consoling himself concerning you, to kill you,' which better reflects the source verb while preserving formal register.
translation:
  language: es
  text: 'Y se le anunció a Rebeca en un sueño el asunto de Esaú, su hijo mayor. Y Rebeca envió y llamó a Jacob, su hijo menor, y le dijo: «Mira, Esaú, tu hermano, te guarda rencor, para matarte».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ተነግረ፡... ነገሩ
  english_pob_choice: the matter ... was told
  chosen_spanish: se le anunció ... el asunto
  alternatives_spanish:
  - se le dijo ... la cuestión
  - se le informó ... el asunto
  lexicon: Ge'ez ነገር / ነገሩ
  rationale: El ge'ez expresa aquí «el asunto / la cuestión» y no meramente «las palabras». «Se le anunció» comunica bien la pasiva impersonal en español sin forzar un sujeto explícito.
- source_word: በሕልም፡
  english_pob_choice: in a dream
  chosen_spanish: en un sueño
  alternatives_spanish:
  - por medio de un sueño
  - durante un sueño
  lexicon: Ge'ez ሕልም
  rationale: «En un sueño» es la forma más directa y natural en español para conservar el valor visionario del medio de revelación.
- source_word: ዔሳው፡ ... ዘይሌህቅ፡
  english_pob_choice: Esau her older son
  chosen_spanish: Esaú, su hijo mayor
  alternatives_spanish:
  - Esaú, su hijo mayor en edad
  - Esaú, su primogénito
  lexicon: Ge'ez ዘይሌህቅ
  rationale: «Mayor» refleja la relación de edad/comparación indicada por el texto; «primogénito» sería más interpretativo y no necesario aquí.
- source_word: ያዕቆብሃ፡ ... ዘይንእስ፡
  english_pob_choice: Jacob her younger son
  chosen_spanish: Jacob, su hijo menor
  alternatives_spanish:
  - Jacob, su hijo más joven
  - Jacob, su hijo menor en edad
  lexicon: Ge'ez ዘይንእስ
  rationale: «Menor» conserva la comparación de edad y suena natural en español bíblico contemporáneo.
- source_word: ይትቄየመከ፡
  english_pob_choice: is bearing a grudge against you
  chosen_spanish: está rabiando contra ti
  alternatives_spanish:
  - te guarda rencor
  - está airado contra ti
  - está enfurecido contigo
  lexicon: Ge'ez ተቄየመ
  rationale: La revisión del inglés identifica correctamente un verbo ge'ez de resentimiento/vindicta, no el hebraísmo de «consolarse». En español, «está rabiando contra ti» intenta captar la fuerza de hostilidad activa y creciente sin introducir «rencor» como estado demasiado estable o atenuado.
theological_decisions:
- issue: Cómo reflejar la revelación onírica sin suavizar su carácter de aviso divino
  english_pob_reading: the matter ... was told to Rebekah in a dream
  chosen_spanish_reading: se le anunció ... en un sueño
  alternative_spanish_readings:
  - se le dijo ... en un sueño
  - se le informó ... en un sueño
  rationale: El pasivo impersonal evita añadir un agente no expresado y mantiene la transmisión revelatoria como en el original. «Anunció» deja claro el tono de revelación/advertencia sin convertirlo en simple comunicación neutra.
  doctrine_reference: Revelación divina en sueños; cf. tradiciones bíblicas de sueños revelatorios (Gn 20:3; 28:12).
- issue: Valor semántico del verbo ge'ez para la actitud de Esaú
  english_pob_reading: is bearing a grudge against you
  chosen_spanish_reading: está rabiando contra ti
  alternative_spanish_readings:
  - te guarda rencor
  - está resentido contigo
  - está airado contra ti
  rationale: La nota revisada del audit trail descarta retrovertir al hebreo «consolarse» y exige un sentido de hostilidad real. «Rabiando» comunica una furia venenosa o activa cercana al campo de resentimiento/venganza, sin fijar un matiz psicológico que el ge'ez no exige de forma explícita.
  doctrine_reference: Ética de la ira y la violencia fratricida; cf. Gn 27:41-42 como paralelo narrativo.
translation_notes:
  revision_awareness: 'El texto fuente ge''ez, junto con la revisión más reciente del inglés POB, corrige la lectura anterior basada en el hebreo paralelo: ተቄየመ no debe retrovertirse como «se consuela», sino entenderse en el campo de «guardar rencor / estar resentido / arremeter contra». También se ha respetado que ነገሩ significa «el asunto» o «la cosa», no «las palabras».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general POB cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «hijo mayor / hijo menor» para reflejar la relación de edad, evitando «primogénito» por falta de necesidad textual.
  - Se conserva la puntuación directa de discurso para lectura pública clara y digna.
