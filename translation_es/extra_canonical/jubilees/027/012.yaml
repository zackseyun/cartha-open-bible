translation_notes:
  revision_awareness: El contexto bilingüe muestra alta concordancia y ninguna revisión aplicada; por tanto, no se introducen cambios respecto a la lectura base inglesa más allá de la normalización natural del español.
  spanish_consistency_notes:
  - Se mantiene el tono imperativo directo del original.
  - Se conserva la estructura relacional familiar sin sustituirla por equivalentes socioculturales más libres.
  - El orden 'de entre las hijas de Labán' refleja la selección implícita del texto fuente y su paralelismo con la versión inglesa auditada.
