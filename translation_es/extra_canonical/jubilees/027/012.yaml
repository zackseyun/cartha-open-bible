translation:
  language: es
  text: Levántate y ve a Mesopotamia, a la casa de Betuel, el padre de tu madre, y toma para ti de allí una esposa, de entre las hijas de Labán, hermano de tu madre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፄስጶጦሚያ (Mesopotamia)
  english_pob_choice: Mesopotamia
  chosen_spanish: Mesopotamia
  alternatives_spanish:
  - Mesopotamia (Mesopotamia)
  - la Mesopotamia
  lexicon: Mesopotamia
  rationale: Se conserva el topónimo tradicional y transparente; no requiere adaptación semántica ni transliteración adicional.
- source_word: ቤተ፡ ባቱኤል (house of Bethuel)
  english_pob_choice: the house of Bethuel
  chosen_spanish: la casa de Betuel
  alternatives_spanish:
  - la casa de Betuel
  - el hogar de Betuel
  lexicon: casa
  rationale: El ge'ez expresa un destino familiar/doméstico, no solo un edificio. 'Casa de Betuel' reproduce la forma bíblica natural en español y mantiene la relación de pertenencia.
- source_word: አቡሃ ለእምከ (your mother's father)
  english_pob_choice: your mother’s father
  chosen_spanish: el padre de tu madre
  alternatives_spanish:
  - el padre de tu madre
  - tu abuelo materno
  lexicon: padre
  rationale: Se prefiere la relación explícita del original. 'Abuelo materno' sería más idiomático, pero introduce una equivalencia interpretativa que el texto fuente no formula directamente.
- source_word: ወንሣእ ለከ ብእሲተ (take for yourself a wife)
  english_pob_choice: take for yourself a wife
  chosen_spanish: toma para ti una esposa
  alternatives_spanish:
  - toma para ti una esposa
  - cásate
  lexicon: tomar/esposa
  rationale: Se conserva el verbo de mandato con el complemento de finalidad, reflejando la forma semítica del original sin volverlo más libre de lo que permite el texto.
- source_word: እምአዋልደ ላባ እኁሃ ለእምከ (from the daughters of Laban, your mother’s brother)
  english_pob_choice: from the daughters of Laban, your mother’s brother
  chosen_spanish: de entre las hijas de Labán, hermano de tu madre
  alternatives_spanish:
  - de entre las hijas de Labán, hermano de tu madre
  - de las hijas de Labán, tu tío materno
  lexicon: de entre / hijas
  rationale: '''De entre'' comunica selección dentro de un grupo, acorde con ''from there, from the daughters of...'' y evita aplanar la estructura relacional. ''Hermano de tu madre'' mantiene la relación del original; ''tío materno'' es posible, pero menos literal.'
