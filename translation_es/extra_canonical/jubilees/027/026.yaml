base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/027/026.yaml
  text: And your seed will be like the dust of the earth, and you will spread out to the sea and to the east and to the north and to the south. And in you and in your seed all the lands of the nations will be blessed.
  footnotes:
  - marker: a
    text: Or 'families of the nations'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:06Z'
    unchanged: false
    changes_summary: Changed 'west' to 'the sea' to reflect the source term more literally and preserve the traditional directional idiom without over-paraphrasing. No other changes needed.
translation:
  language: es
  text: Y tu descendencia será como el polvo de la tierra, y te extenderás hacia el mar, hacia el oriente, hacia el norte y hacia el sur. Y en ti y en tu descendencia serán bendecidas todas las tierras de las naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘርእከ
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu semilla
  - tu simiente
  lexicon: Ge'ez/semitic seed-descendant term; Spanish natural covenantal offspring language
  rationale: En este contexto de promesa patriarcal, 'descendencia' comunica bien el sentido de linaje/promesa sin sonar técnico o ambiguo como 'semilla'.
- source_word: ከመ፡ ኖላ፡ ምድር፡
  english_pob_choice: like the dust of the earth
  chosen_spanish: como el polvo de la tierra
  alternatives_spanish:
  - como el polvo de la tierra
  lexicon: earth dust comparison
  rationale: Mantiene la comparación directa y la imagen de abundancia numerosa del texto fuente.
- source_word: ወትበዝኅ
  english_pob_choice: will spread out
  chosen_spanish: te extenderás
  alternatives_spanish:
  - te dispersarás
  - te expandirás
  lexicon: spread abroad / extend
  rationale: '''Te extenderás'' reproduce la idea de expansión territorial o direccional sin introducir matiz de dispersión no requerido por el contexto.'
- source_word: ውስተ፡ ባሕር
  english_pob_choice: to the sea
  chosen_spanish: hacia el mar
  alternatives_spanish:
  - al mar
  lexicon: sea as directional boundary
  rationale: Conserva el giro direccional del texto y evita sustituirlo por 'occidente/oeste', ya corregido en el audit trail inglés.
- source_word: በሐውርተ፡ አሕዛብ
  english_pob_choice: the lands of the nations
  chosen_spanish: las tierras de las naciones
  alternatives_spanish:
  - los países de las naciones
  - las tierras entre las naciones
  lexicon: lands/countries of the nations
  rationale: Sigue la revisión auditada que rechaza 'familias' y refleja mejor el plural ge'ez de territorios/países; 'tierras' es natural en español bíblico y mantiene la fuerza geográfica.
- source_word: ይትባረኩ
  english_pob_choice: will be blessed
  chosen_spanish: serán bendecidas
  alternatives_spanish:
  - serán benditos
  lexicon: passive blessing
  rationale: La pasiva concuerda con el sujeto plural 'tierras' y preserva el sentido receptivo de la bendición.
theological_decisions:
- issue: Universal scope of blessing through Abraham and his seed
  english_pob_reading: In you and in your seed all the lands of the nations will be blessed.
  chosen_spanish_reading: En ti y en tu descendencia serán bendecidas todas las tierras de las naciones.
  alternative_spanish_readings:
  - En ti y en tu descendencia serán bendecidas todas las familias de las naciones.
  - En ti y en tu descendencia serán bendecidos todos los pueblos de las naciones.
  rationale: Se mantiene el alcance universal, pero se traduce el referente ge'ez 'lands/countries' según la revisión textual auditada; no se reintroduce 'familias' porque el texto fuente no lo exige.
  doctrine_reference: Génesis 28:14; Jubileos 27:26
translation_notes:
  revision_awareness: The English audit trail revised 'west' to 'the sea' and then revised 'families of the nations' to 'lands of the nations' based on Ge'ez evidence; the Spanish draft follows those audited revisions rather than the older English wording.
  spanish_consistency_notes:
  - He usado 'descendencia' para un término de promesa genealógica coherente en todo el versículo.
  - He mantenido 'las tierras de las naciones' para reflejar la revisión textual del ge'ez y evitar la lectura no sustentada 'familias'.
  - La dirección 'hacia el mar' preserva el idiomático bíblico sin occidentalizar el texto.
