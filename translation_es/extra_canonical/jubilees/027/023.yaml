translation:
  language: es
  text: Y tomó una de las piedras de aquel lugar y la puso debajo de aquel árbol, e iba solo[a], y durmió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘andando solo’.
    reason: alternative_reading
lexical_decisions:
- source_word: ወነሥአ፡ እምእብነ፡ ውእቱ፡ መካን፡
  english_pob_choice: And he took one of the stones of that place
  chosen_spanish: Y tomó una de las piedras de aquel lugar
  alternatives_spanish:
  - Y tomó una piedra de aquel lugar
  - Y tomó una de las piedras de ese lugar
  lexicon: እብነ = piedra; ውእቱ = aquel/ese; መካን = lugar
  rationale: El ge'ez expresa literalmente ‘una de las piedras de aquel lugar’; el español conserva la partícula partitiva con ‘una de las piedras’ y el demostrativo cercano al valor de ውእቱ como ‘aquel’ para respetar la referencia espacial ya mencionada.
- source_word: ወአንበረ፡ ታሕተ፡ ውእቱ፡ ዕፅ፡
  english_pob_choice: and put it under that tree
  chosen_spanish: y la puso debajo de aquel árbol
  alternatives_spanish:
  - y la puso debajo de ese árbol
  - y la puso bajo aquel árbol
  lexicon: አንበረ = poner; ታሕተ = debajo de; ዕፅ = árbol
  rationale: ‘Debajo de’ reproduce la relación espacial de forma natural en español. Se mantiene ‘aquel árbol’ para reflejar el demostrativo del original, siguiendo el ajuste del inglés auditado a ‘that tree’.
- source_word: ወውእቱ፡ ባሕቲቱ፡ የሐውር፡
  english_pob_choice: and he was traveling alone
  chosen_spanish: y viajaba solo
  alternatives_spanish:
  - y andaba solo
  - y caminaba solo
  - y estaba viajando solo
  lexicon: ባሕቲቱ = solo/solamente; የሐውር = ir, caminar, viajar
  rationale: El verbo ge'ez admite el matiz de ir/caminar/viajar; por el contexto narrativo de un trayecto, ‘viajaba’ es más natural y mantiene el carácter de movimiento. ‘Solo’ traduce con precisión ባሕቲቱ.
- source_word: ወኖመ።
  english_pob_choice: and he slept
  chosen_spanish: y durmió
  alternatives_spanish:
  - y se durmió
  - y reposó
  lexicon: ኖመ = dormir
  rationale: La forma verbal simple en español comunica directamente el hecho de dormir sin añadir matices no presentes en el texto.
theological_decisions:
- issue: Demostrativo espacial en ‘that tree / aquel árbol’
  english_pob_reading: that tree
  chosen_spanish_reading: aquel árbol
  alternative_spanish_readings:
  - ese árbol
  - el árbol
  rationale: No hay contenido doctrinal; la decisión protege la deixis del original y evita neutralizar una referencia concreta del relato.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que cambió ‘walking’ a ‘traveling’ por mayor adecuación contextual del verbo ge'ez. Por ello, el español usa ‘viajaba’ en lugar de una opción más literal como ‘andaba’ o ‘caminaba’, sin perder el matiz de movimiento continuo. También se respetó la revisión que afinó el demostrativo a ‘that tree’, reflejado como ‘aquel árbol’.
  spanish_consistency_notes:
  - Se mantiene ‘aquel’ para reproducir el demostrativo deíctico del original y del audit trail inglés revisado.
  - Se usa pasado narrativo simple para toda la secuencia, con ‘viajaba’ como imperfecto de continuidad, coherente con la acción en desarrollo.
  - La nota al pie ofrece una alternativa viable (‘andando’) para conservar la amplitud semántica del verbo ge'ez.
