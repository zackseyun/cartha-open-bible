translation:
  language: es
  text: 'Y llamó Isaac a Jacob, lo bendijo, le dio la carga y le dijo: “No tomes para ti mujer[a] de entre las hijas de Canaán.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mujer» traduce aquí el término para esposa en sentido matrimonial. «Esposa» también sería posible, pero el texto fuente usa una formulación más breve y directa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወጸውዐ / called
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: llamar
  rationale: El Geez expresa una llamada directa de Isaac a Jacob; en español, «llamó» reproduce con naturalidad ese acto de convocarlo sin añadir matices ceremoniales no presentes en el texto.
- source_word: ወባረኮ / blessed him
  english_pob_choice: blessed him
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - lo bendijo con una bendición
  - lo bendijo
  lexicon: bendecir
  rationale: «Lo bendijo» conserva la acción verbal simple del original y del audit trail inglés sin sobreexplicarla.
- source_word: ወ'ነሠጾ / charged him
  english_pob_choice: charged him
  chosen_spanish: le dio la carga
  alternatives_spanish:
  - le encargó
  - le dio una orden
  lexicon: cargar / encargar
  rationale: La redacción inglesa retiene la fuerza de una carga o mandato. «Le dio la carga» conserva esa tensión lexical con un español comprensible, evitando suavizarlo indebidamente a una simple recomendación.
- source_word: ብእሲተ / wife
  english_pob_choice: a wife
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - mujer
  lexicon: mujer
  rationale: Aquí el término designa esposa en el sentido matrimonial. «Mujer» sigue de cerca el alcance semántico disponible en el hebreo/etíope y preserva la sobriedad del texto; «esposa» sería posible, pero más interpretativo.
- source_word: እም*ኵሉ ... አዋልደ ከናአን / from any of the daughters of Canaan
  english_pob_choice: from any of the daughters of Canaan
  chosen_spanish: de entre las hijas de Canaán
  alternatives_spanish:
  - de ninguna de las hijas de Canaán
  - de entre las hijas de Canaán
  lexicon: hijas / daughters
  rationale: «De entre» refleja el origen grupal y la exclusión dentro del conjunto, y «hijas de Canaán» mantiene el patrón bíblico habitual sin ocultar la referencia étnico-familiar del original.
theological_decisions:
- issue: Preserving the imperatival prohibition
  english_pob_reading: Do not take a wife for yourself from any of the daughters of Canaan.
  chosen_spanish_reading: No tomes para ti mujer de entre las hijas de Canaán.
  alternative_spanish_readings:
  - No tomes para ti esposa de entre las hijas de Canaán.
  - No te cases con ninguna de las hijas de Canaán.
  rationale: La prohibición se formula como mandato directo. «No tomes para ti mujer» conserva la sintaxis y la fuerza normativa del original sin convertirla en una paráfrasis moderna sobre casarse, que sería correcta pero menos cercana al texto.
  doctrine_reference: Narrativa patriarcal / mandato familiar en el relato de los patriarcas
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran plena concordancia en sentido y contenido; la revisión más reciente indica que no se necesitaron cambios. La draft española sigue esa lectura estable sin introducir ampliaciones ni variantes textuales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino ausente en este versículo, por lo que no se introduce ninguna convención para YHWH.
  - Se conserva el tono narrativo sobrio del relato y la prohibición directa en segunda persona singular.
  - «Le dio la carga» mantiene la fuerza semántica del inglés POB «charged him» sin diluirla en una simple exhortación.
