  text: And Jacob awoke from his sleep and said, “Surely this place is the house of the Lord, and I did not know it.” And he was afraid and said, “How awesome this place is! This is none other than the house of the Lord, and this is the gate of heaven.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:05Z'
    unchanged: false
    changes_summary: Reordered the first clause to match the source more closely ('this place is the house of the Lord'), changed 'Truly' to 'Surely' for a more natural rendering of affirmation, and replaced 'nothing other than' with the more idiomatic formal expression 'none other than.'
translation:
  language: es
  text: 'Y Jacob se despertó de su sueño y dijo: «Ciertamente este lugar es la casa de Yahvé, y yo no lo sabía». Y tuvo temor, y dijo: «¡Cuán asombroso es este lugar! No es otra cosa que la casa de Yahvé, y esta es la puerta del cielo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἥ/αὕτη τοῦ θεοῦ οἶκος / house of the Lord
  english_pob_choice: the house of the Lord
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa del Señor
  - la casa de Dios
  lexicon: casa; Yahvé
  rationale: El texto geeze dice literalmente ‘casa de Dios’ y la tradición del POB en español debe mantener el nombre divino sin sustituirlo por un ocultamiento litúrgico. ‘Yahvé’ conserva la referencia directa al nombre divino, mientras ‘casa del Señor’ sería menos transparente para esta obra.
- source_word: וְיָרֵא / was afraid
  english_pob_choice: he was afraid
  chosen_spanish: tuvo temor
  alternatives_spanish:
  - se llenó de temor
  - tuvo miedo
  lexicon: temor
  rationale: ‘Tuvo temor’ mantiene el sentido reverente y narrativo del original sin intensificarlo innecesariamente con ‘miedo’, que en español puede sonar más emocional que reverencial.
- source_word: גְּרוּם / awesome
  english_pob_choice: How awesome
  chosen_spanish: ¡Cuán asombroso
  alternatives_spanish:
  - ¡Qué impresionante
  - ¡Qué terrible
  lexicon: asombroso
  rationale: El adjetivo expresa sobrecogimiento reverente. ‘Asombroso’ comunica bien la mezcla de admiración y temor; ‘terrible’ podría sonar excesivamente negativo en español moderno.
- source_word: אֵין זֶה כִּי אִם / none other than
  english_pob_choice: none other than
  chosen_spanish: No es otra cosa sino
  alternatives_spanish:
  - No es nada más que
  - No es sino
  lexicon: no es otra cosa sino
  rationale: La expresión española reproduce la exclusividad enfática del giro semítico sin volverla coloquial ni debilitarla.
- source_word: פֶּתַח הַשָּׁמַיִם / gate of heaven
  english_pob_choice: the gate of heaven
  chosen_spanish: la puerta del cielo
  alternatives_spanish:
  - la entrada del cielo
  - la puerta de los cielos
  lexicon: puerta
  rationale: ‘Puerta’ es el equivalente natural y fiel de la imagen de acceso/umbral. ‘Del cielo’ mantiene la referencia espacial concreta del texto.
- source_word: יָעֵן / awoke from sleep
  english_pob_choice: awoke from his sleep
  chosen_spanish: se despertó de su sueño
  alternatives_spanish:
  - despertó de su sueño
  - despertó
  lexicon: despertarse
  rationale: La forma pronominal fluye bien en español y conserva la idea de transición desde el sueño; ‘de su sueño’ evita ambigüedad y sigue de cerca el original.
theological_decisions:
- issue: Nombre divino en ‘house of the Lord’
  english_pob_reading: ‘Lord’ is rendered transparently in keeping with the POB policy, not as a masking convention.
  chosen_spanish_reading: ‘Yahvé’ en la casa de Yahvé
  alternative_spanish_readings:
  - casa del Señor
  - casa de Dios
  rationale: El pasaje alude a la presencia divina reconocida por Jacob. Para el POB en español, el nombre divino debe permanecer visible donde el contexto lo sustenta, evitando el encubrimiento con mayúsculas reverenciales.
  doctrine_reference: Éxodo 3:15; principio editorial POB sobre el Tetragrámaton
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que reordenó la primera cláusula para acercarla más al original (‘this place is the house of the Lord’) y prefirió ‘Surely’ y ‘none other than’ por razones de naturalidad y fidelidad. En español se reflejó ese orden más directo con ‘Ciertamente este lugar es la casa de Yahvé’.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme al estándar español del proyecto para el nombre divino.
  - Se conservó un registro solemne y narrativo, adecuado para literatura bíblica antigua.
  - No se añadió información interpretativa fuera del texto base.
  - Se respetó la repetición enfática de ‘este lugar’ y ‘la casa de Yahvé’ sin fusionar cláusulas.
