base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/029/005.yaml
  text: the land of Gilead. And Jacob concealed his heart from Laban and did not tell him. And in the seventh year of the fourth week[5], Jacob set out for Gilead in the first month, on the twenty-first; and Laban pursued after him, and he overtook Jacob on the mountain of Gilead in the third month, on the thirteenth.
  footnotes:
  - marker: '5'
    text: The chronology in this verse is difficult because the pursuit and overtaking are linked across months. The translation preserves the stated dates rather than harmonizing them.
    reason: segmentation_note
  - marker: a
    text: Or 'and Laban heard and pursued after him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:23Z'
    unchanged: false
    changes_summary: Changed 'concealed his intention' to 'concealed his heart' for closer lexical fidelity to the source, and 'turned toward Gilead' to 'set out for Gilead' for more natural English while preserving the sense of departure/journey.
translation:
  language: es
  text: la tierra de Galaad. Y Jacob le ocultó su corazón[a] a Labán y no se lo dijo. Y en el séptimo año de la cuarta semana[b], Jacob salió hacia Galaad en el primer mes, el día veintiuno; y Labán lo persiguió, y alcanzó a Jacob en el monte de Galaad en el tercer mes, el día trece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ocultó su intención». El texto fuente dice literalmente «ocultó su corazón», y se conserva esa imagen en el cuerpo principal.'
    reason: lexical_alternative
  - marker: b
    text: La cronología en este versículo es difícil, porque la persecución y el alcance se enlazan a través de meses distintos. La traducción conserva las fechas indicadas en lugar de armonizarlas.
    reason: segmentation_note
lexical_decisions:
- source_word: לִבּוֹ / heart
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - intención
  - ánimo
  - pensamiento
  lexicon: לב / καρδία
  rationale: El POB inglés conserva la metáfora concreta “his heart” en vez de suavizarla como intención. En español, “corazón” mantiene mejor esa imagen antropológica y evita perder la tensión lexical; “intención” sería una explicación interpretativa no exigida por el texto.
- source_word: וַיַּגֵּד לוֹ / did not tell him
  english_pob_choice: did not tell him
  chosen_spanish: no se lo dijo
  alternatives_spanish:
  - no le contó
  - no se lo comunicó
  lexicon: אמר / λέγω
  rationale: La forma breve española reproduce el acto de no informar sin añadir matices ajenos. “No se lo dijo” es natural y fiel al registro narrativo.
- source_word: גלעד / Gilead
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: גלעד
  rationale: Se usa la forma castellana consolidada “Galaad” para el topónimo, manteniendo legibilidad bíblica en español y sin alterar la referencia geográfica.
- source_word: וַיֵּלֶךְ / set out for
  english_pob_choice: set out for Gilead
  chosen_spanish: salió hacia Galaad
  alternatives_spanish:
  - partió hacia Galaad
  - se encaminó a Galaad
  lexicon: הלך
  rationale: “Salió hacia” preserva el sentido de partida/jornada sin cargarlo con una paráfrasis interpretativa. Es idiomático en español y corresponde al valor de movimiento del verbo.
- source_word: וַיִּרְדֹּף / pursued after him
  english_pob_choice: pursued after him
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - fue tras él
  - lo siguió en persecución
  lexicon: רדף
  rationale: “Lo persiguió” expresa con claridad la acción de persecución y conserva la fuerza narrativa del verbo sin agregar el elemento de “oír” que fue descartado en la revisión del texto fuente.
- source_word: וַיַּשֵּׂג / overtook
  english_pob_choice: overtook
  chosen_spanish: alcanzó a Jacob
  alternatives_spanish:
  - lo alcanzó
  - dio alcance a Jacob
  lexicon: נשא / השיג
  rationale: “Alcanzó a Jacob” comunica el encuentro por alcance de manera natural en español y mantiene la direccionalidad del evento.
- source_word: mountain of Gilead
  english_pob_choice: mountain of Gilead
  chosen_spanish: el monte de Galaad
  alternatives_spanish:
  - la montaña de Galaad
  - el monte de Gilead
  lexicon: הר / جبل
  rationale: “Monte” es la opción bíblica más natural en español para el singular geográfico del original. “Galaad” mantiene la coherencia con el topónimo ya elegido.
theological_decisions:
- issue: Preservación de la cronología difícil sin armonización
  english_pob_reading: The translation preserves the stated dates rather than harmonizing them.
  chosen_spanish_reading: La traducción conserva las fechas dadas sin armonizarlas.
  alternative_spanish_readings:
  - ajustar las fechas para hacerlas coincidir
  - suavizar la secuencia temporal
  rationale: El contexto auditado indica que la cronología es difícil porque la persecución y el alcance se enlazan entre meses. En español se conservan exactamente los hitos temporales para no resolver artificialmente la tensión del texto.
  doctrine_reference: Principio de fidelidad textual y no armonización intratextual
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que restituyó la lectura simple de “pursued after him” sin “heard and”, y la corrección anterior de “his heart” frente a “his intention”. La versión española refleja esa decisión y conserva la secuencia temporal difícil sin armonización.
  spanish_consistency_notes:
  - Se mantiene Galaad de manera uniforme para el topónimo en todo el versículo.
  - 'Se conservan los hitos cronológicos tal como aparecen en la fuente: séptimo año de la cuarta semana, primer mes día veintiuno, tercer mes día trece.'
  - El registro narrativo es sobrio y bíblico, sin añadir explicaciones no presentes en la fuente.
