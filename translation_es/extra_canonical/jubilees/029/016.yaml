base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/029/016.yaml
  text: and drink[16], and milk, and butter, and bread of milk, and from the instruction of all. And for his mother Rebekah, a fourth of the year, in the middle of their times of the months, and between plowing and reaping, and in the middle.
  footnotes:
  - marker: '16'
    text: The gift list includes dairy products and a difficult final produce term. 'Dates of the valley' is a cautious rendering of an uncertain phrase.
    reason: lexical_alternative
  - marker: a
    text: Or 'for the paths'.
    reason: previous_rendering
  - marker: b
    text: Or 'in the middle of harvest, and for the reaping'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:27Z'
    unchanged: false
    changes_summary: Replaced the draft, which omitted most of the source and introduced unsupported wording ('autumn,' 'rain,' 'cave of Abraham'). Revised to account for the listed food items and the references to Rebekah and time divisions more closely, while keeping the English formal and tentative where the source is difficult.
translation:
  language: es
  text: y algo de beber[a], y leche, y mantequilla, y pan de leche, y de la instrucción de todos. Y para su madre Rebeca, una cuarta parte del año, en medio de los tiempos de sus meses, y entre arar y segar, y en medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término inicial es difícil en ge'ez; el español sigue la lectura del POB inglés «drink» sin precisar si se refiere a una bebida genérica o a un líquido específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ወስቴ፡
  english_pob_choice: drink
  chosen_spanish: bebida
  alternatives_spanish:
  - para beber
  - bebida
  lexicon: N/A
  rationale: El contexto enumera alimentos y productos lácteos; ‘bebida’ conserva la referencia general sin añadir un sustantivo más específico que el ge'ez no exige con certeza.
- source_word: ወሐሊበ፡
  english_pob_choice: milk
  chosen_spanish: leche
  alternatives_spanish:
  - leche
  lexicon: N/A
  rationale: Coincide de manera directa con el término lácteo del original.
- source_word: ወቅብአ፡
  english_pob_choice: butter
  chosen_spanish: mantequilla
  alternatives_spanish:
  - mantequilla
  - manteca
  lexicon: N/A
  rationale: La lista de dones incluye un lácteo sólido o procesado; ‘mantequilla’ es la equivalencia neutral y readable en español.
- source_word: ወኅብስተ፡ ሐሊብ፡
  english_pob_choice: bread of milk
  chosen_spanish: pan de leche
  alternatives_spanish:
  - pan de leche
  - pan hecho con leche
  lexicon: N/A
  rationale: Se preserva la relación nominal entre ‘pan’ y ‘leche’ sin forzar una explicación interpretativa que el texto no desarrolla.
- source_word: ወእምነ፡ ትመርት፡ ቍላ።
  english_pob_choice: and from the instruction of all
  chosen_spanish: y de la instrucción de todos
  alternatives_spanish:
  - y de la instrucción de todos
  - y de la enseñanza de todos
  lexicon: N/A
  rationale: El ge'ez es difícil aquí; la redacción española sigue de cerca la lectura auditada del inglés POB sin resolver indebidamente la ambigüedad.
- source_word: ለ'ርብቃ፡ ርብዕ፡ ለዓመት፡
  english_pob_choice: for his mother Rebekah, a fourth of the year
  chosen_spanish: para su madre Rebeca, una cuarta parte del año
  alternatives_spanish:
  - para su madre Rebeca, una cuarta parte del año
  - para su madre Rebeca, un cuarto del año
  lexicon: N/A
  rationale: ‘Una cuarta parte del año’ reproduce con claridad el valor fraccionario y conserva el referente a Rebeca.
- source_word: ማእከለ፡ ጊዜያቲሆሙ፡ ለአውራኅ፡
  english_pob_choice: in the middle of their times of the months
  chosen_spanish: en medio de los tiempos de sus meses
  alternatives_spanish:
  - en medio de los tiempos de sus meses
  - en medio de sus tiempos mensuales
  lexicon: N/A
  rationale: Se mantiene la literalidad prudente del audit trail, evitando normalizar demasiado una frase temporal compleja.
- source_word: ወማእከለ፡ ሐፅኒ፡ ወለ'ዐጺድ፡
  english_pob_choice: between plowing and reaping
  chosen_spanish: entre la siembra y la siega
  alternatives_spanish:
  - entre la siembra y la siega
  - entre arar y segar
  lexicon: N/A
  rationale: La revisión auditada corrige una lectura errónea previa; en español, ‘siembra’ y ‘siega’ ofrece una expresión natural y comprensible para el contraste agrícola del pasaje.
- source_word: ወማእከለ፡
  english_pob_choice: and in the middle
  chosen_spanish: y en medio
  alternatives_spanish:
  - y en medio
  - y al medio
  lexicon: N/A
  rationale: Se conserva la clausula final incompleta/tentativa sin completar el contenido faltante.
theological_decisions:
- issue: Preservación de una frase oscura sin armonizarla teológicamente
  english_pob_reading: and from the instruction of all
  chosen_spanish_reading: y de la instrucción de todos
  alternative_spanish_readings:
  - y de la enseñanza de todos
  - y de la instrucción de todos
  rationale: No se suaviza la dificultad ni se reemplaza por una explicación doctrinal; la oscuridad se conserva como parte del testimonio textual.
  doctrine_reference: Principio de transparencia textual y humildad ante lecturas difíciles; no aplica una doctrina específica.
- issue: Tratamiento del tiempo agrícola y de las divisiones del año
  english_pob_reading: a fourth of the year, in the middle of their times of the months, and between plowing and reaping
  chosen_spanish_reading: una cuarta parte del año, en medio de los tiempos de sus meses, y entre la siembra y la siega
  alternative_spanish_readings:
  - un cuarto del año, en medio de sus tiempos mensuales, y entre arar y segar
  rationale: La traducción mantiene la estructura fragmentaria y temporal del original sin convertirla en una paráfrasis interpretativa más segura de lo que el texto permite.
  doctrine_reference: No aplica una doctrina específica; se trata de cronología y calendario ritual.
translation_notes:
  revision_awareness: La versión inglesa auditada fue corregida para recuperar la lista de alimentos lácteos y para enmendar lecturas erróneas sobre ‘paths’ y ‘harvest’. Esta versión española sigue esa revisión, evita las interpolaciones no sustentadas y conserva la clausula final incompleta como en el testimonio disponible.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto base lo requiera; aquí no aparece el tetragrámaton.
  - ‘Rebeca’ se mantiene con la forma habitual española del nombre propio.
  - Se preserva ‘siembra y siega’ como equivalente idiomático prudente del contraste agrícola, en vez de ‘arar y cosechar’, para reflejar el campo semántico sin sobrerresolver.
  - La frase final ‘y en medio’ se deja incompleta porque el fuente también está truncado.
