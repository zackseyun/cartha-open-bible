    model: gpt-5.4
    timestamp: '2026-04-23T14:51:24Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: '«El Montón de Testimonio»[a], según este montón. Pero antes solían llamar a la tierra de Galaad[b] la tierra de los refaítas, porque era la tierra de los refaítas, y allí nacieron los refaítas: gigantes cuya estatura era de diez codos, y de nueve codos, y de ocho codos, y hasta siete codos era su estatura.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Otra posibilidad de traducción del primer miembro es «El Banquete de Testimonio», pero la revisión crítica del ge'ez favorece «heap / montón», que preserva la etimología de Galaad.
    reason: textual_variant
  - marker: b
    text: 'También puede entenderse como una designación antigua ligada a los refaítas; el texto conserva ambas capas: el nombre geográfico y la explicación de su población primitiva.'
    reason: cross_reference
lexical_decisions:
- source_word: ፍሥሐተ / heap
  english_pob_choice: Heap
  chosen_spanish: Montón
  alternatives_spanish:
  - Amontonamiento
  - Masa
  - Colina
  lexicon: heap
  rationale: El contexto y la revisión crítica indican que el término debe leerse como «heap» y no como «feast». «Montón» conserva la imagen física del testimonio memorial y mantiene la relación con la etimología explicada de Galaad como «Heap of Witness».
- source_word: ስምዐ / witness
  english_pob_choice: Witness
  chosen_spanish: Testimonio
  alternatives_spanish:
  - Testigo
  - Testificación
  - Prueba
  lexicon: witness
  rationale: En español, para un nombre memorial y etimológico, «testimonio» suena natural y preserva la idea de acto o señal que da fe. «Testigo» sería más personal y menos idiomático en un topónimo.
- source_word: ገለአድ / Gilead
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: proper-name
  rationale: Se sigue la forma bíblica castellana bien asentada «Galaad», manteniendo la identificación del lugar sin añadir explicación innecesaria al cuerpo del texto.
- source_word: ምድረ፡ ራፋኤል / land of the Rephaim
  english_pob_choice: land of the Rephaim
  chosen_spanish: la tierra de los refaítas
  alternatives_spanish:
  - la tierra de los refaim
  - la tierra de los gigantes
  lexicon: rephaim
  rationale: Se conserva el etnónimo/seres «refaítas» para no borrar la tensión tradicional entre un grupo antiguo y la asociación con gigantes. «Gigantes» aparece después como glosa descriptiva, siguiendo el sentido del texto.
- source_word: ፲ሥር ... ወትስዕ ... ወስምን ... ወእስከ ስብዕ
  english_pob_choice: ten cubits, and nine cubits, and eight cubits, and down to seven cubits
  chosen_spanish: diez codos, y de nueve codos, y de ocho codos, y hasta de siete codos
  alternatives_spanish:
  - diez codos, nueve codos, ocho codos, y hasta siete codos
  - diez codos, nueve codos, ocho codos y hasta siete codos
  lexicon: measurements
  rationale: «Codos» reproduce el término bíblico de medida de forma directa y readable. La repetición de la conjunción mantiene el ritmo enumerativo del original y del audit trail inglés.
theological_decisions:
- issue: How to render the memorial name explanation for Gilead
  english_pob_reading: “The Heap of Witness,” according to this heap.
  chosen_spanish_reading: «El Montón de Testimonio», conforme a este montón.
  alternative_spanish_readings:
  - «El Montón de Testimonio», según este montón.
  - «El Montón de Testimonio», de acuerdo con este montón.
  rationale: La frase conserva la explicación etimológica y memorial del topónimo sin reemplazarla por una formulación eclesiástica. La preposición «conforme a» sigue de cerca el valor explicativo del texto y evita sonar interpretativa de más.
  doctrine_reference: Genesis 31:47; Jubilees 29:9
translation_notes:
  revision_awareness: La revisión crítica reciente corrigió una lectura errónea de «feast» a favor de «heap»; la redacción española sigue esa adjudicación y evita reinstalar la variante descartada. Además, se mantuvo la capa explicativa histórica sobre Galaad y los refaítas, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Montón» en el título explicativo y «montón» en la referencia interna para mantener cohesión léxica.
  - Se emplea «refaítas» de forma consistente para el etnónimo, con «gigantes» solo como descripción dentro del propio versículo.
  - La puntuación y el orden de las medidas siguen la cadencia del original sin introducir fórmulas interpretativas adicionales.
