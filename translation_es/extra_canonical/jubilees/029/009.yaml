  text: “The Heap of Witness,” according to this heap. But formerly they used to call the land of Gilead the land of the Rephaim[9], for it is the land of the Rephaim, and the Rephaim were born there—giants whose height was ten cubits, and nine cubits, and eight cubits, and down to seven cubits was their stature.
  footnotes:
  - marker: '9'
    text: The place-name explanation combines 'Gilead' with a memorial feast/witness etymology and then adds an older designation connected with the Rephaim. The chapter intentionally layers these traditions.
    reason: cross_reference
  - marker: a
    text: Or '“The Feast of Witness,” according to this feast.'.
    reason: previous_rendering
