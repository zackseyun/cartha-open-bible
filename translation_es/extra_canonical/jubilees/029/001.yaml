revisions:
- from: Y aconteció que, después de que Raquel había dado a luz a José, Labán fue a esquilar sus ovejas, porque estaba a tres días de camino de él.
  to: Y aconteció que, después que Raquel dio a luz a José, Labán fue a esquilar sus ovejas, porque estaba a tres días de camino de Jacob.
  rationale: 'Se hicieron dos reparaciones menores: (1) se suavizó la cláusula temporal para un español narrativo más natural y digno, sin perder la anterioridad del nacimiento respecto del viaje de Labán; (2) se sustituyó el pronombre final por «Jacob» para evitar aspereza y ambigüedad en español. No se requieren notas.'
