translation:
  language: es
  text: Y aconteció que, después que Raquel dio a luz a José, Labán fue a esquilar sus ovejas, porque estaba a tres días de camino de Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወኮነ፡ እምዘ፡
  english_pob_choice: And it came to pass, after
  chosen_spanish: Y aconteció que, después de que
  alternatives_spanish:
  - Y sucedió que, después de que
  - Y ocurrió que, después de que
  lexicon: No aplica
  rationale: La fórmula narrativa de apertura se vierte con un giro natural en español que conserva el carácter consecutivo y temporal del griego/semítico subyacente sin exagerar arcaísmo.
- source_word: ወለደት፡
  english_pob_choice: had borne
  chosen_spanish: había dado a luz
  alternatives_spanish:
  - había parido
  - había alumbrado
  lexicon: No aplica
  rationale: «Dar a luz» expresa con claridad el acto de parto en español digno y actual; mantiene el valor perfectivo anterior al viaje de Labán.
- source_word: ራሔል፡ ዮሴፍሃ፡
  english_pob_choice: Rachel ... Joseph
  chosen_spanish: Raquel ... José
  alternatives_spanish:
  - Rajel ... José
  lexicon: No aplica
  rationale: Se usan las formas bíblicas más reconocibles en español para los nombres propios, sin cambiar el referente.
- source_word: ወሖረ፡
  english_pob_choice: Laban went
  chosen_spanish: Labán fue
  alternatives_spanish:
  - Labán salió
  - Labán se fue
  lexicon: No aplica
  rationale: «Fue» reproduce el movimiento narrativo de manera sobria; evita añadir matices no presentes en el texto.
- source_word: ይቅርጽ፡ አባግዒሁ፡
  english_pob_choice: to shear his sheep
  chosen_spanish: a esquilar sus ovejas
  alternatives_spanish:
  - a trasquilar sus ovejas
  - a cortar la lana de sus ovejas
  lexicon: No aplica
  rationale: «Esquilar» conserva el sentido ganadero preciso de la acción; «ovejas» corresponde bien al rebaño implicado en el contexto.
- source_word: ርሑቅ፡ ሀሎ፡ እምኔሁ፡
  english_pob_choice: he was ... away from him
  chosen_spanish: estaba ... de él
  alternatives_spanish:
  - estaba lejos de él
  - estaba distante de él
  lexicon: No aplica
  rationale: Se mantiene la relación espacial simple y directa del original, con «de él» para expresar el punto de referencia.
- source_word: ምሕዋረ፡ ሠሉስ፡ ዕለት።
  english_pob_choice: a three days' journey
  chosen_spanish: a tres días de camino
  alternatives_spanish:
  - a tres jornadas de camino
  - a tres días de viaje
  lexicon: No aplica
  rationale: La expresión idiomática se adapta a un español natural y exacto; «a tres días de camino» comunica la duración/distancia implícita del original sin forzar un calco.
theological_decisions:
- issue: Temporal framing formula in narrative Hebrew/Ge'ez style
  english_pob_reading: And it came to pass, after ...
  chosen_spanish_reading: Y aconteció que, después de que ...
  alternative_spanish_readings:
  - Y sucedió que, después de que ...
  - Y pasó que, después de que ...
  rationale: Se conserva la solemnidad narrativa sin imponer una formulación eclesiástica fija; el sentido es puramente histórico y no doctrinal.
  doctrine_reference: Narrative style only; no doctrinal issue.
- issue: Distance expression and possible ambiguity of measure
  english_pob_reading: a three days' journey
  chosen_spanish_reading: a tres días de camino
  alternative_spanish_readings:
  - a tres jornadas de camino
  - a tres días de viaje
  rationale: La frase mantiene la ambigüedad útil del original entre distancia y tiempo de recorrido, sin convertirla en una medida técnica no atestiguada.
  doctrine_reference: No doctrinal issue; lexical/idiomatic rendering.
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó la presencia del artículo en «a three days' journey» para mayor naturalidad formal. La versión española conserva ese valor idiomático con una construcción igualmente natural y precisa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no ocurre.
  - No se introdujo «Mesías» ni terminología cristológica, porque el versículo no la contiene.
  - Se evitó el arcaísmo excesivo para que el registro sea publicable y legible en español moderno.
  - La frase de distancia se resolvió como modismo español equivalente, sin perder la relación semítica entre camino y duración.
