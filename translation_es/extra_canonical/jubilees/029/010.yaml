lexical_decisions:
- source_word: ኑኖሙ። ወመኃድሪሆሙ
  english_pob_choice: And their dwelling
  chosen_spanish: Y su morada
  alternatives_spanish:
  - Y su habitación
  - Y su residencia
  lexicon: ኑኖሙ / መኃድሪሆሙ
  rationale: El poseedor plural se vierte naturalmente con 'su' en español; 'morada' conserva un registro bíblico digno y corresponde bien a un asentamiento/residencia colectiva sin endurecer el sentido.
- source_word: እምነ፡ ምድረ፡²⁷ ውሉደ፡ አሞን፡
  english_pob_choice: from the land of the sons of Ammon
  chosen_spanish: desde la tierra de los hijos de Amón
  alternatives_spanish:
  - desde la tierra de los hijos de Amón
  - desde la tierra de los ammonitas
  lexicon: እምነ + ምድረ + ውሉደ + አሞን
  rationale: Se mantiene la referencia étnica literal 'hijos de Amón', que sigue de cerca el ge'ez y preserva la forma relacional del original; 'Amón' es la forma española usual del nombre propio.
- source_word: እስከ፡²⁸ ደብረ፡ ሔርሞን፡
  english_pob_choice: as far as Mount Hermon
  chosen_spanish: hasta el monte Hermón
  alternatives_spanish:
  - hasta el monte Hermón
  - hasta el monte de Hermón
  lexicon: እስከ + ደብረ + ሔርሞን
  rationale: '''Hasta'' reproduce el alcance espacial de እስከ; ''monte Hermón'' es natural en español bíblico y fiel al topónimo.'
- source_word: ወቤተ፡
  english_pob_choice: and the house of
  chosen_spanish: y la casa de
  alternatives_spanish:
  - y la casa de
  - y el lugar de
  - y el territorio de
  lexicon: ወ + ቤተ (estado constructo)
  rationale: El ge'ez está en estado constructo y queda truncado en la segmentación del verso; por eso se conserva literalmente 'la casa de' sin completar artificialmente el sintagma. Esto respeta la tensión textual documentada por la revisión posterior que rechazó 'Bethel'.
theological_decisions:
- issue: Segmento final truncado / lectura incompleta de 'y la casa de'
  english_pob_reading: and the house of
  chosen_spanish_reading: y la casa de
  alternative_spanish_readings:
  - y Betel
  - y la región de
  rationale: La evidencia revisada indica que ወቤተ es un constructo ('of the house of'/'the house/region of') y que no debe leerse como 'Betel'. En español, dejar 'y la casa de' comunica honestamente la incompletitud del texto recibido sin inventar el complemento perdido.
  doctrine_reference: Crítica textual / segmentación del manuscrito; fidelidad al testimonio disponible
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una corrección importante: una revisión anterior intentó completar ወቤተ como «Bethel», pero la revisión más reciente lo rechazó por ser una lectura errónea del estado constructo. La traducción española adopta la lectura revisada y deja el sintagma final abierto, en consonancia con el dato fuente.'
  spanish_consistency_notes:
  - Se usa 'Amón' para el nombre propio y 'monte Hermón' para el topónimo, siguiendo el uso bíblico español corriente.
  - Se conserva 'casa de' como calco controlado porque el original está incompleto; no se sustituye por una forma más interpretativa.
  - El registro es bíblico-formal, pero sin arcaísmos innecesarios.
