translation:
  language: es
  text: Y su morada estaba desde la tierra de los hijos de Amón hasta el monte Hermón, y la casa de[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto ge'ez queda truncado aquí; la frase continúa con un complemento perdido o separado en la segmentación de la fuente. No se debe completar con «Betel».
