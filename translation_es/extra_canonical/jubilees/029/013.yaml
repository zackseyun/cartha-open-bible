translation:
  language: es
  text: Y al día siguiente partió hacia la tierra de Galaad. Y Jacob cruzó el Jaboc en el noveno mes, el día once de ese mes, y en este día Esaú, su hermano, vino a él, y se reconciliaron.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ጦሚያ፡ ምድረ፡ ጽባሕ፡
  english_pob_choice: he journeyed on the next morning to the land of Gilead
  chosen_spanish: partió hacia la tierra de Galaad
  alternatives_spanish:
  - se puso en camino al día siguiente hacia la tierra de Galaad
  - viajó la mañana siguiente a la tierra de Galaad
  lexicon: partir; tierra de Galaad
  rationale: El ge'ez expresa el movimiento de viaje del día siguiente; «partió» conserva el valor narrativo de desplazamiento sin cargar el texto. «Galaad» mantiene la forma bíblica estándar en español para el topónimo.
- source_word: ወትዐደወ፡ ኢያቦክ
  english_pob_choice: Jacob crossed the Jabbok
  chosen_spanish: Jacob cruzó el Jaboc
  alternatives_spanish:
  - Jacob atravesó el Jaboc
  - Jacob pasó el Jaboc
  lexicon: cruzó; Jaboc
  rationale: El verbo indica cruce de un paso/curso de agua. «Jaboc» es la forma castellanizada común del nombre propio, y «cruzó» conserva la imagen física del tránsito.
- source_word: በታስዕ፡ ወርኅ፡
  english_pob_choice: in the ninth month
  chosen_spanish: en el noveno mes
  alternatives_spanish:
  - durante el mes noveno
  - en el mes noveno
  lexicon: noveno mes
  rationale: La referencia es al mes del calendario; la forma natural en español es «en el noveno mes».
- source_word: አመ፡ ፲ሡሩ፡ ወአሚሩ፡
  english_pob_choice: on the eleventh of it
  chosen_spanish: el undécimo de él[a]
  alternatives_spanish:
  - el día once de ese mes
  - el once de él
  lexicon: undécimo; él
  rationale: Se sigue la corrección revisada del ge'ez, que entiende una fecha mensual, no una fórmula de año/semanas. «De él» conserva el referente implícito al mes; suena un poco duro en español, por lo que se marca con nota alternativa.
- source_word: ዔሳው፡ እኁሁ፡ ወተኂነኖ
  english_pob_choice: Esau his brother came to him, and they were reconciled
  chosen_spanish: Esaú, su hermano, vino a él, y fueron reconciliados
  alternatives_spanish:
  - Esaú, su hermano, se acercó a él, y se reconciliaron
  - vino a él Esaú, su hermano, y hubo reconciliación entre ellos
  lexicon: vin[o] a él; reconciliados
  rationale: «Fueron reconciliados» reproduce bien el resultado relacional del verbo ge'ez, sin ampliar innecesariamente a una explicación. Se mantiene el orden informativo del original.
theological_decisions:
- issue: Cronología corregida frente a una lectura previa errónea
  english_pob_reading: in the ninth month, on the eleventh of it
  chosen_spanish_reading: en el noveno mes, el undécimo de él
  alternative_spanish_readings:
  - en el noveno mes, el día once de ese mes
  - en el noveno mes, el once de él
  rationale: La revisión textual rechaza la fórmula anterior de «primer año de la décima semana» y confirma una fecha de mes y día. La traducción española sigue la lectura revisada y evita importar la cronología equivocada.
  doctrine_reference: Principio de fidelidad textual y prioridad de la lectura revisada del testimonio ge'ez
translation_notes:
  revision_awareness: 'El texto inglés de auditoría había pasado por una corrección mayor: se descartó una reconstrucción no pertinente («primer año de la décima semana») y se adoptó la lectura revisada del ge''ez: viaje a Galaad, cruce del Jaboc, noveno mes, undécimo día y reconciliación entre Jacob y Esaú. La versión española sigue esa lectura revisada y evita la fórmula cronológica rechazada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto cuando aparezca el nombre divino; en este pasaje no aparece.
  - Se mantiene «Jacob» y «Esaú» como formas usuales y reconocibles en español bíblico.
  - «Jaboc» se prefiere a transliteraciones más técnicas para legibilidad eclesial amplia.
  - No se introduce terminología doctrinal ajena al pasaje; la nota temporal es puramente textual.
