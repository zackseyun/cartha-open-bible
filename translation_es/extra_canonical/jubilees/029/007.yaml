translation:
  language: es
  text: De noche le contó a Labán acerca de Jacob. Y en el día quince de aquellos días, Jacob hizo un banquete para Labán y para todos los que habían venido con él; y Jacob juró a Labán aquel día, y Labán también juró a Jacob, que ninguno de los dos cruzaría hacia el otro con mala intención, en el monte.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Monte" traduce el lugar general del original; el texto no nombra un monte específico.'
    reason: source_note
lexical_decisions:
- source_word: ወነገሮ፡ ... ላባ፡ ... ያዕቆብ።
  english_pob_choice: by night and told Laban concerning Jacob
  chosen_spanish: De noche le habló a Labán acerca de Jacob
  alternatives_spanish:
  - Por la noche le contó a Labán acerca de Jacob
  - De noche le informó a Labán sobre Jacob
  lexicon: noche / hablar / contar / informar
  rationale: El ge'ez expresa una acción nocturna de comunicación respecto de Jacob. "Le habló" conserva la narración directa sin forzar un término más específico que el original no exige; "acerca de Jacob" mantiene el objeto de la comunicación sin añadir contenido.
- source_word: ወአመ፡ *፲ሡሩ፡ ወኀሙሱ፡
  english_pob_choice: on the fifteenth of those days
  chosen_spanish: en el día quince de aquellos días
  alternatives_spanish:
  - el día quince de aquellos días
  - al quince de aquellos días
  lexicon: día quince
  rationale: Se conserva el conteo ordinal indicado por el texto. "En el día quince" suena natural en español bíblico moderno y refleja el valor temporal del original.
- source_word: ገብረ፡ ... ግዝአ፡ ለላባ፡ ወለኵሎሙ፡ እለ፡ መጽኡ፡ ምስሌሁ፡
  english_pob_choice: Jacob made a feast for Laban and for all who had come with him
  chosen_spanish: Jacob hizo un banquete para Labán y para todos los que habían venido con él
  alternatives_spanish:
  - Jacob preparó un banquete para Labán y para todos los que habían venido con él
  - Jacob celebró un banquete para Labán y para todos los que habían venido con él
  lexicon: hacer un banquete / banquete
  rationale: '"Hizo un banquete" sigue de cerca el verbo de acción del original y preserva el carácter narrativo. "Para todos los que habían venido con él" reproduce el grupo acompañado sin ampliar la referencia.'
- source_word: ወመሐለ፡ ... በዛቲ፡ ዕለት፡
  english_pob_choice: and Jacob swore to Laban on that day
  chosen_spanish: y Jacob juró a Labán aquel día
  alternatives_spanish:
  - y Jacob le juró a Labán aquel día
  - y Jacob hizo un juramento a Labán aquel día
  lexicon: jurar
  rationale: '"Juró a Labán" conserva la fórmula breve del original. Se evita añadir un objeto indirecto innecesario, aunque es posible en español; el sentido de compromiso solemne queda claro.'
- source_word: ወላባሂ፡ ለያዕቆብ፡
  english_pob_choice: and Laban also to Jacob
  chosen_spanish: y Labán también a Jacob
  alternatives_spanish:
  - y Labán también juró a Jacob
  - y Labán asimismo a Jacob
  lexicon: también / jurar
  rationale: 'Se mantiene la misma elipsis del original y de la versión inglesa: el contexto ya implica el juramento recíproco. Añadir "juró" sería interpretativo pero aceptable; la redacción elegida deja visible la concisión del texto.'
- source_word: ከመ፡ ኢይትዐደዉ፡ አሐዱ፡ ኀበ፡ ካልኡ፡
  english_pob_choice: that neither would cross over to the other with evil intent
  chosen_spanish: que ninguno de los dos pasaría al otro con mala intención
  alternatives_spanish:
  - que ninguno de los dos cruzaría al otro con mala intención
  - que ninguno se volvería contra el otro con mala intención
  lexicon: pasar al otro / mala intención
  rationale: El verbo ge'ez de cruzar/pasar se conserva con "pasaría al otro", una expresión comprensible en español que mantiene la idea de ir de un lado al otro. "Con mala intención" refleja el matiz adversativo del original y de la POB inglesa.
- source_word: በእኩይ፡ *በደብረ፡
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - en la montaña
  - sobre el monte
  lexicon: monte
  rationale: La POB inglesa completa la frase con solo "on the mountain"; el ge'ez conserva únicamente el lugar. "Monte" mantiene un registro bíblico natural en español y evita añadir un topónimo inexistente.
theological_decisions:
- issue: Juramento recíproco entre Jacob y Labán
  english_pob_reading: Jacob swore to Laban ... and Laban also to Jacob
  chosen_spanish_reading: Jacob juró a Labán ... y Labán también a Jacob
  alternative_spanish_readings:
  - Jacob juró a Labán ... y Labán también juró a Jacob
  - Jacob hizo un juramento a Labán ... y Labán también a Jacob
  rationale: El texto describe una reciprocidad solemne. La formulación española conserva la asimetría breve del original sin eliminar el carácter mutuo del pacto verbal. No se introduce lenguaje sacramental o eclesiástico ajeno al contexto narrativo.
  doctrine_reference: Narrativa patriarcal; lenguaje de juramento y pacto en Génesis/Jubileos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente, que confirmó la frase final como simplemente "on the mountain"; por eso no se añadió ningún topónimo ni expansión interpretativa en la clausura del versículo.
  spanish_consistency_notes:
  - Se usó "Yahvé" solo donde aparezca explícitamente el nombre divino; en este versículo no aparece ningún término divino.
  - Se prefirió "monte" por ser natural en español bíblico y fiel al lugar genérico del original.
  - Se mantuvo "Labán" y "Jacob" como formas establecidas en español bíblico.
  - No se introdujo "Cristo", "SEÑOR" ni terminología litúrgica no sustentada por el texto.
