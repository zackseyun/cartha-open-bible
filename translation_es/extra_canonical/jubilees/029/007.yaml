revisions:
- from: De noche le habló a Labán acerca de Jacob. Y en el día quince de aquellos días, Jacob hizo un banquete para Labán y para todos los que habían venido con él; y Jacob juró a Labán aquel día, y Labán también a Jacob, que ninguno de los dos pasaría al otro con mala intención, en el monte.[a]
  to: De noche le contó a Labán acerca de Jacob. Y en el día quince de aquellos días, Jacob hizo un banquete para Labán y para todos los que habían venido con él; y Jacob juró a Labán aquel día, y Labán también juró a Jacob, que ninguno de los dos cruzaría hacia el otro con mala intención, en el monte.[a]
  rationale: Se ajusta 'le habló' a 'le contó' para reflejar mejor el acto de informar sobre Jacob, se explicita el verbo en la segunda mitad del juramento para mejorar la naturalidad del español, y se reemplaza 'pasaría al otro' por 'cruzaría hacia el otro' para expresar con claridad el sentido de no pasar contra la otra parte. Se conserva la nota sobre 'monte' porque el original no identifica un monte específico.
