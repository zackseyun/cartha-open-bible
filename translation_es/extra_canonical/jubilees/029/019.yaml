translation:
  language: es
  text: el Pozo del Juramento solo. E Isaac subió desde el Pozo del Juramento y habitó en la torre[a] de
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La forma ge''ez está en estado constructo: no es un nombre propio fijo, sino ''torre de'', y el complemento queda para la continuación.'
