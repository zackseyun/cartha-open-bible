lexical_decisions:
- source_word: ዐዘቅተ፡ መሐላ፡
  english_pob_choice: the Well of the Oath
  chosen_spanish: la Fuente del Juramento
  alternatives_spanish:
  - el Pozo del Juramento
  - el Manantial del Juramento
  lexicon: well/pozo; oath/juramento
  rationale: El ge'ez refleja un nombre locativo con sentido transparente. 'Fuente' comunica el lugar de agua con naturalidad en español y evita una repetición áspera de 'pozo' en una cadena toponímica, mientras conserva el valor léxico del 'juramento'.
- source_word: ወዐርገ፡
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - fue hacia arriba
  lexicon: subir/ascender
  rationale: El verbo indica movimiento ascendente desde el lugar anterior; 'subió' es la forma más natural y fiel en español.
- source_word: ወኀደረ፡
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - moró
  - vivió
  lexicon: habitar/morar
  rationale: '''Habitó'' mantiene el valor de residencia estable sin arcaísmo excesivo. Es un equivalente directo y digno para el contexto narrativo.'
- source_word: ማኅፈደ፡
  english_pob_choice: the tower of
  chosen_spanish: la torre de
  alternatives_spanish:
  - el torreón de
  - la fortaleza de
  lexicon: tower/torre
  rationale: La revisión textual indica que la forma ge'ez es un sustantivo común en estado constructo, no un nombre propio. Por eso se traduce como 'la torre de', preservando la apertura sintáctica hacia el complemento que continúa en la siguiente unidad.
theological_decisions:
- issue: Topónimo o sustantivo común en ማኅፈደ
  english_pob_reading: Mahfed (treated as a place name in a revision pass, but later reviewed as a common noun 'the tower of')
  chosen_spanish_reading: la torre de
  alternative_spanish_readings:
  - Mahfed
  - el torreón de
  rationale: El control crítico posterior corrige la lectura como nombre propio. En español conviene no fijar un topónimo inexistente en la evidencia, sino dejar el sintagma abierto y común, tal como pide la forma constructa.
  doctrine_reference: Principio de fidelidad textual y prudencia ante nombres propios inciertos.
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que primero trató ማኅፈደ como nombre propio ('Mahfed'), pero el control posterior lo corrigió como sustantivo común en estado constructo ('the tower of'). La versión española sigue la revisión más reciente y textual, no la lectura nominalizada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente a κύριος.
  - '''Fuente del Juramento'' preserva el carácter locativo del hebreo/ge''ez y su repetición en el verso.'
  - La frase final queda deliberadamente abierta con 'de' porque el contexto continúa en la siguiente unidad textual.
