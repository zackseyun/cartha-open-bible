  yaml_path: translation/extra_canonical/jubilees/029/020.yaml
  text: Abraham his father, on the mountain of Hebron. And there Jacob kept sending to his father and to his mother, from time to time, everything they needed; and they blessed Jacob with all their heart and with all their soul.
  footnotes:
  - marker: a
    text: Or 'And Jacob kept sending'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:27Z'
    unchanged: false
    changes_summary: Removed the awkward and redundant 'everything that he would send' and rendered the sense more naturally as 'kept sending ... everything they needed,' while preserving the repeated idea of ongoing provision from time to time.
translation:
  language: es
  text: Abraham, su padre, en el monte de Hebrón. Y allí Jacob les seguía enviando a su padre y a su madre, de tiempo en tiempo, todo lo que necesitaban; y bendecían a Jacob con todo su corazón y con toda su alma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Abraham his father
  english_pob_choice: Abraham his father
  chosen_spanish: Abraham su padre
  alternatives_spanish:
  - Abraham, su padre
  - Abraham, padre suyo
  lexicon: אַבְרָהָם / proper noun + possessive relation
  rationale: Conservo la relación posesiva simple del texto fuente sin añadir explicaciones; en español, 'Abraham su padre' reproduce la coordinación breve del hebreo/gee'z y mantiene la referencia al padre de Jacob sin sobrecarga sintáctica.
- source_word: on the mountain of Hebron
  english_pob_choice: on the mountain of Hebron
  chosen_spanish: en el monte de Hebrón
  alternatives_spanish:
  - sobre el monte de Hebrón
  - en la montaña de Hebrón
  lexicon: locative phrase / הר-חברון
  rationale: '''Monte'' es la forma bíblica natural en español para este topónimo elevado; ''en'' conserva el valor locativo y evita una paráfrasis innecesaria.'
- source_word: there
  english_pob_choice: And there Jacob kept sending
  chosen_spanish: Y allí Jacob seguía enviando
  alternatives_spanish:
  - Y allí Jacob continuaba enviando
  - Y allí Jacob mantenía el envío
  lexicon: ወ'ህየ / locative adverb
  rationale: La revisión crítica recupera el matiz locativo 'there/and there'; 'allí' lo expresa de forma directa y auditable, sin perder la conexión con el monte de Hebrón.
- source_word: kept sending
  english_pob_choice: kept sending
  chosen_spanish: seguía enviando
  alternatives_spanish:
  - continuaba enviando
  - iba enviando
  lexicon: imperfective iterative action
  rationale: El imperfecto perifrástico 'seguía enviando' comunica una acción repetida y continua, equivalente al valor iterativo del original y coherente con la lectura revisada de la POB.
- source_word: everything they needed
  english_pob_choice: everything they needed
  chosen_spanish: todo lo que necesitaban
  alternatives_spanish:
  - todo lo necesario para ellos
  - todas sus necesidades
  lexicon: relative provision phrase
  rationale: Sigo la lectura revisada de la POB que elimina la redundancia de la versión anterior y preserva el sentido de provisión completa sin añadir elementos no atestiguados.
- source_word: with all their heart and with all their soul
  english_pob_choice: with all their heart and with all their soul
  chosen_spanish: con todo su corazón y con toda su alma
  alternatives_spanish:
  - de todo su corazón y de toda su alma
  - con todo el corazón y toda el alma
  lexicon: idiomatic devotion formula
  rationale: Mantengo la fórmula bíblica estable en español, con paralelismo pleno y sin suavizar la totalidad afectiva y volitiva expresada por el original.
translation_notes:
  revision_awareness: La versión española incorpora la revisión más reciente de la POB que elimina la repetición torpe de 'everything that he would send' y conserva el matiz locativo restaurado por la revisión posterior ('there'). No se añadieron notas porque el texto español puede expresar ambos elementos sin ambigüedad adicional.
  spanish_consistency_notes:
  - Se usó 'monte' en lugar de 'montaña' para mantener un registro bíblico natural en español.
  - Se eligió 'seguía enviando' para reflejar continuidad iterativa sin introducir un tiempo futuro o una perífrasis demasiado explicativa.
  - No se empleó 'SEÑOR', 'Cristo' ni otros términos de convención eclesiástica porque este versículo no los contiene.
  - La traducción evita calcos innecesarios y conserva la estructura de provisión y bendición del texto fuente.
