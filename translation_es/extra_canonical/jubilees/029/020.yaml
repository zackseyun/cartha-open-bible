- from: Abraham su padre, en el monte de Hebrón. Y allí Jacob seguía enviando a su padre y a su madre, de tiempo en tiempo, todo lo que necesitaban; y bendecían a Jacob con todo su corazón y con toda su alma.
  to: Abraham, su padre, en el monte de Hebrón. Y allí Jacob les seguía enviando a su padre y a su madre, de tiempo en tiempo, todo lo que necesitaban; y bendecían a Jacob con todo su corazón y con toda su alma.
  rationale: Se corrige la ambigüedad sintáctica principal añadiendo 'les', para que quede claro que Jacob enviaba provisiones a sus padres y no que los enviaba a ellos. También se añaden comas en 'Abraham, su padre,' para una lectura más natural en español, manteniendo el contenido del original.
