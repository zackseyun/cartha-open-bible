base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/029/006.yaml
  text: And the Lord did not allow him to devise harm against Jacob, because he had appeared to him in a dream.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:23Z'
    unchanged: false
    changes_summary: Changed 'for he appeared' to 'because he had appeared' to better reflect the causal sense and prior action indicated by the source; added final punctuation.
translation:
  language: es
  text: Y Yahvé no le permitió tramar mal contra Jacob, porque se le había aparecido en un sueño.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: YHWH
  rationale: El texto geʽez usa el título divino estándar; conforme a la pauta del proyecto, se nombra como «Yahvé» en español en lugar de ocultarlo con «SEÑOR». Esto conserva la referencia al nombre divino que el inglés POB marca como «the Lord».
- source_word: ይሕስም
  english_pob_choice: devise harm
  chosen_spanish: tramar mal
  alternatives_spanish:
  - maquinar daño
  - planear mal
  lexicon: חָשַׁם / daño-mal (según el sentido contextual del verbo geʽez)
  rationale: La idea es de intención dañina y planificada, no solo de un sentimiento negativo. «Tramar mal» conserva la fuerza volitiva y el matiz de maquinación que refleja el inglés POB «devise harm».
- source_word: ላዕለ፡ ያዕቆብ
  english_pob_choice: against Jacob
  chosen_spanish: contra Jacob
  alternatives_spanish:
  - sobre Jacob
  - a Jacob
  lexicon: preposición de oposición contextual
  rationale: «Contra» reproduce de modo natural la oposición activa del intento dañino hacia Jacob, tal como en el inglés POB.
- source_word: አስተረአዮ፡ በሕልም፡
  english_pob_choice: he had appeared to him in a dream
  chosen_spanish: se le había aparecido en un sueño
  alternatives_spanish:
  - se le apareció en un sueño
  - se había manifestado a él en un sueño
  lexicon: revelación/aparición en sueño
  rationale: La forma perfecta pluscuamperfecta en español expresa que la aparición previa explica la prohibición posterior, siguiendo la revisión inglesa que aclaró la relación causal y temporal. «Se le había aparecido» es más natural que un calco literal y mantiene el valor de experiencia revelatoria en sueño.
theological_decisions:
- issue: Nombre divino en la traducción española
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: El texto fuente usa el nombre divino, y la política del proyecto pide reflejarlo explícitamente. «Yahvé» preserva la transparencia textual y evita una sustitución litúrgica que oscurecería la auditable referencia al nombre.
  doctrine_reference: Éxodo 3:15; convención editorial del People's Open Bible para יהוה/YHWH.
- issue: Relación causal entre la aparición en sueño y la prohibición divina
  english_pob_reading: because he had appeared to him in a dream
  chosen_spanish_reading: porque se le había aparecido en un sueño
  alternative_spanish_readings:
  - pues se le apareció en un sueño
  - ya que se le había aparecido en un sueño
  rationale: La revisión inglesa corrige el sentido a una causalidad pasada, no simplemente una coincidencia. El pluscuamperfecto español mantiene esa anterioridad y hace explícito que la aparición explica por qué no se le permitió obrar contra Jacob.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que cambió «for he appeared» por «because he had appeared» para expresar mejor la causalidad y la anterioridad del hecho. La versión española refleja esa misma relación temporal con pluscuamperfecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma editorial consistente para el nombre divino.
  - Se evita «Cristo/Mesías» porque no aparece en este versículo.
  - «Tramar mal» conserva un matiz de intención dañina sin exceder el alcance del verbo fuente.
  - La sintaxis española prioriza claridad natural sin perder la secuencia causal del original.
