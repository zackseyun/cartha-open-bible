  yaml_path: translation/extra_canonical/jubilees/029/002.yaml
  text: And Jacob saw that Laban had gone to shear his sheep, and Jacob called Leah and Rachel and spoke to their hearts, that they should come with him to the land of Canaan.
  footnotes:
  - marker: a
    text: Or 'spoke to them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:22Z'
    unchanged: false
    changes_summary: Replaced 'spoke to their hearts' with the more natural and contextually appropriate 'spoke to them.'
translation:
  language: es
  text: Y Jacob vio que Labán había ido a esquilar sus ovejas, y Jacob llamó a Lea y a Raquel y les habló al corazón[a], para que vinieran con él a la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘les habló’. El ge'ez conserva un giro semítico, literalmente ‘habló a/dentro de sus corazones’, que expresa persuasión, ternura o apelación íntima.
    reason: lexical_alternative
lexical_decisions:
- source_word: ከመ፡ የሐውር፡ ላባ፡ ይቅርጽ፡ አባግዒሁ፡
  english_pob_choice: had gone to shear his sheep
  chosen_spanish: había ido a esquilar sus ovejas
  alternatives_spanish:
  - había salido a esquilar sus ovejas
  - había ido a trasquilar sus ovejas
  lexicon: shear / esquilar
  rationale: ‘Esquilar’ reproduce con precisión la acción pastoril concreta del original y mantiene el registro sobrio del relato. ‘Trasquilar’ es posible, pero ‘esquilar’ es más natural en español bíblico actual.
- source_word: ወጸውዖን፡ ... ወተናገረ፡ ውስተ፡ ልቦን፡
  english_pob_choice: called Leah and Rachel and spoke to their hearts / spoke to them
  chosen_spanish: llamó a Lea y a Raquel y les habló
  alternatives_spanish:
  - llamó a Lea y a Raquel y habló a sus corazones
  - llamó a Lea y a Raquel y les habló con ternura
  lexicon: speak to the heart / speak to them
  rationale: El ge'ez conserva la expresión idiomática ‘dentro de sus corazones’, pero la revisión inglesa reconoció que el sentido natural en contexto es simplemente ‘habló a ellos’. En español, ‘les habló’ comunica la escena de forma clara sin introducir una metáfora que podría sonar artificial en este verso. Se preserva la posibilidad de una lectura afectiva en nota.
- source_word: ምድረ፡ ከናአን።
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - la región de Canaán
  - la tierra de los cananeos
  lexicon: land of Canaan
  rationale: ‘La tierra de Canaán’ sigue de cerca la designación geográfica estándar del texto y es plenamente inteligible en español bíblico.
theological_decisions:
- issue: Idiomatic intensification in ‘spoke to their hearts’ versus neutral speech
  english_pob_reading: The latest English revision preferred the natural ‘spoke to them,’ while the source still contains the idiom ‘into their hearts.’
  chosen_spanish_reading: les habló
  alternative_spanish_readings:
  - les habló a sus corazones
  - les habló con el corazón
  rationale: No hay una diferencia doctrinal en juego, pero sí una cuestión de fidelidad al matiz semítico. Se optó por el español más natural en el cuerpo del texto y se deja constancia de la lectura idiomática como alternativa posible.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La tradición inglesa revisó este verso en dos direcciones: primero simplificó ‘spoke to their hearts’ a ‘spoke to them’ por naturalidad, y luego una revisión posterior señaló que el ge''ez explícitamente dice ‘into their hearts’. El español adopta una forma natural en el texto principal (‘les habló’) y conserva la alternativa idiomática en nota para no perder el matiz semítico documentado.'
  spanish_consistency_notes:
  - Se mantiene ‘Y Jacob’ al inicio para conservar el arranque narrativo sencillo del original.
  - Se usa ‘Lea’ y ‘Raquel’ como formas españolas habituales y transparentes.
  - Se evita ‘corazones’ en el cuerpo del texto porque en español suena más interpretativo que el verbo simple requerido por el contexto narrativo.
  - ‘Canaán’ se conserva como topónimo tradicional y directo.
