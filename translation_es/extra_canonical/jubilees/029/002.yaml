    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar en el texto principal el modismo explícito del ge'ez, en línea con la decisión auditada del inglés que restauró 'spoke to their hearts'. 'Les habló al corazón' es español natural, mantiene el matiz afectivo/persuasivo del original y evita relegar una nuance significativa solo a la nota.
