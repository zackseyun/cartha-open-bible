  to: Y Jacob vio que Labán había ido a esquilar sus ovejas, y Jacob llamó a Lea y a Raquel y les habló al corazón[a], para que vinieran con él a la tierra de Canaán.
  rationale: Se revisa para reflejar en el texto principal el modismo explícito del ge'ez, en línea con la decisión auditada del inglés que restauró 'spoke to their hearts'. 'Les habló al corazón' es español natural, mantiene el matiz afectivo/persuasivo del original y evita relegar una nuance significativa solo a la nota.
