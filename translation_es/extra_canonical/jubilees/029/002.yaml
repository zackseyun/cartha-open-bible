review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo: Jacob ve que Labán ha ido a esquilar sus ovejas, llama a Lea y Raquel, y las invita a ir con él a Canaán. Sin embargo, el ge''ez dice explícitamente que Jacob ''habló a sus corazones'' / ''al corazón de ellas'', un modismo semítico que el rastro de auditoría inglés finalmente restauró en el texto principal por considerar que ''spoke to them'' perdía un matiz significativo de persuasión o ternura. El español principal ''les habló'' rebaja ese matiz y deja la fidelidad fuerte relegada a nota.'
  spanish_quality_summary: El español es claro y natural. 'Había ido a esquilar sus ovejas' y 'la tierra de Canaán' son lecturas buenas y legibles. La única debilidad importante es que el cuerpo del texto suena más plano que el original. En español, 'les habló al corazón' es idiomático y digno, y preserva mejor el sentido sin volverse forzado.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres propios están bien: Jacob, Labán, Lea, Raquel, Canaán. La cuestión central es léxica/idiomática, no glosarial: ወተናገረ፡ ውስተ፡ ልቦን፡ se debe reflejar mejor en el texto principal.'
  issues:
  - severity: medium
    issue: El texto principal omite el modismo 'habló a sus corazones / al corazón de ellas'.
    rationale: 'La auditoría inglesa más reciente revirtió ''spoke to them'' a ''spoke to their hearts'' precisamente porque el ge''ez conserva ese matiz semítico. En español, existe una opción natural equivalente: ''les habló al corazón'', que mantiene tanto fidelidad como legibilidad.'
  - severity: low
    issue: La nota actual formula la alternativa de manera algo más literal y menos idiomática de lo necesario.
    rationale: '''Les habló a sus corazones'' suena más rígido en español que ''les habló al corazón''. Conviene usar la forma idiomática española en el texto principal y reservar la nota para explicar el trasfondo semítico y una alternativa más neutral.'
  revised_spanish_text: Y Jacob vio que Labán había ido a esquilar sus ovejas, y Jacob llamó a Lea y a Raquel y les habló al corazón[a], para que vinieran con él a la tierra de Canaán.
  revised_footnotes:
  - marker: a
