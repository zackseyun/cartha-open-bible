  text: And he dwelt there apart from Esau his son. For in the days when Jacob went to Mesopotamia, Esau took for himself Mahalath, the daughter of Ishmael, as a wife, and he gathered together all his father's livestock and his wives, and he went up and dwelt on Mount Seir, and he left Isaac his father at the Well of the Oath.
