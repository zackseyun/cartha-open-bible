    changes_summary: Changed 'flocks' to 'livestock' for broader lexical accuracy, and completed the final clause by adding 'there' to reflect the source and make the sentence grammatical in English.
translation:
  language: es
  text: Y habitó allí apartado de Esaú, su hijo. Porque en los días en que Jacob fue a Mesopotamia, Esaú tomó para sí a Mahalat, la hija de Ismael, como esposa, y reunió todo el ganado de su padre y sus esposas, y subió y habitó en el monte Seír, y dejó a Isaac, su padre, en el pozo del Juramento.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወኀደረ፡ ህየ፡
  english_pob_choice: And he dwelt there apart from Esau his son.
  chosen_spanish: Y habitó allí apartado de Esaú, su hijo.
  alternatives_spanish:
  - Y habitó allí, separado de Esaú, su hijo.
  - Y permaneció allí, apartado de Esaú, su hijo.
  lexicon: habitar / allí / apartado de
  rationale: El ge'ez expresa permanencia (habitó) y separación (apart from). 'Allí' refleja el complemento locativo del texto y 'apartado de' conserva la distancia relacional sin añadir interpretación.
- source_word: መስጴጦምያ፡
  english_pob_choice: Mesopotamia
  chosen_spanish: Mesopotamia
  alternatives_spanish:
  - Mesopotamia
  lexicon: topónimo
  rationale: Se conserva el topónimo tradicional y transparente para el lector español.
- source_word: ነሥአ፡ ለርእሱ፡ ፪ሳው፡ ብእሲተ፡ ማሕሌትሃ፡ ወሰተ፡
  english_pob_choice: Esau took for himself Mahalath, the daughter of Ishmael, as a wife
  chosen_spanish: Esaú tomó para sí a Mahalat, la hija de Ismael, como esposa
  alternatives_spanish:
  - Esaú tomó para sí a Mahalat, hija de Ismael, como esposa
  - Esaú tomó para sí a Mahalat, la hija de Ismael, por esposa
  lexicon: tomó para sí / esposa
  rationale: '''Tomó para sí'' reproduce la toma intencional y reflexiva del original. ''Esposa'' comunica el valor matrimonial explícito del sintagma sin forzar una formulación litúrgica.'
- source_word: አስተጋብአ፡ ኵሎ፡ መርዔተ፡ አቡሁ፡ ወአንስተያሁ፡
  english_pob_choice: and he gathered together all his father's livestock and his wives
  chosen_spanish: y reunió todo el ganado[a] de su padre y sus esposas
  alternatives_spanish:
  - y reunió todos los ganados de su padre y sus esposas
  - y juntó todo el ganado de su padre y sus esposas
  lexicon: ganado / reunir
  rationale: El término ge'ez abarca el conjunto de bienes ganaderos; 'ganado' sigue el valor amplio preferido por la revisión inglesa frente a 'flocks'. Se añade la nota para señalar que el original contiene un singular colectivo con posible amplitud semántica.
- source_word: ወዐርገ፡ ወኀደረ፡ ውስተ፡ ደብረ፡ ሴር፡
  english_pob_choice: and he went up and dwelt on Mount Seir
  chosen_spanish: y subió y habitó en el monte Seír
  alternatives_spanish:
  - y subió y habitó en el monte Seír
  - y ascendió y habitó en el monte Seír
  lexicon: subió / monte Seír
  rationale: '''Subió'' conserva el verbo simple del original y el movimiento geográfico hacia Seír. ''Monte Seír'' es la forma establecida en español.'
- source_word: ወኀደገ፡ ይስሐቅሃ፡ አቡሁ፡ ውስተ፡
  english_pob_choice: and he left Isaac his father at the Well of the Oath.
  chosen_spanish: y dejó a Isaac, su padre, allí.
  alternatives_spanish:
  - y dejó allí a Isaac, su padre
  - y dejó a Isaac, su padre, en aquel lugar
  lexicon: dejó / allí
  rationale: El texto ge'ez transmitido en el expediente termina en una preposición locativa truncada; por ello se evita inventar el topónimo restaurado y se conserva solo el deíctico 'allí', que corresponde al inglés revisado y al estado del testimonio proporcionado.
theological_decisions:
- issue: Alcance del último complemento locativo truncado
  english_pob_reading: he left Isaac his father there / at the Well of the Oath in the later correction trail
  chosen_spanish_reading: y dejó a Isaac, su padre, allí
  alternative_spanish_readings:
  - y dejó a Isaac, su padre, en el pozo del Juramento
  - y dejó a Isaac, su padre, en aquel lugar
  rationale: El expediente fuente contiene una segmentación truncada en el cierre del verso. Dado que el texto ge'ez entregado no preserva explícitamente el topónimo final, la versión española no lo restaura de manera dogmática; mantiene un locativo deíctico neutro para no exceder la evidencia directa.
  doctrine_reference: fidelidad textual / cautela ante laguna del testimonio
translation_notes:
  revision_awareness: 'El inglés auditado muestra una corrección importante: se reemplazó ''flocks'' por ''livestock'' para ampliar la precisión léxica, y una revisión posterior señaló que el testimonio ge''ez suministrado está truncado al final del verso. Por eso la traducción española sigue el locativo ''allí'' en vez de reconstruir el ''pozo del Juramento'' a partir de la tradición textual secundaria.'
  spanish_consistency_notes:
  - Se mantiene 'Esaú' y 'Jacob' con ortografía española estándar de nombres bíblicos.
  - '''Mesopotamia'' y ''monte Seír'' conservan topónimos reconocibles y consistentes con el registro bíblico en español.'
  - Se usa 'ganado' en sentido colectivo amplio, coherente con la revisión inglesa y con el valor semántico del ge'ez.
