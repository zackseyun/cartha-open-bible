translation:
  language: es
  text: vida sobre la tierra.[a] Y Jacob despidió a Labán, y Labán fue a Mesopotamia, la tierra del oriente; y Jacob volvió a la tierra de Galaad. Y cruzó el Jaboc en el noveno mes, el undécimo día; y ese día vino a él Esaú, su hermano, y se reconcilió con él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase 'vida sobre la tierra' también puede entenderse como 'ya no les quedó resto de vida sobre la tierra'.
    reason: alternative_reading
lexical_decisions:
- source_word: life upon the earth
  english_pob_choice: life upon the earth
  chosen_spanish: vida sobre la tierra
  alternatives_spanish:
  - vida en la tierra
  - vida en la superficie de la tierra
  lexicon: life / earth
  rationale: La construcción conserva la formulación breve y concreta del original. 'Sobre la tierra' refleja con naturalidad el valor locativo de 'upon' sin añadir interpretación. Mantiene también abierta la nota alternativa sobre la posible lectura de 'no quedó resto de vida en la tierra'.
- source_word: sent Laban away
  english_pob_choice: And Jacob sent Laban away
  chosen_spanish: Jacob despidió a Labán
  alternatives_spanish:
  - Jacob envió a Labán
  - Jacob mandó ir a Labán
  lexicon: send away / dismiss
  rationale: '''Despidió'' transmite el acto de dar por concluida la estancia o relación de manera más idiomática en español que una calca de ''envió''. Conserva la dirección semántica de separación final implicada por el inglés POB.'
- source_word: Mesopotamia, the land of the east
  english_pob_choice: Mesopotamia, the land of the east
  chosen_spanish: Mesopotamia, la tierra del oriente
  alternatives_spanish:
  - Mesopotamia, la tierra del este
  - Mesopotamia, la tierra oriental
  lexicon: Mesopotamia / east
  rationale: Se mantiene el topónimo y se vierte 'land of the east' con una expresión bíblica comprensible en español. 'Oriente' suena más natural y conserva la referencia geográfica amplia.
- source_word: land of Gilead
  english_pob_choice: the land of Gilead
  chosen_spanish: la tierra de Galaad
  alternatives_spanish:
  - la región de Galaad
  - el territorio de Galaad
  lexicon: land / Gilead
  rationale: Se conserva la forma geográfica directa. 'Tierra de Galaad' es transparente y fiel al patrón del texto fuente.
- source_word: Jabbok
  english_pob_choice: the Jabbok
  chosen_spanish: el Jaboc
  alternatives_spanish:
  - el Jabboc
  - el río Jaboc
  lexicon: proper noun
  rationale: Se usa una transliteración hispanizada estable y clara. Se omite 'río' porque el contexto ya sugiere un paso fluvial y el nombre propio basta.
- source_word: reconciled with him
  english_pob_choice: he was reconciled with him
  chosen_spanish: se reconcilió con él
  alternatives_spanish:
  - fue reconciliado con él
  - quedó reconciliado con él
  lexicon: reconcile
  rationale: El reflexivo es el giro más natural en español y preserva el sentido relacional del original. 'Fue reconciliado' es posible, pero resulta más pesado y menos idiomático.
theological_decisions:
- issue: Alcance de la nota sobre 'vida sobre la tierra'
  english_pob_reading: The clause 'they no longer have life upon the earth' may also be understood as 'there was no remnant of life left for them on the earth.'
  chosen_spanish_reading: La frase puede entenderse también como 'ya no les quedó resto de vida sobre la tierra'.
  alternative_spanish_readings:
  - ya no tenían vida sobre la tierra
  - no quedó remanente de vida para ellos sobre la tierra
  rationale: No se elimina la tensión de la lectura alternativa. La nota española conserva la posibilidad de leer una extinción total o una ausencia de remanente, sin decidir indebidamente entre ambas.
  doctrine_reference: Textual/lexical ambiguity in the source tradition
- issue: Orden narrativo y continuidad de la secuencia
  english_pob_reading: life upon the earth. And Jacob sent Laban away, and he went into Mesopotamia...
  chosen_spanish_reading: vida sobre la tierra.[a] Y Jacob despidió a Labán...
  alternative_spanish_readings:
  - vida sobre la tierra. Y Jacob envió a Labán...
  - vida sobre la tierra. Y Jacob mandó a Labán...
  rationale: Se mantiene la secuencia narrativa tal como aparece en el testimonio inglés auditado, sin expandir la información ni armonizarla con otras tradiciones. La puntuación conserva el corte temático entre la observación previa y la acción de Jacob.
  doctrine_reference: Narrative fidelity / source-order preservation
translation_notes:
  revision_awareness: Seguí el ajuste auditado que mueve la nota inmediatamente después de 'life upon the earth' y conservé el orden revisado 'sent Laban away' como 'despidió a Labán', evitando una calca menos natural. También preservé la puntuación que separa la cláusula de apertura del relato narrativo siguiente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca, pero en este versículo no hay referencia explícita.
  - '''Mesopotamia'', ''Galaad'' y ''Jaboc'' se mantienen como nombres propios bíblicos en forma hispanizada consistente.'
  - '''reconcilió'' se usa en sentido relacional, sin introducir lenguaje doctrinal adicional.'
  - La nota al pie está anclada correctamente al sintagma 'vida sobre la tierra'.
