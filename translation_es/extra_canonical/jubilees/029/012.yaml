  to: vida sobre la tierra.[a] Y Jacob despidió a Labán, y Labán fue a Mesopotamia, la tierra del oriente; y Jacob volvió a la tierra de Galaad. Y cruzó el Jaboc en el noveno mes, el undécimo día; y ese día vino a él Esaú, su hermano, y se reconcilió con él,
