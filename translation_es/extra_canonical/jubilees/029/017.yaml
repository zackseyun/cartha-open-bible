  revised_spanish_text: La primavera y la lluvia y la mitad del invierno y el verano estaban en la torre de Abraham. Porque Isaac había regresado del Pozo del Juramento y había subido a la torre de su padre Abraham.
  revision_rationale: Se corrige «cueva» a «torre» en la segunda cláusula para reflejar fielmente la repetición de ማኅፈድ en el texto ge'ez y la corrección documentada en el audit trail inglés. No se requieren otras modificaciones, porque el resto del versículo es claro y fiel.
