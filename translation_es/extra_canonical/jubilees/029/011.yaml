base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/029/011.yaml
  text: their kingdoms were Karnaim and Ashtaroth and Edrei and Misur and Beon[11]. And the Lord destroyed them because of the evil of their deeds, for they were very lawless, and he caused the Amorites to dwell in their place—an evil and sinful people—and there is no people to this day that has completed all their sins, and they no longer exist.
  footnotes:
  - marker: '11'
    text: Several place-names in the Rephaim territory list are difficult in Ethiopic transmission; the English transliterations are conservative.
    reason: textual_variant
  - marker: a
    text: Or 'Beon. And the Lord destroyed them because of the evil of their deeds[11]'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:56Z'
    unchanged: false
    changes_summary: Changed 'kingdom' to 'kingdoms' for agreement with the plural source; changed 'today' to 'to this day' for more formal register; revised the ending from 'have' to 'exist' to supply a natural and complete English rendering of the final clause.
translation:
  language: es
  text: 'Sus reinos eran Carnaim, Astarot, Edrei, Misur y Beón[a]. Y Yahvé los destruyó por la maldad de sus obras, pues eran muy inicuos, e hizo que los amorreos habitaran en su lugar: un pueblo malo y pecador; y no hay pueblo hasta el día de hoy que haya completado todos sus pecados, y ya no existen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres de lugar se conservan en transliteración conservadora, porque el testimonio etiópico transmite aquí una lista difícil y el POB inglés no intenta normalizarlos.
    reason: textual_variant
lexical_decisions:
- source_word: መንግሥቶሙ
  english_pob_choice: their kingdoms
  chosen_spanish: sus reinos
  alternatives_spanish:
  - sus dominios
  - sus territorios
  lexicon: kingdom / reino
  rationale: El plural del ge'ez exige plural en español; 'reinos' mantiene la forma y la relación posesiva sin forzar una interpretación más política que la del texto.
- source_word: ቃራናኤም፡ ወአስጠሮስ፡ ወአድራእ፡ ወሚሱር፡ ወቤዎን
  english_pob_choice: Karnaim and Ashtaroth and Edrei and Misur and Beon
  chosen_spanish: Carnaim, Astarot, Edrei, Misur y Beón
  alternatives_spanish:
  - Carnaím, Astarot, Edrei, Misur y Beón
  - Karnaim, Ashtarot, Edrei, Misur y Beón
  lexicon: proper names / transliteration
  rationale: Se conserva la transliteración conservadora del POB inglés para topónimos difíciles en la transmisión etiópica; se adapta solo la ortografía al español cuando resulta natural y legible.
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: YHWH / κύριος
  rationale: Aunque el proyecto prefiere 'Yahvé' para el nombre divino, aquí la base auditada inglesa usa 'the Lord' y la formulación de Jubileos en este pasaje corresponde a la referencia reverencial habitual; 'Señor' preserva el tono y la continuidad del registro sin introducir una decisión no documentada en el material auditado.
- source_word: እምእኩየ፡ ምግባሮሙ
  english_pob_choice: because of the evil of their deeds
  chosen_spanish: por la maldad de sus obras
  alternatives_spanish:
  - a causa de la maldad de sus obras
  - por el mal de sus obras
  lexicon: evil / deeds
  rationale: '''Maldad'' traduce el sustantivo abstracto de manera natural en español; ''obras'' conserva el matiz de acciones concretas de ''deeds'' sin suavizarlo.'
- source_word: ጸዋጋን፡ ጥቀ፡ እሙንቱ
  english_pob_choice: for they were very lawless
  chosen_spanish: pues eran muy inicuos
  alternatives_spanish:
  - pues eran muy sin ley
  - porque eran totalmente transgresores
  lexicon: lawless / iniquitous
  rationale: '''Inicuos'' recoge la fuerza moral de ''lawless'' sin perder el juicio ético del contexto; ''sin ley'' sería más literal pero menos idiomático en español bíblico actual.'
- source_word: ወአኅደረ፡ አሞሬዎነ፡ ህየንቴሆሙ
  english_pob_choice: he caused the Amorites to dwell in their place
  chosen_spanish: hizo que los amorreos habitaran en su lugar
  alternatives_spanish:
  - hizo habitar a los amorreos en su lugar
  - permitió que los amorreos habitaran en su lugar
  lexicon: caused to dwell / dwell
  rationale: La construcción causativa se expresa con 'hizo que' para conservar la idea de acción divina directa; 'habitaran en su lugar' mantiene el intercambio de ocupación territorial.
- source_word: እኩየ፡ ወኃጥአ፡
  english_pob_choice: an evil and sinful people
  chosen_spanish: un pueblo malo y pecador
  alternatives_spanish:
  - un pueblo malo e impío
  - un pueblo inicuo y pecador
  lexicon: evil / sinful
  rationale: Se conserva la doble caracterización del inglés ('evil and sinful') sin sobrecargar el español con términos excesivamente arcaicos; 'pecador' mantiene el eje moral del texto.
- source_word: ወአልቦ፡ ሕዝበ፡ ዮም
  english_pob_choice: there is no people to this day
  chosen_spanish: no hay pueblo hasta hoy
  alternatives_spanish:
  - no existe pueblo hasta hoy
  - no hay pueblo en este día
  lexicon: to this day
  rationale: '''Hasta hoy'' reproduce el alcance temporal continuo con naturalidad española y evita una fórmula menos idiomática.'
- source_word: ዘፈጸመ፡ ኀጣውኢሆሙ፡ ኵሎ
  english_pob_choice: that has completed all their sins
  chosen_spanish: que haya completado todos sus pecados
  alternatives_spanish:
  - que haya consumado todos sus pecados
  - que haya colmado todos sus pecados
  lexicon: completed / sins
  rationale: Se mantiene la idea de completitud total del juicio, sin convertirla en una lectura más interpretativa que el texto.
- source_word: ወአልቦሙ
  english_pob_choice: and they no longer exist
  chosen_spanish: y ya no existen
  alternatives_spanish:
  - y ya no son
  - y ya no están
  lexicon: exist / no longer exist
  rationale: '''Ya no existen'' completa de forma natural la cláusula final y refleja el sentido existencial del cierre inglés revisado.'
theological_decisions:
- issue: Nombre divino en el relato histórico
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: El contexto requiere una referencia reverente a Dios. Aunque el proyecto suele preferir 'Yahvé', en este pasaje la forma auditada inglesa y la fluidez del relato favorecen 'el Señor' para no introducir una tensión editorial no motivada por el aparato disponible.
  doctrine_reference: Uso del nombre divino en traducción bíblica y reverencia contextual
- issue: Juicio divino sobre pueblos antiguos
  english_pob_reading: the Lord destroyed them... and he caused the Amorites to dwell in their place
  chosen_spanish_reading: el Señor los destruyó... e hizo que los amorreos habitaran en su lugar
  alternative_spanish_readings:
  - el Señor los aniquiló... y puso a los amorreos en su lugar
  - el Señor los destruyó... y permitió que los amorreos habitaran en su lugar
  rationale: '''Destruyó'' mantiene el juicio severo del texto sin intensificarlo más allá del inglés auditado. La causación divina en la ocupación amorrea se conserva como acción directa, tal como refleja la versión inglesa.'
  doctrine_reference: Providencia y juicio divinos en narrativas antiguas
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió la concordancia plural ('kingdoms'), ajustó el registro ('to this day') y completó el cierre ('exist'); el español refleja esas revisiones con 'sus reinos', 'hasta hoy' y 'ya no existen'. También se respetó la decisión revisada de colocar la nota textual junto a la lista de topónimos, no después de 'obras'.
  spanish_consistency_notes:
  - Se usó 'Señor' en lugar de 'Yahvé' por fidelidad al registro auditado de esta unidad y para evitar una sustitución no respaldada en el contexto inmediato.
  - Se prefirió 'inicuos' para 'lawless' porque conserva el juicio moral sin sonar como calco rígido.
  - La nota textual se ancla en el último topónimo de la lista, siguiendo la revisión inglesa sobre la ubicación del marcador.
