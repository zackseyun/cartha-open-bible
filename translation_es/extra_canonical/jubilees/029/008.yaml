  text: Galaad. Y allí hizo un banquete para testimonio; por eso aquel lugar fue llamado
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ገለአድ / Gilead
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  lexicon: Topónimo bíblico
  rationale: Se usa la forma castellana bíblica tradicional y ampliamente reconocible para el lugar, sin alterar la referencia geográfica.
- source_word: ፍሥሐተ
  english_pob_choice: feast
  chosen_spanish: banquete
  alternatives_spanish:
  - fiesta
  - festín
  lexicon: Léxico de comida ceremonial / celebración
  rationale: El contexto indica una comida celebrativa, y «banquete» comunica mejor el carácter formal y compartido del evento que un calco mecánico.
- source_word: ለስምዐ
  english_pob_choice: for a witness
  chosen_spanish: como testimonio
  alternatives_spanish:
  - para testimonio
  - como testigo
  lexicon: Léxico forense/testimonial
  rationale: «Testimonio» conserva el valor declarativo y conmemorativo del sustantivo sin forzar una personificación innecesaria.
- source_word: ተጸውዐ
  english_pob_choice: was called
  chosen_spanish: se llamó
  alternatives_spanish:
  - fue llamado
  lexicon: Construcción pasiva impersonal
  rationale: La pasiva refleja es natural en español y mantiene el sentido de denominación del lugar.
theological_decisions:
- issue: Sentido de «for a witness»
  english_pob_reading: The feast functioned as a witness/attestation.
  chosen_spanish_reading: El banquete tuvo función de testimonio o señal pública.
  alternative_spanish_readings:
  - banquete como testigo
  - banquete como pacto
  rationale: El texto sugiere una acción con valor conmemorativo o atestiguador; «testimonio» mantiene esa amplitud sin añadir un concepto de pacto que no aparece explícitamente en el fragmento.
  doctrine_reference: Memorial/testimonial language in narrative contexts
translation_notes:
  revision_awareness: La traducción sigue el texto ge'ez y concuerda con la lectura inglesa auditada; no se documentaron revisiones aplicadas ni variantes textuales en el paquete proporcionado.
  spanish_consistency_notes:
  - Se prefirió «Galaad» por consistencia con el topónimo bíblico en español.
  - No se introdujo una equivalencia doctrinal más fuerte que la evidencia del fragmento; se conservó la ambigüedad útil de «testimonio».
  - El cierre queda abierto porque el segmento de fuente y la traducción inglesa auditada terminan en medio de la cláusula nominal.
