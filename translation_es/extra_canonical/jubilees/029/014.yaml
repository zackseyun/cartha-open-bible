    reason: lexical_alternative
  - marker: a
    text: Or 'land of Seir[14], but Jacob dwelt in tents. And in the first year of the fifth week in this jubilee, he crossed the Jordan and dwelt beyond the Jordan, and he pastured his sheep from the Sea of Heaps'.
    reason: previous_rendering
  revision_pass:
