  text: And he went from him to the land of Seir, but Jacob dwelt in tents. And in the first year of the fifth week in this jubilee, he crossed the Jordan and dwelt beyond the Jordan, and he pastured his sheep from the Sea of Heaps[14] as far as Beth-shan and as far as Dothan and as far as
  footnotes:
