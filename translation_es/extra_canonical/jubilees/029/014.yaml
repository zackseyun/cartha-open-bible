    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that reflects the Ge''ez text: Esau went to the land of Seir; Jacob dwelt in tents; in the first year of the fifth week of this jubilee he crossed the Jordan, dwelt beyond the Jordan, and pastured his sheep from the Sea of Heaps to Beth-shan and Dothan. Preserved the verse''s final incomplete ending (''and as far as'') rather than supplying missing text.'
translation:
  language: es
  text: Y se fue de su lado a la tierra de Seir, pero Jacob habitó en tiendas. Y en el primer año de la quinta semana de este jubileo, cruzó el Jordán y habitó al otro lado del Jordán, y apacentó sus ovejas desde el Mar de los Montones[a] hasta Bet-sán y hasta Dotán y hasta
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mar de los Montones» traduce un topónimo incierto del etiópico; puede subyacer otro nombre de lugar en el texto subyacente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምድረ ሴኢር
  english_pob_choice: the land of Seir
  chosen_spanish: la tierra de Seir
  alternatives_spanish:
  - la región de Seir
  - el territorio de Seir
  lexicon: tierra
  rationale: La Ge'ez nombra un lugar geográfico concreto; «tierra de Seir» conserva la formulación sobria del original y coincide con la referencia del POB inglés sin añadir interpretación.
- source_word: ያዕቆብሰ ኀደረ በምጽላላት
  english_pob_choice: Jacob dwelt in tents
  chosen_spanish: Jacob habitó en tiendas
  alternatives_spanish:
  - Jacob vivió en tiendas
  - Jacob permaneció en tiendas
  lexicon: habitar
  rationale: «Habitó en tiendas» reproduce el contraste narrativo con Esaú y mantiene la imagen concreta de residencia nómada. «Tiendas» es más natural que un calco más rígido y sigue siendo fiel al texto.
- source_word: ወበዓመት ቀዳሚ ዘኃምስ ሱባዔ በዝ አ፻ቤሊዉ
  english_pob_choice: in the first year of the fifth week in this jubilee
  chosen_spanish: en el primer año de la quinta semana de este jubileo
  alternatives_spanish:
  - en el primer año de la quinta semana de este jubileo
  - en el primer año de la quinta semana de este jubileo
  lexicon: week / jubilee
  rationale: Se conserva la cronología técnica de Jubileos con «semana» para ṣubʿā y «jubileo» para ዓፍ/አ፻ቤሊዉ según el uso del POB inglés. No se explica ni se adapta más allá de lo que el texto da.
- source_word: ዐደወ ዮርዳኖስ
  english_pob_choice: he crossed the Jordan
  chosen_spanish: cruzó el Jordán
  alternatives_spanish:
  - pasó el Jordán
  - cruzó el río Jordán
  lexicon: crossing
  rationale: «Cruzó el Jordán» es la forma más directa y natural en español, fiel al verbo de paso del original y al audit trail inglés.
- source_word: ወኀደረ ማዕዶተ ዮርዳኖስ
  english_pob_choice: dwelt beyond the Jordan
  chosen_spanish: habitó al otro lado del Jordán
  alternatives_spanish:
  - habitó más allá del Jordán
  - se estableció al otro lado del Jordán
  lexicon: dwelt beyond
  rationale: «Al otro lado del Jordán» conserva la orientación espacial sin forzar una localización exacta; «habitar» mantiene el mismo verbo de residencia usado antes en el verso.
- source_word: ወይሬዒ አባግዒሁ
  english_pob_choice: he pastured his sheep
  chosen_spanish: apacentó sus ovejas
  alternatives_spanish:
  - pastoreó sus ovejas
  - guardó sus ovejas
  lexicon: pasture
  rationale: «Apacentó» es un verbo bíblico claro y preciso para el cuidado del rebaño. «Ovejas» refleja el animal explícito del Ge'ez, y evita una generalización innecesaria.
- source_word: እምባሕረ ፌሐሐት
  english_pob_choice: from the Sea of Heaps
  chosen_spanish: desde el Mar de los Montones
  alternatives_spanish:
  - desde el Mar de los Montones
  - desde el Mar de los Montones
  lexicon: toponym
  rationale: Se traduce literalmente el topónimo incierto para conservar la transparencia del POB y no ocultar la forma etiópica. «Montones» sigue la imagen semántica del inglés «Heaps» sin afirmar una identificación geográfica segura.
- source_word: ቤተስን
  english_pob_choice: Beth-shan
  chosen_spanish: Bet-sán
  alternatives_spanish:
  - Bet-shán
  - Bet-sán
  lexicon: place name
  rationale: Se adopta la forma hispanizada «Bet-sán», común y legible, para el topónimo bíblico. Se evita una grafía demasiado dependiente del inglés.
- source_word: ዶታኤም
  english_pob_choice: Dothan
  chosen_spanish: Dotán
  alternatives_spanish:
  - Dotán
  - Dotan
  lexicon: place name
  rationale: «Dotán» respeta la acentuación natural del español y mantiene la identidad del lugar sin seguir mecánicamente la ortografía inglesa.
theological_decisions:
- issue: La frase final queda incompleta
  english_pob_reading: the verse ends with 'and as far as'
  chosen_spanish_reading: y hasta
  alternative_spanish_readings:
  - y hasta…
  - y hasta
  rationale: Se preserva el final truncado del testimonio fuente sin completar el contenido. Esto respeta el estado textual del verso en Ge'ez y la decisión editorial inglesa de no suplir texto faltante.
  doctrine_reference: Principio de fidelidad textual y no expansión del testimonio recibido
- issue: Tensión toponímica en 'Sea of Heaps'
  english_pob_reading: uncertain toponym in the Ethiopic; a different underlying place-name may stand behind it
  chosen_spanish_reading: Mar de los Montones
  alternative_spanish_readings:
  - Mar de los Montones
  - Mar de los Heaps
  rationale: Se mantiene una traducción semántica transparente del topónimo, pero sin resolver la incertidumbre histórica o crítica. Así se conserva la tensión documental señalada por el POB inglés.
  doctrine_reference: Cautela textual y preservación de incertidumbre onomástica
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió un borrador ajeno al pasaje y fijó la estructura: Esaú va a Seir; Jacob habita en tiendas; en el primer año de la quinta semana de este jubileo cruza el Jordán, habita al otro lado del Jordán y apacienta sus ovejas desde el Sea of Heaps hasta Bet-shan y Dotan, conservando el final abierto. La presente versión sigue esa revisión y mantiene tanto el topónimo incierto como la clausura incompleta.'
  spanish_consistency_notes:
  - Se conserva 'Y' al inicio de las cláusulas para reflejar el encadenamiento narrativo del original, aunque en español podría omitirse en lectura pública.
  - Se usa 'Jordán' sin artículo cuando funciona como nombre propio de río, conforme al uso bíblico normal en español.
  - Los topónimos se presentan con formas sobrias y legibles, evitando modernizaciones innecesarias.
  - No se introduce 'Cristo', 'SEÑOR' ni terminología interpretativa ajena al texto.
