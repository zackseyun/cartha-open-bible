  text: For he told them everything that he had seen in the dream, and everything that had been spoken to him, that he should return to his father's house; and he said to him, “Go to every place, wherever you go.””
  footnotes:
  - marker: a
    text: Or 'enter'.
    reason: previous_rendering
  - marker: b
    text: Or 'and I will be with you.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:23Z'
    unchanged: false
    changes_summary: 'Adjusted wording for accuracy and natural English: changed ''go into'' to ''enter'' for the house, corrected ''he had said'' to simple past ''he said,'' and rendered ''in every place'' as ''to every place'' for more natural movement language while preserving the source sense.'
translation:
  language: es
  text: 'Porque les contó todo lo que había visto en el sueño, y todo lo que se le había dicho, para que regresara a la casa de su padre; y le dijo: «Ve a todo lugar, dondequiera que vayas».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ነገሮን
  english_pob_choice: he told them
  chosen_spanish: les contó
  alternatives_spanish:
  - les dijo
  - les relató
  lexicon: contar
  rationale: El verbo ge'ez indica comunicar o relatar lo dicho; «les contó» conserva el acto de narrar con naturalidad en español y evita un calco rígido.
- source_word: ርእየ
  english_pob_choice: what he had seen in the dream
  chosen_spanish: lo que había visto en el sueño
  alternatives_spanish:
  - lo que había visto en un sueño
  - lo que había visto soñando
  lexicon: ver
  rationale: El texto fuente habla de lo visto en el sueño; «había visto en el sueño» refleja la experiencia visionaria sin añadir matices ajenos.
- source_word: ዘተናገረ ሎቱ
  english_pob_choice: what had been spoken to him
  chosen_spanish: lo que le había sido hablado
  alternatives_spanish:
  - lo que le habían dicho
  - lo que le había sido dicho
  lexicon: hablar
  rationale: La pasiva conserva mejor la forma del original y mantiene la ambigüedad sobre el agente, como en el audit trail inglés.
- source_word: ከመ ይግባእ ቤተ አቡሁ
  english_pob_choice: that he should return to his father's house
  chosen_spanish: para que regresara a la casa de su padre
  alternatives_spanish:
  - para que volviera a la casa de su padre
  - para que se fuera de regreso a la casa de su padre
  lexicon: regresar
  rationale: La revisión inglesa corrigió el sentido a «return to»; «regresara» transmite ese movimiento de vuelta con claridad y fidelidad.
- source_word: ወይቤሎ ሖውር ውስተ ኵሉ መካን
  english_pob_choice: Go to every place
  chosen_spanish: Ve a todo lugar
  alternatives_spanish:
  - Ve a cualquier lugar
  - Anda a todo lugar
  lexicon: ir
  rationale: «Ve a todo lugar» reproduce el mandato general y la idea distributiva del original, sin domesticarlo en exceso.
- source_word: ወአይ ተሐውር
  english_pob_choice: wherever you go
  chosen_spanish: dondequiera que vayas
  alternatives_spanish:
  - a dondequiera que vayas
  - adondequiera que vayas
  lexicon: andar/ir
  rationale: La frase extant del ge'ez expresa movimiento indeterminado; «dondequiera que vayas» es la equivalencia española más natural y completa.
theological_decisions:
- issue: Intertexto con Génesis 31:3 y la ausencia de una promesa añadida de presencia divina en el ge'ez conservado
  english_pob_reading: The English audit trail removed the interpolated 'and I will be with you' and kept only the extant Ge'ez sense.
  chosen_spanish_reading: No se añadió «y yo estaré contigo»; se mantuvo solo la orden conservada en el ge'ez.
  alternative_spanish_readings:
  - «y yo estaré contigo»
  - «y estaré con ustedes»
  rationale: El testimonio fuente disponible no contiene la promesa de presencia; añadirla borraría una tensión textual documentada por la revisión.
  doctrine_reference: Crítica textual; fidelidad al testimonio conservado frente a armonización con Génesis 31:3
- issue: Dirección verbal de la acción respecto de la casa del padre
  english_pob_reading: The revised English settled on 'return to his father's house.'
  chosen_spanish_reading: «regresara a la casa de su padre»
  alternative_spanish_readings:
  - «entrara en la casa de su padre»
  - «fuera a la casa de su padre»
  rationale: La revisión textual corrigió un error previo; el español debe reflejar el regreso, no la simple entrada, para no perder el movimiento narrativo.
  doctrine_reference: Crítica textual y coherencia narrativa
translation_notes:
  revision_awareness: La redacción sigue la corrección crítica que devuelve el verbo al sentido de «regresar» y conserva el final extant del ge'ez sin interpolar la promesa de compañía divina. Se evitó el anterior «entrara» y se optó por una formulación que refleja tanto el texto fuente como la revisión más reciente del audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del versículo porque no aparece en el texto conservado.
  - 'Se prefirió un español sobrio y bíblico pero no arcaizante: «les contó», «regresara», «dondequiera que vayas».'
  - No se introdujeron notas al pie porque el verso, tal como está conservado y revisado, no requiere variantes alternativas en el texto español principal.
