translation:
  language: es
  text: al tiempo del otoño. Y envió a su padre Isaac, de todas sus posesiones, ropa, alimentos y carne.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አመ፡ አቅራቦት
  english_pob_choice: at the time of autumn
  chosen_spanish: al tiempo del otoño
  alternatives_spanish:
  - en el tiempo del otoño
  - en otoño
  lexicon: seasonal expression
  rationale: La revisión textual indica que la frase ge'ez completa la referencia estacional y no significa ‘traer’. En español, ‘al tiempo del otoño’ conserva el valor temporal y la estructura del original con estilo bíblico claro.
- source_word: ወይፌኑ
  english_pob_choice: And he sent
  chosen_spanish: Y envió
  alternatives_spanish:
  - Y mandó
  - Y remitió
  lexicon: send
  rationale: El verbo señalado por la revisión es ‘enviar’, no ‘traer’. ‘Envió’ reproduce bien el movimiento de entrega a distancia hacia Isaac.
- source_word: ለአቡሁ፡ ይስሐቅ
  english_pob_choice: to his father Isaac
  chosen_spanish: a su padre Isaac
  alternatives_spanish:
  - a Isaac su padre
  - a su padre, Isaac
  lexicon: recipient phrase
  rationale: Conserva el destinatario explícito y el orden natural del español sin perder la aposición identificadora.
- source_word: እምኵሉ፡ ጥሪቱ
  english_pob_choice: from all his possessions
  chosen_spanish: de todas sus posesiones
  alternatives_spanish:
  - de todo cuanto poseía
  - de todos sus bienes
  lexicon: possessions
  rationale: ‘Posesiones’ refleja el campo semántico de bienes o propiedad, y mantiene la idea de totalidad (‘de todas’).
- source_word: ልብሰ
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestidos
  - vestiduras
  lexicon: clothing
  rationale: ‘Ropa’ es natural en español contemporáneo y sigue el sentido material del término sin cargarlo innecesariamente con registro litúrgico.
- source_word: ወሲሲተ፡ ሥጋ
  english_pob_choice: food, meat
  chosen_spanish: provisiones de carne
  alternatives_spanish:
  - comida, carne
  - alimento de carne
  lexicon: food/meat
  rationale: La revisión rechaza ‘primeros frutos’ y confirma el valor de ‘food, meat’. ‘Provisiones de carne’ integra ambos elementos de manera inteligible en español, preservando la posible referencia a alimentos cárnicos sin añadir una interpretación de primicias.
theological_decisions:
- issue: 'Naturaleza de la entrega: envío de bienes, no acto cultual'
  english_pob_reading: Then he sent to his father Isaac from all his possessions clothing and food, meat.
  chosen_spanish_reading: Y envió a su padre Isaac, de todas sus posesiones, ropa y provisiones de carne.
  alternative_spanish_readings:
  - Y le envió a su padre Isaac...
  - Y mandó a su padre Isaac...
  rationale: El texto presenta un acto familiar de envío de bienes; no hay base aquí para una lectura sacrificial o cultual. La traducción evita introducir lenguaje religioso no sustentado por el ge'ez ni por la revisión inglesa.
  doctrine_reference: Principio de suficiencia textual y no sobre-interpretación
translation_notes:
  revision_awareness: 'La revisión posterior corrigió un error importante del borrador inglés: la frase inicial no significa ‘then he brought’, sino ‘at the time of autumn’; además, el verbo es ‘he sent’, y la expresión final corresponde a ‘food, meat’, no a ‘firstfruits’. La versión española sigue esa revisión y evita la lectura de primicias.'
  spanish_consistency_notes:
  - Se evita ‘SEÑOR’ porque no hay aquí un término divino en el segmento.
  - Se usa ‘Isaac’ sin expansión adicional para mantener la economía del original.
  - ‘Provisiones de carne’ mantiene la ambigüedad útil del ge'ez entre alimento y carne, sin convertirlo en ‘primicias’.
