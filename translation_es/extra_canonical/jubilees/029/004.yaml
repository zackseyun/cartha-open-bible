base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/029/004.yaml
  text: And Jacob blessed the God of Isaac his father, and the God of Abraham, the father of his father; and he arose and set his wives and his children on animals, and took all his possessions, and crossed the River and arrived.
  footnotes:
  - marker: a
    text: Or 'took his wives and his children and all his possessions'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:23Z'
    unchanged: false
    changes_summary: Removed the redundant second subject pronoun before 'crossed' for smoother formal English, and supplied a closing period since the source ends with 'and arrived' without an expressed destination.
translation:
  language: es
  text: Y Jacob bendijo al Dios de Isaac, su padre, y al Dios de Abraham, padre de su padre; y se levantó y puso a sus esposas y a sus hijos sobre animales, y tomó todas sus posesiones, y cruzó el Río[a] y llegó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cruzó el Río» puede entenderse como el Éufrates o como el Jordán según la tradición textual y el contexto narrativo.'
    reason: source_note
lexical_decisions:
- source_word: ያዕቆብ / Jacob
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: nombre propio
  rationale: Se conserva la forma bíblica habitual del nombre en español, que es clara y reconocible para la audiencia.
- source_word: አምላከ / the God of
  english_pob_choice: the God of
  chosen_spanish: el Dios de
  alternatives_spanish:
  - Dios de
  lexicon: sintaxis relacional
  rationale: La construcción posesiva se vierte de forma natural en español manteniendo el genitivo relacional del original.
- source_word: ወተንሥአ፡ / and he arose
  english_pob_choice: and he arose
  chosen_spanish: y se levantó
  alternatives_spanish:
  - y se alzó
  - y se puso en pie
  lexicon: 动作 verbal
  rationale: ‘Se levantó’ comunica de manera natural el gesto de ponerse en marcha sin añadir interpretación excesiva.
- source_word: ጸዐነ / to set upon, load on an animal
  english_pob_choice: set his wives and his children on animals
  chosen_spanish: puso a sus esposas y a sus hijos sobre animales
  alternatives_spanish:
  - cargó a sus esposas y a sus hijos sobre animales
  - montó a sus esposas y a sus hijos en animales
  lexicon: verbo de traslado
  rationale: El texto ge’ez distingue este verbo del siguiente ‘tomó’; en español ‘puso sobre animales’ conserva la acción de cargar o colocar sobre monturas sin exagerar el modo exacto.
- source_word: ነሥአ / to take
  english_pob_choice: took all his possessions
  chosen_spanish: tomó todas sus posesiones
  alternatives_spanish:
  - llevó todas sus posesiones
  - recogió todas sus posesiones
  lexicon: verbo de posesión/transporte
  rationale: ‘Tomó’ reproduce bien el valor de recoger o llevar consigo sus bienes, en paralelo con el flujo narrativo.
- source_word: ፈለገ / River
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el río
  - el Río
  lexicon: sustantivo geográfico
  rationale: Se capitaliza ‘Río’ para reflejar el uso casi propio del referente en la tradición bíblica, manteniendo el artículo presente en el original.
theological_decisions:
- issue: Referencia al Dios de los padres patriarcales
  english_pob_reading: the God of Isaac his father, and the God of Abraham, the father of his father
  chosen_spanish_reading: el Dios de Isaac, su padre, y el Dios de Abraham, padre de su padre
  alternative_spanish_readings:
  - el Dios de Isaac, su padre, y el Dios de Abraham, el padre de su padre
  rationale: Se conserva la doble referencia patriarcal sin resolverla en una fórmula más litúrgica; la repetición subraya la continuidad del pacto familiar del relato.
  doctrine_reference: Génesis 28; Génesis 31:53; continuidad del Dios del pacto con los patriarcas
- issue: Destino implícito tras 'and arrived'
  english_pob_reading: crossed the River and arrived
  chosen_spanish_reading: cruzó el Río y llegó
  alternative_spanish_readings:
  - cruzó el Río y arribó
  - cruzó el Río y llegó allí
  rationale: Se mantiene la final abierta del original, que concluye simplemente con ‘llegó’ sin explicitar el destino.
  doctrine_reference: Transmisión narrativa literal; respeto al cierre incompleto del verso en el testimonio fuente
translation_notes:
  revision_awareness: 'La traducción refleja la corrección de la auditoría inglesa que separa dos acciones distintas: primero se colocan las esposas y los hijos sobre animales, y luego se toman todas las posesiones. También conserva el final breve del original con «y llegó», sin añadir un destino no expresado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto solo cuando el texto lo exige; aquí el verso habla de «el Dios de» y no contiene el Tetragrámaton.
  - Se usa «esposas» en plural, siguiendo el possessivo plural del texto fuente.
  - «Río» se capitaliza para seguir el uso bíblico tradicional del referente geográfico singular.
