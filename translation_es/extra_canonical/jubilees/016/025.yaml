translation:
  language: es
  text: Y guardó esta fiesta por siete días, regocijándose con todo su corazón y con toda su alma, él y todos los que estaban en su casa; y no había con él ningún extranjero, ni nadie incircunciso.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐሩየ
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - celebró
  - observó
  lexicon: keep/observe a feast
  rationale: El contexto es la observancia de una fiesta durante siete días; «guardó» comunica la acción cultual sin volverla demasiado interpretativa. «Celebró» es posible, pero en español puede perder la idea de observancia normativa.
- source_word: በዓለ
  english_pob_choice: feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - fiesta solemne
  - festividad
  lexicon: feast
  rationale: «Fiesta» es la forma más natural y fiel en español para una celebración religiosa; «fiesta solemne» añade una nota no exigida por el texto.
- source_word: ይትፌሣሕ
  english_pob_choice: rejoicing
  chosen_spanish: regocijándose
  alternatives_spanish:
  - alegrándose
  - gozándose
  lexicon: rejoice
  rationale: «Regocijándose» mantiene el matiz de gozo intenso y formal del original; «alegrándose» es más simple, pero menos solemne.
- source_word: በኵሉ፡ ልቡ
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  lexicon: heart
  rationale: La expresión idiomática española conserva bien el sentido pleno del hebraísmo sin sobreexplicar.
- source_word: በኵሉ፡ ነፍሱ
  english_pob_choice: with all his soul
  chosen_spanish: con toda su alma
  alternatives_spanish:
  - de toda su alma
  lexicon: soul
  rationale: «Alma» reproduce el paralelismo del texto y mantiene el registro bíblico adecuado en español.
- source_word: ወኵሎሙ እለ ውስተ ቤቱ
  english_pob_choice: all who were in his house
  chosen_spanish: todos los que estaban en su casa
  alternatives_spanish:
  - todos los de su casa
  - todos los que estaban en su hogar
  lexicon: household/house
  rationale: «Los que estaban en su casa» conserva el alcance personal e inclusivo del grupo mencionado.
- source_word: አልቦ
  english_pob_choice: there was no
  chosen_spanish: no había
  alternatives_spanish:
  - no estaba
  - no se encontraba
  lexicon: there was none
  rationale: La negación existencial fluye de manera natural en español con «no había».
- source_word: ዘውገነ
  english_pob_choice: foreigner
  chosen_spanish: ningún extranjero
  alternatives_spanish:
  - ningún forastero
  - ningún no israelita
  lexicon: foreigner/stranger
  rationale: «Extranjero» refleja bien la exclusión de alguien ajeno al pacto/comunidad; «forastero» es menos específico, y «no israelita» interpretaría demasiado.
- source_word: ወንጹሐ
  english_pob_choice: uncircumcised
  chosen_spanish: incircunciso
  alternatives_spanish:
  - no circuncidado
  lexicon: uncircumcised
  rationale: «Incircunciso» es el equivalente bíblico estándar y conserva la referencia ritual del texto.
theological_decisions:
- issue: Exclusión de extranjeros e incircuncisos de la comida/festividad
  english_pob_reading: and there was no foreigner with him, nor anyone uncircumcised
  chosen_spanish_reading: y no había con él ningún extranjero, ni nadie incircunciso
  alternative_spanish_readings:
  - y no estaba con él ningún extranjero, ni nadie sin circuncidar
  rationale: Se mantiene la exclusión tal como aparece en la tradición textual base, sin suavizarla. «Sin circuncidar» sería comprensible, pero debilita el término ritual técnico.
  doctrine_reference: Jubilees 16:25; covenant boundary language
translation_notes:
  revision_awareness: Se mantuvo el sentido del texto Geez y el acuerdo de alta concordancia con la traducción inglesa POB; no hubo revisiones aplicadas ni necesidad de notas textuales, dado que el verso es breve y directo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención del proyecto solo cuando aparezca explícitamente el Tetragrámaton o una referencia directa; este versículo no lo contiene.
  - Se conservó un registro bíblico sobrio sin añadir artículos o glosas interpretativas.
  - No se introdujeron notas al pie porque no hay variantes significativas en el texto fuente ni ambigüedades que requieran anclaje textual.
