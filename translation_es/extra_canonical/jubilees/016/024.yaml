translation:
  language: es
  text: 'Y por la mañana y por la tarde quemaba incienso aromático: incienso, gálbano, estacte, nardo, mirra, casia y costus[a], siete de ellos; los ofrecía todos mezclados, en pureza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El orden de los dos últimos aromáticos sigue la corrección del audit trail: casia, y costus.'
    reason: textual_variant
lexical_decisions:
- source_word: የዐጥን
  english_pob_choice: he burned fragrant incense
  chosen_spanish: quemaba incienso aromático
  alternatives_spanish:
  - ofrecía incienso aromático
  - quemaba fragancias aromáticas
  lexicon: burn/incense
  rationale: El geʽez describe la acción de quemar incienso; 'incienso aromático' conserva el carácter cultual y el matiz de fragancia sin volverlo genérico. 'Quemaba' sigue la imagen concreta del texto fuente.
- source_word: ሰብዐቲሆሙ
  english_pob_choice: seven of these
  chosen_spanish: siete de ellos
  alternatives_spanish:
  - siete de estas sustancias
  - siete de estas especies
  lexicon: seven of these
  rationale: El referente son los siete ingredientes mencionados; 'de ellos' mantiene la contabilidad directa y natural en español sin añadir una interpretación ajena.
- source_word: ዘንተ ኵሉ ያቀርብ
  english_pob_choice: he offered all of them mixed together, pure
  chosen_spanish: los ofrecía todos mezclados, en pureza
  alternatives_spanish:
  - los ofrecía todos mezclados, puro
  - los presentaba todos juntos, puros
  lexicon: offer/mixed/pure
  rationale: '''Ofrecía'' conserva el valor cultual de presentar una ofrenda; ''mezclados'' refleja la combinación de los ingredientes; ''en pureza'' traduce la idea de pureza ritual sin forzar el adjetivo a un solo elemento.'
- source_word: frankincense, galbanum, stacte, nard, myrrh, cassia, and costus
  english_pob_choice: frankincense, galbanum, stacte, nard, myrrh, cassia, and costus
  chosen_spanish: incienso, gálbano, estacte, nardo, mirra, casia y costus
  alternatives_spanish:
  - olíbano, gálbano, estacte, nardo, mirra, casia y costus
  - incienso, gálbano, estacte, nardo, mirra, cassia y costus
  lexicon: list of aromatics
  rationale: Se conserva la lista de aromáticos con equivalentes estándar en español cuando existen. 'Casia' sigue la corrección de orden establecida en el audit trail respecto de 'costus'.
theological_decisions:
- issue: Ofrecimiento ritual de incienso puro al amanecer y al atardecer
  english_pob_reading: And morning and evening he burned fragrant incense ... he offered all of them mixed together, pure.
  chosen_spanish_reading: Y por la mañana y por la tarde quemaba incienso aromático ... los ofrecía todos mezclados, en pureza.
  alternative_spanish_readings:
  - Y por la mañana y por la tarde quemaba incienso fragante ... los ofrecía todos mezclados, puro.
  - Y mañana y tarde quemaba incienso aromático ...
  rationale: El texto presenta una práctica cultual repetida y ritual. 'En pureza' comunica la cualidad ritual sin reducirla a un adjetivo físico del material ni alterar el sentido de ofrenda aceptable.
  doctrine_reference: pureza ritual / ofrenda cultual
translation_notes:
  revision_awareness: El audit trail inglés fue revisado para precisar 'fragrant incense' y, además, una corrección posterior ajustó el orden de los dos últimos aromáticos a 'cassia, and costus'. La redacción española refleja esa secuencia y evita el cambio a una formulación más general que debilitara la precisión del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - '''incienso aromático'' conserva el registro cultual y evita ''fragancias'' demasiado genérico.'
  - La lista de aromáticos se mantiene en mayúsculas/minúsculas normales de español y con separación clara por comas.
  - '''en pureza'' se eligió para evitar un ''puro'' ambiguo que podría leerse como referido solo a un ingrediente.'
