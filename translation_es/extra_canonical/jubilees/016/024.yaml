review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del geʽez y del POB inglés: acción ritual de quemar incienso por la mañana y por la tarde, lista de siete aromáticos, y ofrecimiento mezclado con cualidad de pureza. Sin embargo, hay dos puntos mejorables: (1) la nota al pie no preserva una alternativa semántica real, sino que comenta el audit trail; eso no corresponde al uso de notas del proyecto; (2) la frase final ''en pureza'' suena poco natural en español y no expresa con claridad el valor adverbial/adjetival de ''pure''.'
  spanish_quality_summary: 'El español es en general claro y digno, pero ''en pureza'' resulta forzado. ''Puros'' o ''puros, mezclados entre sí'' sería más natural, aunque aquí conviene mantener el orden básico del POB: ''los ofrecía todos mezclados, puros''. También conviene eliminar la nota, porque el texto principal ya incorpora el orden corregido y la nota actual no ayuda al lector.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Incienso aromático', 'gálbano', 'estacte', 'nardo', 'mirra', 'casia' y 'costus' son aceptables. 'Costus' puede mantenerse como préstamo botánico. No hay términos teológicos sensibles del glosario principal involucrados.
  issues:
  - severity: medium
    issue: La nota al pie actual comenta el historial editorial en vez de aportar una alternativa textual o léxica útil al lector.
    rationale: Las notas deben preservar alternativas significativas o resolver ambigüedades, no explicar que se siguió una corrección del audit trail. Aquí no hace falta nota porque el texto principal ya refleja el orden correcto.
  - severity: medium
    issue: La expresión 'en pureza' es poco idiomática en español.
    rationale: Aunque intenta conservar la pureza ritual, en español suena artificial. 'Puros' comunica mejor la cualidad del incienso/ofrenda sin añadir interpretación extraña.
  revised_spanish_text: 'Y por la mañana y por la tarde quemaba incienso aromático: incienso, gálbano, estacte, nardo, mirra, casia y costus, siete de ellos; los ofrecía todos mezclados, puros.'
  revision_rationale: Se elimina la nota porque no corresponde a una variante útil para el lector, sino a una explicación editorial interna. Se ajusta 'en pureza' a 'puros' para lograr un español natural y fiel al sentido de pureza del original/POB inglés.
