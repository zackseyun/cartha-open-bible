revisions:
- from: Y edificó allí un altar a Yahvé, que lo libró y lo hizo alegrarse en la tierra de su peregrinación; y celebró una fiesta de gozo en este mes por siete días, cerca del altar que había edificado en el Pozo del Juramento[a].
  to: Y edificó allí un altar a Yahvé, que lo libró y lo hizo alegrarse en la tierra donde residía como extranjero; y celebró una fiesta de gozo en este mes por siete días, cerca del altar que había edificado en el Pozo del Juramento[a].
