  text: And he built there an altar to Yahweh, who delivered him and made him rejoice in the land of his sojourning, and he made a festival of joy in this month for seven days, near the altar which he had built at the Well of the Oath.
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:52Z'
    unchanged: false
    changes_summary: Changed 'the Lord' to 'Yahweh' for the divine name, and tightened the wording to better reflect the source's sequence while preserving the established renderings 'his sojourning' and 'at the Well of the Oath'.
translation:
  language: es
  text: Y edificó allí un altar a Yahvé, que lo libró y lo hizo alegrarse en la tierra donde residía como extranjero; y celebró una fiesta de gozo en este mes por siete días, cerca del altar que había edificado en el Pozo del Juramento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «Pozo del Juramento»; se traduce el sentido etimológico del topónimo en vez de dejar solo la forma geográfica tradicional, Beer-seba.
    reason: lexical_alternative
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - el Señor
  lexicon: project default / divine-name policy
  rationale: Se conserva el nombre divino con el equivalente español establecido por el proyecto. No se sustituye por una forma de máscara reverencial, porque el texto fuente y la auditoría inglesa distinguen el nombre divino.
- source_word: ፈላስነቱ
  english_pob_choice: his sojourning
  chosen_spanish: su peregrinación
  alternatives_spanish:
  - su sojourno
  - su estancia como extranjero
  - su exilio
  lexicon: Leslau
  rationale: La idea es la de residencia temporal o condición de forastero; en español, 'peregrinación' comunica mejor ese matiz sin cargarlo con la fuerza de 'exilio', que sería excesiva aquí.
- source_word: በዐዘቅተ ፡ መሐላ
  english_pob_choice: at the Well of the Oath
  chosen_spanish: en el Pozo del Juramento
  alternatives_spanish:
  - en Beer-seba
  - junto al Pozo del Juramento
  lexicon: Leslau
  rationale: Se traduce el valor literal de la expresión ge'ez, siguiendo la decisión auditada del inglés POB, que conserva el sentido etimológico del topónimo. En español, 'Pozo del Juramento' refleja esa transparencia.
- source_word: ወገብረ ፡ በዓለ ፡ ትፍሥሕት
  english_pob_choice: he made a festival of joy
  chosen_spanish: celebró una fiesta de gozo
  alternatives_spanish:
  - hizo una fiesta de alegría
  - instituyó una fiesta de gozo
  lexicon: general contextual equivalence
  rationale: La frase ge'ez expresa la celebración de una festividad, no solo un sentimiento interior. 'Celebró una fiesta de gozo' mantiene el carácter cultual y la alegría indicada por el sustantivo.
theological_decisions:
- issue: Nombre divino en el relato patriarcal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: Se mantiene la transliteración reverente del nombre propio divino, coherente con la política del proyecto y con la auditoría inglesa. No se enmascara el nombre con un título.
  doctrine_reference: Nombre divino / tetragrámaton
- issue: Sentido de 'his sojourning'
  english_pob_reading: temporary resident-alien status in the land
  chosen_spanish_reading: peregrinación
  alternative_spanish_readings:
  - exilio
  - estancia
  rationale: '''Peregrinación'' preserva el carácter transitorio y extranjero sin sugerir necesariamente destierro ni una experiencia de persecución que el contexto no exige.'
  doctrine_reference: Patriarchal sojourning / residencia forastera
translation_notes:
  revision_awareness: 'La versión española incorpora la parte final del versículo que había quedado omitida en un borrador anterior: la celebración de una fiesta de gozo por siete días junto al altar en el Pozo del Juramento. También refleja el ajuste auditado del nombre divino a Yahvé y conserva la secuencia de acciones del texto ge''ez.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se evitó 'Cristo' u otras sustituciones teológicas ajenas al pasaje.
  - '''Pozo del Juramento'' sigue la decisión etimológica del POB inglés y no la forma toponímica tradicional.'
  - '''peregrinación'' se eligió para reflejar residencia temporal sin sobrerinterpretar como ''exilio''.'
