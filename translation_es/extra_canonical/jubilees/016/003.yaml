  yaml_path: translation/extra_canonical/jubilees/016/003.yaml
  text: And she was afraid and denied that she had laughed because of the word. And we told her the name of her son, as it had been ordained.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:08Z'
