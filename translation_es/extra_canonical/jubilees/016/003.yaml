revisions:
- from: Y ella tuvo miedo y negó que se hubiera reído por la palabra. Y le dijimos el nombre de su hijo, como había sido ordenado.
  to: Y ella tuvo miedo y negó haberse reído a causa de la palabra. Y le dijimos el nombre de su hijo, como había sido ordenado.
  rationale: 'Se hicieron dos ajustes menores de estilo-fidelidad: ''negó haberse reído'' mejora la fluidez y precisión del español, y ''a causa de la palabra'' conserva la literalidad básica de la fuente con mejor naturalidad que ''por la palabra''. No se requieren notas al pie.'
