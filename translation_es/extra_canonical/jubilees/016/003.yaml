    changes_summary: Removed the final colon for proper English punctuation. The wording is otherwise accurate and natural.
translation:
  language: es
  text: Y ella tuvo miedo y negó haberse reído a causa de la palabra. Y le dijimos el nombre de su hijo, como había sido ordenado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በእንተ፡ ቃል
  english_pob_choice: because of the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - a causa de la palabra
  - por lo dicho
  - por esa palabra
  lexicon: palabra
  rationale: El ge'ez ቃል apunta a una palabra, dicho o expresión. La POB inglesa optó por mantener la referencia directa y algo ambigua con 'the word'; en español, 'por la palabra' conserva esa literalidad y deja abierta la idea de la palabra pronunciada previamente sin explicarla de más.
- source_word: ወፈርት፡ ወሐሰወት፡
  english_pob_choice: she was afraid and denied
  chosen_spanish: tuvo miedo y negó
  alternatives_spanish:
  - se atemorizó y negó
  - tuvo temor y negó
  - se asustó y negó
  lexicon: temor / negar
  rationale: El verbo de miedo se vierte con una expresión natural en español ('tuvo miedo') sin perder el sentido de temor. 'Negó' mantiene el acto de desmentir lo que había hecho, como en la versión inglesa auditada.
- source_word: በከመ፡ ሥሩዕ፡
  english_pob_choice: as it had been ordained
  chosen_spanish: como había sido ordenado
  alternatives_spanish:
  - como había sido dispuesto
  - según había sido ordenado
  - tal como había sido decretado
  lexicon: ordenar / disponer
  rationale: El ge'ez expresa que el nombre fue establecido conforme a una orden o disposición previa. 'Ordenado' reproduce la forma de la POB inglesa y conserva el matiz de una determinación anterior sin introducir un término más interpretativo como 'decretado'.
- source_word: ስሞ፡ ለወልዳ፡
  english_pob_choice: the name of her son
  chosen_spanish: el nombre de su hijo
  alternatives_spanish:
  - el nombre de su hijo varón
  - el nombre de su hijo
  lexicon: hijo
  rationale: '''Su hijo'' es la forma más natural y fiel en español para el posesivo del relato. No se añade ''varón'' porque el contexto ya identifica al hijo y el original no requiere esa aclaración.'
theological_decisions:
- issue: La ordenación previa del nombre del hijo
  english_pob_reading: as it had been ordained
  chosen_spanish_reading: como había sido ordenado
  alternative_spanish_readings:
  - como había sido dispuesto
  - según había sido ordenado
  - tal como había sido decretado
  rationale: La formulación conserva la idea de una asignación previa del nombre, sin precisar en exceso si la fuente enfatiza decreto, disposición u orden. Esto mantiene la tensión textual y la evita una teología más fuerte de la que el verso por sí mismo exige.
  doctrine_reference: Providencia / prescripción narrativa
- issue: La referencia a la palabra que motivó la negación
  english_pob_reading: because of the word
  chosen_spanish_reading: por la palabra
  alternative_spanish_readings:
  - a causa de la palabra
  - por lo dicho
  rationale: El texto conserva una referencia breve y algo elíptica al dicho previo. Se evita convertirlo en una explicación más amplia que identifique explícitamente el contenido, porque la fuente solo menciona 'la palabra'.
  doctrine_reference: Fidelidad al enunciado narrativo
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo retiró un signo de dos puntos final por puntuación; no alteró el contenido. Por eso la base semántica de la POB inglesa se toma como estable para esta frase.
  spanish_consistency_notes:
  - Se mantiene 'Y ella...' para reflejar la continuidad narrativa del original.
  - Se conserva la forma impersonal/pasiva 'había sido ordenado' como equivalente natural de la pasiva inglesa auditada.
  - No se introduce terminología eclesiástica ajena al relato; el registro es narrativo y sobrio.
