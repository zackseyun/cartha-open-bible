base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/028.yaml
  text: And both of them had very great joy. And he built there an altar to the Lord, who had blessed him and who had made him rejoice in the land of his sojourning. And he made a feast of joy in this month for seven days.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:12Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez: included both subjects, their great joy, the building of an altar there to the Lord, the Lord''s blessing and causing joy, the land of his sojourning, and the feast of joy in this month for seven days.'
translation:
  language: es
  text: Y ambos tuvieron un gozo[a] muy grande. Y edificó allí un altar a Yahvé, que lo había bendecido y que lo había hecho alegrarse en la tierra de su peregrinación. E hizo una fiesta de gozo en este mes por siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gozo» mantiene un tono bíblico y puede abarcar una alegría intensa; aquí traduce el sustantivo del original sin reducirlo a una emoción pasajera.
    reason: lexical_alternative
lexical_decisions:
- source_word: ክልኤሆሙ
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: N/A
  rationale: El dual/plural explícito de la frase se conserva con «ambos», que es natural en español y mantiene la referencia a dos sujetos sin añadir énfasis innecesario.
- source_word: ፍሥሓ፡ ዐቢየ፡ ጥቀ
  english_pob_choice: very great joy
  chosen_spanish: un gozo muy grande
  alternatives_spanish:
  - una gran alegría
  - un gran gozo
  lexicon: N/A
  rationale: «Gozo» conserva un matiz más solemne y bíblico que «alegría», mientras que «muy grande» refleja la intensificación del original y del inglés POB.
- source_word: ምሥዋዐ፡
  english_pob_choice: an altar
  chosen_spanish: un altar
  alternatives_spanish:
  - un altar de sacrificio
  lexicon: N/A
  rationale: El sustantivo corresponde directamente a «altar»; no se amplía a «de sacrificio» porque el contexto ya lo identifica como lugar cultual sin necesidad de explicitarlo.
- source_word: እግዚአብሔር፡
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: N/A
  rationale: 'Se sigue el valor del Nombre divino según la pauta del proyecto: «Yahvé» en lugar de la máscara «el Señor», manteniendo trazabilidad teológica y lexical.'
- source_word: ዘባረኮ፡
  english_pob_choice: who had blessed him
  chosen_spanish: que lo había bendecido
  alternatives_spanish:
  - que lo había bendecido a él
  - que lo había favorecido
  lexicon: N/A
  rationale: «Bendecido» es la equivalencia directa y transparente para el acto divino de bendición; el pronombre enclítico «lo» fluye con naturalidad en español.
- source_word: ወለዘ *ያስተፈሥሖ፡
  english_pob_choice: who had made him rejoice
  chosen_spanish: y que lo había hecho alegrarse
  alternatives_spanish:
  - y que le había dado gozo
  - y que lo había hecho regocijarse
  lexicon: N/A
  rationale: 'Se mantiene la causalidad del verbo: no sólo «se alegró», sino que fue hecho alegrarse. «Alegrarse» evita sobreinterpretar el matiz con una fórmula más litúrgica.'
- source_word: በምድረ፡ ፍልሰቱ፡
  english_pob_choice: in the land of his sojourning
  chosen_spanish: en la tierra de su peregrinación
  alternatives_spanish:
  - en la tierra de su estancia
  - en la tierra donde habitó como forastero
  lexicon: N/A
  rationale: «Peregrinación» conserva el sentido de residencia provisional del original y del inglés POB («sojourning»), con resonancia bíblica comprensible en español.
- source_word: ገብረ፡ በዓለ፡ ፍሥሓ፡
  english_pob_choice: he made a feast of joy
  chosen_spanish: hizo una fiesta de gozo
  alternatives_spanish:
  - celebró una fiesta de alegría
  - hizo un banquete de gozo
  lexicon: N/A
  rationale: «Fiesta de gozo» reproduce la construcción del POB sin introducir elementos de banquete no presentes necesariamente en el ge'ez.
- source_word: በዝ፡ ወርኅ፡ ሰቡዐ፡ መዋዕለ፡
  english_pob_choice: in this month for seven days
  chosen_spanish: en este mes por siete días
  alternatives_spanish:
  - durante siete días en este mes
  - por siete días en este mes
  lexicon: N/A
  rationale: La secuencia temporal se conserva de forma directa y clara, sin añadir una precisión calendárica que el texto no desarrolla.
theological_decisions:
- issue: Nombre divino frente a título traducido
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: La pauta del proyecto exige representar el Nombre divino con «Yahvé» cuando el original apunta a እግዚአብሔር. Esto preserva la transparencia respecto del hebreo subyacente y evita la sustitución litúrgica por un título.
  doctrine_reference: Tetragrámaton / Nombre divino
- issue: Causalidad del gozo concedido
  english_pob_reading: who had made him rejoice
  chosen_spanish_reading: que lo había hecho alegrarse
  alternative_spanish_readings:
  - que le había dado gozo
  - que lo había regocijado
  rationale: La forma elegida conserva la idea de que el gozo es causado por Dios/Yahvé, no mero estado emocional espontáneo. En español mantiene el vínculo entre bendición divina y respuesta humana.
  doctrine_reference: Providencia y bendición divina
translation_notes:
  revision_awareness: 'El pasaje refleja la revisión final que sustituyó un borrador ajeno al texto por una traducción alineada con el ge''ez: incluye a ambos sujetos, su gran gozo, el altar erigido allí, la bendición y el gozo causados por Yahvé, la tierra de su peregrinación y la fiesta de gozo por siete días en este mes.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para el nombre divino.
  - Se usa «gozo» de manera consistente para el sustantivo clave, con nota para su matiz semántico.
  - Se conserva un estilo bíblico claro y moderno, evitando arcaísmos innecesarios.
