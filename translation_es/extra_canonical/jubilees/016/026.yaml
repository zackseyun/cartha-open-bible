  glossary_alignment: No hay conflicto con la terminología mayor del proyecto. «Creador», «justicia» y «descendencia santa» son aceptables en contexto. La única desalineación material es mantener «todo» pese a que la auditoría POB eliminó «all things» como añadido no sustentado por el geʿez en esta cláusula.
