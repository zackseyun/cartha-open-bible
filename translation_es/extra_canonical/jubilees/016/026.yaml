base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/026.yaml
  text: And he blessed his Creator, who had created him in his generation, because He had created him according to His good pleasure; for he knew and perceived that from him there would be a plant of righteousness for the eternal generations, and from him a holy seed, so that it might be like Him who made all things.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:12Z'
    unchanged: false
    changes_summary: 'Made one minor stylistic adjustment: changed ''so that it might become'' to ''that it might become'' for a slightly more formal and direct rendering. The rest of the draft is accurate and complete.'
translation:
  language: es
  text: Y bendijo a su Creador, que lo había creado en su generación, porque por su buena voluntad lo había creado; pues sabía y percibía que de él habría una planta de justicia para las generaciones eternas, y de él una descendencia santa, para que fuera como el que lo había hecho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወባረኮ፡
  english_pob_choice: And he blessed
  chosen_spanish: Y bendijo
  alternatives_spanish:
  - Y alabó
  - Y bendijo a
  lexicon: Leslau
  rationale: El verbo expresa bendición dirigida a Dios; en español, «bendijo» conserva el acto de alabanza agradecida sin añadir una interpretación más intensa que el texto no exige.
- source_word: ፈጣሪሁ፡
  english_pob_choice: his Creator
  chosen_spanish: su Creador
  alternatives_spanish:
  - su Hacedor
  - su Creador
  lexicon: Leslau
  rationale: «Creador» corresponde de manera directa y natural al sustantivo relacional del geʿez y mantiene el registro teológico del texto.
- source_word: ዘፈጠሮ፡
  english_pob_choice: who had created him
  chosen_spanish: que lo había creado
  alternatives_spanish:
  - que lo creó
  - que lo había formado
  lexicon: Leslau
  rationale: El perfecto anterior en español comunica bien la anterioridad del acto creador respecto del momento de la bendición.
- source_word: በትዝምዱ፡
  english_pob_choice: in his generation
  chosen_spanish: en su generación
  alternatives_spanish:
  - en su tiempo
  - en su época
  lexicon: Leslau
  rationale: «Generación» reproduce el valor genealógico y temporal del término, importante en el contexto de descendencia y linaje.
- source_word: በሥምረቱ፡
  english_pob_choice: according to His good pleasure
  chosen_spanish: por su buena voluntad
  alternatives_spanish:
  - según su buena voluntad
  - de acuerdo con su beneplácito
  - según su beneplácito
  lexicon: Leslau
  rationale: La frase geʿez expresa la voluntad complacida y soberana de Dios; «por su buena voluntad» conserva esa fuerza en un español claro y reverente.
- source_word: ወጠየቀ፡
  english_pob_choice: and perceived
  chosen_spanish: y percibía
  alternatives_spanish:
  - y entendía
  - y comprendía
  lexicon: Leslau
  rationale: La POB distingue «knew» y «perceived»; «percibía» mantiene esa distinción sin repetir exactamente «sabía».
- source_word: ከመ፡ እምኔሁ፡ ይከውን፡ ተከለ፡ ጽድቅ፡
  english_pob_choice: that from him there would be a plant of righteousness
  chosen_spanish: que de él habría una planta de justicia
  alternatives_spanish:
  - que de él surgiría una planta de justicia
  - que de él habría un retoño de justicia
  - que de él brotaría una planta de justicia
  lexicon: Leslau
  rationale: «Planta de justicia» sigue de cerca la imagen botánica heredada del texto y de la POB, evitando suavizarla a una metáfora más interpretativa.
- source_word: ለትውልድ፡ ዘለዓለም፡
  english_pob_choice: for the eternal generations
  chosen_spanish: para las generaciones eternas
  alternatives_spanish:
  - para las generaciones perpetuas
  - para las generaciones de eternidad
  lexicon: Leslau
  rationale: La inversión del adjetivo en español suena natural sin alterar el sentido durativo e ilimitado del original.
- source_word: ወእምኔሁ፡ ዘርእ፡ ቅዱስ፡
  english_pob_choice: and from him a holy seed
  chosen_spanish: y de él una descendencia santa
  alternatives_spanish:
  - y de él una simiente santa
  - y de él una semilla santa
  lexicon: Leslau
  rationale: «Descendencia» transmite mejor en español el valor genealógico de «seed» en este contexto que «simiente» o «semilla», aunque esas opciones preservan más literalmente la imagen agrícola.
- source_word: ይኩን፡ ከማሁ፡ ለዘገብረ፡ ኵሎ።
  english_pob_choice: that it might become like him who had made it
  chosen_spanish: para que fuera como el que había hecho todo
  alternatives_spanish:
  - para que fuera como el que lo había hecho
  - para que llegara a ser como el que lo había hecho
  lexicon: Leslau
  rationale: 'La revisión textual indica que el geʿez no contiene «todo» en la cláusula final, por lo que se evita esa expansión y se traduce con un referente singular implícito: «el que había hecho», entendiendo el objeto por el contexto de la cláusula.'
theological_decisions:
- issue: Referencia del Creador y la formulación final
  english_pob_reading: who had made it
  chosen_spanish_reading: el que había hecho
  alternative_spanish_readings:
  - el que lo había hecho
  - el que había hecho todas las cosas
  rationale: La revisión auditada elimina «all things» y deja un referente implícito; en español conviene no forzar un objeto inexistente en el texto, conservando la ambigüedad controlada del original.
  doctrine_reference: Textual criticism / source fidelity
- issue: Voluntad divina en la creación
  english_pob_reading: according to His good pleasure
  chosen_spanish_reading: por su buena voluntad
  alternative_spanish_readings:
  - según su buena voluntad
  - por su beneplácito
  - según su beneplácito
  rationale: La expresión evita banalizar el matiz soberano de la decisión creadora divina y sigue la lectura teológica de la POB sin introducir terminología eclesiástica innecesaria.
  doctrine_reference: Providence / divine sovereignty
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail: conserva «plant of righteousness» y «holy seed», evita la expansión no sustentada «all things» en la cláusula final, y refleja la corrección de estilo que dejó «that it might become like him who had made it».'
  spanish_consistency_notes:
  - Se mantuvo «Dios» implícito en «su buena voluntad» y «su Creador» sin capitalizar innecesariamente pronombres posesivos en español.
  - Se eligió «descendencia santa» en lugar de «simiente santa» para mayor inteligibilidad, pero se conservó la imagen genealógica del original.
  - No se añadieron notas al pie porque el pasaje, tras la revisión auditada, no presenta variantes textuales que requieran marcarse en el cuerpo del texto.
