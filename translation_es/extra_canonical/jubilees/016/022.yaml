  yaml_path: translation/extra_canonical/jubilees/016/022.yaml
  text: at this feast, and he was the first to celebrate the feast of booths on the earth. And during these seven days he offered, day by day, on the altar to the Lord two oxen, two rams, seven sheep, one male goat for a sin offering,
  footnotes:
  - marker: a
    text: Or 'for this feast,'.
    reason: previous_rendering
  - marker: b
    text: Or 'he brought, day by day, on the altar'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:11Z'
    unchanged: false
    changes_summary: Changed 'was bringing, each day and every day' to the more natural 'brought, day by day'; changed 'he-goat' to 'male goat' for formal natural English. Retained the rest as accurate to the source.
translation:
  language: es
  text: en esta fiesta, y él fue el primero en celebrar la fiesta de los tabernáculos en la tierra. Y durante estos siete días ofreció, día tras día, sobre el altar a Yahvé dos bueyes, dos carneros, siete ovejas, un macho cabrío para ofrenda por el pecado,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: በዛቲ፡ በዓል፡
  english_pob_choice: at this feast
  chosen_spanish: en esta fiesta
  alternatives_spanish:
  - en esta festividad
  - durante esta fiesta
  lexicon: prep. በ + noun በዓል
  rationale: La preposición ge’ez በ admite valor locativo/temporal; en español, "en" expresa de forma natural la referencia de marco temporal sin forzar un "para" interpretativo. "Esta fiesta" mantiene la deixis inmediata del texto.
- source_word: መጻላት
  english_pob_choice: feast of booths
  chosen_spanish: fiesta de los tabernáculos
  alternatives_spanish:
  - fiesta de las tiendas
  - fiesta de las cabañas
  lexicon: ג/term. festival de las chozas/tabernáculos
  rationale: El sentido es el festival de las tiendas/booths; en español bíblico y eclesial amplio, "tabernáculos" es la forma más reconocible y fiel, sin desdibujar el referente de las chozas.
- source_word: ወውእቱ፡ መቅድመ፡ ገብረ፡
  english_pob_choice: he was the first to celebrate
  chosen_spanish: él fue el primero en celebrar
  alternatives_spanish:
  - él fue el primero en hacer
  - él fue el primero en celebrar solemnemente
  lexicon: expresión de primacía + verbo de acción ritual
  rationale: La construcción comunica precedencia y realización inaugural; "fue el primero en celebrar" reproduce bien la idea sin añadir solemnidad no explicitada.
- source_word: ወበዝ፡ ሰቡዕ፡ መዋዕል፡
  english_pob_choice: during these seven days
  chosen_spanish: durante estos siete días
  alternatives_spanish:
  - en estos siete días
  - a lo largo de estos siete días
  lexicon: intervalo temporal
  rationale: '"Durante" transmite el marco continuo del periodo. "Estos" conserva la referencia deíctica al bloque festivo ya mencionado.'
- source_word: ያቀርብ፡ ... ለእግዚአብሔር፡
  english_pob_choice: he offered ... to the Lord
  chosen_spanish: ofreció ... a Yahvé
  alternatives_spanish:
  - presentó ... a Yahvé
  - ofreció ... al Señor
  lexicon: yaqareb / presentar ofrenda
  rationale: El verbo sacrificial se rinde con "ofreció", que es natural y fiel al acto cultual. Se mantiene "Yahvé" conforme al criterio del proyecto para el nombre divino en lugar de una máscara con "Señor".
- source_word: አልህምተ፡
  english_pob_choice: two oxen
  chosen_spanish: dos bueyes
  alternatives_spanish:
  - dos toros
  - dos novillos
  lexicon: animal sacrificial bovino
  rationale: '"Bueyes" comunica de manera sobria el bovino ofrecido y evita una especificación de edad o fuerza no segura en español.'
- source_word: ክልኤተ፡
  english_pob_choice: two rams
  chosen_spanish: dos carneros
  alternatives_spanish:
  - dos machos de oveja
  - dos borregos machos
  lexicon: animal sacrificial ovino adulto
  rationale: '"Carneros" es el equivalente castellano normal para rams y conserva el matiz sacrificial adulto.'
- source_word: ወአባግዐ፡ ሰብዐተ፡
  english_pob_choice: seven sheep
  chosen_spanish: siete ovejas
  alternatives_spanish:
  - siete corderas/ovejas
  - siete corderos
  lexicon: animal ovino
  rationale: '"Ovejas" traduce el genérico del inglés y del contexto cultual sin introducir sexo o edad que el texto no especifica.'
- source_word: መሐስአ፡ ጠሊ፡ አሐደ፡
  english_pob_choice: one male goat for a sin offering
  chosen_spanish: un macho cabrío para expiación
  alternatives_spanish:
  - un macho cabrío para ofrenda por el pecado
  - un macho cabrío como sacrificio por el pecado
  lexicon: goat + sin offering
  rationale: '"Macho cabrío" reproduce la fuerza léxica de un macho de cabra. "Expiación" mantiene la categoría sacrificial sin imponer una formulación más larga; la nota ancla aclara la alternativa tradicional de "ofrenda por el pecado".'
theological_decisions:
- issue: 'Nombre divino: κύριος/יהוה en contexto sacrificial'
  english_pob_reading: to the Lord
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  - al Dios
  rationale: Aunque el inglés auditado dice "the Lord", el paquete fuente y la norma del proyecto exigen transparentar el Tetragrámaton con "Yahvé". En un contexto de ofrenda cultual, la referencia es al Dios de Israel, no a un título genérico.
  doctrine_reference: Transparencia del nombre divino; uso del Tetragrámaton en traducción
- issue: Categoría sacrificial del último animal
  english_pob_reading: for a sin offering
  chosen_spanish_reading: para expiación
  alternative_spanish_readings:
  - para ofrenda por el pecado
  - como sacrificio por el pecado
  rationale: El inglés POB conserva la función sacrificial del animal. En español, "expiación" es breve y cultualmente apto; se deja la alternativa tradicional para evitar pérdida de matiz si el lector la prefiere.
  doctrine_reference: Lenguaje sacrificial levítico y expiación
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del inglés: "at this feast" se refleja con "en esta fiesta"; "offered" se vierte con un verbo natural de sacrificio, "ofreció". También incorpora el ajuste semántico de la revisión sobre la acción cultual continua sin sobrecargar el español.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de forma consistente con el estándar del proyecto para el nombre divino.
  - '"Fiesta de los tabernáculos" mantiene la denominación tradicional inteligible y no sustituye el referente festivo.'
  - Se conserva el orden enumerativo de las ofrendas para seguir de cerca la estructura del texto fuente.
  - La nota [a] está anclada explícitamente en "expiación" para evitar marcadores huérfanos.
