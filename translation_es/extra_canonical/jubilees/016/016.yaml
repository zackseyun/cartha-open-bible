translation:
  language: es
  text: Y volvimos en el séptimo mes y encontramos a Sara encinta, y bendijimos a Yahvé, y le anunciamos todas las cosas que él había dicho acerca de él, que ciertamente las haría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: pregnant
  english_pob_choice: pregnant
  chosen_spanish: encinta
  alternatives_spanish:
  - embarazada
  - preñada
  lexicon: pregnant
  rationale: «Encinta» es natural, digna y clara en español bíblico contemporáneo; evita el matiz demasiado clínico de «embarazada» y el registro hoy poco usual de «preñada».
- source_word: Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: YHWH
  rationale: La norma del proyecto pide «Yahvé» para el nombre divino, y el contexto de bendecir y anunciar lo dicho por Dios favorece esa identificación en lugar de un máscara genérica.
- source_word: announced to him
  english_pob_choice: we announced to him
  chosen_spanish: le anunciamos
  alternatives_spanish:
  - le comunicamos
  - se lo anunciamos
  lexicon: announce
  rationale: «Anunciar» conserva la idea de comunicar solemnemente lo revelado; el dativo «le» mantiene el destinatario masculino singular del contexto, Abraham.
- source_word: all the things which he had spoken concerning him
  english_pob_choice: all the things which he had spoken concerning him
  chosen_spanish: todas las cosas que él había hablado acerca de él
  alternatives_spanish:
  - todo lo que él había hablado acerca de él
  - todo cuanto había dicho de él
  lexicon: all + speak concerning
  rationale: 'La frase sigue de cerca el contenido fuente y conserva la referencia doble: quien habla es Dios y el sujeto del anuncio es Abraham. «Acerca de él» evita introducir explicaciones no atestiguadas.'
- source_word: that he would surely do them
  english_pob_choice: that he would surely do them
  chosen_spanish: que ciertamente las haría
  alternatives_spanish:
  - que sin duda las cumpliría
  - que de cierto las haría
  lexicon: surely do
  rationale: «Ciertamente» reproduce el énfasis de certeza sin añadir interpretación; «las haría» preserva la proximidad al verbo de acción del original/audit trail.
theological_decisions:
- issue: Nombre divino en la bendición
  english_pob_reading: and we blessed the Lord
  chosen_spanish_reading: y bendijimos a Yahvé
  alternative_spanish_readings:
  - y bendijimos al Señor
  rationale: La política del proyecto prefiere no ocultar el nombre divino cuando el texto lo señala; «Yahvé» mantiene la transparencia textual y la continuidad con el resto de la traducción.
  doctrine_reference: Naming of YHWH / transparency principle
- issue: Destinatario masculino singular del anuncio
  english_pob_reading: we announced to him all the things which he had spoken concerning him
  chosen_spanish_reading: le anunciamos todas las cosas que él había hablado acerca de él
  alternative_spanish_readings:
  - le anunciamos todo lo que había hablado acerca de él
  rationale: El pasaje conserva la distinción entre el hablante divino y el destinatario Abraham. El español mantiene la ambigüedad pronominal inherente sin resolverla de forma interpretativa.
  doctrine_reference: Narrative referent clarity / Abrahamic promise
- issue: Certeza de cumplimiento
  english_pob_reading: that he would surely do them
  chosen_spanish_reading: que ciertamente las haría
  alternative_spanish_readings:
  - que sin duda las cumpliría
  rationale: La fuerza teológica del texto es la garantía de cumplimiento de lo prometido. «Ciertamente» y «haría» preservan certeza y agencia sin sobreexplicar.
  doctrine_reference: Divine faithfulness
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió un error mayor en la segunda mitad del verso: el texto debe incluir que «le anunciamos todas las cosas que él había hablado acerca de él, que ciertamente las haría», no una paráfrasis sobre «el Dios de todos los siglos» ni sobre la visita a su siervo. La presente redacción sigue esa lectura corregida y evita el desvío reportado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la terminología del proyecto para el nombre divino.
  - Se conserva «encinta» por claridad y registro bíblico adecuado.
  - No se añade nota al pie porque no hay variante textual anclada en esta versión del verso y el marcador requerido debe aparecer en el texto si existiera.
