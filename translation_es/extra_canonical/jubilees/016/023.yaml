base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/023.yaml
  text: to make atonement for sin by it, for himself and for his seed. And for a sacrifice of well-being, seven rams, seven kids, seven sheep, and seven male goats, and their grain offerings and their drink offerings. And he burned all their fat on the altar, a choice offering to the Lord for a pleasing aroma.
  footnotes:
  - marker: a
    text: Or 'seven bulls, seven rams, seven sheep, and seven male goats'.
    reason: previous_rendering
  - marker: b
    text: Or 'for sin, to make atonement for himself and for his seed.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:12Z'
    unchanged: false
    changes_summary: 'Added the opening phrase ''for sin'' to reflect ኀጢአት and revised the animal list for lexical accuracy: አብሐኩ as ''bulls'' and ደቤላት as ''male goats'' rather than ''male kids.'' Also adjusted punctuation to reflect the sentence structure more naturally.'
translation:
  language: es
  text: 'para hacer expiación por el pecado[b] mediante ello, por sí mismo y por su descendencia. Y para un sacrificio de bienestar: siete carneros[a], siete cabritos, siete ovejas y siete machos cabríos, con sus ofrendas de grano y sus libaciones. Y quemó toda la grasa de ellos sobre el altar, una ofrenda selecta a Yahvé[c] como aroma agradable.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siete toros, siete carneros, siete ovejas y siete machos cabríos». Esta lectura alternativa corresponde a la lectura previa del texto inglés del POB, corregida en la revisión del 28-04-2026 al establecer que el ge'ez አብሐኩ (abḥaku) significa 'carneros', no 'toros'.
    reason: alternative_reading
  - marker: b
    text: O «por el pecado, para hacer expiación por sí mismo y por su descendencia».
    reason: alternative_reading
  - marker: c
    text: El ge'ez ለእግዚአ (la-ʾǝgziʾa, «al Señor») es traducción del nombre divino hebreo יהוה (Yahvé) en el texto original subyacente de Jubileos. Conforme a la convención del POB, se rinde como «Yahvé» en lugar de «el Señor».
    reason: source_note
lexical_decisions:
- source_word: ኀጢአት (ḫaṭiʾat)
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - falta
  - transgresión
  lexicon: Ge'ez ḫaṭiʾat = pecado, falta, ofensa (vocabulario ge'ez estándar; cf. Dillmann, Lexicon Linguae Aethiopicae)
  rationale: '''Pecado'' es el equivalente español más directo y de uso universal en contextos culto-religiosos. Refleja fielmente la carga moral de ḫaṭiʾat, que designa la falta que requiere expiación ritual. ''Transgresión'' o ''falta'' serían secundarios y perderían claridad en el contexto sacrificial.'
- source_word: ያስተስሪ፡ ቦቱ (yastasri botu)
  english_pob_choice: make atonement by it
  chosen_spanish: hacer expiación mediante ello
  alternatives_spanish:
  - expiar por medio de ello
  - propiciar mediante ello
  lexicon: Ge'ez yastasri (causativo de s-r-y, 'expiar, reconciliar'); ቦቱ (botu) = 'mediante ello / por medio de ello'
  rationale: '''Hacer expiación'' traduce el causativo ge''ez que refleja el concepto hebreo subyacente de כִּפֶּר (kipper). El pronombre instrumental ቦቱ (''por ello'') se rinde como ''mediante ello'', señalando que el sacrificio es el instrumento de la expiación. Se evita ''propiciar'' porque el contexto enfatiza la cobertura del pecado (expiación), no el aplacamiento de la ira divina (propiciación).'
- source_word: ዘርኡ (zarʾu)
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  - linaje
  lexicon: Ge'ez zarʾ = semilla, descendencia, prole
  rationale: '''Descendencia'' es moderna y clara en español y recoge el sentido de prole/linaje sin recurrir a la imagen literal de la semilla. ''Simiente'' sería más literal pero suena arcaico. En contextos legales y de alianza como el de Jubileos, ''descendencia'' es el término español canónico.'
- source_word: መሥዋዕተ፡ መድኀኒት (maśwāʿta madḫanit)
  english_pob_choice: sacrifice of well-being
  chosen_spanish: sacrificio de bienestar
  alternatives_spanish:
  - sacrificio de paz
  - sacrificio de comunión
  - ofrenda de bienestar
  lexicon: Ge'ez maśwāʿt = sacrificio, ofrenda; madḫanit = bienestar, salvación, paz
  rationale: Se sigue el POB inglés que optó por 'well-being' sobre 'peace' para este tipo de ofrenda (equivalente a los שְׁלָמִים hebreos). 'Sacrificio de bienestar' preserva la dimensión social-comunitaria de la ofrenda, distinta del sacrificio expiatorio. 'Sacrificio de paz' (RV tradicional) es posible pero aplana el matiz de madḫanit.
- source_word: አብሐኩ (abḥaku)
  english_pob_choice: rams
  chosen_spanish: carneros
  alternatives_spanish:
  - toros (lectura descartada)
  lexicon: Ge'ez abḥaku = carneros (plural de bǝḥku; cf. revisión Gemini/claude-opus-4-7, 2026-04-28)
  rationale: '''Carneros'' traduce abḥaku conforme a la corrección léxica que revirtió la identificación errónea de la primera revisión. El proceso de revisión confirmó que abḥaku no significa ''toros'' sino ''carneros''. La nota al pie [a] conserva el historial de la lectura anterior.'
- source_word: መሐስአ (maḥasʾa)
  english_pob_choice: kids
  chosen_spanish: cabritos
  alternatives_spanish:
  - terneros
  - becerros
  lexicon: Ge'ez maḥasʾa = animales jóvenes, cabritos (plural de maḥasʾ; cf. corrección de revisión 2026-04-28)
  rationale: '''Cabritos'' (crías de cabra) es la traducción confirmada por la revisión léxica final. La primera revisión identificó erróneamente maḥasʾa como ''terneros/becerros'' por influencia de listas sacrificiales bíblicas; la corrección restituyó ''cabritos''.'
- source_word: አባግዐ (abāgǝʿa)
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - corderos
  - borregos
  lexicon: Ge'ez abāgǝʿa = ovejas (plural; vocabulario ge'ez estándar)
  rationale: '''Ovejas'' es el término genérico más preciso. ''Corderos'' implicaría animales jóvenes, lo que no está en el ge''ez aquí; ''borregos'' es dialectal.'
- source_word: ደቤላት (dabilāt)
  english_pob_choice: male goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - chivos
  - cabrones
  lexicon: Ge'ez dabilāt = machos cabríos (plural; vocabulario ge'ez estándar)
  rationale: '''Machos cabríos'' es el término técnico-culto español para los machos adultos de cabra en contextos sacrificiales. Preserva la distinción de género que el ge''ez dabilāt expresa frente a las ''ovejas'' (abāgǝʿa). ''Chivos'' o ''cabrones'' son válidos pero menos formales.'
- source_word: ኅሩየ (ḫǝruye)
  english_pob_choice: choice
  chosen_spanish: selecta
  alternatives_spanish:
  - escogida
  - excelente
  - preciosa
  lexicon: Ge'ez ḫǝruye = elegido, selecto, de calidad (raíz ḫ-r-y, 'escoger, elegir')
  rationale: '''Selecta'' es digno y moderno en español, describe la calidad de la ofrenda sin arcaísmo. ''Escogida'' es igualmente válida; ''excelente'' no refleja el matiz de selección deliberada que ḫǝruye implica.'
- source_word: ስቡሖ፡ ሥብሖሙ (sǝbḥo sǝbḥomu)
  english_pob_choice: all their fat
  chosen_spanish: toda la grasa de ellos
  alternatives_spanish:
  - toda su grasa
  lexicon: Ge'ez sǝbḥ = grasa, gordura (término técnico sacrificial)
  rationale: '''Toda la grasa de ellos'' sigue la literalidad del texto ge''ez, que usa una construcción semítica de énfasis (sǝbḥo + sǝbḥomu, figura etimológica de totalidad). La grasa sacrificial tiene valor teológico-ritual específico en el contexto levítico que subyace a Jubileos; se preserva el término técnico.'
theological_decisions:
- issue: 'Nombre divino: ge''ez ለእግዚአ (la-ʾǝgziʾa, ''al Señor'')'
  english_pob_reading: to the Lord
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  rationale: Jubileos es un texto del judaísmo del Segundo Templo compuesto originalmente en hebreo, donde el título aquí correspondería al Tetragrámaton יהוה. El ge'ez ʾǝgziʾ es una traducción del nombre divino, funcionalmente equivalente al κύριος griego. Conforme a la convención del POB, el nombre divino se rinde como 'Yahvé' incluso cuando el texto fuente intermedio (ge'ez o griego) usa el equivalente de 'Señor'. El POB inglés optó por 'the Lord' (convención estándar inglesa), pero la norma española del POB establece 'Yahvé' para evitar el enmascaramiento del nombre. La nota al pie [c] documenta esta decisión.
  doctrine_reference: 'Convención POB: יהוה / YHWH → ''Yahvé''; el ge''ez ʾǝgziʾ es mediación del nombre divino hebreo subyacente.'
- issue: 'Concepto de expiación: ያስተስሪ (yastasri, causativo de ''expiar/reconciliar'')'
  english_pob_reading: make atonement
  chosen_spanish_reading: hacer expiación
  alternative_spanish_readings:
  - propiciar
  - hacer propiciación
  - reconciliar
  rationale: El causativo ge'ez yastasri refleja el concepto hebreo de כִּפֶּר (kipper), 'cubrir, expiar'. El contexto del sacrificio en Jubileos 16:23 —donde el sacerdote/Abraham actúa por sí mismo y por su descendencia ante el altar— apunta a la función de eliminación del pecado (expiación) más que al aplacamiento de la ira divina (propiciación). 'Expiación' (del latín expiatio, purificación del pecado) es el término teológico español más apropiado para este contexto. Se descarta 'propiciación' por no ser la función primaria expresada aquí.
  doctrine_reference: Distinción teológica expiación/propiciación en teología bíblica del sacrificio; cf. uso de kipper en Levítico para ofrendas de comunión y de bienestar.
translation_notes:
  revision_awareness: 'Este versículo atravesó dos rondas de revisión significativas. La primera revisión (gpt-5.4, 23-04-2026) añadió correctamente ''for sin'' para reflejar ኀጢአት, pero introdujo un error léxico al identificar አብሐኩ (abḥaku) como ''toros'' en lugar de ''carneros''. La segunda revisión (claude-opus-4-7 adjudicando revisión de Gemini, 28-04-2026) corrigió la lista de animales: abḥaku = carneros, maḥasʾa = cabritos. El borrador español sigue el texto final corregido en el cuerpo principal. La nota al pie [a] preserva la lectura anterior (toros) del historial de auditoría, con aviso explícito de que fue identificada como errónea. El POB inglés final incluye esa lectura alternativa como previous_rendering, lo cual se traslada al español con la misma categoría pero con mayor documentación de su estatus revisado.'
  spanish_consistency_notes:
  - «Sacrificio de bienestar» se adopta como término estándar para maśwāʿt madḫanit (ge'ez) / זֶבַח שְׁלָמִים (hebreo); no usar «sacrificio de paz» en la misma tradición textual sin documentación.
  - «Expiación» / «hacer expiación» es el término establecido para el concepto de kipper/yastasri en contextos sacrificiales de Jubileos; mantener distinción con «propiciación».
  - «Yahvé» se usa para el nombre divino incluso cuando el intermediario ge'ez emplea ʾǝgziʾ ('Señor'), conforme a la convención del POB para textos judíos del Segundo Templo con nombre divino subyacente.
  - La lista de animales sacrificiales (carneros, cabritos, ovejas, machos cabríos) sigue el orden y la identificación léxica confirmados por la revisión del 28-04-2026; cualquier variación futura debe justificarse desde el ge'ez.
