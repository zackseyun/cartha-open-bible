translation:
  language: es
  text: y habitó entre Cades y Sur, en las montañas de Gerar. Y a la mitad del quinto mes se fue de allí y habitó en el Pozo del Juramento.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወኀደረ
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - moró
  - residió
  - vivió
  lexicon: habitar
  rationale: El geez expresa residencia estable; "habitó" mantiene el sentido de asentarse o vivir en un lugar sin forzar un matiz más literario que el del inglés POB.
- source_word: ማእከለ፡ ቃዴስ፡ ወሱር
  english_pob_choice: between Kadesh and Shur
  chosen_spanish: entre Cades y Sur
  alternatives_spanish:
  - entre Kades y Shur
  - en medio de Cades y Sur
  lexicon: entre
  rationale: Se conserva la relación espacial de intermedio. "Cades" sigue la forma castellana usual para Kadesh; "Sur" mantiene la transliteración bíblica habitual en español.
- source_word: አደባረ፡ ጌራሮን
  english_pob_choice: the mountains of Gerar
  chosen_spanish: las montañas de Gerar
  alternatives_spanish:
  - los montes de Gerar
  - la serranía de Gerar
  lexicon: montañas
  rationale: El plural del geez se expresa de manera directa con "montañas"; evita una paráfrasis innecesaria y conserva la referencia geográfica del texto.
- source_word: በመንፈቀ፡ ወርኅ፡ ኃምስ
  english_pob_choice: in the middle of the fifth month
  chosen_spanish: a la mitad del quinto mes
  alternatives_spanish:
  - en medio del quinto mes
  - a mediados del quinto mes
  lexicon: mitad / mes
  rationale: La construcción temporal se traduce con naturalidad en español. "A la mitad" refleja de forma fiel el valor de "in the middle" sin alterar el sentido cronológico.
- source_word: ወሱር
  english_pob_choice: Shur
  chosen_spanish: Sur
  alternatives_spanish:
  - Shur
  lexicon: topónimo
  rationale: Se usa la forma española tradicional de este topónimo bíblico, coherente con la lectura del nombre propio en contexto geográfico.
- source_word: Pozo del Oath
  english_pob_choice: the Well of the Oath
  chosen_spanish: el Pozo del Juramento
  alternatives_spanish:
  - el Pozo del Pacto
  - el Pozo del Voto
  lexicon: pozo/juramento
  rationale: Se mantiene la traducción directa del nombre tradicionalmente entendible en español. "Juramento" conserva la fuerza legal/ritual de "oath" mejor que opciones más interpretativas.
theological_decisions:
- issue: Topónimo teológico-narrativo sin carga doctrinal explícita
  english_pob_reading: Well of the Oath
  chosen_spanish_reading: Pozo del Juramento
  alternative_spanish_readings:
  - Pozo del Pacto
  - Pozo del Voto
  rationale: No se introduce una lectura doctrinal nueva; se conserva el nombre del lugar tal como funciona en el relato. "Juramento" preserva la referencia al acto solemne sin suavizarla.
  doctrine_reference: Narrative geography / onomastic meaning
translation_notes:
  revision_awareness: El texto inglés POB y el registro fuente geez están plenamente alineados en este versículo; no se requieren correcciones ni notas textuales adicionales. La versión española sigue de cerca esa concordancia sin introducir glosas.
  spanish_consistency_notes:
  - Se evita "SEÑOR" porque no aparece ningún tetragrámaton ni equivalente en este versículo.
  - '"Cades" y "Sur" siguen la grafía bíblica asentada en español; "Gerar" se mantiene como topónimo transliterado.'
  - '"Pozo del Juramento" traduce el nombre propio con transparencia semántica y tono bíblico natural.'
  - La puntuación reproduce el paralelismo narrativo del inglés POB con dos cláusulas coordinadas por "Y".
