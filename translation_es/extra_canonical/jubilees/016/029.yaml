revisions:
- from: Por tanto, en las tablas celestiales se ordenó respecto a Israel que celebren la fiesta de las cabañas[a] durante siete días, con alegría, en el séptimo mes, aceptable delante del Señor.
  to: Por tanto, en las tablas celestiales se ordenó respecto a Israel que celebrara la fiesta de las cabañas[a] durante siete días, con alegría, en el séptimo mes, aceptable delante de Yahvé.
  rationale: Se cambió 'delante del Señor' por 'delante de Yahvé' para ajustarse a la terminología obligatoria del proyecto para el nombre divino. También se ajustó 'que celebren' a 'que celebrara' para mejorar la sintaxis española con 'Israel' como referente singular colectivo tras 'se ordenó'. Se mantuvo 'fiesta de las cabañas' con nota por ser fiel a la imagen del original y suficientemente claro en español.
  reviewer_model: gpt-5.4
