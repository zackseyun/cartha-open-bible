    issue: Uso de 'Señor' en lugar de 'Yahvé'
    rationale: La guía del proyecto exige 'Yahvé' en el texto principal para el nombre divino, salvo contextos específicos documentados. Aquí no se justifica la excepción.
  - severity: medium
    issue: Concordancia y naturalidad en 'se ordenó ... que celebren'
    rationale: Tras un verbo de pasado e impersonal normativo, en español suena más natural 'que Israel celebrara' o 'que celebraran'. El singular con 'Israel' evita ambigüedad.
