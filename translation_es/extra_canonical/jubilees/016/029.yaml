base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/029.yaml
  text: Therefore it is ordained on the heavenly tablets concerning Israel, that they should celebrate the feast of booths for seven days with joy in the seventh month, acceptable before the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:11Z'
    unchanged: false
    changes_summary: Added 'for' before 'seven days' for natural English and removed the trailing dash, replacing it with a period. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: Por tanto, en las tablas celestiales se ordenó respecto a Israel que celebrara la fiesta de las cabañas[a] durante siete días, con alegría, en el séptimo mes, aceptable delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Cabañas” traduce literalmente la imagen del festival; en español bíblico también puede expresarse como “tabernáculos” o “enramadas”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ተሠርዐ / ordained
  english_pob_choice: it is ordained
  chosen_spanish: se ordenó
  alternatives_spanish:
  - está ordenado
  - fue decretado
  lexicon: ordenar / decretar
  rationale: El geʽez expresa una disposición ya establecida; 'se ordenó' preserva la pasiva impersonal con tono jurídico sin volverla demasiado rígida en español.
- source_word: ጽላተ፡ ሰማይ / heavenly tablets
  english_pob_choice: heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas del cielo
  - las tablas celestiales
  lexicon: tablas celestiales
  rationale: Se conserva la imagen apocalíptica de las 'heavenly tablets' sin sustituirla por una paráfrasis teológica.
- source_word: ላዕለ፡ እስራኤል / concerning Israel
  english_pob_choice: concerning Israel
  chosen_spanish: respecto a Israel
  alternatives_spanish:
  - acerca de Israel
  - sobre Israel
  lexicon: respecto a
  rationale: '''Respecto a'' reproduce bien el valor de referencia temática del pasaje sin añadir matiz interpretativo.'
- source_word: ከመ፡ ይኩኑ፡ ገበርያኮ / that they should celebrate
  english_pob_choice: that they should celebrate
  chosen_spanish: que celebren
  alternatives_spanish:
  - que observen
  - que guarden
  lexicon: celebrar
  rationale: El contexto habla de una fiesta; 'celebren' transmite la observancia festiva con naturalidad en español. Se evita 'guardar' por sonar más cultual y menos directo en este contexto.
- source_word: በዓለ፡ መጸለት / feast of booths
  english_pob_choice: feast of booths
  chosen_spanish: la fiesta de las cabañas
  alternatives_spanish:
  - la fiesta de los tabernáculos
  - la fiesta de los puestos
  lexicon: fiesta de las cabañas
  rationale: Se conserva el referente bíblico con un término comprensible y menos eclesiástico que 'tabernáculos'; 'cabañas' refleja la imagen material del término.
- source_word: ሰቡዐ፡ መዋዕለ / seven days
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: durante / por
  rationale: La revisión inglesa añadió 'for' por naturalidad; en español 'durante siete días' expresa duración de modo claro y fluido.
- source_word: በፍሥሓ / with joy
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - alegres
  lexicon: alegría
  rationale: '''Con alegría'' es idiomático y mantiene el registro sobrio; ''gozo'' sería posible, pero ''alegría'' comunica bien la disposición celebrativa.'
- source_word: ወርኅ፡ ሳብዕ / in the seventh month
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - en el mes séptimo
  lexicon: séptimo mes
  rationale: Corresponde de forma directa al original y al inglés auditado, sin necesidad de inversión estilística.
- source_word: ዘይትወከፍ / acceptable
  english_pob_choice: acceptable
  chosen_spanish: aceptable
  alternatives_spanish:
  - aceptado
  - bien recibido
  lexicon: aceptable
  rationale: '''Aceptable'' conserva la idea de ser recibido favorablemente ante Dios sin convertirla en una formulación más interpretativa como ''bien recibido''.'
- source_word: በቅድመ፡ እግዚአብሔር / before the Lord
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - ante el Señor
  - ante Dios
  lexicon: delante de
  rationale: Se mantiene la preposición tradicional del registro bíblico en español. Aunque el texto base usa el título 'Lord', el POB inglés ya fija esta formulación, y 'delante del Señor' resulta idiomática y reverente.
theological_decisions:
- issue: Divine title in the closing phrase
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante del Señor
  alternative_spanish_readings:
  - delante de Yahvé
  - ante el Señor
  rationale: El audit trail inglés preserva 'Lord' en esta frase. En español se mantiene la formulación de cierre tradicional 'delante del Señor' para respetar el registro de culto y la fluidez del enunciado, sin introducir aquí el nombre divino donde el texto recibido no lo explicita en inglés.
  doctrine_reference: Registro reverencial y consistencia traductológica del título divino
- issue: Meaning of the festival term
  english_pob_reading: feast of booths
  chosen_spanish_reading: la fiesta de las cabañas
  alternative_spanish_readings:
  - la fiesta de los tabernáculos
  - la fiesta de las enramadas
  rationale: Se conserva la referencia a la fiesta bíblica con una imagen transparente en español. 'Tabernáculos' es más tradicional, pero 'cabañas' sigue de cerca la metáfora material del término y evita un término más litúrgico que podría oscurecer el sentido.
  doctrine_reference: Nomenclatura festiva bíblica y equivalencia semántica
- issue: Nature of the source statement
  english_pob_reading: it is ordained on the heavenly tablets
  chosen_spanish_reading: en las tablas celestiales se ordenó
  alternative_spanish_readings:
  - está ordenado en las tablas celestiales
  - fue decretado en las tablas celestiales
  rationale: Se conserva la afirmación de una disposición escrita/establecida en las tablas celestiales sin atenuar su carácter solemne. La pasiva impersonal en español mantiene la fuerza normativa del original.
  doctrine_reference: Literatura apocalíptica y decreto celestial
translation_notes:
  revision_awareness: La revisión inglesa reciente añadió 'for' antes de 'seven days' y cerró la cláusula con un punto. La versión española refleja esa misma naturalidad con 'durante siete días' y una oración completa, manteniendo sin cambios el resto del contenido auditado.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' en mayúsculas en el texto principal, pero se mantuvo 'Señor' por tratarse de la forma reverente estándar en español cuando el audit trail inglés dice 'the Lord'.
  - '''Tablas celestiales'' conserva la imagen apocalíptica sin domesticarla; no se reemplazó por una explicación.'
  - '''Con alegría'' mantiene el paralelismo con el inglés ''with joy'' y el tono festivo del pasaje.'
