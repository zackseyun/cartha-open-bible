base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/005.yaml
  text: She conceived a son. And in this month the Lord executed judgment on Sodom and Gomorrah and Admah [or 'and Dom'] and all the region of the Jordan, and he burned them with fire and sulfur and destroyed them to this day, just as I have now declared to you all their deeds, that they are utterly wicked and sinful.
  footnotes:
  - marker: a
    text: Or 'according to all their deeds, because they were utterly lawless and sinful.'.
    reason: previous_rendering
  - marker: b
    text: Or 'and Zoar'.
    reason: previous_rendering
  - marker: c
    text: Or 'And in this month'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:10Z'
    unchanged: false
    changes_summary: Changed 'the judgments of' to 'judgment on' for more natural and accurate English; changed 'works' to 'deeds' for better formal register; added final period.
translation:
  language: es
  text: Ella concibió un hijo. Y en este mes Yahvé ejecutó juicio sobre Sodoma y Gomorra y Admá[a] y toda la región del Jordán, y los quemó con fuego y azufre y los destruyó hasta hoy, tal como ahora te he declarado todos sus hechos, que eran sumamente malvados y pecadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dom».
    reason: textual_variant
lexical_decisions:
- source_word: ፀንሰት፡ ወልደ።
  english_pob_choice: She conceived a son.
  chosen_spanish: Ella concibió un hijo.
  alternatives_spanish:
  - Concibió un hijo.
  - Ella quedó encinta y dio a luz un hijo.
  lexicon: concebir
  rationale: El ge’ez inicia con una cláusula breve sobre la concepción y nacimiento de un hijo. «Concibió un hijo» conserva la concisión y el hecho narrativo sin añadir desarrollo no presente en el texto.
- source_word: በዝ፡ ወርኅ፡
  english_pob_choice: And in this month
  chosen_spanish: Y en este mes
  alternatives_spanish:
  - Y en ese mes
  - En este mes
  lexicon: mes
  rationale: La referencia temporal se mantiene de forma directa. «Y en este mes» refleja el enlace narrativo del original y la formulación auditada en inglés.
- source_word: እግዚአብሔር፡
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - Dios
  lexicon: Señor
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el texto ge’ez y el contexto de Jubileos presentan la fórmula narrativa tradicional equivalente al inglés auditado «the Lord». En español, «el Señor» comunica con naturalidad la referencia divina y conserva la cadencia del relato sin introducir una decisión nominal no explicitada en el audit trail.
- source_word: ዘነኒሆሙ፡ ለሰዶም፡ ወለገሞራ፡ ወለዶም፡ ወለኵሉ፡ አደያመ፡ ዮርዳኖስ፡
  english_pob_choice: on Sodom and Gomorrah and Admah [or 'and Dom'] and all the region of the Jordan
  chosen_spanish: sobre Sodoma y Gomorra y Admá[a] y toda la región del Jordán
  alternatives_spanish:
  - sobre Sodoma y Gomorra y Dom y toda la región del Jordán
  - sobre Sodoma y Gomorra y Zoar y toda la región del Jordán
  lexicon: Admá
  rationale: Sigo la revisión auditada que corrige la lectura anterior de «Zoar»; el ge’ez apunta a una ciudad del complejo destruido junto con Sodoma y Gomorra, y el contexto favorece Admá. Conservo una nota para la alternativa textual «Dom», ya que el testimonio inglés la registró como posibilidad derivada de la corrupción textual.
- source_word: ወአውዐዮሙ፡ በእሳት፡ ወበተይ፡
  english_pob_choice: and he burned them with fire and sulfur
  chosen_spanish: y los quemó con fuego y azufre
  alternatives_spanish:
  - y los quemó con fuego y con azufre
  - y los abrasó con fuego y azufre
  lexicon: azufre
  rationale: «Azufre» es el equivalente claro y bíblico de the English audit trail «sulfur». «Quemó» mantiene el verbo simple del original y evita intensificar más allá del testimonio.
- source_word: ወአጥፍኦሙ፡ እስከ፡ ዛቲ፡ ዕለት፡
  english_pob_choice: and destroyed them to this day
  chosen_spanish: y los destruyó hasta hoy
  alternatives_spanish:
  - y los destruyó hasta el día de hoy
  - y los dejó destruidos hasta hoy
  lexicon: destruir
  rationale: 'La expresión idiomática temporal se traslada a un español natural y fiel: «hasta hoy». No se suaviza el resultado final; «destruyó» conserva la fuerza del juicio ejecutado.'
- source_word: በከመ፡ ናሁ፡ አይዳዐኩ፡ ኵሎ፡ ምግባሮሙ፡
  english_pob_choice: just as I have now declared to you all their deeds
  chosen_spanish: tal como ahora te he declarado todas sus obras
  alternatives_spanish:
  - tal como ahora te he dado a conocer todas sus obras
  - como ahora te he declarado todas sus obras
  lexicon: declarar
  rationale: La revisión auditada muestra que el ge’ez dice explícitamente «ahora he declarado»; por eso se conserva «ahora te he declarado». «Obras» traduce con sobriedad ምግባሮሙ y mantiene el valor de actos/hechos sin perder el registro narrativo.
- source_word: ከመ፡ ፀዋጋን፡ ወኃጥኣን፡ ጥቀ፡
  english_pob_choice: that they are utterly wicked and sinful
  chosen_spanish: que son sumamente malvadas y pecadoras
  alternatives_spanish:
  - que son totalmente malvadas y pecadoras
  - que son enteramente impías y pecadoras
  lexicon: malvado
  rationale: El cierre del verso describe su estado moral extremo. «Sumamente malvadas y pecadoras» conserva la intensidad de «utterly wicked and sinful» sin introducir un tecnicismo doctrinal ajeno al español bíblico natural.
theological_decisions:
- issue: Título divino en un contexto narrativo de Jubileos
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - Dios
  rationale: El pasaje narrativo del texto ge’ez usa la fórmula reverente para el agente del juicio. Dado que el audit trail inglés fija «the Lord» y no ofrece aquí una decisión terminológica especial sobre el nombre divino, «el Señor» es la opción más transparente y lectura-fluida en español.
  doctrine_reference: Uso reverente del título divino en narración bíblica; distinción entre nombre propio y título.
- issue: Identificación de la ciudad textual problemática
  english_pob_reading: Admah [or 'and Dom']
  chosen_spanish_reading: Admá[a]
  alternative_spanish_readings:
  - Dom
  - Zoar
  rationale: La revisión textual auditada descarta «Zoar» y explica que la forma ge’ez apunta a Admá, con «Dom» como posible corrupción textual. Mantener Admá en el texto principal respeta la corrección crítica y evita introducir una ciudad teológicamente incongruente con la destrucción narrada.
  doctrine_reference: Crítica textual y coherencia narrativa del juicio sobre las ciudades del valle.
- issue: Relación entre las acciones de juicio y la declaración previa
  english_pob_reading: just as I have now declared to you all their deeds
  chosen_spanish_reading: tal como ahora te he declarado todas sus obras
  alternative_spanish_readings:
  - porque ahora te he declarado todas sus obras
  - según te he declarado ahora todas sus obras
  rationale: La revisión auditada corrige una versión anterior que hacía depender el sentido de una causalidad no presente. La cláusula final debe reflejar la declaración explícita de las obras y luego la evaluación moral, no invertir la relación entre ambas.
  doctrine_reference: Fidelidad semántica al testimonio textual; evitar causalidades no sustentadas por el original.
translation_notes:
  revision_awareness: 'Esta versión incorpora las revisiones auditadas más recientes: añade la cláusula inicial omitida («Ella concibió un hijo»), corrige la lista de ciudades destruidas para excluir «Zoar» y seguir la lectura crítica «Admá/ Dom», y reproduce la frase final según el ge’ez («tal como ahora te he declarado todas sus obras»), en lugar de una causalidad no sustentada. También mantiene la secuencia de juicio, fuego y azufre, y la intensidad moral final.'
  spanish_consistency_notes:
  - Se usa «el Señor» como título divino narrativo, coherente con el inglés auditado y sin imponer una sustitución de nombre propio no indicada por el paquete de fuente.
  - Se mantiene «azufre» para sulfur y «obras» para ምግባሮሙ, evitando soluciones más interpretativas.
  - La nota [a] se reserva para la variante textual de Admá/Dom, porque el texto principal adopta la lectura corregida y la alternativa debe quedar auditable.
