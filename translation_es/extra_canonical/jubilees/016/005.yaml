revisions:
- from: Ella concibió un hijo. Y en este mes el Señor ejecutó juicio sobre Sodoma y Gomorra y Admá[a] y toda la región del Jordán, y los quemó con fuego y azufre y los destruyó hasta hoy, tal como ahora te he declarado todas sus obras, que son sumamente malvadas y pecadoras.
  to: Ella concibió un hijo. Y en este mes Yahvé ejecutó juicio sobre Sodoma y Gomorra y Admá[a] y toda la región del Jordán, y los quemó con fuego y azufre y los destruyó hasta hoy, tal como ahora te he declarado todos sus hechos, que eran sumamente malvados y pecadores.
  rationale: Se ajusta el nombre divino a la terminología por defecto del proyecto («Yahvé»), se preserva de forma más directa la variante textual documentada («Dom»), se mejora ምግባሮሙ con «hechos», y se aclara la cláusula final para que describa a las personas juzgadas y no ambiguamente a sus obras.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:17:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del ge’ez y del audit trail inglés: incluye la cláusula inicial «Ella concibió un hijo», la referencia temporal, el juicio sobre Sodoma/Gomorra/Admá y la cláusula corregida «ahora te he declarado». Sin embargo, omite en el texto principal la alternativa preservada por el inglés para la ciudad textual problemática («Dom»), limitándola a una nota explicativa en vez de una nota de alternativa de traducción; además, «obras» suena menos preciso que «hechos» o «acciones» para ምግባሮሙ en este contexto de maldad declarada. También hay un problema de concordancia semántica en «que son sumamente malvadas y pecadoras», ya que el antecedente más inmediato en español es «obras/hechos», mientras el sentido fuente apunta a los habitantes.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene pulir dos puntos de legibilidad y fidelidad: 1) «hechos» funciona mejor que «obras» para acciones malvadas declaradas; 2) la cláusula final debe evitar una referencia ambigua. «que eran sumamente malvados y pecadores» refleja mejor a los sujetos destruidos y mantiene el valor narrativo. La nota debe formular explícitamente la alternativa «o ‘Dom’».'
  glossary_alignment: La mayor desviación es el uso de «el Señor» para እግዚአብሔር frente al valor por defecto del proyecto, que favorece «Yahvé». Dado que no hay justificación fuerte en el audit trail para apartarse del término de proyecto y que Jubileos depende de tradición hebrea subyacente, conviene normalizar a «Yahvé». «Admá» está bien como texto principal con nota alternativa «Dom».
  issues:
  - severity: medium
    issue: Uso de «el Señor» en lugar de «Yahvé».
    rationale: El proyecto establece «Yahvé» como forma por defecto para el nombre divino en el texto principal. Aquí no se ofrece una razón suficiente para apartarse de esa norma.
  - severity: medium
    issue: La nota sobre Admá no preserva de forma directa la alternativa de traducción «o ‘Dom’».
    rationale: El audit trail inglés conserva una alternativa textual explícita en la traducción. En español debe mantenerse como nota anclada al término, no solo como comentario metatextual.
  - severity: medium
    issue: «Obras» es menos preciso que «hechos» en este contexto.
    rationale: Para ምግባሮሙ, en una declaración de acciones perversas, «hechos» suena más natural y específico en español bíblico moderno.
  - severity: medium
    issue: La cláusula final «que son sumamente malvadas y pecadoras» crea ambigüedad y posible mala concordancia.
    rationale: Gramaticalmente puede referirse a «obras», pero el sentido fuente describe a los habitantes como moralmente perversos. Reexpresar con masculino plural y pasado narrativo aclara el referente.
  revised_spanish_text: Ella concibió un hijo. Y en este mes Yahvé ejecutó juicio sobre Sodoma y Gomorra y Admá[a] y toda la región del Jordán, y los quemó con fuego y azufre y los destruyó hasta hoy, tal como ahora te he declarado todos sus hechos, que eran sumamente malvados y pecadores.
  revised_footnotes:
  - marker: a
    text: O «Dom».
    reason: textual_variant
  revision_rationale: Se ajusta el nombre divino a la terminología por defecto del proyecto («Yahvé»), se preserva de forma más directa la variante textual documentada («Dom»), se mejora ምግባሮሙ con «hechos», y se aclara la cláusula final para que describa a las personas juzgadas y no ambiguamente a sus obras.
