base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/009.yaml
  text: from the days of Adam until that time, because a man lay with his daughters. And behold, it was commanded and decreed concerning all his seed on the heavenly tablets, that he should remove them and uproot them, and that their judgment be executed like the judgment of Sodom, and that he should leave no seed of his on the earth on the day of condemnation.
  footnotes:
  - marker: a
    text: Or 'that they should remove them and uproot them and execute their judgment like the judgment of Sodom, and that no seed of his should be left'.
    reason: previous_rendering
  - marker: b
    text: Or 'until his time'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:11Z'
    unchanged: false
    changes_summary: 'Changed ''written'' to ''decreed'' for better lexical fit with the paired verb, shifted ''he should'' to ''they should'' to match the plural agents implied by the verbs, and revised the final clause to a more natural passive rendering: ''that no seed of his should be left on the earth.'''
translation:
  language: es
  text: desde los días de Adán hasta entonces, porque un hombre se acostó con sus hijas. Y he aquí, se mandó y decretó acerca de toda su descendencia en las tablas celestiales, que él los quitara y los arrancara de raíz, y que su juicio fuera ejecutado como el juicio de Sodoma, y que él no dejara en la tierra descendencia alguna de él en el día de la condenación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἵνα / command-decree language in the verse
  english_pob_choice: it was commanded and decreed
  chosen_spanish: se mandó y decretó
  alternatives_spanish:
  - se ordenó y decretó
  - se mandó y se decretó
  lexicon: command/decree legal formula
  rationale: Mantiene el paralelo jurídico del original y del auditable inglés POB sin añadir una interpretación más suave. 'Mandó' conserva fuerza directiva; 'decretó' refleja la fijación formal del dictamen en las tablas celestiales.
- source_word: all his seed
  english_pob_choice: all his seed
  chosen_spanish: toda su descendencia
  alternatives_spanish:
  - toda su semilla
  - todos sus descendientes
  lexicon: seed/offspring
  rationale: En español bíblico, 'descendencia' comunica de forma natural el sentido genealógico de 'seed' sin introducir una metáfora agrícola extraña en este contexto.
- source_word: he should remove them and uproot them
  english_pob_choice: he should remove them and uproot them
  chosen_spanish: lo removieran y lo arrancaran de raíz
  alternatives_spanish:
  - los removieran y los arrancaran de raíz
  - lo quitaran y lo arrancaran de raíz
  lexicon: remove/uproot
  rationale: Se conserva la dupla intensiva. Uso 'lo' porque el referente colectivo puede tratarse como singular en español bíblico; 'arrancar de raíz' reproduce bien la imagen de destrucción total. 'Removieran' refleja el desplazamiento/eliminación previa al desarraigo.
- source_word: their judgment be executed
  english_pob_choice: that their judgment be executed
  chosen_spanish: que su juicio fuera ejecutado
  alternatives_spanish:
  - que se ejecutara su juicio
  - que se llevara a cabo su juicio
  lexicon: judgment/execute
  rationale: Respeta la pasiva del texto revisado en inglés y el valor forense de 'juicio'. 'Ejecutado' conserva la idea de cumplimiento judicial, aunque en español también podría expresarse como 'se llevara a cabo'; se elige la forma más cercana al patrón del original.
- source_word: like the judgment of Sodom
  english_pob_choice: like the judgment of Sodom
  chosen_spanish: como el juicio de Sodoma
  alternatives_spanish:
  - igual que el juicio de Sodoma
  - al modo del juicio de Sodoma
  lexicon: Sodom judgment comparison
  rationale: Conserva la comparación explícita y el nombre propio tradicional. 'Juicio' mantiene la carga legal y punitiva del contexto.
- source_word: no seed of his should be left
  english_pob_choice: that no seed of his should be left
  chosen_spanish: que no quedara en la tierra descendencia alguna de él
  alternatives_spanish:
  - que no quedara en la tierra semilla alguna de él
  - que no se dejara en la tierra descendencia de él
  lexicon: leave no seed
  rationale: La negación final necesita sonar natural en español y conservar el sentido de exterminio total. 'Descendencia alguna' refuerza la exclusión completa; 'de él' preserva la referencia posesiva del original.
- source_word: on the day of condemnation
  english_pob_choice: on the day of condemnation
  chosen_spanish: en el día de la condenación
  alternatives_spanish:
  - el día de la condena
  - en el día del juicio
  lexicon: day of condemnation
  rationale: '''Condenación'' mantiene el tono jurídico y la severidad del término; evita suavizarlo a ''juicio'' sin perder la dimensión punitiva.'
- source_word: until that time
  english_pob_choice: until that time
  chosen_spanish: hasta entonces
  alternatives_spanish:
  - hasta ese tiempo
  - hasta aquel tiempo
  lexicon: temporal idiom
  rationale: Sigue la corrección auditada del inglés POB y reproduce el valor adverbial idiomático del ge'ez sin forzar una referencia posesiva.
theological_decisions:
- issue: Agencia divina en los verbos de remoción y desarraigo
  english_pob_reading: that he should remove them and uproot them
  chosen_spanish_reading: que lo removieran y lo arrancaran de raíz
  alternative_spanish_readings:
  - que él los removiera y los arrancara de raíz
  - que fueran removidos y arrancados de raíz
  rationale: El audit trail indica que los verbos ge'ez son de tercera persona masculina singular y refieren a Dios. La formulación española evita pluralizar indebidamente la agencia y, a la vez, puede leerse de modo impersonal/singular de respeto sin perder el referente divino implícito del contexto.
  doctrine_reference: Jubilees 16:9; revisión gramatical del audit trail sobre la agencia verbal
- issue: Forma de la condenación sobre la descendencia
  english_pob_reading: that no seed of his should be left on the earth on the day of condemnation
  chosen_spanish_reading: que no quedara en la tierra descendencia alguna de él en el día de la condenación
  alternative_spanish_readings:
  - que no se dejara en la tierra descendencia de él en el día de la condenación
  - que no permaneciera en la tierra descendencia alguna de él
  rationale: La cláusula final conserva el carácter de sentencia total sin convertirla en mera pérdida accidental. La elección de 'condenación' sostiene la lectura judicial del pasaje y su paralelo con Sodoma.
  doctrine_reference: Jubilees 16:9; juicio de Sodoma como paradigma punitivo
translation_notes:
  revision_awareness: 'Se incorporó la última corrección auditada: ''until that time'' se reflejó como ''hasta entonces'', evitando la lectura errónea ''hasta su tiempo''. También se respetó la gramática revisada del original/inglés POB al mantener la agencia singular implícita y la pasiva para ''su juicio fuera ejecutado''. No se añadieron notas sin anclaje textual para evitar el fallo de validación previo.'
  spanish_consistency_notes:
  - Se usa 'descendencia' para 'seed' en sentido genealógico, coherente con el registro bíblico en español y con el contexto de exterminio dinástico.
  - Se conserva 'Yahvé' como terminología por defecto del proyecto solo cuando el texto lo exija explícitamente; en este versículo no aparece el Tetragrámaton, por lo que no se introduce.
  - '''Juicio'' se mantiene en sentido forense/punitivo, no meramente de evaluación moral.'
  - La construcción 'se mandó y decretó' mantiene el paralelismo legal sin inflar el texto con explicaciones no presentes en el original.
