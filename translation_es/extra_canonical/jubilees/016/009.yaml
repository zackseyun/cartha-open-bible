  to: desde los días de Adán hasta entonces, porque un hombre se acostó con sus hijas. Y he aquí, se mandó y decretó acerca de toda su descendencia en las tablas celestiales, que él los quitara y los arrancara de raíz, y que su juicio fuera ejecutado como el juicio de Sodoma, y que él no dejara en la tierra descendencia alguna de él en el día de la condenación.
