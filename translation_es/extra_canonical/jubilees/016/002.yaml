base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/002.yaml
  text: And Sarah laughed because she heard that we had spoken this word with Abraham, and we reproved her.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:08Z'
    unchanged: false
    changes_summary: Changed 'when' to 'because' for እስመ, and 'rebuked' to 'reproved' for a slightly more formal register while preserving the sense.
translation:
  language: es
  text: Y Sara se rió porque oyó que habíamos hablado esta palabra con Abraham, y la reprendimos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወስሐቀት / laughed
  english_pob_choice: laughed
  chosen_spanish: se rió
  alternatives_spanish:
  - se burló
  - rió
  lexicon: reírse
  rationale: El ge'ez expresa risa; en español, «se rió» comunica el hecho sin añadir la connotación más fuerte de burla que tendría «se burló». El texto no exige especificar el tipo de risa más allá de la reacción de Sara.
- source_word: እስመ / because
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: porque
  rationale: La revisión inglesa fijó una lectura causal; «porque» mantiene de forma natural esa causalidad en español.
- source_word: ሰምዐት / heard
  english_pob_choice: she heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyeron
  lexicon: oír
  rationale: El verbo básico de percepción auditiva en el contexto es «oír». «Escuchó» sugeriría atención deliberada no requerida por el original.
- source_word: ተናገርነ / we had spoken
  english_pob_choice: we had spoken
  chosen_spanish: habíamos hablado
  alternatives_spanish:
  - habíamos dicho
  - habíamos hablado con
  lexicon: hablar
  rationale: «Hablado» refleja bien el acto de hablar con Abraham. La formulación evita introducir un matiz de mensaje formal que no está explícito en el ge'ez.
- source_word: ዘንተ ቃለ / this word
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - esta cosa
  - este asunto
  - estas palabras
  lexicon: palabra
  rationale: «Palabra» reproduce la unidad semántica del original y del inglés POB. En español, en singular suena natural para una declaración concreta.
- source_word: ምስለ አብርሃም / with Abraham
  english_pob_choice: with Abraham
  chosen_spanish: con Abraham
  alternatives_spanish:
  - ante Abraham
  - a Abraham
  lexicon: con
  rationale: El ge'ez indica la relación verbal con Abraham; «con Abraham» es la equivalencia directa y más clara.
- source_word: ወዘለፍናሃ / and we reproved her
  english_pob_choice: and we reproved her
  chosen_spanish: y la reprendimos
  alternatives_spanish:
  - y la reprochamos
  - y la reprobamos
  lexicon: reprender
  rationale: El inglés revisado eligió un registro formal con «reproved». En español, «reprender» conserva el sentido de corrección o amonestación sin sonar excesivamente duro ni judicial.
theological_decisions:
- issue: No suavizar la reprensión divina/humana implícita en el relato
  english_pob_reading: and we reproved her
  chosen_spanish_reading: y la reprendimos
  alternative_spanish_readings:
  - y la reprendimos duramente
  - y la reprendimos
  rationale: El verso presenta una corrección real dirigida a Sara; no conviene atenuarla a mera observación. «Reprender» mantiene la tensión narrativa sin exagerarla.
  doctrine_reference: Narrative tone and speech-act fidelity
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: causalidad explícita con «porque» en lugar de una lectura temporal, y registro algo más formal para la corrección final mediante «reprendimos».'
  spanish_consistency_notes:
  - Se mantiene el nombre «Sara» sin variación.
  - Se preserva el sujeto plural implícito «habíamos hablado» / «reprendimos», coherente con el plural del original.
  - No se introduce puntuación explicativa adicional ni notas textuales porque no hay variantes auditadas en el paquete fuente.
