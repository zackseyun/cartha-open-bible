  yaml_path: translation/extra_canonical/jubilees/016/017.yaml
  text: And we blessed him and told him everything that had been decreed concerning him, that he would not die until he had begotten six more sons and seen them before he died; but in Isaac his name and seed would be called.
  footnotes:
