    rationale: Aunque refleja de cerca el inglés, en español «ser llamados» pide normalmente un complemento o una reformulación. Sin ajuste, el lector puede no entender que se trata de la línea nominada/identificada por Isaac.
  - severity: low
    issue: Falta nota para preservar la ambigüedad hereditaria de la fórmula final.
    rationale: El inglés auditado no conserva ya la nota antigua sobre «saw Isaac's sons», pero la frase final sigue siendo suficientemente densa como para beneficiarse de una nota aclaratoria en español sin alterar el texto principal.
