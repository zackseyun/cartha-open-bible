    unchanged: false
    changes_summary: Smoothed the English for naturalness and kept the source sense more closely by using 'had begotten' and 'seen them,' while preserving the rest of the draft.
translation:
  language: es
  text: 'Y lo bendijimos y le dijimos todo lo que había sido decretado respecto de él: que no moriría hasta haber engendrado seis hijos más y haberlos visto antes de morir; pero en Isaac sería llamado[a] su nombre y su descendencia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O sea, su nombre y su descendencia serían contados o identificados por medio de Isaac. La formulación conserva la expresión hereditaria del original sin explicitarla más de lo necesario.
    reason: Aclara una fórmula semítica poco natural en español y preserva su ambigüedad genealógica.
lexical_decisions:
- source_word: And we blessed him
  english_pob_choice: And we blessed him
  chosen_spanish: Y lo bendijimos
  alternatives_spanish:
  - Y lo bendecimos
  - Y lo habíamos bendecido
  lexicon: ברך / εὐλογέω
  rationale: Conserva la acción divina en forma simple y directa. «Bendijimos» refleja el aoristo narrativo del original y mantiene el sujeto implícito plural del testimonio bíblico sin añadir explicaciones.
- source_word: told him everything that had been decreed concerning him
  english_pob_choice: told him everything that had been decreed concerning him
  chosen_spanish: le dijimos todo lo que había sido decretado respecto de él
  alternatives_spanish:
  - le contamos todo lo que había sido decretado acerca de él
  - le comunicamos todo lo decretado sobre él
  lexicon: אמר / εἶπον; גזר / ὁρίζω
  rationale: «Había sido decretado» conserva el pasivo y la fuerza de decisión previa sobre su destino. «Respecto de él» suena más natural en español que un calco rígido, sin perder el valor relacional del original.
- source_word: would not die until he had begotten six more sons and seen them before he died
  english_pob_choice: would not die until he had begotten six more sons and seen them before he died
  chosen_spanish: que no moriría hasta haber engendrado seis hijos más y haberlos visto antes de morir
  alternatives_spanish:
  - que no moriría hasta haber tenido seis hijos más y verlos antes de morir
  - que no moriría hasta que hubiera engendrado seis hijos más y los viera antes de morir
  lexicon: יָלַד / γεννάω; ראה / ὁράω
  rationale: «Engendrado» conserva el lenguaje genealógico del pasaje. Se prefirió «hijos» en vez de «varones» o una paráfrasis más extensa porque el contexto ya identifica a los seis descendientes mencionados; el pronombre «los» refleja fielmente el objeto implícito de «ver».
- source_word: but in Isaac his name and seed would be called
  english_pob_choice: but in Isaac his name and seed would be called
  chosen_spanish: pero en Isaac su nombre y su descendencia serían llamados
  alternatives_spanish:
  - pero en Isaac su nombre y su linaje serían llamados
  - pero por Isaac serían llamados su nombre y su descendencia
  lexicon: קרא / καλέω; זֶרַע / σπέρμα
  rationale: «Serían llamados» mantiene la pasiva y la fórmula de nombramiento/atribución hereditaria. «Descendencia» preserva el sentido genealógico de seed/sperma sin reducirlo a una sola generación.
theological_decisions:
- issue: Determinación divina del destino de Abraham
  english_pob_reading: everything that had been decreed concerning him
  chosen_spanish_reading: todo lo que había sido decretado respecto de él
  alternative_spanish_readings:
  - todo lo que había sido determinado acerca de él
  - todo lo que había sido fijado sobre él
  rationale: La redacción mantiene la idea de decreto previo sin convertirla en una explicación doctrinal. En español, «decretado» comunica con precisión la noción de determinación divina y conserva la tensión entre promesa y destino narrativo.
  doctrine_reference: Providencia y decreto divino en narrativas patriarcales; cf. Génesis 15–17, tradición de Jubileos
- issue: Relación entre Isaac y la descendencia prometida
  english_pob_reading: but in Isaac his name and seed would be called
  chosen_spanish_reading: pero en Isaac su nombre y su descendencia serían llamados
  alternative_spanish_readings:
  - pero en Isaac sería llamado su nombre y su descendencia
  - pero en Isaac su nombre y linaje serían reconocidos
  rationale: 'Se conserva la formulación hereditaria ambigua del original: la promesa se canaliza por Isaac sin explicitar más allá de lo que el texto dice. «En Isaac» mantiene la preposición relacional del pasaje y no la sustituye por una causalidad interpretativa más fuerte.'
  doctrine_reference: Elección y línea de promesa en la historia patriarcal; cf. Génesis 17:19–21, 21:12
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió una sobreexplicación en la traducción inglesa anterior («saw Isaac''s sons» -> «saw them») y pulió la secuencia temporal («had begotten... and seen them»). La versión española sigue esa lectura revisada: el objeto de «ver» queda implícito y se recupera por el antecedente inmediato «seis hijos más», sin introducir Isaac de forma innecesaria.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino, pero este versículo no lo requiere explícitamente.
  - «Descendencia» se usa de manera consistente para seed/spermatic lineage cuando el contexto es genealógico.
  - Se evita «Cristo/Mesías» porque no corresponde al contenido de este pasaje.
  - La pasiva «serían llamados» preserva la forma de nombramiento sin convertirla en una paráfrasis activa.
