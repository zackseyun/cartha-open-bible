translation:
  language: es
  text: La derribó. Y él y sus hijas también cometieron un pecado como no había habido en la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ገፍታአ።
  english_pob_choice: He overthrew it.
  chosen_spanish: Él la derribó.
  alternatives_spanish:
  - Él la destruyó.
  - La derribó.
  lexicon: verbo de destrucción/derribo
  rationale: El Ge'ez inicia con una acción de derribar o volcar el objeto referido por el contexto inmediato; el inglés POB corrigió una omisión previa y mantiene el referente pronominal 'it'. En español, 'la' conserva el antecedente femenino implícito del objeto destruido.
- source_word: ወገብረ፡ ውእቱኒ፡ ወአዋልዲሁኒ፡
  english_pob_choice: And he and his daughters also
  chosen_spanish: Y él y también sus hijas
  alternatives_spanish:
  - Y él y sus hijas también
  - Él y sus hijas asimismo
  lexicon: coordinación y adverbio de adición
  rationale: La secuencia indica que tanto él como sus hijas participan en la acción siguiente; 'también' refleja el valor aditivo del original y el ajuste del POB inglés ('he and his daughters also') sin perder naturalidad en español.
- source_word: ኀጢአተ፡
  english_pob_choice: committed sin
  chosen_spanish: cometieron pecado
  alternatives_spanish:
  - pecaron
  - cometieron pecado
  lexicon: pecar / pecado
  rationale: El sustantivo-acción del Ge'ez expresa claramente una transgresión moral; 'cometieron pecado' conserva la fuerza nominal del inglés POB y evita suavizarlo solo con 'pecaron'.
- source_word: ዲበ፡ ምድር፡
  english_pob_choice: upon the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: preposición locativa
  rationale: '''Sobre la tierra'' reproduce el valor espacial del original y la elección del inglés POB, manteniendo el matiz de extensión pública o generalizada.'
- source_word: ዘአኮ፡ ዲበ፡ ምድር፡
  english_pob_choice: such as had not been on the earth
  chosen_spanish: como no había habido sobre la tierra
  alternatives_spanish:
  - como no había existido sobre la tierra
  - tal como no había habido sobre la tierra
  lexicon: comparativo negativo
  rationale: La cláusula final compara la magnitud del pecado con algo sin precedente; 'como no había habido' sigue de cerca la estructura y conserva el sentido de singularidad extrema sin añadir explicaciones.
theological_decisions:
- issue: Relación entre el castigo divino del contexto previo y la acción del sujeto del verso
  english_pob_reading: He overthrew it. And he and his daughters also committed sin upon the earth, such as had not been on the earth.
  chosen_spanish_reading: Él la derribó. Y él y también sus hijas cometieron pecado sobre la tierra, como no había habido sobre la tierra.
  alternative_spanish_readings:
  - Él la derribó. Y él y sus hijas también pecaron sobre la tierra, como no había habido sobre la tierra.
  - Él la derribó. Y él, con sus hijas, cometió pecado sobre la tierra, como no había habido sobre la tierra.
  rationale: 'La revisión fuente-céntrica exige conservar ambas afirmaciones: el derribo del objeto en la primera cláusula y el pecado compartido en la segunda. La redacción española mantiene esa tensión sin fusionarlas ni suavizarlas.'
  doctrine_reference: Lectura narrativa de Génesis 19/Jubileos 16; juicio divino y corrupción humana coexistentes en el pasaje.
translation_notes:
  revision_awareness: 'La edición inglesa pasó por una corrección importante: se recuperó ''He overthrew it'' que había sido omitido en un borrador anterior. La traducción española incorpora esa cláusula explícitamente y no sigue la formulación errónea que hacía de la primera oración una expansión del pecado. No se requiere nota de variante textual porque el texto base ge''ez y la revisión inglesa convergen en la cláusula recuperada.'
  spanish_consistency_notes:
  - Usar 'tierra' para ምድር en sentido cosmológico/general, no 'suelo'.
  - Mantener 'pecado' como sustantivo para reflejar la sustantivación del original y la formulación inglesa revisada.
  - Evitar 'SEÑOR' u otras sustituciones; el verso no contiene el nombre divino explícito.
