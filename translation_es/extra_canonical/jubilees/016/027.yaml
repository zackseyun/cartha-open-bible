translation:
  language: es
  text: Y él bendijo y se alegró, y llamó a esta fiesta la fiesta de Yahvé, una alegría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fiesta de Yahvé, alegría».
    reason: Preserva la alternativa más literal y breve de la aposición final, paralela a la nota del rastro inglés.
lexical_decisions:
- source_word: ወባረከ
  english_pob_choice: And he blessed
  chosen_spanish: Y él bendijo
  alternatives_spanish:
  - Y bendijo
  - Y lo bendijo
  lexicon: bendecir
  rationale: El verbo Ge'ez expresa bendición en sentido normal; en español, «bendijo» conserva el acto verbal sin introducir objeto no explícito.
- source_word: ወተፈሥሐ
  english_pob_choice: and rejoiced
  chosen_spanish: y se alegró
  alternatives_spanish:
  - y se regocijó
  - y tuvo gozo
  lexicon: alegrarse
  rationale: El contexto pide una respuesta gozosa; «se alegró» es natural y fiel, y evita una sobrecarga litúrgica.
- source_word: በዓለ እግዚአብሔር
  english_pob_choice: the feast of the Lord
  chosen_spanish: la fiesta de Yahvé
  alternatives_spanish:
  - la fiesta del Señor
  - la fiesta de Dios
  lexicon: fiesta / Yahvé
  rationale: El nombre divino se vierte según el estándar POB como «Yahvé». «Fiesta» es el equivalente español directo para el término festivo/solemne del pasaje.
- source_word: ፍሥሓ
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: alegría
  rationale: La apposición final del Ge'ez funciona como una designación nominal; «alegría» reproduce bien el sustantivo breve y predicativo que sigue al título de la fiesta.
theological_decisions:
- issue: Divine name in a festal title
  english_pob_reading: the feast of the Lord
  chosen_spanish_reading: la fiesta de Yahvé
  alternative_spanish_readings:
  - la fiesta del Señor
  rationale: El texto contiene el nombre divino en la expresión titular de la fiesta; la política POB pide no ocultarlo con una máscara reverencial.
  doctrine_reference: Nombre divino / tetragrámaton
translation_notes:
  revision_awareness: La revisión inglesa más reciente osciló entre «joy» y «a joy» para reflejar mejor la apposición final; en español se resolvió con un sustantivo breve sin artículo, «alegría», que conserva la fuerza nominal del cierre sin añadir indefinición innecesaria.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar español del proyecto.
  - No se añadió artículo antes de «alegría» para respetar la apposición nominal breve del original.
  - La estructura coordinada sigue de cerca el orden del texto fuente sin calco innecesario.
