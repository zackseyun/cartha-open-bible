base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/015.yaml
  text: the covenant that is established forever. And in the sixth year of the fourth week we came to Abraham at the Well of the Oath, and we appeared to him as we had told Sarah that we would return to her and she would conceive a son.
  revision_pass:
    model: gpt-5.4
