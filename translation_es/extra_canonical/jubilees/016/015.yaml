    unchanged: false
    changes_summary: Changed 'ordained' to 'established' for more natural and precise rendering of the covenant being made/confirmed, and changed 'she would have conceived a son' to 'she would conceive a son' for correct English tense and clearer sense.
translation:
  language: es
  text: 'el pacto que está establecido para siempre. Y en el sexto año de la cuarta semana vinimos a Abraham, al Pozo del Juramento, y nos aparecimos a él, como le habíamos dicho a Sara: que volveríamos a ella y que concebiría un hijo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኪዳን (kidan)
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: Pacto; término bíblico-jurídico para un vínculo formal establecido por Dios.
  rationale: La forma española más fiel y clara para el ámbito bíblico es "pacto"; conserva el peso formal y relacional del original sin suavizarlo a un convenio genérico. Mantengo artículo definido por la referencia específica del texto.
- source_word: ተሠርዐት (tesərʿät)
  english_pob_choice: is established
  chosen_spanish: está establecido
  alternatives_spanish:
  - ha sido establecido
  - está ordenado
  lexicon: Establecer; para una acción/resultante de fijación o confirmación duradera.
  rationale: '"Está establecido" refleja mejor la idea de un pacto ya fijado/confirmado para duración permanente, y sigue la revisión inglesa que prefirió "established" frente a "ordained".'
- source_word: ለዓለም (ləʿālam)
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: Para siempre; adverbio de duración indefinida/permanente.
  rationale: '"Para siempre" es natural en español bíblico y comunica la permanencia durativa del original sin introducir tecnicismos innecesarios.'
- source_word: ኀበ፡ አብርሃም፡
  english_pob_choice: to Abraham
  chosen_spanish: a Abraham
  alternatives_spanish:
  - junto a Abraham
  - hacia Abraham
  lexicon: Preposición direccional/relacional; en este contexto indica llegada a Abraham.
  rationale: La preposición simple "a" reproduce con naturalidad la llegada/visita a Abraham, sin forzar una relación espacial más marcada de lo que el contexto exige.
- source_word: ዐዘቅተ፡ መሐላ
  english_pob_choice: the Well of the Oath
  chosen_spanish: el Pozo del Juramento
  alternatives_spanish:
  - el Pozo del Pacto
  - el Pozo del Voto
  lexicon: Pozo del Juramento; topónimo explicativo del lugar asociado al juramento.
  rationale: '"Juramento" conserva el contenido semántico de መሐላ y mantiene la referencia topográfica conocida por el relato; "pozo del pacto" debilitaría el vínculo con el juramento mismo.'
- source_word: አስተርአይናሁ
  english_pob_choice: we appeared to him
  chosen_spanish: nos aparecimos a él
  alternatives_spanish:
  - nos manifestamos a él
  - nos mostramos a él
  lexicon: Aparecerse; manifestación visible o revelación personal.
  rationale: '"Nos aparecimos a él" conserva el carácter teofánico del pasaje y corresponde bien al inglés POB, sin añadir matices interpretativos ajenos.'
- source_word: ንቤላ፡ ለሳራ፡
  english_pob_choice: we had told Sarah
  chosen_spanish: como habíamos dicho a Sara
  alternatives_spanish:
  - como le habíamos dicho a Sara
  - como habíamos anunciado a Sara
  lexicon: Decir/decirle; comunicación previa de una promesa o anuncio.
  rationale: '"Habíamos dicho a Sara" traduce el valor previo del anuncio sin sobrecargarlo; el nombre "Sara" sigue la forma hispana habitual y fiel al personaje.'
- source_word: ከመ፡ ንገብአ፡ ኀቤሃ፡
  english_pob_choice: that we would return to her
  chosen_spanish: que volveríamos a ella
  alternatives_spanish:
  - que regresaríamos a ella
  - que volveríamos junto a ella
  lexicon: Volver/regresar; retorno prometido a una persona.
  rationale: '"Volveríamos a ella" es el equivalente más directo y natural para el anuncio de retorno; evita expandir el sentido con "junto a" sin necesidad.'
- source_word: ወይእቲኒ፡*
  english_pob_choice: and she would conceive a son
  chosen_spanish: y que concebiría un hijo
  alternatives_spanish:
  - y que quedaría encinta de un hijo
  - y que tendría un hijo
  lexicon: Concebir; inicio del embarazo/engendramiento prometido.
  rationale: '"Concebiría un hijo" sigue el sentido básico del original y la revisión inglesa, preservando la promesa biológica sin paráfrasis. En español, "concebir" mantiene dignidad y precisión.'
theological_decisions:
- issue: Estatus del pacto como realidad permanente
  english_pob_reading: the covenant that is established forever
  chosen_spanish_reading: el pacto que está establecido para siempre
  alternative_spanish_readings:
  - el pacto que ha sido establecido para siempre
  - el pacto que está ordenado para siempre
  rationale: La formulación española mantiene la permanencia y la firmeza del pacto sin desplazarlo a una noción meramente decretal. Se evita "ordenado" porque la revisión inglesa ya corrigió ese matiz hacia "established".
  doctrine_reference: Teología del pacto en Jubileos; permanencia del compromiso divino.
- issue: Manifestación divina a Abraham
  english_pob_reading: we appeared to him
  chosen_spanish_reading: nos aparecimos a él
  alternative_spanish_readings:
  - nos manifestamos a él
  - nos mostramos a él
  rationale: El texto presenta una aparición real, no solo una comunicación. "Nos aparecimos" preserva la fuerza de revelación/teofanía sin explicitar más de lo que el pasaje dice.
  doctrine_reference: Teofanías patriarcales en la literatura de Jubileos.
- issue: Promesa a Sara de un hijo
  english_pob_reading: she would conceive a son
  chosen_spanish_reading: concebiría un hijo
  alternative_spanish_readings:
  - quedaría encinta de un hijo
  - tendría un hijo
  rationale: Se conserva el carácter de promesa física y concreta. "Concebiría" es más preciso que "tendría" y evita añadir el resultado final en vez del proceso prometido.
  doctrine_reference: Promesa del nacimiento de Isaac; continuidad de la promesa patriarcal.
translation_notes:
  revision_awareness: La redacción inglesa revisada sustituyó 'ordained' por 'established' y corrigió el tiempo verbal de la promesa a Sara; la versión española sigue esa decisión al usar 'está establecido' y 'concebiría'. No se introdujeron variantes textuales adicionales porque el testimonio fuente presenta alta concordancia.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente explícito.
  - Se usa "pacto" de manera consistente con el registro bíblico-jurídico del proyecto.
  - Se conserva "Sara" en forma española tradicional y plenamente reconocible.
  - No se añadieron notas al texto porque no hubo ambigüedades léxicas que requirieran marca de pie de página en la línea principal.
