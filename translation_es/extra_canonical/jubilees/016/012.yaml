translation:
  language: es
  text: Desde allí fue y habitó junto al Pozo del Juramento. Y a mediados del sexto mes el Señor visitó a Sara.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እምህየ፡
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - De allí
  - Desde ese lugar
  lexicon: deixis/transition
  rationale: El adverbio ge'ez indica desplazamiento desde un lugar ya mencionado; 'Desde allí' conserva la relación espacial y el valor narrativo de transición en español natural.
- source_word: ወኀደረ፡ ኀበ፡ ዐዘቅት፡ መሐላ።
  english_pob_choice: he dwelt by the Well of the Oath
  chosen_spanish: habitó junto al Pozo del Juramento
  alternatives_spanish:
  - habitó junto al Pozo del Pacto
  - se estableció junto al Pozo del Juramento
  lexicon: location formula / residence
  rationale: La expresión ge'ez corresponde al lugar tradicional de Beerseba, literalmente 'Pozo del Juramento'. 'Junto a' mantiene la idea de residencia cerca de un lugar, y 'Pozo del Juramento' sigue de cerca el valor léxico sin introducir una identificación interpretativa no requerida por el verso.
- source_word: ወበመንፈቀ፡ ወርኅ፡ ሳድስ፡
  english_pob_choice: And in the middle of the sixth month
  chosen_spanish: Y en la mitad del sexto mes
  alternatives_spanish:
  - Y a mediados del sexto mes
  - Y en medio del sexto mes
  lexicon: time phrase
  rationale: '''En la mitad'' reproduce con claridad la posición temporal exacta del original; ''a mediados'' sería idiomático, pero algo más libre. Se conserva la cronología con neutralidad.'
- source_word: Ἐγ| እግዚአብሔር፡
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Dios
  lexicon: divine title
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el testimonio fuente inmediato es el título equivalente de la tradición del texto; 'el Señor' refleja el audit trail inglés y evita forzar una identificación que el fragmento ge'ez no explicita de manera directa en este verso aislado.
theological_decisions:
- issue: Tratamiento del nombre divino en el pasaje
  english_pob_reading: the Lord visited Sarah
  chosen_spanish_reading: el Señor visitó a Sara
  alternative_spanish_readings:
  - Yahvé visitó a Sara
  rationale: Se conserva la lectura titulativa transmitida por el audit trail inglés. Dado que el verso, tal como está en el paquete de fuente, presenta እግዚአብሔር como título reverencial y no exige una decisión polémica sobre el tetragrámaton en esta línea concreta, 'el Señor' es la opción más prudente y coherente con el registro del texto fuente traducido.
  doctrine_reference: Divine title / reverential address
translation_notes:
  revision_awareness: 'Se corrigió la omisión detectada en la revisión previa: el segmento inicial debe incluir el desplazamiento desde allí y la residencia junto al Pozo del Juramento, no ''Oak of Mamre''. La redacción española sigue la forma revisada y evita la lectura errónea descartada por el control de calidad.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y publicable, sin arcaísmos innecesarios.
  - '''Pozo del Juramento'' conserva la transparencia semántica del topónimo tradicional sin añadir nota textual obligatoria.'
  - Se usa 'Sara' conforme al nombre propio esperado en español bíblico.
  - No se añadieron notas al pie porque no se requiere una alternativa textual anclada en este verso.
