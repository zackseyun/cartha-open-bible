revisions:
- from: Desde allí se movió y habitó junto al Pozo del Juramento. Y en la mitad del sexto mes el Señor visitó a Sara.
  to: Desde allí fue y habitó junto al Pozo del Juramento. Y a mediados del sexto mes el Señor visitó a Sara.
  rationale: 'Se ajusta la redacción para un español más natural: ''fue y habitó'' evita el calco áspero ''se movió'', y ''a mediados del sexto mes'' mejora la fluidez. Se mantiene ''el Señor'' por la justificación documentada del título divino en la fuente inmediata, aunque con cierta tensión respecto a la preferencia general por ''Yahvé''.'
