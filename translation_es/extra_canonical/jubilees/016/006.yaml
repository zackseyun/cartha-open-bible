base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/006.yaml
  text: and they defiled themselves and committed fornication in their flesh and did uncleanness on the earth. And thus the Lord will execute judgment on the places where they have acted according to the uncleanness of Sodom, just as he judged Sodom.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:11Z'
    unchanged: false
    changes_summary: Replaced 'worked uncleanness' with 'did uncleanness' for more natural formal English while preserving the source sense; replaced 'have done according to' with 'have acted according to' for smoother style and consistency with the verbal idea.
translation:
  language: es
  text: y se contaminaron y fornicaron en su carne e hicieron inmundicia en la tierra. Y así Yahvé ejecutará juicio sobre los lugares en que han actuado conforme a la inmundicia de Sodoma, tal como juzgó a Sodoma.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በሥጋሆሙ / in their flesh
  english_pob_choice: in their flesh
  chosen_spanish: en su carne
  alternatives_spanish:
  - en su cuerpo
  - en su propia carne
  lexicon: σάρξ / carne
  rationale: Mantiene la fuerza física y moral de la expresión sin suavizarla a una formulación abstracta. "Carne" conserva mejor la tensión sexual y corporal presente en el contexto que una paráfrasis como "cuerpo".
- source_word: ርኵሰ / uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - contaminación ritual
  lexicon: ἀκαθαρσία / inmundicia
  rationale: '"Inmundicia" comunica la carga moral y cultual del término con un registro bíblico claro en español. "Impureza" es posible, pero aquí puede sonar más técnico o menos enfático.'
- source_word: ወይትራኩሱ / they defiled themselves
  english_pob_choice: they defiled themselves
  chosen_spanish: se contaminaron
  alternatives_spanish:
  - se contaminaron ritualmente
  - se hicieron impuros
  lexicon: μιαίνω / contaminar, profanar
  rationale: '"Contaminaron" expresa bien el acto reflexivo y la idea de profanación moral/cultual. Se evita una traducción excesivamente litúrgica que oscurezca la acción descrita.'
- source_word: ወይገብሩ / they did
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - cometieron
  - practicaron
  lexicon: ποιέω / hacer, cometer
  rationale: Se conserva el verbo amplio del original con una forma natural en español. "Cometieron" sería posible, pero aquí "hicieron" permite repetir la estructura de la frase sin añadir una valoración no explicitada.
- source_word: ገብሩ ርኵሰ / did uncleanness
  english_pob_choice: did uncleanness
  chosen_spanish: hicieron inmundicia
  alternatives_spanish:
  - practicaron inmundicia
  - cometieron impureza
  lexicon: ποιέω + ἀκαθαρσία
  rationale: Se reproduce la construcción verbal del texto fuente sin diluirla. Aunque suena fuerte, refleja la formulación intensiva del original mejor que una paráfrasis más suave.
- source_word: ይገብር እግዚአብሔር / the Lord will execute
  english_pob_choice: the Lord will execute
  chosen_spanish: Yahvé ejecutará
  alternatives_spanish:
  - Yahvé hará
  - Yahvé traerá
  lexicon: κύριος / YHWH
  rationale: El proyecto español usa "Yahvé" para el Nombre divino cuando el texto fuente corresponde al Dios de Israel. "Ejecutará" conserva el verbo judicial del inglés auditado y del sentido forense del pasaje.
- source_word: ኵነኔ / judgment
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - castigo
  lexicon: κρίσις / juicio
  rationale: '"Juicio" mantiene el valor legal y forense del término sin reducirlo a mera sanción. "Castigo" interpretaría el resultado, pero perdería el marco judicial explícito.'
- source_word: በመካናት / on the places
  english_pob_choice: on the places
  chosen_spanish: sobre los lugares
  alternatives_spanish:
  - contra los lugares
  - en los lugares
  lexicon: τόποι / lugares
  rationale: Se conserva la referencia locativa del original. "Sobre" refleja la dirección del juicio en español y suena más natural que una construcción demasiado literal.
- source_word: በዋእደ ገብሩ / where they have acted
  english_pob_choice: where they have acted
  chosen_spanish: en que han actuado
  alternatives_spanish:
  - donde han obrado
  - en que han hecho
  lexicon: πράσσω / actuar, obrar
  rationale: '"Han actuado" sigue la revisión inglesa más reciente y evita una lectura demasiado moralizada. "Obrado" sería posible, pero "actuado" refleja mejor el audit trail y el estilo actual.'
- source_word: በከመ ርኵሶሙ ለሰዶም / according to the uncleanness of Sodom
  english_pob_choice: according to the uncleanness of Sodom
  chosen_spanish: conforme a la inmundicia de Sodoma
  alternatives_spanish:
  - según la inmundicia de Sodoma
  - de acuerdo con la inmundicia de Sodoma
  lexicon: κατά + ἀκαθαρσία
  rationale: '"Conforme a" preserva la relación normativa o de conformidad del original. Se mantiene "Sodoma" como referencia histórica y tipológica sin interpretarla más allá del texto.'
- source_word: ከመ ኰነና / just as he judged
  english_pob_choice: just as he judged
  chosen_spanish: así como juzgó
  alternatives_spanish:
  - tal como juzgó
  - igual que juzgó
  lexicon: καθώς / como
  rationale: La forma escogida reproduce la comparación final con claridad y solemnidad. No se añade nada al sujeto implícito, que ya está claro en el contexto inmediato.
theological_decisions:
- issue: Nombre divino en el juicio
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Dios
  rationale: En la política del proyecto, el Nombre divino se vierte como "Yahvé" cuando el contexto corresponde al Dios de Israel. Aquí el juicio sobre Sodoma conecta con la acción divina del pacto, por lo que no se enmascara el nombre con "el Señor".
  doctrine_reference: Éxodo 3:15; práctica terminológica del POB español
- issue: Lenguaje de inmundicia y fornicación
  english_pob_reading: defiled themselves ... fornication ... uncleanness
  chosen_spanish_reading: se contaminaron, y fornicaron ... e hicieron inmundicia
  alternative_spanish_readings:
  - se hicieron impuros ... cometieron fornicación ... practicaron impureza
  - se profanaron ... tuvieron relaciones ilícitas ...
  rationale: Se conserva la triple secuencia de corrupción moral/cultual sin aplanarla en una sola idea. "Fornicaron" mantiene la franqueza del texto y evita suavizar una tensión sexual explícita.
  doctrine_reference: Levítico 18; Judas 7; 2 Pedro 2:6-7
- issue: Juicio retributivo sobre Sodoma y sus lugares
  english_pob_reading: will execute judgment on the places ... just as he judged Sodom
  chosen_spanish_reading: ejecutará juicio sobre los lugares ... así como juzgó a Sodoma
  alternative_spanish_readings:
  - traerá juicio sobre los lugares ...
  - sentenciará los lugares ...
  rationale: El pasaje presenta una retribución modelada en el juicio histórico de Sodoma. "Ejecutará juicio" conserva el tono judicial y evita convertir el dicho en mera amenaza general.
  doctrine_reference: Génesis 19; Sabiduría 10:6-8; Judas 7
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del inglés auditado, que ajustó "worked uncleanness" a "did uncleanness" y "have done according to" a "have acted according to" para un inglés más natural sin alterar el sentido. La versión española sigue ese movimiento con una sintaxis igualmente natural: "hicieron inmundicia" y "han actuado conforme a".'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" según la terminología del proyecto para el Nombre divino.
  - '"Inmundicia" y "contaminaron" se usan de forma coherente para conservar la dimensión moral/cultual del pasaje.'
  - No se introduce "Cristo" ni terminología eclesiástica ajena al texto.
  - La frase final conserva la comparación con Sodoma sin ampliarla interpretativamente.
