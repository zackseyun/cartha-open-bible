lexical_decisions:
- source_word: ለሎጥ
  english_pob_choice: Lot
  chosen_spanish: Lot
  alternatives_spanish:
  - Lot
  lexicon: JUB 16:7
  rationale: Nombre propio mantenido sin adaptación, conforme al uso bíblico en español.
- source_word: ናድኅኖ
  english_pob_choice: we saved
  chosen_spanish: lo salvamos
  alternatives_spanish:
  - salvamos a Lot
  - lo rescatamos
  lexicon: JUB 16:7
  rationale: El verbo expresa librar/rescatar del juicio; en español, «salvar» conserva bien el valor de liberación providencial que refleja la tradición textual y el audit trail inglés.
- source_word: ተዘከሮ
  english_pob_choice: remembered
  chosen_spanish: se acordó
  alternatives_spanish:
  - recordó
  - tuvo presente
  lexicon: JUB 16:7
  rationale: «Acordarse» comunica el acto relacional y efectivo de recordar en sentido bíblico, sin reducirlo a mera memoria mental.
- source_word: ወአውፅኦ
  english_pob_choice: brought him out
  chosen_spanish: lo sacó
  alternatives_spanish:
  - lo hizo salir
  - lo trajo fuera
  lexicon: JUB 16:7
  rationale: El verbo idiomático español «sacar» expresa con naturalidad la idea de hacer salir de un lugar o situación; el contexto identifica a Lot como objeto implícito de la acción.
theological_decisions:
- issue: A quién se refiere el sujeto de «salvamos»
  english_pob_reading: But Lot we saved
  chosen_spanish_reading: Pero a Lot lo salvamos
  alternative_spanish_readings:
  - Pero Lot fue salvado
  - Pero a Lot salvamos
  rationale: Se mantiene la voz activa e inclusiva del texto base, que en este tipo de relato preserva el agente del rescate sin borrar la mediación divina que sigue en la cláusula causal.
  doctrine_reference: Providencia divina en el juicio; salvación como acto de Dios que puede expresarse en primera persona narrativa.
- issue: Causa del rescate
  english_pob_reading: because God remembered Abraham
  chosen_spanish_reading: porque Dios se acordó de Abraham
  alternative_spanish_readings:
  - pues Dios recordó a Abraham
  - porque Yahvé se acordó de Abraham
  rationale: Se conserva la causalidad explícita del texto inglés revisado y la referencia a Dios sin sustituir el sujeto por un nombre distinto, dado que el ge'ez dice እግዚአብሔር (Yahvé) mientras el POB inglés optó por «God».
  doctrine_reference: Relación pacto-memoria divina; fidelidad de Dios a Abraham.
- issue: Destrucción / overthrow
  english_pob_reading: from the midst of the overthrow
  chosen_spanish_reading: de en medio de la destrucción
  alternative_spanish_readings:
  - de en medio del derribo
  - de en medio del trastorno
  rationale: «Destrucción» ofrece el sentido más claro y amplio del juicio sobre Sodoma en español contemporáneo, sin cargar una interpretación técnica no necesaria para este versículo.
  doctrine_reference: Juicio divino sobre Sodoma y liberación de Lot.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «for» por «because» para hacer más clara la causalidad; la versión española refleja esa misma relación causal con «porque», y mantiene el complemento implícito de «lo sacó» como Lot, según la lectura consolidada del audit trail.
  spanish_consistency_notes:
  - Se usa «Dios» conforme al texto inglés auditado, aunque el ge'ez subyacente contiene እግዚአብሔር; no se introduce «Yahvé» porque el POB inglés no hizo esa opción aquí.
  - Se conserva el tono narrativo breve y directo del pasaje, sin ampliar el contenido más allá de la evidencia textual.
  - «Salvar» y «sacar» se coordinan para reflejar la liberación efectiva desde el juicio, con sintaxis natural en español.
