base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/031.yaml
  text: And Abraham took branches of palm trees and fruit of beautiful trees, and every day he went around the altar with the branches seven times; and in the morning he praised and gave thanks to his God for everything with joy.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:11Z'
    unchanged: false
    changes_summary: Removed the added phrase 'each day' after 'seven times' to avoid redundancy not clearly expressed in the source, and adjusted 'in joy' to the more natural formal rendering 'with joy.'
translation:
  language: es
  text: Y Abraham tomó ramas de palmeras y fruto de árboles hermosos, y cada día rodeaba el altar con las ramas siete veces; y por la mañana alabó y dio gracias a su Dios por todo con alegría.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እሙሐዝ / tomó
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recogió
  - levantó
  lexicon: N/A
  rationale: El verbo de la fuente expresa la acción simple de tomar/obtener; “tomó” reproduce con naturalidad el valor narrativo sin añadir matices no atestiguados.
- source_word: ልበ ፀበርት
  english_pob_choice: branches of palm trees
  chosen_spanish: ramas de palmeras
  alternatives_spanish:
  - ramas de palmas
  - ramas de palmera
  lexicon: N/A
  rationale: La imagen es vegetal y concreta; “palmeras” comunica bien en español moderno, y mantiene la referencia a ramas de palma sin volverlo litúrgico o interpretativo.
- source_word: ፍሬ ዕፀ ሠናይ
  english_pob_choice: fruit of beautiful trees
  chosen_spanish: fruto de árboles hermosos
  alternatives_spanish:
  - fruto de árboles bellos
  - frutos de árboles hermosos
  lexicon: N/A
  rationale: Conservo el paralelismo del inglés POB y la cualidad estética de la fuente. “Fruto” en singular colectivo refleja mejor el sustantivo sin necesidad de pluralizarlo.
- source_word: የዐውድ ምሥዋዐ
  english_pob_choice: went around the altar
  chosen_spanish: rodeó el altar
  alternatives_spanish:
  - dio vueltas alrededor del altar
  - circundó el altar
  lexicon: N/A
  rationale: El verbo indica movimiento circular alrededor del altar; “rodeó” es idiomático y fiel, sin cargar el texto con una perífrasis más larga.
- source_word: በአዕፁቅ ስብዕ
  english_pob_choice: with the branches seven times
  chosen_spanish: con las ramas siete veces
  alternatives_spanish:
  - siete veces con las ramas
  - con las ramas, siete veces
  lexicon: N/A
  rationale: Sigo la revisión inglesa que evita la redundancia “cada día”; en español, la colocación mantiene la asociación entre las ramas y el número siete sin añadir elementos.
- source_word: በጽባሕ
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  lexicon: N/A
  rationale: “Por la mañana” es una forma natural y fiel para el marco temporal matutino.
- source_word: ይሴብሕ ወይጌኒ
  english_pob_choice: praised and gave thanks
  chosen_spanish: alabó y dio gracias
  alternatives_spanish:
  - bendijo y dio gracias
  - alabó y agradeció
  lexicon: N/A
  rationale: La dupla verbal expresa dos acciones distintas y usuales para la alabanza cultual; “dio gracias” preserva el segundo verbo sin fundirlo en un solo término.
- source_word: ለአምላኩ
  english_pob_choice: to his God
  chosen_spanish: a su Dios
  alternatives_spanish:
  - a su Dios
  - a su propio Dios
  lexicon: N/A
  rationale: La posesión se expresa naturalmente con “su Dios”; “propio” sería redundante en español y no añade precisión exigida por la fuente.
- source_word: ዘበፍሥሓ
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - en alegría
  lexicon: N/A
  rationale: La fuente señala el modo gozoso de la acción; “con alegría” es la equivalencia más transparente y fluida para el registro deseado.
theological_decisions:
- issue: Relación entre la acción ritual y la alabanza a Dios
  english_pob_reading: Abraham performs the altar-circling and then praises and gives thanks to his God for everything with joy.
  chosen_spanish_reading: Abraham realiza el giro ritual alrededor del altar y luego alaba y da gracias a su Dios por todo con alegría.
  alternative_spanish_readings:
  - Abraham rodea el altar como acto de devoción y después alaba y da gracias a su Dios por todo con alegría.
  - Abraham rodeó el altar y en la mañana alabó y dio gracias a su Dios por todo con alegría.
  rationale: La fuente yuxtapone el gesto ritual y la respuesta doxológica sin explicarlos teológicamente; mantengo esa secuencia sin inferir más significado del que el texto da.
  doctrine_reference: Narrative piety; no doctrinal expansion beyond the source
- issue: Divine reference
  english_pob_reading: his God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - su Dios
  rationale: La fuente no introduce nombre divino explícito ni una forma honorífica alternativa; “su Dios” conserva la referencia relacional sin alterar el dato textual.
  doctrine_reference: Theological reference without named divine title
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó la redundancia de ''each day'' después de ''seven times'' y prefirió ''with joy'' para un giro más natural. El español sigue esa decisión: no añade una repetición temporal y usa ''con alegría'' como equivalente idiomático y fiel. No se detectan variantes textuales adicionales en el paquete provisto.'
  spanish_consistency_notes:
  - Se mantiene un español bíblico moderno, claro y publicable, sin calcos innecesarios.
  - No se introduce 'SEÑOR' porque la fuente dice 'su Dios' y no hay nombre divino explícito en este versículo.
  - '''Con alegría'' conserva el matiz adverbial del cierre sin sobrecargarlo con formulación litúrgica.'
  - La numeración 'siete veces' se conserva junto al acto de rodear el altar, tal como refleja la revisión inglesa aprobada.
