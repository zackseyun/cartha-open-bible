translation:
  language: es
  text: un sacerdocio y un pueblo santo. Y siguió su camino, y se alegró y bendijo al Creador de todo[a] porque le habíamos dicho eso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bendijo al Señor por todo lo que le habíamos dicho». La lectura base sigue aquí el texto geʽez: «bendijo al Creador de todo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ዘክህነት
  english_pob_choice: a priesthood
  chosen_spanish: un sacerdocio
  alternatives_spanish:
  - un cuerpo sacerdotal
  - un grupo de sacerdotes
  lexicon: collective noun
  rationale: El ge'ez expresa un colectivo, no simplemente una pluralidad de individuos. «Sacerdocio» conserva esa fuerza colectiva y sigue la revisión inglesa que corrigió «of priests» por «a priesthood».
- source_word: ወሕዝበ፡ ቅዱሰ
  english_pob_choice: and a holy people
  chosen_spanish: y un pueblo santo
  alternatives_spanish:
  - y un pueblo consagrado
  - y un pueblo sagrado
  lexicon: holy / people
  rationale: «Pueblo santo» es la forma más natural y fiel en español para el binomio bíblico de pueblo apartado para Dios, sin diluir la santidad en una mera cualidad moral.
- source_word: ወፈጥሪ ኵሉ
  english_pob_choice: the Creator of all
  chosen_spanish: el Creador de todo
  alternatives_spanish:
  - el Creador de todas las cosas
  - el Creador de todo cuanto existe
  lexicon: Creator of all
  rationale: La revisión inglesa corrigió el error previo y fijó «Creator of all». «De todo» reproduce la totalidad sin añadir una perífrasis innecesaria.
- source_word: ወተፈሥሐ
  english_pob_choice: he rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se gozó
  lexicon: rejoiced
  rationale: «Se alegró» es idiomático y suficientemente fuerte en español moderno; mantiene el matiz de júbilo sin sonar arcaico.
theological_decisions:
- issue: 'Title for God: Creator vs. Lord'
  english_pob_reading: blessed the Creator of all
  chosen_spanish_reading: bendijo al Creador de todo
  alternative_spanish_readings:
  - bendijo al Señor
  - bendijo a Dios
  rationale: El ge'ez especifica «Creador de todo», y la revisión inglesa corrigió expresamente la lectura teológica. En español debe conservarse ese título particular en lugar de sustituirlo por «Señor».
  doctrine_reference: Creación / título divino específico
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «blessed the Lord for all that we had told him» a «blessed the Creator of all because we had told him» tras revisión del ge'ez. La redacción española sigue la lectura corregida, manteniendo la relación causal («porque») y el título divino específico («Creador de todo»).
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el Tetragrámaton, pero aquí el texto fuente no usa ese nombre sino un título creador; por eso no se introduce.
  - «Sacerdocio» conserva el valor colectivo del sustantivo ge'ez y de la revisión inglesa.
  - La nota [a] está anclada en el verbo «bendijo» porque recoge la alternativa de traducción completa del sintagma final.
