  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኀበ
  english_pob_choice: near
  chosen_spanish: junto a
  alternatives_spanish:
  - cerca de
  - al lado de
  lexicon: adverbial/prepositional proximity
  rationale: El ge'ez expresa proximidad locativa; «junto a» conserva la relación espacial de forma natural en español sin añadir distancia ni dirección.
- source_word: ምሥዋዕ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar sacrificial
  lexicon: cultic object
  rationale: Corresponde directamente al objeto cultual mencionado; en español «altar» es claro y fiel, sin necesidad de expansión.
- source_word: ዘሐነጸ
  english_pob_choice: that he had built
  chosen_spanish: que había construido
  alternatives_spanish:
  - que edificó
  - que había edificado
  lexicon: verb of construction
  rationale: El pluscuamperfecto refleja bien la anterioridad respecto a la escena actual y mantiene la acción ya completada.
- source_word: መሐላ
  english_pob_choice: Well of the Oath
  chosen_spanish: Pozo del Juramento
  alternatives_spanish:
  - Pozo del Pacto
  - Pozo de la Promesa
  lexicon: toponymic literal sense
  rationale: 'El nombre propio se traduce según su sentido léxico evidente en la fuente: un pozo asociado al juramento. «Juramento» es la opción más literal y estable en español.'
- source_word: ምጽላላተ
  english_pob_choice: booths
  chosen_spanish: chozas
  alternatives_spanish:
  - cabañas
  - enramadas
  - tiendas
  lexicon: festival shelters
  rationale: La forma alude a cobertizos o refugios temporales del festival; «chozas» es comprensible y mantiene la materialidad sencilla del término, aunque no fija todavía la identificación litúrgica técnica que el contexto mayor del libro desarrolla.
- source_word: አግብርቲሁ
  english_pob_choice: his servants
  chosen_spanish: sus esclavos
  alternatives_spanish:
  - sus siervos
  - sus servidores
  lexicon: social-status term
  rationale: Para POB, cuando el término fuente indica dependencia servil, «esclavos» preserva la fuerza léxica mejor que «siervos», que suaviza el estatus social.
theological_decisions:
- issue: Alcance del pasaje en la unidad textual
  english_pob_reading: The English draft included an extra clause from the previous verse and omitted the final clause of this verse; the corrected source-grounded rendering should only cover the Ge'ez present here.
  chosen_spanish_reading: 'solo el tramo atestiguado por el ge''ez: «junto al altar... y construyó chozas...»'
  alternative_spanish_readings:
  - añadir una celebración de siete días
  - añadir que fue el primero en celebrar la fiesta de las chozas en la tierra
  rationale: La fuente ge'ez proporcionada para este versículo contiene únicamente la localización junto al altar y la construcción de chozas; no debe importarse material ausente ni de otro versículo ni de una recensión incompleta.
  doctrine_reference: principio de integridad textual y delimitación versicular
- issue: Terminología del festival en el trasfondo contextual
  english_pob_reading: booths
  chosen_spanish_reading: chozas
  alternative_spanish_readings:
  - tabernáculos
  - enramadas
  rationale: Aunque el libro mayor puede relacionar este término con la fiesta de las chozas, el tramo aquí dado no desarrolla aún esa identificación litúrgica; por eso se mantiene el sentido básico de refugios temporales.
  doctrine_reference: lectura contextual sin sobredeterminación litúrgica
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando toda nota al pie no anclada. La traducción sigue estrictamente el texto ge'ez provisto para JUB 16:21 y no incorpora la cláusula extra que apareció en el inglés previo ni la cláusula final ausente en ambos textos de trabajo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando corresponda; aquí no aparece porque el versículo no contiene el tetragrámaton.
  - Se usa «esclavos» para አግብርቲሁ conforme al criterio léxico de POB cuando el término marca dependencia servil.
  - No se introduce «Cristo» ni otras fórmulas eclesiásticas ajenas al texto.
  - La traducción conserva el carácter narrativo sobrio y no añade detalles interpretativos ausentes.
