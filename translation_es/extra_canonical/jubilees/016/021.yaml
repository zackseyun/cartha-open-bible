    issue: «sus esclavos» intensifica indebidamente respecto del inglés POB 'his servants'
    rationale: La política del proyecto favorece «esclavo» cuando el expediente inglés documenta 'slave'. En este versículo el inglés dice 'servants' y no hay decisión léxica inglesa que justifique endurecerlo en español.
  - severity: low
    issue: «chozas» es una opción menos precisa/estilísticamente adecuada para ምጽላላተ
    rationale: Aunque semánticamente posible, «cabañas» comunica mejor refugios temporales en un registro bíblico legible, sin introducir la sobredeterminación litúrgica de «tabernáculos».
  revised_spanish_text: junto al altar que había construido en el Pozo del Juramento. Y construyó cabañas para él y para sus siervos.
  revision_rationale: 'Se conserva la fidelidad al ge''ez y al inglés POB corregido, pero se ajustan dos elecciones léxicas: «cabañas» mejora la naturalidad y precisión para refugios temporales, y «siervos» evita una intensificación no respaldada por el expediente fuente, alineándose con ''servants''.'
