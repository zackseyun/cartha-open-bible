revisions:
- from: Es un estatuto perpetuo[a] para sus generaciones, año tras año. Y no hay límite de días para esto, porque está ordenado para siempre para Israel, para que lo celebren y habiten en tiendas, y lleven coronas sobre sus cabezas y tomen ramas de hojas y sauces.
  to: Es un estatuto perpetuo[a] para sus generaciones, año tras año. Y no hay límite de días para esto, porque está ordenado para siempre para Israel, para que lo celebren y habiten en cabañas, y lleven coronas sobre sus cabezas y tomen ramas frondosas y sauces.
  rationale: 'Se hicieron dos ajustes de estilo-fidelidad: «tiendas» → «cabañas» para reflejar mejor el contexto de booths en español general, y «ramas de hojas» → «ramas frondosas» para evitar un calco poco idiomático manteniendo el sentido de leafy branches. El resto del borrador preserva bien el contenido fuente y la decisión auditada de no añadir «del arroyo».'
