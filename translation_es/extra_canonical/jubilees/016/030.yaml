base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/030.yaml
  text: It is an everlasting statute throughout their generations, year by year. And there is no limit of days for this, for it is ordained forever for Israel, that they should celebrate it and dwell in booths and wear crowns on their heads and take leafy branches and willows.
  footnotes:
  - marker: a
    text: Or 'and willows from the brook.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:11Z'
    unchanged: false
    changes_summary: Added the implied copula at the start for natural English, changed 'in every year' to 'year by year,' and 'place crowns' to 'wear crowns' for more natural formal phrasing while preserving the source meaning.
translation:
  language: es
  text: Es un estatuto perpetuo[a] para sus generaciones, año tras año. Y no hay límite de días para esto, porque está ordenado para siempre para Israel, para que lo celebren y habiten en cabañas, y lleven coronas sobre sus cabezas y tomen ramas frondosas y sauces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estatuto eterno».
    reason: lexical_alternative
lexical_decisions:
- source_word: ሕገ፡ ዘለዓለም፡
  english_pob_choice: everlasting statute
  chosen_spanish: estatuto perpetuo
  alternatives_spanish:
  - estatuto eterno
  - mandamiento perpetuo
  lexicon: statute; everlasting
  rationale: «Estatuto» conserva el matiz jurídico-normativo de la fórmula; «perpetuo» refleja mejor que el mandato dura sin término. «Eterno» es posible, pero en español puede sonar más abstracto que la idea de vigencia continua de una disposición.
- source_word: በትውልዶሙ፡
  english_pob_choice: throughout their generations
  chosen_spanish: para sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - por todas sus generaciones
  lexicon: generations
  rationale: La construcción «para sus generaciones» es natural en español bíblico y mantiene la referencia a la vigencia intergeneracional del estatuto.
- source_word: በኵሉ፡ ዓመት፡ ወዓመት።
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - año por año
  - cada año
  lexicon: year by year
  rationale: «Año tras año» reproduce la reiteración distributiva del original y suena idiomático en español contemporáneo.
- source_word: ወአልቦ፡ ለዝንቱ፡ ወሰነ፡ መዋዕል፡
  english_pob_choice: And there is no limit of days for this
  chosen_spanish: Y no hay límite de días para esto
  alternatives_spanish:
  - Y para esto no hay plazo de días
  - Y esto no tiene límite de días
  lexicon: no limit of days
  rationale: «Límite de días» conserva la expresión concreta del original sin suavizarla en exceso; «plazo» introduciría una connotación más moderna/jurídica que no está exigida.
- source_word: ለዓለም፡
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: forever
  rationale: «Para siempre» es la forma más transparente y natural para expresar duración indefinida en español.
- source_word: ሥሩዕ፡ ላዕለ፡ እስራኤል፡
  english_pob_choice: it is ordained forever for Israel
  chosen_spanish: está ordenado para siempre para Israel
  alternatives_spanish:
  - fue ordenado para siempre para Israel
  - está establecido para siempre para Israel
  lexicon: ordained/established
  rationale: «Está ordenado» refleja la pasiva resultativa del original y mantiene el carácter normativo; «establecido» sería una alternativa válida, pero «ordenado» se alinea mejor con el lenguaje legal del pasaje.
- source_word: ከመ፡ ይግበርዎ፡
  english_pob_choice: that they should celebrate it
  chosen_spanish: para que lo celebren
  alternatives_spanish:
  - para que lo festejen
  - para que hagan su celebración
  lexicon: celebrate
  rationale: «Celebrar» mantiene el sentido cultual/festivo sin caer en un giro demasiado interpretativo.
- source_word: ወይነበሩ፡ ውስተ፡ ምጽላል፡
  english_pob_choice: and dwell in booths
  chosen_spanish: y habiten en tiendas
  alternatives_spanish:
  - y moren en tiendas
  - y vivan en enramadas
  lexicon: booths
  rationale: «Tiendas» preserva el sentido de estructuras temporales y es comprensible en español bíblico; «enramadas» podría evocar más específicamente un elemento vegetal, pero estrecha innecesariamente el término.
- source_word: ወከመ፡ ይንበሩ፡ አክሊላተ፡ ውስተ፡ ርእሶሙ፡
  english_pob_choice: and wear crowns on their heads
  chosen_spanish: y lleven coronas sobre sus cabezas
  alternatives_spanish:
  - y pongan coronas sobre sus cabezas
  - y usen coronas en sus cabezas
  lexicon: crowns
  rationale: «Lleven coronas» traduce naturalmente la acción de portar adorno en la cabeza, evitando «poner» que podría sugerir solo el acto de colocarlas.
- source_word: ወከመ፡ ይንሥኡ፡ ዐጽቀ፡ ቈጽል፡
  english_pob_choice: and take leafy branches
  chosen_spanish: y tomen ramas de hojas
  alternatives_spanish:
  - y tomen ramas con hojas
  - y tomen ramas frondosas
  lexicon: leafy branches
  rationale: El ge'ez habla literalmente de «ramas de hojas»; aunque suene menos idiomático, esta redacción conserva con mayor fidelidad la imagen concreta del texto base.
- source_word: ውኩሓ፡
  english_pob_choice: willows
  chosen_spanish: sauces
  alternatives_spanish:
  - sauces del arroyo
  - sauces de la corriente
  lexicon: willows
  rationale: «Sauces» es la equivalencia española directa y suficiente para el término botánico. No se añadió «del arroyo» porque la revisión del POB inglés corrigió esa ampliación como no sustentada por el ge'ez.
theological_decisions:
- issue: Duración normativa del estatuto
  english_pob_reading: everlasting statute ... no limit of days ... ordained forever
  chosen_spanish_reading: estatuto perpetuo ... no hay límite de días ... está ordenado para siempre
  alternative_spanish_readings:
  - estatuto eterno ... no tiene plazo ...
  - mandato perpetuo ...
  rationale: 'Se mantiene la triple intensificación temporal del texto: perpetuo, sin límite de días y para siempre. No se suaviza hacia una simple costumbre, porque el pasaje presenta una ordenanza vinculante para Israel.'
  doctrine_reference: norma ritual/covenantal en el marco de la Torá y la literatura jubilar
- issue: Crown imagery
  english_pob_reading: wear crowns on their heads
  chosen_spanish_reading: lleven coronas sobre sus cabezas
  alternative_spanish_readings:
  - pongan coronas sobre sus cabezas
  - usen coronas sobre sus cabezas
  rationale: Se conserva la imagen ceremonial sin interpretar el símbolo; el texto manda portar coronas, no necesariamente explicarlas.
  doctrine_reference: simbolismo ritual/cultual
- issue: Willows without added source material
  english_pob_reading: and willows
  chosen_spanish_reading: y sauces
  alternative_spanish_readings:
  - y sauces del arroyo
  rationale: La revisión inglesa eliminó «from the brook» por no estar en el ge'ez. La traducción española evita añadir esa especificación para no reintroducir una armonización ajena al texto fuente.
  doctrine_reference: fidelidad textual frente a armonización intertextual
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «place crowns» a «wear crowns» por naturalidad, y de «willows from the brook» a «willows» por corrección textual. La redacción española refleja ambas decisiones: usa un verbo de portar/llevar y no añade ninguna procedencia para los sauces.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa un registro bíblico claro y moderno, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
  - No se introduce «SEÑOR» ni «Cristo», porque el verso no lo requiere.
  - La nota [a] está anclada directamente en «estatuto perpetuo[a]» para cumplir la validación de marcador.
