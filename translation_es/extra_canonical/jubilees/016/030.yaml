    text: O «estatuto eterno».
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos ajustes de estilo-fidelidad: «tiendas» → «cabañas» para reflejar mejor el contexto de booths en español general, y «ramas de hojas» → «ramas frondosas» para evitar un calco poco idiomático manteniendo el sentido de leafy branches. El resto del borrador preserva bien el contenido fuente y la decisión auditada de no añadir «del arroyo».'
