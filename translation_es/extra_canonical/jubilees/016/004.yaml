review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del ge''ez y sigue la revisión inglesa clave: ስሙ = «su nombre», ገባእነ = «regresamos/volvimos» como retorno, y «las tablas celestiales» para el registro celestial. Sin embargo, la nota [b] no preserva fielmente la alternativa inglesa documentada («we came»), porque «volvimos» sigue expresando retorno en vez de la alternativa más amplia «vinimos/llegamos».'
  spanish_quality_summary: El español es claro, natural y de registro adecuado. La sintaxis principal funciona bien. Solo conviene ajustar la nota [b] para que corresponda al expediente auditado, y armonizar la razón de la nota [a] con «previous_rendering» más que «alternative_reading», aunque esto es secundario.
  glossary_alignment: No hay términos del glosario mayor en disputa. «Tablas celestiales», «su nombre», «regresamos», «en el tiempo señalado» y «concibió y dio a luz un hijo» son adecuados y legibles.
  issues:
  - severity: medium
    issue: La nota [b] traduce la alternativa inglesa «we came» como «volvimos a ella».
    rationale: La alternativa auditada en inglés contrasta «returned» con «came». En español, «volvimos» conserva el mismo matiz de retorno que el texto principal «regresamos», por lo que no representa la alternativa real. Debe decir «vinimos a ella» o similar.
  - severity: low
    issue: La razón de la nota [a] podría reflejar mejor que se trata de una redacción anterior/alternativa de orden, no de una diferencia semántica nueva.
    rationale: No afecta el texto bíblico, pero el expediente inglés la clasifica como previous_rendering. Aun así, esto no requiere adjudicación especial.
  revised_spanish_text: y su nombre, Isaac, fue escrito en las tablas celestiales[a]. Y cuando regresamos a ella[b] en el tiempo señalado, concibió y dio a luz un hijo.
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «y su nombre fue escrito en las tablas celestiales, Isaac».'
    reason: previous_rendering
  - marker: b
    text: 'También puede traducirse: «y cuando vinimos a ella».'
    reason: previous_rendering
  revision_rationale: Se conserva el texto principal, que ya es fiel y natural, y se corrige la nota [b] para que preserve la alternativa inglesa documentada («we came») sin repetir el matiz de retorno del texto principal. También se normaliza la razón de ambas notas a «previous_rendering», conforme al expediente auditado.
