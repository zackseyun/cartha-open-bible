translation:
  language: es
  text: y su nombre, Isaac, fue escrito en las tablas celestiales[a]. Y cuando regresamos a ella[b] en el tiempo señalado, concibió y dio a luz un hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «y su nombre fue escrito en las tablas celestiales, Isaac».'
    reason: alternative_reading
  - marker: b
    text: 'También puede traducirse: «y cuando volvimos a ella».'
    reason: alternative_reading
lexical_decisions:
- source_word: ስሙ / his name
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: nombre
  rationale: El ge'ez expresa posesión; en español, «su nombre» conserva esa relación de manera natural y directa.
- source_word: ውስተ፡ ጽላተ፡ ሰማይ / on the heavenly tablets
  english_pob_choice: on the heavenly tablets
  chosen_spanish: en las tablas celestiales
  alternatives_spanish:
  - sobre las tablas celestiales
  - en las tablas del cielo
  lexicon: tablas celestiales
  rationale: «Tablas celestiales» reproduce el referente del texto y su tono apocalíptico; «en» refleja la localización de escrito.
- source_word: ገባእነ / we returned
  english_pob_choice: we returned
  chosen_spanish: regresamos
  alternatives_spanish:
  - volvimos
  lexicon: regresar
  rationale: La revisión inglesa establece el valor de «returned»; en español «regresamos» comunica con claridad el movimiento de retorno sin introducir matiz extra.
- source_word: በጊዜ፡ ሰዓት / at the appointed time
  english_pob_choice: at the appointed time
  chosen_spanish: en el tiempo señalado
  alternatives_spanish:
  - a la hora señalada
  - en el momento designado
  lexicon: tiempo señalado
  rationale: La frase española mantiene el sentido de tiempo fijado o designado, con un registro bíblico claro y natural.
- source_word: ወይእቲ / she
  english_pob_choice: she
  chosen_spanish: ella
  lexicon: pronombre
  rationale: Se conserva el sujeto explícito para evitar ambigüedad en una oración con varios participantes.
- source_word: conceived and bore a son
  english_pob_choice: she conceived and bore a son
  chosen_spanish: concibió y dio a luz un hijo
  alternatives_spanish:
  - quedó encinta y dio a luz un hijo
  lexicon: concebir / dar a luz
  rationale: La formulación sigue de cerca la secuencia verbal del original y mantiene el paralelismo narrativo del inglés auditado.
theological_decisions:
- issue: La identidad y estatus de Isaac en las tablas celestiales
  english_pob_reading: and his name, Isaac, was written on the heavenly tablets
  chosen_spanish_reading: y su nombre, Isaac, fue escrito en las tablas celestiales
  alternative_spanish_readings:
  - y el nombre de Isaac fue escrito en las tablas celestiales
  rationale: Se conserva la afirmación literal de registro celestial sin suavizarla ni explicarla, porque forma parte del imaginario teológico propio de Jubileos.
  doctrine_reference: Jubileos 16:4; tradición de las tablas celestiales en literatura del Segundo Templo
- issue: El valor de la vuelta de los mensajeros
  english_pob_reading: And when we returned to her at the appointed time
  chosen_spanish_reading: Y cuando regresamos a ella en el tiempo señalado
  alternative_spanish_readings:
  - Y cuando volvimos a ella en el tiempo señalado
  rationale: Se mantiene el retorno de los visitantes como hecho narrativo concreto, sin interpretar más allá del texto.
  doctrine_reference: Génesis 18:14 en su eco intertextual
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió el sentido de ስሙ como posesivo («his name») y ገባእነ como «returned». La versión española sigue esas decisiones, pero conserva una sintaxis natural y pública en español.
  spanish_consistency_notes:
  - «Tablas celestiales» mantiene la terminología de la tradición de Jubileos y evita reemplazarla por una paráfrasis interpretativa.
  - Se preserva la distinción entre «regresamos» y «volvimos» como alternativa válida, pero no se introduce en el texto principal.
  - El orden de «su nombre, Isaac» sigue la equivalencia auditable del inglés revisado, con puntuación española natural.
