base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/018.yaml
  text: And Isaac alone would become a holy seed, and he would not be reckoned among the nations, for he would become the portion of the Most High, and all his seed had fallen to the lot of God, that it should become for the Lord a people for possession out of all peoples, and that it should become a kingdom
  footnotes:
  - marker: a
    text: Or 'And Isaac would become a holy seed'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:11Z'
    unchanged: false
    changes_summary: Replaced vague 'that one' with 'Isaac' to reflect the explicit subject in the source. Kept the rest substantially unchanged as accurate and formal.
translation:
  language: es
  text: Y solo Isaac llegaría a ser semilla santa, y no sería contado entre las naciones, porque llegaría a ser la porción del Altísimo, y toda su descendencia había caído en la suerte de Dios, para que llegara a ser para Yahvé un pueblo de posesión[a] de entre todos los pueblos, y para que llegara a ser un reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un pueblo propio».'
    reason: alternative_idiomatic_rendering
lexical_decisions:
- source_word: አሐዱ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - solo él
  lexicon: No inventado
  rationale: El Geʽez añade la idea de exclusividad; la revisión inglesa la recupera con 'alone'. 'Solo' comunica esa exclusión con naturalidad en español y mantiene la fuerza teológica de que Isaac, y no otro linaje, es la semilla santa.
- source_word: ዘርእ፡ ቅዱስ፡
  english_pob_choice: holy seed
  chosen_spanish: semilla santa
  alternatives_spanish:
  - descendencia santa
  - linaje santo
  lexicon: No inventado
  rationale: '''Seed'' en este contexto genealógico tiene sentido de descendencia/linaje, pero la tradición POB conserva ''seed''. En español, ''semilla santa'' reproduce más de cerca la forma del original y mantiene el eco bíblico; ''descendencia santa'' es una alternativa interpretativa más explicativa.'
- source_word: ወውስተ፡ አሕዛብኒ፡ ኢይትኌለቍ፡
  english_pob_choice: he would not be reckoned among the nations
  chosen_spanish: no sería contado entre las naciones
  alternatives_spanish:
  - no sería considerado entre las naciones
  - no sería incluido entre las naciones
  lexicon: No inventado
  rationale: '''Contado'' refleja bien el verbo de enumeración/reckoning y conserva el matiz de pertenencia o adscripción grupal, sin suavizar la exclusión de Isaac respecto de las naciones.'
- source_word: ለመክፈልተ፡ ልዑል፡
  english_pob_choice: the portion of the Most High
  chosen_spanish: la porción del Altísimo
  alternatives_spanish:
  - la parte del Altísimo
  - la heredad del Altísimo
  lexicon: No inventado
  rationale: '''Porción'' sigue la elección inglesa y su trasfondo bíblico de herencia/lote asignado. ''Altísimo'' es la forma reverente y estándar para el título divino en español.'
- source_word: ወረደ፡ ኵሉ፡ ዘርኡ፡ ከመ፡ ይኩን፡ ለእግዚአብሔር፡ ሕዝበ፡ ትርሲት፡ እምኵሉ፡ ሕዝብ፡
  english_pob_choice: and all his seed had fallen to the lot of God, that it should become for the Lord a people for possession out of all peoples
  chosen_spanish: y toda su descendencia había caído en la suerte de Dios, para que llegara a ser para Yahvé un pueblo de posesión de entre todos los pueblos
  alternatives_spanish:
  - y toda su descendencia había caído en la suerte de Dios, para que llegara a ser para el Señor un pueblo de posesión de entre todos los pueblos
  - y toda su descendencia había sido asignada a Dios, para que llegara a ser para Yahvé un pueblo de posesión de entre todos los pueblos
  lexicon: No inventado
  rationale: '''Había caído en la suerte'' conserva la imagen de asignación por lote/suerte presente en el original. ''Pueblo de posesión'' refleja el sustantivo de pertenencia del texto fuente y evita reemplazarlo por una paráfrasis más eclesiástica como ''pueblo propio'' sin necesidad textual.'
- source_word: לְאֱלֹהִים / ዘይመልከ፡ አምላክ፡
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios Altísimo
  - de Dios
  lexicon: No inventado
  rationale: El texto atribuye la porción/suerte a Dios; en español la forma más directa y fiel es 'de Dios'. Mantiene la sencillez del original sin introducir una precisión no exigida.
- source_word: וְכֶמַא ... מְלַכְוָתָא / kingdom
  english_pob_choice: and that it should become a kingdom
  chosen_spanish: y para que llegara a ser un reino
  alternatives_spanish:
  - y para que llegara a ser un reino de Dios
  - y para que fuera un reino
  lexicon: No inventado
  rationale: '''Reino'' conserva la formulación mínima del cierre, que parece truncado en el expediente fuente pero claramente apunta a ''kingdom''. Se mantiene la apertura sintáctica con ''para que llegara a ser'' para corresponder al paralelismo de finalidad.'
theological_decisions:
- issue: Exclusividad de Isaac como semilla santa
  english_pob_reading: And Isaac alone would become a holy seed
  chosen_spanish_reading: Y Isaac solo llegaría a ser semilla santa
  alternative_spanish_readings:
  - Y Isaac llegaría a ser semilla santa
  - Y solo Isaac llegaría a ser semilla santa
  rationale: 'La revisión del texto inglés restauró ''Isaac'' y luego el revisor añadió la exclusividad de ''alone''. En español conviene dejar ambas ideas visibles sin sobreinterpretar: ''Isaac solo'' preserva que la santidad de la descendencia recae de modo exclusivo sobre Isaac.'
  doctrine_reference: Elección/pacto y separación de la descendencia de Isaac dentro del relato de Jubileos.
- issue: Nombre divino en un pasaje que en inglés usa 'the Lord'
  english_pob_reading: for the Lord a people for possession
  chosen_spanish_reading: para Yahvé un pueblo de posesión
  alternative_spanish_readings:
  - para el Señor un pueblo de posesión
  - para Yahvé un pueblo propio
  rationale: Conforme al estándar POB en español, se nombra explícitamente a Yahvé donde la fuente remite al nombre divino, aun si el inglés audita con 'the Lord'. Se evita 'el Señor' como máscara automática, preservando la transparencia textual.
  doctrine_reference: Tetragrámaton / nombre divino en la traducción española del proyecto.
- issue: Relación entre 'porción', 'suerte' y 'posesión'
  english_pob_reading: he would become the portion of the Most High... fallen to the lot of God... a people for possession
  chosen_spanish_reading: la porción del Altísimo... había caído en la suerte de Dios... un pueblo de posesión
  alternative_spanish_readings:
  - la heredad del Altísimo... había sido asignada a Dios... un pueblo propio
  - la parte del Altísimo... había caído al lote de Dios... un pueblo de pertenencia
  rationale: El pasaje usa varias imágenes legales/hereditarias. Se conservan 'porción', 'suerte' y 'posesión' para no borrar la densidad conceptual del reparto por lote y la pertenencia pactal. 'Pueblo de posesión' suena menos moderno que 'pueblo propio', pero es más cercano al sustantivo del original.
  doctrine_reference: Lenguaje de herencia, lote y pertenencia pactal en literatura del Segundo Templo.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés al restituir explícitamente a Isaac como sujeto y al incorporar la exclusividad de 'alone' indicada por la revisión de control. También conserva la cadena de imágenes 'porción / suerte / pueblo de posesión' sin suavizarlas, porque el informe de revisión mostró acuerdo alto y solo observaciones menores sobre matiz, no sobre sentido básico.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de 'el Señor' conforme al estándar del proyecto para el nombre divino.
  - '''Semilla santa'' se mantiene de forma consistente para el sintagma de descendencia, aunque ''descendencia santa'' sería una glosa posible.'
  - '''Pueblo de posesión'' conserva la terminología pactal y no se reemplaza por ''pueblo propio'' salvo en la nota alternativa.'
  - La sintaxis de finalidad ('para que llegara a ser') se repite para reflejar el paralelismo del cierre del versículo.
