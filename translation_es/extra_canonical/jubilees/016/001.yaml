base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/016/001.yaml
  text: 'She conceived a son. And and we returned to Sarah in the seventh month and found that she had conceived before us. And we blessed him, and we told him all that had been commanded for him: that he would not die until he had begotten six sons and would see them before he died, and that in Isaac a name and seed would be called for him.'
  footnotes:
  - marker: a
    text: Or 'And we announced to Abraham that Sarah had conceived,'.
    reason: previous_rendering
  - marker: b
    text: Or 'and had seen Isaac, and that in Isaac a name and seed would be named for him.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:09Z'
    unchanged: false
    changes_summary: Moved 'in the seventh month' to modify the return to Sarah rather than Sarah's conception, for better alignment with the source order and sense. Otherwise retained the draft's wording.
translation:
  language: es
  text: 'Ella concibió un hijo. Y volvimos a Sara en el séptimo mes y hallamos que había concebido antes de nosotros. Y lo bendijimos, y le dijimos todo lo que le había sido mandado: que no moriría hasta que engendrara seis hijos y los viera antes de morir, y que en Isaac le serían llamados nombre y descendencia.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en Isaac le serían llamados nombre y descendencia». La construcción conserva un semitismo del original; también puede entenderse como «en Isaac serían llamados para él nombre y descendencia» o, de forma más interpretativa, «en Isaac tendría nombre y descendencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ፀንሰት፡ ወልደ።
  english_pob_choice: She conceived a son.
  chosen_spanish: Ella concibió un hijo.
  alternatives_spanish:
  - Ella quedó encinta de un hijo.
  - Concibió un hijo.
  lexicon: concebir / engendrar
  rationale: El ge’ez inicia con una afirmación breve de concepción y nacimiento/engendramiento en forma concisa. En español, «concibió un hijo» conserva la sobriedad del original sin añadir desarrollo narrativo. «Quedó encinta» es posible, pero suena menos directo y menos paralelo al patrón bíblico de concepción.
- source_word: ወልደ
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - varón
  - niño
  lexicon: hijo
  rationale: El contexto es genealógico y narrativo; «hijo» expresa de forma natural el resultado de la concepción. «Varón» sería más interpretativo y «niño» no refleja bien el alcance genealógico.
- source_word: ወተመየጥነ፡ በወርኅ፡ ሳብዕ፡
  english_pob_choice: we returned to Sarah in the seventh month
  chosen_spanish: volvimos a Sara en el séptimo mes
  alternatives_spanish:
  - regresamos a Sara en el séptimo mes
  - volvimos, en el séptimo mes, a Sara
  lexicon: volver / regresar
  rationale: Sigo la revisión auditada que mueve «en el séptimo mes» a modificar la acción de volver, no la concepción. «Volvimos a Sara» mantiene el orden y la relación verbal del ge’ez con claridad natural en español.
- source_word: ወረከብናሃ፡ ለሳራ፡ ፀንሰተ፡* ቅድሜነ፡
  english_pob_choice: and found that she had conceived before us
  chosen_spanish: y hallamos que había concebido antes de nosotros
  alternatives_spanish:
  - y encontramos que había concebido delante de nosotros
  - y comprobamos que había concebido antes que nosotros
  lexicon: hallar / encontrar
  rationale: «Hallamos» sigue el valor de descubrir/comprobar del verbo en contexto. «Antes de nosotros» reproduce el sentido de prioridad temporal; «delante de nosotros» es posible, pero en español suena más espacial que temporal.
- source_word: ወባ ረክናሁ፡
  english_pob_choice: and we blessed him
  chosen_spanish: y lo bendijimos
  alternatives_spanish:
  - y lo bendecimos
  - y le dimos bendición
  lexicon: bendecir
  rationale: «Bendijimos» conserva el aoristo narrativo y la acción divina/comunitaria de bendición. Mantiene el registro bíblico sin forzar perífrasis.
- source_word: ወዜነውናሁ፡
  english_pob_choice: and we told him
  chosen_spanish: y le dijimos
  alternatives_spanish:
  - y le anunciamos
  - y le comunicamos
  lexicon: decir / anunciar
  rationale: El contexto no exige «anunciar» como traducción obligatoria; el ge’ez aquí introduce la comunicación del contenido mandado. «Le dijimos» es fiel y menos interpretativo que «le anunciamos».
- source_word: ኵሎ፡ ዘተአዘዘ፡ ሎቱ፡
  english_pob_choice: all that had been commanded for him
  chosen_spanish: todo lo que le había sido mandado
  alternatives_spanish:
  - todo lo que se le había ordenado
  - todo lo que le había sido ordenado
  lexicon: mandar / ordenar
  rationale: «Mandado» refleja bien la passiva impersonal y conserva el tono de instrucción recibida. «Ordenado» también es viable, pero «mandado» se alinea mejor con el campo semántico del original y con el estilo bíblico.
- source_word: ከመ፡ ኢይመውት፡
  english_pob_choice: that he would not die
  chosen_spanish: que no moriría
  alternatives_spanish:
  - que no iba a morir
  - que no habría de morir
  lexicon: morir
  rationale: La negación profética/futura se puede expresar con futuro simple en español. «No moriría» mantiene la fuerza de promesa/garantía sin añadir modulación innecesaria.
- source_word: እስከ፡ ይወልድ፡ ፮ዲ፡ ስድስተ፡ ውሉደ፡
  english_pob_choice: until he had begotten six sons
  chosen_spanish: hasta que engendrara seis hijos
  alternatives_spanish:
  - hasta que tuviera seis hijos
  - hasta que hubiera engendrado seis hijos
  lexicon: engendrar / tener
  rationale: «Engendrara» preserva la relación causal de paternidad y el tono formal del pasaje. «Tuviera» es más idiomático pero atenúa la fuerza genealógica; «hubiera engendrado» es más pesado.
- source_word: ወይሬኢ፡ ዘእንበለ፡ ይመት፡
  english_pob_choice: and would see them before he died
  chosen_spanish: y viera a esos hijos antes de morir
  alternatives_spanish:
  - y los viera antes de morir
  - y los viera antes de fallecer
  lexicon: ver / morir
  rationale: La frase ge’ez habla de verlos antes de morir. «A esos hijos» aclara el referente sin añadir contenido; evita la ambigüedad española de un objeto omitido. «Morir» conserva la sencillez del original.
- source_word: ወበይስሐቅ፡
  english_pob_choice: and that in Isaac
  chosen_spanish: y que en Isaac
  alternatives_spanish:
  - y en Isaac
  - y por medio de Isaac
  lexicon: en
  rationale: La preposición «en» conserva la formulación tradicional del pasaje y el vínculo locativo/relacional del original. No se expande a «por medio de» porque eso introduciría una interpretación adicional no exigida por el texto.
- source_word: ይጼዋዕ፡ ሎቱ፡ ስም፡ ወዘርአ።
  english_pob_choice: a name and seed would be called for him
  chosen_spanish: se le llamaría un nombre y descendencia
  alternatives_spanish:
  - se le llamaría nombre y descendencia
  - le serían llamados un nombre y una descendencia
  lexicon: llamar / nombre / descendencia
  rationale: «Se le llamaría» conserva la pasiva divina/impersonal del ge’ez. «Nombre y descendencia» sigue el paralelo semítico; «descendencia» es más natural que «simiente» para el español contemporáneo sin perder la referencia genealógica.
theological_decisions:
- issue: Promesa de preservación de vida hasta descendencia cumplida
  english_pob_reading: that he would not die until he had begotten six sons and would see them before he died
  chosen_spanish_reading: que no moriría hasta que engendrara seis hijos y viera a esos hijos antes de morir
  alternative_spanish_readings:
  - que no iba a morir hasta tener seis hijos y verlos antes de morir
  - que no habría de morir hasta haber engendrado seis hijos y verlos antes de morir
  rationale: 'La redacción española conserva la doble cláusula temporal del original: no morir antes del nacimiento de seis hijos y antes de verlos. Evito fusionar o suavizar las dos afirmaciones, porque el texto insiste en ambas garantías.'
  doctrine_reference: Providencia y promesa genealógica en Jubileos; continuidad de la línea elegida
- issue: Formula de nombramiento en Isaac
  english_pob_reading: in Isaac a name and seed would be called for him
  chosen_spanish_reading: y que en Isaac se le llamaría un nombre y descendencia
  alternative_spanish_readings:
  - y que en Isaac le sería llamado nombre y descendencia
  - y que en Isaac se nombrarían para él nombre y descendencia
  rationale: Mantengo «en Isaac» porque la fuente no dice «por medio de»; la construcción comunica que la identificación y continuidad vienen asociadas a Isaac. No oculto la tensión de la fórmula «un nombre y descendencia», que en español suena algo extraña pero refleja mejor el hebraísmo/semitismo subyacente.
  doctrine_reference: Elección y continuidad del linaje prometido
translation_notes:
  revision_awareness: 'La redacción sigue la corrección crítica del audit trail: el inciso temporal «en el séptimo mes» modifica la acción de volver a Sara, no la concepción. También incorpora la corrección de que el pasaje inicia con «Ella concibió un hijo», sin introducir la afirmación ajena de que se anunció a Abraham. Se preserva la cláusula «antes de morir» y la relación correcta entre «Isaac» y la fórmula final de nombre/descendencia.'
  spanish_consistency_notes:
  - He normalizado el nombre propio como «Sara» y «Isaac» en forma estándar en español.
  - He mantenido el verbo en primera persona plural («volvimos», «hallamos», «bendijimos», «dijimos») porque el sujeto del relato es colectivo en el original.
  - He preferido «descendencia» a «simiente» por claridad contemporánea, sin borrar el sentido genealógico del texto.
  - No he reemplazado la pasiva impersonal del final por una voz más explícita, para conservar la forma semítica del enunciado.
