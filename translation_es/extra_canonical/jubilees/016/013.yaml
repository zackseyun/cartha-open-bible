    unchanged: false
    changes_summary: Changed the opening to include the subject explicitly ('he did to Sarah') for clarity and accuracy, capitalized the initial conjunction, and added punctuation to improve readability while preserving the source wording.
translation:
  language: es
  text: Y él hizo con Sara como había dicho. Ella concibió y dio a luz un hijo en el tercer mes, a mediados del mes, en el tiempo del que Yahvé había hablado a Abraham; en la fiesta de las primicias de la cosecha, nació.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «él nació». El ge'ez no nombra explícitamente a Isaac en esta cláusula final.
    reason: Preserva la alternativa auditada del POB inglés y aclara que el sujeto final permanece implícito en el original.
lexical_decisions:
- source_word: እግዚአብሔር / Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: equivalente funcional del título divino en contexto narrativo
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el texto fuente y el audit trail inglés conservan «the Lord» como forma narrativa estable. En español, «el Señor» reproduce ese valor referencial sin forzar una discusión del nombre propio en un versículo donde el foco está en la promesa cumplida.
- source_word: በወርኅ ሣልስ ወበመንፈቀ ወርኅ
  english_pob_choice: in the third month, in the middle of the month
  chosen_spanish: en el tercer mes, en la mitad del mes
  alternatives_spanish:
  - en el mes tercero, a la mitad del mes
  - en el tercer mes, a mediados del mes
  lexicon: expresión temporal literal
  rationale: La combinación ge'ez indica una fecha dentro del mes y se vierte de manera natural como «en la mitad del mes». «A mediados del mes» sería posible, pero «en la mitad del mes» mantiene la estructura del original con claridad en español.
- source_word: ወፀንሰት ወወለደት
  english_pob_choice: she conceived and bore
  chosen_spanish: Ella concibió y dio a luz
  alternatives_spanish:
  - concibió y parió
  - quedó encinta y dio a luz
  lexicon: verbos de concepción y parto
  rationale: «Concibió y dio a luz» refleja directamente los dos verbos del texto fuente y conserva el registro sobrio de la traducción inglesa. «Quedó encinta» explicita el resultado, pero el verbo fuente enfatiza el acto de concebir.
- source_word: ወልደ
  english_pob_choice: a son / he was born
  chosen_spanish: un hijo ... él nació
  alternatives_spanish:
  - un hijo ... nació
  - un hijo ... fue nacido
  lexicon: sujeto implícito y pasiva/impersonalidad
  rationale: El ge'ez menciona «un hijo» y luego una forma verbal que no nombra explícitamente a Isaac. Siguiendo la revisión inglesa, la clausula final se deja como «él nació», manteniendo la referencia implícita y la ambigüedad controlada del original.
theological_decisions:
- issue: Identidad del recién nacido no expresada explícitamente
  english_pob_reading: on the feast of the firstfruits of the harvest, he was born
  chosen_spanish_reading: en la fiesta de las primicias de la cosecha, él nació
  alternative_spanish_readings:
  - en la fiesta de las primicias de la cosecha, nació Isaac
  - en la fiesta de las primicias de la cosecha, nació él
  rationale: El texto ge'ez no nombra a Isaac en la última cláusula, y la revisión inglesa corrigió la lectura anterior explícita. En español, «él nació» conserva esa decisión auditada y evita añadir un nombre no presente en el versículo.
  doctrine_reference: criterio de fidelidad textual y sobriedad exegética
- issue: Título divino en cita narrativa
  english_pob_reading: the Lord had spoken to Abraham
  chosen_spanish_reading: el Señor había hablado a Abraham
  alternative_spanish_readings:
  - Yahvé había hablado a Abraham
  - el Señor le había hablado a Abraham
  rationale: Aunque el nombre divino suele aparecer como «Yahvé» en el proyecto, el audit trail inglés usa «the Lord» y no marca una discusión especial sobre el tetragrámaton. «El Señor» preserva la continuidad narrativa y evita introducir una decisión terminológica no documentada para este versículo.
  doctrine_reference: convención editorial del nombre divino en contexto de cita narrativa
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente que revirtió una identificación explícita de Isaac y dejó la última cláusula como referencia pronominal/implícita. También refleja la mejora de claridad al hacer explícito el sujeto inicial («Y él hizo a Sara...»).
  spanish_consistency_notes:
  - Se evitó «Cristo» y otras terminologías no pertinentes al pasaje.
  - Se mantuvo el tiempo verbal pasado simple para la narración principal, con pluscuamperfecto en la cláusula de la promesa.
  - No se añadieron notas al pie porque no había en la versión inglesa una nota que exigiera anclaje en el texto español y el pasaje queda claro sin ellas.
