base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/045/003.yaml
  text: '...his father Jacob in the land of Goshen, and he embraced his father''s neck and wept. And Israel said to Joseph, "Now let me die, since I have seen you; and now may the LORD, the God of Israel, the God of Abraham and the God of Isaac, be blessed—he who has shown mercy and compassion."'
  footnotes:
  - marker: a
    text: Or 'And Israel said to Joseph'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:43Z'
    unchanged: false
    changes_summary: Replaced 'has not withheld mercy and compassion' with 'has shown mercy and compassion' to better reflect the source wording and produce more natural formal English. Kept the rest unchanged.
translation:
  language: es
  text: 'Encontró a su padre Jacob en la tierra de Gosén, y abrazó el cuello de su padre y lloró. Y Israel dijo a José: «Ahora, déjame morir, puesto que te he visto; y ahora, bendito sea Yahvé, el Dios de Israel, el Dios de Abraham y el Dios de Isaac, el que ha mostrado misericordia y compasión».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ያዕቆብ / Jacob
  english_pob_choice: his father Jacob
  chosen_spanish: su padre Jacob
  alternatives_spanish:
  - Jacob, su padre
  - a Jacob, su padre
  lexicon: Jacob
  rationale: Conservo el nombre propio y la relación posesiva explícita del etíope/inglés; en español, 'su padre Jacob' comunica naturalidad sin perder la referencia familiar.
- source_word: ውስተ፡ ምድረ፡ ጌሤም
  english_pob_choice: in the land of Goshen
  chosen_spanish: en la tierra de Gosén
  alternatives_spanish:
  - en el país de Gosén
  - en la región de Gosén
  lexicon: Gosén
  rationale: '''Tierra'' reproduce bien el valor territorial del original y del inglés; ''Gosén'' es la forma española estable del topónimo.'
- source_word: ወሐቀፈ፡ ክሳደ፡ አቡሁ፡
  english_pob_choice: and he embraced his father's neck
  chosen_spanish: y abrazó el cuello de su padre
  alternatives_spanish:
  - y se echó al cuello de su padre
  - y estrechó el cuello de su padre
  lexicon: abrazar
  rationale: El etíope expresa literalmente el gesto de abrazar el cuello; 'abrazó el cuello de su padre' mantiene la imagen sin forzar un modismo ajeno al texto.
- source_word: ወበከየ።
  english_pob_choice: and wept
  chosen_spanish: y lloró
  alternatives_spanish:
  - y lloró desconsoladamente
  - y se puso a llorar
  lexicon: llorar
  rationale: La forma breve preserva el paralelo narrativo simple del original; 'lloró' basta para el valor verbal básico sin añadir intensidad no explicitada.
- source_word: እስራኤል፡ ... ይትባረክ፡
  english_pob_choice: And Israel said to Joseph ... may ... be blessed
  chosen_spanish: Y Israel dijo a José ... sea bendito
  alternatives_spanish:
  - Y Israel dijo a José ... sea alabado
  - Y Israel dijo a José ... bendito sea
  lexicon: bendecir
  rationale: Mantengo la fórmula de bendición pasiva con 'sea bendito', equivalente digno y natural para la doxología dirigida a Yahvé.
- source_word: እግዚአብሔር፡
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: YHWH
  rationale: Según el criterio del proyecto, el nombre divino se vierte como 'Yahvé' para no ocultar el tetragrámaton con una convención tipográfica.
- source_word: አምላከ፡ እስራኤል፡ አምላከ፡ አብርሃም፡ ወአምላከ፡ ይስሐቅ፡
  english_pob_choice: the God of Israel, the God of Abraham and the God of Isaac
  chosen_spanish: el Dios de Israel, el Dios de Abraham y el Dios de Isaac
  alternatives_spanish:
  - el Dios de Israel, el Dios de Abraham, y el Dios de Isaac
  - el Dios de Israel, de Abraham y de Isaac
  lexicon: Dios
  rationale: Conservo la repetición enfática de 'el Dios de...' que el texto y el inglés auditado presentan, porque forma parte del tono confesional de la bendición.
- source_word: ዘአክአለ፡ ምሕረተ፡ ወሣህሎ፡
  english_pob_choice: he who has shown mercy and compassion
  chosen_spanish: el que ha mostrado misericordia y compasión
  alternatives_spanish:
  - el que ha dado misericordia y compasión
  - el que no ha retenido misericordia y compasión
  lexicon: misericordia / compasión
  rationale: 'Sigo la revisión inglesa que corrigió la negación implícita errónea y tomo el valor positivo del participio: Dios ha mostrado, no negado, misericordia y compasión. ''Misericordia y compasión'' reproduce el par léxico del original.'
theological_decisions:
- issue: Nombre divino en una bendición patriarcal
  english_pob_reading: may the LORD ... be blessed
  chosen_spanish_reading: sea bendito Yahvé
  alternative_spanish_readings:
  - sea bendito el SEÑOR
  - bendito sea Yahvé
  rationale: El proyecto pide no enmascarar el nombre divino cuando el original subyacente corresponde a YHWH; por eso 'Yahvé' conserva la referencia directa al nombre del pacto en la doxología.
  doctrine_reference: Éxodo 3:15; tradición de transliteración del Tetragrámaton en el POB
- issue: Tensión narrativa entre José e Israel
  english_pob_reading: And Israel said to Joseph
  chosen_spanish_reading: Y Israel dijo a José
  alternative_spanish_readings:
  - Israel le dijo a José
  - Y dijo Israel a José
  rationale: 'Conservo el orden y la ambigüedad estilística del original/inglés auditado: el sujeto cambia de Jacob a Israel, y el texto mantiene la fórmula solemne sin aclaración interpretativa adicional.'
  doctrine_reference: Génesis 32:28; uso narrativo de 'Israel' como nombre del patriarca
- issue: Expresión de misericordia y compasión
  english_pob_reading: he who has shown mercy and compassion
  chosen_spanish_reading: el que ha mostrado misericordia y compasión
  alternative_spanish_readings:
  - el que ha tenido misericordia y compasión
  - el que no ha retenido misericordia y compasión
  rationale: La revisión inglesa corrige una lectura negativa previa; el español debe reflejar el aspecto positivo del participio y evitar introducir una negación ausente en el texto fuente.
  doctrine_reference: Salmo 103:13; Lamentaciones 3:22
- issue: Plausible alternation of addressee with the subject 'Israel'
  english_pob_reading: Or 'And Israel said to Joseph'
  chosen_spanish_reading: Y Israel dijo a José
  alternative_spanish_readings:
  - Y dijo Israel a José
  - Y entonces Israel dijo a José
  rationale: No se añade nota textual porque el verso en la fuente final ya incluye la cláusula completa; se preserva la forma directa y solemne sin resolver en exceso la transición narrativa.
  doctrine_reference: nota textual interna del POB
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrige la frase final a 'has shown mercy and compassion', y la revisión mayor también restituye la cláusula inicial omitida sobre Jacob en Gosén, el abrazo al cuello y el llanto. Esta versión española incorpora ambas correcciones y no conserva la nota alternativa anterior, porque ya no hay anclaje necesario ni marcador en el texto objetivo.
  spanish_consistency_notes:
  - '''Yahvé'' se usa para el nombre divino donde el audit trail inglés traduce LORD y el hebreo/etíope subyacente apunta al Tetragrámaton.'
  - '''Israel'' se conserva como nombre patriarcal en el discurso directo, sin sustituirlo por ''Jacob'', para respetar la tensión narrativa documentada.'
  - Se mantiene la repetición de 'el Dios de...' porque el énfasis confesional pertenece al texto y no debe normalizarse.
  - No se añadieron notas al pie porque el texto final no requiere lecturas alternativas ancladas; esto evita marcar un asterisco sin correspondiente marcador en la traducción.
