  yaml_path: translation/extra_canonical/jubilees/045/008.yaml
  text: And the land of Egypt suffered because of the famine, and Joseph acquired all the land of Egypt for Pharaoh in exchange for grain, and he acquired the people, their livestock, and everything for Pharaoh.
  footnotes:
  - marker: a
    text: Or "and their people and their livestock and all their possessions became Pharaoh's.".
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:44Z'
    unchanged: false
    changes_summary: 'Revised the final clause for completeness and accuracy: rendered ሰብአኒ as ''their people'' and ኵሎ አጥሪየ as ''all their possessions'' rather than the less precise ''everything became Pharaoh''s property.'''
translation:
  language: es
  text: Y la tierra de Egipto padeció a causa del hambre, y José adquirió para Faraón toda la tierra de Egipto a cambio de grano, y adquirió a la gente, su ganado y todo lo que tenían para Faraón.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ኵለንታሃ ምድረ ግብጽ
  english_pob_choice: all the land of Egypt
  chosen_spanish: toda la tierra de Egipto
  alternatives_spanish:
  - toda la tierra de Egipto entera
  - la totalidad de la tierra de Egipto
  lexicon: land / country
  rationale: «Tierra» conserva el valor geográfico y político de la expresión sin forzar una perífrasis más pesada.
- source_word: በእክል
  english_pob_choice: in exchange for grain
  chosen_spanish: a cambio de grano
  alternatives_spanish:
  - por grano
  - en intercambio por grano
  lexicon: grain / food supply
  rationale: La preposición expresa con naturalidad el intercambio implícito del contexto económico.
- source_word: አጥሪየ
  english_pob_choice: he acquired
  chosen_spanish: adquirió
  alternatives_spanish:
  - compró
  - obtuvo
  lexicon: acquire
  rationale: «Adquirió» preserva el acto jurídico-económico de toma de posesión y mantiene el sujeto activo José, como exige el audit trail.
- source_word: ሰብአኒ
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las personas
  lexicon: people
  rationale: Aunque el inglés dice «the people», en español singular colectivo «el pueblo» es la forma más natural y fiel al conjunto humano sometido al faraón.
- source_word: እንስሳሆሙኒ
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - su hacienda
  lexicon: livestock
  rationale: «Ganado» es el equivalente más directo y claro para bienes pecuarios en español bíblico moderno.
- source_word: ኵሎ አጥሪየ
  english_pob_choice: all their possessions
  chosen_spanish: todo lo que tenían
  alternatives_spanish:
  - todas sus posesiones
  - todo su haber
  lexicon: possessions / all they had
  rationale: La revisión inglesa aclaró que el sentido es el de las posesiones en general; en español, «todo lo que tenían» evita una abstracción forzada y conserva el alcance total sin introducir un sustantivo inexistente en el ge'ez.
theological_decisions:
- issue: Lectura del cierre como adquisición activa por José, no como simple cambio de propiedad impersonal
  english_pob_reading: and he acquired the people, their livestock, and everything for Pharaoh
  chosen_spanish_reading: y adquirió el pueblo, su ganado y todo lo que tenían para Faraón
  alternative_spanish_readings:
  - y el pueblo, su ganado y todo lo que tenían pasaron a ser de Faraón
  - y todo se convirtió en propiedad de Faraón
  rationale: Se mantiene a José como sujeto activo, siguiendo la corrección crítica del audit trail. Eso evita borrar su papel administrativo en la compra durante el hambre.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: el ge''ez አጥሪየ se entiende como verbo con José como sujeto («adquirió»), y ሰብአኒ como «el pueblo»; la cláusula final se amplió con valor totalizador («todo lo que tenían») para reflejar ኵሎ sin perder naturalidad en español.'
  spanish_consistency_notes:
  - Se usó «Faraón» de forma consistente como nombre/título propio.
  - Se prefirió «tierra de Egipto» y no una paráfrasis más libre para conservar la concreción geográfica del original.
  - «Grano» se mantuvo para በእክል según el audit trail, sin convertirlo en una expresión más general como «alimento».
