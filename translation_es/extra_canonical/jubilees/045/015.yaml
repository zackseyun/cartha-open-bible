base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/045/015.yaml
  text: And he blessed them, and he gave Joseph a double portion in the land. And he slept with his fathers and was buried in the cave of Machpelah[15] in the land of Canaan, near Abraham his father.
  footnotes:
  - marker: '15'
    text: Literally 'the double cave.' This corresponds to the ancestral burial cave known elsewhere as Machpelah.
    reason: cross_reference
  - marker: a
    text: Or 'them[15], and he gave Joseph a double portion in the land. And he slept with his fathers and was buried in the cave of Machpelah'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:46Z'
    unchanged: false
    changes_summary: Revised 'the double cave' to 'the cave of Machpelah' to reflect the proper place name behind the Ge'ez and improve naturalness and accuracy; retained the rest with minor punctuation cleanup.
translation:
  language: es
  text: Y los bendijo, y le dio a José una porción doble en la tierra. Y durmió con sus padres y fue sepultado en la cueva de Macpela[a], en la tierra de Canaán, cerca de Abraham su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «la cueva doble». Corresponde a la cueva sepulcral ancestral conocida en otros lugares como Macpela.
    reason: cross_reference
lexical_decisions:
- source_word: ወባረኮሙ
  english_pob_choice: And he blessed them
  chosen_spanish: Y los bendijo
  alternatives_spanish:
  - Y los bendijo a ellos
  - Y los bendijo
  lexicon: ברך / bless
  rationale: El ge'ez expresa una bendición dirigida a plural masculino; en español natural, el objeto directo clítico 'los' comunica la referencia sin añadir material innecesario.
- source_word: ወወሀቦ ... ክልኤተ መክፈሊተ
  english_pob_choice: he gave Joseph a double portion in the land
  chosen_spanish: dio a José una porción doble en la tierra
  alternatives_spanish:
  - dio a José una doble porción en la tierra
  - le dio a José una porción doble en la tierra
  lexicon: portion / double share
  rationale: La frase ge'ez corresponde a una porción duplicada de herencia. 'Porción doble' conserva el orden y la fuerza semántica; 'en la tierra' refleja el ámbito patrimonial sin especificar más que el texto.
- source_word: ወኖመ፡ ምስለ፡ አበዊሁ
  english_pob_choice: And he slept with his fathers
  chosen_spanish: Y durmió con sus padres
  alternatives_spanish:
  - Y reposó con sus padres
  - Y se durmió con sus padres
  lexicon: sleep with fathers / idiom for death
  rationale: Se mantiene el eufemismo bíblico 'durmió con sus padres', tradicional y fiel al giro semítico, sin convertirlo en una paráfrasis explicativa.
- source_word: በበዐት፡ ዘካዕበት
  english_pob_choice: in the cave of Machpelah
  chosen_spanish: en la cueva de Macpela
  alternatives_spanish:
  - en la cueva de Machpelah
  - en la cueva doble
  lexicon: place name / tomb cave
  rationale: El audit trail inglés revisó 'the double cave' a 'the cave of Machpelah' como nombre propio. En español se translitera como 'Macpela' para conservar el topónimo bíblico y la referencia identificable; se evita 'cueva doble' porque sería más explicativo que el texto final revisado.
- source_word: ቅሩበ፡ አብርሃም፡ አቡሁ
  english_pob_choice: near Abraham his father
  chosen_spanish: cerca de Abraham su padre
  alternatives_spanish:
  - junto a Abraham su padre
  - cerca de Abraham, su padre
  lexicon: near / proximity
  rationale: '''Cerca de'' reproduce la relación espacial sin forzar una localización más precisa que la dada. Se preserva ''su padre'' como aposición simple y directa.'
theological_decisions:
- issue: Referencia funeraria y continuidad ancestral
  english_pob_reading: he slept with his fathers and was buried in the cave of Machpelah in the land of Canaan, near Abraham his father
  chosen_spanish_reading: durmió con sus padres y fue sepultado en la cueva de Macpela en la tierra de Canaán, cerca de Abraham su padre
  alternative_spanish_readings:
  - reposó con sus padres
  - fue enterrado
  rationale: Se conserva el lenguaje bíblico de muerte y sepultura para mantener la continuidad teológica y literaria con la fórmula ancestral del texto. 'Fue sepultado' refleja mejor el acto funerario formal que 'fue enterrado' en registro bíblico.
  doctrine_reference: fórmulas narrativas de muerte y sepultura en tradición bíblica
- issue: Topónimo funerario Machpelah/Macpela
  english_pob_reading: cave of Machpelah[15]
  chosen_spanish_reading: cueva de Macpela[a]
  alternative_spanish_readings:
  - cueva de Machpelah
  - cueva doble
  rationale: La revisión inglesa fija el lugar como nombre propio, no como mera descripción. En español se adopta 'Macpela' como forma transparente y eclesialmente legible; la nota preserva la explicación de que el nombre corresponde literalmente a la 'cueva doble'.
  doctrine_reference: toponimia bíblica y memoria ancestral
translation_notes:
  revision_awareness: La base inglesa pasó de una lectura descriptiva ('the double cave') a una lectura nominal ('the cave of Machpelah'), y luego corrigió la colocación del marcador de nota. La versión española sigue la lectura final revisada, manteniendo el topónimo como nombre propio y preservando en nota el sentido literal subyacente del ge'ez.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - Se usa 'porción doble' para reflejar herencia duplicada, no un simple refuerzo adjetival.
  - '''Macpela'' se escribe sin h para una transliteración española más natural y consistente con uso bíblico común.'
  - '''Fue sepultado'' se prefiere por registro narrativo formal frente a ''enterrado''.'
