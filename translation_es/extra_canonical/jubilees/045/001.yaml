translation:
  language: es
  text: Y entró Israel en la tierra de Egipto, en la tierra de Gosén, en la luna nueva del cuarto mes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እስራኤል
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  - los hijos de Israel
  lexicon: N/A (nombre propio)
  rationale: El sujeto del verbo es el nombre colectivo Israel; en español bíblico es natural y fiel conservarlo como nombre propio, sin expandirlo innecesariamente.
- source_word: ብሔረ፡ ግብጽ
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  - el país de Egipto
  lexicon: N/A (topónimo + sustantivo locativo)
  rationale: La construcción ge'ez expresa un destino territorial; «la tierra de Egipto» reproduce con claridad el valor locativo del original y del inglés POB.
- source_word: ምድረ፡ ጌሤም
  english_pob_choice: the land of Goshen
  chosen_spanish: la tierra de Gosén
  alternatives_spanish:
  - Gosén
  - la región de Gosén
  lexicon: N/A (topónimo)
  rationale: «Gosén» mantiene el nombre bíblico reconocido en español; se conserva «la tierra de» para reflejar la misma relación territorial que en el original y en la versión inglesa.
- source_word: አመ፡ ሠርቀ፡ ወርኅ፡
  english_pob_choice: at the new moon of the fourth month
  chosen_spanish: en la luna nueva del cuarto mes
  alternatives_spanish:
  - en el novilunio del cuarto mes
  - al comienzo del cuarto mes
  lexicon: N/A (expresión calendárica)
  rationale: La expresión ge'ez señala el inicio lunar; «luna nueva» es la forma española más clara y fiel. Se evita «novilunio» por ser menos transparente para lectura eclesial general.
theological_decisions:
- issue: Referencia calendárica y no litúrgica del tiempo señalado
  english_pob_reading: at the new moon of the fourth month
  chosen_spanish_reading: en la luna nueva del cuarto mes
  alternative_spanish_readings:
  - al comienzo del cuarto mes
  - en el novilunio del cuarto mes
  rationale: El texto fija una fecha según el calendario lunar; no introduce por sí mismo una observancia litúrgica. La traducción conserva la referencia temporal simple sin sobreinterpretarla.
  doctrine_reference: Calendario bíblico / cronología narrativa
translation_notes:
  revision_awareness: 'El texto inglés POB y el control posterior coinciden sin cambios: la versión española sigue directamente el ge''ez conservando la estructura breve y la cronología explícita, sin añadir información ausente ni suavizar la secuencia narrativa.'
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reproducir la coordinación narrativa del original.
  - «La tierra de Gosén» preserva la forma territorial usada en español bíblico y mantiene paralelismo con «la tierra de Egipto».
  - No se introduce «SEÑOR» ni otras convenciones teológicas porque el versículo no contiene el Tetragrámaton ni títulos divinos.
