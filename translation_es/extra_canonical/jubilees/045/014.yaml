translation:
  language: es
  text: Y antes de morir, Israel bendijo a sus hijos y les dijo todo lo que les sucedería en la tierra de Egipto y les dio a conocer lo que les sobrevendría en días futuros.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እስራኤል
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: Nombre propio
  rationale: El texto ge'ez usa «Israel», y el contexto inmediato permite el nombre del patriarca. Mantengo la forma del original y la del POB inglés.
- source_word: ወባረኮሙ
  english_pob_choice: blessed his sons
  chosen_spanish: bendijo a sus hijos
  alternatives_spanish:
  - los bendijo
  - bendijo a sus hijos varones
  lexicon: ברך / bless
  rationale: «Bendijo» reproduce el acto de bendición paterna y «a sus hijos» expresa el objeto directo con naturalidad en español, sin añadir una restricción no explícita en el ge'ez.
- source_word: ዘእንበለ፡ ይሙት
  english_pob_choice: before he died
  chosen_spanish: antes de morir
  alternatives_spanish:
  - antes de que muriera
  lexicon: Temporal clause
  rationale: El ge'ez marca anterioridad respecto a la muerte; «antes de morir» es la forma más natural y fiel en español.
- source_word: ወነገሮሙ
  english_pob_choice: told them
  chosen_spanish: les contó
  alternatives_spanish:
  - les dijo
  - les narró
  lexicon: נגד / tell, recount
  rationale: El verbo transmite comunicación extensa o narrativa; «les contó» conserva ese matiz mejor que un simple «les dijo».
- source_word: ኵሎ፡ ዘኮነ፡ ይረክቦሙ
  english_pob_choice: everything that would happen to them
  chosen_spanish: todo lo que les sucedería
  alternatives_spanish:
  - todo lo que les habría de acontecer
  - todo cuanto les pasaría
  lexicon: Event prediction
  rationale: La secuencia ge'ez expresa totalidad de sucesos futuros; «les sucedería» mantiene el futuro relativo sin forzar una lectura excesivamente literal.
- source_word: በምድረ፡ ግብጽ
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en la tierra de Egipto[a]
  lexicon: Land formula
  rationale: «Tierra de Egipto» refleja la fórmula territorial del original; «tierra» es más bíblica y precisa que solo «Egipto» en este contexto.
- source_word: ወበደኃሪ፡ መዋዕል
  english_pob_choice: in later days
  chosen_spanish: en los días posteriores
  alternatives_spanish:
  - en los días venideros
  - en días futuros
  lexicon: אַחֲרִית הַיָּמִים / later days
  rationale: El giro apunta a un tiempo posterior; «días posteriores» conserva la referencia temporal amplia sin introducir una carga escatológica que el pasaje no exige por sí sola.
- source_word: ዘከመ፡ ይመጽእ፡ ላዕሌሆሙ
  english_pob_choice: what would come upon them
  chosen_spanish: lo que les sobrevendría
  alternatives_spanish:
  - lo que les iba a venir encima
  - lo que les acontecería
  lexicon: Come upon / befall
  rationale: «Sobrevendría» reproduce bien el matiz de algo que llega a alguien desde fuera, con un tono bíblico sobrio y claro.
- source_word: እይድያሙ
  english_pob_choice: he made known to them
  chosen_spanish: les dio a conocer
  alternatives_spanish:
  - se lo hizo saber
  - les manifestó
  lexicon: ידע / make known
  rationale: La revisión textual recupera el verbo final omitido en un borrador previo; «les dio a conocer» expresa con claridad la acción de revelar/informar sin recargar el español.
theological_decisions:
- issue: Relación entre la bendición patriarcal y la profecía futura
  english_pob_reading: And before he died, Israel blessed his sons and told them everything that would happen to them in the land of Egypt and he made known to them what would come upon them in later days.
  chosen_spanish_reading: Y antes de morir, Israel bendijo a sus hijos y les contó todo lo que les sucedería en la tierra de Egipto, y les dio a conocer lo que les sobrevendría en los días posteriores.
  alternative_spanish_readings:
  - Y antes de morir, Israel bendijo a sus hijos y les dijo todo lo que les pasaría...
  - Y antes de morir, Israel bendijo a sus hijos y les reveló...
  rationale: La sintaxis española separa con claridad la bendición y la comunicación profética, manteniendo ambos actos en paralelo como en el original y en el POB inglés.
  doctrine_reference: Patriarcal blessing and prophecy in narrative scripture
- issue: Alcance de «días posteriores»
  english_pob_reading: in later days
  chosen_spanish_reading: en los días posteriores
  alternative_spanish_readings:
  - en los últimos días
  - en días venideros
  rationale: No hay base suficiente para fijar una lectura escatológica fuerte; «posteriores» conserva la posteridad temporal sin imponer un matiz doctrinal adicional.
  doctrine_reference: Temporal prophecy without over-specifying eschatology
translation_notes:
  revision_awareness: The English POB audit trail notes that the final Ge'ez word corresponds to a restored verb meaning 'he made known to them'; the Spanish draft therefore includes an explicit final clause. No English footnotes were required, and no Spanish footnotes are needed because the chosen rendering does not introduce unresolved alternatives.
  spanish_consistency_notes:
  - Se conserva «Israel» como sujeto personal, no como «Jacob», siguiendo el texto fuente y el POB inglés.
  - Se usa «bendijo» y no «bendecía» para reflejar una acción puntual antes de la muerte.
  - «Les contó» mantiene el carácter narrativo de la declaración completa.
  - «Les dio a conocer» traduce el verbo recuperado por la revisión textual, evitando dejar la última cláusula suelta.
  - No se emplea «SEÑOR» ni terminología de sustitución nominal, porque el versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
