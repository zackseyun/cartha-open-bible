revisions:
- from: Y antes de morir, Israel bendijo a sus hijos y les contó todo lo que les sucedería en la tierra de Egipto, y les dio a conocer lo que les sobrevendría en los días posteriores.
  to: Y antes de morir, Israel bendijo a sus hijos y les dijo todo lo que les sucedería en la tierra de Egipto y les dio a conocer lo que les sobrevendría en días futuros.
  rationale: 'Se hacen ajustes menores de estilo y precisión: «les dijo» representa mejor el acto de comunicar proféticamente; «en días futuros» es más natural y eclesialmente legible que «en los días posteriores»; y se simplifica la puntuación sin alterar el sentido. No se requieren notas al pie porque no se preservó ninguna alternativa en el texto español y no surge ambigüedad nueva.'
