translation:
  language: es
  text: 'de su siervo Jacob. Grande para mí es esto: que he visto tu rostro mientras aún estoy vivo, porque la visión que vi en Betel quedó verdaderamente confirmada. Bendito sea Yahvé, mi Dios, por los siglos de los siglos, y bendito sea su nombre.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐቢይ
  english_pob_choice: Great for me is this
  chosen_spanish: Grande para mí es esto
  alternatives_spanish:
  - Grande es esto para mí
  - Muy grande es esto para mí
  lexicon: n/a
  rationale: El ge'ez expresa énfasis de valor o magnitud; el orden español más natural conserva el énfasis sin volverlo explicativo.
- source_word: ገጸከ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu semblante
  lexicon: n/a
  rationale: «Rostro» preserva el registro reverente y encaja con el paralelismo bíblico de ver el rostro de otro.
- source_word: ሕያው
  english_pob_choice: while I am still alive
  chosen_spanish: mientras aún estoy vivo
  alternatives_spanish:
  - mientras todavía vivo
  - siendo todavía yo vivo
  lexicon: n/a
  rationale: La construcción temporal transmite con claridad que Jacob sigue con vida al momento del encuentro.
- source_word: ራእይ
  english_pob_choice: the vision
  chosen_spanish: la visión
  alternatives_spanish:
  - la revelación
  - la visión profética
  lexicon: n/a
  rationale: «Visión» es la correspondencia directa y mantiene la referencia a una experiencia revelatoria concreta.
- source_word: በቤቴል
  english_pob_choice: at Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Betel
  lexicon: n/a
  rationale: Topónimo bíblico establecido en español como Betel.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: n/a
  rationale: Se sigue el principio del proyecto de representar el nombre divino con «Yahvé» en el texto principal, evitando la convención de sustitución con mayúsculas.
- source_word: አምላኪየ
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios y Señor
  - mi Dios
  lexicon: n/a
  rationale: «Mi Dios» es la equivalencia directa para la relación posesiva sin añadir títulos no presentes en el original.
- source_word: ለዓለመ ዓለም
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre jamás
  - por siempre y eternamente
  lexicon: n/a
  rationale: La fórmula tradicional española comunica bien la intensificación durativa del hebraísmo/ge'ez sin perder solemnidad.
- source_word: ወቡሩክ
  english_pob_choice: and blessed be his name
  chosen_spanish: y bendito sea su nombre
  alternatives_spanish:
  - y sea bendito su nombre
  - y bendecido sea su nombre
  lexicon: n/a
  rationale: «Bendito sea» conserva el valor doxológico/jussivo del original y mantiene la paralelidad con la cláusula anterior.
theological_decisions:
- issue: Representación del nombre divino
  english_pob_reading: Blessed be the LORD my God forever and ever
  chosen_spanish_reading: Bendito sea Yahvé, mi Dios, por los siglos de los siglos
  alternative_spanish_readings:
  - Bendito sea el Señor, mi Dios, por los siglos de los siglos
  rationale: La política del proyecto exige no ocultar el nombre divino; «Yahvé» preserva la identidad del referente y evita una sustitución litúrgica no motivada por el original.
  doctrine_reference: Tetragrámaton / nombre divino
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la última cláusula para hacer más natural la bendición final en inglés; el español sigue directamente la forma doxológica del original sin necesidad de reflejar un cambio adicional. La concordancia general entre fuente y audit trail es alta.
  spanish_consistency_notes:
  - Se mantuvo «Betel» como topónimo usual en español.
  - Se usó «Yahvé» en lugar de «SEÑOR» conforme a la terminología del proyecto.
  - No se añadió nota textual porque el pasaje no presenta variantes textuales en el paquete fuente.
  - La puntuación española se ajustó para separar con claridad la exclamación inicial y la cláusula de bendición final.
