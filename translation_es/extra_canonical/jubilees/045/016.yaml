translation:
  language: es
  text: en el sepulcro que había excavado para sí en la cueva doble, en la tierra de Hebrón. Y dio todos sus libros y los libros de sus padres a Leví, su hijo, para que los guardara y los renovara[a] para sus hijos hasta este día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Renovara» puede implicar recopiarlos, restaurarlos o transmitirlos de nuevo a sus descendientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: በመቃብር ዘከረየ ለርእሱ
  english_pob_choice: in the tomb that he had dug for himself
  chosen_spanish: en el sepulcro que había excavado para sí
  alternatives_spanish:
  - en la tumba que había cavado para sí
  - en el sepulcro que se había hecho para sí
  lexicon: ὀρυγμένος / cavar; sepulcro/tumba
  rationale: El ge'ez expresa que fue una sepultura hecha por él mismo; 'excavado' mantiene la acción de abrir o horadar la tumba con registro digno, y 'para sí' refleja el dativo reflexivo del original sin añadir interpretación.
- source_word: በዐት ዘካዕበት
  english_pob_choice: the double cave
  chosen_spanish: la cueva doble
  alternatives_spanish:
  - la cueva de dos compartimentos
  - la cueva gemela
  lexicon: διπλῆ σπήλαιον / cave; double
  rationale: La expresión designa una cueva doble; 'cueva doble' es una rendición directa, clara y sin sobreexplicar la topografía más allá de lo que la fuente permite.
- source_word: በምድረ ኬብሮን
  english_pob_choice: in the land of Hebron
  chosen_spanish: en la tierra de Hebrón
  alternatives_spanish:
  - en la región de Hebrón
  - en el país de Hebrón
  lexicon: אֶרֶץ / tierra, land
  rationale: '''Tierra'' conserva el valor territorial habitual del original y del español bíblico contemporáneo, sin convertirlo en un mero topónimo aislado.'
- source_word: ወወሀበ ኵሎ መጻሕፍቲሁ ወመጻሕፍተ አበዊሁ ለሌዊ ወልዱ
  english_pob_choice: And he gave all his books and the books of his fathers to Levi his son
  chosen_spanish: Y dio todos sus libros y los libros de sus padres a Leví, su hijo
  alternatives_spanish:
  - Y entregó todos sus libros y los libros de sus padres a Leví, su hijo
  - Y dio todos sus escritos y los escritos de sus padres a Leví, su hijo
  lexicon: נתן / give; ספרים / books, writings
  rationale: '''Dio'' reproduce con sencillez el acto de entrega. Se conserva ''libros'' porque el texto y el POB inglés usan la forma concreta; ''escritos'' sería posible, pero atenúa la concreción del testimonio literario transmitido.'
- source_word: ይዕቀቦን
  english_pob_choice: that he might preserve them
  chosen_spanish: para que los guardara
  alternatives_spanish:
  - para que los preservara
  - para que los conservara
  lexicon: שמר / keep, preserve, guard
  rationale: '''Guardar'' mantiene el doble matiz de custodiar y preservar de manera natural en español; además enlaza bien con la transmisión de textos sin forzar una interpretación técnica.'
- source_word: ያሐድሶን
  english_pob_choice: and renew them
  chosen_spanish: y los renovara
  alternatives_spanish:
  - y los rehiciera
  - y los copiara de nuevo
  - y los restaurara
  lexicon: חדש / renew, make new
  rationale: La nota inglesa señala que 'renew' puede implicar copiar de nuevo, restaurar o transmitir de nuevo. 'Renovar' preserva esa amplitud semántica en español sin fijarla indebidamente a una sola técnica.
- source_word: ለውሉዱ
  english_pob_choice: for his children
  chosen_spanish: para sus hijos
  alternatives_spanish:
  - para sus descendientes
  - para la descendencia de él
  lexicon: בנים / children, sons; descendants
  rationale: '''Hijos'' sigue el paralelo del texto y mantiene una referencia inmediata y natural; el contexto admite futura descendencia, pero la forma simple es suficiente y fiel.'
- source_word: እስከ፡ ዛቲ፡ ዕለት
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este mismo día
  lexicon: עד היום הזה / until this day
  rationale: '''Hasta este día'' reproduce el giro temporal fijo y conserva el carácter testimonial del enunciado.'
theological_decisions:
- issue: Sentido de 'renovar' los libros
  english_pob_reading: '''Renew them'' may imply preserving the books by recopying, restoring, or transmitting them afresh to later generations.'
  chosen_spanish_reading: '''Renovara'' deja abierto que los libros fueran copiados de nuevo, restaurados o transmitidos otra vez a la descendencia.'
  alternative_spanish_readings:
  - '''los copiara de nuevo'''
  - '''los restaurara'''
  - '''los transmitiera de nuevo'''
  rationale: 'El texto no define el método. La formulación española debe conservar esa tensión documental: no solo preservar, sino hacerlos aptos para nuevas generaciones de algún modo no especificado.'
  doctrine_reference: Transmisión textual y conservación de la memoria patriarcal; no aplica una doctrina dogmática específica.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje final con alto acuerdo en la revisión: se mantiene la estructura básica de la versión inglesa auditada, con solo ajustes naturales de español y sin introducir variantes textuales no atestiguadas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se conserva 'Leví' como nombre propio tradicional.
  - '''Sepulcro'' y ''cueva doble'' reflejan el registro narrativo y topográfico sin reinterpretación.'
  - '''Libros'' se mantiene porque el original y el POB inglés hablan de libros, aunque el término pueda abarcar escritos en sentido amplio.'
