base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/045/013.yaml
  text: And Joseph made it a statute for the land of Egypt to this day. And Israel lived in the land of Egypt seventeen years, and all the days that he lived were three jubilees, one hundred and forty-seven years. And he died in the fourth year of the fifth week of the forty-fifth jubilee.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:45Z'
    unchanged: false
    changes_summary: Changed 'ordinance' to 'statute' for a more formal and direct rendering of ሥርዐተ; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: Yosef estableció esto como estatuto[a] para la tierra de Egipto hasta este día. E Israel vivió en la tierra de Egipto diecisiete años, y todos los días que vivió fueron tres jubileos, ciento cuarenta y siete años. Y murió en el cuarto año de la quinta semana del cuadragésimo quinto jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘estatuto’ conserva el valor jurídico-formal de ሥርዐተ; ‘decreto’ o ‘mandato’ son posibles, pero menos precisos en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሥርዐተ
  english_pob_choice: statute
  chosen_spanish: estatuto
  alternatives_spanish:
  - estatuto
  - decreto
  - mandato
  lexicon: ἔννοια normativa / disposición legal
  rationale: ‘Statute’ en inglés apunta a una disposición establecida con fuerza normativa. En español, ‘estatuto’ conserva el carácter jurídico-formal sin sonar tan administrativo como ‘decreto’. La elección evita suavizar el peso legal del término ge'ez.
- source_word: ምድረ ግብጽ
  english_pob_choice: the land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - la tierra de Egipto
  - el país de Egipto
  lexicon: topónimo territorial
  rationale: Se mantiene la fórmula territorial directa y bíblica ‘la tierra de Egipto’, que corresponde bien al sentido geográfico y narrativo del original.
- source_word: እስራኤል
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: nombre propio / sujeto colectivo
  rationale: Se conserva el nombre propio tal como funciona en la tradición bíblica. Aunque el inglés usa ‘Israel’ y el contexto remite a Jacob, el texto recibido lo designa así y la traducción no debe resolver la tensión por cuenta propia.
- source_word: ኵሎን መዋዕለ እለ ሐይወ
  english_pob_choice: all the days that he lived
  chosen_spanish: todos los días que vivió
  alternatives_spanish:
  - todos los días que vivió
  - todo el tiempo que vivió
  lexicon: expresión temporal totalizadora
  rationale: La construcción española reproduce de modo natural la totalidad temporal del hebraísmo/gee'z sin añadir interpretación. ‘Días’ mantiene la literalidad auditada del inglés POB.
- source_word: ሠለስቱ እዮቤሌውስ
  english_pob_choice: three jubilees
  chosen_spanish: tres jubileos
  alternatives_spanish:
  - tres jubileos
  lexicon: unidad cronológica jubilar
  rationale: Se conserva el término técnico ‘jubileos’ porque el texto opera con esa cronología interna propia de Jubileos. ‘Jubileos’ es comprensible en español bíblico y evita reemplazar la unidad por una paráfrasis.
- source_word: ፲ወ፯ዓመት
  english_pob_choice: seventeen years
  chosen_spanish: diecisiete años
  alternatives_spanish:
  - diecisiete años
  lexicon: número cardinal temporal
  rationale: Traducción directa y estándar del numeral; no requiere nota porque coincide plenamente con el valor del original y del POB inglés.
- source_word: ዓመት / ዕለት
  english_pob_choice: years / day
  chosen_spanish: años / día
  alternatives_spanish:
  - años
  - día
  lexicon: marcas temporales
  rationale: Se respeta el cómputo temporal del pasaje. ‘Hasta este día’ preserva el valor de actualidad del cierre sin sobreexplicar.
theological_decisions:
- issue: Identidad referencial de ‘Israel’ en un contexto donde el sujeto individual parece ser Jacob
  english_pob_reading: Israel lived in the land of Egypt...
  chosen_spanish_reading: E Israel vivió en la tierra de Egipto...
  alternative_spanish_readings:
  - Y Jacob vivió en la tierra de Egipto...
  - Israel (es decir, Jacob) vivió en la tierra de Egipto...
  rationale: Se conserva la lectura del POB inglés y del original, que usa ‘Israel’ como designación del patriarca. No se aclara entre paréntesis porque el texto recibido no hace esa glosa y la traducción no debe resolver una designación tradicionalmente asumida por el libro.
  doctrine_reference: Uso onomástico bíblico / designación patriarcal
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del POB inglés, que cambió ‘ordinance’ por ‘statute’ para reflejar con mayor precisión ሥርዐተ. La versión española sigue esa decisión y evita retroceder a términos más genéricos. También se verificó que no se añadieran notas sin anclaje textual.
  spanish_consistency_notes:
  - Se mantiene ‘Yosef’ como forma del nombre, siguiendo el texto fuente y la práctica de transliteración del libro, en vez de normalizar a ‘José’.
  - Se conserva la cronología interna del libro (‘jubileos’, ‘semana’) sin intentar armonizarla con calendarios externos.
  - La puntuación reproduce tres oraciones coordinadas como en el inglés auditado, con separación clara y registro bíblico formal.
