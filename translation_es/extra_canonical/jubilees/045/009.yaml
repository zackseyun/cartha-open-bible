translation:
  language: es
  text: Y se cumplieron los años del hambre, y José dio al pueblo que estaba en la tierra semilla y provisiones, para que sembraran la tierra en el octavo año[a], porque el río se había desbordado sobre toda la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula ‘en el séptimo año’ es difícil textual y contextualmente. La evidencia revisada favorece ‘octavo’.
    reason: textual_variant
lexical_decisions:
- source_word: ዓመታት፡ ዐባር
  english_pob_choice: the years of famine
  chosen_spanish: los años del hambre
  alternatives_spanish:
  - los años de hambre
  - los años de la carestía
  lexicon: Ge'ez ዓባር / ḥābār (famine, hunger)
  rationale: ‘Hambre’ comunica de forma natural y fiel la calamidad alimentaria del pasaje. ‘Carestía’ es posible, pero suena más interpretativo y menos directo; ‘hambre’ conserva mejor la fuerza del término.
- source_word: ዮሴፍ፡ ለአሕዛብ፡ ዘውስተ፡ ምድረ፡
  english_pob_choice: Joseph gave the people who were in the land
  chosen_spanish: José dio a la gente que estaba en la tierra
  alternatives_spanish:
  - José dio al pueblo que estaba en la tierra
  - José dio a las personas que estaban en la tierra
  lexicon: Ge'ez ለአሕዛብ / al people, the people
  rationale: ‘La gente’ mantiene un referente colectivo natural en español sin introducir un matiz técnico innecesario. ‘El pueblo’ también sería viable, pero ‘gente’ refleja bien el conjunto de personas presentes en la tierra.
- source_word: ዘርአ፡ ወሲሳተ፡
  english_pob_choice: seed and provisions
  chosen_spanish: semilla y provisiones
  alternatives_spanish:
  - semilla y comida
  - semilla y alimentos
  lexicon: Ge'ez ዘርእ / seed; ሲሳት / provisions, sustenance
  rationale: ‘Semilla’ corresponde directamente al material para sembrar, y ‘provisiones’ sigue la revisión inglesa que corrigió ‘food’ para reflejar mejor el sustento almacenado o suministrado. ‘Comida’ sería demasiado genérica.
- source_word: ሳምን፡ ዓመት
  english_pob_choice: the eighth year
  chosen_spanish: el octavo año
  alternatives_spanish:
  - el séptimo año
  lexicon: Ge'ez ሳምን
  rationale: Se adopta ‘octavo’ siguiendo la revisión crítica documentada, que identifica ሳምን como ‘eighth’ y no ‘seventh’. Esto preserva la corrección textual frente al punto difícil señalado en la auditoría inglesa.
- source_word: ፈለግ፡ ዲበ፡ ኵሉ፡ ምድረ፡ ግብጽ
  english_pob_choice: the river had overflowed over all the land of Egypt
  chosen_spanish: el río había desbordado sobre toda la tierra de Egipto
  alternatives_spanish:
  - el río había cubierto toda la tierra de Egipto
  - el río había llenado toda la tierra de Egipto
  lexicon: Ge'ez ፈለግ / river; ዲበ / over, upon; ኵሉ / all
  rationale: ‘Desbordado sobre’ conserva la imagen de inundación/derrame del original y sigue la revisión inglesa frente a ‘filled’. ‘Cubierto’ o ‘llenado’ suavizan o alteran el movimiento del agua.
theological_decisions:
- issue: El conteo del año de siembra después del hambre
  english_pob_reading: so that they might sow the land in the eighth year
  chosen_spanish_reading: para que sembraran la tierra en el octavo año
  alternative_spanish_readings:
  - para que sembraran la tierra en el séptimo año
  rationale: La revisión textual documentada corrige ‘séptimo’ a ‘octavo’. La traducción española debe reflejar esa decisión y no perpetuar la lectura ya desautorizada por el control crítico.
  doctrine_reference: Textual criticism / source integrity
- issue: Referencia a José como agente de provisión
  english_pob_reading: Joseph gave the people who were in the land seed and provisions
  chosen_spanish_reading: José dio a la gente que estaba en la tierra semilla y provisiones
  alternative_spanish_readings:
  - José dio al pueblo...
  rationale: No hay necesidad de cargar el verbo con un sentido teológico adicional; el texto destaca la administración providente de José, preservando el acto material de dar suministros para la supervivencia y la siembra.
  doctrine_reference: Providence / narrative plain sense
translation_notes:
  revision_awareness: Se incorporó la revisión crítica que corrige el año de ‘séptimo’ a ‘octavo’ según la evidencia ge’ez documentada, y se mantuvo ‘provisiones’ para reflejar mejor el sustento suministrado. También se prefirió ‘desbordado’ sobre una lectura más débil de ‘llenado’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma del proyecto cuando el texto lo requiera; aquí no aparece el nombre divino explícito.
  - ‘José’ se mantiene como forma estándar española del nombre propio.
  - ‘Semilla’ se reserva para el material de siembra; ‘provisiones’ cubre el sustento dado a la población.
  - La nota [9] se conserva como marca de un punto textual difícil heredado del aparato inglés, aunque la lectura principal traducida es ‘octavo’.
