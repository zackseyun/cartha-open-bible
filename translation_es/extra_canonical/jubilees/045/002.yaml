translation:
  language: es
  text: cuarto, en el segundo año de la tercera semana del jubileo cuadragésimo segundo[2]. Y José llegó para recibirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '2'
    text: El ge'ez lee literalmente «cuadragésimo segundo» (፵ወ፪), aunque la cronología interna de Jubileos requiere que se trate del jubileo cuadragésimo quinto.
