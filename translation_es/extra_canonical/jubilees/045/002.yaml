lexical_decisions:
- source_word: ራብዕ
  english_pob_choice: fourth
  chosen_spanish: cuarto
  alternatives_spanish:
  - cuarta
  - en el cuarto
  lexicon: N/A
  rationale: El ge'ez simplemente expresa el ordinal 'cuarto'. En español, el contexto segmentado permite dejarlo como un ordinal adverbial o nominal breve; 'cuarto' conserva la forma concisa del original sin añadir 'año', que la revisión descartó por ser una inferencia no sustentada.
- source_word: በካልእ ዓመት
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - durante el segundo año
  - al segundo año
  lexicon: N/A
  rationale: La expresión temporal es directa y se mantiene con el valor cronológico normal de 'en el segundo año'.
- source_word: ዘሰብዓ ሣልስ
  english_pob_choice: of the third week
  chosen_spanish: de la tercera semana
  alternatives_spanish:
  - de la tercera semana de siete días
  lexicon: N/A
  rationale: '''Semana'' es la equivalencia natural de ''week'' en el sistema cronológico de Jubileos; no se añade explicación innecesaria en el texto principal.'
- source_word: ዘ፵ወ፪ እዮቤልው
  english_pob_choice: of the forty-second jubilee
  chosen_spanish: del jubileo cuadragésimo segundo
  alternatives_spanish:
  - del jubileo cuarenta y dos
  - del cuadragésimo segundo jubileo
  lexicon: N/A
  rationale: Se conserva 'jubileo' como término técnico del libro. 'Cuadragésimo segundo' reproduce el ordinal compuesto que el texto inglés y la nota textual señalan, aunque la cronología interna apunte al quincuagésimo quinto en otros testimonios; aquí se traduce la lectura transmitida por el ge'ez.
- source_word: ወመጽአ
  english_pob_choice: And Joseph came
  chosen_spanish: Y José vino
  alternatives_spanish:
  - Y José llegó
  - Y José acudió
  lexicon: N/A
  rationale: '''Vino'' reproduce el verbo simple de movimiento/concurrencia sin ampliar el sentido. Se conserva el sujeto explícito y la conjunción ''Y'' que está en el original.'
- source_word: ይትቀበል
  english_pob_choice: to receive him
  chosen_spanish: a recibirlo
  alternatives_spanish:
  - para recibirlo
  - a encontrarse con él
  lexicon: N/A
  rationale: El infinitivo con 'a' expresa finalidad de manera natural en español. 'Recibirlo' conserva la idea de salida/encuentro receptivo sin introducir detalles no presentes en la fuente.
theological_decisions:
- issue: Lectura cronológica del 'jubileo cuadragésimo segundo' frente a la corrección interna de la obra
  english_pob_reading: The Ge'ez text literally reads 'forty-second' ... though the internal chronology of Jubilees requires this to be the forty-fifth jubilee.
  chosen_spanish_reading: '... del jubileo cuadragésimo segundo[2].'
  alternative_spanish_readings:
  - '... del jubileo cuadragésimo quinto.'
  - '... del jubileo cuadragésimo segundo (lectura textual).'
  rationale: La traducción principal debe reflejar la lectura textual atestiguada por el ge'ez; la tensión cronológica se deja visible mediante la nota, no se resuelve dentro del cuerpo del texto.
  doctrine_reference: Textual criticism / faithful witness to manuscript reading
translation_notes:
  revision_awareness: La redacción sigue la última revisión que corrigió la omisión de 'Y' y eliminó añadidos no sustentados como Jacob, Gosén, abrazos y lágrimas. También evita el error previo de convertir 'cuarto' en 'año'; el ge'ez sólo dice 'cuarto', y el corte de versículo explica su aparente elipsis respecto del contexto inmediato.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma preferente en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene 'jubileo' como término técnico, consistente con el corpus de Jubileos.
  - No se introducen nombres ni detalles narrativos ausentes del texto fuente.
  - El tono es sobrio y publicable, con puntuación española estándar.
