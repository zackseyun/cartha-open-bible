translation:
  language: es
  text: Porque durante los siete años de hambre no se desbordó[a] ni regó la tierra, excepto en algunos pocos lugares junto a las orillas del río; pero ahora se desbordó, y Egipto sembró la tierra y recogió muchísimo grano en aquel año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no había subido».
    reason: Preserva la alternativa de traducción documentada en el POB inglés («had not risen») sin reemplazar la lectura principal corregida por la evidencia fuente.
lexical_decisions:
- source_word: እስመ / for during
  english_pob_choice: For during
  chosen_spanish: Porque durante
  alternatives_spanish:
  - Pues durante
  - Porque en
  lexicon: conjunction of cause/time
  rationale: El Geʽez introduce la circunstancia temporal y causal; «porque durante» conserva bien la relación explicativa del inglés POB sin sonar forzado en español.
- source_word: በ፯ዓመታት፡ ዐባር / the seven years of famine
  english_pob_choice: the seven years of famine
  chosen_spanish: los siete años de hambre
  alternatives_spanish:
  - los siete años de escasez
  - los siete años de carestía
  lexicon: temporal phrase
  rationale: «Hambre» refleja el sentido de escasez alimentaria del contexto; es más directo y bíblicamente inteligible que una paráfrasis más interpretativa.
- source_word: ወኢሰቀየ / had not watered
  english_pob_choice: had not watered
  chosen_spanish: no se desbordó ni regó
  alternatives_spanish:
  - no regó
  - no irrigó
  lexicon: verbal clause
  rationale: 'La revisión fuente-grounded corrige la lectura errónea anterior y conserva el matiz doble del pasaje: el río no se desbordó y, por ello, no regó la tierra.'
- source_word: ዘእንበለ፡ ውሑዳት፡ መካን / except in a few places
  english_pob_choice: except in a few places
  chosen_spanish: excepto en algunos pocos lugares
  alternatives_spanish:
  - salvo en unos pocos lugares
  - excepto en unas cuantas zonas
  lexicon: exception phrase
  rationale: Mantiene la restricción espacial del original con una formulación natural en español.
- source_word: ኀበ፡ ድንጋጌ፡ ፈለግ / by the banks of the river
  english_pob_choice: by the banks of the river
  chosen_spanish: junto a las orillas del río
  alternatives_spanish:
  - a lo largo de las riberas del río
  - en los márgenes del río
  lexicon: topographic phrase
  rationale: «Orillas» es claro y fiel; «junto a» conserva la idea locativa sin añadir precisión innecesaria.
- source_word: ወይእዜሰ / but now
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - mas ahora
  - sin embargo, ahora
  lexicon: discourse contrast
  rationale: Corresponde al contraste narrativo entre el tiempo de hambre y la nueva situación.
- source_word: መልአ / it overflowed
  english_pob_choice: it overflowed
  chosen_spanish: se desbordó
  alternatives_spanish:
  - rebosó
  - se salió de cauce
  lexicon: verb of water level
  rationale: «Desbordó» comunica con naturalidad el movimiento del agua y mantiene la imagen del texto.
- source_word: ዘርኡ፡ ግብጽ፡ ምድረ / Egypt sowed the land
  english_pob_choice: Egypt sowed the land
  chosen_spanish: Egipto sembró la tierra
  alternatives_spanish:
  - Egipto sembró el terreno
  - los egipcios sembraron la tierra
  lexicon: agricultural clause
  rationale: Conserva el sujeto colectivo «Egipto» tal como en el inglés POB y refleja el acto agrícola literal del original.
- source_word: ወአረሩ፡ ብዙኀ፡ ሥርናየ / and gathered very much grain
  english_pob_choice: and gathered very much grain
  chosen_spanish: y recogió muchísimo grano
  alternatives_spanish:
  - y juntó muchísimo grano
  - y cosechó mucho grano
  lexicon: harvest clause
  rationale: «Recogió» es idiomático y suficientemente literal para la recolección de la cosecha; «muchísimo» expresa la abundancia intensiva del original.
theological_decisions:
- issue: Relación entre la sequía previa y la fertilidad posterior del río
  english_pob_reading: the river had not watered the land during the famine, but now overflowed
  chosen_spanish_reading: el río no se desbordó ni regó la tierra durante los años de hambre, pero ahora se desbordó
  alternative_spanish_readings:
  - el río no había regado la tierra
  - el río no había inundado la tierra
  rationale: 'La lectura fuente-grounded preserva ambos hechos: la falta de riego en la hambruna y el desbordamiento posterior. No se debe suavizar a una sola imagen si el texto transmite dos aspectos complementarios.'
  doctrine_reference: N/A (narrative historical detail)
- issue: Sujeto colectivo «Egipto»
  english_pob_reading: Egypt sowed the land and gathered very much grain
  chosen_spanish_reading: Egipto sembró la tierra y recogió muchísimo grano
  alternative_spanish_readings:
  - los egipcios sembraron la tierra y recogieron muchísimo grano
  rationale: Se conserva el sujeto colectivo como en el inglés POB y como manera de resumir la acción nacional/cultural del pasaje sin forzar una pluralización no atestiguada por el texto base.
  doctrine_reference: N/A (narrative historical detail)
translation_notes:
  revision_awareness: La revisión aplicada corrigió la comprensión anterior de ወኢሰቀየ, que no significa 'subió' sino 'regó/irrigó'. Por eso la traducción española evita cualquier idea de nivel del agua como única imagen y refleja el sentido revisado de falta de riego durante los años de hambre.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Hambre'' se emplea como equivalente natural del contexto de escasez alimentaria, sin introducir una paráfrasis interpretativa.'
  - No se añadieron notas al pie porque no había una variante alternativa que requiriera anclaje textual en esta unidad.
