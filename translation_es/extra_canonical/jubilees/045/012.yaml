translation:
  language: es
  text: Y tomó José para el rey un quinto de todo lo producido[a], y dejó cuatro partes para ellos, para alimento y para semilla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'un quinto de todo lo producido para el rey'.
    reason: Preserva la alternativa registrada en el rastro de auditoría inglés, aunque no se prefiere en el texto principal por su posible ambigüedad sintáctica.
lexical_decisions:
- source_word: ነሥአ / took
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - retiró
  - apartó
  lexicon: tomar
  rationale: El verbo simple expresa la acción de José sin añadir matices inexistentes en el ge'ez. 'Tomó' conserva la neutralidad narrativa y funciona bien con el complemento cuantitativo.
- source_word: ለንጉሥ / for the king
  english_pob_choice: for the king
  chosen_spanish: para el rey
  alternatives_spanish:
  - para el rey
  - en nombre del rey
  - para el monarca
  lexicon: rey
  rationale: La preposición 'para' refleja el destino o asignación del quinto a favor del rey, que es precisamente la claridad lograda por la revisión inglesa. 'Monarca' sería menos directo.
- source_word: ኵሉ ዘፈረየ / everything that was produced
  english_pob_choice: everything that was produced
  chosen_spanish: todo lo que se producía
  alternatives_spanish:
  - todo lo producido
  - todo lo que había producido
  - toda la producción
  lexicon: producir
  rationale: '''Se producía'' mantiene una referencia general al conjunto de la cosecha/producción sin forzar un perfecto acabado que el contexto no exige. ''Todo lo producido'' también sería posible, pero el presente impersonal suena más natural en español narrativo.'
- source_word: ኃምስቶ / a fifth
  english_pob_choice: a fifth
  chosen_spanish: un quinto
  alternatives_spanish:
  - una quinta parte
  - un quinto
  lexicon: quinto
  rationale: '''Un quinto'' es el equivalente directo y mantiene la medida fraccionaria del original y del inglés POB.'
- source_word: ወራብዕተ እደ / four parts
  english_pob_choice: four parts
  chosen_spanish: cuatro partes
  alternatives_spanish:
  - cuatro porciones
  - cuatro partes
  lexicon: parte
  rationale: '''Cuatro partes'' reproduce de forma transparente la división restante del total después del quinto tomado para el rey. ''Porciones'' sería válido, pero menos literal.'
- source_word: ሲሲት / food
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimento
  lexicon: alimento
  rationale: '''Alimento'' es más formal y amplio que ''comida'', y encaja con el registro bíblico sin sonar arcaico.'
- source_word: ዘርእ / seed
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - semilla
  - simiente
  lexicon: semilla
  rationale: '''Semilla'' es la opción más clara y natural en español moderno. ''Simiente'' es más tradicional, pero menos transparente para una audiencia amplia.'
theological_decisions:
- issue: Distribución del tributo agrario al rey frente al sustento del pueblo
  english_pob_reading: Joseph took for the king a fifth of everything that was produced, and four parts he left to them for food and for seed.
  chosen_spanish_reading: José tomó para el rey un quinto de todo lo que se producía, y dejó cuatro partes para ellos, para alimento y para semilla.
  alternative_spanish_readings:
  - José tomó un quinto de todo lo producido para el rey, y dejó cuatro partes para ellos, para alimento y para semilla.
  - José tomó para el rey la quinta parte de toda la producción, y dejó cuatro partes para ellos, para alimento y para semilla.
  rationale: La lectura mantiene la distinción del texto entre la porción del rey y la provisión suficiente para la población. No se introduce una interpretación adicional sobre impuestos o diezmos; solo se conserva la economía del reparto descrita por el pasaje.
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa reciente aclaró la sintaxis de la primera cláusula para evitar la ambigüedad de que solo una quinta parte de lo producido 'para el rey' fuera tomada. La versión española sigue esa aclaración con 'para el rey un quinto de todo lo que se producía'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general solo cuando el pasaje lo requiere; aquí no aparece el nombre divino.
  - Se mantiene un registro bíblico claro y sobrio, evitando 'siervo' u այլ vocabulario no pertinente.
  - '''Alimento y semilla'' conserva el paralelo práctico del texto: sustento inmediato y provisión agrícola futura.'
