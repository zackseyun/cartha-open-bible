base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/045/006.yaml
  text: And Joseph gave his father and his brothers a possession, so that they might dwell in the land of Goshen, and in Rameses and all its territory, which he ruled before Pharaoh. And Israel and his sons settled in the land of Goshen, the best part of the land of Egypt. And Israel was one hundred and thirty years old when he entered Egypt.
  footnotes:
  - marker: a
    text: Or 'as was approved before Pharaoh'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:44Z'
    unchanged: false
    changes_summary: Adjusted the clause about Pharaoh to better reflect the sense of what was granted/approved before Pharaoh rather than territory being under Joseph's authority before him; added punctuation for clarity. Kept the rest substantially unchanged.
translation:
  language: es
  text: Y José dio a su padre y a sus hermanos una posesión, para que habitaran en la tierra de Gosén, y en Ramesés y en todo su territorio, que él gobernaba[a] delante de Faraón. Y Israel y sus hijos se establecieron en la tierra de Gosén, la mejor parte de la tierra de Egipto. E Israel tenía ciento treinta años cuando entró en Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que él regía ante Faraón». El ge''ez revisado favorece la idea de gobierno, no de mera aprobación.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወወሀቦ፡ ... ሀብተ፡
  english_pob_choice: gave ... a possession
  chosen_spanish: dio ... una posesión
  alternatives_spanish:
  - les dio ... una heredad
  - les concedió ... una posesión
  lexicon: H1486 / possession; gift-language
  rationale: ‘Posesión’ conserva el valor patrimonial y estable del regalo territorial sin introducir un término eclesiástico como ‘heredad’ que no está exigido por el contexto.
- source_word: ይኅደሩ፡
  english_pob_choice: might dwell
  chosen_spanish: habitaran
  alternatives_spanish:
  - moraran
  - vivieran
  lexicon: H3427 / dwell
  rationale: ‘Habitaran’ refleja el propósito de residencia estable en una tierra asignada, con tono natural en español.
- source_word: ምድረ፡ ጌሤም፡
  english_pob_choice: land of Goshen
  chosen_spanish: tierra de Gosén
  alternatives_spanish:
  - región de Gosén
  - país de Gosén
  lexicon: Geographical proper name
  rationale: ‘Tierra de Gosén’ es la forma más clara y directa en español bíblico para el territorio habitado.
- source_word: ወውስተ፡ ራሜሲና፡
  english_pob_choice: and in Rameses
  chosen_spanish: y en Ramesés
  alternatives_spanish:
  - y en Ramsés
  - y en la región de Ramesés
  lexicon: Geographical proper name
  rationale: Se mantiene el topónimo como nombre propio con transliteración coherente y legible en español.
- source_word: ወኵሎ አድያሚሃ፡
  english_pob_choice: all its territory
  chosen_spanish: todo su territorio
  alternatives_spanish:
  - todos sus distritos
  - toda su extensión
  lexicon: territory / district
  rationale: ‘Territorio’ reproduce bien la extensión dependiente del lugar mencionado y funciona sin forzar matices administrativos.
- source_word: ዘይኴንን፡ በቅድሜሁ፡ ለፈርዖን
  english_pob_choice: which he ruled before Pharaoh
  chosen_spanish: lo cual él gobernaba delante de Faraón
  alternatives_spanish:
  - lo cual él regía ante Faraón
  - lo cual él administraba ante Faraón
  lexicon: rule / govern
  rationale: El audit trail revisado corrige una lectura suavizada; ‘gobernaba’ conserva la idea de autoridad real sobre el territorio. ‘Delante de Faraón’ mantiene la construcción espacial/relacional del original sin interpretar indebidamente la cláusula.
- source_word: ምሥናይሃ፡ ለምድረ፡ ግብጽ፡
  english_pob_choice: the best part of the land of Egypt
  chosen_spanish: la mejor parte de la tierra de Egipto
  alternatives_spanish:
  - la porción más buena de la tierra de Egipto
  - la mejor región de la tierra de Egipto
  lexicon: best / land of Egypt
  rationale: ‘La mejor parte’ sigue de cerca la valoración superlativa del texto y suena natural en español.
- source_word: ወልደ፡ ምእት፡ ወሣላሳ፡ ዓመት፡
  english_pob_choice: one hundred and thirty years old
  chosen_spanish: ciento treinta años
  alternatives_spanish:
  - de ciento treinta años
  - a la edad de ciento treinta años
  lexicon: age expression
  rationale: Se omite ‘de edad’ por economía idiomática, pero el sentido temporal queda completo en el contexto de la frase.
theological_decisions:
- issue: La cláusula sobre la relación de José con Faraón y su autoridad sobre la tierra
  english_pob_reading: which he ruled before Pharaoh
  chosen_spanish_reading: lo cual él gobernaba delante de Faraón
  alternative_spanish_readings:
  - lo cual él regía ante Faraón
  - lo cual él administraba ante Faraón
  - lo cual había sido aprobado delante de Faraón
  rationale: La evidencia ge'ez indica gobierno/ejercicio de autoridad, no simple aprobación. La redacción española conserva esa tensión de autoridad con un sintagma que refleja la relación 'delante de Faraón' sin borrar el dato de gobierno.
  doctrine_reference: fidelidad textual; no doctrinal
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección más reciente del audit trail, pero también la revisión crítica posterior que señala que el ge'ez `ይኴንን` significa ‘gobierna/rige’ y no ‘fue aprobado’. Por eso la versión española conserva el sentido de autoridad de José sobre el territorio y evita la traducción suavizada.
  spanish_consistency_notes:
  - Se usa «Yahvé» como estándar solo cuando aparece el nombre divino; aquí no hay mención divina.
  - Se prefiere «gobernaba» para respetar el valor verbal fuerte del ge'ez y el ajuste crítico del audit trail.
  - «Gosén» y «Ramesés» se mantienen como topónimos bíblicos legibles en español.
  - La expresión de edad se formula de modo natural en español sin alterar el dato numérico.
