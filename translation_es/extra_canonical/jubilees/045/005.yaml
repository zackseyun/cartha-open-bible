translation:
  language: es
  text: Y José y sus hermanos comieron pan delante de su padre, y bebieron vino. Y Jacob se alegró con un gozo muy grande porque vio a José comiendo con sus hermanos y bebiendo delante de él. Y bendijo al Creador de todo, que lo había preservado y había preservado para él a sus doce hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ስሙ። ወበልዑ፡
  english_pob_choice: And ... ate bread
  chosen_spanish: comieron pan
  alternatives_spanish:
  - comieron
  - comieron alimento
  - comieron el pan
  lexicon: bread > pan
  rationale: El geʽez menciona literalmente pan (ኅብስተ), y el POB inglés lo vierte como bread. En español, 'comieron pan' conserva la concreción del alimento sin añadir un matiz eucarístico ni forzar un calco más pesado.
- source_word: ዮሴፍ፡ ... አኀዊሁ፡
  english_pob_choice: Joseph and his brothers
  chosen_spanish: José y sus hermanos
  alternatives_spanish:
  - José y sus hermanos
  - José con sus hermanos
  lexicon: proper name + brothers
  rationale: Se mantiene la referencia narrativa directa. 'Sus hermanos' refleja la relación posesiva implícita sin sobreexplicar.
- source_word: በቅድመ፡ አቡሆሙ፡
  english_pob_choice: before their father
  chosen_spanish: delante de su padre
  alternatives_spanish:
  - ante su padre
  - en presencia de su padre
  lexicon: before > delante de / ante
  rationale: El valor espacial/de presencia de la expresión se conserva bien con 'delante de', que suena natural en español y mantiene la idea de comer y beber en presencia del padre.
- source_word: ወሰትዩ፡ ወይነ፡
  english_pob_choice: and they drank wine
  chosen_spanish: y bebieron vino
  alternatives_spanish:
  - y tomaron vino
  - y bebieron el vino
  lexicon: wine > vino; drank > bebieron
  rationale: Correspondencia directa con el texto fuente y con el inglés auditado. 'Bebieron vino' es claro y digno.
- source_word: ወተፈሥሐ፡ ... ፍሥሓ፡ ዐቢየ፡ ጥቀ፡
  english_pob_choice: rejoiced with very great joy
  chosen_spanish: se alegró con un gozo muy grande
  alternatives_spanish:
  - se regocijó con un gozo muy grande
  - se alegró muchísimo
  lexicon: rejoiced > se alegró; very great joy > gozo muy grande
  rationale: '''Se alegró'' evita arcaísmo y ''gozo muy grande'' conserva la intensificación doble del geʽez (muy grande / abundantemente) sin exagerar más allá del original.'
- source_word: እስመ፡ ርእዮ፡
  english_pob_choice: because he saw Joseph
  chosen_spanish: porque vio a José
  alternatives_spanish:
  - porque había visto a José
  - al ver a José
  lexicon: because he saw > porque vio
  rationale: El causal simple reproduce la relación explicativa del texto. Se mantiene el objeto animado con 'a José'.
- source_word: ይበልዕ፡ ምስለ፡ አኀዊሁ፡ ወይሰቲ፡ በቅድሜሁ፡
  english_pob_choice: eating with his brothers and drinking before him
  chosen_spanish: comiendo con sus hermanos y bebiendo delante de él
  alternatives_spanish:
  - comiendo con sus hermanos y bebiendo ante él
  - comiendo con sus hermanos y bebiendo en su presencia
  lexicon: eating/drinking before him > comiendo... bebiendo delante de él
  rationale: Se conserva la simultaneidad y la escena de presencia. 'Delante de él' es más idiomático que una perífrasis más abstracta.
- source_word: ወባረኮ፡ ለፈጣሪ፡ ኵሉ፡
  english_pob_choice: And he blessed the Creator of all
  chosen_spanish: Y bendijo al Creador de todo
  alternatives_spanish:
  - Y bendijo al Creador de todas las cosas
  - Y bendijo al Dios Creador de todo
  lexicon: Creator of all > Creador de todo
  rationale: '''Creador de todo'' refleja de manera fiel y sobria la construcción del original y coincide con la formulación auditada en inglés.'
- source_word: ዘዐቀቦ፡
  english_pob_choice: who had preserved him
  chosen_spanish: que lo había preservado
  alternatives_spanish:
  - que lo había guardado
  - que lo había protegido
  lexicon: preserved > había preservado
  rationale: '''Preservado'' conserva la idea de custodia providencial y reproduce el verbo elegido por el POB inglés sin perder dignidad estilística.'
- source_word: ዐቀበ፡ ሎቱ፡ ፲ወ፪ ውሉደ።
  english_pob_choice: had preserved for him his twelve sons
  chosen_spanish: había preservado para él a sus doce hijos
  alternatives_spanish:
  - había guardado para él a sus doce hijos
  - le había conservado sus doce hijos
  lexicon: preserved for him + twelve sons > había preservado para él a sus doce hijos
  rationale: Se mantiene la estructura benefactiva 'para él' y el número explícito 'doce hijos', sin suavizar la fuerza de conservación del original.
theological_decisions:
- issue: Bendición del 'Creador de todo' en lugar de una fórmula eufemística o litúrgica
  english_pob_reading: And he blessed the Creator of all
  chosen_spanish_reading: Y bendijo al Creador de todo
  alternative_spanish_readings:
  - Y bendijo a Dios
  - Y alabó al Creador de todo
  rationale: El texto presenta una bendición dirigida al Creador, no una adaptación litúrgica. 'Creador de todo' preserva el énfasis teológico en la soberanía creadora de Dios sin sustituirlo por una fórmula más general.
  doctrine_reference: Dios como Creador y sustentador providencial
- issue: Preservación providencial de Jacob y de sus doce hijos
  english_pob_reading: who had preserved him and had preserved for him his twelve sons
  chosen_spanish_reading: que lo había preservado y había preservado para él a sus doce hijos
  alternative_spanish_readings:
  - que lo había guardado y le había conservado a sus doce hijos
  - que lo había protegido y le había conservado a sus doce hijos
  rationale: 'La repetición del verbo de preservación es significativa: expresa salvaguarda providencial tanto de Jacob como de la descendencia de Israel. Mantenerla evita diluir la estructura teológica del pasaje.'
  doctrine_reference: Providencia divina y preservación del linaje de Israel
translation_notes:
  revision_awareness: La versión inglesa POB y la revisión más reciente coinciden plenamente sin cambios; no se documentan variantes textuales ni notas previas. La redacción española sigue de cerca el pasaje geʽez y mantiene la misma estructura sintáctica básica del auditado inglés, sin introducir glosas adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando el texto menciona el nombre divino; aquí no aparece el tetragrámaton.
  - '''José'' se conserva como forma española estándar del nombre propio.'
  - '''delante de'' se usa consistentemente para la escena de presencia física ante el padre; no se alterna con ''ante'' o ''en presencia de'' dentro del versículo.'
  - Se mantiene la repetición de 'había preservado' para reflejar el paralelismo del original y del inglés auditado.
