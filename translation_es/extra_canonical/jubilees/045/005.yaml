  text: And Joseph and his brothers ate bread before their father, and they drank wine. And Jacob rejoiced with very great joy because he saw Joseph eating with his brothers and drinking before him. And he blessed the Creator of all, who had preserved him and had preserved for him his twelve sons.
  revision_pass:
