    text: 'O: «cuadragésimo cuarto».'
    reason: previous_rendering
lexical_decisions:
- source_word: ዓመት
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - año calendario
  - período
  lexicon: año
  rationale: El Ge'ez designa un año cronológico ordinario; «año» es la forma natural y fiel en español.
- source_word: ቀዳሚ
  english_pob_choice: first
  chosen_spanish: primer
  alternatives_spanish:
  - primero
  - inicial
  lexicon: primero
  rationale: Aquí funciona como adjetivo ordinal antepuesto; «primer» es la forma idiomática y precisa en español.
- source_word: ራብዕ
  english_pob_choice: fourth
  chosen_spanish: cuarta
  alternatives_spanish:
  - cuarto
  lexicon: cuarto
  rationale: El término numérico ordinal concuerda con «semana» en femenino.
- source_word: ዘአርብዓ
  english_pob_choice: forty-fifth
  chosen_spanish: cuadragésimo quinto
  alternatives_spanish:
  - cuadragésimo cuarto
  lexicon: cuadragésimo
  rationale: La revisión crítica indicada por el audit trail corrige la lectura a «forty-fifth». En español se mantiene el ordinal compuesto estándar, evitando la forma incorrecta «cuadragésimo cuarto».
- source_word: እዮቤሌው
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - jubileo de jubileos
  lexicon: jubileo
  rationale: «Jubileo» reproduce el término técnico del calendario de Jubileos; es claro y tradicional en español bíblico sin perder el valor cronológico.
theological_decisions:
- issue: Cronología aparentemente difícil / posible corrupción textual
  english_pob_reading: The chronological notice appears difficult; the Ethiopic text is translated as given, but the jubilee numbering may reflect a textual problem or corruption in transmission.
  chosen_spanish_reading: Se traduce el dato cronológico tal como lo ofrece la lectura crítica, manteniendo el número corregido sin suavizar la tensión textual.
  alternative_spanish_readings:
  - El aviso cronológico parece difícil frente a las fórmulas de datación previas.
  - La numeración del jubileo puede reflejar un problema textual o corrupción en la transmisión.
  rationale: La nota de la POB inglesa documenta una tensión textual real. La traducción española conserva esa lectura, y la nota aclara que el número sigue la revisión crítica, no una armonización interpretativa.
  doctrine_reference: Crítica textual / transmisión del texto
translation_notes:
  revision_awareness: 'La decisión de revisión relevante afecta el número del jubileo: la auditoría inglesa muestra una corrección de «forty-fourth» a «forty-fifth» siguiendo el texto crítico de Charles 1895. La versión española adopta esa lectura corregida y evita reproducir la forma anterior errónea.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable aquí, pues el versículo no contiene el Nombre divino.
  - «Jubileo» se usa como término técnico cronológico, no como celebración litúrgica posterior.
  - El ordinal «primer» y el sustantivo «semana» conservan la estructura sintáctica del original sin calco excesivo.
