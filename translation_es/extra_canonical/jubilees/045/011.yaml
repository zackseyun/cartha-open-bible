translation:
  language: es
  text: Y aquel año fue el primer año de la cuarta semana del cuadragésimo quinto jubileo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El aviso cronológico parece difícil frente a las fórmulas de datación anteriores del capítulo. El texto etiópico se traduce tal como está dado, pero la numeración del jubileo puede reflejar un problema textual o una corrupción en la transmisión.
    reason: textual_variant
