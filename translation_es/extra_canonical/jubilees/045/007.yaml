translation:
  language: es
  text: Y José sostuvo a su padre, a sus hermanos y todo su ganado, como les bastaba durante los siete años de hambre.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y los mantuvo a ellos y a todo su ganado».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወሴሰዮሙ / sustained
  english_pob_choice: sustained
  chosen_spanish: sostuvo
  alternatives_spanish:
  - sustentó
  - mantuvo
  - proveyó para
  lexicon: sostener / sustentar
  rationale: El ge'ez expresa que José los mantuvo o sostuvo durante la carestía; en español, 'sostuvo' transmite el acto de mantenerlos con provisión continua sin añadir la idea abstracta de 'proveer' que fue descartada en la revisión inglesa.
- source_word: ለአቡሁ / his father
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  - a su progenitor
  lexicon: padre
  rationale: La referencia es directa y literal. 'Padre' es claro y fiel al vínculo familiar.
- source_word: ለአኀዊሁ / his brothers
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos
  lexicon: hermanos
  rationale: Mantiene el sentido inmediato del texto fuente sin expansión.
- source_word: ጥሪቶሙ / their livestock
  english_pob_choice: all their livestock
  chosen_spanish: todo su ganado
  alternatives_spanish:
  - todo su ganado
  - todos sus animales
  lexicon: ganado
  rationale: La revisión inglesa precisó que el término se refiere específicamente al ganado/livestock. 'Ganado' es natural en español y conserva esa concreción económica y pastoral.
- source_word: በከመ፡ የአክሎሙ / as was sufficient for them
  english_pob_choice: as was sufficient for them
  chosen_spanish: como les bastaba
  alternatives_spanish:
  - según les bastaba
  - como era suficiente para ellos
  lexicon: bastar
  rationale: '''Les bastaba'' comunica suficiencia de manera idiomática y fiel; evita una calca pesada y conserva la medida de provisión suficiente.'
- source_word: ሰብዐቱ፡ ዓመታት፡ ዐባር / the seven years of famine
  english_pob_choice: during the seven years of famine
  chosen_spanish: durante los siete años de hambre
  alternatives_spanish:
  - durante los siete años de hambre
  - en los siete años de hambre
  lexicon: hambre
  rationale: '''Hambre'' traduce de forma directa la idea de famine y es idiomático en español bíblico y moderno.'
theological_decisions:
- issue: Alcance de la provisión de José
  english_pob_reading: And Joseph sustained his father and his brothers, and all their livestock
  chosen_spanish_reading: Y José sostuvo a su padre, a sus hermanos y todo su ganado
  alternative_spanish_readings:
  - Y José los sustentó a ellos y a todo lo que era de ellos
  - Y José les proveyó a su padre, a sus hermanos y a todo su ganado
  rationale: Se sigue la revisión inglesa que restringe el objeto al padre, los hermanos y el ganado, evitando ampliar el sentido a 'todo lo suyo'. La frase española conserva el acto de mantenerlos durante la crisis sin convertirlo en una explicación teológica o abstracta.
  doctrine_reference: Providencia y cuidado familiar en contexto narrativo; no añade formulación doctrinal externa.
translation_notes:
  revision_awareness: La versión inglesa fue revisada para precisar que el objeto de la provisión incluye específicamente el ganado y no una abstracción como 'todo lo suyo'. La traducción española refleja esa revisión y evita introducir 'les proveyó', que no está en el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo 'José' como forma española del nombre propio, siguiendo la equivalencia establecida para Ἰησοῦς/יוֹסֵף en este contexto.
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece ningún término divino explícito.
  - '''Ganado'' se eligió por la revisión textual y por ser más preciso que ''bienes'' o ''posesiones'' en este versículo.'
