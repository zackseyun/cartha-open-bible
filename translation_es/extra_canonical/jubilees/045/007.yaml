review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido fuente y la revisión inglesa: José sostiene a su padre, a sus hermanos y su ganado durante los siete años de hambre. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en el rastro inglés, que contrasta con la lectura revisada como ''y proveyó para ellos y todo lo que era suyo'', no ''y los mantuvo a ellos y a todo su ganado''.'
  spanish_quality_summary: El español principal es claro, natural y digno. 'Sostuvo' y 'todo su ganado' funcionan bien. La frase 'como les bastaba' es aceptable, aunque algo menos idiomática que 'según lo que les bastaba' o 'lo suficiente para ellos'; no exige cambio. El único ajuste necesario es la nota al pie para reflejar correctamente la variante histórica/documental.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ganado' refleja adecuadamente ጥሪቶሙ según la revisión auditada. No aparecen términos teológicos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: La nota al pie altera la alternativa preservada en el rastro inglés.
    rationale: 'La nota española dice: «y los mantuvo a ellos y a todo su ganado», pero la nota inglesa documenta la lectura previa como ''and he provided for them and all that was theirs''. La nota actual repite en parte la lectura principal revisada (''ganado'') y no conserva el contraste semántico importante con ''todo lo suyo'' / ''todo lo que era suyo''.'
  revised_spanish_text: Y José sostuvo a su padre, a sus hermanos y todo su ganado, como les bastaba durante los siete años de hambre.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «y proveyó para ellos y todo lo que era suyo».'
    reason: Preserva la alternativa documentada en la auditoría inglesa ('and he provided for them and all that was theirs') sin mezclarla con la lectura revisada sobre el ganado.
  revision_rationale: Se mantiene el texto principal porque es fiel, claro y idiomático. Se corrige únicamente la nota al pie para que refleje con precisión la alternativa registrada en la auditoría inglesa, en lugar de introducir una formulación híbrida que desdibuja la diferencia entre 'ganado' y 'todo lo suyo'.
