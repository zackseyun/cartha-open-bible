base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/012.yaml
  text: And he divided all the possessions that he had between them on that day, and he gave the greater share to the man who was born first, and the tower[12] and all that was around it, and all that Abraham had acquired at the Well of the Oath.
  footnotes:
  - marker: '12'
    text: '''The tower'' may refer to a specific estate feature included in Isaac''s holdings. The surrounding inheritance list is terse and may reflect a difficult underlying text.'
    reason: cultural_note
  - marker: a
    text: Or 'on that day[12], and he gave the greater share to the man who was born first, and the tower'.
    reason: previous_rendering
  - marker: b
    text: Or 'all that he had'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:05Z'
    unchanged: false
    changes_summary: Changed 'larger share' to 'greater share' for a more formal register, and 'to the one' to 'to the man' to reflect the explicit noun in the source.
translation:
  language: es
  text: Y aquel día repartió entre ellos todas las posesiones que tenía, y dio la parte mayor al hombre que había nacido primero, y la torre[a] y todo lo que estaba alrededor de ella, y todo lo que Abraham había adquirido junto al Pozo del Juramento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''La torre'' puede referirse a una característica concreta de la propiedad incluida en las posesiones de Isaac. La lista circundante de la herencia es breve y puede reflejar un texto subyacente difícil.'
    reason: cultural_note
lexical_decisions:
- source_word: ወከፈለ፡ ... በይእቲ፡ ዕለት፡
  english_pob_choice: And he divided ... on that day
  chosen_spanish: Y repartió ... aquel día
  alternatives_spanish:
  - Y dividió ... en aquel día
  - Y repartió ... ese día
  lexicon: repartir / dividir
  rationale: El ge'ez expresa una distribución patrimonial; 'repartió' suena natural en español y conserva la idea de asignación entre herederos. 'Aquel día' refleja bien el valor puntual y narrativo de la expresión temporal.
- source_word: ኵሎ፡ ዘቦ፡ ጥሪተ፡
  english_pob_choice: all the possessions that he had
  chosen_spanish: todas las posesiones que tenía
  alternatives_spanish:
  - todo lo que tenía
  - todas sus posesiones
  lexicon: posesiones / bienes
  rationale: La revisión señaló explícitamente 'possessions/property/wealth' en el ge'ez; 'posesiones' preserva ese sustantivo concreto sin perder naturalidad. 'Tenía' mantiene la posesión personal sin añadir matices ajenos.
- source_word: ዕበየ፡
  english_pob_choice: the greater share
  chosen_spanish: la porción mayor
  alternatives_spanish:
  - la parte mayor
  - la porción más grande
  lexicon: porción / parte
  rationale: '''Porción mayor'' comunica una distribución hereditaria y evita una lectura demasiado coloquial. En español, ''porción mayor'' es claro y conserva el sentido de lote preferente.'
- source_word: ለብእሲ፡ ዘውእቱ፡ ቀደመ፡ ተወልደ፡
  english_pob_choice: the man who was born first
  chosen_spanish: al hombre que había nacido primero
  alternatives_spanish:
  - al primogénito
  - al que nació primero
  lexicon: primogénito / primero nacido
  rationale: El texto fuente dice literalmente 'el hombre que nació primero'; se mantiene esa forma para no borrar la construcción explícita. 'Primogénito' sería más idiomático, pero introduce una equivalencia tradicional más interpretativa.
- source_word: ወማኅፈደ፡
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - la atalaya
  - la torre-establecimiento
  lexicon: torre
  rationale: La POB inglesa conserva 'the tower' con nota porque el referente es oscuro. En español se mantiene 'torre' por fidelidad al término atestiguado, sin intentar resolver la referencia oscura.
- source_word: በኀበ፡ ዐዘቅተ፡ መሐላ።
  english_pob_choice: at the Well of the Oath
  chosen_spanish: junto al Pozo del Juramento
  alternatives_spanish:
  - en el Pozo del Juramento
  - junto al Pozo del Pacto
  lexicon: Pozo del Juramento
  rationale: '''Pozo del Juramento'' traduce de manera directa el nombre del lugar y sigue la lectura auditada de la versión inglesa. ''Juramento'' conserva el eco etimológico del topónimo sin sustituirlo por una paráfrasis.'
theological_decisions:
- issue: Tratamiento del topónimo y del título patrimonial sin armonizarlo con formulaciones bíblicas más familiares
  english_pob_reading: the tower ... and all that Abraham had acquired at the Well of the Oath
  chosen_spanish_reading: la torre ... y todo lo que Abraham había adquirido junto al Pozo del Juramento
  alternative_spanish_readings:
  - la torre ... y todo lo que Abraham poseía en el Pozo del Juramento
  - la torre ... y todo lo que Abraham había comprado
  rationale: No hay base para suavizar el texto hacia una formulación más conocida o para explicar el origen jurídico del bien; se conserva la enumeración tersa y algo enigmática del original, incluida la referencia al lugar con valor patrimonial.
  doctrine_reference: Principio de fidelidad textual y preservación de ambigüedad heredada en textos apócrifos/extra-canónicos
translation_notes:
  revision_awareness: La versión española incorpora la corrección de la revisión que añadió el sustantivo explícito 'possessions/propiedades' y desplazó el sentido de 'the tower' al sustantivo adecuado. También sigue el ajuste de registro de 'greater share' y la explicitación del sujeto como 'el hombre' que nació primero.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca en este versículo, sino como convención general del proyecto; aquí no es necesario.
  - Se evitó 'primogénito' para no desplazar la construcción explícita del fuente, aunque sería una equivalencia posible en español.
  - '''Pozo del Juramento'' conserva el nombre propio sin introducir un equivalente doctrinalmente cargado como ''pacto''.'
