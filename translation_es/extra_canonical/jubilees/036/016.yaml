    changes_summary: Changed 'has been gladdened' to the more natural 'has rejoiced.' Removed 'Most High' because it is not present in the source. Kept the final blessing clause otherwise unchanged, though it remains textually abrupt.
translation:
  language: es
  text: Y mi corazón se ha regocijado por la primogenitura, porque tú no cometiste violencia contra ella[a]. Que Yahvé te bendiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque no se hizo violencia por causa de ella». Esta fue una lectura anterior; el ge''ez fue revisado como una negación activa en segunda persona.'
    reason: previous_rendering
lexical_decisions:
- source_word: ልብየ
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi alma
  - mi interior
  lexicon: לב / καρδία semantic field
  rationale: «Corazón» conserva el centro afectivo e ինտencional del hebreo/semítico y suena natural en español bíblico contemporáneo; «mi interior» sería más explicativo, pero menos directo.
- source_word: በእንተ፡ ልህቃን
  english_pob_choice: concerning the birthright
  chosen_spanish: por la primogenitura
  alternatives_spanish:
  - respecto de la primogenitura
  - acerca de la primogenitura
  lexicon: בכורה / birthright
  rationale: La fuente inglesa usa «birthright»; en español, «primogenitura» es el término bíblico exacto y transparente. «Por» refleja la relación temática del ge'ez sin sobrecargar la frase.
- source_word: ኢትግበር
  english_pob_choice: you did not do violence concerning it
  chosen_spanish: tú no hiciste violencia respecto de ella
  alternatives_spanish:
  - no cometiste violencia respecto de ella
  - no hiciste violencia a su respecto
  lexicon: עשה + violencia / active second-person negation
  rationale: 'La revisión auditable corrige la pasiva errónea: el sujeto es Esú/Edom en segunda persona. «Hiciste violencia» conserva la fuerza verbal y evita suavizar el acto; «respecto de ella» mantiene el referente de la primogenitura.'
- source_word: ይባርከ፡' እግዚአብሔር፡
  english_pob_choice: May the LORD bless you
  chosen_spanish: Que Yahvé te bendiga
  alternatives_spanish:
  - Que Yahvé te bendiga a ti
  - Yahvé te bendiga
  lexicon: יהוה / divine blessing formula
  rationale: Se usa «Yahvé» conforme al estándar del proyecto para el nombre divino. El subjuntivo exhortativo «Que... bendiga» reproduce bien la bendición optativa. El objeto «te» incorpora el tú implícito señalado en la auditoría inglesa.
theological_decisions:
- issue: Nombre divino al final de la bendición
  english_pob_reading: May the LORD bless you
  chosen_spanish_reading: Que Yahvé te bendiga
  alternative_spanish_readings:
  - Que el Señor te bendiga
  - Yahvé te bendiga
  rationale: La pauta del proyecto exige renderizar el tetragrámaton como «Yahvé» en el texto principal, no ocultarlo tras «Señor». La forma optativa mantiene el tono de bendición sin añadir contenido no presente.
  doctrine_reference: Uso reverente del nombre divino / fidelidad al tetragrámaton
- issue: Relación entre la alegría del corazón y la primogenitura
  english_pob_reading: And my heart has rejoiced concerning the birthright
  chosen_spanish_reading: Y mi corazón se ha regocijado por la primogenitura
  alternative_spanish_readings:
  - Y mi corazón se ha alegrado por la primogenitura
  - Y mi corazón se ha regocijado acerca de la primogenitura
  rationale: «Regocijado» sigue la revisión inglesa y preserva una alegría intensa; «por» mantiene la causalidad o referencia temática sin forzar una explicación interpretativa.
  doctrine_reference: Afecto humano y lenguaje de bendición en narrativa patriarcal
- issue: Violencia activa atribuida al interlocutor
  english_pob_reading: that you did not do violence concerning it
  chosen_spanish_reading: porque tú no hiciste violencia respecto de ella
  alternative_spanish_readings:
  - porque no se hizo violencia respecto de ella
  - porque tú no cometiste violencia respecto de ella
  rationale: 'La auditoría textual corrige la voz y la persona: el ge''ez presenta una negación activa dirigida al interlocutor. La versión española conserva esa tensión, en vez de neutralizarla en pasiva.'
  doctrine_reference: Principio de no alterar el sujeto/acción del testimonio textual
translation_notes:
  revision_awareness: La redacción refleja la última revisión inglesa que sustituyó «has been gladdened» por «has rejoiced», eliminó «Most High» por no estar en la fuente, corrigió la construcción a voz activa («you did not do violence») y añadió el objeto implícito («you») en la bendición final. La versión española sigue esas correcciones y evita reintroducir el contenido retirado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según la convención del proyecto para el nombre divino.
  - Se prefirió «primogenitura» por su valor bíblico habitual y por corresponder mejor al sentido de birthright.
  - Se conservó la segunda persona singular en «tú» y «te» para reflejar el sujeto implícito de la cláusula final y la acción atribuida en la cláusula intermedia.
  - No se introdujo «Señor» ni «Mesías», y no hay términos cristológicos en este versículo.
  - La puntuación busca preservar la abrupta continuidad del cierre benedictivo sin explicitar más de lo que dice la fuente.
