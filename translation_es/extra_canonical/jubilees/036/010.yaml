  to: Y en el día de tumulto y de maldición y de furor y de ira, y con fuego abrasador que devora, así como quemó a Sodoma, así quemará su tierra y su ciudad y todo lo que es suyo; y será borrado del libro[a] de la disciplina de los hijos de los hombres, y no subirá al libro de la vida, sino a aquello que está destinado para destrucción, y pasará a la maldición eterna, para que por todos los tiempos sea renovado su juicio con execración[b] y con maldición y con ira y con tormento y con furor y con plagas y con enfermedad perpetua.
