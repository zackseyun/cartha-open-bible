base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/010.yaml
  text: And on the day of turmoil and cursing and fury and wrath[10], and with blazing, devouring fire, just as he burned Sodom, so he will burn his land and his city and everything that is his; and he will be blotted out from the book of the discipline of the children of men, and he will not ascend into the book of life, but into that which is appointed for destruction, and he will pass into the eternal curse[10], so that for all days their judgment may be renewed with execration and with cursing and with wrath and with torment and with fury and with plagues and with everlasting disease.
  footnotes:
  - marker: '10'
    text: The clause 'he will be erased from the book of the discipline of the children of men' is textually difficult. The Ge'ez appears to distinguish this record from 'the book of life'; the exact nuance of the first book is uncertain.
    reason: textual_variant
  - marker: '10'
    text: The final sequence piles up near-synonymous curse terms. The translation preserves the accumulation rather than compressing it, because the rhetoric is part of the warning.
    reason: segmentation_note
  - marker: a
    text: Or 'they may denounce him with cursing and with execration'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:07Z'
    unchanged: false
    changes_summary: 'Adjusted a few terms for closer lexical correspondence and consistency: changed ''wrath and anger'' to ''fury and wrath'' to better distinguish adjacent terms, ''erased'' to ''blotted out'' for formal register, and repeated ''with'' in the final series for smoother, more literal coordination.'
translation:
  language: es
  text: Y en el día de tumulto y de maldición y de furor y de ira, y con fuego abrasador que devora, así como quemó a Sodoma, así quemará su tierra y su ciudad y todo lo que es suyo; y será borrado del libro[a] de la disciplina de los hijos de los hombres, y no subirá al libro de la vida, sino a aquello que está destinado para destrucción, y pasará a la maldición eterna, para que por todos los tiempos sea renovado su juicio con execración[b] y con maldición y con ira y con tormento y con furor y con plagas y con enfermedad perpetua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula sobre el 'libro de la disciplina de los hijos de los hombres' es textualmente difícil y parece distinguirse del 'libro de la vida'. El sentido exacto del primer libro sigue siendo incierto.
    reason: textual_variant
  - marker: b
    text: La secuencia final reúne términos muy cercanos de juicio y castigo. Se conserva la acumulación sin condensarla para reflejar la advertencia retórica del texto.
    reason: segmentation_note
lexical_decisions:
- source_word: ዕለተ፡ ሁከት፡ ወመርገም፡ ወቍጥዓ፡ ወመዓት
  english_pob_choice: day of turmoil and cursing and fury and wrath
  chosen_spanish: día de tumulto y de maldición y de furor y de ira
  alternatives_spanish:
  - día de confusión y de maldición y de furor y de ira
  - día de tumulto y de execración y de furor y de ira
  lexicon: semantic cluster
  rationale: Conservo la acumulación de términos de crisis y juicio sin suavizarla. 'Tumulto' comunica היט el desorden de ሁከት; 'maldición' traduce መርገም en registro bíblico claro; 'furor' e 'ira' distinguen los dos últimos términos como en la revisión inglesa.
- source_word: በእሳት፡ ዘይነድድ፡ በላዒ፡
  english_pob_choice: with blazing, devouring fire
  chosen_spanish: con fuego abrasador que devora
  alternatives_spanish:
  - con fuego llameante que devora
  - con fuego ardiente y devorador
  lexicon: descriptive participle
  rationale: La secuencia subraya un fuego que arde y consume; 'abrasador' mantiene la imagen de intensidad, y 'que devora' conserva el participio de acción destructiva.
- source_word: ያውዒ፡ ምድረ፡ ወሀገረ፡ ወኵሎ፡ ዘይከውን፡ ዚአሁ፡
  english_pob_choice: he will burn his land and his city and everything that is his
  chosen_spanish: quemará su tierra y su ciudad y todo lo que es suyo
  alternatives_spanish:
  - quemará su país y su ciudad y todo lo que le pertenece
  - quemará su tierra y su ciudad y todo cuanto es suyo
  lexicon: possessive totality
  rationale: Mantengo la repetición enfática de pertenencia total. 'Lo que es suyo' reproduce de forma natural el cierre inclusivo sin añadir matices no presentes.
- source_word: ወይደመሰስ፡ እመጽሐፈ፡ ተግሣጸ፡ ውሉደ፡ ሰብእ፡
  english_pob_choice: he will be blotted out from the book of the discipline of the children of men
  chosen_spanish: será borrado del libro de la disciplina de los hijos de los hombres
  alternatives_spanish:
  - será borrado del libro de la corrección de los hijos de los hombres
  - será borrado del libro de la instrucción de los hijos de los hombres
  lexicon: textual_variant
  rationale: Sigo la solución inglesa para el primer libro, distinguiéndolo del libro de la vida. 'Disciplina' preserva el campo semántico de corrección formativa y refleja la tradición POB, aunque el matiz exacto siga siendo incierto.
- source_word: ወአየዐርግ፡ ውስተ፡ መጽሐፈ፡ ሕይወት፡
  english_pob_choice: he will not ascend into the book of life
  chosen_spanish: no subirá al libro de la vida
  alternatives_spanish:
  - no ascenderá al libro de la vida
  - no entrará en el libro de la vida
  lexicon: idiomatic ascension
  rationale: '''Subirá'' conserva la imagen de ascenso de አየዐርግ y suena natural en español bíblico sin perder literalidad.'
- source_word: ለመርገም፡ ዘለዓለም፡
  english_pob_choice: into the eternal curse
  chosen_spanish: a la maldición eterna
  alternatives_spanish:
  - al anatema eterno
  - a la execración eterna
  lexicon: fixed phrase
  rationale: '''Maldición eterna'' es la forma más clara y fiel para un lector moderno, manteniendo el carácter irrevocable del destino descrito.'
- source_word: እንዘ፡ ትትሔደስ፡ በጽእለት፡ ወበመርገም፡ ወበመዐት፡ ወበፃዕር፡ ወበቍጥዓ፡ ወበመቅሠፍት፡ ወበደዌ፡ ዘለዓለም
  english_pob_choice: so that for all days their judgment may be renewed with execration and with cursing and with wrath and with torment and with fury and with plagues and with everlasting disease
  chosen_spanish: para que por todos los días sea renovado su juicio con execración y con maldición y con ira y con tormento y con furor y con plagas y con enfermedad perpetua
  alternatives_spanish:
  - para que por todos los días sea renovado su juicio con execración y con maldición y con furor y con ira y con tormento y con plagas y con enfermedad perpetua
  - de modo que por todos los días se renueve su juicio con execración y con maldición y con ira y con tormento y con furor y con plagas y con enfermedad perpetua
  lexicon: renewed judgment
  rationale: 'Corrijo la interpretación errónea de un mero acto de denunciar: el ge''ez apunta a que ''su juicio'' sea renovado. Mantengo la cadena de términos para reflejar la fuerza retórica y el orden cercano al original, con ''execración'' para ጽእለት y ''maldición'' para መርገም.'
theological_decisions:
- issue: Distinción entre 'libro de la disciplina' y 'libro de la vida'
  english_pob_reading: The first book is textually difficult and distinct from the book of life; the translation preserves the distinction.
  chosen_spanish_reading: el libro de la disciplina de los hijos de los hombres es distinto del libro de la vida
  alternative_spanish_readings:
  - el libro de la corrección de los hijos de los hombres es distinto del libro de la vida
  - el libro de la instrucción de los hijos de los hombres es distinto del libro de la vida
  rationale: Sigo la nota textual inglesa y no fusiono los dos libros. La traducción conserva la tensión textual en lugar de resolverla artificialmente.
  doctrine_reference: textual criticism / apocalyptic judgment imagery
- issue: Acumulación de maldiciones al final del versículo
  english_pob_reading: The translation preserves the accumulation rather than compressing it, because the rhetoric is part of the warning.
  chosen_spanish_reading: con execración y con maldición y con ira y con tormento y con furor y con plagas y con enfermedad perpetua
  alternative_spanish_readings:
  - con execración, maldición, ira, tormento, furor, plagas y enfermedad perpetua
  - con execración y maldición y ira y tormento y furor y plagas y enfermedad perpetua
  rationale: La serie se deja acumulativa para conservar la retórica de advertencia y la cadencia de juicio del texto.
  doctrine_reference: apocalyptic rhetoric / divine judgment
- issue: Destino de destrucción versus ingreso al libro de la vida
  english_pob_reading: he will not ascend into the book of life, but into that which is appointed for destruction
  chosen_spanish_reading: no subirá al libro de la vida, sino a aquello que está destinado para destrucción
  alternative_spanish_readings:
  - no subirá al libro de la vida, sino a lo destinado para destrucción
  - no entrará en el libro de la vida, sino en lo destinado para destrucción
  rationale: Conservo la oposición entre vida y destrucción sin suavizar la antítesis.
  doctrine_reference: eschatology / final judgment
translation_notes:
  revision_awareness: La revisión más reciente corrigió la lectura de la frase final para entender 'sea renovado su juicio' en lugar de una denuncia dirigida a él. Esta versión española sigue esa corrección y mantiene la separación entre el libro de la disciplina y el libro de la vida, además de preservar la acumulación final de maldiciones.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino explícito; aquí no aparece.
  - '''Maldición'' se mantiene para መርገም y ''execración'' para ጽእለት, diferenciando ambos términos cuando la serie lo exige.'
  - '''Libro de la vida'' se mantiene como fórmula estable.'
  - '''Sea renovado su juicio'' refleja la corrección textual señalada en el audit trail y evita introducir un sujeto implícito inexistente en el ge''ez.'
