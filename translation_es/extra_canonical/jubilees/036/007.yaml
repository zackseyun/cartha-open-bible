base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/007.yaml
  text: And now I make you swear by a great oath, for there is no oath greater than it, by the glorious and honorable and great and splendid and marvelous and mighty name of him who made the heavens and the earth and all things together, that you may be those who fear him and those who worship him.
  footnotes:
  - marker: a
    text: Or 'all creation'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:05Z'
    unchanged: false
    changes_summary: 'Adjusted wording for more natural formal English: changed ''will make you swear'' to ''make you swear,'' ''honored'' to ''honorable,'' ''all things together'' to ''all creation,'' and ''you will be'' to ''you may be'' to better reflect the source and syntax.'
translation:
  language: es
  text: Y ahora os hago jurar por un gran juramento, porque no hay juramento mayor que este, por el nombre glorioso, honorable, grande, espléndido, maravilloso y poderoso de aquel que hizo los cielos y la tierra y todas las cosas juntas[a], para que seáis de los que le temen y de los que le adoran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «toda la creación». El ge’ez puede entenderse literalmente como «todas las cosas juntas»; por eso el texto principal conserva esa fuerza en vez de parafrasearla.'
    reason: alternative_reading
lexical_decisions:
- source_word: መሐላ / great oath
  english_pob_choice: great oath
  chosen_spanish: gran juramento
  alternatives_spanish:
  - juramento grande
  - juramento solemne
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: Conserva el adjetivo de fuerza (“great”) sin volverlo técnicamente litúrgico. ‘Gran juramento’ suena natural y mantiene la intensidad del original y del inglés POB.
- source_word: በስም / by the name
  english_pob_choice: by the ... name
  chosen_spanish: por el nombre
  alternatives_spanish:
  - en el nombre
  - por el nombre de
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: ‘Por el nombre’ refleja mejor el valor instrumental/invocativo del juramento que un simple ‘en el nombre’, y se ajusta al español bíblico sin forzar calco.
- source_word: ስቡሕ
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - lleno de gloria
  - espléndido
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: ‘Glorioso’ corresponde de forma directa al valor de alabanza y resplandor del término, y se coordina bien con la serie de epítetos.
- source_word: ወክቡር
  english_pob_choice: honorable
  chosen_spanish: honorable
  alternatives_spanish:
  - honrado
  - honorífico
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: Sigue el audit trail del inglés POB (‘honorable’) y evita reducirlo a un mero sentido social de ‘honrado’.
- source_word: ወዐቢይ
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - excelso
  - m عظ
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: Se conserva la repetición adjetival con una forma simple y clara en español.
- source_word: ወስፉሕ
  english_pob_choice: splendid
  chosen_spanish: espléndido
  alternatives_spanish:
  - magnífico
  - resplandeciente
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: ‘Espléndido’ mantiene el matiz de brillo/majestad que el inglés POB captó con ‘splendid’.
- source_word: ወመንክር
  english_pob_choice: marvelous
  chosen_spanish: maravilloso
  alternatives_spanish:
  - admirable
  - asombroso
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: ‘Maravilloso’ es el equivalente natural y conserva el valor de admiración del término.
- source_word: ወኀያል
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - todopoderoso
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: ‘Poderoso’ es la equivalencia más directa y evita introducir una afirmación más fuerte que el texto no exige.
- source_word: ዘገብረ፡ ሰማያተ፡ ወምድረ፡ ወኵሎ፡ ኅቡረ
  english_pob_choice: him who made the heavens and the earth and all things together
  chosen_spanish: aquel que hizo los cielos y la tierra y todo junto
  alternatives_spanish:
  - aquel que hizo los cielos y la tierra y toda la creación
  - aquel que hizo los cielos y la tierra y todo en conjunto
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: Se conserva la lectura revisada de ‘all things together’ frente a ‘all creation’, porque el ge’ez apunta literalmente a ‘todo [junto]’. En español, ‘todo junto’ preserva la adverbialidad y la tensión semántica sin expandir a ‘creación’.
- source_word: እለ፡ ትፈርህዎ፡
  english_pob_choice: those who fear him
  chosen_spanish: los que le temen
  alternatives_spanish:
  - los que lo temen
  - los que temen a él
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: ‘Le temen’ sigue el registro reverente del castellano bíblico y mantiene el objeto implícito natural en español.
- source_word: ወእለ፡ ታመልከዎ
  english_pob_choice: those who worship him
  chosen_spanish: los que le adoran
  alternatives_spanish:
  - los que lo adoran
  - los que le rinden adoración
  lexicon: No aplica (sin número de lexicón proporcionado)
  rationale: ‘Adoran’ expresa bien el culto debido sin sobrecargar la frase; mantiene el paralelismo con ‘los que le temen’.
theological_decisions:
- issue: El nombre divino no está ocultado por un título genérico
  english_pob_reading: by the ... name of him who made the heavens and the earth
  chosen_spanish_reading: por el nombre glorioso... de aquel que hizo los cielos y la tierra
  alternative_spanish_readings:
  - por el nombre del Señor...
  - por el nombre de Dios...
  rationale: El texto no contiene aquí יהוה, pero sí una perífrasis de Creador. Por fidelidad al marco POB, se conserva la referencia descriptiva sin sustituirla por ‘Señor’ o ‘Dios’ como máscara interpretativa.
  doctrine_reference: Creación; nombre divino; perífrasis reverencial
- issue: 'Finalidad exhortativa: posibilidad/propósito, no simple futurición'
  english_pob_reading: that you may be those who fear him and those who worship him
  chosen_spanish_reading: para que seáis los que le temen y los que le adoran
  alternative_spanish_readings:
  - para que sean los que le teman y los que le adoren
  - de modo que seáis los que le temen y los que le adoran
  rationale: ‘Para que seáis’ mantiene el valor final/propósito del texto y evita convertirlo en un futuro meramente predictivo. La forma de subjuntivo refleja mejor el sentido de destino exhortativo del original y del inglés revisado.
  doctrine_reference: Exhortación; propósito; obediencia reverente
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto ge’ez y toma en cuenta el audit trail inglés: conserva la secuencia de epítetos, refleja la revisión que recupera ‘all things together’ frente a ‘all creation’, y adapta el final a un propósito en subjuntivo (‘para que seáis’) acorde con el valor sintáctico del original.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero aquí no aparece el Tetragrámaton ni una cita directa que lo requiera.
  - Se usa ‘le temen’ y ‘le adoran’ para conservar el paralelismo reverente sin añadir explicaciones.
  - La serie de adjetivos se deja acumulativa, sin simplificarla a una fórmula más general, para preservar el énfasis retórico del original.
