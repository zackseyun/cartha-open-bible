revisions:
- from: Y ahora os hago jurar por un gran juramento, porque no hay juramento mayor que él, por el nombre glorioso, honorable, grande, espléndido, maravilloso y poderoso de aquel que hizo los cielos y la tierra y todo junto[a], para que seáis los que le temen y los que le adoran.
  to: Y ahora os hago jurar por un gran juramento, porque no hay juramento mayor que este, por el nombre glorioso, honorable, grande, espléndido, maravilloso y poderoso de aquel que hizo los cielos y la tierra y todas las cosas juntas[a], para que seáis de los que le temen y de los que le adoran.
  rationale: Se ajusta la referencia pronominal a «este» para mejor español y se reemplaza «todo junto» por «todas las cosas juntas», que preserva la decisión léxica documentada (‘all things together’) pero con mayor claridad y naturalidad en español. También se mejora el paralelismo final con «de los que...», que suena más idiomático tras «para que seáis».
