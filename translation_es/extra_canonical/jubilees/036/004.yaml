base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/004.yaml
  text: And be, my sons, loving among yourselves, loving your brothers as a man who loves his own life, and each seeking for his brother what is good for him; and act together on the earth, and let them love one another as themselves.
  footnotes:
  - marker: a
    text: Or 'each loving his brother'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:05Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy and smoother formal English: changed ''one another'' to ''among yourselves'' for the opening phrase, added ''who'' in ''as a man who loves his own life,'' and changed ''let each seek'' to ''and each seeking'' to better match the participial flow of the source while preserving the final imperative.'
translation:
  language: es
  text: Y sean, hijos míos, amándose entre ustedes, amando a sus hermanos como un hombre que ama su propia vida, y buscando cada uno para su hermano lo que es bueno para él; y actúen juntos en la tierra, y ámense unos a otros como a ustedes mismos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: እንዘ፡ ታፈቅሩ፡ አኅዊክሙ፡
  english_pob_choice: loving among yourselves / loving your brothers
  chosen_spanish: amorosos entre ustedes[a], amando a sus hermanos
  alternatives_spanish:
  - amándose unos a otros
  - amando a sus hermanos entre ustedes
  - siendo amorosos unos con otros
  lexicon: אַהֵב / amar; relación fraterna comunitaria
  rationale: El ge'ez está en segunda persona plural y expresa una acción comunitaria dirigida a los hijos; por eso traduzco con una exhortación directa en plural. Mantengo la referencia concreta a «sus hermanos» porque el texto la nombra explícitamente, pero reflejo la relación recíproca con «entre ustedes» para no perder el matiz de convivencia mutua que el inglés POB resumió como 'among yourselves'.
- source_word: ከመ፡ ብእሲ፡ ዘያፈቅር፡ ነፍሶ፡
  english_pob_choice: as a man who loves his own life
  chosen_spanish: como un hombre que ama su propia vida
  alternatives_spanish:
  - como un hombre que ama su alma
  - como alguien que ama su propia vida
  - como un hombre que se ama a sí mismo
  lexicon: נֶפֶשׁ / ነፍስ
  rationale: Sigo la lectura del inglés POB y conservo la comparación antropológica sin suavizarla. «Vida» es la opción más natural en español para este giro y evita convertir prematuramente el sentido en una formulación más interpretativa como «alma».
- source_word: የኀሥሥ፡ ... በዘ፡ ይሤኒ፡ ሎቱ፡
  english_pob_choice: each seeking for his brother what is good for him
  chosen_spanish: buscando cada uno para su hermano lo que es bueno para él
  alternatives_spanish:
  - y buscando cada uno para su hermano lo que le conviene
  - y que cada uno busque para su hermano lo bueno para él
  - procurando cada uno para su hermano lo que es bueno para él
  lexicon: ζητέω / buscar; ἀγαθός / bueno
  rationale: Conservo el movimiento de búsqueda activa y el objeto evaluativo «lo que es bueno». En español, «lo que es bueno para él» reproduce el sentido relacional del original sin añadir una categoría más abstracta como «conveniente» que el texto no exige.
- source_word: በገቢረ፡ ኅቡረ፡ በዲበ፡ ምድር፡
  english_pob_choice: act together on the earth
  chosen_spanish: actúen juntos en la tierra
  alternatives_spanish:
  - obren juntos en la tierra
  - trabajen unidos sobre la tierra
  - actúen en común sobre la tierra
  lexicon: συν- + ἐργάζομαι / trabajar juntos; ἐπὶ τῆς γῆς / sobre la tierra
  rationale: «Actúen juntos» comunica la cooperación colectiva del sintagma sin introducir una imagen laboral específica que el español podría sobredeterminar. Mantengo «en la tierra» para seguir el lenguaje espacial del texto.
- source_word: ወይትፋቀሩ፡ በበይናቲሆሙ፡ ከመ፡ ነፍሶሙ።
  english_pob_choice: let them love one another as themselves
  chosen_spanish: ámense unos a otros como a ustedes mismos
  alternatives_spanish:
  - ámense mutuamente como a sí mismos
  - que se amen unos a otros como a sí mismos
  - ámense entre ustedes como a ustedes mismos
  lexicon: ἀγαπάω / amar; reflexivo recíproco
  rationale: El cierre vuelve a la reciprocidad explícita. En español, «ámense unos a otros» es la forma más clara y pública; «como a ustedes mismos» mantiene la medida comparativa del original sin cambiarla a un mero amor propio introspectivo.
theological_decisions:
- issue: Forma de la exhortación comunitaria en segunda persona plural frente a una paráfrasis impersonal o distributiva
  english_pob_reading: And be, my sons, loving among yourselves
  chosen_spanish_reading: Y sean, hijos míos, amorosos entre ustedes
  alternative_spanish_readings:
  - Y sean, hijos míos, amándose unos a otros
  - Y sean, hijos míos, amando a sus hermanos entre ustedes
  rationale: El texto ge'ez se dirige directamente a «mis hijos» en plural y usa verbos/plurales que implican una exhortación comunitaria. La formulación elegida conserva esa dirección pastoral y evita convertirla en una descripción de terceros.
  doctrine_reference: ética comunitaria fraterna; exhortación a la caridad mutua
- issue: Relación entre «vida» y «alma» en la comparación antropológica
  english_pob_reading: as a man who loves his own life
  chosen_spanish_reading: como un hombre que ama su propia vida
  alternative_spanish_readings:
  - como un hombre que ama su propia alma
  - como un hombre que se ama a sí mismo
  rationale: Aunque «alma» podría ser posible según algunos usos semíticos, el contexto del POB inglés tomó «life» y el español «vida» preserva mejor la comparación inmediata sin añadir una carga doctrinal ajena al verso. Se evita también «se ama a sí mismo» porque desplaza el foco del objeto amado.
  doctrine_reference: antropología bíblica; uso contextual de נפש/ነፍס
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió la dirección al plural de segunda persona en el tramo inicial, dejando claro que el ge''ez habla a los hijos en forma directa. La traducción española sigue esa revisión y conserva la progresión participial/imperativa: exhortación comunitaria inicial, comparación con el hombre que ama su vida, búsqueda activa del bien del hermano, cooperación en la tierra y cierre recíproco.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «hermanos» en el cuerpo del texto para reflejar el sustantivo explícito del original; la nota [a] preserva la alternativa más compacta.
  - Se usó «vida» y no «alma» para mantener la coherencia con la lectura auditada del inglés POB y evitar introducir una equivalencia no exigida por el contexto.
