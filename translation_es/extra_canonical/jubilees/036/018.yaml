base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/018.yaml
  text: there was peace among them. And they went out from him and rested that day and slept. And Isaac slept on his bed five years[18], rejoicing, and he slept the eternal sleep and died at the age of one hundred and eighty years. He completed twenty-five weeks and five years. And his two sons buried him.
  footnotes:
  - marker: '18'
    text: The age notice literally combines 180 years with the calendrical summary 'twenty-five weeks and five years,' i.e., 25 weeks of years (175) plus 5 years.
    reason: cross_reference
  - marker: a
    text: Or 'and died. He completed one hundred and eighty years, that is, twenty-five weeks and five years.'.
    reason: previous_rendering
  - marker: b
    text: Or 'on that day[18]'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:08Z'
    unchanged: false
    changes_summary: Changed 'because there was harmony among them' to 'there was peace among them' for closer lexical sense; added 'on' in 'on that day' for natural English; removed 'Esau and Jacob' because their names are not present in this verse's source text.
translation:
  language: es
  text: Hubo paz entre ellos. Y salieron de él, y descansaron aquel día y durmieron. E Isaac durmió en su lecho aquel día, alegrándose, y durmió el sueño eterno y murió a los ciento ochenta años. Cumplió veinticinco semanas y cinco años[a]. Y sus dos hijos lo sepultaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El aviso de edad combina literalmente ciento ochenta años con el resumen calendárico 'veinticinco semanas y cinco años', es decir, veinticinco semanas de años (175) más cinco años.
    reason: cross_reference
lexical_decisions:
- source_word: peace among them
  english_pob_choice: there was peace among them
  chosen_spanish: Hubo paz entre ellos
  alternatives_spanish:
  - Había paz entre ellos
  - Reinaba la paz entre ellos
  lexicon: paz
  rationale: El ge'ez expresa una condición relacional de tranquilidad; 'Hubo paz' conserva la afirmación simple y directa sin añadir matices causales ni intensificadores.
- source_word: rested that day and slept
  english_pob_choice: they went out from him and rested that day and slept
  chosen_spanish: salieron de él y descansaron aquel día y durmieron
  alternatives_spanish:
  - salieron de él y reposaron aquel día y durmieron
  - salieron de él y descansaron ese día y durmieron
  lexicon: descansar / reposar
  rationale: '''Descansaron'' es natural en español y mantiene el sentido físico de reposo del original sin convertirlo en una interpretación litúrgica o espiritual.'
- source_word: slept on his bed ... rejoicing
  english_pob_choice: Isaac slept on his bed ... rejoicing
  chosen_spanish: Isaac durmió en su lecho aquel día, alegrándose
  alternatives_spanish:
  - Isaac se durmió en su lecho aquel día, alegrándose
  - Isaac durmió en su cama aquel día, alegrándose
  lexicon: lecho
  rationale: '''Lecho'' conserva un registro digno y evita modernizar innecesariamente con ''cama''; ''alegrándose'' traduce el participio de gozo sin convertirlo en un comentario interpretativo.'
- source_word: eternal sleep
  english_pob_choice: he slept the eternal sleep
  chosen_spanish: durmió el sueño eterno
  alternatives_spanish:
  - durmió el sueño de la eternidad
  - durmió para siempre
  lexicon: sueño eterno
  rationale: '''Sueño eterno'' corresponde a la fórmula auditada en inglés y comunica claramente la muerte como eufemismo sin añadir doctrina no explícita.'
- source_word: died at the age of one hundred and eighty years
  english_pob_choice: died at the age of one hundred and eighty years
  chosen_spanish: murió a la edad de ciento ochenta años
  alternatives_spanish:
  - murió a los ciento ochenta años
  - murió con ciento ochenta años
  lexicon: a la edad de
  rationale: La estructura española 'a la edad de' refleja bien el dato cronológico y mantiene la sintaxis narrativa del original.
- source_word: He completed twenty-five weeks and five years
  english_pob_choice: He completed twenty-five weeks and five years
  chosen_spanish: Cumplió veinticinco semanas y cinco años
  alternatives_spanish:
  - Completó veinticinco semanas y cinco años
  - Cumplió veinticinco semanas de años y cinco años
  lexicon: cumplir
  rationale: Se conserva la ambigüedad calendárica del original sin explicarla dentro del texto principal; 'cumplió' mantiene la idea de 'completed' y el cómputo literal.
- source_word: And his two sons buried him
  english_pob_choice: And his two sons buried him
  chosen_spanish: Y sus dos hijos lo sepultaron
  alternatives_spanish:
  - Y sus dos hijos lo enterraron
  - Y sus dos hijos lo dieron sepultura
  lexicon: sepultar
  rationale: '''Sepultaron'' es preciso y solemne; evita un coloquialismo y mantiene el hecho narrativo sin añadir nombres no presentes en este verso.'
theological_decisions:
- issue: Eufemismo de la muerte como sueño
  english_pob_reading: he slept the eternal sleep and died
  chosen_spanish_reading: durmió el sueño eterno y murió
  alternative_spanish_readings:
  - durmió para siempre y murió
  - pasó al descanso eterno y murió
  rationale: La fuente presenta la muerte como 'sueño eterno'; en español se conserva esa tensión sin reemplazarla por una formulación abiertamente interpretativa.
  doctrine_reference: Uso narrativo-eufemístico de la muerte; no afirma por sí mismo una doctrina detallada del estado intermedio.
- issue: Cómputo cronológico de ciento ochenta años y veinticinco semanas y cinco años
  english_pob_reading: He completed twenty-five weeks and five years
  chosen_spanish_reading: Cumplió veinticinco semanas y cinco años
  alternative_spanish_readings:
  - Cumplió veinticinco semanas de años y cinco años
  - Completó veinticinco semanas y cinco años
  rationale: Se preserva el enunciado cronológico literal, que suena extraño en español pero es necesario para no borrar la fórmula calendárica del texto base.
  doctrine_reference: Cronología jubilar/calendárica propia de Jubileos; no se normaliza a una cifra moderna en el texto principal.
translation_notes:
  revision_awareness: 'Se incorporó la corrección del audit trail que ubica la nota cronológica junto al dato de edad y se evitó añadir nombres no atestiguados en este versículo. También se mantuvo la sintaxis separada de la edad y del cómputo jubilar: primero la edad de ciento ochenta años, luego el resumen de veinticinco semanas y cinco años.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparezca el nombre divino; aquí no aparece.
  - Se mantuvo 'sepultaron' para el acto funerario y 'durmió el sueño eterno' para el eufemismo de la muerte.
  - No se introdujeron nombres propios ausentes en el texto ge'ez de este versículo.
  - La nota [a] está anclada exactamente en 'sueño eterno' para evitar desajuste de marcador.
