revisions:
- from: Hubo paz entre ellos. Y salieron de él y descansaron aquel día y durmieron. E Isaac durmió en su lecho aquel día, alegrándose, y durmió el sueño eterno[a] y murió a la edad de ciento ochenta años. Cumplió veinticinco semanas y cinco años. Y sus dos hijos lo sepultaron.
  to: Hubo paz entre ellos. Y salieron de él, y descansaron aquel día y durmieron. E Isaac durmió en su lecho aquel día, alegrándose, y durmió el sueño eterno y murió a los ciento ochenta años. Cumplió veinticinco semanas y cinco años[a]. Y sus dos hijos lo sepultaron.
  rationale: 'Se elimina la nota innecesaria sobre ''sueño eterno'' y se añade la nota necesaria al cómputo cronológico, siguiendo la auditoría inglesa. También se mejora ligeramente la naturalidad del español con ''murió a los ciento ochenta años'' y se añade una coma tras ''salieron de él'' para mayor legibilidad. No hace falta adjudicación adicional: la revisión es pequeña y bien sustentada por la fuente y el rastro del POB.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:37:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del ge''ez y del POB inglés: paz entre ellos, salida, descanso y sueño, luego Isaac en su lecho, el eufemismo de muerte, la edad de ciento ochenta años, el cómputo de semanas y años, y el entierro por sus dos hijos. Sin embargo, mantiene ''aquel día'' en la cláusula sobre Isaac, donde el rastro de auditoría inglés final ya desplazó la atención del marcador a la nota cronológica de edad; además, en español ''semanas'' sin aclaración crea una ambigüedad más fuerte que en inglés para el cómputo jubilar.'
  spanish_quality_summary: El español es claro y digno. 'Hubo paz', 'lecho', 'sueño eterno' y 'lo sepultaron' son adecuados. La principal mejora necesaria es hacer más inteligible el cómputo jubilar en español mediante nota anclada al segmento cronológico, ya que 'veinticinco semanas y cinco años' puede leerse como semanas ordinarias, no 'semanas de años'. También conviene simplificar 'murió a la edad de ciento ochenta años' a la forma más natural 'murió a los ciento ochenta años' sin pérdida de sentido.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, espíritu, carne, etc. El eufemismo 'sueño eterno' está bien conservado. La decisión léxica sobre el cómputo cronológico necesita apoyo en nota para preservar la rationale documentada del POB.
  issues:
  - severity: medium
    issue: El cómputo 'veinticinco semanas y cinco años' queda demasiado ambiguo en español sin nota cronológica.
    rationale: El POB inglés conserva una nota que explica que se trata de '25 weeks of years' = 175 + 5. En español, 'semanas' se entiende más fácilmente como semanas de siete días; sin nota, se pierde la rationale lexical/documental.
  - severity: low
    issue: La nota actual sobre 'sueño eterno' no corresponde a una nota preservada por la auditoría inglesa y no resuelve la principal dificultad del versículo.
    rationale: La mayor dificultad fuente-lector en este versículo es el resumen calendárico, no el eufemismo de muerte, que en español ya se entiende bien.
  - severity: low
    issue: '''Murió a la edad de ciento ochenta años'' es fiel pero menos natural que ''murió a los ciento ochenta años''.'
    rationale: La segunda opción mantiene el mismo sentido y mejora la fluidez del español bíblico moderno.
  revised_spanish_text: Hubo paz entre ellos. Y salieron de él, y descansaron aquel día y durmieron. E Isaac durmió en su lecho aquel día, alegrándose, y durmió el sueño eterno y murió a los ciento ochenta años. Cumplió veinticinco semanas y cinco años[a]. Y sus dos hijos lo sepultaron.
  revised_footnotes:
  - marker: a
    text: El aviso de edad combina literalmente ciento ochenta años con el resumen calendárico 'veinticinco semanas y cinco años', es decir, veinticinco semanas de años (175) más cinco años.
    reason: cross_reference
  revision_rationale: 'Se elimina la nota innecesaria sobre ''sueño eterno'' y se añade la nota necesaria al cómputo cronológico, siguiendo la auditoría inglesa. También se mejora ligeramente la naturalidad del español con ''murió a los ciento ochenta años'' y se añade una coma tras ''salieron de él'' para mayor legibilidad. No hace falta adjudicación adicional: la revisión es pequeña y bien sustentada por la fuente y el rastro del POB.'
