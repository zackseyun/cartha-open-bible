base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/008.yaml
  text: And let each one love his brothers with mercy and righteousness, and let no man desire evil against his brother from now and forever, all the days of your life, so that you may prosper in all your deeds and not be destroyed.
  footnotes:
  - marker: a
    text: Or 'let not a man'.
    reason: previous_rendering
  - marker: b
    text: Or 'his brother'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:05Z'
    unchanged: false
    changes_summary: Removed the repeated 'with' before 'righteousness' for more natural English while preserving the sense. The rest of the draft is accurate and complete.
translation:
  language: es
  text: Y que cada uno ame a sus hermanos[a] con misericordia y con justicia, y que ningún hombre desee el mal contra su hermano, desde ahora y para siempre, todos los días de su vida, para que prospere en todas sus obras y no sea destruido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez usa aquí el plural 'sus hermanos'; más adelante, en 'contra su hermano', usa el singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: ያፈቅር ... እኅዋሁ
  english_pob_choice: let each one love his brothers
  chosen_spanish: que cada uno ame a sus hermanos
  alternatives_spanish:
  - que cada uno ame a su hermano
  - que cada uno ame a sus hermanos
  lexicon: amar / hermanos
  rationale: El ge'ez usa el plural እኅዋሁ ('sus hermanos'), así que el plural en español refleja mejor el texto fuente que un singular distributivo, aunque ambos serían posibles en español.
- source_word: በምሕረት
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - con piedad
  - con compasión
  lexicon: misericordia
  rationale: '''Misericordia'' es la opción más natural y estable en registro bíblico para ምሕረት, y preserva el matiz de bondad activa hacia el otro.'
- source_word: ወበጽድቅ
  english_pob_choice: and righteousness
  chosen_spanish: y con justicia
  alternatives_spanish:
  - y con rectitud
  - y con justicia y rectitud
  lexicon: justicia
  rationale: Para צְדָקָה / ጽድቅ, 'justicia' comunica bien el valor moral y relacional del término; 'rectitud' sería posible, pero 'justicia' encaja mejor con el par con misericordia.
- source_word: ኢይፈቅድ ብእሲ እኩየ
  english_pob_choice: let no man desire evil
  chosen_spanish: que ningún hombre desee el mal
  alternatives_spanish:
  - que nadie desee el mal
  - que ningún hombre quiera el mal
  lexicon: desear / mal
  rationale: El verbo expresa deseo o anhelo, no mera intención; 'desee el mal' conserva esa fuerza. 'Ningún hombre' mantiene la indefinición negativa del original y del auditable inglés.
- source_word: እምይእዜ ወእስከ ለዓለም
  english_pob_choice: from now and forever
  chosen_spanish: desde ahora y para siempre
  alternatives_spanish:
  - desde ahora y para siempre jamás
  - desde este momento y para siempre
  lexicon: desde ahora / para siempre
  rationale: La formulación española reproduce la progresión temporal completa sin añadir énfasis innecesario.
- source_word: መዋዕለ ሕይወትክሙ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - todos los días de vuestra vida
  - todos los días de tu vida
  lexicon: vida / días
  rationale: Se conserva el sentido temporal total. Se opta por 'su' en un español neutral y reverente, evitando una segunda persona que podría sonar inconsistente en un dicho dirigido al grupo.
- source_word: ትሠርሑ በኵሉ ምግባሪክሙ
  english_pob_choice: so that you may prosper in all your deeds
  chosen_spanish: para que prosperen en todas sus obras
  alternatives_spanish:
  - para que tengan éxito en todas sus obras
  - para que les vaya bien en todo lo que hagan
  lexicon: prosperar / obras
  rationale: '''Prosperen'' comunica el resultado favorable del hebraísmo/semantismo de éxito bendecido; ''obras'' conserva la concreción de ''deeds''.'
- source_word: ወኢትትሐጐሉ
  english_pob_choice: and not be destroyed
  chosen_spanish: y no sean destruidos
  alternatives_spanish:
  - y no perezcan
  - y no sean arruinados
  lexicon: destruir
  rationale: La forma negativa final expresa una consecuencia grave y pasiva; 'sean destruidos' mantiene la fuerza del aviso sin añadir un agente explícito.
theological_decisions:
- issue: Universal exhortation to mutual love among brothers
  english_pob_reading: each one love his brothers
  chosen_spanish_reading: cada uno ame a sus hermanos
  alternative_spanish_readings:
  - cada uno ame a su hermano
  - cada uno ame a los hermanos
  rationale: El plural del ge'ez sugiere una exhortación comunitaria amplia. En español, el plural evita reducir la frase a un solo hermano por persona y preserva mejor la distribución colectiva del mandato.
  doctrine_reference: ética comunitaria y fraternidad del pacto
- issue: Negative prohibition against harboring evil intent
  english_pob_reading: let no man desire evil against his brother
  chosen_spanish_reading: que ningún hombre desee el mal contra su hermano
  alternative_spanish_readings:
  - que nadie desee el mal contra su hermano
  - que ningún hombre quiera el mal contra su hermano
  rationale: Se mantiene la advertencia moral como prohibición del deseo hostil, no solo de la acción exterior. La forma 'desee el mal' preserva la tensión ética del original.
  doctrine_reference: santidad práctica y prohibición de la malicia
- issue: Outcome clause of prosperity and preservation
  english_pob_reading: so that you may prosper in all your deeds and not be destroyed
  chosen_spanish_reading: para que prosperen en todas sus obras y no sean destruidos
  alternative_spanish_readings:
  - para que tengan éxito en todas sus obras y no sean destruidos
  - para que prosperen en todo lo que hagan y no sean destruidos
  rationale: La cláusula final mantiene el vínculo entre obediencia relacional y bienestar colectivo. 'Prosperen' y 'sean destruidos' conservan la advertencia de resultado sin suavizarla.
  doctrine_reference: bendición y juicio en la vida del pacto
translation_notes:
  revision_awareness: Tomé como base la revisión inglesa más reciente, que solo ajustó fluidez ('no man' y la repetición de 'with'). También seguí la corrección textual posterior que reconoce el plural ge'ez 'sus hermanos' frente al singular distributivo anterior. El español refleja ese plural sin sobreinterpretarlo.
  spanish_consistency_notes:
  - Se mantiene 'misericordia' y 'justicia' como pareja ética principal, sin reemplazarlas por términos más devocionales.
  - '''Hermano(s)'' se traduce de forma coherente con el plural del ge''ez, evitando singularizar indebidamente.'
  - Se preserva el tono exhortativo continuo con 'que' repetido, acorde con la sintaxis imperativa del original.
  - Se evita 'SEÑOR' o equivalentes porque no aparece un tetragrámaton ni un sustituto divino en este versículo.
