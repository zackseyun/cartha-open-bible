review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del ge''ez y sigue de cerca la traducción POB en inglés: amor fraternal, prohibición del mal contra el hermano, marco temporal continuo, y resultado de prosperidad y preservación. Sin embargo, hay un problema de concordancia pronominal/persona en la segunda mitad: el texto fuente y el inglés pasan a una segunda persona plural (''all the days of your life'', ''so that you may prosper''), mientras que el español usa ''su vida / prosperen / sus obras'', lo cual mezcla ''cada uno'' con una referencia plural de cortesía y debilita la exhortación directa al auditorio. Además, la nota [a] está mal anclada: comenta el plural inicial ''sus hermanos'', pero aparece junto a ''su hermano'' en la cláusula posterior.'
  spanish_quality_summary: El español es claro y de registro bíblico moderno, pero la mezcla de persona gramatical vuelve la frase menos natural y menos fiel. También la nota al pie crea confusión porque explica un elemento distinto del lugar donde está insertada. Fuera de eso, 'misericordia', 'justicia', 'desee el mal' y 'no sean destruidos' son opciones sólidas y legibles.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Justicia' para ጽድቅ y 'misericordia' para ምሕረት están bien justificadas. La decisión de mantener 'ningún hombre' es aceptable aunque 'nadie' sería más idiomático; no requiere cambio. La revisión principal es sintáctica/pronominal, no terminológica.
  issues:
  - severity: medium
    issue: Mezcla inconsistente de persona y número en la cláusula final
    rationale: El español dice 'todos los días de su vida, para que prosperen en todas sus obras', combinando singular ('su vida') y plural ('prosperen / sus obras'). El ge'ez y el inglés auditado apuntan a una exhortación dirigida al grupo en segunda persona plural. En español conviene unificar como 'su vida ... prospere ... sus obras' si se mantiene 'cada uno', o mejor rehacer a plural directo. La forma actual suena incoherente.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica que el ge'ez usa el plural 'sus hermanos' al inicio de la oración, pero el marcador está colocado después de 'su hermano' en la cláusula 'contra su hermano'. Esto induce a pensar erróneamente que la segunda ocurrencia también debería ser plural, cuando el expediente inglés documenta precisamente el contraste plural/singular.
  - severity: low
    issue: La nota al pie es innecesaria tal como está planteada
    rationale: El texto principal ya usa correctamente 'sus hermanos' al inicio. Como el inglés conservó notas de alternativa para ambas expresiones, en español solo tendría sentido mantener una nota si se aclara el contraste fuente entre plural inicial y singular posterior. La nota actual no preserva bien esa distinción.
  revised_spanish_text: Y que cada uno ame a sus hermanos[a] con misericordia y con justicia, y que ningún hombre desee el mal contra su hermano, desde ahora y para siempre, todos los días de su vida, para que prospere en todas sus obras y no sea destruido.
  revised_footnotes:
  - marker: a
    text: El ge'ez usa aquí el plural 'sus hermanos'; más adelante, en 'contra su hermano', usa el singular.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la incoherencia de número/persona en la cláusula final al hacer concordar el resultado con el sujeto distributivo singular ''cada uno'': ''su vida ... prospere ... sus obras ... no sea destruido''. También se movió la nota al sintagma correcto y se reformuló para preservar la distinción fuente entre plural inicial y singular posterior, en vez de sugerir erróneamente que ambos lugares son plurales. No se requirió adjudicación adicional porque el ajuste es claro y mecánico a partir del expediente fuente.'
