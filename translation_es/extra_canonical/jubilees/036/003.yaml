base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/003.yaml
  text: 'And this I command you, my sons: do righteousness and uprightness on the earth, so that the LORD may bring upon you all that the LORD said he would do for Abraham and for his seed.'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:03Z'
    unchanged: false
    changes_summary: Changed 'upon the earth' to 'on the earth' for more natural formal English; otherwise retained the draft as accurate and complete.
translation:
  language: es
  text: 'Y esto les mando, hijos míos: hagan justicia y rectitud en la tierra, para que Yahvé traiga sobre ustedes todo lo que Yahvé dijo que haría por Abraham y por su descendencia.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ጽድቀ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia y rectitud
  lexicon: N/A
  rationale: El contexto exige una virtud práctica y relacional; en español, 'justicia' conserva bien el peso ético/covenantal de la fórmula junto con 'rectitud' para el paralelismo con el segundo término.
- source_word: ወርትዐ
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - honradez
  - integridad
  - uprightness traducido como 'rectitud'
  lexicon: N/A
  rationale: '''Rectitud'' es el equivalente más natural y digno para la idea de conducta erguida o correcta; evita reducir el sentido a mera moralidad abstracta.'
- source_word: በዲበ፡ ምድር
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el país
  lexicon: N/A
  rationale: La revisión inglesa prefirió 'on the earth' por naturalidad; en español, 'en la tierra' comunica la misma localización amplia sin calcar una preposición poco idiomática.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: N/A
  rationale: 'Se sigue el estándar del proyecto: el nombre divino se vierte como ''Yahvé'' en el texto principal para no ocultar el tetragrámaton bajo una convención tipográfica.'
- source_word: ዘርኡ
  english_pob_choice: his seed
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - su linaje
  lexicon: N/A
  rationale: '''Descendencia'' es claro, reverente y suficientemente literal para la promesa a Abraham; ''simiente'' sería más técnico pero menos natural en español contemporáneo.'
theological_decisions:
- issue: Mandato ético y cumplimiento de la promesa a Abraham
  english_pob_reading: do righteousness and uprightness on the earth, so that the LORD may bring upon you all that the LORD said he would do for Abraham and for his seed
  chosen_spanish_reading: hagan justicia y rectitud en la tierra, para que Yahvé traiga sobre ustedes todo lo que Yahvé dijo que haría por Abraham y por su descendencia
  alternative_spanish_readings:
  - practiquen justicia y rectitud
  - hagan lo recto y lo justo
  rationale: La frase conserva la conexión causal entre la obediencia ética y la realización de la promesa. Mantener dos términos coordinados respeta el paralelismo del original y evita diluir la fuerza moral en una sola noción genérica.
  doctrine_reference: Génesis 17; énfasis patrístico/jubilar sobre obediencia como marco de bendición pactal
- issue: Nombre divino en la cita/promesa
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: No se usa un equivalente velado. El texto ge'ez y el marco del proyecto favorecen la restitución del nombre divino como 'Yahvé', manteniendo transparencia textual.
  doctrine_reference: Convención editorial POB sobre el Tetragrámaton
translation_notes:
  revision_awareness: La versión inglesa final solo ajustó 'upon the earth' a 'on the earth' por naturalidad; la lectura semántica no cambió. La versión española sigue esa misma lectura final y mantiene intacta la estructura causal y promissory del versículo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar POB para el nombre divino.
  - Se conserva un registro formal y bíblico sin caer en arcaísmos innecesarios.
  - '''Descendencia'' se usa de manera consistente para ''seed'' cuando el contexto es promesa abrahámica.'
  - La coordinación 'justicia y rectitud' refleja el paralelismo semántico del original sin sobreexplicarlo.
