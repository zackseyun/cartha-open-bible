translation:
  language: es
  text: Dividió los días de su generación. Y Lea, su esposa, murió en el cuarto año de la segunda semana del cuadragésimo quinto jubileo, y la sepultó en la cueva doble[a] cerca de Rebeca, su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La cueva doble» corresponde a la cueva ancestral de sepultura conocida por la tradición de Génesis como Macpela.
    reason: cross_reference
lexical_decisions:
- source_word: ፈለጠ
  english_pob_choice: he divided
  chosen_spanish: separó
  alternatives_spanish:
  - dividió
  - apartó
  lexicon: dividir / separar
  rationale: El ajuste de revisión corrige una traducción errónea previa; el griego no aplica aquí, y el ge'ez ፈለጠ se lee como acción de separar/dividir. En español, «separó» conserva la idea de delimitar o repartir sin forzar una división material.
- source_word: ዘመዋዕለ ልደቱ
  english_pob_choice: the days of his generation
  chosen_spanish: los días de su generación
  alternatives_spanish:
  - los días de su nacimiento
  - los días de su vida
  lexicon: generación / nacimiento
  rationale: La nota de revisión muestra tensión entre «birth» y «generation»; la forma preferida aquí sigue la corrección más reciente y mantiene el sentido idiomático de la frase en español.
- source_word: ልያ
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Lía
  - Leah
  lexicon: Lía / Lea
  rationale: Se adopta la forma castellana tradicional «Lea», clara y reconocible en contexto bíblico, sin alterar el referente.
- source_word: ብእሲቱ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: esposa / mujer
  rationale: «Esposa» es preciso y digno en español bíblico actual, y conserva la relación matrimonial explicitada por el ge'ez.
- source_word: ወሞተት
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: morir / fallecer
  rationale: «Murió» reproduce el hecho de manera directa y neutra, acorde al registro narrativo.
- source_word: ውስተ፡ በዓተ፡
  english_pob_choice: in the double cave
  chosen_spanish: en la cueva doble
  alternatives_spanish:
  - en la doble cueva
  - en la caverna doble
  lexicon: double cave
  rationale: La tradición POB anota esta expresión como la cueva ancestral de enterramiento; «cueva doble» preserva la imagen literal del texto y evita introducir una identificación interpretativa en el cuerpo del versículo.
- source_word: እንተ፡ ክልኤ፡ ቅሩበ፡
  english_pob_choice: near Rebekah his mother
  chosen_spanish: cerca de Rebeca, su madre
  alternatives_spanish:
  - junto a Rebeca, su madre
  - próxima a Rebeca, su madre
  lexicon: near / close to
  rationale: «Cerca de» expresa la proximidad espacial de forma natural en español, manteniendo el vínculo con Rebeca sin añadir una interpretación topográfica adicional.
theological_decisions:
- issue: La frase final «cueva doble» puede evocar la tradición patrimonial de la sepultura de los patriarcas, especialmente Machpelah.
  english_pob_reading: The double cave corresponds to the ancestral burial cave known from Genesis tradition as Machpelah.
  chosen_spanish_reading: la cueva doble
  alternative_spanish_readings:
  - la cueva de doble compartimiento
  - la cueva ancestral conocida como Macpela
  rationale: El texto principal conserva la forma literal «cueva doble» para no ocultar la expresión del fuente ge'ez. La identificación con Macpela queda implícita por la nota, no insertada como glosa en el cuerpo.
  doctrine_reference: Génesis 23; tradición patriarcal de sepultura
- issue: El sintagma «su generación» podría entenderse de modo genealógico o temporal.
  english_pob_reading: the days of his generation
  chosen_spanish_reading: los días de su generación
  alternative_spanish_readings:
  - los días de su nacimiento
  - los días de su linaje
  rationale: Se mantiene la ambigüedad controlada del original y de la auditoría inglesa revisada, evitando resolverla de manera gratuita. Esto respeta la tensión textual documentada.
  doctrine_reference: Sabiduría literaria / cronología genealógica en Jubileos
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente que corrige la apertura del versículo a «he divided the days of his generation». También tiene en cuenta la observación de control de calidad que señaló que la primera cláusula no debía traducirse como una búsqueda, sino como una acción de separar/dividir. El resto del versículo se mantiene en línea con la auditoría inglesa y el texto ge'ez.
  spanish_consistency_notes:
  - Se mantiene «Lea» como forma bíblica española estable, coherente con el resto del corpus.
  - Se conserva «Yahvé» como convención del proyecto cuando el nombre divino aparezca; aquí no ocurre.
  - «Cueva doble» se traduce literalmente y se aclara en nota, evitando sustituirla por una interpretación en el texto principal.
  - El registro es narrativo, sobrio y apto para lectura eclesial sin calco inglés excesivo.
