  to: Acuérdense, hijos míos, de Yahvé, el Dios de Abraham, vuestro padre; y de cómo yo también le adoré[a] y le serví en justicia y en alegría, para que él los multiplique y haga numerosa su descendencia como las estrellas del cielo en multitud, y los plante en la tierra como planta de justicia que no será arrancada a través de todas las generaciones, para siempre.
