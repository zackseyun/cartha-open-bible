base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/006.yaml
  text: Remember, my sons, the LORD, the God of Abraham your father; and how I also worshipped him and served him in righteousness and in joy, so that he may multiply you and make your seed numerous like the stars of heaven in multitude, and plant you in the earth as a plant of righteousness that will not be uprooted throughout all generations forever.
  footnotes:
  - marker: a
    text: Or 'and I also have devoted myself to him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:05Z'
    unchanged: false
    changes_summary: Changed 'have been devoted' to 'have devoted myself' for a more active and natural rendering of the verb, and adjusted 'for all generations forever' to 'throughout all generations forever' for smoother formal English. Kept the rest substantially unchanged.
translation:
  language: es
  text: Acuérdense, hijos míos, de Yahvé, el Dios de Abraham, vuestro padre; y de cómo yo también le adoré[a] y le serví en justicia y en alegría, para que él los multiplique y haga numerosa su descendencia como las estrellas del cielo en multitud, y los plante en la tierra como planta de justicia que no será arrancada a través de todas las generaciones, para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'y me dediqué a él'.
    reason: alternative_reading
lexical_decisions:
- source_word: እግዚአብሔር / YHWH
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: Nombre divino
  rationale: La política del proyecto exige usar 'Yahvé' para el nombre divino, y aquí el contexto identifica al Dios de Abraham como sujeto directo del recuerdo y la fidelidad del patriarca.
- source_word: አምላከ አብርሃም
  english_pob_choice: the God of Abraham
  chosen_spanish: el Dios de Abraham
  alternatives_spanish:
  - el Dios de Abrahán
  lexicon: Dios / nombre propio
  rationale: '''Dios de Abraham'' comunica de forma natural el vínculo de pacto sin añadir matiz inexistente en el original; se conserva el nombre bíblico usual en español.'
- source_word: ወተቀነዩኩ
  english_pob_choice: and served him
  chosen_spanish: y le serví
  alternatives_spanish:
  - y le presté servicio
  - y fui su siervo
  lexicon: servir
  rationale: El audit trail inglés corrige una lectura anterior hacia 'served him'; en español 'serví' es la forma más directa y fiel del servicio prestado a Dios.
- source_word: ወተቀነዩኩ ሎቱ ዘበጽድቅ ወበፍሥሓ
  english_pob_choice: and served him in righteousness and in joy
  chosen_spanish: y le serví en justicia y en alegría
  alternatives_spanish:
  - y le serví con rectitud y con alegría
  - y le serví en rectitud y en gozo
  lexicon: justicia / alegría
  rationale: '''en justicia'' mantiene el sustantivo abstracto del original y del inglés POB; ''alegría'' traduce el contraste afectivo de ''joy'' con español actual y reverente.'
- source_word: ዘርአክሙ
  english_pob_choice: your seed
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - su linaje
  lexicon: descendencia
  rationale: '''Descendencia'' expresa de modo claro y bíblico la descendencia numerosa prometida; ''simiente'' sería más literal pero menos natural para lectura pública en español.'
- source_word: ከዋክብተ ሰማይ
  english_pob_choice: the stars of heaven
  chosen_spanish: las estrellas del cielo
  alternatives_spanish:
  - las estrellas de los cielos
  lexicon: imagen astral
  rationale: La imagen es estable y transparente en español; 'del cielo' reproduce bien el genitivo sin sobrerrogar el plural de 'heavens'.
- source_word: ተክለ ጽድቅ
  english_pob_choice: a plant of righteousness
  chosen_spanish: planta de justicia
  alternatives_spanish:
  - planta de rectitud
  - plantío de justicia
  lexicon: metáfora agrícola
  rationale: '''Planta de justicia'' sigue de cerca la metáfora del texto. ''Rectitud'' es posible, pero ''justicia'' conserva mejor el campo semántico covenantal/legal que el original y el inglés POB resaltan.'
- source_word: ኢይሤረዉ
  english_pob_choice: will not be uprooted
  chosen_spanish: no será arrancada
  alternatives_spanish:
  - no será desarraigada
  - no será arrancado
  lexicon: arrancar / desarraigar
  rationale: '''Arrancada'' comunica de manera idiomática la metáfora agrícola de ser removida desde la raíz; concuerda con ''planta'' y mantiene la fuerza negativa.'
theological_decisions:
- issue: Uso del nombre divino frente a 'el SEÑOR'
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: Aunque el inglés POB traduce con 'the LORD', la política española explícita del proyecto requiere no enmascarar el nombre divino. Aquí no hay necesidad de sustituirlo por un título genérico.
  doctrine_reference: Éxodo 3:15; práctica editorial del POB sobre YHWH
- issue: Lectura del verbo corrompido/textualmente discutido como adoración y servicio
  english_pob_reading: I also worshipped him and served him
  chosen_spanish_reading: y cómo yo también le adoré y le serví
  alternative_spanish_readings:
  - y cómo yo también me le dediqué y le serví
  - y cómo yo también le rendí culto y le serví
  rationale: El paquete crítico indica que el texto etíope preserva una forma discutida que Charles y otros leen como 'worshipped him'; el audit trail inglés ya adoptó esa solución. En español conviene reflejar ambas acciones, adoración y servicio, sin suavizar la tensión textual.
  doctrine_reference: Crítica textual de Jubileos 36:6; lectura de Charles 1895 y revisión posterior
translation_notes:
  revision_awareness: 'El inglés POB pasó de ''have been devoted'' a ''have devoted myself'' y luego, por revisión textual, a ''worshipped him and served him''. Por eso el español no sigue la formulación intermedia sino la lectura revisada que el propio audit trail valida. También se conservó la clausula final ''throughout all generations forever'' como una cadencia natural en español: ''por todas las generaciones, para siempre''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la norma del proyecto, no 'SEÑOR'.
  - '''justicia'' se conserva como sustantivo abstracto, coherente con el tono legal-covenantal del pasaje.'
  - '''descendencia'' se usa para זרע/seed por claridad litúrgica y bíblica en español.'
  - La nota a[] refleja la alternativa textual/lexical preservada por el audit trail inglés y la crítica del pasaje.
