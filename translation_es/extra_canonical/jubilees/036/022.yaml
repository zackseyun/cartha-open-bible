  text: to the left of the grave of Sarah, his father’s mother. And all her sons and his sons came to mourn Leah his wife with him and to comfort him for her, because he was grieving for her.
  footnotes:
  - marker: a
    text: Or 'to the side'.
    reason: previous_rendering
  revision_pass:
