    timestamp: '2026-04-23T14:52:08Z'
    unchanged: false
    changes_summary: Changed 'to the left of the grave' to 'to the side of the grave' for more natural and lexically safer English; retained the rest as accurate and complete.
translation:
  language: es
  text: a la izquierda de la sepultura de Sara, la madre de su padre. Y todos los hijos de ella y los de él vinieron a llorar a Lea, su esposa, junto con él, y a consolarlo por ella, porque él estaba afligido por ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፀጋመ / left
  english_pob_choice: to the left
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - a la izquierda de
  - al lado izquierdo de
  lexicon: left
  rationale: El ge'ez especifica la orientación espacial 'izquierda'; en español, 'a la izquierda' comunica esa dirección de manera natural y precisa sin suavizarla a un 'lado' genérico.
- source_word: መቃብረ / grave, sepulcher
  english_pob_choice: grave
  chosen_spanish: sepultura
  alternatives_spanish:
  - tumba
  - sepulcro
  - grave
  lexicon: grave/sepulchre
  rationale: '''Sepultura'' es claro, digno y bíblicamente idiomático en español moderno; conserva el sentido funerario sin forzar un calco inglés.'
- source_word: ሣራ / Sarah
  english_pob_choice: Sarah
  chosen_spanish: Sara
  alternatives_spanish:
  - Sarah
  lexicon: proper name
  rationale: En español bíblico corriente, el nombre se adapta como 'Sara', forma estable y reconocible.
- source_word: እሙ፡ አቡሁ / his father’s mother
  english_pob_choice: his father’s mother
  chosen_spanish: la madre de su padre
  alternatives_spanish:
  - la madre de su padre
  - su abuela paterna
  lexicon: kinship
  rationale: La construcción genitiva se expresa de forma transparente como 'la madre de su padre', conservando la relación familiar exacta sin introducir una equivalencia interpretativa más libre.
- source_word: ውሉዳ / her sons
  english_pob_choice: her sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos
  - los hijos de ella
  lexicon: children/sons
  rationale: '''Hijos'' reproduce el sentido de descendencia masculina del contexto inmediato y es el término más natural en español.'
- source_word: ውሉዱ / his sons
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos
  - los hijos de él
  lexicon: children/sons
  rationale: La repetición de 'sus hijos' mantiene la paralelía del original y evita una formulación torpe.
- source_word: ይብክይዋ / mourn her, lament her
  english_pob_choice: came to mourn
  chosen_spanish: vinieron a llorar
  alternatives_spanish:
  - vinieron a llorar
  - vinieron a lamentarla
  - vinieron a hacer duelo por ella
  lexicon: lament/mourn
  rationale: '''Llorar'' aquí expresa el acto de duelo con sobriedad y claridad; ''hacer duelo'' sería más explícito pero menos cercano a la imagen verbal del texto.'
- source_word: ወመከመ፡ ይናዝዝዎ / and to comfort him
  english_pob_choice: and to comfort him
  chosen_spanish: y a consolarlo
  alternatives_spanish:
  - y a consolarlo
  - y a darle consuelo
  lexicon: comfort
  rationale: '''Consolarlo'' preserva el sentido directo del verbo de consuelo y suena natural en español bíblico contemporáneo.'
- source_word: በእንቲአሃ / for her, on account of her
  english_pob_choice: for her
  chosen_spanish: por ella
  alternatives_spanish:
  - por ella
  - a causa de ella
  lexicon: cause/reason
  rationale: '''Por ella'' mantiene la ambigüedad semántica útil del original: puede referirse al motivo del lamento y del consuelo sin explicitar de más.'
- source_word: ይሳቀዮ / he was grieving/suffering
  english_pob_choice: he was grieving
  chosen_spanish: él estaba afligido
  alternatives_spanish:
  - él estaba afligido
  - él estaba sufriendo
  - él estaba dolido
  lexicon: suffer/grieve
  rationale: '''Afligido'' conserva el campo semántico de pena/aflicción sin reducirlo solo a emoción o solo a sufrimiento físico.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente movió 'to the side' a 'to the left'; la evidencia ge'ez confirma que la orientación específica es 'left', por lo que el español la refleja directamente con 'a la izquierda'. Se evitó además introducir una nota de variante porque el texto español final ya incorpora la lectura confirmada.
  spanish_consistency_notes:
  - Se mantiene 'Sara' como forma española estándar del nombre bíblico.
  - Se conserva la relación de parentesco exacta 'la madre de su padre' para no sobreinterpretar con 'abuela paterna'.
  - Se usa un registro sobrio y bíblico, evitando 'SEÑOR' u այլ masking conventions, que no aplican aquí.
  - No se añadieron notas al pie porque no hay una alternativa textual que deba quedar anclada en el verso final.
