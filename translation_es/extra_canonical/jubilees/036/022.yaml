review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del ge''ez y del POB inglés: ubicación espacial específica (''a la izquierda''), referencia a Sara como ''la madre de su padre'', llegada de ambos grupos de hijos, duelo por Lea y consuelo al viudo. Sin embargo, la secuencia ''todos sus hijos y sus hijos'' en español crea ambigüedad pronominal innecesaria que el español puede resolver sin perder la distinción del original, y ''llorar a Lea'' suena menos natural para un contexto de duelo que una formulación más idiomática.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos tropiezos de legibilidad: la repetición exacta ''sus hijos y sus hijos'' dificulta identificar los dos referentes, y ''vinieron a llorar a Lea'' suena algo forzado en español contemporáneo eclesial. Una leve revisión mejora la naturalidad sin apartarse del original.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres propios y el léxico funerario están bien manejados. 'Sepultura' es válido, aunque 'tumba' sería más común; no es necesario cambiarlo. La decisión de mantener 'a la izquierda' concuerda con la revisión léxica inglesa más reciente.
  issues:
  - severity: medium
    issue: Ambigüedad en 'todos sus hijos y sus hijos'
    rationale: El original distingue 'sus hijos' de ella y 'sus hijos' de él, pero el español con dos posesivos idénticos seguidos no permite identificar claramente ambos referentes. Puede resolverse con 'todos los hijos de ella y los de él' o equivalente sin perder fidelidad.
  - severity: low
    issue: '''Vinieron a llorar a Lea'' es poco idiomático'
    rationale: Aunque comprensible, en español suena menos natural para duelo funerario que 'vinieron a llorarla' o 'vinieron a hacer duelo por Lea'. 'Llorarla' conserva la referencia directa y la sobriedad del texto.
  revised_spanish_text: a la izquierda de la sepultura de Sara, la madre de su padre. Y todos los hijos de ella y los de él vinieron a llorar a Lea, su esposa, junto con él, y a consolarlo por ella, porque él estaba afligido por ella.
  revision_rationale: Se ajusta la referencia pronominal para distinguir claramente los dos grupos de hijos presentes en el original y se conserva el resto de las decisiones léxicas válidas. No se requieren notas adicionales, ya que no se introduce nueva ambigüedad ni se omite una alternativa preservada en el inglés.
