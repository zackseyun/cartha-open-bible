translation:
  language: es
  text: 'Y dijo: «Yo doy esta porción mayor al hombre que nació primero».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዕበየ
  english_pob_choice: greater share
  chosen_spanish: porción mayor
  alternatives_spanish:
  - porción más grande
  - parte mayor
  - herencia mayor
  lexicon: —
  rationale: El geʽez expresa una porción o cuota superior; en español, «porción mayor» conserva la idea de medida/comparación sin forzar un matiz material que el contexto no exige.
- source_word: ለብእሲ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el que
  - aquel
  lexicon: —
  rationale: La revisión inglesa explicitó «the man» para reflejar ለብእሲ; en español, «el hombre» conserva esa explicitación natural y mantiene la referencia personal concreta.
- source_word: ዘውእቱ ቀደመ ተወልደ
  english_pob_choice: who was born first
  chosen_spanish: que nació primero
  alternatives_spanish:
  - que fue nacido primero
  - el primogénito
  - que fue el primero en nacer
  lexicon: —
  rationale: La cláusula indica prioridad de nacimiento. «Que nació primero» es idiomático y fiel; «primogénito» sería más interpretativo y puede sugerir una terminología heredada que el texto aquí no desarrolla.
theological_decisions:
- issue: Prioridad del primogénito y distribución preferente
  english_pob_reading: I give this greater share to the man who was born first.
  chosen_spanish_reading: Yo doy esta porción mayor al hombre que nació primero.
  alternative_spanish_readings:
  - Yo doy esta porción mayor al primogénito.
  - Yo doy esta porción mayor al que nació primero.
  rationale: El texto no teoriza sobre la institución del primogénito; simplemente afirma una preferencia de reparto basada en el orden de nacimiento. «Que nació primero» preserva el dato narrativo sin introducir una categoría legal más fuerte de la que el pasaje muestra.
  doctrine_reference: Génesis 25:31-34; 49:3; Deuteronomio 21:17
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que pasó de «larger share» a «greater share» y de una referencia impersonal a «the man». En español se optó por «porción mayor» y «el hombre» para mantener esa explicitación sin sonar artificioso.
  spanish_consistency_notes:
  - Se mantiene «nació primero» en lugar de «primogénito» para no sobreinterpretar el sintagma.
  - «Porción mayor» conserva el paralelismo con la revisión inglesa «greater share».
  - El tono es sobrio y literario, adecuado para un texto canónico breve.
