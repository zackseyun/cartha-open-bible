translation:
  language: es
  text: 'Y en el sexto año de esta semana, Isaac llamó a sus dos hijos, Esaú y Jacob, y ellos vinieron a él. Y les dijo: «Hijos míos, voy por el camino de mis padres, a la casa eterna donde están mis padres».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: «the sixth year of this week»
  english_pob_choice: the sixth year of this week
  chosen_spanish: el sexto año de esta semana
  alternatives_spanish:
  - el sexto año de este período
  - el sexto año de esta semana
  lexicon: week = semana; year = año
  rationale: Conservo la estructura temporal del texto fuente. En Jubileos, 'week' funciona como unidad cronológica del marco narrativo; 'semana' es la equivalencia española más transparente y mantiene el paralelismo con la formulación inglesa de POB.
- source_word: “called his two sons”
  english_pob_choice: called his two sons
  chosen_spanish: llamó a sus dos hijos
  alternatives_spanish:
  - convocó a sus dos hijos
  - llamó a sus dos hijos
  lexicon: call = llamar; sons = hijos
  rationale: '''Llamó'' reproduce la acción directa sin añadir solemnidad no presente en el original. ''Hijos'' es natural en español y conserva la relación filial sin forzar el género con una perífrasis innecesaria.'
- source_word: “the way of my fathers”
  english_pob_choice: the way of my fathers
  chosen_spanish: el camino de mis padres
  alternatives_spanish:
  - la senda de mis padres
  - el camino de mis antepasados
  lexicon: way = camino; fathers = padres
  rationale: '''Camino'' traduce bien la metáfora de trayectoria vital o destino. ''Padres'' conserva la correspondencia cercana con el inglés y con el sentido patrimonial/ancestral del giro.'
- source_word: “the eternal house”
  english_pob_choice: the eternal house
  chosen_spanish: la casa eterna
  alternatives_spanish:
  - la morada eterna
  - la casa perpetua
  lexicon: house = casa; eternal = eterna
  rationale: Mantengo 'casa' porque el texto inglés usa esa imagen concreta. 'Morada eterna' sería una buena explicación interpretativa, pero aquí la formulación breve y literal es más fiel al paralelismo del pasaje.
- source_word: “where my fathers are”
  english_pob_choice: where my fathers are
  chosen_spanish: donde están mis padres
  alternatives_spanish:
  - donde reposan mis padres
  - donde mis padres están
  lexicon: where = donde; are = están
  rationale: '''Están'' sigue de cerca el original y mantiene la sobriedad del enunciado. No introduzco ''reposan'' porque ese matiz funerario no está explicitado en el texto fuente.'
theological_decisions:
- issue: Referencia a la muerte como “el camino de mis padres” y “la casa eterna”
  english_pob_reading: I am going on the way of my fathers, to the eternal house where my fathers are.
  chosen_spanish_reading: voy por el camino de mis padres, a la casa eterna donde están mis padres
  alternative_spanish_readings:
  - voy al camino de mis padres, a la casa eterna donde reposan mis padres
  - me voy por la senda de mis padres, a la morada eterna donde están mis padres
  rationale: El texto presenta la muerte como tránsito ancestral y destino compartido, sin desarrollar explícitamente una doctrina posterior de cielo, sepultura o estado intermedio. Conservo esa ambigüedad reverente sin añadir explicaciones doctrinales que el pasaje no exige.
  doctrine_reference: Gen 25:8; Heb 11:13-16 (tema de la patria/morada futura, por analogía)
- issue: Lenguaje filial y ancestral
  english_pob_reading: my fathers
  chosen_spanish_reading: mis padres
  alternative_spanish_readings:
  - mis antepasados
  - mis padres y mayores
  rationale: '''Mis padres'' mantiene la formulación breve del texto y su tono familiar. ''Antepasados'' explicita la dimensión ancestral, pero debilita el paralelismo directo con la audiencia inmediata de Isaac y sus hijos.'
  doctrine_reference: Patriarcado y continuidad de la línea del pacto en Génesis/Jubileos
translation_notes:
  revision_awareness: La versión revisada del inglés solo corrigió la puntuación del discurso directo, sin cambiar el contenido. La traducción española refleja ese mismo contenido con cierre claro del discurso y puntuación estándar española.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en otros contextos del proyecto, pero este versículo no menciona el nombre divino.
  - Se tradujo 'week' como 'semana' por coherencia con el marco cronológico de Jubileos y con el audit trail inglés.
  - No se introdujeron notas al pie porque el pasaje no presenta variantes textuales ni tensiones léxicas que requieran anclaje explícito en español.
