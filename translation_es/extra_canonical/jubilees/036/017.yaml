translation:
  language: es
  text: el hombre que hace justicia, a él y a su descendencia para siempre.” Y terminó de darles instrucciones y de bendecirlos, y comieron y bebieron juntos delante de él, y se alegraron,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ልዑል፡ ለ*ብእሲ፡ ዘይገብር፡ ጽድቀ፡
  english_pob_choice: the man who does righteousness
  chosen_spanish: el hombre que hace justicia
  alternatives_spanish:
  - el hombre que practica justicia
  - el hombre que obra rectitud
  lexicon: ጽድቀ / δικαιοσύνη
  rationale: La frase ge’ez expresa a la persona caracterizada por hacer justicia; en español, "hace justicia" conserva la acción habitual sin forzar un sustantivo abstracto. "Rectitud" sería posible, pero "justicia" reproduce mejor el valor ético-relacional y la correspondencia con la lectura inglesa.
- source_word: ኪያሁ
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - lo
  - para él
  lexicon: anáfora pronominal
  rationale: 'Mantiene la referencia directa al hombre justo como objeto de la bendición: "a él" es natural en español y evita ambigüedad en una construcción con dativo implícito.'
- source_word: ወዘርኦ፡" እስከ፡ ለዓለም።
  english_pob_choice: and his seed forever.
  chosen_spanish: y a su descendencia para siempre.”
  alternatives_spanish:
  - y a su simiente por siempre.
  - y a su linaje para siempre.”
  lexicon: zeraʿ / descendencia
  rationale: '"Descendencia" es el equivalente más claro y bíblicamente comprensible en español moderno para la noción de prole/linaje. "Simiente" conservaría una resonancia más literal pero resulta más arcaica.'
- source_word: ወፈጸመ፡ እንዘ፡ ይኤዝዞሙ፡ ወ*እንዘ፡' ይባርኮሙ፡
  english_pob_choice: And he finished commanding them and blessing them
  chosen_spanish: Y terminó de mandarlos y de bendecirlos
  alternatives_spanish:
  - Y acabó de mandarlos y de bendecirlos
  - Y terminó de darles mandatos y bendecirlos
  lexicon: ἐντέλλομαι / ברך
  rationale: '"Terminó de mandarlos" conserva el paralelismo verbal del original y la fuerza directiva de los mandatos. "Bendecirlos" mantiene el complemento pronominal unido al verbo, como en la secuencia fuente.'
- source_word: ወበልዑ፡ ወሰትዩ፡
  english_pob_choice: and they ate and drank together
  chosen_spanish: y comieron y bebieron juntos
  alternatives_spanish:
  - y comieron y bebieron en conjunto
  - y comieron y bebieron en común
  lexicon: comida compartida
  rationale: '"Juntos" comunica de manera natural la participación común que el ge’ez subraya. "En común" o "en conjunto" sonarían más técnicos y menos idiomáticos.'
- source_word: በቅድሜሁ፡ ኅቡረ፡
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: presencia / delante
  rationale: '"Delante de él" es una traducción directa y clara que conserva la escena espacial de la comida compartida. "En su presencia" sería una interpretación legítima pero algo más abstracta.'
- source_word: ወተፈሥሑ፡
  english_pob_choice: and rejoiced
  chosen_spanish: y se alegraron
  alternatives_spanish:
  - y se regocijaron
  - y gozaron
  lexicon: alegría / regocijo
  rationale: '"Se alegraron" es fiel, natural y suficientemente solemne. "Regocijaron" tiene más color bíblico, pero en español actual puede sonar más literario que necesario.'
theological_decisions:
- issue: Blessing of posterity / covenantal continuity
  english_pob_reading: him and his seed forever
  chosen_spanish_reading: a él y a su descendencia para siempre
  alternative_spanish_readings:
  - a él y a su simiente para siempre
  - a él y a su linaje para siempre
  rationale: Se mantiene la continuidad pactual y generacional sin introducir una equivalencia doctrinal ajena. "Descendencia" deja abierto el alcance colectivo de la promesa, tal como en la lectura inglesa.
  doctrine_reference: Promesa pactual y bendición generacional
- issue: Righteousness as enacted justice
  english_pob_reading: the man who does righteousness
  chosen_spanish_reading: el hombre que hace justicia
  alternative_spanish_readings:
  - el hombre que practica justicia
  - el hombre que obra rectitud
  rationale: La fuente presenta una conducta concreta, no solo una cualidad interior. "Hace justicia" conserva la dimensión práctica y ética sin convertir la expresión en una fórmula moral abstracta.
  doctrine_reference: Ética del pacto / justicia vivida
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios y la concordancia con el control cruzado es alta (acuerdo total). Por ello, el borrador español sigue de cerca la lectura inglesa auditada y el ge’ez sin añadir notas textuales innecesarias.
  spanish_consistency_notes:
  - Se conserva "Yahvé" en la norma del proyecto solo cuando el texto fuente lo requiera; en este versículo no aparece.
  - Se usa "descendencia" como término bíblico amplio y comprensible, evitando "simiente" por su mayor arcaísmo.
  - 'La sintaxis española mantiene la secuencia narrativa del original: bendición final, comida compartida y alegría.'
