translation:
  language: es
  text: 'Y dijo Isaac: «Que una bendición repose sobre ustedes, mis hijos, y sobre su descendencia en este día, porque me han dado descanso».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በረከተ
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - bendición
  - una bendición
  lexicon: ברכה / εὐλογία
  rationale: El sustantivo expresa una bendición pronunciada o invocada; en español, «una bendición» conserva el carácter concreto e invocativo del original sin volverlo más abstracto de lo necesario.
- source_word: ታዕርፍ
  english_pob_choice: may ... rest
  chosen_spanish: repose
  alternatives_spanish:
  - descanse
  - repose
  lexicon: שׁוּב / נוח / ἀναπαύω
  rationale: El contexto habla de alivio obtenido por quienes lo han atendido; «repose» mantiene el matiz elevado y no meramente físico, pero sigue siendo natural en español bíblico actual.
- source_word: አዕረፍክሙ
  english_pob_choice: you have given me rest
  chosen_spanish: me han dado descanso
  alternatives_spanish:
  - me han dado reposo
  - me han aliviado
  lexicon: נוח / ἀναπαύω
  rationale: La expresión causal del final indica que los hijos han sido la causa de su descanso; «me han dado descanso» reproduce bien la relación causal y es idiomática en español.
- source_word: ዘርእክሙ
  english_pob_choice: your seed
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - su linaje
  - su descendencia
  lexicon: זרע
  rationale: «Descendencia» transmite el valor genealógico de זרע de forma clara y digna en español contemporáneo, evitando un calco poco natural como «semilla».
- source_word: ይስሐቅ
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  alternatives_spanish:
  - Isaac
  lexicon: יצחק
  rationale: Nombre propio conservado conforme al uso estándar en español bíblico.
theological_decisions:
- issue: Naturaleza de la bendición pronunciada sobre hijos y descendencia
  english_pob_reading: May a blessing rest upon you, my sons, and upon your seed this day
  chosen_spanish_reading: Que una bendición repose sobre ustedes, mis hijos, y sobre su descendencia en este día
  alternative_spanish_readings:
  - Que una bendición descanse sobre ustedes, mis hijos, y sobre su descendencia en este día
  rationale: La frase mantiene la forma de bendición efectiva y performativa; «repose»/«descanse» conserva el carácter de invocación solemne sin convertirla en mera expresión de deseo informal.
  doctrine_reference: Bendición patriarcal performativa en narrativas patriarcales (cf. Génesis 27; 48)
translation_notes:
  revision_awareness: La revisión inglesa únicamente cerró correctamente la cita con comillas y punto final; el contenido léxico permaneció sin cambios, por lo que no se requiere nota de revisión adicional en español.
  spanish_consistency_notes:
  - Se mantiene el trato plural de cortesía/segunda persona plural para «ustedes», acorde con «you» en la bendición dirigida a los hijos.
  - Se usa «bendición» y «descendencia» de manera consistente con el registro bíblico y con el valor genealógico del hebreo/etiópico subyacente.
  - No se introduce «Cristo», «Señor» ni otro término doctrinal no presente en el pasaje.
