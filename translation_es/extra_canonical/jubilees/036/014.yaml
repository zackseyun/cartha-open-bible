lexical_decisions:
- source_word: ዔሳው / Esau
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: nombre propio
  rationale: Se conserva el nombre bíblico con acento gráfico conforme al uso español estándar.
- source_word: ሤጥኩ፡ ሎቱ፡ / I sold it to him
  english_pob_choice: I sold it to Jacob
  chosen_spanish: Yo se lo vendí a Jacob
  alternatives_spanish:
  - Yo lo vendí a Jacob
  - Se lo vendí a Jacob
  lexicon: verbo de transferencia/compraventa
  rationale: El español requiere explicitar el pronombre objeto; 'se lo vendí' mantiene el valor de venta y la referencia al objeto previamente mencionado.
- source_word: ልህቃነ፡ / birthright
  english_pob_choice: birthright
  chosen_spanish: la primogenitura
  alternatives_spanish:
  - el derecho de primogenitura
  - el derecho del primogénito
  lexicon: sustantivo de parentesco/derecho
  rationale: '''Primogenitura'' es el término bíblico natural en español y comunica el derecho heredado ligado al primogénito.'
- source_word: ወወሀብኩ፡ ልህቃነ፡ ለያዕቆብ፡ / and I gave the birthright to Jacob
  english_pob_choice: and I gave the birthright to Jacob
  chosen_spanish: y le di a Jacob la primogenitura
  alternatives_spanish:
  - y di la primogenitura a Jacob
  - y se la di a Jacob
  lexicon: verbo de dar
  rationale: Se mantiene el movimiento de dar a Jacob, con orden natural en español.
- source_word: ወይትወሀብ፡ ሎቱ፡ / let it be given to him
  english_pob_choice: let it be given to him
  chosen_spanish: que se le dé a él
  alternatives_spanish:
  - que le sea dada
  - déjesele
  lexicon: pasiva exhortativa
  rationale: La pasiva exhortativa se vierte de forma directa y clara en español.
- source_word: ወአልቦየ፡ ቃለ፡ ዘእብል፡ በእንቲአሁ፡ / and I have no word to say about it
  english_pob_choice: and I have no word to say about it
  chosen_spanish: y no tengo palabra para decir sobre ello
  alternatives_spanish:
  - y no tengo nada que decir sobre ello
  - y no tengo palabra que decir al respecto
  lexicon: expresión idiomática de silencio/renuncia
  rationale: '''Palabra'' reproduce el sustantivo de la fuente y el sentido de no tener objeción ni réplica.'
- source_word: እስመ፡ ዚአሁ፡ ውእቱ። / for it is his
  english_pob_choice: for it is his
  chosen_spanish: porque es suyo
  alternatives_spanish:
  - pues es suyo
  - porque le pertenece
  lexicon: posesivo pronominal
  rationale: Se conserva la conclusión explícita de posesión sin añadir matices interpretativos.
theological_decisions:
- issue: Primogenitura como derecho transferido y reconocido
  english_pob_reading: And Esau said, “I sold it to Jacob, and I gave the birthright to Jacob; let it be given to him, and I have no word to say about it, for it is his.”
  chosen_spanish_reading: 'Entonces Esaú dijo: «Yo se lo vendí a Jacob, y le di a Jacob la primogenitura; que se le dé a él, y no tengo palabra para decir sobre ello, porque es suyo».'
  alternative_spanish_readings:
  - '... y no tengo nada que decir ...'
  - '... y no tengo palabra ...'
  rationale: La formulación evita añadir una explicación doctrinal y preserva la aceptación explícita de Esaú sobre la transferencia del derecho.
  doctrine_reference: Génesis 25:31-34; Hebreos 12:16
- issue: Renuncia a objeción/replica
  english_pob_reading: I have no word to say about it
  chosen_spanish_reading: no tengo palabra para decir sobre ello
  alternative_spanish_readings:
  - no tengo nada que decir sobre ello
  - no tengo palabra
  rationale: La frase puede expresar ausencia de réplica más que mera falta de información; el español mantiene esa tensión sin resolverla de más.
  doctrine_reference: Jubileos 36:14; comparación con la versión inglesa revisada
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que retiró añadidos interpretativos y luego restauró la cláusula final 'for it is his' tras detectar que el Ge'ez estaba truncado en el paquete. La versión española refleja esa lectura completa sin incorporar expansiones adicionales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto base lo exige; aquí no aparece el Tetragrámaton.
  - '''Primogenitura'' se mantiene como término técnico bíblico coherente con el registro POB en español.'
  - La construcción 'no tengo palabra para decir sobre ello' conserva una posible ambigüedad equivalente a la del inglés auditado y admite la nota alternativa.
  - Se evita 'Cristo/Mesías' porque no hay lenguaje mesiánico en este versículo.
