revisions:
- from: 'Entonces Esaú dijo: «Yo se lo vendí a Jacob, y le di[a] a Jacob la primogenitura; que se le dé a él, y no tengo palabra para decir sobre ello, porque es suyo».'
  to: 'Entonces Esaú dijo: «Se lo vendí a Jacob, y le di a Jacob la primogenitura; que se le dé, y no tengo nada que decir al respecto[a], porque es suyo».'
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español y ubicar correctamente la nota textual. 'No tengo nada que decir al respecto' expresa fielmente la renuncia de Esaú a objetar, mientras la nota preserva la variante abreviada documentada en el historial inglés. También se eliminaron énfasis innecesarios ('Yo', 'a él') para un flujo más natural.
