translation:
  language: es
  text: Y en cuanto al asunto de los ídolos, yo les mando y les exhorto a que los desprecien y los rechacen, y a que no los amen, porque están llenos de error para los que les rinden culto y para los que se postran ante ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ጣዖት
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  - falsos dioses
  lexicon: Jubileos 36:5
  rationale: El ge'ez habla del tema de los ídolos; "ídolos" conserva el referente directo y la carga polémica sin suavizarla. "Imágenes" podría restringir indebidamente el sentido y "falsos dioses" interpreta más de lo que el texto dice.
- source_word: አአዝዘክሙ / እጌሥጸክሙ
  english_pob_choice: I command you and exhort you
  chosen_spanish: yo les mando y los exhorto
  alternatives_spanish:
  - les ordeno y les exhorto
  - les mando y les insto
  lexicon: Jubileos 36:5
  rationale: 'Se conserva la doble fuerza del original y de la versión inglesa: un mandato y una exhortación. "Mando" mantiene la autoridad; "exhorto" refleja el segundo verbo sin volverlo mera repetición.'
- source_word: ትመንንምዎሙ / ወተጸረርዎሙ
  english_pob_choice: despise them and reject them
  chosen_spanish: los desprecien y los rechacen
  alternatives_spanish:
  - los menosprecien y los repudien
  - los aborrezcan y los rechacen
  lexicon: Jubileos 36:5
  rationale: '"Desprecien" y "rechacen" reproducen la pareja verbal con claridad en español. "Rechacen" evita cargar el primer verbo con una connotación emocional que no es necesaria.'
- source_word: ኢታፍቅርዎሙ
  english_pob_choice: you should not love them
  chosen_spanish: no los amen
  alternatives_spanish:
  - no los quieran
  - no los tengan por objeto de amor
  lexicon: Jubileos 36:5
  rationale: El negativo es directo y breve; "amen" mantiene el contraste moral del texto. "Quieran" sería demasiado débil e impreciso en este contexto.
- source_word: ስሕተት፡ ምሉአን
  english_pob_choice: full of error
  chosen_spanish: están llenos de error
  alternatives_spanish:
  - están llenos de engaño
  - están colmados de error
  lexicon: Jubileos 36:5
  rationale: '"Llenos de error" sigue de cerca la fraseología inglesa y preserva la idea de plenitud/abundancia del error en los ídolos para sus adoradores. "Engaño" es posible, pero cambia el matiz del sustantivo ge''ez.'
- source_word: ለእለ፡ ያመልኩዎሙ / ለእለ፡ ይሰግዱ፡ ሎሙ
  english_pob_choice: for those who worship them and for those who bow down to them
  chosen_spanish: para los que les rinden culto y para los que se postran ante ellos
  alternatives_spanish:
  - para los que los adoran y para los que se inclinan ante ellos
  - para los que los veneran y para los que se prosternan ante ellos
  lexicon: Jubileos 36:5
  rationale: '"Rinden culto" traduce con sobriedad el acto de adoración y evita una palabra demasiado cargada en sentido cristiano posterior. "Se postran ante ellos" conserva la imagen física del gesto de sumisión.'
theological_decisions:
- issue: La condena de la idolatría y la relación entre adoración y error
  english_pob_reading: idols are full of error for those who worship them and for those who bow down to them
  chosen_spanish_reading: los ídolos están llenos de error para quienes les rinden culto y para quienes se postran ante ellos
  alternative_spanish_readings:
  - los ídolos están llenos de engaño para quienes los adoran y para quienes se inclinan ante ellos
  - los ídolos están llenos de error para sus adoradores y para los que les rinden homenaje
  rationale: El texto no solo prohíbe la idolatría; también la describe como un ámbito de error para quienes participan en ella. Mantener "error" preserva la acusación cognitiva y moral del pasaje sin convertirla en una explicación más amplia que la fuente.
  doctrine_reference: Éxodo 20:3-5; Deuteronomio 4:15-19; 1 Corintios 10:14
- issue: 'El objeto de la prohibición: amar a los ídolos'
  english_pob_reading: you should not love them
  chosen_spanish_reading: no los amen
  alternative_spanish_readings:
  - no los quieran
  - no los estimen
  rationale: '"Amar" retiene la fuerza afectiva y de lealtad del original. No se reduce a preferencia emocional ni se sustituye por un término más débil.'
  doctrine_reference: Deuteronomio 6:5; Mateo 6:24; 1 Juan 5:21
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente y recibió acuerdo alto en el control cruzado; por eso el español sigue de cerca la estructura y las decisiones léxicas del POB inglés, manteniendo el paralelo mandato-exhortación y la secuencia de rechazo, desamor y diagnóstico de error.
  spanish_consistency_notes:
  - Se mantiene "ídolos" de manera consistente para el referente principal.
  - Se conserva el paralelismo verbal de mandato y exhortación.
  - Se evita el reemplazo litúrgico de "Yahvé" porque este versículo no contiene el nombre divino.
  - Se usa español neutro, bíblico y legible, sin arcaísmos innecesarios.
