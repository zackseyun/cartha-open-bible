translation:
  language: es
  text: Y recordó todos sus hechos que había realizado en su vida, y la lloró[a] mucho, porque la amó con todo su corazón y con toda su alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «la lamentó mucho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ወይዜከር / remembered
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - rememoró
  lexicon: recordar
  rationale: «Recordó» reproduce el acto mental de traer a la memoria y suena natural en español bíblico contemporáneo. «Se acordó de» es posible, pero aquí el verbo simple mantiene mejor el ritmo narrativo del texto.
- source_word: ምግባራቲሃ / her deeds, things she had done
  english_pob_choice: all her deeds that she had done
  chosen_spanish: todos sus hechos que había realizado
  alternatives_spanish:
  - todas sus obras que había hecho
  - todo lo que había hecho
  lexicon: hechos / realizar
  rationale: El geʽez habla de sus «hechos» o acciones; «obras» también sería posible, pero «hechos» conserva mejor la amplitud semántica sin cargar el texto con resonancias morales no explícitas. «Realizado» evita una repetición mecánica de «hecho» y sigue siendo fiel al sentido.
- source_word: ወይላሕዋ፡ ጥቀ / mourned for her greatly
  english_pob_choice: mourned for her greatly
  chosen_spanish: la lloró mucho
  alternatives_spanish:
  - la lamentó mucho
  - la lloró intensamente
  lexicon: llorar / lamentar
  rationale: La expresión geʽez comunica duelo intenso; en español, «la lloró» conserva la fuerza afectiva y el carácter directo del lamento. «Lamentó» es válido, pero algo más abstracto.
- source_word: በኵሉ፡ ልቡ፡ ወበኵሉ፡ ነፍሱ / with all his heart and with all his soul
  english_pob_choice: with all his heart and with all his soul
  chosen_spanish: con todo su corazón y con toda su alma
  alternatives_spanish:
  - de todo su corazón y de toda su alma
  - con todo el corazón y con toda el alma
  lexicon: corazón / alma
  rationale: La fórmula es estable y transparente en español bíblico. Se mantiene la correspondencia de ambas partes sin suavizar la intensidad total expresada por el original.
theological_decisions:
- issue: Intensidad del duelo por una persona amada
  english_pob_reading: he mourned for her greatly
  chosen_spanish_reading: la lloró mucho
  alternative_spanish_readings:
  - la lamentó mucho
  - hizo gran duelo por ella
  rationale: 'No hay una decisión doctrinal controvertida, pero sí un matiz afectivo importante: el texto presenta un duelo intensamente personal. «La lloró mucho» preserva esa intensidad sin convertirla en una fórmula litúrgica más distante.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa POB permanece sin cambios según el historial de revisión; el español se construye directamente del geʽez disponible, manteniendo el paralelismo de memoria, duelo y amor total sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se conserva el registro bíblico sobrio y directo, sin arcaísmos innecesarios.
  - «Corazón» y «alma» se mantienen como formulación paralela explícita para reflejar la totalidad afectiva del original.
  - No se introduce terminología doctrinal ajena al pasaje; el énfasis es narrativo y afectivo.
