  spanish_quality_summary: El español es claro, natural y digno. La sintaxis fluye bien y mantiene el tono solemne sin calcos rígidos. «Entiérrenme», «cueva doble», «campo de Efrón el hitita» y «tumba» son opciones legibles y fieles. La leve explicitación enfática en «yo mismo cavé» sigue siendo aceptable para expresar el matiz reflexivo/personal.
