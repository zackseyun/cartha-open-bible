  yaml_path: translation/extra_canonical/jubilees/036/002.yaml
  text: And bury me near Abraham my father, in the double cave in the field of Ephron the Hittite, which Abraham acquired for a burial place there. In the tomb that I dug for myself there, bury me.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:02Z'
    unchanged: false
    changes_summary: Changed 'which' to 'that' in the final clause for slightly more natural formal English. The draft is otherwise accurate and complete.
translation:
  language: es
  text: Y entiérrenme cerca de Abraham, mi padre, en la cueva doble del campo de Efrón el hitita, que Abraham adquirió para sepultura allí. En la tumba que yo mismo cavé allí, entiérrenme.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቅብሩኒ / bury me
  english_pob_choice: bury me
  chosen_spanish: entiérrenme
  alternatives_spanish:
  - sepúltenme
  - entérrenme
  lexicon: enterrar
  rationale: El imperativo plural reproduce bien la forma exhortativa dirigida a quienes ejecutarán el entierro. «Entiérrenme» es natural y fiel; se evita una paráfrasis más libre.
- source_word: ቅሩበ፡ አብርሃም፡ አቡየ / near Abraham my father
  english_pob_choice: near Abraham my father
  chosen_spanish: cerca de Abraham, mi padre
  alternatives_spanish:
  - junto a Abraham, mi padre
  - al lado de Abraham, mi padre
  lexicon: cercanía espacial
  rationale: «Cerca de» mantiene la proximidad sin intensificarla indebidamente. «Mi padre» se conserva como aposición directa, sin convertirla en una forma más interpretativa.
- source_word: ባዐት / double cave
  english_pob_choice: double cave
  chosen_spanish: cueva doble
  alternatives_spanish:
  - doble cueva
  - cueva de dos compartimentos
  lexicon: cueva
  rationale: Se mantiene la expresión literal y sobria del texto base. «Cueva doble» suena natural en español y conserva la rareza terminológica del original sin explicarla en exceso.
- source_word: ገራህተ፡ ኤፍሮን፡ ኬጥያዊ፡ / field of Ephron the Hittite
  english_pob_choice: field of Ephron the Hittite
  chosen_spanish: campo de Efrón el hitita
  alternatives_spanish:
  - campo de Efrón, el hitita
  - campo perteneciente a Efrón el hitita
  lexicon: campo / hitita
  rationale: Se sigue el sustantivo «campo» y el etnónimo «hitita» de forma directa. La forma sin coma mantiene el flujo nominal y es perfectamente legible en español.
- source_word: ዘአጥረየ፡ አብርሃም፡ / which Abraham acquired
  english_pob_choice: which Abraham acquired
  chosen_spanish: que Abraham adquirió
  alternatives_spanish:
  - que Abraham compró
  - que Abraham obtuvo
  lexicon: adquirir
  rationale: «Adquirió» refleja con precisión el valor general de posesión obtenida, sin especificar «compró» donde el texto fuente solo dice que Abraham lo adquirió. Esto preserva la amplitud semántica del audit trail inglés.
- source_word: ለዝኅረ፡ መቃብር፡ / for a burial place
  english_pob_choice: for a burial place
  chosen_spanish: para sepultura
  alternatives_spanish:
  - para lugar de sepultura
  - como lugar de entierro
  lexicon: sepultura
  rationale: «Sepultura» es más conciso y formal que una frase explicativa larga. Mantiene la finalidad funeraria sin añadir interpretación.
- source_word: መቃብር / tomb
  english_pob_choice: tomb
  chosen_spanish: tumba
  alternatives_spanish:
  - sepulcro
  - túmulo
  lexicon: tumba
  rationale: «Tumba» es claro en español contemporáneo y corresponde bien al lugar de entierro aquí. Se evita «sepulcro» por su tono más tradicional, aunque sería posible.
- source_word: ዘከረይኩ፡ ለርእስየ / that I dug for myself
  english_pob_choice: that I dug for myself
  chosen_spanish: que yo mismo cavé
  alternatives_spanish:
  - que cavé para mí
  - que yo cavé para mí
  lexicon: cavar
  rationale: El verbo «cavar» transmite directamente la acción manual sobre la tumba. «Yo mismo» preserva el matiz enfático de autoría personal del original y del inglés auditado.
theological_decisions:
- issue: Autorreferencia funeraria sin interpretación añadida
  english_pob_reading: In the tomb that I dug for myself there, bury me.
  chosen_spanish_reading: En la tumba que yo mismo cavé allí, entiérrenme.
  alternative_spanish_readings:
  - En la tumba que preparé para mí allí, entiérrenme.
  - En la tumba que yo excavé allí, entiérrenme.
  rationale: Se mantiene la afirmación simple de que el hablante preparó su propia tumba, sin inferir más sobre intención ritual o teológica. La formulación sigue de cerca el audit trail inglés y el ge'ez.
  doctrine_reference: N/A
- issue: Terminología de sepultura sin suavizar la concreción física
  english_pob_reading: bury me ... for a burial place ... tomb
  chosen_spanish_reading: entiérrenme ... para sepultura ... tumba
  alternative_spanish_readings:
  - sepúltenme ... para entierro ... sepulcro
  rationale: Se conserva el campo semántico funerario concreto del pasaje. No se sustituye por vocabulario eclesiástico más abstracto, porque el texto describe un lugar físico de entierro.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa solo afinó 'which' a 'that' en la cláusula final para mayor naturalidad; el sentido permaneció estable. La versión española refleja directamente ese mismo contenido sin necesidad de ajustes adicionales de sentido.
  spanish_consistency_notes:
  - Se mantiene el nombre «Efrón» con ortografía castellana habitual para el nombre propio.
  - Se usa «hitita» como etnónimo estándar en español.
  - La doble mención de la petición de entierro se conserva porque está presente en el texto fuente y en el audit trail inglés.
  - No se introdujo puntuación explicativa extra que altere la cadencia semítica del verso.
