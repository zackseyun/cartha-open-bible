review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del ge''ez y del POB inglés: advertencia condicional, maquinación contra el hermano, caída bajo el poder del otro, exclusión de la tierra de los vivientes y borrado de la descendencia. Sin embargo, ''caerá en sus manos'' introduce una ambigüedad innecesaria en español porque ''sus'' puede entenderse como plural genérico de ustedes o como referencia poco clara; el propio pie de nota intenta resolver una ambigüedad creada por la redacción. También ''será exterminado'' es más fuerte y más específico que ''será cortado''/''will be cut off'', y conviene una formulación que preserve mejor el matiz judicial sin sobretraducir.'
  spanish_quality_summary: 'El texto es legible y digno, pero puede mejorarse con una redacción más natural y precisa: ''caerá en mano de su hermano'' o ''caerá en poder de su hermano'' evita ambigüedad; ''será excluido'' o ''será cortado'' refleja mejor el original que ''será exterminado''. El resto del versículo suena bien en español bíblico contemporáneo.'
  glossary_alignment: No hay conflictos con los glosarios mayores del proyecto. Las decisiones 'su hermano', 'tierra de los vivientes' y 'su descendencia' son adecuadas. La principal cuestión léxica es ውስተ፡ እዴሁ, donde la traducción debe mantener la imagen de 'mano' sin crear confusión en español; y ይሤር, donde es preferible una opción más cercana a 'ser cortado / quedar excluido' que a 'ser exterminado'.
  issues:
  - severity: medium
    issue: Ambigüedad en 'caerá en sus manos[a]'
    rationale: En español, 'sus manos' no señala con claridad al hermano ofendido y puede sonar plural o referirse vagamente a 'ustedes'. El inglés auditado optó por 'his hand', entendiendo la mano del hermano, no una pluralidad indefinida.
  - severity: medium
    issue: El pie de nota a justifica una ambigüedad creada por la traducción principal
    rationale: La nota 'O «en manos de su hermano»' funciona más como corrección que como alternativa real. Es mejor resolver la referencia en el texto principal y omitir la nota, ya que el inglés final no preservó esta como alternativa textual sino como corrección de una lectura anterior.
  - severity: low
    issue: '''será exterminado'' sobreintensifica ''will be cut off'''
    rationale: Aunque transmite juicio severo, 'exterminado' sugiere aniquilación física total y pierde el matiz más amplio de exclusión/corte judicial presente en la fórmula bíblica.
  revised_spanish_text: Pero si hay entre ustedes uno que maquina mal contra su hermano, sepan desde ahora que todo el que maquina mal contra su hermano caerá en mano de su hermano, y será cortado de la tierra de los vivientes, y su descendencia será borrada de debajo del cielo.
  revision_rationale: Se revisa 'caerá en sus manos[a]' a 'caerá en mano de su hermano' para hacer explícita la referencia que el contexto y la auditoría inglesa final apoyan, sin perder la imagen semítica de la mano como poder. Se elimina la nota porque ya no hace falta resolver una ambigüedad creada por la redacción española. Además, 'será cortado' refleja mejor el valor de juicio/exclusión de ይሤር y del POB inglés 'will be cut off' que 'será exterminado'.
