base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/009.yaml
  text: But if there is one among you who devises evil against his brother, know from now on that everyone who devises evil against his brother will fall into his hand, and he will be cut off from the land of the living, and his seed will be blotted out from under heaven.
  footnotes:
  - marker: a
    text: Or 'his own hand'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:05Z'
    unchanged: false
    changes_summary: Changed 'his hand' to 'his own hand' to reflect the reflexive sense more clearly and avoid ambiguity, while preserving the formal tone and structure.
translation:
  language: es
  text: Pero si hay entre ustedes uno que maquina mal contra su hermano, sepan desde ahora que todo el que maquina mal contra su hermano caerá en sus manos[a], y será exterminado de la tierra de los vivientes, y su descendencia será borrada de debajo del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en manos de su hermano». La revisión inglesa reciente prefirió conservar «his hand» como imagen semítica de dominio, pero el contexto permite entenderlo como la mano del hermano contra quien se planeó el mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዘኀሠሠ / devises evil
  english_pob_choice: devises evil
  chosen_spanish: maquina mal
  alternatives_spanish:
  - maquina el mal
  - planea el mal
  - trama maldad
  lexicon: maquinar / mal
  rationale: El ge'ez expresa intención hostil o conspiración, no solo un mal pensamiento. 'Maquina mal' conserva la fuerza de acción deliberada y suena natural en español bíblico actual sin diluir el contenido moral.
- source_word: እኁሁ / his brother
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su propio hermano
  lexicon: hermano
  rationale: Se mantiene el vínculo fraternal explícito del original; el texto no requiere precisar 'propio' en español, aunque la referencia es naturalmente interna al mismo hermano mencionado.
- source_word: ውስተ፡ እዴሁ / into his hand
  english_pob_choice: into his hand
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en su mano
  - en poder de su hermano
  - a manos de su hermano
  lexicon: mano
  rationale: La revisión inglesa descartó una lectura reflexiva y volvió al sentido de caer bajo el poder del hermano ofendido. 'En sus manos' conserva la imagen semítica de dominio o captura y evita la ambigüedad de una lectura autorreferencial.
- source_word: ይወድቅ / will fall
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - se derrumbará
  - será entregado
  lexicon: caer
  rationale: '''Caerá'' reproduce la imagen de caída con sobriedad y corresponde bien a la construcción de juicio o derrota implícita en el pasaje.'
- source_word: ይሤር / will be cut off
  english_pob_choice: will be cut off
  chosen_spanish: será exterminado
  alternatives_spanish:
  - será cortado
  - será arrancado
  lexicon: exterminar / cortar
  rationale: La fórmula semítica de ser 'cortado' indica eliminación total o exclusión definitiva. En español, 'será exterminado' comunica con claridad el resultado fuerte sin perder el peso judicial del original, aunque 'será cortado' queda como alternativa más literal.
- source_word: እምድረ፡ ሕያዋን / from the land of the living
  english_pob_choice: from the land of the living
  chosen_spanish: de la tierra de los vivientes
  alternatives_spanish:
  - de la tierra de los vivos
  lexicon: tierra de los vivientes
  rationale: Se conserva la expresión idiomática tradicional y transparente del ámbito bíblico, con 'vivientes' como equivalente fiel y solemne de 'living'.
- source_word: ዘርኡ / his seed
  english_pob_choice: his seed
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su linaje
  - su simiente
  lexicon: descendencia
  rationale: '''Descendencia'' expresa de manera clara y reverente la continuidad genealógica. ''Simiente'' sería más literal, pero en español puede sonar arcaico o ambiguo fuera de contextos muy controlados.'
- source_word: እምታሕተ፡ ሰማይ / from under heaven
  english_pob_choice: from under heaven
  chosen_spanish: de debajo del cielo
  alternatives_spanish:
  - de bajo el cielo
  lexicon: debajo del cielo
  rationale: Se mantiene la imagen espacial semítica con una expresión natural en español bíblico. 'Debajo del cielo' suena más idiomático y fiel que un giro excesivamente literal.
theological_decisions:
- issue: Retribución por malicia fraterna
  english_pob_reading: everyone who devises evil against his brother will fall into his hand, and he will be cut off...
  chosen_spanish_reading: todo el que maquina mal contra su hermano caerá en sus manos, y será exterminado...
  alternative_spanish_readings:
  - todo el que trama mal contra su hermano caerá en manos de su hermano
  - todo el que maquina el mal contra su hermano caerá bajo su poder
  rationale: 'El pasaje enseña una retribución directa: el mal tramado contra el hermano revierte sobre el agresor. La redacción española mantiene esa reciprocidad judicial sin resolverla en una paráfrasis moralizante.'
  doctrine_reference: principio de retribución justa / juicio divino implícito
- issue: Alcance de la frase 'será exterminado de la tierra de los vivientes'
  english_pob_reading: will be cut off from the land of the living
  chosen_spanish_reading: será exterminado de la tierra de los vivientes
  alternative_spanish_readings:
  - será cortado de la tierra de los vivientes
  - será eliminado de la tierra de los vivientes
  rationale: Se preserva la fuerza de exclusión total del lenguaje de pacto/jucio. 'Exterminado' puede sonar fuerte, pero refleja el carácter irreversible del veredicto mejor que una fórmula suavizada.
  doctrine_reference: lenguaje bíblico de juicio y exclusión definitiva
- issue: Destino de la descendencia
  english_pob_reading: his seed will be blotted out from under heaven
  chosen_spanish_reading: su descendencia será borrada de debajo del cielo
  alternative_spanish_readings:
  - su descendencia será eliminada de debajo del cielo
  - su linaje será borrado de debajo del cielo
  rationale: '''Borrada'' conserva el valor figurado de desaparición total sin introducir una noción ajena. La frase mantiene el paralelismo con la primera mitad del versículo y el tono de sentencia.'
  doctrine_reference: sentencia de memoria/linaje bajo juicio
translation_notes:
  revision_awareness: 'El texto inglés pasó por una corrección importante sobre la frase final: una revisión intermedia propuso ''his own hand'', pero la revisión posterior la rechazó por interpretarla como autorreferencial y volvió a ''his hand''. La versión española evita la ambigüedad reflejando el sentido relacional (''en sus manos'') y mantiene el resto del versículo alineado con la fuente ge''ez y la lectura inglesa final.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - '''Maquina mal'' conserva mejor la intención hostil que un simple ''piensa mal''.'
  - '''Su descendencia'' se mantiene consistente con el uso bíblico de ''seed'' en español claro.'
  - La imagen de 'mano' se conserva sin forzar una lectura reflexiva, en línea con la revisión crítica del audit trail.
