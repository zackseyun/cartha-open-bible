  yaml_path: translation/extra_canonical/jubilees/036/020.yaml
  text: But Jacob dwelt on Mount Hebron, in the tower of the land of the sojourning of Abraham his father, and he worshiped the LORD with all his heart and according to the commandments as they were revealed,
  footnotes:
  - marker: a
    text: Or 'in the tower of the sojourning'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:07Z'
    unchanged: false
    changes_summary: Changed 'commands' to 'commandments' for a more formal register and closer lexical fit, and 'manifest' to 'revealed' for more natural English while preserving the sense.
translation:
  language: es
  text: Pero Jacob habitó en el monte Hebrón, en la torre[a] de la tierra del peregrinaje de Abraham, su padre, y adoró a Yahvé con todo su corazón y conforme a los mandamientos que fueron revelados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la torre del peregrinaje». El geʿez tiene una expresión más amplia, «de la tierra del peregrinaje», que el POB inglés también refleja.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወያዕቆብ / Jacob
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaʾcob
  - Jacobo
  lexicon: nombre propio
  rationale: Se conserva el nombre bíblico tradicional y transparente en español.
- source_word: ኀደረ፡ / dwelt
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - moró
  lexicon: verbo de residencia
  rationale: «Habitó» comunica residencia estable sin sonar arcaico; corresponde bien al valor del geʿez en este contexto narrativo.
- source_word: ደብረ፡ ኬብሮን፡ / Mount Hebron
  english_pob_choice: Mount Hebron
  chosen_spanish: el monte Hebrón
  alternatives_spanish:
  - el monte de Hebrón
  - el monte Hebrón
  lexicon: topónimo
  rationale: Se mantiene la forma bíblica usual en español y el título geográfico con artículo natural.
- source_word: ውስተ፡ ማኅደድ፡ ዘምድረ፡ ፍልሰተ፡ / in the tower of the land of the sojourning
  english_pob_choice: in the tower of the land of the sojourning
  chosen_spanish: en la torre de la tierra del peregrinaje
  alternatives_spanish:
  - en la torre del país del peregrinaje
  - en la torre de la tierra del extranjero
  lexicon: sintagma locativo
  rationale: «Torre» sigue la lectura del POB; «peregrinaje» refleja el valor de residencia temporal/foránea de «sojourning» sin imponer una interpretación más específica que el texto no exige.
- source_word: አቡሁ፡ አብርሃም፡ / Abraham his father
  english_pob_choice: Abraham his father
  chosen_spanish: Abraham, su padre
  alternatives_spanish:
  - su padre Abraham
  - Abraham su padre
  lexicon: relación de parentesco
  rationale: La posposición con comas es natural en español y conserva la relación filial explícita.
- source_word: ወአምላከ፡ ለእግዚአብሔር፡ / and he worshiped the LORD
  english_pob_choice: and he worshiped the LORD
  chosen_spanish: y adoró a Yahvé
  alternatives_spanish:
  - y rindió culto a Yahvé
  - y se postró ante Yahvé
  lexicon: verbo de culto; tetragrámaton
  rationale: «Adoró» conserva el acto cultual general del inglés POB; «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: በኵሉ፡ ልቡ፡ / with all his heart
  english_pob_choice: with all his heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - de todo corazón
  - con todo el corazón
  lexicon: idioma de intensidad
  rationale: Se mantiene el modismo bíblico natural en español y su fuerza de totalidad interior.
- source_word: ወበከመ፡ ትእዛዛት፡ ዘያስተርኢ / and according to the commandments as they were revealed
  english_pob_choice: according to the commandments as they were revealed
  chosen_spanish: y conforme a los mandamientos que le fueron revelados
  alternatives_spanish:
  - y según los mandamientos revelados
  - y conforme a los mandamientos tal como fueron revelados
  lexicon: norma revelada
  rationale: «Mandamientos» sigue la revisión inglesa más formal y cercana al plural del original; «le fueron revelados» preserva el sentido pasivo de revelación sin añadir sujeto explícito no requerido por el texto.
theological_decisions:
- issue: Nombre divino en el texto de culto
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Nombre
  rationale: El proyecto usa «Yahvé» para יהוה en el texto principal. Aquí el contexto de adoración hace innecesario enmascarar el nombre con «SEÑOR».
  doctrine_reference: Éxodo 3:15; convención editorial del POB en español
- issue: Relación entre obediencia y revelación
  english_pob_reading: according to the commandments as they were revealed
  chosen_spanish_reading: conforme a los mandamientos que le fueron revelados
  alternative_spanish_readings:
  - según los mandamientos revelados
  - de acuerdo con los mandamientos que fueron revelados
  rationale: 'La formulación conserva la tensión entre norma divina y acto de revelación: no son meros preceptos abstractos, sino mandamientos recibidos por revelación.'
  doctrine_reference: Deuteronomio 4:13; temática bíblica de mandamiento revelado
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que precisó «the land of the sojourning» y cambió «commands» por «commandments» y «manifest» por «revealed». La versión española refleja esas correcciones con una opción ligeramente más formal y con el matiz de revelación explícita.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Mandamientos» se eligió por coherencia con la revisión inglesa y por su registro bíblico más preciso que «mandatos» en este contexto.
  - La nota al pie conserva la alternativa de lectura del sintagma locativo sin diluir el texto principal.
  - 'El español evita calcos excesivos pero conserva la estructura informativa del original: residencia, lugar, culto y norma revelada.'
