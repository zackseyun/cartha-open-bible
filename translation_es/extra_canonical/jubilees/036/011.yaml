base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/036/011.yaml
  text: I declare and testify to you, my sons, according to the judgment that will come upon the man who desires to do evil against his brother.
  footnotes:
  - marker: a
    text: Or 'the judgment'.
    reason: previous_rendering
  - marker: b
    text: Or 'make known'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:06Z'
    unchanged: false
    changes_summary: Revised 'testify' to 'make known' for closer alignment with the paired verbs, removed 'according to' as unnatural and unnecessary here, and changed 'do harm against' to 'do evil against' to reflect the source more directly in formal English.
translation:
  language: es
  text: Yo les declaro y les testifico a ustedes, hijos míos, conforme al juicio que vendrá sobre el hombre que desea hacer el mal contra su hermano.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አነግር
  english_pob_choice: I declare
  chosen_spanish: les declaro
  alternatives_spanish:
  - les hago saber
  - les doy a conocer
  lexicon: declarar / dar a conocer
  rationale: El verbo ge'ez corresponde a una proclamación o declaración formal. «Les declaro» conserva el tono público y directo sin volverlo demasiado rígido en español.
- source_word: ወአስምዕ
  english_pob_choice: and testify
  chosen_spanish: y les doy testimonio
  alternatives_spanish:
  - y testifico
  - y doy testimonio
  lexicon: testificar / dar testimonio
  rationale: La revisión y la corrección textual señalan una fuerza forense o de testimonio. En español, «dar testimonio» expresa bien ese valor y suena natural en registro bíblico.
- source_word: ላዕሌክሙ
  english_pob_choice: to you / against you
  chosen_spanish: les
  alternatives_spanish:
  - contra ustedes
  - a ustedes
  lexicon: pronombre dativo/relacional
  rationale: El contexto admite una relación de dirección hacia los oyentes, pero sin necesidad de cargar el texto español con «contra ustedes» en el verbo principal. El efecto adversativo ya queda claro por el contenido del juicio.
- source_word: በከመ፡ ኵነኔ
  english_pob_choice: according to the judgment
  chosen_spanish: conforme al juicio
  alternatives_spanish:
  - según el juicio
  - en conformidad con el juicio
  lexicon: κατά / según
  rationale: La corrección crítica subraya que la frase no solo introduce el juicio, sino que indica conformidad con él. «Conforme al juicio» conserva esa relación sin sonar forzado.
- source_word: ይመጽእ
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - ha de venir
  - llegará
  lexicon: venir
  rationale: El futuro simple es claro y fiel al valor prospectivo del verbo, con un tono natural en español bíblico contemporáneo.
- source_word: ዘይፈቅድ
  english_pob_choice: who desires
  chosen_spanish: que desea
  alternatives_spanish:
  - que quiere
  - que anhela
  lexicon: desear / querer
  rationale: «Desea» refleja bien la orientación interior y evita suavizar el impulso moral de la frase.
- source_word: ይግበር ሕሡመ
  english_pob_choice: to do evil
  chosen_spanish: hacer el mal
  alternatives_spanish:
  - obrar mal
  - cometer maldad
  lexicon: hacer mal / evil
  rationale: La construcción ge'ez apunta a una acción moralmente mala. «Hacer el mal» mantiene la fuerza ética sin introducir una abstracción innecesaria.
- source_word: ላዕለ፡ እኁሁ
  english_pob_choice: against his brother
  chosen_spanish: contra su hermano
  alternatives_spanish:
  - a su hermano
  - hacia su hermano
  lexicon: contra / brother
  rationale: La preposición «contra» preserva la hostilidad implícita en el contexto del juicio. «Hermano» se conserva literalmente para no atenuar el vínculo familiar o fraterno.
theological_decisions:
- issue: Naturaleza del juicio anunciado
  english_pob_reading: the judgment that will come upon the man
  chosen_spanish_reading: el juicio que vendrá sobre el hombre
  alternative_spanish_readings:
  - la sentencia que vendrá sobre el hombre
  - el juicio que recaerá sobre el hombre
  rationale: «Juicio» conserva la ambigüedad útil entre acto judicial y resultado penal, tal como permite el texto fuente y la nota inglesa alternativa sobre «the judgment».
  doctrine_reference: Justicia retributiva / juicio divino
- issue: Relación entre la declaración y el contenido anunciado
  english_pob_reading: I declare and testify to you
  chosen_spanish_reading: Yo les declaro y les doy testimonio
  alternative_spanish_readings:
  - Yo les declaro y testifico
  - Yo les hago saber y les doy testimonio
  rationale: Se mantiene la duplicación verbal, evitando diluir la estructura solemne. «Dar testimonio» preserva el tono de advertencia pública reconocido en la revisión crítica.
  doctrine_reference: Testimonio profético
- issue: Dirección del mal contra el hermano
  english_pob_reading: desires to do evil against his brother
  chosen_spanish_reading: que desea hacer el mal contra su hermano
  alternative_spanish_readings:
  - que quiere hacer el mal a su hermano
  - que desea obrar mal contra su hermano
  rationale: «Contra su hermano» conserva la oposición ética y relacional presente en el original. No se rebaja a una simple injuria o molestia.
  doctrine_reference: Ética fraterna / pecado contra el prójimo
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB que restablece la idea de juicio venidero y el valor testimonial del par verbal. También toma en cuenta la corrección crítica que señala que la frase ge'ez expresa conformidad con el juicio, no solo el anuncio del juicio en abstracto. Se evitó traducir mecánicamente desde el inglés más reciente cuando este había perdido matices confirmados por la revisión textual.
  spanish_consistency_notes:
  - Se usa «juicio» de manera consistente para ኵነኔ, sin sustituirlo por «sentencia» salvo que un contexto futuro lo requiera.
  - Se conserva «hermano» en sentido literal y fraterno, sin expandirlo a «semejante» o «prójimo».
  - Se mantiene el registro bíblico sobrio con verbos directos («declaro», «doy testimonio») y sin introducir paráfrasis interpretativas.
  - No se emplea «Cristo», «SEÑOR» ni otras sustituciones teológicas no presentes en este versículo.
