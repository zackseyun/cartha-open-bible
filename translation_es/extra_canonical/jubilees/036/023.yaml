    timestamp: '2026-04-23T14:52:07Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Porque la amó sobremanera después de que murió Raquel, su hermana, pues ella era perfecta y recta en todos sus caminos, y honraba a Jacob; y durante todos los días de su vida con él no oyó salir de su boca una palabra dura, porque en ella había[a] mansedumbre, paz, rectitud y honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en ella había dulzura, paz, rectitud y honor»; el ge''ez usa sustantivos abstractos en la frase final.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ያፈቅራ፡ ፈድፋደ፡ ጥቀ፡
  english_pob_choice: he loved her exceedingly
  chosen_spanish: la amó sobremanera
  alternatives_spanish:
  - la amó muchísimo
  - la amó en gran manera
  lexicon: amó / sobremanera
  rationale: El intensificador ge'ez expresa amor fuerte e intensificado; 'sobremanera' conserva la elevación del énfasis sin volverse coloquial.
- source_word: ፍጽምት፡ ወሬትዕት፡
  english_pob_choice: perfect and upright
  chosen_spanish: perfecta y recta
  alternatives_spanish:
  - perfecta e íntegra
  - completa y recta
  lexicon: perfecta / recta
  rationale: La pareja adjetival debe mantenerse de forma cercana al texto fuente. 'Recta' conserva el valor moral/legal de rēṭʿ y 'perfecta' reproduce la integridad total que el POB inglés ya reflejó.
- source_word: በኵሉ፡ ፍናዊሃ፡
  english_pob_choice: in all her ways
  chosen_spanish: en todos sus caminos
  alternatives_spanish:
  - en todas sus sendas
  - en toda su conducta
  lexicon: caminos
  rationale: '''Caminos'' es la equivalencia bíblica más directa y mantiene la imagen de conducta habitual sin suavizarla.'
- source_word: ታከብሮ፡
  english_pob_choice: honored Jacob
  chosen_spanish: honraba a Jacob
  alternatives_spanish:
  - honraba a Jacob y lo respetaba
  - daba honor a Jacob
  lexicon: honrar
  rationale: El verbo expresa dar honor/reverencia; 'honraba' conserva el acto relacional sin imponer un matiz eclesiástico ajeno al texto.
- source_word: ኢሰምዐ፡ እምአፉሃ፡ ቃለ፡ ድሩከ፡
  english_pob_choice: he had not heard from her mouth a harsh word
  chosen_spanish: no escuchó de su boca una palabra dura
  alternatives_spanish:
  - no oyó de su boca una palabra áspera
  - de su boca no escuchó una palabra dura
  lexicon: palabra dura
  rationale: '''Palabra dura'' preserva el sentido de aspereza/reproche sin exagerar el adjetivo. ''De su boca'' mantiene la imagen idiomática del origen del habla.'
- source_word: የውህት፡
  english_pob_choice: gentleness
  chosen_spanish: mansedumbre
  alternatives_spanish:
  - dulzura
  - gentileza
  lexicon: mansedumbre
  rationale: El término abstracto del ge'ez apunta a una cualidad de suavidad y apacibilidad; 'mansedumbre' es una opción bíblica estable y precisa en español.
- source_word: ሰላመ፡
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz interior
  - armonía
  lexicon: paz
  rationale: '''Paz'' es la correspondencia natural y formal del sustantivo, sin necesidad de explicitar más de lo que el texto dice.'
- source_word: ርትዕ፡
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - integridad
  lexicon: rectitud
  rationale: '''Rectitud'' conserva la cualidad moral alineada con ''uprightness'' y evita confundirla con un término puramente forense.'
- source_word: ክብር፡
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - dignidad
  - honradez
  lexicon: honor
  rationale: '''Honor'' mantiene el paralelismo final del texto y refleja fielmente el sustantivo abstracto ge''ez.'
theological_decisions:
- issue: 'Naturaleza de la lista final: cualidades internas abstractas versus adjetivos personales'
  english_pob_reading: gentleness and peace and uprightness and honor were in her
  chosen_spanish_reading: en ella había mansedumbre, paz, rectitud y honor
  alternative_spanish_readings:
  - era mansa y pacífica y recta y honorable
  - tenía mansedumbre, paz, rectitud y honor
  rationale: El ge'ez presenta sustantivos abstractos con la idea locativa 'en ella'. El español debe reflejar esa estructura para no borrar la forma del original, por eso se usa 'en ella había...'.
  doctrine_reference: No doctrinal claim beyond character description; textual fidelity to source grammar.
translation_notes:
  revision_awareness: La revisión más reciente mantuvo sin cambios la redacción inglesa de referencia; la presente versión sigue esa lectura optimizada y conserva la estructura nominal del ge'ez en la cláusula final.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Mesías/Cristo'' no aplica en este pasaje.'
  - Se conserva el paralelismo y la acumulación final con sustantivos, en línea con la auditoría inglesa revisada.
  - '''honró'' no se usa porque el sujeto directo del final es Raquel respecto de Jacob, no un acto litúrgico.'
