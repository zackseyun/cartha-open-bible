  text: For he loved her exceedingly after Rachel her sister had died, because she was perfect and upright in all her ways and honored Jacob; and in all the days of her life with him he had not heard from her mouth a harsh word, because gentleness and peace and uprightness and honor were in her.
  footnotes:
