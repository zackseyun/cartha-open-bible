review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la corrección clave del ge''ez: la belleza intensa se atribuye a Lea (''su aspecto era muy hermoso'') y luego se afirma separadamente que Raquel era hermosa. También conserva ''muy'', que sí está respaldado por ጥቀ፡. Sin embargo, la nota alternativa introduce una lectura armonizada previa que ya no corresponde al análisis fuente-prioritario de Jubileos.'
  spanish_quality_summary: 'El español principal es claro, natural y digno. ''Los ojos de Lea eran débiles'' suena algo calcado pero sigue siendo comprensible y fiel; no exige cambio. El problema principal está en la nota: ''amable/agradable'' no encaja bien con una descripción física y la alternativa completa revive una lectura descartada.'
  glossary_alignment: No hay términos del glosario teológico principal implicados. Las decisiones léxicas centrales ('ojos... débiles', 'aspecto... muy hermoso', 'Raquel era hermosa') son coherentes con la POB auditada y con un español eclesial legible.
  issues:
  - severity: medium
    issue: La nota al pie conserva una lectura alternativa que contradice la revisión fuente-prioritaria de Jubileos.
    rationale: La auditoría inglesa documenta que la formulación 'Rachel was beautiful in appearance and lovely' fue corregida por ser una armonización con Génesis 29:17. Mantenerla como nota alternativa en español puede reintroducir la misma confusión textual.
  - severity: low
    issue: La nota usa 'amable/agradable' para 'lovely'.
    rationale: En español, 'amable' describe sobre todo carácter o trato, no belleza física. Si se mantiene una nota histórica, conviene usar una forma más claramente estética como 'encantadora'.
  revised_spanish_text: porque los ojos de Lea eran débiles, pero su aspecto era muy hermoso, y Raquel era hermosa.
  revised_footnotes: []
  revision_rationale: 'Se aprueba el texto principal con una reparación menor: eliminar la nota alternativa porque preserva una lectura ya descartada por la revisión del ge''ez y puede inducir a armonizar indebidamente con Génesis 29:17. No hace falta nota al pie en español si la alternativa no representa una opción válida para este registro.'
