lexical_decisions:
- source_word: አዕይንቲሃ / eyes were weak
  english_pob_choice: Leah’s eyes were weak
  chosen_spanish: los ojos de Lea eran débiles
  alternatives_spanish:
  - los ojos de Lea eran delicados
  - Lea tenía los ojos débiles
  lexicon: עינים / eyes; דקה/débil
  rationale: Mantiene la imagen física concreta del texto y el valor de 'weak' de la POB, sin suavizarlo hacia una lectura interpretativa.
- source_word: ላሕይ፡ ራእያ፡ ጥቀ፡
  english_pob_choice: her appearance was very beautiful
  chosen_spanish: su aspecto era muy hermoso
  alternatives_spanish:
  - su apariencia era muy bella
  - su aspecto era sumamente hermoso
  lexicon: ראָיה / appearance, sight; יפה / beautiful
  rationale: El ge'ez distingue la belleza del aspecto de Lea con intensidad ('muy'); 'aspecto' comunica la apariencia externa con naturalidad en español.
- source_word: ወራሔል፡ ሠናይ፡
  english_pob_choice: Rachel was beautiful
  chosen_spanish: Raquel era hermosa
  alternatives_spanish:
  - Raquel era bella
  - Raquel era hermosa en apariencia
  lexicon: Rachel + יפה / beautiful
  rationale: Preserva la afirmación separada sobre Raquel sin añadir 'en apariencia' ni atenuar la distinción que el texto hace entre Lea y Raquel.
theological_decisions:
- issue: La frase mantiene una comparación descriptiva entre Lea y Raquel, sin interpretar más allá de su valoración física.
  english_pob_reading: because Leah’s eyes were weak, but her appearance was very beautiful, and Rachel was beautiful,
  chosen_spanish_reading: porque los ojos de Lea eran débiles, pero su aspecto era muy hermoso, y Raquel era hermosa
  alternative_spanish_readings:
  - porque los ojos de Lea eran débiles, pero Lea tenía muy buen aspecto, y Raquel era hermosa
  rationale: No hay carga doctrinal directa; se conserva la tensión descriptiva del original y la revisión reciente que restituyó 'very'.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: 'La versión revisada corrigió un error anterior: el original sí contiene un intensificador para la belleza de Lea. La redacción española conserva esa intensificación (''muy hermoso'') y evita trasladarla indebidamente a Raquel.'
  spanish_consistency_notes:
  - Se usa 'Lea' y 'Raquel' de forma consistente con el POB en español.
  - Se eligió 'hermoso/hermosa' por su adecuación para belleza física visible y por mantener un registro bíblico claro.
  - La nota alternativa queda anclada en 'Raquel era hermosa[a]' para reflejar la variación preservada por la POB inglesa.
