lexical_decisions:
- source_word: አዕይንቲሃ
  english_pob_choice: her eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus ojos eran hermosos
  - los ojos de ella
  lexicon: ojo(s)
  rationale: El ge'ez conserva solo el sustantivo plural ‘ojos’ sin verbo explícito; por eso en español se mantiene la expresión nominal breve ‘sus ojos’. No se completa con ‘eran’ para no sobreinterpretar la segmentación del texto fuente.
- source_word: ሠናይ
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bonita
  - bella
  lexicon: bello/bonito
  rationale: El adjetivo describe la apariencia visual de manera positiva; ‘hermosa’ es natural en español bíblico contemporáneo y conserva dignidad sin volverse arcaico.
- source_word: ራእያ
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - rostro
  - vista
  lexicon: apariencia
  rationale: La revisión inglesa corrigió ‘form’ a ‘appearance’; ‘apariencia’ sigue con precisión el campo semántico de lo visible y evita introducir ‘forma’ en español, que sería menos natural aquí.
- source_word: ወላሕይት ጥቀ
  english_pob_choice: very lovely
  chosen_spanish: muy encantadora
  alternatives_spanish:
  - muy agradable
  - muy deseable
  lexicon: encantador/a
  rationale: ‘Encantadora’ comunica la valoración estética del texto sin sexualizar ni suavizar indebidamente la fuerza elogiosa del original. ‘Muy encantadora’ mantiene el énfasis de ‘very lovely’.
- source_word: ላባ
  english_pob_choice: Laban
  chosen_spanish: Labán
  alternatives_spanish:
  - Laban
  lexicon: nombre propio
  rationale: Se adapta al nombre bíblico estándar en español con acento gráfico, que facilita lectura y pronunciación.
- source_word: ያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: nombre propio
  rationale: ‘Jacob’ es la forma bíblica ampliamente reconocible y coincide con el uso habitual en traducciones formales al español.
theological_decisions:
- issue: Segmentación defectuosa que deja ‘sus ojos’ aislado
  english_pob_reading: her eyes. And her appearance was beautiful, and she was very lovely.
  chosen_spanish_reading: sus ojos. Y su apariencia era hermosa, y ella era muy encantadora.
  alternative_spanish_readings:
  - sus ojos eran hermosos, y su apariencia era muy encantadora
  - sus ojos; y su apariencia era hermosa
  rationale: El audit trail indica que la segmentación separó indebidamente ‘her eyes’ del miembro siguiente. En vez de ocultarlo, el español conserva el fragmento literal aunque quede sintácticamente suspendido, para no borrar la tensión textual documentada.
  doctrine_reference: Fidelidad textual y respeto a la segmentación del testimonio fuente
translation_notes:
  revision_awareness: La última revisión inglesa corrigió ‘form’ a ‘appearance’ y advirtió que la cláusula final queda incompleta en contexto. La revisión más importante para este verso señaló que ‘her eyes’ fue arrastrado indebidamente desde la cláusula anterior; por eso el español preserva el fragmento literal sin convertirlo en una frase completa inventada.
  spanish_consistency_notes:
  - Se usa ‘Labán’ y ‘Jacob’ de forma consistente con la nomenclatura bíblica española habitual.
  - Se evita ‘forma’ porque la auditoría inglesa ya prefirió ‘appearance’ por precisión semántica.
  - Se mantiene ‘sus ojos’ sin verbo para respetar la evidencia textual y la advertencia de segmentación.
