translation:
  language: es
  text: Ella también tomó y dio a su sierva Zilpá a Jacob como esposa[a], y ella concibió y dio a luz
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ella tomó y dio también a su sierva Zilpá a Jacob como esposa»'
    reason: Preserva la alternativa documentada en el audit trail inglés sobre la posición de 'también'.
lexical_decisions:
- source_word: ነሥአት / 'she also took'
  english_pob_choice: she also took
  chosen_spanish: ella también tomó
  alternatives_spanish:
  - también ella tomó
  - ella tomó también
  lexicon: took
  rationale: Se mantiene el valor verbal simple de 'tomar' y el matiz de adición de -ni con 'también', colocado en español junto al sujeto para reflejar mejor la fuerza del original y la revisión inglesa.
- source_word: ወወሀበት / 'and gave'
  english_pob_choice: and gave
  chosen_spanish: y dio
  alternatives_spanish:
  - y entregó
  - y le dio
  lexicon: gave
  rationale: '''Dar'' reproduce de manera directa la acción de entregar a la sierva a Jacob en este contexto matrimonial; ''entregar'' sería más interpretativo.'
- source_word: ዜልፋሃ / Zilpah
  english_pob_choice: Zilpah
  chosen_spanish: Zilpá
  alternatives_spanish:
  - Zilpa
  - Zilfá
  lexicon: proper name
  rationale: Se conserva el nombre propio con adaptación gráfica habitual al español para lectura fluida, sin alterar la identificación del personaje.
- source_word: ለአኪታ ... ለያዕቆብ ብእሲተ / 'to Jacob as a wife'
  english_pob_choice: to Jacob as a wife
  chosen_spanish: a Jacob como esposa
  alternatives_spanish:
  - como esposa de Jacob
  - para ser su esposa
  lexicon: wife / marital relation
  rationale: '''Como esposa'' conserva la relación marital sin añadir glosa. Se evita ''mujer'' por posible ambigüedad y se mantiene la estructura de propósito/resultado del original.'
- source_word: ወፀንሰት / 'and she conceived'
  english_pob_choice: and she conceived
  chosen_spanish: y ella concibió
  alternatives_spanish:
  - y concibió
  - y quedó encinta
  lexicon: conceived
  rationale: '''Concibió'' es el equivalente bíblico más preciso y digno; se mantiene el sujeto explícito para claridad narrativa.'
- source_word: ወወለደት / 'and bore'
  english_pob_choice: and bore
  chosen_spanish: y dio a luz
  alternatives_spanish:
  - y parió
  - y alumbró
  lexicon: bore
  rationale: '''Dar a luz'' es el español natural y reverente para el parto, preservando el sentido sin rusticidad.'
theological_decisions:
- issue: La formulación de relación matrimonial con una sierva dada a Jacob
  english_pob_reading: as a wife
  chosen_spanish_reading: como esposa
  alternative_spanish_readings:
  - por esposa
  - para esposa
  rationale: El texto presenta la incorporación de la sierva a Jacob en función conyugal; 'como esposa' preserva la tensión narrativa sin convertirla en una formulación doctrinal más fuerte de lo que exige el verso.
  doctrine_reference: Narrativa patriarcal / matrimonio en Génesis-Jubileos
- issue: Reflejo del énfasis adverbial 'also'
  english_pob_reading: she also took
  chosen_spanish_reading: ella también tomó
  alternative_spanish_readings:
  - también ella tomó
  - ella tomó también
  rationale: El audit trail inglés indica que 'also' modifica a la acción de la mujer, no a 'maidservant'. En español se conserva ese énfasis con 'también' antes del verbo, sin añadir elementos no presentes.
  doctrine_reference: Fidelidad narrativa y cohesión intertextual
translation_notes:
  revision_awareness: Se corrigió el anclaje de la nota para que el marcador [a] aparezca exactamente en el texto español. La redacción sigue la revisión inglesa más reciente, que coloca 'also' con el sujeto, y mantiene todos los elementos del original ge'ez sin ampliarlos.
  spanish_consistency_notes:
  - Se usa 'sierva' para ዜልፋሃ siguiendo el valor de maidservant en el audit trail inglés, no 'esclava', porque aquí el texto destaca la condición doméstica/servil en un relato familiar.
  - Se conserva la secuencia narrativa simple 'concibió y dio a luz' para mantener paralelismo bíblico y evitar paráfrasis.
  - Se opta por 'Yahvé' no porque aparezca aquí un nombre divino, sino como convención general del proyecto; en este versículo no interviene.
  - La puntuación y el orden de palabras buscan una lectura natural en español, pero sin perder la coordinación verbal del original.
