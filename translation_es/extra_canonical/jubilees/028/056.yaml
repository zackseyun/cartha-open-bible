lexical_decisions:
- source_word: ኵሉን፡ አባግዕ፡
  english_pob_choice: all the sheep
  chosen_spanish: todas las ovejas
  alternatives_spanish:
  - todas las reses
  - todo el rebaño
  lexicon: sheep -> ovejas
  rationale: El ge'ez designa literalmente ovejas; «ovejas» mantiene la imagen concreta sin generalizarla a un término más amplio como «rebaño».
- source_word: ጋሴ፡
  english_pob_choice: speckled
  chosen_spanish: manchadas
  alternatives_spanish:
  - salpicadas
  - punteadas
  lexicon: speckled -> manchadas
  rationale: «Manchadas» comunica en español la idea visual de pelaje con manchas o motas, de modo natural y fiel al patrón descriptivo.
- source_word: ትእምርተ፡ ኵስኵሰ፡
  english_pob_choice: those that had marks of spots
  chosen_spanish: las que tenían marcas de manchas
  alternatives_spanish:
  - las que tenían señales de manchas
  - las que tenían marcas moteadas
  lexicon: mark/sign + spot pattern -> marcas de manchas
  rationale: La secuencia sugiere un rasgo visible de identificación o patrón; «marcas de manchas» conserva la duplicación descriptiva sin interpretarla excesivamente.
- source_word: ሐመደ፡ ኵስኵሰ፡
  english_pob_choice: those that had dark spots
  chosen_spanish: las que tenían manchas oscuras
  alternatives_spanish:
  - las que tenían manchas negras
  - las que tenían manchas sombrías
  lexicon: dark spots -> manchas oscuras
  rationale: «Oscuras» refleja el contraste cromático con la frase anterior y evita una especificación más fuerte como «negras», que el texto no exige.
- source_word: ወይደግማ፡
  english_pob_choice: and they would breed again
  chosen_spanish: y se reproducirían de nuevo
  alternatives_spanish:
  - y volverían a reproducirse
  - y se criarían de nuevo
  lexicon: breed again -> reproducirse de nuevo
  rationale: El verbo final expresa reproducción/engendramiento del ganado; «se reproducirían de nuevo» es claro en español y conserva el valor iterativo de «again».
theological_decisions:
- issue: Referencia al ganado y lenguaje no humano
  english_pob_reading: all the sheep ... and they would breed again
  chosen_spanish_reading: todas las ovejas ... y se reproducirían de nuevo
  alternative_spanish_readings:
  - todos los corderos ...
  - todo el rebaño ...
  rationale: No hay tensión doctrinal; el punto es zootécnico/narrativo. Se mantiene el referente concreto «ovejas» y el verbo de reproducción sin moralizar ni espiritualizar el pasaje.
