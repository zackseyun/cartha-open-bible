  - era
  lexicon: Copula / state
  rationale: La cláusula final requiere suplir el predicado omitido en el ge'ez y en el inglés auditado. "Era estéril" es la forma más directa y fiel para describir un estado permanente o característico.
- source_word: (omitted predicate supplied)
