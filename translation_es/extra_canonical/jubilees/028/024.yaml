  text: y ella le dio a Jacob un hijo, y él le puso por nombre Rubén, el día catorce del mes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወወለደት
  english_pob_choice: and she bore
  chosen_spanish: y ella dio a luz
  alternatives_spanish:
  - y ella parió
  - y ella tuvo
  lexicon: no entry number
  rationale: La forma ge'ez es verbal y femenina singular; «dio a luz» expresa bien el acto de alumbrar en español contemporáneo sin volverlo demasiado coloquial.
- source_word: ለያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - Jacob
  - para Jacob
  lexicon: no entry number
  rationale: La construcción española con objeto indirecto o directo según estilo puede sonar natural como «a Jacob»; mantiene la dirección del nacimiento sin añadir materia ajena al texto.
- source_word: ጸውዐ
  english_pob_choice: he called
  chosen_spanish: él llamó
  alternatives_spanish:
  - llamó
  - y llamó
  lexicon: no entry number
  rationale: El audit trail corrige el inglés para reflejar que el verbo ge'ez es tercera persona masculina singular. En español se conserva explícitamente el sujeto «él» para evitar ambigüedad.
- source_word: ስሞ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su nombre
  lexicon: no entry number
  rationale: «Su nombre» corresponde al uso bíblico habitual y es fiel al posesivo del original.
- source_word: ሮቤል
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Rubén
  lexicon: no entry number
  rationale: Se usa la forma española establecida del nombre propio bíblico.
- source_word: አመ፡ ዐሡሩ
  english_pob_choice: on the fourteenth day
  chosen_spanish: en el día catorce
  alternatives_spanish:
  - el día catorce
  lexicon: no entry number
  rationale: La expresión temporal se vierte de manera idiomática en español, preservando el numeral y el carácter calendárico.
- source_word: ወረቡዑ
  english_pob_choice: of the month
  chosen_spanish: del mes
  alternatives_spanish:
  - del mes
  lexicon: no entry number
  rationale: Se sigue el texto crítico ge'ez, que omite «ninth». El español no introduce una especificación no atestiguada.
theological_decisions:
- issue: Identidad del sujeto que pone el nombre
  english_pob_reading: and he called his name Reuben
  chosen_spanish_reading: y él llamó su nombre Rubén
  alternative_spanish_readings:
  - y llamó su nombre Rubén
  rationale: El audit trail indica que el sujeto explícito es masculino; por eso se mantiene «él» para reflejar que Jacob es quien nombra, no la madre.
  doctrine_reference: Fidelidad textual al sujeto verbal del testimonio fuente.
- issue: Especificación calendárica del mes
  english_pob_reading: on the fourteenth day of the month
  chosen_spanish_reading: en el día catorce del mes
  alternative_spanish_readings:
  - en el día catorce del noveno mes
  rationale: La revisión crítica señala que el ge'ez dado sólo dice «del mes», aunque algunas variantes manuscritas añaden «noveno». Se evita importar la variante no presente en el texto base.
  doctrine_reference: Crítica textual y preservación de variantes sin imponer una lectura secundaria.
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica principal del audit trail: el sujeto de «called» es masculino (él llamó), y se siguió el texto ge''ez crítico que dice simplemente «del mes», no «del noveno mes».'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con sintaxis natural en español.
  - Se evitó el uso de «SEÑOR» u այլ terminología no pertinente porque el verso no contiene el Tetragrámaton ni vocabulario cristológico.
  - No se añadieron notas al pie para evitar marcadores no anclados en el texto.
