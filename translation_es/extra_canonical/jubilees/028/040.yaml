translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde 'of the seventh month' a 'in the seventh month' por naturalidad y eliminó la redundancia 'and was not bearing,' porque el original ya expresa el cese de la fecundidad. La versión española sigue esa lectura revisada y no reintroduce la redundancia.
  spanish_consistency_notes:
  - Se mantiene «Lea» en lugar de «Lía» para consistencia interna con una transliteración llana y ampliamente legible en español, aunque la forma tradicional también es posible.
  - No se añade puntuación interpretativa más allá de la coordinación básica del segmento conservado.
