lexical_decisions:
- source_word: ለወርኅ፡ ሳብዕ፡
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - del séptimo mes
  lexicon: source temporal phrase
  rationale: El ge'ez marca una referencia temporal simple; «en el séptimo mes» conserva la relación locativa-temporal que adoptó la POB en inglés y suena natural en español.
- source_word: በካልእ፡ ዓም፡ ዘሱባዔ፡ ራብዕ።
  english_pob_choice: in the second year of the fourth week
  chosen_spanish: en el segundo año de la cuarta semana
  alternatives_spanish:
  - durante el segundo año de la cuarta semana
  lexicon: source temporal phrase
  rationale: La estructura cronológica del pasaje se mantiene de forma directa; «año» y «semana» reflejan el cómputo del texto sin añadir interpretación.
- source_word: ርእየት፡ ልያ፡
  english_pob_choice: Leah saw
  chosen_spanish: Lea vio
  alternatives_spanish:
  - cuando Lea se dio cuenta
  lexicon: verb of perception
  rationale: El verbo indica percepción visual/constatación; «vio» reproduce esa observación sin intensificarla a inferencia psicológica.
- source_word: ከመ፡ አቀመት፡⁵⁵ ወኢትወልድ፡
  english_pob_choice: that she had ceased bearing
  chosen_spanish: que había dejado de dar a luz
  alternatives_spanish:
  - que había cesado de parir
  - que ya no estaba dando a luz
  lexicon: verb phrase for childbearing
  rationale: El ge'ez expresa el cese de la acción de dar a luz; «dejar de dar a luz» conserva el aspecto resultativo sin introducir una formulación demasiado técnica o arcaica. El inglés revisado eliminó la redundancia «and was not bearing,» porque el origen ya incluye la idea de cese.
theological_decisions:
- issue: Cronología patriarcal y calendario de semanas
  english_pob_reading: in the seventh month, in the second year of the fourth week
