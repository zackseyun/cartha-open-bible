translation:
  language: es
  text: Él estaba a tres días de camino de distancia[a]. Y Jacob vio que Labán había ido a esquilar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estaba a tres días de camino de él»; también: «de él, un viaje de tres días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ሀሎ፡ እምኔሁ፡ ... ምሕዋረ፡ ሠሉስ፡ ዕለት።
  english_pob_choice: He was a three days' journey from him.
  chosen_spanish: Él estaba a tres días de camino de él
  alternatives_spanish:
  - Estaba a tres días de camino de él
  - Quedaba a tres días de camino de él
  lexicon: estar / camino / día
  rationale: El ge'ez abre con una forma verbal de existencia/estado (ሀሎ), por lo que en español conviene explicitar el verbo «estaba» para no convertir la primera cláusula en un fragmento. «A tres días de camino» conserva la medida de distancia idiomática del original y del inglés auditado.
- source_word: ወርእየ፡ ያዕቆብ፡
  english_pob_choice: And Jacob saw
  chosen_spanish: Y Jacob vio
  alternatives_spanish:
  - Entonces Jacob vio
  - Y Jacob se dio cuenta
  lexicon: ver
  rationale: El verbo básico de percepción visual es suficiente y fiel al original. «Vio» mantiene la sencillez narrativa del texto.
- source_word: ከመ፡ የሐውር፡ ላባ፡ ይቅርጽ፡
  english_pob_choice: that Laban had gone to shear.
  chosen_spanish: que Labán había ido a esquilar
  alternatives_spanish:
  - que Labán había ido a trasquilar
  - que Labán había salido a esquilar
  lexicon: esquilar / trasquilar
  rationale: El audit trail en inglés usa «shear», un verbo pastoril concreto. «Esquilar» es el equivalente más directo y transparente en español bíblico moderno; «trasquilar» es posible, pero menos común en registro general.
theological_decisions:
- issue: Distancia expresada como itinerario, no como medida abstracta
  english_pob_reading: He was a three days' journey from him.
  chosen_spanish_reading: Él estaba a tres días de camino de él
  alternative_spanish_readings:
  - Él estaba a tres jornadas de él
  - Él estaba a una distancia de tres días de camino de él
  rationale: 'No hay un matiz doctrinal directo, pero sí una decisión de fidelidad conceptual: la expresión comunica distancia recorrible y no una cifra abstracta. Se conserva la formulación idiomática del texto fuente.'
  doctrine_reference: Ninguno; decisión de estilo y semántica narrativa.
translation_notes:
  revision_awareness: El texto ge'ez inicia con ሀሎ ('era/estaba'), que en el auditor textual motivó corregir un arranque fragmentario en inglés. La versión española refleja esa lectura explícita con «estaba», manteniendo la clausula completa y natural. También se conserva el orden narrativo de dos enunciados breves, como en el inglés revisado y el original.
  spanish_consistency_notes:
  - Se mantiene «Labán» para el personaje, conforme al uso bíblico estándar en español.
  - Se usa «esquilar» para reflejar el acto pastoril concreto del original y del inglés POB.
  - La primera cláusula se formula como oración completa para respetar la revisión gramatical del auditor inglés.
