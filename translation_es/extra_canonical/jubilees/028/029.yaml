    changes_summary: Removed the unnecessary initial conjunction after 'Leah' for natural English, corrected the subject from 'he called' to 'she called' to match the feminine verbs, and retained the temporal phrase.
translation:
  language: es
  text: Lea concibió y dio a luz un tercer hijo, y él lo llamó[a] Leví, el primer día del primer mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «él llamó su nombre Leví».
    reason: Preserva la formulación más literal del original, aunque en español principal se usa una redacción más natural.
lexical_decisions:
- source_word: ወፀንሰት / conceived
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  lexicon: concebir
  rationale: El verbo ge'ez expresa concepción; en español bíblico actual, «concibió» reproduce con naturalidad y precisión el sentido sin añadir matices clínicos.
- source_word: ወወለደት / bore
  english_pob_choice: bore
  chosen_spanish: le dio a luz
  alternatives_spanish:
  - dio a luz
  - parió
  lexicon: dar a luz
  rationale: La idea es el parto; «le dio a luz» mantiene claridad natural y conserva el objeto indirecto implícito del texto.
- source_word: ወልደ፡ ሣልሰ / third son
  english_pob_choice: a third son
  chosen_spanish: un tercer hijo
  alternatives_spanish:
  - un tercer varón
  - un tercer hijo varón
  lexicon: tercero
  rationale: «Hijo» sigue el uso genealógico de la fuente y del relato bíblico; «tercer hijo» refleja el orden sin sobreespecificar género más allá de lo necesario.
- source_word: ወጸውዐ / called
  english_pob_choice: he called
  chosen_spanish: él llamó
  alternatives_spanish:
  - ella llamó
  lexicon: llamar
  rationale: Se conserva el sujeto masculino exigido por el verbo ge'ez y por el estado de revisión auditable; no se armoniza indebidamente con las formas femeninas anteriores.
- source_word: ስሞ / his name
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: nombre
  rationale: En español, «su nombre» es la forma natural para el nombre impuesto; el poseedor se infiere del contexto sin ambigüedad.
- source_word: ሌዊ / Levi
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Leví
  rationale: Se adopta la forma acentuada «Leví», común en español bíblico y coherente con la pronunciación llana en español.
- source_word: በሠርቅ፡ ወርኅ፡ / on the first day of the first month
  english_pob_choice: on the first day of the first month
  chosen_spanish: en el primer día del primer mes
  alternatives_spanish:
  - el primer día del primer mes
  - al primer día del primer mes
  lexicon: primero
  rationale: La revisión inglesa descarta la doble lectura temporal («at dawn»). El ge'ez aquí se entiende como fecha calendárica; por eso se traduce con una expresión directa y no con «amanecer».
theological_decisions:
- issue: Referencia temporal de በሠርቅ ወርኅ
  english_pob_reading: on the first day of the first month
  chosen_spanish_reading: en el primer día del primer mes
  alternative_spanish_readings:
  - al primer día del primer mes
  - en la aurora del primer día
  rationale: La auditoría textual indica que «at dawn» era una sobrelectura y que la frase ge'ez apunta al primer día/mes. Se evita introducir una imagen devocional de aurora que el texto no obliga a sostener.
  doctrine_reference: cronología narrativa
translation_notes:
  revision_awareness: La base inglesa fue revisada para corregir el sujeto de «called» a «he called» y para eliminar la doble traducción temporal («at dawn, on the first day» -> «on the first day»). La versión española sigue esa lectura revisada y evita retroceder a la interpretación descartada.
  spanish_consistency_notes:
  - Se mantiene el nombre propio como «Leví» y no «Levi» para concordar con el uso bíblico estándar en español.
  - Se conserva la referencia masculina de «él llamó», aun cuando las formas inmediatamente anteriores son femeninas, porque el audit trail ge'ez la respalda.
  - La frase temporal se formula de modo calendárico y sobrio, sin añadir «amanecer» ni duplicar la idea de día/aurora.
