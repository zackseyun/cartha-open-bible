lexical_decisions:
- source_word: በምድርነ፡
  english_pob_choice: in our land
  chosen_spanish: en nuestra tierra
  alternatives_spanish:
  - en nuestra tierra natal
  - en nuestra tierra/país
  lexicon: land
  rationale: El ge'ez expresa una localización colectiva con posesivo de primera persona plural; "en nuestra tierra" conserva la referencia territorial y el matiz de pertenencia de forma natural en español.
- source_word: ውሂበ፡
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - entregar
  - conceder
  lexicon: give
  rationale: El infinitivo simple "dar" reproduce el acto de otorgar/preferir un lugar o trato sin añadir formalidad o carga jurídica no explícita en el texto.
- source_word: እንተ፡ ትንእስ፡ እምእንተ፡ ትልህቅ።
  english_pob_choice: the younger before the elder
  chosen_spanish: al menor antes que al mayor
  alternatives_spanish:
  - al más joven antes que al mayor
  - al menor antes que al anciano
  lexicon: younger/elder
  rationale: La oposición de edad/precedencia se expresa de modo idiomático en español con "menor/mayor". "Mayor" mantiene el contraste jerárquico; "al más joven" es posible, pero "menor" preserva mejor la brevedad y el paralelismo del original.
- source_word: ወአኮ፡ ርቱዐ፡ ለገቢረ፡ ዝንቱ፡
  english_pob_choice: and it is not right to do this
  chosen_spanish: y no es correcto hacer esto
  alternatives_spanish:
  - y no es justo hacer esto
  - y no está bien hacer esto
  lexicon: not right / do this
  rationale: '"No es correcto" conserva el juicio normativo sin desplazarlo hacia una categoría exclusivamente moral o legal. "Hacer esto" mantiene la deíxis del original.'
