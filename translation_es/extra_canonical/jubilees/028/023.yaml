translation:
  language: es
  text: Y amó más a Raquel que a Lea, porque Lea le había sido dada. Y Yahvé abrió el vientre de Lea, y concibió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: YHWH / LORD
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: YHWH
  rationale: Se usa el nombre divino explícito según la política del proyecto; el inglés POB máscara el nombre, pero el texto fuente y la norma del encargo piden 'Yahvé'.
- source_word: opened ... womb
  english_pob_choice: opened Leah’s womb
  chosen_spanish: abrió el vientre de Lea
  alternatives_spanish:
  - abrió la matriz de Lea
  - abrió el seno de Lea
  lexicon: רחם / μήτρα
  rationale: '''Vientre'' comunica de forma natural y digna la imagen corporal del hebreo/gee''z sin volverlo clínico; ''matriz'' es posible pero algo más arcaico en español general.'
- source_word: conceived
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - engendró
  lexicon: הריון / κυέω
  rationale: '''Concibió'' es preciso, sobrio y fiel; evita una paráfrasis más explicativa que el original no exige.'
- source_word: because Leah had been given to him
  english_pob_choice: because Leah had been given to him
  chosen_spanish: porque Lea le había sido dada
  alternatives_spanish:
  - porque le habían dado a Lea
  - porque Lea le había sido entregada
  lexicon: נתן / δοθῆναι
  rationale: La pasiva conserva la idea de que Lea fue entregada/ dada a Jacob sin añadir un marco interpretativo como 'en intercambio' o 'en matrimonio' que no aparece en la fuente.
- source_word: he loved Rachel more than Leah
  english_pob_choice: he loved Rachel more than Leah
  chosen_spanish: lo amó más a Raquel que a Lea
  alternatives_spanish:
  - amó más a Raquel que a Lea
  - amó a Raquel más que a Lea
  lexicon: אהב / ἀγαπάω
  rationale: Se mantiene la comparación explícita y el sujeto implícito del contexto narrativo. La colocación 'lo amó' refleja el antecedente masculino del relato sin añadir un pronombre innecesario al nombre propio en la misma cláusula.
theological_decisions:
- issue: Name of God in a quotation/allusion where English POB says LORD
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El proyecto exige recuperar el nombre divino cuando la fuente alude al Tetragrámaton; no hay razón contextual para sustituirlo por una máscara devocional en español.
  doctrine_reference: project terminology default for יהוה / YHWH
translation_notes:
  revision_awareness: La revisión reciente corrigió una truncación y restableció el inicio de la cláusula sobre el amor de Jacob por Raquel; el español refleja esa forma completa, sin el añadido no sustentado 'en intercambio'.
  spanish_consistency_notes:
  - 'Se conserva la secuencia narrativa completa: amor comparativo, causalidad por la entrega de Lea, apertura del vientre y concepción.'
  - No se introduce 'matrimonio' ni 'intercambio'; la causalidad queda limitada a 'porque Lea le había sido dada'.
  - El nombre divino se rinde como 'Yahvé' de manera consistente con la política del proyecto.
