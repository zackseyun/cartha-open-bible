translation:
  language: es
  text: 'José, Jacob dijo a Labán: «Entrégame a mis esposas y a mis hijos, y yo iré a mi padre Isaac, y haré»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y haré». El ge'ez conserva aquí un verbo final sin objeto explícito en este segmento.
    reason: textual_variant
lexical_decisions:
- source_word: ዮሴፍ / Joseph
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José, Jacob dijo...
  lexicon: Jose/José
  rationale: El texto ge'ez conserva solo el nombre José al inicio del segmento; no añade la cláusula temporal interpolada. En español se mantiene el nombre propio con la forma estándar «José».
- source_word: ሀበኒ / give me
  english_pob_choice: Give me
  chosen_spanish: Entrégame
  alternatives_spanish:
  - Dame
  - Concédeme
  lexicon: dar / entregar
  rationale: «Entrégame» expresa con claridad la petición directa y resulta idiomático en español bíblico moderno sin perder el valor imperativo del original.
- source_word: አንስትየየ / my wives
  english_pob_choice: my wives
  chosen_spanish: mis esposas
  alternatives_spanish:
  - mis mujeres
  - mis mujeres legítimas
  lexicon: esposa
  rationale: El ge'ez corresponde a «wives»; «esposas» es la equivalencia natural y precisa en español, sin introducir matices ajenos.
- source_word: ውሉድየ / my children
  english_pob_choice: my children
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis descendientes
  - mi prole
  lexicon: hijo
  rationale: «Hijos» reproduce de forma directa y comprensible el término de parentesco del texto.
- source_word: እሖር ኀበ አቡየ ይስሐቅ / I will go to my father Isaac
  english_pob_choice: I will go to my father Isaac
  chosen_spanish: iré a mi padre Isaac
  alternatives_spanish:
  - iré donde mi padre Isaac
  - iré hacia mi padre Isaac
  lexicon: ir / padre
  rationale: Se conserva el movimiento hacia Isaac con una construcción española natural; «a mi padre Isaac» mantiene el paralelismo del original sin sobreexplicar.
- source_word: ወእግበር / and I will make
  english_pob_choice: and I will make
  chosen_spanish: y haré
  alternatives_spanish:
  - y haré yo
  - y obraré
  - y construiré
  lexicon: hacer
  rationale: El audit trail documenta que el ge'ez dice literalmente «y haré / y me pondré a hacer», no «volveré». Como el segmento queda cortado, se conserva el verbo abierto «haré» sin completar el objeto implícito.
theological_decisions:
- issue: Clausula final incompleta por segmentación textual
  english_pob_reading: and I will make
  chosen_spanish_reading: y haré
  alternative_spanish_readings:
  - y construiré
  - y haré [algo]
  rationale: El testimonio ge'ez termina en un verbo que requiere continuación en el contexto mayor. No se debe cerrar artificialmente con «volveré»; en español se deja el valor verbal abierto para respetar la segmentación y la evidencia textual.
  doctrine_reference: Principio de transparencia textual y respeto al alcance del testimonio manuscrito; no forzar una armonización por lectura fluida.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrigió la interpolación temporal y se rechazó la lectura revertida «volveré» porque el audit trail posterior documenta que el ge'ez dice ወእግበር, «y haré». La traducción española conserva el segmento literal y deja visible la posible elipsis textual.
  spanish_consistency_notes:
  - Se mantuvo «José» como nombre propio estándar en español.
  - Se evitó «SEÑOR» o equivalentes porque el segmento no contiene el tetragrámaton ni κύριος.
  - «Esposas» y «hijos» reflejan el parentesco directo del original sin amplificaciones interpretativas.
  - La cláusula final se dejó abierta para mostrar la incompletitud del segmento, conforme al aparato crítico y a la revisión más reciente.
