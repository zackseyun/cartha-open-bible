lexical_decisions:
- source_word: አመትየ፡
  english_pob_choice: my maidservant
  chosen_spanish: mi esclava
  alternatives_spanish:
  - mi sierva
  - mi criada
  lexicon: doûlos / domestic servant terminology
  rationale: El contexto requiere un término de dependencia servil; 'esclava' conserva la fuerza léxica que el POB inglés deja visible en 'maidservant' cuando se trata de una sirvienta perteneciente a la casa, sin suavizarlo en 'sierva'.
- source_word: ወትፀንስ፡
  english_pob_choice: and she will conceive
  chosen_spanish: y ella me concebirá
  alternatives_spanish:
  - y concebirá
  - y quedará encinta
  lexicon: concebir / quedar encinta
  rationale: El ge'ez expresa el resultado de concebir en futuro; 'me concebirá' reproduce el objeto indirecto implícito por el contexto narrativo y evita introducir la idea ausente de ir hacia ella.
- source_word: ወትወልድ፡
  english_pob_choice: and bear me a son
  chosen_spanish: y dará a luz un hijo
  alternatives_spanish:
  - y me dará a luz un hijo
  - y parirá un hijo
  lexicon: dar a luz / parir
  rationale: '''Dará a luz'' es claro y digno en español contemporáneo, y mantiene el sentido de alumbramiento sin carga extra. El sujeto ya está claro por el contexto; el objeto ''un hijo'' corresponde al singular del original.'
- source_word: (*ወወሀበት፡ ... ትኩኖ፡ ብእሲተ፡⁵¹)
  english_pob_choice: And she gave Bilhah her maidservant to be his wife
  chosen_spanish: Y dio a Bilhá, su esclava, por esposa
  alternatives_spanish:
  - Y le dio a Bilhá, su esclava, por esposa
  - Y entregó a Bilhá, su esclava, como esposa
  lexicon: dar / por esposa
  rationale: La cláusula añadida por el texto fuente indica la entrega de Bilhá como esposa; 'dar por esposa' es una equivalencia idiomática fiel en español. Se conserva el nombre propio Bilhá con acento español estándar.
theological_decisions:
- issue: La referencia a 'mi esclava' puede suavizarse en español moderno, pero el texto conserva una relación de propiedad/servidumbre relevante para la escena doméstica.
  english_pob_reading: my maidservant
  chosen_spanish_reading: mi esclava
  alternative_spanish_readings:
  - mi sierva
  - mi criada
  rationale: Se mantiene la dureza semántica del original y la transparencia requerida por el proyecto; no se sustituye por 'sierva' sin una razón contextual fuerte.
  doctrine_reference: Lexical transparency / domestic status language
- issue: El texto no contiene la expresión 've con ella' o 'entra a ella'; esa armonización fue retirada en la revisión auditada.
  english_pob_reading: and she will conceive
  chosen_spanish_reading: y ella me concebirá
  alternative_spanish_readings:
  - y concebirá
  rationale: La redacción española evita importar material de Génesis 30:3 y sigue de cerca el ge'ez, preservando la tensión textual documentada por la revisión.
  doctrine_reference: Textual fidelity / anti-harmonization
translation_notes:
  revision_awareness: La revisión más reciente corrigió una armonización indebida con Génesis 30:3 al eliminar 've con ella'; el español sigue esa corrección y se apega al ge'ez, que solo dice que ella concebirá y dará a luz.
  spanish_consistency_notes:
  - Se mantiene 'esclava' para preservar la transparencia léxica del estatus doméstico/servil.
  - Se usa 'Bilhá' con acento adaptado al español; el resto de los nombres propios no requiere ajuste.
  - La puntuación separa las cláusulas como en el sentido del original y del audit trail inglés.
