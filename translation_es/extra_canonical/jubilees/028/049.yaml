  spanish_quality_summary: El texto es claro en general, pero 'su matriz' resulta más clínico que eclesial/lecturable, y 'llamó su nombre' es duro y poco natural para español moderno digno. Conviene mantener la incompletitud final, pero con una formulación española más fiel y legible.
  glossary_alignment: '''Yahvé'' está bien alineado con la política del proyecto para el nombre divino. No hay conflictos con otros términos del glosario. La mejora principal es estilística y fraseológica: ''vientre'' encaja mejor que ''matriz'' en registro bíblico general, y la fórmula de nombre debe reflejar la construcción semítica sin caer en calco ininteligible.'
  issues:
  - severity: medium
    issue: '''su matriz'' suena clínico y menos natural que el registro bíblico esperado'
    rationale: Aunque semánticamente posible para 'womb', en español eclesial amplio 'vientre' suele ser más claro, digno y natural sin perder el sentido corporal.
  - severity: high
    issue: '''y llamó su nombre'' es un calco poco inteligible en español'
    rationale: La fuente y el POB inglés conservan una cláusula truncada, pero el español necesita una formulación que siga siendo legible. 'y llamó su nombre[a]' no es buena prosa española; 'y le puso por nombre[a]' mantiene la idea de imposición de nombre y permite una nota sobre la literalidad/incompletitud.
  revised_spanish_text: Yahvé recordó a Raquel y abrió su vientre, y ella concibió y dio a luz un hijo, y le puso por nombre[a]
  revised_footnotes:
  - marker: a
    text: Literalmente, 'llamó su nombre'. El texto fuente queda incompleto al final, y la traducción conserva esa interrupción en una forma española natural.
    reason: Preservar la fórmula semítica y la cláusula final truncada sin producir un calco oscuro en español.
  revision_rationale: Se ajusta el español para mejorar legibilidad y dignidad litúrgica sin alterar el sentido fuente. 'Vientre' comunica mejor que 'matriz' en registro bíblico general. La cláusula final permanece incompleta como en la fuente, pero se expresa con 'le puso por nombre[a]' y una nota que documenta la literalidad subyacente.
