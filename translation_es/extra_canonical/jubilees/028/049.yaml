base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/028/049.yaml
  text: And the Lord remembered Rachel and opened her womb, and she conceived and bore a son, and she called his name
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:18Z'
    unchanged: false
    changes_summary: Added 'And the Lord remembered Rachel' to account for the omitted subject and verb before 'on Rachel'; retained the final incomplete clause as in the source.
translation:
  language: es
  text: Yahvé recordó a Raquel y abrió su vientre, y ella concibió y dio a luz un hijo, y le puso por nombre[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'llamó su nombre'. El texto fuente queda incompleto al final, y la traducción conserva esa interrupción en una forma española natural.
    reason: Preservar la fórmula semítica y la cláusula final truncada sin producir un calco oscuro en español.
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: יהוה / divine-name rendering
  rationale: El texto ge'ez introduce al sujeto divino; siguiendo la política del proyecto, el nombre divino se vierte como 'Yahvé' y no se oculta con 'el Señor'. Aunque la fuente inglesa usa 'the Lord', el audit trail permite recuperar el nombre implícito sin perder referencia.
- source_word: ለራሔል
  english_pob_choice: Rachel
  chosen_spanish: a Raquel
  alternatives_spanish:
  - Raquel
  lexicon: nombre propio
  rationale: El ge'ez marca el objeto de 'recordó' con destinatario explícito; en español se expresa naturalmente con 'a Raquel' para conservar la relación verbal sin añadir interpretación.
- source_word: አርኀወ
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó de
  - se recordó de
  lexicon: זכר / μιμνῄσκομαι equivalent
  rationale: '''Recordó'' reproduce la acción divina de tomar en cuenta a Raquel con sobriedad y claridad. ''Se acordó de'' es posible, pero ''recordó'' mantiene mejor el tono bíblico y la transitividad del acto.'
- source_word: ማኅፀና
  english_pob_choice: her womb
  chosen_spanish: su matriz
  alternatives_spanish:
  - su vientre
  - su seno
  lexicon: רחם / womb
  rationale: '''Matriz'' conserva la fuerza corporal y bíblica del término, y evita suavizar demasiado la referencia anatómica. ''Vientre'' es comprensible, pero menos preciso para la imagen reproductiva del pasaje.'
- source_word: ፀንሰት
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - concebió en su seno
  lexicon: conceive
  rationale: '''Concibió'' corresponde directamente al verbo de embarazo y mantiene el paralelismo con el griego/semítico implícito sin perífrasis.'
- source_word: ወለደት ወልደ
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y parió un hijo
  - y alumbró un hijo
  lexicon: bear / give birth
  rationale: '''Dar a luz'' es idiomático, digno y fiel al hecho de nacimiento expresado por el texto. ''Parió'' es más fuerte y menos adecuado para un registro de lectura pública.'
- source_word: ወጸውዐት ስሞ
  english_pob_choice: and she called his name
  chosen_spanish: y llamó su nombre
  alternatives_spanish:
  - y le puso por nombre
  - y nombró
  lexicon: name-giving formula
  rationale: Se conserva la fórmula semítica literal del cierre incompleto, tal como la revisión inglesa decidió retenerla. 'Le puso por nombre' es más natural en español, pero atenúa la huella formal del original.
theological_decisions:
- issue: Nombre divino en un pasaje que la fuente inglesa presenta como 'the Lord'
  english_pob_reading: the Lord remembered Rachel
  chosen_spanish_reading: Yahvé recordó a Raquel
  alternative_spanish_readings:
  - el Señor recordó a Raquel
  - Dios recordó a Raquel
  rationale: La política del proyecto exige recuperar el nombre divino cuando el original subyacente lo permite. Aquí el ge'ez abre con el nombre divino, por lo que 'Yahvé' es la lectura más transparente y auditable.
  doctrine_reference: Nomen divinum / Tetragrámaton
- issue: Mantenimiento de la cláusula final incompleta
  english_pob_reading: and she called his name
  chosen_spanish_reading: y llamó su nombre
  alternative_spanish_readings:
  - y le puso por nombre
  - y llamó su nombre a
  rationale: La revisión inglesa conservó la cláusula final inacabada para reflejar el corte del texto fuente. En español se preserva también la incompletitud sintáctica, evitando cerrar artificialmente el versículo.
  doctrine_reference: Fidelidad textual / integridad de la fuente
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail: reintroduce la acción inicial divina (''Yahvé recordó a Raquel'') y mantiene la clausula final incompleta (''y llamó su nombre'') para reflejar el corte del texto ge''ez sin normalizarlo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - Se mantiene 'Raquel' como forma española del nombre propio bíblico.
  - Se conserva la secuencia verbal del original y la cláusula final incompleta, sin añadir el nombre del hijo.
  - El registro es bíblico y público, evitando arcaísmos innecesarios pero preservando la estructura semítica del texto.
