revisions:
- from: Yahvé recordó a Raquel y abrió su matriz, y ella concibió y dio a luz un hijo, y llamó su nombre
  to: Yahvé recordó a Raquel y abrió su vientre, y ella concibió y dio a luz un hijo, y le puso por nombre[a]
  rationale: Se ajusta el español para mejorar legibilidad y dignidad litúrgica sin alterar el sentido fuente. 'Vientre' comunica mejor que 'matriz' en registro bíblico general. La cláusula final permanece incompleta como en la fuente, pero se expresa con 'le puso por nombre[a]' y una nota que documenta la literalidad subyacente.
