translation:
  language: es
  text: 'porque es muy malo.” Y Labán le dijo a Jacob: “Deja pasar los siete días de la fiesta de bodas de esta mujer[a],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «de esta mujer» conserva el demostrativo del original. Se añade «mujer» para evitar una elipsis demasiado abrupta en español, sin cambiar la referencia contextual inmediata.
