lexical_decisions:
- source_word: እኩይ
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - malo
  - perverso
  lexicon: n/a
  rationale: El ge'ez expresa una valoración moral negativa; en español, «malo» comunica de forma natural esa cualidad sin añadir dureza interpretativa excesiva. Se conserva el sentido moral de 'evil' sin imponer un matiz más fuerte que el texto no obliga a fijar.
- source_word: ጥቀ
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sumamente
  - mucho
  lexicon: n/a
  rationale: La revisión más reciente fue corregida porque el ge'ez sí contiene un intensificador. «Muy» reproduce de manera directa y sobria la fuerza adverbial de ጥቀ.
- source_word: ሰቡዐ መዋዕለ ግዝአ
  english_pob_choice: the seven days of this one's marriage feast
  chosen_spanish: los siete días de la fiesta de bodas de esta
  alternatives_spanish:
  - los siete días de la fiesta de su boda
  - los siete días del banquete de bodas de esta
  lexicon: n/a
  rationale: «Fiesta de bodas» mantiene el sustantivo de celebración usado por la POB en inglés y evita una paráfrasis demasiado libre. «De esta» conserva la referencia demostrativa del original, aunque en español suene algo elíptico; la ambigüedad se mantiene porque el pasaje apunta a una referencia cercana en el contexto narrativo.
- source_word: ወይቤ ላባ ለያዕቆብ
  english_pob_choice: And Laban said to Jacob
  chosen_spanish: Y Labán dijo a Jacob
  alternatives_spanish:
  - Y Labán habló a Jacob
  - Y Labán le dijo a Jacob
  lexicon: n/a
  rationale: Se conserva la estructura narrativa simple del original y del audit trail inglés. «Dijo a Jacob» es suficientemente claro y formal; «le dijo a Jacob» sería más idiomático, pero no necesario aquí.
theological_decisions:
- issue: Intensificación moral en la descripción del acto
  english_pob_reading: for it is very evil
  chosen_spanish_reading: porque es muy malo
  alternative_spanish_readings:
  - porque es malo
  - porque es sumamente malo
  rationale: Se preserva la intensificación explícita del ge'ez ጥቀ, evitando debilitar el juicio moral como ocurrió en una revisión anterior del inglés. «Muy malo» refleja el énfasis sin sobrerrepresentarlo.
  doctrine_reference: none
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre incluir y omitir el intensificador 'very'. La revisión más reciente fue corregida por una fuente secundaria que confirma que el ge'ez ጥቀ sí exige un intensificador. Por eso el español mantiene «muy». También se ajustó 'marriage-feast' a 'marriage feast'; en español se refleja con «fiesta de bodas», una forma natural y suficientemente fiel.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; aquí no aparece.
  - Se conserva la referencia nominal «Labán» y «Jacob» para continuidad con el corpus bíblico español.
  - La puntuación reproduce la frase directa y el cierre de cita del segmento disponible; el texto fuente parece cortado al final, por lo que la cláusula queda sin completar.
