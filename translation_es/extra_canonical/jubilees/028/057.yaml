revisions:
- from: Las ovejas parieron según sus especies; y todo el que tenía marcas pertenecía a Jacob, y todo el que no tenía marcas, a Labán.
  to: Las ovejas parieron según sus clases; y todo el que tenía marcas pertenecía a Jacob, y todo el que no tenía marcas pertenecía a Labán.
  rationale: Se ajusta 'según sus especies' a 'según sus clases' para una expresión más natural en español sin alterar el sentido de clasificación del original. También se explicita 'pertenecía' en la última cláusula para reforzar el paralelismo y la claridad.
