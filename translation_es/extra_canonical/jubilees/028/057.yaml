translation:
  language: es
  text: Las ovejas parieron según sus clases; y todo el que tenía marcas pertenecía a Jacob, y todo el que no tenía marcas pertenecía a Labán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አባግዐ / sheep
  english_pob_choice: The sheep
  chosen_spanish: Las ovejas
  alternatives_spanish:
  - Los carneros
  - Las reses
  lexicon: ovejas
  rationale: El sujeto explícito es 'the sheep'; 'ovejas' conserva el referente ovino común y natural en español, sin introducir una especificación no dada por el texto.
- source_word: ይለዳ / bore
  english_pob_choice: bore
  chosen_spanish: parieron
  alternatives_spanish:
  - engendraron
  - dieron a luz
  lexicon: parir
  rationale: En español, 'parieron' comunica el hecho narrativo de dar cría en un registro claro y bíblico, manteniendo la acción física del texto sin volverla abstracta.
- source_word: ዘበአርአያሆን / according to their kinds
  english_pob_choice: according to their kinds
  chosen_spanish: según sus especies
  alternatives_spanish:
  - según sus clases
  - según sus tipos
  lexicon: especie
  rationale: '''Especies'' reproduce con precisión la idea de clasificación o tipo de animal; es la equivalencia más directa y comprensible para el contexto.'
- source_word: ወኵሉ፡ ዘ²⁸ትእምርት / every one with marks
  english_pob_choice: every one with marks
  chosen_spanish: todo el que tenía marcas
  alternatives_spanish:
  - cada uno con marcas
  - todo marcado
  lexicon: marca
  rationale: '''Tenía marcas'' conserva la idea descriptiva de posesión de señales sin forzar una terminología más técnica; el texto contrasta con los que no tenían marcas.'
- source_word: ለያዕቆብ / belonged to Jacob
  english_pob_choice: belonged to Jacob
  chosen_spanish: pertenecía a Jacob
  alternatives_spanish:
  - era de Jacob
  - correspondía a Jacob
  lexicon: pertenecer
  rationale: '''Pertenecía a Jacob'' expresa la asignación/posesión indicada por el contraste del pasaje de manera natural y fiel.'
- source_word: ወዘአልቦ፡ ትእምርት / every one without marks
  english_pob_choice: every one without marks
  chosen_spanish: todo el que no tenía marcas
  alternatives_spanish:
  - cada uno sin marcas
  - todo el que carecía de marcas
  lexicon: marca
  rationale: Mantiene el paralelismo con la primera mitad y reproduce la oposición marcada/no marcada sin añadir interpretaciones.
- source_word: ለላባ / to Laban
  english_pob_choice: to Laban
  chosen_spanish: a Labán
  alternatives_spanish:
  - de Labán
  - pertenecía a Labán
  lexicon: nombre propio
  rationale: La preposición 'a' conserva el valor de asignación/destinación del contraste posesivo del verso en español.
theological_decisions:
- issue: Asignación de propiedad/posesión por marcas
  english_pob_reading: every one with marks belonged to Jacob, and every one without marks to Laban
  chosen_spanish_reading: todo el que tenía marcas pertenecía a Jacob, y todo el que no tenía marcas, a Labán
  alternative_spanish_readings:
  - todo el que tenía marcas era de Jacob, y todo el que no tenía marcas, de Labán
  rationale: No hay carga doctrinal especial, pero sí una estructura de posesión/adscripción que debe mantenerse con claridad; 'pertenecía a' preserva la relación de pertenencia mejor que una simple elipsis.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se corrigió la omisión del sujeto 'the sheep' presente en el ge'ez, que en la revisión anterior había quedado sin traducir. También se evitó mantener la nota al pie heredada del inglés porque no era necesaria para esta sección y no había marcador anclado en el texto español.
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo sobrio y directo.
  - '''Labán'' se escribe con acento según el uso español.'
  - No se introducen notas al pie no ancladas en el texto.
  - La construcción paralela 'todo el que...' se usa para conservar el contraste del original.
