  text: And he went in to her, and she conceived and bore him a son, and he called his name Dan, on the ninth of the month.
  footnotes:
  - marker: a
    text: Or 'she called'.
    reason: previous_rendering
  - marker: b
    text: Or 'in the ninth month'.
    reason: previous_rendering
  revision_pass:
