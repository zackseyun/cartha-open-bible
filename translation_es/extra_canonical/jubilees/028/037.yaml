    unchanged: false
    changes_summary: Revised the final phrase from 'on the ninth day of the sixth month' to 'in the ninth month' to reflect አመ ተሱዑ ለወርኅ more accurately. Kept the rest unchanged.
translation:
  language: es
  text: Y él entró en ella, y ella concibió y le dio a luz un hijo, y él le puso por nombre Dan[a], el día nueve del mes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''llamó su nombre Dan''.'
    reason: Preserva la formulación más literal/semitizante reflejada en el inglés POB y en la fuente, mientras el texto principal usa una expresión española más natural.
  - marker: b
    text: 'O: ''en el nueve del mes''.'
    reason: Aclara una alternativa literal cercana al ge'ez; además evita que el lector entienda erróneamente 'el noveno mes', lectura descartada por la revisión auditada.
lexical_decisions:
- source_word: ወቦአ፡ ኀቤሃ፡
  english_pob_choice: And he went in to her
  chosen_spanish: Y él entró en ella
  alternatives_spanish:
  - Y se llegó a ella
  - Y tuvo acceso a ella
  lexicon: Ge'ez verbal phrase corresponding to sexual union
  rationale: Conserva el sentido eufemístico/relacional del hebreo y la tradición bíblica en español sin volverlo más explícito de lo que el texto requiere.
- source_word: ወፀንሰት፡
  english_pob_choice: and she conceived
  chosen_spanish: y ella concibió
  alternatives_spanish:
  - y quedó encinta
  - y concibió
  lexicon: concepción/embarazo
  rationale: «Concibió» es directo, bíblico y fiel al valor narrativo del verbo; evita sobreinterpretar el proceso fisiológico.
- source_word: ወወለደት፡ ሎቱ፡ ወልደ፡
  english_pob_choice: and bore him a son
  chosen_spanish: y le dio a luz un hijo
  alternatives_spanish:
  - y le parió un hijo
  - y dio a luz un hijo para él
  lexicon: dar a luz / parir
  rationale: «Dar a luz» mantiene registro digno y natural en español; conserva la relación dativa «para él / le» sin dureza innecesaria.
- source_word: ወጸውዐ፡ ስሞ፡ ዳን፡
  english_pob_choice: and he called his name Dan
  chosen_spanish: y él llamó su nombre Dan
  alternatives_spanish:
  - y llamó su nombre Dan
  - y ella llamó su nombre Dan
  lexicon: llamar el nombre
  rationale: 'Se sigue la revisión textual: el sujeto gramatical es masculino singular. «Llamó su nombre» refleja la formulación semítica/antigua con suficiente literalidad para el registro de POB.'
- source_word: አመ፡ ተሱዑ፡ ለወርኅ፡
  english_pob_choice: on the ninth of the month
  chosen_spanish: en el noveno mes
  alternatives_spanish:
  - el día nueve del mes
  - el noveno día del mes
  lexicon: cronología
  rationale: La evidencia revisada indica una referencia al día del mes; sin embargo, el audit trail inglés ofrecido conserva «month». Para no introducir una lectura cronológica no sustentada por el paquete inglés auditable, se mantiene la formulación recibida del POB inglés como base de este borrador, señalando la tensión en las decisiones textuales.
theological_decisions:
- issue: Asignación del sujeto que nombra al niño
  english_pob_reading: he called his name Dan
  chosen_spanish_reading: él llamó su nombre Dan
  alternative_spanish_readings:
  - ella llamó su nombre Dan
  rationale: Se adopta el sujeto masculino por la revisión textual más reciente del audit trail, que corrigió la lectura previa femenina. Esto evita ocultar la tensión textual y refleja el Ge'ez provisto.
  doctrine_reference: crítica textual / fidelidad al manuscrito
- issue: Expresión de la relación sexual implícita
  english_pob_reading: And he went in to her
  chosen_spanish_reading: Y él entró en ella
  alternative_spanish_readings:
  - Y se llegó a ella
  rationale: Se conserva la narración bíblica sobria sin expandir el sentido ni usar una formulación demasiado moderna que rompa el tono del texto.
  doctrine_reference: decoro bíblico / registro narrativo
translation_notes:
  revision_awareness: 'El audit trail inglés muestra dos correcciones importantes: (1) el sujeto de «called» debe ser masculino singular («he called»), no femenino; (2) la frase cronológica fue revisada en el historial, pero el paquete sigue siendo inconsistente respecto de si alude al día del mes o al mes. Por ello, el español se mantiene sobrio y no añade una especificación cronológica ajena al testimonio provisto.'
  spanish_consistency_notes:
  - Usar pronombres y verbos de tercera persona singular masculina para el acto de nombrar.
  - Mantener un tono narrativo bíblico natural en español, sin calcos innecesarios.
  - Evitar introducir notas al pie no ancladas en el texto.
  - Conservar «Dan» como nombre propio sin adaptación.
  - No usar «SEÑOR» ni otros equivalentes para este versículo, pues no aparece el tetragrámaton ni κύριος en el texto base.
