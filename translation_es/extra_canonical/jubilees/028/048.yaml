base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/028/048.yaml
  text: And a daughter was born, whose name was Dinah, in the seventh month, in the seventh year of the sixth week of the fourth jubilee. And He had mercy on her,
  footnotes:
  - marker: a
    text: Or 'And Dinah was born to him'.
    reason: previous_rendering
  - marker: b
    text: Or 'And she had mercy,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:19Z'
    unchanged: false
    changes_summary: Replaced the inaccurate and unnatural opening ('and the daughter’s name Dinah') with 'And Dinah was born to him' to reflect the birth verb. Removed 'the LORD' since it is not present in the Geez. Rendered the final clause more literally from the draft source as 'And she had mercy,' though the clause appears textually difficult/incomplete.
translation:
  language: es
  text: Y nació una hija, cuyo nombre fue Dina, en el séptimo mes, en el séptimo año de la sexta semana del cuarto jubileo. Y él tuvo misericordia de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወለወለት / ወተወልደት
  english_pob_choice: And a daughter was born
  chosen_spanish: Y nació una hija
  alternatives_spanish:
  - Y fue nacida una hija
  - Y le nació una hija
  lexicon: nacer / dar a luz
  rationale: El verbo ge'ez expresa un nacimiento pasivo; en español natural y fiel, 'nació una hija' comunica el hecho sin introducir un sujeto no atestiguado.
- source_word: ስማ
  english_pob_choice: whose name was Dinah
  chosen_spanish: cuyo nombre fue Dina
  alternatives_spanish:
  - de nombre Dina
  - y su nombre era Dina
  lexicon: nombre
  rationale: La frase nominal marca el nombre de la recién nacida; 'cuyo nombre fue Dina' mantiene la estructura relativa sin añadir información.
- source_word: በሳብዕ ወርኅ
  english_pob_choice: in the seventh month
  chosen_spanish: en el séptimo mes
  alternatives_spanish:
  - durante el séptimo mes
  lexicon: mes
  rationale: Coincide de forma directa con el valor temporal del original.
- source_word: ዘሳብዕ ዓመት
  english_pob_choice: in the seventh year
  chosen_spanish: en el séptimo año
  alternatives_spanish:
  - durante el séptimo año
  lexicon: año
  rationale: La secuencia cronológica se conserva en español de manera literal y legible.
- source_word: ዘሳድስ ሱባዔ ዘራብዕ
  english_pob_choice: of the sixth week of the fourth jubilee
  chosen_spanish: de la sexta semana del cuarto jubileo
  alternatives_spanish:
  - de la sexta semana del cuarto jubileo [a]
  lexicon: semana / jubileo
  rationale: '''Semana'' y ''jubileo'' corresponden al sistema cronológico propio del texto; se conserva la terminología técnica sin paraphrasear.'
- source_word: ወተሣሀላ
  english_pob_choice: And He had mercy on her
  chosen_spanish: Y él tuvo misericordia de ella
  alternatives_spanish:
  - Y tuvo compasión de ella
  - Y él se compadeció de ella
  lexicon: misericordia / compasión
  rationale: La revisión textual indica sujeto masculino singular y objeto femenino singular; en español, 'tuvo misericordia de ella' refleja esa relación con claridad y mantiene el paralelo bíblico sin introducir el Nombre divino, que no está en el ge'ez.
theological_decisions:
- issue: Identidad del sujeto en la cláusula final
  english_pob_reading: And He had mercy on her
  chosen_spanish_reading: Y él tuvo misericordia de ella
  alternative_spanish_readings:
  - Y Dios tuvo misericordia de ella
  - Y él se compadeció de ella
  rationale: El testimonio de revisión afirma que el verbo ge'ez es de tercera persona masculina singular con objeto femenino singular; por eso se traduce con sujeto explícito masculino indefinido ('él') para no añadir un referente no presente en el segmento. Dado el contexto narrativo, puede aludir a Dios, pero el texto aquí no lo nombra.
  doctrine_reference: Fidelidad textual y prudencia referencial en pasajes con sujeto elíptico o no explícito.
translation_notes:
  revision_awareness: Se corrigió el problema previo de anclaje eliminando toda nota sin marcador en el texto. También se siguió la revisión más reciente que rechaza 'And Dinah was born to him' por omitir ስማ y favorece la lectura con nombre explícito, además de aceptar la cláusula final masculina singular con objeto femenino singular.
  spanish_consistency_notes:
  - Se usa 'Dina' para el nombre propio, conforme al uso español establecido.
  - Se mantiene 'jubileo' como término técnico del sistema cronológico del libro.
  - No se introduce 'SEÑOR' ni 'Yahvé' porque el ge'ez de este versículo no contiene el Nombre divino; la cláusula final se deja con sujeto 'él' para respetar la ambigüedad/referencia abierta del original.
