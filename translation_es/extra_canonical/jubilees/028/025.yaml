lexical_decisions:
- source_word: ታስዕ
  english_pob_choice: the ninth
  chosen_spanish: el noveno
  alternatives_spanish:
  - el noveno mes
  - nueve
  lexicon: none
  rationale: El ge'ez aporta el ordinal “ninth”; como el contexto segmentario sugiere una referencia temporal abreviada, se conserva en español como “el noveno” sin añadir “mes” en el texto principal. La adición alternativa queda implícita solo como posibilidad contextual, no como inserción no atestiguada.
- source_word: በቀዳሚ ዓመት ዘሱባዔ ሣልስ
  english_pob_choice: in the first year of the third week
  chosen_spanish: en el primer año de la tercera semana
  alternatives_spanish:
  - durante el primer año de la tercera semana
  - en el año primero de la tercera semana
  lexicon: none
  rationale: Se mantiene la estructura cronológica del Jubileo con “tercera semana”, que es la forma transparente y fiel para la unidad técnica del calendario del libro.
- source_word: ወማሕጸናሰ
  english_pob_choice: Rachel’s womb was closed
  chosen_spanish: el vientre de Raquel estaba cerrado
  alternatives_spanish:
  - el seno de Raquel estaba cerrado
  - la matriz de Raquel estaba cerrada
  lexicon: none
  rationale: “Vientre” comunica con claridad el sentido corporal del hebraísmo en español moderno. “Matriz” es más técnico, pero menos natural; “seno” es más ambiguo.
- source_word: ርእየ
  english_pob_choice: he saw
  chosen_spanish: él vio
  alternatives_spanish:
  - vio
  - él había visto
  lexicon: none
  rationale: Se traduce el verbo final de manera directa para reflejar la conclusión sintáctica del segmento. Se conserva el sujeto explícito para evitar ambigüedad en español.
theological_decisions:
- issue: 'Referencia temporal fragmentaria: “the ninth” puede ser un resto de una unidad mayor desplazada por la segmentación'
  english_pob_reading: the ninth, in the first year of the third week
  chosen_spanish_reading: el noveno, en el primer año de la tercera semana
  alternative_spanish_readings:
  - el noveno mes, en el primer año de la tercera semana
  - en el primer año de la tercera semana
  rationale: Dado que el auditor revisó que ታስዕ corresponde a “ninth” y que la segmentación puede haber separado una unidad mayor, se conserva el ordinal sin completar con “mes” en el texto principal. Así se evita inventar un sustantivo no presente en el segmento, pero se mantiene la tensión textual documentada.
  doctrine_reference: Principio de fidelidad textual y cautela ante fragmentos segmentados; no aplica una doctrina específica.
- issue: 'Cláusula final incompleta en el inglés auditado: “because he saw”'
  english_pob_reading: because he saw
  chosen_spanish_reading: porque él vio
  alternative_spanish_readings:
  - porque vio
  - porque él había visto
  rationale: Se refleja la cláusula final como quedó en la revisión del audit trail, sin expandirla más allá del verbo atestiguado por el ge'ez. La traducción no intenta resolver el objeto omitido.
  doctrine_reference: Principio de no expansión interpretativa fuera del testimonio textual.
translation_notes:
  revision_awareness: 'La versión española toma en cuenta dos revisiones del audit trail: la adición de “he saw” para reflejar el verbo final ርእየ, y la corrección de “the ninth” a partir de ታስዕ. Por eso el texto conserva el ordinal inicial y completa la cláusula final con un verbo simple y directo.'
  spanish_consistency_notes:
  - Se evita “SEÑOR” porque este segmento no contiene el Tetragrámaton ni un κύριος contextual.
  - Se mantiene “Raquel” como forma española estándar y no se introduce ninguna glosa doctrinal.
  - Se usa puntuación que reproduce una coordinación adversativa simple entre la datación y la observación final.
