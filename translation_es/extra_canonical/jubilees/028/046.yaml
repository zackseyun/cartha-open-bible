translation:
  language: es
  text: en el quinto mes, en el cuarto año de la cuarta semana. Y lo entregó a una nodriza. Y Jacob volvió a entrar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለኃምስ፡ ወርኅ፡
  english_pob_choice: in the fifth month
  chosen_spanish: en el quinto mes
  alternatives_spanish:
  - del quinto mes
  lexicon: mes
  rationale: El ge'ez expresa ubicación temporal con la preposición correspondiente; el inglés POB ya resolvió la frase como 'in the fifth month', y en español la forma natural y fiel es 'en el quinto mes'.
- source_word: በዓመት፡ ራብዕ፡ ዘሱባዔ፡ ራብዕ፡
  english_pob_choice: in the fourth year of the fourth week
  chosen_spanish: en el cuarto año de la cuarta semana
  alternatives_spanish:
  - en el cuarto año de la cuarta septena
  - en el cuarto año de la cuarta semana
  lexicon: año; semana
  rationale: Se conserva la estructura cronológica del original y del POB inglés. 'Semana' comunica mejor al lector general que una posible calca técnica como 'septena', sin perder el valor de unidad de siete.
- source_word: ወወሀበተ፡ ለሐፂኒት።
  english_pob_choice: And she gave him to a nurse.
  chosen_spanish: Y lo entregó a una nodriza.
  alternatives_spanish:
  - Y se lo entregó a una nodriza.
  - Y lo dio a una nodriza.
  lexicon: nodriza
  rationale: '''Nodriza'' preserva el sentido de una mujer que amamanta o cuida a un niño. ''Entregar'' refleja el acto de poner al niño bajo su cuidado sin añadir detalles inexistentes.'
- source_word: ወቦአ፡ ያዕቆብ፡ ዳግመ፡
  english_pob_choice: And Jacob went in again.
  chosen_spanish: Y Jacob volvió a entrar.
  alternatives_spanish:
  - Y Jacob entró de nuevo.
  - Y Jacob volvió a entrar otra vez.
  lexicon: volver a entrar
  rationale: '''Volvió a entrar'' sigue con precisión el valor aspectual de repetición del ge''ez y mantiene la sobriedad del inglés POB. ''Entró de nuevo'' también sería posible, pero ''volvió a entrar'' suena más natural en español bíblico sin arcaísmo excesivo.'
theological_decisions:
- issue: Cronología por semanas de siete años
  english_pob_reading: in the fourth year of the fourth week
  chosen_spanish_reading: en el cuarto año de la cuarta semana
  alternative_spanish_readings:
  - en el cuarto año de la cuarta septena
  rationale: El pasaje usa el sistema jubilar de semanas. Se mantiene 'semana' para no oscurecer el esquema cronológico, aunque el contexto implica una semana de años; esta tensión queda en el texto sin sobreexplicación.
  doctrine_reference: Cronología jubilar / calendario de Jubileos
- issue: Identidad de la 'nurse'
  english_pob_reading: a nurse
  chosen_spanish_reading: una nodriza
  alternative_spanish_readings:
  - una criada que lo cuidara
  - una ama de cría
  rationale: '''Nodriza'' es el término más preciso y tradicional para la función de cuidado infantil con posible lactancia. Evita ''enfermera'', que sería anacrónico y ajeno al contexto antiguo.'
  doctrine_reference: Contexto doméstico antiguo en narrativa de Jubileos
translation_notes:
  revision_awareness: La revisión inglesa solo afinó la preposición inicial ('of' -> 'in') y añadió puntuación final. La versión española ya refleja ese ajuste con 'en el quinto mes' y puntuación completa, sin introducir cambios interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo breve y paratáctico del original, con tres oraciones coordinadas por 'Y'.
  - No se usa 'SEÑOR' ni terminología eclesiástica ajena al texto; el versículo no contiene el Nombre divino.
  - '''Nodriza'' y ''volvió a entrar'' buscan equilibrio entre fidelidad semántica y lectura natural en español contemporáneo.'
