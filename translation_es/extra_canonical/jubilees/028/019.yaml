translation:
  language: es
  text: y también te daré a Raquel, si me sirves otros siete años y pastoreas mis ovejas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እሁበከ፡ ራሔልሃ፡
  english_pob_choice: I will give you Rachel also
  chosen_spanish: también te daré a Raquel
  alternatives_spanish:
  - y te daré también a Raquel
  - además te daré a Raquel
  lexicon: dar
  rationale: El etíope expresa la promesa de entregar/dar a Raquel; en español, «te daré a Raquel» conserva la fuerza relacional de la frase sin añadir interpretación.
- source_word: ከመ፡ ትትቀነይ፡
  english_pob_choice: if you will serve me
  chosen_spanish: si me sirves
  alternatives_spanish:
  - si me servirás
  - si tú me sirves
  lexicon: servir
  rationale: La lectura inglesa entiende un servicio personal hacia Labán. «Me sirves» es natural en español y preserva la condición verbal sin sobrecargar el futuro.
- source_word: ካልአነ፡ ዓመተ፡ ሰብዐተ፡
  english_pob_choice: another seven years
  chosen_spanish: otros siete años
  alternatives_spanish:
  - siete años más
  - otro período de siete años
  lexicon: año
  rationale: «Otros siete años» reproduce el valor aditivo de «another seven years» con fluidez en español.
- source_word: ከመ፡ ትርዐይ፡ አባግዐየ፡
  english_pob_choice: and pasture my sheep
  chosen_spanish: y pastoreas mis ovejas
  alternatives_spanish:
  - y apacientas mis ovejas
  - y cuidas mis ovejas
  lexicon: pastorear
  rationale: El verbo etíope corresponde a la acción de apacentar/pastorear el rebaño; «pastoreas mis ovejas» mantiene el paralelismo con el inglés POB y el sentido pastoral concreto.
theological_decisions:
- issue: Relación entre la promesa de Raquel y el servicio adicional
  english_pob_reading: I will give you Rachel also, if you will serve me another seven years and pasture my sheep
  chosen_spanish_reading: también te daré a Raquel, si me sirves otros siete años y pastoreas mis ovejas
  alternative_spanish_readings:
  - también te daré a Raquel, si me sirves otros siete años, mientras pastoreas mis ovejas
  rationale: La revisión inglesa eliminó «while» para evitar una mera simultaneidad. El español sigue esa decisión con una coordinación simple entre las acciones exigidas, sin introducir una relación temporal restrictiva no presente en la revisión final.
  doctrine_reference: No aplica; es una decisión de sintaxis y relación aspectual en el relato.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «while you pasture my sheep» a «and pasture my sheep» para reflejar más directamente la secuencia del original; el español adopta la misma coordinación sin marcar simultaneidad.
  spanish_consistency_notes:
  - Se usa «Raquel» como nombre propio estándar en español.
  - Se mantiene el posesivo «mis ovejas» para reflejar el objeto del pastoreo en la fuente y en la traducción inglesa auditada.
  - Se evita «SEÑOR» o lenguaje de título divino porque el versículo no contiene el nombre divino.
