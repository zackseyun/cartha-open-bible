translation:
  language: es
  text: Y le sirvió por su hija Raquel una semana.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወተቀንየ፡ / served
  english_pob_choice: served
  chosen_spanish: le sirvió
  alternatives_spanish:
  - lo sirvió
  - le prestó servicio
  lexicon: Spanish ordinary verbal rendering of servitude/service
  rationale: El ge'ez expresa servicio prestado a él; «le sirvió» conserva la relación de servicio sin añadir matices que el texto no exige.
- source_word: ሎቱ፡ / to him
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: Spanish clitic dative
  rationale: El dativo español natural reproduce el complemento indirecto del original y mantiene la fluidez pública del versículo.
- source_word: ህየንተ፡ / for
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - para
  lexicon: Spanish preposition for transactional service
  rationale: «Por» refleja la idea de compensación o servicio debido en este contexto narrativo; «para» podría sonar más final y menos contractual.
- source_word: ራሔል፡ / Rachel
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Rachel
  lexicon: Spanish biblical proper name
  rationale: En español bíblico estándar, el nombre se adapta como «Raquel», forma transparente y reconocible para lectores en español.
- source_word: ወለቱ፡ / his daughter
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  lexicon: Spanish kinship phrase
  rationale: La revisión inglesa corrigió la omisión de «his daughter»; en español debe preservarse explícitamente para no perder el dato filológico y narrativo.
- source_word: ሱባዔ፡ አሐደ። / one week
  english_pob_choice: one week
  chosen_spanish: una semana
  alternatives_spanish:
  - una semana de años
  - siete años
  lexicon: chronological terminology
  rationale: La revisión textual indica que el término debe leerse literalmente como «una semana», manteniendo la terminología cronológica característica de Jubileos en lugar de normalizarla a «siete años».
theological_decisions:
- issue: 'Terminología cronológica de Jubileos: «week» frente a «seven years»'
  english_pob_reading: for his daughter Rachel one week
  chosen_spanish_reading: una semana
  alternative_spanish_readings:
  - siete años
  - una semana de años
  rationale: La edición auditada corrige la lectura anterior y exige conservar la unidad temporal literal. En Jubileos, «semana» funciona como término técnico del sistema cronológico del libro, y traducirlo por «siete años» borrarían esa señal estructural.
  doctrine_reference: N/A (cronología literaria del libro de Jubileos)
translation_notes:
  revision_awareness: Se siguió la revisión que corrige la omisión de «his daughter» y rechaza la traducción anterior «siete años»; el español refleja la lectura auditada «one week» sin añadir notas innecesarias.
  spanish_consistency_notes:
  - Se usa «Raquel» como forma española bíblica estándar.
  - Se preserva «una semana» para respetar la terminología cronológica propia de Jubileos.
  - No se introdujeron notas al pie porque la lectura corregida es suficientemente clara en el texto principal.
