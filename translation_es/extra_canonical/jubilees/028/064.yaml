translation:
  language: es
  text: con él a la tierra de Canaán, porque les contó todo lo que había visto en un sueño y todo lo que le había sido dicho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ምድረ ከናአን
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - el país de Canaán
  - la región de Canaán
  lexicon: Canaan / land
  rationale: La expresión geográfica natural en español bíblico y moderno es «la tierra de Canaán»; mantiene el valor territorial sin añadir matices no presentes en el geʽez ni en el inglés POB.
- source_word: ርእየ ኵሎ በህልም
  english_pob_choice: everything that he had seen in a dream
  chosen_spanish: todo lo que había visto en un sueño
  alternatives_spanish:
  - todo lo que había visto en visiones
  - todo lo que había soñado
  lexicon: see / dream
  rationale: «Visto en un sueño» conserva la combinación de percepción visual y medio onírico del original, sin convertirlo en «visiones», que sería una especificación no garantizada por el texto.
- source_word: ዘተናገረ ሎቱ
  english_pob_choice: everything that had been spoken to him
  chosen_spanish: todo lo que le había sido dicho
  alternatives_spanish:
  - todo lo que le habían dicho
  - todo lo que se le había hablado
  lexicon: speak to / passive report
  rationale: El pasivo español «le había sido dicho» refleja con bastante fidelidad la pasiva verbal del original y conserva el sentido de recepción de palabra sin introducir un sujeto explícito.
theological_decisions:
- issue: Contenido revelado recibido y comunicado
  english_pob_reading: he told them everything that he had seen in a dream and everything that had been spoken to him
  chosen_spanish_reading: porque les contó todo lo que había visto en un sueño y todo lo que le había sido dicho
  alternative_spanish_readings:
  - porque les contó todo lo que había visto en visiones y todo lo que le habían dicho
  - porque les contó todo lo que había visto en sueños y todo lo que se le había dicho
  rationale: 'El verso presenta dos fuentes de información: lo visto en sueño y lo recibido como palabra hablada. La traducción mantiene esa distinción sin fusionarlas ni espiritualizarlas.'
  doctrine_reference: Narrativa de revelación / transmisión de mensaje
translation_notes:
  revision_awareness: El inglés POB ya estaba en alta concordancia con el geʽez y no mostraba revisiones aplicadas; la versión española sigue ese mismo sentido directo sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y claro, compatible con la terminología POB.
  - Se evita «SEÑOR» u այլ sustituciones, porque no aparece aquí el tetragrámaton ni una cita directa del nombre divino.
  - «Canaán» se conserva como topónimo tradicional y transparente en español.
