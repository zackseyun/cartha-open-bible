  - severity: medium
    issue: Verbo final 'engendraron'
    rationale: Para partos de animales, 'parieron' o 'dieron a luz' refleja mejor el sentido narrativo de 'they bore'.
  - severity: low
    issue: '''salpicado'' como descriptor animal'
    rationale: Es posible, pero 'manchado' encaja mejor en español general para pelaje o coloración de animales, manteniendo la distinción respecto de 'moteado'.
