translation:
  language: es
  text: toda cría moteada, manchada y blanca que naciera entre las cabras sería su salario. Y parieron
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘቦ፡ ሐመደ፡
  english_pob_choice: speckled / dark
  chosen_spanish: moteado / salpicado
  alternatives_spanish:
  - oscuro
  - ceniciento
  - manchado
  lexicon: Ge'ez ḥamada
  rationale: La revisión inglesa corrigió 'dark' a 'speckled', mostrando que el término no debe tomarse como color oscuro simple. En español, 'moteado' y 'salpicado' conservan una apariencia irregular, compatible con el valor léxico señalado por la revisión.
- source_word: ጸዐዳ፡
  english_pob_choice: white
  chosen_spanish: blanco
  alternatives_spanish:
  - blanca
  - de color blanco
  lexicon: Ge'ez ṣaʿāda
  rationale: Se mantiene el adjetivo de color directo, concordando con el grupo de animales descritos.
- source_word: ዘተወልደ፡
  english_pob_choice: that was born
  chosen_spanish: que naciera
  alternatives_spanish:
  - que naciera
  - que fue nacido
  - nacido
  lexicon: Ge'ez verbal participial/clausal form
  rationale: La forma española con subjuntivo imperfecto refleja una cláusula relativa general y fluida en narración, sin añadir información ajena.
- source_word: ይኩኖ፡ ዐስቦ።
  english_pob_choice: would be his wages
  chosen_spanish: sería su salario
  alternatives_spanish:
  - sería su paga
  - serían sus salarios
  - le correspondería como salario
  lexicon: Ge'ez ʿasb
  rationale: '''Salario'' preserva la idea de compensación pactada. ''Paga'' sería posible, pero ''salario'' mantiene mejor la noción contractual explícita en el contexto.'
- source_word: ወእምአጣሊ፡
  english_pob_choice: among the goats
  chosen_spanish: entre las cabras
  alternatives_spanish:
  - entre los cabritos
  - entre las ovejas
  lexicon: Ge'ez aṭāli
  rationale: La revisión textual identifica አጣሊ como 'cabras', no 'corderos' ni 'ovejas'. 'Entre las cabras' evita el error corregido por la auditoría inglesa.
theological_decisions:
- issue: Unidad del rebaño y distribución salarial
  english_pob_reading: every speckled, spotted, and white one that was born among the goats would be his wages
  chosen_spanish_reading: todo lo moteado, lo salpicado y lo blanco que naciera entre las cabras sería su salario
  alternative_spanish_readings:
  - todo animal moteado, salpicado y blanco que naciera entre las cabras sería su paga
  - cada uno moteado, salpicado y blanco nacido entre las cabras sería su salario
  rationale: No hay una afirmación doctrinal compleja, pero sí una cláusula de reparto contractual. 'Su salario' conserva la función de remuneración acordada sin convertirla en un término eclesiástico ajeno al contexto.
  doctrine_reference: Narrative covenant/economic context, not doctrinal formulation
translation_notes:
  revision_awareness: 'La redacción inglesa revisada corrigió dos puntos decisivos del audit trail: 1) አጣሊ significa ''cabras'', no ''corderos''; 2) ḥamada debe entenderse como ''speckled/salpicado'' más que ''dark''. La versión española sigue esas correcciones y evita las lecturas descartadas por la revisión.'
  spanish_consistency_notes:
  - Se mantiene 'salario' como equivalente de compensación pactada, en línea con el valor contractual del pasaje.
  - Se usa una serie adjetival neutra ('moteado, salpicado y blanco') para respetar la enumeración del original sin añadir matices no atestiguados.
  - No se introducen notas al pie porque la redacción elegida resuelve las dos decisiones textuales principales sin ambigüedad residual en español.
