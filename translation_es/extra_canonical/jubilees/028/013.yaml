translation:
  language: es
  text: Así está ordenado y escrito en las tablas celestiales que nadie debe dar a la hija menor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሥሩዕ፡ ወጽሑፍ፡
  english_pob_choice: ordained and written
  chosen_spanish: ordenado y escrito
  alternatives_spanish:
  - decretado y escrito
  - establecido y escrito
  lexicon: Ge'ez ሥሩዕ / ወጽሑፍ
  rationale: 'El binomio inglés “ordained and written” expresa dos ideas complementarias: una disposición establecida y su fijación en texto. En español, “ordenado y escrito” conserva ambas sin añadir fuerza doctrinal extra ni reducirlo a mera escritura.'
- source_word: ጽላተ፡ ሰማይ፡
  english_pob_choice: heavenly tablets
  chosen_spanish: tablas celestiales
  alternatives_spanish:
  - tablas del cielo
  - tablas celestiales
  lexicon: Ge'ez ጽላት
  rationale: “Tablas celestiales” reproduce el sustantivo concreto “tablas” con el modificador de origen/esfera “celestiales”, manteniendo la imaginería apocalíptica sin sustituirla por una paráfrasis abstracta.
- source_word: አልቦ፡ ዘየሀብ፡
  english_pob_choice: that no one should give
  chosen_spanish: que nadie debe dar
  alternatives_spanish:
  - que nadie debería dar
  - que no se debe dar
  lexicon: Ge'ez negación existencial + verbo de dar
  rationale: La construcción inglesa tiene valor normativo. En español, “nadie debe dar” preserva esa obligación implícita y el sujeto indefinido, sin cargar el texto con un infinitivo impersonal menos directo.
- source_word: ወለተ፡ እንተ፡ ትንእስ፡
  english_pob_choice: the younger daughter
  chosen_spanish: la hija menor
  alternatives_spanish:
  - la hija más joven
  - la hija menor de edad
  lexicon: Ge'ez “daughter” + comparativo de juventud/menor edad
  rationale: “Hija menor” es la forma natural y fiel para la hija de menor edad dentro del grupo. “Más joven” sonaría menos idiomático en español bíblico; “menor de edad” añade una precisión legal que el texto no exige.
theological_decisions:
- issue: Referencia a las tablas celestiales como registro divino
  english_pob_reading: heavenly tablets
  chosen_spanish_reading: tablas celestiales
  alternative_spanish_readings:
  - tablas del cielo
  - registros celestiales
  rationale: Se mantiene la imaginería textual recibida por la fuente y por la POB inglesa, sin reinterpretarla como un simple “registro” abstracto. Esto preserva el marco apocalíptico propio de Jubileos.
  doctrine_reference: Tradición literaria apocalíptica de Jubileos; no implica una doctrina sistemática específica
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el pasaje sin cambios; el borrador español sigue de cerca el acuerdo alto entre la fuente ge'ez y la POB inglesa, sin introducir variantes textuales ni ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se conserva la fórmula impersonal normativa “nadie debe dar” para reflejar el valor prescriptivo del inglés auditado.
  - “Y escrito” se mantiene coordinado con “ordenado” para no perder la doblez semántica del original.
  - No se introduce “SEÑOR” ni terminología cristológica, porque el versículo no los contiene.
