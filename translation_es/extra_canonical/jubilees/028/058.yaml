translation:
  language: es
  text: Y las posesiones de Jacob aumentaron muchísimo, y él adquirió ganado mayor, ovejas, asnos y camellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበዝኅ ... ጥቀ፡
  english_pob_choice: And Jacob’s possessions increased greatly
  chosen_spanish: Y Jacob aumentó muchísimo sus posesiones
  alternatives_spanish:
  - Y las posesiones de Jacob aumentaron mucho
  - Y Jacob fue enriquecido grandemente
  lexicon: posesiones; aumentar muchísimo
  rationale: El ge'ez expresa un incremento intenso de bienes/riqueza. En español, 'sus posesiones' conserva el sentido patrimonial y 'aumentó muchísimo' transmite el adverbio intensivo sin añadir contenido ajeno.
- source_word: አልህምተ፡
  english_pob_choice: cattle
  chosen_spanish: ganado mayor
  alternatives_spanish:
  - vacas
  - bueyes
  - ganado
  lexicon: ganado mayor
  rationale: El término es genérico para ganado bovino. 'Ganado mayor' mantiene la fuerza colectiva y evita restringirlo indebidamente a una especie concreta.
- source_word: ወአባግዐ፡
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaños
  - corderos
  lexicon: ovejas
  rationale: Corresponde directamente al ganado ovino; 'ovejas' es claro y fiel en español contemporáneo.
- source_word: ወአእዱገ፡
  english_pob_choice: donkeys
  chosen_spanish: asnos
  alternatives_spanish:
  - burros
  - pollinos
  lexicon: asno
  rationale: El ge'ez incluye explícitamente los asnos, y el español 'asnos' es preciso, digno y fiel al léxico zoológico del pasaje.
- source_word: ወአገማለ፡
  english_pob_choice: camels
  chosen_spanish: camellos
  alternatives_spanish:
  - dromedarios
  lexicon: camello
  rationale: La correspondencia es directa; 'camellos' es la forma estándar en español y refleja bien el inventario de bienes pastoriles.
theological_decisions:
- issue: Enumeración de bienes y prosperidad de Jacob
  english_pob_reading: Jacob’s possessions increased greatly, and he acquired livestock including cattle, sheep, donkeys, and camels.
  chosen_spanish_reading: Jacob aumentó muchísimo sus posesiones, y adquirió ganado mayor, ovejas, asnos y camellos.
  alternative_spanish_readings:
  - Las posesiones de Jacob crecieron mucho, y obtuvo ganado mayor, ovejas, asnos y camellos.
  rationale: No hay tensión doctrinal especial; la decisión es mantener el sentido de prosperidad material concedida a Jacob sin convertir la frase en una generalización más interpretativa que el texto.
  doctrine_reference: Providencia y bendición material en el relato patriarcal
translation_notes:
  revision_awareness: La revisión más reciente confirmó la puntuación inglesa y no introdujo cambios de sentido; la corrección importante del audit trail es la inclusión explícita de 'donkeys', por lo que la versión española refleja esa lista completa de bienes.
  spanish_consistency_notes:
  - Se mantiene el nombre propio 'Jacob' sin adaptación.
  - Se usa 'asnos' para reflejar la inclusión explícita del ge'ez y evitar omitir un elemento del inventario.
  - No se emplean notas al pie porque no hay una variante textual o alternativa lexical que requiera anclaje en esta línea.
