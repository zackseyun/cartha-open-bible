revisions:
- from: Él hace subir su pecado[a] contra sí mismo hasta el cielo, y nadie que haga esta cosa[b] es justo, porque
  to: Él hace subir pecado[a] contra sí mismo al cielo, y nadie que haga esto[b] es justo, porque
  rationale: Se quita el posesivo no sustentado en el texto base principal, se elimina la nota alternativa defectuosa que afirmaba una construcción intransitiva incorrecta y se reemplaza por la alternativa previa documentada en el audit trail. Se mejora la naturalidad de 'esta cosa' a 'esto' en español, manteniendo el sentido, y se ajusta la segunda nota para reflejar la alternativa inglesa real. También se simplifica 'hasta el cielo' a 'al cielo' para una expresión más natural sin pérdida semántica.
