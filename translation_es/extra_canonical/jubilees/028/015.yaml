lexical_decisions:
- source_word: አበሳ / abäsa
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - culpa
  lexicon: N/A
  rationale: El sustantivo ge'ez apunta a la falta o culpa moral; en español, «pecado» comunica bien el peso religioso y jurídico del contexto. «Culpa» es una alternativa posible, pero aquí «pecado» conserva mejor la relación con la acusación que asciende al cielo.
- source_word: ያዐርግ / yaʿarg (causative)
  english_pob_choice: he brings up
  chosen_spanish: hace subir
  alternatives_spanish:
  - eleva
  - hace ascender
  lexicon: N/A
  rationale: El audit trail corrige la lectura intransitiva y exige una forma causativa. «Hace subir» refleja de manera directa la causación sin sobreinterpretar; «eleva» puede sonar más idiomática, pero pierde algo de la relación verbal concreta con «subir».
- source_word: ውስተ ሰማይ
  english_pob_choice: into heaven
  chosen_spanish: hasta el cielo
  alternatives_spanish:
  - al cielo
  - hacia el cielo
  lexicon: N/A
  rationale: «Hasta el cielo» mantiene la imagen de movimiento ascendente y evita una fijación excesivamente idiomática. «Al cielo» también sería posible, pero «hasta» reproduce mejor la idea de ascenso culminante.
- source_word: ዘይጸድቅ
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: N/A
  rationale: Para español eclesial moderno, «justo» es la opción más natural y fiel al campo semántico de δικαιοσύνη/justicia moral. «Recto» sería menos directo aquí.
- source_word: ዘይገብር ዘንተ ነገረ
  english_pob_choice: who does this thing
  chosen_spanish: que haga esta cosa
  alternatives_spanish:
  - que haga esto
  - que practique esta cosa
  lexicon: N/A
  rationale: La construcción es literal y mantiene el vínculo con el texto fuente. «Esta cosa» puede sonar algo marcada en español, pero preserva la deixis simple del original y del audit trail inglés; «esto» suavizaría un poco el estilo.
theological_decisions:
- issue: Relación entre pecado humano y esfera celestial
  english_pob_reading: he brings up sin against himself into heaven
  chosen_spanish_reading: Él hace subir su pecado contra sí mismo hasta el cielo
  alternative_spanish_readings:
  - Él hace subir su pecado al cielo contra sí mismo
  - Su pecado sube contra él hasta el cielo
  rationale: La revisión textual del audit trail exige un verbo causativo con objeto directo. «Contra sí mismo» conserva la idea de que el acto se vuelve en contra del propio sujeto, sin convertirlo en una afirmación diferente sobre el pecado como agente autónomo.
  doctrine_reference: Concordancia con la lectura causal del ge'ez y con la advertencia moral del pasaje; evita suavizar la responsabilidad personal.
- issue: Negación universal de la justicia para quien realiza el acto
  english_pob_reading: no one who does this thing is righteous
  chosen_spanish_reading: nadie que haga esta cosa es justo
  alternative_spanish_readings:
  - ninguno que haga esta cosa es justo
  - no hay justo que haga esta cosa
  rationale: La formulación española mantiene la fuerza universal negativa del enunciado y sigue de cerca la corrección del inglés auditado. «Nadie...» comunica de manera natural que la acción misma contradice la justicia.
  doctrine_reference: Mantiene el valor moral absoluto del enunciado sin introducir una lectura de perfeccionismo ajena al contexto.
translation_notes:
  revision_awareness: Se siguió la corrección del audit trail que restablece el verbo causativo «he brings up» frente a una lectura intransitiva. La redacción española evita depender de una traducción inglesa previa como base única y mantiene el sentido ascendente y acusatorio del original ge'ez. También se conservó la negación universal de la justicia con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «justo» como equivalente principal de la justicia moral/persona recta, no «righteous» transliterado ni un giro litúrgico.
  - Se mantiene «cielo» en singular para el ámbito celestial del pasaje.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto y solo una vez cada uno.
