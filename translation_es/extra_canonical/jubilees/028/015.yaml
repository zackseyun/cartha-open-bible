translation:
  language: es
  text: Él hace subir pecado[a] contra sí mismo al cielo, y nadie que haga esto[b] es justo, porque
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su pecado asciende por causa de él al cielo».'
    reason: previous_rendering
  - marker: b
