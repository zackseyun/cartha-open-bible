  text: 'Ella no tuvo hijos, y dijo a Jacob: «Dame hijos». Y Jacob dijo: «¿Acaso te he negado algo?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወትቤሎ፡ ለያዕቆብ፡ ሀበኒ፡ ውሉደ፡
  english_pob_choice: she said to Jacob, “Give me children.”
  chosen_spanish: 'dijo a Jacob: «Dame hijos»'
  alternatives_spanish:
  - 'dijo a Jacob: «Dame descendencia»'
  - 'dijo a Jacob: «Dame hijos [o: descendencia]»'
  lexicon: dar / hijos / descendencia
  rationale: El ge'ez pide directamente “hijos”, y la formulación inglesa de POB mantiene esa fuerza concreta. En español, “hijos” comunica con precisión la petición literal; “descendencia” sería más interpretativo y suaviza la intensidad del reclamo.
- source_word: ኢትወልድ፡
  english_pob_choice: She did not bear children
  chosen_spanish: Ella no tuvo hijos
  alternatives_spanish:
  - Ella no dio a luz hijos
  - Ella no engendró hijos
  lexicon: parir / tener hijos / engendrar
  rationale: El verbo ge'ez expresa no dar a luz / no tener hijos. En español, “no tuvo hijos” es natural y fiel al resultado referido por el contexto, sin introducir un matiz clínico innecesario.
- source_word: አነሁ፡ *ከላእኩ፡ እምኔኪ፡
  english_pob_choice: Have I withheld from you?
  chosen_spanish: ¿Te he retenido algo?
  alternatives_spanish:
  - ¿Te he negado algo?
  - ¿He retenido de ti algo?
  lexicon: retener / negar / privar
  rationale: La pregunta final en el audit trail inglés queda deliberadamente abierta e incompleta; el ge'ez sugiere la idea de haber retenido o dejado de dar. “¿Te he retenido algo?” conserva esa tensión y no completa el pensamiento más allá del texto.
theological_decisions:
- issue: Frase final incompleta / elíptica
  english_pob_reading: “Have I withheld from you?”
  chosen_spanish_reading: «¿Te he retenido algo?»
  alternative_spanish_readings:
  - «¿Te he retenido?»
  - «¿Te he negado algo?»
  rationale: La traducción mantiene la elipsis y no agrega el objeto o la conclusión del reclamo. Así respeta la forma corta del texto fuente y la decisión revisada en inglés de no expandir el enunciado.
  doctrine_reference: Fidelidad textual y no ampliación interpretativa
translation_notes:
  revision_awareness: El inglés POB fue revisado para añadir el sujeto explícito “She” por naturalidad y para conservar la cláusula final incompleta; la versión española sigue esa misma prudencia, sin expandir ni suavizar el cierre interrogativo.
  spanish_consistency_notes:
  - Se mantiene “Jacob” como nombre propio, en coherencia con la tradición textual del pasaje y con el auditable English POB.
  - Se evita “SEÑOR” u otro sustituto porque el verso no contiene el nombre divino.
  - La construcción española conserva el paralelismo breve y directo del original, con un registro bíblico claro pero actual.
