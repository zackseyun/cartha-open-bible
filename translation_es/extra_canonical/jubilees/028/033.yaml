  source_alignment_summary: El borrador sigue bien la secuencia del ge'ez y la decisión inglesa de mantener la cláusula final elíptica. «Ella no tuvo hijos» refleja adecuadamente ኢትወልድ, y «Dame hijos» preserva la fuerza concreta de ሀበኒ፡ ውሉደ፡. Sin embargo, «¿Te he retenido algo?» no suena idiomático en español y desplaza el sentido de privación/negación hacia un objeto retenido implícito; una formulación como «¿Acaso te he negado algo?» conserva mejor la elipsis del original sin completar el objeto más allá del texto.
