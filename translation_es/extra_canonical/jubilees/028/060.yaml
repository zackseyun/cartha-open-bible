translation:
  language: es
  text: de él y actuó con engaño para mal.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እምኔሁ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - a partir de él
  lexicon: Ge'ez እም- + pronominal suffix
  rationale: La preposición expresa origen/separación; en español, «de él» conserva la relación directa del original sin añadir matices no atestiguados.
- source_word: ወአስተሐየጸ
  english_pob_choice: acted deceitfully
  chosen_spanish: actuó con engaño
  alternatives_spanish:
  - obró con engaño
  - procedió con astucia engañosa
  - engañó
  lexicon: Ge'ez verb of deceitful action
  rationale: La raíz pide una acción dolosa o engañosa. «Actuó con engaño» mantiene el valor verbal y evita suavizar la fuerza moral del término.
- source_word: ለእኩይ
  english_pob_choice: for evil
  chosen_spanish: para mal
  alternatives_spanish:
  - con maldad
  - maliciosamente
  - para lo malo
  lexicon: Ge'ez ለ + እኩይ
  rationale: El texto revisado resuelve la lectura como finalidad o intención maligna, no como dirección hacia una persona. «Para mal» conserva esa explicitación de intención.
theological_decisions:
- issue: Relación entre el engaño y la intención maligna
  english_pob_reading: acted deceitfully for evil
  chosen_spanish_reading: actuó con engaño para mal
  alternative_spanish_readings:
  - actuó con engaño con intención mala
  - obró engañosamente para mal
  rationale: 'La revisión del texto fuente corrige una lectura interpersonal («toward him») y establece una cualificación ética explícita: la acción fue realizada con finalidad mala. El español debe retener esa tensión moral.'
  doctrine_reference: Ética bíblica; intención y culpa moral en el acto
- issue: Valor de la preposición de origen
  english_pob_reading: from him
  chosen_spanish_reading: de él
  alternative_spanish_readings:
  - desde él
  rationale: No hay indicio suficiente para convertir la frase en una relación de contacto o dirección; el sentido básico de procedencia debe preservarse.
  doctrine_reference: Lectura literal del sintagma preposicional
translation_notes:
  revision_awareness: La versión inglesa previa fue revisada desde «acted deceitfully toward him» a «acted deceitfully for evil» porque el ge'ez ለእኩይ explicita finalidad maligna. La traducción española sigue la lectura revisada y evita reintroducir la idea de dirección hacia una persona.
  spanish_consistency_notes:
  - Se mantiene «de él» para እምኔሁ por fidelidad al valor de procedencia.
  - Se evita «contra él» o «hacia él» porque la revisión textual descartó esa dirección.
  - «Para mal» conserva la fuerza ética del cierre del versículo sin añadir sujeto u objeto implícitos.
