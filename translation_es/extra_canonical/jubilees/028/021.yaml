lexical_decisions:
- source_word: ወሀቦ፡ ... ለያዕቆብ
  english_pob_choice: Laban gave Rachel to Jacob
  chosen_spanish: Labán entregó a Raquel a Jacob
  alternatives_spanish:
  - Labán dio a Raquel a Jacob
  - Labán le dio a Raquel a Jacob
  lexicon: dar / entregar
  rationale: El ge'ez expresa un acto de entrega con objeto directo explícito; en español, 'entregó' conserva mejor el valor concreto y relacional del acto que un simple 'dio', y evita ambigüedad sobre el destinatario.
- source_word: ከመ፡ ይትቀነይ፡ ሎቱ፡ ካልአተ፡ ዓመተ፡ ሰብዓተ፡
  english_pob_choice: that he might serve him another seven years
  chosen_spanish: para que le sirviera otros siete años
  alternatives_spanish:
  - para servirle otros siete años
  - a fin de que le sirviera otros siete años
  lexicon: servir
  rationale: El verbo ge'ez corresponde al campo de 'servir'; 'sirviera' reproduce el propósito expresado por ከመ፡ y mantiene la relación de servicio ya establecida en el contexto.
- source_word: ወወሀባ፡
  english_pob_choice: And he gave her
  chosen_spanish: Y se la entregó
  alternatives_spanish:
  - Y se la dio
  - Y la entregó a él
  lexicon: dar / entregar con pronombres átonos
  rationale: La revisión inglesa corrigió la omisión del objeto femenino singular; en español se refleja con 'se la' para conservar el referente femenino explícito del sufijo pronominal ge'ez.
theological_decisions:
- issue: Relación matrimonial como entrega contractual frente a fórmula general de 'dar'
  english_pob_reading: Laban gave Rachel to Jacob, that he might serve him another seven years. And he gave her
  chosen_spanish_reading: Labán entregó a Raquel a Jacob, para que le sirviera otros siete años. Y se la entregó.
  alternative_spanish_readings:
  - Labán dio a Raquel a Jacob, para que le sirviera otros siete años. Y se la dio.
  rationale: No hay tensión doctrinal nueva, pero 'entregó' preserva mejor el sentido narrativo de transferencia matrimonial y contractual que el texto fuente presenta sin suavizarlo.
  doctrine_reference: Narrativa patriarcal; no hay afirmación doctrinal directa
- issue: Objeto femenino explícito en la cláusula final
  english_pob_reading: And he gave her
  chosen_spanish_reading: Y se la entregó
  alternative_spanish_readings:
  - Y la entregó
  - Y le entregó
  rationale: La forma final del ge'ez incluye sufijo de objeto femenino; la traducción española debe conservarlo para no perder el referente textual.
  doctrine_reference: Fidelidad morfosintáctica al testimonio fuente
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada que corrigió la omisión del objeto femenino singular en la cláusula final ('And he gave her'). La redacción española incorpora ese objeto explícito mediante el pronombre átono 'la'.
  spanish_consistency_notes:
  - Se mantiene 'Labán' y 'Jacob' según la tradición onomástica estable en español.
  - '''Raquel'' se conserva como forma estándar española del nombre propio.'
  - El estilo es bíblico pero en español moderno, sin depender de mayúsculas litúrgicas ni de calcos innecesarios.
