translation:
  language: es
  text: Y ella dio a luz un segundo hijo para Jacob, y Raquel le puso por nombre Neftalí, al quinto día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወለደት / bore
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: נָלַד / γεννάω
  rationale: El Geez expresa el acto de dar a luz; en español, "dio a luz" comunica el hecho con claridad y dignidad sin endurecer el registro. "Engendró" desplazaría la acción hacia un sujeto masculino o una formulación menos natural aquí.
- source_word: ወልደ፡ ለያዕቆብ፡ / Jacob
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: יַעֲקֹב
  rationale: Se conserva "Jacob" por consistencia bíblica y porque es la forma usual en el español bíblico contemporáneo amplio; "Jacobo" sería menos estándar y no aporta precisión adicional.
- source_word: ስሞ፡ / called his name
  english_pob_choice: called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - puso por nombre
  - le puso por nombre
  lexicon: קָרָא שֵׁם
  rationale: '"Llamó su nombre" reproduce de cerca la construcción bíblica y mantiene el vínculo formal con el nombramiento del hijo. "Puso por nombre" es posible, pero aquí la formulación más directa conserva mejor la estructura del original.'
- source_word: ንፍታሌም / Naphtali
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalím
  lexicon: נַפְתָּלִי
  rationale: '"Neftalí" es la forma bíblica estable en español y refleja adecuadamente el nombre propio. Se evita una transliteración más técnica porque no añade valor para la lectura eclesial.'
- source_word: በኀሙሱ፡ / on the fifth day
  english_pob_choice: on the fifth day
  chosen_spanish: al quinto día
  alternatives_spanish:
  - en el quinto día
  - el quinto día
  lexicon: חֲמִישִׁי
  rationale: '"Al quinto día" es una correspondencia natural y fiel al valor temporal del Geez. Mantiene el matiz de ubicación temporal sin sonar calcado.'
