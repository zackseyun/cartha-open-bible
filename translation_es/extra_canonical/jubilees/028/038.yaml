translation:
  language: es
  text: 'El sexto[a]: en el sexto año de la tercera semana, Jacob volvió a entrar con Bilhá, y ella concibió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ordinal aislado del ge'ez; puede funcionar como rótulo enumerativo dentro de la secuencia de nacimientos, no solo como parte de la fecha.
    reason: source_note
lexical_decisions:
- source_word: ሳድስ፡
  english_pob_choice: The sixth
  chosen_spanish: El sexto[a]
  alternatives_spanish:
  - La sexta
  - Sexto
  lexicon: ordinal adjective
  rationale: El ge'ez abre con un ordinal aislado; como el contexto de Jubileos enumera nacimientos/secuencias, conviene reflejarlo como ordinal sustantivado en español. Mantengo el valor enumerativo sin añadir una explicación inexistente en el texto.
- source_word: በ*ሳድስ፡ ዓመት፡ ዘሱባዔ፡ ሣልስ።
  english_pob_choice: in the sixth year of the third week
  chosen_spanish: en el sexto año de la tercera semana
  alternatives_spanish:
  - en el año sexto de la tercera semana
  - durante el sexto año de la tercera semana
  lexicon: temporal phrase
  rationale: La estructura temporal se conserva de forma directa. 'Semana' traduce 'week' en el esquema jubilar de años-semana, y 'tercera' reproduce 'third' sin explicitar más de lo que el original da.
- source_word: ወደገመ፡ ... ካዕበ፡
  english_pob_choice: Jacob again went in
  chosen_spanish: Jacob volvió a entrar
  alternatives_spanish:
  - Jacob otra vez fue con
  - Jacob entró de nuevo con
  lexicon: repetition + intercourse euphemism
  rationale: '''Volvió a entrar'' preserva la repetición (''again'') y el eufemismo bíblico para relación sexual sin volverlo más explícito de lo que requiere el texto. ''Con'' mantiene la preposición relacional del original.'
- source_word: ወቦአ፡ ኀበ፡ ባላ፡
  english_pob_choice: went in to Bilhah
  chosen_spanish: a Bilhá
  alternatives_spanish:
  - con Bilhá
  - junto a Bilhá
  lexicon: preposition + proper name
  rationale: En español, 'entrar a/ con' ya expresa el movimiento relacional; el complemento 'a Bilhá' evita una calca extraña y conserva el sentido sexual narrativo del hebreo/ge'ez. Se mantiene la transliteración normalizada de Bilhá.
- source_word: ወፀንሰት፡
  english_pob_choice: and she conceived
  chosen_spanish: y ella concibió
  alternatives_spanish:
  - y quedó encinta
  - y concibió
  lexicon: conceive
  rationale: '''Concibió'' es una equivalencia directa, digna y sobria, adecuada para una narración bíblica sin suavizar el significado.'
theological_decisions:
- issue: Valor del ordinal inicial aislado ('The sixth')
  english_pob_reading: The English POB preserved the opening ordinal as a standalone phrase and later clarified the temporal setting.
  chosen_spanish_reading: El sexto[a]
  alternative_spanish_readings:
  - Sexto[a]
  - La sexta[a]
  rationale: Conservar el ordinal aislado respeta la señal estructural del manuscrito y la revisión inglesa que notó la posible función enumerativa. En español, el artículo hace la frase legible sin convertirla en una paráfrasis interpretativa.
  doctrine_reference: No doctrinal issue; textual/structural fidelity to Jubilees chronology.
translation_notes:
  revision_awareness: La redacción inglesa revisada añadió 'The sixth:' para no perder el ordinal inicial del ge'ez; esta versión española lo conserva de modo visible y lo ancla con una nota breve. También evita duplicar la idea de repetición con una fórmula innecesaria.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' y 'Bilhá' para coherencia con el registro bíblico y la transliteración hispana estándar.
  - '''Volvió a entrar'' conserva el matiz repetitivo de ''again'' sin añadir ''por segunda vez''.'
  - La nota [a] está anclada explícitamente en el texto para cumplir la trazabilidad requerida.
