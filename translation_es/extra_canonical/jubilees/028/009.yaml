translation:
  language: es
  text: «Y me iré, porque me has hecho mal». Porque Jacob amaba a Raquel más que a Lea,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአሐውር፡
  english_pob_choice: and I will go
  chosen_spanish: y me iré
  alternatives_spanish:
  - y partiré
  - y me marcharé
  lexicon: ir / irse
  rationale: El ge’ez expresa una acción futura en primera persona con valor de salida o partida. «Me iré» conserva la naturalidad del español y el matiz de alejamiento implícito en el contexto.
- source_word: እስመ፡ እኩየ፡ ገበርከ፡ ላዕሌየ።
  english_pob_choice: for you have done evil to me
  chosen_spanish: porque me has hecho mal
  alternatives_spanish:
  - porque has obrado mal contra mí
  - porque me has tratado mal
  lexicon: hacer mal / obrar mal
  rationale: La base semántica es una acción dañina dirigida a la hablante. «Me has hecho mal» sigue de cerca la fuerza del original y la revisión inglesa final, evitando sobreinterpretar con una expresión más forense de la que el texto no exige.
- source_word: ያፈቅር፡
  english_pob_choice: loved
  chosen_spanish: amaba
  alternatives_spanish:
  - amó
  - quería
  lexicon: amar
  rationale: El imperfecto en español transmite bien el trasfondo durativo o habitual del amor de Jacob por Raquel. «Amaba» es más acorde con el aspecto narrativo que un simple pretérito perfecto.
- source_word: ራሔልሃ፡ እምነ፡ ልያ፡
  english_pob_choice: Rachel more than Leah
  chosen_spanish: a Raquel más que a Lea
  alternatives_spanish:
  - a Raquel más que Lea
  - a Raquel antes que a Lea
  lexicon: más que
  rationale: Se preserva la comparación explícita entre ambas mujeres. La preposición «a» mantiene el objeto directo personal en español y refleja con claridad la relación comparativa.
theological_decisions:
- issue: Valor comparativo del amor de Jacob
  english_pob_reading: Jacob loved Rachel more than Leah
  chosen_spanish_reading: Jacob amaba a Raquel más que a Lea
  alternative_spanish_readings:
  - Jacob amó a Raquel más que a Lea
  - Jacob prefería a Raquel antes que a Lea
  rationale: No hay necesidad de suavizar ni intensificar el contraste. El español comparativo directo conserva la tensión narrativa del texto sin añadir juicio moral externo.
  doctrine_reference: Narrative fidelity; familial conflict in Genesis/Jubilees tradition
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de 'against me' a 'to me' para hacer más directa y natural la relación del objeto. La traducción española adopta ese sentido directo con 'me has hecho mal', sin introducir una preposición explícita que el español no requiere.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «Raquel» y «Lea» con la ortografía española estándar y sin notas adicionales, porque no hay variante textual relevante.
  - El segmento está unido en una sola cláusula narrativa, como en el original y en la traducción inglesa auditada.
