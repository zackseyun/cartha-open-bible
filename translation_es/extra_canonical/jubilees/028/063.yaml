translation:
  language: es
  text: sus ovejas, y Jacob llamó a Lea y a Raquel, y les habló al corazón[a] para que vinieran
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'a sus corazones'; el original usa una expresión idiomática para hablar de un hablar íntimo o persuasivo, y aquí se conserva la imagen de 'corazón'.
    reason: Aclara la metáfora preservada y explica el ajuste a una forma más natural en español.
lexical_decisions:
- source_word: አባግዒሁ
  english_pob_choice: his sheep
  chosen_spanish: sus ovejas
  alternatives_spanish:
  - sus corderos
  - sus rebaños
  lexicon: oveja
  rationale: El ge‘ez indica posesión de animales de rebaño; el inglés POB eligió el posesivo simple. En español, "ovejas" conserva el sentido básico y natural sin añadir precisión no atestiguada sobre edad o especie.
- source_word: ወጸውዖን
  english_pob_choice: Jacob called Leah and Rachel
  chosen_spanish: Jacob llamó a Lea y a Raquel
  alternatives_spanish:
  - Jacob convocó a Lea y a Raquel
  - Jacob mandó llamar a Lea y a Raquel
  lexicon: llamar
  rationale: El verbo expresa llamado directo. "Llamó" reproduce la acción sin sobretraducir como una convocatoria formal.
- source_word: ወተናገረ
  english_pob_choice: and spoke
  chosen_spanish: y habló
  alternatives_spanish:
  - y les habló
  - y dijo
  lexicon: hablar
  rationale: El texto fuente marca discurso dirigido; "habló" es el equivalente más sobrio y fiel. El complemento se omite porque ya está claro por el objeto indirecto y el contexto.
- source_word: ውስተ ልቦን
  english_pob_choice: to their hearts
  chosen_spanish: a sus corazones
  alternatives_spanish:
  - a su corazón
  - al corazón de ellas
  lexicon: corazón
  rationale: La expresión semítica se conserva de modo literal en español porque el POB en inglés también mantiene la imagen idiomática. "A sus corazones" respeta el plural del original y comunica trato íntimo y persuasivo.
- source_word: ከመ ይምጽኣ
  english_pob_choice: that they should come
  chosen_spanish: para que vinieran
  alternatives_spanish:
  - para que acudieran
  - a fin de que vinieran
  lexicon: venir
  rationale: La construcción final expresa propósito; "para que" y el imperfecto de subjuntivo son la manera natural de reflejarlo en español sin perder la relación final.
theological_decisions:
- issue: Idiomatic rendering of "speoke to their hearts"
  english_pob_reading: 'The English POB preserves the idiom without interpretation: "spoke to their hearts."'
  chosen_spanish_reading: '"habló a sus corazones" conserva la metáfora semítica sin convertirla en una paráfrasis psicológica.'
  alternative_spanish_readings:
  - les habló con ternura
  - les habló de manera persuasiva
  rationale: No hay base en el testimonio dado para especificar emoción, ternura o persuasión como el sentido primario. Mantener la imagen protege la tensión idiomática y deja al lector español el mismo efecto del original.
  doctrine_reference: Principio de fidelidad idiomática y preservación de metáfora bíblica
translation_notes:
  revision_awareness: El pasaje revisado en el control más reciente quedó sin cambios; el texto inglés POB y el testimonio ge‘ez están en alto acuerdo, por lo que no se requiere ajuste de sentido.
  spanish_consistency_notes:
  - Se mantiene "Jacob", "Lea" y "Raquel" como formas bíblicas estándar en español.
  - Se conserva el tono narrativo simple y directo del original, sin introducir sujetos o explicaciones implícitas.
  - No se añadió puntuación interpretativa ni glosas, dado el acuerdo alto entre fuente y traducción inglesa.
