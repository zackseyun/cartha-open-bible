lexical_decisions:
- source_word: ዘሱባዔ፡ ራብዕ።
  english_pob_choice: of the fourth week.
  chosen_spanish: de la cuarta semana.
  alternatives_spanish:
  - en la cuarta semana
  - durante la cuarta semana
  lexicon: week → semana
  rationale: El ge'ez marca una referencia temporal breve y la POB en inglés conserva la construcción nominal simple. En español, 'de la cuarta semana' reproduce fielmente la relación temporal sin añadir elementos no atestiguados.
- source_word: ወደገመ፡ ቦአ፡ ኀቤሃ፡
  english_pob_choice: And he again went in to her
  chosen_spanish: Y volvió a entrar en ella
  alternatives_spanish:
  - Y otra vez entró donde ella
  - Y entró otra vez a ella
  lexicon: went in to → entrar en; again → volvió a
  rationale: La locución ge'ez describe el acceso sexual con un verbo de entrada. 'Volvió a entrar en ella' conserva el sentido eufemístico y narrativo del original y del inglés POB, sin endurecerlo ni suavizarlo excesivamente.
- source_word: ወፀንሰት፡
  english_pob_choice: and she conceived
  chosen_spanish: y ella concibió
  alternatives_spanish:
  - y quedó encinta
  - y concibió
  lexicon: conceived → concibió
  rationale: '''Concibió'' es la correspondencia directa y transparente del verbo de concepción usado tanto en el inglés POB como en el texto fuente.'
- source_word: ወወለደት፡ ሎቱ፡ ወልደ፡ ካልአ፡
  english_pob_choice: and bore him a second son
  chosen_spanish: y le dio a luz un segundo hijo
  alternatives_spanish:
  - y le parió un segundo hijo
  - y tuvo para él un segundo hijo
  lexicon: bore → dio a luz; second son → segundo hijo
  rationale: '''Dio a luz'' es natural en español contemporáneo y mantiene el sentido de parto. Se conserva ''un segundo hijo'' para reflejar la secuencia ordinal del original y del inglés POB.'
- source_word: ወጸውዐት፡
  english_pob_choice: and she called
  chosen_spanish: y ella llamó
  alternatives_spanish:
  - y llamó
  - y lo llamó
  lexicon: called → llamó
  rationale: El verbo queda abierto porque el fragmento fuente y el inglés auditado terminan de forma incompleta. No se añade el objeto directo ni el nombre, ya que no están presentes en el tramo provisto.
