  text: «¿El fruto de tu vientre? ¿Te he abandonado?» Y cuando Raquel vio que Lea había dado a luz cuatro hijos
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ፍሬ፡ ከርሥኪ፡
  english_pob_choice: the fruit of your womb
  chosen_spanish: el fruto de tu vientre
  alternatives_spanish:
  - el fruto de tu matriz
  - el fruto de tus entrañas
  lexicon: fruto / vientre
  rationale: La imagen ge'ez corresponde de forma directa a la expresión semítica «fruto del vientre». En español, «vientre» conserva el paralelismo bíblico y la naturalidad idiomática; «matriz» o «entrañas» serían posibles, pero menos fluidas aquí.
- source_word: ኀደገኪ።
  english_pob_choice: Have I forsaken you?
  chosen_spanish: ¿Te he abandonado?
  alternatives_spanish:
  - ¿Te he dejado?
  - ¿Te he desamparado?
  lexicon: abandonar / dejar / desamparar
  rationale: El verbo expresa la idea de dejar o abandonar a alguien. «Abandonado» reproduce bien el sentido relacional de la pregunta y suena natural en español contemporáneo.
- source_word: ወሶበ፡ ርእየት፡ ራሔል፡ ከመ፡ ወለደት፡ ልያ፡ ደቀ፡ አርባዕተ፡
  english_pob_choice: And when Rachel saw that Leah had borne four children
  chosen_spanish: Y cuando Raquel vio que Lea había dado a luz cuatro hijos
  alternatives_spanish:
  - Y cuando Raquel vio que Lea había tenido cuatro hijos
  - Y cuando Raquel vio que Lea había parido cuatro hijos
  lexicon: dar a luz / tener hijos
  rationale: «Dar a luz» es una forma clara y digna para el acto de parir en contexto narrativo bíblico. «Hijos» traduce el conteo explícito de descendencia; «hijos» es preferible a una versión más literal de «niños» por el contexto genealógico.
theological_decisions:
- issue: Alcance de la frase interrogativa sobre el abandono
  english_pob_reading: Have I forsaken you?
  chosen_spanish_reading: ¿Te he abandonado?
  alternative_spanish_readings:
  - ¿Te he dejado?
  - ¿Te he desamparado?
  rationale: 'La pregunta conserva el tono relacional y acusativo del original: no se trata solo de una separación física, sino de un abandono del vínculo. «Abandonado» mantiene esa fuerza sin introducir un matiz más formal que el texto no exige.'
  doctrine_reference: fidelity / covenant relationship
- issue: Imagen corporal y semítica del «fruto del vientre»
  english_pob_reading: the fruit of your womb
  chosen_spanish_reading: el fruto de tu vientre
  alternative_spanish_readings:
  - el fruto de tu matriz
  - el fruto de tus entrañas
  rationale: La imagen bíblica del nacimiento se conserva sin suavizarse ni reinterpretarse. «Vientre» respeta la metáfora y es comprensible para lectores actuales; no hace falta sustituirla por un término más técnico.
  doctrine_reference: biblical imagery / maternity
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios; el español mantiene esa lectura estable y sigue de cerca la equivalencia óptima del inglés POB sin depender mecánicamente de él.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular («tu», «te») porque el pasaje conserva una dirección personal directa en la pregunta.
  - Se conserva el nombre propio «Raquel» y «Lea» en la forma española usual.
  - No se introducen marcas de nota porque el texto fuente y el inglés auditado no muestran variantes textuales o alternativas obligatorias en este versículo.
