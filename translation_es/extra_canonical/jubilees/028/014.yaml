translation:
  language: es
  text: antes que a la mayor; primero dé a la mayor, y después de ella a la menor. Y el hombre que haga así,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ትልህቅ / elder
  english_pob_choice: elder
  chosen_spanish: mayor
  alternatives_spanish:
  - el mayor
  - el anciano
  - el de más edad
  lexicon: age-order term
  rationale: El contexto contrasta con 'the younger', así que 'mayor/menor' comunica el orden de edad con naturalidad en español y evita una posible lectura de cargo comunitario que 'anciano' podría sugerir.
- source_word: ያቀድም፡ ውሂበ፡ / let him give first
  english_pob_choice: first let him give
  chosen_spanish: primero dé
  alternatives_spanish:
  - que dé primero
  - dé primero
  lexicon: temporal precedence
  rationale: Conserva la prioridad temporal del verbo sin añadir matices extra; 'primero dé' suena natural en español bíblico y mantiene la fuerza imperativa/ordenativa del original.
- source_word: ወእምድኅሬሃ፡ እንተ፡ ትንእስ፡ / and after her the younger
  english_pob_choice: and after her the younger
  chosen_spanish: y después de ella al menor
  alternatives_spanish:
  - y luego al menor
  - y después al más joven
  lexicon: age-order term
  rationale: '''Menor'' es el correlato más claro y equilibrado de ''mayor'' en español. Se mantiene ''de ella'' porque el pronombre está en el texto fuente y no debe perderse.'
- source_word: ወእሲ፡ ዘይገብር፡ ከመዝ፡ / And the man who does thus
  english_pob_choice: And the man who does thus
  chosen_spanish: Y el hombre que haga así
  alternatives_spanish:
  - Y el hombre que haga de esta manera
  - Y el hombre que actúe así
  lexicon: generic human subject
  rationale: '''Haga así'' refleja bien el demonstrativo ''thus'' sin sobreexplicar. ''El hombre'' mantiene el sujeto genérico del original.'
theological_decisions:
- issue: Orden de preferencia por edad en la distribución
  english_pob_reading: first let him give the elder, and after her the younger
  chosen_spanish_reading: primero dé al mayor, y después de ella al menor
  alternative_spanish_readings:
  - primero dé al mayor y luego al menor
  - dé primero al mayor, y después al menor
  rationale: La línea conserva la prioridad explícita al mayor y la subsecuente al menor; no se suaviza ni se convierte en una formulación más general, porque el texto regula un orden concreto de reparto.
  doctrine_reference: Orden familiar y prioridad por primogenitura/edad en la norma narrativa de Jubileos
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que suprimía indebidamente 'before the elder' por considerarlo no sustentado; el examen del ge'ez y el informe de revisión posterior muestran que esa frase sí está en la fuente. Por eso la traducción restaura 'antes del mayor'.
  spanish_consistency_notes:
  - Se usó 'mayor/menor' de forma consistente para el contraste de edad.
  - Se evitó 'anciano' para no introducir una idea de cargo que la fuente no exige.
  - No se añadieron notas al pie, para evitar marcadores no anclados en el texto.
