translation:
  language: es
  text: Y Jacob se unió a Lea, y ella concibió y dio a luz un hijo, y le puso por nombre Isacar, al cuarto día.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወቦአ፡ ... ኀበ፡ ሊያ፡
  english_pob_choice: went in to Leah
  chosen_spanish: fue a Lea
  alternatives_spanish:
  - entró en Lea
  - se llegó a Lea
  lexicon: verb of sexual union / marital access
  rationale: El giro hebreo-geeze expresa relación conyugal, pero en español directo ‘fue a Lea’ conserva la sobriedad narrativa sin introducir una formulación demasiado explícita o extraña. ‘Entró en Lea’ resulta posible, pero suena más brusco y menos natural; ‘se llegó a Lea’ añade una interpretación idiomática no necesaria aquí.
- source_word: ወፀንሰት
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - concebió ella
  lexicon: conceive
  rationale: ‘Concibió’ es la correspondencia más directa, digna y transparente en español bíblico moderno. ‘Quedó encinta’ enfatiza el resultado físico, pero pierde la simetría verbal de la frase original.
- source_word: ወወለደት
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y parió un hijo
  - y alumbró un hijo
  lexicon: bear / give birth
  rationale: ‘Dar a luz’ comunica el acto de nacimiento con claridad y sin arcaísmo excesivo. ‘Parió’ es más áspero en registro; ‘alumbró’ es comprensible, pero menos inmediato en español actual.
- source_word: ወጸውዐት፡ ስሞ፡
  english_pob_choice: she called his name
  chosen_spanish: le llamó por nombre
  alternatives_spanish:
  - llamó su nombre
  - lo llamó por nombre
  lexicon: name formula
  rationale: La construcción ‘llamar por nombre’ mantiene el valor formulaico de la secuencia original y es idiomática en español bíblico. ‘Llamó su nombre’ sería más calco; ‘lo llamó por nombre’ es correcto, pero menos natural.
- source_word: ይሳኮር
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: proper name
  rationale: Se adopta ‘Isacar’ como forma española ya asentada para el nombre, más fluida en lectura pública. ‘Issacar’ conserva más de cerca la grafía inglesa, pero es menos natural en español.
- source_word: በራብዑ፡
  english_pob_choice: on the fourth day
  chosen_spanish: al cuarto día
  alternatives_spanish:
  - en el cuarto día
  - el cuarto día
  lexicon: temporal phrase
  rationale: ‘Al cuarto día’ reproduce el valor temporal de manera natural y sobria. ‘En el cuarto día’ también es posible, pero ‘al’ suena más idiomático para fijar el momento de la acción.
theological_decisions:
- issue: Referencia a la unión sexual conyugal sin eufemismo añadido ni crudeza innecesaria
  english_pob_reading: went in to Leah
  chosen_spanish_reading: fue a Lea
  alternative_spanish_readings:
  - entró en Lea
  - se llegó a Lea
  rationale: El español elegido mantiene la relación conyugal implícita en el texto fuente sin sobreexplicarla. Esto preserva la franqueza narrativa de la tradición bíblica y evita tanto la crudeza como la desactivación del sentido.
  doctrine_reference: Génesis 29:23; uso narrativo bíblico de unión conyugal
- issue: Orden de la cláusula final con el dato calendárico
  english_pob_reading: on the fourth day
  chosen_spanish_reading: al cuarto día
  alternative_spanish_readings:
  - en el cuarto día
  rationale: La lectura mantiene el cierre cronológico como dato narrativo simple, sin convertirlo en comentario. No hay tensión doctrinal; solo se fija el marco temporal de la acción.
  doctrine_reference: cronología narrativa de Jubileos
