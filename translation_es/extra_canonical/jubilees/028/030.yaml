translation:
  language: es
  text: Primero, en el sexto año de esta semana. Y Jacob volvió a entrar en ella, y concibió. Y Jacob volvió a entrar en ella, y concibió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቀዳማዊ
  english_pob_choice: First
  chosen_spanish: Primero
  alternatives_spanish:
  - En primer lugar
  - Primero, al comienzo
  lexicon: adverbial opening marker / discourse connective
  rationale: El ge'ez abre con un marcador discursivo que la revisión inglesa restituyó como 'First'. En español, 'Primero' comunica mejor esa apertura secuencial sin forzar una enumeración artificial ni introducir contenido ajeno.
- source_word: በሳድስ፡ ዓመት፡ ዘዝ፡ ሱባዔ
  english_pob_choice: in the sixth year of this week
  chosen_spanish: en el sexto año de esta semana
  alternatives_spanish:
  - en el sexto año de esta semana santa
  - en el sexto año de esta semana/periodo
  lexicon: temporal phrase / calendrical unit
  rationale: Conservo la estructura literal del original y de la POB inglesa. 'Semana' mantiene la unidad calendárica de Jubileos; no se aclara más para no perder la terminología técnica del texto.
- source_word: ወደገመ ... ወፀንሰት
  english_pob_choice: And Jacob again went in to her, and she conceived
  chosen_spanish: Y Jacob volvió a entrar en ella, y ella concibió
  alternatives_spanish:
  - Y Jacob se llegó otra vez a ella, y concibió
  - Y Jacob tuvo de nuevo relaciones con ella, y ella quedó encinta
  lexicon: sexual euphemism / conceiving formula
  rationale: '''Volvió a entrar en ella'' reproduce el eufemismo semítico con la menor pérdida posible de fuerza verbal y sin reemplazarlo por una paráfrasis más interpretativa. ''Concibió'' es el equivalente directo y bíblico del resultado narrativo.'
theological_decisions:
- issue: Secuencia narrativa y repetición del acto de Jacob
  english_pob_reading: And Jacob again went in to her, and she conceived. And Jacob again went in to her, and she conceived.
  chosen_spanish_reading: Y Jacob volvió a entrar en ella, y ella concibió. Y Jacob volvió a entrar en ella, y ella concibió.
  alternative_spanish_readings:
  - Y Jacob volvió a entrar en ella, y ella concibió, y Jacob volvió a entrar en ella, y ella concibió.
  - Jacob volvió a entrar en ella dos veces, y ella concibió.
  rationale: El texto fuente repetido debe conservarse como repetición narrativa, no resumirse. Aunque la segmentación del paquete fuente puede reflejar una continuidad textual, la forma repetida permanece audible en español para respetar el audit trail inglés y no suavizar la insistencia del original.
  doctrine_reference: Fidelidad narrativa / no armonización interpretativa
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió una omisión del marcador inicial 'First' y el texto español lo incorpora explícitamente. No se añaden notas al pie porque el segmento no presenta una variante alternativa que requiera anclaje en esta edición breve.
  spanish_consistency_notes:
  - Se usa 'Jacob' y no 'Jacobo' para mantener consistencia con el nombre bíblico tal como aparece en el material fuente y en la POB inglesa.
  - Se conserva 'esta semana' como calco técnico de Jubileos, evitando sustituirlo por una paráfrasis que borre la unidad calendárica del libro.
  - No se emplea 'SEÑOR' ni terminología de sustitución teológica porque el versículo no contiene el Tetragrámaton ni una referencia directa a YHWH.
