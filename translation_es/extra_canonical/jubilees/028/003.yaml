  alternatives_spanish:
  - en el primer año de la tercera séptima
  - durante el primer año de la tercera semana
  lexicon: año; semana
  rationale: Se conserva la cronología técnica del texto jubilar con «semana» para ሱባዔ, siguiendo el valor calendárico del pasaje y evitando una paráfrasis explicativa.
- source_word: ይቤሎ
