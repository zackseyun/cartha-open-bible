  rationale: «Esposa» mantiene el sentido relacional y es más claro en español bíblico contemporáneo; «mujer» sería posible pero menos preciso aquí.
- source_word: ዘበእንቲአሃ
  english_pob_choice: for whom
  chosen_spanish: por quien
  alternatives_spanish:
  - a causa de quien
  - por la cual
  lexicon: relativo
  rationale: «Por quien» reproduce la relación causal/beneficiaria implícita en la cláusula, con concordancia natural en español.
- source_word: ተቀነይኩ፡ ለከ
  english_pob_choice: I have served you
  chosen_spanish: te he servido
  alternatives_spanish:
