  rationale: 'La frase conserva la tensión entre motivo y relación: la esposa es el referente por el cual se habla del servicio, sin expandirla a una explicación narrativa.'
  doctrine_reference: Lexical/thematic continuity with the source
- issue: Forma de discurso directo
  english_pob_reading: he said to him, “... ”
