base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/028/001.yaml
  text: And he lifted up his feet and went to the land of the east, to Laban, the brother of Rebekah, and he stayed with him.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:05Z'
    unchanged: false
    changes_summary: Changed 'he was with him' to 'he stayed with him' for more natural and contextually appropriate English while preserving the sense of remaining with Laban.
translation:
  language: es
  text: Y alzó sus pies y fue a la tierra del oriente, a Labán, el hermano de Rebeca, y se quedó con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአንሥአ፡ እገሪሁ፡
  english_pob_choice: he lifted up his feet
  chosen_spanish: alzó sus pies
  alternatives_spanish:
  - se puso en camino
  - levantó sus pies
  lexicon: alzarse / pie
  rationale: La imagen idiomática se conserva en español con una construcción natural y fiel. ‘Alzó sus pies’ reproduce el movimiento deliberado del original sin añadir explicaciones que no están en el texto.
- source_word: ምድረ፡ ጽባሕ፡
  english_pob_choice: the land of the east
  chosen_spanish: la tierra del oriente
  alternatives_spanish:
  - la región del oriente
  - el país del este
  lexicon: oriente
  rationale: ‘Oriente’ expresa bien la dirección geográfica y mantiene el tono bíblico. ‘Tierra’ traduce de modo simple y directo el sustantivo geográfico del original.
- source_word: ኀበ፡ ላባ፡ እኁሃ፡ ለርብቃ፡
  english_pob_choice: to Laban, the brother of Rebekah
  chosen_spanish: a Labán, el hermano de Rebeca
  alternatives_spanish:
  - a Labán, hermano de Rebeca
  - hasta Labán, el hermano de Rebeca
  lexicon: Labán / Rebeca
  rationale: Se mantiene la relación de parentesco explícita del original. El orden español sigue siendo claro y evita alterar el vínculo genealógico.
- source_word: ወሀሎ፡ ምስሌሁ፡
  english_pob_choice: and he stayed with him
  chosen_spanish: y se quedó con él
  alternatives_spanish:
  - y estuvo con él
  - y permaneció con él
  lexicon: quedar(se)
  rationale: La revisión inglesa optó por ‘stayed with him’ frente a ‘was with him’. En español, ‘se quedó con él’ transmite con naturalidad la idea de permanecer junto a Labán sin debilitar el sentido narrativo.
theological_decisions:
- issue: Preservación del lenguaje narrativo sencillo sin introducir matices devocionales ajenos
  english_pob_reading: And he lifted up his feet and went ... and he stayed with him.
  chosen_spanish_reading: Y alzó sus pies y fue ... y se quedó con él.
  alternative_spanish_readings:
  - Y se puso en camino ... y permaneció con él.
  - Y partió ... y estuvo con él.
  rationale: El pasaje es narrativo y no plantea una carga doctrinal especial. Se conserva la sencillez del movimiento y la permanencia, evitando fórmulas más interpretativas o litúrgicas.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde ‘he was with him’ a ‘he stayed with him’ para ganar naturalidad; la traducción española sigue esa decisión con ‘se quedó con él’. No hay variantes textuales adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene ‘Labán’ y ‘Rebeca’ como formas españolas estables de nombres propios bíblicos.
  - Se evita ‘se encontraba con él’ porque diluye la idea de permanencia que la revisión inglesa destacó.
  - El registro es sobrio y bíblico, pero no arcaizante.
