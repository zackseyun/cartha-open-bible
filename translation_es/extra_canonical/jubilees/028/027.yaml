translation:
  language: es
  text: Lía concibió y dio a luz a Jacob un segundo hijo, y él le puso por nombre Simeón, el vigésimo primero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ልያ (Leah/Lía)
  english_pob_choice: Leah
  chosen_spanish: Lía
  alternatives_spanish:
  - Lea
  lexicon: Lía
  rationale: En español bíblico es natural y claro adaptar el nombre propio como Lía; mantiene identificación inmediata sin depender de la forma inglesa.
- source_word: ወፀንሰት / ወወለደት (conceived / bore)
  english_pob_choice: conceived and bore
  chosen_spanish: concibió y dio a luz
  alternatives_spanish:
  - concibió y alumbró
  - quedó encinta y dio a luz
  lexicon: concibió / dar a luz
  rationale: La secuencia verbal expresa bien la gestación y el parto sin forzar un calco; 'dio a luz' es idiomático y digno en español.
- source_word: ለያዕቆብ (to Jacob)
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  - de Jacob
  lexicon: Jacob
  rationale: El dativo del ge'ez se expresa naturalmente en español con 'a'. Mantiene la relación paterna del nacimiento sin añadir interpretación.
- source_word: ወልደ፡ ካልአ፡ (second son)
  english_pob_choice: a second son
  chosen_spanish: un segundo hijo
  alternatives_spanish:
  - otro hijo
  - su segundo hijo
  lexicon: hijo
  rationale: '''Segundo hijo'' reproduce el ordinal y ''hijo'' mantiene la referencia al varón nacido; ''otro hijo'' sería menos preciso.'
- source_word: ወጸውዐ፡ ስሞ፡ (he called his name)
  english_pob_choice: he called his name
  chosen_spanish: él llamó su nombre
  alternatives_spanish:
  - llamó su nombre
  - y llamó su nombre
  lexicon: llamar + nombre
  rationale: El source exige el sujeto masculino singular; por eso se conserva 'él'. La construcción 'llamó su nombre' refleja el hebraísmo/géez sin introducir una reformulación innecesaria.
- source_word: ስምዖን (Simeon)
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: Simeón
  rationale: '''Simeón'' es la forma bíblica habitual en español para el hijo de Jacob, más específica que ''Simón'' y más reconocible en este contexto.'
- source_word: አመ፡ ፲ሥራ፡ (on the twenty-first)
  english_pob_choice: on the twenty-first
  chosen_spanish: en el vigésimo primero
  alternatives_spanish:
  - el día veintiuno
  - el veintiuno
  lexicon: numeral ordinal
  rationale: La fuente da un ordinal con marca temporal; en español 'en el vigésimo primero' conserva esa estructura, aunque suene algo sobria, sin convertirlo innecesariamente en un cardinal.
theological_decisions:
- issue: 'Quién nombra al niño: Leah o Jacob'
  english_pob_reading: he called his name Simeon
  chosen_spanish_reading: él llamó su nombre Simeón
  alternative_spanish_readings:
  - ella llamó su nombre Simeón
  rationale: 'Se preserva la lectura revisada del audit trail más acorde con el ge''ez: el sujeto es masculino singular. Esto conserva un rasgo redaccional propio de Jubileos y evita armonizarlo con Génesis.'
  doctrine_reference: Crítica textual / redacción bíblica; fidelidad al testimonio del manuscrito fuente
- issue: Forma del tiempo y del número en la fecha
  english_pob_reading: on the twenty-first
  chosen_spanish_reading: en el vigésimo primero
  alternative_spanish_readings:
  - el veintiuno
  rationale: La expresión ordinal mantiene la estructura temporal del original y evita añadir 'día' sin necesidad. No se trata de una fecha litúrgica sino de una datación narrativa.
  doctrine_reference: Expresión temporal del relato bíblico
translation_notes:
  revision_awareness: La revisión inglesa más reciente había cambiado erróneamente el sujeto a femenino para armonizar con Leah, pero el control posterior del ge'ez indica verbo masculino singular ('he called'). La versión española sigue la lectura corregida y evita la harmonización incorrecta.
  spanish_consistency_notes:
  - Se usa 'Lía' como forma española del nombre Leah, consistente con un registro bíblico readable.
  - Se mantiene 'Simeón' para el hijo de Jacob, evitando confusión con Simón del NT.
  - No se introducen mayúsculas teológicas innecesarias; la frase narrativa conserva sobriedad y claridad.
