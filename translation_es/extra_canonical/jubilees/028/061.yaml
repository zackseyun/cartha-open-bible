base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/028/061.yaml
  text: And it came to pass after Rachel had borne Joseph, that Laban went to shear his sheep, for he was far away.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:21Z'
    unchanged: false
    changes_summary: Added 'away' after 'far' to make the English natural and complete for the sense of distance expressed in the source.
translation:
  language: es
  text: Y sucedió que, después de que Raquel había dado a luz a José, Labán fue a esquilar sus ovejas, porque estaba lejos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “porque estaba muy lejos”; el texto geʽez subraya simplemente la distancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: እምዘ / after
  english_pob_choice: after Rachel had borne Joseph
  chosen_spanish: después de que Raquel había dado a luz a José
  alternatives_spanish:
  - después de que Raquel hubo dado a luz a José
  - tras haber Raquel dado a luz a José
  lexicon: after
  rationale: El sentido temporal es directo; en español, 'después de que' comunica la relación anterior con naturalidad. 'Dar a luz' refleja el nacimiento con registro digno y claro.
- source_word: ወሖረ / went
  english_pob_choice: went to shear his sheep
  chosen_spanish: fue a esquilar sus ovejas
  alternatives_spanish:
  - salió a esquilar sus ovejas
  - fue a trasquilar sus ovejas
  lexicon: go
  rationale: '''Fue a'' conserva el movimiento hacia la acción sin añadir implicaciones. ''Esquilar'' es el término neutro y preciso para ovejas.'
- source_word: አባግዒሁ / his sheep
  english_pob_choice: his sheep
  chosen_spanish: sus ovejas
  alternatives_spanish:
  - su rebaño
  - sus corderos
  lexicon: sheep
  rationale: El referente literal es el ganado ovino; 'ovejas' es más exacto que 'rebaño', que sería más general.
- source_word: ርሑቅ / far
  english_pob_choice: he was far away
  chosen_spanish: estaba lejos
  alternatives_spanish:
  - estaba distante
  - estaba muy lejos
  lexicon: far away
  rationale: La revisión inglesa añadió 'away' para completar la idea de distancia. En español, 'estaba lejos' expresa de forma natural ese valor locativo sin sobrecargar el texto.
theological_decisions:
- issue: Ninguno explícito; relato narrativo con referencia a distancia geográfica.
  english_pob_reading: for he was far away
  chosen_spanish_reading: porque estaba lejos
  alternative_spanish_readings:
  - pues estaba lejos
  - porque se hallaba lejos
  rationale: No hay carga doctrinal particular en el versículo. Se mantiene el motivo causal de distancia con una forma sobria y transparente.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que añadió 'away' a 'far' para completar la idea de distancia del geʽez; por eso el español usa 'lejos' sin añadir contenido nuevo.
  spanish_consistency_notes:
  - Se conserva 'Y sucedió que' como fórmula narrativa equivalente a 'And it came to pass'.
  - Se usa 'Labán' y 'Raquel' como formas españolas estándar de los nombres propios.
  - '''José'' sigue la forma tradicional y transparente del nombre propio en español.'
  - El verbo 'esquilar' se eligió por precisión pastoral y registro bíblico sobrio.
