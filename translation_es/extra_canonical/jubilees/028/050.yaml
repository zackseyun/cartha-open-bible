translation:
  language: es
  text: José, en la luna nueva del cuarto mes, en el sexto año, en esta cuarta semana. Y en los días en que nació...
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዮሴፍ፡
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joseph
  lexicon: nombre propio
  rationale: El nombre propio bíblico estándar en español es «José»; mantiene la referencia inequívoca a Joseph sin calco inglés.
- source_word: በሠርቅ፡
  english_pob_choice: on the new moon of the fourth month
  chosen_spanish: en la luna nueva
  alternatives_spanish:
  - en la nueva luna
  - al comienzo del mes
  lexicon: término calendárico
  rationale: La revisión inglesa corrigió el sentido a un marcador calendárico de «new moon/first day» y no a «dawn»; «luna nueva» comunica ese valor sin introducir un día inexistente.
- source_word: ወርኅ፡ ራብዕ፡
  english_pob_choice: of the fourth month
  chosen_spanish: del cuarto mes
  alternatives_spanish:
  - del mes cuarto
  lexicon: término calendárico
  rationale: «Cuarto mes» es la formulación natural en español y conserva con precisión el orden cronológico.
- source_word: በሳድስ፡ ዓመት፡
  english_pob_choice: in the sixth year
  chosen_spanish: en el sexto año
  alternatives_spanish:
  - durante el sexto año
  lexicon: término cronológico
  rationale: La construcción indica ubicación temporal; «en el sexto año» es fiel y natural en español.
- source_word: በሱባዔ፡ ዝንቱ፡ ራብዕ።
  english_pob_choice: in this fourth week
  chosen_spanish: en esta cuarta semana
  alternatives_spanish:
  - en esta cuarta septena
  lexicon: término cronológico
  rationale: El inglés POB retiene «week»; «semana» es el equivalente transparente para el lector español, conservando la estructura del calendario jubilar.
- source_word: ወበመዋዕለ፡ ተወልደ
  english_pob_choice: And in the days when he was born...
  chosen_spanish: Y en los días en que nació...
  alternatives_spanish:
  - Y en aquellos días nació...
  - Y en los días de su nacimiento...
  lexicon: cláusula dependiente
  rationale: La revisión inglesa indica que la frase queda subordinada y no debe cerrarse como oración independiente. «En los días en que nació» reproduce ese valor dependiente y conserva la suspensión final con puntos suspensivos.
theological_decisions:
- issue: Marcador calendárico de በሠርቅ
  english_pob_reading: new moon / first day of the month, not dawn or a fourth day
  chosen_spanish_reading: luna nueva como marcador del mes, no como amanecer
  alternative_spanish_readings:
  - amanecer
  - el cuarto día del mes
  rationale: La evidencia de revisión del inglés descarta una lectura de amanecer y también descarta añadir un «cuarto día». La traducción española debe reflejar el valor calendárico, no un momento del día.
  doctrine_reference: Cronología jubilar / precisión textual
translation_notes:
  revision_awareness: 'Se siguió la corrección más reciente del audit trail: በሠርቅ se entiende como marcador de luna nueva, y ወበመዋዕለ፡ ተወልደ se deja como cláusula dependiente sin convertirla en enunciado cerrado. Se evitó reproducir las notas antiguas del inglés porque el texto español no usa «dawn» ni introduce un día del mes inexistente.'
  spanish_consistency_notes:
  - Se mantuvo un registro cronológico sobrio y legible, acorde con un texto de Jubileos.
  - No se introdujo terminología eclesiástica no respaldada por el origen; «luna nueva» y «semana» siguen el campo semántico del pasaje.
  - La oración final queda deliberadamente abierta para respetar la sintaxis incompleta señalada por la revisión crítica.
