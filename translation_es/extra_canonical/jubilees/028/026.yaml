translation:
  language: es
  text: Yahvé vio que Lea era aborrecida, mientras Raquel era amada. Y Jacob fue otra vez a[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue a ella». La frase queda abierta porque el complemento continúa en el versículo siguiente.
    reason: Preserva la alternativa reflejada en la auditoría inglesa y aclara la continuación interversicular sin usar una construcción menos natural.
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: YHWH
  rationale: El contexto corresponde al nombre divino, no a un simple título. Conforme a la pauta del proyecto, se usa «Yahvé» en el texto principal para mantener transparencia frente al original.
- source_word: ትጸላእ
  english_pob_choice: was hated
  chosen_spanish: era aborrecida
  alternatives_spanish:
  - era odiada
  - era despreciada
  lexicon: שָׂנֵא / ἐμισήθη
  rationale: La POB inglesa eligió «hated»; en español «aborrecida» conserva fuerza relacional y evita suavizar el contraste, sin sobrecargarlo con un matiz más moderno que podría sonar excesivo.
- source_word: ትትፈቀር
  english_pob_choice: was loved
  chosen_spanish: era amada
  alternatives_spanish:
  - era querida
  - era amada por
  lexicon: אהב / ἠγαπήθη
  rationale: «Amada» reproduce el paralelismo con «aborrecida» y refleja bien la oposición del texto fuente.
- source_word: ወደገመ
  english_pob_choice: again went in
  chosen_spanish: volvió a entrar
  alternatives_spanish:
  - entró otra vez
  - volvió a ir
  lexicon: בוא + שוב
  rationale: La construcción ge'ez expresa repetición de la acción; en español, «volvió a entrar» conserva la iteración y la imagen verbal sin forzar un calco.
theological_decisions:
- issue: Nombrar al Dios de Israel con el nombre propio en vez de un título cubriente
  english_pob_reading: the LORD saw
  chosen_spanish_reading: Yahvé vio
  alternative_spanish_readings:
  - el Señor vio
  - SEÑOR vio
  rationale: El texto fuente usa el nombre divino; el proyecto pide no ocultarlo bajo una convención de mayúsculas. «Yahvé» mantiene la audibilidad del nombre en español.
  doctrine_reference: Nombre divino / YHWH
- issue: Relación afectiva desigual entre Lea y Raquel
  english_pob_reading: Leah was hated, while Rachel was loved
  chosen_spanish_reading: Lea era aborrecida, mientras Raquel era amada
  alternative_spanish_readings:
  - Lea era odiada, mientras Raquel era amada
  - Lea era menos amada, mientras Raquel era amada
  rationale: La fuente y la POB mantienen una oposición fuerte; no se atenúa a «menos amada» porque borraría la tensión lexical y teológica del pasaje.
  doctrine_reference: Lenguaje comparativo de preferencia/repudio en narrativa bíblica
translation_notes:
  revision_awareness: 'La evidencia revisada muestra una corrección importante sobre el final de la cláusula inglesa: el objeto no debe suplirse aquí, porque pertenece al comienzo del versículo siguiente. Por eso el español termina en «volvió a entrar» y deja la continuidad abierta mediante nota.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma base para el nombre divino.
  - «Amada/aborrecida» conserva el paralelismo fuerte del original y de la POB inglesa.
  - La frase final queda sintácticamente abierta para respetar la división de versículo y la revisión textual registrada.
