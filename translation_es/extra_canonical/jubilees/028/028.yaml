lexical_decisions:
- source_word: ወአሐዱ
  english_pob_choice: And on the first
  chosen_spanish: Y en el primer día
  alternatives_spanish:
  - Y el primero
  - Y en el día primero
  lexicon: N/A
  rationale: El ge'ez ወአሐዱ añade la idea de 'uno/primero'; la revisión inglesa restituyó explícitamente 'the first day'. En español, 'en el primer día' comunica con naturalidad ese valor temporal sin perder la precisión.
- source_word: ዘወርኅ፡ ዓሥር፡
  english_pob_choice: of the tenth month
  chosen_spanish: del décimo mes
  alternatives_spanish:
  - del mes décimo
  lexicon: N/A
  rationale: La expresión temporal se traduce de forma directa y natural como 'décimo mes', conservando el orden semítico sin resultar forzado en español.
- source_word: ወበሣልስ፡ ዓመት፡ ለዝ፡ ሱባዔ
  english_pob_choice: in the third year of this week
  chosen_spanish: en el tercer año de esta semana
  alternatives_spanish:
  - en el año tercero de esta semana
  lexicon: N/A
  rationale: '''Semana'' refleja el uso técnico de Jubileos para un ciclo de años, no una semana de siete días. ''Tercer año'' sigue el orden y el valor ordinal del original.'
- source_word: ወደገመ፡
  english_pob_choice: Jacob again went in to
  chosen_spanish: Jacob volvió a entrar a
  alternatives_spanish:
  - Jacob entró de nuevo a
  - Jacob volvió a ir adonde
  lexicon: N/A
  rationale: El verbo ge'ez indica reiteración de una entrada/acercamiento. 'Volvió a entrar a' conserva la repetición explícita del inglés POB y el movimiento implícito del original.
theological_decisions:
- issue: Uso de 'semana' como unidad cronológica técnica en Jubileos
  english_pob_reading: in the third year of this week
  chosen_spanish_reading: en el tercer año de esta semana
  alternative_spanish_readings:
  - en el tercer año de este ciclo
  - en el tercer año de este jubileo
  rationale: El texto de Jubileos emplea 'week' como término técnico para un período de siete años. 'Semana' es la forma más transparente y auditable en español, aun si requiere nota explicativa en contextos mayores.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa añadió explícitamente 'And on the first' para reflejar ወአሐዱ, ausente en el borrador anterior. Esta versión española incorpora ese valor temporal con 'en el primer día' y mantiene la estructura cronológica del texto base. El final queda abierto porque el pasaje fuente se corta en 'Jacob again went in to'.
  spanish_consistency_notes:
  - Se conserva 'Jacob' para coherencia con la edición inglesa auditada y con el nombre propio ya fijado en el corpus.
  - Se mantiene 'semana' como término técnico de Jubileos, no como referencia al ciclo ordinario de siete días.
  - Se ha usado 'entrar a' para reproducir el movimiento direccional del hebreo/ge'ez sin forzar un complemento inexistente en el fragmento conservado.
