lexical_decisions:
- source_word: ቤተ፡ አቡየ።
  english_pob_choice: to my father’s house.
  chosen_spanish: a la casa de mi padre»
  alternatives_spanish:
  - a la casa de mi padre
  - en la casa de mi padre
  lexicon: casa
  rationale: El ge’ez expresa literalmente ‘casa de mi padre’; en español, ‘a la casa de mi padre’ conserva el valor direccional del contexto final del discurso directo.
- source_word: ወይቤሎ፡ ላባ፡ ለያዕቆብ፡
  english_pob_choice: And Laban said to Jacob,
  chosen_spanish: 'Y Labán dijo a Jacob:'
  alternatives_spanish:
  - 'Y Labán habló a Jacob:'
  - 'Entonces Labán dijo a Jacob:'
  lexicon: dijo
  rationale: El verbo introductorio de habla se vierte de forma directa y natural; ‘dijo’ refleja adecuadamente la marca narrativa sin sobretraducción.
- source_word: ንበር፡ ኀቤየ፡
  english_pob_choice: Stay with me
  chosen_spanish: Quédate conmigo
  alternatives_spanish:
  - Permanece conmigo
  - Habita conmigo
  lexicon: quedarse
  rationale: La idea es de permanecer con alguien; ‘quédate conmigo’ es natural en español y comunica la relación personal sin perder la fuerza imperativa.
- source_word: በዐስብከ፡
  english_pob_choice: for your wages
  chosen_spanish: por tus salarios
  alternatives_spanish:
  - por tu salario
  - a cambio de tu salario
  lexicon: salario
  rationale: El plural ‘salarios’ sigue la huella del hebreo/árabe-similar de remuneración múltiple y coincide con la lectura inglesa; se mantiene la posibilidad de entender compensación continua.
- source_word: ወረዐይ፡ ሊተ፡ ካዕበ፡ መርዔትየ፡
  english_pob_choice: and pasture my flock for me again.
  chosen_spanish: y vuelve a apacentar para mí mi rebaño
  alternatives_spanish:
  - y apacienta de nuevo mi rebaño para mí
  - y pastorea otra vez mi rebaño para mí
  lexicon: apacentar
  rationale: ‘Apacentar’ conserva el sentido pastoral clásico del original y del POB inglés ‘pasture’; ‘rebaño’ expresa el objeto directo del cuidado pastoral.
theological_decisions:
- issue: Modo de dirección y relación en la petición de Labán
  english_pob_reading: Stay with me for your wages, and pasture my flock for me again.
  chosen_spanish_reading: Quédate conmigo por tus salarios, y vuelve a apacentar para mí mi rebaño.
  alternative_spanish_readings:
  - Permanece conmigo por tu salario, y vuelve a apacentar para mí mi rebaño.
  - Quédate conmigo a cambio de tus salarios, y apacienta de nuevo mi rebaño para mí.
  rationale: No hay tensión doctrinal específica; la decisión mantiene el tono de negociación laboral y dependencia mutua sin espiritualizar ni suavizar el intercambio.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente solo cerró la cita directa con comillas y punto, sin alterar el contenido; la versión española refleja ese cierre con puntuación completa equivalente.
  spanish_consistency_notes:
  - Se mantiene ‘Labán’ y ‘Jacob’ de forma consistente con la tradición onomástica española.
  - Se evita introducir mayúsculas innecesarias en ‘mi padre’ porque el referente es poseído, no un título divino.
  - ‘Rebaño’ preserva el campo semántico pastoril y funciona mejor que ‘ganado’ en este contexto narrativo.
