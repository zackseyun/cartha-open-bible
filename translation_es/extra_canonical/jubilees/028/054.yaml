translation:
  language: es
  text: y toma tu salario.” Y acordaron entre sí que él le daría por salario cada cordero[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada oveja».
    reason: Alinear la alternativa española con la nota del POB inglés ('every sheep') sin añadir un matiz adicional no documentado.
lexical_decisions:
- source_word: ወንሣእ፡ ዐስበከ።
  english_pob_choice: and take your wages
  chosen_spanish: y toma tu salario
  alternatives_spanish:
  - y recibe tu paga
  - y toma tu recompensa
  lexicon: ዐስብ / wages, pay
  rationale: El imperativo pide recibir lo debido por el trabajo; en español 'salario' conserva el sentido remunerativo sin volverlo litúrgico ni abstracto. 'Paga' es posible, pero 'salario' refleja mejor la fuerza contractual del contexto.
- source_word: ወተካሀሉ፡ በበይናቲሆሙ፡
  english_pob_choice: And they agreed between themselves
  chosen_spanish: Y acordaron entre sí
  alternatives_spanish:
  - Y se pusieron de acuerdo entre ellos
  - Y concertaron entre sí
  lexicon: agreement / mutual deliberation
  rationale: La forma expresa un acuerdo mutuo; 'acordaron entre sí' es natural y conserva la reciprocidad sin añadir detalles.
- source_word: ከመ፡ የሀቦ፡ ዐስቦ፡
  english_pob_choice: that he would give him as his wages
  chosen_spanish: que él le daría como su salario
  alternatives_spanish:
  - que él le daría por salario
  - que le daría su salario
  lexicon: give as wages / remuneration clause
  rationale: La revisión inglesa subraya el posesivo implícito 'his wages'. En español, 'como su salario' mantiene esa relación sin sobrecargar con perífrasis innecesarias.
- source_word: '*ኵሎ፡ በግዐ፡ እመሐስዕ፡'
  english_pob_choice: every lamb
  chosen_spanish: cada cordero
  alternatives_spanish:
  - todo cordero
  - cada oveja joven
  lexicon: lamb / young of the flock
  rationale: La revisión auditada corrigió 'every sheep' a 'every lamb'; 'cordero' comunica el matiz de animal joven mejor que 'oveja', y 'cada' refleja el distributivo de 'every'.
theological_decisions:
- issue: No hay variante doctrinal directa; el reto es lexical y de precisión zoológica/contractual.
  english_pob_reading: every lamb; as his wages
  chosen_spanish_reading: cada cordero; como su salario
  alternative_spanish_readings:
  - cada oveja; como paga
  - cada cordero; como paga
  rationale: 'La decisión sigue la revisión del texto fuente: el acuerdo es sobre el pago y el sustantivo final señala específicamente corderos jóvenes. No se introduce terminología eclesiástica ni una lectura doctrinal ajena al pasaje.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'The English audit trail records two minor corrections: the remuneration phrase should reflect ''as his wages'' rather than a bare ''as wages'', and the animal term should be ''every lamb'' rather than ''every sheep''. The Spanish draft follows both revisions and keeps the distributive force explicit with ''cada''.'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y contractual en 'salario', coherente con el valor de ዐስብ en este contexto.
  - '''Acordaron entre sí'' conserva la reciprocidad de በበይናቲሆሙ sin expandir el sentido.'
  - 'La nota al pie marca la alternativa zoológica posible, pero el texto principal sigue la revisión más precisa: ''cordero''.'
