translation:
  language: es
  text: 'a Jacob—Rubén, Simeón, Leví y Judá— y ella le dijo: «Llega a Bilhá»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ella le dijo a Bilhá: “Aquí está Bilhá”».'
    reason: previous_rendering / textual_variant documented in the English audit trail
lexical_decisions:
- source_word: ለያዕቆብ
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  - a Yaacob
  lexicon: nombre propio
  rationale: El dativo del geʽez se refleja naturalmente con 'a' en español. Se conserva la forma bíblica habitual 'Jacob' para claridad y continuidad intertextual.
- source_word: ሮቤል ... ወስምዖን ... ወሌዊ ... ወይሁዳ
  english_pob_choice: Reuben, Simeon, Levi, and Judah
  chosen_spanish: Rubén, Simeón, Leví y Judá
  alternatives_spanish:
  - Ruben, Simón, Leví y Judá
  - Rubén, Simeón, Levi y Judá
  lexicon: nombres propios
  rationale: Se usan las formas bíblicas castellanas más reconocibles. 'Rubén' y 'Leví' mantienen el acento gráfico habitual en español; 'Simeón' conserva la forma tradicional.
- source_word: ወትቤሎ
  english_pob_choice: and she said to him
  chosen_spanish: y ella le dijo
  alternatives_spanish:
  - y le dijo
  - y ella dijo a él
  lexicon: verbo decir / pronombre objeto
  rationale: 'El audit trail corrige el error previo: el destinatario es Jacob, no Bilhá. En español se explicita ''ella'' para mantener la referencia del sujeto femenino del contexto y la claridad sintáctica.'
- source_word: ባላ፡ ኀበ፡ ባላ፡
  english_pob_choice: Go in to Bilhah
  chosen_spanish: Entra a Bilhá
  alternatives_spanish:
  - Ve a Bilhá
  - Métete con Bilhá
  lexicon: eufemismo de relación sexual
  rationale: La revisión inglesa señala que el grupo léxico apunta a una instrucción sexual, con posible corrupción textual en el geʽez. 'Entra a' conserva el eufemismo bíblico sin endurecerlo más allá de la evidencia. Se usa 'Bilhá' como forma española del nombre.
theological_decisions:
- issue: Naturaleza de la instrucción dada a Jacob
  english_pob_reading: and she said to him, “Go in to Bilhah.”
  chosen_spanish_reading: 'y ella le dijo: «Entra a Bilhá»'
  alternative_spanish_readings:
  - 'y ella le dijo: «Ve a Bilhá»'
  - 'y ella le dijo: «Ten relaciones con Bilhá»'
  rationale: El texto no describe un simple movimiento físico sino una orden relacionada con unión sexual. La fórmula española mantiene el eufemismo tradicional y no introduce una explicitud que el texto base no exige.
  doctrine_reference: Génesis 30:3 y el motivo narrativo de la descendencia por medio de Bilhá; preservación de eufemismo bíblico
translation_notes:
  revision_awareness: 'El texto fuente revisado corrige un error importante del borrador inglés previo: el discurso se dirige a Jacob (''le dijo''), no a Bilhá. La frase final también fue revisada en el audit trail para reflejar una lectura verbal (''Go in to Bilhah'') en vez de una presentación nominal. La traducción española sigue esa corrección y conserva la ambigüedad textual mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene 'Bilhá' con tilde para la forma española del nombre propio.
  - Se conserva el guion largo para reflejar la enumeración enfática del texto fuente y el flujo del inglés POB.
  - La cita directa usa comillas angulares por norma tipográfica española.
