  - del mes once
  lexicon: expresión temporal
  rationale: «Undécimo mes» mantiene el orden y el registro del marcador cronológico del original y del inglés auditado.
- source_word: በዓመቱ / in the fifth year
  english_pob_choice: in the fifth year
  chosen_spanish: en el quinto año
  alternatives_spanish:
  - durante el quinto año
  - al quinto año
  lexicon: expresión temporal
  rationale: La preposición «en» reproduce la localización temporal directa del original sin sobrerinterpretar la relación cronológica.
- source_word: ዘሱባዔ ራብዕ / of the fourth week
  english_pob_choice: of the fourth week
  chosen_spanish: de la cuarta semana
  alternatives_spanish:
  - en la cuarta semana
  - de la semana cuarta
  lexicon: expresión temporal
  rationale: Se conserva la estructura calendárica del texto fuente y del inglés POB con una formulación española transparente.
theological_decisions:
- issue: Presencia de Lea como sujeto nominativo
  english_pob_reading: Leah named him Asher
  chosen_spanish_reading: Lea nombró a Asher
  alternative_spanish_readings:
  - Lea le puso por nombre Asher
  - Asher fue nombrado por Lea
  rationale: La corrección auditada indica que el sujeto explícito es Lea; por fidelidad al texto, la traducción debe conservarla y no convertir la oración en una fórmula impersonal o pasiva.
  doctrine_reference: Fidelidad textual y claridad narrativa; no aplica una cuestión doctrinal específica.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que corrige la omisión de Lea en la traducción inglesa anterior. No se añadieron notas al pie porque la lectura española puede expresar directamente el sujeto y la datación sin ambigüedad adicional.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, evitando calcos innecesarios.
  - Se conservó Asher como nombre propio, ya que el contexto es nominativo y la tradición española admite esta forma.
  - 'La estructura temporal reproduce el paralelismo del original: día, mes, año y semana.'
