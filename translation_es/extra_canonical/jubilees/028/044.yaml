    issue: Verbo de nombrar poco natural en español
    rationale: «Lea nombró a Asher» puede entenderse, pero para poner nombre a una persona recién nacida el español natural pide «lo llamó Asher» o «le puso por nombre Asher». Además, «named him Asher» incluye el objeto «him», que no queda bien reflejado en la redacción actual.
  revised_spanish_text: Lea lo llamó Asher, el segundo día del undécimo mes, en el quinto año de la cuarta semana.
