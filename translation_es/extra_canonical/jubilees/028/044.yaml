  lexicon: nombre propio / verbos de nombrar
  rationale: El testimonio fuente y la revisión inglesa dejan claro que Lea es el sujeto de la acción; en español, «nombró a Asher» comunica de manera natural el acto de poner nombre sin forzar una perífrasis más larga.
