  lexicon: nombre propio
  rationale: Se conserva la forma tradicional transcrita como nombre propio bíblico, acorde con el inglés POB y el uso eclesial ampliamente reconocido.
- source_word: በስኑዩ / on the second day
  english_pob_choice: on the second day
  chosen_spanish: el segundo día
  alternatives_spanish:
  - en el segundo día
  - al segundo día
  lexicon: expresión temporal
  rationale: «El segundo día» es la forma más natural y fiel en español para la datación interna, sin añadir elementos ajenos al texto.
- source_word: ዘ'ዐሠርቱ / of the eleventh month
