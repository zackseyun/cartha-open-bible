    text: 'O: «Tomó a Lea, su hija mayor, y la dio...». El verbo se sobreentiende por la división del pasaje.'
    reason: alternative_reading
  revision_rationale: Se corrige la segunda cláusula para que Zilpa sea dada a Lea, no directamente a Jacob, en conformidad con el original y el POB inglés. También se suaviza la sintaxis española manteniendo la distinción de estatus entre esposa y esclava/acompañante. La nota [a] se conserva en forma más concisa y sigue anclada correctamente.
