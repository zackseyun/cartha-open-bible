translation:
  language: es
  text: '[Tomó] a Lea, su hija mayor[a], y la dio a Jacob como esposa, y le dio con ella a Zilpa, su esclava, por criada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tomó a Lea, su hija mayor, y la dio...». El verbo se sobreentiende por la división del pasaje.'
    reason: alternative_reading
lexical_decisions:
- source_word: Leah his elder daughter
  english_pob_choice: Leah his elder daughter
  chosen_spanish: a Lea, su hija mayor
  alternatives_spanish:
  - Lea, su hija mayor
  - Lea, su hija mayor de edad
  lexicon: Lea = nombre propio; elder daughter = hija mayor
  rationale: Mantengo el nombre propio y la relación de parentesco explícita. «Hija mayor» reproduce la distinción de orden familiar sin añadir una idea de edad legal que el texto no exige.
- source_word: gave her to Jacob as a wife
  english_pob_choice: gave her to Jacob as a wife
  chosen_spanish: la dio a Jacob como esposa
  alternatives_spanish:
  - la entregó a Jacob como esposa
  - se la dio a Jacob por esposa
  lexicon: give as wife = dar como esposa
  rationale: «Dar como esposa» expresa la función matrimonial de la acción sin cambiar el sentido del original. «Dio» conserva la sencillez del hebraísmico/antiguo giro narrativo.
- source_word: maidservant
  english_pob_choice: maidservant
  chosen_spanish: esclava
  alternatives_spanish:
  - sirvienta
  - criada
  lexicon: maidservant = female slave/servant
  rationale: El inglés POB usa un término de fuerza léxica semejante a «slave». En español, «esclava» preserva esa fuerza y evita suavizar la relación de dependencia.
- source_word: handmaid
  english_pob_choice: handmaid
  chosen_spanish: criada
  alternatives_spanish:
  - sierva
  - sirvienta
  lexicon: handmaid = attendant female servant
  rationale: Aquí el segundo término nombra la función de acompañamiento/servicio. «Criada» suena natural en español moderno sin borrar la subordinación indicada por el contexto.
theological_decisions:
- issue: Relación matrimonial y jerarquía doméstica
  english_pob_reading: Leah is given as a wife, while Zilpah is given as a maidservant/handmaid.
  chosen_spanish_reading: Lea es dada como esposa, mientras Zilpa es dada como esclava/criada.
  alternative_spanish_readings:
  - Lea es entregada como esposa, y Zilpa como sierva
  - Lea recibe a Jacob como esposo
  rationale: 'No hay una cuestión doctrinal compleja, pero sí una tensión social y narrativa: el texto distingue el estatus de Lea frente al de Zilpa. La traducción conserva esa diferencia con dos términos distintos en español, sin nivelarlos.'
  doctrine_reference: Narrativa patriarcal; estatus doméstico y matrimonial en el relato de Génesis/Jubileos
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó la puntuación y la reconstrucción del arranque fragmentario del versículo en aislamiento. Por eso la versión española incluye una solución verbal entre corchetes («[Tomó]») para recuperar la sintaxis natural sin alterar el contenido, y mantiene el paralelismo entre la esposa dada a Jacob y la esclava/criada dada junto con ella.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando aparezca el nombre divino; aquí no hay mención divina.
  - Conservo «esclava» para el término de fuerza léxica y «criada» para el término funcional, siguiendo la distinción del texto.
  - La nota al pie está anclada explícitamente en «mayor[a]» para cumplir la lectura alternativa documentada.
