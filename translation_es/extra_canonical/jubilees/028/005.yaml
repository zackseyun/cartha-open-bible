review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del texto ge''ez y del POB inglés: Lea es dada a Jacob como esposa, y Zilpa es dada como sirvienta subordinada. También conserva correctamente la suplementación editorial de ''[Tomó]'' por la división de versículos. Sin embargo, en la segunda cláusula el español actual desplaza el referente de ''her'': el original y el inglés dicen que se le dio a Lea a Zilpa como sierva/acompañante, no que se le dio Zilpa a Jacob de forma directa.'
  spanish_quality_summary: El español es generalmente claro y natural, pero la segunda mitad queda ambigua y puede leerse como si Jacob recibiera a Zilpa. Además, la combinación 'su esclava, como criada' aplicada sin anclar el dativo a Lea suena algo trabada. Conviene explicitar 'le dio con ella' o equivalente para reflejar la relación correcta y mejorar la legibilidad.
  glossary_alignment: Buena alineación general. 'Lea' y 'hija mayor' están bien. 'Como esposa' es adecuado. 'Esclava' preserva la fuerza léxica de maidservant, y 'criada' puede funcionar para handmaid como rol de servicio, siempre que se aclare que Zilpa fue dada a Lea. No hay términos teológicos de proyecto en juego.
  issues:
  - severity: high
    issue: Referencia incorrecta o ambigua en la cláusula sobre Zilpa
    rationale: El borrador dice 'y le dio a Zilpa, su esclava, como criada', donde el dativo 'le' se entiende naturalmente como Jacob. Pero el inglés POB 'he gave her Zilpah...' indica que Zilpa fue dada a Lea como sirvienta/acompañante.
  - severity: low
    issue: Redacción algo rígida en la segunda cláusula
    rationale: '''a Zilpa, su esclava, como criada'' repite dos designaciones de servicio sin enlazar claramente la función. ''Con ella'' o ''por criada'' mejora la relación sintáctica y narrativa.'
  revised_spanish_text: '[Tomó] a Lea, su hija mayor[a], y la dio a Jacob como esposa, y le dio con ella a Zilpa, su esclava, por criada.'
  revised_footnotes:
