translation:
  language: es
  text: Raquel, Bilha, la hermana de Zilpa, como esclava.[a] Y sirvió otros siete años por
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Raquel dio a Bilha, la hermana de Zilpa, como esclava''. La revisión inglesa descartó esa completación porque contradice la narración previa; por eso el texto principal mantiene el fragmento sin ''dio''.'
    reason: alternative_reading
lexical_decisions:
- source_word: ራሔል፡ ... ለዜልፋን፡ ... ለአኪት
  english_pob_choice: Rachel, Bilhah, the sister of Zilpah, as a maidservant.
  chosen_spanish: Raquel, Bilha, la hermana de Zilpa, como esclava.
  alternatives_spanish:
  - Raquel, Bilha, la hermana de Zilpa, como sierva.
  - Raquel dio a Bilha, la hermana de Zilpa, como esclava.
  lexicon: δοῦλος / maidservant equivalent; proper names in Spanish biblical form
  rationale: El audio textual en inglés conserva la secuencia nominal fragmentaria; en español, 'como esclava' mantiene la fuerza léxica de 'maidservant' con el valor de servidumbre doméstica sin suavizarlo a 'sierva'. No se añade 'dio' porque la revisión inglesa final mostró que introducir ese verbo altera la relación narrativa y crea una lectura incorrecta del sujeto.
- source_word: ሰብዓተ፡ ዓመተ፡ ዳግመ፡ በእንተ
  english_pob_choice: And he served another seven years for
  chosen_spanish: Y sirvió otros siete años por
  alternatives_spanish:
  - Y sirvió todavía siete años por
  - Y prestó servicio otros siete años por
  lexicon: δίω / servant-service phrasing; unfinished prepositional phrase
  rationale: '''Sirvió'' conserva el lenguaje de servicio del texto inglés y del relato de Jacob. ''Otros siete años'' reproduce ''another seven years''. Se deja la frase abierta con ''por'' porque el texto fuente y el inglés auditado terminan en corte de verso, sin completar el complemento.'
theological_decisions:
- issue: Relación narrativa entre Raquel y Bilha en el fragmento discontinuo
  english_pob_reading: Rachel, Bilhah, the sister of Zilpah, as a maidservant. And he served another seven years for
  chosen_spanish_reading: Raquel, Bilha, la hermana de Zilpa, como esclava. Y sirvió otros siete años por
  alternative_spanish_readings:
  - Raquel dio a Bilha, la hermana de Zilpa, como esclava. Y sirvió otros siete años por
  - Raquel, Bilha, la hermana de Zilpa, como sierva. Y sirvió otros siete años por
  rationale: La revisión inglesa documenta que añadir 'gave' produce una contradicción con la narración previa, donde el que entrega a Bilha es Labán. Por fidelidad al estado textual auditado, el español evita introducir ese verbo y mantiene el fragmento discontinuo sin corregirlo artificialmente.
  doctrine_reference: Fidelidad textual y coherencia narrativa
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que primero añadió 'gave' para completar la frase, pero luego se corrigió por ser una mala asignación del sujeto. El español sigue la lectura corregida y conserva el final truncado porque el original ge'ez y el inglés auditado terminan en corte de verso.
  spanish_consistency_notes:
  - Se usa 'Raquel' y 'Bilha' con las formas bíblicas castellanas habituales.
  - Se usa 'Zilpa' para el nombre propio correspondiente.
  - Se prefiere 'esclava' para reflejar la fuerza léxica de 'maidservant' según la política POB, evitando suavizar a 'sierva'.
  - Se conserva la elipsis final con 'por' para respetar el corte del testimonio textual.
