  glossary_alignment: 'No hay términos del glosario principal en juego salvo el nombre propio, bien resuelto como «Zebulún». La decisión «otro hijo» está alineada con la revisión léxica inglesa. La fórmula de nombramiento debe ajustarse a un español bíblico natural: «le puso por nombre al hijo Zebulún» o equivalente preserva la función onomástica mejor que el calco actual.'
