translation:
  language: es
  text: a ella, y concibió y dio a luz otro[a] hijo y una hija, y le puso por nombre al hijo Zebulún.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un segundo hijo».
    reason: La forma ge'ez puede entenderse como «otro» o «segundo»; el texto principal sigue la revisión inglesa «another son», pero se conserva la alternativa documentada.
lexical_decisions:
- source_word: ኀቤሃ
  english_pob_choice: to her
  chosen_spanish: a ella
  alternatives_spanish:
  - para ella
  - con ella
  lexicon: dativo/pronominal de dirección
  rationale: El ge'ez expresa dirección o referencia personal hacia Leah; en español, «a ella» comunica el dativo sin añadir matices no presentes en el texto.
- source_word: ወፀንሰት
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - contempló
  lexicon: verbo de concepción
  rationale: «Concibió» es la forma más directa y solemne para el acto de quedar embarazada; mantiene la secuencia narrativa del original.
- source_word: ወወለደት
  english_pob_choice: and bore
  chosen_spanish: y dio a luz
  alternatives_spanish:
  - y parió
  - y alumbró
  lexicon: verbo de parto
  rationale: «Dio a luz» es natural en español bíblico contemporáneo y conserva la referencia al nacimiento físico sin rusticidad excesiva.
- source_word: '*ካልእተ፡ ወልደ፡'
  english_pob_choice: another son
  chosen_spanish: otro hijo
  alternatives_spanish:
  - un segundo hijo
  - un hijo adicional
  lexicon: cuantificación adjetival
  rationale: La revisión inglesa privilegia «another son» por la amplitud semántica de la forma ge'ez; «otro hijo» reproduce esa apertura sin fijar innecesariamente el orden de nacimiento. Se evita «segundo» porque podría sugerir un dato ordinal explícito que el texto revisado no exige.
- source_word: ወወለተ፡
  english_pob_choice: and a daughter
  chosen_spanish: y una hija
  alternatives_spanish:
  - y una niña
  - y una hija también
  lexicon: sustantivo de parentesco
  rationale: «Hija» es la equivalencia directa y mantiene el paralelismo del pasaje.
- source_word: ወጸውዐት ስሞ
  english_pob_choice: and she called the son's name
  chosen_spanish: y llamó el nombre del hijo
  alternatives_spanish:
  - y nombró al hijo
  - y puso al hijo por nombre
  lexicon: fórmula onomástica
  rationale: La fórmula hebrea/ge'ez de nombrar se conserva de manera formal y transparente; «llamó el nombre del hijo» refleja el patrón narrativo tradicional sin ocultar su literalidad.
- source_word: ዘቡሎን
  english_pob_choice: Zebulun
  chosen_spanish: Zebulún
  alternatives_spanish:
  - Zabulón
  - Zebulon
  lexicon: nombre propio bíblico
  rationale: Se usa la forma castellana habitual con tilde final para acomodación ortográfica en español y lectura pública.
theological_decisions:
- issue: Orden de nacimiento implícito frente a la variante «another son / second son»
  english_pob_reading: another son
  chosen_spanish_reading: otro hijo
  alternative_spanish_readings:
  - segundo hijo
  - un segundo hijo
  rationale: La fuente ge'ez admite una lectura ordinal o indefinida. Siguiendo la revisión inglesa, se preserva la indeterminación para no imponer una cronología que el testimonio textual no obliga a fijar.
  doctrine_reference: Principio de fidelidad textual y cautela ante variantes semánticas
- issue: Fórmula de nombramiento del hijo
  english_pob_reading: she called the son's name Zebulun
  chosen_spanish_reading: llamó el nombre del hijo Zebulún
  alternative_spanish_readings:
  - puso por nombre al hijo Zebulún
  - nombró al hijo Zebulún
  rationale: La construcción conserva el valor narrativo y onomástico del texto sin añadir interpretaciones teológicas ajenas al versículo.
  doctrine_reference: Nomenclature bíblica y equivalencia formal
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que sustituyó 'a second son' por 'another son' por la amplitud semántica del ge'ez. La redacción española evita introducir una ordinalidad no obligatoria y mantiene la secuencia completa del versículo. No se añaden notas al pie porque no hay marcador anclado en el texto.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y natural, sin calcos pesados.
  - «Zebulún» conserva la ortografía española tradicional de nombres bíblicos.
  - No se usa «SEÑOR» ni terminología confesional ajena, ya que el versículo no contiene un nombre divino.
