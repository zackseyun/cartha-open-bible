translation:
  language: es
  text: Pero Jacob no lo supo, porque pensó que era Raquel. Y entró donde ella, y he aquí,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ኢያእመረ
  english_pob_choice: did not know
  chosen_spanish: no lo supo
  alternatives_spanish:
  - no lo sabía
  - no se dio cuenta
  lexicon: conocimiento / no saber
  rationale: El ge'ez expresa ignorancia real respecto de la identidad de la mujer. "No lo supo" mantiene la negación del conocimiento sin introducir una interpretación más fuerte que el texto no exige.
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: conjunción causal
  rationale: La causa inmediata de su ignorancia se expresa mejor en español con "porque", que es natural y fiel al valor explicativo del contexto.
- source_word: አምሳለ ... ያዕቆብ
  english_pob_choice: that she was Rachel
  chosen_spanish: que era Raquel
  alternatives_spanish:
  - que ella era Raquel
  - que se trataba de Raquel
  lexicon: identificación
  rationale: El texto afirma una identificación errónea de la mujer con Raquel. "Que era Raquel" refleja bien esa percepción sin añadir elementos interpretativos.
- source_word: ቦአ፡ ኀቤሃ
  english_pob_choice: he went in to her
  chosen_spanish: entró donde ella
  alternatives_spanish:
  - se llegó a ella
  - entró a ella
  lexicon: eufemismo sexual / acceso conyugal
  rationale: La expresión semítica se usa como eufemismo de consumación sexual. En español, "entró donde ella" conserva la forma reverente y el sentido sin sonar artificial ni vulgar.
theological_decisions:
- issue: Preservación del eufemismo sexual de consumación
  english_pob_reading: he went in to her
  chosen_spanish_reading: entró donde ella
  alternative_spanish_readings:
  - se unió a ella
  - tuvo relaciones con ella
  rationale: La lectura inglesa mantiene un eufemismo sobrio; la versión española conserva esa reserva formal, evitando una explicitación que el texto base no requiere.
  doctrine_reference: Génesis 29:23; uso bíblico semítico del eufemismo sexual
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hubo cambios necesarios y el cotejo final reportó alto acuerdo; por tanto, se mantiene la estructura breve del verso sin añadir material no atestiguado.
  spanish_consistency_notes:
  - Se conserva la secuencia narrativa breve del original y del audit trail inglés.
  - Se usa "Jacob" en lugar de "Jacobo" para mantener consistencia con el texto fuente y el proyecto.
  - Se mantiene "Raquel" como nombre propio estándar en español bíblico.
  - No se añade puntuación final porque el verso fuente queda abierto con "he aquí".
