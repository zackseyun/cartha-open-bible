lexical_decisions:
- source_word: ይእቲሰ፡ ልያ፡
  english_pob_choice: she was Leah.
  chosen_spanish: ella era Lea.
  alternatives_spanish:
  - era Lea.
  - se trataba de Lea.
  lexicon: proper_name
  rationale: El geʽez identifica a la mujer como Lea; el copulativo simple en pasado comunica de forma natural la identificación sin añadir información no presente en el texto.
- source_word: ያዕቆብ፡ ... ላባ፡
  english_pob_choice: Jacob was angry with Laban
  chosen_spanish: Jacob se enojó con Labán
  alternatives_spanish:
  - Jacob se enfureció con Labán
  - Jacob se indignó contra Labán
  lexicon: name + idiom
  rationale: El verbo geʽez expresa una reacción de ira; «se enojó» es claro y digno en español. «Con Labán» mantiene la relación directa del enojo dirigida al personaje nombrado.
- source_word: ወይቤሎ፡
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y le respondió
  lexicon: speech formula
  rationale: La fórmula narrativa estándar en español es «le dijo», fiel al valor comunicativo del verbo introductorio.
- source_word: ለምንት፡ *ገበርከኒ፡ ከመዝ፡
  english_pob_choice: Why have you done this to me?
  chosen_spanish: ¿Por qué me has hecho esto?[a]
  alternatives_spanish:
  - ¿Por qué me hiciste esto?
  - ¿Por qué has hecho esto conmigo?
  lexicon: cause/action question
  rationale: La pregunta causal se conserva literalmente y el pronombre dativo «me» reproduce el daño dirigido al hablante. Se ancla la nota porque el texto fuente y el audit trail muestran que la cláusula continúa en el siguiente versículo; la forma española queda abierta para no fabricar una frase completa inexistente aquí.
- source_word: አኩ፡
  english_pob_choice: Did I not
  chosen_spanish: ¿No he...
  alternatives_spanish:
  - ¿No he sido...
  - ¿Acaso no he...
  lexicon: interrogative fragment
  rationale: El testimonio auditado indica que አኩ corresponde a una continuación interrogativa incompleta en este corte versal. En español se deja el fragmento como suspensión para reflejar el límite del versículo y evitar completar indebidamente el pensamiento.
theological_decisions:
- issue: Segmentación de un dicho que continúa en el versículo siguiente
  english_pob_reading: Why have you done this to me? Did I not
  chosen_spanish_reading: ¿Por qué me has hecho esto?[a] ¿No he...
  alternative_spanish_readings:
  - ¿Por qué me has hecho esto? ¿No he...
  - ¿Por qué me has hecho esto?
  rationale: El cierre del versículo en la fuente geʽez conserva una continuación interrogativa (አኩ) que no debe eliminarse. La puntuación española usa puntos suspensivos para indicar que el enunciado queda truncado por la división versal, sin completar lo que pertenece al siguiente versículo.
  doctrine_reference: Crítica textual y segmentación versal; fidelidad a la continuidad del discurso.
translation_notes:
  revision_awareness: 'Se corrigió el problema previo de anclaje: la única nota al pie aparece ahora exactamente en el texto español junto a la cláusula correspondiente. También se preservó la continuación interrogativa atestiguada por el geʽez, sin restaurar indebidamente la frase completa del versículo siguiente.'
  spanish_consistency_notes:
  - Se usa «Labán» para el nombre propio, forma estable en español bíblico y transparente para lectores de iglesia.
  - Se mantiene «Jacob» y «Lea» sin adaptación adicional.
  - Se evita introducir «SEÑOR» u otra terminología no presente.
  - La suspensión con puntos suspensivos refleja que el enunciado queda abierto por la segmentación del pasaje.
