translation:
  language: es
  text: y asnos y esclavos y esclavas. Y Labán y sus hijos envidiaron a Jacob, y Labán reunió sus ovejas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወደቀ፡³¹ ወአዋልደ።
  english_pob_choice: and donkeys and servants and maidservants.
  chosen_spanish: y asnos y esclavos y esclavas.
  alternatives_spanish:
  - y burros y sirvientes y sirvientas
  - y asnos y siervos y siervas
  lexicon: asno; esclavo
  rationale: El inglés POB refleja una lista de posesiones/personas con fuerza léxica directa. 'Asnos' mantiene el animal doméstico sin suavizarlo a un término más genérico. 'Esclavos/esclavas' preserva la fuerza de δοῦλος como relación de propiedad o dependencia, coherente con el criterio POB de no rebajar a 'siervos' sin razón contextual.
- source_word: ወቀንአ፡ ላባ፡ ወውሉዱ፡ ላዕለ፡ ያዕቆብ፡
  english_pob_choice: And Laban and his sons envied Jacob,
  chosen_spanish: Y Labán y sus hijos envidiaron a Jacob,
  alternatives_spanish:
  - Y Labán y sus hijos tuvieron celos de Jacob
  - Y Labán y sus hijos sintieron envidia contra Jacob
  lexicon: envidiar
  rationale: '''Envidiaron'' conserva el verbo sencillo y directo del inglés POB y el sentido hostil de la frase. En español, ''envidiar'' comunica bien la rivalidad sin añadir matices psicológicos no garantizados por el texto.'
- source_word: ወአስተጋብአ፡ ላባ፡ አባግዒሁ፡
  english_pob_choice: and Laban gathered his sheep.
  chosen_spanish: y Labán reunió sus ovejas.
  alternatives_spanish:
  - y Labán juntó sus ovejas
  - y Labán congregó sus ovejas
  lexicon: reunir
  rationale: '''Reunió'' corresponde a la acción de juntar o recoger rebaño sin introducir una separación implícita añadida. Se evita agregar ''se llevó'' o ''alejó'', ya que la revisión inglesa eliminó ''away'' por no estar sustentado por el original.'
theological_decisions:
- issue: La relación de propiedad implícita en 'servants and maidservants'
  english_pob_reading: servants and maidservants
  chosen_spanish_reading: esclavos y esclavas
  alternative_spanish_readings:
  - siervos y siervas
  - sirvientes y sirvientas
  rationale: La tradición de POB favorece 'slave/esclavo' cuando la fuerza del término lo requiere. Aquí la lista de bienes y dependientes del contexto favorece mantener esa dureza semántica, en vez de suavizarla con 'siervos', que en español puede perder la carga social del término fuente.
  doctrine_reference: Lexical force over euphemism; social status terms in narrative context
- issue: Verbo de hostilidad hacia Jacob
  english_pob_reading: envied Jacob
  chosen_spanish_reading: envidiaron a Jacob
  alternative_spanish_readings:
  - tuvieron celos de Jacob
  - miraron con envidia a Jacob
  rationale: No hay indicio de conflicto doctrinal; la decisión es semántica y narrativa. 'Envidiaron' conserva una hostilidad interna y relacional, sin convertirla en una explicación psicológica más amplia que la del texto.
  doctrine_reference: Narrative plain sense; hostile jealousy as direct action
translation_notes:
  revision_awareness: La revisión inglesa eliminó la adición no sustentada 'away' en la última cláusula. La versión española evita cualquier equivalente direccional añadido y se mantiene en 'reunió sus ovejas', alineada con el texto base y la corrección auditada.
  spanish_consistency_notes:
  - Se mantiene 'Labán' con tilde según uso bíblico en español.
  - Se usa 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - La lista inicial conserva paralelismo nominal breve, siguiendo la acumulación del original y del inglés POB.
  - No se introduce puntuación explicativa adicional que altere el ritmo de la enumeración.
