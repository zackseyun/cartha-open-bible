  - Y además, manda a los hijos de Israel que no
  rationale: La fuente provista termina abruptamente; por fidelidad textual, la traducción española también queda abierta e incompleta sin intentar suplir el corte.
  doctrine_reference: Principio de integridad textual / no ampliación del texto recibido
