lexical_decisions:
- source_word: እኩይ፡ ዝንቱ፡ ግብር፡
  english_pob_choice: This deed is evil
  chosen_spanish: Esta acción es mala
  alternatives_spanish:
  - Este hecho es malo
  - Este acto es malo
  lexicon: እኩይ = evil/bad; ግብር = deed/action/act
  rationale: «Acción» comunica de forma natural el valor de ግብር como un acto realizado, y «mala» expresa el juicio moral de እኩይ sin sobrecargar el español con un giro arcaico.
- source_word: በ⁴ቅድመ፡ እግዚአብሔር።
  english_pob_choice: before the LORD
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: ቅድመ = before/in front of; እግዚአብሔር = divine name
  rationale: Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino, y «delante de» conserva la relación espacial/judicial de «before» sin convertirla en una mera fórmula eclesiástica.
- source_word: ወአንተኒ፡ አዝዝ፡
  english_pob_choice: And you also command
  chosen_spanish: Y tú también manda
  alternatives_spanish:
  - Y tú además ordena
  - Y asimismo tú manda
  lexicon: አንተ = you; አዝዝ = command/order
  rationale: «Manda» recoge el imperativo de አዝዝ con fuerza directa en español, y «tú también» refleja ወአንተኒ sin añadir matices no presentes.
- source_word: ለደቂቀ፡ እስራኤል፡
  english_pob_choice: the children of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israelita
  - a los descendientes de Israel
  lexicon: ደቂቀ = sons/children of; እስራኤል = Israel
  rationale: «Hijos de Israel» es la correspondencia más directa y tradicionalmente inteligible para el grupo étnico-pactual designado por el original.
theological_decisions:
- issue: Divine name in a judgment statement
  english_pob_reading: before the LORD
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
