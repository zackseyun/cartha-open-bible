  rationale: El texto atribuye evaluación moral directa a la presencia de Dios. Mantener el nombre propio evita ocultar la forma del original y preserva el valor teológico del juicio ante la presencia divina.
  doctrine_reference: Nombre divino / representación del Tetragrámaton
- issue: Incomplete source segment
  english_pob_reading: And you also command the children of Israel that they not
  chosen_spanish_reading: Y tú también manda a los hijos de Israel que no
