translation:
  language: es
  text: 'Hagan esto: no tomen ni den al menor antes de haber dado primero al mayor,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘንተ፡ ቃለ፡ / this thing
  english_pob_choice: Do this thing
  chosen_spanish: Hagan esto
  alternatives_spanish:
  - Hagan esta cosa
  - Hagan esto mismo
  lexicon: imperative / demonstrative
  rationale: El ge'ez usa una orden directa con valor general; «Hagan esto» reproduce la fuerza imperativa en español natural y sobrio. «Esta cosa» sería demasiado literal y poco idiomática.
- source_word: አይንሥኡ፡ / take
  english_pob_choice: take
  chosen_spanish: no tomen
  alternatives_spanish:
  - no reciban
  - no lleven
  lexicon: receive / take
  rationale: El verbo puede abarcar ‘tomar’ o ‘recibir’. La versión inglesa mantiene ‘take’, y en español «tomen» conserva esa amplitud sin introducir un matiz más específico de recepción.
- source_word: ወአየሀቡ፡ / give
  english_pob_choice: give
  chosen_spanish: ni den
  alternatives_spanish:
  - ni entreguen
  - ni concedan
  lexicon: give / give over
  rationale: «Den» corresponde directamente al verbo de dar del original y mantiene el paralelismo con «tomen».
- source_word: እንተ፡ ትንእስ፡ / the younger
  english_pob_choice: the younger
  chosen_spanish: al menor
  alternatives_spanish:
  - al más joven
  - al más pequeño
  lexicon: comparative / younger
  rationale: El ge'ez expresa comparación de edad o rango; en español «el menor» es breve, natural y suficientemente amplio para conservar la relación comparativa.
- source_word: ዘእንበለ፡ / before
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - previo a
  - antes que
  lexicon: temporal preposition
  rationale: «Antes de» expresa con claridad la prioridad temporal requerida por el original y por la traducción inglesa.
- source_word: ያቅድሙ፡ እንተ፡ ትልህቅ፡ / they first give the elder
  english_pob_choice: they first give the elder
  chosen_spanish: haber dado primero al mayor
  alternatives_spanish:
  - dar primero al mayor
  - entregar primero al mayor
  lexicon: first / elder
  rationale: La construcción española en infinitivo mantiene la subordinación temporal después de «antes de». «Mayor» refleja el contraste con «menor»; no se especifica parentesco porque el original solo establece una oposición de edad o rango.
theological_decisions:
- issue: Orden de prioridad entre menor y mayor
  english_pob_reading: the younger before they first give the elder
  chosen_spanish_reading: no tomen ni den al menor antes de haber dado primero al mayor
  alternative_spanish_readings:
  - no den al menor antes de dar primero al mayor
  - no reciban ni den al más joven antes de dar primero al mayor
  rationale: No hay aquí una formulación doctrinal, sino una instrucción de orden/prioridad. La traducción conserva la secuencia explícita entre menor y mayor sin suavizarla ni interpretarla más allá del texto.
  doctrine_reference: none
translation_notes:
  revision_awareness: La revisión inglesa solo capitalizó la apertura para un registro formal; no alteró el contenido. El español sigue de cerca la misma lectura sin necesidad de nota textual.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y claro, adecuado para una sección breve de instrucción.
  - Se conserva la oposición menor/mayor sin añadir parentesco ni contexto no presentes en el ge'ez.
  - No se introducen notas al pie porque el pasaje no presenta variantes relevantes en el audit trail inglés ni ambigüedad textual significativa en español.
