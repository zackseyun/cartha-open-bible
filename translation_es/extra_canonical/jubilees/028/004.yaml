lexical_decisions:
- source_word: ሱባዓተ፡⁴ ዓመተ፡
  english_pob_choice: these seven years
  chosen_spanish: «Estos siete años»
  alternatives_spanish:
  - «durante estos siete años»
  - «estos siete años pasados»
  lexicon: seven years
  rationale: La forma ge'ez nombra un período de siete años; el inglés POB conserva la referencia temporal breve y directa. En español, «estos siete años» transmite el mismo segmento temporal sin añadir contenido no atestiguado como duración explícita si no se desarrolla el contexto inmediato.
- source_word: ወይቤሎ፡ ላባ፡ ለያዕቆብ፡ አነ፡ እሁበከ፡ ብእሲተከ።
  english_pob_choice: And Laban said to Jacob, “I will give you your wife.”
  chosen_spanish: 'Y Labán dijo a Jacob: «Te daré a tu esposa»'
  alternatives_spanish:
  - «Te daré a tu mujer»
  - «Te daré la mujer para ti»
  lexicon: I will give / wife
  rationale: El ge'ez expresa literalmente una promesa de entrega matrimonial. «Esposa» es una opción digna y clara en español, y mantiene el vínculo con la promesa de matrimonio sin forzar un giro más interpretativo que «tu mujer».
- source_word: ወገብረ፡ ላባ፡ ግብአ፡
  english_pob_choice: And Laban made a feast
  chosen_spanish: Y Labán hizo un banquete
  alternatives_spanish:
  - Y Labán celebró un banquete
  - Y Labán preparó un banquete
  lexicon: made a feast
  rationale: El sustantivo/acción alude a un banquete festivo. «Hizo un banquete» sigue de cerca la formulación de la fuente y coincide con el tono sobrio de la POB, mientras que «celebró» o «preparó» explicitarían más de lo que el fragmento exige.
