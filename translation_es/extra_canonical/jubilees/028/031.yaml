translation:
  language: es
  text: y ella le dio a luz un cuarto hijo, y él le puso por nombre Judá[a], el día quince del tercer mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ella le puso por nombre»
    reason: La auditoría inglesa conserva como alternativa la lectura previa «she called»; en español conviene preservar esa posibilidad en nota, aunque el texto principal siga la forma masculina del ge'ez base.
lexical_decisions:
- source_word: ወለደት፡ ሎቱ፡ ወልደ፡ ራብዐ፡
  english_pob_choice: she bore him a fourth son
  chosen_spanish: ella le dio a luz un cuarto hijo
  alternatives_spanish:
  - ella tuvo para él un cuarto hijo
  - ella le engendró un cuarto hijo
  lexicon: dar a luz
  rationale: El ge'ez usa un verbo femenino singular para el nacimiento; por eso se conserva el sujeto femenino explícito. «Dar a luz» comunica de forma natural y fiel la acción de alumbrar, sin desplazar el sujeto a una forma impersonal.
- source_word: ወጽውዐ፡ ስሞ፡
  english_pob_choice: and he called his name Judah
  chosen_spanish: y le puso por nombre Judá
  alternatives_spanish:
  - y llamó su nombre Judá
  - y ella le puso por nombre Judá
  lexicon: poner por nombre / llamar
  rationale: Aunque el texto ge'ez base, según la revisión más reciente, tiene verbo masculino («él llamó»), la formulación española puede mantenerse neutral en cuanto al sujeto mediante la construcción «le puso por nombre», que refleja el acto de nombrar sin forzar el género del agente. Esto conserva la tensión documental entre la lectura base y la posible alineación con Génesis 29:35, sin imponer una corrección no explicitada en el propio texto fuente.
- source_word: በዐሡሩ፡ ወኀሙሱ፡ ለወርኅ፡ ሣልስ፡
  english_pob_choice: on the fifteenth day of the third month
  chosen_spanish: el día quince del tercer mes
  alternatives_spanish:
  - en el día quince del tercer mes
  - el quince del tercer mes
  lexicon: día / mes
  rationale: La expresión temporal se traduce de forma directa y lecturaria. «El día quince del tercer mes» suena natural en español bíblico y conserva el valor calendárico exacto del original.
theological_decisions:
- issue: 'Atribución del acto de nombrar: lectura masculina del ge''ez frente a la tradición narrativa de Génesis'
  english_pob_reading: and she called his name Judah
  chosen_spanish_reading: y le puso por nombre Judá
  alternative_spanish_readings:
  - y ella le puso por nombre Judá
  - y él le puso por nombre Judá
  rationale: La base ge'ez revisada apunta a un sujeto masculino para el verbo de nombrar, pero el trasfondo narrativo conocido de Génesis asocia el nombre con Lea. La formulación española escogida evita fijar sin necesidad un sujeto gramatical que el español no exige en esta construcción, preservando la tensión textual sin resolverla artificialmente.
  doctrine_reference: Crítica textual y lectura canónica comparada
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente que corrigió la versión previa de «she called» a «he called» en el ge'ez. Para no introducir una solución no atestiguada, el español usa una construcción de nombramiento menos marcada en cuanto al sujeto.
  spanish_consistency_notes:
  - Se mantiene «Judá» como forma estable del nombre propio.
  - No se usa «SEÑOR» ni terminología no presente en el pasaje.
  - La referencia temporal conserva el orden y el valor numérico del original.
