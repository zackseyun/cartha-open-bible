translation:
  language: es
  text: Una casa para mí,[a] porque he cumplido los años por los cuales te serví por tus dos hijas, y me iré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice literalmente ‘para mí, una casa’. Se traduce ‘Una casa para mí’ para sonar natural en español, manteniendo la lectura del texto fuente y no la armonización con el paralelo de Génesis.
    reason: literal_rendering_clarification
lexical_decisions:
- source_word: ሊተ፡ ቤተ፡
  english_pob_choice: a house for myself
  chosen_spanish: una casa, para mí
  alternatives_spanish:
  - una casa para mí
  - un hogar para mí
  - una casa para mí
  lexicon: בית / ቤት
  rationale: El ge'ez expresa literalmente la idea de ‘para mí, una casa’. En español, conservar ‘casa’ reproduce la imagen concreta sin importar una lectura ajena del paralelo bíblico. La colocación ‘Para mí, una casa’ mantiene la fuerza enfática del dativo sin añadir verbo no presente en el texto.
- source_word: ፈጸምኩ፡ ዓመታተ፡
  english_pob_choice: I have completed the years
  chosen_spanish: he cumplido los años
  alternatives_spanish:
  - he completado los años
  - he terminado los años
  lexicon: שׁלם / ἐπιτελέω-type completion
  rationale: ‘Cumplir’ en español comunica bien la idea de haber llegado al término fijado. ‘He completado’ es posible, pero suena más técnico; ‘he terminado’ pierde el matiz de período pactado cumplido.
- source_word: ዘተቀነይኩ፡ ለከ፡
  english_pob_choice: for which I served you
  chosen_spanish: por los cuales te serví
  alternatives_spanish:
  - por los cuales te he servido
  - por los que trabajé para ti
  lexicon: עבד / δουλεύω
  rationale: ‘Serví’ conserva la relación de servicio personal indicada por el texto. No se opta por ‘trabajé’ porque atenúa la carga relacional y no refleja tan claramente el lenguaje de servicio del original.
- source_word: ህየንተ፡ ክልኤቲ፡ አዋልዲከ፡
  english_pob_choice: for your two daughters
  chosen_spanish: por tus dos hijas
  alternatives_spanish:
  - por causa de tus dos hijas
  - por tus dos hijas
  lexicon: בְּנוֹת / daughters
  rationale: Se mantiene la referencia explícita a ‘tus dos hijas’ porque el texto la presenta como motivo de los años de servicio. ‘Por’ aquí reproduce la relación causal/compensatoria del pasaje.
theological_decisions:
- issue: El sintagma inicial parece corresponder a la línea ge'ez transmitida, aunque en el audit trail inglés hubo una revisión que quiso armonizarlo con el paralelo de Génesis.
  english_pob_reading: a house for myself
  chosen_spanish_reading: una casa, para mí
  alternative_spanish_readings:
  - dame a mi esposa
  - dame mi esposa
  rationale: Se sigue el testimonio ge'ez dado en el paquete fuente y la revisión crítica que corrigió la lectura importada del paralelo. No se introduce ‘esposa’ porque no está respaldado por este verso en el texto fuente suministrado.
  doctrine_reference: Prioridad del texto fuente en crítica de traducción; evitar armonización no sustentada por el testimonio base.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: una pasada posterior intentó sustituir la lectura fuente por una armonización con Génesis (‘dame mi esposa’), pero el paquete fuente y la revisión crítica posterior señalan que el ge''ez aquí dice ‘para mí, una casa’. Por eso la versión española sigue la lectura literal del testimonio base.'
  spanish_consistency_notes:
  - Se mantiene ‘casa’ para reflejar el texto ge'ez recibido, aunque esta expresión resulte inesperada respecto del paralelo bíblico.
  - Se usa ‘serví’ como verbo de servicio personal y no se sustituye por ‘trabajé’.
  - La puntuación busca sonar natural en español sin suavizar la estructura acumulativa del original.
