  text: for Rachel I served you, and not for Leah. Why have you wronged me? Take your daughter,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:08Z'
    unchanged: false
    changes_summary: Recast the opening to reflect the first-person verb explicitly ('I served you') and removed the awkward participial phrasing. Kept the final imperative as 'Take your daughter,' which matches the source more naturally in formal English.
translation:
  language: es
  text: porque por Raquel te serví, y no por Lea. ¿Por qué me has agraviado? Toma a tu hija,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ተቀነይኩ
  english_pob_choice: I served you
  chosen_spanish: te serví
  alternatives_spanish:
  - te he servido
  - he servido para ti
  lexicon: Geez ተቀነይኩ
  rationale: El giro verbal expresa servicio realizado en favor de otro; en español, 'te serví' reproduce de forma natural la relación personal y el valor de acción cumplida que el inglés POB explicitó como 'I served you'.
- source_word: ለከ
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: Geez ለከ
  rationale: El destinatario es directo y personal; el clítico 'te' conserva la cercanía sintáctica del objeto en español sin añadir una preposición innecesaria.
- source_word: ራሔል / ልያ
  english_pob_choice: Rachel / Leah
  chosen_spanish: Raquel / Lea
  alternatives_spanish:
  - Rajel / Lía
  lexicon: Nombres propios bíblicos
  rationale: '''Raquel'' y ''Lea'' son las formas bíblicas estándar y plenamente inteligibles en español; mantienen la identificación de las dos hermanas sin forzar transliteraciones menos naturales.'
- source_word: ፋዕከኒ
  english_pob_choice: Why have you wronged me?
  chosen_spanish: ¿Por qué me has agraviado?
  alternatives_spanish:
  - ¿Por qué me has hecho mal?
  - ¿Por qué me has tratado injustamente?
  lexicon: Geez ፋዕከኒ
  rationale: '''Agraviado'' conserva la idea de daño/injusticia personal con un registro digno y bíblico, evitando tanto la vaguedad de ''hacer mal'' como una paráfrasis excesiva.'
- source_word: ንግአ፡ ወሰተከ፡
  english_pob_choice: Take your daughter,
  chosen_spanish: Toma a tu hija,
  alternatives_spanish:
  - Recibe a tu hija,
  - Lleva a tu hija,
  lexicon: Geez imperativo + objeto
  rationale: El imperativo breve del texto se refleja de manera directa; 'Toma a tu hija' sigue el valor exhortativo/narrativo del inglés POB sin expandir el mandato.
theological_decisions:
- issue: Relación entre servicio y reclamo de injusticia dentro del contexto narrativo
  english_pob_reading: for Rachel I served you, and not for Leah. Why have you wronged me?
  chosen_spanish_reading: porque por Raquel te serví, y no por Lea. ¿Por qué me has agraviado?
  alternative_spanish_readings:
  - porque te serví por Raquel, y no por Lea. ¿Por qué me has hecho mal?
  - pues por Raquel te serví, y no por Lea. ¿Por qué me has tratado injustamente?
  rationale: La formulación mantiene el vínculo causal entre el servicio prestado y la acusación de agravio, sin suavizar la queja ni convertirla en una explicación meramente afectiva. El verbo 'agraviar' conserva mejor la tensión judicial/personal del reproche.
  doctrine_reference: Narrative justice in patriarchal family conflict; no doctrinal claim beyond the text.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que explicitó el verbo de primera persona ('I served you') y conservó el imperativo final ('Take your daughter'). El español refleja esa misma decisión, manteniendo el orden causal 'por Raquel te serví' para evitar una construcción artificial y sostener la claridad narrativa.
  spanish_consistency_notes:
  - Se conservan los nombres bíblicos tradicionales 'Raquel' y 'Lea'.
  - Se mantiene el tono directo de reproche y mandato breve, acorde con el registro narrativo del pasaje.
  - No se introduce 'Cristo', 'SEÑOR' ni otras normalizaciones ajenas al texto.
