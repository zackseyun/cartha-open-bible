review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del ge''ez y del POB inglés: contraste entre la preferencia por Esaú y el afecto recto por Jacob, exhortación a seguir tratándolo bien, y promesa de que Jacob será bendición para la tierra a lo largo de las generaciones. Sin embargo, en español hay dos puntos mejorables para mayor fidelidad y naturalidad: «afecto justo» suena poco idiomático, y «desde ahora y por todas las generaciones» conviene ajustarlo a una formulación más natural que preserve el alcance temporal.'
  spanish_quality_summary: El texto es claro y legible, pero presenta una combinación léxica algo forzada en «afecto justo». Una forma como «afecto recto» o «amor recto» comunica mejor la evaluación moral sin sonar calcada. También «sigue aún mostrando bondad» es comprensible, pero «sigue mostrándole bondad» fluye mejor en español e integra el pronombre de objeto indirecto de manera más natural.
  glossary_alignment: 'No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). Las decisiones principales son correctas: «ama», «Esaú», «Jacob», «bendición». Recomiendo ajustar «righteous affection» a «afecto recto» para reflejar mejor ጽድቅ en español eclesial-natural. La nota alternativa sobre «ama» no es necesaria, porque «He loves Esau» ya queda bien representado por «Él ama a Esaú».'
  issues:
  - severity: medium
    issue: «tu afecto justo» suena poco idiomático en español
    rationale: Aunque semánticamente posible, «afecto justo» no es una colocación natural en español bíblico moderno. «Afecto recto» conserva el matiz moral de righteousness con mejor legibilidad.
  - severity: low
    issue: «sigue aún mostrando bondad hacia él» puede hacerse más natural
    rationale: La construcción es entendible, pero «sigue mostrándole bondad» suena más fluida y mantiene el sentido exhortativo.
  - severity: low
    issue: La nota [a] no aporta una alternativa útil en español
    rationale: 'La nota inglesa registra un historial de traducción previo, no una ambigüedad que el español deba conservar. «Or: lo ama a Esaú» además suena menos natural que el texto principal.'
  revised_spanish_text: Él ama a Esaú más que a Jacob, pero veo tu afecto recto por Jacob. Y sigue aún mostrándole bondad, y que tus ojos estén puestos en él con amor, porque él será una bendición en la tierra desde ahora y por todas las generaciones de la tierra.
  revision_rationale: Se elimina la nota innecesaria; se cambia «afecto justo» por «afecto recto» para mejorar la naturalidad sin perder el matiz moral; y se ajusta «mostrando bondad hacia él» a «mostrándole bondad» para un español más fluido. El resto del versículo preserva fielmente el sentido del original y del POB inglés.
