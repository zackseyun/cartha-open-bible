translation:
  language: es
  text: Él ama[a] a Esaú más que a Jacob, pero veo tu afecto justo por Jacob. Y sigue aún mostrando bondad hacia él, y que tus ojos estén puestos en él con amor, porque él será una bendición en la tierra desde ahora y por todas las generaciones de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: «lo ama a Esaú».'
    reason: alternative_reading
lexical_decisions:
- source_word: ያፈቅሮ
  english_pob_choice: He loves Esau
  chosen_spanish: Él ama[a] a Esaú
  alternatives_spanish:
  - Él quiere a Esaú
  - Él tiene amor por Esaú
  lexicon: He loves / love
  rationale: El ge'ez presenta un verbo en tercera persona masculina ya completo en sentido, por lo que se conserva el sujeto explícito en español. «Ama» es la forma más natural y fiel; «quiere» o «tiene amor por» suavizan demasiado el verbo.
- source_word: መፍቀሪተ ጽድቅ
  english_pob_choice: your righteous affection
  chosen_spanish: tu afecto justo
  alternatives_spanish:
  - tu amor justo
  - tu amor recto
  lexicon: love/affection + righteousness/justice
  rationale: La combinación expresa una afección aprobada moralmente; «afecto justo» mantiene la tensión entre cariño y rectitud sin imponer un matiz más técnico que el texto no exige.
- source_word: ወይኩና አዕይንትኪ ላዕሌሁ ለፍቅር
  english_pob_choice: let your eyes be upon him in love
  chosen_spanish: que tus ojos estén puestos en él con amor
  alternatives_spanish:
  - y que tus ojos estén sobre él en amor
  - y mira hacia él con amor
  lexicon: eyes be upon / in love
  rationale: «Estén puestos en él» reproduce la imagen idiomática de vigilancia favorable; «con amor» conserva el complemento afectivo sin volverlo una paráfrasis libre.
- source_word: ይከውን
  english_pob_choice: he will be a blessing
  chosen_spanish: él será una bendición
  alternatives_spanish:
  - él llegará a ser una bendición
  - él vendrá a ser una bendición
  lexicon: will be / blessing
  rationale: Se mantiene el valor futuro simple y la metáfora de bendición de forma transparente y natural en español.
theological_decisions:
- issue: Relación afectiva entre Dios y Esaú/Jacob dentro de la bendición patriarcal
  english_pob_reading: He loves Esau more than Jacob, but I see your righteous affection for Jacob.
  chosen_spanish_reading: Él ama a Esaú más que a Jacob, pero veo tu afecto justo por Jacob.
  alternative_spanish_readings:
  - Él ama a Esaú más que a Jacob, pero veo tu amor justo por Jacob.
  - Ama a Esaú más que a Jacob, pero veo tu afecto recto por Jacob.
  rationale: Se conserva la tensión comparativa («más que») y la evaluación moral positiva del afecto por Jacob sin suavizar la preferencia explícita del texto.
  doctrine_reference: Elección patriarcal y lenguaje afectivo en Jubileos 19:20
translation_notes:
  revision_awareness: La revisión reciente corrigió la gramática inglesa añadiendo el sujeto implícito «He»; la traducción española ya lo expresa explícitamente con «Él ama», por lo que no requiere ajuste adicional. También se tuvo en cuenta que el texto base presenta la comparación afectiva entre Esaú y Jacob sin atenuarla.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «siervo» o «Cristo» porque no aparecen en el pasaje.
  - «Bendición» y «afecto justo» mantienen un registro bíblico claro sin recurrir a formulaciones eclesiásticas tradicionales no motivadas por el fuente.
