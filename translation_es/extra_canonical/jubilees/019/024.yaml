base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/024.yaml
  text: May God be mine and my seed's, Jacob's and his seed's, forever. And in his seed my name and the name of my fathers—Shem and Noah and Enoch and Mahalalel and Enosh and Seth—shall be blessed.
  footnotes:
  - marker: a
    text: Or 'and my seed shall belong to Jacob and to his seed forever.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:19Z'
    unchanged: false
    changes_summary: Changed 'always' to 'forever' for a more natural formal rendering of ኵሎ መዋዕለ, and completed the second clause by adding 'shall be blessed' to reflect ይትባረክ, which was omitted in the draft.
translation:
  language: es
  text: Que Dios sea mío[a] y de mi descendencia, de Jacob y de su descendencia, para siempre. Y en su descendencia serán bendecidos mi nombre y el nombre de mis padres—Sem, Noé, Enoc, Mahalalel, Enós y Set—.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''y mi descendencia pertenecerá a Jacob y a su descendencia para siempre''.'
    reason: Preserva la lectura alternativa documentada en la nota de la POB inglesa para la primera cláusula.
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: Dios
  rationale: El texto ge'ez abre con el sujeto divino explícito; la POB inglesa también lo conserva como 'God'. En español, 'Dios' es el equivalente directo y evita oscurecer el sujeto con una sustitución devocional.
- source_word: ኪያየ
  english_pob_choice: mine / my
  chosen_spanish: mío
  alternatives_spanish:
  - para mí
  - de mí
  lexicon: posesivo pronominal
  rationale: 'La secuencia expresa pertenencia relacional: ''be mine''. ''Mío'' reproduce mejor esa relación que una paráfrasis causal o locativa.'
- source_word: ወዘርእየ
  english_pob_choice: and my seed's
  chosen_spanish: y de mi descendencia
  alternatives_spanish:
  - y mi descendencia
  - y de mi simiente
  lexicon: descendencia
  rationale: '''Seed'' en este contexto es linaje/descendencia, no semilla literal. ''Descendencia'' mantiene la idea genealógica y es natural en español bíblico actual.'
- source_word: ይኩን
  english_pob_choice: May ... be
  chosen_spanish: Que ... sea
  alternatives_spanish:
  - Sea ...
  - Ojalá ... sea
  lexicon: subjuntivo exhortativo
  rationale: El ge'ez expresa deseo/voluntad. En español, 'Que ... sea' comunica ese valor sin forzar un futuro ni una simple constatación.
- source_word: ለያዕቆብ ወለዘርኡ
  english_pob_choice: Jacob's and his seed's
  chosen_spanish: de Jacob y de su descendencia
  alternatives_spanish:
  - de Jacob y de su simiente
  - perteneciente a Jacob y a su descendencia
  lexicon: posesión relacional
  rationale: El inglés POB entiende una relación de pertenencia/referencia a Jacob y su linaje. En español, la repetición de 'de' preserva esa relación de modo claro y no ambiguo.
- source_word: ኵሎ መዋዕለ
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: duración indefinida
  rationale: La revisión inglesa cambió 'always' por 'forever' para reflejar mejor la duración total. 'Para siempre' es el equivalente más natural y formal en español.
- source_word: ይትባረክ
  english_pob_choice: shall be blessed
  chosen_spanish: serán bendecidos
  alternatives_spanish:
  - será bendito
  - será bendecida
  - serán bendecidos
  lexicon: voz pasiva/predictiva
  rationale: El verbo ge'ez exige completar la segunda cláusula con una forma de bendición. 'Serán bendecidos' conserva la pasiva y permite concordar con el sujeto compuesto 'mi nombre y el nombre de mis padres'.
- source_word: ስምየ ወስመ አበዊየ
  english_pob_choice: my name and the name of my fathers
  chosen_spanish: mi nombre y el nombre de mis padres
  alternatives_spanish:
  - mi nombre y el nombre de mis padres antepasados
  - mi nombre y el nombre de mis padres/patriarcas
  lexicon: padres / fathers
  rationale: '''Fathers'' aquí apunta a los antepasados nombrados que siguen. ''Padres'' es idiomático en español bíblico y preserva la relación ancestral sin introducir una glosa interpretativa en el texto principal.'
theological_decisions:
- issue: Relación de pertenencia entre Dios, Jacob y la descendencia
  english_pob_reading: May God be mine and my seed's, Jacob's and his seed's, forever.
  chosen_spanish_reading: Que Dios sea mío y de mi descendencia, de Jacob y de su descendencia, para siempre.
  alternative_spanish_readings:
  - Que Dios me pertenezca a mí y a mi descendencia, a Jacob y a su descendencia, para siempre.
  - Que Dios sea mío y la herencia de mi descendencia, de Jacob y de su descendencia, para siempre.
  rationale: La cláusula es una fórmula de alianza/pertenencia, no una mera afirmación doctrinal abstracta. 'Sea mío' conserva la tensión relacional sin convertirla en propiedad materialista ni suavizarla a una simple 'bendición'.
  doctrine_reference: Pacto/alianza y lenguaje de pertenencia en fórmulas patriarcales; cf. Génesis 17 y lenguaje de relación de pacto.
- issue: Estatus del término 'seed' aplicado a la descendencia de Abraham/Isaac/Jacob
  english_pob_reading: seed
  chosen_spanish_reading: descendencia
  alternative_spanish_readings:
  - simiente
  - linaje
  rationale: '''Descendencia'' evita ambigüedad botánica en español moderno y conserva la fuerza genealógica del término. No se elimina la tensión lexical; simplemente se elige el equivalente más claro para el lector general.'
  doctrine_reference: Lenguaje genealógico de promesa y bendición en los patriarcas.
- issue: 'Valor de la última cláusula: bendición sobre nombres y antepasados'
  english_pob_reading: shall be blessed
  chosen_spanish_reading: serán bendecidos
  alternative_spanish_readings:
  - sea bendito
  - será bendecido
  rationale: 'La forma plural en español respeta la coordinación de dos objetos: ''mi nombre y el nombre de mis padres''. Se mantiene la pasiva de bendición tal como la revisión inglesa la restauró.'
  doctrine_reference: Bendición transmitida en la línea patriarcal; cf. fórmulas de bendición ancestral.
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió dos problemas importantes: restauró a Dios como sujeto explícito de la primera cláusula y añadió la clausula final ''shall be blessed''. La versión española sigue esas correcciones de manera directa, sin depender de la redacción previa errónea que hacía del linaje el sujeto principal.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' en lugar de 'Yahvé' porque el source payload no presenta el Tetragrámaton sino el término divino general.
  - '''Descendencia'' se usa de manera consistente para ''seed'' en un contexto genealógico y pactal.'
  - '''Padres'' funciona aquí como antepasados inmediatos/ancestrales, en correspondencia con la enumeración posterior de nombres propios.'
