base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/011.yaml
  text: And Abraham took for himself a third wife, and her name was Keturah, from among the daughters of the servants of his household.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:17Z'
    unchanged: false
    changes_summary: Revised the final phrase from 'his household servants' to 'the servants of his household' for closer alignment with the source wording and more formal register; retained the rest unchanged.
translation:
  language: es
  text: Y Abraham tomó para sí una tercera esposa, y su nombre fue Cetura, de entre las hijas de los siervos de su casa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ብእሲተ ሣልስተ
  english_pob_choice: a third wife
  chosen_spanish: una tercera esposa
  alternatives_spanish:
  - una esposa tercera
  - una tercera mujer
  lexicon: wife / spouse
  rationale: El ge'ez expresa de manera directa la idea de una tercera esposa. «Esposa» mantiene el sentido matrimonial; «tercera» preserva el orden numeral sin añadir matices no presentes.
- source_word: ኬጡራ
  english_pob_choice: Keturah
  chosen_spanish: Cetura
  alternatives_spanish:
  - Keturah
  lexicon: nombre propio
  rationale: Se mantiene el nombre propio en forma española tradicional y legible. «Cetura» conserva la referencia bíblica sin introducir una transliteración menos natural en español.
- source_word: እምነ፡ አዋልደ፡ ልደ፡ ቤቱ፡
  english_pob_choice: from among the daughters of the servants of his household
  chosen_spanish: de entre las hijas de los siervos de su casa
  alternatives_spanish:
  - de entre las hijas de los servidores de su casa
  - de entre las hijas de los esclavos de su casa
  lexicon: daughters / servants / household
  rationale: «Hijas» corresponde con አዋልደ. Para ልደ ቤቱ, la POB inglesa ajustó la frase a «the servants of his household»; en español, «siervos de su casa» refleja con formalidad y fidelidad la relación doméstica de pertenencia. «Servidores» es posible, pero atenúa el valor léxico de servicio subordinado; «esclavos» sería demasiado fuerte sin una justificación contextual adicional en este versículo.
theological_decisions:
- issue: Relación social en la casa de Abraham
  english_pob_reading: servants of his household
  chosen_spanish_reading: siervos de su casa
  alternative_spanish_readings:
  - servidores de su casa
  - esclavos de su casa
  rationale: El texto no desarrolla una tesis doctrinal, pero sí presenta una estructura doméstica jerárquica. «Siervos» preserva la dependencia y evita suavizar el término más allá de lo que el contexto permite. Se evita «esclavos» porque aquí el foco es la pertenencia a la casa, no una discusión explícita sobre condición jurídica.
  doctrine_reference: patriarcal household / social status wording
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de «daughters of his household servants» a «the servants of his household» para alinearse mejor con el ge''ez. La redacción española sigue esa revisión y conserva la relación genitiva correcta: los siervos pertenecen a la casa de Abraham.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la coordinación narrativa del texto fuente.
  - Se usa «fue» con nombre propio en estilo bíblico sobrio, sin forzar un calco innecesario de la sintaxis inglesa.
  - «Casa» traduce de modo natural la referencia al ámbito doméstico/familiar del ge'ez.
