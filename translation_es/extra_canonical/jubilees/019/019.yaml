translation:
  language: es
  text: que se distinguirá de entre todas las naciones que están sobre la faz de la tierra. Y ahora, Isaac, mi hijo
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዘይቀውም
  english_pob_choice: who will stand out
  chosen_spanish: que se distinguirá
  alternatives_spanish:
  - que se levantará
  - que sobresaldrá
  - que se pondrá aparte
  lexicon: Geez ዘይቀውም
  rationale: El contexto apunta a una distinción o separación de entre las naciones; en español, «se distinguirá» conserva la idea de quedar marcado/diferenciado sin añadir una imagen más concreta que el texto no exige.
- source_word: እምኵሎሙ፡ አሕዛብ
  english_pob_choice: from among all the nations
  chosen_spanish: de entre todas las naciones
  alternatives_spanish:
  - entre todas las naciones
  - de todas las naciones
  lexicon: Geez እም ... ኵሎሙ አሕዛብ
  rationale: La preposición compuesta expresa separación desde un conjunto; «de entre» mantiene mejor la fuerza distributiva que un simple «entre».
- source_word: ዲበ፡ ገጸ፡ ምድር
  english_pob_choice: on the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie de la tierra
  - en la tierra
  lexicon: Geez ዲበ ገጸ ምድር
  rationale: «Faz de la tierra» es una equivalencia española estable y digna para la imagen idiomática del texto, sin perder el registro bíblico.
- source_word: ወናሁ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y he aquí ahora
  - Ahora bien
  lexicon: Geez ወናሁ
  rationale: La partícula introduce transición discursiva; «Y ahora» reproduce con naturalidad la progresión del discurso en español.
- source_word: ይስሐቅ፡ ወልድየ
  english_pob_choice: Isaac my son
  chosen_spanish: Isaac, mi hijo
  alternatives_spanish:
  - Isaac mi hijo
  - mi hijo Isaac
  lexicon: Geez nombre propio + posesivo
  rationale: Se conserva la apelación directa con la coma natural en español, como reflejó la revisión inglesa, para marcar la invocación sin alterar el orden semántico.
theological_decisions:
- issue: Referencia a las naciones de la tierra
  english_pob_reading: all the nations that are on the face of the earth
  chosen_spanish_reading: todas las naciones que están sobre la faz de la tierra
  alternative_spanish_readings:
  - todas las naciones de la tierra
  - todas las naciones que hay sobre la tierra
  rationale: No hay cambio doctrinal; se mantiene la universalidad de las naciones con un giro idiomático bíblico comprensible en español.
  doctrine_reference: Universalidad de los pueblos / lenguaje bíblico de la tierra
- issue: Valor de la frase de distinción
  english_pob_reading: who will stand out from among all the nations
  chosen_spanish_reading: que se distinguirá de entre todas las naciones
  alternative_spanish_readings:
  - que sobresaldrá de entre todas las naciones
  - que será separado de entre todas las naciones
  rationale: El texto sugiere diferenciación especial; «se distinguirá» deja abierta la tensión entre prominencia y separación sin forzar una lectura más teológica de la que el pasaje inmediato exige.
  doctrine_reference: Identidad elegida / distinción de un pueblo dentro de las naciones
translation_notes:
  revision_awareness: La revisión inglesa introdujo solo una coma tras «And now» por fluidez. No afectó el contenido; el español incorpora esa pausa natural con «Y ahora,».
  spanish_consistency_notes:
  - Se mantiene «Isaac» sin traducción como nombre propio.
  - Se evita «SEÑOR» o equivalentes porque el verso no contiene el nombre divino.
  - El registro conserva una cadencia bíblica sobria sin añadir material explicativo.
