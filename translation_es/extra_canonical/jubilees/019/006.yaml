translation:
  language: es
  text: 'es decir, Hebrón, por cuatrocientas piezas de plata. Y le insistieron, diciendo: «Te lo daremos por nada», pero no lo recibió de sus manos por nada[a], porque dio el precio completo en plata por el lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «pero no lo recibió de sus manos, porque». Sin embargo, el texto auditado conserva la repetición de «por nada» también en la negativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: ይእቲ፡' ኬብሮን፡
  english_pob_choice: that is, Hebron
  chosen_spanish: es decir, Hebrón
  alternatives_spanish:
  - o sea, Hebrón
  - es decir, Hebrón
  lexicon: toponym / explanatory apposition
  rationale: La frase introduce una aclaración identificativa; «es decir» conserva el valor explicativo sin añadir interpretación.
- source_word: በ*አርባዕቱ፡ ምእት፡' ብሩር።
  english_pob_choice: for four hundred pieces of silver
  chosen_spanish: por cuatrocientos piezas de plata
  alternatives_spanish:
  - por cuatrocientos siclos de plata
  - por cuatrocientos piezas de plata
  lexicon: currency phrase
  rationale: Se mantiene la referencia cuantitativa y material del pago en plata. «Piezas de plata» sigue el sentido general del texto y el audit trail inglés sin imponer una unidad más específica no explicitada aquí.
- source_word: ወእሙንቱ፡' ያስተበቍዕዎ፡
  english_pob_choice: And they urged him
  chosen_spanish: Y le insistieron
  alternatives_spanish:
  - Y lo suplicaron
  - Y le rogaban
  lexicon: verb of pressing/urging
  rationale: El verbo expresa presión insistente; «insistieron» reproduce bien esa fuerza en español, con naturalidad contemporánea.
- source_word: እንዘ፡ ይብሉ፡ ንሁብከ፡'° በከ፡
  english_pob_choice: saying, “We will give it to you for nothing,”
  chosen_spanish: 'diciendo: «Te lo daremos por nada»'
  alternatives_spanish:
  - 'diciendo: «Te lo daremos gratis»'
  - 'diciendo: «Te lo daremos por nada»'
  lexicon: gratis / for nothing
  rationale: «Por nada» conserva el matiz de gratuidad del giro repetido en Ge'ez y en el audit trail inglés; «gratis» sería posible, pero «por nada» refleja mejor la repetición lexical del original.
- source_word: ወአነሥአ፡" እምእዴሆሙ፡ በከ፡
  english_pob_choice: but he did not take it from their hands for nothing
  chosen_spanish: pero no lo recibió de sus manos por nada[a]
  alternatives_spanish:
  - pero no lo tomó de sus manos por nada[a]
  - pero no lo recibió de sus manos gratuitamente[a]
  lexicon: receive/take + gratis
  rationale: «No lo recibió de sus manos» sigue la imagen concreta del original y del inglés auditado. Se conserva además la repetición de «por nada», importante para el matiz textual.
- source_word: እስመ፡ ወሀቦ፡ ሤጦ፡ ለመካን፡ ብሩረ፡ ፍጹመ፡
  english_pob_choice: because he gave the full price in silver for the place
  chosen_spanish: porque dio el precio completo en plata por el lugar
  alternatives_spanish:
  - porque dio el precio pleno en plata por el lugar
  - porque pagó el precio completo en plata por el lugar
  lexicon: full price / complete payment
  rationale: «Precio completo» expresa la idea de pago íntegro; «en plata» conserva el medio de pago sin forzar una equivalencia monetaria más técnica que no está explicitada en el texto fuente.
theological_decisions:
- issue: Pago íntegro y negativa a recibirlo gratis
  english_pob_reading: He did not take it from their hands for nothing, because he gave the full price in silver for the place.
  chosen_spanish_reading: No lo recibió de sus manos por nada, porque dio el precio completo en plata por el lugar.
  alternative_spanish_readings:
  - no lo recibió gratuitamente de sus manos, porque dio el precio completo en plata por el lugar
  - no lo tomó de sus manos sin pago, porque dio el precio completo en plata por el lugar
  rationale: El punto narrativo-teológico es que el patriarca no acepta la propiedad como don gratuito, sino mediante pago íntegro. La traducción mantiene esa tensión sin suavizarla.
  doctrine_reference: Narrativa patriarcal / adquisición legítima de la sepultura
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que restauró la segunda ocurrencia de la idea «for nothing» en el inglés auditado; por eso el español repite «por nada» en la cláusula de negativa y ancla la nota a esa frase. También se conservó el sentido de pago completo en plata sin convertirlo en una unidad monetaria no explícita.
  spanish_consistency_notes:
  - Se usa «Hebrón» como topónimo fijo y «plata» para el medio de pago.
  - Se preserva la repetición de la idea «por nada» para reflejar la insistencia del texto fuente.
  - Se evita «SEÑOR» o terminología teológica ajena porque este versículo no contiene el nombre divino ni títulos cristológicos.
