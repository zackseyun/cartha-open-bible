  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Plata», «lugar» y la repetición de «por nada» están bien alineadas con las decisiones documentadas. No intervienen aquí términos sensibles como Yahvé, Mesías, Espíritu, esclavo, etc.
