base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/010.yaml
  text: And in the fourth year of it he took a wife for Isaac his son, and her name was Rebekah, daughter of Bethuel, the son of Nahor, Abraham’s brother, the sister of Laban, and the daughter of Bethuel; and Bethuel was the son of Milcah, the wife of Nahor, Abraham’s brother.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:18Z'
    unchanged: false
    changes_summary: 'Revised to more fully reflect the repeated genealogical elements in the source rather than compressing them into ''granddaughter of Milcah.'' Added ''the daughter of Bethuel'' and made the final clause explicit: ''Bethuel was the son of Milcah, the wife of Nahor, Abraham’s brother.'' Also adjusted phrasing slightly for formal consistency.'
translation:
  language: es
  text: Y en el cuarto año tomó esposa para Isaac, su hijo, y su nombre era Rebeca, hija de Betuel, hijo de Nacor, hermano de Abraham, hermana de Labán, e hija de Betuel; y Betuel era el hijo de Milca, la esposa de Nacor, hermano de Abraham.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / Lord-style referent in context
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y así
  lexicon: N/A
  rationale: El comienzo del verso en el texto fuente es una continuación narrativa simple; en español, 'Y' conserva la coordinación y el flujo sin añadir causalidad o temporalidad extra.
- source_word: በዓመት፡ ራብዕ፡
  english_pob_choice: in the fourth year of it
  chosen_spanish: en el cuarto año de ello
  alternatives_spanish:
  - en su cuarto año
  - en el cuarto año de eso
  lexicon: N/A
  rationale: La referencia pronominal del año se mantiene de forma cercana al original; 'de ello' conserva el antecedente implícito del periodo mencionado en el contexto inmediato sin forzar una paráfrasis.
- source_word: ነሥአ፡ ለይስሐቅ፡ ወልዱ፡ ብእሲተ፡
  english_pob_choice: he took a wife for Isaac his son
  chosen_spanish: tomó esposa para Isaac, su hijo
  alternatives_spanish:
  - le tomó esposa a Isaac, su hijo
  - tomó una esposa para Isaac, su hijo
  lexicon: N/A
  rationale: '''Tomó esposa para'' refleja el acto de procurar matrimonio para el hijo, sin introducir un giro idiomático ajeno al texto. Se evita ''le tomó'' por sonoridad menos directa en este contexto.'
- source_word: ርብቃ
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Ribca
  - Rébeka
  lexicon: N/A
  rationale: Nombre propio bíblico establecido en español como 'Rebeca'.
- source_word: ባቱኤል
  english_pob_choice: Bethuel
  chosen_spanish: Betuel
  alternatives_spanish:
  - Bethuel
  lexicon: N/A
  rationale: Se usa la forma española habitual 'Betuel' para el nombre propio.
- source_word: ናኮር
  english_pob_choice: Nahor
  chosen_spanish: Nacor
  alternatives_spanish:
  - Nahor
  lexicon: N/A
  rationale: Se adopta la forma española tradicional 'Nacor', más reconocible en castellano bíblico.
- source_word: እኅወ፡ አብርሃም፡
  english_pob_choice: Abraham’s brother
  chosen_spanish: hermano de Abraham
  alternatives_spanish:
  - hermano de Abraham
  - el hermano de Abraham
  lexicon: N/A
  rationale: Se preserva la relación de parentesco literal del original sin añadir especificación interpretativa.
- source_word: እኅተ፡ ላባ፡
  english_pob_choice: the sister of Laban
  chosen_spanish: hermana de Labán
  alternatives_spanish:
  - la hermana de Labán
  - hermana de Labán
  lexicon: N/A
  rationale: Se conserva el parentesco explícito, con el nombre propio en forma española 'Labán'.
- source_word: ወለተ፡ ለባቱኤል፡
  english_pob_choice: and the daughter of Bethuel
  chosen_spanish: y hija de Betuel
  alternatives_spanish:
  - y la hija de Betuel
  - y la hija de Betuel
  lexicon: N/A
  rationale: Se mantiene la repetición genealógica del texto fuente. La omisión del artículo en español evita una acumulación pesada y sigue siendo fiel al contenido.
- source_word: ወባቱኤል፡ ወልደ፡ ሜልካ፡
  english_pob_choice: and Bethuel was the son of Milcah
  chosen_spanish: y Betuel era hijo de Milca
  alternatives_spanish:
  - y Betuel era el hijo de Milca
  - y Betuel fue hijo de Milca
  lexicon: N/A
  rationale: '''Era hijo de'' reproduce la relación genealógica en presente descriptivo, coherente con el tono enumerativo del verso.'
- source_word: ዘብእሲተ፡ ናኮር፡ እኅወ፡ አብርሃም፡
  english_pob_choice: the wife of Nahor, Abraham’s brother
  chosen_spanish: la esposa de Nacor, hermano de Abraham
  alternatives_spanish:
  - la mujer de Nacor, hermano de Abraham
  - la esposa de Nacor, el hermano de Abraham
  lexicon: N/A
  rationale: '''Esposa'' conserva el registro bíblico claro y natural; ''hermano de Abraham'' mantiene el inciso explicativo del texto fuente.'
theological_decisions:
- issue: Genealogical repetition and apparent redundancy
  english_pob_reading: The revised English text explicitly retains repeated genealogical elements rather than compressing them into 'granddaughter of Milcah.'
  chosen_spanish_reading: Se conservan las repeticiones genealógicas sin resumirlas en una sola relación de parentesco.
  alternative_spanish_readings:
  - '''nieta de Milca'''
  - '''descendiente de Milca'''
  rationale: La fuente ge'ez repite los vínculos familiares y la revisión inglesa decidió no condensarlos. En español, mantener la repetición preserva la estructura del dato genealógico y evita perder alguna relación explícita del texto.
  doctrine_reference: Fidelidad textual y preservación de datos genealógicos; no implica una cuestión doctrinal sustantiva.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés, que recupera explícitamente los elementos genealógicos repetidos del original y evita la compresión en 'granddaughter of Milcah'. El español refleja esa expansión sin añadir inferencias.
  spanish_consistency_notes:
  - 'Se mantienen nombres propios bíblicos en formas españolas estándar: Rebeca, Betuel, Nacor, Abraham, Labán.'
  - Se conserva el paralelismo genealógico del original con coordinaciones simples ('y').
  - No se introducen notas textuales porque la traducción no depende aquí de una variante textual discutida en el aparato proporcionado.
