lexical_decisions:
- source_word: ብርሃናት
  english_pob_choice: the lights
  chosen_spanish: las luces
  alternatives_spanish:
  - los astros
  - las luminarias
  lexicon: —
  rationale: El ge'ez designa literalmente “luces”; en español, “luces” conserva la imagen y sigue de cerca la elección del POB inglés. “Astros” o “luminarias” sonarían más interpretativos y menos transparentes aquí.
- source_word: ዘዲበ፡³⁸
  english_pob_choice: that are above
  chosen_spanish: que están encima de
  alternatives_spanish:
  - que están sobre
  - de arriba de
  lexicon: —
  rationale: La frase expresa ubicación superior respecto del firmamento; “encima de” es natural en español y mantiene la relación espacial sin añadir matices no atestiguados.
- source_word: ምጽናዓት
  english_pob_choice: the firmament
  chosen_spanish: el firmamento
  alternatives_spanish:
  - la bóveda
  - el cielo
  lexicon: —
  rationale: “Firmamento” corresponde directamente al término técnico bíblico y conserva la terminología tradicional sin perder precisión. “Bóveda” explicita más la imagen, pero no es necesaria aquí.
- source_word: ወጸውዖ
  english_pob_choice: And he called
  chosen_spanish: Y llamó
  alternatives_spanish:
  - Y convocó
  - Y hizo llamar
  lexicon: —
  rationale: El verbo simple “llamó” refleja bien el acto de convocar o llamar a Jacob y coincide con el inglés POB; no se requiere una perífrasis más explicativa.
- source_word: ለያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: —
  rationale: Se conserva la forma bíblica habitual “Jacob”, que es la más extendida en español para el patriarca.
- source_word: በቅድመ፡ አዕይንቲሃ፡ ለርብቃ፡ እሙ፡
  english_pob_choice: before the eyes of Rebekah his mother
  chosen_spanish: delante de los ojos de Rebeca, su madre
  alternatives_spanish:
  - a la vista de Rebeca, su madre
  - en presencia de Rebeca, su madre
  lexicon: —
  rationale: La expresión semítica “before the eyes of” se vierte de manera transparente como “delante de los ojos de”, conservando la imagen del original. “A la vista de” es posible, pero menos literal; “en presencia de” suaviza la imagen.
theological_decisions:
