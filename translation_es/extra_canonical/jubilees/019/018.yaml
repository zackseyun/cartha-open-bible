  text: Porque sé que Yahvé lo escogerá para sí por pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: YHWH
  rationale: El texto ge'ez corresponde al nombre divino; la línea editorial pide renderizarlo como «Yahvé» en español, en vez de ocultarlo con una sustitución reverencial.
- source_word: ኪያሁ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para sí mismo
  lexicon: reflexive pronoun
  rationale: La forma reflexiva comunica mejor que la elección es para la propia pertenencia o finalidad de Yahvé, sin añadir énfasis innecesario.
- source_word: ለሕዝብ
  english_pob_choice: as a people
  chosen_spanish: como pueblo
  alternatives_spanish:
  - por pueblo
  - para un pueblo
  lexicon: people / nation
  rationale: «Como pueblo» conserva la construcción del inglés POB y expresa la función de identidad colectiva del objeto escogido.
theological_decisions:
- issue: Elección divina de una colectividad
  english_pob_reading: the LORD will choose him for himself as a people
  chosen_spanish_reading: Yahvé lo escogerá para sí como pueblo
  alternative_spanish_readings:
  - Yahvé lo escogerá para sí como nación
  - Yahvé lo escogerá para sí como su pueblo
  rationale: La frase mantiene la elección soberana de Dios sobre una entidad colectiva. «Como pueblo» sigue de cerca la fuente y evita precisar más de lo que el texto dice.
  doctrine_reference: elección divina / pueblo de Dios
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el estado de concordancia fue alto; por eso la redacción española se mantiene muy cercana al sentido ya validado en inglés y al texto fuente ge'ez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio editorial para el nombre divino.
  - Se conserva «pueblo» sin añadir determinantes posesivos que no aparecen en la fuente.
  - La construcción es breve y sobria, acorde con un enunciado oracular/factual del contexto.
