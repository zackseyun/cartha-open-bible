translation:
  language: es
  text: Sea una bendición sobre la tierra desde ahora y por todas las generaciones de la tierra. Sean fuertes tus manos, y alégrese tu corazón en tu hijo Jacob, porque lo he amado muchísimo más que a todos ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ለበረከት፡ ዲበ፡ ምድር፡ እምይእዜ፡ ወእስከ፡ ኵሉ፡ ትውልደ፡ ምድር
  english_pob_choice: For a blessing on the earth from now and throughout all the generations of the earth.
  chosen_spanish: Para una bendición sobre la tierra desde ahora y por todas las generaciones de la tierra.
  alternatives_spanish:
  - Para una bendición en la tierra desde ahora y por todas las generaciones de la tierra.
  - Como bendición sobre la tierra desde ahora y por todas las generaciones de la tierra.
  lexicon: በረከት = bendición; ዲበ = sobre/en; ምድር = tierra
  rationale: Conservo el valor de bendición y el alcance temporal continuo del original y de la revisión inglesa. 'Sobre la tierra' mantiene mejor la imagen de bendición extendida sobre el ámbito terrestre que 'en la tierra', aunque esta última sigue siendo posible en español.
- source_word: ይጽንዓ፡ እደዊኪ፡
  english_pob_choice: Let your hands be strong
  chosen_spanish: Sean fuertes tus manos
  alternatives_spanish:
  - Fortalezcan tus manos
  - Estén firmes tus manos
  lexicon: ይጽንዓ = sean fuertes / se fortalezcan; እደዊኪ = tus manos
  rationale: '''Sean fuertes'' expresa bien la exhortación y evita una construcción más pesada. Mantiene el plural de ''manos'' y el imperativo/jussivo del original.'
- source_word: ወ*ትትፈሣሕ፡ ልብኪ፡
  english_pob_choice: let your heart rejoice
  chosen_spanish: alégrese tu corazón
  alternatives_spanish:
  - regocíjese tu corazón
  - que tu corazón se alegre
  lexicon: ትትፈሣሕ = se alegre / regocije; ልብ = corazón
  rationale: '''Alégrese'' es natural y dignificado en español y conserva el sentido de gozo interior. ''Tu corazón'' sigue el singular colectivo del hebreo/gee''z sin añadir interpretación.'
- source_word: በወልድኪ፡ ያዕቆብ፡
  english_pob_choice: in your son Jacob
  chosen_spanish: en tu hijo Jacob
  alternatives_spanish:
  - por tu hijo Jacob
  - a causa de tu hijo Jacob
  lexicon: ወልድ = hijo; ያዕቆብ = Jacob
  rationale: '''En tu hijo Jacob'' reproduce la relación indicada por el texto y corresponde al inglés auditado. No amplío a ''por causa de'' porque el original no lo exige explícitamente.'
- source_word: እስመ፡ ኪያሁ፡ አፍቀርኩ፡ ፈድፋደ፡ እምኵሎሙ፡
  english_pob_choice: because I have loved him far more than all of them.
  chosen_spanish: porque lo he amado muchísimo más que a todos ellos.
  alternatives_spanish:
  - porque lo he amado mucho más que a todos ellos.
  - porque lo he amado con mucho más amor que a todos ellos.
  lexicon: አፍቀርኩ = he amado / amé; ፈድፋደ = en gran medida, muchísimo; እምኵሎሙ = más que todos / que a todos
  rationale: '''Lo he amado muchísimo más'' refleja el intensivo ፈድፋደ con una intensificación natural en español. ''A todos ellos'' preserva el comparativo inclusivo del cierre revisado en inglés.'
theological_decisions:
- issue: Alcance de la bendición sobre la tierra
  english_pob_reading: For a blessing on the earth from now and throughout all the generations of the earth.
  chosen_spanish_reading: Para una bendición sobre la tierra desde ahora y por todas las generaciones de la tierra.
  alternative_spanish_readings:
  - Para una bendición en la tierra desde ahora y por todas las generaciones de la tierra.
  rationale: Mantengo la bendición como algo que recae sobre la tierra, no solo dentro de ella, porque el ge'ez y la revisión inglesa extienden el marco a toda la historia humana y del mundo.
  doctrine_reference: No doctrinal issue; lexical/semantic scope of blessing
- issue: Comparación final de preferencia amorosa
  english_pob_reading: because I have loved him far more than all of them.
  chosen_spanish_reading: porque lo he amado muchísimo más que a todos ellos.
  alternative_spanish_readings:
  - porque lo he amado más que a todos ellos.
  rationale: La frase debe conservar la comparación explícita y su intensidad. Evito suavizar 'far more' a un simple 'más' porque el texto fuente insiste en una preferencia marcada.
  doctrine_reference: No doctrinal issue; comparative intensity
translation_notes:
  revision_awareness: 'La revisión inglesa restauró la cláusula inicial sobre una bendición en la tierra y completó la comparación final con ''all of them''. La redacción española incorpora ambos ajustes: incluye la bendición inicial y mantiene el comparativo explícito e inclusivo en el cierre.'
  spanish_consistency_notes:
  - Uso 'bendición' para በረከት conforme al valor estándar del término.
  - Conservo 'Jacob' como nombre propio en forma española usual.
  - Mantengo un registro bíblico claro y directo, sin arcaísmos innecesarios.
  - No traduzco 'Yahvé' aquí porque el pasaje no contiene el nombre divino.
