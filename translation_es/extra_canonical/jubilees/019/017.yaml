- from: '…más que Esaú. Y le dijo: «Hija mía, guarda a mi hijo Jacob, porque él estará en mi lugar sobre la tierra, y para bendición en medio de los hijos de los hombres, y para todo el linaje de Sem».'
  to: '…más que Esaú. Y le dijo: «Hija mía, cuida de mi hijo Jacob, porque él estará en mi lugar en la tierra, y para bendición en medio de los hijos de los hombres, y para todo el linaje de Sem».'
  rationale: Se ajusta el imperativo a una expresión más natural y precisa en español ('cuida de') y se mejora la fluidez de la locución espacial ('en la tierra'). No se añaden notas porque no surge una nueva ambigüedad y el español revisado preserva adecuadamente el sentido fuente y la decisión crítica de no incluir 'gloria'.
