review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del ge''ez y del POB inglés: Jacob será el representante de Isaac en la tierra, será bendición entre los seres humanos, y el alcance final es ''todo el linaje/la descendencia de Sem'', sin añadir ''gloria''. Sin embargo, la frase española ''guarda a mi hijo Jacob'' puede sonar protectora en sentido físico y no refleja con suficiente naturalidad el matiz de ''keep/guard'' dirigido a la hija respecto de Jacob; además, ''sobre la tierra'' suena menos idiomático aquí que ''en la tierra''.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene una pequeña mejora de naturalidad y precisión: ''cuida de mi hijo Jacob'' comunica mejor el mandato, y ''en la tierra'' fluye mejor que ''sobre la tierra'' en este contexto. El resto del verso es legible y conserva bien el registro bíblico.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Sem' es correcto para Shem. 'Bendición' y 'hijos de los hombres' preservan bien el tono bíblico. 'Linaje de Sem' es aceptable, aunque 'descendencia de Sem' también sería posible; no requiere cambio obligatorio.
  issues:
  - severity: medium
    issue: '''guarda a mi hijo Jacob'' suena ambiguo o algo forzado en español'
    rationale: En español neutral, 'guardar a alguien' puede sonar a esconderlo, custodiarlo o vigilarlo físicamente. 'Cuida de mi hijo Jacob' expresa mejor la exhortación relacional de proteger/cuidar.
  - severity: low
    issue: '''sobre la tierra'' es menos natural que ''en la tierra'''
    rationale: Aunque no es incorrecto, 'en la tierra' encaja mejor con 'estar en mi lugar' y con el español bíblico moderno sin alterar el sentido.
  revised_spanish_text: '…más que Esaú. Y le dijo: «Hija mía, cuida de mi hijo Jacob, porque él estará en mi lugar en la tierra, y para bendición en medio de los hijos de los hombres, y para todo el linaje de Sem».'
  revision_rationale: Se ajusta el imperativo a una expresión más natural y precisa en español ('cuida de') y se mejora la fluidez de la locución espacial ('en la tierra'). No se añaden notas porque no surge una nueva ambigüedad y el español revisado preserva adecuadamente el sentido fuente y la decisión crítica de no incluir 'gloria'.
