translation:
  language: es
  text: '…más que Esaú. Y le dijo: «Hija mía, cuida de mi hijo Jacob, porque él estará en mi lugar en la tierra, y para bendición en medio de los hijos de los hombres, y para todo el linaje de Sem».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይከውን ህየንቴየ
  english_pob_choice: he will be in my place on the earth
  chosen_spanish: él estará en mi lugar sobre la tierra
  alternatives_spanish:
  - él ocupará mi lugar en la tierra
  - él estará en mi puesto sobre la tierra
  lexicon: estar en lugar de / ocupar el lugar de
  rationale: El ge'ez expresa sustitución o representación en la tierra; «estar en mi lugar» conserva esa relación sin añadir un matiz institucional que el original no exige.
- source_word: ወለበረከት
  english_pob_choice: for a blessing
  chosen_spanish: para bendición
  alternatives_spanish:
  - para una bendición
  - como bendición
  lexicon: bendición
  rationale: La forma breve conserva el paralelismo del texto y permite entender bendición como efecto o condición, no solo como un acto puntual.
- source_word: በማእከለ፡ ውሉደ፡ ሰብእ
  english_pob_choice: in the midst of the sons of men
  chosen_spanish: en medio de los hijos de los hombres
  alternatives_spanish:
  - entre los hijos de los hombres
  - en medio de la humanidad
  lexicon: hijos de los hombres
  rationale: Se mantiene la expresión semítica del original y del inglés auditado, sin sustituirla por una abstracción moderna que borraría el registro bíblico.
- source_word: ዘርኡ ሴም
  english_pob_choice: all the seed of Shem
  chosen_spanish: todo el linaje de Sem
  alternatives_spanish:
  - toda la descendencia de Sem
  - toda la semilla de Sem
  lexicon: linaje / descendencia
  rationale: «Linaje» transmite bien la idea genealógica y suena natural en español bíblico; evita «semilla» por sonar menos idiomático aquí, aunque sigue siendo una opción literal.
theological_decisions:
- issue: Possible shift between simple blessing and honor/glory in the inherited English tradition
  english_pob_reading: for a blessing in the midst of the sons of men, and for all the seed of Shem
  chosen_spanish_reading: para bendición en medio de los hijos de los hombres, y para todo el linaje de Sem
  alternative_spanish_readings:
  - para gloria en medio de los hijos de los hombres, y para todo el linaje de Sem
  - para bendición y para la gloria de todo el linaje de Sem
  rationale: El ge'ez apoyado por la revisión crítica no contiene «gloria»; por eso se traduce solo lo que el texto atestigua, evitando reintroducir una expansión no sustentada.
  doctrine_reference: Fidelidad textual y principio de no añadir contenido ausente del testimonio fuente
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión crítica que corrigió la lectura heredada «glory»/«gloria» en la cláusula final; por eso la versión española omite cualquier equivalente de gloria y sigue el sentido simple de «todo el linaje de Sem».
  spanish_consistency_notes:
  - Se conserva el tono narrativo directo y la puntuación de discurso citado.
  - Se prefiere «hijos de los hombres» por coherencia con el registro bíblico y con el inglés auditado.
  - No se usa «Cristo», «SEÑOR» ni otras equivalencias no implicadas por este versículo.
