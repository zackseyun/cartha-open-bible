base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/005.yaml
  text: He spoke with the sons of Heth so that they might give him a place in which to bury his dead. And the LORD gave him favor before all who saw him[5], and he entreated courteously of the sons of Heth, and they gave him the land of the double cave, which is opposite Mamre—
  footnotes:
  - marker: '5'
    text: 'Verses 24-26 use elevated cosmological language: ''support heaven,'' ''strengthen the earth,'' and ''renew all the lights above the firmament.'' This is preserved as-is rather than reduced to a mere metaphor for prosperity.'
    reason: cultural_note
  - marker: a
    text: Or 'so that they might give him a place'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:17Z'
    unchanged: false
    changes_summary: Removed the redundant 'there' after 'his dead' and changed 'entreated courteously from' to the more natural and accurate 'entreated courteously of.' Added a comma before 'which is opposite Mamre' for readability.
translation:
  language: es
  text: Habló con los hijos de Het para que le dieran un lugar[a] donde sepultar a su difunto. Y Yahvé le concedió favor ante todos los que lo veían, y rogó cortésmente a los hijos de Het, y le dieron la tierra de la cueva doble, que está enfrente de Mamré—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que le dieran un lugar».'
    reason: previous_rendering
lexical_decisions:
- source_word: ተናገረ፡ ምስለ፡ ውሉደ፡ ኬጥ፡
  english_pob_choice: He spoke with the sons of Heth
  chosen_spanish: Habló con los hijos de Het
  alternatives_spanish:
  - Habló con los hijos de Heth
  - Habló con los hijos de Het
  lexicon: Hablar / hijos de Het
  rationale: El ge'ez abre con una cláusula verbal explícita de conversación con los descendientes de Het; «habló con» reproduce de forma natural y directa la relación interlocutiva. «Het» mantiene la forma bíblica habitual en español y evita una transliteración innecesaria.
- source_word: ከመ፡ የሀብዎ፡ መካነ፡ ከመ፡ ይቅበር፡ ቤድኖ፡
  english_pob_choice: so that they might give him a place in which to bury his dead
  chosen_spanish: para que le dieran un lugar donde sepultar a su muerto
  alternatives_spanish:
  - para que le dieran un lugar en el cual sepultar a su muerto
  - para que le dieran un lugar para sepultar a su muerto
  lexicon: lugar / sepultar / muerto
  rationale: La fuente pide un lugar para el entierro; «sepultar» conserva el registro digno y concreto de enterramiento. «Su muerto» refleja el singular del ge'ez y evita añadir pluralidad que el texto no exige.
- source_word: ወእግዚአብሔር፡
  english_pob_choice: And the LORD
  chosen_spanish: Y Yahvé
  alternatives_spanish:
  - Y el Señor
  - Y el SEÑOR
  lexicon: Yahvé
  rationale: El proyecto exige traducir el nombre divino por «Yahvé» en el texto principal. Aquí no se trata de κύριος griego sino del nombre divino en la tradición del relato, por lo que no se usa un sustituto reverencial.
- source_word: ወወሀቦ፡ ሞገሰ፡ ሎቱ፡ በቅድመ፡ ኵሎሙ፡ እለ፡ ይሬእይዎ፡
  english_pob_choice: the LORD gave him favor before all who saw him
  chosen_spanish: le concedió favor ante todos los que lo veían
  alternatives_spanish:
  - le dio favor ante todos los que lo veían
  - le concedió gracia ante todos los que lo veían
  lexicon: favor / gracia
  rationale: «Favor» expresa el resultado relacional y social del término sin confundirlo con la gracia salvífica teológica; además sigue de cerca la elección inglesa. «Ante todos los que lo veían» mantiene la idea pública y observada del pasaje.
- source_word: ወአስተብቍዐ፡ በየውሀት፡ እምኀበ፡ ውሉደ፡ ኬጥ፡
  english_pob_choice: and he entreated courteously of the sons of Heth
  chosen_spanish: y suplicó con cortesía a los hijos de Het
  alternatives_spanish:
  - y rogó cortésmente a los hijos de Het
  - y suplicó cortésmente de los hijos de Het
  lexicon: entreat courteously / suplicar con cortesía
  rationale: La revisión inglesa corrigió la preposición para que el inglés suene natural; en español la formulación más idiomática es «suplicó con cortesía a», que conserva el tono deferente sin forzar una preposición extraña. «Suplicó» refleja la intensidad respetuosa del ruego.
- source_word: ወወሀብዎ፡ ምድረ፡ ባዓት፡' ዘካዕበት፡ ዘአንጻረ፡ መምብሬም፡
  english_pob_choice: and they gave him the land of the double cave, which is opposite Mamre—
  chosen_spanish: y le dieron la tierra de la cueva doble, que está enfrente de Mamré—
  alternatives_spanish:
  - y le dieron la tierra de la cueva doble, que está frente a Mamré—
  - y le dieron la tierra de la cueva doble, que queda enfrente de Mamré—
  lexicon: double cave / opposite
  rationale: «Cueva doble» traduce de forma transparente el nombre descriptivo del lugar. «Enfrente de» conserva la orientación espacial del original con un español claro y bíblico.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: the LORD gave him favor
  chosen_spanish_reading: Y Yahvé le concedió favor
  alternative_spanish_readings:
  - Y el Señor le concedió favor
  - Y el SEÑOR le concedió favor
  rationale: En este proyecto, el nombre divino se traduce por «Yahvé» en lugar de ocultarse tras un título. Esto preserva la referencia al nombre del pacto y evita perder la huella del original.
  doctrine_reference: Ex 3:15; criterio editorial POB sobre יהוה/YHWH
- issue: Sentido de ሞገሰ en el contexto
  english_pob_reading: gave him favor before all who saw him
  chosen_spanish_reading: le concedió favor ante todos los que lo veían
  alternative_spanish_readings:
  - le concedió gracia ante todos los que lo veían
  - le dio favor ante todos los que lo veían
  rationale: «Favor» mantiene el sentido social de aceptación pública. «Gracia» podría sugerir una carga soteriológica más fuerte de la que el contexto inmediato exige, por lo que se prefiere «favor».
  doctrine_reference: Gn 39:21; Pr 3:4 (uso relacional de favor/gracia)
translation_notes:
  revision_awareness: 'La fuente ge''ez contiene explícitamente la cláusula inicial «Habló con los hijos de Het», que la revisión inglesa corregida ya recupera; la versión española la incluye. También sigue la revisión que eliminó el redundante «there» y ajustó la preposición de «entreated courteously of» a una expresión natural en español. Se conserva la estructura narrativa completa del segmento: petición, favor divino, súplica respetuosa y concesión del terreno.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma principal del nombre divino, conforme al estándar del proyecto.
  - Se mantiene «hijos de Het» para coherencia con el registro bíblico y la tradición de nombres propios.
  - «Favor» se reserva para ሞገሰ en contextos de aceptación social; no se sustituye por «gracia» sin necesidad contextual.
  - «Sepultar» preserva el tono reverente del entierro y evita banalizar el acto funerario.
  - La frase final conserva el sintagma locativo «enfrente de Mamré» para mantener la orientación espacial explícita del original.
