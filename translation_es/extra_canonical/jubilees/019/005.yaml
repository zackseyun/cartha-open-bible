  rationale: Se corrige la nota al pie para que quede anclada en la cláusula correcta y en español. Además, se mejora la naturalidad del texto con «su difunto» y «rogó cortésmente», sin alterar el sentido del original ni las decisiones léxicas del POB. No se requiere adjudicación adicional porque son ajustes claros de fidelidad editorial y estilo.
