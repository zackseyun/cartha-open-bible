translation:
  language: es
  text: y Adán. Y ellos serán para establecer el cielo, fortalecer la tierra y renovar todo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el establecimiento del cielo, para el fortalecimiento de la tierra y para la renovación de todo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ይኩኑ
  english_pob_choice: shall be / shall be for
  chosen_spanish: serán para
  alternatives_spanish:
  - serán
  - servirán para
  - estarán para
  lexicon: copulative/resultative
  rationale: El ge'ez expresa finalidad con el prefijo la- más infinitivo; en español, «serán para» comunica de forma natural la función o destino sin convertirlo en una perífrasis más pesada que el original ni añadir un verbo de servicio no presente en el texto.
- source_word: ለሳርረ
  english_pob_choice: to establish heaven
  chosen_spanish: establecer el cielo
  alternatives_spanish:
  - fundar el cielo
  - afirmar el cielo
  - sostener el cielo
  lexicon: establish/found
  rationale: La revisión inglesa ya descartó «support» y confirmó el sentido de «establish». En español, «establecer» conserva ese valor fundacional y evita introducir la idea de mera manutención.
- source_word: ምድር
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  lexicon: earth/land
  rationale: «La tierra» es la equivalencia más natural y amplia en español para el ámbito cósmico del pasaje. «El suelo» sería demasiado restringido y local.
- source_word: ለኀድሶ
  english_pob_choice: to renew
  chosen_spanish: renovar
  alternatives_spanish:
  - restaurar
  - hacer nuevo
  lexicon: renew/restore
  rationale: «Renovar» reproduce directamente la idea de hacer nuevo o renovar el estado de algo. «Restaurar» podría sugerir reparación de una ruina previa, que no está explícita aquí.
- source_word: ኵሉ
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo
  - todas las cosas
  lexicon: all/everything
  rationale: El texto ge'ez culmina con una totalidad absoluta. «Todo» mantiene esa amplitud de modo breve y publicable; «todas las cosas» explicita pero añade palabras no necesarias.
- source_word: ወአዳም።
  english_pob_choice: and Adam.
  chosen_spanish: y de Adán.
  alternatives_spanish:
  - y Adán.
  - y para Adán.
  lexicon: Adam proper name with preceding conjunction/phrase boundary
  rationale: La segmentación del pasaje en el estado fuente hace que la frase funcione como un encabezado o arranque enlazado al enunciado anterior. «Y de Adán» conserva la dependencia sintáctica sin forzar una frase verbal completa que el fragmento no aporta por sí mismo.
theological_decisions:
- issue: Finalidad cósmica de los descendientes de Adán
  english_pob_reading: They shall be to establish heaven and to strengthen the earth and to renew all.
  chosen_spanish_reading: Ellos serán para establecer el cielo, para fortalecer la tierra y para renovar todo.
  alternative_spanish_readings:
  - Ellos existirán para establecer el cielo...
  - Ellos servirán para establecer el cielo...
  rationale: El texto presenta una función orientada a la preservación/renovación del orden creado, no una afirmación doctrinal desarrollada. La formulación española conserva esa finalidad sin añadir una interpretación más amplia sobre mediación humana o sacerdocio cósmico.
  doctrine_reference: Creación y vocación humana en el orden creado; no se desarrolla una doctrina sistemática explícita en este versículo.
translation_notes:
  revision_awareness: 'Seguí la revisión más reciente del audit trail, que corrigió el inglés desde una paráfrasis más libre hacia una equivalencia más cercana: se eliminó una idea de bendición no sustentada y se prefirió un valor de finalidad para las construcciones con la- en ge''ez. La traducción española refleja esa decisión con infinitivos de propósito y sin introducir elementos ajenos al segmento fuente.'
  spanish_consistency_notes:
  - Se mantiene «Adán» como nombre propio sin artículo para respetar el encabezado fragmentario del texto fuente.
  - Se evita «Señor» o terminología litúrgica no presente, porque el fragmento no contiene el tetragrámaton ni κύριος.
  - «Cielo» y «tierra» se conservan en singular conforme al valor colectivo/cósmico del pasaje.
  - La nota al pie preserva la alternativa nominal que estuvo en la traducción inglesa previa y ayuda a transparentar la opción verbal elegida en español.
