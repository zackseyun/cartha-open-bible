translation:
  language: es
  text: Mis hijos. Para siempre sea bendito, y que su descendencia llene toda la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ውሉድ*የ፡² / “my sons”
  english_pob_choice: my sons
  chosen_spanish: Mis hijos
  alternatives_spanish:
  - Mis hijos,
  - Hijos míos
  lexicon: son / child
  rationale: El sujeto se dirige a descendientes en plural; «mis hijos» comunica con naturalidad el parentesco y el tono exhortativo sin añadir contenido ajeno. Se evita «hijos míos» porque en español suena más enfático de lo que exige el contexto.
- source_word: ይትባረክ / “let him be blessed”
  english_pob_choice: let him be blessed
  chosen_spanish: sea bendito
  alternatives_spanish:
  - sea alabado
  - sea bendecido
  lexicon: to bless
  rationale: «Sea bendito» conserva la pasiva de deseo y el registro bíblico sin convertir la expresión en una fórmula eclesiástica moderna. «Sea bendecido» es posible, pero «bendito» refleja mejor la tradicional bendición declarativa y la fuerza verbal del pasivo.
- source_word: ወዘርኡ / “and let his seed”
  english_pob_choice: and let his seed
  chosen_spanish: y sea su descendencia
  alternatives_spanish:
  - y su linaje
  - y su simiente
  lexicon: seed / offspring
  rationale: «Descendencia» es la forma más clara y amplia en español para el sentido genealógico de «seed». Se evita «simiente» por sonar arcaica y potencialmente agrícola; «linaje» introduce una matiz de estirpe que no es necesario.
- source_word: ዘይመልእ ... ኵላ፡ ምድረ / “that which fills the whole earth”
  english_pob_choice: that which fills the whole earth
  chosen_spanish: la que llene toda la tierra
  alternatives_spanish:
  - lo que llene toda la tierra
  - la cual llene toda la tierra
  lexicon: relative construction
  rationale: La construcción relativa impersonal del ge'ez se rinde en español con «la que llene» para mantener la relación subordinada y la fuerza de totalidad. «Lo que» sería más neutro, pero menos elegante en este contexto; «la cual» suena demasiado pesado.
theological_decisions:
- issue: Bendición y descendencia universal
  english_pob_reading: Forever let him be blessed, and let his seed be that which fills the whole earth.
  chosen_spanish_reading: Para siempre sea bendito, y sea su descendencia la que llene toda la tierra.
  alternative_spanish_readings:
  - Sea bendito por siempre, y su descendencia llene toda la tierra.
  - Que para siempre sea bendito, y que su descendencia llene toda la tierra.
  rationale: La formulación conserva tanto la bendición perpetua como la expansión universal de la descendencia sin suavizar la afirmación. Se preserva el valor exhortativo/jussivo del original y la relación entre bendición y fecundidad extensiva.
  doctrine_reference: Génesis 17:16; 22:17; 26:4
translation_notes:
  revision_awareness: El inglés auditado fue revisado de «be one that fills» a «be that which fills» para ajustarse mejor a la construcción relativa del original; la traducción española refleja directamente esa relación relativa con «la que llene». No se detectaron notas textuales adicionales en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico sobrio y directo, evitando calcos innecesarios.
  - «Descendencia» se usa consistentemente para language genealógico de 'seed'.
  - No se introduce «SEÑOR» ni otras sustituciones de convenciones no presentes en este versículo.
