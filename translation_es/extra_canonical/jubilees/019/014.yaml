translation:
  language: es
  text: y velludo. Y Jacob habitó en tiendas. Y los jóvenes crecieron, y Jacob aprendió a escribir, pero Esaú no aprendió, porque era un hombre del campo y cazador, y aprendió la guerra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aprendió la práctica de la guerra» o «aprendió la guerra como oficio»; el sentido es formación bélica o destreza para la guerra.
    reason: Aclara un giro que en español puede sonar extraño si se mantiene cercano al original y al inglés «learned warfare».
lexical_decisions:
- source_word: ወጸጕር
  english_pob_choice: and hairy
  chosen_spanish: y velludo
  alternatives_spanish:
  - y peludo
  - y de mucho vello
  lexicon: Geez descriptor for bodily hairiness
  rationale: «Velludo» reproduce de manera natural y compacta la descripción física sin sonar excesivamente coloquial; mantiene la idea de abundancia de pelo que el inglés expresa con “hairy”.
- source_word: ኀደረ፡ ውስተ፡ ምጽላላት
  english_pob_choice: Jacob dwelt in tents
  chosen_spanish: Jacob habitó en tiendas
  alternatives_spanish:
  - Jacob vivió en tiendas
  - Jacob moró en tiendas
  lexicon: dwelt / inhabit tents
  rationale: «Habitó en tiendas» conserva el registro bíblico y refleja bien la permanencia de Jacob en vida nómada, sin añadir términos interpretativos.
- source_word: ወሬዛ
  english_pob_choice: the youths
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los muchachos varones
  lexicon: youths, young men
  rationale: «Jóvenes» es la opción más amplia y natural en español para un plural de personas en edad juvenil, sin forzar un matiz etario más estrecho que el original.
- source_word: ወተምህረ ያዕቆብ መጽሐፈ
  english_pob_choice: Jacob learned writing
  chosen_spanish: Jacob aprendió a escribir
  alternatives_spanish:
  - Jacob aprendió escritura
  - Jacob aprendió letras
  lexicon: learned writing
  rationale: El sustantivo abstracto «escritura» suena menos directo en español contemporáneo; «aprendió a escribir» expresa con claridad la habilidad adquirida que el texto inglés decidió explícitamente.
- source_word: ብእሲ፡ ሐቃላዊ፡
  english_pob_choice: a man of the field
  chosen_spanish: un hombre del campo
  alternatives_spanish:
  - un hombre del campo abierto
  - un hombre del campo y de la caza
  lexicon: man of the field
  rationale: «Del campo» sigue de cerca la expresión tradicional y evita especificar un sentido agrícola que el contexto no exige, dejando el contraste con Jacob intacto.
- source_word: ወነዓዊ
  english_pob_choice: a hunter
  chosen_spanish: cazador
  alternatives_spanish:
  - un cazador
  - uno que cazaba
  lexicon: hunter
  rationale: «Cazador» es el equivalente directo y natural en español; mantiene la caracterización de Esaú sin expansionar la frase.
- source_word: ወተምህረ ፀብአ
  english_pob_choice: he learned warfare
  chosen_spanish: aprendió guerra
  alternatives_spanish:
  - aprendió la guerra
  - aprendió a hacer guerra
  lexicon: warfare
  rationale: Se conserva la formulación breve y literal de la fuente, siguiendo el valor sustantivo de «warfare»; «aprendió guerra» mantiene la tensión lexical sin suavizarla a una paráfrasis más explicativa.
theological_decisions:
- issue: Description of Esau’s military learning
  english_pob_reading: he learned warfare
  chosen_spanish_reading: aprendió guerra
  alternative_spanish_readings:
  - aprendió la guerra
  - aprendió a hacer guerra
  rationale: El texto presenta una caracterización histórica y narrativa, no una afirmación doctrinal; por eso se preserva la dureza del contraste entre vida de campo, caza y formación para la guerra.
  doctrine_reference: Narrative characterization; no direct doctrinal locus
- issue: Jacob’s acquisition of writing
  english_pob_reading: Jacob learned writing
  chosen_spanish_reading: Jacob aprendió a escribir
  alternative_spanish_readings:
  - Jacob aprendió escritura
  rationale: La frase se entiende como habilidad práctica adquirida. No se introduce una lectura escolarizada o intelectualizada más allá de lo requerido por la narración.
  doctrine_reference: Narrative detail; no direct doctrinal locus
translation_notes:
  revision_awareness: The latest revision changed English 'war' to 'warfare'; the Spanish draft follows that revised, more formal sense by using 'guerra' in a concise narrative construction that preserves the lexical force without additional paraphrase.
  spanish_consistency_notes:
  - Se mantuvo «Jacob» y «Esaú» como formas convencionales y reconocibles en español bíblico.
  - Se evitó sustituir «tiendas» por «carpas» para conservar el registro bíblico y la imagen nómada.
  - No se usó «Cristo» ni terminología cristológica, ya que el pasaje no la contiene.
  - No se añadieron notas al pie porque ninguna decisión requería anclaje textual adicional.
