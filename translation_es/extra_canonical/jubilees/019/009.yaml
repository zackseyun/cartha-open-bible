base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/009.yaml
  text: In this, Abraham was found faithful, patient in spirit. And he did not speak a word concerning the promise of the land, which the LORD had said he would give to him and to his seed after him, yet he asked there for a place to bury his dead, because he was found faithful, and he was recorded as a friend of the LORD on the heavenly tablets.
  footnotes:
  - marker: a
    text: Or 'and Abraham was found faithful'.
    reason: previous_rendering
  - marker: b
    text: Or 'and it was written down for him as a friend'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:17Z'
    unchanged: false
    changes_summary: Added 'Abraham' explicitly from the source, and changed 'report about the land' to 'promise of the land' for better lexical accuracy and natural English.
translation:
  language: es
  text: En esto, Abraham fue hallado fiel, paciente en espíritu. Y no dijo una palabra acerca de la promesa de la tierra, que Yahvé le daría a él y a su descendencia después de él; sin embargo, allí pidió un lugar para enterrar a sus muertos, porque fue hallado fiel, y quedó inscrito como amigo de Yahvé en las tablas celestiales.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቦቱ / in this
  english_pob_choice: In this
  chosen_spanish: En esto
  alternatives_spanish:
  - En ello
  - En tal situación
  lexicon: deixis contextual
  rationale: El ge'ez introduce una referencia deíctica al contexto inmediato; "En esto" conserva esa conexión con la prueba mencionada en el versículo previo sin añadir interpretación.
- source_word: ወተረክበ፡ ምእመነ፡
  english_pob_choice: was found faithful
  chosen_spanish: fue hallado fiel
  alternatives_spanish:
  - se halló fiel
  - fue encontrado fiel
  lexicon: fiel / hallado
  rationale: '"Hallado fiel" reproduce bien la pasiva de resultado y mantiene la formulación bíblica natural en español sin perder el matiz de comprobación.'
- source_word: ዕጉሠ፡ መንፈስ
  english_pob_choice: patient in spirit
  chosen_spanish: paciente en espíritu
  alternatives_spanish:
  - constante en espíritu
  - sosegado en espíritu
  lexicon: espíritu / paciencia
  rationale: La construcción apunta a una disposición interior; "paciente en espíritu" conserva la imagen y la tensión del original mejor que una paráfrasis psicológica.
- source_word: ንባብ፡ ዘበምድር / promise of the land
  english_pob_choice: the promise of the land
  chosen_spanish: la promesa de la tierra
  alternatives_spanish:
  - el anuncio sobre la tierra
  - la promesa acerca de la tierra
  lexicon: promesa / tierra
  rationale: La revisión inglesa corrigió la lectura hacia la promesa; en español conviene seguir esa decisión y mantener la relación de pertenencia y herencia expresada por el contexto.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: divine name
  rationale: Según el marco terminológico del proyecto, el nombre divino se vierte como "Yahvé" en el texto principal, evitando la sustitución de máscara litúrgica.
- source_word: ወለዘርኡ፡ እምድኅሬሁ
  english_pob_choice: and to his seed after him
  chosen_spanish: y a su descendencia después de él
  alternatives_spanish:
  - y a su simiente después de él
  - y a su posteridad después de él
  lexicon: seed / descendants
  rationale: '"Descendencia" comunica de forma clara el sentido colectivo de la promesa sin perder la relación genealógica del término original.'
- source_word: መካነ፡ አስተብቍዐ፡
  english_pob_choice: he asked there for a place to bury his dead
  chosen_spanish: allí pidió un lugar para enterrar a su muerto
  alternatives_spanish:
  - allí solicitó un lugar para sepultar a su difunto
  - allí pidió sitio para enterrar a su muerto
  lexicon: burial / dead
  rationale: La expresión sigue de cerca la forma del original y del inglés auditado, conservando el pedido concreto de un lugar de sepultura.
- source_word: ተረክበ፡ መሃይምነ
  english_pob_choice: because he was found faithful
  chosen_spanish: porque fue hallado fiel
  alternatives_spanish:
  - puesto que fue hallado fiel
  - ya que fue encontrado fiel
  lexicon: causal / faithful
  rationale: La causa explicitada por el texto se mantiene directa y transparente, enlazando la petición con la fidelidad reconocida.
- source_word: ወተጽሕፈ፡
  english_pob_choice: and he was recorded
  chosen_spanish: y fue registrado
  alternatives_spanish:
  - y fue escrito
  - y quedó inscrito
  lexicon: written/recorded
  rationale: El verbo ge'ez indica quedar escrito o inscrito; "registrado" conserva el valor documental y evita una frase artificiosa.
- source_word: ዐርከ፡
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - compañero
  - amigo cercano
  lexicon: friend
  rationale: '"Amigo" es la equivalencia más natural y fiel al término relacional empleado por la tradición textual y por el auditorio bíblico.'
theological_decisions:
- issue: Nombre divino en un texto que en inglés usa LORD
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El proyecto exige restaurar el nombre divino en la traducción principal cuando el contexto remite al tetragrámaton o a su tradición textual equivalente, en vez de ocultarlo bajo una máscara reverencial.
  doctrine_reference: Terminología del proyecto POB sobre יהוה / YHWH
- issue: Relación de Abraham con Dios en la fórmula 'friend of the LORD'
  english_pob_reading: friend of the LORD
  chosen_spanish_reading: amigo de Yahvé
  alternative_spanish_readings:
  - amigo del Señor
  - siervo de Yahvé
  rationale: Se conserva la relación explícita de amistad, sin reducirla a una categoría servil ni reemplazarla por un título eclesial más convencional. El texto afirma una cercanía personal reconocida en los registros celestiales.
  doctrine_reference: Jubileos 19:9; eco tradicional de amistad con Dios
- issue: Registro celestial de la fidelidad
  english_pob_reading: on the heavenly tablets
  chosen_spanish_reading: en las tablas celestiales
  alternative_spanish_readings:
  - en las tablas del cielo
  - en las tablas celestes
  rationale: '"Tablas celestiales" mantiene la imaginería propia de Jubileos sin domesticarla. La formulación subraya el carácter registral y celestial del acto, como en el original.'
  doctrine_reference: Literatura de Jubileos sobre las tablas celestiales
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para añadir explícitamente 'Abraham' y corregir 'report about the land' a 'promise of the land'. También se reconoció que el ge'ez inicial 'in this' se refiere al contexto previo y que el verbo final es 'was recorded' con Abraham como sujeto. La presente traducción española sigue esas revisiones y evita la omisión del deíctico inicial.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se usa 'descendencia' para ὁ/זרע en sentido colectivo de herencia.
  - Se preserva la imaginería de 'tablas celestiales' propia del libro de Jubileos.
  - No se introducen notas al pie porque no hay una variante textual que requiera marcador en el texto principal.
