revisions:
- from: En esto, Abraham fue hallado fiel, paciente en espíritu. Y no dijo una palabra acerca de la promesa de la tierra, que Yahvé había dicho que daría a él y a su descendencia después de él; sin embargo, allí pidió un lugar para enterrar a su muerto, porque fue hallado fiel, y fue registrado como amigo de Yahvé en las tablas celestiales.
  to: En esto, Abraham fue hallado fiel, paciente en espíritu. Y no dijo una palabra acerca de la promesa de la tierra, que Yahvé le daría a él y a su descendencia después de él; sin embargo, allí pidió un lugar para enterrar a sus muertos, porque fue hallado fiel, y quedó inscrito como amigo de Yahvé en las tablas celestiales.
  rationale: 'Se hicieron ajustes menores de naturalidad y precisión en español: ''le daría'' en lugar de ''daría a él''; ''enterrar a sus muertos'' en vez de la expresión poco idiomática ''a su muerto''; y ''quedó inscrito'' para reflejar mejor el valor de quedar escrito en las tablas celestiales. No se requieren notas adicionales.'
  reviewer_model: gpt-5.4
