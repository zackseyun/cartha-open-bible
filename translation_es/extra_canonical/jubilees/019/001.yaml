base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/001.yaml
  text: And in the first year of the first week in the fifty-eighth jubilee[1], Abraham returned and dwelt opposite Hebron—that is, Kiriath-arba—for another week of years.
  footnotes:
  - marker: '1'
    text: 'The chapter numbering in the source rows is slightly irregular: the material labeled verse 16 is absent, and the final long blessing is labeled 27. The translation preserves the supplied numbering rather than renumbering the chapter.'
    reason: segmentation_note
  - marker: a
    text: Or 'forty-eighth'.
    reason: previous_rendering
  - marker: b
    text: Or 'by Hebron'.
    reason: previous_rendering
  - marker: c
    text: Or 'another seven years'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:16Z'
    unchanged: false
    changes_summary: Changed 'opposite Hebron' to 'by Hebron' for more natural rendering of the location phrase, and replaced 'for two weeks of years' with 'for another seven years' to reflect ካልእ ሱባዔ ዓመት ('another week of years') more accurately.
translation:
  language: es
  text: Y en el primer año de la primera semana del quincuagésimo octavo jubileo, Abraham volvió y habitó frente a Hebrón—es decir, Quiriat-arbá—por otra semana de años[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por otros siete años».
    reason: alternative_reading
lexical_decisions:
- source_word: ፶ወ፰ / fifty-eighth jubilee
  english_pob_choice: fifty-eighth jubilee
  chosen_spanish: quincuagésimo octavo jubileo
  alternatives_spanish:
  - cuadragésimo octavo jubileo
  lexicon: Jubileo
  rationale: El numeral del ge‘ez es 58 (50 + 8), y la revisión del POB corrige expresamente la lectura errónea de 48. Se conserva "jubileo" como término técnico del libro.
- source_word: አንጻረ
  english_pob_choice: opposite Hebron
  chosen_spanish: frente a Hebrón
  alternatives_spanish:
  - opuesto a Hebrón
  - junto a Hebrón
  lexicon: locución espacial
  rationale: La palabra indica una relación de enfrentamiento o posición frente a un lugar; en español, "frente a" conserva mejor esa relación que una simple cercanía como "junto a".
- source_word: ካልእ ሱባዔ ዓመት
  english_pob_choice: another week of years
  chosen_spanish: por otra semana de años
  alternatives_spanish:
  - por otros siete años
  lexicon: período calendárico
  rationale: Se mantiene la expresión técnica "semana de años", que en Jubileos tiene valor calendárico-teológico. "Otra semana de años" refleja el ge‘ez más de cerca que una paráfrasis numérica.
- source_word: ה/Kiriath-arba
  english_pob_choice: Kiriath-arba
  chosen_spanish: Quiriat-arbá
  alternatives_spanish:
  - Kiriat-arba
  lexicon: topónimo
  rationale: Se usa la forma española más habitual y reconocible del topónimo bíblico, manteniendo el nombre propio sin traducir.
theological_decisions:
- issue: Conservar el concepto técnico de "semana de años"
  english_pob_reading: another week of years
  chosen_spanish_reading: por otra semana de años
  alternative_spanish_readings:
  - por otros siete años
  rationale: En Jubileos, esta expresión no es solo una medida temporal, sino parte de su calendario teológico. Traducirla como "siete años" suavizaría una terminología especializada que el texto parece querer preservar.
  doctrine_reference: Calendario jubilar / cronología sagrada del libro de Jubileos
translation_notes:
  revision_awareness: 'La lectura sigue la revisión más reciente: 58.º jubileo, y conserva la relación espacial específica de አንጻረ junto con la expresión técnica ሱባዔ ዓመት como "semana de años". También respeta el topónimo aclarado por el texto: Hebrón, es decir, Quiriat-arbá.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando el texto fuente lo exija explícitamente; aquí no aparece.
  - '"Jubileo" se conserva como término técnico coherente con el libro de Jubileos.'
  - La puntuación con raya introduce la glosa explicativa del topónimo de manera legible en español.
