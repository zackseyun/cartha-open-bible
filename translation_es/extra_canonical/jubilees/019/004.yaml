review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del geʽez auditado por el POB: la paciencia/disposición interior del sujeto y su habla con los hijos de Het. Sin embargo, añade una nota léxica no necesaria y omite la nota heredada del POB inglés sobre la dificultad textual relacionada con la tierra en el v. 9, la cual debe preservarse como contexto editorial documentado.'
  spanish_quality_summary: El español es natural, claro y digno. «Y fue paciente en espíritu» suena bien y refleja el inglés auditado. No obstante, la nota actual sobre «paciente en espíritu» introduce una alternativa interpretativa no exigida por la evidencia y desplaza una nota textual más importante del expediente inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Espíritu» en minúscula está bien por contexto antropológico. «Hijos de Het» conserva adecuadamente el nombre tradicional y es plenamente inteligible en español bíblico.
  issues:
  - severity: medium
    issue: La nota al pie no corresponde a la nota textual conservada en el expediente inglés.
    rationale: El POB inglés documenta una dificultad textual relevante sobre el informe/la tierra en el v. 9; el borrador español reemplaza esa nota por una observación léxica sobre «paciente en espíritu», que no es necesaria para evitar ambigüedad en español.
  - severity: low
    issue: La nota léxica sobre «paciente en espíritu» añade interpretación sin necesidad editorial.
    rationale: La frase española ya es suficientemente clara y fiel. La alternativa «constante en espíritu» no mejora la comprensión y puede sugerir un matiz distinto del inglés auditado.
  revised_spanish_text: Y fue paciente en espíritu[a], y habló con los hijos de Het.
  revised_footnotes:
  - marker: a
    text: En el versículo 9, «el informe acerca de la tierra» es textualmente difícil. El sentido parece ser que Abraham no se quejó de la promesa de la tierra, aunque tuvo que pedir dentro de ella un lugar para sepultura.
    reason: textual_variant
  revision_rationale: Se conserva intacto el texto principal porque es fiel y natural en español. Solo se sustituye la nota léxica no esencial por la nota textual documentada en el expediente inglés, adaptada fielmente al español y anclada con un marcador único conforme a las normas del proyecto.
