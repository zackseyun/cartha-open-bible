base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/004.yaml
  text: And he was patient in spirit[4], and he spoke with the sons of Heth.
  footnotes:
  - marker: '4'
    text: In verse 9, 'the report about the land' is textually difficult. The sense appears to be that Abraham did not complain about the promise of the land even though he had to request a burial place within it.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:17Z'
    unchanged: false
    changes_summary: Replaced the awkward and less literal 'was composed in this patience of spirit' with the more natural and accurate 'was patient in spirit,' while retaining the second clause unchanged.
translation:
  language: es
  text: Y fue paciente en espíritu[a], y habló con los hijos de Het.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el versículo 9, «el informe acerca de la tierra» es textualmente difícil. El sentido parece ser que Abraham no se quejó de la promesa de la tierra, aunque tuvo que pedir dentro de ella un lugar para sepultura.
    reason: textual_variant
lexical_decisions:
- source_word: በትዕግሥተ መንፈስ
  english_pob_choice: patient in spirit
  chosen_spanish: paciente en espíritu
  alternatives_spanish:
  - constante en espíritu
  - sosegado en espíritu
  lexicon: patience / spirit
  rationale: La construcción geʽez expresa una disposición interior de perseverancia o paciencia, no simple pasividad. «Paciente en espíritu» conserva la imagen del texto inglés auditado y su valor idiomático en español, sin diluir el matiz espiritual.
- source_word: ወተረክበ
  english_pob_choice: he spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: speak
  rationale: El verbo indica aquí un acto de habla directo. «Habló» es la opción más natural y sobria en español para mantener el paralelismo narrativo del pasaje.
- source_word: በዝኒ ዕጉሰ
  english_pob_choice: with the sons of Heth
  chosen_spanish: con los hijos de Het
  alternatives_spanish:
  - a los hijos de Het
  - ante los hijos de Het
  lexicon: sons of Heth
  rationale: Se conserva el etnónimo y la relación sintáctica básica del original. «Con» reproduce la idea de interacción verbal sin añadir un matiz no requerido por el texto.
theological_decisions:
- issue: Sentido de «espíritu» como disposición interior
  english_pob_reading: patient in spirit
  chosen_spanish_reading: paciente en espíritu
  alternative_spanish_readings:
  - paciente de ánimo
  - paciente interiormente
  rationale: El texto no exige una referencia explícita al Espíritu Santo; se trata de la actitud interior del personaje. Por eso se mantiene «espíritu» en minúscula, como en el inglés auditado, para preservar la fuerza antropológica del pasaje.
  doctrine_reference: Anthropological use of espíritu; no pneumatological expansion
translation_notes:
  revision_awareness: El inglés auditado fue revisado desde una formulación más pesada («was composed in this patience of spirit») a la lectura más natural y literal «was patient in spirit». La versión española sigue esa corrección y evita una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Het» para concordar con el referente étnico del pasaje y con el registro bíblico estándar en español.
  - Se usó minúscula en «espíritu» porque el contexto habla de la disposición interior del sujeto, no del Espíritu Santo.
  - La puntuación y el orden de cláusulas siguen de cerca el texto fuente para conservar el paralelismo narrativo.
