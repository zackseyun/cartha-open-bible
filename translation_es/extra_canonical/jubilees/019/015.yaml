base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/015.yaml
  text: And all his deeds were fierce. And Abraham loved Jacob, but Isaac loved Esau. And Abraham saw the deeds of Esau, and he knew that in Jacob his name and seed would be called. And he called Rebekah and commanded her concerning Jacob, because he knew that she loved Jacob much more.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:18Z'
    unchanged: false
    changes_summary: Added 'her' for natural English after 'commanded,' and changed 'gave command' to 'commanded' for smoother formal style. No substantive change to meaning.
translation:
  language: es
  text: Y todos sus hechos eran fieros. Y Abraham amó a Jacob, pero Isaac amó a Esaú. Y Abraham vio los hechos de Esaú, y supo que en Jacob serían llamados su nombre y su descendencia. Y llamó a Rebeca y le dio instrucciones acerca de Jacob, porque sabía que ella amaba mucho más a Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ግብሩ / deeds
  english_pob_choice: his deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus acciones
  lexicon: ግብር
  rationale: ‘Hechos’ conserva el sentido general de acciones o conducta sin cargar con un matiz moral explícito que el contexto no exige. ‘Obras’ podría sonar demasiado valorativo; ‘acciones’ es posible, pero ‘hechos’ sigue bien el paralelismo del pasaje.
- source_word: ድሩክ / fierce
  english_pob_choice: fierce
  chosen_spanish: fieros
  alternatives_spanish:
  - violentos
  - salvajes
  - crueles
  lexicon: ድሩክ
  rationale: ‘Fieros’ reproduce la fuerza y aspereza del adjetivo sin especificar más de lo que el texto permite. Otras opciones añaden una connotación más definida que el geʽez no obliga a tomar.
- source_word: ያዕቆብሃ / Jacob
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: ያዕቆብ
  rationale: Se conserva ‘Jacob’ por ser la forma más reconocible y consistente en el ámbito bíblico latinoamericano, y porque el pasaje trata del patriarca, no de un nombre litúrgico fijado en otra tradición.
- source_word: ዔሳው / Esau
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: ዔሳው
  rationale: ‘Esaú’ es la forma castellana normal del nombre bíblico y mantiene la identificación inmediata del personaje.
- source_word: ስም ወዘርእ / name and seed
  english_pob_choice: his name and seed
  chosen_spanish: su nombre y su descendencia
  alternatives_spanish:
  - su nombre y su simiente
  - su nombre y su linaje
  lexicon: שם / זרע
  rationale: ‘Descendencia’ comunica bien el valor genealógico de ‘seed’ en español bíblico contemporáneo, sin modernizarlo a un sentido meramente biológico. ‘Simiente’ preservaría más literalmente la metáfora, pero resulta menos natural para lectores actuales.
- source_word: ይጼዋዕ / will be called
  english_pob_choice: would be called
  chosen_spanish: serían llamados
  alternatives_spanish:
  - será llamado
  - sería llamado
  lexicon: קרא
  rationale: 'El plural en español refleja la coordinación ‘nombre y descendencia’ y mantiene la pasiva profética del original: en Jacob se convocará/reconocerá la línea del nombre y la descendencia.'
- source_word: ለርብቃ / Rebekah
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rivca
  - Rebecca
  lexicon: רִבְקָה
  rationale: ‘Rebeca’ es la forma española estándar del nombre y es plenamente inteligible en lectura bíblica.
- source_word: ወአዘዘ / commanded
  english_pob_choice: commanded her
  chosen_spanish: le mandó
  alternatives_spanish:
  - le ordenó
  - le dio mandamiento
  lexicon: צוה
  rationale: ‘Mandó’ conserva la autoridad del mandato con un español claro y natural. ‘Ordenó’ también sería posible, pero ‘mandó’ encaja mejor con el registro narrativo breve del pasaje.
theological_decisions:
- issue: Relación entre amor selectivo de Abraham e Isaac por Jacob y Esaú
  english_pob_reading: Abraham loved Jacob, but Isaac loved Esau.
  chosen_spanish_reading: Abraham amó a Jacob, pero Isaac amó a Esaú.
  alternative_spanish_readings:
  - Abraham quiso a Jacob, pero Isaac quiso a Esaú
  - Abraham amaba a Jacob, pero Isaac amaba a Esaú
  rationale: Se mantiene el contraste directo y sobrio del texto. ‘Amó’ conserva la formulación narrativa y no suaviza la preferencia patriarcal documentada en el pasaje.
  doctrine_reference: Narrativa patriarcal de elección y preferencia familiar; Génesis 25:28 en paralelo temático.
- issue: ‘Name and seed would be called in Jacob’
  english_pob_reading: he knew that in Jacob his name and seed would be called
  chosen_spanish_reading: supo que en Jacob serían llamados su nombre y su descendencia
  alternative_spanish_readings:
  - supo que en Jacob se llamaría su nombre y su descendencia
  - supo que en Jacob habría de ser llamado su nombre y su descendencia
  rationale: La pasiva conserva la afirmación del texto sin convertirla en una paráfrasis explicativa. ‘Serían llamados’ permite que ‘nombre y descendencia’ funcionen como el contenido profético de la llamada.
  doctrine_reference: Elección de linaje / promesa patriarcal; eco de la continuidad del pacto.
- issue: Abraham’s instruction to Rebekah regarding Jacob
  english_pob_reading: he called Rebekah and commanded her concerning Jacob
  chosen_spanish_reading: llamó a Rebeca y le mandó acerca de Jacob
  alternative_spanish_readings:
  - llamó a Rebeca y le ordenó acerca de Jacob
  - llamó a Rebeca y le dio mandato acerca de Jacob
  rationale: ‘Acerca de Jacob’ reproduce el alcance del mandato sin añadir contenido no explicitado. Se evita especificar más de lo que el pasaje dice; el foco está en la instrucción dada por conocimiento previo de la preferencia de Rebeca.
  doctrine_reference: Autoridad familiar y transmisión de la bendición/linaje en la casa patriarcal.
translation_notes:
  revision_awareness: La versión inglesa revisada solo añadió un objeto implícito para naturalidad (‘commanded her’) y cambió la formulación a un estilo más fluido, sin alterar el sentido. La redacción española sigue el contenido revisado sin introducir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene ‘Jacob’ en vez de ‘Jacobo’ para coherencia bíblica y reconocimiento inmediato del personaje.
  - Se usa ‘Esaú’ como forma castellana estándar.
  - ‘Hechos’ se reserva para el comportamiento o las acciones del personaje, no para obras en sentido doctrinal.
  - No se introduce ‘SEÑOR’ ni sustituciones litúrgicas, porque el verso no contiene el nombre divino.
  - Se conserva el tono narrativo sobrio y la secuencia de causalidad del original.
