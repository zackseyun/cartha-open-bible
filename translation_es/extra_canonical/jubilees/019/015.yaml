revisions:
- from: Y todos sus hechos eran fieros. Y Abraham amó a Jacob, pero Isaac amó a Esaú. Y Abraham vio los hechos de Esaú, y supo que en Jacob serían llamados su nombre y su descendencia. Entonces llamó a Rebeca y le mandó acerca de Jacob, porque sabía que ella amaba a Jacob mucho más.
  to: Y todos sus hechos eran fieros. Y Abraham amó a Jacob, pero Isaac amó a Esaú. Y Abraham vio los hechos de Esaú, y supo que en Jacob serían llamados su nombre y su descendencia. Y llamó a Rebeca y le dio instrucciones acerca de Jacob, porque sabía que ella amaba mucho más a Jacob.
  rationale: 'Se revisa solo la última cláusula para hacerla idiomática y precisa en español: ‘le dio instrucciones acerca de Jacob’ transmite mejor el sentido de ወአዘዘ … በእንተ ያዕቆብ (‘mandó/ordenó a ella con respecto a Jacob’) que el poco natural ‘le mandó acerca de Jacob’. También se elimina ‘Entonces’ para seguir más de cerca la simple coordinación de la fuente. El resto del texto preserva adecuadamente el sentido del original y las decisiones del POB inglés.'
