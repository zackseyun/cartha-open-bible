translation:
  language: es
  text: Y en el primer año de la tercera semana de este jubileo[2], se completaron los días de la vida de Sara, y murió en Hebrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: '2'
    text: «Este jubileo» mantiene la unidad cronológica del original. El inglés POB nota que la redacción etiópica usa una expresión descriptiva; en español se conserva esa misma sobriedad sin introducir una explicación narrativa en el texto principal.
    reason: lexical_alternative
