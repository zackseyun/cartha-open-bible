translation:
  language: es
  text: Y Abraham fue a llorar por ella y a sepultarla, y lo probamos para ver si su espíritu era paciente, y no fue violento con las palabras de su boca.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይብክያ / weep
  english_pob_choice: weep for her
  chosen_spanish: llorar por ella
  alternatives_spanish:
  - lamentar por ella
  - llorar por ella y hacer duelo por ella
  lexicon: wailing/lamentation
  rationale: El verbo se refiere a duelo expresado en llanto; en español, “llorar por ella” comunica de manera natural el lamento funerario sin añadir una paráfrasis innecesaria.
- source_word: ይቅበራ / bury
  english_pob_choice: bury her
  chosen_spanish: sepultarla
  alternatives_spanish:
  - enterrarla
  - sepultarla
  lexicon: burial
  rationale: “Sepultar” mantiene un registro digno y culto, adecuado para un contexto patriarcal y funerario, y conserva el sentido de entierro del texto fuente.
- source_word: መንፈሱ / spirit
  english_pob_choice: his spirit
  chosen_spanish: su espíritu
  alternatives_spanish:
  - su espíritu
  - su aliento
  lexicon: spirit
  rationale: 'Aquí el contexto es interior y moral: la paciencia de Abraham. “Espíritu” es la opción más fiel y clara en español.'
- source_word: ይትነገሥ / be tested
  english_pob_choice: we tested him
  chosen_spanish: lo probamos
  alternatives_spanish:
  - lo pusimos a prueba
  - lo probamos
  lexicon: test/prove
  rationale: El verbo ge'ez expresa una prueba real; “probar” reproduce bien la idea de examinar la constancia de Abraham, y “poner a prueba” queda como alternativa equivalente.
- source_word: no becoming violent in speech
  english_pob_choice: he did not become violent in the speech of his mouth
  chosen_spanish: no se volvió violento en la palabra de su boca
  alternatives_spanish:
  - no fue violento en la palabra de su boca
  - no soltó violencia por su boca
  lexicon: speech of his mouth
  rationale: 'La construcción fuente es concreta y algo extraña: “la palabra de su boca” conserva la imagen semítica sin suavizarla en exceso. “Volverse violento” refleja la idea de no reaccionar con violencia verbal.'
theological_decisions:
- issue: La prueba de Abraham como tema narrativo
  english_pob_reading: we tested him to see if his spirit was patient
  chosen_spanish_reading: lo probamos para ver si su espíritu era paciente
  alternative_spanish_readings:
  - lo pusimos a prueba para ver si su espíritu era paciente
  - lo probamos para ver si mantenía la paciencia
  rationale: La revisión auditada corrige la lectura previa errónea de “recordar”. El contexto de Jubileos presenta la muerte de Sara como ocasión de prueba; el español debe conservar explícitamente el motivo de la paciencia probada.
  doctrine_reference: Jubilees 19:3; cf. theme of testing in Jubilees
- issue: Violencia verbal como indicador moral
  english_pob_reading: he did not become violent in the speech of his mouth
  chosen_spanish_reading: no se volvió violento en la palabra de su boca
  alternative_spanish_readings:
  - no habló con violencia
  - no se desató en palabras violentas
  rationale: La frase fuente une conducta y habla; no conviene reducirla solo a “no dijo algo malo”. El español conserva la materialidad de la expresión y la dimensión ética de la respuesta de Abraham.
  doctrine_reference: Jubilees 19:3
translation_notes:
  revision_awareness: 'El borrador corrige la falla anterior señalada por validación: no incluye notas sin anclaje en el texto. Además, sigue la revisión auditada que identifica la lectura correcta como “we tested him” y “bury her”, no “remember her”.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo.
  - Se evita “SEÑOR” u otras sustituciones innecesarias, pues el versículo no contiene el nombre divino.
  - Se conserva la imagen concreta de la boca y la palabra, sin convertirla en una paráfrasis abstracta.
