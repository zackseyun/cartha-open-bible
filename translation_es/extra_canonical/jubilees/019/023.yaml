translation:
  language: es
  text: Si un hombre puede contar la arena de la tierra, también será contada su descendencia. Y todas las bendiciones con que me bendijo
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይክል፡ ሰብእ፡ ኈልቆ፡ ኖላ፡ ምድር፡
  english_pob_choice: If a man can count the sand of the earth
  chosen_spanish: Si un hombre puede contar la arena de la tierra
  alternatives_spanish:
  - Si un hombre puede contar la arena de la tierra
  - Si alguien puede contar la arena de la tierra
  lexicon: hombre / arena / tierra
  rationale: El ge'ez presenta una condición general con 'sebw' ('hombre') y una imagen de la arena de la tierra; 'hombre' conserva la forma proverbial y la lectura del inglés POB sin añadir matices no atestiguados.
- source_word: ይትኌለቍ፡ ዘርኡሂ።
  english_pob_choice: then his seed also will be counted
  chosen_spanish: también será contado su descendencia
  alternatives_spanish:
  - también será contada su descendencia
  - entonces también su descendencia será contada
  lexicon: descendencia / contar
  rationale: '''ዘር'' refiere a la descendencia o linaje; en español ''descendencia'' es más natural y preserva la tensión numérica/metafórica de ''ser contado''. Mantengo ''será contado'' para seguir el valor pasivo del original.'
- source_word: ወኵሉን፡ በረከት፡ እለ፡ ባረከኒ፡
  english_pob_choice: And all the blessings with which he blessed me
  chosen_spanish: Y todas las bendiciones con las cuales él me bendijo
  alternatives_spanish:
  - Y todas las bendiciones con que él me bendijo
  - Y todas las bendiciones con las cuales me bendijo
  lexicon: bendiciones / bendijo
  rationale: '''በረከት'' es ''bendiciones''; se conserva la repetición de ''bendijo/bendiciones'' del texto fuente. ''Con las cuales'' refleja de cerca la construcción relativa sin forzar un giro más idiomático que altere el paralelismo.'
theological_decisions:
- issue: Sujeto explícito de 'me bendijo'
  english_pob_reading: Or 'the LORD blessed me'.
  chosen_spanish_reading: él me bendijo
  alternative_spanish_readings:
  - el Señor me bendijo
  - Yahvé me bendijo
  rationale: El texto ge'ez sólo dice 'me bendijo' sin sujeto expreso; por fidelidad auditada no se introduce 'Yahvé' ni 'el Señor' en el texto principal. La ambigüedad se preserva como en la revisión inglesa.
  doctrine_reference: Fidelidad textual; evitar expansión del sujeto no atestiguado en el testimonio base.
translation_notes:
  revision_awareness: La revisión más reciente confirmó que el texto ge'ez no contiene un sujeto explícito para 'me bendijo' y que la redacción inglesa anterior con 'the LORD blessed me' fue corregida a 'he blessed me'. Por ello, el español adopta 'él me bendijo' sin añadir un nombre divino en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantiene 'bendijo' en forma verbal simple para conservar el paralelismo con 'bendiciones'.
  - No se introduce 'SEÑOR' ni 'Yahvé' porque el segmento fuente disponible no lo explicita.
  - '''Descendencia'' se usa como equivalente natural de ''seed'' en este contexto genealógico.'
