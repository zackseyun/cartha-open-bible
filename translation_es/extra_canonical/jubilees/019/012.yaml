    rationale: El ge'ez/inglés expresa que ella le engendró o le dio seis hijos a Abraham. En español, «dar a luz» suele llevar como objeto directo al hijo («dio a luz a seis hijos»), mientras que con «le» la construcción suena forzada y puede distraer del sentido.
  - severity: low
    issue: La expresión técnica «en dos semanas de años» puede resultar oscura sin apoyo paratextual.
    rationale: Aunque debe conservarse por fidelidad a Jubileos, una nota breve ayuda a lectores hispanos a entender que se refiere a dos períodos de siete años, sin sustituir la terminología del texto.
