translation:
  language: es
  text: 'porque Agar había muerto antes que Sara. Y le dio seis hijos: Zimrán, Jocsán, Medán, Madián, Isbac y Súa, en dos semanas de años[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, dos períodos de siete años; se conserva la expresión técnica de Jubileos literalmente.
    reason: Aclara una unidad cronológica interna del libro que en español puede sonar ambigua, mientras preserva la terminología fuente.
lexical_decisions:
- source_word: እስመ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: causal conjunction
  rationale: El ge'ez introduce la explicación causal de la oración anterior; en español bíblico natural, «porque» expresa con claridad esa relación sin forzar un calco de «for».
- source_word: ሞተት፡ አጋር፡ እምቅድመ፡ ሳራ።
  english_pob_choice: Hagar had died before Sarah
  chosen_spanish: Agar había muerto antes que Sara
  alternatives_spanish:
  - Agar murió antes que Sara
  - Agar había fallecido antes que Sara
  lexicon: verbo de muerte + comparación temporal
  rationale: «Había muerto antes que» refleja bien el valor pluperfectivo del relato y la relación temporal explícita del original; «fallecido» sería posible pero menos directo. Se conserva el orden de nombres y la sencillez narrativa del texto fuente.
- source_word: ወወለደት፡ ሎቱ፡
  english_pob_choice: And she bore him
  chosen_spanish: Y le dio a luz
  alternatives_spanish:
  - Y ella le dio a luz
  - Y lo parió
  lexicon: verbo de parto / dar a luz
  rationale: El ge'ez expresa el nacimiento de hijos por parte de Agar; en español, «dio a luz» es una formulación digna y clara, más natural que un calco literal. El objeto indirecto «le» mantiene la referencia a Abraham sin añadir explicaciones.
- source_word: ውሉደ፡ ስድስተ፡ ...
  english_pob_choice: six sons
  chosen_spanish: seis hijos
  alternatives_spanish:
  - seis varones
  - seis descendientes
  lexicon: hijos
  rationale: El texto enumera seis nombres propios de hijos varones; «hijos» comunica el hecho sin necesidad de añadir «varones», que el listado ya deja claro. «Descendientes» sería demasiado amplio.
- source_word: በክልኤ፡ ሱባዔ፡ ዓመት።
  english_pob_choice: in two weeks of years
  chosen_spanish: en dos semanas de años
  alternatives_spanish:
  - en dos semanas de años completos
  - al cabo de dos semanas de años
  lexicon: unidad temporal jubilar
  rationale: Se preserva la expresión técnica del Jubileos, «dos semanas de años», porque es parte del sistema calendárico-teológico del libro y no debe normalizarse a una medida moderna. Mantenerla literalmente permite auditar la referencia jubilar del período.
theological_decisions:
- issue: Conservación de la cronología jubilar
  english_pob_reading: in two weeks of years
  chosen_spanish_reading: en dos semanas de años
  alternative_spanish_readings:
  - al cabo de catorce años
  - en dos periodos de siete años
  rationale: El texto pertenece a una obra con cronología técnica propia; traducirla a un equivalente aritmético perdería la terminología interna y su valor composicional. La formulación literal mantiene la teología y la estructura temporal del libro.
  doctrine_reference: Jubileos 19:12; cronología interna del libro de Jubileos
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre el texto ge'ez y la traducción inglesa POB; no se identificaron revisiones aplicadas ni tensiones textuales relevantes en este versículo. La versión española sigue la lectura estable de la edición Charles 1895 sin introducir variantes.
  spanish_consistency_notes:
  - Se mantiene «Agar» para Hagar y «Sara» para Sarah, conforme a los antropónimos bíblicos usuales en español.
  - Se conserva la estructura narrativa breve del original sin añadir conectores o explicaciones no presentes en el texto fuente.
  - Se traduce la unidad jubilar con literalidad («dos semanas de años») por su importancia técnica en Jubileos.
  - Los nombres propios de los seis hijos se presentan en grafía española habitual, respetando su identificación tradicional.
