base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/007.yaml
  text: 'And he bowed down to them again, and after this he buried his dead in the double cave. And all the days of Sarah’s life were one hundred and twenty-seven years: two jubilees and four weeks of years.'
  footnotes:
  - marker: a
    text: Or 'And he bowed down to them,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:16Z'
    unchanged: false
    changes_summary: Added the final period for completeness and formal polish. The draft accurately reflects the source, including 'double cave' and the jubilee/week-of-years reckoning.
translation:
  language: es
  text: 'Y se postró de nuevo ante ellos, y después de esto sepultó a su difunta en la cueva doble. Y todos los días de la vida de Sara fueron ciento veintisiete años: dos jubileos y cuatro semanas de años.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወሰገደ፡ ሎሙ፡ ካዕበ፡
  english_pob_choice: And he bowed down to them again
  chosen_spanish: Y se postró de nuevo ante ellos
  alternatives_spanish:
  - Y se inclinó ante ellos otra vez
  - Y se postró ante ellos otra vez
  lexicon: postrarse / inclinarse
  rationale: El Ge'ez añade la idea de repetición (kaʿba, 'de nuevo/otra vez'), reflejada en el inglés revisado como 'again'. 'Postró' conserva la fuerza reverencial del gesto, mientras 'de nuevo' mantiene explícita la repetición sin suavizarla.
- source_word: ቤድኖ፡ ... ባዓት፡' ዘካዕበት።
  english_pob_choice: his dead in the double cave
  chosen_spanish: su muerto en la cueva doble
  alternatives_spanish:
  - su difunto en la cueva doble
  - a su muerto en la cueva doble
  lexicon: cueva doble
  rationale: '''Double cave'' se traduce literalmente como ''cueva doble'' para preservar el rasgo descriptivo del lugar. ''Su muerto'' sigue el sentido singular del poseído en el contexto narrativo, sin convertirlo en una paráfrasis más amplia.'
- source_word: ወኮነ፡ ኵሉ፡ መዋዕለ፡ ሕይወታ፡ ለሳራ፡
  english_pob_choice: And all the days of Sarah’s life
  chosen_spanish: Y todos los días de la vida de Sara
  alternatives_spanish:
  - Y todos los días de la vida de Sarah
  - Y todos los días de la vida de Sara
  lexicon: vida / días
  rationale: Se mantiene la fórmula bíblica directa 'todos los días de la vida de Sara', con 'Sara' como forma española normal del nombre. No se añade interpretación adicional.
- source_word: ምእት፡ ወዕሥራ፡ ወሰብዓቱ፡
  english_pob_choice: were one hundred and twenty-seven years
  chosen_spanish: fueron ciento veintisiete años
  alternatives_spanish:
  - llegaron a ser ciento veintisiete años
  - eran ciento veintisiete años
  lexicon: años
  rationale: '''Fueron ciento veintisiete años'' reproduce la cuenta total en una forma natural y sobria en español, adecuada para una declaración de edad final.'
- source_word: '*አሉ፡ ክልኤ፡ ኢዮቤልዉ፡ ወአርባዕቱ፡ ሱባዔ፡'
  english_pob_choice: two jubilees and four weeks of years
  chosen_spanish: dos jubileos y cuatro semanas de años
  alternatives_spanish:
  - dos jubileos y cuatro semanas de años
  - dos jubileos y cuatro semanas anuales
  lexicon: jubileos / semanas de años
  rationale: Se conserva la terminología calendárica propia del texto ('jubileos' y 'semanas de años') para no nivelarla a una expresión más explicativa. 'Semanas de años' mantiene el valor técnico de suɓaʾe y la estructura del original.
theological_decisions:
- issue: Repetition of the bowing gesture
  english_pob_reading: And he bowed down to them again
  chosen_spanish_reading: Y se postró de nuevo ante ellos
  alternative_spanish_readings:
  - Y se postró ante ellos otra vez
  - Y se inclinó de nuevo ante ellos
  rationale: La revisión auditada indica que el Ge'ez contiene una marca de repetición. Mantener 'de nuevo' evita perder ese matiz narrativo y conserva el gesto de honra/reverencia sin atenuarlo.
  doctrine_reference: Narrative fidelity; cf. Genesis 23:12 parallel
- issue: Chronological reckoning in jubilees and weeks of years
  english_pob_reading: two jubilees and four weeks of years
  chosen_spanish_reading: dos jubileos y cuatro semanas de años
  alternative_spanish_readings:
  - dos jubileos y cuatro semanas de años
  - dos jubileos y cuatro ciclos de años
  rationale: El texto presenta un cómputo técnico de tiempo, no una glosa interpretativa. Por eso se preserva la unidad calendárica tal como aparece, permitiendo al lector reconocer la estructura propia de Jubileos.
  doctrine_reference: Second Temple calendrical terminology
translation_notes:
  revision_awareness: La auditoría inglesa revisada corrigió la omisión de 'again' en la primera cláusula y confirmó el punto final final; la versión española incorpora 'de nuevo' para reflejar esa revisión y mantiene la terminología técnica 'cueva doble' y 'semanas de años' sin diluirla.
  spanish_consistency_notes:
  - Se usa 'Sara' como forma española estable del nombre.
  - Se preserva la construcción narrativa con dos oraciones coordinadas para seguir la secuencia del original.
  - No se introduce una nota al pie porque no hay necesidad de variante textual anclada en esta línea una vez incorporado 'de nuevo' en el cuerpo del texto.
