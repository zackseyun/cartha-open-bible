lexical_decisions:
- source_word: ወዓመት፡ አሐዱ፤
  english_pob_choice: and one year.
  chosen_spanish: y un año.
  alternatives_spanish:
  - y un año más
  - y otro año
  lexicon: año
  rationale: El ge’ez expresa simplemente la suma ‘y un año’; la POB inglesa conserva la frase mínima. En español, ‘y un año’ reproduce de forma directa y sobria el valor cuantitativo sin añadir inferencias de duración o secuencia.
- source_word: ዝንቱ፡ መዋዕለ፡ ሕይወታ፡ ለሳራ።
  english_pob_choice: These were the days of Sarah’s life.
  chosen_spanish: Estos fueron los días de la vida de Sara.
  alternatives_spanish:
  - Estos fueron los días de la vida de Sarah
  - Éstos fueron los días de la vida de Sara
  lexicon: días de la vida
  rationale: ‘Days of life’ se conserva como expresión idiomática bíblica. ‘De la vida’ mantiene el genitivo de posesión/relación sin explicitar más de lo que el original dice. Se usa ‘Sara’ por la forma española habitual del nombre bíblico.
- source_word: ዝመከራ፡ ዓሥር፡ በዘተመከረ።
  english_pob_choice: This was the tenth trial by which Abraham was tried,
  chosen_spanish: Esta fue la décima prueba por la cual fue probado Abraham,
  alternatives_spanish:
  - Esta fue la décima prueba con que Abraham fue probado
  - Esta fue la décima prueba por la que Abraham fue probado
  lexicon: prueba / fue probado
  rationale: El pasivo ‘fue probado’ refleja el sentido de la POB inglesa y preserva la tensión de ‘trial/temptation/test’ como prueba divina o examinación. ‘Prueba’ es más abarcador que ‘tentación’ y evita cargar el verso con una connotación exclusivamente moral.
theological_decisions:
- issue: Naturaleza de la ‘prueba’ de Abraham
  english_pob_reading: the tenth trial by which Abraham was tried
  chosen_spanish_reading: la décima prueba por la cual fue probado Abraham
  alternative_spanish_readings:
  - la décima tentación por la cual Abraham fue tentado
  - la décima examinación por la cual Abraham fue examinado
  rationale: El texto presenta la serie de pruebas de Abraham; en español ‘prueba’ comunica de manera neutral el evento de evaluación o test sin reducirlo a tentación sexual/moral ni a un examen académico. El pasivo mantiene la agencia implícita del que prueba, como en la tradición de la obra.
  doctrine_reference: Génesis 22; Santiago 1:2-4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; la POB inglesa se mantuvo sin notas, y el texto ge’ez disponible apoya una traducción breve y literal del tramo conservado.
  spanish_consistency_notes:
  - Se mantiene el nombre ‘Sara’ en forma española estándar.
  - Se conserva el tono sobrio y fragmentario del original, sin añadir conectores o sujetos no atestiguados.
  - No se introduce glosa sobre el ‘año’ porque el hebraísmo/ge’ez del fragmento no la requiere en español.
