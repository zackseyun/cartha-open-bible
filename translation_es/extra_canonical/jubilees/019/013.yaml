base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/013.yaml
  text: And in the sixth week, in its second year, Rebekah bore to Isaac two sons, Jacob and Esau. And Jacob was smooth and upright, but Esau was a fierce man, and a man of the field,
  footnotes:
  - marker: a
    text: Or 'a hairy man'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:17Z'
    unchanged: false
    changes_summary: Changed 'harsh man' to 'a hairy man' for lexical accuracy; retained the rest with minor article consistency.
translation:
  language: es
  text: Y en la sexta semana, en su segundo año, Rebeca le dio a Isaac dos hijos, Jacob y Esaú. Y Jacob era liso y recto, pero Esaú era un hombre feroz y un hombre del campo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበሱባዔ፡ ሳድስ፡ በክልኤ፡ ዓመት፡
  english_pob_choice: And in the sixth week, in its second year
  chosen_spanish: Y en la sexta semana, en su segundo año
  alternatives_spanish:
  - Y en la sexta semana, en el segundo año
  - Y durante la sexta semana, en su segundo año
  lexicon: time/sequence phrase
  rationale: Conservo la estructura temporal del original con una formulación natural en español. «Su segundo año» refleja el posesivo del texto sin añadir información.
- source_word: ወለደት፡ ርብቃ፡ ለይስሐቅ፡ ክልኤ፡ ደቂቀ፡
  english_pob_choice: Rebekah bore to Isaac two sons
  chosen_spanish: Rebeca dio a Isaac dos hijos
  alternatives_spanish:
  - Rebeca dio a luz a Isaac dos hijos
  - Rebeca le dio a Isaac dos hijos
  lexicon: bore/give birth
  rationale: «Dar a luz» sería más explícito, pero «dio a Isaac dos hijos» mantiene la sencillez del POB inglés y el sentido de nacimiento sin sobrecargar la frase.
- source_word: ያዕቆብሃ፡ ወዔሳውሃ፡
  english_pob_choice: Jacob and Esau
  chosen_spanish: Jacob y Esaú
  alternatives_spanish:
  - Jacobo y Esaú
  lexicon: proper names
  rationale: Uso los nombres bíblicos habituales en español. «Jacob» es la forma estándar para el patriarca en este contexto.
- source_word: ወያዕቆብሰ፡ ልሙጽ፡ ወሬትዕ፡
  english_pob_choice: And Jacob was smooth and upright
  chosen_spanish: Y Jacob era liso y recto
  alternatives_spanish:
  - Y Jacob era suave y recto
  - Y Jacob era sin vello y recto
  lexicon: smooth/upright
  rationale: «Liso» conserva el valor físico de «smooth» sin introducir la armonización con Génesis que llevaría a «sin vello». «Recto» expresa la cualidad moral indicada por el inglés POB.
- source_word: ዔሳው፡ ውእቱ፡ ብእሲ፡ ድሩክ፡
  english_pob_choice: but Esau was a fierce man
  chosen_spanish: pero Esaú era un hombre feroz
  alternatives_spanish:
  - pero Esaú era un hombre rudo
  - pero Esaú era un hombre áspero
  lexicon: fierce/harsh/rough
  rationale: La revisión y la nota crítica indican que el Ge'ez `ድሩክ` significa «fierce/harsh/rough», no «hairy». En español, «feroz» transmite bien la dureza o fiereza sin falsear el léxico.
- source_word: ወ*ሐቃላዊ፡
  english_pob_choice: and a man of the field
  chosen_spanish: y un hombre del campo
  alternatives_spanish:
  - y un hombre del campo abierto
  - y un hombre de los campos
  lexicon: field
  rationale: «Del campo» es la equivalencia natural y directa para la locución, manteniendo el contraste con Jacob.
theological_decisions:
- issue: Descripción moral de Jacob como «upright»
  english_pob_reading: Jacob was smooth and upright
  chosen_spanish_reading: Jacob era liso y recto
  alternative_spanish_readings:
  - Jacob era liso y justo
  - Jacob era suave y recto
  rationale: «Recto» preserva la cualidad moral sin forzar una interpretación jurídica o devocional más fuerte que la del texto auditado.
  doctrine_reference: character description in narrative genealogy
- issue: Caracterización de Esaú como «fierce man»
  english_pob_reading: Esau was a fierce man
  chosen_spanish_reading: Esaú era un hombre feroz
  alternative_spanish_readings:
  - Esaú era un hombre rudo
  - Esaú era un hombre áspero
  rationale: La evidencia ge'ez favorece una cualidad de dureza/fiereza. Mantenerla evita armonizar indebidamente con otras tradiciones textuales sobre el cabello de Esaú.
  doctrine_reference: textual-historical reading of Jubilees against harmonization with Genesis
translation_notes:
  revision_awareness: The source audit trail records a correction away from a mistaken 'hairy' rendering back to a lexically accurate Ge'ez sense ('fierce/harsh/rough'). The Spanish draft follows that correction and avoids importing the Genesis 25/27 hairiness motif. No footnote is needed because the main text does not use an alternate reading.
  spanish_consistency_notes:
  - Usé «Yahvé» only when the source required the divine name; aquí no aparece.
  - Mantuve nombres propios bíblicos en sus formas españolas estándar.
  - Evité «siervo» porque no hay δοῦλος/servant language en este versículo.
  - La frase «hombre del campo» conserva el paralelismo narrativo sin agregar color interpretativo.
