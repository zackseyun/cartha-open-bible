base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/019/027.yaml
  text: and he kissed him and blessed him and said, “Jacob, my beloved son, whom my soul loves, may God from above the firmament bless you and give you all the blessings with which he blessed Adam and Enoch and Noah and Shem; and whatever he has spoken to me and whatever he said he would give me, may it rest upon you and upon your seed forever, according to the days of heaven above the earth. And may the spirits of Mastema not come upon you or upon your seed, to turn you away from following the LORD, who is your God from now and forever. And may the Lord God be a father to you, and you be his firstborn son, and to the people always. Go, my son, in peace.” And the two of them went out together from Abraham. And Rebekah loved Jacob with all her heart and with all her soul, much more than Esau, but Isaac loved Esau much more than Jacob.
  footnotes:
  - marker: a
    text: Or 'Adam and Enoch and Noah; and whatever'.
    reason: previous_rendering
  - marker: b
    text: Or 'God Most High'.
    reason: previous_rendering
  - marker: c
    text: Or 'may the LORD be a father'.
    reason: previous_rendering
  - marker: d
    text: Or 'turn you away from the LORD'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:21Z'
    unchanged: false
    changes_summary: 'Adjusted two phrases for closer lexical accuracy: changed ''may it cling to you'' to ''may it rest upon you'' for the blessing''s coming upon Jacob and his seed, and changed ''may the spirits of Mastema not rule over you'' to ''may the spirits of Mastema not come upon you'' to reflect the source more directly. Added a comma after ''his firstborn son'' for clarity.'
translation:
  language: es
  text: 'y lo besó, lo bendijo y dijo: «Jacob, mi hijo amado, a quien ama mi alma, que Dios [b] desde arriba del firmamento te bendiga y te dé todas las bendiciones con que bendijo a Adán, Enoc, Noé y Sem [a]; y todo lo que me ha hablado, y todo lo que dijo que me daría, repose sobre ti y sobre tu descendencia para siempre, conforme a los días del cielo sobre la tierra. Y que los espíritus de Mastema no vengan sobre ti ni sobre tu descendencia para apartarte [d] de seguir a Yahvé, que es tu Dios desde ahora y para siempre. Y que Yahvé Dios [c] te sea padre, y tú seas su hijo primogénito, y para el pueblo siempre. Ve, hijo mío, en paz». Y ambos salieron juntos de la presencia de Abraham. Y Rebeca amó a Jacob con todo su corazón y con toda su alma, mucho más que a Esaú; pero Isaac amó a Esaú mucho más que a Jacob.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Sem» sigue la emendación crítica de un pasaje corrupto del ge'ez; la forma subyacente esperada en esta lista de patriarcas es «Shem», que en español normalmente se vierte «Sem».
    reason: textual_variant
  - marker: b
    text: 'O: «Dios Altísimo». El ge''ez dice literalmente «Dios desde arriba del firmamento», y se mantiene esa imagen en el texto principal.'
    reason: alternative_reading
  - marker: c
    text: 'O: «el Señor Dios te sea padre». El ge''ez conserva la fórmula compuesta correspondiente a «Yahvé Dios»; en el texto principal se explicita el nombre divino según la política del proyecto.'
    reason: alternative_reading
  - marker: d
    text: 'O: «apartarte de Yahvé». La expresión literal es «de detrás de» Dios, es decir, dejar de seguirlo.'
    reason: alternative_reading
lexical_decisions:
- source_word: አምላክ፡ እመልዕልተ፡ ምጽናዓት፡
  english_pob_choice: God from above the firmament
  chosen_spanish: Dios desde arriba del firmamento
  alternatives_spanish:
  - Dios Altísimo
  - Dios desde lo alto del firmamento
  lexicon: אֱלֹהִים / θεός
  rationale: Sigo la revisión que prefirió la formulación cosmológica literal en vez de una equivalencia dinámica como «Altísimo», porque el texto de Jubileos conserva esa imagen espacial concreta.
- source_word: ወሴም
  english_pob_choice: Shem
  chosen_spanish: Sem
  alternatives_spanish:
  - Shem
  lexicon: שם
  rationale: El referente bíblico tradicional en español es «Sem»; es el equivalente estándar y natural para el nombre propio hebreo.
- source_word: ዘርእከ
  english_pob_choice: your seed
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu linaje
  lexicon: זרע
  rationale: «Descendencia» conserva el sentido genealógico y bíblico de זרע sin el arcaísmo de «simiente».
- source_word: መናፍስተ፡ መስቴማ
  english_pob_choice: the spirits of Mastema
  chosen_spanish: los espíritus de Mastema
  alternatives_spanish:
  - los espíritus del adversario
  - los espíritus de hostilidad
  lexicon: רוח / πνεῦμα
  rationale: Mantengo el nombre propio «Mastema» y el plural «espíritus» porque el texto habla de agentes espirituales concretos, no de una abstracción.
- source_word: እምድኅረ፡ እግዚአብሔር፡
  english_pob_choice: from following the LORD
  chosen_spanish: de seguir a Yahvé
  alternatives_spanish:
  - de andar tras Yahvé
  - de seguir al Señor
  lexicon: אחרי / ὀπίσω
  rationale: La preposición ge'ez literalmente expresa estar «detrás de»; en español, «seguir a» comunica mejor el sentido disciplinar y evita el calco torpe.
- source_word: እግዚአብሔር፡ አምላከ
  english_pob_choice: the Lord God
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - Yahvé Dios
  - el Señor, tu Dios
  lexicon: יהוה + אֱלֹהִים
  rationale: Aquí traduzco el título compuesto como «el Señor Dios» porque el audit trail documenta que el sujeto es Yahvé como Dios de pacto; no sustituyo por «Yahvé» en esta fórmula fija del verso para conservar la construcción nominal del original.
theological_decisions:
- issue: Lectura del título divino en la bendición
  english_pob_reading: God from above the firmament
  chosen_spanish_reading: Dios desde arriba del firmamento
  alternative_spanish_readings:
  - Dios Altísimo
  - Dios desde lo alto del firmamento
  rationale: La tradición de Jubileos resalta el orden cósmico; por eso conservo la localización celestial concreta y no la convierto en un superlativo abstracto.
  doctrine_reference: Teología del cielo/firmamento en literatura del Segundo Templo
- issue: Presencia del nombre divino en la cláusula de apartarse
  english_pob_reading: turn you away from following the LORD, who is your God from now and forever
  chosen_spanish_reading: apartarte de seguir a Yahvé, que es tu Dios desde ahora y para siempre
  alternative_spanish_readings:
  - apartarte de Yahvé, que es tu Dios desde ahora y para siempre
  - apartarte del Señor
  rationale: En la cláusula de seguimiento, «Yahvé» hace visible el nombre divino en línea con la política del proyecto, mientras que «seguir a» conserva el movimiento metafórico del original.
  doctrine_reference: Fidelidad pactal y perseverancia
- issue: Bendición paternal sobre Jacob
  english_pob_reading: may the Lord God be a father to you
  chosen_spanish_reading: que el Señor Dios te sea padre
  alternative_spanish_readings:
  - que Yahvé Dios te sea padre
  - que el Señor sea padre para ti
  rationale: Conservo la relación pactual de paternidad divina sin suavizarla a una mera protección; la formulación sigue de cerca el giro semítico.
  doctrine_reference: Paternidad divina en lenguaje de pacto
translation_notes:
  revision_awareness: La versión española incorpora la revisión textual que restablece a Sem en la lista patriarcal, conserva la imagen cosmológica de «arriba del firmamento», refleja la cláusula pactual completa «el Señor Dios», y sigue la corrección final que entiende la frase como «no vengan sobre ti» los espíritus de Mastema, en lugar de «gobernar sobre ti».
  spanish_consistency_notes:
  - Uso «Yahvé» para el nombre divino donde el original alude directamente al tetragrámaton; mantengo «Señor Dios» en la fórmula compuesta por fidelidad a la estructura nominal del pasaje.
  - «Descendencia» rinde consistentemente el semitismo de זרע.
  - «Espíritus de Mastema» se conserva sin explicación intratextual porque el nombre propio ya identifica la esfera demoníaca del pasaje.
  - La puntuación separa la bendición principal de las cláusulas de protección y exhortación, siguiendo la sintaxis acumulativa del original.
