    issue: 'Expresión temporal poco natural: ''en el séptimo día'''
    rationale: Aunque comprensible, en español bíblico y general 'el séptimo día' o 'en el séptimo día' solo se justifica en contextos más marcados. Aquí el inglés auditado 'on the seventh day' se vierte con más naturalidad como 'el séptimo día'.
  - severity: low
    issue: 'Giro espacial algo forzado: ''desde en medio de la nube'''
    rationale: No es incorrecto, pero suena pesado en español. 'Desde el interior de la nube' conserva el punto de procedencia y mejora la fluidez sin alterar el sentido.
  revised_spanish_text: Y el séptimo día llamó a Moisés desde el interior de la nube, y la apariencia de la gloria de Yahvé[a] fue como fuego ardiente en la cima del monte. Y Moisés estuvo en el monte cuarenta días y cuarenta noches.
  revised_footnotes:
  - marker: a
    text: 'O: «la gloria de Yahvé apareció como»; el ge''ez permite también una lectura más verbal, pero aquí se sigue la estructura nominal auditable.'
    reason: textual_variant
  revision_rationale: 'Se hicieron ajustes menores de naturalidad idiomática en español: ''Y el séptimo día'' en lugar de ''Y en el séptimo día'', y ''desde el interior de la nube'' en lugar de ''desde en medio de la nube''. Se preservó la estructura teofánica y la nota alternativa del rastro auditado.'
