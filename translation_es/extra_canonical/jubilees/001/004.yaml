base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/004.yaml
  text: And on the seventh day he called to Moses from the midst of the cloud, and the appearance of the glory of Yahweh was like a burning fire on the top of the mountain. And Moses was on the mountain forty days and forty nights.
  footnotes:
  - marker: a
    text: Or 'the glory of Yahweh appeared like'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:56Z'
    unchanged: false
    changes_summary: Replaced 'the LORD' with 'Yahweh' to reflect the divine name policy. No other changes needed.
translation:
  language: es
  text: Y el séptimo día llamó a Moisés desde el interior de la nube, y la apariencia de la gloria de Yahvé[a] fue como fuego ardiente en la cima del monte. Y Moisés estuvo en el monte cuarenta días y cuarenta noches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la gloria de Yahvé apareció como»; el ge''ez permite también una lectura más verbal, pero aquí se sigue la estructura nominal auditable.'
    reason: textual_variant
lexical_decisions:
- source_word: ለሙሴ
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Ἰησοῦς/Moses proper name equivalent
  rationale: Nombre propio estándar en español bíblico; no requiere variación.
- source_word: በ*ዕለት፡ ሳብዕት፡
  english_pob_choice: on the seventh day
  chosen_spanish: en el séptimo día
  alternatives_spanish:
  - el séptimo día
  lexicon: day/time expression
  rationale: La preposición 'en' reproduce el valor temporal directo del ge'ez y su paralelismo con el inglés auditado.
- source_word: እማእከለ፡ ደመና
  english_pob_choice: from the midst of the cloud
  chosen_spanish: desde en medio de la nube
  alternatives_spanish:
  - desde el medio de la nube
  - desde en medio de la nube
  lexicon: midst/center phrase
  rationale: '''Desde en medio de'' conserva la imagen espacial y el punto de emisión de la voz/divina llamada; es más literal que ''desde el centro''.'
- source_word: ስብሐተ፡ እግዚአብሔር
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahveh
  lexicon: glory/divine name
  rationale: Se conserva 'Yahvé' según la política del proyecto; 'gloria' mantiene el término doxológico técnico sin suavizarlo a 'esplendor'.
- source_word: ከመ፡ እሳት፡ ዘያነድድ
  english_pob_choice: like a burning fire
  chosen_spanish: como fuego ardiente
  alternatives_spanish:
  - como un fuego que ardía
  - como fuego que arde
  lexicon: comparative/fire imagery
  rationale: '''Como fuego ardiente'' es una equivalencia natural y formal que preserva la comparación visual sin añadir una construcción verbal innecesaria.'
- source_word: ውስተ፡ ርእሰ፡ ደብር
  english_pob_choice: on the top of the mountain
  chosen_spanish: en la cima del monte
  alternatives_spanish:
  - sobre la cima del monte
  - en la cumbre del monte
  lexicon: mountain summit
  rationale: '''Cima'' comunica bien la cima/topo y suena natural en español; ''monte'' refleja el registro bíblico del lugar.'
- source_word: ወሀሎ፡ ሙሴ፡ ውስተ፡ ደብር፡ አርብዓ፡ ዕለተ፡ ወአርብዓ
  english_pob_choice: And Moses was on the mountain forty days and forty nights
  chosen_spanish: Y Moisés estuvo en el monte cuarenta días y cuarenta noches
  alternatives_spanish:
  - Y Moisés permaneció en el monte cuarenta días y cuarenta noches
  lexicon: duration/state verb
  rationale: '''Estuvo'' reproduce de manera sobria el estado/duración sin convertirlo en una interpretación más fuerte como ''permaneció''.'
theological_decisions:
- issue: Divine name rendering
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: Se sigue la política explícita del proyecto para el tetragrámaton. No se sustituye por una convención eclesiástica de máscara.
  doctrine_reference: Ex 3:15; política terminológica del POB
- issue: Theophanic manifestation term
  english_pob_reading: the appearance of the glory of Yahweh was like
  chosen_spanish_reading: la apariencia de la gloria de Yahvé fue como
  alternative_spanish_readings:
  - la gloria de Yahvé apareció como
  - la apariencia de la gloria de Yahvé parecía
  rationale: '''Apariencia de la gloria'' refleja mejor el ajuste textual auditado y preserva la tensión formal entre visión/aparición y gloria teofánica.'
  doctrine_reference: Éx 24:17; tradición teofánica de la gloria
- issue: Fire image as simile, not identity
  english_pob_reading: was like a burning fire
  chosen_spanish_reading: fue como fuego ardiente
  alternative_spanish_readings:
  - parecía fuego ardiente
  - era como fuego ardiente
  rationale: La comparación 'como' debe mantenerse para no convertir la visión en identidad ontológica del fuego.
  doctrine_reference: Lenguaje figurado teofánico en Éx 24:17
translation_notes:
  revision_awareness: La base inglesa fue revisada desde 'the glory of the LORD appeared like' a 'the appearance of the glory of Yahweh was like', y esa precisión se reflejó en español con 'la apariencia de la gloria de Yahvé fue como'. No se introdujeron cambios doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para concordar con la política general del proyecto.
  - '''Moisés'', ''monte'', ''gloria'' y la fórmula temporal siguen un español bíblico claro sin arcaísmos innecesarios.'
  - Se preserva la comparación teofánica con 'como' para no borrar la imagen original.
