base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/010.yaml
  text: And many will perish, and they will be captured and fall into the hand of the enemy, because they abandoned my ordinances and my commandments and the festivals of my covenant and my Sabbaths and my holy things that I sanctified for myself among them, and my tabernacle and my sanctuary that I sanctified for myself in the midst of the land, so that I might set my name upon it.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:03Z'
    unchanged: false
    changes_summary: Changed 'be seized' to 'be captured' for more natural English in this context; otherwise left the draft unchanged.
translation:
  language: es
  text: Y muchos perecerán, y serán apresados y caerán en manos del enemigo, porque abandonaron mis ordenanzas y mis mandamientos y las fiestas de mi pacto y mis sábados y mis cosas sagradas, que santifiqué para mí entre ellos, y mi tabernáculo y mi santuario, que santifiqué para mí en medio de la tierra, para poner allí mi nombre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይትሐጐሉ / perish
  english_pob_choice: perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - morirán
  - desaparecerán
  lexicon: perecer
  rationale: Reproduce la pérdida total implícita en el enunciado sin intensificar indebidamente a una muerte explícita; mantiene la fuerza general de 'perish' en español bíblico contemporáneo.
- source_word: ይትአኀዙ / captured
  english_pob_choice: be captured
  chosen_spanish: serán capturados
  alternatives_spanish:
  - serán apresados
  - serán llevados cautivos
  lexicon: capturar
  rationale: Sigue la revisión inglesa que prefirió 'captured' por naturalidad, y en español ofrece un verbo directo y claro; 'apresados' o 'llevados cautivos' son posibles, pero el texto no exige el matiz de exilio.
- source_word: ውስተ እደ ፀር / into the hand of the enemy
  english_pob_choice: into the hand of the enemy
  chosen_spanish: en mano del enemigo
  alternatives_spanish:
  - en manos del enemigo
  - en poder del enemigo
  lexicon: mano
  rationale: Conserva la imagen semítica de 'mano' como dominio o control, ampliamente inteligible en español; la forma singular sigue de cerca la construcción fuente.
- source_word: ሥርዐትየ / my ordinances
  english_pob_choice: my ordinances
  chosen_spanish: mis ordenanzas
  alternatives_spanish:
  - mis estatutos
  - mis preceptos
  lexicon: ordenanza
  rationale: '''Ordenanzas'' mantiene el sentido normativo y jurídico del término sin desplazarlo hacia formulaciones menos precisas o más litúrgicas.'
- source_word: ትእዛዝየ / my commandments
  english_pob_choice: my commandments
  chosen_spanish: mis mandamientos
  alternatives_spanish:
  - mis órdenes
  - mis preceptos
  lexicon: mandamiento
  rationale: Es el equivalente más natural y estable en español para el campo semántico de mandato divino.
- source_word: ወበዓላት / the festivals
  english_pob_choice: the festivals
  chosen_spanish: las fiestas
  alternatives_spanish:
  - las celebraciones
  - las solemnidades
  lexicon: fiesta
  rationale: '''Fiestas'' es fiel al lenguaje de calendario sacro y reproduce bien el alcance cultual del término sin sobrecargarlo con tecnicismos.'
- source_word: ኪዳንየ / my covenant
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: pacto
  rationale: '''Pacto'' sigue el uso POB y conserva el tono jurídico-berit del texto; ''alianza'' sería viable, pero aquí ''pacto'' es más consistente con el registro de la serie.'
- source_word: ሰንበታትየ / my Sabbaths
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis días de reposo
  lexicon: sabbath
  rationale: '''Sábados'' reproduce el plural directo y mantiene la referencia a días sagrados; ''días de reposo'' explicaría el sentido pero perdería la forma compacta del original.'
- source_word: ቅድሳትየ / my holy things
  english_pob_choice: my holy things
  chosen_spanish: mis cosas santas
  alternatives_spanish:
  - mis cosas sagradas
  - mis objetos santos
  lexicon: holy things
  rationale: La expresión es amplia y algo abstracta; 'cosas santas' conserva esa amplitud sin restringirla indebidamente a objetos materiales.
- source_word: ዘቀደስኩ / that I sanctified
  english_pob_choice: that I sanctified
  chosen_spanish: que santifiqué
  alternatives_spanish:
  - que consagré
  - que aparté como santo
  lexicon: sanctify
  rationale: '''Santifiqué'' preserva el lenguaje teológico estándar y la relación verbal directa con ''santo'' sin introducir una paráfrasis interpretativa.'
- source_word: ወብተራየ / my tabernacle
  english_pob_choice: my tabernacle
  chosen_spanish: mi tabernáculo
  alternatives_spanish:
  - mi tienda
  - mi morada
  lexicon: tabernacle
  rationale: '''Tabernáculo'' es el equivalente tradicional y preciso para la morada sagrada portátil; evita diluir la referencia cultual.'
- source_word: መቅደስየ / my sanctuary
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: sanctuary
  rationale: '''Santuario'' comunica bien el espacio consagrado y mantiene la distinción con ''tabernáculo''.'
- source_word: ከመ፡ አሢም፡ ስምየ፡ ላዕሌሁ / so that I might set my name upon it
  english_pob_choice: so that I might set my name upon it
  chosen_spanish: para poner mi nombre sobre él
  alternatives_spanish:
  - para establecer mi nombre sobre él
  - para poner allí mi nombre
  lexicon: name
  rationale: Conserva la idea de inscripción o colocación del nombre divino sobre el lugar; 'sobre él' respeta el referente singular del tabernáculo/santuario como foco final.
theological_decisions:
- issue: La lista de transgresiones y su relación con el juicio
  english_pob_reading: They abandoned my ordinances... and therefore many will perish and be captured.
  chosen_spanish_reading: Abandonaron mis ordenanzas... y por eso muchos perecerán y serán capturados.
  alternative_spanish_readings:
  - dejaron mis ordenanzas...
  - se apartaron de mis ordenanzas...
  rationale: La causalidad explícita debe quedar visible en español porque estructura toda la sentencia. 'Abandonaron' sigue el peso de la culpa deliberada sin suavizar la acusación.
  doctrine_reference: Covenant covenantal judgment; obedience and exile motifs in Torah and Second Temple literature.
- issue: El sentido de 'my holy things' junto con tabernáculo y santuario
  english_pob_reading: my holy things... and my tabernacle and my sanctuary
  chosen_spanish_reading: mis cosas santas... y mi tabernáculo y mi santuario
  alternative_spanish_readings:
  - mis cosas sagradas...
  - mis lugares santos...
  rationale: Mantener 'cosas santas' permite que la expresión funcione como un término amplio que engloba bienes/realidades consagradas sin borrar la secuencia con tabernáculo y santuario.
  doctrine_reference: Holiness language in cultic setting; sanctified objects/places belong to Yahvé.
- issue: Nombre divino implícito en el original frente a la forma de español
  english_pob_reading: my name
  chosen_spanish_reading: mi nombre
  alternative_spanish_readings:
  - mi Nombre
  rationale: El texto no requiere mayúscula devocional para el sustantivo en español; 'mi nombre' conserva la referencia divina sin añadir una convención editorial no atestiguada por el pasaje.
  doctrine_reference: Divine name theology in biblical cultic texts.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'be seized' por 'be captured' para mayor naturalidad; la traducción española adopta directamente 'serán capturados' y conserva intacto el resto de la sintaxis y la secuencia semántica del pasaje.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque aquí el poseedor es expresado en primera persona ('mis', 'mi'), sin forma explícita del nombre divino.
  - Se preservó el paralelismo de la lista cultual con coordinación repetida por 'y', como en la estructura fuente.
  - Se evitó 'alianza' para 'covenant' a fin de conservar consistencia terminológica con el estilo POB y con el campo jurídico del contexto.
