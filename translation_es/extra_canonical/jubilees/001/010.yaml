    rationale: '''Serán apresados'' fluye mejor en español e igualmente comunica captura sin introducir el matiz de exilio.'
  - severity: medium
    issue: '''mis cosas santas'' resulta torpe en español'
    rationale: Es fiel al inglés, pero 'mis cosas sagradas' suena más natural y sigue siendo suficientemente amplio para no reducir el referente a objetos solamente.
  - severity: low
    issue: Cierre final 'para poner mi nombre sobre él'
    rationale: No es incorrecto, pero después de 'mi tabernáculo y mi santuario' el pronombre singular puede sentirse áspero. 'para poner allí mi nombre' preserva la finalidad cultual y evita una referencia pronominal menos natural en español.
