  language: en
  yaml_path: translation/extra_canonical/jubilees/001/009.yaml
  text: And this testimony will be heard as a testimony against them. For they will forget all my commandments, everything that I command them, and they will walk after the nations, and after their impurities, and after their shameful things, and they will serve their gods, and these will become for them a stumbling block, and affliction, and tribulation, and a snare.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:02Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Y este testimonio será oído como testimonio contra ellos. Porque olvidarán todos mis mandamientos, todo lo que yo les ordene, e irán tras las naciones, tras sus impurezas y tras sus cosas vergonzosas; y servirán a sus dioses, y estos les vendrán a ser tropiezo, aflicción, tribulación y lazo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: this testimony
  english_pob_choice: this testimony
  chosen_spanish: este testimonio
  alternatives_spanish:
  - esta declaración
  - este testimonio
  lexicon: testimonio
  rationale: Mantiene el valor forense y de advertencia del texto; en español, 'testimonio' conserva bien la idea de una evidencia que da testimonio contra alguien.
- source_word: will be heard as a testimony against them
  english_pob_choice: will be heard as a testimony against them
  chosen_spanish: será oído como testimonio contra ellos
  alternatives_spanish:
  - será escuchado como testimonio contra ellos
  - servirá de testimonio contra ellos
  lexicon: oír
  rationale: '''Ser oído'' refleja mejor el pasivo del original y conserva el matiz de que el testimonio llega a ser percibido/recibido como acusación.'
- source_word: commandments
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - mandatos
  lexicon: mandamiento
  rationale: Es el equivalente natural y fiel para ἐντολαί/mandamientos en contexto bíblico-jurídico.
- source_word: impurities
  english_pob_choice: impurities
  chosen_spanish: sus impurezas
  alternatives_spanish:
  - sus inmundicias
  - sus contaminaciones
  lexicon: impureza
  rationale: '''Impurezas'' conserva el sentido moral/ritual sin exagerar hacia términos más fuertes o más técnicos.'
- source_word: shameful things
  english_pob_choice: shameful things
  chosen_spanish: sus cosas vergonzosas
  alternatives_spanish:
  - sus actos vergonzosos
  - sus vergüenzas
  lexicon: vergüenza
  rationale: '''Cosas vergonzosas'' sigue de cerca la carga evaluativa del original y evita especificar más de lo que el texto dice.'
- source_word: serve their gods
  english_pob_choice: serve their gods
  chosen_spanish: servirán a sus dioses
  alternatives_spanish:
  - adorarán a sus dioses
  - servirán a sus dioses
  lexicon: servir
  rationale: '''Servir'' mantiene la fuerza de culto/obediencia que el texto atribuye a la idolatría, sin reducirla solo a ''adorar''.'
- source_word: stumbling block
  english_pob_choice: a stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - piedra de tropiezo
  - tropiezo
  lexicon: tropiezo
  rationale: '''Tropiezo'' transmite la función de obstáculo y caída con un término bíblico claro en español.'
- source_word: affliction
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - opresión
  - aflicción
  lexicon: aflicción
  rationale: Conserva el valor de sufrimiento/penalidad sin precisar indebidamente la naturaleza del daño.
- source_word: tribulation
  english_pob_choice: tribulation
  chosen_spanish: tribulación
  alternatives_spanish:
  - tribulación
  - angustia
  lexicon: tribulación
  rationale: Es el cognado español más directo y mantiene el paralelismo retórico del texto.
- source_word: snare
  english_pob_choice: a snare
  chosen_spanish: lazo
  alternatives_spanish:
  - lazo
  - trampa
  lexicon: lazo
  rationale: '''Lazo'' conserva la imagen de captura y trampa moral/espiritual, con buen arraigo bíblico en español.'
theological_decisions:
- issue: Naturaleza del 'testimonio' como denuncia judicial
  english_pob_reading: this testimony will be heard as a testimony against them
  chosen_spanish_reading: este testimonio será oído como testimonio contra ellos
  alternative_spanish_readings:
  - esta declaración será oída contra ellos
  - este testimonio servirá de testimonio contra ellos
  rationale: La frase se mantiene como advertencia judicial, no solo como información. 'Contra ellos' preserva el carácter acusatorio explícito del original.
  doctrine_reference: Lenguaje profético y forense de testimonio/juicio en la literatura bíblica.
- issue: Secuencia de decadencia religiosa y moral
  english_pob_reading: forget all my commandments ... walk after the nations ... serve their gods
  chosen_spanish_reading: olvidarán todos mis mandamientos ... irán tras las naciones ... servirán a sus dioses
  alternative_spanish_readings:
  - olvidarán todos mis mandamientos ... seguirán a las naciones ... adorarán a sus dioses
  rationale: '''Ir tras'' conserva el movimiento de seguimiento/apego del original y enlaza la desobediencia con la idolatría sin suavizarla.'
  doctrine_reference: Tema bíblico de apostasía e imitación de las naciones.
- issue: Serie final de consecuencias
  english_pob_reading: stumbling block, affliction, tribulation, and a snare
  chosen_spanish_reading: tropiezo, aflicción, tribulación y lazo
  alternative_spanish_readings:
  - piedra de tropiezo, aflicción, tribulación y trampa
  rationale: Se conserva la cadena nominal y el gradiente de consecuencias. 'Lazo' mantiene la imagen de captura sin añadir explicación interpretativa.
  doctrine_reference: Motivo bíblico de juicio retributivo y trampa idolátrica.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la traducción inglesa POB y con la revisión más reciente marcada como sin cambios; no se detectan revisiones aplicadas ni variantes textuales que exijan notas adicionales. La redacción española sigue de cerca la estructura del inglés auditado, mientras se ajusta al español natural.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' implícito en 'mis mandamientos' sin introducir 'Señor' ni 'Yahvé' porque el versículo habla en primera persona divina.
  - Se eligió 'servir' para el idólatra culto a los dioses, en línea con el valor bíblico de servicio/adoración.
  - Se conservaron las cuatro consecuencias finales como una lista nominal paralela para respetar la retórica del original.
