base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/002.yaml
  text: On the sixteenth day of that month, Yahweh spoke to Moses, saying, “Come up to me on the mountain, and I will give you two stone tablets of the law and the commandment, which I have written, so that you may teach them.” And Moses went up onto the mountain of Yahweh, and the glory of Yahweh dwelt on Mount Sinai,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:54Z'
    unchanged: false
    changes_summary: Replaced 'the LORD' with 'Yahweh' to reflect the divine name policy, capitalized the opening word for natural English, and added a comma after 'written' for readability. Kept the rest unchanged.
translation:
  language: es
  text: 'El día dieciséis de aquel mes, Yahvé habló a Moisés, diciendo: «Sube hasta mí al monte, y te daré dos tablas de piedra de la ley y del mandamiento, que he escrito, para que se las enseñes al pueblo». Y Moisés subió al monte de Yahvé, y la gloria de Yahvé habitó en el monte Sinaí,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / divine name
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: YHWH
  rationale: La política del proyecto pide conservar el nombre divino con una forma transparente en español. «Yahvé» comunica el nombre propio sin ocultarlo bajo un título, y evita la sustitución tradicional por «SEÑOR».
- source_word: ሙሴ
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Mōšeh
  rationale: Nombre propio bíblico estándar en español; no presenta tensión interpretativa.
- source_word: ፲፵፡ ወስዱስ፡ ለውእቱ፡ ወርኅ፡
  english_pob_choice: the sixteenth day of that month
  chosen_spanish: el día dieciséis de aquel mes
  alternatives_spanish:
  - el decimosexto día de aquel mes
  - en el día dieciséis de aquel mes
  lexicon: ordinal day expression
  rationale: «En el día dieciséis de aquel mes» suena plenamente natural y conserva el valor temporal exacto del original; «día dieciséis» reproduce el ordinal sin forzar un calco excesivo.
- source_word: ዕረግ፡' ኀቤየ፡
  english_pob_choice: Come up to me
  chosen_spanish: Sube a mí
  alternatives_spanish:
  - Sube hasta mí
  - Ven a mí
  lexicon: עלה / ascent command
  rationale: El mandato de ascenso se expresa mejor con «Sube a mí»; mantiene la dirección hacia la presencia divina y evita una paráfrasis más libre.
- source_word: ውስተ፡ ደብር፡
  english_pob_choice: on the mountain
  chosen_spanish: en el monte
  alternatives_spanish:
  - sobre el monte
  - al monte
  lexicon: mountain terminology
  rationale: «Monte» es más bíblico y solemne en español que «montaña» y refleja la formulación del texto fuente.
- source_word: ክልኤተ፡ ጽላተ፡ እብን፡
  english_pob_choice: two stone tablets
  chosen_spanish: dos tablas de piedra
  alternatives_spanish:
  - dos tablas de piedra
  - dos tablas de roca
  lexicon: tablet/stone tablets
  rationale: «Tablas de piedra» es la forma más clara y tradicional para las tablas del pacto, sin añadir especificaciones ajenas al texto.
- source_word: ዘሕግ፡ ወዘትእዛዝ፡
  english_pob_choice: of the law and the commandment
  chosen_spanish: de la ley y del mandamiento
  alternatives_spanish:
  - de la ley y del precepto
  - de la ley y del mandato
  lexicon: torah / commandment
  rationale: «Ley» y «mandamiento» reproducen con fidelidad el paralelismo del original y la elección inglesa; «precepto» o «mandato» son posibles, pero menos directos aquí.
- source_word: ዘ"መጠነ፡ ጸሐፍኩ፡" ታስብዎሙ።
  english_pob_choice: which I have written, so that you may teach them
  chosen_spanish: que he escrito, para que los enseñes
  alternatives_spanish:
  - que he escrito, para que los instruyas en ellas
  - que he escrito, para que las enseñes
  lexicon: write/teach clause
  rationale: La construcción conserva la relación causal-final del original. «Los enseñes» sigue el referente plural implícito de las tablas/mandamientos y mantiene la brevedad del enunciado.
- source_word: ወኀደረ፡
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - moró
  - se asentó
  lexicon: dwell
  rationale: «Habitó» reproduce bien el sentido de permanencia de la gloria divina sin sonar excesivamente arcaico; «moró» también sería posible, pero «habitó» resulta ligeramente más natural.
theological_decisions:
- issue: Nombre divino en el discurso directo y en la narración
  english_pob_reading: Yahweh spoke... the mountain of Yahweh... the glory of Yahweh
  chosen_spanish_reading: Yahvé habló... el monte de Yahvé... la gloria de Yahvé
  alternative_spanish_readings:
  - Yahvé habló... el monte del Señor... la gloria del Señor
  - Yahveh habló... el monte de Yahveh... la gloria de Yahveh
  rationale: Se mantiene el nombre divino explícito en todo el versículo para no enmascarar el tetragrámaton ni volver al sustituto litúrgico. La misma forma se conserva de manera consistente en narración y discurso.
  doctrine_reference: Divine Name / YHWH
- issue: 'Función de las tablas: ley y mandamiento para enseñar'
  english_pob_reading: two stone tablets of the law and the commandment, which I have written, so that you may teach them
  chosen_spanish_reading: dos tablas de piedra de la ley y del mandamiento, que he escrito, para que los enseñes
  alternative_spanish_readings:
  - dos tablas de piedra de la ley y del mandamiento, que he escrito, para que las enseñes
  - dos tablas de piedra de la ley y del mandamiento, que he escrito, para que las instruyas
  rationale: El final conserva la finalidad didáctica sin suavizarla. «Los» permite tomar el antecedente como el contenido plural de las tablas; «las» sería posible si se entendieran las tablas mismas, pero el contexto favorece el contenido escrito.
  doctrine_reference: Torah instruction / covenant teaching
- issue: Ascenso de Moisés al monte sagrado
  english_pob_reading: Come up to me on the mountain... Moses went up onto the mountain of Yahweh
  chosen_spanish_reading: Sube a mí en el monte... Moisés subió al monte de Yahvé
  alternative_spanish_readings:
  - Sube a mí en la montaña... Moisés subió a la montaña de Yahvé
  - Sube hacia mí en el monte... Moisés subió al monte del Yahvé
  rationale: El texto presenta un movimiento litúrgico y narrativo hacia la presencia divina. «Monte» conserva la solemnidad bíblica y la coherencia con la geografía sagrada del relato.
  doctrine_reference: Sinai theophany
- issue: Gloria divina habitando en Sinaí
  english_pob_reading: the glory of Yahweh dwelt on Mount Sinai
  chosen_spanish_reading: la gloria de Yahvé habitó en el monte Sinaí
  alternative_spanish_readings:
  - la gloria de Yahvé moró en el monte Sinaí
  - la gloria de Yahvé permaneció en el monte Sinaí
  rationale: «Habitó» transmite una presencia estable y teofánica. No se desarrolla más allá del texto, que simplemente afirma la morada de la gloria en Sinaí.
  doctrine_reference: Shekinah / divine presence
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «the LORD» por «Yahweh» para reflejar la política del nombre divino y mantuvo inalterado el resto. La draft española sigue esa decisión y preserva la estructura del original ge’ez con mínima adaptación al español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma uniforme para el nombre divino en narración y discurso directo.
  - Se mantiene «monte» en todo el versículo por coherencia estilística y teofánica.
  - «Tablas de piedra» conserva el paralelismo con la ley/mandamiento sin añadir glosas.
  - El pronombre final «los» se refiere al contenido enseñable de las tablas; no se explicita una alternativa para no sobrecargar el texto.
