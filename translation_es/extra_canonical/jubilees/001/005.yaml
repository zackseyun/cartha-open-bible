base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/005.yaml
  text: 'And the Lord taught him what was first and what was to come: the account of the divisions of all the days of the law and the testimony. And he said, “Set your heart on everything that I tell you on this mountain, and write it in a book, so that their generations may see that I have not abandoned them because of all the evil that they have done by transgressing the ordinance that I establish between me and you.”'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:32:57Z'
    unchanged: false
    changes_summary: Changed 'LORD' to 'Lord' since the source is not the divine name Yahweh; added the closing quotation mark and period; changed 'in transgressing' to 'by transgressing' for more natural English; removed 'today' because it is not supported by the source.
translation:
  language: es
  text: 'Y el Señor le enseñó lo primero y lo que había de venir: el relato de las divisiones de todos los días de la ley y del testimonio. Y dijo: «Pon tu corazón en todo lo que te digo en este monte, y escríbelo en un libro, para que sus generaciones vean que no los he abandonado a causa de todo el mal que han hecho al transgredir la ordenanza que establezco entre mí y ti».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / Lord
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: POB default for Greek/English rendering of divine title in this verse context
  rationale: La revisión inglesa fijó 'Lord' y no el nombre divino 'Yahweh'; en español, 'el Señor' reproduce el título sin introducir un nombre que el audit trail no respalda para este pasaje.
- source_word: ዘ"ቀዳሚ ... ይመጽእ
  english_pob_choice: what was first and what was to come
  chosen_spanish: lo primero y lo que había de venir
  alternatives_spanish:
  - lo primero y lo que vendrá
  - lo anterior y lo posterior
  lexicon: temporal sequence / eschatological sequence
  rationale: Mantiene la doble secuencia temporal de manera natural en español, conservando el contraste entre el orden inicial y lo venidero.
- source_word: ኩፋሌ
  english_pob_choice: the account of the divisions
  chosen_spanish: el relato de las divisiones
  alternatives_spanish:
  - el recuento de las divisiones
  - la cuenta de las divisiones
  lexicon: division/account terminology
  rationale: '''Relato'' comunica el sentido narrativo de ''account'' sin perder la referencia técnica a las ''divisiones'' del calendario/ordenamiento del texto.'
- source_word: መዋዕላት ሕግ ወለስምዕ
  english_pob_choice: of all the days of the law and the testimony
  chosen_spanish: de todos los días de la ley y del testimonio
  alternatives_spanish:
  - de todos los tiempos de la ley y del testimonio
  - de todos los días de la ley y del testimonio
  lexicon: law and testimony formula
  rationale: Se conserva la fórmula literal 'la ley y el testimonio' porque el texto fuente la presenta como expresión fija; 'días' se mantiene por fidelidad al original, aunque suena semítico en español.
- source_word: ልበከ
  english_pob_choice: Set your heart
  chosen_spanish: Pon tu corazón
  alternatives_spanish:
  - Aplica tu corazón
  - Fija tu corazón
  lexicon: idiom for attention/resolve
  rationale: '''Pon tu corazón'' es una equivalencia idiomática natural en español para enfocar atención y disposición interior, sin suavizar el mandato.'
- source_word: ወ'ጸሐፍ' ውስተ፡ መጽሐፍ
  english_pob_choice: write it in a book
  chosen_spanish: escríbelo en un libro
  alternatives_spanish:
  - escríbelo en un libro
  - ponlo por escrito en un libro
  lexicon: book-writing formula
  rationale: La forma breve mantiene la orden directa del original; 'libro' preserva el soporte textual exigido por la escena.
- source_word: ከመ፡ ይርአዩ፡ ትውልዶሙ
  english_pob_choice: so that their generations may see
  chosen_spanish: para que sus generaciones vean
  alternatives_spanish:
  - para que sus generaciones vean
  - para que sus descendientes vean
  lexicon: generational visibility
  rationale: '''Sus generaciones'' conserva la referencia colectiva y genealógica del original, más cercana al registro del texto que ''descendientes''.'
- source_word: ኢኀደግዎሙ
  english_pob_choice: I have not abandoned them
  chosen_spanish: no los he abandonado
  alternatives_spanish:
  - no los he dejado
  - no los he desamparado
  lexicon: abandonment language
  rationale: '''Abandonado'' refleja bien la negación de dejar atrás o rechazar; evita ''desamparado'', que añade un matiz devocional no necesario aquí.'
- source_word: በእንተ፡ ኵሉ፡ እኩይ፡ ዘገብሩ
  english_pob_choice: because of all the evil that they have done
  chosen_spanish: a causa de todo el mal que han hecho
  alternatives_spanish:
  - por todo el mal que han hecho
  - a causa de todo el mal que han hecho
  lexicon: causal evil clause
  rationale: '''A causa de'' expresa mejor la causalidad directa del juicio en español formal, manteniendo ''mal'' como sustantivo moral.'
- source_word: በእስተት፡ ሥርዐት
  english_pob_choice: by transgressing the ordinance
  chosen_spanish: al transgredir la ordenanza
  alternatives_spanish:
  - al transgredir la ordenanza
  - por transgredir la ordenanza
  - al quebrantar la ordenanza
  lexicon: ordinance/transgression pair
  rationale: '''Transgredir'' conserva la fuerza legal-moral del verbo; ''ordenanza'' reproduce el término normativo sin rebajarlo a una simple costumbre.'
- source_word: ማእከሌየ ወማእከሌከ
  english_pob_choice: between me and you
  chosen_spanish: entre mí y ti
  alternatives_spanish:
  - entre mí y ti
  - entre nosotros
  lexicon: covenant formula
  rationale: La fórmula de pacto se conserva en primera/segunda persona singular, porque el original subraya la relación directa establecida entre las dos partes.
theological_decisions:
- issue: Divine title versus divine name
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: El texto griego/inglés del audit trail no documenta aquí un reemplazo explícito del nombre divino; por eso en español se mantiene el título 'el Señor' y no se introduce 'Yahvé' como si fuera una lectura segura del pasaje.
  doctrine_reference: Reverence for the divine title; source-critical distinction between title and name
- issue: Causal clause of covenant breach
  english_pob_reading: because of all the evil that they have done by transgressing the ordinance
  chosen_spanish_reading: a causa de todo el mal que han hecho al transgredir la ordenanza
  alternative_spanish_readings:
  - por todo el mal que han hecho al transgredir la ordenanza
  - a causa de todo el mal que han hecho quebrantando la ordenanza
  rationale: Se conserva la responsabilidad moral ligada a la transgresión concreta de una ordenanza pactal; 'al transgredir' mantiene la relación causal sin diluir la gravedad jurídica del acto.
  doctrine_reference: Covenant faithfulness and accountability
translation_notes:
  revision_awareness: The English audit trail indicates a revision from 'LORD' to 'Lord', removal of unsupported 'today', and a small stylistic correction in the transgression clause. The Spanish draft follows the revised reading and does not introduce any unsupported divine-name masking or temporal addition.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' coherentemente con la revisión inglesa 'Lord'.
  - Se conserva la fórmula pactal en primera persona singular ('entre mí y ti') para reflejar el original sin normalizarla a una forma más genérica.
  - No se añade puntuación o contenido doctrinal no presente en el texto fuente.
