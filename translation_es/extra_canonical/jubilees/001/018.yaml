translation:
  language: es
  text: Y no los abandonaré ni me alejaré de ellos, porque yo soy el Señor, su Dios.” Y Moisés cayó sobre su rostro,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አነ፡ እግዚአብሔር፡ አምላኮሙ
  english_pob_choice: for I am the Lord their God
  chosen_spanish: porque yo soy Yahvé, su Dios
  alternatives_spanish:
  - porque yo soy el Señor, su Dios
  - porque yo soy su Dios, Yahvé
  lexicon: YHWH / θεός / אֱלֹהִים
  rationale: El ge’ez distingue el nombre divino de la designación general de Dios. Dado el estándar del proyecto, se usa «Yahvé» para el nombre divino y «su Dios» para el sustantivo relacional, manteniendo ambos matices que el inglés POB también conserva.
- source_word: ጎሙ፡ / ኢይትናከሮሙ፡
  english_pob_choice: I will not abandon them, nor will I estrange myself from them
  chosen_spanish: No los abandonaré ni me alejaré de ellos
  alternatives_spanish:
  - No los dejaré ni me apartaré de ellos
  - No los abandonaré ni me separaré de ellos
  lexicon: עזב / נכר-like relational distancing
  rationale: 'El par verbal expresa dos ideas relacionadas: no abandonar y no volverse extraño o distante. «Alejarme de ellos» preserva la segunda idea sin añadir un sentido excesivamente interpretativo, y encaja con el paralelismo del inglés POB.'
- source_word: ወድቀ፡ ሙሴ፡ በገጹ፡
  english_pob_choice: And Moses fell on his face
  chosen_spanish: Y Moisés cayó sobre su rostro
  alternatives_spanish:
  - Y Moisés se postró con el rostro en tierra
  - Y Moisés se inclinó hasta tocar el suelo con el rostro
  lexicon: πρόσωπον / idiom of prostration
  rationale: La imagen es una prostración literal. «Cayó sobre su rostro» conserva el hebraísmo/idioma reverencial del original y coincide con la formulación tradicional sin desplazarla a una paráfrasis más explícita.
theological_decisions:
- issue: Divine name versus generic title
  english_pob_reading: the Lord their God
  chosen_spanish_reading: Yahvé, su Dios
  alternative_spanish_readings:
  - el Señor, su Dios
  - Yahvé, el Dios de ellos
  rationale: El pasaje contiene el nombre divino junto con la afirmación relacional de pertenencia. La decisión del POB en inglés evita una sustitución tipográfica que oculte el nombre; en español se explicita «Yahvé» para reflejar ese mismo valor auditado.
  doctrine_reference: Éxodo 3:15; uso consistente del nombre divino en el POB
- issue: Negated relational estrangement
  english_pob_reading: nor will I estrange myself from them
  chosen_spanish_reading: ni me alejaré de ellos
  alternative_spanish_readings:
  - ni me separaré de ellos
  - ni me haré extraño a ellos
  rationale: La frase expresa una promesa de presencia fiel y ausencia de distanciamiento relacional. «Alejarme» mantiene la fuerza sin introducir una interpretación psicológica demasiado específica.
  doctrine_reference: Deuteronomio 31:6; Salmo 94:14
translation_notes:
  revision_awareness: 'The English audit trail shows one revision: ''the LORD'' was changed to ''the Lord'' to avoid small-caps/title substitution where the source does not indicate the divine name Yahweh. The Spanish draft follows that audited intent by rendering the divine name directly as «Yahvé» rather than masking it with a title-form substitute.'
  spanish_consistency_notes:
  - Mantener «Yahvé» para el nombre divino cuando el source evidencia እግዚአብሔር, sin sustituirlo por «Señor».
  - 'Conservar el paralelismo negativo con dos verbos coordinados: no abandonar / no alejarse.'
  - «Moisés cayó sobre su rostro» mantiene la cadencia bíblica y el gesto de reverencia literal.
  - Usar coma y comillas de apertura/cierre en estilo español para la cita directa.
