revisions:
- from: 'Y le dijo al ángel de la presencia: «Escribe para Moisés desde el principio de la creación hasta el tiempo en que mi santuario sea edificado en medio de ellos para siempre y para siempre, y el Señor aparecerá a los ojos de todos».'
  to: 'Y le dijo al ángel de la presencia: «Escribe para Moisés desde el principio de la creación hasta el tiempo en que mi santuario sea edificado en medio de ellos por siempre jamás, y Yahvé aparecerá a los ojos de todos».'
  rationale: Se ajusta el nombre divino a la norma del proyecto ('Yahvé') y se reemplaza una repetición poco natural ('para siempre y para siempre') por una formulación española más idiomática y solemnemente equivalente ('por siempre jamás'). No hacen falta notas, porque no se introduce una ambigüedad nueva ni se preserva una alternativa significativa ya documentada en el inglés.
