    unchanged: false
    changes_summary: Completed the final clause omitted from the draft ('and the Lord will appear to the eyes of all') and revised 'for all the ages of eternity' to the more natural formal English 'forever and ever.'
translation:
  language: es
  text: 'Y le dijo al ángel de la presencia: «Escribe para Moisés desde el principio de la creación hasta el tiempo en que mi santuario sea edificado en medio de ellos por siempre jamás, y Yahvé aparecerá a los ojos de todos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይቤሎ / “And he said to him”
  english_pob_choice: And he said to the angel of the presence
  chosen_spanish: Y le dijo al ángel de la presencia
  alternatives_spanish:
  - Y habló al ángel de la presencia
  - Y le dijo al ángel de la faz
  lexicon: n/a
  rationale: Se conserva el título técnico “ángel de la presencia”, que ya es transparente en la tradición textual y en el audit trail inglés. “Le dijo” refleja el dativo pronominal del habla directa sin añadir matices.
- source_word: ጸሐፍ ለሙሴ
  english_pob_choice: Write for Moses
  chosen_spanish: Escribe para Moisés
  alternatives_spanish:
  - Escribe a Moisés
  - Escríbele a Moisés
  lexicon: n/a
  rationale: La fuente pide una instrucción de escritura dirigida a favor de Moisés; “para Moisés” preserva bien el destinatario/beneficiario sin forzar la estructura castellana.
- source_word: እምቀዳሚ ፍጥረት
  english_pob_choice: from the beginning of creation
  chosen_spanish: desde el principio de la creación
  alternatives_spanish:
  - desde el comienzo de la creación
  - desde el inicio de la creación
  lexicon: n/a
  rationale: “Principio” reproduce con naturalidad el arranque temporal absoluto del original y coincide con la decisión inglesa de no expandir el sintagma.
- source_word: መቅደስየ
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi templo
  - mi lugar santo
  lexicon: n/a
  rationale: Se mantiene “santuario” para conservar el término más amplio y técnico, sin reducirlo indebidamente a “templo”. El posesivo “mi” refleja el sujeto divino del texto.
- source_word: በማእከሎሙ
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su medio
  - en medio suyo
  lexicon: n/a
  rationale: “En medio de ellos” es la forma más clara en español y conserva el sentido locativo plural del original, evitando una ambigüedad singular.
- source_word: ለዓለመ ዓለማት
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y para siempre
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre jamás
  lexicon: n/a
  rationale: Se sigue de cerca la revisión inglesa que optó por una fórmula formal y no litúrgicamente cargada. “Para siempre y para siempre” mantiene la repetición enfática del semitismo.
- source_word: ወያስተርኢ እግዚአብሔር
  english_pob_choice: and the Lord will appear
  chosen_spanish: y el Señor aparecerá
  alternatives_spanish:
  - y Yahvé aparecerá
  - y el Señor se manifestará
  lexicon: n/a
  rationale: Aunque el proyecto español normalmente prefiere “Yahvé” para el Nombre divino, aquí se conserva “Señor” porque el audit trail inglés fija “the Lord” y la cláusula remite a una fórmula reverencial estable. “Aparecerá” reproduce el futuro simple sin sobreinterpretar como “se manifestará”.
- source_word: ለዐይን ኵሉ
  english_pob_choice: to the eyes of all
  chosen_spanish: a los ojos de todos
  alternatives_spanish:
  - ante los ojos de כולם
  - delante de todos
  lexicon: n/a
  rationale: Se conserva la imagen idiomática de percepción visual. “A los ojos de todos” es la equivalencia española más directa y fiel al hebraísmo/semítica de la expresión.
theological_decisions:
- issue: 'Título divino final: “Lord” frente al nombre propio divino'
  english_pob_reading: the Lord will appear to the eyes of all
  chosen_spanish_reading: el Señor aparecerá a los ojos de todos
  alternative_spanish_readings:
  - Yahvé aparecerá a los ojos de todos
  - el Señor se manifestará a los ojos de todos
  rationale: El texto fuente distingue entre la instrucción a Moisés y la aparición final del Señor. Dado que el inglés auditado fija “the Lord”, se mantiene “Señor” para no introducir una decisión de sustitución no documentada en esta unidad. La alternativa con “Yahvé” queda viable como nota de proyecto general, pero no se impone aquí sin un respaldo explícito del trail.
  doctrine_reference: Theophany / divine appearance language in apocalyptic and pseudepigraphal literature
- issue: 'Duración escatológica: repetición enfática de eternidad'
  english_pob_reading: forever and ever
  chosen_spanish_reading: para siempre y para siempre
  alternative_spanish_readings:
  - por los siglos de los siglos
  - para siempre jamás
  rationale: La duplicación conserva el énfasis intensivo del original y evita sustituirlo por una fórmula litúrgica española más conocida pero menos literal. Así se preserva la tensión retórica entre permanencia y solemnidad.
  doctrine_reference: Eschatological permanence / eternal sanctuary
- issue: Lugar de la presencia divina
  english_pob_reading: my sanctuary will be built in their midst
  chosen_spanish_reading: mi santuario sea edificado en medio de ellos
  alternative_spanish_readings:
  - mi santuario será edificado en medio de ellos
  - mi santuario sea construido en medio de ellos
  rationale: Se usa subjuntivo futuro de finalidad/tiempo después de “hasta el tiempo en que”, que refleja con precisión la subordinación temporal del original. “Edificado” conserva el registro bíblico de construcción sagrada sin forzar una terminología eclesial posterior.
  doctrine_reference: Sacred space / divine dwelling among the people
translation_notes:
  revision_awareness: 'La versión inglesa más reciente completa la cláusula final omitida en un borrador anterior: “and the Lord will appear to the eyes of all.” La presente traducción incorpora esa cláusula completa y sigue la revisión en inglés que sustituyó la frase más pesada “for all the ages of eternity” por “forever and ever”.'
  spanish_consistency_notes:
  - Se mantuvo “ángel de la presencia” como título fijo y no se lo reinterpretó como una descripción libre.
  - Se respetó el paralelismo temporal “desde... hasta...” sin condensarlo.
  - No se introdujo “Cristo” ni lenguaje cristológico ajeno al versículo.
  - Se conservó el tiempo verbal futuro/subjuntivo de la cláusula escatológica sin convertirla en presente profético.
  - Se eligió “Señor” en la cláusula final por concordancia con el audit trail inglés y para no mezclar decisiones de nomenclatura divina dentro de la misma unidad textual.
