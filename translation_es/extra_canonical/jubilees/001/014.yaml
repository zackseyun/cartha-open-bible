translation:
  language: es
  text: Y olvidarán toda mi ley, y todos mis mandamientos, y todos mis juicios, y se desviarán respecto de las lunas nuevas
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ኵሎ፡ ሕግየ፡
  english_pob_choice: all my law
  chosen_spanish: toda mi ley
  alternatives_spanish:
  - toda mi instrucción
  - toda mi Torah
  lexicon: ley
  rationale: El ge'ez expresa el conjunto total de la norma divina; «ley» comunica de forma natural ese alcance en español y preserva la cadencia del texto. «Torah» sería más técnico y menos transparente para una lectura pública.
- source_word: ወኵሎ፡ ትእዛዝየ፡
  english_pob_choice: all my commandments
  chosen_spanish: todos mis mandamientos
  alternatives_spanish:
  - todos mis preceptos
  - todas mis órdenes
  lexicon: mandamientos
  rationale: «Mandamientos» es el equivalente más estable para ትእዛዝ en este contexto legal-covenantal y mantiene la serie paralela con «ley» y «juicios».
- source_word: ወኵሎ፡ ፍትሕየ፡
  english_pob_choice: all my judgments
  chosen_spanish: todos mis juicios
  alternatives_spanish:
  - todas mis decisiones
  - todas mis sentencias
  lexicon: juicios
  rationale: El término apunta a decisiones o disposiciones judiciales/divinas. «Juicios» conserva el valor jurídico y la fórmula tradicional sin suavizar el sentido.
- source_word: ወይስሕቱ፡ ሠርቀ፡
  english_pob_choice: they will go astray as to new moons
  chosen_spanish: se desviarán en cuanto a las lunas nuevas
  alternatives_spanish:
  - se extraviarán respecto de las lunas nuevas
  - se apartarán acerca de las lunas nuevas
  lexicon: lunas nuevas
  rationale: El hebreo/trasfondo bíblico de este tipo de calendario ritual se expresa en español con «lunas nuevas», una fórmula clara y bíblicamente reconocible. Mantenerla en plural refleja el patrón cultual recurrente.
theological_decisions:
- issue: Enumeración de ley, mandamientos y juicios como conjunto total de la revelación normativa
  english_pob_reading: all my law and all my commandments and all my judgments
  chosen_spanish_reading: toda mi ley, y todos mis mandamientos, y todos mis juicios
  alternative_spanish_readings:
  - toda mi instrucción, y todos mis mandamientos, y todos mis juicios
  rationale: La secuencia se deja acumulativa y no se colapsa en un solo término más abstracto. Así se conserva la amplitud del mandato divino y la fuerza retórica de la enumeración.
  doctrine_reference: Torá / revelación normativa divina
- issue: Sentido calendárico-ritual de «new moons»
  english_pob_reading: new moons
  chosen_spanish_reading: las lunas nuevas
  alternative_spanish_readings:
  - las novilunios
  - los meses nuevos
  rationale: «Lunas nuevas» mantiene el vínculo con el lenguaje bíblico y litúrgico sin introducir un tecnicismo innecesario. Dado el corte textual de la sección, se evita completar el resto de la lista no presente en el fuente dado.
  doctrine_reference: Calendario cultual bíblico
translation_notes:
  revision_awareness: El contexto de revisión indica que la traducción inglesa quedó cortada por una segmentación de versículo antes de la continuación esperada («and sabbaths...»), por lo que el español se limita estrictamente al texto fuente disponible y no intenta reconstruir la frase posterior. También se atiende la corrección editorial que eliminó la coma final problemática en inglés.
  spanish_consistency_notes:
  - Se mantiene «ley / mandamientos / juicios» como tríada legal coherente con el estilo POB.
  - Se usa «Yahvé» en esta obra solo cuando el texto fuente lo exige explícitamente; aquí el sujeto es «mi» sin forma del nombre divino, por lo que no se introduce.
  - «Lunas nuevas» se conserva en plural para reflejar el uso bíblico recurrente y la lectura auditada del inglés POB.
