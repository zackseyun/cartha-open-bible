translation:
  language: es
  text: y no escucharán hasta que reconozcan[a] su pecado y los pecados de sus padres. Y después de esto se volverán a mí con toda rectitud y con todo su corazón y con toda su alma,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta que reconozcan».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወኢይሰምዑ
  english_pob_choice: and they will not listen
  chosen_spanish: y no escucharán
  alternatives_spanish:
  - y no oirán
  - y no prestarán oído
  lexicon: oír / escuchar
  rationale: El contexto exige la idea de oír con atención, no solo percepción auditiva. «Escucharán» mantiene el valor relacional de rechazar la advertencia, acorde con el ajuste del POB en inglés.
- source_word: እስከ፡ ሶበ፡ ያአምሩ፡ ኀጢአቶሙ፡ ወኀጣውአ፡ አበዊሆሙ
  english_pob_choice: until they acknowledge their sin and the sins of their fathers
  chosen_spanish: hasta que reconozcan su pecado y los pecados de sus padres
  alternatives_spanish:
  - hasta que confiesen su pecado y los pecados de sus padres
  - hasta que admitan su pecado y los pecados de sus padres
  lexicon: acknowledge / recognize
  rationale: «Reconozcan» reproduce bien el reconocimiento culpable exigido por el pasaje, sin reducirlo a mera confesión verbal. Mantiene la posibilidad textual reflejada en la nota inglesa sobre 'acknowledge'.
- source_word: ይትመየጡ
  english_pob_choice: they will turn
  chosen_spanish: se volverán
  alternatives_spanish:
  - se convertirán
  - se apartarán hacia mí
  lexicon: turn / return
  rationale: «Volverse» en español expresa retorno deliberado hacia Dios con naturalidad y sin añadir matiz de conversión que no esté explícito en la forma verbal.
- source_word: በኵሉ፡ ርቱዕ፡ ወበኵሉ፡ ልብ፡ ወበኵሉ፡ ነፍስ፡
  english_pob_choice: in all uprightness and with all their heart and with all their soul
  chosen_spanish: con toda rectitud y con todo su corazón y con toda su alma
  alternatives_spanish:
  - en toda rectitud y con todo su corazón y con toda su alma
  - con toda justicia y con todo su corazón y con toda su alma
  lexicon: uprightness / heart / soul
  rationale: «Rectitud» conserva el matiz ético de integridad, más cercano a una vida alineada con Dios que a una justicia forense. «Corazón» y «alma» siguen el lenguaje antropológico bíblico sin simplificarlo.
theological_decisions:
- issue: El pueblo no escucha hasta reconocer su pecado y el de sus padres
  english_pob_reading: and they will not listen until they acknowledge their sin and the sins of their fathers
  chosen_spanish_reading: y no escucharán hasta que reconozcan su pecado y los pecados de sus padres
  alternative_spanish_readings:
  - y no oirán hasta que confiesen su pecado y los pecados de sus padres
  - y no prestarán oído hasta que admitan su pecado y los pecados de sus padres
  rationale: 'La secuencia preserva la tensión moral del texto: el rechazo auditivo precede el reconocimiento de culpa. La traducción evita suavizar la condición de arrepentimiento previo.'
  doctrine_reference: Arrepentimiento y confesión de pecado como respuesta necesaria a la reprensión divina
- issue: Retorno a Dios con integridad completa
  english_pob_reading: turn to me in all uprightness and with all their heart and with all their soul
  chosen_spanish_reading: se volverán a mí con toda rectitud y con todo su corazón y con toda su alma
  alternative_spanish_readings:
  - se convertirán a mí con toda rectitud y con todo su corazón y con toda su alma
  - volverán a mí en toda rectitud y con todo su corazón y con toda su alma
  rationale: Se mantiene el retorno personal a Dios y la totalidad de la entrega humana. «Rectitud» conserva la fuerza ética del original sin convertirla en una abstracción teológica posterior.
  doctrine_reference: Conversión/retorno integral a Yahvé con totalidad de vida
- issue: Nombre divino implícito en el «a mí» del discurso divino
  english_pob_reading: turn to me
  chosen_spanish_reading: se volverán a mí
  alternative_spanish_readings:
  - se volverán hacia mí
  - retornarán a mí
  rationale: El sujeto hablante es divino; el texto español mantiene la deixis directa sin introducir «Yahvé» donde el versículo gramaticalmente dice «a mí».
  doctrine_reference: Discurso directo de Dios sin reexpresión innecesaria del nombre
translation_notes:
  revision_awareness: La revisión reciente corrigió una omisión importante del segmento equivalente a «y no escucharán». Esta versión lo restaura explícitamente y conserva el resto de la secuencia conforme al texto etíope y al POB inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el original y el audit trail usan discurso directo en primera persona («a mí»), por lo que no se introduce el nombre divino innecesariamente.
  - «Escucharán» se usa en sentido de obedecer/atender el mensaje, no de mera audición física.
  - «Rectitud» se prefirió a «justicia» para evitar un sesgo forense que no es el centro del contexto inmediato.
