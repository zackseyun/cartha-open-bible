  glossary_alignment: 'Alineado en términos clave: no hay conflicto con Yahvé/Mesías/Cristo. “un espíritu santo” respeta la decisión de no imponer “Espíritu Santo”. “prepucio” conserva la fuerza léxica requerida para ቍልፈት. La revisión propuesta no altera ninguna decisión teológica central, solo mejora naturalidad y registro.'
