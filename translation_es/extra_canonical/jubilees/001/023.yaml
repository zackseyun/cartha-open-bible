translation:
  language: es
  text: y cortaré el prepucio de su corazón y el prepucio del corazón de su descendencia, y crearé para ellos un espíritu santo, y los purificaré para que no se aparten de seguirme desde aquel día y para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቍልፈተ፡ ልቦሙ / ቍልፈተ፡ ልበ፡ ዘርኦሙ
  english_pob_choice: the foreskin of their heart / the foreskin of the heart of their seed
  chosen_spanish: el prepucio de su corazón / el prepucio del corazón de su descendencia
  alternatives_spanish:
  - la incircuncisión de su corazón / la incircuncisión del corazón de su descendencia
  - el velo de su corazón / el velo del corazón de su descendencia
  lexicon: prepucio
  rationale: El Geʿez usa un término literal equivalente a “foreskin”, y la revisión inglesa corrigió una suavización previa porque el texto recoge el idiomático y bíblico lenguaje de la circuncisión del corazón. En español, “prepucio” conserva esa fuerza concreta sin diluirla en una metáfora más vaga.
- source_word: መንፈሰ፡ ቅዱሰ፡
  english_pob_choice: a holy spirit
  chosen_spanish: un espíritu santo
  alternatives_spanish:
  - un Espíritu Santo
  - un espíritu sagrado
  lexicon: espíritu santo
  rationale: El inglés mantiene artículo indefinido, por lo que en español se conserva “un espíritu santo” sin convertirlo automáticamente en el nombre técnico “Espíritu Santo”. Esto deja abierta la lectura del don/ser espiritual creado para ellos, según el contexto inmediato.
- source_word: እነጽሖሙ
  english_pob_choice: I will cleanse them
  chosen_spanish: los limpiaré
  alternatives_spanish:
  - los purificaré
  - los limpiaré y purificaré
  lexicon: limpiar
  rationale: El verbo geʿez apunta a limpieza/purificación, y el español “limpiar” reproduce la imagen directa de purificación ritual y moral. “Purificar” sería posible, pero “limpiar” sigue más de cerca la concreción del verbo y el registro de la POB.
- source_word: ከመ፡ ኢይትመየጡ፡ እምድኅሬየ፡
  english_pob_choice: so that they do not turn away from following me
  chosen_spanish: para que no se aparten de seguirme
  alternatives_spanish:
  - para que no se vuelvan atrás de mí
  - para que no se desvíen de seguirme
  lexicon: apartarse / seguir
  rationale: La revisión inglesa añadió “following” para reflejar el valor idiomático de “from behind me”. En español, “apartarse de seguirme” conserva tanto el movimiento de alejamiento como la relación de discipulado/seguimiento.
theological_decisions:
- issue: Lenguaje de la circuncisión del corazón
  english_pob_reading: cut off the foreskin of their heart and the foreskin of the heart of their seed
  chosen_spanish_reading: cortaré el prepucio de su corazón y el prepucio del corazón de su descendencia
  alternative_spanish_readings:
  - quitaré la incircuncisión de su corazón y de la de su descendencia
  - abriré el velo de su corazón y el velo de su descendencia
  rationale: La fuente geʿez y la revisión inglesa favorecen el idiomático bíblico fuerte de la circuncisión del corazón. Traducirlo como “prepucio” preserva la tensión teológica y la resonancia con Deuteronomio y Jeremías, en vez de suavizarla con una imagen menos concreta.
  doctrine_reference: Deuteronomio 10:16; 30:6; Jeremías 4:4
- issue: Naturaleza del don prometido
  english_pob_reading: I will create for them a holy spirit
  chosen_spanish_reading: les crearé un espíritu santo
  alternative_spanish_readings:
  - les crearé el Espíritu Santo
  - les daré un espíritu santo
  rationale: El artículo indefinido en la POB inglesa y el contexto de “crear” sugieren una realidad otorgada a ellos, no necesariamente una formulación directa del nombre trinitario. Mantener “un espíritu santo” evita sobreespecificar más allá del texto fuente.
  doctrine_reference: Génesis 1:2; Ezequiel 36:26-27
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; sin embargo, se atendió la revisión aplicada que endurece el lenguaje de 'foreskin' y la que precisa 'from following me' como un matiz idiomático de seguimiento. También se mantuvo la equivalencia óptima del inglés POB sin recaer en una paráfrasis suave.
  spanish_consistency_notes:
  - Se conservó un registro bíblico claro y no eufemístico para 'prepucio'.
  - Se prefirió 'espíritu santo' en minúscula con artículo indefinido para no confundirlo con el nombre propio 'Espíritu Santo'.
  - '''Seguirme'' mantiene el vínculo relacional y direccional del hebraísmo/geʿez detrás-de-mí.'
  - No se añadieron notas al pie porque no era necesario anclar variantes textuales o alternativas en el verso final.
