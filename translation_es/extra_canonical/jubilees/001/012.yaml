  yaml_path: translation/extra_canonical/jubilees/001/012.yaml
  text: And I will send witnesses to them so that I may testify to them, but they will not listen; and they will also kill the witnesses, and they will drive away those who seek the law, and they will overturn everything and begin to do evil.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:35Z'
    unchanged: false
    changes_summary: 'Improved English flow and clause consistency: moved ''also'' to a more natural position, smoothed word order in ''those who seek the law,'' and added final punctuation. Kept the sense and completeness of the draft.'
translation:
  language: es
  text: Y les enviaré testigos[a] para darles testimonio, pero no escucharán; y también matarán a los testigos, y expulsarán a los que buscan la ley, y trastocarán todo, y comenzarán a hacer el mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «testigos» traduce el valor funcional del término; «mártires» sería una alternativa posible, pero aquí anticiparía sufrimiento más que testimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ሰማዕተ
  english_pob_choice: witnesses
  chosen_spanish: testigos
  alternatives_spanish:
  - testigos de cargo
  - testimonios
  lexicon: mártir/testigo
  rationale: El etiópico usa el término para personas enviadas a dar testimonio; en español, «testigos» comunica mejor la función de declarar y coincide con el valor normal de witness en el contexto. «Mártires» sería demasiado interpretativo aquí.
- source_word: አስምዕ
  english_pob_choice: to testify
  chosen_spanish: darles testimonio
  alternatives_spanish:
  - testificarles
  - dar testimonio contra ellos
  lexicon: testificar/dar testimonio
  rationale: La construcción expresa la finalidad de comunicar un testimonio a ese grupo. «Darles testimonio» mantiene la relación directa con el objeto y suena natural en español bíblico moderno.
- source_word: ኢይሰምዑ
  english_pob_choice: they will not listen
  chosen_spanish: no escucharán
  alternatives_spanish:
  - no oirán
  - no obedecerán
  lexicon: oír/escuchar
  rationale: El sentido es rechazo a la advertencia, no mera audición física. «Escucharán» conserva la idea de atender al testimonio sin forzar una equivalencia más interpretativa como «obedecerán».
- source_word: ሕገ
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Torá
  - la instrucción
  lexicon: ley/Torá
  rationale: El contexto habla de quienes buscan fidelidad a la norma divina. «La ley» es la correspondencia directa y la más transparente para el registro de esta obra, aunque «la Torá» sería posible en un entorno más especializado.
- source_word: ይዌልእ
  english_pob_choice: overturn everything
  chosen_spanish: trastornarán todo
  alternatives_spanish:
  - volverán todo al revés
  - destruirán todo
  lexicon: trastornar/voltear
  rationale: El verbo indica subvertir, echar abajo, poner en desorden; «trastornarán todo» comunica la amplitud total del daño sin añadir violencia no explicitada por el texto.
- source_word: ገቢረ እኩይ
  english_pob_choice: to do evil
  chosen_spanish: hacer el mal
  alternatives_spanish:
  - practicar el mal
  - obrar mal
  lexicon: mal/evil
  rationale: La frase final marca el inicio de una conducta malvada. «Hacer el mal» es idiomático y fiel al valor general de la expresión.
theological_decisions:
- issue: Quiénes son los «testigos» enviados
  english_pob_reading: I will send witnesses to them so that I may testify to them
  chosen_spanish_reading: Y enviaré testigos a ellos para darles testimonio
  alternative_spanish_readings:
  - Y enviaré mártires a ellos
  - Y enviaré testigos contra ellos
  rationale: El texto no exige traducir por adelantado a «mártires»; la función primaria es testimonial. Tampoco se impone «contra ellos», porque la finalidad declarada es testimoniarles, aunque el resultado sea rechazo y violencia.
  doctrine_reference: testimonio profético y rechazo del mensaje
- issue: Alcance de «la ley»
  english_pob_reading: those who seek the law
  chosen_spanish_reading: los que buscan la ley
  alternative_spanish_readings:
  - los que buscan la Torá
  - los que buscan la instrucción
  rationale: La redacción conserva la tensión entre una referencia normativa general y una posible resonancia más específica. «Ley» es suficientemente fiel al audit trail inglés y al ge'ez, sin cerrar la lectura a una tradición terminológica posterior.
  doctrine_reference: fidelidad a la ley divina
- issue: Intensidad de la acción final
  english_pob_reading: they will overturn everything and begin to do evil
  chosen_spanish_reading: trastornarán todo, y comenzarán a hacer el mal
  alternative_spanish_readings:
  - volverán todo al revés, y comenzarán a obrar mal
  - destruirán todo, y comenzarán a hacer lo malo
  rationale: Se mantiene la secuencia de subversión total seguida del inicio de la maldad. No se endurece a «destruirán» porque el original y el inglés auditado hablan de trastornar/overturn, no necesariamente de destrucción física.
  doctrine_reference: corrupción moral y social
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue afinada para mejorar el flujo, mover «also» a una posición más natural y cerrar la puntuación final sin cambiar el sentido. La traducción española sigue esa lectura consolidada: mantiene la serie de acciones unida por «y», conserva el tono profético y refleja la progresión del rechazo al testimonio, la persecución y la corrupción general.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca explícitamente en el material fuente; este versículo no lo contiene.
  - «la ley» se mantiene como traducción estable de ḥg/nomos en este registro, salvo que el contexto exija «Torá» por precisión mayor.
  - Se prefirió una sintaxis española fluida sin alterar la acumulación de acciones del original.
  - La puntuación con punto y coma ayuda a conservar las pausas de la serie verbal sin introducir interpretación adicional.
