  source_alignment_summary: 'El borrador español sigue bien la secuencia del ge''ez y del audit trail inglés: envío de testigos, rechazo de la escucha, asesinato de los testigos, expulsión de quienes buscan la ley, subversión total e inicio del mal. No hay desviaciones teológicas significativas. Sin embargo, hay dos detalles de fidelidad y estilo: «a ellos» suena calcado donde «a ellos» puede simplificarse o reordenarse en español, y «trastornarán todo» es posible pero menos natural y algo menos preciso para el sentido de voltear/subvertir que «lo pondrán todo al revés» o «lo trastocarán todo».'
