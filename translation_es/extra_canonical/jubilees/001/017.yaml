translation:
  language: es
  text: y yo seré su Dios, y ellos serán mi pueblo en verdad y en justicia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አምላከ ("I will be their God")
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios y ellos serán mi pueblo
  - su Dios
  lexicon: Dios
  rationale: El ge'ez expresa la relación de pertenencia pactal sin perífrasis adicional; en español, «su Dios» reproduce de forma natural esa relación y mantiene la simetría con «mi pueblo».
- source_word: ሕዝብየ ("my people")
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi pueblo
  - mi gente
  lexicon: pueblo
  rationale: «Pueblo» conserva la fuerza colectiva y pactal del término mejor que «gente», y corresponde al paralelismo del texto fuente.
- source_word: ዘበአማን
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - en verdad
  - con verdad
  lexicon: verdad
  rationale: La construcción adverbial ge'ez pide un equivalente directo y digno; «en verdad» es claro y mantiene la idea de autenticidad/fidelidad sin sobreinterpretarla.
- source_word: ዘበጽድቅ
  english_pob_choice: and in righteousness
  chosen_spanish: y en justicia
  alternatives_spanish:
  - y en justicia
  - y en rectitud
  lexicon: justicia
  rationale: «Justicia» refleja mejor el alcance ético y pactal de ṣedeq que «rectitud» en este contexto, y preserva la pareja semántica con «verdad».
theological_decisions:
- issue: Relación de pacto entre Dios y el pueblo
  english_pob_reading: and I will be their God, and they will be my people in truth and in righteousness.
  chosen_spanish_reading: y yo seré su Dios, y ellos serán mi pueblo en verdad y en justicia.
  alternative_spanish_readings:
  - y yo seré su Dios, y ellos serán mi pueblo
  - y yo seré su Dios, y ellos serán mi pueblo con verdad y justicia
  rationale: Se mantiene explícita la fórmula de pertenencia pactal tal como la transmite el texto fuente; no se suaviza ni se convierte en una paráfrasis relacional genérica.
  doctrine_reference: Tema bíblico del pacto y la pertenencia de Dios a su pueblo.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el cotejo cruzado mostró alta concordancia; por eso se conserva la lectura base sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo «su Dios / mi pueblo» para reflejar el hebraísmo del original.
  - Se prefirió «en verdad» y «en justicia» por ser equivalentes transparentes y litúrgicamente claros en español contemporáneo.
