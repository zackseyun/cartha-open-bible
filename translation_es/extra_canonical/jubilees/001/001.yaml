translation:
  language: es
  text: Y aconteció en el primer año de la salida de los hijos de Israel de Egipto, en el tercer mes,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወኮነ፡
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: Geʽez narrative formula
  rationale: La fórmula narrativa introduce un acontecimiento de manera natural en español sin perder el valor de encadenamiento con el contexto anterior. «Aconteció» conserva el tono formal y bíblico, mientras que «Y» mantiene la conexión narrativa del original.
- source_word: በቀዳሚ፡ ዓመት፡
  english_pob_choice: in the first year
  chosen_spanish: en el primer año
  alternatives_spanish:
  - durante el primer año
  lexicon: Geʽez temporal expression
  rationale: La construcción temporal se rinde de forma directa y transparente. «En el primer año» es la equivalencia más natural y fiel al valor cronológico del sintagma.
- source_word: በፀአቶሙ፡ ለደቂቀ፡ እስራኤል፡ እምነ፡ ግብጽ፡
  english_pob_choice: of the departure of the children of Israel from Egypt
  chosen_spanish: de la salida de los hijos de Israel de Egipto
  alternatives_spanish:
  - del éxodo de los hijos de Israel de Egipto
  - de la partida de los hijos de Israel de Egipto
  lexicon: Geʽez noun of departure/exiting from Egypt
  rationale: Se sigue la revisión inglesa que prefirió «departure» a «exodus» para una rendición más transparente del término fuente. En español, «salida» comunica ese valor básico sin introducir una terminología interpretativa más cargada. «Éxodo» queda como alternativa válida, pero es menos transparente como traducción lexical directa.
- source_word: ለደቂቀ፡ እስራኤል፡
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  lexicon: biblical collective expression
  rationale: Se conserva la expresión tradicional y exacta «los hijos de Israel», que refleja bien el colectivo familiar/nacional del original y del inglés auditado.
- source_word: በወርኅ፡ ሣልስ፡
  english_pob_choice: in the third month
  chosen_spanish: en el tercer mes
  alternatives_spanish:
  - durante el tercer mes
  lexicon: Geʽez calendar reference
  rationale: La referencia calendárica se traduce literalmente y con claridad. «En el tercer mes» es la forma más natural en español y no añade información no presente en el texto.
theological_decisions:
- issue: Rendering of the departure from Egypt
  english_pob_reading: departure rather than exodus to preserve transparency
  chosen_spanish_reading: salida en lugar de éxodo
  alternative_spanish_readings:
  - éxodo
  rationale: La revisión inglesa explicitó que la prioridad es una traducción lexical transparente del término fuente. «Salida» preserva ese enfoque y evita cargar el texto con el título técnico-teológico «éxodo» cuando el pasaje solo menciona el hecho de salir de Egipto.
  doctrine_reference: Lexical transparency / source-form priority
- issue: Narrative style for a scriptural historical opening
  english_pob_reading: And it happened
  chosen_spanish_reading: Y aconteció
  alternative_spanish_readings:
  - Y sucedió
  - Y ocurrió
  rationale: La frase mantiene un tono bíblico digno y legible en español, sin forzar una dicción arcaizante. No introduce interpretaciones adicionales; solo conserva la función narrativa de apertura.
  doctrine_reference: Register consistency in biblical narrative
translation_notes:
  revision_awareness: The English audit trail revised 'exodus' to 'departure' for transparency; the Spanish draft follows that decision with 'salida' rather than 'éxodo'. No further revisions or footnotes are required for this brief temporal narrative verse.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y legible.
  - No se usan máscaras como «SEÑOR» porque el versículo no contiene el nombre divino.
  - La puntuación reproduce la estructura breve del original sin añadir contenido explicativo.
