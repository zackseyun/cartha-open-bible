translation:
  language: es
  text: Y harán para sí lugares altos, arboledas e imágenes talladas; y se postrarán, cada uno ante su propio error, y sacrificarán a sus hijos a los demonios y a toda obra del error de sus corazones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ይኅድር / high places
  english_pob_choice: high places
  chosen_spanish: lugares altos
  alternatives_spanish:
  - altos
  - santuarios en las alturas
  lexicon: N/A
  rationale: La expresión tradicional bíblica y transparente en español para este cultismo religioso es “lugares altos”. Conserva la referencia cultual sin suavizarla ni explicitar más de lo que el texto permite.
- source_word: ይገብሩ / groves
  english_pob_choice: groves
  chosen_spanish: bosquecillos
  alternatives_spanish:
  - arboledas
  - sotos
  lexicon: N/A
  rationale: “Bosquecillos” reproduce la imagen de una plantación o arboleda cultual sin imponer un término técnico ajeno. Mantiene la ambigüedad entre un lugar arbolado y un objeto de idolatría ligado al culto.
- source_word: ወ*ይሰግዱ / bow down
  english_pob_choice: bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán
  - adorarán
  lexicon: N/A
  rationale: “Postrarse” expresa con precisión el gesto físico de adoración o sumisión sin forzar el verbo más interpretativo “adorar”.
- source_word: ለስሒት / error
  english_pob_choice: error
  chosen_spanish: error
  alternatives_spanish:
  - extravio
  - engaño
  lexicon: N/A
  rationale: Se conserva “error” por su correspondencia directa con el audit trail en inglés y por mantener el alcance moral y doctrinal del término en el texto.
- source_word: ይዘብሑ / sacrifice
  english_pob_choice: sacrifice
  chosen_spanish: sacrificarán
  alternatives_spanish:
  - ofrecerán en sacrificio
  - inmolarán
  lexicon: N/A
  rationale: “Sacrificarán” es claro y fiel al acto cultual descrito, sin introducir matices que el original no exige.
- source_word: ውሉዶሙ / their children
  english_pob_choice: their children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a su descendencia
  lexicon: N/A
  rationale: “A sus hijos” mantiene la concreción del texto y el carácter de violencia ritual del pasaje.
- source_word: ዲያስ / demons
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - demonios
  lexicon: N/A
  rationale: “Demonios” sigue de cerca el sustantivo del original y coincide con la elección inglesa auditada, preservando el referente sobrenatural.
- source_word: ግብረ፡ ስሕተት / every work of the error
  english_pob_choice: every work of the error
  chosen_spanish: toda obra del error
  alternatives_spanish:
  - toda acción errónea
  - toda obra del engaño
  lexicon: N/A
  rationale: La forma “obra del error” mantiene la construcción nominal del original y evita diluir la fuerza conceptual de “error” como principio activo de desviación.
- source_word: ልቦሙ / of their hearts
  english_pob_choice: of their hearts
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de sus corazones
  - de su interior
  lexicon: N/A
  rationale: Se usa el singular genérico “corazón” para un colectivo, una opción idiomática en español que conserva el sentido antropológico del original sin volverlo abstracto.
theological_decisions:
- issue: Idolatría ritual y demoníaca
  english_pob_reading: The verse links cultic practices with demons and the error of the heart without softening the supernatural claim.
  chosen_spanish_reading: El versículo vincula prácticas idolátricas con demonios y con el error del corazón sin atenuar la afirmación sobrenatural.
  alternative_spanish_readings:
  - '...con espíritus malignos...'
  - '...con el engaño del corazón...'
  rationale: 'Se preserva la fuerza demonológica del texto y su diagnóstico interior. No se sustituye “demonios” por una formulación psicológica, porque el original presenta ambas dimensiones: agentes demoníacos y desvío interior.'
  doctrine_reference: Deuteronomio 32:17; 1 Corintios 10:20
- issue: Error como categoría moral y religiosa
  english_pob_reading: “Error” functions as a substantive theological category, not merely a mistake.
  chosen_spanish_reading: “Error” funciona como categoría moral y religiosa, no solo como equivocación intelectual.
  alternative_spanish_readings:
  - engaño
  - extravio
  rationale: Conservar “error” evita reducir el problema a un fallo cognitivo ocasional; mantiene el marco de desviación cultual y ética presente en el texto.
  doctrine_reference: Romanos 1:27; 2 Pedro 2:18
- issue: Objeto de culto (‘groves’)
  english_pob_reading: The English keeps 'groves' as a culturally loaded cultic object/place.
  chosen_spanish_reading: Se traduce como “bosquecillos” para conservar el valor visual y cultual sin imponer una identificación arqueológica cerrada.
  alternative_spanish_readings:
  - arboledas
  - Aseras
  rationale: El texto fuente no obliga a decidir entre lugar sagrado, arboleda o ídolo específico; “bosquecillos” mantiene la referencia abierta pero inteligible.
  doctrine_reference: Éxodo 34:13; Jueces 6:25-26
translation_notes:
  revision_awareness: The latest revision pass reports no changes needed; the Spanish draft therefore follows the stable English POB reading with no need to resolve later editorial shifts.
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento plural de la frase inicial: “Y harán... y se postrarán... y sacrificarán”.'
  - 'Se conserva la secuencia cultual del original: lugares altos, bosquecillos, imágenes talladas, postración, sacrificio.'
  - Se evita introducir mayúsculas teológicas innecesarias salvo en nombres divinos, que aquí no aparecen.
  - La elección de “corazón” en singular sigue el uso bíblico español para el centro de la persona colectiva.
