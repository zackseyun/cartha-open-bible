  yaml_path: translation/extra_canonical/jubilees/001/007.yaml
  text: and they will know that I have been with them. And you, write down for yourself all the words that I make known to you today, for I know their rebellion and their stiff neck before I bring them into the land that I swore to their fathers—to Abraham, Isaac, and Jacob—saying, ‘To your seed I will give the land that flows with milk and honey.’ And they will eat and be satisfied.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:00Z'
    unchanged: false
    changes_summary: Removed the unnecessary intensifier 'truly'; changed 'a land' to 'the land' for better correspondence to the source and context; retained the rest as accurate and natural.
translation:
  language: es
  text: 'y sabrán que he estado con ellos. Y tú, escribe para ti todas las palabras que yo te hago conocer hoy, pues conozco su rebeldía y la dureza de su cerviz[a] antes de introducirlos en la tierra que juré a sus padres—a Abraham, a Isaac y a Jacob—diciendo: «A vuestra simiente[b] daré la tierra que mana leche y miel.» Y comerán y se saciarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Geez ክሳዶሙ ደቡበ, literalmente «su cuello duro/rígido». La expresión es el equivalente etíope del hebreo עֹרֶף קָשֶׁה («cuello duro» o «dura cerviz»), idioma semítico para la obstinación contumaz (cf. Éx 32:9; 33:3; Dt 9:6). El asterisco (*) en la edición de Charles (1895) junto a ክሳዶሙ señala una nota textual del editor; no altera la traducción.
    reason: textual_variant
  - marker: b
    text: Geez ዘርእ (zarʿ), «simiente/semilla», cognado del hebreo זֶרַע. El Libro de los Jubileos retiene el término semítico de simiente en la formulación del pacto patriarcal. «Simiente» preserva la imagen agrícola-covenantal; «descendencia» sería más natural en español moderno pero elimina esa resonancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ምረተሙ (mərətamu)
  english_pob_choice: rebellion
  chosen_spanish: rebeldía
  alternatives_spanish:
  - rebelión
  - apostasía
  - amargura
  lexicon: Geez ምረት (mərət) — bitterness, apostasy, rebellion; context determines which sense predominates
  rationale: In this prophetic context—God foreknowing Israel's conduct before the land entry—'rebeldía' (defiant, characterological rebellion) captures the moral-theological force better than the more event-focused 'rebelión.' 'Apostasía' is too narrowly ecclesial; 'amargura' (bitterness) belongs to a different semantic field in this context. The English POB 'rebellion' maps cleanly to 'rebeldía.'
- source_word: ክሳዶሙ ደቡበ (kəsādomu dabube)
  english_pob_choice: stiff neck
  chosen_spanish: la dureza de su cerviz
  alternatives_spanish:
  - su cuello duro
  - su terquedad
  - su obstinación
  lexicon: Geez ክሳድ (kəsād) = neck; ደቡበ (dabube) = hard, stiff — a literal anatomical phrase functioning as the Semitic idiom for obstinacy
  rationale: The Geez is literally 'their hard/stiff neck,' the same idiom underlying Hebrew עֹרֶף קָשֶׁה (Ex 32:9; 33:3; Deut 9:6). Spanish 'la dureza de su cerviz' preserves the anatomical image and the recognized biblical register; 'cerviz' (nape/neck) is the standard term in Spanish biblical tradition for this idiom. 'Su cuello duro' would be literal but registers as colloquial; 'su terquedad' is idiomatic but erases the physical image. Footnote [a] documents the source form.
- source_word: ጸሐፍ (ṣəḥaf)
  english_pob_choice: write down
  chosen_spanish: escribe
  alternatives_spanish:
  - anota
  - consigna
  - registra
  lexicon: Geez ጸሐፈ (ṣəḥafa) = to write, record; imperative singular
  rationale: The English POB 'write down' adds a mild directional particle not present in the Geez imperative. Spanish 'escribe' is the direct, unaugmented equivalent and is slightly more faithful to the source. 'Anota' or 'consigna' would weaken the solemnity of the divine command.
- source_word: ዘርእ (zarʿ / zerʿ)
  english_pob_choice: seed
  chosen_spanish: simiente
  alternatives_spanish:
  - descendencia
  - posteridad
  - semilla
  lexicon: Geez ዘርእ (zarʿ) — seed, offspring; cognate to Hebrew זֶרַע and Aramaic זַרְעָא
  rationale: The English POB chose 'seed' to preserve the Semitic agricultural-covenantal metaphor embedded in the promise formula (cf. Gen 12:7; 13:15; 17:8). Spanish 'simiente' retains the same literal-yet-covenantal quality; 'descendencia' is more natural but dissolves the seed-image that Jubilees' retelling of the patriarchal covenant carries. Footnote [b] documents this choice.
- source_word: ትውሕዝ (tawəḥəz)
  english_pob_choice: flows
  chosen_spanish: mana
  alternatives_spanish:
  - fluye
  - destila
  - corre
  lexicon: Geez ወሐዘ (waḥaza) = to flow, run, drip
  rationale: Spanish 'manar' (to flow, ooze, gush) matches the Geez semantic range and is furthermore the verb long established in the Spanish biblical formula 'tierra que mana leche y miel' (cf. traditional renderings of Ex 3:8; 13:5; Num 13:27). 'Fluye' is semantically valid but lacks the resonance of 'mana' in this fixed idiom. Using 'mana' also creates cross-reference consistency across all POB occurrences of the land-promise formula.
- source_word: ወይጸግቡ (wayəṣagəbu)
  english_pob_choice: be satisfied
  chosen_spanish: se saciarán
  alternatives_spanish:
  - quedarán satisfechos
  - se hartarán
  lexicon: Geez ጸገበ (ṣagaba) = to be satisfied, satiated, full (of food)
  rationale: '''Se saciarán'' is precise (full/satiated after eating), natural in modern Spanish, and carries the appropriate biblical register. ''Quedarán satisfechos'' is wordier and more generic; ''se hartarán'' can carry a negative connotation of excess in modern usage. ''Se saciarán'' aligns with the straightforward promise of abundance in the land formula.'
theological_decisions:
- issue: Divine foreknowledge of Israel's rebellion as warrant for written testimony
  english_pob_reading: for I know their rebellion and their stiff neck before I bring them into the land
  chosen_spanish_reading: pues conozco su rebeldía y la dureza de su cerviz antes de introducirlos en la tierra
  alternative_spanish_readings:
  - porque sé de su rebeldía y su terquedad antes de llevarlos a la tierra
  rationale: 'Jubilees presents God''s prescient knowledge of Israel''s apostasy as the very reason Moses must produce a written record now, before the conquest. This is a distinctive Jubilees theological move echoing Deut 31:27–29. The Spanish renders this without softening or importing later theological categories. ''Pues'' (for/because) renders Geez እስመ as a causal connector, keeping the logical structure explicit: the written record is necessary because God already knows what will happen.'
  doctrine_reference: Jubilees' doctrine of heavenly tablets and predictive writing; cf. Deut 31:19–22, 27–29
- issue: Inner quotation of the land oath to the patriarchs
  english_pob_reading: saying, 'To your seed I will give the land that flows with milk and honey.'
  chosen_spanish_reading: 'diciendo: «A vuestra simiente daré la tierra que mana leche y miel.»'
  alternative_spanish_readings:
  - 'diciendo: ''A tu descendencia daré la tierra que fluye leche y miel.'''
  rationale: Jubilees presents this as a verbatim divine quotation of the patriarchal covenant promise (conflating and paraphrasing Gen 12:7 and Ex 3:8). The Spanish uses angular guillemets «» for the inner quotation, standard in formal Spanish biblical prose, distinguishing it clearly from the surrounding narrative. The second-person plural 'vuestra simiente' follows the English POB's 'your seed,' which renders a plural address to the collective patriarchal line as found in the source context. The revised English POB replaced 'a land' with 'the land' for better source correspondence; Spanish 'la tierra' (definite) follows this revision.
  doctrine_reference: Patriarchal covenant; the land promise formula of the Pentateuch (Ex 3:8; 13:5; Num 13:27; Deut 6:3)
translation_notes:
  revision_awareness: 'El borrador inglés del POB pasó por una revisión (azure-gpt-5.4, 2026-04-23): (1) se eliminó el intensificador «truly» de «I have truly been with them» → «I have been with them»; (2) se cambió «a land flowing» por «the land that flows» para mayor fidelidad al geez ምድረ እንተ ትውሕዝ, que usa una cláusula relativa explícita («que fluye/mana»). El español sigue ambas decisiones revisadas: «he estado con ellos» (sin intensificador) y «la tierra que mana leche y miel» (artículo definido + cláusula relativa).'
  spanish_consistency_notes:
  - No aparece el nombre divino יהוה/YHWH en este versículo; no se requiere decisión sobre 'Yahvé' vs. 'SEÑOR'.
  - 'Nombres patriarcales en ortografía española estándar: Abraham, Isaac (no ''Isac''), Jacob.'
  - La fórmula 'tierra que mana leche y miel' debe mantenerse uniforme en todos los pasajes del POB donde aparezca esta expresión covenantal (cf. Éx 3:8; 13:5; Nm 13:27; Dt 6:3 y paralelos en Jubileos).
  - '''Rebeldía'' preferida sobre ''rebelión'' para el sustantivo ምረት en contextos de caracterización moral profética; si otros pasajes de Jubileos usan el mismo término, mantener ''rebeldía'' para consistencia.'
  - '''Simiente'' adoptada como equivalente de ዘርእ en las fórmulas del pacto patriarcal; anotar en el glosario del proyecto para uso coherente frente a contextos agrícolas literales donde ''semilla'' sería preferible.'
