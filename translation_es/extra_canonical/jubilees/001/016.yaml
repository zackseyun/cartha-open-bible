translation:
  language: es
  text: con todo mi corazón y con toda mi alma. Y serán para bendición y no para maldición, y serán cabeza y no cola. Y edificaré mi santuario en medio de ellos, y habitaré con ellos,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በኵሉ፡ ልብየ፡
  english_pob_choice: with all my heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - con todo mi ser
  - con todo mi corazón y voluntad
  lexicon: corazón
  rationale: El geʿez expresa una totalidad interior; el POB inglés conserva "heart" de forma literal y natural. En español, "corazón" comunica bien la entrega total sin forzar un calco extraño.
- source_word: ወበኵሉ፡ ነፍስየ፡
  english_pob_choice: with all my soul
  chosen_spanish: con toda mi alma
  alternatives_spanish:
  - con toda mi vida
  - con todo mi ser
  lexicon: alma
  rationale: El término corresponde a la interioridad/vitalidad de la persona. "Alma" es la equivalencia española más transparente y fiel al par enfático del texto.
- source_word: ይከውኑ፡ ለበረከት፡ ወአኮ፡ ለመርገም፡
  english_pob_choice: they will be for a blessing and not for a curse
  chosen_spanish: serán para bendición y no para maldición
  alternatives_spanish:
  - serán bendición y no maldición
  - serán para una bendición y no para una maldición
  lexicon: bendición / maldición
  rationale: La estructura final del geʿez es de resultado/propósito. "Para bendición" mantiene la fuerza idiomática del inglés POB y del original, sin añadir una paráfrasis doctrinal.
- source_word: ይከውኑ፡ ርእሰ፡ ወአኮ፡ ዘነበ።
  english_pob_choice: they will be the head and not the tail
  chosen_spanish: serán cabeza y no cola
  alternatives_spanish:
  - serán la cabeza y no la cola
  - serán cabeza y no serán cola
  lexicon: cabeza / cola
  rationale: Es una imagen idiomática de preeminencia y no de literalidad corporal. El español bíblico entiende bien la omisión de artículos; se conserva la concisión del POB inglés.
- source_word: መቅደስየ፡
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi santuario sagrado
  - mi lugar santo
  lexicon: santuario
  rationale: '"Santuario" es el equivalente directo y reverente para el lugar santo de la presencia divina.'
- source_word: ማእከሎሙ፡
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - en su medio
  - en medio de ellos mismos
  lexicon: en medio de
  rationale: La frase española natural reproduce la idea de presencia central. Evita un calco áspero y conserva el sentido relacional.
- source_word: እኀድር፡
  english_pob_choice: I will dwell with them
  chosen_spanish: habitaré con ellos
  alternatives_spanish:
  - moraré con ellos
  - viviré con ellos
  lexicon: habitar / morar
  rationale: '"Habitaré" es una solución digna y bíblica que expresa permanencia. En español actual resulta más clara que "moraré" sin perder registro.'
theological_decisions:
- issue: Lenguaje de presencia divina en el santuario
  english_pob_reading: I will build my sanctuary in their midst, and I will dwell with them
  chosen_spanish_reading: Edificaré mi santuario en medio de ellos, y habitaré con ellos
  alternative_spanish_readings:
  - construiré mi santuario en medio de ellos, y morar é con ellos
  - levantaré mi santuario en medio de ellos, y estaré con ellos
  rationale: 'Se mantiene la afirmación fuerte de presencia pactal: Dios establece su santuario y habita con su pueblo. "Edificaré" conserva el valor constructivo del original; "habitaré" preserva la permanencia de la presencia divina.'
  doctrine_reference: presencia de Dios / santuario / teología del pacto
- issue: Fórmula de bendición y maldición
  english_pob_reading: they will be for a blessing and not for a curse
  chosen_spanish_reading: serán para bendición y no para maldición
  alternative_spanish_readings:
  - serán bendición y no maldición
  - serán para una bendición y no para una maldición
  rationale: La oposición bendición/maldición es central y debe permanecer sin suavizarse. La preposición "para" conserva la orientación funcional del texto sin desplazar el sentido hacia mera descripción.
  doctrine_reference: bendición y maldición del pacto
- issue: Imagen de preeminencia
  english_pob_reading: they will be the head and not the tail
  chosen_spanish_reading: serán cabeza y no cola
  alternative_spanish_readings:
  - serán la cabeza y no la cola
  - serán preeminentes y no subordinados
  rationale: Se preserva la metáfora bíblica original para no sustituirla por una explicación interpretativa. La imagen es suficientemente clara en español y mantiene la fuerza del paralelismo.
  doctrine_reference: bendición de preeminencia / reversión de status
