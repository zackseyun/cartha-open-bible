  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero en este versículo el fragmento fuente no incluye el nombre divino explícito en la porción provista; por ello no se inserta aquí.
  - Se conserva un registro bíblico claro y sobrio, con sintaxis española natural y sin introducir glosas no apoyadas por la fuente.
  - No se añadieron notas al pie porque el texto fuente y el audit trail inglés no preservan variantes relevantes para este segmento.
