translation:
  language: es
  text: delante de mis ojos. Y esconderé mi rostro de ellos, y los entregaré en manos de las naciones para cautiverio, saqueo y para ser devorados; los desarraigaré de en medio de la tierra, y los esparciré entre las naciones.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወእሜጥዎሙ / will hide my face from them
  english_pob_choice: I will hide my face from them
  chosen_spanish: esconderé mi rostro de ellos
  alternatives_spanish:
  - ocultar é mi rostro de ellos
  - apartaré mi rostro de ellos
  lexicon: face = rostro; hide = esconder/ocultar
  rationale: Conserva la imagen bíblica de la retirada de favor y presencia divina sin suavizarla. «Rostro» mantiene la metáfora antropomórfica del original y del audit trail inglés.
- source_word: አሕዛብ / nations
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: nations = naciones
  rationale: «Las naciones» es la equivalencia más directa y mantiene el valor histórico-teológico del término en contextos de juicio y dispersión.
- source_word: ለፂዋዌ / captivity
  english_pob_choice: for captivity
  chosen_spanish: para cautiverio
  alternatives_spanish:
  - para esclavitud
  - como cautiverio
  lexicon: captivity = cautiverio
  rationale: «Cautiverio» reproduce el estado de ser llevados cautivos sin introducir un matiz de esclavitud que no está explícito en este verso.
- source_word: ወለኀብለ / for plunder
  english_pob_choice: for plunder
  chosen_spanish: saqueo
  alternatives_spanish:
  - despojo
  - botín
  lexicon: plunder = saqueo
  rationale: «Saqueo» es natural en español bíblico contemporáneo y comunica el despojo violento que el texto describe.
- source_word: ወለተበልዖ / for devouring
  english_pob_choice: for devouring
  chosen_spanish: destrucción
  alternatives_spanish:
  - devoración
  - para ser devorados
  lexicon: devour = devorar; noun sense rendered idiomatically
  rationale: En español, «para devoración» resulta poco idiomático. «Destrucción» conserva la fuerza de consumo/aniquilación implícita en la serie de calamidades, sin añadir un sujeto que el verso no explicita.
- source_word: አቤስሎሙ / I will uproot them
  english_pob_choice: I will uproot them
  chosen_spanish: los arrancaré
  alternatives_spanish:
  - los desarraigaré
  - los arrancaré de raíz
  lexicon: uproot = arrancar de raíz / desarraigar
  rationale: La revisión inglesa corrigió «remove them» a «uproot them» por mayor fidelidad al verbo ge'ez. En español, «arrancaré» conserva la violencia del desarraigo; el contexto «del medio de la tierra» deja implícita la imagen de arrancar de raíz.
- source_word: እማእከለ፡ ምድር / from the midst of the land
  english_pob_choice: from the midst of the land
  chosen_spanish: del medio de la tierra
  alternatives_spanish:
  - de en medio de la tierra
  - del centro de la tierra
  lexicon: midst = medio; land = tierra
  rationale: «Del medio de la tierra» sigue de cerca la expresión semítica y mantiene la secuencia del original; «tierra» aquí reproduce el ámbito territorial, no el elemento físico.
- source_word: ወእዘርዎሙ / I will scatter them
  english_pob_choice: I will scatter them
  chosen_spanish: los esparciré
  alternatives_spanish:
  - los dispersaré
  - los repartiré
  lexicon: scatter = esparcir/dispersar
  rationale: «Esparcir» conserva la imagen de dispersión forzada y funciona bien junto a «entre las naciones»; «dispersar» sería también viable, pero «esparcir» sigue más de cerca la cadencia bíblica.
theological_decisions:
- issue: La secuencia de juicio divino y exilio con «esconderé mi rostro»
  english_pob_reading: I will hide my face from them, and I will deliver them into the hand of the nations
  chosen_spanish_reading: esconderé mi rostro de ellos, y los entregaré en manos de las naciones
  alternative_spanish_readings:
  - apartaré mi rostro de ellos
  - los pondré en manos de las naciones
  rationale: Mantener «mi rostro» preserva la carga teológica de retiro de presencia/favor divino. «En manos de» reproduce el hebraísmo de entrega a dominio ajeno, sin suavizar el juicio.
  doctrine_reference: Teología bíblica del rostro/presencia divina y del juicio pactual por entrega a las naciones
- issue: La fuerza del verbo revisado a «uproot them»
  english_pob_reading: I will uproot them
  chosen_spanish_reading: los arrancaré
  alternative_spanish_readings:
  - los desarraigaré
  - los arrancaré de raíz
  rationale: La revisión auditada indica que el verbo ge'ez implica erradicación más fuerte que mera remoción. «Los arrancaré» mantiene la idea de expulsión violenta; la metáfora agrícola queda reforzada por «del medio de la tierra».
  doctrine_reference: Fidelidad semántica al verbo de juicio y expulsión en el relato pactual
- issue: «for devouring» dentro de una cadena de calamidades
  english_pob_reading: for captivity and for plunder and for devouring
  chosen_spanish_reading: para cautiverio, saqueo y destrucción
  alternative_spanish_readings:
  - para cautiverio, saqueo y devoración
  - para cautiverio, saqueo y ser devorados
  rationale: La frase inglesa conserva la serie nominal. En español, «destrucción» comunica con naturalidad el efecto totalizante de «devouring» sin introducir una construcción más pesada o menos idiomática; se mantiene la acumulación de calamidades.
  doctrine_reference: Retórica de juicio acumulativo en literatura apocalíptica y pactual
translation_notes:
  revision_awareness: 'La evidencia auditada muestra una revisión importante en el tramo final: la lectura anterior «remove them» fue corregida a «uproot them» por fidelidad al verbo ge''ez abēsala, entendido como erradicación/desarraigo. La versión española adopta una solución que conserva esa mayor fuerza.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el Tetragrámaton en el fragmento transmitido, por lo que no aparece aquí.
  - Se mantiene «las naciones» como término técnico estable para አሕዛብ.
  - Se preserva la imagen de «rostro» para no diluir la metáfora de presencia/favor divino.
  - «Esparciré» y «arrancaré» mantienen el paralelismo de juicio y dispersión sin añadir interpretaciones ajenas.
