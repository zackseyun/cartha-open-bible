translation:
  language: es
  text: La gloria de Yahvé estaba sobre el monte Sinaí, y la nube lo cubrió durante seis días. Y le llamó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ስብሐተ፡ እግዚአብሔር፡
  english_pob_choice: The glory of the Lord
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria del Señor
  - la gloria
  lexicon: glory / kabod-language
  rationale: El ge'ez expresa la noción de gloria divina; en esta serie el nombre divino se rinde como Yahvé por norma del proyecto. 'Señor' ocultaría el nombre propio donde el texto fuente y la política del proyecto favorecen su recuperación.
- source_word: ውስተ፡ *ደብረ፡ ሲና፡
  english_pob_choice: upon Mount Sinai
  chosen_spanish: sobre el monte Sinaí
  alternatives_spanish:
  - en el monte Sinaí
  - encima del monte Sinaí
  lexicon: preposition + toponym
  rationale: '''Sobre'' preserva la idea de localización/aparición que sugiere el hebreo-ge''ez, sin forzar un calco torpe. ''Monte Sinaí'' es la forma natural y bíblica en español.'
- source_word: ወጸለሎ፡ ደመና፡ ስዱሰ፡ ዕለተ።
  english_pob_choice: and the cloud overshadowed it for six days
  chosen_spanish: y la nube lo cubrió durante seis días
  alternatives_spanish:
  - y la nube lo cubrió por seis días
  - y la nube lo sombreó durante seis días
  lexicon: overshadow / cover
  rationale: '''Cubrió'' comunica el efecto de la nube sin introducir un tecnicismo poco natural. ''Sombreó'' sería más literal pero menos idiomático en español; ''cubrió'' conserva la escena y la continuidad con el contexto de manifestación divina.'
- source_word: ወጸውዖ፡
  english_pob_choice: And He called him
  chosen_spanish: Y lo llamó
  alternatives_spanish:
  - Y le llamó
  - Y lo llamó a él
  lexicon: call
  rationale: El ge'ez final añade una acción verbal breve. 'Lo llamó' es el español más natural y mantiene la referencia directa sin añadir un complemento no atestiguado.
theological_decisions:
- issue: Presencia divina en Sinaí con 'gloria' y no mera iluminación
  english_pob_reading: The glory of the Lord was upon Mount Sinai
  chosen_spanish_reading: La gloria de Yahvé estaba sobre el monte Sinaí
  alternative_spanish_readings:
  - La gloria del Señor estaba sobre el monte Sinaí
  - La gloria estaba sobre el monte Sinaí
  rationale: Se conserva 'gloria' como manifestación de presencia divina, y se explicita Yahvé según la convención del proyecto. Esto evita diluir el referente personal del texto.
  doctrine_reference: Teofanía / presencia gloriosa de Dios en el Sinaí
- issue: Terminología del nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: Aunque el inglés POB usa 'Lord', el presente proyecto pide restaurar el nombre divino donde el trasfondo de fuente lo permite. No se trata de una lectura doctrinal distinta, sino de una decisión de representación del nombre.
  doctrine_reference: Tetragrámaton / restitución del nombre divino
translation_notes:
  revision_awareness: El contexto inglés fue revisado a partir de una corrección previa que restauró la cláusula inicial sobre la gloria en el monte Sinaí y la cláusula final 'And He called him'. La redacción española refleja ambas partes, sin depender del borrador inglés incompleto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma normal del nombre divino del proyecto.
  - Se usa 'gloria' de modo consistente con el valor teofánico del texto.
  - No se introducen notas al pie porque no hay lecturas alternativas que deban anclarse en el texto español para este versículo.
