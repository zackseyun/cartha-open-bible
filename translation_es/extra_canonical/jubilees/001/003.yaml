- from: La gloria de Yahvé estaba sobre el monte Sinaí, y la nube lo cubrió durante seis días. Y lo llamó.
  to: La gloria de Yahvé estaba sobre el monte Sinaí, y la nube lo cubrió durante seis días. Y le llamó.
  rationale: Se cambia 'Y lo llamó' por 'Y le llamó' para mejorar la naturalidad lectora en español e indicar con más claridad que se trata de llamar a una persona, sin alterar el sentido fuente.
