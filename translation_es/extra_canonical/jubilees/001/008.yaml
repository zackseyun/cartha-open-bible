base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/008.yaml
  text: and they will turn to foreign gods, to those who cannot deliver them from any of their distress.
  footnotes:
  - marker: a
    text: Or 'from all their distress'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:00Z'
    unchanged: false
    changes_summary: Changed 'any of their distress' to 'all their distress' for lexical accuracy and more natural English, reflecting the source phrase meaning 'from all their affliction/distress.'
translation:
  language: es
  text: y se volverán a dioses ajenos[a], que no podrán librarlos de ninguna de sus aflicciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "dioses extraños" o "dioses extranjeros".'
    reason: alternative_rendering
lexical_decisions:
- source_word: וְיִתְמַיְּגוּ / 'they will turn'
  english_pob_choice: and they will turn
  chosen_spanish: y se volverán
  alternatives_spanish:
  - y se dirigirán
  - y se apartarán
  lexicon: volver(se)
  rationale: El movimiento resultante del verbo es de desviación/cambio de rumbo hacia otro objeto de culto; 'se volverán' conserva ese giro sin añadir una interpretación más fuerte de arrepentimiento.
- source_word: אֱלָהֵי נֵכַר / foreign gods
  english_pob_choice: foreign gods
  chosen_spanish: a dioses extraños
  alternatives_spanish:
  - a dioses extranjeros
  - a dioses ajenos
  lexicon: dioses extraños
  rationale: '''Extraños'' refleja bien el matiz de alteridad/idolatría en español bíblico sin sonar tan geográfico como ''extranjeros''. Mantiene la distancia religiosa del original.'
- source_word: לָא יִדְכְּנוּן / cannot deliver
  english_pob_choice: cannot deliver them
  chosen_spanish: no podrán librarlos
  alternatives_spanish:
  - no podrán rescatarlos
  - no podrán salvarlos
  lexicon: librar
  rationale: '''Librar'' es una equivalencia natural y bíblica para liberar de peligro/aflicción, y conserva la fuerza verbal de incapacidad total.'
- source_word: מִן כֻּלָּא מִנְדַּבֵיהוֹם / from all their distress
  english_pob_choice: from any/all their distress
  chosen_spanish: de ninguna de sus aflicciones
  alternatives_spanish:
  - de toda su aflicción
  - de ninguna de sus angustias
  lexicon: aflicción
  rationale: La revisión auditada indica que la negación del alcance total en ge'ez no debe sonar en español como una liberación parcial. 'De ninguna de sus aflicciones' expresa mejor la incapacidad absoluta. 'Aflicciones' mantiene un registro bíblico y amplio.
theological_decisions:
- issue: Alcance de la negación en 'from all/any their distress'
  english_pob_reading: cannot deliver them from all/any of their distress
  chosen_spanish_reading: no podrán librarlos de ninguna de sus aflicciones
  alternative_spanish_readings:
  - no podrán librarlos de toda su aflicción
  - no podrán librarlos de ninguna angustia
  rationale: La evidencia de revisión señala que el sentido no es una salvación parcial, sino incapacidad total para rescatar. En español, 'de ninguna de sus aflicciones' preserva esa negación integral sin sugerir que puedan librarlos de algunas, pero no de otras.
  doctrine_reference: Incapacidad total de los ídolos para salvar; cf. la crítica bíblica a la idolatría.
translation_notes:
  revision_awareness: 'El texto español sigue la lectura corregida del audit trail: la frase final debe expresar incapacidad total de librar, no una liberación parcial. Se evitó reflejar literalmente ''from all'' con una construcción española ambigua.'
  spanish_consistency_notes:
  - Se usó 'dioses extraños' para mantener el matiz idolátrico del original y del inglés POB sin imponer una equivalencia geográfica.
  - '''Librarlos'' conserva un registro bíblico natural en español y mantiene la idea de rescate/liberación del peligro.'
  - La negación final se formuló de modo inequívoco en español para evitar la ambigüedad revisada en el inglés.
