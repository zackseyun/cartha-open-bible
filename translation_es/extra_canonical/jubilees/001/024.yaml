revisions:
- from: Y sus almas se pegarán a mí y a todos mis mandamientos, y harán mis mandamientos. Y yo seré para ellos Padre, y ellos serán para mí hijos.
  to: Y sus almas se adherirán a mí y a todos mis mandamientos, y cumplirán mis mandamientos. Y yo seré su Padre, y ellos serán mis hijos.
  rationale: 'Se hicieron ajustes de estilo y colocación léxica para lograr un español natural y eclesialmente legible sin perder el sentido del original: adhesión firme («se adherirán»), obediencia efectiva a los mandamientos («cumplirán»), y fórmula de pacto idiomática («seré su Padre… mis hijos»). No hacen falta notas, porque no se pierde ninguna alternativa significativa preservada por el English POB.'
