translation:
  language: es
  text: Y sus almas se adherirán a mí y a todos mis mandamientos, y cumplirán mis mandamientos. Y yo seré su Padre, y ellos serán mis hijos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ነፍሶሙ
  english_pob_choice: their souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - sus seres
  lexicon: nefesh / ψυχή
  rationale: El ge'ez expresa el sujeto interior o la vida personal; «almas» conserva la imagen y el registro bíblico sin volverlo más abstracto de lo que el texto permite.
- source_word: ኀቤየ
  english_pob_choice: cling to me
  chosen_spanish: se pegarán a mí
  alternatives_spanish:
  - se adherirán a mí
  - se unirán a mí
  lexicon: dabaq / προσκολλάω
  rationale: La idea es de adhesión fuerte y continua. «Se pegarán» reproduce mejor la fuerza concreta del verbo que una simple unión relacional.
- source_word: ለኵሉ ትእዛዝየ
  english_pob_choice: all my commandments
  chosen_spanish: a todos mis mandamientos
  alternatives_spanish:
  - a todos mis mandatos
  - a todos mis preceptos
  lexicon: mitswot / ἐντολαί
  rationale: «Mandamientos» mantiene el término bíblico directo y natural en español para una serie normativa divina.
- source_word: ይገብሩ
  english_pob_choice: they will do
  chosen_spanish: harán
  alternatives_spanish:
  - cumplirán
  - obedecerán
  lexicon: עשה / ποιέω
  rationale: El verbo ge'ez indica realización efectiva; «harán» conserva la literalidad simple. «Cumplirán» añade interpretación normativa que no está explicitada en la forma verbal.
- source_word: እከውኖሙ አበ
  english_pob_choice: I will be their Father
  chosen_spanish: yo seré para ellos Padre
  alternatives_spanish:
  - yo seré su Padre
  - yo les seré Padre
  lexicon: ab / πατήρ
  rationale: Se conserva la relación de posesión y beneficio del original con «para ellos». «Padre» se mantiene sin artículo para reflejar la formulación bíblica y la predicación nominal.
- source_word: ይከውኑኒ ውሉደ
  english_pob_choice: they will be my children
  chosen_spanish: ellos serán para mí hijos
  alternatives_spanish:
  - serán mis hijos
  - serán hijos para mí
  lexicon: banim / τέκνα
  rationale: «Hijos» es la equivalencia natural y fiel; «para mí» preserva la dirección relacional del original, aunque en español también sería posible la forma posesiva más idiomática.
theological_decisions:
- issue: Relación de pacto expresada como paternidad y filiación
  english_pob_reading: I will be their Father, and they will be my children.
  chosen_spanish_reading: yo seré para ellos Padre, y ellos serán para mí hijos.
  alternative_spanish_readings:
  - yo seré su Padre, y ellos serán mis hijos
  rationale: La formulación mantiene la relación de alianza sin suavizarla. No se añade lenguaje doctrinal ajeno; se conserva la reciprocidad explícita entre Dios y el pueblo.
  doctrine_reference: Relación de pacto / filiación divina
translation_notes:
  revision_awareness: El texto inglés POB y la revisión más reciente coinciden sin cambios; la redacción española sigue directamente el paquete fuente ge'ez y el sentido auditado del inglés sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se usa «mandamientos» de manera consistente con el vocabulario legal-divino del pasaje.
  - Se conserva «Padre» como predicación nominal para reflejar la estructura del original.
  - No se introduce «SEÑOR» ni «Cristo» porque el versículo no los contiene ni los implica directamente en el texto auditado.
