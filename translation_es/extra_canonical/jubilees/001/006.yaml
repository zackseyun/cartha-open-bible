translation:
  language: es
  text: '“hoy[a] para sus generaciones en el monte Sinaí.” Y así será: cuando todas estas cosas vengan sobre ellos, sabrán que yo soy más justo que ellos en todos sus juicios y en todas sus obras,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “hoy mismo”; el ge'ez ዮም añade una referencia temporal explícita que la revisión inglesa recuperó.
    reason: textual_variant
lexical_decisions:
- source_word: ዮም (yom)
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - hoy mismo
  lexicon: Adverbio de tiempo
  rationale: El ge'ez contiene ዮም, que el auditorio inglés corrigió como 'today'. En español, 'hoy' es la equivalencia natural y fiel al valor temporal inmediato.
- source_word: ትውልድ (generations)
  english_pob_choice: their generations
  chosen_spanish: sus generaciones
  alternatives_spanish:
  - para sus generaciones
  - por sus generaciones
  lexicon: Sustantivo de descendencia/linaje
  rationale: Conservo la idea de sucesión generacional indicada por el texto y reflejada en el inglés. 'Sus generaciones' mantiene el alcance colectivo sin introducir un matiz no atestiguado.
- source_word: ደብረ ሲና
  english_pob_choice: Mount Sinai
  chosen_spanish: el monte Sinaí
  alternatives_spanish:
  - monte Sinaí
  - el monte de Sinaí
  lexicon: Topónimo bíblico
  rationale: '''Monte Sinaí'' es la forma española clara y estándar para el lugar. El artículo definido ayuda a la naturalidad del español bíblico sin alterar el referente.'
- source_word: ጻድቅ
  english_pob_choice: more righteous
  chosen_spanish: más justo
  alternatives_spanish:
  - más recto
  - más justo que ellos
  lexicon: Adjetivo de justicia/rectitud
  rationale: El inglés POB eligió 'righteous', y en español 'justo' preserva mejor el registro bíblico y jurídico-moral. No se suaviza a 'recto' porque el contexto contrasta juicio y obras.
- source_word: ፍትሖሙ
  english_pob_choice: their judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus decisiones
  - sus fallos
  lexicon: Sustantivo de juicio/veredicto
  rationale: '''Juicios'' refleja la dimensión de evaluación o sentencia presente en el término y en el contexto del contraste con las obras.'
- source_word: ምግባሮሙ
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: Sustantivo de acción/obra
  rationale: '''Obras'' conserva el paralelo bíblico con ''juicios'' y traduce con dignidad el valor de acciones concretas.'
theological_decisions:
- issue: 'Comparación moral-divina: ''I am more righteous than they are'''
  english_pob_reading: they will know that I am more righteous than they are in all their judgments and in all their deeds
  chosen_spanish_reading: sabrán que yo soy más justo que ellos en todos sus juicios y en todas sus obras
  alternative_spanish_readings:
  - sabrán que yo soy más justo que ellos
  - reconocerán que yo soy más justo que ellos en todos sus juicios y en todas sus obras
  rationale: Mantengo el contraste explícito entre la justicia divina y la conducta humana, tal como lo deja el inglés. No se diluye el comparativo ni se reordena el objeto del juicio, porque la frase une juicio y obras como ámbito de comparación.
  doctrine_reference: Justicia divina y responsabilidad humana en contraste comparativo
- issue: Lectura de 'today' omitida en la versión inglesa previa pero recuperada por revisión
  english_pob_reading: today for their generations on Mount Sinai
  chosen_spanish_reading: hoy para sus generaciones en el monte Sinaí
  alternative_spanish_readings:
  - hoy en favor de sus generaciones en el monte Sinaí
  - hoy para sus descendientes en el monte Sinaí
  rationale: La revisión auditada recupera ዮም ('hoy'). La traducción española lo incorpora para evitar omitir un elemento del original ge'ez; 'hoy' conserva la inmediatez temporal sin forzar interpretación adicional.
  doctrine_reference: Fidelidad textual al testimonio base ge'ez
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para recuperar hoy desde ዮም y para corregir la gramática de 'they are'; la presente versión española incorpora ambas decisiones y mantiene el contraste final sin atenuarlo.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se mantiene 'justo' como equivalente de righteous para conservar el registro jurídico-moral del pasaje.
  - '''Juicios'' y ''obras'' reproducen el paralelismo del original y del audit trail inglés.'
  - La nota [a] está anclada en 'hoy' para reflejar la variante temporal textual.
