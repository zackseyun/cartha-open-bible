base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/025.yaml
  text: And every angel and every spirit will know that these are my children, and that I am their Father in uprightness and righteousness, and that I love them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:08Z'
    unchanged: false
    changes_summary: Removed material not present in the Ge'ez ('they all will be called children of the living God' and the duplicated 'they will know—yes, they will know'), and kept the verse focused on every angel and every spirit knowing that these are God's children, that he is their Father in uprightness and righteousness, and that he loves them.
translation:
  language: es
  text: Y todo ángel y todo espíritu sabrá que estos son mis hijos, y que yo soy su Padre en rectitud y justicia, y que los amo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መላእክ
  english_pob_choice: every angel
  chosen_spanish: todo ángel
  alternatives_spanish:
  - cada ángel
  - todo mensajero celestial
  lexicon: ángel
  rationale: El ge'ez habla de seres celestiales, y el inglés POB mantuvo 'angel'. En español, 'todo ángel' conserva la cuantificación distributiva sin introducir un plural colectivo. 'Mensajero celestial' sería explicativo pero más interpretativo que el texto fuente.
- source_word: መንፈስ
  english_pob_choice: every spirit
  chosen_spanish: todo espíritu
  alternatives_spanish:
  - cada espíritu
  - todo ser espiritual
  lexicon: espíritu
  rationale: Se mantiene la correspondencia directa con 'spirit'. 'Espíritu' en español puede abarcar el mismo campo semántico que el inglés POB deja abierto; 'ser espiritual' estrecha y explica más de lo que el texto exige.
- source_word: ውሉድየ
  english_pob_choice: these are my children
  chosen_spanish: estos son mis hijos
  alternatives_spanish:
  - estos son mis hijos e hijas
  - estos son mis niños
  lexicon: hijos
  rationale: El término base es filial y el inglés POB eligió 'children'. En español, 'hijos' es el equivalente natural y suficientemente inclusivo en este contexto; añadir 'hijas' sería una expansión no atestiguada. 'Niños' desplazaría el sentido de filiación.
- source_word: አቡሆሙ
  english_pob_choice: their Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - su padre
  - su Padre celestial
  lexicon: Padre
  rationale: La mayúscula respeta el valor teológico y relacional del pasaje, coherente con el inglés POB. 'Su padre' sería gramaticalmente posible, pero perdería la marcación reverencial que ayuda a leer la filiación divina.
- source_word: በርቶዕ
  english_pob_choice: in uprightness
  chosen_spanish: en rectitud
  alternatives_spanish:
  - en justicia
  - en integridad
  lexicon: rectitud
  rationale: El inglés POB usa 'uprightness', que en español se expresa con naturalidad como 'rectitud'. 'Integridad' es posible, pero desplaza el matiz moral hacia la idea de totalidad personal; 'justicia' se reserva aquí para el segundo término del par.
- source_word: በጽድቅ
  english_pob_choice: and righteousness
  chosen_spanish: y justicia
  alternatives_spanish:
  - y rectitud
  - y justicia recta
  lexicon: justicia
  rationale: El par ge'ez conserva una segunda noción ética/judicial distinta de 'uprightness'. 'Justicia' mantiene mejor esa fuerza normativa que una repetición de 'rectitud'. La combinación 'rectitud y justicia' refleja el paralelismo sin borrar la distinción.
- source_word: አፈቅርሙ
  english_pob_choice: I love them
  chosen_spanish: los amo
  alternatives_spanish:
  - los amo profundamente
  - los quiero
  lexicon: amar
  rationale: El verbo expresa amor divino directo; 'los amo' es la forma más fiel y sobria en español. 'Los quiero' suavizaría indebidamente el registro teológico, y 'los amo profundamente' añadiría intensificación no presente en el texto.
theological_decisions:
- issue: Filialidad divina y alcance del conocimiento angelical/espiritual
  english_pob_reading: every angel and every spirit will know that these are my children
  chosen_spanish_reading: Y todo ángel y todo espíritu sabrá que estos son mis hijos
  alternative_spanish_readings:
  - y todos los ángeles y todos los espíritus sabrán que estos son mis hijos
  - y cada ángel y cada espíritu sabrá que estos son mis hijos
  rationale: El texto afirma un reconocimiento universal por parte de seres celestiales/espirituales. 'Todo ángel y todo espíritu' conserva la distribución sin convertirlo en una afirmación distinta sobre 'todos' como grupo colectivo. 'Sabrá' sigue el singular distributivo del inglés POB.
  doctrine_reference: Filiación divina; seres celestiales como testigos de la relación pactual
- issue: Relación paterna de Dios 'en uprightness and righteousness'
  english_pob_reading: I am their Father in uprightness and righteousness
  chosen_spanish_reading: y que yo soy su Padre en rectitud y justicia
  alternative_spanish_readings:
  - y que yo soy su Padre en justicia y rectitud
  - y que yo soy su Padre con rectitud y justicia
  rationale: Se conserva el doble predicado ético sin fusionarlo en una sola idea. 'En rectitud y justicia' reproduce mejor la construcción del original que 'con', y mantiene la tensión entre un término más general de rectitud moral y otro más jurídico/normativo.
  doctrine_reference: Carácter justo y recto de Dios; paternidad divina en fidelidad moral
- issue: Amor divino final
  english_pob_reading: and that I love them
  chosen_spanish_reading: y que los amo
  alternative_spanish_readings:
  - y que los quiero
  - y que los amo a ellos
  rationale: El cierre es simple y directo; no requiere ampliación. En español, 'los amo' conserva la declaración divina sin añadir enfatizadores. Se evita 'los quiero' por su menor densidad teológica en este contexto.
  doctrine_reference: Amor divino hacia los hijos de Dios
translation_notes:
  revision_awareness: La redacción sigue la versión revisada más reciente del inglés POB, que eliminó material no presente en el ge'ez y dejó el versículo centrado en el conocimiento de todo ángel y todo espíritu, la filiación de 'estos', la paternidad de Dios en rectitud y justicia, y su amor por ellos. No se reintrodujo ninguna cláusula descartada por la revisión.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no porque aparezca en este versículo, sino porque no hay sustitución nominal divina aquí; el sujeto explícito es 'yo' en primera persona.
  - Se conservaron los términos 'rectitud' y 'justicia' como pareja distinta para no borrar el paralelismo semántico del original.
  - No se añadieron notas al texto porque no surgió una ambigüedad textual o traductológica que requiriera anclaje en el versículo español.
