base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/029.yaml
  text: And the angel of the presence, who went before the camp of Israel, took the tablets of the divisions of the years from the time of creation, of the law and of the testimony, of the weeks of their jubilees, year by year in all their number, and the jubilees year by year, from the day of creation until the day when the heavens and the earth and all their creatures will be renewed according to the powers of heaven and according to all the creation of the earth, until the sanctuary of Yahweh is created in Jerusalem on Mount Zion, and all the lights are renewed for healing and for peace and for blessing for all the chosen of Israel, and that it may be thus from that day and throughout all the days of the earth.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:12Z'
    unchanged: false
    changes_summary: Removed the unsupported 'new' from 'creation,' smoothed punctuation and phrasing, changed 'the weeks of the jubilees' to 'the weeks of their jubilees' for completeness, and rendered the divine name as 'Yahweh' per POB policy.
translation:
  language: es
  text: Y el ángel de la presencia, que iba delante del campamento de Israel, tomó las tablas de las divisiones de los años desde el tiempo de la creación, de la ley y del testimonio, de las semanas de sus jubileos, año por año en todo su número, y los jubileos año por año, desde el día de la creación hasta el día en que los cielos y la tierra y todas sus criaturas serán renovados conforme a los poderes del cielo y conforme a toda la creación de la tierra, hasta que el santuario de Yahvé sea creado en Jerusalén, en el monte Sión, y todas las luminarias sean renovadas para sanidad, para paz y para bendición para todos los escogidos de Israel, y que así permanezca desde aquel día y por todos los días de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መልአከ፡ ገጽ
  english_pob_choice: the angel of the presence
  chosen_spanish: el ángel de la presencia
  alternatives_spanish:
  - el ángel del rostro
  - el ángel de la faz
  lexicon: source phrase / POB fixed rendering
  rationale: Mantiene la expresión técnica de la tradición de Jubileos y la auditable equivalencia con la versión inglesa POB. «Presencia» es la forma natural en español y conserva el sentido reverencial sin suavizar el título.
- source_word: ዘየሐውር
  english_pob_choice: who went before
  chosen_spanish: que iba delante
  alternatives_spanish:
  - que fue delante
  - que caminaba delante
  lexicon: source phrase / verbal nuance
  rationale: «Iba delante» reproduce la idea de liderazgo/protección en marcha con español idiomático y sin perder el aspecto durativo implícito del participio relativo.
- source_word: ጸላተ ዘክፋሌ ዓመታት
  english_pob_choice: the tablets of the divisions of the years
  chosen_spanish: las tablas de las divisiones de los años
  alternatives_spanish:
  - las tablas de las particiones de los años
  - las tablas de los repartos de los años
  lexicon: source phrase / technical calendrical term
  rationale: «Divisiones» conserva el paralelo directo con el inglés POB y la terminología calendárica de Jubileos. «Tablas» refleja el objeto escrito/inscrito.
- source_word: ሕገ፡ ወለስምዕ
  english_pob_choice: the law and of the testimony
  chosen_spanish: de la ley y del testimonio
  alternatives_spanish:
  - de la ley y del testimonio dado
  - de la ley y del testimonio escrito
  lexicon: source phrase / formulaic parallelism
  rationale: Se mantiene la fórmula breve y técnica sin añadir explicaciones no presentes en el texto. «Testimonio» conserva la posible carga de documento/atestación.
- source_word: ሱባዔሆሙ ለኢዮቤሌዎን
  english_pob_choice: the weeks of their jubilees
  chosen_spanish: las semanas de sus jubileos
  alternatives_spanish:
  - las semanas de los jubileos de ellos
  - las semanas de sus ciclos jubilares
  lexicon: source phrase / calendrical idiom
  rationale: «Sus jubileos» sigue el sentido poseído del genitivo y suena natural en español, sin perder la referencia técnica a los ciclos jubilares.
- source_word: ይትኃደስ
  english_pob_choice: will be renewed
  chosen_spanish: serán renovados
  alternatives_spanish:
  - serán restaurados
  - serán rehechos
  lexicon: source phrase / renewal terminology
  rationale: «Renovados» reproduce el campo semántico de renovación cósmica del pasaje y mantiene la correspondencia con el inglés POB.
- source_word: መቅደሰ እግዚአብሔር
  english_pob_choice: the sanctuary of Yahweh
  chosen_spanish: el santuario de Yahvé
  alternatives_spanish:
  - el santuario de Yahweh
  - el templo de Yahvé
  lexicon: source phrase / divine-name and cultic term
  rationale: Se sigue la norma del proyecto para el nombre divino. «Santuario» es más amplio y más fiel que restringirlo a «templo»; conserva el valor sagrado del lugar.
- source_word: ብርሃናት
  english_pob_choice: all the lights
  chosen_spanish: todas las luminarias
  alternatives_spanish:
  - todas las luces
  - todos los astros
  lexicon: source phrase / celestial imagery
  rationale: «Luminarias» evita la ambigüedad de «luces» y hace natural en español la referencia a cuerpos celestes renovados, sin forzar una interpretación más específica que el texto no exige.
- source_word: ለፈውስ ወለሰላም ወለበረከት
  english_pob_choice: for healing and for peace and for blessing
  chosen_spanish: para sanidad, para paz y para bendición
  alternatives_spanish:
  - para curación, para paz y para bendición
  - para salud, para paz y para bendición
  lexicon: source phrase / benefactive list
  rationale: «Sanidad» conserva el sentido resultativo/curativo sin reducirlo a una medicina moderna. «Paz» y «bendición» siguen el paralelo semántico directo.
- source_word: ኅሩያነ እስራኤል
  english_pob_choice: the chosen of Israel
  chosen_spanish: los escogidos de Israel
  alternatives_spanish:
  - los elegidos de Israel
  - los escogidos de Israel
  lexicon: source phrase / election language
  rationale: «Escogidos» mantiene el lenguaje de elección sin introducir una resonancia doctrinal posterior más fuerte que la del texto. Corresponde de cerca al inglés POB.
theological_decisions:
- issue: Divine name in the sanctuary phrase
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El proyecto pide representar יהוה como «Yahvé» en el texto principal. La lectura no oculta el nombre divino y preserva la transparencia textual exigida por la tradición POB.
  doctrine_reference: Nombre divino / tetragrámaton
- issue: Cosmic renewal language
  english_pob_reading: the heavens and the earth and all their creatures will be renewed
  chosen_spanish_reading: los cielos y la tierra y todas sus criaturas serán renovados
  alternative_spanish_readings:
  - los cielos y la tierra y todas sus criaturas serán restaurados
  - los cielos y la tierra y todo lo creado será renovado
  rationale: «Renovados» sigue de cerca el verbo del original y conserva la amplitud cósmica sin reinterpretarlo como una creación totalmente distinta. «Criaturas» refleja «their creatures» con neutralidad.
  doctrine_reference: escatología / renovación de la creación
- issue: Jerusalem/Zion sanctuary clause
  english_pob_reading: until the sanctuary of Yahweh is created in Jerusalem on Mount Zion
  chosen_spanish_reading: hasta que el santuario de Yahvé sea creado en Jerusalén, en el monte Sión
  alternative_spanish_readings:
  - hasta que el santuario de Yahvé sea edificado en Jerusalén, en el monte Sión
  - hasta que el santuario de Yahvé sea establecido en Jerusalén, en el monte Sión
  rationale: «Sea creado» reproduce la construcción audaz del texto y del inglés POB sin suavizarla hacia un término más corriente que pudiera ocultar la tensión conceptual de un santuario aún futuro.
  doctrine_reference: templo escatológico / creación del santuario
- issue: Blessing triad for the renewed lights
  english_pob_reading: for healing and for peace and for blessing
  chosen_spanish_reading: para sanidad, para paz y para bendición
  alternative_spanish_readings:
  - para curación, para paz y para bendición
  - para bienestar, para paz y para bendición
  rationale: La tríada se mantiene como lista abierta de dones. «Sanidad» retiene el potencial tanto físico como restaurador; no se reduce a un mero bienestar general.
  doctrine_reference: restauración / shalom
translation_notes:
  revision_awareness: La redacción sigue la revisión aprobada que eliminó «new» de «creation», mantuvo «Yahweh» en el inglés POB por política del proyecto y conservó la secuencia sintáctica amplia de Jubileos 1:29. Se respetó la densidad calendárica y escatológica del pasaje sin añadir interpretaciones no atestiguadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino.
  - Se mantiene «Mesías/Cristo» fuera del versículo porque no aparece en el texto fuente.
  - Se conserva «ángel de la presencia» como término técnico estable del libro.
  - Se evita traducir «lights» como «luces» para no banalizar la imaginería cósmica.
  - Se conserva el paralelismo reiterado con «para… para… y para…» para reflejar la acumulación del original.
