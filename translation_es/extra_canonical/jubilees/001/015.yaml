base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/015.yaml
  text: and Sabbaths and festivals and jubilees and ordinances. And after this they will turn to me from among the nations with all their heart and with all their soul and with all their strength, and I will gather them from among all the nations, and they will seek me so that I may be found by them. And when they seek me with all their heart and with all their soul, I will reveal to them abundant peace in righteousness, and I will transplant them as an upright planting,
  footnotes:
  - marker: a
    text: Or 'and I will plant them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:04Z'
    unchanged: false
    changes_summary: Changed 'with righteousness' to 'in righteousness' for a more natural rendering of the phrase, and changed 'transplant' to 'plant' for a more direct and natural rendering of the verb.
translation:
  language: es
  text: y sábados, y fiestas, y jubileos, y ordenanzas. Y después de esto se volverán a mí de entre las naciones con todo su corazón y con toda su alma y con toda su fuerza, y los reuniré de entre todas las naciones, y me buscarán para que yo sea hallado por ellos. Y cuando me busquen con todo su corazón y con toda su alma, les revelaré abundante paz en justicia, y los trasplantaré[a] como una plantación recta,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y los plantaré". El ge’ez permite una lectura de plantación; el historial de revisión también la reflejó, pero el análisis filológico favorece "trasplantaré".'
    reason: alternative_reading
lexical_decisions:
- source_word: ወሰንበተ፡
  english_pob_choice: and Sabbaths
  chosen_spanish: y sábados
  alternatives_spanish:
  - y sábados de reposo
  - y días de reposo
  lexicon: sabbath
  rationale: El ge’ez corresponde al concepto de sábado/sabbath; en español bíblico neutral, 'sábados' conserva la forma breve y el enlace cultual sin imponer una terminología eclesiástica más interpretativa.
- source_word: ወበዓለ፡
  english_pob_choice: and festivals
  chosen_spanish: y festivales
  alternatives_spanish:
  - y fiestas
  - y solemnidades
  lexicon: festival
  rationale: Se mantiene el valor general de celebraciones/fiestas rituales. 'Festivales' evita estrechar el término a un uso meramente cultural moderno, aunque 'fiestas' también sería posible.
- source_word: ወ*አዮቤለ፡
  english_pob_choice: and jubilees
  chosen_spanish: y jubileos
  alternatives_spanish:
  - y años jubilares
  lexicon: jubilee
  rationale: '''Jubileos'' reproduce directamente el término técnico ya establecido por el texto fuente y por la tradición de traducción de Jubileos.'
- source_word: ወ*ሥርዐተ።
  english_pob_choice: and ordinances
  chosen_spanish: y ordenanzas
  alternatives_spanish:
  - y estatutos
  - y decretos
  lexicon: ordinance
  rationale: '''Ordenanzas'' conserva el valor jurídico-normativo sin desplazarlo hacia una lectura exclusivamente litúrgica.'
- source_word: ይትመየጡ፡ ኀቤየ፡
  english_pob_choice: they will turn to me
  chosen_spanish: se volverán a mí
  alternatives_spanish:
  - se convertirán a mí
  - volverán a mí
  lexicon: turn_return
  rationale: El verbo expresa retorno volitivo hacia Dios; 'se volverán a mí' mantiene el movimiento de retorno y la dirección personal, sin introducir una fórmula doctrinal más fuerte de la necesaria.
- source_word: በኵሉ፡ ልቦሙ፡ ወበኵሉ፡ ነፍሶሙ፡ ወበኵሉ፡ ኀይሎሙ፡
  english_pob_choice: with all their heart and with all their soul and with all their strength
  chosen_spanish: con todo su corazón y con toda su alma y con toda su fuerza
  alternatives_spanish:
  - con todo su corazón, con toda su alma y con todas sus fuerzas
  lexicon: heart_soul_strength
  rationale: Se conserva la triple fórmula antropológica. 'Fuerza' es una forma natural y directa para ኀይል, sin perder la idea de vigor/poder.
- source_word: የኀሡኒ፡ ከመ፡ እትረከቦሙ፡
  english_pob_choice: and they will seek me so that I may be found by them
  chosen_spanish: y me buscarán para que yo sea hallado por ellos
  alternatives_spanish:
  - y me buscarán para hallarme
  - y me buscarán para que me encuentren
  lexicon: seek_found
  rationale: La construcción conserva la relación final entre buscar y encontrar/hallar. 'Sea hallado por ellos' refleja la pasiva resultativa del original y evita perder la iniciativa divina implícita.
- source_word: እከሥት፡ ሎሙ፡ ብዙኀ፡ ሰላመ፡
  english_pob_choice: I will reveal to them abundant peace
  chosen_spanish: les revelaré abundante paz
  alternatives_spanish:
  - les mostraré abundante paz
  - les daré abundante paz
  lexicon: reveal_peace
  rationale: '''Revelaré'' sigue el audit trail inglés y deja oír la dimensión de manifestación divina. ''Paz'' traduce ሰላም de forma estándar; ''abundante'' preserva el énfasis cuantitativo/intensivo.'
- source_word: በ*ጽድቅ።
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - con justicia
  - en rectitud
  lexicon: righteousness
  rationale: '''En justicia'' responde al ajuste revisado del inglés y preserva el marco ético-forense del sustantivo. ''Rectitud'' es posible, pero ''justicia'' mantiene mejor el eco bíblico y el enlace con el orden correcto.'
- source_word: ወ*እፈልሶሙ፡⁶
  english_pob_choice: and I will transplant them
  chosen_spanish: y los transplantaré
  alternatives_spanish:
  - y los plantaré
  - y los estableceré
  lexicon: transplant_plant
  rationale: Se conserva 'transplantaré' porque el audit trail revisado recupera la especificidad del verbo ge’ez de traslado/trasplante y no solo de plantación. En español suena marcado, pero es la forma que mejor refleja el desplazamiento desde entre las naciones hacia una nueva implantación.
- source_word: ተክለ፡ ርቱዐ፡
  english_pob_choice: an upright planting
  chosen_spanish: como una plantación recta
  alternatives_spanish:
  - como una plantación justa
  - como una plantación derecha
  lexicon: upright_planting
  rationale: '''Plantación recta'' conserva la imagen vegetal y la cualidad moral/direccional de ''upright''. ''Recta'' es más natural que ''derecha'' en este contexto y evita simplificar el matiz ético.'
theological_decisions:
- issue: Cómo renderizar el retorno del pueblo a Dios sin sobredeterminarlo doctrinalmente
  english_pob_reading: they will turn to me from among the nations
  chosen_spanish_reading: se volverán a mí de entre las naciones
  alternative_spanish_readings:
  - se convertirán a mí de entre las naciones
  - volverán a mí de entre las naciones
  rationale: El texto enfatiza un retorno relacional y total a Dios. 'Se volverán a mí' preserva el movimiento de retorno sin fijar de antemano una terminología confesional específica que el original no exige aquí.
  doctrine_reference: Deuteronomio 4:30; Joel 2:12-13
- issue: Cómo entender 'abundant peace in righteousness'
  english_pob_reading: I will reveal to them abundant peace in righteousness
  chosen_spanish_reading: les revelaré abundante paz en justicia
  alternative_spanish_readings:
  - les revelaré mucha paz con justicia
  - les revelaré paz abundante en rectitud
  rationale: La revisión inglesa favorece 'in righteousness' frente a 'with righteousness'. En español, 'en justicia' conserva la relación interna entre paz y orden recto delante de Dios, sin convertirlo en un mero acompañamiento externo.
  doctrine_reference: Salmo 85:10; Isaías 32:17
- issue: Cómo resolver la tensión entre 'plant' y 'transplant' en el verbo final
  english_pob_reading: and I will transplant them as an upright planting
  chosen_spanish_reading: y los transplantaré como una plantación recta
  alternative_spanish_readings:
  - y los plantaré como una plantación recta
  - y los estableceré como una plantación recta
  rationale: El historial de revisión muestra una oscilación entre 'plant' y 'transplant'. El chequeo filológico citado en el audit trail favorece el traslado/trasplante como mejor lectura del ge’ez; por eso se mantiene 'transplantaré' para no borrar esa tensión textual.
  doctrine_reference: Isaías 5:1-7; Salmo 80:8-16
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste reciente del inglés de 'with righteousness' a 'in righteousness' y el vaivén editorial sobre 'plant/transplant'. La versión española sigue la lectura más específica sustentada por el análisis del verbo ge’ez, manteniendo 'transplantaré' para no perder la noción de traslado desde entre las naciones y nueva implantación en la tierra prometida.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en la política del proyecto, pero este versículo no contiene el tetragrámaton explícito; por eso se usa 'mí' y no una sustitución devocional.
  - Se preservó la triple fórmula 'corazón/alma/fuerza' como estructura antropológica completa.
  - '''Justicia'' se emplea en sentido bíblico relacional y recto, no como mera legalidad moderna.'
  - '''Plantación recta'' conserva la metáfora agrícola del cierre sin domesticarse a un giro abstracto.'
