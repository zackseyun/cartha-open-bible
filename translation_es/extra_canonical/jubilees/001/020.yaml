base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/020.yaml
  text: And create for them an upright spirit, and do not let the spirit of Beliar rule over them to accuse them before you and to turn them away from every path of righteousness, so that they perish from before your face. Yet they are your people and your inheritance, whom you delivered by your great power from the hand of Egypt. Create for them
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:37Z'
    unchanged: false
    changes_summary: Capitalized the opening for formal register, changed 'so as to accuse' to 'to accuse' for more natural English, and replaced 'ensnare them from every path of righteousness' with 'turn them away from every path of righteousness' for better lexical fit and clarity.
translation:
  language: es
  text: Y crea para ellos un espíritu recto, y no permitas que el espíritu de Beliar[a] los domine, para acusarlos delante de ti y para apartarlos de todo camino de justicia, para que perezcan de delante de tu rostro. Pero ellos son tu pueblo y tu heredad, a quienes libraste con tu gran poder de la mano de Egipto. Crea para ellos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beliar conserva la forma transliterada del nombre propio usada en la tradición textual; no se sustituye por un equivalente interpretativo.
    reason: source_note
lexical_decisions:
- source_word: መንፈሰ፡ ርቱዐ፡
  english_pob_choice: an upright spirit
  chosen_spanish: un espíritu recto
  alternatives_spanish:
  - un espíritu justo
  - un espíritu íntegro
  lexicon: espíritu
  rationale: En el contexto la cualidad no es solo moral abstracta sino rectitud/disposición correcta delante de Dios; 'recto' conserva la imagen de una disposición enderezada y natural en español, sin perder el valor ético de 'upright'.
- source_word: መንፈሰ፡ ቤልሖር፡
  english_pob_choice: the spirit of Beliar
  chosen_spanish: el espíritu de Beliar
  alternatives_spanish:
  - el espíritu de Beliar
  - el espíritu de Belial
  lexicon: espíritu / nombre propio
  rationale: Se conserva el nombre propio en la forma usada por la POB en inglés, transliterado al español como 'Beliar' para mantener consistencia auditable y evitar sustituirlo por una forma tradicional distinta sin base textual directa.
- source_word: ወኢ*ይኰንንዎሙ
  english_pob_choice: do not let ... rule over them / to accuse them
  chosen_spanish: no permitas que ... los gobierne, para acusarlos
  alternatives_spanish:
  - no dejes que ... domine sobre ellos, para acusarlos
  - no permitas que ... reine sobre ellos, para acusarlos
  lexicon: gobernar / acusar
  rationale: El ge'ez combina la idea de influencia/autoridad con la función de acusar; 'gobierne' refleja el dominio personal del espíritu, mientras 'acusar' preserva la finalidad explícita del verbo en la oración.
- source_word: እምኵሉ፡ ፍኖተ፡ ጽድቅ፡
  english_pob_choice: from every path of righteousness
  chosen_spanish: de todo camino de justicia
  alternatives_spanish:
  - de todo camino de rectitud
  - de toda senda de justicia
  lexicon: camino / justicia
  rationale: '''Camino'' preserva la metáfora bíblica; ''justicia'' es la correspondencia más natural en español para ''righteousness'' cuando se trata de conducta conforme a Dios, manteniendo la fuerza covenantal/legal del término.'
- source_word: ወርስትከ፡
  english_pob_choice: your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  lexicon: heredad
  rationale: '''Heredad'' conserva mejor el registro bíblico y la relación pactual de pertenencia, sin reducirlo a mera posesión material.'
- source_word: እምእዴ፡ ግብጽ፤
  english_pob_choice: from the hand of Egypt
  chosen_spanish: de la mano de Egipto
  alternatives_spanish:
  - del poder de Egipto
  - de manos de Egipto
  lexicon: mano
  rationale: La expresión idiomática se conserva literalmente porque tiene peso bíblico y comunica opresión/poder sin necesidad de explicación adicional.
theological_decisions:
- issue: Naturaleza del 'espíritu de Beliar'
  english_pob_reading: a hostile spirit that accuses and turns people away from righteousness
  chosen_spanish_reading: un espíritu hostil que acusa y aparta del camino de justicia
  alternative_spanish_readings:
  - un demonio de Beliar
  - el maligno espíritu de Beliar
  rationale: 'La formulación mantiene la ambigüedad controlada del texto: no se define más de lo que la fuente expresa, pero sí se deja claro que es una fuerza/persona espiritual opuesta a Dios.'
  doctrine_reference: Jubilees 1:20; cf. terminology of evil spirits in Second Temple literature
- issue: 'Resultado temido: ''that they perish from before your face'''
  english_pob_reading: so that they perish from before your face
  chosen_spanish_reading: para que perezcan de delante de tu rostro
  alternative_spanish_readings:
  - para que perezcan de tu presencia
  - para que desaparezcan de delante de ti
  rationale: '''De delante de tu rostro'' conserva el paralelismo semítico y el énfasis relacional/judicial del original, aunque suene más solemne que una paráfrasis moderna.'
  doctrine_reference: Jubilees 1:20; idiom of divine presence in biblical literature
- issue: 'Repetición final incompleta: ''Create for them'''
  english_pob_reading: Create for them
  chosen_spanish_reading: Crea para ellos
  alternative_spanish_readings:
  - Crea para ellos de nuevo
  - Y crea para ellos
  rationale: Se conserva la frase final tal como llega en el texto base, señalando que el segmento parece quedar truncado en el testimonio disponible; no se completa especulativamente.
  doctrine_reference: Source-text limitation / verse boundary as transmitted
translation_notes:
  revision_awareness: 'La base inglesa reflejó una revisión reciente: se ajustó la coordinación para hacer más natural ''to accuse them'' y se prefirió ''turn them away from every path of righteousness'' frente a una formulación de ''ensnare''. La versión española sigue esa lectura revisada, usando ''apartarlos de todo camino de justicia'' y evitando un verbo de trampa que el texto inglés ya descartó. También se respetó el cierre truncado del segmento, que en el material fuente termina en una orden repetida, sin completarla por conjetura.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto solo cuando el texto lo requiera; aquí el pasaje no contiene el Tetragrámaton explícito, por lo que no aparece.
  - '''Beliar'' se mantiene transliterado para conservar consistencia con la tradición textual del libro y con la necesidad de auditar la elección léxica.'
  - Se usa 'justicia' para 'righteousness' por el valor ético-pactual del contexto, sin convertirlo en una formulación doctrinal más técnica que la fuente.
  - Se preserva el registro solemne del texto apócrifo/pseudepigráfico sin modernizarlo hasta volverlo parafrástico.
