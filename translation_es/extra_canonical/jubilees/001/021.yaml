translation:
  language: es
  text: 'un corazón limpio y un espíritu santo, y no dejes que queden enredados[a] en sus pecados desde ahora en adelante y para siempre». Y Yahvé dijo a Moisés: «Yo conozco su terquedad, sus pensamientos y su cerviz dura, y no escucharán»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Enredados» traduce la imagen de quedar atrapados en una trampa o red; conserva el sentido de la revisión inglesa «ensnared».
    reason: lexical_alternative
lexical_decisions:
- source_word: ልበ፡ ንጹሐ፡
  english_pob_choice: a clean heart
  chosen_spanish: un corazón limpio
  alternatives_spanish:
  - un corazón puro
  - un corazón sin mancha
  lexicon: corazón / limpio
  rationale: El ge'ez usa la combinación de «corazón» con el adjetivo de pureza. «Limpio» conserva la imagen moral de pureza sin añadir una metáfora ajena al texto.
- source_word: መንፈሰ፡ ቅዱሰ፡
  english_pob_choice: a holy spirit
  chosen_spanish: un espíritu santo
  alternatives_spanish:
  - un espíritu sagrado
  - el Espíritu Santo
  lexicon: espíritu / santo
  rationale: El texto no exige aquí mayúsculas ni identifica de manera inequívoca a la tercera persona trinitaria; por eso se conserva el sentido cualitativo de «santo» en minúscula. «Espíritu Santo» se evita para no sobreinterpretar el sintagma.
- source_word: ይትዐቀጹ
  english_pob_choice: be ensnared
  chosen_spanish: queden enredados
  alternatives_spanish:
  - sean atrapados
  - caigan atrapados
  lexicon: atrapar / enredar
  rationale: La revisión inglesa prefirió «ensnared» por mayor precisión. En español, «queden enredados» mantiene la imagen de quedar atrapados en una trampa o red y suena natural.
- source_word: በኀጢአቶሙ
  english_pob_choice: in their sins
  chosen_spanish: en sus pecados
  alternatives_spanish:
  - por sus pecados
  - a causa de sus pecados
  lexicon: pecado
  rationale: La preposición «en» conserva la idea de estar metidos o envueltos en la esfera del pecado, en línea con «ensnared».
- source_word: ወእስከ፡ ለዓለም
  english_pob_choice: from now and forever
  chosen_spanish: desde ahora y para siempre
  alternatives_spanish:
  - desde ahora y por toda la eternidad
  - de ahora en adelante y para siempre
  lexicon: ahora / para siempre
  rationale: La expresión refleja bien el alcance temporal continuo del original y del inglés auditado, sin volverla excesivamente literal.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: YHWH
  rationale: 'Se sigue el estándar del proyecto: el nombre divino se vierte como «Yahvé» en lugar de ocultarlo con «SEÑOR».'
- source_word: ወኢርስ ወይቤሎ፡ እግዚአብሔር፡ ለሙሴ፡
  english_pob_choice: And the LORD said to Moses
  chosen_spanish: Y Yahvé dijo a Moisés
  alternatives_spanish:
  - Entonces Yahvé dijo a Moisés
  - Y el Señor dijo a Moisés
  lexicon: decir / Moisés
  rationale: Se conserva la conexión narrativa con una coordinación simple, fiel al flujo del texto.
- source_word: አነ፡ አአምር፡
  english_pob_choice: I know
  chosen_spanish: Yo conozco
  alternatives_spanish:
  - Yo sé
  - Conozco
  lexicon: conocer
  rationale: «Conozco» transmite relación y discernimiento, y mantiene el tono solemne de la declaración divina.
- source_word: ተዋሥኦቶሙ
  english_pob_choice: their contrariness
  chosen_spanish: su terquedad
  alternatives_spanish:
  - su obstinación
  - su rebeldía
  lexicon: terquedad / obstinación
  rationale: La opción inglesa señala resistencia y oposición. «Terquedad» expresa esa dureza volitiva en español de forma comprensible y natural.
- source_word: ሕሊናሆሙ
  english_pob_choice: their thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus intenciones
  - su mente
  lexicon: pensamiento
  rationale: «Pensamientos» sigue de cerca el contenido mental señalado por el original sin restringirlo a una sola intención.
- source_word: ይቡሰ
  english_pob_choice: stiff neck
  chosen_spanish: su cerviz dura
  alternatives_spanish:
  - su cuello duro
  - su testarudez
  lexicon: cerviz / duro
  rationale: Se mantiene la imagen bíblica tradicional de la «cerviz dura», que en español comunica bien la obstinación del pueblo.
theological_decisions:
- issue: ¿«espíritu santo» debe entenderse como referencia al Espíritu Santo o como una cualidad de un espíritu santo?
  english_pob_reading: a holy spirit
  chosen_spanish_reading: un espíritu santo
  alternative_spanish_readings:
  - el Espíritu Santo
  - un espíritu sagrado
  rationale: La forma del texto y el antecedente inglés no obligan a identificar aquí una referencia trinitaria. Por fidelidad al dato fuente, se conserva la lectura cualitativa con minúscula.
  doctrine_reference: Distinción entre uso adjetival y referencia nominal al Espíritu Santo; evitar sobrelectura pneumatológica.
- issue: ¿Cómo renderizar la imagen de quedar atrapados en pecado?
  english_pob_reading: be ensnared in their sins
  chosen_spanish_reading: queden enredados en sus pecados
  alternative_spanish_readings:
  - sean atrapados en sus pecados
  - queden presos en sus pecados
  rationale: «Enredados» conserva la metáfora de trampa/atadura con una expresión idiomática en español y mantiene la fuerza moral del pasaje.
  doctrine_reference: Lenguaje bíblico de esclavitud/atrapamiento en el pecado, sin atenuarlo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés, que cambió «be caught» por «be ensnared» para mayor precisión. La versión española refleja esa decisión con «queden enredados» y conserva el resto del flujo narrativo sin introducir expansiones.
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יהוה/יהוה implícito en el inglés «the LORD».
  - Se mantuvo «cerviz dura» por su valor bíblico tradicional y su transparencia semántica en español.
  - Se evitó capitalizar «espíritu santo» para no convertir automáticamente el sintagma en un nombre propio teológico no garantizado por el texto.
