base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/001/026.yaml
  text: And I will write down for you all these things that I am making known to you on this mountain, what is first and what is last and what is to come, in all the divisions of the days in the law and in the testimony and in the weeks of their jubilees forever, until I descend and dwell with them throughout all the ages of eternity.”
  footnotes:
  - marker: a
    text: Or 'I have made known'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:41Z'
    unchanged: false
    changes_summary: Removed 'now' as unsupported, changed 'words' to 'things' to better match the broader referent, and adjusted 'I make known' to 'I have made known' for better alignment with the completed action in context. Also smoothed 'through all' to 'throughout all' for more natural formal English.
translation:
  language: es
  text: Y escribiré para ti todas estas cosas que estoy dando a conocer[a] en este monte, lo primero y lo último y lo que ha de venir, en todas las divisiones de los días en la ley y en el testimonio y en las semanas de sus jubileos para siempre, hasta que descienda y habite con ellos por todos los siglos de la eternidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he dado a conocer». El ge''ez admite una lectura con sentido resultativo, pero el texto principal refleja mejor el imperfecto y la revelación en curso en el monte.'
    reason: alternative_reading
lexical_decisions:
- source_word: ወአነ፡ እጽሐፍ፡
  english_pob_choice: And I will write down
  chosen_spanish: Y escribiré
  alternatives_spanish:
  - Y escribiré por escrito
  - Y pondré por escrito
  lexicon: write
  rationale: El verbo ge'ez expresa la acción de escribir; en español, 'escribiré' conserva el valor verbal directo y fluido. 'Poner por escrito' es posible, pero aquí resulta más largo sin añadir precisión necesaria.
- source_word: ዘአነ፡ አየድዐከ፡
  english_pob_choice: that I am making known / I have made known
  chosen_spanish: que he dado a conocer
  alternatives_spanish:
  - que estoy dando a conocer
  - que hago conocer
  lexicon: make known
  rationale: El audit trail muestra tensión aspectual entre una lectura en curso y una completada. 'He dado a conocer' mantiene el resultado ya comunicado, sin negar que la revelación sigue en curso en el contexto del monte. 'Estoy dando a conocer' es alternativa viable, pero menos natural en esta cláusula subordinada larga.
- source_word: በዝንቱ፡ ደብር፡
  english_pob_choice: on this mountain
  chosen_spanish: en este monte
  alternatives_spanish:
  - sobre este monte
  - en esta montaña
  lexicon: mountain
  rationale: '''Monte'' es más cercano al registro bíblico y puede abarcar el lugar sagrado sin perder naturalidad en español. ''Montaña'' es posible, pero aquí ''monte'' suena más sobrio y tradicional.'
- source_word: ዘቀዳሚ፡ ወዘደኃሪ፡
  english_pob_choice: what is first and what is last
  chosen_spanish: lo primero y lo último
  alternatives_spanish:
  - lo que es primero y lo que es último
  - el primero y el último
  lexicon: first/last
  rationale: La forma neutra 'lo primero y lo último' reproduce el paralelismo abstracto del original. 'El primero y el último' podría personalizar indebidamente la expresión.
- source_word: ዘይመጽእ፡
  english_pob_choice: what is to come
  chosen_spanish: lo que ha de venir
  alternatives_spanish:
  - lo que vendrá
  - lo que está por venir
  lexicon: come/future
  rationale: '''Ha de venir'' preserva el matiz de futuridad determinada y encaja con el registro bíblico sin sonar arcaico en exceso.'
- source_word: በኵሉ፡ ዙፋቤ፡ መዋዕል፡
  english_pob_choice: in all the divisions of the days
  chosen_spanish: en todas las divisiones de los días
  alternatives_spanish:
  - en todas las reparticiones de los días
  - en todos los repartos de los días
  lexicon: divisions of the days
  rationale: '''Divisiones'' refleja la organización temporal del texto y sigue de cerca la estructura original. Otras opciones suenan poco naturales o demasiado interpretativas.'
- source_word: ዘበሕግ፡ ወዘበስምዕ፡
  english_pob_choice: in the law and in the testimony
  chosen_spanish: en la ley y en el testimonio
  alternatives_spanish:
  - en la Torá y en el testimonio
  - en la ley y en el testimonio dado
  lexicon: law/testimony
  rationale: '''Ley'' y ''testimonio'' conservan el paralelismo del original y la terminología ya establecida en el POB inglés. ''Torá'' sería más específica, pero no es exigida aquí.'
- source_word: ወበ''ሱባዔሆሙ፡ ለኢዮቤሌዎን፡
  english_pob_choice: and in the weeks of their jubilees
  chosen_spanish: y en las semanas de sus jubileos
  alternatives_spanish:
  - y en las semanas de sus jubileos
  - y en las semanas de los jubileos
  lexicon: weeks of jubilees
  rationale: '''Semanas'' traduce literalmente el término temporal y ''sus jubileos'' sigue el posesivo del ge''ez. Mantiene la conexión técnica con el calendario jubilar sin ampliar el sentido.'
- source_word: እስከ፡ ለዓለም፤ እስከ፡ ሶበ፡ እወርድ፡ ወእኀድር፡ ምስሌሆሙ፡ በኵሉ፡ ዓለመ፡'' ዓለም።
  english_pob_choice: forever, until I descend and dwell with them throughout all the ages of eternity
  chosen_spanish: para siempre, hasta que descienda y habite con ellos por todos los siglos de la eternidad
  alternatives_spanish:
  - para siempre, hasta que descienda y habite con ellos durante todos los siglos de la eternidad
  - para siempre, hasta que baje y more con ellos por toda la eternidad
  lexicon: eternity/dwell
  rationale: '''Para siempre'' y ''por todos los siglos de la eternidad'' conservan el doble énfasis temporal del original sin simplificarlo. ''Habite'' mantiene un registro solemne para la morada divina.'
theological_decisions:
- issue: Aspecto de la revelación ('I am making known' vs. 'I have made known')
  english_pob_reading: The English audit trail notes a tension between ongoing and completed revelation, with the latest text using a completed sense while the Ge'ez imperfect suggests ongoing or present action.
  chosen_spanish_reading: '''he dado a conocer'' dentro de una oración principal futura (''escribiré''), dejando abierta la continuidad de la revelación'
  alternative_spanish_readings:
  - '''estoy dando a conocer'''
  - '''doy a conocer'''
  rationale: La forma compuesta en subordinada evita fijar demasiado el aspecto y encaja bien con el hecho de que el acto de escribir proyecta la comunicación a un conjunto ya revelado en el monte. Así se preserva la tensión sin forzarla hacia un solo aspecto.
  doctrine_reference: Revelación divina progresiva y comunicación profética continua en contexto narrativo
- issue: Finalidad escatológica de la permanencia con ellos
  english_pob_reading: until I descend and dwell with them throughout all the ages of eternity
  chosen_spanish_reading: hasta que descienda y habite con ellos por todos los siglos de la eternidad
  alternative_spanish_readings:
  - hasta que descienda y more con ellos por toda la eternidad
  - hasta que baje y habite con ellos por toda la eternidad
  rationale: '''Habitar con ellos'' mantiene la idea relacional y presencial del texto, no solo ''estar''. ''Por todos los siglos de la eternidad'' reproduce la acumulación enfática de duración sin reducirla a una frase más plana.'
  doctrine_reference: Presencia divina eterna y consumación escatológica
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que eliminó 'now', cambió 'words' por 'things', y ajustó el aspecto de 'make known' frente a la evidencia ge'ez de imperfectivo. La versión española evita 'ahora', no restringe el referente a 'palabras', y conserva una solución aspectualmente abierta mediante 'he dado a conocer' con nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente explícito.
  - '''Monte'' se prefirió a ''montaña'' por registro bíblico y para alinearse con la solemnidad del contexto revelatorio.'
  - Se evitó 'Cristo' porque no hay título mesiánico en este pasaje.
  - '''Ley'' y ''testimonio'' respetan el paralelismo del texto y la terminología auditada del POB inglés.'
