review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el ge''ez y la revisión inglesa: mantiene la cláusula principal sin reintroducir la frase eliminada sobre una aparición universal, conserva la triple autodeclaración divina como Dios, Padre y rey, y refleja correctamente el cierre sobre la santidad futura de Sión y Jerusalén. La única mejora necesaria es estilística y de naturalidad en español para la frase regia.'
  spanish_quality_summary: El texto es claro y comprensible, pero 'y rey en el monte Sión para siempre' suena algo abrupto y menos natural en español que 'y el Rey del monte Sión para siempre' o una estructura equivalente. Además, por dignidad y legibilidad eclesial amplia, conviene capitalizar 'Monte Sión' como nombre propio geográfico. El resto está bien.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: ''Dios'' es correcto; no aparece YHWH ni Mesías/Cristo. ''Padre'' y ''santas'' preservan adecuadamente el sentido del texto. La revisión propuesta no altera ninguna decisión teológica, solo mejora la formulación española del título regio.'
  issues:
  - severity: medium
    issue: 'Formulación regia algo poco natural: ''y rey en el monte Sión para siempre'''
    rationale: Aunque formalmente cercana al inglés, en español la omisión del artículo hace que la frase suene cortada. 'Y el Rey del Monte Sión para siempre' expresa con mayor dignidad y fluidez el valor predicativo del original sin ampliar el sentido.
  - severity: low
    issue: 'Capitalización de topónimo: ''monte Sión'''
    rationale: En español bíblico y general, como nombre propio geográfico suele preferirse 'Monte Sión'. Es una mejora de estilo y presentación, no de contenido.
  revised_spanish_text: Y todos sabrán que yo soy el Dios de Israel y el Padre de todos los hijos de Jacob, y el Rey del Monte Sión para siempre, y Sión y Jerusalén serán santas.
  revision_rationale: Se ajusta la frase regia para que suene natural y digna en español, preservando el sentido del ge'ez y del English POB auditado. También se normaliza la capitalización de 'Monte Sión' como topónimo. No se requieren notas al pie.
