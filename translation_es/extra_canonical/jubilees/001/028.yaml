  text: And all will know that I am the God of Israel and the Father of all the children of Jacob, and king on Mount Zion forever, and Zion and Jerusalem will be holy.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:11Z'
    unchanged: false
    changes_summary: Removed the unsupported clause about the LORD appearing to all, which is not present in the provided Ge'ez. Smoothed 'for all the ages of eternity' to the more natural and accurate 'forever,' and kept the rest of the verse formally aligned with the source.
translation:
  language: es
  text: Y todos sabrán que yo soy el Dios de Israel y el Padre de todos los hijos de Jacob, y el Rey del Monte Sión para siempre, y Sión y Jerusalén serán santas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አምላከ፡ እስራኤል፡
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelita
  - el Dios de Israel, su Dios
  lexicon: Dios
  rationale: El ge’ez nombra a Dios con el título relacional «de Israel». En español, «el Dios de Israel» reproduce con claridad y naturalidad el valor del título sin añadir paráfrasis.
- source_word: አብ፡ ለኵሎሙ፡ ደቂቀ፡ ያዕቆብ፡
  english_pob_choice: the Father of all the children of Jacob
  chosen_spanish: el Padre de todos los hijos de Jacob
  alternatives_spanish:
  - el Padre de todos los descendientes de Jacob
  - el Padre de todos los hijos de Jacob
  lexicon: Padre
  rationale: «Padre» mantiene el lenguaje filial del texto fuente. «Hijos de Jacob» sigue de cerca el original y conserva el paralelismo con la traducción inglesa auditada.
- source_word: ወንጉሥ፡ በደብረ፡ ጽዮን፡
  english_pob_choice: and king on Mount Zion
  chosen_spanish: y rey en el monte Sión
  alternatives_spanish:
  - y rey sobre el monte Sión
  - y rey en Sión
  lexicon: rey
  rationale: La relación locativa del ge’ez se vierte de forma directa con «en el monte Sión». «Monte Sión» conserva el referente bíblico establecido en español.
- source_word: ለዓለመ፡ ዓለም፤
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por toda la eternidad
  lexicon: temporalidad
  rationale: La revisión inglesa descartó una expansión como «for all the ages of eternity» y la redujo a «forever». «Para siempre» es la equivalencia española más natural y fiel.
- source_word: ወትከውን፡ ጽዮን፡ ወኢየሩሳሌም፡ ቅድስት።
  english_pob_choice: and Zion and Jerusalem will be holy
  chosen_spanish: y Sión y Jerusalén serán santas
  alternatives_spanish:
  - y Sión y Jerusalén serán santas
  - y Sión y Jerusalén serán santificadas
  lexicon: santo
  rationale: El adjetivo ge’ez «santa» concuerda con ambos nombres colectivos en español. «Santas» preserva el predicado de estado sin forzar una formulación pasiva que el texto no exige.
theological_decisions:
- issue: Autorrevelación divina y título regio sin añadir cláusulas no atestiguadas
  english_pob_reading: I am the God of Israel and the Father of all the children of Jacob, and king on Mount Zion forever
  chosen_spanish_reading: yo soy el Dios de Israel y el Padre de todos los hijos de Jacob, y rey en el monte Sión para siempre
  alternative_spanish_readings:
  - yo soy el Dios de Israel, el Padre de todos los hijos de Jacob y rey en el monte Sión para siempre
  - yo soy el Dios de Israel y Padre de todos los hijos de Jacob, y rey en el monte Sión para siempre
  rationale: 'Se conserva la triple autodeclaración del texto: Dios, Padre y rey. No se introduce ninguna cláusula sobre una aparición universal del Señor, porque fue removida en la revisión inglesa por no estar sustentada por el ge’ez provisto.'
  doctrine_reference: Jubilees 1:28; revisión textual indicada en el audit trail
- issue: Santidad de Sión y Jerusalén
  english_pob_reading: Zion and Jerusalem will be holy
  chosen_spanish_reading: Sión y Jerusalén serán santas
  alternative_spanish_readings:
  - Sión y Jerusalén serán santas
  - Sión y Jerusalén serán consagradas
  rationale: «Santas» conserva el predicado directo de santidad. «Consagradas» sería posible, pero introduce una matización ritual que el texto no explicita.
  doctrine_reference: Jubilees 1:28
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar la cláusula no sustentada «the LORD will appear to the eyes of all» y para simplificar «for all the ages of eternity» a «forever». La redacción española sigue esa revisión y no reintroduce el material suprimido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque el versículo, según el ge’ez provisto y la revisión inglesa, no contiene el Tetragrámaton ni una cita explícita que obligue a usarlo.
  - Se conservó «Dios» y no «Señor», porque el original nombra a Dios con el título «Dios de Israel».
  - Se eligió «santas» en plural para concordar con «Sión y Jerusalén» y evitar una pasiva innecesaria.
