  yaml_path: translation/extra_canonical/jubilees/001/019.yaml
  text: And he prayed and said, “Lord my God, do not abandon your people and your inheritance to walk in the error of their hearts, and do not give them into the hand of their enemies, the nations, lest they rule over them and cause them to sin against you. Let your mercy, Lord, be lifted up over your people.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:06Z'
    unchanged: false
    changes_summary: Capitalized the opening narrative for formal register and added the closing quotation mark and period to complete the sentence. Kept the translation otherwise unchanged.
translation:
  language: es
  text: 'Y oró y dijo: «Yahvé, mi Dios, no abandones a tu pueblo y a tu heredad para andar en el error de su corazón, ni los entregues en mano de sus enemigos, las naciones, para que no dominen sobre ellos y los hagan pecar contra ti. Sea levantada tu misericordia, Yahvé, sobre tu pueblo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚኦ፡ አምላኪየ፡
  english_pob_choice: Lord my God
  chosen_spanish: Yahvé, mi Dios
  alternatives_spanish:
  - Señor, mi Dios
  - Yahvé, mi Señor
  lexicon: YHWH / θεός
  rationale: El ge’ez distingue la invocación a Yahvé con el apelativo posesivo ‘mi Dios’. En español se conserva el nombre divino ‘Yahvé’ según la convención del proyecto, y ‘mi Dios’ reproduce el posesivo del original. Se evita ‘Señor’ como sustituto opaco del nombre divino.
- source_word: ኢትኅድግ፡
  english_pob_choice: do not abandon
  chosen_spanish: no abandones
  alternatives_spanish:
  - no dejes
  - no desampares
  lexicon: עזב / abandon
  rationale: El sentido principal es dejar o abandonar al pueblo; ‘no abandones’ comunica bien la fuerza del ruego sin añadir matices no presentes. ‘No desampares’ es posible, pero ‘abandonar’ es más directo y transparente.
- source_word: ሕዝበከ፡ ወርስትከ፡
  english_pob_choice: your people and your inheritance
  chosen_spanish: a tu pueblo y a tu heredad
  alternatives_spanish:
  - a tu pueblo y tu herencia
  - a tu pueblo y tu posesión
  lexicon: עם / נחלה
  rationale: ‘Heredad’ mantiene el valor bíblico de pertenencia pactal y transmisión heredada, más preciso que ‘herencia’ o ‘posesión’ en este contexto. Se conserva la coordinación con ‘tu pueblo’.
- source_word: በሐዊር፡ በስሕተተ፡ ልቦሙ፡
  english_pob_choice: to walk in the error of their hearts
  chosen_spanish: para que anden en el error de su corazón
  alternatives_spanish:
  - para andar en el error de su corazón
  - en el extravío de su corazón
  lexicon: הלך + תעה / לב
  rationale: La frase idiomática expresa conducta y extravío interior; ‘anden en el error de su corazón’ mantiene la imagen semítica de caminar en el error, sin convertirla en paráfrasis abstracta. ‘Corazón’ se conserva por ser el centro interior de decisión y pensamiento.
- source_word: ውስተ፡ እዴ፡ ፀሮሙ፡ አሕዛብ፡
  english_pob_choice: into the hand of their enemies, the nations
  chosen_spanish: en mano de sus enemigos, las naciones
  alternatives_spanish:
  - en manos de sus enemigos, las naciones
  - en poder de sus enemigos, las naciones
  lexicon: hand / enemy / nations
  rationale: ‘En mano de’ reproduce de forma más cercana la metáfora bíblica de autoridad y entrega; ‘sus enemigos, las naciones’ conserva la aposición del original y del inglés POB.
- source_word: ከመ፡ ኢይኰንንዎሙ፡
  english_pob_choice: lest they rule over them
  chosen_spanish: para que no dominen sobre ellos
  alternatives_spanish:
  - para que no gobiernen sobre ellos
  - no sea que los dominen
  lexicon: משל / rule
  rationale: La estructura final expresa finalidad negativa o prevención. ‘Dominen sobre ellos’ comunica la idea de ejercer dominio, en línea con el temor del texto, sin exagerar hacia ‘gobernar’.
- source_word: ከመ፡ ይኅጥኡ፡ ለከ።
  english_pob_choice: cause them to sin against you
  chosen_spanish: y los hagan pecar contra ti
  alternatives_spanish:
  - y los hagan pecar contra ti
  - y los induzcan a pecar contra ti
  lexicon: חטא
  rationale: ‘Hacer pecar’ sigue la causalidad verbal del original y del inglés POB. ‘Contra ti’ conserva la orientación personal del pecado como ofensa dirigida a Dios.
- source_word: ይትለዐል፡ ምሕረትከ፡
  english_pob_choice: Let your mercy ... be lifted up
  chosen_spanish: Sea exaltada tu misericordia
  alternatives_spanish:
  - Sea levantada tu misericordia
  - Sea alzada tu misericordia
  lexicon: רום / חסד
  rationale: El ge’ez pide que la misericordia sea ‘levantada/exaltada’ sobre el pueblo. En español, ‘sea exaltada’ comunica la elevación deseada de manera natural y solemne; se mantiene la metáfora de altura.
- source_word: ላዕለ፡ ሕዝብከ፡
  english_pob_choice: over your people
  chosen_spanish: sobre tu pueblo
  alternatives_spanish:
  - encima de tu pueblo
  - sobre tu gente
  lexicon: על / pueblo
  rationale: ‘Sobre’ reproduce la preposición de cobertura/protección y corresponde al giro final de la petición. ‘Tu pueblo’ mantiene el registro bíblico del original.
theological_decisions:
- issue: Uso del nombre divino frente a un título genérico
  english_pob_reading: Lord my God
  chosen_spanish_reading: Yahvé, mi Dios
  alternative_spanish_readings:
  - Señor, mi Dios
  - mi Dios
  rationale: La convención del proyecto exige preservar Yahvé cuando el texto subyacente invoca el nombre divino. Traducirlo como ‘Señor’ ocultaría esa decisión textual y debilitaría la trazabilidad al original ge’ez.
  doctrine_reference: Éxodo 3:15; Deuteronomio 6:4
- issue: ‘Heredad’ como término pactal
  english_pob_reading: your inheritance
  chosen_spanish_reading: tu heredad
  alternative_spanish_readings:
  - tu herencia
  - tu posesión
  rationale: ‘Heredad’ mantiene el sentido de pertenencia electiva y de propiedad pactal del pueblo de Dios, más cargado teológicamente que una herencia meramente patrimonial.
  doctrine_reference: Deuteronomio 9:29; Salmo 28:9
- issue: Pecado como acción contra Dios
  english_pob_reading: cause them to sin against you
  chosen_spanish_reading: los hagan pecar contra ti
  alternative_spanish_readings:
  - los induzcan a pecar contra ti
  - los hagan pecar delante de ti
  rationale: El pecado se presenta explícitamente como ofensa personal ‘contra ti’, conservando la relación de alianza y la gravedad teológica del peligro pedido en la súplica.
  doctrine_reference: Salmo 51:4; 2 Samuel 12:13
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo ajustó mayúscula inicial y puntuación final; no alteró el contenido. La versión española sigue ese contenido estable y completa la cita con puntuación y comillas de cierre equivalentes.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como forma estándar del nombre divino en todo el texto.
  - Se usó ‘heredad’ para coherencia con el léxico bíblico del proyecto.
  - Se conservó la imagen semítica de ‘caminar en el error’ en lugar de suavizarla a una paráfrasis explicativa.
