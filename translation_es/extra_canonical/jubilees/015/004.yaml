  yaml_path: translation/extra_canonical/jubilees/015/004.yaml
  text: And I will establish my covenant between me and you, and I will multiply you greatly.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:06Z'
    unchanged: false
    changes_summary: Changed 'give' to 'establish' for better lexical accuracy with covenant language; retained the rest as natural and complete.
translation:
  language: es
  text: Y estableceré mi pacto entre mí y ti, y te multiplicaré muchísimo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእሁብ፡ ኪዳንየ፡
  english_pob_choice: I will establish my covenant
  chosen_spanish: estableceré mi pacto
  alternatives_spanish:
  - daré mi pacto
  - haré mi pacto
  lexicon: pacto
  rationale: El Ge'ez expresa la acción sobre el pacto con un verbo de establecimiento/otorgamiento; el inglés POB revisó 'give' a 'establish' por precisión. En español, 'establecer' reproduce mejor esa fijación del pacto que 'dar', mientras 'pacto' comunica con claridad el sentido de ኪዳን sin forzar un tecnicismo ajeno.
- source_word: ማእከሌየ፡ ወማእከሌከ፡
  english_pob_choice: between me and you
  chosen_spanish: entre mí y ti
  alternatives_spanish:
  - entre yo y tú
  - entre mí y vosotros
  lexicon: entre + pronombres personales
  rationale: La construcción relacional se mantiene de forma directa. 'Mí' y 'ti' son las formas oblicuas correctas y conservan la reciprocidad del texto fuente sin añadir matices inexistentes.
- source_word: ወአአብቀከ፡ ጥቀ።
  english_pob_choice: and I will multiply you greatly
  chosen_spanish: y te multiplicaré muchísimo
  alternatives_spanish:
  - y te multiplicaré en gran manera
  - y te haré crecer muchísimo
  lexicon: multiplicar
  rationale: El verbo base de multiplicación se conserva literalmente en español. 'Muchísimo' refleja el intensificador final sin volverlo más interpretativo que el original; mantiene el tono enfático del hebraísmo/Ge'ez sin agregar contenido.
theological_decisions:
- issue: Lenguaje del pacto
  english_pob_reading: I will establish my covenant
  chosen_spanish_reading: Y estableceré mi pacto
  alternative_spanish_readings:
  - Y daré mi pacto
  - Y haré mi pacto
  rationale: 'La revisión inglesa descartó ''give'' por una razón lexical-teológica: el énfasis está en la instauración/confirmación del pacto, no en una mera entrega. ''Estableceré'' conserva esa fuerza de fundación y es más transparente para lectores hispanohablantes.'
  doctrine_reference: Teología del pacto; fidelidad divina y ratificación de promesas
- issue: Relación del pacto entre dos partes
  english_pob_reading: between me and you
  chosen_spanish_reading: entre mí y ti
  alternative_spanish_readings:
  - entre yo y tú
  rationale: La formulación española debe mantener la asimetría gramatical correcta sin oscurecer que el pacto vincula a las dos partes nombradas. No hay base para ampliar la frase a una interpretación comunitaria o eclesial aquí.
  doctrine_reference: Relación bilateral de pacto en el relato de Génesis/Jubileos
- issue: Multiplicación abundante
  english_pob_reading: I will multiply you greatly
  chosen_spanish_reading: y te multiplicaré muchísimo
  alternative_spanish_readings:
  - y te multiplicaré en gran manera
  - y te haré crecer muchísimo
  rationale: La promesa de incremento numérico debe quedar inequívoca. 'Muchísimo' reproduce la intensidad del original sin convertirla en paráfrasis exhortativa o agrícola.
  doctrine_reference: Promesa de descendencia abundante
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'give' a 'establish' para ajustar mejor la semántica del pacto; la versión española adopta explícitamente ese valor de 'establecer' y conserva la estructura simple del verso sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantiene 'pacto' de forma consistente para ኪዳን y no se sustituye por 'alianza' porque 'pacto' es el término preferente del proyecto y refleja mejor la formulación auditada.
  - Se conserva el orden de dos miembros del pacto ('mí y ti') para no desdibujar la bilateralidad del pasaje.
  - No se introduce puntuación interpretativa adicional; la coma separa dos cláusulas coordinadas de manera natural en español.
