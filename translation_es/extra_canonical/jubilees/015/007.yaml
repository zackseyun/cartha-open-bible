translation:
  language: es
  text: Tu nombre ya no será Abram, sino que desde ahora y para siempre tu nombre será Abraham, porque te he hecho padre de muchas naciones.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְלֹא־יִקָּרֵא עוֹד שִׁמְךָ
  english_pob_choice: And your name shall no longer be called
  chosen_spanish: Y no se llamará más tu nombre
  alternatives_spanish:
  - Y ya no será llamado tu nombre
  - Y no te llamarán más por nombre
  lexicon: LLAMAR / PASIVO IMPERSONAL
  rationale: El hebreo/gee'z expresa el cambio de nombre con un pasivo impersonal; el español natural y fiel es "no se llamará más tu nombre". Conserva la idea de imposición oficial del nuevo nombre sin añadir sujeto humano no explicitado.
- source_word: אַבְרָם / אַבְרָהָם
  english_pob_choice: Abram / Abraham
  chosen_spanish: Abram / Abraham
  alternatives_spanish:
  - Abrán / Abrahán
  lexicon: NOMBRES PROPIOS
  rationale: Se mantienen las formas tradicionales reconocibles en español bíblico, que coinciden con la forma internacional habitual de estos nombres y preservan la continuidad narrativa del cambio de nombre.
- source_word: מֵעַתָּה וְעַד־עוֹלָם
  english_pob_choice: from now and forever
  chosen_spanish: desde ahora y para siempre
  alternatives_spanish:
  - desde ahora y hasta la eternidad
  - de aquí en adelante y para siempre
  lexicon: EXPRESIÓN TEMPORAL
  rationale: La combinación expresa inicio inmediato y permanencia indefinida; "desde ahora y para siempre" es natural en español y conserva ambas piezas semánticas sin intensificar más allá del texto.
- source_word: כִּי אַב הֲמוֹן גּוֹיִם
  english_pob_choice: for I have made you the father of many nations
  chosen_spanish: porque te he hecho padre de muchas naciones
  alternatives_spanish:
  - porque te he constituido padre de muchas naciones
  - porque te hice padre de muchas naciones
  lexicon: PADRE / MUCHAS NACIONES
  rationale: '"Te he hecho" refleja la causación divina ya decretada y resulta fiel al valor perfectivo del original, mientras que "padre de muchas naciones" sigue de cerca la formulación del texto y la POB inglesa.'
theological_decisions:
- issue: Cambio de nombre como acto divino permanente
  english_pob_reading: your name shall no longer be called Abram, but from now and forever your name shall be Abraham
  chosen_spanish_reading: no se llamará más tu nombre Abram, sino que desde ahora y para siempre tu nombre será Abraham
  alternative_spanish_readings:
  - ya no te llamarán Abram, sino Abraham
  - tu nombre dejará de ser Abram y será Abraham
  rationale: La formulación subraya que el nuevo nombre no es solo un apodo, sino una designación establecida por Dios y válida de manera permanente. El español elegido mantiene esa fuerza sin suavizarla.
  doctrine_reference: Génesis 17:5; reiteración de la alianza y del cambio de nombre por mandato divino
translation_notes:
  revision_awareness: El contexto de auditoría en inglés indica una traducción ya estable y sin cambios requeridos; por tanto, el borrador español sigue de cerca la lectura inglesa aprobada y la confirma con una equivalencia natural al ge'ez/trasfondo semítico.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton en la forma conservada del versículo.
  - '"Abraham" se conserva como nombre propio fijo en español bíblico, no como título traducible.'
  - No se introducen notas al pie porque el pasaje no presenta variantes relevantes en el paquete de fuente proporcionado ni ambigüedades doctrinales que requieran anclaje textual.
