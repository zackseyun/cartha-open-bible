  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Ángeles de la presencia' y 'ángeles de la santidad' son coherentes con el expediente. La elección 'santificó' también alinea bien con la POB. La única desviación importante es preferir 'frente a' donde el expediente inglés ya resolvió a favor de 'before'.
