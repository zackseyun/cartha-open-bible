  text: For all the angels of the presence and all the angels of holiness—thus was their creation from the day of their creation—and before the angels of the presence and the angels of holiness he sanctified Israel, that they might be with him and with his holy angels.
  footnotes:
  - marker: a
    text: Or 'opposite all the angels of the presence and all the angels of holiness'.
    reason: previous_rendering
  - marker: b
    text: Or 'thus he created them'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:09Z'
    unchanged: false
    changes_summary: Replaced interpretive 'these two kinds' with the more literal 'thus he created them'; retained both references to all the angels for completeness; rendered ወአንጻሮሙ more literally as 'opposite'; and kept the formal tone while preserving the verse's structure.
translation:
  language: es
  text: Porque para todos los ángeles de la presencia y para todos los ángeles de la santidad[a]—así fue su creación desde el día de su creación—y ante[b] los ángeles de la presencia y a los ángeles de la santidad santificó a Israel, para que estuvieran con él y con sus santos ángeles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ángeles del rostro»; la POB conserva «presencia» para esta designación celestial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «frente a» o «en presencia de»; el ge''ez puede expresar posición delante de o frente a, pero aquí «ante» comunica mejor el sentido contextual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ኵሎሙ መላእክተ ገጽ
  english_pob_choice: all the angels of the presence
  chosen_spanish: todos los ángeles de la presencia
  alternatives_spanish:
  - todos los ángeles del rostro
  - todos los ángeles ante la presencia
  lexicon: ángeles / presencia
  rationale: Conservo la terminología técnica de la POB para el grupo celestial y traduzco literalmente ገጽ como 'presencia', que es transparente en español y mantiene la fórmula angelológica del pasaje.
- source_word: መላእክተ ቅዳሴ
  english_pob_choice: angels of holiness
  chosen_spanish: ángeles de la santidad
  alternatives_spanish:
  - ángeles santos
  - ángeles de santificación
  lexicon: santidad
  rationale: '''Santidad'' preserva el sustantivo abstracto del giro ge''ez y evita suavizarlo con un adjetivo. Así se mantiene la relación paralela con ''ángeles de la presencia''.'
- source_word: ከመዝ፡ ፍጥረቶሙ
  english_pob_choice: thus was their creation
  chosen_spanish: así fue su creación
  alternatives_spanish:
  - así era su creación
  - así fue su naturaleza
  lexicon: creación / ser
  rationale: La revisión más reciente indica que el ge'ez usa un sintagma nominal ('su creación'), no un verbo de acción directo. En español, 'así fue su creación' conserva esa estructura sin introducir una interpretación excesiva.
- source_word: ወአንጻሮሙ
  english_pob_choice: before / opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - ante
  - en presencia de
  - opuesto a
  lexicon: posición espacial
  rationale: '''Frente a'' permite retener la tensión entre ''opposite'' y ''before'' señalada en el historial de revisión, sin forzar una sola lectura explicativa. En español comunica colocación relacional con naturalidad.'
- source_word: ቀደሶ ለእስራኤል
  english_pob_choice: he sanctified Israel
  chosen_spanish: santificó a Israel
  alternatives_spanish:
  - consagró a Israel
  - hizo santo a Israel
  lexicon: santificar
  rationale: '''Santificó'' es la correspondencia más directa para el verbo de consagrar/separar para Dios, y conserva el paralelismo con la santidad de los ángeles.'
theological_decisions:
- issue: Relación entre Israel y los ángeles santos
  english_pob_reading: that they might be with him and with his holy angels
  chosen_spanish_reading: para que estuvieran con él y con sus santos ángeles
  alternative_spanish_readings:
  - para que estuvieran con él y con sus ángeles santos
  - para que estuvieran con él junto con sus santos ángeles
  rationale: 'Mantengo la lectura relacional del texto: Israel es santificado para compartir compañía con Dios y con sus ángeles santos. El orden del español conserva la referencia a ambos destinatarios sin ampliar el sentido.'
  doctrine_reference: Participación/cercanía del pueblo santificado con Dios y su corte celestial, sin fusionar categorías creadas con Dios.
translation_notes:
  revision_awareness: He seguido la última revisión que corrigió la cláusula de creación para reflejar un sintagma nominal ('their creation') y que mantuvo la lectura relacional de ወአንጻሮሙ como una posición 'frente a/before' en vez de una paráfrasis más libre. El español conserva ambas tensiones con una expresión sobria y literal.
  spanish_consistency_notes:
  - Uso 'Yahvé' no es pertinente aquí porque el versículo no contiene el nombre divino.
  - '''Ángeles de la presencia'' y ''ángeles de la santidad'' siguen la terminología POB para esta sección apocalíptica.'
  - No empleo 'Cristo', 'SEÑOR' ni terminología eclesial tradicional ajena al pasaje.
  - Conservo 'santificó' para respetar el valor cultual/consagratorio del verbo sin reemplazarlo por una glosa doctrinal.
