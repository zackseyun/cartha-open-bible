translation:
  language: es
  text: Y tú, manda a los hijos de Israel, y que guarden la señal del pacto por todas sus generaciones, por ordenanza perpetua, y no serán arrancados de la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአንተኒ / And you
  english_pob_choice: And you
  chosen_spanish: Y tú
  alternatives_spanish:
  - Y tú también
  - Tú, pues
  lexicon: source direct address
  rationale: El texto ge'ez mantiene un encargo directo al interlocutor; en español, «Y tú» conserva esa fuerza sin añadir elementos como «ahora» que no están en la fuente.
- source_word: አዝዝ / command
  english_pob_choice: command
  chosen_spanish: manda
  alternatives_spanish:
  - ordena
  - encarga
  lexicon: imperative command
  rationale: «Manda» comunica un mandato claro y natural en español; conserva la relación de autoridad del original sin sonar excesivamente técnico.
- source_word: ለውሉደ፡ እስራኤል / the children of Israel
  english_pob_choice: the children of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - la casa de Israel
  lexicon: ethnic covenant community
  rationale: Se mantiene la fórmula bíblica tradicional y precisa para el grupo pactal designado por el original.
- source_word: ይዕቀቡ / let them keep
  english_pob_choice: let them keep
  chosen_spanish: que guarden
  alternatives_spanish:
  - que observen
  - que preserven
  lexicon: keep/observe
  rationale: «Guardar» en español bíblico expresa bien la idea de observar fielmente una disposición o mandato.
- source_word: ትእምርተ፡ ኪዳን / the sign of the covenant
  english_pob_choice: the sign of the covenant
  chosen_spanish: la señal del pacto
  alternatives_spanish:
  - la señal del pacto
  - el signo del pacto
  lexicon: sign/token/covenant
  rationale: «Señal» reproduce de forma natural el valor de marcador visible o distintivo; «pacto» mantiene la terminología covenantal sin suavizarla.
- source_word: ለትውልዶሙ / throughout their generations
  english_pob_choice: throughout their generations
  chosen_spanish: por sus generaciones
  alternatives_spanish:
  - a través de sus generaciones
  - por todas sus generaciones
  lexicon: משך generational duration
  rationale: La construcción «por sus generaciones» es breve y fiel; expresa continuidad intergeneracional sin sobreexplicación.
- source_word: ሥርዐት፡ ዘለዓለም / an everlasting ordinance
  english_pob_choice: an everlasting ordinance
  chosen_spanish: como ordenanza perpetua
  alternatives_spanish:
  - como estatuto perpetuo
  - como ordenanza eterna
  lexicon: ordinance/statute perpetual
  rationale: «Ordenanza» refleja la idea de disposición normativa; «perpetua» transmite la duración continua del adjetivo original. Se evita «estatut​o» por sonar más jurídico y menos fluido en este contexto.
- source_word: ወኢይሠረዉ፡ እምነ፡ ምድር / and they shall not be uprooted from the land
  english_pob_choice: and they shall not be uprooted from the land
  chosen_spanish: y no serán arrancados de la tierra
  alternatives_spanish:
  - y no serán desarraigados de la tierra
  - y no serán arrancados del país
  lexicon: uproot from the land
  rationale: «Arrancados de la tierra» conserva la imagen agrícola del verbo original y la formulación del audit trail inglés, evitando una interpretación más abstracta. En español bíblico, también puede entenderse como expulsión o desposesión del territorio.
theological_decisions:
- issue: Pacto y continuidad generacional
  english_pob_reading: keep the sign of the covenant throughout their generations as an everlasting ordinance
  chosen_spanish_reading: que guarden la señal del pacto por sus generaciones, como ordenanza perpetua
  alternative_spanish_readings:
  - que observen la señal del pacto a través de sus generaciones, como estatuto perpetuo
  - que mantengan la señal del pacto por todas sus generaciones, como ordenanza eterna
  rationale: La frase conserva tanto el aspecto ritual visible («señal») como la obligación continua y transmitida a la descendencia. «Ordenanza perpetua» comunica permanencia normativa sin diluir el carácter de mandato divino.
  doctrine_reference: Covenant theology / continuidad del signo pactal en la descendencia
- issue: Permanencia en la tierra
  english_pob_reading: they shall not be uprooted from the land
  chosen_spanish_reading: y no serán arrancados de la tierra
  alternative_spanish_readings:
  - y no serán desarraigados de la tierra
  - y no serán expulsados de la tierra
  rationale: Se mantiene la metáfora fuerte de ser arrancados, que puede leerse como pérdida de arraigo y también como expulsión del territorio. No se suaviza a un término puramente político para preservar la tensión imagética del texto.
  doctrine_reference: Land promise / permanencia en la tierra
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: omite cualquier equivalente de «now» y usa «el pacto» sin el demostrativo «este», en coherencia con la corrección auditada. No se añaden glosas no presentes en la fuente.'
  spanish_consistency_notes:
  - Se mantiene «pacto» en vez de «alianza» para conservar la terminología bíblica técnica del registro POB.
  - Se usa «señal» y no «signo» como opción principal por ser más idiomático en este contexto religioso, aunque ambas son posibles.
  - Se conserva la imagen concreta de «arrancados de la tierra» para respetar la metáfora del original y del texto inglés auditado.
  - El estilo es formal y publicable, con sintaxis natural en español contemporáneo de registro bíblico.
