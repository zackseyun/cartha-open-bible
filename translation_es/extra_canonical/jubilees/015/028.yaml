review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido de la fuente ge''ez y del audit trail inglés: mandato directo, preservación de la señal del pacto a través de las generaciones, carácter permanente de la ordenanza y promesa de no ser arrancados de la tierra. Sin embargo, hay dos puntos mejorables para mayor fidelidad formal: «por sus generaciones» suena menos natural y menos idiomático que «por todas sus generaciones», y «como ordenanza perpetua» introduce un matiz comparativo no presente en la fuente, donde la frase funciona más bien como aposición o calificación directa.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para sonar más bíblico-natural y preciso. «Por todas sus generaciones» fluye mejor en español e intensifica correctamente la continuidad intergeneracional. Quitar «como» mejora la sintaxis y evita una leve imprecisión semántica.
  glossary_alignment: 'La terminología principal está bien alineada: «hijos de Israel», «señal del pacto», «ordenanza perpetua», «tierra». No hay conflictos con los glosarios de proyecto. «Pacto» es adecuado para covenant. «Arrancados de la tierra» preserva bien la imagen de desarraigo/expulsión.'
  issues:
  - severity: medium
    issue: «como ordenanza perpetua» añade un matiz comparativo no presente en la fuente
    rationale: La fuente y el inglés presentan «an everlasting ordinance» como calificación directa del mandato, no como comparación. En español, «como» puede sonar a ‘a manera de’ en vez de ‘como siendo’. Mejor «por ordenanza perpetua» o simplemente una aposición sin «como».
  - severity: low
    issue: «por sus generaciones» es menos natural que «por todas sus generaciones»
    rationale: Aunque comprensible, la fórmula bíblica española más idiomática para duración generacional continua es «por todas sus generaciones», que además refleja mejor el valor distributivo/durativo del original y del inglés «throughout their generations».
  revised_spanish_text: Y tú, manda a los hijos de Israel, y que guarden la señal del pacto por todas sus generaciones, por ordenanza perpetua, y no serán arrancados de la tierra.
  revision_rationale: 'Se ajusta la redacción para mayor naturalidad bíblica en español y mayor precisión semántica respecto de la fuente: «por todas sus generaciones» refleja mejor la continuidad intergeneracional, y «por ordenanza perpetua» evita el matiz comparativo de «como». El resto del texto ya preservaba fielmente el sentido y la terminología.'
