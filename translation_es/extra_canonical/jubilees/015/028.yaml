revisions:
- from: Y tú, manda a los hijos de Israel, y que guarden la señal del pacto por sus generaciones, como ordenanza perpetua, y no serán arrancados de la tierra.
  to: Y tú, manda a los hijos de Israel, y que guarden la señal del pacto por todas sus generaciones, por ordenanza perpetua, y no serán arrancados de la tierra.
  rationale: 'Se ajusta la redacción para mayor naturalidad bíblica en español y mayor precisión semántica respecto de la fuente: «por todas sus generaciones» refleja mejor la continuidad intergeneracional, y «por ordenanza perpetua» evita el matiz comparativo de «como». El resto del texto ya preservaba fielmente el sentido y la terminología.'
