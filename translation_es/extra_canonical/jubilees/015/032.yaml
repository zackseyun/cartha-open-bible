base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/015/032.yaml
  text: But over Israel he did not hand over or entrust any angel or spirit, for he alone is their ruler, and he will guard them and require them from the hand of his angels and from the hand of his spirits and from the hand of all his authorities, so that he may guard them and bless them, and that they may be his and he may be theirs from now and forever.
  footnotes:
  - marker: a
    text: Or 'he did not appoint'.
    reason: previous_rendering
  - marker: b
    text: Or 'seek them from the hand of'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:08Z'
    unchanged: false
    changes_summary: Revised 'keep' to 'guard' for better consistency with the repeated verb, changed 'require them' to 'seek them' as a more literal rendering, and replaced 'powers' with 'authorities' to better reflect the source term while preserving formal register.
translation:
  language: es
  text: Pero a Israel no lo entregó ni lo encomendó[a] a ningún ángel ni espíritu, porque solo él es su gobernante, y los guardará y los reclamará[b] de la mano de sus ángeles y de la mano de sus espíritus y de la mano de todas sus autoridades, para que los guarde y los bendiga, y para que sean suyos y él sea de ellos desde ahora y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no lo puso a cargo de ningún ángel ni espíritu'.
    reason: alternative_reading
  - marker: b
    text: O 'los requerirá de la mano de'.
    reason: alternative_reading
lexical_decisions:
- source_word: ኢያሰለመ፡ ወአመነሂ፡
  english_pob_choice: he did not hand over or entrust
  chosen_spanish: no entregó ni encomendó
  alternatives_spanish:
  - no entregó ni confió
  - no puso ni encomendó
  lexicon: entregar; encomendar
  rationale: 'El ge''ez expresa dos verbos distintos, y la revisión inglesa subraya esa doble matización: ''hand over'' y ''entrust''. En español, ''no entregó ni encomendó'' conserva ambos matices sin reducirlos a un solo verbo.'
- source_word: መልአከ፡
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: ángel
  rationale: La referencia es a seres celestiales en contraste con Israel; 'ángel' mantiene la lectura estándar y la oposición con 'espíritu'.
- source_word: መንፈሰ፡
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - aliento
  lexicon: espíritu
  rationale: Aquí el texto contrapone ángel/espíritu como agentes celestiales. 'Espíritu' conserva la ambigüedad controlada del original sin especificar indebidamente al Espíritu Santo.
- source_word: መኰንኖሙ፡
  english_pob_choice: their ruler
  chosen_spanish: su gobernante
  alternatives_spanish:
  - su gobernante y señor
  - su soberano
  lexicon: gobernante
  rationale: '''Gobernante'' transmite la idea de autoridad rectora de manera neutral y pública. Evita cargar el pasaje con terminología más eclesiástica o monárquica que no exige el texto.'
- source_word: የዐቅቦሙ፡
  english_pob_choice: he will guard them
  chosen_spanish: los guardará
  alternatives_spanish:
  - los custodiará
  - los protegerá
  lexicon: guardar
  rationale: Se mantiene el verbo repetido en la POB inglesa, donde 'guard' se repite para cohesión. 'Guardar' es el equivalente español más directo y bíblico, sin perder el sentido de protección vigilante.
- source_word: ይትኀሠሦሙ፡
  english_pob_choice: seek them / require them from the hand of
  chosen_spanish: los reclamará
  alternatives_spanish:
  - los requerirá
  - los pedirá cuentas de
  lexicon: reclamar
  rationale: La revisión del inglés reconoce el sentido idiomático de exigir rendición de cuentas o reclamarlos de la mano de sus agentes. 'Reclamará' expresa bien esa idea en español sin sonar arcaico como 'requerirá'.
- source_word: እምእዴ፡
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - de manos de
  lexicon: mano
  rationale: La expresión semítica se conserva literalmente porque forma parte del idioma bíblico del pasaje y mantiene la imagen de agencia y rendición de cuentas.
- source_word: ትእዛዝያኒሁ
  english_pob_choice: all his authorities
  chosen_spanish: todas sus autoridades
  alternatives_spanish:
  - todos sus poderes
  - toda su autoridad
  lexicon: autoridad
  rationale: La revisión inglesa sustituyó 'powers' por 'authorities'. 'Autoridades' preserva la lectura formal y el plural del original, evitando una abstracción excesiva.
theological_decisions:
- issue: Relación exclusiva de Yahvé con Israel frente a intermediarios celestiales
  english_pob_reading: But over Israel he did not hand over or entrust any angel or spirit, for he alone is their ruler
  chosen_spanish_reading: Pero sobre Israel no entregó ni encomendó ningún ángel ni espíritu, porque solo él es su gobernante
  alternative_spanish_readings:
  - Pero sobre Israel no puso a cargo ningún ángel ni espíritu
  - Pero sobre Israel no confió ningún ángel ni espíritu
  rationale: 'El pasaje contrasta Israel con otras naciones a quienes se asignan poderes celestiales. La redacción española mantiene esa tensión sin borrarla: no se dice que no existan ángeles o espíritus, sino que no fueron puestos sobre Israel.'
  doctrine_reference: Jubilees 15:32; preservación del monoteísmo con administración angelical subordinada
- issue: Lenguaje de rendición de cuentas en 'from the hand of'
  english_pob_reading: and he will seek them from the hand of his angels and from the hand of his spirits
  chosen_spanish_reading: y los reclamará de la mano de sus ángeles y de la mano de sus espíritus
  alternative_spanish_readings:
  - y los requerirá de la mano de sus ángeles
  - y los pedirá de la mano de sus ángeles
  rationale: La frase semítica no es mera localización física; implica exigir cuentas o recuperar. 'Reclamar' conserva esa fuerza sin sobrecargar el texto con una perífrasis explicativa.
  doctrine_reference: Lenguaje bíblico de accountability; comparación con idioms semíticos de posesión y responsabilidad
- issue: Permanencia de pertenencia mutua
  english_pob_reading: that they may be his and he may be theirs from now and forever
  chosen_spanish_reading: para que sean suyos y él sea de ellos desde ahora y para siempre
  alternative_spanish_readings:
  - para que le pertenezcan y él les pertenezca
  - para que sean de él y él de ellos
  rationale: 'La formulación conserva la reciprocidad fuerte del texto: pertenencia mutua y duradera. ''Desde ahora y para siempre'' refleja el cierre temporal amplio del original sin introducir una fórmula doctrinal ajena.'
  doctrine_reference: Jubilees 15:32; fórmula de pertenencia pactal y permanencia
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del inglés: mantener la repetición de ''guard'' con ''guardará'', reflejar la doble verbalidad inicial con ''entregó ni encomendó'', y conservar ''authorities'' como ''autoridades''. También se evitó la lectura anterior de ''appoint'' porque el audio del ge''ez distingue entrega/encomienda, no solo designación.'
  spanish_consistency_notes:
  - Se usó 'ángel' y 'espíritu' en minúscula por referirse a tipos de seres, no al Espíritu Santo.
  - Se mantuvo 'mano de' como calco semítico auditable porque la imagen es parte del argumento del pasaje.
  - Se prefirió 'gobernante' y 'autoridades' para sostener un registro formal y evitar eclesiasticismos no exigidos por el texto.
  - La pertenencia mutua final se tradujo de forma simétrica para conservar el paralelismo del original.
