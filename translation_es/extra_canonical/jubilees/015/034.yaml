base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/015/034.yaml
  text: And there will be great wrath from the Lord against the children of Israel, because they have forsaken his covenant and turned aside from his word and provoked and blasphemed, in that they do not perform the ordinance of this law; for they have made themselves like the nations, for uprooting and destruction from the earth. And there will no longer be for them pardon or forgiveness, that they should be forgiven and pardoned for all the sin of this eternal error.
  footnotes:
  - marker: a
    text: Or 'for all this eternal error.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:09Z'
    unchanged: false
    changes_summary: Changed 'removal' to 'uprooting' for a more precise and forceful rendering of the judgment from the earth; made a minor stylistic adjustment from 'so that' to 'that' for smoother formal English. Otherwise retained the draft.
translation:
  language: es
  text: Y habrá gran ira de parte de Yahvé contra los hijos de Israel, porque han abandonado su pacto y se han apartado de su palabra, y han provocado y blasfemado, al no cumplir la ordenanza de esta ley; porque se han hecho semejantes a las naciones, para desarraigo y destrucción de la tierra[a]. Y ya no habrá para ellos perdón ni remisión, para que sean perdonados y remitidos de todo el pecado de este error eterno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ser arrancados y destruidos de la tierra».
    reason: lexical_alternative
  - marker: b
    text: El ge'ez incluye explícitamente «pecado» en esta frase; por eso no se reduce a «error» solamente.
    reason: source_note
lexical_decisions:
- source_word: እግዚአብሔር / Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: YHWH
  rationale: El contexto de pacto y juicio corresponde al nombre divino; en el proyecto el nombre de Yahvé se usa explícitamente en vez de ocultarlo bajo «el Señor».
- source_word: ኪዳኖ / covenant
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - pacto del pacto
  lexicon: ברית / διαθήκη
  rationale: «Pacto» es claro y fiel en español contemporáneo y conserva el valor jurídico-relacional del término.
- source_word: ቃሉ / word
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su dicho
  - su mandato
  lexicon: דבר / λόγος
  rationale: «Palabra» mantiene el paralelo con la autoridad revelada de Dios sin forzar una paráfrasis.
- source_word: ሥርዐተ
  english_pob_choice: ordinance
  chosen_spanish: ordenanza
  alternatives_spanish:
  - estatuto
  - precepto
  lexicon: חק / νομοθεσία
  rationale: «Ordenanza» preserva el sentido normativo y formal del término legal de la ley.
- source_word: ከመ፡ ኢይገብሩ
  english_pob_choice: they do not perform
  chosen_spanish: al no cumplir
  alternatives_spanish:
  - porque no hacen
  - por no realizar
  lexicon: עשה / ποιέω
  rationale: En español, la negación causal funciona mejor con una construcción de infinitivo; «cumplir» expresa adecuadamente la observancia de una ordenanza.
- source_word: ነፍሳቲሆሙ
  english_pob_choice: themselves
  chosen_spanish: se han hecho
  alternatives_spanish:
  - se volvieron
  - se hicieron
  lexicon: נפש / ψυχή en sentido reflexivo
  rationale: La idea es que ellos mismos se conformaron a las naciones; «se han hecho» refleja esa autoformación sin añadir interpretación.
- source_word: አሕዛብ
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  lexicon: גוים / ἔθνη
  rationale: «Las naciones» mantiene el contraste bíblico tradicional con Israel y es la opción más precisa.
- source_word: ለስስሎ / ወለተሠርዎ
  english_pob_choice: for uprooting and destruction
  chosen_spanish: para desarraigo y destrucción
  alternatives_spanish:
  - para arrancamiento y destrucción
  - para extirpación y destrucción
  lexicon: rooting out / destruction
  rationale: «Desarraigo» comunica bien la violencia agraria/metafórica de arrancar de la tierra, y evita una perífrasis más pesada.
- source_word: ኅድገተ ወስርየተ
  english_pob_choice: pardon or forgiveness
  chosen_spanish: perdón ni absolución
  alternatives_spanish:
  - indulto ni perdón
  - remisión ni perdón
  lexicon: ἀφίημι / ἄφεσις
  rationale: Se conserva la dobletía del texto inglés con dos términos distintos; «absolución» ayuda a distinguir el segundo miembro sin sonar demasiado técnico.
- source_word: እምኵሉ ኃጢአት
  english_pob_choice: all the sin
  chosen_spanish: todo el pecado
  alternatives_spanish:
  - todo el pecado
  - todos los pecados
  lexicon: ἁμαρτία
  rationale: El ge'ez incluye explícitamente «pecado»; en español, el singular colectivo «todo el pecado» conserva la amplitud del origen mejor que pluralizarlo.
- source_word: ለስሕተት ዛቲ ዘለዓለም
  english_pob_choice: of this eternal error
  chosen_spanish: de este error eterno
  alternatives_spanish:
  - de este extravío eterno
  - de este engaño eterno
  lexicon: πλάνη / error
  rationale: «Error» sigue de cerca la lectura del inglés POB y mantiene la fuerza de extravío doctrinal; «eterno» conserva el alcance perdurable del adjetivo.
theological_decisions:
- issue: Nombre divino en un contexto de juicio del pacto
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El texto habla de ira del Dios del pacto contra Israel; por coherencia con la política del proyecto, el nombre divino se traduce explícitamente como Yahvé.
  doctrine_reference: Éxodo 3:15; Éxodo 34:6-7
- issue: 'Doble fórmula de castigo y exclusión: desarraigo/destrucción'
  english_pob_reading: for uprooting and destruction from the earth
  chosen_spanish_reading: para desarraigo y destrucción de la tierra
  alternative_spanish_readings:
  - para arrancamiento y destrucción de la tierra
  - para extirpación y destrucción de la tierra
  rationale: La versión española conserva la imagen judicial de ser arrancados de la tierra; «desarraigo» expresa la metáfora agrícola sin debilitarla.
  doctrine_reference: Deuteronomio 28; Jeremías 1:10
- issue: Negación de perdón absoluto y énfasis en la culpa
  english_pob_reading: no longer be for them pardon or forgiveness ... for all the sin of this eternal error
  chosen_spanish_reading: ya no habrá para ellos perdón ni absolución ... de todo el pecado de este error eterno
  alternative_spanish_readings:
  - ya no habrá para ellos perdón ni remisión ... de todo el pecado de este error eterno
  rationale: El ge'ez refuerza que no se trata solo de error, sino de pecado vinculado a ese error; la doble negación conserva la severidad del juicio sin eliminar la posibilidad semántica de dos términos de remisión.
  doctrine_reference: Hebreos 10:26-27; 1 Juan 1:9
translation_notes:
  revision_awareness: 'La revisión inglesa posterior corrigió la clausula final para incluir explícitamente ''sin'' antes de ''error eterno'' y consolidó ''uprooting''. La versión española refleja ambas precisiones: conserva la imagen de desarraigo y añade ''pecado'' en la cláusula final.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como traducción del nombre divino en vez de una máscara reverencial.
  - Se conserva la distinción entre 'perdón' y 'absolución' para reproducir la dobletía del original y del inglés POB.
  - Se traduce 'error' de manera deliberada, porque el texto fuente y la auditoría inglesa lo conservan como término teológico-moral, no como simple equivocación.
  - Se evita 'SEÑOR' y 'Cristo' porque no corresponden al contenido de este versículo.
