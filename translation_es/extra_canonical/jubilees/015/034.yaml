revisions:
- from: Y habrá gran ira de parte de Yahvé contra los hijos de Israel, porque han abandonado su pacto y se han apartado de su palabra, y han provocado y blasfemado, al no cumplir la ordenanza de esta ley; porque se han hecho semejantes a las naciones, para desarraigo y destrucción de la tierra. Y ya no habrá para ellos perdón ni absolución[a], para que sean perdonados y absueltos de todo el pecado de este error eterno[b].
  to: Y habrá gran ira de parte de Yahvé contra los hijos de Israel, porque han abandonado su pacto y se han apartado de su palabra, y han provocado y blasfemado, al no cumplir la ordenanza de esta ley; porque se han hecho semejantes a las naciones, para desarraigo y destrucción de la tierra[a]. Y ya no habrá para ellos perdón ni remisión, para que sean perdonados y remitidos de todo el pecado de este error eterno[b].
  rationale: Se corrigió la frase de juicio para preservar que el pueblo es quitado de la tierra, no que la tierra es destruida. También se sustituyó «absolución» por «remisión» para un español más natural y bíblicamente adecuado dentro del doblete de perdón.
