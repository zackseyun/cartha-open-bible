  yaml_path: translation/extra_canonical/jubilees/015/030.yaml
  text: For Ishmael and his sons and his brothers and Esau, the Lord did not bring near to himself, and he did not choose them, though they are the children of Abraham, because he knew them; and he chose Israel to be his people.
  footnotes:
  - marker: a
    text: Or 'Abraham; but he knew them, and he chose'.
    reason: previous_rendering
  revision_pass:
