    timestamp: '2026-04-23T14:50:08Z'
    unchanged: false
    changes_summary: Added a comma after 'Esau' for readability. The draft is otherwise accurate and complete.
translation:
  language: es
  text: Porque a Ismael, a sus hijos, a sus hermanos y a Esaú, Yahvé no los acercó a sí, y no los escogió, aunque eran hijos de Abraham, porque los conocía; y escogió a Israel para que fuera su pueblo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Yahvé / Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: default project terminology for יהוה
  rationale: El texto fuente presenta la referencia al Dios de Israel; conforme al estándar del proyecto, se nombra explícitamente como «Yahvé» en lugar de ocultarlo bajo «Señor».
- source_word: ἐγγίζω / brought near to himself
  english_pob_choice: did not bring near to himself
  chosen_spanish: no se acercó a sí mismo
  alternatives_spanish:
  - no los trajo cerca de sí
  - no los acercó a sí
  lexicon: sintaxis de cercanía relacional
  rationale: La imagen es relacional y no meramente espacial. «No se acercó a sí mismo» conserva la idea de no hacerlos objeto de una aproximación especial, aunque el español requiere una formulación algo libre para ser natural.
- source_word: ἐξελέξατο / chose
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: elección divina
  rationale: «Escogió» es claro, digno y frecuente en contexto bíblico; mantiene la acción deliberada de elección sin introducir matices técnicos ajenos.
- source_word: ἐγνώκει / knew
  english_pob_choice: he knew them
  chosen_spanish: los conocía
  alternatives_spanish:
  - los sabía
  - los había conocido
  lexicon: conocimiento relacional y causal
  rationale: El pasaje vincula el rechazo con el conocimiento previo de Dios; «los conocía» conserva el valor relacional y causal sin volverlo abstracto.
- source_word: λαός / people
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: pueblo de pacto
  rationale: «Pueblo» reproduce el sentido de pertenencia covenantal y la formulación bíblica natural en español.
theological_decisions:
- issue: Causalidad de 'because' respecto del conocimiento previo divino
  english_pob_reading: though they are the children of Abraham, because he knew them; and he chose Israel to be his people.
  chosen_spanish_reading: aunque son los hijos de Abraham, porque los conocía; y escogió a Israel para que fuera su pueblo.
  alternative_spanish_readings:
  - aunque son los hijos de Abraham; pero los conocía, y escogió
  - aunque son los hijos de Abraham, pues los conocía; y escogió
  rationale: 'La revisión inglesa corrige la relación causal: el rechazo se explica «because he knew them». «Porque» preserva esa causalidad y evita el contraste erróneo de «pero».'
  doctrine_reference: Providencia y conocimiento previo divino; causalidad textual en Jubileos 15:30
translation_notes:
  revision_awareness: La traducción sigue la lectura revisada del inglés POB que corrige la relación causal a 'because he knew them' y mantiene la coma tras Esaú por claridad. No se introduce nota al pie porque no hay marca textual anclada requerida por la forma final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se usa «escogió» con valor deliberado de elección divina, coherente con el inglés POB.
  - Se conserva «su pueblo» para la pertenencia pactual de Israel.
  - No se añade nota al pie, ya que la versión final no incluye variantes marcadas en el texto.
