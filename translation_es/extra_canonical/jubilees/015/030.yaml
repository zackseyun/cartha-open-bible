revisions:
- from: Porque a Ismael, a sus hijos, a sus hermanos y a Esaú, Yahvé no se acercó a sí mismo, y no los escogió, aunque son los hijos de Abraham, porque los conocía; y escogió a Israel para que fuera su pueblo.
  to: Porque a Ismael, a sus hijos, a sus hermanos y a Esaú, Yahvé no los acercó a sí, y no los escogió, aunque eran hijos de Abraham, porque los conocía; y escogió a Israel para que fuera su pueblo.
  rationale: Se corrige el verbo principal para reflejar fielmente el sentido transitivo/causativo de cercanía relacional («no los acercó a sí»), y se ajusta «son» a «eran» para una lectura más natural en español narrativo sin cambiar el sentido. No se requieren notas adicionales.
