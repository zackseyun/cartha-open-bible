review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura global y la causalidad corregida de «because he knew them», así como la elección de Israel como pueblo. Sin embargo, el giro principal «Yahvé no se acercó a sí mismo» invierte la relación sintáctica del original/inglés: no es que Dios se acercara o no a sí mismo, sino que no acercó a Ismael, sus descendientes, sus hermanos y a Esaú hacia sí. Esa diferencia afecta el sentido central de cercanía relacional/electiva.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «no se acercó a sí mismo» suena poco natural y semánticamente erróneo en español. «Aunque son los hijos de Abraham» es comprensible, pero «aunque eran hijos de Abraham» fluye mejor dentro de una narración pasada. El resto del versículo es legible y eclesialmente adecuado.
  glossary_alignment: '«Yahvé» sigue correctamente la terminología del proyecto. «Escogió», «los conocía» y «su pueblo» están bien alineados. La principal desalineación no es terminológica sino de régimen verbal: para «did not bring near to himself» conviene «no los acercó a sí» o equivalente, no un reflexivo sobre Yahvé.'
  issues:
  - severity: high
    issue: Traducción errónea de «did not bring near to himself» como «no se acercó a sí mismo»
    rationale: 'El sujeto divino en el original no realiza una acción reflexiva sobre sí mismo; el sentido es causativo/transitivo: no los trajo cerca de sí, no los acercó a sí. La versión actual altera el referente y produce una frase antinatural.'
  - severity: medium
    issue: Tiempo verbal menos natural en «aunque son los hijos de Abraham»
    rationale: En una narración pasada, «aunque eran hijos de Abraham» encaja mejor en español. El presente no destruye el sentido, pero suena menos natural en este contexto.
  revised_spanish_text: Porque a Ismael, a sus hijos, a sus hermanos y a Esaú, Yahvé no los acercó a sí, y no los escogió, aunque eran hijos de Abraham, porque los conocía; y escogió a Israel para que fuera su pueblo.
  revision_rationale: Se corrige el verbo principal para reflejar fielmente el sentido transitivo/causativo de cercanía relacional («no los acercó a sí»), y se ajusta «son» a «eran» para una lectura más natural en español narrativo sin cambiar el sentido. No se requieren notas adicionales.
