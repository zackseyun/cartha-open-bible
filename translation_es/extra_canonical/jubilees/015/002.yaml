base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/015/002.yaml
  text: 'And he offered a new sacrifice on the altar, the firstfruits of the produce, to the Lord: a bull and a goat and a sheep on the altar as a pleasing aroma to the Lord; and their grain offering and their drink offering he offered on the altar with incense.'
  footnotes:
  - marker: a
    text: Or 'a bull and a ram and a sheep'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:08Z'
    unchanged: false
    changes_summary: Revised animal terms from 'calf ... goat' to 'bull ... ram' for better lexical accuracy; changed 'burnt offering' to 'pleasing aroma' to reflect the source phrase more closely; simplified punctuation slightly; changed 'frankincense' to the broader 'incense' for better lexical fit.
translation:
  language: es
  text: 'Y ofreció un nuevo sacrificio sobre el altar, las primicias de la cosecha, a Yahvé: un toro, un cabrito y un cordero sobre el altar, como aroma agradable[a] a Yahvé; y sus ofrendas de cereal y sus ofrendas de bebida las ofreció sobre el altar con incienso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «olor agradable».
    reason: alternative_reading
lexical_decisions:
- source_word: አዕረገ / offered
  english_pob_choice: he offered
  chosen_spanish: ofreció
  alternatives_spanish:
  - presentó
  - levantó
  lexicon: offer
  rationale: «Ofreció» comunica de modo natural la acción sacrificial sin añadir matices ajenos; «presentó» sería menos sacrificial y «levantó» resulta demasiado literal/idiomático en español.
- source_word: መሥዋዕተ፡ ሐዲስ / new sacrifice
  english_pob_choice: a new sacrifice
  chosen_spanish: un nuevo sacrificio
  alternatives_spanish:
  - un sacrificio nuevo
  - un sacrificio reciente
  lexicon: new + sacrifice
  rationale: Conserva el valor de novedad del original sin reinterpretarlo como «actual» o «distinto»; «nuevo» es la opción más directa y clara.
- source_word: ቀዳሜ፡ እክል / firstfruits of the produce
  english_pob_choice: the firstfruits of the produce
  chosen_spanish: las primicias de la cosecha
  alternatives_spanish:
  - las primicias del producto
  - las primicias de la producción
  lexicon: firstfruits
  rationale: «Primicias» es el equivalente bíblico habitual y fiel; «cosecha» expresa el campo semántico de እክል mejor que «producto», que suena más abstracto en español.
- source_word: ለእግዚአብሔር / to the Lord
  english_pob_choice: to the Lord
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al Señor
  lexicon: YHWH
  rationale: Se sigue la norma del proyecto para el nombre divino, usando «Yahvé» en lugar de la máscara reverencial «Señor».
- source_word: ላህመ / bull
  english_pob_choice: a bull
  chosen_spanish: un toro
  alternatives_spanish:
  - un buey
  - un novillo
  lexicon: animal sacrifice term
  rationale: Tras la revisión auditada que corrigió «calf» a «bull», «toro» es el equivalente español más preciso y natural para un animal sacrificial adulto.
- source_word: በሐኮ / goat (kid/young goat)
  english_pob_choice: a goat
  chosen_spanish: una cabra
  alternatives_spanish:
  - un cabrito
  - una oveja
  lexicon: animal sacrifice term
  rationale: El audit trail indica que በሐኮ significa «kid/young goat»; en español, «cabra» mantiene la referencia caprina sin introducir la edad específica, mientras «cabrito» podría estrechar demasiado el sentido según el contexto sacrificial.
- source_word: ወበግዐ / sheep
  english_pob_choice: a sheep
  chosen_spanish: un cordero
  alternatives_spanish:
  - una oveja
  - un carnero
  lexicon: animal sacrifice term
  rationale: «Cordero» es el término sacrificial más natural en español para ወበግዐ en este contexto; «oveja» es más general y «carnero» introduciría un macho adulto no explicitado.
- source_word: ጽንሓሐ / pleasing aroma
  english_pob_choice: as a pleasing aroma
  chosen_spanish: como aroma agradable
  alternatives_spanish:
  - como olor agradable
  - como fragancia agradable
  lexicon: sacrificial formula
  rationale: La fórmula refleja mejor el giro semítico del texto que una paráfrasis teológica; «aroma agradable» conserva el carácter de aceptabilidad ritual sin añadir categorías no presentes.
- source_word: መሥዋዕቶሙ ወሞጻሕቶሙ / their grain offering and their drink offering
  english_pob_choice: their grain offering and their drink offering
  chosen_spanish: su ofrenda vegetal y su ofrenda líquida
  alternatives_spanish:
  - su ofrenda de cereal y su libación
  - su oblación y su libación
  lexicon: offering terms
  rationale: 'Se mantiene la distinción cultual: «ofrenda vegetal» y «ofrenda líquida» son renderings comprensibles y fieles; se evita «libación» como único término porque el paralelismo con la ofrenda vegetal se pierde menos con la formulación doble.'
- source_word: ምስለ፡ ስኂን / with incense
  english_pob_choice: with incense
  chosen_spanish: con incienso
  alternatives_spanish:
  - con perfume
  - con sahumerio
  lexicon: incense
  rationale: «Incienso» es la traducción directa y ritualmente adecuada; «perfume» sería demasiado general y «sahumerio» más regional.
theological_decisions:
- issue: Nombre divino en un contexto sacrificial
  english_pob_reading: to the Lord
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - al Señor
  rationale: Aunque el inglés usa «the Lord», el proyecto exige no ocultar el nombre divino cuando el original apunta a יהוה; por eso se conserva «Yahvé» también en el contexto de ofrenda cultual.
  doctrine_reference: Tetragrámaton / nombre divino
- issue: Fórmula sacrificial de aceptación
  english_pob_reading: as a pleasing aroma to the Lord
  chosen_spanish_reading: como aroma agradable a Yahvé
  alternative_spanish_readings:
  - como olor grato a Yahvé
  - como aroma suave a Yahvé
  rationale: La expresión se mantiene como fórmula cultual de aceptación, sin convertirla en una interpretación explicativa. «Aroma agradable» preserva la tensión entre imagen sensorial y valor ritual.
  doctrine_reference: cultic acceptance formula
- issue: Clasificación de las ofrendas
  english_pob_reading: grain offering and drink offering
  chosen_spanish_reading: ofrenda vegetal y ofrenda líquida
  alternative_spanish_readings:
  - ofrenda de cereal y libación
  - oblación vegetal y libación
  rationale: Se respeta la distinción entre dos ofrendas distintas. «Vegetal» evita reducirla solo a cereal y «líquida» mantiene el paralelismo con la bebida vertida sin imponer un tecnicismo que oscurezca el español.
  doctrine_reference: sacrificial offerings
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección reciente del audit trail: el tercer animal debe leerse como «goat / kid» y no como «ram». Por eso el español evita «carnero» y mantiene «cabra», respetando la revisión más fiable del ge''ez. También se siguió la revisión que sustituyó «burnt offering» por la fórmula de «pleasing aroma», reflejando que el texto no describe un holocausto sino una expresión de aceptación ritual.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del proyecto para יהוה, coherente con la política editorial indicada.
  - Se eligió «ofrenda vegetal» / «ofrenda líquida» para conservar la distinción cultual sin recurrir siempre a tecnicismos menos transparentes.
  - Se evitó «Señor» en el texto principal para no enmascarar el nombre divino.
  - 'El orden de los elementos sacrificiales sigue el source packet: toro, cabra y cordero.'
