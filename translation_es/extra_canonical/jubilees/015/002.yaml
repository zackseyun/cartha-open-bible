  - severity: low
    issue: La nota sobre 'aroma agradable' no es necesaria, pero no es incorrecta
    rationale: La alternativa 'olor agradable' es válida, aunque el texto principal ya es suficientemente claro. Puede conservarse como ayuda menor.
