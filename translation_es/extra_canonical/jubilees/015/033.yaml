translation:
  language: es
  text: Y ahora te hago saber que los hijos de Israel no guardarán esta ordenanza, y no circuncidarán a sus hijos conforme a toda la ley[b]; porque dejarán algo de la carne de su circuncisión en la circuncisión de sus hijos[a], y todos los hijos de Belial dejarán a sus hijos incircuncisos tal como nacieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «porque dejarán algo de la carne de su circuncisión, y todos los hijos de Belial». Lectura alternativa anterior que omite la frase «en la circuncisión de sus hijos» (ge''ez ውስተ፡ ክስበት፡ ውሉዶሙ); esta frase fue restituida en la revisión del 28-04-2026 a partir del texto ge''ez.'
    reason: alternative_reading
  - marker: b
    text: 'O bien: «toda esta ley». Lectura anterior corregida; el ge''ez ኵሉ፡ ሕግ carece de pronombre demostrativo, por lo que la adición de «esta» era un arrastre erróneo de «esta ordenanza» en la cláusula anterior.'
    reason: textual_variant
lexical_decisions:
- source_word: ሥርዐት (sər'at)
  english_pob_choice: ordinance
  chosen_spanish: ordenanza
  alternatives_spanish:
  - estatuto
  - rito
  - norma
  lexicon: 'Leslau, CDG 536: sər''at ''order, regulation, law, rite'''
  rationale: El ge'ez ሥርዐት abarca tanto el sentido de rito como de precepto institucional. 'Ordenanza' refleja el carácter de regulación pactual de la circuncisión en Jubileos —más técnico que 'norma' y menos arcaico que 'estatuto'— y se mantiene paralelo al inglés POB 'ordinance'.
- source_word: ኵሉ፡ ሕግ
  english_pob_choice: all the law
  chosen_spanish: toda la ley
  alternatives_spanish:
  - toda esta ley
  lexicon: 'Leslau, CDG 226: ḥəgg ''law, statute, rule'''
  rationale: La revisión del 2026-04-28 corrigió 'all this law' a 'all the law' porque el ge'ez ኵሉ፡ ሕግ no incluye pronombre demostrativo; la adición del demostrativo era un arrastre erróneo de 'esta ordenanza'. El español 'toda la ley' reproduce fielmente esa lectura. La forma anterior 'toda esta ley' se recoge en la nota [b].
- source_word: መተርፋነ (matärfanä)
  english_pob_choice: some of the flesh
  chosen_spanish: algo de la carne
  alternatives_spanish:
  - restos de la carne
  - parte de la carne
  lexicon: 'Leslau, CDG 569: taräfä ''to be left over, to remain''; matärfanä ''leavings, remainder'''
  rationale: El término ge'ez denota lo que sobra, lo que no se eliminó. El inglés POB lo vierte como 'some of the flesh'; el español 'algo de la carne' preserva esa indeterminación cuantitativa apropiada y evita la perífrasis más pesada 'restos de'. La frase completa 'algo de la carne de su circuncisión' refleja el sintagma ge'ez እምሥጋ፡ ክስበቶሙ፡ ይከውኑ፡ መተርፋነ.
- source_word: ዘእንበለ፡ ክስበት
  english_pob_choice: uncircumcised
  chosen_spanish: incircuncisos
  alternatives_spanish:
  - sin circuncidar
  lexicon: 'Leslau, CDG 290: kəsbät ''circumcision''; zäʾənbälä ''without'''
  rationale: '''Incircuncisos'' es el adjetivo técnico consolidado en el español bíblico e intertestamental (cf. Gn 17:14 RV, 1 Mac 1:15). Es más económico y preciso que la perífrasis ''sin circuncidar'' y mantiene la dignidad del tono. Se aplica a los hijos, complementando ''tal como nacieron''.'
- source_word: ቤልአር (Belʿar / Belial)
  english_pob_choice: Belial
  chosen_spanish: Belial
  lexicon: Nombre propio intertestamental; cf. hebreo בְּלִיַּעַל; 2 Co 6:15
  rationale: Transliteración estándar del nombre propio en la literatura intertestamental y en las traducciones bíblicas españolas (2 Co 6:15). No se traduce ni glosa en el texto principal; su significado teológico se recoge en las decisiones teológicas.
- source_word: አዜንወከ (ʾazänwäkä)
  english_pob_choice: I am telling you
  chosen_spanish: te informo
  alternatives_spanish:
  - te anuncio
  - te hago saber
  lexicon: 'Leslau, CDG 17: ʾazänwä ''to announce, to inform, to notify'''
  rationale: El verbo ge'ez tiene sentido de notificación formal o anuncio profético. 'Te informo' capta el tono directo e inmediato del presente ge'ez (con valor declarativo) sin los matices escatológicos de 'te anuncio'. El inglés POB usa 'I am telling you', en tiempo progresivo; el español presente simple 'te informo' es equivalente natural.
theological_decisions:
- issue: Hijos de Belial como denominación técnica del mal
  english_pob_reading: all the sons of Belial
  chosen_spanish_reading: todos los hijos de Belial
  alternative_spanish_readings:
  - todos los hombres impíos
  - todos los malvados
  - todos los hijos del maligno
  rationale: En Jubileos, ውሉደ፡ ቤልአር es un tecnicismo angelológico-pactual que designa a quienes se alinean con las fuerzas opuestas al pacto (cf. Jub 15:26). Traducir 'hijos de Belial' por una paráfrasis ('malvados', 'impíos') aplanaría la cosmología dualista del texto y borraría la tensión entre 'hijos de Israel' y 'hijos de Belial' que estructura el versículo. Se mantiene el nombre propio Belial, coherente con su presencia en la LXX y en el NT.
  doctrine_reference: Jubileos 15:26, 33; 1QS 1:18; 2:19; 2 Co 6:15
- issue: Incumplimiento de la circuncisión como apostasía pactual
  english_pob_reading: they will not circumcise their sons according to all the law
  chosen_spanish_reading: no circuncidarán a sus hijos conforme a toda la ley
  alternative_spanish_readings:
  - no cumplirán el rito de la circuncisión para sus hijos según toda la ley
  rationale: El pasaje afirma que el fallo ritual es al mismo tiempo un fallo legal (ሕግ) y pactual. La traducción española mantiene el paralelo entre 'ordenanza' (rito específico) y 'ley' (marco normativo completo), preservando la doble dimensión teológica —incumplimiento del rito e infracción de la Torá— presente en el ge'ez.
  doctrine_reference: Jubileos 15:25-34; Gn 17:9-14
translation_notes:
  revision_awareness: 'Dos revisiones documentadas al texto inglés POB han sido incorporadas directamente en la presente traducción española: (1) la revisión del 2026-04-28 (adjudicador auto_apply_tier2, categoría mistranslation) que restituye «en la circuncisión de sus hijos» (ውስተ፡ ክስበት፡ ውሉዶሙ), frase omitida en el borrador anterior, ahora reflejada en «en la circuncisión de sus hijos» con nota [a] sobre la lectura alternativa más corta; (2) la revisión del 2026-04-28 (adjudicador claude-opus-4-7, categoría lexical) que corrigió «all this law» a «all the law» porque el ge''ez ኵሉ፡ ሕግ no incluye demostrativo, ahora reflejada en «toda la ley» con nota [b] sobre la lectura anterior. El control de calidad más reciente (gpt-5.4, 2026-04-23) indicó que no se necesitaban cambios adicionales.'
  spanish_consistency_notes:
  - Se usa 'guardarán' para la observancia de ordenanzas y leyes, conforme al uso bíblico estándar en español (cf. 'guardar los mandamientos').
  - Se usa 'incircuncisos' (adjetivo técnico) en lugar de la perífrasis 'sin circuncidar', coherente con el vocabulario intertestamental y bíblico español.
  - El nombre propio 'Belial' se mantiene en su forma transliterada sin glosa en el texto principal, coherente con el uso en literatura intertestamental española y NT.
  - Se evita 'SEÑOR' como convención de enmascaramiento del nombre divino; en este versículo no aparece el tetragrammaton, por lo que la nota de proyecto sobre Yahvé no aplica aquí.
  - '''Carne'' (σάρξ / ሥጋ) se mantiene en su sentido literal físico, sin necesidad de glosa ni de ''naturaleza humana'', dado el contexto explícitamente corporal de la circuncisión.'
