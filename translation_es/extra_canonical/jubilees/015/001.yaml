translation:
  language: es
  text: En el quinto año de la cuarta semana de este jubileo, en el tercer mes, en la mitad del mes, Abram celebró la fiesta de las primicias de la cosecha de trigo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በዓመተ፡ ኃምስ፡ ዘሰብዐ፡ ዘ¹¹ራብዑ፡
  english_pob_choice: In the fifth year of the fourth week of this jubilee
  chosen_spanish: En el quinto año de la cuarta semana de este jubileo
  alternatives_spanish:
  - En el año quinto de la cuarta semana de este jubileo
  - Durante el quinto año de la cuarta semana de este jubileo
  lexicon: Jubilees chronological formula
  rationale: Conservo la fórmula cronológica tal como la presenta el texto fuente y la POB en inglés, sin suavizarla a una secuencia más interpretativa. «Semana» mantiene el cómputo jubilar técnico.
- source_word: በወርኀ፡ ሣልስ፡
  english_pob_choice: in the third month
  chosen_spanish: en el tercer mes
  alternatives_spanish:
  - durante el tercer mes
  lexicon: temporal expression
  rationale: La referencia calendárica es directa; «tercer mes» es la forma natural y fiel en español.
- source_word: በመንፈቀ፡ ወርኀ፡
  english_pob_choice: in the middle of the month
  chosen_spanish: en la mitad del mes
  alternatives_spanish:
  - a la mitad del mes
  - en medio del mes
  lexicon: temporal expression
  rationale: «Mitad del mes» reproduce con claridad el valor temporal sin añadir precisión no presente en el fuente.
- source_word: ገብረ፡ አብራም፡
  english_pob_choice: Abram celebrated
  chosen_spanish: Abram celebró
  alternatives_spanish:
  - Abram hizo la celebración de
  - Abram observó
  lexicon: festival language
  rationale: El verbo etíope indica la acción de celebrar/realizar la fiesta; «celebró» es fiel y idiomático en español.
- source_word: በዓለ፡ *ቀዳሜ፡ ማእረር፡
  english_pob_choice: the festival of the firstfruits
  chosen_spanish: la fiesta de las primicias
  alternatives_spanish:
  - la celebración de las primicias
  - la fiesta de los primeros frutos
  lexicon: festival terminology
  rationale: «Primicias» es el término bíblico español más preciso para el festival, conservando el sentido cultual del original.
- source_word: ዘዘርአ፡ ስርናይ፡
  english_pob_choice: of the wheat harvest
  chosen_spanish: de la cosecha de trigo
  alternatives_spanish:
  - de la siega de trigo
  - de la cosecha del trigo
  lexicon: agricultural term
  rationale: La revisión inglesa aclara que el término ge'ez se refiere específicamente a «wheat harvest», no a una cosecha genérica. «Cosecha de trigo» expresa ese detalle con naturalidad.
theological_decisions:
- issue: Naturaleza específica de la fiesta de las primicias
  english_pob_reading: festival of the firstfruits of the wheat harvest
  chosen_spanish_reading: fiesta de las primicias de la cosecha de trigo
  alternative_spanish_readings:
  - fiesta de las primicias de la siega de trigo
  - fiesta de las primicias del trigo
  rationale: Sigo la revisión auditada que precisa «wheat harvest». En español, «cosecha de trigo» comunica esa concreción sin perder el trasfondo bíblico de las primicias asociadas a una cosecha determinada.
  doctrine_reference: Exodo 34:22
- issue: Terminología jubilar para la estructura temporal
  english_pob_reading: fourth week of this jubilee
  chosen_spanish_reading: la cuarta semana de este jubileo
  alternative_spanish_readings:
  - la cuarta semana jubilar
  - la cuarta semana de este jubileo
  rationale: No se sustituye el lenguaje técnico del texto por una formulación más general. «Semana» se conserva porque pertenece al sistema cronológico propio de Jubileos.
  doctrine_reference: Jubileos 1–2; 15:1
translation_notes:
  revision_awareness: La revisión más reciente confirmó que no había cambios adicionales necesarios, y la adjudicación lexical corrigió específicamente la cosecha desde «grain harvest» a «wheat harvest». La traducción española incorpora esa precisión con «cosecha de trigo», manteniendo la fórmula cronológica del pasaje sin expansión interpretativa.
  spanish_consistency_notes:
  - «Abram» se conserva como nombre propio según el texto fuente.
  - Se usa «fiesta» para el festival cultual, coherente con el uso bíblico y con la POB inglesa.
  - No se introduce «SEÑOR» ni otras sustituciones porque el versículo no contiene el nombre divino.
  - «Primicias» y «cosecha de trigo» se combinan para preservar tanto el carácter ritual como la precisión agrícola del pasaje.
  - La puntuación sigue una sola oración coordinada, adecuada para un versículo narrativo breve.
