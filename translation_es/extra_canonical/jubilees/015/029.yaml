translation:
  language: es
  text: Pues el mandamiento ha sido establecido como pacto, para que lo guarden para siempre entre todos los hijos de Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ትእዛዝ
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  lexicon: mandamiento
  rationale: El ge'ez expresa una orden normativa; «mandamiento» conserva bien el valor de norma obligatoria y suena natural en español bíblico sin volverlo demasiado técnico.
- source_word: ተሠርዐ
  english_pob_choice: has been ordained
  chosen_spanish: ha sido establecido
  alternatives_spanish:
  - ha sido ordenado
  - ha sido decretado
  lexicon: establecer
  rationale: La forma pasiva transmite la idea de una disposición formal ya fijada. «Establecido» evita una calca dura de «ordenado» y mantiene la fuerza jurídica del pasaje.
- source_word: לְקִיָּן / covenant
  english_pob_choice: as a covenant
  chosen_spanish: como pacto
  alternatives_spanish:
  - como alianza
  - como convenio
  lexicon: pacto
  rationale: «Pacto» es la opción más directa y bíblica en español para el valor de covenant, manteniendo el sentido relacional y jurídico del término.
- source_word: יִתְעַבְּדוּהוּ / keep it
  english_pob_choice: they should keep it
  chosen_spanish: lo guardaran
  alternatives_spanish:
  - lo obedecieran
  - lo observaran
  lexicon: guardar
  rationale: «Guardar» es el verbo bíblico natural para cumplir un mandamiento o pacto; conserva la idea de observancia fiel mejor que una paráfrasis más interpretativa.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: para siempre
  rationale: «Para siempre» comunica duración indefinida de forma clara y estándar en español contemporáneo.
- source_word: בְּכָל־בְּנֵי יִשְׂרָאֵל
  english_pob_choice: among all the children of Israel
  chosen_spanish: entre todos los hijos de Israel
  alternatives_spanish:
  - en medio de todos los hijos de Israel
  - para todos los hijos de Israel
  lexicon: entre
  rationale: «Entre» refleja bien la distribución comunitaria del precepto dentro del pueblo. «Hijos de Israel» se conserva como fórmula bíblica estable.
theological_decisions:
- issue: Relación entre mandamiento y pacto
  english_pob_reading: the command has been ordained as a covenant
  chosen_spanish_reading: el mandamiento ha sido establecido como pacto
  alternative_spanish_readings:
  - el mandamiento ha sido ordenado como pacto
  - el precepto ha sido establecido como alianza
  rationale: El texto vincula estrechamente la norma dada con la categoría de pacto; en español conviene conservar esa unión sin suavizarla en una simple instrucción moral. «Establecido como pacto» deja visible la tensión entre norma y alianza.
  doctrine_reference: Teología del pacto en la literatura de Jubileos; continuidad normativa para Israel.
- issue: Alcance comunitario de la observancia
  english_pob_reading: that they should keep it forever among all the children of Israel
  chosen_spanish_reading: para que lo guardaran para siempre entre todos los hijos de Israel
  alternative_spanish_readings:
  - para que lo observaran para siempre entre todos los hijos de Israel
  - para que lo guardaran por siempre en todo Israel
  rationale: La frase mantiene el alcance colectivo del mandato. «Entre todos los hijos de Israel» conserva el matiz distributivo del original sin convertirlo en una universalización ajena al texto.
  doctrine_reference: Identidad del pueblo del pacto y observancia comunitaria en Jubileos.
translation_notes:
  revision_awareness: La revisión reciente indicó acuerdo alto y ningún cambio necesario; por eso el borrador español sigue de cerca el sentido del texto fuente y la traducción inglesa auditada, sin añadir notas ni variantes textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva «pacto» en lugar de «alianza» para seguir la terminología bíblica más consistente con el valor de covenant en este contexto.
  - El registro es formal y claro, evitando arcaísmos innecesarios pero respetando el tono escritural.
