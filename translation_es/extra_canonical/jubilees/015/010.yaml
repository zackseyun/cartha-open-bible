translation:
  language: es
  text: Y te daré a ti y a tu descendencia después de ti la tierra donde has habitado como extranjero, la tierra de Canaán, en posesión perpetua, y seré su Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወእሁብ / I will give
  english_pob_choice: I will give
  chosen_spanish: te daré
  alternatives_spanish:
  - os daré
  - daré
  lexicon: dar
  rationale: El verbo expresa concesión/promesa divina de manera directa y natural en español. Se mantiene la primera persona futura con destinatario explícito en dativo ('te').
- source_word: ወለዘርእከ / and to your seed after you
  english_pob_choice: and to your seed after you
  chosen_spanish: y a tu descendencia después de ti
  alternatives_spanish:
  - y a tu simiente después de ti
  - y a tu linaje después de ti
  lexicon: descendencia
  rationale: '''Descendencia'' comunica bien el valor colectivo de la expresión semítica sin perder el sentido genealógico. ''Simiente'' sería más técnico pero menos transparente en español actual.'
- source_word: ምድረ፡ ኀበ፡ ፈለስከ / the land where you have resided as a foreigner
  english_pob_choice: the land where you have resided as a foreigner
  chosen_spanish: la tierra donde has habitado como extranjero
  alternatives_spanish:
  - la tierra donde has morado como forastero
  - la tierra en la que has sido extranjero
  lexicon: habitar como extranjero
  rationale: '''Habitado como extranjero'' conserva la idea de residencia en condición de forastero sin añadir interpretación. ''Forastero'' es posible, pero ''extranjero'' mantiene mejor la relación con la noción de estancia no propia del lugar.'
- source_word: ምድረ፡ ከናአን / the land of Canaan
  english_pob_choice: the land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - Canaán
  - la tierra cananea
  lexicon: Canaán
  rationale: Se conserva el topónimo bíblico tradicional con artículo, como en español bíblico claro y natural.
- source_word: ዘትኳን ለዓለም / for an everlasting possession
  english_pob_choice: for an everlasting possession
  chosen_spanish: en posesión perpetua
  alternatives_spanish:
  - por posesión eterna
  - como posesión para siempre
  lexicon: posesión perpetua
  rationale: '''Posesión perpetua'' reproduce la fuerza jurídica y durativa del original mejor que una simple paráfrasis temporal. ''Perpetua'' preserva la duración indefinida sin reducirla a un mero ''para siempre'' devocional.'
- source_word: ወእከውኖሙ አምላከ / and I will be their God
  english_pob_choice: and I will be their God
  chosen_spanish: y seré su Dios
  alternatives_spanish:
  - y yo seré su Dios
  - y seré el Dios de ellos
  lexicon: ser su Dios
  rationale: Se conserva la fórmula de pacto en español sobria y reconocible. 'Su Dios' refleja la relación posesiva-destinal del hebreo sin necesidad de explicitar 'el Dios de ellos'.
theological_decisions:
- issue: Promesa de pacto sobre la tierra
  english_pob_reading: And I will give to you and to your seed after you the land ... for an everlasting possession
  chosen_spanish_reading: Y te daré a ti y a tu descendencia después de ti la tierra ... en posesión perpetua
  alternative_spanish_readings:
  - '... como herencia perpetua'
  - '... para posesión eterna'
  rationale: La traducción conserva la promesa territorial y su duración indefinida sin suavizar el contenido de alianza. 'Posesión perpetua' deja abierta la fuerza jurídica del texto y evita convertirla en un mero ideal espiritual.
  doctrine_reference: Pacto abrahámico / promesa de la tierra
- issue: Relación divina de pertenencia
  english_pob_reading: and I will be their God
  chosen_spanish_reading: y seré su Dios
  alternative_spanish_readings:
  - y seré Dios para ellos
  - y yo seré su Dios
  rationale: Se preserva la fórmula clásica de pacto sin introducir un complemento que atenúe la relación directa. El plural 'su' remite naturalmente a la descendencia colectiva.
  doctrine_reference: 'Fórmula de alianza: Dios como Dios de su pueblo'
translation_notes:
  revision_awareness: 'La versión inglesa auditada permanece sin cambios en la revisión más reciente (''unchanged: true''), con acuerdo alto en el control cruzado; por eso el español sigue de cerca el sentido literal-auditado sin añadir notas de variante textuales.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el original lo requiere explícitamente; en este versículo el texto fuente no contiene el nombre divino, sino la fórmula de pacto 'seré su Dios'.
  - '''Descendencia'' se usa de forma coherente para el colectivo postergeneracional en contextos de promesa patriarcal.'
  - '''Tierra de Canaán'' conserva el topónimo bíblico estándar y la claridad pública del pasaje.'
