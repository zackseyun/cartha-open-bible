    changes_summary: Replaced 'be pleasing before me' with 'walk before me' for better lexical accuracy and naturalness; retained the formal rendering of the divine title and the closing imperative.
translation:
  language: es
  text: 'Y Yahvé se apareció a Abram y le dijo: «Yo soy Dios Todopoderoso; sé agradable ante mí, y sé intachable».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: divine name
  rationale: El texto ge'ez corresponde al nombre divino; en el proyecto POB el equivalente principal en español es «Yahvé», no un encubrimiento por «Señor». Mantiene la referencia al nombre propio con claridad auditable.
- source_word: አነ፡ አምላክ፡ ሰዳይ፡
  english_pob_choice: I am God Shaddai
  chosen_spanish: Yo soy Dios Todopoderoso
  alternatives_spanish:
  - Yo soy Dios Shaddai
  - Yo soy El Shaddai
  lexicon: divine title
  rationale: «ሰዳይ» reproduce el título conocido por la tradición bíblica como Shaddai. En español, «Todopoderoso» es la equivalencia más inteligible y estable, sin ocultar el sentido titular de la expresión. Se evita dejar el hebraísmo sin explicación en el texto principal.
- source_word: አሥምር፡
  english_pob_choice: be pleasing before me
  chosen_spanish: sé agradable
  alternatives_spanish:
  - haz lo que me agrada
  - vive de manera agradable
  lexicon: Ge'ez verb lexical sense
  rationale: 'La auditoría inglesa restituye «be pleasing before me» porque el verbo ge''ez expresa agradar, no «caminar». Por eso se traduce con un imperativo de valor resultativo/relacional en español: «sé agradable», que conserva la fuerza de «haz lo que me agrada» sin añadir un objeto implícito ausente en el ge''ez.'
- source_word: ቅድሜየ፡
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: prepositional phrase
  rationale: «Delante de mí» comunica con naturalidad la idea espacial/relacional de estar en la presencia de Dios. Mantiene la relación con la frase anterior sin introducir un matiz de intimidad o liturgia que el texto no exige.
- source_word: ፍጹመ።
  english_pob_choice: be blameless
  chosen_spanish: sé perfecto
  alternatives_spanish:
  - sé irreprensible
  - sé íntegro
  lexicon: moral completeness
  rationale: El ge'ez exige una idea de totalidad/completitud moral. «Sé perfecto» sigue el registro bíblico tradicional y es plenamente comprensible en español; como alternativa interpretativa, «sé íntegro» sería posible, pero atenúa la correspondencia con la formulación auditada.
theological_decisions:
- issue: Tratamiento del nombre divino en una cita antigua de revelación
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Soberano
  rationale: Aunque el inglés POB usa «the Lord», el proyecto español exige recuperar el nombre divino cuando el original lo sustenta. Aquí la aparición divina en ge'ez corresponde al nombre de Yahvé, y no hay base para reemplazarlo por una fórmula eclesial velada.
  doctrine_reference: Nombre divino / Tetragrámaton
- issue: Valor de አሥምር en Jubileos 15:3 frente a la armonización con Génesis hebreo
  english_pob_reading: be pleasing before me
  chosen_spanish_reading: sé agradable delante de mí
  alternative_spanish_readings:
  - camina delante de mí
  - anda delante de mí
  rationale: 'La revisión inglesa descartó «walk before me» por ser una armonización con el hebreo masorético, no con el ge''ez de Jubileos. En español se preserva la lectura teológica y lexical correcta: una exhortación a agradar a Dios, no a caminar delante de él.'
  doctrine_reference: Crítica textual / fidelidad al testimonio ge'ez
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión: una pasada reciente intentó cambiar «be pleasing before me» por «walk before me», pero la revisión posterior la corrigió como armonización indebida con Génesis hebreo. La traducción española sigue la lectura restaurada y no reproduce la corrección errónea.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como nombre divino coherente con el estándar español del proyecto.
  - «Dios Todopoderoso» traduce el título divino sin dejar el hebraísmo opaco en el texto principal.
  - «Sé agradable» refleja el valor de አሥምር y evita la armonización con «andar/caminar».
  - «Sé perfecto» mantiene el paralelismo moral final y el registro bíblico legible en español.
