  revision_rationale: 'Se hace una reparación menor de estilo y fidelidad idiomática en la cláusula final: ''de ir tras él'' preserva mejor el giro de seguimiento/lealtad del original que ''de seguir tras él'', que en español suena más rígido. Se mantiene una nota breve con una alternativa española posible.'
