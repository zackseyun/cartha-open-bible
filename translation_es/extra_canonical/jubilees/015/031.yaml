base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/015/031.yaml
  text: And he sanctified him and gathered him from all the children of men; for there are many nations and many peoples, and all are his, and over all he appointed spirits to lead them astray from following him.
  footnotes:
  - marker: a
    text: Or 'from after him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:08Z'
    unchanged: false
    changes_summary: Changed 'from following him' to 'from after him' for closer adherence to the source expression while preserving formal register. Retained the rest as accurate and natural.
translation:
  language: es
  text: Y lo santificó y lo reunió de entre todos los hijos de los hombres; porque hay muchas naciones y muchos pueblos, y todos le pertenecen, y sobre todos puso espíritus para desviarlos de ir[a] tras él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de seguirlo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ወቀደሶ፡
  english_pob_choice: he sanctified him
  chosen_spanish: lo santificó
  alternatives_spanish:
  - lo consagró
  - lo apartó para sí
  lexicon: santificar
  rationale: La raíz expresa apartar para un uso sagrado; en español bíblico ‘santificar’ comunica bien esa acción sin reducirla a mera purificación moral. ‘Consagró’ es posible, pero ‘santificó’ mantiene mejor la correspondencia léxica y el tono bíblico.
- source_word: ወአስተጋብኦ፡ እምኵሉ፡ ውሉደ፡ ሰብእ፡
  english_pob_choice: and gathered him from all the children of men
  chosen_spanish: lo reunió de entre todos los hijos de los hombres
  alternatives_spanish:
  - lo juntó de entre todos los hijos de los hombres
  - lo recogió de entre todos los hijos de los hombres
  lexicon: reunir / de entre
  rationale: ‘De entre’ expresa con naturalidad la separación desde un grupo humano más amplio, sin perder la fuerza del original. ‘Reunió’ sigue de cerca el valor de congregar/recoger del ge‘ez y conserva el registro formal.
- source_word: ብዙኅ፡ አሕዛብ፡ ወብዙኅ፡ ሕዝብ፡
  english_pob_choice: there are many nations and many peoples
  chosen_spanish: hay muchas naciones y muchos pueblos
  alternatives_spanish:
  - hay muchas naciones y muchas gentes
  - hay muchas naciones y muchos pueblos
  lexicon: naciones / pueblos
  rationale: ‘Naciones’ y ‘pueblos’ reproduce la doble pluralidad étnico-política del original. ‘Pueblos’ es más neutro que ‘gentes’ y encaja con el paralelismo.
- source_word: ወኵሎሙ፡ ሎቱ፡
  english_pob_choice: and all are his
  chosen_spanish: y todos le pertenecen
  alternatives_spanish:
  - y todos son suyos
  - y todos le son propios
  lexicon: pertenecer
  rationale: El ge‘ez afirma posesión/pertenencia universal; ‘le pertenecen’ comunica de forma clara esa relación sin sonar demasiado posesivo o abrupto en español moderno. ‘Son suyos’ es válido, pero algo menos explícito.
- source_word: ወዲበ፡ ኵሉ፡ አሰለመ፡ መናፍስተ፡
  english_pob_choice: and over all he appointed spirits
  chosen_spanish: y sobre todos puso espíritus
  alternatives_spanish:
  - y sobre todos nombró espíritus
  - y sobre todos estableció espíritus
  lexicon: poner / nombrar
  rationale: ‘Puso’ conserva el gesto de designación/colocación con simplicidad bíblica y corresponde al valor amplio de ‘appointed’. ‘Nombró’ explicita la idea de designación, pero puede sonar más administrativo que el original.
- source_word: ከመ፡ ያስሕትዎሙ፡ እምድኅሬሁ።
  english_pob_choice: to lead them astray from after him
  chosen_spanish: para desviarlos de seguir tras él
  alternatives_spanish:
  - para desviarlos de ir tras él
  - para hacerlos extraviarse de seguirlo
  lexicon: desviar / seguir tras
  rationale: El idiomático semítico ‘from after him’ se preserva en español con ‘de seguir tras él’, que mantiene el movimiento de ir detrás de alguien. ‘Desviarlos’ expresa la función de esos espíritus sin añadir teología ajena.
theological_decisions:
- issue: 'Relación de pertenencia universal: ''all are his'''
  english_pob_reading: all are his
  chosen_spanish_reading: todos le pertenecen
  alternative_spanish_readings:
  - todos son suyos
  - todos le son propios
  rationale: La frase puede leerse como propiedad soberana de Dios sobre todas las naciones. ‘Le pertenecen’ conserva la fuerza de dominio/posesión sin introducir matices patrimoniales demasiado domésticos.
  doctrine_reference: Soberanía divina sobre las naciones
- issue: 'Sentido del último sintagma: ''from after him'''
  english_pob_reading: from after him
  chosen_spanish_reading: de seguir tras él
  alternative_spanish_readings:
  - de ir tras él
  - de seguirlo
  rationale: Se mantiene el valor del giro semítico que expresa lealtad/seguimiento. ‘Tras él’ preserva la dirección relacional y evita neutralizar el idiomatismo en una simple idea de ‘seguir’ abstractamente.
  doctrine_reference: Fidelidad/seguimiento de Dios frente al extravío inducido
translation_notes:
  revision_awareness: 'La redacción española sigue el último estado del audit trail en su intención de mayor adherencia al giro semítico final, pero lo ajusta a un español natural: se conserva el sentido de ''after him'' mediante ''tras él'', y se integra con ''seguir'' para evitar calco incómodo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto solo cuando el texto lo requiera explícitamente; en este versículo el sujeto está referido pronominalmente y no aparece el nombre divino en la forma disponible.
  - Se conserva 'espíritus' en plural porque el original y el inglés POB hablan de seres/entidades múltiples sobre los que se ejerce asignación.
  - La construcción 'hijos de los hombres' se mantiene por fidelidad a la fórmula semítica, aunque en español actual suena elevada; no se simplifica a 'humanidad' para no perder la textura del original.
