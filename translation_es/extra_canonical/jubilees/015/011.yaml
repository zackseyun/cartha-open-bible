  - severity: low
    issue: Redacción poco natural en ‘será por señal’
    rationale: En español bíblico moderno suena más natural ‘será señal’ sin pérdida de sentido.
  - severity: low
    issue: ‘será cortada de su parentela’ suena algo forzado
    rationale: ‘Será excluida de su parentela’ o ‘será cortada de entre su parentela’ expresa mejor el tecnicismo de exclusión. Para conservar el matiz bíblico, ‘cortada de entre su parentela’ es preferible.
