revisions:
- from: 'Y dijo Yahvé a Abraham: «Y en cuanto a ti, guarda mi pacto, tú y tu descendencia después de ti. Y circuncidarás a todo varón entre ustedes, y circuncidaréis la carne de sus prepucios, y será por señal de un estatuto perpetuo entre mí y ustedes. Y al hijo de ocho días circuncidarás: todo varón entre ustedes, nacido en casa y comprado con oro[a] entre cualquiera de los hijos de extranjeros que no son de tu descendencia. El nacido en tu casa será sin falta circuncidado, y el que compraste con tu oro[b] será circuncidado; y mi pacto estará en vuestra carne como estatuto perpetuo. Pero el varón incircunciso, cuya carne del prepucio no sea circuncidada en el octavo día, esa persona será cortada de su parentela, porque ha quebrantado mi pacto». Y dijo Yahvé a Abraham: «En cuanto a Sarai tu mujer, ya no llamarás su nombre Sarai, porque Sara es su nombre. Y la bendeciré, y de ella te daré un hijo; y lo bendeciré, y vendrá a ser una nación, y de él saldrán reyes de naciones». Abraham cayó
    sobre su rostro y se alegró, y dijo en su corazón: «¿Acaso nacerá un hijo para uno de cien años? ¿Y Sara, que tiene noventa años, dará a luz?» Y Abraham dijo a Yahvé: «¡Si tan solo Ismael pudiera vivir delante de ti!» Y Dios dijo: «Sí; y Sara te dará a luz un hijo, y llamarás su nombre Isaac; y estableceré mi pacto con él, un pacto eterno, y con su descendencia después de él. Y en cuanto a Ismael también, te he oído. Mira, lo bendeciré, lo haré fecundo y lo multiplicaré en gran manera; él engendrará doce príncipes, y lo convertiré en una gran nación. Pero mi pacto lo estableceré con Isaac, a quien Sara te dará a luz por este tiempo el próximo año». Y terminó de hablar con él, y Yahvé subió de Abraham. Abraham hizo como Yahvé le había dicho; tomó a Ismael su hijo, y a todos los nacidos en su casa, y a todos los comprados con oro[c], a todo varón de su casa, y circuncidó la carne de sus prepucios. Y en aquel mismo día fue circuncidado Abraham, y todos los hombres de su casa, los nacidos
    en su casa, y todos los comprados con oro de entre los hijos de extranjeros fueron circuncidados con él. Este es un estatuto para todas las generaciones, para siempre: no hay demora de días, ni se omite siquiera un día de los ocho días, porque es un estatuto perpetuo, ordenado y escrito en las tablas del cielo. Y todo el que nace, cuya carne del prepucio no sea circuncidada en el octavo día, no pertenece a los hijos del pacto que Yahvé hizo con Abraham, porque pertenece a los hijos de destrucción; y no hay en él señal de que pertenece a Yahvé, sino que está para destrucción, y para ser destruido de la tierra, y para ser arrancado de la tierra, porque ha quebrantado el pacto de Yahvé nuestro Dios».[d]'
