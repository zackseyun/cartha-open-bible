    changes_summary: 'Corrected the Sarah clause for closer lexical accuracy and agreement with the source: changed ''her name shall no longer be called'' to ''you shall no longer call her name,'' and changed the blessing from masculine references (''I will bless him... he shall become a nation... from him'') to feminine references (''I will bless her... she shall become peoples... from her''), reflecting the Geez text.'
translation:
  language: es
  text: 'Y dijo Yahvé a Abraham: «Y en cuanto a ti, guarda mi pacto, tú y tu descendencia después de ti. Y circuncidarás a todo varón entre los tuyos, y circuncidaréis la carne de sus prepucios, y será señal de un estatuto perpetuo entre mí y ustedes. Y al hijo de ocho días circuncidarás: todo varón entre ustedes, nacido en casa y comprado con oro[a] entre cualquiera de los hijos de extranjeros que no son de tu descendencia. El nacido en tu casa será sin falta circuncidado, y el que compraste con tu oro[b] será circuncidado; y mi pacto estará en vuestra carne como estatuto perpetuo. Pero el varón incircunciso, cuya carne del prepucio no sea circuncidada en el octavo día, esa persona será cortada de entre su parentela, porque ha quebrantado mi pacto». Y dijo Yahvé a Abraham: «En cuanto a Sarai tu mujer, ya no llamarás su nombre Sarai, porque Sara es su nombre. Y la bendeciré, y de ella te daré un hijo; y lo bendeciré, y vendrá a ser una nación, y de él saldrán reyes de naciones». Abraham
    cayó sobre su rostro y se alegró, y dijo en su corazón: «¿Acaso nacerá un hijo para uno de cien años? ¿Y Sara, que tiene noventa años, dará a luz?» Y Abraham dijo a Yahvé: «¡Si tan solo Ismael pudiera vivir delante de ti!» Y Dios dijo: «Sí; y Sara te dará a luz un hijo, y llamarás su nombre Isaac; y estableceré mi pacto con él, un pacto eterno, y con su descendencia después de él. Y en cuanto a Ismael también, te he oído. Mira, lo bendeciré, lo haré fecundo y lo multiplicaré en gran manera; él engendrará doce príncipes, y lo convertiré en una gran nación. Pero mi pacto lo estableceré con Isaac, a quien Sara te dará a luz por este tiempo el próximo año». Y terminó de hablar con él, y Yahvé subió de Abraham. Abraham hizo como Yahvé le había dicho; tomó a Ismael su hijo, y a todos los nacidos en su casa, y a todos los comprados con oro[c], a todo varón de su casa, y circuncidó la carne de sus prepucios. Y en aquel mismo día fue circuncidado Abraham, y todos los hombres de su casa, los nacidos
    en su casa, y todos los comprados con oro de entre los hijos de extranjeros fueron circuncidados con él. Este es un estatuto para todas las generaciones, para siempre: no hay demora de días, ni se omite siquiera un día de los ocho días, porque es un estatuto perpetuo, ordenado y escrito en las tablas del cielo. Y todo el que nace, cuya carne del prepucio no sea circuncidada en el octavo día, no pertenece a los hijos del pacto que Yahvé hizo con Abraham, porque pertenece a los hijos de destrucción; y no hay en él señal de que pertenece a Yahvé, sino que está para destrucción, y para ser destruido de la tierra, y para ser arrancado de la tierra[d], porque ha quebrantado el pacto de Yahvé nuestro Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez usa ወርቅ, literalmente «oro»; también puede implicar «dinero» por extensión, pero no «plata».
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «comprado con tu dinero»; la palabra de base en ge'ez es la misma de «oro» en sentido amplio.
    reason: lexical_alternative
  - marker: c
    text: 'Ver la nota [a]: el original ge''ez dice «oro», no «plata».'
    reason: source_note
  - marker: d
    text: 'La última cláusula conserva la triple serie de juicio del ge''ez: destrucción, ser destruido y ser arrancado de la tierra.'
    reason: theological_note
lexical_decisions:
- source_word: እግዚአብሔር / divine name in the source context
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: Divine name rendering
  rationale: El texto ge'ez usa el nombre divino en contexto de pacto; el proyecto pide Yahvé como forma principal en español, no el masking tradicional con SEÑOR.
- source_word: ኪዳን / covenant
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - convenio
  lexicon: covenant
  rationale: '''Pacto'' conserva el peso bíblico-jurídico y la relación vinculante del término sin sonar litúrgico ni contractual en exceso.'
- source_word: ተገዝሩ / circumcise
  english_pob_choice: circumcise
  chosen_spanish: circuncidar
  alternatives_spanish:
  - hacer circuncidar
  - cortar
  lexicon: circumcise
  rationale: El verbo español normal y preciso es 'circuncidar'; se mantiene la acción literal exigida por el rito.
- source_word: ርእስ / head, male
  english_pob_choice: every male / every male among you
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo hombre
  - cada macho
  lexicon: male
  rationale: '''Varón'' es el equivalente bíblico más claro y solemne para el sexo masculino aquí, sin la rudeza de ''macho'' ni la ambigüedad de ''hombre''.'
- source_word: ቍልፈት / foreskin
  english_pob_choice: foreskin
  chosen_spanish: prepucio
  alternatives_spanish:
  - prepucios
  - piel del prepucio
  lexicon: foreskin
  rationale: '''Prepucio'' es el término anatómico preciso y natural en español; en la frase ''carne de sus prepucios'' conserva la estructura del original sin perder claridad.'
- source_word: ወርቅ
  english_pob_choice: gold [or 'money']
  chosen_spanish: oro
  alternatives_spanish:
  - dinero
  - plata
  lexicon: gold
  rationale: La revisión más reciente corrigió el error del inglés ('silver') y el ge'ez dice ወርቅ, que lexicalmente es 'oro' y, por extensión, 'dinero'; en español se conserva 'oro' con nota alternativa.
- source_word: ብእሲ / male person; man
  english_pob_choice: man / male
  chosen_spanish: varón
  alternatives_spanish:
  - hombre
  - macho
  lexicon: male person
  rationale: En esta sección el énfasis es de pertenencia ritual por sexo; 'varón' evita confundir con 'hombre' como humanidad genérica.
- source_word: ብቻይ / one ... from you? / who is born in the house
  english_pob_choice: one born in the house
  chosen_spanish: nacido en casa
  alternatives_spanish:
  - nacido en tu casa
  - nacido en la casa
  lexicon: house-born
  rationale: '''Nacido en casa'' es compacto y bíblicamente inteligible; la forma completa ''nacido en tu casa'' aparece cuando el contexto lo pide.'
- source_word: משכ / bought
  english_pob_choice: bought with your gold
  chosen_spanish: comprado con oro
  alternatives_spanish:
  - comprado con dinero
  - adquirido con oro
  lexicon: purchase
  rationale: Sigue el ge'ez y preserva la tensión lexical de 'oro' frente a la expectativa de 'plata' en otros textos bíblicos.
theological_decisions:
- issue: La mención del nombre divino en un texto de pacto.
  english_pob_reading: the Lord said to Abraham
  chosen_spanish_reading: Y dijo Yahvé a Abraham
  alternative_spanish_readings:
  - Y dijo el Señor a Abraham
  - Y dijo el Dios a Abraham
  rationale: El texto presenta al Dios del pacto hablando directamente; en este proyecto, el nombre divino no se oculta con una sustitución devocional.
  doctrine_reference: Nombre divino y teología del pacto
- issue: Pronombres de la promesa sobre el hijo de Sara.
  english_pob_reading: I will bless him, and he shall become a nation, and kings of nations shall come from him
  chosen_spanish_reading: lo bendeciré, y vendrá a ser una nación, y de él saldrán reyes de naciones
  alternative_spanish_readings:
  - la bendeciré... de ella saldrán
  - lo bendeciré... de él saldrán
  rationale: El ge'ez de Jubileos usa referentes masculinos para el hijo prometido; se conserva esa lectura y no se corrige hacia la forma femenina del Génesis masorético.
  doctrine_reference: Recepción textual de Jubileos / promesa del heredero
- issue: Destino del incircunciso.
  english_pob_reading: that person shall be cut off from his kin, because he has broken my covenant
  chosen_spanish_reading: esa persona será cortada de su parentela, porque ha quebrantado mi pacto
  alternative_spanish_readings:
  - será exterminada
  - será eliminada de su pueblo
  rationale: '''Cortada'' mantiene el hebraísmo técnico y deja abierta la gravedad jurídica del acto sin exagerar ni suavizar el castigo.'
  doctrine_reference: Lenguaje de exclusión de la alianza
