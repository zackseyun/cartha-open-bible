base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/015/011.yaml
  text: 'And the Lord said to Abraham, “And as for you, keep my covenant, you and your seed after you. And circumcise every male among you, and circumcise the flesh of your foreskins, and it shall be a sign of an everlasting ordinance between me and you. And a son of eight days you shall circumcise—every male among you, one born in the house and one bought with your gold [or ''money''] from any sons of foreigners who are not from your seed. The one born in your house must surely be circumcised, and the one whom you bought with your silver must be circumcised; and my covenant shall be in your flesh as an everlasting ordinance. But an uncircumcised male, one whose foreskin''s flesh is not circumcised on the eighth day, that person shall be cut off from his kin, because he has broken my covenant.” And the Lord said to Abraham, “As for Sarai your wife, you shall no longer call her name Sarai, for Sarah is her name. And I will bless her, and from her I will give you a son; and I will bless him,
    and he shall become a nation, and kings of nations shall come from him.” And Abraham fell on his face and rejoiced, and he said in his heart, “Shall a son be born to one a hundred years old? And shall Sarah, who is ninety years old, give birth?” And Abraham said to the Lord, “If only Ishmael might live before you!” And God said, “Yes, and Sarah shall bear you a son, and you shall call his name Isaac; and I will establish my covenant with him, an everlasting covenant, and with his seed after him. And concerning Ishmael also, I have heard you. Behold, I will bless him and make him fruitful and multiply him very greatly; he shall father twelve princes, and I will make him into a great nation. But my covenant I will establish with Isaac, whom Sarah shall bear to you at this time in the next year.” And he finished speaking with him, and the Lord went up from Abraham. And Abraham did as the Lord had said to him, and he took Ishmael his son and all those born in his house and those bought with
    silver, every male in his house, and circumcised the flesh of their foreskins. And on that very day Abraham was circumcised, and all the men of his house—those born in his house—and all those bought with silver from the sons of foreigners were circumcised with him. This is a statute for all the generations forever: there is no delaying of days, and no omission of even one day from eight days, for it is an everlasting ordinance, ordained and written on the heavenly tablets. And everyone who is born whose flesh of foreskin is not circumcised on the eighth day does not belong to the children of the covenant that the Lord made with Abraham, for he belongs to the children of destruction; and there is no sign on him that he belongs to the Lord, but he is for destruction, and for being destroyed from the earth, and for being rooted out from the earth, because he has broken the covenant of the Lord our God.'
  footnotes:
  - marker: a
    text: Or 'and I will bless her, and she shall become peoples, and kings of nations shall come from her.'.
    reason: previous_rendering
  - marker: b
    text: Or 'but he is for destruction and for being destroyed from the earth, because he has broken'.
    reason: previous_rendering
  - marker: c
    text: Or 'bought with your silver'.
    reason: previous_rendering
