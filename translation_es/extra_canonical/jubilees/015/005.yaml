  text: And Abram fell on his face, and God spoke with him and said, “Behold, my covenant is with you, and you shall become the father of many nations.”
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:50:08Z'
    unchanged: false
    changes_summary: Changed 'ordinance' to 'covenant' for better lexical accuracy for ሥርዓትየ in this context; retained the rest as accurate and natural.
translation:
  language: es
  text: 'Y Abrán cayó sobre su rostro, y Dios habló con él y le dijo: «Mira, mi pacto es contigo, y llegarás a ser padre de muchas naciones».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወድቀ፡ ... በገጹ፡
  english_pob_choice: fell on his face
  chosen_spanish: cayó sobre su rostro
  alternatives_spanish:
  - se postró con el rostro en tierra
  - se inclinó hasta el suelo
  lexicon: caer / rostro
  rationale: La imagen idiomática hebraica/semítica se conserva de manera fiel en español con 'cayó sobre su rostro', que mantiene el sentido de postración sin añadir una interpretación más libre.
- source_word: እግዚአብሔር፡
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: Dios
  rationale: El texto fuente ge'ez usa el término divino general; en español corresponde 'Dios'. No hay en este versículo una necesidad textual de sustituirlo por el nombre del pacto.
- source_word: ሥርዓትየ፡
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - covenio
  lexicon: pacto
  rationale: La revisión inglesa corrigió 'ordinance' a 'covenant', y el ge'ez aquí exige una relación pactal. En español, 'pacto' es la opción más natural y teológicamente precisa; 'alianza' es posible, pero 'pacto' preserva mejor el registro bíblico y la fuerza relacional del término.
- source_word: አበ፡ ለብዙኃን፡ አሕዛብ።
  english_pob_choice: the father of many nations
  chosen_spanish: padre de muchas naciones
  alternatives_spanish:
  - padre de numerosos pueblos
  - antepasado de muchas naciones
  lexicon: padre / naciones
  rationale: Se mantiene la estructura directa del original y de la traducción inglesa. 'Padre' conserva el valor de paternidad representativa o fundacional sin expandirlo más allá de lo que el texto dice.
theological_decisions:
- issue: Naturaleza del término ሥርዓት en este contexto
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - ordenanza
  - disposición
  rationale: La evidencia revisada del auditray indica que la lectura correcta aquí es relacional y pactal, no meramente normativa. En español, 'pacto' evita perder esa carga teológica y coincide con la corrección del inglés POB.
  doctrine_reference: Génesis 17:2 y el lenguaje bíblico del pacto abrahámico
- issue: Relación entre la postura corporal de Abram y su respuesta a la revelación
  english_pob_reading: fell on his face
  chosen_spanish_reading: cayó sobre su rostro
  alternative_spanish_readings:
  - se postró
  - se inclinó profundamente
  rationale: Se preserva la concreción corporal del relato. 'Cayó sobre su rostro' mantiene el eco semítico y no suaviza la reverencia descrita por el texto.
  doctrine_reference: Postración reverente ante la presencia divina en narrativas bíblicas
translation_notes:
  revision_awareness: La traducción inglesa auditada fue revisada de 'ordinance' a 'covenant' para ሥርዓት en este contexto, y la presente versión española sigue esa corrección con 'pacto'. No se observan otras variantes textuales relevantes en el paquete dado.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para እግዚአብሔር, conforme al valor genérico del texto fuente.
  - '''Pacto'' se usa de forma consistente para el contenido relacional del versículo, evitando ''ordenanza''.'
  - El registro es bíblico, claro y adecuado para lectura eclesial en español latinoamericano.
