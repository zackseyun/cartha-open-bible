- from: 'Y Abram cayó sobre su rostro, y Dios habló con él y le dijo: «Mira, mi pacto está contigo, y llegarás a ser padre de muchas naciones».'
  to: 'Y Abrán cayó sobre su rostro, y Dios habló con él y le dijo: «Mira, mi pacto es contigo, y llegarás a ser padre de muchas naciones».'
  rationale: Se ajusta el nombre propio a la forma española bíblica habitual ('Abrán') y se mejora la naturalidad de la fórmula pactal con 'mi pacto es contigo', sin cambiar el contenido semántico del original ni del inglés POB.
