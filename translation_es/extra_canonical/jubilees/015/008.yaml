translation:
  language: es
  text: Y te haré muy grande, y te haré naciones, y reyes saldrán de ti. Y estableceré mi pacto entre mí y ti, y entre tu descendencia después de ti, por todas sus generaciones, como ordenanza perpetua, para que yo sea Dios para ti y para tu descendencia después de ti.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአዐብየከ፡²⁸
  english_pob_choice: I will make you very great
  chosen_spanish: te haré muy grande
  alternatives_spanish:
  - te engrandeceré mucho
  - te haré sumamente grande
  lexicon: engrandecer / hacer grande
  rationale: El ge'ez expresa aumento de grandeza; el inglés POB conserva la idea intensiva. 'Te haré muy grande' es natural en español y mantiene el énfasis sin añadir matices no sustentados.
- source_word: ወእሁበከ፡ ውስተ፡ አሕዛብ፡
  english_pob_choice: I will make you into nations
  chosen_spanish: te haré naciones
  alternatives_spanish:
  - te convertiré en naciones
  - te haré llegar a ser naciones
  lexicon: hacer en/convertir en
  rationale: La construcción apunta a multiplicación o constitución en naciones. 'Te haré naciones' conserva la brevedad del original y la lectura del POB, con español fluido.
- source_word: ወነገሥት፡ ይወፅኡ፡ እምኔከ።
  english_pob_choice: and kings shall come out from you
  chosen_spanish: y reyes saldrán de ti
  alternatives_spanish:
  - y reyes procederán de ti
  - y de ti saldrán reyes
  lexicon: salir de / proceder de
  rationale: El verbo de origen espacial se vierte de forma directa. 'Saldrán de ti' reproduce bien la imagen genealógica sin forzar una formulación más interpretativa.
- source_word: ወ*እሁብ፡²⁹ ኪዳንየ፡
  english_pob_choice: And I will establish my covenant
  chosen_spanish: Y estableceré mi pacto
  alternatives_spanish:
  - Y afirmaré mi pacto
  - Y pondré mi pacto
  lexicon: establecer / pacto
  rationale: '''Kidan'' corresponde a ''pacto''. ''Estableceré'' sigue el valor de fijar/confirmar un pacto y coincide con el POB.'
- source_word: ማእከሌየ፡ ወማእከሌከ፡ ወማእከለ፡ ዘርእከ፡
  english_pob_choice: between me and you and between your seed after you
  chosen_spanish: entre yo y tú, y entre tu descendencia después de ti
  alternatives_spanish:
  - entre mí y ti, y entre tu descendencia después de ti
  - entre mí y tú, y entre tu semilla después de ti
  lexicon: between / seed
  rationale: '''Descendencia'' expresa de forma natural el sentido genealógico de ''seed'' y es idiomática en español bíblico sin convertirlo en una paráfrasis.'
- source_word: '*እምድኅሬከ፡'
  english_pob_choice: after you
  chosen_spanish: después de ti
  alternatives_spanish:
  - tras de ti
  - a continuación de ti
  lexicon: after / after you
  rationale: Se mantiene la secuencia temporal y genealógica de manera simple y fiel.
- source_word: በትዝምዶሙ፡³⁰ ለ³¹ሥርዓት፡ ዘለዓለም፡
  english_pob_choice: throughout their generations, as an everlasting ordinance
  chosen_spanish: por todas sus generaciones, como ordenanza perpetua
  alternatives_spanish:
  - por todas sus generaciones, como estatuto perpetuo
  - a lo largo de sus generaciones, como ordenanza para siempre
  lexicon: generations / ordinance / everlasting
  rationale: '''Ordenanza'' mantiene el tono legal-covenantal del texto. ''Perpetua'' reproduce el carácter duradero de ''everlasting'' con español claro y sobrio.'
- source_word: ከመ፡ *እኩንከ፡ አምላከ፡³²
  english_pob_choice: so that I may be God to you
  chosen_spanish: para que yo sea Dios para ti
  alternatives_spanish:
  - para ser Dios para ti
  - a fin de que yo sea tu Dios
  lexicon: be God to you
  rationale: La formulación conserva la relación de pacto sin introducir posesivos que el POB no requería. 'Ser Dios para ti' suena natural y fiel.
- source_word: ወለዘርእከ፡ እምድኅሬከ።³³
  english_pob_choice: and to your seed after you
  chosen_spanish: y para tu descendencia después de ti
  alternatives_spanish:
  - y para tu semilla después de ti
  - y para tu descendencia tras de ti
  lexicon: seed / after you
  rationale: Se mantiene la correspondencia con el miembro previo de la cláusula, usando 'descendencia' por su claridad y continuidad bíblica en español.
theological_decisions:
- issue: Continuidad del pacto con Abraham y su linaje
  english_pob_reading: my covenant between me and you and between your seed after you throughout their generations
  chosen_spanish_reading: mi pacto entre yo y tú, y entre tu descendencia después de ti, por todas sus generaciones
  alternative_spanish_readings:
  - mi pacto entre mí y tú, y entre tu descendencia después de ti, por todas sus generaciones
  - mi pacto entre yo y tú, y entre tu descendencia tras de ti, por todas sus generaciones
  rationale: El pasaje subraya que el pacto incluye a Abraham y a su descendencia futura. La redacción española debe conservar esa continuidad genealógica y pactal sin diluirla en una formulación más abstracta.
  doctrine_reference: Génesis 17:7; Jubileos 15:8
- issue: Dios como Dios del pacto
  english_pob_reading: so that I may be God to you and to your seed after you
  chosen_spanish_reading: para que yo sea Dios para ti y para tu descendencia después de ti
  alternative_spanish_readings:
  - para que yo sea tu Dios y el Dios de tu descendencia después de ti
  - para ser Dios para ti y para tu descendencia después de ti
  rationale: La cláusula final expresa pertenencia relacional y pacto. 'Dios para ti' mantiene el paralelismo del POB y evita imponer una glosa que cambie el ritmo del texto base.
  doctrine_reference: Génesis 17:7; Éxodo 6:7
translation_notes:
  revision_awareness: El pasaje coincide de forma muy alta con el English POB audit trail y no presenta variantes textuales o decisiones léxicas adicionales que requieran nota al pie. La redacción sigue de cerca el sentido del ge'ez y la equivalencia óptima aprobada en el inglés.
  spanish_consistency_notes:
  - Se usa 'pacto' para kidan de forma consistente con el registro bíblico-covenantal.
  - '''Descendencia'' se emplea en lugar de ''simiente'' por claridad en español contemporáneo, sin perder la referencia genealógica.'
  - '''Ordenanza perpetua'' preserva el tono legal y duradero del original.'
  - No se añade artículo posesivo en 'mi pacto' ni en 'Dios para ti' más allá de lo sustentado por el texto fuente y el POB inglés.
