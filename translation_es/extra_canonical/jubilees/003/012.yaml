translation:
  language: es
  text: Y serán en total ochenta días. Y cuando ella había cumplido estos ochenta días, la trajimos al jardín del Edén, porque es más santo que toda la tierra, y todo árbol plantado en él es santo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይከውና፡ ኵሎን፡ ሰማንያ፡' መዋዕለ
  english_pob_choice: And they shall be eighty days in all.
  chosen_spanish: Y serán en total ochenta días.
  alternatives_spanish:
  - Y serán ochenta días en total.
  - Serán ochenta días en conjunto.
  lexicon: total / en total
  rationale: El ge'ez expresa la suma completa de días; en español, 'en total' reproduce con naturalidad ese valor acumulativo sin añadir contenido ajeno.
- source_word: ወፈጺማ፡ እላንተ፡' ሰማንያ፡' መዋዕለ
  english_pob_choice: And when she had completed these eighty days
  chosen_spanish: Y cuando ella hubo cumplido estos ochenta días
  alternatives_spanish:
  - Y cuando ella había cumplido estos ochenta días
  - Y al completar estos ochenta días
  lexicon: completar / cumplir
  rationale: '''Hubo cumplido'' preserva el acabado previo en la secuencia narrativa; ''cumplir'' comunica de forma idiomática el cumplimiento de un plazo, más fiel al sentido temporal que una simple paráfrasis.'
- source_word: ውስተ፡ ገነት፡'' ኤዶም፡
  english_pob_choice: into the garden of Eden
  chosen_spanish: al jardín del Edén
  alternatives_spanish:
  - al huerto del Edén
  - al jardín de Edén
  lexicon: garden of Eden
  rationale: '''Jardín del Edén'' es la forma más clara y ampliamente inteligible en español; mantiene el referente tradicional sin forzar un calco rígido. ''Huerto'' sería posible, pero ''jardín'' conserva mejor la neutralidad lectora del texto fuente en este contexto.'
- source_word: ቅድስት፡ ይእቲ፡ እምኵሉ፡ ምድር፡
  english_pob_choice: for it is holier than all the earth
  chosen_spanish: porque es más santo que toda la tierra
  alternatives_spanish:
  - porque es santísimo en comparación con toda la tierra
  - porque es más santo que toda la tierra entera
  lexicon: holy / holier
  rationale: '''Más santo'' conserva el comparativo explícito del original. Se evita intensificar a superlativo, porque el texto no dice ''santísimo'' sino que compara grados de santidad.'
- source_word: ወኵሉ፡ ዕፀ፡ *ዘትከል፡
  english_pob_choice: and every tree that is planted in it is holy
  chosen_spanish: y todo árbol plantado en él es santo
  alternatives_spanish:
  - y todo árbol que se planta en él es santo
  - y cada árbol sembrado en él es santo
  lexicon: tree planted / holy
  rationale: '''Plantado'' reproduce el participio pasivo del ge''ez con naturalidad en español. ''Santo'' mantiene la misma carga lexical que ''holy'', sin sustituirla por un término menos preciso como ''sagrado''.'
theological_decisions:
- issue: La sacralidad del jardín del Edén y de los árboles plantados en él
  english_pob_reading: for it is holier than all the earth, and every tree that is planted in it is holy
  chosen_spanish_reading: porque es más santo que toda la tierra, y todo árbol plantado en él es santo
  alternative_spanish_readings:
  - porque es santísimo...
  - porque es sagrado...
  rationale: Se mantiene la afirmación de una santidad comparativa y participada, sin suavizarla a un lenguaje más general. 'Santo' conserva la densidad bíblica y evita diluir la distinción entre 'holy' y 'sacred' que el texto no hace aquí.
  doctrine_reference: Santidad del espacio consagrado; lenguaje de santidad bíblica en contraste con lo común.
translation_notes:
  revision_awareness: 'La fuente revisada corrige una omisión importante: debe incluirse la frase inicial ''And they shall be eighty days in all.''; además, el ajuste de tiempo narrativo en English POB favorece el pretérito pluscuamperfecto en español (''hubo cumplido'') para reflejar la secuencia completada antes del traslado al Edén.'
  spanish_consistency_notes:
  - Se usa 'Edén' con artículo en 'el jardín del Edén', forma natural en español para el topónimo tradicional.
  - Se traduce 'holy' de manera uniforme como 'santo' para mantener consistencia léxica y evitar una alternancia injustificada con 'sagrado'.
  - La frase inicial independiente ('Y serán en total ochenta días') se conserva para reflejar la corrección crítica del texto fuente.
