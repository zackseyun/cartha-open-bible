  yaml_path: translation/extra_canonical/jubilees/003/019.yaml
  text: God said to us, ‘Do not eat from it, and do not touch it, lest you die.’” And the serpent said to the woman, “You will not surely die, for God knows that on the day you eat from it, your eyes will be opened, and you will be like gods, and you will know good.”
  footnotes:
  - marker: a
    text: Or 'knowing good'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:41Z'
    unchanged: false
    changes_summary: 'Completed the verse by restoring the omitted clause after the serpent''s speech: ''for God knows that on the day you eat from it, your eyes will be opened, and you will be like gods, knowing good.'''
translation:
  language: es
  text: 'Dios nos dijo: «No coman de él, ni lo toquen, no sea que mueran». Y la serpiente le dijo a la mujer: «No morirán ciertamente, porque Dios sabe que el día que coman de él, se les abrirán los ojos y serán como dioses, y conocerán lo bueno[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «conocerán el bien».
    reason: alternative_reading
lexical_decisions:
- source_word: God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: θεός / אֱלֹהִים
  rationale: El contexto refiere a Dios como sujeto del mandato y del conocimiento; en español, «Dios» es la forma natural y fiel para este referente.
- source_word: do not eat from it
  english_pob_choice: Do not eat from it
  chosen_spanish: No coman de él
  alternatives_spanish:
  - No comáis de él
  - No lo coman
  lexicon: אָכַל / ἐσθίω
  rationale: «Comer de él» preserva el complemento con la idea de tomar alimento del árbol/objeto, con un registro natural en español.
- source_word: do not touch it
  english_pob_choice: do not touch it
  chosen_spanish: ni lo toquen
  alternatives_spanish:
  - ni lo toquéis
  - ni la toquen
  lexicon: נָגַע
  rationale: «Tocar» mantiene la prohibición concreta sin añadir interpretación.
- source_word: lest you die
  english_pob_choice: lest you die
  chosen_spanish: para que no mueran
  alternatives_spanish:
  - no sea que mueran
  - para que no mueran ustedes
  lexicon: מוּת
  rationale: Expresa la finalidad negativa de la advertencia de forma idiomática en español.
- source_word: You will not surely die
  english_pob_choice: You will not surely die
  chosen_spanish: No morirán ciertamente
  alternatives_spanish:
  - Ciertamente no morirán
  - De ningún modo morirán
  lexicon: מוּת
  rationale: Conserva el énfasis de la negación reforzada del hebreo/Ge'ez y del POB inglés sin sobrerreformular.
- source_word: your eyes will be opened
  english_pob_choice: your eyes will be opened
  chosen_spanish: se abrirán sus ojos
  alternatives_spanish:
  - se les abrirán los ojos
  lexicon: עין
  rationale: La pasiva refleja suena natural en español y mantiene la imagen bíblica de apertura perceptiva.
- source_word: you will be like gods
  english_pob_choice: you will be like gods
  chosen_spanish: serán como dioses
  alternatives_spanish:
  - serán como Dioses
  - serán como seres divinos
  lexicon: אֱלֹהִים
  rationale: El plural «dioses» conserva la forma recibida por el POB inglés y la ambigüedad lexical del plural, sin forzar una singularización que el texto no exige aquí.
- source_word: know good
  english_pob_choice: you will know good
  chosen_spanish: conocerán lo bueno
  alternatives_spanish:
  - sabrán lo bueno
  - conocerán el bien
  lexicon: ידע / γινώσκω
  rationale: «Conocerán lo bueno» conserva la expresión breve del original y evita imponer una abstracción filosófica mayor de la que exige el pasaje.
theological_decisions:
- issue: Plural de 'gods' en la comparación
  english_pob_reading: you will be like gods
  chosen_spanish_reading: serán como dioses
  alternative_spanish_readings:
  - serán como Dios
  - serán como seres divinos
  rationale: El testimonio recibido mantiene el plural; en español se conserva para no borrar la tensión lexical y la comparación del hablante, aun cuando el sentido teológico pueda variar entre lectura de seres divinos o plural intensivo.
  doctrine_reference: Semántica de אֱלֹהִים / elohim en contextos comparativos
- issue: Final del dicho del ser humano/serpiente respecto al conocimiento
  english_pob_reading: and you will know good
  chosen_spanish_reading: y conocerán lo bueno
  alternative_spanish_readings:
  - y conocerán el bien
  - y sabrán lo bueno
  rationale: Se mantiene el valor cognitivo concreto del verbo y la apertura del objeto directo, sin convertirlo en una paráfrasis moralista más amplia.
  doctrine_reference: Semántica de ידע / conocimiento en literatura sapiencial y narrativa
- issue: Advertencia de muerte
  english_pob_reading: lest you die / You will not surely die
  chosen_spanish_reading: para que no mueran / No morirán ciertamente
  alternative_spanish_readings:
  - no sea que mueran / ciertamente no morirán
  rationale: El doble contraste retórico entre la advertencia y la negación de la serpiente se conserva con una construcción natural en español.
  doctrine_reference: Retórica narrativa de advertencia y engaño
translation_notes:
  revision_awareness: La versión inglesa revisada restauró la cláusula omitida de la serpiente y corrigió el final de la frase a «and you will know good»; la redacción española la incorpora completa y con puntuación cerrada.
  spanish_consistency_notes:
  - Se usa «Dios» para el referente divino principal conforme al estándar POB en español.
  - Se conserva el plural «dioses» en la comparación para reflejar la lectura documentada sin armonización teológica previa.
  - La nota [a] está anclada en «lo bueno[a]» para evitar la validación de nota huérfana.
