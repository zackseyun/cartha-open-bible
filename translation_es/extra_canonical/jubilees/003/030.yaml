translation:
  language: es
  text: Por tanto, se mandó en las tablas celestiales acerca de todos los que conocen el juicio de la ley, que cubran su vergüenza y no se descubran como las naciones se descubren.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: “cover their shame” / “should cover their shame”
  english_pob_choice: they should cover their shame
  chosen_spanish: cubrieran su vergüenza
  alternatives_spanish:
  - cubrieran su desnudez
  - ocultaran su vergüenza
  lexicon: —
  rationale: En español, “cubrir la vergüenza” comunica la idea bíblica de modestia y de no exhibir la desnudez sin introducir una paráfrasis más amplia. “Desnudez” es una alternativa posible, pero “vergüenza” conserva mejor el paralelismo con el texto inglés y la formulación moral implícita.
- source_word: “uncover themselves” / “as the nations uncover themselves”
  english_pob_choice: should not uncover themselves as the nations uncover themselves
  chosen_spanish: no se descubrieran como se descubren las naciones
  alternatives_spanish:
  - no se desnudaran como se desnudan las naciones
  - no se mostraran como se muestran las naciones
  lexicon: —
  rationale: “Descubrirse” en español puede referirse tanto a quitarse cobertura como a quedar expuesto; mantiene el eco formal del inglés y evita forzar una explicitación anatómica que el texto no exige. La alternativa “desnudaran” sería más directa, pero también más interpretativa.
- source_word: “heavenly tablets”
  english_pob_choice: on the heavenly tablets
  chosen_spanish: en las tablas celestiales
  alternatives_spanish:
  - en las tablas del cielo
  - en las tablas celestiales
  lexicon: —
  rationale: Se conserva la expresión tradicional y casi literal “tablas celestiales”, que en el contexto de Jubileos funciona como registro divino de decreto. “Tablas del cielo” es comprensible, pero menos estable como término técnico.
- source_word: “the judgment of the law”
  english_pob_choice: the judgment of the law
  chosen_spanish: el juicio de la ley
  alternatives_spanish:
  - el veredicto de la ley
  - el criterio judicial de la ley
  lexicon: —
  rationale: “Juicio de la ley” reproduce la estructura sintáctica del original inglés y deja abierta la relación entre norma, discernimiento y sentencia. “Veredicto” estrecha demasiado el sentido judicial.
theological_decisions:
- issue: Normative force of the command on the heavenly tablets
  english_pob_reading: it was commanded on the heavenly tablets
  chosen_spanish_reading: se mandó en las tablas celestiales
  alternative_spanish_readings:
  - se ordenó en las tablas celestiales
  - fue mandado en las tablas celestiales
  rationale: La forma impersonal “se mandó” mantiene el carácter decretivo sin asignar un agente explícito distinto del texto. “Se ordenó” también sería posible, pero “mandó” refleja mejor el tono de mandato contenido en la fuente.
  doctrine_reference: Divine decree / heavenly ordinance
- issue: Moral distinction between covenant people and the nations
  english_pob_reading: all those who know the judgment of the law ... as the nations uncover themselves
  chosen_spanish_reading: todos los que conocen el juicio de la ley ... como se descubren las naciones
  alternative_spanish_readings:
  - todos los que conocen el juicio de la ley ... como se desnudan las naciones
  - todos los que conocen el veredicto de la ley ... como las naciones se descubren
  rationale: 'Se mantiene la distinción ética: quienes conocen la norma divina deben comportarse con recato distinto de las naciones. La traducción evita suavizar la contraposición moral o convertirla en mera diferencia cultural.'
  doctrine_reference: Holiness / separation from the nations
translation_notes:
  revision_awareness: The English POB record shows no footnotes or applied revisions, and the latest pass is unchanged with high-agreement review. The Spanish draft therefore preserves the straightforward POB reading without adding speculative variants or harmonizing moves.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo/greco lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene 'tablas celestiales' como término técnico consistente con Jubileos.
  - Se evita 'SEÑOR' o 'Cristo', que no corresponden al contenido del versículo.
  - Se conserva un registro formal y bíblico, pero con español natural y legible para uso eclesial.
