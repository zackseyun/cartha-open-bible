    issue: Construcción poco natural en 'como se descubren las naciones'
    rationale: Aunque comprensible, el orden y uso de 'descubrirse' aquí suenan rígidos en español. Una leve reordenación mejora la legibilidad sin apartarse del sentido fuente.
  - severity: low
    issue: Secuencia verbal mejorable
    rationale: Tras 'se mandó ... que', el subjuntivo presente ('cubran ... no se descubran') suena más natural y vigente para una orden general que el imperfecto subjuntivo narrativo ('cubrieran ... no se descubrieran').
  revised_spanish_text: Por tanto, se mandó en las tablas celestiales acerca de todos los que conocen el juicio de la ley, que cubran su vergüenza y no se descubran como las naciones se descubren.
  revision_rationale: 'Se hizo una reparación menor de estilo y fluidez: se ajustó la secuencia verbal al subjuntivo presente para expresar mejor una norma general, y se reordenó la cláusula comparativa final para que suene natural en español sin cambiar el sentido.'
