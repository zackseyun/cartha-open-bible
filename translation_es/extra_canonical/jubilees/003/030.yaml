review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del inglés auditado: un mandato registrado en las tablas celestiales para quienes conocen el juicio de la ley, con la exigencia de cubrir su vergüenza y no exponerse como las naciones. Sin embargo, en español ''como se descubren las naciones'' suena algo forzado e intransitivo; una formulación reflexiva con ''se muestran descubiertas'' o una repetición más natural de ''se descubren'' mejora la fidelidad comunicativa.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero tiene un punto de torpeza idiomática: ''como se descubren las naciones'' resulta menos natural en español bíblico contemporáneo que ''como las naciones se descubren'' o ''como las naciones se muestran descubiertas''. También conviene mantener la concordancia modal paralela con ''cubran ... no se descubran''.'
  glossary_alignment: No hay términos del glosario mayor comprometidos. 'Tablas celestiales', 'juicio de la ley' y 'vergüenza' son defendibles. La revisión propuesta no altera decisiones teológicas ni terminológicas del proyecto.
  issues:
