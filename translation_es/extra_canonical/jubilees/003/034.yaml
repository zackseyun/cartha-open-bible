translation:
  language: es
  text: Ahora labró la tierra, tal como se le había indicado en el jardín de Edén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: tilled the land
  english_pob_choice: tilled the land
  chosen_spanish: labró la tierra
  alternatives_spanish:
  - cultivó la tierra
  - trabajó la tierra
  lexicon: —
  rationale: El inglés POB expresa una acción agrícola concreta. «Labró» conserva la idea de trabajo del suelo con más precisión que el genérico «trabajó», y evita añadir matices no evidentes. «Cultivó» es posible, pero «labró» mantiene mejor la imagen de preparar o trabajar la tierra.
- source_word: as he had been instructed
  english_pob_choice: as he had been instructed
  chosen_spanish: como se le había instruido
  alternatives_spanish:
  - como se le había mandado
  - según se le había enseñado
  lexicon: —
  rationale: «Instruido» refleja bien la pasiva del inglés y conserva el sentido de orientación previa sin introducir una orden más fuerte que la del texto. «Mandado» sería más imperativo; «enseñado» desplaza el énfasis hacia la pedagogía más que hacia la instrucción recibida.
- source_word: in the garden of Eden
  english_pob_choice: in the garden of Eden
  chosen_spanish: en el jardín de Edén
  alternatives_spanish:
  - en el huerto de Edén
  lexicon: —
  rationale: Se mantiene el nombre tradicional «Edén». «Jardín» reproduce la imagen del inglés POB y funciona de manera natural en español. «Huerto» también es posible en algunas tradiciones bíblicas, pero aquí «jardín» sigue más de cerca el texto base.
theological_decisions:
- issue: La labor humana en Edén bajo instrucción previa
  english_pob_reading: Adam works the land in obedience to prior instruction.
  chosen_spanish_reading: Adán trabaja la tierra en obediencia a una instrucción previa.
  alternative_spanish_readings:
  - Adán cultiva la tierra según una orden previa.
  - Adán labra la tierra conforme a lo que se le enseñó.
  rationale: El versículo presenta continuidad entre la instrucción recibida y la acción realizada, sin añadir elaboración doctrinal. «Se le había instruido» preserva esa relación de obediencia y preparación.
  doctrine_reference: Génesis 2:15; 3:23
- issue: No introducir una lectura de castigo o mérito no explicitada
  english_pob_reading: A simple narrative description of action.
  chosen_spanish_reading: Una descripción narrativa simple de su trabajo.
  alternative_spanish_readings:
  - Una afirmación de disciplina impuesta.
  - Una escena de cumplimiento moral.
  rationale: El texto solo afirma que trabajó la tierra conforme a una instrucción previa; no desarrolla aquí un juicio moral adicional. La redacción española evita cargar el verso con implicaciones no expresadas.
  doctrine_reference: Principio de sobriedad textual
translation_notes:
  revision_awareness: 'La fuente ge''ez en el paquete no está disponible en el texto suministrado, y la revisión inglesa reciente indica ''unchanged: true'' con acuerdo alto; por eso la redacción española sigue de cerca el inglés POB auditado sin añadir notas textuales innecesarias.'
  spanish_consistency_notes:
  - Se conserva «Edén» como topónimo fijo.
  - Se usa un pretérito perifrástico («había sido instruido») para reflejar la anterioridad de la instrucción respecto de la acción.
  - No se introduce «SEÑOR» ni terminología litúrgica ajena, porque el versículo no contiene el Nombre divino explícito en el texto proporcionado.
