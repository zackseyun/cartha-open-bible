translation:
  language: es
  text: Y en la luna nueva del cuarto mes, Adán y su mujer salieron del huerto de Edén, y habitaron en la tierra de Elda, en la tierra de su creación.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre de lugar «Elda» es incierto en la transmisión etiópica; se conserva una transliteración convencional en lugar de forzar un significado.
    reason: textual_variant
lexical_decisions:
- source_word: new moon of the fourth month
  english_pob_choice: at the new moon of the fourth month
  chosen_spanish: en la luna nueva del cuarto mes
  alternatives_spanish:
  - en la novilunio del cuarto mes
  - al novilunio del cuarto mes
  lexicon: luna nueva
  rationale: La imagen temporal del inglés POB conserva el valor calendárico de la expresión; en español, «luna nueva» es natural y fiel. «Novilunio» sería más técnico y menos transparente para lectura eclesial.
- source_word: went out from the garden of Eden
  english_pob_choice: went out from the garden of Eden
  chosen_spanish: salieron del huerto de Edén
  alternatives_spanish:
  - salieron del jardín de Edén
  - salieron del huerto de Edén
  lexicon: huerto
  rationale: «Huerto» preserva mejor el matiz bíblico tradicional de un espacio cultivado y cercado, sin necesidad de modernizar a «jardín», que puede perder esa concreción.
- source_word: dwelt
  english_pob_choice: they dwelt
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - moraron
  lexicon: habitar
  rationale: «Habitaron» mantiene el sentido de residencia estable y es idiomático en español bíblico contemporáneo. «Moraron» sería más arcaizante.
- source_word: Elda
  english_pob_choice: Elda
  chosen_spanish: Elda
  alternatives_spanish:
  - Elda (transliteración conservada)
  lexicon: topónimo transliterado
  rationale: Se conserva la transliteración convencional porque el audit trail indica que el nombre de lugar es incierto en la transmisión etiópica y no se debe forzar un significado en español.
- source_word: the land of their creation
  english_pob_choice: in the land of their creation
  chosen_spanish: en la tierra de su creación
  alternatives_spanish:
  - en la tierra donde fueron creados
  - en la tierra de su creación
  lexicon: creación
  rationale: La estructura posesiva del inglés se reproduce con naturalidad en español. «Tierra de su creación» conserva la referencia al origen humano sin explicitar más de lo que el texto aporta.
theological_decisions:
- issue: Topónimo incierto en la transmisión
  english_pob_reading: The place name rendered 'Elda' is uncertain in the Ethiopic transmission; the translation preserves a conventional transliteration of the likely proper name rather than forcing a meaning.
  chosen_spanish_reading: Se conserva «Elda» como transliteración convencional y no se le asigna un significado.
  alternative_spanish_readings:
  - interpretarlo como un nombre con significado en español
  - sustituirlo por una forma castellanizada no atestiguada
  rationale: La prudencia textual exige no crear etimologías ni normalizaciones inexistentes en la fuente. La traducción debe reflejar la incertidumbre del testimonio, no resolverla artificialmente.
  doctrine_reference: Principio de crítica textual y fidelidad al testimonio manuscrito
translation_notes:
  revision_awareness: La revisión inglesa reciente solo retiró el marcador de versículo del cuerpo del texto para mejorar la puntuación; no alteró el contenido. La versión española sigue ese texto revisado, sin reproducir un marcador intratextual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto cuando aparezca el nombre divino, pero aquí no hay ningún término correspondiente.
  - Se usa «huerto» para Eden/Edén por coherencia bíblica y porque la escena describe salida del espacio cultivado.
  - La nota al pie marca la incertidumbre del topónimo sin añadir conjeturas interpretativas.
