translation:
  language: es
  text: hasta que aquellos días se cumplan para un varón y para una mujer. Esta es la ley y el testimonio escritos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እላንቱ፡ መዋዕል
  english_pob_choice: those days
  chosen_spanish: esos días
  alternatives_spanish:
  - aquellos días
  - tales días
  lexicon: demonstrative + time expression
  rationale: «Esos días» conserva la referencia temporal concreta del texto sin introducir matices no presentes; suena natural en español y sigue de cerca el valor del demostrativo.
- source_word: ለተባዕት፡
  english_pob_choice: for a male
  chosen_spanish: para un varón
  alternatives_spanish:
  - para un hombre
  - para el varón
  lexicon: male / masculine human referent
  rationale: «Varón» mantiene el valor de sexo biológico o masculino humano de forma más precisa que «hombre», que en español puede sonar más genérico o antropológico.
- source_word: ወለአንስት፡
  english_pob_choice: and for a female
  chosen_spanish: y para una mujer
  alternatives_spanish:
  - y para una hembra
  - y para una fémina
  lexicon: female / feminine human referent
  rationale: El contexto habla de seres humanos; «mujer» es el equivalente natural y digno en español para el contraste con «varón», sin perder el paralelismo del original.
- source_word: ዝንቱ፡ ሕግ፡
  english_pob_choice: This is the law
  chosen_spanish: Esta es la ley
  alternatives_spanish:
  - Este es el mandato
  - Esta es la instrucción
  lexicon: law
  rationale: «Ley» corresponde directamente a ሕግ y coincide con la formulación auditada del inglés POB; otras opciones suavizan demasiado el término técnico.
- source_word: ወስምዕ፡
  english_pob_choice: and testimony
  chosen_spanish: y el testimonio
  alternatives_spanish:
  - y el testimonio solemne
  - y el testimonio dado
  lexicon: testimony
  rationale: «Testimonio» refleja bien el valor jurídico y declarativo del término, manteniendo el emparejamiento tradicional con «ley» sin añadir explicaciones ajenas al texto.
- source_word: ዘተጽሕፈ፡
  english_pob_choice: that was written
  chosen_spanish: que fue escrito
  alternatives_spanish:
  - que estaba escrito
  - que se escribió
  lexicon: written
  rationale: La pasiva simple en español transmite con fidelidad la afirmación final del texto y preserva la forma breve del original.
theological_decisions:
- issue: Relación entre el texto ge'ez y la revisión inglesa sobre 'for a male and for a female'
  english_pob_reading: until those days are completed for a male and for a female
  chosen_spanish_reading: hasta que esos días se cumplan para un varón y para una mujer
  alternative_spanish_readings:
  - hasta que esos días se cumplan para un varón o para una mujer
  rationale: La revisión auditada corrigió la lectura a coordinación con «and», no disyunción. Por eso la traducción española usa «y» para no introducir una alternativa inexistente en el fuente.
  doctrine_reference: fidelidad textual; no doctrinal issue
- issue: Alcance de 'law and testimony'
  english_pob_reading: This is the law and testimony that was written
  chosen_spanish_reading: Esta es la ley y el testimonio que fue escrito
  alternative_spanish_readings:
  - Esta es la ley y el testimonio que estaba escrito
  - Esta es la ley y el testimonio que fue redactado
  rationale: Se conserva la formulación desnuda del original sin ampliar el referente a Israel ni a la observancia, material que fue explícitamente removido del texto auditado por no estar presente en la fuente.
  doctrine_reference: fidelidad textual; no doctrinal issue
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para eliminar material no presente en el ge'ez ('for Israel, that they should keep it all their days') y para corregir la relación coordinada como 'and for a female' en vez de 'or for a female'. La presente redacción española sigue esa lectura revisada y no añade elementos ausentes.
  spanish_consistency_notes:
  - Se mantiene 'ley' y 'testimonio' como términos técnicos coherentes entre sí.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - Se usa 'varón' / 'mujer' para conservar el contraste humano-sexual del original sin sobreinterpretación.
