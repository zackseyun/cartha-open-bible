translation:
  language: es
  text: 'Y a Adán también le dijo: «Porque escuchaste la voz de tu esposa y comiste del árbol del cual te mandé: “No comerás de él”, maldita será la tierra por causa de ti. Te producirá espinos y cardos, y comerás tu pan con el sudor de tu rostro hasta que vuelvas a la tierra de la cual fuiste tomado; porque eres tierra, y a la tierra volverás».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: listened to the voice of your wife
  english_pob_choice: listened to the voice of your wife
  chosen_spanish: escuchaste la voz de tu esposa
  alternatives_spanish:
  - oíste la voz de tu esposa
  - prestaste oído a la voz de tu esposa
  lexicon: escuchar
  rationale: «Escuchaste» reproduce bien la idea de prestar atención/obedecer implícita en el hebreo y en la tradición bíblica, sin volverla más fuerte que el texto. «Esposa» es natural en español y mantiene el referente relacional de forma clara y digna.
- source_word: cursed shall the ground be on your account
  english_pob_choice: cursed shall the ground be on your account
  chosen_spanish: maldita será la tierra por causa de ti
  alternatives_spanish:
  - maldita será la tierra a causa tuya
  - maldita estará la tierra por tu causa
  lexicon: אָרוּר / maldecir
  rationale: Se conserva la maldición como estado pronunciado sobre la tierra. «Por causa de ti» refleja la relación causal personal sin introducir una interpretación adicional.
- source_word: thorns and thistles
  english_pob_choice: thorns and thistles
  chosen_spanish: espinos y cardos
  alternatives_spanish:
  - espinas y cardos
  - zarzas y abrojos
  lexicon: קוץ / דרדר; espinos, cardos
  rationale: «Espinos y cardos» es una combinación bíblica clara y natural en español, suficientemente literal para el doblet poético del original. «Espinas» sería posible, pero «espinos» mantiene mejor la concreción vegetal.
- source_word: you shall eat your bread by the sweat of your face
  english_pob_choice: you shall eat your bread by the sweat of your face
  chosen_spanish: comerás tu pan con el sudor de tu rostro
  alternatives_spanish:
  - comerás tu pan con el sudor de tu cara
  - ganarás tu pan con el sudor de tu rostro
  lexicon: pan / sudor / rostro
  rationale: «Pan» conserva el sentido de sustento básico, no solo de alimento literal. «Con el sudor de tu rostro» es una fórmula bíblica transparente y fiel; se evita modernizarla a «cara» para preservar el registro bíblico sin perder claridad.
- source_word: until you return to the ground from which you were taken
  english_pob_choice: until you return to the ground from which you were taken
  chosen_spanish: hasta que vuelvas a la tierra de la cual fuiste tomado
  alternatives_spanish:
  - hasta que regreses a la tierra de donde fuiste sacado
  - hasta que vuelvas al polvo de donde fuiste tomado
  lexicon: return / ground / taken
  rationale: «Tierra» traduce aquí el hebreo con el doble sentido de suelo/origen humano y mantiene la progresión del pasaje. «Fuiste tomado» conserva la pasiva y la acción divina implícita sin explicitarla más de lo debido.
- source_word: for you are earth, and to the earth you shall return
  english_pob_choice: for you are earth, and to the earth you shall return
  chosen_spanish: porque eres polvo, y al polvo volverás
  alternatives_spanish:
  - porque eres tierra, y a la tierra volverás
  - porque eres del polvo, y al polvo volverás
  lexicon: עָפָר / dust, earth
  rationale: Aquí se eligió «polvo» porque en español expresa mejor la condición mortal y el contraste con el retorno al suelo/origen. Aunque «tierra» también sería posible, «polvo» preserva la resonancia bíblica más reconocible de la declaración final.
theological_decisions:
- issue: Meaning of the curse on the ground
  english_pob_reading: The ground is cursed on Adam's account, not Adam himself in this clause.
  chosen_spanish_reading: La tierra es la que queda maldita por causa de Adán en esta cláusula.
  alternative_spanish_readings:
  - Adán mismo queda maldito
  - la tierra es maldecida por causa de Adán
  rationale: 'El español mantiene la distinción del texto: la maldición recae sobre la tierra. Esto evita trasladar indebidamente la maldición al hombre en esta frase específica, aunque el juicio sobre Adán continúa en la sentencia completa.'
  doctrine_reference: Génesis 3:17; coherencia con la distinción entre juicio sobre el suelo y sentencia sobre el hombre
- issue: Human mortality and return to dust/earth
  english_pob_reading: for you are earth, and to the earth you shall return
  chosen_spanish_reading: porque eres polvo, y al polvo volverás
  alternative_spanish_readings:
  - porque eres tierra, y a la tierra volverás
  - porque eres del polvo, y al polvo volverás
  rationale: «Polvo» comunica la mortalidad humana con claridad teológica en español y coincide con la fórmula bíblica tradicional del retorno a la condición mortal. Se mantiene la idea doctrinal de la fragilidad humana sin suavizarla.
  doctrine_reference: Génesis 3:19; Eclesiastés 3:20; 12:7
translation_notes:
  revision_awareness: No revision changes were applied in the English audit trail; the Spanish draft therefore follows the stable POB reading directly from the source packet and English audit context.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona singular a lo largo del versículo.
  - Se conserva el paralelismo bíblico entre tierra/polvo y retorno final.
  - El registro es formal pero natural, apto para lectura pública e iglesia.
  - Se evita sustituir términos concretos por equivalentes más interpretativos cuando el original permite conservar la imagen.
