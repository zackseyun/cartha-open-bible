review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca la traducción inglesa auditada y preserva bien la secuencia de juicio: escuchar a la esposa, comer del árbol prohibido, maldición sobre la tierra, producción de espinos y cardos, comer con sudor, retorno a la tierra. Sin embargo, hay una desalineación significativa al final: el inglés POB dice ''for you are earth, and to the earth you shall return'', mientras que el borrador cambia a ''polvo''. Dado que el propio borrador documenta ''earth'' como elección inglesa, conviene mantener ''tierra'' para respetar la evidencia fuente y la coherencia interna del versículo.'
  spanish_quality_summary: 'El español es claro, digno y mayormente natural. La sintaxis larga funciona, aunque ''te mandé diciendo'' suena algo calcada. Una leve mejora idiomática es ''te mandé: “No comerás de él”''. El resto del registro bíblico es bueno y ampliamente legible.'
  glossary_alignment: No hay términos del glosario mayor afectados salvo la necesidad de conservar la distinción semántica de 'earth/ground' como 'tierra' en este contexto, en lugar de introducir 'polvo' por resonancia tradicional. 'Espinos y cardos', 'rostro' y 'esposa' son aceptables.
  issues:
  - severity: high
    issue: La cláusula final cambia 'earth' a 'polvo' dos veces.
    rationale: La traducción inglesa auditada y la lógica del versículo repiten 'ground/earth' desde la frase previa ('until you return to the ground... for you are earth, and to the earth you shall return'). Cambiar a 'polvo' introduce una interpretación tradicional comprensible, pero no preserva fielmente la formulación fuente auditada.
  - severity: medium
    issue: '''te mandé diciendo'' suena calcado y poco natural en español.'
    rationale: 'Aunque entendible, en español bíblico moderno más natural sería ''te mandé: “No comerás de él”'' o ''te mandé que no comieras de él''. Esto mejora la legibilidad sin perder literalidad sustancial.'
  revised_spanish_text: 'Y a Adán también le dijo: «Porque escuchaste la voz de tu esposa y comiste del árbol del cual te mandé: “No comerás de él”, maldita será la tierra por causa de ti. Te producirá espinos y cardos, y comerás tu pan con el sudor de tu rostro hasta que vuelvas a la tierra de la cual fuiste tomado; porque eres tierra, y a la tierra volverás».'
  revision_rationale: Se ajusta la redacción de la orden para que suene natural en español y, sobre todo, se restaura 'tierra ... tierra' en la cláusula final para reflejar con fidelidad la evidencia auditada y la repetición semántica del pasaje.
