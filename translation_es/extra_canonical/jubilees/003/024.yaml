  text: And to Adam also he said, “Because you listened to the voice of your wife and ate from that tree from which I commanded you not to eat, cursed shall the ground be on your account. It shall produce thorns and thistles for you, and you shall eat your bread by the sweat of your face until you return to the ground from which you were taken; for you are earth, and to the earth you shall return.”
  revision_pass:
