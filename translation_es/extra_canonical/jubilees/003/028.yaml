revisions:
- from: Y los sacó del huerto del Edén a toda carne que estaba en el huerto del Edén, y toda carne fue dispersada, cada una según su especie y según su forma, a los lugares que habían sido creados para ellas.
  to: Y sacó del huerto del Edén a toda carne que estaba en el huerto del Edén, y toda carne fue dispersada, cada una según su especie y según su forma, a los lugares que habían sido creados para ellas.
  rationale: 'Se elimina el pronombre problemático ''los'' y se reordena la apertura para que el español exprese con claridad y naturalidad la misma relación sintáctica del texto auditado: sacar del huerto a toda carne que estaba en él. El resto del versículo puede conservarse sin cambios porque ya preserva bien el sentido y la terminología.'
