translation:
  language: es
  text: Y sacó del huerto del Edén a toda carne que estaba en el huerto del Edén, y toda carne fue dispersada, cada una según su especie y según su forma, a los lugares que habían sido creados para ellas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: all flesh
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - todo ser vivo
  - toda criatura viviente
  lexicon: carne
  rationale: Conservo la fuerza colectiva y la amplitud de 'all flesh' con 'toda carne', que en español bíblico comunica conjunto de seres vivientes sin reducirlo a humanos ni a animales únicamente.
- source_word: scattered
  english_pob_choice: was scattered
  chosen_spanish: fue dispersada
  alternatives_spanish:
  - fue esparcida
  - se dispersó
  lexicon: dispersar
  rationale: '''Dispersada'' mantiene la imagen de distribución por separación, y concuerda con el pasivo del inglés POB sin añadir un sujeto explícito.'
- source_word: each according to its kind
  english_pob_choice: each according to its kind
  chosen_spanish: cada una según su especie
  alternatives_spanish:
  - cada uno según su género
  - cada una según su clase
  lexicon: especie
  rationale: '''Especie'' es la equivalencia más clara y natural en español para la clasificación por tipo/kind, preservando la distinción de cada grupo creado.'
- source_word: according to its form
  english_pob_choice: according to its form
  chosen_spanish: según su forma
  alternatives_spanish:
  - según su apariencia
  - según su figura
  lexicon: forma
  rationale: '''Forma'' reproduce de manera directa el segundo criterio de clasificación del texto y conserva la posible diferencia entre especie y configuración/forma.'
- source_word: the places that had been created for them
  english_pob_choice: the places that had been created for them
  chosen_spanish: los lugares que habían sido creados para ellas
  alternatives_spanish:
  - los lugares que se habían creado para ellas
  - los sitios preparados para ellas
  lexicon: crear
  rationale: Mantengo la pasiva y el vínculo con la creación previa de los lugares; 'ellas' se ajusta al referente colectivo 'toda carne' en español.
theological_decisions:
- issue: Destino ordenado de las criaturas según creación
  english_pob_reading: all flesh was scattered, each according to its kind and according to its form, to the places that had been created for them
  chosen_spanish_reading: toda carne fue dispersada, cada una según su especie y según su forma, a los lugares que habían sido creados para ellas
  alternative_spanish_readings:
  - toda carne fue esparcida...
  - cada una según su clase...
  rationale: 'Conservo la idea teológica de un orden creado previo: la dispersión no es caótica sino conforme al diseño de la creación. El español mantiene la secuencia de criterios y el plural colectivo sin interpretar más allá del texto.'
  doctrine_reference: orden de la creación; providencia creacional
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones aplicadas; el pasaje fue confirmado como sin cambios necesarios y con alto grado de acuerdo en la revisión cruzada, por lo que la traducción española se apoya directamente en ese estado estable.
  spanish_consistency_notes:
  - Usé 'Yahvé' solo cuando el texto lo exija; este verso no contiene el nombre divino.
  - Mantuve 'carne' en sentido colectivo-creacional, no como contraste antropológico con 'espíritu'.
  - '''Especie'' y ''forma'' se reservaron para distinguir dos criterios del texto sin fundirlos en un solo término.'
