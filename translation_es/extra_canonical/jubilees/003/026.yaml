  text: And on that day on which Adam went out from the garden[3:26], he burned incense as a sweet fragrance—frankincense, galbanum, stacte, and spices—in the morning with the rising of the sun, from the day when he covered his shame.
  footnotes:
  - marker: '3:26'
    text: The list of aromatics is textually difficult in places, but the sense is a sweet incense offering made at sunrise after Adam covered his shame.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y en aquel día en que Adán salió del jardín, quemó incienso como fragancia suave: olíbano, gálbano, estacte y especias[a], por la mañana, con la salida del sol, desde el día en que cubrió su vergüenza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La lista de aromáticos es textualmente difícil en algunos puntos, pero el sentido es el de una ofrenda de incienso suave realizada al amanecer después de que Adán cubrió su vergüenza.
    reason: textual_variant
lexical_decisions:
- source_word: burned incense
  english_pob_choice: he burned incense
  chosen_spanish: quemó incienso
  alternatives_spanish:
  - ofreció incienso
  - hizo arder incienso
  lexicon: incensar / quemar incienso
  rationale: El inglés POB conserva la acción concreta de quemar incienso; en español, «quemó incienso» es natural, preciso y mantiene el gesto cultual sin suavizarlo a una fórmula más litúrgica que el texto no exige.
- source_word: sweet fragrance
  english_pob_choice: as a sweet fragrance
  chosen_spanish: como fragancia suave
  alternatives_spanish:
  - como aroma grato
  - como olor fragante
  lexicon: fragancia / suave
  rationale: El griego subyacente no está disponible aquí, pero la tradición del pasaje apunta a una ofrenda olorosa agradable. «Fragancia suave» reproduce la cualidad de agrado sin cargar innecesariamente el registro con un idioma más eclesiástico.
- source_word: frankincense, galbanum, stacte, and spices
  english_pob_choice: frankincense, galbanum, stacte, and spices
  chosen_spanish: incienso de olíbano, gálbano, estacte y especias
  alternatives_spanish:
  - olíbano, gálbano, estacte y especias
  - incienso, gálbano, estacte y especias
  lexicon: nombres de aromáticos
  rationale: Se conservan los nombres de aromáticos en una forma reconocible para lectores bíblicos en español. «Olíbano» aclara el término tradicional para frankincense y evita perder el referente aromático específico.
- source_word: in the morning with the rising of the sun
  english_pob_choice: in the morning with the rising of the sun
  chosen_spanish: por la mañana, con la salida del sol
  alternatives_spanish:
  - por la mañana, al salir el sol
  - en la mañana, con el amanecer
  lexicon: marcador temporal
  rationale: La frase inglesa se vierte con un español claro y fluido. «Con la salida del sol» mantiene la imagen temporal y evita una reinterpretación más devocional que literal.
- source_word: from the day when he covered his shame
  english_pob_choice: from the day when he covered his shame
  chosen_spanish: desde el día en que cubrió su vergüenza
  alternatives_spanish:
  - desde el día en que cubrió su desnudez
  - desde el día en que ocultó su vergüenza
  lexicon: vergüenza / cubrir
  rationale: POB mantiene «shame», no solo la desnudez. «Vergüenza» conserva esa carga moral y relacional; «cubrió» respeta la imagen del texto sin añadir explicación.
theological_decisions:
- issue: Naturaleza de la ofrenda de incienso
  english_pob_reading: a sweet incense offering made at sunrise after Adam covered his shame
  chosen_spanish_reading: una ofrenda de incienso agradable, hecha al amanecer después de que Adán cubrió su vergüenza
  alternative_spanish_readings:
  - un perfume agradable ofrecido al amanecer
  - un incienso suave ofrecido al salir el sol
  rationale: El texto no debe estrecharse a una explicación ceremonial posterior ni diluirse en una simple metáfora olfativa. La redacción española conserva el acto cultual y el carácter agradable de la ofrenda, tal como la nota inglesa indica.
  doctrine_reference: Génesis 3:7, 21; ofrenda agradable / culto primitivo
- issue: Cronología litúrgica vinculada a la caída
  english_pob_reading: from the day when he covered his shame
  chosen_spanish_reading: desde el día en que cubrió su vergüenza
  alternative_spanish_readings:
  - desde el día en que cubrió su desnudez
  - desde que ocultó su vergüenza
  rationale: La referencia teológica y narrativa está en el acto posterior a la vergüenza de Adán, no solo en un dato anatómico. La formulación elegida mantiene la tensión moral presente en el inglés POB.
  doctrine_reference: Génesis 3:10-11; vergüenza y cobertura tras la caída
translation_notes:
  revision_awareness: Se siguió la lectura inglesa POB tal como quedó sin cambios en la última revisión; no se introdujeron alteraciones respecto del audit trail, y la nota textual inglesa se reflejó en una nota española equivalente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó la carga de «vergüenza» en lugar de reducirla a «desnudez», conforme al énfasis del inglés POB.
  - Los aromáticos se dejaron en formas reconocibles para lectores bíblicos en español, evitando una domesticación excesiva.
