base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/003/020.yaml
  text: And the woman saw the tree, that it was delightful[a] and pleasing to the eye, and its fruit was good for food, and she took from it and ate.
  footnotes:
  - marker: a
    text: The Ge'ez word ʾaddām here functions as an adjective meaning 'pleasant' or 'delightful,' distinct from the proper name Adam.
    reason: lexical_choice
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:39Z'
    unchanged: false
    changes_summary: Removed material from the previous verse that does not belong in Jubilees 3:20, and retained the verse's own content in natural formal English.
translation:
  language: es
  text: Y la mujer vio el árbol, que era deleitoso[a] y agradable a la vista, y su fruto era bueno para comer, y tomó de él y comió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El geʿez አዳም aquí funciona como adjetivo con el sentido de «deleitoso» o «placentero», no como el nombre propio Adán.
    reason: lexical_alternative
lexical_decisions:
- source_word: ዕፀ
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - madero
  lexicon: Leslau
  rationale: El sustantivo designa el objeto vegetal; en español, «árbol» comunica de forma natural y fiel el referente del texto.
- source_word: አዳም
  english_pob_choice: delightful
  chosen_spanish: deleitoso
  alternatives_spanish:
  - placentero
  - agradable
  lexicon: Leslau
  rationale: Sigo la decisión auditada de entender ʾaddām como adjetivo de agrado sensorial o estético, no como el nombre propio Adán. «Deleitoso» conserva el matiz literario y el valor de placer visual.
- source_word: ለዐይን
  english_pob_choice: pleasing to the eye
  chosen_spanish: agradable a la vista
  alternatives_spanish:
  - placentero a la vista
  - hermoso a los ojos
  lexicon: Leslau
  rationale: La expresión apunta a la percepción visual; «agradable a la vista» es idiomática en español y mantiene el sentido sin añadir intensidad no explícita.
- source_word: ለበሊዕ
  english_pob_choice: for food
  chosen_spanish: para comer
  alternatives_spanish:
  - para alimento
  - comestible
  lexicon: Leslau
  rationale: Aunque el inglés POB opta por «for food», en español «para comer» expresa con naturalidad la función alimenticia del fruto y evita una construcción demasiado nominal que sonaría forzada aquí.
- source_word: ወነሥአት
  english_pob_choice: she took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - cogió
  lexicon: Leslau
  rationale: «Tomó» es la equivalencia sobria y estándar para el acto de tomar del fruto, sin añadir matices coloquiales o excesivamente físicos.
- source_word: ወበልዐት
  english_pob_choice: and ate
  chosen_spanish: y comió
  alternatives_spanish:
  - y lo comió
  - y comió de él
  lexicon: Leslau
  rationale: La forma verbal simple conserva la secuencia narrativa directa del original. El objeto implícito ya queda claro por el contexto inmediato.
translation_notes:
  revision_awareness: 'La revisión reciente corrigió el límite de versículo: se excluyó material de 3:19 y se conservó solo el contenido propio de 3:20. Por eso la traducción española refleja únicamente la escena de la mujer viendo el árbol, su fruto y su acción de tomar y comer, sin añadir la comparación previa con «dioses» ni la mención del conocimiento.'
  spanish_consistency_notes:
  - He mantenido un registro bíblico formal, pero natural en español contemporáneo.
  - He evitado «SEÑOR» u otras sustituciones porque este versículo no contiene el Nombre divino.
  - El adjetivo «deleitoso» lleva nota porque el texto fuente permite confundirlo con el nombre propio Adán; la nota preserva la tensión léxica documentada.
  - La secuencia verbal «tomó... y comió» sigue de cerca la sintaxis narrativa del original sin sobreexplicar el objeto implícito.
