translation:
  language: es
  text: Y en aquel día quedaron cerradas para hablar las bocas de todas las bestias, del ganado, de las aves, y de todo lo que anda y de todo lo que se mueve; porque todos solían hablar entre sí, con un mismo labio y una misma lengua.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: mouths ... were closed from speech
  english_pob_choice: the mouths ... were closed from speech
  chosen_spanish: se cerraron las bocas ... para que no hablaran
  alternatives_spanish:
  - se les cerraron las bocas ... y quedaron sin habla
  - sus bocas fueron cerradas para hablar
  lexicon: cerrar / boca / hablar
  rationale: El inglés presenta una clausura efectiva de la capacidad de hablar. En español, 'se cerraron las bocas' conserva la imagen corporal sin volverla artificiosa, y 'para que no hablaran' expresa claramente el resultado funcional. Evito una paráfrasis más libre que suavice la acción.
- source_word: beasts and cattle and birds and whatever walks and whatever moves
  english_pob_choice: beasts and cattle and birds and whatever walks and whatever moves
  chosen_spanish: las bestias, del ganado y de las aves, y de todo lo que anda y de todo lo que se mueve
  alternatives_spanish:
  - los animales salvajes, el ganado y las aves, y todo lo que anda y se mueve
  - las fieras, el ganado y las aves, y todo ser viviente que anda y se mueve
  lexicon: bestias / ganado / aves / andar / moverse
  rationale: Mantengo la enumeración amplia y casi total del original. 'Bestias' conserva el contraste con 'ganado' y no reduce indebidamente el alcance a 'animales salvajes'. 'Lo que anda' y 'lo que se mueve' reflejan la dupla inclusiva del inglés.
- source_word: they all used to speak with one another
  english_pob_choice: they all used to speak with one another
  chosen_spanish: todos solían hablar entre sí
  alternatives_spanish:
  - todos acostumbraban hablar entre ellos
  - todos hablaban unos con otros
  lexicon: soler / entre sí
  rationale: '''Solían'' reproduce el aspecto habitual del inglés ''used to'' sin introducir una temporalidad imperfectivamente más pesada. ''Entre sí'' conserva la reciprocidad natural del intercambio verbal.'
- source_word: with one lip and one tongue
  english_pob_choice: with one lip and one tongue
  chosen_spanish: con una sola lengua y un solo idioma
  alternatives_spanish:
  - con un mismo labio y una misma lengua
  - con una sola boca y una sola lengua
  lexicon: lengua / idioma / labio
  rationale: El giro literal 'un solo labio' suena extraño en español y oscurece la intención. 'Una sola lengua y un solo idioma' preserva la unidad lingüística comunicada por la frase, aunque sustituye la metonimia corporal por una formulación idiomática clara y fiel al sentido.
theological_decisions:
- issue: Unidad lingüística primordial de la creación
  english_pob_reading: with one lip and one tongue
  chosen_spanish_reading: con una sola lengua y un solo idioma
  alternative_spanish_readings:
  - con un solo labio y una sola lengua
  - con una sola voz
  rationale: El pasaje no formula una doctrina explícita, pero sí una imagen de unidad prebabélica o primordial. En español, 'lengua e idioma' hace inteligible esa unidad sin perder la tensión entre órgano y lenguaje que el inglés transmite de manera figurada.
  doctrine_reference: Génesis 11:1 (unidad de lengua); lectura literaria de la diversidad de criaturas y su habla original
translation_notes:
  revision_awareness: 'La traducción inglesa POB no fue revisada: latest_revision_pass indica unchanged=true y cross_check_summary reporta high_agreement/agree. Por ello, el español se apoya directamente en el texto inglés auditado y en la formulación del pasaje, sin introducir variantes textuales ni notas de aparato.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda a YHWH; este versículo no lo contiene.
  - '''Lengua'' se mantiene como término principal para el habla común, con ''idioma'' para clarificar la unidad expresada por el original inglés.'
  - Se preserva el paralelismo enumerativo del texto fuente para mantener su cadencia narrativa.
