revisions:
- from: Y en aquel día se cerraron las bocas de todas las bestias, del ganado y de las aves, y de todo lo que anda y de todo lo que se mueve, para que no hablaran; porque todos solían hablar entre sí, con una sola lengua y un solo idioma.
  to: Y en aquel día quedaron cerradas para hablar las bocas de todas las bestias, del ganado, de las aves, y de todo lo que anda y de todo lo que se mueve; porque todos solían hablar entre sí, con un mismo labio y una misma lengua.
  rationale: Se ajusta la primera cláusula para expresar privación/resultado del habla en vez de finalidad, y se restaura la dupla figurada 'labio/lengua' para reflejar mejor el inglés POB y la imaginería bíblica subyacente, manteniendo un español todavía comprensible y digno.
