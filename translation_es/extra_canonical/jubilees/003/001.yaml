base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/003/001.yaml
  text: 'And during the six days of the second week we brought to Adam, by the word of the Lord, all the beasts, and all the livestock, and all the birds, and everything that moves on the earth, and everything that moves in the waters, according to their kinds and according to their forms: the beasts on the first day, the livestock on the second day, the birds on the third day, and everything that moves on the earth on the fourth day, and what moves in the waters on the fifth day.'
  footnotes:
  - marker: a
    text: Or 'And on the second day'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:33:35Z'
    unchanged: false
    changes_summary: Replaced 'cattle' with 'livestock' in both occurrences for more natural and broader English while preserving the source sense; otherwise left the draft unchanged.
translation:
  language: es
  text: 'Y durante los seis días de la segunda semana trajimos a Adán, por la palabra de Yahvé, todos los animales salvajes, todo el ganado[a], todas las aves y todo lo que se mueve sobre la tierra y todo lo que se mueve en las aguas, según sus clases y según sus formas: los animales salvajes el primer día, el ganado[a] el segundo día, las aves el tercer día, y todo lo que se mueve sobre la tierra el cuarto día, y lo que se mueve en las aguas el quinto día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los animales domésticos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: በቃለ፡ እግዚአብሔር፡
  english_pob_choice: by the word of the Lord
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - por la palabra del Señor
  - según la palabra de Yahvé
  lexicon: YHWH
  rationale: El contexto bíblico apunta al nombre divino; la política del proyecto pide 'Yahvé' en lugar de ocultarlo con 'SEÑOR'. 'Por la palabra de' conserva el medio o agente expresado en el original y en el inglés POB.
- source_word: አራዊተ፡
  english_pob_choice: the beasts
  chosen_spanish: los animales salvajes
  alternatives_spanish:
  - las bestias
  - los animales feroces
  lexicon: θηρία / wild beasts
  rationale: '''Animales salvajes'' comunica el valor de criaturas no domesticadas sin cargar el tono arcaico de ''bestias'', y distingue bien esta clase de los animales domésticos del siguiente miembro.'
- source_word: እንስሳ፡
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales domésticos
  - el ganado doméstico
  lexicon: ζῷα / domestic livestock
  rationale: '''Ganado'' es el equivalente más natural y amplio en español para animales domesticados/criados, coherente con la revisión inglesa que prefirió ''livestock'' sobre ''cattle''.'
- source_word: አዕዋፈ፡
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: birds
  rationale: '''Aves'' es preciso y más abarcador que ''pájaros''.'
- source_word: ዘይትነወስ፡
  english_pob_choice: everything that moves on the earth / in the waters
  chosen_spanish: todo lo que se mueve sobre la tierra / en las aguas
  alternatives_spanish:
  - todo ser que se mueve sobre la tierra / en las aguas
  - todo lo que se desplaza sobre la tierra / en las aguas
  lexicon: moving creatures
  rationale: La expresión mantiene el paralelismo del original y la amplitud semántica de las criaturas móviles sin restringirla innecesariamente.
- source_word: በበ፡ ዘመዶሙ፡ ወበበ፡ አምሳሎሙ፡
  english_pob_choice: according to their kinds and according to their forms
  chosen_spanish: según sus clases y según sus formas
  alternatives_spanish:
  - según sus especies y según sus formas
  - conforme a sus clases y conforme a sus formas
  lexicon: kinds/forms
  rationale: '''Clases'' es suficientemente amplio para ''kinds'' y evita imponer una terminología científica moderna; ''formas'' conserva el segundo término sin simplificar la duplicación del original.'
- source_word: ዲበ፡
  english_pob_choice: 'on'
  chosen_spanish: el
  alternatives_spanish:
  - en el
  - para el
  lexicon: day sequence marker
  rationale: 'En español, la serie temporal se expresa de forma natural con artículo definido: ''el primer día... el segundo día...'', lo que refleja la enumeración del original.'
theological_decisions:
- issue: Referencia al nombre divino en el contexto de 'la palabra del Señor'
  english_pob_reading: by the word of the Lord
  chosen_spanish_reading: por la palabra de Yahvé
  alternative_spanish_readings:
  - por la palabra del Señor
  - por la palabra del Eterno
  rationale: La edición española del POB debe hacer visible el nombre divino cuando el trasfondo lo exige. Aquí el ge'ez usa el término para Dios; no hay razón textual para ocultarlo con una sustitución reverente.
  doctrine_reference: Éxodo 3:15; política editorial POB sobre el Tetragrámaton
translation_notes:
  revision_awareness: El inglés revisado corrigió un error importante en la apertura ('during the six days' en lugar de 'on the second day'). El español sigue esa lectura revisada y conserva la secuencia de seis días con distribución en cinco días enumerados, tal como exige el contexto del pasaje. También toma en cuenta la revisión léxica de 'livestock' para evitar un español demasiado estrecho como 'ganado vacuno'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología española del proyecto.
  - '''animales salvajes'' y ''ganado'' preservan la distinción entre categorías no domesticadas y domesticadas.'
  - La enumeración temporal se formula de modo natural en español sin perder el paralelismo del original.
  - No se añadió nota para 'según sus formas' porque el español la reproduce sin ambigüedad adicional.
