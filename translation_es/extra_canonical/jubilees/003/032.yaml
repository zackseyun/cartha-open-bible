lexical_decisions:
- source_word: called the name
  english_pob_choice: called the name
  chosen_spanish: llamó el nombre
  alternatives_spanish:
  - puso el nombre
  - nombró
  lexicon: 'hebreo/semítico: קרא שם / llamar el nombre'
  rationale: Conserva la fórmula bíblica breve y transparente del original, sin convertirla en una paráfrasis más libre. «Llamó el nombre» reproduce bien la estructura tradicional del enunciado.
- source_word: his wife
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  - su compañera
  lexicon: 'hebreo/semítico: אִשָּׁה / wife, woman'
  rationale: «Esposa» es natural en español y mantiene la relación matrimonial explícita. «Mujer» sería posible, pero aquí «esposa» evita ambigüedad en un contexto narrativo formal.
- source_word: Eve
  english_pob_choice: Eve
  chosen_spanish: Eva
  lexicon: 'hebreo/semítico: חַוָּה / Eve'
  rationale: Se conserva el nombre propio establecido en español bíblico y plenamente inteligible.
theological_decisions:
- issue: Nombrar a la esposa de Adán como acto narrativo sin expansión interpretativa
  english_pob_reading: And Adam called the name of his wife Eve.
  chosen_spanish_reading: Y Adán llamó el nombre de su esposa Eva.
  alternative_spanish_readings:
  - Y Adán nombró a su esposa Eva.
  - Adán puso por nombre Eva a su esposa.
  rationale: El texto solo informa el acto de nombrar; no añade explicación teológica ni comentario. La traducción mantiene esa sobriedad narrativa y no introduce matices adicionales sobre autoridad, destino o etimología que el pasaje no expresa aquí.
  doctrine_reference: Génesis 3:20
