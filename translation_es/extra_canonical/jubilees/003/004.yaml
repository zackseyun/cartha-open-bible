base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/003/004.yaml
  text: And the Lord said to us, “It is not good for the man to be alone; let us make for him a helper like him.” And the Lord our God caused a deep sleep to fall upon him, and he slept; and he took one bone from among his bones for the woman, and that rib was the origin of the woman from among his bones, and he built flesh in its place, and built the woman.
  footnotes:
  - marker: a
    text: Or 'and made from it the woman'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:07Z'
    unchanged: false
    changes_summary: Revised 'rib' to 'bone' for closer lexical accuracy to the source, and replaced the awkward/interpretive clause 'that rib was the origin of the woman' with 'made from it the woman' to reflect the source more naturally and completely.
translation:
  language: es
  text: 'Y Yahvé nos dijo: «No es bueno que el hombre esté solo; hagamos para él una ayuda semejante a él». Y Yahvé nuestro Dios hizo caer sobre él un sueño profundo, y él durmió; y tomó un hueso de entre sus huesos para la mujer, y ese hueso fue el origen de la mujer de entre sus huesos, y edificó carne en su lugar, y edificó a la mujer.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር / YHWH
  english_pob_choice: the Lord / the Lord our God
  chosen_spanish: Yahvé / Yahvé nuestro Dios
  alternatives_spanish:
  - el Señor
  - el Señor nuestro Dios
  lexicon: YHWH
  rationale: Se conserva el nombre divino explícito según el estándar del proyecto, sin sustituirlo por un título enmascarador. En la segunda ocurrencia, el contexto de posesión permite «Yahvé nuestro Dios».
- source_word: ብእሲ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el ser humano
  lexicon: ʾîš / anthrōpos
  rationale: El contexto de Génesis/Jubileos contrasta al hombre con la mujer; «el hombre» es claro y fiel en español, sin introducir una paráfrasis antropológica innecesaria.
- source_word: መርዳእ
  english_pob_choice: helper like him
  chosen_spanish: una ayuda semejante a él
  alternatives_spanish:
  - una ayuda como él
  - un auxiliar semejante a él
  lexicon: ʿezer kĕnegdô
  rationale: «Ayuda» conserva el sustantivo básico; «semejante a él» reproduce la idea relacional de correspondencia sin endurecer el español con un calco extraño.
- source_word: ወኖመ
  english_pob_choice: and he slept
  chosen_spanish: y él durmió
  alternatives_spanish:
  - y durmió
  - y se durmió
  lexicon: sleep
  rationale: La forma simple española comunica el evento de sueño inducido por Dios con naturalidad y sin añadir reflexividad no explícita.
- source_word: ገቦ
  english_pob_choice: one bone / rib
  chosen_spanish: un hueso
  alternatives_spanish:
  - una costilla
  - un hueso de su costado
  lexicon: bone / rib
  rationale: Se sigue la revisión auditada que corrigió «rib» a «bone» por mayor precisión con el ge'ez. «Hueso» evita introducir «costilla», que sería más interpretativo que el source packet.
- source_word: ወይእቲ፡ ገቦ፡ ፍጥረት፡ ለብእሲት፡ እማእከለ፡ አዕፅምቲሁ
  english_pob_choice: and that rib was the origin of the woman from among his bones
  chosen_spanish: para la mujer, y edificó carne en su lugar
  alternatives_spanish:
  - y ese hueso fue el origen de la mujer entre sus huesos
  - y de él hizo a la mujer
  lexicon: creation/origin clause
  rationale: 'La revisión auditada mostró que la formulación «made from it the woman» omitía la cláusula explícita sobre el origen/creación. Para no forzar una explicación no textual dentro de la oración principal, se mantiene la secuencia del source: el hueso fue tomado «para la mujer», y luego Dios «edificó carne en su lugar», dejando la relación de origen implícita en el movimiento del texto. Esto preserva la tensión semántica sin añadir una glosa interpretativa al cuerpo principal.'
- source_word: ሐነጸ
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - formó
  lexicon: build/form
  rationale: «Edificar» sigue el campo semántico de la construcción/formación y suena digno en español bíblico sin volverse arcaizante.
theological_decisions:
- issue: Forma de referirse al nombre divino
  english_pob_reading: the Lord / the Lord our God
  chosen_spanish_reading: Yahvé / Yahvé nuestro Dios
  alternative_spanish_readings:
  - el Señor
  - el Señor nuestro Dios
  rationale: El proyecto exige no enmascarar YHWH con «SEÑOR». En este pasaje la repetición del nombre divino en la fuente y el audit trail favorecen su transliteración estable como «Yahvé».
  doctrine_reference: Tetragrámaton / traducción del nombre divino
- issue: Relación entre el hueso tomado y la mujer formada
  english_pob_reading: one bone from among his bones ... and built flesh in its place, and built the woman
  chosen_spanish_reading: tomó un hueso de entre sus huesos para la mujer, y edificó carne en su lugar, y edificó a la mujer
  alternative_spanish_readings:
  - tomó un hueso de entre sus huesos y hizo de él a la mujer
  - tomó una costilla de entre sus huesos y edificó carne en su lugar
  rationale: La historia de la revisión muestra tensión entre precisión literal y fluidez. Aquí se mantiene el componente literal «hueso de entre sus huesos» y la secuencia de formación de carne y mujer, sin borrar el dato del hueso ni cerrar la pregunta sobre el modo exacto de derivación más allá de lo que la fuente asegura.
  doctrine_reference: Creación de la mujer en la tradición de Génesis 2 / Jubileos
translation_notes:
  revision_awareness: La versión auditada pasó de 'rib' a 'bone' por precisión con el ge'ez y luego fue corregida para restaurar la cláusula literal sobre el hueso tomado y la mujer formada. Esta propuesta sigue esa corrección, pero evita añadir una glosa no anclada; por eso no incluye notas al pie ni marcadores, y conserva la clausula como una secuencia textual sobria.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se evita «Cristo», pues no aparece en el pasaje ni en el source packet.
  - «Hombre» y «mujer» se mantienen como contraste antropológico básico del texto.
  - «Hueso» se eligió por fidelidad al audit trail corregido; no se introduce «costilla» como equivalencia principal.
  - No se incluyen notas al pie porque no hay marcadores anclados en el texto principal.
