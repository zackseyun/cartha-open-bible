translation:
  language: es
  text: hasta que cumpla estos días en el caso de un varón. Pero en el caso de una mujer, dos semanas, como las dos primeras semanas, en su impureza, y sesenta y seis días permanecerá en la sangre de su purificación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ትፈጽም
  english_pob_choice: completes
  chosen_spanish: cumpla
  alternatives_spanish:
  - complete
  - termine
  lexicon: Leslau
  rationale: El verbo expresa llevar a término o cumplir un período establecido; en español, «cumpla» conserva la idea de completar un plazo sin sonar mecánico.
- source_word: መዋዕለ
  english_pob_choice: days
  chosen_spanish: días
  alternatives_spanish:
  - jornadas
  - periodos
  lexicon: Leslau
  rationale: El contexto de una regulación de pureza exige el sentido temporal literal de «días».
- source_word: ሰቡዓተ
  english_pob_choice: weeks
  chosen_spanish: semanas
  alternatives_spanish:
  - sietes
  lexicon: Leslau
  rationale: La nota inglesa ya justifica «weeks» como períodos de siete días; en español «semanas» comunica la misma unidad temporal de manera natural.
- source_word: በተባዕት
  english_pob_choice: for a male
  chosen_spanish: por un varón
  alternatives_spanish:
  - para un varón
  - para un hijo varón
  lexicon: Leslau
  rationale: «Varón» reproduce el contraste sexual del texto legal con registro digno y directo.
- source_word: በአንስት
  english_pob_choice: for a female
  chosen_spanish: por una mujer
  alternatives_spanish:
  - para una mujer
  - para una hembra
  lexicon: Leslau
  rationale: «Mujer» mantiene el paralelismo natural con «varón» y evita un término demasiado técnico o deshumanizante.
- source_word: በርኵሳ
  english_pob_choice: in her uncleanness
  chosen_spanish: en su impureza
  alternatives_spanish:
  - en su inmundicia
  - en su estado de impureza
  lexicon: Leslau
  rationale: El sufijo posesivo femenino del geʿez está reflejado en «su»; «impureza» preserva el campo semántico ritual sin recurrir a una palabra más áspera que en español moderno podría oscurecer el sentido.
- source_word: ንጽሓ
  english_pob_choice: blood of her purification
  chosen_spanish: sangre de su purificación
  alternatives_spanish:
  - sangre de su limpieza ritual
  - sangre de su purificación ritual
  lexicon: Leslau
  rationale: Se conserva la construcción posesiva con «su» y el sustantivo «purificación», que sigue de cerca el valor ritual del término sin añadir glosas no presentes en el texto.
theological_decisions:
- issue: Distinción entre impureza ritual y moralidad
  english_pob_reading: in her uncleanness / blood of her purification
  chosen_spanish_reading: en su impureza / en la sangre de su purificación
  alternative_spanish_readings:
  - en su inmundicia / en la sangre de su limpieza
  - en su estado de impureza / en la sangre de su purificación ritual
  rationale: El pasaje trata pureza ceremonial, no culpa moral. «Impureza» y «purificación» preservan esa tensión sin moralizarla ni suavizarla indebidamente.
  doctrine_reference: Levítico 12; pureza ritual en la Torá
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la redacción para corresponder de manera más cercana al geʿez y corrigió la referencia posesiva («her uncleanness» / «her purification»). También hubo una revisión posterior que señaló un desbordamiento de límite versicular respecto del número ochenta; por ello, este borrador español conserva únicamente el material claramente contenido en Jubileos 3:11 y no añade la cláusula final numérica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «varón/mujer» para conservar el paralelismo del texto legal.
  - Se conserva el posesivo femenino («su») en ambos miembros, reflejando el geʿez.
  - No se añade la cifra de ochenta días, porque la revisión de límites versiculares la excluye de este versículo.
