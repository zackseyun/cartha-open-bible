    changes_summary: Added the omitted opening clause 'And he ate' to reflect the source text more completely. Kept the rest essentially unchanged, with natural formal English preserved.
translation:
  language: es
  text: Y comió, y se le abrieron los ojos, y vio que estaba desnudo. Tomó hojas de higuera, las cosió y se hizo una cubierta, y cubrió su vergüenza.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወበልዐ
  english_pob_choice: And he ate
  chosen_spanish: Y comió
  alternatives_spanish:
  - Y él comió
  - Y se alimentó
  lexicon: verbo de comer
  rationale: El pasaje abre con la acción concreta de comer; en español, «comió» es la equivalencia natural y precisa, sin añadir matices no presentes.
- source_word: ወተርኅወ አዕይንቲሁ
  english_pob_choice: his eyes were opened
  chosen_spanish: sus ojos fueron abiertos
  alternatives_spanish:
  - se le abrieron los ojos
  - sus ojos se abrieron
  lexicon: expresión idiomática de apertura de ojos
  rationale: Mantengo la voz pasiva/resultado del original. «Fueron abiertos» conserva la forma de la fuente; la alternativa idiomática sería más fluida, pero menos cercana al encadenamiento del texto.
- source_word: ዕራቁ
  english_pob_choice: he was naked
  chosen_spanish: estaba desnudo
  alternatives_spanish:
  - quedó desnudo
  - era desnudo
  lexicon: adjetivo de desnudez
  rationale: «Estaba desnudo» expresa el estado observado sin forzar una interpretación temporal o moral adicional.
- source_word: ቈጽለ፡ በለስ
  english_pob_choice: fig leaves
  chosen_spanish: hojas de higuera
  alternatives_spanish:
  - hojas de higo
  - hojas de la higuera
  lexicon: nombre del árbol y sus hojas
  rationale: «Higuera» es el término estándar y claro en español bíblico; conserva la referencia arbórea del texto.
- source_word: ወጠቅዐ
  english_pob_choice: sewed them
  chosen_spanish: las cosió
  alternatives_spanish:
  - las unió
  - las juntó
  lexicon: verbo de coser
  rationale: El verbo sugiere unir las hojas mediante costura; «cosió» refleja esa acción de forma directa y concreta.
- source_word: ወገብረ ሎቱ ምርአ
  english_pob_choice: and made himself a covering
  chosen_spanish: y se hizo un cubrimiento
  alternatives_spanish:
  - y se hizo una cobertura
  - y se hizo un manto
  lexicon: término de cobertura
  rationale: Conservo una traducción de fuerza nominal relativamente literal para no borrar la idea material de un objeto para cubrirse. «Cubrimiento» mantiene la conexión con el acto y el resultado; «manto» sería más interpretativo.
- source_word: ወከደነ ኀፍረቶ
  english_pob_choice: and covered his shame
  chosen_spanish: y cubrió su vergüenza
  alternatives_spanish:
  - y cubrió su desnudez
  - y ocultó su vergüenza
  lexicon: vergüenza/deshonra
  rationale: La fuente vincula la cobertura con «su vergüenza», no solo con desnudez física. Mantener «vergüenza» preserva esa tensión moral y antropológica sin suavizarla.
theological_decisions:
- issue: Relación entre desnudez física y vergüenza moral
  english_pob_reading: he was naked ... and covered his shame
  chosen_spanish_reading: estaba desnudo ... y cubrió su vergüenza
  alternative_spanish_readings:
  - estaba desnudo ... y cubrió su desnudez
  - estaba desnudo ... y ocultó su vergüenza
  rationale: El texto distingue entre el estado corporal y la respuesta de vergüenza. Mantener ambos términos evita reducir el versículo a mera vestimenta y conserva la carga moral del relato.
  doctrine_reference: Génesis 3:7; Jubileos 3:22
translation_notes:
  revision_awareness: 'La revisión inglesa añadió explícitamente «And he ate» al inicio para reflejar más completamente el texto fuente; el español lo incorpora desde el comienzo. No hubo otras revisiones sustantivas en el contenido de esta línea, así que la traducción sigue de cerca el texto base con una sola decisión estilística mayor: conservar la tensión entre desnudez y vergüenza.'
  spanish_consistency_notes:
  - Se usa «higuera» para el árbol y sus hojas, de modo consistente con la terminología bíblica en español.
  - Se mantiene «vergüenza» en lugar de sustituirlo por «desnudez» para no perder la dimensión moral explícita del texto.
  - El encadenamiento con «Y...» reproduce la secuencia narrativa del original sin sobreinterpretar la relación entre las acciones.
