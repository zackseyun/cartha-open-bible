revisions:
- from: Y después de que se cumplieron cuarenta días para Adán en la tierra donde había sido creado, lo llevamos al jardín de Edén, para que lo labrara y lo guardara; pero su esposa fue llevada [a] después de ochenta días, y después de esto entró en el jardín de Edén.
  to: Y después de que se cumplieron cuarenta días para Adán en la tierra donde había sido creado, lo llevamos al jardín de Edén, para que lo labrara y lo guardara; pero su esposa fue introducida[a] después de ochenta días, y después de esto entró en el jardín de Edén.
