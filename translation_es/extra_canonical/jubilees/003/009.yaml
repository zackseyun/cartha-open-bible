translation:
  language: es
  text: Y después de que se cumplieron cuarenta días para Adán en la tierra donde había sido creado, lo llevamos al jardín de Edén, para que lo labrara y lo guardara; pero su esposa fue introducida[a] después de ochenta días, y después de esto entró en el jardín de Edén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su esposa la llevaron».'
    reason: alternative_reading
lexical_decisions:
- source_word: forty days had been completed
  english_pob_choice: after forty days had been completed
  chosen_spanish: después de que se cumplieron cuarenta días
  alternatives_spanish:
  - después de cumplirse cuarenta días
  - una vez cumplidos cuarenta días
  lexicon: días; cumplir(se)
  rationale: Expresa la finalización temporal de manera natural en español y conserva la idea de período completo antes del traslado.
- source_word: land where he had been created
  english_pob_choice: in the land where he had been created
  chosen_spanish: en la tierra donde había sido creado
  alternatives_spanish:
  - en el país donde había sido creado
  - en la región donde había sido creado
  lexicon: tierra
  rationale: '''Tierra'' mantiene el valor amplio de lugar/territorio del original y del inglés POB sin añadir precisión geográfica no atestiguada.'
- source_word: we brought him into the garden of Eden
  english_pob_choice: we brought him into the garden of Eden
  chosen_spanish: lo llevamos al jardín de Edén
  alternatives_spanish:
  - lo introdujimos en el jardín de Edén
  - lo trajimos al jardín de Edén
  lexicon: llevar
  rationale: '''Llevar'' reproduce con claridad la acción de traslado y evita una construcción más pesada; mantiene el sujeto plural explícito como en el inglés POB.'
- source_word: that he might till it and keep it
  english_pob_choice: that he might till it and keep it
  chosen_spanish: para que lo labrara y lo guardara
  alternatives_spanish:
  - para cultivarlo y cuidarlo
  - para trabajarlo y guardarlo
  lexicon: labrar; guardar
  rationale: '''Labrar'' conserva el sentido agrícola de ''till'' y ''guardar'' mantiene la custodia/observancia del jardín; ambos reflejan el mandato sin domesticarlo demasiado.'
- source_word: his wife was brought in
  english_pob_choice: his wife was brought in
  chosen_spanish: su esposa fue llevada
  alternatives_spanish:
  - su esposa fue introducida
  - a su esposa la llevaron
  lexicon: esposa; llevar
  rationale: La pasiva refleja la revisión inglesa que entendió el plural ge'ez como pasivo impersonal, y evita introducir un agente no identificado; 'esposa' es el término más directo y sobrio en español.
- source_word: after eighty days
  english_pob_choice: after eighty days
  chosen_spanish: después de ochenta días
  alternatives_spanish:
  - al cabo de ochenta días
  - tras ochenta días
  lexicon: después de
  rationale: Conserva la relación temporal exacta del texto y coordina con la primera cláusula.
- source_word: she entered into the garden of Eden
  english_pob_choice: she entered into the garden of Eden
  chosen_spanish: entró en el jardín de Edén
  alternatives_spanish:
  - entró al jardín de Edén
  - fue introducida en el jardín de Edén
  lexicon: entrar en
  rationale: '''Entró en'' es idiomático y fiel; mantiene la acción de ingreso sin añadir matiz causal.'
theological_decisions:
- issue: Impersonal plural in the source for the wife's arrival
  english_pob_reading: his wife was brought in
  chosen_spanish_reading: su esposa fue llevada
  alternative_spanish_readings:
  - su esposa la llevaron
  - su esposa fue introducida
  rationale: La revisión inglesa ya resolvió el plural ge'ez como pasiva impersonal; en español la pasiva conserva esa decisión sin inventar un sujeto agente. No se fuerza un actor concreto donde el texto no lo da.
  doctrine_reference: Narrative grammar; no doctrinal claim
translation_notes:
  revision_awareness: La base inglesa fue revisada para aclarar que el plural ge'ez en la cláusula de la esposa funciona como pasiva impersonal; la versión española adopta esa solución y conserva el sujeto plural explícito en la primera cláusula.
  spanish_consistency_notes:
  - Se mantiene 'jardín de Edén' de forma uniforme.
  - Se conserva la primera persona plural ('lo llevamos') como en el inglés POB.
  - Se usa 'esposa' por coherencia narrativa y claridad, sin cargar el registro.
  - La nota al pie recoge la alternativa literal posible donde el español podría sonar más cercano al ge'ez.
