translation:
  language: es
  text: Y despertó a Adán de su sueño, y cuando Adán despertó, se levantó en el sexto día y la llevó ante él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: awakened
  english_pob_choice: awakened
  chosen_spanish: lo despertó
  alternatives_spanish:
  - lo hizo despertar
  - lo despertó de su sueño
  lexicon: despertar
  rationale: El inglés indica una acción causativa directa sobre Adán; «lo despertó» transmite ese valor de manera natural y fiel. Se añade «de su sueño» para reflejar explícitamente el complemento presente en el inglés POB y mantener la imagen del estado del que fue sacado.
- source_word: sleep
  english_pob_choice: sleep
  chosen_spanish: de su sueño
  alternatives_spanish:
  - del sueño
  - de su dormir
  lexicon: sueño
  rationale: «Sueño» es la forma más clara y digna en español para el estado de reposo mencionado. «Dormir» como sustantivo sería menos natural aquí.
- source_word: rose
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: levantarse
  rationale: El contexto narra que Adán despierta y responde levantándose; «se levantó» expresa el cambio de postura de forma idiomática y precisa, sin añadir resurrección o sentido figurado ajeno al pasaje.
- source_word: the sixth day
  english_pob_choice: the sixth day
  chosen_spanish: el sexto día
  alternatives_spanish:
  - en el sexto día
  lexicon: sexto día
  rationale: Se conserva la referencia temporal literal. El español permite «en el sexto día»; en la redacción se mantiene «el sexto día» dentro de una coordinación verbal ya suficientemente temporal por el contexto.
- source_word: brought her to him
  english_pob_choice: brought her to him
  chosen_spanish: se la trajo
  alternatives_spanish:
  - la llevó a él
  - se la llevó hasta él
  lexicon: traer
  rationale: El inglés presenta a un sujeto implícito que trae a la mujer hacia Adán. «Se la trajo» conserva esa relación direccional con un español fluido y evita introducir explícitamente un sujeto no nombrado en el texto inglés auditado.
theological_decisions:
- issue: Identidad del sujeto implícito en la última cláusula
  english_pob_reading: And he awakened Adam... and ... brought her to him.
  chosen_spanish_reading: '... y se la trajo.'
  alternative_spanish_readings:
  - '... y él se la trajo.'
  - '... y la llevó a él.'
  rationale: El inglés POB mantiene un sujeto implícito para la acción final. En español, un clítico reflexivo/recíproco sin sujeto expreso puede resultar menos claro; sin embargo, dado que el antecedente narrativo inmediato sigue siendo el mismo agente, «se la trajo» preserva la ambigüedad del audit trail sin forzar una identificación que el texto inglés no explicita.
  doctrine_reference: Narrative agency in apocryphal retelling; no doctrinal assertion beyond the story flow.
translation_notes:
  revision_awareness: La versión inglesa revisada añadió el sujeto explícito «Adam» en la segunda cláusula para desambiguar «when Adam awoke». En español, «cuando Adán despertó» ya elimina la ambigüedad sin requerir un ajuste adicional. No se sigue una traducción mecánica del inglés anterior, sino la lectura más clara del texto auditado actual.
  spanish_consistency_notes:
  - Se mantiene «Adán» para el nombre propio.
  - Se usa «sexto día» en minúsculas por ser un ordinal común dentro de la frase.
  - No se introduce «Cristo», «Mesías» ni terminología doctrinal ajena al versículo.
  - El registro es bíblico moderno, sobrio y legible en español latinoamericano.
