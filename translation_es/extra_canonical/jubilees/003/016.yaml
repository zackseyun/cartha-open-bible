  to: Y le dimos trabajo, y le instruimos para que hiciera todo lo adecuado para el cultivo[a]. Y estaba cultivando, y estaba desnudo y no lo sabía, y no se avergonzaba, y guardaba el jardín de las aves, de las bestias y del ganado, y recogía su fruto y comía, y apartaba para sí el resto.
