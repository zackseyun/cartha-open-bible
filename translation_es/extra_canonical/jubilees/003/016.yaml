base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/003/016.yaml
  text: And we gave him work, and we instructed him to do everything suitable for cultivation. And he was cultivating, and he was naked and did not know it, and was not ashamed, and he kept the garden from the birds and from the beasts and from the cattle, and gathered its fruit and ate, and set aside the remainder for himself.
  footnotes:
  - marker: a
    text: Or 'instructed him in everything'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:09Z'
    unchanged: false
    changes_summary: Removed the awkward 'we were instructing him' for the more natural simple past 'we instructed him'; changed 'tilling' to 'cultivating' for consistency with 'cultivation'; added 'for himself' to reflect the final phrase.
translation:
  language: es
  text: Y le dimos trabajo, y le instruimos para que hiciera todo lo adecuado para el cultivo[a]. Y estaba cultivando, y estaba desnudo y no lo sabía, y no se avergonzaba, y guardaba el jardín de las aves, de las bestias y del ganado, y recogía su fruto y comía, y apartaba para sí el resto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le instruimos en hacer todo lo adecuado para el cultivo». El ge''ez incluye la idea de acción concreta («hacer»), no solo de instrucción general.'
    reason: alternative_reading
lexical_decisions:
- source_word: ገቢሮተ (doing/to do)
  english_pob_choice: to do everything suitable for cultivation
  chosen_spanish: a hacer todo lo adecuado para el cultivo
  alternatives_spanish:
  - en hacer todo lo adecuado para el cultivo
  - para hacer todo lo adecuado para el cultivo
  lexicon: N/A
  rationale: El ge'ez incluye la idea de 'hacer/to do', no solo de recibir instrucción general. En español, 'le instruimos a hacer' conserva esa relación verbal sin sobrecargar el texto.
- source_word: ምግባረ (work)
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - obra
  - labor
  lexicon: N/A
  rationale: '''Trabajo'' comunica de forma natural y directa el encargo dado a Adán, sin introducir una noción teológica ajena.'
- source_word: ይትቀነይ (was cultivating)
  english_pob_choice: he was cultivating
  chosen_spanish: estaba cultivando
  alternatives_spanish:
  - cultivaba
  - estaba labrando
  lexicon: N/A
  rationale: '''Estaba cultivando'' refleja el aspecto progresivo de la escena y mantiene la coherencia con ''cultivo/cultivación'' del contexto.'
- source_word: ገነት (garden)
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - huerto
  lexicon: N/A
  rationale: '''Jardín'' sigue el sentido básico del texto y conserva la forma tradicional ya visible en el audit trail; ''huerto'' sería posible, pero cambia el matiz espacial.'
- source_word: እምአዕዋፍ ... እምአራዊት ... እምእንስሳ
  english_pob_choice: from the birds and from the beasts and from the cattle
  chosen_spanish: de las aves, de las bestias y de los animales domésticos
  alternatives_spanish:
  - de las aves, de las bestias y del ganado
  - de las aves, de los animales salvajes y de los animales domésticos
  lexicon: N/A
  rationale: '''Bestias'' y ''animales domésticos'' preservan la triple enumeración del original sin aplanar las categorías. ''Animales domésticos'' traduce con claridad el tercer término, que no equivale necesariamente a ''ganado'' en sentido estrecho.'
- source_word: ተረፎ
  english_pob_choice: the remainder for himself
  chosen_spanish: el resto
  alternatives_spanish:
  - lo que quedaba para sí
  - el sobrante para sí
  lexicon: N/A
  rationale: 'La expresión final requiere en español explicitar el beneficiario: ''apartaba para sí el resto'' refleja tanto la reserva como el ''for himself'' del pasaje revisado.'
theological_decisions:
- issue: Destino del mandato de trabajo humano en el jardín
  english_pob_reading: And we gave him work, and we instructed him to do everything suitable for cultivation.
  chosen_spanish_reading: Y le dimos trabajo, y le instruimos a hacer todo lo adecuado para el cultivo.
  alternative_spanish_readings:
  - Y le dimos trabajo, y le instruimos en todo lo adecuado para el cultivo.
  - Y le dimos trabajo, y le instruimos para hacer todo lo adecuado para el cultivo.
  rationale: No se introduce una formulación más interpretativa como 'administrar' o 'labrar' exclusivamente. El texto presenta mandato e instrucción práctica, y el español mantiene esa doble relación sin borrar la idea de acción concreta.
  doctrine_reference: No aplica doctrina sistemática; fidelidad narrativa al mandato prelapsario.
- issue: Nudity, ignorance, and lack of shame
  english_pob_reading: he was naked and did not know it, and was not ashamed
  chosen_spanish_reading: estaba desnudo y no lo sabía, y no se avergonzaba
  alternative_spanish_readings:
  - estaba desnudo y no lo entendía, y no se avergonzaba
  - estaba desnudo y no se daba cuenta, y no se avergonzaba
  rationale: Se preserva la secuencia original sin moralizarla. 'No lo sabía' mantiene la inocencia descrita y 'no se avergonzaba' conserva la ausencia de vergüenza como estado pre-caída.
  doctrine_reference: Génesis 2–3; inocencia humana antes de la caída.
- issue: Lista de criaturas protegidas del jardín
  english_pob_reading: from the birds and from the beasts and from the cattle
  chosen_spanish_reading: de las aves, de las bestias y de los animales domésticos
  alternative_spanish_readings:
  - de las aves, de las bestias y del ganado
  rationale: Se evita reducir 'cattle' a una sola palabra que pueda sonar demasiado técnica o demasiado estrecha. La triple lista se mantiene como rasgo narrativo concreto del cuidado del jardín.
  doctrine_reference: Soberanía humana delegada sobre la creación; cf. Gn 2:15.
translation_notes:
  revision_awareness: 'La redacción española incorpora la revisión más reciente del audit trail: usa un pasado simple natural para ''le instruimos'', refleja la idea de ''to do'' en el mandato y conserva ''for himself'' en ''apartaba para sí''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; aquí no aparece.
  - '''Cultivo/cultivando'' se usa de forma coherente para reflejar el campo semántico agrícola del texto.'
  - '''Jardín'' se conserva por consistencia con la tradición POB y por corresponder al término base del pasaje.'
  - No se suaviza 'bestias' a un término más moderno para no perder la triple enumeración del original.
