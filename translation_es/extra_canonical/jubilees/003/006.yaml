  - severity: low
    issue: La nota «Y él la conoció» puede leerse con connotación sexual en español.
    rationale: La nota reproduce el historial inglés, por lo que puede mantenerse, pero conviene aclarar que es una alternativa de traducción previa, no la lectura preferida del contexto.
