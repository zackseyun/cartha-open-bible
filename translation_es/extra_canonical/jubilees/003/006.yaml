translation:
  language: es
  text: 'Y él la reconoció[a] y le dijo: «Esto ahora es hueso de mis huesos y carne de mi carne. Esta será llamada mi mujer, porque fue tomada de su varón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y él la conoció».'
    reason: lectura previa de traducción; en español puede sugerir una connotación sexual que el contexto aquí no pretende
lexical_decisions:
- source_word: recognized / knew her
  english_pob_choice: recognized
  chosen_spanish: la reconoció
  alternatives_spanish:
  - la conoció
  - la supo
  lexicon: reconocer
  rationale: El ajuste inglés ya evita la connotación sexual de 'knew her'; en español, 'la reconoció' comunica adecuadamente que él identifica a la mujer como procedente de él, sin introducir una lectura sexual ajena al contexto.
- source_word: bone from my bones
  english_pob_choice: bone from my bones
  chosen_spanish: hueso de mis huesos
  alternatives_spanish:
  - osamenta de mis osamentas
  - hueso de mis huesos y carne de mi carne
  lexicon: hueso
  rationale: Conservo la fórmula semítica y su paralelismo idiomático, que en español resulta natural y transparente.
- source_word: flesh from my flesh
  english_pob_choice: flesh from my flesh
  chosen_spanish: carne de mi carne
  alternatives_spanish:
  - tejido de mi tejido
  - naturaleza de mi naturaleza
  lexicon: carne
  rationale: '''Carne'' mantiene la correspondencia directa con el término fuente y con la estructura poética del dicho.'
- source_word: my woman
  english_pob_choice: my woman
  chosen_spanish: mi mujer
  alternatives_spanish:
  - mi esposa
  - mi compañera
  lexicon: mujer
  rationale: '''Mi mujer'' reproduce el valor relacional del giro sin forzar una precisión matrimonial que el contexto inmediato no explicita con ese término.'
- source_word: taken from her man
  english_pob_choice: taken from her man
  chosen_spanish: tomada de su hombre
  alternatives_spanish:
  - tomada de su varón
  - sacada de su hombre
  lexicon: tomar
  rationale: '''Tomada de su hombre'' conserva la relación posesiva y la pasiva implícita del original, con un registro bíblico claro y entendible.'
theological_decisions:
- issue: La secuencia evita una lectura sexual implícita en 'conoció' / 'knew her'
  english_pob_reading: And he recognized her
  chosen_spanish_reading: Y él la reconoció
  alternative_spanish_readings:
  - Y él la conoció
  - Y él la supo
  rationale: La revisión inglesa aclara que el verbo es 'recognized' para no anticipar una relación sexual. La traducción española sigue esa corrección y preserva la secuencia narrativa.
  doctrine_reference: Lectura narrativa y semántica del verbo; no hay afirmación doctrinal especial, sino precisión textual.
translation_notes:
  revision_awareness: La revisión inglesa cambió 'And he knew her' por 'And he recognized her' para evitar una connotación sexual no deseada; la versión española sigue esa decisión interpretativa y mantiene el paralelismo del resto de la frase.
  spanish_consistency_notes:
  - Se usó 'mi mujer' en lugar de 'mi esposa' para mantener la correspondencia con el inglés POB y el tono formulístico del texto.
  - Se mantuvo 'hombre' en 'su hombre' porque el origen auditado apunta a la relación textual literal; 'varón' sería posible, pero aquí se priorizó la continuidad de registro bíblico en español.
  - La nota al pie se ancla en 'reconoció' para ofrecer la lectura alternativa tradicional sin favorecerla en el cuerpo del texto.
