translation:
  language: es
  text: Y durante estos cinco días, Adán los vio[a], macho y hembra, de toda especie que había sobre la tierra, pero él estaba solo, y no se halló para él una ayuda correspondiente a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El marcador remite al desajuste de numeración del texto ge''ez: el sentido incluye la observación de los seres creados como macho y hembra durante estos cinco días.'
    reason: source_note
lexical_decisions:
- source_word: during these five days
  english_pob_choice: during these five days
  chosen_spanish: durante esos cinco días
  alternatives_spanish:
  - en esos cinco días
  - a lo largo de esos cinco días
  lexicon: during
  rationale: «Durante» expresa con naturalidad el valor temporal continuativo del inglés y del trasfondo narrativo; «esos» conserva la referencia deíctica sin añadir interpretación.
- source_word: male and female
  english_pob_choice: male and female
  chosen_spanish: macho y hembra
  alternatives_spanish:
  - varón y mujer
  - masculino y femenino
  lexicon: male/female
  rationale: Se mantiene la formulación concreta del sexo biológico de los animales, que es la fuerza evidente del pasaje y de la redacción inglesa.
- source_word: of every kind that was on the earth
  english_pob_choice: of every kind that was on the earth
  chosen_spanish: de toda especie que había sobre la tierra
  alternatives_spanish:
  - de toda clase que había sobre la tierra
  - de cada especie que estaba sobre la tierra
  lexicon: kind/species
  rationale: «Especie» es la equivalencia más directa para la clasificación de criaturas; «toda» reproduce el alcance distributivo de «every kind».
- source_word: helper like him
  english_pob_choice: helper like him
  chosen_spanish: una ayuda semejante a él
  alternatives_spanish:
  - un ayudante semejante a él
  - una ayuda igual a él
  lexicon: helper / like him
  rationale: «Ayuda» conserva la tensión lexical del sustantivo, mientras que «semejante a él» refleja el paralelismo de correspondencia sin normalizarlo a una expresión más doctrinalizada.
theological_decisions:
- issue: La frase final describe la insuficiencia de cualquier correspondencia creada para Adán.
  english_pob_reading: no helper like him was found for him
  chosen_spanish_reading: no se halló para él una ayuda semejante a él
  alternative_spanish_readings:
  - no se encontró para él un ayudante semejante a él
  - no se halló para él una ayuda correspondiente a él
  rationale: Se conserva la idea de búsqueda infructuosa y de correspondencia creada, sin introducir un lenguaje más interpretativo que el del texto fuente.
  doctrine_reference: Génesis 2:18; paralelos de la creación de la pareja humana
translation_notes:
  revision_awareness: La redacción inglesa revisada aclaró el tiempo con «during these five days» y suavizó «according to every kind» a «of every kind»; la versión española sigue esa lectura más natural sin perder la literalidad semántica. También conserva la nota de segmentación porque la numeración ge'ez salta del versículo 2 al 4.
  spanish_consistency_notes:
  - Se mantiene «Adán» como nombre propio bíblico estándar.
  - Se evita «SEÑOR» o términos de sustitución innecesarios porque este versículo no contiene el Tetragrámaton ni un equivalente directo.
  - «Ayuda» se conserva para reflejar la tensión léxica del original y de la traducción inglesa; no se sustituye por una paráfrasis doméstica o conyugal.
  - La puntuación en español sigue la estructura de dos miembros coordinados con contraste final, acorde con la revisión inglesa.
