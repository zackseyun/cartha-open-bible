revisions:
- from: para comer; y tomó de él y comió. Y cubrió su vergüenza con hojas de higuera primero[a], y también se las dio a Adán, y él comió.
  to: para comer; y tomó de él y comió. Y primero[a] cubrió su vergüenza con hojas de higuera, y le dio a Adán, y él comió.
  rationale: Se eliminó «también» porque no está en el ge'ez y fue identificado como error en la auditoría inglesa; se sustituyó «se las dio» por «le dio a Adán» para evitar que el pronombre remita a las hojas de higuera; y se recolocó «primero» para un español más natural conservando el orden narrativo del original.
