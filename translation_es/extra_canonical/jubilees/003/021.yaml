translation:
  language: es
  text: para comer; y tomó de él y comió. Y primero[a] cubrió su vergüenza con hojas de higuera, y le dio a Adán, y él comió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Primero» traduce el marcador temporal ge'ez ዘቀዳሚ, que indica que ella se cubrió antes de dar a Adán.
    reason: source_temporal_marker
lexical_decisions:
- source_word: ለበሊዕ
  english_pob_choice: for food
  chosen_spanish: para comer
  alternatives_spanish:
  - como alimento
  - para alimento
  lexicon: Ge'ez ለ- + verbo de comer; función final/instrumental
  rationale: La frase introduce la finalidad del fruto en relación con la acción de comer; «para comer» comunica de forma natural la función sin añadir una explicación no presente en el texto.
- source_word: ወነሥአት፡ እምኔሁ፡ ወበልዐት
  english_pob_choice: and she took from it and ate
  chosen_spanish: y tomó de él y comió
  alternatives_spanish:
  - y lo tomó y comió
  - y tomó de él, y comió
  lexicon: Verbos de tomar/comer; pronombres de referencia al fruto
  rationale: Se conserva la secuencia verbal simple del ge'ez. «De él» hace explícita la referencia al fruto sin forzar una repetición innecesaria.
- source_word: ወከደነት፡ ኀፍረታ፡
  english_pob_choice: And she covered her shame
  chosen_spanish: Y cubrió su vergüenza
  alternatives_spanish:
  - Y cubrió su desnudez
  - Y ocultó su vergüenza
  lexicon: Cuerpo/vergüenza; expresión idiomática
  rationale: «Vergüenza» mantiene la carga moral y relacional del término tal como aparece en el auditable English POB. «Desnudez» es posible, pero el texto aquí habla de lo que cubre la vergüenza mediante hojas de higuera.
- source_word: በቈጽለ፡ በለስ፡
  english_pob_choice: with fig leaves
  chosen_spanish: con hojas de higuera
  alternatives_spanish:
  - con hojas de higuera
  - con hojas de higos
  lexicon: Botánica / objeto de cobertura
  rationale: «Hojas de higuera» es la forma idiomática y tradicional en español para esta imagen, y corresponde al referente botánico del texto.
- source_word: ዘቀዳሚ
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - primeramente
  lexicon: Marcador temporal/orden
  rationale: El revisado inglés y la revisión del texto muestran que este elemento debe conservarse. «Primero» refleja el orden temporal sin introducir inferencias adicionales.
- source_word: ወወሀበተ
  english_pob_choice: and she gave
  chosen_spanish: y también se las dio
  alternatives_spanish:
  - y se las dio también
  - y le dio
  lexicon: Verbo dar con pronombre átono
  rationale: La revisión inglesa dejó claro que «also gave» era un error; aquí se respeta el ge'ez con el valor de «dio», y «también» se entiende como la continuación de la acción respecto a Adán. El pronombre «se las» recupera las hojas/fruto según el contexto inmediato.
theological_decisions:
- issue: 'Orden de las acciones de Eva: cubrirse antes de dar a Adán'
  english_pob_reading: first covers her shame with fig leaves, then gives to Adam
  chosen_spanish_reading: primero cubre su vergüenza con hojas de higuera y después se las da a Adán
  alternative_spanish_readings:
  - y cubrió su vergüenza con hojas de higuera, y también se las dio a Adán
  - y cubrió su vergüenza con hojas de higuera, luego se las dio a Adán
  rationale: El control de revisión detectó que el ge'ez contiene un marcador de prioridad temporal («primero»). Mantener ese orden evita invertir la secuencia narrativa y respeta el matiz textual.
  doctrine_reference: Textual fidelity / narrative sequencing
translation_notes:
  revision_awareness: 'La revisión auditada corrige una falla previa del inglés POB: no debe leerse «also gave» como si modificara la secuencia principal; el ge''ez exige conservar «primero». Se ha seguido el texto fuente y el informe de revisión para mantener el orden narrativo.'
  spanish_consistency_notes:
  - Se mantiene «Adán» para el nombre propio en toda la sección.
  - «Hojas de higuera» se usa de manera uniforme como equivalencia estable de la imagen botánica.
  - La partícula temporal se expresa con «primero» para no perder el dato textual corregido por la revisión.
