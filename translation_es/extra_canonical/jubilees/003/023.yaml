  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé». No hay conflictos mayores con otros términos base. La revisión propuesta mantiene «deseo» para desire y mejora «rule over» con una formulación española más clara y fiel al sentido de dominio.
