  yaml_path: translation/extra_canonical/jubilees/003/023.yaml
  text: And the Lord cursed the serpent and was angry with it forever. And he was also angry with the woman, because she listened to the voice of the serpent and ate; and he said to her, “I will greatly multiply your sorrow and your pain; in sorrow you shall bear children, and your desire shall be for your husband, and he will rule over you.”
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:49Z'
    unchanged: false
    changes_summary: Revised ‘with the woman also he was angry’ to ‘he was also angry with the woman’ for smoother English; changed ‘your return shall be to your husband’ to ‘your desire shall be for your husband’ for lexical accuracy and to better reflect the likely source sense.
translation:
  language: es
  text: 'Yahvé maldijo a la serpiente y se airó contra ella para siempre. También se airó contra la mujer, porque escuchó la voz de la serpiente y comió; y le dijo: «Multiplicaré en gran manera tu dolor y tu sufrimiento; con dolor darás a luz hijos, y tu deseo será para tu marido, y él te dominará».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Lord
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: YHWH
  rationale: El contexto narrativo remite al nombre divino, y la norma del proyecto es usar «Yahvé» en el texto principal en lugar de una máscara reverencial. «El Señor» quedaría como una convención tradicional menos transparente.
- source_word: cursed
  english_pob_choice: cursed
  chosen_spanish: maldijo
  alternatives_spanish:
  - anatematizó
  - profirió una maldición contra
  lexicon: אָרַר / קָלַל
  rationale: «Maldijo» comunica de manera directa la acción de pronunciar maldición sin añadir carga interpretativa innecesaria.
- source_word: was angry with it forever
  english_pob_choice: was angry with it forever
  chosen_spanish: se airó contra ella para siempre
  alternatives_spanish:
  - estuvo enojado con ella para siempre
  - guardó ira contra ella para siempre
  lexicon: אף / ὀργίζομαι
  rationale: «Se airó» mantiene el registro bíblico y la fuerza afectiva de ira judicial. «Contra ella» conserva el destinatario del enojo y «para siempre» refleja la duración absoluta del enunciado.
- source_word: was also angry with the woman
  english_pob_choice: he was also angry with the woman
  chosen_spanish: También se airó contra la mujer
  alternatives_spanish:
  - y se enojó también con la mujer
  - y estuvo airado con la mujer
  lexicon: אף / ὀργίζομαι
  rationale: Se conserva la misma construcción verbal para no suavizar la reiteración y mantener el paralelismo con la frase anterior.
- source_word: listened to the voice of the serpent
  english_pob_choice: listened to the voice of the serpent
  chosen_spanish: escuchó la voz de la serpiente
  alternatives_spanish:
  - oyó la voz de la serpiente
  - dio oído a la voz de la serpiente
  lexicon: שָׁמַע
  rationale: «Escuchó» es natural en español y suficientemente fiel al acto de prestar atención obediente implícito en el hebraísmo.
- source_word: ate
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - y comió del fruto
  - y comió de él
  lexicon: אָכַל
  rationale: El texto fuente aquí, según la tradición textual del pasaje, menciona simplemente que comió; no se introduce «del fruto» porque no está explicitado en este versículo.
- source_word: I will greatly multiply
  english_pob_choice: I will greatly multiply
  chosen_spanish: Multiplicaré en gran manera
  alternatives_spanish:
  - multiplicaré muchísimo
  - aumentaré grandemente
  lexicon: הַרְבָּה אַרְבֶּה
  rationale: La duplicación intensiva se reproduce con un español natural que conserva el énfasis enfático de gran aumento.
- source_word: sorrow and your pain
  english_pob_choice: your sorrow and your pain
  chosen_spanish: tu dolor y tu sufrimiento
  alternatives_spanish:
  - tu tristeza y tu dolor
  - tu pena y tu dolor
  lexicon: עִצָּבוֹן / עֶצֶב
  rationale: Se distinguen dos términos afines sin forzar una exactitud artificial; «dolor» y «sufrimiento» comunican la carga física y existencial del castigo.
- source_word: in sorrow you shall bear children
  english_pob_choice: in sorrow you shall bear children
  chosen_spanish: con dolor darás a luz hijos
  alternatives_spanish:
  - con dolor parirás hijos
  - en dolor tendrás hijos
  lexicon: בְּעֶצֶב תֵּלְדִי בָנִים
  rationale: «Darás a luz» es idiomático y claro en español; «con dolor» preserva el complemento circunstancial de modo o acompañamiento.
- source_word: your desire shall be for your husband
  english_pob_choice: your desire shall be for your husband
  chosen_spanish: tu deseo será para tu marido
  alternatives_spanish:
  - tu anhelo será por tu marido
  - te atraerá tu marido
  lexicon: תְּשׁוּקָה
  rationale: Se sigue la revisión auditada que corrigió una paráfrasis previa. «Deseo» mantiene la tensión lexical documentada y evita domesticaciones como «atracción» o «retorno».
- source_word: he will rule over you
  english_pob_choice: he will rule over you
  chosen_spanish: él se enseñoreará de ti
  alternatives_spanish:
  - él gobernará sobre ti
  - él dominará sobre ti
  lexicon: מָשַׁל
  rationale: «Se enseñoreará de ti» conserva el matiz de dominio jerárquico tradicional del verbo, sin convertirlo en una formulación más moderna pero menos precisa como «gobernará».
theological_decisions:
- issue: Duración de la ira divina contra la serpiente
  english_pob_reading: was angry with it forever
  chosen_spanish_reading: se airó contra ella para siempre
  alternative_spanish_readings:
  - estuvo enojado con ella para siempre
  - guardó ira contra ella para siempre
  rationale: La frase expresa un juicio permanente, no un enojo pasajero. «Para siempre» mantiene la duración absoluta sin atenuarla.
  doctrine_reference: Génesis 3:14; Jubileos 3:23
- issue: La relación entre deseo y sujeción en la mujer
  english_pob_reading: your desire shall be for your husband, and he will rule over you
  chosen_spanish_reading: tu deseo será para tu marido, y él se enseñoreará de ti
  alternative_spanish_readings:
  - tu anhelo será por tu marido, y él gobernará sobre ti
  - tu deseo será hacia tu marido, y él dominará sobre ti
  rationale: Se conserva la tensión entre el deseo dirigido al marido y la afirmación del dominio masculino. No se suaviza «se enseñoreará», porque el texto presenta una asimetría real que debe permanecer visible.
  doctrine_reference: Génesis 3:16; Jubileos 3:23
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se adopta la fórmula «tu deseo será para tu marido» en lugar de la lectura anterior «tu retorno será a tu marido», porque la revisión la consideró más exacta lexicalmente y más cercana al sentido probable del original. No se añaden notas textuales porque el expediente no documenta variantes adicionales ni notas previas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se conserva el paralelismo verbal «se airó» en ambas cláusulas para reflejar la repetición del original y del inglés POB.
  - «Marido» se usa de forma consistente en esta perícopa por el contexto matrimonial inmediato.
  - No se introdujo ninguna referencia al fruto ni a la escena de Edén más allá de lo explícito en este versículo.
