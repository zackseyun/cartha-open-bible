lexical_decisions:
- source_word: But
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: conector adversativo
  rationale: Introduce la contraposición de manera natural en español, manteniendo el giro argumentativo del texto.
- source_word: to Adam alone
  english_pob_choice: to Adam alone
  chosen_spanish: a Adán solo
  alternatives_spanish:
  - solo a Adán
  - únicamente a Adán
  lexicon: nombre propio + exclusividad
  rationale: Conserva la exclusividad marcada por 'alone' sin añadir matices interpretativos.
- source_word: from among all the beasts and cattle
  english_pob_choice: from among all the beasts and cattle
  chosen_spanish: de entre todas las bestias y el ganado
  alternatives_spanish:
  - entre todas las bestias y el ganado
  - de entre todos los animales y el ganado
  lexicon: preposición partitiva
  rationale: '''De entre'' expresa mejor la selección dentro de un grupo; ''bestias y el ganado'' conserva la distinción lexical del inglés POB.'
- source_word: gave the means
  english_pob_choice: he gave the means
  chosen_spanish: le dio los medios
  alternatives_spanish:
  - le dio la capacidad
  - le dio la posibilidad
  lexicon: idioma de capacidad/provisión
  rationale: '''Los medios'' reproduce con fidelidad el valor de provisión o capacidad sin forzar una paráfrasis más explicativa de la que el texto exige.'
- source_word: to cover his shame
  english_pob_choice: to cover his shame
  chosen_spanish: para cubrir su vergüenza
  alternatives_spanish:
  - para cubrir su deshonra
  - para cubrir su desnudez y su vergüenza
  lexicon: verbal purpose + shame
  rationale: '''Vergüenza'' conserva el alcance moral/social del sustantivo inglés; no se explicita ''desnudez'' porque el verso inglés no lo menciona de forma directa.'
translation_notes:
  revision_awareness: La revisión reciente solo ajustó la colocación de la frase partitiva en inglés para evitar ambigüedad sintáctica; el español ya reproduce esa relación de manera clara con 'de entre todas las bestias y el ganado', por lo que no requiere nota adicional.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, sin introducir terminología eclesiástica ajena al pasaje.
  - No se usan formas de nombre divino ni títulos cristológicos en este verso; por tanto, no hay decisiones terminológicas de ese tipo.
  - La estructura española conserva la exclusividad de 'solo' y la relación partitiva de 'de entre' sin depender de una nota al pie.
