    changes_summary: Added a comma after the introductory phrase for clearer, more natural English. No lexical changes were needed.
translation:
  language: es
  text: Y en la primera semana del primer jubileo, Adán y su mujer estuvieron en el jardín de Edén siete años, labrándolo y cuidándolo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: first week
  english_pob_choice: the first week
  chosen_spanish: la primera semana
  alternatives_spanish:
  - la semana primera
  lexicon: week → semana
  rationale: Mantiene el orden natural del español y conserva el valor cronológico exacto del original sin añadir interpretación.
- source_word: first jubilee
  english_pob_choice: the first jubilee
  chosen_spanish: primer jubileo
  alternatives_spanish:
  - jubileo primero
  lexicon: jubilee → jubileo
  rationale: ‘Jubileo’ es el préstamo técnico adecuado en español bíblico; ‘primer’ suena más natural que ‘primero’ antes del sustantivo.
- source_word: Adam
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: proper name → Adán
  rationale: Se usa la forma española establecida del nombre propio bíblico.
- source_word: his wife
  english_pob_choice: his wife
  chosen_spanish: su mujer
  alternatives_spanish:
  - su esposa
  lexicon: wife → mujer / esposa
  rationale: ‘Mujer’ refleja el uso bíblico sencillo y directo; ‘esposa’ sería igualmente posible, pero introduce un registro más interpretativo y menos textual.
- source_word: garden of Eden
  english_pob_choice: the garden of Eden
  chosen_spanish: el jardín de Edén
  alternatives_spanish:
  - el huerto de Edén
  lexicon: garden → jardín / huerto
  rationale: ‘Jardín de Edén’ es la forma más transparente y ampliamente inteligible en español; se conserva el nombre propio ‘Edén’.
- source_word: for seven years
  english_pob_choice: for seven years
  chosen_spanish: siete años
  alternatives_spanish:
  - por siete años
  - durante siete años
  lexicon: for + time → durante / en
  rationale: La duración queda clara en español sin necesidad de preposición explícita; el contexto ya indica permanencia temporal.
- source_word: tilling
  english_pob_choice: tilling
  chosen_spanish: labrándolo
  alternatives_spanish:
  - cultivándolo
  - trabajándolo
  lexicon: to till → labrar
  rationale: ‘Labrar’ conserva bien la idea agrícola del trabajo de la tierra y es más preciso que un genérico ‘trabajar’.
- source_word: keeping
  english_pob_choice: keeping it
  chosen_spanish: y cuidándolo
  alternatives_spanish:
  - y guardándolo
  - y cultivándolo
  lexicon: to keep → cuidar / guardar
  rationale: ‘Cuidarlo’ comunica la función de atender y preservar el lugar; ‘guardarlo’ podría sonar menos natural en español moderno para un jardín.
theological_decisions:
- issue: Duración y actividad humana en el jardín
  english_pob_reading: Adam and his wife were in the garden of Eden for seven years, tilling and keeping it.
  chosen_spanish_reading: Adán y su mujer estuvieron en el jardín de Edén siete años, labrándolo y cuidándolo.
  alternative_spanish_readings:
  - Adán y su mujer estuvieron en el jardín de Edén por siete años, labrándolo y guardándolo.
  rationale: La frase española conserva la simple afirmación temporal y laboral del pasaje sin añadir lecturas alegóricas. No se intensifica ni se suaviza la descripción del trabajo humano en el jardín.
  doctrine_reference: Génesis 2:15; Jubileos 3:15
translation_notes:
  revision_awareness: El texto inglés revisado solo añadió una coma tras la frase introductoria; no hubo cambios léxicos ni de sentido. En español se reflejó con una coma después de ‘jubileo’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton según las normas del proyecto, pero este versículo no lo contiene.
  - 'Se conservan los nombres propios bíblicos en formas españolas estándar: ‘Adán’ y ‘Edén’.'
  - No se introduce puntuación o léxico que altere la relación simple entre permanencia temporal y actividad agrícola.
