lexical_decisions:
- source_word: ወሰመዮሙ / gave names
  english_pob_choice: gave names
  chosen_spanish: les puso nombres
  alternatives_spanish:
  - les dio nombres
  - les nombró
  lexicon: dar nombre / poner nombre
  rationale: En español, 'poner nombres' expresa de manera natural el acto de asignar nombres propios. Mantiene el sentido agentivo del texto sin forzar una construcción más pesada.
- source_word: ለኵሎሙ / to them all
  english_pob_choice: to them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a todos, sin excepción
  lexicon: totalidad
  rationale: '''A todos'' transmite bien la totalidad inclusiva del original y fluye de forma natural en español bíblico contemporáneo.'
- source_word: '*በበ፡ አስማቲሆሙ / each by its own name'
  english_pob_choice: each by its own name
  chosen_spanish: a cada uno según su propio nombre
  alternatives_spanish:
  - cada uno por su propio nombre
  - cada uno con su propio nombre
  lexicon: según / conforme a
  rationale: '''Según su propio nombre'' conserva la idea de correspondencia individual sin volverla mecánica; evita ambigüedad y respeta la distribución uno a uno.'
- source_word: ወበከመ / and as
  english_pob_choice: and as
  chosen_spanish: y como
  alternatives_spanish:
  - y según como
  - y del modo en que
  lexicon: comparative particle
  rationale: '''Y como'' reproduce la comparación del original con una forma idiomática y breve en español.'
- source_word: called them / he called them
  english_pob_choice: he called them
  chosen_spanish: los llamó
  alternatives_spanish:
  - los nombró
  - los designó
  lexicon: llamar / nombrar
  rationale: '''Llamó'' mantiene la referencia a la acción de nombrar sin introducir un matiz administrativo o técnico que no está en el texto.'
- source_word: so was their name
  english_pob_choice: so was their name
  chosen_spanish: así fue su nombre
  alternatives_spanish:
  - así era su nombre
  - de ese modo fue su nombre
  lexicon: correspondencia nominal
  rationale: La formulación conserva la equivalencia entre el acto de Adán y el estado resultante del nombre, con una sintaxis natural en español.
theological_decisions:
- issue: Naming as an act of dominion/order over the creatures
  english_pob_reading: The verse simply states the naming act without adding interpretive expansion.
  chosen_spanish_reading: El versículo presenta solo el acto de poner nombres, sin ampliar su significado.
  alternative_spanish_readings:
  - Adán les impuso nombres como señal de dominio
  - Adán les asignó nombres como acto de autoridad
  rationale: Evita introducir una interpretación teológica que el texto no explicita. La función narrativa del nombrar queda intacta sin sobrecargarla con comentario.
  doctrine_reference: Génesis 2:19-20 (contexto narrativo de nombrar)
translation_notes:
