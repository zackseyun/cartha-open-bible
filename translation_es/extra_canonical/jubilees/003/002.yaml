  spanish_consistency_notes:
  - Se mantiene 'Adán' como nombre propio establecido en español.
  - Se evita 'SEÑOR' u otra terminología no pertinente, ya que el versículo no contiene el tetragrámaton ni un título divino.
  - La sintaxis conserva el paralelismo breve del original con una cadencia bíblica clara y publicable.
