base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/003/010.yaml
  text: 'Therefore the commandment was written on the heavenly tablets concerning her who gives birth: if she bears a male, she shall remain in her uncleanness seven days, according to the first seven days, and thirty-three days she shall remain in the blood of purification; she shall touch nothing holy, and she shall not enter the sanctuary until she completes these days for a male child.'
  footnotes:
  - marker: a
    text: Or 'she shall not enter the sanctuary'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:49Z'
    unchanged: false
    changes_summary: Removed the unnecessary 'which are' to make the final clause more natural while preserving the source meaning.
translation:
  language: es
  text: 'Por lo tanto, el mandamiento fue escrito en las tablas celestiales acerca de la que da a luz: si da a luz un varón, permanecerá en su impureza siete días, según los siete primeros días, y durante treinta y tres días permanecerá en la sangre de la purificación; no tocará cosa santa, y no entrará en el santuario hasta que complete estos días por el nacimiento de un hijo varón.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: commandment
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el precepto
  - la ordenanza
  lexicon: Lexical decision based on the source sense of an authoritative enacted requirement; 'mandamiento' is transparent and matches biblical register in Spanish.
  rationale: Conserva el valor normativo del término sin cargarlo con una formulación más interpretativa como 'ordenanza'.
- source_word: heavenly tablets
  english_pob_choice: the heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas del cielo
  - las tablas celestiales
  lexicon: Proper expression from Jubilees tradition for the heavenly record/tablets; Spanish preserves the concrete plural noun.
  rationale: Mantiene la imagen técnica del texto de Jubileos sin convertirla en una paráfrasis.
- source_word: she who gives birth
  english_pob_choice: her who gives birth
  chosen_spanish: la que da a luz
  alternatives_spanish:
  - la que pare
  - la parturienta
  lexicon: Participial relative phrase; neutral, direct Spanish rendering.
  rationale: Expresa la referencia general de mujer en parto sin añadir matices no presentes en el texto.
- source_word: she bears a male
  english_pob_choice: if she bears a male
  chosen_spanish: si da a luz un varón
  alternatives_spanish:
  - si pare un varón
  - si tiene un hijo varón
  lexicon: Birth-language idiom preserved with 'varón' for male child.
  rationale: '''Da a luz'' refleja bien el evento de parto; ''varón'' conserva la distinción sexual explícita del original.'
- source_word: uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia ritual
  - impureza ritual
  lexicon: Levitical purity term rendered with the standard Spanish noun.
  rationale: '''Impureza'' es el equivalente más claro y evita imponer una glosa técnica que el verso no explicita.'
- source_word: blood of purification
  english_pob_choice: blood of purification
  chosen_spanish: la sangre de la purificación
  alternatives_spanish:
  - la sangre de la limpieza
  - la sangre purificadora
  lexicon: Genitive construction kept close to the source; 'purificación' preserves ritual sense.
  rationale: Mantiene la formulación sustantiva del original y el lenguaje ceremonial del pasaje.
- source_word: holy
  english_pob_choice: holy
  chosen_spanish: cosa santa
  alternatives_spanish:
  - lo santo
  - cosa sagrada
  lexicon: Indefinite neuter object rendered with a natural Spanish phrase.
  rationale: '''Cosa santa'' reproduce la amplitud del término sin especificar un objeto particular.'
- source_word: sanctuary
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - sagrario
  lexicon: Cultic locale term kept as 'santuario' for broad biblical readability.
  rationale: Evita 'templo' por ser más específico y 'sagrario' por sonar más eclesial que textual.
- source_word: until she completes these days for a male child
  english_pob_choice: until she completes these days for a male child
  chosen_spanish: hasta que complete estos días para un hijo varón
  alternatives_spanish:
  - hasta que cumpla estos días para un hijo varón
  - hasta que termine estos días por un hijo varón
  lexicon: Final temporal clause rendered with close syntactic correspondence.
  rationale: Conserva la relación entre los días prescritos y el niño varón sin añadir explicación interpretativa.
theological_decisions:
- issue: Ritual purity language
  english_pob_reading: she shall remain in her uncleanness... in the blood of purification
  chosen_spanish_reading: permanecerá en su impureza... permanecerá en la sangre de la purificación
  alternative_spanish_readings:
  - estará inmunda... estará en la sangre de la purificación
  - quedará en impureza...
  rationale: Se mantiene la tensión ritual del texto sin suavizarla a un lenguaje meramente higiénico o metafórico.
  doctrine_reference: Levítico 12:2-4; Jubileos 3:10
- issue: Access to sacred space
  english_pob_reading: she shall touch nothing holy, and she shall not enter the sanctuary
  chosen_spanish_reading: no tocará cosa santa, y no entrará en el santuario
  alternative_spanish_readings:
  - no tocará nada santo, y no entrará en el santuario
  - no tocará lo santo, y no entrará en el santuario
  rationale: Se conserva la restricción cultual sin reinterpretarla; 'cosa santa' keeps the indefinite scope of the source.
  doctrine_reference: Levítico 12:4; Jubileos 3:10
- issue: Temporal completion clause
  english_pob_reading: until she completes these days for a male child
  chosen_spanish_reading: hasta que complete estos días para un hijo varón
  alternative_spanish_readings:
  - hasta que cumpla estos días para un hijo varón
  - hasta que termine estos días para un hijo varón
  rationale: La cláusula final del texto revisado se conserva íntegramente y se expresa de forma natural en español.
  doctrine_reference: Jubileos 3:10
translation_notes:
  revision_awareness: This draft follows the latest revised English POB wording, including the corrected final clause 'until she completes these days for a male child' and does not restore the earlier shorter reading. No footnote is needed because the Spanish text can reflect the final audit-trail wording directly without a live textual alternative in the verse.
  spanish_consistency_notes:
  - Se mantiene 'santuario' para la terminología cultual de Jubileos.
  - Se usa 'impureza' y 'purificación' para preservar el marco ritual sin modernización excesiva.
  - Se evita 'SEÑOR' u այլ masking conventions porque el verso no contiene el nombre divino.
  - Se conserva el paralelismo de las dos cláusulas temporales con 'siete días' y 'treinta y tres días'.
