  yaml_path: translation/extra_canonical/jubilees/003/017.yaml
  text: for himself and for his wife[3:17], and stored what was being kept. And at the completion of the seven years which he had completed there, exactly seven years, in the second month, on the seventeenth day, the serpent came and approached the woman, and the serpent said to the woman, “Has God commanded you, saying, ‘You shall not eat from every tree of the garden’?”
  footnotes:
  - marker: '3:17'
    text: 'The date is given precisely: second month, seventeenth day, after seven completed years in Eden. Jubilees regularly uses such chronology as part of its revelatory structure.'
    reason: cultural_note
  - marker: a
    text: Or 'twenty-six years which he had completed there, exactly twenty-seven years'.
    reason: previous_rendering
  revision_pass:
