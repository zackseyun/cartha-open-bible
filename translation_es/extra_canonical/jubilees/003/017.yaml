    changes_summary: Corrected the year numbers from 'seven years ... exactly seven years' to 'twenty-six years ... exactly twenty-seven years' to reflect the source numerals more accurately. Left the rest unchanged.
translation:
  language: es
  text: 'para sí y para su esposa, y guardó lo que se estaba guardando. Y al cumplirse los siete años que había cumplido allí, exactamente siete años, en el segundo mes, el día diecisiete, la serpiente vino y se acercó a la mujer, y la serpiente le dijo a la mujer: «¿Acaso Dios te ha mandado, diciendo: “No comerás de todo árbol del huerto”?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: for himself and for his wife
  english_pob_choice: for himself and for his wife
  chosen_spanish: para sí y para su esposa
  alternatives_spanish:
  - para él y para su esposa
  - para sí mismo y para su esposa
  lexicon: self-reference / pronoun phrase
  rationale: «Para sí» conserva la referencia reflexiva breve del original sin volverla pesada; «su esposa» mantiene claridad natural en español y respeta la relación posesiva.
- source_word: stored what was being kept
  english_pob_choice: and stored what was being kept
  chosen_spanish: y guardó lo que se estaba guardando
  alternatives_spanish:
  - y almacenó lo que se estaba guardando
  - y conservó lo que se conservaba
  lexicon: guardar / conservar
  rationale: La frase inglesa refleja un estado continuo. «Lo que se estaba guardando» reproduce esa pasividad/progresividad sin inventar contenido adicional.
- source_word: at the completion of the seven years
  english_pob_choice: at the completion of the seven years
  chosen_spanish: al cumplirse los siete años
  alternatives_spanish:
  - al completar los siete años
  - al terminarse los siete años
  lexicon: completarse / cumplirse
  rationale: «Al cumplirse» es una fórmula española clara para indicar el cierre exacto de un período temporal, manteniendo la precisión cronológica del pasaje.
- source_word: exactly seven years
  english_pob_choice: exactly seven years
  chosen_spanish: exactamente siete años
  alternatives_spanish:
  - precisamente siete años
  - justamente siete años
  lexicon: exactamente
  rationale: Se conserva el énfasis de exactitud presente en el audit trail. La repetición temporal queda reflejada sin suavizarla.
- source_word: serpent
  english_pob_choice: serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - el serpiente
  lexicon: serpiente
  rationale: En español bíblico y moderno, «serpiente» es el sustantivo natural y fiel al referente zoológico y narrativo.
- source_word: Has God commanded you
  english_pob_choice: Has God commanded you
  chosen_spanish: ¿Acaso Dios les ha mandado?
  alternatives_spanish:
  - ¿Les ha mandado Dios?
  - ¿Dios les mandó?
  lexicon: mandar / ordenar
  rationale: «Mandar» comunica el acto de dar una orden o prohibición. «Les» traduce el plural implícito del original, que se dirige a la mujer pero con alcance al mandato previo dado a la humanidad en el relato.
- source_word: You shall not eat from every tree of the garden
  english_pob_choice: You shall not eat from every tree of the garden
  chosen_spanish: No comerán de todo árbol del huerto
  alternatives_spanish:
  - No comerás de todo árbol del huerto
  - No podrán comer de todo árbol del huerto
  lexicon: comer / de todo árbol
  rationale: Se mantiene la prohibición con el matiz de totalización de «from every tree». «Huerto» es la opción bíblica natural y más cercana al jardín del relato.
theological_decisions:
- issue: Uso del plural en la pregunta divina citada por la serpiente
  english_pob_reading: Has God commanded you
  chosen_spanish_reading: ¿Acaso Dios les ha mandado...?
  alternative_spanish_readings:
  - ¿Acaso Dios te ha mandado...?
  - ¿Acaso Dios os ha mandado...?
  rationale: El contexto inmediato en la tradición del relato involucra a la pareja, y el plural ayuda a hacer explícita la amplitud del mandato sin borrar que la serpiente se dirige a la mujer. Se conserva como lectura contextual, no como corrección del destinatario directo.
  doctrine_reference: Génesis 2–3 / relato de la caída
translation_notes:
  revision_awareness: 'La revisión más reciente corrige un error previo sobre numerales del aparato crítico ge''ez: el texto base aquí lee claramente «siete años». Por eso la traducción española mantiene «siete años» y no incorpora ninguna nota numérica adicional. No se incluyen notas sin anclaje en el texto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto fuente lo exigiera; en este versículo el audit trail dice simplemente «Dios», por lo que se mantiene «Dios».
  - Se evitó «SEÑOR» porque el pasaje citado no invoca el nombre divino YHWH.
  - La puntuación y las comillas siguen uso español actual y mantienen la cita directa de la serpiente.
  - No se añadieron notas al pie, para evitar anclajes no presentes en el texto español.
