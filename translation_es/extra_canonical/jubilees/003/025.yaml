translation:
  language: es
  text: Y les hizo prendas de piel, los vistió y los envió fuera del jardín de Edén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: garments of skin
  english_pob_choice: garments of skin
  chosen_spanish: vestidos de piel
  alternatives_spanish:
  - ropas de piel
  - prendas de piel
  lexicon: vestidos / piel
  rationale: Conserva la imagen concreta de prendas hechas de piel sin introducir una interpretación más específica que la del texto fuente. 'Vestidos' suena natural en español bíblico y mantiene la referencia material.
- source_word: clothed them
  english_pob_choice: clothed them
  chosen_spanish: los vistió
  alternatives_spanish:
  - los cubrió con ellas
  - los revistió
  lexicon: vestir
  rationale: '''Vistió'' reproduce el acto de proveer y poner la ropa sobre ellos con un verbo directo y claro en español.'
- source_word: garden of Eden
  english_pob_choice: garden of Eden
  chosen_spanish: jardín de Edén
  alternatives_spanish:
  - huerto de Edén
  lexicon: jardín/huerto
  rationale: '''Jardín de Edén'' es inteligible y estándar en español moderno; se evita ''huerto'' porque aquí el énfasis recae en el lugar narrativo ya conocido, no en una variante agrícola del término.'
theological_decisions:
- issue: Agencia divina implícita en el sujeto
  english_pob_reading: And he made... and clothed them, and sent them out...
  chosen_spanish_reading: Y le hizo... los vistió y los expulsó...
  alternative_spanish_readings:
  - Y él hizo...
  - Y Dios hizo...
  rationale: Se mantiene el sujeto implícito como en la fuente y en la POB inglesa, sin añadir un nombre divino que el versículo no explicita en esta forma breve.
  doctrine_reference: narrative economy; no explicit divine-name expansion
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente, que movió ''garments of skin'' a una colocación más natural: ''And he made garments of skin for them''. En español se conserva esa misma relación directa con ''les hizo vestidos de piel''.'
  spanish_consistency_notes:
  - 'Se conserva el orden narrativo simple: hacer, vestir, expulsar.'
  - No se introduce un equivalente tradicional como 'Jehová' o 'SEÑOR' porque el texto fuente no lo exige aquí.
  - El tono es bíblico pero contemporáneo, sin arcaísmos innecesarios.
