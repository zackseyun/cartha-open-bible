  text: 'Therefore the statute of these days was ordained for her who bears a male or a female: she shall touch nothing holy, nor enter the sanctuary, until'
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:34:07Z'
    unchanged: false
    changes_summary: Reordered the opening for more natural English while preserving the source sense, and rendered the final phrase as an incomplete clause with 'until' to reflect the verse's continuation in the next line.
translation:
  language: es
  text: 'Por tanto, el estatuto de estos días fue establecido para la que da a luz un varón o una mujer: no tocará nada santo, ni entrará en el santuario, hasta'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: statute of these days
  english_pob_choice: the statute of these days
  chosen_spanish: el estatuto de estos días
  alternatives_spanish:
  - la norma de estos días
  - la disposición de estos días
  lexicon: statute → estatuto
  rationale: «Estatuto» conserva el valor jurídico-normativo del término sin diluirlo en un sentido meramente general como «norma». Mantiene la formulación temporal vinculada a estos días rituales.
- source_word: for her who bears a male or a female
  english_pob_choice: for her who bears a male or a female
  chosen_spanish: para la que da a luz un varón o una mujer
  alternatives_spanish:
  - para la que engendra un varón o una mujer
  - para la que pare un varón o una mujer
  lexicon: bears → da a luz / pare
  rationale: El contexto de pureza posparto exige un verbo de parto. «Da a luz» es claro y digno en español actual; conserva la referencia biológica sin añadir interpretación.
- source_word: holy
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - consagrado
  - sagrado
  lexicon: holy → santo
  rationale: «Santo» es el equivalente más directo y usual en lenguaje bíblico para cosas apartadas para Dios; evita una expansión innecesaria.
- source_word: sanctuary
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto santo
  lexicon: sanctuary → santuario
  rationale: «Santuario» reproduce el espacio cultual del original y coincide con el uso técnico bíblico de un lugar de acceso restringido.
theological_decisions:
- issue: Pureza ritual de la parturienta y restricción de acceso
  english_pob_reading: she shall touch nothing holy, nor enter the sanctuary, until
  chosen_spanish_reading: no tocará nada santo, ni entrará en el santuario, hasta
  alternative_spanish_readings:
  - no tocará cosa santa, ni entrará en el santuario, hasta
  - no tocará nada consagrado, ni entrará en el santuario, hasta
  rationale: Se mantiene la doble restricción ritual con sintaxis española natural. La cláusula final queda abierta con «hasta» porque el verso continúa en la línea siguiente del texto fuente, tal como refleja la revisión inglesa.
  doctrine_reference: Levítico 12; pureza ritual posparto
translation_notes:
  revision_awareness: La versión inglesa revisada reordenó la apertura para mayor naturalidad y dejó la cláusula final abierta con «until» porque el versículo continúa; la traducción española imita esa apertura incompleta con «hasta» sin añadir contenido inexistente.
  spanish_consistency_notes:
  - Se conserva el tono jurídico-ritual del pasaje mediante «estatuto», «santo» y «santuario».
  - Se evita traducir mecánicamente con calcos de orden inglés; el español mantiene una cadencia natural sin perder la estructura normativa.
  - No se añaden notas al pie porque el fragmento dado termina en una cláusula incompleta y no hay alternativa textual documentada que requiera marcador.
