    issue: Posible preferencia estilística entre 'vendrán a ser' y 'llegarán a ser'.
    rationale: Es una cuestión de fluidez moderna, no de fidelidad ni de claridad sustancial. La forma actual sigue siendo natural y digna en español bíblico contemporáneo.
