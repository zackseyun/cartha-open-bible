    changes_summary: Adjusted the opening for smoother formal English and changed 'join himself to' to 'join to' to better match a direct, non-paraphrastic rendering.
translation:
  language: es
  text: Por tanto, un hombre y una mujer serán uno; por tanto, un hombre dejará a su padre y a su madre y se unirá a su esposa, y vendrán a ser una sola carne.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: a man and a woman shall be one
  english_pob_choice: a man and a woman shall be one
  chosen_spanish: un hombre y una mujer serán uno
  alternatives_spanish:
  - el hombre y la mujer serán uno
  - un hombre y una mujer serán una sola cosa
  lexicon: one
  rationale: Conservo la formulación relacional y compacta del inglés POB sin explicitar más de lo que el contexto permite; en español, 'serán uno' reproduce bien la unidad matrimonial y evita añadir un sustantivo no presente en el fuente.
- source_word: join to his wife
  english_pob_choice: join to his wife
  chosen_spanish: se unirá a su esposa
  alternatives_spanish:
  - se juntará con su esposa
  - se adherirá a su esposa
  lexicon: join
  rationale: '''Unirse a'' transmite la unión matrimonial con naturalidad en español y mantiene la fuerza relacional del verbo sin convertirlo en una paráfrasis más interpretativa.'
- source_word: one flesh
  english_pob_choice: one flesh
  chosen_spanish: una sola carne
  alternatives_spanish:
  - una carne
  - un solo cuerpo
  lexicon: flesh
  rationale: '''Carne'' conserva la resonancia semítica y bíblica de la frase; ''una sola carne'' es la equivalencia idiomática más clara en español y mantiene la tensión entre unidad personal y corporal.'
theological_decisions:
- issue: Unidad matrimonial y separación de la familia de origen
  english_pob_reading: Therefore a man shall leave his father and his mother and join to his wife
  chosen_spanish_reading: Por tanto, un hombre dejará a su padre y a su madre y se unirá a su esposa
  alternative_spanish_readings:
  - dejará a su padre y a su madre y se pegará a su esposa
  - dejará a su padre y a su madre y se allegará a su esposa
  rationale: Mantengo el movimiento de salida de la casa paterna y la adhesión matrimonial como dos actos coordinados. 'Se unirá' preserva la imagen bíblica sin usar un registro excesivamente técnico o arcaico.
  doctrine_reference: Génesis 2:24; Mateo 19:5; Efesios 5:31
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'join himself to' a 'join to' para evitar una formulación reflexiva innecesaria. La versión española sigue esa decisión con 'se unirá a', sin añadir reflexividad explícita adicional. No había notas en el POB inglés, por lo que no se introducen notas textuales nuevas.
  spanish_consistency_notes:
  - Uso 'esposa' en lugar de 'mujer' en la segunda mitad para distinguir a la cónyuge del femenino inicial y evitar ambigüedad en español.
  - Mantengo 'una sola carne' como fórmula bíblica estable y publicable.
  - No introduzco mayúsculas teológicas porque el versículo no contiene nombres divinos ni títulos que las requieran.
