    unchanged: false
    changes_summary: Smoothed the final clause for more natural English and closer alignment with the source by removing the awkward inserted 'for' after 'keep' while preserving the male/female impurity periods.
translation:
  language: es
  text: En la primera semana fue creado Adán[a], y la costilla —su esposa— fue hecha; y en la segunda semana se la mostró a Adán. Por eso se dio el mandamiento de guardar siete días por el nacimiento de un varón, y dos semanas de días por el de una mujer, en impureza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El capítulo relaciona la entrada diferida de Adán y de la mujer en Edén con los posteriores periodos de impureza posparto para el nacimiento de varón y de mujer.
    reason: cross_reference
lexical_decisions:
- source_word: “In the first week”
  english_pob_choice: In the first week
  chosen_spanish: En la primera semana
  alternatives_spanish:
  - En la primera septena
  - En la primera semana de siete días
  lexicon: N/A
  rationale: «Semana» comunica de forma natural el período de siete días; «septena» sería más técnico y menos transparente para lectura pública.
- source_word: Adam
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: N/A
  rationale: Nombre propio bíblico normalizado en español.
- source_word: the rib—his wife—
  english_pob_choice: the rib—his wife—
  chosen_spanish: la costilla —su esposa—
  alternatives_spanish:
  - la costilla —su mujer—
  - la costilla, es decir, su esposa
  lexicon: N/A
  rationale: Conserva la apposición explicativa y el vínculo inmediato entre la costilla y la mujer formada de ella, sin suavizar la imagen del texto.
- source_word: was made
  english_pob_choice: was made
  chosen_spanish: fue hecha
  alternatives_spanish:
  - fue formada
  - fue creada
  lexicon: N/A
  rationale: «Hecha» reproduce la pasiva sencilla del inglés y mantiene la neutralidad del acto de formación sin añadir precisión no explicitada por el audit trail.
- source_word: in the second week he showed her to him
  english_pob_choice: in the second week he showed her to him
  chosen_spanish: en la segunda semana se la mostró
  alternatives_spanish:
  - en la segunda semana se la presentó
  - en la segunda semana la mostró ante él
  lexicon: N/A
  rationale: «Se la mostró» conserva el doble objeto y la relación de presentación sin introducir destinatarios adicionales.
- source_word: the command was given
  english_pob_choice: Therefore the command was given
  chosen_spanish: se dio el mandamiento
  alternatives_spanish:
  - se dio la orden
  - se dio el mandato
  lexicon: N/A
  rationale: «Mandamiento» preserva el carácter normativo del texto y refleja la formulación tradicional, pero sin recurrir a sustituciones que cambien el sentido legal del pasaje.
- source_word: keep seven days ... and two weeks of days
  english_pob_choice: keep seven days ... two weeks of days
  chosen_spanish: guardar siete días ... dos semanas de días
  alternatives_spanish:
  - observar siete días ... dos semanas de días
  - guardar siete días ... catorce días
  lexicon: N/A
  rationale: «Dos semanas de días» sigue de cerca la expresión del original/audit trail y mantiene la correspondencia paralela con «siete días»; se evita simplificar a «catorce días» para no nivelar la forma del texto.
- source_word: male / female
  english_pob_choice: male / female
  chosen_spanish: varón / mujer
  alternatives_spanish:
  - macho / hembra
  - hombre / mujer
  lexicon: N/A
  rationale: «Varón» y «mujer» son naturales en español bíblico y conservan la referencia sexual-biológica del contexto de nacimiento/impureza sin sonar deshumanizantes.
- source_word: impurity
  english_pob_choice: in impurity
  chosen_spanish: en impureza
  alternatives_spanish:
  - en estado de impureza
  - impuro
  lexicon: N/A
  rationale: «En impureza» mantiene la abstracción del sustantivo y refleja la categoría ritual sin transformar el término en un adjetivo moral.
theological_decisions:
- issue: Periodo de impureza posparto vinculado tipológicamente con Génesis/parto
  english_pob_reading: The chapter links Adam's and the woman's delayed entrance into Eden with later postpartum impurity periods for male and female births.
  chosen_spanish_reading: El capítulo vincula la entrada diferida de Adán y la mujer en Edén con los posteriores periodos de impureza tras el nacimiento de varón y de mujer.
  alternative_spanish_readings:
  - El capítulo relaciona la demora de Adán y la mujer para entrar en Edén con las posteriores impurezas posparto de varón y mujer.
  - El capítulo alude a una conexión entre Edén y los periodos de impureza después del parto.
  rationale: La redacción mantiene explícita la conexión tipológica indicada por el audit trail inglés sin ampliar la explicación más allá de lo documentado.
  doctrine_reference: Tipología narrativa; pureza ritual en relación con nacimiento (sin emitir juicio doctrinal adicional).
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa, que suavizó el cierre a «the command was given to keep seven days for a male, and two weeks of days for a female, in impurity», por lo que el español evita añadidos innecesarios y conserva la estructura final simple y normativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - «Impureza» se usa en sentido ritual, no moral.
  - La nota [a] se ancla en «Adán[a]» para reflejar la observación tipológica del audit trail.
