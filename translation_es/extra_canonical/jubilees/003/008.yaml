revisions:
- from: En la primera semana fue creado Adán[a], y la costilla —su esposa— fue hecha; y en la segunda semana se la mostró. Por eso se dio el mandamiento de guardar siete días para un varón, y dos semanas de días para una mujer, en impureza.
  to: En la primera semana fue creado Adán[a], y la costilla —su esposa— fue hecha; y en la segunda semana se la mostró a Adán. Por eso se dio el mandamiento de guardar siete días por el nacimiento de un varón, y dos semanas de días por el de una mujer, en impureza.
  rationale: Se corrige una ambigüedad pronominal importante al explicitar «a Adán», se mejora la naturalidad contextual de la cláusula legal sin apartarse del sentido auditado, y se ajusta la nota para reflejar con precisión la explicación documentada en el POB inglés.
