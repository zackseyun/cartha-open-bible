translation:
  language: es
  text: '…del jardín, Dios les mandó, diciendo: “No coman de él”. Y ella le dijo: “De todo el fruto de los árboles del jardín Dios nos dijo: ‘Coman’; pero del fruto del árbol que está en medio del jardín,”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ገነት / garden
  english_pob_choice: garden
  chosen_spanish: jardín
  alternatives_spanish:
  - huerto
  - jardín del Edén
  lexicon: N/A
  rationale: En este contexto narrativo, 'jardín' reproduce con naturalidad el referente del paraíso sin añadir una identificación que no está explícita en el segmento proporcionado.
- source_word: እግዚአብሔር / God
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: N/A
  rationale: El texto ge'ez usa el equivalente de 'Dios'; en español, 'Dios' conserva la referencia directa sin introducir el nombre divino cuando no aparece en la fuente inmediata.
- source_word: አዘዘክሙ / commanded you
  english_pob_choice: commanded you
  chosen_spanish: les mandó
  alternatives_spanish:
  - les ordenó
  - les mandó a ustedes
  lexicon: N/A
  rationale: '''Mandó'' transmite la fuerza imperativa de manera clara y bíblica en español contemporáneo, sin sobrecargar la frase.'
- source_word: እንዘ፡ ይብል፡ / saying
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijo
  lexicon: N/A
  rationale: '''Diciendo'' sigue de cerca la función introductoria del participio, manteniendo la relación entre el mandato y la cita directa.'
- source_word: ኢትብልዑ፡ እምኔሁ / Do not eat from it
  english_pob_choice: Do not eat from it
  chosen_spanish: No coman de él
  alternatives_spanish:
  - No coman de ello
  - No lo coman
  lexicon: N/A
  rationale: El español exige un referente pronominal natural; 'de él' conserva el sentido de comer del fruto sin añadir un sustantivo ausente en el segmento.
- source_word: ፍሬ፡ ዕፀ፡ / fruit of the tree
  english_pob_choice: fruit of the trees
  chosen_spanish: fruto de los árboles
  alternatives_spanish:
  - fruto de los árboles frutales
  - fruto del árbol
  lexicon: N/A
  rationale: La forma plural del pasaje permite 'de los árboles'; luego el texto pasa a singular en 'del árbol', y el español refleja ese cambio sin nivelarlo.
- source_word: ዘማእከለ፡ ገነት / that is in the middle of the garden
  english_pob_choice: that is in the middle of the garden
  chosen_spanish: que está en medio del jardín
  alternatives_spanish:
  - que está en el centro del jardín
  - que está en medio del huerto
  lexicon: N/A
  rationale: '''En medio'' es la correspondencia más transparente y tradicional para la ubicación central del árbol; ''jardín'' se mantiene para consistencia contextual.'
theological_decisions:
- issue: Dios como hablante directo en una cita de mandato prohibitivo
  english_pob_reading: God commanded you, saying, ‘Do not eat from it.’
  chosen_spanish_reading: 'Dios les mandó, diciendo: “No coman de él.”'
  alternative_spanish_readings:
  - 'Dios les ordenó, diciendo: “No coman de él.”'
  - 'Dios les mandó, diciendo: “No coman de ello.”'
  rationale: Se conserva la agencia divina y la estructura mandato-cita sin suavizar la prohibición. 'Mandó' mantiene el peso autoritativo del original.
  doctrine_reference: Narrative divine command / obediencia al mandato divino
translation_notes:
  revision_awareness: La fuente ge'ez proporcionada para este segmento parece mezclar el final de 3:17 con el inicio de 3:18; por eso la traducción conserva el arranque fragmentario y el cierre incompleto de la cita, sin intentar resolver la ruptura textual.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' de forma consistente para እግዚአብሔር en este pasaje.
  - Se respetó el cambio de plural a singular entre 'los árboles' y 'el árbol' porque aparece en la secuencia fuente.
  - No se introdujo 'Yahvé' ni 'Cristo', pues no hay base en este fragmento para esos términos.
  - La puntuación refleja una cita directa interrumpida al final del segmento fuente.
