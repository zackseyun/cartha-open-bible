lexical_decisions:
- source_word: they died
  english_pob_choice: And they died
  chosen_spanish: Y murieron
  alternatives_spanish:
  - Y fallecieron
  - Y murieron todos
  lexicon: morir
  rationale: El hebreo/geʿez subyacente del pasaje, reflejado por la POB inglesa, describe una muerte literal; en español, «murieron» es la opción más directa y natural sin añadir matices no presentes.
- source_word: in the year in which they entered Egypt
  english_pob_choice: in the year in which they entered Egypt
  chosen_spanish: en el año en que entraron en Egipto
  alternatives_spanish:
  - en el año cuando entraron en Egipto
  - el mismo año en que entraron en Egipto
  lexicon: año / entrar
  rationale: Conserva la relación temporal exacta del inglés POB y su valor narrativo. «Entraron en Egipto» mantiene el plural del sujeto implícito y evita ampliar el sentido.
- source_word: left to Dan
  english_pob_choice: was left to Dan
  chosen_spanish: quedó para Dan
  alternatives_spanish:
  - quedó a Dan
  - fue dejado para Dan
  lexicon: quedar / dejar
  rationale: La POB inglesa expresa una permanencia o remanente asignado a Dan. «Quedó para Dan» conserva esa idea de residuo/asignación sin forzar una construcción pasiva menos natural en español.
- source_word: Hushim
  english_pob_choice: Hushim
  chosen_spanish: Husim
  alternatives_spanish:
  - Husín
  - Hushim
  lexicon: nombre propio
  rationale: Se transcribe el nombre propio en una forma española sencilla y reconocible, manteniendo la referencia personal sin introducir una adaptación tradicional no atestiguada en el audit trail.
theological_decisions:
- issue: Implied total death of a group in the same year as the descent into Egypt
  english_pob_reading: And they died in the year in which they entered Egypt, and Hushim alone was left to Dan.
  chosen_spanish_reading: Y murieron en el año en que entraron en Egipto, y solo Husim quedó para Dan.
  alternative_spanish_readings:
  - Y fallecieron en el año en que entraron en Egipto, y solo Husim quedó para Dan.
  - Y murieron ese mismo año en que entraron en Egipto, y solo Husim quedó para Dan.
  rationale: 'La redacción preserva el alcance del enunciado: una muerte colectiva dentro de ese mismo año, seguida de la excepción de Husim. No se suaviza ni se amplía a una explicación causal que el texto no da.'
  doctrine_reference: Ninguna; observación narrativa/genealógica del texto.
translation_notes:
  revision_awareness: El pasaje en la fuente geʿez aparece vacío en el paquete proporcionado, pero el texto inglés POB y la verificación cruzada de alta concordancia ofrecen una base estable. No se introdujeron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Egipto» con mayúscula como topónimo.
  - Se usa «para Dan» para conservar la relación de pertenencia/asignación indicada por la POB inglesa.
  - No se añadió puntuación exegética ni aclaraciones externas al texto base.
