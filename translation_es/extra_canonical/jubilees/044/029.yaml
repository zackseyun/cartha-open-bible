    changes_summary: Replaced the unrelated draft with a translation that reflects the Ge'ez names, number, death notice, entry into Egypt, and Dan's survival.
translation:
  language: es
  text: Y Asudi, e Iyak, y Salomón eran seis. Y murieron en el año en que entraron en Egipto, y quedó para Dan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአሱዲ፡
  english_pob_choice: Asudi
  chosen_spanish: Asudi
  alternatives_spanish:
  - Asudí
  - Asudí
  lexicon: nombre propio
  rationale: Se conserva el nombre propio transliterado, sin adaptar indebidamente la forma del original ge'ez.
- source_word: ወኢያክ፡
  english_pob_choice: Iyak
  chosen_spanish: Iyak
  alternatives_spanish:
  - Iyac
  - Yiak
  lexicon: nombre propio
  rationale: Se mantiene la transliteración simple del nombre propio según el testimonio de base en inglés y el ge'ez.
- source_word: ወስሎሞን፡
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: nombre propio
  rationale: En español, la forma establecida y comprensible del nombre bíblico es Salomón.
- source_word: ሲድስቱ።
  english_pob_choice: were six
  chosen_spanish: eran seis
  alternatives_spanish:
  - fueron seis
  - eran seis en número
  lexicon: numeral predication
  rationale: La cópula en español expresa naturalmente la predicación numérica; 'eran seis' conserva el sentido directo sin añadir explicaciones.
- source_word: ወሞቱ፡
  english_pob_choice: And they died
  chosen_spanish: Y murieron
  alternatives_spanish:
  - Y fallecieron
  - Y ellos murieron
  lexicon: verb
  rationale: '''Murieron'' conserva el valor narrativo simple del ge''ez y del inglés auditado.'
- source_word: በዓመተ፡ ቦኡ፡ በግብጽ፡
  english_pob_choice: in the year they entered Egypt
  chosen_spanish: en el año en que entraron en Egipto
  alternatives_spanish:
  - el año en que entraron en Egipto
  - en el año de su entrada en Egipto
  lexicon: temporal clause
  rationale: Se mantiene la relación temporal exacta sin convertirla en una paráfrasis.
- source_word: ወተርፈ፡ ለዳን፡
  english_pob_choice: and there remained to Dan
  chosen_spanish: y quedó para Dan
  alternatives_spanish:
  - y quedó a Dan
  - y permaneció para Dan
  lexicon: intransitive remaining + dative
  rationale: La revisión muestra que el ge'ez usa un verbo intransitivo con preposición dativa, por lo que la idea no es 'Dan permaneció' sino que algo 'quedó para Dan'. En español, 'quedó para Dan' preserva esa relación gramatical sin fijar el referente no explicitado.
theological_decisions:
- issue: Relación gramatical en 'there remained to Dan'
  english_pob_reading: and there remained to Dan
  chosen_spanish_reading: y quedó para Dan
  alternative_spanish_readings:
  - y quedó a Dan
  - y permaneció para Dan
  rationale: La auditoría textual indica que el sujeto no es Dan; por tanto, la traducción debe dejar abierta la referencia de lo que quedó, en vez de convertir a Dan en sujeto. Esta opción preserva la tensión textual y evita resolver prematuramente el referente.
  doctrine_reference: No aplica; decisión textual y sintáctica.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que corrigió la lectura previa errónea 'and Dan remained' a 'and there remained to Dan'. Por eso la traducción española evita hacer de Dan el sujeto y conserva una formulación abierta, sin añadir glosas interpretativas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un título divino.
  - Se usa 'Salomón' como forma española establecida para el nombre propio bíblico.
  - No se introduce puntuación explicativa ni glosa adicional, porque el verso es breve y el referente de 'quedó' permanece incierto según la auditoría.
