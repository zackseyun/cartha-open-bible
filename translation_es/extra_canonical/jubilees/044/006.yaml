translation:
  language: es
  text: Yo bajaré contigo, y ciertamente te haré subir otra vez. Y en esta tierra serás sepultado, y José pondrá sus manos[a] sobre tus ojos. No temas; baja a Egipto.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El plural «manos» sigue el ge'ez y la LXX de Génesis 46:4, en contraste con el singular del texto masorético; el inglés POB revisado refleja este detalle.
    reason: textual_variant
lexical_decisions:
- source_word: I will go down with you
  english_pob_choice: I will go down with you
  chosen_spanish: Yo bajaré contigo
  alternatives_spanish:
  - Descenderé contigo
  - Iré contigo al bajar
  lexicon: descender / bajar
  rationale: Conserva la imagen de descenso al ir a Egipto y mantiene el paralelismo con la promesa de acompañamiento en el texto fuente.
- source_word: I will surely bring you up again
  english_pob_choice: I will surely bring you up again
  chosen_spanish: ciertamente te haré subir otra vez
  alternatives_spanish:
  - sin duda te haré subir de nuevo
  - ciertamente te sacaré de allí otra vez
  lexicon: subir / hacer subir
  rationale: Mantiene el énfasis enfático de la promesa y el movimiento de retorno sin suavizarlo.
- source_word: you will be buried
  english_pob_choice: you will be buried
  chosen_spanish: serás sepultado
  alternatives_spanish:
  - serás enterrado
  lexicon: sepultar / enterrar
  rationale: «Sepultado» suena más formal y bíblico en español, y conserva el sentido pasivo del original.
- source_word: Joseph will place his hands on your eyes
  english_pob_choice: Joseph will place his hands on your eyes
  chosen_spanish: José pondrá sus manos sobre tus ojos
  alternatives_spanish:
  - José pondrá su mano sobre tus ojos
  lexicon: mano(s)
  rationale: Se conserva el plural de manos porque el expediente textual revisado indica que el ge'ez usa plural, en línea con la LXX, y no debe nivelarse al singular.
- source_word: Do not fear
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  lexicon: temer / miedo
  rationale: Equivalente directo, natural y reverente en español bíblico.
- source_word: go down into Egypt
  english_pob_choice: go down into Egypt
  chosen_spanish: baja a Egipto
  alternatives_spanish:
  - desciende a Egipto
  lexicon: bajar / descender
  rationale: Reproduce el verbo de movimiento con la misma imagen semítica de descenso hacia Egipto.
theological_decisions:
- issue: Promesa divina de acompañamiento y retorno
  english_pob_reading: I will go down with you, and I will surely bring you up again
  chosen_spanish_reading: Yo bajaré contigo, y ciertamente te haré subir otra vez
  alternative_spanish_readings:
  - Yo iré contigo y ciertamente te traeré de regreso
  rationale: La formulación conserva la promesa de presencia divina en el descenso y de restauración posterior, sin introducir una interpretación adicional.
  doctrine_reference: Providencia y fidelidad de Dios en el descenso a Egipto y el retorno prometido.
- issue: Detalle textual de las manos de José
  english_pob_reading: Joseph will place his hands on your eyes
  chosen_spanish_reading: José pondrá sus manos sobre tus ojos
  alternative_spanish_readings:
  - José pondrá su mano sobre tus ojos
  rationale: Se preserva el plural textual respaldado por la revisión del ge'ez y la LXX, evitando armonizar con el singular masorético.
  doctrine_reference: Crítica textual y preservación de la forma recibida por Jubileos.
translation_notes:
  revision_awareness: La revisión más reciente confirmó que no hacía falta más cambio y mantuvo intacta la lectura con plural 'hands'. La traducción española refleja ese estado revisado y evita retrotraerse al singular.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera explícitamente; aquí no aparece el nombre divino en la forma dada, por lo que no se añadió.
  - Se mantuvo un registro bíblico sobrio y legible en español latinoamericano.
  - Se preservó el plural de «manos» para respetar el detalle textual revisado del expediente.
