translation:
  language: es
  text: Y Jacob recordó el sueño que había visto en Betel, y tuvo miedo de bajar a Egipto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: nombre propio
  rationale: Se conserva la forma bíblica ampliamente reconocible en español, en continuidad con el nombre propio del texto fuente y del inglés POB.
- source_word: ሕልመ
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño visionario
  lexicon: sustantivo común
  rationale: El ge'ez usa el término normal para 'sueño'; 'el sueño' reproduce con naturalidad y fidelidad la referencia concreta recordada por Jacob.
- source_word: በቤቴል
  english_pob_choice: at Bethel
  chosen_spanish: en Betel
  alternatives_spanish:
  - en Betel
  lexicon: topónimo
  rationale: Se usa la forma española usual del lugar; 'en Betel' mantiene la localización con la preposición idiomática.
- source_word: ፈርሀ
  english_pob_choice: he was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - estaba asustado
  - temió
  lexicon: verbo + construcción idiomática
  rationale: El ge'ez expresa temor. 'Tuvo miedo' comunica de modo natural el estado resultante y preserva el matiz de la revisión inglesa ('he was afraid').
- source_word: ውስተ፡ ግብጽ
  english_pob_choice: into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - para Egipto
  lexicon: preposición de movimiento + topónimo
  rationale: La frase indica movimiento de descenso hacia Egipto; en español bíblico y moderno 'bajar a Egipto' es natural y fiel al valor direccional del original.
theological_decisions:
- issue: El recuerdo del sueño de Betel como motivo narrativo de temor
  english_pob_reading: And Jacob remembered the dream that he had seen at Bethel, and he was afraid to go down into Egypt.
  chosen_spanish_reading: Y Jacob recordó el sueño que había visto en Betel, y tuvo miedo de bajar a Egipto.
  alternative_spanish_readings:
  - Y Jacob se acordó del sueño que había visto en Betel, y temió bajar a Egipto.
  rationale: No hay cambio doctrinal; se conserva la función narrativa del recuerdo y el temor como respuesta a la visión previa. 'Recordó' mantiene el acto mental sin intensificarlo ni suavizarlo más allá del fuente.
  doctrine_reference: Narrativa patriarcal; ninguna afirmación doctrinal explícita adicional.
translation_notes:
  revision_awareness: La base inglesa revisada cambió 'he feared' por 'he was afraid' para una formulación más natural en registro formal. La versión española sigue esa misma naturalidad con 'tuvo miedo', sin alterar el contenido semántico ni introducir matices interpretativos nuevos. El ge'ez no presenta variantes textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se mantiene 'Jacob' para el nombre propio, en coherencia con el uso bíblico habitual en español y con el texto fuente.
  - '''Betel'' se escribe con una sola ''l'' final, forma estable en español.'
  - Se evita 'descendió a Egipto' porque el original y el inglés auditado expresan movimiento con una construcción más simple; 'bajar a Egipto' conserva la dirección sin sobrecargar el estilo.
