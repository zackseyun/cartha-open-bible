translation:
  language: es
  text: 'Y le dijo: «Yo soy el Dios de tus padres[a], el Dios de Abraham e Isaac. No temas; baja a Egipto, porque allí te haré una gran nación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu padre».
    reason: Preserva la nota de variante documentada en el POB inglés sobre la antigua lectura singular frente al plural confirmado en Jubileos.
lexical_decisions:
- source_word: I am the God of your fathers
  english_pob_choice: I am the God of your fathers
  chosen_spanish: Yo soy el Dios de tus padres
  alternatives_spanish:
  - Yo soy el Dios de tu padre
  - Yo soy el Dios de tus antepasados
  lexicon: Dios; padre/padres
  rationale: El texto inglés y el ajuste revisado de Jubileos conservan el plural 'your fathers', no el singular. En español, 'tus padres' comunica con naturalidad la referencia plural a los antepasados patriarcales sin forzar una paráfrasis más amplia.
- source_word: the God of Abraham and Isaac
  english_pob_choice: the God of Abraham and Isaac
  chosen_spanish: el Dios de Abraham e Isaac
  alternatives_spanish:
  - el Dios de Abraham y de Isaac
  - el Dios de Abraham e Isaac
  lexicon: Dios; nombres propios
  rationale: Se mantiene la formulación directa del original. 'e' se usa por eufonía ante 'Isaac'.
- source_word: Do not fear
  english_pob_choice: Do not fear
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  lexicon: no temer
  rationale: Es la equivalencia bíblica más inmediata, clara y digna en español, sin añadir intensidad no presente en el texto.
- source_word: go down into Egypt
  english_pob_choice: go down into Egypt
  chosen_spanish: baja a Egipto
  alternatives_spanish:
  - desciende a Egipto
  - ve a Egipto
  lexicon: descender/bajar; Egipto
  rationale: '''Baja'' conserva el movimiento descendente implícito en la expresión bíblica y es idiomático en español. ''Desciende'' sería más literal pero menos natural; ''ve'' perdería el matiz.'
- source_word: for there I will make you into a great nation
  english_pob_choice: for there I will make you into a great nation
  chosen_spanish: porque allí te haré una gran nación
  alternatives_spanish:
  - porque allí haré de ti una gran nación
  - pues allí te convertiré en una gran nación
  lexicon: hacer; nación
  rationale: '''Te haré una gran nación'' sigue de cerca el inglés y mantiene la promesa formativa del texto. ''Una gran nación'' preserva el carácter colectivo e histórico de la promesa.'
theological_decisions:
- issue: Pluralidad de 'tus padres' frente al posible singular tradicional
  english_pob_reading: your fathers
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tu padre
  - tus antepasados
  rationale: La revisión textual indica que Jubileos aquí lee un plural, reforzado por la mención explícita de Abraham e Isaac. Por eso se evita el singular tradicional heredado de un paralelo distinto.
  doctrine_reference: Patriarcas / promesa del pacto
- issue: Identidad divina sin sustitución por un título genérico
  english_pob_reading: I am the God of your fathers
  chosen_spanish_reading: Yo soy el Dios de tus padres
  alternative_spanish_readings:
  - Yo soy el Dios de tu padre
  rationale: Se conserva la autodeclaración divina directa, sin suavizarla ni introducir un equivalente litúrgico que oculte la forma del texto fuente.
  doctrine_reference: Nombre y autodeclaración de Dios
translation_notes:
  revision_awareness: La versión inglesa fue revisada para corregir el singular 'your father' a 'your fathers' y cerrar la cita final; la traducción española refleja esa lectura plural ya resuelta, por lo que no requiere nota alternativa marcada.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός/אֱלֹהִים y 'nación' para 'great nation' sin expandir el significado.
  - Se mantiene un registro bíblico sobrio y publicación-readable.
  - No se introducen notas al pie porque no hay una alternativa que deba anclarse en el texto español.
