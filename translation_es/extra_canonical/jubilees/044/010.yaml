    issue: Nota al pie innecesaria sobre 'mujer cananea'
    rationale: El inglés POB no preserva aquí una alternativa en nota, y el español 'mujer cananea' no crea ambigüedad que exija aclaración. La nota añade carga sin necesidad editorial.
  - severity: low
