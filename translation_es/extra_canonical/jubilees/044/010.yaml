translation:
  language: es
  text: 'Simeón y sus hijos. Estos son los nombres de sus hijos: Jemuel, Jamín, Ohad, Jachín, Zóhar y Saúl, el hijo de una mujer cananea[a]—seis.'
  philosophy: optimal-equivalence
  footnotes:
