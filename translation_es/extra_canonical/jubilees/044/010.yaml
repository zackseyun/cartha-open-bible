lexical_decisions:
- source_word: Simeon
  english_pob_choice: Simeon
  chosen_spanish: Simeón
  alternatives_spanish:
  - Simón
  lexicon: propio
  rationale: El nombre patriarcal corresponde a Simeón; se conserva la forma bíblica habitual en español con tilde por acentuación.
- source_word: sons
  english_pob_choice: his sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - descendientes
  lexicon: término familiar
  rationale: El contexto inmediato presenta la lista nominal de descendencia masculina; 'hijos' es natural y suficiente en español, sin añadir precisión innecesaria.
- source_word: Canaanite woman
  english_pob_choice: Canaanite woman
  chosen_spanish: mujer cananea
  alternatives_spanish:
  - mujer de Canaán
  - cananea
  lexicon: etnónimo
  rationale: Se mantiene el adjetivo étnico 'cananea', que reproduce el valor descriptivo del inglés POB sin suavizar la referencia.
theological_decisions:
- issue: Enumeración final con '—six'
  english_pob_reading: The count 'six' is retained at the end of the list.
  chosen_spanish_reading: —seis
  alternative_spanish_readings:
  - seis
  - —seis hijos
  rationale: Se conserva el cierre numérico del testimonio textual como parte de la estructura de lista, sin convertirlo en una frase explicativa añadida.
  doctrine_reference: No aplica; decisión estructural/textual.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajusta la puntuación de la lista, separando con punto la introducción de la enumeración. La traducción española sigue esa misma estructura: una cláusula introductoria breve, seguida de la lista nominal y el cierre con el conteo final.'
  spanish_consistency_notes:
  - Se usa 'Simeón' con tilde, forma estándar en español bíblico.
  - Se preserva la secuencia nominal y el conteo final para respetar la estructura auditada del texto fuente.
  - No se introduce 'Cristo', 'SEÑOR' ni otras normalizaciones ajenas al verso.
  - La nota al pie se ancla solo en 'cananea', donde surge la alternativa léxica más relevante.
