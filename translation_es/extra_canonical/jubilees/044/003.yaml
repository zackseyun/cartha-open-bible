base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/044/003.yaml
  text: And while he was considering sending to Joseph that he should come to him[3], and not going down himself, he remained there seven days, to see in a vision whether he should stay or whether he should go down. And he celebrated the feast of the harvest of the firstfruits of the old grain, for in all the land of Canaan there was not a handful of any seed in the land, because the famine was upon all the beasts and the livestock and the birds and also upon men.
  footnotes:
  - marker: '3'
    text: The verse is textually difficult in the transmitted Ge'ez. The sense appears to be that Jacob waited seven days for a confirming vision and observed a firstfruits festival using old grain because the famine had consumed fresh produce.
    reason: textual_variant
  - marker: a
    text: Or 'because it had become for all the beasts and the livestock and the birds and also for men.'.
    reason: previous_rendering
  - marker: b
    text: Or 'the feast of the firstfruits'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:42Z'
    unchanged: false
    changes_summary: 'Adjusted wording for closer lexical accuracy and smoother formal English: changed ''thinking of sending word'' to ''considering sending to Joseph that he should come,'' clarified ''not going down himself,'' rendered ''to see in a vision'' and ''whether he should stay,'' and tightened the final clause to reflect that the produce had become food ''for all the beasts and the livestock and the birds and also for men.'''
translation:
  language: es
  text: Y mientras pensaba en enviar a José para que viniera a él, y en no bajar él mismo, permaneció allí siete días, para ver en una visión si debía quedarse o si debía bajar. Y celebró la fiesta de la cosecha de las primicias del grano viejo, porque en toda la tierra de Canaán no había un puñado de ninguna semilla en la tierra, pues el hambre[a] era sobre todas las bestias, el ganado y las aves, y también sobre los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''la hambruna''. La palabra del ge''ez puede expresarse como ''hambre'' o ''hambruna''; aquí se eligió ''hambre'' por fluidez, manteniendo la idea de una aflicción generalizada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ይሔሊ / yehēli
  english_pob_choice: while he was considering
  chosen_spanish: mientras pensaba en
  alternatives_spanish:
  - mientras consideraba
  - mientras meditaba en
  lexicon: n/a
  rationale: El verbo sugiere deliberación o consideración previa; en español, 'pensaba en' conserva el proceso mental sin volverlo más específico de lo que permite el ge'ez.
- source_word: ይልአክ ለዮሴፍ
  english_pob_choice: sending to Joseph
  chosen_spanish: enviar a José
  alternatives_spanish:
  - mandar a José
  - enviar palabra a José
  lexicon: n/a
  rationale: La revisión inglesa aclaró que el objeto directo es José, no 'word'; por eso en español se evita una paráfrasis añadida y se mantiene el envío dirigido a José.
- source_word: ከመ፡ ይምጻእ፡ ኀቤሁ
  english_pob_choice: that he should come to him
  chosen_spanish: para que viniera a él
  alternatives_spanish:
  - para que viniese a él
  - para que acudiera a él
  lexicon: n/a
  rationale: '''Viniera a él'' expresa bien la finalidad y el movimiento hacia Jacob; ''acudir'' sería más interpretativo.'
- source_word: ወኢይረድ፡ ውእቱ
  english_pob_choice: and not going down himself
  chosen_spanish: y en no bajar él mismo
  alternatives_spanish:
  - y en no descender él mismo
  - y en no ir él mismo
  lexicon: n/a
  rationale: Se conserva la imagen espacial de 'bajar/descender', importante en el contexto narrativo, sin sustituirla por un verbo más general.
- source_word: ሰቡዐ ዕለተ
  english_pob_choice: seven days
  chosen_spanish: siete días
  alternatives_spanish:
  - por siete días
  - durante siete días
  lexicon: n/a
  rationale: La duración se expresa de forma directa; 'permaneció allí siete días' mantiene el valor temporal exacto.
- source_word: ይርአይ ራእየ
  english_pob_choice: to see in a vision
  chosen_spanish: para ver en una visión
  alternatives_spanish:
  - para ver una visión
  - para recibir una visión
  lexicon: n/a
  rationale: El ge'ez distingue la experiencia visionaria; 'ver en una visión' conserva la formulación sin convertirla en una explicación interpretativa.
- source_word: እመ ይከብር / እመ ይወርድ
  english_pob_choice: whether he should stay or whether he should go down
  chosen_spanish: si debía quedarse o si debía bajar
  alternatives_spanish:
  - si debía permanecer o si debía descender
  - si había de quedarse o si había de bajar
  lexicon: n/a
  rationale: '''Quedarse/bajar'' es natural en español y conserva la oposición de permanecer versus desplazarse hacia abajo.'
- source_word: ማእረረ
  english_pob_choice: harvest
  chosen_spanish: cosecha
  alternatives_spanish:
  - recolección
  - siega
  lexicon: n/a
  rationale: La revisión inglesa recupera 'harvest'; en español 'cosecha' es la opción más clara y digna para una fiesta agrícola.
- source_word: ቀዳሚ ፍሬ
  english_pob_choice: firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - primeros frutos
  lexicon: n/a
  rationale: '''Primicias'' es el término bíblico establecido y reproduce el valor cultual de la expresión.'
- source_word: እምሥርናይ ብሉይ
  english_pob_choice: of the old grain
  chosen_spanish: del grano viejo
  alternatives_spanish:
  - del grano antiguo
  - del grano almacenado
  lexicon: n/a
  rationale: '''Grano viejo'' sigue de cerca el sentido de producto ya disponible de una cosecha anterior, sin añadir más precisión de la que da el texto.'
- source_word: አልቦ ውስተ ኵሉ ምድረ ከናአን ምልአ እደ ምንተኒ ዘርአ
  english_pob_choice: there was not a handful of any seed in the land
  chosen_spanish: no había un puñado de ninguna semilla en la tierra
  alternatives_spanish:
  - no quedaba un puñado de ninguna semilla en la tierra
  - no había ni un puñado de semilla alguna en la tierra
  lexicon: n/a
  rationale: Se conserva la imagen concreta del 'puñado' y la negación total de semilla disponible, siguiendo de cerca la sintaxis del original y la versión inglesa revisada.
- source_word: ዐባር
  english_pob_choice: the famine was upon
  chosen_spanish: el hambre era sobre
  alternatives_spanish:
  - la hambruna estaba sobre
  - el hambre cayó sobre
  lexicon: n/a
  rationale: La revisión inglesa indica que ዐባር significa 'famine'. En español, 'hambre' comunica el fenómeno, y 'era sobre' conserva la construcción semítica de aflicción que recae sobre todos.
- source_word: ለኵሉ አራዊት ለእንስሳ ወለአዕዋፍ ወለሰብእኒ
  english_pob_choice: all the beasts and the livestock and the birds and also upon men
  chosen_spanish: todas las bestias, el ganado y las aves, y también sobre los hombres
  alternatives_spanish:
  - todos los animales salvajes, el ganado, las aves y también los hombres
  - todas las fieras, el ganado, las aves y también los hombres
  lexicon: n/a
  rationale: '''Bestias'' reproduce el primer término amplio; ''ganado'' y ''aves'' reflejan los grupos restantes. Se mantiene ''hombres'' para el alcance general humano del texto.'
theological_decisions:
- issue: La 'fiesta' celebrada por Jacob se describe como 'de la cosecha de las primicias'.
  english_pob_reading: the feast of the harvest of the firstfruits
  chosen_spanish_reading: la fiesta de la cosecha de las primicias
  alternative_spanish_readings:
  - la fiesta del primerfruto
  - la fiesta de las primicias
  rationale: La lectura revisada del ge'ez incluye explícitamente 'cosecha', por lo que conviene conservar ese elemento y no reducirlo a una fórmula más corta que perdería el matiz agrícola.
  doctrine_reference: Éxodo 23:16; Éxodo 34:22
- issue: La frase final presenta el hambre como una aflicción que 'era sobre' criaturas y humanos.
  english_pob_reading: because the famine was upon all the beasts and the livestock and the birds and also upon men
  chosen_spanish_reading: porque el hambre era sobre todas las bestias, el ganado y las aves, y también sobre los hombres
  alternative_spanish_readings:
  - porque el hambre cayó sobre todas las bestias, el ganado y las aves, y también sobre los hombres
  - porque la hambruna estaba sobre todas las bestias, el ganado y las aves, y también sobre los hombres
  rationale: Se preserva la construcción relacional 'sobre' para reflejar el efecto envolvente del hambre, en lugar de convertirla en mera carencia abstracta. Esto mantiene el tono semítico del pasaje.
  doctrine_reference: Génesis 41:54; Jubileos 44:3
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés: mantiene ''considering sending to Joseph'', ''not going down himself'', ''to see in a vision'', la adición de ''harvest'' en la fiesta, y la corrección de ዐባር como ''famine''. También evita depender del borrador anterior que decía ''thinking of sending word'' y ''feast of the firstfruits'' sin ''harvest''.'
  spanish_consistency_notes:
  - Se usa 'primicias' de forma consistente para firstfruits.
  - Se mantiene 'Yahvé' solo donde corresponda; este versículo no lo contiene.
  - '''Bajar'' conserva el movimiento geográfico implícito sin sobredeterminar la teología del viaje.'
  - '''Hambre'' y ''hambruna'' quedan como alternativas documentadas en nota, sin diluir la tensión lexical del original.'
