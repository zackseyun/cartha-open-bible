    rationale: 'En español, «dar a luz» con antecedente personal plural requiere una formulación como «a quienes Asenat le dio a luz» o, mejor aún, reestructurar la oración: «que le dio a luz Asenat». La redacción actual suena agramatical y afecta la claridad.'
  - severity: medium
