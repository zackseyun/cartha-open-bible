    rationale: Aunque «Zabulón» existe en tradición bíblica española, el POB inglés usa «Zebulun» y la correspondencia española más transparente y ampliamente reconocible es «Zebulón». Reduce distancia fonética innecesaria respecto del audit trail.
  - severity: low
    issue: Puntuación final antes de «tres»
    rationale: Los dos puntos tras «Jahleel» resultan rígidos y poco idiomáticos en español en cierre enumerativo. Una raya reproduce mejor el valor parentético/enfático del inglés («—three»).
  revised_spanish_text: 'Zebulón y sus hijos; y estos son los nombres de sus hijos: Sered, Elón y Jahleel—tres.'
