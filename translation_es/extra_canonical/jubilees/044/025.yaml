lexical_decisions:
- source_word: Naphtali
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Nafatalí
  lexicon: nombre propio bíblico
  rationale: Se usa la forma española bíblica asentada y claramente reconocible para el lector hispanohablante, sin alterar la referencia al hijo de Jacob.
- source_word: sons
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  lexicon: vocablo de parentesco
  rationale: En este contexto genealógico, 'hijos' comunica de manera natural y suficiente la descendencia masculina implícita en la lista.
- source_word: Shallum
  english_pob_choice: Shallum
  chosen_spanish: Shalum
  alternatives_spanish:
  - Salum
  - Shallum
  lexicon: nombre propio bíblico
  rationale: Se adopta una adaptación gráfica española breve y transparente del nombre propio, manteniendo la identidad del personaje sin forzar una transliteración excesivamente técnica.
- source_word: Iv
  english_pob_choice: Iv
  chosen_spanish: Iv
  alternatives_spanish:
  - Iv
  - Ivo
  lexicon: nombre propio incierto
  rationale: Se conserva la forma transmitida porque el texto fuente y el audit trail indican que el último nombre es incierto o posiblemente corrupto; no hay base suficiente para normalizarlo a otra forma.
theological_decisions:
- issue: Lista genealógica con nombre final incierto
  english_pob_reading: The final name in Naphtali's list is uncertain in the Ge'ez row and may reflect a shortened or corrupted form.
  chosen_spanish_reading: El último nombre de la lista de Neftalí se mantiene como transmitido y se marca como incierto en nota.
  alternative_spanish_readings:
  - Normalizar el último nombre a una forma más familiar sin respaldo textual
  - Omitir la marca de incertidumbre
  rationale: 'La prioridad es preservar la tensión textual documentada por el POB inglés: el testimonio ge''ez no es plenamente seguro para el último nombre. En español, la nota evita aparentar certeza donde el audit trail no la ofrece.'
  doctrine_reference: Principios de crítica textual y fidelidad a la transmisión manuscrita
translation_notes:
  revision_awareness: Se siguió la revisión más reciente que movió la marca de incertidumbre al nombre final, Iv, para que la nota corresponda al último nombre de la lista y no al primero.
  spanish_consistency_notes:
  - Se mantiene 'Neftalí' como forma española estándar del nombre propio.
  - Se conserva 'Iv' sin corrección especulativa porque el audit trail enfatiza la incertidumbre del testimonio fuente.
  - La marca de nota [a] se coloca en el último nombre para reflejar fielmente la decisión revisada del POB inglés.
