translation:
  language: es
  text: 'Y estos son los nombres de los hijos de Neftalí: Jahziel, Guni, Jezer, Shalum e Iv[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El último nombre de esta lista es incierto en la línea ge'ez y puede reflejar una forma abreviada o corrompida.
