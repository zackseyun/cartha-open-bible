  verdict: revise
  source_alignment_summary: 'El borrador español sigue correctamente el sentido básico del ge''ez y la corrección auditada en inglés: ዐሠርቱ ወአሐዱ = «Once»; ኵሉ ነፍስ ዘራሔል ዐሠርቱ ወአርባዕቱ = total de personas de Raquel; ወውሉደ ባላ ላእከታ introduce a los hijos de Bilha como criada/sierva de Raquel, no «murieron».'
  spanish_quality_summary: 'La redacción es mayormente clara, pero «Once.» está mal escrito como «Once» sin problema ortográfico? No: el problema real es que aparece «Once.»? El borrador tiene «Once.» correctamente como numeral-palabra, pero en español bíblico la frase «fueron catorce» suena menos natural aquí que «eran catorce». Además, «criada» puede sonar demasiado doméstico/moderno; «sierva» es más digno y ampliamente legible en registro bíblico.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La decisión «personas» para ነፍስ concuerda con el contexto censal. Para ላእከታ, conviene preferir «sierva» sobre «criada» por fidelidad de registro y claridad eclesial, sin llegar a «esclava» si no se quiere intensificar más de lo documentado por el inglés «maidservant».
  issues:
  - severity: medium
    issue: «Y todas las personas de Raquel fueron catorce» suena poco natural en español.
    rationale: En una frase de cómputo genealógico, «eran catorce» es la formulación más idiomática y conserva el mismo sentido.
  - severity: medium
    issue: «su criada» tiene un matiz doméstico moderno menos adecuado que «su sierva».
    rationale: El ge'ez significa «su maidservant». En español bíblico general, «sierva» mantiene dignidad estilística y legibilidad eclesial mejor que «criada», sin forzar «esclava».
  revised_spanish_text: 'Once. Y todas las personas de Raquel eran catorce. Y los hijos de Bilha, su sierva:'
