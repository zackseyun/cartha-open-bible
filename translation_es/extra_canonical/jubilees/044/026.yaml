    changes_summary: 'Replaced unrelated draft content with a translation matching the Ge''ez: ''Eleven'' for ዐሠርቱ ወአሐዱ, ''all the persons of Rachel were fourteen'' for ኵሉ ነፍስ ዘራሔል ዐሠርቱ ወአርባዕቱ, and rendered ወውሉደ ባላ ላእከታ as ''And the sons of Bilhah died.'''
translation:
  language: es
  text: 'Once. Y todas las personas de Raquel eran catorce. Y los hijos de Bilha, su sierva:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ዐሠርቱ፡ ወአሐዱ።
  english_pob_choice: Eleven.
  chosen_spanish: Once.
  alternatives_spanish:
  - Once
  - Once en total
  lexicon: cardinal number
  rationale: El ge'ez expresa el número once de manera directa; en español, «Once.» reproduce el valor numérico sin añadir explicación.
- source_word: ኵሉ፡ ነፍስ፡ ዘራሔል፡ ዐሠርቱ፡ ወአርባዕቱ።
  english_pob_choice: And all the persons of Rachel were fourteen.
  chosen_spanish: Y todas las personas de Raquel fueron catorce.
  alternatives_spanish:
  - Y todas las personas de Raquel eran catorce
  - Y todas las almas de Raquel fueron catorce
  lexicon: נֶפֶשׁ / soul-person
  rationale: «ነፍስ» aquí corresponde al valor de ‘persona/soul’ que el POB inglés resumió como ‘persons’. En español, «personas» comunica con claridad el recuento total sin introducir una lectura doctrinal ajena.
- source_word: ወውሉደ፡ ባላ፡ ላእከታ፡
  english_pob_choice: 'And the sons of Bilhah, her maidservant:'
  chosen_spanish: 'Y los hijos de Bilha, su criada:'
  alternatives_spanish:
  - 'Y los hijos de Bilha, su sierva:'
  - 'Y los hijos de Bilha, su esclava:'
  lexicon: laʾəkat / maidservant
  rationale: La revisión auditada corrigió la lectura errónea ‘died’ y estableció que ላእከታ significa ‘her maidservant’. En español, «criada» mantiene el sentido de sirvienta doméstica y evita cargar innecesariamente con la dureza de «esclava» en un contexto genealógico.
theological_decisions:
- issue: Valor de ነፍስ en un censo genealógico
  english_pob_reading: all the persons
  chosen_spanish_reading: todas las personas
  alternative_spanish_readings:
  - todas las almas
  - todos los individuos
  rationale: En un recuento familiar, ‘personas’ preserva el sentido colectivo y evita que ‘almas’ suene teológicamente más cargado de lo que el contexto exige, aunque sigue siendo una alternativa posible desde el valor léxico de ነፍስ.
  doctrine_reference: Antropología bíblica; uso contextual de נֶפֶשׁ / ψυχή / ነፍስ en listas censales
translation_notes:
  revision_awareness: El texto sigue la corrección más reciente del audit trail, que descartó la lectura ‘murieron’ para ላእከታ y confirmó ‘her maidservant’. No se conserva la nota alternativa anterior porque ya no corresponde al estado revisado del texto.
  spanish_consistency_notes:
  - Se usa «Bilha» de forma consistente con el nombre bíblico habitual en español.
  - Se mantiene la puntuación breve y paratáctica del original, incluyendo dos frases iniciales independientes.
  - No se introduce terminología eclesiástica ajena al pasaje; el registro es genealógico y sobrio.
