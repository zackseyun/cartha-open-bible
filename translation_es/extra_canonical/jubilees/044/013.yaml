  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del inglés auditado: presenta a Isacar, introduce los nombres de sus hijos y cierra con el total de cuatro. No hay problemas teológicos ni de contenido. Sin embargo, la forma del nombre ''Iashub'' fue cambiada a ''Jasub'', lo que no preserva bien la identificación onomástica del audit trail; en español conviene mantener una forma más cercana, como ''Iasub''.'
  spanish_quality_summary: El español es claro y natural. La puntuación funciona, aunque el cierre antes de 'cuatro' suena mejor con raya o punto y coma que con dos puntos. Los nombres propios están mayormente bien adaptados, pero 'Jasub' introduce una alteración innecesaria frente a la forma fuente/inglesa. 'Puvá' y 'Shimrón' son legibles en español.
  glossary_alignment: 'No hay términos del glosario doctrinal principal implicados. La principal cuestión es la consistencia onomástica: se debe evitar una adaptación que opaque el nombre atestiguado en el audit trail. Se recomienda ''Iasub'' en lugar de ''Jasub''.'
  issues:
  - severity: medium
    issue: '''Jasub'' no refleja fielmente el nombre ''Iashub'' del texto auditado.'
    rationale: Aunque los nombres pueden adaptarse al español, aquí la omisión de la vocal inicial altera innecesariamente la correspondencia con la fuente y con la lista genealógica conocida. 'Iasub' conserva mejor la forma original sin volverse antinatural en español.
  - severity: low
    issue: Los dos puntos antes de 'cuatro' resultan algo duros en español.
    rationale: El original inglés usa una raya para el total final. En español, un punto y coma o una raya suenan más naturales para un cierre enumerativo de este tipo.
  revised_spanish_text: 'Isacar y sus hijos; y estos son los nombres de sus hijos: Tola, Puvá, Iasub y Shimrón; cuatro.'
