    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez source: Rachel bore Dan and Naphtali to Jacob; then the verse names those of their children who came into Egypt, specifically Dan''s sons Hushim and Samon.'
translation:
  language: es
  text: '[Y estos son los nombres de los hijos de Bilhá, la esclava de Raquel, la esposa de Jacob, que ella le dio a Jacob: Dan y Neftalí. Y estos son los nombres de sus hijos que vinieron con ellos a Egipto: los hijos de Dan: Husim y Samón.]'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ውሉዶሙ / names of their children
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus descendientes
  - sus niños
  lexicon: n/a
  rationale: En el contexto genealógico, 'hijos' reproduce con naturalidad el valor de parentesco del pasaje y coincide con el uso del POB en listas familiares.
- source_word: ብእሲቱ / wife
  english_pob_choice: the wife of Jacob
  chosen_spanish: la esposa de Jacob
  alternatives_spanish:
  - la mujer de Jacob
  lexicon: n/a
  rationale: '''Esposa'' es más preciso y digno en español bíblico contemporáneo que ''mujer'', sin alterar el sentido matrimonial del texto.'
- source_word: ዘወለደት / whom she bore
  english_pob_choice: whom she bore to Jacob
  chosen_spanish: a quien ella dio a luz para Jacob
  alternatives_spanish:
  - a quien ella tuvo para Jacob
  - a quien ella le dio hijos a Jacob
  lexicon: n/a
  rationale: La formulación conserva la relación causal y filológica del verbo de parto sin suavizarla. 'Dar a luz' mantiene el valor genealógico del ge'ez mejor que una paráfrasis más libre.
- source_word: ለያዕቆብ፡ ዳን፡ ወንፍታሌም
  english_pob_choice: Dan and Naphtali
  chosen_spanish: Dan y Neftalí
  alternatives_spanish:
  - Dan y Naftalí
  lexicon: n/a
  rationale: Neftalí es la forma habitual en español bíblico; se conserva el nombre propio estándar sin adaptar innecesariamente la grafía.
- source_word: አስማተ፡ ውሉዶሙ
  english_pob_choice: the names of their children
  chosen_spanish: los nombres de sus hijos
  alternatives_spanish:
  - los nombres de sus descendientes
  lexicon: n/a
  rationale: '''Nombres'' traduce de manera directa la construcción nominal y prepara la enumeración siguiente.'
- source_word: ቦኡ፡ ምስሌሆሙ፡ ውስተ፡ ግብጽ
  english_pob_choice: who came with them into Egypt
  chosen_spanish: que vinieron con ellos a Egipto
  alternatives_spanish:
  - que fueron con ellos a Egipto
  - que llegaron con ellos a Egipto
  lexicon: n/a
  rationale: '''Vinieron con ellos a Egipto'' es transparente y mantiene el movimiento conjunto expresado por el original.'
- source_word: ወውሉደ፡ ዳን፡ ሑሲም፡ ወሳሞን
  english_pob_choice: 'the sons of Dan: Hushim and Samon'
  chosen_spanish: 'los hijos de Dan: Husim y Samón'
  alternatives_spanish:
  - 'los hijos de Dan: Jushim y Samón'
  lexicon: n/a
  rationale: Se mantiene la identificación genealógica y se adapta la transliteración a una ortografía española legible. 'Husim' sigue la línea del POB para el nombre propio, y 'Samón' conserva acentuación gráfica española.
theological_decisions:
- issue: Atribución de la maternidad en la cláusula genealógica
  english_pob_reading: the sons of Bilhah, the handmaid of Rachel, the wife of Jacob, whom she bore to Jacob
  chosen_spanish_reading: los hijos de Bilhá, la sierva de Raquel, la esposa de Jacob, a quien ella dio a luz para Jacob
  alternative_spanish_readings:
  - los hijos de Bilhá, la esclava de Raquel
  - los hijos de Bilhá, la criada de Raquel
  rationale: El Ge'ez y el audit trail inglés atribuyen el parto a Bilhá, no a Raquel. Se conserva esa tensión textual con claridad, sin desplazar el sujeto ni armonizarlo indebidamente.
  doctrine_reference: Texto genealógico; fidelidad histórica y textual, no doctrina sistemática
- issue: Forma de traducir la relación servil de Bilhá
  english_pob_reading: the handmaid
  chosen_spanish_reading: la sierva
  alternative_spanish_readings:
  - la esclava
  - la criada
  rationale: '''Sierva'' mantiene un registro bíblico comprensible en español y evita una carga moderna más fuerte que podría alterar el tono de la genealogía, aunque ''esclava'' sigue siendo una alternativa viable si se desea enfatizar la condición legal.'
  doctrine_reference: Lexema social y doméstico en relato genealógico
- issue: Segmentación editorial implícita en el texto transmitido
  english_pob_reading: '[And these are the names of the sons of Bilhah...]'
  chosen_spanish_reading: '[Y estos son los nombres de los hijos de Bilhá,...]'
  alternative_spanish_readings:
  - Y estos son los nombres de los hijos de Bilhá...
  rationale: Se preserva la delimitación editorial indicada por el audit trail inglés mediante corchetes iniciales, reflejando que el pasaje entra en una lista genealógica continua.
  doctrine_reference: Crítica textual / delimitación de perícopa
translation_notes:
  revision_awareness: El texto inglés auditado fue corregido a partir de una atribución errónea de maternidad; la forma española sigue la lectura revisada que atribuye a Bilhá el nacimiento de Dan y Neftalí, y después enumera a los hijos de Dan que vinieron a Egipto.
  spanish_consistency_notes:
  - 'Se conserva la secuencia genealógica del original: encabezado, filiación de Bilhá, nombres de Dan y Neftalí, y luego los hijos de Dan.'
  - Se usa español neutral y bíblico, evitando tanto arcaísmos innecesarios como paráfrasis explicativas.
  - Los nombres propios se mantienen en formas españolas usuales donde existe tradición, con acentuación gráfica solo donde ayuda a la lectura.
