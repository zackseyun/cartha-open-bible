  yaml_path: translation/extra_canonical/jubilees/044/028.yaml
  text: '[And these are the names of the sons of Bilhah, the handmaid] of Rachel, the wife of Jacob, whom she bore to Jacob: Dan and Naphtali. And these are the names of their children who came with them into Egypt: the sons of Dan: Hushim and Samon.'
