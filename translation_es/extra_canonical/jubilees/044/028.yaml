review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la corrección principal del audit trail: los hijos son de Bilhá, no de Raquel, y conserva la estructura genealógica del ge''ez/POB inglés, incluida la continuación editorial entre corchetes. También reproduce bien la segunda cláusula sobre los hijos que entraron en Egipto y nombra a los hijos de Dan como Husim y Samón.'
  spanish_quality_summary: 'La redacción es generalmente clara y digna, pero presenta una frase poco natural y semánticamente imprecisa en español: «a quien ella dio a luz para Jacob». En español, «dar a luz» toma como objeto directo al nacido, por lo que aquí debe ir en plural («a quienes dio a luz») o, más naturalmente, reformularse como «que ella le dio a Jacob». Además, el uso de «sierva» para handmaid entra en tensión con la pauta terminológica del proyecto, que prefiere «esclavo/esclava» salvo razón contextual documentada; aquí no hay una razón suficiente para apartarse.'
  glossary_alignment: 'Hay un desajuste menor con la terminología por defecto del proyecto: handmaid/relación servil debería inclinarse a «esclava» más que «sierva». Los nombres propios y el resto del léxico genealógico están bien alineados. No hay cuestiones de Yahvé/Mesías u otras terminologías mayores en este versículo.'
  issues:
  - severity: medium
    issue: 'Expresión española poco natural e incorrecta en número: «a quien ella dio a luz para Jacob»'
    rationale: El antecedente es plural (Dan y Neftalí), por lo que «a quien» es gramaticalmente inadecuado. Además, «dar a luz para Jacob» suena forzado en español bíblico contemporáneo. Una formulación fiel y natural es «que ella le dio a Jacob».
  - severity: medium
    issue: «Sierva» no sigue la preferencia terminológica del proyecto para condición servil
    rationale: El proyecto indica que δοῦλος/slave se traduzca normalmente con «esclavo/esclava» cuando el inglés POB elige «slave» por fuerza léxica. Aunque aquí el inglés dice handmaid, el sentido social sigue siendo servil; «esclava» preserva mejor esa fuerza que «sierva».
  - severity: low
    issue: La nota al pie defiende una opción léxica menos preferible
    rationale: La nota actual presenta «la esclava de Raquel» como mera alternativa, cuando esa forma es la mejor alineada con la política léxica del proyecto. Conviene eliminar la nota para no introducir vacilación innecesaria.
  revised_spanish_text: '[Y estos son los nombres de los hijos de Bilhá, la esclava de Raquel, la esposa de Jacob, que ella le dio a Jacob: Dan y Neftalí. Y estos son los nombres de sus hijos que vinieron con ellos a Egipto: los hijos de Dan: Husim y Samón.]'
  revision_rationale: Se ajusta la frase de parto/genealogía a un español natural y gramaticalmente correcto («que ella le dio a Jacob») sin perder el sentido de filiación del original, y se sustituye «sierva» por «esclava» para alinearse mejor con la política terminológica del proyecto sobre relaciones serviles. La nota al pie se elimina por innecesaria tras la corrección.
