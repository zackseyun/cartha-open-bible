lexical_decisions:
- source_word: Judah
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judas
  lexicon: JUDÁ
  rationale: El nombre propio bíblico corresponde a la forma española usual «Judá». Se evita «Judas» por ser la forma asociada al nombre griego/latino de otra persona y no al patriarca.
- source_word: his sons
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus varones
  - sus descendientes
  lexicon: HIJOS
  rationale: «Sus hijos» reproduce de manera natural y precisa el parentesco directo indicado por el contexto genealógico.
- source_word: these are the names
  english_pob_choice: these are the names
  chosen_spanish: estos son los nombres
  alternatives_spanish:
  - he aquí los nombres
  - y estos son los nombres
  lexicon: NOMBRES
  rationale: Se conserva la fórmula enumerativa simple y transparente del original, adecuada para una lista genealógica.
- source_word: Shelah
  english_pob_choice: Shelah
  chosen_spanish: Selá
  alternatives_spanish:
  - Sela
  lexicon: SELÁ
  rationale: Se usa la forma española tradicional y readable «Selá», manteniendo la identificación del nombre propio.
- source_word: Perez
  english_pob_choice: Perez
  chosen_spanish: Pérez
  alternatives_spanish:
  - Peres
  lexicon: PÉREZ
  rationale: Se adopta la forma española asentada «Pérez», que corresponde al nombre bíblico y es inteligible para lectores en español.
- source_word: Zerah
  english_pob_choice: Zerah
  chosen_spanish: Zeraj
  alternatives_spanish:
  - Zéraj
  - Zérah
  lexicon: ZERAJ
  rationale: Se translitera el nombre con «j» para reflejar con mayor cercanía la consonante gutural final del hebreo, conservando el nombre propio sin forzar una forma tradicional menos transparente.
- source_word: three
  english_pob_choice: three
  chosen_spanish: tres
  lexicon: TRES
  rationale: Se mantiene el numeral literal, que funciona como cierre de la enumeración y confirma el total de los hijos nombrados.
