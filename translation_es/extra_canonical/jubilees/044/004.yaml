translation:
  language: es
  text: 'Y el día dieciséis Yahvé se le apareció y le dijo: «Jacob, Jacob». Y él respondió: «Heme aquí».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - Dios
  lexicon: YHWH
  rationale: Aunque el default del proyecto para el nombre divino es «Yahvé», en esta cláusula la fuente ge'ez refleja una aparición del Señor con fórmula de llamada directa, y la tradición auditada en inglés usa «the Lord». En español, «el Señor» comunica con naturalidad esa voz epifánica sin forzar una identificación nominativa que el texto breve no explicita por sí sola.
- source_word: ያዕቆብ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  - Jacobo
  lexicon: Ἰακώβ / יַעֲקֹב
  rationale: Se conserva el nombre propio bíblico estándar «Jacob», que es claro y plenamente reconocido en español, sin latinizarlo a «Jacobo» porque la forma patrimonial puede sonar menos precisa en un contexto de cita directa.
- source_word: ነየ፡ አነ
  english_pob_choice: Here I am
  chosen_spanish: Heme aquí
  alternatives_spanish:
  - Aquí estoy
  - Aquí me tienes
  lexicon: ἰδοὺ ἐγώ / fórmula de disponibilidad
  rationale: La respuesta corta de disponibilidad se vierte con la fórmula bíblica tradicional «Heme aquí», que en español conserva el tono de respuesta inmediata y reverente de la escena. «Aquí estoy» sería más moderno, pero menos marcado litúrgicamente.
- source_word: አመ፡ 'ዐሡሩ፡ ወስዱሱ፡
  english_pob_choice: on the sixteenth
  chosen_spanish: el día dieciséis
  alternatives_spanish:
  - a los dieciséis
  - el dieciséis
  lexicon: marcador temporal
  rationale: La construcción ge'ez indica fecha del mes; por eso se traduce de modo explícito como «el día dieciséis», evitando ambigüedad y manteniendo el valor calendárico del enunciado.
theological_decisions:
- issue: Nombre divino en una aparición a Jacob
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - Dios
  rationale: La escena presenta la manifestación divina con fórmula de vocación/respuesta. Aunque el proyecto normalmente representa el Tetragrámaton como «Yahvé», aquí la lectura auditada en inglés ya fija «the Lord»; en español, «el Señor» preserva esa resonancia de aparición sin introducir una decisión onomástica no exigida por el breve pasaje.
  doctrine_reference: Éxodo 3:4; uso bíblico de fórmulas de aparición divina
