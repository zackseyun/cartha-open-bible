theological_decisions:
- issue: Conteo explícito frente a lista nominal
  english_pob_reading: The names listed are three sons of Levi, while the footnote notes a possible corrupted total in one manuscript tradition.
  chosen_spanish_reading: La lista presenta tres hijos de Leví, y se conserva el total 'tres' con nota textual.
  alternative_spanish_readings:
  - La lista presenta tres hijos de Leví.
  - Tres son sus hijos, aunque el total puede ser textualmente problemático.
  rationale: El POB inglés mantiene tanto la lista como el total y añade una nota textual sobre una posible corrupción numérica. En español se preserva esa tensión sin suavizarla, porque el recuento forma parte del dato transmitido y la nota explica la discrepancia textual.
  doctrine_reference: Crítica textual; no implica doctrina, solo transmisión manuscrita.
translation_notes:
  revision_awareness: El contexto de revisión más reciente indica que no hubo cambios necesarios y que existe alta concordancia. Esta versión española sigue de cerca la decisión del POB inglés de conservar la lista nominal junto con el total explícito y la nota crítica textual.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y otras convenciones no presentes en el texto, porque aquí no aparecen nombres divinos.
  - Se mantiene un registro bíblico sobrio y claro, adecuado para lectura pública.
  - La nota usa la variante textual solo donde el audit trail inglés la documenta.
  - No se añade puntuación interpretativa más allá de la necesaria para el español natural.
