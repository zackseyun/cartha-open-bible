    rationale: En español, el orden actual es torpe y puede oscurecer que José es el destino/referente y que Judá fue enviado por delante. Una formulación como 'Israel envió a Judá delante de sí, a su hijo José' o 'envió por delante a Judá, a su hijo José' aclara la relación sin cambiar el sentido.
  - severity: low
    issue: La secuencia final puede sonar algo pesada
    rationale: '''Y era la mejor parte de la tierra de Egipto, y estaba cerca de él'' es fiel, pero una puntuación y enlace levemente ajustados mejoran la naturalidad sin alterar el contenido.'
