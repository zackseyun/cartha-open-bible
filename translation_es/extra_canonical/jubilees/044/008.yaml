revisions:
- from: Israel envió a Judá delante de él a su hijo José, para que examinara la tierra de Gosén[a], porque allí José había dicho a sus hermanos que vinieran a vivir, para que estuvieran cerca de él. Y era la mejor parte de la tierra de Egipto[b], y estaba cerca de él, para todos ellos y para su ganado.
  to: Israel envió a Judá delante de sí, a su hijo José, para que examinara la tierra de Gosén[a], porque allí José había dicho a sus hermanos que vinieran a vivir, para que estuvieran cerca de él. Y era la mejor parte de la tierra de Egipto[b], cerca de él, para todos ellos y para su ganado.
  rationale: La revisión hace una reparación pequeña pero importante de sintaxis y fluidez. 'Delante de sí, a su hijo José' evita la torpeza de 'delante de él a su hijo José' y conserva la relación narrativa original. También se simplifica la frase final para que suene más natural en español sin perder ni el superlativo ni la proximidad a José. Las notas existentes siguen siendo válidas y correctamente ancladas.
