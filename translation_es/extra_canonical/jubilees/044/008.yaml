translation:
  language: es
  text: Israel envió a Judá delante de sí, a su hijo José, para que examinara la tierra de Gosén[a], porque allí José había dicho a sus hermanos que vinieran a vivir, para que estuvieran cerca de él. Y era la mejor parte de la tierra de Egipto[b], cerca de él, para todos ellos y para su ganado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'reconociera'.
    reason: lexical_alternative
  - marker: b
    text: O 'era buena en la tierra de Egipto'.
    reason: alternative_reading
lexical_decisions:
- source_word: ḥatata / examine
  english_pob_choice: examine the land
  chosen_spanish: examinar la tierra
  alternatives_spanish:
  - reconocer la tierra
  - explorar la tierra
  - preparar la tierra
  lexicon: Jubilees-Ge'ez verb with scouting/investigative force
  rationale: La revisión auditada corrigió 'prepare' a 'examine' por la fuerza principal del verbo ge'ez; en español, 'examinar' conserva la idea de inspeccionar o investigar la tierra sin introducir una finalidad ajena al contexto.
- source_word: Goshen
  english_pob_choice: Goshen
  chosen_spanish: Gosén
  alternatives_spanish:
  - Goshen
  lexicon: Topónimo bíblico
  rationale: Se adapta el topónimo a la grafía española más estable y reconocible, sin alterar la referencia geográfica.
- source_word: best of the land of Egypt
  english_pob_choice: the best of the land of Egypt
  chosen_spanish: la mejor parte de la tierra de Egipto
  alternatives_spanish:
  - la mejor de la tierra de Egipto
  - lo mejor de la tierra de Egipto
  lexicon: Comparative/superlative idiom
  rationale: La auditoría señaló un matiz superlativo/comparativo; 'la mejor parte' transmite de forma natural en español que Gosén era la porción privilegiada de Egipto.
- source_word: dwell
  english_pob_choice: come and dwell
  chosen_spanish: vinieran a vivir
  alternatives_spanish:
  - vinieran a habitar
  - vinieran a morar
  lexicon: Settlement language
  rationale: '''Vivir'' expresa con claridad la residencia estable pedida por José; ''habitar/morar'' son posibles pero más marcados o más arcaicos para español general.'
- source_word: livestock
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus animales
  - sus rebaños
  lexicon: Pastoral term
  rationale: '''Ganado'' es el término más natural y compacto en español bíblico para incluir el conjunto de animales de cría de la familia.'
theological_decisions:
- issue: Identificación de la tierra de Gosén como la porción privilegiada de Egipto
  english_pob_reading: it was the best of the land of Egypt, and near to him, for all of them and for their livestock
  chosen_spanish_reading: era la mejor parte de la tierra de Egipto, y estaba cerca de él, para todos ellos y para su ganado
  alternative_spanish_readings:
  - era buena en la tierra de Egipto
  - era la mejor de la tierra de Egipto
  rationale: La redacción mantiene la valoración positiva y la proximidad a José sin suavizar el superlativo confirmado por la revisión. Esto preserva la conexión narrativa con la provisión de Dios para la casa de Israel en Egipto.
  doctrine_reference: Providencia divina y preservación del pueblo del pacto en el éxodo patriarcal
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del expediente: se adopta ''examinar'' en lugar de ''preparar'' y se conserva la fuerza superlativa de ''the best of the land of Egypt''. No se observan cambios posteriores en la última pasada de revisión.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito solo donde el texto lo requiere; este versículo no contiene nombre divino explícito.
  - Se usa 'Yahvé' solo cuando aparece el Tetragrámaton, lo cual no sucede aquí.
  - '''José'' y ''Judá'' conservan las formas españolas estándar de nombres propios bíblicos.'
  - La puntuación separa con claridad la cláusula final de propósito ('para que') y la cláusula de resultado, reflejando la sintaxis del original.
