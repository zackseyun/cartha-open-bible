    reason: segmentation_note
lexical_decisions:
- source_word: Zilpah
  english_pob_choice: Zilpah
  chosen_spanish: Zilpá
  alternatives_spanish:
  - Zilpa
  - Silpá
  lexicon: Genesis/Jubilees patronymic form in Spanish tradition
  rationale: Se conserva el nombre propio con adaptación gráfica al español y acentuación aguda para lectura natural. No hay base para sustituirlo por una forma tradicional distinta.
- source_word: maidservant
  english_pob_choice: maidservant
  chosen_spanish: sierva
  alternatives_spanish:
  - esclava
  - criada
  lexicon: Generic female household-servant term
  rationale: El contexto genealógico y doméstico favorece una designación funcional. 'Sierva' es clara y digna en español; 'esclava' sería más fuerte de lo que el sintagma inglés aquí exige, y 'criada' suena demasiado moderno o doméstico para el registro bíblico.
- source_word: Jacob
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  lexicon: Proper name
  rationale: Se mantiene la forma bíblica usual en español.
- source_word: came with him into Egypt
  english_pob_choice: came with him into Egypt
  chosen_spanish: vinieron con él a Egipto
  alternatives_spanish:
  - entraron con él en Egipto
  - bajaron con él a Egipto
  lexicon: Narrative travel formula
  rationale: '''Vinieron con él a Egipto'' reproduce el movimiento conjunto sin añadir matices no explicitados. ''Bajaron'' sería posible en registro bíblico, pero no es necesario aquí.'
- source_word: sons of Gad
  english_pob_choice: The sons of Gad
  chosen_spanish: Los hijos de Gad
  alternatives_spanish:
  - Los descendientes de Gad
  lexicon: Genealogical formula
  rationale: Se mantiene la fórmula genealógica literal y natural en español.
- source_word: seven
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - siete en total
  lexicon: Cardinal count
  rationale: Se conserva el cierre enumerativo simple. No se añade glosa porque el número ya funciona como confirmación del listado.
theological_decisions:
- issue: Traducción del título de la madre de los hijos de Gad y Aser
