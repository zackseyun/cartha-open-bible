    rationale: El inglés conserva una nota específica sobre un nombre parcialmente oscurecido por la segmentación de la fila; la nota española habla solo de adaptación ortográfica, lo que cambia el foco editorial y omite la incertidumbre textual relevante.
  - severity: medium
    issue: Concordancia/antecedente problemático en 'a quien ella dio a Jacob'
    rationale: En español, 'a quien' tiende a referirse a persona; con antecedente 'Zilpá' femenino y el verbo 'dio', la formulación resulta áspera y algo ambigua. 'a la cual ella dio a Jacob' o una reestructuración preserva mejor el sentido.
  - severity: low
    issue: Puntuación final de la enumeración de Gad mejorable
    rationale: '''Areli: siete'' suena mecánico; una raya o paréntesis refleja mejor el sumario enumerativo sin alterar el sentido.'
