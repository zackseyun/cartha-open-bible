  text: 'Y los hijos de Zilpá, la sierva de Lea, a la cual ella dio a Jacob: Gad y Aser. Y estos son los nombres de sus hijos que vinieron con él a Egipto. Los hijos de Gad: Zifión, Haggi, Shuni, Ezbón, Eri, Arodi y Areli[a], siete.'
