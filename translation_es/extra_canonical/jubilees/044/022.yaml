  lexicon: none
  rationale: Se conserva el nombre propio bíblico con una adaptación gráfica natural al español. La forma sin tilde es legible y coherente con uso transliterado sencillo.
- source_word: Rachel’s slave woman
  english_pob_choice: slave woman
  chosen_spanish: la esclava de Raquel
  alternatives_spanish:
  - la sierva de Raquel
  - la esclava, mujer de Raquel
  lexicon: none
  rationale: Se mantiene el valor de pertenencia y condición servil que la revisión inglesa fijó en 'slave woman'. En español, 'esclava' comunica mejor esa fuerza que 'sierva', que suaviza el vínculo de esclavitud.
- source_word: whom she bore to Jacob
  english_pob_choice: whom she bore to Jacob
  chosen_spanish: que ella dio a luz para Jacob
  alternatives_spanish:
  - que le dio a Jacob
  - que ella le dio a Jacob
  lexicon: none
  rationale: '''Dar a luz'' conserva el sentido de parto y maternidad del original; ''para Jacob'' refleja la relación de filiación en el contexto genealógico sin añadir ideas ajenas.'
- source_word: Dan and Naphtali
  english_pob_choice: Dan and Naphtali
  chosen_spanish: Dan y Neftalí
  alternatives_spanish:
  - Dan y Naphtalí
  lexicon: none
  rationale: Nombres propios bíblicos en forma española establecida. 'Neftalí' es la forma más extendida y clara en español bíblico.
theological_decisions:
- issue: Condición social de Bilha
  english_pob_reading: Rachel’s slave woman
  chosen_spanish_reading: la esclava de Raquel
  alternative_spanish_readings:
  - la sierva de Raquel
  - la criada de Raquel
  rationale: La revisión inglesa corrigió una atenuación previa y privilegió la relación de esclavitud. El español mantiene esa tensión lexical sin domesticarla.
  doctrine_reference: Génesis 30:3-8; 35:25-26
translation_notes:
