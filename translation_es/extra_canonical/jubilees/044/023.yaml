theological_decisions:
- issue: Lista genealógica ampliada frente a la tradición más familiar
  english_pob_reading: Dan's sons differ from the more familiar Genesis list. Jubilees here preserves an expanded tradition in which several sons are named, though most die in Egypt the same year.
  chosen_spanish_reading: La lista de los hijos de Dan se presenta como una tradición ampliada, sin armonizarla con Génesis dentro del versículo.
  alternative_spanish_readings:
  - Los hijos de Dan son los mismos que en Génesis.
  - Se trata de una lista resumida e interpretativa.
  rationale: El texto de Jubileos ofrece explícitamente una lista distinta y más amplia; la traducción no debe borrar esa tensión con la tradición genética más conocida. Se conserva la particularidad de la fuente sin agregar nota interpretativa al cuerpo del verso.
  doctrine_reference: N/A (cuestión textual y traditiva, no doctrinal)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que eliminó la cláusula ajena al ge'ez («And these are the names of their sons who came with them into Egypt.»). Por eso el español sigue únicamente la lista breve atestiguada para JUB.44.23 y no introduce esa frase.
  spanish_consistency_notes:
  - Se mantiene la coordinación simple con «Y» para conservar el ritmo genealógico del original.
  - Se usa la raya antes de «cinco» para reflejar el cierre resumitivo del enunciado, como en la POB inglesa.
  - Se preserva la nota [23] porque la tensión con Génesis forma parte del expediente auditado y no debe borrarse.
