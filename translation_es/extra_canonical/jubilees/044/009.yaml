translation:
  language: es
  text: 'Y estos son los nombres de los hijos de Jacob que entraron en Egipto con Jacob su padre: Rubén, el primogénito de Israel; y estos son los nombres de sus hijos: Enoc, Falú, Hezrón y Carmi: cuatro.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: names
  english_pob_choice: names
  chosen_spanish: nombres
  alternatives_spanish:
  - nombres propios
  lexicon: name → nombre
  rationale: La forma simple «nombres» reproduce con naturalidad el listado genealógico del texto y mantiene la función identificadora del original sin añadir matiz innecesario.
- source_word: went into Egypt
  english_pob_choice: went into Egypt
  chosen_spanish: entraron en Egipto
  alternatives_spanish:
  - fueron a Egipto
  - bajaron a Egipto
  lexicon: go/enter → entrar
  rationale: «Entraron en Egipto» conserva el sentido de ingreso al país y funciona bien en español bíblico actual. «Bajaron» sería posible por la geografía narrativa, pero no es requerido por el texto base aquí.
- source_word: firstborn
  english_pob_choice: firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el hijo mayor
  - el primero nacido
  lexicon: firstborn → primogénito
  rationale: «Primogénito» es el equivalente bíblico y lexical más directo para el rango de nacimiento de Rubén.
- source_word: Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: Israel → Israel
  rationale: Se mantiene el nombre propio sin alteración.
- source_word: his sons
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  lexicon: son → hijo
  rationale: «Sus hijos» es suficiente en este contexto genealógico; el masculino está ya implicado por la lista de varones.
theological_decisions:
- issue: Genealogical enumeration and tribal identity
  english_pob_reading: The verse lists Jacob's sons and then Reuben's sons without interpretive expansion.
  chosen_spanish_reading: Se conserva la estructura genealógica desnuda, sin explicar ni armonizar más allá del texto.
  alternative_spanish_readings:
  - Añadir una glosa explicativa sobre la descendencia de Rubén
  - Reformular la lista en prosa más libre
  rationale: No hay tensión teológica que resolver; la fidelidad consiste en mantener el inventario de nombres y su orden, porque el texto cumple una función genealógica y memorial.
  doctrine_reference: Genealogía patriarcal; transmisión de linaje
translation_notes:
  revision_awareness: El texto base y el control cruzado indican alto acuerdo y ausencia de revisiones; por ello no se introducen notas ni ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se preserva la estructura de dos cláusulas coordinadas con dos listas nominales.
  - Se usa puntuación clara de lista con dos puntos y coma largo para reflejar el orden del original y la edición inglesa de referencia.
  - Se mantiene «Egipto» y los nombres propios en forma estándar española, con «Falú» para Pallu en una adaptación fonética habitual en español bíblico.
