translation:
  language: es
  text: Y sus hijos y los hijos de sus hijos se levantaron, y cargaron a su padre y a sus posesiones en carros. Y Israel partió de Beerseba[a] el dieciséis de este tercer mes, y fue a la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beerseba significa 'Pozo del Juramento' o 'Pozo del Juramento hecho bajo juramento', preservando el sentido del topónimo reflejado en el inglés POB.
    reason: Preservar en español el valor semántico del topónimo sin sacrificar la forma más reconocible y natural para lectores bíblicos.
lexical_decisions:
- source_word: sons
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - descendientes
  lexicon: hijo
  rationale: El inglés POB usa el sentido familiar directo; en español, 'hijos' comunica de manera natural la relación filial sin introducir especificidad masculina innecesaria en este contexto narrativo.
- source_word: wagons
  english_pob_choice: wagons
  chosen_spanish: carros
  alternatives_spanish:
  - carretas
  - vagones
  lexicon: carro
  rationale: '''Carros'' es el término español más natural y amplio para el vehículo de carga del contexto antiguo; ''carretas'' suena más moderno/rural y ''vagones'' sería anacrónico.'
- source_word: Well of the Oath
  english_pob_choice: Well of the Oath
  chosen_spanish: Pozo del Juramento
  alternatives_spanish:
  - Pozo del Pacto
  - Pozo del Juramento y del Juramento
  lexicon: pozo
  rationale: El nombre propio se vierte de forma semántica como en el inglés POB, manteniendo la referencia al juramento. 'Juramento' preserva mejor el valor del nombre tradicional asociado al episodio.
- source_word: set out
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - salió
  - se puso en camino
  lexicon: partir
  rationale: '''Partió'' es una solución narrativa sobria y fiel para el inicio del viaje, con registro bíblico claro y sin añadir matices ausentes del original.'
- source_word: land of Egypt
  english_pob_choice: land of Egypt
  chosen_spanish: la tierra de Egipto
  alternatives_spanish:
  - Egipto
  - el país de Egipto
  lexicon: tierra
  rationale: Se conserva la fórmula bíblica 'la tierra de Egipto' por su equivalencia directa y su claridad en español bíblico.
theological_decisions:
- issue: Uso del nombre divino indirecto en un topónimo narrativo
  english_pob_reading: Well of the Oath
  chosen_spanish_reading: Pozo del Juramento
  alternative_spanish_readings:
  - Pozo del Pacto
  rationale: No hay mención explícita del nombre divino en este verso; sin embargo, el topónimo remite al episodio del juramento. Se mantiene una traducción semántica del nombre, sin introducir una glosa teológica no presente en el texto.
  doctrine_reference: Toponymy and narrative reference in Genesis/Jubilees tradition
- issue: Referencia a Israel como sujeto colectivo y personal
  english_pob_reading: Israel set out
  chosen_spanish_reading: Israel partió
  alternative_spanish_readings:
  - se puso en camino Israel
  rationale: Se conserva 'Israel' como nombre del patriarca y del sujeto colectivo según el uso narrativo del texto. La forma breve en español respeta la solemnidad del relato.
  doctrine_reference: Narrative identity of Israel in patriarchal literature
translation_notes:
  revision_awareness: El texto fuente ge'ez no está disponible en este paquete (cadena vacía), así que la redacción se apoya en el texto inglés auditado de POB y en la coherencia interna de la tradición de Jubileos; la revisión reciente indica que no hubo cambios necesarios y el acuerdo cruzado fue alto.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y legible.
  - Se evitó calco sintáctico innecesario, pero se conservó la estructura narrativa de dos oraciones.
  - No se introdujeron notas al pie porque el verso no presenta variantes ni ambigüedades textuales documentadas en el material dado.
