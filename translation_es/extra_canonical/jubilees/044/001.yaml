review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia principal del ge''ez y del POB inglés: Israel parte de su casa, en el novilunio del tercer mes, va por el camino del Pozo del Juramento y ofrece sacrificio al Dios de su padre Isaac el día séptimo del mes. Sin embargo, la solución ''salió de [a] su casa'' no preserva con suficiente fidelidad la forma del problema textual: la fuente ge''ez sí contiene un topónimo (''Haran''), y la auditoría inglesa pidió mantenerlo mediante nota, no sustituirlo en el texto principal por una expresión genérica ausente del original. Conviene reflejar en español ''de Harán[a], de su casa'' para conservar el testimonio base y la nota crítica.'
  spanish_quality_summary: El español es claro y digno, pero 'salió de [a] su casa' suena algo artificioso por la inserción de la nota entre preposición y complemento y además oculta el topónimo fuente. 'Novilunio' es correcto pero menos natural para lectura eclesial amplia; 'luna nueva' sería más legible, aunque 'novilunio' sigue siendo aceptable. La frase mejora en naturalidad con 'salió de Harán[a], de su casa'.
  glossary_alignment: 'No hay conflicto con la terminología teológica del proyecto: ''Dios'' está bien para ለአምላከ፡, no corresponde ''Yahvé''. ''Israel'', ''Isaac'' y ''Pozo del Juramento'' son adecuados. La principal desviación es metodológica/lexical: se reemplazó un topónimo explícito por una paráfrasis genérica no sustentada por la fuente.'
  issues:
  - severity: high
    issue: El texto principal omite el topónimo ge'ez 'Haran/Harán' y lo reemplaza por 'su casa'.
    rationale: La fuente contiene እምካራን ('de Haran'). El POB inglés documenta conservar esa lectura con nota explicativa sobre probable error escribal por 'Hebron'. Sustituirla por 'su casa' en el texto principal elimina evidencia textual significativa y va más allá de una aclaración.
  - severity: medium
    issue: La nota está anclada en un lugar poco natural.
    rationale: 'Colocar [a] después de ''de'' rompe la fluidez. Debe anclarse en el topónimo problemático: ''Harán[a]''.'
  - severity: low
    issue: '''Novilunio'' puede resultar menos transparente que ''luna nueva'' para lectores generales.'
    rationale: No es incorrecto y conserva precisión calendárica, así que no exige adjudicación; solo es una consideración de estilo.
  revised_spanish_text: Y Israel salió de Harán[a], de su casa, al novilunio del tercer mes, y fue por el camino del Pozo del Juramento, y ofreció un sacrificio al Dios de su padre Isaac, el séptimo de este mes.
  revised_footnotes:
  - marker: a
    text: El ge'ez dice «Harán», probablemente un error escribal por «Hebrón».
    reason: textual_variant
  revision_rationale: La revisión restaura en el texto principal el topónimo que sí aparece en la fuente ge'ez, en conformidad con la auditoría inglesa, y deja la explicación crítica en nota. Así se preserva mejor la evidencia textual sin armonizar indebidamente el texto base.
