translation:
  language: es
  text: Y Israel salió de Harán[a], de su casa, al novilunio del tercer mes, y fue por el camino del Pozo del Juramento, y ofreció un sacrificio al Dios de su padre Isaac, el séptimo de este mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez dice «Harán», probablemente un error escribal por «Hebrón».
    reason: textual_variant
lexical_decisions:
- source_word: እስራኤል / Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: nombre propio
  rationale: El ge'ez dice literalmente 'Israel'. Mantengo el nombre tal como aparece en la fuente, sin armonizarlo con el personaje histórico más probable, porque la traducción debe seguir el testimonio textual y el auditorial inglés.
- source_word: እምካራን
  english_pob_choice: 'from Add a footnote: "Ge''ez reads Haran, a likely scribal error for Hebron."'
  chosen_spanish: de [a] su casa
  alternatives_spanish:
  - de Hebrón
  - de Harán
  lexicon: topónimo / lectura textual
  rationale: La revisión inglesa señaló que el ge'ez conserva 'Haran', probablemente por error escribal frente a 'Hebrón'. En español, para no fijar en el texto principal una armonización que no está en el testimonio base, uso una expresión genérica ('de su casa') y explico la variante textual en la nota.
- source_word: በሠርቀ፡ ሣልስ፡ ወርኅ።
  english_pob_choice: on the new moon of the third month
  chosen_spanish: al novilunio del tercer mes
  alternatives_spanish:
  - en la luna nueva del tercer mes
  - en el primer día del tercer mes
  lexicon: calendario / expresión temporal
  rationale: '''New moon'' se vierte mejor como ''novilunio'' en español bíblico-disciplinado, preservando el valor calendárico exacto del original sin una paráfrasis demasiado libre.'
- source_word: ወሖረ፡ እንተ፡ ፍኖተ፡ ዐዘቅተ፡ መሐላ።
  english_pob_choice: and he went by the way of the Well of the Oath
  chosen_spanish: fue por el camino del Pozo del Juramento
  alternatives_spanish:
  - fue por el camino del Pozo del Pacto
  - fue por el camino del Pozo del Juramento
  lexicon: topónimo / nombre tradicional
  rationale: El inglés POB traduce el nombre semánticamente como 'Well of the Oath'. En español, 'Pozo del Juramento' conserva la misma fuerza semántica y evita la lectura de una localización moderna no atestiguada.
- source_word: ለአምላከ፡ አቡሁ፡ ይስሐቅ።
  english_pob_choice: to the God of his father Isaac
  chosen_spanish: al Dios de su padre Isaac
  alternatives_spanish:
  - al Dios de su padre, Isaac
  - al Dios de su padre Isaac
  lexicon: título divino relacional
  rationale: Mantengo la relación posesiva directa del original y del inglés POB, sin insertar comas innecesarias que alteren la conexión entre 'padre' e 'Isaac'.
theological_decisions:
- issue: Tratamiento del nombre divino en una fórmula relacional
  english_pob_reading: God of his father Isaac
  chosen_spanish_reading: Dios de su padre Isaac
  alternative_spanish_readings:
  - Dios de su padre, Isaac
  - Dios del padre de Isaac
  rationale: Aquí la fuente no contiene el tetragrámaton sino 'Dios' en una fórmula de relación patrimonial/covenantal. Por eso no introduzco 'Yahvé' en el texto principal; conservo la designación explícita del original y su relación con Isaac.
  doctrine_reference: Término bíblico relacional para Dios sin sustitución del nombre propio divino
translation_notes:
  revision_awareness: Seguí la revisión más reciente que mantiene la lectura literal del ge'ez donde corresponde y documenta la variante textual en nota. También conservé la semántica calendárica y toponímica del auditorio inglés, evitando harmonizar más allá del testimonio base.
  spanish_consistency_notes:
  - Usé «novilunio» para mantener un registro bíblico claro y preciso.
  - Conservé «Pozo del Juramento» como traducción semántica del topónimo, en línea con la POB inglesa.
  - Evité «SEÑOR» porque la fuente aquí dice simplemente 'Dios', no el tetragrámaton.
