translation:
  language: es
  text: Y todos los descendientes de Jacob que entraron en Egipto fueron setenta personas. Estos son sus hijos y los hijos de sus hijos[a], todos ellos setenta y cinco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «setenta y cinco».
    reason: alternative_reading
lexical_decisions:
- source_word: persons / persons of Jacob
  english_pob_choice: persons of Jacob
  chosen_spanish: los descendientes de Jacob
  alternatives_spanish:
  - las personas de Jacob
  - la casa de Jacob
  lexicon: Jacob
  rationale: En español, 'personas de Jacob' suena poco natural para una filiación colectiva; 'descendientes de Jacob' conserva el sentido genealógico del pasaje sin añadir interpretación extra. El referente es el grupo familiar que baja a Egipto.
- source_word: entered Egypt
  english_pob_choice: entered Egypt
  chosen_spanish: entraron en Egipto
  alternatives_spanish:
  - bajaron a Egipto
  - entraron a Egipto
  lexicon: Egipto
  rationale: '''Entraron en Egipto'' sigue de cerca el valor narrativo del original y mantiene el paralelo con el conteo de quienes llegan al país. ''Bajaron'' sería idiomático, pero menos fiel al enunciado contable.'
- source_word: seventy persons
  english_pob_choice: seventy persons
  chosen_spanish: setenta personas
  alternatives_spanish:
  - setenta seres
  - setenta individuos
  lexicon: setenta
  rationale: '''Personas'' es el equivalente natural y preciso en español para el conteo humano. Conserva el total primero declarado sin sobrecargar el estilo.'
- source_word: sons and the sons of his sons
  english_pob_choice: his sons and the sons of his sons
  chosen_spanish: sus hijos y los hijos de sus hijos
  alternatives_spanish:
  - sus hijos y sus nietos
  - sus hijos y los hijos de sus hijos
  lexicon: hijos
  rationale: Se mantiene la estructura genealógica explícita del texto. 'Nietos' explicita la relación, pero puede ir más allá de la formulación del pasaje; por eso se prefiere la construcción literal clara.
- source_word: seventy-five
  english_pob_choice: seventy-five
  chosen_spanish: setenta y cinco
  alternatives_spanish:
  - setenta y cinco personas
  - setenta y cinco
  lexicon: setenta y cinco
  rationale: Se conserva el segundo total tal como aparece en el audit trail inglés. No se armoniza con el primer conteo porque el texto distingue deliberadamente entre ambas cifras.
theological_decisions:
- issue: 'Doble conteo: setenta al entrar y setenta y cinco incluyendo descendencia'
  english_pob_reading: 'The chapter''s arithmetic is deliberate but not straightforward: it speaks of seventy entering Egypt, then seventy-five including descendants, and then explains that five died in Egypt, while Joseph and his two sons are excluded from that death notice.'
  chosen_spanish_reading: 'El pasaje mantiene deliberadamente dos totales: setenta al entrar en Egipto y setenta y cinco al incluir a los descendientes.'
  alternative_spanish_readings:
  - armonizar ambas cifras en una sola
  - explicarlo en una nota más extensa
  rationale: La versión española debe preservar la tensión numérica documentada por el audit trail, no resolverla por armonización. La frase principal conserva ambos números sin intentar nivelarlos; la nota explica que el texto distingue entre el grupo que entra y el recuento ampliado de descendencia.
  doctrine_reference: Textual y exegética; fidelidad al testimonio numérico del pasaje
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrige la puntuación final del inglés auditado; en español se cerró la oración con punto final. No se introdujeron cambios de contenido respecto del último pase aprobado.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - Se evitó 'Cristo/Mesías' porque no aparece vocabulario mesiánico en este pasaje.
  - La cifra 'setenta y cinco' se conservó como segunda lectura numérica, en línea con el audit trail inglés, sin armonización interpretativa.
  - Se prefirió un español bíblico claro y contemporáneo, con sintaxis simple y conteos explícitos.
