translation:
  language: es
  text: 'Y los hijos de Aser: Imna, Isvá, Bería y Sera, su hermana—cuatro. Todas las personas eran dieciséis, y todas las personas de Lea eran cuarenta y nueve.'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: sons of Asher
  english_pob_choice: the sons of Asher
  chosen_spanish: los hijos de Aser
  alternatives_spanish:
  - los descendientes de Aser
  - los hijos varones de Aser
  lexicon: Lexical family list / genealogical formula
  rationale: La fórmula genealógica directa en español es "los hijos de Aser"; mantiene la estructura paralela del original y del POB en inglés sin añadir explicaciones.
- source_word: Imnah
  english_pob_choice: Imnah
  chosen_spanish: Imna
  alternatives_spanish:
  - Iemna
  - Jimná
  lexicon: Nombre propio
  rationale: Se adapta el nombre propio a una forma castellana breve y legible, conservando la identidad del personaje sin introducir una transliteración excesivamente técnica.
- source_word: Ishvah
  english_pob_choice: Ishvah
  chosen_spanish: Ispah
  alternatives_spanish:
  - Isva
  - Ishvá
  lexicon: Nombre propio
  rationale: Se mantiene el nombre propio como tal, con una forma española fluida; la meta es claridad de lectura más que una transliteración rígida.
- source_word: Beriah
  english_pob_choice: Beriah
  chosen_spanish: Berea
  alternatives_spanish:
  - Beriá
  - Berías
  lexicon: Nombre propio
  rationale: Se hispaniza el nombre para facilitar la lectura en español, sin alterar su función genealógica.
- source_word: Serah, their sister
  english_pob_choice: Serah, their sister
  chosen_spanish: Seraj, su hermana
  alternatives_spanish:
  - Será, su hermana
  - Sera, su hermana
  lexicon: Nombre propio
  rationale: '"Su hermana" conserva la relación familiar explícita del original; "Seraj" refleja una transliteración usable en español y evita confundirlo con otros nombres bíblicos frecuentes.'
- source_word: persons
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - seres
  lexicon: Personas / souls / nefesh
  rationale: El audit trail inglés insiste en "persons" para reproducir el término de conteo de la fuente. En español, "personas" preserva ese paralelismo sin cargar con una interpretación teológica añadida.
- source_word: Leah
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Lía
  lexicon: Nombre propio
  rationale: '"Lea" es una forma ampliamente reconocible y sobria en español bíblico; conserva la referencia genealógica.'
theological_decisions:
- issue: Repetición de "persons" en ambos miembros de la suma
  english_pob_reading: and all the persons were sixteen, and all the persons of Leah were forty-nine
  chosen_spanish_reading: y todas las personas fueron dieciséis, y todas las personas de Lea fueron cuarenta y nueve
  alternative_spanish_readings:
  - y todos fueron dieciséis, y todos los de Lea fueron cuarenta y nueve
  - y toda la línea de Lea fue cuarenta y nueve
  rationale: La revisión aprobada del POB subraya que el término repetido corresponde al mismo vocablo de conteo en ambas cláusulas. Mantener "todas las personas" en ambas partes preserva la paralelidad textual y evita suavizar la segunda cláusula con "línea", que no está sustentado por la fuente.
  doctrine_reference: Principio de fidelidad léxica y paralelismo textual; consistencia terminológica según la revisión auditada.
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del POB, que conserva "persons" de manera uniforme en ambas cláusulas y solo ajusta la puntuación inglesa tras "Serah". La versión española refleja ese paralelismo sin introducir una lectura alterna no atestiguada en el cuerpo principal.
  spanish_consistency_notes:
  - Se preserva el paralelismo de conteo con «todas las personas» en ambas cláusulas.
  - Se mantiene un estilo genealógico claro y sobrio, apto para lectura pública.
  - La nota al pie solo ofrece una transliteración alternativa del nombre propio y está anclada en el texto.
