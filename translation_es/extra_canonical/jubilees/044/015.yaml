  text: 'Estos son los hijos de Jacob y sus hijos, que Lea le dio a luz a Jacob en Mesopotamia: seis, y Dina su hermana, una. Y todas las personas de los hijos de Lea y sus hijos que vinieron con Jacob su padre a Egipto fueron treinta y tres; y con Jacob su padre entre ellos, fueron treinta y cuatro.'
