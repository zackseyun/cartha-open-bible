theological_decisions:
- issue: Conteo total de la descendencia de Lea al entrar en Egipto
  english_pob_reading: six, and Dinah their sister, one ... thirty-three; and with Jacob their father among them, they were thirty-four
  chosen_spanish_reading: seis, y Dina su hermana, uno ... treinta y tres; y con Jacob su padre entre ellos, fueron treinta y cuatro
  alternative_spanish_readings:
  - seis, más Dina su hermana, una
  - 'seis y Dina su hermana: uno'
  rationale: Se conserva la estructura enumerativa y la tensión del total sin suavizarla, porque el texto distingue entre los seis hijos y Dina como unidad adicional, y luego recalcula el total con Jacob incluido.
