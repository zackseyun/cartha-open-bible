revisions:
- from: 'Estos son los hijos de Jacob y sus hijos, a quienes Lea dio a luz a Jacob en Mesopotamia: seis, y Dina su hermana, uno. Y todas las personas de los hijos de Lea y de sus hijos que vinieron con Jacob su padre a Egipto fueron treinta y tres; y con Jacob su padre entre ellos, fueron treinta y cuatro.'
  to: 'Estos son los hijos de Jacob y sus hijos, que Lea le dio a luz a Jacob en Mesopotamia: seis, y Dina su hermana, una. Y todas las personas de los hijos de Lea y sus hijos que vinieron con Jacob su padre a Egipto fueron treinta y tres; y con Jacob su padre entre ellos, fueron treinta y cuatro.'
  rationale: 'Se corrigen dos problemas claros del borrador: la construcción poco idiomática con “dio a luz” y la discordancia “uno/una” respecto de Dina. Además, se aligera levemente la sintaxis de la segunda oración sin alterar el sentido ni el esquema enumerativo del original auditado.'
