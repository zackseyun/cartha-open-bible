translation:
  language: es
  text: Y en los días de Serug surgieron guerras, y todos los hijos de los hombres se pusieron a hacer imágenes talladas, imágenes esculpidas y cosas inmundas; y los espíritus malos los ayudaban y los desviaban, para que cometieran transgresión e inmundicia.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: war/warfare context implicit in "there arose wars"
  english_pob_choice: there arose wars
  chosen_spanish: surgieron guerras
  alternatives_spanish:
  - hubo guerras
  - se levantaron guerras
  lexicon: —
  rationale: «Surgieron» conserva bien la idea de que la guerra irrumpe o aparece en ese periodo, sin forzar una construcción demasiado literal en español. Mantiene el tono narrativo del registro.
- source_word: sons of men
  english_pob_choice: all the sons of men
  chosen_spanish: todos los hijos de los hombres
  alternatives_spanish:
  - toda la humanidad
  - todos los hombres
  lexicon: —
  rationale: Se conserva la fórmula semítica amplia del original y de la POB inglesa. «Hijos de los hombres» mantiene el color bíblico y no estrecha indebidamente el alcance.
- source_word: graven images / carved images
  english_pob_choice: graven images and carved images
  chosen_spanish: imágenes talladas, imágenes esculpidas
  alternatives_spanish:
  - imágenes grabadas e imágenes talladas
  - ídolos tallados e imágenes esculpidas
  lexicon: —
  rationale: En español, «talladas» y «esculpidas» distinguen con naturalidad dos términos cercanos del inglés. Se evita «ídolos» porque el texto habla primero de la fabricación de imágenes, no solo de su valoración teológica.
- source_word: unclean things
  english_pob_choice: unclean things
  chosen_spanish: cosas inmundas
  alternatives_spanish:
  - cosas impuras
  - cosas contaminadas
  lexicon: —
  rationale: «Inmundas» reproduce la fuerza ritual/moral de «unclean» en un registro bíblico claro. «Impuras» sería posible, pero aquí se preserva mejor el paralelismo con «transgresión e inmundicia».
- source_word: evil spirits
  english_pob_choice: evil spirits
  chosen_spanish: los espíritus malos
  alternatives_spanish:
  - los espíritus malignos
  - los malos espíritus
  lexicon: רוּחַ / πνεῦμα
  rationale: Se mantiene la referencia a seres espirituales con una expresión transparente y bíblica. «Espíritus malos» sigue de cerca el orden y la relación adjetival del inglés POB.
- source_word: leading astray
  english_pob_choice: leading them astray
  chosen_spanish: los desviaban
  alternatives_spanish:
  - los extraviaban
  - los engañaban
  lexicon: —
  rationale: «Desviaban» comunica el alejamiento moral y religioso sin introducir un matiz psicológico no explicitado. En contexto, resume adecuadamente la idea de apartar del camino correcto.
- source_word: transgression
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - pecado
  - violación
  lexicon: —
  rationale: «Transgresión» preserva el valor legal/moral preciso del término y mantiene la distinción frente a «inmundicia».
- source_word: uncleanness
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - contaminación ritual
  lexicon: —
  rationale: Aquí se conserva el sustantivo abstracto «inmundicia» para reflejar el paralelismo del inglés POB y la carga ritual-moral del término.
theological_decisions:
- issue: Origen y agencia del mal espiritual en la conducta humana
  english_pob_reading: evil spirits were helping them and leading them astray
  chosen_spanish_reading: los espíritus malos los ayudaban y los desviaban
  alternative_spanish_readings:
  - los espíritus malos cooperaban con ellos y los engañaban
  - los espíritus malos los asistían y los extraviaban
  rationale: La formulación conserva la afirmación fuerte de que seres espirituales malignos activamente colaboraban en el pecado humano. «Ayudaban» mantiene la crudeza del inglés POB, aunque en español pueda sonar irónica; no se suaviza a «cooperaban» para no perder la tensión del pasaje.
  doctrine_reference: Demonología bíblica y responsabilidad moral humana
- issue: Relación entre imágenes, inmundicia y transgresión
  english_pob_reading: to make graven images and carved images and unclean things ... so that they might commit transgression and uncleanness
  chosen_spanish_reading: a hacer imágenes talladas, imágenes esculpidas y cosas inmundas ... para que cometieran transgresión e inmundicia
  alternative_spanish_readings:
  - a hacer ídolos e imágenes ... para que pecaran y se contaminaran
  - a hacer imágenes ... para incurrir en pecado e impureza
  rationale: Se mantiene la secuencia causal entre fabricación de objetos idolátricos y la comisión de faltas rituales/morales. No se reduce todo a «pecado» o «impureza», porque el original distingue ambos campos semánticos.
  doctrine_reference: Idolatría, pureza ritual y pecado moral en literatura del Segundo Templo
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios adicionales y que la estandarización del nombre a «Serug» quedó confirmada; el flujo de auditoría también registró y resolvió la forma anómala anterior «Seroh».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece porque el versículo no contiene el nombre divino.
  - Se traduce «evil spirits» por «espíritus malos» para conservar el sentido de agentes espirituales y no reducirlos a meras disposiciones internas.
  - Se evita «Cristo»/«Mesías» porque no corresponde al contenido del pasaje.
  - La puntuación con punto y coma conserva la estructura acumulativa de la oración larga del original inglés POB.
