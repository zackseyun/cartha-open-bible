translation:
  language: es
  text: Y el príncipe Mastema se esforzó por hacer todo esto, y envió otros espíritus, los que estaban bajo su mano[a], para hacer toda clase de error, pecado y transgresión, para corromper y destruir, y para derramar sangre sobre la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «bajo su mano», un modismo de subordinación o autoridad.
    reason: Aclara un giro semítico conservado en forma comprensible en español y evita ambigüedad sobre una mano literal.
lexical_decisions:
- source_word: prince Mastema
  english_pob_choice: the prince Mastema
  chosen_spanish: el príncipe Mastema
  alternatives_spanish:
  - Mastema, el príncipe
  - el príncipe de Mastema
  lexicon: Mastema
  rationale: Conservo el nombre propio y el título tal como el inglés POB; «príncipe» reproduce el rango/autoridad sin introducir una equivalencia doctrinal ajena al texto.
- source_word: exerted himself
  english_pob_choice: exerted himself
  chosen_spanish: se esforzó
  alternatives_spanish:
  - se aplicó
  - se empeñó
  lexicon: sin lexicon entry
  rationale: «Se esforzó» comunica iniciativa intensa y voluntaria sin sobretraducción ni coloración moderna excesiva.
- source_word: sent other spirits
  english_pob_choice: he sent other spirits
  chosen_spanish: envió otros espíritus
  alternatives_spanish:
  - mandó otros espíritus
  - despachó otros espíritus
  lexicon: πνεῦμα / רוח
  rationale: «Espíritus» mantiene la referencia a seres espirituales; «envió» sigue de cerca la agencia causal del original y del inglés POB.
- source_word: those set under his hand
  english_pob_choice: those set under his hand
  chosen_spanish: los puestos bajo su mano
  alternatives_spanish:
  - los sometidos a su autoridad
  - los colocados bajo su mando
  lexicon: idiom of subordination
  rationale: La imagen «bajo su mano» se conserva para mantener el color semítico del giro; «puestos» evita una paráfrasis interpretativa excesiva.
- source_word: every kind of error and sin and transgression
  english_pob_choice: every kind of error and sin and transgression
  chosen_spanish: toda clase de error, pecado y transgresión
  alternatives_spanish:
  - toda especie de error, pecado y transgresión
  - todo tipo de error, pecado y transgresión
  lexicon: ἁμαρτία / παράβασις conceptual field
  rationale: «Error, pecado y transgresión» conserva la triple amplitud del campo moral; «toda clase de» refleja «every kind of» con naturalidad en español.
- source_word: corrupt and destroy
  english_pob_choice: to corrupt and destroy
  chosen_spanish: para corromper y destruir
  alternatives_spanish:
  - para arruinar y destruir
  - para corromper y arrasar
  lexicon: semantic pair
  rationale: Mantengo el paralelismo verbal del inglés POB; «corromper» y «destruir» son transparentes y fieles al doble efecto negativo.
- source_word: shed blood
  english_pob_choice: to shed blood
  chosen_spanish: derramar sangre
  alternatives_spanish:
  - verter sangre
  - hacer derramar sangre
  lexicon: idiom
  rationale: Es el giro idiomático normal en español bíblico y contemporáneo para homicidio o violencia sangrienta.
theological_decisions:
- issue: Agency of Mastema and subordinate spirits
  english_pob_reading: The prince Mastema actively sends spirits under his authority to provoke evil and bloodshed.
  chosen_spanish_reading: El príncipe Mastema actúa como agente principal y envía espíritus subordinados para inducir mal moral y violencia.
  alternative_spanish_readings:
  - Mastema simplemente permite la acción de otros espíritus
  - Mastema es solo una personificación del mal
  rationale: El texto, y el inglés POB, presentan agencia personal y jerárquica; la traducción conserva esa lectura sin suavizarla alegóricamente.
  doctrine_reference: Angelología / demonología del libro de los Jubileos
