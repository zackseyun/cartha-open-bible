translation:
  language: es
  text: antes de Téraj su padre. Y lo sepultaron en Ur de los caldeos. Y Téraj salió de Ur de los caldeos, él y sus hijos, para entrar en la tierra de Líbano y en la tierra de Canaán; y se estableció en la tierra de Jarán, y Abram vivió con Téraj su padre en Jarán.
  philosophy: formal
lexical_decisions:
- source_word: በቅድመ
  english_pob_choice: before
  chosen_spanish: antes de
  alternatives_spanish:
  - delante de
  - previo a
  lexicon: adverbio/preposición temporal
  rationale: El ge'ez marca una relación temporal de anterioridad; en español, «antes de» es la opción más natural y fiel, sin introducir matices espaciales que «delante de» podría sugerir.
- source_word: ቀበርዎ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  lexicon: verbo de entierro
  rationale: «Sepultar» conserva el tono formal y narrativo del texto, y distingue mejor el acto funerario que «enterrar» en un registro bíblico solemne.
- source_word: ኡር ዘከለዳዊያን
  english_pob_choice: Ur of the Chaldeans
  chosen_spanish: Ur de los caldeos
  alternatives_spanish:
  - Ur de los caldeanos
  lexicon: topónimo étnico-histórico
  rationale: «Caldeos» es la forma histórica estable en español para el etnónimo del pasaje. Se evita modernizarlo a una forma menos asentada.
- source_word: ወወፅአ
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - se fue
  lexicon: verbo de movimiento
  rationale: «Salió» reproduce el movimiento de salida del lugar con sobriedad y sin añadir dirección o intensidad no explicitadas.
- source_word: ከመ ይምጽኡ
  english_pob_choice: to go into
  chosen_spanish: para entrar en
  alternatives_spanish:
  - para ir a
  - para llegar a
  lexicon: infinitivo de propósito
  rationale: El ge'ez expresa propósito; «para entrar en» mantiene ese valor final y conserva la idea de ingreso a las tierras mencionadas.
- source_word: ምድረ ሊባኖስ
  english_pob_choice: land of Lebanon
  chosen_spanish: la tierra de Líbano
  alternatives_spanish:
  - la tierra del Líbano
  lexicon: topónimo geográfico
  rationale: Se conserva la estructura del original y la forma breve del topónimo, sin añadir artículo donde el español lo hace opcional. «Líbano» es la denominación natural en español.
- source_word: ምድረ ከናአን
  english_pob_choice: land of Canaan
  chosen_spanish: la tierra de Canaán
  alternatives_spanish:
  - la tierra de Canán
  lexicon: topónimo bíblico
  rationale: «Canaán» es la forma tradicional y clara en español, directamente reconocible para el lector bíblico.
- source_word: ካራን
  english_pob_choice: Haran
  chosen_spanish: Jarán
  alternatives_spanish:
  - Haran
  lexicon: topónimo
  rationale: Se emplea la adaptación española «Jarán», habitual en la tradición bíblica en español y más acorde con la pronunciación castellana contemporánea.
- source_word: አብራም
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: nombre propio
  rationale: Se conserva la forma «Abram» porque el pasaje la presenta así; cambiar a «Abrán» introduciría una adaptación no sostenida por el testimonio base.
theological_decisions:
- issue: Forma del nombre divino o título religioso
  english_pob_reading: No occurrence in this verse
  chosen_spanish_reading: Sin incidencia en este versículo
  rationale: El versículo no contiene יהוה, κύριος ni otro título divino que requiera decisión terminológica específica.
  doctrine_reference: N/A
- issue: Relación entre geografía y narrativa patriarcal
  english_pob_reading: Terah went out... to go into the land of Lebanon and into the land of Canaan... Haran... Abram lived with Terah
  chosen_spanish_reading: Salida de Téraj con propósito de entrada a Líbano y Canaán, luego residencia en Jarán
  alternative_spanish_readings:
  - salió... para ir a...
  - partió... con intención de entrar en...
  rationale: 'La redacción española preserva el valor narrativo y teleológico del original: una salida con propósito, seguida de establecimiento en Jarán, sin suavizar la secuencia ni resolverla interpretativamente.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado recibió solo una corrección final de puntuación; no hubo cambios de contenido. Por ello, la versión española sigue de cerca la traducción inglesa aprobada y el ge'ez, con ajustes mínimos de naturalidad y puntuación en español.
  spanish_consistency_notes:
  - Se mantiene «Abram» por consistencia con el testimonio fuente.
  - Se usa «Jarán» de forma uniforme como topónimo bíblico.
  - Se conserva la secuencia narrativa del original sin dividirla en frases interpretativas adicionales.
  - No se introducen notas al pie porque no hay variantes textuales documentadas ni ambigüedades significativas que el español deba resolver aquí.
