translation:
  language: es
  text: durante dos semanas de años.[a] Y en la sexta semana, en su quinto año, Abram se quedó despierto durante la noche al comienzo del séptimo mes para observar las estrellas desde la tarde hasta el amanecer, para ver cuál sería la condición del año respecto de las lluvias; y estaba allí solo, sentado, observando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «dos semanas de años», es decir, dos heptadas de años. Jubileos suele contar el tiempo en estas unidades esquemáticas.
    reason: cultural_note
lexical_decisions:
- source_word: ክልኤ፡ ሱባዔ፡ ዓመታት።
  english_pob_choice: for two weeks of years
  chosen_spanish: por dos semanas de años
  alternatives_spanish:
  - por dos heptadas de años
  - por dos semanas-años
  lexicon: weeks of years / heptads of years
  rationale: Conservo la unidad esquemática del calendario de Jubileos con ‘semanas de años’ como en el inglés POB, y mantengo ‘dos semanas de años’ para reflejar la estructura literal del ge‘ez sin introducir una terminología técnica ajena al español público.
- source_word: ወበሳድስ፡ ሱባዔ፡ በዓመት፡ ኃምስ፡
  english_pob_choice: in the sixth week, in its fifth year
  chosen_spanish: en la sexta semana, en su quinto año
  alternatives_spanish:
  - en la sexta semana, en el quinto de sus años
  - en la sexta semana, en su año quinto
  lexicon: sixth week / fifth year
  rationale: Sigo la lectura auditada del inglés, conservando la correlación interna de la semana y su año. ‘Su quinto año’ suena natural en español y mantiene la referencia posesiva del texto fuente.
- source_word: በሌሊት፡ በሠርቀ፡ ወርኅ፡ ሳብዕ፡
  english_pob_choice: at the beginning of the seventh month
  chosen_spanish: al comienzo del séptimo mes
  alternatives_spanish:
  - a principios del séptimo mes
  - en el comienzo del séptimo mes
  lexicon: beginning of the seventh month
  rationale: El ge‘ez ubica la acción ‘en el comienzo del séptimo mes’; ‘al comienzo’ es la formulación más directa y fiel en español.
- source_word: ከመ፡ ያበይነ፡ ከዋክብተ፡
  english_pob_choice: to observe the stars
  chosen_spanish: para observar las estrellas
  alternatives_spanish:
  - para contemplar las estrellas
  - para mirar las estrellas
  lexicon: observe the stars
  rationale: ‘Observar’ conserva la intención vigilante y deliberada del verbo, más precisa que un simple ‘mirar’.
- source_word: እምበርክ፡ እስከ፡ ነግህ፡
  english_pob_choice: from evening until dawn
  chosen_spanish: desde la tarde hasta el amanecer
  alternatives_spanish:
  - desde la noche hasta el amanecer
  - desde el atardecer hasta el alba
  lexicon: from evening until dawn
  rationale: ‘Amanecer’ comunica bien ‘dawn’ en español y ‘tarde’ evita una sobreespecificación que el ge‘ez no exige aquí. Mantengo el rango temporal continuo de la vigilia.
- source_word: ከመ፡ ይርአይ፡ ምንተ፡ ይከውን፡ ግብረ፡ ዓመት፡ በዝናማት፡
  english_pob_choice: to see what would be the character of the year with respect to the rains
  chosen_spanish: para ver cuál sería la condición del año respecto de las lluvias
  alternatives_spanish:
  - para ver qué clase de año sería en cuanto a las lluvias
  - para ver cuál sería el carácter del año respecto de las lluvias
  lexicon: character of the year with respect to the rains
  rationale: ‘Condición’ es una forma natural de expresar el sentido predictivo del texto sin forzar ‘carácter’ en un español menos idiomático. ‘Respecto de las lluvias’ conserva el alcance meteorológico explícito.
- source_word: ወሀሎ፡ ውእቱ፡ ባሕቲቱ፡ ይነብር፡
  english_pob_choice: and he was there by himself as he sat and watched
  chosen_spanish: y él estaba allí solo, mientras se sentaba y vigilaba
  alternatives_spanish:
  - y estaba allí solo, sentado y vigilando
  - y él permanecía allí solo, mientras estaba sentado y vigilaba
  lexicon: by himself / sat and watched
  rationale: Conservo la idea de soledad explícita (‘solo’) y la doble acción de sentarse y vigilar. ‘Vigilaba’ traduce el matiz de observación sostenida mejor que un simple ‘miraba’.
theological_decisions:
- issue: 'Tiempo esquemático de Jubileos: ‘weeks of years’'
  english_pob_reading: for two weeks of years
  chosen_spanish_reading: por dos semanas de años
  alternative_spanish_readings:
  - por dos heptadas de años
  - por dos semanas-años
  rationale: No suavizo la estructura calendárica del libro. Mantengo la expresión esquemática para que el lector perciba que Jubileos cuenta el tiempo en unidades de semanas de años, como explica el aparato inglés.
  doctrine_reference: Jubilees calendrical structure / schematic chronology
translation_notes:
  revision_awareness: El inglés auditado fue revisado para mover la nota sobre ‘two weeks of years’ inmediatamente después de la frase a la que se refiere. En español, la nota [a] se ancla del mismo modo tras ‘por dos semanas de años’. No se requiere otra adaptación editorial.
  spanish_consistency_notes:
  - Uso ‘Yahvé’ no aplica aquí porque el versículo no contiene el nombre divino.
  - Conservo ‘Abram’ conforme al texto fuente y al inglés POB.
  - Mantengo una sintaxis compuesta y pública, sin elevar ‘vigilaba’ a lenguaje litúrgico.
  - ‘Lluvias’ refleja el plural concreto del contexto y evita una abstracción innecesaria.
