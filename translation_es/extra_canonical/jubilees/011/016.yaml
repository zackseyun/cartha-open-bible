  text: for two weeks of years.[16] And in the sixth week, in its fifth year, Abram sat up through the night at the beginning of the seventh month to observe the stars from evening until dawn, to see what would be the character of the year with respect to the rains, and he was there by himself as he sat and watched.
  footnotes:
  - marker: '16'
    text: Literally 'for two weeks of years,' that is, two heptads of years. Jubilees regularly counts time in these schematic units.
    reason: cultural_note
