base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/011/012.yaml
  text: In that fourth week, in its fourth year, Abram arose by night and burned the house of idols, and he burned everything that was in the house, and no person knew it.
  footnotes:
  - marker: a
    text: Or 'that is, the fourth week,'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:59Z'
    unchanged: false
    changes_summary: Removed the second definite article in 'the house of idols' for more natural English and revised the final clause from 'there was no person who knew it' to 'no person knew it' for clearer, more formal style while preserving the meaning.
translation:
  language: es
  text: En esa cuarta semana, en su cuarto año, Abram se levantó de noche y quemó la casa de los ídolos, y quemó todo lo que había en la casa, y nadie lo supo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ሱባዔ ራብዕ
  english_pob_choice: that fourth week / in that fourth week
  chosen_spanish: esa cuarta semana
  alternatives_spanish:
  - en esa cuarta semana
  - aquella cuarta semana
  lexicon: week = semana
  rationale: El ge'ez presenta una expresión temporal que ubica la acción dentro de una semana específica; en español, 'esa cuarta semana' conserva la deixis y el valor cronológico sin añadir una glosa explicativa innecesaria.
- source_word: በዓመት ራብዕ
  english_pob_choice: in its fourth year
  chosen_spanish: en su cuarto año
  alternatives_spanish:
  - en el cuarto año de ella
  - en su año cuarto
  lexicon: year = año
  rationale: '''En su cuarto año'' reproduce la referencia posesiva implícita del texto al período de la semana, manteniendo fluidez natural en español.'
- source_word: ተንሥአ
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se puso en pie
  lexicon: rise/get up = levantarse
  rationale: El verbo narra una acción física y nocturna; 'se levantó' es natural en español y suficiente para el movimiento implícito del original.
- source_word: ቤተ፡ ጣዖታት
  english_pob_choice: the house of idols
  chosen_spanish: la casa de los ídolos
  alternatives_spanish:
  - la casa de ídolos
  - el templo de los ídolos
  lexicon: house = casa; idols = ídolos
  rationale: La construcción genitiva se rinde de forma directa. 'Casa de los ídolos' conserva el referente literal sin convertirlo en una interpretación más amplia como 'templo'.
- source_word: ወአውዐየ
  english_pob_choice: burned
  chosen_spanish: quemó
  alternatives_spanish:
  - incendió
  - prendió fuego a
  lexicon: burn = quemar
  rationale: El verbo expresa destrucción por fuego; 'quemó' es fiel y sobrio, y no sobretraduce con una locución causativa.
- source_word: ኵሎ
  english_pob_choice: everything
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo
  - todo cuanto
  lexicon: all/everything = todo
  rationale: '''Todo lo que había en la casa'' reproduce el alcance total de ኵሎ con claridad idiomática en español.'
- source_word: ወሰብእ አልቦ ዘአእመረ
  english_pob_choice: no person knew it
  chosen_spanish: nadie lo supo
  alternatives_spanish:
  - ninguna persona lo supo
  - nadie se enteró
  lexicon: person = persona/human being; know = saber
  rationale: El cierre enfatiza la ausencia de conocimiento humano sobre el hecho. 'Nadie lo supo' mantiene la negación absoluta con un español más natural que una calca como 'ninguna persona conoció esto'.
theological_decisions:
- issue: Referencia temporal de 'esa cuarta semana, en su cuarto año'
  english_pob_reading: In that fourth week, in its fourth year
  chosen_spanish_reading: En esa cuarta semana, en su cuarto año
  alternative_spanish_readings:
  - En aquella cuarta semana, en su cuarto año
  - En la cuarta semana, en su cuarto año
  rationale: No hay base para espiritualizar o explicar la cronología; se conserva la datación interna del relato. La deixis 'esa' sigue el valor del inglés POB sin añadir una lectura interpretativa.
  doctrine_reference: Narrative chronology in extra-canonical text; no doctrinal implication
- issue: Sujeto implícito y clausura de secreto humano
  english_pob_reading: no person knew it
  chosen_spanish_reading: nadie lo supo
  alternative_spanish_readings:
  - ninguna persona lo supo
  - nadie se enteró
  rationale: La cláusula subraya el secreto de la acción de Abram. 'Nadie lo supo' preserva la amplitud de la negación sin cambiar el foco a rumor o difusión parcial.
  doctrine_reference: Narrative secrecy; no doctrinal implication
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente: ''house of idols'' sin artículo redundante adicional en inglés, y la cláusula final en forma breve y formal (''no person knew it''). En español se reflejó con una formulación natural y compacta, sin introducir explicaciones ausentes del ge''ez.'
  spanish_consistency_notes:
  - Se mantuvo 'Abram' según el texto fuente y la tradición del libro de Jubileos.
  - Se usó 'ídolos' en genitivo explícito para conservar la fuerza literal del sintagma.
  - No se añadió nota al pie porque no había un punto textual que requiriera alternativa anclada en la traducción española.
