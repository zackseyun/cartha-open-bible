  revision_rationale: Se añade la preposición temporal inicial para reflejar con precisión la función adverbial del ge'ez y la traducción inglesa auditada. También se elimina la coma antes de 'y quemó' tras 'de noche' para una puntuación española más natural sin alterar el sentido.
