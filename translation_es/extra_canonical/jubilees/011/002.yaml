translation:
  language: es
  text: Y el hijo creció[a], y su padre le enseñó las investigaciones de los caldeos, para adivinar y practicar la auguración conforme a las señales del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Verses 2–5 are not present in the supplied row segmentation, but the chapter context and surviving numbering require intervening material about Seroh, Chaldean divination, and Mastema's role in idolatry. The English here follows the chapter's expected sense while keeping Jubilees' idiom and themes.
    reason: source_note
lexical_decisions:
- source_word: '"the son grew"'
  english_pob_choice: And the son grew
  chosen_spanish: Y el hijo creció
  alternatives_spanish:
  - Y el muchacho creció
  - Y el niño creció
  lexicon: grow
  rationale: Se conserva el verbo simple de crecimiento biográfico; "hijo" refleja el vínculo narrativo ya explícito en el contexto y evita añadir matices no atestiguados. "Creció" es la equivalencia natural y fiel al inglés POB y al sentido narrativo.
- source_word: '"the investigations of the Chaldeans"'
  english_pob_choice: the investigations of the Chaldeans
  chosen_spanish: las investigaciones de los caldeos
  alternatives_spanish:
  - los estudios de los caldeos
  - las indagaciones de los caldeos
  lexicon: investigations
  rationale: '"Investigaciones" mantiene el valor de indagación técnica/oculta que el inglés POB deja abierto. Se conserva "caldeos" como etnónimo tradicional sin normalizarlo a un término más interpretativo.'
- source_word: '"to divine"'
  english_pob_choice: to divine
  chosen_spanish: para adivinar
  alternatives_spanish:
  - para practicar la adivinación
  - para augurar
  lexicon: divine
  rationale: '"Adivinar" reproduce el acto de pronosticar por medios ocultos en un español claro y sobrio. Se evita "profetizar", que desviaría el sentido hacia revelación legítima.'
- source_word: '"to practice augury"'
  english_pob_choice: to practice augury
  chosen_spanish: practicar la auguración
  alternatives_spanish:
  - practicar la adivinación por presagios
  - ejercer la adivinación
  lexicon: augury
  rationale: '"Auguración" conserva el matiz técnico de leer presagios/augurios y mantiene la distinción con "adivinar". Aunque menos común, es comprensible en registro bíblico y evita aplanar dos términos cercanos del original.'
- source_word: '"according to the signs of heaven"'
  english_pob_choice: according to the signs of heaven
  chosen_spanish: conforme a las señales del cielo
  alternatives_spanish:
  - según las señales del cielo
  - de acuerdo con los signos del cielo
  lexicon: signs of heaven
  rationale: '"Señales del cielo" es más idiomático en español que "signos del cielo" y conserva la referencia astral. "Conforme a" sigue la relación normativa del inglés POB.'
theological_decisions:
- issue: Adivinación/augurio como práctica condenada o descrita narrativamente
  english_pob_reading: The English POB describes Chaldean occult practices without softening them.
  chosen_spanish_reading: 'El español conserva la descripción de prácticas ocultas: adivinar y practicar la auguración.'
  alternative_spanish_readings:
  - interpretar los cielos
  - observar los astros
  rationale: No se atenúa el contenido religioso-moral del pasaje ni se reemplaza por un lenguaje astronómico neutral. La traducción mantiene la tensión documental de Jubileos sobre saberes caldeos y astrología/augurio.
  doctrine_reference: Deuteronomio 18:10-12; Isaías 47:13
- issue: Relación entre "signs of heaven" y presagios celestes
  english_pob_reading: The English POB keeps a celestial-signs idiom rather than specifying astronomy.
  chosen_spanish_reading: Se conserva la referencia a las señales del cielo sin convertirla en una explicación moderna de astronomía.
  alternative_spanish_readings:
  - los astros del cielo
  - los fenómenos celestes
  rationale: Jubilees usa un lenguaje de presagios celestes; la versión española mantiene esa carga interpretativa y no la reinterpreta científicamente.
  doctrine_reference: Génesis 1:14; Jeremías 10:2
translation_notes:
  revision_awareness: The latest audit pass reports no changes needed and high agreement across review passes; this Spanish draft follows the same source-grounded sense and preserves the chapter-level contextual inference noted in the English footnote.
  spanish_consistency_notes:
  - Se mantiene "caldeos" en minúscula por ser etnónimo/adjetivo étnico contextual, no nombre propio litúrgico.
  - Se usa "auguración" para distinguirlo de "adivinación", preservando la duplicidad léxica del inglés POB.
  - Se evita "SEÑOR" u otras sustituciones no presentes, dado que este versículo no contiene el tetragrámaton.
  - El marcador [a] se ancla en "creció" para reflejar la nota de segmentación del contexto inglés.
