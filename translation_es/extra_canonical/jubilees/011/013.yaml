translation:
  language: es
  text: Y se levantaron de noche y quisieron salvar a sus dioses de en medio del fuego. Y Harán se precipitó[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Harán corrió»; el ge''ez sugiere más bien lanzarse o precipitarse. Además, la cláusula pertenece propiamente al comienzo del versículo 14 en la segmentación crítica.'
    reason: textual_variant
lexical_decisions:
- source_word: ወተንሥኡ፡ በሌሊት፡
  english_pob_choice: And they arose in the night
  chosen_spanish: Y se levantaron de noche
  alternatives_spanish:
  - Y se alzaron en la noche
  - Y se levantaron durante la noche
  lexicon: levantarse / noche
  rationale: El ge'ez expresa acción de ponerse en pie o levantarse en la noche; en español natural, 'se levantaron de noche' conserva el sentido sin forzar un calco.
- source_word: ወፈቀዱ፡
  english_pob_choice: wanted to save
  chosen_spanish: quisieron salvar
  alternatives_spanish:
  - quisieron rescatar
  - pretendieron salvar
  lexicon: querer + salvar
  rationale: La secuencia indica intención; 'quisieron salvar' refleja bien la voluntad de actuar para sacar del fuego a sus ídolos. 'Rescatar' sería posible, pero 'salvar' corresponde mejor al verbo de salida del peligro.
- source_word: ያድኅኑ፡ አማልክቲሆሙ፡
  english_pob_choice: their gods
  chosen_spanish: a sus dioses
  alternatives_spanish:
  - a sus ídolos
  - a sus dioses/ídolos
  lexicon: dioses / ídolos
  rationale: El texto ge'ez dice literalmente 'sus dioses'. En español, 'dioses' mantiene la forma del fuente; 'ídolos' explicita la tensión teológica pero añade interpretación que el verso no formula aquí.
- source_word: እማእከለ፡ እሳት።
  english_pob_choice: from the midst of the fire
  chosen_spanish: del medio del fuego
  alternatives_spanish:
  - de en medio del fuego
  - desde el fuego
  lexicon: medio / fuego
  rationale: '''Del medio del fuego'' preserva la imagen espacial del original y resulta comprensible en español moderno.'
- source_word: ወሰረረ፡ አራን፡
  english_pob_choice: And Haran rushed
  chosen_spanish: Y Harán se precipitó
  alternatives_spanish:
  - Y Harán corrió
  - Y Harán se lanzó
  lexicon: precipitarse
  rationale: La revisión inglesa y el audit trail señalan que el verbo ge'ez expresa saltar, lanzarse o precipitarse, no simplemente correr. 'Se precipitó' conserva la idea de impulso brusco y desordenado. El nombre se mantiene como Harán, forma bíblica estándar en español.
theological_decisions:
- issue: Representación de 'their gods' sin suavizar la expresión idolátrica
  english_pob_reading: their gods
  chosen_spanish_reading: a sus dioses
  alternative_spanish_readings:
  - a sus ídolos
  - a sus falsos dioses
  rationale: El verso de la fuente conserva la expresión posesiva y nominal 'sus dioses'. En español se mantiene esa formulación para no borrar la tensión entre la pretensión de divinidad y la valoración posterior del relato.
  doctrine_reference: Monoteísmo bíblico; distinción entre Dios verdadero e ídolos.
- issue: Segmentation issue with the Haran clause
  english_pob_reading: And Haran rushed
  chosen_spanish_reading: Y Harán se precipitó
  alternative_spanish_readings:
  - Y Harán corrió
  - Y Harán se lanzó
  rationale: El expediente crítico indica que esta cláusula pertenece propiamente al inicio del versículo 14. Aun así, dado el encargo de un solo registro, se la conserva como aparece en el paquete fuente, con una formulación que respeta el valor verbal documentado.
  doctrine_reference: Crítica textual y división de versículos en Jubileos.
translation_notes:
  revision_awareness: La revisión más reciente mantuvo el texto sin cambios; la revisión anterior corrigió la cláusula final de 'ran' a 'rushed' y advirtió que la frase ge'ez ወሰረረ፡ አራን፡ es un error de segmentación que pertenece al inicio del versículo 14. La traducción española conserva la cláusula porque el paquete fuente la incluye en este registro, pero adopta el matiz verbal documentado por la revisión.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija; aquí no aparece.
  - Se mantiene 'dioses' por fidelidad al texto, sin normalizarlo a 'ídolos' en el cuerpo principal.
  - '''Se precipitó'' refleja mejor el valor verbal revisado que un simple ''corrió''.'
  - La nota al pie marca la alternativa de traducción y la observación de segmentación crítica.
