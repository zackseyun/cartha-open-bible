base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/011/001.yaml
  text: In the thirty-fifth jubilee[1], in the third week, in its first year, Reu took for himself a wife, and her name was Ora, the daughter of Ur, the son of Kesed. And she bore him a son, and he called his name Seroh, in the seventh year of this week, in this jubilee.
  footnotes:
  - marker: '1'
    text: The Ge'ez text reads 'thirty-fifth' (or a corrupted form thereof), corrected here from the previous draft's 'seventy-fifth' to align with the internal chronological sequence of Jubilees.
    reason: textual_correction
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:59Z'
    unchanged: false
    changes_summary: Changed 'third week of years' to 'third week' for more natural English while preserving the Jubilee dating formula. No other changes needed.
translation:
  language: es
  text: En el trigésimo quinto jubileo[a], en la tercera semana, en su primer año, Reu tomó para sí una esposa, y su nombre era Ora, hija de Ur, hijo de Kesed. Y ella le dio a luz un hijo, y lo llamó Seroh, en el séptimo año de esta semana, en este jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto ge'ez dice 'trigésimo quinto' (o una forma corrupta de ello), corregido aquí desde el borrador previo que decía 'septuagésimo quinto' para ajustarse a la secuencia cronológica interna de Jubileos.
    reason: textual_correction
lexical_decisions:
- source_word: እዮቤልው
  english_pob_choice: jubilee
  chosen_spanish: jubileo
  alternatives_spanish:
  - jubiléo
  lexicon: source-term / Jubilee chronology
  rationale: El término técnico del libro es una unidad cronológica fija; en español bíblico y académico, 'jubileo' comunica mejor la fórmula del texto que una paráfrasis.
- source_word: ሱባዔ
  english_pob_choice: week
  chosen_spanish: semana
  alternatives_spanish:
  - semana de años
  lexicon: source-term / Jubilee chronology
  rationale: El contexto de Jubileos usa 'semana' como unidad cronológica técnica. 'Semana de años' explicitaría más, pero el texto base inglés ya simplifica a 'week' y el español mantiene esa naturalidad sin perder la referencia al sistema jubilar.
- source_word: ነሥአ ሎቱ ራግው፡ ብእሲተ
  english_pob_choice: Reu took for himself a wife
  chosen_spanish: Reu tomó para sí una esposa
  alternatives_spanish:
  - Reu tomó esposa para sí
  - Reu tomó para sí mujer
  lexicon: marriage formula
  rationale: '''Tomó para sí'' reproduce la fórmula verbal del original y del inglés POB; ''esposa'' es más precisa y digna que ''mujer'' en español contemporáneo.'
- source_word: ወለደት ሎቱ ወልደ
  english_pob_choice: she bore him a son
  chosen_spanish: ella le dio a luz un hijo
  alternatives_spanish:
  - ella le parió un hijo
  - ella le engendró un hijo
  lexicon: birth formula
  rationale: '''Dar a luz'' es idiomático y fiel; conserva la relación directa madre-hijo sin cargar el registro con arcaísmo.'
- source_word: ሴሮኅ
  english_pob_choice: Seroh
  chosen_spanish: Seroh
  alternatives_spanish:
  - Seroj
  - Seroc
  lexicon: proper name
  rationale: Se conserva la forma del nombre que da el POB en inglés, evitando normalizaciones no atestiguadas por el expediente.
theological_decisions:
- issue: Cronología jubilar y semana técnica
  english_pob_reading: In the thirty-fifth jubilee, in the third week, in its first year
  chosen_spanish_reading: En el treinta y quinto jubileo, en la tercera semana, en su primer año
  alternative_spanish_readings:
  - en la tercera semana de años
  - en la tercera semana del jubileo
  rationale: Se mantiene la fórmula técnica del sistema de Jubileos sin añadir explicaciones interpretativas no presentes en el texto. 'Semana' queda como unidad cronológica especializada, coherente con el original y con la revisión inglesa.
  doctrine_reference: No doctrinal claim; calendrical/chronological formula of Jubilees
translation_notes:
  revision_awareness: La revisión inglesa reciente solo ajustó 'third week of years' a 'third week' por naturalidad, sin cambiar el contenido. La traducción española sigue esa decisión y no introduce una glosa adicional, porque el texto ge'ez y el POB inglés ya marcan la semana jubilar como unidad cronológica técnica.
  spanish_consistency_notes:
  - Se mantiene 'jubileo' para እዮቤልው y 'semana' para ሱባዔ, coherentes con la fórmula cronológica del libro.
  - Los nombres propios se conservan sin castellanización inventada, siguiendo el expediente inglés.
  - No se añaden notas al pie porque no hay variantes textuales o alternativas críticas documentadas que requieran anclaje en el texto español.
