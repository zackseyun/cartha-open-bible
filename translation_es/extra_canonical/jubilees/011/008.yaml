  revision_rationale: Se elimina la nota innecesaria y se ajusta el cierre narrativo a «Y contó» para reflejar mejor ወነገረ፡ y el inglés auditado «And he told», sin añadir un objeto que el fragmento no preserva. También se normaliza la puntuación final con comillas de cierre españolas.
