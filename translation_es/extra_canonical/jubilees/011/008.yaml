lexical_decisions:
- source_word: ያምልክዎሙ
  english_pob_choice: that they may worship them
  chosen_spanish: que ellos les adoren
  alternatives_spanish:
  - que ellos les rindan culto
  - que ellos les veneren
  lexicon: adorar
  rationale: El verbo ge'ez expresa el acto de culto dirigido a una pluralidad de objetos; en español, "adorar" comunica mejor la idea de culto religioso que "respetar" o un verbo más general. Se conserva el sujeto plural "ellos" porque la revisión inglesa corrigió el sujeto de segunda a tercera persona.
- source_word: ይስብሕዎሙ
  english_pob_choice: and praise them
  chosen_spanish: y les alaben
  alternatives_spanish:
  - y les canten alabanzas
  - y los elogien
  lexicon: alabar
  rationale: El segundo verbo añade la idea de alabanza o exaltación; "alabar" es el equivalente natural y culto en español bíblico. Se evita "elogiar" por ser demasiado secular y débil para el contexto.
- source_word: አርምም
  english_pob_choice: Be silent
  chosen_spanish: Calla
  alternatives_spanish:
  - Guarda silencio
  - Calla, hijo mío
  lexicon: callar
  rationale: El imperativo breve reproduce bien la urgencia del mandato. "Calla" es idiomático y directo en español; mantiene la fuerza exhortativa del ge'ez.
- source_word: ወልድየ
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  lexicon: hijo
  rationale: La posesión pospuesta "hijo mío" suena más natural y reverente en español narrativo que "mi hijo", sin alterar el sentido afectivo del vocativo.
- source_word: ከመ፡ አይቅትሉከ።
  english_pob_choice: lest they kill you
  chosen_spanish: no sea que te maten
  alternatives_spanish:
  - para que no te maten
  - para que no te den muerte
  lexicon: matar
  rationale: La construcción final expresa prevención de una consecuencia; "no sea que" refleja bien el matiz precautorio. Se mantiene el plural impersonal "te maten" conforme al sujeto plural de la amenaza.
- source_word: ወነገረ፡
  english_pob_choice: And he told
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Y contó
  - Y le dijo
  lexicon: decir
  rationale: El contexto inmediato sugiere el inicio de una nueva frase narrativa; "Y él dijo" es una solución sobria que conserva la transición sin añadir un complemento no explicitado por el fragmento conservado.
theological_decisions:
- issue: Sujeto plural de la acción de culto
  english_pob_reading: that they may worship them and praise them
  chosen_spanish_reading: que ellos les adoren y les alaben
  alternative_spanish_readings:
  - que tú les adores y les alabes
  rationale: La revisión textual inglesa corrigió explícitamente el sujeto a tercera persona plural, y el ge'ez también lo marca gramaticalmente. Por fidelidad al testimonio fuente, el español conserva ese sujeto plural y no lo suaviza a segunda persona.
  doctrine_reference: Fidelidad gramatical al texto fuente; evitar una corrección no sustentada por el ge'ez.
- issue: Implicación de culto a ídolos frente a mera alabanza humana
  english_pob_reading: worship them and praise them
  chosen_spanish_reading: les adoren y les alaben
  alternative_spanish_readings:
  - les rindan culto y los alaben
  - les veneren y los alaben
  rationale: El binomio verbal del original sugiere un acto de reverencia religiosa indebida. "Adorar" mantiene esa carga teológica sin introducir interpretaciones adicionales; la segunda cláusula "alaben" conserva el paralelo del texto.
  doctrine_reference: Lenguaje de idolatría en narrativas bíblicas / advertencia contra culto ilegítimo.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una corrección importante: se restauró el sentido de la cláusula inicial y se corrigió el sujeto de segunda persona a tercera persona plural. El español se construyó directamente sobre ese estado revisado y sobre el ge''ez disponible, evitando reproducir el error previo y manteniendo el paralelismo verbal del original.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se usa "adorar" para el culto indebido, no "venerar", porque el binomio con "alabar" en contexto narrativo apunta a reverencia religiosa hacia objetos.
  - Se conserva el inicio fragmentario "Y él dijo" porque el testimonio fuente termina abruptamente con una cláusula narrativa incompleta.
  - El imperativo "Calla" preserva la urgencia y la concisión del mandato sin añadir matices interpretativos.
