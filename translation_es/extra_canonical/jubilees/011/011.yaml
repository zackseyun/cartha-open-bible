translation:
  language: es
  text: Su nombre era Lot[a]. Y su hermano Nacor tomó para sí una esposa. Y en el año sesenta de su vida,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma española bíblica usual del nombre es «Lot»; el inglés auditado usa «Lot».
    reason: Aclara la adaptación onomástica al uso español para evitar que parezca una alteración del referente.
lexical_decisions:
- source_word: ስሞ፡ ሎጥ።
  english_pob_choice: his name was Lot.
  chosen_spanish: Su nombre era Lot.
  alternatives_spanish:
  - Su nombre fue Lot.
  - Se llamaba Lot.
  lexicon: nombre / era
  rationale: El ge'ez presenta una fórmula nominal de identificación. «Su nombre era Lot» conserva el valor identificatorio del original y sigue la corrección auditada del inglés POB («his name was Lot») sin introducir una estructura más interpretativa.
- source_word: ወናኮር፡ እኁሁ፡ ነሥአ፡ ሎቱ፡ ብእሲተ።
  english_pob_choice: And Nahor his brother took for himself a wife.
  chosen_spanish: Y su hermano Nacor tomó para sí una esposa.
  alternatives_spanish:
  - Y Nacor, su hermano, tomó esposa.
  - Y su hermano Nacor se tomó una esposa.
  lexicon: tomó para sí una esposa
  rationale: «Tomó para sí una esposa» reproduce la acción reflexiva/dativa del original y la elección del POB inglés («took for himself a wife») sin suavizarla a una expresión más idiomática que perdería parte de la textura semítica.
- source_word: ወበዓመት፡ ዘስሳ፡ ዘሕይወቱ፡
  english_pob_choice: And in the sixtieth year of his life,
  chosen_spanish: Y en el año sesenta de su vida,
  alternatives_spanish:
  - Y en el sexagésimo año de su vida,
  - Y en el año sesenta de la vida de él,
  lexicon: year of his life
  rationale: La fuente ge'ez dice literalmente «en el año sesenta de su vida». Se conserva esa relación posesiva sin añadir «de Abraham», ya que la revisión inglesa auditada eliminó esa inserción por no estar en el original.
theological_decisions:
- issue: Referencia pronominal en «su vida»
  english_pob_reading: of his life
  chosen_spanish_reading: de su vida
  alternative_spanish_readings:
  - de la vida de Abraham
  - de la vida de Lot
  rationale: El paquete fuente no incluye un antecedente explícito dentro del verso para especificar el poseedor más allá del pronombre. Para no resolver una ambigüedad no resuelta por el texto, se conserva «su vida» como en el inglés revisado, sin añadir «Abraham».
  doctrine_reference: principio de suficiencia textual y cautela exegética en pasajes cronológicos
translation_notes:
  revision_awareness: 'La revisión inglesa auditada corrigió dos puntos: añadió «was» para naturalidad en la cláusula de nombre y eliminó «Abram» del cierre cronológico porque el ge''ez no lo contiene. La versión española sigue esa misma lectura y evita introducir un antecedente ajeno al texto.'
  spanish_consistency_notes:
  - Se mantiene «Nacor» para Nahor como forma española tradicional y transparente, sin modernizar a «Najor».
  - Se usa «esposa» en concordancia con el inglés auditado «wife»; no se introduce «mujer» para evitar ambigüedad marital en español.
  - Se conserva la coma final porque el verso fuente continúa hacia la siguiente unidad textual; el fragmento entregado termina en una apertura cronológica sin cierre sintáctico completo.
