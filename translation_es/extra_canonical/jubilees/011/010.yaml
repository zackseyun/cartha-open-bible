  - se casó
  lexicon: matrimonio
  rationale: Se conserva el sentido literal de la construcción con énfasis reflexivo, sin suavizarlo a un simple 'se casó', para respetar la forma del original y la elección del POB inglés.
- source_word: ወለደት፡ ሎቱ፡ ወልደ፡ / she bore him a son
