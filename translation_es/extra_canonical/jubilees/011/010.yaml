  rationale: Se adopta la construcción tradicional y fiel al hebraísmo subyacente, conservando el objeto explícito que la revisión textual indicó integrar para completar la frase.
theological_decisions:
- issue: Secuencia genealógica y cronológica sin expansión interpretativa
  english_pob_reading: And Aran his brother took for himself a wife in the third year of the third week, and she bore him a son in the seventh year of this week, and he called his name Ur.
  chosen_spanish_reading: Y Arán su hermano tomó para sí una esposa en el tercer año de la tercera semana, y ella le dio a luz un hijo en el séptimo año de esta semana, y llamó su nombre Ur.
  alternative_spanish_readings:
  - Y Arán su hermano se casó en el tercer año de la tercera semana, y ella le dio a luz un hijo en el séptimo año de esta semana, y llamó su nombre Ur.
  - Y Arán su hermano tomó para sí una esposa en el tercer año de la tercera semana, y ella dio a luz un hijo en el séptimo año de esta semana, y llamó su nombre Ur.
  rationale: Se mantiene la cronología exacta de la fuente sin armonizarla ni explicarla. La voz pasiva del alumbramiento se conserva porque el texto atribuye el nacimiento a la esposa; no se introduce una interpretación adicional.
  doctrine_reference: Principio de fidelidad textual y mínima inferencia; no aplica una doctrina específica
translation_notes:
  revision_awareness: La revisión crítica detectó que la cláusula inglesa quedó truncada en una segmentación mecánica; por eso se integra el objeto del verbo nominalizador al final de la oración para reflejar la lectura completa coherente con la versificación estándar.
  spanish_consistency_notes:
  - Se usa 'sexto/séptimo' y 'tercer año de la tercera semana' de forma consistente con la cronología del Jubileos y la terminología de semanas.
  - Se mantiene 'Ur' como nombre propio sin traducción.
  - Se evita 'Cristo', 'Señor' u otras fórmulas no pertinentes al pasaje.
