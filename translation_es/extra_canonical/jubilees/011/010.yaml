  lexicon: propio
  rationale: Se conserva el nombre propio con acento gráfico para la pronunciación natural en español y para mantener la forma reconocible del personaje, sin alterar la identidad del nombre.
- source_word: እኁሁ / his brother
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
