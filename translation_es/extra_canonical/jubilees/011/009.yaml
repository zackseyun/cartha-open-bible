base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/011/009.yaml
  text: He told this matter to his two brothers[9], and they were angry with him, and they kept silent. And in the fortieth jubilee, in the second week, in its seventh year, Abram took for himself a wife, and her name was Sarai, the daughter of his father, and she became his wife.
  footnotes:
  - marker: '9'
    text: The phrase 'the daughter of his father' is left as transmitted in the supplied text rather than harmonized to Genesis. It may reflect a textual problem or a different kinship expression in this tradition.
    reason: textual_variant
  - marker: a
    text: Or 'he kept silent'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:59Z'
    unchanged: false
    changes_summary: Added the missing verb at the beginning ('He told') so the sentence is complete and faithful to the source; capitalized the opening word for proper English style. No other changes needed.
translation:
  language: es
  text: Les comunicó este asunto a sus dos hermanos, y ellos se enojaron con él y guardaron silencio. Y en el cuadragésimo jubileo, en la segunda semana, en su séptimo año, Abram tomó para sí una esposa, y su nombre era Sarai, la hija de su padre[a], y ella llegó a ser su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva la expresión transmitida «la hija de su padre» en lugar de armonizarla con Génesis; puede reflejar una variante textual o una expresión de parentesco distinta en esta tradición.
    reason: textual_variant
lexical_decisions:
- source_word: ዘንተ፡ ነገረ፡
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - este tema
  lexicon: narrative object phrase
  rationale: «Asunto» comunica de manera natural y digna la referencia concreta a lo que Abram contó, sin volverlo más abstracto de lo que permite el ge'ez. «Este asunto» mantiene la proximidad del demostrativo y evita una paráfrasis excesiva.
- source_word: ለክልኤ፡ አሐዊሁ፡
  english_pob_choice: to his two brothers
  chosen_spanish: a sus dos hermanos
  alternatives_spanish:
  - a sus dos hermanos varones
  - a sus dos hermanos de sangre
  lexicon: kinship phrase
  rationale: La expresión se traduce de forma directa y natural. No se añade «varones» porque el contexto ya define el referente y no hay base suficiente para ampliar el texto.
- source_word: ወተምዑ፡
  english_pob_choice: they were angry with him
  chosen_spanish: se enojaron con él
  alternatives_spanish:
  - se irritaron con él
  - se indignaron contra él
  lexicon: anger verb
  rationale: «Se enojaron» es la forma más directa y comprensible en español. Conserva el valor afectivo sin intensificarlo a «indignaron», que podría sugerir un juicio más solemne del que ofrece el texto.
- source_word: ወአርመሙ፡
  english_pob_choice: they kept silent
  chosen_spanish: guardaron silencio
  alternatives_spanish:
  - callaron
  - permanecieron en silencio
  lexicon: speech/silence verb
  rationale: 'Sigo la corrección auditada del inglés: el verbo es plural y se refiere a los hermanos. «Guardaron silencio» preserva la acción deliberada de no responder y suena más idiomático que un calco como «se callaron» en este contexto narrativo.'
- source_word: በአርብዓ፡ አዮቤልዉ፡
  english_pob_choice: in the fortieth jubilee
  chosen_spanish: en el cuadragésimo jubileo
  alternatives_spanish:
  - en el jubileo cuarenta
  - en el jubileo cuadragésimo
  lexicon: chronological period
  rationale: «Cuadragésimo jubileo» sigue de cerca la estructura del original y del inglés POB, manteniendo el término técnico propio de Jubileos.
- source_word: በሱባዔ፡ ካልእ፡
  english_pob_choice: in the second week
  chosen_spanish: en la segunda semana
  alternatives_spanish:
  - en la semana segunda
  lexicon: time unit
  rationale: Se mantiene la correspondencia literal y clara del periodo dentro del jubileo.
- source_word: በሳብዕ፡ ዓመት፡
  english_pob_choice: in its seventh year
  chosen_spanish: en su séptimo año
  alternatives_spanish:
  - en el séptimo año de ella
  - en el año séptimo
  lexicon: time unit
  rationale: «Su séptimo año» refleja la relación anafórica con la semana mencionada antes, como en el inglés auditado.
- source_word: ነሥአ፡ ሎቱ፡ አብራም፡ ብእሲተ፡
  english_pob_choice: Abram took for himself a wife
  chosen_spanish: Abram tomó para sí una esposa
  alternatives_spanish:
  - Abram tomó mujer para sí
  - Abram se casó
  lexicon: marriage verb phrase
  rationale: Se conserva la construcción verbal del texto fuente y del inglés POB, evitando una simplificación interpretativa como «se casó», que pierde el matiz de adquisición/toma formulado en la narrativa.
- source_word: ስማ፡ ሶራ፡
  english_pob_choice: her name was Sarai
  chosen_spanish: su nombre era Sarai
  alternatives_spanish:
  - se llamaba Sarai
  - y su nombre fue Sarai
  lexicon: name formula
  rationale: «Su nombre era Sarai» sigue la fórmula narrativa sin forzar un estilo más coloquial. «Era» conserva el valor descriptivo continuo del hebreo/ge'ez narrativo.
- source_word: ወሰተ፡
  english_pob_choice: and she became his wife
  chosen_spanish: y ella llegó a ser su esposa
  alternatives_spanish:
  - y fue su esposa
  - y se convirtió en su esposa
  lexicon: become/become-wife
  rationale: «Llegó a ser» reproduce el cambio de estado de manera fiel y sin sobreinterpretar. Mantiene la progresión narrativa del original mejor que un simple «fue», que podría sonar más estático.
theological_decisions:
- issue: 'Frase de parentesco no armonizada: ''la hija de su padre'''
  english_pob_reading: The phrase 'the daughter of his father' is left as transmitted in the supplied text rather than harmonized to Genesis. It may reflect a textual problem or a different kinship expression in this tradition.
  chosen_spanish_reading: la hija de su padre
  alternative_spanish_readings:
  - la hija de su padre, tal como está transmitido
  - su media hermana
  - la hija de su padre, posiblemente por una variante textual
  rationale: Se conserva la lectura transmitida sin armonizarla con Génesis, porque el POB inglés documenta explícitamente que esta expresión se mantiene tal como viene en la tradición textual suministrada. En español no se resuelve la tensión; se deja visible para el lector y para la crítica textual.
  doctrine_reference: Textual criticism / transmission of Jubilees
translation_notes:
  revision_awareness: El inglés auditado fue corregido para completar la frase inicial («He told this matter…») y, más importante, para ajustar el verbo de silencio al plural («they kept silent»). La traducción española sigue esa lectura revisada y evita la forma singular. También conserva la nota textual sobre «the daughter of his father» sin armonizarla con Génesis.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma proyectiva por norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Abram» y «Sarai» como nombres propios conforme al texto fuente.
  - Se conserva la terminología técnica «jubileo» y «semana» en su sentido calendárico propio de Jubileos.
  - No se traduce «wife» por «mujer» en el texto principal para evitar ambigüedad y porque el contexto matrimonial es explícito.
