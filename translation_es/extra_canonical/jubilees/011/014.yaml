translation:
  language: es
  text: para salvarlos, y se encendió un fuego sobre él, y fue quemado en el fuego, y murió en Ur de los caldeos
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ከመ፡ ያድኅኖሙ፡
  english_pob_choice: to save them
  chosen_spanish: para salvarlos
  alternatives_spanish:
  - para rescatarlos
  - para librarlos
  lexicon: save / rescue
  rationale: El ge’ez expresa propósito con el infinitivo; en español, «para salvarlos» conserva la finalidad sin añadir interpretaciones no presentes. «Salvar» también mantiene la amplitud de rescate y preservación que permite el inglés POB.
- source_word: ወነደደ፡ እሳት፡ ላዕሌሁ፡
  english_pob_choice: fire was kindled over him
  chosen_spanish: se encendió fuego sobre él
  alternatives_spanish:
  - fue encendido fuego sobre él
  - se prendió fuego sobre él
  lexicon: kindle / fire
  rationale: La revisión inglesa prefirió una pasiva más literal («fire was kindled»). En español, «se encendió fuego sobre él» reproduce el hecho sin forzar una pasiva artificial y mantiene la imagen de ignición sobre la persona.
- source_word: ወውዐየ፡ በእሳት፡
  english_pob_choice: and he was burned in the fire
  chosen_spanish: y fue quemado en el fuego
  alternatives_spanish:
  - y ardió en el fuego
  - y fue abrasado por el fuego
  lexicon: burn / burn in fire
  rationale: «Fue quemado» sigue el valor pasivo del original y del inglés POB. «En el fuego» conserva la repetición enfática del medio de destrucción.
- source_word: ወሞተ፡
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: die
  rationale: Traducción directa y sobria del verbo de muerte, sin atenuación.
- source_word: በኡር፡ ዘከለዳዊያን፡
  english_pob_choice: in Ur of the Chaldeans
  chosen_spanish: en Ur de los caldeos
  alternatives_spanish:
  - en Ur de los caldeanos
  lexicon: Ur of the Chaldeans
  rationale: «Caldeos» es la forma estable y bíblicamente reconocible en español. Conserva el topónimo con su identificador étnico/geográfico sin añadir explicaciones.
translation_notes:
  revision_awareness: La base inglesa fue revisada de «the fire blazed over him» a «fire was kindled over him» para mayor correspondencia léxica con la fuente; la versión española sigue esa preferencia pasiva/ingresiva sin introducir un matiz causal adicional.
  spanish_consistency_notes:
  - Se conserva un tono narrativo sobrio y formulación paralela a la estructura del original.
  - No se introduce «SEÑOR», «Cristo» ni terminología doctrinal ajena al versículo.
  - 'La secuencia verbal mantiene el ritmo acumulativo del texto fuente: propósito, ignición, combustión, muerte.'
