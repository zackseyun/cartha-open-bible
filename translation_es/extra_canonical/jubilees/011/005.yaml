translation:
  language: es
  text: Y el príncipe Mastema se esforzó por hacer todo esto, y envió otros espíritus—los que estaban puestos bajo su mano—para hacer toda clase de mal y de pecado, y toda clase de transgresión, para corromper y destruir, y para derramar sangre sobre la tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: prince Mastema
  english_pob_choice: the prince Mastema
  chosen_spanish: el príncipe Mastema
  alternatives_spanish:
  - el príncipe Mastema
  - Mastema, el príncipe
  lexicon: N/A (nombre propio y título)
  rationale: Conservo el título y el nombre propio tal como en el contexto auditado. En español, el orden natural con artículo definido mantiene la fuerza del cargo sin añadir interpretación extra.
- source_word: spirits
  english_pob_choice: other spirits
  chosen_spanish: otros espíritus
  alternatives_spanish:
  - otros espíritus
  - otras criaturas espirituales
  lexicon: רוּחַ / πνεῦμα
  rationale: ‘Espíritus’ es el equivalente directo y mantiene la referencia a agentes invisibles subordinados; ‘criaturas espirituales’ explicita más de lo que el texto requiere.
- source_word: under his hand
  english_pob_choice: placed under his hand
  chosen_spanish: puestos bajo su mano
  alternatives_spanish:
  - puestos bajo su mano
  - sometidos a su autoridad
  lexicon: idiomático / figurado
  rationale: Mantengo la imagen semítica ‘bajo su mano’ porque el inglés auditado la preserva. En español sigue siendo inteligible y conserva la metáfora de autoridad.
- source_word: wrong
  english_pob_choice: wrong
  chosen_spanish: mal
  alternatives_spanish:
  - mal
  - injusticia
  lexicon: רַע / κακόν
  rationale: ‘Mal’ es la forma más amplia y natural en español para abarcar conducta torcida o dañina sin estrechar el sentido a ‘injusticia’.
- source_word: sin
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - falta
  lexicon: חטא / ἁμαρτία
  rationale: ‘Pecado’ corresponde al valor religioso-moral esperado y es claro en español bíblico contemporáneo.
- source_word: transgression
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - transgresión
  - rebeldía
  lexicon: פֶּשַׁע / παράβασις
  rationale: ‘Transgresión’ conserva la distinción de otra infracción moral/jurídica aparte de ‘pecado’, sin fusionarla con ‘pecado’.
- source_word: corrupt and destroy
  english_pob_choice: corrupt and destroy
  chosen_spanish: corromper y destruir
  alternatives_spanish:
  - corromper y destruir
  - pervertir y arruinar
  lexicon: שׁחת / φθείρω
  rationale: ‘Corromper y destruir’ reproduce la doble acción del original auditado y mantiene paralelismo con el inglés POB.
- source_word: shed blood
  english_pob_choice: to shed blood
  chosen_spanish: derramar sangre
  alternatives_spanish:
  - derramar sangre
  - hacer derramar sangre
  lexicon: idioma bíblico de violencia
  rationale: ‘Derramar sangre’ es la locución estándar en español para asesinato o violencia mortal y conserva el valor idiomático del inglés.
theological_decisions:
- issue: Estatus de Mastema como agente personal del mal
  english_pob_reading: Prince Mastema is a personal being who exerts himself and sends other spirits under his authority.
  chosen_spanish_reading: 'Mastema aparece como un agente personal: el príncipe que se esforzó y envió espíritus bajo su mando.'
  alternative_spanish_readings:
  - Mastema como fuerza impersonal
  - Mastema como mero título simbólico
  rationale: El contexto auditado corrigió explícitamente un pronombre impersonal y confirmó que se trata de una entidad personal/demoníaca. Por eso el español usa acciones personales y posesivos de autoridad.
  doctrine_reference: lectura narrativa del texto; coherencia interna con la revisión auditada
translation_notes:
  revision_awareness: El expediente auditado indica que el texto inglés previo contenía una grave confusión por falta del ge'ez y que la versión vigente fue revisada para reflejar correctamente que Mastema envía espíritus subordinados a producir mal, pecado, transgresión, corrupción, destrucción y derramamiento de sangre. No se incorporó ninguna etimología de Nahor ni materiales de los versículos vecinos.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ porque no aparece aquí el tetragrámaton ni una cita de κύριος.
  - Se mantuvo ‘príncipe’ como traducción del título en coherencia con el audit trail.
  - La secuencia acumulativa ‘mal y pecado, y toda clase de transgresión’ conserva el paralelismo intensivo del inglés auditado sin añadir elementos no atestiguados.
