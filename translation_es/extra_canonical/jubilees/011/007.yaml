base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/011/007.yaml
  text: And if I tell them the truth, they will kill me, for their souls are attached to them.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:58Z'
    unchanged: false
    changes_summary: Replaced the interpretive expansion 'so that they worship them' with a more literal rendering of the final clause, and adjusted 'cling' to 'are attached' for a more natural formal register while preserving the sense.
translation:
  language: es
  text: Y si les digo la verdad, me matarán, porque sus almas están apegadas a ellos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ነገርክዎሙ / tell them
  english_pob_choice: if I tell them
  chosen_spanish: les digo
  alternatives_spanish:
  - les cuento
  - les hablo
  lexicon: decir
  rationale: El ge‘ez expresa el acto de comunicarles algo; en español, «les digo» conserva la sencillez y la inmediatez del enunciado sin añadir matices narrativos no presentes.
- source_word: ጽድቀ / truth, righteousness
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la rectitud
  - lo justo
  lexicon: verdad
  rationale: El contexto y la lectura inglesa toman la expresión como «the truth». En español, «la verdad» es la equivalencia natural y transparente; «rectitud» introduciría una connotación ética no explícita en esta cláusula.
- source_word: ይቀትሉኒ / they will kill me
  english_pob_choice: they will kill me
  chosen_spanish: me matarán
  alternatives_spanish:
  - me asesinarán
  - me darán muerte
  lexicon: matar
  rationale: Es la correspondencia directa y más natural en español para la amenaza de muerte del original, sin intensificar ni suavizar el verbo.
- source_word: ተለውት / attached, cling to
  english_pob_choice: are attached to
  chosen_spanish: están apegadas a
  alternatives_spanish:
  - están unidas a
  - están adheridas a
  - se aferran a
  lexicon: apegarse
  rationale: La revisión inglesa descartó una expansión interpretativa («so that they worship them») y retuvo una relación más literal de adhesión. «Apegadas a» comunica la idea de vínculo/adhesión de manera natural en español, aunque conserva una tensión semántica algo más afectiva que «adheridas».
- source_word: ነፍሶሙ / their souls
  english_pob_choice: their souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - su ser
  lexicon: alma
  rationale: «Almas» sigue de cerca el término de origen y el POB inglés. En español mantiene la referencia interior/personal sin reemplazarla por una paráfrasis antropológica.
theological_decisions:
- issue: Relación entre el apego del alma y la idolatría implícita
  english_pob_reading: their souls are attached to them
  chosen_spanish_reading: sus almas están apegadas a ellos
  alternative_spanish_readings:
  - sus almas se aferran a ellos
  - sus almas están unidas a ellos
  rationale: La revisión inglesa eliminó la explicación interpretativa sobre la adoración, por lo que la traducción española debe conservar solo la relación de apego/adhesión. «Apegadas a ellos» mantiene la ambigüedad del texto sin añadir una inferencia doctrinal o cultual no explicitada.
  doctrine_reference: Principio de sobriedad textual; no añadir inferencias teológicas no presentes en el testimonio base.
translation_notes:
  revision_awareness: La redacción española sigue la lectura revisada del POB inglés, que sustituyó una expansión interpretativa ('so that they worship them') por una cláusula más literal sobre la adhesión de las almas. También se optó por un registro formal-natural en español con 'están apegadas a' para reflejar esa literalidad sin calco duro.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en primera persona singular («digo», «me matarán»), coherente con el sujeto implícito del original.
  - Se preserva el paralelismo causal con «porque», siguiendo la estructura lógica del verso.
  - No se introdujo mayúscula teológica en «almas» porque el contexto no requiere una referencia técnica al Espíritu Santo.
