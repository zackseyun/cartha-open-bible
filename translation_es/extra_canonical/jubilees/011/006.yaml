  - severity: medium
    issue: La frase 'me ha sujetado a ellos' es poco idiomática en español
    rationale: Aunque intenta calcar 'made me subject to them', en español suena antinatural y puede confundirse con un acto físico. 'Me ha hecho estar sujeto a ellos' expresa mejor la idea de subordinación/obediencia preservando el sentido auditado.
