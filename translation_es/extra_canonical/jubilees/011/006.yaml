translation:
  language: es
  text: 'para quienes las hacen, y un extravío del corazón[a] para quienes las adoran. No las adoren.” Y su padre le dijo: “Yo también lo sé, hijo mío, pero ¿qué puedo hacer por un pueblo que me ha hecho estar sujeto a ellos?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La cláusula traducida como 'un extravío del corazón para quienes las adoran' es textualmente difícil en la línea ge'ez provista.
    reason: lexical_alternative
lexical_decisions:
- source_word: ለእለ፡ ይገብርዎሙ፡
  english_pob_choice: for those who make them
  chosen_spanish: para quienes las hacen
  alternatives_spanish:
  - para los que las fabrican
  - para quienes las hacen
  lexicon: source literal phrase
  rationale: Mantiene el destinatario plural y el verbo de fabricación sin añadir explicación interpretativa; 'las' retoma los ídolos de manera natural en español.
- source_word: ወከሕተት፡ ልብ፡
  english_pob_choice: a straying of heart
  chosen_spanish: un extravío del corazón
  alternatives_spanish:
  - un desvío del corazón
  - un extravío del corazón
  lexicon: heart / straying
  rationale: La frase ge'ez es textualmente difícil; 'extravío del corazón' conserva la idea de desviación interior sin resolver en exceso la ambigüedad del original.
- source_word: ለእለ፡ ያመልክዎሙ፡
  english_pob_choice: for those who worship them
  chosen_spanish: para quienes las adoran
  alternatives_spanish:
  - para quienes las adoran
  - para los que las veneran
  lexicon: worship
  rationale: '''Adorar'' expresa de forma directa el acto cultual sin suavizarlo con una palabra más débil como ''venerar''.'
- source_word: አታምልክዎሙ
  english_pob_choice: Do not worship them
  chosen_spanish: No las adoren
  alternatives_spanish:
  - No las adoren
  - No las adoren ustedes
  lexicon: negative imperative
  rationale: Traduce el imperativo plural con claridad y registro bíblico contemporáneo, evitando arcaísmos innecesarios.
- source_word: እኔሂ አእምር
  english_pob_choice: I also know
  chosen_spanish: Yo también lo sé
  alternatives_spanish:
  - Yo también lo sé
  - También yo lo sé
  lexicon: know
  rationale: Expresa el énfasis de la partícula inclusiva con un español natural y directo.
- source_word: ለሕዝብ፡ እለ፡ ረሰዩኒ፡ እትአዘዝ፡
  english_pob_choice: for a people who have made me subject to them
  chosen_spanish: por un pueblo que me ha sujetado a ellos
  alternatives_spanish:
  - por un pueblo que me ha sujetado a ellos
  - por un pueblo que me ha puesto bajo ellos
  lexicon: be subject / obey
  rationale: La revisión inglesa indica que el verbo significa estar sujeto u obedecer, no 'errar'. 'Me ha sujetado a ellos' conserva la relación de subordinación aunque suene algo marcada, manteniendo la fuerza del original.
theological_decisions:
- issue: Ídolos y culto indebido
  english_pob_reading: Do not worship them.
  chosen_spanish_reading: No las adoren.
  alternative_spanish_readings:
  - No las adoren.
  - No les rindan culto.
  rationale: La prohibición conserva el rechazo al culto a imágenes sin introducir un matiz doctrinal ajeno al texto.
  doctrine_reference: Éxodo 20:4-5; Deuteronomio 5:8-9
- issue: La ambigüedad textual de 'a straying of heart'
  english_pob_reading: The clause rendered 'a straying of heart for those who worship them' is textually difficult in the supplied Ge'ez row.
  chosen_spanish_reading: un extravío del corazón
  alternative_spanish_readings:
  - un desvío del corazón
  - un extravío del corazón
  - un corazón extraviado
  rationale: Se preserva la dificultad textual sin forzar una solución interpretativa única; el español mantiene la imagen de desorientación interior.
  doctrine_reference: Principios de traducción textual y cautela ante variantes difíciles
- issue: La frase final sobre estar sujeto
  english_pob_reading: what can I do for a people who have made me subject to them?
  chosen_spanish_reading: ¿qué puedo hacer por un pueblo que me ha sujetado a ellos?
  alternative_spanish_readings:
  - ¿qué puedo hacer por un pueblo que me ha sujetado a ellos?
  - ¿qué puedo hacer por un pueblo que me ha puesto bajo ellos?
  rationale: Se sigue la revisión que corrige el sentido desde 'errar' a 'estar sujeto/obedecer', preservando el tono de resignación del padre.
  doctrine_reference: Uso léxico del verbo de obediencia/sujeción en el texto ge'ez
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del inglés auditado: mantiene la cláusula difícil como ''un extravío del corazón'', evita la lectura errónea de ''errar'' en la frase final y conserva la estructura dialogal del pasaje sin añadir notas innecesarias.'
  spanish_consistency_notes:
  - Se usó 'adorar' para el culto a ídolos por consistencia con el registro bíblico y la fuerza del mandato.
  - Se evitó 'SEÑOR' o equivalentes porque este versículo no contiene el nombre divino.
  - Se mantuvo un español sobrio y contemporáneo, con sujeto explícito donde ayuda a la claridad.
  - No se añadieron notas al pie porque el texto puede quedar publicable sin anclajes adicionales y la consigna exige que todo marcador presente en el texto tenga una nota correspondiente.
