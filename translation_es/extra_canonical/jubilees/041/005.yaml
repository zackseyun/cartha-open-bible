translation_notes:
  revision_awareness: 'La revisión inglesa ajustó ''as it would be his brother’s'' a ''but his brother’s''. La versión española sigue esa lectura con una oposición directa: ''no sería suya, sino de su hermano''. También se conserva el final incompleto del fragmento, tal como aparece en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «descendencia» para offspring en sentido genealógico/legal.
  - Se mantiene «semilla» para seed por continuidad bíblica y por la carga corporal del pasaje.
  - No se introduce «SEÑOR» ni otras sustituciones no presentes en el fragmento.
  - La frase final queda abierta, siguiendo el texto fuente tal como está proporcionado.
