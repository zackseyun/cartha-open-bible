  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del ge''ez y del rastro inglés: Onán sabe que la descendencia sería de su hermano, entra a la esposa de su hermano y derrama la semilla en la tierra/suelo. También preserva correctamente la incompletitud final del fragmento fuente.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos puntos mejorables: «se llegó a la esposa» suena menos natural y algo ambiguo frente a la fórmula bíblica estable «entró a la mujer/esposa de su hermano»; y «fue malo a los ojos de» suena menos idiomático que «fue malo ante los ojos de» o «era malo a los ojos de». Conviene un ajuste menor para mayor naturalidad sin perder literalidad.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la fidelidad a fórmulas bíblicas. «Descendencia» para ዘርአ y «semilla» para la segunda ocurrencia están bien justificadas. «Esposa de su hermano» es aceptable. La revisión propuesta mantiene la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: «cuando se llegó a la esposa de su hermano»
    rationale: En español bíblico neutral, «se llegó a» puede entenderse como acercarse, no necesariamente tener relaciones. El inglés auditado dice «when he went in to his brother’s wife», y la expresión más fiel e inteligible es «cuando entró a la esposa de su hermano».
  - severity: low
    issue: «Y fue malo a los ojos de»
    rationale: Aunque comprensible, suena menos natural en esta fórmula semítica. «Y fue malo ante los ojos de» preserva mejor la expresión fija y fluye mejor en español eclesial moderno.
