lexical_decisions:
- source_word: ዘርአ
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - hijos
  - linaje
  lexicon: N/A
  rationale: En este contexto la palabra se refiere a la continuación genealógica dada al hermano, no simplemente a hijos en general. «Descendencia» conserva la fuerza reproductiva y legal sin sonar innecesariamente técnica en español.
- source_word: ዚአሁ
  english_pob_choice: not be his, but his brother’s
  chosen_spanish: no sería suya, sino de su hermano
  alternatives_spanish:
  - no le pertenecería, sino a su hermano
  - no sería de él, sino de su hermano
  lexicon: N/A
  rationale: La construcción expresa posesión/atribución de la descendencia. «Sería suya / de su hermano» reproduce con naturalidad la oposición marcada por el texto y por la revisión inglesa.
- source_word: ቤተ፡ ብእሲተ፡ እኁሁ
  english_pob_choice: his brother’s wife
  chosen_spanish: la esposa de su hermano
  alternatives_spanish:
  - la mujer de su hermano
  - la esposa de su hermano
  lexicon: N/A
  rationale: «Esposa» es claro y digno en español bíblico contemporáneo, y mantiene la relación marital explícita del original.
- source_word: ዘርአ
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - simiente
  - esperma
  lexicon: N/A
  rationale: El texto tiene la imagen corporal de la emisión sexual. «Semilla» preserva el paralelismo bíblico tradicional y evita una explicitud médica que el castellano bíblico no requiere aquí.
- source_word: ውስተ፡ ምድር፡
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en el suelo
  - al suelo
  - en la tierra
  lexicon: N/A
  rationale: «Tierra» sigue de cerca el sustantivo del original y conserva el efecto de contraste con la fecundidad esperada.
- source_word: እኩየ፡ ኮነ፡ በቅድመ፡ አዕይንተ፡
  english_pob_choice: it was evil in the sight of
  chosen_spanish: fue malo a los ojos de
  alternatives_spanish:
  - fue malo delante de
  - era malo ante los ojos de
  lexicon: N/A
  rationale: Se conserva la fórmula evaluativa semítica del original y del inglés POB. En español, «a los ojos de» reproduce la valoración observada desde la perspectiva divina sin sustituirla por una interpretación más libre.
theological_decisions:
