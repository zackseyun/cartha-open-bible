  yaml_path: translation/extra_canonical/jubilees/041/010.yaml
  text: And she sat at the entrance that is on the road to Timnah. And as Judah was going, he found her.
  footnotes:
  - marker: a
    text: Or 'stayed'.
    reason: previous_rendering
  - marker: b
    text: Or 'met her'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:35Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft text with a translation that matches the Ge''ez source: rendered ወነበረት as ''And she stayed,'' ውስተ አንቀጽ as ''at the entrance,'' እንተ መንገሰ ፍኖተ ቴምናታ as ''that is on the road to Timnah,'' and ወእንዘ የሐውር ይሁዳ ረከባ as ''And as Judah was going, he met her.'''
translation:
  language: es
  text: Y ella se sentó[a] a la entrada que está en el camino a Timná. Y mientras Judá iba, la encontró[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estuvo sentada».
    reason: alternative_reading
  - marker: b
    text: O «la halló».
    reason: lexical_alternative
lexical_decisions:
- source_word: ወነበረት
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - estuvo sentada
  - se quedó
  lexicon: Ge'ez ነበረ
  rationale: El contexto narrativo y la revisión inglesa señalan una postura concreta en la entrada; «se sentó» reproduce mejor esa acción que un mero «estuvo» o «se quedó», sin añadir contenido ajeno.
- source_word: ውስተ፡ አንቀጽ
  english_pob_choice: at the entrance
  chosen_spanish: a la entrada
  alternatives_spanish:
  - en la entrada
  - junto a la entrada
  lexicon: Ge'ez አንቀጽ
  rationale: «Entrada» conserva el sentido locativo directo del original y suena natural en español bíblico contemporáneo.
- source_word: እንተ፡ መንገሰ፡ ፍኖተ፡ ቴምናታ
  english_pob_choice: that is on the road to Timnah
  chosen_spanish: que está en el camino a Timná
  alternatives_spanish:
  - que está en la ruta a Timná
  - sobre el camino a Timná
  lexicon: Ge'ez መንገሰ / ፍኖተ / ቴምናታ
  rationale: El inglés revisado confirma una relación espacial simple; «camino» comunica bien ፍኖተ y «Timná» mantiene el topónimo con adaptación española mínima.
- source_word: ወእንዘ፡ የሐውር፡ ይሁዳ፡ ረከባ
  english_pob_choice: And as Judah was going, he found her
  chosen_spanish: Y mientras Judá iba, la encontró
  alternatives_spanish:
  - Y cuando Judá iba, la encontró
  - Y mientras Judá caminaba, la encontró
  lexicon: Ge'ez የሐውር / ረከባ
  rationale: «Mientras» preserva el valor progresivo del verbo ge'ez, y «la encontró» sigue la decisión revisada de que ረከባ significa «encontrar / to come upon», no simplemente «hallar una cita mutua».
theological_decisions:
- issue: Ninguno de peso doctrinal en este versículo; se trata de una escena narrativa
  english_pob_reading: No theological gloss is added beyond the literal scene description.
  chosen_spanish_reading: No se añade glosa teológica más allá de la escena literal.
  alternative_spanish_readings:
  - Añadir una lectura moral implícita
  - Introducir una referencia interpretativa a Génesis 38
  rationale: El texto fuente y la auditoría inglesa sostienen una traducción narrativa sobria; cualquier expansión interpretativa excedería el alcance del verso.
  doctrine_reference: Principio de suficiencia textual y no-expansión narrativa
translation_notes:
  revision_awareness: 'La traducción sigue la revisión más reciente que corrigió el borrador previo para ajustarlo al ge''ez: ወነበረት se entendió como una postura concreta («se sentó»), y ረከባ como «la encontró». Se mantuvo la estructura narrativa breve y paralela del texto inglés auditado, sin incorporar el pasaje vecino no incluido en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Timná» como forma española del topónimo, con acento gráfico según la adaptación habitual.
  - Se usa «Judá» como nombre propio bíblico estándar.
  - Se conserva un tono bíblico claro y moderno, evitando arcaísmos innecesarios.
