  lexicon: YHWH
  rationale: El texto fuente nombra a Dios con el nombre divino; por la terminología base del proyecto, se preserva «Yahvé» en lugar de una máscara reverencial.
- source_word: ወቀተሎ / he put him to death
  english_pob_choice: he put him to death
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo hizo morir
  - lo dio muerte
  lexicon: matar
  rationale: La acción es directa y concreta en el segmento fuente; «lo mató» comunica la ejecución divina sin añadir matiz interpretativo extra.
- source_word: ንበሪ ... እንዘ / remain ... while/as
  english_pob_choice: Remain ... while...
  chosen_spanish: Quédate ... mientras[a]...
  alternatives_spanish:
  - Permanece ... mientras[a]...
  - Quédate ... hasta que...
  lexicon: quedarse / permanecer
  rationale: El Ge'ez conservado termina en una cláusula incompleta introducida por እንዘ, por lo que el español debe quedar igualmente abierto y no completar el sentido más allá de la evidencia.
