translation:
  language: es
  text: Y en el cuadragésimo quinto jubileo, en la segunda semana, en el segundo año, Judá tomó
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: በአርብዓ፡ ወኀምስቱ፡ ኢዮቤልው፡
  english_pob_choice: the forty-fifth jubilee
  chosen_spanish: el cuadragésimo quinto jubileo
  alternatives_spanish:
  - el jubileo cuarenta y cinco
  - el cuadragésimo quinto año jubilar
  lexicon: jubileo
  rationale: El ge'ez expresa literalmente una secuencia ordinal ligada a jubileos; en español, «cuadragésimo quinto jubileo» conserva el orden y la forma técnica sin añadir una interpretación cronológica que el texto no explicita.
- source_word: በዳግም፡ ሱባዔ፡
  english_pob_choice: in the second week
  chosen_spanish: en la segunda semana
  alternatives_spanish:
  - en la segunda semana del ciclo
  - en la segunda septena
  lexicon: semana
  rationale: La unidad temporal es una «semana»; aunque el trasfondo calendárico de Jubileos puede sugerir una septena, el español común y fiel aquí es «semana», que reproduce el valor básico del término sin sobrecargarlo.
- source_word: በዓመት፡ ካልእ፡
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - en el año segundo
  lexicon: año
  rationale: Se mantiene el sentido ordinal y cronológico directo del ge'ez. «Segundo año» es la formulación natural en español y corresponde al registro del texto fuente.
- source_word: ነሥአ፡
  english_pob_choice: Judah took
  chosen_spanish: Judá tomó
  alternatives_spanish:
  - Judá tomó para sí
  - Judá recibió
  lexicon: tomar
  rationale: El verbo ge'ez indica una acción de tomar o asumir; el inglés POB eligió «took». En español, «tomó» preserva la misma fuerza verbal breve y abierta sin añadir un objeto no presente en este fragmento.
theological_decisions:
- issue: Cronología sacra del libro de Jubileos
  english_pob_reading: And in the forty-fifth jubilee, in the second week, in the second year, Judah took
  chosen_spanish_reading: Y en el cuadragésimo quinto jubileo, en la segunda semana, en el segundo año, Judá tomó
  alternative_spanish_readings:
  - Y en el jubileo cuarenta y cinco, en la segunda semana, en el segundo año, Judá tomó
  rationale: No se introduce armonización ni explicación interpretativa; se conserva la secuencia cronológica sacra tal como aparece en la fuente ge'ez y en la POB inglesa.
  doctrine_reference: Ninguna; se trata de un dato cronológico narrativo.
