translation:
  language: es
  text: 'Y Judá dijo a Onán, el hermano de Er[a]: «Entra donde la mujer de tu hermano, cumple con ella el deber del cuñado y levanta descendencia para tu hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y Judá dijo a Onán, su hermano».
    reason: Preserva la alternativa más literal reflejada también en la nota inglesa, mientras el texto principal explicita la referencia para evitar ambigüedad genealógica en español.
lexical_decisions:
- source_word: ይሁዳ፡ ለአውናን፡ እኁሁ
  english_pob_choice: And Judah said to Onan, his brother,
  chosen_spanish: Y Judá dijo a Onán, su hermano
  alternatives_spanish:
  - Y Judá dijo a Onán, hermano suyo
  - Y Judá dijo a Onán, el hermano de éste
  lexicon: n/a
  rationale: El ge’ez y el inglés auditado indican que «su hermano» modifica a Onán (hermano de Er), no que Onán sea hermano de Judá. Mantengo la aposición en español para evitar la ambigüedad y conservar la relación familiar correcta.
- source_word: ባእ፡ ኀበ፡ ብእሲተ፡ እኁከ፡
  english_pob_choice: Go in to your brother’s wife
  chosen_spanish: Entra donde la mujer de tu hermano
  alternatives_spanish:
  - Ve a la esposa de tu hermano
  - Acércate a la mujer de tu hermano
  lexicon: n/a
  rationale: «Entra donde» comunica el eufemismo sexual presente en el original y en el inglés. «Mujer de tu hermano» preserva la relación de alianza/familia sin cargar el texto con una forma demasiado jurídica o moderna.
- source_word: ወረከያ፡ ናዕልተ
  english_pob_choice: perform a brother-in-law’s duty to her
  chosen_spanish: cumple con ella el deber de cuñado
  alternatives_spanish:
  - cumple con ella el deber de levirato
  - haz con ella el deber de cuñado
  lexicon: n/a
  rationale: El inglés explica la obligación levirática. En español, «deber de cuñado» mantiene la fuerza familiar y legal sin imponer un tecnicismo que podría oscurecer el texto. «Levirato» es posible, pero menos inmediato para lectura pública.
- source_word: ወአንሥእ
  english_pob_choice: raise up offspring for your brother
  chosen_spanish: levanta descendencia para tu hermano
  alternatives_spanish:
  - engendra descendencia para tu hermano
  - levanta hijos para tu hermano
  lexicon: n/a
  rationale: La formulación conserva el valor idiomático de «raise up» y el objeto implícito completado en la revisión inglesa. «Descendencia» traduce con naturalidad el sentido genealógico y legal del pasaje.
theological_decisions:
- issue: Deber levirático y preservación del linaje del hermano muerto
  english_pob_reading: perform a brother-in-law’s duty to her, and raise up offspring for your brother
  chosen_spanish_reading: cumple con ella el deber de cuñado y levanta descendencia para tu hermano
  alternative_spanish_readings:
  - cumple con ella el deber de levirato y engendra descendencia para tu hermano
  - haz con ella el deber de cuñado y levanta hijos para tu hermano
  rationale: No suavizo la obligación ni la reduzco a una mera cortesía familiar. El español mantiene el acto prescrito para preservar el nombre y la descendencia del hermano fallecido, que es el punto teológico y narrativo del versículo.
  doctrine_reference: Levirato; preservación del nombre/linaje en la narrativa patriarcal
- issue: Ambigüedad pronominal en la frase inglesa auditada
  english_pob_reading: And Judah said to Onan, his brother,
  chosen_spanish_reading: Y Judá dijo a Onán, su hermano
  alternative_spanish_readings:
  - Y Judá dijo a Onán, hermano suyo
  - Y Judá dijo a Onán, el hermano de éste
  rationale: 'Sigo la revisión que restablece la claridad genealógica: el posesivo se refiere al hermano muerto, no a Judá. En español, la aposición explícita evita que el lector reconstruya erróneamente el parentesco.'
  doctrine_reference: Claridad narrativa; coherencia genealógica
translation_notes:
  revision_awareness: 'La base inglesa pasó por una revisión de claridad: se corrigió la puntuación para evitar que Onán pareciera hermano de Judá y se completó la cláusula final con el objeto implícito «offspring». El español sigue esa lectura revisada y refleja la misma distinción genealógica.'
  spanish_consistency_notes:
  - Se usa «Judá» para יהודה y «Onán» para Ὀνάν/forma ge’ez correspondiente, con ortografía española estándar.
  - Se mantiene el tono directo y narrativo de mandato, sin añadir explicaciones no presentes en el texto.
  - «Cuñado» se usa funcionalmente para el deber levirático; no se introduce terminología técnica adicional en el texto principal.
