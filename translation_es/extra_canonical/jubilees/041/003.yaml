translation:
  language: es
  text: Y Judá, su padre, se lo prohibió. Y Er, el primogénito de Judá, era malo, y Yahvé le dio muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወአሕበሶ (ḥabasa)
  english_pob_choice: forbade him
  chosen_spanish: se lo impidió
  alternatives_spanish:
  - lo prohibió
  - lo restringió
  - lo detuvo
  lexicon: Jub 41:3; ḥabasa
  rationale: 'El contexto es preventivo: Judá impide que Er proceda, no lo reprende. En español, ''se lo impidió'' comunica bien la restricción activa sin cargar una matiz disciplinario que no está en el verbo ge''ez.'
- source_word: ዔር፡ በኵሩ፡ ለይሁዳ
  english_pob_choice: Er, Judah’s firstborn
  chosen_spanish: Er, el primogénito de Judá
  alternatives_spanish:
  - Er, el primero de Judá
  - Er, el hijo mayor de Judá
  lexicon: Jub 41:3; בכור / firstborn
  rationale: '''Primogénito'' preserva el valor técnico de primacía filial y es el equivalente más estable para ''firstborn'' en registro bíblico.'
- source_word: እኩይ
  english_pob_choice: was evil
  chosen_spanish: fue malo
  alternatives_spanish:
  - era malo
  - fue perverso
  - era perverso
  lexicon: Jub 41:3; רע / evil
  rationale: Se mantiene la valoración moral directa del texto. 'Malo' es más llano y publicable en español, mientras que 'perverso' intensificaría más allá de lo necesario.
- source_word: ወቀተሎ እግዚአብሔር
  english_pob_choice: the LORD put him to death
  chosen_spanish: Yahvé lo hizo morir
  alternatives_spanish:
  - Yahvé lo mató
  - el Señor lo hizo morir
  lexicon: Jub 41:3; יהוה / YHWH
  rationale: Se usa 'Yahvé' por la norma del proyecto. 'Lo hizo morir' conserva el sentido causativo sin introducir una formulación más cruda de la que exige el ge'ez.
theological_decisions:
- issue: Nombre divino en una obra pseudoepigráfica con cita del Tetragrámaton
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: El proyecto exige 'Yahvé' para יהוה. Aunque el inglés POB usa 'LORD' por convención editorial, aquí se desmascara el nombre divino para reflejar la fuente y la política terminológica del POB español.
  doctrine_reference: Éxodo 3:15; convención POB sobre YHWH
- issue: Valor causal de la muerte de Er
  english_pob_reading: the LORD put him to death
  chosen_spanish_reading: Yahvé lo hizo morir
  alternative_spanish_readings:
  - Yahvé lo dio muerte
  - Yahvé lo mató
  rationale: La construcción causativa evita añadir una interpretación teológica más fuerte que el texto. Mantiene que la muerte es atribuida a la acción divina sin forzar el grado exacto del mecanismo.
  doctrine_reference: Providencia divina y juicio en narrativa bíblica
translation_notes:
  revision_awareness: La base inglesa revisada corrigió una lectura previa errónea de 'rebuked him' a 'forbade him'. La versión española sigue esa corrección y evita un verbo de reprensión, optando por una expresión de impedimento coherente con el ge'ez ḥabasa y con el contexto matrimonial implícito.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en toda la serie, conforme a la política del proyecto.
  - '''Primogénito'' conserva la terminología bíblica estable para בכור.'
  - '''Hizo morir'' mantiene el causativo divino sin sobreespecificar el modo de la muerte.'
  - No se introducen notas al pie porque no hay variantes textuales o lecturas alternativas que requieran anclaje en este versículo.
