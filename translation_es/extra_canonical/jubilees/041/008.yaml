base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/041/008.yaml
  text: And in the fifth year of this week, Shua, the wife of Judah, died. And in the sixth year Judah went up to shear his sheep at Timnah, and they told Tamar, saying, “Behold, your father-in-law is going up to Timnah to shear.”
  footnotes:
  - marker: a
    text: Or 'of the seventh week'.
    reason: previous_rendering
  - marker: b
    text: Or 'to shear his sheep.”'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:35Z'
    unchanged: false
    changes_summary: 'Replaced the incorrect carryover text with a full translation of the verse: restored Shua''s death, the dating formula, Judah''s going up to Timnah to shear his sheep, and the report to Tamar. Adjusted wording for formal, natural English.'
translation:
  language: es
  text: 'Y en el quinto año de esta semana, Sua, la esposa de Judá, murió. Y en el sexto año Judá subió a esquilar sus ovejas en Timná, y le dijeron a Tamar: «Mira, tu suegro sube a Timná a esquilar»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a esquilar sus ovejas». El ge'ez final solo dice «a esquilar», aunque la referencia a las ovejas queda implícita por el contexto y por la primera parte del versículo.
    reason: source_note
lexical_decisions:
- source_word: בְּשַׁת הַחֲמִישִׁית / 'in the fifth year of this week'
  english_pob_choice: And in the fifth year of this week
  chosen_spanish: Y en el quinto año de esta semana
  alternatives_spanish:
  - Y en el quinto año de la semana
  lexicon: cronología/expresión temporal
  rationale: Conservo la fórmula cronológica literal del testimonio ge'ez y del POB inglés; 'semana' refleja la unidad de Jubileos, no una semana ordinaria del calendario, pero es la forma que el texto presenta.
- source_word: שׁוּעַ / Shua
  english_pob_choice: Shua
  chosen_spanish: Sua
  alternatives_spanish:
  - Shua
  lexicon: transliteración de nombre propio
  rationale: Adapto el nombre al uso natural del español bíblico, que evita el grupo inicial 'Sh-' cuando no es necesario para la identificación. La forma breve 'Sua' mantiene la referencia al mismo personaje.
- source_word: the wife of Judah
  english_pob_choice: the wife of Judah
  chosen_spanish: la esposa de Judá
  alternatives_spanish:
  - la mujer de Judá
  lexicon: relación conyugal
  rationale: '''Esposa'' comunica con claridad la relación marital en español culto y evita ambigüedad. ''Mujer de'' sería posible, pero menos preciso en este contexto.'
- source_word: to shear / yịḳrṣ
  english_pob_choice: to shear
  chosen_spanish: esquilar
  alternatives_spanish:
  - trasquilar
  - cortar la lana
  lexicon: verbo pastoril
  rationale: '''Esquilar'' es el equivalente natural y técnico para el acto de cortar la lana de las ovejas. Preserva el sentido verbal conciso del ge''ez, que en esta revisión no repite explícitamente ''sus ovejas'' al final.'
- source_word: Timnah / תִּמְנָה
  english_pob_choice: Timnah
  chosen_spanish: Timná
  alternatives_spanish:
  - Timna
  lexicon: topónimo
  rationale: Uso la forma acentuada 'Timná' para ayudar a la pronunciación en español y mantener la identidad del lugar.
- source_word: they told Tamar, saying
  english_pob_choice: and they told Tamar, saying
  chosen_spanish: y se lo dijeron a Tamar, diciendo
  alternatives_spanish:
  - y le dijeron a Tamar, diciendo
  lexicon: discurso reportado
  rationale: Conservo la estructura de relato indirecto y la fórmula 'diciendo' del original y del POB inglés, sin suavizarla excesivamente.
- source_word: Behold, your father-in-law is going up to Timnah to shear
  english_pob_choice: Behold, your father-in-law is going up to Timnah to shear
  chosen_spanish: Mira, tu suegro sube a Timná a esquilar
  alternatives_spanish:
  - He aquí, tu suegro sube a Timná a esquilar
  - Mira, tu suegro va subiendo a Timná a esquilar
  lexicon: interjección / reporte de aviso
  rationale: '''Mira'' reproduce bien el valor de aviso de ''Behold'' en español moderno y natural. Mantiene el tono urgente del mensaje.'
theological_decisions:
- issue: 'Cronología de Jubileos: ''esta semana'''
  english_pob_reading: of this week
  chosen_spanish_reading: de esta semana
  alternative_spanish_readings:
  - de la séptima semana
  rationale: El auditoría textual corrige expresamente la lectura errónea 'seventh week'; por tanto, mantengo 'esta semana' para seguir la evidencia ge'ez y evitar introducir un número no atestiguado.
  doctrine_reference: Jubileos 41:8; revisión del 2026-04-28
- issue: Título de parentesco en el aviso a Tamar
  english_pob_reading: your father-in-law
  chosen_spanish_reading: tu suegro
  alternative_spanish_readings:
  - tu padre político
  rationale: '''Suegro'' es la equivalencia normal y precisa en español para el vínculo con Judá; no requiere glosa adicional.'
  doctrine_reference: Jubileos 41:8
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue corregida para restaurar el contenido completo del versículo: la muerte de Sua, la datación ''en el quinto año de esta semana'', la subida de Judá a esquilar en Timná y el aviso a Tamar. También se revisó la clausula final para reflejar el ge''ez conciso ''to shear'' sin forzar la repetición de ''his sheep''.'
  spanish_consistency_notes:
  - Mantengo 'Judá' y 'Tamar' con formas bíblicas estándar en español.
  - Uso 'esta semana' para la unidad jubilar, no una semana civil ordinaria.
  - Conservo el tono narrativo sobrio y la sintaxis coordinada del texto fuente.
