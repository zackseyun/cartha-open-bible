translation:
  language: es
  text: '...sus ovejas en Timná. Y se quitó las vestiduras de su viudez, se puso un velo y se adornó.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: አባግዒሁ
  english_pob_choice: his sheep
  chosen_spanish: sus ovejas
  alternatives_spanish:
  - sus corderos
  - sus rebaños
  lexicon: oveja
  rationale: El genitivo posesivo del Ge'ez corresponde naturalmente a «sus ovejas»; «rebaños» sería más interpretativo y «corderos» estrecha innecesariamente el referente.
- source_word: በቴምናታ
  english_pob_choice: in Timnah
  chosen_spanish: en Timná
  alternatives_spanish:
  - en Timna
  - en Timnat
  lexicon: Timná
  rationale: Se conserva el topónimo con forma española breve y clara; «Timná» mantiene la identificación geográfica sin forzar una transliteración más técnica.
- source_word: ወአንበረች፡ አልባሰ፡ ምዕስብናሃ
  english_pob_choice: she took off the garments of her widowhood
  chosen_spanish: se quitó las vestiduras de su viudez
  alternatives_spanish:
  - se quitó la ropa de su viudez
  - dejó sus vestiduras de viudez
  lexicon: vestiduras / viudez
  rationale: La frase del Ge'ez expresa la remoción de una prenda asociada al estado de viudez; «vestiduras» preserva el registro formal y el valor simbólico mejor que «ropa».
- source_word: ወለብሰት፡ ገልባቤ፡
  english_pob_choice: put on a veil
  chosen_spanish: se puso un velo
  alternatives_spanish:
  - se cubrió con un velo
  - se colocó un velo
  lexicon: velo
  rationale: El objeto es un velo o cubierta para la cabeza/cara; «se puso un velo» sigue de cerca la acción verbal y resulta idiomático en español.
- source_word: ወተሣየየት
  english_pob_choice: adorned herself
  chosen_spanish: se adornó
  alternatives_spanish:
  - se arregló
  - se engalanó
  lexicon: adornar
  rationale: El verbo indica embellecerse o adornarse; «se adornó» conserva la amplitud semántica sin añadir detalles no presentes en el texto fuente.
theological_decisions:
- issue: No hay máscara del nombre divino ni terminología cristológica en el pasaje
  english_pob_reading: The English draft simply narrates actions and places without theological framing.
  chosen_spanish_reading: La traducción mantiene el carácter narrativo sin introducir lenguaje devocional ajeno al pasaje.
  alternative_spanish_readings:
  - Añadir una nota doctrinal
  - usar formulaciones litúrgicas
  rationale: El contenido fuente es puramente narrativo; no hay base textual para cargar el versículo con terminología teológica adicional.
  doctrine_reference: Principio de sobriedad textual y no sobreinterpretación
- issue: Valor cultural de la viudez
  english_pob_reading: she took off the garments of her widowhood
  chosen_spanish_reading: se quitó las vestiduras de su viudez
  alternative_spanish_readings:
  - se quitó la ropa de viuda
  - dejó el luto
  rationale: «Viudez» conserva el estado social y ritual implicado por el texto mejor que una paráfrasis como «luto», que podría desplazar el foco del estado personal al duelo emocional.
  doctrine_reference: Lectura sociocultural del texto narrativo
translation_notes:
  revision_awareness: 'El registro se corrigió para alinearse con el texto ge''ez provisto y con la revisión que rechazó la inserción no atestiguada de la escena de la puerta de Enaim. La versión española refleja únicamente las acciones presentes: ubicación en Timná, quitarse las vestiduras de viudez, ponerse un velo y adornarse.'
  spanish_consistency_notes:
  - Se evita el calco inglés en favor de una sintaxis española natural, pero sin añadir escenas ausentes del Ge'ez.
  - Se mantiene «Timná» como forma breve y legible del topónimo.
  - «Vestiduras de su viudez» conserva el valor simbólico y social del original.
  - No se emplean notas al pie porque no hay variantes textuales o alternativas significativas que anclar en el versículo español.
