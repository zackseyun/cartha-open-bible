  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del ge''ez y del inglés auditado: Er tomó una esposa de las hijas de Aram, llamada Tamar; luego la rechazó y no tuvo relaciones con ella; la motivación se relaciona con el origen cananeo de su madre y su deseo de tomar esposa del parentesco materno. Sin embargo, la apertura española «Para Er, su primogénito, tomó...» es sintácticamente defectuosa y no refleja con naturalidad el sujeto implícito del original. Además, «del linaje de su madre» puede estrechar innecesariamente el sentido de parentesco/parentela.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero requiere una corrección de redacción importante en la primera cláusula para que sea español natural y preciso. También conviene ajustar «linaje» a «parentela» para expresar mejor el valor de kin/parentesco sin un matiz demasiado genealógico. «No se unió a ella» es aceptable como eufemismo digno.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres propios Aram, Tamar y Canaán están bien. «Esposa» para ብእሲተ es adecuado. La principal mejora léxica recomendada es እምነገደ እሙ: mejor «de la parentela de su madre» que «del linaje de su madre».'
  issues:
  - severity: high
    issue: 'Apertura española mal construida: «Para Er, su primogénito, tomó...»'
    rationale: La frase resulta agramatical o al menos muy torpe en español, porque deja ambiguo el sujeto y convierte «Para Er» en un arranque impropio. El sentido es que alguien le tomó esposa a Er, su primogénito; en español natural conviene «A Er, su primogénito, le tomó una esposa...».
  - severity: medium
    issue: «Del linaje de su madre» puede restringir demasiado el sentido de parentesco
    rationale: El original y el inglés apuntan a kin/parentela, no necesariamente a linaje en sentido genealógico o nobiliario. «De la parentela de su madre» preserva mejor el campo semántico.
  revised_spanish_text: A Er, su primogénito, le tomó una esposa de entre las hijas de Aram, y su nombre era Tamar. Pero la rechazó y no se unió a ella, porque su madre era de entre las hijas de Canaán, y quiso tomar para sí una esposa de la parentela de su madre.
  revision_rationale: Se corrige la sintaxis inicial para reflejar fielmente el sentido del original en español natural. También se ajusta «linaje» a «parentela» para representar mejor la idea de parentesco materno sin estrechar el significado. No se requieren notas al pie.
