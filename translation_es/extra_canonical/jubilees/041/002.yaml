    unchanged: false
    changes_summary: Added 'he took' to account for the opening verb and capitalized the initial word for natural formal English. Kept the rest substantially unchanged.
translation:
  language: es
  text: A Er, su primogénito, le tomó una esposa de entre las hijas de Aram, y su nombre era Tamar. Pero la rechazó y no se unió a ella, porque su madre era de entre las hijas de Canaán, y quiso tomar para sí una esposa de la parentela de su madre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ብእሲተ
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  - una esposa para él
  lexicon: Geez ብእሲተ = woman/wife; context here is marital.
  rationale: En este contexto la referencia es matrimonial, así que «esposa» comunica con precisión la relación sin perder naturalidad en español.
- source_word: እምነ አዋልደ አራም
  english_pob_choice: from the daughters of Aram
  chosen_spanish: de entre las hijas de Aram
  alternatives_spanish:
  - de las hijas de Aram
  - entre las hijas de Aram
  lexicon: Source phrase names descent/origin rather than a single daughter.
  rationale: «De entre» conserva el matiz de selección desde un grupo de origen, reflejando mejor la construcción fuente que un simple genitivo español.
- source_word: ትዕማር
  english_pob_choice: Tamar
  chosen_spanish: Tamar
  alternatives_spanish:
  - Támar
  lexicon: Proper name.
  rationale: Se mantiene el nombre propio en forma castellana habitual, sin forzar una transliteración menos reconocible.
- source_word: ወጸልአ
  english_pob_choice: he rejected her
  chosen_spanish: la rechazó
  alternatives_spanish:
  - la desechó
  - la repudió
  lexicon: Verb of aversion/rejection.
  rationale: «Rechazó» expresa la negativa afectiva y relacional del original sin introducir un término jurídico más fuerte que no está exigido aquí.
- source_word: ወኢሰከበ፡ ምስሌሃ
  english_pob_choice: and did not lie with her
  chosen_spanish: y no se unió a ella
  alternatives_spanish:
  - y no se acostó con ella
  - y no tuvo relaciones con ella
  lexicon: Euphemistic sexual phrase.
  rationale: La expresión española mantiene el sentido relacional/sexual con dignidad y evita una literalidad áspera; «se unió a ella» conserva el eufemismo del texto fuente.
- source_word: እምአዋልደ ከናአን
  english_pob_choice: because his mother was from the daughters of Canaan
  chosen_spanish: porque su madre era de entre las hijas de Canaán
  alternatives_spanish:
  - porque su madre era de las hijas de Canaán
  - ya que su madre procedía de las hijas de Canaán
  lexicon: Source phrase on maternal origin.
  rationale: La elección mantiene la misma lógica de procedencia que en la primera mitad del versículo, sin añadir explicaciones externas.
- source_word: ወፈቀደ ይንሣእ
  english_pob_choice: and he wanted to take
  chosen_spanish: y quiso tomar para sí
  alternatives_spanish:
  - y deseó tomar para sí
  - y quería tomar
  lexicon: Verb of intention/will.
  rationale: «Quiso» traduce la voluntad/intención de forma directa; «tomar para sí» reproduce el valor reflexivo del original y del inglés auditado.
- source_word: ሎቱ ብእሲተ
  english_pob_choice: for himself a wife
  chosen_spanish: para sí una esposa
  alternatives_spanish:
  - una esposa para sí
  - una mujer para sí
  lexicon: Reflexive beneficiary construction.
  rationale: Se conserva el orden natural del español sin perder el énfasis en la acción beneficiaria de la persona misma.
- source_word: እምነገደ እሙ
  english_pob_choice: from the kin of his mother
  chosen_spanish: del linaje de su madre
  alternatives_spanish:
  - de la parentela de su madre
  - de la familia de su madre
  lexicon: Kinship/lineage term.
  rationale: «Linaje» comunica tanto parentesco como pertenencia de grupo, y es más idiomático y sobrio que una glosa demasiado literal.
theological_decisions:
- issue: Treatment of kinship origin and marital choice without harmonizing away the tension
  english_pob_reading: Er wanted a wife from his mother's kin because his mother was from the daughters of Canaan.
  chosen_spanish_reading: Er quiso tomar para sí una esposa del linaje de su madre, porque su madre era de entre las hijas de Canaán.
  alternative_spanish_readings:
  - Er quería tomar para sí una esposa del linaje de su madre.
  - Quiso para sí una esposa de la parentela de su madre.
  rationale: El español conserva la motivación social/familiar explícita en la fuente, sin suavizarla ni convertirla en una explicación moral externa.
  doctrine_reference: No doctrinal claim; narrative kinship motive.
translation_notes:
  revision_awareness: La redacción sigue la corrección auditada del inglés POB más reciente, que añadió explícitamente «he took» al inicio para reflejar el verbo de apertura del testimonio fuente. La versión española integra ese verbo con «tomó» y mantiene sin expansión la estructura causal y de parentesco del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» no aplica aquí porque el versículo no contiene el tetragrámaton ni un equivalente griego explícito.
  - Se mantiene «esposa» en lugar de «mujer» para conservar el sentido marital del contexto.
  - Se evita «se acostó con ella» para no volver coloquial una frase que en la fuente funciona como eufemismo narrativo.
  - La preposición «de entre» se usa de modo consistente para origen/selección dentro de un grupo.
  - No se introducen notas de variantes textuales porque el paquete fuente y la auditoría inglesa muestran alto acuerdo y ningún conflicto relevante.
