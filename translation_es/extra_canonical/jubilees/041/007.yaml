    changes_summary: 'Replaced the unrelated draft text with a translation that matches the Ge''ez source: restored Judah’s speech about waiting for Shelah, included the statement that Bedsu’el did not allow Shelah to be given, and retained the notice of Bed’s death.'
translation:
  language: es
  text: «Permanece viuda hasta que mi hijo Selah crezca, y yo te daré a él por esposa». Y él creció, pero Bedsu'el, la esposa de Judá, no permitió que su hijo Selah se casara; y Bed[su'el][a] murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre aparece truncado en el texto ge'ez en «Bed»; la restauración entre corchetes refleja la forma completa presumible de Bedsu'el.
    reason: textual_variant
lexical_decisions:
- source_word: ትመዐስቢ
  english_pob_choice: Remain a widow until
  chosen_spanish: Permanece viuda hasta que
  alternatives_spanish:
  - Quédate viuda hasta que
  - Permanece esperando hasta que
  lexicon: no lexical entry number provided
  rationale: El ajuste de revisión indica que el ge'ez expresa de forma específica ‘permanecer viuda’, no solo ‘esperar’. En español, «permanece viuda» conserva el peso legal y narrativo de la expresión.
- source_word: ወእሁበኪ ሎቱ ብእሲተ
  english_pob_choice: and I will give you to him as a wife
  chosen_spanish: y yo te la daré por esposa
  alternatives_spanish:
  - y yo te daré a él como esposa
  - y yo te daré por mujer
  lexicon: no lexical entry number provided
  rationale: La construcción del ge'ez corresponde al compromiso de dar a la mujer a él en matrimonio. En español, «te la daré por esposa» mantiene la relación matrimonial sin forzar una formulación antinatural.
- source_word: ወልህቀ
  english_pob_choice: And he grew up
  chosen_spanish: Y él creció
  alternatives_spanish:
  - Y creció
  - Y llegó a crecer
  lexicon: no lexical entry number provided
  rationale: La revisión marcó que esta cláusula estaba omitida. Se traduce de modo directo y claro, manteniendo el sujeto masculino implícito en el contexto de Sela[h].
- source_word: ከመ፡ ያውስብ
  english_pob_choice: to marry
  chosen_spanish: se casara
  alternatives_spanish:
  - se casara
  - contrajera matrimonio
  lexicon: no lexical entry number provided
  rationale: La nota de revisión corrige la idea errónea de ‘be given as a wife’; el ge'ez significa que él se case. En español, «se casara» expresa con naturalidad el valor matrimonial del verbo.
- source_word: ቤድሱኤል
  english_pob_choice: Bedsu’el
  chosen_spanish: Bedsu'el
  alternatives_spanish:
  - Bedsu’el
  - Bedsuel
  lexicon: no lexical entry number provided
  rationale: Se conserva el nombre propio con la transliteración más cercana al audit trail inglés y con apóstrofo para reflejar la división interna del nombre.
- source_word: ቤድ
  english_pob_choice: Bed[su'el] died
  chosen_spanish: Bed[su'el] murió
  alternatives_spanish:
  - murió Bed[su'el]
  - murió Bedsu'el
  lexicon: no lexical entry number provided
  rationale: El texto ge'ez se corta en ‘Bed’, y el informe de revisión observa que se trata de una truncación scribal de Bedsu'el. Se conserva el corchete para señalar la restauración editorial, sin ocultar la discontinuidad del testimonio.
theological_decisions:
- issue: La expresión matrimonial de entrega de la mujer al hijo no debe confundirse con otra relación o con una simple espera.
  english_pob_reading: and I will give you to him as a wife
  chosen_spanish_reading: y yo te la daré por esposa
  alternative_spanish_readings:
  - y yo te daré a él como esposa
  - y te la daré como mujer
  rationale: 'No hay tensión doctrinal mayor, pero sí una precisión narrativa importante: el compromiso es matrimonial. «Por esposa» conserva el sentido sin introducir una formulación que sugiera una transferencia no matrimonial o un giro ambiguo.'
  doctrine_reference: Narrative fidelity / matrimonio patriarcal en contexto bíblico
- issue: El estado civil de viudez tiene fuerza jurídica y literaria en la escena.
  english_pob_reading: Remain a widow until
  chosen_spanish_reading: Permanece viuda hasta que
  alternative_spanish_readings:
  - Quédate viuda hasta que
  - Sigue viuda hasta que
  rationale: La revisión especifica que el ge'ez tiene una carga más fuerte que ‘esperar’. Mantener ‘viuda’ evita diluir el peso legal del reclamo y preserva el conflicto narrativo.
  doctrine_reference: Contexto legal-narrativo del matrimonio en Génesis 38 / Jubileos
- issue: La finalización truncada del nombre en el manuscrito no debe normalizarse silenciosamente.
  english_pob_reading: and Bed[su'el] died
  chosen_spanish_reading: y Bed[su'el] murió
  alternative_spanish_readings:
  - y murió Bed[su'el]
  - y murió Bedsu'el
  rationale: El texto fuente termina abruptamente en ‘Bed’. El corchete hace visible la probable restauración del nombre, pero conserva la huella del truncamiento. Eso respeta la transparencia textual del proyecto.
  doctrine_reference: Crítica textual / integridad del testimonio manuscrito
translation_notes:
  revision_awareness: 'La versión española se revisó a la luz del último pase de revisión y de las observaciones de control de calidad: se restauró la cláusula ‘Y él creció’, se corrigió el sentido de ‘se casara’ frente a una traducción errónea que hacía de la frase una entrega como esposa a Judá, se reforzó el matiz legal de ‘permanece viuda’, y se conservó la señal de truncamiento textual en el nombre final.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo demande; este versículo no contiene el nombre divino.
  - Se mantiene ‘esposa’ para la relación matrimonial porque el contexto exige claridad narrativa y naturalidad en español.
  - Se conserva la transliteración ‘Bedsu'el’ con apóstrofo para alinearla con la auditoría inglesa y la segmentación del nombre en el testimonio ge'ez.
  - La nota textual en el nombre final usa un corchete interno en el texto principal para hacer visible la restauración editorial, conforme al principio de transparencia del proyecto.
