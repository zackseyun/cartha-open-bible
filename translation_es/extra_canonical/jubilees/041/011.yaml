- from: 'Y pensó que era una prostituta y le dijo: «Permíteme entrar en ti», y ella le dijo: «Entra»[a], y él entró. Y ella le dijo:'
  to: 'Y pensó que era una prostituta y le dijo: «Permíteme entrar en ti»[a], y ella le dijo: «Entra», y él entró. Y ella le dijo:'
  rationale: Se conserva el texto principal casi intacto porque es fiel al ge'ez y al inglés auditado. Solo se corrige la ubicación y formulación de la nota al pie para que refleje correctamente que 'Ven a mí' era una traducción previa de la petición del hombre, no de la respuesta de la mujer.
