translation:
  language: es
  text: 'Y pensó que era una prostituta y le dijo: «Permíteme entrar en ti»[a], y ella le dijo: «Entra», y él entró. Y ella le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O en una traducción anterior: «Ven a mí».'
    reason: previous_rendering
lexical_decisions:
- source_word: ወተሐዘባ
  english_pob_choice: thought her to be
  chosen_spanish: pensó que era
  alternatives_spanish:
  - creyó que era
  - la consideró como
  lexicon: taḥaza / considerar, pensar, suponer
  rationale: El verbo ge'ez expresa una suposición o juicio mental; 'pensó que era' evita la falsedad sugerida por 'reconoció' y conserva la idea de una estimación errónea.
- source_word: ከመ፡ ዘማዊት፡
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una mujer prostituta
  lexicon: zēmāwīt / prostituta
  rationale: '''Prostituta'' es claro, natural y fiel al sentido léxico; mantiene el registro bíblico sin introducir una connotación más fuerte de la necesaria.'
- source_word: እባእ፡ ኀቤኪ፡
  english_pob_choice: Let me come in to you
  chosen_spanish: Permíteme entrar en ti
  alternatives_spanish:
  - Déjame entrar contigo
  - Déjame entrar a ti
  lexicon: ebā' ḥabēki / first-person jussive with second-person feminine object
  rationale: La revisión del inglés muestra que no es un imperativo hacia ella, sino una petición del varón para entrar; en español 'entrar en ti' preserva el paralelismo idiomático del texto fuente, aunque suena deliberadamente directo.
- source_word: ባእ፡
  english_pob_choice: Come
  chosen_spanish: Entra
  alternatives_spanish:
  - Pasa
  - Ven
  lexicon: bā' / come, enter
  rationale: La respuesta breve se traduce con un imperativo natural en español. Se mantiene la concisión del original.
theological_decisions:
- issue: Preservar la ambigüedad y crudeza narrativa del encuentro sexual implícito
  english_pob_reading: The text describes Judah's mistaken assumption, his request to enter, her consent, and his going in, without softening the scene.
  chosen_spanish_reading: El texto describe la suposición errónea, la petición de entrar, el consentimiento y la entrada, sin suavizar la escena.
  alternative_spanish_readings:
  - usar eufemismos como 'acostarse con ella'
  - explicitar más la implicación sexual
  rationale: La fidelidad al relato exige no atenuar ni moralizar el contenido. La formulación conserva la tensión narrativa y la implicación sexual implícita en la secuencia verbal.
  doctrine_reference: Principio de transparencia textual y fidelidad narrativa en traducción bíblica
- issue: Conservar la cláusula final incompleta
  english_pob_reading: And she said to him,
  chosen_spanish_reading: 'Y ella le dijo:'
  alternative_spanish_readings:
  - 'Y le dijo:'
  - 'Y ella le respondió:'
  rationale: El hebreo/ge'ez y el inglés auditado terminan en una cláusula abierta; el español debe conservar el corte sin completarlo artificialmente.
  doctrine_reference: Principio de preservación de la forma textual y de las unidades versiculares
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se corrigió ''reconoció'' por ''pensó que era'' y se adoptó la lectura ''Permíteme entrar en ti'' en lugar de ''Ven a mí''. También se preservó la cláusula final incompleta como en el texto fuente y en el inglés auditado.'
  spanish_consistency_notes:
  - Se usa el tuteo breve y directo para el diálogo, acorde con la escena y con la concisión del original.
  - Se evita 'siervo' u otras sustituciones no pertinentes; el vocabulario se mantiene centrado en la suposición, la petición de entrada y el consentimiento.
  - La nota[a] está anclada exactamente en 'Entra' para reflejar la alternativa inglesa documentada y la ambigüedad posible en español.
