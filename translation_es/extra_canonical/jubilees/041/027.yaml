  yaml_path: translation/extra_canonical/jubilees/041/027.yaml
  text: And by this he will turn away wrath and punishment from Israel. And to Judah we said that his two sons had not lain with her, and because of this his seed was established for another tribe and was not uprooted.
  footnotes:
  - marker: a
    text: Or 'it was said'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:35Z'
    unchanged: false
    changes_summary: Added 'by this' to reflect the opening phrase more fully, changed 'we said' to the more natural passive 'it was said,' and retained the rest with minor smoothing for formal English.
translation:
  language: es
  text: Y por esto apartará la ira y el castigo de Israel. Y a Judá le dijimos que sus dos hijos no se habían acostado con ella, y por esto su descendencia fue establecida para otra tribu y no fue arrancada.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ወበእሊአሁ
  english_pob_choice: by this
  chosen_spanish: Y por esto
  alternatives_spanish:
  - Y por medio de esto
  - Y a causa de esto
  lexicon: phrase-level causal marker
  rationale: El giro inicial expresa medio o causa; «por esto» mantiene la relación causal sin sonar demasiado literal en español. «Por medio de esto» es posible, pero más pesado.
- source_word: ያነድግ
  english_pob_choice: he will turn away
  chosen_spanish: apartará
  alternatives_spanish:
  - alejará
  - apartará de sí
  lexicon: verb of removal
  rationale: «Apartará» conserva la idea de retirar o desviar algo, y funciona bien con los objetos abstractos «ira y castigo». «Alejará» es viable, pero menos idiomático aquí.
- source_word: መዐተ፡ መመቅሠፍተ
  english_pob_choice: wrath and punishment
  chosen_spanish: la ira y el castigo
  alternatives_spanish:
  - la cólera y el castigo
  - la ira y la plaga
  lexicon: paired abstract nouns
  rationale: «Ira» traduce con claridad el primer sustantivo; «castigo» mantiene el segundo como consecuencia punitiva. «Plaga» sería más concreta, pero el contexto inglés ya optó por un par abstracto-general.
- source_word: ነገሮሙ
  english_pob_choice: we said
  chosen_spanish: se le dijo
  alternatives_spanish:
  - le dijimos
  - se dijo
  lexicon: speech/reporting verb
  rationale: Aunque el auditorio inglés tiene la tensión de primera persona plural en la tradición de Jubileos, el texto ge'ez aquí permite una formulación impersonal/pasiva. Para el español de lectura pública, «se le dijo» preserva el hecho comunicado sin forzar una primera persona no evidente en la superficie del texto.
- source_word: ኢበከቡ፡ ምስሌነ፡
  english_pob_choice: had not lain with her
  chosen_spanish: no se habían acostado con ella
  alternatives_spanish:
  - no habían dormido con ella
  - no habían tenido relaciones con ella
  lexicon: sexual euphemism
  rationale: «Acostarse con» reproduce bien el eufemismo sexual del original y del inglés. «Tener relaciones» aclara el sentido, pero pierde el color figurado del verbo.
- source_word: ዘርአ
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - linaje
  lexicon: offspring line
  rationale: «Descendencia» comunica la línea familiar de manera natural y digna en español. «Simiente» conserva más el eco bíblico, pero puede sonar arcaica o ambigua.
- source_word: ኢይሤረወ
  english_pob_choice: was not uprooted
  chosen_spanish: no fue arrancada
  alternatives_spanish:
  - no fue desarraigada
  - no fue extirpada
  lexicon: removal metaphor
  rationale: «Arrancada» refleja con fuerza la metáfora de desarraigo/arranque y suena natural en español bíblico. «Desarraigada» es una alternativa muy cercana, pero «arrancada» conserva mejor la imagen verbal.
theological_decisions:
- issue: Frame of divine speech in Jubilees
  english_pob_reading: we said
  chosen_spanish_reading: se le dijo
  alternative_spanish_readings:
  - le dijimos
  - se dijo
  rationale: El aparato inglés registra una tensión entre un pasivo más natural y la voz plural de la tradición de Jubileos. En esta línea, el ge'ez disponible aquí no exige explícitamente la primera persona plural en español, así que se traduce de forma impersonal para no introducir una marca verbal no asegurada por la superficie del texto.
  doctrine_reference: Narrative voice / reported revelation in Jubilees
- issue: Moral consequence and covenant continuity
  english_pob_reading: his seed was established for another tribe and was not uprooted
  chosen_spanish_reading: su descendencia fue establecida para otra tribu y no fue arrancada
  alternative_spanish_readings:
  - su linaje fue establecido para otra tribu y no fue desarraigado
  - su descendencia quedó confirmada para otra tribu y no fue removida
  rationale: Se conserva la continuidad genealógica y la imagen de estabilidad frente al desarraigo. «Establecida» y «arrancada» mantienen el contraste entre fijación y remoción sin introducir interpretaciones adicionales.
  doctrine_reference: Covenant lineage / tribal inheritance
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que añadió «by this» y la tensión textual entre «we said» y el pasivo más natural. Aunque la revisión inglesa suaviza a pasiva, el contexto crítico de Jubileos preserva la voz narrativa de dictado; por ello el español evita introducir una primera persona plural no exigida por el ge'ez visible y mantiene el valor causal inicial.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - «Descendencia» se usa con sentido genealógico/covenantal, no biológico únicamente.
  - «Arrancada» conserva la metáfora de desarraigo sin convertirla en paráfrasis explicativa.
