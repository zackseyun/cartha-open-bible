  yaml_path: translation/extra_canonical/jubilees/041/028.yaml
  text: For he went in the innocence of his eyes and sought judgment, because by the judgment of Abraham, which he commanded his sons, Judah desired that she be burned with fire.
  footnotes:
  - marker: a
    text: Or 'after the desire of his eyes'.
    reason: previous_rendering
  - marker: b
    text: Or 'from the judgment'.
    reason: previous_rendering
  revision_pass:
