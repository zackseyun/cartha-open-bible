    timestamp: '2026-04-23T14:52:35Z'
    unchanged: false
    changes_summary: Changed 'according to the desire of his eyes' to the more natural and idiomatic 'after the desire of his eyes.'
translation:
  language: es
  text: Porque actuó con la inocencia de sus ojos y buscó juicio, pues por el juicio de Abraham, que él ordenó a sus hijos, Judá quiso que ella fuera quemada con fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: የውሀተ
  english_pob_choice: in the innocence of his eyes
  chosen_spanish: en la inocencia de sus ojos
  alternatives_spanish:
  - en la sencillez de sus ojos
  - en la rectitud de sus ojos
  lexicon: innocence / simplicity / uprightness
  rationale: El examen revisado del ge'ez indica el sentido de inocencia o rectitud, no de deseo. En español, 'inocencia de sus ojos' conserva el juicio moral positivo y evita invertir el sentido narrativo.
- source_word: ኵነኔ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - justicia
  lexicon: judgment
  rationale: '''Juicio'' comunica bien el ámbito legal del pasaje y mantiene la relación con el segundo uso de ''juicio'' en la frase. ''Sentencia'' sería más específico, pero menos amplio que el término del texto.'
- source_word: እምፍተሐ
  english_pob_choice: by the judgment
  chosen_spanish: por el juicio
  alternatives_spanish:
  - según el juicio
  - con base en el juicio
  lexicon: from / by the judgment
  rationale: Aunque el ge'ez literalmente usa una preposición de origen, el contexto jurídico exige una relación de base o autoridad. 'Por el juicio' refleja esa función causal/instrumental en español.
- source_word: ይውዐይ
  english_pob_choice: be burned with fire
  chosen_spanish: fuera quemada con fuego
  alternatives_spanish:
  - fuese quemada con fuego
  - sería quemada con fuego
  lexicon: burn with fire
  rationale: La construcción en español mantiene la intención volitiva de Judá y el pasivo de ejecución. 'Fuera quemada' suena más natural en estilo narrativo que una perífrasis más pesada.
theological_decisions:
- issue: Valor moral de la acción de Judá en la versión de Jubileos
  english_pob_reading: Judah desired that she be burned with fire
  chosen_spanish_reading: Judá quiso que ella fuera quemada con fuego
  alternative_spanish_readings:
  - Judá deseó que ella fuera quemada con fuego
  - Judá pidió que ella fuera quemada con fuego
  rationale: La revisión fuente confirma que el pasaje presenta a Judá como actuando con inocencia/rectitud al buscar juicio, no por deseo carnal. Por eso la traducción no debe insinuar lujuria ni suavizar indebidamente su postura judicial.
  doctrine_reference: Énfasis narrativo y moral del libro de Jubileos; coherencia con la revisión lexicográfica del ge'ez
translation_notes:
  revision_awareness: 'La versión inglesa previa fue corregida por revisión fuente: ''after the desire of his eyes'' fue reemplazado por ''in the innocence of his eyes'', y ''from the judgment'' por ''by the judgment''. La traducción española sigue la lectura revisada y evita reproducir la mala lectura anterior.'
  spanish_consistency_notes:
  - Se mantiene 'juicio' en ambas ocurrencias para conservar la cohesión legal del verso.
  - Se evita 'SEÑOR' y otros términos no pertinentes; el verso no contiene el nombre divino.
  - No se añade nota al pie porque no hay alternativa que deba anclarse en el texto tras la revisión del original.
  - El español usa un estilo bíblico claro sin copiar mecánicamente la sintaxis inglesa.
