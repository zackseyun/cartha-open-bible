base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/001.yaml
  text: And Judah saw and rejoiced, and he blessed the God of his fathers, Abraham and Isaac. And he said, "Now I know that I have an eternal hope, and my children also, before the God of all. And thus it is ordained concerning the two of them, and it will be recorded for them as an everlasting testimony in the heavenly tablets, according to how Isaac blessed them."
  footnotes:
  - marker: a
    text: Or 'And Judah rejoiced'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:44Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Y Judá vio y se alegró, y bendijo al Dios de sus padres, Abraham e Isaac. Y dijo: «Ahora sé que tengo una esperanza eterna, y también mis hijos, delante del Dios de todos. Y así está ordenado acerca de los dos, y se escribirá para ellos como un testimonio eterno en las tablas celestiales, conforme a cómo Isaac los bendijo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ወይሁዳሃ፡ ወተፈሥሐ፡
  english_pob_choice: And Judah saw and rejoiced
  chosen_spanish: Y Judá vio y se alegró
  alternatives_spanish:
  - Y Judá se alegró
  - Y Judá vio y se regocijó
  lexicon: ver / alegrarse
  rationale: La revisión del audit trail indica que el sentido base es ‘Judah saw and rejoiced’; por eso conservo ambos verbos. ‘Se alegró’ es una forma natural y digna en español para expresar el rejoicing sin perder el matiz de respuesta gozosa a lo visto.
- source_word: ወባረኮ፡ ለአምላከ፡ አበዊሁ፡
  english_pob_choice: he blessed the God of his fathers
  chosen_spanish: bendijo al Dios de sus padres
  alternatives_spanish:
  - bendijo al Dios de sus padres, Abraham e Isaac
  - bendijo al Dios de sus padres
  lexicon: bendecir / Dios de sus padres
  rationale: ‘Bendijo’ refleja directamente el verbo de bendición. Mantengo ‘Dios de sus padres’ porque el texto especifica la relación ancestral; añado Abraham e Isaac en aposición para hacer explícito quiénes son esos padres en este contexto.
- source_word: አእመርኩ፡ ከመ፡ ብየ፡ ተስፋ፡ ዘለዓለም፡
  english_pob_choice: Now I know that I have an eternal hope
  chosen_spanish: Ahora sé que tengo una esperanza eterna
  alternatives_spanish:
  - Ahora sé que tengo esperanza eterna
  - Ahora sé que poseo una esperanza eterna
  lexicon: saber / esperanza eterna
  rationale: ‘Tengo una esperanza eterna’ transmite con claridad la afirmación confesional del original sin añadir interpretación doctrinal extra. ‘Esperanza eterna’ conserva el adjetivo pospuesto natural en español y el sentido de duración perpetua.
- source_word: ወለውሉድየሂ
  english_pob_choice: and my children also
  chosen_spanish: y también mis hijos
  alternatives_spanish:
  - y mis hijos también
  - y asimismo mis hijos
  lexicon: hijos
  rationale: ‘Hijos’ es la forma más directa y natural en español para ውሉድ en este contexto. ‘También’ conserva la idea de inclusión adicional respecto de la esperanza de Judá.
- source_word: በቅድመ፡ አምላከ፡ ኵሉ።
  english_pob_choice: before the God of all
  chosen_spanish: delante del Dios de todos
  alternatives_spanish:
  - ante el Dios de todos
  - en presencia del Dios de todos
  lexicon: delante de / Dios de todos
  rationale: ‘Delante de’ reproduce la idea espacial/relacional de estar en presencia de Dios; ‘Dios de todos’ mantiene la universalidad del original sin suavizarla.
- source_word: ወያዐርጉ፡ ሎሙ፡ በስምዕ፡ ዘለዓለም፡
  english_pob_choice: it is ordained concerning the two of them, and it will be recorded for them as an everlasting testimony
  chosen_spanish: así está ordenado acerca de los dos, y se escribirá para ellos como un testimonio eterno
  alternatives_spanish:
  - así está decretado acerca de los dos, y se registrará para ellos como un testimonio eterno
  - así ha sido ordenado respecto de ambos, y quedará escrito para ellos como testimonio eterno
  lexicon: ordenado / se escribirá / testimonio eterno
  rationale: ‘Está ordenado’ refleja el carácter decretivo del pasivo; ‘se escribirá’ conserva la imagen de inscripción/registro. ‘Testimonio eterno’ sigue el paralelo semántico del original y del inglés POB.
- source_word: ውስተ፡ ጽላተ፡ ሰማይ፡
  english_pob_choice: in the heavenly tablets
  chosen_spanish: en las tablas celestiales
  alternatives_spanish:
  - en las tablas del cielo
  - en las tablas celestiales del cielo
  lexicon: tablas celestiales
  rationale: ‘Tablas celestiales’ es una traducción fiel y más fluida que un calco literal. Mantiene el elemento técnico propio de Jubileos sin introducir una paráfrasis doctrinal.
theological_decisions:
- issue: La bendición a Abraham e Isaac como ‘Dios de sus padres’ y la formulación de la esperanza eterna
  english_pob_reading: The English keeps the ancestral and eschatological force without doctrinal expansion.
  chosen_spanish_reading: Conservo la bendición al Dios de los padres y la esperanza eterna sin reinterpretarlas.
  alternative_spanish_readings:
  - ‘Dios de sus antepasados’
  - ‘esperanza perpetua’
  rationale: El pasaje une memoria patriarcal y expectativa futura. ‘Padres’ es más cercano al uso bíblico que ‘antepasados’, y ‘eterna’ preserva la duración ilimitada sin cambiar el sentido escatológico.
  doctrine_reference: Patriarcalidad del pacto; esperanza escatológica
- issue: Las ‘tablas celestiales’ como registro decretivo
  english_pob_reading: The heavenly tablets are preserved as a concrete apocalyptic register.
  chosen_spanish_reading: Traduzco ‘tablas celestiales’ de modo literal pero natural.
  alternative_spanish_readings:
  - ‘libros celestiales’
  - ‘registros celestiales’
  rationale: En Jubileos, las tablas celestiales son una noción técnica. Cambiarla por ‘libros’ o ‘registros’ diluiría la imagen apocalíptica propia del libro.
  doctrine_reference: Literatura apocalíptica de Jubileos
translation_notes:
  revision_awareness: La revisión más reciente corrigió el arranque de ‘And Judah rejoiced’ a ‘And Judah saw and rejoiced’ según el Ge’ez/ediciones críticas. En español se refleja esa lectura con ‘vio y se alegró’, evitando una omisión de la acción de ver.
  spanish_consistency_notes:
  - Uso ‘Yahvé’ para el nombre divino cuando aparece el tetragrámaton; aquí no aparece, por lo que mantengo ‘Dios’.
  - Conservo ‘tablas celestiales’ como terminología técnica consistente con Jubileos.
  - Mantengo un registro solemne pero claro, apto para lectura eclesial moderna.
