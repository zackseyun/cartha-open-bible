  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Amigos», «adversarios», «tablas celestiales» y «libro de la vida» son adecuados y coherentes con la racionalidad léxica documentada. «Registrados» funciona bien para el campo semántico de inscripción celestial.
