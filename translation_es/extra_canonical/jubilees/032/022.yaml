    changes_summary: Changed 'write it' to 'record it' for more natural formal English and consistency with later occurrences of the same verb; changed 'from all its ways' to 'in all its ways' for better lexical sense. Left the final clause incomplete to match the extant draft/source segment.
translation:
  language: es
  text: Les está ordenado que lo hagan y sean registrados como amigos[a]. Pero si transgreden y obran en todos sus caminos con inmundicia, serán registrados en las tablas celestiales como adversarios, y serán borrados del libro de la vida y registrados en el libro de los que serán destruidos y con los que
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una traducción inglesa anterior entendía esta frase como «registrarlo como ordenanza», pero la revisión del ge'ez favorece «sean registrados como amigos».
    reason: historial_de_traduccion_corregido
lexical_decisions:
- source_word: ይግበርዋ
  english_pob_choice: they should do it
  chosen_spanish: lo hagan
  alternatives_spanish:
  - lo cumplan
  - lo ejecuten
  lexicon: hacer / cumplir
  rationale: El ge'ez expresa cumplimiento de una acción ya establecida; en español, «lo hagan» conserva la referencia al mandato sin cargar innecesariamente el tono jurídico de «cumplir», que podría sonar más interpretativo en este contexto.
- source_word: ወይጸሐፉ፡ አዕርክተ
  english_pob_choice: be recorded as friends
  chosen_spanish: sean registrados como amigos
  alternatives_spanish:
  - sean escritos como amigos
  - queden anotados como amigos
  lexicon: registrar / escribir
  rationale: La lectura corregida del audit trail exige «amigos» frente al error previo de «ordenanza». «Registrados» mantiene la pasiva de archivo/inscripción y evita una traducción mecánica de «escritos» si suena menos natural en español administrativo-formal.
- source_word: ወይጸሐፉ
  english_pob_choice: shall be recorded
  chosen_spanish: serán registrados
  alternatives_spanish:
  - serán escritos
  - quedarán registrados
  lexicon: registrar / escribir
  rationale: Se mantiene la misma equivalencia verbal para el verbo repetido, siguiendo la revisión inglesa que unificó «recorded». «Serán registrados» es claro y coherente con la imagen de inscripción en tablas y libros.
- source_word: ጽላተ ሰማይ
  english_pob_choice: heavenly tablets
  chosen_spanish: las tablas celestiales
  alternatives_spanish:
  - las tablas del cielo
  - las tablas celestiales del cielo
  lexicon: tabletas / tablas celestiales
  rationale: «Tablas celestiales» conserva el sustantivo técnico del judaísmo apocalíptico y evita una banalización como «tablas del cielo». Aunque «tabletas» sería posible, «tablas» es más natural en español bíblico y suficientemente transparente.
- source_word: ጸላእተ
  english_pob_choice: adversaries
  chosen_spanish: adversarios
  alternatives_spanish:
  - enemigos
  - opositores
  lexicon: adversario
  rationale: La oposición documental entre «amigos» y «adversarios» requiere un par léxico simétrico. «Adversarios» refleja bien la tensión relacional/judicial sin intensificar innecesariamente a «enemigos».
- source_word: መጽሐፈ ሕይወት
  english_pob_choice: book of life
  chosen_spanish: libro de la vida
  alternatives_spanish:
  - libro de vida
  - libro vital
  lexicon: libro de la vida
  rationale: Se conserva la fórmula bíblica asentada en español, que es clara y corresponde al valor técnico del original.
- source_word: ወይጸሐፉ
  english_pob_choice: recorded
  chosen_spanish: registrados
  alternatives_spanish:
  - escritos
  - anotados
  lexicon: registrar / escribir
  rationale: La repetición del verbo de inscripción en distintos libros se traduce de modo uniforme con «registrados», manteniendo el campo semántico de archivo judicial/celestial.
theological_decisions:
- issue: Contraste entre inscritos como amigos y como adversarios
  english_pob_reading: recorded as friends ... recorded on the heavenly tablets as adversaries
  chosen_spanish_reading: registrados como amigos ... registrados en las tablas celestiales como adversarios
  alternative_spanish_readings:
  - anotados como amigos ... anotados como adversarios
  - escritos como amigos ... escritos como adversarios
  rationale: El pasaje establece una antítesis teológica y forense. «Amigos» no debe debilitarse a mera cercanía afectiva; se preserva como categoría relacional/judicial opuesta a «adversarios».
  doctrine_reference: Jubileos 32:22; contraste de pertenencia y juicio en la literatura apocalíptica
translation_notes:
  revision_awareness: 'El audit trail inglés registra una revisión importante: la frase inicial ya no se entiende como «él les mandó que lo escribieran como ordenanza», sino como «está ordenado para ellos que lo hagan y sean registrados como amigos». También se corrigió la relación verbal de inscripción (registrados/escritos) y se preservó el final de la sección tal como queda incompleto en el texto fuente.'
  spanish_consistency_notes:
  - Se mantiene «registrados» para los verbos de inscripción a lo largo del versículo.
  - Se conserva «tablas celestiales» como equivalente técnico de las heavenly tablets.
  - «Amigos» y «adversarios» quedan en contraste simétrico, conforme al ajuste del audit trail.
  - No se introduce «Cristo» ni terminología cristológica; el pasaje pertenece a Jubileos y su léxico es apocalíptico-judicial.
