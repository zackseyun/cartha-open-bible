  text: It is ordained for them that they should do it and be recorded as friends. But if they transgress and act in all its ways with uncleanness, they shall be recorded on the heavenly tablets as adversaries, and they shall be blotted out from the book of life and recorded in the book of those who will be destroyed and with those who
