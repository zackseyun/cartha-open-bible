translation:
  language: es
  text: Se ha decretado, y no se puede guardarlo de este año para el año que viene. Porque en su año la semilla se come hasta los días de la recolección de la semilla del año, y el vino hasta el tiempo de
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ተኀርየ
  english_pob_choice: It has been ordained
  chosen_spanish: Se ha decretado
  alternatives_spanish:
  - Ha sido ordenado
  - Está determinado
  lexicon: decretar / ordenar
  rationale: El ge'ez expresa una acción ya establecida o fijada; en español, 'se ha decretado' conserva el carácter de disposición autorizada sin volverla mecánica.
- source_word: ወአልቦ ለአትርፎ እምኔሁ
  english_pob_choice: there is no keeping it over
  chosen_spanish: no hay para dejarlo
  alternatives_spanish:
  - no se puede guardar
  - no queda sobrante
  lexicon: guardar / dejar / sobrar
  rationale: La idea principal es la imposibilidad de retener o reservar el producto para el ciclo siguiente. 'No hay para dejarlo' mantiene esa fuerza en español natural y evita introducir un matiz de sobra no explicitado.
- source_word: ዓመት
  english_pob_choice: year
  chosen_spanish: año
  alternatives_spanish:
  - tiempo
  - ciclo anual
  lexicon: año
  rationale: El texto habla del marco anual de consumo y cosecha; 'año' es la forma más clara y directa en español.
- source_word: ዘርእ
  english_pob_choice: seed
  chosen_spanish: la semilla
  alternatives_spanish:
  - la simiente
  - la semilla sembrada
  lexicon: semilla
  rationale: '''Semilla'' es la opción más transparente y fiel. ''Simiente'' sería más tradicional pero menos accesible para español general.'
- source_word: ይትበላዕ
  english_pob_choice: is eaten
  chosen_spanish: se come
  alternatives_spanish:
  - es comida
  - se consume
  lexicon: comer / consumir
  rationale: La voz pasiva/reflexiva del ge'ez se vierte bien con una pasiva refleja en español. 'Se come' conserva la acción simple de consumo.
- source_word: ወይን
  english_pob_choice: wine
  chosen_spanish: el vino
  alternatives_spanish:
  - vino
  lexicon: vino
  rationale: La referencia es al vino como producto agrícola. El artículo definido en español fluye naturalmente en la frase.
- source_word: አመ፡
  english_pob_choice: until the time of
  chosen_spanish: hasta el tiempo de
  alternatives_spanish:
  - hasta los días de
  - hasta el momento de
  lexicon: tiempo / días
  rationale: El cierre del verso está truncado en la fuente. 'Hasta el tiempo de' preserva el corte sin inventar el final.
theological_decisions:
- issue: Texto truncado al final de la cita
  english_pob_reading: and wine until the time of
  chosen_spanish_reading: y el vino hasta el tiempo de
  alternative_spanish_readings:
  - y el vino hasta los días de
  - y el vino hasta el momento de
  rationale: La fuente proporcionada termina en medio de la cláusula; por fidelidad textual, la traducción española debe quedar igualmente incompleta sin suplir contenido no atestiguado.
  doctrine_reference: Fidelidad textual y respeto al alcance del testimonio manuscrito
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente que corrige la lectura errónea del inicio: ተኀርየ significa ''se ha decretado'' y ወአልቦ ለአትርፎ እምኔሁ significa que no hay posibilidad de dejarlo/guardarlo para el año siguiente. También se evitó traducir los numerales ge''ez impresos como si fueran parte del texto, y se mantuvo el final truncado porque la fuente termina ahí.'
  spanish_consistency_notes:
  - Se prefirió 'se ha decretado' frente a 'es elegido' porque el contexto de reglamentación agrícola exige un sentido de disposición establecida.
  - Se evitó 'SEÑOR' o terminología doctrinal ajena porque este pasaje no contiene el Tetragrámaton ni una referencia explícita a YHWH.
  - Se mantuvo un registro bíblico sobrio, pero con sintaxis natural para español contemporáneo.
