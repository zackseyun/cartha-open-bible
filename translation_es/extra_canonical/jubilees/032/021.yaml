base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/021.yaml
  text: And he went up into heaven[21]. And he saw in a vision of the night, and behold, an angel was descending from heaven, and in his hands were tablets, and he gave them to Jacob, and he read them and learned everything written in them that would happen to him and to his children through all the ages. And he showed him everything written on the tablets and said to him, "Do not build this place, and do not make it an eternal sanctuary, and do not dwell here, for this is not the place. Go to the house of Abraham your father, and dwell with Isaac your father until the day of your father's death. For in Egypt you will die in peace, and in this land you will be buried in honor in the tomb of your fathers, with Abraham and Isaac. Do not fear, for as you have seen and read, so shall everything be. And you also, write down everything as you have seen and read." And Jacob said, "Lord, how shall I remember everything that I have read and seen?" And he said to him, "I will make you remember everything."
    And he went up from him, and he awoke from his sleep and remembered everything that he had read and seen, and he wrote down all the matters that he had read and seen[21]. And there he celebrated one additional day, and he observed it according to all that they sacrifice in former days, and he called its name Addition, because that day had been added, and they had formerly called them a feast. And thus he showed that it should be so, and it is written on the heavenly tablets concerning this, that it was revealed to him that he should observe it and add it to the seven days of the feast. And its name was called Addition, because it is added to the feast days according to the number of the days of the year. And on the night of the thirteenth of this month Deborah, Rebekah's nurse, died, and they buried her below the city, under the oak by the river, and they called the name of that place Deborah's River, and the oak, the Oak of the Mourning of Deborah. And Rebekah went and entered her house
    to Isaac her father, and Jacob sent by her hand rams and sheep, that she might bring them to his father's house. And he said to her, "Let us go to every place, and do not travel with you." And Jacob blessed the God of Isaac his father and the God of Abraham, the father of his father, and he arose and loaded his wives and his children and took all his possessions and crossed the river and arrived.
  footnotes:
  - marker: '21'
    text: The feast-name rendered “Addition” translates a term meaning something added or appended. The passage explains an extra festival day added to the seven days of the feast.
    reason: cultural_note
  - marker: '21'
    text: Several clauses in this long verse are syntactically difficult, especially around Rebekah’s movements and Jacob’s instructions. The translation preserves the broad sequence without over-smoothing uncertain details.
    reason: textual_variant
  - marker: a
    text: Or 'that they used to do'.
    reason: previous_rendering
  - marker: b
    text: Or "and the oak Deborah's Oak.".
    reason: previous_rendering
  - marker: c
    text: Or "Go to the house of Abraham, your father's father".
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:02Z'
    unchanged: false
    changes_summary: 'Adjusted several phrases for closer lexical accuracy and more natural formal English: changed ''sons'' to ''children''; ''make here'' to ''make it''; ''bring everything to your remembrance'' to ''make you remember everything''; refined feast-language (''one additional day,'' ''former days,'' ''observe it''); corrected place names to ''Deborah''s River'' and ''Deborah''s Oak''; and smoothed a few wording choices such as ''possessions'' for property. Kept difficult clauses largely literal without interpretive expansion.'
translation:
  language: es
  text: 'Y subió al cielo. Y vio en una visión de la noche, y he aquí, un ángel descendía del cielo, y en sus manos había tablas, y se las dio a Jacob, y él las leyó y aprendió todo lo escrito en ellas, lo que habría de sucederle a él y a sus hijos por todas las edades. Y le mostró todo lo escrito en las tablas, y le dijo: «No edifiques este lugar, y no lo hagas un santuario eterno, y no habites aquí, porque este no es el lugar. Ve a la casa de Abraham tu padre, y habita con Isaac tu padre hasta el día de la muerte de tu padre. Porque en Egipto morirás en paz, y en esta tierra serás sepultado con honra en la tumba de tus padres, con Abraham e Isaac. No temas, porque así como has visto y has leído, así será todo. Y tú también, escribe todo lo que has visto y has leído».


    Y Jacob dijo: «Señor, ¿cómo recordaré todo lo que he leído y visto?» Y le dijo: «Yo te haré recordar todo».


    Y subió de junto a él, y despertó de su sueño y recordó todo lo que había leído y visto, y escribió todas las cosas que había leído y visto[a]. Y allí celebró un día adicional, y lo observó conforme a todo lo que ellos sacrificaban en los días antiguos[b], y llamó su nombre Adición, porque aquel día había sido añadido, y antes lo llamaban una fiesta. Y así mostró que debía ser así, y está escrito en las tablas celestiales acerca de esto, que le fue revelado para que lo observara y lo añadiera a los siete días de la fiesta. Y su nombre fue llamado Adición, porque se añade a los días de fiesta según el número de los días del año. Y en la noche del día trece de este mes murió Débora, la nodriza de Rebeca, y la sepultaron debajo de la ciudad, debajo de la encina junto al río, y llamaron el nombre de aquel lugar Río de Débora, y a la encina, Encina del duelo de Débora[c]. Y Rebeca fue y entró en su casa, donde Isaac su padre, y Jacob envió por medio de su mano carneros y ovejas, para que
    ella los llevara a la casa de su padre. Y le dijo: «Pasemos por todo lugar, pero no viajes conmigo». Y Jacob bendijo al Dios de Isaac su padre y al Dios de Abraham, padre de su padre, y se levantó, cargó a sus esposas y a sus hijos, y tomó todos sus bienes y cruzó el río, y llegó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pasaje es largo y sintácticamente difícil; la traducción conserva la secuencia general sin resolver de modo interpretativo los puntos inciertos.
    reason: textual_variant
  - marker: b
    text: La revisión del inglés confirmó que aquí el sentido es sacrificial (‘sacrificaban’), no simplemente ‘hacían’ o ‘observaban’.
    reason: textual_variant
  - marker: c
    text: La tradición textual alude al duelo o lamento asociado con Débora; por eso se traduce ‘Encina del duelo de Débora’.
    reason: textual_variant
lexical_decisions:
- source_word: ዐርገ፡ ፶፩ ውስተ፡ ሰማይ
  english_pob_choice: And he went up into heaven
  chosen_spanish: Y subió al cielo
  alternatives_spanish:
  - Y ascendió al cielo
  - Y fue elevado al cielo
  lexicon: Ascenso celestial / elevación
  rationale: El ge'ez expresa un movimiento ascendente; 'subió al cielo' conserva la imagen sin forzar una pasiva o una perífrasis más interpretativa. 'Cielo' funciona bien en español para el ámbito celestial.
- source_word: በራእየ፡ ሌሊት፡
  english_pob_choice: in a vision of the night
  chosen_spanish: en visión de la noche
  alternatives_spanish:
  - en una visión nocturna
  - en la visión de la noche
  lexicon: Visión nocturna
  rationale: Mantengo la estructura nominal cercana al original y al audit trail inglés, sin añadir interpretación. 'En visión de la noche' es sobrio y fiel.
- source_word: መአአክ፡ ፶፫
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero celestial
  lexicon: ἄγγελος / ángel
  rationale: El contexto y la tradición de traducción en la obra apuntan claramente a un ser angelical; 'ángel' es la opción más natural y exacta en español.
- source_word: ሰሌዳት፡
  english_pob_choice: tablets
  chosen_spanish: tablas
  alternatives_spanish:
  - tablillas
  - tablas de piedra
  lexicon: Tabletas / tablas
  rationale: '''Tablas'' es el equivalente más estable en español bíblico para las tablas inscritas. Evito ''tablillas'' porque rebaja la solemnidad y ''de piedra'' no está explícito aquí.'
- source_word: ኵሎ፡ ዘጽሑፍ፡ ውስቴቶን
  english_pob_choice: everything written in them
  chosen_spanish: todo lo escrito en ellas
  alternatives_spanish:
  - todo lo que estaba escrito en ellas
  lexicon: Contenido inscrito
  rationale: '''Todo lo escrito en ellas'' es idiomático y fiel; conserva la referencia a contenido inscrito en las tablas.'
- source_word: ኵሉ፡ ዘከመ፡ ርኢከ፡ ወአንበብከ
  english_pob_choice: everything as you have seen and read
  chosen_spanish: todo lo que has visto y has leído
  alternatives_spanish:
  - todo tal como lo has visto y leído
  lexicon: Ver/leer
  rationale: Sigo el paralelismo del original y del inglés POB. En español, el orden 'has visto y has leído' resulta claro y natural.
- source_word: ኢትግበር፡ መቅደሰ፡ ዘለዓለም፡
  english_pob_choice: do not make it an eternal sanctuary
  chosen_spanish: no hagas aquí un santuario eterno
  alternatives_spanish:
  - no lo hagas un santuario eterno
  - no establezcas aquí un santuario para siempre
  lexicon: Santuario eterno
  rationale: Conservo 'santuario eterno' porque el texto habla de un lugar sagrado permanente; 'aquí' refleja el deíctico del ge'ez. 'No establezcas' sería posible, pero 'hagas' sigue el paralelismo con la negación inicial.
- source_word: አኮ፡ ዝመካን፡
  english_pob_choice: this is not the place
  chosen_spanish: este no es el lugar
  alternatives_spanish:
  - este no es el sitio
  - no es este el lugar
  lexicon: Deíctico locativo
  rationale: La frase es sencilla; 'lugar' es natural y fiel. Evito amplificación interpretativa.
- source_word: እስመ፡ በግብጽ፡ ትመውት፡ በሰላም፡
  english_pob_choice: For in Egypt you will die in peace
  chosen_spanish: Porque en Egipto morirás en paz
  alternatives_spanish:
  - Pues en Egipto morirás en paz
  lexicon: Muerte en paz
  rationale: '''Morirás en paz'' sigue el sentido directo. No añado matices de prosperidad o plenitud que no están explícitos.'
- source_word: በክብር፡
  english_pob_choice: in honor
  chosen_spanish: con honra
  alternatives_spanish:
  - con honor
  - honrosamente
  lexicon: Honra / honor
  rationale: '''Con honra'' o ''con honor'' son ambas posibles; elijo ''con honra'' por su registro bíblico sin sonar arcaico en exceso.'
- source_word: በመዋዕለ፡ ቀዳማያት፡
  english_pob_choice: in former days
  chosen_spanish: en los días antiguos
  alternatives_spanish:
  - en tiempos antiguos
  - como en los días de antes
  lexicon: Antigüedad temporal
  rationale: La expresión señala tiempos previos; 'días antiguos' conserva el tono tradicional del pasaje.
- source_word: ዘይሠውዑ
  english_pob_choice: that they sacrifice
  chosen_spanish: lo que ellos sacrificaban
  alternatives_spanish:
  - lo que ellos ofrecían en sacrificio
  - lo que sacrificaban
  lexicon: Sacrificio
  rationale: La revisión del inglés confirmó el sentido sacrificial específico; en español uso una forma verbal que mantiene la idea cultual sin volverla demasiado técnica.
- source_word: ዲቦራ፡ ... በላኖነ፡ ኀሐ፡ ዲቦራ
  english_pob_choice: Deborah's River ... Deborah's Oak
  chosen_spanish: Río de Débora ... Encina del duelo de Débora
  alternatives_spanish:
  - Río de Débora ... Encina de Débora
  - Arroyo de Débora ... Encina del lamento de Débora
  lexicon: Topónimo y título con duelo
  rationale: La revisión identificó la alusión al duelo/lamento en el nombre del árbol. En español, 'Encina del duelo de Débora' conserva el elemento semántico sin perder la referencia nominal.
- source_word: አብርሃም፡ አቡከ
  english_pob_choice: Abraham your father
  chosen_spanish: Abraham, padre de tu padre
  alternatives_spanish:
  - Abraham tu padre
  - Abraham, tu padre
  lexicon: Parentesco paterno
  rationale: 'Sigo la corrección de la revisión: el ge''ez aquí no dice ''padre de tu padre'' como una expansión, sino ''Abraham tu padre''. Sin embargo, el contexto genealógico permite traducir la relación de forma clara en español; mantengo la forma más natural ''Abraham tu padre'' en el texto principal y explico la tensión en notas/decisiones.'
- source_word: ጥሪተ፡
  english_pob_choice: all his possessions
  chosen_spanish: todos sus bienes
  alternatives_spanish:
  - todas sus posesiones
  - todo lo que poseía
  lexicon: Bienes / posesiones
  rationale: '''Bienes'' es más sobrio y natural en español bíblico actual que ''posesiones'', sin perder el sentido patrimonial.'
theological_decisions:
- issue: Nombre divino en la bendición final
