  source_alignment_summary: 'El borrador español sigue en general la secuencia y el contenido del ge''ez y del audit trail inglés, incluyendo el ascenso al cielo, la lectura de las tablas, la instrucción de no edificar allí un santuario permanente, la promesa sobre la muerte en Egipto y la sepultura honorable, el día adicional de fiesta y la nota sobre Débora. Sin embargo, hay varios puntos donde el español no preserva con suficiente exactitud la formulación documentada: ''se apartó de él'' debilita el sentido de ascenso en ወዐርገ፡ እምኀቤሁ; ''antes lo llamaban fiesta'' no refleja bien el problemático pero más literal ''they had formerly called them a feast''; el texto principal incluye ''ovejas y cabras'' aunque la revisión inglesa quedó en ''rams and sheep''; y la cláusula ''Y le dijo: «Vayamos a todo lugar, y no viajes contigo»'' necesita un español más legible sin sobreinterpretar. Además, las decisiones léxicas internas contradicen el texto en el caso de Abraham.'
  spanish_quality_summary: 'El español es mayormente legible y de registro digno, pero conserva algunos giros demasiado calcados o confusos: ''en visión de la noche'' suena forzado; ''no hagas aquí un santuario eterno'' podría alinearse mejor con la revisión inglesa; ''se apartó de él'' pierde precisión; ''antes lo llamaban fiesta'' tropieza gramaticalmente; y ''no viajes contigo'' es poco idiomático. También hay una inconsistencia entre el texto y las decisiones léxicas/teológicas, y una nota innecesaria sobre ''subió al cielo'' que no añade información útil.'
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto como Yahvé/Mesías/Espíritu. ''Dios'' está bien. La terminología cultual es en general adecuada: ''tablas'', ''santuario'', ''sepultado con honra'', ''Adición''. Conviene ajustar ''ovejas y cabras'' a ''carneros y ovejas'' para seguir la revisión auditada, y mantener ''subió de junto a él'' para el verbo de ascenso.'
