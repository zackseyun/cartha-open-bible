    text: Or 'from your daughters'.
    reason: previous_rendering
  - marker: b
    text: Or 'above the daughters of the nations.'.
    reason: previous_rendering
  - marker: c
    text: Or 'plague upon plague shall be upon him'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:51Z'
    unchanged: false
    changes_summary: Changed 'who gives herself' to 'whom he gives' to reflect the causative sense of the source, and changed 'upon her' to 'upon him' for consistency with the following masculine verbs referring to the one who does this and closes his eyes.
translation:
  language: es
  text: las hijas de las naciones[b]. Y si hay alguna de sus hijas[a] a quien él entrega a un hombre de cualquiera de las naciones, pues es plaga sobre plaga[c], y maldición sobre maldición; y toda esta plaga y maldición vendrá si hace esto, y si cierra los ojos ante los que practican la inmundicia y ante los que contaminan el santuario de Yahvé[d] y ante los que blasfeman su nombre santo, todo el pueblo juntamente será juzgado por toda la inmundicia y profanación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tus hijas». El geez እምአዋልዲሁ usa el sufijo -hu de 3.ª persona masculino singular; la revisión del 28 de abril corrigió una lectura anterior en 2.ª persona.
    reason: textual_variant
  - marker: b
    text: O «por encima de las hijas de las naciones». Variante de versiones anteriores del POB inglés, rechazada al verificar que el geez አዋልደ፡ አሕዛብ፡ carece de preposición equivalente a «sobre/por encima de».
    reason: alternative_reading
  - marker: c
    text: O «plaga sobre plaga caerá sobre él». Variante anterior que omitía la conjunción causal geez እስመ (ʾesma, «pues/porque») y la cópula ውእቱ (weʾetu, «es»); corregida en revisión del 28 de abril.
    reason: alternative_reading
  - marker: d
    text: Geez እግዚአብሔር (ʾEgziʾabḥer), equivalente litúrgico etíope del nombre divino hebreo יהוה (YHWH) en la tradición de Jubileos; se traduce «Yahvé» conforme a la política transparente del POB, en lugar de la convención enmascaradora «Señor/LORD».
    reason: theological_note
lexical_decisions:
- source_word: አዋልደ፡ አሕዛብ፡ (awalda ʾahzāb)
  english_pob_choice: the daughters of the nations
  chosen_spanish: las hijas de las naciones
  alternatives_spanish:
  - las hijas de los pueblos
  lexicon: 'Dillmann, Lexicon Linguae Aethiopicae: wald/awāled = hijo/hija; ʾahzāb = naciones/pueblos gentiles'
  rationale: Traducción directa del geez. La revisión confirmó que no hay preposición equivalente a 'sobre/por encima de' en el texto fuente; la frase abre el versículo como continuación de una cláusula anterior.
- source_word: እምአዋልዲሁ፡ (em-ʾawālidihu)
  english_pob_choice: from his daughters
  chosen_spanish: de sus hijas
  alternatives_spanish:
  - de tus hijas
  lexicon: 'Dillmann: sufijo pronominal -hu = 3.ª persona masculino singular; ʾawāled = hijos/hijas'
  rationale: El sufijo -hu es inequívocamente 3.ª persona masculino singular. La revisión del 28 de abril corrigió la lectura anterior 'de tus hijas' (2.ª persona) al confirmar que el geez usa -hu y no -ka.
- source_word: ዘወሀቦ፡ (za-wahabo)
  english_pob_choice: whom he gives
  chosen_spanish: a quien él entrega
  alternatives_spanish:
  - que él da
  - a quien entrega
  lexicon: 'Dillmann: wahaba = dar, entregar; za- = pronombre relativo; -bo = sufijo de objeto 3.ª m. sg.'
  rationale: 'La forma verbal wahabo tiene sentido causativo/activo: el sujeto masculino (el padre) entrega a la hija. ''Entrega'' mantiene ese matiz causativo mejor que el simple ''da''.'
- source_word: እስመ… ውእቱ (ʾesma… weʾetu)
  english_pob_choice: for it is
  chosen_spanish: pues es
  alternatives_spanish:
  - porque es
  - ya que es
  lexicon: 'Dillmann: ʾesma = conjunción causal ''pues/porque/ya que''; weʾetu = cópula de 3.ª persona singular ''es/ello es'''
  rationale: La revisión del 28 de abril señaló que borradores anteriores omitían tanto la conjunción causal ʾesma como la cópula weʾetu. 'Pues es' reproduce ambos elementos con naturalidad en español moderno.
- source_word: መቅሠፍት (maqšaft)
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - castigo
  - azote
  - flagelo
  lexicon: 'Dillmann: maqšaft = plaga, castigo, golpe divino; de la raíz qašafa = golpear/flagelar'
  rationale: '''Plaga'' preserva la resonancia con los juicios divinos colectivos (como las plagas de Egipto) que el contexto evoca; ''castigo'' sería demasiado genérico y perdería esa carga apocalíptica.'
- source_word: መርገም (margam)
  english_pob_choice: curse
  chosen_spanish: maldición
  alternatives_spanish:
  - execración
  - anatema
  lexicon: 'Dillmann: margam = maldición, execración; de la raíz ragama = maldecir'
  rationale: '''Maldición'' es el equivalente natural y ampliamente inteligible en español para la noción de un juicio verbal divino que trae consecuencias fatales.'
- source_word: ርኵሰ / ርኵስ (rekuśa / rekuś)
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  - contaminación ritual
  lexicon: 'Dillmann: rekuś = impuro, inmundo; sustantivo rekuśa = impureza/inmundicia; denota impureza ritual y moral'
  rationale: '''Inmundicia'' cubre tanto la impureza ritual como la moral, igual que el geez rekuś. El término se usa coherentemente para el sustantivo en este versículo y al final del mismo.'
- source_word: ያረኵሱ፡ መቅደሶ (yārekuśu maqdaso)
  english_pob_choice: defile the sanctuary
  chosen_spanish: profanan el santuario
  alternatives_spanish:
  - contaminan el santuario
  - mancillan el santuario
  lexicon: 'Dillmann: forma verbal causativa de la raíz rekuś = hacer impuro/contaminar; maqdas = santuario, lugar santo'
  rationale: '''Profanan'' es la opción más idiomática en español para la noción de hacer impuro un lugar sagrado; ''contaminan'' también sería válido pero ''profanar'' tiene uso eclesiástico consolidado para santuarios.'
- source_word: ይጌምኑ፡ ስሞ፡ ቅዱሰ (yegemmenu semo qeduśa)
  english_pob_choice: profane his holy name
  chosen_spanish: blasfeman su nombre santo
  alternatives_spanish:
  - profanan su nombre santo
  - deshonran su nombre santo
  lexicon: 'Dillmann: gammana/ጌምናዝ = acción de profanar, blasfemia; diferente raíz léxica de rekuś; ṡem = nombre; qeduś = santo'
  rationale: 'Geez usa dos raíces distintas: yārekuśu (contaminar/hacer impuro) para el santuario y yegemmenu (profanar/blasfemar) para el nombre divino. En español ''blasfeman'' distingue claramente la acción sobre el nombre sagrado de la contaminación del santuario, preservando la distinción léxica del fuente.'
- source_word: እግዚአብሔር (ʾEgziʾabḥer)
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el SEÑOR
  lexicon: Geez ʾEgziʾabḥer = 'Señor de Señores'; uso litúrgico etíope equivalente al hebreo יהוה (YHWH) en textos del Segundo Templo
  rationale: Jubileos es un pseudepígrafo judío originalmente en hebreo; el geez ʾEgziʾabḥer funciona como equivalente del nombre divino YHWH en la tradición etíope. La política del proyecto POB es usar 'Yahvé' en lugar de convenciones enmascaradoras. El POB inglés usó 'LORD' (convención de enmascaramiento); el español POB lo restituye de manera transparente. Véase nota [d].
- source_word: ይትኬነን (yetkenan)
  english_pob_choice: shall be judged
  chosen_spanish: será juzgado
  alternatives_spanish:
  - recibirá juicio
  - será condenado
  lexicon: 'Dillmann: kanana = juzgar; forma pasiva yetkenan = será juzgado/recibirá sentencia'
  rationale: '''Será juzgado'' reproduce con precisión la voz pasiva del geez; ''condenado'' implicaría ya el veredicto y va más allá del texto fuente.'
- source_word: ኅቡረ (ḥebura)
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - en conjunto
  - todos a una
  - de manera solidaria
  lexicon: 'Dillmann: ḥebura = reunidos, juntos, en conjunto'
  rationale: '''Juntamente'' es claro en español moderno y conserva el sentido de responsabilidad colectiva que el término geez implica; ''en conjunto'' sería igualmente válido.'
- source_word: ግማኔዝ (gammanez)
  english_pob_choice: profanation
  chosen_spanish: profanación
  alternatives_spanish:
  - blasfemia
  - sacrilegio
  lexicon: 'Dillmann: gammanez = profanación, acto de blasfemia; sustantivo de la raíz gammana'
  rationale: '''Profanación'' corresponde a la misma raíz verbal (ይጌምኑ → blasfeman/profanan) usada antes en el versículo, cerrando el par final ''inmundicia y profanación'' de forma coherente.'
theological_decisions:
- issue: 'Nombre divino: geez ʾEgziʾabḥer vs. convención enmascaradora ''SEÑOR/LORD'''
  english_pob_reading: the sanctuary of the LORD
  chosen_spanish_reading: el santuario de Yahvé
  alternative_spanish_readings:
  - el santuario del Señor
  - el santuario del SEÑOR
  rationale: El geez ʾEgziʾabḥer (እግዚአብሔር) es el equivalente litúrgico etíope del tetragrammaton hebreo יהוה (YHWH). Jubileos es un pseudepígrafo judío compuesto originalmente en hebreo; el geez es traducción de esa tradición hebrea. La política del POB es transparente y no usa convenciones de enmascaramiento. El POB inglés usó 'LORD' (mayúsculas como convención heredada de la Biblia de Reina-Valera / KJV); el español POB restituye 'Yahvé', conforme a los parámetros terminológicos del proyecto.
  doctrine_reference: 'POB terminología-proyecto: יהוה/YHWH → ''Yahvé''; geez ʾEgziʾabḥer como equivalente funcional del nombre divino en la tradición etíope del Segundo Templo'
- issue: 'Responsabilidad colectiva por la impureza individual: el pueblo juzgado en conjunto'
  english_pob_reading: all the people together shall be judged for all the uncleanness and profanation
  chosen_spanish_reading: todo el pueblo juntamente será juzgado por toda la inmundicia y profanación
  alternative_spanish_readings:
  - toda la comunidad en conjunto será condenada
  - todo el pueblo recibirá juicio conjunto por la inmundicia y la profanación
  rationale: El texto geez establece que el juicio divino por la impureza cometida por individuos (dar hijas a gentiles, contaminar el santuario, blasfemar el nombre divino) recae sobre 'todo el pueblo juntamente'. Este principio de responsabilidad colectiva es central en la teología de Jubileos y se mantiene sin suavizar; 'será juzgado' (pasivo) preserva la agencia divina implícita del juicio.
  doctrine_reference: 'Jubileos: teología de la separación ritual y responsabilidad comunitaria por la contaminación; cf. contexto de Jubileos 30 sobre la prohibición de matrimonios mixtos'
translation_notes:
  revision_awareness: 'Se aplicaron tres revisiones significativas al POB inglés antes de esta traducción española: (1) «de sus hijas» en lugar de «de tus hijas» —el geez usa el sufijo de 3.ª persona -hu, no el de 2.ª persona— (revisión 28 abr.); (2) eliminación de «por encima de» al inicio, dado que el geez አዋልደ፡ አሕዛብ፡ no incluye preposición equivalente (revisión 28 abr.); (3) «pues es plaga sobre plaga» en lugar de formulaciones anteriores que omitían la conjunción causal ʾesma y la cópula weʾetu (revisión 28 abr.). La traducción española respeta las tres correcciones. La revisión anterior de azure-gpt-5.4 (23 abr.) ajustó ''who gives herself'' → ''whom he gives'' y ''upon her'' → ''upon him'' para reflejar el sentido causativo del geez; el español preserva ese sentido con «a quien él entrega». El estado de la revisión cruzada (''needs_review / major-issues'', acuerdo 0.6) se tuvo en cuenta: los puntos de desacuerdo están resueltos en las tres revisiones aplicadas y se documentan en las
    notas al pie.'
  spanish_consistency_notes:
  - '''Yahvé'' se usa sistemáticamente para el nombre divino (geez ʾEgziʾabḥer como equivalente de YHWH), en coherencia con la política terminológica del proyecto POB.'
  - '''Inmundicia'' traduce coherentemente la raíz geez rekuś/ርኵስ tanto en su uso sustantivo en el interior del versículo como en el par final ''inmundicia y profanación''.'
  - '''Plaga'' y ''maldición'' se usan como par establecido para maqšaft/መቅሠፍት y margam/መርገም; este emparejamiento se mantiene en las cuatro ocurrencias del versículo.'
  - 'Se preserva la distinción léxica entre las dos raíces geez para defilement/profanation: yārekuśu (raíz rekuś) → ''profanan el santuario''; yegemmenu (raíz gammana) → ''blasfeman su nombre santo''.'
  - '''Será juzgado'' (pasivo) preserva la agencia divina implícita del geez yetkenan sin añadir un sujeto explícito que el texto fuente no contiene.'
