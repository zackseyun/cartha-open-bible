revisions:
- from: las hijas de las naciones[b]. Y si hay alguna de sus hijas[a] a quien él entrega a un hombre de cualquiera de las naciones, pues es plaga sobre plaga[c], y maldición sobre maldición; y toda esta plaga y maldición vendrá si hace esto, y si cierra los ojos ante los que practican la inmundicia y ante los que profanan el santuario de Yahvé[d] y ante los que blasfeman su nombre santo, todo el pueblo juntamente será juzgado por toda la inmundicia y profanación.
  to: las hijas de las naciones[b]. Y si hay alguna de sus hijas[a] a quien él entrega a un hombre de cualquiera de las naciones, pues es plaga sobre plaga[c], y maldición sobre maldición; y toda esta plaga y maldición vendrá si hace esto, y si cierra los ojos ante los que practican la inmundicia y ante los que contaminan el santuario de Yahvé[d] y ante los que blasfeman su nombre santo, todo el pueblo juntamente será juzgado por toda la inmundicia y profanación.
  rationale: 'Se ajusta solo un punto del texto principal: «profanan el santuario» pasa a «contaminan el santuario» para reflejar mejor el verbo geez de impurificación ritual y mantener la distinción con «blasfeman su nombre santo» y con el sustantivo final «profanación». El resto del borrador ya preserva adecuadamente el sentido fuente, las revisiones auditadas y la terminología del proyecto.'
