base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/007.yaml
  text: 'Therefore thus it is ordained in Israel concerning the defilement of an Israelite virgin: and if there is a man in Israel who wishes to give his daughter, or even his sister, to any man from the seed of the nations, he shall surely die, and they shall stone him with stones, because he has committed disgrace in Israel; and the woman'
  footnotes:
  - marker: a
    text: Or 'concerning a virgin daughter of Israel who has been defiled'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:47Z'
    unchanged: false
    changes_summary: Added 'virgin' to reflect ድንግል ('virgin'), which was omitted in the draft. Kept the rest unchanged, though the verse appears textually incomplete at the end.
translation:
  language: es
  text: 'Por tanto, así queda establecido en Israel en cuanto a la profanación[a] de una virgen israelita: y si hay algún hombre en Israel que desee dar su hija, o incluso su hermana, a cualquier hombre de la simiente de las naciones,[b] ciertamente morirá, y lo apedrearán con piedras, porque ha cometido deshonra en Israel; y la mujer[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: ''acerca de la hija virgen de Israel que ha sido profanada''. El ge''ez በአርኵሰ usa el sustantivo de acción ''profanación'', no una cláusula de relativo; la segunda revisión del texto inglés adoptó esta versión nominal más literal. La forma adjetival እስራኤላዊት (''israelita'') fue igualmente preferida sobre la paráfrasis ''hija de Israel''.'
    reason: alternative_reading
  - marker: b
    text: El ge'ez አሕዛብ designa a los pueblos no israelitas ('naciones', 'gentiles', 'pueblos'). La construcción ዘርአ፡ አሕዛብ es literalmente 'simiente de las naciones', imagen de linaje con paralelos en la tradición bíblica (cf. Gn 12:3; Jub. 30).
    reason: lexical_alternative
  - marker: c
    text: 'El versículo queda textualmente incompleto en la fuente ge''ez: ወለብእሲትሂ፡ (''y también la mujer...'') inicia una cláusula que continúa en el versículo siguiente. El texto inglés POB preserva esta misma interrupción.'
    reason: textual_variant
lexical_decisions:
- source_word: 'አርኵሰ (Ge''ez: defilement/pollution)'
  english_pob_choice: defilement
  chosen_spanish: profanación
  alternatives_spanish:
  - deshonra
  - contaminación
  - mancillamiento
  lexicon: 'Ge''ez አርኵሰ: sustantivo de acción derivado de la raíz rkws, que designa la contaminación o profanación ritual-moral; cf. glosario Charles 1895, p. 190.'
  rationale: El Ge'ez usa el sustantivo 'profanación' (no una cláusula de relativo), tal como confirmó la segunda revisión inglesa. 'Profanación' abarca tanto la dimensión ritual-cultual como la moral. 'Deshonra' privilegia lo social; 'contaminación' suena demasiado clínico para un texto legal-sagrado.
- source_word: 'ድንግል (Ge''ez: virgin)'
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  lexicon: 'Ge''ez ድንግል: virgen, mujer no casada; término estándar en ge''ez y en las traducciones bíblicas.'
  rationale: '''Virgen'' es el equivalente directo y preciso. ''Doncella'' connota juventud sin la fuerza específica de integridad sexual que porta ድንግል.'
- source_word: 'እስራኤላዊት (Ge''ez: Israelite, adj. fem.)'
  english_pob_choice: Israelite
  chosen_spanish: israelita
  alternatives_spanish:
  - hija de Israel
  lexicon: 'Ge''ez እስራኤላዊት: adjetivo gentilicio femenino, ''israelita''.'
  rationale: La segunda revisión inglesa eligió la forma adjetival 'Israelite' sobre la más dinámica 'daughter of Israel', reflejando el adjetivo ge'ez real. El español 'israelita' reproduce esto con exactitud.
- source_word: 'ዘርአ፡ አሕዛብ (Ge''ez: seed of the nations)'
  english_pob_choice: seed of the nations
  chosen_spanish: simiente de las naciones
  alternatives_spanish:
  - linaje de las naciones
  - descendencia de los gentiles
  - semilla de los pueblos
  lexicon: 'Ge''ez ዘርአ: semilla, descendencia; አሕዛብ: naciones, pueblos no israelitas (gentiles).'
  rationale: '''Simiente de las naciones'' preserva la imagen semi-técnica de linaje presente en el ge''ez y coherente con el enfoque de equivalencia óptima del POB. ''Linaje'' es más dinámico; ''gentiles'' añadiría interpretación.'
- source_word: 'ሞተ፡ ለይሙት (Ge''ez: infinitivo cognado enfático – ''muerte morirá'')'
  english_pob_choice: he shall surely die
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - de cierto morirá
  - morirá sin remedio
  - ha de morir
  lexicon: 'Ge''ez construcción de infinitivo cognado: ሞተ (muerte) + ለይሙት (morirá), para expresar énfasis; paralelo al hebreo מוֹת יוּמַת.'
  rationale: '''Ciertamente morirá'' transmite la fuerza enfática del infinitivo cognado ge''ez sin calco imposible en español (*''muerte morirá''). El adverbio ''ciertamente'' es la solución estándar en traducciones bíblicas iberoamericanas.'
- source_word: 'ኀፍረተ (Ge''ez: shame/disgrace)'
  english_pob_choice: disgrace
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - ignominia
  - escándalo
  lexicon: 'Ge''ez ኀፍረተ: vergüenza, deshonra, ignominia; connotación social y moral.'
  rationale: '''Deshonra'' captura tanto la dimensión moral como la social-honorífica de ኀፍረተ. El inglés eligió ''disgrace''; ''deshonra'' es su equivalente más cercano en español bíblico. ''Vergüenza'' es más subjetivo-emocional; ''ignominia'' resulta excesivamente arcaico.'
theological_decisions:
- issue: Naturaleza de la unión prohibida y severidad de la pena
  english_pob_reading: giving his daughter, or even his sister, to any man from the seed of the nations — he shall surely die, and they shall stone him with stones
  chosen_spanish_reading: dar su hija, o incluso su hermana, a cualquier hombre de la simiente de las naciones — ciertamente morirá, y lo apedrearán con piedras
  alternative_spanish_readings:
  - entregar su hija o su hermana a un hombre de entre los gentiles — será condenado a muerte y apedreado
  rationale: Jubileos 32:7 refleja la prohibición absoluta de exogamia característica del libro de los Jubileos (cf. Jub. 30:7-17), donde dar a una mujer israelita a un no israelita constituye delito capital. La prescripción se preserva íntegramente sin suavizarla. La pena de lapidación ('lo apedrearán con piedras') reproduce la redundancia presente en el ge'ez ወበእብን፡ ይውግሮዎ, que el POB inglés mantuvo literalmente.
  doctrine_reference: Jubileos 30:7–17; cf. Dt 7:3; Esd 10; Neh 13:23-27
translation_notes:
  revision_awareness: 'La traducción inglesa sufrió dos revisiones documentadas antes de la versión final: (1) la primera añadió ''virgen'' para reflejar el ge''ez ድንግል, que había sido omitido en el borrador inicial; (2) la segunda reencuadró la frase inicial de ''una hija virgen de Israel que ha sido profanada'' (cláusula de relativo dinámica) a ''la profanación de una virgen israelita'' (sustantivo + adjetivo), preservando más fielmente el sustantivo ge''ez አርኵሰ y el adjetivo እስራኤላዊት. La versión española sigue la forma revisada final en ambos puntos; la alternativa más dinámica queda registrada en la nota [a].'
  spanish_consistency_notes:
  - Este versículo no contiene ningún teónimo (YHWH/Yahvé, Dios) ni término cristológico; los valores terminológicos de proyecto no aplican aquí.
  - '''Israelita'' se usa como adjetivo sustantivado en género femenino, consistente con el adjetivo ge''ez እስራኤላዊት y con la práctica del POB inglés.'
  - El versículo queda incompleto tanto en el ge'ez como en el POB inglés; la nota [c] lo señala explícitamente para el lector de la edición española.
  - La redundancia 'apedrearán con piedras' (ወበእብን፡ ይውግሮዎ) se preserva deliberadamente en español para reflejar el énfasis del texto fuente, coherente con el enfoque de equivalencia óptima.
  - '''Simiente de las naciones'' mantiene la imagen de linaje seminal presente en el ge''ez, en coherencia con el uso del término en otros pasajes de Jubileos traducidos por el POB.'
