base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/016.yaml
  text: The LORD will put it in their mouths, that they may bless all the seed of the beloved. Your mother called you Levi, and in truth she called you so that you would be joined to God and be a companion to all the sons of Jacob. Let his table be yours, and you and your sons shall eat, and for all.
  footnotes:
  - marker: a
    text: Or 'For he has called you from among them, like Levi, and in truth he has called you'.
    reason: previous_rendering
  - marker: b
    text: Or 'to draw near to the LORD, that you may be his, and that all the sons of Jacob may eat at your table'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:52Z'
    unchanged: false
    changes_summary: Added 'it' for natural English after 'put'; changed 'He' to 'For he' to reflect the connective; changed 'as Levi' to 'like Levi' for smoother formal English; added commas for readability. Retained the final incomplete phrase 'and for all' to preserve the source rather than paraphrase.
translation:
  language: es
  text: Yahvé pondrá en sus bocas que bendigan a toda la descendencia del amado. Tu madre te llamó Leví, y en verdad te llamó así para que quedaras unido a Dios y fueras compañero de todos los hijos de Jacob. Que su mesa sea la tuya, y tú y tus hijos comerán, y para todos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Yahvé / LORD
  english_pob_choice: The LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: יהוה
  rationale: La norma del proyecto exige renderizar el nombre divino como «Yahvé» y no enmascararlo como «SEÑOR». La frase ge'ez corresponde al agente divino que pone las palabras en la boca.
- source_word: put it in their mouths
  english_pob_choice: put it in their mouths
  chosen_spanish: pondrá eso en sus bocas
  alternatives_spanish:
  - pondrá en sus bocas
  - pondrá esto en sus bocas
  lexicon: None (source phrase)
  rationale: «Eso» evita un objeto tácito demasiado desnudo en español y mantiene la referencia al contenido previamente implícito sin añadir paráfrasis.
- source_word: bless
  english_pob_choice: bless
  chosen_spanish: bendigan
  alternatives_spanish:
  - alaben
  - bendecirán
  lexicon: ברך
  rationale: «Bendigan» conserva el valor verbal directo y litúrgicamente comprensible del verbo sin desplazarlo a una interpretación más libre.
- source_word: seed
  english_pob_choice: seed
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - linaje
  lexicon: זרע
  rationale: «Descendencia» es la opción más natural y fiel en español bíblico contemporáneo para la línea familiar prometida.
- source_word: beloved
  english_pob_choice: the beloved
  chosen_spanish: el amado
  alternatives_spanish:
  - el amado de Dios
  - el querido
  lexicon: de context, πιθανώς Jacob/Israel
  rationale: El texto auditado conserva «the beloved» como título; «el amado» mantiene la ambigüedad sin resolverla indebidamente.
- source_word: Your mother called you Levi
  english_pob_choice: Your mother called you Levi
  chosen_spanish: Tu madre te llamó Leví
  alternatives_spanish:
  - Tu madre te nombró Leví
  - Leví te llamó tu madre
  lexicon: Levi / לוי
  rationale: 'La revisión del audit trail corrige la mistraducción anterior: el sujeto es la madre que nombra a Leví, no un llamado «de entre ellos».'
- source_word: in truth she called you so
  english_pob_choice: and in truth she called you so
  chosen_spanish: y en verdad te llamó así
  alternatives_spanish:
  - y de verdad te llamó así
  - y con verdad te llamó así
  lexicon: אמת / source connective
  rationale: «En verdad» reproduce la afirmación enfática sin sobreexplicar; «así» retoma el nombre/nombreo anterior en español natural.
- source_word: joined to God
  english_pob_choice: to draw near to the LORD, that you may be his
  chosen_spanish: para que fueras unido a Dios
  alternatives_spanish:
  - para acercarte a Yahvé
  - para que te unieras a Dios
  lexicon: אצק / etymological play on Levi
  rationale: La revisión señala el juego etimológico con Leví («unido/juntado»). «Unido a Dios» preserva ese forcejo semántico sin convertirlo en una paráfrasis devocional.
- source_word: companion / partner
  english_pob_choice: and be a companion to all the sons of Jacob
  chosen_spanish: compañero de todos los hijos de Jacob
  alternatives_spanish:
  - asociado a todos los hijos de Jacob
  - partícipe con todos los hijos de Jacob
  lexicon: וְסוּתָפֵי / partner, companion
  rationale: «Compañero» recoge la idea de asociación o compañerismo señalada en el audit trail sin perder claridad.
- source_word: Let his table be yours
  english_pob_choice: Let his table be yours
  chosen_spanish: Su mesa será tu mesa
  alternatives_spanish:
  - Que su mesa sea la tuya
  - Su mesa sea la tuya
  lexicon: מַאֲדָה / table
  rationale: La cláusula debe distinguirse de la anterior; el audit trail corrigió la lectura que la confundía con «comer en tu mesa». La frase española conserva la cesión de la mesa.
- source_word: you and your sons shall eat
  english_pob_choice: you and your sons shall eat
  chosen_spanish: tú y tus hijos comerán
  alternatives_spanish:
  - tú y tus hijos comeréis
  - tú y tus hijos comerán de ella
  lexicon: None (source phrase)
  rationale: Se conserva la promesa de comer; la concordancia de persona en español puede sonar estilísticamente tensa, pero se mantiene cercana al valor del original.
theological_decisions:
- issue: Nombre divino explícito
  english_pob_reading: The LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: La línea editorial del proyecto exige el nombre divino recuperado explícitamente. No se usa la convención de sustitución tipográfica.
  doctrine_reference: Terminología del proyecto sobre יהוה / YHWH
- issue: Identidad del amado
  english_pob_reading: the beloved
  chosen_spanish_reading: el amado
  alternative_spanish_readings:
  - el amado de Dios
  - Jacob
  rationale: No hay suficiente apoyo en este fragmento para identificar dogmáticamente al amado; la traducción conserva la ambigüedad textual.
  doctrine_reference: Principio de no sobreespecificación textual
- issue: Juego etimológico de Leví
  english_pob_reading: called you Levi ... joined to God
  chosen_spanish_reading: te llamó Leví ... fueras unido a Dios
  alternative_spanish_readings:
  - para que te acercaras a Yahvé
  - para que fueras de él
  rationale: La revisión indica que el texto explota la relación entre el nombre Leví y la idea de unión/juntura. Se preserva en español con «unido» para no borrar la tensión lexical.
  doctrine_reference: Tensión lexical y etimológica preservada
- issue: Mesa compartida y promesa familiar
  english_pob_reading: Let his table be yours, and you and your sons shall eat, and for all.
  chosen_spanish_reading: Su mesa será tu mesa, y tú y tus hijos comerán, y para todos.
  alternative_spanish_readings:
  - Que su mesa sea tuya, y tú y tus hijos comerán, y para todos.
  - Su mesa será para ti, y tú y tus hijos comerán, y para todos.
  rationale: Se respeta el carácter algo fragmentario de la clausura final («and for all») sin normalizarla de más. La fórmula mantiene la incompletitud del remate.
  doctrine_reference: Principio de preservar la forma textual cuando la fuente es elíptica
translation_notes:
  revision_awareness: La redacción corrige la mistraducción previa que convertía el llamado de la madre a Leví en un llamado «de entre ellos» y que fusionaba indebidamente la cláusula sobre la mesa con la de comer. También conserva la conectiva final fragmentaria («y para todos») en lugar de completarla interpretativamente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino, conforme a la norma del proyecto.
  - Se mantiene «Leví» como nombre propio y «unido» para reflejar el juego etimológico señalado por la revisión.
  - Se conserva «descendencia» para זרע y «bendigan» para el verbo de bendición, con registro bíblico claro pero no arcaizante.
  - La clausula final queda deliberadamente abierta para respetar la elipsis del original.
