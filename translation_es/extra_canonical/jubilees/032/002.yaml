base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/002.yaml
  text: And Jacob rose early in the morning on the fourteenth of this month, and he gave a tenth of everything that had come with him, from people to cattle, from gold to all possessions; and he brought it and gave a tenth of everything.
  footnotes:
  - marker: a
    text: Or 'and he took'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:44Z'
    unchanged: false
    changes_summary: Changed 'from everything' to 'of everything' for more natural English, and revised 'tithed' to 'gave a tenth' for clearer formal register and consistency with the earlier phrase.
translation:
  language: es
  text: 'Y Jacob se levantó muy de mañana, el día catorce de este mes, y dio la décima parte de todo lo que había traído consigo: desde personas hasta el ganado, desde oro hasta todas las posesiones; y lo trajo[a] y dio la décima parte de todo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez revisado favorece 'lo trajo' o 'lo ofreció' más que 'lo tomó'.
    reason: textual_variant
lexical_decisions:
- source_word: ዐሡሩ / gave a tenth
  english_pob_choice: gave a tenth
  chosen_spanish: dio la décima parte
  alternatives_spanish:
  - diezmó
  - pagó el diezmo
  - dio el diezmo
  lexicon: diezma / diezmo
  rationale: La fuente expresa una acción verbal concreta de apartar la décima parte; en español, 'dio la décima parte' mantiene la literalidad y evita cargar el texto con el sustantivo eclesiástico 'diezmo' cuando el contexto es narrativo y descriptivo.
- source_word: ወአብአ
  english_pob_choice: and he brought it
  chosen_spanish: y lo llevó
  alternatives_spanish:
  - y lo trajo
  - y lo introdujo
  - y lo presentó
  lexicon: llevar / traer / presentar
  rationale: El audit trail inglés fue corregido de 'took' a 'brought it', lo que apunta a un movimiento de llevar/ofrecer. 'Lo llevó' conserva esa dirección sin sobretraducir con un término cultual que la línea ge'ez no exige de forma explícita.
- source_word: እምኵሉ / everything
  english_pob_choice: everything
  chosen_spanish: de todo
  alternatives_spanish:
  - de todo ello
  - de todas las cosas
  - de cada cosa
  lexicon: todo
  rationale: La construcción 'dio la décima parte de todo' en español es natural y reproduce bien la totalidad absoluta del original y del inglés auditado.
- source_word: እምሰብእ እስከ እንስሳ
  english_pob_choice: from people to cattle
  chosen_spanish: de personas hasta ganado
  alternatives_spanish:
  - desde personas hasta ganado
  - de hombres hasta animales
  - desde la gente hasta el ganado
  lexicon: persona / ganado
  rationale: El rango inclusivo del ge'ez se expresa mejor con 'de... hasta...', fórmula clara y idiomática en español, preservando el contraste entre seres humanos y animales domésticos.
- source_word: ወርቅ እስከ ኵሉ ንዋይ
  english_pob_choice: from gold to all possessions
  chosen_spanish: de oro hasta todas las posesiones
  alternatives_spanish:
  - desde oro hasta todas las posesiones
  - de oro hasta todo bien
  - de oro hasta todas sus posesiones
  lexicon: oro / posesiones
  rationale: '''Oro'' y ''posesiones'' siguen el inventario material del texto sin añadir matices interpretativos. Se evita ''bienes'' porque ''posesiones'' refleja más directamente la amplitud del listado.'
- source_word: rose early in the morning
  english_pob_choice: rose early in the morning
  chosen_spanish: se levantó temprano por la mañana
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó muy de mañana
  - se alzó temprano por la mañana
  lexicon: levantarse temprano
  rationale: La expresión es una equivalencia natural y fiel en español contemporáneo, sin perder la prontitud temporal del original.
theological_decisions:
- issue: ¿La acción final es simplemente llevar la ofrenda o implica una presentación cultual más fuerte?
  english_pob_reading: and he brought it and gave a tenth of everything
  chosen_spanish_reading: y lo llevó y dio la décima parte de todo
  alternative_spanish_readings:
  - y lo presentó y dio la décima parte de todo
  - y lo ofreció y dio la décima parte de todo
  rationale: El ge'ez admitido por la revisión indica 'brought in / offered', pero el contexto inmediato del versículo ya dice que Jacob dio la décima parte; por eso se mantiene una formulación suficientemente abierta. 'Llevar' conserva la idea de transportar/introducir sin afirmar más de lo que el texto obliga.
  doctrine_reference: Narrativa de Génesis/Jubileos sobre ofrendas y diezmos; no se formula una doctrina adicional sobre el culto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió el sentido de ወአብአ desde 'took' a 'brought it', y se evitó depender mecánicamente de la redacción inglesa previa. También se consideró que el inglés auditado prefiere 'gave a tenth' en lugar de 'tithed', lo que favorece una formulación española descriptiva y no eclesiástica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque aparezca en este versículo, sino porque el proyecto POB lo exige para el nombre divino cuando corresponda; aquí no se inserta artificialmente.
  - Se usa un registro bíblico claro y sobrio, sin arcaísmos innecesarios.
  - '''Décima parte'' se conserva con uniformidad para evitar oscilar entre verbo técnico (''diezmar'') y perífrasis más neutral.'
