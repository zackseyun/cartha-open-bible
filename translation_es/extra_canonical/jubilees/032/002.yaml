  rationale: Se ajusta el español para mayor naturalidad y para reflejar con más precisión el verbo ge'ez ወአብአ según la revisión inglesa documentada. Se elimina una nota no necesaria y se conserva solo la nota que sí explica una decisión textual significativa.
