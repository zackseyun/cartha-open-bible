base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/011.yaml
  text: Their kingdoms were Karnaim and Ashtaroth and Edrei and Misur and Beon. And the LORD destroyed them for their evil deeds, because they were very wicked, and he caused the Amorites to dwell in their place, evil and sinful, and there is no people today that has completed all their sins, and they are no more.
  footnotes:
  - marker: a
    text: Or 'judged them'.
    reason: previous_rendering
  - marker: b
    text: Or 'fully completed their sins as they did'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:49Z'
    unchanged: false
    changes_summary: Adjusted 'according to' to 'for' for more natural judgment language; changed 'that has completed the full measure of their sins' to 'that has fully completed their sins' to avoid interpretive expansion; revised the final clause from 'they have no longer any' to the complete and natural 'they are no more.'
translation:
  language: es
  text: Sus reinos eran Carnaim, Astarot, Edrei, Misur y Beón. Yahvé los destruyó[a] por sus malas obras, porque eran muy perversos, e hizo habitar a los amorreos en su lugar, perversos y pecadores, y no hay hoy pueblo que haya completado todos sus pecados[b], y ellos ya no existen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arruinó»; el verbo ge'ez aquí expresa destrucción, no juicio en sentido jurídico.
    reason: lexical_alternative
  - marker: b
    text: El ge'ez dice literalmente «que haya completado todos sus pecados»; la formulación evita ampliar el sentido a «la plenitud» o «la medida plena», según la corrección del audit trail inglés.
    reason: source_note
lexical_decisions:
- source_word: መንግሥቶሙ
  english_pob_choice: Their kingdoms
  chosen_spanish: Sus reinos
  alternatives_spanish:
  - Sus dominios
  - Sus reinos
  lexicon: reino
  rationale: El sentido es posesivo y político; «reinos» conserva la referencia a entidades gobernadas sin añadir matices no presentes.
- source_word: አሕጐሎ
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - arruinó
  - aniquiló
  lexicon: destruir
  rationale: El texto ge'ez requiere destrucción/ruina, no juicio. «Destruyó» es directo y fiel, y evita el error corregido en el audit trail inglés.
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: Yahvé
  rationale: Conforme al estándar del proyecto, se usa el nombre divino explícito en lugar de una máscara reverencial.
- source_word: እምእኩይ ምግባሮሙ
  english_pob_choice: for their evil deeds
  chosen_spanish: por sus obras malas
  alternatives_spanish:
  - por sus malas obras
  - por sus hechos malvados
  lexicon: obra mala
  rationale: «Obras malas» reproduce bien la expresión causal sin endurecer innecesariamente el registro; mantiene la relación de retribución/causa del hebreo-ge'ez.
- source_word: ጸዋጋን ጥቀ
  english_pob_choice: very wicked
  chosen_spanish: muy perversos
  alternatives_spanish:
  - muy impíos
  - sumamente malvados
  lexicon: perverso
  rationale: «Perversos» comunica una maldad moral intensa y se ajusta al paralelo con «pecadores» que sigue.
- source_word: አኅደረ ... ህየንቴሆሙ
  english_pob_choice: he caused ... to dwell in their place
  chosen_spanish: hizo habitar ... en su lugar
  alternatives_spanish:
  - hizo morar ... en su lugar
  - los estableció ... en su lugar
  lexicon: habitar
  rationale: Refleja la causación de asentamiento territorial sin desplazar el sujeto divino.
- source_word: እኩየ ወኃጥአ
  english_pob_choice: evil and sinful
  chosen_spanish: perversos y pecadores
  alternatives_spanish:
  - malos y pecadores
  - malvados y pecadores
  lexicon: pecador
  rationale: El binomio conserva el doble calificativo moral del original, con «pecadores» para el término de transgresión concreta.
- source_word: ዘፈጸመ ኀጣውኢሆሙ ኵሎ
  english_pob_choice: that has completed all their sins
  chosen_spanish: que haya completado todos sus pecados
  alternatives_spanish:
  - que haya completado sus pecados por completo
  - que haya llenado todos sus pecados
  lexicon: completar
  rationale: 'Se sigue de cerca la corrección del audit trail: el ge''ez dice «todos», y el español debe conservar esa totalidad sin expandirla a «medida» u otras paráfrasis.'
- source_word: አልቦሙ
  english_pob_choice: they are no more
  chosen_spanish: ya no existen
  alternatives_spanish:
  - ya no son
  - no existen ya
  lexicon: existir
  rationale: «Ya no existen» transmite la extinción del pueblo en español natural y mantiene el cierre absoluto del verso.
theological_decisions:
- issue: Nombre divino en un juicio histórico
  english_pob_reading: the LORD destroyed them
  chosen_spanish_reading: Yahvé los destruyó
  alternative_spanish_readings:
  - el Señor los destruyó
  - Yahvé los arruinó
  rationale: Se preserva el nombre divino explícito según la norma del proyecto, y el verbo de destrucción evita suavizar el acto judicial-histórico del texto.
  doctrine_reference: Uso reverente y transliterado del Tetragrámaton en el texto principal
- issue: Relación entre pecado y juicio
  english_pob_reading: for their evil deeds, because they were very wicked
  chosen_spanish_reading: por sus obras malas, porque eran muy perversos
  alternative_spanish_readings:
  - a causa de sus malas obras, porque eran muy perversos
  rationale: La doble expresión conserva causa y caracterización moral sin fusionarlas; el texto presenta destrucción como respuesta a la maldad persistente.
  doctrine_reference: Retribución moral en la literatura de Jubileos
- issue: Universalización negativa sobre la humanidad
  english_pob_reading: there is no people today that has completed all their sins
  chosen_spanish_reading: no hay hoy pueblo que haya completado todos sus pecados
  alternative_spanish_readings:
  - no existe hoy pueblo que haya completado todos sus pecados
  rationale: La formulación mantiene el alcance universal del dicho sin sobre-interpretar si se trata de comparación o hiperbole literaria.
  doctrine_reference: Hipérbole sapiencial e histórica en literatura parabíblica
translation_notes:
  revision_awareness: Se siguió el estado revisado del audit trail inglés que corrige 'judged them' a 'destroyed them' y conserva 'completed all their sins' con 'they are no more' como cierre natural. La redacción española se ajusta a esas correcciones y evita la expansión interpretativa previa sobre 'full measure'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con el estándar del proyecto para el nombre divino.
  - Se usa «pecadores» para conservar la fuerza moral del binomio con «perversos».
  - Se evita «SEÑOR» como máscara y se evita «Cristo» porque no aparece en el pasaje.
  - La puntuación separa la enumeración de topónimos con comas, como en español editorial estándar.
