revisions:
- from: 'Con gozo. Y Jacob puso a sus dos hijos, uno a su mano derecha y otro a su izquierda, y le fue contado por justicia. Y Jacob contó todo a su padre en la noche, cómo Yahvé había tratado con él con gran misericordia y cómo le había prosperado en todo su camino y lo había guardado de todo mal. E Isaac bendijo al Dios de su padre Abraham, que no había retenido la misericordia y la justicia del hijo de su siervo Isaac. Y por la mañana Jacob contó a su padre Isaac la oración que había orado a Yahvé, y la visión que había visto, y cómo había edificado un altar, y todo lo que estaba preparado para sacrificio para ofrecer delante de Yahvé conforme a cómo había orado, y cómo había venido para llevarlo sobre un asno. Y Isaac dijo a Jacob: «Hijo mío, no puedo ir contigo, porque soy viejo y no puedo soportar el viaje. Ve, hijo mío, en paz, porque hoy tengo ciento sesenta y cinco años. Ya no puedo soportar la carga del camino; pon a tu madre sobre una bestia y que vaya contigo. Y sé, hijo mío,
    que por causa mía viniste, y este día es bendito, en el cual me has visto vivo y yo también te he visto a ti, hijo mío. Prospera y cumple la oración que has orado, y no tardes tu oración, porque es buscada; y ahora hazla pronto, y que el que ha hecho todas las cosas dé éxito a la oración por la cual has orado».[a] Y él dijo a Rebeca: «Ve con Jacob, tu hijo».[b] Y Rebeca fue con Jacob, su hijo, y Débora estaba con ella, y llegaron a Betel. Y Jacob recordó la oración con que su padre lo había bendecido, y a sus dos hijos, Leví y Judá, y se alegró y bendijo al Dios de sus padres, Abraham e Isaac. Y dijo: «Ahora sé que tengo esperanza eterna, y también mis hijos, delante del Dios de todos. Y así está ordenado respecto de los dos, y para ellos será levantado como testimonio perpetuo en las tablas celestiales, conforme a cómo Isaac los bendijo». Y pasó aquella noche en Betel, y Leví soñó que lo habían nombrado y ordenado sacerdote del Dios Altísimo, a él y a sus hijos para siempre. Y despertó
    de su sueño y bendijo a Yahvé. Y Jacob se levantó de mañana, el día catorce de este mes, y dio el diezmo de todo lo que había venido con él, desde personas hasta ganado, desde oro hasta toda posesión, y tomó el diezmo de todo. Y en aquellos días Raquel concibió a Benjamín, y Jacob contó a sus hijos, y Leví subió en la porción de Yahvé, y su padre lo vistió con vestiduras sacerdotales y llenó sus manos. Y el día quince de este mes llevó al altar, como sacrificios del ganado, catorce bueyes, dieciocho carneros, cuarenta y nueve ovejas, siete corderos y veintiún cabritos.'
