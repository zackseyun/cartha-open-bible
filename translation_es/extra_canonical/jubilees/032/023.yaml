base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/023.yaml
  text: in joy. And Jacob arranged his two sons[23], one on his right hand and one on his left, and it was counted to him as righteousness. And Jacob told everything to his father in the night, how the LORD had dealt with him in great mercy and how he had prospered all his way and protected him from all evil. And Isaac blessed the God of his father Abraham, who had not withheld mercy and righteousness from the son of his servant Isaac. And in the morning Jacob told his father Isaac the prayer that he had prayed to the LORD, and the vision that he had seen, and how he had built an altar, and all that was prepared for sacrifice to offer before the LORD according to how he had prayed, and how he had come to carry him on a donkey. And Isaac said to Jacob, "My son, I am not able to come with you, for I am old and not able to endure the journey. Go, my son, in peace, for I am one hundred and sixty-five years old today. I am no longer able to travel; set your mother on a beast and let her go with
    you. And I know, my son, that you came on my account, and this day is blessed, on which you have seen me alive and I also have seen you, my son. Prosper and perform the prayer that you have prayed, and do not delay your prayer, for it is sought out, and now quickly do it, and may he who has done everything grant success to the prayer for which you have prayed." And he said to Rebekah, "Go with Jacob your son." And Rebekah went with Jacob her son, and Deborah was with her, and they came to Bethel. And Jacob remembered the prayer with which his father had blessed him, and his two sons, Levi and Judah, and he rejoiced and blessed the God of his fathers, Abraham and Isaac. And he said, "Now I know that I have an eternal hope, and my children also, before the God of all. And thus it is ordained concerning the two of them, and it will be raised for them as an everlasting testimony in the heavenly tablets, according to how Isaac blessed them." And he stayed that night in Bethel, and Levi dreamed
    that they had appointed and ordained him priest of the Most High God, him and his sons forever. And he awoke from his sleep and blessed the LORD. And Jacob rose early in the morning on the fourteenth of this month, and he gave a tenth from everything that had come with him, from people to cattle, from gold to all possessions, and he took and tithed from everything. And in those days Rachel became pregnant with Benjamin, and Jacob counted his sons, and Levi came up in the LORD’s portion, and his father clothed him with priestly garments and filled his hands. And on the fifteenth of this month he brought to the altar as sacrifices from the cattle fourteen oxen and eighteen rams and forty-nine sheep and seven lambs and twenty-one kids.
  footnotes:
  - marker: '23'
    text: The source row repeats material from the opening of the chapter and then continues into Rachel’s childbirth narrative. The translation treats the repeated section as part of the chapter’s transmitted text while preserving the final birth notice in vv. 24-25.
    reason: segmentation_note
  - marker: a
    text: Or 'and how he had come riding on a donkey.'.
    reason: previous_rendering
  - marker: b
    text: Or 'I can no longer bear the burden of the road and go with you.'.
    reason: previous_rendering
  - marker: c
    text: Or 'And Rebekah said to her, "Go with Jacob your son."'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:52:02Z'
    unchanged: false
    changes_summary: Corrected the opening phrase from 'are for shame' to 'in joy' and revised 'had come to carry him on a donkey' to the more natural and accurate 'had come riding on a donkey.' Also removed the unsupported 'Stay with me' and replaced it with 'and go with you' to reflect Isaac’s inability to accompany Jacob.
translation:
  language: es
  text: 'Con gozo. Y Jacob acomodó a sus dos hijos, uno a su derecha y otro a su izquierda, y le fue contado por justicia. Y Jacob contó todo a su padre en la noche, cómo Yahvé había tratado con él con gran misericordia y cómo lo había prosperado en todo su camino y lo había guardado de todo mal. E Isaac bendijo al Dios de su padre Abraham, que no había negado misericordia y justicia al hijo de su siervo Isaac. Y por la mañana Jacob contó a su padre Isaac la oración que había hecho a Yahvé, y la visión que había visto, y cómo había edificado un altar, y todo lo que estaba preparado para el sacrificio, para ofrecerlo delante de Yahvé conforme a cómo había orado, y cómo había venido para llevarlo sobre un asno. Y Isaac dijo a Jacob: «Hijo mío, no puedo ir contigo, porque soy viejo y no puedo soportar el viaje. Ve, hijo mío, en paz, porque hoy tengo ciento sesenta y cinco años. Ya no puedo viajar; pon a tu madre sobre un animal de carga y que vaya contigo. Y sé, hijo mío, que por causa mía
    viniste, y este día es bendito, en el cual me has visto vivo y yo también te he visto a ti, hijo mío. Prospera y cumple la oración que has hecho, y no demores tu oración, porque se busca su respuesta; ahora, pues, hazla pronto, y que el que ha hecho todas las cosas dé éxito a la oración por la cual has orado». Y él dijo a Rebeca:[a] «Ve con Jacob, tu hijo». Y Rebeca fue con Jacob, su hijo, y Débora estaba con ella, y llegaron a Betel. Y Jacob recordó la oración con la que su padre lo había bendecido a él y a sus dos hijos, Leví y Judá, y se alegró y bendijo al Dios de sus padres, Abraham e Isaac. Y dijo: «Ahora sé que tengo una esperanza eterna, y también mis hijos, delante del Dios de todos. Y así está ordenado respecto de los dos, y para ellos será levantado como testimonio perpetuo en las tablas celestiales, conforme a cómo Isaac los bendijo». Y pasó aquella noche en Betel, y Leví soñó que lo habían nombrado y ordenado sacerdote del Dios Altísimo, a él y a sus hijos para siempre.
    Y despertó de su sueño y bendijo a Yahvé. Y Jacob se levantó de mañana, el día catorce de este mes, y dio el diezmo de todo lo que había venido con él, desde personas hasta ganado, desde oro hasta toda posesión; tomó, pues, el diezmo de todo. Y en aquellos días Raquel concibió a Benjamín, y Jacob enumeró a sus hijos, y Leví quedó en la porción de Yahvé, y su padre lo vistió con vestiduras sacerdotales y llenó sus manos. Y el día quince de este mes llevó al altar, como sacrificios del ganado, catorce bueyes, dieciocho carneros, cuarenta y nueve ovejas, siete corderos y veintiún cabritos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La cláusula ge''ez mantiene a Isaac como hablante: «Y él dijo a Rebeca».'
    reason: textual_clarification
lexical_decisions:
- source_word: በፍሥሐ
  english_pob_choice: in joy
  chosen_spanish: Con gozo
  alternatives_spanish:
  - Con alegría
  - En gozo
  lexicon: No aplica; equivalente adverbial de estado
  rationale: El arranque breve funciona mejor como inciso adverbial en español; «con gozo» conserva el matiz de alegría solemne sin sonar forzado.
- source_word: ጽድቀ
  english_pob_choice: it was counted to him as righteousness
  chosen_spanish: le fue contado por justicia
  alternatives_spanish:
  - le fue contado como justicia
  - le fue acreditado como justicia
  lexicon: No aplica; construcción pasiva impersonal
  rationale: Se mantiene la fórmula judicial/bilateral de «contado por justicia», cercana al valor de δικαιοσύνη sin suavizarla a mera aprobación moral.
- source_word: ሣህለ ዐቢየ
  english_pob_choice: great mercy
  chosen_spanish: gran misericordia
  alternatives_spanish:
  - misericordia grande
  - mucha misericordia
  lexicon: No aplica; intensificador adjetival
  rationale: «Gran misericordia» es natural y conserva la intensidad del original y del audit trail inglés.
- source_word: ይጽዐኖ ዲበ አድግ
  english_pob_choice: had come to carry him on a donkey
  chosen_spanish: había venido para llevarlo sobre un asno
  alternatives_spanish:
  - había venido a montarlo sobre un asno
  - había venido para transportarlo en un asno
  lexicon: No aplica; verbo de traslado con objeto pronominal
  rationale: Se conserva que Jacob venía con propósito de trasladar a Isaac en un asno, evitando la lectura errónea de que Jacob venía montando.
- source_word: ጻዕና ለአምካ ... ትሖር ምስሌከ
  english_pob_choice: set your mother on a beast and let her go with you
  chosen_spanish: pon a tu madre sobre una bestia y que vaya contigo
  alternatives_spanish:
  - sube a tu madre sobre una bestia y déjala ir contigo
  - coloca a tu madre sobre un animal y que vaya contigo
  lexicon: No aplica; imperativos con objeto femenino
  rationale: 'La revisión auditable corrige el sentido: Isaac manda enviar a Rebeca con Jacob, no simplemente lamentar su propia fatiga.'
- source_word: ወይቤላ ርብቃ
  english_pob_choice: And he said to Rebekah
  chosen_spanish: Y él dijo a Rebeca
  alternatives_spanish:
  - Y dijo a Rebeca
  - Y él le dijo a Rebeca
  lexicon: No aplica; pronombre objeto explícito en ge'ez
  rationale: Se respeta el sujeto masculino implícito de la cláusula, evitando atribuir la frase a Rebeca.
- source_word: አምላከ አበዊሁ አብርሃም ወይስሐቅ
  english_pob_choice: the God of his fathers, Abraham and Isaac
  chosen_spanish: el Dios de sus padres, Abraham e Isaac
  alternatives_spanish:
  - el Dios de su padre Abraham e Isaac
  - el Dios de sus padres Abraham e Isaac
  lexicon: No aplica; genitivo relacional
  rationale: La forma plural «sus padres» reproduce el valor relacional familiar del texto y su paralelismo con el inglés POB.
- source_word: ካህነ አምላክ ልዑል
  english_pob_choice: priest of the Most High God
  chosen_spanish: sacerdote del Dios Altísimo
  alternatives_spanish:
  - sacerdote del Altísimo Dios
  - sacerdote del Dios Supremo
  lexicon: No aplica; título divino
  rationale: «Dios Altísimo» es la forma más estable y reverente en español bíblico sin recurrir a calco duro.
theological_decisions:
- issue: Relación entre justicia y misericordia en la bendición patriarcal
  english_pob_reading: the LORD had dealt with him in great mercy ... and it was counted to him as righteousness ... who had not withheld mercy and righteousness
  chosen_spanish_reading: Yahvé había tratado con él con gran misericordia ... y le fue contado por justicia ... no había retenido la misericordia y la justicia
  alternative_spanish_readings:
  - misericordia y rectitud
  - misericordia y justicia
  rationale: 'Se conserva la pareja de términos sin diluirla: «misericordia» más «justicia» deja visible el eco legal/relacional que el texto enfatiza.'
  doctrine_reference: justicia pactal y misericordia divina en la bendición patriarcal
- issue: La designación de Levi como sacerdote
  english_pob_reading: they had appointed and ordained him priest of the Most High God, him and his sons forever
  chosen_spanish_reading: lo habían nombrado y ordenado sacerdote del Dios Altísimo, a él y a sus hijos para siempre
  alternative_spanish_readings:
  - lo habían establecido sacerdote
  - lo habían consagrado sacerdote
  rationale: Se mantienen dos verbos para reflejar la doble acción de nombramiento/ordenación que el inglés POB distingue y que el ge'ez sugiere con fuerza formal.
  doctrine_reference: institución sacerdotal y perpetuidad del oficio
- issue: Uso del nombre divino
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: Se sigue la norma del proyecto de nombrar explícitamente el tetragrámaton en español, preservando la transparencia del texto fuente.
  doctrine_reference: rendición directa del nombre divino
translation_notes:
