base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/013.yaml
  text: Let us not give our daughter to a man who has a foreskin, for that is a reproach to us. And it is a reproach to Israel, to those who give and to those who take from the daughters of the nations, because it is unclean.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:49Z'
    unchanged: false
    changes_summary: Removed unnecessary quotation marks, smoothed punctuation, and rendered the second clause more naturally as 'to those who give and to those who take from the daughters of the nations' while preserving the source meaning.
translation:
  language: es
  text: No entreguemos nuestra hija a un hombre que tiene prepucio, porque eso es para nosotros un oprobio. Y es un oprobio para Israel, para los que dan y para los que toman de las hijas de las naciones, porque es inmundo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ቍልፈተ / 'foreskin'
  english_pob_choice: a man who has a foreskin
  chosen_spanish: un hombre que tiene prepucio
  alternatives_spanish:
  - un hombre incircunciso
  - un hombre no circuncidado
  lexicon: prepucio
  rationale: El texto ge'ez usa el término físico 'prepucio', y la POB inglesa también lo conserva en vez de reducirlo a la condición general de 'uncircumcised'. En español, 'tiene prepucio' mantiene la referencia corporal y la fuerza polémica del pasaje.
- source_word: ጽእለት / 'reproach'
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - vergüenza
  - reproche
  lexicon: oprobio
  rationale: '''Oprobio'' comunica mejor la deshonra pública y comunitaria que el pasaje atribuye a esta unión. ''Reproche'' sería posible, pero suena más a censura verbal que a deshonra objetiva.'
- source_word: እስራኤል / Israel
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: Israel
  rationale: Se conserva el nombre propio sin ampliarlo, porque el contraste del texto es directo entre Israel y las naciones.
- source_word: አዋልደ አሕዛብ / daughters of the nations
  english_pob_choice: daughters of the nations
  chosen_spanish: las hijas de las naciones
  alternatives_spanish:
  - las hijas de los gentiles
  - las hijas de los pueblos
  lexicon: hijas de las naciones
  rationale: La POB inglesa preserva la expresión literal. En español, 'las hijas de las naciones' reproduce el giro semítico sin domesticarlo a una etiqueta interpretativa como 'gentiles'.
- source_word: ርኩስ / unclean
  english_pob_choice: unclean
  chosen_spanish: inmundo
  alternatives_spanish:
  - impuro
  - manchado ritualmente
  lexicon: inmundo
  rationale: '''Inmundo'' conserva el valor ritual/moral fuerte del término, concordando con el lenguaje bíblico tradicional y con la evaluación de contaminación del acto en el contexto del pasaje.'
theological_decisions:
- issue: Carácter moral/ritual de la unión con extranjeras y varones incircuncisos
  english_pob_reading: because it is unclean
  chosen_spanish_reading: porque es inmundo
  alternative_spanish_readings:
  - porque es impuro
  - porque trae impureza
  rationale: La POB inglesa deja explícita la calificación de impureza; en español 'inmundo' mantiene tanto la dimensión ritual como la evaluación comunitaria sin suavizarla.
  doctrine_reference: Pureza ritual y santidad del pueblo en la literatura del Pentateuco y Jubileos
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó comillas innecesarias y ajustó la segunda cláusula a una forma más natural: ''to those who give and to those who take from the daughters of the nations''. El español sigue esa estructura revisada con ''para los que dan y para los que toman de las hijas de las naciones'', sin añadir explicación interpretativa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva una sintaxis paratáctica cercana al original, con dos enunciados unidos por 'Y'.
  - '''Prepucio'' se usa como sustantivo concreto, no como eufemismo de ''incircunciso'', para reflejar la literalidad del testimonio source-grounded.'
