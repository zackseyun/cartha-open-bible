base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/014.yaml
  text: and so are your children through all the ages. And may the LORD give to you and to your seed greatness of heart for his glory; and may he bring you and your seed near to him from all flesh, so that they may minister in his sanctuary like the angels of the presence and like the holy ones. Like them shall the seed of your children be for glory and greatness.
  footnotes:
  - marker: a
    text: Or 'so that you may minister'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:50Z'
    unchanged: false
    changes_summary: Changed the final phrase from 'the seed of your sons' to 'the seed of your children' for consistency with ውሉደከ and more natural inclusive rendering; added final punctuation.
translation:
  language: es
  text: y así también tus hijos a través de todas las edades. Y Yahvé te dé a ti y a tu descendencia grandeza de corazón para su gloria; y haga que te acerque a ti y a tu descendencia de entre toda carne, para que[a] ministren en su santuario como los ángeles de la presencia y como los santos. Como ellos será la descendencia de tus hijos para gloria y grandeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sirvan»; el verbo ge’ez aquí es plural y puede expresarse como ministerio o servicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: እግዚአብሔር
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - SEÑOR
  lexicon: YHWH
  rationale: El texto ge’ez corresponde al nombre divino; la política española de POB pide Yahvé en lugar de una máscara reverencial.
- source_word: ወይሀብከ፡ ለከ፡ ወለዘርእከ፡ ዐበየ፡ ልበየ፡
  english_pob_choice: may the LORD give to you and to your seed greatness of heart
  chosen_spanish: te dé a ti y a tu descendencia grandeza de corazón
  alternatives_spanish:
  - te dé a ti y a tu simiente grandeza de corazón
  - te conceda grandeza de corazón a ti y a tu descendencia
  lexicon: give / seed / heart greatness
  rationale: '''Descendencia'' comunica naturalmente זרע/seed en español bíblico contemporáneo; ''grandeza de corazón'' conserva la imagen literal sin volverla paráfrasis.'
- source_word: እምኵሉ፡ ዘሥጋ፡
  english_pob_choice: from all flesh
  chosen_spanish: de entre toda carne
  alternatives_spanish:
  - de entre toda la carne
  - de toda carne
  lexicon: flesh
  rationale: '''Toda carne'' preserva el semitismo y el alcance universal; ''de entre'' expresa mejor la idea de separación/reunión desde el conjunto de la humanidad.'
- source_word: ይትአዘዙ፡
  english_pob_choice: that they may minister
  chosen_spanish: para que ministren
  alternatives_spanish:
  - para que sirvan
  - para que ministren ellos
  lexicon: minister / serve
  rationale: El verbo ge’ez está en tercera persona plural, por eso el español debe reflejar 'ministren' con sujeto implícito plural, en vez de 'ministres' o 'ministréis'.
- source_word: መቅደሱ
  english_pob_choice: his sanctuary
  chosen_spanish: su santuario
  alternatives_spanish:
  - su templo
  - su lugar santo
  lexicon: sanctuary
  rationale: '''Santuario'' es la equivalencia directa y mantiene el registro cultual del pasaje.'
- source_word: መላእክተ፡ ገጽ
  english_pob_choice: the angels of the presence
  chosen_spanish: los ángeles de la presencia
  alternatives_spanish:
  - los ángeles del rostro
  - los ángeles de su presencia
  lexicon: angels of the presence
  rationale: Se conserva la expresión técnica tradicional del libro, ya atestiguada en el inglés POB, sin suavizarla a una explicación interpretativa.
- source_word: ቅዱሳን
  english_pob_choice: the holy ones
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos seres
  - los consagrados
  lexicon: holy ones
  rationale: '''Santos'' mantiene la referencia a seres celestiales/consagrados de forma sobria y comprensible en español.'
- source_word: ዘርኦሙ / ውሉደከ
  english_pob_choice: the seed of your children
  chosen_spanish: la descendencia de tus hijos
  alternatives_spanish:
  - la simiente de tus hijos
  - la descendencia de tus hijos e hijas
  lexicon: seed / children
  rationale: '''Descendencia'' cubre el valor colectivo de seed y conserva la revisión inglesa que prefirió ''children'' para ውሉደከ.'
theological_decisions:
- issue: Nombre divino en una cita/eco de YHWH
  english_pob_reading: the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: La directriz del proyecto exige Yahvé para יהוה, y el contexto no justifica ocultar el nombre con una convención tipográfica.
  doctrine_reference: Tetragrammaton / divino nombre
- issue: Finalidad de 'para que ministren' con sujeto plural
  english_pob_reading: so that they may minister
  chosen_spanish_reading: para que ministren
  alternative_spanish_readings:
  - para que tú ministres
  - para que ellos sirvan
  rationale: La revisión gramatical del audit trail determina que el verbo ge’ez es tercera plural; mantenerlo evita borrar el referente colectivo a la descendencia.
  doctrine_reference: grammatical concordance / textual syntax
- issue: Comparación con seres celestiales
  english_pob_reading: like the angels of the presence and like the holy ones
  chosen_spanish_reading: como los ángeles de la presencia y como los santos
  alternative_spanish_readings:
  - como los ángeles del rostro y como los santos
  - como los ángeles de la presencia y como los consagrados
  rationale: Se conserva la doble comparación sin reducirla a metáfora general; el texto distingue dos grupos celestiales/consagrados.
  doctrine_reference: angelology / heavenly court
translation_notes:
  revision_awareness: 'Se incorporó la corrección de la revisión gramatical más reciente: el verbo final se traduce en tercera persona plural («ministren») para reflejar ይትአዘዙ, y se mantuvo la actualización de ''tus hijos'' / ''tu descendencia'' como ''tus hijos'' en la frase final, con ''descendencia'' para el colectivo. También se preservó la preferencia editorial por ''Yahvé'' en lugar de ''el Señor''.'
  spanish_consistency_notes:
  - Se mantuvo 'descendencia' para traducir el valor colectivo de seed en todo el versículo.
  - '''Santos'' se usa para ቅዱሳን como término breve y natural en español eclesial.'
  - '''Ángeles de la presencia'' conserva la locución técnica del libro sin reinterpretarla.'
  - No se usó 'Cristo' ni 'SEÑOR'; el nombre divino se rinde como 'Yahvé' según la pauta del proyecto.
