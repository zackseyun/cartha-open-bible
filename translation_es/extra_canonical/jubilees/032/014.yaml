review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el sentido del ge’ez y refleja bien la revisión inglesa clave: el verbo de servicio está en tercera persona plural (''ministren'') y el cierre inclusivo corresponde a ''tus hijos''. También preserva correctamente ''Yahvé'', ''toda carne'', ''ángeles de la presencia'' y la estructura de bendición/deseo. Sin embargo, hay un problema sintáctico importante en español: ''haga que te acerque a ti y a tu descendencia'' deja ambiguo o incorrecto el sujeto del acercamiento. El sentido fuente es ''que él te acerque / los acerque a él''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero la secuencia 'haga que te acerque a ti y a tu descendencia de entre toda carne' suena poco natural y gramaticalmente defectuosa en español. Además, conviene evitar la nota al pie sobre 'sirvan' si no aporta una alternativa textual real preservada por el inglés; 'ministren' ya comunica bien el registro cultual. Una leve pulida produce un español más natural sin perder literalidad.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: ''Yahvé'' por el nombre divino, ''descendencia'' por seed, ''carne'' en ''toda carne'', ''santuario'', y ''ángeles de la presencia''. ''Los santos'' es aceptable para ''holy ones'' en este contexto. No hay conflicto doctrinal relevante.'
  issues:
  - severity: high
    issue: Construcción verbal incorrecta/ambigua en 'haga que te acerque a ti y a tu descendencia'
    rationale: En español, esa formulación no expresa con claridad que Dios es quien acerca a Jacob y a su descendencia a sí mismo; puede leerse como si otro sujeto los acercara o como una construcción mal formada. El original y el inglés dicen que Dios 'bring you and your seed near to him'.
  - severity: low
    issue: Nota al pie innecesaria sobre 'ministren/sirvan'
    rationale: El inglés POB no conserva aquí una nota de alternativa léxica entre 'minister' y 'serve'; su nota trata la persona gramatical en una versión anterior. En español, 'ministren' es suficientemente claro en contexto cultual y no crea una ambigüedad nueva que exija nota.
  revised_spanish_text: y así también tus hijos a través de todas las edades. Y Yahvé te dé a ti y a tu descendencia grandeza de corazón para su gloria; y te acerque a ti y a tu descendencia a él, de entre toda carne, para que ministren en su santuario como los ángeles de la presencia y como los santos. Como ellos será la descendencia de tus hijos para gloria y grandeza.
  revision_rationale: 'Se corrige la construcción central para expresar con claridad el sentido fuente: Dios acerca a Jacob y a su descendencia a sí mismo. Se mantiene el resto de las decisiones léxicas válidas y se elimina una nota no necesaria.'
