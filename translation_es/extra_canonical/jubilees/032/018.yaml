  to: 'Bendito sea todo el que te bendiga, y todo el pueblo que te maldiga será maldito. Y a Judá le dijo: «Que el Señor te dé fuerza y poder para someter a todos los que te odian. Sé gobernante, tú y uno de tus hijos, sobre los hijos de Jacob. Que tu nombre y el nombre de tus hijos salgan y sean proclamados por toda la tierra y regiones[a]. Entonces las naciones temerán delante de tu rostro.'
