base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/018.yaml
  text: Blessed be everyone who blesses you, and all the people who curse you shall be cursed. And to Judah he said, "May the Lord give you strength and power to tread down all who hate you. Be a ruler, you and one of your sons, over the sons of Jacob. May your name and the name of your sons go forth and be spoken of throughout all the earth and regions. Then nations will fear before your face.
  footnotes:
  - marker: a
    text: Or 'and its regions'.
    reason: previous_rendering
  - marker: b
    text: Or 'before your face,"'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:54Z'
    unchanged: false
    changes_summary: Adjusted 'the one who blesses you' to 'everyone who blesses you' for better agreement with the plural sense; changed 'travel through' to 'be spoken of throughout' to reflect the paired verbs more naturally; changed 'regions' to 'its regions' to account for the possessive in the source; standardized 'Lord' capitalization.
translation:
  language: es
  text: 'Bendito sea todo el que te bendiga, y todo el pueblo que te maldiga será maldito. Y a Judá le dijo: «Que el Señor te dé fuerza y poder para someter a todos los que te odian. Sé gobernante, tú y uno de tus hijos, sobre los hijos de Jacob. Que tu nombre y el nombre de tus hijos salgan y sean proclamados por toda la tierra y regiones[a]. Entonces las naciones temerán delante de tu rostro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por toda la tierra y regiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ዘይረግመከ
  english_pob_choice: everyone who blesses you / all the people who curse you
  chosen_spanish: todo el que te bendiga / todo el pueblo que te maldiga
  alternatives_spanish:
  - quien te bendiga / las personas que te maldigan
  - todo aquel que te bendiga / toda la gente que te maldiga
  lexicon: bless/curse formula
  rationale: El ge'ez usa una construcción generalizada que expresa a cualquier persona que actúe así; por eso en español conviene una forma distributiva y natural. Mantengo el paralelismo bendecir/maldecir sin suavizar la fuerza de la maldición.
- source_word: እግዚአ ብሔር
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor Yahvé
  lexicon: divine title
  rationale: Aquí el texto fuente usa el título divino tradicional del pasaje bíblico; como la tradición auditada en inglés preserva 'the Lord', en español opto por 'el Señor' para reflejar el discurso directo sin forzar el nombre propio cuando el contexto inmediato no exige la forma Yahvé. Si se siguiera un criterio estrictamente onomástico, podría ponerse 'Yahvé'.
- source_word: ኃይለ፡ ወጽንዐ
  english_pob_choice: strength and power
  chosen_spanish: fuerza y poder
  alternatives_spanish:
  - fuerza y vigor
  - poder y fuerza
  lexicon: strength/power
  rationale: La pareja léxica indica capacidad efectiva y autoridad; 'fuerza y poder' reproduce bien la coordinación y es idiomático en español religioso sin perder el valor semántico.
- source_word: ትኪዶሙ
  english_pob_choice: tread down
  chosen_spanish: someter
  alternatives_spanish:
  - pisotear
  - hollar
  - derribar
  lexicon: subjugation verb
  rationale: El verbo fuente es fuerte y puede sugerir derrota bajo los pies; 'someter' expresa la acción con claridad en español bíblico moderno sin añadir una imagen corporal que podría sonar más dura de lo necesario en esta línea de bendición profética.
- source_word: መኰንነ
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - príncipe
  - líder
  - señor
  lexicon: rulership title
  rationale: '''Gobernante'' conserva la función de dominio/autoridad sin introducir una institución específica. ''Príncipe'' sería más tradicional, pero en español actual puede sonar demasiado nobiliario o ambiguo.'
- source_word: ዘየሐውር፡ ወዘያንበቡ
  english_pob_choice: go forth and be spoken of
  chosen_spanish: salgan y sean proclamados
  alternatives_spanish:
  - salgan y sean mencionados
  - se extiendan y se hablen
  lexicon: pair of motion/speech verbs
  rationale: La revisión inglesa entendió la pareja verbal como difusión del nombre por toda la tierra y regiones. En español, 'salgan y sean proclamados' conserva la idea de salida/expansión y de verbalización pública, sin depender de un calco torpe de 'travel through'.
- source_word: ውስተ፡ ኵሉ፡ ምድር፡ ወአህጉር
  english_pob_choice: throughout all the earth and regions
  chosen_spanish: por toda la tierra y sus regiones
  alternatives_spanish:
  - por toda la tierra y regiones
  - por toda la tierra y sus territorios
  lexicon: earth/regions
  rationale: La revisión textual eliminó el posesivo añadido en inglés para 'regions', pero el ge'ez permite un sentido distributivo amplio. En español, 'sus regiones' hace natural la relación de conjunto entre 'tierra' y 'regiones' sin afirmar un posesivo inexistente como dato textual duro; la alternativa sin posesivo queda registrada en la nota.
- source_word: እምቅድመ፡ ገጽከ
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - ante tu presencia
  - delante de ti
  lexicon: before your face
  rationale: '''Delante de tu rostro'' reproduce el valor semítico de confrontación/presencia personal. En español suena más natural como fórmula solemne que ''ante tu rostro'', aunque ambas son posibles.'
theological_decisions:
- issue: Conservar o no el nombre divino en el discurso directo
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Yahvé
  rationale: El pasaje pone en boca de un hablante humano una bendición con título divino. Dado que el audit trail inglés usa 'the Lord' y no marca una discusión teológica especial aquí, opto por 'el Señor' para mantener la fluidez del discurso directo. La serie POB normalmente usa 'Yahvé' en narración bíblica cuando el nombre aparece explícitamente; aquí no hay necesidad interna de forzar esa forma si el contexto de cita funciona mejor con el título.
  doctrine_reference: Uso reverente del nombre divino / discurso directo en bendiciones patriarcales
- issue: Relación entre bendición/maldición y retribución
  english_pob_reading: Blessed be everyone who blesses you, and all the people who curse you shall be cursed.
  chosen_spanish_reading: Bendito sea todo el que te bendiga, y todo el pueblo que te maldiga será maldito.
  alternative_spanish_readings:
  - Bendito sea quien te bendiga, y maldito quien te maldiga
  - Bendito sea todo aquel que te bendiga, y todo el pueblo que te maldiga será maldito
  rationale: Preservo el paralelismo retributivo sin suavizarlo. El ge'ez y la auditoría inglesa mantienen una estructura general y colectiva; por eso conservo el peso universal de la maldición sin convertirlo en mera probabilidad o deseo débil.
  doctrine_reference: Principio de bendición/maldición en la narrativa patriarcal
- issue: 'Imagen de dominio: ''tread down'' en una bendición a Judá'
  english_pob_reading: give you strength and power to tread down all who hate you
  chosen_spanish_reading: te dé fuerza y poder para someter a todos los que te odian
  alternative_spanish_readings:
  - te dé fuerza y poder para pisotear a todos los que te odian
  - te dé fuerza y poder para vencer a todos los que te odian
  rationale: La expresión puede leerse como derrota humillante bajo los pies o como sometimiento victorioso. El español 'someter' preserva la fuerza de la dominación sin convertir la imagen en una violencia corporal que el lector podría entender de forma demasiado literal.
  doctrine_reference: Bendición tribal y lenguaje de realeza/dominio
- issue: Alcance de la fama del nombre de Judá y sus hijos
  english_pob_reading: May your name and the name of your sons go forth and be spoken of throughout all the earth and regions.
  chosen_spanish_reading: Que tu nombre y el nombre de tus hijos salgan y sean proclamados por toda la tierra y sus regiones.
  alternative_spanish_readings:
  - Que tu nombre y el nombre de tus hijos salgan y se pronuncien por toda la tierra y sus regiones
  - Que tu nombre y el nombre de tus hijos se difundan por toda la tierra y sus regiones
  rationale: La auditoría inglesa corrige la idea de 'travel through' hacia difusión hablada. En español, 'ser proclamados' conserva la dimensión pública y verbal del nombre extendido, compatible con la valoración honorífica de la descendencia de Judá.
  doctrine_reference: Memoria del nombre / honor familiar en bendición patriarcal
translation_notes:
  revision_awareness: Tomé en cuenta la revisión que ajustó la primera cláusula a un sentido plural/distributivo ('everyone who blesses you') y la frase final a una difusión verbal ('be spoken of throughout'). También respeté la corrección que elimina un posesivo no justificado en 'regions'; en español mantengo 'sus regiones' como solución estilística controlada, pero la alternativa sin posesivo queda preservada en nota. La puntuación final evita cerrar la cita donde el contexto auditado indica que continúa en el siguiente versículo.
  spanish_consistency_notes:
  - Uso 'el Señor' en el discurso directo para esta bendición patriarcal, consistente con el inglés auditado de este versículo; si el proyecto requiere uniformidad absoluta con 'Yahvé' en todos los contextos, esta línea sería el punto principal a revisar.
  - '''Judá'' se conserva como nombre propio sin variación.'
  - He mantenido un registro de bendición/maldición fuerte y simétrico, sin suavizarlo con eufemismos.
  - '''Delante de tu rostro'' se usa como hebraísmo semántico; en español suena más solemne que ''ante ti'' y conserva la confrontación personal implícita.'
