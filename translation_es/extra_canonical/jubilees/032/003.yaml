base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/003.yaml
  text: And in those days Rachel became pregnant with Benjamin, and Jacob counted his sons starting from him, and Levi came up in the portion of the LORD, and his father clothed him.
  footnotes:
  - marker: a
    text: Or 'Jacob counted his sons, and Levi came up'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:44Z'
    unchanged: false
    changes_summary: Removed the awkward and unclear 'from among him' as unsupported in natural English here; adjusted 'in the LORD’s portion' to 'in the portion of the LORD' for more formal, natural register; added final punctuation.
translation:
  language: es
  text: Y en aquellos días Raquel quedó encinta de Benjamín, y Jacob contó sus hijos, comenzando por él[a], y Leví subió en la porción de Yahvé, y su padre lo vistió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jacob contó sus hijos, y Leví subió».'
    reason: alternative_reading
lexical_decisions:
- source_word: ፀንሰት
  english_pob_choice: became pregnant
  chosen_spanish: quedó encinta
  alternatives_spanish:
  - quedó embarazada
  - concibió
  lexicon: pregnancy/conception
  rationale: El geʽez indica el inicio del embarazo; ‘quedó encinta’ mantiene un tono bíblico claro y natural en español sin perder precisión.
- source_word: በንያምሃ
  english_pob_choice: with Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - con Benjamín
  - de parte de Benjamín
  lexicon: proper_name + pregnancy relation
  rationale: En español, el embarazo se expresa naturalmente con ‘de Benjamín’, que comunica filiación/relación causal del embarazo sin ambigüedad.
- source_word: ውሉዶ
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos, varón por varón
  lexicon: sons/children
  rationale: Aquí el sentido narrativo es la enumeración de los hijos de Jacob; ‘hijos’ conserva el referente masculino colectivo y suena más natural que una repetición forzada de ‘hijos varones’.
- source_word: እምኔሁ
  english_pob_choice: starting from him
  chosen_spanish: comenzando por él
  alternatives_spanish:
  - empezando por él
  - desde él
  lexicon: ordinal/counting detail
  rationale: 'La nota de revisión muestra que el detalle es importante: Jacob cuenta desde Benjamín. ‘Comenzando por él’ preserva el valor direccional del original sin la dureza de un calco.'
- source_word: መክፈሊተ እግዚአብሔር
  english_pob_choice: the portion of the LORD
  chosen_spanish: la porción de Yahvé
  alternatives_spanish:
  - la porción del Señor
  - la heredad de Yahvé
  lexicon: divine portion/allotment
  rationale: Se mantiene la terminología POB para el nombre divino, y ‘porción’ conserva el matiz de asignación/heredad del reparto, tal como lo refleja la revisión inglesa.
- source_word: ወአልበሱ አቡሁ
  english_pob_choice: his father clothed him
  chosen_spanish: su padre lo vistió
  alternatives_spanish:
  - su padre lo cubrió
  - su padre le puso ropa
  lexicon: clothe/dress
  rationale: ‘Vistió’ es la correspondencia más directa y digna para el acto de vestir; ‘lo vistió’ evita ambigüedad sobre el objeto directo.
theological_decisions:
- issue: Divine name in the allotment phrase
  english_pob_reading: the portion of the LORD
  chosen_spanish_reading: la porción de Yahvé
  alternative_spanish_readings:
  - la porción del Señor
  rationale: La política del proyecto pide Yahvé para יהוה; como el contexto inglés usa ‘LORD’ en una fórmula de posesión divina, se conserva la referencia explícita al nombre divino en español.
  doctrine_reference: Tetragrámaton / traducción del nombre divino
- issue: Narrative logic of Levi's placement in the count
  english_pob_reading: Jacob counted his sons starting from him
  chosen_spanish_reading: Jacob contó a sus hijos, comenzando por él
  alternative_spanish_readings:
  - Jacob contó a sus hijos desde él
  - Jacob contó a sus hijos, empezando por él
  rationale: La revisión auditada indica que el detalle de contar desde Benjamín es crucial para la lógica del pasaje. Se preserva esa tensión narrativa sin explicitar más de lo que el texto dice.
  doctrine_reference: narrative coherence / textual sense
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó la frase torpe ‘from among him’, pero la auditoría posterior recordó que el geʽez እምኔሁ sí aporta un detalle de conteo ‘comenzando por él’. La traducción española incorpora ese matiz para no perder la lógica narrativa de Jubileos 32:3.
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ para el nombre divino conforme a la norma del proyecto.
  - ‘Leví’ y ‘Benjamín’ se mantienen con la ortografía española estándar.
  - La frase final ‘su padre lo vistió’ conserva el acto simple del original sin expandirlo innecesariamente.
  - Se evita ‘SEÑOR’ como máscara editorial en el texto principal.
