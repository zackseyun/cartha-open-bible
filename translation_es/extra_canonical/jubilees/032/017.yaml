base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/017.yaml
  text: 'every man and woman in Israel who defiles his sanctuary. Because of this I have commanded you, saying, "Bear this testimony over Israel: see what happened to Shechem and to his sons, how they were given into the hand of the two sons of Jacob, and they killed them in agony, and it was reckoned to them as righteousness, and it was written down for them as righteousness."'
  footnotes:
  - marker: a
    text: Or 'with the sword'.
    reason: previous_rendering
  - marker: b
    text: Or 'Make this report heard'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:54Z'
    unchanged: false
    changes_summary: 'Improved naturalness and lexical accuracy: changed “Bear this testimony” to “Make this report heard” to reflect the command to proclaim/hear; changed “delivered” to “given” for a more direct rendering; changed “into the hands” to singular “into the hand” for the source idiom; corrected “with pain” to “with the sword,” which fits the Geez term and context.'
translation:
  language: es
  text: 'todo hombre y mujer en Israel que profane su santuario. Por esto te he ordenado, diciendo: «Da este testimonio[b] sobre Israel: mira lo que le aconteció a Siquén y a sus hijos, cómo fueron entregados en mano de los dos hijos de Jacob, y los mataron en agonía[a], y les fue contado como justicia, y fue escrito para ellos como justicia.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «con la espada». El término ge''ez ፃዕር (ṣā''er) significa propiamente ''dolor, agonía, tormento''. Una revisión del English POB introdujo ''with the sword'' por inferencia contextual, pero fue corregida: el texto alude a la incapacitación de los siquemitas por el dolor de la circuncisión (cf. Gen 34:25).'
    reason: textual_variant
  - marker: b
    text: O «Haz oír este informe». El ge'ez አስምዕ፡ ዛተ፡ ስምዐ usa una construcción cognada (verbo causativo + sustantivo ስምዐ, 'testimonio/testigo') con connotación jurídico-pactual. 'Informe' (de una revisión anterior) pierde ese peso legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: አስምዕ፡ ዛተ፡ ስምዐ (asme' zāta sem'a)
  english_pob_choice: Bear this testimony
  chosen_spanish: Da este testimonio
  alternatives_spanish:
  - Haz oír este informe
  - Proclama este testimonio
  lexicon: Leslau, CDG s.v. አስምዕ (asme'a) y ስምዐ (sem'a)
  rationale: 'El ge''ez emplea una construcción cognada: el verbo causativo አስምዕ (''hacer oír/proclamar'') seguido del sustantivo cognado ስምዐ (''testimonio, testigo, testimonio jurídico''). El English POB mantuvo ''Bear this testimony'' frente a la revisión ''Make this report heard'', pues ስምዐ posee peso jurídico-pactual que ''informe'' diluye. El español ''Da este testimonio'' transmite esa dimensión testimonial-legal; la fuerza causativa queda implícita en el imperativo directo.'
- source_word: ፃዕር (ṣā'er)
  english_pob_choice: in agony
  chosen_spanish: en agonía
  alternatives_spanish:
  - con la espada
  lexicon: Leslau, CDG s.v. ፃዕር (ṣā'er)
  rationale: 'El ge''ez ፃዕር significa ''dolor, agonía, tormento''. El contexto narrativo remite a Gen 34:25: los siquemitas fueron ejecutados mientras estaban incapacitados por el dolor de la circuncisión. Una revisión anterior del English POB introdujo ''with the sword'' por inferencia contextual, pero esto fue una interpretación incorrecta del término (el revisador Gemini/Opus lo corrigió explícitamente). El español ''en agonía'' restituye el sentido fuente y preserva la alusión histórico-textual.'
- source_word: ጽድቀ / ጽድቅ (ṣedq) ×2
  english_pob_choice: righteousness (×2)
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: Leslau, CDG s.v. ጽድቅ (ṣedq); cf. hebreo צְדָקָה
  rationale: El ge'ez ጽድቅ es el equivalente semántico del hebreo צְדָקָה y lleva fuerza tanto moral como jurídico-pactual. La frase evoca deliberadamente Gen 15:6 ('le fue contado por justicia'); el español 'justicia' es el término establecido en esa tradición textual y preserva la resonancia intertextual. Se mantiene la repetición doble del original.
- source_word: ሰቂሞን (Seqimon)
  english_pob_choice: Shechem
  chosen_spanish: Siquén
  alternatives_spanish:
  - Shechem
  lexicon: Onomástica bíblica estándar; cf. hebreo שְׁכֶם (Šekem)
  rationale: El ge'ez ሰቂሞን transcribe el hebreo שְׁכֶם. La tradición bíblica española (Reina-Valera, BLA, NVI, etc.) usa 'Siquén' de forma establecida. Se mantiene esta forma para legibilidad en contextos eclesiales.
- source_word: እዴ (ede) — singular
  english_pob_choice: into the hand (singular)
  chosen_spanish: en mano de
  alternatives_spanish:
  - en manos de
  lexicon: Leslau, CDG s.v. እዴ (ede)
  rationale: El ge'ez emplea el singular እዴ ('mano'). El English POB corrigió explícitamente un borrador previo que usaba plural ('into the hands'), restaurando el idioma singular del original. El español 'en mano de' (sin artículo) refleja el singular fuente y es idioma bíblico reconocible en español ('fue entregado en mano de').
- source_word: መቅደሶ (meqdeso)
  english_pob_choice: his sanctuary
  chosen_spanish: su santuario
  alternatives_spanish:
  - su lugar santo
  lexicon: Leslau, CDG s.v. መቅደስ (meqdas)
  rationale: El ge'ez መቅደሶ es 'su santuario/lugar santo' con sufijo posesivo de tercera persona. El referente es ambiguo (¿el santuario de Dios, o el de Israel?), pero el English POB lo deja sin resolver con 'his sanctuary'. El español 'su santuario' preserva esa ambigüedad fiel al fuente.
theological_decisions:
- issue: El asesinato de los siquemitas 'contado como justicia' — aplicación de la fórmula abrahámica (Gen 15:6) a un acto violento de venganza
  english_pob_reading: it was reckoned to them as righteousness, and it was written down for them as righteousness
  chosen_spanish_reading: les fue contado como justicia, y fue escrito para ellos como justicia
  alternative_spanish_readings:
  - les fue imputado como justicia
  - les fue atribuido como justicia
  rationale: El texto de Jubileos aplica deliberadamente la fórmula de Gen 15:6 ('le fue contado por justicia') al acto de Simeón y Leví contra Siquén. El español 'les fue contado como justicia' espeja la fraseología tradicional de esa cita abrahámica en versiones españolas, preservando la resonancia intertextual. La tensión teológica —que un acto de violencia sea declarado justo— es inherente a la teología jurídico-pactual de Jubileos y no debe suavizarse.
  doctrine_reference: Gen 15:6; Gen 34:25-29; teología de pureza pactual en Jubileos
- issue: Naturaleza del 'testimonio' exigido — forma de proclamación pública sobre Israel
  english_pob_reading: Bear this testimony over Israel
  chosen_spanish_reading: Da este testimonio sobre Israel
  alternative_spanish_readings:
  - Haz oír este informe sobre Israel
  - Proclama este testimonio sobre Israel
  rationale: El término ge'ez ስምዐ (sem'a) tiene peso jurídico-pactual ('testimonio, testigo') que va más allá de una mera notificación. El English POB recuperó 'testimony' frente a la revisión que usó 'report', precisamente para no perder esta carga. El español 'testimonio' preserva esa dimensión legal; el comando 'Da este testimonio sobre Israel' implica una proclamación de valor normativo, no solo informativo.
  doctrine_reference: Función del testimonio/testigo en la legislación pactual de Jubileos
translation_notes:
  revision_awareness: 'El historial de revisiones muestra una secuencia de corrección significativa. Una revisión GPT-5.4 reemplazó ''with pain'' por ''with the sword'' (para ፃዕር) y ''Bear this testimony'' por ''Make this report heard'' (para አስምዕ ዛተ ስምዐ). Ambas fueron revertidas posteriormente por revisión Gemini/Opus: ፃዕር significa correctamente ''dolor/agonía'' (incapacitación de los siquemitas por la circuncisión, cf. Gen 34:25), y ስምዐ lleva peso jurídico-pactual de ''testimonio'' que ''informe'' no transmite. El borrador español sigue el estado final corregido, con las alternativas rechazadas preservadas en notas al pie.'
  spanish_consistency_notes:
  - '''Siquén'' para el ge''ez ሰቂሞን sigue la onomástica bíblica estándar en español.'
  - '''Justicia'' para ጽድቅ se usa dos veces consecutivas, preservando la repetición deliberada del original ge''ez.'
  - Las comillas de la cita directa usan guillemets («») conforme a las convenciones tipográficas del español.
  - El texto comienza en minúscula porque es continuación del verso anterior (el sujeto inicial es retomado de una cláusula subordinada que precede).
  - '''En mano de'' (singular, sin artículo) refleja tanto el singular fuente ge''ez como el idioma bíblico español reconocible.'
