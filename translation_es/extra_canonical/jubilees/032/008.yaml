translation:
  language: es
  text: la quemarán con fuego, porque ha profanado el nombre de la casa de su padre, y será arrancada de Israel. Y no se hallará fornicación ni impureza en Israel[a], en todos los días de las generaciones de la tierra, porque Israel es santo para Yahvé; y todo el que lo profane[b] ciertamente morirá; lo apedrearán con piedras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término ‘impureza’ puede abarcar tanto inmoralidad sexual como impureza ritual; aquí se conserva la amplitud del original.
    reason: lexical_alternative
  - marker: b
    text: ‘Lo’ retoma a Israel como colectivo; también podría expresarse ‘a Israel’, pero la retoma pronominal mantiene la concisión del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: ያውዕይዋ፡ በእሳት፡
  english_pob_choice: they shall burn her with fire
  chosen_spanish: la quemarán con fuego
  alternatives_spanish:
  - la quemarán en el fuego
  - la quemarán con fuego y fuego
  lexicon: burn; fire
  rationale: El ge’ez y la revisión inglesa fijan el objeto femenino explícito; por eso se traduce con objeto directo femenino. ‘Con fuego’ es la forma natural y fiel en español.
- source_word: አርኰሰት፡ ስመ፡ ቤተ፡ አቡሃ፡
  english_pob_choice: she has defiled the name of her father’s house
  chosen_spanish: ha profanado el nombre de la casa de su padre
  alternatives_spanish:
  - ha contaminado el nombre de la casa de su padre
  - ha deshonrado el nombre de la casa de su padre
  lexicon: defile/profane; name; father’s house
  rationale: ‘Profanado’ conserva la fuerza cultual/moral de ‘defiled’ y el vínculo con el ‘nombre’ de la casa paterna, sin suavizarlo a una mera vergüenza social.
- source_word: ወትሠረው፡ እምእስራኤል።
  english_pob_choice: and she shall be rooted out from Israel
  chosen_spanish: y será arrancada de Israel
  alternatives_spanish:
  - y será extirpada de Israel
  - y será eliminada de Israel
  lexicon: root out; Israel
  rationale: ‘Arrancada’ reproduce bien la imagen de expulsión/desarraigo del original y el inglés, manteniendo el valor punitivo sin añadir explicaciones.
- source_word: ዘማ፡ ወርኵስ፡
  english_pob_choice: fornication or uncleanness
  chosen_spanish: fornicación ni impureza
  alternatives_spanish:
  - inmoralidad sexual ni impureza
  - fornicación ni suciedad ritual
  lexicon: fornication; uncleanness
  rationale: Se conserva la pareja conceptual del inglés POB. ‘Impureza’ es el término más amplio y sobrio para el segundo miembro.
- source_word: ቅዱስ፡ እስራኤል፡ ለእግዚአብሔር፡
  english_pob_choice: for Israel is holy to the LORD
  chosen_spanish: porque Israel es santo para Yahvé
  alternatives_spanish:
  - porque Israel es santo al Señor
  - porque Israel es consagrado a Yahvé
  lexicon: holy; LORD / YHWH
  rationale: Se mantiene ‘Yahvé’ según la pauta del proyecto para el nombre divino. ‘Santo para’ expresa pertenencia y consagración con buena naturalidad en español.
- source_word: ወኵሉ፡ ሰብእ፡ ዘአርኰሰ፡
  english_pob_choice: and everyone who defiles it
  chosen_spanish: y todo el que lo profane
  alternatives_spanish:
  - y todo el que lo contamine
  - y todo el que lo haga impuro
  lexicon: everyone; defile it
  rationale: El pronombre neutro ‘lo’ retoma a Israel como pueblo/cuerpo colectivo. ‘Profane’ conserva la conexión con la profanación cultual del contexto.
- source_word: ሞተ፡ ለይሙት፡ በእብን፡ ይውግርዎ።
  english_pob_choice: shall surely die; they shall stone him with stones
  chosen_spanish: ciertamente morirá; lo apedrearán con piedras
  alternatives_spanish:
  - morirá sin falta; lo lapidarán con piedras
  - de cierto morirá; lo apedrearán
  lexicon: die; stone with stones
  rationale: ‘Ciertamente morirá’ reproduce la fuerza enfática del giro semítico del inglés. ‘Apedrearán con piedras’ conserva la redundancia intensiva del original, muy estable en el lenguaje bíblico.
theological_decisions:
- issue: Nombre divino en la cláusula final
  english_pob_reading: Israel is holy to the LORD
  chosen_spanish_reading: Israel es santo para Yahvé
  alternative_spanish_readings:
  - Israel es santo al Señor
  - Israel es santo para el Señor
  rationale: La pauta del proyecto exige ‘Yahvé’ para יהוה en el texto principal. Esto evita el ocultamiento del nombre divino y mantiene la referencia directa del pasaje.
  doctrine_reference: Tetragrammaton rendering policy
- issue: Lenguaje de pureza/profanación
  english_pob_reading: defiles / uncleanness / holy
  chosen_spanish_reading: profanado / impureza / santo
  alternative_spanish_readings:
  - contaminado / inmundicia / consagrado
  - deshonrado / suciedad ritual / separado
  rationale: El texto combina moralidad sexual y pureza cultual. ‘Profanar’ e ‘impureza’ preservan esa tensión sin reducirla a mero decoro social ni a higiene.
  doctrine_reference: Holiness and purity vocabulary in covenant law
- issue: Sujeto colectivo de Israel
  english_pob_reading: everyone who defiles it
  chosen_spanish_reading: todo el que lo profane
  alternative_spanish_readings:
  - todo el que la profane
  - todo el que profane a Israel
  rationale: Aunque ‘Israel’ es gramaticalmente masculino en español, el referente es colectivo. ‘Lo’ funciona como pronombre neutro de retoma para el pueblo/cuerpo colectivo, evitando una reescritura explicativa.
  doctrine_reference: Collective singular reference
translation_notes:
  revision_awareness: La revisión auditada del inglés añadió ‘her’ para hacer explícito el objeto del verbo ‘burn’; la traducción española ya incorpora ese objeto femenino explícito (‘la quemarán’), sin necesidad de ajustes adicionales. Se mantiene el resto del enunciado conforme al texto fuente y al cierre revisado.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el nombre divino conforme a la política del proyecto.
  - 'Se conserva el paralelismo judicial del pasaje con verbos futuros de sanción: ‘quemarán’, ‘será arrancada’, ‘se hallará’, ‘morirá’, ‘apedrearán’.'
  - ‘Fornicación’ e ‘impureza’ se dejan juntos para reflejar dos ámbitos de transgresión sin fusionarlos.
  - 'La puntuación sigue la estructura acumulativa del original, con dos puntos semánticos principales: prohibición/pureza y sanción.'
