review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del ge''ez y del rastro de auditoría inglés: castigo de la mujer, profanación de la casa paterna, exclusión de Israel, prohibición de fornicación e impureza, santidad de Israel para Yahvé, pena de muerte y apedreamiento. Sin embargo, hay un problema de referencia pronominal en ‘todo el que lo profane’, porque el antecedente natural en español es ‘Israel’, que no debe retomarse con ‘lo’ en este contexto; la formulación resulta menos clara y algo forzada frente al sentido de ‘defiles it’.'
  spanish_quality_summary: 'El español es generalmente claro, digno y fiel. ‘La quemarán con fuego’, ‘ha profanado’, ‘será arrancada’ y ‘apedrearán con piedras’ son naturales y bíblicamente adecuados. La principal reparación necesaria es estilística y referencial: cambiar ‘todo el que lo profane’ por una expresión más natural y precisa en español, idealmente ‘todo el que profane a Israel’. Además, las notas actuales no son necesarias y una de ellas defiende precisamente una elección menos natural.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: ‘Yahvé’ se usa correctamente; ‘fornicación’, ‘impureza’, ‘santo’ y ‘profanado’ preservan bien el campo semántico de pureza/santidad. No hay conflicto con términos doctrinales principales. La única excepción es la decisión pronominal sobre Israel, donde conviene preferir una formulación española más idiomática y fiel al referente colectivo.'
  issues:
  - severity: medium
    issue: Referencia pronominal poco natural en ‘todo el que lo profane’
    rationale: Aunque el inglés tiene ‘defiles it’, en español ‘lo’ con ‘Israel’ como referente colectivo suena forzado y ambiguo. ‘Profane a Israel’ expresa mejor el objeto afectado y evita una defensa artificial del pronombre.
  - severity: low
    issue: Notas al pie innecesarias
    rationale: La nota [a] añade una amplitud semántica ya bien transmitida por ‘impureza’, y la [b] explica una decisión que conviene corregir, no justificar.
  revised_spanish_text: La quemarán con fuego, porque ha profanado el nombre de la casa de su padre, y será arrancada de Israel. Y no se hallará fornicación ni impureza en Israel, en todos los días de las generaciones de la tierra, porque Israel es santo para Yahvé; y todo el que profane a Israel ciertamente morirá; lo apedrearán con piedras.
  revision_rationale: Se capitaliza el inicio de la oración según la convención normal de edición, se elimina la nota innecesaria sobre ‘impureza’, y se corrige ‘todo el que lo profane’ a ‘todo el que profane a Israel’ para dar un español más natural y una referencia más clara al objeto del verbo, sin alterar el sentido del original ni del POB inglés.
