base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/020.yaml
  text: And through you the salvation of Israel will be found. And on the day you sit on the throne of the glory of your righteousness, there will be great peace for all the seed of the sons of the beloved. Whoever blesses you shall be blessed, and all who hate you and afflict you, and also those who curse you, shall be destroyed and cut off.
  footnotes:
  - marker: a
    text: Or 'And in that day you will dwell on the throne of the glory of your righteousness. There will be great peace'.
    reason: previous_rendering
  - marker: b
    text: Or 'his beloved sons'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:54Z'
    unchanged: false
    changes_summary: Revised 'when you sit' to 'in that day you will dwell' to reflect the source more closely; added a sentence break after 'righteousness' for clarity; adjusted 'throne of honor' to 'throne of the glory' for lexical accuracy; changed 'the sons of the beloved' to 'his beloved sons' to better match the construction; and smoothed the final clause with 'those who curse you' while preserving the meaning.
translation:
  language: es
  text: Y por medio de ti se hallará la salvación de Israel. Y el día que te sientes en el trono de la gloria de tu justicia, habrá gran paz para toda la descendencia de los hijos del Amado. El que te bendiga será bendecido, y todos los que te odian y te afligen, y también los que te maldicen, serán destruidos y cortados.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: መድኃኒተ፡ እስራኤል
  english_pob_choice: the salvation of Israel will be found
  chosen_spanish: se hallará la salvación de Israel
  alternatives_spanish:
  - se encontrará la salvación de Israel
  - Israel hallará salvación
  lexicon: salvación / hallar
  rationale: El ge'ez expresa una pasiva/futura de 'hallar' respecto a la salvación de Israel; 'se hallará' conserva bien la voz y la formulación de la POB inglesa, sin volverlo una paráfrasis más libre.
- source_word: ትነብር፡ ... ውስተ፡ መንበረ፡ *ክብር፡ ጽድቅከ፡
  english_pob_choice: you will dwell on the throne of the glory of your righteousness
  chosen_spanish: habitarás en el trono de la gloria de tu justicia
  alternatives_spanish:
  - te sentarás en el trono de la gloria de tu justicia
  - morarán en el trono de la gloria de tu justicia
  lexicon: habitar / trono / gloria / justicia
  rationale: La revisión inglesa favorece 'dwell' para reflejar el verbo ge'ez; 'habitarás' evita imponer 'sentarte'. 'Gloria de tu justicia' sigue de cerca la estructura fuente y preserva la relación posesiva sin suavizarla.
- source_word: ዐቢየ፡ ሰላም
  english_pob_choice: there will be great peace
  chosen_spanish: habrá gran paz
  alternatives_spanish:
  - habrá mucha paz
  - vendrá gran paz
  lexicon: paz
  rationale: '''Gran paz'' es la correspondencia natural y fiel del superlativo/adjetival ge''ez, manteniendo el tono solemne de la POB inglesa.'
- source_word: ለኵሉ፡ ዘርአ፡ ውሉዱ፡ ለፍቅር
  english_pob_choice: for all the seed of the sons of the beloved
  chosen_spanish: para toda la descendencia de los hijos del Amado
  alternatives_spanish:
  - para toda la descendencia de los hijos del amado
  - para toda la simiente de los hijos del Amado
  lexicon: descendencia / hijos / Amado
  rationale: La nota de revisión muestra que el ge'ez tiene una construcción pronominal-posesiva que la POB inglesa conserva como 'the sons of the beloved' en forma literal. En español, 'los hijos del Amado' mantiene el título sustantivado 'Amado' y evita la reinterpretación posesiva 'sus hijos' que no está garantizada por la sintaxis.
- source_word: ዘይባርከከ፡ ቡሩክ
  english_pob_choice: Whoever blesses you shall be blessed
  chosen_spanish: El que te bendiga será bendecido
  alternatives_spanish:
  - Quien te bendiga será bendecido
  - Todo el que te bendiga será bendecido
  lexicon: bendecir / bendecido
  rationale: Conserva la paralelismo verbal y la pasiva futura de la fuente. 'El que' ofrece un español claro y solemne, equivalente al inglés POB.
- source_word: ይሠረዉ፡ ወይትሐጐሉ
  english_pob_choice: shall be destroyed and cut off
  chosen_spanish: serán destruidos y cortados
  alternatives_spanish:
  - serán destruidos y eliminados
  - serán borrados y cortados
  lexicon: destruir / cortar
  rationale: '''Cortados'' reproduce la dureza lexical del par final y conserva la amplitud semítica del verbo, sin diluirlo en una explicación idiomática.'
theological_decisions:
- issue: 'Título del destinatario final: ''the beloved'''
  english_pob_reading: the sons of the beloved
  chosen_spanish_reading: los hijos del Amado
  alternative_spanish_readings:
  - los hijos del amado
  - sus hijos amados
  rationale: La revisión auditada corrige una lectura posesiva indebida ('his beloved sons') y trata 'the beloved' como título sustantivo. En español, 'el Amado' mantiene esa fuerza titulada y evita reducirla a adjetivo simple.
  doctrine_reference: Lectura cristológica/titular sin añadir identificación no explicitada por el texto; cf. uso bíblico de 'el Amado' como designación sustantiva.
- issue: Relación entre el trono y la gloria de la justicia
  english_pob_reading: you will dwell on the throne of the glory of your righteousness
  chosen_spanish_reading: habitarás en el trono de la gloria de tu justicia
  alternative_spanish_readings:
  - te sentarás en el trono de la gloria de tu justicia
  - habitarás sobre el trono de la gloria de tu justicia
  rationale: La secuencia temporal y locativa debe permanecer unida, como indica la revisión del inglés. 'Habitarás' respeta el verbo de residencia/estancia y evita fijar una postura corporal que el ge'ez no obliga a adoptar.
  doctrine_reference: No doctrinal beyond source syntax; maintains temporal-locative relation as audited in revision history.
translation_notes:
  revision_awareness: Esta línea sigue la revisión más reciente que recupera el matiz temporal de 'en aquel día' y la lectura de 'el Amado' como construcción sustantiva. También evita la paráfrasis 'sentarte' para respetar el verbo fuente 'habitar'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece explícitamente el nombre divino; aquí no aplica.
  - '''Mesías'' no aparece en este versículo; no se introduce terminología cristológica ajena.'
  - '''salvación'', ''gloria'', ''justicia'' y ''paz'' se conservan con registro bíblico moderno y transparente.'
  - Se evita 'SEÑOR' o mayúsculas de sustitución porque el versículo no contiene el tetragrámaton.
  - La cadencia mantiene dos períodos principales, como en la POB inglesa revisada, y conserva la serie final de tres cláusulas de destino sobre quienes bendicen, odian/afligen y maldicen.
