revisions:
- from: desde la tierra de Galaad. Y Jacob ocultó su corazón a Labán y no se lo dijo. Y en la cuarta semana, en el séptimo año, Jacob se dirigió hacia Galaad en el primer mes, el día veintiuno; y se informó a Labán, y él lo persiguió y alcanzó a Jacob en el monte de Galaad en el tercer mes, en el día trece. Pero Yahvé no le permitió hacerle daño a Jacob, porque se le apareció en sueños por la noche y habló a Labán acerca de Jacob. Y el día quince de esos días Jacob hizo un banquete para Labán y para todos los que habían venido con él, e hizo Jacob un juramento a Labán aquel día, y Labán también a Jacob, de que ninguno pasaría al otro con mala intención en el monte.
  to: desde la tierra de Galaad. Y Jacob ocultó su corazón a Labán y no se lo dijo. Y en la cuarta semana, en el séptimo año, Jacob se dirigió hacia Galaad en el primer mes, el día veintiuno; y Labán lo persiguió y alcanzó a Jacob en el monte de Galaad en el tercer mes, el día trece. Pero Yahvé no le permitió hacerle daño a Jacob, porque se le apareció en un sueño por la noche, y Labán le dijo a Jacob. Y el día quince de esos días Jacob hizo un banquete para Labán y para todos los que habían venido con él, y Jacob juró a Labán aquel día, y Labán también a Jacob, que ninguno cruzaría hacia el otro con mala intención en el monte.
  rationale: Se corrigen las dos cláusulas comunicativas para seguir la adjudicación fuente y evitar armonizaciones rechazadas. También se suavizan dos giros españoles poco naturales («en el día trece» y «pasaría al otro») y se simplifica «hizo un juramento» a «juró» por fluidez, sin pérdida de sentido. No se requieren notas porque no se preservó ninguna nota inglesa obligatoria y el texto revisado no introduce nueva ambigüedad que exija pie de página.
