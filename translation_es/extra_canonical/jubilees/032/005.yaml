  yaml_path: translation/extra_canonical/jubilees/032/005.yaml
  text: from the land of Gilead. And Jacob concealed his heart from Laban and did not tell him. And in the fourth week, in the seventh year, Jacob turned toward Gilead in the first month, on the twenty-first; and Laban pursued after him and overtook Jacob at the mountain of Gilead in the third month, in the thirteenth year. But the LORD did not allow him to harm Jacob, for he appeared to him in a dream at night and Laban told Jacob. And on the fifteenth of those days Jacob made a feast for Laban and for all who had come with him, and Jacob swore to Laban on that day, and Laban also to Jacob, that neither would cross over to the other with evil intent at the mountain,
  footnotes:
  - marker: a
    text: Or 'departed from Gilead on the first day of the month, in the tenth year; and they told Laban, and he'.
    reason: previous_rendering
  - marker: b
    text: Or 'and spoke to Laban concerning Jacob'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:48Z'
    unchanged: false
    changes_summary: 'Revised several phrases for closer lexical accuracy and more natural formal English: ''concealed his intention'' to ''concealed his heart''; ''turned back toward Gilead'' to ''departed from Gilead''; ''Laban was told'' to ''they told Laban''; ''did not permit'' to ''did not allow''; ''by night'' to ''at night''; and ''for Jacob’s sake'' to ''concerning Jacob.'' Also removed ''of witness,'' which is not present in the provided source at the end of the verse.'
translation:
  language: es
  text: desde la tierra de Galaad. Y Jacob ocultó su corazón a Labán y no se lo dijo. Y en la cuarta semana, en el séptimo año, Jacob se dirigió hacia Galaad en el primer mes, el día veintiuno; y Labán lo persiguió y alcanzó a Jacob en el monte de Galaad en el tercer mes, el día trece. Pero Yahvé no le permitió hacerle daño a Jacob, porque se le apareció en un sueño por la noche, y Labán le dijo a Jacob. Y el día quince de esos días Jacob hizo un banquete para Labán y para todos los que habían venido con él, y Jacob juró a Labán aquel día, y Labán también a Jacob, que ninguno cruzaría hacia el otro con mala intención en el monte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ምድረ፡ ገለአድ፡
  english_pob_choice: from the land of Gilead
  chosen_spanish: desde la tierra de Galaad
  alternatives_spanish:
  - de la tierra de Galaad
  - desde la región de Galaad
  lexicon: Gilead/Galaad; land/tierra
  rationale: «Desde» conserva el movimiento de origen del contexto narrativo, y «tierra» sigue de cerca el valor geográfico del hebreo/geeʒ sin forzar una fórmula litúrgica. Se usa «Galaad» por consistencia toponímica en español.
- source_word: ወኀብአ፡ ያዕቆብ፡ ልቦ፡ ላባን፡
  english_pob_choice: And Jacob concealed his heart from Laban
  chosen_spanish: Y Jacob ocultó su corazón a Labán
  alternatives_spanish:
  - Y Jacob ocultó su intención a Labán
  - Y Jacob escondió su corazón de Labán
  lexicon: heart/heart as intention or inward purpose
  rationale: Se conserva «su corazón» porque el texto ge'ez dice literalmente «corazón»; la POB inglesa mantiene esa imagen. «Ocultó» evita modernizar demasiado y deja la metáfora interior abierta sin convertirla en paráfrasis.
- source_word: ተመይጠ፡ ... ገለአድሃ፡
  english_pob_choice: Jacob turned toward Gilead
  chosen_spanish: Jacob se dirigió hacia Galaad
  alternatives_spanish:
  - Jacob volvió hacia Galaad
  - Jacob se encaminó hacia Galaad
  lexicon: turned toward / direction change
  rationale: La forma española expresa dirección sin sugerir necesariamente una vuelta física total. «Se dirigió hacia» refleja bien el sentido direccional del ge'ez y evita el error de «salió de Galaad» que no corresponde al texto fuente.
- source_word: ወአሚሩ
  english_pob_choice: on the twenty-first
  chosen_spanish: el día veintiuno
  alternatives_spanish:
  - el veintiuno
  - el día veintiuno del mes
  lexicon: date numeral
  rationale: Se explicita «día» para claridad en español, manteniendo la concisión del original. No se añade «del mes» porque el contexto inmediato ya marca «en el primer mes».
- source_word: ወነገሮ፡ ላባ፡ ለያዕቆብ፡
  english_pob_choice: and Laban told Jacob
  chosen_spanish: y se informó a Labán
  alternatives_spanish:
  - y Labán fue informado
  - y se le dijo a Labán
  lexicon: tell/inform; passive-like narration
  rationale: El ge'ez presenta a Labán como receptor de la comunicación, no como hablante. La formulación impersonal en español conserva esa pasividad sin inventar sujeto agente. Se evita armonizar con Génesis 31:24.
- source_word: ወረከቦ፡ ለያዕቆብ፡
  english_pob_choice: and overtook Jacob
  chosen_spanish: y alcanzó a Jacob
  alternatives_spanish:
  - y dio alcance a Jacob
  - y atrapó a Jacob
  lexicon: overtake/overcome
  rationale: «Alcanzó» es natural en español y comunica el encuentro/persiguimiento sin introducir un matiz excesivamente violento.
- source_word: ከመ፡ ይሕክም፡ ላዕለ፡ ያዕቆብ፡
  english_pob_choice: But the LORD did not allow him to harm Jacob
  chosen_spanish: Pero Yahvé no le permitió hacerle daño a Jacob
  alternatives_spanish:
  - Pero Yahvé no le permitió dañar a Jacob
  - Pero Yahvé no permitió que le hiciera daño a Jacob
  lexicon: YHWH/Yahvé; harm/do harm
  rationale: Se usa «Yahvé» según la norma del proyecto. «Hacerle daño» conserva el sentido general de causar mal sin especificar una lesión concreta que el texto no detalla.
- source_word: እስመ፡ አስተርአዮ፡ በሕልም፡ ሌሊተ፡
  english_pob_choice: for he appeared to him in a dream at night
  chosen_spanish: porque se le apareció en sueños por la noche
  alternatives_spanish:
  - porque se le apareció en un sueño de noche
  - porque se le apareció de noche en un sueño
  lexicon: appear in a dream / at night
  rationale: «En sueños» es una manera natural en español para el plural/intensivo del contexto onírico; «por la noche» traduce el valor temporal sin sobrecargarlo. No se identifica al sujeto de la aparición con más precisión de la que ofrece el texto.
- source_word: ወነገሮ፡ ላባ፡ ለያዕቆብ፡
  english_pob_choice: and Laban told Jacob / spoke to Laban concerning Jacob
  chosen_spanish: y habló a Labán acerca de Jacob
  alternatives_spanish:
  - y le habló a Labán acerca de Jacob
  - y habló a Labán sobre Jacob
  lexicon: speak/tell; concerning Jacob
  rationale: La revisión del inglés indicó que el sujeto correcto es Labán como destinatario de la acción comunicativa, y que la relación con Jacob es el contenido o asunto. «Habló a Labán acerca de Jacob» deja esa relación explícita sin forzar una reproducción demasiado rígida de la sintaxis ge'ez.
- source_word: ወመሐለ፡ ያዕቆብ፡ ለላባ፡
  english_pob_choice: Jacob swore to Laban
  chosen_spanish: Jacob hizo un juramento a Labán
  alternatives_spanish:
  - Jacob juró a Labán
  - Jacob le juró a Labán
  lexicon: swear/oath
  rationale: «Hizo un juramento» conserva el acto solemne y suena más idiomático y claro en español que un «juró» potencialmente ambiguo en cuanto al complemento indirecto.
theological_decisions:
- issue: Divine name rendering
  english_pob_reading: the LORD did not allow him to harm Jacob
  chosen_spanish_reading: Yahvé no le permitió hacerle daño a Jacob
  alternative_spanish_readings:
  - el SEÑOR no le permitió hacerle daño a Jacob
  - el Señor no le permitió hacerle daño a Jacob
  rationale: El proyecto especifica que יהוה/YHWH debe traducirse como «Yahvé» en el texto principal. Aquí no hay razón contextual para enmascararlo con «SEÑOR»; además, la frase se refiere claramente al Dios de Israel que interviene en favor de Jacob.
  doctrine_reference: Tetragrammaton rendering policy
- issue: Concealed his heart / inward intent
  english_pob_reading: And Jacob concealed his heart from Laban
  chosen_spanish_reading: Y Jacob ocultó su corazón a Labán
  alternative_spanish_readings:
  - Y Jacob ocultó su intención a Labán
  - Y Jacob escondió su corazón de Labán
  rationale: 'Se preserva la tensión entre literalidad y sentido: el texto habla del «corazón», pero en español esa metáfora puede entenderse como el centro interior o la intención. No se desliteraliza en el texto principal para no borrar el rasgo semítico del original.'
  doctrine_reference: semantic transparency / figurative language
- issue: Communication verb ambiguity
  english_pob_reading: and Laban told Jacob
  chosen_spanish_reading: y habló a Labán acerca de Jacob
  alternative_spanish_readings:
  - y Labán fue informado sobre Jacob
  - y se informó a Labán acerca de Jacob
  rationale: La evidencia revisada corrige una lectura anterior que armonizaba indebidamente con Génesis. La traducción española debe conservar que el ge'ez presenta a Labán como destinatario del hablar, no como agente, y que el asunto es Jacob.
  doctrine_reference: source primacy / anti-harmonization
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión que corrigió dos puntos decisivos del audit trail: 1) el movimiento de Jacob no es ''salir de Galaad'' sino ''dirigirse hacia Galaad'', y 2) la clausula verbal final no debe armonizarse con Génesis; el ge''ez presenta a Labán como receptor de la comunicación. También seguí la revisión que eliminó la expansión ''monte de testimonio'', ya que no está en el texto fuente provisto.'
  spanish_consistency_notes:
  - Se mantiene 'Galaad' de forma uniforme para el topónimo.
  - Se usa 'Yahvé' conforme a la política del proyecto para YHWH.
  - Se preserva 'corazón' como metáfora interior sin normalizarla a 'intención' en el texto principal.
  - No se añadieron notas al pie porque las lecturas alternativas clave quedaron resueltas en el cuerpo del texto y cualquier nota sin anclaje habría sido inválida.
