  yaml_path: translation/extra_canonical/jubilees/032/019.yaml
  text: all the children of men. And I will give to your seed all the earth that is under heaven, and they will rule over all the nations as they desire; and after this they will draw the whole earth to themselves and inherit it.
  footnotes:
