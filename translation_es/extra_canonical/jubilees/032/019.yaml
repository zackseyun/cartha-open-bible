review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del ge''ez y del POB inglés: promesa a la descendencia, dominio sobre las naciones y posesión/herencia de la tierra. Sin embargo, omite el matiz explícito de totalidad en la frase inicial, ya que el inglés auditado dice ''all the children of men'' y el ge''ez apunta al conjunto de la humanidad. También conviene afinar la expresión final para que suene más natural en español sin perder la idea de atraer/reunir la tierra para sí.'
  spanish_quality_summary: El texto es claro y digno, pero 'hijos de los hombres' sin 'todos' queda algo incompleto frente a la evidencia fuente, especialmente porque el versículo parece continuar una frase previa. 'Atraerán toda la tierra hacia sí' es entendible, pero 'para sí' suena más idiomático en español bíblico-contemporáneo para expresar consolidación/posesión. La nota alternativa está bien orientada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Descendencia', 'gobernarán sobre' y 'heredarán' están bien elegidos. La revisión propuesta no afecta términos teológicos mayores; solo refuerza la totalidad de 'todos los hijos de los hombres' y mejora la naturalidad de 'atraerán toda la tierra para sí[a]'.
  issues:
  - severity: medium
    issue: Falta el matiz de totalidad en la frase inicial.
    rationale: La evidencia inglesa auditada dice 'all the children of men', mientras que el borrador solo tiene 'hijos de los hombres'. Añadir 'todos los' preserva mejor la fuente.
  - severity: low
    issue: La expresión 'hacia sí' es menos natural que 'para sí' en este contexto.
    rationale: El verbo ge'ez, según la auditoría inglesa, comunica reunir/atraer/consolidar para apropiación o dominio. En español, 'atraerán toda la tierra para sí' expresa mejor esa consolidación sin sonar forzado.
  revised_spanish_text: todos los hijos de los hombres. Y daré a tu descendencia toda la tierra que está debajo del cielo, y gobernarán sobre todas las naciones como deseen; y después de esto atraerán toda la tierra para sí[a] y la heredarán.
  revised_footnotes:
  - marker: a
    text: O «reunirán toda la tierra para sí».
    reason: alternative_reading
  revision_rationale: Se añade 'todos los' para reflejar con fidelidad la totalidad presente en la fuente auditada ('all the children of men'). También se ajusta 'hacia sí' a 'para sí' para un español más natural que siga comunicando la idea documentada de atraer/reunir la tierra bajo su control. La nota alternativa se conserva porque refleja la opción semántica importante preservada por el POB inglés.
