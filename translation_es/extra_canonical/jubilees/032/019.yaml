    changes_summary: Changed 'rule among all the nations' to 'rule over all the nations' for more accurate and natural rendering of dominion.
translation:
  language: es
  text: todos los hijos de los hombres. Y daré a tu descendencia toda la tierra que está debajo del cielo, y gobernarán sobre todas las naciones como deseen; y después de esto atraerán toda la tierra para sí[a] y la heredarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reunirán toda la tierra para sí».
    reason: alternative_reading
lexical_decisions:
- source_word: ውሉደ፡ ሰብእ
  english_pob_choice: all the children of men
  chosen_spanish: hijos de los hombres
  alternatives_spanish:
  - todos los hijos de los hombres
  - la descendencia de los hombres
  lexicon: Jubilees/Ge'ez phrase for humanity
  rationale: La expresión apunta al conjunto de la humanidad; en español, «hijos de los hombres» conserva la fórmula bíblica y el sentido colectivo sin añadir explicaciones ajenas al texto.
- source_word: ወእሁብ
  english_pob_choice: I will give
  chosen_spanish: daré
  alternatives_spanish:
  - yo daré
  - voy a dar
  lexicon: verbo de concesión
  rationale: Futuro simple natural en español para mantener la promesa directa y solemne del original.
- source_word: ለዘርእከ
  english_pob_choice: to your seed
  chosen_spanish: a tu descendencia
  alternatives_spanish:
  - a tu simiente
  - a tu linaje
  lexicon: descendencia / seed
  rationale: «Descendencia» comunica bien la referencia genealógica y es más inteligible en español contemporáneo que «simiente», sin perder el valor colectivo.
- source_word: ኵላ፡ ምድረ፡ ከመትሕተ፡ ሰማይ
  english_pob_choice: all the earth that is under heaven
  chosen_spanish: toda la tierra que está debajo del cielo
  alternatives_spanish:
  - toda la tierra bajo el cielo
  - toda la tierra que hay debajo del cielo
  lexicon: earth under heaven
  rationale: Mantiene la imagen espacial del original con español natural y reverente; «debajo del cielo» conserva la amplitud total de la expresión.
- source_word: ይኴንኑ
  english_pob_choice: they will rule over
  chosen_spanish: gobernarán sobre
  alternatives_spanish:
  - reinarán sobre
  - dominarán sobre
  lexicon: dominion verb
  rationale: «Gobernarán sobre» expresa dominio sin volver el español demasiado rígido; preserva la fuerza de autoridad indicada por el contexto y por la revisión inglesa.
- source_word: በከመ፡ ፈቀዱ
  english_pob_choice: as they desire
  chosen_spanish: como deseen
  alternatives_spanish:
  - como quieran
  - según deseen
  lexicon: desire / will
  rationale: La cláusula adverbial comunica libertad de acción o ejercicio de dominio; «como deseen» sigue de cerca el sentido y suena natural.
- source_word: አስተጋብኡ
  english_pob_choice: draw the whole earth to themselves
  chosen_spanish: atraerán toda la tierra hacia sí
  alternatives_spanish:
  - reunirán toda la tierra para sí
  - congregarán toda la tierra para sí
  lexicon: gather/assemble
  rationale: La revisión inglesa destaca que el verbo implica reunir/concentrar más que una simple acción física. «Atraerán… hacia sí» conserva la idea de reclutamiento o incorporación total y evita la extrañeza de «gather the earth» en español.
- source_word: ይወርስዋ
  english_pob_choice: inherit it
  chosen_spanish: la heredarán
  alternatives_spanish:
  - la poseerán como herencia
  - tomarán posesión de ella
  lexicon: inherit
  rationale: «Heredarán» es el equivalente directo y bíblicamente estable para la idea de recibir posesión por derecho de herencia.
theological_decisions:
- issue: Dominio sobre las naciones
  english_pob_reading: they will rule over all the nations
  chosen_spanish_reading: gobernarán sobre todas las naciones
  alternative_spanish_readings:
  - reinarán sobre todas las naciones
  - dominarán sobre todas las naciones
  rationale: La revisión inglesa corrigió la relación preposicional para indicar dominio efectivo. «Gobernarán sobre» conserva esa lectura sin cargar el texto con una connotación más dura de «dominarán», aunque esta última sigue siendo posible como alternativa lexical.
  doctrine_reference: No doctrinal reference; lexical/syntactic clarification based on source and revision history.
- issue: Atraer o reunir toda la tierra
  english_pob_reading: they will draw the whole earth to themselves
  chosen_spanish_reading: atraerán toda la tierra hacia sí
  alternative_spanish_readings:
  - reunirán toda la tierra para sí
  - congregarán toda la tierra para sí
  rationale: El historial de revisión aclara que el verbo ge'ez expresa reunir, colectar o consolidar. En español, «atraerán… hacia sí» mantiene la idea de incorporación total sin hacer literal una imagen que resultaría extraña; la nota preserva la alternativa de «reunir» como posibilidad válida.
  doctrine_reference: No doctrinal reference; textual-semantic clarification from revision note.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que ajustó el dominio a «sobre todas las naciones» y la revisión de matiz que entiende አስተጋብኡ como «draw/gather the whole earth to themselves», evitando una traducción demasiado literal o física de «gather the whole earth».
  spanish_consistency_notes:
  - Se mantiene «descendencia» para seed en vez de «simiente», por claridad en español contemporáneo.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton ni una cita explícita de κύριος.
  - «Hijos de los hombres» conserva el giro bíblico colectivo y no individualiza la frase.
  - «Heredarán» mantiene la terminología patrimonial típica de herencia bíblica sin añadir interpretación.
  - El registro es solemne, pero con sintaxis española natural y legible.
