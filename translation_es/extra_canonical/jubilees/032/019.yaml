- from: hijos de los hombres. Y daré a tu descendencia toda la tierra que está debajo del cielo, y gobernarán sobre todas las naciones como deseen; y después de esto atraerán toda la tierra hacia sí[a] y la heredarán.
  to: todos los hijos de los hombres. Y daré a tu descendencia toda la tierra que está debajo del cielo, y gobernarán sobre todas las naciones como deseen; y después de esto atraerán toda la tierra para sí[a] y la heredarán.
  rationale: Se añade 'todos los' para reflejar con fidelidad la totalidad presente en la fuente auditada ('all the children of men'). También se ajusta 'hacia sí' a 'para sí' para un español más natural que siga comunicando la idea documentada de atraer/reunir la tierra bajo su control. La nota alternativa se conserva porque refleja la opción semántica importante preservada por el POB inglés.
