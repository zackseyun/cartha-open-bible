translation:
  language: es
  text: de la oración que había orado, para diezmar juntamente con sus sacrificios y sus libaciones. Y cuando el fuego lo hubo consumido, quemó incienso sobre él en el fuego, y para el sacrificio de liberación ofreció dos toros y cuatro carneros y cuatro ovejas y cuatro machos cabríos y cuatro ovejas de un año.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: መበአ፡ እምጸሎት፡ እንተ፡ ጸለየ፡
  english_pob_choice: from the prayer that he had prayed
  chosen_spanish: a partir de la oración que había hecho
  alternatives_spanish:
  - desde la oración que había orado
  - de la oración que había orado
  lexicon: oración / orar
  rationale: El geʿez expresa un origen o punto de partida ligado a una oración ya pronunciada. En español, “a partir de” comunica bien esa dependencia sin endurecer la sintaxis, y “oración” mantiene el valor de prayer. “Había hecho” evita repetir un verbo devocional de forma pesada y sigue la relación histórica indicada por el participio perfecto.
- source_word: የዐሥር፡ ምስለ፡ መሥዋዕተሙ፡ ወጥዓሕቶሙ።
  english_pob_choice: that he should tithe together with their sacrifices and their drink offerings
  chosen_spanish: para diezmar juntamente con sus sacrificios y sus libaciones
  alternatives_spanish:
  - para diezmar junto con sus sacrificios y sus ofrendas de libación
  - que diezmara juntamente con sus sacrificios y sus libaciones
  lexicon: diezmar / sacrificios / libaciones
  rationale: El verbo base es “diezmar”, y el contexto requiere expresar asociación con sacrificios y libaciones. “Libaciones” es el término más preciso y sobrio para ὀlibation/drink offering, y “juntamente con” conserva la relación de acompañamiento. Se mantiene el plural ‘sus’ conforme al geʿez, que usa sufijos de tercera persona plural.
- source_word: ወሶበ፡ በልዖ፡ እሳት፡
  english_pob_choice: And when the fire had consumed it
  chosen_spanish: Y cuando el fuego lo hubo consumido
  alternatives_spanish:
  - Y cuando el fuego lo consumió
  - Y cuando el fuego hubo consumido eso
  lexicon: consumir
  rationale: El texto revisado corrige la omisión de la cláusula y el objeto implícito. “Lo hubo consumido” reproduce el valor perfecto anterior a la acción siguiente y mantiene el referente neutro. No se añade “holocausto”, porque el geʿez dice simplemente “lo” y el contexto ya lo identifica.
- source_word: የዐጥን፡ ስኂነ፡ ዴቤሁ፡ በእሳት፡
  english_pob_choice: he burned frankincense upon it in the fire
  chosen_spanish: quemó incienso sobre él en el fuego
  alternatives_spanish:
  - quemó incienso sobre él en el fuego
  - hizo humear incienso sobre él en el fuego
  lexicon: incienso / quemar
  rationale: El geʿez indica que quemó incienso sobre la ofrenda “en el fuego”. “Quemó incienso” es claro y fiel; “hizo humear” sería más técnico pero menos natural en este contexto para español bíblico moderno. Se conserva “sobre él” para el referente sacrificial y la repetición de “en el fuego” que el original enfatiza.
- source_word: መሥዋዕተ፡ መድኃኒት፡
  english_pob_choice: the sacrifice of deliverance
  chosen_spanish: el sacrificio de liberación
  alternatives_spanish:
  - el sacrificio de salvación
  - el sacrificio de liberación
  lexicon: sacrificio / liberación
  rationale: POB eligió “deliverance”; en español, “liberación” conserva el sentido de rescate/puesta en libertad sin cargarlo de una terminología doctrinal posterior. “Salvación” sería posible, pero aquí estrecha demasiado el matiz ritual y narrativo. Se deja la fórmula singular porque el geʿez usa un sintagma singular.
- source_word: አበዋረ፡ ክልኤተ፡
  english_pob_choice: two oxen
  chosen_spanish: dos toros
  alternatives_spanish:
  - dos bueyes
  - dos toros
  lexicon: animal sacrificial / bovino
  rationale: “Toros” es natural en español para bovinos machos adultos de sacrificio y evita la ambigüedad de “bueyes”, que puede sugerir animales de labor castrados. Mantiene el tono sacrificial del catálogo.
- source_word: ወአብሓከ፡ አርባዕተ፡
  english_pob_choice: four rams
  chosen_spanish: cuatro carneros
  alternatives_spanish:
  - cuatro machos carneros
  - cuatro carneros
  lexicon: ram / sheep category
  rationale: “Carneros” es la equivalencia estándar y digna para rams. Conserva la enumeración exacta sin expansión.
- source_word: ወአባግዐ፡ አርባዕተ፡
  english_pob_choice: four sheep
  chosen_spanish: cuatro ovejas
  alternatives_spanish:
  - cuatro ovejas
  - cuatro corderas
  lexicon: sheep
  rationale: El geʿez distingue el grupo de sheep de los yearling sheep posteriores. “Ovejas” mantiene la distinción general y evita sobreespecificar edad o sexo no marcado aquí.
- source_word: '*ይቤላት፡ አርባዕተ፡ / ፭'
  english_pob_choice: four he-goats / five he-goats
  chosen_spanish: cuatro machos cabríos
  alternatives_spanish:
  - cuatro machos cabríos
  - cinco machos cabríos
  lexicon: he-goat
  rationale: 'La revisión crítica muestra que el número correcto es cuatro, no cinco: el ፭ del aparato no debe leerse como parte del texto. “Machos cabríos” es preciso y evita el posible tono coloquial de “chivos”.'
- source_word: ወአባግዐ፡ ዘዘ፡ ዓመት፡
  english_pob_choice: four yearling sheep
  chosen_spanish: cuatro corderas de un año
  alternatives_spanish:
  - cuatro corderos de un año
  - cuatro ovejas de un año
  lexicon: yearling sheep
  rationale: “De un año” reproduce la indicación etaria. Dado que el geʿez distingue este grupo final del anterior, “corderas” resulta una opción natural para animales jóvenes de sacrificio y permite diferenciarlo de las “ovejas” anteriores; no se afirma más de lo que el texto permite.
theological_decisions:
- issue: Relación entre la oración previa y la acción sacrificial
  english_pob_reading: from the prayer that he had prayed, that he should tithe together with their sacrifices and their drink offerings
  chosen_spanish_reading: a partir de la oración que había hecho, para diezmar juntamente con sus sacrificios y sus libaciones
  alternative_spanish_readings:
  - desde la oración que había orado, que diezmara juntamente con sus sacrificios y sus libaciones
  rationale: No se diluye la conexión causal o de derivación entre oración y ofrenda. La sintaxis española elegida hace visible que la práctica ritual sigue de la oración previa, sin convertir el pasaje en una paráfrasis devocional. Además, se preserva el plural de las ofrendas conforme al geʿez.
  doctrine_reference: Narrative sacrifice and prayer in Jubilees; no dogmatic expansion beyond the text.
- issue: Texto revisado sobre el fuego y el incienso
  english_pob_reading: And when the fire had consumed it, he burned frankincense upon it in the fire
  chosen_spanish_reading: Y cuando el fuego lo hubo consumido, quemó incienso sobre él en el fuego
  alternative_spanish_readings:
  - Y cuando el fuego lo consumió, quemó incienso sobre él en el fuego
  rationale: 'La cláusula omitida en un estado anterior debe mantenerse porque forma parte del testimonio textual. Traducirla explícitamente evita esconder la secuencia ritual: consumación de la ofrenda y acto de incienso sobre ella.'
  doctrine_reference: Textual fidelity to Jubilees 32:6; no doctrinal interpretation added.
- issue: Número de machos cabríos
  english_pob_reading: four he-goats
  chosen_spanish_reading: cuatro machos cabríos
  alternative_spanish_readings:
  - cinco machos cabríos
  rationale: La tradición crítica indicada en el expediente corrige una lectura errónea de cinco a cuatro. La versión española sigue la evidencia geʿez y no perpetúa el número incorrecto.
  doctrine_reference: Critical textual reading of Jubilees 32:6.
translation_notes:
  revision_awareness: 'La versión precedente presentó tres problemas mayores: omitió la cláusula del incienso, leyó erróneamente cinco machos cabríos donde el geʿez dice cuatro, y alteró indebidamente el plural de las ofrendas a singular. Esta revisión corrige esos puntos y mantiene el texto estrechamente alineado con el geʿez y con el expediente crítico inglés.'
  spanish_consistency_notes:
  - Se emplea ‘Yahvé’ solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - ‘Libaciones’ se usa para drink offerings por consistencia con el léxico sacrificial del proyecto.
  - Se evita introducir notas al pie no ancladas en el texto para cumplir la validación solicitada.
