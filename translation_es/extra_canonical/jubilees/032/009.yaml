base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/009.yaml
  text: This is a testimony of joy like this joy. And formerly they used to call the land of Gilead the land of the Rephaim, because it is the land of the Rephaim; and Rephaim were born there, giants whose height was ten cubits, and nine cubits, and eight cubits, and down to seven cubits.
  footnotes:
  - marker: a
    text: Or 'according to this testimony'.
    reason: previous_rendering
  - marker: b
    text: Or 'nine cubits, and eight cubits, and down to seven cubits'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:48Z'
    unchanged: false
    changes_summary: Revised the opening clause from 'This ordinance is for testimony forever' to 'This is a testimony of joy according to this testimony' to reflect the repeated term for joy/testimony in the Ge'ez rather than ordinance/forever. The rest of the verse was retained with minor consistency in phrasing.
translation:
  language: es
  text: Esto es un testimonio de alegría[a] como esta alegría. Y antes solían llamar a la tierra de Galaad la tierra de los refaítas, porque es la tierra de los refaítas; y allí nacieron refaítas, gigantes cuya estatura era de diez codos, y nueve codos, y ocho codos, y hasta siete codos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘un testimonio según esta alegría’.
    reason: alternative_reading
  - marker: b
    text: 'La secuencia numérica refleja la revisión textual: el ge''ez enumera diez, nueve, ocho y hasta siete codos.'
    reason: textual_variant
lexical_decisions:
- source_word: ፍሥሐተ / ስምዕ
  english_pob_choice: This is a testimony of joy
  chosen_spanish: Esto es un testimonio de alegría
  alternatives_spanish:
  - Esto es un testimonio de gozo
  - Esto es un testimonio gozoso
  lexicon: ፍሥሐተ = alegría/gozo; ስምዕ = testimonio
  rationale: El ge'ez distingue aquí entre ‘alegría’ y ‘testimonio’; en español conviene conservar ambos elementos sin fundirlos. ‘Testimonio de alegría’ refleja la estructura y mantiene la tensión semántica del original.
- source_word: ከመዝ፡ ፍሥሐተ
  english_pob_choice: like this joy
  chosen_spanish: como esta alegría
  alternatives_spanish:
  - según esta alegría
  - tal como esta alegría
  lexicon: ከመ = como/como si; ዝ = esta; ፍሥሐተ = alegría
  rationale: La revisión auditada corrige ‘according to this testimony’ por ‘like this joy’. En español, ‘como esta alegría’ preserva la comparación literal y evita introducir una idea de norma o medida que el ge'ez no exige.
- source_word: ምድረ፡ ገለአድ
  english_pob_choice: the land of Gilead
  chosen_spanish: la tierra de Galaad
  alternatives_spanish:
  - el territorio de Galaad
  - la región de Galaad
  lexicon: Topónimo bíblico Gilead/Galaad
  rationale: Se usa la forma bíblica establecida ‘Galaad’, natural en español e identificable para lectores eclesiales.
- source_word: ምድረ፡ ራፋኤል / ምድረ፡ ረፋኤም
  english_pob_choice: the land of the Rephaim
  chosen_spanish: la tierra de los refaítas
  alternatives_spanish:
  - la tierra de los rafaim
  - la tierra de los Refaím
  lexicon: Rephaim / רְפָאִים
  rationale: '‘Refaítas’ conserva la transliteración bíblica en forma castellana y evita confundir el etnónimo con ‘refael/rafael’. La repetición mantiene el énfasis del original: la tierra era asociada con estos seres/pueblos.'
- source_word: ወትወልዱ፡ ራፋኤም
  english_pob_choice: and Rephaim were born there
  chosen_spanish: y allí nacieron refaítas
  alternatives_spanish:
  - y los refaítas nacieron allí
  - y allí fueron engendrados refaítas
  lexicon: passive/resultative birth expression
  rationale: ‘Nacieron allí’ comunica de forma natural el dato geográfico-origen, sin añadir un agente que el texto no expresa.
- source_word: ረዐይት
  english_pob_choice: giants
  chosen_spanish: gigantes
  alternatives_spanish:
  - hombres gigantes
  - seres gigantes
  lexicon: 巨人/giants sense in contextual gloss
  rationale: La glosa inglesa identifica a los refaítas como gigantes. ‘Gigantes’ es la equivalencia directa y readable en español.
- source_word: ፱ሥር / ዐሥር, ትስዕ, ስምን, ስብዕ
  english_pob_choice: ten cubits, and nine cubits, and eight cubits, and down to seven cubits
  chosen_spanish: diez codos, y nueve codos, y ocho codos, y hasta siete codos
  alternatives_spanish:
  - diez codos, nueve codos, ocho codos, y hasta siete codos
  - diez codos, luego nueve, ocho y hasta siete codos
  lexicon: numeric sequence with cubit measurement
  rationale: La revisión textual recupera el primer número omitido en la traducción inglesa final. En español se conserva la secuencia completa de alturas y la repetición de ‘codos’ para no suavizar el paralelismo cuantitativo.
theological_decisions:
- issue: Sentido de ‘testimonio’ vs. ‘joy’ en la apertura
  english_pob_reading: This is a testimony of joy like this joy.
  chosen_spanish_reading: Esto es un testimonio de alegría como esta alegría.
  alternative_spanish_readings:
  - Esto es un testimonio de gozo como este gozo
  - Esto es un testimonio de alegría semejante a esta alegría
  rationale: El texto ge'ez usa dos términos distintos; uno para ‘testimonio’ y otro para ‘alegría’. La redacción española conserva ambos para no borrar la tensión semántica que llevó a la revisión del inglés POB.
  doctrine_reference: Fidelidad textual y preservación de la distinción léxica del original
- issue: Identificación de los refaítas como gigantes
  english_pob_reading: giants whose height was...
  chosen_spanish_reading: gigantes cuya estatura era...
  alternative_spanish_readings:
  - gigantes de estatura...
  - seres gigantes cuya altura era...
  rationale: La frase mantiene la afirmación tradicional del texto sin reinterpretar los refaítas. ‘Estatura’ conserva el sentido físico y la relación con la medición en codos.
  doctrine_reference: Lectura histórica/literal del pasaje sobre los refaítas
translation_notes:
  revision_awareness: 'La base inglesa revisada corrigió dos problemas importantes: (1) la apertura no debe decir ‘ordinance for testimony forever’, sino ‘testimony of joy like this joy’; (2) la serie de medidas incluye cuatro números, comenzando con diez codos. El español sigue esa lectura revisada y evita repetir el error previo de convertir ‘joy’ en ‘testimony’ o de omitir diez codos.'
  spanish_consistency_notes:
  - Se mantiene ‘Galaad’ como forma estable en español bíblico.
  - Se usa ‘refaítas’ de forma consistente para el etnónimo; no se sustituye por ‘rafaítas’ para evitar confusión con Rafael.
  - Se conserva ‘codos’ como unidad tradicional de medida en textos bíblicos españoles.
  - El tono es sobrio y publicable, con sintaxis directa y sin amplificación interpretativa.
