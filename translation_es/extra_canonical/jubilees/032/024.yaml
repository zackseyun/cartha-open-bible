  text: And he came to the land of Ephrath, and he stayed there. And Rachel gave birth in the night to a son, and she called his name Son of My Sorrow, because she suffered while giving birth; but his father called his name Benjamin, on the eleventh of the eighth month, in the first year of the sixth week of this jubilee.
