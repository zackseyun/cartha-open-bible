translation:
  language: es
  text: Y llegó a la tierra de Efrata, y se quedó allí. Y Raquel dio a luz en la noche a un hijo, y lo llamó Hijo de mi dolor, porque sufrió al dar a luz; pero su padre lo llamó Benjamín[a], el once del octavo mes, en el primer año de la sexta semana de este jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Benjamín se entiende tradicionalmente como «hijo de la diestra»; también puede asociarse con «hijo del sur».
    reason: Aclara el contraste entre el nombre dado por Raquel y el nombre dado por el padre, sin sobrecargar el texto principal.
lexical_decisions:
- source_word: land of Ephrath
  english_pob_choice: the land of Ephrath
  chosen_spanish: la tierra de Efrata
  alternatives_spanish:
  - la tierra de Efrat
  - la región de Efrata
  lexicon: Efrath/Ephrath
  rationale: Conservo el topónimo bíblico con forma española naturalizada, sin añadir explicaciones que el texto no exige. "Tierra" reproduce bien el sentido geográfico del inglés POB.
- source_word: gave birth in the night
  english_pob_choice: gave birth in the night
  chosen_spanish: dio a luz en la noche
  alternatives_spanish:
  - parió en la noche
  - tuvo al hijo en la noche
  lexicon: yālad / parturition context
  rationale: '"Dar a luz" es la expresión más clara y digna en español bíblico contemporáneo; mantiene el hecho de parto nocturno sin sobrerretórica.'
- source_word: Son of My Sorrow
  english_pob_choice: Son of My Sorrow
  chosen_spanish: Hijo de mi dolor
  alternatives_spanish:
  - Hijo de mi pena
  - Hijo de mi aflicción
  lexicon: name-interpretation formula
  rationale: Sigo de cerca la designación explicativa del inglés POB. "Dolor" conserva la carga emocional y el paralelismo con el motivo causal "porque sufrió al dar a luz".
- source_word: suffered while giving birth
  english_pob_choice: she suffered while giving birth
  chosen_spanish: sufrió al dar a luz
  alternatives_spanish:
  - padeció al dar a luz
  - tuvo dolores de parto
  lexicon: birthing suffering
  rationale: '"Sufrió" transmite la experiencia de dolor/aflicción sin forzar una lectura médica moderna. Se mantiene la relación causal explícita del texto.'
- source_word: Benjamin
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benjamin
  lexicon: proper name
  rationale: Se usa la forma española habitual del nombre propio bíblico.
- source_word: the eleventh of the eighth month
  english_pob_choice: the eleventh of the eighth month
  chosen_spanish: el once del octavo mes
  alternatives_spanish:
  - el día once del octavo mes
  - once del octavo mes
  lexicon: calendar notation
  rationale: Conservo la datación precisa del original y del inglés POB en forma sobria y legible, adecuada para un registro cronológico.
theological_decisions:
- issue: Meaning of the birth-name explanation
  english_pob_reading: Rachel names the child according to her suffering, while Jacob gives the final naming as Benjamin.
  chosen_spanish_reading: Raquel nombra al niño según su dolor al parir, pero su padre le impone el nombre Benjamín.
  alternative_spanish_readings:
  - Raquel lo llamó Hijo de mi dolor, pero su padre lo llamó Benjamín.
  - Raquel le puso el nombre Hijo de mi dolor; luego su padre lo llamó Benjamín.
  rationale: El texto presenta dos actos nominativos distintos; la traducción conserva esa tensión narrativa sin armonizarlos. "Pero" mantiene el contraste explícito entre el nombre maternal y el paterno.
  doctrine_reference: Narrative fidelity / family naming tension
