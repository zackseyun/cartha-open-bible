base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/004.yaml
  text: He put on priestly garments and filled his hands. And on the fifteenth of this month he brought to the altar from the cattle fourteen oxen and twenty-eight rams, and forty-nine sheep and seven lambs and twenty-one kids,
  footnotes:
  - marker: a
    text: Or 'to the altar as sacrifices from the cattle'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:45Z'
    unchanged: false
    changes_summary: Added the explicit subject 'He' for natural English and changed 'with priestly garments' to 'priestly garments' to reflect the verb 'put on/clothed himself with' more accurately. Retained the rest unchanged.
translation:
  language: es
  text: Se vistió con vestidos sacerdotales y llenó sus manos. Y el quince de este mes llevó al altar[a] desde el ganado catorce toros, y veintiocho carneros, y cuarenta y nueve ovejas, y siete corderos, y veintiún cabritos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «trajo al altar desde el ganado». El ge''ez no añade aquí una glosa equivalente a «como sacrificios».'
    reason: textual_variant
lexical_decisions:
- source_word: አልባሰ፡ ክህነት፡
  english_pob_choice: He put on priestly garments
  chosen_spanish: Se vistió con vestidos sacerdotales
  alternatives_spanish:
  - Se puso vestiduras sacerdotales
  - Se revistió de vestiduras sacerdotales
  lexicon: vestir(se) / vestiduras sacerdotales
  rationale: El ge'ez expresa la acción de ponerse la vestidura sacerdotal; en español, 'se vistió con' conserva el verbo dinámico sin introducir un término litúrgico más técnico de lo que exige el texto.
- source_word: ወመልአ፡ እደዊሁ።
  english_pob_choice: and filled his hands
  chosen_spanish: y llenó sus manos
  alternatives_spanish:
  - y llenó sus manos para el servicio
  - y consagró sus manos
  lexicon: llenar las manos
  rationale: La imagen idiomática de 'llenar las manos' se mantiene literalmente, porque el texto la usa como expresión ritual; añadir una explicación doctrinal en el cuerpo iría más allá del source.
- source_word: ወአመ፡ ዐሡሩ፡ ወኀሙሱ፡ ለዝ፡ ወርኅ፡
  english_pob_choice: And on the fifteenth of this month
  chosen_spanish: Y el quince de este mes
  alternatives_spanish:
  - Y en el día quince de este mes
  - Y el día quince de este mes
  lexicon: fecha ordinal
  rationale: '''El quince de este mes'' es natural en español y conserva la referencia temporal exacta sin sobrecargarla.'
- source_word: አብአ፡ ውስተ፡ ምሥዋዕ፡ አስዋረ፡ እምአልህምት፡
  english_pob_choice: he brought to the altar from the cattle
  chosen_spanish: llevó al altar[a] desde el ganado
  alternatives_spanish:
  - trajo al altar[a] desde el ganado
  - llevó al altar[a] de entre el ganado
  lexicon: altar / ganado
  rationale: El ge'ez indica movimiento hacia el altar 'desde el ganado', no añade 'como sacrificios'. 'Llevó' mantiene el valor de traer/ofrecer sin forzar la escena con un verbo más técnico; 'ganado' cubre el conjunto animal al que el texto alude.
- source_word: ፲፵፡ ወአርባዕተ፡
  english_pob_choice: fourteen oxen
  chosen_spanish: catorce toros
  alternatives_spanish:
  - catorce bueyes
  - catorce reses
  lexicon: bovinos
  rationale: '''Toros'' es un equivalente directo y claro en español contemporáneo para la clase de bovinos adultos mencionada; evita la ambigüedad de ''reses''.'
- source_word: ወሰማኒተ፡
  english_pob_choice: forty-nine sheep
  chosen_spanish: cuarenta y nueve ovejas
  alternatives_spanish:
  - cuarenta y nueve corderas
  lexicon: ovinos
  rationale: '''Ovejas'' reproduce el referente general del ge''ez de forma más natural que un término demasiado técnico o sexado.'
- source_word: ወመሓስዐ፡ ሰብዐተ፡
  english_pob_choice: seven lambs
  chosen_spanish: siete corderos
  alternatives_spanish:
  - siete corderitos
  - siete crías de oveja
  lexicon: cordero
  rationale: '''Corderos'' es la forma española estándar para lambs y mantiene la sencillez del inventario sacrificial.'
- source_word: ወመሓስዐ፡ ጠሊ፡ ፬ሥራ፡ ወአሐደ፡
  english_pob_choice: twenty-one kids
  chosen_spanish: veintiún cabritos
  alternatives_spanish:
  - veintiún chivos jóvenes
  - veintiún machos cabríos jóvenes
  lexicon: cabrito
  rationale: '''Cabritos'' conserva el matiz de crías de cabra que corresponde a ''kids'' y resulta natural en español.'
theological_decisions:
- issue: Sentido ritual de 'llenó sus manos'
  english_pob_reading: filled his hands
  chosen_spanish_reading: llenó sus manos
  alternative_spanish_readings:
  - consagró sus manos
  - ordenó su servicio
  rationale: Se conserva la metáfora ritual sin explicitarla como si fuera una interpretación. El texto no desarrolla el significado, así que la traducción no debe cerrarlo.
  doctrine_reference: uso ritual sacerdotal; lenguaje de investidura
- issue: Relación entre altar y ofrendas animales
  english_pob_reading: to the altar from the cattle
  chosen_spanish_reading: al altar desde el ganado
  alternative_spanish_readings:
  - al altar como sacrificios desde el ganado
  - al altar con animales del ganado
  rationale: La revisión inglesa corrigió la adición 'as sacrifices'; por fidelidad al ge'ez, el español evita añadir esa glosa y preserva solo el movimiento hacia el altar desde el grupo de animales.
  doctrine_reference: sacrificio y precisión textual
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del inglés: ''He put on priestly garments and filled his hands. And on the fifteenth of this month he brought to the altar from the cattle...'' Se evitó reproducir la antigua expansión ''as sacrifices'', ya corregida por revisión textual. También se mantuvo el orden enumerativo de los animales y el sujeto implícito en español mediante verbo reflexivo natural.'
  spanish_consistency_notes:
  - Se prefirió 'vestidos sacerdotales' en lugar de 'vestiduras sacerdotales' para un registro claro y moderno, sin perder el sentido ritual.
  - Se conservó 'llenó sus manos' como calco idiomático controlado, porque es una expresión técnica del marco sacerdotal.
  - '''Altar'' se mantiene sin artículo para seguir de cerca la construcción del original y del inglés auditado.'
  - Los numerales se escriben con palabras, conforme al estilo editorial del proyecto, y se mantuvo la enumeración final con comas para reflejar la serie del texto fuente.
