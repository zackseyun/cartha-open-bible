base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/032/010.yaml
  text: Whoever defiles shall surely die, and he shall be stoned with stones. And there is no limit of days for this law, and no remission or any atonement, except that the man be rooted out who has defiled his daughter in the midst of all Israel, because from his seed he has given to Molech and has acted wickedly by defiling it.
  footnotes:
  - marker: a
    text: Or 'except that they root out the man'.
    reason: previous_rendering
  - marker: b
    text: Or 'by defiling her'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:51:48Z'
    unchanged: false
    changes_summary: Changed 'and no remission and no atonement' to 'and no remission or any atonement' for more natural English while preserving the sense; changed final 'defiling it' to 'defiling her' to match the feminine object 'his daughter' in the verse.
translation:
  language: es
  text: Quien profane[a] ciertamente morirá, y será apedreado con piedras. Y no hay límite de días para esta ley, ni remisión ni expiación alguna, sino que sea eliminado[b] el hombre que ha profanado a su hija en medio de todo Israel, porque de su descendencia ha dado a Moloc y ha obrado perversamente profanándolo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «contamine» o «manche».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sea arrancado» o «sea extirpado»; el ge''ez aquí expresa la eliminación o extirpación del culpable en voz pasiva.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «profanándolo». El audit trail observa que el ge'ez usa aquí un pronombre masculino singular, por lo que no debe entenderse «profanándola» con referencia a la hija.
    reason: source_note
lexical_decisions:
- source_word: ዘያረኵስ / defiles
  english_pob_choice: defiles
  chosen_spanish: profane
  alternatives_spanish:
  - contamine
  - inmunda
  - manche
  lexicon: profanar / profanar(se)
  rationale: El contexto legal-cúltico apunta a una profanación grave; 'profanar' conserva el peso ritual y moral sin sonar demasiado mecánico. 'Contaminar' o 'manchar' podrían suavizar o desplazar el matiz cultual.
- source_word: ሞተ፡ ለይሙት / shall surely die
  english_pob_choice: shall surely die
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - morirá de seguro
  - morirá sin falta
  lexicon: morir
  rationale: La duplicación enfática del original se conserva con 'ciertamente'; es natural en español y mantiene la fuerza jurídica del hebraísmo.
- source_word: ወበእብን፡ ይትወገር / shall be stoned with stones
  english_pob_choice: he shall be stoned with stones
  chosen_spanish: será apedreado con piedras
  alternatives_spanish:
  - será lapidado
  - lo apedrearán con piedras
  lexicon: apedrear / lapidar
  rationale: '''Apedreado con piedras'' reproduce el énfasis de la pena y evita un término demasiado técnico; ''lapidado'' es posible, pero menos transparente para lectores generales.'
- source_word: ወአልቦ፡ ለዝ፡ ሕግ፡ ዐቅመ፡ መዋዕለ / there is no limit of days for this law
  english_pob_choice: there is no limit of days for this law
  chosen_spanish: no hay límite de días para esta ley
  alternatives_spanish:
  - esta ley no tiene plazo
  - no tiene término esta ley
  lexicon: límite de días / plazo
  rationale: La frase describe duración ilimitada; 'límite de días' es bastante literal y comprensible, preservando la cadencia jurídica del original.
- source_word: ወአልቦ፡ ኅድገተ፡ ወኵሎ፡ ስርየተ / no remission or any atonement
  english_pob_choice: no remission or any atonement
  chosen_spanish: ni remisión ni expiación alguna
  alternatives_spanish:
  - ni perdón ni expiación alguna
  - ni remisión ni reconciliación alguna
  lexicon: remisión / expiación
  rationale: '''Remisión'' mantiene el valor jurídico de ''remission'' y ''expiación'' conserva el sentido sacrificial. ''Perdón'' sería posible, pero menos específico en este contexto.'
- source_word: ይሤረው / the man be rooted out
  english_pob_choice: the man be rooted out
  chosen_spanish: el hombre sea eliminado
  alternatives_spanish:
  - sea arrancado
  - sea extirpado
  lexicon: eliminar / arrancar
  rationale: La pasiva del original exige un sujeto paciente; 'sea eliminado' comunica la exclusión/expulsión del culpable sin introducir un agente no expresado. 'Arrancado' sería más imagético, pero menos natural en español.
- source_word: ብእሲ / the man
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el culpable
  lexicon: hombre
  rationale: '''El hombre'' sigue el sustantivo genérico del original y evita añadir una interpretación no explícita.'
- source_word: ወለተ / his daughter
  english_pob_choice: his daughter
  chosen_spanish: a su hija
  alternatives_spanish:
  - a la hija de él
  - a su propia hija
  lexicon: hija
  rationale: La relación posesiva queda clara en español con 'su hija'; mantiene la referencia al daño cometido contra la hija sin sobrecargar la frase.
- source_word: ለሞሎክ / to Molech
  english_pob_choice: to Molech
  chosen_spanish: a Moloc
  alternatives_spanish:
  - a Molec
  - a Mólec
  lexicon: Moloc
  rationale: '''Moloc'' es una forma española estable y reconocible para el nombre del ídolo/deidad, ajustada al uso bíblico en español.'
- source_word: ወአበሰ፡ በአርኵ / has acted wickedly by defiling it
  english_pob_choice: has acted wickedly by defiling it
  chosen_spanish: ha obrado perversamente profanándola
  alternatives_spanish:
  - ha actuado perversamente profanándola
  - ha hecho mal profanándola
  lexicon: obrar perversamente / profanar
  rationale: '''Ha obrado perversamente'' conserva el juicio moral del texto; ''profanándola'' vincula la conducta con la transgresión cultual/sexual. La forma femenina se usa para concordar naturalmente con ''su hija'' en español, aunque el testimonio ge''ez presenta una ambigüedad pronominal que el español debe resolver por contexto.'
theological_decisions:
- issue: Duración indefinida de la ley
  english_pob_reading: there is no limit of days for this law
  chosen_spanish_reading: no hay límite de días para esta ley
  alternative_spanish_readings:
  - esta ley no tiene plazo
  - esta ley permanece sin término
  rationale: La formulación indica vigencia ilimitada de la norma. Se evita reinterpretarla como mera duración práctica; el español conserva el carácter permanente de la sanción/límite legal.
  doctrine_reference: Permanencia normativa y juicio legal en contextos de ley de santidad
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió el sujeto pasivo de la cláusula de expulsión (“the man be rooted out”) y la nota de ambigüedad final en el pronombre ge'ez. En esta versión se mantiene la pasiva para la expulsión y se elige una concordancia femenina en español para el último participio, por claridad contextual, dejando constancia de la ambigüedad de fuente en la nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - «Moloc» se mantiene como forma española estándar del nombre propio.
  - 'Se preserva la secuencia jurídica negativa: «ni remisión ni expiación alguna».'
  - 'Se conserva la pasiva en la expulsión: «el hombre sea eliminado».'
