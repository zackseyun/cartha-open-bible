  to: Quien profane[a] ciertamente morirá, y será apedreado con piedras. Y no hay límite de días para esta ley, ni remisión ni expiación alguna, sino que sea eliminado[b] el hombre que ha profanado a su hija en medio de todo Israel, porque de su descendencia ha dado a Moloc y ha obrado perversamente profanándolo[c].
  rationale: Se corrige el pronombre final para alinearlo con la revisión auditada del ge'ez («it», masculino singular), se restaura la cláusula completa «el hombre que ha profanado a su hija», y se mejora la naturalidad y precisión de «porque de su descendencia ha dado a Moloc». También se ajusta la nota para reflejar la decisión documental ya establecida, en vez de presentar una ambigüedad no resuelta.
