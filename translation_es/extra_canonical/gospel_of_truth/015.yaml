  lexicon: Crum; audit-trail revision note
  rationale: 'La revisión auditada corrige una falsa segmentación que había introducido una frase ajena. El sentido aquí es pasivo: no son revelados de este modo. ''Estos'' mantiene el referente plural del contexto sin añadir material no atestiguado.'
- source_word: ϣⲱⲱⲧ
  english_pob_choice: diminish
  chosen_spanish: disminuyeron
  alternatives_spanish:
  - rebajaron
  - menguaron
  lexicon: Crum 593a
  rationale: El verbo significa 'disminuir, privar, quitar, carecer'; en este contexto la idea es que no rebajaron la gloria del Padre. 'Disminuyeron' es fiel y natural en español.
- source_word: ⲥⲁϣ
  english_pob_choice: harsh
  chosen_spanish: áspero
  alternatives_spanish:
  - duro
  - severo
  lexicon: Crum
  rationale: Se mantiene la triada negativa sobre cómo no consideraron al Padre. 'Áspero' comunica con claridad la cualidad relacional/afectiva sin forzar un término doctrinal.
- source_word: ⲃⲁⲗⲕⲉ
  english_pob_choice: wrathful
  chosen_spanish: airado
  alternatives_spanish:
  - colérico
  - furioso
  lexicon: Crum; context-driven
  rationale: '''Airado'' preserva la idea de ira sin intensificar en exceso. Se evita un lenguaje demasiado moderno o psicológico que altere el tono del texto.'
- source_word: ⲁⲧⲡⲉⲑⲁⲩ
  english_pob_choice: without evil
  chosen_spanish: sin mal
  alternatives_spanish:
  - sin maldad
  - sin mal alguno
  lexicon: Crum
  rationale: Se traduce la privación de manera directa y breve. 'Sin mal' conserva la fuerza negativa y suena más idiomático que 'sin maldad' en esta tríada.
- source_word: ⲁⲧϣⲧⲁⲣⲧⲣ
  english_pob_choice: unperturbed
  chosen_spanish: sin perturbación
  alternatives_spanish:
  - imperturbable
  - sin agitación
  lexicon: Crum; Layton
  rationale: La frase busca una cualidad de calma/no turbación. 'Sin perturbación' conserva la construcción privativa y evita sobreinterpretar el matiz.
- source_word: ⲟⲩϩⲗⲟϭ
  english_pob_choice: sweet
  chosen_spanish: dulce
  alternatives_spanish:
  - amable
  - suave
  lexicon: Crum
  rationale: '''Dulce'' corresponde al valor básico del adjetivo y mantiene la antítesis con ''airado''.'
- source_word: ⲣⲭⲣⲓⲁ
  english_pob_choice: need
  chosen_spanish: necesita
  alternatives_spanish:
  - tiene necesidad
  - requiere
  lexicon: Greek loan; Crum
  rationale: La negación 'no necesita' refleja con naturalidad la ausencia de necesidad en español.
- source_word: ⲙⲛⲧⲛⲁϭ ⲁⲧϣⲓⲧⲥ
  english_pob_choice: immeasurable Greatness
  chosen_spanish: Grandeza inmensurable
  alternatives_spanish:
  - Grandeza sin medida
  - magnitud inmensurable
  lexicon: Crum; Layton
  rationale: Se conserva la mayúscula en 'Grandeza' por la lectura técnica del término y se usa 'inmensurable' para la privación de medida.
- source_word: ⲡⲉⲧϫⲏⲕ
  english_pob_choice: Complete One
  chosen_spanish: el Completo
  alternatives_spanish:
  - el Perfecto
  - el Pleno
  lexicon: Crum; Thomassen
  rationale: '''Completo'' preserva la idea de plenitud ontológica y evita una moralización de ''perfecto''. Se usa como sustantivo para reflejar el título.'
- source_word: ⲙⲁⲩ
  english_pob_choice: Mother
  chosen_spanish: Madre
  lexicon: Crum
  rationale: Se mantiene el título filial/nutritivo del texto sin atenuarlo.
