translation:
  language: es
  text: 'Pero estos no son revelados de esta manera.


    Porque ni se exaltaron a sí mismos, ni disminuyeron la gloria del Padre, ni lo consideraron pequeño, ni áspero, ni airado; más bien, él está sin mal, sin perturbación y es dulce. Él conoce todo antes de que llegue a ser, y no necesita ser instruido por nadie.


    Este es el camino de los que poseen algo de la Grandeza inmensurable de arriba, mientras esperan solo al Completo[a], que es una Madre para ellos. Y no descienden al Hades, ni hay envidia entre ellos, ni gemido, ni muerte dentro de ellos; más bien, descansan en el que descansa: ni luchando ni retorciéndose en la búsqueda de la Verdad. Al contrario, ellos mismos son la Verdad, y el Padre está en ellos, y ellos están en el Padre, siendo completos, inseparables del verdaderamente Bueno. No carecen de nada, sino que descansan, refrescados en el Espíritu. Y escucharán a su raíz; se dedicarán a las cosas en las que encontrarán su raíz, y no sufrirán pérdida para su alma[b][c]. Este es el lugar de los benditos; este es su lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: o 'el Perfecto', que es una Madre para ellos.
    reason: alternative_reading
  - marker: b
    text: o 'al sufrir pérdida en su alma'.
    reason: alternative_reading
  - marker: c
    text: o 'se dedicarán a las cosas que encuentran en su raíz'.
    reason: alternative_reading
