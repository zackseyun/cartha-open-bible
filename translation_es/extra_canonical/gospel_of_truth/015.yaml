  consult_excerpt: 'Each one will speak about the place from which they came, and they’ll hurry to return again to the place where they received their restoration to receive from the place where they were, receiving a taste from that place and receiving nourishment, receiving growth.

    And their place of rest is their fullness. All that have emanated from the Father, then, are fullnesses, and the roots of all that have emanated from him are within the one who caused them all to grow. He gave them their destinies. Then each one was revealed, so that through their own thought […] for the place to which they send their thought is their root, which takes them up through all the heights, up to the Father. They embrace his head, which is rest for them, and they’re grasped, approaching him, as though to say that they receive his expression by means of kisses. But they’re not revealed 42 in this way, because they neither exalted themselves, nor wanted the Father’s glory, nor did they think of him as trivial or harsh or wrathful; but he’s without evil, unperturbed, and sweet. He knows every realm before they’ve come into existence, and he has no need to be instructed.

    This is the way of those who possess something of the immeasurable greatness from above, as they wait for the complete one alone, who’s a Mother for them. And they don’t go down to Hades, nor do they have envy or groaning, nor death within them, but they rest in the one who rests, not striving nor twisting around in the search for Truth. But they themselves are the Truth, and the Father is within them, and they’re in the Father, being complete. They’re undivided from the truly good one. They don’t need anything, but they rest, refreshed in the Spirit. And they’ll listen to their root. They’ll devote themselves to those things that they’ll find in their root and not suffer loss to their soul. This is the place of the blessed; this is their place.'
base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/015.yaml
  text: 'But these are not revealed in this way[a].


    For they neither exalted themselves, nor did they diminish the Father’s glory, nor did they reckon him as small, nor as harsh, nor as wrathful; rather, he is without evil, unperturbed, and sweet. He knows everything before it comes to be, and he has no need to be instructed by anyone.


    This is the way of those who possess something of the immeasurable Greatness from above, as they await the Complete One alone, who is a Mother for them. And they do not go down to Hades, nor is there envy among them, nor groaning, nor death within them; rather, they rest in the One who rests—neither striving nor writhing in the search for the Truth. Instead, they themselves are the Truth, and the Father is within them, and they are in the Father, being complete, undivided from the truly Good One. They are not in want of anything, but they rest, refreshed in the Spirit. And they will listen to their root; they will devote themselves to the things in which they will find their root, and they will not suffer loss to their soul[c][b]. This is the place of the blessed—this is their place.'
  footnotes:
  - marker: a
    text: Or 'Openly, each one will speak about the Place—for they will hasten to return again there.'.
    reason: previous_rendering
  - marker: b
    text: Or 'nor did they desire the Father’s glory'.
    reason: previous_rendering
  - marker: c
    text: Or 'they will devote themselves to the things they find in their root'.
    reason: previous_rendering
