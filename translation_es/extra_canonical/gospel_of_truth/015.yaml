  english_pob_choice: soul
  chosen_spanish: alma
  lexicon: Greek loan; standard
  rationale: '''Alma'' es la correspondencia normal en español para ψυχή en este contexto antropológico.'
theological_decisions:
- issue: Plenitud/completion terminology
  english_pob_reading: Complete One / complete
  chosen_spanish_reading: el Completo / completos
  alternative_spanish_readings:
  - el Perfecto / perfectos
  - el Pleno / plenos
  rationale: Se evita 'perfecto' porque en español puede sugerir impecabilidad moral más que plenitud ontológica. 'Completo' mantiene la tensión valentiniana de totalidad/llenura.
  doctrine_reference: Valentinian pleroma / fullness language
- issue: Hades terminology
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el inframundo
  - el infierno
  rationale: Se conserva el término cosmológico griego para no introducir la carga posterior de 'infierno'.
  doctrine_reference: Second Temple / Greek cosmology
- issue: Truth as reified entity
  english_pob_reading: Truth
  chosen_spanish_reading: Verdad
  alternative_spanish_readings:
  - verdad
  rationale: La mayúscula ayuda a señalar que no se trata solo de una cualidad abstracta, sino de una realidad reificada en el discurso del tratado.
  doctrine_reference: Valentinian technical usage
- issue: Root/origin imagery
  english_pob_reading: root
  chosen_spanish_reading: raíz
  alternative_spanish_readings:
  - origen
  - fuente
  rationale: '''Raíz'' conserva la metáfora estructural del pasaje y permite mantener el movimiento desde origen a reposo.'
  doctrine_reference: Valentinian anthropology / emanation imagery
translation_notes:
  revision_awareness: 'La versión se ajusta a la revisión crítica que corrigió dos errores mayores del borrador anterior: (1) no se debe introducir la frase ''abiertamente...'' al inicio, porque el Coptico de esta página continúa una pasiva previa y dice simplemente que ''estos no son revelados de esta manera''; (2) ϣⲱⲱⲧ significa ''disminuir/privar'', no ''desear''. También se atiende la corrección sintáctica de la cláusula final para mantener que las cosas son el lugar en que encontrarán su raíz, no al revés.'
  spanish_consistency_notes:
  - Se mantiene 'Hades' y no 'infierno' para conservar la cosmología del texto.
  - '''Verdad'' se capitaliza para respetar el uso técnico/reificado del tratado.'
  - '''Completo'' funciona como título sustantivado, paralelo al inglés POB ''Complete One''.'
  - '''raíz'' se conserva literalmente para la imagen valentiniana de origen y retorno.'
  - No se usan máscaras como SEÑOR para nombres divinos, dado que aquí no aparece el Tetragrámaton.
