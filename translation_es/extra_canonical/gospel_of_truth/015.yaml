- source_word: ⲁⲃⲁⲗ ⲁⲛϭⲓⲛⲉⲉⲓ ⲙⲡⲓⲣⲏⲧⲉ
  english_pob_choice: But these are not revealed in this way
  chosen_spanish: Pero estos no son revelados de esta manera
  alternatives_spanish:
