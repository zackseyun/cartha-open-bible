    issue: Uso de ‘surpassar’ en el texto principal
    rationale: No es una forma española válida. El audit trail corrigió ‘ascend’ a ‘surpass’; en español debe expresarse como ‘superar’ o ‘sobrepasar’, no con un híbrido anglo-español.
