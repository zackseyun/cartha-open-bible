translation:
  language: es
  text: 'Por tanto, hagan la voluntad del Padre, porque ustedes proceden de él. Porque el Padre es dulce, y la bondad está en su voluntad. Él sabe lo que es de ustedes, para que en ello encuentren descanso. Porque por los frutos se conoce lo que es de ustedes, ya que los hijos del Padre son su fragancia, pues proceden de la gracia de su Rostro[a]. Por eso el Padre ama su fragancia y la manifiesta en todo lugar; y cuando se mezcla con la hylē[b], da su fragancia a la Luz, y en su quietud hace que supere[c] toda forma y todo sonido. Porque no son los oídos los que huelen la fragancia, sino el Espíritu la huele, atrae la fragancia hacia sí y desciende hasta la fragancia del Padre. Entonces la protege y la lleva de nuevo al lugar de donde vino: de la primera fragancia que se había enfriado. Es algo dentro de una formación dotada de alma, como agua fría hundida en un terrón de tierra suelta[d]. Quienes la ven suponen que es solo tierra; después vuelve a disolverse. Y si un aliento la atrae, se
    vuelve cálida.


    Así, las fragancias que están frías proceden de la división. Por eso vino la Fe: disolvió la división y trajo el Pleroma[e] que está cálido con agapē[f], para que lo frío no vuelva, sino más bien la unidad del Pensamiento de perfección[g]. Este Logos lo manifestó.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. “de su Rostro”; el POB inglés vincula aquí ‘Face’ con la manifestación personal de Dios.
    reason: theological_note
  - marker: b
    text: Término técnico griego conservado en copto; puede entenderse como “materia”.
    reason: lexical_alternative
  - marker: c
    text: O “hace que sobrepase”; la auditoría inglesa corrigió un antiguo “ascender” que no refleja bien el verbo copto.
    reason: lexical_alternative
  - marker: d
    text: O “un engaño dotado de alma”; el POB inglés conservó esa traducción anterior como alternativa, aunque prefirió “formación”.
    reason: alternative_reading
  - marker: e
    text: O “la Plenitud”.
    reason: lexical_alternative
  - marker: f
    text: O “amor”.
    reason: lexical_alternative
  - marker: g
    text: O “la unidad (monada) del Pensamiento de perfección”.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲡⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el Padre celestial
  lexicon: Crum; NT theological usage
  rationale: Se conserva el título relacional y teológico “Padre” sin añadir un calificativo no presente en el texto.
- source_word: ⲥⲧⲁⲉⲓ
  english_pob_choice: fragrance
  chosen_spanish: fragancia
  alternatives_spanish:
  - aroma
  - fragancia
  lexicon: Crum; Layton
  rationale: “Fragancia” mantiene el campo olfativo y el tono metafísico del pasaje, con mayor dignidad que “aroma” en español bíblico.
- source_word: ⲭⲁⲣⲓⲥ
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: LSJ; uso cristiano amplio
  rationale: La tradición textual y el contexto teológico favorecen “gracia”, que además permite mantener la conexión con el lenguaje cristiano del pasaje.
- source_word: ϩⲩⲗⲏ / hylē
  english_pob_choice: hylē
  chosen_spanish: hylē
  alternatives_spanish:
  - materia
  lexicon: LSJ; uso valentiniano
  rationale: Se conserva la transliteración técnica para no aplanar un término doctrinal especializado; se explica con nota.
- source_word: ⲥⲱⲣⲁϩⲧ
  english_pob_choice: quiet
  chosen_spanish: quietud
  alternatives_spanish:
  - reposo
  - tranquilidad
  lexicon: Crum
  rationale: “Quietud” expresa reposo sereno y funciona bien con el verbo “hacer surpassar” en un registro contemplativo.
- source_word: ⲣ-ⲥⲁⲧⲡⲉ
  english_pob_choice: causes it to surpass
  chosen_spanish: la hace surpassar
  alternatives_spanish:
  - la hace superar
  - la hace sobrepasar
  lexicon: Crum 364a
  rationale: Se preserva el valor de superioridad/excelencia señalado por el audit trail; se evita “ascender”, que introduciría una metáfora espacial ajena al verbo.
- source_word: ⲡⲗⲁⲥⲙⲁ
  english_pob_choice: formation
  chosen_spanish: formación
  alternatives_spanish:
  - creación
  - molde
  lexicon: Greek loanword in Coptic; Crum
  rationale: “Formación” reproduce el valor de plasma como algo formado o moldeado y evita el sobrealcance interpretativo de “engaño/delusión”.
- source_word: ⲇⲓⲁⲃⲟⲗⲟⲥ
  english_pob_choice: Devil
  chosen_spanish: el Diablo
  alternatives_spanish:
  - el Diablo
  - el Calumniador
  lexicon: LSJ; uso cristiano
  rationale: Se mantiene el nombre personal hostil ya fijado por el texto y por la auditoría inglesa.
- source_word: ⲡⲗⲏⲣⲱⲙⲁ
  english_pob_choice: Pleroma
  chosen_spanish: el Pleroma
  alternatives_spanish:
  - la Plenitud
  lexicon: NH theological usage
  rationale: Se conserva el tecnicismo valentiniano, que en español puede ir transliterado para no perder su carga doctrinal específica.
- source_word: ⲁⲅⲁⲡⲏ
  english_pob_choice: agapē
  chosen_spanish: agapē
  alternatives_spanish:
  - amor
  lexicon: LSJ; NH usage
  rationale: Se preserva la transliteración para reflejar el valor técnico y evitar reducirlo a “amor” genérico en este contexto metafísico.
- source_word: ⲙⲉⲉⲩⲉ
  english_pob_choice: Thought
  chosen_spanish: Pensamiento
  alternatives_spanish:
  - mente
  - pensamiento
  lexicon: Crum; Layton
  rationale: Se capitaliza para reflejar el sentido técnico/hypostático que la tradición auditada señala en este tipo de texto.
theological_decisions:
- issue: Personificación de Faith / Pistis
  english_pob_reading: Faith came
  chosen_spanish_reading: vino la Fe
  alternative_spanish_readings:
  - la fe vino
  - vino la fe
  rationale: En español, la mayúscula inicial mantiene la lectura hipostática sin imponer una reinterpretación ajena; “vino” conserva la sintaxis simple del original.
  doctrine_reference: Valentinian usage of Pistis as hypostasis
- issue: Término técnico hylē
  english_pob_reading: hylē
  chosen_spanish_reading: hylē
  alternative_spanish_readings:
  - materia
  rationale: La transliteración preserva la distinción doctrinal entre la sustancia amorfa del mundo y el vocabulario ordinario de “materia”, que podría aplanar el contraste metafísico.
  doctrine_reference: Valentinian cosmology
- issue: Pleroma and agapē as technical terms
  english_pob_reading: Pleroma ... agapē
  chosen_spanish_reading: Pleroma ... agapē
  alternative_spanish_readings:
  - Plenitud ... amor
  rationale: El texto funciona dentro de un registro técnico; mantener transliteraciones evita que el lector confunda estos términos con usos meramente devocionales o abstractos.
  doctrine_reference: Valentinian soteriology and cosmology
- issue: Thought of perfection
  english_pob_reading: unity (monad) of Thought of perfection
  chosen_spanish_reading: la unidad del Pensamiento de perfección
  alternative_spanish_readings:
  - la unidad (monada) del Pensamiento de perfección
  - la unidad del pensamiento perfecto
  rationale: Se conserva la estructura conceptual sin forzar “monada” en el cuerpo principal; el español puede entender la unidad del pensamiento como cierre doctrinal del pasaje.
  doctrine_reference: Valentinian monadic language
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada que corrige dos puntos clave: (1) el equivalente de ⲣ-ⲥⲁⲧⲡⲉ se rinde como “surpassar/superar”, no como “ascender”; (2) ⲡⲗⲁⲥⲙⲁ se traduce como “formación”, no como “delusión/engaño”. Además, se preserva la duplicidad del texto sobre lo frío mediante la referencia a la división y se mantiene el registro técnico de los términos valentinianos.'
  spanish_consistency_notes:
  - Se usó “Padre” de forma uniforme para ⲡⲓⲱⲧ.
  - Se mantuvo “fragancia” en todo el pasaje para ⲥⲧⲁⲉⲓ.
  - 'Se conservaron transliteraciones técnicas solo donde la tradición auditada las trata como términos doctrinales: hylē, Pleroma, agapē, Logos.'
  - Se capitalizó “Fe” y “Pensamiento” por consistencia con la lectura hipostática señalada en el audit trail.
  - Se evitó “SEÑOR” y “Cristo” porque no aparecen en este segmento como traducciones necesarias de término fuente.
