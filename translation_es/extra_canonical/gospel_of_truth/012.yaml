translation_notes:
  revision_awareness: 'La versión española toma en cuenta la revisión más reciente del audit trail: restituye la frase sobre la salvación que viene de arriba, evita la glosa no atestiguada sobre la voluntad del Padre, y conserva la metáfora agrícola final («plantaciones» / «plantó») en vez de una paráfrasis general. También mantiene las decisiones terminológicas ya establecidas para Plenitud, Incorruptibilidad, Error, Mesías, crisma y Paraíso.'
  spanish_consistency_notes:
  - Se mantiene «Plenitud» como término técnico estable para ⲡⲗⲏⲣⲱⲙⲁ en todo el pasaje.
  - Se diferencia «Incorruptible» (adjetivo/título) de «Incorruptibilidad» (abstracto) por claridad conceptual.
  - Se conserva la secuencia «necesidad» ↔ «Plenitud» para respetar el eje semántico del texto.
  - Se evita sustituir «Mesías» por «Cristo» en el cuerpo principal, pero se reconoce la alternativa en nota implícita en la decisión lexical.
  - Se conserva «crisma» en vez de «ungüento» para no perder el registro ritual del pasaje.
  - La metáfora final se traduce con léxico agrícola explícito («plantaciones», «plantó») para seguir la revisión del audit trail y evitar una lectura abstracta.
