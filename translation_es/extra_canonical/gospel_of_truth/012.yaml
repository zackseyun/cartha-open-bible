  rationale: El contexto de ser llenados y ungidos favorece «vasos», que preserva tanto la imagen concreta como su uso simbólico.
- source_word: ⲧⲉⲗⲓⲟⲥ
  english_pob_choice: perfect
  chosen_spanish: perfectos
