translation:
  language: es
  text: 'El discurso de la Buena Noticia sobre el hallazgo de la Plenitud es para los que esperan la salvación que viene de arriba[a]. Mientras la esperan, la esperanza pertenece a aquellos cuya imagen es luz, sin sombra en ella. Cuando, entonces, llega la Plenitud, la necesidad de la hylē (materia) no procede de la inconmensurabilidad del Padre; él viene a conceder un plazo a la necesidad. Sin embargo, nadie puede decir que el Incorruptible venga de tal manera. Más bien, la Profundidad del Padre creció y se multiplicó, y el pensamiento del Error no estaba con él. El Error es una caída: algo fácil de enderezar mediante el hallazgo del que volverá a aquello a lo que retorna, porque el retorno recibe el nombre de cambio de pensamiento[b].


    Por esto, la Incorruptibilidad exhaló; persiguió al que había pecado, para que hallara descanso. Porque lo que queda para la luz en necesidad es el perdón: la Palabra de la Plenitud. Pues el médico corre al lugar donde hay enfermedad, porque eso es lo que quiere. Y el que está en necesidad no lo oculta, porque otro posee lo que aquel necesita. De este modo la Plenitud —que no tiene necesidad— proveyó de sí misma para colmar la necesidad, de manera que recibieran gracia. Porque cuando estaban en necesidad, la gracia no estaba con ellos. Por eso tuvo lugar una disminución donde no hay gracia; y cuando lo que había disminuido fue restaurado, la necesidad quedó manifestada como Plenitud. Este es el hallazgo de la luz de la Verdad, que los iluminó, porque no cambia.


    Por esto, hablaron acerca del Mesías en medio de ellos: «Busquen, y los que estaban perturbados volverán, y él los ungirá con crisma». El crisma es la misericordia del Padre, y él tendrá misericordia de ellos. Ahora bien, los que él ungió son los perfectos, porque los vasos llenos son los que se ungen. Pero cuando la unción de uno se disuelve, se vacía, y la causa de la necesidad es el lugar por donde se derrama el ungüento, porque un aliento y su poder lo arrastran. Sin embargo, del que no tiene necesidad no se suelta ningún sello, ni se vacía nada; más bien, el Padre —que es completo— vuelve a llenar con él lo que a ese le falta. Él es bueno; conoce sus plantaciones, porque es él quien las plantó en su Paraíso[c]. Ahora su Paraíso es su lugar de descanso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «El discurso de la Buena Noticia sobre el hallazgo de la Plenitud llega a los que están esperando; la esperanza que esperan pertenece a aquellos cuya imagen es luz sin sombra en ella».'
    reason: previous_rendering
  - marker: b
    text: 'O: «arrepentimiento». El texto vincula este retorno con una reorientación cognitiva; por eso el cuerpo principal conserva «cambio de pensamiento».'
    reason: lexical_alternative
  - marker: c
    text: 'O también: «él da cosas buenas a los que son suyos, porque posee lo que les da en descanso. Y el Paraíso es su lugar de descanso».'
    reason: previous_rendering
