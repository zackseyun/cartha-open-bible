  lexicon: Crum Sahidic Coptic
  rationale: La metáfora económica es clara en el contraste con el nombre propio; «en préstamo» es idiomático y exacto.
- source_word: ⲥⲙⲁⲧ
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
