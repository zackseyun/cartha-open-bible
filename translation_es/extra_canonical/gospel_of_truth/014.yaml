  lexicon: Crum Sahidic Coptic
  rationale: «Forma» preserva el paralelismo con la producción de cada uno sin desplazar el sentido hacia apariencia meramente externa.
theological_decisions:
- issue: Identificación entre el nombre del Padre y el Hijo
  english_pob_reading: The name of the Father is the Son.
  chosen_spanish_reading: El nombre del Padre es el Hijo.
  alternative_spanish_readings:
  - El nombre del Padre se revela como el Hijo
  - El Hijo es el nombre del Padre
  rationale: La sintaxis equativa del copto, y la repetición insistente de «dar un nombre» y «pertenece el nombre», piden una identificación literal; una paráfrasis suavizaría la afirmación teológica que el texto hace.
  doctrine_reference: Cristología gnóstica / teología del Nombre
- issue: Valor de la frase sobre el Padre «sin malicia»
  english_pob_reading: the Father is without envy
  chosen_spanish_reading: el Padre no tiene malicia
  alternative_spanish_readings:
  - el Padre está sin envidia
  - el Padre no tiene envidia
  - el Padre no es envidioso
  rationale: El audit trail inglés retiene la tradición de «without envy», pero el español puede sonar rígido o moralizante si se calca literalmente; «no tiene malicia» conserva la intención de benevolencia y evita una formulación poco natural, mientras la nota preserva la alternativa más técnica.
  doctrine_reference: Atributos divinos / benevolencia del Padre
- issue: Distinción entre el Nombre visible y el Nombre invisible
  english_pob_reading: He can be seen; the name, however, is invisible
  chosen_spanish_reading: Él puede ser visto; el nombre, en cambio, es invisible
  alternative_spanish_readings:
  - Él es visible; el nombre es invisible
  - Él puede verse; el nombre, no
  rationale: 'Se conserva la tensión apofática: la persona/manifestación puede verse, pero el Nombre, como misterio, no. El español mantiene la oposición sin explicarla en exceso.'
  doctrine_reference: Apofatismo / revelación
- issue: Relación entre el Nombre y la Plenitud
  english_pob_reading: to glorify the Pleroma, the greatness of his name, and the Father’s sweetness
  chosen_spanish_reading: para glorificar la Plenitud, la grandeza de su nombre, y la dulzura del Padre
  alternative_spanish_readings:
  - para glorificar el Pleroma, la grandeza de su nombre, y la dulzura del Padre
  - para glorificar la Plenitud, la grandeza de su Nombre, y la dulzura del Padre
  rationale: Se optó por «Plenitud» en el cuerpo por claridad idiomática, manteniendo el sentido técnico del Pleroma. El resto conserva la cadena retórica sin añadir doctrina ajena al pasaje.
  doctrine_reference: Pleroma / doxología
translation_notes:
  revision_awareness: 'He integrado las correcciones del audit trail más reciente: se mantiene la lectura completa del tramo sobre el Nombre, el Hijo y los eones; se corrige la referencia singular «antes de él»; y se adopta «reveló sus secretos» en la línea final donde el copto habla de lo oculto. También se revisó la expresión sobre el Padre sin malicia/without envy para producir un español natural sin borrar la tensión lexical documentada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este fragmento no aparece.
  - «Hijo» se mantiene como título, no como simple parentesco biológico.
  - «Plenitud» capitalizada conserva el valor técnico de Pleroma sin introducir un helenismo innecesario en la línea principal.
  - 'La secuencia apofática se conserva con tres grados distintos: innombrable, inefable, indescriptible.'
  - Se evita alternar entre «nombre» y «Nombre» salvo donde el texto funciona titularmente o requiere énfasis teológico.
