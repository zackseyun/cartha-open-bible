  consult_excerpt: 'Now the name of the Father is the Son. He’s the one who first gave a name to the one who comes out from him, who was himself, and he gave birth to him as a Son. He gave him his name which belonged to him. He’s the one to whom everything around the Father belongs. The name and the Son are his. It’s possible for him to be seen; the name, however, is invisible, because it alone is the mystery of the invisible which comes to ears that are filled completely with it by him. For indeed, the Father’s name isn’t spoken, but it’s revealed through a Son.

    In this way, then, the name is great. Who, then, will be able to utter a name for him, the great name, except him alone to whom the name belongs, and the children of the name, those in whom the Father’s name rests, and who themselves, in turn, rest in his name? Since the Father is unbegotten, it’s he alone who gave birth to him for himself as a name, before he had made the generations, so that the Father’s name might be over their head as Lord, which is the 39 true name, confirmed in his command in complete power. For the name isn’t from words and naming; the name, rather, is invisible.

    He gave a name to him alone. He alone sees him, he alone having the power to give him a name, because whoever doesn’t exist has no name. For what name will they give one who doesn’t exist? But the one who exists, exists also with his name, and he alone knows it, and he’s given a name to him alone. This is the Father; his name is the Son. He didn’t hide it within, then, but it existed. The Son alone gave a name. The name, then, belongs to the Father, as the name of the Father is the beloved Son. Where, indeed, would he find a name, except from the Father?

    But doubtless one will ask their neighbor, “Who is it who’ll give a name to the one who existed before them, as if 40 offspring didn’t receive a name from those who gave them birth?” First, then, it’s right for us to consider what the name is. It’s the true name, the name from the Father, because it’s the proper name. So he didn’t receive the name on loan, the way others do, according to the form in which each one will be produced. This, then, is the proper name. There’s no one else who gave it to him. But he’s unnameable, indescribable, until the time when he who’s complete spoke of him alone. And it’s he who has the power to speak his name and to see him.

    So when it pleased him that his beloved name should be his Son, and he gave the name to him who came out from the depth, he disclosed his secrets, knowing that the Father is without evil. Because of this, he brought him out so that he might speak about the place, and his resting place from which he had come, 41 and to glorify the fullness, the greatness of his name, and the Father’s sweetness.'
base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/014.yaml
  text: 'The name of the Father is the Son[a]. He is the one who first gave a name to the one who came forth from himself—being himself—and he begot him as a Son. He gave to him the name that was his. All that is around the Father belongs to him: the name is his and the Son is his. He can be seen; the name, however, is invisible, because it alone is the mystery of the invisible which comes to ears that are completely filled with it by him. For indeed, the Father’s name is not spoken, but it is revealed through a Son. In this way, then, the name is great. Who, then, will be able to utter a name for him, the great name, except him alone to whom the name belongs, and the children of the name, those in whom the Father’s name rests, and who themselves, in turn, rest in his name? Since the Father is unbegotten, it is he alone who begot him for himself as a name, before he had brought forth the aeons, so that the Father’s name might be over their head as Lord—which is the true name, confirmed in
    his command in complete power. For it is not out of words and naming that his name is, but it is an invisible one. He gave a name to him alone—the one who is. For the one who does not exist has no name to receive; what name would they give to one who is not? But the one who is, is also with his name[b], and he alone knows it; and he has given a name to him alone.


    This is the Father; his name is the Son. He did not hide it within himself; rather, it was. The Son alone gave a name. The name, then, belongs to the Father—for the name of the Father is the Beloved Son. From where, indeed, would he find a name, except from the Father?


    But surely someone will ask a neighbor, “Who is it who will give a name to the one who existed before him?”—as though offspring do not receive a name from those who begot them. First, then, it is right for us to consider what the name is: it is the true name, the name from the Father, for it is the proper name. He did not receive the name as something on loan the way others do, according to the form in which each is produced. This is the proper name: there is no other who gave it to him. Rather, he is unnameable, ineffable, and indescribable—until the time when the Perfect spoke concerning him alone, the one who has the power to speak his name and to see him.


    When it pleased him that his Beloved name should be the Son, and he gave the name to the one who came forth from the Depth, he revealed his secrets, knowing that the Father is without envy. Because of this he brought him forth, so that he might speak about the Place and the resting place from which he had come forth, and to glorify the Pleroma, the greatness of his name[c], and the Father’s sweetness.'
