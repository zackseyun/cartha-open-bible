  lexicon: Crum Sahidic Coptic
  rationale: Como título del revelador, «el Perfecto» mantiene el valor técnico y reverente del original mejor que una simple descripción adjetiva.
- source_word: ⲁⲡⲟⲩⲱⲉⲓⲛ
  english_pob_choice: receive on loan
  chosen_spanish: en préstamo
  alternatives_spanish:
