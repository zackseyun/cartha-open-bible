  lexicon: Crum Sahidic Coptic
  rationale: Término central del pasaje; «nombre» conserva la carga teológica de identidad, revelación y pertenencia sin rebajarlo a una mera etiqueta.
- source_word: ⲡⲓⲱⲧ
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Progenitor
  - Padre/Originador
  lexicon: Crum Sahidic Coptic
  rationale: Título relacional constante en el texto; en español «Padre» mantiene la correspondencia filial y la estructura teológica del pasaje.
- source_word: ⲡϣⲏⲣⲉ
  english_pob_choice: Son
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo
  - Descendiente
  - Vástago
  lexicon: Crum Sahidic Coptic
  rationale: La forma española «Hijo» preserva el título cristológico y la simetría con «Padre» mejor que una opción biológica más marcada.
- source_word: ⲟⲩⲁⲧⲛⲁⲩ
  english_pob_choice: invisible
  chosen_spanish: invisible
  alternatives_spanish:
  - invisible
  - no visible
  - no puede verse
  lexicon: Crum Sahidic Coptic
  rationale: La construcción privativa con «ver» exige el adjetivo normal «invisible»; en este contexto apofático evita una paráfrasis demasiado explicativa.
- source_word: ⲙⲛⲧⲧⲁⲉⲓⲣⲉⲛ
  english_pob_choice: naming
  chosen_spanish: nombrar
  alternatives_spanish:
  - acto de nombrar
  - nombramiento
  lexicon: Crum Sahidic Coptic
  rationale: La oposición es con «palabras»; en español conviene mantener el campo léxico verbal («nombrar») para reflejar el contraste de fondo.
- source_word: ⲟⲩⲁⲧϯⲣⲉⲛ
  english_pob_choice: unnameable
  chosen_spanish: innombrable
  alternatives_spanish:
  - innombrable
  - sin nombre
  lexicon: Crum Sahidic Coptic
  rationale: La forma privativa pide un adjetivo técnico; «innombrable» conserva la fuerza apofática mejor que una perífrasis.
- source_word: ⲟⲩⲁⲧⲧⲉ
  english_pob_choice: ineffable
  chosen_spanish: inefable
  alternatives_spanish:
  - inefable
  - inefable / indecible
  lexicon: Crum Sahidic Coptic
  rationale: «Inefable» es el equivalente culto y clásico de la negación de decir/hablar, apropiado para el registro místico del texto.
- source_word: ⲟⲩⲁⲧⲙⲉⲉⲩⲉ
  english_pob_choice: indescribable
  chosen_spanish: indescriptible
  alternatives_spanish:
  - indescriptible
  - inexpresable
  lexicon: Crum Sahidic Coptic
  rationale: «Indescriptible» comunica bien la imposibilidad de descripción y mantiene el triple escalonamiento apofático.
- source_word: ⲃⲁⲑⲟⲥ
  english_pob_choice: Depth
  chosen_spanish: Profundidad
  alternatives_spanish:
  - Profundidad
  - Abismo
  - Lo profundo
  lexicon: Loan from Greek; Crum + Gnostic usage
  rationale: En español «Profundidad» rinde el término de manera natural y conserva la referencia cosmológica sin imponer un tecnicismo innecesario en el cuerpo del texto.
- source_word: ⲡⲗⲏⲣⲱⲙⲁ
  english_pob_choice: Pleroma
  chosen_spanish: Plenitud
  alternatives_spanish:
  - Plenitud
  - Pleroma
  lexicon: Loan from Greek; Crum + Gnostic usage
  rationale: Se prefirió «Plenitud» en el texto por ser transparente y legible en español; la capitalización conserva su función casi titular.
- source_word: ⲛϫⲁⲉⲓⲥ
  english_pob_choice: Beloved
  chosen_spanish: amado
  alternatives_spanish:
  - amado
  - querido
  - predilecto
  lexicon: Crum Sahidic Coptic
  rationale: El término funciona como epíteto; «amado» es el equivalente más directo y solemne, adecuado para el Hijo.
- source_word: ⲟⲩⲁⲧⲡⲉⲑⲁⲩ
