translation:
  language: es
  text: 'El nombre del Padre es el Hijo[a]. Él es quien primero dio un nombre al que salió de él mismo —siendo él mismo—, y lo engendró como Hijo. Le dio el nombre que era suyo. Todo lo que rodea al Padre le pertenece: el nombre es suyo y el Hijo es suyo. Él puede ser visto; el nombre, en cambio, es invisible, porque solo él es el misterio de lo invisible, que llega a oídos completamente llenos de él por medio de él. Porque, en verdad, el nombre del Padre no se pronuncia, sino que se revela por medio de un Hijo. De este modo, entonces, el nombre es grande. ¿Quién, pues, podrá pronunciar un nombre para él, el gran nombre, excepto aquel solo a quien pertenece el nombre, y los hijos del nombre, aquellos en quienes descansa el nombre del Padre, y que a su vez descansan en su nombre? Pues, como el Padre es ingénito, solo él lo engendró para sí como un nombre, antes de haber hecho surgir los eones, para que el nombre del Padre estuviera sobre su cabeza como Señor, que es el nombre verdadero, confirmado
    en su mandamiento con poder pleno. Porque no es a partir de palabras y de nombrar que es su nombre, sino que es invisible. Le dio un nombre solo a él: al que existe. Porque el que no existe no tiene nombre que recibir; ¿qué nombre darían a quien no es? Pero el que es también existe con su nombre[b], y solo él lo conoce; y le ha dado un nombre solo a él.


    Este es el Padre; su nombre es el Hijo. No lo ocultó dentro de sí mismo; más bien, era. Solo el Hijo dio un nombre. El nombre, pues, pertenece al Padre, porque el nombre del Padre es el Hijo amado. ¿De dónde, en efecto, encontraría él un nombre, sino del Padre?


    Pero seguramente alguien preguntará a su prójimo: “¿Quién es el que dará un nombre al que existía antes que él?”, como si los descendientes no recibieran un nombre de quienes los engendraron. Primero, pues, es justo que consideremos qué es el nombre: es el nombre verdadero, el nombre del Padre, porque es el nombre propio. No recibió el nombre en préstamo, como hacen otros, según la forma en que cada uno es producido. Este, pues, es el nombre propio: no hay otro que se lo haya dado. Más bien, él es innombrable, inefable e indescriptible, hasta el tiempo en que el Perfecto habló solo acerca de él, el único que tiene poder para pronunciar su nombre y verlo.


    Así que, cuando le agradó que su nombre amado fuera su Hijo, y dio el nombre al que salió de la Profundidad, reveló sus secretos, sabiendo que el Padre no tiene malicia. Por eso lo sacó, para que hablara acerca del Lugar y de su lugar de descanso, de donde había salido, y para glorificar la Plenitud, la grandeza de su nombre[c], y la dulzura del Padre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El nombre del Padre es el Hijo». El copto sostiene una identificación fuerte entre Nombre y Hijo; no se suaviza aquí a una simple revelación del Nombre.'
    reason: theological_note
  - marker: b
    text: 'O: «antes que ellos». El pasaje siguiente tiene una lectura singular en el audit trail principal, pero la tradición de esta línea admite la variante de referencia plural en algunos testigos o reconstrucciones.'
    reason: textual_variant
  - marker: c
    text: 'O: «sus cosas» o «lo que es suyo». El audit trail inglés preserva como alternativa la lectura «he revealed his things»; aquí se mantiene «la grandeza de su nombre» como en la lectura principal.'
    reason: alternative_reading
