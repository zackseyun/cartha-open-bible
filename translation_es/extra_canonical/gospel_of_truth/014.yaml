  lexicon: Crum Sahidic Coptic
  rationale: El contexto auditado de la tradición valentiniana favorece «sin envidia», pero en español «no tiene malicia» comunica mejor la idea relacional y evita una lectura psicológica torpe en este pasaje; se conserva la tensión semántica en nota.
- source_word: ⲙⲛⲧⲁⲡⲉⲉⲓ
  english_pob_choice: the Perfect
  chosen_spanish: el Perfecto
  alternatives_spanish:
