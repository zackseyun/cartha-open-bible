translation:
  language: es
  text: 'Porque todavía no habían recibido forma ni nombre. El Padre los hace surgir. Luego[a], cuando reciben forma por su conocimiento, aunque verdaderamente están en él, no lo conocen. Pero el Padre es completo, conociendo cada espacio que está en él. Si quiere, revela a quien quiere, dándoles forma y dándoles nombre. Les da nombre y hace que lleguen a ser —aquellos que, antes de llegar a ser, no conocen al que los hizo.


    No digas, pues, que los que todavía no han llegado a ser no son nada; más bien, existen en el que querrá que lleguen a ser, cuando quiera, como en una estación posterior. Antes de que todo sea revelado, él sabe lo que producirá en su propio tiempo. Pero el fruto que aún no ha sido revelado no sabe nada ni hace nada.


    Además, todo eón que está en el Padre proviene del Que-Es, quien los establece a partir del no-ser. Porque los que no tienen raíz tampoco tienen fruto. Dicen dentro de sí: «He llegado a ser», pero se disolverán por sí mismos. Por eso, los que en absoluto no existieron no existirán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sabían que todavía no habían recibido forma —de las cosas que están dentro de él, en el Padre. Sin embargo, el Padre es completo, pues conoce cada cosa que está dentro de él. Y cuando quiere, revela a quien quiere, dándoles una forma en lo que existe; los reviste y los hace salir con forma exterior en lo que existe».'
    reason: Se preserva la nota del audit trail inglés sobre una traducción anterior significativa.
lexical_decisions:
- source_word: ⲙⲁⲉⲓⲧ / ⲥⲙⲟⲧ
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - figura
  - molde
  - aspecto
  lexicon: Crum; uso gnóstico de forma exterior
  rationale: En este pasaje metafísico, 'forma' conserva la idea de configuración recibida sin cargarla con una imagen demasiado física. 'Figura' o 'molde' suenan menos naturales en español teológico.
- source_word: ⲣⲉⲛ
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - nombre propio
  - designación
  lexicon: Crum; léxico coptológico habitual
  rationale: El texto insiste en la pareja 'forma y nombre'. 'Nombre' es la traducción directa y mantiene la tensión ontológica del pasaje.
- source_word: ⲡⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Padre
  lexicon: Crum
  rationale: Se conserva el título teológico con artículo definido, como en el original y en el POB inglés.
- source_word: ⲟⲩⲱⲛϩ / 'bring forth'
  english_pob_choice: brings them forth
  chosen_spanish: los trae a la existencia
  alternatives_spanish:
  - los da a luz
  - los saca afuera
  - los trae
  lexicon: Crum; contexto de venir a ser
  rationale: La imagen apunta a causación de existencia más que a mera extracción espacial. 'Trae a la existencia' evita el calco 'los trae fuera' y comunica el sentido ontológico.
- source_word: ⲡⲉⲧϣⲟⲟⲡ
  english_pob_choice: what exists
  chosen_spanish: el que es
  alternatives_spanish:
  - el que existe
  - lo que existe
  lexicon: Crum; uso titulárico
  rationale: En la frase titulárica 'the One-who-is', el español más natural y solemne es 'el que es'. En el contexto inmediato, también permite distinguirlo de 'lo que existe'.
- source_word: ⲙⲙⲁ / space
  english_pob_choice: every space
  chosen_spanish: cada espacio
  alternatives_spanish:
  - cada lugar
  - cada ámbito
  lexicon: Crum; valor espacial concreto
  rationale: 'Se sigue el ajuste del audit trail: el copto aquí favorece ''espacio'' como referente concreto de presencia. ''Ámbito'' sería más interpretativo.'
- source_word: ⲧⲙⲛⲧⲉⲩⲛⲟⲩ
  english_pob_choice: non-being
  chosen_spanish: no-ser
  alternatives_spanish:
  - no ser
  - no-existencia
  - nada
  lexicon: Crum; uso filosófico gnóstico
  rationale: '''No-ser'' preserva el contraste ontológico con ''el que es'' sin reducirlo al coloquial ''nada''. Además, funciona bien en español como término filosófico breve.'
- source_word: ⲕⲁⲣⲡⲟⲥ / ⲧⲏⲣϥ
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - producto
  - cosecha
  lexicon: Crum; metáfora agrícola
  rationale: '''Fruto'' mantiene el lenguaje bíblico y filosófico del texto; ''fruta'' sería demasiado literal en español moderno y ''producto'' perdería la imagen.'
- source_word: ⲙⲛ̄ⲧⲁⲧⲥⲟⲟⲩⲛ
  english_pob_choice: ignorant
  chosen_spanish: no conocen
  alternatives_spanish:
  - ignoran
  - no saben
  lexicon: Crum
  rationale: Aquí el copto describe desconocimiento del hacedor. 'No conocen' mantiene el paralelismo con 'no lo conocen' y evita una repetición áspera de 'ignoran'.
theological_decisions:
- issue: ⲧⲙⲛⲧⲉⲩⲛⲟⲩ y la creación desde la no-existencia
  english_pob_reading: non-being
  chosen_spanish_reading: no-ser
  alternative_spanish_readings:
