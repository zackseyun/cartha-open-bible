  rationale: En español, 'el que es' suena natural como título y preserva la densidad ontológica del original. 'El que existe' es válido pero menos solemne; 'el ExistentE' no es idiomático.
  doctrine_reference: Título del principio ontológico en textos de Nag Hammadi
