revisions:
- from: 'Porque todavía no habían recibido forma ni nombre. El Padre los trae a la existencia. Luego, cuando reciben forma por su conocimiento, aunque verdaderamente están en él, no lo conocen. Pero el Padre es completo, conociendo cada espacio que está en él. Si quiere, revela a quien quiere, dándoles forma y dándoles nombre. Les da nombre y hace que lleguen a ser —aquellos que, antes de llegar a ser, no conocen al que los hizo.


    No digas, pues, que los que todavía no han llegado a ser no son nada; más bien, existen en el que los querrá hacer llegar a ser, cuando quiera —como una temporada posterior. Antes de que todo sea revelado, él sabe lo que producirá en su tiempo. Pero el fruto que todavía no ha sido revelado no sabe nada todavía, ni hace nada.


    Además, todo eón que está en el Padre es del que es, quien los establece a partir del no-ser. Porque los que no tienen raíz tampoco tienen fruto. Dicen dentro de sí: “He llegado a ser”, pero se disolverán por sí mismos. Por eso, los que en absoluto no existieron no existirán.'
  to: 'Porque todavía no habían recibido forma ni nombre. El Padre los hace surgir. Luego[a], cuando reciben forma por su conocimiento, aunque verdaderamente están en él, no lo conocen. Pero el Padre es completo, conociendo cada espacio que está en él. Si quiere, revela a quien quiere, dándoles forma y dándoles nombre. Les da nombre y hace que lleguen a ser —aquellos que, antes de llegar a ser, no conocen al que los hizo.


    No digas, pues, que los que todavía no han llegado a ser no son nada; más bien, existen en el que querrá que lleguen a ser, cuando quiera, como en una estación posterior. Antes de que todo sea revelado, él sabe lo que producirá en su propio tiempo. Pero el fruto que aún no ha sido revelado no sabe nada ni hace nada.


    Además, todo eón que está en el Padre proviene del Que-Es, quien los establece a partir del no-ser. Porque los que no tienen raíz tampoco tienen fruto. Dicen dentro de sí: «He llegado a ser», pero se disolverán por sí mismos. Por eso, los que en absoluto no existieron no existirán.'
  rationale: 'La revisión corrige tres puntos principales: (1) reduce una sobreinterpretación en ''los trae a la existencia'' a un español más fiel a ''brings them forth''; (2) mejora la naturalidad y el matiz de kairos con ''estación posterior''; y (3) restaura el carácter titulárico de ''the One-who-is'' con ''el/Del Que-Es''. También se suaviza una repetición estilística. No hace falta adjudicación superior porque las correcciones son locales y están bien apoyadas por el audit trail existente.'
