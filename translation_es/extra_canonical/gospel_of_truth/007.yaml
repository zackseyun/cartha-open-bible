  consult_excerpt: 'Every realm emanates from him. They know they’ve come out from him like children who are from someone who’s completely mature. They knew they hadn’t yet received form or a name. The Father gives birth to each one. Then, when they receive form from his knowledge, although they’re really within him, they don’t know him. But the Father is complete, knowing every realm that’s within him. If he wants to, he reveals whomever he wants, giving them a form and a name. He gives a name to them, and causes those to come into being who, before they come into being, are ignorant of the one who made them.

    I’m not saying, then, that those who haven’t yet come into being are nothing, but they exist 28 in the one who will want them to come into being when he wants, like a later time. Before everything is revealed, he knows what he’ll produce. But the fruit which he hasn’t yet revealed doesn’t yet know anything, nor does it do anything. In addition, every realm which is itself in the Father is from the one who exists, who establishes them from what doesn’t exist. For those who have no root have no fruit either. They think to themselves, “I’ve come into being,” but they’ll dissolve by themselves. Because of this, those who didn’t exist at all won’t exist.'
base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/007.yaml
  text: 'For they had not yet received form or a name. The Father brings them forth. Then[a], when they receive form by his knowledge, though they are truly within him, they do not know him. But the Father is complete, knowing every space that is within him. If he wills, he reveals whomever he wills, giving them form and giving them a name. He gives a name to them and causes them to come into being—those who, before they come into being, are ignorant of the one who made them.


    Do not, then, say that those who have not yet come to be are nothing; rather, they exist in the One who will will them to come to be, when he wills—like a later season. Before everything is revealed, he knows what he will produce in his own time. But the fruit that he has not yet revealed knows nothing yet and does nothing.


    Moreover, every aeon that is in the Father is from the One‑who‑is, who establishes them out of non‑being. For those who have no root have no fruit. They say within themselves, “I have come to be,” but they will dissolve by themselves. Because of this, those who did not exist at all will not exist.'
  footnotes:
  - marker: a
    text: Or 'They knew they had not yet received form—of the things that are within him, in the Father. Yet the Father is complete, knowing every thing that is within him. And when he wills, he reveals whomever he wills, giving them a form in what exists; he clothes them and brings them out with outward form in what exists.'.
