  doctrine_reference: Identidad conferida por revelación/emanación
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail en inglés y la revisión que corrigió la omisión de ''nombre'' y la lectura errónea sobre ''clothes them''. Se optó por una formulación española que refleja la secuencia del copto: forma, nombre, venir a ser, ignorancia previa, y el contraste ontológico entre el que es y el no-ser.'
  spanish_consistency_notes:
  - Se usa 'el Padre' de forma consistente como título teológico.
  - Se reserva 'eón' para el término técnico aeon, siguiendo la decisión inglesa.
  - Se evita 'SEÑOR' como sustituto de nombre divino porque no aplica aquí.
  - Se mantiene el paralelismo 'forma y nombre' en todo el pasaje.
  - '''No-ser'' se usa de manera consistente para ⲧⲙⲛⲧⲉⲩⲛⲟⲩ, en lugar de ''nada''.'
