  rationale: '''No-ser'' conserva el registro ontológico del pasaje y su contraste con el ''que es'', sin cerrar la discusión hacia una formulación dogmática posterior sobre creatio ex nihilo.'
  doctrine_reference: Ontología valentiniana; creación y emanación
- issue: ⲡⲉⲉⲓ como título del origen del ser
  english_pob_reading: the One-who-is
  chosen_spanish_reading: el que es
  alternative_spanish_readings:
