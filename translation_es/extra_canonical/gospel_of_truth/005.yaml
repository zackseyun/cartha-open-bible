translation:
  language: es
  text: 'Jesús de la infinita Dulzura[a].


    El Padre dio a conocer su seno; su seno es el Espíritu Santo. Manifestó lo que de sí mismo está oculto; lo que de sí mismo está oculto es su Hijo, para que, por las misericordias del Padre, los Aeones conozcan a él, dejen de buscar al Padre y descansen en él, sabiendo que este es el Descanso.


    El Padre llenó la deficiencia y disolvió su apariencia[b] —su apariencia es el mundo en el que había servido. Porque donde hay envidia y contienda, hay deficiencia; pero donde hay Unidad, hay plenitud. Ya que la deficiencia llegó a existir porque el Padre no era conocido, cuando el Padre sea conocido, desde entonces la deficiencia ya no existirá[c], así como la ignorancia de una persona se disuelve cuando está presente el conocimiento, y así como la oscuridad se disuelve cuando aparece la luz. Así también la deficiencia se disuelve por la plenitud. Desde entonces su apariencia ya no se manifiesta[d], y será disuelta en la concordia de la Unidad.


    Pues ahora sus obras están dispersas; pero a su tiempo la Unidad completará a los Aeones. Dentro de la Unidad cada uno se recibirá a sí mismo, y dentro del Conocimiento se purificarán de la multiplicidad hacia la Unidad, consumiendo la materia dentro de sí como fuego, y la oscuridad por la luz, y la muerte por la vida. Si de hecho estas cosas han sucedido a cada uno de nosotros, conviene pensar acerca de todo[e], para que esta casa sea santa y callada por causa de la Unidad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Dulzura’ traduce aquí un título cristológico tradicional en este texto; no debe leerse como simple cualidad abstracta.
    reason: theological_note
  - marker: b
    text: También puede entenderse como ‘dissolvió su forma’; se eligió ‘apariencia’ porque encaja mejor con el contraste del pasaje entre apariencia y plenitud.
    reason: lexical_alternative
  - marker: c
    text: La frase subraya que, una vez conocido el Padre, la deficiencia cesa de existir.
    reason: theological_note
  - marker: d
    text: 'También: ‘Desde entonces su apariencia no está ya manifiesta’.'
    reason: alternative_reading
  - marker: e
    text: 'O: ‘pensar acerca del Todo’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲓⲏⲥ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Iesús
  lexicon: Crum; NH Coptic usage
  rationale: Nombre propio estándar en español para el referente de Ἰησοῦς/ⲓⲏⲥ.
- source_word: 'ⲧⲙⲛⲧⲁⲧⲁⲣⲏⲭⲥ / (audit trail: ‘infinite sweetness’)'
  english_pob_choice: the infinite sweetness
  chosen_spanish: la infinita Dulzura
  alternatives_spanish:
  - la infinita suavidad
  - la dulzura infinita
  lexicon: Coptic Valentinian usage; English POB audit trail
  rationale: Sigo el juicio revisado del POB inglés que corrige la lectura anterior y mantiene ‘sweetness’ como título cristológico. En español, ‘Dulzura’ comunica mejor el matiz laudatorio y titular, con mayúscula por tratarse de un apelativo teológico.
- source_word: ⲡⲉⲑⲏⲡ
  english_pob_choice: bosom
  chosen_spanish: seno
  alternatives_spanish:
  - pecho
  - regazo
  lexicon: Crum; Johannine resonance
  rationale: ‘Seno’ conserva el valor relacional e íntimo del término mejor que ‘pecho’ y evita la imagen demasiado corporal de ‘regazo’ en este contexto teológico.
- source_word: ⲡⲛⲁ ⲉⲧⲟⲩⲁⲁⲃ
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el espíritu santo
  lexicon: Crum; doctrinal title usage
  rationale: Título fijo en español para el referente pneumatológico explícito; se capitaliza como nombre/título sagrado.
- source_word: ⲥⲭⲏⲙⲁ
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - forma
  - figura
  lexicon: Greek loan; LSJ; Crum
  rationale: ‘Apariencia’ expresa la exterioridad pasajera que el texto dice que se disuelve, sin introducir una concreción ontológica excesiva como ‘forma’ o ‘figura’.
- source_word: ⲕⲟⲥⲙⲟⲥ
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - cosmos
  lexicon: Greek loan; LSJ
  rationale: ‘Mundo’ es más natural en español y conserva el orden presente al que se refiere el pasaje.
- source_word: ⲧⲙⲛⲧⲟⲩⲉⲉⲓ
  english_pob_choice: Unity
  chosen_spanish: Unidad
  alternatives_spanish:
  - unificación
  - unidad
  lexicon: Crum; Lambdin
  rationale: Capitalizo ‘Unidad’ para preservar el valor técnico valentiniano del término, como en el audit trail inglés.
- source_word: ⲥⲁⲩⲛⲉ
  english_pob_choice: Knowledge
  chosen_spanish: Conocimiento
  alternatives_spanish:
  - gnosis
  - sabiduría
  lexicon: Crum; Layton
  rationale: El español ‘Conocimiento’ mantiene el sentido soteriológico del término sin introducir un tecnicismo ajeno; se capitaliza cuando funciona como realidad salvadora.
- source_word: ⲧϩⲩⲗⲏ
  english_pob_choice: matter
  chosen_spanish: materia
  alternatives_spanish:
  - materialidad
  - materia corporal
  lexicon: Greek loan; LSJ; Crum
  rationale: ‘Materia’ es el equivalente filosófico natural en español para hylē y respeta el marco cosmológico del texto.
- source_word: ⲱⲛϩ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vivir
  lexicon: Crum
  rationale: Término básico y contrastivo frente a ‘muerte’.
- source_word: ⲙⲟⲩ
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - morir
  lexicon: Crum
  rationale: Término básico y contrastivo frente a ‘vida’.
- source_word: ⲧⲁⲡ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - ánimo
  lexicon: Crum
  rationale: Aunque este segmento no conserva el sintagma en la traducción final revisada, la imaginería afectiva del pasaje en español se mantiene con recursos equivalentes en otras partes del corpus POB; aquí no se fuerza una inserción no atestiguada.
theological_decisions:
- issue: Identificación del seno del Padre con el Espíritu Santo
  english_pob_reading: ‘his bosom is the Holy Spirit.’
  chosen_spanish_reading: ‘su seno es el Espíritu Santo.’
  alternative_spanish_readings:
  - ‘su seno significa el Espíritu Santo’
  - ‘su seno representa al Espíritu Santo’
  rationale: La estructura copulativa del copto favorece una identificación fuerte, no meramente simbólica. El español mantiene la afirmación ontológica sin suavizarla.
  doctrine_reference: Pneumatología valentiniana; Juan 1:18 en trasfondo resonante
- issue: Retención de Aeones como término técnico
  english_pob_reading: ‘the Aeons’
  chosen_spanish_reading: ‘los Aeones’
  alternative_spanish_readings:
  - ‘las eras’
  - ‘las edades’
  rationale: En este contexto cosmológico gnóstico, ‘Aeones’ funciona como término de arte. Traducirlo como ‘edades’ diluiría el referente doctrinal.
  doctrine_reference: Cosmología valentiniana
- issue: Dissolving the deficiency and its appearance
  english_pob_reading: ‘dissolved its appearance’
  chosen_spanish_reading: ‘disolvió su apariencia’
  alternative_spanish_readings:
  - ‘expulsó su apariencia’
  - ‘suprimió su apariencia’
  rationale: El audit trail inglés ya corrigió una lectura anterior errónea; ‘disolvió’ conserva la misma metáfora de deshacer, sin añadir una imagen exorcística ajena al texto.
  doctrine_reference: Soteriología del retorno a la Unidad
- issue: Negation in ‘its appearance is no longer manifest’
  english_pob_reading: ‘its appearance is no longer manifest’
  chosen_spanish_reading: ‘su apariencia ya no se manifiesta’
  alternative_spanish_readings:
  - ‘su apariencia se manifiesta’
  - ‘su apariencia ya no es visible’
  rationale: Se preserva la negación textual; la forma española evita la contradicción de la lectura descartada por el revisor y su adjudicación.
  doctrine_reference: Coherencia textual y lógica interna del pasaje
- issue: Interpretation of ‘think concerning the All’
  english_pob_reading: ‘it is necessary to think concerning the All’
  chosen_spanish_reading: ‘conviene pensar acerca de todo’
  alternative_spanish_readings:
  - ‘conviene pensar acerca del Todo’
  - ‘debemos pensar en el Todo’
  rationale: El copto y el audit trail inglés permiten ‘All’ como totalidad. En español, ‘todo’ conserva la amplitud sin imponer una mayúscula metafísica no asegurada por el contexto inmediato.
  doctrine_reference: Lectura global del pasaje; no dogmática
translation_notes:
  revision_awareness: 'La traducción española sigue el audit trail inglés revisado: adopta la corrección de ‘Jesus of the infinite sweetness’, mantiene la identificación del seno con el Espíritu Santo, conserva la negación en la desaparición de la apariencia y evita la lectura errónea de ‘cast out’. También refleja la decisión de tratar ‘Unity’, ‘Aeons’ y ‘Knowledge’ como términos técnicos capitalizados cuando funcionan como conceptos doctrinales.'
  spanish_consistency_notes:
  - Se mantiene ‘Unidad’, ‘Aeones’ y ‘Conocimiento’ con mayúscula cuando son términos técnicos del pasaje.
  - Se usa ‘disolver/disolverse’ de manera consistente para ⲃⲱⲗ ⲁⲃⲁⲗ.
  - ‘Espíritu Santo’ y ‘Jesús’ se escriben con mayúscula por norma española y por su valor titular.
  - No se introduce ‘Cristo’ porque el audit trail inglés no lo requiere en este segmento.
  - ‘Apariencia’ se usa con sentido ontológico/ fenomenológico, no meramente visual.
