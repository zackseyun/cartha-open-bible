translation:
  language: es
  text: 'Él es el pastor que dejó las noventa y nueve ovejas que no se habían extraviado[a], y fue y buscó a la que se había extraviado. Cuando la encontró, se alegró por ella, porque noventa y nueve es un número en la mano izquierda.[1] Pero cuando se encuentra la una, el cálculo pasa a la mano derecha. De este modo, lo que necesita la una —es decir, toda la mano derecha— atrae lo que necesita, lo toma de la mano izquierda y lo transfiere a la derecha, de modo que el número llega a ser cien. Esta es una señal del sonido de estos números; es el Padre.[2]



    Incluso en sábado trabajó por causa de la oveja que encontró caída en el pozo[b]. Salvo la vida de la oveja, al sacarla del pozo, para que sepan en su corazón —pues ustedes son hijos del conocimiento del corazón— qué es el sábado: que en él no es conveniente que la salvación esté ociosa,[3] para que hablen del Día que está arriba, que no tiene noche, y de la Luz que no se pone, porque es completa. Hablen, pues, desde el corazón, porque ustedes son el Día perfecto, y la luz que no se apaga habita dentro de ustedes. Hablen de la Verdad con quienes la buscan, y del Conocimiento con quienes han pecado en su Error.[4][5]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: ''y fue y buscó a la que se había extraviado en el Error''. La revisión inglesa eliminó esa expansión porque el coptico aquí usa el verbo ''extraviarse'' y no el sustantivo ''Error''.'
    reason: textual_variant
  - marker: b
    text: 'También puede leerse: ''la oveja que había caído en el pozo''. La redacción mantiene ''encontró'' porque el texto copto incluye esa cláusula relativa antes de la acción de caer.'
    reason: textual_variant
lexical_decisions:
- source_word: ⲥⲁⲩ
  english_pob_choice: sheep
  chosen_spanish: ovejas / oveja
  alternatives_spanish:
  - rebaño
  lexicon: Crum; Layton
  rationale: El término coptico nombra una oveja individual o plural según el contexto. Aquí el contexto alterna entre las noventa y nueve y la oveja única; en español conviene mantener esa alternancia natural entre plural y singular.
- source_word: ⲡⲗⲁⲛⲏ
  english_pob_choice: Error
  chosen_spanish: Error
  alternatives_spanish:
  - error
  - extravio
  - desviación
  lexicon: Greek loan (planē) attested in Coptic; Crum
  rationale: En el auditorio valentiniano de Gospel of Truth, el término funciona como realidad personificada/teológica. En español se conserva la mayúscula como en la edición inglesa para sostener esa carga técnica.
- source_word: ⲟⲩⲱⲡⲉ
  english_pob_choice: number
  chosen_spanish: número
  alternatives_spanish:
  - cálculo
  - conteo
  - reckoning
  lexicon: Crum
  rationale: El pasaje trata explícitamente 99, 1 y 100 y de la aritmética con las manos; 'número' es claro y fiel. En la frase dinámica siguiente, 'cálculo' ayuda a reflejar el movimiento numérico hacia la derecha.
- source_word: ⲧⲁⲉⲓⲉ
  english_pob_choice: left hand
  chosen_spanish: mano izquierda
  alternatives_spanish:
  - izquierda
  lexicon: Crum
  rationale: El contraste es manual y aritmético, no meramente direccional; por eso se explicita 'mano'.
- source_word: ⲙⲣⲏⲧⲉ
  english_pob_choice: right hand
  chosen_spanish: mano derecha
  alternatives_spanish:
  - derecha
  lexicon: Crum
  rationale: Por simetría con 'mano izquierda' y para conservar la imaginería de contar con los dedos.
- source_word: ⲧⲱⲱⲛⲉ
  english_pob_choice: the one
  chosen_spanish: la una
  alternatives_spanish:
  - el uno
  - la unidad
  lexicon: Crum
  rationale: Aquí el término es numérico, no un título metafísico. En español 'la una' conserva el valor de uno que completa 99 y permite concordancia con 'se encuentra' y 'la encontró'.
- source_word: ⲥϣⲓⲛⲉ
  english_pob_choice: seek
  chosen_spanish: buscar
  alternatives_spanish:
  - buscar con cuidado
  - buscar
  lexicon: Crum
  rationale: '''Buscar'' es el equivalente natural en español y mantiene el paralelismo del relato. ''Sought'' no exige una forma más marcada.'
- source_word: ϫⲏⲕ
  english_pob_choice: complete/perfect
  chosen_spanish: completa / perfecto
  alternatives_spanish:
  - perfecta
  - plena
  - acabada
  lexicon: Crum
  rationale: El adjetivo se aplica a la Luz y al Día; en español conviene 'completa' para la Luz y 'perfecto' para el Día, reproduciendo la variación del inglés sin endurecerla artificialmente.
- source_word: ⲥⲁⲃⲃⲁⲧⲟⲛ
  english_pob_choice: Sabbath
  chosen_spanish: sábado
  alternatives_spanish:
  - Sabbat
  - Sábado
  lexicon: Greek loan; Crum
  rationale: En este contexto el texto coptico refiere el día semanal. 'Sábado' es la forma natural y comprensible para lectores en español; se mantiene el valor judío-cristiano del descanso semanal.
- source_word: ⲡⲟⲩϫⲁⲉⲓ
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - rescate
  - liberación
  lexicon: Crum
  rationale: El texto habla del acto soteriológico de levantar a la oveja del pozo. 'Salvación' conserva el registro teológico del pasaje.
- source_word: ⲡⲓϩⲱⲟⲩ
  english_pob_choice: Day
  chosen_spanish: Día
  alternatives_spanish:
  - día
  lexicon: Crum
  rationale: La mayúscula sigue la lectura simbólica del 'Día que está arriba' como imagen trascendente. En español se conserva esta señalización por consistencia con la tradición POB.
- source_word: ⲡⲟⲩⲁⲉⲓⲛ
  english_pob_choice: Light
  chosen_spanish: Luz
  alternatives_spanish:
  - luz
  lexicon: Crum
  rationale: La capitalización conserva la referencia metafísica al ámbito luminoso superior, no mera iluminación física.
- source_word: ⲙⲉⲉⲩⲉ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocimiento
  - sabiduría
  - pensamiento
  lexicon: Crum; Thomassen
  rationale: En esta obra, el término participa de la oposición gnosis/Error. 'Conocimiento' sostiene el valor técnico sin convertirlo en simple actividad mental.
theological_decisions:
- issue: ⲡⲗⲁⲛⲏ como realidad personificada
  english_pob_reading: Render as personified 'Error' (capitalized)
  chosen_spanish_reading: Conservar 'Error' con mayúscula
  alternative_spanish_readings:
  - error
  - desvío
  rationale: La mayúscula preserva la fuerza técnica de Planē como poder opuesto al Conocimiento, en continuidad con la lectura inglesa auditada.
  doctrine_reference: Valentinian / gnosis-error polarity in Gospel of Truth
- issue: El motivo numérico de izquierda/derecha
  english_pob_reading: '''number moves to the right hand'' and ''sign of the sound of these numbers'''
  chosen_spanish_reading: '''el cálculo pasa a la mano derecha'' / ''señal del sonido de estos números'''
  alternative_spanish_readings:
  - el número pasa a la mano derecha
  - señal de la voz de estos números
  rationale: '''Cálculo'' hace más claro el movimiento aritmético del pasaje, mientras que ''sonido'' mantiene la prudencia del inglés frente a ''voz'', que podría personificar indebidamente a los números.'
  doctrine_reference: Symbolic numerology in the Gospel of Truth
- issue: Sábado y trabajo para salvar
  english_pob_reading: Even on the Sabbath he labored... it is not fitting for salvation to be idle
  chosen_spanish_reading: '''Incluso en sábado trabajó... no es conveniente que la salvación esté ociosa'''
  alternative_spanish_readings:
  - no conviene que la salvación descanse
  - no es justo que la salvación esté inactiva
  rationale: 'La frase conserva la tensión teológica: el sábado no suspende la obra salvadora. ''Esté ociosa'' refleja con sobriedad la idea de inactividad sin domesticarla.'
  doctrine_reference: Sabbath theology within Gospel of Truth
- issue: '''Hijos del conocimiento del corazón'''
  english_pob_reading: children of the knowledge of the heart
  chosen_spanish_reading: '''hijos del conocimiento del corazón'''
  alternative_spanish_readings:
  - hijos del saber del corazón
  - hijos del entendimiento del corazón
  rationale: Se conserva literalmente la construcción para no borrar la fórmula identitaria del texto, aunque suene deliberada y técnica.
  doctrine_reference: Valentinian interior knowledge / heart-knowledge
translation_notes:
  revision_awareness: 'La draft sigue la revisión reciente del inglés que corrigió dos puntos: eliminó la expansión indebida ''in the Error'' en el verbo de extraviarse, y restauró la cláusula relativa ''which he found'' en la oveja del pozo. También refleja la estabilidad del último pase de revisión, que no introdujo cambios adicionales.'
  spanish_consistency_notes:
  - Se mantiene la distinción POB entre 'Verdad' y 'Conocimiento' como términos técnicos capitalizados.
  - Se conserva 'Error' con mayúscula por coherencia con la lectura teológica del texto, pero se evita añadir 'en el Error' donde el copto no lo exige.
  - Se traduce 'Sabbath' como 'sábado' por naturalidad en español, sin perder la referencia al descanso sagrado.
  - Se usa 'mano izquierda/derecha' para respetar la numerología de dedos y no reducir el pasaje a una metáfora vaga.
  - '''La una'' se emplea para el número uno, no como femenino sustantivado doctrinal.'
