  consult_excerpt: 'He’s the shepherd who left behind the ninety- 32 nine sheep which weren’t lost. He went and searched for the one which was lost. He rejoiced when he found it, because ninety-nine is a number expressed with the left hand. However, when the one is found, the numerical sum moves to the right hand. In this way, what needs the one – that is, the whole right hand – draws what it needs, takes it from the left hand, and moves it to the right, so the number becomes one hundred. This is a symbol of the sound of these numbers; this is the Father.

    Even on the Sabbath, he worked for the sheep which he found fallen in the pit. He saved the life of the sheep, having brought it up from the pit, so that you may know in your hearts – you’re children of the knowledge of the heart – what is the Sabbath, on which it isn’t right for salvation to be idle, so that you may speak of the day which is above, which has no night, and of the light that doesn’t set, because it’s complete. Speak then from the heart, because you’re the completed day, and the light that doesn’t cease dwells within you. Speak of the Truth with those who search for it, and of knowledge with those who’ve sinned in their Error.'
base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/010.yaml
  text: 'He is the shepherd who left the ninety‑nine sheep that had not gone astray[a], and he went and sought the one that had wandered. When he found it, he rejoiced over it, because ninety‑nine is a number on the left hand.[1] But when the one is found, the reckoning moves to the right hand. In this way, what needs the one—that is, the whole of the right hand—draws what it needs, taking it from the left hand and transferring it to the right, so that the number becomes a hundred. This is a sign of the sound of these numbers; it is the Father.[2]


    Even on the Sabbath he labored for the sake of the sheep that he found fallen into the pit. He saved the life of the sheep, having brought it up out of the pit, so that you may know in your heart—since you are children of the knowledge of the heart—what the Sabbath is: that on it it is not fitting for salvation to be idle,[3] so that you may speak of the Day which is above, which has no night, and of the Light that does not set, because it is complete. Speak, then, from the heart, for you are the perfect Day, and the light that does not fail dwells within you. Speak of the Truth with those who seek it[b], and of Knowledge with those who have sinned in their Error.[4][5]'
  footnotes:
  - marker: a
    text: Or 'and he went and sought the one that had wandered in the Error.'.
    reason: previous_rendering
  - marker: b
    text: Or 'for the sake of the sheep that had fallen into the pit.'.
    reason: previous_rendering
