translation:
  language: es
  text: 'Cuando fue revelado[a], les enseñó acerca del Padre —el incontenible— y sopló en ellos lo que está en el Pensamiento, cumpliendo su voluntad. Muchos recibieron la Luz y se volvieron a él, porque los materiales eran extraños; no vieron su forma ni lo conocieron. Vino por medio de una forma carnal, y nada pudo bloquear su camino, porque la incorruptibilidad es inasible.


    Dijo cosas nuevas, al expresar lo que está en el corazón del Padre, y sacó la Palabra completa; cuando la Luz habló desde su boca, y su voz dio a luz a la vida, les dio Pensamiento, entendimiento, misericordia, salvación y el Espíritu de poder, de la infinitud y la dulzura del Padre.


    Hizo cesar los castigos y los azotes, porque estaban llevando al Error y a la cautividad a los que necesitaban misericordia. Los deshizo y los confundió mediante el Conocimiento.


    Así llegó a ser:


    - un Camino para los que andaban extraviados,


    - Conocimiento para los que eran ignorantes,


    - un Descubrimiento para los que buscaban,


    - Fuerza para los que vacilaban,


    - y Pureza para los contaminados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se manifestó».'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲁⲧⲉⲙⲁϩⲧⲉ
  english_pob_choice: uncontainable
  chosen_spanish: Incontenible
  alternatives_spanish:
  - Inabarcable
  - Inasible
  lexicon: Crum (ⲙⲁϩⲧⲉ ‘agarrar, contener’), uso teológico en el contexto valentiniano
  rationale: ‘Incontenible’ conserva la idea de no poder ser contenido o retenido, y funciona bien como título del Padre en español. ‘Inasible’ se reserva para la cláusula final sobre la incorruptibilidad, donde el sentido de ‘no poder ser agarrado’ es más directo.
- source_word: ⲡⲉⲧϩⲙⲫⲏⲧ
  english_pob_choice: what is in the heart
  chosen_spanish: lo que está en el Pensamiento
  alternatives_spanish:
  - lo que está en el corazón
  - lo interior del pensamiento
  lexicon: Crum (ⲫⲏⲧ ‘corazón’), contexto de Thought/Pensamiento
  rationale: El inglés POB conserva ‘Thought’ como término técnico capitalizado; en español, ‘Pensamiento’ mantiene esa función y evita una posible oscilación entre interioridad afectiva e intelectual. La frase se vuelve natural y a la vez técnica.
- source_word: ⲟⲉⲓⲛ
  english_pob_choice: Light
  chosen_spanish: Luz
  alternatives_spanish:
  - luz
  lexicon: Crum; uso teológico en el discurso valentiniano
  rationale: Se capitaliza ‘Luz’ para reproducir el valor técnico y reificado del término, siguiendo el tratamiento del POB en inglés.
- source_word: ⲡϣⲉϫⲉ
  english_pob_choice: Word
  chosen_spanish: Palabra
  alternatives_spanish:
  - Verbo
  - Palabra hablada
  lexicon: Crum
  rationale: ‘Palabra’ es la equivalencia española más fiel y publicable para el Logos/Word en este contexto; ‘Verbo’ sería más litúrgico y menos transparente para un registro moderno.
- source_word: ⲁⲧⲧⲉⲕⲟ
  english_pob_choice: incorruptibility
  chosen_spanish: incorruptibilidad
  alternatives_spanish:
  - incorrupción
  - incorruptibilidad (como estado)
  lexicon: Crum; uso doctrinal
  rationale: Se conserva el sustantivo abstracto clásico ‘incorruptibilidad’, que en español comunica bien la cualidad de no estar sujeto a corrupción. Es más preciso que ‘incorrupción’ en este registro.
- source_word: ⲁⲧⲧⲉⲙⲁϩⲧⲉ
  english_pob_choice: ungraspable
  chosen_spanish: inasible
  alternatives_spanish:
  - inalcanzable
  - inaprehensible
  lexicon: Crum (negativo de ‘asir’/‘captar’)
  rationale: '‘Inasible’ transmite de forma compacta que no puede ser asida o agarrada. La elección mantiene la tensión conceptual: la incorruptibilidad no se puede capturar.'
- source_word: ⲙⲁⲥⲧⲓⲅⲝ
  english_pob_choice: scourges
  chosen_spanish: azotes
  alternatives_spanish:
  - flagelos
  - látigos
  lexicon: BDAG (μάστιξ)
  rationale: ‘Azotes’ es la opción más natural y bíblica en español para el castigo corporal; conserva fuerza sin sonar arqueizante.
- source_word: ⲕⲟⲗⲁⲥⲓⲥ
  english_pob_choice: punishments
  chosen_spanish: castigos
  alternatives_spanish:
  - penas
  - penas punitivas
  lexicon: BDAG (κόλασις)
  rationale: ‘Castigos’ comunica el sentido general de sanción y pena. Se prefiere un término llano, ya que el doblet con ‘azotes’ ya aporta el matiz de severidad.
- source_word: ⲡⲗⲁⲛⲏ
  english_pob_choice: Error
  chosen_spanish: Error
  alternatives_spanish:
  - engaño
  - desvío
  lexicon: BDAG; uso personificado en el Gospel of Truth
  rationale: Se mantiene ‘Error’ con mayúscula para reflejar la fuerza personificada que el texto le atribuye, en continuidad con el POB inglés.
- source_word: ⲥⲁⲓ
  english_pob_choice: captivity
  chosen_spanish: cautividad
  alternatives_spanish:
  - cautiverio
  - esclavitud
  lexicon: Crum
  rationale: ‘Cautividad’ conserva el paralelismo con Error como estado opresivo. ‘Cautiverio’ sería igualmente posible, pero ‘cautividad’ suena más abstracto y literario.
- source_word: ⲥⲁⲩⲛⲉ
  english_pob_choice: Knowledge
  chosen_spanish: Conocimiento
  alternatives_spanish:
  - gnosis
  - conocimiento
  lexicon: Crum; uso teológico
  rationale: Se capitaliza ‘Conocimiento’ para reflejar el valor salvador/técnico del término, sin introducir el helenismo ‘gnosis’ en el texto principal.
- source_word: ⲙⲁⲉⲓⲧ
  english_pob_choice: Way
  chosen_spanish: Camino
  alternatives_spanish:
  - Vía
  - Ruta
  lexicon: Crum
  rationale: ‘Camino’ es el término más natural y bíblicamente resonante en español; conserva la imagen de dirección salvífica.
- source_word: ⲧⲁϫⲣⲟ
  english_pob_choice: Strength
  chosen_spanish: Fuerza
  alternatives_spanish:
  - Fortaleza
  - Poder
  lexicon: Crum
  rationale: ‘Fuerza’ comunica de manera directa la capacidad de sostener a los que vacilan. ‘Poder’ podría sonar más abstracto o jerárquico.
- source_word: ⲙⲛⲧⲁⲧϫⲱϩⲙ
  english_pob_choice: Purity
  chosen_spanish: Pureza
  alternatives_spanish:
  - limpieza
  - no contaminación
  lexicon: Crum
  rationale: ‘Pureza’ preserva la cualidad abstracta que el inglés POB traduce con mayúscula. En español, ‘Pureza’ es claro, elevado y fiel al contraste con ‘contaminados’.
- source_word: ⲡⲛⲁ
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: Crum
  rationale: Se capitaliza ‘Espíritu’ por tratarse de un don divino en la serie de regalos soteriológicos. La mayúscula ayuda a diferenciarlo de un uso meramente anímico.
- source_word: ⲥⲁⲙⲁⲣⲁⲁⲛ
  english_pob_choice: sweetness
  chosen_spanish: dulzura
  alternatives_spanish:
  - suavidad
  - amabilidad
  lexicon: Crum (uso raro), contexto inmediato
  rationale: ‘Dulzura’ conserva la dimensión afectiva de la expresión y su asociación con la benevolencia del Padre. Es el equivalente más natural y teológicamente cálido en español.
- source_word: ⲁⲣⲏⲭⲉⲛ
  english_pob_choice: Beginning
  chosen_spanish: el Principio
  alternatives_spanish:
  - el Comienzo
  - el Origen
  lexicon: BDAG (ἀρχή), uso titulativo
  rationale: Aunque el inglés POB no conservó aquí un título explícito en la lectura revisada, ‘el Principio’ queda disponible como resonancia conceptual si se necesitara en nota. No se incorpora al texto principal porque el pasaje revisado no lo requiere.
theological_decisions:
- issue: Personificación de Error
  english_pob_reading: ‘Error’ is a hostile reified power.
  chosen_spanish_reading: ‘Error’ se mantiene con mayúscula como poder hostil personificado.
  alternative_spanish_readings:
  - ‘engaño’ como sustantivo común
  - ‘desvío’
  rationale: El contexto del Gospel of Truth trata Error como una realidad operante, no solo como una idea abstracta. La mayúscula en español preserva esa fuerza teológica sin añadir glosa interpretativa.
  doctrine_reference: Gospel of Truth / uso valentiniano de Error como poder soteriológico adverso
- issue: ‘Spirit of power’ genitive
  english_pob_reading: ‘Spirit of power’ as a genitive of quality.
  chosen_spanish_reading: ‘Espíritu de poder’ como genitivo de cualidad.
  alternative_spanish_readings:
  - ‘Espíritu poderoso’
  - ‘Espíritu con poder’
  rationale: La secuencia de dones requiere mantener el sustantivo ‘Espíritu’ con su cualificación. ‘Espíritu de poder’ conserva la estructura y la cadencia del original.
  doctrine_reference: Pneumatología del texto; catálogo de dones salvíficos
- issue: ‘Thought’/‘Mind’ technical term
  english_pob_reading: ‘Thought’ is capitalized as a technical salvific term.
  chosen_spanish_reading: ‘Pensamiento’ con mayúscula en el texto principal.
  alternative_spanish_readings:
  - ‘Mente’
  - ‘pensamiento’ en minúscula
  rationale: ‘Pensamiento’ resulta más fiel al campo semántico del original y menos psicologista que ‘Mente’. La mayúscula ayuda a conservar el valor técnico que el POB documenta.
  doctrine_reference: Valentinian salvific anthropology / noesis terminology
- issue: ‘Came by means of a fleshly form’
  english_pob_reading: The revealer’s mode of appearance is through fleshly form, not mere appearance.
  chosen_spanish_reading: ‘Vino por medio de una forma carnal’.
  alternative_spanish_readings:
  - ‘vino en una forma carnal’
  - ‘vino por medio de carne’
  rationale: ‘Por medio de’ reproduce la mediación del modo de manifestación sin reducirlo a una encarnación doctrinal clásica que el texto no formula de manera cristológica nicena.
  doctrine_reference: Christological appearance language in the Gospel of Truth
- issue: List of salvific gifts
