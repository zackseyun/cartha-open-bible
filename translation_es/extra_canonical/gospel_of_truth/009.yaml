translation_notes:
  revision_awareness: He incorporado la revisión adjudicada que eliminó lecturas fantasma derivadas del OCR corrupto. En particular, no he incluido las frases espurias sobre ‘outside, in the place of the One Light’, ‘an ignorance remained beside him’ ni ‘The Beginning is the Father, the immeasurable one’. También he alineado la sección con la lectura revisada que habla de la voz del Light dando a luz vida y del catálogo de dones salvíficos. Mi español sigue ese estado textual corregido y no el borrador previo erróneo.
  spanish_consistency_notes:
  - 'Se mantiene la capitalización de términos técnicos: Luz, Pensamiento, Conocimiento, Error, Camino, Fuerza, Pureza, Espíritu.'
  - ‘Forma carnal’ conserva la mediación del revelador sin convertirla en un dogma ajeno al texto.
  - La elección de ‘cautividad’ y ‘azotes’ refleja el par opresivo del original con registro bíblico claro.
  - He evitado ‘Cristo’ y ‘Mesías’ porque este pasaje no los exige; el referente es ‘él’/el revelador, conforme al contexto.
  - La nota[a] solo marca una alternativa de traducción inicial para ‘cuando fue revelado’; no introduce contenido textual adicional.
