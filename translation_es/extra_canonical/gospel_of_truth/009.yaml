revisions:
- from: 'Cuando fue revelado[a], les enseñó acerca del Padre —el Incontenible— y sopló en ellos lo que está en el Pensamiento, cumpliendo su voluntad. Muchos recibieron la Luz y se volvieron a él, porque los materiales eran extraños; no vieron su forma ni lo conocieron. Vino por medio de una forma carnal, y nada pudo bloquear su camino, porque la incorruptibilidad es inasible.


    Dijo cosas nuevas, al expresar lo que está en el corazón del Padre, y sacó a la luz la Palabra completa; cuando la Luz habló por su boca, y su voz dio a luz vida, les dio Pensamiento, entendimiento, misericordia, salvación y el Espíritu de poder, de la infinitud y la dulzura del Padre.


    Hizo cesar los castigos y los azotes, porque estaban llevando al Error y a la cautividad a los que necesitaban misericordia. Los deshizo y los confundió mediante el Conocimiento.


    Así llegó a ser:


    - un Camino para los que andaban extraviados,

    - Conocimiento para los que eran ignorantes,

    - un Descubrimiento para los que buscaban,

    - Fuerza para los que vacilaban,

    - y Pureza para los contaminados.'
  to: 'Cuando fue revelado[a], les enseñó acerca del Padre —el incontenible— y sopló en ellos lo que está en el Pensamiento, cumpliendo su voluntad. Muchos recibieron la Luz y se volvieron a él, porque los materiales eran extraños; no vieron su forma ni lo conocieron. Vino por medio de una forma carnal, y nada pudo bloquear su camino, porque la incorruptibilidad es inasible.


    Dijo cosas nuevas, al expresar lo que está en el corazón del Padre, y sacó la Palabra completa; cuando la Luz habló desde su boca, y su voz dio a luz a la vida, les dio Pensamiento, entendimiento, misericordia, salvación y el Espíritu de poder, de la infinitud y la dulzura del Padre.


