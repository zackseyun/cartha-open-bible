review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del copto y del POB inglés: ‘Evangelio’, ‘Verdad’, ‘gracia’, ‘Padre’, ‘Palabra’, ‘Salvador’, ‘revelación’ y la cláusula final sobre quienes lo buscan están bien encaminados. También preserva correctamente la revisión auditada clave: el copto dice ‘nombre’, no ‘palabra’, en la última oración. Sin embargo, el borrador no sigue una decisión léxico-teológica central ya documentada por el POB inglés: ⲡⲡⲗⲏⲣⲱⲙⲁ fue escogido como término técnico ‘Pleroma’, no ‘Plenitud’.'
  spanish_quality_summary: 'El español es claro, digno y legible. La sintaxis fluye bien. ‘Habían llegado a ignorar al Padre’ suena algo rígido; ‘habían llegado a ser ignorantes del Padre’ o ‘habían llegado a ignorar al Padre’ son ambos posibles, pero el actual sigue siendo comprensible. El principal problema de calidad es de consistencia terminológica/documental, no de estilo. Además, la nota [a] está mal anclada: aparece junto a ‘Padre de la Verdad’ aunque explica una alternativa de la oración final sobre ‘el nombre “Evangelio”’.'
  glossary_alignment: 'Hay buena alineación con el glosario general en los términos relevantes. No hay conflicto con Yahvé/Mesías/etc. Sí hay desalineación con la terminología específica auditada del proyecto para este pasaje: πλήρωμα/ⲡⲡⲗⲏⲣⲱⲙⲁ debe mantenerse como ‘Pleroma’ en el texto principal, no relegarse a nota como simple alternativa. También debe corregirse la ubicación de la nota sobre ‘Y el nombre “Evangelio”’.'
  issues:
  - severity: high
    issue: ⲡⲡⲗⲏⲣⲱⲙⲁ fue traducido en el texto principal como ‘la Plenitud’ en vez de ‘el Pleroma’.
    rationale: El POB inglés documentó explícitamente ‘Pleroma’ como transliteración preferida por tratarse de un término técnico valentiniano. Cambiarlo en el texto principal a una traducción semántica no preserva la decisión léxico-teológica auditada.
  - severity: high
    issue: La nota [a] está anclada en ‘Padre de la Verdad’ pero su contenido trata la alternativa ‘Y el nombre “Evangelio”’.
    rationale: 'Esto rompe la disciplina de notas: el marcador debe aparecer en el lugar relevante del texto o no incluirse. Tal como está, induce a error y no corresponde al segmento comentado.'
  - severity: medium
    issue: La nota [b] presenta ‘Pleroma’ como alternativa secundaria cuando debe ser la forma principal.
    rationale: La nota invierte la prioridad documentada por el audit trail. Si se conserva una nota, debería explicar ‘Plenitud’ como alternativa semántica, no al revés.
  revised_spanish_text: El Evangelio de la Verdad es gozo para los que han recibido gracia del Padre de la Verdad, para que lo conozcan por el poder de la Palabra que salió del Pleroma[a]—la que está en el pensamiento y en la mente del Padre. Él es llamado “Salvador”; ese es el nombre de la obra que hará para salvar a los que habían llegado a ignorar al Padre. Y el nombre “Evangelio”[b] es la revelación de la esperanza, el hallazgo de los que lo buscan.
