base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/001.yaml
  text: The Gospel of Truth is joy for those who have received grace from the Father of Truth[a], so that they might know him through the power of the Word that came forth from the Pleroma—the one who is in the thought and the mind of the Father. He is called “Savior”; that is the name of the work he will do to save those who had become ignorant of the Father. And the name “Gospel” is the revelation of hope, the discovery for those who seek him.
