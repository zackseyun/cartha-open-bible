translation:
  language: es
  text: El Evangelio de la Verdad es gozo para los que han recibido gracia del Padre de la Verdad, para que lo conozcan por el poder de la Palabra que salió del Pleroma[a]—la que está en el pensamiento y en la mente del Padre. Él es llamado “Salvador”; ese es el nombre de la obra que hará para salvar a los que habían llegado a ignorar al Padre. Y el nombre “Evangelio”[b] es la revelación de la esperanza, el hallazgo de los que lo buscan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “la Plenitud”.'
    reason: alternative_semantic_rendering
  - marker: b
    text: 'O: “Y la palabra ‘Evangelio’”.'
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ
  english_pob_choice: Gospel
  chosen_spanish: Evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: Crum; préstamo griego εὐαγγέλιον en copto
  rationale: Se conserva el término técnico y auto-referencial del texto como título/género. En español, “Evangelio” es la forma más reconocible y fiel para ese uso.
- source_word: ⲧⲙⲏⲉ
  english_pob_choice: truth
  chosen_spanish: Verdad
  lexicon: Crum
  rationale: 'Corresponde al sentido básico del copto y preserva el nombre del tratado: “Gospel of Truth”.'
- source_word: (ⲭⲁⲣⲓⲥ, implied)
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don
  lexicon: Greek loan χάρις; Crum/BDAG
  rationale: “Gracia” conserva el peso teológico del préstamo griego y la redención recibida del Padre.
- source_word: ⲡⲓⲱⲧ
  english_pob_choice: Father
  chosen_spanish: Padre
  lexicon: Crum
  rationale: Se mantiene el título divino directo y natural en español.
- source_word: ⲧϭⲁⲙ
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - mando
  lexicon: Crum
  rationale: En este contexto cognitivo, “poder” comunica mejor el medio eficaz por el cual se llega al conocimiento.
- source_word: ⲡⲥⲁϫⲉ
  english_pob_choice: Word
  chosen_spanish: Palabra
  alternatives_spanish:
  - Verbo
  - Mensaje
  lexicon: Crum
  rationale: La personificación del término justifica mayúscula inicial en español. “Palabra” conserva el lexema sin introducir un latinismo más fuerte que el necesario.
- source_word: ⲡⲡⲗⲏⲣⲱⲙⲁ
  english_pob_choice: Pleroma
  chosen_spanish: la Plenitud
  alternatives_spanish:
  - el Pleroma
  lexicon: Greek loan πλήρωμα; Crum/BDAG
  rationale: Para español, “Plenitud” comunica el valor semántico básico y evita una transliteración técnica innecesaria en un primer nivel de lectura, sin perder la referencia al ámbito divino total.
- source_word: ⲛⲟⲩⲥ
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - intelecto
  - nous
  lexicon: Greek loan νοῦς
  rationale: “Mente” es la equivalencia más clara y natural en español para el término intelectual griego, y permite conservar el paralelismo con “pensamiento”.
- source_word: ⲟⲩⲱⲛϩ ⲃⲁⲗ
  english_pob_choice: revelation
  chosen_spanish: revelación
  alternatives_spanish:
  - apertura
  - desvelamiento
  lexicon: Crum
  rationale: 'La expresión se vierte por su efecto en el contexto: manifestación/disclosure de la esperanza. “Revelación” es la opción más idiomática y fiel.'
- source_word: ⲕⲱⲧⲉ ⲛⲥⲱϥ
  english_pob_choice: seek him
  chosen_spanish: los que lo buscan
  alternatives_spanish:
  - los que lo buscan con diligencia
  lexicon: Crum
  rationale: “Buscar” mantiene el impulso volitivo del verbo sin añadir intensidad no demostrada por el copto.
theological_decisions:
- issue: ⲡⲥⲁϫⲉ como entidad personificada
  english_pob_reading: Word (capitalized)
  chosen_spanish_reading: Palabra (capitalizada)
  alternative_spanish_readings:
  - palabra
  - Verbo
  rationale: El texto presenta a ⲡⲥⲁϫⲉ como procedente de la Plenitud y ubicado en el pensamiento y la mente del Padre; capitalizar “Palabra” conserva la carga teológica sin imponer una traducción más doctrinalizada de “Verbo”.
  doctrine_reference: Cristología/Logos; lectura teológica del discurso del tratado
- issue: ⲡⲡⲗⲏⲣⲱⲙⲁ como término técnico
  english_pob_reading: Pleroma (transliteration)
  chosen_spanish_reading: la Plenitud
  alternative_spanish_readings:
  - el Pleroma
  rationale: Aunque “Pleroma” es el tecnicismo de la tradición valentiniana, el contexto inmediato permite a la vez una traducción semántica. Se opta por “Plenitud” para claridad pública, sin borrar la referencia conceptual al ámbito pleno/divino.
  doctrine_reference: Angelología/cosmología valentiniana; terminología técnica del tratado
- issue: Título del Evangelio como nombre del mensaje
  english_pob_reading: And the name “Gospel” is the revelation of hope
  chosen_spanish_reading: Y el nombre “Evangelio” es la revelación de la esperanza
  alternative_spanish_readings:
  - Y la palabra “Evangelio” es la revelación de la esperanza
  rationale: La revisión auditada muestra que el copto dice “nombre”, no “palabra”. Por eso se preserva la conexión retórica con el “nombre” del Salvador y se evita oscurecer el recurso estilístico del texto.
  doctrine_reference: Semántica de nombres/títulos; precisión textual
- issue: Finalidad del Salvador
  english_pob_reading: to save those who had become ignorant of the Father
  chosen_spanish_reading: para salvar a los que habían llegado a ignorar al Padre
  alternative_spanish_readings:
  - para rescatar a los que habían ignorado al Padre
  - para redimir a los que habían ignorado al Padre
  rationale: “Salvar” sigue la lectura de σωτήρ y evita cargar el pasaje con una terminología de rescate/redención no requerida por el contexto inmediato. “Habían llegado a ignorar” conserva el matiz de estado adquirido.
  doctrine_reference: Soteriología del tratado; ignorancia del Padre como condición a sanar
translation_notes:
  revision_awareness: 'Se atendió la corrección auditada clave: el copto de la frase final dice “nombre” (ⲣⲁⲛ), no “palabra”; por eso en español se traduce “el nombre ‘Evangelio’”. También se mantuvo la distinción entre la auto-referencia del tratado como ‘Evangelio’ y la personificación de ‘Palabra’ en la cláusula anterior. No se introdujeron lecturas no sustentadas por el packet, y se optó por una traducción pública clara donde el tecnicismo ‘Pleroma’ podía explicarse semánticamente como ‘Plenitud’.'
  spanish_consistency_notes:
  - Se mantiene “Padre” para ⲡⲓⲱⲧ en todo el pasaje.
