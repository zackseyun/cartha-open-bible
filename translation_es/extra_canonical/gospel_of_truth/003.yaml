revisions:
- from: 'El Padre —el que no puede ser contenido— es el que mantuvo el Todo[a] dentro de sí, y el Todo está dentro de él, y todos tienen necesidad de él. Mantuvo su plenitud dentro de sí; no tuvo celos, pues ¿qué celos podía haber entre él y sus miembros? Si, de este modo, el Todo ya la hubiera recibido, no habrían podido venir a él. La guarda para ellos dentro de sí, para dársela y que vuelvan a él con un conocimiento único, en reposo, en un solo cuerpo.


    Como uno que no es conocido, desea ser conocido y ser amado; porque ¿qué necesitaba todo sino el conocimiento del Padre? Se hizo guía, pacífico y sin prisa. Vino a los lugares de aprendizaje y habló la Palabra como maestro. Los que eran sabios en su propio corazón se acercaron para ponerlo a prueba; pero los confundió, porque eran vanos. Lo odiaron porque no eran sabios en la Verdad. Después de ellos vinieron también los pequeños niños[b] —de ellos es el conocimiento del Padre. Cuando fueron fortalecidos, recibieron instrucción acerca de las expresiones del Padre. Conocieron, y fueron conocidos. Recibieron gloria y dieron gloria. En su corazón fue revelado el Libro Viviente de los Vivientes, escrito en el pensamiento y en la mente del Padre, y antes del fundamento de todo, dentro de su incomprensibilidad[c]— un libro que nadie tiene poder para tomar, pues está dispuesto para que quien lo tome sea muerto. Es imposible que alguien sea manifestado entre los que han sido confiados a la salvación,
    a menos que ese libro aparezca.


    Por eso, el misericordioso y fiel Jesús soportó con paciencia hasta tomar ese libro, pues sabe que su muerte es vida para muchos. Mientras no se ha abierto un testamento, la riqueza del señor de casa fallecido está oculta; así también, mientras el Padre del Todo era invisible, todas las cosas estaban ocultas, porque proceden de él, de quien viene todo reino. Por eso, Jesús fue manifestado; puso sobre sí ese libro; fue clavado en un árbol; y publicó el decreto del Padre sobre la cruz.


    ¡Oh, la gran enseñanza! Se abatió hasta la muerte; se vistió de vida eterna; se despojó de los andrajos perecederos; se vistió de incorruptibilidad, que nadie puede quitarle. Cuando entró en los lugares vacíos del terror, pasó por los que habían sido despojados por el olvido, siendo conocimiento y plenitud, proclamando las cosas que están en el corazón a los que están listos para recibir instrucción.'
