translation:
  language: es
  text: 'El Padre —el que no puede ser contenido— es el que mantuvo el Todo[a] dentro de sí, y el Todo está dentro de él, y todos tienen necesidad de él. Mantuvo su plenitud dentro de sí; no tuvo celos, pues ¿qué celos podía haber entre él y sus miembros? Si, de este modo, el Todo ya la hubiera recibido, no habrían podido venir a él. La guarda para ellos dentro de sí, para dársela y que vuelvan a él con un conocimiento único, en reposo, en un solo cuerpo.


    Como uno que no es conocido, desea ser conocido y ser amado; porque ¿qué necesitaba todo sino el conocimiento del Padre? Se hizo guía, pacífico y sin prisa. Vino a los lugares de aprendizaje y habló la Palabra como maestro. Los que eran sabios en su propio corazón se acercaron para ponerlo a prueba; pero los confundió, porque eran vanos. Lo odiaron porque no eran sabios en la Verdad. Después de ellos vinieron también los niños pequeños[b] —de ellos es el conocimiento del Padre. Cuando fueron fortalecidos, recibieron instrucción acerca de las expresiones del Padre. Conocieron, y fueron conocidos. Recibieron gloria y dieron gloria. En su corazón fue revelado el Libro Viviente de los Vivientes, escrito en el pensamiento y en la mente del Padre, y antes del fundamento de todo, dentro de su incomprensibilidad[c]— un libro que nadie tiene poder para tomar, pues está destinado a que quien lo tome sea muerto. Es imposible que alguien sea manifestado entre los que han sido confiados a la salvación,
    a menos que ese libro aparezca.


    Por eso, el misericordioso y fiel Jesús soportó con paciencia hasta tomar ese libro, pues sabe que su muerte es vida para muchos. Mientras no se ha abierto un testamento, la riqueza del señor de casa fallecido está oculta; así también, mientras el Padre del Todo era invisible, todas las cosas estaban ocultas, porque proceden de él, de quien viene todo reino. Por eso, Jesús fue manifestado; se revistió de ese libro; fue clavado en un árbol; y publicó el decreto del Padre sobre la cruz.


    ¡Oh, la gran enseñanza! Se abatió hasta la muerte; se vistió de vida eterna; se despojó de los andrajos perecederos; se vistió de incorruptibilidad, que nadie puede quitarle. Cuando entró en los lugares vacíos del terror, pasó entre los que habían sido despojados por el olvido, siendo conocimiento y plenitud, proclamando lo que está en el corazón a los que están listos para recibir instrucción.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Todo» traduce el término técnico copto ⲡⲧⲏⲣϥ; no es solo «todos» como cantidad, sino la totalidad concebida como realidad completa.
    reason: lexical_alternative
  - marker: b
    text: «los niños pequeños» conserva el matiz afectivo y diminutivo del original; también puede entenderse como una forma intensiva, no meramente descriptiva.
    reason: lexical_alternative
  - marker: c
    text: 'La frase puede leerse unida al inciso siguiente: «dentro de su incomprensibilidad—un libro que nadie tiene poder para tomar...». Se mantiene la pausa para respetar la sintaxis y la nota POB previa.'
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲧⲏⲣϥ
  english_pob_choice: the All
  chosen_spanish: el Todo
  alternatives_spanish:
  - la totalidad
  - el todo
  lexicon: Crum; léxico Nag Hammadi
  rationale: Sigo el valor técnico del POB inglés, pero en español "el Todo" suena más natural que una abstracción como "la totalidad" y conserva el registro metafísico del término.
- source_word: ⲥⲁⲩⲛⲉ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - gnosis
  lexicon: Crum
  rationale: '"Conocimiento" mantiene accesibilidad y la repetición temática del tratado. Reservo "gnosis" para comentario, no para el texto principal.'
- source_word: ⲥⲧⲟⲩⲱⲣⲁⲩ
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - descanso
  - reposo
  lexicon: Crum
  rationale: El pasaje une conocimiento y reposo como fórmula salvadora; "reposo" preserva dignidad y la resonancia teológica del motivo.
- source_word: ⲙⲣⲣⲓⲧ
  english_pob_choice: love
  chosen_spanish: amar
  alternatives_spanish:
  - querer
  - amar
  lexicon: Crum
  rationale: El verbo apunta a amor, no a mera preferencia o afecto leve; "ser amado" reproduce bien el paralelismo con "ser conocido".
- source_word: ⲡⲓϫⲱⲱⲙⲉ
  english_pob_choice: book
  chosen_spanish: Libro
  alternatives_spanish:
  - libro
  - rollo
  lexicon: Crum
  rationale: El motivo del "Libro Viviente" en Nag Hammadi se ha vertido tradicionalmente como libro; lo capitalizo por su función casi titulada dentro del pasaje.
- source_word: ⲙⲉⲉⲩⲉ
  english_pob_choice: thought
  chosen_spanish: pensamiento
  alternatives_spanish:
  - idea
  - pensamiento
  - intención
  lexicon: Crum
  rationale: '"Pensamiento" conserva el paralelo con "mente" y el registro interior/intelectivo del original.'
- source_word: ⲛⲟⲩⲥ
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - mente
  lexicon: Greek loanword in Coptic; Crum
  rationale: '"Mente" es el equivalente español más directo para νοῦς y permite mantener la pareja "pensamiento y mente".'
- source_word: ⲁⲧⲙⲏⲧⲉ
  english_pob_choice: impossible
  chosen_spanish: es imposible
  alternatives_spanish:
  - no es posible
  - es imposible
  lexicon: Crum
  rationale: La construcción apunta a imposibilidad real, no simple dificultad. El español necesita una formulación clara y solemne.
- source_word: ⲇⲓⲁⲑⲏⲕⲏ
  english_pob_choice: testament
  chosen_spanish: testamento
  alternatives_spanish:
  - testamento
  - voluntad
  lexicon: Greek loanword
  rationale: Sigo el valor jurídico del término tal como lo lee el POB inglés; "testamento" conserva mejor la imagen de herencia y apertura del documento.
- source_word: ⲇⲓⲁⲧⲁⲅⲙⲁ
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - decreto
  - edicto
  - orden
  lexicon: Greek loanword
  rationale: '"Decreto" comunica con precisión la proclamación autorizada atribuida al Padre; evita la sobrecarga administrativa de "edicto".'
- source_word: ⲁⲧⲧⲉⲕⲟ
  english_pob_choice: incorruptibility
  chosen_spanish: incorruptibilidad
  alternatives_spanish:
  - incorruptibilidad
  - imperdurabilidad
  lexicon: Crum
  rationale: Es el término técnico esperado en este contraste con vestiduras perecederas; mantengo la forma doctrinal establecida.
- source_word: ⲡⲗϭⲉ
  english_pob_choice: rags
  chosen_spanish: andrajos
  alternatives_spanish:
  - andrajos
  - harapos
  - trapos
  lexicon: Crum
  rationale: '"Andrajos" comunica la degradación de la vestidura antigua y su contraste con la incorruptibilidad.'
- source_word: ⲟⲩⲱⲛϩ
  english_pob_choice: be manifested
  chosen_spanish: ser manifestado
  alternatives_spanish:
  - ser manifestado
  - ser revelado
  - aparecer
  lexicon: Crum
  rationale: Conservo "manifestado" porque el POB inglés lo usa para el lenguaje de revelación y aparición pública; en español suena más técnico que "aparecer".
- source_word: ⲉⲡⲓⲇⲏ
  english_pob_choice: because / since
  chosen_spanish: por eso / pues
  alternatives_spanish:
  - porque
  - pues
  - por eso
  lexicon: Crum
  rationale: Según contexto, introduce tanto causalidad como consecuencia; por eso alterno "por eso" y "pues" para no rigidizar el flujo.
- source_word: ⲙⲡⲧⲏⲣϥ ⲉϥⲛϩⲏⲧϥ
  english_pob_choice: the All is within him
  chosen_spanish: el Todo está dentro de él
  alternatives_spanish:
  - el Todo está dentro de él
  - todo está en él
  lexicon: Contextual phrase
  rationale: Mantengo la formulación del POB y la interioridad fuerte del original; "dentro de él" suena más literal que "en él".
theological_decisions:
- issue: ¿Cómo traducir el término valentiniano ⲡⲧⲏⲣϥ?
  english_pob_reading: the All
  chosen_spanish_reading: el Todo
  alternative_spanish_readings:
  - la totalidad
  - el universo
  rationale: '"El Todo" conserva el carácter técnico del texto y evita reducirlo a simple cuantificador o a cosmología general.'
  doctrine_reference: Valentinian / Nag Hammadi terminology
- issue: ¿Cómo entender el vínculo entre el libro y la muerte de Jesús?
  english_pob_reading: it is appointed for the one who takes it to be killed
  chosen_spanish_reading: está dispuesto para que quien lo tome sea muerto
  alternative_spanish_readings:
  - está destinado a que quien lo tome muera
  - se ha fijado que quien lo tome sea muerto
  rationale: El original expresa una necesidad fuerte, casi de designación/ordenamiento. Conservé la dureza del giro sin suavizarlo demasiado.
  doctrine_reference: Martyrdom / revelatory suffering motif
- issue: ¿Cómo traducir el juego jurídico de ⲇⲓⲁⲑⲏⲕⲏ?
  english_pob_reading: testament
  chosen_spanish_reading: testamento
  alternative_spanish_readings:
  - voluntad
  - covenio
  rationale: '"Testamento" mantiene la imagen de un documento cerrado que se abre y revela riqueza/herencia; "covenio" sería demasiado eclesial y menos exacto aquí.'
  doctrine_reference: Inheritance / legal metaphor
- issue: ¿"Sobre la cruz" o "en la cruz" para el decreto del Padre?
  english_pob_reading: published the Father’s decree on the cross
  chosen_spanish_reading: publicó el decreto del Padre sobre la cruz
  alternative_spanish_readings:
  - proclamó el decreto del Padre en la cruz
  - publicó el decreto del Padre en la cruz
  rationale: '"Sobre la cruz" preserva la idea de inscripción/proclamación pública vinculada al instrumento de muerte, sin borrar la localización literal.'
  doctrine_reference: Cross as proclamation site
translation_notes:
  revision_awareness: 'Integro la revisión reciente que restauró la cláusula omitida sobre el libro: su carácter in-tomable y la necesidad de la muerte del que lo tome. También conservo la articulación del tramo sobre testamento, riqueza oculta y la manifestación de Jesús, conforme al audit trail inglés.'
  spanish_consistency_notes:
  - He mantenido "el Todo", "conocimiento", "reposo", "testamento", "decreto" e "incorruptibilidad" de forma consistente para reflejar el campo lexical del POB.
  - Evité sustituir "Padre" por fórmulas eclesiales como "Señor" o "Dios Padre" cuando el texto simplemente dice "el Padre".
  - Usé "manifestado" para ⲟⲩⲱⲛϩ en el eje revelatorio del pasaje, no como mero "apareció".
