  consult_excerpt: 'This is the Gospel of the one they search for, revealed to those who are complete through the mercies of the Father, the hidden mystery. Through it (the Gospel), Jesus Christ enlightened those who were in darkness through forgetfulness. He enlightened them; he showed them a Way, and the Way is the Truth which he taught them.

    As a result, Error was angry. It pursued him. It was threatened by him and brought to nothing. They nailed him (Jesus) to a tree, and he became the fruit of the Father’s knowledge. However, it (the fruit) didn’t cause destruction when it was eaten, but those who ate it were given joy in the discovery. He discovered them in himself and they discovered him in themselves.

    As for the uncontainable, inconceivable one – the Father, the complete one who made all – all are within him, and all need him. Although he kept their completion within himself which he didn’t give to all, the Father wasn’t jealous. Indeed, what jealousy is there between him and his members? 19 For if, like this, the generation [received the completion,] they couldn’t have come […] the Father. He keeps their completion within himself, giving it to them to return to him with a unitary knowledge in completion. He’s the one who made all, and all are within him, and all need him.

    Like someone who’s unknown, he wants to be known and loved – because what did all need if not the knowledge of the Father?

    He became a guide, peaceful and leisurely. He came and spoke the Word as a teacher in places of learning. Those who were wise in their own estimation came up to him to test him, but he confounded them because they were vain. They hated him because they weren’t wise in Truth. After all of them, all the little children came too; theirs is the knowledge of the Father. When they were strengthened, they received teaching about the Father’s expressions. They knew and they were known; they received glory and they gave glory. In their hearts the living Book of the Living was revealed, which was written in the thought and mind 20 [of the] Father, and before the [foundation] of all within his incomprehensibility. This (book) is impossible to take, since it permits the one who takes it to be killed. No one could’ve been revealed among those who''d been entrusted with salvation unless the book had appeared. Because of this, the merciful and faithful Jesus patiently suffered until he took that book,
    since he knows that his death is life for many.

    When a will hasn’t yet been opened, the wealth of the deceased master of the house is hidden; so too all were hidden while the Father of all was invisible. They were from him, from whom every realm comes. Because of this:

    Jesus was revealed,

    put on that book,

    was nailed to a tree,

    and published the Father’s edict on the cross.

    Oh, what a great teaching!

    Drawing himself down to death,

    he clothed himself in eternal life,

    stripped himself of the perishable rags,

    and clothed himself in incorruptibility,

    which no one can take from him.

    When he entered the empty realms of terror, he passed through those who were stripped by forgetfulness, being knowledge and completion, proclaiming the things that are in the heart 21 […] teach those who will [receive teaching].'
base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/003.yaml
  text: 'The Father—the one who cannot be contained—is the one who kept the All within himself[a], and the All is within him, and all have need of him. He kept their wholeness within himself; he was not jealous, for what jealousy could there be between him and his members? If, in this way, the All had already received it, they could not have come to him. He keeps it for them within himself, to give it to them so that they may return to him with a single knowledge in rest, in one body.


    Like one who is unknown, he desires to be known and to be loved—for what did all need except the Father’s knowledge? He became a guide—peaceful and unhurried. He came into the places of learning and spoke the Word as a teacher. Those who were wise in their own hearts came up to test him; yet he confounded them, for they were vain. They hated him because they were not wise in the Truth. After them the little children came also—theirs is the Father’s knowledge. When they were strengthened, they received instruction about the Father’s expressions. They knew, and they were known. They received glory and gave glory. In their heart the Living Book of the Living was revealed, written in the thought and in the mind of the Father, and before the foundation of all, within his incomprehensibility—a book that no one has the power to take, since it is appointed for the one who takes it to be killed. It is impossible that anyone be manifested among those entrusted with salvation unless that book should
    appear.


    Because of this, the merciful and faithful Jesus endured patiently until he took that book, for he knows that his death is life for many. As long as a testament has not been opened, the wealth of the deceased master of the house is hidden; so also, while the Father of the All was invisible, all things were hidden, for they are from him, from whom every realm comes. Because of this, Jesus was manifested; he put on that book; he was nailed to a tree; he published the Father’s decree on the cross.


    O the great teaching! He drew himself down to death; he clothed himself in eternal life; he stripped off the perishable rags; he put on incorruptibility, which no one can take from him. When he entered the empty places of dread, he passed by those who had been stripped by forgetfulness—being knowledge and completion—proclaiming what is in the heart to those who are ready to receive instruction.'
