translation:
  language: es
  text: 'En cuanto a los otros, que reconozcan dónde están. Pero en cuanto a mí —habiendo llegado al Lugar de Reposo— no es correcto añadir nada más; más bien, entraré en él, y me dedicaré sin cesar al Padre del Todo y a los verdaderos hermanos: aquellos sobre quienes el amor del Padre ha sido derramado, y en cuyo medio no hay deficiencia.


    Estos son los que han sido revelados en la Verdad; existen en la vida verdadera y hablan de la Luz que es completa y está llena de la semilla del Padre, y que está en su corazón y en la Plenitud[a]. Su Espíritu se alegra en ella y glorifica a aquel en quien existía, porque él es bueno. Y sus hijos son completos y dignos de su nombre, porque él es el Padre; tales son los hijos a quienes él ama.


    [… gran laguna en el manuscrito …]


    Pero hay algunos cuyos pensamientos están puestos en el esfuerzo: se embriagan en la búsqueda y pierden la cordura. Pero los santos son aquellos cuyo pensamiento no ha sido contaminado por la maldad; su pensamiento permanece dentro de ellos. Pues el Logos[b] del Pensamiento busca lo que está arriba —su indecibilidad—; por medio de la boca de todos he proclamado[c] el Bien —el Mesías[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Plenitud» traduce el término técnico valentiniano que la POB inglesa expresa como «Fullness»; también puede reconocerse como «Pleroma».
    reason: lexical_alternative
  - marker: b
    text: «Logos» conserva el registro filosófico-teológico del texto; «Palabra» sería una traducción posible, pero menos precisa aquí.
    reason: lexical_alternative
  - marker: c
    text: El copto permite una lectura cercana a «he llevado» o «he proclamado / he hablado»; se adopta «he proclamado» en la línea principal por claridad, sin excluir la otra posibilidad.
    reason: textual_note
  - marker: d
    text: El cierre refleja el juego entre «bueno / bien» y ⲭⲣⲏⲥⲧⲟⲥ / Christos; por eso se conserva «el Bien —el Mesías».
    reason: theological_note
lexical_decisions:
- source_word: ⲙ̄ⲡⲙⲁ ⲛ̄ⲙ̄ⲧⲁⲛ
  english_pob_choice: Place of Rest
  chosen_spanish: Lugar de Reposo
  alternatives_spanish:
  - lugar de descanso
  - lugar de reposo
  lexicon: Crum; préstamo semántico cristiano en coptico
  rationale: «Lugar de Reposo» conserva el valor técnico y escatológico del sintagma, en línea con la elección inglesa capitalizada. «Reposo» evita reducirlo a simple descanso físico.
- source_word: ⲡⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Padre
  lexicon: Crum
  rationale: Se mantiene el artículo definido porque el coptico lo marca y la referencia es una figura teológica determinada, no un uso genérico.
- source_word: ⲡⲧⲏⲣϥ̄
  english_pob_choice: the All
  chosen_spanish: el Todo
  alternatives_spanish:
  - el Todo
  lexicon: Crum; Layton
  rationale: «el Todo» transmite el sentido técnico de totalidad cósmica; en español funciona mejor que una paráfrasis como «la totalidad».
- source_word: ⲧⲁⲅⲁⲡⲏ
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor (agápē)
  lexicon: Préstamo griego en coptico
  rationale: «amor» es la equivalencia natural y fiel; no hace falta transliterar el término en español.
- source_word: ⲧⲟⲩⲙⲏⲧⲉ
  english_pob_choice: deficiency
  chosen_spanish: deficiencia
  alternatives_spanish:
  - falta
  - necesidad
  lexicon: Crum
  rationale: «Deficiencia» preserva el contraste técnico con la Fullness y evita banalizar la oposición valentiniana con «necesidad».
- source_word: ⲁⲡⲟⲩⲁⲉⲓⲛ
  english_pob_choice: the Light
  chosen_spanish: la Luz
  alternatives_spanish:
  - luz
  lexicon: Crum
  rationale: La mayúscula refleja el valor personificado/teológico que la POB subraya en inglés; en español «la Luz» resulta natural y reverente.
- source_word: ϫⲏⲕ/ϫⲱⲕ
  english_pob_choice: complete
  chosen_spanish: completos
  alternatives_spanish:
  - perfectos
  - enteros
  lexicon: Crum
  rationale: «Completo»/«completos» reproduce el lenguaje teleológico del texto sin cargarlo de una perfección moral ajena al contexto.
- source_word: ⲥⲡⲉⲣⲙⲁ
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - semilla
  - simiente
  lexicon: Préstamo griego en coptico
  rationale: «Semilla» es la forma más clara y directa en español para el símbolo generativo; se ajusta al valor retenido por la POB.
- source_word: ⲡⲗⲏⲣⲱⲙⲁ
  english_pob_choice: Fullness
  chosen_spanish: Fullness
  alternatives_spanish:
  - Plenitud
  - Pleroma
  lexicon: Préstamo griego en coptico
  rationale: Se conserva «Fullness» en la línea principal para respetar la convención técnica valentiniana seguida por la POB inglesa. La alternativa natural en español sería «Plenitud», pero aquí la transliteración/anglicismo marca mejor el término de arte del tratado.
- source_word: ⲡⲛⲁ
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: Crum
  rationale: En este contexto se trata del sujeto divino, por lo que la mayúscula es justificada; «Espíritu» evita ambigüedad con espíritu humano o aliento.
- source_word: ⲛⲁⲛⲟⲩϥ
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benigno
  lexicon: Crum
  rationale: «Bueno» reproduce con naturalidad el adjetivo y además conserva el juego final con ⲭⲣⲏⲥⲧⲟⲥ/Cristos-Χρηστός documentado en la POB inglesa.
- source_word: ⲗⲟⲅⲟⲥ
  english_pob_choice: Logos
  chosen_spanish: Logos
  alternatives_spanish:
  - Palabra
  lexicon: Préstamo griego en coptico
  rationale: «Logos» mantiene el registro filosófico-teológico del tratado; «Palabra» sería posible, pero desdibujaría la carga conceptual que la POB decide preservar.
- source_word: ⲙⲛⲧⲁⲧⲥⲱ
  english_pob_choice: unsayability
  chosen_spanish: indecibilidad
  alternatives_spanish:
  - inefabilidad
  - inexpresabilidad
  lexicon: Crum
  rationale: «Indecibilidad» reproduce la fuerza privativa del sustantivo y sugiere con precisión que no puede ser dicho; en español es más natural que el calco «no-decir».
- source_word: ⲉⲕⲟⲡⲟⲥ (from κόπος)
  english_pob_choice: toil
  chosen_spanish: esfuerzo
  alternatives_spanish:
  - fatiga
  - labor
  - trabajo penoso
  lexicon: Préstamo griego en coptico
  rationale: Aunque la POB inglesa usa «toil», en este pasaje el contraste con la búsqueda intoxicada pide un español claro; «esfuerzo» comunica bien la idea de afán penoso sin sobrecargar el tono.
- source_word: ⲍⲏⲧⲏⲙⲁ
  english_pob_choice: seeking
  chosen_spanish: búsqueda
  alternatives_spanish:
  - búsqueda
  - indagación
  lexicon: Préstamo griego en coptico
  rationale: «Búsqueda» es la equivalencia idiomática más natural y conserva el matiz de actividad orientada que el texto critica al decir que se embriagan en ella.
- source_word: ⲧⲟⲩⲁⲁⲃ
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - santos
  - consagrados
  - sagrados
  lexicon: Crum
  rationale: Aquí el término funciona como sustantivo colectivo; «los santos» es la forma más natural en español y conserva el contraste de grupo.
- source_word: ⲭⲣⲏⲥⲧⲟⲥ
  english_pob_choice: the Messiah (with ‘the Good’ retained)
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  - el Buen
  lexicon: Préstamo griego en coptico
  rationale: «Mesías» sigue el criterio general del proyecto para Χριστός/mesianismo. En este cierre, el juego con «el Bien»/«bueno» queda indicado en la nota, sin perder el título.
theological_decisions:
- issue: Renderización del cierre ⲭⲣⲏⲥⲧⲟⲥ (juego Chrestos/Cristos)
  english_pob_reading: ‘the Good—the Messiah’
  chosen_spanish_reading: «el Bien — el Mesías»
  alternative_spanish_readings:
  - «el Bueno — el Mesías»
  - «el Cristo»
  - «el Bien (Chrestos)»
  rationale: El coptico permite oír el juego entre «bueno/bien» y el título cristológico. En español, «el Bien — el Mesías» conserva la tensión sin forzar una equivalencia etimológica inexistente. Dado que la frase previa ya dice que «él es bueno», la nota aclara el eco punzante del final.
  doctrine_reference: Cristología titulada; juego de palabras Chrestos/Christos
- issue: Capitalización de Fullness y de Luz/Espíritu
  english_pob_reading: Capitalized ‘Fullness’ and ‘All’
  chosen_spanish_reading: «Fullness», «Luz», «Espíritu»
  alternative_spanish_readings:
  - «plenitud»
  - «luz»
  - «espíritu»
  rationale: Se conserva «Fullness» como término técnico, y se capitalizan «Luz» y «Espíritu» por su función teológica/personificada en el pasaje. Esto mantiene la lectura confesional del texto y su vocabulario de revelación.
  doctrine_reference: Pléroma/Fullness; pneumatología; lenguaje de revelación
translation_notes:
  revision_awareness: He revisado la frontera textual dada por el OCR coptico y la advertencia de gran laguna. El inglés de auditoría muestra una solución interpretativa estable en el cierre, pero el área anterior a la laguna y el tramo sobre ‘toil/seeking’ está menos seguro por la condición del manuscrito y la salida truncada; por eso mantengo una traducción prudente, con una nota para el término técnico Fullness y otra para Logos, pero sin expandir más allá de lo que sostienen las líneas conservadas y el audit trail inglés.
  spanish_consistency_notes:
  - Uso «Lugar de Reposo» para el locus técnico, en paralelo con la capitalización inglesa de Place of Rest.
  - Uso «el Todo» para ⲡⲧⲏⲣϥ̄, manteniendo el sentido totalizante y teológico.
  - Mantengo «Mesías» como término proyectual para Χριστός/χρηστός, y resuelvo el juego final con «el Bien — el Mesías» para no borrar la tensión lexical.
  - 'Conservo mayúsculas teológicas consistentes: Padre, Todo, Luz, Espíritu, Fullness, Mesías.'
  - En la parte lacunosa, reproduzco la omisión con corchetes y no intento reconstruir lo perdido.
