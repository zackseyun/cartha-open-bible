    rationale: Aunque refleja de cerca el inglés, en español eclesial-natural 'entraré en él' o 'vendré a estar en él' fluye mejor. 'Entraré en él' conserva adecuadamente el movimiento hacia el Lugar de Reposo.
  - severity: medium
    issue: Cierre 'he [llevado/proclamado] el Bien' deja una indecisión editorial en el cuerpo del texto
    rationale: El texto final en español no debe conservar corchetes alternativos en la línea principal si puede resolverse con una nota. Dado el inglés auditado '[borne/spoken]', conviene fijar una lectura principal y anotar la alternativa.
  - severity: low
    issue: '''verdaderos hermanos y hermanas'' resulta pesado'
    rationale: El inglés usa 'true siblings' para neutralidad inclusiva, pero en español la duplicación binaria aquí se oye menos natural. 'verdaderos hermanos' puede funcionar colectivamente sin pérdida material de sentido.
  - severity: low
    issue: '''Porque el Logos del Pensamiento'' podría ser ''Pues el Logos del Pensamiento'''
    rationale: Mejora el encadenamiento discursivo sin alterar el sentido.
  revised_spanish_text: 'En cuanto a los otros, que reconozcan dónde están. Pero en cuanto a mí —habiendo llegado al Lugar de Reposo— no es correcto añadir nada más; más bien, entraré en él, y me dedicaré sin cesar al Padre del Todo y a los verdaderos hermanos: aquellos sobre quienes el amor del Padre ha sido derramado, y en cuyo medio no hay deficiencia.


    Estos son los que han sido revelados en la Verdad; existen en la vida verdadera y hablan de la Luz que es completa y está llena de la semilla del Padre, y que está en su corazón y en la Plenitud[a]. Su Espíritu se alegra en ella y glorifica a aquel en quien existía, porque él es bueno. Y sus hijos son completos y dignos de su nombre, porque él es el Padre; tales son los hijos a quienes él ama.


    [… gran laguna en el manuscrito …]


    Pero hay algunos cuyos pensamientos están puestos en el esfuerzo: se embriagan en la búsqueda y pierden la cordura. Pero los santos son aquellos cuyo pensamiento no ha sido contaminado por la maldad; su pensamiento permanece dentro de ellos. Pues el Logos[b] del Pensamiento busca lo que está arriba —su indecibilidad—; por medio de la boca de todos he proclamado[c] el Bien —el Mesías[d].'
