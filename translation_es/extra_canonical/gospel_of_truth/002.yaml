translation:
  language: es
  text: 'Puesto que todos buscaban al Único de quien habían salido —y todos estaban dentro de él, el Incontenible, el Inconcebible, más allá de todo pensamiento—, y como el desconocimiento del Padre trajo angustia y temor, y la angustia se espesó como una niebla, de modo que nadie podía ver, el Error se fortaleció. Trabajó su propia materia en vano, porque no conocía la Verdad.


    Sucedió de manera engañosa: el Error preparó, con poder y con cierta belleza, un sustituto de la Verdad. Pero esto no deshonró al Incontenible, al Inconcebible; porque la angustia, el Olvido y la ilusión del engaño no son nada, mientras que la Verdad permanece firme —inmutable, imperturbable, más allá de la belleza. Por eso, desatiende al Error, porque no tiene raíz.


    Sucedió en una niebla con respecto al Padre; y sucede aun ahora: el Error prepara obras en el Olvido y en el temor, para que mediante ellas pueda atraer a los que están en medio y aprisionarlos.


    El Olvido del Error no fue revelado; no fue un pensamiento procedente del Padre. El Olvido no llegó a existir[a] por el Padre[b] —aunque sí llegó a existir[c] a causa de él. Lo que llega a existir dentro de él es el conocimiento, el cual fue manifestado para que el Olvido fuera disuelto y el Padre fuera conocido. Como el Olvido surgió porque el Padre era desconocido, una vez que el Padre llegue a ser conocido, el Olvido ya no existirá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «no llegó a existir desde el Padre». Se opta por «por el Padre» para preservar la distinción del texto entre origen y causa ocasional.'
    reason: theological_note
  - marker: b
    text: La preposición aquí evita atribuir al Padre la fuente del Olvido; el pasaje lo presenta como la causa circunstancial de su aparición, no como su origen.
    reason: theological_note
  - marker: c
    text: El contraste con la línea anterior subraya que el Olvido no procede del Padre, aunque aparece porque el Padre era desconocido.
    reason: theological_note
