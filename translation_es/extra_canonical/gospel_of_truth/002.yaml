theological_decisions:
- issue: Relación causal del Olvido con el Padre
  english_pob_reading: Forgetfulness did not come into being from the Father — though it did come into being on account of him.
  chosen_spanish_reading: El Olvido no llegó a existir por el Padre; sí llegó a existir a causa de él.
  alternative_spanish_readings:
  - El Olvido no vino del Padre, aunque vino por medio de él.
  - El Olvido no procede del Padre, pero existe por causa de él.
  rationale: 'Se distingue cuidadosamente origen de ocasión: el tratado excluye que el Padre sea la fuente del Olvido, pero sí lo presenta como el motivo por el cual el Olvido apareció al no ser conocido.'
  doctrine_reference: Gospel of Truth 18; distinción origen/causa ocasional en la lógica del tratado
- issue: Carácter del sustitutivo de la Verdad
  english_pob_reading: a substitute for the Truth
  chosen_spanish_reading: un sustituto de la Verdad
  alternative_spanish_readings:
  - un reemplazo de la Verdad
  - una imitación de la Verdad
  rationale: «Sustituto» refleja la idea de una copia funcional y engañosa sin suavizar la oposición ontológica del texto.
  doctrine_reference: Gospel of Truth 18; oposición Error/Truth
- issue: Estado del Olvido en la clausura
  english_pob_reading: once the Father comes to be known, Forgetfulness will no longer exist
  chosen_spanish_reading: una vez que el Padre llegue a ser conocido, el Olvido ya no existirá
  alternative_spanish_readings:
  - cuando el Padre sea conocido, el Olvido dejará de existir
  - si el Padre es conocido, el Olvido no existirá más
  rationale: La formulación mantiene el aspecto de futuro-resultativo y la relación causal entre conocimiento del Padre y disolución del Olvido.
  doctrine_reference: Gospel of Truth 18; conocimiento salvífico y disolución del Olvido
