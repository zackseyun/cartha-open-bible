    Pues, ya que la plenitud del Todo está en él, es necesario que el Todo suba, y que cada uno reciba lo que le pertenece. Él los escribió de antemano, habiéndolos preparado en su pensamiento y en su voluntad, para darlos a los que salieron de él.


    A los que conoció de antemano por nombre, los llamó al final, para que el que tiene conocimiento sea aquel cuyo nombre el Padre ha pronunciado; porque aquel cuyo nombre no ha sido pronunciado es ignorante. ¿Y cómo oirá uno así, si su nombre no ha sido llamado? Porque el ignorante hasta el final es producto de Error, y se disolverá junto con él. Si no, ¿por qué estos miserables no tienen nombre? ¿Por qué no tienen voz?


    Así, si alguien tiene conocimiento, es de arriba. Si es llamado, oye; responde; se vuelve hacia el que lo llama; sube hacia él; y sabe de qué manera es llamado. Poseyendo conocimiento, hace la voluntad del que lo llamó, desea serle agradable y recibe descanso. Su nombre llega a ser suyo propio. Tal conocedor sabe de dónde vino y hacia dónde va. Sabe como uno que, habiendo estado embriagado, se apartó de su embriaguez y, habiendo vuelto a sí mismo, ha puesto de nuevo en orden las cosas que le pertenecen.


    Él ha traído de vuelta a muchos desde Error. Fue delante de ellos a los lugares de donde se habían alejado. Habían recibido Error a causa de la profundidad del que rodea todo lugar, aunque nada lo rodea a él. Gran maravilla: que estaban en el Padre y no lo conocían, y que pudieron salir por sí mismos, aunque no podían comprender ni conocer a aquel en quien estaban. Él reveló su voluntad como conocimiento, en armonía con todo lo que salió de él.


    Este es el conocimiento del Libro Viviente[a], que él reveló a las generaciones del final: letras de él que muestran que no son vocales ni consonantes, de modo que alguien las leyera y supusiera que están vacías, pero son letras de la Verdad: hablan y se conocen a sí mismas. Cada letra es un pensamiento completo, como un libro que está completo, ya que son letras escritas por la Unidad, pues el Padre las escribió para que las generaciones, por medio de sus letras, conozcan al Padre.'
