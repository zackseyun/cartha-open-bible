translation:
  language: es
  text: '¿Qué, entonces, quiso que pensaran? Que habían llegado a ser como una sombra y un fantasma de la noche.


    Cuando la luz cae sobre el terror que habían recibido, resulta ser nada. Así, ignoraban al Padre, a quien no vieron. Porque había terror y perturbación e inestabilidad y división y duda; muchas ilusiones vacías actuaban entre ellos, y vana nada, como si estuvieran sumidos en sueño y, en sus sueños, se encontraran en pesadillas.


    Ya sea que corran hacia algún lugar, o que no puedan huir de alguien; o que peleen, o que sean golpeados; o que caigan desde alturas, o que vuelen por el aire sin alas. A veces también alguien los está matando, aunque nadie los persiga; o ellos mismos están matando a los que los rodean, y están cubiertos con su sangre. Hasta que los que pasan por todas estas cosas despierten, no ven nada, porque estas cosas no son nada.


    Así sucede con los que han dejado la ignorancia como el sueño: no la consideran algo, ni consideran reales sus otras obras; más bien, las abandonan como un sueño de la noche. Valoran el conocimiento del Padre como la luz. Los ignorantes actuaron como si durmieran; los que han llegado al conocimiento actuaron como si estuvieran despiertos.


    Bueno es el que regresa y despierta[a]. ¡Bendito el que abre los ojos de los ciegos!


    El Espíritu corrió tras ellos para darles vida. Habiendo dado la mano al que yacía en tierra, los puso de pie, porque aún no se habían levantado. Les concedió el conocimiento del Padre y la revelación del Hijo; porque cuando lo vieron y lo oyeron, les permitió gustarlo y asir al Hijo amado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Feliz es el que regresa y despierta».'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲣⲡⲧⲉ / ⲱⲡⲧ
  english_pob_choice: shadow / phantasm
  chosen_spanish: sombra / fantasma
  alternatives_spanish:
  - sombra / espectro
  - sombra / aparición
  lexicon: Crum; Layton
  rationale: Mantiene la doblez de insustancialidad/unrealidad. 'Fantasma' comunica mejor que una palabra más explicativa, y evita suavizar la distinción léxica que la versión inglesa conserva entre dos términos afines pero no idénticos.
- source_word: ⲧⲣⲙⲣⲟⲩ
  english_pob_choice: terror
  chosen_spanish: terror
  alternatives_spanish:
  - miedo
  - pavor
  lexicon: Crum
  rationale: La serie de términos psicológicos del pasaje pide un registro intenso. 'Terror' preserva el peso del término y su fuerza retórica.
- source_word: ⲙⲛⲧⲁⲧⲧⲁⲕⲁⲣⲉⲓⲥ
  english_pob_choice: disturbance
  chosen_spanish: perturbación
  alternatives_spanish:
  - disturbio
  - confusión
  - trastorno
  lexicon: Crum
  rationale: Abstracto de estado interior/colectivo; 'perturbación' mantiene amplitud semántica y funciona bien en la serie acumulativa.
- source_word: ⲙⲛⲧϩⲏⲧ
  english_pob_choice: instability
  chosen_spanish: inestabilidad
  alternatives_spanish:
  - inconstancia
  - vacilación
  lexicon: Crum
  rationale: La carga de falta de firmeza se expresa de forma natural en español con 'inestabilidad', en paralelo con división y duda.
- source_word: ⲥⲛⲉⲩ
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - discordia
  - separación
  lexicon: Crum
  rationale: El término conserva su valor de escisión/desunión sin imponer un matiz eclesiástico que el contexto no exige explícitamente.
- source_word: ⲡⲱϣⲉ
  english_pob_choice: doubt
  chosen_spanish: duda
  alternatives_spanish:
  - cuestionamiento
  - especulación
  lexicon: Crum
  rationale: El campo epistemológico del pasaje favorece 'duda' como equivalente más directo y legible.
- source_word: ⲙⲙⲛⲧⲁ
  english_pob_choice: vain nothingness
  chosen_spanish: vana nada
  alternatives_spanish:
  - nada vana
  - vacío inútil
  lexicon: Crum
  rationale: Se conserva la tensión entre vaciedad y negación del ser. 'Vana nada' suena extraño, pero reproduce la acumulación enfática de la frase inglesa sin diluirla.
- source_word: ⲡϭⲁⲗ
  english_pob_choice: sleep
  chosen_spanish: sueño
  alternatives_spanish:
  - sueño profundo
  - dormir
  lexicon: Crum
  rationale: En el símil, el estado metafórico se expresa mejor como 'sueño' en español, especialmente por la conexión con las pesadillas y los sueños del párrafo siguiente.
- source_word: ⲛⲉⲉⲓ
  english_pob_choice: dreams
  chosen_spanish: sueños
  alternatives_spanish:
  - visiones
  lexicon: Crum
  rationale: Es el sentido literal en el marco del pasaje; 'sueños' preserva el paralelismo con 'pesadillas'.
- source_word: ⲥⲙⲙⲛⲧⲟⲩ
  english_pob_choice: awaken
  chosen_spanish: despierten
  alternatives_spanish:
  - se despierten
  - despierten de su sueño
  lexicon: Crum
  rationale: Verbo intransitivo acorde con el paso de ignorancia a conocimiento; la forma en subjuntivo respeta la cláusula temporal.
- source_word: ⲙⲛⲧⲁⲧⲥⲁⲩⲛⲉ
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - desconocimiento
  - no saber
  lexicon: Crum; Thomassen
  rationale: Término técnico clave en el escrito; 'ignorancia' conserva su valor teológico y antropológico en el contraste con conocimiento.
- source_word: ⲅⲛⲱⲥⲓⲥ (implied by context)
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - gnosis
  lexicon: Loan from Greek; Crum
  rationale: Se evita transliterar para mantener accesibilidad, pero 'conocimiento' conserva el sentido salvífico especializado del pasaje.
- source_word: ⲡⲓⲡⲛⲁ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el aliento
  - el espíritu
  lexicon: Crum
  rationale: El agente persigue, vivifica y pone de pie; en este contexto, la lectura personal-divina es la más natural. No se añade 'Santo' porque el coptico no lo explicita aquí.
- source_word: ⲛⲟⲩϥ
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  lexicon: Crum
  rationale: Sigue el giro idiomático 'abrir los ojos' con concreción corporal.
- source_word: ⲧⲛⲉ
  english_pob_choice: taste
  chosen_spanish: gustarlo
  alternatives_spanish:
  - probarlo
  - saborearlo
  lexicon: Crum
  rationale: '''Gustarlo'' conserva el carácter sensorial del verbo y su secuencia con ver y oír, sin convertirlo en mera metáfora intelectual.'
- source_word: ϫⲓⲧ
  english_pob_choice: grasp
  chosen_spanish: asir
  alternatives_spanish:
  - agarrar
  - tomar
  lexicon: Crum
  rationale: '''Asir'' mantiene la fuerza de la aprehensión activa y su registro literario, más cercano a un acto de captación que a un simple ''tocar''.'
theological_decisions:
- issue: Identidad de 'el Espíritu' (ⲡⲓⲡⲛⲁ)
  english_pob_reading: Render as 'the Spirit,' understood as the Holy Spirit in context.
  chosen_spanish_reading: '''el Espíritu'' como agente divino personal, sin añadir ''Santo'' en el cuerpo del texto.'
  alternative_spanish_readings:
  - el Espíritu Santo
  - el aliento
  rationale: 'El texto lo presenta como sujeto de acción personal: corre, da vida, toma de la mano, pone de pie e imparte revelación. En español, ''el Espíritu'' comunica esa referencia sin sobretraducir más allá del testimonio explícito del pasaje.'
  doctrine_reference: Pneumatología; lectura contextual del agente divino.
- issue: Tensión entre 'sombra' y 'fantasma'
  english_pob_reading: shadow / phantasm
  chosen_spanish_reading: '''sombra y un fantasma'''
  alternative_spanish_readings:
  - sombra y una aparición
  - sombra y un espectro
  rationale: La frase conserva la oposición entre dos términos que designan irrealidad e insustancialidad. No se fusionan en una sola idea, para no borrar la variación lexical del original y de la auditoría inglesa.
  doctrine_reference: Cristología/antropología simbólica del no-ser frente a la revelación.
- issue: '''Vain nothingness'''
  english_pob_reading: vain nothingness
  chosen_spanish_reading: '''vana nada'''
  alternative_spanish_readings:
  - nada vana
  - vacío inútil
  rationale: Se mantiene la redundancia enfática y el choque semántico del original. Una versión más natural ('vacío inútil') suavizaría demasiado la insistencia ontológica del pasaje.
  doctrine_reference: Ontología del engaño/irrealidad en el discurso gnóstico.
- issue: '''Knowledge of the Father'''
  english_pob_reading: knowledge (of the Father)
  chosen_spanish_reading: '''conocimiento del Padre'''
  alternative_spanish_readings:
  - gnosis del Padre
  - conocimiento del Padre celestial
  rationale: '''Conocimiento'' permite leer el término técnico sin convertirlo en tecnicismo transliterado. Se preserva el referente relacional del Padre, central en la economía del pasaje.'
  doctrine_reference: Revelación y conocimiento salvífico del Padre.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que movió la nota al enunciado correspondiente sobre el que recae la alternativa de traducción; en español se refleja esa misma localización con una nota única anclada en 'despierta'. También se respetó la distinción léxica entre el par 'good/blessed' conservando 'Bueno' frente a 'Bendito'.
  spanish_consistency_notes:
  - Se mantuvo 'el Padre' y 'el Hijo' con mayúscula reverencial en sentido teológico.
  - Se evitó 'Señor' como sustituto de un nombre divino, porque este pasaje no lo exige.
  - Se conservó el paralelismo de la enumeración afectiva y cognitiva con sustantivos abstractos consecutivos.
  - Se usó 'conocimiento' en vez de 'gnosis' para facilitar lectura sin perder el valor técnico del término.
  - La nota al final de la línea preserva la alternativa documental sin introducir nueva ambigüedad en el cuerpo principal.
