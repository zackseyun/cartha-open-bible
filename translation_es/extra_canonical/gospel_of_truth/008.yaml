  consult_excerpt: 'What, then, did he want them to think of themselves? He wanted to them to think, “I’ve come into being like the shadows and phantoms of the night.” When the light shines on the terror which they received, they know that it’s nothing. In this way, they were ignorant of the Father, whom 29 they didn’t see. Since it was terror and disturbance and instability and doubt and division, many illusions were at work among them, and vain ignorance, like they were deep in sleep and found themselves in nightmares. Either they’re running somewhere, or unable to run away from someone; or they’re fighting, or being beaten; or they’ve fallen from heights, or fly through the air without wings. Sometimes, too, it’s like someone is killing them, even though no one’s chasing them; or they themselves are killing those around them, covered in their blood. Until those who are going through all these nightmares can wake up, they see nothing, because these things are nothing.

    That’s the way it is with those who’ve cast off ignorance like sleep. They don’t regard it as anything, nor do they regard its 30 other works as real, but they abandon them like a dream in the night. They value the knowledge of the Father like they value the light. The ignorant have acted like they’re asleep; those who’ve come to knowledge have acted like they’ve awakened. Good for the one who returns and awakens! Blessed is the one who’s opened the eyes of those who can’t see! The Holy Spirit hurried after them to revive them. Having given a hand to the one who lay on the ground, it set them up on their feet, because they hadn’t yet arisen. It gave them the knowledge of the Father and the revelation of the Son, because when they saw him and heard him, he granted them to taste him and to grasp the beloved Son.'
base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/008.yaml
  text: 'What, then, did he want them to think? That they had come to be like a shadow and a phantasm of the night.


    When light falls upon the terror that they had received, it turns out to be nothing. In this way they were ignorant of the Father, whom they did not see. For it was terror and disturbance and instability and division and doubt; many empty illusions were at work among them, and vain nothingness—as if they were sunk in sleep and, in their dreams, found themselves in nightmares.


    Either they are running to some place, or they are unable to flee from someone; or they are fighting, or they are being beaten; or they fall from heights, or they fly through the air without wings. Sometimes also someone is killing them even though no one pursues them; or they themselves are killing those around them, and they are smeared with their blood. Until those who are going through all these things awaken, they see nothing—because these things are nothing.


    So it is with those who have cast off ignorance like sleep: they do not reckon it to be anything, nor do they reckon its other works to be real; rather, they abandon them like a dream of the night. They value the knowledge of the Father like the light. Those who were ignorant acted as if asleep; those who have come to know acted as if awake.


    Good is the one who returns and awakens![a] Blessed is the one who opens the eyes of the blind!


    The Spirit ran after them in order to make them live. Having given a hand to the one who lay on the ground, it set them on their feet, for they had not yet arisen. It granted them the knowledge of the Father and the revelation of the Son; for when they saw him and heard him, he allowed them to taste him and to grasp the beloved Son.'
