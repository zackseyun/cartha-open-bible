translation:
  language: es
  text: 'Porque este es el juicio que descendió desde arriba[a]; juzgó a todos. Es una espada de dos filos, que corta por ambos lados. La Palabra, que está en los corazones de los que la hablan, apareció: no es un mero sonido, sino que se vistió de cuerpo. Surgió una gran conmoción entre las vasijas: unas estaban vacías, y otras estaban llenas; unas fueron provistas, y otras derramadas; unas fueron purificadas, y otras quebradas. Todos los ámbitos fueron sacudidos y agitados, pues no tenían ni orden ni estabilidad.


    Error se inquietó dentro de sí; no sabía qué debía hacer. Se entristeció, se lamentó y se golpeó a sí mismo, pues no sabía nada. El Conocimiento que es su ruina se le acercó —y a todo lo que había salido de él—, porque Error está vacío y no tiene nada dentro.


    La Verdad vino en medio de ellos, y todos los que procedían de ella la conocieron. Recibieron al Padre en Verdad con un Poder completo que los une al Padre. La Verdad es la boca del Padre; el Espíritu Santo es su lengua. Todo el que es unido a la boca del Padre recibirá el Espíritu Santo por medio de su lengua. Esta es la revelación del Padre y su manifestación para sus generaciones: él reveló lo que de sí mismo estaba oculto, lo explicó; porque, ¿quién tiene algo[b], si no el Padre solo?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La Palabra, que está en los corazones de los que la hablan, apareció».'
    reason: alternative_reading
  - marker: b
    text: 'O: «que tienen algo», según la sintaxis entendida del pasaje.'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲡⲥⲁⲁⲧⲡⲉ
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - decisión
  - discernimiento
  lexicon: Coptic lexical tradition (Sahidic)
  rationale: En este contexto el término nombra un acto evaluativo que desciende desde arriba y alcanza a todos; en español, «juicio» conserva mejor el peso judicial y teológico que «decisión».
- source_word: ⲥⲕⲉⲩⲟⲥ
  english_pob_choice: vessels (jars)
  chosen_spanish: vasijas
  alternatives_spanish:
  - jarras
  - recipientes
  - vasos
  lexicon: Crum; uso coptizante de ⲥⲕⲉⲩⲟⲥ
  rationale: «Vasijas» mantiene la imagen doméstica concreta y suena natural en español; «jarras» es posible, pero «vasijas» cubre mejor el conjunto del símil sin estrecharlo demasiado.
- source_word: ⲙⲫⲟⲥⲛⲉⲩ
  english_pob_choice: two‑edged
  chosen_spanish: de dos filos
  alternatives_spanish:
  - de doble filo
  - cortante por ambos lados
  lexicon: Préstamo griego vía copto; tradición idiomática
  rationale: «De dos filos» es la forma más idiomática en español para la imagen de una espada que corta en ambas direcciones.
- source_word: ⲡⲗⲟⲅⲟⲥ / ⲡⲓⲱⲉ (contrast)
  english_pob_choice: Word / sound
  chosen_spanish: Palabra / sonido
  alternatives_spanish:
  - Verbo / voz
  - Palabra / mera voz
  lexicon: Uso del tratado; Crum
  rationale: «Palabra» conserva el peso de Logos en un texto cristológico; «sonido» traduce con claridad el contraste con algo puramente acústico, sin sobreinterpretar.
- source_word: ⲣⲟⲩⲥⲱⲙⲁ
  english_pob_choice: put on a body
  chosen_spanish: se vistió de cuerpo
  alternatives_spanish:
  - se encarnó
  - tomó un cuerpo
  - se corporeizó
  lexicon: Expresión copta de embodiment/incarnation
  rationale: La imagen literal de «vestirse» respeta la metáfora del copto y evita imponer una formulación dogmática más posterior, aunque compatible con la idea de encarnación.
- source_word: ⲁϩⲟⲩⲙⲁϩⲟⲩ / ⲥⲙⲏⲧⲟⲩ
  english_pob_choice: empty / filled
  chosen_spanish: vacías / llenas
  alternatives_spanish:
  - vacías / colmadas
  - sin nada / repletas
  lexicon: Crum
  rationale: Son los equivalentes directos y más transparentes para el par antitético que estructura la escena.
- source_word: ⲡⲁⲛⲟⲩ / ⲡⲱϣⲉ
  english_pob_choice: provided for / broken
  chosen_spanish: provistas / quebradas
  alternatives_spanish:
  - abastecidas / rotas
  - surtidas / partidas
  lexicon: Contextual; Crum
  rationale: «Provistas» expresa la idea de haber recibido provisión sin añadir detalles ajenos; «quebradas» mantiene la fuerza material del contraste con los recipientes enteros.
- source_word: ⲧⲟⲩⲃⲁϥ
  english_pob_choice: purified
  chosen_spanish: purificadas
  alternatives_spanish:
  - limpiadas
  - purgadas
  lexicon: Crum
  rationale: En la imaginería de recipientes, «purificadas» preserva el matiz ritual/moral sin reducirlo a limpieza doméstica.
- source_word: ⲕⲓⲙ / ϣⲧⲁⲣⲧⲣ̄
  english_pob_choice: shaken / agitated
  chosen_spanish: sacudidos / agitados
  alternatives_spanish:
  - temblorosos / perturbados
  - conmovidos / trastornados
  lexicon: Crum; overlap confirmation
  rationale: El par español reproduce la doble violencia del verbo sin perder la resonancia cósmica del pasaje.
- source_word: ⲧⲡⲗⲁⲛⲏ
  english_pob_choice: Error (personified)
  chosen_spanish: Error
  alternatives_spanish:
  - Decepción
  - Desvío
  - Engaño
  lexicon: Greek πλάνη; Valentinian technical term
  rationale: Se conserva la personificación técnica del texto. En español, «Error» funciona como nombre propio conceptual y mantiene la oposición con Verdad.
- source_word: ⲧⲙⲛⲧⲙⲏⲉ / ⲅⲛⲱⲥⲓⲥ (concept)
  english_pob_choice: Knowledge (Gnosis)
  chosen_spanish: Conocimiento
  alternatives_spanish:
  - Gnosis
  - saber
  lexicon: Valentinian usage
  rationale: «Conocimiento» comunica el sentido sin tecnicismos innecesarios; en un texto de recepción amplia, «Gnosis» podría ser útil, pero no es imprescindible aquí.
- source_word: ⲙⲉⲧⲙⲁⲓⲉⲛ
  english_pob_choice: Truth
  chosen_spanish: Verdad
  alternatives_spanish:
  - realidad
  - verdad
  lexicon: Crum; personification in the treatise
  rationale: «Verdad» mantiene la personificación coherente con el propio tratado y con el contraste con Error.
- source_word: ⲡⲉⲣⲱϣ
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca
  - labios
  lexicon: Crum
  rationale: «Boca» es la correspondencia directa y mantiene el paralelismo con «lengua».
- source_word: ⲡⲛⲁ ⲉⲧⲟⲩⲁⲁⲃ
  english_pob_choice: the Holy Spirit
  chosen_spanish: Espíritu Santo
  alternatives_spanish:
  - Espíritu santo
  - Espíritu consagrado
  lexicon: Standard Coptic Christian usage
  rationale: La forma establecida en español es clara y fiel al título cristiano explícito del pasaje.
- source_word: ⲡϭⲱⲗⲡ
  english_pob_choice: the All
  chosen_spanish: el Todo
  alternatives_spanish:
  - la totalidad
  - el universo
  lexicon: Crum; Gnostic idiom
  rationale: «El Todo» conserva el valor técnico y cosmológico del término mejor que una paráfrasis más extensa.
theological_decisions:
- issue: Personificación de Error
  english_pob_reading: Render as personified 'Error' rather than abstract 'deception'
  chosen_spanish_reading: Conservar «Error» como sujeto personal y agente
  alternative_spanish_readings:
  - decepción
  - engaño
  - desvío
  rationale: El pasaje atribuye a Error inquietud, tristeza y autoagresión; por eso en español debe seguir funcionando como entidad personificada, no como simple cualidad abstracta.
  doctrine_reference: Valentinian/Gnostic personification in the Gospel of Truth
- issue: Metáfora revelatoria de boca y lengua
  english_pob_reading: Truth is the Father’s mouth; the Holy Spirit is his tongue
  chosen_spanish_reading: Verdad es la boca del Padre; el Espíritu Santo es su lengua
  alternative_spanish_readings:
  - la expresión del Padre / su palabra
  - la voz del Padre / su aliento
  rationale: La literalidad conserva la imagen corporal y la economía revelatoria del pasaje. Parafrasearlo como «expresión» o «voz» suavizaría indebidamente la metáfora del texto.
  doctrine_reference: Revelación trinitaria y lenguaje corporal en literatura valentiniana
- issue: Incarnation / embodiment of the Word
  english_pob_reading: it put on a body
  chosen_spanish_reading: se vistió de cuerpo
  alternative_spanish_readings:
  - se encarnó
  - tomó un cuerpo
  - se hizo cuerpo
  rationale: «Se vistió de cuerpo» sigue la metáfora coptizante de modo más cercano que una formulación doctrinal posterior, sin negar el sentido de encarnación.
  doctrine_reference: Cristología de la manifestación/encarnación
translation_notes:
  revision_awareness: 'He tenido en cuenta la revisión del inglés que corrigió la omisión del objeto en «the Word, which is in the hearts of those who speak it» y eliminó la duplicación sintáctica en la frase de la gran conmoción entre las vasijas. La redacción española refleja esas correcciones: mantiene el objeto referido a la Palabra y traduce una sola vez la conmoción entre las vasijas. También conservé la lectura personificada de Error y la metáfora literal de boca/lengua.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se usa «Mesías/Cristo» no corresponde en este pasaje; no se introduce terminología ajena.
  - Se mantiene la personificación de «Error», coherente con la terminología POB y con el audit trail inglés.
  - «Conocimiento» se emplea para ⲧⲙⲛⲧⲙⲏⲉ por fluidez y fidelidad; no se fuerza «Gnosis» en el cuerpo del texto.
  - La puntuación de los dos párrafos sigue la estructura retórica del pasaje y separa la secuencia juicio/disturbio de la sección revelatoria.
