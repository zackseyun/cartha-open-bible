  consult_excerpt: 'He’s good. He knows his plants, because he planted them in his paradise. Now his paradise is a place of rest. This 37 is the completion in the Father’s thought, and these are the words of his meditation. Each of his words is the work of his one will in the revelation of his Word. When they were still in the depths of his thought, the Word – which was the first to come out – revealed them along with a mind that speaks the one Word in a silent grace. He was called “the Thought,” since they were in it before being revealed. It happened, then, that he was the first to come out at the time when it pleased the one who wanted it. Now the Father rests in his will, and is pleased with it.

    Nothing happens without him, nor does anything happen without the will of the Father, but his will is incomprehensible. His trace is the will, and no one can know him, nor does he exist for people to scrutinize so that they might grasp him, but when he wills, what he wills is this – even if the sight doesn’t please them in any way before God – the will of the Father, because he knows the beginning of all of them, and their end, for in the end he’ll greet them directly. Now the end is receiving knowledge of the one who’s hidden; this is the Father, 38 from whom the beginning has come, and to whom all who’ve come out from him will return. They were revealed for the glory and the joy of his name.'
base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_truth/013.yaml
  text: 'He is the Good—within the Father’s Thought[a], in contemplation.


    The utterance of his meditation—each one, every one of his words—is the work of his Will. For they are speech in the Light, outside, belonging to his Saying: while they were still in the depths of his Thought, the Logos—the first to come forth—manifested them, with a Mind that speaks the one Word in a silent grace. He was called “the Thought,” because they were in it before they were manifested outside. And so it happened that he was the first to come forth, at the time when it pleased the will of the one who willed it.


    Now the Will is that in which the Father rests. Nothing happens without him, nor does anything happen without the Will of the Father. But his Will is uninvestigable; his trace is the Will. No one can know him, nor does he exist in such a way as for them to scrutinize him so that they might grasp him; rather, what he wills—this is what happens, even if their sight should not be pleasing in any way before God—the Will of the Father. For the Father knows their beginning and their end; for in their end he will greet them face to face. And the end is the knowledge of the Hidden One; and the Hidden One is the Father—from whom the beginning came forth and to whom all who came forth from him will return[c][b]. They were manifested for the glory and the joy of his Name.'
  footnotes:
  - marker: a
    text: Or 'And so it came to pass that it was first to make these appear—but not before the time when the Will had desired it.'.
    reason: previous_rendering
  - marker: b
    text: Or 'No one can make anything happen apart from it, nor can anything be made to happen against the Will of the Father.'.
    reason: previous_rendering
  - marker: c
    text: Or 'No one can know him, nor does he exist in such a way as for them to scrutinize him;'.
    reason: previous_rendering
