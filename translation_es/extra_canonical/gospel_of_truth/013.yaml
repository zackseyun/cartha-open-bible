translation:
  language: es
  text: 'Él es el Bueno[a] —dentro del Pensamiento del Padre, en contemplación.


    La expresión de su meditación: cada una, todas sus palabras, es la obra de su Voluntad. Porque son palabra en la Luz, afuera, perteneciente a su Decir; mientras todavía estaban en las profundidades de su Pensamiento, el Logos —el primero en salir— las manifestó, con una Mente que habla la única Palabra en una gracia silenciosa. Fue llamado «el Pensamiento», porque estaban en él antes de ser manifestadas afuera. Y así sucedió que él fue el primero en salir, en el momento en que agradó la voluntad de quien lo quiso.


    Ahora bien, la Voluntad es aquello en lo cual el Padre descansa. Nada acontece sin él, ni acontece nada sin la Voluntad del Padre. Pero su Voluntad es inescrutable; su rastro es la Voluntad. Nadie puede conocerlo, ni existe de manera que lo examinen para poder aprehenderlo; antes bien, lo que él quiere —esto es lo que sucede, aun si su vista no agradara en nada delante de Dios—, la Voluntad del Padre. Porque el Padre conoce su comienzo y su fin; pues en su fin los recibirá cara a cara. Y el fin es el conocimiento del Oculto; y el Oculto es el Padre, de quien salió el comienzo y a quien volverán todos los que salieron de él. Fueron manifestados para la gloria y el gozo de su Nombre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede leerse como «Él es el Bueno, dentro del Pensamiento del Padre»; se ha mantenido la puntuación que mejor refleja la identificación reificada del título.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲡⲓⲙⲉⲩⲉ / Thought
  english_pob_choice: Thought
  chosen_spanish: Pensamiento
  alternatives_spanish:
  - Idea
  - Pensar
  lexicon: Sahidic normatives
  rationale: ‘Pensamiento’ mantiene el valor reificado y técnico del término, como en ‘el Pensamiento del Padre’. En español suena natural y conserva la distinción entre el acto de pensar y el contenido/ámbito del pensar.
- source_word: ⲟⲩⲱϣ / Will
  english_pob_choice: Will
  chosen_spanish: Voluntad
  alternatives_spanish:
  - querer
  - deseo
  lexicon: Sahidic noun (volition)
  rationale: Se capitaliza como principio volitivo reificado, siguiendo la lectura auditada del inglés. ‘Voluntad’ es el equivalente español más estable para esta hipóstasis volitiva sin perder inteligibilidad.
- source_word: ⲡⲗⲟⲅⲟⲥ
  english_pob_choice: Logos
  chosen_spanish: Logos
  alternatives_spanish:
  - Palabra
  - Verbo
  lexicon: loanword/Greek→Coptic (standard)
  rationale: Se conserva ‘Logos’ como término técnico, y el contexto inmediato ya aclara su función como ‘la única Palabra’. Así se preserva la carga filosófico-teológica del original.
- source_word: ⲛⲟⲩⲥ
  english_pob_choice: Mind
  chosen_spanish: Mente
  alternatives_spanish:
  - Intelecto
  - entendimiento
  lexicon: loanword/Greek→Coptic (standard)
  rationale: ‘Mente’ reproduce con claridad la facultad que ‘habla la única Palabra’. ‘Intelecto’ sería más técnico, pero más duro; ‘Mente’ conserva el registro contemplativo del pasaje.
- source_word: ⲭⲁⲣⲓⲥ
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: loanword/Greek→Coptic (standard)
  rationale: ‘Gracia’ es la correspondencia directa y litúrgicamente comprensible. En ‘gracia silenciosa’ mantiene el matiz reificado de una cualidad activa y no meramente afectiva.
- source_word: ⲥⲟⲟⲩⲛⲉ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - gnosis
  - conocer
  lexicon: Sahidic noun
  rationale: Aquí ‘conocimiento’ comunica el cierre soteriológico del pasaje sin introducir transliteración innecesaria. Se conserva el valor técnico en la decisión teológica, pero con una forma española accesible.
- source_word: ⲉⲑⲏⲡ
  english_pob_choice: the Hidden One
  chosen_spanish: el Oculto
  alternatives_spanish:
  - el Escondido
  - el que está oculto
  lexicon: Sahidic periphrasis
  rationale: ‘El Oculto’ mantiene la personificación del título divino y evita una paráfrasis demasiado larga. Es la forma más natural en español para la reificación presente en el original.
- source_word: ⲓⲭⲛⲟⲥ
  english_pob_choice: trace
  chosen_spanish: rastro
  alternatives_spanish:
  - huella
  - señal
  lexicon: loanword/Greek→Coptic (standard)
  rationale: ‘Rastro’ funciona bien en español para la metáfora metafísica de una huella de lo divino, sin sonar demasiado material como ‘huella’.
- source_word: ⲉⲓ ⲁⲃⲁⲗ
  english_pob_choice: come forth / make manifest
  chosen_spanish: salir
  alternatives_spanish:
  - manifestarse
  - emerger
  lexicon: Sahidic verb
  rationale: 'En el pasaje el verbo es intransitivo: ‘fue el primero en salir’. ‘Salir’ conserva la imagen de procedencia y exteriorización sin forzar una causativa.'
theological_decisions:
- issue: Relación entre el Padre, su Pensamiento y el Logos
  english_pob_reading: The Logos manifested what was in the Father’s Thought while they were still in it.
  chosen_spanish_reading: El Logos las manifestó mientras todavía estaban en las profundidades de su Pensamiento.
  alternative_spanish_readings:
  - las dio a conocer
  - las hizo aparecer
  rationale: 'Se mantiene la tensión entre interioridad y manifestación: las palabras estaban ‘dentro’ del Pensamiento antes de ser reveladas ‘afuera’. ‘Manifestó’ conserva esa transición sin suavizarla.'
  doctrine_reference: Cristología/logología valentiniana; distinción interioridad-manifestación
- issue: La Voluntad como principio reificado
  english_pob_reading: Now the Will is that in which the Father rests.
  chosen_spanish_reading: Ahora bien, la Voluntad es aquello en lo cual el Padre descansa.
  alternative_spanish_readings:
  - la voluntad
  - el querer
  rationale: La mayúscula expresa la reificación presente en el texto y en la versión auditada en inglés. ‘Aquello en lo cual’ evita convertirla en mera propiedad psicológica.
  doctrine_reference: Teología de la voluntad divina; hipóstasis volitiva
- issue: 'Cierre soteriológico: ‘the knowledge of the Hidden One’'
  english_pob_reading: the end is the knowledge of the Hidden One
  chosen_spanish_reading: el fin es el conocimiento del Oculto
  alternative_spanish_readings:
  - el fin es la gnosis del Oculto
  - el fin es el reconocimiento del Oculto
  rationale: ‘Conocimiento’ preserva el sentido técnico sin introducir una transliteración que podría oscurecer la lectura. La alternativa ‘gnosis’ queda implícita en el trasfondo, pero no se impone en la línea principal.
  doctrine_reference: Soteriología gnóstica; conocimiento salvífico
- issue: ‘in a silent grace’
  english_pob_reading: a Mind that speaks the one Word in a silent grace
  chosen_spanish_reading: una Mente que habla la única Palabra en una gracia silenciosa
  alternative_spanish_readings:
  - en silenciosa gracia
  - en una gracia de silencio
  rationale: Se preserva la paradoja deliberada entre hablar y silencio. ‘Gracia silenciosa’ reproduce la cualidad casi sustantiva del original sin volverlo poético en exceso.
  doctrine_reference: Teología del Logos; paradoja silencio/palabra
translation_notes:
  revision_awareness: He tenido en cuenta la revisión adjudicada que corrige la secuencia ‘el primero en salir’ frente a una lectura causativa, y la cláusula final ‘aun si su vista no agradara en nada delante de Dios’. También se incorporó la necesidad de conservar la tensión entre interioridad y manifestación, así como la reificación de la Voluntad y el cierre con ‘el conocimiento del Oculto’.
  spanish_consistency_notes:
  - Se mantiene ‘Pensamiento’ y ‘Voluntad’ con mayúscula cuando funcionan como entidades reificadas.
  - Se conserva ‘Logos’ como tecnicismo y se explicita su relación con ‘Palabra’ dentro de la misma frase.
  - ‘Afuera’ se usa de forma consistente para reproducir la oposición interior/exterior del original.
  - ‘Oculto’ se emplea como título divino sin sustituirlo por una perífrasis más larga.
  - La puntuación busca respetar las unidades retóricas del pasaje, especialmente las secuencias definicionales y causales.
