revisions:
- from: 'Jesús dijo: «Mira, el sembrador salió; llenó su mano y sembró semilla. Unas cayeron en el camino; vinieron las aves y las juntaron. Otras cayeron sobre la roca, y no echaron raíz hacia abajo hasta la tierra, y no enviaron espigas hacia arriba al cielo. Y otras cayeron entre los espinos; las juntaron, ahogaron la semilla, y el gusano las comió. Y otras cayeron en la buena tierra, y dio buen fruto hacia arriba al cielo: produjo sesenta medidas y ciento veinte medidas»[a].'
  to: 'Jesús dijo: «Miren, el sembrador salió; llenó su mano y echó semilla. Unas cayeron en el camino; vinieron las aves y las recogieron. Otras cayeron sobre la roca, y no echaron raíz hacia abajo en la tierra, ni levantaron espigas hacia el cielo. Y otras cayeron entre los espinos; las recogieron, ahogaron la semilla, y el gusano se las comió. Y otras cayeron en la buena tierra, y dio buen fruto hacia el cielo: produjo sesenta medidas[a] y ciento veinte medidas[a]»'
  rationale: 'Se hicieron ajustes menores para alinear mejor el español con el expediente fuente y mejorar la naturalidad: ''echó semilla'' conserva el gesto físico de lanzar; ''las recogieron'' mantiene el valor de reunir sin armonizar con ''devorar''; se suavizó la imaginería vertical en español sin perder el contraste abajo/arriba; y la nota se redujo a la decisión léxica más importante y potencialmente ambigua, ''medidas''. No se requiere adjudicación adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:04:38Z'
