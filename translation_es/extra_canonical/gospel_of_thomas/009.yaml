  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y las divergencias tomasinas principales: el sembrador llena su mano, las aves juntan la semilla, se mantiene la imaginería vertical de raíces/espigas, aparece el gusano, y el rendimiento final conserva ''medidas''. Sin embargo, hay pequeños puntos de fidelidad y naturalidad que conviene ajustar: ''sembró semilla'' suaviza demasiado el matiz de ''arrojó/echó'', ''hasta la tierra'' no refleja tan bien el movimiento ''hacia abajo a la tierra'', y el pie de página amalgama demasiadas variantes en una sola nota en vez de anclar al menos las ambigüedades/léxicos relevantes en el texto.'
  spanish_quality_summary: 'El español es claro y legible, con tono digno. No obstante, algunas expresiones suenan algo forzadas o poco idiomáticas: ''las juntaron'' es comprensible pero menos natural que ''las recogieron''; ''hacia abajo hasta la tierra'' y ''hacia arriba al cielo'' pueden pulirse; y el bloque final gana fluidez con una puntuación un poco más limpia. El texto puede quedar más natural sin perder formalidad ni el perfil no armonizado de Tomás.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. Se preserva 'Jesús' correctamente. El uso de 'medidas' para ⲉⲥⲟⲧⲉ sigue bien la decisión auditada. La conservación de 'gusano' y de la imaginería vertical también está alineada con el expediente inglés. La mejora propuesta mantiene estas decisiones y solo afina elecciones léxicas españolas.
  issues:
  - severity: medium
    issue: '''sembró semilla'' para ⲁϥⲛⲟⲩϫⲉ'
    rationale: Aunque comunica la acción agrícola, diluye el matiz más físico de 'arrojar/echar' que el inglés auditado quiso conservar ('cast seed'). 'Echó semilla' mantiene claridad y se acerca mejor al gesto del sembrador.
  - severity: medium
    issue: '''las juntaron'' para ⲕⲱⲧϥ'
    rationale: Es fiel en el sentido básico de reunir, pero en español suena menos natural para aves tomando semillas. 'Las recogieron' conserva la divergencia frente a 'devoraron' y mejora la lectura.
  - severity: low
    issue: '''hacia abajo hasta la tierra'''
    rationale: La combinación 'hacia abajo hasta' suena torpe. 'Raíz abajo en la tierra' o 'raíz hacia abajo en la tierra' expresa mejor la verticalidad distintiva sin perder literalidad.
  - severity: low
    issue: Nota única demasiado acumulativa
    rationale: El pie de página combina varias decisiones textuales distintas. Dado que el proyecto pide anclar notas cuando se incluyen, conviene limitar la nota a un punto léxico especialmente susceptible de armonización en español, como 'medidas', o bien omitir notas por completo. Aquí basta una nota focalizada sobre 'medidas'.
  revised_spanish_text: 'Jesús dijo: «Miren, el sembrador salió; llenó su mano y echó semilla. Unas cayeron en el camino; vinieron las aves y las recogieron. Otras cayeron sobre la roca, y no echaron raíz hacia abajo en la tierra, ni levantaron espigas hacia el cielo. Y otras cayeron entre los espinos; las recogieron, ahogaron la semilla, y el gusano se las comió. Y otras cayeron en la buena tierra, y dio buen fruto hacia el cielo: produjo sesenta medidas[a] y ciento veinte medidas[a]»'
  revised_footnotes:
  - marker: a
    text: Copto ⲉⲥⲟⲧⲉ significa 'medida' o 'rendimiento'. Aquí se traduce literalmente como 'medidas' para conservar la divergencia del Evangelio de Tomás frente a la forma sinóptica más armonizada ('sesenta veces', 'ciento por uno').
    reason: textual_variant
  revision_rationale: 'Se hicieron ajustes menores para alinear mejor el español con el expediente fuente y mejorar la naturalidad: ''echó semilla'' conserva el gesto físico de lanzar; ''las recogieron'' mantiene el valor de reunir sin armonizar con ''devorar''; se suavizó la imaginería vertical en español sin perder el contraste abajo/arriba; y la nota se redujo a la decisión léxica más importante y potencialmente ambigua, ''medidas''. No se requiere adjudicación adicional.'
