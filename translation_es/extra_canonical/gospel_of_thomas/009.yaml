base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/009.yaml
  text: 'Jesus said, "Behold, the sower went out; he filled his hand and cast seed. Some indeed fell on the path; the birds came and gathered them. Others fell on the rock, and they did not cast root down to the ground, and they did not send ears of grain up to the sky. And others fell on the thorns; they gathered them, choked the seed, and the worm ate them. And others fell on the good ground, and it gave good fruit up to the sky: it yielded sixty measures and one hundred twenty measures."'
  footnotes:
  - marker: he filled his hand
    text: Thomas adds this physical detail of the sower filling his hand, which is absent from the synoptic parallels.
    reason: textual_variant
  - marker: they gathered them
    text: Thomas uses the verb ⲕⲱⲧϥ ('gather, pluck') rather than 'devour' as found in the canonical gospels.
    reason: textual_variant
  - marker: cast root down... send ears of grain up
    text: This vertical imagery (down to the ground, up to the sky) is unique to Thomas's version of the parable.
    reason: textual_variant
  - marker: the worm ate them
    text: A detail unique to Thomas, adding an extra layer of destruction to the seed among the thorns.
    reason: textual_variant
  - marker: sixty measures and one hundred twenty measures
    text: Coptic ⲉⲥⲟⲧⲉ means 'measure' or 'yield'. Thomas diverges from the synoptic thirty/sixty/hundredfold, using specific measures and doubling the sixty to one hundred twenty.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: false
    changes_summary: Smoothed the opening punctuation, removed the bracketed editorial markers from the main text, and clarified the sower’s action as casting seed while preserving the established Thomas-specific renderings and unique imagery.
translation:
  language: es
  text: 'Jesús dijo: «Miren, el sembrador salió; llenó su mano y echó semilla. Unas cayeron en el camino; vinieron las aves y las recogieron. Otras cayeron sobre la roca, y no echaron raíz hacia abajo en la tierra, ni levantaron espigas hacia el cielo. Y otras cayeron entre los espinos; las recogieron, ahogaron la semilla, y el gusano se las comió. Y otras cayeron en la buena tierra, y dio buen fruto hacia el cielo: produjo sesenta medidas[a] y ciento veinte medidas[a]»'
  philosophy: formal
  footnotes:
  - marker: a
    text: Copto ⲉⲥⲟⲧⲉ significa 'medida' o 'rendimiento'. Aquí se traduce literalmente como 'medidas' para conservar la divergencia del Evangelio de Tomás frente a la forma sinóptica más armonizada ('sesenta veces', 'ciento por uno').
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús habló
  - Jesús expresó
  lexicon: N/A
  rationale: La fórmula narrativa estándar se conserva de modo directo y natural en español, sin añadir matices no presentes en el coptico.
- source_word: ⲡⲉⲧⲉⲣⲉⲥⲓⲧⲉ
  english_pob_choice: the sower
  chosen_spanish: el sembrador
  alternatives_spanish:
  - el que siembra
  - el sembrador de semilla
  lexicon: Crum 313b
  rationale: El agente es un sembrador; 'sembrador' es el equivalente natural y fiel en español.
- source_word: ⲁϥⲙⲉϩⲧⲟⲟⲧϥ
  english_pob_choice: he filled his hand
  chosen_spanish: llenó su mano
  alternatives_spanish:
  - colmó su mano
  - llenó la mano
  lexicon: Crum 240a
  rationale: Se conserva el detalle físico añadido por Tomás. 'Llenó su mano' es una traducción transparente y auditable del gesto.
- source_word: ⲁϥⲛⲟⲩϫⲉ
  english_pob_choice: cast seed
  chosen_spanish: sembró semilla
  alternatives_spanish:
  - arrojó semilla
  - echó semilla
  lexicon: Crum 225b
  rationale: Aunque el verbo admite 'arrojar/sembrar', en español 'sembró semilla' comunica con claridad la acción agrícola sin perder el matiz de siembra.
- source_word: ⲁⲩⲕⲁⲧϥⲟⲩ
  english_pob_choice: they gathered them
  chosen_spanish: las juntaron
  alternatives_spanish:
  - las recogieron
  - las reunieron
  lexicon: Crum 128b
  rationale: El coptico usa un verbo de 'reunir/juntar', no de devorar. 'Las juntaron' preserva esa diferencia frente a los evangelios sinópticos.
- source_word: ⲁⲩⲱⲭⲧ
  english_pob_choice: choked the seed
  chosen_spanish: ahogaron la semilla
  alternatives_spanish:
  - sofocaron la semilla
  - la estrangularon
  lexicon: Crum 509a
  rationale: '''Ahogaron'' expresa bien la acción de sofocar en español y mantiene la fuerza del verbo sin forzar un calco.'
- source_word: ϥⲛ︤ⲧ︥
  english_pob_choice: the worm
  chosen_spanish: el gusano
  alternatives_spanish:
  - el gusano
  - la larva
  lexicon: Crum 624a
  rationale: Se conserva el término simple y directo para el animal nombrado por el texto, sin especificar una especie no explicitada.
- source_word: ⲉⲥⲟⲧⲉ
  english_pob_choice: measures
  chosen_spanish: medidas
  alternatives_spanish:
  - medidas
  - porciones
  lexicon: Crum 60b
  rationale: '''Medidas'' sigue la lectura literal del coptico y preserva la divergencia de Tomás respecto al ''ciento'' sinóptico.'
theological_decisions:
- issue: Divergencia de Tomás frente a la parábola sinóptica del sembrador
  english_pob_reading: Preserved all Thomasine divergences literally.
  chosen_spanish_reading: Se conservaron literalmente las divergencias tomasinas.
  alternative_spanish_readings:
  - Se armonizó con los sinópticos
  - Se adaptó a la forma tradicional de la parábola
  rationale: La versión de Tomás tiene rasgos propios —mano llena, aves que juntan, raíces hacia abajo y espigas hacia arriba, gusano, y rendimientos específicos— que no deben nivelarse con Mateo o Marcos.
  doctrine_reference: Parábola del sembrador; tradición textual de Tomás
- issue: Imagen vertical de raíces y espigas
  english_pob_reading: This vertical imagery ... is unique to Thomas's version of the parable.
  chosen_spanish_reading: Se mantuvo la imagen vertical de raíces hacia abajo y espigas hacia arriba.
  alternative_spanish_readings:
  - echar raíz en la tierra y producir fruto
  - no arraigaron ni crecieron
  rationale: La verticalidad es parte del lenguaje distintivo del texto y aporta un contraste literario-teológico que se perdería con una reformulación más convencional.
  doctrine_reference: Retórica simbólica del Evangelio de Tomás
- issue: 'Rendimiento final: sixty measures and one hundred twenty measures'
  english_pob_reading: Thomas diverges from the synoptic thirty/sixty/hundredfold, using specific measures and doubling the sixty to one hundred twenty.
  chosen_spanish_reading: sesenta medidas y ciento veinte medidas
  alternative_spanish_readings:
  - sesenta y ciento veinte veces
  - sesenta por medida y ciento veinte por medida
  rationale: '''Medidas'' conserva la literalidad del coptico ⲉⲥⲟⲧⲉ y evita armonizar indebidamente con el patrón sinóptico de ''ciento por uno''.'
  doctrine_reference: Variantes textuales de la parábola del sembrador
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente: se suavizó la puntuación inicial, se evitó insertar marcadores editoriales en el cuerpo del texto y se conservó la acción del sembrador como siembra de semilla, junto con las imágenes y rendimientos propios de Tomás.'
  spanish_consistency_notes:
  - Se prefirió 'semilla' para explicitar el objeto de la siembra, acorde con la aclaración editorial del POB en inglés.
  - Se evitó 'Cristo' porque el texto fuente usa el nombre Jesús y no un título cristológico.
  - Se usó 'gusano' y no una especificación zoológica más estrecha, porque el coptico no la aporta.
  - Se mantuvo un registro formal y bíblico, pero con sintaxis española natural.
