base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/073.yaml
  text: Jesus said[1], "The harvest indeed is plentiful, but the workers are few. Beseech the master, then[2], that he may send out workers to the harvest."
  footnotes:
  - marker: '1'
    text: Unlike the canonical parallels in Matthew 9:38 and Luke 10:2, Thomas lacks the phrase 'of the harvest' after 'master' (or 'Lord'), and lacks 'his' before the final 'harvest'.
    reason: textual_variant
  - marker: '2'
    text: The Coptic ⲡϫⲟⲉⲓⲥ (pjoeis) can be translated as 'the Lord' or 'the master'. In the context of an agricultural estate, 'master' is used here.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo: «La cosecha[ a ] en verdad es abundante, pero los obreros son pocos. Rueguen, entonces, al maestro[ b ], para que envíe obreros a la cosecha».'
  philosophy: formal
lexical_decisions:
- source_word: ⲡⲱϩⲥ
  english_pob_choice: harvest
  chosen_spanish: cosecha
  alternatives_spanish:
  - siega
  - recolección
  lexicon: Crum 283a
  rationale: Coptic ⲡⲱϩⲥ designa la cosecha o recolección de la mies. En español, «cosecha» es el término más natural y conserva el campo agrícola del dicho.
- source_word: ⲛⲁϣⲱϥ
  english_pob_choice: plentiful
  chosen_spanish: abundante
  alternatives_spanish:
  - grande
  - mucha
  - numerosa
  lexicon: Crum 242a
  rationale: La idea es de abundancia, no simplemente de tamaño. «Abundante» reproduce mejor el valor cuantitativo de la palabra coptica en un contexto agrícola.
- source_word: ⲥⲟⲃⲕ
  english_pob_choice: few
  chosen_spanish: pocos
  alternatives_spanish:
  - escasos
  - pequeños
  lexicon: Crum 320b
  rationale: El término expresa escasez numérica; «pocos» es el equivalente directo y claro en español.
- source_word: ⲥⲟⲡⲥ
  english_pob_choice: Beseech
  chosen_spanish: Rueguen
  alternatives_spanish:
  - Suplicuen
  - Imploren
  - Besechen
  lexicon: Crum 351b
  rationale: El verbo coptico significa rogar, suplicar, pedir con insistencia. «Rueguen» mantiene la fuerza exhortativa y es natural en español bíblico contemporáneo.
- source_word: ⲡϫⲟⲉⲓⲥ
  english_pob_choice: master
  chosen_spanish: maestro
  alternatives_spanish:
  - señor
  - dueño
  lexicon: Crum 785a
  rationale: El contexto agrícola de la imagen favorece una relación de autoridad sobre una propiedad o labor. En español, «maestro» aquí funciona como equivalente funcional de «master» en el sentido de patrón/encargado; se preserva la distancia con respecto a un título teológico fijo, sin imponer «Señor».
- source_word: ⲛⲁⲛⲉϫ ... ⲉⲃⲟⲗ
  english_pob_choice: send out
  chosen_spanish: envíe
  alternatives_spanish:
  - mande fuera
  - arroje fuera
  - envíe fuera
  lexicon: Crum 232a
  rationale: El coptico literalmente implica expulsar o lanzar fuera; en las paralelas sinópticas corresponde a «enviar» obreros. En español, «envíe» comunica la función del acto en forma idiomática y fiel al sentido.
theological_decisions:
- issue: ⲡϫⲟⲉⲓⲥ como título o como dueño/patrón de la escena agrícola
  english_pob_reading: master
  chosen_spanish_reading: maestro
  alternative_spanish_readings:
  - Señor
  - dueño
  - patrón
  rationale: La lectura de POB sitúa el dicho en una imagen de hacienda o campo, no en una formulación litúrgica. «Maestro» evita convertir automáticamente el término en un título devocional y conserva la tensión contextual del dicho.
  doctrine_reference: Uso contextual de κύριος/ⲡϫⲟⲉⲓⲥ en parábolas agrícolas; paralelos sinópticos con matiz de petición al dueño de la mies.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación asegurando que no haya notas al pie sin anclaje en el texto. La redacción sigue el audit trail: se mantiene la distinción entre la abundancia de la cosecha, la escasez de obreros, la urgencia de la petición y la traducción contextual de ⲡϫⲟⲉⲓⲥ.'
  spanish_consistency_notes:
  - Se usa «cosecha» de forma consistente para ⲡⲱϩⲥ.
  - Se usa «obreros» para ⲉⲣⲅⲁⲧⲏⲥ, conservando el sentido laboral concreto.
  - «Rueguen» mantiene el tono exhortativo de ⲥⲟⲡⲥ sin suavizar la petición.
  - No se introduce «Señor» en el texto principal para no borrar la decisión contextual del audit trail.
