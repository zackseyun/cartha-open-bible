base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/101.yaml
  text: Whoever does not hate his father and his mother as I do cannot become my disciple[as I do]; and whoever does not love his father and his mother as I do cannot become my disciple. For my mother [...][true][[...]], but my true [mother] gave me life.
  footnotes:
  - marker: as I do
    text: Lit. 'in my manner' or 'like me' (ⲛ̄ⲧⲁϩⲉ).
    reason: lexical_alternative
  - marker: '[...]'
    text: The manuscript is damaged here (ⲛ̄ⲧⲁⲥ̣[.........] [..]ⲟ̣ⲗ̣). Scholars often reconstruct the missing text to mean something like 'bore me unto death' or 'gave me falsehood,' contrasting with the true mother who gave life.
    reason: textual_variant
  - marker: 'true'
    text: Lit. 'of truth' (ⲙ̄ⲙⲉ).
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: Quien no odia a su padre y a su madre como yo, no puede llegar a ser mi discípulo[a]; y quien no ama a su padre y a su madre como yo, no puede llegar a ser mi discípulo. Porque mi madre [...][b], pero mi madre verdadera[c] me dio vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «en mi manera» o «como yo» (ⲛ̄ⲧⲁϩⲉ).
    reason: lexical_alternative
  - marker: b
    text: El manuscrito está dañado aquí; los especialistas suelen reconstruir algo como «me llevó hasta la muerte» o «me dio falsedad», en contraste con la madre verdadera que da vida.
    reason: textual_variant
  - marker: c
    text: Lit. «de verdad» o «de la verdad» (ⲙ̄ⲙⲉ).
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲉⲥⲧⲉ
  english_pob_choice: hate
  chosen_spanish: odia
  alternatives_spanish:
  - aborrece
  lexicon: Crum 185a
  rationale: El verbo sahídico expresa odio; en español, «odiar» comunica con claridad la fuerza lexical sin suavizarla indebidamente.
- source_word: ⲙⲣ̄ⲣⲉ
  english_pob_choice: love
  chosen_spanish: ama
  alternatives_spanish:
  - quiere
  - ama profundamente
  lexicon: Crum 155b
  rationale: Para el contraste paralelo con «odia», «ama» es el equivalente natural y fiel en español.
- source_word: ⲛ̄ⲧⲁϩⲉ
  english_pob_choice: as I do
  chosen_spanish: como yo
  alternatives_spanish:
  - como yo lo hago
  - a mi manera
  lexicon: Crum 651a
  rationale: La expresión literal significa «como yo / en mi manera»; en español, «como yo» conserva la ambigüedad útil del original sin forzar una paráfrasis verbal.
- source_word: ϣ ... ⲁⲛ
  english_pob_choice: cannot
  chosen_spanish: no puede llegar a ser
  alternatives_spanish:
  - no puede
  - no podrá llegar a ser
  lexicon: Crum 549a
  rationale: La construcción negativa con posibilidad se traduce de forma natural como incapacidad de llegar a ser discípulo; «llegar a ser» refleja bien el matiz de devenir implícito en el contexto.
- source_word: ⲙ̄ⲙⲉ
  english_pob_choice: 'true'
  chosen_spanish: verdadera
  alternatives_spanish:
  - de verdad
  - auténtica
  lexicon: Crum 157b
  rationale: Aunque literalmente es «de verdad», en español «verdadera» funciona como adjetivo natural y mantiene la oposición con la madre biológica.
- source_word: ⲱⲛϩ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida
  - vivió / me vivificó
  lexicon: Crum 512a
  rationale: El sustantivo básico es «vida»; «me dio vida» reproduce bien la idea de vivificación transmitida por el contexto.
theological_decisions:
- issue: La cláusula lacunosa sobre la madre y su contraste con la madre verdadera.
  english_pob_reading: For my mother [...], but my true [mother] gave me life.
  chosen_spanish_reading: Porque mi madre [...], pero mi madre verdadera me dio vida.
  alternative_spanish_readings:
  - Porque mi madre [...], pero mi verdadera madre me dio vida.
  - Porque mi madre [...], pero la madre de verdad me dio vida.
  rationale: El manuscrito está dañado en la primera mitad, y la lectura inglesa de POB conserva la ruptura textual sin sobreespecificar el contenido perdido. En la segunda mitad, mantener «madre verdadera» preserva el contraste teológico entre maternidad biológica y maternidad espiritual/vivificante sin imponer una identificación doctrinal no explicitada en el verso.
  doctrine_reference: Thomasine theology; contraste entre nacimiento biológico y vida espiritual
- issue: La comparación repetida «como yo» aplicada tanto al odio como al amor.
  english_pob_reading: as I do
  chosen_spanish_reading: como yo
  alternative_spanish_readings:
  - como yo lo hago
  - a mi manera
  rationale: 'La traducción evita eliminar la tensión del original: no se trata de un simple mandato moral abstracto, sino de una pauta de identificación con la manera del hablante. «Como yo» conserva la literalidad relativa y la ambigüedad productiva del sahídico.'
  doctrine_reference: Cristología implícita en el dicho; forma de imitación/discípulado
translation_notes:
  revision_awareness: 'Se revisó el testimonio en inglés y el aparato: la lectura inglesa mantiene la alternancia «hate/love» con el comparativo «as I do», y conserva la laguna del manuscrito antes de la cláusula sobre la madre verdadera. El borrador español sigue esa misma arquitectura textual y no completa la laguna con una conjetura en el texto principal.'
  spanish_consistency_notes:
  - Se conservó el paralelismo sintáctico de dos cláusulas negativas coordinadas por «y».
  - Se eligió «discípulo» en lugar de un equivalente más libre para mantener la terminología del testimonio inglés.
  - Se evitó «Cristo»/«Señor» porque el dicho no contiene esas formas y el texto base no las requiere.
  - Se usó «madre verdadera» como traducción natural de ⲙ̄ⲙⲉ sin borrar la tensión entre lo biológico y lo vivificante.
