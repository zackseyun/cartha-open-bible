translation:
  language: es
  text: 'Jesús dijo[a]: El reinado es como un pastor[b] que tenía cien ovejas. Una de ellas, la grande[c], se extravió. Él dejó las noventa y nueve y buscó a la una hasta encontrarla. Después de haber trabajado[d], dijo a la oveja[e]: Te amo[f] más que a las noventa y nueve[g].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Reinado» traduce ⲡⲙⲛⲧⲣⲣⲟ; podría verterse también «reino», pero esa opción sugiere más fácilmente un ámbito espacial que una soberanía o ejercicio de reinar.
    reason: lexical_alternative
  - marker: b
    text: El Coptico dice «pastor» implícitamente en ⲣⲱⲙⲉ ⲛ̄ϣⲱⲥ; el contexto también es claramente pastoril.
    reason: source_note
  - marker: c
    text: ⲡⲛⲟϭ significa literalmente «el grande» o «el mayor»; el español conserva esa literalidad sin decidir de antemano el matiz.
    reason: lexical_alternative
  - marker: d
    text: ⲟⲩⲟϣⲕ puede significar «amar» o «preferir»; ambas posibilidades están atestiguadas en el expediente inglés.
    reason: lexical_alternative
  - marker: e
    text: El singular se ajusta al discurso directo dirigido a la oveja hallada; el expediente inglés también señala una restauración menor en este punto.
    reason: source_note
  - marker: f
    text: «Te amo» sigue la lectura principal del expediente inglés; «Te quiero» o «Te prefiero» serían alternativas posibles según el matiz deseado.
    reason: lexical_alternative
  - marker: g
    text: La forma «las noventa y nueve» conserva el numeral sustantivado del original, con concordancia femenina por el contexto de «ovejas».
    reason: spanish_style_note
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingship
  chosen_spanish: reinado
  alternatives_spanish:
  - reino
  - realeza
  - gobierno
  lexicon: Crum; Layton, Grammar §72
  rationale: En español, «reinado» conserva el valor abstracto de realeza/ejercicio del poder, evitando reducir el término a un lugar territorial. Es la mejor equivalencia para el matiz conceptual que el POB inglés resolvió como «kingship».
- source_word: ⲟⲩⲣⲱⲙⲉ ⲛ̄ϣⲱⲥ
  english_pob_choice: a shepherd who had
  chosen_spanish: un pastor
  alternatives_spanish:
  - un hombre pastor
  - un hombre de pastoreo
  - un pastor de ovejas
  lexicon: Crum, s.v. ϣⲱⲥ; revisión auditada en el expediente inglés
  rationale: 'El audit trail inglés registra una corrección importante: la expresión coptica nombra a un pastor, no simplemente a «un hombre». En español, «pastor» comunica con naturalidad ese valor y preserva el oficio implícito por el contexto pastoral.'
- source_word: ⲛϣⲱⲥ
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - corderos
  lexicon: Crum, s.v. ϣⲉ
  rationale: «Ovejas» es el equivalente natural y preciso en este contexto narrativo; «ganado menor» sería demasiado técnico y «corderos» estrecharía indebidamente el sentido.
- source_word: ⲡⲛⲟϭ
  english_pob_choice: the great one
  chosen_spanish: la grande
  alternatives_spanish:
  - la más grande
  - la grande de todas
  - la mayor
  lexicon: Crum, s.v. ⲛⲟϭ
  rationale: El inglés POB preserva la literalidad de «the great one». En español, «la grande» mantiene el valor predicativo y deja abierta la ambigüedad entre tamaño y grandeza, sin forzar una glosa interpretativa.
- source_word: ⲥⲱⲣⲙ
  english_pob_choice: went astray
  chosen_spanish: se extravió
  alternatives_spanish:
  - se desvió
  - anduvo errante
  - se perdió
  lexicon: Crum, s.v. ⲥⲱⲣⲙ
  rationale: «Se extravió» es idiomático en español y reproduce bien el matiz de irse fuera del camino, especialmente en un marco pastoril.
- source_word: ⲕⲱ
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - soltó
  lexicon: Crum, s.v. ⲕⲱ
  rationale: «Dejó» conserva neutralidad narrativa, como el POB inglés «left», sin añadir la carga afectiva fuerte de «abandonó».
- source_word: ⲡⲥⲧⲉⲯⲓⲧ
  english_pob_choice: the ninety-nine
  chosen_spanish: las noventa y nueve
  alternatives_spanish:
  - las noventa y nueve ovejas
  - los noventa y nueve
  lexicon: Notas de numerales en Thomas; comparación con influjo griego
  rationale: En español se mantiene el numeral sustantivado como en el inglés POB. El género femenino concuerda con «ovejas», ya presente en el contexto inmediato.
- source_word: ϣⲓⲛⲉ ⲛⲥⲁ ⲡⲓⲟⲩⲁ
  english_pob_choice: searched for the one
  chosen_spanish: buscó a la una
  alternatives_spanish:
  - buscó por la una
  - buscó a la oveja única
  - la buscó
  lexicon: Crum, s.v. ϣⲓⲛⲉ; Layton, Grammar §138
  rationale: «Buscó a la una» mantiene la referencia al numeral sustantivado y no añade un sustantivo no explicitado. Aunque suena ligeramente marcado, es fiel al objeto tal como está en el texto.
- source_word: ϩⲁⲛⲧⲉ ... ϩⲉ
  english_pob_choice: until he found it
  chosen_spanish: hasta encontrarla
  alternatives_spanish:
  - hasta que la encontró
  - hasta hallarla
  lexicon: Layton, Grammar §162; Crum, s.v. ϩⲉ
  rationale: La construcción temporal se expresa de modo natural en español con infinitivo. «Encontrarla» evita la repetición pesada de «la encontró» y mantiene fluidez.
- source_word: ϩⲓⲥⲉ
  english_pob_choice: had toiled
  chosen_spanish: después de haber trabajado
  alternatives_spanish:
  - después de haber laborado
  - tras haberse esforzado
  - después de fatigarse
  lexicon: Crum, s.v. ϩⲓⲥⲉ
  rationale: El coptico implica esfuerzo previo a la palabra dicha; «después de haber trabajado» transmite ese esfuerzo de forma clara y comprensible en español, sin exagerar el tono ni introducir una connotación de agotamiento que el contexto no exige.
- source_word: ⲡⲉⲥⲟⲟⲩ
  english_pob_choice: to the sheep
  chosen_spanish: a la oveja
  alternatives_spanish:
  - a la oveja aquella
  - a la oveja perdida
  - a la oveja
  lexicon: Crum, s.v. ϣⲉ; nota de restauración en el expediente inglés
  rationale: El singular es necesario por el discurso directo dirigido a la oveja hallada. Aunque el coptico puede reflejar la especie «oveja» y el expediente inglés menciona una restauración menor, el singular español es el más natural en la escena.
- source_word: ⲟⲩⲟϣⲕ
  english_pob_choice: I love you
  chosen_spanish: Te amo
  alternatives_spanish:
  - Te prefiero
  - Te quiero
  lexicon: Crum, s.v. ⲟⲩⲟϣⲕ
  rationale: El POB inglés eligió «I love you» como lectura principal, reconociendo la alternativa «prefer». En español, «Te amo» conserva la fuerza relacional del enunciado y su paralelismo afectivo, mientras que «te quiero» sería menos enfático y «te prefiero» estrecharía el sentido hacia una comparación fría.
theological_decisions:
- issue: ¿Cómo traducir el abstracto de soberanía ⲡⲙⲛⲧⲣⲣⲟ en un dicho parabólico de Thomas?
  english_pob_reading: kingship is like
  chosen_spanish_reading: El reinado es como
  alternative_spanish_readings:
  - El reino es como
  - La realeza es como
  - El gobierno es como
  rationale: El término no nombra simplemente un lugar; expresa el ejercicio o realidad de reinar. «Reinado» conserva esa abstracción, siguiendo la decisión del POB inglés de evitar una territorialización automática.
  doctrine_reference: Lexical theology of reign/kingdom language; no doctrinal claim beyond the text
- issue: ¿Mantener la tensión entre «amor» y «preferencia» en ⲟⲩⲟϣⲕ?
  english_pob_reading: I love you / or 'I prefer you'
  chosen_spanish_reading: Te amo
  alternative_spanish_readings:
  - Te prefiero
  - Te quiero
  rationale: El POB inglés documenta explícitamente la ambigüedad semántica. El español principal opta por «Te amo» por ser la lectura más natural y afectiva, pero la nota conserva la alternativa «preferir» para no borrar la tensión lexical del original.
  doctrine_reference: Lexical ambiguity; no doctrinal assertion
- issue: ¿Cómo reflejar el valor de «la grande» sin imponer una interpretación demasiado cerrada?
  english_pob_reading: the great one
  chosen_spanish_reading: la grande
  alternative_spanish_readings:
  - la más grande
  - la mayor
  rationale: «La grande» preserva la literalidad y deja abierta la oscilación entre tamaño y prominencia. Evita decidir por adelantado si el énfasis es cuantitativo, cualitativo o de estima.
  doctrine_reference: Non-doctrinal lexical ambiguity
translation_notes:
  revision_awareness: 'El expediente inglés registra una corrección importante: la frase inicial no debe leerse como «a man who had», sino como «a shepherd who had». Esta observación fue incorporada en la versión española con «un pastor». También se tuvo en cuenta la nota del POB sobre la ambigüedad de ⲟⲩⲟϣⲕ («amar»/«preferir») y la literalidad de ⲡⲛⲟϭ («the great one»).'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para ⲓ︤ⲥ︥/ⲓⲏⲥⲟⲩⲥ, conforme al estándar del proyecto.
  - Se evita «SEÑOR» o «Cristo» porque el pasaje no los contiene.
  - La numeración sustantivada se conserva con concordancia femenina por referencia a «ovejas».
  - El tono busca ser publicable y sobrio, sin diluir la literalidad del dicho.
