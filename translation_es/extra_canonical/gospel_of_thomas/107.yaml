base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/107.yaml
  text: Jesus said[a], The kingship is like a shepherd who had a hundred sheep. One of them—the great one—went astray. He left the ninety‑nine and searched for the one until he found it. After he had toiled, he said to the sheep[i][h][g][f][e][d][c][b], I love you more than the ninety‑nine.
  footnotes:
  - marker: a
    text: ‘Kingship’ renders ⲡⲙⲛⲧⲣⲣⲟ, an abstract for reign/rule; ‘kingdom’ is a common but potentially more spatial translation.
    reason: lexical_alternative
  - marker: b
    text: The text reads literally ‘the great one’ (ⲡⲛⲟϭ), which can mean ‘largest.’
    reason: lexical_alternative
  - marker: c
    text: ⲡⲥⲧⲉⲯⲓⲧ is the manuscript’s form for ‘the ninety‑nine,’ likely influenced by Greek numeral forms.
    reason: dialect_note
  - marker: d
    text: ⲟⲩⲟϣⲕ can mean ‘love’ or ‘prefer’; either ‘I love you’ or ‘I prefer you’ is possible.
    reason: lexical_alternative
  - marker: e
    text: ‘To the sheep’ (ⲡⲉⲥⲟⲟⲩ) has a minor restored letter in the manuscript (NHAM02.50 lb 27).
    reason: lacuna_or_restoration
  - marker: f
    text: Although the scenario implies a shepherd, the Coptic says ‘a man who had a hundred sheep’ without naming him ‘shepherd.’
    reason: cultural_note
  - marker: g
    text: ⲥⲱⲣⲙ is ‘go astray/wander’; the pastoral setting governs the nuance here.
    reason: cultural_note
  - marker: h
    text: The clause ‘after he had toiled’ reflects Coptic ⲛⲧⲁⲣⲉ‑ plus ϩⲓⲥⲉ, implying effort before the saying is spoken.
    reason: cultural_note
  - marker: i
    text: Or 'a man who had'.
    reason: previous_rendering
