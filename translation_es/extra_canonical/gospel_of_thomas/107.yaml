  source_alignment_summary: 'El borrador español refleja bien la estructura del dicho y adopta correctamente la corrección auditada clave: ⲟⲩⲣⲱⲙⲉ ⲛ̄ϣⲱⲥ = «un pastor», no simplemente «un hombre». También conserva bien «reinado» para ⲡⲙⲛⲧⲣⲣⲟ, «se extravió» para ⲥⲱⲣⲙ, la búsqueda de la oveja perdida y la comparación final con las noventa y nueve. Sin embargo, varias notas están mal ancladas o describen el término equivocado: la nota [d] en el texto cae sobre «trabajado» pero su contenido explica ⲟⲩⲟϣⲕ («amar/preferir»); la nota [e] en el texto cae sobre «oveja» pero su contenido mezcla singular natural en español con una referencia al expediente inglés que no corresponde exactamente; además faltan en español algunas justificaciones útiles del expediente inglés, especialmente para «hasta encontrarla» y para el esfuerzo implicado en ϩⲓⲥⲉ. La traducción principal necesita solo reparación menor de notas y leve pulido expresivo.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «El reinado es como…» funciona bien en este proyecto. «Buscó a la una» es comprensible pero algo forzado; en español natural y fiel conviene más «buscó a aquella sola» o, mejor aún, «buscó a la oveja extraviada» solo si se admite una explicitación mayor. Dado que el inglés POB preserva el numeral sustantivado, una solución intermedia más natural es «buscó a la que se había extraviado»; sin embargo, para no alejarse del expediente, «buscó a aquella una» sería demasiado artificial. La mejor reparación mínima es mantener la frase narrativa pero cambiarla a «buscó a la una» solo si las notas se ordenan; aun así sigue sonando rígido. También «Después de haberse fatigado» o «Después de esforzarse» representa mejor ϩⲓⲥⲉ que «trabajado».
  glossary_alignment: 'Alinea bien con la terminología del proyecto en lo pertinente: «Jesús», «reinado», «oveja/ovejas». No hay conflicto con glosario mayor. La decisión «Te amo» con nota alternativa «Te prefiero» respeta la ambigüedad documentada. La única desalineación real está en la gestión de notas: deben explicar el término al que están ancladas y preservar mejor el razonamiento léxico del expediente inglés.'
  issues:
  - severity: medium
    issue: La nota [d] está mal anclada y explica el término equivocado.
    rationale: En el texto [d] aparece en «trabajado», pero la nota [d] trata de ⲟⲩⲟϣⲕ = «amar/preferir», que corresponde a «Te amo», no a «trabajado».
  - severity: medium
    issue: La representación de ϩⲓⲥⲉ como «trabajado» es semánticamente débil.
    rationale: El expediente inglés destaca esfuerzo/cansancio previo («had toiled»). «Trabajado» no es incorrecto, pero en español suena demasiado general; «se había esforzado» o «se había fatigado» preserva mejor el matiz.
  - severity: low
    issue: «Buscó a la una» suena poco natural en español.
    rationale: Aunque intenta conservar el numeral sustantivado, la expresión resulta rígida. Puede mejorarse sin perder fidelidad con «buscó a aquella sola» o una formulación equivalente más idiomática.
  - severity: low
    issue: Faltan o se redistribuyen mal varias notas del expediente inglés.
    rationale: El inglés documenta explícitamente el matiz de «hasta que la encontró», el esfuerzo de ϩⲓⲥⲉ y la alternativa «amor/preferencia». En español conviene reordenarlas para que cada ancla corresponda a su nota.
  - severity: low
    issue: 'Error ortográfico en nota [b]: «Coptico».'
    rationale: Debe escribirse «copto» o «cóptico».
  revised_spanish_text: 'Jesús dijo[a]: «El reinado es como un pastor que tenía cien ovejas. Una de ellas, la grande[b], se extravió[c]. Él dejó las noventa y nueve[d] y buscó a la una hasta que la encontró. Después de haberse esforzado[e], dijo a la oveja[f]: “Te amo[g] más que a las noventa y nueve”»'
  revised_footnotes:
  - marker: a
    text: «Reinado» traduce ⲡⲙⲛⲧⲣⲣⲟ, un sustantivo abstracto para el reinar o la soberanía; «reino» es posible, pero sugiere más fácilmente un ámbito espacial.
    reason: lexical_alternative
  - marker: b
    text: ⲡⲛⲟϭ significa literalmente «la grande»; también puede entenderse como «la mayor».
    reason: lexical_alternative
  - marker: c
    text: ⲥⲱⲣⲙ significa «extraviarse» o «andar errante»; el contexto pastoril guía el matiz aquí.
    reason: cultural_note
  - marker: d
    text: ⲡⲥⲧⲉⲯⲓⲧ es la forma manuscrita para «las noventa y nueve», probablemente influida por formas numéricas griegas.
    reason: dialect_note
  - marker: e
    text: La cláusula «Después de haberse esforzado» refleja el copto ⲛⲧⲁⲣⲉ‑ más ϩⲓⲥⲉ, que implica esfuerzo previo antes de pronunciar estas palabras.
    reason: cultural_note
  - marker: f
    text: «A la oveja» traduce ⲡⲉⲥⲟⲟⲩ, donde el manuscrito tiene una restauración menor en esta palabra.
    reason: lacuna_or_restoration
  - marker: g
    text: ⲟⲩⲟϣⲕ puede significar «amar» o «preferir»; también sería posible «Te prefiero».
    reason: lexical_alternative
  revision_rationale: 'La traducción base es sustancialmente fiel, pero requiere una reparación editorial pequeña: corregir anclajes de notas, mejorar la nota del numeral, y ajustar ϩⲓⲥⲉ a un español que refleje mejor el esfuerzo previo. También se elimina una nota redundante sobre «pastor», porque el texto principal ya recoge la corrección auditada y no necesita sobreexplicación en nota. El resultado conserva el sentido fuente, la línea léxica del POB inglés y una lectura española más limpia.'
