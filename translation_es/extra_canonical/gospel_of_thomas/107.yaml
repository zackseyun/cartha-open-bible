  to: 'Jesús dijo[a]: «El reinado es como un pastor que tenía cien ovejas. Una de ellas, la grande[b], se extravió[c]. Él dejó las noventa y nueve[d] y buscó a la una hasta que la encontró. Después de haberse esforzado[e], dijo a la oveja[f]: “Te amo[g] más que a las noventa y nueve”»'
