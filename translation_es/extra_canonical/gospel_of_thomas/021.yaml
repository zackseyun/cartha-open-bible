review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y casi todas las decisiones del POB inglés: conserva la desnudez literal, mantiene la expansión tomasina «casa… de su reino», refleja χρεία con una nota, y respeta el cierre agrícola. Sin embargo, hay varios puntos de fidelidad mejorables: «se desnudan» en presente rompe la secuencia narrativa pasada del dicho; «perforar su casa» suena mecánico para ϣⲟϫⲧ en contexto de robo y no comunica tan bien «abrirse paso / forzar entrada»; y «Porque se hallará la ventaja que esperan» resulta opaco en español, aunque formalmente cercano al inglés. También conviene ajustar «¿A quién se parecen…?» a «¿Con quién se parecen…?» no; el español actual correcto es «¿A quién se parecen…?» así que eso está bien. La mayor necesidad es pulir legibilidad sin perder literalidad documentada.'
  spanish_quality_summary: 'El español es en general claro y digno, pero hay construcciones algo tiesas o poco idiomáticas: «se han establecido» puede simplificarse a «se han asentado»; «perforar su casa de su reino» suena torpe; «Porque se hallará la ventaja que esperan» es difícil de entender en lectura pública. También es preferible mantener consistencia verbal en pretérito dentro del discurso citado. Con retoques menores, el texto puede quedar más natural y más fiel al flujo del pasaje.'
  glossary_alignment: No hay conflictos con la terminología bíblica troncal del proyecto. Se preserva correctamente la carga temática de «se desnudaron», y «reino» debe mantenerse explícito. La nota sobre χρεία está bien orientada. No hay términos como Yahvé/Mesías/Cristo implicados aquí.
  issues:
  - severity: medium
    issue: Inconsistencia temporal en «Se desnudan»
    rationale: El relato inmediato está en pasado («lleguen… les dirán…» dentro de la escena proverbial, seguido por acciones consecuentes). El español fluye mejor y refleja mejor el evento puntual con «se desnudaron» o «se desnudarán» según la secuencia. Dado que el resto del borrador usa pasado en esta mini-escena («maduró», «vino», «lo cosechó»), «se desnudan» destaca de forma innecesaria.
  - severity: medium
    issue: «Perforar su casa» es poco idiomático para un ladrón que irrumpe
    rationale: ϣⲟϫⲧ puede ser «cavar / abrir brecha / forzar entrada». «Perforar» suena técnico en español contemporáneo y distrae. «Abrirse paso hasta su casa de su reino» o «forzar la entrada» comunica mejor el sentido de intrusión sin borrar la imagen de ruptura.
  - severity: medium
    issue: 'La cláusula sobre χρεία queda demasiado opaca: «Porque se hallará la ventaja que esperan»'
    rationale: 'Aunque «ventaja» sigue el POB inglés, la sintaxis española no deja claro qué significa la frase. Conviene una formulación ligeramente más natural, p. ej. «Porque se hallará aquello que esperan: la ventaja» sería demasiado interpretativa; mejor «Porque será hallada la ventaja[c] que esperan», que mantiene la pasiva hallada y la ambigüedad léxica con apoyo de la nota.'
  - severity: low
    issue: «se han establecido» puede sonar administrativo
    rationale: Para ϭⲟⲓⲗⲉ, «se han asentado» es más natural en español bíblico-literario sin perder el sentido de establecer residencia temporal o ajena.
