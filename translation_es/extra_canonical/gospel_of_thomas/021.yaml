base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/021.yaml
  text: 'Mary said to Jesus[strip naked], "Whom are your disciples like?"


    He said, "They are like little children who have settled in a field that is not theirs. When the owners of the field come, they will say, ''Leave our field to us.'' They strip naked before them in order to leave it to them and give their field to them.


    "Therefore I say: If the master of the house knows that the thief is coming, he will keep watch before he comes and will not let him dig into his house of his kingdom to carry away his goods.


    "But you, keep watch against the world. Gird yourselves upon your loins with great power, so that the robbers will not find a way to come to you. Because the advantage you expect will be found.


    "Let there be among you a person of understanding. When the fruit ripened, he came quickly, his sickle in his hand; he harvested it. Whoever has ears to hear[advantage][house of his kingdom], let him hear."'
  footnotes:
  - marker: strip naked
    text: Coptic ⲥⲉⲕⲁⲕⲁϩⲏⲩ. The imagery of stripping naked connects to Thomasine themes of returning to a primordial, unashamed state (cf. Saying 37).
    reason: theological_note
  - marker: house of his kingdom
    text: A unique Thomasine phrase (ⲡⲉϥⲏⲉⲓ ⲛ̄ⲧⲉⲧⲉϥ⳿ⲙⲛ̄ⲧⲉⲣⲟ), diverging from the Synoptic parallel (Matt 24:43, Luke 12:39) which simply has 'his house.'
    reason: textual_variant
  - marker: advantage
    text: Greek loanword χρεία (chreia), which can mean 'need,' 'necessity,' 'use,' or 'advantage.' The exact sense here is debated; it may refer to the necessity or advantage of being prepared.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'María dijo a Jesús: «¿A quién se parecen tus discípulos?»


    Él dijo: «Se parecen a niños pequeños que se han asentado en un campo que no es de ellos. Cuando vengan los dueños del campo, dirán: “Devuélvannos nuestro campo”. Se desnudaron[a] delante de ellos para dejárselo y entregarles su campo.


    »Por eso digo: si el dueño de la casa sabe que viene el ladrón, velará antes de que llegue y no le permitirá abrirse paso hacia su casa[b] de su reino para llevarse sus bienes.


    »Pero ustedes, velen frente al mundo. Cíñanse los lomos con gran poder, para que los ladrones no encuentren cómo llegar hasta ustedes. Porque será hallada la ventaja[c] que esperan.


    »Que haya entre ustedes una persona entendida. Cuando el fruto maduró, vino deprisa, con su hoz en la mano; lo cosechó. El que tenga oídos para oír, que oiga»'
  philosophy: formal
  footnotes:
  - marker: a
    text: El copt. ⲕⲁⲕⲁϩⲏⲩ expresa desnudez literal; el POB la conserva por su peso temático en Tomás, no como simple «desvestirse».
    reason: theological_note
  - marker: b
    text: La frase copt. «su casa de su reino» reproduce la forma tomasina documentada por el POB y no se armoniza a «su casa» como en los paralelos sinópticos.
    reason: textual_variant
  - marker: c
    text: El préstamo copt. ⲭⲣⲉⲓⲁ puede significar necesidad, utilidad o ventaja; aquí se mantiene una opción amplia para no cerrar la ambigüedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲕⲁⲕⲁϩⲏⲩ
  english_pob_choice: strip naked
  chosen_spanish: se desnudan
  alternatives_spanish:
  - se quitan la ropa
  - se despojan de sus vestidos
  lexicon: Crum 102b
  rationale: El POB inglés preserva la fuerza literal de desnudez en este dicho. En español, «se desnudan» mantiene esa imagen sin introducir una formulación demasiado moderna o explicativa. Preferí el presente narrativo por fluidez en el discurso citado, aunque el valor de acción se conserva.
- source_word: ϭⲟⲓⲗⲉ / ϭⲉⲗⲓⲧ
  english_pob_choice: settled
  chosen_spanish: se han establecido
  alternatives_spanish:
  - habitan
  - viven
  - se han quedado
  lexicon: Crum 811a
  rationale: «Se han establecido» expresa asentamiento o residencia estable, más cercano al valor de sojourning/dwelling que un simple «viven». Conserva el matiz de colocación en un lugar ajeno que exige el contexto.
- source_word: ϣⲟϫⲧ
  english_pob_choice: dig
  chosen_spanish: perforar
  alternatives_spanish:
  - excavar
  - hender
  - horadar
  lexicon: Crum 609a
  rationale: El POB inglés traduce la acción del ladrón como «dig into his house», aludiendo a entrar a la fuerza. En español, «perforar» comunica esa entrada violenta sin sugerir necesariamente una excavación agrícola; «horadar» sería posible, pero menos natural en lectura pública.
- source_word: ⲡⲉϥⲏⲉⲓ ⲛ̄ⲧⲉⲧⲉϥⲙⲛ̄ⲧⲉⲣⲟ
  english_pob_choice: house of his kingdom
  chosen_spanish: su casa de su reino
  alternatives_spanish:
  - la casa de su reino
  - su casa del reino
  lexicon: Coptic phrase / Thomasine usage
  rationale: Conservo la construcción peculiar documentada por el POB en lugar de armonizarla a «su casa». En español, «su casa de su reino» reproduce la expansión tomasina y deja visible la tensión sintáctica, evitando normalizarla a una fórmula más conocida.
- source_word: ⲭⲣⲉⲓⲁ
  english_pob_choice: advantage
  chosen_spanish: la ventaja
  alternatives_spanish:
  - la necesidad
  - la conveniencia
  - el provecho
  lexicon: BDAG χρεία
  rationale: El inglés POB mantiene la ambigüedad semántica de χρεία entre necesidad, utilidad y ventaja. «La ventaja» conserva esa posibilidad de sentido en un español claro; en nota queda la alternativa, sin forzar una interpretación única.
- source_word: ⲡⲱϩ
  english_pob_choice: ripened
  chosen_spanish: maduró
  alternatives_spanish:
  - maduró plenamente
  - estuvo sazonado
  lexicon: Crum 283a
  rationale: Aunque el POB inglés usa «ripened», en español el verbo natural para fruto es «maduró». Es una equivalencia directa y comprensible, sin perder la imagen agrícola del texto.
- source_word: ϩⲁⲥ-
  english_pob_choice: harvested
  chosen_spanish: lo cosechó
  alternatives_spanish:
  - lo segó
  - lo recogió
  lexicon: Crum 712a
  rationale: «Lo cosechó» es el equivalente español más neutral para reaping/harvesting. «Lo segó» sería más literal al ámbito de la hoz, pero «cosechó» abarca mejor el acto agrícola completo y suena natural en un registro bíblico contemporáneo.
theological_decisions:
- issue: Desnudez como imagen de despojo en Thomas
  english_pob_reading: strip naked
  chosen_spanish_reading: se desnudan
  alternative_spanish_readings:
  - se quitan la ropa
  - se despojan
  rationale: El POB preserva la desnudez literal porque el motivo tiene peso temático en Tomás y conecta con otros dichos del corpus. En español, mantener «se desnudan» evita suavizar el símbolo y conserva la tensión interpretativa entre literalidad y significado espiritual.
  doctrine_reference: Gospel of Thomas, Saying 37; thematic intertext noted in POB audit trail
- issue: 'Expansión tomasina: «casa de su reino»'
  english_pob_reading: house of his kingdom
  chosen_spanish_reading: su casa de su reino
  alternative_spanish_readings:
  - su casa
  - la casa de su reino
  rationale: Se conserva la ampliación teológica propia del testimonio coptico, que no debe normalizarse a la variante sinóptica más corta. En español, la formulación mantiene visible la rareza del giro y evita borrar el matiz de «reino» como término teológico central.
  doctrine_reference: Synoptic parallels Matt 24:43; Luke 12:39; Thomasine distinctive wording
- issue: Sentido de χρεία en la clausura
  english_pob_reading: advantage
  chosen_spanish_reading: la ventaja
  alternative_spanish_readings:
  - la necesidad
  - el provecho
  - la conveniencia
  rationale: 'El POB documenta la ambigüedad de χρεία. Elegir «ventaja» permite una lectura abierta: puede entenderse como lo necesario, lo útil o lo ventajoso de estar preparados. No se elimina la tensión semántica, solo se la expresa con un término español amplio.'
  doctrine_reference: Lexical note on Greek loanword χρεία
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión aplicada que corrigió la mala lectura de la desnudez y de la cláusula con χρεία: se traduce como desnudez literal en presencia de los dueños, se preserva el valor de «reino», y se evita la interpretación errónea de «dentro» para la expresión final. La redacción española sigue el texto coptico y el rastro de auditoría inglés, sin armonizar el dicho a los paralelos sinópticos.'
  spanish_consistency_notes:
  - Se usa «Jesús» para ⲓ︤ⲥ︥ / Ἰησοῦς.
  - Se mantiene «reino» para ⲙⲛ̄ⲧⲉⲣⲟ según la terminología POB.
  - Se conserva el registro bíblico contemporáneo con sintaxis clara y sin calcos innecesarios.
  - Se evita «SEÑOR» como sustituto automático del nombre divino; aquí no aparece YHWH, y «dueño de la casa» traduce correctamente ⲡϫⲉⲥϩⲛⲏⲉⲓ / master of the house.
