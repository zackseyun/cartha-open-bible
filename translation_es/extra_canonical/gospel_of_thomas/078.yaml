base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/078.yaml
  text: 'Jesus said[a], "What did you go out into the wilderness to see? A reed shaken by the wind? And a person in soft clothing, with garments put on him? Look: those in soft clothing are in the house of your king and your magnate[f][e][d][c][b], and they are not able to know the truth."'
  footnotes:
  - marker: a
    text: ⲡⲥⲱϣⲉ is the “desert/wilderness.” “Wilderness” is chosen; “desert” is possible.
    reason: lexical_alternative
  - marker: b
    text: ⲛϣⲧⲏⲛ describes the softness of clothing; “soft (clothing)” could also be rendered “fine” or “delicate.”
    reason: lexical_alternative
  - marker: c
    text: '“In the house of your king and your magnate”: the manuscript at NHAM02.46 lb 32 is damaged here; Dilley’s normalized text reads ⲛ ⲡⲏⲉ ⲛⲡⲉⲧⲛⲣⲣⲟ ⲙⲛ ⲡⲉⲧⲛⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ. The translation follows this, keeping the singulars.'
    reason: lacuna_or_restoration
  - marker: d
    text: “Magnate” renders Greek loanword ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ (μεγιστανός), also translatable “grandee” or “great man.”
    reason: lexical_alternative
  - marker: e
    text: The Coptic uses singular “your king … your magnate,” which is preserved here; some readers may expect plurals by analogy with canonical phrasing.
    reason: cultural_note
  - marker: f
    text: “Know the truth” could be rendered “recognize the truth”; the verb ϣⲥⲟⲟⲩⲛ has a broad semantic range (“know, understand, perceive”).
    reason: lexical_alternative
