translation:
  language: es
  text: 'Jesús dijo: «¿Qué salieron ustedes al desierto[a] a ver? ¿Una caña sacudida por el viento? ¿Y una persona con ropa suave[b], con vestiduras puestas sobre él? Miren: los que llevan ropa suave están en la casa de su rey y su magnate[f][e][d][c], y no pueden conocer la verdad[g]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto ⲡⲥⲱϣⲉ puede traducirse «desierto» o «lugar desolado»; aquí se adopta «desierto» por naturalidad en español y por su resonancia bíblica.
    reason: lexical_alternative
  - marker: b
    text: ⲛϣⲧⲏⲛ describe la suavidad de la ropa; también podría traducirse «fina» o «delicada».
    reason: lexical_alternative
  - marker: c
    text: En «en la casa de su rey y su magnate», el manuscrito está dañado en este tramo; la traducción sigue la normalización editada por Dilley y conserva los singulares.
    reason: lacuna_or_restoration
  - marker: d
    text: «Magnate» traduce el préstamo griego ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ (μεγιστανός), que también puede verterse como «gran señor» o «gran hombre».
    reason: lexical_alternative
  - marker: e
    text: El copto usa los singulares «su rey» y «su magnate»; se conservan aquí, aunque algunos lectores podrían esperar plurales por analogía con formulaciones canónicas.
    reason: cultural_note
  - marker: f
    text: La frase puede sonar más natural en español con el posesivo repetido («su rey y su magnate»); aquí se mantiene una formulación cercana al original sin perder naturalidad.
    reason: spanish_style_note
  - marker: g
    text: 'ϣⲥⲟⲟⲩⲛ tiene un campo semántico amplio: «conocer», «entender» o «reconocer»; aquí se prefiere «conocer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲧⲃⲉⲟⲩ
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - por qué
  lexicon: Layton, Coptic Grammar (interrogative ⲉⲧⲃⲉⲟⲩ + clause)
  rationale: La construcción pide el objeto de la salida para ver, no la causa; por eso «qué» conserva el sentido interrogativo directo.
- source_word: ⲁⲛⲧⲱⲧⲛⲉⲓ ⲉⲃⲟⲗ
  english_pob_choice: did you go out
  chosen_spanish: saliste[n]
  alternatives_spanish:
  - salieron
  - salieron ustedes
  lexicon: Layton, Coptic Grammar (segunda persona plural con verbo de movimiento)
  rationale: 'El sentido retórico es de pasado: «saliste[n]». Se deja la marca [n] para señalar la posible ambigüedad de persona en español respecto del plural implícito del original.'
- source_word: ⲡⲥⲱϣⲉ
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - wilderness
  - campo abierto
  lexicon: Crum, s.v. ⲥⲱϣⲉ
  rationale: Aunque el inglés POB prefirió «wilderness», en español «desierto» comunica mejor el trasfondo bíblico y sigue siendo una equivalencia legítima del término coptico.
- source_word: ⲟⲩⲕⲁϣ
  english_pob_choice: a reed
  chosen_spanish: una caña
  alternatives_spanish:
  - un junco
  - un tallo
  lexicon: Crum, s.v. ⲕⲁϣ
  rationale: «Caña» es el equivalente natural y transparente en español para la imagen proverbial del junco/caña movida por el viento.
- source_word: ⲕⲓⲙ
  english_pob_choice: shaken
  chosen_spanish: sacudida
  alternatives_spanish:
  - movida
  - zarandeada
  lexicon: Crum, s.v. ⲕⲓⲙ
  rationale: «Sacudida» conserva la fuerza pasiva del movimiento provocado por el viento.
- source_word: ϩⲓⲧⲛⲡⲧⲏⲩ
  english_pob_choice: by the wind
  chosen_spanish: por el viento
  alternatives_spanish:
  - por el aire
  - a causa del viento
  lexicon: Crum, s.v. ⲧⲏⲩ
  rationale: La preposición instrumental se expresa de manera natural con «por»; «viento» mantiene la imagen directa del original.
- source_word: ⲟⲩⲣⲱⲙⲉ
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - un hombre
  - alguien
  lexicon: Crum, s.v. ⲣⲱⲙⲉ
  rationale: Aunque el sustantivo es gramaticalmente masculino, el contexto es genérico; «persona» evita restringir indebidamente el referente.
- source_word: ⲛϣⲧⲏⲛ
  english_pob_choice: soft (clothing)
  chosen_spanish: ropa suave
  alternatives_spanish:
  - ropa fina
  - vestiduras delicadas
  lexicon: Crum, s.v. ϣⲧⲏⲛ
  rationale: «Ropa suave» preserva la extrañeza semántica del original y la decisión del POB de no suavizar la referencia a prendas blandas/finitas/delicadas.
- source_word: ⲛⲧⲟⲟⲩ ⲉⲩϭⲏⲛ ϩⲓⲱⲱⲃ
  english_pob_choice: with garments put on him
  chosen_spanish: con vestiduras puestas sobre él
  alternatives_spanish:
  - vestido con vestiduras
  - con prendas sobre él
  lexicon: Crum, s.v. ϭⲛⲟⲛ; Crum, s.v. ⲧⲟⲟⲩ
  rationale: La frase conserva la construcción concreta y algo perifrástica del copto, sin reducirla a un simple «vestido».
- source_word: ⲛ ⲡⲏⲉ
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el hogar
  - en la casa de
  lexicon: Crum, s.v. ⲏⲉ
  rationale: «En la casa» es la equivalencia directa y sobria del locativo copto.
- source_word: ⲡⲉⲧⲛⲣⲣⲟ
  english_pob_choice: your king
  chosen_spanish: su rey
  alternatives_spanish:
  - su rey de ustedes
  - vuestro rey
  lexicon: Crum, s.v. ⲣⲣⲟ
  rationale: Se mantiene el sentido posesivo de segunda plural sin forzar el español con un giro excesivamente marcado; «su» puede abarcar el plural contextual.
- source_word: ⲡⲉⲧⲛⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ
  english_pob_choice: your magnate
  chosen_spanish: su magnate
  alternatives_spanish:
  - su gran señor
  - su grande
  lexicon: Crum, s.v. ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ (from Gk μεγιστανός)
  rationale: «Magnate» reproduce con concisión el título de alto rango del préstamo griego, tal como en el POB inglés.
- source_word: ⲛⲁⲓ
  english_pob_choice: those
  chosen_spanish: los que
  alternatives_spanish:
  - aquellos
  - éstos
  lexicon: Crum, s.v. ⲛⲁⲓ
  rationale: En español, dentro de la relativa, «los que» suena más natural que un demostrativo desnudo.
- source_word: ⲉⲡϣⲧⲏⲛ
  english_pob_choice: in soft clothing
  chosen_spanish: ropa suave
  alternatives_spanish:
  - vestiduras suaves
  - ropa fina
  lexicon: Crum, s.v. ϣⲧⲏⲛ
  rationale: Se unifica la expresión para mantener la misma imagen léxica en ambas apariciones.
- source_word: ϣⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - reconocer
  - entender
  lexicon: Crum, s.v. ϣⲥⲟⲟⲩⲛ
  rationale: «Conocer» funciona bien con «la verdad» y conserva el sentido amplio de conocimiento/percepción que el POB preserva.
- source_word: ⲙⲉ
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: Crum, s.v. ⲙⲉ
  rationale: El artículo definido mantiene la concreción del copto y la formulación del texto inglés.
theological_decisions:
- issue: Tratamiento de la voz atribuida a Jesús en un dicho no canónico
  english_pob_reading: Jesus said
  chosen_spanish_reading: Jesús dijo
  alternative_spanish_readings:
  - Jesús expresó
  - Jesús afirmó
  rationale: Se mantiene la simple fórmula narrativa del logion sin añadir solemnización ni interpretación doctrinal.
  doctrine_reference: Cristología narrativa básica; fidelidad formal al encabezado del dicho.
- issue: Relación entre «wilderness» y «desierto»
  english_pob_reading: wilderness
  chosen_spanish_reading: desierto
  alternative_spanish_readings:
  - desierto yermo
  - lugar despoblado
  rationale: La imagen remite al espacio de retiro y prueba; en español bíblico «desierto» es la forma más natural y no altera el sentido del original.
  doctrine_reference: Topografía bíblica y lenguaje proverbial.
- issue: Singular/plural posesivo en «your king … your magnate»
  english_pob_reading: your king and your magnate
  chosen_spanish_reading: su rey y de su magnate
  alternative_spanish_readings:
  - su rey y su magnate
  - el rey de ustedes y el magnate de ustedes
  rationale: El copto conserva singulares; en español se evita una sobrecarga de segunda persona plural que distraería del punto retórico del dicho. La nota textual explica la tensión.
  doctrine_reference: Crítica textual y sensibilidad al número gramatical.
- issue: «Know the truth» como conocimiento o reconocimiento
  english_pob_reading: know the truth
  chosen_spanish_reading: conocer la verdad
  alternative_spanish_readings:
  - reconocer la verdad
  - entender la verdad
  rationale: «Conocer» mantiene la amplitud semántica de ϣⲥⲟⲟⲩⲛ sin reducirlo a mera cognición abstracta ni convertirlo en una tesis epistemológica.
  doctrine_reference: Epistemología bíblica del conocer/percibir.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente que eliminó la repetición innecesaria de «to see» antes de «a person». La versión española conserva esa economía sintáctica y sigue la secuencia corregida: una pregunta sobre la caña, luego otra sobre la persona vestida con ropa suave.'
  spanish_consistency_notes:
  - Se usa «Jesús» de forma consistente para el nombre propio.
  - Se conserva la imagen de «ropa suave» en ambas apariciones para reflejar la repetición léxica del original.
  - Se evita «SEÑOR» u այլ máscara litúrgica; no aplica al texto dado.
  - «Magnate» se mantiene como préstamo semántico alto, coherente con el audit trail inglés.
  - La puntuación imita el tono de dicho breve y interrogativo, con «Miren» para el equivalente discursivo de «Look:».
