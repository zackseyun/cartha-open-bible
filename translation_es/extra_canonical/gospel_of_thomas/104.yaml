base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/104.yaml
  text: They said to Jesus[a], “Come, let us pray today, and let us fast.” Jesus said, “For what is the sin that I have committed, or in what have I been overcome? But when the bridegroom goes out from the bridal chamber, then let them fast[f][e][d][c][b], and let them pray.”
  footnotes:
  - marker: a
    text: ⲟⲩ ⲡⲉ + noun here is interrogative (“what is…?”), hence “For what is the sin…?” rather than an assertion.
    reason: dialect_note
  - marker: b
    text: 'ϫⲣⲟ can mean “press, constrain, oppress, overpower.” The impersonal 3pl construction yields a passive sense: “in what have I been compelled/overpowered?”'
    reason: lexical_alternative
  - marker: c
    text: ⲛⲡϩⲟⲟⲩ literally “the day,” idiomatic for “today.”
    reason: dialect_note
  - marker: d
    text: ⲙⲁⲣⲟⲩ- is the 3rd plural jussive (“let them…”); Dilley’s normalized ⲙⲁⲣⲉⲛⲧⲟⲟⲩ- reflects subject morphology. The sense is cohortative, not simple future.
    reason: dialect_note
  - marker: e
    text: Both ⲡⲛⲩⲙⲫⲓⲟⲥ (bridegroom) and ⲡⲛⲩⲙⲫⲱⲛ (bridal chamber) are Greek loans, preserving wedding-imagery familiar in early Christian sayings.
    reason: cultural_note
  - marker: f
    text: Or 'or in what have I been compelled?'.
    reason: previous_rendering
