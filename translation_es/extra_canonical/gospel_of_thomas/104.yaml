translation:
  language: es
  text: 'Ellos dijeron a Jesús[a]: “Ven, oremos hoy[c] y ayunemos”. Jesús dijo: “¿Cuál es el pecado que he cometido, o en qué he sido vencido[b]? Pero cuando el novio[e] salga[f] del cuarto nupcial[e], entonces que ayunen[d], y que oren[d]”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma interrogativa no afirma «¿qué pecado?», sino «¿cuál es el pecado…?»; la pregunta es retórica y presupone que no hay pecado ni derrota por parte de Jesús.
    reason: source_note
  - marker: b
    text: 'El copto admite un matiz más fuerte que «vencido»: también puede sugerir «derrotado» o «sobrepasado»; se prefirió «vencido» por ser más natural en español y por mantener la fuerza moral del dicho.'
    reason: lexical_alternative
  - marker: c
    text: La expresión equivalente a «el día» funciona idiomáticamente como «hoy».
    reason: spanish_style_note
  - marker: d
    text: 'La forma jussiva tiene valor exhortativo/cohortativo: «que ayunen» y «que oren», no un simple futuro.'
    reason: source_note
  - marker: e
    text: Los dos términos son préstamos griegos que conservan la imaginería nupcial del dicho; «novio» y «cuarto nupcial» buscan claridad en español sin borrar esa imagen.
    reason: cultural_note
  - marker: f
    text: También puede traducirse «cuando el novio salga del cuarto nupcial»; se mantuvo «salga» para reflejar la subordinada temporal del original.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲁⲙⲟⲩ
  english_pob_choice: come
  chosen_spanish: Ven
  alternatives_spanish:
  - Ven aquí
  - Vamos
  lexicon: Crum; Layton
  rationale: La invitación breve y directa del coptico se conserva mejor con «Ven»; en español suena natural y mantiene el tono exhortativo del dicho.
- source_word: ϣⲗⲏⲗ
  english_pob_choice: pray
  chosen_spanish: oremos / oren
  alternatives_spanish:
  - hagamos oración
  - recemos
  lexicon: Crum; Layton
  rationale: «Orar» es el equivalente más directo y digno en español contemporáneo; el plural exhortativo se refleja con «oremos» y «oren».
- source_word: ⲛⲡϩⲟⲟⲩ
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: Layton (syntax)
  rationale: El valor idiomático temporal de la expresión se traduce naturalmente como «hoy» sin perder el sentido original de «el día».
- source_word: ⲛⲏⲥⲧⲉⲩⲉ
  english_pob_choice: fast
  chosen_spanish: ayunemos / ayunen
  alternatives_spanish:
  - abstengámonos de comer
  - practiquemos ayuno
  lexicon: Crum (loan), Lambdin
  rationale: «Ayunar» es el equivalente establecido en español para el préstamo griego y preserva la concisión del texto.
- source_word: ⲡⲛⲟⲃⲉ
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - falta
  lexicon: Crum
  rationale: En una pregunta retórica de tono moral, «pecado» comunica con claridad el alcance ético del término y su fuerza en el argumento de Jesús.
- source_word: ⲟⲩ ⲡⲉ (interrogative)
  english_pob_choice: what is
  chosen_spanish: ¿Cuál es…?
  alternatives_spanish:
  - ¿Qué es…?
  - ¿Cuál, pues, es…?
  lexicon: Lambdin (grammar)
  rationale: La construcción interrogativa predicativa requiere una pregunta real, no una afirmación; «¿Cuál es…?» reproduce mejor la estructura y el énfasis.
- source_word: ⲉⲧⲉⲣⲉⲁⲁⲛⲟⲕ ⲉⲓⲣⲉ ⲛⲧⲟϥ
  english_pob_choice: that I have committed (it)
  chosen_spanish: que he cometido
  alternatives_spanish:
  - que he hecho
  - que he realizado
  lexicon: Layton (relative clauses)
  rationale: Dado que el objeto es un «pecado», «cometer» transmite mejor la fuerza moral del verbo que un simple «hacer».
- source_word: ϫⲣⲟ (with ⲉⲣⲟⲓ / ⲉⲁⲛⲟⲕ)
  english_pob_choice: overcome
  chosen_spanish: vencido
  alternatives_spanish:
  - derrotado
  - vencido por algo
  - oprimido
  lexicon: Crum 785a
  rationale: La revisión del inglés POB favorece «overcome» como «vencido»; en español, «ser vencido» conserva la fuerza moral y espiritual del verbo en este contexto.
- source_word: ϩⲛ ⲟⲩ (elliptic)
  english_pob_choice: in what
  chosen_spanish: en qué
  alternatives_spanish:
  - por qué
  - en qué cosa
  lexicon: Layton (syntax)
  rationale: La preposición con interrogativo indefinido se expresa de forma natural como «en qué», manteniendo la amplitud de la pregunta sin explicitarla de más.
- source_word: ⲁⲗⲗⲁ
  english_pob_choice: but
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: Loan from Greek
  rationale: «Pero» es la conjunción adversativa más directa y fluida en español para introducir el contraste del dicho.
- source_word: ⲡⲛⲩⲙⲫⲓⲟⲥ
  english_pob_choice: bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: Crum (Greek loan)
  rationale: Aunque «novio» es menos litúrgico que «esposo», aquí comunica con claridad la imagen nupcial del texto y su naturalidad en español.
- source_word: ⲡⲛⲩⲙⲫⲱⲛ
  english_pob_choice: bridal chamber
  chosen_spanish: cuarto nupcial
  alternatives_spanish:
  - cámara nupcial
  - aposento nupcial
  lexicon: Crum (Greek loan)
  rationale: «Cuarto nupcial» es comprensible para lectores amplios y conserva la imagen de la habitación de bodas sin sonar excesivamente arcaico.
- source_word: ⲉⲓ ⲉⲃⲟⲗ ϩⲛ…
  english_pob_choice: goes out from
  chosen_spanish: salga de
  alternatives_spanish:
  - salga fuera de
  - salga del
  lexicon: Crum; Lambdin
  rationale: En español, el movimiento de salida se expresa de modo natural con «salga de», que mantiene la concreción del verbo sin sobrecargar la frase.
- source_word: ⲙⲁⲣⲟⲩ- (3pl jussive)
  english_pob_choice: let them…
  chosen_spanish: que ayunen, y que oren
  alternatives_spanish:
  - que ayunen y oren
  - dejen que ayunen y que oren
  lexicon: Layton (verbal auxiliaries)
  rationale: El valor cohortativo/jusivo de la forma se expresa bien con «que…», preservando la exhortación sin convertirla en futuro descriptivo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que corrigió el matiz de ϫⲣⲟ desde «compel» a «overcome». La redacción española sigue esa decisión con «ser vencido», evitando una lectura causal impropia del contexto.
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y bíblico sin caer en arcaísmos innecesarios.
  - «Jesús» se conserva como forma estable para Ἰησοῦς.
  - «Ayunar» y «orar» se usan como equivalentes directos y transparentes, coherentes con la terminología POB.
  - Se evitó traducir el marco nupcial con lenguaje eclesiástico tradicional no requerido por la fuente.
