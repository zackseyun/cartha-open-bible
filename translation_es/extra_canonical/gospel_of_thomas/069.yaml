translation:
  language: es
  text: 'Jesús dijo[a]: “Bienaventurados los que han sido perseguidos en su corazón; esos son los que verdaderamente han conocido al Padre. Bienaventurados los que han pasado hambre[b][c], para que el vientre del que desea[c] sea llenado”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La ambigüedad de ''en su corazón'' se conserva deliberadamente: el copt o permite entender que la persecución ocurre en el corazón de los perseguidores o en el interior del corazón de los perseguidos.'
    reason: theological_note
  - marker: b
    text: La forma copta es plural; se traduce con sujeto plural en español para mantener la concordancia con el manuscrito.
    reason: textual_variant
  - marker: c
    text: '''Han pasado hambre'' conserva el valor concreto de ϩⲕⲟ y, en español, puede funcionar como equivalente perfectivo de la bienaventuranza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: Crum; loan griego makarios
  rationale: Conserva la fórmula de bienaventuranza y el tono solemne; 'felices' suena demasiado coloquial y 'dichosos' puede sonar menos marcado en este contexto.
- source_word: ⲇⲓⲱⲕⲉ
  english_pob_choice: persecuted
  chosen_spanish: perseguidos
  alternatives_spanish:
  - acosados
  - hostigados
  lexicon: Crum; préstamo griego diōkō
  rationale: '''Perseguidos'' reproduce la hostilidad activa del término mejor que opciones más suaves como ''acosados''.'
- source_word: ϩⲣⲁⲓ ϩⲛⲡⲉⲩϩⲏⲧ
  english_pob_choice: in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de su corazón
  - en el interior de su corazón
  lexicon: Crum (ϩⲏⲧ 'corazón')
  rationale: 'La frase española mantiene la ambigüedad del copt o: puede referirse al corazón de los perseguidores o al interior de los perseguidos, sin resolverla artificialmente.'
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ ⲥⲟⲟⲩⲛ ⲡⲉⲓⲱⲧ ϩⲛⲟⲩⲙⲉ
  english_pob_choice: who have truly known the Father
  chosen_spanish: los que verdaderamente han conocido al Padre
  alternatives_spanish:
  - los que han conocido al Padre en verdad
  - los que realmente conocieron al Padre
  lexicon: Crum (ⲥⲟⲟⲩⲛ 'conocer'; ⲡⲉⲓⲱⲧ 'padre')
  rationale: '''Verdaderamente'' expresa el valor adverbial de ϩⲛⲟⲩⲙⲉ sin perder fluidez; ''han conocido'' mantiene el aspecto perfectivo del perfecto copto mejor que un pretérito simple.'
- source_word: ϩⲕⲟ / ⲛⲉⲧϩⲕⲁⲉⲓⲧ
  english_pob_choice: have gone hungry
  chosen_spanish: han pasado hambre
  alternatives_spanish:
  - han tenido hambre
  - han quedado hambrientos
  lexicon: Crum (ϩⲕⲟ 'tener hambre, estar hambriento')
  rationale: En español, 'pasar hambre' conserva la vivencia concreta y puede funcionar de manera perfectiva, como la lectura elegida en el registro inglés; evita una formulación demasiado técnica o estática.
- source_word: ϩⲓⲛⲁ
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: Layton; partícula de propósito
  rationale: '''Para que'' transmite bien la relación de finalidad y es idiomática en español contemporáneo.'
- source_word: ⲡϩⲏ
  english_pob_choice: belly
  chosen_spanish: vientre
  alternatives_spanish:
  - estómago
  - barriga
  lexicon: Crum (ϩⲏ 'belly, abdomen, stomach')
  rationale: '''Vientre'' conserva el registro concreto y algo arcaizante del cuerpo interior; suena más digno que ''barriga'' y más amplio que ''estómago''.'
- source_word: ⲟⲩⲱϣ
  english_pob_choice: desires
  chosen_spanish: desea
  alternatives_spanish:
  - anhela
  - quiere
  lexicon: Crum (ⲟⲩⲱϣ 'wish, desire')
  rationale: El participio nominal en español se expresa con naturalidad como 'el que desea'; mantiene la fuerza interna del deseo sin añadir interpretación.
- source_word: ⲥⲓⲟ
  english_pob_choice: be filled
  chosen_spanish: sea llenado
  alternatives_spanish:
  - sea saciado
  - quede lleno
  lexicon: Crum (ⲥⲓⲟ 'be satisfied, be full')
  rationale: '''Sea llenado'' preserva la imagen concreta de llenura vinculada al vientre, sin desplazarla hacia una abstracción como ''saciado''.'
theological_decisions:
- issue: Ambigüedad de 'en su corazón' respecto de quién sufre la persecución
  english_pob_reading: The Coptic allows either the persecutors' hearts or the inner heart of the persecuted, so the translation keeps 'their' ambiguous.
  chosen_spanish_reading: La traducción mantiene 'en su corazón' sin precisar el referente.
  alternative_spanish_readings:
  - en el corazón de ellos
  - en el corazón de los perseguidos
  rationale: El español permite conservar la misma ambigüedad que documenta el audit trail; resolverla eliminaría una tensión real del texto fuente.
  doctrine_reference: Principio de transparencia textual; no se fuerza una aclaración no exigida por la fuente.
- issue: Pluralidad del sujeto en las bienaventuranzas
  english_pob_reading: The manuscript consistently uses plural forms; the translation follows the manuscript's plurals.
  chosen_spanish_reading: Bienaventurados los que... esos son... Bienaventurados los que...
  alternative_spanish_readings:
  - Bienaventurado el que... ese es...
  - Bienaventurados los que... éstos son...
  rationale: El español debe reflejar la concordancia plural del copto; el singular introduciría una discordancia sintáctica y textual.
  doctrine_reference: Fidelidad gramatical al testimonio manuscrito.
- issue: '''Father'' como título divino'
  english_pob_reading: The Father refers to God in Thomas; capitalization reflects usage without adding interpretive gloss.
  chosen_spanish_reading: el Padre
  alternative_spanish_readings:
  - el padre
  - Dios Padre
  rationale: La mayúscula conserva el valor titulado/documentado por el original y por la auditoría inglesa, sin explicitar más de lo que la frase ofrece.
  doctrine_reference: Uso titular reverencial de lenguaje divino.
translation_notes:
  revision_awareness: 'Se siguió la revisión final del audit trail que corrige la oscilación singular/plural y la lectura de hambre: la forma plural se mantuvo en toda la bienaventuranza, y la imagen final se expresó con una construcción perfectiva natural en español (''han pasado hambre''). También se preservó la ambigüedad de ''en su corazón'' y el valor concreto de ''vientre''.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el texto no contiene κύριος; se mantiene 'Jesús' como nombre propio.
  - Se usó 'Bienaventurados' para mantener la fórmula de beatitud y no banalizar makarios.
  - Se prefirió 'el Padre' con mayúscula por el valor titular documentado en la auditoría inglesa.
  - '''Vientre'' se eligió por su concreción, en paralelo con el registro corporal del texto fuente.'
  - La puntuación y concordancia siguen el español bíblico contemporáneo sin arcaísmos innecesarios.
