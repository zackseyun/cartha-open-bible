base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/069.yaml
  text: Jesus said[1], “Blessed are those who have been persecuted in their heart; those are the ones who have truly known the Father. Blessed are those who have gone hungry[a][3][2], so that the belly of the one who desires will be filled.”
  footnotes:
  - marker: '1'
    text: The doubled 3pl pronouns around ‘persecute’ yield a passive sense (‘the one whom they have persecuted’). The phrase ‘in their heart’ could refer to the persecutors’ hearts or to the inner heart of the persecuted; the Coptic allows either, so the translation keeps ‘their’ ambiguous.
    reason: dialect_note
  - marker: '2'
    text: MS reads plural relative ⲛⲉⲧⲙ̄ⲙⲁⲩ (‘those who are there’), normalized by Dilley to singular ⲡⲉⲧⲉⲣⲉⲙⲙⲁⲩ. The translation uses ‘these are’ to reflect the plural sense.
    reason: textual_variant
  - marker: '3'
    text: ‘Belly’ (ⲡϩⲏ) is concrete and earthy; alternatives ‘stomach’ or ‘gut’ are possible. The verb ⲥⲓⲟ can mean ‘be satisfied, be filled’; ‘be filled’ is chosen to keep the concrete image with ‘belly.’
    reason: lexical_alternative
  - marker: a
    text: Or 'Blessed is the one whom they have persecuted in their heart; these are the ones who have truly known the Father. Blessed is the one who has gone hungry'.
    reason: previous_rendering
