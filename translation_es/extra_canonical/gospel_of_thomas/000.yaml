base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/000.yaml
  text: These are the hidden sayings which the living Jesus spoke[4][3][2][1], and Didymos Judas Thomas wrote them.
  footnotes:
  - marker: '1'
    text: ϩⲏⲡ may be rendered “hidden” or “secret.” “Hidden” is chosen to preserve the Coptic sense of concealment without importing later esoteric connotations.
    reason: lexical_alternative
  - marker: '2'
    text: Didymos is a Greek loan meaning “Twin.” The full designation “Didymos Judas Thomas” likely apposes Greek and Semitic forms of “Twin.”
    reason: cultural_note
  - marker: '3'
    text: The particle ⲛϭⲓ can function to identify an agent after a verb; here it is rendered “by” rather than “namely,” to reflect agency in English.
    reason: dialect_note
  - marker: '4'
    text: The printed line shows ⲧⲟⲛϩ for ⲱⲛϩ. This is an orthographic/dialectal variation; meaning is “living/being alive.”
    reason: textual_variant
