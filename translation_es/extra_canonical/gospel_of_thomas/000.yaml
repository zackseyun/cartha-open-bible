translation:
  language: es
  text: Estas son las palabras escondidas[a] que dijo Jesús el Viviente, y las escribió Didymo[b] Judas Tomás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Escondidas» traduce el valor de ϩⲏⲡ sin imponer la carga de «secreto» como categoría esotérica.
    reason: lexical_alternative
  - marker: b
    text: Didymos es un préstamo griego que significa «Gemelo». El nombre completo «Didymo Judas Tomás» conserva la yuxtaposición de formas griega y semítica del mismo apodo.
    reason: cultural_note
lexical_decisions:
- source_word: ⲛ̄ϣⲁϫⲉ
  english_pob_choice: sayings
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - enseñanzas
  lexicon: Crum, s.v. ϣⲁϫⲉ
  rationale: El texto coptó plural introduce una colección breve de unidades verbales. En español, «palabras» comunica de forma natural el carácter conciso del incipit sin sobreinterpretar el género como «enseñanzas».
- source_word: ϩⲏⲡ
  english_pob_choice: hidden
  chosen_spanish: escondidas
  alternatives_spanish:
  - ocultas
  - secretas
  lexicon: Crum, s.v. ϩⲏⲡ
  rationale: «Escondidas» conserva la idea de ocultamiento y evita cargar el término con matices esotéricos. La POB en inglés eligió «hidden» por esa misma razón; en español, «escondidas» es la forma más natural y fiel.
- source_word: ⲉⲧⲟⲛϩ / ⲱⲛϩ
  english_pob_choice: living
  chosen_spanish: el Viviente
  alternatives_spanish:
  - el que vive
  - vivo
  lexicon: Crum, s.v. ⲟⲛϩ
  rationale: El participio atributivo aplicado a Jesús puede leerse como un epíteto. «El Viviente» preserva el tono titular y evita una frase más explicativa que perdería la tersura del incipit.
- source_word: ϫⲟⲟⲩ / ϫⲱⲛⲧⲟⲟⲩ
  english_pob_choice: spoke them
  chosen_spanish: dijo
  alternatives_spanish:
  - los dijo
  - los pronunció
  - los habló
  lexicon: Lambdin, §75; Crum, s.v. ϫⲱ
  rationale: Aunque el objeto está expresado en coptó, en español «dijo» resulta la forma más idiomática para introducir dichos. «Los dijo» sería demasiado duro; «dijo» mantiene la concisión del original.
- source_word: ⲥϩⲁⲓ
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - los escribió
  - los puso por escrito
  lexicon: Crum, s.v. ⲥϩⲁⲓ
  rationale: «Escribió» fluye mejor en español de apertura manuscrita y conserva la acción simple del verbo. El objeto pronominal «las» vincula el verbo con «palabras».
- source_word: ⲛϭⲓ
  english_pob_choice: by
  chosen_spanish: Didymo
  alternatives_spanish:
  - por Didymo
  - a cargo de Didymo
  lexicon: Layton, Coptic Grammar (agent/identifying particle); Crum, s.v. ⲛϭⲓ
  rationale: 'La partícula marca al agente identificado después del verbo. En español, el sujeto explícito pospuesto se integra mejor sin forzar una pasiva: «las escribió Didymo Judas Tomás».'
- source_word: ⲇⲓⲇⲩⲙⲟⲥ
  english_pob_choice: Didymos
  chosen_spanish: Didymo
  alternatives_spanish:
  - Didimos
  - el Doble
  lexicon: Crum, s.v. ⲇⲓⲇⲩⲙⲟⲥ (from Gk δίδυμος)
  rationale: 'Se conserva el préstamo griego como nombre propio, pero adaptado a la ortografía española habitual de nombres grecolatinos. La nota aclara el sentido de «Gemelo/Triple»: no se traduce en el texto porque el manuscrito lo presenta como designación nominal.'
- source_word: ⲓⲟⲩⲇⲁⲥ
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: Crum, s.v. ⲓⲟⲩⲇⲁⲥ
  rationale: La forma manuscrita corresponde al nombre griego/nominalizado «Judas», no a «Judá». Mantenerlo así evita una semitización no sustentada por el coptó.
- source_word: ⲑⲱⲙⲁⲥ
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  alternatives_spanish:
  - Tomás el Gemelo
  lexicon: Crum, s.v. ⲑⲱⲙⲁⲥ
  rationale: «Tomás» es la forma española estable del nombre. La duplicación onomástica del conjunto «Didymo Judas Tomás» queda visible sin añadir glosa intratextual.
- source_word: ⲛⲁⲉⲓ ⲛⲉ
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estos son
  lexicon: Lambdin, §23 (demonstratives)
  rationale: El demostrativo plural femenino concuerda con «palabras» y da en español una apertura clara y natural para una lista o colección de logia.
translation_notes:
  revision_awareness: Se siguió el pasaje tal como está atestiguado en el coptó sahídico, incluyendo la variación ortográfica ⲧⲟⲛϩ/ⲱⲛϩ reflejada en el sentido «viviente»; no hubo revisiones aplicadas en el paquete de auditoría, y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero aquí no aparece el nombre divino.
  - Se evita «Cristo» porque el texto no usa Χριστός ni un equivalente funcional en este incipit.
  - «Tomás» y «Judas» siguen las formas españolas estándar de los nombres propios; «Didymo» conserva el préstamo del manuscrito con adaptación gráfica mínima.
  - La estructura española intenta conservar la tersura sentenciosa del original sin convertirlo en una paráfrasis devocional.
