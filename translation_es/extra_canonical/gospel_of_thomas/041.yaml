base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/041.yaml
  text: Jesus said[a], “Whoever has something in his hand, they will give to him; and whoever does not have[f][e][d][c][b], they will take even the little that he has from him.”
  footnotes:
  - marker: a
    text: The Coptic possessive construction ⲟⲩⲛⲧⲁ- with object pronoun (here ⲧⲟϥ ‘it’) can be expletive, effectively meaning ‘to have (something).’ Hence ‘something’ is supplied for clarity.
    reason: lexical_alternative
  - marker: b
    text: The 3rd plural verbs (‘they will give/take’) function impersonally in Sahidic, roughly equivalent to English ‘it will be given/taken.’ The translation keeps the impersonal ‘they’ to reflect the Coptic.
    reason: dialect_note
  - marker: c
    text: ⲡⲕⲉϣⲏⲙ literally ‘the little (one/thing),’ a substantivized adjective; it can mean a small amount or ‘the few.’ The rendering ‘the little’ preserves the deliberate terseness.
    reason: lexical_alternative
  - marker: d
    text: Diplomatic transcription has ⲛ̄ⲧⲟⲟⲧϥ̄ ‘from him’; the normalized line shows ⲛⲧⲛⲛⲧⲟϥ. This draft follows the straightforward prepositional phrase ‘from him.’
    reason: textual_variant
  - marker: e
    text: For comparison see Mark 4:25; Matt 13:12; Luke 8:18; 19:26, which share the aphorism in passive voice and without ‘in his hand.’
    reason: cross_reference
  - marker: f
    text: Or 'the little that he has will be taken away from him.'.
    reason: previous_rendering
