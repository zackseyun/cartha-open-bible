translation:
  language: es
  text: 'Jesús dijo[a]: «Quien tenga algo en su mano, se lo darán; y a quien no tenga[b], le quitarán aun[c] lo poco[d] que tiene de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El coptico usa una construcción posesiva con valor expletivo; por eso se traduce de forma natural como «quien tenga algo».
    reason: lexical_alternative
  - marker: b
    text: La forma verbal de tercera plural funciona de manera impersonal en sahídico; el español la vierte aquí con una construcción impersonal idiomática.
    reason: source_note
  - marker: c
    text: La partícula ⲕⲉ- añade el matiz de «aún/e incluso», que se conserva con «aun».
    reason: lexical_alternative
  - marker: d
    text: ⲡⲕⲉϣⲏⲙ puede significar literalmente «lo pequeño / lo poco»; se conserva la tersa ambigüedad con «lo poco».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús habló
  lexicon: Crum; Lambdin
  rationale: El verbo narrativo corresponde naturalmente a «dijo»; conserva la concisión del dicho y el estilo sobrio de Thomas.
- source_word: ⲡⲉⲧⲉⲣⲉⲟⲩⲛⲧⲁⲛⲧⲟϥ
  english_pob_choice: whoever has something
  chosen_spanish: quien tenga algo
  alternatives_spanish:
  - el que posee algo
  - quien tiene algo
  lexicon: Layton; Crum
  rationale: 'La construcción relativa con posesión funciona como una generalización: en español, «quien tenga algo» comunica mejor el valor indefinido y la fuerza sentenciosa que una forma demasiado literal.'
- source_word: ϩⲛⲡⲉϥϭⲓϫ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su palma
  lexicon: Crum s.v. ϭⲓϫ
  rationale: «Mano» es la equivalencia directa y natural en español; mantiene la imagen corporal concreta del original.
- source_word: ⲛⲧⲟⲟⲩⲛⲁϯ
  english_pob_choice: they will give
  chosen_spanish: se lo darán
  alternatives_spanish:
  - ellos se lo darán
  - será dado
  lexicon: Layton; Lambdin
  rationale: Aunque el coptico usa una forma impersonal en tercera plural, el español idiomático suele evitar ese calco. «Se lo darán» conserva el valor impersonal sin perder claridad ni sonar forzado.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲛⲧⲁⲛⲧⲟϥ
  english_pob_choice: whoever does not have
  chosen_spanish: a quien no tenga
  alternatives_spanish:
  - quien no tenga nada
  - el que carezca
  lexicon: Layton on negative relative forms
  rationale: La negación de la posesión se expresa bien con una relativa abierta en español. Se omite «nada» porque el contexto ya contrasta con «algo» y el original no lo explicita aquí.
- source_word: ⲛⲧⲟⲟⲩⲛⲁϥⲓϥ
  english_pob_choice: they will take it
  chosen_spanish: le quitarán
  alternatives_spanish:
  - se lo quitarán
  - se lo tomarán
  lexicon: Crum s.v. ϥⲓ
  rationale: «Quitar» transmite mejor la idea de arrebatar lo poseído que «tomar» en español. La forma dativa «le» mantiene la relación con la persona afectada y evita una lectura demasiado literal del objeto pronominal.
- source_word: ⲡⲕⲉϣⲏⲙ
  english_pob_choice: the little
  chosen_spanish: aun lo poco
  alternatives_spanish:
  - hasta lo poco
  - incluso lo poco
  lexicon: Crum s.v. ϣⲏⲙ; cf. ⲕⲉ-
  rationale: La partícula ⲕⲉ- aporta el matiz de «aún/e incluso». En español, «aun lo poco» preserva ese énfasis y mantiene la tersa concisión del dicho.
- source_word: ⲉⲧⲉⲣⲉⲟⲩⲛⲧⲁⲛⲧⲟϥ
  english_pob_choice: that he has
  chosen_spanish: que tiene
  alternatives_spanish:
  - que posee
  lexicon: Layton
  rationale: La cláusula relativa especifica lo poseído; «que tiene» es la opción más natural y fiel en español contemporáneo.
- source_word: ⲛ̄ⲧⲟⲟⲧϥ̄
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - de su lado
  lexicon: Layton on disjunctive preposition ⲛ̄ⲧⲟⲟⲧ-
  rationale: La preposición de separación se vierte de manera simple como «de él». En este dicho, el español puede sonar más natural con el complemento final implícito dentro de «le quitarán».
theological_decisions:
- issue: Impersonalidad de los verbos de tercera plural
  english_pob_reading: The 3rd plural verbs function impersonally in Sahidic; the English keeps 'they will give/take' to reflect the Coptic.
  chosen_spanish_reading: Se conserva la lectura impersonal, pero expresada de modo idiomático con «se lo darán» y «le quitarán».
  alternative_spanish_readings:
  - ellos se lo darán
  - será dado / será quitado
  rationale: El español permite reflejar la impersonalidad sin copiar mecánicamente el plural explícito. La solución elegida mantiene la fuerza general del enunciado y evita una formulación extraña para el lector hispanohablante.
  doctrine_reference: Nota de estilo/gramática, no doctrinal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del equipo de auditoría, que corrigió la inconsistencia entre el primer y el segundo verbo impersonal y señaló la pérdida del matiz de énfasis en ⲕⲉ-. Por eso la versión española evita el pasivo, mantiene la impersonalidad con giro natural y restaura «aun»/«lo poco».
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς.
  - Se evita «Cristo» porque el pasaje no lo usa ni lo requiere.
  - Se conserva el registro sobrio y aforístico propio de Thomas.
  - La solución «se lo darán / le quitarán» prioriza naturalidad española sin borrar la impersonalidad del original.
