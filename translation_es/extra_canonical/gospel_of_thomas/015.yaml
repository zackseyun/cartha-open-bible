base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/015.yaml
  text: Jesus said[a], "When you see the one who was not born from a woman, throw yourselves down upon your faces and worship him[d][c][b]. That one is your Father."
  footnotes:
  - marker: a
    text: '"Not born from a woman" evokes biblical idiom (cf. Matt 11:11; Job 14:1) but the identification with "your Father" is distinctive to Thomas.'
    reason: cross_reference
  - marker: b
    text: The idiom could be rendered "prostrate yourselves" for a more conventional liturgical tone, but "throw yourselves down" preserves Thomas’s stark diction.
    reason: lexical_alternative
  - marker: c
    text: ⲣⲉⲙⲙⲁⲩ is a deictic "that one," strengthening the demonstrative force rather than a simple "he."
    reason: dialect_note
  - marker: d
    text: Or 'upon your face'.
    reason: previous_rendering
