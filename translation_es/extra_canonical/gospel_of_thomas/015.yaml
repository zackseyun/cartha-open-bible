revisions:
- from: 'Jesús dijo[a]: «Cuando vean al que no fue engendrado[b] por mujer, arrójense[b] sobre su rostro[c] y adórenlo. Ese[d] es su Padre»'
  to: 'Jesús dijo[a]: «Cuando vean al que no nació de mujer, arrójense[b] sobre sus rostros[c] y adórenlo. Ese[d] es su Padre»'
  rationale: La revisión corrige el modismo principal a «no nació de mujer», que refleja mejor el sentido fuente y la nota auditada; aclara el gesto corporal con «sobre sus rostros»; y separa las notas con marcadores únicos conforme a las reglas del proyecto, sin cambiar el contenido teológico del dicho.
