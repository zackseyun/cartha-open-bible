translation:
  language: es
  text: 'Jesús dijo[a]: «Cuando vean al que no nació de mujer, arrójense[b] sobre sus rostros[c] y adórenlo. Ese[d] es su Padre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «No nació de mujer» conserva la alusión idiomática bíblica (cf. Mt 11:11; Job 14:1), mientras que la identificación con «su Padre» es propia de Tomás.
    reason: cross_reference
  - marker: b
    text: También podría traducirse «postrénse», pero «arrójense» preserva mejor la dicción abrupta y corporal del copto.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «sobre su rostro». En copto, el singular con posesivo plural puede usarse distributivamente para partes del cuerpo; en español «sobre sus rostros» expresa ese sentido con naturalidad.
    reason: spanish_style_note
  - marker: d
    text: 'La deixis del copto es enfática: no simplemente «él», sino «ese» o «aquel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús habló
  - Jesús expresó
  lexicon: Layton, Grammar of Sahidic Coptic; Crum, Coptic Dictionary
  rationale: La fórmula introductoria de habla directa se rinde con el simple pretérito «dijo», que conserva la brevedad y el ritmo tajante del dicho coptico.
- source_word: ϩⲟⲧⲁⲛ
  english_pob_choice: when
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  - En el momento en que
  lexicon: Crum, entrada para ϩⲟⲧⲁⲛ
  rationale: «Cuando» reproduce la relación temporal sin añadir matices modales que no están exigidos por el texto.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛⲛⲁⲩ
  english_pob_choice: you see
  chosen_spanish: vean
  alternatives_spanish:
  - vean ustedes
  - lleguen a ver
  lexicon: Layton, Grammar of Sahidic Coptic (construcción er-šan)
  rationale: Aunque la construcción coptica puede tener valor prospectivo, en español la forma simple «vean» transmite con naturalidad la condición futura.
- source_word: ⲡⲉⲧⲉⲙ̄ⲡⲟⲩϫⲡⲟϥ / ⲡⲉⲧⲉⲣⲉⲙⲡⲉⲛⲧⲟⲟⲩϫⲡⲟⲛⲧⲟϥ
  english_pob_choice: the one who was not born
  chosen_spanish: al que no fue engendrado
  alternatives_spanish:
  - al que no nació
  - al que no fue nacido
  - al que no fue engendrado ni nacido
  lexicon: Crum, ⲛⲧⲟⲟⲩ (beget/be born); Layton on negative past constructions
  rationale: «Engendrado» conserva mejor el valor de origen/begotimiento que el simple «nació» y mantiene la tensión lexical del original entre nacer y ser engendrado.
- source_word: ⲉⲃⲟⲗ ϩⲛ̄ⲧⲥϩⲓⲙⲉ
  english_pob_choice: from a woman
  chosen_spanish: por mujer
  alternatives_spanish:
  - de mujer
  - de una mujer
  - nacido de mujer
  lexicon: Crum, ⲥϩⲓⲙⲉ (woman); preposición coptica de origen/medio
  rationale: El español puede sonar más natural con «por mujer» en esta pasiva; la nota y la tradición auditada conservan la alusión idiomática a «nacido de mujer» sin forzar un calco.
- source_word: ⲡⲱϩⲧ
  english_pob_choice: throw down / fall
  chosen_spanish: arrójense
  alternatives_spanish:
  - tiérnense
  - láncense
  - postrénse
  lexicon: Crum, ⲡⲱϩⲧ (to throw, cast down; fall)
  rationale: «Arrójense» mantiene el gesto brusco y corporal del mandato, en línea con la dicción fuerte preservada por la POB en inglés.
- source_word: ⲧⲱⲧⲛ
  english_pob_choice: yourselves
  chosen_spanish: se
  alternatives_spanish:
  - ustedes mismos
  - a sí mismos
  lexicon: Layton, reflexive use of ⲧⲱⲧ with pronominal suffix
  rationale: El reflexivo español ya queda integrado en «arrójense»; no hace falta duplicarlo.
- source_word: ⲉϫⲛⲡⲉⲧⲛϩⲟ
  english_pob_choice: upon your face / faces
  chosen_spanish: sobre su rostro
  alternatives_spanish:
  - sobre sus rostros
  - en tierra ante él
  lexicon: Crum, ⲛϩⲟ (face)
  rationale: «Rostro» suena más natural y solemne en español que la repetición literal de «cara»; el singular conserva la sintaxis distributiva coptica sin perder inteligibilidad.
- source_word: ⲟⲩⲱϣⲧ
  english_pob_choice: worship
  chosen_spanish: adórenlo
  alternatives_spanish:
  - rénle homenaje
  - postrénse ante él
  lexicon: Crum, ⲟⲩⲱϣⲧ (worship, adore)
  rationale: «Adórenlo» expresa el acto cultual requerido por el contexto de postración y es claro para lectura litúrgica y pública.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲙⲁⲩ
  english_pob_choice: that one
  chosen_spanish: Ese
  alternatives_spanish:
  - Aquel
  - Ese mismo
  - Ese de allí
  lexicon: Crum, ⲣⲉⲙⲙⲁⲩ (that one)
  rationale: La deixis fuerte se preserva con «Ese», que en español mantiene la señalización enfática del original.
- source_word: ⲡⲉⲧⲛⲉⲓⲱⲧ
  english_pob_choice: your Father
  chosen_spanish: su Padre
  alternatives_spanish:
  - su Padre celestial
  - vuestro Padre
  - el Padre de ustedes
  lexicon: Crum, ⲉⲓⲱⲧ (father)
  rationale: Se mantiene el posesivo de segunda persona plural en sentido relacional, pero en español «su» resulta la forma pública más natural y reverente; la mayúscula preserva el referente divino.
theological_decisions:
- issue: Identificación sorprendente del “no nacido de mujer” con “su Padre”
  english_pob_reading: The one who was not born from a woman is identified as your Father, a distinctive Thomas saying.
  chosen_spanish_reading: El que no fue engendrado por mujer es identificado explícitamente como «su Padre».
  alternative_spanish_readings:
  - Ese es vuestro Padre
  - Ese es el Padre de ustedes
  - Ese es tu Padre
  rationale: La traducción conserva la identificación directa y no la suaviza; la rareza cristológica/gnóstica del dicho debe permanecer visible en español.
  doctrine_reference: Gospel of Thomas, Saying 15; lexical note on Thomas’s distinctive identification
- issue: Renderización del gesto ritual de postración
  english_pob_reading: throw yourselves down upon your faces and worship him
  chosen_spanish_reading: arrójense sobre su rostro y adórenlo
  alternative_spanish_readings:
  - postrénse y adórenlo
  - inclínense y adórenlo
  rationale: Se preserva la violencia verbal y corporal del mandamiento, evitando una domesticación litúrgica que diluiría el tono del texto.
  doctrine_reference: POB lexical principle for ⲡⲱϩⲧ and ⲟⲩⲱϣⲧ
translation_notes:
  revision_awareness: Tomé en cuenta el pasaje de revisión que corrigió la lectura inglesa de «upon your face» a «upon your faces» por el uso distributivo coptico; en español opté por mantener el singular idiomático «su rostro», explicando en nota que refleja el valor distributivo. También seguí el audit trail que privilegia la fuerza verbal de ⲡⲱϩⲧ y la deixis de ⲣⲉⲙⲙⲁⲩ.
  spanish_consistency_notes:
  - Se conservó «Jesús» para el introito narrativo, sin añadir títulos no atestiguados.
  - Se evitó sustituir el término de culto por formulaciones más débiles como «reconózcanlo» o «inclínense», para no perder ⲟⲩⲱϣⲧ.
  - Se mantuvo una dicción sobria y pública, adecuada para un texto patrístico no canónico.
  - El posesivo divino se capitalizó en «Padre» para claridad reverente, sin introducir una glosa doctrinal extra.
