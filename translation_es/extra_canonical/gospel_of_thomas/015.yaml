    reason: cross_reference
  - marker: b
    text: También podría traducirse «postrénse», pero «arrójense» preserva mejor la dicción abrupta y corporal del copto.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «sobre su rostro». En copto, el singular con posesivo plural puede usarse distributivamente para partes del cuerpo; en español «sobre sus rostros» expresa ese sentido con naturalidad.
    reason: spanish_style_note
  - marker: d
    text: 'La deixis del copto es enfática: no simplemente «él», sino «ese» o «aquel».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el modismo principal a «no nació de mujer», que refleja mejor el sentido fuente y la nota auditada; aclara el gesto corporal con «sobre sus rostros»; y separa las notas con marcadores únicos conforme a las reglas del proyecto, sin cambiar el contenido teológico del dicho.
