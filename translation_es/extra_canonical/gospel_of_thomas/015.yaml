review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del dicho, pero dos elecciones no preservan fielmente ni la idiomaticidad del copto ni la línea auditada del inglés POB: «no fue engendrado por mujer» desplaza el sentido principal de nacimiento/origen expresado por el modismo «nacido de mujer», y «sobre su rostro» introduce ambigüedad pronominal y una imagen menos natural en español que el distributivo plural. La deixis de «Ese» y la identificación final con «su Padre» sí reflejan adecuadamente el original.'
  spanish_quality_summary: El español es generalmente legible, pero «por mujer» suena forzado en este contexto y «sobre su rostro» puede leerse como singular colectivo o incluso como referido al personaje adorado, no a los oyentes. Además, el mismo marcador [b] se usa en el texto para dos elementos distintos, lo cual incumple la disciplina de notas. Conviene una reparación menor para mejorar claridad, naturalidad y conformidad editorial.
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. Las decisiones relevantes aquí son más bien idiomáticas: conviene «nació de mujer» frente a «fue engendrado por mujer», y «sus rostros» frente a «su rostro». «Adórenlo» y «Padre» están bien alineados con el sentido y el registro.'
  issues:
  - severity: high
    issue: «no fue engendrado por mujer» no refleja óptimamente el modismo de nacimiento
    rationale: El copto, junto con la evidencia y la nota inglesa, apunta al modismo bíblico equivalente a «nacido de mujer». «Engendrado» introduce una distinción conceptual que el texto fuente no exige y suena menos natural en español en combinación con «por mujer».
  - severity: high
    issue: «sobre su rostro» es ambiguo y menos natural que el distributivo plural
    rationale: El sintagma puede entenderse como referido al rostro de él, no al de ustedes. Además, en español la traducción natural del distributivo corporal es «sobre sus rostros».
  - severity: medium
    issue: Reutilización del marcador [b] para dos notas distintas
    rationale: Las instrucciones requieren marcadores únicos por nota dentro del registro. El borrador ancla [b] en dos lugares pero solo ofrece una nota, mezclando dos asuntos léxicos.
  - severity: low
    issue: «por mujer» suena poco idiomático
    rationale: Aunque intenta acomodar la pasiva, en español bíblico y natural la expresión estable es «de mujer».
  revised_spanish_text: 'Jesús dijo[a]: «Cuando vean al que no nació de mujer, arrójense[b] sobre sus rostros[c] y adórenlo. Ese[d] es su Padre»'
