base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/096.yaml
  text: Jesus said[a], "The Father's kingdom is like a woman. She took a little leaven, hid it in dough, and made it into big loaves. Whoever has ears[c][b], let him hear."
  footnotes:
  - marker: a
    text: ‘Leaven’ (ⲥⲓⲣ) refers to traditional sourdough starter, not modern commercial yeast.
    reason: cultural_note
  - marker: b
    text: ⲛⲟⲩⲛⲟϭ ⲛⲛⲟⲉⲓⲕ can also be read as ‘a large amount of bread’ or ‘many loaves.’ We render ‘big loaves’ to keep the concrete image of size.
    reason: lexical_alternative
  - marker: c
    text: Several letters are damaged or restored in NHAM02.49, but the reading ‘a woman … hid it in dough … made it into big loaves’ is secure (Dilley 2025).
    reason: lacuna_or_restoration
