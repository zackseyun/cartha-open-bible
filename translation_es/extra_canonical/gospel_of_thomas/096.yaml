translation:
  language: es
  text: 'Jesús dijo[a]: «El reino del Padre es como una mujer. Tomó un poco de levadura[b], la escondió en masa y la hizo en grandes panes[c]. Quien tenga oídos, que oiga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Leaven’ (ⲥⲓⲣ) aquí designa la levadura o fermento tradicional usado en la elaboración del pan, no la levadura comercial moderna.
    reason: cultural_note
  - marker: b
    text: El copto puede sugerir tamaño o abundancia; por eso ‘grandes panes’ conserva la imagen concreta sin cerrar del todo la posible lectura de ‘muchos panes’.
    reason: lexical_alternative
  - marker: c
    text: La lectura del dicho en NHAM02.49 es segura en la secuencia ‘una mujer … la escondió en masa … y la hizo en grandes panes’.
    reason: textual_variant
lexical_decisions:
- source_word: ⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - soberanía real
  lexicon: Crum; Layton
  rationale: En Thomas, la expresión apunta al dominio o realidad regia de Dios. ‘Reino’ conserva el sentido ya asentado en español y mantiene la imagen sin sobrecargarla con una explicación interpretativa.
- source_word: ⲡⲉⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  - el progenitor
  lexicon: Crum
  rationale: La referencia es a la designación teológica de Dios como Padre. En español, el artículo definido y la mayúscula por contexto comunican esa referencia sin añadir términos ajenos al texto.
- source_word: ⲥϩⲓⲙⲉ
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: Crum
  rationale: El contexto no exige ‘esposa’; el sentido básico es simplemente ‘mujer’. Mantenerlo evita una restricción no sustentada por el copto.
- source_word: ⲕⲟⲩⲓ
  english_pob_choice: a little
  chosen_spanish: un poco de
  alternatives_spanish:
  - una pequeña cantidad de
  - poca
  lexicon: Crum
  rationale: La partícula expresa cantidad pequeña en relación con la levadura. ‘Un poco de’ reproduce bien la construcción partititiva y suena natural en español.
- source_word: ⲥⲓⲣ
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - fermento
  - masa madre
  lexicon: Crum
  rationale: Aunque la nota inglesa aclara que se trata de levadura tradicional, en español ‘levadura’ comunica el elemento fermentador de forma clara y bíblicamente reconocible. ‘Masa madre’ introduciría una especificidad moderna no garantizada por el texto.
- source_word: ϩⲱⲡ
  english_pob_choice: hid
  chosen_spanish: la escondió
  alternatives_spanish:
  - la ocultó
  lexicon: Crum
  rationale: El verbo simple y directo conserva la tersura narrativa del dicho y mantiene la acción concreta de ocultar el fermento en la masa.
- source_word: ϣⲱⲧⲉ
  english_pob_choice: dough
  chosen_spanish: masa
  alternatives_spanish:
  - masa de pan
  - amasijo
  lexicon: Crum
  rationale: ‘Masa’ es el equivalente natural y suficientemente concreto en español. ‘Dough’ en este contexto no requiere especificar más, y ‘masa de pan’ sería una ampliación innecesaria.
- source_word: ⲉⲓⲣⲉ … ⲛⲟⲩⲛⲟϭ ⲛⲛⲟⲉⲓⲕ
  english_pob_choice: made it into big loaves
  chosen_spanish: la hizo en grandes panes
  alternatives_spanish:
  - la convirtió en grandes panes
  - la hizo en muchos panes
  - la hizo en panes grandes
  lexicon: Crum; Layton
  rationale: Se conserva la imagen concreta de una transformación visible en panes grandes. ‘La hizo en’ sigue el valor resultativo del copto sin forzar una paráfrasis; ‘grandes panes’ mantiene la ambigüedad entre tamaño y abundancia que el inglés POB también preserva.
- source_word: ⲛⲟϭ
  english_pob_choice: big
  chosen_spanish: grandes
  alternatives_spanish:
  - grandes en tamaño
  - muchos
  lexicon: Crum
  rationale: La forma puede señalar tamaño o abundancia. ‘Grandes’ permite la lectura física sin cerrar por completo la posible insinuación de cantidad.
- source_word: ⲛⲟⲉⲓⲕ
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas
  - barras de pan
  lexicon: Crum
  rationale: ‘Panes’ es natural y amplio en español. ‘Hogazas’ sería más específico, pero menos neutral; ‘panes’ conserva la imagen plural del copto.
- source_word: ⲙⲁⲁϫⲉ
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - orejas
  lexicon: Crum
  rationale: En la fórmula exhortativa, ‘oídos’ es la forma idiomática y solemne en español, y corresponde al sentido de capacidad para oír.
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: hear
  chosen_spanish: oiga
  alternatives_spanish:
  - escuche
  - oye
  lexicon: Crum; Layton
  rationale: La fórmula opta por el subjuntivo exhortativo ‘que oiga’, equivalente sobrio de la clausula final en Thomas. ‘Escuche’ sería posible, pero ‘oiga’ es más breve y más cercano a la cadencia tradicional sin arcaizar.
theological_decisions:
- issue: Referencia a Dios como Padre en el dicho
  english_pob_reading: The Father's kingdom
  chosen_spanish_reading: El reino del Padre
  alternative_spanish_readings:
  - El reino de Dios
  - El reino del Padre celestial
  rationale: Se mantiene la designación explícita ‘Padre’, tal como la lectura inglesa auditada. Cambiarla por ‘Dios’ suavizaría una elección teológica presente en el texto y borraría la expresión directa del copto.
  doctrine_reference: Teología de la paternidad divina en Thomas; fidelidad al título explícito del texto fuente.
- issue: Imagen de la levadura y posible matiz cultural
  english_pob_reading: Leaven refers to traditional sourdough starter, not modern commercial yeast.
  chosen_spanish_reading: levadura
  alternative_spanish_readings:
  - fermento
  - masa madre
  rationale: La nota inglesa advierte contra una lectura anacrónica. En español, ‘levadura’ es el término más transparente y no obliga a imaginar la levadura comercial moderna; además, se puede retener la nota cultural en el aparato si se desea.
  doctrine_reference: Notas culturales de alimentación antigua; principio de no anacronismo.
- issue: Final exhortación de oír
  english_pob_reading: Whoever has ears, let him hear.
  chosen_spanish_reading: Quien tenga oídos, que oiga
  alternative_spanish_readings:
  - El que tenga oídos, oiga
  - Quien tenga oídos, escuche
  rationale: La fórmula mantiene el carácter proverbial y exhortativo del cierre, sin añadir género marcado innecesario ni suavizar el imperativo. Se preserva el paralelismo con el original.
  doctrine_reference: Fórmula sapiencial/profética de exhortación a escuchar.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue marcada como estable (‘unchanged: true’), con alto acuerdo entre revisiones. La redacción española sigue esa lectura sin introducir ampliaciones interpretativas nuevas.'
  spanish_consistency_notes:
  - Se mantiene ‘Padre’ como término teológico central, en coherencia con el texto fuente y con la decisión inglesa auditada.
  - Se evita ‘Cristo’ porque el dicho no lo usa; Jesús aparece únicamente como el introductor del logion.
  - ‘Levadura’ se conserva como término culinario/histórico; no se sustituye por ‘masa madre’ ni por ‘fermento’ en el texto principal.
  - La fórmula final usa ‘oídos’ y ‘oiga’ para respetar la clausula proverbial sin caer en un calco rígido.
