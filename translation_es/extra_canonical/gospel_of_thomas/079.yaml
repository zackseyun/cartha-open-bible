base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/079.yaml
  text: A woman said to him in the crowd[a], “Blessed is the womb that bore you, and the breasts that nursed you.” He said to her, “Blessed are those who have heard the word of the Father and have kept it in truth; for days will come when you will say, ‘Blessed is the womb that has not conceived[e][d][c][b], and the breasts that have not given milk.’”
  footnotes:
  - marker: a
    text: The Coptic literally reads “your breasts,” a possessive construction used for the breasts from which you were nursed; rendered idiomatically in English as “the breasts that nursed you.”
    reason: dialect_note
  - marker: b
    text: “Have kept it in truth” could also be rendered “have guarded it” or “have truly kept it.”
    reason: lexical_alternative
  - marker: c
    text: Minor restorations in Dilley’s edition (e.g., in ‘woman,’ ‘womb,’ ‘breasts,’ ‘to nurse’) do not affect the sense of the saying.
    reason: lacuna_or_restoration
  - marker: d
    text: Compare Luke 11:27–28 (response to a woman’s blessing) and Luke 23:29 (“Blessed are the barren … the breasts that never nursed”).
    reason: cross_reference
  - marker: e
    text: Or 'has not borne'.
    reason: previous_rendering
