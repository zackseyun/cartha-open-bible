translation:
  language: es
  text: 'Una mujer le dijo en medio de la multitud: «¡Bendito sea el vientre que te dio a luz y los pechos[a] que te amamantaron!». Él le respondió: «¡Benditos sean los que han oído la palabra del Padre y la han guardado en verdad! Porque vendrán días en que ustedes dirán: “¡Bendito sea el vientre que no concibió, y los pechos que no dieron leche!”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto literalmente dice «tus pechos», una construcción posesiva que se refiere idiomáticamente a los pechos de los que fuiste amamantado; por eso se traduce en español como «los pechos que te amamantaron».
    reason: dialect_note
lexical_decisions:
- source_word: ⲟⲩⲥϩⲓⲙⲉ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - la mujer
  lexicon: Crum s.v. ⲥϩⲓⲙⲉ
  rationale: El indefinido del copto pide un español indefinido y natural; no hay razón textual para identificarla como una mujer ya conocida.
- source_word: ⲙⲏϣⲉ
  english_pob_choice: crowd
  chosen_spanish: multitud
  alternatives_spanish:
  - muchedumbre
  - grupo
  lexicon: Crum s.v. ⲙⲏϣⲉ
  rationale: «Multitud» es preciso y digno en español bíblico sin sonar forzado.
- source_word: ϩⲏ
  english_pob_choice: the womb
  chosen_spanish: vientre
  alternatives_spanish:
  - útero
  - vientre materno
  lexicon: Crum s.v. ϩⲏ
  rationale: Aquí el referente es maternal y el español «vientre» preserva la imagen con suficiente naturalidad. «Útero» sería más técnico; «vientre materno» amplía innecesariamente.
- source_word: ϥⲓ ϩⲁ
  english_pob_choice: bore
  chosen_spanish: te llevó
  alternatives_spanish:
  - te dio a luz
  - te trajo al mundo
  lexicon: Crum s.v. ϥⲓ; Lambdin, Introduction to Sahidic Coptic §143
  rationale: La secuencia copta apunta al parto/maternidad de forma compacta; «te llevó» conserva la relación corporal sin sonar mecánico. También evita repetir la idea de «dar a luz» de manera redundante con el segundo hemistiquio.
- source_word: ⲓⲃⲉ
  english_pob_choice: breasts
  chosen_spanish: pechos
  alternatives_spanish:
  - senos
  - mamas
  lexicon: Crum s.v. ⲓⲃⲉ
  rationale: «Pechos» es el equivalente más natural y tradicional en este contexto de lactancia.
- source_word: ⲥⲁⲛⲟⲩϣ
  english_pob_choice: nursed
  chosen_spanish: te amamantaron
  alternatives_spanish:
  - te criaron
  - te alimentaron con leche
  lexicon: Crum s.v. ⲥⲁⲛⲟⲩϣ
  rationale: «Amamantar» expresa directamente la acción de lactar/nutrir con leche y conserva el paralelismo del dicho.
- source_word: ⲉⲓⲁⲧ
  english_pob_choice: Blessed is/are
  chosen_spanish: Bendito / Benditos
  alternatives_spanish:
  - Dichoso / Dichosos
  - Bienaventurado / Bienaventurados
  lexicon: Layton, Grammar §190; Crum s.v. ⲉⲓⲁⲧ
  rationale: «Bendito» mantiene el tono solemne y es comprensible en español amplio; se conserva el patrón de bienaventuranza del original.
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: have heard
  chosen_spanish: han oído
  alternatives_spanish:
  - han escuchado
  - oyeron
  lexicon: Crum s.v. ⲥⲱⲧⲙ; Lambdin §95
  rationale: El perfecto compuesto comunica acción completada con relevancia presente, como en el copto relativo.
- source_word: ⲡⲗⲟⲅⲟⲥ
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: Préstamo griego λόγος
  rationale: «Palabra» preserva el campo semántico y evita sustituir el término por una paráfrasis.
- source_word: ⲡⲉⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el Padre (Dios)
  lexicon: Crum s.v. ⲓⲱⲧ
  rationale: En Thomas, «el Padre» funciona como título teológico suficiente; no hace falta expandirlo.
- source_word: ϩⲁⲣⲉϩ ⲉⲣⲟϥ
  english_pob_choice: have kept it
  chosen_spanish: la han guardado
  alternatives_spanish:
  - la han conservado
  - la han observado
  lexicon: Crum s.v. ϩⲁⲣⲉϩ
  rationale: «Guardar» expresa bien la idea de custodiar una palabra recibida; «conservar» o «observar» serían posibles, pero menos directos.
- source_word: ϩⲛ ⲟⲩⲙⲉ
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - en la verdad
  - de verdad
  lexicon: Crum s.v. ⲙⲉ
  rationale: «En verdad» mantiene la preposición copta y su tono formular sin volverse rígido.
- source_word: ⲟⲩⲛ ⲟⲩϩⲟⲟⲩ ⲅⲁⲣ ⲛⲁϣⲱⲡⲉ
  english_pob_choice: for days will come
  chosen_spanish: Porque vendrán días
  alternatives_spanish:
  - Pues vendrán días
  - Porque llegarán días
  lexicon: Layton, Grammar §194
  rationale: La fórmula se vuelve idiomática en español con «vendrán días», que conserva el anuncio temporal.
- source_word: ⲙⲡⲉⲛⲧⲟⲥⲱⲱ
  english_pob_choice: has not conceived
  chosen_spanish: no concibió
  alternatives_spanish:
  - no dio a luz
  - no alumbró
  lexicon: Crum s.v. ⲱ; Lambdin §153 (negative perfect)
  rationale: 'La revisión textual y léxica distingue este verbo del anterior: aquí el sentido es concebir/embarazarse, no dar a luz. En español, el aoristo negativo «no concibió» preserva mejor la fuerza del contraste.'
- source_word: ⲧⲟⲟⲩϯ ⲉⲣⲱⲧⲉ
  english_pob_choice: have not given milk
  chosen_spanish: no dieron leche
  alternatives_spanish:
  - no amamantaron
  - no dieron de mamar
  lexicon: Crum s.v. ⲧⲟⲟⲩϯ; ⲣⲱⲧⲉ ‘milk’
  rationale: «Dar leche» reproduce de cerca la collocación copta y el paralelismo con «concebir». En español resulta natural en una bienaventuranza de este tipo.
theological_decisions:
- issue: Bienaventuranza de la esterilidad frente a la maternidad
  english_pob_reading: The saying contrasts the blessing of the womb and breasts of Jesus’ mother with a future reversal that blesses the womb that has not conceived and the breasts that have not given milk.
  chosen_spanish_reading: El español conserva el contraste entre la maternidad celebrada y la futura inversión que enaltece el vientre que no concibió y los pechos que no dieron leche.
  alternative_spanish_readings:
  - '...el vientre que no dio a luz...'
  - '...el vientre estéril...'
  rationale: El copto y la nota auditada distinguen concebir de dar a luz/amamantar. La traducción evita borrar esa tensión, pero no añade una explicación doctrinal que el dicho no expresa.
  doctrine_reference: Lucas 23:29; Lucas 11:27–28
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió el último hemistiquio de «has not borne» a «has not conceived», porque el verbo copto específico apunta a concebir/embarazarse y no a dar a luz. Por eso el español dice «no concibió» y no repite la idea de parto.
  spanish_consistency_notes:
  - Se mantiene «Padre» como título teológico sin expansionar a «Dios» para respetar el lenguaje propio de Tomás.
  - Se usa «bendito»/«benditos» en plural y singular según el paralelismo del dicho.
  - Se conserva la tensión léxica entre «te llevó» (primer hemistiquio) y «no concibió» (segundo), para no neutralizar la distinción textual.
  - La nota al pie aclara la construcción posesiva copta sin introducir una lectura ajena al contexto.
