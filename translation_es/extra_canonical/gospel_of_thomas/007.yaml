base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/007.yaml
  text: Jesus said[a], “Blessed is this lion which the human will eat, so that the lion becomes human; and accursed is this human whom the lion will eat[d][c][b], and the lion will become human.”
  footnotes:
  - marker: a
    text: Makarios can also be rendered “happy” or “fortunate.” “Blessed” retains the sacral coloration of the Greek loan in Coptic.
    reason: lexical_alternative
  - marker: b
    text: “Human” translates Coptic prōme, a generic term for a person; “man” is a possible rendering but can be gendered in English.
    reason: lexical_alternative
  - marker: c
    text: The complement marker with ϣⲱⲡⲉ varies (r-/n-) in the manuscript, a dialectal/orthographic fluctuation with no change in sense (“become human”).
    reason: dialect_note
  - marker: d
    text: Or 'and the lion will become human; and accursed is this human whom the lion will eat, and the lion will become human.'.
    reason: previous_rendering
