translation:
  language: es
  text: 'Jesús dijo: «Bienaventurado[a] es este león que el humano[b] se lo comerá, para que el león se vuelva humano[c]; y maldito es este humano[b] al que el león comerá[d], y el león se volverá humano».[e]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bienaventurado» conserva el color sacro del préstamo griego μακάριος en copto; también podría traducirse «feliz» o «afortunado».
    reason: lexical_alternative
  - marker: b
    text: «Humano» traduce el copto ⲣⲱⲙⲉ con valor genérico de persona; «hombre» es posible, pero en español puede sonar masculino de manera no deseada.
    reason: lexical_alternative
  - marker: c
    text: La primera frase usa una construcción copta que expresa resultado o consecuencia estrechamente ligada a la cláusula previa; por eso aquí se traduce «para que el león se vuelva humano».
    reason: source_note
  - marker: d
    text: 'El copto presenta una fluctuación dialectal/ortográfica en el complemento de ϣⲱⲡⲉ (r-/n-) sin cambio de sentido: «volverse humano».'
    reason: dialect_note
  - marker: e
    text: 'También puede puntuarse así: «…y el león se volverá humano; y maldito es este humano al que el león comerá, y el león se volverá humano».'
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: blessed
  chosen_spanish: bienaventurado
  alternatives_spanish:
  - feliz
  - afortunado
  - bendito
  lexicon: Crum; préstamo griego μακάριος en copto sahídico
  rationale: “Bienaventurado” conserva el tono sacral y formulaico de la bienaventuranza mejor que “feliz” o “afortunado”, y evita la ambigüedad de “bendito” en español moderno.
- source_word: ⲡⲙⲟⲩⲓ / ⲡⲙⲟⲩⲉⲓ
  english_pob_choice: lion
  chosen_spanish: león
  alternatives_spanish:
  - leona
  - animal león
  lexicon: Crum s.v. ⲙⲟⲩⲓ
  rationale: El sustantivo es simplemente “león”; no hay base para especificar sexo ni añadir glosas innecesarias.
- source_word: ⲡⲁⲓ
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese
  lexicon: Lambdin, gramática copta sobre demostrativos
  rationale: El demostrativo deíctico se refleja con “este” para conservar el énfasis cercano y concreto del copto.
- source_word: ⲡⲣⲱⲙⲉ
  english_pob_choice: the human
  chosen_spanish: el humano
  alternatives_spanish:
  - el hombre
  - una persona
  - la persona
  lexicon: Crum s.v. ⲣⲱⲙⲉ
  rationale: “Humano” preserva el valor genérico de persona sin masculinizar el referente, siguiendo la decisión auditada del POB en inglés.
- source_word: ⲛⲁⲟⲩⲱⲙ ⲛⲧⲟϥ
  english_pob_choice: will eat it
  chosen_spanish: comerá
  alternatives_spanish:
  - va a comerlo
  - lo comerá
  lexicon: Crum s.v. ⲟⲩⲱⲙ; Lambdin sobre futuro con ⲛⲁ- y objeto enclítico
  rationale: En este contexto el enclítico retoma al león; en español el objeto puede quedar implícito por economía natural, sin perder el sentido. El verbo simple mantiene la fuerza futura.
- source_word: ϣⲱⲡⲉ ⲣ̄/ⲛ ⲣⲱⲙⲉ
  english_pob_choice: become human
  chosen_spanish: se vuelva humano
  alternatives_spanish:
  - se haga humano
  - llegue a ser humano
  - se convierta en humano
  lexicon: Layton, gramática copta sobre ϣⲱⲡⲉ + complemento predicativo
  rationale: “Volverse humano” expresa el cambio de estado sin cargar un matiz doctrinal ajeno; además conserva la repetición del paralelismo del copto.
- source_word: ⲃⲱⲧⲉ
  english_pob_choice: accursed
  chosen_spanish: maldito
  alternatives_spanish:
  - maldecido
  - detestado
  - abominable
  lexicon: Crum s.v. ⲃⲟⲧⲉ/ⲃⲱⲧⲉ
  rationale: “Maldito” comunica con claridad el polo opuesto de la bienaventuranza; “detestado” o “abominable” serían menos directos en español bíblico.
- source_word: ⲛϭⲓ (topic particle)
  english_pob_choice: (untranslated; reflected in word order/emphasis)
  chosen_spanish: (sin traducción explícita; reflejado por el orden y el énfasis)
  alternatives_spanish:
  - como para
  - por lo que respecta a
  lexicon: Layton, gramática copta sobre marcación temática
  rationale: No se traduce como palabra independiente; su función pragmática se reproduce con el orden natural y el demostrativo “este”.
- source_word: ⲉⲧⲉⲣⲉ
  english_pob_choice: which/whom
  chosen_spanish: al que
  alternatives_spanish:
  - que
  - a quien
  lexicon: Lambdin sobre la relativa con ⲉⲧⲉⲣⲉ + sujeto
  rationale: “Al que” conserva la relación relativa y evita una formulación demasiado pesada en español, manteniendo la referencia personal.
theological_decisions:
- issue: Tensión sintáctica entre dos formas distintas de 'volverse humano'
  english_pob_reading: 'The first clause uses a conjunctive/subordinate form: “so that the lion becomes human”; the second uses an independent future: “and the lion will become human.”'
  chosen_spanish_reading: “para que el león se vuelva humano; y el león se volverá humano”
  alternative_spanish_readings:
  - “y el león se vuelva humano; y el león se volverá humano”
  - “de modo que el león se vuelva humano; y el león se volverá humano”
  rationale: El español distingue la primera cláusula como resultado/finalidad con “para que”, y la segunda como futuro independiente con “se volverá”, preservando la diferencia observada en el copto sin borrarla en una sola construcción.
  doctrine_reference: Gramática copta; no implica una decisión doctrinal de contenido, sino una distinción verbal de fuente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente que corrigió la primera cláusula a un valor consecutivo/final distinto del futuro independiente de la segunda. La redacción española refleja esa diferencia con «para que … se vuelva» frente a «se volverá», sin homogenizar ambas cláusulas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este dicho no contiene el tetragrámaton.
  - Se evita «Cristo» porque el texto no usa Χριστός/Mesías.
  - Se preserva «humano» para ⲣⲱⲙⲉ por consistencia con la POB inglesa y para evitar sesgo de género.
  - La puntuación reproduce el paralelismo y la polaridad del original sin añadir explicaciones en el texto principal.
