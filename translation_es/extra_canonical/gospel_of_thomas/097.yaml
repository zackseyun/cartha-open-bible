base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/097.yaml
  text: Jesus said, "The kingdom of the Father is like a woman carrying a jar full of meal. While she was walking on the road, still far away, the handle of the jar broke. The meal emptied out behind her on the road. She did not know it; she had not noticed the trouble. When she reached her house, she set the jar down and found it empty."
  footnotes:
  - marker: handle
    text: Literally 'ear' (ⲙⲁⲁϫⲉ).
    reason: lexical_alternative
  - marker: trouble
    text: Or 'problem', 'toil' (ϩⲓⲥⲉ).
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Removed the stray bracketed labels from the verse text and punctuation, while preserving the draft’s wording and the established lexical decisions.
translation:
  language: es
  text: 'Jesús dijo: «El reino del Padre es como una mujer que lleva un cántaro lleno de harina. Mientras caminaba por el camino, todavía lejos, se rompió el asa[a] del cántaro y la harina se derramó detrás de ella por el camino. Ella no se dio cuenta; no había advertido el problema[b]. Cuando llegó a su casa, dejó el cántaro y lo encontró vacío».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «oreja» (ⲙⲁⲁϫⲉ); aquí se entiende como el asa del cántaro.
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «aflicción» o «trabajo»; aquí «problema» expresa el sentido narrativo de ϩⲓⲥⲉ.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲧⲙⲛ̄ⲧⲉⲣⲟ ⲙ̄ⲡⲉⲓⲱⲧ
  english_pob_choice: The kingdom of the Father
  chosen_spanish: el reino del Padre
  alternatives_spanish:
  - el reino de Dios
  - el reinado del Padre
  lexicon: Crum (ⲙⲛ̄ⲧⲉⲣⲟ / related royal abstract noun)
  rationale: Se conserva la fórmula específica de Tomás «el reino del Padre», sin armonizarla con «Dios» o «cielo». En español, «reino» comunica con claridad la abstracción regia del original y mantiene la formulación auditada del inglés POB.
- source_word: ϭⲗⲙⲉⲉⲓ
  english_pob_choice: jar
  chosen_spanish: cántaro
  alternatives_spanish:
  - jarra
  - jarro
  - vasija
  lexicon: Crum 814b
  rationale: El inglés POB eligió «jar». En español, «cántaro» es natural, digno y suficientemente amplio para un recipiente de este tipo; evita un anglicismo semántico y conserva la imagen de un recipiente doméstico.
- source_word: ⲛⲟⲉⲓⲧ
  english_pob_choice: meal
  chosen_spanish: harina
  alternatives_spanish:
  - harina gruesa
  - sémola
  - meal
  lexicon: Crum 230a
  rationale: «Meal» en inglés puede abarcar harina o harina molida. En español, «harina» es la opción más transparente y lectura natural; se prefiere porque el contexto enfatiza el contenido derramado, no una distinción técnica entre tipos de molienda.
- source_word: ⲙⲁⲁϫⲉ
  english_pob_choice: handle
  chosen_spanish: asa
  alternatives_spanish:
  - oreja
  - manija
  lexicon: Crum 211a
  rationale: El inglés POB anota que el sentido literal es «ear», pero el referente funcional es el asa del recipiente. En español, «asa» expresa mejor la función del elemento y evita una traducción literal extraña.
- source_word: ⲟⲩⲱϭⲡ
  english_pob_choice: broke
  chosen_spanish: se rompió
  alternatives_spanish:
  - se quebró
  - se partió
  - se reventó
  lexicon: Crum 509b
  rationale: «Se rompió» conserva el hecho del fallo súbito del asa sin añadir matices no garantizados por el coptico. Es idiomático y mantiene la simplicidad narrativa.
- source_word: ϣⲟⲩⲟ
  english_pob_choice: emptied out
  chosen_spanish: se derramó
  alternatives_spanish:
  - se vació
  - se volcó
  - se salió
  lexicon: Crum 600a
  rationale: El inglés POB usa «emptied out» por la acción del contenido saliendo del recipiente. En español, «se derramó» reproduce bien la pérdida del contenido sobre el camino y evita la ambigüedad de «se vació» respecto al recipiente mismo.
- source_word: ϩⲓⲥⲉ
  english_pob_choice: trouble
  chosen_spanish: problema
  alternatives_spanish:
  - problema
  - aflicción
  - contratiempo
  lexicon: Crum 715b
  rationale: El audit trail nota que ϩⲓⲥⲉ puede significar «toil, trouble, affliction». En este contexto narrativo, «problema» es la forma más directa; «contratiempo» también sería posible, pero «problema» preserva la tensión lexical sin sonar demasiado interpretativo.
theological_decisions:
- issue: Formulación de «reino del Padre»
  english_pob_reading: The kingdom of the Father
  chosen_spanish_reading: el reino del Padre
  alternative_spanish_readings:
  - el reino de Dios
  - el reinado del Padre
  rationale: Se mantiene la designación peculiar de Tomás, sin domesticarla a expresiones canónicas más frecuentes. La elección respeta la formulación auditada y evita borrar la tensión teológica de la perícopa.
  doctrine_reference: Tomás, dicho 97; comparación interna con el uso de lenguaje de reino en la tradición sinóptica
translation_notes:
  revision_awareness: La redacción sigue el texto copto normado y toma en cuenta la revisión auditada que restaura la cláusula de distancia («todavía lejos») y que exige no omitir el matiz de ϩⲓⲥⲉ como dificultad/problema. También evita las etiquetas residuales erróneas en el texto inglés previo.
  spanish_consistency_notes:
  - Se usa «Jesús dijo» para la fórmula introductoria, en continuidad con la tradición POB.
  - Se prefiere «Padre» con mayúscula en sentido reverencial, sin sustituir por «Dios».
  - Se mantiene la secuencia narrativa simple y no se introduce terminología eclesiástica ajena al dicho.
  - Los marcadores de nota se colocan solo donde hay una alternativa léxica relevante en español.
