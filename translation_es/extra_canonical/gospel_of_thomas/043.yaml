base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/043.yaml
  text: 'His disciples said to him[1], "Who are you, that you say these things to us?"


    "From what I say to you, you do not know who I am. But you have become like the Jews, for they love the tree but hate its fruit[2], and they love the fruit but hate the tree."'
  footnotes:
  - marker: '1'
    text: The negative present tense ⲛ̄ⲧⲉⲧⲛ̄ⲉⲓⲙⲉ ⲁⲛ can be read as a statement ('you do not know') or a rhetorical question ('do you not know?'). Both fit the context of Jesus rebuking their lack of understanding.
    reason: textual_variant
  - marker: '2'
    text: 'The Coptic text places ''they love'' and ''they hate'' side by side without a conjunction (asyndeton: ⲥⲉⲙⲉ ⲙ̄ⲡϣⲏⲛ ⲥⲉⲙⲟⲥⲧⲉ ⲙ̄ⲡⲉϥⲕⲁⲣⲡⲟⲥ), emphasizing the contradiction. ''But'' has been supplied in English for clarity.'
    reason: register_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: "Sus discípulos le dijeron: «¿Quién eres tú, que nos dices estas cosas?». \n\nJesús les respondió: «De lo que les digo a ustedes, no saben quién soy yo[a]. Pero han llegado a ser como los judíos: aman el árbol y odian su fruto, y aman el fruto y odian el árbol[b]»."
  philosophy: formal
  footnotes:
  - marker: a
    text: La forma copta permite leer este segmento como afirmación («no saben») o como pregunta retórica («¿no saben?»). Ambas posibilidades encajan con la reprensión de Jesús.
    reason: textual_variant
  - marker: b
    text: El copto presenta las acciones en yuxtaposición, sin una conjunción adversativa explícita entre «aman» y «odian». En español se conserva la coordinación simple para reflejar ese paralelismo.
    reason: textual_variant
lexical_decisions:
- source_word: ⲉⲓⲙⲉ
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - comprenden
  lexicon: Crum 77a
  rationale: En este contexto la pregunta es por el reconocimiento de identidad («quién soy yo»), y en español «saber» funciona de manera natural y fiel para expresar desconocimiento de una persona/identidad. «Conocer» también sería posible, pero «saber» conserva bien la forma sobria del original.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: become
  chosen_spanish: han llegado a ser
  alternatives_spanish:
  - se han vuelto
  - han pasado a ser
  lexicon: Crum 584b
  rationale: El perfecto indica cambio de estado; por eso no basta con un simple presente. «Han llegado a ser» expresa con claridad ese cambio sin añadir interpretación excesiva.
- source_word: ϣⲏⲛ
  english_pob_choice: tree
  chosen_spanish: árbol
  alternatives_spanish:
  - madero
  - tronco
  lexicon: Crum 571a
  rationale: El término coptico corresponde de manera directa a «tree», y en español «árbol» es la equivalencia normal, clara y precisa.
- source_word: ⲙⲟⲥⲧⲉ
  english_pob_choice: hate
  chosen_spanish: odian
  alternatives_spanish:
  - aborrecen
  - detestan
  lexicon: Crum 183a
  rationale: «Odiar» reproduce el contraste léxico directo con «aman» y mantiene la fuerza del dicho. «Aborrecer» sería posible, pero menos transparente para un lector moderno.
- source_word: ⲙⲉ
  english_pob_choice: love
  chosen_spanish: aman
  alternatives_spanish:
  - quieren
  - aprecian
  lexicon: Crum 181a
  rationale: Aunque el texto copto no aparece en el paquete como lema separado, la oposición semántica amor/odio es central. «Aman» preserva el paralelismo exacto con «odian».
- source_word: ⲛ̄ⲧⲱⲧⲛ̄
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: Crum 452a
  rationale: Se elige el pronombre plural de uso amplio en español latinoamericano y de registro eclesial amplio. «Ustedes» mantiene la dirección interpersonal del reproche.
theological_decisions:
- issue: Declaración o pregunta en la respuesta de Jesús
  english_pob_reading: Statement ('you do not know who I am')
  chosen_spanish_reading: 'Declaración: «no saben quién soy yo»'
  alternative_spanish_readings:
  - 'Pregunta retórica: «¿no saben quién soy yo?»'
  rationale: La sintaxis copta permite una lectura declarativa y el flujo del contraste posterior la favorece. En español, la declaración suena natural y conserva el tono de reprensión implícita sin forzar una interrogación no marcada por el texto.
  doctrine_reference: Hermenéutica sintáctica del dicho; evitar introducir puntuación interrogativa no exigida por la forma copta.
- issue: Cómo expresar el paralelismo asindético de amar/odiar árbol-fruto
  english_pob_reading: English adds 'But' for clarity while noting the Coptic asyndeton
  chosen_spanish_reading: 'Conservar la yuxtaposición: «aman el árbol y odian su fruto, y aman el fruto y odian el árbol»'
  alternative_spanish_readings:
  - 'Introducir un contraste explícito: «pero aman... y odian...»'
  rationale: El copto coloca las acciones en paralelo sin conjunción adversativa; en español se puede mantener el efecto retórico mediante la simple coordinación con «y». Esto preserva la tensión y evita suavizar la contradicción.
  doctrine_reference: Figura retórica y lectura de fuente; no convertir la yuxtaposición en una glosa interpretativa.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrige el malentendido del auditable inglés anterior: el pasaje no dice «in your ears», sino «lo que les digo a ustedes / de lo que digo a ustedes». Por eso la versión española evita toda referencia a oídos y refleja la construcción correcta del copto con complemento indirecto plural.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se mantiene «árbol» y «fruto» de forma literal, sin paráfrasis moralizante.
  - Se usa «ustedes» por claridad y neutralidad latinoamericana.
  - No se introduce «Cristo» ni «Señor», porque el pasaje no los contiene ni los requiere.
  - La puntuación busca respetar el contraste y la cadencia breve del dicho.
