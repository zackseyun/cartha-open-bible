base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/103.yaml
  text: Jesus said, “Blessed is the man who knows in which part the robbers are coming in, so that he will arise, gather his kingdom, and gird his loins beforehand, before they come in.”
  footnotes:
  - marker: part
    text: Coptic ϩⲛ ⲁϣ ⲙ-ⲙⲉⲣⲟⲥ (lit. 'in which part'). This likely refers to the part or 'watch' of the night.
    reason: cultural_note
  - marker: gather his kingdom
    text: Unlike the Synoptic parallels (Matthew 24:43; Luke 12:39) where the householder simply stays awake to prevent a break-in, Thomas introduces the striking, active imagery of gathering one's 'kingdom' (ⲙⲛⲧⲉⲣⲟ) and girding one's loins.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Removed the bracketed editorial gloss from the main text and smoothed the quotation punctuation and wording slightly while preserving the source meaning.
translation:
  language: es
  text: 'Jesús dijo: «Bienaventurado es el hombre que sabe en qué parte[a] vienen a entrar los ladrones, para que se levante, reúna su reino[b] y se ciña los lomos de antemano, antes de que entren».'
  philosophy: formal
  footnotes:
  - marker: a
    text: «En qué parte» traduce literalmente ϩⲛⲁϣ ⲙⲙⲉⲣⲟⲥ; probablemente alude a la parte o vigilia de la noche en que llegan los ladrones.
    reason: cultural_note
  - marker: b
    text: Tomás usa «reino» (ⲙⲛⲧⲉⲣⲟ), no la imagen sinóptica de una casa; la versión conserva esa elección deliberada del texto.
    reason: textual_variant
lexical_decisions:
- source_word: ⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Bendecido
  - Dichoso
  lexicon: BDAG
  rationale: Para la forma de bienaventuranza, «Bienaventurado» preserva el tono solemne y tradicional sin perder legibilidad en español.
- source_word: ϩⲛⲁϣ ⲙⲙⲉⲣⲟⲥ
  english_pob_choice: in which part
  chosen_spanish: en qué parte
  alternatives_spanish:
  - en qué turno
  - en qué vigilia
  - en qué guardia
  lexicon: Crum 197a
  rationale: Conservo el sentido literal de ⲙⲉⲣⲟⲥ como «parte», porque el texto coptó dice «en cuál parte»; la posible referencia a una vigilia nocturna queda implícita en la nota, no en el cuerpo del verso.
- source_word: ⲗⲏⲥⲧⲏⲥ
  english_pob_choice: robbers
  chosen_spanish: ladrones
  alternatives_spanish:
  - salteadores
  - bandidos
  - asaltantes
  lexicon: Crum / loanword from Greek λῃστής
  rationale: «Ladrones» comunica de forma clara el plural del original y mantiene un registro natural en español, sin forzar un término más técnico que no aporta más precisión aquí.
- source_word: ⲧⲱⲟⲩⲛ
  english_pob_choice: arise
  chosen_spanish: se levante
  alternatives_spanish:
  - se alce
  - se ponga de pie
  - se despierte
  lexicon: Crum
  rationale: El copto usa «levantarse», no «mantenerse despierto»; por eso el español debe reflejar acción de ponerse en pie, no vigilancia pasiva.
- source_word: ⲥⲱⲟⲩϩ
  english_pob_choice: gather
  chosen_spanish: reúna
  alternatives_spanish:
  - junte
  - convoque
  - muster
  lexicon: Crum 369a
  rationale: «Reúna» conserva el sentido de recoger/armar juntos lo que le pertenece y traduce el verbo sin añadir una interpretación ajena.
- source_word: ⲙⲛⲧⲉⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio
  - estado
  - reinado
  lexicon: Crum 299a
  rationale: La decisión de POB de conservar la carga teológica de ⲙⲛⲧⲉⲣⲟ se expresa mejor en español con «reino», que permite oír tanto el sentido literal como la resonancia temática de Tomás.
- source_word: ⲙⲟⲩⲣ
  english_pob_choice: gird
  chosen_spanish: se ciña
  alternatives_spanish:
  - se ciña el cinto
  - se ciña las lomos
  - se apriete el cinturón
  lexicon: Crum 181b
  rationale: «Se ciña» reproduce el modismo de ceñirse para trabajar o prepararse, y en español permite entender la imagen sin sobrecargarla.
- source_word: ϩⲁⲡⲉϩⲏ
  english_pob_choice: beforehand
  chosen_spanish: antes
  alternatives_spanish:
  - de antemano
  - anticipadamente
  - antes de tiempo
  lexicon: Crum 645b
  rationale: El adverbio indica preparación previa; «antes» comunica bien la idea en una frase ya reforzada por «antes de que entren».
theological_decisions:
- issue: ⲙⲛⲧⲉⲣⲟ en un contexto parabólico
  english_pob_reading: kingdom
  chosen_spanish_reading: reino
  alternative_spanish_readings:
  - dominio
  - estado
  - casa
  rationale: Aunque el escenario narrativo podría sugerir un patrimonio o dominio doméstico, la tradición de Tomás da peso propio a ⲙⲛⲧⲉⲣⲟ. Traducirlo como «reino» preserva esa carga temática, en línea con la lectura auditada del POB.
  doctrine_reference: Gospel of Thomas, Saying 103; lexical/theological note on ⲙⲛⲧⲉⲣⲟ
- issue: Pluralidad de los agresores
  english_pob_reading: the robbers are coming in
  chosen_spanish_reading: entran los ladrones
  alternative_spanish_readings:
  - entra el ladrón
  - entran los salteadores
  rationale: El copto y la revisión auditada indican plural; por eso el español debe mantener el plural explícito y no singularizar la escena.
  doctrine_reference: Coptic grammar in NHAM02.50; revision audit trail
- issue: Verbal sequence of preparation
  english_pob_reading: arise, gather his kingdom, and gird his loins beforehand
  chosen_spanish_reading: se levante, reúna su reino y se ciña antes
  alternative_spanish_readings:
  - se despierte y vigile
  - se prepare y proteja su casa
  rationale: La cláusula final expresa una serie de acciones del hombre bienaventurado. El español conserva esa progresión y evita armonizar el saying con los paralelos sinópticos, que usan otra imaginería.
  doctrine_reference: Thomas 103; audit trail against Matthew 24:43 / Luke 12:39
- issue: Sentido temporal de ϩⲁⲡⲉϩⲏ
  english_pob_reading: beforehand
  chosen_spanish_reading: antes
  alternative_spanish_readings:
  - de antemano
  - con anticipación
  rationale: La traducción mantiene el énfasis en la preparación previa sin alargar innecesariamente la frase.
  doctrine_reference: Crum 645b
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada que corrige la armonización con Mateo 24:43: el sujeto es el hombre bienaventurado, y los verbos deben ser «se levante», «reúna» y «se ciña», no «permanezca despierto» ni una lectura de «ladrón» en singular. También se respetó la secuencia final «antes de que entren».'
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como forma estable para ⲓⲏⲥⲟⲩⲥ.
  - Se usó «reino» para ⲙⲛⲧⲉⲣⲟ por coherencia con la terminología POB y la carga temática de Tomás.
  - Se preservó el plural de «ladrones» conforme a la gramática copta revisada.
  - No se introdujo lenguaje eclesiástico ajeno al pasaje; el registro es bíblico y sobrio.
