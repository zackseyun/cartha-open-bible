translation:
  language: es
  text: 'Jesús dijo[a]: «Cuando hagan de los dos uno, llegarán a ser hijos del Humano; y cuando digan: “Montaña, apártate”, se apartará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos» aquí puede entenderse de manera colectiva; otra posibilidad sería «hijos e hijas», pero «hijos» conserva mejor la concisión y el eco literal del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϩⲟⲧⲁⲛ / ⲉⲣϣⲁⲛ
  english_pob_choice: when you make
  chosen_spanish: cuando hagan
  alternatives_spanish:
  - cuando hayan hecho
  lexicon: Layton, Grammar §257; §182; Crum s.v. ϩⲟⲧⲁⲛ, ⲉⲓⲣⲉ
  rationale: En español, el futuro de sentido condicional se expresa de forma natural con «cuando» + subjuntivo. «Hagan» conserva la protasis futura sin sobrecargarla con un futuro perfecto menos idiomático.
- source_word: ⲡⲥⲛⲁⲩ
  english_pob_choice: the two
  chosen_spanish: de los dos
  alternatives_spanish:
  - los dos
  - ambos
  lexicon: Crum s.v. ⲥⲛⲁⲩ
  rationale: La forma fija «de los dos» reproduce el valor dual y la estructura proverbial del coptico. «Ambos» sería más fluido, pero atenúa la literalidad del contraste dual.
- source_word: ⲟⲩⲁ
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una sola unidad
  lexicon: Crum s.v. ⲟⲩⲁ
  rationale: «Uno» es la equivalencia directa y mantiene la simetría con «los dos».
- source_word: ⲛϣⲏⲣⲉ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - hijos e hijas
  lexicon: Crum s.v. ϣⲏⲣⲉ
  rationale: Aunque el inglés POB retuvo «sons» por fuerza literal, en español «hijos» funciona como colectivo masculino plural y preserva la posibilidad inclusiva sin introducir una glosa ajena al texto.
- source_word: ⲛⲡⲣⲱⲙⲉ
  english_pob_choice: of the Human
  chosen_spanish: del Humano
  alternatives_spanish:
  - del hombre
  - de la Humanidad
  - del Ser humano
  lexicon: Crum s.v. ⲣⲱⲙⲉ; Layton NHS 20 notes on Thomas’s ‘the Man’
  rationale: Se conserva la terminología técnica de Tomás con «el Humano», evitando «hombre» por su posible lectura genérica cotidiana y evitando «Hijo del Hombre», que introduciría una tradición sinóptica no garantizada por el copto de este dicho.
- source_word: ϫⲱⲛⲧⲟⲥ
  english_pob_choice: aloud
  chosen_spanish: apártate
  alternatives_spanish:
  - en voz alta
  - abiertamente
  - con valentía
  lexicon: Crum s.v. ϫⲱⲛⲧⲟⲥ
  rationale: 'La revisión textual indicada en el audit trail muestra que no hay un adverbio «aloud» aquí; por eso no se vierte ninguna idea de modo en la cita. El mandato se traduce sólo con el imperativo efectivo que sí está presente: «apártate».'
- source_word: ⲡⲧⲟⲟⲩ
  english_pob_choice: mountain
  chosen_spanish: Montaña
  alternatives_spanish:
  - la montaña
  lexicon: Crum s.v. ⲧⲟⲟⲩ
  rationale: En vocativo español, el nombre sin artículo suena más directo y reproduce mejor la forma proverbial de la exhortación.
- source_word: ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ
  english_pob_choice: move away
  chosen_spanish: apártate / se apartará
  alternatives_spanish:
  - muévete
  - sal
  lexicon: Crum s.v. ⲱⲱⲛⲉ; ⲉⲃⲟⲗ
  rationale: La expresión coptica combina «moverse» con dirección de salida. En español, «apartarse» comunica con naturalidad la idea de desplazarse fuera/dejar el lugar, mejor que un calco como «muévete afuera».
- source_word: ⲛⲧⲟϥ ⲛⲁ ⲡⲱⲱⲛⲉ
  english_pob_choice: it will move
  chosen_spanish: se apartará
  alternatives_spanish:
  - se moverá
  - irá aparte
  lexicon: Layton, Grammar §182; Crum s.v. ⲱⲱⲛⲉ
  rationale: El futuro copto con pronombre y verbo de movimiento se vierte naturalmente con futuro reflexivo. «Se apartará» conserva el enlace verbal con el imperativo anterior y evita un «moverse» demasiado físico en español.
theological_decisions:
- issue: 'ⲛϣⲏⲣⲉ ⲛⲡⲣⲱⲙⲉ: «sons of the Human» / filiación del Humano'
  english_pob_reading: The English POB keeps the sharper literal edge with 'sons of the Human' and notes that 'children of the Human' is also possible.
  chosen_spanish_reading: «hijos del Humano»
  alternative_spanish_readings:
  - «hijos e hijas del Humano»
  - «hijos del Hombre»
  - «hijos de la Humanidad»
  rationale: La formulación conserva el carácter extraño y técnico del dicho, pero usa «hijos» como colectivo natural del español. Se evita «Hijo del Hombre» porque cargaría el texto con una intertextualidad cristológica no exigida por esta forma coptica.
  doctrine_reference: Terminología sapiencial/gnóstica del Evangelio de Tomás; distinción de títulos frente a uso genérico humano.
- issue: 'Número y unidad: «hacer de los dos uno»'
  english_pob_reading: When you make the two one
  chosen_spanish_reading: «Cuando hagan de los dos uno»
  alternative_spanish_readings:
  - «Cuando unan los dos en uno»
  - «Cuando hagan uno a partir de los dos»
  rationale: Se preserva la paradoja unificadora sin explicarla. «Hacer de los dos uno» mantiene la tensión del original y el motivo recurrente del dicho.
  doctrine_reference: Motivo de unidad transformadora en Thomas 22 y 48; lenguaje simbólico de integración.
- issue: Manejo del imperativo del monte y la revisión textual de 'aloud'
  english_pob_reading: The English POB briefly read an adverbial sense ('aloud'), but the revision trail corrects it to a plain 'say' followed by the quoted command.
  chosen_spanish_reading: '«cuando digan: “Montaña, apártate”»'
  alternative_spanish_readings:
  - '«cuando digan en voz alta: “Montaña, apártate”»'
  - '«cuando digan abiertamente: “Montaña, apártate”»'
  rationale: 'La decisión sigue la revisión textual más sólida: no introducir un adverbio inexistente. Así se evita añadir una dimensión pragmática que el copto no exige.'
  doctrine_reference: Crítica textual y control del alcance semántico del verbo coptico ϫⲱ.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una corrección importante: la lectura anterior «say it aloud» fue retirada porque la forma coptica normalizada corresponde a «when you say it» sin adverbio de modo. Por eso la versión española omite cualquier equivalente de «aloud» y traduce sólo el mandato citado. También se atendió a la retención inglesa de «sons of the Human», pero se adaptó a un español natural sin perder la rareza del título.'
  spanish_consistency_notes:
  - Se usa «Humano» para ⲣⲱⲙⲉ de manera consistente con el proyecto y con la decisión de no importar «Hijo del Hombre» como equivalente automático.
  - Se usa el imperativo y futuro reflexivo «apártate / se apartará» para reflejar la misma raíz verbal de movimiento con dirección de salida.
  - La cita mantiene el estilo breve y sentencioso propio de Tomás, sin explicaciones intrusivas dentro del texto principal.
