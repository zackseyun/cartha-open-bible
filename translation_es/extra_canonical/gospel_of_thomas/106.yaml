base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/106.yaml
  text: Jesus said[a], “When you make the two one, you will become sons of the Human; and when you say, ‘Mountain[e][d][c][b], move away,’ it will move.”
  footnotes:
  - marker: a
    text: ‘Sons of the Human’ could be rendered ‘children of the Human’ (Coptic ⲛϣⲏⲣⲉ can be collective). Retaining ‘sons’ keeps the sharper literal edge and Thomas’s diction.
    reason: lexical_alternative
  - marker: b
    text: ‘Aloud’ translates ϫⲱⲛⲧⲟⲥ, which can also mean ‘openly’ or ‘boldly.’
    reason: lexical_alternative
  - marker: c
    text: Cf. Thomas 22, 48 (motif of making ‘two one’), where similar transformation language appears.
    reason: cross_reference
  - marker: d
    text: Cf. Mark 11:23; Matt 17:20; 21:21 for the mountain-moving motif in the Synoptics.
    reason: cross_reference
  - marker: e
    text: Or 'say it aloud,'.
    reason: previous_rendering
