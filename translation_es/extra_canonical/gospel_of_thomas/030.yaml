base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/030.yaml
  text: Jesus says[1], "Where there are three gods, they are gods. Where there are two or one[a][3][2], I am with him."
  footnotes:
  - marker: '1'
    text: The codex as printed reads “ϩⲛ̄ⲛⲟⲩⲧⲉ ⲛⲉ” (lit. “they are in a god”), while the normalized lemma presents “ⲟⲩⲛⲟⲩⲧⲉ ⲡⲉ.” The translation takes this as a plural predication “they are gods,” which also matches the Greek witness (POxy 1).
    reason: textual_variant
  - marker: '2'
    text: POxy 1 continues with “Take up the stone … split the wood …,” which in the Coptic occurs separately at NHC II, 46:26–28 (Saying 77). The Greek also omits “two,” reading only “when one is alone.”
    reason: cross_reference
  - marker: '3'
    text: The doubled “I—I” renders ⲁⲛⲟⲕ ⲁⲛⲟⲕ, an emphatic repetition common in Coptic to mark focus/intensity.
    reason: dialect_note
  - marker: a
    text: Or 'I—I am with him.'.
    reason: previous_rendering
