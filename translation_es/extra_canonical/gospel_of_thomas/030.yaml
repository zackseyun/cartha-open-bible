translation:
  language: es
  text: 'Jesús dice: «Donde hay tres dioses[a], son dioses. Donde hay dos o uno, yo estoy con él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El códice impreso lee «ϩⲛ̄ⲛⲟⲩⲧⲉ ⲛⲉ» (lit. «están en un dios»), mientras que la forma normalizada presenta «ⲟⲩⲛⲟⲩⲧⲉ ⲡⲉ». Aquí se entiende como predicación plural, «son dioses», lo cual también concuerda con el testimonio griego (POxy 1).
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲉϫⲉ
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: Lambdin
  rationale: En Thomas el narrador usa un presente estilístico; «dice» conserva esa inmediatez mejor que un pasado narrativo.
- source_word: ⲡⲙⲁ … ⲉⲣⲉ-
  english_pob_choice: where (lit. the place where)
  chosen_spanish: donde
  alternatives_spanish:
  - el lugar donde
  lexicon: Layton
  rationale: La construcción relativa funciona adverbialmente; «donde» comunica el valor locativo sin recargar el español.
- source_word: ⲉⲣⲉⲟⲩⲛ-
  english_pob_choice: there are
  chosen_spanish: hay
  alternatives_spanish:
  - existen
  lexicon: Lambdin
  rationale: «Hay» expresa la existencia de modo natural y breve en español.
- source_word: ϣⲟⲙⲧ
  english_pob_choice: three
  chosen_spanish: tres
  lexicon: Crum
  rationale: Número cardinal directo.
- source_word: ⲛⲛⲟⲩⲧⲉ
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  lexicon: Crum
  rationale: Se conserva el plural literal y provocador del original, sin suavizarlo a una forma más interpretativa.
- source_word: ⲟⲩⲛⲟⲩⲧⲉ ⲡⲉ / ⲛⲉ
  english_pob_choice: they are gods
  chosen_spanish: son dioses
  alternatives_spanish:
  - son divinos
  - son una deidad
  lexicon: Layton
  rationale: El sujeto inmediato es plural («tres dioses»), por lo que el predicado plural se expresa naturalmente como «son dioses». Esto evita introducir una singularidad que el coptico y el testimonio griego no requieren.
- source_word: ⲥⲛⲁⲩ
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: Crum
  rationale: Número cardinal directo.
- source_word: ⲏ
  english_pob_choice: or
  chosen_spanish: o
  lexicon: Crum
  rationale: Conjunción disyuntiva simple.
- source_word: ⲟⲩⲁ
  english_pob_choice: one
  chosen_spanish: uno
  lexicon: Crum
  rationale: Número cardinal directo; se mantiene la formulación breve del dicho.
- source_word: ⲁⲛⲟⲕ ⲁⲛⲟⲕ ϣⲱⲡⲉ / ϯϣⲟⲟⲡ
  english_pob_choice: I am with him
  chosen_spanish: yo estoy con él
  alternatives_spanish:
  - estoy con él
  - yo mismo estoy con él
  lexicon: Crum
  rationale: La revisión del aparato señala que la gramática coptica sostiene un sujeto explícito más verbo finito ordinario, no una repetición enfática de «I—I». En español conviene explicitar el sujeto con «yo» para conservar el énfasis natural del coptico y la claridad de la cláusula.
- source_word: ⲙⲛⲛⲧⲟϥ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto a él
  lexicon: Crum
  rationale: La preposición indica compañía/presencia; «con él» es la opción más directa y fiel.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del aparato que corrige la antigua lectura enfática «I—I» en favor de una construcción coptica normal con sujeto explícito. Por eso el español usa «yo estoy», no una repetición artificial de «yo-yo». También se respetó la variante textual que oscila entre una predicación plural literal («son dioses») y una formulación copiada con irregularidad gráfica en el códice.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma establecida para ⲓ︤ⲥ︥.
  - Se traduce ⲛⲟⲩⲧⲉ como «dioses» en plural, preservando la provocación literal del dicho.
  - Se evita armonizar con lecturas expansivas posteriores; el español sigue el dicho breve tal como está atestiguado.
  - Se usa español neutro y publicable, sin arcaísmos innecesarios.
