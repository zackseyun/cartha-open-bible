review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido básico: un ciego guía a otro ciego y ambos caen. También preserva correctamente el presente gnómico de ϣⲁⲩϩⲉ con «caen». Sin embargo, omite el adverbial ⲉⲡⲉⲥⲏⲧ («hacia abajo» / «abajo»), que en el audit trail inglés fue una corrección central frente a una lectura errónea previa. Además, «pozo» es posible para ϩⲓⲉⲓⲧ, pero «foso» o «hoyo» reflejan mejor «pit» en este dicho proverbial.'
  spanish_quality_summary: El español es natural y claro, con buen registro y puntuación. «Guía» funciona bien para ⲥⲱⲕ ϩⲏⲧ. La frase, no obstante, queda ligeramente incompleta frente al original por la omisión de «caen en un foso» con matiz descendente explícito; «caen en un pozo» suena idiomático, pero «pozo» puede sugerir una estructura más específica que el original no exige.
  glossary_alignment: 'No hay términos teológicos mayores en juego. Las decisiones léxicas están mayormente alineadas con el POB inglés: «ciego», «guía», «caen», «ambos». La principal desalineación es no reflejar ⲉⲡⲉⲥⲏⲧ («down»). Para ϩⲓⲉⲓⲧ, «foso» alinea mejor con «pit» que «pozo».'
  issues:
  - severity: medium
    issue: Falta el sentido de ⲉⲡⲉⲥⲏⲧ
    rationale: El original incluye un adverbial de descenso («down»), y el audit trail inglés subrayó explícitamente que no debe omitirse. En español puede integrarse naturalmente con «caen en un foso» sin necesidad de añadir un adverbio pesado, pero conviene al menos escoger una formulación que preserve mejor la imagen de caída hacia abajo.
  - severity: low
    issue: «Pozo» puede ser demasiado específico para ϩⲓⲉⲓⲧ
    rationale: Aunque es una opción léxica posible, «pit» en este contexto proverbial se vierte más naturalmente como «foso» o «hoyo». «Pozo» puede evocar un pozo de agua o una estructura construida, mientras que el coptó permite una referencia más amplia.
  revised_spanish_text: 'Jesús dijo: «Si un ciego guía a otro ciego, ambos caen en un foso».'
  revision_rationale: Se ajusta «pozo» a «foso» para reflejar mejor ϩⲓⲉⲓⲧ (‘pit’) y la imagen de caída hacia abajo destacada en el audit trail, sin recargar el español con un adverbio redundante. Se conserva «caen» para mantener el presente gnómico del copto.
