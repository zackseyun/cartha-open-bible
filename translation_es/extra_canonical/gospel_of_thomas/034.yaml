base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/034.yaml
  text: Jesus said, “If a blind person leads a blind person, both of them fall down into a pit.”
  footnotes:
  - marker: fall
    text: The Coptic uses the aorist tense (ϣⲁⲩϩⲉ), which expresses a habitual or gnomic reality ('they habitually fall'), contrasting with the future tense ('will fall') found in the Synoptic parallel (Matthew 15:14).
    reason: textual_variant
  - marker: leads
    text: Literally 'draws before him' (ⲥⲱⲕ ϩⲏⲧϥ), a Coptic idiom for leading or guiding.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: false
    changes_summary: Removed the bracketed gloss markers, standardized punctuation and quotation marks, and kept the translation aligned with the established lexical decisions while preserving the gnomic present tense.
translation:
  language: es
  text: 'Jesús dijo: «Si un ciego guía a otro ciego, ambos caen en un pozo».'
  philosophy: formal
lexical_decisions:
- source_word: ⲃⲗⲗⲉ
  english_pob_choice: blind person
  chosen_spanish: ciego
  alternatives_spanish:
  - persona ciega
  - ciego o ciega
  lexicon: Crum 38b
  rationale: El sustantivo coptó designa a una persona ciega; en español, «ciego» funciona naturalmente como sustantivo genérico y conserva la concisión del original. «Persona ciega» explicita la referencia personal, pero es más larga sin añadir precisión necesaria.
- source_word: ⲥⲱⲕ ϩⲏⲧ
  english_pob_choice: leads
  chosen_spanish: guía
  alternatives_spanish:
  - conduce
  - lleva por delante
  - dirige
  lexicon: Crum 326b
  rationale: La expresión idiomática coptó literalmente significa «tirar/dibujar delante», con el sentido de guiar o conducir. «Guía» expresa bien ese valor verbal en español sin sonar mecánico; «conduce» también sería posible, pero «guía» mantiene mejor la imagen de dirección.
- source_word: ϣⲁⲩϩⲉ
  english_pob_choice: fall
  chosen_spanish: caen
  alternatives_spanish:
  - caerán
  - suelen caer
  - caen por costumbre
  lexicon: Crum 651a
  rationale: El aoristo gnómico coptó comunica una verdad general u habitual. En español, el presente simple «caen» transmite esa generalización de manera natural, en línea con la decisión inglesa de usar simple present.
- source_word: ⲡⲉⲥⲛⲁⲩ
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos dos
  lexicon: Crum 346a
  rationale: El coptó significa literalmente «los dos». «Ambos» es la forma más idiomática y compacta en español para conservar la dualidad sin sobrecargar la frase.
- source_word: ϩⲓⲉⲓⲧ
  english_pob_choice: pit
  chosen_spanish: pozo
  alternatives_spanish:
  - fosa
  - hoyo
  - foso
  lexicon: Crum 736b
  rationale: El término puede abarcar pozo, fosa o hoyo. «Pozo» es una equivalencia natural y ampliamente comprensible en español; además, encaja con el paralelo sinóptico al que alude el audit trail, sin forzar una especificación más estrecha que el coptó no exige.
theological_decisions:
- issue: 'Valor gnómico del verbo: presente general vs. futuro'
  english_pob_reading: The Coptic uses the aorist tense, expressing a habitual or gnomic reality ('they fall'), contrasting with the future tense found in Matthew 15:14.
  chosen_spanish_reading: 'Se traduce con presente gnómico: «caen».'
  alternative_spanish_readings:
  - caerán
  - suelen caer
  rationale: El original no anuncia un evento puntual futuro, sino una sentencia general. El presente español comunica mejor esa verdad proverbial y conserva la tensión documental señalada en el aparato inglés, frente al futuro de la fuente sinóptica.
  doctrine_reference: N/A (observación filológica/estilística; paralelo con Mateo 15:14)
- issue: Referencia al sujeto indefinido genérico
  english_pob_reading: blind person
  chosen_spanish_reading: ciego
  alternative_spanish_readings:
  - persona ciega
  - el ciego
  rationale: El coptó usa un sustantivo genérico sin marcar género. En español, «ciego» funciona como sustantivo inclusivo y fiel al valor general del enunciado; no introduce una lectura masculina exclusiva ni una paráfrasis innecesaria.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se incorporó la corrección crítica del auditor: el segmento no dice que «caerán» en el pozo como futuro, sino que «caen»; además, se preserva «guía» para ⲥⲱⲕ ϩⲏⲧ y se evita convertir el adverbio equivalente a «abajo» en un objeto directo. La redacción española sigue la revisión más reciente al eliminar marcas intrusas y mantener una puntuación limpia y publicable.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para ⲓⲏⲥⲟⲩⲥ.
  - Se conserva un registro sobrio y bíblico sin arcaísmos innecesarios.
  - No se añaden notas al texto porque la frase española resultante no requiere una ambigüedad adicional en esta unidad.
  - La traducción refleja el sentido proverbial del enunciado y no lo sobredetermina como profecía futura.
