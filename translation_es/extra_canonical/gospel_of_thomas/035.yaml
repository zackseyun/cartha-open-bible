base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/035.yaml
  text: Jesus said, "It is not possible for someone to enter the strong man’s house and take it by force unless he binds his hands; then he will overturn his house."
  footnotes:
  - marker: take it
    text: The Coptic pronoun is masculine singular and could refer either to the house (ⲡⲏⲉⲓ) or to the strong man (ⲡϫⲱⲱⲣⲉ, 'take him by force').
    reason: lexical_alternative
  - marker: overturn
    text: The Coptic verb ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ literally means 'to pour out' or 'to overturn,' a notable divergence from the canonical Synoptic parallels (Mark 3:27, Matt 12:29) which use ⲧⲱⲣⲡ ('to plunder' or 'snatch').
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: false
    changes_summary: Removed the bracketed editorial notes from the main text, added standard quotation punctuation, and kept the established renderings for the key terms while smoothing the sentence for natural English.
translation:
  language: es
  text: 'Jesús dijo: «No es posible que alguien entre en la casa del hombre fuerte y lo tome por la fuerza[a], a menos que le ate las manos; entonces derribará su casa[b]».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El coptó dice literalmente que lo tome «por fuerza»; la frase no añade el objeto «cuerda» ni otra herramienta.
    reason: lexical_alternative
  - marker: b
    text: ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ puede entenderse como «volcar», «derribar» o «vaciar»; el inglés POB optó por «overturn», frente al paralelo sinóptico «despojar».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲛ̄ϭⲟⲙ⳿
  english_pob_choice: It is not possible
  chosen_spanish: No es posible
  alternatives_spanish:
  - No puede
  - No es capaz
  lexicon: Crum 815b
  rationale: La construcción negativa expresa imposibilidad, no mera dificultad; por eso «No es posible» mantiene con claridad el valor de ϭⲟⲙ (‘poder/capacidad’).
- source_word: ϫⲱⲱⲣⲉ
  english_pob_choice: strong man
  chosen_spanish: hombre fuerte
  alternatives_spanish:
  - el fuerte
  - el hombre poderoso
  lexicon: Crum 785a
  rationale: Se conserva el sustantivo/adjetivo como designación del personaje de la parábola. «Hombre fuerte» reproduce de forma natural la fuerza lexical del original sin añadir interpretación.
- source_word: ϫⲓⲧϥ⳿ ⲛ̄ϫⲛⲁϩ
  english_pob_choice: take it by force
  chosen_spanish: lo tome por la fuerza
  alternatives_spanish:
  - lo arrebate por la fuerza
  - lo tome violentamente
  lexicon: Crum 776b
  rationale: El idiomatismo coptó expresa acción violenta/forzosa; en español «por la fuerza» conserva la idea de fuerza aplicada sin introducir un objeto ajeno como «con una cuerda».
- source_word: ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ
  english_pob_choice: overturn
  chosen_spanish: derrumbará
  alternatives_spanish:
  - volcará
  - trastornará
  - volteará
  lexicon: Crum 264b
  rationale: El verbo admite el sentido de volcar/derramar/derribar. Dado el objeto «su casa», «derrumbará su casa» comunica el resultado físico con naturalidad en español y conserva la divergencia respecto del paralelismo sinóptico canónico.
translation_notes:
  revision_awareness: 'Se siguió el sentido revisado del audit trail: no se introdujo «cuerda»; se mantuvo la idea de entrar en la casa del hombre fuerte, tomar por la fuerza y luego actuar sobre su casa. También se respetó la nota de que el final diverge léxicamente del paralelo sinóptico habitual.'
  spanish_consistency_notes:
  - Se usó «Jesús» para ⲓⲏⲥⲟⲩⲥ.
  - Se evitó «SEÑOR» porque no aparece en este dicho.
  - Se prefirió «por la fuerza» para reflejar ϫⲓⲛϫⲛⲁϩ sin sobreinterpretación.
  - Se optó por «derribará» para hacer natural en español el efecto de ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ sobre «su casa».
