    text: El pronombre coptó es masculino singular y puede referirse ya sea a la casa o al hombre fuerte; también podría entenderse «apoderarse de él por la fuerza».
    reason: lexical_alternative
  - marker: b
    text: ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ significa literalmente «volcar» o «vaciar», una divergencia notable frente a los paralelos sinópticos que dicen «despojar».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para reflejar mejor el aparato auditado: la nota [a] ahora preserva la ambigüedad del pronombre coptó, y el verbo final cambia de «derribar» a «volcar» para ajustarse al valor léxico documentado de ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ sin introducir la idea más fuerte de demolición.'
