review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica y la imposibilidad inicial, pero no preserva con suficiente fidelidad dos decisiones clave del expediente inglés: (1) la ambigüedad del pronombre masculino singular en «take it by force», que puede referirse a la casa o al hombre fuerte, mientras que «lo tome» en español tiende a forzar lectura personal; y (2) el matiz de ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ como «volcar / poner patas arriba / vaciar», no «derribar» en sentido de demoler. La nota a también reduce indebidamente la nota inglesa, que trataba la referencia pronominal, no solo la exclusión de «cuerda».'
  spanish_quality_summary: El español es legible y digno, pero «lo tome por la fuerza» suena algo menos natural con antecedente ambiguo y «derribará su casa» sugiere destrucción estructural más fuerte que el coptó. Una leve revisión mejora claridad y fidelidad sin volver el texto torpe.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal. «Jesús» está bien. «hombre fuerte» refleja adecuadamente ϫⲱⲱⲣⲉ. El principal ajuste lexical es preferir una formulación que conserve la ambigüedad del pronombre y reemplazar «derribará» por «volcará» o equivalente más cercano a ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ.
  issues:
  - severity: medium
    issue: La frase «lo tome por la fuerza» no preserva bien la ambigüedad del pronombre coptó.
    rationale: El expediente inglés documenta que el masculino singular puede referirse a la casa o al hombre fuerte. En español, «lo» inclina la lectura hacia el hombre; «apoderarse de ella» también fijaría femenino. Conviene una redacción más neutral y una nota que explique la ambigüedad.
  - severity: medium
    issue: La nota [a] no refleja la razón lexical principal preservada por el POB inglés.
    rationale: La nota inglesa para «take it» explica la posible referencia del pronombre a la casa o al hombre fuerte. El borrador español habla de que no aparece «cuerda», dato procedente de una revisión previa inglesa, pero no del aparato final que debe preservarse.
  - severity: medium
    issue: «derribará su casa» sobretraduce ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ.
    rationale: «Derribar» suele sugerir tumbar o demoler una estructura. El inglés auditado eligió «overturn», con nota sobre «pour out / overturn». En español, «volcará su casa» o «pondrá su casa patas arriba» se acerca mejor al valor documentado y mantiene la divergencia respecto a los sinópticos.
  revised_spanish_text: 'Jesús dijo: «No es posible que alguien entre en la casa del hombre fuerte y se apodere por la fuerza[a], a menos que le ate las manos; entonces volcará su casa[b]».'
  revised_footnotes:
