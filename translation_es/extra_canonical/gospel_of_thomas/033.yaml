revisions:
- from: 'Jesús dijo: «Lo que oigas en tu oído, en el otro oído proclámalo sobre tus azoteas; porque nadie enciende una lámpara y la pone debajo de una canasta medidora[a], ni la pone en un lugar oculto, sino que la pone sobre el candelero, para que los que entren y los que salgan vean su luz».'
  to: 'Jesús dijo: «Lo que oigas en tu oído, en el otro oído proclámalo sobre tus azoteas; porque nadie enciende una lámpara y la pone debajo de una canasta de medir[a], ni la pone en un lugar oculto, sino que la pone sobre el candelero, para que los que entren y los que salgan vean su luz».'
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin perder la decisión léxica documentada del inglés POB: «canasta medidora» se cambió a «canasta de medir». Se mantuvo el resto del texto porque representa fielmente el sentido del copto y la línea auditada en inglés.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:05:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura y el sentido general del dicho copto: lo oído en un oído debe proclamarse en el otro; la imagen de la lámpara, la cesta de medida, el lugar oculto, el candelero y el propósito de que entren y salgan vean su luz está bien mantenida. Sin embargo, hay un problema de fidelidad menor pero real en «porque nadie enciende una lámpara», ya que el copto/inglés auditado no expresa explícitamente ‘enciende’ como verbo principal sino ‘una lámpara’ en el contexto de ponerla; el inglés POB ya optó por ‘lights a lamp’, así que esto es aceptable dinámicamente. El punto más débil no es de sentido sino de español idiomático y de precisión léxica.'
  spanish_quality_summary: El texto es claro y legible, pero «canasta medidora» suena poco natural en español bíblico general y algo mecánico. «Canasta de medir» conserva mejor la función del objeto y su rareza sin sonar forzado. Además, «sobre tus azoteas» puede mantenerse, pero «en tus azoteas» sería más idiomático con ‘proclamar’; aun así, no es necesario cambiarlo si se prioriza cercanía al inglés auditado. El resto fluye bien y mantiene un registro digno.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. «Jesús», «lámpara», «luz» y «candelero» están alineados. La decisión de no armonizar ⲙⲁⲁϫⲉ con «bushel» está bien, pero la realización española debe ajustarse a una forma más natural: «canasta de medir».'
  issues:
  - severity: medium
    issue: «canasta medidora» suena poco idiomático
    rationale: Aunque intenta reflejar ‘measuring basket’, en español neutral eclesial ‘medidora’ como adjetivo aplicado a canasta resulta duro y poco natural. ‘Canasta de medir’ preserva mejor la función léxica y la extrañeza del original.
  - severity: low
    issue: La nota al pie usa «bushel» sin adaptación al español
    rationale: Puede conservarse como préstamo si se explica, pero para legibilidad hispana conviene marcarlo como término alternativo tradicional/extranjero. No es un error grave.
  revised_spanish_text: 'Jesús dijo: «Lo que oigas en tu oído, en el otro oído proclámalo sobre tus azoteas; porque nadie enciende una lámpara y la pone debajo de una canasta de medir[a], ni la pone en un lugar oculto, sino que la pone sobre el candelero, para que los que entren y los que salgan vean su luz».'
  revised_footnotes:
  - marker: a
    text: 'O: «debajo de un bushel». El copto ⲙⲁⲁϫⲉ en esta construcción puede designar una cobertura o recipiente de medida.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin perder la decisión léxica documentada del inglés POB: «canasta medidora» se cambió a «canasta de medir». Se mantuvo el resto del texto porque representa fielmente el sentido del copto y la línea auditada en inglés.'
