translation:
  language: es
  text: 'Jesús dijo: «Lo que oigas en tu oído, en el otro oído proclámalo sobre tus azoteas; porque nadie enciende una lámpara y la pone debajo de una canasta de medir[a], ni la pone en un lugar oculto, sino que la pone sobre el candelero, para que los que entren y los que salgan vean su luz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «debajo de un bushel». El copto ⲙⲁⲁϫⲉ en esta construcción puede designar una cobertura o recipiente de medida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲧⲟϥⲛⲁⲥⲱⲧⲙ …
  english_pob_choice: what you will hear
  chosen_spanish: Lo que oigas
  alternatives_spanish:
  - el que oiga
  - quien oiga
  lexicon: Layton, Coptic Grammar (relative converter ⲡⲉⲧⲉⲣⲉ- con valor prospectivo)
  rationale: 'La construcción prospectiva pide un neutro en español: «lo que oigas». Evita convertirlo en persona («quien») cuando el sentido del Coptico es una cosa o dicho que se oye.'
- source_word: ⲥⲱⲧⲙ
  english_pob_choice: hear
  chosen_spanish: oigas
  alternatives_spanish:
  - escuches
  lexicon: Crum s.v. ⲥⲱⲧⲙ
  rationale: «Oír» conserva el valor básico de percibir por el oído y encaja con el ritmo conciso del dicho; «escuchar» sería más interpretativo.
- source_word: ⲙⲁⲁϫⲉ
  english_pob_choice: ear / the other ear
  chosen_spanish: oído / el otro oído
  alternatives_spanish:
  - oreja / la otra oreja
  - oído / la otra oreja
  lexicon: Crum s.v. ⲙⲁⲁϫⲉ
  rationale: «Oído» es más natural y digno en español en este giro, sin perder la referencia corporal. Se conserva la rareza de «el otro oído», que el testigo copto presenta de forma literal.
- source_word: ⲧⲁϣⲉⲟⲉⲓϣ ⲛⲛⲧⲟϥ
  english_pob_choice: proclaim it
  chosen_spanish: proclámalo
  alternatives_spanish:
  - anúncialo
  - publícalo
  lexicon: Crum s.v. ⲥⲟⲉⲓϣ; Lambdin on causative ⲧⲁ-
  rationale: La causativa expresa hacer que algo sea proclamado; «proclámalo» comunica ese valor con fuerza y claridad en español.
- source_word: ⲡⲱⲣ
  english_pob_choice: rooftops
  chosen_spanish: azoteas
  alternatives_spanish:
  - housetops
  - techos
  lexicon: Crum s.v. ⲡⲱⲣ
  rationale: «Azoteas» es el equivalente natural y público para el plural de los techos planos; mantiene la imagen sin un calco torpe.
- source_word: ⲣⲟϩⲏⲃⲥ
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - luz
  - candil
  lexicon: Crum s.v. ⲣⲟϩⲏⲃ
  rationale: «Lámpara» es la correspondencia estándar y clara para el objeto que se enciende; «candil» sería más restringido históricamente.
- source_word: ⲙⲁⲁϫⲉ (with ⲡⲉⲕ-, ⲡⲕⲉ-)
  english_pob_choice: under a measuring-basket
  chosen_spanish: debajo de una canasta medidora
  alternatives_spanish:
  - debajo de un canasto medidor
  - debajo de un cesto medidor
  lexicon: 'Crum s.v. ⲙⲁⲁϫⲉ (secondary sense: measure, basket)'
  rationale: Se conserva la especificidad del lexema copto sin aplanarlo a «bushel». «Canasta medidora» comunica que el objeto funciona como medida/cubierta, respetando la extrañeza del dicho.
- source_word: ϩⲛⲙⲁ ⲉⲣⲉⲛⲧⲟϥ ϩⲱⲡ
  english_pob_choice: in a hidden place
  chosen_spanish: en un lugar oculto
  alternatives_spanish:
  - en un lugar escondido
  - en ocultamiento
  lexicon: Crum s.v. ϩⲱⲡ (hide; hiding-place)
  rationale: «Lugar oculto» suena natural en español y conserva la oposición con poner la lámpara a la vista.
- source_word: ⲗⲩⲭⲛⲓⲁ
  english_pob_choice: lampstand
  chosen_spanish: candelero
  alternatives_spanish:
  - soporte de lámpara
  - lámpara-stand
  lexicon: Lambdin (Greek loans); Crum s.v. ⲗⲩⲭⲛⲓⲁ
  rationale: «Candelero» es el término bíblico y comprensible para el soporte de la lámpara; evita una glosa técnica innecesaria.
- source_word: ⲟⲩⲟⲉⲓⲛ
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  - claridad
  lexicon: Crum s.v. ⲟⲩⲟⲉⲓⲛ
  rationale: «Luz» es la traducción más directa y natural para el sustantivo copto.
- source_word: ⲟⲩⲟⲛ ⲛⲓⲙ
  english_pob_choice: those who ... everyone
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - todo el que
  lexicon: Crum s.v. ⲟⲩⲟⲛ; ⲛⲓⲙ
  rationale: La construcción relativa universal se vierte con «los que», que suena fluido y preserva el valor general.
- source_word: ⲃⲱⲕ ⲉϩⲟⲩⲛ / ⲉⲓ ⲉⲃⲟⲗ
  english_pob_choice: enter / go out
  chosen_spanish: entren / salgan
  alternatives_spanish:
  - entren / salgan afuera
  - entren / salgan
  lexicon: Crum s.v. ⲃⲱⲕ; ⲉⲓ
  rationale: «Entren» y «salgan» reproducen el contraste direccional de manera sobria y idiomática.
translation_notes:
  revision_awareness: Se incorporó el ajuste de la revisión inglesa que prefirió una puntuación más fluida y mantuvo la fuerza de la imagen original. En español se evitó el calco directo del plural inglés «rooftops» con una forma natural («azoteas») y se preservó la rareza copta de «el otro oído».
  spanish_consistency_notes:
  - Se mantiene el nombre divino y cristológico según los defaults del proyecto, aunque este dicho no los activa más allá de «Jesús».
  - Se eligió un registro bíblico sobrio, evitando arcaísmos innecesarios pero conservando el paralelismo y la cadencia del dicho.
  - La nota al pie está anclada en «canasta medidora» para reflejar la alternativa tradicional sin sustituir el texto principal.
