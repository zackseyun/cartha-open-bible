base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/033.yaml
  text: Jesus said, “What you will hear in your ear—in the other ear proclaim it on your rooftops; for no one lights a lamp and puts it under a measuring basket, nor does one put it in a hidden place, but rather one puts it on the lampstand, so that those who enter and those who go out may see its light.”
  footnotes:
  - marker: a
    text: 'POxy 1 reads: “What you will hear with your one ear, that …,” emphasizing one ear; the Coptic text uniquely continues “in the other ear.”'
    reason: textual_variant
  - marker: b
    text: 'Or: ‘under a bushel.’ The Coptic lexeme ⲙⲁⲁϫⲉ in this collocation denotes a covering or measuring basket.'
    reason: lexical_alternative
  - marker: c
    text: Cf. parallels in Matt 10:27; Luke 8:16; 11:33; Mark 4:21.
    reason: cross_reference
