base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/093.yaml
  text: Do not give what is holy to the dogs[a], lest they throw them onto the dung-heap. Do not throw pearls to the pigs[f][e][d][c][b], lest they do it [...].
  footnotes:
  - marker: a
    text: ‘What is holy’ translates an adjectival noun (ⲡⲉⲧⲟⲩⲁⲁⲃ), literally ‘the holy [thing]’.
    reason: lexical_alternative
  - marker: b
    text: ‘Dung-heap’ renders Greek loan ⲕⲟⲡⲣⲓⲁ, the refuse/dung pile common in village life.
    reason: cultural_note
  - marker: c
    text: The Coptic continues only with ⲡⲗⲁ… before a break; many editors conjecture a verb like ‘trample,’ influenced by Matt 7:6, but the manuscript does not preserve it.
    reason: lacuna_or_restoration
  - marker: d
    text: Spelling ⲛ̄ⲛⲟⲩϩⲟⲟⲣ (ms) normalized to ⲛⲡⲟⲩϩⲟⲣ reflects dialectal/plural article variation.
    reason: dialect_note
  - marker: e
    text: Or 'lest they [...].'.
    reason: previous_rendering
  - marker: f
    text: Or 'lest they throw it'.
    reason: previous_rendering
