translation:
  language: es
  text: No den lo santo a los perros[a], para que no las[b] arrojen al montón de estiércol. No arrojen perlas a los cerdos, para que no hagan de ellas [...]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lo santo» traduce un sustantivo/adjetivo sustantivado (ⲡⲉⲧⲟⲩⲁⲁⲃ), literalmente «la cosa santa» o «lo santo».
    reason: lexical_alternative
  - marker: b
    text: El Coptico conserva un objeto plural («las»), de modo que el sujeto implícito de la primera prohibición se entiende en plural en la segunda mitad de la frase.
    reason: source_note
lexical_decisions:
- source_word: ⲡⲉⲧⲟⲩⲁⲁⲃ
  english_pob_choice: what is holy
  chosen_spanish: lo santo
  alternatives_spanish:
  - lo sagrado
  - la cosa santa
  lexicon: Crum s.v. ⲟⲩⲁⲁⲃ
  rationale: Es un sustantivo/adjetivo sustantivado. «Lo santo» conserva la cualidad sustantivada sin forzar una referencia eclesiástica; «lo sagrado» sería posible, pero desplaza el tono proverbial.
- source_word: ⲛⲡⲟⲩϩⲟⲣ / ⲛ̄ⲛⲟⲩϩⲟⲟⲣ
  english_pob_choice: to the dogs
  chosen_spanish: a los perros
  alternatives_spanish:
  - a los perros
  lexicon: Crum s.v. ϩⲟⲟⲣ
  rationale: El Coptico usa el plural definido; en español la forma natural y fiel es «a los perros». «Perros» mantiene el matiz genérico/proverbial.
- source_word: ϫⲉⲕⲁⲁⲥ / ϩⲓⲛⲁ ϫⲉ
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: Crum s.v. ⲕⲁⲥ; Layton (subordinadores)
  rationale: En español, «para que no» expresa bien la cláusula preventiva sin sonar arcaico. «No sea que» también sería posible, pero aquí «para que no» mantiene claridad y paralelismo.
- source_word: ⲛⲟⲩⲛⲟϫⲟⲩ
  english_pob_choice: throw them
  chosen_spanish: las arrojen
  alternatives_spanish:
  - las tiren
  - las echen
  lexicon: Crum s.v. ⲛⲟⲩϫⲉ
  rationale: El sufijo plural -ⲟⲩ del Coptico obliga a plural en español. «Arrojen» conserva fuerza verbal y algo de formalidad; el objeto directo femenino plural concuerda con «lo santo» como neutro sustantivado tratado en plural implícito por el verbo del original.
- source_word: ⲕⲟⲡⲣⲓⲁ
  english_pob_choice: dung-heap
  chosen_spanish: montón de estiércol
  alternatives_spanish:
  - basurero de estiércol
  - basural
  lexicon: Crum s.v. ⲕⲟⲡⲣⲓⲁ
  rationale: La imagen es concreta y campesina. «Montón de estiércol» comunica el referente material del préstamo griego sin sonar técnico; «basurero» o «midden» serían menos naturales en español.
- source_word: ⲛⲡⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ
  english_pob_choice: pearls
  chosen_spanish: perlas
  alternatives_spanish:
  - las perlas
  lexicon: Crum s.v. ⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ
  rationale: «Perlas» es la equivalencia directa y natural en español. Se omite el artículo para mantener la misma generalidad proverbial del original.
- source_word: ⲛⲡⲉϣⲁⲩ
  english_pob_choice: to the pigs
  chosen_spanish: a los cerdos
  alternatives_spanish:
  - a los puercos
  lexicon: Crum s.v. ϣⲁⲩ
  rationale: «Cerdos» es claro y ampliamente entendible en español neutro; «puercos» sería más regional o más marcado. El original nombra animales de corral impuros en una imagen proverbial.
- source_word: ⲉⲓⲣⲉ ⲛⲧⲟϥ (fragmentary)
  english_pob_choice: do [...] to it
  chosen_spanish: hagan de ellas [...]
  alternatives_spanish:
  - hagan [...]
  - las traten así [...]
  lexicon: Crum s.v. ⲉⲓⲣⲉ
  rationale: El Coptico conserva un verbo legible antes de la laguna; «hagan de ellas» preserva una construcción abierta y evita inventar el complemento perdido. Se opta por plural femenino para concordar con «perlas» y con el valor plural del objeto en el verbo precedente.
translation_notes:
  revision_awareness: La versión española incorpora la corrección del auditorio que restauró el verbo legible antes de la laguna en la segunda cláusula y respeta el plural del objeto en ⲛⲟⲩⲛⲟϫⲟⲩ. También evita igualar indebidamente el final fragmentario con una conjetura como «pisen», ya que el manuscrito no la preserva.
  spanish_consistency_notes:
  - Se prefirió «lo santo» para mantener la sustantivación sin introducir terminología litúrgica ajena al texto.
  - Se mantuvo la repetición de «arrojen» para reflejar el paralelismo del original.
  - El final fragmentario queda con puntos suspensivos para no sobretraducir la laguna.
  - Se eligió español neutral y de registro bíblico moderno, evitando arcaísmos innecesarios.
