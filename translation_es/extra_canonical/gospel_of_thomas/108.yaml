translation:
  language: es
  text: 'Jesús dijo: «El que beba de mi boca[a] se volverá como yo[b]; yo mismo llegaré a ser él[c], y lo oculto se le revelará[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De mi boca» conserva el modismo copto. En el contexto, «boca» puede funcionar metonímicamente para enseñanza o palabra, pero la traducción no lo parafrasea.
    reason: cultural_note
  - marker: b
    text: 'La revisión auditada rechaza «mi igual» aquí: ⲛ̄ⲧⲁϩⲉ significa «como yo» / «a mi manera».'
    reason: lexical_alternative
  - marker: c
    text: «Llegaré a ser él» conserva la identidad recíproca y el matiz de transformación del copto, sin sobreexplicar la sintaxis.
    reason: lexical_alternative
  - marker: d
    text: También puede expresarse como «será revelado a él»; aquí se prefiere «se le revelará» por ser más natural en español sin perder el sentido de destinatario del original.
    reason: alternative_reading
lexical_decisions:
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲁⲥⲱ / ⲥⲱ
  english_pob_choice: whoever drinks
  chosen_spanish: el que beba
  alternatives_spanish:
  - quien beba
  - el que beberá
  lexicon: Crum; Layton
  rationale: La construcción relativa futura funciona de modo gnómico/indefinido; en español, «el que beba» conserva esa apertura natural sin forzar un futuro en cadena.
- source_word: ϩⲛ ⲡⲁⲧⲁⲡⲣⲟ
  english_pob_choice: from my mouth
  chosen_spanish: de mi boca
  alternatives_spanish:
  - de mi boca misma
  - desde mi boca
  lexicon: Crum; Layton
  rationale: La imagen idiomática de origen se mantiene en español con «de mi boca». «Desde» también sería posible, pero «de» es más directo y natural. Se conserva la metonimia de boca como habla/enseñanza sin explicitarla en el texto.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: become
  chosen_spanish: se volverá
  alternatives_spanish:
  - llegará a ser
  - se hará
  lexicon: Crum; Lambdin
  rationale: «Se volverá» expresa el cambio de estado de manera natural en español y evita una paráfrasis excesiva. Mantiene la idea de transformación implícita en ϣⲱⲡⲉ.
- source_word: ⲛ̄ⲧⲁϩⲉ
  english_pob_choice: like me
  chosen_spanish: como yo
  alternatives_spanish:
  - a mi manera
  - igual que yo
  lexicon: Crum; review notes on ϩⲉ
  rationale: La revisión detecta que ⲛ̄ⲧⲁϩⲉ es un modismo coptob donde ϩⲉ significa «manera, modo»; por eso en español conviene «como yo» y no «mi igual».
- source_word: ϩⲱⲱ ⲁⲛⲟⲕ
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo, por mi parte
  - yo mismo, precisamente
  lexicon: Layton
  rationale: La partícula enfática se refleja de forma idiomática con «yo mismo», preservando el énfasis sin endurecer la sintaxis española.
- source_word: ⲉⲣⲉ ⲛⲧⲟϥ ⲡⲉ
  english_pob_choice: I myself shall become he / I shall be he
  chosen_spanish: llegaré a ser él
  alternatives_spanish:
  - seré él
  - vendré a ser él
  lexicon: Layton; Crum
  rationale: La construcción copulativa expresa identidad futura. En español, «llegaré a ser él» conserva la fuerza de transformación e identidad recíproca con una forma inteligible y sobria.
- source_word: ⲡⲉⲧⲉⲣⲉϩⲱⲡ
  english_pob_choice: the hidden things
  chosen_spanish: lo oculto
  alternatives_spanish:
  - las cosas ocultas
  - lo escondido
  lexicon: Crum; Layton
  rationale: El relativo sustantivado puede sentirse colectivo o abstracto. «Lo oculto» mantiene amplitud semántica y evita decidir innecesariamente entre singular y plural.
- source_word: ⲟⲩⲱⲛϩ ⲉⲛⲧⲟϥ
  english_pob_choice: will be revealed to him
  chosen_spanish: será revelado a él
  alternatives_spanish:
  - se le revelará
  - le será manifestado
  lexicon: Crum; Layton
  rationale: «Será revelado a él» reproduce la pasiva y la dirección del destinatario sin añadir interpretaciones. «Se le revelará» sería más idiomático, pero menos transparente a la estructura de origen.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente que corrige el antiguo «my equal» a «like me» y la nota textual sobre ⲛ̄ⲧⲁϩⲉ como modismo de «manera/modo». Por eso evito cualquier lenguaje de igualdad formal y traduzco con una construcción comparativa natural en español. También conservo la ambigüedad de lo oculto sin forzar un singular/plural innecesario.
  spanish_consistency_notes:
  - Se usa «Jesús» como forma fija del nombre propio.
  - No se introduce «Cristo» porque el texto fuente no lo requiere.
  - Se evita «Señor» o equivalentes de encubrimiento del nombre divino, ya que no aparece aquí.
  - La voz pasiva de la última cláusula se conserva por fidelidad estructural al copto, aunque en español suene algo más formal que la alternativa reflexiva.
