base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/108.yaml
  text: Jesus said[a], “Whoever drinks from my mouth will become like me. I myself shall become he[e][d][c][b], and the hidden things will be revealed to him.”
  footnotes:
  - marker: a
    text: ‘Drink from my mouth’ preserves the Coptic idiom; mouth often metonymically signifies teaching/utterance. The translation does not paraphrase this as ‘drink my words.’
    reason: cultural_note
  - marker: b
    text: ‘My equal’ renders ⲛ ⲡⲁϩⲉ; many English versions soften to ‘like me.’ Both are possible; ‘equal’ follows the stronger equative force of ⲡⲁϩⲉ (Crum).
    reason: lexical_alternative
  - marker: c
    text: '‘I myself shall become he’: the Coptic uses an emphatic pronoun (ϩⲱⲱ) and a compact copular construction (ⲉⲣⲉ … ⲡⲉ). Alternative, slightly smoother English is ‘I shall be he.’'
    reason: lexical_alternative
  - marker: d
    text: The phrase-joined layer shows ⲛⲉⲑⲏⲡ, normalized as the relative ⲡⲉⲧⲉⲣⲉϩⲱⲡ ‘what is hidden’; the sense is the same.
    reason: textual_variant
  - marker: e
    text: Or 'my equal'.
    reason: previous_rendering
