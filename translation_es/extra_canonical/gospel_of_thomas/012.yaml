translation:
  language: es
  text: 'Los discípulos le dijeron a Jesús[a]: «Sabemos que te irás de nosotros. ¿Quién será grande sobre nosotros?» Jesús les dijo: «A donde ustedes estén[b], irán a Jacobo el Justo[c], este[d], por quien vinieron a existir el cielo[e] y la tierra[f]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲛⲁⲃⲱⲕ puede significar ‘ir’, ‘irse’ o ‘partir’; aquí se opta por ‘te irás’ para subrayar la separación del grupo.
    reason: lexical_alternative
  - marker: b
    text: La cláusula coptica del lugar se entiende idiomáticamente como ‘donde ustedes estén’ / ‘a donde ustedes estén’; no hay una intensificación reflexiva que deba trasladarse al español.
    reason: alternative_reading
  - marker: c
    text: ‘Jacobo’ reproduce directamente Iakobos; ‘Santiago’ es una forma tradicional española, pero puede ocultar la relación nominal con el original.
    reason: lexical_alternative
  - marker: d
    text: ‘Este’ conserva el demostrativo enfático del coptico.
    reason: source_note
  - marker: e
    text: ‘Cielo’ traduce el singular cosmológico del coptico; en español suena natural junto con ‘tierra’.
    reason: lexical_alternative
  - marker: f
    text: ‘Vinieron a existir’ intenta respetar ϣⲱⲡⲉ como verbo de surgir/llegar a ser, sin añadir explícitamente ‘fueron creados’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉ
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - les habló
  lexicon: Crum; Layton (fórmula narrativa)
  rationale: Verbo narrativo breve y natural para introducir el discurso directo.
- source_word: ⲡⲙⲁⲑⲏⲧⲏⲥ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - aprendices
  - estudiantes
  lexicon: Crum (préstamo griego)
  rationale: Mantiene el valor cristiano habitual del término en español sin suavizarlo a una lectura escolar.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - entendemos
  - reconocemos
  lexicon: Crum (ⲥⲟⲟⲩⲛ ‘saber’ )
  rationale: Conserva el sentido cognitivo directo de la frase.
- source_word: ⲃⲱⲕ
  english_pob_choice: you will depart
  chosen_spanish: te irás
  alternatives_spanish:
  - irás
  - saldrás
  - partirás
  lexicon: Crum (ⲃⲱⲕ ‘ir’); valor contextual de separación
  rationale: En español suena más natural que ‘departir’ y refleja la idea de irse del grupo.
- source_word: ⲛⲧⲛⲁⲛⲟⲛ
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - lejos de nosotros
  - apartándote de nosotros
  lexicon: preposición de origen/ separación
  rationale: Reproduce la relación de salida/separación sin añadir énfasis no requerido.
- source_word: ⲉⲧⲛⲁⲣ̄ⲛⲟϭ ⲉϩⲣⲁⲓ ⲉϫⲱⲛ
  english_pob_choice: be great over us
  chosen_spanish: será grande sobre nosotros
  alternatives_spanish:
  - reinará sobre nosotros
  - será nuestro líder
  lexicon: Crum (ⲛⲟϭ ‘grande’); construcción relativa
  rationale: Preserva la metáfora de grandeza y evita importar ‘reinar’ sin base explícita en el coptico.
- source_word: ⲡⲙⲁ
  english_pob_choice: the place
  chosen_spanish: A donde
  alternatives_spanish:
  - En el lugar donde
  - Donde
  lexicon: Crum (ⲙⲁ ‘lugar’); revisión del pasaje
  rationale: 'La revisión textual del audit trail apoya una lectura idiomática: ‘wherever you are’ / ‘a donde ustedes estén’, que evita el error de añadir una supuesta intensificación reflexiva.'
- source_word: ⲉⲓ ⲙⲙⲁⲩ
  english_pob_choice: have come
  chosen_spanish: estén
  alternatives_spanish:
  - han llegado
  - han venido
  lexicon: Crum (ⲉⲓ ‘venir’); valor de estado presente en la cláusula relativa
  rationale: 'Sigue la corrección auditada: la frase expresa el lugar en que ellos se encuentran, no un énfasis reflexivo inexistente en el coptico.'
- source_word: ⲓⲁⲕⲱⲃⲟⲥ
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: Crum; uso onomástico
  rationale: Se adopta ‘Jacobo’ para reflejar directamente el nombre griego Iakobos sin confundirlo con la forma devocional ‘Santiago’.
- source_word: ⲡⲇⲓⲕⲁⲓⲟⲥ
  english_pob_choice: the Just
  chosen_spanish: el Justo
  alternatives_spanish:
  - el Righteous
  - el Justo/Recto
  lexicon: Crum (δικαῖος)
  rationale: Conserva el apelativo tradicional y compacto como sobrenombre titulatorio.
- source_word: ⲡⲁⲓ
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  - él
  lexicon: Crum (demostrativo)
  rationale: Mantiene el deíctico enfático sin sobreexplicar.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: came into being
  chosen_spanish: vinieron a existir
  alternatives_spanish:
  - llegaron a ser
  - fueron creados
  lexicon: Crum (ϣⲱⲡⲉ ‘llegar a ser, ocurrir’); uso cosmológico
  rationale: Conserva la idea de surgimiento/acontecer sin introducir un agente explícito que el texto no expresa aquí.
- source_word: ⲉⲧⲃⲉ ⲛⲧⲟϥ
  english_pob_choice: for whose sake
  chosen_spanish: por quien
  alternatives_spanish:
  - por causa de él
  - por cuya causa
  lexicon: Crum (ⲉⲧⲃⲉ ‘por causa de, por’); referencia relativa
  rationale: ‘Por quien’ transmite bien la relación causal relativa en español y evita una perífrasis más pesada.
theological_decisions:
- issue: Identidad y estatus de Jacobo el Justo
  english_pob_reading: A future departure leads the disciples to ask who will be great over them; Jesus directs them to James the Just, for whose sake heaven and earth came into being.
  chosen_spanish_reading: Jesús dirige a los discípulos a Jacobo el Justo como figura de referencia, sin desarrollar más su autoridad que la que el texto afirma.
  alternative_spanish_readings:
  - Jacobo como líder eclesial explícito
  - Jacobo como mediador de autoridad
  rationale: El coptico nombra a Jacobo y lo califica como ‘el Justo’; no se debe expandir el rol más allá del apelativo y la frase causal.
  doctrine_reference: Act 15; Gal 1–2 (contexto temprano, no explicitado aquí)
- issue: Relación causal entre Jacobo y la creación
  english_pob_reading: for whose sake heaven and earth came into being
  chosen_spanish_reading: por quien vinieron a existir el cielo y la tierra
  alternative_spanish_readings:
  - porque de él vinieron a existir el cielo y la tierra
  - por cuya causa fueron hechos el cielo y la tierra
  rationale: Se conserva la causalidad fuerte del texto sin forzar una formulación de agencia que el coptico no explicita con un verbo pasivo de creación.
  doctrine_reference: Gén 1:1; uso cosmológico del lenguaje de origen
translation_notes:
  revision_awareness: Se incorporó la revisión auditada que corrige la antigua lectura ‘Where you yourselves have come’ por una comprensión idiomática equivalente a ‘wherever you are / a donde ustedes estén’. Por eso no se conserva ningún marcador de énfasis reflexivo inexistente en el coptico.
  spanish_consistency_notes:
  - Se usa ‘discípulos’ para ⲡⲙⲁⲑⲏⲧⲏⲥ y ‘Jesús’ para ⲓ︤ⲥ︥.
  - Se evita ‘SEÑOR’ y otras sustituciones teológicas no motivadas por el texto.
  - Se mantiene ‘el Justo’ como apelativo fijo de Jacobo.
  - La puntuación y las comillas siguen convención española moderna.
