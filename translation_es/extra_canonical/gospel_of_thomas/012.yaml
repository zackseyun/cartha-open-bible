base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/012.yaml
  text: The disciples said to Jesus[a], "We know that you will depart from us. Who will be great over us?" Jesus said to them, "Wherever you are, you are to go to James the Just—this one[f][e][d][c][b], for whose sake heaven and earth came into being."
  footnotes:
  - marker: a
    text: 'ⲛⲁⲃⲱⲕ: rendered as "depart"; alternatives "go" or "leave" are possible depending on whether movement or separation is emphasized.'
    reason: lexical_alternative
  - marker: b
    text: 'ⲉⲧⲉⲣⲉⲛⲁⲣⲛⲟϭ ⲉϩⲣⲁⲓ ⲉϫⲛⲁⲛⲟⲛ: translated as "be great over us." Some take ⲣⲛⲟϭ idiomatically as "rule"; we avoid importing political language not present in the Coptic.'
    reason: lexical_alternative
  - marker: c
    text: 'ⲡⲙⲁ ⲉⲧⲉⲣⲉⲁⲛⲧⲱⲧⲛⲉⲓ ⲙⲙⲁⲩ: literally, "the place where you yourselves have come." Many modern renderings smooth this to "wherever you are." We preserve the relative clause and reflexive emphasis.'
    reason: alternative_reading
  - marker: d
    text: 'ⲁⲡⲡⲉ ("heaven"): Lycopolitan-style spelling in NH II; equivalent to standard Sahidic ⲁⲡⲉ/ⲧⲁⲡⲉ.'
    reason: dialect_note
  - marker: e
    text: 'James the Just as a leader: see Acts 15 and Galatians 1–2 for later early Christian context; Hegesippus (via Eusebius, Hist. Eccl. 2.23) uses the sobriquet "the Just."'
    reason: cross_reference
  - marker: f
    text: Or 'Where you yourselves have come,'.
    reason: previous_rendering
