base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/064.yaml
  text: Jesus said[1], "A man had some guests. And when he had prepared the dinner, he sent his servant so that he might invite the guests. He went to the first. He said to him, 'My master invites you.' He said, 'I have some money with some merchants; they are coming to me in the evening. I will go to give them orders. I excuse myself from the dinner.' He went to another. He said to him[2], 'My master has invited you.' He said to him, 'I have bought a house, and they are asking for me for a day. I will not have time.' He came to another. He said to him, 'My master invites you.' He said to him, 'My friend is going to marry, and I am the one who will make the dinner. I will not go. I excuse myself from the dinner.' He went to another. He said to him, 'My master invites you.' He said to him, 'I have bought a village. I am going to collect rent. I will not go. I excuse myself.' The servant came. He said to his master, 'Those whom you invited to the dinner have excused themselves.' The master
    said to his servant, 'Go outside to the streets. Those whom you will find, bring them, so that they may dine[4][3]. Buyers and merchants will not enter the places of my father.'"
  footnotes:
  - marker: '1'
    text: The second invitation uses the perfect tense (ⲁⲡⲁϫⲟⲉⲓⲥ, 'has invited'), while the others use the present tense (ⲡⲁϫⲟⲉⲓⲥ, 'invites'). This variation is preserved in the translation.
    reason: textual_variant
  - marker: '2'
    text: The Coptic ϯⲛⲁϣⲓ ⲁⲛ uses a variant of the verb ϣⲉ ('to go'). Earlier translations sometimes rendered this as 'I will not be able', confusing it with the verb ϣ ('to be able'), which would require a following infinitive.
    reason: lexical_alternative
  - marker: '3'
    text: 'The manuscript has a lacuna here: ⲙⲛ̄ⲛⲉϣⲟⲧ̣[ⲉ ⲥⲉⲛⲁⲃ]ⲱ̣ⲕ̣ ⲁⲛ⳿. The restoration ''[will] not [go] in'' is standard and fits the visible traces and space.'
    reason: textual_variant
  - marker: '4'
    text: Unlike the canonical parallels (Luke 14:16-24, Matt 22:1-10), Thomas explicitly frames all the excuses around commerce and business, concluding with a direct condemnation of 'buyers and merchants'. This reflects Thomas's ascetic rejection of worldly commerce.
    reason: theological_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo: «Un hombre tenía algunos invitados. Y cuando hubo preparado la cena, envió a su esclavo para que invitara a los invitados. Fue al primero. Le dijo: “Mi señor te invita”. Él dijo: “Tengo algo de dinero con unos comerciantes; vendrán a verme por la tarde. Iré a darles órdenes. Me excuso de la cena”. Fue a otro. Le dijo: “Mi señor te ha invitado”. Él le dijo: “He comprado una casa, y me requieren por un día. No tendré tiempo”. Fue a otro. Le dijo: “Mi señor te invita”. Él le dijo: “Mi amigo va a casarse, y yo soy el que hará la cena. No iré. Me excuso de la cena”. Fue a otro. Le dijo: “Mi señor te invita”. Él le dijo: “He comprado una aldea. Voy a cobrar la renta. No iré. Me excuso”. El esclavo vino. Le dijo a su señor: “Los que invitaste a la cena se han excusado”. El señor dijo a su esclavo: “Ve afuera, a las calles. A los que encuentres, tráelos, para que cenen[a]. Los compradores y los comerciantes no entrarán en el lugar de mi Padre”.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El manuscrito tiene una laguna aquí; la restauración «para que cenen» sigue la lectura estándar y encaja con las trazas visibles y el sentido del pasaje.
    reason: textual_variant
lexical_decisions:
- source_word: ϣⲙⲙⲟ
  english_pob_choice: guests
  chosen_spanish: invitados
  alternatives_spanish:
  - huéspedes
  - extraños
  lexicon: Crum 566a
  rationale: El contexto es una comida preparada y una invitación; en español, “invitados” expresa el valor contextual de ϣⲙⲙⲟ sin perder la idea de personas convocadas por el anfitrión. “Huéspedes” también sería posible, pero “invitados” es más natural y fiel aquí.
- source_word: ϩⲙϩⲁⲗ
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: Crum 720a
  rationale: El POB documenta “slave” para conservar la fuerza léxica; en español, “esclavo” mantiene esa fuerza mejor que “siervo”, que suavizaría el término. Se reserva la lectura más atenuada solo si el contexto lo exigiera, cosa que aquí no ocurre.
- source_word: ⲟⲩⲉϩⲥⲁϩⲛⲉ
  english_pob_choice: give orders
  chosen_spanish: darles órdenes
  alternatives_spanish:
  - mandarles
  - darles instrucciones
  lexicon: Crum 506a
  rationale: La expresión indica ordenar o mandar. “Darles órdenes” conserva el matiz directo y autoritativo del verbo compuesto y sigue de cerca el sentido del original.
- source_word: ⲧⲟⲟⲩ
  english_pob_choice: bought
  chosen_spanish: he comprado
  alternatives_spanish:
  - compré
  - adquirí
  lexicon: Crum 435a
  rationale: El perfecto español “he comprado” refleja bien el estado resultante de la compra y funciona de modo natural en el discurso directo.
- source_word: ⲥⲣϥⲉ
  english_pob_choice: have time
  chosen_spanish: tendré tiempo
  alternatives_spanish:
  - tengo tiempo
  - podré
  lexicon: Crum 358a
  rationale: El sentido es disponer de tiempo suficiente; “tendré tiempo” transmite de manera clara la imposibilidad práctica que expresa el excusarse.
- source_word: ⲣϣⲉⲗⲉⲉⲧ
  english_pob_choice: marry
  chosen_spanish: va a casarse
  alternatives_spanish:
  - se va a casar
  - va a tomar esposa
  lexicon: Crum 560b
  rationale: En español actual, “va a casarse” expresa con naturalidad el evento matrimonial sin sobrecargar el texto. “Tomar esposa” sería más literal, pero menos idiomático.
- source_word: ϫⲓ ⲛϣⲱⲙ
  english_pob_choice: collect rent
  chosen_spanish: cobrar la renta
  alternatives_spanish:
  - recibir la renta
  - recaudar el alquiler
  lexicon: Crum 565b
  rationale: La locución indica cobrar/recibir una renta; “cobrar la renta” es la forma más natural en español y conserva el marco económico del pasaje.
- source_word: ⲣⲉϥⲧⲟⲟⲩ
  english_pob_choice: buyers
  chosen_spanish: los compradores
  alternatives_spanish:
  - los que compran
  - los adquirentes
  lexicon: Crum 435a
  rationale: Es un sustantivo agente derivado de “comprar”. “Los compradores” mantiene la referencia concreta a personas dedicadas a comprar, como exige el cierre del dicho.
- source_word: ϣⲟⲧⲉ
  english_pob_choice: merchants
  chosen_spanish: los comerciantes
  alternatives_spanish:
  - los mercaderes
  - los negociantes
  lexicon: Crum 590b
  rationale: “Comerciantes” comunica bien el oficio y evita una resonancia demasiado arcaica; conserva el contraste económico que Thomas subraya al final.
theological_decisions:
- issue: El rechazo final de compradores y comerciantes, sin armonizar con los paralelos sinópticos.
  english_pob_reading: Buyers and merchants will not enter the places of my father.
  chosen_spanish_reading: Los compradores y los comerciantes no entrarán en los lugares de mi Padre.
  alternative_spanish_readings:
  - Los que compran y los comerciantes no entrarán en los lugares de mi Padre.
  - Los compradores y mercaderes no entrarán en los lugares de mi Padre.
  rationale: Se preserva la dureza ascética del cierre de Tomás. La frase no se suaviza ni se reconduce a la formulación sinóptica; se mantiene la exclusión explícita de los agentes del comercio, tal como permite el coptico y como lo registra el POB en inglés.
  doctrine_reference: 'Thomas 64; paralelos canónicos: Lucas 14:16-24 y Mateo 22:1-10'
translation_notes:
  revision_awareness: 'La versión inglesa auditada corrigió un error grave: el texto no dice que el hombre tenía un esclavo al inicio, sino que tenía invitados. También conservó la distinción entre “has invited” en la segunda invitación y “invites” en las demás, y evitó confundir el verbo de ir con uno de poder en la tercera excusa. Esta propuesta española sigue esa revisión y mantiene el énfasis económico del cierre.'
  spanish_consistency_notes:
  - Se mantiene “invitados” para ϣⲙⲙⲟ y “esclavo” para ϩⲙϩⲁⲗ, distinguiendo claramente ambos términos coptos.
  - Se conserva “mi Padre” con mayúscula reverencial, en paralelo con el cierre del dicho.
  - Se usa “cena” de forma uniforme para el banquete, en continuidad con la tradición del POB y con el contexto narrativo.
  - Se evita introducir vocabulario eclesiástico no sustentado por el original; se conserva un registro sobrio y directo.
