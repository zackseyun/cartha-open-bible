revisions:
- from: 'Jesús dijo: «Un hombre tenía algunos invitados. Y cuando hubo preparado la cena, envió a su esclavo para que invitara a los invitados. Él fue al primero. Le dijo: “Mi señor te invita”. Él dijo: “Tengo algo de dinero con unos comerciantes; ellos vienen hacia mí por la tarde. Iré para darles órdenes. Me excuso de la cena”. Fue a otro. Le dijo: “Mi señor te ha invitado”. Él le dijo: “He comprado una casa, y me buscan por un día. No tendré tiempo”. Fue a otro. Le dijo: “Mi señor te invita”. Él le dijo: “Mi amigo va a casarse, y yo soy el que hará la cena. No iré. Me excuso de la cena”. Fue a otro. Le dijo: “Mi señor te invita”. Él le dijo: “He comprado una aldea. Voy a cobrar la renta. No iré. Me excuso”. El esclavo volvió. Le dijo a su señor: “Los que invitaste a la cena se han excusado”. El señor dijo a su esclavo: “Ve afuera, a las calles. A los que encuentres, tráelos, para que cenen[a]. Los compradores y los comerciantes no entrarán en los lugares de mi Padre”.'
  to: 'Jesús dijo: «Un hombre tenía algunos invitados. Y cuando hubo preparado la cena, envió a su esclavo para que invitara a los invitados. Fue al primero. Le dijo: “Mi señor te invita”. Él dijo: “Tengo algo de dinero con unos comerciantes; vendrán a verme por la tarde. Iré a darles órdenes. Me excuso de la cena”. Fue a otro. Le dijo: “Mi señor te ha invitado”. Él le dijo: “He comprado una casa, y me requieren por un día. No tendré tiempo”. Fue a otro. Le dijo: “Mi señor te invita”. Él le dijo: “Mi amigo va a casarse, y yo soy el que hará la cena. No iré. Me excuso de la cena”. Fue a otro. Le dijo: “Mi señor te invita”. Él le dijo: “He comprado una aldea. Voy a cobrar la renta. No iré. Me excuso”. El esclavo vino. Le dijo a su señor: “Los que invitaste a la cena se han excusado”. El señor dijo a su esclavo: “Ve afuera, a las calles. A los que encuentres, tráelos, para que cenen[a]. Los compradores y los comerciantes no entrarán en el lugar de mi Padre”.”'
  rationale: 'La revisión hace ajustes menores para mejorar la naturalidad del español y afinar la fidelidad al copto sin cambiar el sentido del pasaje: se suavizan calcos poco idiomáticos, se usa «vino» en vez de «volvió», y se singulariza «lugar» para reflejar mejor el original y sonar más natural en español eclesial general.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:04:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del copto y del POB en inglés: ϣⲙⲙⲟ se vierte correctamente como «invitados», ϩⲙϩⲁⲗ como «esclavo», se conserva la variación temporal de «te ha invitado» en la segunda invitación, y se mantiene el cierre tajante contra compradores y comerciantes. Sin embargo, hay pequeños puntos de fidelidad y naturalidad que conviene ajustar: el sirviente «vino»/«regresó», no necesariamente «volvió» desde un lugar previo identificado; «ellos vienen hacia mí por la tarde» suena poco idiomático en español; y «lugares de mi Padre» conviene singularizar a «lugar» por naturalidad y cercanía al sentido local del copto.'
  spanish_quality_summary: 'El texto es claro y ampliamente legible, con tono digno y moderno. Aun así, varias frases suenan algo calcadas del inglés o del copto: «vienen hacia mí», «me buscan por un día», y «lugares de mi Padre». También puede mejorarse la fluidez narrativa sustituyendo algunos «Él le dijo» repetitivos por formulaciones ligeramente más naturales sin perder literalidad. La reparación necesaria es pequeña y no afecta la arquitectura del pasaje.'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Jesús», «esclavo», «Padre», «compradores», «comerciantes». No hay términos teológicos problemáticos. La nota de laguna está bien anclada y es pertinente. La única mejora léxica importante es estilística-contextual, no de glosario.'
  issues:
  - severity: medium
    issue: «ellos vienen hacia mí por la tarde» suena forzado en español
    rationale: El copto expresa que los mercaderes vienen a él al atardecer; en español neutral «vienen a verme por la tarde» o «vendrán a verme al atardecer» comunica mejor el sentido sin perder fidelidad.
  - severity: low
    issue: «El esclavo volvió» es más interpretativo que «vino»
    rationale: El copto simplemente dice que el esclavo vino al amo. «Volvió» no es grave, pero añade matiz de retorno explícito; «vino» o «regresó» es más neutral.
  - severity: low
    issue: «los lugares de mi Padre» es poco natural
    rationale: Aunque el inglés pluralizó «places», el copto normalizado muestra singular «lugar». En español «el lugar de mi Padre» suena más natural y es suficientemente fiel.
  - severity: low
    issue: «me buscan por un día» es inteligible pero poco idiomático
    rationale: La frase puede mantenerse cercana al original, pero «me requieren por un día» o «me necesitan por un día» suena más natural en español e igualmente conserva la idea temporal.
