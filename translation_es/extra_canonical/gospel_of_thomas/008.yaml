base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/008.yaml
  text: And he said, "The human is like a wise fisherman who cast his net into the sea. He drew it up from the sea full of small fish. Among them, the wise fisherman found a large, fine fish. He threw all the small fish back down into the sea; he chose the large fish without difficulty. Whoever has ears to hear, let him hear."
  footnotes:
  - marker: The human
    text: Coptic ⲡⲣⲱⲙⲉ (p-rōme). Often translated 'the man', but used here in a generic sense for humanity or the seeker.
    reason: lexical_alternative
  - marker: cast
    text: The manuscript reads ⲛⲧⲁϩⲛⲟⲩϫⲉ, using ϩ for the 3rd person masculine singular suffix pronoun ϥ, a regional (often Lycopolitan) dialect feature common in this text.
    reason: dialect_note
  - marker: found
    text: Literally 'fell upon' (ⲁϥϩⲉ ⲉ-).
    reason: lexical_alternative
  - marker: down
    text: The manuscript has a small lacuna here (ⲉ[ⲡⲉ]ⲥⲏⲧ), but the restoration is standard and certain.
    reason: textual_variant
  - marker: without difficulty
    text: This parable parallels Matthew 13:47-48, but diverges significantly. Matthew describes a dragnet gathering all kinds of fish to be sorted into good and bad at the end of the age. Thomas focuses on a single wise fisherman who discards the many small fish to keep the one large, valuable fish, reflecting Thomas's emphasis on finding the 'single one' (monachos) rather than an apocalyptic sorting.
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: false
    changes_summary: Removed the bracketed editorial insertions from the main text and restored the quotation punctuation to readable formal English; retained the established lexical choices and the reviser's correction 'his net.'
translation:
  language: es
  text: 'Y dijo: «El ser humano es como un pescador sabio que echó su red al mar. La subió del mar llena de peces pequeños. Entre ellos, el pescador sabio encontró un pez grande y bueno. Echó todos los peces pequeños de nuevo hacia abajo al mar[a]; escogió el pez grande sin dificultad. El que tenga oídos para oír, que oiga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El manuscrito tiene aquí una pequeña laguna (ⲉ[ⲡⲉ]ⲥⲏⲧ), pero la restauración estándar es segura y significa ‘hacia abajo’.
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲣⲱⲙⲉ
  english_pob_choice: The human
  chosen_spanish: el ser humano
  alternatives_spanish:
  - el hombre
  - una persona
  lexicon: Crum 294a
  rationale: El Coptico usa el artículo definido genérico, y la POB inglesa opta por un sentido inclusivo y general. En español, «el ser humano» conserva mejor esa genericidad que «el hombre», que puede sonar más masculino o restringido.
- source_word: ⲟⲩⲱϩⲉ
  english_pob_choice: fisherman
  chosen_spanish: pescador
  alternatives_spanish:
  - pescador de peces
  lexicon: Crum 508a
  rationale: Es el equivalente natural y preciso en español para el oficio referido en el texto.
- source_word: ⲣⲙⲛϩⲏⲧ
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - inteligente
  lexicon: Crum 714b
  rationale: La expresión coptica significa literalmente algo como «persona de corazón/mente», con valor de sabiduría o discernimiento. «Sabio» reproduce bien esa fuerza en español.
- source_word: ⲛⲧⲉϥⲁⲃⲱ
  english_pob_choice: his net
  chosen_spanish: su red
  alternatives_spanish:
  - su propia red
  - la red de él
  lexicon: Crum 1b
  rationale: El poseedor está explícito en el coptico; «su red» transmite la relación posesiva de forma natural sin perder el dato del texto.
- source_word: ϩⲉ ⲉ-
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - topó con
  - cayó sobre
  lexicon: Crum 657a
  rationale: Aunque el verbo puede conservar un matiz de «caer sobre», el valor idiomático aquí es claramente «encontrar». «Encontró» es la opción más clara y fiel.
- source_word: ⲉⲛⲁⲛⲟⲩϥ
  english_pob_choice: fine
  chosen_spanish: bueno
  alternatives_spanish:
  - hermoso
  - valioso
  lexicon: Crum 227b
  rationale: El adjetivo modifica al pez grande como «bueno» en el sentido de bueno/valioso. «Bueno» mantiene la correspondencia más directa y evita introducir una valoración no atestiguada más específica.
- source_word: ⲁϥⲛⲟⲩϫⲉ
  english_pob_choice: he threw
  chosen_spanish: echó
  alternatives_spanish:
  - arrojó
  - tiró
  lexicon: Crum 297b
  rationale: «Echó» es una equivalencia natural en español para el acto de arrojar o lanzar, y suena más idiomática que una forma más pesada.
- source_word: ⲉⲡⲉⲥⲏⲧ
  english_pob_choice: down
  chosen_spanish: de nuevo al mar
  alternatives_spanish:
  - abajo
  - hacia abajo al mar
  lexicon: Crum 64a
  rationale: El coptico marca dirección descendente; en español, por contexto narrativo, «de nuevo al mar» comunica el resultado sin forzar una construcción extraña. La idea de descenso queda implícita en «echó... al mar» y en la acción de volver a arrojar los peces.
- source_word: ⲭⲱⲣⲓⲥϩⲓⲥⲉ
  english_pob_choice: without difficulty
  chosen_spanish: sin dificultad
  alternatives_spanish:
  - sin esfuerzo
  - sin trabajo
  lexicon: Crum 718b
  rationale: El compuesto significa literalmente «sin labor/toil». «Sin dificultad» reproduce bien el sentido general y es una fórmula fluida en español, manteniendo el matiz de ausencia de esfuerzo.
theological_decisions:
- issue: Divergencia con la parábola sinóptica de Mateo 13:47-48
  english_pob_reading: Preserved Thomas's singular focus on the wise fisherman and the single large fish.
  chosen_spanish_reading: Se preserva el foco singular en el pescador sabio y el pez grande y bueno.
  alternative_spanish_readings:
  - 'Armonizar con Mateo: peces buenos y malos, y separación final'
  - Traducir de forma interpretativa hacia un juicio escatológico
  rationale: El testimonio copto de Tomás no presenta una red de arrastre para una selección final de peces buenos y malos, sino la elección de un solo pez valioso. La traducción conserva esa diferencia sin armonizar con Mateo.
  doctrine_reference: Comparación sinóptica; énfasis temático tomasino en la unidad o lo singular
- issue: Función del oyente final
  english_pob_reading: Whoever has ears to hear, let him hear.
  chosen_spanish_reading: El que tenga oídos para oír, que oiga.
  alternative_spanish_readings:
  - Quien tenga oídos para oír, oiga
  - Si alguno tiene oídos para oír, que oiga
  rationale: La fórmula reproduce la exhortación proverbial del texto sin añadir interpretación. «Que oiga» mantiene el tono imperativo/parenético del original.
  doctrine_reference: Fórmula exhortativa proverbial en literatura sinóptica y tomasina
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que corrigió la mala lectura de ⲉⲛⲁⲛⲟⲩϥ como verbo y la identificación posesiva de ⲛⲧⲉϥⲁⲃⲱ como «su red». También se respetó la corrección de que el objeto de «echó» son los peces pequeños, no la red, y que el cierre debe conservar la invitación auditiva final sin insertos editoriales.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o equivalentes de traducción litúrgica porque el texto no contiene el nombre divino.
  - Se prefirió «el ser humano» para conservar el valor genérico de ⲡⲣⲱⲙⲉ.
  - Se mantuvo «pescador sabio» para reflejar la construcción copta con sentido de discernimiento.
  - No se añadió ninguna nota al pie porque no era necesario anclar alternativas textuales en el cuerpo español.
