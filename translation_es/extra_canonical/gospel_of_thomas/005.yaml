revisions:
- from: 'Jesús dice: Conoce lo que está delante de tu rostro[a], y lo que está oculto para ti[b] se te hará manifiesto. Porque no hay nada oculto que no llegue a ser revelado[c].'
  to: 'Jesús dice: Conoce lo que está delante de tu rostro[a], y lo que está oculto de ti se te descubrirá[b]. Porque no hay nada oculto que no llegue a hacerse manifiesto[c].'
  rationale: 'Se ajusta la traducción para reflejar con mayor fidelidad la distinción entre los dos verbos coptos clave: primero ‘descubrir/desvelar’ (ϭⲱⲗⲡ ⲉⲃⲟⲗ) y luego ‘hacerse manifiesto/salir a la luz’ (ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ). También se mejora la precisión de «oculto de ti» frente a «oculto para ti», manteniendo al mismo tiempo un español natural y legible.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T02:59:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del copto: imperativo inicial, contraste entre lo que está delante del oyente y lo oculto, y máxima final sobre lo escondido que llegará a manifestarse. Sin embargo, en dos puntos se aparta de las decisiones léxicas auditadas: ϭⲱⲗⲡ ⲉⲃⲟⲗ (‘ser descubierto/desvelado’) se traduce como «se te hará manifiesto», que desplaza la imaginería de destapar hacia manifestación; y ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ (‘hacerse manifiesto / aparecer’) se vierte como «ser revelado», justo la dirección que la nota inglesa quiso evitar para no confundirlo con revelación técnica. También conviene ajustar «oculto para ti» a «oculto de ti» o «oculto a ti» para reflejar mejor ‘hidden from you’.'
  spanish_quality_summary: El español es claro y digno, pero hay leves roces de naturalidad y consistencia interna. «Delante de tu rostro» funciona si se conserva la nota idiomática. «Oculto para ti» suena menos preciso que «oculto de ti». El par «se te descubrirá / se hará manifiesto» da mejor progresión metafórica que «se te hará manifiesto / revelado».
  glossary_alignment: 'No hay términos del glosario mayor comprometidos aquí. Sí hay que respetar las decisiones léxicas del proyecto para este dicho: conservar la literalidad del idiomático «delante de tu rostro», mantener ϭⲱⲗⲡ como ‘descubrir/desvelar’, y reservar ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ para ‘hacerse manifiesto / salir a la luz’, no «revelar».'
  issues:
  - severity: medium
    issue: La primera cláusula de ϭⲱⲗⲡ ⲉⲃⲟⲗ no conserva bien la metáfora de ‘descubrir/destapar’.
    rationale: El inglés auditado escogió ‘be uncovered’ precisamente para preservar el valor literal de ϭⲱⲗⲡ. «Se te hará manifiesto» adelanta el campo semántico de la cláusula final y borra la distinción entre ambos verbos coptos.
  - severity: high
    issue: La cláusula final traduce ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ como «revelado», contrario a la decisión léxica documentada.
    rationale: El expediente inglés aclara expresamente que aquí el sentido es ‘be made manifest / come to light’, no una ‘revelación’ técnica. En español, «revelado» introduce precisamente esa ambigüedad que la nota busca evitar.
  - severity: low
    issue: «Oculto para ti» es menos exacto que «oculto de ti» o «oculto a ti».
    rationale: La relación sintáctica del copto es ‘hidden from you’, no finalidad o beneficio. «De ti» suena más fiel y suficientemente natural en registro bíblico-literario.
  revised_spanish_text: 'Jesús dice: Conoce lo que está delante de tu rostro[a], y lo que está oculto de ti se te descubrirá[b]. Porque no hay nada oculto que no llegue a hacerse manifiesto[c].'
  revised_footnotes:
  - marker: a
    text: «Delante de tu rostro» traduce literalmente el giro copto; en español significa «justo frente a ti».
    reason: cultural_note
  - marker: b
    text: El verbo copto significa literalmente «descubrir» o «destapar»; también podría traducirse «se te desvelará».
    reason: lexical_alternative
  - marker: c
    text: Aquí el copto significa «hacerse manifiesto» o «salir a la luz», no «ser revelado» en un sentido doctrinal técnico.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la traducción para reflejar con mayor fidelidad la distinción entre los dos verbos coptos clave: primero ‘descubrir/desvelar’ (ϭⲱⲗⲡ ⲉⲃⲟⲗ) y luego ‘hacerse manifiesto/salir a la luz’ (ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ). También se mejora la precisión de «oculto de ti» frente a «oculto para ti», manteniendo al mismo tiempo un español natural y legible.'
