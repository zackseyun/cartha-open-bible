base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/005.yaml
  text: 'Jesus says: Know what is before your face[a], and what is hidden from you will be uncovered[c] to you. For there is nothing hidden that will not be made manifest[d].[b]'
  footnotes:
  - marker: a
    text: ‘Before your face’ is a literal rendering of the Coptic idiom (ⲛⲡⲙⲧⲟ ⲛⲡⲉⲕϩⲟ), meaning ‘right in front of you.’
    reason: cultural_note
  - marker: b
    text: 'POxy 654 adds: ‘and (nothing) buried which will not be raised up.’ The Nag Hammadi Coptic lacks this extra clause; this translation follows the Coptic.'
    reason: textual_variant
  - marker: c
    text: 'ϭⲱⲗⲡ literally ‘uncover’; alternatives: ‘reveal,’ ‘disclose.’'
    reason: lexical_alternative
  - marker: d
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ means ‘become manifest/appear, come to light,’ not ‘live’ in this construction.
    reason: lexical_alternative
