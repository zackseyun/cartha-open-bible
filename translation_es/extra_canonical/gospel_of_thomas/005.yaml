translation:
  language: es
  text: 'Jesús dice: Conoce lo que está delante de tu rostro[a], y lo que está oculto para ti[b] se te hará manifiesto. Porque no hay nada oculto que no llegue a ser revelado[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Delante de tu rostro» traduce literalmente el giro copto; en español significa «justo frente a ti» o «en tu presencia».
    reason: cultural_note
  - marker: b
    text: La idea es «lo que está oculto para ti»; también podría decirse «lo que te ha sido ocultado», pero el copto permite la formulación más breve.
    reason: lexical_alternative
  - marker: c
    text: «Revelado» aquí expresa el sentido de «salir a la luz / hacerse manifiesto» del verbo copto, no una revelación doctrinal técnica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: Conoce
  alternatives_spanish:
  - Reconoce
  - Comprende
  lexicon: Crum; Layton
  rationale: El imperativo breve conserva el tono gnómico y admonitorio del dicho. «Conoce» mantiene la fuerza directa de «know» sin añadir explicación interpretativa.
- source_word: ⲡⲉⲧⲉⲣⲉ ⲛⲡⲙⲧⲟ / ⲡⲉⲕϩⲟ
  english_pob_choice: what is before your face
  chosen_spanish: lo que está delante de tu rostro
  alternatives_spanish:
  - lo que está ante tu rostro
  - lo que está en frente de tu rostro
  lexicon: Crum (ⲙⲧⲟ ‘front, presence’; ⲕϩⲟ ‘face’)
  rationale: «Delante de tu rostro» conserva la imagen concreta y la tensión idiomática del copto. «Rostro» reproduce literalmente la metáfora de «face» y evita una paráfrasis más abstracta.
- source_word: ⲡⲉⲧⲉⲣⲉϩⲱⲡ ⲉⲛⲧⲟⲕ
  english_pob_choice: what is hidden from you
  chosen_spanish: lo que está oculto para ti
  alternatives_spanish:
  - lo que está escondido de ti
  - lo que ha sido ocultado para ti
  lexicon: Crum (ϩⲱⲡ ‘hide, cover’)
  rationale: «Oculto para ti» es idiomático en español y conserva la relación de ocultamiento respecto del destinatario. «Oculto» mantiene la concisión del original.
- source_word: ϭⲱⲗⲡ ⲉⲃⲟⲗ
  english_pob_choice: be uncovered
  chosen_spanish: se te hará manifiesto
  alternatives_spanish:
  - se te descubrirá
  - quedará descubierto para ti
  lexicon: Crum; Layton
  rationale: El copto significa literalmente «ser descubierto/desvelado». En español, «se te hará manifiesto» conserva la idea de salida a la luz y la cadencia proverbial, sin forzar un calco demasiado físico.
- source_word: ⲙⲛⲗⲁⲁⲩ ⲅⲁⲣ
  english_pob_choice: for there is nothing
  chosen_spanish: Porque no hay nada
  alternatives_spanish:
  - Pues no existe cosa alguna
  - Porque nada hay
  lexicon: Layton (idioma de negación universal)
  rationale: La negación universal se expresa de forma natural en español con «no hay nada». Mantiene el valor enfático del copto sin añadir matices doctrinales o estilísticos.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: be made manifest
  chosen_spanish: revelado
  alternatives_spanish:
  - hecho manifiesto
  - puesto de manifiesto
  lexicon: Crum (ⲟⲩⲱⲛϩ II ‘appear, be manifest’)
  rationale: Aquí el verbo expresa hacerse visible/manifestarse. «Revelado» es una equivalencia española natural para el resultado final del proceso y preserva la resonancia proverbial del dicho.
theological_decisions:
- issue: Variante textual del testimonio griego con cláusula adicional
  english_pob_reading: 'The English POB follows the Coptic and notes that POxy 654 adds: ‘and (nothing) buried which will not be raised up.’'
  chosen_spanish_reading: La traducción sigue solo el copto y no incorpora la cláusula adicional.
  alternative_spanish_readings:
  - y nada enterrado que no será levantado
  - y (nada) sepultado que no será resucitado
  rationale: El testimonio base aquí es el copto de Nag Hammadi; la cláusula adicional pertenece al testimonio griego y no al texto copto principal. Por fidelidad textual, no se integra en el cuerpo del versículo, pero queda reflejada en el aparato inglés de referencia.
  doctrine_reference: Crítica textual; testimonio paralelo POxy 654
translation_notes:
  revision_awareness: El borrador sigue la lectura copta principal y mantiene la misma línea textual que el audit trail inglés, sin incorporar la cláusula adicional del testimonio griego paralelo. No se detectaron revisiones posteriores que exigieran cambios.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio del hablante, en coherencia con el estándar del proyecto.
  - Se evita «Señor» o «Cristo» porque no aparecen en este dicho ni son necesarios para el sentido.
  - «Rostro» conserva el literalismo idiomático de la expresión copta sin sobreinterpretarla como «presencia» en el texto principal.
