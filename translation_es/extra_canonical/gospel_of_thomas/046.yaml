base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/046.yaml
  text: 'Jesus said[1], "From Adam until John the Baptist, among the offspring of women, there is no one higher than John the Baptist, so that his eyes will not be cast down. But I have said: whoever among you becomes a child will know the kingdom[4][3][2], and will become higher than John."'
  footnotes:
  - marker: '1'
    text: The Coptic ⲛⲟⲩⲱϭⲡ is a contraction of the negative Third Future ⲛⲛⲉⲩⲟⲩⲱϭⲡ ('they will not be cast down', referring to the plural 'eyes').
    reason: dialect_note
  - marker: '2'
    text: Grammatically, 'his' refers to John the Baptist. Because there is no one higher than him, he does not need to lower his eyes in deference to anyone.
    reason: cultural_note
  - marker: '3'
    text: The preposition ⲁ in ⲁ ⲓⲱϩⲁⲛⲛⲏⲥ ('than John') is a phonetic or dialectal variant of the comparative ⲉ ('than').
    reason: dialect_note
  - marker: '4'
    text: Compare with Matthew 11:11 and Luke 7:28. Thomas adds 'From Adam' and 'so that his eyes will not be cast down,' and shifts the second half from 'the least in the kingdom of heaven is greater' to 'whoever among you becomes a child will know the kingdom, and will become higher.'
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Desde Adán hasta Juan el Bautista, entre los nacidos[b] de mujer, no hay nadie superior[c] a Juan el Bautista, de modo que no baje la mirada[d]. Pero he dicho: quien entre ustedes llegue a ser un niño[e] conocerá el reino[f] y llegará a ser superior a Juan».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El copto presenta una forma abreviada de «Jesús»; se desarrolla el nombre completo por claridad en español.
    reason: source_note
  - marker: b
    text: «Nacidos» refleja el valor de ϫⲡⲟ como progenie o los que han nacido. La alternativa «descendencia» también es posible, pero en español suena más colectiva y menos directa.
    reason: lexical_alternative
  - marker: c
    text: El comparativo copto significa literalmente «más alto»; también puede expresarse como «superior», «mayor» o «más exaltado». Aquí se usa «superior» porque en español aplica mejor a rango u honor, mientras la nota preserva la imagen de altura del original.
    reason: lexical_alternative
  - marker: d
    text: 'La expresión con «ojos» es idiomática: alude a bajar la mirada en señal de deferencia o vergüenza, no a daño físico. Gramaticalmente, la referencia es a Juan el Bautista.'
    reason: cultural_note
  - marker: e
    text: ⲕⲟⲩⲉⲓ puede significar «pequeño» o «niño»; aquí se adopta «niño» porque la comparación apunta a una condición infantil, no solo al tamaño.
    reason: theological_note
  - marker: f
    text: El copto usa un término que puede traducirse «reino» o «reinado». Se mantiene «reino» por claridad y por continuidad con el uso español más extendido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡϫⲡⲟ / ϫⲡⲟ
  english_pob_choice: offspring
  chosen_spanish: nacidos
  alternatives_spanish:
  - descendencia
  - prole
  - engendrados
  lexicon: Crum 778b
  rationale: El campo semántico es el de los nacidos/progenie; en español, «nacidos» conserva la referencia antropológica de manera natural y evita sonar demasiado biológico o técnico en este contexto.
- source_word: ⲫⲁⲉⲓ/ϫⲟⲥⲉ
  english_pob_choice: higher
  chosen_spanish: más alto
  alternatives_spanish:
  - mayor
  - más elevado
  - más exaltado
  lexicon: Crum 788a
  rationale: La comparación apunta a altura/exaltación. «Más alto» mantiene la imagen espacial y permite conservar la tensión del original sin sustituirla por una formulación más interpretativa como «mayor».
- source_word: ⲟⲩⲱϭⲡ
  english_pob_choice: cast down
  chosen_spanish: abatidos
  alternatives_spanish:
  - bajados
  - humillados
  - abatidas
  lexicon: Crum 508a
  rationale: Con «ojos» el sentido idiomático es bajar/abatir la mirada por deferencia o vergüenza. «Abatidos» comunica ese movimiento sin perder el matiz figurado; se eligió la forma masculina plural por concordar con «ojos».
- source_word: ⲕⲟⲩⲉⲓ
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - niño pequeño
  - pequeño
  - pequeñito
  - menor
  lexicon: Crum 130a
  rationale: El inglés POB opta por «child» para reflejar la lectura teológica de retorno a una condición infantil unificada. En español, «niño» es la forma más directa y readable; «un niño» evita forzar «pequeño» como sustantivo.
- source_word: ⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - realeza
  lexicon: Crum 343b
  rationale: El término puede abarcar reino/reinado. Se conserva «reino» por ser la equivalencia más estable y comprensible en español, sin añadir una preferencia doctrinal que el texto no impone.
theological_decisions:
- issue: Preservación de la cláusula sobre los ojos de Juan
  english_pob_reading: so that his eyes will not be cast down
  chosen_spanish_reading: de modo que sus ojos no serán abatidos
  alternative_spanish_readings:
  - para que sus ojos no sean abatidos
  - de modo que no baje la mirada
  rationale: El copt. incluye explícitamente la cláusula sobre los ojos; no debe omitirse. «Sus ojos no serán abatidos» sigue de cerca la imagen idiomática y mantiene la tensión de deferencia/honor que el audit trail documenta.
  doctrine_reference: Crum 508a; audit trail note on the idiom with eyes
translation_notes:
  revision_awareness: El borrador anterior en inglés omitía la cláusula sobre los ojos de Juan y además confundía un valor léxico del copt. La presente versión restaura esa cláusula y mantiene la comparación de altura del final, según el audit trail y la revisión aplicada.
  spanish_consistency_notes:
  - Se usa «Jesús» para la abreviatura copt. del nombre.
  - Se mantiene «reino» como término básico para ⲙⲛⲧⲣⲣⲟ.
  - Se traduce la comparación con «más alto» para conservar la metáfora espacial del original.
  - La cláusula de los ojos se expresa de modo idiomático pero visible en español.
