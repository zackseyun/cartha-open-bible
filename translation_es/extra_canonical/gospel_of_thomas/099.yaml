review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del copto y del POB inglés: los discípulos anuncian la presencia de la familia biológica afuera, y Jesús redefine su familia como quienes hacen la voluntad de su Padre y entrarán en su reino. Sin embargo, el sistema de notas se desalineó con la evidencia auditada: la nota sobre «voluntad» está anclada en «mi Padre» en lugar de en «voluntad»; falta la nota sobre el matiz literal de «están de pie ... afuera»; y varias notas aparecen acumuladas al final de «mi madre» aunque corresponden a otros elementos léxicos posteriores o anteriores.'
  spanish_quality_summary: El español es claro, natural y digno. «Afuera», «la voluntad de mi Padre» y «entrarán en el reino de mi Padre» son formulaciones apropiadas. Conviene simplificar «Los que están aquí y hacen...» a «Los que están aquí, que hacen...» o mantenerlo como está; ambas opciones son comprensibles. La reparación necesaria es principalmente de anclaje y contenido de notas para que reflejen fielmente el expediente inglés y el copto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Padre», «reino» y el lenguaje de parentesco están bien resueltos. No aplica terminología como Yahvé/Mesías. La decisión «hermanos» concuerda con el POB inglés y con el razonamiento lexical dado.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota sobre ⲟⲩⲱϣ ('voluntad')
    rationale: La nota [a] está colocada sobre «mi Padre», pero su contenido trata de «voluntad». Esto confunde el referente léxico y no sigue la disciplina de anclaje requerida.
  - severity: medium
    issue: Falta la nota sobre la literalidad de «están ... afuera»
    rationale: El POB inglés conserva una nota importante sobre el literal «están de pie delante de ellos, afuera». El borrador dice en sus decisiones léxicas que ese matiz se documenta en nota, pero en realidad no aparece ninguna nota correspondiente.
  - severity: medium
    issue: Orden y distribución de notas desalineados
    rationale: Las notas [b]-[f] se acumulan en «mi madre», aunque tratan de «aquí», «entrarán», «reino» y la referencia sinóptica. Deben anclarse en las palabras o frases pertinentes del texto español.
  - severity: low
    issue: Contenido de la nota [a] es torpe y redundante
    rationale: Decir «puede entenderse literalmente como “hacen la voluntad de mi Padre”» no aporta una alternativa real. Debe explicar que ⲟⲩⲱϣ también puede significar «deseo», según el expediente inglés.
