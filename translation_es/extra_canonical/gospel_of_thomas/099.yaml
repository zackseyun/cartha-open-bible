translation:
  language: es
  text: 'Los discípulos le dijeron: «Tus hermanos y tu madre están afuera». Él les dijo: «Los que están aquí y hacen la voluntad de mi Padre[a] —éstos son mis hermanos y mi madre[b][c][d][e][f]. Ellos son los que entrarán en el reino de mi Padre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase copta puede entenderse literalmente como «hacen la voluntad de mi Padre»; el matiz de 'voluntad' traduce ⲟⲩⲱϣ.
    reason: lexical_alternative
  - marker: b
    text: «Aquí» traduce el deíctico ⲡⲉⲓⲙⲁ, literalmente «en este lugar».
    reason: lexical_alternative
  - marker: c
    text: «Entrarán» traduce ⲁⲃⲱⲕ ⲉϩⲟⲩⲛ; también puede decirse «irán dentro».
    reason: lexical_alternative
  - marker: d
    text: «Reino» traduce ⲙⲛⲧⲣⲣⲟ, abstracto de «rey»; literalmente, «la (cosa) del rey».
    reason: cultural_note
  - marker: e
    text: Compárese con Marcos 3:31–35; Mateo 12:46–50; Lucas 8:19–21. Tomás añade de modo singular que 'ellos entrarán en el reino del Padre'.
    reason: cross_reference
  - marker: f
    text: 'El orden de los miembros de la familia en el texto final sigue la secuencia del dicho: ''mis hermanos y mi madre''.'
    reason: source_note
lexical_decisions:
- source_word: ⲥⲛⲏⲩ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  - hermanos/as
  lexicon: Crum, s.v. ⲥⲛⲏⲩ
  rationale: En copto sahídico, el término suele referirse a hermanos varones; el POB inglés eligió 'brothers'. En español, 'hermanos' conserva esa fuerza y mantiene el paralelismo familiar del dicho sin ampliar indebidamente a 'parientes'.
- source_word: ⲙⲁⲁⲩ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  - madre de familia
  lexicon: Crum, s.v. ⲙⲁⲁⲩ
  rationale: Término estándar para 'mother'. 'Madre' es la correspondencia natural y digna en español.
- source_word: ⲛⲧⲟⲟⲩⲱϩ ⲉⲣⲁⲧ ⲛⲧⲟⲟⲩ ϩⲓ ⲡⲥⲁ ⲛⲃⲟⲗ
  english_pob_choice: are standing ... outside
  chosen_spanish: están afuera
  alternatives_spanish:
  - están de pie afuera
  - se hallan afuera
  - están parados afuera
  lexicon: Crum, s.v. ⲟⲩϩ/ⲧⲟⲟⲩⲱϩ; Layton, Grammar §91
  rationale: El POB inglés suaviza la redundancia del manuscrito para lograr una frase natural. En español, 'están afuera' comunica el estado locativo sin cargar la línea con una literalidad pesada; el matiz de estar de pie queda implícito en el contexto y se documenta en nota.
- source_word: ϩⲓ ⲡⲥⲁ ⲛⲃⲟⲗ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  - por fuera
  lexicon: Crum, s.v. ⲥⲁ; Layton, Lexicon s.v. ⲥⲁ ⲛⲃⲟⲗ
  rationale: Expresa con naturalidad la ubicación exterior. 'Afuera' es idiomático en español y conserva la concisión del sintagma copto.
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲡⲉⲓⲙⲁ
  english_pob_choice: Those here
  chosen_spanish: los que están aquí
  alternatives_spanish:
  - los de aquí
  - los presentes
  - los de este lugar
  lexicon: Crum, s.v. ⲡⲉⲓⲙⲁ
  rationale: El deíctico copto apunta a presencia inmediata. 'Los que están aquí' preserva el sentido de presencia sin sonar artificial en español.
- source_word: ⲉⲓⲣⲉ ⲛⲡⲟⲩⲱϣ
  english_pob_choice: do the will
  chosen_spanish: hacen la voluntad
  alternatives_spanish:
  - cumplen la voluntad
  - realizan el deseo
  - practican la voluntad
  lexicon: Crum, s.v. ⲟⲩⲱϣ; Lambdin, Intro to Sahidic §173
  rationale: En este contexto teológico, ⲟⲩⲱϣ tiene el valor de 'will'. 'Hacen la voluntad' reproduce bien el giro bíblico natural en español y conserva la fuerza moral del enunciado.
- source_word: ⲡⲁⲉⲓⲱⲧ
  english_pob_choice: my Father
  chosen_spanish: mi Padre
  alternatives_spanish:
  - mi padre
  - mi Padre celestial
  lexicon: Crum, s.v. ⲉⲓⲱⲧ
  rationale: Se conserva el poseedor de primera persona y la mayúscula reverencial usual en español bíblico para la referencia divina.
- source_word: ⲁⲃⲱⲕ ⲉϩⲟⲩⲛ
  english_pob_choice: enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - irán dentro
  - irán a
  - ingresarán
  lexicon: Crum, s.v. ⲃⲱⲕ; Layton, Grammar §120
  rationale: El POB inglés opta por 'enter' para el compuesto 'go in'. En español, 'entrarán' es el equivalente más claro y elegante en futuro, coherente con la promesa final del dicho.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio
  - realeza
  lexicon: Layton, Lexicon s.v. ⲣⲣⲟ; Crum, s.v. ⲣⲣⲟ
  rationale: Aunque el abstracto copto puede leerse como 'kingdom', en español 'reino' es el equivalente establecido y más comprensible que 'reinado' o 'dominio' en esta formulación.
theological_decisions:
- issue: Referente de 'mi Padre' y mayúscula reverencial
  english_pob_reading: The Father is the divine Father in the saying, and the English translation renders 'my Father' directly.
  chosen_spanish_reading: mi Padre
  alternative_spanish_readings:
  - mi padre
  - mi Padre celestial
  rationale: El dicho distingue la relación con el Padre y el texto habla del reino del Padre; la mayúscula reverencial ayuda a leerlo de manera coherente como referencia divina sin alterar el contenido.
  doctrine_reference: Theological context of divine paternity in the saying; cf. the source's own repeated 'Father' language.
- issue: Final reward/entrance clause
  english_pob_reading: They are the ones who will enter the kingdom of my Father.
  chosen_spanish_reading: Ellos son los que entrarán en el reino de mi Padre
  alternative_spanish_readings:
  - Ellos son los que entran en el reino de mi Padre
  - Ellos son quienes van a entrar en el reino de mi Padre
  rationale: El futuro expresa de forma directa la promesa del texto. No se añade una interpretación escatológica más amplia que la que el dicho mismo enuncia.
  doctrine_reference: Source-limited eschatological wording; no doctrinal expansion beyond the saying.
translation_notes:
  revision_awareness: 'El pasaje presenta una pequeña tensión textual en la línea sobre ''outside'': el copto manuscrito conserva una redacción algo redundante (''standing before them, outside''), mientras que la forma normalizada y la traducción inglesa POB la simplifican a una locución natural. La versión española sigue esa decisión auditada y documenta el matiz en nota. No se registran revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene 'Padre' con mayúscula cuando refiere a Dios, siguiendo el uso reverencial del español bíblico.
  - Se usa 'reino' para ⲙⲛⲧⲣⲣⲟ por ser la forma más natural y transparente en español.
  - Se preserva la secuencia familiar 'hermanos ... madre' sin expandir el término a 'hermanos y hermanas' porque el contexto y la auditoría inglesa favorecen 'brothers'.
