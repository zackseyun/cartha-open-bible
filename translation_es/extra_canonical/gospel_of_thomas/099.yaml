    reason: dialect_note
  - marker: b
    text: «Los que están aquí» traduce ⲡⲉⲧⲉⲣⲉⲛⲡⲉⲓⲙⲁ, literalmente «los que están en este lugar».
    reason: lexical_alternative
  - marker: c
    text: ⲟⲩⲱϣ también puede significar «deseo», además de «voluntad».
