base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/099.yaml
  text: The disciples said to him[a], "Your brothers and your mother are standing outside." He said to them, "Those here who do the will of my Father—these are my brothers and my mother[f][e][d][c][b]. They are the ones who will enter the kingdom of my Father."
  footnotes:
  - marker: a
    text: Lit. 'are standing before them, outside' (ⲛⲧⲟⲟⲩⲱϩ ⲉⲣⲁⲧ ⲛⲧⲟⲟⲩ ϩⲓ ⲡⲥⲁ ⲛⲃⲟⲗ). The prepositional phrase may be redundant with 'outside.'
    reason: dialect_note
  - marker: b
    text: '''Those here'' renders ⲡⲉⲧⲉⲣⲉⲛⲡⲉⲓⲙⲁ, literally ''the ones in this place.'''
    reason: lexical_alternative
  - marker: c
    text: ⲟⲩⲱϣ can mean 'wish/desire' as well as 'will.'
    reason: lexical_alternative
  - marker: d
    text: '''Enter'' translates ⲁⲃⲱⲕ ⲉϩⲟⲩⲛ; ''go in'' is an equally literal option.'
    reason: lexical_alternative
  - marker: e
    text: '''Kingdom'' (ⲙⲛⲧⲣⲣⲟ) is the abstract of ''king'' (ⲣⲣⲟ), literally ''the (thing) of king.'''
    reason: cultural_note
  - marker: f
    text: Compare the family saying in Mark 3:31–35; Matthew 12:46–50; Luke 8:19–21. Thomas uniquely adds 'they will enter the Father’s kingdom.'
    reason: cross_reference
