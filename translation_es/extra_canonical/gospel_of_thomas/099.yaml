  to: 'Los discípulos le dijeron[a]: «Tus hermanos y tu madre están afuera». Él les dijo: «Los que están aquí[b] y hacen la voluntad[c] de mi Padre, éstos son mis hermanos y mi madre[f]. Ellos son los que entrarán[d] en el reino[e] de mi Padre».'
  rationale: La revisión no cambia el sentido principal del texto; corrige la correspondencia entre notas y palabras fuente, restaura la nota literal sobre «afuera/estar de pie», y alinea cada nota con el expediente inglés y la disciplina de marcadores requerida. También se elimina una nota final innecesaria sobre el orden de «mis hermanos y mi madre», porque no forma parte del aparato auditado y no añade claridad textual suficiente.
  reviewer_model: gpt-5.4
