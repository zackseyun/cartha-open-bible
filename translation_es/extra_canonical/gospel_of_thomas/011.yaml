translation:
  language: es
  text: 'Jesús dijo: «Este cielo[a] pasará, y el que está sobre él pasará. Y los muertos no viven, y los vivos no morirán. En el día en que comieron lo muerto, lo hicieron vivir[b]. Cuando lleguen a estar en la luz, ¿qué harán? En el día en que fueron uno[c], se volvieron dos. Pero cuando sean dos, ¿qué harán[d]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Cielo’ traduce aquí ⲡⲉⲓⲡⲉ. También puede entenderse como ‘firmamento’; se elige ‘cielo’ por el marco cosmológico sugerido por la cláusula siguiente.
    reason: lexical_alternative
  - marker: b
    text: 'El copto tiene una construcción causativa: ‘lo hicieron vivir’ expresa que lo muerto fue hecho vivo, sin añadir más explicación de la que el texto permite.'
    reason: cultural_note
  - marker: c
    text: El copto permite una lectura de ‘ser uno’ o ‘hacerse uno’. Se conserva el pasado simple para respetar la secuencia con ‘se volvieron dos’.
    reason: alternative_reading
  - marker: d
    text: La última pregunta repite la anterior con una variante manuscrita en el verbo. Se traduce con la misma pregunta abierta para conservar la fuerza retórica del dicho.
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲉⲓⲡⲉ
  english_pob_choice: this heaven
  chosen_spanish: este cielo
  alternatives_spanish:
  - este cielo
  - este firmamento
  lexicon: Crum; Layton (usage)
  rationale: El coptic permite tanto ‘cielo’ como ‘firmamento’; aquí el paralelo ‘el que está sobre él’ sugiere una estratificación cósmica. En español, ‘cielo’ conserva mejor esa lectura y sigue siendo natural en registro religioso.
- source_word: ⲛⲁⲣⲡⲁⲣⲁⲅⲉ
  english_pob_choice: will pass away
  chosen_spanish: pasará
  alternatives_spanish:
  - pasará
  - pasará de largo
  lexicon: Crum (préstamo de griego παρέρχομαι)
  rationale: La idea es de desaparición/paso irreversible. ‘Pasará’ es más fluido en español y mantiene la gravedad escatológica; ‘pasará de largo’ suena menos preciso en este contexto.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲟⲩ … ⲛⲧⲟⲟⲩⲱⲛϩ ⲁⲛ
  english_pob_choice: the dead are not alive
  chosen_spanish: los muertos no viven
  alternatives_spanish:
  - los muertos no están vivos
  - los que están muertos no viven
  lexicon: Crum (ⲙⲟⲩ ‘morir’; ⲟⲛϩ ‘vivir’)
  rationale: La estructura sentenciosa pide una formulación breve y paralela a la cláusula siguiente. ‘Los muertos no viven’ reproduce la tersura gnómica del original.
- source_word: ⲡⲉⲧⲉⲣⲉⲱⲛϩ … ⲛⲧⲟⲟⲩ ⲛⲁⲙⲟⲩ ⲁⲛ
  english_pob_choice: the living will not die
  chosen_spanish: y los vivos no morirán
  alternatives_spanish:
  - y los que viven no morirán
  - y los vivos no habrán de morir
  lexicon: Crum
  rationale: Se preserva el paralelismo con la cláusula anterior y el futuro negativo de la fuente. ‘No morirán’ es la forma más directa y natural en español.
- source_word: ⲡϩⲟⲟⲩ
  english_pob_choice: the day
  chosen_spanish: En los días
  alternatives_spanish:
  - En los días
  - En el día
  lexicon: Crum
  rationale: El Coptic introduce una pluralidad temporal (‘los días’) en la primera pregunta, seguida por ‘en el día’ más abajo. En español conviene respetar esa diferencia explícita.
- source_word: ⲟⲩⲱⲙ
  english_pob_choice: ate
  chosen_spanish: comían
  alternatives_spanish:
  - comían
  - comieron
  lexicon: Crum
  rationale: El tiempo verbal en español puede ser imperfecto o pretérito según se entienda el marco narrativo. Aquí el imperfecto mantiene el valor durativo/habitual del enunciado sapiencial.
- source_word: ⲡⲉⲧⲉⲣⲉⲙⲟⲩ
  english_pob_choice: what is dead
  chosen_spanish: lo muerto
  alternatives_spanish:
  - lo muerto
  - lo que estaba muerto
  - la cosa muerta
  lexicon: Crum; Layton (relativa ⲡⲉⲧ-)
  rationale: ‘Lo muerto’ conserva la concisión y la cualidad sustantivada del original mejor que una expansión más interpretativa.
- source_word: ⲉⲓⲣⲉ ⲛⲛⲧⲟϥ ⲛⲡⲉⲧⲉⲣⲉⲱⲛϩ
  english_pob_choice: you made it alive
  chosen_spanish: lo hiciste vivir
  alternatives_spanish:
  - lo hiciste vivir
  - lo volviste vivo
  - lo causaste a vivir
  lexicon: Lambdin; Layton (causativa ⲉⲓⲣⲉ ⲛ- + predicación)
  rationale: La construcción causativa pide expresar que el objeto pasó a vida. ‘Lo hiciste vivir’ es idiomático y no debilita la fuerza causal del coptic.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲱⲧⲛ ϣⲱⲡⲉ
  english_pob_choice: when you come to be
  chosen_spanish: Cuando lleguen a estar
  alternatives_spanish:
  - Cuando lleguen a estar
  - Cuando estén
  - Cuando hayan llegado a estar
  lexicon: Layton (prospectivo ⲉⲣϣⲁⲛ- + infinitivo)
  rationale: ‘Lleguen a estar’ conserva el matiz ingresivo/prospectivo del coptic, sin sonar forzado en español.
- source_word: ϩⲛ ⲡⲟⲩⲟⲉⲓⲛ
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - en la luz
  - en la iluminación
  lexicon: Crum
  rationale: ‘Luz’ es la elección más natural en español y mantiene el simbolismo de revelación propio de Thomas.
- source_word: ⲟⲩ ⲡⲉⲧⲉⲣⲉ … ⲛⲁⲉⲓⲣⲉ ⲛⲧⲟϥ
  english_pob_choice: what will you do?
  chosen_spanish: ¿qué harán?
  alternatives_spanish:
  - ¿qué harán?
  - ¿qué harán con ello?
  - ¿qué harán de él?
  lexicon: Lambdin; Layton (pronombre objeto posiblemente pleonástico)
  rationale: El pronombre objeto del coptic puede ser pleonástico o remitir al referente anterior. En español, ‘¿qué harán?’ preserva la ambigüedad y la fuerza enigmática sin sobreexplicar.
- source_word: ⲉⲓⲣⲉ ⲛⲟⲩⲁ
  english_pob_choice: were one
  chosen_spanish: fueron uno
  alternatives_spanish:
  - fueron uno
  - se hicieron uno
  - eran uno
  lexicon: Layton (ⲉⲓⲣⲉ ⲛ- numeral = ser/hacerse N)
  rationale: El pasado encaja con la secuencia de la frase siguiente (‘se volvieron dos’) y evita introducir una lectura prospectiva que el contexto no exige.
- source_word: ⲁⲛⲧⲱⲧⲛⲉⲓⲣⲉ ⲛⲡⲥⲛⲁⲩ
  english_pob_choice: you became two
  chosen_spanish: se volvieron dos
  alternatives_spanish:
  - se volvieron dos
  - se hicieron dos
  - fueron dos
  lexicon: Crum; Layton
  rationale: ‘Se volvieron dos’ preserva el movimiento desde la unidad a la dualidad y mantiene la secuencia verbal más natural en español que una traducción demasiado literal.
- source_word: ⲛⲁⲁⲁⲛⲧⲟϥ (final question)
  english_pob_choice: what will you do?
  chosen_spanish: ¿qué harán?
  alternatives_spanish:
  - ¿qué harán?
  - ¿qué harán con ello?
  lexicon: Crum (ⲁⲁ ‘tomar’; uso extendido)
  rationale: La lectura manuscrita repite la pregunta final con una variante gráfica de la forma verbal. ‘¿Qué harán?’ permite abarcar ambas posibilidades sin introducir un objeto explícito no seguro.
theological_decisions:
- issue: 'ⲡⲉⲓⲡⲉ: ‘cielo’ vs. ‘cielo/firmamento’'
  english_pob_reading: this heaven
  chosen_spanish_reading: este cielo
  alternative_spanish_readings:
  - este firmamento
  - este cielo
  rationale: No hay una decisión doctrinal fuerte aquí, pero sí una cosmología implícita. ‘Cielo’ conserva la referencia vertical y la lectura de estratos cósmicos sin neutralizarla.
  doctrine_reference: Cosmología implícita; sin referencia doctrinal normativa
- issue: ⲉⲓⲣⲉ ⲛⲟⲩⲁ / ‘were one’ y ‘became two’
  english_pob_reading: On the day when you were one, you became two.
  chosen_spanish_reading: En el día en que fueron uno, se volvieron dos.
  alternative_spanish_readings:
  - En el día en que se hicieron uno, se volvieron dos.
  - En el día en que eran uno, se volvieron dos.
  rationale: Se mantiene la tensión antropológica/simbólica entre unidad y división, sin resolverla hacia una metafísica o una ética específicas. La formulación evita forzar una interpretación dogmática.
  doctrine_reference: Antropología simbólica; no se afirma doctrina canónica
- issue: Final question with variant verb ⲁⲁ vs. ⲉⲓⲣⲉ
  english_pob_reading: what will you do?
  chosen_spanish_reading: ¿qué harán?
  alternative_spanish_readings:
  - ¿qué harán con ello?
  - ¿qué harán de él?
