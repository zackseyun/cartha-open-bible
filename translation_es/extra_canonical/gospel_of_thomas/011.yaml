base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/011.yaml
  text: Jesus said[1], “This heaven will pass away, and the one above it will pass away. And the dead are not alive, and the living will not die. On the days when you ate what is dead, you made it alive. When you come to be in the light, what will you do? On the day when you were one, you became two. But when you become two[5][4][3][2], what will you do?”
  footnotes:
  - marker: '1'
    text: “This heaven” (ⲡⲉⲓⲡⲉ) can also mean “this sky.” The following phrase (“the one above it”) suggests a layered cosmology, hence “heaven.”
    reason: lexical_alternative
  - marker: '2'
    text: '“You made it alive”: the object pronoun likely refers to “what is dead” that was eaten; the causative ⲉⲓⲣⲉ ⲛ- + predicate means “cause it to be living.”'
    reason: cultural_note
  - marker: '3'
    text: '“What will you do?”: Coptic has an object pronoun (ⲛⲧⲟϥ), possibly pleonastic or referring to the ‘light’ or the previously mentioned ‘living thing.’ The translation leaves it implicit.'
    reason: lexical_alternative
  - marker: '4'
    text: '“On the day when you were one, you became two”: idiom ⲉⲓⲣⲉ ⲛⲟⲩⲁ can mean “be one” as well as “make one.” Some take it as prospective (“when you become one, you will become two”), but the following aorist favors a past reference.'
    reason: alternative_reading
  - marker: '5'
    text: 'Final question: the manuscript reads ⲛⲁⲁⲁⲛⲧⲟϥ, using ⲁⲁ (“take, do to”) where the earlier question has ⲉⲓⲣⲉ (“do/make”). Context suggests repetition of the same question; some editors treat this as an orthographic variant.'
    reason: textual_variant
