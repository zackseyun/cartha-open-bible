  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del copto y el rastro de auditoría inglés: preserva el paralelismo entre cielo/cielo superior, muertos/vivos, la construcción causativa de ‘hacer vivir’, el matiz prospectivo de ‘llegar a estar’, y la pregunta final repetida. Sin embargo, hay un desajuste importante de persona y tiempo en ‘En los días en que comían… lo hiciste vivir’: el copto y el inglés tienen segunda persona plural (‘ustedes comieron… ustedes hicieron vivir’), no un cambio a tercera plural seguido de singular. También ‘En los días’ no refleja bien que ⲡϩⲟⲟⲩ es singular en ambos casos (‘el día’ / ‘los días’ en inglés fue interpretativo, no exigido por la fuente).'
  spanish_quality_summary: El español es legible y digno, pero presenta incoherencia pronominal grave (‘comían… hiciste’) y cierta irregularidad de tratamiento al alternar implícitamente ustedes con formas no concordantes. También conviene suavizar ‘lo hiciste vivir’ a plural y mantener la sintaxis más compacta. El resto fluye bien y conserva el tono enigmático de Tomás.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. ‘Jesús’, ‘luz’ y demás decisiones son adecuadas. ‘Este cielo’ encaja con la nota léxica. Las notas b, d y e están bien orientadas; la nota c debe ajustarse a la forma plural revisada. La nota a es innecesaria para el español porque no preserva una alternativa fuente significativa.
  issues:
  - severity: high
    issue: Incoherencia de persona y número en la cláusula de comer/hacer vivir
    rationale: El texto español dice ‘comían’ (3.ª plural) y ‘lo hiciste’ (2.ª singular), mientras que la fuente copta usa segunda plural en ambas acciones y el dicho entero se dirige a ‘ustedes’.
  - severity: medium
    issue: ‘En los días’ sobretraduce ⲡϩⲟⲟⲩ
    rationale: La fuente tiene singular ‘el día’; el inglés ‘On the days’ es una decisión estilística, pero la propia ficha léxica española reconoce la alternativa. En español ‘En el día en que comieron…’ preserva mejor la forma fuente y el paralelismo con la cláusula posterior.
