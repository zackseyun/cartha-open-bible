base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/071.yaml
  text: Jesus said[a], I will cast down this house[c][b], and no one will be able to build it.
  footnotes:
  - marker: a
    text: 'The object after ‘cast down’ is restored: the manuscript shows ⲡⲉϫⲉⲓ︤ⲥ︥ ϫⲉϯⲛⲁϣⲟⲣ[ϣⲣ ⲙⲡⲉⲉ]ⲓ̣ⲏ̣ⲉⲓ; Dilley normalizes to ⲛⲡⲉⲓⲏⲓ (‘this house’).'
    reason: lacuna_or_restoration
  - marker: b
    text: The verb ϣⲕⲱⲧ is ‘be able’ (Crum); the action (‘build’) is inferred from the object ‘house’ and context. Some translations supply ‘rebuild,’ but ‘again’ is not explicit in the Coptic.
    reason: lexical_alternative
  - marker: c
    text: ⲙⲛ̄ⲗⲁⲁⲩ is the negative + indefinite ‘no one’; ⲗⲁⲁⲩ is common across Sahidic/Lycopolitan.
    reason: dialect_note
