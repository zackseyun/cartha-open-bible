translation:
  language: es
  text: 'Jesús dijo[a]: «Yo derribaré esta casa[b], y nadie[c] podrá construirla[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El objeto después de ‘derribaré’ está restaurado: el manuscrito muestra una laguna, y Dilley normaliza aquí ‘esta casa’.'
    reason: lacuna_or_restoration
  - marker: b
    text: El copto ⲡⲉⲓⲏⲓ significa ‘esta casa’; también podría traducirse ‘este edificio’ o ‘esta morada’, pero ‘casa’ es la opción más directa.
    reason: lexical_alternative
  - marker: c
    text: ⲙⲛ̄ⲗⲁⲁⲩ es la combinación de negativo + indefinido, con el sentido de ‘nadie’; ⲗⲁⲁⲩ es una forma común en sahídico y licopolitano.
    reason: dialect_note
  - marker: d
    text: El verbo ϣⲕⲱⲧ significa ‘ser capaz/poder’. La acción específica (‘construirla’) se infiere por el objeto ‘casa’ y el contexto; algunas traducciones ponen ‘reconstruirla’, pero ‘de nuevo’ no está explícito en el copto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Él dijo
  lexicon: Crum; Layton Grammar
  rationale: La fórmula introductoria se conserva de manera directa. El nombre propio explicitado evita una traducción más genérica que debilitaría la identificación del hablante.
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Soy yo quien
  lexicon: Layton Grammar
  rationale: El pronombre independiente aporta énfasis en primera persona; en español, ‘Yo’ comunica ese énfasis sin sobrecargar la frase.
- source_word: ϣⲟⲣϣⲣ
  english_pob_choice: cast down
  chosen_spanish: derribar
  alternatives_spanish:
  - demoler
  - tirar abajo
  lexicon: Crum
  rationale: ‘Derribar’ conserva la fuerza de destrucción física del verbo copto y suena natural en español. ‘Demoler’ sería válido, pero algo más técnico; ‘tirar abajo’ es más coloquial.
- source_word: ⲡⲉⲓⲏⲓ
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este edificio
  - esta morada
  lexicon: Crum
  rationale: El sustantivo básico ‘house’ se vierte mejor como ‘casa’. El demostrativo se mantiene con ‘esta’ para reflejar el énfasis deíctico del original.
- source_word: ⲙⲛ̄ⲗⲁⲁⲩ
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no uno
  lexicon: Layton Grammar; Crum
  rationale: La construcción negativa indefinida se expresa de forma idiomática con ‘nadie’, equivalente natural de ‘no one’.
- source_word: ϣⲕⲱⲧ
  english_pob_choice: be able
  chosen_spanish: podrá
  alternatives_spanish:
  - será capaz de
  - tendrá poder para
  lexicon: Crum
  rationale: En este contexto, el verbo expresa capacidad/poder. El español condensa ese valor con ‘podrá’, que transmite posibilidad efectiva sin introducir un matiz ajeno.
- source_word: ⲛⲧⲟϥ
  english_pob_choice: it (obj. clitic)
  chosen_spanish: -la
  alternatives_spanish:
  - lo
  - ella
  lexicon: Layton Grammar
  rationale: El clítico objeto remite a la ‘casa’; en español conviene concordarlo en femenino con ‘casa’, por lo que ‘-la’ refleja el objeto implícito del verbo ‘construir’.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia con el pasaje base y no se introdujeron cambios respecto al último repaso: el ajuste principal consiste en reflejar en español la restauración de ‘esta casa’ y la inferencia contextual de ‘construirla’.'
  spanish_consistency_notes:
  - Se conservó ‘Jesús’ como forma nominal plena para la fórmula de habla.
  - Se prefirió ‘casa’ en vez de un término arquitectónico más técnico, por fidelidad al sustantivo copto.
  - ‘Nadie podrá’ mantiene el valor negativo indefinido sin añadir énfasis ajeno al texto.
  - La inferencia verbal ‘construirla’ se marcó con nota porque la idea de construir se desprende del contexto y del objeto, no de una forma verbal explícita en el copto.
