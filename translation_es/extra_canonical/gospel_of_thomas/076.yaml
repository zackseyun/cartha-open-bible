translation:
  language: es
  text: 'Jesús dijo: «El Reinado del Padre es como un comerciante. Tenía una remesa de mercancías y encontró una perla. El comerciante era prudente: vendió[a] la remesa y compró la perla única para él. También ustedes[b], busquen su[c] tesoro que no se agota, que permanece: el lugar donde no entra la polilla para comérselo, ni el gusano[d] lo destruye».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «dio la remesa fuera». En este contexto de compra y venta, el giro idiomático significa vender o liquidar la mercancía.
    reason: lexical_alternative
  - marker: b
    text: El copto tiene un énfasis explícito en la segunda persona plural («también ustedes»), no un reflexivo. Por eso no se traduce como «para ustedes mismos».
    reason: lexical_alternative
  - marker: c
    text: '«Su tesoro»: hay una dificultad ortográfica en este punto en el manuscrito, normalizada como «su tesoro»; la traducción sigue esa lectura normalizada.'
    reason: lacuna_or_restoration
  - marker: d
    text: Tomás dice «gusano», no «óxido» como en algunos paralelos sinópticos; la imagen es de deterioro orgánico, no de corrosión.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ ⲛⲡⲉⲓⲱⲧ
  english_pob_choice: the Reign of the Father
  chosen_spanish: La Realeza del Padre
  alternatives_spanish:
  - El Reino del Padre
  - El Reinado del Padre
  lexicon: Layton; Crum (s.v. ⲣⲣⲟ)
  rationale: El coptico apunta a la noción abstracta de realeza/gobierno más que a un territorio. «Realeza» conserva ese matiz en español, mientras «del Padre» mantiene el genitivo original.
- source_word: ⲣⲱⲙⲉ ⲛϣⲱⲧ
  english_pob_choice: merchant
  chosen_spanish: un comerciante
  alternatives_spanish:
  - un mercader
  - un tratante
  lexicon: Crum (s.v. ϣⲱⲧ)
  rationale: En el contexto comercial de la parábola, «comerciante» comunica de forma natural la profesión indicada por el término coptico.
- source_word: ⲫⲟⲣⲧⲓⲟⲛ
  english_pob_choice: consignment (of goods)
  chosen_spanish: una remesa de mercancías
  alternatives_spanish:
  - un cargamento de mercancías
  - una consignación de bienes
  lexicon: Greek loan (φορτίον) as used in Coptic; cf. Layton notes
  rationale: El préstamo griego expresa un lote transportable/negociable. «Remesa de mercancías» conserva el valor mercantil y suena natural en español.
- source_word: ⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ
  english_pob_choice: pearl
  chosen_spanish: perla
  lexicon: Greek loan μαργαρίτης
  rationale: Es el equivalente directo y establecido del préstamo griego.
- source_word: ⲥⲁⲃⲉ
  english_pob_choice: prudent
  chosen_spanish: prudente
  alternatives_spanish:
  - sabio
  - sensato
  lexicon: Crum (s.v. ⲥⲁⲃⲉ)
  rationale: La prudencia aquí es económica y práctica; «prudente» preserva ese valor sin sobrerreligiosizar el rasgo.
- source_word: ϯ … ⲉⲃⲟⲗ (ϯⲡⲫⲟⲣⲧⲓⲟⲛ ⲉⲃⲟⲗ)
  english_pob_choice: sold (the consignment)
  chosen_spanish: vendió la remesa
  alternatives_spanish:
  - dispusó de la remesa
  - entregó la remesa
  lexicon: Crum (s.v. ϯ) for ‘give’; idiomatic commercial use; Layton (syntax)
  rationale: El copto dice literalmente «dio ... fuera», pero en una escena de compra-venta la equivalencia idiomática natural es «vendió». La adición de «la remesa» mantiene el referente del objeto comercial.
- source_word: ⲟⲩⲱⲧ (with ⲡⲓⲙⲁⲣⲅⲁⲣⲓⲧⲏⲥ)
  english_pob_choice: the one pearl
  chosen_spanish: la única perla
  alternatives_spanish:
  - la perla única
  - esa sola perla
  lexicon: Layton (numerals)
  rationale: El numeral con artículo subraya singularidad y exclusividad; «única» lo transmite con claridad en español.
- source_word: ϩⲱⲱⲛⲧⲱⲧⲛ
  english_pob_choice: You too
  chosen_spanish: También ustedes
  alternatives_spanish:
  - Ustedes también
  - Por su parte, ustedes
  lexicon: Lambdin (pronouns/reflexive)
  rationale: La forma coptica es un intensificador/adverbio de énfasis, no un reflexivo. «También ustedes» reproduce el valor inclusivo y el contraste con el comerciante.
- source_word: ⲛⲥⲁⲡⲉϥⲁϩⲟ
  english_pob_choice: his treasure
  chosen_spanish: su tesoro
  alternatives_spanish:
  - su riqueza
  - su fortuna
  lexicon: Crum (s.v. ⲁϩⲟ)
  rationale: El término puede significar riqueza o tesoro. En el contexto de buscar algo perdurable, «tesoro» es la opción más natural y fiel a la imaginería del dicho.
- source_word: ⲱϫⲛ
  english_pob_choice: fail
  chosen_spanish: se agota
  alternatives_spanish:
  - falla
  - se acaba
  lexicon: Crum (s.v. ⲱϫⲛ)
  rationale: En una construcción negativa relativa, el sentido es de algo que no se extingue ni pierde vigor. «Se agota» expresa bien esa idea en español contemporáneo.
- source_word: ⲙⲟⲟⲩⲛ ⲉⲃⲟⲗ
  english_pob_choice: endures
  chosen_spanish: permanece
  alternatives_spanish:
  - dura
  - subsiste
  lexicon: Crum (s.v. ⲙⲟⲟⲩⲛ)
  rationale: El verbo indica permanencia. «Permanece» encaja con el paralelismo con «no se agota».
- source_word: ϫⲟⲟⲗⲉⲥ
  english_pob_choice: moth
  chosen_spanish: la polilla
  alternatives_spanish:
  - la oruga de la ropa
  - la polilla nocturna
  lexicon: Crum (s.v. ϫⲟⲟⲗⲉⲥ)
  rationale: Es el insecto que corroe textiles; «polilla» es el equivalente estándar y transparente.
- source_word: ⲡϥⲛⲧ
  english_pob_choice: worm
  chosen_spanish: el gusano
  alternatives_spanish:
  - la larva
  - el bicho
  lexicon: Crum (s.v. ⲫⲛⲧ)
  rationale: El texto no habla de óxido sino de descomposición orgánica. «Gusano» mantiene esa imagen y evita una actualización indebida.
- source_word: ⲧⲁⲕⲟ
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - devora
  - arruina
  lexicon: Crum (s.v. ⲧⲁⲕⲟ)
  rationale: El verbo significa arruinar, echar a perder o destruir. «Destruye» es la opción más directa y sobria.
theological_decisions:
- issue: Cómo traducir ⲡⲙⲛⲧⲣⲣⲟ ⲛⲡⲉⲓⲱⲧ
  english_pob_reading: the Reign of the Father
  chosen_spanish_reading: La Realeza del Padre
  alternative_spanish_readings:
  - El Reino del Padre
  - El Reinado del Padre
  rationale: 'No hay una decisión doctrinal explícita aquí, pero sí una matización conceptual: la frase apunta al gobierno/autoridad del Padre. «Realeza» preserva el matiz de soberanía sin reducirlo a espacio territorial.'
  doctrine_reference: N/A — lexical/theological nuance of kingship/reign
- issue: Tratamiento del cierre con la imagen de la polilla y el gusano
  english_pob_reading: where no moth comes in to eat it, and no worm destroys
  chosen_spanish_reading: el lugar donde no entra la polilla para comerlo, ni el gusano lo destruye
  alternative_spanish_readings:
  - donde no entra polilla y el gusano no destruye
  - donde ni la polilla ni el gusano lo corrompen
  rationale: El copto conserva la imagen de deterioro orgánico y consumo, no la de corrosión metálica. Mantener «polilla» y «gusano» evita homogeneizar el dicho con paralelos sinópticos donde aparece 'rust'.
  doctrine_reference: N/A — cross-textual image preservation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la sobretraducción de ϩⲱⲱⲛⲧⲱⲧⲛ como reflexivo. La versión española sigue el valor adverbial/emfático («También ustedes») y no añade «para ustedes mismos». También se incorporó la preferencia revisada de traducir ϯⲡⲫⲟⲣⲧⲓⲟⲛ ⲉⲃⲟⲗ de manera idiomática como acción de venta.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como máscara; no aparece en este dicho.
  - Se conserva la imagen mercantil con un equivalente natural en español ('remesa de mercancías').
  - Se mantiene la distinción orgánica de 'polilla' y 'gusano' sin sustituirla por imágenes de corrosión.
  - No se introduce 'Cristo' ni terminología litúrgica ajena al texto.
  - La frase final se ajusta a la corrección crítica del audit trail sobre ϩⲱⲱⲛⲧⲱⲧⲛ.
