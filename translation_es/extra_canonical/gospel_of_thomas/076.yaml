base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/076.yaml
  text: 'Jesus said[a], “The Reign of the Father is like a merchant. He had a consignment of goods, and he found a pearl. The merchant was prudent: he sold the consignment and bought the one pearl for himself. You too, seek his treasure that does not fail, that endures—the place where no moth comes in to eat it[e][d][c][b], and no worm destroys.”'
  footnotes:
  - marker: a
    text: 'He sold the consignment: lit. “he gave the consignment out.” In the buy/sell context this idiom denotes selling or otherwise liquidating the goods.'
    reason: lexical_alternative
  - marker: b
    text: 'Seek for yourselves: the Coptic has an explicit reflexive (ϩⲱⲱⲛⲧⲱⲧⲛ), emphasizing personal appropriation.'
    reason: cultural_note
  - marker: c
    text: 'His treasure: Dilley notes an orthographic issue at this point (ⲛⲥⲁⲡⲉ{ϥ}ⲉ/ϩⲟ), normalized as ⲛⲥⲁⲡⲉϥⲁϩⲟ. The translation follows the normalized reading.'
    reason: lacuna_or_restoration
  - marker: d
    text: 'Where no moth…nor worm: Thomas has ‘worm’ (ⲡϥⲛⲧ), not ‘rust’ as in some Synoptic parallels; the image is of organic decay rather than corrosion.'
    reason: cross_reference
  - marker: e
    text: Or 'You too, seek for yourselves his treasure'.
    reason: previous_rendering
