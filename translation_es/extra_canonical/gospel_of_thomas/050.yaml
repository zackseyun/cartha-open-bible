translation:
  language: es
  text: 'Jesús dijo[a]: «Si les dicen: “¿De dónde han llegado a ser?”, díganles: “Hemos salido de la luz, del lugar donde la luz llegó a ser por sí misma, se alzó y fue revelada en la imagen de ellos[b]”. Si les dicen: “¿Son ustedes eso?”[c], digan: “Nosotros somos sus hijos y somos los escogidos del Padre vivo”. Y si les preguntan: “¿Cuál es la señal de su Padre que está en ustedes?”[d], díganles: “Es movimiento y reposo”[e]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Han llegado a ser» traduce el valor de ϣⲱⲡⲉ en la pregunta sobre el origen; también podrían decirse «han venido a existir» o «han surgido».
    reason: alternative_reading
  - marker: b
    text: «La imagen de ellos» traduce ⲡⲉⲩϩⲓⲕⲱⲛ. El posesivo es plural, pero su antecedente es ambiguo en el contexto; por eso no se armoniza a «su imagen» ni a «la imagen de él».
    reason: textual_variant
  - marker: c
    text: «¿Son ustedes eso?» refleja una construcción copta elíptica y abrupta; también podría entenderse «¿Son ustedes ello?» o «¿Son ustedes eso mismo?».
    reason: dialect_note
  - marker: d
    text: 'O «¿Cuál es la señal de su Padre en ustedes?». El relativo copto modifica a «Padre»: «su Padre que está en ustedes».'
    reason: previous_rendering
  - marker: e
    text: «Movimiento» también puede traducirse «moción»; «reposo», «descanso». La respuesta se entiende en sentido abstracto, no como acciones físicas concretas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲛ̄ⲧⲁⲧⲉⲧⲛ̄ϣⲱⲡⲉ ⲉⲃⲟⲗ
  english_pob_choice: have you come into being
  chosen_spanish: han llegado a ser
  alternatives_spanish:
  - han venido a existir
  - han surgido
  lexicon: Crum s.v. ϣⲱⲡⲉ; Lambdin §126
  rationale: ϣⲱⲡⲉ con ⲉⲃⲟⲗ expresa origen o surgimiento; en español, «llegar a ser» comunica el sentido de venir a la existencia sin introducir un movimiento físico que el Coptic no exige.
- source_word: ⲛⲉⲓ ⲉⲃⲟⲗ ϩⲛⲡⲟⲩⲟⲉⲓⲛ
  english_pob_choice: have come forth from the light
  chosen_spanish: hemos salido de la luz
  alternatives_spanish:
  - hemos venido de la luz
  - hemos procedido de la luz
  lexicon: Crum s.v. ϣⲱⲡⲉ, ⲉⲓ; Crum s.v. ⲟⲩⲟⲉⲓⲛ
  rationale: El verbo de movimiento en este miembro describe proceder desde la luz; «salido de» conserva la procedencia y evita repetir mecánicamente la misma construcción que en la pregunta anterior.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: came into being
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - vino a ser
  - se hizo
  lexicon: Crum s.v. ϣⲱⲡⲉ
  rationale: Para la luz, el español «llegó a ser» mantiene el carácter originario y evita un giro demasiado filosófico o técnico.
- source_word: ⲟⲩⲱϩⲉ
  english_pob_choice: stood
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se puso de pie
  - permaneció
  lexicon: Crum s.v. ⲟⲩⲱϩⲉ
  rationale: Aunque el verbo base es «estar de pie», en esta secuencia cosmogónica la acción no describe posture corporal sino la fijación/estabilidad de la luz; «se detuvo» preserva la idea de establecerse sin forzar una imagen corporal extraña en español.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: was revealed
  chosen_spanish: fue revelada
  alternatives_spanish:
  - se manifestó
  - apareció
  lexicon: Crum s.v. ⲟⲩⲱⲛϩ; Layton Grammar §125
  rationale: «Fue revelada» mantiene la pasiva y la dimensión epifánica del verbo con ⲉⲃⲟⲗ.
- source_word: ⲡⲉⲩϩⲓⲕⲱⲛ
  english_pob_choice: their image
  chosen_spanish: su imagen
  alternatives_spanish:
  - la imagen de ellos
  - su semejanza
  lexicon: Crum s.v. ⲏⲕⲱⲛ
  rationale: Aunque el plural posesivo del copto puede sugerir «su imagen», el antecedente es ambiguo; en español «su imagen» evita decidir indebidamente entre «de ellos» o «de él», como reflejo del problema textual.
- source_word: ⲡⲥⲱⲧⲡ
  english_pob_choice: the chosen
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: Crum s.v. ⲥⲱⲧⲡ
  rationale: El plural nominal se vierte naturalmente como «los escogidos»; mantiene la fuerza de selección sin el tecnicismo eclesial de «los electos».
- source_word: ⲡⲉⲓⲱⲧ ⲉⲧⲟⲛϩ
  english_pob_choice: the living father
  chosen_spanish: el Padre vivo
  alternatives_spanish:
  - el padre que vive
  - el padre viviente
  lexicon: Crum s.v. ⲓⲱⲧ; Layton Grammar §188
  rationale: La construcción relativa es atributiva; «Padre vivo» es conciso, fiel y natural en español, y conserva la mayúscula reverencial cuando se trata del referente divino.
- source_word: ⲡⲙⲁⲉⲓⲛ
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - marca
  - token
  lexicon: Crum s.v. ⲙⲁⲉⲓⲛ
  rationale: «Señal» es idiomática en español para un indicio o marca identificadora; evita un tecnicismo innecesario.
- source_word: ⲕⲓⲙ
  english_pob_choice: movement
  chosen_spanish: movimiento
  alternatives_spanish:
  - moción
  - desplazamiento
  lexicon: Crum s.v. ⲕⲓⲙ
  rationale: «Movimiento» preserva el sustantivo abstracto y corresponde al estilo gnómico del dicho.
- source_word: ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  english_pob_choice: rest
  chosen_spanish: reposo
  alternatives_spanish:
  - descanso
  - quietud
  lexicon: Crum s.v. ⲁⲛⲁⲡⲁⲩⲥⲓⲥ
  rationale: «Reposo» es una alternativa española natural y elevada para el término griego prestado, y conserva mejor el tono sentencioso que «descanso».
theological_decisions:
- issue: Referencia del Padre que está en ustedes
  english_pob_reading: the sign of your father who is in you
  chosen_spanish_reading: la señal de su Padre que está en ustedes
  alternative_spanish_readings:
  - la señal del Padre que está en ustedes
  - la señal de su padre que está en ustedes
  rationale: La sintaxis copta permite que el relativo modifique a «Padre», no solo a «señal»; el español refleja esa relación sin resolver en exceso la ambigüedad del posesivo, que el testimonio textual no elimina por completo.
  doctrine_reference: Coptic syntax / theological indwelling language in Thomas 50
- issue: Filiación y elección
