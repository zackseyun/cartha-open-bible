translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la primera pregunta a «come into being» y la nota sobre la ambigüedad del Padre «en ustedes». La redacción española evita el calco de «come forth» para el primer miembro y distingue el origen en la pregunta del origen/procedencia en la respuesta, siguiendo la relación lexical de ϣⲱⲡⲉ y el verbo de movimiento para «salido».
  spanish_consistency_notes:
  - Se conservó el tratamiento directo en plural («digan», «les dicen») como en el copto y el inglés auditado.
  - Se mantuvo «Jesús» al inicio como nombre propio establecido.
  - Se empleó «Padre vivo» con mayúscula reverencial para coherencia con el registro bíblico en español.
  - Se evitó «Cristo» y «SEÑOR» porque no aparecen en el segmento ni son requeridos por el testimonio fuente.
  - Se usó «escogidos» en lugar de «electos» para un español más natural y menos eclesiástico.
  - Se evitó masculinizar o singularizar la imagen/posesivo donde el copto mantiene ambigüedad textual.
