base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/050.yaml
  text: Jesus said[1], "If they say to you, 'From where have you come into being?', say to them, 'We have come forth from the light—the place where the light came into being by itself, stood, and was revealed in their image.' If they say to you, 'Are you it?', say, 'We are its children, and we are the chosen of the living father.' And if they ask you, 'What is the sign of your father who is in you?'[2], say to them[c][b][a][5][4][3], 'It is movement and rest.'"
  footnotes:
  - marker: '1'
    text: The clause 'the place where the light came into being by itself, stood, and was revealed' preserves three terse verbs (ϣⲱⲡⲉ, ⲟⲩⲱϩⲉ, ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ). The intervening prepositional phrase at NHAM02.41 lb35 is partially restored and its force ('for itself' / 'to itself') is uncertain.
    reason: lacuna_or_restoration
  - marker: '2'
    text: '''Their image'' translates ⲡⲉⲩϩⲓⲕⲱⲛ. The antecedent of ''their'' is ambiguous in context and has been left unresolved rather than harmonized to ''his'' or ''its''.'
    reason: textual_variant
  - marker: '3'
    text: '''The chosen'' renders ⲡⲥⲱⲧⲡ; ''the elect'' is an equally possible gloss that carries stronger traditional connotations.'
    reason: lexical_alternative
  - marker: '4'
    text: '''Movement'' renders ⲕⲓⲙ; ''motion'' is a viable alternative. ''Rest'' renders ⲁⲛⲁⲡⲁⲩⲥⲓⲥ; ''repose'' is a stylistic alternative often used in Thomas translations.'
    reason: lexical_alternative
  - marker: '5'
    text: The question 'Are you it?' reflects an elliptical Coptic copular construction (ⲛⲧⲱⲧⲛ ⲡⲉ) with an implied predicate; the translation preserves the abruptness.
    reason: dialect_note
  - marker: a
    text: Or 'From where have you come forth?'.
    reason: previous_rendering
  - marker: b
    text: Or 'What is the sign of your father in you?'.
    reason: previous_rendering
  - marker: c
    text: Or 'It is a movement and a rest.'.
    reason: previous_rendering
