- from: 'Jesús dijo: «Si les dicen: “¿De dónde han llegado a ser?”, díganles: “Hemos salido de la luz, del lugar donde la luz llegó a ser por sí misma, se detuvo y fue revelada en su imagen”. Si les dicen: “¿Son ustedes eso?”, digan: “Nosotros somos sus hijos y somos los escogidos del Padre vivo”. Y si les preguntan: “¿Cuál es la señal de su Padre que está en ustedes?”[b], díganles[c][b][a]: “Es movimiento y reposo”»[c].'
  to: 'Jesús dijo[a]: «Si les dicen: “¿De dónde han llegado a ser?”, díganles: “Hemos salido de la luz, del lugar donde la luz llegó a ser por sí misma, se alzó y fue revelada en la imagen de ellos[b]”. Si les dicen: “¿Son ustedes eso?”[c], digan: “Nosotros somos sus hijos y somos los escogidos del Padre vivo”. Y si les preguntan: “¿Cuál es la señal de su Padre que está en ustedes?”[d], díganles: “Es movimiento y reposo”[e]»'
