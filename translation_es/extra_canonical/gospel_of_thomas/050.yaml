review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del copto y del POB inglés: mantiene la distinción entre el surgir/llegar a ser de ϣⲱⲡⲉ y el proceder de ⲉⲓ, conserva la brusquedad de «¿Son ustedes eso?» para la cópula elíptica, y refleja bien «movimiento y reposo». Sin embargo, hay dos desajustes importantes: (1) ⲟⲩⲱϩⲉ ‘stood’ se ha llevado a «se detuvo», que cambia ‘estar en pie/establecerse’ por ‘pararse/detenerse’; (2) el texto y las notas no preservan adecuadamente la ambigüedad plural de ⲡⲉⲩϩⲓⲕⲱⲛ ‘their image’, pues «su imagen» en español tiende a borrar la nota auditada del POB. También hay manejo defectuoso de anclajes de notas.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay problemas formales y de precisión: mezcla imperativos («díganles» / «digan»), acumulación confusa de marcadores [c][b][a], y una nota c mal redactada con texto corrupto/redundante. «Llegó a ser» funciona, pero «llegó a existir» o «vino a existir» puede sonar más natural; no es obligatorio cambiarlo. «Padre vivo» y «reposo» son lecturas aceptables.'
  glossary_alignment: No hay choques con la terminología de proyecto principal. Se respeta Jesús, luz, Padre, señal. «Escogidos» es defendible para ⲡⲥⲱⲧⲡ, aunque «los elegidos» también sería posible; no requiere cambio. La principal corrección léxica necesaria es ⲟⲩⲱϩⲉ > «se alzó / permaneció en pie / estuvo en pie» en vez de «se detuvo», y conviene explicitar en nota que «su imagen» representa un plural ambiguo (‘la imagen de ellos’).
  issues:
  - severity: high
    issue: «se detuvo» para ⲟⲩⲱϩⲉ
    rationale: El verbo copto significa ‘estar de pie, ponerse en pie, permanecer en pie’. «Se detuvo» introduce la idea de cesar movimiento, que no está en la fuente y altera la secuencia tersa auditada (‘came into being, stood, was revealed’).
  - severity: high
    issue: No se preserva bien la ambigüedad de ⲡⲉⲩϩⲓⲕⲱⲛ
    rationale: El POB inglés documenta específicamente ‘their image’ con antecedente ambiguo. «Su imagen» en español neutraliza el plural posesivo; conviene mantenerlo en texto como «la imagen de ellos[a]» o equivalente con nota aclaratoria.
  - severity: medium
    issue: Marcadores de nota mal gestionados
    rationale: En el texto aparecen [c][b][a] y un [c] final sin correspondencia clara de alcance. Las notas deben anclarse exactamente donde aplican y en orden único, no acumularse de forma heredada del inglés.
  - severity: medium
    issue: Nota c defectuosa
    rationale: La redacción «también puede entenderse como «reposo» en vez de «reposo»/«descanso»» está corrompida y no comunica la alternativa léxica real (‘reposo’/‘descanso’, ‘movimiento’/‘moción’).
  - severity: low
    issue: Inconsistencia menor en imperativos
    rationale: El borrador alterna «díganles» y «digan». Es mejor uniformar el registro exhortativo.
  revised_spanish_text: 'Jesús dijo[a]: «Si les dicen: “¿De dónde han llegado a ser?”, díganles: “Hemos salido de la luz, del lugar donde la luz llegó a ser por sí misma, se alzó y fue revelada en la imagen de ellos[b]”. Si les dicen: “¿Son ustedes eso?”[c], digan: “Nosotros somos sus hijos y somos los escogidos del Padre vivo”. Y si les preguntan: “¿Cuál es la señal de su Padre que está en ustedes?”[d], díganles: “Es movimiento y reposo”[e]»'
  revised_footnotes:
  - marker: a
    text: «Han llegado a ser» traduce el valor de ϣⲱⲡⲉ en la pregunta sobre el origen; también podrían decirse «han venido a existir» o «han surgido».
    reason: alternative_reading
  - marker: b
    text: «La imagen de ellos» traduce ⲡⲉⲩϩⲓⲕⲱⲛ. El posesivo es plural, pero su antecedente es ambiguo en el contexto; por eso no se armoniza a «su imagen» ni a «la imagen de él».
    reason: textual_variant
  - marker: c
    text: «¿Son ustedes eso?» refleja una construcción copta elíptica y abrupta; también podría entenderse «¿Son ustedes ello?» o «¿Son ustedes eso mismo?».
    reason: dialect_note
  - marker: d
    text: 'O «¿Cuál es la señal de su Padre en ustedes?». El relativo copto modifica a «Padre»: «su Padre que está en ustedes».'
    reason: previous_rendering
  - marker: e
    text: «Movimiento» también puede traducirse «moción»; «reposo», «descanso». La respuesta se entiende en sentido abstracto, no como acciones físicas concretas.
    reason: lexical_alternative
