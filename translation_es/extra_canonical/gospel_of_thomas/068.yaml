    reason: lexical_alternative
  - marker: c
    text: A diferencia de los paralelos sinópticos (Mateo 5:11; Lucas 6:22), Tomás no añade una motivación cristológica para la persecución, como «por mi causa» o «por causa del Hijo del Hombre».
    reason: cross_reference
