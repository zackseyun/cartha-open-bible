base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/068.yaml
  text: Jesus said, “Blessed are you when they hate you and persecute you; and they will find no place in the place where they persecuted you.”
  footnotes:
  - marker: they hate you
    text: 'The Coptic uses the third-person plural for all the verbs in this sequence (hate, persecute, find, persecuted). Because this is the standard Coptic idiom for the passive voice, the saying is often translated: ''Blessed are you when you are hated and persecuted; and no place will be found in the place where you were persecuted.'' Translating it actively, however, preserves the sharp contrast between the persecutors'' actions and their failure to find a ''place''.'
    reason: textual_variant
  - marker: no place in the place
    text: 'The Coptic uses two different words for ''place'' here: the Greek loanword ⲧⲟⲡⲟⲥ (topos, often carrying theological weight in Thomas as a place of spiritual rest or standing) and the native Coptic word ⲙⲁ (ma, a physical location or spot). The persecutors will find no spiritual standing in the physical location of their persecution.'
    reason: lexical_alternative
  - marker: persecuted you
    text: Unlike the Synoptic parallels (Matthew 5:11, Luke 6:22), Thomas lacks a Christological motivation for the persecution (e.g., 'because of me' or 'on account of the Son of Man').
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: false
    changes_summary: Removed the bracketed glosses from the main text and tightened the final clause to read more naturally while preserving the source sense.
translation:
  language: es
  text: 'Jesús dijo: «Bienaventurados ustedes cuando los odien y los persigan; y no encontrarán lugar en el lugar donde los persiguieron».'
  philosophy: formal
lexical_decisions:
- source_word: ⲙⲁⲕⲁⲣⲓⲟⲥ
  english_pob_choice: blessed
  chosen_spanish: bienaventurados
  alternatives_spanish:
  - benditos
  - felices
  lexicon: BDAG
  rationale: La bienaventuranza de Thomas corresponde naturalmente al registro bíblico español de 'bienaventurados', que mantiene el peso declarativo sin banalizarlo como simple felicidad.
- source_word: ⲙⲉⲥⲧⲉ-
  english_pob_choice: hate
  chosen_spanish: odien
  alternatives_spanish:
  - aborrezcan
  - lo repudien
  lexicon: Crum 186a
  rationale: Para conservar la fuerza hostil del verbo coptio, 'odiar' es el equivalente más directo y sobrio en español.
- source_word: ⲇⲓⲱⲕⲉ
  english_pob_choice: persecute
  chosen_spanish: persigan
  alternatives_spanish:
  - hostiguen
  - acosen
  lexicon: BDAG
  rationale: '''Perseguir'' reproduce de manera estándar el valor de διώκω y mantiene la relación con el audit trail inglés.'
- source_word: ϩⲉ ⲉ-
  english_pob_choice: find
  chosen_spanish: encontrarán
  alternatives_spanish:
  - hallarán
  lexicon: Crum 657a
  rationale: '''Encontrar'' es el equivalente más natural en español moderno y conserva el contraste con la ''ubicación'' o ''lugar'' que no se alcanza.'
- source_word: ⲧⲟⲡⲟⲥ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - espacio
  lexicon: BDAG
  rationale: Se mantiene 'lugar' para reflejar el préstamo griego y su posible peso teológico sin forzar un tecnicismo en el cuerpo del texto.
- source_word: ⲙⲁ
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - espacio
  lexicon: Crum 152a
  rationale: Aunque el copto distingue dos términos, en español 'lugar' comunica bien la repetición y permite conservar la tensión lexical sin sobreexplicar en el texto principal.
theological_decisions:
- issue: Valor del sujeto plural en la serie verbal
  english_pob_reading: Active ('they hate you... they will find no place')
  chosen_spanish_reading: Activa ('los odien... los persigan; y no encontrarán lugar')
  alternative_spanish_readings:
  - 'Pasiva: ''cuando sean odiados y perseguidos; y no se encontrará lugar'''
  rationale: El copto usa la tercera persona plural en toda la secuencia; siguiendo el POB inglés, se conserva el sujeto activo para preservar el contraste retórico entre los perseguidores y su fracaso final.
  doctrine_reference: Observación gramatical/textual del copto; no implica afirmación doctrinal independiente.
- issue: Diferencia entre ⲧⲟⲡⲟⲥ y ⲙⲁ
  english_pob_reading: no place in the place
  chosen_spanish_reading: '''no encontrarán lugar en el lugar'''
  alternative_spanish_readings:
  - '''no encontrarán un lugar en el sitio'''
  - '''no tendrán cabida en el lugar'''
  rationale: 'La repetición literal conserva la distinción auditada por el POB: un ''lugar'' más cargado y otro más concreto. En español, la repetición puede sonar dura, pero refleja la tensión del original y evita aplanarla.'
  doctrine_reference: Distinción léxica copta entre préstamo griego y vocablo nativo; peso teológico sugerido por el audit trail inglés.
- issue: Ausencia de motivación cristológica explícita
  english_pob_reading: Thomas lacks a Christological motivation for the persecution
  chosen_spanish_reading: Sin añadidos como 'por mi causa'
  alternative_spanish_readings:
  - '''por mi causa'''
  - '''por causa del Hijo del Hombre'''
  rationale: No se introduce una motivación ausente en el testimonio copto. El español conserva la sobriedad del dicho de Tomás y sigue el aviso cruzado del POB inglés.
  doctrine_reference: 'Paralelos sinópticos: Mt 5:11; Lc 6:22'
translation_notes:
  revision_awareness: 'Se corrigió la tendencia a incorporar una paráfrasis final inexistente en el copto. El texto español sigue la revisión crítica del audit trail: la cláusula final expresa únicamente que ''no encontrarán lugar en el lugar donde los persiguieron'', sin añadir ''para entrar en él''.'
  spanish_consistency_notes:
  - Se usa 'Jesús' en la fórmula narrativa inicial, coherente con la normalización del nombre propio.
  - Se mantiene el tuteo plural de segunda persona ('ustedes') por adecuación al español contemporáneo y porque el destinatario colectivo es explícito en el original.
  - No se usó 'SEÑOR' ni 'Cristo' porque el testimonio copto no los exige en este dicho.
  - La repetición de 'lugar' es deliberada y corresponde a la distinción de dos vocablos distintos en copto.
