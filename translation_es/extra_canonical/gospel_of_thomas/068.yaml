review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica del dicho y sigue la decisión auditada de mantener activa la tercera persona plural: los perseguidores odian, persiguen y luego no encuentran lugar. También preserva la repetición de ''lugar'' para reflejar ⲧⲟⲡⲟⲥ / ⲙⲁ. Sin embargo, en la última cláusula el cambio a ''donde los persiguieron'' debilita el valor relativo resumptivo del copto, que corresponde mejor a ''en el lugar donde los persiguieron''. Además, falta trasladar al español las notas del POB inglés sobre la voz activa, la doble palabra para ''lugar'' y la ausencia de motivación cristológica explícita.'
  spanish_quality_summary: El español es claro y legible, pero 'Bienaventurados ustedes' suena menos natural que 'Dichosos ustedes' o 'Bienaventurados son ustedes'. Dado el registro bíblico y la línea léxica documentada, puede mantenerse 'Bienaventurados son ustedes'. La frase final mejora con 'en el lugar donde los persiguieron' para evitar ambigüedad y conservar la preposición presente en el original.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: ''Jesús'', ''bienaventurados'', ''odien'', ''persigan'', ''lugar''. Conviene, no obstante, conservar en notas la distinción entre ⲧⲟⲡⲟⲥ y ⲙⲁ, ya que el texto español por sí solo no puede mostrarla.'
  issues:
  - severity: medium
    issue: La cláusula final omite explícitamente la preposición 'en' antes de 'el lugar donde los persiguieron'.
    rationale: El copto dice literalmente que no hallarán lugar 'en el lugar' donde los persiguieron. El español actual puede entenderse, pero suaviza un elemento presente en la fuente y en el POB inglés.
  - severity: medium
    issue: Faltan las footnotes auditadas del POB inglés.
    rationale: 'El expediente inglés documenta decisiones significativas: activo vs. pasivo, distinción léxica entre dos palabras para ''lugar'' y ausencia de motivación cristológica. Dado que el español mantiene opciones potencialmente ambiguas, estas notas deben preservarse.'
  - severity: low
    issue: '''Bienaventurados ustedes'' suena algo incompleto en español eclesial general.'
    rationale: Aunque comprensible, 'Bienaventurados son ustedes' fluye mejor y mantiene el tono digno sin alterar el sentido.
  revised_spanish_text: 'Jesús dijo: «Bienaventurados[a] son ustedes cuando los odien y los persigan[c]; y no encontrarán lugar[b] en el lugar donde los persiguieron»'
  revised_footnotes:
