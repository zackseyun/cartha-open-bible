base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/014.yaml
  text: Jesus said to them[1], "If you fast, you will acquire a sin for yourselves; and if you pray, you will be condemned; and if you give alms, you will do evil to your spirits. And if you go into any land and walk in the regions, if they receive you, eat what they set before you, and heal the sick among them. For what goes into your mouth will not defile you, but what comes out of your mouth[3][2], that is what will defile you."
  footnotes:
  - marker: '1'
    text: Lit. 'they will condemn you', a common Coptic idiom for the passive voice.
    reason: register_note
  - marker: '2'
    text: The Coptic verb ϫⲡⲟ can mean 'acquire' or 'beget'.
    reason: lexical_alternative
  - marker: '3'
    text: 'The Coptic uses left-dislocation for emphasis: ''what they will set before you, eat it; the sick among them, heal them.'''
    reason: register_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús les dijo: «Si ustedes ayunan, se atraerán un pecado; y si oran, serán condenados; y si dan limosna, harán mal a sus espíritus. Y si van a cualquier tierra y recorren las regiones, si los reciben, coman lo que les pongan delante y sanen a los enfermos entre ellos. Porque lo que entra en su boca[a] no los contaminará, sino lo que sale de su boca[a], eso es lo que los contaminará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Su boca» sigue el singular del copto; el sentido es colectivo para los destinatarios.
    reason: source_note
lexical_decisions:
- source_word: ⲣⲛⲏⲥⲧⲉⲩⲉ
  english_pob_choice: fast
  chosen_spanish: ayunen
  alternatives_spanish:
  - hagan ayuno
  - practiquen ayuno
  lexicon: Crum 289b
  rationale: El verbo se refiere al ayuno como práctica religiosa; «ayunen» es natural y fiel en español contemporáneo.
- source_word: ϫⲡⲟ
  english_pob_choice: acquire
  chosen_spanish: se procurarán
  alternatives_spanish:
  - adquirirán
  - se harán
  - contraerán
  lexicon: Crum 778a
  rationale: La idea no es solo «tener» pecado, sino traerlo sobre sí mismos. «Se procurarán un pecado» conserva la fuerza provocadora y la acción reflexiva.
- source_word: ⲕⲁⲧⲁⲕⲣⲓⲛⲉ
  english_pob_choice: condemned
  chosen_spanish: serán condenados
  alternatives_spanish:
  - los condenarán
  - quedarán condenados
  lexicon: Greek loanword (κατακρίνω)
  rationale: El Coptic usa una forma activa con sentido pasivo idiomático; en español conviene la pasiva para reproducir el valor resultativo sin forzar el sujeto implícito.
- source_word: ϯⲉⲗⲉⲏⲙⲟⲥⲩⲛⲏ
  english_pob_choice: give alms
  chosen_spanish: dan limosna
  alternatives_spanish:
  - hacen limosna
  - practican la limosna
  - dan caridad
  lexicon: Greek loanword (ἐλεημοσύνη)
  rationale: «Limosna» es el equivalente más directo y tradicional para el acto de dar a los necesitados, y mantiene el registro religioso del texto.
- source_word: ⲟⲩⲕⲁⲕⲟⲛ
  english_pob_choice: do evil
  chosen_spanish: harán mal
  alternatives_spanish:
  - harán algo malo
  - perjudicarán
  - cometerán mal
  lexicon: Crum 97a; Greek loanword κακόν
  rationale: «Harán mal» comunica la idea de obrar mal sin introducir una abstracción innecesaria; conserva la dureza de la frase respecto al espíritu.
- source_word: ⲡⲛⲉⲩⲙⲁ
  english_pob_choice: spirits
  chosen_spanish: su espíritu
  alternatives_spanish:
  - sus espíritus
  - su aliento
  - su vida interior
  lexicon: Crum 307b; semantic range spirit/breath
  rationale: Aunque el plural del testimonio puede sugerir «espíritus», en español la referencia corporativa a los destinatarios permite «su espíritu» para evitar una frase extraña y mantener la tensión antropológica del texto.
- source_word: ⲁⲕⲁϩ ⲛⲓⲙ / ⲭⲱⲣⲁ
  english_pob_choice: any land / regions
  chosen_spanish: cualquier tierra / las regiones
  alternatives_spanish:
  - cualquier país / las regiones
  - cualquier territorio / las regiones
  - cualquier tierra / los lugares
  lexicon: Crum 9a; Crum 739a
  rationale: '«Tierra» y «regiones» reflejan bien los dos niveles del desplazamiento: un ámbito amplio de destino y luego las zonas por las que se transita.'
- source_word: ⲕⲁ ϩⲁ-
  english_pob_choice: set before
  chosen_spanish: les pongan delante
  alternatives_spanish:
  - les sirvan
  - les coloquen delante
  - les presenten
  lexicon: Crum 95b
  rationale: La expresión idiomática se vuelve natural en español con «poner delante», que mantiene la imagen de hospitalidad y comida servida.
- source_word: ⲑⲉⲣⲁⲡⲉⲩⲉ
  english_pob_choice: heal
  chosen_spanish: sanen
  alternatives_spanish:
  - curen
  - atiendan
  - sanen/curen
  lexicon: Greek loanword (θεραπεύω)
  rationale: «Sanen» preserva el valor bíblico de restaurar la salud, y evita reducirlo a mera atención médica.
- source_word: ϫⲱϩⲙ
  english_pob_choice: defile
  chosen_spanish: contaminará
  alternatives_spanish:
  - manchará
  - profanará
  - impurificará
  lexicon: Crum 797a
  rationale: «Contaminar» expresa bien la impureza ritual/moral que el Coptic señala. Se evita «defilar» por ser menos natural en español moderno.
theological_decisions:
- issue: Ayuno, oración y limosna como prácticas religiosas invertidas en tono provocativo
  english_pob_reading: If you fast... if you pray... if you give alms...
  chosen_spanish_reading: Si ustedes ayunan... y si oran... y si dan limosna...
  alternative_spanish_readings:
  - si ayunan...
  - si hacen oración...
  - si practican limosna...
  rationale: Se conserva el paralelismo y el carácter chocante del dicho sin suavizarlo. El español mantiene el ritmo y la amenaza implícita del texto.
  doctrine_reference: Discernimiento sobre prácticas piadosas; tono sapiencial/parabólico de Thomas
- issue: Relación entre boca, pureza y contaminación
  english_pob_reading: what goes into your mouth will not defile you, but what comes out... will defile you
  chosen_spanish_reading: lo que entra en su boca no los contaminará, sino lo que sale de su boca, eso es lo que los contaminará
  alternative_spanish_readings:
  - no los ensuciará
  - no los profanará
  - no los impurificará
  rationale: Se preserva la oposición moral/ritual del pasaje y el giro final enfático («eso es lo que...»). «Contaminará» mantiene mejor la carga de ϫⲱϩⲙ que alternativas más débiles.
  doctrine_reference: Pureza ritual y moral; dicho afín a la tradición sinóptica, pero aquí sin armonizar más allá del texto copto
- issue: Destino de los enfermos «entre ellos»
  english_pob_reading: the sick among them
  chosen_spanish_reading: a los enfermos entre ellos
  alternative_spanish_readings:
  - a los enfermos allí
  - a los enfermos de entre ellos
  - a sus enfermos
  rationale: «Entre ellos» reproduce con precisión la referencia interna del copto y evita convertirlo en un mero adverbio locativo.
  doctrine_reference: Referencia pronominal y relación huésped/anfitrión en el pasaje
- issue: Pasiva idiomática en ‘serán condenados’
  english_pob_reading: they will condemn you / you will be condemned
  chosen_spanish_reading: serán condenados
  alternative_spanish_readings:
  - los condenarán
  - ustedes serán condenados
  rationale: La forma pasiva en español reproduce el valor idiomático del copto sin atribuir explícitamente el sujeto de la condena, que el texto no desarrolla.
  doctrine_reference: Uso idiomático de pasiva; conservación de ambigüedad agentiva
translation_notes:
  revision_awareness: La redacción se ajusta a la revisión más reciente que corrigió una mala traducción de ϫⲱϩⲙ como ‘weigh down/burden’ y afirmó el valor correcto ‘defile/pollute’. También sigue la corrección de que el movimiento es ‘ir/recorrer las regiones’ y no ‘alojarse’ en un lugar, y conserva la precisión de ‘entre ellos’ para los enfermos. No se introducen armonizaciones externas al dicho copto.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - «Jesús» se mantiene como nombre propio.
