  source_alignment_summary: 'El borrador español sigue bien el sentido global del copto y del POB inglés: mantiene la secuencia provocadora sobre ayuno, oración y limosna; conserva correctamente «serán condenados», «entre ellos», y la corrección clave de ϫⲱϩⲙ como contaminación/impureza y no ‘cargar/pesar’. También refleja bien la instrucción de hospitalidad: comer lo puesto delante y sanar a los enfermos entre los anfitriones. Sin embargo, hay dos desajustes relevantes: (1) «su espíritu» suaviza y singulariza indebidamente ⲡⲉⲧⲛⲡⲛⲉⲩⲙⲁ frente al POB auditado «your spirits»; (2) «se procurarán un pecado» es comprensible pero suena poco natural y algo rebuscado en español bíblico legible. Conviene ajustar a una formulación más natural que conserve la fuerza provocadora.'
