  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido base del copto: futuro relativo en «llegue a conocer», referentes no capitalizados «el padre»/«la madre», voz activa «lo llamarán», y el epíteto con indefinido «hijo de una prostituta», en línea con la revisión auditada del inglés. Sin embargo, las notas no preservan fielmente la documentación del POB: falta una nota explícita sobre el matiz de futuro relativo, se añadió una alternativa no documentada («mujer prostituta»), y la nota inicial «O: Jesús dijo…» no aporta una variante real del sentido fuente.'
  spanish_quality_summary: 'El español es claro, natural y digno. La frase principal suena bien y evita calcos torpes. Aun así, la distribución de notas es poco útil: seis notas sobre el epíteto cargan el final de la cita, mientras el matiz verbal importante de «llegue a conocer» queda sin anotar. Conviene simplificar y alinear las notas con las decisiones léxicas realmente significativas.'
  glossary_alignment: No hay conflicto con la terminología-base del proyecto. «Jesús», «padre», «madre» y «prostituta» están bien. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «prostituta» en vez de «ramera/meretriz» sigue la racionalidad de registro del POB.
  issues:
  - severity: medium
    issue: Falta una nota para el futuro relativo en «llegue a conocer».
    rationale: El inglés POB documenta expresamente que la construcción significa literalmente «el que llegará a conocer / vendrá a conocer», no simplemente «el que conoce». En español se conservó bien en el texto, pero la nota explicativa se perdió.
  - severity: medium
    issue: 'La nota a («O: “Jesús dijo…”») no preserva una alternativa significativa del audit trail.'
    rationale: No explica una variante léxica o sintáctica real del original; solo reformatea el encabezado. Esto desplaza notas más importantes y no añade valor exegético ni traductológico.
  - severity: low
    issue: La nota b introduce «hijo de una mujer prostituta», alternativa no respaldada por el expediente inglés ni necesaria en español.
    rationale: Añade una reformulación perifrástica que no corresponde a una decisión fuente significativa y puede difuminar la concisión dura del epíteto.
  - severity: low
    issue: Hay sobreanotación acumulada al final de la cita.
    rationale: Cinco notas consecutivas sobre «hijo de una prostituta» dificultan la lectura. Es mejor redistribuir y conservar solo las notas con verdadero valor léxico o sintáctico.
