translation:
  language: es
  text: 'Jesús dijo: «El que llegue a conocer[a] al padre y a la madre, lo llamarán “hijo de una prostituta”[b][c][d][e]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La construcción relativa futura copta significa literalmente «el que llegará a conocer» o «el que vendrá a conocer», no simplemente «el que conoce».
    reason: lexical_alternative
  - marker: b
    text: ϣⲏⲣⲉ puede significar «hijo» o «niño»; aquí se prefiere «hijo» por el giro idiomático del epíteto y por el valor masculino del sustantivo en contexto.
    reason: lexical_alternative
  - marker: c
    text: 'ⲙⲟⲩⲧⲉ también puede traducirse «nombrar»: «lo nombrarán».'
    reason: lexical_alternative
  - marker: d
    text: Algunas versiones traducen ⲡⲟⲣⲛⲏ como «ramera» o «meretriz»; se elige «prostituta» por precisión y registro.
    reason: lexical_alternative
  - marker: e
    text: 'La frase copta es activa: «lo llamarán», no una pasiva como «será llamado».'
    reason: source_note
lexical_decisions:
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: come to know
  chosen_spanish: llegue a conocer
  alternatives_spanish:
  - conozca
  - llegue a saber
  - reconozca
  lexicon: Crum, s.v. ⲥⲟⲟⲩⲛ; Layton, Grammar §181
  rationale: La forma relativa futura pide en español un valor prospectivo, no un simple presente gnómico. «Llegue a conocer» conserva la idea de adquisición de conocimiento que el inglés POB quiso marcar con «come to know».
- source_word: ⲡⲉⲓⲱⲧ
  english_pob_choice: the father
  chosen_spanish: el padre
  alternatives_spanish:
  - Padre
  lexicon: Crum, s.v. ⲓⲱⲧ
  rationale: Se conserva el artículo y el sustantivo común en minúscula, sin capitalización interpretativa.
- source_word: ⲡⲙⲁⲁⲩ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - Madre
  lexicon: Crum, s.v. ⲙⲁⲁⲩ
  rationale: Se mantiene el paralelismo con «el padre» y el valor definido del Coptic.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ ⲙⲟⲩⲧⲉ ⲉⲛⲧⲟϥ
  english_pob_choice: they will call him
  chosen_spanish: lo llamarán
  alternatives_spanish:
  - lo van a llamar
  - le llamarán
  - será llamado
  lexicon: Crum, s.v. ⲙⲟⲩⲧⲉ; Layton, Grammar §213
  rationale: El copto presenta una construcción activa con sujeto explícito de tercera plural. En español, «lo llamarán» transmite con naturalidad esa voz activa y la intención onomástica de «call/name».
- source_word: ⲡϣⲏⲣⲉ
  english_pob_choice: the son
  chosen_spanish: hijo
  alternatives_spanish:
  - el hijo
  - niño
  - hijo varón
  lexicon: Crum, s.v. ϣⲏⲣⲉ
  rationale: En la fórmula idiomática española del epíteto, «hijo de» es la forma natural y fiel. El artículo ya queda implícito en la expresión nominal del insulto/epíteto.
- source_word: ⲡⲟⲣⲛⲏ
  english_pob_choice: the prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una meretriz
  - la prostituta
  lexicon: Crum, s.v. loanword ⲡⲟⲣⲛⲏ; Lambdin, §84
  rationale: El sustantivo griego prestado se vierte con un término preciso y de registro sobrio. El análisis morfológico avala «de una prostituta», no «de la prostituta»; el español requiere artículo indefinido por el sentido genitivo no definido.
- source_word: ⲡϣⲏⲣⲉ ⲛⲡⲟⲣⲛⲏ (genitive phrase)
  english_pob_choice: the son of a prostitute
  chosen_spanish: hijo de una prostituta
  alternatives_spanish:
  - hijo de la prostituta
  - hijo de prostituta
  lexicon: Layton, Grammar §69–73 on genitive with articles
  rationale: Se evita aplanar la dureza del epíteto, pero el español idiomático pide un genitivo con artículo indefinido. Esta opción respeta el valor genitivo sin imponer una definitud que el copto no exige.
theological_decisions:
- issue: Titulación y capitalización de figuras parentales
  english_pob_reading: the father / the mother are rendered without interpretive capitalization
  chosen_spanish_reading: el padre / la madre en minúscula
  alternative_spanish_readings:
  - el Padre / la Madre
  rationale: No hay base en el pasaje para convertirlos en títulos teológicos. La minúscula mantiene la neutralidad del referente, como hizo el POB en inglés.
  doctrine_reference: Principio de no-interpretación en títulos no marcados por el texto
- issue: Epíteto socialmente ofensivo
  english_pob_reading: the son of a prostitute preserves the sharp diction of the Coptic while avoiding slang
  chosen_spanish_reading: hijo de una prostituta
  alternative_spanish_readings:
  - hijo de una ramera
  - hijo de una meretriz
  - hijo de la prostituta
  rationale: El texto conserva un insulto o marca social fuerte. «Prostituta» mantiene precisión semántica y registro publicable; no se atenúa a un eufemismo ni se sube a un término más áspero que no aporta fidelidad adicional.
  doctrine_reference: Respeto a la dureza retórica del dicho sin intensificarla artificialmente
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la lectura de ⲙ̄ⲡⲟⲣⲛⲏ: no significa «de la prostituta», sino «de una prostituta». Por eso se evita la definitud y se usa el indefinido en español. También se respetó la observación del audit trail sobre el futuro relativo («llegue a conocer»).'
  spanish_consistency_notes:
  - Se mantiene «Jesús dijo» sin añadir o quitar marcadores de nombre propios.
  - 'Se conserva el orden retórico del original: sujeto relativo, luego predicación del epíteto.'
  - No se capitalizan «padre» y «madre», siguiendo la sobriedad del POB inglés.
  - El epíteto se formula con artículo indefinido para reflejar el genitivo no definido del copto.
