base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/105.yaml
  text: Jesus said[f][e][d][c][b][a], “The one who will come to know the father and the mother—they will call him ‘the son of a prostitute.’”
  footnotes:
  - marker: a
    text: Relative future literally reads “the one who will come to know,” not simply “who knows.”
    reason: lexical_alternative
  - marker: b
    text: The epithet could be rendered idiomatically as “son of a prostitute”; this draft preserves the double definiteness of the Coptic.
    reason: lexical_alternative
  - marker: c
    text: ϣⲏⲣⲉ can mean ‘child’; chosen as ‘son’ here due to the masculine article and conventional idiom.
    reason: lexical_alternative
  - marker: d
    text: ⲙⲟⲩⲧⲉ may also be translated “name” (“they will name him”).
    reason: lexical_alternative
  - marker: e
    text: Some English versions use “whore” for ⲡⲟⲣⲛⲏ; “prostitute” is chosen for precision and register.
    reason: lexical_alternative
  - marker: f
    text: Or 'Jesus said, “The one who will come to know the father and the mother—they will call him ‘the son of the prostitute.’”'.
    reason: previous_rendering
