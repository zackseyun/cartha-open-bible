base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/098.yaml
  text: Jesus said[a], “The Father’s kingship is like a man who wanted to kill a magnate. He drew the sword in his house and drove it into the wall, so that he might find out whether his hand would be strong enough[e][d][c][b]; then he killed the magnate.”
  footnotes:
  - marker: a
    text: “Kingship” renders ⲡⲙⲛⲧⲣⲣⲟ (abstract ‘rule’), not a territorial realm; “kingdom” is a viable alternative.
    reason: lexical_alternative
  - marker: b
    text: The Greek loan ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ denotes a high-ranking ‘great man’; alternatives include “great man,” “nobleman,” or “powerful man.” “Magnate” preserves the social nuance and foreign flavor.
    reason: lexical_alternative
  - marker: c
    text: The clause “whether his hand could go in” translates ⲧⲱⲕ ⲉϩⲟⲩⲛ; it can also mean “be strong enough to enter/penetrate.”
    reason: lexical_alternative
  - marker: d
    text: Or 'whether his hand could go in'.
    reason: previous_rendering
  - marker: e
    text: Or 'a man—a magnate'.
    reason: previous_rendering
