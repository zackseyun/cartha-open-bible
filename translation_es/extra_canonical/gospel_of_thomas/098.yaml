translation:
  language: es
  text: 'Jesús dijo: «La realeza del Padre es como un hombre que quiso matar a un magnate. Sacó la espada en su casa y la clavó en la pared, para saber si su mano sería bastante fuerte[a][b][c][d]; entonces mató al magnate».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Realeza» traduce el abstracto ⲡⲙⲛⲧⲣⲣⲟ; «reino» también sería posible, pero puede sonar más territorial que el coptico.
    reason: lexical_alternative
  - marker: b
    text: «Magnate» conserva el matiz social del préstamo griego ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ; alternativas como «gran hombre» o «hombre poderoso» son viables.
    reason: lexical_alternative
  - marker: c
    text: La frase coptica sobre la mano se refiere a fuerza suficiente para la acción, no solo a movimiento o entrada física.
    reason: lexical_alternative
  - marker: d
    text: «La clavó en la pared» intenta reproducir el empuje violento de la expresión coptica sobre la espada y la pared.
    reason: spanish_style_note
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingship
  chosen_spanish: realeza
  alternatives_spanish:
  - reino
  - reinado
  lexicon: Crum; Layton
  rationale: El abstracto ⲡⲙⲛⲧⲣⲣⲟ apunta al estado o ejercicio de reinar, no a un territorio. «Realeza» conserva esa abstracción en español mejor que «reino» y sigue siendo publicable.
- source_word: ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ
  english_pob_choice: magnate
  chosen_spanish: magnate
  alternatives_spanish:
  - gran hombre
  - noble
  - hombre poderoso
  - alto funcionario
  lexicon: Crum
  rationale: El préstamo griego designa a un hombre de alto rango o gran importancia social. «Magnate» preserva el matiz social y el color extranjero sin volverlo demasiado genérico.
- source_word: ⲧⲱⲕ ⲉϩⲟⲩⲛ
  english_pob_choice: whether his hand would be strong enough
  chosen_spanish: sería bastante fuerte
  alternatives_spanish:
  - tendría fuerza suficiente
  - sería capaz de entrar
  - podría penetrar
  lexicon: Crum
  rationale: La revisión inglesa aclara que el giro trata de fuerza/solidez, no de mero movimiento. En español, «sería bastante fuerte» reproduce esa evaluación de fuerza sin introducir una paráfrasis excesiva.
- source_word: ϫⲟⲧⲥ ⲛⲡϫⲟ
  english_pob_choice: drove it into the wall
  chosen_spanish: la clavó en la pared
  alternatives_spanish:
  - la hundió en la pared
  - la metió en la pared
  - la atravesó hacia la pared
  lexicon: Crum
  rationale: El Coptico describe un empuje violento contra la pared. «Clavó» transmite bien el gesto de fijar con fuerza el arma en una superficie, de manera natural en español.
- source_word: ϣⲱⲗⲙ
  english_pob_choice: drew (the sword)
  chosen_spanish: sacó (la espada)
  alternatives_spanish:
  - desenvainó
  - extrajo
  lexicon: Crum
  rationale: Aunque «desenvainó» es posible, el texto solo asegura que tomó la espada para la acción. «Sacó» es fiel, claro y no añade un detalle no explicitado.
- source_word: ⲙⲟⲩ
  english_pob_choice: kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte a
  - asesinar
  lexicon: Crum
  rationale: El verbo básico de matar se conserva sin intensificarlo con un matiz legal o moral que el pasaje no desarrolla.
- source_word: ⲉⲓⲙⲉ
  english_pob_choice: find out/know
  chosen_spanish: saber
  alternatives_spanish:
  - averiguar
  - conocer
  - enterarse
  lexicon: Crum
  rationale: En la cláusula de propósito, «saber» expresa de forma natural el objetivo de comprobar su propia fuerza; evita sonar más técnico de lo necesario.
- source_word: ⲡⲉⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  lexicon: Crum
  rationale: 'Se conserva la referencia titular fija de Thomas: «el Padre», sin añadir posesivos que el coptico no fuerza.'
theological_decisions:
- issue: ⲡⲙⲛⲧⲣⲣⲟ como soberanía/realeza, no territorio
  english_pob_reading: The Father’s kingship is an abstract rule, not a territorial kingdom.
  chosen_spanish_reading: La realeza del Padre
  alternative_spanish_readings:
  - El reino del Padre
  - El reinado del Padre
  rationale: La decisión evita territorializar el dicho. «Realeza» mantiene el foco en el ejercicio de gobernar, en línea con la lectura auditada del inglés.
  doctrine_reference: Lexical/theological note on mnt-rro abstraction in Thomasine usage
- issue: El giro de fuerza con ⲧⲱⲕ ⲉϩⲟⲩⲛ
  english_pob_reading: whether his hand would be strong enough
  chosen_spanish_reading: si su mano sería bastante fuerte
  alternative_spanish_readings:
  - si su mano tendría fuerza suficiente
  - si su mano podría entrar
  rationale: La revisión inglesa rechazó una lectura de mera entrada física. En español se mantiene la idea de comprobar fuerza suficiente para la acción violenta, sin convertirlo en una explicación interpretativa.
  doctrine_reference: Coptic lexical note on ⲧⲱⲕ
- issue: ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ como título social marcado
  english_pob_reading: magnate preserves social nuance and foreign flavor.
  chosen_spanish_reading: magnate
  alternative_spanish_readings:
  - gran hombre
  - noble
  - hombre poderoso
  rationale: No se reemplaza por un término eclesiástico o moralizante. «Magnate» conserva la extrañeza del préstamo y el nivel social elevado que el texto sugiere.
  doctrine_reference: Lexical note on Greek loanword in Coptic Thomas
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión aplicada al inglés que corrigió la frase del coptico ⲧⲱⲕ ⲉϩⲟⲩⲛ desde una lectura de simple movimiento a una de fuerza suficiente. También se respetó la decisión revisada de tratar ⲟⲩⲣⲱⲙⲉ ⲛ-ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ como un solo referente social ('a magnate').
  spanish_consistency_notes:
  - Se usa «Padre» como título definido, consistente con la tradición del dicho en Thomas.
  - Se evita «Cristo» porque el pasaje no lo contiene ni lo requiere.
  - El registro es sobrio y publicable, con vocabulario que mantiene la extrañeza del original sin sonar arcaizante.
