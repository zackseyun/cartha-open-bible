base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/077.yaml
  text: Jesus said, "I am the light that is over them all. I am the All. It is from me that the All came forth, and to me that the All reached. Split a piece of wood; I am there. Lift up the stone, and you will find me there."
  footnotes:
  - marker: reached
    text: 'The Coptic text features a deliberate wordplay here: the verb ''reached'' (ⲡⲱϩ, pōh) and the imperative ''split'' (ⲡⲱϩ, pōh) in the following sentence are identical in form.'
    reason: register_note
  - marker: Split a piece of wood
    text: In the Greek fragment P.Oxy. 1, the commands to lift the stone and split the wood appear in reverse order and are appended to the end of Saying 30.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Removed stray bracketed note text from the draft and normalized punctuation for readability while preserving the established lexical choices and the full source content.
translation:
  language: es
  text: 'Jesús dijo: «Yo soy la luz que está sobre todos [a]. Yo soy el Todo [b]. De mí salió el Todo, y a mí llegó el Todo [c]. Parte un pedazo de madera; allí estoy. Levanta la piedra, y me encontrarás allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copt. dice literalmente “está sobre todos”; se conserva la imagen espacial sin suavizarla a “supera” o “está por encima de” en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: “El Todo” traduce el sustantivo absoluto ⲡⲧⲏⲣϥ, no un simple “todo” adjetival.
    reason: lexical_alternative
  - marker: c
    text: En el original, la forma verbal y el orden de las frases enfatizan “de mí” y “a mí”; por eso la traducción mantiene esa estructura.
    reason: source_note
lexical_decisions:
- source_word: ⲡⲟⲩⲟⲉⲓⲛ
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la claridad
  - la luz resplandeciente
  lexicon: Crum 219b
  rationale: ⲡⲟⲩⲟⲉⲓⲛ nombra “luz” de forma directa; en español “la luz” conserva la sencillez y la fuerza declarativa del dicho.
- source_word: ⲧⲏⲣϥ
  english_pob_choice: the All
  chosen_spanish: el Todo
  alternatives_spanish:
  - el Todo entero
  - todo
  lexicon: Crum 424a
  rationale: 'La sustantivación absoluta exige mayúscula y artículo: “el Todo” refleja el valor totalizante del copt. mejor que un simple “todo” adjetival.'
- source_word: ⲡⲱϩ
  english_pob_choice: reached
  chosen_spanish: llegó
  alternatives_spanish:
  - alcanzó
  - arribó
  lexicon: Crum 282a
  rationale: Aquí ⲡⲱϩ significa llegar/arribar; “llegó” conserva el movimiento hacia Jesús sin forzar un matiz demasiado abstracto.
- source_word: ⲡⲱϩ
  english_pob_choice: Split
  chosen_spanish: Parte
  alternatives_spanish:
  - Raja
  - Corta
  - Parte en dos
  lexicon: Crum 284b
  rationale: En español, “parte” comunica la acción de dividir una pieza de madera y mantiene el juego verbal con “llegó” mejor que una glosa explicativa dentro del texto.
- source_word: ϣⲉ
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - leño
  - trozo de madera
  lexicon: Crum 550b
  rationale: ϣⲉ puede ser “wood”; “madera” es idiomático en español y suficientemente literal. “Leño” sería más concreto pero menos neutral.
- source_word: ϥⲓ ⲉϩⲣⲁⲓ
  english_pob_choice: Lift up
  chosen_spanish: Levanta
  alternatives_spanish:
  - Alza
  - Levanta hacia arriba
  - Sube
  lexicon: Crum 620b; Crum 65b
  rationale: ϥⲓ con ⲉϩⲣⲁⲓ expresa “levantar/ alzar”; “Levanta” es natural en español y conserva el sentido direccional sin añadir contenido.
- source_word: ϩⲉ ⲉⲣⲟⲉⲓ
  english_pob_choice: you will find me there
  chosen_spanish: me encontrarás allí
  alternatives_spanish:
  - darás conmigo allí
  - me hallarás allí
  lexicon: Crum 654a
  rationale: La construcción no significa “ver”, sino “encontrar/hallarse con”; “me encontrarás allí” reproduce con claridad el valor verbal.
theological_decisions:
- issue: Capitalización y sustantivación de “the All”
  english_pob_reading: the All
  chosen_spanish_reading: el Todo
  alternative_spanish_readings:
  - todo
  - el todo
  rationale: Se conserva la lectura sustantiva y totalizante. La mayúscula ayuda a marcar que no se trata de un adjetivo, sino de una designación absoluta.
  doctrine_reference: Cristología alta / formulación cosmológica del dicho
- issue: Relación entre “came forth” y “reached” en la secuencia
  english_pob_reading: It is from me that the All came forth, and to me that the All reached.
  chosen_spanish_reading: De mí salió el Todo, y a mí llegó el Todo.
  alternative_spanish_readings:
  - El Todo salió de mí, y el Todo llegó a mí.
  - Fue de mí que salió el Todo, y a mí llegó el Todo.
  rationale: El copt. usa una forma enfática que topicaliza los complementos. En español, “De mí salió...” y “a mí llegó...” conserva el énfasis sin volver la frase pesada.
  doctrine_reference: Énfasis sintáctico / fuerza aspectual del segundo perfecto
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente que corrigió dos errores clave: (1) ϥⲓ + ⲉϩⲣⲁⲓ significa “levantar/alzar”, no una acción “bajo la piedra”; (2) ϩⲉ ⲉⲣⲟⲉⲓ significa “encontrar” o “hallar”, no “ver”. También se preservó la reubicación final del dicho con la secuencia correcta: madera primero, piedra después.'
  spanish_consistency_notes:
  - Se usa “Jesús” para ⲓ︤ⲥ︥ / ⲓⲏⲥⲟⲩⲥ.
  - Se mantiene “el Todo” como término técnico del dicho, con mayúscula consistente.
  - Se evita “Señor” o “Cristo” porque no aparecen en este pasaje como equivalentes directos.
  - Se emplea “madera” para ϣⲉ y “Levanta” para ϥⲓ ⲉϩⲣⲁⲓ.
  - Se conserva el paralelismo “De mí... / a mí...” para reflejar la sintaxis enfática del copt.
