base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/031.yaml
  text: Jesus said[1], "No prophet is acceptable in his village[3][2]; a physician does not heal those who know him."
  footnotes:
  - marker: '1'
    text: The Greek fragment P.Oxy. 1 reads 'in his hometown' (πατρίδι) rather than 'village' (ϯⲙⲉ), and 'perform healings for' rather than 'heal'.
    reason: textual_variant
  - marker: '2'
    text: The Coptic prefix ⲙⲁⲣⲉ- (mare-) is used here as the negative aorist ('does not'), a regional dialect spelling of the standard Sahidic ⲙⲉⲣⲉ- (mere-). It should not be confused with the identical-looking jussive prefix ('let').
    reason: dialect_note
  - marker: '3'
    text: Compare Luke 4:24, 'no prophet is accepted in his hometown.' Thomas uniquely pairs this with the aphorism about the physician, though Luke 4:23 quotes the proverb 'Physician, heal yourself' immediately prior.
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo: «Ningún profeta es aceptable en su aldea[a][b]; un médico no cura[c] a los que lo conocen».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El griego de P.Oxy. 1 lee «en su patria» o «en su tierra natal» (πατρίδι) en vez de «en su aldea».
    reason: textual_variant
  - marker: b
    text: 'Compárese Lucas 4:24: «ningún profeta es aceptado en su patria». Tomás empareja de manera distintiva este dicho con el aforismo sobre el médico.'
    reason: cross_reference
  - marker: c
    text: El copto usa aquí la grafía dialectal ⲙⲁⲣⲉ- para el negativo aoristo (equivalente al sahídico estándar ⲙⲉⲣⲉ-), no un jussivo como «dejen que». El griego de P.Oxy. 1 también puede entenderse como «hace curaciones para».
    reason: dialect_note
lexical_decisions:
- source_word: ⲙⲛ̄ⲡⲣⲟⲫⲏⲧⲏⲥ
  english_pob_choice: No prophet
  chosen_spanish: Ningún profeta
  alternatives_spanish:
  - No hay profeta
  - No existe profeta
  lexicon: Crum 171a
  rationale: La construcción negativa funciona como universal negativa; en español, «Ningún profeta» conserva mejor la fuerza sentenciosa y la concisión del original que una perífrasis con «hay/existe».
- source_word: ϣⲏⲡ
  english_pob_choice: acceptable
  chosen_spanish: es aceptable
  alternatives_spanish:
  - es recibido
  - es aceptado
  lexicon: Crum 576a
  rationale: «Aceptable» reproduce el matiz de cualidad o idoneidad del adjetivo, y mantiene la cercanía con la tradición sinóptica sin imponer una preferencia interpretativa fuerte.
- source_word: ϯⲙⲉ
  english_pob_choice: village
  chosen_spanish: aldea
  alternatives_spanish:
  - villa
  - pueblo
  lexicon: Crum 414a
  rationale: El Coptic específico habla de un asentamiento pequeño; «aldea» transmite mejor ese valor que «hometown» y evita armonizar indebidamente con paralelos canónicos. En español, «pueblo» podría sonar más amplio y menos preciso.
- source_word: ⲙⲁⲣⲉⲥⲟⲉⲓⲛ
  english_pob_choice: a physician does not
  chosen_spanish: un médico no
  alternatives_spanish:
  - ningún médico no
  - no hay médico que
  lexicon: Crum 369b
  rationale: Se trata del negativo aoristo dialectal, no de un jussivo. En español, la forma más natural y fiel es «un médico no…», que expresa una verdad general sin sobrecargar la sintaxis.
- source_word: ⲣ̄ⲑⲉⲣⲁⲡⲉⲩⲉ
  english_pob_choice: heal
  chosen_spanish: cura
  alternatives_spanish:
  - sana
  - da sanidad a
  lexicon: BDAG 443
  rationale: El verbo griego prestado θεραπεύειν funciona aquí como «curar/sanar». «Cura» es la opción más directa y idiomática en español para una acción médica general, preservando el paralelismo proverbial.
- source_word: ⲛ̄ⲛⲉⲧ⳿ⲥⲟⲟⲩⲛ ⲙ̄ⲙⲟϥ⳿
  english_pob_choice: those who know him
  chosen_spanish: a los que lo conocen
  alternatives_spanish:
  - a quienes lo conocen
  - a los que lo saben
  lexicon: uso contextual del pronombre relativo y del verbo conocer
  rationale: «Conocen» conserva el sentido relacional de saber/conocer a una persona y evita una lectura intelectualista. La preposición «a» refleja el objeto directo humano en español.
theological_decisions:
- issue: Armonización con paralelos canónicos
  english_pob_reading: village
  chosen_spanish_reading: aldea
  alternative_spanish_readings:
  - hometown
  - pueblo
  rationale: El Coptic usa ϯⲙⲉ, que corresponde a un asentamiento pequeño; por eso se evita «hometown» y también cualquier formulación que sugiera una adaptación al dicho lucano. La frase queda deliberadamente no armonizada con Lucas 4:24/Marcos 6:4.
  doctrine_reference: Principio de priorizar el testimonio textual más específico sobre la armonización secundaria.
- issue: Sentido del verbo sobre el médico
  english_pob_reading: a physician does not heal
  chosen_spanish_reading: un médico no cura
  alternative_spanish_readings:
  - un médico no sana
  - un médico no hace curaciones
  rationale: 'La revisión corregida muestra que el copto contiene el sustantivo «médico» y el verbo «curar/sanar», no una expresión de «hacer curas». Se mantiene así la tensión proverbial del dicho: el médico no ejerce su arte sobre quienes ya lo conocen.'
  doctrine_reference: Criterio de fidelidad léxica al original frente a una paráfrasis interpretativa.
translation_notes:
  revision_awareness: 'La versión anterior fue corregida en el punto decisivo de ⲥⲟⲉⲓⲛ: no significa «trabajar/realizar curas», sino «médico». Esta traducción sigue la revisión aceptada por el revisor y conserva la diferencia textual entre el copto («aldea») y el testimonio griego paralelo («patria/tierra natal»).'
  spanish_consistency_notes:
  - Se usó «Jesús» como forma estable para ⲓ︤ⲥ︥ / Ἰησοῦς.
  - Se prefirió «médico» y «cura» por ser la combinación más natural y fiel al proverbio.
  - No se harmonizó «aldea» con «hometown» para respetar el copto.
  - «Aceptable» se mantuvo para ϣⲏⲡ por su valor cualitativo y su tono sentencioso.
