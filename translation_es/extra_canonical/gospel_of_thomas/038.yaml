base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/038.yaml
  text: Jesus said[a], “Many times you have desired to hear these words that I am saying to you, and you have no other from whom to hear them. There will be days when you will seek me[d][c][b], and you will not find me.”
  footnotes:
  - marker: a
    text: Coptic reads literally ‘this saying’ (singular) before shifting to ‘them/these’ in the next clause; ‘these words’ harmonizes number for English flow while reflecting the plurality of what is being said.
    reason: lexical_alternative
  - marker: b
    text: The phrase ‘no other from whom to hear [them]’ reflects the Coptic construction with ⲕⲉⲟⲩⲁ (‘another one’) and ⲛ̄ⲧⲟϥ (‘from him’), which functions here as a relative ‘from whom’.
    reason: dialect_note
  - marker: c
    text: Literally, ‘There exist some days to come-to-be,’ a Coptic future-existential idiom.
    reason: cultural_note
  - marker: d
    text: Cf. John 7:34; 8:21; 13:33 for a similar motif; Thomas’s wording stands on its own and is not conformed to the canonical phrasing.
    reason: cross_reference
