translation:
  language: es
  text: 'Jesús dijo[a]: «Muchas veces han deseado escuchar[b] estas palabras que les estoy diciendo, y no tienen a otro[c] de quien escucharlas. Vendrán días[d] en que me buscarán[e], y no me encontrarán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El coptico dice literalmente «este dicho» en singular y luego pasa a un plural de referencia; ‘estas palabras’ conserva el sentido y evita una discordancia extraña en español.
    reason: lexical_alternative
  - marker: b
    text: ‘Escuchar’ traduce aquí el verbo de oír/escuchar en un contexto de recepción de palabras pronunciadas; no implica necesariamente obedecer.
    reason: lexical_alternative
  - marker: c
    text: 'La construcción coptica con «otro» funciona como una relativa de fuente: «de quien escuchar[las]».'
    reason: source_note
  - marker: d
    text: 'La frase subyacente es un modismo futuro-existencial: literalmente, «existirán algunos días que vendrán a ser».'
    reason: cultural_note
  - marker: e
    text: Cf. Jn 7:34; 8:21; 13:33 para un motivo similar; el dicho de Tomás conserva su formulación propia.
    reason: cross_reference
lexical_decisions:
- source_word: ϩⲁϩ ⲛⲥⲟⲡ
  english_pob_choice: many times
  chosen_spanish: Muchas veces
  alternatives_spanish:
  - a menudo
  lexicon: Crum; Layton
  rationale: La expresión sahídica es idiomática y significa ‘muchas veces’. ‘Muchas veces’ conserva la fuerza repetitiva sin endurecer el español.
- source_word: ⲣⲉⲡⲓⲑⲩⲙⲉⲓ
  english_pob_choice: desire
  chosen_spanish: han deseado
  alternatives_spanish:
  - han querido intensamente
  - han anhelado
  lexicon: Lambdin; Crum
  rationale: El verbo prestado de ἐπιθυμεῖν expresa deseo intenso; en español, ‘han deseado’ mantiene el tono directo y suficientemente fuerte sin sobrecargar la frase.
- source_word: ⲉⲥⲱⲧⲙ
  english_pob_choice: to hear
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - prestar oído a
  lexicon: Lambdin; Crum
  rationale: Aunque el sentido básico puede ser ‘oír’, aquí la construcción apunta a recibir verbalmente lo dicho. ‘Escuchar’ refleja mejor la relación con las palabras pronunciadas y evita una lectura meramente pasiva.
- source_word: ⲡⲉⲓϣⲁϫⲉ ⲡⲁⲓ (with subsequent ⲛⲛⲧⲟⲟⲩ)
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - este dicho
  - esta palabra
  lexicon: Crum; Layton
  rationale: La oscilación coptica entre singular y plural se resuelve de modo natural en español con un plural que preserva el contenido hablado. ‘Estas palabras’ corresponde al ajuste de número documentado en el audit trail inglés.
- source_word: ⲉⲧⲉⲣⲉ … ϫⲱ ⲛⲛⲧⲟⲟⲩ ⲛⲁⲛⲧⲱⲧⲛ
  english_pob_choice: that I am saying to you
  chosen_spanish: que les estoy diciendo
  alternatives_spanish:
  - que les digo
  lexicon: Layton (syntax)
  rationale: La cláusula durativa favorece un presente progresivo en español. ‘Estoy diciendo’ conserva la inmediatez del acto de habla mejor que un simple presente.
- source_word: ⲙⲛⲧⲁⲛⲧⲱⲧⲛ ⲕⲉⲟⲩⲁ
  english_pob_choice: you have no other
  chosen_spanish: no tienen a otro
  alternatives_spanish:
  - no tienen otro
  - no hay otro para ustedes
  lexicon: Crum; Layton
  rationale: La construcción expresa la ausencia de ‘otro’ como fuente disponible. En español, ‘no tienen a otro’ mantiene el objeto personal implícito de forma clara y natural.
- source_word: ⲛ̄ⲧⲟϥ (after ⲕⲉⲟⲩⲁ)
  english_pob_choice: from whom
  chosen_spanish: de quien
  alternatives_spanish:
  - del cual
  - de quien más
  lexicon: Lambdin; Layton
  rationale: Tras un antecedente indefinido, la función relativa en español se expresa naturalmente con ‘de quien’. Mantiene el valor de origen/fuente del Coptic sin calco torpe.
- source_word: ⲟⲩⲛ ϩⲉⲛ ϩⲟⲟⲩ ⲛⲁϣⲱⲡⲉ
  english_pob_choice: There will be days
  chosen_spanish: Vendrán días
  alternatives_spanish:
  - Habrá días
  lexicon: Crum
  rationale: El giro existencial-futuro puede verterse con ‘habrá’ o ‘vendrán’. ‘Vendrán días’ conserva el dinamismo temporal y el tono sentencioso del original.
- source_word: ⲛⲧⲉ … ϣⲓⲛⲉ
  english_pob_choice: when you will seek
  chosen_spanish: en que me buscarán
  alternatives_spanish:
  - cuando me buscarán
  - cuando me buscaran
  lexicon: Layton (clause structure)
  rationale: La temporalidad futura se expresa de modo idiomático con ‘en que’. ‘Buscar’ es el equivalente español más natural para la búsqueda de una persona.
- source_word: ⲛⲁϩⲉ ⲁⲛ ⲉ ⲁⲛⲟⲕ
  english_pob_choice: you will not find me
  chosen_spanish: no me encontrarán
  alternatives_spanish:
  - no me hallarán
  - no darán conmigo
  lexicon: Crum; Lambdin
  rationale: ‘Encontrar’ corresponde al valor básico del verbo y suena claro en español contemporáneo. ‘No me encontrarán’ preserva la contundencia del cierre.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere ajustes mayores; se han resuelto en español la oscilación singular/plural del dicho, la relativa de fuente y el giro futuro-existencial.
  spanish_consistency_notes:
  - Se usa ‘Jesús’ para Ἰησοῦς conforme al criterio del proyecto.
  - Se mantiene ‘buscar’ y ‘encontrar’ como verbos simples y transparentes, sin introducir matices doctrinales ajenos al texto.
  - Se optó por un español neutro y eclesialmente legible, evitando arcaísmos innecesarios.
