base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/032.yaml
  text: Jesus said[1], "A city built upon a high mountain and fortified cannot fall[3][2], nor will it be able to be hidden."
  footnotes:
  - marker: '1'
    text: The Greek fragment of this saying (P.Oxy. 1) reads 'upon the top of a high mountain' (ἐπ' ἄκρον ὄρους ὑψηλοῦ), whereas the Coptic lacks 'the top of'.
    reason: textual_variant
  - marker: '2'
    text: The Coptic shifts to the future tense for the final clause (ⲥⲛⲁϣϩⲱⲡ⳿ ⲁⲛ, 'nor will it be able to be hidden'), whereas the Greek fragment uses the present tense for both verbs ('can neither fall nor be hidden').
    reason: textual_variant
  - marker: '3'
    text: Compare Matthew 5:14 ('A city built on a hill cannot be hid'). Thomas combines this saying with the imagery of the house built on rock that does not fall (Matthew 7:24-25).
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Una ciudad edificada sobre un monte alto y fortificada no puede caer, ni podrá quedar oculta[b]».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El fragmento griego de este dicho (P.Oxy. 1) dice «sobre la cima de un monte alto», mientras que el copto no incluye «la cima de».
    reason: textual_variant
  - marker: b
    text: El copto cambia al futuro potencial en la cláusula final («ni podrá quedar oculta»), mientras que el fragmento griego usa presente para ambos verbos («no puede ni caer ni ser ocultada»).
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲟⲗⲓⲥ
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - pueblo
  - urbe
  lexicon: Crum 256b
  rationale: ⲡⲟⲗⲓⲥ designa una ciudad; «ciudad» es el equivalente natural y preciso en español.
- source_word: ⲉⲩⲕⲱⲧ / ⲕⲱⲧ
  english_pob_choice: built
  chosen_spanish: edificada
  alternatives_spanish:
  - construida
  - levantada
  lexicon: Crum 120a
  rationale: El participio circunstancial se vierte de manera pasiva y fluida en español. «Edificada» conserva el sentido de construcción sin añadir matices extra.
- source_word: ⲧⲟⲟⲩ
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - cerro
  lexicon: Crum 438b
  rationale: El término coptico corresponde a «mountain»; en español, «monte» funciona bien para un contexto bíblico y evita una posible sobreespecificación geográfica.
- source_word: ϫⲓⲥⲉ
  english_pob_choice: high
  chosen_spanish: alto
  alternatives_spanish:
  - elevado
  - encumbrado
  lexicon: Crum 785a
  rationale: La forma stativa modifica a «monte» y significa «alto». «Alto» es directo y fiel.
- source_word: ⲧⲁϫⲣⲟ
  english_pob_choice: fortified
  chosen_spanish: fortificada
  alternatives_spanish:
  - hecha firme
  - asegurada
  lexicon: Crum 461b
  rationale: 'La stativa femenina modifica a «ciudad» y expresa el estado de firmeza/fortificación. «Fortificada» recoge bien el valor de «made firm». '
- source_word: ϩⲉ
  english_pob_choice: fall
  chosen_spanish: caer
  alternatives_spanish:
  - derrumbarse
  - desplomarse
  lexicon: Crum 652b
  rationale: El idioma coptico niega la posibilidad de caer; en español «no puede caer» reproduce con sobriedad el valor del enunciado.
- source_word: ϩⲱⲡ
  english_pob_choice: hidden
  chosen_spanish: escondida
  alternatives_spanish:
  - oculta
  - cubierta
  lexicon: Crum 695a
  rationale: Para la pasiva potencial final, «ser escondida» es el sentido literal; en estilo español, «ser escondida»/«escondida» expresa claramente la noción de ser ocultada. Se eligió «escondida» por fluidez en la cláusula pasiva.
theological_decisions:
- issue: Divergencia de Tomás respecto de Mateo 5:14 en la clausula final
  english_pob_reading: cannot fall, nor will it be able to be hidden
  chosen_spanish_reading: no puede caer, ni podrá ser escondida
  alternative_spanish_readings:
  - no puede ser escondida
  - no podrá esconderse
  rationale: El testimonio copto añade la imposibilidad de caer y usa futuro potencial en la última cláusula. La traducción española conserva ambos rasgos sin armonizar indebidamente con Mateo.
  doctrine_reference: Harmonización sinóptica / crítica textual
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió una lectura anterior errónea de la frase verbal: el adjetivo «alto» modifica a «monte», y «fortificada» modifica a «ciudad». Esta versión sigue esa adjudicación y evita interpretar la cláusula en términos de imposibilidad por fuerza humana o de derribo.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para ⲓⲏⲥⲟⲩⲥ.
  - Se usa voz pasiva/natural en español para los participios circunstanciales.
  - Se evita «SEÑOR» u otra sustitución; no aparece el Nombre divino en este dicho.
  - La traducción conserva la estructura de dos cláusulas negativas paralelas y no introduce matices no presentes en el copto.
