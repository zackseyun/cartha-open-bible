review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido copto básico: ciudad construida sobre un monte/montaña alta, fortificada, incapaz de caer, y con cláusula final en futuro potencial. También evita armonizar indebidamente con Mateo. Sin embargo, conviene ajustar la formulación española de la última cláusula y las notas para alinearse mejor con la redacción auditada en inglés y con la legibilidad natural en español.'
  spanish_quality_summary: El texto es claro y digno, pero «ser escondida» suena menos natural en español bíblico general que «quedar oculta». Además, la nota [a] explica una literalidad innecesaria que el inglés POB no preserva como nota, mientras falta la nota de variante griega sobre «la cima»/«lo alto» del monte si se desea conservar la evidencia documentada del audit trail. Una revisión menor mejorará naturalidad y correspondencia con las notas auditadas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «ciudad», «fortificada» y «caer» están bien. «Monte alto» es aceptable, aunque «montaña alta» sería también posible; no es necesario cambiarlo. La principal mejora léxica es preferir «quedar oculta» frente a «ser escondida» para expresar ϩⲱⲡ de forma idiomática sin perder la pasiva/resultado.
  issues:
  - severity: medium
    issue: «ni podrá ser escondida» es comprensible pero poco natural en español
    rationale: La cláusula final copta expresa posibilidad futura de quedar oculta; en español general y eclesial suena más idiomático «ni podrá quedar oculta» que «ser escondida», sin alterar el sentido.
  - severity: medium
    issue: La nota [a] introduce una explicación léxica no reflejada en el aparato inglés auditado
    rationale: El inglés POB no conserva una nota para «cannot fall» sobre la literalidad «no tiene poder para caer»; esa observación es correcta pero no necesaria aquí, mientras sí existe una variante textual documentada sobre el griego que incluye «la cima» del monte.
  - severity: low
    issue: Falta la nota de variante textual sobre el fragmento griego con «la cima de un monte alto»
    rationale: El aparato inglés incluye esta evidencia. No es obligatorio en todos los casos, pero dado que ya hay notas en español, conviene preservar también esa variante relevante.
  revised_spanish_text: 'Jesús dijo[a]: «Una ciudad edificada sobre un monte alto y fortificada no puede caer, ni podrá quedar oculta[b]».

    '
  revised_footnotes:
