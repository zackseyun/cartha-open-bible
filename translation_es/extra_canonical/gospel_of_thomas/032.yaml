    reason: textual_variant
  - marker: b
    text: El copto cambia al futuro potencial en la cláusula final («ni podrá quedar oculta»), mientras que el fragmento griego usa presente para ambos verbos («no puede ni caer ni ser ocultada»).
    reason: textual_variant
  revision_rationale: 'Se hace una revisión menor para mejorar la naturalidad española de la última cláusula y para alinear las notas con el aparato textual auditado en inglés: se añade la variante griega sobre «la cima» y se conserva la observación sobre el futuro potencial final. No se requieren cambios doctrinales ni de sentido principal.'
