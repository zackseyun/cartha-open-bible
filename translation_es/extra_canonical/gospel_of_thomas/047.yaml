base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/047.yaml
  text: Jesus said[1], "It is impossible for a person to mount two horses and to draw two bows. And it is impossible for a servant to serve two masters, or he will honor the one and insult the other. A person does not drink old wine and immediately desire to drink new wine. And they do not pour new wine into old wineskins, lest they burst. And they do not pour old wine into a new wineskin, lest it ruin it. They do not sew an old patch onto a festal garment[3][2], because a tear will result."
  footnotes:
  - marker: '1'
    text: 'The English singular/plural distinction reflects the Coptic pronouns: ⲛⲛⲟⲩⲡⲱϩ (''lest they [plural] burst'') versus ⲛⲉϥⲧⲉⲕⲁϥ (''lest it [singular] ruin it'').'
    reason: textual_variant
  - marker: '2'
    text: Another Thomasine inversion. The Synoptics state that *new* wine is put into *new* wineskins (Matt 9:17). Thomas adds the prohibition against putting *old* wine into a *new* wineskin.
    reason: cross_reference
  - marker: '3'
    text: Coptic ϣⲧⲏⲛ ⲛϣⲁⲓ (literally 'garment of a festival'). This functions as the equivalent of the 'new garment' in the Synoptic parallels, though Thomas uniquely reverses the parable by having an *old* patch sewn onto the *new* (festal) garment.
    reason: cultural_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Es imposible que una persona monte dos caballos y tire de dos arcos. Y es imposible que un esclavo[b] sirva a dos señores, o honrará al uno e insultará al otro. Una persona no bebe vino añejo y enseguida desea beber vino nuevo. Y no echan vino nuevo en odres viejos, para que no se revienten[c]. Y no echan vino añejo en un odre nuevo, para que no lo arruine[d]. No cosen un parche viejo sobre una vestidura de fiesta[e], porque resultará un desgarro».'
  philosophy: formal
  footnotes:
  - marker: a
    text: La distinción singular/plural del copto queda reflejada en la construcción general del dicho, pero no exige una nota aparte en el español por no alterar el sentido global.
    reason: source_note
  - marker: b
    text: «Esclavo» conserva la fuerza del término copto ϩⲙϩⲁⲗ, que puede atenuarse si se vierte como «siervo».
    reason: lexical_alternative
  - marker: c
    text: El copto usa el verbo de reventar para los odres viejos; por eso se mantiene una imagen física directa.
    reason: lexical_alternative
  - marker: d
    text: 'Aquí se conserva la inversión tomasina: el peligro recae en el odre nuevo cuando recibe vino añejo.'
    reason: theological_note
  - marker: e
    text: La expresión copta significa literalmente «vestidura de fiesta»; se mantiene esa especificidad en vez de nivelarla a «vestido nuevo».
    reason: cultural_note
lexical_decisions:
- source_word: ⲙⲛϭⲟⲙ
  english_pob_choice: impossible
  chosen_spanish: es imposible
  alternatives_spanish:
  - no puede
  - no tiene capacidad
  lexicon: Crum 815b
  rationale: La construcción coptа expresa ausencia de poder o capacidad; en español, «es imposible» reproduce bien la fuerza general de la frase sin suavizarla indebidamente.
- source_word: ϫⲱⲗⲕ
  english_pob_choice: draw
  chosen_spanish: tirar de
  alternatives_spanish:
  - templar
  - jalar de
  lexicon: Crum 763a
  rationale: Aplicado a un arco, el verbo pide la idea física de tensar o tirar de él. «Tirar de» comunica esa acción en español natural y mantiene el paralelismo con el inglés auditado.
- source_word: ϩⲙϩⲁⲗ
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: Crum 778a
  rationale: La POB inglesa eligió «servant» en un contexto donde el campo léxico es de servidumbre fuerte; en español, «esclavo» preserva mejor esa fuerza lexical que «siervo».
- source_word: ⲧⲁⲕⲟ
  english_pob_choice: ruin
  chosen_spanish: arruine
  alternatives_spanish:
  - estropee
  - destruya
  lexicon: Crum 403b
  rationale: «Arruinar» expresa bien el deterioro o daño causado al odre nuevo por el vino añejo, sin intensificar más allá del valor del verbo copto.
- source_word: ⲡⲱϩ
  english_pob_choice: burst
  chosen_spanish: se revienten
  alternatives_spanish:
  - se rompan
  - estallen
  lexicon: Crum 275a
  rationale: Para odres, el verbo apunta a romperse o reventar. «Reventar(se)» es claro y conserva la imagen física del original.
- source_word: ϣⲧⲏⲛ ⲛϣⲁⲓ
  english_pob_choice: festal garment
  chosen_spanish: una vestidura de fiesta
  alternatives_spanish:
  - un vestido festivo
  - una prenda festal
  lexicon: Crum 551a
  rationale: Se preserva el giro literal «vestidura de fiesta» porque el coptο no dice simplemente «nuevo», sino una prenda asociada a fiesta o celebración; así se mantiene la especificidad idiomática documentada por el audit trail.
theological_decisions:
- issue: Conservación de las inversiones propias de Tomás frente a los paralelos sinópticos
  english_pob_reading: Preserved Thomas's inversions ('old patch onto a festal garment', 'old wine into a new wineskin').
  chosen_spanish_reading: 'Se preservan las inversiones tomasinas: vino añejo en odre nuevo, y parche viejo sobre una vestidura de fiesta.'
  alternative_spanish_readings:
  - parche nuevo sobre un vestido viejo
  - vino nuevo en odres nuevos
  rationale: El texto copto, según el examen auditado, invierte deliberadamente los paralelos sinópticos. La traducción debe mantener esa tensión textual y no armonizarla con Mateo o Lucas.
  doctrine_reference: Relación intertextual con los paralelos sinópticos; hermenéutica de Tomás frente a los evangelios canónicos.
translation_notes:
  revision_awareness: 'Se atendió la revisión que corrigió el mal análisis previo del dicho: el copto habla de vino, odres y una vestidura de fiesta, no de un motivo de ‘unidad’ o ‘niño pequeño’. La presente versión sigue el texto normalizado y preserva las inversiones atestiguadas por el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «Mesías/Cristo» fuera de esta perícopa porque el dicho no contiene ese título.
  - «Es imposible» y no «no puede» para conservar el tono gnómico de la sentencia.
  - «Odre» se usa de forma consistente para ⲁⲥⲕⲟⲥ.
  - Las notas evitan armonizar con los sinópticos y preservan la peculiaridad de Tomás.
