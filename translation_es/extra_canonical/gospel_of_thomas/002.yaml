translation:
  language: es
  text: 'Jesús dijo[a]: «Que el que busca no deje de buscar hasta que encuentre; y cuando encuentre, será perturbado[b]; y cuando sea perturbado, se maravillará[c]; y reinará sobre el Todo[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego fragmentario de Oxirrinco tiene una forma diversa en los dos últimos miembros («quedará asombrado … y, habiendo reinado, descansará»), mientras que el copto dice «será perturbado; … se maravillará» y termina sin «descansará».
    reason: textual_variant
  - marker: b
    text: ϣⲧⲟⲣⲧⲣ también puede traducirse «ser turbado» o «ser alarmado»; aquí se distingue deliberadamente del verbo siguiente «maravillarse» (ⲣϣⲡⲏⲣⲉ).
    reason: lexical_alternative
  - marker: c
    text: 'O: «cuando haya sido perturbado».'
    reason: previous_rendering
  - marker: d
    text: «El Todo» es un giro tomasino para la totalidad de las cosas, el cosmos, no simplemente «muchas cosas».
    reason: cultural_note
lexical_decisions:
- source_word: ⲙⲡⲣⲧⲣⲉ…ⲗⲟ
  english_pob_choice: do not let … stop/cease
  chosen_spanish: No deje de buscar
  alternatives_spanish:
  - No cese de buscar
  - No deje que deje de buscar
  lexicon: Layton (Grammar) para el jussive negativo; Crum s.v. ⲗⲟ 'cease/stop'
  rationale: 'La construcción es un jussivo negativo de tercera persona, así que en español conviene una formulación impersonal/jussiva: «No deje de buscar». Mantiene la idea de continuidad sin introducir un destinatario de segunda persona.'
- source_word: ⲡⲉⲧⲉⲣⲉϣⲓⲛⲉ
  english_pob_choice: the one who seeks
  chosen_spanish: el que busca
  alternatives_spanish:
  - el que busca afanosamente
  - el buscador
  lexicon: Layton (Grammar) sobre el participio relativo sustantivado
  rationale: «El que busca» preserva la concisión del relativo sustantivado y suena natural en español, sin cargarlo con un sustantivo más interpretativo como «buscador».
- source_word: ⲉⲣⲉ ⲛⲧⲟϥ ϣⲓⲛⲉ
  english_pob_choice: keep seeking
  chosen_spanish: de buscar
  alternatives_spanish:
  - siguiendo buscando
  - buscando
  lexicon: Layton (Grammar) sobre ⲉⲣⲉ + infinitivo para continuidad
  rationale: El español exige una construcción natural tras «dejar de»; «de buscar» transmite la continuidad del acto mejor que una paráfrasis más larga.
- source_word: ϣⲁⲛⲧⲉ ⲛⲧⲟϥ ϭⲓⲛⲉ
  english_pob_choice: until he finds
  chosen_spanish: hasta que encuentre
  alternatives_spanish:
  - hasta que encuentre lo buscado
  - hasta encontrar
  lexicon: Lambdin sobre ϣⲁⲛⲧⲉ temporal 'until'
  rationale: «Hasta que encuentre» conserva el valor temporal y la apertura del objeto buscado, que el copto no explicita.
- source_word: ϣⲧⲟⲣⲧⲣ
  english_pob_choice: be disturbed
  chosen_spanish: será perturbado
  alternatives_spanish:
  - será turbado
  - será inquietado
  - se verá perturbado
  lexicon: Crum s.v. ϣⲧⲟⲣⲧⲣ 'be disturbed, troubled'
  rationale: «Perturbado» mantiene la fuerza de desestabilización del término copto y evita suavizarlo hacia «maravillado» o «asombrado», que corresponde al verbo siguiente.
- source_word: ⲣϣⲡⲏⲣⲉ
  english_pob_choice: marvel
  chosen_spanish: maravillará
  alternatives_spanish:
  - se maravillará
  - quedará maravillado
  - se asombrará
  lexicon: Crum s.v. ⲣϣⲡⲏⲣⲉ 'be astonished, wonder'
  rationale: «Maravillará» conserva la extrañeza del giro, aunque el español más idiomático sería reflexivo; aquí se prefiere una forma breve que respete el paralelismo y la tensión del original.
- source_word: ⲣ̄ⲣ̄ⲣ̄ⲟ
  english_pob_choice: reign
  chosen_spanish: reinará
  alternatives_spanish:
  - será rey
  - gobernará
  lexicon: Crum s.v. ⲣⲣⲟ 'to be king, reign'
  rationale: «Reinará» es el equivalente verbal más directo y conserva la imagen de soberanía real más que una simple idea de gobierno.
- source_word: ⲉϫⲛ ⲡⲧⲏⲣϥ
  english_pob_choice: over the All
  chosen_spanish: sobre el Todo
  alternatives_spanish:
  - sobre todo
  - sobre el universo
  - sobre todas las cosas
  lexicon: Crum s.v. ⲧⲏⲣⲉ 'all' como totalidad
  rationale: En Tomás, «el Todo» funciona como un término técnico de totalidad cósmica. Se conserva la mayúscula y el artículo para reflejar ese uso idiomático.
theological_decisions:
- issue: La frase final puede leerse como dominio cósmico total o como gobierno sobre 'todas las cosas'.
  english_pob_reading: ‘the All’ is a Thomasine idiom for the totality of things/the cosmos, not merely ‘many things.’
  chosen_spanish_reading: «el Todo»
  alternative_spanish_readings:
  - «todas las cosas»
  - «el universo»
  - «todo»
  rationale: Se conserva la expresión idiomática de Tomás con mayúscula, para no diluir su sentido técnico ni reemplazarlo por una generalización más interpretativa.
  doctrine_reference: Cultural/theological idiom in Thomasine cosmology
translation_notes:
  revision_awareness: Se atendió la corrección de revisión que rechaza un imperativo dirigido a segunda persona; por eso la línea se traduce como jussivo impersonal («No deje de buscar») y no como «No lo dejes». También se preservó la simetría temporal de las cláusulas con «cuando encuentre / cuando sea perturbado».
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como forma del nombre propio.
  - Se conserva la distinción semántica entre 'perturbado' y 'maravillar', sin fusionarlos.
  - Se usa «el Todo» con mayúscula para reflejar el idiomatismo tomasino.
  - La frase inicial adopta un jussivo impersonal para respetar la tercera persona del original.
