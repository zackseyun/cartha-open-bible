base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/002.yaml
  text: Jesus said[a], "Let the one who seeks not stop seeking until he finds; and when he finds, he will be disturbed; and when he is disturbed, he will marvel[e][d][c][b]; and he will reign over the All."
  footnotes:
  - marker: a
    text: The Greek fragment (POxy 654) has ‘he will be astounded … and having reigned, he will rest,’ whereas the Coptic reads ‘he will be disturbed; … he will marvel’ and ends without ‘rest.’
    reason: textual_variant
  - marker: b
    text: ϣⲧⲟⲣⲧⲣ can also be rendered ‘be troubled’ or ‘be alarmed’; here kept distinct from the next verb ‘marvel/be amazed’ (ⲣϣⲡⲏⲣⲉ).
    reason: lexical_alternative
  - marker: c
    text: ‘the All’ is a Thomasine idiom for the totality of things/the cosmos, not merely ‘many things.’
    reason: cultural_note
  - marker: d
    text: Or 'Do not let the one who seeks stop seeking'.
    reason: previous_rendering
  - marker: e
    text: Or 'when he has been disturbed'.
    reason: previous_rendering
