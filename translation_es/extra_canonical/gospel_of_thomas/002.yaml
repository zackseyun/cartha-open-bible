revisions:
- from: 'Jesús dijo[a]: «No deje de buscar el que busca, hasta que encuentre; y cuando encuentre, será perturbado[b]; y cuando sea perturbado, maravillará[c][d]; y reinará sobre el Todo[e]».'
  to: 'Jesús dijo[a]: «Que el que busca no deje de buscar hasta que encuentre; y cuando encuentre, será perturbado[b]; y cuando sea perturbado, se maravillará[c]; y reinará sobre el Todo[d]».'
  rationale: Se corrige la apertura para reflejar de manera idiomática el jussivo de tercera persona («Que el que busca no deje de buscar»), y se reemplaza «maravillará» por «se maravillará» para preservar el sentido intransitivo/reflexivo de ⲣϣⲡⲏⲣⲉ. También se ajustan las notas para que respalden la redacción corregida y no defiendan una forma española semánticamente equívoca.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:10:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la progresión básica del copto: buscar hasta encontrar, luego perturbación, luego maravilla, y finalmente reinar sobre el Todo. También preserva correctamente la variante textual griega en nota. Sin embargo, la formulación española inicial «No deje de buscar el que busca» suena elíptica y menos fiel a la fuerza jussiva de tercera persona que una forma como «Que el que busca no deje de buscar». Además, «maravillará» no preserva bien el sentido del verbo intransitivo/reflexivo ‘marvel/be amazed’; en español estándar se entiende más naturalmente como transitivo (‘causará maravilla’), lo que altera el sentido.'
  spanish_quality_summary: 'La legibilidad general es buena, pero hay dos problemas importantes de naturalidad y precisión: (1) la apertura «No deje de buscar el que busca» es gramaticalmente posible pero poco idiomática y algo ambigua; (2) «maravillará» es poco natural y semánticamente erróneo en español contemporáneo, donde la forma esperable es «se maravillará» o «se asombrará». «Será perturbado» es aceptable, aunque «se turbará» sería más idiomático; no es necesario cambiarlo si se quiere conservar la distinción léxica respecto del siguiente verbo.'
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Jesús» está bien. «el Todo» refleja adecuadamente la decisión auditada para Thomasine ‘the All’. No hay términos como Yahvé/Mesías/Cristo implicados aquí. La distinción entre ϣⲧⲟⲣⲧⲣ y ⲣϣⲡⲏⲣⲉ debe mantenerse mejor en español usando «perturbado» frente a «se maravillará».
  issues:
  - severity: medium
    issue: 'Inicio jussivo poco idiomático: «No deje de buscar el que busca»'
    rationale: Aunque intenta reflejar la tercera persona jussiva, el orden resulta forzado en español y puede sonar como una instrucción truncada. «Que el que busca no deje de buscar» preserva mejor el valor exhortativo general sin introducir segunda persona.
  - severity: high
    issue: «maravillará» altera el sentido del verbo copto
    rationale: ⲣϣⲡⲏⲣⲉ significa ‘maravillarse/asombrarse’, no ‘maravillar’ en sentido transitivo. En español actual, «maravillará» normalmente significa ‘causará maravilla’, cambiando el sujeto y la acción.
  - severity: low
    issue: La nota c justifica una forma española no recomendable
    rationale: La nota admite que «se maravillará» es más natural, pero aquí no es solo cuestión de estilo sino de sentido léxico correcto. Debe corregirse el texto principal y eliminar la defensa de la forma menos fiel.
  revised_spanish_text: 'Jesús dijo[a]: «Que el que busca no deje de buscar hasta que encuentre; y cuando encuentre, será perturbado[b]; y cuando sea perturbado, se maravillará[c]; y reinará sobre el Todo[d]».'
  revised_footnotes:
  - marker: a
    text: El testimonio griego fragmentario de Oxirrinco tiene una forma diversa en los dos últimos miembros («quedará asombrado … y, habiendo reinado, descansará»), mientras que el copto dice «será perturbado; … se maravillará» y termina sin «descansará».
    reason: textual_variant
  - marker: b
    text: ϣⲧⲟⲣⲧⲣ también puede traducirse «ser turbado» o «ser alarmado»; aquí se distingue deliberadamente del verbo siguiente «maravillarse» (ⲣϣⲡⲏⲣⲉ).
    reason: lexical_alternative
  - marker: c
    text: 'O: «cuando haya sido perturbado».'
    reason: previous_rendering
  - marker: d
    text: «El Todo» es un giro tomasino para la totalidad de las cosas, el cosmos, no simplemente «muchas cosas».
    reason: cultural_note
  revision_rationale: Se corrige la apertura para reflejar de manera idiomática el jussivo de tercera persona («Que el que busca no deje de buscar»), y se reemplaza «maravillará» por «se maravillará» para preservar el sentido intransitivo/reflexivo de ⲣϣⲡⲏⲣⲉ. También se ajustan las notas para que respalden la redacción corregida y no defiendan una forma española semánticamente equívoca.
