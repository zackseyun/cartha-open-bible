translation:
  language: es
  text: 'Jesús dijo[a]: Sean transeúntes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sean los que pasan»; «sean transitorios»; «sean viajeros». El verbo subyacente es un préstamo griego con el sentido de «pasar por» o «pasar de largo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús habló
  - dijo Jesús
  lexicon: Layton (grammar)
  rationale: La fórmula de introducción del dicho se vierte de manera directa y sobria. «Jesús dijo» preserva el valor formulaico y la cadencia breve del texto.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: become
  chosen_spanish: sean
  alternatives_spanish:
  - lleguen a ser
  - lleguen a convertirse en
  lexicon: Crum; Layton (grammar)
  rationale: El Copt. ϣⲱⲡⲉ en esta construcción tiene fuerza jussiva/imperatival. En español, «sean» comunica esa exhortación breve con naturalidad, sin perder el sentido de volverse o llegar a ser.
- source_word: ⲡⲁⲣⲁⲅⲉ
  english_pob_choice: passers-by
  chosen_spanish: pasajeros
  alternatives_spanish:
  - los que pasan
  - transeúntes
  - viajeros
  - transitorios
  lexicon: Crum; Lambdin; Layton (grammar)
  rationale: El préstamo griego indica “pasar de largo / pasar por”. En español, «pasajeros» conserva la idea de quienes pasan, mantiene la concisión gnómica y evita una paráfrasis más larga.
translation_notes:
  revision_awareness: 'Se revisó la lectura inglesa auditada y su nota léxica: el español conserva la brevedad proverbial del dicho, pero ajusta «passers-by» a una forma natural y compacta en español. No hubo revisiones textuales ni tensiones doctrinales documentadas en el expediente.'
  spanish_consistency_notes:
  - Se mantiene un estilo sobrio y formulaico, adecuado para un dicho breve de Thomas.
  - «Pasajeros» aquí se usa en sentido de quienes pasan; no como sustantivo moderno de transporte. La nota aclara las alternativas para evitar malentendidos.
