review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura breve del dicho y la fuerza exhortativa de ϣⲱⲡⲉ como mandato/jusivo. Sin embargo, «pasajeros» en español se desvía del sentido principal de ⲡⲁⲣⲁⲅⲉ, que según la evidencia y la auditoría inglesa significa «los que pasan / pasan de largo», no «passengers».
  spanish_quality_summary: '«Jesús dijo[a]: Sean pasajeros» es breve y fluido, pero «pasajeros» introduce una acepción moderna dominante de personas transportadas, lo que perjudica la inteligibilidad y fidelidad. Una forma como «Sean transeúntes» o «Sean los que pasan» se ajusta mejor al sentido. Para conservar tersura gnómica y evitar la ambigüedad de «pasajeros», se prefiere «transeúntes».'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Jesús» está correcto. La decisión clave es léxica: ⲡⲁⲣⲁⲅⲉ debe reflejar «pasar por / pasar de largo», no «pasajero» en el sentido habitual español.'
  issues:
  - severity: high
    issue: «pasajeros» falsea el núcleo semántico de ⲡⲁⲣⲁⲅⲉ
    rationale: En español contemporáneo, «pasajeros» se entiende ante todo como personas que viajan en un medio de transporte. El source y la nota inglesa apuntan a «los que pasan», «passers-by», «travelers» solo como alternativa secundaria, no como sentido principal.
  - severity: medium
    issue: La nota al pie refuerza una base léxica correcta, pero no compensa la ambigüedad del texto principal
    rationale: Aunque la nota menciona «los que pasan», el lector recibe primero una formulación principal equívoca. El texto base debe preservar mejor el significado sin depender de la nota.
  revised_spanish_text: 'Jesús dijo[a]: Sean transeúntes.'
  revised_footnotes:
  - marker: a
    text: 'O: «Sean los que pasan»; «sean transitorios»; «sean viajeros». El verbo subyacente es un préstamo griego con el sentido de «pasar por» o «pasar de largo».'
    reason: lexical_alternative
