translation:
  language: es
  text: "Jesús dijo a sus discípulos[a]: «Compárenme y díganme a quién me parezco». \n\nSimón Pedro le dijo: «Te pareces a un ángel justo». \n\nMateo le dijo: «Te pareces a un ser humano[b] —a un filósofo, a un hombre de entendimiento[c]». \n\nTomás le dijo: «Maestro, mi boca de ningún modo podrá decir a quién te pareces». \n\nJesús dijo: «Yo no soy tu maestro, porque has bebido y te has embriagado de la fuente burbujeante[d] que yo mismo he medido[e]. Y lo tomó; se retiró y le dijo tres dichos. \n\nCuando Tomás vino donde sus compañeros, ellos le preguntaron: «¿Qué te dijo Jesús?». \n\nTomás les dijo: «Si yo les dijera una sola de las palabras que me dijo, levantarían piedras y me las arrojarían[f], y saldría fuego de las piedras y los consumiría[g]»."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «traten de verme comparativamente»; el coptico abre con un verbo de comparación directa.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «un hombre/ser humano»; se usa una expresión más inclusiva y clara para el español sin perder la base antropológica.
    reason: lexical_alternative
  - marker: c
    text: También puede entenderse «un hombre sabio» o «un filósofo de entendimiento»; se conserva la estructura appositiva del original.
    reason: lexical_alternative
  - marker: d
    text: 'El original usa un término onomatopéyico para el sonido del agua: «burbujeante», «gorgoteante» o «borbotante».'
    reason: lexical_alternative
  - marker: e
    text: «Yo mismo he medido» refleja el énfasis del pronombre independiente del coptico; la frase puede oírse también como «yo la he medido».
    reason: textual_variant
  - marker: f
    text: 'También: «me las lanzarían» o «las tirarían contra mí». La revisión auditable corrige la omisión del verbo de arrojar.'
    reason: textual_variant
  - marker: g
    text: 'También: «los devoraría» o «los quemaría»; aquí «consumiría» conserva el efecto destructivo sin precisar el mecanismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ϫⲉⲧⲟⲛⲧⲛⲁⲛⲟⲕ / compare me
  english_pob_choice: compare me
  chosen_spanish: Compáranme
  alternatives_spanish:
  - Compárense conmigo
  - Háganme una comparación
  lexicon: Crum; Layton
  rationale: La orden breve pide una comparación directa. ‘Compáranme’ conserva la fuerza imperativa y evita expandir el sentido más allá del griego/coptico documentado.
- source_word: ⲉⲓⲛⲉ / be like, resemble
  english_pob_choice: be like / resemble
  chosen_spanish: me parezco / te pareces
  alternatives_spanish:
  - soy como
  - resembrar / semejar
  lexicon: Crum; Layton
  rationale: En este contexto el verbo expresa semejanza, no mera existencia ni transformación. ‘Parecerse’ es natural en español y mantiene la relación comparativa.
- source_word: ⲁⲅⲅⲉⲗⲟⲥ / angel
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: Lambdin; Crum
  rationale: La combinación con ‘justo’ indica un ser celestial; ‘ángel’ preserva esa lectura frente a ‘mensajero’, que rebajaría el término.
- source_word: ⲇⲓⲕⲁⲓⲟⲥ / righteous
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: Lambdin
  rationale: ‘Justo’ comunica bien la cualidad moral y judicial en español; es el equivalente más natural y claro para el lector hispano.
- source_word: ⲣⲱⲙⲉ ⲛⲫⲓⲗⲟⲥⲟⲫⲟⲥ ⲛⲣⲙⲛϩⲏⲧ / a human being—a philosopher, a man of understanding
  english_pob_choice: a human being—a philosopher, a man of understanding
  chosen_spanish: un ser humano —a un filósofo, a un hombre de entendimiento
  alternatives_spanish:
  - un hombre filósofo, un hombre de corazón
  - un ser humano, un sabio filósofo
  lexicon: Crum; Layton
  rationale: Se conserva la estructura appositiva del original. ‘Ser humano’ refleja ⲣⲱⲙⲉ, y ‘hombre de entendimiento’ mantiene el modismo de ‘heart/mind’ sin suavizarlo demasiado.
- source_word: ⲡⲥⲁϩ / teacher
  english_pob_choice: teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Rabí
  - maestro
  lexicon: Crum
  rationale: En vocativo, ‘Maestro’ es idiomático en español bíblico y preserva la función de apelación sin cargarlo de una connotación eclesial específica.
- source_word: ⲧⲁⲧⲁⲡⲣⲟ / my mouth
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca propia
  lexicon: Crum
  rationale: La imagen corporal se conserva de forma literal. En español, ‘mi boca’ es claro y no requiere más expansión.
- source_word: ϣⲁⲡ / be able
  english_pob_choice: will not be able
  chosen_spanish: podrá
  alternatives_spanish:
  - será capaz
  - podrá soportar
  lexicon: Crum
  rationale: El valor futuro del verbo se respeta con ‘podrá’. La frase ‘de ningún modo’ conserva la intensidad negativa de ϩⲟⲗⲱⲥ.
- source_word: ⲁⲅⲅⲉⲗⲟⲥ ⲛⲇⲓⲕⲁⲓⲟⲥ / righteous angel
  english_pob_choice: righteous angel
  chosen_spanish: ángel justo
  alternatives_spanish:
  - ángel recto
  - ángel de justicia
  lexicon: Lambdin
  rationale: Se mantiene el orden adjetival más natural en español y se evita una paráfrasis doctrinal. ‘Justo’ reproduce la cualidad del ser angélico.
- source_word: ⲡⲡⲏⲅⲏ / spring
  english_pob_choice: spring
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - primavera
  lexicon: Lambdin
  rationale: ‘Fuente’ es más natural y publicable en español, y en este contexto conserva la imagen de un origen de agua para beber.
- source_word: ⲃⲣⲃⲣ / bubbling
  english_pob_choice: bubbling
  chosen_spanish: burbujeante
  alternatives_spanish:
  - borbotante
  - gorgoteante
  lexicon: Crum
  rationale: El sonido onomatopéyico se expresa bien con ‘burbujeante’, que mantiene la vividez sin sobreexplicar el efecto.
- source_word: ϣⲓⲛⲧⲟⲥ / measured out
  english_pob_choice: measured out
  chosen_spanish: he medido
  alternatives_spanish:
  - he medido para ti
  - he dispensado
  lexicon: Crum; Layton
  rationale: El coptico marca la acción de medir/distribuir una fuente. ‘He medido’ conserva el verbo base y, con ‘yo mismo’, deja visible el énfasis del pronombre independiente.
- source_word: ⲁⲛⲁⲭⲱⲣⲉⲓ / withdrew
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se fue aparte
  lexicon: Lambdin
  rationale: ‘Se retiró’ expresa bien el movimiento de apartarse y mantiene el tono narrativo sobrio.
- source_word: ϣⲁϫⲉ / sayings
  english_pob_choice: sayings
  chosen_spanish: dichos
  alternatives_spanish:
  - palabras
  - sentencias
  lexicon: Crum
  rationale: En el universo del Evangelio de Tomás, ‘dichos’ preserva la categoría literaria de unidades breves atribuidas a Jesús mejor que ‘palabras’.
- source_word: ϥⲓⲱⲛⲉ / pick up
  english_pob_choice: pick up
  chosen_spanish: levantarían
  alternatives_spanish:
  - tomarían
  - alzarían
  lexicon: Crum
  rationale: En el contexto de apedreamiento, ‘levantar piedras’ es natural en español y mantiene el acto preparatorio antes del lanzamiento.
- source_word: ⲛⲟⲩϫⲉ / throw
  english_pob_choice: and throw them at me
  chosen_spanish: me las arrojarían
  alternatives_spanish:
  - me las lanzarían
  - las tirarían contra mí
  lexicon: Crum
  rationale: La revisión auditada corrige la omisión del verbo. ‘Arrojarían’ conserva la acción violenta y el movimiento hacia el hablante.
- source_word: ⲃⲣⲃⲣ / onomatopoetic water-sound
  english_pob_choice: bubbling spring
  chosen_spanish: fuente burbujeante
  alternatives_spanish:
  - fuente gorgoteante
  - manantial burbujeante
  lexicon: Crum
  rationale: Se preserva la rareza metafórica del original, evitando alisar la imagen de agua viva con una expresión más genérica.
theological_decisions:
- issue: Jesús niega ser el maestro de Tomás en un dicho paradójico
  english_pob_reading: I am not your teacher, because you have drunk and you have become intoxicated from the bubbling spring that I myself have measured out.
  chosen_spanish_reading: Yo no soy tu maestro, porque has bebido y te has embriagado de la fuente burbujeante que yo mismo he medido.
  alternative_spanish_readings:
  - No soy tu maestro
  - Yo no soy tu maestro, porque has bebido y te has embriagado de la fuente que yo mismo he medido
  rationale: 'Se conserva la paradoja del texto de Tomás: Jesús rechaza la etiqueta relacional mientras atribuye a Tomás su propio acceso a la fuente. No se suaviza la tensión con una paráfrasis armonizadora.'
  doctrine_reference: Cristología y retórica tomasina; preservación de la paradoja textual sin armonización canónica.
- issue: Identidad de la comparación angélica y humana
  english_pob_reading: You are like a righteous angel / You are like a human being—a philosopher, a man of understanding.
  chosen_spanish_reading: Te pareces a un ángel justo / Te pareces a un ser humano —a un filósofo, a un hombre de entendimiento
  alternative_spanish_readings:
  - Te pareces a un ángel recto
  - Te pareces a un hombre sabio
  rationale: Se mantiene la diferencia entre la lectura celeste de Pedro y la antropológica de Mateo. ‘Ser humano’ evita reducir ⲣⲱⲙⲉ a ‘hombre’ genérico y conserva la amplitud del término.
  doctrine_reference: Antropología y angelología en la recepción del dicho; fidelidad al contraste interno del pasaje.
- issue: Amenaza de apedreamiento y fuego de las piedras
  english_pob_reading: you will pick up stones and throw them at me, and fire will come out of the stones and consume you
  chosen_spanish_reading: levantarían piedras y me las arrojarían, y saldría fuego de las piedras y los consumiría
  alternative_spanish_readings:
  - levanten piedras contra mí
  - saldrá fuego de las piedras
  rationale: La escena conserva el gesto de apedreamiento y la inversión final con fuego que sale de las piedras. No se transforma en metáfora moralizada ni se atenúa la violencia del dicho.
  doctrine_reference: Imágenes apocalípticas/polemicas; respeto por el reverso violento del logion.
translation_notes:
  revision_awareness: Se tuvo en cuenta la corrección auditada que restituye el verbo de arrojar en la última cláusula, la lectura futura de ‘podrá’, y el énfasis de ‘yo mismo’ en ‘he medido’. El español evita la omisión de acciones paralelas y mantiene la paradoja de la autonegación de Jesús sin armonizarla.
  spanish_consistency_notes:
  - Se mantiene ‘Jesús’ y ‘Tomás’ de forma consistente; ‘dichos’ se usa para los logia y no ‘palabras’ salvo en la pregunta de los compañeros.
  - ‘Maestro’ se reserva para ⲡⲥⲁϩ; no se sustituye por ‘rabí’.
  - Se prefirió ‘fuente’ sobre ‘manantial’ por fluidez, pero se preservó la imagen acuática inusual con ‘burbujeante’.
  - La violencia final se expresa con ‘arrojarían’ y ‘consumiría’ para respetar el paralelo entre piedras y fuego.
  - Se evitó ‘SEÑOR’ o ‘Cristo’ porque no aparecen en este dicho y no hay razón auditada para introducir terminología eclesial.
