base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/109.yaml
  text: Jesus said[1], "The kingdom is like a man who has a hidden treasure in his field, without knowing about it. And after he died, he left it to his son. The son did not know. He took that field and sold it. And the one who bought it came, and while he was plowing, he found the treasure[2]. He began to lend money at interest to whomever he wished."
  footnotes:
  - marker: '1'
    text: The parable in Thomas diverges significantly from the canonical parallel in Matthew 13:44. In Thomas, the original owner is unaware of the treasure, and it is the subsequent buyer who finds it and uses it to lend at interest.
    reason: cross_reference
  - marker: '2'
    text: Several words in this saying are restored from lacunas in the manuscript, but the restorations are standard and highly certain from the surviving letters and context.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:49Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «El reino es como un hombre que tenía un tesoro escondido en su campo, sin saberlo. Y después de morir, se lo dejó a su hijo. El hijo no lo sabía. Tomó ese campo y vendió ese campo. Y el que lo compró vino, y mientras araba, encontró el tesoro[b]. Comenzó a prestar dinero con interés a quien quería».[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La parábola en Tomás diverge significativamente del paralelo canónico en Mateo 13:44. En Tomás, el dueño original no sabe del tesoro, y es el comprador posterior quien lo encuentra y luego lo usa para prestar dinero con interés.
    reason: cross_reference
  - marker: b
    text: El texto copto dice que el comprador encontró el tesoro mientras araba; la forma verbal no describe una búsqueda deliberada, sino un hallazgo accidental durante el trabajo del campo.
    reason: source_note
  - marker: c
    text: Varias palabras de este dicho se restauran de lagunas del manuscrito, pero las restauraciones son estándar y muy seguras por las letras conservadas y el contexto.
    reason: textual_variant
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reinado
  - la realeza
  lexicon: Crum 222a; uso contextual en dichos del reino
  rationale: En español bíblico y moderno, «el reino» comunica de manera natural el dominio real de Dios sin forzar una paráfrasis. «Reinado» destacaría el acto de reinar, pero aquí el dicho presenta una esfera o realidad regia comparada con una parábola.
- source_word: ⲁϩⲟ
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - caudal
  - riqueza
  lexicon: Crum 22a
  rationale: «Tesoro» es la correspondencia directa y transparente para ⲁϩⲟ y mantiene la imagen narrativa del dicho.
- source_word: ⲉϥϩⲏⲡ
  english_pob_choice: hidden
  chosen_spanish: escondido
  alternatives_spanish:
  - oculto
  - guardado
  lexicon: Crum 699a
  rationale: La nota revisada subraya que el tesoro está realmente «hidden». «Escondido» es natural en español y conserva la cualidad del objeto sin suavizarla.
- source_word: ⲛⲁⲧⲥⲟⲟⲩⲛ ⲉⲣⲟϥ
  english_pob_choice: without knowing about it
  chosen_spanish: sin saberlo
  alternatives_spanish:
  - sin conocerlo
  - sin darse cuenta de ello
  lexicon: Crum 348a; construcción circunstancial
  rationale: La frase indica ignorancia respecto del tesoro. «Sin saberlo» es fluido y mantiene la fuerza adverbial del coptico sin sobreexplicar.
- source_word: ⲧⲣⲉϥⲙⲟⲩ / ⲁⲛⲧⲟϥⲙⲟⲩ
  english_pob_choice: he died
  chosen_spanish: morir / después de morir
  alternatives_spanish:
  - fallecer / después de fallecer
  - cuando murió
  lexicon: Crum 175a
  rationale: La secuencia narrativa requiere una frase natural en español. «Después de morir» conserva el encadenamiento temporal del original sin introducir matices ajenos.
- source_word: ⲕⲱⲛⲧⲟϥ
  english_pob_choice: left it to his son
  chosen_spanish: se lo dejó a su hijo
  alternatives_spanish:
  - lo dejó a su hijo
  - se lo entregó a su hijo
  lexicon: Crum 112a; verbo de dejar/poner
  rationale: «Se lo dejó» expresa la transferencia del campo/tesoro al hijo y reproduce el objeto pronominal implícito. «Entregar» sería más interpretativo.
- source_word: ϥⲓ ⲡⲥⲱϣⲉ
  english_pob_choice: took that field
  chosen_spanish: tomó aquel campo
  alternatives_spanish:
  - agarró aquel campo
  - se hizo cargo de aquel campo
  lexicon: Crum 701a
  rationale: Aquí ϥⲓ expresa asumir o tomar posesión. «Tomó aquel campo» preserva el acto narrativo sin añadir una glosa legal.
- source_word: ϩⲉ ⲉ-
  english_pob_choice: found
  chosen_spanish: encontró
  alternatives_spanish:
  - descubrió
  - tropezó con
  lexicon: Crum 656a
  rationale: La expresión verbal significa «encontrar» o «dar con». «Encontró» es la opción más clara y sobria en español.
- source_word: ϯ ϩⲟⲙⲧ ⲉ ⲧⲙⲏⲥⲉ
  english_pob_choice: lend money at interest
  chosen_spanish: prestar dinero con interés
  alternatives_spanish:
  - prestar a interés
  - hacer préstamos con interés
  lexicon: Crum 185b
  rationale: La nota inglesa insiste en no suavizar el valor económico de la frase. En español, «prestar dinero con interés» comunica el sentido literal y conserva la tensión ética del texto.
theological_decisions:
- issue: La comparación del reino con una historia de hallazgo accidental y uso posterior del tesoro
  english_pob_reading: The parable in Thomas diverges significantly from the canonical parallel in Matthew 13:44. In Thomas, the original owner is unaware of the treasure, and it is the subsequent buyer who finds it and uses it to lend at interest.
  chosen_spanish_reading: 'El dicho conserva la divergencia respecto de Mateo: el dueño original no sabe del tesoro, y es el comprador posterior quien lo encuentra y lo usa para prestar dinero con interés.'
  alternative_spanish_readings:
  - armonizarlo con Mateo 13:44
  - presentarlo como una simple alegoría de hallazgo espiritual
  rationale: 'La traducción no debe reconciliar el texto con el paralelo canónico ni convertir el relato en una alegoría más general. El rasgo teológico-literario importante es la inversión narrativa: ignorancia del primer dueño, descubrimiento del comprador y explotación económica del tesoro.'
  doctrine_reference: Comparación sinóptica; Matthew 13:44; Thomas 109
- issue: La práctica de prestar con interés
  english_pob_reading: Despite early Christian prohibitions against usury, the text must not be softened.
  chosen_spanish_reading: Aunque haya rechazo cristiano temprano de la usura, el texto se debe mantener como «prestar dinero con interés» y no atenuarlo.
  alternative_spanish_readings:
  - invertir el dinero
  - prestarlo sin una referencia explícita al interés
  rationale: La frase coptica es explícita y el audit trail inglés advierte contra suavizarla. En español, «con interés» conserva el valor técnico y la tensión moral del dicho.
  doctrine_reference: Ética económica en la recepción cristiana antigua; usura
- issue: El tesoro como elemento oculto real
  english_pob_reading: The Coptic includes the circumstantial perfect ⲉϥϩⲏⲡ ('being hidden'), which modifies the treasure.
  chosen_spanish_reading: El tesoro debe aparecer como «escondido», no sólo como un tesoro sin adjetivo.
  alternative_spanish_readings:
  - un tesoro
  - un tesoro oculto
  rationale: La revisión crítica destaca que lo oculto no es opcional. «Escondido» mantiene la cualidad del objeto y su función en la parábola sin sonar artificial.
  doctrine_reference: Crítica textual y sintaxis coptica del dicho
translation_notes:
  revision_awareness: Se incorporó la revisión crítica que corrige la omisión de «escondido» y la lectura del comprador encontrando el tesoro mientras araba. También se conservó la divergencia importante del dicho frente a Mateo 13:44 y la mención explícita de prestar dinero con interés.
  spanish_consistency_notes:
  - Se mantuvo «reino» para ⲡⲙⲛⲧⲣⲣⲟ por claridad y uso eclesial amplio.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en este dicho.
  - «Escondido» y «con interés» preservan tensiones textuales y éticas que el audit trail inglés marcó como relevantes.
  - La nota al pie queda anclada en «encontró el tesoro» para precisar la circunstancia del hallazgo.
