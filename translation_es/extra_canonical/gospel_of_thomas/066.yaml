translation:
  language: es
  text: 'Jesús dijo: «Muéstrame esta piedra que los constructores desecharon; ella es la piedra angular».[a][b][c][d]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «dame a ver»; es decir, «muéstrame».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «lo arrojaron fuera»; también puede entenderse como «lo rechazaron».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «piedra del ángulo».
    reason: lexical_alternative
  - marker: d
    text: Eco del Salmo 118:22 (LXX 117:22), citado en Mc 12:10; Mt 21:42; Lc 20:17; Hch 4:11; 1 Pe 2:7.
    reason: cross_reference
lexical_decisions:
- source_word: ϯⲧⲥⲁⲃⲟⲁⲛⲟⲕ
  english_pob_choice: show me
  chosen_spanish: Muéstrame
  alternatives_spanish:
  - Déjame ver
  - Hazme ver
  lexicon: Crum s.v. ⲥⲁⲃⲟ; Layton, Grammar (ϯ + infinitivo permisivo)
  rationale: La construcción perifrástica expresa una petición concesiva o de permiso para ver; en español, «muéstrame» conserva el tono idiomático y la fuerza imperativa del dicho sin perder el matiz de solicitud dirigida.
- source_word: ⲡⲱⲛⲉ ⲡⲁⲓ
  english_pob_choice: this stone
  chosen_spanish: esta piedra
  alternatives_spanish:
  - esta misma piedra
  - la piedra esta
  lexicon: Crum s.v. ⲱⲛⲉ; Layton on demostrativos ⲡⲁⲓ
  rationale: El demostrativo apunta de manera enfática a una piedra concreta; «esta piedra» reproduce la deixis del original de forma natural en español.
- source_word: ⲛ̄ⲧⲁⲩⲥⲧⲟϥ ⲉⲃⲟⲗ
  english_pob_choice: (they) threw it out
  chosen_spanish: desecharon
  alternatives_spanish:
  - lo echaron fuera
  - lo rechazaron
  lexicon: Crum s.v. ⲥⲧⲟ ‘throw’
  rationale: El verbo coptico es literalmente «arrojar fuera», pero en este contexto idiomático la opción española más fluida y fiel al sentido es «desecharon», que conserva la idea de expulsión/rechazo sin volverse torpe.
- source_word: ⲛ̄ϭⲓ ⲛⲉⲧ ⲕⲱⲧ
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los que construyen
  - los albañiles
  lexicon: Crum s.v. ⲕⲱⲧ ‘build’; Layton on subject identifier ⲛ̄ϭⲓ
  rationale: El sustantivo agente designa a quienes edifican; «constructores» mantiene el valor referencial amplio y encaja bien con la tradición del dicho en un español sobrio.
- source_word: ⲡⲱⲛⲉ ⲛⲕⲱϩ
  english_pob_choice: the cornerstone
  chosen_spanish: la piedra angular
  alternatives_spanish:
  - la piedra del ángulo
  - la piedra de esquina
  lexicon: Crum s.v. ⲕⲱϩ ‘corner’; ⲱⲛⲉ ‘stone’
  rationale: «Piedra angular» es la equivalencia española establecida para el modismo bíblico; conserva la función estructural de la imagen y resulta plenamente inteligible para lectores eclesiales.
theological_decisions:
- issue: La relación intertextual con el Salmo 118:22 y su recepción en el Nuevo Testamento
  english_pob_reading: The saying echoes Ps 118:22 and is cited in the Synoptics, Acts, and 1 Peter.
  chosen_spanish_reading: El dicho evoca el Salmo 118:22 y su recepción en los Evangelios, Hechos y 1 Pedro.
  alternative_spanish_readings:
  - Remite al Salmo 118:22 y a su uso en el Nuevo Testamento.
  - Alude al Salmo 117:22 de la LXX y a su cita neotestamentaria.
  rationale: Aunque la línea principal no incluye nota de referencia explícita, la imagen y el léxico identifican claramente la alusión escritural. La formulación española en la nota preserva esa conexión sin sobrecargar el texto principal.
  doctrine_reference: Sal 118:22; Mc 12:10; Mt 21:42; Lc 20:17; Hch 4:11; 1 Pe 2:7
translation_notes:
  revision_awareness: Se revisó el pasaje y no hubo cambios sustantivos respecto del último pase; la concordancia general con la fuente copta y el audit trail inglés sigue siendo alta.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma fija del nombre propio.
  - Se usa «piedra angular» por ser el equivalente español idiomático del modismo, con nota que preserva la literalidad.
  - «Desecharon» comunica el valor de arrojar fuera/rechazar sin añadir contenido ajeno al texto.
  - El texto principal evita paráfrasis explicativas; las explicaciones quedan reservadas para las notas.
