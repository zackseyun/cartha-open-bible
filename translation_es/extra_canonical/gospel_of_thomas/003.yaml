translation:
  language: es
  text: 'Jesús dice[a]: «Si los que los conducen les dicen: “Miren, el reino está en el cielo”, entonces las aves del cielo los precederán. Si les dicen: “Está en el mar”[b], entonces los peces los precederán. Más bien, el reino está dentro de ustedes y fuera de ustedes. Cuando lleguen a conocerse a sí mismos, entonces serán conocidos[c] y comprenderán que ustedes son los hijos[d] del Padre viviente. Pero si no se conocen a sí mismos, están en pobreza[e], y ustedes son pobreza».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Los que los conducen’ traduce un verbo copto que significa ‘arrastrar, tirar, conducir’; no presupone por sí mismo que los estén extraviando.
    reason: lexical_alternative
  - marker: b
    text: La imagen contrasta con ‘cielo’ en la primera cláusula; aquí ‘mar’ conserva el paralelo espacial del original.
    reason: source_note
  - marker: c
    text: 'El copto usa una forma impersonal de tercera plural, por lo que el pasivo español es una buena equivalencia: no se nombra al agente de ese conocimiento.'
    reason: textual_variant
  - marker: d
    text: El manuscrito copto presenta el plural ‘los hijos’; algunas reconstrucciones griegas antiguas prefieren ‘hijos’ como equivalente de un plural masculino genérico.
    reason: textual_variant
  - marker: e
    text: 'Lit. ‘están en pobreza’. El final repite el sustantivo para intensificar la afirmación: ‘ustedes son pobreza’.'
    reason: source_note
lexical_decisions:
- source_word: ⲥⲱⲕ ϩⲏⲧⲛⲧⲱⲧⲛ
  english_pob_choice: lead you
  chosen_spanish: los conducen
  alternatives_spanish:
  - los llevan
  - los guían
  lexicon: Crum
  rationale: El verbo copt. ⲥⲱⲕ puede significar ‘draw/pull/lead’; en español ‘conducir’ conserva la idea de dirigir sin introducir por sí solo la carga de ‘extraviar’. Además, ‘los que los conducen’ mantiene el matiz relacional del original.
- source_word: ⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el reinado
  - el poder real
  lexicon: Crum; Layton
  rationale: ‘Reino’ es la forma más natural y readable en español para este término abstracto; preserva la esfera/poder implícitos sin forzar una paráfrasis.
- source_word: ⲡⲉ / ⲛⲧⲉⲡⲡⲉ
  english_pob_choice: sky
  chosen_spanish: cielo
  alternatives_spanish:
  - cielo (visible)
  - cielo/firmamento
  lexicon: Crum; Layton
  rationale: Aunque la nota inglesa favorece ‘sky’ por el contraste con aves, en español ‘cielo’ es el equivalente más idiomático y naturalmente puede referir al cielo visible en este contexto. No se usa ‘cielo’ como eufemismo teológico aquí, sino como espacio aéreo del paralelismo con las aves.
- source_word: ⲡϩⲁⲗⲏⲧ
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: Crum
  rationale: ‘Aves’ es amplio, digno y neutro. En la primera cláusula se explicita ‘del cielo’ para conservar la correspondencia con el original copt. ‘of the sky’.
- source_word: ⲑⲁⲗⲁⲥⲥⲁ
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - mar/océano
  lexicon: Greek loan in Coptic
  rationale: ‘Mar’ es el término más natural en español y corresponde al campo semántico del préstamo griego en copt. No se requiere una nota teológica.
- source_word: ⲧⲃⲧ
  english_pob_choice: fish
  chosen_spanish: los peces
  alternatives_spanish:
  - los pescados
  - los peces del mar
  lexicon: Crum
  rationale: ‘Peces’ es el plural colectivo natural en español; mantiene la imagen sin reducirla a ‘pescados’.
- source_word: ⲧⲙⲛ̄ⲧⲉⲣⲟ ⲛⲧⲟⲥⲛⲡⲉⲧⲛϩⲟⲩⲛ
  english_pob_choice: the kingdom is inside you
  chosen_spanish: el reino está dentro de ustedes
  alternatives_spanish:
  - el reino está en ustedes
  - el reino está dentro de vosotros
  lexicon: Crum; Layton
  rationale: ‘Dentro de ustedes’ conserva el contraste espacial con ‘fuera de ustedes’ y evita la ambigüedad espiritualizante de ‘en ustedes’. El pronombre plural se mantiene por fidelidad al destinatario plural.
- source_word: ⲛⲡⲉⲧⲛⲃⲟⲗ
  english_pob_choice: outside you
  chosen_spanish: fuera de ustedes
  alternatives_spanish:
  - por fuera de ustedes
  - afuera de ustedes
  lexicon: Crum
  rationale: ‘Fuera de ustedes’ es el correlato natural de ‘dentro de ustedes’ y conserva la antítesis espacial del texto.
- source_word: ⲥⲟⲟⲩⲛ
  english_pob_choice: know
  chosen_spanish: conocerse
  alternatives_spanish:
  - saber de sí mismos
  - llegar a conocerse
  lexicon: Crum; Layton
  rationale: ‘Lleguen a conocerse a sí mismos’ refleja el valor inceptivo del futuro-condicional y la reflexividad del original. ‘Conocerse’ evita sobreexplicar con ‘saber’.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ ⲥⲟⲟⲩⲛ ⲛⲧⲱⲧⲛ
  english_pob_choice: you will be known
  chosen_spanish: serán conocidos
  alternatives_spanish:
  - los conocerán
  - serán reconocidos
  lexicon: Layton (impersonal 3pl usage)
  rationale: La forma copta impersonal de tercera plural puede funcionar con sentido pasivo. ‘Serán conocidos’ preserva esa pasividad sin añadir agente.
- source_word: ⲉⲓⲙⲉ
  english_pob_choice: realize
  chosen_spanish: comprenderán
  alternatives_spanish:
  - se darán cuenta
  - entenderán
  lexicon: Crum
  rationale: ‘Comprenderán’ reproduce el valor cognitivo de reconocimiento pleno en un español sobrio y claro.
- source_word: ⲛ̄ϣⲏⲣⲉ
  english_pob_choice: the children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los hijos e hijas
  - los niños
  - las criaturas
  lexicon: Crum; source manuscript
  rationale: El manuscrito copto en esta forma plural se corresponde con el plural del destinatario. ‘Hijos’ conserva la posible resonancia filial del original y evita forzar un singular. En un registro eclesial amplio, también mantiene una formulación natural.
- source_word: ⲡⲉⲓⲱⲧ ⲉⲧⲟⲛϩ
  english_pob_choice: the living Father
  chosen_spanish: el Padre viviente
  alternatives_spanish:
  - el Padre que vive
  - el Padre vivo
  lexicon: Crum
  rationale: ‘Padre viviente’ sigue de cerca la formulación establecida y suena digno en español. La opción mantiene la cualidad de vida como atributo activo del Padre.
- source_word: ⲙⲛⲧϩⲏⲕⲉ
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - miseria
  - indigencia
  lexicon: Crum
  rationale: '‘Pobreza’ expresa el estado abstracto del término y permite reproducir la repetición enfática: ‘están en pobreza’ / ‘ustedes son pobreza’. La segunda ocurrencia se conserva literal para no suavizar la dureza del original.'
theological_decisions:
- issue: 'Locus of the kingdom: interior/exterior spatiality'
  english_pob_reading: the kingdom is inside you and it is outside you
  chosen_spanish_reading: el reino está dentro de ustedes y fuera de ustedes
  alternative_spanish_readings:
  - el reino está en ustedes y fuera de ustedes
  - el reino está dentro de ustedes y también fuera de ustedes
  rationale: El copt. distingue dos localizaciones espaciales. ‘Dentro’ / ‘fuera’ conserva la antítesis sin convertirla en una interioridad puramente mística. La formulación evita añadir ‘de Dios’, que no aparece en el copt., y respeta la tensión interpretativa del dicho.
  doctrine_reference: Textual fidelity to the Coptic wording; no doctrinal harmonization
- issue: Passive/indefinite voice in 'you will be known'
  english_pob_reading: you will be known
  chosen_spanish_reading: serán conocidos
  alternative_spanish_readings:
  - los conocerán
  - serán reconocidos
  rationale: 'La tercera plural indefinida del copt. se conserva mejor con un pasivo impersonal en español. Esto evita nombrar un agente y mantiene la ambigüedad del original: el reconocimiento ocurre, pero no se especifica quién lo realiza.'
  doctrine_reference: Sahidic impersonal 3pl/passive usage (dialectal)
translation_notes:
  revision_awareness: 'He tomado en cuenta las revisiones señaladas en el expediente: la lectura plural de ⲛ̄ϣⲏⲣⲉ (‘los hijos’) y la presencia explícita de ‘a ustedes’ en la segunda cláusula condicional. La redacción española refleja ambas correcciones y evita el singular anterior. También preserva la estructura paralela de las dos hipótesis y el cierre enfático sobre la pobreza.'
  spanish_consistency_notes:
  - Uso ‘Jesús’ para ⲓⲏⲥⲟⲩⲥ.
  - Mantengo ‘reino’ para ⲙⲛ̄ⲧⲣⲣⲟ, siguiendo el criterio POB de no forzar ‘reinado’ salvo razón especial.
  - Conservo la segunda persona plural en todo el dicho, coherente con el copt. y con el audit trail inglés.
  - ‘Padre viviente’ se mantiene como fórmula estable y legible.
  - No añado ‘de Dios’ al reino, porque el copt. no lo expresa.
