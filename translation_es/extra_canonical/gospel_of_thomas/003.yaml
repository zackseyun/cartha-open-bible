base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/003.yaml
  text: Jesus says[a], "If those who lead you say to you, 'Look, the kingdom is in the sky,' then the birds of the sky will precede you. If they say to you, 'It is in the sea,' then the fish will precede you. Rather, the kingdom is inside you and it is outside you. When you come to know yourselves, then you will be known, and you will realize that you are the children of the living Father. But if you do not know yourselves[b], you are in poverty[i][h][g][f][e][d][c], and you are poverty."
  footnotes:
  - marker: a
    text: '''Those who lead you'': Coptic ⲥⲱⲕ means ''draw/lead''; it need not imply ''astray''. Some versions supply ''astray'', which is not explicit here.'
    reason: lexical_alternative
  - marker: b
    text: '''Sky'' translates ⲡⲉ; ''heaven'' is an alternative. The phrase ''birds of the sky'' signals a concrete image rather than a technical term.'
    reason: lexical_alternative
  - marker: c
    text: '''You will be known'' renders an impersonal 3rd plural (''they will know you''), a common Sahidic way to express a passive without naming an agent.'
    reason: dialect_note
  - marker: d
    text: Coptic has the singular 'the child (ⲡϣⲏⲣⲉ) of the living Father' addressed to a plural 'you'. The Greek fragment is often reconstructed with 'sons' (plural). This draft preserves the Coptic singular.
    reason: textual_variant
  - marker: e
    text: Where some reconstruct the Greek as 'the kingdom of God is within you…', the Coptic simply reads 'the kingdom'. No 'of God' appears in the Coptic text.
    reason: textual_variant
  - marker: f
    text: POxy 654 is commonly restored with an additional line, 'Whoever knows himself will find it,' which is not present in the Coptic manuscript here.
    reason: textual_variant
  - marker: g
    text: All second-person forms in this saying are plural (addressed to 'you' plural), which English does not mark.
    reason: dialect_note
  - marker: h
    text: Or 'the child'.
    reason: previous_rendering
  - marker: i
    text: Or "If they say, 'It is in the sea,'".
    reason: previous_rendering
