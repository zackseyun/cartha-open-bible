base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/111.yaml
  text: Jesus said[Does not Jesus say], "The heavens will roll up, and the earth, in your presence, and the one who lives from the living one will not see death." Does not Jesus say, "Whoever finds himself[finds himself], the world is not worthy of him"?
  footnotes:
  - marker: Does not Jesus say
    text: The text abruptly shifts into the third person, quoting Jesus as an external authority. This meta-commentary is unique in the Gospel of Thomas and strongly suggests a compiler's gloss or a later redactional layer that has been incorporated into the text.
    reason: textual_variant
  - marker: finds himself
    text: Coptic ⲁϩⲉ ⲉⲣⲟϥ ⲟⲩⲁⲁϥ. The word ⲟⲩⲁⲁϥ functions grammatically as a reflexive ('himself'), but given Thomas's theology of the solitary (monachos), it also carries the resonance of 'finds himself alone.'
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Los cielos se enrollarán, y la tierra, en vuestra presencia; y el que vive[b] a partir del Viviente no verá la muerte. ¿No dice Jesús: “Quien se encuentra a sí mismo[c], del mundo no es digno”?»'
  philosophy: formal
  footnotes:
  - marker: a
    text: El texto pasa de la voz directa de Jesús a una formulación en tercera persona («¿No dice Jesús...?»). Este cambio abrupto sugiere una glosa editorial o una capa redaccional incorporada al dicho.
    reason: textual_variant
  - marker: b
    text: '«El Viviente» conserva la ambigüedad del original: puede aludir al Padre, al Jesús vivo, o a la fuente divina de la vida. La traducción evita cerrar esa identificación.'
    reason: theological_note
  - marker: c
    text: La construcción copt. admite el matiz reflexivo principal («se encuentra a sí mismo») y, secundariamente, la resonancia de «se encuentra solo». Se conserva aquí la lectura reflexiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ϭⲱⲗ
  english_pob_choice: roll up
  chosen_spanish: se enrollarán
  alternatives_spanish:
  - se plegarán
  - se plegarán como un rollo
  lexicon: Crum
  rationale: El verbo copt. expresa doblar o enrollar; en español, «se enrollarán» conserva la imagen apocalíptica de un cielo que se recoge como un rollo, sin añadir explicación ajena al texto.
- source_word: ⲙ̄ⲧⲟ ⲉⲃⲟⲗ
  english_pob_choice: presence
  chosen_spanish: presencia
  alternatives_spanish:
  - ante vosotros
  - delante de vosotros
  lexicon: Crum
  rationale: La locución se usa en sentido de estar delante de alguien. «En vuestra presencia» refleja bien el valor relacional del original y preserva el matiz de testigos directos.
- source_word: ⲟⲩⲭ ϩⲟⲧⲓ
  english_pob_choice: Does not... ?
  chosen_spanish: ¿No dice Jesús...?
  alternatives_spanish:
  - ¿Acaso no dice Jesús...?
  - ¿No es que dice Jesús...?
  lexicon: Crum
  rationale: La partícula copt. introduce una pregunta retórica con expectativa afirmativa. En español, «¿No dice Jesús...?» transmite ese valor interrogativo sin forzar una paráfrasis.
- source_word: ⲡⲉⲧⲟⲛϩ / ⲡⲉⲧⲉⲣⲉⲱⲛϩ
  english_pob_choice: the one who lives from the living one
  chosen_spanish: el que vive a partir del Viviente
  alternatives_spanish:
  - el que vive del Viviente
  - el que vive por el Viviente
  lexicon: Crum
  rationale: Mantengo la relación de procedencia indicada por la construcción copt. «a partir del Viviente» es más explícito que «del Viviente» y evita convertir la frase en una fórmula doctrinal cerrada; además conserva la ambigüedad sobre si «el Viviente» alude al Padre, a Jesús o a la fuente divina.
- source_word: ⲁϩⲉ ⲉⲣⲟϥ ⲟⲩⲁⲁϥ
  english_pob_choice: finds himself
  chosen_spanish: se encuentra a sí mismo
  alternatives_spanish:
  - se halla a sí mismo
  - se encuentra solo
  lexicon: Crum
  rationale: El valor reflexivo de la construcción se expresa de modo natural en español con «se encuentra a sí mismo». Conservo la lectura principal del audit trail y no la sustituyo por «solo», aunque la resonancia de soledad permanezca como posible matiz.
- source_word: ⲙ̄ⲡϣⲁ
  english_pob_choice: worthy
  chosen_spanish: es digno
  alternatives_spanish:
  - merece
  - no vale para
  lexicon: Crum
  rationale: «Es digno» conserva el campo semántico de valía/aptitud del término y resulta idiomático en español bíblico contemporáneo.
- source_word: ⲡⲉⲧⲛ-
  english_pob_choice: your
  chosen_spanish: vuestra
  alternatives_spanish:
  - de ustedes
  - su
  lexicon: Crum
  rationale: El copt. plural posesivo se vierte con «vuestra» para mantener la segunda persona plural explícita en un registro reverente y claro.
theological_decisions:
- issue: Capitalización e identificación de «el Viviente»
  english_pob_reading: living one
  chosen_spanish_reading: el Viviente
  alternative_spanish_readings:
  - el viviente
  - el que vive
  rationale: Sigo la decisión del POB inglés de mantener la expresión sin identificarla de forma cerrada. En español, la mayúscula en «el Viviente» permite tratarla como apelativo titulado sin decidir si se refiere al Padre, a Jesús o a otra fuente divina.
  doctrine_reference: Ambigüedad cristológica y teológica preservada; no se impone una identificación dogmática donde el copt. no la explicita.
- issue: Glosa o cambio a tercera persona en «¿No dice Jesús...?»
  english_pob_reading: Does not Jesus say
  chosen_spanish_reading: ¿No dice Jesús...?
  alternative_spanish_readings:
  - ¿No ha dicho Jesús...?
  - ¿No es que Jesús dice...?
  rationale: 'Conservo la observación editorial del POB: el pasaje pasa abruptamente a una formulación en tercera persona que funciona como comentario meta-textual. El español mantiene esa tensión sin suavizarla ni fusionarla con la voz previa.'
  doctrine_reference: Historia textual/redaccional del logion de Tomás; no se armoniza artificialmente la voz narrativa.
translation_notes:
  revision_awareness: La versión española sigue la revisión aceptada que corrige la mala lectura de una supuesta referencia «a ustedes» y reconoce ϫⲱ ⲙ̄ⲙⲟⲥ como fórmula normal de cita. También conserva la condensación de un solo verbo para «los cielos y la tierra» y evita introducir un segundo verbo inexistente en el copt. El texto resultante mantiene la estructura apodíctica y la observación meta-textual del audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece, por lo que no se emplea.
  - Se mantiene «Jesús» como nombre propio y «el Viviente» como título ambigua y no como nombre normalizado.
  - «Vuestra presencia» conserva la segunda persona plural del original.
  - No se introduce «Cristo», «Señor» ni otras formulaciones no atestiguadas por el copt.
