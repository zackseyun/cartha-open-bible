translation:
  language: es
  text: 'Jesús dijo: «No se recogen uvas de espinos, ni se juntan higos de cardos; porque no dan fruto. Un[a] hombre bueno saca lo bueno de su granero; un hombre malo saca lo malo de su granero, lo que está en su corazón, y habla lo malo, porque de la abundancia del corazón saca lo malo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El añadido de «hombre» traduce el sustantivo humano implícito del original; en español se usa aquí como genérico y no como exclusión de otras personas.
    reason: theological_note
lexical_decisions:
- source_word: ϫⲱⲱⲗⲉ ⲉⲗⲟⲟⲗⲉ
  english_pob_choice: pick grapes
  chosen_spanish: se recogen uvas
  alternatives_spanish:
  - se cortan uvas
  - se cosechan uvas
  lexicon: Crum; Layton
  rationale: El giro proverbial pide un verbo natural en español. «Recoger» conserva la idea de tomar fruta sin volver la frase forzada, y mantiene el paralelismo con «juntar» en la segunda mitad.
- source_word: ϣⲟⲛⲧⲉ
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - espinas
  - zarzas
  lexicon: Crum
  rationale: «Espinos» conserva el sustantivo plural concreto y funciona bien en el refrán. «Espinas» podría sonar más abstracto en español.
- source_word: ⲕⲱⲧϥ
  english_pob_choice: gather
  chosen_spanish: se juntan
  alternatives_spanish:
  - se recogen
  - se reúnen
  lexicon: Crum; Layton
  rationale: «Juntar» expresa bien la recolección de higos y suena natural en el proverbio. Evita un calco demasiado técnico.
- source_word: ⲕⲛⲧⲉ
  english_pob_choice: figs
  chosen_spanish: higos
  alternatives_spanish:
  - higos de la higuera
  - frutos de higo
  lexicon: Crum
  rationale: El sentido simple del término es «higos». Aunque el audit trail nota su forma dialectal, no hay razón para volverlo más técnico en el texto principal.
- source_word: ⲥⲉⲣϭⲁⲙⲟⲩⲗ
  english_pob_choice: thistles
  chosen_spanish: cardos
  alternatives_spanish:
  - cardos espinosos
  - abrojos
  lexicon: Crum
  rationale: «Cardos» es el equivalente español más transparente y proverbial; conserva la pareja natural con «espinos».
- source_word: ϯ ⲕⲁⲣⲡⲟⲥ
  english_pob_choice: give fruit
  chosen_spanish: dan fruto
  alternatives_spanish:
  - producen fruto
  - dan frutos
  lexicon: Crum; Layton
  rationale: «Dar fruto» es la forma más idiomática y fiel al Coptic, donde el verbo de dar se conserva de manera bastante literal.
- source_word: ⲟⲩⲁⲅⲁⲑⲟⲥ / ⲟⲩⲕⲁⲕⲟⲥ
  english_pob_choice: a good person / an evil person
  chosen_spanish: un hombre bueno / un hombre malo
  alternatives_spanish:
  - una persona buena / una persona mala
  - un hombre bueno / un hombre malo
  lexicon: Layton; Crum
  rationale: El Coptic usa sustantivos de persona con adjetivos griegos. En español, «hombre» funciona como genérico humano tradicional y mantiene el contraste moral directo; «malo» traduce aquí el antónimo sin añadir una tonalidad distinta de «malvado».
- source_word: ⲁϩⲟ
  english_pob_choice: storehouse
  chosen_spanish: granero
  alternatives_spanish:
  - almacén
  - depósito
  - tesoro
  lexicon: Crum; Layton
  rationale: El audit trail entiende una imagen de depósito concreto. «Granero» da una imagen familiar de lugar donde se guarda lo que se ha reunido, sin forzar el término a «tesoro», que movería el sentido hacia riqueza.
- source_word: ⲉⲧⲉⲣⲉ … ϩⲛ ⲡⲉϥϩⲏⲧ
  english_pob_choice: that is in his heart
  chosen_spanish: lo que está en su corazón
  alternatives_spanish:
  - lo que hay en su corazón
  - lo que está dentro de su corazón
  lexicon: Layton
  rationale: La construcción relativa modifica al depósito; en español conviene explicitarla con una relativa nominal sin perder la tensión sintáctica. «Lo que está en su corazón» conserva la referencia interna al corazón como sede de lo guardado.
- source_word: ⲛⲧⲉⲛⲧⲟϥ ϫⲱ
  english_pob_choice: and he speaks
  chosen_spanish: y habla
  alternatives_spanish:
  - y dice
  - y pronuncia
  lexicon: Layton
  rationale: «Habla» reproduce el verbo de decir/hablar en un presente proverbial natural. Mantiene la observación del audit trail de no añadir «boca».
- source_word: ⲡϩⲟⲩⲟ
  english_pob_choice: overflow
  chosen_spanish: la abundancia
  alternatives_spanish:
  - el rebosamiento
  - la plenitud
  - el desbordamiento
  lexicon: Crum
  rationale: El campo semántico es de abundancia/plenitud. En español, «la abundancia del corazón» es idiomático y suficientemente cercano a la metáfora de lo que rebosa.
- source_word: ⲡⲉϥϩⲏⲧ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - mente
  lexicon: Crum; Layton
  rationale: «Corazón» es la forma estándar para la sede interior de pensamientos y palabras. Preserva la carga antropológica y proverbial del original.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente: mantiene la estructura de dos proverbios sobre frutos y dos cláusulas sobre el bien y el mal que salen del interior, y conserva «lo que está en su corazón» como modificador del depósito/granero, no como cláusula independiente.'
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para ⲓ︤ⲥ︥ⲟⲩⲥ según la norma del proyecto.
  - Se tradujo el contraste moral con «bueno/malo» y no con «bueno/malvado» para conservar el paralelismo directo del original.
  - Se prefirió un léxico agrícola natural en español («uvas», «higos», «cardos», «granero») evitando tecnicismos innecesarios.
  - No se añadió equivalente de «boca», de acuerdo con el testimonio coptológico y el audit trail inglés.
