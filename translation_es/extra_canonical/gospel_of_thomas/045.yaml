base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/045.yaml
  text: Jesus said, “They do not pick grapes from thorns, nor do they gather figs from thistles—for they do not give fruit. A good person brings out a good thing from his storehouse; an evil person brings out an evil thing from his storehouse, that which is in his heart, and he speaks evil, for from the overflow of the heart he brings out evil.”
  footnotes:
  - marker: a
    text: ⲟⲩⲁ in ⲟⲩⲁⲅⲁⲑⲟⲥ (‘a good [person]’) is partly restored in NH II (Dilley marks [ⲟⲩⲁ]).
    reason: lacuna_or_restoration
  - marker: b
    text: ⲕⲛⲧⲉ is a Sahidic/Lycopolitan term for ‘fig(s)’ (Crum s.v. ⲕⲛⲧⲉ).
    reason: dialect_note
  - marker: c
    text: The phrase ‘that is in his heart’ renders ⲉⲧⲉⲣⲉ … ϩⲛ ⲡⲉϥϩⲏⲧ, taken as modifying ‘storehouse’ rather than introducing a new clause.
    reason: dialect_note
  - marker: d
    text: ‘And he speaks’ translates ⲛⲧⲉⲛⲧⲟϥ ϫⲱ without adding ‘mouth’ (present in the Synoptics).
    reason: cross_reference
