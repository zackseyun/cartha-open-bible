base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/036.yaml
  text: Jesus said[a], Do not be anxious from morning until evening, and from evening until morning[c][b], about what you will put on yourselves.
  footnotes:
  - marker: a
    text: The verb ϥⲓⲣⲟⲟⲩϣ can mean “be anxious,” “worry,” or in older idiom “take thought.” “Be anxious” is chosen for clarity and brevity.
    reason: lexical_alternative
  - marker: b
    text: POxy 655 for Logion 36 includes added elements (food, lilies, stature), aligning only in the clause about clothing; this draft follows the Nag Hammadi Coptic text.
    reason: textual_variant
  - marker: c
    text: In the phrase-joined print ⲡⲉ⟨ⲧ⟩ⲉ… shows an editorial supplementation of ⟨ⲧ⟩; Dilley’s normalized reading construes the sequence as headless relative ⲟⲩ ⲡⲉⲧⲉ– with future ⲛⲁ ϯⲛⲧⲟϥ ϩⲓⲱⲧ ⲛⲧⲱⲧⲛ.
    reason: lacuna_or_restoration
