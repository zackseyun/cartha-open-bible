translation:
  language: es
  text: 'Jesús dijo: No se preocupen[a] desde la mañana hasta la tarde, y desde la tarde hasta la mañana[c][b], por lo que se pondrán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto ⲙⲡⲣϥⲓⲣⲟⲟⲩϣ puede significar “estar ansioso”, “preocuparse” o, en un giro más antiguo, “tomar pensamiento”. Se eligió “preocuparse” por claridad y naturalidad.
    reason: lexical_alternative
  - marker: b
    text: POxy 655 para el dicho 36 añade otros elementos (comida, lirios y estatura) y sólo coincide en la cláusula sobre la ropa; esta traducción sigue el texto copto de Nag Hammadi.
    reason: textual_variant
  - marker: c
    text: En la secuencia impresa unida, ⲡⲉ⟨ⲧ⟩ⲉ… muestra una suplementación editorial de ⟨ⲧ⟩; la lectura normalizada de Dilley entiende la secuencia como una relativa sin antecedente expreso, ⲟⲩ ⲡⲉⲧⲉ-, con sentido futuro en ⲛⲁ ϯⲛⲧⲟϥ ϩⲓⲱⲧ ⲛⲧⲱⲧⲛ.
    reason: lacuna_or_restoration
lexical_decisions:
- source_word: ⲙⲡⲣϥⲓⲣⲟⲟⲩϣ
  english_pob_choice: do not be anxious
  chosen_spanish: No se preocupen
  alternatives_spanish:
  - No estén ansiosos
  - No se inquieten
  - No se afanen
  lexicon: Crum; Layton
  rationale: El campo semántico admite 'estar ansioso', 'preocuparse' o 'tomar pensamiento'; en español 'no se preocupen' suena natural, claro y digno sin perder la fuerza imperativa negativa.
- source_word: ϫⲓⲛϩⲧⲟⲟⲩⲉ ... ϣⲁⲣⲟⲩϩⲉ
  english_pob_choice: from morning until evening
  chosen_spanish: de la mañana hasta la tarde
  alternatives_spanish:
  - desde la mañana hasta la tarde
  lexicon: Crum
  rationale: Mantiene el paralelismo temporal directo del copto con una preposición y un límite final natural en español.
- source_word: ϫⲓⲛϩⲓⲣⲟⲩϩⲉ ... ϣⲁϩⲧⲟⲟⲩⲉ
  english_pob_choice: from evening until morning
  chosen_spanish: de la tarde hasta la mañana
  alternatives_spanish:
  - desde la tarde hasta la mañana
  lexicon: Crum
  rationale: Reproduce la simetría de la primera cola y conserva el contraste día/noche presente en el texto.
- source_word: ⲟⲩ ⲡⲉⲧⲉⲣⲉⲛⲧⲱⲧⲛⲛⲁ–
  english_pob_choice: what you will
  chosen_spanish: lo que se pondrán
  alternatives_spanish:
  - lo que van a ponerse
  - aquello que se pondrán
  lexicon: Layton
  rationale: La construcción relativa sin cabeza introduce una cláusula equivalente a 'lo que'; en español conviene explicitar el objeto implícito por el contexto de vestirse.
- source_word: ϯⲛⲧⲟϥ
  english_pob_choice: put on
  chosen_spanish: se pondrán
  alternatives_spanish:
  - pondrán
  - se vestirán
  - se cubrirán
  lexicon: Crum; Lambdin
  rationale: '''Ponerse'' es el equivalente idiomático más natural para ropa y conserva la concreción del verbo copto sin volverlo demasiado general.'
- source_word: ϩⲓⲱⲧⲛⲧⲱⲧⲛ
  english_pob_choice: upon yourselves
  chosen_spanish: se
  alternatives_spanish:
  - sobre ustedes mismos
  - a ustedes mismos
  lexicon: Layton
  rationale: El reflexivo español ya expresa el sentido de ponerse algo sobre el propio cuerpo; evitar 'sobre ustedes mismos' suena más natural y no pierde el valor reflexivo.
- source_word: ⲁⲩⲱ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: Crum
  rationale: Conjunción coordinante simple; en español se conserva la parataxis del dicho.
translation_notes:
  revision_awareness: Se siguió la lectura normalizada del copto de Dilley para Nag Hammadi; no se incorporaron los añadidos de POxy 655. La decisión española de 'preocuparse' preserva el valor semántico principal del verbo, y 'se pondrán' expresa de manera idiomática la acción de vestirse sin introducir una paráfrasis amplia.
  spanish_consistency_notes:
  - Se mantuvo 'Jesús' como forma estable del nombre propio.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque el texto no las requiere.
  - 'La secuencia temporal se conservó en estructura paralela: mañana/tarde y tarde/mañana.'
  - La traducción usa un registro bíblico claro, pero no arcaizante.
