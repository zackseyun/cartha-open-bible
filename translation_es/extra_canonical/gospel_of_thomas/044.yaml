revisions:
- from: 'Jesús dijo: «El que blasfeme contra el Padre, se le perdonará; y el que blasfeme contra el Hijo, se le perdonará. Pero el que blasfeme contra el Espíritu Santo no se le perdonará, ni en la tierra ni en el cielo»[a].'
  to: 'Jesús dijo: «El que blasfeme contra el Padre, se le perdonará; y el que blasfeme contra el Hijo, se le perdonará. Pero el que blasfeme contra el Espíritu Santo no será perdonado, ni en la tierra ni en el cielo[a]»'
  rationale: 'Se hizo una reparación menor de estilo y sintaxis: ''no será perdonado'' suena más natural y equilibrado en español que ''no se le perdonará'', sin alterar el sentido del copto ni la decisión auditada sobre la circunlocución pasiva. También se afinó la nota para reflejar más exactamente la justificación teológica documentada en el English POB.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:05:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido básico del copto y del English POB: blasfemar contra el Padre/Hijo/Espíritu Santo; perdón para los dos primeros y no para el último; y el cierre espacial ''ni en la tierra ni en el cielo''. También mantiene bien la decisión léxica clave de ϫⲓⲟⲩⲁ como ''blasfemar''.'
  spanish_quality_summary: La redacción es clara y eclesialmente legible, pero presenta un problema sintáctico en 'no se le perdonará', menos natural y algo trabado tras las dos cláusulas anteriores. En español suena mejor y más paralelo 'no será perdonado' o 'no le será perdonado'. Además, la nota actual explica solo la dimensión teológica, pero no preserva la razón auditada del English POB sobre el contraste con el paralelo sinóptico con suficiente precisión.
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Jesús', 'Padre', 'Hijo' y 'Espíritu Santo' están bien. La elección 'blasfeme' refleja adecuadamente ϫⲓⲟⲩⲁ. 'Tierra' y 'cielo' preservan el marco cósmico del copto. El ajuste propuesto es de naturalidad y simetría verbal, no de glosario.
  issues:
  - severity: medium
    issue: Construcción 'no se le perdonará' poco natural en español en este contexto
    rationale: Aunque comprensible, después de 'se le perdonará' repetido dos veces, la negación 'no se le perdonará' resulta menos elegante y más pesada que 'no será perdonado', que conserva el valor pasivo/circunlocutivo del copto y mejora la fluidez.
  - severity: low
    issue: La nota teológica puede formularse con mayor fidelidad al rastro auditado en inglés
    rationale: El English POB subraya explícitamente el contraste con Mateo 12:32 y el marco espacial/cósmico frente al temporal/escatológico. Conviene conservar ese punto con redacción más exacta en español.
  revised_spanish_text: 'Jesús dijo: «El que blasfeme contra el Padre, se le perdonará; y el que blasfeme contra el Hijo, se le perdonará. Pero el que blasfeme contra el Espíritu Santo no será perdonado, ni en la tierra ni en el cielo[a]»'
  revised_footnotes:
  - marker: a
    text: 'Tomás sustituye el marco temporal/escatológico del paralelo sinóptico (cf. Mateo 12:32, ''ni en esta era ni en la venidera'') por un marco espacial/cósmico: ''ni en la tierra ni en el cielo''.'
    reason: theological_note
  revision_rationale: 'Se hizo una reparación menor de estilo y sintaxis: ''no será perdonado'' suena más natural y equilibrado en español que ''no se le perdonará'', sin alterar el sentido del copto ni la decisión auditada sobre la circunlocución pasiva. También se afinó la nota para reflejar más exactamente la justificación teológica documentada en el English POB.'
