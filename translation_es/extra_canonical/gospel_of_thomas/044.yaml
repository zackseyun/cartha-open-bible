base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/044.yaml
  text: Jesus said, "Whoever blasphemes against the Father will be forgiven, and whoever blasphemes against the Son will be forgiven. But whoever blasphemes against the Holy Spirit will not be forgiven, neither on earth nor in heaven."
  footnotes:
  - marker: blasphemes
    text: The Coptic spelling ⲡⲉⲧⲁϫⲉⲟⲩⲁ is a reduced form of the future relative ⲡⲉⲧⲛⲁϫⲓⲟⲩⲁ ('the one who will blaspheme').
    reason: dialect_note
  - marker: will be forgiven
    text: The Coptic uses the active third-person plural ('they will forgive him') as a standard circumlocution for the passive.
    reason: register_note
  - marker: neither on earth nor in heaven
    text: Thomas replaces the temporal/eschatological framework of the synoptic parallel (Matthew 12:32, 'neither in this age nor in the age to come') with a spatial/cosmic framework ('neither on earth nor in heaven'), reflecting its realized, non-apocalyptic theology.
    reason: theological_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: false
    changes_summary: Removed the bracketed editorial artifacts and smoothed the opening so it reads naturally while preserving the repeated blasphemes/will be forgiven clauses and the final earth/heaven phrase.
translation:
  language: es
  text: 'Jesús dijo: «El que blasfeme contra el Padre, se le perdonará; y el que blasfeme contra el Hijo, se le perdonará. Pero el que blasfeme contra el Espíritu Santo no será perdonado, ni en la tierra ni en el cielo[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tomás sustituye el marco temporal/escatológico del paralelo sinóptico (cf. Mateo 12:32, ''ni en esta era ni en la venidera'') por un marco espacial/cósmico: ''ni en la tierra ni en el cielo''.'
    reason: theological_note
lexical_decisions:
- source_word: ϫⲓⲟⲩⲁ
  english_pob_choice: blasphemes
  chosen_spanish: blasfeme
  alternatives_spanish:
  - maldiga
  - hable contra
  lexicon: Crum 794a
  rationale: El verbo copto ϫⲓ-ⲟⲩⲁ es el idiomatismo estándar para 'blasfemar'; por eso el español debe conservar ese campo semántico con 'blasfemar', no suavizarlo como 'hablar contra'.
- source_word: ⲕⲱ ⲉⲃⲟⲗ
  english_pob_choice: will be forgiven
  chosen_spanish: se le perdonará
  alternatives_spanish:
  - le será perdonado
  - será perdonado
  lexicon: Crum 96b
  rationale: El copto usa una circunlocución activa de tercera persona plural con valor pasivo; en español, la pasiva refleja 'se le perdonará' comunica bien el mismo sentido sin añadir sujeto explícito.
- source_word: ⲡⲕⲁϩ
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - tierra
  lexicon: Crum 131a
  rationale: En el par cósmico con 'cielo', 'la tierra' es la forma natural y precisa en español.
- source_word: ⲧⲡⲉ
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - cielo
  lexicon: Crum 259a
  rationale: '''El cielo'' mantiene el contraste espacial/cósmico del copto y resulta idiomático en español contemporáneo.'
theological_decisions:
- issue: Paralelo espacial frente al marco temporal sinóptico
  english_pob_reading: neither on earth nor in heaven
  chosen_spanish_reading: ni en la tierra ni en el cielo
  alternative_spanish_readings:
  - ni en esta era ni en la era venidera
  - ni en este siglo ni en el venidero
  rationale: Se conserva el marco espacial/cósmico propio de Tomás, en lugar de adaptar el dicho al esquema temporal de Mateo. Esto respeta la teología realizada del texto copto.
  doctrine_reference: Thomas 44; Matthew 12:32 (paralelo sinóptico)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió una mala traducción previa de ϫⲓⲟⲩⲁ, confirmando 'blasfemar' como la opción adecuada, y la revisión editorial que eliminó artefactos entre corchetes para dejar una redacción continua y publicable.
  spanish_consistency_notes:
  - Se mantuvo 'Jesús' para ⲓⲏⲥⲟⲩⲥ.
  - Se preservó la repetición tripartita de 'el que blasfeme...' y 'se le perdonará' como en el copto.
  - '''Espíritu Santo'' se capitaliza por referirse al Espíritu divino y para concordar con el uso cristiano en español.'
  - La nota al pie está anclada únicamente en la frase final marcada con [a].
