base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/037.yaml
  text: His disciples said, "When[a] will you be revealed[f] to us, and when will we see you?" Jesus said, "When you strip naked without being ashamed,[b] and you put your clothes under your feet like[e] little children,[c] and trample on them, then[d] you will see the Son of the Living One,[g] and you will not be afraid."
  footnotes:
  - marker: a
    text: Coptic idiom ⲁϣ ⲛϩⲟⲟⲩ (‘what day?’) functions as ‘when?’
    reason: cultural_note
  - marker: b
    text: 'ⲕⲱⲕ + ⲁϩⲏⲩ + negated ϣⲓⲡⲉ: literally ‘strip [and be] naked, [and] not be ashamed.’'
    reason: lexical_alternative
  - marker: c
    text: 'Double diminutive ⲡⲓⲕⲟⲩⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ intensifies ‘smallness’: ‘little children.’'
    reason: cultural_note
  - marker: d
    text: NHAM02.39 lb 34 shows bracketed restoration ⲧⲟⲧ[ⲉ] [ⲧⲉⲧⲛ̄]ⲁⲛⲁⲩ (‘then [you will] see’). Dilley normalizes to ⲛⲛⲧⲟⲟⲩ ⲧⲟⲧⲉ ⲛⲧⲱⲧⲛⲛⲁⲛⲁⲩ.
    reason: lacuna_or_restoration
  - marker: e
    text: Comparative particle varies as ⲛⲑⲉ/ⲛⲡϩⲉ (‘as/like’) in the witnesses; translated simply ‘like.’
    reason: dialect_note
  - marker: f
    text: POxy 655 preserves the opening ‘when you take off your clothes and are not ashamed’, aligning with the Coptic ⲉⲣϣⲁⲛ ⲛⲧⲱⲧⲛ ⲕⲱⲕⲛ ⲧⲱⲧⲛ ⲁϩⲏⲩ ⲙⲡⲉⲛⲧⲱⲧⲛ ϣⲓⲡⲉ.
    reason: cross_reference
  - marker: g
    text: ‘Son of the Living One’ renders ⲡϣⲏⲣⲉ ⲛⲡⲉⲧⲉⲣⲉⲱⲛϩ; a title with Semitic flavor. Not smoothed to ‘living God’ to retain Thomas’s diction.
    reason: cultural_note
