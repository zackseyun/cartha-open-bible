translation:
  language: es
  text: 'Sus discípulos le dijeron: «¿Cuándo[a] te revelarás[f] a nosotros, y cuándo te veremos?». Jesús dijo: «Cuando[b] os desnudéis sin avergonzaros, y pongáis vuestras ropas bajo vuestros pies como[e] los niños pequeños[c], y las pisoteéis, entonces[d] veréis al Hijo del Ser Viviente[g], y no tendréis miedo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El coptico usa literalmente ‘qué día’ como giro idiomático para ‘cuándo’.
    reason: cultural_note
  - marker: b
    text: La expresión subyacente combina ‘desnudarse’ con la negación de ‘avergonzarse’; por eso la traducción conserva la franqueza del original.
    reason: lexical_alternative
  - marker: c
    text: 'La duplicación diminutiva intensifica la idea de pequeñez: ‘niños pequeños’ puede entenderse también como ‘niños muy pequeños’.'
    reason: cultural_note
  - marker: d
    text: 'El testimonio copto de NHAM02.39 presenta una restauración en esta cláusula; la traducción sigue la lectura normalizada que da sentido pleno: ‘entonces veréis’.'
    reason: textual_variant
  - marker: e
    text: La comparación equivale a ‘como/as’; se prefiere ‘como’ por naturalidad en español.
    reason: spanish_style_note
  - marker: f
    text: El verbo copto tiene el matiz de ‘salir a la luz’ o ‘ser manifestado’; ‘revelarás’ conserva ese tono.
    reason: lexical_alternative
  - marker: g
    text: ‘Ser Viviente’ mantiene la forma nominal del título copto y evita armonizarlo con fórmulas más conocidas de otras tradiciones.
    reason: theological_note
lexical_decisions:
- source_word: ⲁϣ ⲛϩⲟⲟⲩ
  english_pob_choice: when (lit. what day)
  chosen_spanish: cuándo
  alternatives_spanish:
  - en qué día
  - qué día
  lexicon: Crum s.v. ϩⲟⲟⲩ
  rationale: El coptico usa literalmente ‘qué día’ con valor idiomático de ‘cuándo’; en español, ‘cuándo’ transmite mejor la pregunta temporal sin perder el sentido.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: be revealed
  chosen_spanish: revelarás
  alternatives_spanish:
  - te manifestarás
  - te harás visible
  lexicon: Crum s.v. ⲟⲩⲱⲛϩ
  rationale: La forma con ⲉⲃⲟⲗ tiene fuerza de ‘salir a la luz’/‘ser revelado’; ‘te revelarás’ conserva el tono revelatorio del dicho y encaja con el contexto.
- source_word: ⲁⲛⲁⲩ
  english_pob_choice: see
  chosen_spanish: veremos / veréis
  alternatives_spanish:
  - miraremos / miraréis
  - contemplaremos / contemplaréis
  lexicon: Crum s.v. ⲛⲁⲩ
  rationale: ‘Ver’ es el equivalente natural y directo para la petición y la promesa; evita una elevación innecesaria en un dicho breve.
- source_word: ⲕⲱⲕ (ⲕⲱⲕⲛ ⲧⲱⲧⲛ)
  english_pob_choice: strip
  chosen_spanish: desnudéis
  alternatives_spanish:
  - os quitéis la ropa
  - os desvistáis
  lexicon: Crum s.v. ⲕⲱⲕ
  rationale: El verbo expresa despojarse/descubrirse; en español, ‘desnudéis’ reproduce mejor la crudeza de ‘strip naked’ que una mera referencia a quitarse la ropa.
- source_word: ⲁϩⲏⲩ
  english_pob_choice: naked
  chosen_spanish: desnudos
  alternatives_spanish:
  - desnudas
  - sin ropa
  lexicon: Crum s.v. ⲁϩⲏⲩ
  rationale: En la estructura de la frase española, ‘desnudéis’ ya lleva la idea de desnudez; no obstante, el sentido de exposición física queda plenamente conservado en la construcción.
- source_word: ϣⲓⲡⲉ
  english_pob_choice: be ashamed
  chosen_spanish: avergonzaros
  alternatives_spanish:
  - sentir vergüenza
  - tener vergüenza
  lexicon: Crum s.v. ϣⲓⲡⲉ
  rationale: La negación del verbo expresa el matiz del original (‘sin avergonzarse’). En español, ‘avergonzaros’ es idiomático y conserva la fuerza moral del término.
- source_word: ϥⲓ
  english_pob_choice: take
  chosen_spanish: pongáis
  alternatives_spanish:
  - toméis
  - cojáis
  lexicon: Crum s.v. ϥⲓ
  rationale: En este contexto la acción no es solo tomar sino colocar; por eso se integra en la perífrasis natural ‘pongáis vuestras ropas’ para reflejar la secuencia del copto.
- source_word: ⲥⲧⲏⲛ (ⲡⲉⲧⲛϣⲧⲏⲛ)
  english_pob_choice: clothes
  chosen_spanish: ropas
  alternatives_spanish:
  - vestiduras
  - prendas
  lexicon: Crum s.v. ⲥⲧⲏⲛ
  rationale: ‘Ropas’ es claro y amplio; mantiene el plural y evita una palabra demasiado litúrgica que podría alejarse del tono concreto del texto.
- source_word: ϩⲁ ⲡⲉⲥⲏⲧ
  english_pob_choice: under your feet
  chosen_spanish: bajo vuestros pies
  alternatives_spanish:
  - debajo de vuestros pies
  - bajo los pies
  lexicon: Crum s.v. ϩⲁ; ⲥⲏⲧ
  rationale: ‘Bajo vuestros pies’ reproduce la imagen espacial de forma natural y conserva el poseedor implícito del copto.
- source_word: ⲛⲑⲉ / ⲛⲡϩⲉ
  english_pob_choice: like / as
  chosen_spanish: como
  alternatives_spanish:
  - al modo de
  - igual que
  lexicon: Layton, Grammar §236
  rationale: La comparación se expresa de modo sencillo con ‘como’; en español evita el artificio y preserva la analogía con los niños pequeños.
- source_word: ϫⲟⲡϫⲡ
  english_pob_choice: trample (tread on)
  chosen_spanish: pisoteéis
  alternatives_spanish:
  - piséis
  - aplastéis
  lexicon: Crum s.v. ϫⲟⲡϫⲡ
  rationale: El reduplicado indica acción repetida/intensa; ‘pisotear’ conserva esa fuerza mejor que un simple ‘pisar’.
- source_word: ⲡⲓⲕⲟⲩⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ
  english_pob_choice: the little children
  chosen_spanish: los niños pequeños
  alternatives_spanish:
  - los pequeñitos
  - los niños muy pequeños
  lexicon: Crum s.v. ⲕⲟⲩⲓ; ϣⲏⲣⲉ; ϣⲏⲙ
  rationale: La doble diminución del copto intensifica la pequeñez; ‘niños pequeños’ preserva la naturalidad del español y el matiz diminutivo.
- source_word: ⲡϣⲏⲣⲉ ⲛⲡⲉⲧⲉⲣⲉⲱⲛϩ
  english_pob_choice: the Son of the Living One
  chosen_spanish: el Hijo del Ser Viviente
  alternatives_spanish:
  - el Hijo del Viviente
  - el Hijo del que vive
  lexicon: Crum s.v. ϣⲏⲣⲉ; ⲱⲛϩ
  rationale: ‘Ser Viviente’ reproduce la construcción nominal del título y evita suavizarlo a ‘Dios vivo’, que no es la forma del texto. Mantiene además el color semítico/gnóstico del dicho de Tomás.
- source_word: ⲣϩⲟⲧⲉ
  english_pob_choice: be afraid
  chosen_spanish: tener miedo
  alternatives_spanish:
  - temer
  - atemorizarse
  lexicon: Crum s.v. ϩⲟⲧⲉ
  rationale: ‘No tendréis miedo’ comunica con claridad la negación futura del verbo, en un español contemporáneo y sobrio.
theological_decisions:
- issue: Título cristológico ‘Son of the Living One’
  english_pob_reading: Retains ‘Son of the Living One’ instead of smoothing to ‘Son of the Living God’ to preserve Thomas’s diction.
  chosen_spanish_reading: el Hijo del Ser Viviente
  alternative_spanish_readings:
  - el Hijo del Viviente
  - el Hijo del Dios vivo
  rationale: 'Se conserva el título tal como lo exige el copto: la construcción habla del ‘Viviente’/‘Ser Viviente’, no de una glosa teológica posterior. Traducirlo como ‘Dios vivo’ borraría una tensión lexical importante del texto.'
  doctrine_reference: Respeto de la literalidad titular y distinción entre traducción y armonización doctrinal.
- issue: Finalidad revelatoria del dicho
  english_pob_reading: ‘When you strip naked ... then you will see ...’ ties revelation to symbolic action and inner condition.
  chosen_spanish_reading: ‘Cuando os desnudéis sin avergonzaros ... entonces veréis ...’
  alternative_spanish_readings:
  - ‘si os desnudáis ...’
  - ‘cuando os despojéis ...’
  rationale: El copto presenta una condición temporal/resultado marcada por ‘cuando’; mantenerlo evita convertir el dicho en una mera exhortación moral y preserva su estructura revelatoria.
  doctrine_reference: Lectura narrativa y simbólica del dicho en Tomás, sin moralización reductiva.
translation_notes:
  revision_awareness: 'La redacción española sigue el estado revisado del inglés POB, especialmente la segunda cláusula: no añade un ‘toméis’ independiente, sino que condensa la acción en ‘pongáis vuestras ropas bajo vuestros pies’, manteniendo la secuencia del copto y la lectura aprobada por el pass final.'
  spanish_consistency_notes:
  - Se usa ‘Jesús’ para el hablante, coherente con el expediente auditado.
  - Se mantiene ‘Hijo’ con mayúscula inicial en el título cristológico por coherencia interna del registro.
  - Se conserva el paralelismo ‘cuándo ... cuándo ... entonces ...’ para reflejar la estructura del dicho.
  - ‘Desnudez’ y ‘no avergonzaros’ quedan unidos para no diluir la dureza intencional del copto.
  - ‘Niños pequeños’ traduce la doble diminución sin exceso de literalidad.
  - No se introduce ‘Cristo’ ni ‘Señor’ porque el texto fuente no los exige.
