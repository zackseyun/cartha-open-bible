translation:
  language: es
  text: 'Jesús dijo: «Quien ha encontrado el mundo[b] y se ha hecho rico[a], que renuncie al mundo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede significar «se ha hecho grande» o «prominente», porque el verbo ⲣⲣⲙⲙⲁⲟ puede denotar llegar a ser rico o llegar a ser grande.
    reason: lexical_alternative
  - marker: b
    text: Dilley restaura la preposición [ⲙ̄] antes del primer «mundo» debido a una pequeña laguna en el manuscrito.
    reason: lacuna_or_restoration
lexical_decisions:
- source_word: ⲡⲉϫⲉⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Dijo Jesús
  - Jesús expresó
  lexicon: Crum; gramática de Layton sobre la partícula citativa ϫⲉ
  rationale: Mantiene la fórmula introductoria directa y sobria del dicho, con el orden natural del español.
- source_word: ⲡⲉⲧⲉⲣⲉⲁⲛⲧⲟϥ ϭⲓⲛⲉ
  english_pob_choice: whoever has found
  chosen_spanish: Quien ha encontrado
  alternatives_spanish:
  - El que ha encontrado
  - Quien encuentra
  lexicon: Layton, Coptic Grammar, sobre el relativo indefinido con perfecto; Crum s.v. ϭⲓⲛⲉ
  rationale: ‘Quien’ conserva el valor genérico e impersonal; el perfecto español ‘ha encontrado’ refleja bien el aspecto resultativo del original.
- source_word: ⲛⲡⲕⲟⲥⲙⲟⲥ
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el cosmos
  - el orden del mundo
  lexicon: Crum s.v. ⲕⲟⲥⲙⲟⲥ
  rationale: ‘Mundo’ es la equivalencia más transparente y natural en español, y conserva el contraste ascético del dicho.
- source_word: ⲛ̄ⲧⲉⲛⲧⲟϥⲣⲣⲙⲙⲁⲟ
  english_pob_choice: and [has] become wealthy
  chosen_spanish: y se ha hecho rico
  alternatives_spanish:
  - y se ha vuelto grande
  - y se ha hecho prominente
  lexicon: Crum s.v. ⲣⲙⲙⲁⲟ ‘great man; rich man’
  rationale: En este contexto, ‘rico’ es la lectura más probable y comunica el resultado de manera idiomática en español; ‘se ha hecho’ conserva el matiz de devenir.
- source_word: ⲙⲁⲣⲉϥⲁⲣⲛⲁ
  english_pob_choice: let that one renounce
  chosen_spanish: que renuncie
  alternatives_spanish:
  - que niegue
  - que repudie
  lexicon: Crum s.v. ⲁⲣⲛⲁ
  rationale: ‘Renuncie’ expresa mejor la renuncia ética/ascética que pide el dicho, sin reducirla a una mera negación verbal.
- source_word: ⲙⲡ̣ⲕⲟⲥⲙⲟⲥ
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - del mundo
  - respecto del mundo
  lexicon: Crum s.v. ⲕⲟⲥⲙⲟⲥ
  rationale: La preposición española ‘a’ con ‘renunciar’ es la forma natural y precisa para reproducir el objeto del mandato.
translation_notes:
  revision_awareness: Se siguió el pasaje base con alta concordancia entre el texto copto, la traducción auditada en inglés y la revisión más reciente; no hubo cambios de contenido respecto del sentido establecido.
  spanish_consistency_notes:
  - Se mantuvo «mundo» para ⲕⲟⲥⲙⲟⲥ en ambos casos, como en la auditoría inglesa.
  - Se prefirió «renuncie» para ⲁⲣⲛⲁ por coherencia con el valor ético del dicho y con el registro español natural.
  - Se eligió «se ha hecho rico» para reflejar la opción principal del inglés y conservar la alternativa lexical en nota.
