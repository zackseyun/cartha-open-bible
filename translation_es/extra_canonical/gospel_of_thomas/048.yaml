revisions:
- from: 'Jesús dijo[a]: «Si dos hacen las paces entre sí[b] en esta casa única, dirán a la montaña: “Apártate”[c], y se apartará».'
  to: 'Jesús dijo[a]: «Si dos hacen las paces entre sí[b] en esta sola casa, le dirán a la montaña[c]: “Apártate”, y se apartará»'
  rationale: Se ajusta «única» a «sola» para preservar mejor el rango semántico documentado de ⲟⲩⲱⲧ sin introducir la idea de exclusividad. Se corrige la nota b eliminando «fieles», que no está respaldado por la evidencia léxica. Se hace explícito «le dirán a la montaña» para una sintaxis española más natural. No se requiere adjudicación adicional porque los cambios son menores y claramente sustentados por el audit trail.
