base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/048.yaml
  text: Jesus said[a], "If two make peace with each other in this one house, they will say to the mountain[c][b], ‘Move away,’ and it will move."
  footnotes:
  - marker: a
    text: ‘in this one house’ could also be rendered ‘in a single house’ or ‘in this same house’ (ⲟⲩⲱⲧ has the sense ‘one/single/same’).
    reason: lexical_alternative
  - marker: b
    text: ‘with each other’ translates ⲙⲛ ⲡⲟⲩⲉⲣⲏⲩ, literally ‘with their companions/friends,’ used idiomatically for mutuality.
    reason: cultural_note
  - marker: c
    text: ‘Move away’ reflects ⲉⲃⲟⲗ ‘out, away’; alternatives include ‘move out’ or simply ‘move.’
    reason: lexical_alternative
