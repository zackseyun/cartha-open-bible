review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva bien la estructura condicional, la reciprocidad de «hacer las paces», el deíctico «esta casa» y el resultado milagroso respecto a la montaña. Sin embargo, «esta casa única» suena semánticamente desplazado en español, porque «única» tiende a sugerir exclusividad/especialidad más que «una/sola/misma», y la nota b introduce «fieles», que no está sustentado por el audit trail ni por el valor léxico indicado. También conviene alinear mejor el imperativo con el matiz de alejamiento de ⲉⲃⲟⲗ.
  spanish_quality_summary: El texto es legible y digno, pero «esta casa única» resulta poco natural y puede malentenderse. «En esta sola casa» preserva mejor la extrañeza marcada sin sonar torpe. La nota b debe corregirse para evitar una expansión interpretativa no justificada. El resto del español fluye bien.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Jesús» está correcto. La elección «montaña» es adecuada. «Hacen las paces» y «entre sí» reflejan bien la reciprocidad. Se recomienda ajustar «única» a «sola» por fidelidad léxica al valor de ⲟⲩⲱⲧ.
  issues:
  - severity: medium
    issue: «esta casa única» no refleja con precisión natural el valor de ⲟⲩⲱⲧ
    rationale: El audit trail documenta «one/single/same». En español, «única» suele significar singular o exclusiva, no simplemente «una/sola/la misma». Esto puede introducir un matiz ajeno al original.
  - severity: medium
    issue: La nota b añade «fieles» como alternativa literal
    rationale: El English POB solo documenta «companions/friends»; «fieles» no está justificado por la evidencia proporcionada y estrecha/inclina indebidamente el sentido.
  - severity: low
    issue: «Apártate» es aceptable, pero «vete de aquí» o «aléjate» reflejarían más transparentemente el valor de alejamiento de ⲉⲃⲟⲗ
    rationale: No es un error grave, pero una formulación con sentido explícito de apartarse/irse puede sonar más clara en español moderno.
  revised_spanish_text: 'Jesús dijo[a]: «Si dos hacen las paces entre sí[b] en esta sola casa, le dirán a la montaña[c]: “Apártate”, y se apartará»'
  revised_footnotes:
  - marker: a
    text: «en esta sola casa» conserva el matiz de ⲟⲩⲱⲧ, que también puede entenderse como «una sola» o «esta misma».
    reason: lexical_alternative
  - marker: b
    text: «entre sí» expresa la relación mutua de ⲙⲛ ⲡⲟⲩⲉⲣⲏⲩ, literalmente «con sus compañeros/amigos», usado idiomáticamente con valor recíproco.
    reason: cultural_note
  - marker: c
    text: «la montaña» introduce el destinatario de «le dirán»; el mandato griego-cóptico equivale a «Apártate / Muévete de aquí».
    reason: lexical_alternative
  revision_rationale: Se ajusta «única» a «sola» para preservar mejor el rango semántico documentado de ⲟⲩⲱⲧ sin introducir la idea de exclusividad. Se corrige la nota b eliminando «fieles», que no está respaldado por la evidencia léxica. Se hace explícito «le dirán a la montaña» para una sintaxis española más natural. No se requiere adjudicación adicional porque los cambios son menores y claramente sustentados por el audit trail.
