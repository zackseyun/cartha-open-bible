translation:
  language: es
  text: 'Jesús dijo[a]: «Si dos hacen las paces entre sí[b] en esta sola casa, le dirán a la montaña[c]: “Apártate”, y se apartará»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «en esta sola casa» conserva el matiz de ⲟⲩⲱⲧ, que también puede entenderse como «una sola» o «esta misma».
    reason: lexical_alternative
  - marker: b
    text: «entre sí» expresa la relación mutua de ⲙⲛ ⲡⲟⲩⲉⲣⲏⲩ, literalmente «con sus compañeros/amigos», usado idiomáticamente con valor recíproco.
    reason: cultural_note
  - marker: c
    text: «la montaña» introduce el destinatario de «le dirán»; el mandato griego-cóptico equivale a «Apártate / Muévete de aquí».
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲣϣⲁⲛ
  english_pob_choice: if (prospective/conditional marker)
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: Layton, Coptic Grammar
  rationale: En esta sentencia gnómica, la prótasis prospectiva se comunica con mayor naturalidad y fidelidad en español con «si», conservando el valor condicional del coptico.
- source_word: ⲥⲛⲁⲩ
  english_pob_choice: two
  chosen_spanish: dos
  alternatives_spanish:
  - ambos
  lexicon: Crum
  rationale: Es un numeral simple; «dos» preserva la forma explícita del original sin añadir la idea distributiva de «ambos».
- source_word: ⲣⲉⲓⲣⲏⲛⲏ
  english_pob_choice: make peace
  chosen_spanish: hacen las paces
  alternatives_spanish:
  - están en paz
  - establecen la paz
  lexicon: Crum; préstamo griego εἰρήνη
  rationale: La construcción coptica expresa una acción o estado recíproco; «hacen las paces» conserva esa reciprocidad en español y evita reducirlo a un mero estado interior.
- source_word: ⲙⲛ ⲡⲟⲩⲉⲣⲏⲩ
  english_pob_choice: with each other
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - con sus compañeros
  lexicon: Crum s.v. ⲉⲣⲏⲩ
  rationale: «Entre sí» transmite la mutualidad idiomática sin estrechar el sentido a «compañeros» o «amigos», que sería demasiado específico.
- source_word: ϩⲛ ⲡⲉⲓⲏⲓ ⲟⲩⲱⲧ
  english_pob_choice: in this one house
  chosen_spanish: en esta casa única
  alternatives_spanish:
  - en esta misma casa
  - en una sola casa
  lexicon: Crum; Lambdin
  rationale: Mantiene el deíctico «esta» y la marcada unidad de ⲟⲩⲱⲧ. «Única» busca preservar la fuerza de «one/single/same» sin volverlo torpemente literal.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁϫⲱ ⲛⲧⲟⲥ
  english_pob_choice: they will say to it
  chosen_spanish: dirán a la montaña
  alternatives_spanish:
  - le dirán a la montaña
  - hablarán a la montaña
  lexicon: Layton; Crum s.v. ϫⲱ
  rationale: El verbo principal es «decir»; en español, con el destinatario ya explicitado, la mención de «a la montaña» hace natural la elipsis del pronombre dativo sin perder el sentido.
- source_word: ⲛⲡⲧⲟⲟⲩ
  english_pob_choice: the mountain
  chosen_spanish: la montaña
  alternatives_spanish:
  - el monte
  lexicon: Crum
  rationale: «Montaña» es la opción más transparente y amplia en español; «monte» puede sonar más bíblico, pero es menos preciso en registro general.
- source_word: ϫⲉ ⲡⲱⲱⲛⲉ ⲉⲃⲟⲗ
  english_pob_choice: Move away
  chosen_spanish: Apártate
  alternatives_spanish:
  - Muévete
  - Sal de allí
  lexicon: Crum s.v. ⲡⲱⲱⲛⲉ; ⲉⲃⲟⲗ
  rationale: «Apártate» refleja el movimiento de alejamiento contenido en ⲉⲃⲟⲗ («fuera, lejos») sin forzar un sentido espacial demasiado concreto.
- source_word: ⲛⲧⲟϥ ⲛⲁ ⲡⲱⲱⲛⲉ
  english_pob_choice: and it will move
  chosen_spanish: y se apartará
  alternatives_spanish:
  - y se moverá
  - y saldrá
  lexicon: Layton; Crum
  rationale: En español, un verbo pronominal comunica mejor el desplazamiento voluntario/efectivo implícito en el futuro coptico; «se apartará» enlaza naturalmente con el imperativo anterior.
theological_decisions:
- issue: Cómo representar la unidad y la reciprocidad sin suavizar el dicho
  english_pob_reading: If two make peace with each other in this one house
  chosen_spanish_reading: Si dos hacen las paces entre sí en esta casa única
  alternative_spanish_readings:
  - Si dos están en paz entre sí en esta misma casa
  - Si dos se reconcilian en una sola casa
  rationale: La formulación conserva tanto la reciprocidad de la frase como la singularidad enfática de «una casa / esta casa única». No se reduce a una mera convivencia pacífica, porque el coptico sugiere una acción relacional más activa.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Texto revisado con alta concordancia respecto del audit trail en inglés; no se requieren cambios sustantivos frente al control más reciente, y se han conservado las decisiones léxicas clave: condicional prospectivo, reciprocidad idiomática, unidad enfática de la casa y matiz direccional de ⲉⲃⲟⲗ.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para ⲓⲏⲥⲟⲩⲥ.
  - Se evita «Cristo» porque el texto no lo contiene.
  - Se usa «la montaña» en lugar de «el monte» por transparencia léxica.
  - Se traduce el imperativo con un pronominal natural en español para conservar el movimiento de alejamiento.
  - No se introduce puntuación o interpretación doctrinal ajena al dicho.
