base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/006.yaml
  text: 'His disciples questioned him and said to him[1], "Do you want us to fast? And how shall we pray? Shall we give alms? And what shall we observe concerning eating?"


    Jesus said, "Do not lie, and what you hate, do not do. For all things are revealed before heaven. For there is nothing hidden that will not be revealed[2], and nothing covered that will remain without being uncovered."'
  footnotes:
  - marker: '1'
    text: The Greek fragment P.Oxy. 654 reads "before truth" (ἐνώπιον τῆς ἀληθείας) instead of "before heaven".
    reason: textual_variant
  - marker: '2'
    text: The Greek fragment P.Oxy. 654 reads "and nothing buried that will not be raised" (καὶ τεθαμμένον ὃ οὐκ ἐγερθήσεται) instead of "and nothing covered that will remain without being uncovered".
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Sus discípulos le preguntaron y le dijeron: «¿Quieres que ayunemos? ¿Y cómo hemos de orar? ¿Hemos de dar limosna? ¿Y qué hemos de observar respecto de la comida?»


    Jesús dijo: «No menti[s] y no hagas lo que odias. Porque todas las cosas son reveladas delante del cielo. Pues no hay nada oculto que no vaya a ser revelado[a], ni nada cubierto que permanezca sin ser descubierto».'
  philosophy: formal
  footnotes:
  - marker: a
    text: 'El fragmento griego de P.Oxy. 654 lee: «y nada enterrado que no será levantado» (καὶ τεθαμμένον ὃ οὐκ ἐγερθήσεται), en lugar de «nada cubierto que permanezca sin ser descubierto».'
    reason: textual_variant
lexical_decisions:
- source_word: ⲣⲛⲏⲥⲧⲉⲩⲉ
  english_pob_choice: fast
  chosen_spanish: ayunar
  alternatives_spanish:
  - hacer ayuno
  - guardar ayuno
  lexicon: BDAG
  rationale: El préstamo copto remite al verbo de ayuno; en español, 'ayunar' es el equivalente natural y fiel, manteniendo el sentido disciplinario y religioso.
- source_word: ⲉϣ ⲧⲉ ⲑⲉ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - cuál es la manera
  lexicon: Crum 54b
  rationale: La idiomática copta expresa modo o manera; 'cómo' reproduce con claridad la función interrogativa sin calcar la estructura.
- source_word: ϭⲓⲛⲟⲩⲱⲙ
  english_pob_choice: eating
  chosen_spanish: la comida
  alternatives_spanish:
  - el comer
  - la alimentación
  - respecto de comer
  lexicon: Crum 819a
  rationale: El contexto pide un asunto de observancia alimentaria. 'La comida' comunica de forma natural el campo semántico de alimento/dieta, sin volver temporal la pregunta como 'cuando comemos'.
- source_word: ϫⲉϭⲟⲗ
  english_pob_choice: lie
  chosen_spanish: mentir
  alternatives_spanish:
  - decir mentira
  - decir falsedad
  lexicon: Crum 808b
  rationale: La forma copta significa 'decir una mentira'; en el imperativo español, 'no mentir' funciona con fuerza proverbial y conserva la brevedad del original.
- source_word: ⲙⲡⲉⲙⲧⲟ ⲉⲃⲟⲗ
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: Crum 192a
  rationale: La locución significa 'antes de / en presencia de'. 'Delante de' es un español claro y solemne que conserva el valor locativo-relacional sin oscurecer el texto.
- source_word: ⲟⲩⲉϣⲛ
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin ser
  - no ... que
  lexicon: Crum 501b
  rationale: El privativo copto unido al infinitivo se expresa de manera directa con 'sin', preservando la oposición entre 'cubierto' y 'descubierto'.
theological_decisions:
- issue: Divergencia textual entre el copto 'cubierto' y el fragmento griego 'enterrado/levantado'
  english_pob_reading: nothing covered that will remain without being uncovered
  chosen_spanish_reading: nada cubierto que permanezca sin ser descubierto
  alternative_spanish_readings:
  - nada enterrado que no sea levantado
  - nada oculto que no llegue a revelarse
  rationale: La base copta habla de algo 'cubierto' y de su ser 'descubierto', lo que mantiene un registro de revelación/apertura más que de sepultura/resurrección. La versión española sigue el copto y conserva la nota del fragmento griego como variante textual.
  doctrine_reference: Variant reading / textual criticism; no doctrinal harmonization
- issue: Forma del primer mandato negativo
  english_pob_reading: Do not lie, and what you hate, do not do.
  chosen_spanish_reading: No mintas y no hagas lo que odias.
  alternative_spanish_readings:
  - No menti[s] y no hagas lo que odias.
  - No digas mentira y no hagas lo que odias.
  rationale: El copto presenta una prohibición proverbial breve. 'No mintas' es idiomático y fiel; se evita moralizar el dicho más allá de su formulación compacta.
  doctrine_reference: Ethical maxim / proverbial injunction
- issue: Alcance de 'before heaven'
  english_pob_reading: all things are revealed before heaven
  chosen_spanish_reading: todas las cosas son reveladas delante del cielo
  alternative_spanish_readings:
  - todas las cosas son reveladas ante el cielo
  - todas las cosas son reveladas en presencia del cielo
  rationale: El copto indica 'antes/en presencia de' y el texto no justifica insertar una idea de juicio explícito. 'Delante del cielo' mantiene la imagen espacial y la generalidad de la afirmación.
  doctrine_reference: Revelation / omniscience imagery
translation_notes:
  revision_awareness: 'La redacción sigue el copto sahídico y atiende las correcciones del historial: mantiene ''delante del cielo'' para ⲙ̄ⲡⲉⲙⲧⲟ ⲉⲃⲟⲗ ⲛ̄, evita convertir ⲛ̄ϭⲓⲟⲩⲱⲙ en una cláusula temporal, y conserva la oposición ''cubierto/descubierto'' frente a la variante griega ''enterrado/levantado''.'
  spanish_consistency_notes:
  - Se usa 'Jesús' como forma fija para ⲓ︤ⲥ︥.
  - Se conserva el paralelismo y el tono sentencioso del logion con frases breves y coordinadas.
  - '''Limosna'' reproduce el valor de ϯⲉⲗⲉⲏⲙⲟⲥⲩⲛⲏ en un registro bíblico natural para el español eclesial.'
  - No se introduce 'SEÑOR' ni 'Cristo', porque el pasaje no los contiene.
