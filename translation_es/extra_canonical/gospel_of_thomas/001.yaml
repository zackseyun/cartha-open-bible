base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/001.yaml
  text: And he said[3][2][1], "Whoever finds the interpretation(1) of these sayings(2) will not taste death(3)."
  footnotes:
  - marker: '1'
    text: Or “explanation.” We retain “interpretation” to reflect the technical hermeneutical sense of Coptic ⲡϩⲉⲣⲙⲏⲛⲉⲓⲁ (Greek ἑρμηνεία).
    reason: lexical_alternative
  - marker: '2'
    text: Manuscript exhibits a Lycopolitan-style plural demonstrative (ⲛ̄ⲛⲉⲉⲓϣⲁϫⲉ, “these sayings”), while the normalized lemmatization reads singular (ⲛⲡⲉⲓϣⲁϫⲉ). The Greek fragment (POxy 654) also favors the plural.
    reason: dialect_note
  - marker: '3'
    text: “Taste death” is a conventional idiom meaning “experience death” (cf. Crum s.v. ϫⲓϯ).
    reason: cultural_note
