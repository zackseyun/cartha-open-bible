translation:
  language: es
  text: 'Y dijo: «Quien encuentre la interpretación[a] de estos dichos[b] no probará la muerte[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Interpretación» conserva el matiz técnico de un préstamo griego; también puede entenderse como «explicación».
    reason: lexical_alternative
  - marker: b
    text: El manuscrito exhibe un demostrativo plural de tipo licopolitano («estos dichos»), mientras que la lematización normalizada puede leerse en singular; el fragmento griego POxy 654 también favorece el plural.
    reason: dialect_note
  - marker: c
    text: '«Probar la muerte» es un modismo: significa «experimentar la muerte».'
    reason: cultural_note
lexical_decisions:
- source_word: ⲁⲩⲱ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Ahora
  lexicon: Crum; Lambdin
  rationale: Conserva la conexión narrativa breve y directa del original, con una conjunción natural en español.
- source_word: ⲡⲉϫⲉⲛⲧⲟϥ
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - declaró
  lexicon: Crum; Layton (grammar)
  rationale: Verbo narrativo simple que reproduce la tersura del dicho en Thomas.
- source_word: ⲡϩⲉⲣⲙⲏⲛⲉⲓⲁ
  english_pob_choice: interpretation
  chosen_spanish: interpretación
  alternatives_spanish:
  - explicación
  - significado
  lexicon: Crum; préstamo griego señalado por Layton
  rationale: Se mantiene el valor técnico-hermenéutico del préstamo griego, evitando suavizarlo a una explicación más general.
- source_word: ⲛ̄ⲛⲉⲉⲓϣⲁϫⲉ / ⲛⲡⲉⲓϣⲁϫⲉ
  english_pob_choice: of these sayings
  chosen_spanish: de estas palabras
  alternatives_spanish:
  - de estos dichos
  - de este dicho
  lexicon: Crum; Layton (demostrativos)
  rationale: «Palabras» comunica de forma natural en español el plural del testimonio; se conserva la referencia plural apoyada por el testimonio griego, aunque sin forzar un calco rígido de «sayings».
- source_word: ϫⲓϯ ⲛ ⲡⲙⲟⲩ
  english_pob_choice: taste death
  chosen_spanish: probar la muerte
  alternatives_spanish:
  - gustar la muerte
  - experimentar la muerte
  lexicon: Crum
  rationale: Se conserva la metáfora idiomática con un verbo natural en español; «probar» mantiene la fuerza de experiencia directa sin sonar antinatural.
theological_decisions:
- issue: Alcance de la promesa negativa final
  english_pob_reading: will not taste death
  chosen_spanish_reading: no probará la muerte
  alternative_spanish_readings:
  - no morirá
  - no experimentará la muerte
  rationale: 'Se preserva la tensión del dicho: no se reduce a una simple negación de morir, sino a la expresión figurada de experimentar la muerte.'
  doctrine_reference: Lenguaje idiomático de experiencia/participación, no una formulación doctrinal sistemática
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios sustanciales respecto del último pase revisado; la única adaptación es idiomática en español para reflejar con naturalidad el plural del objeto y el modismo final, sin alterar el contenido auditado.
  spanish_consistency_notes:
  - Se mantiene «interpretación» como término técnico, en línea con la decisión POB en inglés.
  - Se evita «Señor» u otra terminología litúrgica no presente en el texto fuente.
  - Se conserva el lenguaje figurado «probar la muerte» para no aplanar el modismo coptico.
