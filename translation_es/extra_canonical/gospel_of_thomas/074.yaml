base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/074.yaml
  text: He said[1], "Lord, there are many around the drinking trough[3][2], but there is nothing in the well."
  footnotes:
  - marker: '1'
    text: The text reads ⲡⲉϫⲁϥ ϫⲉ ⲡϫⲟⲉⲓⲥ ('He said, "Lord..."'). It is unclear whether Jesus is addressing God, or a disciple is addressing Jesus. Some scholars suggest it may be a continuation of Saying 73.
    reason: textual_variant
  - marker: '2'
    text: 'Coptic ⲧϫⲱⲧⲉ (Crum 792b: well, cistern). Translated here as ''drinking trough'' to distinguish it from the following word for well (ⲧϣⲱⲛⲉ).'
    reason: lexical_alternative
  - marker: '3'
    text: Coptic ⲗⲁⲁⲩ can mean 'anything' or 'anyone'. The phrase could also be translated 'there is no one in the well,' which would shift the metaphor from a lack of water to a lack of people willing to go deep.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Él dijo[a]: «Señor, hay muchas alrededor del bebedero[b], pero no hay nada en el pozo[c]».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El copto dice literalmente «él dijo, Señor», dejando ambiguo quién habla y a quién se dirige. Se conserva esa ambigüedad en español, como en el aparato auditado en inglés.
    reason: textual_variant
  - marker: b
    text: ⲧϫⲱⲧⲉ puede significar «pozo» o «cisterna»; aquí se traduce «bebedero» para mantener la distinción con el siguiente término y reflejar el lugar visible de acceso al agua.
    reason: lexical_alternative
  - marker: c
    text: ⲗⲁⲁⲩ con la negación puede significar «nada» o «nadie». En este contexto, «nada» es la lectura más natural; «nadie» también es posible si se entiende la imagen de personas que no descienden al pozo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲡϫⲟⲉⲓⲥ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - el Señor
  lexicon: Crum 783a
  rationale: La forma coptа con artículo funciona aquí como vocativo; en español, «Señor» conserva el valor reverencial y la ambigüedad sobre si se dirige a Dios o a Jesús, como en la nota auditada en inglés.
- source_word: ⲧϫⲱⲧⲉ
  english_pob_choice: drinking trough
  chosen_spanish: bebedero
  alternatives_spanish:
  - abrevadero
  - cisterna
  - pozo
  lexicon: Crum 792b
  rationale: El inglés POB evita «well» para distinguir este término del siguiente. «Bebedero» mantiene la idea de un lugar de abastecimiento/consumo de agua y conserva la distinción léxica frente a «pozo».
- source_word: ⲧϣⲱⲛⲉ
  english_pob_choice: well
  chosen_spanish: pozo
  alternatives_spanish:
  - cisterna
  - pozo de agua
  - cisterna-pozo
  lexicon: Crum 572a
  rationale: Para ⲧϣⲱⲛⲉ, «pozo» es la correspondencia más natural en español y mantiene la imagen de profundidad que contrasta con el término anterior.
- source_word: ⲗⲁⲁⲩ
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nadie
  lexicon: Crum 147b
  rationale: Con la negación existencial, el sentido más natural en contexto es «nada», es decir, no hay agua en el pozo. Se preserva así la lectura principal auditada en inglés, sin excluir la posibilidad de una lectura personal en nota.
theological_decisions:
- issue: Identidad del hablante y del destinatario
  english_pob_reading: He said, "Lord..."
  chosen_spanish_reading: 'Él dijo: «Señor...»'
  alternative_spanish_readings:
  - 'El Señor dijo: «...»'
  - 'Dijo: «Señor...»'
  rationale: 'Se conserva la ambigüedad del texto copto: el narrador introduce una cita con «él dijo», pero el vocativo «Señor» no resuelve si habla Jesús, Dios o un discípulo. No se emenda ni se fija una identidad no explicitada por el texto.'
  doctrine_reference: Ambigüedad textual preservada; no se resuelve cristológicamente por inferencia
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente (sin cambios) y el informe de control cruzado que marca problemas mayores. La decisión principal aquí es conservar la ambigüedad del hablante y del destinatario, y distinguir cuidadosamente los dos términos de agua para no borrar la tensión léxica del original.
  spanish_consistency_notes:
  - Se usa «Señor» para ⲡϫⲟⲉⲓⲥ por coherencia con el registro reverencial y la ambigüedad del vocativo.
  - Se evita traducir ambos términos acuáticos como «pozo» para no perder la distinción documentada por la POB en inglés.
  - Se mantiene «nada» como lectura principal de ⲗⲁⲁⲩ, con la alternativa personal reconocida en nota.
  - La puntuación respeta la separación entre introducción narrativa y cita directa.
