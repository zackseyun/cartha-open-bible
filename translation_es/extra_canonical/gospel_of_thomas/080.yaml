translation:
  language: es
  text: 'Jesús dijo: «Quien ha llegado a conocer el mundo ha encontrado el cuerpo[a]; y quien ha encontrado el cuerpo[b][c][d], el mundo no es digno de él»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto usa aquí ⲡⲥⲱⲙⲁ, préstamo griego de σῶμα, cuyo sentido básico es «cuerpo». La revisión auditada rechazó «cadáver» aquí para no armonizar este dicho con el paralelo de otro dicho de Tomás.
    reason: lexical_alternative
  - marker: b
    text: El verbo ϩⲉ, «encontrar», aparece aquí con ⲉ antes de su objeto, un rasgo dialectal/ortográfico del copto de Nag Hammadi que no cambia su sentido.
    reason: dialect_note
  - marker: c
    text: El artículo definido con ⲥⲱⲙⲁ aparece en ambas menciones; el español conserva la repetición con «el cuerpo».
    reason: cultural_note
  - marker: d
    text: Compárese el Dicho 56, que transmite una máxima estrechamente paralela; Tomás conserva ambas formas sin armonizarlas internamente.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲉϫⲉ ⲓⲏⲥⲟⲩⲥ
  english_pob_choice: Jesus said
  chosen_spanish: Jesús dijo
  alternatives_spanish:
  - Jesús dice
  lexicon: Layton, Coptic Grammar; Lambdin, Introduction to Sahidic Coptic
  rationale: La fórmula introductoria de dicho en Tomás se vierte de modo natural en pasado en español, manteniendo el valor narrativo de la cita sin mecanizar el aspecto formal del coptico.
- source_word: ⲡⲉⲧⲉⲣⲉ … ⲥⲟⲟⲩⲛ
  english_pob_choice: whoever has come to know
  chosen_spanish: quien ha llegado a conocer
  alternatives_spanish:
  - quien ha conocido
  - quien ha llegado a saber
  lexicon: Crum s.v. ⲥⲟⲟⲩⲛ ‘to know’
  rationale: La construcción relativa perfecta expresa una acción completada; «ha llegado a conocer» preserva ese valor de culminación sin sobrecargar con una interpretación más fuerte que el texto.
- source_word: ⲡⲕⲟⲥⲙⲟⲥ
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el cosmos
  - el orden del mundo
  lexicon: Crum s.v. ⲕⲟⲥⲙⲟⲥ
  rationale: «Mundo» es la equivalencia estable en español para el uso tomasino de kosmos y conserva la amplitud semántica entre creación ordenada y mundo humano.
- source_word: ϩⲉ
  english_pob_choice: has found
  chosen_spanish: ha encontrado
  alternatives_spanish:
  - ha hallado
  - ha descubierto
  lexicon: Crum s.v. ϩⲉ ‘find’
  rationale: «Encontrar» es el verbo más natural y directo en español para este hallazgo; «ha encontrado» mantiene el perfecto completivo del coptico.
- source_word: ⲡⲥⲱⲙⲁ
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo muerto
  - el cadáver
  lexicon: Crum s.v. ⲥⲱⲙⲁ ‘body, corpse’
  rationale: 'En este dicho se conserva la distinción léxica del coptico: ⲥⲱⲙⲁ es el préstamo griego σῶμα, cuyo sentido básico es «cuerpo». Traducirlo como «cadáver» borraría la diferencia observada por la revisión auditada frente al dicho paralelo; por eso se mantiene «cuerpo».'
- source_word: ⲙⲡϣⲁ … ⲛⲛⲧⲟϥ ⲁⲛ
  english_pob_choice: is not worthy of him
  chosen_spanish: no es digno de él
  alternatives_spanish:
  - no merece a él
  - no es merecedor de él
  lexicon: Crum s.v. ϣⲁ ‘to be worthy, worth’
  rationale: «No es digno de él» reproduce el valor idiomático de «to be worthy of» con una formulación natural en español bíblico contemporáneo.
- source_word: ⲇⲉ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: Crum s.v. ⲇⲉ
  rationale: Aquí funciona como conector simple de paralelismo; «y» evita introducir contraste o matiz adversativo no exigido por el texto.
theological_decisions:
- issue: ⲡⲥⲱⲙⲁ debe leerse como «cuerpo» y no como «cadáver» en este dicho
  english_pob_reading: the body
  chosen_spanish_reading: el cuerpo
  alternative_spanish_readings:
  - el cadáver
  - un cadáver
  rationale: 'La revisión textual auditada corrige la antigua armonización con el dicho paralelo: en este pasaje el coptico usa ⲡⲥⲱⲙⲁ (σῶμα), no ⲡⲧⲱⲙⲁ. Para no borrar esa distinción del autor, el español mantiene «cuerpo». La tensión paradoxal del logion permanece por el contraste entre «mundo» y «cuerpo», sin forzar una equivalencia con el otro dicho.'
  doctrine_reference: Informe de revisión léxica del pasaje y nota de revisión auditada en el paquete fuente
translation_notes:
  revision_awareness: 'La tradición auditada muestra una corrección importante: el coptico de este dicho usa ⲡⲥⲱⲙⲁ (σῶμα, ‘cuerpo’), no el término para ‘cadáver’. La versión inglesa anterior fue revisada para reflejar ese dato, y la presente traducción española sigue esa corrección, evitando una harmonización con el dicho paralelo y preservando la distinción léxica del testimonio de Nag Hammadi.'
  spanish_consistency_notes:
  - He mantenido «Jesús» y el tono sentencioso breve propio de Tomás.
  - He usado «mundo» y «cuerpo» de forma consistente para respetar la terminología del original.
  - He evitado «SEÑOR», «Cristo» y otras equivalencias no presentes en el texto fuente.
  - La puntuación conserva el paralelismo y el quiebre final del dicho.
