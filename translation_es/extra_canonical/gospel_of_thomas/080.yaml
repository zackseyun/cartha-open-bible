base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/080.yaml
  text: Jesus said[a], “Whoever has come to know the world has found the body; and whoever has found the body[e][d][c][b], the world is not worthy of him.”
  footnotes:
  - marker: a
    text: Coptic ⲡⲥⲱⲙⲁ can mean either ‘body’ or ‘corpse.’ ‘Corpse’ is chosen to preserve Thomas’s stark antithesis; ‘body’ is possible but blunter.
    reason: lexical_alternative
  - marker: b
    text: The verb ϩⲉ ‘find’ appears with ⲉ before its object here, a dialectal/orthographic trait in Nag Hammadi Coptic that does not change the verb’s sense.
    reason: dialect_note
  - marker: c
    text: 'The definite article with ⲥⲱⲙⲁ is rendered anaphorically: first mention as ‘a corpse,’ second as ‘the corpse,’ a common way to reflect Coptic generic + anaphoric definiteness in English.'
    reason: cultural_note
  - marker: d
    text: Compare Saying 56, which transmits a closely parallel maxim; Thomas preserves both forms without internal harmonization.
    reason: cross_reference
  - marker: e
    text: Or 'a corpse; and whoever has found the corpse'.
    reason: previous_rendering
