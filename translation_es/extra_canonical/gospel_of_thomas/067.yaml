translation:
  language: es
  text: 'Jesús dijo: «El que conoce el Todo, y sin embargo se falta a sí mismo[a][t][x][3][2], en todo está falto».[1]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: '«en todo» refleja la frase idiomática copta de totalidad (ⲛⲡⲙⲁ ⲧⲏⲣⲛⲧⲟϥ). Alternativas posibles: «totalmente», «en todos los aspectos».'
    reason: lexical_alternative
  - marker: '2'
    text: El copto usa una construcción reflexiva con ⲟⲩⲁⲁ + pronombre; por eso también puede entenderse como «le falta a sí mismo» o «está falto de sí mismo».
    reason: lexical_alternative
  - marker: '3'
    text: La expresión copta de totalidad tiene sentido adverbial; se ha evitado una traducción demasiado literal que sonaría extraña en español.
    reason: spanish_style_note
  - marker: t
    text: En NH II, 45.20, el segundo pronombre sujeto fue suplido por el editor; la omisión manuscrita no altera el sentido.
    reason: textual_variant
  - marker: x
    text: Comparar temáticamente con Mc 8:36; Mt 16:26; Lc 9:25, aunque la dicción de Tomás es distinta.
    reason: cross_reference
  - marker: a
    text: 'O: «El que ha llegado a conocer el Todo, y sin embargo se falta a sí mismo, en todo está falto».'
    reason: alternative_reading
lexical_decisions:
- source_word: ⲡⲉⲧⲥⲟⲟⲩⲛ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  lexicon: Crum; Layton
  rationale: 'El relativo presente sahídico expresa una acción gnómica y actual: «el que conoce». En español, «conoce» preserva mejor la relación personal/cognitiva que «sabe» y sigue el ajuste revisado del POB inglés.'
- source_word: ⲡⲧⲏⲣϥ
  english_pob_choice: the All
  chosen_spanish: el Todo
  alternatives_spanish:
  - el conjunto
  - todo
  lexicon: Crum; Layton
  rationale: Se conserva el valor cosmológico e intencional de Thomas mediante «el Todo», evitando reducirlo a un mero cuantificador impersonal.
- source_word: ⲣϭⲣⲱϩ
  english_pob_choice: lack
  chosen_spanish: se falta a sí mismo
  alternatives_spanish:
  - le falta a sí mismo
  - está falto de sí mismo
  - carece de sí mismo
  lexicon: Crum
  rationale: El verbo copto expresa estar en carencia/deficiencia. La construcción reflexiva «se falta a sí mismo» reproduce el giro paradójico de «lacks himself» sin volverlo demasiado interpretativo.
- source_word: ⲟⲩⲁⲁ + pronombre
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - solo
  - por sí mismo
  - en sí mismo
  lexicon: Crum
  rationale: La construcción con valor reflexivo se vierte con «a sí mismo», que en español comunica con claridad la lectura reflexiva documentada por el audit trail.
- source_word: ⲛⲡⲙⲁ ⲧⲏⲣⲛⲧⲟϥ
  english_pob_choice: in every respect
  chosen_spanish: en todo
  alternatives_spanish:
  - por completo
  - en todos los aspectos
  - totalmente
  lexicon: Layton (syntax); Crum (ⲙⲁ)
  rationale: La frase idiomática adverbial de totalidad puede sonar pesada si se expande demasiado. «En todo» conserva la idea de totalidad y funciona con naturalidad en español, aunque el inglés POB opta por una equivalencia más explícita.
theological_decisions:
- issue: Alcance de «el Todo» en Thomas
  english_pob_reading: Thomas often uses “the All” with cosmic scope; retaining “the All” preserves Thomas’s deliberate strangeness and intertextual resonance.
  chosen_spanish_reading: «el Todo» mantiene el matiz cósmico y no se neutraliza como simple «todo».
  alternative_spanish_readings:
  - todo
  - el conjunto
  rationale: La frase de Thomas parece hablar de una totalidad con peso conceptual, no solo de la suma de cosas. Por eso se conserva la mayúscula conceptual implícita en «el Todo» como opción de lectura pública y reverente.
  doctrine_reference: Lectura literaria y semántica de Thomas; no hay definición doctrinal cristiana estándar vinculante en el pasaje.
translation_notes:
  revision_awareness: La revisión más reciente corrige el valor verbal de ⲡⲉⲧⲥⲟⲟⲩⲛ como relativo presente («el que conoce»), no como perfecto («ha llegado a conocer»). Esta versión española sigue esa corrección y evita un pretérito/perfecto injustificado. También incorpora la lectura revisada del POB inglés para mantener la gnómica del dicho.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para ⲓⲏⲥⲟⲩⲥ.
  - Se usa «el Todo» como término técnico consistente con el POB inglés.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto.
  - «A sí mismo» conserva la relación reflexiva documentada en el audit trail.
  - La puntuación y el uso de comillas angulares siguen normas editoriales del español.
