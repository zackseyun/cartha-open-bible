base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/067.yaml
  text: Jesus said[1], "The one who knows the All, yet lacks himself[a][x][t][3][2], is lacking in every respect."
  footnotes:
  - marker: '1'
    text: “the All” renders ⲡⲧⲏⲣϥ; alternatives include “the whole” or “everything.” Thomas often uses “the All” with cosmic scope (cf. the work’s internal usage).
    reason: lexical_alternative
  - marker: '2'
    text: '“lacks himself” translates ⲉⲣⲉ ⲛⲧⲟϥ ⲣϭⲣⲱϩ ⲟⲩⲁⲁ ⲛⲧⲟϥ; alternatives: “is lacking in himself,” or “is lacking (alone/by himself).” The ⲟⲩⲁⲁ + pronoun construction supports a reflexive nuance.'
    reason: lexical_alternative
  - marker: '3'
    text: “in every respect” reflects idiomatic ⲛⲡⲙⲁ ⲧⲏⲣⲛⲧⲟϥ (‘in the place [of him] all’), an adverbial totality phrase.
    reason: dialect_note
  - marker: t
    text: 'NH II, 45.20: the second subject pronoun is supplied by the editor (⟨ϥ⟩) and normalized as ⲛⲧⲟϥ; the scribe likely omitted it. Meaning is unchanged.'
    reason: lacuna_or_restoration
  - marker: x
    text: Thematically compare Mark 8:36; Matt 16:26; Luke 9:25 (gain the world vs. loss of self), noting that Thomas’s diction is distinct.
    reason: cross_reference
  - marker: a
    text: Or 'Jesus said, "The one who has come to know the All, yet lacks himself, is lacking in every respect."'.
    reason: previous_rendering
