revisions:
- from: 'Jesús dijo: «El que conoce el Todo, y sin embargo se falta a sí mismo[a][t][x][3][2], en todo está falto».[1]'
  to: 'Jesús dijo: «El que conoce el Todo, y sin embargo carece de sí mismo[a][t][x][b], carece en todos los aspectos[c]».'
  rationale: La revisión conserva las decisiones fuente-clave («conoce», «el Todo») pero reemplaza dos giros españoles poco naturales por formulaciones más fieles al valor semántico de carencia y al modismo adverbial final. También elimina la alternativa «ha llegado a conocer», ya descartada en la revisión inglesa auditada.
