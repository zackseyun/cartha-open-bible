base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/086.yaml
  text: Jesus said, "The foxes have their holes, and the birds have their nest, but the Son of Man does not have a place to lay his head and rest."
  footnotes:
  - marker: holes
    text: The manuscript reads ⲛⲟⲩ[ⲃⲏ]ⲃ ('a hole/den'), but this is generally understood or emended as ⲛⲉⲩⲃⲏⲃ ('their holes') to parallel 'their nest' (ⲙⲡⲉⲩⲙⲁϩ) in the following clause.
    reason: textual_variant
  - marker: nest
    text: Thomas uses the singular 'nest' (ⲡⲉⲩⲙⲁϩ) and omits 'of the air', diverging from the canonical parallels (Matthew 8:20, Luke 9:58).
    reason: cross_reference
  - marker: and rest
    text: Thomas adds the phrase 'and rest' (ⲛϥⲙⲧⲟⲛ ⲙⲙⲟϥ), which is absent from the Synoptic versions of this saying.
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Removed the placeholder marker after 'said' and smoothed the quotation punctuation. Capitalized 'Son of Man' for consistency with formal English style. Preserved the source's 'and rest' addition and the singular 'nest'.
translation:
  language: es
  text: 'Jesús dijo: «Las zorras tienen sus madrigueras, y las aves tienen su nido, pero el Hijo del Hombre no tiene un lugar para recostar[a] su cabeza y descansar»[b].'
  philosophy: formal
  footnotes:
  - marker: a
    text: El copto usa un verbo que literalmente significa 'inclinar' o 'poner de lado'; aquí se traduce con la locución natural 'recostar su cabeza'.
    reason: lexical_alternative
  - marker: b
    text: Thomas añade la frase 'y descansar', que no aparece en los paralelos sinópticos de este dicho.
    reason: cross_reference
lexical_decisions:
- source_word: ⲃⲁϣⲟⲣ
  english_pob_choice: foxes
  chosen_spanish: zorras
  alternatives_spanish:
  - zorros
  lexicon: Crum 46b
  rationale: El sustantivo está en plural; en español, 'zorras' mantiene el plural y el registro proverbial. 'Zorros' también es posible, pero 'zorras' sigue más de cerca el sustantivo genérico de la imagen.
- source_word: ⲃⲏⲃ
  english_pob_choice: holes
  chosen_spanish: madrigueras
  alternatives_spanish:
  - hoyos
  - cuevas
  - agujeros
  lexicon: Crum 29a
  rationale: El copto permite 'cavidad/hoyo/guarida'. En español, 'madrigueras' comunica naturalmente el refugio animal y conserva la imagen proverbial; no se pierde el sentido de 'hole/den'.
- source_word: ϩⲁⲗⲁⲧⲉ
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  lexicon: Crum 670b
  rationale: '''Aves'' es más sobrio y amplio en español bíblico, y corresponde al plural simple del copto sin añadir el modificador ''del cielo'' que falta en Thomas.'
- source_word: ⲙⲁϩ
  english_pob_choice: nest
  chosen_spanish: nido
  alternatives_spanish:
  - nidos
  - albergue
  lexicon: Crum 208a
  rationale: El copto usa un sustantivo singular con posesivo plural ('su nido' / 'su nido de ellos'). 'Nido' mantiene esa singularidad distintiva frente a los paralelos sinópticos.
- source_word: ⲣⲓⲕⲉ
  english_pob_choice: lay
  chosen_spanish: recostar
  alternatives_spanish:
  - poner
  - inclinar
  - acostar
  lexicon: Crum 292a
  rationale: El verbo copto literalmente es 'inclinar/poner de lado'. 'Recostar' reproduce de modo natural la expresión idiomática 'recostar la cabeza' sin perder el gesto físico.
- source_word: ⲙⲧⲟⲛ
  english_pob_choice: rest
  chosen_spanish: descansar
  alternatives_spanish:
  - reposar
  - tomar reposo
  lexicon: Crum 188b
  rationale: El valor verbal aquí es descansar/reposar. 'Descansar' es la opción más clara en español; mantiene la adición de Thomas 'y descansar' que el audit trail documenta.
- source_word: ⲡϣⲏⲣⲉ ⲇⲉ ⲙ̄ⲡⲣⲱⲙⲉ
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el hijo del hombre
  lexicon: N/A
  rationale: Se conserva la forma tradicional de título/expresión ya establecida en español, aunque el contexto sapiencial de Thomas no obliga a una mayúscula teológica específica. La mayúscula refleja la forma fija de la expresión en español eclesial.
theological_decisions:
- issue: Capitalización de 'Son of Man'
  english_pob_reading: Son of Man
  chosen_spanish_reading: Hijo del Hombre
  alternative_spanish_readings:
  - hijo del hombre
  rationale: En español, la expresión se escribe de manera fija y reconocible como 'Hijo del Hombre'. La mayúscula mantiene la referencia tradicional sin añadir una interpretación cristológica que el dicho de Thomas no desarrolla explícitamente.
  doctrine_reference: Uso tradicional de la expresión en español bíblico; evita sobreinterpretación cristológica.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparece exactamente en el texto principal. También se mantuvo la adición propia de Tomás ('ni descansar') y la singularidad de 'nido'.
  spanish_consistency_notes:
  - Se prefirió un español sobrio y publicable, sin depender de la redacción sinóptica clásica para no ocultar las diferencias documentadas del texto de Tomás.
  - 'Se conservaron singular/plural y posesivos donde el copto los distingue: ''sus madrigueras'' / ''su nido''.'
  - Se mantuvo 'Hijo del Hombre' como expresión fija en español, sin alterar el sentido del dicho ni forzar una lectura doctrinal adicional.
