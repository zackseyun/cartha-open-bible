translation:
  language: es
  text: 'Un hombre le dijo[a]: «Di a mis hermanos, para que repartan conmigo los bienes de mi padre». Él le respondió: «Hombre, ¿quién me ha puesto como repartidor?». Entonces se volvió a sus discípulos y les dijo: «No soy un repartidor, ¿verdad?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase inicial está parcialmente restaurada en el códice; la reconstrucción afecta solo a la apertura narrativa.
    reason: source_note
lexical_decisions:
- source_word: ⲡⲉϫⲉⲟⲩⲣⲱⲙⲉ ⲛⲁⲛⲧⲟϥ
  english_pob_choice: A man said to him
  chosen_spanish: Un hombre le dijo
  alternatives_spanish:
  - Un hombre le habló
  lexicon: Crum; Lambdin
  rationale: La fórmula narrativa introduce con naturalidad al hablante sin añadir interpretación; en español, «le dijo» conserva la relación directa del original.
- source_word: ϫⲱⲛⲧⲟⲥ
  english_pob_choice: tell
  chosen_spanish: Di
  alternatives_spanish:
  - Dile
  - Habla
  lexicon: Crum s.v. ϫⲟⲟⲥ; Lambdin §37
  rationale: El pedido es imperativo y directo. «Di» reproduce la fuerza de la petición sin sobretraducirla.
- source_word: ⲛⲡⲁⲥⲟⲛ / ⲛⲛⲁⲥⲛⲏⲩ
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mi hermano
  lexicon: Crum s.v. ⲥⲛⲏⲩ
  rationale: El contexto favorece el plural; en español, «mis hermanos» mantiene ese sentido y sigue la decisión textual principal.
- source_word: ϩⲓⲛⲁ ⲉⲣⲉⲛⲧⲟⲟⲩ ⲛⲁⲡⲱϣⲉ
  english_pob_choice: so that they may divide
  chosen_spanish: para que repartan
  alternatives_spanish:
  - para que dividan
  - a fin de que repartan
  lexicon: Lambdin §146; Crum s.v. ⲡⲱϣⲉ
  rationale: «Repartan» expresa la división/apropiación de una herencia o bienes con tono natural en español y conserva la idea de apportioning, no de simple separación.
- source_word: ⲛⲡϩⲛⲁⲁⲩ
  english_pob_choice: property
  chosen_spanish: los bienes
  alternatives_spanish:
  - la propiedad
  - la herencia
  - las posesiones
  lexicon: Crum s.v. ϩⲛⲁⲁⲩ
  rationale: La expresión coptica puede referirse a bienes, posesiones o herencia. «Los bienes» es natural en español y evita una connotación legal demasiado específica que el copto no exige.
- source_word: ⲙⲛⲁⲛⲟⲕ
  english_pob_choice: with me
  chosen_spanish: conmigo
  lexicon: Crum s.v. ⲙⲛ
  rationale: Preposición comitativa directa y transparente.
- source_word: ⲱ ⲡⲣⲱⲙⲉ ⲛⲓⲙ
  english_pob_choice: Man, who
  chosen_spanish: Hombre, ¿quién
  alternatives_spanish:
  - O hombre, ¿quién
  - Señor, ¿quién
  lexicon: Crum s.v. ⲣⲱⲙⲉ; Lambdin §108
  rationale: La vocación brusca del original se conserva con «Hombre»; la pregunta arranca de forma directa y retórica.
- source_word: ⲉⲓⲣⲉ (ⲉⲧⲉⲣⲉ…ⲉⲓⲣⲉ)
  english_pob_choice: made/appointed
  chosen_spanish: me ha puesto como
  alternatives_spanish:
  - me ha hecho
  - me ha nombrado como
  lexicon: Crum s.v. ⲉⲓⲣⲉ
  rationale: «Puesto como» captura bien la idea de asignar una función u oficio; en español resulta más idiomático que una traducción más literal de «hacer».
- source_word: ⲛⲣⲉϥⲡⲱϣⲉ
  english_pob_choice: a divider
  chosen_spanish: repartidor
  alternatives_spanish:
  - divisor
  - partidor
  - uno que reparte
  lexicon: Crum s.v. ⲡⲱϣⲉ
  rationale: El agenteivo designa a quien reparte o divide. «Repartidor» comunica la función con claridad en español y mantiene el foco en la acción de repartir.
- source_word: ⲁⲛⲧⲟϥ ⲕⲱⲧⲛⲧⲟϥ (printed ⲁϥⲕⲟⲧϥ)
  english_pob_choice: he turned (toward)
  chosen_spanish: se volvió
  alternatives_spanish:
  - se volvió hacia
  - volvió su atención a
  lexicon: Crum s.v. ⲕⲱⲧⲛ; Layton
  rationale: La construcción reflexiva se naturaliza en español como «se volvió», que conserva el cambio de dirección hacia los discípulos.
- source_word: ⲙⲁⲑⲏⲧⲏⲥ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  lexicon: Crum s.v. ⲙⲁⲑⲏⲧⲏⲥ
  rationale: Préstamo griego común; «discípulos» es la equivalencia estándar y fiel.
- source_word: ⲙⲏ
  english_pob_choice: I am not a divider, am I?
  chosen_spanish: ¿verdad?
  alternatives_spanish:
  - ¿no es así?
  - ¿acaso no soy un repartidor?
  lexicon: Lambdin §198
  rationale: La partícula finaliza una pregunta retórica que espera respuesta negativa. En español, «¿verdad?» conserva ese matiz interrogativo y retórico sin forzar una reescritura demasiado literal.
- source_word: ⲉⲣⲉⲁⲛⲟⲕ ϣⲱⲡⲉ
  english_pob_choice: that I am
  chosen_spanish: soy
  alternatives_spanish:
  - llego a ser
  - me convierto en
  lexicon: Crum s.v. ϣⲱⲡⲉ; Lambdin §92
  rationale: En la pregunta retórica, el copulativo español basta y suena natural; no es necesario explicitar «llegar a ser».
- source_word: ⲛⲣⲉϥⲡⲱϣⲉ (final clause)
  english_pob_choice: a divider
  chosen_spanish: un repartidor
  alternatives_spanish:
  - un divisor
  - uno que reparte
  lexicon: Crum s.v. ⲡⲱϣⲉ
  rationale: Se mantiene la misma equivalencia nominal para evitar oscilación terminológica dentro del dicho.
theological_decisions:
- issue: Rhetorical question vs. declarative denial in the final clause
  english_pob_reading: I am not a divider, am I?
  chosen_spanish_reading: No soy un repartidor, ¿verdad?
  alternative_spanish_readings:
  - ¿No soy un repartidor?
  - No soy un repartidor.
  rationale: La partícula ⲙⲏ introduce una pregunta retórica con expectativa de respuesta negativa. El español más natural para ese valor es una interrogación tag-like, no una simple afirmación ni una negación plana.
  doctrine_reference: Lambdin §198; revisión adjudicada del audit trail
- issue: Avoiding harmonization to legal/judicial language
  english_pob_reading: a divider
  chosen_spanish_reading: repartidor
  alternative_spanish_readings:
  - árbitro
  - juez
  rationale: El texto no dice «juez»; conserva una terminología funcional centrada en repartir bienes. «Repartidor» evita introducir una carga jurídica ajena al dicho.
  doctrine_reference: Comparación con Lucas 12:13–14; audit trail note f
- issue: Meaning of the father's estate
  english_pob_reading: property
  chosen_spanish_reading: los bienes
  alternative_spanish_readings:
  - la herencia
  - la propiedad
  - las posesiones
  rationale: La frase copta permite un campo semántico amplio. «Los bienes» mantiene esa amplitud y suena natural en una disputa familiar por patrimonio.
  doctrine_reference: Crum s.v. ϩⲛⲁⲁⲩ; audit trail note c
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del audit trail que corrigió una lectura previa de la cláusula final: la partícula ⲙⲏ se interpreta aquí como interrogativa retórica, no como «Look» ni como una prohibición. Por eso la versión española adopta una interrogación confirmatoria natural: «¿verdad?».'
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y oral, adecuado para una sentencia breve.
  - Se evitó el vocabulario jurídico fuerte («juez», «árbitro») para no sobreinterpretar el dicho.
  - «Hermanos» y «bienes» conservan el alcance familiar y patrimonial del texto sin especificar más de lo que el copto exige.
