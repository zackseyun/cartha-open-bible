base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/072.yaml
  text: A man said to him[a], "Tell my brothers, so that they may divide my father's property with me." He said to him, "Man, who has made me a divider?" He turned to his disciples and said to them, "I am not a divider, am I?"
  footnotes:
  - marker: a
    text: Initial ⲡⲉϫⲉⲟⲩⲣⲱⲙⲉ (‘a man said’) is partially restored on NH II, 46; restoration brackets in Dilley’s printed text indicate minor loss.
    reason: lacuna_or_restoration
  - marker: b
    text: Printed text reads ⲛ̄ⲛⲁⲥⲛⲏⲩ (‘my brothers,’ plural); normalized line lists ⲛⲡⲁⲥⲟⲛ (‘my brother,’ sing.). Context favors plural, but either is grammatically possible.
    reason: textual_variant
  - marker: c
    text: ⲛⲡϩⲛⲁⲁⲩ can also mean ‘inheritance’ or ‘possessions’; ‘property’ is chosen to avoid legal connotations not explicit in the Coptic.
    reason: lexical_alternative
  - marker: d
    text: ⲕⲱⲧⲛⲧⲟϥ (normalized) vs. ⲕⲟⲧϥ (printed) reflects Sahidic/Lycopolitan orthographic variation of ‘turn (oneself).’
    reason: dialect_note
  - marker: e
    text: The particle ⲙⲏ may be read deictically (‘Look/Behold’) or, by influence of Greek μή, with prohibitive nuance (‘Do not [let it be] that I am…’). We render ‘Look’ but the clause is taken as a denial in context.
    reason: lexical_alternative
  - marker: f
    text: Compare Luke 12:13–14, where ‘judge’ (δικαστής) appears alongside ‘divider’; Thomas’s version retains only ‘divider.’
    reason: cross_reference
  - marker: g
    text: Or '"Look—I am not a divider."'.
    reason: previous_rendering
