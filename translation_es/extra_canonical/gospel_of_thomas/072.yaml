    rationale: El copto expresa un nombre de agente, pero en español bíblico neutro «repartidor» resulta tosco. «El que reparte» conserva la función sin añadir ‘juez’ ni ‘árbitro’, en línea con la decisión léxica inglesa de evitar armonización.
  - severity: low
    issue: La petición inicial puede formularse con mayor claridad
    rationale: «Di a mis hermanos…» es comprensible, pero «Diles a mis hermanos…» expresa más claramente el ruego dirigido a Jesús para que hable a los hermanos.
  revised_spanish_text: 'Un hombre le dijo[a]: «Diles a mis hermanos[b] que repartan conmigo los bienes[c] de mi padre». Él le dijo: «Hombre, ¿quién me ha puesto como el que reparte?». Luego se volvió[d] hacia sus discípulos y les dijo: «¿No soy yo el que reparte?»'
