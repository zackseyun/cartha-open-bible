base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/100.yaml
  text: They showed Jesus a gold coin,[1] and they said to him[1], "Those who belong to Caesar demand the tax from us."[2] He said to them, "Give the things of Caesar to Caesar; give the things of God to God[a][3][2]; and what is mine—give it to me."[3]
  footnotes:
  - marker: '1'
    text: ⲉⲟⲩⲛⲟⲩⲃ literally ‘a gold’; in context this denotes a coin of gold, not merely raw metal.
    reason: lexical_alternative
  - marker: '2'
    text: The phrase can also be read more literally as ‘those who [work for/serve] Caesar seek from us the tax.’ The verb ⲥϣⲓⲧⲉ is ‘seek/ask for’; in fiscal contexts ‘demand/exact’ is natural.
    reason: lexical_alternative
  - marker: '3'
    text: Thomas uniquely adds this third imperative (‘and what is mine, give it to me’) beyond the Synoptic versions.
    reason: cross_reference
  - marker: a
    text: Or "Give to Caesar what is Caesar's; give to God what is God's".
    reason: previous_rendering
