translation:
  language: es
  text: 'Les mostraron una moneda de oro,[a] y le dijeron: «Los que son de César nos exigen el impuesto.[b] Él les dijo: «Den las cosas de César a César; den las cosas de Dios a Dios; y lo que es mío, dármelo[a][c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲉⲟⲩⲛⲟⲩⲃ literalmente significa ‘un oro’; en este contexto designa una moneda de oro, no simplemente metal bruto.
    reason: lexical_alternative
  - marker: b
    text: La frase también puede leerse más literalmente como ‘los que [trabajan/están al servicio de] César buscan de nosotros el impuesto’. El verbo ⲥϣⲓⲧⲉ significa ‘buscar/pedir’; en contexto fiscal, ‘exigir’ es natural.
    reason: lexical_alternative
  - marker: c
    text: 'Thomas añade aquí un tercer imperativo: ‘y lo que es mío, dármelo’, más allá de las versiones sinópticas.'
    reason: cross_reference
lexical_decisions:
- source_word: ⲥⲉⲃⲟⲓ (as in ⲧⲥⲉⲃⲟⲓ … ⲏⲥⲟⲩⲥ)
  english_pob_choice: showed
  chosen_spanish: mostraron
  alternatives_spanish:
  - enseñaron
  - presentaron
  lexicon: Crum; Layton
  rationale: El verbo coptico expresa ‘mostrar, exhibir’; en español, ‘mostraron’ comunica de modo natural la acción de sacar y enseñar la moneda.
- source_word: ⲉⲟⲩⲛⲟⲩⲃ
  english_pob_choice: a gold coin
  chosen_spanish: una moneda de oro
  alternatives_spanish:
  - una pieza de oro
  - un oro
  lexicon: Crum (ⲛⲟⲩⲃ ‘gold’)
  rationale: El coptico dice literalmente ‘un oro’, pero en contexto fiscal la referencia es a una moneda; ‘moneda de oro’ conserva la concreción sin forzar una denominación específica.
- source_word: ⲥϣⲓⲧⲉ
  english_pob_choice: demand
  chosen_spanish: exigen
  alternatives_spanish:
  - piden
  - solicitan
  - reclaman
  lexicon: Crum; Layton
  rationale: En contexto de impuestos, el matiz de ‘pedir/exigir’ es coercitivo; ‘exigen’ reproduce bien esa fuerza sin sonar arcaico.
- source_word: ⲡϣⲱⲙ
  english_pob_choice: the tax
  chosen_spanish: el impuesto
  alternatives_spanish:
  - el tributo
  - la contribución
  lexicon: Crum; Layton
  rationale: En español actual, ‘impuesto’ comunica mejor la carga fiscal que ‘tributo’, aunque este último sigue siendo una alternativa viable.
- source_word: ⲛⲁⲕⲁⲓⲥⲁⲣ / ⲛⲁⲡⲛⲟⲩⲧⲉ
  english_pob_choice: the things of Caesar / the things of God
  chosen_spanish: las cosas de César / las cosas de Dios
  alternatives_spanish:
  - lo que pertenece a César / lo que pertenece a Dios
  - lo de César / lo de Dios
  lexicon: Layton (possessive/article forms)
  rationale: La forma copta plural pide el paralelo ‘las cosas de…’; esto conserva la distinción gramatical señalada en la revisión entre el plural de César/Dios y el singular final.
- source_word: ϯ
  english_pob_choice: give
  chosen_spanish: den
  alternatives_spanish:
  - entreguen
  - dénenle
  lexicon: Layton (verbal paradigms)
  rationale: ‘Den’ es el equivalente más directo y sobrio del imperativo, y mantiene el paralelismo de la sentencia.
- source_word: ⲡⲉⲧⲉⲡⲱⲉⲓ
  english_pob_choice: what is mine
  chosen_spanish: lo que es mío
  alternatives_spanish:
  - lo mío
  - lo que me pertenece
  lexicon: Crum (ⲡⲱⲉⲓ ‘one’s own, property’)
  rationale: ‘Lo que es mío’ conserva la construcción relativa y el contraste con ‘las cosas de…’; en el cierre, ‘dármelo’ expresa la petición final con naturalidad en español.
translation_notes:
  revision_awareness: La redacción sigue la revisión que observa el plural copto en ‘las cosas de César’ y ‘las cosas de Dios’, y preserva el contraste con el singular final ‘lo que es mío’. También mantiene la ampliación propia de Tomás en el último miembro.
  spanish_consistency_notes:
  - Se usa ‘Dios’ en lugar de ‘Señor’ porque el coptico dice explícitamente ‘Dios’.
  - Se evita ‘Cristo’ porque el pasaje no lo contiene.
  - Se mantiene una sintaxis sobria y litúrgicamente legible, sin armonizar con la redacción sinóptica tradicional.
