base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/062.yaml
  text: Jesus said[1], "I tell my mysteries to those [who are worthy] of [my] mysteries. What your right hand will do[4][3][2], do not let your left hand know what it is doing."
  footnotes:
  - marker: '1'
    text: The manuscript is damaged here; '[who are worthy]' (ⲛⲉ[ⲧⲙⲡϣⲁ]) and '[my]' (ⲛ[ⲛⲁ]) are standard restorations based on context and early Christian parallels (e.g., Clement of Alexandria, Stromata 5.10.63).
    reason: textual_variant
  - marker: '2'
    text: The Coptic uses ⲉⲓ̈ϫⲱ (eijō) for 'I tell', a dialectal First Present form where standard Sahidic would use ϯϫⲱ (tijō).
    reason: dialect_note
  - marker: '3'
    text: The Coptic uses ⲙⲛ̄ⲧⲣⲉ- (mntre-), a variant spelling of the standard Sahidic negative causative imperative ⲙⲡⲣⲧⲣⲉ- (mprtre-).
    reason: dialect_note
  - marker: '4'
    text: Unlike the canonical parallel in Matthew 6:3, which applies this saying to giving alms in secret, Thomas places it immediately after a statement about esoteric mysteries, reframing the saying as an instruction on spiritual secrecy.
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:47Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Yo digo mis misterios a los que son dignos de mis misterios. Lo que tu mano derecha hará[b], no permitas que tu mano izquierda sepa lo que está haciendo[c]».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El manuscrito está dañado aquí; la restauración de «Jesús» y la lectura plural «mis misterios» siguen el contexto y la reconstrucción estándar del testimonio copto.
    reason: textual_variant
  - marker: b
    text: «Lo que tu mano derecha hará» traduce literalmente la forma copta; Tomás conserva el dicho sin añadir el contexto de limosna que tiene en Mateo 6:3.
    reason: cross_reference
  - marker: c
    text: La expresión final usa una construcción equivalente a «lo que está haciendo»; no se debe entender como «que lo está haciendo» ni como una referencia a una acción específica distinta del dicho.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲓϫⲱ / ϫⲉⲉⲣⲉⲁⲛⲟⲕϫⲱ
  english_pob_choice: I tell / I speak
  chosen_spanish: Yo digo
  alternatives_spanish:
  - Yo hablo
  - Yo les digo
  lexicon: Crum 740b
  rationale: La forma copta es un presente simple de primera persona; por eso en español conviene un verbo directo como «digo», sin convertirlo en una perífrasis enfática. «Hablo» suaviza demasiado la acción de comunicar, y «les digo» añade un objeto no explicitado.
- source_word: ⲙⲩⲥⲧⲏⲣⲓⲟⲛ
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - misterios sagrados
  - secretos
  lexicon: Crum 202a; BDAG 661
  rationale: El préstamo griego en copto apunta a «mysteries» en plural. En español, «misterios» mantiene el sentido técnico-religioso sin convertirlo en una paráfrasis más interpretativa como «secretos».
- source_word: ⲙⲡϣⲁ
  english_pob_choice: who are worthy
  chosen_spanish: los que son dignos
  alternatives_spanish:
  - los dignos
  - los que merecen
  lexicon: Crum 131b
  rationale: La restauración indica la idea de ser digno o merecedor. «Los que son dignos» conserva la relación descriptiva sin imponer un tono más absoluto que «los dignos» ni un matiz de mérito que «merecen» podría intensificar.
- source_word: ⲟⲩⲛⲁⲙ
  english_pob_choice: right hand
  chosen_spanish: mano derecha
  alternatives_spanish:
  - mano diestra
  - tu derecha
  lexicon: Crum 483a
  rationale: El término significa «derecha» o «mano derecha». En español, «mano derecha» es claro y natural; «mano diestra» suena más literario y «tu derecha» reduce la concreción corporal del original.
- source_word: ϩⲃⲟⲩⲣ
  english_pob_choice: left hand
  chosen_spanish: mano izquierda
  alternatives_spanish:
  - mano siniestra
  - tu izquierda
  lexicon: Crum 656b
  rationale: La referencia es a la mano izquierda literal. «Mano izquierda» preserva la simetría con «mano derecha» y evita la carga estilística o connotativa de «siniestra».
- source_word: ϫⲉ ⲉⲣⲉ ⲛⲧⲟⲥ ⲉⲓⲣⲉ ⲟⲩ
  english_pob_choice: what it is doing
  chosen_spanish: lo que está haciendo
  alternatives_spanish:
  - qué está haciendo
  - lo que hace
  lexicon: Crum 239b; Crum 480a
  rationale: El interrogativo/relativo copto ⲟⲩ pide una construcción con «lo que». En español, «lo que está haciendo» reproduce el sentido procesual del verbo sin convertirlo en una pregunta directa. «Lo que hace» sería más breve pero menos fiel al aspecto progresivo sugerido por el contexto.
theological_decisions:
- issue: Relación del dicho sobre la mano derecha e izquierda con el contexto de misterios
  english_pob_reading: Thomas presents the saying as a standalone aphorism immediately after speaking of mysteries, not as an instruction about almsgiving as in Matthew.
  chosen_spanish_reading: El dicho queda como una máxima independiente sobre la reserva espiritual, colocada tras la referencia a los misterios.
  alternative_spanish_readings:
  - Instrucción sobre dar limosna en secreto
  - Regla práctica sobre la generosidad oculta
  rationale: El testigo copto de Tomás no introduce limosna ni caridad; por tanto, no debe importarse el marco de Mateo 6:3. La traducción conserva el alcance de la formulación tal como aparece en este dicho y sugiere su función como discreción espiritual, no como explicación mateana.
  doctrine_reference: 'Paralelo sinóptico: Mateo 6:3; aquí no se lee con ese marco narrativo.'
translation_notes:
  revision_awareness: 'Sigo la revisión que corrigió dos puntos decisivos del audit trail inglés: el verbo copto es un presente simple de «decir/hablar», no una cleft (“I am the one who…”), y ⲟⲩⲛⲁⲙ significa «mano derecha», no «poder». También conservo la lectura plural «mis misterios» y la independencia del dicho respecto de Mateo 6:3.'
  spanish_consistency_notes:
  - He usado «misterios» en plural para reflejar el artículo posesivo plural copto.
  - He mantenido «mano derecha / mano izquierda» como pares transparentes y simétricos.
  - He evitado «Señor» o terminología eclesiástica no presente en el texto.
  - El tono es sobrio y publicable, sin importar la paráfrasis de Mateo al cuerpo del dicho.
  - Los marcadores de nota aparecen exactamente donde corresponde en el texto español.
