translation:
  language: es
  text: 'Jesús dijo[a]: «Los fariseos y los escribas han recibido las llaves del conocimiento; las han ocultado. No entraron, y no permitieron a los que querían entrar[b][c][d]. Pero ustedes, háganse prudentes como serpientes y inocentes como palomas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La traducción sigue el uso de una cita introductoria normal en español; el copto presenta la fórmula «Jesús dijo».
    reason: spanish_style_note
  - marker: b
    text: El copto usa una construcción de movimiento con matiz de entrada; «querían entrar» recoge el valor volitivo del original con naturalidad.
    reason: lexical_alternative
  - marker: c
    text: La revisión textual del expediente corrige una lectura singular anterior («serpent… dove») y favorece el plural reflejado aquí («serpientes… palomas»).
    reason: textual_variant
  - marker: d
    text: La secuencia «prudentes como serpientes e inocentes como palomas» mantiene la comparación del original sin añadir una interpretación moralizante adicional.
    reason: source_note
lexical_decisions:
- source_word: ⲡⲫⲁⲣⲓⲥⲁⲓⲟⲥ
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - el fariseo (colectivo)
  lexicon: Layton; Crum
  rationale: El singular coptico funciona de modo colectivo; en español, el plural comunica con naturalidad el grupo religioso entero sin perder el referente histórico.
- source_word: ⲅⲣⲁⲙⲙⲁⲧⲉⲩⲥ
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - letrados
  - especialistas en la Ley
  lexicon: Layton; Crum
  rationale: «Escribas» conserva el término socio-religioso familiar y es fiel al equivalente usual del campo semántico.
- source_word: ⲁⲛⲧⲟⲟⲩϫⲓ
  english_pob_choice: have received
  chosen_spanish: han recibido
  alternatives_spanish:
  - han tomado
  lexicon: Crum (ϫⲓ)
  rationale: ϫⲓ puede significar tomar o recibir; aquí el perfecto indica una acción completada con efecto presente, mejor expresada por «han recibido».
- source_word: ϣⲁϣⲧ
  english_pob_choice: keys
  chosen_spanish: las llaves
  alternatives_spanish:
  - la llave
  lexicon: Crum
  rationale: El plural está explícito; por eso «llaves» evita borrar el número del original.
- source_word: ⲅⲛⲱⲥⲓⲥ
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - gnosis
  - saber
  lexicon: Layton
  rationale: Aunque es un préstamo griego, aquí no parece un tecnicismo. «Conocimiento» es claro y no carga el texto con un sentido esotérico que el contexto no exige.
- source_word: ⲟⲩϩⲱⲡ
  english_pob_choice: have hidden
  chosen_spanish: han ocultado
  alternatives_spanish:
  - han escondido
  - han cubierto
  lexicon: Crum
  rationale: «Ocultado» recoge bien el sentido de esconder/conceal y suena más sobrio en español contemporáneo.
- source_word: ⲙⲡⲉⲛⲧⲟⲟⲩⲃⲱⲕ ⲉϩⲟⲩⲛ
  english_pob_choice: did not enter
  chosen_spanish: No entraron
  alternatives_spanish:
  - No fueron adentro
  - No entraron en él
  lexicon: Crum (ⲃⲱⲕ)
  rationale: La construcción negativa con verbo de movimiento + «adentro» se expresa de forma idiomática y concisa como «no entraron».
- source_word: ⲟⲱϣ
  english_pob_choice: wish
  chosen_spanish: querían
  alternatives_spanish:
  - deseaban
  - querían entrar
  lexicon: Crum
  rationale: El valor volitivo se comunica con naturalidad mediante «querían»; en la frase completa, la subordinada ya deja claro el objeto de ese querer.
- source_word: ⲕⲱⲛⲧⲟⲟⲩ
  english_pob_choice: allow
  chosen_spanish: permitieron
  alternatives_spanish:
  - dejaron
  - autorizaron
  lexicon: Crum
  rationale: «Permitir» es la correspondencia idiomática más precisa para la idea de impedir o dejar pasar a otros.
- source_word: ϣⲱⲡⲉ
  english_pob_choice: become
  chosen_spanish: háganse
  alternatives_spanish:
  - sean
  - vuélvanse
  lexicon: Layton; Crum
  rationale: El imperativo exhortativo de ϣⲱⲡⲉ apunta a una disposición que debe adoptarse; «háganse» preserva el matiz de llegar a ser sin perder naturalidad.
- source_word: ⲫⲣⲟⲛⲓⲙⲟⲥ
  english_pob_choice: prudent
  chosen_spanish: prudentes
  alternatives_spanish:
  - sabios
  - astutos
  lexicon: Layton
  rationale: «Prudentes» equilibra sabiduría práctica y cautela, sin imponer la tonalidad de «astutos».
- source_word: ⲛⲡϩⲟϥ
  english_pob_choice: the serpent
  chosen_spanish: serpientes
  alternatives_spanish:
  - víboras
  - culebras
  lexicon: Crum
  rationale: Aunque el coptico usa singular genérico, el contexto y la revisión auditada señalan que el pasaje debe leerse en plural; «serpientes» además coincide con el registro bíblico y con la formulación paralela conservada.
- source_word: ⲁⲕⲉⲣⲁⲓⲟⲥ
  english_pob_choice: innocent
  chosen_spanish: inocentes
  alternatives_spanish:
  - puros
  - sin malicia
  lexicon: Layton
  rationale: «Inocentes» expresa bien la idea de ausencia de engaño/mezcla y se mantiene claro para lectoras y lectores modernos.
- source_word: ⲡϭⲣⲟⲙⲡⲉ
  english_pob_choice: the dove
  chosen_spanish: palomas
  alternatives_spanish:
  - palomas mensajeras
  - tórtolas
  lexicon: Crum
  rationale: La imagen tradicional en español bíblico es «palomas»; en plural se respeta la evidencia morfológica de la versión coptica recibida por el aparato auditado.
theological_decisions:
- issue: El uso del singular genérico en el coptico frente al plural confirmado por la revisión textual
  english_pob_reading: 'POxy 655 reads the similes in the plural (“serpents … doves”), while the Coptic has generic singular: “the serpent … the dove.” This draft follows the Coptic usage.'
  chosen_spanish_reading: «serpientes… palomas» en plural, siguiendo la revisión crítica y la forma auditada que reconoce el plural morfológico en el testimonio copto usado para esta edición.
  alternative_spanish_readings:
  - «serpiente… paloma» en singular genérico
  rationale: La revisión incorporada al expediente indica que la redacción previa en inglés fue corregida por un análisis morfológico del copto. En español, el plural evita reproducir una lectura ya adjudicada como incorrecta y mantiene la fidelidad al estado revisado del texto.
  doctrine_reference: Crítica textual / fidelidad al testimonio manuscrito
- issue: La relación entre «conocimiento» y posibles lecturas tecnicistas de gnosis
  english_pob_reading: knowledge
  chosen_spanish_reading: «conocimiento»
  alternative_spanish_readings:
  - «gnosis»
  - «conocimiento revelado»
  rationale: El contexto no obliga a un tecnicismo gnóstico en español. «Conocimiento» conserva la amplitud semántica del término y evita introducir una carga doctrinal no sustentada por el pasaje mismo.
  doctrine_reference: Semántica del préstamo griego / no sobredeterminación doctrinal
translation_notes:
  revision_awareness: 'El expediente auditado registra una revisión importante: una propuesta anterior en inglés había reducido a singular las comparaciones animales, pero la adjudicación posterior señaló que el copto conserva formas plurales. Esta versión española sigue el estado revisado y evita retroceder a la lectura corregida. También evita introducir «gnosis» como tecnicismo, pues el propio contexto la usa con sentido general de conocimiento.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para ⲓⲏⲥⲟⲩⲥ y el tratamiento directo en discurso citado.
  - Se usa «fariseos» y «escribas» como términos estándar y fácilmente reconocibles en español bíblico.
  - Se conserva el paralelismo exhortativo final con verbos en imperativo plural («háganse») para corresponder al plural de la segunda persona en español.
  - No se usa «SEÑOR» ni otros sustitutos teológicos no presentes en el texto fuente.
  - La puntuación y la apertura/cierre de comillas siguen normas editoriales del español actual.
