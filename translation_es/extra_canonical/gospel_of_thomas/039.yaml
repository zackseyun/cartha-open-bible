base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/039.yaml
  text: Jesus said[a], “The Pharisees and the scribes have received the keys of knowledge; they have hidden them. They did not enter, and they did not allow those who wished to enter[e][d][c][b]. But you—become prudent like serpents and innocent like doves.”
  footnotes:
  - marker: a
    text: 'POxy 655 reads the similes in the plural (“serpents … doves”), while the Coptic has generic singular: “the serpent … the dove.” This draft follows the Coptic usage.'
    reason: textual_variant
  - marker: b
    text: Cf. Luke 11:52 (“You have taken away the key of knowledge…”) and Matthew 23:13 (blocking entry), for thematic parallels.
    reason: cross_reference
  - marker: c
    text: Cf. Matthew 10:16 (“wise as serpents and innocent as doves”) for a related formulation.
    reason: cross_reference
  - marker: d
    text: 'Coptic ⲛⲡϩⲉ means “in the manner of,” here introducing comparisons: “like the serpent … like the dove.”'
    reason: dialect_note
  - marker: e
    text: Or 'like the serpent and innocent like the dove'.
    reason: previous_rendering
