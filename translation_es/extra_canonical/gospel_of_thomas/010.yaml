translation:
  language: es
  text: 'Jesús dijo: «He arrojado un fuego sobre el mundo[c], y, mira[a], lo estoy guardando[b] hasta que arda».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mira» traduce el giro deíctico ⲉⲓⲥϩⲏⲏⲧⲉ, que también puede entenderse como «he aquí» o «presta atención».
    reason: lexical_alternative
  - marker: b
    text: ϩⲁⲣⲉϩ también puede entenderse como «vigilar» o «velar por», pero «guardar» conserva mejor el matiz protector.
    reason: lexical_alternative
  - marker: c
    text: Compárese con Lucas 12:49 («He venido a echar fuego sobre la tierra»), aunque aquí Tomás dice «mundo» y añade «lo estoy guardando hasta que arda».
    reason: cross_reference
lexical_decisions:
- source_word: ⲁⲁⲛⲟⲕ … ⲛⲟⲩϫⲉ
  english_pob_choice: I have cast
  chosen_spanish: He arrojado
  alternatives_spanish:
  - He lanzado
  - He echado
  - Arrojé
  lexicon: Layton, Coptic Grammar; Crum, Dictionary s.v. ⲛⲟⲩϫⲉ
  rationale: El perfectivo coptico con énfasis personal expresa una acción completada con efecto vigente; en español, el pretérito perfecto compuesto transmite bien esa anterioridad con relevancia presente. «Arrojar» conserva la fuerza de lanzamiento/cast sin volverse excesivamente coloquial.
- source_word: ⲛⲟⲩⲕⲱϩⲧ
  english_pob_choice: a fire
  chosen_spanish: un fuego
  alternatives_spanish:
  - fuego
  - una llama
  - un incendio
  lexicon: Crum, Dictionary s.v. ⲕⲱϩⲧ
  rationale: El artículo indefinido del coptico pide indefinición en español. «Fuego» mantiene el valor básico; «un fuego» suena natural y conserva la imagen de una entidad enviada.
- source_word: ⲉϫⲛⲡⲕⲟⲥⲙⲟⲥ
  english_pob_choice: upon the world
  chosen_spanish: sobre el mundo
  alternatives_spanish:
  - encima del mundo
  - sobre la tierra
  - sobre el cosmos
  lexicon: Crum, s.v. ⲉϫⲛ; Greek loan κόσμος
  rationale: «Sobre» reproduce bien el valor direccional de ⲉϫⲛ sin forzar una calca. «Mundo» conserva el alcance del préstamo griego y la amplitud del objeto.
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  english_pob_choice: Look
  chosen_spanish: mira
  alternatives_spanish:
  - mira bien
  - he aquí
  - mira, pues
  lexicon: Layton, Coptic Grammar (deictic idiom)
  rationale: El idiomático deíctico coptico requiere una interjección breve y directa. «Mira» mantiene la inmediatez de «look» y resulta natural en español bíblico actual.
- source_word: ϩⲁⲣⲉϩ
  english_pob_choice: am guarding
  chosen_spanish: lo estoy guardando
  alternatives_spanish:
  - lo estoy vigilando
  - lo estoy custodiando
  - lo estoy protegiendo
  lexicon: Crum, Dictionary s.v. ϩⲁⲣⲉϩ
  rationale: El verbo puede significar vigilar/guardar. «Guardarlo» preserva el matiz protector señalado en el audit trail y el progresivo español refleja la duración de la acción.
- source_word: ⲉⲛⲧⲟϥ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  - eso
  lexicon: Layton, Coptic Grammar (dependent pronouns)
  rationale: El referente es «fuego», masculino en español. «Lo» enlaza naturalmente con «un fuego» y evita una formulación impersonal que debilite la referencia.
- source_word: ϣⲁⲛⲧⲉϥϫⲉⲣⲟ
  english_pob_choice: until it blazes
  chosen_spanish: hasta que arda
  alternatives_spanish:
  - hasta que blaze
  - hasta que flamee
  - hasta que se encienda
  lexicon: Crum, Dictionary s.v. ϫⲉⲣⲟ
  rationale: «Arda» transmite el inicio/culminación ígnea sin necesidad de una perífrasis más larga. En español, «arder» cubre bien el valor de blaze/flare up con sobriedad y viveza.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alto acuerdo del audit trail inglés: acción perfecta con relevancia presente, objeto indefinido («un fuego»), deíctico breve («mira») y valor durativo de «guardar»/vigilar. No hubo revisiones aplicadas en el último pase.'
  spanish_consistency_notes:
  - Se preservó «mundo» para ⲡⲕⲟⲥⲙⲟⲥ, evitando «tierra» para no suavizar el alcance del texto.
  - Se evitó «SEÑOR» o fórmulas litúrgicas no presentes; el sujeto explícito es «Jesús».
  - Se eligió «arder» para ϫⲉⲣⲟ por su correspondencia con el matiz de blaze/flaring y por ser natural en español.
  - El progresivo «lo estoy guardando» comunica la acción en curso que el coptico sugiere con el contraste aspectual.
