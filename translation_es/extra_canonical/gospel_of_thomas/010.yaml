base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/010.yaml
  text: Jesus said[a], “I have cast a fire upon the world, and look[c][b], I am guarding it until it blazes.”
  footnotes:
  - marker: a
    text: “Look” renders the deictic idiom ⲉⲓⲥϩⲏⲏⲧⲉ, which can also be taken as “behold” or “pay heed.”
    reason: lexical_alternative
  - marker: b
    text: ϩⲁⲣⲉϩ may also be read “watch over/keep watch over,” but “guard” retains a protective nuance.
    reason: lexical_alternative
  - marker: c
    text: Cf. Luke 12:49 (“I came to cast fire upon the earth…”), noting Thomas’s different objects (“world”) and continuation (“I am guarding it until it blazes”).
    reason: cross_reference
