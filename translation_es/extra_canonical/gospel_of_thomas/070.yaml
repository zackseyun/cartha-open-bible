translation:
  language: es
  text: 'Jesús dijo: «Cuando lo hagan surgir dentro de ustedes, esto —lo que tienen— los salvará[a]; de otro modo[b], la pobreza está en ustedes. Esto —lo que no tienen dentro de ustedes, en el interior— los matará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto ⲧⲟⲩϫⲟⲛ se traduce ‘salvará’; alternativas como ‘librará’ o ‘beneficiará’ son posibles, pero la antítesis con ‘matará’ favorece ‘salvará’.
    reason: lexical_alternative
  - marker: b
    text: La partícula ⲡⲏ se entiende de manera disyuntiva como ‘de otro modo’ o ‘si no’; otras lecturas la toman como ‘más bien’ o suavizan la cláusula.
    reason: alternative_reading
lexical_decisions:
- source_word: ϩⲟⲧⲁⲛ
  english_pob_choice: when(ever)
  chosen_spanish: cuando
  alternatives_spanish:
  - si
  - siempre que
  lexicon: Layton; Crum
  rationale: Marca una condición temporal general. ‘Cuando’ conserva la concisión proverbial del dicho sin volverlo más interpretativo.
- source_word: ⲉⲣϣⲁⲛ_ⲛⲧⲟⲟⲩϫⲡⲟⲡⲏ
  english_pob_choice: bring it forth / cause it to come to be
  chosen_spanish: lo saquen a la luz
  alternatives_spanish:
  - lo hagan surgir
  - lo traigan a la existencia
  lexicon: Crum; Layton
  rationale: La construcción es causativa y sugiere hacer aparecer o hacer surgir algo. ‘Lo saquen a la luz’ comunica el acto de exteriorizar sin perder del todo la fuerza productiva del coptо.
- source_word: ϩⲛⲛⲧⲱⲧⲛ
  english_pob_choice: within yourselves
  chosen_spanish: dentro de ustedes
  alternatives_spanish:
  - en ustedes
  - dentro de sí mismos
  lexicon: Crum
  rationale: El sentido es interior. ‘Dentro de ustedes’ mantiene la referencia personal plural y la interioridad marcada en el coptо.
- source_word: ⲡⲁⲓ
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - ello
  lexicon: Crum
  rationale: Demostrativo neutro que apunta al referente inmediato del dicho; ‘esto’ es la opción natural en español.
- source_word: ⲉⲧⲉⲩⲛ̄ⲧⲏⲧⲛ︤ϥ̅ / ⲟⲩⲛ … ⲛⲧⲱⲧⲛ ⲛⲧⲟϥ
  english_pob_choice: what you have
  chosen_spanish: lo que tienen
  alternatives_spanish:
  - lo que poseen
  - lo que les pertenece
  lexicon: Layton; Crum
  rationale: La posesión se expresa idiomáticamente como ‘tener’. Se evita ‘poseer’ por ser más pesado y menos natural en español.
- source_word: ⲧⲟⲩϫⲟⲛ
  english_pob_choice: save
  chosen_spanish: los salvará
  alternatives_spanish:
  - los librará
  - los rescatará
  lexicon: Crum
  rationale: El contraste con ‘matar’ favorece ‘salvará’. Se mantiene la fuerza soteriológica señalada en el audit trail inglés.
- source_word: ⲡⲏ
  english_pob_choice: otherwise/or else
  chosen_spanish: de otro modo
  alternatives_spanish:
  - o bien
  - si no
  lexicon: Layton; Crum
  rationale: Equivale bien a la partícula disyuntiva; suena natural en español y conserva el valor alternativo o adversativo.
- source_word: ⲙⲛⲧⲁⲁⲛⲟⲛ
  english_pob_choice: poverty
  chosen_spanish: la pobreza
  alternatives_spanish:
  - la indigencia
  - la carencia
  lexicon: Crum
  rationale: Se conserva el sustantivo fuerte ‘pobreza’, como en el inglés POB, sin suavizarlo como ‘falta’ o ‘carencia’.
- source_word: ϩⲛⲧⲏⲛⲉ
  english_pob_choice: inside/inwardly
  chosen_spanish: en el interior
  alternatives_spanish:
  - adentro
  - dentro
  lexicon: Crum
  rationale: ‘En el interior’ explicita la interioridad y permite distinguirlo de la primera ocurrencia de ‘dentro de ustedes’, preservando la doble énfasis del coptо.
- source_word: ⲙⲟⲩⲟⲩⲧ
  english_pob_choice: kill
  chosen_spanish: los matará
  alternatives_spanish:
  - los matará de muerte
  - los destruirá
  lexicon: Crum
  rationale: ‘Matar’ es la contraparte directa de ‘salvar’. Se evita suavizar a ‘destruir’ porque el contraste verbal del texto es más agudo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que aclaró la puntuación del dicho y mantuvo el sentido de interioridad y antítesis; por eso la versión española conserva la estructura breve, la coma tras la fórmula introductoria y el contraste final sin explicitar más de lo que el coptо respalda.
  spanish_consistency_notes:
  - Se usó ‘Jesús’ para el nombre propio, conforme al estándar POB.
  - Se mantuvo ‘dentro/en el interior’ para reproducir la doble indicación de interioridad del coptо.
  - Se preservó ‘pobreza’ como término fuerte, sin reemplazarlo por ‘falta’.
