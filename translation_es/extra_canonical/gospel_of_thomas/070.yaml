base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/070.yaml
  text: Jesus said, “When you bring it forth within yourselves, this—what you have—will save you; otherwise, poverty is in you. This—what you do not have within yourselves, inside—will kill you.”
  footnotes:
  - marker: a
    text: The periphrastic ⲉⲣϣⲁⲛ_ⲛⲧⲟⲟⲩϫⲡⲟⲡⲏ is rendered ‘bring it forth’; more woodenly, ‘cause it to come to be’ within you.
    reason: lexical_alternative
  - marker: b
    text: ⲧⲟⲩϫⲟⲛ is translated ‘save’; alternatives like ‘deliver/benefit’ are possible, but the antithesis with ‘kill’ favors ‘save.’
    reason: lexical_alternative
  - marker: c
    text: ⲡⲏ is taken disjunctively as ‘otherwise/or else’; some take it as ‘rather’ or omit the clause for smoother English.
    reason: alternative_reading
  - marker: d
    text: ⲙⲛⲧⲁⲁⲛⲟⲛ literally ‘poverty’; we keep the stark term rather than paraphrasing as ‘lack.’
    reason: cultural_note
  - marker: e
    text: 'Line damage in NHAM02.45 lb 33: Dilley restores ⲛⲁ- in ⲛⲁⲙⲟⲩⲟⲩⲧ ‘will kill’; reading is secure in sense though letters are partially lost.'
    reason: lacuna_or_restoration
  - marker: f
    text: ϩⲛⲧⲏⲛⲉ ‘inside/inwardly’ underscores interiority; we translate explicitly to preserve the double emphasis in the Coptic.
    reason: dialect_note
