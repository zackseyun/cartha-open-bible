    reason: textual_variant
  - marker: b
    text: El texto copto crea un juego de palabras entre ϫⲛⲁⲩ («vacilar») y ϫⲛⲉ («preguntar»), que se pierde en español.
    reason: register_note
  revision_rationale: 'La revisión corrige dos puntos clave para fidelidad y legibilidad: cambia «pedirle» por «preguntarle ... por» para alinearse con el verbo fuente «ask», y reemplaza «un solo uno» por «uno solo», que conserva la idea tomasina de unidad singular sin caer en un calco duro. También se añade la nota del juego de palabras preservada en el audit trail inglés. Se mantiene «vacilar» porque esta ficha auditada actualmente sigue esa línea editorial.'
