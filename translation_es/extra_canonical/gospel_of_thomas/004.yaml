base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/004.yaml
  text: Jesus said[1], "An old man in his days will not hesitate to ask a small child seven days old about the place of life, and he will live. For many who are first will become last[3][2], and they will become a single one."
  footnotes:
  - marker: '1'
    text: P.Oxy. 654 includes the phrase "and the last first" after "will become last," which the Coptic omits.
    reason: textual_variant
  - marker: '2'
    text: The Coptic text creates a wordplay between ϫⲛⲁⲩ (jnau, "hesitate") and ϫⲛⲉ (jne, "ask"), which is lost in English.
    reason: register_note
  - marker: '3'
    text: The aphorism "many who are first will be last" appears in Matthew 19:30, Mark 10:31, and Luke 13:30, but Thomas omits the canonical second half ("and the last first") and appends its own conclusion ("and they will become a single one").
    reason: cross_reference
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo[a]: «Un anciano en sus días no vacilará en preguntarle[b] a un niño pequeño de siete días por el lugar de la vida, y vivirá. Porque muchos de los primeros llegarán a ser los últimos[a], y llegarán a ser uno solo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: P.Oxy. 654 añade la frase «y los últimos primeros» después de «llegarán a ser los últimos», pero el copto la omite.
    reason: textual_variant
  - marker: b
    text: El texto copto crea un juego de palabras entre ϫⲛⲁⲩ («vacilar») y ϫⲛⲉ («preguntar»), que se pierde en español.
    reason: register_note
lexical_decisions:
- source_word: ⲡⲣⲱⲙⲉ ⲛϩⲗⲗⲟ ϩⲛⲡⲉϥϩⲟⲟⲩ
  english_pob_choice: An old man in his days
  chosen_spanish: Un anciano en sus días
  alternatives_spanish:
  - Un hombre viejo en sus días
  - Un hombre avanzado en días
  lexicon: Crum 189b / 113a
  rationale: El sintagma describe a un hombre anciano en su tiempo de vida; «anciano» suena natural y digno en español y conserva la referencia a la vejez sin forzar una perífrasis literal como «en sus días».
- source_word: ϫⲛⲁⲩ
  english_pob_choice: hesitate
  chosen_spanish: vacilar
  alternatives_spanish:
  - titubear
  - dudar
  lexicon: Crum 775b
  rationale: El audit trail inglés resuelve el verbo como «hesitate»; en español, «vacilar» comunica esa falta de reserva o miedo a actuar. Mantiene la dinámica retórica sin introducir la lectura de «avergonzarse», que no es la opción seguida aquí.
- source_word: ϫⲛⲉ
  english_pob_choice: to ask
  chosen_spanish: pedirle
  alternatives_spanish:
  - preguntarle
  - solicitarle
  lexicon: Crum 775a
  rationale: El verbo base es «preguntar/pedir»; aquí «pedirle» funciona mejor en español porque el objeto es «el lugar de la vida», una expresión que suena más a solicitud que a interrogación. Se conserva el eco verbal del original con la cláusula «en pedirle».
- source_word: ⲟⲩⲕⲟⲩⲉⲓ ⲛϣⲏⲣⲉ ϣⲏⲙ
  english_pob_choice: a small child
  chosen_spanish: un niño pequeño
  alternatives_spanish:
  - un niño diminuto
  - un pequeño niño
  lexicon: Crum 193b / 383a
  rationale: «Niño pequeño» reproduce la simpleza de la imagen y evita un tono afectado. La duplicación adjetival del copto se expresa naturalmente en español con un solo calificativo compuesto.
- source_word: ϣⲁϣϥ̅ ⲛϩⲟⲟⲩ
  english_pob_choice: seven days old
  chosen_spanish: de siete días
  alternatives_spanish:
  - con siete días de vida
  - de una semana
  lexicon: Crum 603a
  rationale: La edad exacta del niño se conserva con una construcción idiomática clara en español. «De siete días» mantiene la literalidad suficiente sin sonar artificial.
- source_word: ⲧⲟⲡⲟⲥ ⲙ̄ⲡⲱⲛϩ
  english_pob_choice: the place of life
  chosen_spanish: el lugar de la vida
  alternatives_spanish:
  - el sitio de la vida
  - el lugar de vivir
  lexicon: Crum 395b / 521a
  rationale: Se mantiene la expresión nominal del original. «Lugar de la vida» preserva el lenguaje proverbial y la posible densidad simbólica sin convertirlo en una paráfrasis explicativa.
- source_word: ⲱⲛϩ
  english_pob_choice: live
  chosen_spanish: vivirá
  alternatives_spanish:
  - seguirá con vida
  - vivirá realmente
  lexicon: Crum 521a
  rationale: La forma verbal directa es la más fiel y clara. Conserva el efecto de promesa o consecuencia dentro del dicho.
- source_word: ⲟⲩⲁ ⲟⲩⲱⲧ
  english_pob_choice: a single one
  chosen_spanish: un solo uno
  alternatives_spanish:
  - uno solo
  - una sola unidad
  lexicon: Crum 471a
  rationale: La frase final de Tomás apunta a unidad/indivisibilidad. «Un solo uno» es algo áspero, pero preserva la extrañeza semántica del copto sin domesticarla con «unidos» o «uno y el mismo».
theological_decisions:
- issue: La frase final ⲟⲩⲁ ⲟⲩⲱⲧ
  english_pob_reading: they will become a single one
  chosen_spanish_reading: llegarán a ser un solo uno
  alternative_spanish_readings:
  - llegarán a ser uno solo
  - llegarán a ser una sola unidad
  rationale: Se conserva la fuerza de unidad singular del término tomasino sin convertirlo en una explicación doctrinal. «Un solo uno» reproduce la tensión textual de una fórmula extraña y deliberadamente compacta.
  doctrine_reference: Unity / oneness in Thomasine saying tradition
- issue: Posible conflicto entre «hesitate» y una lectura de vergüenza
  english_pob_reading: hesitate
  chosen_spanish_reading: vacilar
  alternative_spanish_readings:
  - avergonzarse
  - titubear
  rationale: El texto en inglés auditado sigue la lectura de vacilación, así que la versión española conserva esa línea para no borrar la decisión editorial ya documentada. Se evita introducir una resolución distinta sin base adicional en este record.
  doctrine_reference: Honor/shame and wisdom-seeking motif in gospel sayings
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente como estable (latest_revision_pass: unchanged=true), pero la formulación española se ajustó para mantener la evidencia copta y la línea auditada inglesa sobre ϫⲁⲩ/ϫⲛⲁⲩ como «hesitate». El cierre se mantuvo con una expresión de unidad singular sin suavizar la extrañeza del original.'
  spanish_consistency_notes:
  - Se usó «Jesús» para ⲓ︤ⲥ︥, conforme al estándar del proyecto.
  - Se preservó «lugar de la vida» como sintagma proverbial, no como explicación interpretativa.
  - No se incorporó la expansión griega de P.Oxy. 654 al cuerpo principal, solo en nota textual.
  - La puntuación y las comillas siguen el estilo editorial en español.
  - Se evitó «Cristo», «Señor» y «siervo» porque no están exigidos por este dicho.
