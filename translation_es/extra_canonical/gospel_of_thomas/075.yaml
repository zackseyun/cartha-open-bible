    text: El manuscrito tiene ϩⲓⲣⲙ̄ⲡⲣⲟ frente a la forma normalizada ϩⲓⲣⲛⲡⲣⲟ; y además presenta ⲙ̄ⲙⲟⲛⲁⲭⲟⲥ ⲛⲉⲧⲛⲁⲃⲱⲕ, frente a la normalización singular ⲡⲙⲟⲛⲁⲭⲟⲥ ⲡⲉⲧⲉⲣⲉⲛⲁⲃⲱⲕ. Por eso la traducción sigue el plural del manuscrito.
    reason: textual_variant
  - marker: e
