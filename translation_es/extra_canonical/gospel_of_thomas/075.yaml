base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/075.yaml
  text: Jesus said[a], “Many are standing at the door[e][d][c][b], but it is the solitary ones who will enter into the place of the bridal chamber.”
  footnotes:
  - marker: a
    text: The Coptic idiom is literally ‘standing on their feet’; rendered simply ‘standing’ in English.
    reason: dialect_note
  - marker: b
    text: ⲙⲟⲛⲁⲭⲟⲥ (Greek μονάχος) can mean ‘solitary’ or later ‘monk.’ In Thomas the emphasis falls on singleness/wholeness (‘single one’), hence ‘solitary one’ here.
    reason: lexical_alternative
  - marker: c
    text: The text reads ‘the place of the bridal chamber’ (ⲡⲙⲁ ⲛϣⲉⲗⲉⲉⲧ), not simply ‘the bridal chamber’; retained to reflect the Coptic construction.
    reason: lexical_alternative
  - marker: d
    text: MS has ϩⲓⲣⲙ̄ⲡⲣⲟ vs normalized ϩⲓⲣⲛⲡⲣⲟ; and printed ⲙ̄ⲙⲟⲛⲁⲭⲟⲥ ⲛⲉⲧⲛⲁⲃⲱⲕ vs normalized ⲡⲙⲟⲛⲁⲭⲟⲥ ⲡⲉⲧⲉⲣⲉⲛⲁⲃⲱⲕ, emphasizing a singular subject.
    reason: textual_variant
  - marker: e
    text: Or 'the solitary one is the one who will enter'.
    reason: previous_rendering
