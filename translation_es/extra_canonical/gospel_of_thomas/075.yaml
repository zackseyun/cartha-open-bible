revisions:
- from: 'Jesús dijo[a]: «Muchos están de pie ante la puerta, pero son los solitarios[b] quienes entrarán en el lugar de la cámara nupcial[c][d][e]».'
  to: 'Jesús dijo[a]: «Hay muchos junto a la puerta, pero son los solitarios[b][d][e] quienes entrarán en el lugar[c] de la cámara nupcial».'
  rationale: La revisión mejora la fidelidad a la construcción existencial inicial, hace más natural el español locativo, corrige detalles ortográficos en las notas y reubica los marcadores para que correspondan con precisión a los elementos comentados, sin cambiar el sentido principal ya bien captado por el borrador.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-08T03:02:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite bien el sentido general del copto y sigue correctamente la decisión auditada de reflejar el plural manuscrito en la cláusula final. También conserva el valor explícito de «el lugar de la cámara nupcial». Sin embargo, «Muchos están de pie» no refleja tan bien la construcción existencial inicial como «Hay muchos», y el anclaje de las notas c–e sobre toda la frase final no corresponde con precisión a los puntos léxicos específicos. Además, hay pequeños ajustes ortográficos y de naturalidad.
  spanish_quality_summary: El texto es legible y digno, pero puede sonar más natural en español con «Hay muchos junto a la puerta» en vez de «Muchos están de pie ante la puerta». «Cámara nupcial» es aceptable. Las notas necesitan mejor español ortográfico («copto», no «coptico») y una formulación más precisa de la variante textual y de la alternativa de traducción.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Jesús» está correcto. «Solitarios» representa adecuadamente ⲙⲟⲛⲁⲭⲟⲥ en Tomás y evita el anacronismo «monjes».
  issues:
  - severity: medium
    issue: La apertura «Muchos están de pie» debilita la fuerza existencial de ⲟⲩⲛϩⲁϩ.
    rationale: La evidencia fuente y la decisión léxica inglesa destacan una construcción existencial («there are many»). En español, «Hay muchos» preserva mejor esa fuerza y suena más natural que una predicación directa con «están».
  - severity: low
    issue: «Ante la puerta» es posible, pero «junto a la puerta» o «a la puerta» encaja mejor con el matiz locativo sencillo.
    rationale: ϩⲓⲣ ⲛⲡⲣⲟ significa ‘at/by the door’. «Ante» puede sugerir una frontalidad más marcada que la necesaria.
  - severity: low
    issue: Las notas usan «coptico» en lugar de «copto».
    rationale: Es una corrección ortográfica/estilística menor pero necesaria.
  - severity: low
    issue: Los marcadores de notas c–e están acumulados al final de toda la frase en vez de anclarse a los elementos pertinentes.
    rationale: La nota c corresponde a «el lugar de la cámara nupcial»; la d al contraste manuscrito plural frente a normalización singular; la e a una traducción alternativa de la cláusula sobre los solitarios. Conviene anclar cada una en su segmento relevante.
  revised_spanish_text: 'Jesús dijo[a]: «Hay muchos junto a la puerta, pero son los solitarios[b][d][e] quienes entrarán en el lugar[c] de la cámara nupcial».'
  revised_footnotes:
