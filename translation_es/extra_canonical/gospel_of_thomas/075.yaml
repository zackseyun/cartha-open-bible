    reason: lexical_alternative
  - marker: c
    text: El texto dice «el lugar de la cámara nupcial» (ⲡⲙⲁ ⲛϣⲉⲗⲉⲉⲧ), no simplemente «la cámara nupcial»; se conserva esa construcción explícita del copto.
    reason: lexical_alternative
