translation:
  language: es
  text: 'Jesús dijo[a]: «Hay muchos junto a la puerta, pero son los solitarios[b][d][e] quienes entrarán en el lugar[c] de la cámara nupcial».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto usa literalmente una expresión como «estar sobre sus pies»; en español se traduce de manera natural simplemente como «estar» o «estar de pie».
    reason: dialect_note
  - marker: b
    text: ⲙⲟⲛⲁⲭⲟⲥ puede significar «solitario» o, en uso posterior, «monje». En Tomás predomina el matiz de singularidad o integridad; por eso aquí se traduce «solitarios».
    reason: lexical_alternative
  - marker: c
    text: El texto dice «el lugar de la cámara nupcial» (ⲡⲙⲁ ⲛϣⲉⲗⲉⲉⲧ), no simplemente «la cámara nupcial»; se conserva esa construcción explícita del copto.
    reason: lexical_alternative
  - marker: d
    text: El manuscrito tiene ϩⲓⲣⲙ̄ⲡⲣⲟ frente a la forma normalizada ϩⲓⲣⲛⲡⲣⲟ; y además presenta ⲙ̄ⲙⲟⲛⲁⲭⲟⲥ ⲛⲉⲧⲛⲁⲃⲱⲕ, frente a la normalización singular ⲡⲙⲟⲛⲁⲭⲟⲥ ⲡⲉⲧⲉⲣⲉⲛⲁⲃⲱⲕ. Por eso la traducción sigue el plural del manuscrito.
    reason: textual_variant
  - marker: e
    text: 'O también: «los solitarios son quienes entrarán».'
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲛϩⲁϩ
  english_pob_choice: there are many
  chosen_spanish: Muchos están
  alternatives_spanish:
  - Hay muchos
  - Muchos hay
  lexicon: Crum, s.v. ⲟⲩⲛ-/ⲟⲩⲛϩⲁϩ
  rationale: El coptico presenta una construcción existencial con énfasis en cantidad; en español, «Muchos están» conserva la naturalidad y el foco en el grupo presente ante la puerta.
- source_word: ⲱϩⲉⲣⲁⲧ ⲛⲧⲟⲟⲩ
  english_pob_choice: standing
  chosen_spanish: están de pie
  alternatives_spanish:
  - están parados
  - están en pie
  lexicon: Crum, s.v. ⲱϩⲉⲣ ‘stand’
  rationale: La idiomática coptica de ‘estar sobre los pies’ se vierte de manera natural con «están de pie», sin perder la imagen básica ni volverla tautológica.
- source_word: ϩⲓⲣ ⲛⲡⲣⲟ
  english_pob_choice: at the door
  chosen_spanish: ante la puerta
  alternatives_spanish:
  - a la puerta
  - junto a la puerta
  lexicon: Crum, s.v. ϩⲓⲣ; Crum, s.v. ⲡⲣⲟ ‘door’
  rationale: «Ante la puerta» reproduce bien el valor espacial de ϩⲓⲣ y sugiere proximidad frontal sin forzar un calco poco natural.
- source_word: ⲡⲙⲟⲛⲁⲭⲟⲥ
  english_pob_choice: the solitary one
  chosen_spanish: los solitarios
  alternatives_spanish:
  - el solitario
  - los solitarios y únicos
  - los únicos
  lexicon: Crum, s.v. ⲙⲟⲛⲁⲭⲟⲥ; cf. Greek μονάχος
  rationale: La POB inglesa opta por el matiz de singularidad/inteireza, no por el sentido monástico posterior; en español, «solitarios» preserva ese valor y además encaja con el plural del manuscrito señalado en el aparato.
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲁⲃⲱⲕ
  english_pob_choice: is the one who will enter
  chosen_spanish: quienes entrarán
  alternatives_spanish:
  - es el que entrará
  - son los que entrarán
  - serán los que entren
  lexicon: Layton, Coptic Grammar, on relative future (ⲡⲉⲧⲉⲣⲉ + inf.)
  rationale: 'La forma relativa futura identifica al sujeto; dado el plural manuscrito, el español debe reflejar pluralidad: «quienes entrarán» conserva la relación identificativa sin sonar artificial.'
- source_word: ⲉϩⲟⲩⲛ
  english_pob_choice: enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - irán dentro
  - pasarán
  lexicon: Crum, s.v. ⲉϩⲟⲩⲛ ‘go in, enter’
  rationale: «Entrarán» es la equivalencia más directa y clara para el movimiento hacia adentro requerido por el verbo.
- source_word: ⲡⲙⲁ ⲛϣⲉⲗⲉⲉⲧ
  english_pob_choice: the place of the bridal chamber
  chosen_spanish: el lugar de la cámara nupcial
  alternatives_spanish:
  - el lugar del tálamo nupcial
  - la cámara nupcial
  lexicon: Crum, s.v. ⲙⲁ ‘place’; Crum, s.v. ϣⲉⲗⲉⲉⲧ ‘bride-chamber’
  rationale: Se conserva explícitamente «el lugar de», como en el coptico; «cámara nupcial» comunica el contenido de ϣⲉⲗⲉⲉⲧ con un registro digno y comprensible.
theological_decisions:
- issue: Pluralidad del sujeto final en el manuscrito frente a la normalización singular editorial
  english_pob_reading: it is the solitary ones who will enter
  chosen_spanish_reading: son los solitarios quienes entrarán
  alternative_spanish_readings:
  - es el solitario quien entrará
  - son los únicos que entrarán
  rationale: El aparato señala que el manuscrito conserva un plural explícito; la traducción española debe reflejar ese dato textual y no imponer un singular por armonización. El giro cleft en español («son... quienes») mantiene el énfasis identificativo.
  doctrine_reference: Textual criticism / grammatical number in Coptic relative clauses
translation_notes:
  revision_awareness: 'La traducción sigue la revisión que corrige la normalización singular editorial y refleja el plural del manuscrito: ⲙ̄ⲙⲟⲛⲁⲭⲟⲥ / ⲛⲉⲧⲛⲁⲃⲱⲕ. Se mantuvo el valor de ‘solitary/single’ para μονάχος, la construcción ‘lugar de la cámara nupcial’, y la ubicación espacial ‘ante la puerta’.'
  spanish_consistency_notes:
  - Se usa «Jesús» para ⲓ︤ⲥ︥.
  - Se evita «monje» para ⲙⲟⲛⲁⲭⲟⲥ por ser anacrónico respecto del énfasis de Tomás.
  - Se preserva el matiz de pluralidad del sujeto final en consonancia con el testimonio manuscrito.
  - «Cámara nupcial» se emplea como equivalente de ϣⲉⲗⲉⲉⲧ; se mantiene «lugar de» para reflejar ⲙⲁ.
