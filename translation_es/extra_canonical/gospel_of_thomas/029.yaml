translation:
  language: es
  text: 'Jesús dijo: «Si la carne llegó a ser a causa del espíritu, es una maravilla; pero si el espíritu llegó a ser a causa del cuerpo, es una maravilla de maravillas[a]. Sin embargo, yo mismo me maravillo de cómo[b] esta gran riqueza ha hecho su morada en esta pobreza[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «maravilla de maravillas» refleja un superlativo idiomático del copto; ϣⲡⲏⲣⲉ también puede significar «niño» en otros contextos, pero aquí el sentido es admirativo.
    reason: lexical_alternative
  - marker: b
    text: Dilley imprime ϫⲉⲡⲱ[ⲥ], restaurando la sigma final; la forma normalizada es ⲡⲱⲥ, «cómo».
    reason: lacuna_or_restoration
  - marker: c
    text: POxy 1 preserva «…esta pobreza», en acuerdo con la forma copta transmitida aquí.
    reason: cross_reference
lexical_decisions:
- source_word: ϣⲱⲡⲉ
  english_pob_choice: come into being
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - vino a existir
  - comenzó a ser
  - llegó a existir
  lexicon: Crum; Lambdin, Introduction to Sahidic Coptic §50
  rationale: En este dicho metafísico, ϣⲱⲡⲉ expresa surgimiento/origen más que simple ocurrencia; «llegó a ser» conserva ese valor sin sonar rígido en español.
- source_word: ⲉⲧⲃⲉ
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - por causa de
  lexicon: Crum s.v. ⲉⲧⲃⲉ; Layton, Coptic Grammar §98
  rationale: «A causa de» reproduce la relación causal y mantiene el paralelismo entre las dos cláusulas.
- source_word: ⲡⲥⲁⲣⲝ / ⲥⲁⲣⲝ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - materia
  lexicon: Crum s.v. loanwords; Layton §49
  rationale: Se conserva la oposición terminológica con ⲥⲱⲙⲁ. Traducir ambas voces como «cuerpo» borraría el contraste del original.
- source_word: ⲡⲛⲉⲩⲙⲁ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  lexicon: Crum; Layton §49
  rationale: «Espíritu» es la equivalencia natural y preserva la antítesis conceptual del dicho.
- source_word: ⲟⲩϣⲡⲏⲣⲉ / ⲛϣⲡⲏⲣⲉ
  english_pob_choice: a wonder / a wonder of wonders
  chosen_spanish: una maravilla / una maravilla de maravillas
  alternatives_spanish:
  - un prodigio / un prodigio de prodigios
  - un asombro / un asombro de asombros
  lexicon: Crum s.v. ϣⲡⲏⲣⲉ; Layton §33
  rationale: El giro idiomático funciona como superlativo; «maravilla de maravillas» conserva el énfasis retórico sin introducir la ambigüedad de «niño».
- source_word: ⲁⲗⲗⲁ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  - Mas
  lexicon: Loan from Greek ἀλλά; Layton §44
  rationale: La partícula marca contraste fuerte; «Sin embargo» suena natural en español y conserva la transición discursiva.
- source_word: ⲁⲛⲟⲕ
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo, por mi parte
  lexicon: Layton §66; Lambdin §151
  rationale: El pronombre independiente está usado con énfasis/topicalización. «Yo mismo» reproduce el énfasis sin una repetición artificial.
- source_word: ⲣϣⲡⲏⲣⲉ
  english_pob_choice: marvel
  chosen_spanish: me maravillo
  alternatives_spanish:
  - me asombro
  - me sorprendo
  lexicon: Crum s.v. ϣⲡⲏⲣⲉ (vb.), derived from the noun
  rationale: «Me maravillo» mantiene la familia léxica con «maravilla» y refleja el valor verbal cognado.
- source_word: ⲡⲱⲥ
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: Crum s.v. ⲡⲱⲥ; Layton §119
  rationale: Introduce la interrogativa indirecta de forma natural y fiel al texto restaurado.
- source_word: ⲡⲉⲓⲛⲟϭ ⲛⲙⲛⲧⲣⲙⲙⲁⲟ
  english_pob_choice: this great wealth
  chosen_spanish: esta gran riqueza
  alternatives_spanish:
  - esta gran abundancia
  - esta riqueza grande
  lexicon: Crum s.v. ⲛⲟϭ; ⲙⲛⲧⲣⲙⲙⲁⲟ
  rationale: El sintagma combina «grandeza» con un genitivo de cualidad; en español «gran riqueza» comunica bien el sentido y el contraste con «pobreza».
- source_word: ⲁⲛⲧⲟⲥⲟⲩⲱϩ
  english_pob_choice: has made its home
  chosen_spanish: ha hecho su morada
  alternatives_spanish:
  - ha tomado morada
  - ha habitado
  - se ha asentado
  lexicon: Crum s.v. ⲥⲟⲩⲱϩ 'to dwell, lodge'; Layton §202 (first perfect forms)
  rationale: «Ha hecho su morada» conserva el carácter telico de asentarse/dwelling y suena bíblico sin ser arcaizante.
- source_word: ⲡⲉⲓⲙⲛⲧϩⲏⲕⲉ
  english_pob_choice: this poverty
  chosen_spanish: esta pobreza
  alternatives_spanish:
  - esta indigencia
  - esta miseria
  lexicon: Crum s.v. ⲙⲛⲧϩⲏⲕⲉ
  rationale: «Pobreza» es la equivalencia más directa y conserva el contraste con «riqueza».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la cláusula adversativa para reflejar ⲇⲉ («pero/sin embargo») y la observación gramatical sobre ⲁⲛⲟⲕ como énfasis de primera persona, evitando la repetición artificial. También se mantuvo la restauración de ⲡⲱⲥ («cómo») y el enlace entre riqueza y pobreza señalado por el testimonio de POxy 1.
  spanish_consistency_notes:
  - Se preserva el contraste léxico carne/espíritu/cuerpo para no colapsar ⲥⲁⲣⲝ y ⲥⲱⲙⲁ.
  - Se mantiene la repetición superlativa «maravilla de maravillas» para reflejar el idiomatismo del copto.
  - «Yo mismo» traduce el énfasis del pronombre independiente sin introducir una lectura enfática ajena al español.
  - «Ha hecho su morada» busca equilibrar precisión y legibilidad, evitando banalizar ⲥⲟⲩⲱϩ como simple «vivir».
