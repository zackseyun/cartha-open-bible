base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/029.yaml
  text: Jesus said[1], "If the flesh came into being because of the spirit, it is a wonder; but if the spirit came into being because of the body, it is a wonder of wonders[b][a][3][2]. Yet I myself marvel at how this great wealth has made its home in this poverty."
  footnotes:
  - marker: '1'
    text: ϣⲡⲏⲣⲉ may mean “child” in other contexts (Crum), but here the idiom ⲟⲩϣⲡⲏⲣⲉ ⲛϣⲡⲏⲣⲉ is a superlative, hence “a wonder of wonders.”
    reason: lexical_alternative
  - marker: '2'
    text: Dilley prints ϫⲉⲡⲱ[ⲥ] with the final ⲥ restored; the normalized form is ⲡⲱⲥ (“how”).
    reason: lacuna_or_restoration
  - marker: '3'
    text: POxy 1 preserves “…this poverty,” aligning with ⲡⲉⲓⲙⲛⲧϩⲏⲕⲉ here.
    reason: cross_reference
  - marker: a
    text: Or 'if the spirit came into being because of the body'.
    reason: previous_rendering
  - marker: b
    text: Or 'Yet I—I marvel'.
    reason: previous_rendering
