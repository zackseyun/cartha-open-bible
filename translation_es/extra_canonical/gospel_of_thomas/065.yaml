revisions:
- from: 'Él dijo[a]: «Un hombre bueno tenía una viña. Se la dio a unos labradores para que la trabajaran y él recibiera de ellos su fruto. Envió a su esclavo para que los labradores le entregaran el fruto de la viña. Ellos agarraron a su esclavo y lo golpearon; casi lo mataron[b]. El esclavo fue y se lo contó a su señor. Su señor dijo: “Tal vez no los conocía”. Envió a otro esclavo. Los labradores golpearon al otro. Entonces el señor envió a su hijo. Dijo: “Tal vez respetarán a mi hijo”. Pero esos labradores, al saber que él era el heredero de la viña, lo agarraron y lo mataron. El que tenga oídos[c], que oiga».'
  to: 'Él dijo[a]: «Un hombre bueno tenía una viña. Se la dio a unos labradores para que la trabajaran y él recibiera de ellos su fruto. Envió a su esclavo para que los labradores le entregaran el fruto de la viña. Ellos se apoderaron de su esclavo y lo golpearon; casi lo mataron[b]. El esclavo fue y se lo contó a su señor. Su señor dijo: “Tal vez no los conocía[c]”. Envió a otro esclavo. Los labradores golpearon al otro. Entonces el señor envió a su hijo. Dijo: “Tal vez respetarán a mi hijo”. Pero esos labradores, al saber que él era el heredero de la viña, se apoderaron de él y lo mataron. El que tenga oídos, que oiga».'
