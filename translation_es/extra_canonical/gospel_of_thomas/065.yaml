theological_decisions:
- issue: Lectura de ⲛⲭⲣⲏⲥⲧⲟⲥ en el inicio
  english_pob_reading: ‘A good man’ with a textual note that some scholars suggest ‘creditor/usurer’.
  chosen_spanish_reading: «Un hombre bueno» con nota textual sobre la posible lectura alternativa.
  alternative_spanish_readings:
  - «Un acreedor»
  - «Un usurero»
  - «Un hombre bondadoso»
