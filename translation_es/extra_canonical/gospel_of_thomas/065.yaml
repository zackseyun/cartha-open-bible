base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/065.yaml
  text: He said[1], "A good man had a vineyard. He gave it to some farmers so that they would work it and he would receive its fruit from them. He sent his slave so that the farmers would give him the fruit of the vineyard. They seized his slave and beat him; they almost killed him. The slave went and told his master. His master said, 'Perhaps he did not know them.' He sent another slave[2]. The farmers beat the other one. Then the master sent his son. He said, 'Perhaps they will respect my son.' Those farmers, since they knew that he was the heir of the vineyard, seized him and killed him. Whoever has ears[3], let him hear."
  footnotes:
  - marker: '1'
    text: The manuscript reads ⲛⲭⲣ̣ⲏ̣[ⲥⲧⲟ]ⲥ̣, restored as the Greek loanword χρηστός (chrestos, 'good'). Some scholars suggest it may be an iotacism for χρήστης (chrestes, 'creditor' or 'usurer'), which would fit the context of an absentee landlord.
    reason: textual_variant
  - marker: '2'
    text: Literally 'it was another little and they kill him' (ⲛⲉⲕⲉⲕⲟⲩⲉⲓ ⲡⲉ ⲛⲥⲉⲙⲟⲟⲩⲧϥ), a Coptic idiom for 'almost'.
    reason: lexical_alternative
  - marker: '3'
    text: 'The Coptic literally reads ''he did not know them'' (ⲙⲡⲉϥⲥⲟⲩⲱⲛⲟⲩ). Many translators emend this to ''they did not know him'' (ⲙⲡⲟⲩⲥⲟⲩⲱⲛϥ) to match the expected logic of the parable, but the manuscript reading offers a coherent alternative: the master assumes the servant went to the wrong farmers.'
    reason: textual_variant
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: false
    changes_summary: Changed both occurrences of "servant" to "slave" for lexical consistency and to avoid softening the source term.
translation:
  language: es
  text: 'Él dijo[a]: «Un hombre bueno tenía una viña. Se la dio a unos labradores para que la trabajaran y él recibiera de ellos su fruto. Envió a su esclavo para que los labradores le entregaran el fruto de la viña. Ellos se apoderaron de su esclavo y lo golpearon; casi lo mataron[b]. El esclavo fue y se lo contó a su señor. Su señor dijo: “Tal vez no los conocía[c]”. Envió a otro esclavo. Los labradores golpearon al otro. Entonces el señor envió a su hijo. Dijo: “Tal vez respetarán a mi hijo”. Pero esos labradores, al saber que él era el heredero de la viña, se apoderaron de él y lo mataron. El que tenga oídos, que oiga».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El manuscrito conserva ⲛⲭⲣ̣ⲏ̣[ⲥⲧⲟ]ⲥ̣, usualmente restaurado como χρηστός (“bueno” o “amable”). Algunos estudios proponen una lectura alternativa relacionada con “acreedor” o “usurero”; el texto principal sigue la restauración de “bueno”.
    reason: textual_variant
  - marker: b
    text: Literalmente, el copto dice “fue otra poca cosa y lo matan”, un modismo que significa “casi”.
    reason: lexical_alternative
  - marker: c
    text: El copto lee literalmente “no los conocía” (ⲙⲡⲉϥⲥⲟⲩⲱⲛⲟⲩ). Muchos traductores enmiendan esto a “ellos no lo conocían” para ajustarlo a la lógica esperada de la parábola, pero aquí se conserva la lectura manuscrita.
    reason: textual_variant
lexical_decisions:
- source_word: ⲭⲣⲏⲥⲧⲟⲥ
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - amable
  - bueno
  lexicon: BDAG
  rationale: El audit trail inglés restaura el préstamo como ‘good’. En español, ‘hombre bueno’ comunica con naturalidad la valoración moral sin introducir un matiz más fuerte que el texto no exige. ‘Bondadoso’ sería más interpretativo; ‘amable’ suena demasiado débil o social.
- source_word: ⲟⲩⲟⲉⲓⲉ
  english_pob_choice: farmers
  chosen_spanish: labradores
  alternatives_spanish:
  - campesinos
  - arrendatarios
  - agricultores
  lexicon: Crum 493a
  rationale: ‘Farmers’ en inglés POB cubre trabajadores/colonos de viña. ‘Labradores’ es un equivalente bíblico y readable en español para quienes trabajan la tierra, sin imponer la lectura técnica de ‘arrendatarios’ ni el alcance amplio de ‘agricultores’.
- source_word: ⲕⲉⲕⲟⲩⲉⲓ
