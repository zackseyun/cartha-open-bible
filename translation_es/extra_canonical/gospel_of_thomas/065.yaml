  doctrine_reference: Textual criticism / manuscript-level lexical ambiguity
- issue: Sujeto de la cláusula ‘Perhaps he did not know them’
  english_pob_reading: Keep the manuscript reading as ‘Perhaps he did not know them.’
  chosen_spanish_reading: «Tal vez no los conocía».
  alternative_spanish_readings:
  - «Tal vez ellos no lo conocían»
  - «Tal vez no sabía quiénes eran»
  rationale: Se conserva la lectura manuscrita, aun si parece menos esperable narrativamente, porque el audit trail destaca que la enmienda no es obligatoria. La formulación española reproduce esa tensión sin resolverla artificialmente.
  doctrine_reference: Respect for manuscript reading / non-harmonization with Synoptics
- issue: Representación de la orden final ‘Whoever has ears, let him hear’
  english_pob_reading: ‘Whoever has ears, let him hear.’
  chosen_spanish_reading: «El que tenga oídos, que oiga».
  alternative_spanish_readings:
  - «Quien tenga oídos, que oiga»
  - «El que tenga oídos, escuche»
  rationale: ‘Oiga’ es el equivalente más idiomático y tradicional en español, y conserva el paralelismo proverbial del original sin desplazarlo a una forma más explicativa.
  doctrine_reference: Proverbial saying / audience exhortation
translation_notes:
  revision_awareness: He incorporado la revisión auditada que prefirió ‘slave’ frente a ‘servant’ para mantener la consistencia léxica y no suavizar el término fuente. También he respetado la decisión revisionada de no armonizar la parábola con paralelos sinópticos, manteniendo la lectura manuscrita peculiar de ‘no los conocía’.
  spanish_consistency_notes:
  - Mantengo ‘labradores’ para ⲟⲩⲟⲉⲓⲉ por ser un término bíblico natural en español y suficientemente amplio para trabajadores de viña.
  - Uso ‘esclavo’ en ambos casos para ⲡⲉϥϩⲙϩⲁⲗ, siguiendo la preferencia revisada del POB inglés.
