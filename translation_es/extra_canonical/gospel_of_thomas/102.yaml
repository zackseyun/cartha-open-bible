base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/102.yaml
  text: 'Jesus said[d][c][b][a], “Woe to the Pharisees! For they are like a dog lying on the manger of the cattle: it neither eats nor lets the cattle eat.”'
  footnotes:
  - marker: a
    text: “Manger” renders ⲡⲟⲩⲟⲙϥ, often glossed as “feeding-trough.” Either fits the image.
    reason: lexical_alternative
  - marker: b
    text: ⲉϩⲉ denotes domestic animals/cattle. Many translations choose “oxen,” but the Coptic is generic; hence “cattle.”
    reason: cultural_note
  - marker: c
    text: The codex line has damaged letters that can resemble ⲛⲛⲉϩⲟⲟⲩ (“days”), but Dilley’s normalization reads ⲛϩⲉⲛⲉϩⲉ (“of the cattle”), confirmed by the following ⲛⲡⲉϩⲉ (“the cattle”).
    reason: lacuna_or_restoration
  - marker: d
    text: 'ⲕⲱ with an infinitive has the sense “to allow/let”; with negation here: “it does not let the cattle eat.”'
    reason: dialect_note
