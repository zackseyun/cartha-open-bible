translation:
  language: es
  text: 'Jesús dijo: «¡Ay de los fariseos! Porque son como un perro tendido sobre el pesebre[a] del ganado[b]: ni come ni deja que el ganado coma»[c][d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pesebre» traduce aquí el recipiente de alimento; el sentido también puede expresarse como «comedero» o «manger».
    reason: lexical_alternative
  - marker: b
    text: El coptic usa un término genérico para animales domésticos de carga/alimento; por eso se traduce «ganado» y no «bueyes» en sentido más estrecho.
    reason: cultural_note
  - marker: c
    text: La lectura normalizada del manuscrito entiende aquí la referencia al ganado; la redacción fragmentaria de la línea puede hacer oscilar la forma visible del Coptic, pero el sentido del contexto es estable.
    reason: textual_variant
  - marker: d
    text: Con «deja que» se refleja el valor de permitir/consentir de la construcción negativa, no simplemente una prohibición activa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲟⲩⲟⲓ
  english_pob_choice: Woe to
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay para
  - ¡Ay de parte de
  lexicon: Crum
  rationale: La interjección conserva el tono de denuncia y lamentación del original, con una fórmula natural en español bíblico y moderno.
- source_word: ⲉⲓⲛⲉ
  english_pob_choice: are like
  chosen_spanish: son como
  alternatives_spanish:
  - se parecen a
  - son semejantes a
  lexicon: Layton
  rationale: La construcción copulativa expresa con claridad la comparación directa del dicho.
- source_word: ⲟⲩϩⲟⲣ
  english_pob_choice: dog
  chosen_spanish: perro
  alternatives_spanish:
  - can
  - sabueso
  lexicon: Crum
  rationale: «Perro» reproduce el término básico y el filo despectivo de la imagen.
- source_word: ⲛⲛⲕⲟⲧⲕ
  english_pob_choice: lying
  chosen_spanish: tendido
  alternatives_spanish:
  - echado
  - acostado
  lexicon: Crum
  rationale: «Tendido» comunica la postura sin añadir la idea de sueño, que no está exigida por el coptic o el contexto inmediato.
- source_word: ϩⲓϫⲛ
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre la
  lexicon: Lambdin
  rationale: «Sobre» preserva la relación espacial breve y directa del original.
- source_word: ⲡⲟⲩⲟⲙϥ
  english_pob_choice: manger
  chosen_spanish: pesebre
  alternatives_spanish:
  - manger
  - comedero
  lexicon: Layton
  rationale: «Pesebre» es el equivalente idiomático natural en español para el recipiente de alimento del ganado; mantiene el valor imagístico de «feeding-trough» sin volverse técnico.
- source_word: ⲛϩⲉⲛⲉϩⲉ / ⲡⲉϩⲉ
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - cattle
  - reses
  - bestias
  lexicon: Crum
  rationale: «Ganado» conserva el sentido genérico de animales domésticos de labranza/alimentación y evita restringir indebidamente a «bueyes» u «oxen».
- source_word: ⲟⲩⲱⲙ
  english_pob_choice: eat
  chosen_spanish: coma
  alternatives_spanish:
  - coma de
  - alimente
  lexicon: Crum
  rationale: El infinitivo subordinado en español requiere una forma verbal equivalente; «coma» sigue el valor básico de «eat».
- source_word: ⲕⲱ (ⲛⲡⲉϩⲉ ⲉⲟⲩⲱⲙ)
  english_pob_choice: let / allow
  chosen_spanish: deja que
  alternatives_spanish:
  - permite que
  - deja comer a
  lexicon: Crum
  rationale: La construcción negativa pide la idea de permitir/consentir; «deja que» es directo y mantiene la simetría del paralelismo.
- source_word: ϫⲉ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: Lambdin
  rationale: Introduce la explicación causal con naturalidad en español y conserva el flujo sintáctico breve del dicho.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin copiarlo mecánicamente: se mantuvo la imagen del perro sobre el pesebre, pero se ajustó el español para que suene natural y a la vez conserve la fuerza despectiva y causal del dicho. También se respetó la decisión de traducir el sustantivo genérico del ganado con un término igualmente genérico en español.'
  spanish_consistency_notes:
  - Se preservó un registro bíblico sobrio, evitando paráfrasis expansivas.
  - «Ganado» se usó de forma consistente para el término coptico genérico, en línea con la nota auditada del inglés.
  - 'La frase final mantiene la estructura negativa compacta: «ni come ni deja que el ganado coma».'
