review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del copto: una vid plantada fuera del Padre, no establecida, destinada a ser arrancada y perecer. Conserva correctamente «el Padre» y el valor presente de «no está establecida». Sin embargo, hay una pequeña tensión entre el texto principal y la revisión inglesa auditada: el inglés adjudicado optó por pasiva en la cláusula futura («it will be uprooted») por consistencia estilística, mientras el español mantiene el impersonal activo («la arrancarán»). El copto permite ese impersonal activo, así que no es error de sentido, pero la nota b introduce alternativas que ya no encajan del todo con la mejor formulación española posible.'
  spanish_quality_summary: 'El español es claro y digno, pero «arrancarán desde su raíz» suena menos natural que «será arrancada de raíz» o «será arrancada desde la raíz». Además, las notas están algo desalineadas: la nota b habla de alternativas del verbo, la c del impersonal plural, y la d de la preposición, pero el anclaje triple sobre «raíz» no ayuda a la legibilidad. Conviene simplificar el texto y ajustar las notas al punto exacto.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «el Padre», «vid» y «perecerá» son adecuados. No aplican aquí otros términos doctrinales sensibles. La decisión entre activo impersonal y pasiva es estilística/gramatical, no de glosario.
  issues:
  - severity: medium
    issue: «arrancarán desde su raíz» suena poco idiomático en español bíblico natural
    rationale: Aunque reproduce el impersonal coptico y la nota preposicional, «arrancar desde su raíz» no es la formulación más fluida. En español, «será arrancada de raíz» o «desde la raíz» resulta más natural.
  - severity: low
