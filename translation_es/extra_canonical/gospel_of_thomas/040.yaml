- from: 'Jesús dijo[a]: «Una vid fue plantada fuera del Padre, y como no está establecida, la arrancarán desde su raíz[b][c][d] y perecerá».'
  to: 'Jesús dijo[a]: «Una vid fue plantada fuera del Padre, y como no está establecida[b], será arrancada de su raíz[c] y perecerá».'
  rationale: La revisión no cambia el sentido, pero mejora la naturalidad española y la coherencia interna. Se adopta una pasiva futura («será arrancada») que suena más idiomática con «de su raíz», mantiene el resultado semántico del copto y armoniza mejor con la adjudicación inglesa vigente. También se reducen y reubican las notas para que anclen con claridad los puntos léxicos reales.
