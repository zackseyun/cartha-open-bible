translation:
  language: es
  text: 'Jesús dijo[a]: «Una vid fue plantada fuera del Padre, y como no está establecida[b], será arrancada de su raíz[c] y perecerá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El sustantivo es un préstamo del griego ἄμπελος; aquí aparece con una grafía dialectal/ortográfica copta sin la nasal.
    reason: dialect_note
  - marker: b
    text: El verbo copto también puede expresarse como «estar firme» o «estar fuerte»; «estar establecida» conserva mejor su sentido amplio sin añadir la imagen de echar raíces.
    reason: lexical_alternative
  - marker: c
    text: La construcción puede entenderse «de su raíz» o «por su raíz»; la preposición expresa separación o procedencia. El copto usa además un plural impersonal para la acción futura, que aquí se vierte con pasiva natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲟⲩⲃⲁⲡⲉⲗⲟⲟⲗⲉ
  english_pob_choice: grapevine
  chosen_spanish: vid
  alternatives_spanish:
  - parra
  lexicon: Crum; Layton
  rationale: El término coptico es un préstamo del griego ἄμπελος, una vid o parra. En español, «vid» es natural, sobrio y suficientemente preciso para el contexto agrícola; «parra» también sería posible, pero «vid» mantiene mejor la concisión del dicho.
- source_word: ⲁⲩⲧⲟϭⲥ (ⲧⲱϭⲉ + -ⲥ)
  english_pob_choice: plant (planted it)
  chosen_spanish: fue plantada
  alternatives_spanish:
  - plantaron
  - la plantaron
  - fue puesta
  lexicon: Crum; Layton
  rationale: El verbo significa «plantar». En español, la pasiva refleja el valor impersonal del coptico y armoniza con la revisión inglesa que evita una oscilación entre pasiva y activa.
- source_word: ⲙ̄ⲡⲥⲁ ⲛⲃⲟⲗ
  english_pob_choice: outside
  chosen_spanish: fuera de
  alternatives_spanish:
  - afuera de
  - al exterior de
  lexicon: Layton (syntax)
  rationale: La locución expresa ubicación exterior respecto de un referente. «Fuera de» es la forma más natural y fiel en español, sin añadir matiz interpretativo.
- source_word: ⲡⲉⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Padre
  lexicon: Crum
  rationale: El artículo definido está presente; por eso se traduce «el Padre» y no se reduce a un vocativo genérico. Mantiene la referencia determinada del original.
- source_word: ⲥⲧⲁϫⲣⲟ
  english_pob_choice: be established
  chosen_spanish: está establecida
  alternatives_spanish:
  - está firme
  - está arraigada
  - está fuerte
  lexicon: Crum
  rationale: El estado verbal indica no estar asentada/establecida. «Está establecida» conserva el rango semántico amplio que el POB inglés protege con «be established», sin forzar la imagen a «arraigada».
- source_word: ⲛⲧⲟⲟⲩ + ⲛⲁ
  english_pob_choice: they will (generic)
  chosen_spanish: la arrancarán
  alternatives_spanish:
  - se arrancará
  - la arrancarán ellos
  - uno la arrancará
  lexicon: Layton (grammar)
  rationale: El coptico usa una construcción impersonal en tercera persona plural. En español, el futuro plural activo funciona de manera natural y preserva el matiz genérico sin sobrecargar la frase con una pasiva o un «uno» artificial.
- source_word: ⲡⲱⲣⲕ
  english_pob_choice: uproot
  chosen_spanish: arrancarán
  alternatives_spanish:
  - desarraigarán
  - arrancarán de raíz
  - sacarán de raíz
  lexicon: Crum
  rationale: «Arrancar» transmite el acto de sacar la planta de la tierra y es natural en español. Se conserva la fuerza agrícola del verbo; «desarraigar» sería más abstracto y menos directo.
- source_word: ϩⲁ ⲡⲉⲥⲛⲟⲩⲛⲉ
  english_pob_choice: from its root
  chosen_spanish: desde su raíz
  alternatives_spanish:
  - de su raíz
  - por su raíz
  lexicon: Crum
  rationale: La preposición coptica puede expresar separación o fuente. «Desde su raíz» mantiene esa relación y suena idiomático en español; también preserva la imagen de arrancamiento.
- source_word: ⲧⲁⲕⲟ
  english_pob_choice: perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - morirá
  - será destruida
  - se perderá
  lexicon: Crum
  rationale: «Perecerá» conserva el tono solemne y la fuerza de ruina del verbo, sin reducirlo simplemente a muerte física.
theological_decisions:
- issue: Referencia a «el Padre» y no una armonización cristológica externa
  english_pob_reading: The Father refers to the designated divine referent in the saying; the English keeps the definite article and avoids harmonizing with Matthew 15:13.
  chosen_spanish_reading: «el Padre» conserva la referencia determinada y no introduce una armonización ajena al dicho.
  alternative_spanish_readings:
  - «mi Padre»
  - «Padre» sin artículo
  rationale: El copto contiene el artículo definido. Traducir «mi Padre» añadiría una relación poseída no presente en el texto; omitir el artículo debilitaría la determinación del referente.
  doctrine_reference: Lectura textual y referencia pronominal/determinada del dicho; evitar armonización sinóptica.
- issue: Forma impersonal del agente en el futuro
  english_pob_reading: Coptic uses an impersonal third-person plural; the English notes preserve this as a generic agency.
  chosen_spanish_reading: «la arrancarán» conserva un agente genérico sin especificarlo.
  alternative_spanish_readings:
  - «será arrancada»
  - «uno la arrancará»
  rationale: La pasiva española suaviza la forma impersonal y «uno» suena poco natural. El plural futuro mantiene la extrañeza textual y sigue la economía del original.
  doctrine_reference: Gramática coptica y equivalencia formal/funcional en agencia impersonal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que confirmó que el estado verbal debe leerse en presente («is not established») y que la agencia futura es impersonal. Por eso la versión española evita un pasado («no estaba establecida») y mantiene un futuro plural activo para «la arrancarán».
  spanish_consistency_notes:
  - Se mantiene «el Padre» con artículo definido, conforme al original.
  - «Vid» traduce con naturalidad el préstamo de ἄμπελος y evita una paráfrasis excesiva.
  - Se conserva el tono gnómico y solemne con «perecerá».
  - La sintaxis busca reflejar el carácter impersonal del coptico sin sacrificar la legibilidad en español.
