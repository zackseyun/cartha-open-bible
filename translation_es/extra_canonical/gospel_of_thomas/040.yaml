base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/040.yaml
  text: Jesus said[a], "A grapevine was planted outside the Father, and since it is not established[e][d][c][b], it will be uprooted from its root and will perish."
  footnotes:
  - marker: a
    text: The noun is a Greek loan (ἄμπελος), here spelled without the nasal (ⲙ) as ⲃⲁⲡⲉⲗⲟⲟⲗⲉ, a dialectal/orthographic feature.
    reason: dialect_note
  - marker: b
    text: ⲥⲧⲁϫⲣⲟ could also be rendered “be firm/strong,” or idiomatically “take root.” “Be established” keeps the broader semantic range without adding imagery not stated by the verb itself.
    reason: lexical_alternative
  - marker: c
    text: Coptic uses an impersonal “they” (ⲛⲧⲟⲟⲩ) for generic agency; English could paraphrase with a passive (“it will be uprooted”), but the translation retains the active impersonal form.
    reason: lexical_alternative
  - marker: d
    text: ϩⲁ ⲡⲉⲥⲛⲟⲩⲛⲉ can be “from its root” or “by its root”; either preposition reflects separation/source.
    reason: lexical_alternative
  - marker: e
    text: Or 'A grapevine was planted outside the Father; and since it was not established, they will uproot it from its root, and it will perish.'.
    reason: previous_rendering
