translation:
  language: es
  text: 'Jesús dijo: «Desdichado[a] es el cuerpo que depende de un cuerpo,[b][c] y desdichada es el alma que depende de estos dos[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Depende de» traduce la idea del copto ⲉⲓϣⲉ/ⲁϣⲉ con objeto marcado por ⲛ; también podría verterse «se apoya en» o «descansa sobre».
    reason: lexical_alternative
  - marker: b
    text: El préstamo ⲧⲁⲗⲁⲓⲡⲱⲣⲟⲥ/ⲟⲛ corresponde al griego ταλαίπωρος, «desdichado, miserable».
    reason: cultural_note
  - marker: c
    text: El manuscrito alterna las terminaciones griegas -ον / -ος en el adjetivo; esto no cambia el sentido.
    reason: dialect_note
  - marker: d
    text: '«Estos dos» (ⲛⲡⲁⲓ ⲛⲡⲥⲛⲁⲩ) remite al par implícito en la primera cláusula: el cuerpo dependiente y el cuerpo del que depende, no a cuerpo y alma.'
    reason: cultural_note
lexical_decisions:
- source_word: ⲟⲩⲧⲁⲗⲁⲓⲡⲱⲣⲟⲛ / ⲟⲩⲧⲁⲗⲁⲓⲡⲱⲣⲟⲥ
  english_pob_choice: wretched
  chosen_spanish: desdichado
  alternatives_spanish:
  - miserable
  - miserable y desdichado
  - lastimero
  lexicon: Crum; Greek loan ταλαίπωρος
  rationale: El griego prestado expresa aflicción o condición miserable. En español, “desdichado” conserva un tono evaluativo fuerte y natural, cercano al “wretched” de la POB, sin sonar excesivamente arcaico.
- source_word: ⲥⲱⲙⲁ
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: Crum; Lambdin
  rationale: ⲥⲱⲙⲁ corresponde de manera directa a “cuerpo”. “Cuerpo” es el equivalente normal en español y mantiene la oposición cuerpo/alma del dicho.
- source_word: 'ⲉⲓϣⲉ (relative: ⲉⲧⲉⲣⲉⲉⲓϣⲉ) + ⲛⲟⲩⲥⲱⲙⲁ / ⲛⲡⲁⲓ ⲛⲡⲥⲛⲁⲩ'
  english_pob_choice: depends on
  chosen_spanish: depende de
  alternatives_spanish:
  - se apoya en
  - descansa sobre
  - se basa en
  lexicon: Crum; Layton
  rationale: La construcción copta admite la idea de apoyarse o depender de algo. “Depende de” reproduce bien la relación de sostenimiento/reliance y evita agregar un matiz causal que el original no exige.
- source_word: ⲯⲩⲭⲏ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - yo
  - espíritu
  lexicon: Crum; Layton
  rationale: Aunque el préstamo griego puede a veces implicar “vida” o “yo”, aquí el contraste con “cuerpo” favorece “alma” en español, que preserva la pareja conceptual sin diluirla.
- source_word: ⲛⲡⲁⲓ ⲛⲡⲥⲛⲁⲩ
  english_pob_choice: these two
  chosen_spanish: estos dos
  alternatives_spanish:
  - esta pareja
  - ambos
  lexicon: Layton (demonstratives; dual)
  rationale: La forma dual demostrativa apunta al par mencionado inmediatamente antes. “Estos dos” es claro, breve y conserva la referencia precisa al par implicado.
theological_decisions:
- issue: Valor del par “cuerpo/alma” sin armonización doctrinal
  english_pob_reading: The dependent body and the body it depends on; the soul that depends on these two.
  chosen_spanish_reading: El cuerpo que depende de un cuerpo; el alma que depende de estos dos.
  alternative_spanish_readings:
  - el cuerpo que se apoya en otro cuerpo
  - el alma que se apoya en ambos
  rationale: 'Se preserva la tensión del dicho tal como aparece en el coptio: no se explica ni corrige el doble uso de “cuerpo”, ni se sustituye por una formulación espiritualizante. La rareza del paralelismo forma parte del sentido del texto.'
  doctrine_reference: Texto gnóstico/extra canónico; no se impone armonización con antropologías bíblicas posteriores.
translation_notes:
  revision_awareness: 'La redacción sigue el estado revisado de alta concordancia del testimonio inglés: mantiene “wretched” como valoración fuerte, conserva la referencia dual “these two” y no introduce cambios textuales o doctrinales no respaldados por el original.'
  spanish_consistency_notes:
  - Se usa “Jesús” para ⲓ︤ⲥ︥ conforme al estándar del proyecto.
  - Se mantiene la oposición “cuerpo/alma” con léxico transparente y natural en español.
  - No se normaliza la repetición de “cuerpo”, porque el original la repite de manera deliberada.
  - La nota [a] se ancla solo en el primer “depende de”, donde existe la alternativa lexical relevante.
