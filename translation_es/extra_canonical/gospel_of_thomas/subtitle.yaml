translation:
  language: es
  text: El evangelio según Tomás[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «buena noticia». El término copt. ⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ puede entenderse literalmente así, pero como título de obra la forma usual en español es «evangelio».'
    reason: lexical_alternative
  - marker: b
    text: La construcción copt. dice literalmente «el según Tomás» (ⲡⲕⲁⲧⲁ ⲑⲱⲙⲁⲥ), una fórmula fija de títulos en manuscritos coptos.
    reason: cultural_note
lexical_decisions:
- source_word: ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  - evangelio
  lexicon: Crum; préstamo del griego εὐαγγέλιον
  rationale: En español, como título de género, «evangelio» es la forma más natural y fiel al uso manuscrito; «buena noticia» sería más literal pero menos idiomática como encabezado.
- source_word: ⲡⲕⲁⲧⲁ
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - de acuerdo con
  - por
  - como lo cuenta
  lexicon: Lambdin; Layton; Crum (uso coptizante del griego κατά en títulos)
  rationale: La fórmula titulística en español se expresa de manera natural con «según», que conserva la función de atribución/autoria del original sin sobrecargar el texto.
- source_word: ⲑⲱⲙⲁⲥ
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  alternatives_spanish:
  - Tomás
  lexicon: Crum (nombre propio; del griego Θωμᾶς)
  rationale: Nombre propio estándar en español. Se mantiene la forma tradicional «Tomás» por claridad y reconocimiento inmediato.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y dejó el texto sin modificaciones necesarias; se conserva la misma lectura titulística, con adaptación natural al español y sin añadir contenido no atestiguado.
  spanish_consistency_notes:
  - Se mantiene «evangelio» para el valor de género-título de ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ.
  - Se usa «según» para reflejar la fórmula titulística de atribución de ⲡⲕⲁⲧⲁ.
  - Se conserva el nombre propio «Tomás» conforme al uso español establecido.
  - No se introduce mayúscula adicional en «según» dentro del título, siguiendo la norma española de títulos en estilo oración.
