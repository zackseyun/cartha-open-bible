  source_alignment_summary: 'El borrador español refleja fielmente el título copto ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ ⲡⲕⲁⲧⲁ ⲑⲱⲙⲁⲥ como «El evangelio según Tomás». «Evangelio» preserva correctamente el valor de título de género de ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ, y «según» reproduce bien la fórmula titulística de atribución de ⲡⲕⲁⲧⲁ. Las notas conservan las dos aclaraciones significativas del rastro de auditoría inglés: la alternativa literal de «buena noticia» y la literalidad/formulariedad de «el según Tomás».'
  spanish_quality_summary: El español es natural, claro y digno. «El evangelio según Tomás» es la forma idiomática esperable en español eclesial general. Las notas son legibles y suficientemente precisas. No hay calcos torpes ni paraphraseo excesivo.
  glossary_alignment: No hay terminología teológica sensible en juego fuera de «evangelio», que está bien resuelto según el criterio del proyecto para títulos de obra. El nombre propio «Tomás» es la forma estándar en español. La elección de «según» concuerda con la práctica titulística española y con la racionalidad léxica documentada.
