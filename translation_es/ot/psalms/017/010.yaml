translation:
  language: es
  text: Han cerrado sus corazones grasos[a]; con su boca hablan con arrogancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «han cerrado su grasa» (חֶלְבָּמוֹ סָּגְרוּ). El término «grasa» funciona metafóricamente para un corazón insensible o ensimismado; se añade «corazones» por claridad idiomática, siguiendo la decisión documentada del POB inglés. Compárese con la alternativa «corazones endurecidos», que captura el sentido pero pierde la imagen concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶלְבָּמוֹ
  english_pob_choice: their fat hearts
  chosen_spanish: sus corazones grasos
  alternatives_spanish:
  - su grasa
  - sus corazones endurecidos
  - sus corazones encallecidos
  lexicon: HALOT
  rationale: El hebreo חֵלֶב (lemma 2459) significa literalmente 'grasa' con el sufijo 3mp 'su/sus'. El sustantivo no incluye 'corazones' en la fuente hebrea. Siguiendo la decisión documentada del POB inglés, se añade 'corazones' para hacer inteligible el idioma en español, mientras se conserva 'grasos' para preservar la imagen concreta de insensibilidad o satisfacción propia. La alternativa 'corazones endurecidos' captura el sentido pero pierde la imagen original; se preserva como alternativa, no en el texto principal, tal como lo hace el POB inglés con 'callous hearts'.
- source_word: סָּגְרוּ
  english_pob_choice: close up
  chosen_spanish: han cerrado
  alternatives_spanish:
  - cerraron
  - cierran
  - han sellado
  lexicon: HALOT
  rationale: El verbo סָגַר (lemma 5462) en qal perfecto 3cp significa 'cerrar/clausurar'. Se elige 'han cerrado' (perfecto compuesto español) para reflejar tanto la acción consumada como el estado resultante de insensibilidad que describe el salmo. El perfecto hebreo en poesía tiene fuerza gnómica; 'han cerrado' en español transmite esa condición establecida mejor que el pretérito simple 'cerraron'.
- source_word: פִּימוֹ
  english_pob_choice: their mouths
  chosen_spanish: su boca
  alternatives_spanish:
  - sus bocas
  lexicon: HALOT
  rationale: El hebreo פֶּה (lemma 6310) es morfológicamente singular con sufijo 3mp ('su boca de ellos'). El POB inglés eligió el plural 'mouths' por convención idiomática en inglés. En español, 'su boca' (singular colectivo) es igualmente natural y conserva la morfología hebrea más fielmente. 'Sus bocas' también sería válido, pero el singular colectivo es el uso preferido en español en expresiones de este tipo ('hablan con su boca').
- source_word: דִּבְּרוּ
  english_pob_choice: they speak
  chosen_spanish: hablan
  alternatives_spanish:
  - hablaron
  - han hablado
  lexicon: HALOT
  rationale: El verbo דָּבַר (lemma 1696) en piel perfecto 3cp. Siguiendo la decisión del POB inglés de leer el perfecto hebreo con fuerza gnómica o de presente en el contexto del salmo —que describe el carácter permanente de los impíos— se elige el presente 'hablan'. Esto es natural en español y coherente con el presente gnómico del contexto.
- source_word: בְגֵאוּת
  english_pob_choice: arrogantly
  chosen_spanish: con arrogancia
  alternatives_spanish:
  - con soberbia
  - arrogantemente
  - con altivez
  - con orgullo
  lexicon: HALOT
  rationale: El sintagma prepositivo בְ + גֵּאוּת (lemma 1348, sustantivo femenino singular absoluto) denota orgullo, exaltación o arrogancia con connotación moral negativa. 'Con arrogancia' refleja fielmente la construcción hebrea (preposición + sustantivo) y es la forma más natural en español después de 'hablan'. El POB inglés eligió el adverbio 'arrogantly'; en español el giro nominal 'con arrogancia' es más elegante que el adverbio 'arrogantemente'. 'Con soberbia' es una alternativa igualmente válida.
