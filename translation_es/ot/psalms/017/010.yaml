  - '''Su boca'' (singular colectivo) se prefiere sobre ''sus bocas'' para conservar la morfología singular del hebreo פֶּה, diferenciándose ligeramente del POB inglés que usa el plural ''mouths'' por convención idiomática del inglés.'
