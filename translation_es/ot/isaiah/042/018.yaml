translation:
  language: es
  text: ¡Oigan, sordos[a]! Y miren, ciegos[b], para ver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los sordos... los ciegos.' Los adjetivos hebreos con artículo pueden leerse como vocativo directo ('sordos... ciegos') o como descripciones sustantivadas en tercera persona ('los sordos... los ciegos').
    reason: lexical_alternative
  - marker: b
    text: 'La frase final expresa propósito: ''miren... para ver'' o, con cláusula explícita, ''miren... para que vean.'' La opción ''para ver'' refleja más directamente el infinitivo hebreo לִרְאוֹת.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֵרְשִׁים
  english_pob_choice: you deaf
  chosen_spanish: sordos
  alternatives_spanish:
  - los sordos
  - ustedes los sordos
  lexicon: HALOT (lemma 2795)
  rationale: 'El adjetivo hebreo con artículo (הַחֵרְשִׁים) funciona en este contexto como vocativo directo. En español, el adjetivo sustantivado en aposición al imperativo expresa naturalmente la apelación directa sin necesidad de agregar ''ustedes'': ''oigan, sordos'' equivale funcionalmente al ''you deaf'' del inglés POB. ''Los sordos'' es posible pero se inclina hacia una lectura sustantival no vocativa. La nota [a] preserva ambas opciones.'
- source_word: שְׁמָעוּ
  english_pob_choice: Hear
  chosen_spanish: Oigan
  alternatives_spanish:
  - Escuchen
  - Oíd
  lexicon: HALOT (lemma 8085)
  rationale: Imperativo Qal 2mp de שׁמע. 'Oigan' (de oír) es el imperativo plural natural en español neutro latinoamericano para la acción de percibir auditivamente, y conviene al registro profético solemne del pasaje. 'Oíd' es forma de vosotros peninsular, incompatible con el objetivo de español neutro latinoamericano. 'Escuchen' (de escuchar) añade matiz de atención deliberada que el Qal simple de שׁמע no requiere; 'oigan' preserva mejor la fuerza sensorial inmediata.
- source_word: וְהַעִוְרִים
  english_pob_choice: and look, you blind
  chosen_spanish: Y miren, ciegos
  alternatives_spanish:
  - y los ciegos
  - y ustedes los ciegos
  lexicon: HALOT (lemma 5787)
  rationale: 'La conjunción וְ introduce el segundo vocativo paralelo. ''Ciegos'' en aposición al imperativo ''miren'' replica la estructura del primer hemistiquio: conjunción + imperativo + vocativo sustantivado. La paralela colocación conjunción–verbo–sustantivo refleja fielmente el orden del hebreo en ambos miembros del versículo.'
- source_word: הַבִּיטוּ
  english_pob_choice: look
  chosen_spanish: miren
  alternatives_spanish:
  - observen
  - contemplen
  - fijen la vista
  lexicon: HALOT (lemma 5027)
  rationale: Imperativo Hifil 2mp de נבט, que denota una mirada dirigida e intencional. 'Miren' (de mirar) captura bien ese sentido de mirada orientada hacia un objeto y resulta natural en el registro profético español. 'Observen' es demasiado técnico; 'contemplen' sobreañade una calidad meditativa ausente en el fuente; 'fijen la vista' es descriptivo pero excesivamente perifrástico. La correspondencia acústica con 'oigan' refuerza además el paralelismo sordo/ciego del versículo.
- source_word: לִרְאוֹת
  english_pob_choice: that you may see
  chosen_spanish: para ver
  alternatives_spanish:
  - para que vean
  - a fin de que vean
  - a ver
  lexicon: HALOT (lemma 7200)
  rationale: 'Infinitivo constructo de ראה con la preposición ל expresando propósito o resultado. ''Para ver'' es la traducción más directa y concisa: el español acepta perfectamente el infinitivo con ''para'' como cláusula de propósito, sin necesidad de explicitar el sujeto pronominal. ''Para que vean'' (cláusula subjuntiva completa) hace explícito el sujeto pero añade gramática que el hebreo no requiere. ''A fin de que vean'' es excesivamente formal y perifrástico. ''Para ver'' espeja la economía de לִרְאוֹת.'
theological_decisions:
- issue: Si 'sordos' y 'ciegos' deben entenderse en sentido literal o glosarse de inmediato como insensibilidad espiritual
  english_pob_reading: Literal sensory terms retained in the main text, leaving metaphorical force to context
  chosen_spanish_reading: Términos sensoriales literales retenidos en el texto principal, dejando la fuerza metafórica al contexto
  alternative_spanish_readings:
  - espiritualmente sordos y ciegos
  - insensibles
  rationale: En Isaías 42 el lenguaje de la sordera y la ceguera funciona como imagen de la insensibilidad de Israel, pero el hebreo usa los términos concretos חֵרְשִׁים y עִוְרִים. Conservar 'sordos' y 'ciegos' en el texto español mantiene la tensión literaria profética y evita importar la interpretación metafórica al texto mismo. El contexto del capítulo permite al lector percibir la dimensión espiritual sin que el traductor la imponga. Esta decisión sigue el principio del POB de preservar la tensión teológica en lugar de resolverla.
  doctrine_reference: 'Filosofía de traducción POB: preservar la tensión teológica antes que resolverla; primacía del texto en lengua original sobre la tradición traductora.'
translation_notes:
  revision_awareness: El registro inglés del POB fue revisado el 23 de abril de 2026 (modelo gpt-5.4) y verificado de forma cruzada con alto nivel de acuerdo (puntuación 1.0 en dos pasadas); no se introdujeron cambios en esa revisión. El presente borrador español se fundamenta directamente en el texto hebreo WLC (WLC) y toma el rastro de auditoría inglés del POB como contexto documentado, no como texto de origen.
  spanish_consistency_notes:
  - Este versículo no contiene el nombre divino יהוה; la convención del proyecto 'Yahvé' no se aplica aquí.
  - Los imperativos plurales siguen la forma del español neutro latinoamericano ('oigan', 'miren'), evitando las formas peninsulares de vosotros ('oíd', 'mirad'), en coherencia con el objetivo de alcance geográfico amplio del POB.
  - Los adjetivos sustantivados 'sordos' y 'ciegos' reproducen la función vocativa del hebreo sin añadir pronombres explícitos ('ustedes'), dado que en español el vocativo en aposición al imperativo ya implica la segunda persona.
  - 'La puntuación sigue las convenciones del español: signo de exclamación de apertura (¡) al comienzo de la oración exclamativa imperativa.'
