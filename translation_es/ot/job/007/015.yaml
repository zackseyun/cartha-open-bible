translation:
  language: es
  text: de modo que mi alma elige el estrangulamiento[a], la muerte antes que mis huesos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien «el ahogamiento» o «la sofocación». El hebreo מַחֲנָק denota el acto de estrangular o ahogar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «muerte de mis huesos». El sentido es que Job prefiere la muerte antes que continuar en su existencia corporal afligida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְחַר
  english_pob_choice: chooses
  chosen_spanish: elige
  alternatives_spanish:
  - elegiría
  - escoge
  - escogería
  lexicon: HALOT
  rationale: De בָּחַר, 'elegir/escoger.' El waw-consecutivo con imperfecto 3fs puede tener fuerza de presente en el flujo poético. El POB inglés optó por 'chooses' en ese sentido; 'elige' refleja la misma decisión en español moderno con la misma naturalidad. 'Elegiría' (potencial) es posible dada la secuencia de deseo de Job en los versículos anteriores, pero el hebreo no marca explícitamente ese matiz optativo.
- source_word: מַחֲנָק
  english_pob_choice: strangling
  chosen_spanish: el estrangulamiento
  alternatives_spanish:
  - el ahogamiento
  - la sofocación
  - la estrangulación
  lexicon: HALOT
  rationale: El sustantivo מַחֲנָק (lemma 4267) denota el acto de estrangular o ahogar. 'El estrangulamiento' conserva la imagen concreta y severa que el POB inglés prefirió preservar con 'strangling' frente a la más difusa 'suffocation'. 'El ahogamiento' o 'la sofocación' son posibles pero menos precisos para el referente del hebreo.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - yo mismo
  - mi ser
  lexicon: HALOT
  rationale: נֶפֶשׁ (lemma 5315) abarca alma, ser, vida y persona según el contexto. El POB inglés retiene 'my soul' para preservar la intensidad del ser interior de Job como sujeto. En español, 'mi alma' es la equivalencia más natural y digna en contexto poético y conserva esa fuerza subjetiva. 'Mi vida' daría el matiz de existencia o fuerza vital, que también es pertinente dado que el verso trata de preferir la muerte; se preserva como alternativa.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  lexicon: HALOT
  rationale: Traducción estándar de מָוֶת (lemma 4194). No hay ambigüedad.
- source_word: מֵעַצְמוֹתָי
  english_pob_choice: rather than my bones
  chosen_spanish: antes que mis huesos
  alternatives_spanish:
  - más que mis huesos
  - en lugar de mis huesos
  - que estos huesos míos
  lexicon: HALOT
  rationale: 'Literalmente ''de mis huesos'' (preposición מִן + עֶצֶם, lemma 6106, plural + sufijo 1cs). En contexto poético el מִן tiene fuerza comparativa: Job prefiere la muerte por encima de sus huesos, es decir, de su existencia corporal afligida. ''Antes que mis huesos'' capta esa comparación en español con naturalidad y mantiene el referente concreto ''huesos'' sin aplanarlo a ''cuerpo'', conforme a la decisión del POB inglés.'
theological_decisions:
- issue: נֶפֶשׁ como 'alma' en contexto de deseo de muerte
  english_pob_reading: my soul chooses
  chosen_spanish_reading: mi alma elige
  alternative_spanish_readings:
  - mi vida elige
  - yo mismo elijo
  rationale: En español eclesiástico, 'alma' (alma inmortal) carga resonancias platónicas o teológicas que el hebreo נֶפֶשׁ no implica necesariamente — aquí נֶפֶשׁ es simplemente el ser vivo de Job que desea la muerte. Sin embargo, 'mi alma' sigue siendo la opción más fiel al léxico hebreo en contexto poético y es la que el POB inglés documenta. El lector avisado sabrá que no se afirma aquí ninguna doctrina de inmortalidad; el término expresa la totalidad del ser interior de Job en su agonía.
  doctrine_reference: 'Antropología bíblica: נֶפֶשׁ como ser viviente (Gén 2:7), no como alma dualista platónica'
translation_notes:
  revision_awareness: 'La revisión más reciente del POB inglés (gemini-3.1-pro-preview, 2026-04-23) concluyó que no se necesitaban cambios (unchanged: true). El cruce de verificación arroja alta concordancia (0,95) con observaciones menores. El borrador español sigue fielmente las decisiones léxicas y filosóficas documentadas sin introducir variaciones que contravengan el consenso revisado.'
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo; la terminología divina no requiere decisión aquí.
  - Se mantiene 'mi alma' (נֶפֶשׁ) conforme al valor expresivo documentado; las alternativas 'mi vida' / 'mi ser' se registran en decisiones léxicas.
  - El conector 'de modo que' refleja el waw-consecutivo con sentido consecutivo-resultativo del verso en su contexto (vv. 13-14 describen pesadillas de Job que desembocan en este deseo).
  - Se usa artículo determinado en 'el estrangulamiento' y 'la muerte' siguiendo la gramática española natural para sustantivos abstractos en función de objeto directo.
  - No aparece lenguaje mesiánico ni terminología κύριος/YHWH en este texto.
