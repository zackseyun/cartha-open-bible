translation:
  language: es
  text: ¿Por qué se nos tiene por bestias[a], y se nos considera impuros[b] en sus ojos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Heb. כַּבְּהֵמָה: lit. ''como animales/bestias''. El término hebreo בְּהֵמָה es amplio e incluye todo tipo de animales, frecuentemente el ganado doméstico; aquí tiene sentido claramente despectivo.'
    reason: lexical_alternative
  - marker: b
    text: La forma hebrea נִטְמִינוּ es difícil. La lectura más común la vincula a la raíz טמא ('ser impuro/inmundo'); algunos intérpretes la conectan a una raíz de 'ocultamiento' o 'estupidez animal', pero la mayoría de los comentarios modernos mantiene el sentido de contaminación/impureza.
    reason: alternative_reading
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A qué se debe que
  lexicon: HALOT
  rationale: Adverbio interrogativo estándar (lemma 4069). '¿Por qué' es la traducción directa y natural del hebreo מַדּוּעַ, introduce la pregunta retórica de Bildad sin añadir énfasis ni carga innecesaria. Las alternativas más largas sonarían artificiales en español moderno.
- source_word: נֶחְשַׁבְנוּ
  english_pob_choice: are we regarded
  chosen_spanish: se nos tiene por
  alternatives_spanish:
  - somos tenidos por
  - somos contados como
  - somos considerados
  lexicon: HALOT
  rationale: 'Niphal perfecto 1cp de חשׁב (lemma 2803): ''ser estimado, contado, reputado''. La construcción reflexiva pasiva española ''se nos tiene por'' captura el sentido evaluativo-pasivo del Niphal con naturalidad. ''Somos tenidos por'' es igualmente fiel pero ligeramente más formal; ''somos contados como'' acentúa el sentido numérico-contable que no es el foco aquí.'
- source_word: כַּבְּהֵמָה
  english_pob_choice: as cattle
  chosen_spanish: bestias
  alternatives_spanish:
  - animales
  - ganado
  - bestias brutas
  lexicon: HALOT
  rationale: בְּהֵמָה (lemma 929) con preposición comparativa כ. Es un término amplio que abarca animales domésticos y en general todo tipo de bestias. El inglés POB eligió 'cattle' por su fuerza colectiva despectiva; en español, 'bestias' preserva mejor ese tono insultante sin limitarse al ganado vacuno ni sonar arcaico. 'Animales' es más neutro y debilita la carga peyorativa. 'Ganado' sobrespecifica el sentido hacia el vacuno/ovino. La preposición כ de comparación queda absorbida en la construcción 'tenidos por bestias'.
- source_word: נִטְמִינוּ
  english_pob_choice: considered unclean
  chosen_spanish: se nos considera impuros
  alternatives_spanish:
  - somos tenidos por inmundos
  - somos considerados contaminados
  - somos reputados como impuros
  lexicon: HALOT
  rationale: Niphal perfecto 1cp de טמא (lemma 2933). La forma es difícil en el hebreo; la lectura más respaldada la conecta a la raíz de impureza/contaminación, en paralelo con נֶחְשַׁבְנוּ. 'Impuros' es más natural en español latinoamericano moderno que 'inmundos', que resuena a Reina-Valera y puede sonar arcaico. La construcción pasiva reflexiva 'se nos considera' mantiene el paralelismo con 'se nos tiene por' del primer estico.
- source_word: בְּעֵינֵיכֶם
  english_pob_choice: in your eyes
  chosen_spanish: en sus ojos
  alternatives_spanish:
  - ante sus ojos
  - a los ojos de ustedes
  - en su opinión
  lexicon: HALOT
  rationale: 'Expresión idiomática estándar: preposición בְּ + עֵינַיִם (''ojos'') + sufijo pronominal 2mp. En español latinoamericano el 2mp hebreo corresponde a ''ustedes'', resultando en ''sus ojos''. La locución ''en sus ojos'' calca el idioma hebreo con naturalidad. ''Ante sus ojos'' usaría לִפְנֵי en hebreo; ''en su opinión'' parafrasea en exceso la metáfora visual que el texto preserva.'
theological_decisions:
- issue: 'Interpretación de נִטְמִינוּ: impureza ritual vs. estupidez vs. ocultamiento'
  english_pob_reading: considered unclean
  chosen_spanish_reading: se nos considera impuros
  alternative_spanish_readings:
  - se nos considera estúpidos
  - somos ignorados
  - somos ocultados
  rationale: La forma נִטְמִינוּ es textualmente disputada. Algunos comentaristas la vinculan a טמן ('esconder/ocultar') o incluso a raíces que implican estupidez animal; otros, siguiendo a Clines, Pope y la mayoría de los comentarios críticos modernos, la leen desde טמא ('ser inmundo/impuro'). Esta última lectura cuadra con el paralelismo y con el contexto retórico de Bildad, que protesta por ser despreciado como si él y sus compañeros fueran impuros. El borrador español adopta 'impuros' preservando la resonancia con la terminología de pureza sin sobreespecificar un contexto estrictamente ritual. La revisión cruzada (agreement 0.7, major-issues) señala tensión en este punto; la alternativa 'se nos considera estúpidos' (conectada a בְּהֵמָה por asociación de ideas) no tiene respaldo léxico directo en el verbo y se documenta solo como lectura posible.
  doctrine_reference: Pureza e impureza en el corpus sapiencial; contexto retórico del debate de Job 18
translation_notes:
  revision_awareness: La revisión más reciente (modelo gpt-5.4, 2026-04-23) declaró el texto inglés sin cambios necesarios. Sin embargo, la revisión cruzada (gemini-3.1-pro-preview) marcó 'major-issues' con acuerdo de solo 0.7, tensión concentrada presumiblemente en la interpretación de נִטְמִינוּ. El borrador español sigue la lectura del inglés POB (impureza/defilement desde טמא) por ser la más respaldada en comentarios críticos, pero documenta la alternativa explícitamente en la decisión teológica y en la nota al pie [b] para mantener la auditoría abierta.
  spanish_consistency_notes:
  - No aparece el nombre divino יהוה ni κύριος en este versículo; la terminología de proyecto para 'Yahvé' no se activa aquí.
  - Se prefiere 'impuros' sobre 'inmundos' para evitar la resonancia arcaica de la Reina-Valera y ajustarse al español latinoamericano moderno, sin perder la fuerza del concepto de contaminación.
  - 'El pronombre de segunda persona plural hebreo (כֶם, 2mp) se vierte con la forma ''ustedes'' del español latinoamericano neutral: ''en sus ojos'', no ''en vuestros ojos''.'
  - Se usa 'bestias' para כַּבְּהֵמָה en lugar de 'ganado' (que sobrespecifica hacia bovinos/ovinos) o 'animales' (que neutraliza la carga insultante del pasaje).
  - 'El paralelismo bimembre hebreo se reproduce en español mediante dos cláusulas pasivas reflexivas simétricas: ''se nos tiene por bestias / se nos considera impuros''.'
