translation:
  language: es
  text: Quien menosprecia a su prójimo peca, pero dichoso[a] es quien muestra gracia a los pobres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bienaventurado». El término hebreo (אַשְׁרָיו) expresa un estado objetivo de prosperidad y bienaventuranza, no meramente una emoción subjetiva. Compárese «feliz» como alternativa menos formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּז
  english_pob_choice: despises
  chosen_spanish: menosprecia
  alternatives_spanish:
  - desprecia
  - tiene en poco
  - desdeña
  lexicon: HALOT
  rationale: El participio qal de בוז denota tratar a alguien con desprecio activo. 'Menospreciar' en español captura ese matiz de desvalorizar deliberadamente al otro, con mayor precisión que el más genérico 'despreciar', y sin la carga arcaica de 'desdeñar'. Preserva la fuerza moral que el POB inglés eligió con 'despises'.
- source_word: לְרֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su compañero
  - a su semejante
  - a su par
  lexicon: HALOT
  rationale: רֵעַ designa a otro dentro del entorno social inmediato. 'Prójimo' es el equivalente más reconocible en el registro ético-sapiencial del español bíblico (cf. Lv 19:18 en tradición hispana) y no resulta arcaico. El sufijo 3ms se conserva con 'su'. Se descarta 'compañero' por ser demasiado genérico e informal para el registro del proverbio.
- source_word: חוֹטֵא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - está pecando
  - hace el mal
  - obra mal
  lexicon: HALOT
  rationale: 'El participio funciona predicativamente: quien menosprecia a su prójimo queda caracterizado como pecador. ''Peca'' es el equivalente más directo y preserva la categoría moral/teológica explícita que el POB inglés mantuvo con ''sins'', en lugar de debilitarla a ''hace el mal''.'
- source_word: וּמְחוֹנֵן
  english_pob_choice: is gracious to
  chosen_spanish: muestra gracia a
  alternatives_spanish:
  - es bondadoso con
  - favorece a
  - es misericordioso con
  - se apiada de
  lexicon: HALOT
  rationale: El participio piel de חנן significa 'mostrar favor/gracia a alguien'. El POB inglés eligió 'is gracious to' específicamente para distinguir de la compasión de tipo רחם. En español, 'misericordioso' o 'compadecerse' llevan precisamente ese matiz de רחם, por lo que se descartan. 'Muestra gracia a' preserva la conexión léxica con חנן y con el campo semántico de gracia/favor (cf. χάρις), y mantiene el matiz de beneficencia graciosa sobre la compasión emocional. 'Bondadoso' sería también válido pero diluye la especificidad lexical.
- source_word: עניים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los afligidos
  - los necesitados
  - los humildes
  lexicon: HALOT
  rationale: עניים (pl. de עָנִי) puede abarcar tanto pobreza material como aflicción. En el contraste ético de este proverbio, la vulnerabilidad socioeconómica es prominente. 'Los pobres' es el equivalente más concreto e inmediato; 'los afligidos' es posible pero desplaza hacia la experiencia subjetiva; 'los necesitados' es válido aunque más abstracto.
- source_word: אַשְׁרָיו
  english_pob_choice: blessed is he
  chosen_spanish: dichoso
  alternatives_spanish:
  - bienaventurado
  - feliz
  - ¡cuán bendito es!
  lexicon: HALOT
  rationale: אַשְׁרֵי con sufijo 3ms predica un estado de prosperidad/bienaventuranza objetiva. El POB inglés eligió 'blessed' sobre 'happy' para evitar reducir el término a mera emoción subjetiva. En español moderno, 'dichoso' es el equivalente establecido para אַשְׁרֵי en las tradiciones de traducción contemporáneas (NVI, NTV) y porta más dignidad que 'feliz', sin el arcaísmo de 'bienaventurado'. El estado objetivo se explicita en nota. El masculino singular se mantiene con valor representativo conforme a la política de género del POB.
theological_decisions:
- issue: Renderización del término sapiencial אַשְׁרָיו
  english_pob_reading: blessed is he
  chosen_spanish_reading: dichoso
  alternative_spanish_readings:
  - bienaventurado
  - feliz
  rationale: El proverbio pronuncia un estado objetivo de favor y prosperidad, no una emoción subjetiva. El POB inglés preservó esto con 'blessed' sobre 'happy'. En español, 'feliz' es demasiado subjetivo y emocional; 'bienaventurado', aunque teológicamente robusto, resulta arcaico para lectores latinoamericanos contemporáneos. 'Dichoso' representa el equilibrio entre modernidad y dignidad, y es el término que las principales traducciones hispanas actuales usan sistemáticamente para אַשְׁרֵי. La nota al pie explicita el estado objetivo de florecimiento, preservando la claridad teológica que el POB inglés documentó.
  doctrine_reference: Filosofía de traducción §6 (optimal-equivalence); política de género §4; término sapiencial de bienaventuranza en literatura de proverbios
- issue: Distinción חנן (gracia/favor) vs. רחם (compasión/misericordia) en el segundo hemistiquio
  english_pob_reading: is gracious to (not 'has mercy on')
  chosen_spanish_reading: muestra gracia a
  alternative_spanish_readings:
  - es misericordioso con
  - se compadece de
  - es bondadoso con
  rationale: El POB inglés documentó explícitamente que 'has mercy on' desplaza el matiz hacia רחם y que la elección del Piel de חנן apunta a beneficencia graciosa. En español, 'misericordioso/a' y 'compadecerse' pertenecen sin ambigüedad al campo de רחם. Para preservar la distinción lexical hebraica, 'muestra gracia a' mantiene la conexión con חנן y el ámbito semántico de la gracia/favor, en consonancia con el valor por defecto del proyecto para χάρις/gracia. La tensión queda documentada en la decisión léxica.
  doctrine_reference: Lexema חנן (HALOT 336); distinción חנן / רחם en literatura sapiencial; decisión léxica POB inglés sobre וּמְחוֹנֵן
translation_notes:
  revision_awareness: 'El registro inglés del POB no registra revisiones aplicadas (applied_revisions: []). La pasada de revisión más reciente (modelo gpt-5.4, 2026-04-23) determinó que no se necesitaban cambios, y la verificación cruzada independiente muestra acuerdo pleno (1.0). El borrador español sigue este texto estable y bien auditado sin necesidad de apartarse de sus decisiones principales. La única divergencia española significativa respecto al inglés es el uso de «muestra gracia a» (en lugar de una expresión de compasión) y «dichoso» (en lugar de «bienaventurado»), ambas justificadas por el registro sapiencial del español moderno y documentadas en las decisiones léxicas y teológicas.'
  spanish_consistency_notes:
  - «Prójimo» para רֵעַ en contextos éticos y sapienciales sigue la resonancia bíblica establecida en el español hispanohablante (Lv 19:18, etc.) sin resultar arcaico.
  - «Dichoso» para אַשְׁרֵי sigue la convención de las traducciones contemporáneas en español (NVI, NTV) y es preferible a «bienaventurado» (arcaico) o «feliz» (demasiado emocional/subjetivo); la nota al pie preserva la distinción teológica.
  - «Muestra gracia a» para וּמְחוֹנֵן preserva la conexión con el campo semántico de חנן/gracia, en coherencia con el valor por defecto del proyecto («gracia» para χάρις/חנן) y con la decisión del POB inglés de distinguir de רחם-compasión.
  - «Menosprecia» para בָּז se prefiere sobre «desprecia» para capturar el matiz de desvalorización activa del participio hebreo.
  - «Los pobres» para עניים es coherente con el enfoque del POB de priorizar la dimensión socioeconómica concreta cuando el contexto del proverbio así lo indica.
