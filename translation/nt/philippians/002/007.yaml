id: PHP.2.7
reference: Philippians 2:7
source:
  edition: SBLGNT
  text: ἀλλὰ ἑαυτὸν ἐκένωσεν μορφὴν δούλου λαβών, ἐν ὁμοιώματι ἀνθρώπων γενόμενος·
    καὶ σχήματι εὑρεθεὶς ὡς ἄνθρωπος
translation:
  text: but emptied himself, taking the form of a slave, being born in human likeness;
    and being found in human form
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "made himself nothing."
    reason: lexical_alternative
  - marker: b
    text: Or "the form of a servant."
    reason: lexical_alternative
  - marker: c
    text: "Greek: γενόμενος ἐν ὁμοιώματι ἀνθρώπων — lit. \"coming to be in the likeness\
      \ of humans.\" \"Being born\" captures the genesis sense without importing anything\
      \ the text does not say; \"likeness\" preserves the Greek ὁμοίωμα and should\
      \ not be read as denying his true humanity."
    reason: cross_reference
  - marker: d
    text: Or "as a human being" / "as a man"; the Greek singular ἄνθρωπος is generic
      (not gender-specific).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  rationale: Marks a strong contrast with the preceding clause; 'but' is the most
    natural concise English adversative here.
- source_word: ἑαυτὸν
  chosen: himself
  alternatives:
  - himself personally
  rationale: Reflexive object of ἐκένωσεν; standard English reflexive is sufficient
    and clear.
- source_word: ἐκένωσεν
  chosen: emptied himself
  alternatives:
  - made himself nothing
  - poured himself out
  lexicon: BDAG
  rationale: The verb κενόω is most directly rendered 'empty.' This preserves the
    Greek metaphor and avoids importing a fuller theological explanation into the
    translation. The following participles explain the manner of this self-emptying.
- source_word: μορφὴν
  chosen: form
  alternatives:
  - nature
  - status
  lexicon: BDAG
  rationale: '''Form'' keeps the lexical correspondence with μορφή in the surrounding
    context and preserves the deliberate parallelism without over-resolving its metaphysical
    nuance.'
- source_word: δούλου
  chosen: slave
  alternatives:
  - servant
  - bondservant
  lexicon: BDAG
  rationale: Per the doctrine guidance, δοῦλος should be rendered 'slave' where bonded
    status is salient. In this humiliation context, 'slave' best preserves the force
    of the contrast.
- source_word: λαβών
  chosen: taking
  alternatives:
  - having taken
  rationale: Aorist participle expressing means or manner; 'taking' reads naturally
    in English and preserves the participial linkage.
- source_word: γενόμενος ἐν ὁμοιώματι ἀνθρώπων
  chosen: being born in human likeness
  alternatives:
  - becoming in the likeness of human beings
  - coming to be in human likeness
  - being made in the likeness of men
  lexicon: BDAG
  rationale: γίνομαι with the preposition phrase here means "coming into existence
    in" — a birth or genesis sense common in incarnation contexts. Rendered as
    "becoming in the likeness of..." the English parses awkwardly because "becoming"
    rarely takes a prepositional-phrase complement in natural English. "Being born
    in human likeness" preserves the γίνομαι/birth sense while reading cleanly and
    retaining ὁμοίωμα as "likeness." The plural generic ἀνθρώπων is rendered
    inclusively as "human" (functioning adjectivally).
- source_word: σχήματι εὑρεθεὶς ὡς ἄνθρωπος
  chosen: being found in human form
  alternatives:
  - being found in appearance as a man
  - being found in outward form as a human
  - in his outward bearing, he was recognized as human
  lexicon: BDAG
  rationale: σχῆμα here denotes the visible outward mode or form (distinct from
    μορφή earlier). "Human form" preserves the external-mode sense while staying
    parallel in register to "human likeness" just above. "As a man" (the earlier
    GPT-5.4 draft) reads naturally in English but shifts register by inserting the
    singular indefinite article Paul does not have, and introduces a gender-specific
    English word where the Greek ἄνθρωπος is generic. The traditional rendering is
    preserved in a footnote.
