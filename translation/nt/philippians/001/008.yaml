  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: The project's default is to translate Χριστός as 'Messiah' where title
    sense is still active. Although 'Christ Jesus' is traditional and name-like in
    Paul, the titular force remains sufficiently present here to favor 'Messiah Jesus,'
    while preserving the traditional alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
