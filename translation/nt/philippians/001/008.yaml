id: PHP.1.8
reference: Philippians 1:8
source:
  edition: SBLGNT
  text: μάρτυς γάρ ⸀μου ὁ θεός, ὡς ἐπιποθῶ πάντας ὑμᾶς ἐν σπλάγχνοις ⸂Χριστοῦ Ἰησοῦ⸃.
translation:
  text: For God is my witness, how I long for all of you with the affections of Messiah
    Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "Christ Jesus."'
    reason: alternative_reading
  - marker: b
    text: 'Or: "with the compassion of Messiah Jesus."'
    reason: lexical_alternative
lexical_decisions:
- source_word: μάρτυς
  chosen: witness
  alternatives:
  - testimony bearer
  - witnessing one
  lexicon: BDAG
  rationale: In the idiom 'God is my witness,' 'witness' is the natural and transparent
    English equivalent, preserving the solemn appeal to God as guarantor of Paul's
    sincerity.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: '''For'' best preserves the connective force linking this verse to the
    preceding expression of affection and prayer.'
- source_word: ὡς
  chosen: how
  alternatives:
  - that
  - as
  lexicon: BDAG
  rationale: 'Here ὡς introduces the content/intensity of Paul''s appeal to God: not
    merely that he longs for them, but how deeply he does so. ''How'' captures that
    force in idiomatic English.'
- source_word: ἐπιποθῶ
  chosen: long for
  alternatives:
  - yearn for
  - deeply desire
  lexicon: BDAG
  rationale: '''Long for'' is natural modern English and conveys strong personal yearning
    without sounding overstated or archaic.'
- source_word: πάντας ὑμᾶς
  chosen: all of you
  alternatives:
  - you all
  - every one of you
  lexicon: BDAG
  rationale: This preserves the distributive emphasis of πάντας while remaining natural
    in contemporary English.
- source_word: σπλάγχνοις
  chosen: affections
  alternatives:
  - compassion
  - tender mercies
  - inward parts
  lexicon: BDAG
  rationale: Literally referring to the inner organs as the seat of deep feeling,
    the term is idiomatically best rendered here as 'affections.' It preserves emotional
    depth without wooden literalism.
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is rendered 'Messiah' where functioning
    as a title rather than a fixed name-like form. In this phrase the titular sense
    remains intelligible, so 'Messiah Jesus' preserves the meaning of the Greek.
