id: PHP.4.2
reference: Philippians 4:2
source:
  edition: SBLGNT
  text: Εὐοδίαν παρακαλῶ καὶ Συντύχην παρακαλῶ τὸ αὐτὸ φρονεῖν ἐν κυρίῳ.
translation:
  text: I urge Euodia[a], and I urge Syntyche, to think the same way in the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "to be of the same mind in the Lord"; also possibly "to agree in the Lord."
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐοδίαν
  chosen: Euodia
  alternatives:
  - Euodias
  rationale: Rendered as the standard English transliteration of the personal name, following the policy to transliterate names rather than translate them.
- source_word: παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal to
  - I exhort
  lexicon: BDAG
  rationale: '"I urge" preserves the personal, earnest force of παρακαλέω in this context without sounding overly formal. The repetition is kept in English because Paul repeats the verb for each woman.'
- source_word: Συντύχην
  chosen: Syntyche
  rationale: Rendered as the standard English transliteration of the personal name, following the policy to transliterate names rather than translate them.
- source_word: τὸ αὐτὸ φρονεῖν
  chosen: to think the same way
  alternatives:
  - to be of the same mind
  - to have the same mindset
  - to agree
  lexicon: BDAG
  rationale: This phrase combines sameness (τὸ αὐτό) with a mindset-oriented verb (φρονέω). "To think the same way" keeps the cognitive and attitudinal sense while remaining natural modern English. "Agree" is possible but is narrower and loses the explicit mental-dispositional nuance.
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - in union with the Lord
  lexicon: BDAG
  rationale: κύριος is rendered "Lord" per the doctrine's default for Kyrios. The phrase is kept fairly literal because it signals that the requested unity is grounded in relationship to the Lord, not merely personal reconciliation.
