theological_decisions:
- issue: How to render κατατομήν in relation to the circumcision language of the surrounding context
  chosen_reading: Translate it as the polemical term 'the mutilation' rather than soften it to a neutral reference to circumcision.
  alternative_readings:
  - the mutilators
  - the false circumcision
  rationale: Paul deliberately uses a derogatory counter-term, not the ordinary word for circumcision. The English should preserve that theological and rhetorical sting while avoiding interpretive expansion beyond the noun actually used.
