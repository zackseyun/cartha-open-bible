id: PHP.3.18
reference: Philippians 3:18
source:
  edition: SBLGNT
  text: πολλοὶ γὰρ περιπατοῦσιν οὓς πολλάκις ἔλεγον ὑμῖν, νῦν δὲ καὶ κλαίων λέγω, τοὺς ἐχθροὺς τοῦ σταυροῦ τοῦ Χριστοῦ,
translation:
  text: For many walk[a], whom I often told you about, and now even weeping I say, are enemies of the cross of Messiah,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the cross of Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: The adjective functions substantivally and straightforwardly denotes a plurality without further nuance; 'many' is the natural English equivalent.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: This conjunction grounds the preceding exhortation, and 'for' preserves that explanatory force most directly.
- source_word: περιπατοῦσιν
  chosen: walk
  alternatives:
  - live
  - conduct themselves
  lexicon: BDAG
  rationale: Paul regularly uses περιπατέω metaphorically for one's manner of life. 'Walk' preserves the source metaphor and remains intelligible in biblical English; 'as enemies' supplies the appositional force required in clear English.
- source_word: πολλάκις ἔλεγον ὑμῖν
  chosen: I often told you
  alternatives:
  - I used to tell you repeatedly
  - I told you many times
  lexicon: BDAG
  rationale: The imperfect ἔλεγον with πολλάκις conveys repeated past action. 'I often told you' is concise and natural while preserving the iterative sense.
- source_word: νῦν δὲ καὶ κλαίων λέγω
  chosen: now I tell you even with tears
  alternatives:
  - now I say, even weeping
  - now I tell you, weeping
  lexicon: BDAG
  rationale: κλαίων is a present participle modifying Paul as he speaks. 'With tears' renders the emotional force idiomatically in English without losing the immediacy of the participle.
- source_word: ἐχθροὺς
  chosen: enemies
  alternatives:
  - hostile ones
  - opponents
  lexicon: BDAG
  rationale: The noun denotes those opposed to something. 'Enemies' is the standard and strongest fit in this context.
- source_word: σταυροῦ
  chosen: cross
  lexicon: BDAG
  rationale: σταυρός here refers to the cruciform death and its theological significance, and 'cross' is the established direct rendering.
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Per project doctrine, Χριστός is rendered ''Messiah'' where it functions as a title. Here the genitive naturally reads as titular: ''the cross of the Messiah.'''
