id: REV.2.12
reference: Revelation 2:12
source:
  edition: SBLGNT
  text: Καὶ τῷ ἀγγέλῳ τῆς ἐν Περγάμῳ ἐκκλησίας γράψον· Τάδε λέγει ὁ ἔχων τὴν ῥομφαίαν τὴν δίστομον τὴν ὀξεῖαν·
translation:
  text: 'And to the angel of the church in Pergamum write: These things says the one who has the sharp, double-edged sword:[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'messenger' for 'angel.' Interpreters differ on whether the referent is a heavenly being or a human representative of the church.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγγέλῳ
  chosen: angel
  alternatives:
  - messenger
  lexicon: BDAG
  rationale: The noun can mean either a heavenly angel or a human messenger. In Revelation's address formula to the seven churches, 'angel' is the established and most natural reading, preserving the ambiguity of the referent without reducing it to a merely human courier. The alternative is worth preserving because interpreters dispute whether these are heavenly representatives or church leaders.
- source_word: ἐκκλησίας
  chosen: church
  alternatives:
  - assembly
  lexicon: BDAG
  rationale: In Revelation's Christian context, ἐκκλησία refers to the gathered Christian community. 'Church' is the clearest natural English equivalent here, while 'assembly' is possible but less idiomatic in this epistolary address.
- source_word: γράψον
  chosen: write
  alternatives:
  - write this
  lexicon: BDAG
  rationale: Aorist imperative of γράφω, straightforwardly rendered 'write.' English does not require an explicit object because the following quotation supplies the content.
- source_word: Τάδε
  chosen: These things
  alternatives:
  - This is what
  - Thus
  lexicon: BDAG
  rationale: The expression introduces a formal prophetic or royal declaration. 'These things' is somewhat more formal and closer to the Greek than the smoother idiom 'This is what.' Retaining it also matches the repeated formula in Revelation 2–3.
- source_word: ὁ ἔχων
  chosen: the one who has
  alternatives:
  - he who has
  - the one holding
  lexicon: BDAG
  rationale: The articular participle is well represented by 'the one who has.' This is readable modern English and preserves the descriptive title-like force.
- source_word: ῥομφαίαν
  chosen: sword
  alternatives:
  - large sword
  - broadsword
  lexicon: BDAG
  rationale: ῥομφαία denotes a sword, often a large or heavy one, but English 'sword' is sufficient here because the following modifiers carry the vividness. More specific renderings like 'broadsword' risk over-specification.
- source_word: δίστομον
  chosen: double-edged
  alternatives:
  - two-edged
  lexicon: BDAG
  rationale: The adjective literally means 'two-mouthed,' idiomatically 'double-edged' or 'two-edged.' 'Double-edged' is standard modern English.
- source_word: ὀξεῖαν
  chosen: sharp
  alternatives:
  - keen
  lexicon: BDAG
  rationale: ὀξύς here describes the sword as sharp. 'Sharp' is the plain and natural equivalent.
- source_word: Περγάμῳ
  chosen: Pergamum
  alternatives:
  - Pergamos
  lexicon: BDAG
  rationale: Pergamum is the standard modern English transliteration of Πέργαμος in this case form. 'Pergamos' reflects older tradition but is less standard in contemporary English.
