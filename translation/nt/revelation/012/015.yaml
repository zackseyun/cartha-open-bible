theological_decisions:
- issue: Symbolic/apocalyptic imagery of the serpent's attack
  chosen_reading: Retain the imagery literally as 'water like a river' and 'sweep
    her away with the flood' without decoding the symbol in translation.
  alternative_readings:
  - Interpret the water directly as armies, persecution, lies, or chaos in the main
    text
  rationale: The verse is apocalyptic and symbolic, but the translation should preserve
    the source imagery rather than embed one interpretive scheme into the English
    wording.
  doctrine_reference: Translation philosophy items 1 and 3
