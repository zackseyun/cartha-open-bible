id: REV.12.15
reference: Revelation 12:15
source:
  edition: SBLGNT
  text: καὶ ἔβαλεν ὁ ὄφις ἐκ τοῦ στόματος αὐτοῦ ὀπίσω τῆς γυναικὸς ὕδωρ ὡς ποταμόν,
    ἵνα αὐτὴν ποταμοφόρητον ποιήσῃ.
translation:
  text: And the serpent hurled water like a river out of his mouth after the woman,
    so that he might cause her to be swept away by the river.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'behind the woman.' The Greek can be read spatially or as pursuit; here
      it is rendered 'after the woman' to fit the attack imagery.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'that he might make her river-carried.' The expression means
      to cause her to be swept away by the torrent.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔβαλεν
  chosen: hurled
  alternatives:
  - threw
  - cast
  lexicon: BDAG
  rationale: βάλλω commonly means 'throw/cast.' 'Hurled' conveys force appropriate
    to the dragon/serpent's hostile action in this apocalyptic scene better than the
    flatter 'threw.'
- source_word: ὁ ὄφις
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: BDAG
  rationale: ὄφις is literally 'serpent/snake.' 'Serpent' better preserves the biblical
    and symbolic resonance of the figure in Revelation.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  chosen: out of his mouth
  alternatives:
  - from his mouth
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase; 'out of' is
    idiomatic and vivid in English.
- source_word: ὀπίσω τῆς γυναικός
  chosen: after the woman
  alternatives:
  - behind the woman
  lexicon: BDAG
  rationale: ὀπίσω with the genitive can mean spatially 'behind' or directionally
    'after.' In context of pursuit/attack, 'after the woman' best captures hostile
    movement directed toward her.
- source_word: ὕδωρ ὡς ποταμόν
  chosen: water like a river
  alternatives:
  - water as a river
  - water like a flood
  lexicon: BDAG
  rationale: This preserves the simile introduced by ὡς and keeps ποταμός as 'river.'
    'Flood' is possible interpretively, but the Greek image is explicitly river-like
    water.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is natural modern English while
    preserving the clause's purposive force.
- source_word: ποταμοφόρητον ποιήσῃ
  chosen: he might sweep her away with the flood
  alternatives:
  - he might cause her to be river-carried away
  - he might make her be swept away by the river
  - he might drown her in the flood
  lexicon: BDAG
  rationale: 'ποταμοφόρητος is rare and literally means something like ''carried off
    by a river/stream.'' Combined with ποιέω, the sense is causative: to cause her
    to be swept away by the torrent. ''Sweep her away with the flood'' is idiomatic
    English that preserves the violent image without over-paraphrasing. ''Drown''
    is too specific, since the Greek emphasizes being carried off rather than explicitly
    killed by submersion.'
