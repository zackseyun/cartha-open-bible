theological_decisions:
- issue: Referent of the singular verb ἴσχυσεν
  chosen_reading: The subject is singular ('he'), referring to the dragon from the previous verse, while αὐτῶν ('them') refers to the dragon and his angels collectively.
  alternative_readings:
  - 'Impersonal/collective rendering: ''they were not strong enough'''
  rationale: Greek uses a singular verb followed by a plural pronoun because the singular subject from v. 7 (the dragon) is still in view, then the group is referenced collectively in the second clause. Rendering the first clause with singular preserves the grammar and discourse flow more closely than flattening both clauses into a plural.
