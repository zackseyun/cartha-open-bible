theological_decisions:
- issue: Rendering the dragon's color descriptor πυρρός
  chosen_reading: fiery-red
  alternative_readings:
  - red
  rationale: The term denotes a flame-like red. The chosen rendering preserves the vividness of the Greek without adding interpretation beyond the lexical sense.
  doctrine_reference: Translation philosophy §1, §6
- issue: Pronoun for αὐτοῦ referring to δράκων
  chosen_reading: his heads
  alternative_readings:
  - its heads
  rationale: Because δράκων is grammatically masculine and the figure is later personally identified as the devil/Satan in the chapter, 'his' preserves the source's personal force better than impersonal 'its,' while not importing extra doctrine into the verse.
  doctrine_reference: Translation philosophy §4
