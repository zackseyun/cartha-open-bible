id: REV.12.3
reference: Revelation 12:3
source:
  edition: SBLGNT
  text: καὶ ὤφθη ἄλλο σημεῖον ἐν τῷ οὐρανῷ, καὶ ἰδοὺ δράκων ⸂μέγας πυρρός⸃, ἔχων κεφαλὰς ἑπτὰ καὶ κέρατα δέκα καὶ ἐπὶ τὰς κεφαλὰς αὐτοῦ ἑπτὰ διαδήματα,
translation:
  text: And another sign appeared in heaven[a], and behold, a great red dragon, having seven heads and ten horns, and on his heads seven diadems[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply "red dragon." The Greek πυρρός denotes a flame-like or fiery red color.
    reason: lexical_alternative
  - marker: b
    text: Or "crowns." More specifically, the Greek says "diadems," a royal headband distinct from a victor's wreath.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  lexicon: BDAG
  rationale: Aorist passive of ὁράω here functions idiomatically as 'appeared' in visionary narrative. 'Was seen' is more formally literal but less natural in English.
- source_word: ἄλλο σημεῖον
  chosen: another sign
  alternatives:
  - another portent
  lexicon: BDAG
  rationale: σημεῖον in Revelation commonly denotes a symbolic visionary sign. 'Sign' is the standard and clearest rendering; 'portent' is possible but less natural for modern readers.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven,' but in Revelation's apocalyptic-vision context 'heaven' best preserves the cosmic and theological setting.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to the vision. 'Behold' preserves the elevated, sudden force appropriate to apocalyptic narrative better than the more colloquial 'look' or 'see.'
- source_word: δράκων
  chosen: dragon
  alternatives:
  - serpent-monster
  lexicon: BDAG
  rationale: δράκων straightforwardly denotes a dragon/serpentine monster. 'Dragon' is the established and accurate English equivalent.
- source_word: μέγας
  chosen: great
  alternatives:
  - large
  lexicon: BDAG
  rationale: μέγας can denote size or greatness. With δράκων in this vivid vision, 'great' preserves both magnitude and ominous grandeur better than merely 'large.'
- source_word: πυρρός
  chosen: fiery-red
  alternatives:
  - red
  - flame-colored
  lexicon: BDAG
  rationale: πυρρός denotes a flame-like red color. 'Fiery-red' captures the lexical connection to fire more fully than plain 'red' while remaining readable.
- source_word: ἔχων
  chosen: having
  alternatives:
  - with
  lexicon: BDAG
  rationale: The present participle is retained as 'having' to preserve the descriptive flow of the Greek rather than smoothing it into a prepositional phrase.
- source_word: κεφαλὰς ἑπτὰ
  chosen: seven heads
  lexicon: BDAG
  rationale: Direct, literal rendering of the accusative object phrase.
- source_word: κέρατα δέκα
  chosen: ten horns
  lexicon: BDAG
  rationale: Direct, literal rendering. 'Horns' should be preserved rather than interpreted symbolically in translation.
- source_word: ἐπὶ τὰς κεφαλὰς αὐτοῦ
  chosen: on his heads
  alternatives:
  - upon its heads
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates position 'on/upon.' The possessive αὐτοῦ may be rendered 'his' for the grammatically masculine δράκων; 'its' is possible in English for an animal/creature, but 'his' better reflects the personal, later-identified adversarial figure in the passage.
- source_word: διαδήματα
  chosen: diadems
  alternatives:
  - crowns
  lexicon: BDAG
  rationale: διάδημα refers specifically to royal headbands/diadems, not the more general στέφανος. 'Diadems' preserves the lexical distinction important in Revelation.
