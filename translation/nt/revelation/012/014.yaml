theological_decisions:
- issue: Whether to interpret the symbolic period 'a time and times and half a time'
    as a specific chronological equivalent in the main text
  chosen_reading: Preserve the idiom untranslated as 'a time and times and half a
    time'
  alternative_readings:
  - three and a half years
  - a symbolic limited period
  rationale: The verse uses established apocalyptic language with Danielic resonance.
    Translating it into an interpreted chronological value in the main text would
    resolve an interpretive question the Greek itself leaves in symbolic form. Preserving
    the idiom best maintains theological tension and intertextual texture.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Whether to import explicit Exodus imagery into the main text
  chosen_reading: Retain 'the great eagle' without explanatory expansion
  alternative_readings:
  - the great eagle, echoing God's deliverance imagery
  rationale: The wording likely evokes Exodus 19:4 and Deuteronomy 32:11, but the
    verse itself does not explicitly identify the eagle symbol. The translation should
    preserve the allusion without embedding interpretation into the text.
  doctrine_reference: Translation philosophy §1 and §3
