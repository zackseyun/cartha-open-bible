id: REV.12.14
reference: Revelation 12:14
source:
  edition: SBLGNT
  text: καὶ ἐδόθησαν τῇ γυναικὶ ⸀αἱ δύο πτέρυγες τοῦ ἀετοῦ τοῦ μεγάλου, ἵνα πέτηται
    εἰς τὴν ἔρημον εἰς τὸν τόπον αὐτῆς, ⸂ὅπου τρέφεται⸃ ἐκεῖ καιρὸν καὶ καιροὺς καὶ
    ἥμισυ καιροῦ ἀπὸ προσώπου τοῦ ὄφεως.
translation:
  text: And the woman was given the two wings of the great eagle, so that she might
    fly into the wilderness to her place, where she is nourished there for a time
    and times and half a time, away from the presence of the serpent.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less commonly, 'the great vulture.' The Greek word can refer more broadly
      to a large bird of prey, though 'eagle' is the standard rendering here.
    reason: lexical_alternative
  - marker: b
    text: The expression 'a time and times and half a time' echoes Danielic apocalyptic
      language; many understand it as three and a half years, while others take it
      more broadly as a symbolically limited period.
    reason: cross_reference
lexical_decisions:
- source_word: ἐδόθησαν
  chosen: was given
  alternatives:
  - were given
  lexicon: BDAG
  rationale: 'The Greek verb is plural (''were given''), agreeing with ''the two wings,''
    but idiomatic English commonly fronts the recipient and uses singular passive:
    ''the woman was given...'' This preserves the sense without awkwardness.'
- source_word: πτέρυγες
  chosen: wings
  lexicon: BDAG
  rationale: Straightforward lexical rendering of the noun for wings.
- source_word: τοῦ ἀετοῦ τοῦ μεγάλου
  chosen: of the great eagle
  alternatives:
  - of the great vulture
  lexicon: BDAG
  rationale: ἀετός can denote eagle and in some contexts a vulture/raptor, but 'eagle'
    is the standard and best-established rendering here, especially given the likely
    echo of OT imagery of deliverance on eagle's wings.
- source_word: ἵνα πέτηται
  chosen: so that she might fly
  alternatives:
  - that she might fly
  - so that she could fly
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses purpose. 'So that she might fly' preserves
    the purposive force in natural English.
- source_word: ἔρημον
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: BDAG
  rationale: ἔρημος can mean desert or wilderness. 'Wilderness' better fits biblical
    usage and the broader scriptural motif of refuge/provision in a desolate place.
- source_word: εἰς τὸν τόπον αὐτῆς
  chosen: to her place
  alternatives:
  - to the place prepared for her
  - to her own place
  lexicon: BDAG
  rationale: The text here simply says 'to her place.' 'Prepared for her' would import
    wording from 12:6, so it is not supplied in the main text.
- source_word: ὅπου τρέφεται
  chosen: where she is nourished
  alternatives:
  - where she is fed
  - where she is sustained
  lexicon: BDAG
  rationale: The passive present indicates ongoing provision. 'Nourished' conveys
    sustained care and provision in a dignified register.
- source_word: καιρὸν καὶ καιροὺς καὶ ἥμισυ καιροῦ
  chosen: for a time and times and half a time
  alternatives:
  - for a time, times, and half a time
  lexicon: BDAG
  rationale: This apocalyptic idiom is best preserved rather than interpreted in the
    main text. The repeated 'and' reflects the Greek closely and retains intertextual
    resonance with Danielic language.
- source_word: ἀπὸ προσώπου τοῦ ὄφεως
  chosen: away from the presence of the serpent
  alternatives:
  - from the face of the serpent
  - away from the serpent
  lexicon: BDAG
  rationale: πρόσωπον literally means 'face' or 'presence.' 'Away from the presence
    of the serpent' preserves the concrete Greek while reading naturally enough in
    English; reducing it to simply 'from the serpent' would lose nuance.
- source_word: ὄφεως
  chosen: the serpent
  alternatives:
  - the snake
  lexicon: BDAG
  rationale: Given the established symbolic identification in the chapter, 'serpent'
    preserves the biblical-theological resonance better than the more ordinary 'snake'.
- source_word: ἐκεῖ
  chosen: there
  lexicon: BDAG
  rationale: Retained explicitly because the Greek includes it. Though somewhat redundant
    in English after 'where,' it contributes emphasis and should not be omitted without
    cause.
