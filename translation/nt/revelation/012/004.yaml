theological_decisions:
- issue: Aspect and tense variation in the opening clause
  chosen_reading: Retain the vivid shift from present ('sweeps away') to past ('threw') in English.
  alternative_readings:
  - 'Regularize both verbs into past tense: ''swept away ... threw'''
  - Regularize both into historical present
  rationale: John's apocalyptic narration often uses vivid tense variation. Preserving it reflects the Greek discourse texture without forcing a smoother but less transparent English sequence.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referent of 'stars of heaven'
  chosen_reading: Translate literally without interpreting the stars as angels in the main text.
  alternative_readings:
  - Interpretively render as 'angels'
  rationale: The imagery may allude to angelic beings, but the Greek says 'stars.' The translation preserves the symbol and does not import an interpretation into the text.
  doctrine_reference: Translation philosophy §1, §3
