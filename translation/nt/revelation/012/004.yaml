id: REV.12.4
reference: Revelation 12:4
source:
  edition: SBLGNT
  text: καὶ ἡ οὐρὰ αὐτοῦ σύρει τὸ τρίτον τῶν ἀστέρων τοῦ οὐρανοῦ, καὶ ἔβαλεν αὐτοὺς εἰς τὴν γῆν. καὶ ὁ δράκων ἕστηκεν ἐνώπιον τῆς γυναικὸς τῆς μελλούσης τεκεῖν, ἵνα ὅταν τέκῃ τὸ τέκνον αὐτῆς καταφάγῃ.
translation:
  text: And his tail sweeps away a third of the stars of heaven and throws them to the earth[a]. And the dragon stood before the woman who was about to give birth, so that when she gave birth[c][b], he might devour her child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drags'; the Greek verb can denote pulling or dragging, though here the image may suggest a sweeping motion with the tail.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'stars of heaven' is kept as written; many interpreters understand the stars symbolically, possibly as angels, but the Greek text itself does not state that explicitly.
    reason: alternative_reading
  - marker: c
    text: Or 'has taken his stand before'; the Greek perfect verb emphasizes the dragon's fixed stance.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύρει
  chosen: sweeps away
  alternatives:
  - drags
  - sweeps
  lexicon: BDAG
  rationale: Present tense is retained vividly in English. The verb can mean drag or pull, but in this apocalyptic image 'sweeps away' captures the forceful motion of the tail across the stars without over-literal stiffness.
- source_word: τὸ τρίτον τῶν ἀστέρων τοῦ οὐρανοῦ
  chosen: a third of the stars of heaven
  alternatives:
  - the third part of the stars of heaven
  - a third of the heavenly stars
  lexicon: BDAG
  rationale: Rendered quantitatively and idiomatically. 'Of heaven' closely reflects the genitive τοῦ οὐρανοῦ and preserves the elevated apocalyptic diction.
- source_word: ἔβαλεν
  chosen: threw
  alternatives:
  - cast
  - flung
  lexicon: BDAG
  rationale: Aorist is rendered as simple past. 'Threw' is clear modern English; 'cast' is traditional but more archaic in ordinary usage.
- source_word: γῆν
  chosen: the earth
  alternatives:
  - the land
  lexicon: BDAG
  rationale: In Revelation's cosmic scene, γῆ refers to the earth rather than a local land.
- source_word: δράκων
  chosen: dragon
  alternatives:
  - serpent-monster
  lexicon: BDAG
  rationale: Standard and direct rendering of δράκων in apocalyptic context; also maintains intertextual consistency within Revelation.
- source_word: ἕστηκεν
  chosen: stood
  alternatives:
  - has taken his stand
  - was standing
  lexicon: BDAG
  rationale: Perfect form conveys a standing posture already assumed. 'Stood' is concise and natural; the durative/resultative nuance is contextually carried by the scene.
- source_word: ἐνώπιον
  chosen: before
  alternatives:
  - in front of
  - in the presence of
  lexicon: BDAG
  rationale: '''Before'' is the most natural English preposition here and preserves the confrontational spatial sense.'
- source_word: τῆς μελλούσης τεκεῖν
  chosen: who was about to give birth
  alternatives:
  - who was going to bear a child
  - who was about to bear
  lexicon: BDAG
  rationale: μέλλω with infinitive indicates imminence. 'Give birth' is idiomatic modern English for τίκτω in this context.
- source_word: ἵνα ὅταν τέκῃ
  chosen: so that when she gave birth
  alternatives:
  - so that when she should give birth
  - in order that when she gives birth
  lexicon: BDAG
  rationale: The construction expresses purpose with a contingent future event. English smooths this as 'so that when she gave birth' in sequence with the main past narrative, while preserving the dragon's intent.
- source_word: τὸ τέκνον αὐτῆς
  chosen: her child
  alternatives:
  - her offspring
  - her baby
  lexicon: BDAG
  rationale: τέκνον is broadly 'child.' 'Her child' is faithful and avoids over-specifying age or reducing the solemnity of the scene.
- source_word: καταφάγῃ
  chosen: he might devour
  alternatives:
  - he might consume
  - he might eat up
  lexicon: BDAG
  rationale: The verb is vivid and violent. 'Devour' best conveys the predatory force in natural English.
