theological_decisions:
- issue: Meaning of victory through 'the blood of the Lamb'
  chosen_reading: Rendered instrumentally as the means by which they conquered, without
    expanding into a doctrinal explanation beyond the text.
  alternative_readings:
  - Rendered causally as 'because of the blood of the Lamb'
  rationale: The verse clearly grounds the saints' victory in the Lamb's sacrificial
    blood, but the translation should not import a fuller atonement formula not explicitly
    stated here. The instrumental English best matches the immediate syntax and context.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Rendering ψυχή in a martyrdom context
  chosen_reading: Translated as 'life' rather than 'soul.'
  alternative_readings:
  - their soul
  rationale: This avoids implying a body-soul contrast not demanded by the verse.
    The context is willingness to die, so 'life' is the most contextually accurate
    and preserves theological tension without over-specification.
  doctrine_reference: Translation philosophy §§1, 3
