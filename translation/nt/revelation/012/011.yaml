id: REV.12.11
reference: Revelation 12:11
source:
  edition: SBLGNT
  text: καὶ αὐτοὶ ἐνίκησαν αὐτὸν διὰ τὸ αἷμα τοῦ ἀρνίου καὶ διὰ τὸν λόγον τῆς μαρτυρίας
    αὐτῶν, καὶ οὐκ ἠγάπησαν τὴν ψυχὴν αὐτῶν ἄχρι θανάτου·
translation:
  text: And they conquered him by the blood of the Lamb and by the word of their testimony,
    and they did not love their life even unto death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'overcame him.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their soul'; Greek psychē can mean 'life,' 'self,' or 'soul.' Here the
      sense is their life even in the face of death.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνίκησαν
  chosen: conquered
  alternatives:
  - overcame
  - were victorious over
  lexicon: BDAG
  rationale: Aorist active indicative, 'to conquer/overcome.' 'Conquered' is vivid
    and idiomatic in Revelation, preserving the conflict imagery without sounding
    archaic. 'Overcame' is a strong traditional alternative.
- source_word: διὰ τὸ αἷμα
  chosen: by the blood
  alternatives:
  - because of the blood
  - through the blood
  lexicon: BDAG
  rationale: 'διά with the accusative can express reason or means. Here ''by the blood''
    preserves the instrumental sense in context: their victory is effected through
    the Lamb''s sacrificial death.'
- source_word: ἀρνίου
  chosen: the Lamb
  lexicon: BDAG
  rationale: In Revelation ἀρνίον is a christological title. 'The Lamb' preserves
    the established apocalyptic and sacrificial imagery and clearly refers to Jesus.
- source_word: λόγον τῆς μαρτυρίας αὐτῶν
  chosen: the word of their testimony
  alternatives:
  - the message of their testimony
  - their testimony
  lexicon: BDAG
  rationale: A relatively formal rendering preserves both λόγος and μαρτυρία. 'Word'
    here can mean message or spoken witness; retaining 'word' keeps closer contact
    with the Greek while remaining understandable.
- source_word: μαρτυρίας
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: Both are possible. 'Testimony' fits the phrase 'word of their testimony'
    naturally in English and preserves the legal-witness nuance common in Johannine
    usage.
- source_word: οὐκ ἠγάπησαν
  chosen: did not love
  alternatives:
  - did not hold dear
  - did not cling to
  lexicon: BDAG
  rationale: The verb is the ordinary ἀγαπάω, and the translation should preserve
    the lexical connection to 'love' rather than paraphrase it away. More interpretive
    alternatives are possible but less transparent.
- source_word: τὴν ψυχὴν αὐτῶν
  chosen: their life
  alternatives:
  - their soul
  - their lives
  lexicon: BDAG
  rationale: ψυχή can mean life, self, or soul. In the martyrdom context with 'unto
    death,' 'life' best conveys the sense of one's earthly life being surrendered.
    Singular 'life' reflects the Greek singular used distributively.
- source_word: ἄχρι θανάτου
  chosen: even unto death
  alternatives:
  - to the point of death
  - until death
  lexicon: BDAG
  rationale: This phrase expresses the limit of their self-giving faithfulness. 'Even
    unto death' is natural, solemn, and preserves the force of enduring to the point
    of dying.
