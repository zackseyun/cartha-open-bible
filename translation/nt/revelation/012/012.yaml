id: REV.12.12
reference: Revelation 12:12
source:
  edition: SBLGNT
  text: διὰ τοῦτο εὐφραίνεσθε, ⸀οἱ οὐρανοὶ καὶ οἱ ἐν αὐτοῖς σκηνοῦντες. οὐαὶ ⸂τὴν
    γῆν καὶ τὴν θάλασσαν⸃, ὅτι κατέβη ὁ διάβολος πρὸς ὑμᾶς, ἔχων θυμὸν μέγαν, εἰδὼς
    ὅτι ὀλίγον καιρὸν ἔχει.
translation:
  text: Therefore rejoice, O heavens, and you who dwell in them. Woe to the earth
    and the sea, because the devil has come down to you with great fury, knowing that
    he has only a little time.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land and the sea.' The Greek γῆ can mean either 'earth' or 'land';
      here 'earth' is preferred because the context is cosmic in scope.
    reason: lexical_alternative
  - marker: b
    text: Or 'having great wrath.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'he has a little time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - For this reason
  - Because of this
  lexicon: BDAG
  rationale: Introduces an inference from the preceding heavenly victory scene. 'Therefore'
    is concise, natural English and preserves the logical connection.
- source_word: εὐφραίνεσθε
  chosen: rejoice
  alternatives:
  - be glad
  - celebrate
  lexicon: BDAG
  rationale: A present/middle-passive imperative calling for joyful response. 'Rejoice'
    preserves the imperative force and biblical register without sounding archaic.
- source_word: οἱ οὐρανοὶ
  chosen: O heavens
  alternatives:
  - heavens
  - you heavens
  lexicon: BDAG
  rationale: The nominative functions as a vocative in direct address. 'O heavens'
    clearly signals apostrophe and fits the elevated style of Revelation.
- source_word: οἱ ἐν αὐτοῖς σκηνοῦντες
  chosen: you who dwell in them
  alternatives:
  - those dwelling in them
  - those who tabernacle in them
  lexicon: BDAG
  rationale: σκηνόω literally relates to dwelling/tabernacling, but here the idiomatic
    sense is residence in heaven. 'You who dwell in them' matches the vocative force
    and remains readable; the more literal 'tabernacle' would sound opaque in English
    here.
- source_word: οὐαὶ
  chosen: Woe to
  alternatives:
  - Alas for
  - Woe upon
  lexicon: BDAG
  rationale: Standard prophetic/judgment formula. 'Woe to' is the clearest and most
    recognizable equivalent in English.
- source_word: τὴν γῆν καὶ τὴν θάλασσαν
  chosen: the earth and the sea
  alternatives:
  - the land and the sea
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In Revelation's cosmic scope, paired with
    'sea,' 'earth' best preserves the universal sense rather than a localized territory.
- source_word: κατέβη
  chosen: has come down
  alternatives:
  - came down
  - descended
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect to convey the recent
    completed action with present consequences in context. 'Descended' is more formal
    but less natural.
- source_word: ὁ διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: διάβολος is functioning as the established title for Satan in this context.
    'The devil' is the standard and clearest English rendering.
- source_word: πρὸς ὑμᾶς
  chosen: to you
  alternatives:
  - against you
  - toward you
  lexicon: BDAG
  rationale: πρός with accusative can indicate movement toward. In context of descent
    from heaven to the earthly realm, 'to you' best captures arrival rather than explicit
    hostility, which is already conveyed by the following phrase.
- source_word: ἔχων θυμὸν μέγαν
  chosen: with great fury
  alternatives:
  - having great wrath
  - with great anger
  lexicon: BDAG
  rationale: θυμός denotes intense anger/wrath. 'Great fury' is vivid, natural English
    and communicates the heightened emotional force without unnecessary archaism.
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - because he knows
  - since he knows
  lexicon: BDAG
  rationale: The participle is best rendered as a contemporaneous explanatory participle.
    'Knowing' preserves the Greek structure while remaining clear.
- source_word: ὀλίγον καιρὸν ἔχει
  chosen: he has only a little time
  alternatives:
  - his time is short
  - he has a short time
  lexicon: BDAG
  rationale: καιρός here is a limited period/opportune span rather than abstract time.
    'He has only a little time' closely follows the Greek wording and emphasizes the
    brevity of the remaining period.
