theological_decisions:
- issue: Referent of 'you' in 'the devil has come down to you'
  chosen_reading: The address shifts from the heavenly rejoicers to the earth and
    sea, so 'you' refers to the inhabitants of the earthly realm represented by 'the
    earth and the sea.'
  alternative_readings:
  - '''You'' continues to address the heavens and their inhabitants rhetorically'
  rationale: The immediate clause 'Woe to the earth and the sea, because the devil
    has come down to you' most naturally links πρὸς ὑμᾶς with the sphere just warned.
    This preserves the dramatic contrast between heaven's rejoicing and earth's peril
    without adding interpretive detail beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it beyond what
    the source warrants.
