theological_decisions:
- issue: Subject identification and textual form of the verb
  chosen_reading: Main text follows the third-person reading, yielding 'And he stood
    on the sand of the sea.'
  alternative_readings:
  - And I stood on the sand of the sea.
  rationale: The printed SBLGNT text reads ἐστάθη ('he stood'), which in context most
    naturally refers to the dragon from the preceding verse. Because a well-known
    textual variant reads ἐστάθην ('I stood'), the alternative should be preserved
    in a footnote rather than silently ignored.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; textual alternatives worth preserving should be footnoted.'
