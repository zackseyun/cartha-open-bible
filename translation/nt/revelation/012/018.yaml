id: REV.12.18
reference: Revelation 12:18
source:
  edition: SBLGNT
  text: καὶ ⸀ἐστάθη ἐπὶ τὴν ἄμμον τῆς θαλάσσης.
translation:
  text: And he stood on the sand of the sea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, “And I stood on the sand of the sea.”
    reason: textual_variant
lexical_decisions:
- source_word: καὶ
  chosen: And
  lexicon: BDAG
  rationale: Standard connective linking this clause to the preceding narrative; simple
    coordination is sufficient.
- source_word: ἐστάθη
  chosen: he stood
  alternatives:
  - I stood
  - it stood
  - he took his stand
  lexicon: BDAG
  rationale: Aorist passive-form of ἵστημι functioning intransitively ('stood'). The
    singular verb requires an explicit English subject. Given the immediate antecedent
    in context (the dragon in 12:17), 'he stood' is the most natural contextual rendering.
    An alternative textual tradition reads first person ('I stood'), which is worth
    preserving in a footnote.
- source_word: ἐπὶ
  chosen: 'on'
  alternatives:
  - upon
  - at
  lexicon: BDAG
  rationale: With the accusative here, ἐπί can denote position or movement toward.
    In idiomatic English with ἵστημι in this context, 'stood on' best conveys the
    resulting location.
- source_word: τὴν ἄμμον
  chosen: the sand
  alternatives:
  - the shore
  - the sandy shore
  lexicon: BDAG
  rationale: ἄμμος is literally 'sand.' Although 'shore' captures the setting, the
    Greek specifies the material rather than the broader location, so 'the sand' is
    preferred.
- source_word: τῆς θαλάσσης
  chosen: of the sea
  alternatives:
  - by the sea
  - of the seashore
  lexicon: BDAG
  rationale: Genitive construction modifying 'sand'; 'the sand of the sea' is formally
    close and intelligible in English, preserving the vivid imagery. 'By the sea'
    would smooth the phrase but loses the genitival specificity.
