id: REV.12.17
reference: Revelation 12:17
source:
  edition: SBLGNT
  text: καὶ ὠργίσθη ὁ δράκων ἐπὶ τῇ γυναικί, καὶ ἀπῆλθεν ποιῆσαι πόλεμον μετὰ τῶν λοιπῶν τοῦ σπέρματος αὐτῆς, τῶν τηρούντων τὰς ἐντολὰς τοῦ θεοῦ καὶ ἐχόντων τὴν μαρτυρίαν Ἰησοῦ·
translation:
  text: And the dragon became enraged with the woman[a], and went away to make war with the rest of her offspring, those who keep the commandments of God and hold to the testimony of Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the testimony about Jesus'; alternatively, 'Jesus’ testimony.' The Greek genitive can be understood in more than one way.
    reason: alternative_reading
lexical_decisions:
- source_word: ὠργίσθη
  chosen: became enraged
  alternatives:
  - was angry
  - became angry
  lexicon: BDAG
  rationale: Aorist passive/deponent of ὀργίζομαι denotes becoming angry; 'became enraged' conveys the intensified hostile reaction in apocalyptic context better than the flatter 'was angry' while remaining within the semantic range.
- source_word: δράκων
  chosen: dragon
  lexicon: BDAG
  rationale: Standard rendering for δράκων in Revelation; preserves the symbolic-apocalyptic imagery and matches the established referent in the chapter.
- source_word: γυναικί
  chosen: the woman
  lexicon: BDAG
  rationale: Direct, formal rendering of γυνή here. The article indicates the specific woman already introduced in context.
- source_word: ἀπῆλθεν
  chosen: went away
  alternatives:
  - went off
  - departed
  lexicon: BDAG
  rationale: ἀπέρχομαι commonly means 'go away/depart.' 'Went away' is natural modern English and preserves the narrative movement without overinterpreting.
- source_word: ποιῆσαι πόλεμον
  chosen: to make war
  alternatives:
  - to wage war
  lexicon: BDAG
  rationale: This infinitival construction is idiomatically rendered 'make war' or 'wage war.' 'Make war' stays closer to the Greek while remaining clear in English.
- source_word: μετὰ τῶν λοιπῶν
  chosen: with the rest
  alternatives:
  - against the rest
  - with the remainder
  lexicon: BDAG
  rationale: μετά with the genitive is literally 'with,' but in the collocation with πολεμεῖν/ποιεῖν πόλεμον the adversarial sense is implicit. English idiom allows 'make war with' to preserve the Greek preposition more closely than supplying 'against' in the main text.
- source_word: τοῦ σπέρματος αὐτῆς
  chosen: of her offspring
  alternatives:
  - of her seed
  - of her descendants
  lexicon: BDAG
  rationale: σπέρμα can mean seed, offspring, or descendants. 'Offspring' is natural English and preserves the familial sense without sounding archaic like 'seed.'
- source_word: τηρούντων
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: BDAG
  rationale: τηρέω here refers to faithful observance. 'Keep' is the standard concise rendering in contexts of commandments.
- source_word: ἐντολὰς
  chosen: the commandments
  alternatives:
  - the commands
  lexicon: BDAG
  rationale: '''Commandments'' preserves the weight and biblical resonance of ἐντολαί better than the more colloquial ''commands.'''
- source_word: ἐχόντων
  chosen: hold to
  alternatives:
  - have
  - possess
  lexicon: BDAG
  rationale: Although ἔχω literally means 'have,' in this context 'hold to' better communicates steadfast adherence to the testimony in idiomatic English without departing far from the source sense.
- source_word: μαρτυρίαν Ἰησοῦ
  chosen: the testimony of Jesus
  alternatives:
  - the testimony about Jesus
  - Jesus' testimony
  lexicon: BDAG
  rationale: 'The genitive Ἰησοῦ is contextually debated (objective: testimony about Jesus; subjective: testimony borne by Jesus). In keeping with the instruction to preserve theological tension, the main text retains the formally ambiguous ''of Jesus,'' with alternatives noted in a footnote.'
