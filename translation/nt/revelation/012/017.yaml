  chosen_reading: the testimony of Jesus
  alternative_readings:
  - the testimony about Jesus
  - Jesus' testimony
  rationale: The genitive can plausibly be read as objective or subjective. Rather than resolving the ambiguity, the translation preserves it in the main text with a footnote listing the principal interpretive options, in line with the doctrine's requirement to preserve genuine theological tension.
