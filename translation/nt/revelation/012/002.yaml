id: REV.12.2
reference: Revelation 12:2
source:
  edition: SBLGNT
  text: καὶ ἐν γαστρὶ ἔχουσα· ⸂καὶ κράζει⸃ ὠδίνουσα καὶ βασανιζομένη τεκεῖν.
translation:
  text: And she was pregnant, and she cries out, suffering birth pains and being tormented
    to give birth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with child'; literally, 'having in the womb.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in labor' for 'suffering birth pains.'
    reason: lexical_alternative
  - marker: c
    text: Or 'being in agony' for 'being tormented.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν γαστρὶ ἔχουσα
  chosen: she was pregnant
  alternatives:
  - having in the womb
  - with child
  lexicon: BDAG
  rationale: The idiom literally means 'having in the womb' and is a standard way
    to express pregnancy. 'She was pregnant' is natural modern English and preserves
    the sense without unnecessary archaism. 'With child' is possible but less current.
- source_word: κράζει
  chosen: she cries out
  alternatives:
  - she is crying out
  - she shouted
  lexicon: BDAG
  rationale: Present indicative is best represented with a vivid present in English,
    fitting Revelation's visionary style. 'Cries out' preserves the immediacy better
    than a simple past.
- source_word: ὠδίνουσα
  chosen: suffering birth pains
  alternatives:
  - in labor
  - travailing
  lexicon: BDAG
  rationale: The participle denotes experiencing labor pains. 'Suffering birth pains'
    is clear, contemporary, and keeps the pain imagery explicit. 'In labor' is possible
    but slightly less explicit about the pain element.
- source_word: βασανιζομένη
  chosen: being tormented
  alternatives:
  - being in agony
  - being distressed
  lexicon: BDAG
  rationale: The passive participle conveys severe distress or torment. 'Being tormented'
    preserves the intensity of the Greek better than softer options like 'distressed,'
    while still fitting the childbirth context.
- source_word: τεκεῖν
  chosen: to give birth
  alternatives:
  - to bear a child
  - to deliver
  lexicon: BDAG
  rationale: The infinitive expresses the goal or circumstance of the woman's agony.
    'To give birth' is the most natural contemporary rendering and accurately conveys
    the childbirth event.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  - —
  lexicon: BDAG
  rationale: The repeated conjunctions are retained to reflect the cumulative, vivid
    sequence of the Greek description rather than smoothing the syntax too much.
