theological_decisions:
- issue: Intensity and nature of the woman's suffering in the vision
  chosen_reading: Render βασανιζομένη strongly as 'being tormented' while leaving
    the identity of the woman uninterpreted.
  alternative_readings:
  - render more softly as 'in anguish' or 'in pain'
  rationale: The verse describes the woman's suffering vividly but does not itself
    identify her symbolically or explain the theological significance of the pain.
    The translation should preserve the force of the Greek without importing a specific
    interpretive framework about the woman's identity.
  doctrine_reference: Preserve theological tension rather than resolve it.
