theological_decisions:
- issue: Symbolic identity of the woman and child
  chosen_reading: Retain the literal-symbolic imagery 'the woman' and 'the male child'
    without interpretive expansion.
  alternative_readings:
  - the woman as Mary
  - the woman as Israel
  - the woman as the people of God/church
  rationale: The verse participates in apocalyptic symbolism, and multiple orthodox
    interpretations exist regarding the woman's referent. The translation should not
    resolve that interpretive question in the main text beyond what the Greek states.
  doctrine_reference: Preserve theological tension rather than resolve it.
