id: REV.12.13
reference: Revelation 12:13
source:
  edition: SBLGNT
  text: Καὶ ὅτε εἶδεν ὁ δράκων ὅτι ἐβλήθη εἰς τὴν γῆν, ἐδίωξεν τὴν γυναῖκα ἥτις ἔτεκεν
    τὸν ἄρσενα.
translation:
  text: And when the dragon saw that he had been thrown down to the earth, he pursued
    the woman who had given birth to the male child.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'persecuted the woman.' The Greek verb can mean either 'pursued' or 'persecuted';
      here it likely includes both hostile pursuit and persecution.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the male.' English supplies 'child' for natural sense; compare
      the wording in the surrounding context.
    reason: lexical_alternative
lexical_decisions:
- source_word: δράκων
  chosen: dragon
  alternatives:
  - serpent
  lexicon: BDAG
  rationale: The noun plainly denotes a dragon in apocalyptic imagery. Although the
    figure is identified elsewhere with the serpent, this verse uses δράκων and should
    retain the image rather than harmonize to 'serpent'.
- source_word: ἐβλήθη
  chosen: had been thrown down
  alternatives:
  - was cast down
  - was thrown
  lexicon: BDAG
  rationale: Aorist passive of βάλλω in this context refers to forcible expulsion.
    'Thrown down' is natural modern English and preserves the violent passive sense.
    'Had been' fits the temporal relation after 'when ... saw that' in English.
- source_word: εἰς τὴν γῆν
  chosen: to the earth
  alternatives:
  - to the land
  - onto the earth
  lexicon: BDAG
  rationale: In Revelation's cosmic setting, γῆ most naturally means 'earth' rather
    than 'land.' 'To the earth' is idiomatic with 'thrown down' and preserves the
    contrast with heaven in the surrounding context.
- source_word: ἐδίωξεν
  chosen: pursued
  alternatives:
  - persecuted
  - chased
  lexicon: BDAG
  rationale: διώκω can mean either 'pursue' or 'persecute.' Here the immediate narrative
    action is the dragon's hostile pursuit of the woman. 'Pursued' keeps the concrete
    motion while still allowing the persecuting sense to be inferred from context.
- source_word: γυναῖκα
  chosen: woman
  lexicon: BDAG
  rationale: Standard rendering of γυνή here. The symbolic identity of the woman should
    not be imported into the translation itself.
- source_word: ἥτις
  chosen: who
  alternatives:
  - the one who
  lexicon: BDAG
  rationale: The qualitative relative pronoun can be rendered simply as 'who' in smooth
    English without loss of meaning in this context.
- source_word: ἔτεκεν
  chosen: had given birth to
  alternatives:
  - bore
  - gave birth to
  lexicon: BDAG
  rationale: τίκτω means 'give birth to, bear.' 'Had given birth to' works naturally
    in English relative to the prior event and avoids archaic 'bore.'
- source_word: τὸν ἄρσενα
  chosen: the male child
  alternatives:
  - the son
  - the male
  lexicon: BDAG
  rationale: The Greek uses the adjective/substantive ἄρσην ('male'), echoing the
    wording of the preceding context. English normally requires a noun, so 'male child'
    makes the sense explicit while preserving the marked emphasis on maleness better
    than simply 'son'.
