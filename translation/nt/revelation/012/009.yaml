id: REV.12.9
reference: Revelation 12:9
source:
  edition: SBLGNT
  text: καὶ ἐβλήθη ὁ δράκων ὁ μέγας, ὁ ὄφις ὁ ἀρχαῖος, ὁ καλούμενος Διάβολος καὶ ⸀ὁ
    Σατανᾶς, ὁ πλανῶν τὴν οἰκουμένην ὅλην— ἐβλήθη εἰς τὴν γῆν, καὶ οἱ ἄγγελοι αὐτοῦ
    μετ’ αὐτοῦ ἐβλήθησαν.
translation:
  text: And the great dragon was thrown down—the ancient serpent, the one called the
    Devil and Satan, who deceives the whole world. He was thrown down to the earth,
    and his angels were thrown down with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "who leads the whole inhabited world astray."
    reason: lexical_alternative
  - marker: b
    text: '"Ancient serpent" echoes the serpent imagery of Genesis 3.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐβλήθη / ἐβλήθησαν
  chosen: was thrown down / were thrown down
  alternatives:
  - was cast down / were cast down
  - was hurled down / were hurled down
  lexicon: BDAG
  rationale: βάλλω in the passive here denotes forcible expulsion downward. 'Thrown
    down' is clear modern English and preserves the repeated verbal emphasis in the
    verse better than the more archaic 'cast down.'
- source_word: δράκων ὁ μέγας
  chosen: the great dragon
  alternatives:
  - the great serpent-dragon
  lexicon: BDAG
  rationale: δράκων is straightforwardly 'dragon' in apocalyptic imagery. Retaining
    'dragon' preserves the symbolic force familiar in Revelation.
- source_word: ὁ ὄφις ὁ ἀρχαῖος
  chosen: the ancient serpent
  alternatives:
  - the ancient snake
  - the primeval serpent
  lexicon: BDAG
  rationale: ὄφις is 'serpent/snake'; 'serpent' better matches biblical diction and
    the allusion to Genesis. ἀρχαῖος is rendered 'ancient' as the most natural equivalent,
    preserving the sense of oldness/origin without overinterpreting as 'primeval'
    in the main text.
- source_word: ὁ καλούμενος
  chosen: the one called
  alternatives:
  - who is called
  - called
  lexicon: BDAG
  rationale: The participle identifies the dragon by recognized names/titles. 'The
    one called' is slightly more explicit and natural in apposition to the preceding
    descriptors.
- source_word: Διάβολος
  chosen: the Devil
  alternatives:
  - Devil
  - the slanderer
  lexicon: BDAG
  rationale: Although the lexical sense is 'slanderer,' in this context it functions
    as a recognized title/name. 'The Devil' is the standard English rendering and
    best communicates the referent.
- source_word: Σατανᾶς
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: This is a proper name/title transliterated by standard convention, in
    keeping with the philosophy to transliterate names while translating titles where
    appropriate.
- source_word: ὁ πλανῶν
  chosen: who deceives
  alternatives:
  - who leads astray
  - who misleads
  lexicon: BDAG
  rationale: πλανάω can mean 'lead astray' or 'deceive.' 'Deceives' is concise, idiomatic,
    and fits the cosmic scope of the clause.
- source_word: τὴν οἰκουμένην ὅλην
  chosen: the whole world
  alternatives:
  - the whole inhabited world
  - the entire world
  lexicon: BDAG
  rationale: οἰκουμένη often means the inhabited world. In Revelation's global-apocalyptic
    context, 'the whole world' is the most natural English expression without losing
    scope.
- source_word: εἰς τὴν γῆν
  chosen: to the earth
  alternatives:
  - to the land
  - to the world
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' Here the contrast is heavenly expulsion
    to the earthly realm, so 'earth' is contextually best.
- source_word: οἱ ἄγγελοι αὐτοῦ
  chosen: his angels
  alternatives:
  - his messengers
  lexicon: BDAG
  rationale: In apocalyptic context these are supernatural beings aligned with the
    dragon, so 'angels' is the correct rendering rather than the more general 'messengers'.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: A simple accompaniment phrase; 'with him' is natural and sufficiently
    precise.
