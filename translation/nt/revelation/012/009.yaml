theological_decisions:
- issue: Rendering Διάβολος and Σατανᾶς in apposition
  chosen_reading: the one called the Devil and Satan
  alternative_readings:
  - called Devil and Satan
  - called the Devil and the Adversary
  rationale: The Greek presents multiple identifying appositions for the dragon. Rendering
    both names in their conventional English forms preserves the text's identification
    of the dragon with the personal evil figure recognized across Scripture, without
    importing additional doctrinal elaboration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve
    theological tension rather than resolve it.'
- issue: Scope of οἰκουμένη
  chosen_reading: the whole world
  alternative_readings:
  - the whole inhabited earth
  rationale: The phrase is rendered broadly to match the apocalyptic universal scope
    of the deception. This avoids artificially narrowing the referent while remaining
    faithful to the Greek.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy
    over translation tradition.'
