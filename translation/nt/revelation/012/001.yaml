theological_decisions:
- issue: Symbolic identity of the woman
  chosen_reading: No identification supplied in the translation; the text is rendered
    descriptively as a visionary sign.
  alternative_readings:
  - Israel
  - Mary
  - the people of God
  - the church
  rationale: The verse presents symbolic imagery but does not explicitly identify
    the woman here. To preserve theological tension and avoid importing a denominational
    interpretation, the translation remains non-interpretive.
  doctrine_reference: Preserve theological tension rather than resolve it.
