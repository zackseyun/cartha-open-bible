id: REV.12.1
reference: Revelation 12:1
source:
  edition: SBLGNT
  text: Καὶ σημεῖον μέγα ὤφθη ἐν τῷ οὐρανῷ, γυνὴ περιβεβλημένη τὸν ἥλιον, καὶ ἡ σελήνη
    ὑποκάτω τῶν ποδῶν αὐτῆς, καὶ ἐπὶ τῆς κεφαλῆς αὐτῆς στέφανος ἀστέρων δώδεκα,
translation:
  text: 'And a great sign appeared in heaven: a woman clothed with the sun, and the
    moon under her feet, and on her head a crown of twelve stars,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a wreath' or 'a victor's crown'; the Greek word is στέφανος, distinct
      from a royal diadem.
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - wonder
  - portent
  lexicon: BDAG
  rationale: In Revelation, σημεῖον commonly denotes a symbolic visionary sign rather
    than merely a miracle. 'Sign' preserves the apocalyptic sense without overinterpreting
    the symbol.
- source_word: μέγα
  chosen: great
  alternatives:
  - large
  - mighty
  lexicon: BDAG
  rationale: '''Great'' is the natural idiomatic rendering here and preserves both
    scale and significance in apocalyptic style.'
- source_word: ὤφθη
  chosen: appeared
  alternatives:
  - was seen
  - became visible
  lexicon: BDAG
  rationale: Although formally passive ('was seen'), English idiom favors 'appeared'
    for visionary report language. This keeps the sense natural while preserving the
    event of visible manifestation.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven,' but in Revelation's visionary setting
    'heaven' is the more fitting and theologically resonant rendering.
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: The context introduces a symbolic female figure, not specifically a wife.
    'Woman' is the straightforward lexical choice.
- source_word: περιβεβλημένη τὸν ἥλιον
  chosen: clothed with the sun
  alternatives:
  - arrayed with the sun
  - wrapped in the sun
  lexicon: BDAG
  rationale: The perfect participle of περιβάλλω conveys being clothed or enveloped.
    'Clothed with the sun' is both literal enough and idiomatic in English.
- source_word: ἡ σελήνη ὑποκάτω τῶν ποδῶν αὐτῆς
  chosen: the moon under her feet
  alternatives:
  - the moon beneath her feet
  lexicon: BDAG
  rationale: A concise rendering that preserves the spatial imagery. 'Under her feet'
    is standard English and reflects ὑποκάτω.
- source_word: στέφανος
  chosen: crown
  alternatives:
  - wreath
  - victor's crown
  lexicon: BDAG
  rationale: στέφανος refers to a wreath-like crown rather than a royal diadem. 'Crown'
    is the clearest main-text rendering, with the more specific nuance preserved in
    a footnote.
- source_word: ἀστέρων δώδεκα
  chosen: of twelve stars
  alternatives:
  - made up of twelve stars
  - with twelve stars
  lexicon: BDAG
  rationale: The genitive construction is naturally rendered 'of twelve stars.' This
    preserves the image without adding interpretive detail.
