id: REV.12.5
reference: Revelation 12:5
source:
  edition: SBLGNT
  text: καὶ ἔτεκεν υἱόν, ⸀ἄρσεν, ὃς μέλλει ποιμαίνειν πάντα τὰ ἔθνη ἐν ῥάβδῳ σιδηρᾷ·
    καὶ ἡρπάσθη τὸ τέκνον αὐτῆς πρὸς τὸν θεὸν καὶ πρὸς τὸν θρόνον αὐτοῦ.
translation:
  text: And she gave birth to a son, a male child, who is about to shepherd all the
    nations with an iron rod; and her child was snatched up to God and to his throne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who will rule all the nations with an iron rod.' The Greek verb literally
      means 'shepherd,' but in this context it echoes Psalm 2 and carries royal authority.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔτεκεν
  chosen: gave birth
  alternatives:
  - bore
  lexicon: BDAG
  rationale: Natural modern English for τίκτω while preserving the concrete childbirth
    imagery.
- source_word: υἱόν, ἄρσεν
  chosen: a son, a male child
  alternatives:
  - a son, a male
  - a male son
  lexicon: BDAG
  rationale: The Greek uses both υἱόν and ἄρσεν, creating deliberate emphasis. Rendering
    both preserves the appositional force and the allusion to the male child imagery
    of the passage without collapsing the repetition.
- source_word: μέλλει ποιμαίνειν
  chosen: is about to shepherd
  alternatives:
  - is to shepherd
  - is destined to shepherd
  - will shepherd
  lexicon: BDAG
  rationale: μέλλω with infinitive often conveys imminence or destined futurity. 'Is
    about to shepherd' preserves the present-tense force of μέλλει more closely than
    a simple future, while remaining intelligible in apocalyptic narrative.
- source_word: ποιμαίνειν
  chosen: shepherd
  alternatives:
  - rule
  - tend as a shepherd
  lexicon: BDAG
  rationale: ποιμαίνω literally means 'to shepherd.' In this Psalm 2 allusion it carries
    royal rule, but the translation philosophy prefers preserving the source metaphor
    rather than replacing it with the interpretive gloss 'rule.'
- source_word: πάντα τὰ ἔθνη
  chosen: all the nations
  alternatives:
  - all the Gentiles
  - all nations
  lexicon: BDAG
  rationale: ἔθνη here refers broadly to the nations of the world, echoing Psalm 2.
    'Nations' is the clearest contextual rendering; 'Gentiles' would be too ethnically
    narrow in this royal-apocalyptic context.
- source_word: ἐν ῥάβδῳ σιδηρᾷ
  chosen: with an iron rod
  alternatives:
  - with a rod of iron
  lexicon: BDAG
  rationale: This preserves the instrumental sense and the Psalm 2 wording in clear
    modern English. 'With an iron rod' is idiomatic while remaining close to the Greek.
- source_word: ἡρπάσθη
  chosen: was snatched up
  alternatives:
  - was caught up
  - was seized
  lexicon: BDAG
  rationale: The passive of ἁρπάζω denotes sudden forceful removal. 'Snatched up'
    preserves both the abruptness and the upward movement implied by the context toward
    God and his throne.
- source_word: τὸ τέκνον αὐτῆς
  chosen: her child
  alternatives:
  - her offspring
  - the child of her
  lexicon: BDAG
  rationale: τέκνον is more general than υἱός and is naturally rendered 'child.' Retaining
    this shift reflects the Greek variation rather than forcing the same English term
    throughout.
- source_word: πρὸς τὸν θεὸν καὶ πρὸς τὸν θρόνον αὐτοῦ
  chosen: to God and to his throne
  alternatives:
  - to God and to the throne of him
  lexicon: BDAG
  rationale: Repeated πρὸς is preserved with repeated 'to,' maintaining the movement
    toward both God and his throne without awkwardness.
