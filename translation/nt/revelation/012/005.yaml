theological_decisions:
- issue: Messianic allusion to Psalm 2 in ποιμαίνειν ... ἐν ῥάβδῳ σιδηρᾷ
  chosen_reading: Preserve the shepherding metaphor in the main text while allowing
    the royal sense to be noted in a footnote.
  alternative_readings:
  - rule all the nations with an iron rod
  rationale: The verse strongly alludes to Psalm 2 and refers to the Messiah's royal
    authority, but the Greek verb itself is ποιμαίνω ('shepherd'). Per translation
    philosophy, the main text should preserve the source metaphor rather than resolve
    it into the interpretive gloss 'rule.'
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Force of μέλλει
  chosen_reading: Render as 'is about to' rather than a simple future.
  alternative_readings:
  - will shepherd
  - is to shepherd
  rationale: This keeps the Greek aspectual nuance visible and avoids flattening the
    wording into a generic future. In apocalyptic discourse the phrase can imply destined
    action, but the translation should not over-interpret beyond the Greek.
  doctrine_reference: Translation philosophy §§1, 3
