id: REV.12.16
reference: Revelation 12:16
source:
  edition: SBLGNT
  text: καὶ ἐβοήθησεν ἡ γῆ τῇ γυναικί, καὶ ἤνοιξεν ἡ γῆ τὸ στόμα αὐτῆς καὶ κατέπιεν τὸν ποταμὸν ὃν ἔβαλεν ὁ δράκων ἐκ τοῦ στόματος αὐτοῦ·
translation:
  text: And the earth helped the woman[b][a], and the earth opened its mouth and swallowed the river that the dragon had thrown from his mouth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the land helped the woman.' The Greek γῆ can mean 'earth,' 'land,' or 'ground.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the river that the dragon cast out of his mouth' or 'sent out from his mouth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβοήθησεν
  chosen: helped
  alternatives:
  - came to the aid of
  - assisted
  lexicon: BDAG
  rationale: Aorist indicative of βοηθέω, with straightforward sense 'help, come to the aid of.' 'Helped' is concise, natural English and preserves the simple narrative force.
- source_word: ἡ γῆ
  chosen: the earth
  alternatives:
  - the land
  - the ground
  lexicon: BDAG
  rationale: γῆ can mean earth, land, or ground. In this apocalyptic scene, 'the earth' best matches the cosmic imagery and the repeated subject in the verse. 'Land' would sound too localized.
- source_word: τῇ γυναικί
  chosen: the woman
  lexicon: BDAG
  rationale: Direct rendering of γυνή with article and dative object after βοηθέω. 'Woman' preserves the symbolic figure without interpretive expansion.
- source_word: ἤνοιξεν ... τὸ στόμα αὐτῆς
  chosen: opened its mouth
  alternatives:
  - opened her mouth
  lexicon: BDAG
  rationale: Although γῆ is grammatically feminine in Greek, English normally refers to an inanimate noun like 'earth' with 'its.' This follows the translation philosophy of readable modern English while preserving the personified imagery.
- source_word: κατέπιεν
  chosen: swallowed
  alternatives:
  - swallowed up
  - devoured
  lexicon: BDAG
  rationale: καταπίνω means 'swallow, swallow down.' 'Swallowed' is the most direct equivalent. 'Swallowed up' is possible but adds an English particle not required by the Greek.
- source_word: τὸν ποταμόν
  chosen: the river
  alternatives:
  - the stream
  - the flood
  lexicon: BDAG
  rationale: ποταμός normally means 'river.' Although the broader context may imply a flood-like torrent, the noun itself is best rendered 'river,' avoiding interpretive overtranslation.
- source_word: ὃν ἔβαλεν
  chosen: that ... had thrown
  alternatives:
  - that ... cast
  - that ... sent out
  - that ... poured out
  lexicon: BDAG
  rationale: βάλλω has a broad range including 'throw, cast.' Here the dragon forcefully emits the river from his mouth. 'Had thrown' fits the relative clause naturally in English and preserves the forceful action better than the more interpretive 'poured out.'
- source_word: ὁ δράκων
  chosen: the dragon
  lexicon: BDAG
  rationale: Standard rendering of δράκων in Revelation; preserves the established apocalyptic figure without reinterpretation.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  chosen: from his mouth
  alternatives:
  - out of his mouth
  lexicon: BDAG
  rationale: Literal rendering of the prepositional phrase. 'From his mouth' is idiomatic and sufficiently precise; 'out of' is a stylistic alternative.
