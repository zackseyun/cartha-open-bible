theological_decisions:
- issue: Personification of the earth in apocalyptic imagery
  chosen_reading: Retain the personified action of the earth without allegorical explanation in the translation.
  alternative_readings:
  - Interpret the earth as a symbol for a human population, territory, or providential means of deliverance
  rationale: The verse presents the earth as acting in a vivid apocalyptic image. The translation should preserve the imagery rather than resolve its symbolism in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
