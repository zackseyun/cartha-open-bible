id: REV.12.7
reference: Revelation 12:7
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο πόλεμος ἐν τῷ οὐρανῷ, ὁ Μιχαὴλ καὶ οἱ ἄγγελοι αὐτοῦ ⸀τοῦ πολεμῆσαι
    μετὰ τοῦ δράκοντος. καὶ ὁ δράκων ἐπολέμησεν καὶ οἱ ἄγγελοι αὐτοῦ,
translation:
  text: 'And war broke out in heaven: Michael and his angels fought against the dragon.
    And the dragon and his angels fought back,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'there was war' or 'war arose in heaven.'
    reason: lexical_alternative
  - marker: b
    text: Or more formally, 'Michael and his angels to fight against the dragon,'
      with the Greek using an articular infinitive to express the action/purpose.
    reason: lexical_alternative
  - marker: c
    text: Or simply, 'the dragon fought, and his angels.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο πόλεμος
  chosen: war broke out
  alternatives:
  - there was war
  - war arose
  lexicon: BDAG
  rationale: The idiom γίνομαι + noun often denotes the arising or occurrence of an
    event. 'War broke out' is natural modern English and preserves the ingressive
    sense better than the flatter 'there was war.'
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  - in the sky
  lexicon: BDAG
  rationale: οὐρανός here refers to the heavenly realm, not the visible sky. English
    idiom prefers 'in heaven' rather than the more wooden 'in the heaven.'
- source_word: Μιχαὴλ
  chosen: Michael
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: ἄγγελοι αὐτοῦ
  chosen: his angels
  alternatives:
  - the angels of him
  lexicon: BDAG
  rationale: A straightforward possessive rendering preserves the relationship between
    Michael and the angels aligned with him.
- source_word: τοῦ πολεμῆσαι μετὰ τοῦ δράκοντος
  chosen: fought against the dragon
  alternatives:
  - to fight against the dragon
  - to wage war with the dragon
  lexicon: BDAG
  rationale: 'The articular infinitive expresses purpose/result in a compressed construction
    after the clause naming Michael and his angels. In idiomatic English, the sense
    is best carried by making the action explicit: ''fought against the dragon.''
    ''Against'' fits the hostile context better than the more ambiguous ''with.'''
- source_word: δράκοντος / δράκων
  chosen: the dragon
  lexicon: BDAG
  rationale: δράκων is properly 'dragon' here, matching the apocalyptic imagery and
    the immediate context of Revelation 12.
- source_word: ἐπολέμησεν
  chosen: fought back
  alternatives:
  - fought
  - waged war
  lexicon: BDAG
  rationale: The second clause presents the dragon's responsive action in the conflict.
    'Fought back' makes the adversative progression clear in natural English without
    adding content beyond the contextually implied response.
- source_word: καὶ οἱ ἄγγελοι αὐτοῦ
  chosen: and his angels
  lexicon: BDAG
  rationale: This mirrors the first half of the verse and preserves the parallel structure
    between Michael and the dragon, each with his angels.
