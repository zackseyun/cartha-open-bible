theological_decisions:
- issue: Identity and status of Michael
  chosen_reading: Render simply as the personal name 'Michael' without interpretive
    expansion.
  alternative_readings:
  - Michael as an archangel
  - Michael as a christological figure in some interpretive traditions
  rationale: The verse itself names Michael but does not specify his rank here or
    identify him with Christ. To preserve theological tension and avoid importing
    denominational interpretation, the translation leaves the name uninterpreted.
  doctrine_reference: Preserve theological tension rather than resolve it.
