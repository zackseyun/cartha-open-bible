theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title, not a name-like designation, in 'the authority
    of his Χριστός.' Following the doctrine's contested-terms guidance, the title
    is translated to preserve meaning and Hebraic messianic context.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2; Contested terms table
    for Χριστός'
- issue: Gender rendering of ἀδελφῶν
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  rationale: The Greek is masculine plural and likely representative of the covenant
    community. Per doctrine, the main text remains gender-accurate to the source,
    while a footnote can clarify inclusive reference if contextually relevant.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4'
