id: REV.12.10
reference: Revelation 12:10
source:
  edition: SBLGNT
  text: Καὶ ἤκουσα φωνὴν μεγάλην ἐν τῷ οὐρανῷ λέγουσαν· Ἄρτι ἐγένετο ἡ σωτηρία καὶ
    ἡ δύναμις καὶ ἡ βασιλεία τοῦ θεοῦ ἡμῶν καὶ ἡ ἐξουσία τοῦ χριστοῦ αὐτοῦ, ὅτι ἐβλήθη
    ὁ ⸀κατήγωρ τῶν ἀδελφῶν ἡμῶν, ὁ κατηγορῶν ⸀αὐτοὺς ἐνώπιον τοῦ θεοῦ ἡμῶν ἡμέρας
    καὶ νυκτός.
translation:
  text: And I heard a loud voice in heaven saying, “Now have come the salvation and
    the power and the kingdom of our God, and the authority of his Messiah, because
    the accuser of our brothers has been thrown down, the one who accuses them before
    our God day and night.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title is Χριστός (Christos), here rendered 'Messiah'
      because it functions as a title meaning God's Anointed One.
    reason: alternative_reading
  - marker: b
    text: '''Brothers'' may refer to fellow believers collectively, including women
      as well as men.'
    reason: cultural_note
lexical_decisions:
- source_word: φωνὴν μεγάλην
  chosen: a loud voice
  alternatives:
  - a great voice
  lexicon: BDAG
  rationale: μέγας with φωνή idiomatically denotes loudness/volume in English rather
    than greatness as a quality of the voice.
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heaven
  lexicon: BDAG
  rationale: Singular οὐρανός here refers to the heavenly realm; idiomatic English
    is 'in heaven.'
- source_word: Ἄρτι
  chosen: Now
  alternatives:
  - At this moment
  - Already now
  lexicon: BDAG
  rationale: Marks the decisive present moment in the heavenly proclamation; 'Now'
    is concise and natural.
- source_word: ἐγένετο
  chosen: have come
  alternatives:
  - has come
  - have become
  - came to be
  lexicon: BDAG
  rationale: Although formally singular, the verb introduces a compound subject ('the
    salvation and the power and the kingdom ... and the authority'). English idiom
    prefers plural agreement in the resulting clause. 'Have come' captures the ingressive/resultative
    sense in context.
- source_word: ἡ σωτηρία
  chosen: the salvation
  alternatives:
  - salvation
  - deliverance
  lexicon: BDAG
  rationale: The article is retained for rhetorical force in the series; 'salvation'
    is the standard and contextually fitting rendering.
- source_word: ἡ δύναμις
  chosen: the power
  alternatives:
  - power
  - might
  lexicon: BDAG
  rationale: Refers to God's effective power manifested in victory; 'power' is the
    most direct equivalent.
- source_word: ἡ βασιλεία τοῦ θεοῦ ἡμῶν
  chosen: the kingdom of our God
  alternatives:
  - the reign of our God
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom; here the established royal rule
    is in view. 'Kingdom' is natural and preserves the apocalyptic register.
- source_word: ἡ ἐξουσία
  chosen: the authority
  alternatives:
  - the right to rule
  - the dominion
  lexicon: BDAG
  rationale: ἐξουσία emphasizes delegated or rightful authority rather than raw power;
    thus distinguished from δύναμις earlier in the verse.
- source_word: τοῦ χριστοῦ αὐτοῦ
  chosen: of his Messiah
  alternatives:
  - of his Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός as a title is translated ''Messiah'' where context
    supports. Here it is clearly titular: God''s anointed ruler.'
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the reason for the heavenly proclamation.
- source_word: ἐβλήθη
  chosen: has been thrown down
  alternatives:
  - was cast down
  - has been cast out
  lexicon: BDAG
  rationale: βάλλω in passive here depicts forcible expulsion from heaven; 'thrown
    down' matches the immediate context of Satan's defeat in the chapter and is vivid
    modern English.
- source_word: κατήγωρ
  chosen: the accuser
  alternatives:
  - the prosecutor
  lexicon: BDAG
  rationale: The rare noun denotes one who brings charges. 'Accuser' is the established
    and clearest English equivalent in this judicial-apocalyptic context.
- source_word: τῶν ἀδελφῶν ἡμῶν
  chosen: of our brothers
  alternatives:
  - of our brothers and sisters
  - of our brethren
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate rendering is preferred. ἀδελφῶν is grammatically
    masculine plural and in Christian usage can be representative; the main text keeps
    'brothers,' with inclusivity noted in a footnote.
- source_word: ὁ κατηγορῶν αὐτοὺς
  chosen: the one who accuses them
  alternatives:
  - who accuses them
  - the one accusing them
  lexicon: BDAG
  rationale: The articular participle is rendered appositionally to explain 'the accuser'
    and preserve the ongoing/habitual force of the present participle.
- source_word: ἐνώπιον τοῦ θεοῦ ἡμῶν
  chosen: before our God
  alternatives:
  - in the presence of our God
  lexicon: BDAG
  rationale: Judicial setting favors 'before our God' as concise and natural.
- source_word: ἡμέρας καὶ νυκτός
  chosen: day and night
  alternatives:
  - by day and by night
  lexicon: BDAG
  rationale: Genitives of time express continual activity; the idiom 'day and night'
    is standard English.
