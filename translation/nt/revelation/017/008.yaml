id: REV.17.8
reference: Revelation 17:8
source:
  edition: SBLGNT
  text: τὸ θηρίον ὃ εἶδες ἦν καὶ οὐκ ἔστιν, καὶ μέλλει ἀναβαίνειν ἐκ τῆς ἀβύσσου,
    καὶ εἰς ἀπώλειαν ⸀ὑπάγει· καὶ ⸀θαυμασθήσονται οἱ κατοικοῦντες ἐπὶ τῆς γῆς, ὧν
    οὐ γέγραπται ⸂τὸ ὄνομα⸃ ἐπὶ τὸ βιβλίον τῆς ζωῆς ἀπὸ καταβολῆς κόσμου, βλεπόντων
    ⸂τὸ θηρίον ὅτι ἦν⸃ καὶ οὐκ ἔστιν καὶ παρέσται.
translation:
  text: The beast that you saw was, and is not, and is about to come up out of the
    abyss and go to destruction. And those who dwell on the earth, whose name has
    not been written in the book of life from the foundation of the world, will marvel
    when they see the beast, because it was and is not and will be present.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'will wonder.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on the book of life'; English idiom uses 'in the book of life.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'that it was and is not and will come/appear.' The Greek can be taken
      as either causal ('because') or content ('that'), and 'will be present' renders
      the future of 'to be present.'
    reason: alternative_reading
lexical_decisions:
- source_word: θηρίον
  chosen: beast
  alternatives:
  - animal
  - wild beast
  lexicon: BDAG
  rationale: Standard apocalyptic rendering that preserves the monstrous, symbolic
    force of the term in Revelation better than the generic 'animal.'
- source_word: ἦν καὶ οὐκ ἔστιν
  chosen: was, and is not
  alternatives:
  - was and is not
  - existed and does not exist
  lexicon: BDAG
  rationale: Keeps the stark verbal contrast and echoes the parody of divine eternity
    language in the immediate context without over-interpreting it.
- source_word: μέλλει ἀναβαίνειν
  chosen: is about to come up
  alternatives:
  - is going to ascend
  - is about to rise
  lexicon: BDAG
  rationale: μέλλει with infinitive conveys imminence; 'come up' is more natural English
    here than 'ascend' while preserving the upward movement of ἀναβαίνειν.
- source_word: ἄβυσσος
  chosen: abyss
  alternatives:
  - bottomless pit
  - deep
  lexicon: BDAG
  rationale: Abyss is the established and accurate apocalyptic term; 'bottomless pit'
    is interpretive and tradition-laden.
- source_word: εἰς ἀπώλειαν ὑπάγει
  chosen: go to destruction
  alternatives:
  - goes to destruction
  - goes to perdition
  - goes to ruin
  lexicon: BDAG
  rationale: Conveys movement toward final doom. 'Destruction' is clear modern English;
    'perdition' is more traditional but less accessible.
- source_word: θαυμασθήσονται
  chosen: will marvel
  alternatives:
  - will be astonished
  - will wonder
  lexicon: BDAG
  rationale: Captures the future passive sense in idiomatic English and fits the sense
    of awed astonishment in context.
- source_word: οἱ κατοικοῦντες ἐπὶ τῆς γῆς
  chosen: those who dwell on the earth
  alternatives:
  - the inhabitants of the earth
  - those living on the earth
  lexicon: BDAG
  rationale: Preserves Revelation's recurring phrase with a relatively formal consistency.
    'Dwell' also carries the settled identity nuance of the expression.
- source_word: ὧν οὐ γέγραπται τὸ ὄνομα
  chosen: whose name has not been written
  alternatives:
  - whose names have not been written
  lexicon: BDAG
  rationale: The Greek reads singular τὸ ὄνομα, so the singular 'name' is retained
    even though English might idiomatically expect the plural.
- source_word: ἐπὶ τὸ βιβλίον τῆς ζωῆς
  chosen: in the book of life
  alternatives:
  - on the book of life
  lexicon: BDAG
  rationale: Although ἐπί is literally 'on/upon,' English idiom for names recorded
    in a book is 'in the book.' This is an optimal-equivalence adjustment for naturalness.
- source_word: ἀπὸ καταβολῆς κόσμου
  chosen: from the foundation of the world
  alternatives:
  - since the foundation of the world
  lexicon: BDAG
  rationale: This is the standard and accurate rendering of the temporal phrase and
    preserves its theological weight.
- source_word: βλεπόντων
  chosen: when they see
  alternatives:
  - seeing
  - as they look at
  lexicon: BDAG
  rationale: The genitive participle is rendered temporally in smooth English, linking
    their marveling to the act of seeing.
- source_word: ὅτι ἦν καὶ οὐκ ἔστιν καὶ παρέσται
  chosen: because it was and is not and will be present
  alternatives:
  - that it was and is not and will come
  - that it was and is not and will appear
  lexicon: BDAG
  rationale: ὅτι is taken causally here ('because'), fitting the logic of their marveling.
    παρέσται, from πάρειμι, most naturally means 'will be present' rather than simply
    'will come,' preserving the verbal contrast with 'is not.'
