theological_decisions:
- issue: Temporal scope of 'from the foundation of the world'
  chosen_reading: The phrase is attached to 'has not been written,' yielding 'whose
    name has not been written in the book of life from the foundation of the world.'
  alternative_readings:
  - The phrase could be read with 'slain' or another nearby concept in other passages,
    but in this verse it most naturally modifies the writing of the name.
  rationale: In this sentence the Greek word order directly follows 'has not been
    written ... in the book of life' with 'from the foundation of the world,' so the
    translation preserves that attachment without importing a broader theological
    system of predestination beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Nuance of παρέσται
  chosen_reading: Rendered 'will be present' rather than 'yet is' or 'will come.'
  alternative_readings:
  - will come
  - will appear
  rationale: The future of πάρειμι points to presence/arrival. 'Will be present' best
    preserves the lexical force while maintaining the beast's parody of divine-style
    existence language. This avoids overstating a resurrection concept not explicitly
    stated in this clause.
  doctrine_reference: Original-language primacy over translation tradition.
