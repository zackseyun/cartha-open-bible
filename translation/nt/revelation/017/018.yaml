theological_decisions:
- issue: Nature of the identification between the woman and the city
  chosen_reading: 'Render the statement as a direct symbolic identification: ''the
    woman ... is the great city.'''
  alternative_readings:
  - Interpret the woman as merely representing the city in an explanatory paraphrase
    such as 'represents the great city'.
  rationale: The Greek uses the simple copula ἔστιν ('is'). Retaining 'is' preserves
    the apocalyptic symbolism as stated rather than softening it into an interpretive
    gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
