id: REV.17.18
reference: Revelation 17:18
source:
  edition: SBLGNT
  text: καὶ ἡ γυνὴ ἣν εἶδες ἔστιν ἡ πόλις ἡ μεγάλη ἡ ἔχουσα βασιλείαν ἐπὶ τῶν βασιλέων
    τῆς γῆς.
translation:
  text: And the woman whom you saw is the great city that has dominion over the kings
    of the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that has a kingdom over the kings of the earth.' The Greek expression
      literally says 'having kingdom,' which can also be understood as possessing
      royal rule or kingship.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: The noun ordinarily means 'woman' or 'wife' depending on context. Here
    the referent is the symbolic female figure seen in the vision, so 'woman' is the
    natural and least interpretively loaded rendering.
- source_word: ἣν εἶδες
  chosen: whom you saw
  alternatives:
  - that you saw
  lexicon: BDAG
  rationale: This relative clause directly identifies the visionary figure previously
    seen by John. 'Whom' preserves the personal referent of the feminine singular
    object more naturally than 'that,' while remaining readable.
- source_word: πόλις ἡ μεγάλη
  chosen: the great city
  alternatives:
  - the great metropolis
  - the great town
  lexicon: BDAG
  rationale: A straightforward rendering of the noun with attributive adjective. 'City'
    is the normal gloss for πόλις and preserves the apocalyptic identification without
    unnecessary modernization.
- source_word: ἔχουσα βασιλείαν
  chosen: that has dominion
  alternatives:
  - that has a kingdom
  - that exercises royal power
  - that reigns
  lexicon: BDAG
  rationale: Literally, 'having kingdom/kingship.' In this context the sense is not
    that the city is itself a geographic kingdom but that it possesses ruling authority.
    'Has dominion' captures the idiomatic force in clear English without over-paraphrasing.
- source_word: βασιλεία
  chosen: dominion
  alternatives:
  - kingdom
  - kingship
  - rule
  lexicon: BDAG
  rationale: βασιλεία can denote kingdom, reign, kingship, or royal rule. Because
    the phrase is followed by 'over the kings of the earth,' the emphasis is on exercised
    sovereignty rather than territorial realm, so 'dominion' best fits the syntax
    and sense.
- source_word: ἐπὶ τῶν βασιλέων
  chosen: over the kings
  alternatives:
  - upon the kings
  - over the rulers
  lexicon: BDAG
  rationale: With the genitive here, ἐπί conveys authority or control over. 'Over
    the kings' is the most natural English expression of supremacy.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  - of the world
  lexicon: BDAG
  rationale: In Revelation, γῆ often carries the broader apocalyptic sense 'earth'
    rather than a specific 'land.' 'Of the earth' preserves the cosmic scope typical
    of the book and avoids narrowing the reference.
