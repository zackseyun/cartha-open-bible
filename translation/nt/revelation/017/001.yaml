theological_decisions:
- issue: Rendering the metaphorical designation πόρνη for Babylon
  chosen_reading: great prostitute
  alternative_readings:
  - great harlot
  rationale: The term is metaphorical and polemical, describing covenantal/political-religious
    unfaithfulness and corruption. 'Prostitute' preserves the sexualized prophetic
    metaphor without importing a narrower doctrinal interpretation of Babylon's identity.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering κρίμα in an apocalyptic context
  chosen_reading: judgment
  alternative_readings:
  - condemnation
  - punishment
  rationale: The verse introduces the revelation of God's judicial action against
    the woman. 'Judgment' preserves the theological breadth of the Greek and avoids
    prematurely narrowing the sense to either verdict alone or punishment alone.
  doctrine_reference: Translation philosophy §3
