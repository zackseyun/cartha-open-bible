id: REV.17.1
reference: Revelation 17:1
source:
  edition: SBLGNT
  text: Καὶ ἦλθεν εἷς ἐκ τῶν ἑπτὰ ἀγγέλων τῶν ἐχόντων τὰς ἑπτὰ φιάλας, καὶ ἐλάλησεν
    μετ’ ἐμοῦ λέγων· Δεῦρο, δείξω σοι τὸ κρίμα τῆς πόρνης τῆς μεγάλης τῆς καθημένης
    ἐπὶ ⸀ὑδάτων πολλῶν,
translation:
  text: Then one of the seven angels who had the seven bowls came and spoke with me,
    saying, “Come, I will show you the judgment of the great prostitute who sits on
    many waters,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the condemnation' or 'the punishment' of the great prostitute.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional English: ''the great harlot.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: Then
  alternatives:
  - And
  lexicon: BDAG
  rationale: Rendered as 'Then' rather than a bare 'And' to convey narrative progression
    in natural English while preserving the connective force.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: 'Aorist of ἔρχομαι here is straightforwardly ingressive/narrative: the
    angel ''came.'''
- source_word: εἷς ἐκ τῶν ἑπτὰ ἀγγέλων
  chosen: one of the seven angels
  alternatives:
  - one from the seven angels
  lexicon: BDAG
  rationale: Standard partitive construction; idiomatic English is 'one of the seven
    angels.'
- source_word: τῶν ἐχόντων τὰς ἑπτὰ φιάλας
  chosen: who had the seven bowls
  alternatives:
  - holding the seven bowls
  - who had the seven basins
  lexicon: BDAG
  rationale: The participial phrase identifies which angels are meant. 'Bowls' is
    the established and accurate rendering of φιάλαι in Revelation's imagery; 'had'
    is smoother than 'holding' in this relative-clause context while preserving possession.
- source_word: ἐλάλησεν μετ’ ἐμοῦ
  chosen: spoke with me
  alternatives:
  - talked with me
  - spoke to me
  lexicon: BDAG
  rationale: μετά with genitive naturally yields 'with me.' 'Spoke with me' preserves
    the Greek preposition better than 'spoke to me,' though the latter is possible
    in context.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is commonly rendered 'saying' after a speech-introduction
    verb; this keeps the Greek structure visible without awkwardness.
- source_word: Δεῦρο
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: An idiomatic summons. 'Come' is concise and natural; 'Come here' is possible
    but slightly more explicit than necessary.
- source_word: δείξω σοι
  chosen: I will show you
  alternatives:
  - let me show you
  lexicon: BDAG
  rationale: Future indicative is best represented directly as 'I will show you.'
- source_word: τὸ κρίμα
  chosen: the judgment
  alternatives:
  - the condemnation
  - the punishment
  lexicon: BDAG
  rationale: κρίμα here refers to the judicial sentence/judgment about to be revealed
    against Babylon. 'Judgment' is broad enough to include both verdict and punitive
    outcome and fits apocalyptic usage.
- source_word: τῆς πόρνης τῆς μεγάλης
  chosen: of the great prostitute
  alternatives:
  - of the great harlot
  - of the great whore
  lexicon: BDAG
  rationale: πόρνη literally denotes a prostitute. 'Prostitute' is accurate, contemporary,
    and avoids archaic ('harlot') or overly coarse English while preserving the metaphor's
    force.
- source_word: τῆς καθημένης ἐπὶ ὑδάτων πολλῶν
  chosen: who sits on many waters
  alternatives:
  - who is seated on many waters
  - who sits by many waters
  lexicon: BDAG
  rationale: The participle καθημένης is most directly 'sitting/seated.' With ἐπί,
    the image is best preserved as 'sits on many waters,' especially since the symbolic
    explanation follows later in the chapter.
