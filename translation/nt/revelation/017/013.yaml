theological_decisions:
- issue: Rendering the idiom μίαν γνώμην ἔχουσιν in an apocalyptic-political context
  chosen_reading: These are of one mind
  alternative_readings:
  - These have one purpose
  rationale: The phrase can denote shared opinion, resolve, or purpose. 'Of one mind'
    preserves the Greek idiom and leaves the exact nuance broad, in keeping with the
    instruction to preserve theological and interpretive tension rather than over-resolve
    it.
  doctrine_reference: Translation philosophy §3
- issue: Distinguishing δύναμις and ἐξουσία
  chosen_reading: power and authority
  alternative_readings:
  - might and authority
  - power and right to rule
  rationale: Keeping both terms distinct avoids collapsing the text into a single
    concept and preserves the political-theological force of the beast receiving both
    effective power and ruling authority.
  doctrine_reference: Translation philosophy §5
