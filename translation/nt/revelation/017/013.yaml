id: REV.17.13
reference: Revelation 17:13
source:
  edition: SBLGNT
  text: οὗτοι μίαν ⸂γνώμην ἔχουσιν⸃, καὶ τὴν δύναμιν ⸀καὶ ἐξουσίαν αὐτῶν τῷ θηρίῳ
    διδόασιν.
translation:
  text: These are of one mind, and they give their power and authority to the beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “These have one purpose.” The Greek idiom literally says they “have
      one mind,” which can express shared resolve or purpose.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  chosen: These
  alternatives:
  - These ones
  lexicon: BDAG
  rationale: Demonstrative pronoun referring back to the ten kings; 'These' is natural
    English and preserves the deictic force without unnecessary awkwardness.
- source_word: μίαν γνώμην ἔχουσιν
  chosen: are of one mind
  alternatives:
  - have one purpose
  - have one opinion
  - have one resolve
  lexicon: BDAG
  rationale: The idiom literally means 'have one mind/opinion.' In context of unified
    political intent, 'are of one mind' is a clear English equivalent that preserves
    both unity and deliberative intent better than the narrower 'one opinion.'
- source_word: δύναμιν
  chosen: power
  alternatives:
  - might
  - strength
  lexicon: BDAG
  rationale: In apocalyptic-political context, δύναμις denotes effective power or
    might. 'Power' is the most standard and comprehensible rendering.
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - right to rule
  - jurisdiction
  lexicon: BDAG
  rationale: Distinct from δύναμις, ἐξουσία emphasizes delegated authority or ruling
    prerogative. 'Authority' preserves the distinction between capacity and legitimate
    rule.
- source_word: τὴν δύναμιν καὶ ἐξουσίαν αὐτῶν
  chosen: their power and authority
  alternatives:
  - their power and their authority
  lexicon: BDAG
  rationale: English naturally expresses the shared possessive once. Retaining both
    nouns is important because the Greek distinguishes two related but non-identical
    concepts.
- source_word: τῷ θηρίῳ
  chosen: to the beast
  lexicon: BDAG
  rationale: θηρίον in Revelation is the established apocalyptic figure conventionally
    rendered 'the beast.' The article is retained.
- source_word: διδόασιν
  chosen: they give
  alternatives:
  - they hand over
  - they grant
  lexicon: BDAG
  rationale: Present tense in visionary discourse is well represented by English present.
    'Give' is the direct lexical equivalent and avoids over-interpretive expansion.
