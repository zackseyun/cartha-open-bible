id: REV.17.5
reference: Revelation 17:5
source:
  edition: SBLGNT
  text: καὶ ἐπὶ τὸ μέτωπον αὐτῆς ὄνομα γεγραμμένον, μυστήριον, Βαβυλὼν ἡ μεγάλη, ἡ
    μήτηρ τῶν πορνῶν καὶ τῶν βδελυγμάτων τῆς γῆς.
translation:
  text: 'And on her forehead a name was written: Mystery, Babylon the Great, the mother
    of prostitutes and of the abominations of the earth.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''a name was written, a mystery: Babylon the Great, the mother of prostitutes
      and of the abominations of the earth,'' taking ''mystery'' as introducing the
      symbolic meaning of the name rather than as part of the inscription itself.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπὶ τὸ μέτωπον αὐτῆς
  chosen: on her forehead
  alternatives:
  - upon her forehead
  lexicon: BDAG
  rationale: A straightforward spatial phrase. 'On' is natural modern English for
    ἐπί with the accusative here, while preserving the image of an inscription placed
    on the forehead.
- source_word: ὄνομα γεγραμμένον
  chosen: a name was written
  alternatives:
  - a name written
  - a name inscribed
  lexicon: BDAG
  rationale: The participle γεγραμμένον is rendered with an English finite verb for
    natural readability. 'Was written' preserves the passive/resultative sense without
    over-literal awkwardness. 'Inscribed' is possible, but 'written' more directly
    reflects γράφω.
- source_word: μυστήριον
  chosen: Mystery
  alternatives:
  - a mystery
  - secret
  lexicon: BDAG
  rationale: Rendered as 'Mystery' because in context it functions as part of the
    written name/title on her forehead, not merely as a narrative aside. Capitalization
    reflects its role within the inscription. 'Secret' is too interpretive and weakens
    the apocalyptic/theological register.
- source_word: Βαβυλὼν ἡ μεγάλη
  chosen: Babylon the Great
  alternatives:
  - Babylon, the Great
  lexicon: BDAG
  rationale: Βαβυλών is a proper name and so transliterated per project philosophy.
    ἡ μεγάλη is rendered as the appositional title 'the Great,' yielding the conventional
    and natural English form 'Babylon the Great.'
- source_word: ἡ μήτηρ
  chosen: the mother
  alternatives:
  - mother
  lexicon: BDAG
  rationale: The article is naturally represented in English by 'the,' marking the
    title/apposition that follows.
- source_word: τῶν πορνῶν
  chosen: of prostitutes
  alternatives:
  - of whores
  - of sexually immoral women
  lexicon: BDAG
  rationale: πόρνη denotes a prostitute/whore. 'Prostitutes' is the clearest modern
    English rendering and avoids archaic harshness while preserving the sexual and
    moral imagery. 'Sexually immoral women' is too broad and interpretive.
- source_word: τῶν βδελυγμάτων
  chosen: of the abominations
  alternatives:
  - of abominable things
  - of detestable things
  lexicon: BDAG
  rationale: βδέλυγμα in apocalyptic and biblical usage commonly denotes something
    detestable, especially in an idolatrous or morally abhorrent sense. 'Abominations'
    preserves the biblical register and thematic resonance.
- source_word: τῆς γῆς
  chosen: of the earth
  alternatives:
  - of the land
  - on earth
  lexicon: BDAG
  rationale: γῆ can mean 'earth' or 'land.' In Revelation's global-apocalyptic scope,
    'earth' is the better fit. The genitive is retained as 'of the earth,' modifying
    both 'prostitutes' and 'abominations' through the title structure.
