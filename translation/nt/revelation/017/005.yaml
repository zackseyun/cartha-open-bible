theological_decisions:
- issue: Whether μυστήριον is part of the inscription or a narrative label introducing
    the name
  chosen_reading: 'It is included in the inscription: ''Mystery, Babylon the Great...''.'
  alternative_readings:
  - It introduces the symbolic meaning of the following name rather than belonging
    to the name itself.
  rationale: The punctuation of modern editions is interpretive, but the Greek sequence
    naturally allows μυστήριον to stand as part of the written name. This preserves
    the apocalyptic force of the inscription without flattening the symbolism. Because
    the alternative is viable, it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
