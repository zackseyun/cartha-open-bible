id: REV.17.17
reference: Revelation 17:17
source:
  edition: SBLGNT
  text: ὁ γὰρ θεὸς ἔδωκεν εἰς τὰς καρδίας αὐτῶν ποιῆσαι τὴν γνώμην αὐτοῦ, καὶ ποιῆσαι
    ⸂μίαν γνώμην⸃ καὶ δοῦναι τὴν βασιλείαν αὐτῶν τῷ θηρίῳ, ἄχρι ⸀τελεσθήσονται οἱ
    λόγοι τοῦ θεοῦ.
translation:
  text: For God put it into their hearts to carry out his purpose, and to act with
    one purpose and to give their kingdom to the beast, until the words of God are
    fulfilled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to be of one mind' or 'to have one purpose.' The Greek literally says
      'to make one purpose.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until the words of God are completed' or 'come to pass.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔδωκεν εἰς τὰς καρδίας αὐτῶν
  chosen: put it into their hearts
  alternatives:
  - gave into their hearts
  - placed in their hearts
  lexicon: BDAG
  rationale: This idiom means to cause or impel inwardly, not a literal transfer into
    physical hearts. 'Put it into their hearts' is natural English and preserves the
    metaphorical force of divine influence.
- source_word: ποιῆσαι τὴν γνώμην αὐτοῦ
  chosen: to carry out his purpose
  alternatives:
  - to do his mind
  - to accomplish his intention
  - to carry out his plan
  lexicon: BDAG
  rationale: γνώμη can denote purpose, intention, resolve, or decision. Here it refers
    to God's intended design in the apocalyptic sequence, so 'purpose' is clearer
    than the overly literal 'mind' or the narrower 'opinion'.
- source_word: γνώμη
  chosen: purpose
  alternatives:
  - intention
  - resolve
  - decision
  lexicon: BDAG
  rationale: In both occurrences the noun denotes deliberate intent rather than mere
    opinion. 'Purpose' works well in the first clause for God's intent and, with the
    modifier μίαν in the second clause, yields the idiomatic 'one purpose.'
- source_word: ποιῆσαι μίαν γνώμην
  chosen: to act with one purpose
  alternatives:
  - to be of one mind
  - to make one resolve
  - to have one purpose
  lexicon: BDAG
  rationale: The Greek is somewhat compressed literally ('to make one purpose'). The
    sense is unified intent among the kings. 'Act with one purpose' preserves the
    volitional force and reads naturally in English. 'Be of one mind' is possible
    but can sound more psychological than practical in this context.
- source_word: δοῦναι τὴν βασιλείαν αὐτῶν
  chosen: give their kingdom
  alternatives:
  - hand over their kingdom
  - give their royal power
  lexicon: BDAG
  rationale: βασιλεία can mean kingdom, reign, or royal authority. In this context
    of allied rulers yielding dominion to the beast, 'kingdom' is a straightforward
    rendering, while the singular with plural possessive is retained as in Greek.
- source_word: τῷ θηρίῳ
  chosen: to the beast
  lexicon: BDAG
  rationale: θηρίον is consistently rendered 'beast' in Revelation to preserve the
    book's imagery and intertextual coherence.
- source_word: ἄχρι τελεσθήσονται
  chosen: until ... are fulfilled
  alternatives:
  - until ... are completed
  - until ... come to pass
  lexicon: BDAG
  rationale: The future passive of τελέω here conveys reaching completion or fulfillment.
    'Are fulfilled' fits prophetic language in English and suits the object 'the words
    of God.'
- source_word: οἱ λόγοι τοῦ θεοῦ
  chosen: the words of God
  alternatives:
  - the sayings of God
  - the declarations of God
  lexicon: BDAG
  rationale: λόγοι can mean words, sayings, or messages. 'Words of God' is broad and
    dignified, preserving the prophetic register without over-specifying the form
    of the utterances.
