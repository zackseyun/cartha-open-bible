theological_decisions:
- issue: Divine sovereignty and human agency in the kings' actions
  chosen_reading: Render the verse in a way that states both God's causative action
    and the rulers' real actions without softening either.
  alternative_readings:
  - Use weaker language such as 'allowed' or 'permitted' for God's role
  - Use stronger deterministic paraphrase beyond the Greek
  rationale: The text explicitly says God 'put it into their hearts' to do his purpose,
    while also describing their own unified action in giving their kingdom to the
    beast. The translation preserves this tension rather than resolving it toward
    either mere permission or exhaustive paraphrased determinism.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
