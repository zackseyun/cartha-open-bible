theological_decisions:
- issue: Rendering the Lamb's title and victory language
  chosen_reading: Use 'the Lamb' and 'will conquer' to preserve Revelation's christological and thematic vocabulary.
  alternative_readings:
  - the lamb ... will overcome
  - the Lamb ... will be victorious
  rationale: The verse presents the exalted Jesus under Revelation's distinctive title ἀρνίον and uses νικάω, a recurring theological motif in the book. Preserving these terms supports intratextual coherence without adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Rendering κλητοὶ καὶ ἐκλεκτοὶ καὶ πιστοί
  chosen_reading: Translate as 'called and chosen and faithful' without resolving debates about the order of salvation or doctrinal systems.
  alternative_readings:
  - called, elect, and faithful
  - called and elect and loyal
  rationale: The text identifies those with the Lamb by three descriptors. The translation preserves the wording and theological tension rather than importing a specific denominational framework regarding calling and election.
  doctrine_reference: Affirmations paragraph 2; Translation philosophy §3
