id: REV.17.14
reference: Revelation 17:14
source:
  edition: SBLGNT
  text: οὗτοι μετὰ τοῦ ἀρνίου πολεμήσουσιν, καὶ τὸ ἀρνίον νικήσει αὐτούς, ὅτι κύριος κυρίων ἐστὶν καὶ βασιλεὺς βασιλέων, καὶ οἱ μετ’ αὐτοῦ κλητοὶ καὶ ἐκλεκτοὶ καὶ πιστοί.
translation:
  text: These will make war against the Lamb[a], and the Lamb will conquer them, because he is Lord of lords and King of kings, and those with him are called and chosen and faithful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'will make war with the Lamb'; in context this means they will wage war against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  chosen: These
  alternatives:
  - These ones
  - They
  lexicon: BDAG
  rationale: Demonstrative pronoun referring back to the allied kings/beastly forces in context. 'These' preserves the deictic force more closely than a simple 'they'.
- source_word: μετὰ τοῦ ἀρνίου
  chosen: against the Lamb
  alternatives:
  - with the Lamb
  lexicon: BDAG
  rationale: 'Although μετά with genitive normally means ''with,'' in this war context the idiomatic sense with πολεμέω is adversative: they wage war against the Lamb. Rendering ''with the Lamb'' in English would suggest alliance, the opposite of the sense.'
- source_word: ἀρνίον
  chosen: Lamb
  alternatives:
  - little lamb
  lexicon: BDAG
  rationale: Standard apocalyptic christological title in Revelation. 'Lamb' is the established and semantically appropriate rendering; the diminutive nuance is not naturally carried into English here.
- source_word: πολεμήσουσιν
  chosen: will make war
  alternatives:
  - will wage war
  - will fight
  lexicon: BDAG
  rationale: '''Make war'' preserves the elevated, apocalyptic register and the broader military sense better than the more generic ''fight.'''
- source_word: νικήσει
  chosen: will conquer
  alternatives:
  - will overcome
  - will be victorious over
  lexicon: BDAG
  rationale: In Revelation, νικάω is a key thematic verb often rendered 'conquer' or 'overcome.' 'Conquer' fits the martial context and preserves thematic consistency.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the Lamb's victory. 'Because' is clearer in modern English than 'for' while preserving the causal force.
- source_word: κύριος κυρίων
  chosen: Lord of lords
  alternatives:
  - lord of lords
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' Capitalization reflects titular use for the exalted Lamb.
- source_word: βασιλεὺς βασιλέων
  chosen: King of kings
  alternatives:
  - king of kings
  lexicon: BDAG
  rationale: Conventional superlative title expressing supreme royal authority. Capitalization reflects titular use.
- source_word: οἱ μετ’ αὐτοῦ
  chosen: those with him
  alternatives:
  - the ones with him
  - those who are with him
  lexicon: BDAG
  rationale: Natural English rendering of the substantival article plus prepositional phrase, referring to the Lamb's companions/allies.
- source_word: κλητοὶ
  chosen: called
  alternatives:
  - invited
  - summoned
  lexicon: BDAG
  rationale: '''Called'' preserves the theological and lexical resonance of κλητός in the New Testament without over-specifying whether the emphasis is invitation or effectual summons.'
- source_word: ἐκλεκτοὶ
  chosen: chosen
  alternatives:
  - elect
  lexicon: BDAG
  rationale: '''Chosen'' is more accessible modern English than ''elect'' while preserving the sense. It avoids importing later theological systematization into the translation itself.'
- source_word: πιστοί
  chosen: faithful
  alternatives:
  - believing
  - loyal
  lexicon: BDAG
  rationale: In this triad, 'faithful' best captures steadfast allegiance and reliability. 'Believing' is too narrow, and 'loyal' may underplay the covenantal/religious dimension.
