id: REV.17.15
reference: Revelation 17:15
source:
  edition: SBLGNT
  text: Καὶ λέγει μοι· Τὰ ὕδατα ἃ εἶδες, οὗ ἡ πόρνη κάθηται, λαοὶ καὶ ὄχλοι εἰσὶν
    καὶ ἔθνη καὶ γλῶσσαι.
translation:
  text: And he says to me, “The waters that you saw, where the prostitute sits, are
    peoples and multitudes and nations and languages.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “multitudes” for “crowds.”
    reason: lexical_alternative
  - marker: b
    text: Or “tongues”; here the sense is language groups.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει μοι
  chosen: he says to me
  alternatives:
  - he said to me
  lexicon: BDAG
  rationale: The Greek present λέγει is naturally rendered as a historical present
    in narrative. Keeping 'says' preserves the vividness of Revelation's style better
    than smoothing to past tense.
- source_word: ὕδατα
  chosen: waters
  alternatives:
  - water
  lexicon: BDAG
  rationale: Plural in Greek, so 'waters' is retained formally. In context it is symbolic,
    but the interpretation is supplied by the verse itself rather than by paraphrasing
    the noun.
- source_word: οὗ
  chosen: where
  alternatives:
  - on which
  - whereon
  lexicon: BDAG
  rationale: The relative adverb refers to location. 'Where' is idiomatic modern English
    and fits the image of the woman seated in relation to the waters.
- source_word: πόρνη
  chosen: prostitute
  alternatives:
  - whore
  - harlot
  lexicon: BDAG
  rationale: '''Prostitute'' is the clearest modern English equivalent. ''Whore''
    is harsher and potentially distracting; ''harlot'' is archaic. The term should
    retain its moral force without sounding antiquated.'
- source_word: κάθηται
  chosen: sits
  alternatives:
  - is seated
  - sits enthroned
  lexicon: BDAG
  rationale: The present middle/passive form is well represented by simple 'sits.'
    'Is seated' is possible but less direct; 'sits enthroned' adds nuance not explicit
    in the verb itself.
- source_word: λαοὶ
  chosen: peoples
  alternatives:
  - people
  lexicon: BDAG
  rationale: Plural 'peoples' best reflects distinct population groups rather than
    a collective singular. This preserves the distributive force of the apocalyptic
    interpretation.
- source_word: ὄχλοι
  chosen: crowds
  alternatives:
  - multitudes
  lexicon: BDAG
  rationale: '''Crowds'' is accessible modern English and preserves the sense of masses
    of people. ''Multitudes'' is traditional and possible, but slightly more elevated
    and less natural for the stated translation philosophy.'
- source_word: ἔθνη
  chosen: nations
  alternatives:
  - Gentiles
  - ethnic groups
  lexicon: BDAG
  rationale: In this list of human groupings, 'nations' is the most natural rendering.
    'Gentiles' would impose a Jew/Gentile contrast not signaled here; 'ethnic groups'
    is interpretive.
- source_word: γλῶσσαι
  chosen: languages
  alternatives:
  - tongues
  lexicon: BDAG
  rationale: In this stock apocalyptic formula, γλῶσσαι refers to language groups.
    'Languages' communicates clearly in modern English; 'tongues' is traditional but
    less transparent to contemporary readers.
