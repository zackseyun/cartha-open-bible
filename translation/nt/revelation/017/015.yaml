theological_decisions:
- issue: Symbolic interpretation of the waters
  chosen_reading: The main text preserves the angel's explanation that the waters
    symbolize human populations without expanding the symbolism further.
  alternative_readings:
  - The waters may imply political domains or masses under imperial influence, but
    these are interpretive extensions beyond the verse's wording.
  rationale: The verse itself interprets the symbol as peoples, crowds, nations, and
    languages. The translation should present that explanation plainly without importing
    a fuller theory of Babylon's identity or rule.
  doctrine_reference: Preserve theological tension rather than resolve it.
