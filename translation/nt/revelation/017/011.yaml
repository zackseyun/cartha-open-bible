theological_decisions:
- issue: Whether to specify the implied noun with 'eighth king'
  chosen_reading: Leave the predicate as 'an eighth' without supplying 'king' in the
    main text.
  alternative_readings:
  - an eighth king
  rationale: The immediate context discusses kings, so 'eighth king' is a plausible
    interpretive expansion. However, the Greek text here does not state βασιλεύς.
    To preserve the text's terseness and symbolic ambiguity, the main text leaves
    the noun implicit and preserves the interpretive alternative in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Whether ἐκ τῶν ἑπτά should be rendered more interpretively as 'one of the
    seven'
  chosen_reading: Render as 'from the seven.'
  alternative_readings:
  - one of the seven
  - out of the seven
  rationale: The phrase indicates derivation or relation to the seven, but the exact
    nuance is debated. 'From the seven' preserves the theological tension and symbolic
    ambiguity rather than resolving it into a more specific identification.
  doctrine_reference: Translation philosophy §§1, 3
