id: REV.17.11
reference: Revelation 17:11
source:
  edition: SBLGNT
  text: καὶ τὸ θηρίον ὃ ἦν καὶ οὐκ ἔστιν. καὶ ⸀αὐτὸς ὄγδοός ἐστιν καὶ ἐκ τῶν ἑπτά
    ἐστιν, καὶ εἰς ἀπώλειαν ὑπάγει.
translation:
  text: And the beast that was and is not is itself an eighth and is from the seven,
    and it goes to destruction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the beast ... is itself an eighth king'; the noun 'king' is implied
      from the context but not stated in Greek.
    reason: alternative_reading
  - marker: b
    text: Or 'one of the seven.' The Greek more literally says 'from the seven,' which
      may indicate origin, membership, or close relation.
    reason: lexical_alternative
lexical_decisions:
- source_word: θηρίον
  chosen: beast
  alternatives:
  - animal
  - wild beast
  lexicon: BDAG
  rationale: In Revelation, θηρίον is the established apocalyptic term for the monstrous
    political-spiritual power opposed to God. 'Beast' preserves the symbolic and intertextual
    force better than more generic alternatives.
- source_word: ὃ ἦν καὶ οὐκ ἔστιν
  chosen: that was and is not
  alternatives:
  - which existed and does not exist
  - that was and is no more
  lexicon: BDAG
  rationale: This keeps the stark verbal parallelism of the Greek and echoes the recurring
    formula in the chapter. 'Is not' is more formally aligned than 'is no more' and
    avoids over-interpreting temporality.
- source_word: αὐτὸς
  chosen: itself
  alternatives:
  - he himself
  - it
  lexicon: BDAG
  rationale: Although αὐτός is morphologically masculine here, its referent is the
    neuter θηρίον. English idiom naturally uses 'itself' for agreement with 'beast'
    as a symbolic entity. This preserves emphasis without implying a male personal
    referent.
- source_word: ὄγδοός
  chosen: an eighth
  alternatives:
  - the eighth
  - an eighth king
  lexicon: BDAG
  rationale: The predicate adjective lacks an explicit noun. 'An eighth' is the most
    literal and leaves the implied category to the context of the seven kings in the
    surrounding verses. Supplying 'king' in the main text would interpret rather than
    translate.
- source_word: ἐκ τῶν ἑπτά
  chosen: from the seven
  alternatives:
  - one of the seven
  - out of the seven
  lexicon: BDAG
  rationale: 'The preposition ἐκ most directly means ''from/out of.'' ''From the seven''
    preserves the ambiguity: the beast is related to the seven without forcing the
    more specific interpretive gloss ''one of the seven,'' though that is contextually
    plausible.'
- source_word: εἰς ἀπώλειαν
  chosen: to destruction
  alternatives:
  - to perdition
  - to ruin
  lexicon: BDAG
  rationale: ἀπώλεια here denotes eschatological destruction or doom. 'Destruction'
    is clear modern English and avoids the archaic or jargon-heavy feel of 'perdition,'
    while retaining the gravity of the term.
- source_word: ὑπάγει
  chosen: it goes
  alternatives:
  - it is going
  - it departs
  - it goes away
  lexicon: BDAG
  rationale: The present tense is rendered simply as 'goes' in idiomatic English.
    This preserves the vividness of the Greek without adding aspectual nuance beyond
    the text.
