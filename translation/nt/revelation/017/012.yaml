theological_decisions:
- issue: Whether to interpret the ten kings as literal monarchs or symbolic rulers/powers in the main text
  chosen_reading: Retain the literal lexical rendering 'ten kings' and allow the apocalyptic symbolism to stand without interpretive expansion.
  alternative_readings:
  - ten symbolic rulers or kingdoms
  - ten political powers
  rationale: The Greek explicitly says 'ten kings,' while the broader context signals symbolic apocalyptic imagery. The translation should preserve that tension rather than resolve it by paraphrase.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Whether μίαν ὥραν should be interpreted in the main text as a literal hour or as a figurative short period
  chosen_reading: Render 'for one hour' in the main text and preserve the figurative possibility in a footnote.
  alternative_readings:
  - for a brief time
  - for a short while
  rationale: The phrase is formally 'one hour,' but in apocalyptic discourse it likely denotes brevity. The translation preserves the source expression while documenting the interpretive alternative.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
