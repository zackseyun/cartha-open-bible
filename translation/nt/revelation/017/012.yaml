id: REV.17.12
reference: Revelation 17:12
source:
  edition: SBLGNT
  text: καὶ τὰ δέκα κέρατα ἃ εἶδες δέκα βασιλεῖς εἰσιν, οἵτινες βασιλείαν οὔπω ἔλαβον, ἀλλὰ ἐξουσίαν ὡς βασιλεῖς μίαν ὥραν λαμβάνουσιν μετὰ τοῦ θηρίου.
translation:
  text: And the ten horns that you saw are ten kings[a], who have not yet received a kingdom, but they receive authority as kings for one hour with the beast.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'for a brief time.' The expression 'one hour' likely signifies a short, limited period in apocalyptic imagery.
    reason: lexical_alternative
lexical_decisions:
- source_word: κέρατα
  chosen: horns
  alternatives:
  - powers
  lexicon: BDAG
  rationale: Rendered literally as 'horns' to preserve the apocalyptic imagery; the symbolic sense is explained by the following identification with kings rather than paraphrased in the main text.
- source_word: βασιλεῖς
  chosen: kings
  alternatives:
  - rulers
  lexicon: BDAG
  rationale: The standard sense is 'kings.' Although symbolic or broader political rulers may be in view, 'kings' best matches the lexical meaning and the apocalyptic register.
- source_word: βασιλείαν
  chosen: a kingdom
  alternatives:
  - royal power
  - kingship
  lexicon: BDAG
  rationale: Here the noun most naturally refers to a realm or reign not yet received. 'A kingdom' is idiomatic and preserves the distinction from the later 'authority' (ἐξουσίαν).
- source_word: οὔπω
  chosen: not yet
  alternatives:
  - not as yet
  lexicon: BDAG
  rationale: Straightforward temporal negation indicating that their reception of a kingdom lies in the future relative to the vision.
- source_word: ἔλαβον
  chosen: have not yet received
  alternatives:
  - did not yet receive
  lexicon: BDAG
  rationale: 'The aorist is rendered idiomatically in English with present relevance: they stand as those who have not yet received a kingdom.'
- source_word: ἐξουσίαν
  chosen: authority
  alternatives:
  - power
  - right to rule
  lexicon: BDAG
  rationale: '''Authority'' best captures delegated or granted ruling power and avoids collapsing it into ''kingdom,'' which is a different noun in the same sentence.'
- source_word: ὡς βασιλεῖς
  chosen: as kings
  alternatives:
  - like kings
  lexicon: BDAG
  rationale: This phrase indicates the manner or status in which they receive authority. 'As kings' is the most natural and direct rendering.
- source_word: μίαν ὥραν
  chosen: for one hour
  alternatives:
  - for a brief time
  lexicon: BDAG
  rationale: Rendered formally as 'for one hour' to preserve the apocalyptic expression. Its likely figurative sense of brevity is important but should be preserved in a footnote rather than paraphrased away in the text.
- source_word: λαμβάνουσιν
  chosen: they receive
  alternatives:
  - they are receiving
  - they will receive
  lexicon: BDAG
  rationale: The present tense is retained as 'they receive,' fitting the vivid style of apocalyptic narration. A future nuance is possible in context, but the Greek present is best represented directly.
- source_word: μετὰ τοῦ θηρίου
  chosen: with the beast
  alternatives:
  - along with the beast
  lexicon: BDAG
  rationale: '''With the beast'' is the natural rendering of μετά with the genitive here, indicating association or alliance.'
- source_word: θηρίου
  chosen: the beast
  alternatives:
  - the wild beast
  lexicon: BDAG
  rationale: '''The beast'' is the established and accurate rendering in Revelation for θηρίον, preserving the book''s imagery and intertextual consistency.'
