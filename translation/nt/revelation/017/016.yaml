theological_decisions:
- issue: Referent and number agreement of "the ten horns ... and the beast" with plural verbs
  chosen_reading: 'Translate the clause as a collective subject followed by an emphatic plural resumptive pronoun: "the ten horns that you saw, and the beast—these will..."'
  alternative_readings:
  - Smooth to "the ten horns you saw and the beast will..."
  - Interpret the beast as appositional to the horns
  rationale: The Greek has a mixed construction in which neuter plural imagery plus singular θηρίον is resumed by masculine plural οὗτοι with plural verbs. Preserving this in readable English best reflects the source and keeps the focus on the allied agents acting together against the prostitute.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Nature of the imagery involving the prostitute's destruction
  chosen_reading: Preserve the apocalyptic metaphor without softening or over-explaining it in the main text.
  alternative_readings:
  - Interpret the prostitute directly as a city/system in the translation
  rationale: The verse presents symbolic judgment imagery. The translation should retain the metaphorical language used by the text itself rather than resolve the symbol into an interpretation in the main text.
  doctrine_reference: Translation philosophy §§1, 3
