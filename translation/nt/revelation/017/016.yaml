id: REV.17.16
reference: Revelation 17:16
source:
  edition: SBLGNT
  text: καὶ τὰ δέκα κέρατα ἃ εἶδες καὶ τὸ θηρίον, οὗτοι μισήσουσι τὴν πόρνην, καὶ ἠρημωμένην ποιήσουσιν αὐτὴν καὶ ⸀γυμνήν, καὶ τὰς σάρκας αὐτῆς φάγονται, καὶ αὐτὴν κατακαύσουσιν ἐν πυρί·
translation:
  text: And the ten horns that you saw[a], and the beast—these will hate the prostitute, and they will make her desolate and naked, and they will eat her flesh[b], and they will burn her up with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "stripped bare." The Greek says "naked," with the sense of public humiliation and exposure.
    reason: lexical_alternative
  - marker: b
    text: '"Flesh" is literal here; within Revelation''s apocalyptic imagery, the expression depicts total violent destruction.'
    reason: cultural_note
lexical_decisions:
- source_word: κέρατα
  chosen: horns
  alternatives:
  - kings
  - powers
  lexicon: BDAG
  rationale: Rendered literally as "horns" because the Greek uses the apocalyptic symbol itself here, not its interpretation. The symbolic referent is explained in the surrounding context, but the verse's wording should preserve the imagery.
- source_word: θηρίον
  chosen: beast
  alternatives:
  - monster
  lexicon: BDAG
  rationale: Standard apocalyptic rendering preserving the symbolic and ominous force of θηρίον without paraphrase.
- source_word: πόρνην
  chosen: prostitute
  alternatives:
  - harlot
  - whore
  lexicon: BDAG
  rationale: '"Prostitute" is the clearest modern English equivalent. "Harlot" is traditional but archaic; "whore" is more pejorative in contemporary English than the lexical value alone requires.'
- source_word: μισήσουσι
  chosen: will hate
  alternatives:
  - will detest
  lexicon: BDAG
  rationale: Direct future rendering of μισέω. "Hate" is the plain sense and fits the violent sequence that follows.
- source_word: ἠρημωμένην ποιήσουσιν
  chosen: will make her desolate
  alternatives:
  - will lay her waste
  - will devastate her
  lexicon: BDAG
  rationale: This construction means to cause her to become desolate or devastated. "Make her desolate" preserves the resultative force and echoes biblical judgment language.
- source_word: γυμνήν
  chosen: naked
  alternatives:
  - bare
  - stripped bare
  lexicon: BDAG
  rationale: '"Naked" is the direct lexical equivalent. Although "stripped bare" captures the implied humiliation, the Greek adjective itself is simply "naked," so the more literal rendering is preferred.'
- source_word: σάρκας
  chosen: flesh
  alternatives:
  - body
  - meat
  lexicon: BDAG
  rationale: Per project guidance, σάρξ is rendered "flesh" in literal contexts. Here the image is violent and literal within apocalyptic symbolism, so "flesh" is preferable to the more interpretive "body."
- source_word: φάγονται
  chosen: will eat
  alternatives:
  - will devour
  lexicon: BDAG
  rationale: The verb ἐσθίω means "eat." "Devour" is possible stylistically, but "eat" better reflects the lexical form while still conveying the gruesome image in context.
- source_word: κατακαύσουσιν ἐν πυρί
  chosen: will burn her up with fire
  alternatives:
  - will burn her with fire
  - will completely burn her in fire
  lexicon: BDAG
  rationale: κατακαίω intensifies the idea of burning, so "burn her up" reflects the compound verb's force. ἐν πυρί is rendered idiomatically as "with fire" in English.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - they
  lexicon: BDAG
  rationale: Retained as "these" after the dash to reflect the emphatic resumptive pronoun that points back to "the ten horns ... and the beast."
