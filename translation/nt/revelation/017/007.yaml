theological_decisions:
- issue: Referent of the relative description 'which has the seven heads and the ten
    horns'
  chosen_reading: Attach the description to 'the beast' rather than to the woman or
    to the combined mystery.
  alternative_readings:
  - A looser rendering could leave the syntax more ambiguous in English.
  rationale: The genitive participles τοῦ βαστάζοντος and τοῦ ἔχοντος are masculine/neuter
    singular agreeing with θηρίου, not with γυναικός. English therefore should make
    clear that the beast is the one carrying the woman and possessing the seven heads
    and ten horns.
  doctrine_reference: Preserve theological tension rather than resolve it; here the
    Greek syntax is sufficiently clear, so the translation should reflect that clarity.
