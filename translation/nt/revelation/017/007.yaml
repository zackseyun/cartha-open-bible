id: REV.17.7
reference: Revelation 17:7
source:
  edition: SBLGNT
  text: καὶ εἶπέν μοι ὁ ἄγγελος· Διὰ τί ἐθαύμασας; ἐγὼ ἐρῶ σοι τὸ μυστήριον τῆς γυναικὸς
    καὶ τοῦ θηρίου τοῦ βαστάζοντος αὐτήν, τοῦ ἔχοντος τὰς ἑπτὰ κεφαλὰς καὶ τὰ δέκα
    κέρατα·
translation:
  text: And the angel said to me, “Why did you marvel? I will tell you the mystery
    of the woman and of the beast that carries her, which has the seven heads and
    the ten horns.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bears her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμασας
  chosen: did you marvel
  alternatives:
  - were you astonished
  - did you wonder
  lexicon: BDAG
  rationale: θαυμάζω denotes amazement or wonder. 'Marvel' preserves the elevated
    but still readable tone of apocalyptic discourse and matches the aorist interrogative
    well. 'Wonder' could suggest mere curiosity rather than astonishment.
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: μυστήριον in Revelation commonly refers to a hidden reality now disclosed,
    not merely a puzzle. 'Mystery' preserves this apocalyptic-theological sense better
    than 'secret,' while remaining standard English.
- source_word: γυναικός
  chosen: woman
  alternatives:
  - wife
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife,' but here the figure is symbolic and
    no marital relation is in view in the immediate phrase. 'Woman' is the natural
    and contextually accurate rendering.
- source_word: θηρίου
  chosen: beast
  alternatives:
  - creature
  lexicon: BDAG
  rationale: θηρίον in Revelation is a loaded apocalyptic term consistently rendered
    'beast.' This preserves intertextual continuity within the book and the term's
    hostile, monstrous connotations.
- source_word: βαστάζοντος
  chosen: carries
  alternatives:
  - bears
  - supports
  lexicon: BDAG
  rationale: βαστάζω can mean carry, bear, or support. 'Carries' is the clearest modern
    English choice for the image of the woman riding on the beast, while still covering
    the participial force.
- source_word: ἔχοντος
  chosen: which has
  alternatives:
  - having
  lexicon: BDAG
  rationale: The participle modifies 'beast.' Rendering it as a relative clause ('which
    has') produces natural English without losing the descriptive linkage.
- source_word: κεφαλάς
  chosen: heads
  lexicon: BDAG
  rationale: Literal anatomical imagery is central to the vision and should be preserved.
- source_word: κέρατα
  chosen: horns
  lexicon: BDAG
  rationale: Literal 'horns' preserves the symbolic imagery used throughout apocalyptic
    literature and Revelation itself.
- source_word: Διὰ τί
  chosen: Why
  alternatives:
  - For what reason
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the interrogative phrase; concise and
    natural in English.
- source_word: ἐρῶ σοι
  chosen: I will tell you
  alternatives:
  - I will explain to you
  - I will speak to you of
  lexicon: BDAG
  rationale: Future of λέγω here introduces the angel's forthcoming explanation. 'I
    will tell you' is direct and natural, fitting the revelatory context.
