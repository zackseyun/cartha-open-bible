theological_decisions:
- issue: Interpretation of ἐν πνεύματι
  chosen_reading: Rendered 'in the Spirit' to indicate prophetic transport under the
    Spirit's agency.
  alternative_readings:
  - in spirit
  rationale: The phrase in Revelation repeatedly introduces visionary experience.
    The translation preserves the likely theological sense without expanding it into
    a doctrinal paraphrase. Because capitalization is interpretive in English, the
    alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
