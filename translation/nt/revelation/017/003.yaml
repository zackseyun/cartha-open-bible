id: REV.17.3
reference: Revelation 17:3
source:
  edition: SBLGNT
  text: καὶ ἀπήνεγκέν με εἰς ἔρημον ἐν πνεύματι. καὶ εἶδον γυναῖκα καθημένην ἐπὶ θηρίον
    κόκκινον, ⸀γέμοντα ὀνόματα βλασφημίας, ⸀ἔχων κεφαλὰς ἑπτὰ καὶ κέρατα δέκα.
translation:
  text: And he carried me away in the Spirit into a wilderness. And I saw a woman
    sitting on a scarlet beast, full of blasphemous names, having seven heads and
    ten horns.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in spirit." The Greek phrase can denote a spiritual state or being carried
      along by the Spirit; in Revelation it commonly introduces a visionary experience.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπήνεγκέν
  chosen: carried ... away
  alternatives:
  - bore away
  - took away
  lexicon: BDAG
  rationale: Aorist of ἀποφέρω here describes being transported from one place to
    another in visionary experience. 'Carried away' is natural English and preserves
    the force of removal/transport.
- source_word: εἰς ἔρημον
  chosen: into a wilderness
  alternatives:
  - into the wilderness
  - into a desert
  lexicon: BDAG
  rationale: ἔρημος can denote desert, wilderness, or desolate place. The anarthrous
    form favors an indefinite sense, so 'into a wilderness' best reflects the Greek
    without over-specifying a sandy desert.
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - in spirit
  lexicon: BDAG
  rationale: In Revelation this phrase commonly marks prophetic visionary state and
    is conventionally rendered 'in the Spirit.' Capitalization reflects the likely
    reference to the Holy Spirit's agency in prophetic transport, though the Greek
    manuscripts themselves do not mark case.
- source_word: γυναῖκα
  chosen: a woman
  lexicon: BDAG
  rationale: Straightforward accusative object of εἶδον; 'woman' is the natural and
    contextually correct rendering.
- source_word: καθημένην ἐπὶ
  chosen: sitting on
  alternatives:
  - seated on
  lexicon: BDAG
  rationale: The participle with ἐπί indicates position upon the beast. 'Sitting on'
    is idiomatic and vivid.
- source_word: θηρίον
  chosen: beast
  alternatives:
  - wild beast
  lexicon: BDAG
  rationale: In Revelation θηρίον is a loaded apocalyptic term regularly rendered
    'beast.' 'Wild beast' is possible lexically but less idiomatic in this book's
    established imagery.
- source_word: κόκκινον
  chosen: scarlet
  alternatives:
  - red
  - crimson
  lexicon: BDAG
  rationale: κόκκινος denotes a vivid red/scarlet color. 'Scarlet' is the most precise
    and traditional English equivalent, fitting the symbolic color imagery of the
    passage.
- source_word: γέμοντα ὀνόματα βλασφημίας
  chosen: full of blasphemous names
  alternatives:
  - covered with blasphemous names
  - full of names of blasphemy
  lexicon: BDAG
  rationale: 'γέμοντα means ''being full of.'' The genitive βλασφημίας is best taken
    attributively/descriptively: names characterized by blasphemy. ''Blasphemous names''
    is clear modern English while preserving the sense.'
- source_word: ἔχων
  chosen: having
  alternatives:
  - with
  lexicon: BDAG
  rationale: The participle further describes the beast. 'Having' keeps the participial
    linkage and the descriptive sequence of the Greek.
- source_word: κεφαλὰς ἑπτὰ
  chosen: seven heads
  lexicon: BDAG
  rationale: Direct and literal rendering of the accusative phrase.
- source_word: κέρατα δέκα
  chosen: ten horns
  lexicon: BDAG
  rationale: Direct and literal rendering of the accusative phrase; standard apocalyptic
    imagery should be preserved.
