id: REV.17.6
reference: Revelation 17:6
source:
  edition: SBLGNT
  text: καὶ εἶδον τὴν γυναῖκα μεθύουσαν ἐκ τοῦ αἵματος τῶν ἁγίων ⸀καὶ ἐκ τοῦ αἵματος
    τῶν μαρτύρων Ἰησοῦ. Καὶ ἐθαύμασα ἰδὼν αὐτὴν θαῦμα μέγα·
translation:
  text: And I saw the woman drunk with the blood of the saints and with the blood
    of the witnesses of Jesus. And when I saw her, I marveled greatly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the martyrs of Jesus.' The Greek word can mean 'witnesses' or 'martyrs';
      here the mention of their blood makes the martyr sense especially fitting.
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθύουσαν
  chosen: drunk with
  alternatives:
  - intoxicated from
  - drunken from
  lexicon: BDAG
  rationale: The participle describes the woman's state. In English, 'drunk with'
    is the most natural idiom for figurative intoxication by bloodshed and preserves
    the shocking imagery better than a more literal but awkward 'drunken from' or
    'intoxicated from'.
- source_word: ἐκ τοῦ αἵματος
  chosen: with the blood of
  alternatives:
  - from the blood of
  - by the blood of
  lexicon: BDAG
  rationale: Although ἐκ literally means 'from/out of,' with μεθύω English idiom normally
    uses 'drunk with.' This preserves the sense without flattening the source image.
- source_word: τῶν ἁγίων
  chosen: the saints
  alternatives:
  - the holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Revelation commonly refers to God's consecrated people. 'Saints'
    is concise, traditional, and still readily understood in this context; 'holy ones'
    is possible but less idiomatic here.
- source_word: τῶν μαρτύρων Ἰησοῦ
  chosen: the witnesses of Jesus
  alternatives:
  - the martyrs of Jesus
  - the witnesses for Jesus
  - those who bore witness to Jesus
  lexicon: BDAG
  rationale: μάρτυς can mean 'witness' or, by development, 'martyr.' The immediate
    context already speaks of their blood, so martyrdom is implied, but the lexical
    core is 'witnesses.' The genitive Ἰησοῦ is rendered 'of Jesus,' allowing the phrase
    to retain its compactness and possible nuance of belonging to or bearing testimony
    about Jesus.
- source_word: ἐθαύμασα
  chosen: I marveled
  alternatives:
  - I was amazed
  - I wondered
  lexicon: BDAG
  rationale: θαυμάζω denotes amazement or wonder. 'I marveled' preserves the elevated
    tone and avoids the ambiguity of English 'wondered,' which can suggest uncertainty
    rather than astonishment.
- source_word: ἰδὼν αὐτὴν
  chosen: when I saw her
  alternatives:
  - seeing her
  - at the sight of her
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered in English as a temporal
    clause here. 'When I saw her' is smoother and clearly conveys the relation to
    the main verb.
- source_word: θαῦμα μέγα
  chosen: greatly
  alternatives:
  - with great wonder
  - a great marvel
  lexicon: BDAG
  rationale: The cognate accusative intensifies the verb rather than introducing a
    separate object. Rendering it adverbially as 'greatly' produces natural English
    while preserving the emphasis. A more literal 'I marveled a great marvel' would
    be unnatural.
