theological_decisions:
- issue: Meaning of μάρτυρες in apocalyptic persecution context
  chosen_reading: Rendered as 'witnesses' in the main text, with 'martyrs' preserved
    as a lexical alternative.
  alternative_readings:
  - martyrs of Jesus
  rationale: The noun's primary sense is 'witnesses,' and Revelation often emphasizes
    testimony. Because their blood is mentioned, the martyr sense is contextually
    present, but the translation preserves the lexical core in the main text and notes
    the alternative.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 5
