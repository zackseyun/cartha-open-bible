theological_decisions:
- issue: Whether to interpret πορνεύω/πορνεία explicitly as idolatry or political-religious
    unfaithfulness in the main text
  chosen_reading: Retain the sexual-immorality imagery in the main text without interpretive
    paraphrase
  alternative_readings:
  - committed spiritual adultery
  - were immoral with her in idolatrous alliance
  rationale: Revelation intentionally uses sexual imagery to depict covenantal and
    political corruption. Preserving the literal metaphor maintains the text's theological
    tension and symbolic richness rather than collapsing it into one interpretive
    explanation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
