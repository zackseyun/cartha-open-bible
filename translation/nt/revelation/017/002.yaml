id: REV.17.2
reference: Revelation 17:2
source:
  edition: SBLGNT
  text: μεθ’ ἧς ἐπόρνευσαν οἱ βασιλεῖς τῆς γῆς, καὶ ἐμεθύσθησαν οἱ κατοικοῦντες τὴν
    γῆν ἐκ τοῦ οἴνου τῆς πορνείας αὐτῆς.
translation:
  text: with whom the kings of the earth committed sexual immorality, and those who
    dwell on the earth became drunk from the wine of her sexual immorality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with her.'
    reason: lexical_alternative
  - marker: b
    text: The language of 'sexual immorality' here likely functions symbolically for
      corrupt, idolatrous, or unfaithful alliance, while retaining the force of the
      sexual metaphor.
    reason: cultural_note
  - marker: c
    text: Or 'the inhabitants of the earth.'
    reason: lexical_alternative
  - marker: d
    text: Or 'of her prostitution.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεθ’ ἧς
  chosen: with whom
  alternatives:
  - with her
  lexicon: BDAG
  rationale: The relative pronoun links back to the woman of the previous verse. 'With
    whom' preserves the Greek relative construction more transparently than the smoother
    but less formally corresponding 'with her'.
- source_word: ἐπόρνευσαν
  chosen: committed sexual immorality
  alternatives:
  - committed fornication
  - acted immorally
  - committed adultery
  lexicon: BDAG
  rationale: πορνεύω literally denotes sexual immorality, but in Revelation it also
    carries metaphorical force for idolatrous/political unfaithfulness. 'Committed
    sexual immorality' preserves the sexual imagery without prematurely reducing it
    to a purely metaphorical paraphrase.
- source_word: οἱ βασιλεῖς τῆς γῆς
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: BDAG
  rationale: γῆ in Revelation commonly has a broad world-oriented sense. 'Of the earth'
    matches Johannine-apocalyptic usage and preserves the recurring phrase.
- source_word: ἐμεθύσθησαν
  chosen: became drunk
  alternatives:
  - were made drunk
  - got drunk
  lexicon: BDAG
  rationale: The aorist passive can be rendered naturally in English as 'became drunk,'
    which preserves the resultant state without awkwardness. 'Were made drunk' is
    possible but less idiomatic here.
- source_word: οἱ κατοικοῦντες τὴν γῆν
  chosen: those who dwell on the earth
  alternatives:
  - the inhabitants of the earth
  - those living on the earth
  lexicon: BDAG
  rationale: This is a stock phrase in Revelation. 'Those who dwell on the earth'
    preserves the verbal aspect and intertextual consistency better than the more
    compressed 'inhabitants of the earth.'
- source_word: ἐκ τοῦ οἴνου
  chosen: from the wine
  alternatives:
  - by the wine
  - with the wine
  lexicon: BDAG
  rationale: ἐκ here marks source/cause. 'From the wine' is a transparent rendering
    that keeps the metaphor intact; English readers can infer causal force from context.
- source_word: τῆς πορνείας αὐτῆς
  chosen: of her sexual immorality
  alternatives:
  - of her prostitution
  - of her fornication
  lexicon: BDAG
  rationale: πορνεία is rendered consistently with the cognate verb ἐπόρνευσαν as
    'sexual immorality.' 'Prostitution' is possible, especially given the harlot imagery
    in context, but 'sexual immorality' better preserves the broader semantic range
    while retaining the metaphorical/theological force.
