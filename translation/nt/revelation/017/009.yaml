theological_decisions:
- issue: Symbolic identification of the seven heads
  chosen_reading: Retain the symbolic correspondences in translation without resolving whether the mountains and kings refer specifically to Rome, emperors, kingdoms, or another apocalyptic schema.
  alternative_readings:
  - Interpret 'seven mountains' as Rome's seven hills
  - Interpret 'seven kings' as seven kingdoms or rulers in a broader symbolic sense
  rationale: The verse itself gives symbolic identifications but does not require the translator to settle the historical referent. Per translation philosophy, theological and interpretive tension should be preserved rather than resolved in the main text.
  doctrine_reference: Translation philosophy §3
