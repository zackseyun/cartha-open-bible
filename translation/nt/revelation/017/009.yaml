id: REV.17.9
reference: Revelation 17:9
source:
  edition: SBLGNT
  text: Ὧδε ὁ νοῦς ὁ ἔχων σοφίαν. αἱ ἑπτὰ κεφαλαὶ ἑπτὰ ὄρη εἰσίν, ὅπου ἡ γυνὴ κάθηται ἐπ’ αὐτῶν. καὶ βασιλεῖς ⸂ἑπτά εἰσιν⸃·
translation:
  text: 'Here is the mind that has wisdom: the seven heads are seven mountains on which the woman sits[a], and they are seven kings.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven hills.' The Greek word can refer to mountains or hills; 'mountains' is the more direct rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὧδε
  chosen: Here is
  alternatives:
  - Here
  - This is
  lexicon: BDAG
  rationale: Introduces an explanatory statement. 'Here is' gives natural English while preserving the demonstrative force better than a bare 'Here.'
- source_word: ὁ νοῦς ὁ ἔχων σοφίαν
  chosen: the mind that has wisdom
  alternatives:
  - the mind with wisdom
  - a mind with wisdom
  - the mind that has insight
  lexicon: BDAG
  rationale: A fairly literal rendering preserves the idiom of discernment required for interpretation. 'Mind' reflects νοῦς, and 'has wisdom' keeps the participial construction without over-paraphrasing.
- source_word: αἱ ἑπτὰ κεφαλαὶ
  chosen: the seven heads
  lexicon: BDAG
  rationale: Straightforward symbolic term; 'heads' should be retained rather than interpreted.
- source_word: ἑπτὰ ὄρη
  chosen: seven mountains
  alternatives:
  - seven hills
  lexicon: BDAG
  rationale: ὄρη normally means 'mountains.' Although 'seven hills' is a common interpretive rendering in connection with Rome, the Greek term itself is broader and should be translated directly; the alternative is preserved in a footnote.
- source_word: ὅπου
  chosen: where
  alternatives:
  - on which
  lexicon: BDAG
  rationale: The adverb naturally means 'where.' Some English versions smooth the sense toward 'on which' because of the following ἐπ’ αὐτῶν, but 'where' better reflects the Greek wording.
- source_word: ἡ γυνὴ
  chosen: the woman
  lexicon: BDAG
  rationale: Retains the symbolic figure without interpretive expansion.
- source_word: κάθηται ἐπ’ αὐτῶν
  chosen: sits on them
  alternatives:
  - is seated on them
  - sits upon them
  lexicon: BDAG
  rationale: κάθηται is present middle/passive in form but active in sense, and ἐπί with the genitive here conveys position/rest. 'Sits on them' is natural and sufficiently literal.
- source_word: καὶ βασιλεῖς ἑπτά εἰσιν
  chosen: and they are seven kings
  alternatives:
  - and there are seven kings
  - and seven kings they are
  lexicon: BDAG
  rationale: The clause is elliptical in English unless the implied subject is supplied from the previous phrase. 'They are seven kings' preserves the appositional identification of the seven heads with seven kings more clearly than a detached 'and there are seven kings.'
