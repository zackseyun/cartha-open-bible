theological_decisions:
- issue: Rendering πορνεία in an apocalyptic context where the woman symbolizes corrupt,
    idolatrous unfaithfulness
  chosen_reading: sexual immorality
  alternative_readings:
  - prostitution
  - fornication
  rationale: The imagery likely evokes both literal sexual immorality and metaphorical
    spiritual corruption/idolatry. 'Sexual immorality' preserves the lexical breadth
    and theological tension rather than collapsing the image into only commercial
    prostitution or only literal fornication.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
