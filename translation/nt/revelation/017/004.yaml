id: REV.17.4
reference: Revelation 17:4
source:
  edition: SBLGNT
  text: καὶ ἡ γυνὴ ἦν περιβεβλημένη πορφυροῦν καὶ κόκκινον, ⸀καὶ κεχρυσωμένη ⸀χρυσίῳ
    καὶ λίθῳ τιμίῳ καὶ μαργαρίταις, ἔχουσα ποτήριον χρυσοῦν ἐν τῇ χειρὶ αὐτῆς γέμον
    βδελυγμάτων καὶ τὰ ἀκάθαρτα τῆς πορνείας αὐτῆς,
translation:
  text: And the woman was clothed in purple and scarlet, and adorned with gold and
    precious stones and pearls, holding in her hand a golden cup full of abominations
    and the impurities of her sexual immorality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'prostitution' or 'fornication' for 'sexual immorality'; the Greek can
      carry both literal and metaphorical force in Revelation.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβεβλημένη
  chosen: was clothed
  alternatives:
  - was dressed
  - was arrayed
  lexicon: BDAG
  rationale: Perfect participle with ἦν forms a periphrastic construction describing
    her state. 'Was clothed' is natural English and preserves the passive/resultative
    sense without archaic tone.
- source_word: πορφυροῦν
  chosen: purple
  alternatives:
  - purple cloth
  - purple garments
  lexicon: BDAG
  rationale: Refers to the color/material associated with luxury and royalty. Simple
    color term best matches the Greek adjective used substantivally with the clothing
    idea implied by περιβεβλημένη.
- source_word: κόκκινον
  chosen: scarlet
  alternatives:
  - red
  - crimson
  lexicon: BDAG
  rationale: '''Scarlet'' is the established and precise rendering for κόκκινος in
    contexts of vivid luxury and symbolism; it is more specific than ''red'' and fits
    the apocalyptic imagery.'
- source_word: κεχρυσωμένη
  chosen: adorned with gold
  alternatives:
  - gilded with gold
  - decked with gold
  - covered with gold
  lexicon: BDAG
  rationale: The participle denotes being ornamented or overlaid with gold. 'Adorned
    with gold' communicates lavish decoration in readable modern English better than
    the more mechanical 'gilded with gold.'
- source_word: χρυσίῳ
  chosen: gold
  alternatives:
  - gold jewelry
  lexicon: BDAG
  rationale: Dative of means/instrument with κεχρυσωμένη. 'Gold' is sufficient and
    leaves the exact form of ornamentation open, as in the Greek.
- source_word: λίθῳ τιμίῳ
  chosen: precious stones
  alternatives:
  - a precious stone
  - costly stones
  - jewels
  lexicon: BDAG
  rationale: Although singular in form, the phrase is best rendered generically in
    English as a class item in a list of adornments. 'Precious stones' is idiomatic
    and preserves the sense of costly gems.
- source_word: μαργαρίταις
  chosen: pearls
  alternatives:
  - pearl ornaments
  lexicon: BDAG
  rationale: Standard lexical sense; plural retained.
- source_word: ποτήριον χρυσοῦν
  chosen: a golden cup
  alternatives:
  - a gold cup
  lexicon: BDAG
  rationale: '''Golden cup'' is idiomatic English and preserves the adjective χρυσοῦν
    modifying ποτήριον.'
- source_word: γέμον
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: Present participle modifying 'cup'; 'full of' is concise and natural
    in English.
- source_word: βδελυγμάτων
  chosen: abominations
  alternatives:
  - detestable things
  lexicon: BDAG
  rationale: In apocalyptic and biblical usage, 'abominations' preserves the strong
    cultic-moral force of βδελύγματα better than a flatter paraphrase.
- source_word: τὰ ἀκάθαρτα
  chosen: the impurities
  alternatives:
  - the unclean things
  - the filth
  lexicon: BDAG
  rationale: Neuter plural substantive. 'The impurities' conveys moral and ritual
    uncleanness in a way that reads naturally with 'of her sexual immorality.' 'Unclean
    things' is possible but less idiomatic here.
- source_word: πορνείας
  chosen: sexual immorality
  alternatives:
  - fornication
  - prostitution
  lexicon: BDAG
  rationale: Default broad rendering for πορνεία in modern English. In Revelation
    the term can carry both literal and metaphorical force; 'sexual immorality' preserves
    that breadth better than the narrower 'prostitution' or archaic 'fornication'.
