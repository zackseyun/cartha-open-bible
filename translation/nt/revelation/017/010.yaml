theological_decisions:
- issue: Interpretive specificity of the seven kings imagery
  chosen_reading: Retain the text's elliptical wording without identifying the kings or importing a historical scheme.
  alternative_readings:
  - Translate more explicitly as 'five kings have fallen, one king is, the other king has not yet come'
  - Interpret the referents as specific Roman emperors in the translation itself
  rationale: The immediate context identifies these as kings, but this verse itself is intentionally compressed. The translation preserves the apocalyptic ambiguity and does not resolve debated historical identifications in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
