id: REV.17.10
reference: Revelation 17:10
source:
  edition: SBLGNT
  text: οἱ πέντε ἔπεσαν, ὁ εἷς ἔστιν, ὁ ἄλλος οὔπω ἦλθεν, καὶ ὅταν ἔλθῃ ὀλίγον ⸂αὐτὸν δεῖ⸃ μεῖναι,
translation:
  text: Five have fallen[a], one is, the other has not yet come; and when he comes, he must remain for a little while.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly in context, 'Five kings have fallen, one king is, the other king has not yet come.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πέντε
  chosen: Five
  alternatives:
  - The five
  lexicon: BDAG
  rationale: The article with the numeral points back to the seven kings of the previous clause, but English idiom does not require 'the' here. 'Five' is concise and natural while preserving the referential sense.
- source_word: ἔπεσαν
  chosen: have fallen
  alternatives:
  - fell
  lexicon: BDAG
  rationale: Aorist indicative of πίπτω literally means 'fell,' but in this apocalyptic context it refers to the downfall/removal of five kings. English present perfect ('have fallen') naturally conveys a completed state with present relevance.
- source_word: ὁ εἷς ἔστιν
  chosen: one is
  alternatives:
  - one exists
  - one remains
  lexicon: BDAG
  rationale: 'The Greek is terse: literally ''the one is.'' In context of successive kings, ''one is'' best preserves the elliptical force without over-interpreting it as ''reigns'' or ''remains.'''
- source_word: ὁ ἄλλος
  chosen: the other
  alternatives:
  - the remaining one
  - another
  lexicon: BDAG
  rationale: ἄλλος here distinguishes the next king in sequence. 'The other' fits the singular contrast after 'five' and 'one.'
- source_word: οὔπω ἦλθεν
  chosen: has not yet come
  alternatives:
  - did not yet come
  - has not yet arrived
  lexicon: BDAG
  rationale: Though ἦλθεν is aorist, English idiom prefers present perfect with 'not yet' for an awaited arrival. 'Come' is the standard rendering of ἔρχομαι and suits the sequence.
- source_word: ὅταν ἔλθῃ
  chosen: when he comes
  alternatives:
  - whenever he comes
  - when he has come
  lexicon: BDAG
  rationale: ὅταν with aorist subjunctive marks a future contingency. 'When he comes' is the most natural English equivalent here. The pronoun 'he' is supplied because the referent is a singular king.
- source_word: ὀλίγον
  chosen: only a little while
  alternatives:
  - a little while
  - for a short time
  - briefly
  lexicon: BDAG
  rationale: ὀλίγον functions adverbially with μεῖναι, indicating brief duration. 'Only a little while' captures both brevity and the limiting force in context.
- source_word: αὐτὸν δεῖ μεῖναι
  chosen: he must remain
  alternatives:
  - it is necessary for him to remain
  - he must stay
  lexicon: BDAG
  rationale: 'The construction literally means ''it is necessary for him to remain.'' English normally front-loads the subject: ''he must remain.'' ''Remain'' is slightly more formal and fits apocalyptic discourse better than ''stay.'''
