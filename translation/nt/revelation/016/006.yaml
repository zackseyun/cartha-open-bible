id: REV.16.6
reference: Revelation 16:6
source:
  edition: SBLGNT
  text: ὅτι αἷμα ἁγίων καὶ προφητῶν ἐξέχεαν, καὶ αἷμα αὐτοῖς ⸀δέδωκας πιεῖν· ἄξιοί εἰσιν.
translation:
  text: because they poured out the blood of saints and prophets[a], and you have given them blood to drink[b]; they are worthy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shed the blood of saints and prophets.' The Greek verb is literally 'poured out,' which also echoes the bowl judgments in the surrounding context.
    reason: lexical_alternative
  - marker: b
    text: '''They are worthy'' means they deserve this judgment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the angel's declaration in the previous verse. 'Because' is clearer causal English than the more formal 'for'.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: Literal rendering is required in both occurrences; the verse emphasizes retributive justice by repeating 'blood'.
- source_word: ἁγίων
  chosen: saints
  alternatives:
  - holy ones
  lexicon: BDAG
  rationale: In Revelation, ἅγιοι commonly refers to God's holy people. 'Saints' is the established and natural English equivalent here, while still conveying consecrated people rather than a later canonized class.
- source_word: προφητῶν
  chosen: prophets
  lexicon: BDAG
  rationale: Straightforward lexical rendering; paired with 'saints' to identify those whose blood was shed.
- source_word: ἐξέχεαν
  chosen: poured out
  alternatives:
  - shed
  lexicon: BDAG
  rationale: The verb ἐκχέω literally means 'pour out.' While 'shed' is idiomatic with blood, 'poured out' preserves the verbal imagery and matches the judgment motif of bowls being poured out in the surrounding context.
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative indirect object referring to the perpetrators; rendered naturally in English as 'them' after 'given.'
- source_word: δέδωκας
  chosen: you have given
  alternatives:
  - you gave
  lexicon: BDAG
  rationale: Perfect tense is best represented by English present perfect, highlighting the completed divine act with present relevance.
- source_word: πιεῖν
  chosen: to drink
  lexicon: BDAG
  rationale: Infinitive complement to 'have given'; literal and natural English rendering.
- source_word: ἄξιοί εἰσιν
  chosen: they are worthy
  alternatives:
  - they deserve it
  lexicon: BDAG
  rationale: Formal rendering preserves the evaluative declaration without adding the object 'it,' which is implied but not stated in Greek. This keeps the solemn judicial tone.
