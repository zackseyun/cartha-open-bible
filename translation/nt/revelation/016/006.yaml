theological_decisions:
- issue: Retributive justice language
  chosen_reading: Retain the direct statement 'you have given them blood to drink; they are worthy' without softening.
  alternative_readings:
  - you have paid them back with blood to drink; they deserve it
  rationale: The Greek presents divine judgment in stark, proportional terms. The translation should preserve that severity rather than paraphrase it into a generalized idea of punishment. 'Worthy' here conveys deserving judgment, not moral excellence.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referent of 'saints'
  chosen_reading: Translate ἁγίων as 'saints' in the broad biblical sense of God's holy people.
  alternative_readings:
  - holy ones
  rationale: This avoids importing later ecclesiastical categories while preserving the standard biblical term used in Revelation for God's people.
  doctrine_reference: Affirmations; Translation philosophy §1
