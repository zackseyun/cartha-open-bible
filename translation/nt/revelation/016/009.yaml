id: REV.16.9
reference: Revelation 16:9
source:
  edition: SBLGNT
  text: καὶ ἐκαυματίσθησαν οἱ ἄνθρωποι καῦμα μέγα· καὶ ⸀ἐβλασφήμησαν τὸ ὄνομα τοῦ
    θεοῦ τοῦ ἔχοντος ⸀τὴν ἐξουσίαν ἐπὶ τὰς πληγὰς ταύτας, καὶ οὐ μετενόησαν δοῦναι
    αὐτῷ δόξαν.
translation:
  text: And the people were scorched with great heat, and they blasphemed the name
    of God, who has authority over these plagues, and they did not repent to give
    him glory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great heat.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the men'; Greek ἄνθρωποι here likely refers to people generally, not
      males specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκαυματίσθησαν
  chosen: were scorched
  alternatives:
  - were burned
  - were seared
  lexicon: BDAG
  rationale: Aorist passive of καυματίζω denotes being burned/scorched by heat. 'Were
    scorched' is natural English and fits the plague context without overstating total
    burning.
- source_word: οἱ ἄνθρωποι
  chosen: the people
  alternatives:
  - the men
  - the humans
  lexicon: BDAG
  rationale: Though formally masculine plural, ἄνθρωποι here refers to humanity generally
    rather than males specifically. 'The people' conveys the collective human referent
    in idiomatic English while preserving scope.
- source_word: καῦμα μέγα
  chosen: intense heat
  alternatives:
  - great heat
  - severe scorching
  lexicon: BDAG
  rationale: The accusative phrase expresses the means or extent of the scorching.
    'Intense heat' is clear modern English and captures μέγα as severity rather than
    size.
- source_word: ἐβλασφήμησαν
  chosen: blasphemed
  alternatives:
  - slandered
  - reviled
  lexicon: BDAG
  rationale: In relation to God's name, βλασφημέω is best rendered 'blasphemed,' preserving
    the religious and theological force of impious speech.
- source_word: τὸ ὄνομα τοῦ θεοῦ
  chosen: the name of God
  alternatives:
  - God's name
  lexicon: BDAG
  rationale: A formally close rendering preserves the biblical idiom in which 'the
    name' represents God's revealed identity and honor.
- source_word: τοῦ ἔχοντος τὴν ἐξουσίαν ἐπὶ τὰς πληγὰς ταύτας
  chosen: who has authority over these plagues
  alternatives:
  - who had authority over these plagues
  - who holds power over these plagues
  lexicon: BDAG
  rationale: The present participle ἔχοντος is naturally rendered with present force,
    and ἐξουσία denotes authority/rightful power. 'Over these plagues' reflects ἐπί
    with the accusative in this governing sense.
- source_word: πληγὰς
  chosen: plagues
  alternatives:
  - afflictions
  - strikes
  lexicon: BDAG
  rationale: In Revelation, πληγή is a standard term for divinely sent plague judgments;
    'plagues' preserves intertextual resonance with Exodus and the broader context.
- source_word: οὐ μετενόησαν
  chosen: did not repent
  alternatives:
  - did not change their minds
  - did not turn back
  lexicon: BDAG
  rationale: μετανοέω in judgment contexts carries moral-spiritual repentance, not
    mere reconsideration. 'Did not repent' is the standard and most accurate rendering.
- source_word: δοῦναι αὐτῷ δόξαν
  chosen: to give him glory
  alternatives:
  - so as to give him glory
  - to glorify him
  lexicon: BDAG
  rationale: The infinitive expresses the content or result expected of repentance.
    'To give him glory' preserves the concrete biblical idiom and echoes Revelation's
    worship language.
