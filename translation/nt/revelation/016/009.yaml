theological_decisions:
- issue: Scope of ἄνθρωποι in a masculine plural form
  chosen_reading: inclusive human reference ('the people')
  alternative_readings:
  - the men
  rationale: The context concerns humanity under judgment, not males specifically.
    This follows the gender-accurate principle by rendering the representative/generic
    force rather than preserving a misleading male-specific English term.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Force of divine sovereignty in τοῦ ἔχοντος τὴν ἐξουσίαν ἐπὶ τὰς πληγὰς ταύτας
  chosen_reading: God is described as having authority over the plagues
  alternative_readings:
  - God is merely associated with the plagues
  rationale: The verse explicitly attributes ἐξουσία over the plagues to God. The
    translation preserves this direct claim without softening or expanding it into
    a broader doctrinal statement beyond the text.
  doctrine_reference: DOCTRINE.md § Translation philosophy, points 1 and 3
