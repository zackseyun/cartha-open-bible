id: REV.16.13
reference: Revelation 16:13
source:
  edition: SBLGNT
  text: καὶ εἶδον ἐκ τοῦ στόματος τοῦ δράκοντος καὶ ἐκ τοῦ στόματος τοῦ θηρίου καὶ ἐκ τοῦ στόματος τοῦ ψευδοπροφήτου πνεύματα ⸂τρία ἀκάθαρτα⸃ ὡς βάτραχοι·
translation:
  text: And I saw three unclean spirits like frogs coming out of the mouth of the dragon[a], out of the mouth of the beast, and out of the mouth of the false prophet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the mouth of the dragon, from the mouth of the beast, and from the mouth of the false prophet I saw three unclean spirits like frogs.' The Greek places the repeated source phrases before 'three unclean spirits.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Aorist of ὁράω is straightforwardly rendered as a simple past narrative verb. 'I saw' is the most natural and direct English equivalent in apocalyptic vision reporting.
- source_word: ἐκ ... τοῦ στόματος
  chosen: coming out of the mouth of
  alternatives:
  - from the mouth of
  - out of the mouth of
  lexicon: BDAG
  rationale: The repeated prepositional phrases modify the appearance/source of the spirits. Because English reads awkwardly if the source phrases are fronted exactly as in Greek, 'coming out of' makes explicit the implied motion/source relation already conveyed by ἐκ with 'mouth.' This is a modest restructuring for readable modern English without changing sense.
- source_word: δράκοντος
  chosen: the dragon
  lexicon: BDAG
  rationale: Standard rendering for δράκων in Revelation; it is a symbolic figure already established in context, so 'dragon' preserves the imagery.
- source_word: θηρίου
  chosen: the beast
  lexicon: BDAG
  rationale: θηρίον in Revelation is conventionally and accurately rendered 'beast,' preserving the apocalyptic symbolism rather than softening to 'animal' or similar.
- source_word: ψευδοπροφήτου
  chosen: the false prophet
  alternatives:
  - the lying prophet
  lexicon: BDAG
  rationale: Compound noun meaning 'false prophet.' This is the natural English equivalent and preserves the established title-like force in Revelation.
- source_word: πνεύματα
  chosen: spirits
  alternatives:
  - spirit-beings
  lexicon: BDAG
  rationale: πνεύματα here refers to personal spiritual entities, not attitudes or winds. 'Spirits' is the standard and sufficiently clear rendering.
- source_word: τρία ἀκάθαρτα
  chosen: three unclean
  alternatives:
  - three impure
  lexicon: BDAG
  rationale: The adjective ἀκάθαρτα commonly means 'unclean' in biblical contexts, carrying ritual and moral-spiritual overtones that 'impure' may weaken. The word order in English is adjusted naturally before 'spirits.'
- source_word: ὡς βάτραχοι
  chosen: like frogs
  alternatives:
  - as frogs
  lexicon: BDAG
  rationale: ὡς marks comparison, not identity. 'Like frogs' is idiomatic modern English and preserves the simile.
