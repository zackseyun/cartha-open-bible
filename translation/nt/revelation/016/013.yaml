theological_decisions:
- issue: Nature of πνεύματα ἀκάθαρτα in apocalyptic imagery
  chosen_reading: Render as 'three unclean spirits like frogs' without allegorical expansion.
  alternative_readings:
  - three demonic spirits resembling frogs
  rationale: The immediate Greek says 'spirits ... like frogs.' While the next verse clarifies their demonic character, this verse itself should not import that identification into the main text. The translation preserves the imagery and lets the context interpret it.
  doctrine_reference: Preserve theological tension rather than resolve it.
