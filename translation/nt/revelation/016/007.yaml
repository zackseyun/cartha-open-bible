id: REV.16.7
reference: Revelation 16:7
source:
  edition: SBLGNT
  text: καὶ ἤκουσα τοῦ θυσιαστηρίου λέγοντος· Ναί, κύριε, ὁ θεός, ὁ παντοκράτωρ, ἀληθιναὶ καὶ δίκαιαι αἱ κρίσεις σου.
translation:
  text: And I heard the altar saying[a], “Yes, Lord God, the Almighty, true and just are your judgments.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I heard from the altar saying.' The Greek can mark the source of what John heard, though the wording most naturally personifies the altar as speaking.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσα
  chosen: I heard
  alternatives:
  - I listened to
  lexicon: BDAG
  rationale: Aorist active indicative of ἀκούω is naturally rendered as a simple past event, 'I heard.' 'Listened to' would overstate intentionality not marked in the verb.
- source_word: τοῦ θυσιαστηρίου λέγοντος
  chosen: the altar saying
  alternatives:
  - from the altar saying
  - the altar's voice saying
  lexicon: BDAG
  rationale: 'The genitive with ἤκουσα can indicate the source of what is heard. Given the participle λέγοντος, the most natural English is to personify the altar as speaking: ''I heard the altar saying.'' ''From the altar'' is possible, but the Greek more directly presents the altar itself as the speaker, fitting Revelation''s vivid imagery.'
- source_word: Ναί
  chosen: 'Yes'
  alternatives:
  - Indeed
  - Truly
  lexicon: BDAG
  rationale: Ναί is a strong affirmative particle. 'Yes' is the clearest modern equivalent and preserves the responsive force.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος. Per doctrine, the default rendering is 'Lord.' 'Master' is possible lexically but is not preferred here, especially in direct address to God.
- source_word: ὁ θεός
  chosen: God
  alternatives:
  - O God
  lexicon: BDAG
  rationale: Appositional title following κύριε. English idiom in direct address commonly uses 'Lord God' without repeating an interjection. This preserves the titular force cleanly.
- source_word: ὁ παντοκράτωρ
  chosen: the Almighty
  alternatives:
  - the All-Powerful
  - the Ruler of all
  lexicon: BDAG
  rationale: Standard and accurate rendering of παντοκράτωρ in Revelation. 'The Almighty' is both idiomatic and semantically strong, preserving divine sovereignty without awkwardness.
- source_word: ἀληθιναὶ
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: Predicate adjective modifying κρίσεις. 'True' is the most natural collocation in English with 'judgments' and preserves correspondence to reality and reliability.
- source_word: δίκαιαι
  chosen: just
  alternatives:
  - righteous
  - fair
  lexicon: BDAG
  rationale: With κρίσεις, 'just' is the most idiomatic English rendering. 'Righteous' is possible but less natural with 'judgments' in contemporary English; 'fair' is too weak for the judicial and theological weight.
- source_word: αἱ κρίσεις σου
  chosen: your judgments
  alternatives:
  - your judgments of condemnation
  - your judicial decisions
  lexicon: BDAG
  rationale: κρίσεις refers to acts/verdicts of judgment. 'Your judgments' is concise, accurate, and preserves the judicial register appropriate to the bowl judgments context.
