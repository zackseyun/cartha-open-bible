theological_decisions:
- issue: Personification of the altar as speaker
  chosen_reading: 'Render the altar itself as speaking: ''I heard the altar saying'''
  alternative_readings:
  - 'Render an implied voice from the altar: ''I heard a voice from the altar saying'''
  rationale: The Greek text names 'the altar' as the grammatical source with a participle of speaking. Retaining the personification preserves Revelation's apocalyptic imagery and avoids adding 'voice,' which is not present in this verse's Greek text.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering divine titles in direct address
  chosen_reading: '''Lord God, the Almighty'''
  alternative_readings:
  - '''Lord, O God Almighty'''
  - '''Lord God Almighty'''
  rationale: 'The Greek has three elements in apposition/direct address: κύριε, ὁ θεός, ὁ παντοκράτωρ. Rendering all three preserves the fullness of the divine address. Including ''the'' before ''Almighty'' reflects the article and yields natural English.'
  doctrine_reference: 'Contested terms table: κύριος → Lord'
