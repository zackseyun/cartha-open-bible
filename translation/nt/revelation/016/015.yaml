id: REV.16.15
reference: Revelation 16:15
source:
  edition: SBLGNT
  text: Ἰδοὺ ἔρχομαι ὡς κλέπτης. μακάριος ὁ γρηγορῶν καὶ τηρῶν τὰ ἱμάτια αὐτοῦ, ἵνα μὴ γυμνὸς περιπατῇ καὶ βλέπωσιν τὴν ἀσχημοσύνην αὐτοῦ—
translation:
  text: Behold[a], I am coming like a thief. Blessed is the one who stays awake and keeps his garments[b], so that he may not walk about naked and they see his shame—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one who is watchful' / 'the one who keeps watch.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his indecency'; the Greek term can denote shameful exposure.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the force of an attention-getting interjection in elevated apocalyptic discourse. 'Behold' is still intelligible in modern English and preserves the solemn warning tone better than flatter alternatives.
- source_word: ἔρχομαι
  chosen: I am coming
  alternatives:
  - I come
  lexicon: BDAG
  rationale: Present tense with imminent/futuristic force is naturally rendered in English as 'I am coming,' preserving both vividness and eschatological imminence.
- source_word: ὡς κλέπτης
  chosen: like a thief
  alternatives:
  - as a thief
  lexicon: BDAG
  rationale: Standard comparative sense of ὡς. 'Like a thief' is idiomatic modern English and preserves the simile of unexpected arrival without importing moral comparison.
- source_word: μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: In beatitude-style sayings, 'Blessed' best preserves the covenantal and theological weight; 'happy' is too psychological and weak.
- source_word: ὁ γρηγορῶν
  chosen: the one who stays awake
  alternatives:
  - the one who is watchful
  - the one who keeps watch
  lexicon: BDAG
  rationale: The participle denotes wakefulness/watchfulness. 'Stays awake' is concrete and readable, while still carrying the metaphorical sense of vigilance in context.
- source_word: τηρῶν
  chosen: keeps
  alternatives:
  - guards
  - preserves
  lexicon: BDAG
  rationale: τηρέω commonly means keep, guard, observe. Here with garments, 'keeps' is broad enough to include guarding/retaining and matches the Greek without over-specifying.
- source_word: τὰ ἱμάτια αὐτοῦ
  chosen: his garments
  alternatives:
  - his clothes
  - his clothing
  lexicon: BDAG
  rationale: ἱμάτια refers to garments/clothes. 'Garments' preserves the slightly elevated register and possible symbolic resonance in Revelation better than the more casual 'clothes.'
- source_word: ἵνα μὴ
  chosen: so that ... may not
  alternatives:
  - lest
  - in order that ... not
  lexicon: BDAG
  rationale: Expresses purpose with negation. 'So that ... may not' is natural modern English and preserves the purposive force.
- source_word: γυμνὸς περιπατῇ
  chosen: he may not walk about naked
  alternatives:
  - he may not go naked
  - he may not walk naked
  lexicon: BDAG
  rationale: περιπατέω is literally 'walk about' here. This rendering preserves the concrete image while allowing the shame motif to remain vivid.
- source_word: βλέπωσιν
  chosen: they see
  alternatives:
  - people see
  - others see
  lexicon: BDAG
  rationale: The Greek leaves the subject indefinite in the third person plural. 'They see' preserves that indefiniteness better than specifying 'people' or 'others.'
- source_word: ἀσχημοσύνην αὐτοῦ
  chosen: his shame
  alternatives:
  - his indecency
  - his nakedness
  lexicon: BDAG
  rationale: ἀσχημοσύνη can denote shameful exposure/indecency. 'His shame' captures both the exposure and the dishonor in idiomatic English; 'nakedness' would duplicate the previous clause too directly, while 'indecency' sounds overly clinical.
