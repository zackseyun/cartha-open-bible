theological_decisions:
- issue: Metaphorical force of garments and nakedness in apocalyptic context
  chosen_reading: Retain the concrete imagery ('garments,' 'naked,' 'shame') without allegorical expansion in the main text.
  alternative_readings:
  - Interpret garments as moral readiness or righteous deeds
  - Interpret nakedness as eschatological disgrace
  rationale: The verse likely carries symbolic resonance within Revelation, but the Greek itself presents the imagery concretely. Per translation philosophy, the draft preserves theological tension rather than resolving the symbolism in translation.
  doctrine_reference: Translation philosophy §3
- issue: Generic masculine reference
  chosen_reading: Use singular masculine pronouns ('his') with 'the one who'
  alternative_readings:
  - Use plural restructuring ('those who... their garments')
  - Use singular 'their'
  rationale: The Greek participial construction is grammatically masculine singular and carries representative force. Per doctrine guidance, the translation remains gender-accurate rather than neutralizing the masculine form.
  doctrine_reference: Translation philosophy §4
