id: REV.16.17
reference: Revelation 16:17
source:
  edition: SBLGNT
  text: Καὶ ὁ ἕβδομος ἐξέχεεν τὴν φιάλην αὐτοῦ ἐπὶ τὸν ἀέρα— καὶ ἐξῆλθεν φωνὴ μεγάλη
    ⸀ἐκ τοῦ ⸀ναοῦ ἀπὸ τοῦ θρόνου λέγουσα· Γέγονεν—
translation:
  text: And the seventh poured out his bowl into the air, and a loud voice came out
    from the sanctuary, from the throne, saying, “It has come to pass.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “from the temple.” The Greek word ναός refers specifically to the sanctuary
      rather than the broader temple complex.
    reason: lexical_alternative
  - marker: b
    text: Or, “It is done.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἕβδομος
  chosen: the seventh
  alternatives:
  - the seventh angel
  lexicon: BDAG
  rationale: The Greek has only the ordinal with the article, 'the seventh.' In context
    the referent is the seventh angel from the bowl sequence, but 'angel' is not expressed
    here, so the main text keeps the ellipsis rather than supplying it.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - emptied out
  lexicon: BDAG
  rationale: Standard rendering of ἐκχέω in judgment-pouring contexts; it is both
    natural English and consistent with the repeated bowl formula in this chapter.
- source_word: φιάλην
  chosen: bowl
  alternatives:
  - vial
  lexicon: BDAG
  rationale: '''Bowl'' is the standard modern equivalent and avoids archaic ''vial,''
    which can mislead modern readers into imagining a small bottle.'
- source_word: ἐπὶ τὸν ἀέρα
  chosen: into the air
  alternatives:
  - upon the air
  lexicon: BDAG
  rationale: With ἐπί plus accusative after a verb of pouring, English idiom is best
    represented by 'into the air.' 'Upon the air' is overly literal and unnatural.
- source_word: ἐξῆλθεν φωνὴ μεγάλη
  chosen: a loud voice came out
  alternatives:
  - a great voice went out
  - a mighty voice came forth
  lexicon: BDAG
  rationale: φωνὴ μεγάλη is idiomatically 'a loud voice' in contemporary English.
    'Came out' preserves the motion of ἐξῆλθεν without sounding archaic.
- source_word: ἐκ τοῦ ναοῦ
  chosen: from the sanctuary
  alternatives:
  - from the temple
  lexicon: BDAG
  rationale: ναός refers specifically to the inner sanctuary/shrine rather than the
    broader temple complex (ἱερόν). Since Revelation often uses heavenly temple imagery,
    'sanctuary' better preserves the specificity of the term.
- source_word: ἀπὸ τοῦ θρόνου
  chosen: from the throne
  lexicon: BDAG
  rationale: Straightforward prepositional phrase. Retained alongside 'from the sanctuary'
    to reflect the twofold source description in the Greek rather than collapsing
    them.
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - which said
  lexicon: BDAG
  rationale: The feminine participle agrees with φωνή and is naturally rendered in
    English as 'saying.'
- source_word: Γέγονεν
  chosen: It has happened
  alternatives:
  - It is done
  - It has come to pass
  lexicon: BDAG
  rationale: Perfect tense of γίνομαι indicates a completed state/result. 'It has
    happened' preserves the aspect more transparently than the traditional 'It is
    done,' while remaining idiomatic and solemn.
