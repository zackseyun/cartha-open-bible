theological_decisions:
- issue: Rendering of ναός in apocalyptic heavenly-temple imagery
  chosen_reading: sanctuary
  alternative_readings:
  - temple
  rationale: The choice is lexical rather than doctrinal, but it affects how readers
    imagine the heavenly scene. 'Sanctuary' preserves the distinction between ναός
    and ἱερόν and avoids importing a broader architectural sense not specified by
    the Greek.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented
    exception)
- issue: Rendering of Γέγονεν
  chosen_reading: It has happened
  alternative_readings:
  - It is done
  rationale: The verse announces the climactic completion of the seventh bowl judgment.
    The translation preserves the perfect/resultative force without adding theological
    interpretation beyond the text. The traditional alternative is worth preserving
    because of its familiarity and possible intertextual resonance with other completion
    formulas.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
