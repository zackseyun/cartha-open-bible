id: REV.16.5
reference: Revelation 16:5
source:
  edition: SBLGNT
  text: καὶ ἤκουσα τοῦ ἀγγέλου τῶν ὑδάτων λέγοντος· Δίκαιος εἶ, ὁ ὢν καὶ ὁ ἦν, ⸀ὁ
    ὅσιος, ὅτι ταῦτα ἔκρινας,
translation:
  text: And I heard the angel of the waters saying, “Righteous are you, the one who
    is and who was, the Holy One, because you have judged these things.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read a fuller title such as 'the one who is and who was
      and who is to come,' likely harmonized to similar formulas elsewhere in Revelation.
      The printed text here reads 'the one who is and who was, the Holy One.'
    reason: textual_variant
  - marker: b
    text: Or 'Just are you.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the angel over the waters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ ἀγγέλου τῶν ὑδάτων
  chosen: the angel of the waters
  alternatives:
  - the angel over the waters
  lexicon: BDAG
  rationale: A genitive construction most naturally rendered literally as 'of the
    waters.' In context it likely denotes an angel associated with or having charge
    over the waters, but the more formal rendering preserves the Greek wording while
    remaining intelligible.
- source_word: Δίκαιος
  chosen: Righteous
  alternatives:
  - Just
  lexicon: BDAG
  rationale: δίκαιος can mean 'righteous' or 'just.' Here it predicates God's moral
    rectitude in judgment. 'Righteous' fits the worshipful tone and avoids narrowing
    the sense to merely juridical fairness, though 'just' is a viable alternative.
- source_word: ὁ ὢν καὶ ὁ ἦν
  chosen: the one who is and who was
  alternatives:
  - who is and who was
  lexicon: BDAG
  rationale: This formulaic divine designation in Revelation is best preserved closely.
    Including 'the one' reflects the substantival participle/article construction
    and reads naturally in English.
- source_word: ὁ ὅσιος
  chosen: the Holy One
  alternatives:
  - the faithful one
  - the pious one
  - the gracious one
  lexicon: BDAG
  rationale: ὅσιος denotes holiness/devoutness, especially covenantal or moral holiness.
    'The Holy One' is the clearest idiomatic English title here and matches the doxological
    context. Because this reading is textually and interpretively notable in this
    verse, alternatives are preserved in a footnote.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the declaration of God's righteousness. 'Because'
    is clearer in modern English than 'for' while preserving the causal force.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these judgments
  - these matters
  lexicon: BDAG
  rationale: The demonstrative is formally 'these things.' Although the referent is
    the judgments just poured out, the Greek does not explicitly repeat 'judgments,'
    so the more literal phrase is retained.
- source_word: ἔκρινας
  chosen: you have judged
  alternatives:
  - you judged
  lexicon: BDAG
  rationale: The aorist can be rendered as a simple past, but in this context an English
    present perfect suitably conveys a completed act with present relevance in the
    heavenly proclamation.
