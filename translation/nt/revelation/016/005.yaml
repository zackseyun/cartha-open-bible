theological_decisions:
- issue: Divine title lacking the expected future element
  chosen_reading: the one who is and who was, the Holy One
  alternative_readings:
  - the one who is and who was and who is to come
  - O Holy One, who are and who were
  rationale: The SBLGNT text reads ὁ ὢν καὶ ὁ ἦν, ὁ ὅσιος, not the fuller formula
    found elsewhere in Revelation. The translation follows the printed Greek rather
    than harmonizing to the more familiar expression. Because some manuscripts and
    translations reflect a different reading or punctuation, the alternatives are
    preserved in a footnote rather than imported into the main text.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §3
    (preserve theological tension rather than resolve it)
