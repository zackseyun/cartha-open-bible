id: REV.16.10
reference: Revelation 16:10
source:
  edition: SBLGNT
  text: Καὶ ὁ πέμπτος ἐξέχεεν τὴν φιάλην αὐτοῦ ἐπὶ τὸν θρόνον τοῦ θηρίου· καὶ ἐγένετο ἡ βασιλεία αὐτοῦ ἐσκοτωμένη, καὶ ἐμασῶντο τὰς γλώσσας αὐτῶν ἐκ τοῦ πόνου,
translation:
  text: And the fifth poured out his bowl on the throne of the beast[a], and its kingdom became darkened, and they were gnawing their tongues because of the pain[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his kingdom.' English may personify the beast, though the Greek noun 'beast' is neuter.
    reason: lexical_alternative
  - marker: b
    text: Or 'was plunged into darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πέμπτος
  chosen: the fifth
  alternatives:
  - the fifth angel
  lexicon: BDAG
  rationale: The Greek has simply the ordinal with the article, 'the fifth.' In the immediate series of bowl judgments, 'angel' is implied from context, but not expressed here, so it is not supplied in the main text.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - emptied out
  lexicon: BDAG
  rationale: Standard rendering of ἐκχέω in the bowl-judgment context; idiomatic and consistent with the repeated formula in this chapter.
- source_word: φιάλην
  chosen: bowl
  alternatives:
  - shallow bowl
  - vial
  lexicon: BDAG
  rationale: '''Bowl'' is the standard modern English equivalent. ''Vial'' is traditional but misleading in contemporary English because it suggests a small bottle.'
- source_word: ἐπὶ τὸν θρόνον τοῦ θηρίου
  chosen: on the throne of the beast
  alternatives:
  - upon the throne of the beast
  lexicon: BDAG
  rationale: ἐπί with the accusative here is naturally rendered 'on/upon.' 'Beast' is the established rendering of θηρίον in Revelation and preserves the apocalyptic imagery.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - came to be
  - was made
  lexicon: BDAG
  rationale: With the predicate participle ἐσκοτωμένη, γίνομαι is best rendered as an inceptive/resultative 'became,' indicating the onset of the condition.
- source_word: ἡ βασιλεία αὐτοῦ
  chosen: its kingdom
  alternatives:
  - his kingdom
  - his realm
  lexicon: BDAG
  rationale: Because θηρίον is grammatically neuter, the pronoun is rendered 'its' in English. 'Kingdom' is the most direct equivalent of βασιλεία here, referring to the beast's dominion rather than merely a geographic realm.
- source_word: ἐσκοτωμένη
  chosen: darkened
  alternatives:
  - plunged into darkness
  - made dark
  lexicon: BDAG
  rationale: The perfect/passive participial form denotes a state of having been darkened. 'Darkened' preserves the verbal force without over-paraphrasing. 'Plunged into darkness' is vivid but slightly more interpretive.
- source_word: ἐμασῶντο
  chosen: were gnawing
  alternatives:
  - gnawed
  - kept biting
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing action in past time. 'Were gnawing' preserves the durative sense better than a simple past.
- source_word: τὰς γλώσσας αὐτῶν
  chosen: their tongues
  lexicon: BDAG
  rationale: Direct and literal rendering; the expression conveys extreme agony.
- source_word: ἐκ τοῦ πόνου
  chosen: because of the pain
  alternatives:
  - from the pain
  - out of pain
  lexicon: BDAG
  rationale: ἐκ here expresses cause/source. 'Because of the pain' is the clearest idiomatic English rendering.
