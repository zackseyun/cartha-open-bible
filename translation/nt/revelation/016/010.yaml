theological_decisions:
- issue: Referent and English pronoun for the beast
  chosen_reading: its kingdom
  alternative_readings:
  - his kingdom
  rationale: The antecedent θηρίον is grammatically neuter in Greek. English may personify the beast with 'his,' but 'its' more closely reflects the source wording without making an unnecessary interpretive move about personification in this clause.
  doctrine_reference: Translation philosophy §1, §5
- issue: Degree of vividness in the darkness judgment
  chosen_reading: became darkened
  alternative_readings:
  - was plunged into darkness
  rationale: The Greek states the result plainly without an added metaphor beyond the passive participle. The chosen wording preserves the judgment's force while avoiding expansion beyond the text.
  doctrine_reference: Translation philosophy §1, §6
