id: REV.16.11
reference: Revelation 16:11
source:
  edition: SBLGNT
  text: καὶ ἐβλασφήμησαν τὸν θεὸν τοῦ οὐρανοῦ ἐκ τῶν πόνων αὐτῶν καὶ ἐκ τῶν ἑλκῶν αὐτῶν, καὶ οὐ μετενόησαν ἐκ τῶν ἔργων αὐτῶν.
translation:
  text: And they blasphemed the God of heaven because of their pains and their sores[c][b][a], and they did not repent of their deeds.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reviled' or 'spoke evil of' the God of heaven.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of their ulcers.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'did not repent from their works.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβλασφήμησαν
  chosen: blasphemed
  alternatives:
  - reviled
  - spoke evil of
  lexicon: BDAG
  rationale: βλασφημέω denotes speaking in a slanderous or irreverent way against God. 'Blasphemed' preserves the specifically God-directed, religious force better than the more general 'reviled.'
- source_word: τὸν θεὸν τοῦ οὐρανοῦ
  chosen: the God of heaven
  alternatives:
  - God in heaven
  - the heavenly God
  lexicon: BDAG
  rationale: A straightforward rendering of the accusative phrase with genitive qualifier. 'The God of heaven' preserves the biblical title and its solemn, apocalyptic tone.
- source_word: ἐκ τῶν πόνων αὐτῶν
  chosen: because of their pains
  alternatives:
  - from their pains
  - on account of their pains
  lexicon: BDAG
  rationale: Although ἐκ is literally 'from/out of,' in this causal context it is best rendered idiomatically as 'because of.' πόνος here refers to severe pain or torment rather than labor.
- source_word: ἑλκῶν
  chosen: sores
  alternatives:
  - ulcers
  - festering sores
  lexicon: BDAG
  rationale: ἕλκος refers to a sore, ulcer, or wound. 'Sores' is clear modern English and fits the plague context without over-specifying medically.
- source_word: μετενόησαν
  chosen: did not repent
  alternatives:
  - did not change their minds
  - did not turn back
  lexicon: BDAG
  rationale: μετανοέω in Revelation carries the moral-religious sense of repentance, not merely an internal change of opinion. 'Repent' preserves that force.
- source_word: ἐκ τῶν ἔργων αὐτῶν
  chosen: of their deeds
  alternatives:
  - from their works
  - from what they had done
  lexicon: BDAG
  rationale: With μετανοέω, ἐκ marks turning away from prior actions. 'Of their deeds' is idiomatic after 'repent' in English while still reflecting the object of repentance. 'Works' is possible but can sound overly technical or ambiguous in English.
