theological_decisions:
- issue: Causal force of repeated ἐκ phrases
  chosen_reading: The people blaspheme God because of their pains and sores, and they do not repent of their deeds.
  alternative_readings:
  - The people blaspheme God from/out of their pains and sores, with a more literal spatial nuance.
  rationale: 'The verse emphasizes their response to judgment: suffering leads not to repentance but to blasphemy. Rendering ἐκ causally in the first two phrases and as separation/turning-away with repentance in the last phrase best reflects normal Greek usage in context without adding doctrinal interpretation.'
