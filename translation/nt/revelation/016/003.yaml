id: REV.16.3
reference: Revelation 16:3
source:
  edition: SBLGNT
  text: Καὶ ὁ ⸀δεύτερος ἐξέχεεν τὴν φιάλην αὐτοῦ εἰς τὴν θάλασσαν· καὶ ἐγένετο αἷμα ὡς νεκροῦ, καὶ πᾶσα ψυχὴ ⸀ζωῆς ἀπέθανεν ⸀τὰ ἐν τῇ θαλάσσῃ.
translation:
  text: And the second poured out his bowl into the sea[a], and it became blood like that of a dead man, and every living creature in the sea died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'like blood from a corpse'; Greek literally, 'blood as of a dead man.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δεύτερος
  chosen: the second
  alternatives:
  - the second angel
  lexicon: BDAG
  rationale: The substantive adjective with article refers back to the second angel from the immediate context (the bowl judgments), but 'angel' is not expressed in this verse. To avoid adding an explicit noun not present in the Greek, the translation keeps the elliptical 'the second'.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - emptied out
  lexicon: BDAG
  rationale: Standard rendering of ἐκχέω in judgment-pouring contexts; idiomatic and faithful to the imagery of bowl judgments.
- source_word: φιάλην
  chosen: bowl
  alternatives:
  - vial
  lexicon: BDAG
  rationale: '''Bowl'' reflects the likely shape and function of φιάλη in contemporary English better than the traditional but misleading ''vial''.'
- source_word: εἰς τὴν θάλασσαν
  chosen: into the sea
  alternatives:
  - upon the sea
  lexicon: BDAG
  rationale: εἰς normally indicates movement into; 'into the sea' best matches the Greek preposition and the image of contents being poured.
- source_word: ἐγένετο αἷμα
  chosen: it became blood
  alternatives:
  - it turned to blood
  lexicon: BDAG
  rationale: A straightforward rendering of γίνομαι + predicate noun. 'Became blood' is slightly more formal and closer to the Greek than 'turned to blood,' while remaining natural.
- source_word: ὡς νεκροῦ
  chosen: like that of a dead man
  alternatives:
  - like a dead man's blood
  - like blood from a corpse
  - as of a dead man
  lexicon: BDAG
  rationale: The comparison is not merely to redness but to the character of blood associated with a dead human body. 'Like that of a dead man' makes explicit the implied comparison with blood while preserving the singular νεκροῦ.
- source_word: πᾶσα ψυχὴ ζωῆς
  chosen: every living creature
  alternatives:
  - every living soul
  - every creature with life
  - every living being
  lexicon: BDAG
  rationale: The genitive ζωῆς qualifies ψυχή in a Semitic-like expression meaning a living being/creature. In this marine context, 'every living creature' is idiomatic English and avoids the misleadingly anthropological sense of 'soul' in modern usage.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - perished
  lexicon: BDAG
  rationale: The simple verb 'died' directly matches ἀποθνῄσκω without interpretive expansion.
- source_word: τὰ ἐν τῇ θαλάσσῃ
  chosen: in the sea
  alternatives:
  - the things in the sea
  - that were in the sea
  lexicon: BDAG
  rationale: 'The neuter plural article with prepositional phrase refers to the marine creatures just mentioned. English expresses this naturally by attaching the location to ''every living creature'': ''every living creature in the sea.'''
