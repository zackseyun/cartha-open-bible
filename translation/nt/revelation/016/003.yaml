theological_decisions:
- issue: Nature of the plague imagery
  chosen_reading: Render the sea as becoming real blood in the vision without softening the judgment language.
  alternative_readings:
  - Render more phenomenologically as 'it looked like blood'
  rationale: The Greek says 'it became blood' and then qualifies it with 'like that of a dead man.' The text presents severe divine judgment in visionary form; the translation should preserve that force rather than dilute it into mere appearance.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
