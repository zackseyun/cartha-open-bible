theological_decisions:
- issue: Implicit divine agency in ἐδόθη
  chosen_reading: Retain the passive 'it was given' without naming God explicitly.
  alternative_readings:
  - God gave it power
  - the sun was allowed
  rationale: Revelation frequently uses the divine passive to indicate God's sovereign
    permission or commission. Making God explicit would import what is implied but
    not directly stated in the clause.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of αὐτῷ
  chosen_reading: The dative pronoun refers to the sun.
  alternative_readings:
  - the fourth angel
  - an unspecified agent
  rationale: The nearest grammatical antecedent is τὸν ἥλιον, and the infinitive 'to
    scorch the people' fits the sun as the instrument of judgment. Rendering the pronoun
    impersonally preserves the Greek syntax and avoids adding 'angel' where the text
    does not repeat it.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering generic ἀνθρώπους
  chosen_reading: Use 'the people' rather than 'men.'
  alternative_readings:
  - the men
  - humanity
  rationale: The term is generic rather than male-specific. This follows the gender-accurate
    principle by matching the source's representative sense in natural English.
  doctrine_reference: Translation philosophy §4
