id: REV.16.8
reference: Revelation 16:8
source:
  edition: SBLGNT
  text: Καὶ ὁ ⸀τέταρτος ἐξέχεεν τὴν φιάλην αὐτοῦ ἐπὶ τὸν ἥλιον· καὶ ἐδόθη αὐτῷ καυματίσαι
    ⸂τοὺς ἀνθρώπους ἐν πυρί⸃.
translation:
  text: And the fourth poured out his bowl on the sun, and it was given to it to scorch
    the people with fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and it was given to it to scorch the people in fire.'
      The pronoun likely refers to the sun.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τέταρτος
  chosen: the fourth
  alternatives:
  - the fourth angel
  lexicon: BDAG
  rationale: The adjective with article functions substantivally, referring to the
    fourth angel in the sequence of bowl judgments. 'The fourth' keeps the Greek concise;
    'angel' is implied by context but not expressed here.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - emptied out
  lexicon: BDAG
  rationale: Standard rendering of ἐκχέω in Revelation's bowl-plague context; idiomatic
    and consistent with the repeated formula in this chapter.
- source_word: φιάλην
  chosen: bowl
  alternatives:
  - vial
  lexicon: BDAG
  rationale: '''Bowl'' reflects normal contemporary English for φιάλη and avoids archaic
    ''vial,'' while fitting Revelation''s cultic/judgment imagery.'
- source_word: ἐπὶ τὸν ἥλιον
  chosen: on the sun
  alternatives:
  - upon the sun
  - against the sun
  lexicon: BDAG
  rationale: ἐπί with the accusative here marks the object/target of the poured bowl.
    'On the sun' is the most natural English equivalent.
- source_word: ἐδόθη αὐτῷ
  chosen: it was given to it
  alternatives:
  - it was granted to it
  - he was given power
  lexicon: BDAG
  rationale: The passive ἐδόθη is a common divine passive in Revelation, indicating
    granted authority without naming the giver. The dative αὐτῷ most naturally refers
    back to the nearest neuter noun, 'the sun' (ἥλιον), so 'it ... to it' preserves
    the grammar. Some English versions make the subject personal or add 'power,' but
    neither is explicit in the Greek.
- source_word: καυματίσαι
  chosen: to scorch
  alternatives:
  - to burn
  - to torment with heat
  lexicon: BDAG
  rationale: καυματίζω denotes causing intense heat or scorching. 'Scorch' is precise
    and idiomatic in context of solar judgment.
- source_word: τοὺς ἀνθρώπους
  chosen: the people
  alternatives:
  - men
  - human beings
  lexicon: BDAG
  rationale: Although ἄνθρωπος can be rendered 'men' or 'people,' here it refers generically
    to humanity under judgment. 'The people' communicates the collective human referent
    in natural English without implying males only.
- source_word: ἐν πυρί
  chosen: with fire
  alternatives:
  - by fire
  - in fire
  lexicon: BDAG
  rationale: The phrase expresses means or manner. In English, 'scorch ... with fire'
    is more idiomatic than the more literal 'in fire,' while preserving the imagery
    of fiery heat.
