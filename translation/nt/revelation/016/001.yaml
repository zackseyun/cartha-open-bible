id: REV.16.1
reference: Revelation 16:1
source:
  edition: SBLGNT
  text: Καὶ ἤκουσα ⸂μεγάλης φωνῆς⸃ ἐκ τοῦ ναοῦ λεγούσης τοῖς ἑπτὰ ἀγγέλοις· Ὑπάγετε καὶ ⸀ἐκχέετε τὰς ἑπτὰ φιάλας τοῦ θυμοῦ τοῦ θεοῦ εἰς τὴν γῆν.
translation:
  text: And I heard a loud voice from the sanctuary saying to the seven angels[b][a], “Go and pour out the seven bowls of the wrath of God onto the earth.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'temple' for 'sanctuary' (Greek ναός), though ναός often refers more specifically to the inner shrine than to the broader temple complex.
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'vials'; the Greek word means 'bowls.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγάλης φωνῆς
  chosen: a loud voice
  alternatives:
  - a great voice
  lexicon: BDAG
  rationale: μέγας with φωνή idiomatically denotes loudness/volume in English rather than greatness as a quality of the voice. 'Loud voice' is natural modern English and preserves the force of the expression.
- source_word: ναοῦ
  chosen: sanctuary
  alternatives:
  - temple
  lexicon: BDAG
  rationale: ναός commonly refers to the inner shrine/sanctuary rather than the broader temple complex (for which ἱερόν is more typical). In Revelation's heavenly setting, 'sanctuary' better preserves that specificity than the broader 'temple'.
- source_word: λεγούσης
  chosen: saying
  alternatives:
  - which said
  - speaking
  lexicon: BDAG
  rationale: 'The present participle agrees with φωνῆς and is naturally rendered in English as a participial clause modifying ''voice'': ''a loud voice ... saying.'' This keeps the vividness of the Greek without awkwardness.'
- source_word: Ὑπάγετε
  chosen: Go
  alternatives:
  - Go away
  - Be on your way
  lexicon: BDAG
  rationale: As an imperative to the angels, ὑπάγω here functions as a straightforward command to depart and act. 'Go' is the clearest idiomatic rendering.
- source_word: ἐκχέετε
  chosen: pour out
  alternatives:
  - pour forth
  - empty out
  lexicon: BDAG
  rationale: ἐκχέω in judgment contexts is conventionally and accurately rendered 'pour out,' preserving the imagery of contents being emptied in full.
- source_word: φιάλας
  chosen: bowls
  alternatives:
  - vials
  lexicon: BDAG
  rationale: φιάλη denotes a bowl or shallow vessel. 'Bowls' reflects the Greek object more accurately in contemporary English than the traditional but misleading 'vials.'
- source_word: θυμοῦ
  chosen: wrath
  alternatives:
  - anger
  - fury
  lexicon: BDAG
  rationale: θυμός here denotes God's intense judicial anger in apocalyptic judgment. 'Wrath' best preserves the solemn theological weight and established semantic distinction from ordinary human irritation.
- source_word: εἰς τὴν γῆν
  chosen: onto the earth
  alternatives:
  - upon the earth
  - into the earth
  - on the land
  lexicon: BDAG
  rationale: With ἐκχέω, εἰς can express movement onto/upon a surface or into a domain. 'Onto the earth' communicates the directional force clearly in modern English. 'Earth' is preferred over 'land' because the context is cosmic judgment affecting the world, not merely a local territory.
