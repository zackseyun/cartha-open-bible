theological_decisions:
- issue: Rendering ναός in Revelation's heavenly scene
  chosen_reading: sanctuary
  alternative_readings:
  - temple
  rationale: Choosing 'sanctuary' avoids flattening ναός into the broader temple complex and better fits the heavenly holy-place imagery in Revelation. This is a lexical-theological nuance rather than a doctrinally contested issue.
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering θυμός τοῦ θεοῦ
  chosen_reading: the wrath of God
  alternative_readings:
  - the anger of God
  - the fury of God
  rationale: The phrase refers to divine judicial judgment. 'Wrath' preserves the gravity of God's holy opposition to evil without importing extra doctrinal claims beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §6
