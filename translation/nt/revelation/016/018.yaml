id: REV.16.18
reference: Revelation 16:18
source:
  edition: SBLGNT
  text: καὶ ἐγένοντο ἀστραπαὶ καὶ ⸂φωναὶ καὶ βρονταί⸃, καὶ σεισμὸς ⸀ἐγένετο μέγας,
    οἷος οὐκ ἐγένετο ἀφ’ οὗ ⸂ἄνθρωποι ἐγένοντο⸃ ἐπὶ τῆς γῆς τηλικοῦτος σεισμὸς οὕτω
    μέγας,
translation:
  text: And there were flashes of lightning and sounds and peals of thunder, and there
    was a great earthquake, such as had not happened since people came to be on the
    earth—so great was that earthquake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'since people came to be on the earth' or 'since human beings came to
      be on the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀστραπαὶ
  chosen: flashes of lightning
  alternatives:
  - lightnings
  - lightning flashes
  lexicon: BDAG
  rationale: The plural noun denotes repeated flashes; 'flashes of lightning' is idiomatic
    modern English while preserving the plural force better than the traditional but
    less natural 'lightnings'.
- source_word: φωναὶ
  chosen: sounds
  alternatives:
  - voices
  - noises
  lexicon: BDAG
  rationale: φωνή can mean 'voice' or 'sound.' In this storm-theophany sequence with
    lightning and thunder, 'sounds' best fits the non-personal auditory phenomena
    without over-specifying speech. 'Voices' is possible and traditional, but here
    likely refers to heavenly or atmospheric sounds accompanying judgment.
- source_word: βρονταί
  chosen: peals of thunder
  alternatives:
  - thunders
  - thunderclaps
  lexicon: BDAG
  rationale: The plural is best represented by an English count expression. 'Peals
    of thunder' is natural and vivid, preserving repeated thunderous reports better
    than the less idiomatic bare plural 'thunders'.
- source_word: σεισμὸς
  chosen: earthquake
  alternatives:
  - seismic shaking
  lexicon: BDAG
  rationale: Standard rendering for σεισμός in this context; clear and natural.
- source_word: μέγας
  chosen: great
  alternatives:
  - mighty
  - massive
  lexicon: BDAG
  rationale: '''Great'' preserves the elevated register and matches apocalyptic style
    without adding interpretive color.'
- source_word: οἷος οὐκ ἐγένετο
  chosen: such as had not happened
  alternatives:
  - the like of which had not occurred
  - such as never occurred
  lexicon: BDAG
  rationale: This comparative clause emphasizes unprecedented magnitude. 'Such as
    had not happened' is idiomatic and preserves the retrospective comparison.
- source_word: ἀφ’ οὗ
  chosen: since
  alternatives:
  - from the time when
  - ever since
  lexicon: BDAG
  rationale: Temporal sense is clear; 'since' is concise and natural.
- source_word: ἄνθρωποι ἐγένοντο ἐπὶ τῆς γῆς
  chosen: men came to be on the earth
  alternatives:
  - people came to be on the earth
  - man came to be upon the earth
  - human beings came to be on the earth
  lexicon: BDAG
  rationale: ἄνθρωποι is grammatically masculine plural but refers generically to
    humanity. Per doctrine, a gender-accurate rendering is preferred where representative
    force is present; 'men' preserves the source's form and echoes biblical idiom.
    'Came to be' reflects ἐγένοντο more closely than simply 'were.' A footnote preserves
    the inclusive alternative.
- source_word: τηλικοῦτος
  chosen: so great
  alternatives:
  - so mighty
  - of such magnitude
  lexicon: BDAG
  rationale: τηλικοῦτος intensifies the scale ('so great,' 'so enormous'). 'So great'
    is direct and idiomatic.
- source_word: οὕτω
  chosen: so
  alternatives:
  - thus
  - so very
  lexicon: BDAG
  rationale: Used adverbially for emphasis with μέγας; 'so' is the natural English
    equivalent.
