theological_decisions:
- issue: Rendering the judgment idiom ἐμνήσθη ἐνώπιον τοῦ θεοῦ
  chosen_reading: was remembered before God
  alternative_readings:
  - came into remembrance before God
  - was brought to God's remembrance for judgment
  rationale: The phrase is an established biblical idiom indicating that Babylon has come under God's judicial notice. The chosen rendering preserves the idiom and theological tension without flattening it into an explanatory paraphrase. The context itself supplies that the remembrance is for judgment.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Distinguishing θυμός and ὀργή in the same clause
  chosen_reading: the wine of the fury of his wrath
  alternative_readings:
  - the wine of the wrath of his anger
  - the wine of his furious wrath
  rationale: Because the Greek uses two related but distinct judgment terms, the translation preserves both rather than collapsing them into one English word. This maintains the force of the original and avoids interpretive reduction.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented exception.'
