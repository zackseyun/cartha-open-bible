id: REV.16.19
reference: Revelation 16:19
source:
  edition: SBLGNT
  text: καὶ ἐγένετο ἡ πόλις ἡ μεγάλη εἰς τρία μέρη, καὶ αἱ πόλεις τῶν ἐθνῶν ἔπεσαν· καὶ Βαβυλὼν ἡ μεγάλη ἐμνήσθη ἐνώπιον τοῦ θεοῦ δοῦναι αὐτῇ τὸ ποτήριον τοῦ οἴνου τοῦ θυμοῦ τῆς ὀργῆς αὐτοῦ·
translation:
  text: And the great city was split into three parts[a], and the cities of the nations fell. And Babylon the great was remembered before God, to give her the cup of the wine of the fury of his wrath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'came into remembrance before God.' The expression is a biblical idiom for coming under God's notice for judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  chosen: was split
  alternatives:
  - became
  - came to be
  lexicon: BDAG
  rationale: 'Although γίνομαι often means ''become'' or ''come to be,'' in the construction ἐγένετο ... εἰς τρία μέρη the sense is resultative: the city came to be in three parts, i.e., ''was split into three parts.'' This is clearer modern English while staying close to the Greek.'
- source_word: ἡ πόλις ἡ μεγάλη
  chosen: the great city
  alternatives:
  - the great metropolis
  lexicon: BDAG
  rationale: A straightforward rendering of the articular noun plus attributive adjective. 'City' preserves the apocalyptic imagery and likely allusion to the symbolic urban center already in view.
- source_word: εἰς τρία μέρη
  chosen: into three parts
  alternatives:
  - in three parts
  lexicon: BDAG
  rationale: εἰς with the accusative marks resulting state or division. 'Into three parts' best conveys the movement/result nuance.
- source_word: αἱ πόλεις τῶν ἐθνῶν
  chosen: the cities of the nations
  alternatives:
  - the cities of the Gentiles
  - the cities of the peoples
  lexicon: BDAG
  rationale: ἔθνη can mean 'nations,' 'Gentiles,' or 'peoples.' In Revelation's global judgment context, 'nations' is the most natural and least misleading English rendering.
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - collapsed
  lexicon: BDAG
  rationale: Aorist of πίπτω is naturally 'fell.' 'Collapsed' is interpretive; 'fell' preserves the vivid apocalyptic diction and allows readers to infer structural ruin.
- source_word: Βαβυλὼν ἡ μεγάλη
  chosen: Babylon the great
  alternatives:
  - great Babylon
  lexicon: BDAG
  rationale: This preserves the Greek word order emphasis and matches the repeated apocalyptic title in Revelation.
- source_word: ἐμνήσθη ἐνώπιον τοῦ θεοῦ
  chosen: was remembered before God
  alternatives:
  - came into remembrance before God
  - was brought to God's remembrance
  lexicon: BDAG
  rationale: The passive/deponent form of μιμνῄσκομαι here reflects biblical idiom of coming under divine notice for judgment. 'Was remembered before God' is close to the Greek and preserves the judicial nuance without over-paraphrasing.
- source_word: δοῦναι αὐτῇ
  chosen: to give her
  alternatives:
  - so as to give her
  lexicon: BDAG
  rationale: The infinitive expresses purpose or result following 'was remembered before God.' 'To give her' is sufficiently literal and readable.
- source_word: τὸ ποτήριον
  chosen: the cup
  alternatives:
  - the goblet
  lexicon: BDAG
  rationale: '''Cup'' is the standard biblical metaphor for an allotted portion, especially of judgment, and best preserves intertextual resonance.'
- source_word: τοῦ οἴνου
  chosen: of the wine
  alternatives:
  - filled with wine
  lexicon: BDAG
  rationale: A formal rendering preserves the genitival chain rather than smoothing it away. The image is metaphorical but should remain transparent.
- source_word: τοῦ θυμοῦ
  chosen: of the fury
  alternatives:
  - of the passion
  - of the wrath
  lexicon: BDAG
  rationale: θυμός in Revelation often denotes intense outburst or fury. Rendering it as 'fury' helps distinguish it from the following ὀργή.
- source_word: τῆς ὀργῆς αὐτοῦ
  chosen: of his wrath
  alternatives:
  - of his anger
  lexicon: BDAG
  rationale: 'ὀργή is commonly rendered ''wrath'' in divine judgment contexts. Keeping both θυμός and ὀργή in the phrase preserves the rhetorical intensification: ''the wine of the fury of his wrath.'''
