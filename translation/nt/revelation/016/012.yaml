theological_decisions:
- issue: Whether to make explicit that 'the sixth' is an angel
  chosen_reading: Kept the text as 'the sixth' without adding 'angel.'
  alternative_readings:
  - the sixth angel
  rationale: The immediate literary context identifies the bowl-pourers as angels,
    but this verse itself does not repeat the noun. To avoid importing words not present
    in the Greek, the translation preserves the ellipsis.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Whether to interpret the drying of the Euphrates and the kings' approach
    symbolically in the translation
  chosen_reading: Rendered the imagery straightforwardly without interpretive expansion.
  alternative_readings:
  - Paraphrastic renderings that explain the symbolism of invasion or eschatological
    gathering
  rationale: The verse presents apocalyptic imagery but does not itself explain its
    full significance. The translation preserves the theological tension and imagery
    rather than resolving the symbolism in the main text.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it
