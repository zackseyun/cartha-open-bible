id: REV.16.12
reference: Revelation 16:12
source:
  edition: SBLGNT
  text: Καὶ ὁ ἕκτος ἐξέχεεν τὴν φιάλην αὐτοῦ ἐπὶ τὸν ποταμὸν τὸν μέγαν ⸀τὸν Εὐφράτην·
    καὶ ἐξηράνθη τὸ ὕδωρ αὐτοῦ, ἵνα ἑτοιμασθῇ ἡ ὁδὸς τῶν βασιλέων τῶν ἀπὸ ἀνατολῆς
    ἡλίου.
translation:
  text: And the sixth poured out his bowl on the great river Euphrates, and its water
    was dried up, so that the way of the kings from the rising of the sun might be
    prepared.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more simply, 'from the east.' Literally, 'from the rising of the sun.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἕκτος
  chosen: the sixth
  alternatives:
  - the sixth angel
  lexicon: BDAG
  rationale: The Greek text has only the ordinal with the article, referring back
    to the sixth bowl-bearing figure in context. 'The sixth' is formally accurate;
    adding 'angel' would be interpretive supplementation from the broader passage.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - emptied out
  lexicon: BDAG
  rationale: Standard rendering of ἐκχέω in Revelation's bowl judgments. 'Poured out'
    is idiomatic and preserves the sacrificial/judgment imagery better than the flatter
    'emptied out.'
- source_word: φιάλην
  chosen: bowl
  alternatives:
  - shallow bowl
  - vial
  lexicon: BDAG
  rationale: '''Bowl'' is the established and accurate sense for φιάλη in this context.
    ''Vial'' is traditional but misleading in modern English, suggesting a small bottle
    rather than a broad vessel.'
- source_word: ἐπὶ τὸν ποταμὸν τὸν μέγαν τὸν Εὐφράτην
  chosen: on the great river Euphrates
  alternatives:
  - onto the great river Euphrates
  - upon the great river Euphrates
  lexicon: BDAG
  rationale: This preserves the appositional structure and natural English word order.
    'On' is a suitable rendering of ἐπί here with the object of the bowl's outpouring.
- source_word: ἐξηράνθη
  chosen: was dried up
  alternatives:
  - dried up
  - was dried
  lexicon: BDAG
  rationale: The aorist passive is best represented with an English passive. 'Was
    dried up' captures both the event and the result in natural English.
- source_word: τὸ ὕδωρ αὐτοῦ
  chosen: its water
  alternatives:
  - the water of it
  - his water
  lexicon: BDAG
  rationale: The pronoun refers to the river, so English idiom prefers 'its water.'
    This avoids wooden phrasing while preserving the referent.
- source_word: ἵνα ἑτοιμασθῇ
  chosen: so that ... might be prepared
  alternatives:
  - in order that ... might be prepared
  - so that ... would be prepared
  lexicon: BDAG
  rationale: ἵνα with the aorist passive subjunctive expresses purpose. 'So that ...
    might be prepared' is clear and preserves the purposive force.
- source_word: ἡ ὁδὸς
  chosen: the way
  alternatives:
  - the road
  - the path
  lexicon: BDAG
  rationale: ὁδός can mean road or way; 'the way' is broad enough to include literal
    and symbolic overtones in apocalyptic context without over-specifying.
- source_word: τῶν βασιλέων
  chosen: of the kings
  alternatives:
  - for the kings
  lexicon: BDAG
  rationale: The genitive is most naturally rendered 'of the kings' modifying 'the
    way.' English can imply destination or possession from context without recasting
    the syntax.
- source_word: τῶν ἀπὸ ἀνατολῆς ἡλίου
  chosen: from the rising of the sun
  alternatives:
  - from the east
  - from where the sun rises
  lexicon: BDAG
  rationale: Literally, the phrase is 'from the rising of the sun.' This more formal
    rendering preserves the vivid idiom and apocalyptic tone. 'From the east' is a
    valid simplification but loses the imagery.
