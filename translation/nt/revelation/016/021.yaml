theological_decisions:
- issue: Meaning of οὐρανός in an apocalyptic judgment context
  chosen_reading: from heaven
  alternative_readings:
  - from the sky
  rationale: The immediate sense could be atmospheric, but Revelation regularly frames
    judgments as proceeding from heaven in a theological sense. 'From heaven' preserves
    both the literal direction and the apocalyptic-theological register without adding
    doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἄνθρωποι generically
  chosen_reading: the people
  alternative_readings:
  - men
  - human beings
  - mankind
  rationale: The noun is generic rather than specifically male. This follows the gender-accurate
    principle by rendering the referent as humanity in context while keeping readable
    modern English.
  doctrine_reference: Translation philosophy §4
