id: REV.16.21
reference: Revelation 16:21
source:
  edition: SBLGNT
  text: καὶ χάλαζα μεγάλη ὡς ταλαντιαία καταβαίνει ἐκ τοῦ οὐρανοῦ ἐπὶ τοὺς ἀνθρώπους·
    καὶ ἐβλασφήμησαν οἱ ἄνθρωποι τὸν θεὸν ἐκ τῆς πληγῆς τῆς χαλάζης, ὅτι μεγάλη ἐστὶν
    ἡ πληγὴ αὐτῆς σφόδρα.
translation:
  text: And great hail, about a talent in weight, comes down from heaven on the people;
    and the people blasphemed God because of the plague of the hail, because its plague
    is exceedingly severe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'weighing about a talent'—that is, roughly the weight of a talent each;
      the Greek expresses comparison rather than exact measurement.
    reason: lexical_alternative
  - marker: b
    text: Or, 'for its plague is very great.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάλαζα μεγάλη
  chosen: great hail
  alternatives:
  - huge hail
  - large hailstones
  lexicon: BDAG
  rationale: Rendered with a natural English collocation that preserves the singular
    collective sense of the Greek noun with its adjective. 'Great hail' communicates
    the magnitude without unnecessarily shifting to plural 'hailstones,' though the
    context implies individual stones.
- source_word: ὡς ταλαντιαία
  chosen: about a talent in weight
  alternatives:
  - weighing about a talent
  - talent-heavy
  - about one talent each
  lexicon: BDAG
  rationale: ταλαντιαία refers to the weight of a talent. 'About a talent in weight'
    makes explicit the comparison introduced by ὡς while remaining readable. It avoids
    overprecision while conveying the extraordinary size of the hail.
- source_word: καταβαίνει
  chosen: comes down
  alternatives:
  - descends
  - is coming down
  lexicon: BDAG
  rationale: Present tense in apocalyptic narrative is retained with the vivid English
    present 'comes down.' This preserves the immediacy of the Greek better than a
    simple past, while remaining idiomatic.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  - from the sky
  lexicon: BDAG
  rationale: οὐρανός can mean 'sky' or 'heaven'; in Revelation, 'heaven' is the more
    theologically and literarily fitting choice, especially in a judgment scene proceeding
    from above.
- source_word: ἐπὶ τοὺς ἀνθρώπους
  chosen: on the people
  alternatives:
  - upon men
  - on mankind
  - on human beings
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings generally. 'The people' is natural
    modern English and reflects the article, while avoiding an unnecessarily male-specific
    rendering in a context of general humanity.
- source_word: ἐβλασφήμησαν
  chosen: blasphemed
  alternatives:
  - spoke evil against
  - cursed
  lexicon: BDAG
  rationale: βλασφημέω in relation to God is most directly rendered 'blasphemed.'
    This preserves the theological gravity of irreverent speech against God better
    than the looser 'cursed' or explanatory paraphrases.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἐβλασφήμησαν; standard rendering.
- source_word: ἐκ τῆς πληγῆς τῆς χαλάζης
  chosen: because of the plague of the hail
  alternatives:
  - because of the hail's plague
  - from the plague of the hail
  - because of the blow of the hail
  lexicon: BDAG
  rationale: ἐκ here is causal. πληγή in Revelation commonly denotes a divinely inflicted
    'plague' or 'affliction,' not merely a physical strike. Retaining 'plague' also
    preserves intratextual consistency across Revelation's judgment scenes.
- source_word: ὅτι μεγάλη ἐστὶν ἡ πληγὴ αὐτῆς σφόδρα
  chosen: because its plague is exceedingly severe
  alternatives:
  - for its plague is very great
  - because its affliction is extremely great
  lexicon: BDAG
  rationale: The clause explains the blasphemy. μεγάλη ... σφόδρα intensifies the
    severity; 'exceedingly severe' is idiomatic modern English that captures the force
    without wooden repetition of 'great ... very.' The pronoun αὐτῆς refers back to
    the hail.
