id: REV.16.2
reference: Revelation 16:2
source:
  edition: SBLGNT
  text: Καὶ ἀπῆλθεν ὁ πρῶτος καὶ ἐξέχεεν τὴν φιάλην αὐτοῦ εἰς τὴν γῆν· καὶ ἐγένετο
    ἕλκος κακὸν καὶ πονηρὸν ἐπὶ τοὺς ἀνθρώπους τοὺς ἔχοντας τὸ χάραγμα τοῦ θηρίου
    καὶ τοὺς προσκυνοῦντας τῇ εἰκόνι αὐτοῦ.
translation:
  text: And the first went and poured out his bowl onto the earth, and a harmful and
    grievous sore came upon the people who had the mark of the beast and who worshiped
    its image.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a foul and evil sore.' The Greek uses two strong adjectives, κακόν and
      πονηρόν, to intensify the plague's severity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  chosen: went
  alternatives:
  - went away
  - departed
  lexicon: BDAG
  rationale: Aorist of ἀπέρχομαι in narrative sequence; 'went' is natural modern English
    and preserves the movement without adding emphasis beyond the Greek.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the first angel
  lexicon: BDAG
  rationale: The adjective with article functions substantivally, referring back to
    the first of the seven angels from the context. 'The first' preserves the Greek
    wording without importing the noun into the text.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - poured
  lexicon: BDAG
  rationale: ἐκχέω commonly means 'pour out'; the compound sense is well represented
    in English and matches Revelation's repeated bowl-judgment formula.
- source_word: φιάλην
  chosen: bowl
  alternatives:
  - shallow bowl
  - vial
  lexicon: BDAG
  rationale: '''Bowl'' is the standard and most accessible rendering for φιάλη in
    Revelation. ''Vial'' is traditional but misleading in modern English because it
    suggests a small bottle.'
- source_word: εἰς τὴν γῆν
  chosen: onto the earth
  alternatives:
  - upon the earth
  - into the earth
  - on the land
  lexicon: BDAG
  rationale: εἰς with the earth here indicates direction toward the earth as the target
    of the bowl. 'Onto the earth' is idiomatic and preserves the global sense of γῆ;
    'land' is possible lexically but less likely in this apocalyptic context.
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - came to be
  - appeared
  - there came
  lexicon: BDAG
  rationale: γίνομαι here introduces the resulting plague. 'Came' in the phrase 'came
    upon' is idiomatic English and conveys the onset of the affliction.
- source_word: ἕλκος
  chosen: sore
  alternatives:
  - ulcer
  - boil
  lexicon: BDAG
  rationale: ἕλκος denotes an ulcerous sore or festering lesion. 'Sore' is readable
    modern English; 'ulcer' is more clinical and 'boil' too specific. The singular
    is retained as a collective/plague expression.
- source_word: κακὸν
  chosen: harmful
  alternatives:
  - bad
  - painful
  - malignant
  lexicon: BDAG
  rationale: κακός here characterizes the sore as injurious or bad in effect. 'Harmful'
    distinguishes it from the following πονηρόν rather than flattening both adjectives
    into the same English word.
- source_word: πονηρὸν
  chosen: grievous
  alternatives:
  - evil
  - severe
  - painful
  lexicon: BDAG
  rationale: πονῆρος can mean evil, wicked, or in some contexts oppressive/injurious.
    With ἕλκος and paired with κακόν, 'grievous' captures the severe, dreadful quality
    of the plague without suggesting moral evil in the sore itself.
- source_word: ἐπὶ τοὺς ἀνθρώπους
  chosen: upon the people
  alternatives:
  - upon the men
  - on the people
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings generally, specifically those aligned
    with the beast. 'People' is the most natural gender-accurate rendering for the
    referent.
- source_word: τοὺς ἔχοντας
  chosen: who had
  alternatives:
  - having
  - who were having
  lexicon: BDAG
  rationale: The present participle is rendered as a relative clause in natural English.
    'Had' fits the narrative context and indicates possession of the mark at the time
    of judgment.
- source_word: τὸ χάραγμα τοῦ θηρίου
  chosen: the mark of the beast
  alternatives:
  - the beast's mark
  lexicon: BDAG
  rationale: Standard and transparent rendering of a key Revelation phrase; 'beast'
    is the established gloss for θηρίον in this context.
- source_word: τοὺς προσκυνοῦντας
  chosen: who worshiped
  alternatives:
  - who were worshiping
  - who bowed down to
  lexicon: BDAG
  rationale: προσκυνέω in Revelation regularly denotes worshipful homage. 'Worshiped'
    best fits the idolatrous-religious force of the term.
- source_word: τῇ εἰκόνι αὐτοῦ
  chosen: its image
  alternatives:
  - his image
  - the image of it
  lexicon: BDAG
  rationale: θηρίον is grammatically neuter, and the pronoun refers back to it. English
    commonly uses 'its' for a beastly figure; this avoids unnecessary personification
    beyond what the Greek grammar requires.
