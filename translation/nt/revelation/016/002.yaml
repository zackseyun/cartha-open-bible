theological_decisions:
- issue: Rendering the dual adjectives κακὸν καὶ πονηρὸν modifying ἕλκος
  chosen_reading: Rendered as 'a harmful and grievous sore'
  alternative_readings:
  - a foul and evil sore
  - a harmful and painful sore
  - an ugly and malignant ulcer
  rationale: The text stacks two near-synonymous negative adjectives for emphasis.
    The chosen rendering preserves the intensification without implying a moral quality
    in the sore itself. This avoids over-theologizing the plague while retaining its
    severity.
  doctrine_reference: Translation philosophy §6; Preserve theological tension rather
    than resolve it
- issue: Referent of those judged
  chosen_reading: '''the people who had the mark of the beast and who worshiped its
    image'''
  alternative_readings:
  - '''the men who had...'''
  - '''those having... and worshiping...'''
  rationale: The verse explicitly limits the plague to those aligned with the beast
    through mark-bearing and image-worship. The translation preserves that specificity
    and does not broaden the judgment beyond the text.
  doctrine_reference: Translation philosophy §4
