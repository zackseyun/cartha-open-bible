theological_decisions:
- issue: 'Apocalyptic imagery: whether to interpret the cosmic language as literal
    disappearance or soften it into figurative collapse'
  chosen_reading: Retain the concrete imagery in translation without interpretive
    softening
  alternative_readings:
  - Render more interpretively as 'vanished' or 'disappeared'
  rationale: The Greek presents vivid, concrete apocalyptic description. A translation
    should preserve that imagery and leave questions of literal versus symbolic referent
    to interpretation rather than resolving them in the wording.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
