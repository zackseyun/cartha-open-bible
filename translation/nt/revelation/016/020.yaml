id: REV.16.20
reference: Revelation 16:20
source:
  edition: SBLGNT
  text: καὶ πᾶσα νῆσος ἔφυγεν, καὶ ὄρη οὐχ εὑρέθησαν.
translation:
  text: And every island fled[a], and mountains were not found.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'vanished.' The Greek verb literally means 'fled,' preserving the verse's vivid personification.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα
  chosen: every
  alternatives:
  - all
  lexicon: BDAG
  rationale: With singular νῆσος, πᾶσα is naturally rendered distributively as 'every' rather than the more collective 'all.' This preserves the force that each island disappeared.
- source_word: νῆσος
  chosen: island
  lexicon: BDAG
  rationale: The noun straightforwardly denotes an 'island.' Singular in Greek after πᾶσα is idiomatically represented in English as 'every island.'
- source_word: ἔφυγεν
  chosen: fled
  alternatives:
  - vanished
  - ran away
  - disappeared
  lexicon: BDAG
  rationale: φεύγω literally means 'flee' or 'escape.' 'Fled' keeps the vivid personifying imagery of the apocalypse better than the smoother interpretive rendering 'vanished,' though disappearance is the contextual result.
- source_word: ὄρη
  chosen: mountains
  alternatives:
  - the mountains
  lexicon: BDAG
  rationale: Plural ὄρη is best rendered simply 'mountains.' The anarthrous Greek does not require the English article.
- source_word: οὐχ εὑρέθησαν
  chosen: were found
  alternatives:
  - could not be found
  - were no longer found
  - were not found
  lexicon: BDAG
  rationale: The passive of εὑρίσκω means 'to be found.' In context, with οὐχ and following the cosmic upheaval imagery, English idiom is best expressed as 'no mountains were found,' conveying that none remained discoverable without overparaphrasing.
- source_word: καὶ ... καὶ
  chosen: And ... and
  alternatives:
  - Then ... and
  lexicon: BDAG
  rationale: The repeated καὶ coordinates the two clauses. Retaining 'And ... and' preserves the paratactic, cumulative style characteristic of Revelation.
