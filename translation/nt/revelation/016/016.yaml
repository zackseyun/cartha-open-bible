id: REV.16.16
reference: Revelation 16:16
source:
  edition: SBLGNT
  text: καὶ συνήγαγεν αὐτοὺς εἰς τὸν τόπον τὸν καλούμενον Ἑβραϊστὶ Ἁρμαγεδών.
translation:
  text: And he gathered them to the place that in Hebrew is called Armageddon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''he/it gathered them.'' The singular verb may point to a single
      implied agent, while the main text reflects the plural sense suggested by the
      preceding unclean spirits who go out to gather the kings (vv. 13–14).'
    reason: alternative_reading
  - marker: b
    text: Or 'in the Hebrew/Aramaic language.' In Revelation, 'in Hebrew' reflects
      the Semitic name-form rather than requiring a strict distinction between Hebrew
      and Aramaic.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήγαγεν
  chosen: they gathered
  alternatives:
  - he gathered
  - it gathered
  lexicon: BDAG
  rationale: Although the Greek form is singular ('he/it gathered'), the broader context
    of vv. 13–14 has the unclean spirits going out to gather the kings, and many interpreters
    understand an implicit plural sense carried into v. 16. Rendering 'they gathered'
    makes the English cohere with the immediate antecedents and avoids an awkward
    impersonal singular. The singular alternative is preserved in a footnote because
    the Greek form itself is singular and text-critically significant.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative plural pronoun referring to those being assembled,
    namely the kings/rulers and their forces in context.
- source_word: τόπον
  chosen: the place
  alternatives:
  - the site
  lexicon: BDAG
  rationale: '''Place'' is the natural and sufficiently formal rendering of τόπος
    here; ''site'' is possible but less idiomatic in biblical narrative/apocalyptic
    style.'
- source_word: καλούμενον
  chosen: is called
  alternatives:
  - called
  - named
  lexicon: BDAG
  rationale: The participle modifies 'place' and is well represented in English by
    the relative clause 'that ... is called.' This is readable modern English while
    preserving the passive sense.
- source_word: Ἑβραϊστὶ
  chosen: in Hebrew
  alternatives:
  - in the Hebrew language
  - in Hebrew/Aramaic
  lexicon: BDAG
  rationale: Standard rendering in Revelation for Ἑβραϊστί. In Johannine usage it
    can denote the Semitic vernacular of Judea more broadly, often Aramaic, but 'in
    Hebrew' is the conventional and textually transparent translation; the broader
    linguistic note is preserved in a footnote.
- source_word: Ἁρμαγεδών
  chosen: Armageddon
  alternatives:
  - Har-Magedon
  lexicon: BDAG
  rationale: This is a proper name and should be transliterated, per translation philosophy.
    'Armageddon' is the standard English transliteration; a more segmented form ('Har-Magedon')
    may better reflect the likely Hebrew origin but is less conventional and is better
    handled in a note if needed.
