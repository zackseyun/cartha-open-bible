theological_decisions:
- issue: Agent of the gathering
  chosen_reading: they gathered them
  alternative_readings:
  - he gathered them
  - it gathered them
  rationale: The Greek verb is singular, but the immediate literary context emphasizes
    the demonic spirits as the gathering agents (vv. 13–14). Rendering the implied
    sense as plural produces clearer English in context without adding doctrinal content.
    Because the singular form could also be taken as referring to a single agent (for
    example, God, the dragon/beast complex collectively, or an impersonal force),
    the singular alternative is preserved in a footnote rather than erased.
  doctrine_reference: Preserve theological tension rather than resolve it.
