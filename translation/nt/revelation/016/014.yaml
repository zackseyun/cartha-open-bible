id: REV.16.14
reference: Revelation 16:14
source:
  edition: SBLGNT
  text: εἰσὶν γὰρ πνεύματα δαιμονίων ποιοῦντα σημεῖα, ἃ ἐκπορεύεται ἐπὶ τοὺς βασιλεῖς τῆς οἰκουμένης ὅλης, συναγαγεῖν αὐτοὺς εἰς τὸν πόλεμον τῆς ⸀ἡμέρας τῆς μεγάλης τοῦ θεοῦ τοῦ παντοκράτορος—
translation:
  text: For they are spirits of demons[a], performing signs, which go out to the kings of the whole world[b], to gather them for the battle of the great day of God the Almighty—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spirits of demons.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the kings of the whole inhabited world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεύματα δαιμονίων
  chosen: demonic spirits
  alternatives:
  - spirits of demons
  - spirits from demons
  lexicon: BDAG
  rationale: 'The genitive δαιμονίων is most naturally attributive or descriptive here: these are spirits characterized as demonic. ''Demonic spirits'' is more natural modern English than the more wooden ''spirits of demons'' while preserving the sense.'
- source_word: ποιοῦντα σημεῖα
  chosen: performing signs
  alternatives:
  - doing signs
  - working signs
  lexicon: BDAG
  rationale: ποιέω with σημεῖα commonly means to perform or do miraculous signs. 'Performing signs' is idiomatic and retains the supernatural connotation without overinterpreting them as necessarily divine miracles.
- source_word: ἃ ἐκπορεύεται
  chosen: which go out
  alternatives:
  - which come out
  - which proceed
  lexicon: BDAG
  rationale: Although ἐκπορεύεται is singular in form while ἃ is plural, the sense is plural, referring back to the spirits. English should reflect the referent rather than reproduce the Greek irregularity. 'Go out' is clear and natural.
- source_word: ἐπὶ τοὺς βασιλεῖς
  chosen: to the kings
  alternatives:
  - against the kings
  - upon the kings
  lexicon: BDAG
  rationale: With verbs of motion, ἐπί can indicate movement toward. Here the spirits go out to the kings in order to gather them, so 'to the kings' best fits the context.
- source_word: τῆς οἰκουμένης ὅλης
  chosen: of the whole world
  alternatives:
  - of the whole inhabited world
  - of the whole earth
  lexicon: BDAG
  rationale: οἰκουμένη often denotes the inhabited world or world-order under human rule. In Revelation this global-political sense is well conveyed by 'the whole world.' 'Earth' could be confused with γῆ, and 'inhabited world' is less natural in contemporary English.
- source_word: συναγαγεῖν
  chosen: to gather
  alternatives:
  - to assemble
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: the spirits go out in order to gather the kings. ''Gather'' is the most direct rendering.'
- source_word: εἰς τὸν πόλεμον
  chosen: for the battle
  alternatives:
  - into the battle
  - for war
  lexicon: BDAG
  rationale: In English, 'gather them for the battle' best expresses the telic force of εἰς here. 'War' is broader than the singular conflict envisioned.
- source_word: τῆς ἡμέρας τῆς μεγάλης
  chosen: of the great day
  alternatives:
  - of the day, the great one
  lexicon: BDAG
  rationale: This genitival chain modifies 'battle' and is idiomatically rendered 'the battle of the great day.' It preserves the apocalyptic solemnity without awkward literalism.
- source_word: τοῦ θεοῦ τοῦ παντοκράτορος
  chosen: of God the Almighty
  alternatives:
  - of God, the Almighty
  - of the all-powerful God
  lexicon: BDAG
  rationale: παντοκράτωρ is a divine title regularly rendered 'the Almighty.' Translating the title preserves meaning and aligns with established biblical English while remaining accessible.
