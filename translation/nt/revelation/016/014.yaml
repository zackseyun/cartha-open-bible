theological_decisions:
- issue: Nature of the spirits' signs
  chosen_reading: The text presents the signs as real deceptive signs performed by demonic spirits, without specifying their mechanism.
  alternative_readings:
  - The signs are merely apparent tricks
  - The signs are explicitly miraculous in the same sense as divine miracles
  rationale: σημεῖα should be translated straightforwardly as 'signs.' The verse attributes them to demonic spirits and does not require the translator to resolve whether they are counterfeit wonders, genuine supernatural acts, or both.
  doctrine_reference: Preserve theological tension rather than resolve it.
