theological_decisions:
- issue: Implied subject of ἐγένετο
  chosen_reading: The rivers and springs became blood
  alternative_readings:
  - The water became blood
  rationale: The immediate antecedents are 'the rivers and the springs of water.'
    Rendering the implied subject as plural in English preserves the judgment's scope
    and avoids ambiguity. This is a grammatical/semantic decision rather than a doctrinal
    one, and it does not add content beyond what the context supplies.
  doctrine_reference: Translation philosophy §1, §5
