id: REV.16.4
reference: Revelation 16:4
source:
  edition: SBLGNT
  text: Καὶ ὁ τρίτος ἐξέχεεν τὴν φιάλην αὐτοῦ εἰς τοὺς ποταμοὺς ⸀καὶ τὰς πηγὰς τῶν
    ὑδάτων· καὶ ἐγένετο αἷμα.
translation:
  text: And the third poured out his bowl into the rivers and the springs of water,
    and they became blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and it became blood,' with the singular verb summarizing
      the waters collectively.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ τρίτος
  chosen: the third
  alternatives:
  - the third angel
  lexicon: BDAG
  rationale: The Greek text has only the ordinal with article, 'the third,' with the
    noun implied from the immediate context of the bowl judgments. English can preserve
    the ellipsis naturally as 'the third' without adding 'angel' to the main text.
- source_word: ἐξέχεεν
  chosen: poured out
  alternatives:
  - emptied out
  - poured
  lexicon: BDAG
  rationale: ἐκχέω commonly means 'pour out' and is the standard idiom in this judgment
    sequence for the action with the bowl. 'Poured out' is both natural and formally
    close.
- source_word: φιάλην
  chosen: bowl
  alternatives:
  - vial
  lexicon: BDAG
  rationale: φιάλη denotes a bowl or shallow vessel. 'Bowl' is the clear modern English
    equivalent; 'vial' reflects older tradition but suggests a small bottle and is
    less accurate.
- source_word: εἰς τοὺς ποταμούς
  chosen: into the rivers
  alternatives:
  - upon the rivers
  lexicon: BDAG
  rationale: εἰς with the accusative normally indicates movement into. 'Into the rivers'
    is the most straightforward rendering.
- source_word: πηγὰς τῶν ὑδάτων
  chosen: the springs of water
  alternatives:
  - the fountains of waters
  - the water springs
  - the sources of water
  lexicon: BDAG
  rationale: πηγή means 'spring, fountain, source.' 'Springs of water' is idiomatic
    modern English and preserves the genitival sense without archaic diction.
- source_word: ἐγένετο αἷμα
  chosen: they became blood
  alternatives:
  - it became blood
  - there was blood
  lexicon: BDAG
  rationale: Although the Greek has singular ἐγένετο with predicate noun αἷμα, the
    sense is that the rivers and springs were transformed into blood. English plural
    'they became blood' makes the implied subject explicit and reads naturally. 'It
    became blood' would be ambiguous, and 'there was blood' weakens the transformation
    sense of γίνομαι.
