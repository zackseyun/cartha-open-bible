id: REV.21.1
reference: Revelation 21:1
source:
  edition: SBLGNT
  text: Καὶ εἶδον οὐρανὸν καινὸν καὶ γῆν καινήν· ὁ γὰρ πρῶτος οὐρανὸς καὶ ἡ πρώτη
    γῆ ἀπῆλθαν, καὶ ἡ θάλασσα οὐκ ἔστιν ἔτι.
translation:
  text: And I saw a new heaven and a new earth, for the first heaven and the first
    earth had passed away, and the sea is no more.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the former heaven and the former earth.' The Greek says 'the first heaven
      and the first earth,' which may denote the earlier order in contrast to the
      new one.
    reason: lexical_alternative
  - marker: b
    text: '''The sea'' may be read literally, though in Revelation it can also carry
      associations of chaos, danger, or separation.'
    reason: cultural_note
lexical_decisions:
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  - I beheld
  lexicon: BDAG
  rationale: Aorist indicative of ὁράω is most naturally rendered as a simple past
    narrative verb. 'I saw' is clear, direct, and idiomatic in modern English.
- source_word: οὐρανὸν ... γῆν
  chosen: heaven ... earth
  alternatives:
  - sky ... land
  - heavens ... earth
  lexicon: BDAG
  rationale: In this apocalyptic and cosmic context, οὐρανός and γῆ refer to the created
    order, not merely the visible sky and land. Singular 'heaven and earth' is the
    standard English pairing for the cosmos and best matches the Greek singular forms.
- source_word: καινὸν ... καινήν
  chosen: new ... new
  alternatives:
  - renewed ... renewed
  - fresh ... fresh
  lexicon: BDAG
  rationale: καινός commonly denotes newness in kind or quality. 'New' preserves the
    lexical force without over-interpreting whether the vision implies replacement
    or transformation.
- source_word: ὁ γὰρ πρῶτος οὐρανὸς καὶ ἡ πρώτη γῆ
  chosen: for the first heaven and the first earth
  alternatives:
  - for the former heaven and the former earth
  lexicon: BDAG
  rationale: πρῶτος here marks the earlier order in contrast to the new one. 'First'
    is the most direct rendering and preserves the textual contrast; 'former' is possible
    but slightly more interpretive.
- source_word: ἀπῆλθαν
  chosen: had passed away
  alternatives:
  - passed away
  - went away
  - departed
  lexicon: BDAG
  rationale: The aorist of ἀπέρχομαι here describes the disappearance of the prior
    order relative to John's vision. English past perfect ('had passed away') clarifies
    the relation to 'I saw' and reads naturally in narrative sequence.
- source_word: ἡ θάλασσα
  chosen: the sea
  alternatives:
  - the ocean
  lexicon: BDAG
  rationale: θάλασσα straightforwardly means 'sea.' In Revelation it may carry symbolic
    resonance of chaos, but the translation should preserve the concrete term and
    not import interpretation into the main text.
- source_word: οὐκ ἔστιν ἔτι
  chosen: is no more
  alternatives:
  - is no longer
  - is not any longer
  lexicon: BDAG
  rationale: This idiomatic English rendering captures the present negation with ἔτι
    ('still/any longer') in a concise, literary but accessible way.
