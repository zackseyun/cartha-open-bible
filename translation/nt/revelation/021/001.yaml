theological_decisions:
- issue: Nature of the 'new heaven and new earth'
  chosen_reading: Rendered 'new' without specifying whether the new creation is a
    replacement of the old creation or its transformation.
  alternative_readings:
  - complete replacement
  - renewal/transformation of the existing creation
  rationale: The adjective καινός indicates newness, but the verse itself does not
    settle the metaphysical question of replacement versus renewal. The translation
    preserves that theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of 'the sea is no more'
  chosen_reading: Kept as 'the sea is no more' without making its symbolic significance
    explicit in the main text.
  alternative_readings:
  - literal absence of the sea
  - symbolic removal of chaos/evil/separation
  rationale: Revelation often uses imagery symbolically, but this clause should remain
    textually transparent. Interpretive possibilities are better preserved in a footnote
    than embedded in the translation.
  doctrine_reference: 'Translation philosophy §1 and §3: original-language primacy;
    preserve theological tension.'
