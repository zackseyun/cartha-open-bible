id: REV.21.4
reference: Revelation 21:4
source:
  edition: SBLGNT
  text: καὶ ἐξαλείψει πᾶν δάκρυον ⸀ἐκ τῶν ὀφθαλμῶν αὐτῶν, καὶ ὁ θάνατος οὐκ ἔσται
    ἔτι· οὔτε πένθος οὔτε κραυγὴ οὔτε πόνος οὐκ ἔσται ⸀ἔτι. τὰ πρῶτα ἀπῆλθαν.
translation:
  text: And he will wipe away every tear from their eyes, and death will be no more;
    neither mourning nor crying nor pain will be any more. The former things have
    passed away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''all tears.'' The Greek singular is distributive: ''every tear.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'outcry' for 'crying.' The Greek can denote a cry or loud outcry.
    reason: lexical_alternative
  - marker: c
    text: Or 'the first things have passed away.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαλείψει
  chosen: will wipe away
  alternatives:
  - will wipe off
  - will blot out
  lexicon: BDAG
  rationale: Future active indicative of ἐξαλείφω. In this context with 'every tear,'
    the idiomatic sense is personal removal of tears, best rendered 'wipe away.' 'Blot
    out' is a valid gloss elsewhere but would sound unnatural here and suggest erasure
    in a less relational sense.
- source_word: πᾶν δάκρυον
  chosen: every tear
  alternatives:
  - all tears
  lexicon: BDAG
  rationale: Singular with πᾶν is distributive, emphasizing each individual tear rather
    than merely tears in the aggregate. 'Every tear' preserves that force naturally
    in English.
- source_word: ἐκ τῶν ὀφθαλμῶν αὐτῶν
  chosen: from their eyes
  alternatives:
  - out of their eyes
  lexicon: BDAG
  rationale: Standard prepositional phrase indicating removal from the eyes of the
    redeemed people. 'From their eyes' is idiomatic and sufficiently literal.
- source_word: ὁ θάνατος
  chosen: death
  lexicon: BDAG
  rationale: 'Personified by the article in Greek, but English naturally renders the
    abstraction without an article here: ''death will be no more.'' This preserves
    the comprehensive abolition of death.'
- source_word: οὐκ ἔσται ἔτι
  chosen: will be no more
  alternatives:
  - will no longer exist
  - will not be anymore
  lexicon: BDAG
  rationale: This phrase occurs twice and denotes complete cessation. 'Will be no
    more' is concise, natural, and carries the solemn finality of the Greek better
    than more prosaic alternatives.
- source_word: πένθος
  chosen: mourning
  alternatives:
  - grief
  - lamentation
  lexicon: BDAG
  rationale: Refers to mourning, especially associated with bereavement or sorrow.
    'Mourning' fits the sequence with death, crying, and pain, and is the most standard
    contextual equivalent.
- source_word: κραυγή
  chosen: crying
  alternatives:
  - outcry
  - cry
  lexicon: BDAG
  rationale: κραυγή can denote a cry or loud outcry. In this consolatory context,
    'crying' best captures the experiential state paired with mourning and pain. 'Outcry'
    could imply protest or public clamor more than personal sorrow.
- source_word: πόνος
  chosen: pain
  alternatives:
  - toil
  - distress
  - suffering
  lexicon: BDAG
  rationale: πόνος can denote pain, trouble, or toil. In this eschatological list
    of abolished sufferings, 'pain' is the clearest and most natural English rendering,
    while still broad enough to include bodily and emotional suffering.
- source_word: τὰ πρῶτα
  chosen: the former things
  alternatives:
  - the first things
  - the earlier things
  lexicon: BDAG
  rationale: Neuter plural substantive referring to the prior order of existence.
    'The former things' is idiomatic English and communicates the passing of the old
    creation order without awkwardness.
- source_word: ἀπῆλθαν
  chosen: have passed away
  alternatives:
  - passed away
  - went away
  - have gone away
  lexicon: BDAG
  rationale: Aorist indicative marking completed departure. English present perfect
    ('have passed away') fits the declarative force in context and is idiomatic in
    eschatological proclamation, linking the completed removal of the old order to
    the present vision.
