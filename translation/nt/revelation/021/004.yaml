theological_decisions:
- issue: Subject of 'will wipe away' is implicit from the preceding context (Rev 21:3)
    rather than repeated in this verse.
  chosen_reading: Render simply as 'he will wipe away' without inserting 'God' into
    the text.
  alternative_readings:
  - God will wipe away
  rationale: The Greek verb has an implicit third-person singular subject supplied
    by the immediate context. Because the subject is not explicitly repeated in this
    verse, the translation preserves the Greek's cohesion by using 'he' rather than
    importing the noun 'God' into the line itself. The referent remains clear from
    context.
  doctrine_reference: Translation philosophy §1 (original-language primacy) and §5
    (consistency/documented exception).
- issue: Scope of the abolished realities in the new creation.
  chosen_reading: 'Use absolute language: ''death will be no more'' and ''nor ...
    will be any more.'''
  alternative_readings:
  - death will no longer exist
  - there will be no more death
  rationale: The Greek states categorical cessation, not merely reduction. The chosen
    wording preserves the text's full eschatological finality without adding interpretive
    qualifiers.
  doctrine_reference: Affirmations; Translation philosophy §3 (preserve theological
    tension rather than resolve it).
