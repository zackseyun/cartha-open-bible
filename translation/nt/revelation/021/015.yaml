id: REV.21.15
reference: Revelation 21:15
source:
  edition: SBLGNT
  text: Καὶ ὁ λαλῶν μετ’ ἐμοῦ εἶχεν μέτρον κάλαμον χρυσοῦν, ἵνα μετρήσῃ τὴν πόλιν
    καὶ τοὺς πυλῶνας αὐτῆς καὶ τὸ τεῖχος αὐτῆς.
translation:
  text: And the one speaking with me had a golden measuring rod, so that he might
    measure the city and its gates and its wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a golden measuring reed.' The Greek uses κάλαμος, literally 'reed,'
      for a rod used in measuring.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαλῶν μετ’ ἐμοῦ
  chosen: the one speaking with me
  alternatives:
  - the one who was speaking with me
  - the angel who spoke with me
  lexicon: BDAG
  rationale: The substantival present participle is rendered naturally as 'the one
    speaking with me.' This preserves the ongoing descriptive force without importing
    'angel,' which is supplied by context in the broader passage but not stated in
    this verse.
- source_word: εἶχεν
  chosen: had
  alternatives:
  - was holding
  lexicon: BDAG
  rationale: The imperfect of ἔχω straightforwardly means 'had.' While in context
    it may imply possession in hand, 'had' is the plain lexical sense and avoids over-interpretation.
- source_word: μέτρον κάλαμον χρυσοῦν
  chosen: a golden measuring rod
  alternatives:
  - a measure, a golden reed
  - a golden measuring reed
  lexicon: BDAG
  rationale: The phrase combines μέτρον with κάλαμον and χρυσοῦν. In context this
    denotes an instrument for measuring, not an abstract 'measure.' 'Measuring rod'
    communicates the function clearly in modern English. 'Reed' is more formally literal
    for κάλαμος, but 'rod' better conveys the implement's role for contemporary readers
    while preserving the imagery.
- source_word: ἵνα μετρήσῃ
  chosen: so that he might measure
  alternatives:
  - in order that he might measure
  - to measure
  lexicon: BDAG
  rationale: ἵνα with the aorist subjunctive expresses purpose. 'So that he might
    measure' preserves that purposive nuance more explicitly than the more compressed
    infinitival English.
- source_word: πόλιν
  chosen: the city
  lexicon: BDAG
  rationale: Standard rendering; in context this refers to the New Jerusalem, but
    the noun itself is simply 'city.'
- source_word: πυλῶνας
  chosen: gates
  alternatives:
  - gate-towers
  - gateways
  lexicon: BDAG
  rationale: πυλών commonly denotes a gate or gateway, often monumental. 'Gates' is
    the most idiomatic English rendering here and fits the city's architectural description.
- source_word: τεῖχος
  chosen: wall
  alternatives:
  - fortification wall
  lexicon: BDAG
  rationale: τεῖχος refers to the city's wall. 'Wall' is accurate and sufficient without
    adding interpretive detail.
