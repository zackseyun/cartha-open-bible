id: REV.21.14
reference: Revelation 21:14
source:
  edition: SBLGNT
  text: καὶ τὸ τεῖχος τῆς πόλεως ⸀ἔχων θεμελίους δώδεκα, καὶ ἐπ’ αὐτῶν δώδεκα ὀνόματα τῶν δώδεκα ἀποστόλων τοῦ ἀρνίου.
translation:
  text: And the wall of the city had twelve foundations[a], and on them were the twelve names of the twelve apostles of the Lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "twelve foundation stones." The Greek θεμελίους can refer to foundations or foundation stones in an architectural setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: τεῖχος
  chosen: wall
  alternatives:
  - fortification
  - rampart
  lexicon: BDAG
  rationale: τεῖχος denotes a wall, especially a city wall or defensive wall. 'Wall' is the natural and sufficiently precise English rendering here.
- source_word: πόλεως
  chosen: of the city
  alternatives:
  - city's
  lexicon: BDAG
  rationale: 'The genitive is rendered straightforwardly as possession/association: the wall belonging to the city.'
- source_word: ἔχων
  chosen: had
  alternatives:
  - having
  lexicon: BDAG
  rationale: Although the Greek uses a present participle ('having'), idiomatic English in this descriptive vision context is better served by the finite verb 'had.' This preserves the sense without awkwardness.
- source_word: θεμελίους δώδεκα
  chosen: twelve foundations
  alternatives:
  - twelve foundation stones
  lexicon: BDAG
  rationale: θεμέλιος can denote a foundation or foundation stone. In this architectural context either is possible, but 'foundations' is the more direct rendering and fits the imagery of the city's wall resting on twelve foundational layers or supports.
- source_word: ἐπ’ αὐτῶν
  chosen: on them
  alternatives:
  - upon them
  - on these foundations
  lexicon: BDAG
  rationale: ἐπί with the genitive here indicates position upon the foundations. 'On them' is concise and natural, with the antecedent clearly being the foundations.
- source_word: ὀνόματα
  chosen: names
  alternatives:
  - inscriptions of the names
  lexicon: BDAG
  rationale: The text says 'names,' not explicitly 'inscriptions,' so the simpler rendering should be retained without adding detail not present in the Greek.
- source_word: ἀποστόλων
  chosen: apostles
  alternatives:
  - messengers
  - envoys
  lexicon: BDAG
  rationale: In this established New Testament office, 'apostles' is the standard and most accurate rendering; alternatives like 'messengers' would flatten the technical sense.
- source_word: τοῦ ἀρνίου
  chosen: of the Lamb
  alternatives:
  - belonging to the Lamb
  lexicon: BDAG
  rationale: ἀρνίον is a major christological title in Revelation. 'The Lamb' preserves the title and its theological resonance. The genitive is best rendered simply as 'of the Lamb.'
