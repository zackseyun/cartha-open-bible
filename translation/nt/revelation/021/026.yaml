id: REV.21.26
reference: Revelation 21:26
source:
  edition: SBLGNT
  text: καὶ οἴσουσιν τὴν δόξαν καὶ τὴν τιμὴν τῶν ἐθνῶν εἰς αὐτήν.
translation:
  text: and they will bring the glory and the honor of the nations into it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'into her,' preserving the city's feminine personification in Greek.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴσουσιν
  chosen: they will bring
  alternatives:
  - they will carry
  - they will bear
  lexicon: BDAG
  rationale: Future active of φέρω. 'Bring' is the most natural English rendering
    in this context of movement into the city, while preserving the concrete sense
    of conveying something from outside to inside.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  lexicon: BDAG
  rationale: δόξα commonly means 'glory' and in Revelation often carries honorific
    and radiant connotations. 'Glory' preserves the biblical-theological resonance
    better than the more purely aesthetic 'splendor,' though the latter is a viable
    nuance.
- source_word: τιμὴν
  chosen: honor
  alternatives:
  - value
  - wealth
  lexicon: BDAG
  rationale: τιμή here is best rendered 'honor' as a paired term with δόξα, denoting
    esteem or tribute associated with the nations. 'Value' is too abstract, and 'wealth'
    is possible by extension but less likely in this immediate collocation.
- source_word: τῶν ἐθνῶν
  chosen: of the nations
  alternatives:
  - of the Gentiles
  lexicon: BDAG
  rationale: ἔθνη in Revelation regularly refers to 'nations' in the broad peoples-group
    sense. 'Gentiles' would import a Jew/Gentile contrast not foregrounded here and
    would sound too narrow in the vision of the renewed creation.
- source_word: εἰς αὐτήν
  chosen: into it
  alternatives:
  - into her
  lexicon: BDAG
  rationale: The antecedent is the city, New Jerusalem, which is grammatically feminine
    in Greek. English normally refers to a city as 'it,' so 'into it' is the clearest
    modern rendering. The feminine personification can be preserved as an alternative
    in a footnote.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: The conjunction straightforwardly links this verse with the preceding
    description and also coordinates 'glory' and 'honor.'
