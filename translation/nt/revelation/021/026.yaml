theological_decisions:
- issue: Referent and personification of αὐτήν
  chosen_reading: 'The pronoun refers to the New Jerusalem/city and is rendered with
    English neuter idiom: ''into it.'''
  alternative_readings:
  - into her
  rationale: Greek uses a feminine pronoun because the antecedent πόλις is feminine
    and because the city is also personified in the surrounding context as the bride.
    English prose more naturally uses 'it' for a city in this syntactic role, but
    the personified feminine nuance is worth preserving in a footnote for auditability.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §3 (preserve
    tension/alternatives where meaningful).
- issue: Meaning of the nations' 'glory and honor'
  chosen_reading: The phrase is left broad and untranslated beyond the lexical sense,
    without specifying whether it means tribute, cultural splendor, wealth, or redeemed
    distinctiveness.
  alternative_readings:
  - material wealth of the nations
  - the cultural splendor/distinctive excellencies of the nations
  - honor paid by the nations
  rationale: The Greek phrase is semantically broad and the context does not require
    narrowing it to one theological interpretation. Preserving the general wording
    avoids importing a specific eschatological theory while allowing the text's imagery
    to stand.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives
    unless the text unambiguously supports one reading.
