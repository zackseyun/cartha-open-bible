id: REV.21.10
reference: Revelation 21:10
source:
  edition: SBLGNT
  text: καὶ ἀπήνεγκέν με ἐν πνεύματι ἐπὶ ὄρος μέγα καὶ ὑψηλόν, καὶ ἔδειξέν μοι τὴν
    ⸀πόλιν τὴν ἁγίαν Ἰερουσαλὴμ καταβαίνουσαν ἐκ τοῦ οὐρανοῦ ἀπὸ τοῦ θεοῦ,
translation:
  text: And he carried me away in the Spirit onto a great and high mountain, and showed
    me the holy city, Jerusalem, coming down out of heaven from God,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in spirit.' The Greek phrase may denote a visionary state; in Revelation
      it commonly introduces prophetic vision.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήνεγκέν
  chosen: carried ... away
  alternatives:
  - took ... away
  - bore ... away
  lexicon: BDAG
  rationale: The aorist of ἀποφέρω here describes transport from one vantage point
    to another in visionary context. 'Carried ... away' is idiomatic English and preserves
    the force of removal better than the flatter 'took.'
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - in spirit
  - in the spirit
  lexicon: BDAG
  rationale: In Revelation this phrase is a recurring marker of prophetic visionary
    state (cf. 1:10; 4:2; 17:3). Capitalizing 'Spirit' reflects the likely reference
    to the Holy Spirit's agency in the vision rather than merely John's inner disposition,
    while preserving the Greek wording without overexpansion.
- source_word: ἐπὶ ὄρος μέγα καὶ ὑψηλόν
  chosen: onto a great and high mountain
  alternatives:
  - to a great and high mountain
  - upon a great, high mountain
  lexicon: BDAG
  rationale: ἐπί with accusative commonly indicates movement onto or to. 'Onto' fits
    the motion implied by 'carried me away.' Both adjectives are retained rather than
    collapsed, since μέγα and ὑψηλόν are distinct descriptors.
- source_word: ἔδειξέν μοι
  chosen: showed me
  alternatives:
  - displayed to me
  - revealed to me
  lexicon: BDAG
  rationale: A straightforward rendering of δείκνυμι. 'Showed me' is natural English
    and does not import extra revelatory nuance beyond the verb itself.
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: πόλις in this context clearly denotes the eschatological city. 'City'
    is the standard and appropriate rendering.
- source_word: ἁγίαν
  chosen: holy
  alternatives:
  - sacred
  lexicon: BDAG
  rationale: ἅγιος is consistently rendered 'holy' in biblical-theological contexts.
    'Sacred' is possible but weaker and less consistent with established biblical
    usage.
- source_word: Ἰερουσαλήμ
  chosen: Jerusalem
  lexicon: BDAG
  rationale: Personal/place names are transliterated by standard convention per project
    philosophy.
- source_word: καταβαίνουσαν
  chosen: coming down
  alternatives:
  - descending
  lexicon: BDAG
  rationale: The present participle depicts the city in the act of descent. 'Coming
    down' is more readable modern English than 'descending' while preserving the motion.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: out of heaven
  alternatives:
  - from heaven
  lexicon: BDAG
  rationale: ἐκ emphasizes origin out from. 'Out of heaven' preserves that nuance
    slightly more clearly than the simpler 'from heaven.'
- source_word: ἀπὸ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from the presence of God
  lexicon: BDAG
  rationale: ἀπό marks source. The simple 'from God' is textually exact; adding 'the
    presence of' would overtranslate.
