theological_decisions:
- issue: Referent of 'the Spirit' in the visionary formula ἐν πνεύματι
  chosen_reading: Reference to the Holy Spirit's agency in prophetic vision
  alternative_readings:
  - a non-specific spiritual state
  - John's spirit
  rationale: Within Revelation, ἐν πνεύματι functions as a repeated formula introducing
    visionary transport. Rendering it 'in the Spirit' preserves the phrase while allowing
    the likely theological sense that the vision occurs by the Holy Spirit's agency,
    without paraphrasing it as 'by the Holy Spirit.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather
    than resolve it)
