id: REV.21.19
reference: Revelation 21:19
source:
  edition: SBLGNT
  text: ⸀οἱ θεμέλιοι τοῦ τείχους τῆς πόλεως παντὶ λίθῳ τιμίῳ κεκοσμημένοι· ὁ θεμέλιος
    ὁ πρῶτος ἴασπις, ὁ δεύτερος σάπφιρος, ὁ τρίτος χαλκηδών, ὁ τέταρτος σμάραγδος,
translation:
  text: 'The foundations of the wall of the city were adorned with every kind of precious
    stone: the first foundation was jasper, the second sapphire, the third chalcedony,
    the fourth emerald,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'with every precious stone.' The Greek phrase may be taken distributively,
      hence 'every kind of precious stone.'
    reason: lexical_alternative
  - marker: b
    text: Chalcedony is a traditional rendering of the Greek term; the exact identification
      of some ancient gemstones is uncertain.
    reason: cultural_note
lexical_decisions:
- source_word: θεμέλιοι
  chosen: foundations
  alternatives:
  - foundation stones
  lexicon: BDAG
  rationale: Plural noun referring to the foundational courses or stones of the city's
    wall. 'Foundations' is the most natural English rendering, while 'foundation stones'
    is possible but more interpretive.
- source_word: τεῖχος
  chosen: wall
  alternatives:
  - fortification wall
  lexicon: BDAG
  rationale: Standard sense is 'wall.' 'Fortification wall' is too expansive for the
    immediate context.
- source_word: πόλεως
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: πόλις in Revelation consistently refers to the eschatological city; 'city'
    is the normal and fitting English equivalent.
- source_word: παντὶ λίθῳ τιμίῳ
  chosen: with every kind of precious stone
  alternatives:
  - with every precious stone
  - with every valuable stone
  lexicon: BDAG
  rationale: The dative phrase expresses adornment by means of precious stones. 'Every
    kind of precious stone' brings out the distributive force naturally in English
    without overstating the Greek.
- source_word: κεκοσμημένοι
  chosen: were adorned
  alternatives:
  - having been adorned
  - were decorated
  lexicon: BDAG
  rationale: Perfect passive participle describing the completed, beautified state
    of the foundations. 'Were adorned' preserves both the passive sense and elevated
    style better than the more ordinary 'were decorated.'
- source_word: ὁ θεμέλιος ὁ πρῶτος
  chosen: the first foundation
  alternatives:
  - the first foundation stone
  lexicon: BDAG
  rationale: The singular introduces each individual foundation in sequence. English
    idiom favors 'the first foundation' here, with the gemstone named predicatively.
- source_word: ἴασπις
  chosen: jasper
  lexicon: BDAG
  rationale: Standard rendering of the gemstone name in English Bible tradition and
    modern lexicons.
- source_word: σάπφιρος
  chosen: sapphire
  lexicon: BDAG
  rationale: Standard equivalent for the gemstone term.
- source_word: χαλκηδών
  chosen: chalcedony
  lexicon: BDAG
  rationale: Direct transliteration is preferred because the precise ancient gemstone
    identification is uncertain, and 'chalcedony' is the conventional English form.
- source_word: σμάραγδος
  chosen: emerald
  alternatives:
  - green gem
  lexicon: BDAG
  rationale: Standard rendering for the gemstone term; while ancient gemstone identification
    can sometimes be approximate, 'emerald' is the established and most likely equivalent.
