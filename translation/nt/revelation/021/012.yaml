id: REV.21.12
reference: Revelation 21:12
source:
  edition: SBLGNT
  text: ἔχουσα τεῖχος μέγα καὶ ὑψηλόν, ἔχουσα πυλῶνας δώδεκα, καὶ ἐπὶ ⸂τοῖς πυλῶσιν⸃
    ἀγγέλους δώδεκα, καὶ ὀνόματα ἐπιγεγραμμένα ἅ ⸀ἐστιν τῶν δώδεκα ⸀φυλῶν υἱῶν Ἰσραήλ·
translation:
  text: having a great and high wall, having twelve gates, and at the gates twelve
    angels, and names inscribed, which are the names of the twelve tribes of the sons
    of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the twelve tribes of the children of Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχουσα
  chosen: having
  alternatives:
  - with
  - it had
  lexicon: BDAG
  rationale: Present participle feminine singular modifying the city from the previous
    verse; 'having' preserves the descriptive participial flow better than converting
    to a finite verb.
- source_word: τεῖχος μέγα καὶ ὑψηλόν
  chosen: a great and high wall
  alternatives:
  - a massive and high wall
  - a great, tall wall
  lexicon: BDAG
  rationale: Retains both adjectives distinctly. 'Great and high' is more formally
    transparent than smoothing to a single idiomatic adjective.
- source_word: πυλῶνας
  chosen: gates
  alternatives:
  - gateways
  - gate-towers
  lexicon: BDAG
  rationale: Standard rendering for city entrances in this context. 'Gateways' is
    possible but less natural; 'gates' best matches apocalyptic city imagery.
- source_word: ἐπὶ τοῖς πυλῶσιν
  chosen: at the gates
  alternatives:
  - on the gates
  - upon the gates
  lexicon: BDAG
  rationale: With ἐπί plus dative, the sense here is locative. 'At the gates' is idiomatic
    English and avoids implying the angels are physically standing on top of the gates.
- source_word: ἀγγέλους δώδεκα
  chosen: twelve angels
  lexicon: BDAG
  rationale: Straightforward lexical rendering; no contextual reason to paraphrase.
- source_word: ὀνόματα ἐπιγεγραμμένα
  chosen: names inscribed
  alternatives:
  - names written
  - inscribed names
  lexicon: BDAG
  rationale: ἐπιγεγραμμένα suggests written upon/inscribed. 'Inscribed' fits monumental
    architectural context better than the more generic 'written'.
- source_word: ἅ ἐστιν
  chosen: which are those of
  alternatives:
  - which are
  - which belong to
  lexicon: BDAG
  rationale: The relative clause identifies the names more specifically. Supplying
    'those of' makes the English relation clear without adding new content.
- source_word: φυλῶν
  chosen: tribes
  alternatives:
  - clans
  lexicon: BDAG
  rationale: Standard biblical rendering for Israel's tribal divisions.
- source_word: υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the people of Israel
  lexicon: BDAG
  rationale: Gender-accurate rendering follows the source wording and the project's
    stated philosophy. 'Children of Israel' is traditional but less formally precise
    here.
