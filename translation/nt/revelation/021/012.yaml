theological_decisions:
- issue: Rendering υἱῶν Ἰσραήλ in a corporate designation
  chosen_reading: the sons of Israel
  alternative_readings:
  - the children of Israel
  - the people of Israel
  rationale: The Greek explicitly uses υἱῶν ('sons'). In keeping with the project's
    gender-accurate principle, the main text preserves the masculine familial term
    rather than neutralizing it. Because this is a fixed covenantal designation, an
    alternative traditional English rendering is preserved in a footnote for readability.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
