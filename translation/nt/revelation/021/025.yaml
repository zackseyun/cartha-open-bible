id: REV.21.25
reference: Revelation 21:25
source:
  edition: SBLGNT
  text: καὶ οἱ πυλῶνες αὐτῆς οὐ μὴ κλεισθῶσιν ἡμέρας, νὺξ γὰρ οὐκ ἔσται ἐκεῖ,
translation:
  text: And its gates will never be shut by day—for there will be no night there—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'its gates shall certainly never be shut by day.' The
      Greek uses an emphatic negation.
    reason: lexical_alternative
  - marker: b
    text: The reason given is that 'there will be no night there.'
    reason: cross_reference
lexical_decisions:
- source_word: πυλῶνες
  chosen: gates
  alternatives:
  - gate-towers
  - gateway gates
  lexicon: BDAG
  rationale: In context of a city, πυλώνες refers to the city gates/gate-complexes.
    'Gates' is the natural English rendering and matches the imagery of the New Jerusalem
    in the surrounding verses.
- source_word: οὐ μὴ κλεισθῶσιν
  chosen: will never be shut
  alternatives:
  - shall certainly not be closed
  - will by no means be shut
  lexicon: BDAG
  rationale: The οὐ μή construction with the aorist subjunctive is emphatically negative,
    expressing strong future denial. 'Will never be shut' captures both the future
    sense and the emphatic force in idiomatic modern English.
- source_word: ἡμέρας
  chosen: by day
  alternatives:
  - during the day
  - in the daytime
  lexicon: BDAG
  rationale: The genitive here functions adverbially/temporally. 'By day' is concise,
    idiomatic, and preserves the contrast with the following clause about night.
- source_word: νὺξ γὰρ οὐκ ἔσται ἐκεῖ
  chosen: for there will be no night there
  alternatives:
  - because night will not exist there
  - for night will not be there
  lexicon: BDAG
  rationale: γάρ gives the reason the gates are never shut. 'For there will be no
    night there' preserves the explanatory force and the existential sense of ἔσται.
- source_word: καὶ
  chosen: And
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: Simple connective linking this verse to the preceding description of
    the city. 'And' is the most natural discourse connector here.
- source_word: αὐτῆς
  chosen: its
  alternatives:
  - her
  lexicon: BDAG
  rationale: Although the city is personified as feminine in Greek, English commonly
    uses 'its' for a city in straightforward description. This avoids importing a
    heightened personification not required in this clause while remaining natural
    English.
