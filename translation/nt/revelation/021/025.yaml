theological_decisions:
- issue: Degree of personification for the New Jerusalem
  chosen_reading: Use 'its gates' rather than 'her gates.'
  alternative_readings:
  - her gates
  rationale: The Greek feminine pronoun agrees with the grammatically feminine antecedent
    for the city, but English need not preserve grammatical gender where it would
    sound marked. The verse's theological point concerns the city's perpetual openness
    and absence of night, not the bridal imagery foregrounded elsewhere.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §5 (documented
    exception where context demands variance)
