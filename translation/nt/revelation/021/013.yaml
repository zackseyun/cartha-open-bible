id: REV.21.13
reference: Revelation 21:13
source:
  edition: SBLGNT
  text: ἀπὸ ⸀ἀνατολῆς πυλῶνες τρεῖς, καὶ ἀπὸ βορρᾶ πυλῶνες τρεῖς, καὶ ἀπὸ νότου πυλῶνες
    τρεῖς, καὶ ἀπὸ δυσμῶν πυλῶνες τρεῖς·
translation:
  text: On the east, three gates; and on the north, three gates; and on the south,
    three gates; and on the west, three gates.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'From the east ... from the north ... from the south
      ... from the west'; here the phrase is rendered idiomatically to indicate the
      side on which the gates are located.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ ἀνατολῆς
  chosen: On the east
  alternatives:
  - From the east
  - On the eastern side
  lexicon: BDAG
  rationale: The repeated prepositional phrase marks location by side/direction in
    a schematic description of the city's layout. In idiomatic English, 'On the east'
    best conveys the sense of 'on the east side' without overtranslating. 'From the
    east' is more literal to ἀπό but can sound like motion or origin rather than spatial
    placement.
- source_word: πυλῶνες
  chosen: gates
  alternatives:
  - gate-towers
  - gateways
  lexicon: BDAG
  rationale: πυλών can denote a gate or gateway, often a monumental gate structure.
    In this context of the New Jerusalem's wall and entrances, 'gates' is the clearest
    and most natural English rendering. 'Gateways' is possible but less idiomatic
    here; 'gate-towers' is too specific.
- source_word: τρεῖς
  chosen: three
  lexicon: BDAG
  rationale: Straightforward cardinal numeral; repeated for each side to preserve
    the Greek's measured, symmetrical style.
- source_word: ἀπὸ βορρᾶ
  chosen: on the north
  alternatives:
  - from the north
  - on the northern side
  lexicon: BDAG
  rationale: As with ἀπὸ ἀνατολῆς, the phrase indicates the side of the city rather
    than movement or source. 'On the north' is concise, natural, and structurally
    parallel.
- source_word: ἀπὸ νότου
  chosen: on the south
  alternatives:
  - from the south
  - on the southern side
  lexicon: BDAG
  rationale: Rendered consistently with the other directional phrases to preserve
    the verse's formal symmetry and spatial sense.
- source_word: ἀπὸ δυσμῶν
  chosen: on the west
  alternatives:
  - from the west
  - on the western side
  lexicon: BDAG
  rationale: δυσμαί/dusmōn literally relates to settings/sunset, hence 'west.' 'On
    the west' communicates the cardinal direction naturally in English and matches
    the pattern of the verse.
- source_word: καὶ ... καὶ ... καὶ ...
  chosen: and ... and ... and ...
  alternatives:
  - with reduced repetition
  lexicon: BDAG
  rationale: The repeated καί is retained rather than stylistically smoothed out,
    because the Greek intentionally presents a measured, enumerative pattern emphasizing
    completeness and symmetry.
