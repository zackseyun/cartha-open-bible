theological_decisions:
- issue: Spatial description of the New Jerusalem's gates
  chosen_reading: A straightforward architectural listing of three gates on each of
    the four sides.
  alternative_readings:
  - Possible symbolic resonance with Israel's tribal arrangement or Ezekiel's temple-city
    vision
  rationale: The verse itself simply enumerates the gates by cardinal direction. Any
    symbolic associations are real at the canonical level but should not be imported
    into the main translation. The wording remains descriptive and leaves theological
    symbolism to interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
