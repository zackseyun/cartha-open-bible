id: REV.21.3
reference: Revelation 21:3
source:
  edition: SBLGNT
  text: καὶ ἤκουσα φωνῆς μεγάλης ἐκ τοῦ ⸀θρόνου λεγούσης· Ἰδοὺ ἡ σκηνὴ τοῦ θεοῦ μετὰ
    τῶν ἀνθρώπων, καὶ σκηνώσει μετ’ αὐτῶν, καὶ αὐτοὶ ⸀λαοὶ αὐτοῦ ἔσονται, καὶ αὐτὸς
    ὁ θεὸς ⸂μετ’ αὐτῶν ἔσται⸃,
translation:
  text: And I heard a loud voice from the throne saying, “Behold, the dwelling place
    of God is with men, and he will dwell with them, and they will be his peoples,
    and God himself will be with them.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the tabernacle of God” or “God’s tent.” The Greek uses σκηνή, evoking
      tabernacle imagery.
    reason: lexical_alternative
  - marker: b
    text: The Greek says “with men,” meaning human beings generally.
    reason: lexical_alternative
  - marker: c
    text: The verb is related to “dwelling place/tabernacle”; more literally, “he
      will tabernacle” or “pitch his tent” with them.
    reason: lexical_alternative
  - marker: d
    text: Greek “peoples” (plural), not the traditional singular “people.”
    reason: alternative_reading
lexical_decisions:
- source_word: φωνῆς μεγάλης
  chosen: a loud voice
  alternatives:
  - a great voice
  lexicon: BDAG
  rationale: μέγας with φωνή idiomatically refers to volume or force rather than size;
    'loud voice' is natural modern English while preserving the solemnity of the proclamation.
- source_word: ἐκ τοῦ θρόνου
  chosen: from the throne
  alternatives:
  - out of the throne
  lexicon: BDAG
  rationale: ἐκ is straightforwardly rendered 'from' here, indicating source. 'Throne'
    is retained literally because of Revelation's throne-room imagery.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: '''Behold'' preserves the elevated, attention-commanding force of ἰδού
    in apocalyptic discourse better than the more casual ''look'' or ''see''.'
- source_word: ἡ σκηνὴ τοῦ θεοῦ
  chosen: the dwelling place of God
  alternatives:
  - the tabernacle of God
  - God's tent
  lexicon: BDAG
  rationale: σκηνή literally denotes a tent/tabernacle, but in this context it signifies
    God's dwelling among humanity. 'Dwelling place' communicates the sense clearly
    in modern English while avoiding an overly archaic or potentially misleading cultic
    term in the main text; the more literal alternatives are preserved in a footnote
    because of the strong intertextual resonance with tabernacle imagery.
- source_word: μετὰ τῶν ἀνθρώπων
  chosen: with men
  alternatives:
  - with humanity
  - with people
  lexicon: BDAG
  rationale: ἄνθρωποι here refers to human beings collectively. Per the translation
    philosophy's gender-accurate principle, 'men' is retained to match the representative/generic
    force of the Greek, with a footnote-worthy awareness that the sense is humanity
    generally.
- source_word: σκηνώσει
  chosen: he will dwell
  alternatives:
  - he will tabernacle
  - he will pitch his tent
  lexicon: BDAG
  rationale: The future of σκηνόω echoes σκηνή and means to dwell or encamp. 'He will
    dwell' is the clearest main-text rendering; more literal imagery is preserved
    in a footnote because the verbal echo is significant.
- source_word: λαοὶ αὐτοῦ
  chosen: his peoples
  alternatives:
  - his people
  lexicon: BDAG
  rationale: The Greek is plural, λαοί, and should not be flattened to the singular
    traditional rendering. 'His peoples' preserves the textual plurality, likely reflecting
    the gathered nations now belonging to God.
- source_word: αὐτὸς ὁ θεός
  chosen: God himself
  alternatives:
  - God himself personally
  - God himself
  lexicon: BDAG
  rationale: The emphatic αὐτός is best brought out with 'himself,' stressing God's
    direct presence with his redeemed people.
- source_word: μετ’ αὐτῶν ἔσται
  chosen: will be with them
  alternatives:
  - shall be with them
  lexicon: BDAG
  rationale: This is a simple future existential expression. 'Will be with them' is
    idiomatic modern English and preserves the covenantal presence formula.
