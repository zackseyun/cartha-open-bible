theological_decisions:
- issue: Plural λαοὶ versus traditional singular 'people'
  chosen_reading: they will be his peoples
  alternative_readings:
  - they will be his people
  rationale: The critical Greek text reads the plural λαοί. Preserving the plural
    avoids smoothing away a meaningful feature of the text and may reflect the eschatological
    inclusion of many peoples/nations in one covenant relationship with God. This
    does not undermine divine unity or the unity of God's redeemed community; it preserves
    the wording actually present.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
- issue: Tabernacle imagery in σκηνή / σκηνόω
  chosen_reading: the dwelling place of God ... he will dwell with them
  alternative_readings:
  - the tabernacle of God ... he will tabernacle with them
  - God's tent ... he will pitch his tent with them
  rationale: The main text uses accessible English under optimal equivalence, but
    the footnote preserves the more literal tabernacle/tent imagery because of its
    theological resonance with God's covenant presence in the Old Testament and the
    incarnation/presence theme in Johannine literature.
  doctrine_reference: 'Translation philosophy: optimal equivalence; Readable modern
    English, not archaic or academic.'
