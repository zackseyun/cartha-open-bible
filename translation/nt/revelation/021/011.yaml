theological_decisions:
- issue: Rendering of δόξα τοῦ θεοῦ in apocalyptic description
  chosen_reading: the glory of God
  alternative_readings:
  - the splendor of God
  rationale: The phrase is not merely aesthetic but theological, denoting the manifested
    divine glory associated with God's presence. 'Glory' preserves this biblical-theological
    resonance better than a purely visual term.
  doctrine_reference: 'Translation philosophy: preserve theological weight; readable
    modern English without flattening significance.'
