id: REV.21.11
reference: Revelation 21:11
source:
  edition: SBLGNT
  text: ἔχουσαν τὴν δόξαν τοῦ θεοῦ· ὁ φωστὴρ αὐτῆς ὅμοιος λίθῳ τιμιωτάτῳ, ὡς λίθῳ
    ἰάσπιδι κρυσταλλίζοντι·
translation:
  text: having the glory of God; its radiance was like a most precious stone, like
    a jasper stone, clear as crystal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'its light' or 'its brilliance' for 'its radiance' (Greek φωστήρ).
    reason: lexical_alternative
  - marker: b
    text: Or 'sparkling like crystal' for 'clear as crystal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχουσαν
  chosen: having
  alternatives:
  - with
  - bearing
  lexicon: BDAG
  rationale: Present active participle feminine accusative singular modifying the
    city from the previous verse; 'having' preserves the participial linkage and avoids
    over-interpreting possession as mere accompaniment.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  - radiance
  lexicon: BDAG
  rationale: '''Glory'' is the standard rendering of δόξα and preserves the theological
    weight of divine majesty; ''splendor/radiance'' are possible in context but narrower
    than the Greek.'
- source_word: ὁ φωστὴρ αὐτῆς
  chosen: its radiance
  alternatives:
  - its light
  - its brilliance
  - its luminary
  lexicon: BDAG
  rationale: φωστήρ can denote a light-giving body or shining quality. In this context
    describing the city's appearance, 'radiance' communicates the visible shining
    effect in natural English better than the more literal but awkward 'luminary.'
- source_word: ὅμοιος
  chosen: was like
  alternatives:
  - similar to
  - like
  lexicon: BDAG
  rationale: Expresses comparison. Supplying 'was' makes idiomatic English from the
    verbless Greek clause.
- source_word: λίθῳ τιμιωτάτῳ
  chosen: a most precious stone
  alternatives:
  - a very precious jewel
  - a stone of highest value
  lexicon: BDAG
  rationale: λίθος is 'stone,' and τιμιωτάτῳ is the superlative of τίμιος, 'most precious/very
    costly.' 'Most precious stone' preserves both the imagery and the superlative
    force.
- source_word: ὡς λίθῳ ἰάσπιδι
  chosen: like a jasper stone
  alternatives:
  - like jasper
  - like a stone of jasper
  lexicon: BDAG
  rationale: Retains the repeated λίθῳ ('stone') rather than collapsing it entirely,
    while still reading naturally in English.
- source_word: κρυσταλλίζοντι
  chosen: clear as crystal
  alternatives:
  - crystal-like
  - sparkling like crystal
  - shining like crystal
  lexicon: BDAG
  rationale: The participle describes the jasper with a crystal-like clarity or transparency.
    'Clear as crystal' is idiomatic English that captures the simile's sense without
    woodenly reproducing the participle.
