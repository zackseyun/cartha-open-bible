id: REV.21.17
reference: Revelation 21:17
source:
  edition: SBLGNT
  text: καὶ ἐμέτρησεν τὸ τεῖχος αὐτῆς ἑκατὸν τεσσεράκοντα τεσσάρων πηχῶν, μέτρον ἀνθρώπου,
    ὅ ἐστιν ἀγγέλου.
translation:
  text: 'And he measured its wall: 144 cubits, by human measure, which is also an
    angel’s measure.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'by a man’s measure, that is, an angel’s.' The Greek may stress either
      that the angel used a human unit of measurement or that human and angelic measure
      correspond here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμέτρησεν
  chosen: measured
  alternatives:
  - measured off
  lexicon: BDAG
  rationale: Aorist active indicative of μετρέω, straightforwardly denoting the act
    of measuring. 'Measured' is natural modern English and sufficiently precise.
- source_word: τεῖχος
  chosen: wall
  alternatives:
  - fortification wall
  - rampart
  lexicon: BDAG
  rationale: τεῖχος refers to a city wall or defensive wall. 'Wall' is the clear,
    idiomatic rendering here in the New Jerusalem description.
- source_word: αὐτῆς
  chosen: its
  alternatives:
  - her
  lexicon: BDAG
  rationale: The pronoun refers to the city. English commonly uses 'its' for a city
    in descriptive prose, avoiding an unnecessary personification in the main text
    while preserving the referent clearly.
- source_word: ἑκατὸν τεσσεράκοντα τεσσάρων πηχῶν
  chosen: 144 cubits
  alternatives:
  - one hundred forty-four cubits
  lexicon: BDAG
  rationale: The phrase gives the measured extent in cubits. Numerals are rendered
    as digits for readability; 'cubits' preserves the ancient unit rather than converting
    it, since the text itself foregrounds the original measure.
- source_word: μέτρον
  chosen: measure
  alternatives:
  - measurement
  - standard of measurement
  lexicon: BDAG
  rationale: μέτρον denotes a measure or standard. 'Measure' is concise and matches
    the appositional explanatory force of the phrase.
- source_word: ἀνθρώπου
  chosen: human
  alternatives:
  - man’s
  - of a man
  lexicon: BDAG
  rationale: ἄνθρωπος here is generic rather than male-specific. Per the translation
    philosophy's gender-accurate principle, 'human' best conveys the representative
    sense in contemporary English.
- source_word: ὅ ἐστιν ἀγγέλου
  chosen: which is also an angel’s measure
  alternatives:
  - which is an angel’s
  - that is, of an angel
  - which is of an angel
  lexicon: BDAG
  rationale: The clause explains that the measure called 'human' is at the same time
    that of an angel. Adding 'measure' in English makes the elliptical Greek intelligible.
    'Also' brings out the explanatory equivalence without over-paraphrasing.
