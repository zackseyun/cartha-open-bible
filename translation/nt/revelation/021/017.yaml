theological_decisions:
- issue: Interpretation of 'μέτρον ἀνθρώπου, ὅ ἐστιν ἀγγέλου'
  chosen_reading: The measurement is expressed in a human unit of measure, and this
    is simultaneously the measure used by the angel.
  alternative_readings:
  - the wall measured 144 cubits according to a man's measure, that is, the angel's
    own measure
  - the phrase emphasizes that angelic and human measurement correspond here
  rationale: 'The Greek is somewhat compressed and has generated interpretive discussion,
    but the most natural sense is explanatory: the angel measured using a standard
    intelligible as human measure, which is also an angel''s measure. This preserves
    the text''s wording without speculating beyond it.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
