theological_decisions:
- issue: Metaphorical relation in 'its lamp is the Lamb'
  chosen_reading: Retain the metaphor directly rather than smoothing it to 'the Lamb
    is its light.'
  alternative_readings:
  - its light is the Lamb
  - the Lamb is its lamp
  rationale: The Greek explicitly uses λύχνος ('lamp'), not a generic term for light.
    Preserving 'lamp' maintains the text's imagery and the distinction between God's
    glory as the source of illumination and the Lamb as the city's lamp.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Divine illumination imagery
  chosen_reading: Translate without importing speculative eschatological explanation.
  alternative_readings:
  - expand to explain that God replaces all created lights
  rationale: The verse states that the city has no need of sun or moon because God's
    glory illumines it and the Lamb is its lamp. The translation preserves that claim
    without adding doctrinal elaboration beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §3
