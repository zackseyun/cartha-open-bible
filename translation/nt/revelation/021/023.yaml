id: REV.21.23
reference: Revelation 21:23
source:
  edition: SBLGNT
  text: καὶ ἡ πόλις οὐ χρείαν ἔχει τοῦ ἡλίου οὐδὲ τῆς σελήνης, ἵνα φαίνωσιν αὐτῇ,
    ἡ γὰρ δόξα τοῦ θεοῦ ἐφώτισεν αὐτήν, καὶ ὁ λύχνος αὐτῆς τὸ ἀρνίον.
translation:
  text: And the city has no need of the sun or of the moon to shine on it, for the
    glory of God gave it light, and its lamp is the Lamb.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to give it light.' The Greek says literally 'to shine for/on it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πόλις
  chosen: city
  lexicon: BDAG
  rationale: Standard sense in context of the New Jerusalem; 'city' is the natural
    and direct rendering.
- source_word: οὐ χρείαν ἔχει
  chosen: has no need
  alternatives:
  - does not need
  - has no need of
  lexicon: BDAG
  rationale: This idiom means 'to have no need of.' 'Has no need' preserves the Greek
    structure while remaining natural English.
- source_word: τοῦ ἡλίου οὐδὲ τῆς σελήνης
  chosen: of the sun or of the moon
  alternatives:
  - the sun and the moon
  - sun or moon
  lexicon: BDAG
  rationale: Retains the paired genitives governed by the idiom 'has no need of.'
    Repeating 'of the' keeps the formal balance of the Greek.
- source_word: ἵνα φαίνωσιν αὐτῇ
  chosen: to shine on it
  alternatives:
  - to give it light
  - to shine for it
  lexicon: BDAG
  rationale: With celestial bodies as subject, φαίνω naturally means 'shine.' The
    dative αὐτῇ is best expressed idiomatically as 'on it' in English. 'Give it light'
    would overlap too much with the later ἐφώτισεν.
- source_word: δόξα
  chosen: glory
  alternatives:
  - radiance
  - splendor
  lexicon: BDAG
  rationale: '''Glory'' is the established and theologically weighty rendering, especially
    in Johannine and apocalyptic contexts.'
- source_word: ἐφώτισεν
  chosen: gave it light
  alternatives:
  - illumined it
  - lit it up
  - enlightened it
  lexicon: BDAG
  rationale: The aorist verb denotes illumination. 'Gave it light' is clear modern
    English and avoids awkward repetition with 'shine' while preserving the concrete
    sense better than the more abstract 'enlightened.'
- source_word: λύχνος
  chosen: lamp
  alternatives:
  - light
  - lampstand
  lexicon: BDAG
  rationale: λύχνος denotes a lamp, not light in general (φῶς) and not a lampstand
    (λυχνία). 'Lamp' preserves the imagery precisely.
- source_word: ἀρνίον
  chosen: Lamb
  lexicon: BDAG
  rationale: In Revelation this is the established christological title for Jesus.
    Capitalization signals titular usage in English without adding content not present
    in Greek.
