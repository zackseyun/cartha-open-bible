id: REV.21.7
reference: Revelation 21:7
source:
  edition: SBLGNT
  text: ὁ νικῶν κληρονομήσει ταῦτα, καὶ ἔσομαι αὐτῷ θεὸς καὶ αὐτὸς ἔσται μοι υἱός.
translation:
  text: The one who overcomes will inherit these things, and I will be his God, and
    he will be my son.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The one who conquers.' The Greek verb νικάω is a recurring term in Revelation
      for prevailing faithfully.
    reason: lexical_alternative
  - marker: b
    text: Greek 'he will be my son.' The masculine term likely has representative
      force here, but the translation preserves the filial wording of the source text.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ νικῶν
  chosen: The one who overcomes
  alternatives:
  - The one who conquers
  - The victor
  - He who overcomes
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to the person characterized by overcoming. 'The one who overcomes' is clear modern
    English and preserves the ongoing/characterizing force better than the more idiomatic
    but less transparent 'the victor.' 'Conquers' is possible, but 'overcomes' aligns
    well with Revelation's recurring νικάω language in messages to the churches.
- source_word: κληρονομήσει
  chosen: will inherit
  alternatives:
  - will receive as an inheritance
  - will possess
  lexicon: BDAG
  rationale: κληρονομέω commonly means to inherit or receive as an inheritance. 'Will
    inherit' is the most direct and idiomatic rendering, preserving covenantal/familial
    overtones that fit the following father-son language.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - all this
  - these
  lexicon: BDAG
  rationale: The plural demonstrative is formally 'these things.' Although some English
    versions smooth to 'all this' in light of the preceding vision, 'these things'
    more closely reflects the Greek plural and remains natural enough in English.
- source_word: ἔσομαι αὐτῷ θεὸς
  chosen: I will be his God
  alternatives:
  - I will be God to him
  lexicon: BDAG
  rationale: This reflects a covenant formula found elsewhere in Scripture. 'I will
    be his God' is idiomatic English and preserves the relational force of the dative
    αὐτῷ without awkwardness.
- source_word: αὐτὸς ἔσται μοι υἱός
  chosen: he will be my son
  alternatives:
  - he will be a son to me
  lexicon: BDAG
  rationale: The predicate nominative construction echoes covenant/adoption language.
    'He will be my son' is the most natural English equivalent and preserves the personal
    filial relationship. The anarthrous υἱός does not require an indefinite 'a son'
    in English here.
- source_word: υἱός
  chosen: son
  alternatives:
  - child
  lexicon: BDAG
  rationale: Per the translation philosophy, gender-accurate rendering is preferred
    where the Greek is grammatically masculine and carries representative force. 'Son'
    preserves the source wording and the biblical inheritance/adoption motif; 'child'
    would flatten the masculine filial imagery. Inclusivity implications are better
    handled by annotation rather than neutralizing the term in the main text.
