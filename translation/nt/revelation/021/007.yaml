theological_decisions:
- issue: Gendered filial language in a promise addressed generically to the conqueror
  chosen_reading: Retain 'son' in the main text
  alternative_readings:
  - child
  rationale: The Greek explicitly uses the masculine singular υἱός, and the project's
    doctrine specifies gender-accurate over gender-neutral renderings. In this context
    the masculine likely has representative force, but the filial and inheritance
    imagery is significant and should not be neutralized in the main text.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Covenantal formula echo
  chosen_reading: Render relationally as 'I will be his God, and he will be my son'
  alternative_readings:
  - I will be God to him, and he will be a son to me
  rationale: The verse echoes established covenant formula language while intensifying
    it with filial terminology. The chosen rendering preserves the theological relationship
    without importing additional doctrinal explanation into the text itself.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy, point 3
