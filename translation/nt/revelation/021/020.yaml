id: REV.21.20
reference: Revelation 21:20
source:
  edition: SBLGNT
  text: ὁ πέμπτος σαρδόνυξ, ὁ ἕκτος σάρδιον, ὁ ἕβδομος χρυσόλιθος, ὁ ὄγδοος βήρυλλος,
    ὁ ἔνατος τοπάζιον, ὁ δέκατος χρυσόπρασος, ὁ ἑνδέκατος ὑάκινθος, ὁ δωδέκατος ἀμέθυστος·
translation:
  text: the fifth, sardonyx; the sixth, sardius; the seventh, chrysolite; the eighth,
    beryl; the ninth, topaz; the tenth, chrysoprase; the eleventh, jacinth; the twelfth,
    amethyst.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'carnelian' for 'sardius'; the precise ancient gemstone identification
      is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''Jacinth'' may also be rendered ''hyacinth''; the Greek term refers to
      a gemstone, not the flower.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμπτος
  chosen: the fifth
  alternatives:
  - fifth
  lexicon: BDAG
  rationale: Ordinal adjective rendered straightforwardly with the article preserved
    for the list structure established in the context of the foundation stones.
- source_word: σαρδόνυξ
  chosen: sardonyx
  lexicon: BDAG
  rationale: A gemstone name best represented by standard English transliteration/traditional
    mineral term; this is the normal identifiable equivalent.
- source_word: ἕκτος
  chosen: the sixth
  alternatives:
  - sixth
  lexicon: BDAG
  rationale: Ordinal adjective rendered literally, maintaining the repetitive cadence
    of the Greek enumeration.
- source_word: σάρδιον
  chosen: sardius
  alternatives:
  - carnelian
  lexicon: BDAG
  rationale: Rendered as 'sardius' to preserve distinction from σαρδόνυξ and to reflect
    longstanding gemstone identification in this apocalyptic list. 'Carnelian' is
    a plausible modern mineral equivalent, but the exact ancient referent is not certain
    enough to replace the traditional term in the main text.
- source_word: ἕβδομος
  chosen: the seventh
  alternatives:
  - seventh
  lexicon: BDAG
  rationale: Literal rendering of the ordinal, preserving the formal sequence.
- source_word: χρυσόλιθος
  chosen: chrysolite
  alternatives:
  - gold-stone
  - topaz
  lexicon: BDAG
  rationale: Rendered with the conventional gemstone term 'chrysolite.' Although the
    etymology suggests 'gold-stone' and ancient identifications vary, an established
    English gem name best fits optimal equivalence here.
- source_word: ὄγδοος
  chosen: the eighth
  alternatives:
  - eighth
  lexicon: BDAG
  rationale: Literal ordinal rendering.
- source_word: βήρυλλος
  chosen: beryl
  lexicon: BDAG
  rationale: Standard English equivalent for the gemstone term.
- source_word: ἔνατος
  chosen: the ninth
  alternatives:
  - ninth
  lexicon: BDAG
  rationale: Literal ordinal rendering.
- source_word: τοπάζιον
  chosen: topaz
  lexicon: BDAG
  rationale: Standard English equivalent for the gemstone term.
- source_word: δέκατος
  chosen: the tenth
  alternatives:
  - tenth
  lexicon: BDAG
  rationale: Literal ordinal rendering.
- source_word: χρυσόπρασος
  chosen: chrysoprase
  alternatives:
  - golden leek-stone
  lexicon: BDAG
  rationale: Rendered by the established English gemstone name. A literal etymological
    gloss would be obscure and less readable.
- source_word: ἑνδέκατος
  chosen: the eleventh
  alternatives:
  - eleventh
  lexicon: BDAG
  rationale: Literal ordinal rendering.
- source_word: ὑάκινθος
  chosen: jacinth
  alternatives:
  - hyacinth
  - sapphire-like blue stone
  lexicon: BDAG
  rationale: Rendered 'jacinth,' the conventional English gemstone term in this context.
    'Hyacinth' may suggest the flower to modern readers, while the exact mineral identification
    remains debated.
- source_word: δωδέκατος
  chosen: the twelfth
  alternatives:
  - twelfth
  lexicon: BDAG
  rationale: Literal ordinal rendering.
- source_word: ἀμέθυστος
  chosen: amethyst
  lexicon: BDAG
  rationale: Standard English equivalent for the gemstone term.
