id: REV.21.6
reference: Revelation 21:6
source:
  edition: SBLGNT
  text: καὶ εἶπέν μοι· ⸂Γέγοναν. ἐγὼ⸃ τὸ Ἄλφα καὶ τὸ Ὦ, ἡ ἀρχὴ καὶ τὸ τέλος. ἐγὼ τῷ διψῶντι δώσω ἐκ τῆς πηγῆς τοῦ ὕδατος τῆς ζωῆς δωρεάν.
translation:
  text: And he said to me[a], “It is done. I am the Alpha and the Omega, the beginning and the end[b]. To the one who is thirsty I will give from the spring of the water of life freely.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, “It is done.” The Greek verb is plural (“they have come to pass” / “these things have come to pass”).
    reason: alternative_reading
  - marker: b
    text: Or “without cost” or “as a gift.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Γέγοναν
  chosen: They have come to pass
  alternatives:
  - It is done
  - These things have come to pass
  lexicon: BDAG
  rationale: Perfect active indicative plural of γίνομαι; the plural is best reflected rather than flattened to a singular English idiom. The sense is that the announced realities have now become reality. 'It is done' is traditional and idiomatic, but it obscures the plural form.
- source_word: τὸ Ἄλφα καὶ τὸ Ὦ
  chosen: the Alpha and the Omega
  lexicon: BDAG
  rationale: Retains the Greek letter names as established symbolic titles in Revelation. Translating their conceptual force is immediately supplied by the apposition 'the beginning and the end.'
- source_word: ἡ ἀρχὴ καὶ τὸ τέλος
  chosen: the beginning and the end
  alternatives:
  - the origin and the goal
  lexicon: BDAG
  rationale: Standard and natural rendering of the paired terms, preserving both temporal and teleological resonance without over-interpreting.
- source_word: τῷ διψῶντι
  chosen: to the one who is thirsty
  alternatives:
  - to the thirsty one
  - to whoever thirsts
  lexicon: BDAG
  rationale: The present participle functions substantivally for a person characterized by thirst. 'The one who is thirsty' is natural English and preserves the singular, personal address.
- source_word: δώσω
  chosen: I will give
  lexicon: BDAG
  rationale: Simple future promise; no need to expand beyond the direct verbal sense.
- source_word: ἐκ τῆς πηγῆς
  chosen: from the spring
  alternatives:
  - from the fountain
  - from the source
  lexicon: BDAG
  rationale: πηγή commonly denotes a spring or fountain. 'Spring' is clear modern English and fits the life-giving imagery.
- source_word: τοῦ ὕδατος τῆς ζωῆς
  chosen: of the water of life
  alternatives:
  - of life-giving water
  lexicon: BDAG
  rationale: Preserves the genitival construction and the established biblical imagery rather than paraphrasing.
- source_word: δωρεάν
  chosen: freely
  alternatives:
  - without cost
  - as a gift
  lexicon: BDAG
  rationale: Conveys the adverbial sense of being given gratis. 'Freely' is concise and idiomatic, though the nuance of no cost is worth preserving in a footnote.
