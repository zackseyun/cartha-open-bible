theological_decisions:
- issue: Rendering the divine self-declaration Γέγοναν with a plural-sensitive translation
  chosen_reading: They have come to pass
  alternative_readings:
  - It is done
  rationale: The speaker is God, and the declaration marks the fulfillment of the new-creation promises. Preserving the plural form avoids importing a smoother traditional formula where the Greek points to multiple things having come into being or reached fulfillment.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Retention of Alpha/Omega imagery as a divine title
  chosen_reading: the Alpha and the Omega
  alternative_readings:
  - the A and the Z
  rationale: The title is a christological/divine self-designation in Revelation. Retaining the Greek letter names preserves the canonical imagery and intertextual resonance without doctrinal overreach.
  doctrine_reference: Affirmations; Translation philosophy §2, §6
