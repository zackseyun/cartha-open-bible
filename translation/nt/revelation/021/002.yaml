id: REV.21.2
reference: Revelation 21:2
source:
  edition: SBLGNT
  text: καὶ τὴν πόλιν τὴν ἁγίαν Ἰερουσαλὴμ καινὴν εἶδον καταβαίνουσαν ἐκ τοῦ οὐρανοῦ
    ἀπὸ τοῦ θεοῦ, ἡτοιμασμένην ὡς νύμφην κεκοσμημένην τῷ ἀνδρὶ αὐτῆς.
translation:
  text: And I saw the holy city, new Jerusalem, coming down out of heaven from God,
    prepared like a bride adorned for her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'descending out of heaven from God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'prepared as a bride adorned for her husband.'
    reason: lexical_alternative
  - marker: c
    text: '''New Jerusalem'' is also a possible capitalization in English, treating
      the phrase as a formal title for the eschatological city.'
    reason: alternative_reading
lexical_decisions:
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: πόλις straightforwardly denotes a city. 'City' preserves the concrete
    civic imagery central to the vision.
- source_word: ἁγίαν
  chosen: holy
  alternatives:
  - sacred
  lexicon: BDAG
  rationale: ἅγιος is regularly rendered 'holy' in biblical contexts. 'Holy city'
    is both natural English and preserves the covenantal/theological force better
    than 'sacred city.'
- source_word: Ἰερουσαλὴμ καινὴν
  chosen: new Jerusalem
  alternatives:
  - New Jerusalem
  lexicon: BDAG
  rationale: The name is transliterated per philosophy, while καινός is translated.
    Lowercase 'new' treats the adjective as descriptive in running text rather than
    as a fixed proper-name title, while still clearly identifying the eschatological
    Jerusalem.
- source_word: εἶδον
  chosen: I saw
  alternatives:
  - I looked and saw
  lexicon: BDAG
  rationale: Aorist of ὁράω is most naturally 'I saw.' No expansion is warranted by
    the Greek.
- source_word: καταβαίνουσαν
  chosen: coming down
  alternatives:
  - descending
  lexicon: BDAG
  rationale: '''Coming down'' is idiomatic modern English and accurately reflects
    καταβαίνω. ''Descending'' is more formal but less natural for the target style.'
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: out of heaven
  alternatives:
  - from heaven
  lexicon: BDAG
  rationale: ἐκ emphasizes movement out from a source. 'Out of heaven' preserves that
    nuance more clearly than the flatter 'from heaven.'
- source_word: ἀπὸ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - from the presence of God
  lexicon: BDAG
  rationale: ἀπό marks source/origin. 'From God' is the plain sense; adding 'presence
    of' would import nuance not explicit in the text.
- source_word: ἡτοιμασμένην
  chosen: prepared
  alternatives:
  - made ready
  lexicon: BDAG
  rationale: 'Perfect passive participle of ἑτοιμάζω indicates a completed state:
    the city stands prepared. ''Prepared'' is concise and natural.'
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: Here ὡς introduces comparison. 'Like' communicates simile more clearly
    in contemporary English than 'as.'
- source_word: νύμφην
  chosen: a bride
  alternatives:
  - the bride
  lexicon: BDAG
  rationale: The anarthrous noun is well rendered indefinitely in English. The image
    is bridal rather than requiring the technical title 'the Bride' in this clause.
- source_word: κεκοσμημένην
  chosen: adorned
  alternatives:
  - beautifully dressed
  - decorated
  lexicon: BDAG
  rationale: κοσμέω in this context refers to ornamenting or adorning. 'Adorned' preserves
    the elevated, wedding-related imagery without becoming archaic.
- source_word: τῷ ἀνδρὶ αὐτῆς
  chosen: for her husband
  alternatives:
  - for her man
  - for her bridegroom
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband' depending on context. In a bridal preparation
    context, 'husband' is the most natural and contextually fitting rendering. 'Bridegroom'
    would shift to a more specific nuptial term not used here.
