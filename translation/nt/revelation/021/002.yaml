theological_decisions:
- issue: Whether to capitalize 'New Jerusalem' as a formal eschatological title
  chosen_reading: Rendered as 'new Jerusalem' in running text
  alternative_readings:
  - New Jerusalem
  rationale: The Greek presents Ἰερουσαλήμ with attributive καινήν, literally 'Jerusalem
    new/new Jerusalem.' English capitalization of 'New' is interpretive and stylistic
    rather than lexical. Lowercase preserves the descriptive force while still identifying
    the eschatological city.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names;
    readable modern English.'
- issue: Whether the bridal imagery should be made explicit as ecclesiological symbolism
    in the main text
  chosen_reading: Kept the simile 'prepared like a bride adorned for her husband'
    without interpretive expansion
  alternative_readings:
  - prepared as the church, the bride of the Lamb
  rationale: Although Revelation later identifies the city with bridal imagery in
    a theologically rich way, this verse itself presents the comparison as a simile.
    Expanding it in translation would import interpretation beyond the wording and
    violate the instruction not to paraphrase beyond the source text.
  doctrine_reference: Preserve theological tension rather than resolve it; never import
    doctrinal claims the text does not make.
