id: REV.21.16
reference: Revelation 21:16
source:
  edition: SBLGNT
  text: καὶ ἡ πόλις τετράγωνος κεῖται, καὶ τὸ μῆκος αὐτῆς ⸀ὅσον τὸ πλάτος. καὶ ἐμέτρησεν
    τὴν πόλιν τῷ καλάμῳ ἐπὶ ⸀σταδίους δώδεκα ⸀χιλιάδων· τὸ μῆκος καὶ τὸ πλάτος καὶ
    τὸ ὕψος αὐτῆς ἴσα ἐστίν.
translation:
  text: 'And the city lies foursquare, and its length is as great as its width. And
    he measured the city with the measuring rod: twelve thousand stadia. Its length
    and width and height are equal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: A stadion was an ancient unit of distance; twelve thousand stadia is roughly
      1,380 miles or 2,220 kilometers, depending on the exact length assumed.
    reason: cultural_note
  - marker: b
    text: Or, more interpretively, 'the city is a perfect cube.' The Greek states
      directly that its length and width and height are equal.
    reason: alternative_reading
  - marker: c
    text: Or 'with the reed.' The Greek term can mean 'reed,' but here it refers to
      a measuring instrument.
    reason: lexical_alternative
lexical_decisions:
- source_word: τετράγωνος
  chosen: foursquare
  alternatives:
  - square
  - four-cornered
  lexicon: BDAG
  rationale: Denotes a four-sided/square shape. 'Foursquare' preserves the elevated,
    architectural sense common in English Bible style without becoming archaic enough
    to obscure meaning; 'square' is possible but slightly flatter.
- source_word: κεῖται
  chosen: lies
  alternatives:
  - is laid out
  - is situated
  lexicon: BDAG
  rationale: The middle/passive form of κεῖμαι commonly means 'lies' or 'is situated.'
    'Lies' is concise and idiomatic for describing the city's set form or position.
- source_word: τὸ μῆκος αὐτῆς ὅσον τὸ πλάτος
  chosen: its length is as great as its width
  alternatives:
  - its length is equal to its width
  - its length is as much as the width
  lexicon: BDAG
  rationale: ὅσον marks equivalence in extent. 'As great as' is natural English and
    preserves the comparative force without over-literal awkwardness.
- source_word: ἐμέτρησεν
  chosen: he measured
  alternatives:
  - he took the measure of
  lexicon: BDAG
  rationale: Simple aorist narrative verb; the implied subject is the angel from the
    immediate context. 'He measured' is the plainest rendering.
- source_word: τῷ καλάμῳ
  chosen: with the measuring rod
  alternatives:
  - with the rod
  - with the reed
  lexicon: BDAG
  rationale: κάλαμος can mean 'reed,' but in this context it is an instrument for
    measurement. 'Measuring rod' makes the function explicit for modern readers while
    remaining faithful to the referent.
- source_word: ἐπὶ σταδίους δώδεκα χιλιάδων
  chosen: twelve thousand stadia
  alternatives:
  - to twelve thousand stadia
  - at twelve thousand stadia
  lexicon: BDAG
  rationale: The phrase gives the measured extent. Retaining 'stadia' preserves the
    ancient unit rather than converting it into modern measurements in the main text.
    The preposition ἐπί here is naturally absorbed into idiomatic English as the resulting
    measurement.
- source_word: στάδιος
  chosen: stadia
  alternatives:
  - furlongs
  lexicon: BDAG
  rationale: '''Stadia'' is the transparent transliterated plural of the ancient distance
    unit and is more accessible and accurate than the traditional but culturally distant
    ''furlongs.'''
- source_word: τὸ μῆκος καὶ τὸ πλάτος καὶ τὸ ὕψος αὐτῆς ἴσα ἐστίν
  chosen: Its length and width and height are equal
  alternatives:
  - Its length and breadth and height are equal
  - Its length and width and height are the same
  lexicon: BDAG
  rationale: ἴσα ἐστίν states equality of all three dimensions. 'Width' is preferred
    over 'breadth' for modern readability; the plural predicate in English is natural
    with the compound subject.
