theological_decisions:
- issue: Whether to preserve the ancient unit or convert it into a modern equivalent
    in the main text
  chosen_reading: Retain 'twelve thousand stadia' in the main text
  alternative_readings:
  - approximately 1,380 miles
  - approximately 2,220 kilometers
  rationale: The Greek text gives the number in ancient units, and preserving that
    wording best reflects original-language primacy. Modern approximations are interpretive
    and depend on the exact length assigned to a stadion, so they are better kept
    out of the main text.
  doctrine_reference: Translation philosophy §1, §6
- issue: How explicitly to render the city's three-dimensional equality
  chosen_reading: The city is presented as having equal length, width, and height
  alternative_readings:
  - The city is a perfect cube
  rationale: While the implication is cubic geometry, the Greek states the equality
    of dimensions rather than using a geometric label. The translation preserves the
    textual wording and avoids importing an interpretive summary into the main text.
  doctrine_reference: Translation philosophy §1, §3
