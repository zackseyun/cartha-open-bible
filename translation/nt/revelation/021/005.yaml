id: REV.21.5
reference: Revelation 21:5
source:
  edition: SBLGNT
  text: Καὶ εἶπεν ὁ καθήμενος ἐπὶ τῷ θρόνῳ· Ἰδοὺ ⸂καινὰ ποιῶ πάντα⸃. καὶ ⸀λέγει· Γράψον,
    ὅτι οὗτοι οἱ λόγοι ⸂πιστοὶ καὶ ἀληθινοί⸃ εἰσιν.
translation:
  text: And the one seated on the throne said, “Behold, I am making all things new.”
    And he said, “Write, because these words are trustworthy and true.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “I make everything new.” The Greek can be rendered with either 'all things'
      or 'everything'; 'all things' was chosen to preserve the broad, formal scope
      of the expression.
    reason: lexical_alternative
  - marker: b
    text: Or “these words are faithful and true.” 'Trustworthy' was chosen because
      it is more idiomatic in English when describing words, while preserving the
      sense of πιστοί.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ καθήμενος ἐπὶ τῷ θρόνῳ
  chosen: the one seated on the throne
  alternatives:
  - he who sits on the throne
  - the one sitting on the throne
  lexicon: BDAG
  rationale: Uses a natural English participial expression that preserves the present
    participle's descriptive force without awkwardness. 'Seated' fits enthronement
    context and reads idiomatically in modern English.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the solemn, attention-directing force of the discourse marker
    in apocalyptic speech. 'Behold' is slightly elevated but still recognizable and
    preserves the gravity better than the more casual 'Look.'
- source_word: καινὰ
  chosen: new
  alternatives:
  - fresh
  - renewed
  lexicon: BDAG
  rationale: καινός commonly denotes newness in kind or quality. 'New' is the standard
    rendering and fits the eschatological renewal context without over-specifying
    whether this is replacement or transformation.
- source_word: ποιῶ
  chosen: I am making
  alternatives:
  - I make
  - I am creating
  lexicon: BDAG
  rationale: 'The present tense is best represented progressively here: the enthroned
    speaker declares an active divine work. ''Making'' is closer to ποιέω than ''creating,''
    which could import κτίζω-like nuance not explicit in the text.'
- source_word: πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: '''All things'' preserves the broad, comprehensive scope and matches
    the neuter plural form well. It also resonates with biblical style in a way suitable
    to the context.'
- source_word: Γράψον
  chosen: Write
  alternatives:
  - Write this
  - Record
  lexicon: BDAG
  rationale: A direct imperative is preserved without adding an object not present
    in the Greek. 'Write' is simple and forceful.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the reason for the command to write: the words are
    reliable. ''Because'' makes the logical relation explicit in clear modern English.'
- source_word: οὗτοι οἱ λόγοι
  chosen: these words
  alternatives:
  - these sayings
  - these statements
  lexicon: BDAG
  rationale: λόγοι in this context refers to the utterances/revelatory message just
    given. 'Words' is straightforward and sufficiently broad, while 'sayings' may
    sound archaic or overly specialized.
- source_word: πιστοὶ
  chosen: trustworthy
  alternatives:
  - faithful
  - reliable
  lexicon: BDAG
  rationale: For λόγοι, 'trustworthy' communicates that these utterances can be depended
    on. 'Faithful' is possible but less idiomatic in English when modifying 'words.'
- source_word: ἀληθινοί
  chosen: 'true'
  alternatives:
  - genuine
  - real
  lexicon: BDAG
  rationale: '''True'' is the most direct and natural rendering, preserving the pairing
    with πιστοί as a standard Johannine affirmation of reliability and truthfulness.'
