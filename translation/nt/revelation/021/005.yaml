theological_decisions:
- issue: Scope and nature of eschatological renewal in καινὰ ποιῶ πάντα
  chosen_reading: I am making all things new
  alternative_readings:
  - I make everything new
  - I am making everything new
  rationale: The chosen wording preserves the present verbal aspect and the comprehensive
    scope of πάντα while avoiding an interpretive decision between absolute replacement
    and transformative renewal. It maintains the theological tension present in the
    Greek rather than resolving it.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Rendering of the divine speaker's self-presentation
  chosen_reading: the one seated on the throne
  alternative_readings:
  - he who sits on the throne
  rationale: This identifies the speaker by the throne imagery without importing additional
    doctrinal specification beyond the text itself. The verse presents divine authority
    through enthronement language, and the translation preserves that imagery plainly.
  doctrine_reference: Affirmations; Translation philosophy §1 Original-language primacy
    over translation tradition.
