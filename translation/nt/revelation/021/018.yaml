id: REV.21.18
reference: Revelation 21:18
source:
  edition: SBLGNT
  text: ⸀καὶ ἡ ἐνδώμησις τοῦ τείχους αὐτῆς ἴασπις, καὶ ἡ πόλις χρυσίον καθαρὸν ὅμοιον ὑάλῳ καθαρῷ·
translation:
  text: And the material of its wall was jasper[a], and the city was pure gold[b], like pure glass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the construction of its wall was jasper.' The Greek ἐνδώμησις can refer to the building work or the material/structure of what is built; here 'material' was chosen because the verse emphasizes substance.
    reason: lexical_alternative
  - marker: b
    text: Or 'like pure glass' or 'like transparent glass.' The comparison stresses the city's radiant clarity.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδώμησις
  chosen: material
  alternatives:
  - construction
  - building
  - structure
  lexicon: BDAG
  rationale: The noun denotes that of which something is built, or its construction. In this context, with the predicate ἴασπις and the following description of the city's substance, 'material' best conveys the sense in natural English without implying the act of building.
- source_word: τεῖχος
  chosen: wall
  alternatives:
  - fortification
  - rampart
  lexicon: BDAG
  rationale: The standard sense is 'wall,' especially a city wall. 'Wall' is the natural and sufficiently precise rendering here.
- source_word: ἴασπις
  chosen: jasper
  lexicon: BDAG
  rationale: The gemstone name is conventionally transliterated. Although the ancient stone may not correspond exactly to modern jasper, transliteration preserves the source term best.
- source_word: χρυσίον
  chosen: gold
  alternatives:
  - golden material
  lexicon: BDAG
  rationale: The noun refers to gold as a material. 'Gold' is idiomatic and matches the descriptive focus on the city's substance.
- source_word: καθαρόν
  chosen: pure
  alternatives:
  - clean
  lexicon: BDAG
  rationale: With gold, καθαρός describes purity or refinement, not ritual cleanliness. 'Pure' is the appropriate English equivalent.
- source_word: ὅμοιον
  chosen: like
  alternatives:
  - similar to
  - resembling
  lexicon: BDAG
  rationale: The adjective introduces a comparison. 'Like' is concise and natural in English.
- source_word: ὕαλῳ καθαρῷ
  chosen: clear glass
  alternatives:
  - pure glass
  - transparent glass
  lexicon: BDAG
  rationale: ὕαλος refers to glass or a glass-like transparent substance. Because καθαρῷ here emphasizes clarity/transparency in the comparison, 'clear glass' communicates the visual effect more naturally than the more literal but less idiomatic 'pure glass'.
