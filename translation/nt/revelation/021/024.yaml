id: REV.21.24
reference: Revelation 21:24
source:
  edition: SBLGNT
  text: καὶ περιπατήσουσιν τὰ ἔθνη διὰ τοῦ φωτὸς αὐτῆς· καὶ οἱ βασιλεῖς τῆς γῆς φέρουσιν ⸂τὴν δόξαν αὐτῶν⸃ εἰς αὐτήν·
translation:
  text: And the nations will walk by its light[c][b][a], and the kings of the earth will bring their glory into it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through its light.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their splendor' or 'their honor.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'into her'; the pronoun is feminine because it refers to the city, which is grammatically feminine.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιπατήσουσιν
  chosen: will walk
  alternatives:
  - will live
  - will conduct themselves
  lexicon: BDAG
  rationale: The verb literally means 'walk' and in Revelation 21:24, with διὰ τοῦ φωτὸς αὐτῆς ('by/through its light'), the image is concrete and processional rather than merely metaphorical. 'Will walk' preserves the imagery and remains natural English.
- source_word: τὰ ἔθνη
  chosen: the nations
  alternatives:
  - the Gentiles
  - the peoples
  lexicon: BDAG
  rationale: ἔθνη commonly means 'nations' or 'Gentiles.' In this eschatological vision of the new Jerusalem, the collective political-ethnic sense is primary, so 'the nations' best fits the context and preserves the OT prophetic background.
- source_word: διὰ τοῦ φωτὸς αὐτῆς
  chosen: by its light
  alternatives:
  - through its light
  - in its light
  lexicon: BDAG
  rationale: διά with the genitive can denote means or agency. 'By its light' is idiomatic English and conveys that the city's light is the means by which the nations walk. 'Through its light' is more wooden and less natural here.
- source_word: οἱ βασιλεῖς τῆς γῆς
  chosen: the kings of the earth
  alternatives:
  - the kings of the land
  lexicon: BDAG
  rationale: This is a standard apocalyptic expression in Revelation for earthly rulers. 'Earth' is the normal rendering of γῆ in this phrase and preserves intertextual consistency within the book.
- source_word: φέρουσιν
  chosen: bring
  alternatives:
  - carry
  - are bringing
  lexicon: BDAG
  rationale: The present tense in visionary narrative can function vividly, but English commonly smooths this to a simple present or future-like present. 'Bring' is concise and idiomatic with the object 'their glory' and destination 'into it.'
- source_word: τὴν δόξαν αὐτῶν
  chosen: their glory
  alternatives:
  - their splendor
  - their honor
  lexicon: BDAG
  rationale: δόξα here likely refers to the honor, wealth, and splendor of the nations' rulers brought into the city, echoing Isaianic new-creation imagery. 'Glory' preserves the biblical-theological resonance and allows the reader to hear the intertextual echo, while 'splendor' is a viable interpretive alternative.
- source_word: εἰς αὐτήν
  chosen: into it
  alternatives:
  - to it
  - into her
  lexicon: BDAG
  rationale: The pronoun refers to the city, grammatically feminine in Greek because πόλις is feminine, but English normally uses 'it' for a city unless personification is being foregrounded. 'Into it' fits the spatial sense of εἰς and avoids importing a stronger personification than the immediate clause requires.
