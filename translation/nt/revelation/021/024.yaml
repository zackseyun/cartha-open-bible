theological_decisions:
- issue: Referent and personification of the feminine pronoun for the new Jerusalem
  chosen_reading: Render αὐτῆς / αὐτήν as 'its' / 'it,' referring to the city.
  alternative_readings:
  - '''her'' / ''her,'' emphasizing the city''s personified bridal imagery'
  rationale: 'Revelation 21 does personify the new Jerusalem as the bride, but in this verse the immediate imagery is civic and spatial: nations walk by the city''s light and kings bring glory into the city. English ''it'' best matches the local sense while avoiding overreading the bridal metaphor into every pronoun.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence.
