id: REV.21.27
reference: Revelation 21:27
source:
  edition: SBLGNT
  text: καὶ οὐ μὴ εἰσέλθῃ εἰς αὐτὴν πᾶν κοινὸν καὶ ⸀ποιῶν βδέλυγμα καὶ ψεῦδος, εἰ μὴ οἱ γεγραμμένοι ἐν τῷ βιβλίῳ τῆς ζωῆς τοῦ ἀρνίου.
translation:
  text: And nothing unclean will ever enter it[a], nor anyone who does what is detestable or false[b], but only those written in the Lamb’s book of life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'nothing profane' or 'nothing defiled' for 'nothing unclean' (πᾶν κοινόν).
    reason: lexical_alternative
  - marker: b
    text: Literally, 'doing abomination and falsehood.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ εἰσέλθῃ
  chosen: will ever enter
  alternatives:
  - shall certainly not enter
  - will never enter
  lexicon: BDAG
  rationale: The οὐ μή construction with aorist subjunctive is an emphatic negation. 'Will ever enter' captures both futurity and strong exclusion in natural modern English.
- source_word: αὐτὴν
  chosen: it
  alternatives:
  - her
  lexicon: BDAG
  rationale: The pronoun refers to the city, New Jerusalem. English idiom normally uses 'it' for a city in this context, avoiding an unnecessarily personified rendering unless the context explicitly foregrounds the bride imagery.
- source_word: πᾶν κοινὸν
  chosen: nothing unclean
  alternatives:
  - nothing common
  - nothing profane
  - nothing defiled
  lexicon: BDAG
  rationale: 'The neuter singular with πᾶν functions comprehensively: ''nothing.'' κοινός in Jewish purity contexts means common in the sense of ritually or morally unclean/profane. ''Unclean'' is the clearest idiomatic rendering here.'
- source_word: ποιῶν βδέλυγμα
  chosen: who does what is detestable
  alternatives:
  - practicing abomination
  - doing an abomination
  lexicon: BDAG
  rationale: The participle is substantival, referring to a person characterized by such action. βδέλυγμα denotes something abhorrent or detestable, often with cultic-moral force. 'Does what is detestable' is readable modern English while preserving the moral weight.
- source_word: καὶ ψεῦδος
  chosen: and false
  alternatives:
  - and a lie
  - and lying
  - falsehood
  lexicon: BDAG
  rationale: With ποιῶν governing both objects, the sense is 'doing ... falsehood,' idiomatically 'doing what is ... false.' This avoids the awkward English 'does a lie' while preserving the linkage with βδέλυγμα under one participle.
- source_word: εἰ μὴ
  chosen: but only
  alternatives:
  - except
  - unless
  lexicon: BDAG
  rationale: Here εἰ μή introduces the sole exception to the exclusion. 'But only' is idiomatic and emphatic in English, making the contrast clear.
- source_word: οἱ γεγραμμένοι
  chosen: those written
  alternatives:
  - those who have been written
  - those whose names are written
  - the ones enrolled
  lexicon: BDAG
  rationale: The perfect passive participle indicates a completed state of being recorded. 'Those written' is concise and close to the Greek; 'whose names are' is interpretive and not explicit in the text, though implied by the book imagery.
- source_word: ἐν τῷ βιβλίῳ τῆς ζωῆς
  chosen: in the book of life
  alternatives:
  - in the scroll of life
  lexicon: BDAG
  rationale: βιβλίον can mean book or scroll, but 'book of life' is the established and accurate English expression in this apocalyptic context.
- source_word: τοῦ ἀρνίου
  chosen: the Lamb’s
  alternatives:
  - of the Lamb
  lexicon: BDAG
  rationale: The genitive is possessive. 'The Lamb’s book of life' is natural English and preserves the christological title ἀρνίον as 'Lamb,' a key Johannine image.
