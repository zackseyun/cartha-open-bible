theological_decisions:
- issue: Scope of exclusion from the New Jerusalem
  chosen_reading: The verse excludes both anything unclean and any person characterized by detestable and false practices, with entry limited to those written in the Lamb’s book of life.
  alternative_readings:
  - The first clause refers only to impersonal impurity, with the second clause adding persons separately.
  rationale: The Greek combines neuter ('nothing unclean') and substantival participle ('anyone who does...'), so the English preserves both dimensions without collapsing one into the other.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference of 'written'
  chosen_reading: Render simply 'those written' rather than expanding to 'those whose names are written.'
  alternative_readings:
  - those whose names are written
  rationale: The imagery of a book implies names, but the Greek does not explicitly state 'names' here. The translation avoids importing wording from parallel passages while leaving the sense intact.
  doctrine_reference: Original-language primacy over translation tradition.
