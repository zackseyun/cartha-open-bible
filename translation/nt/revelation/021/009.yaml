id: REV.21.9
reference: Revelation 21:9
source:
  edition: SBLGNT
  text: Καὶ ἦλθεν εἷς ἐκ τῶν ἑπτὰ ἀγγέλων τῶν ἐχόντων τὰς ἑπτὰ φιάλας, ⸂τῶν γεμόντων⸃
    τῶν ἑπτὰ πληγῶν τῶν ἐσχάτων, καὶ ἐλάλησεν μετ’ ἐμοῦ λέγων· Δεῦρο, δείξω σοι τὴν
    ⸂νύμφην τὴν γυναῖκα⸃ τοῦ ἀρνίου.
translation:
  text: Then one of the seven angels who had the seven bowls full of the seven last
    plagues came and spoke with me, saying, “Come, I will show you the bride, the
    wife of the Lamb.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'filled with the seven final plagues.'
    reason: lexical_alternative
  - marker: b
    text: Or 'spoke to me.' The Greek says 'spoke with me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: Then
  alternatives:
  - And
  lexicon: BDAG
  rationale: Rendered as 'Then' rather than a bare 'And' to convey narrative progression
    in natural English while preserving the connective force.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - came up
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is straightforwardly rendered 'came' in this narrative
    context.
- source_word: εἷς ἐκ τῶν ἑπτὰ ἀγγέλων
  chosen: one of the seven angels
  alternatives:
  - one from the seven angels
  lexicon: BDAG
  rationale: Idiomatic English for the partitive construction ἐκ + genitive.
- source_word: τῶν ἐχόντων τὰς ἑπτὰ φιάλας
  chosen: who had the seven bowls
  alternatives:
  - holding the seven bowls
  - who were having the seven bowls
  lexicon: BDAG
  rationale: The participial phrase identifies the angels by possession of the bowls.
    'Had' is smoother English than 'holding' here and fits the descriptive function.
- source_word: φιάλας
  chosen: bowls
  alternatives:
  - bowls
  - vials
  lexicon: BDAG
  rationale: '''Bowls'' reflects the likely shape and function of φιάλη in Revelation
    better than the traditional but misleading ''vials'' in modern English.'
- source_word: τῶν γεμόντων τῶν ἑπτὰ πληγῶν τῶν ἐσχάτων
  chosen: full of the seven last plagues
  alternatives:
  - filled with the seven final plagues
  - full of the seven final afflictions
  lexicon: BDAG
  rationale: γεμόντων means 'being full of.' 'Last' is chosen for ἐσχάτων as the most
    natural apocalyptic/sequential rendering in English; 'plagues' is the standard
    rendering of πληγαί in Revelation.
- source_word: ἐλάλησεν μετ’ ἐμοῦ
  chosen: spoke with me
  alternatives:
  - spoke to me
  lexicon: BDAG
  rationale: The preposition μετά with genitive is most naturally 'with me,' preserving
    the Greek wording rather than flattening it to 'to me,' though the latter is possible
    in context.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains the participial linkage in readable English.
- source_word: Δεῦρο
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: A concise imperative invitation. 'Come here' is possible but unnecessary
    in English.
- source_word: δείξω σοι
  chosen: I will show you
  alternatives:
  - let me show you
  lexicon: BDAG
  rationale: Future indicative is best represented directly as 'I will show you.'
- source_word: τὴν νύμφην
  chosen: the bride
  lexicon: BDAG
  rationale: Standard and precise rendering of νύμφη.
- source_word: τὴν γυναῖκα τοῦ ἀρνίου
  chosen: the wife of the Lamb
  alternatives:
  - the woman of the Lamb
  lexicon: BDAG
  rationale: γυνή here, in apposition to 'the bride,' clearly means 'wife' rather
    than the more general 'woman.' τοῦ ἀρνίου is rendered 'of the Lamb,' preserving
    Revelation's christological title.
- source_word: ἀρνίου
  chosen: the Lamb
  lexicon: BDAG
  rationale: Established Johannine/Revelation title for Jesus; translated as a title
    rather than transliterated, in keeping with the project's philosophy.
