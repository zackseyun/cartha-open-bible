theological_decisions:
- issue: Relationship between νύμφην and γυναῖκα
  chosen_reading: 'Render both terms explicitly: ''the bride, the wife of the Lamb'''
  alternative_readings:
  - the bride, the woman of the Lamb
  - the bride-wife of the Lamb
  rationale: The Greek uses two appositional nouns, and preserving both maintains
    the imagery without collapsing the metaphor. 'Wife' best captures γυναῖκα in this
    marital context and avoids weakening the covenantal nuptial imagery.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of ἀρνίον as a christological title
  chosen_reading: the Lamb
  rationale: This is a title for Jesus in Revelation and should be translated for
    meaning. The verse itself does not require importing further doctrinal explanation
    beyond the title already present in the text.
  doctrine_reference: Translation philosophy §2; Affirmations (Nicene/Chalcedonian
    bounds)
