theological_decisions:
- issue: Nature of the city's roadway imagery in πλατεῖα
  chosen_reading: Rendered as a singular 'street' of the city, preserving the visionary
    description without over-specifying urban layout.
  alternative_readings:
  - square of the city
  - broad street of the city
  rationale: This is primarily a lexical and imagery decision rather than a doctrinal
    one. The verse depicts the splendor of the New Jerusalem; the translation should
    preserve the image without forcing a modern urban-planning concept. 'Street' is
    sufficiently broad and idiomatic.
  doctrine_reference: Translation philosophy §1, §6
