id: REV.21.21
reference: Revelation 21:21
source:
  edition: SBLGNT
  text: καὶ οἱ δώδεκα πυλῶνες δώδεκα μαργαρῖται, ἀνὰ εἷς ἕκαστος τῶν πυλώνων ἦν ἐξ
    ἑνὸς μαργαρίτου· καὶ ἡ πλατεῖα τῆς πόλεως χρυσίον καθαρὸν ὡς ὕαλος διαυγής.
translation:
  text: And the twelve gates were twelve pearls; each one of the gates was made from
    a single pearl. And the street of the city was pure gold, like transparent glass.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the broad street of the city' or 'the square of the city' for πλατεῖα.
    reason: lexical_alternative
lexical_decisions:
- source_word: πυλῶνες
  chosen: gates
  alternatives:
  - gateways
  lexicon: BDAG
  rationale: In this context of the New Jerusalem's architecture, πυλών refers to
    gates/gate-structures. 'Gates' is the natural and established English equivalent
    and fits the imagery without unnecessary technicality.
- source_word: μαργαρῖται / μαργαρίτου
  chosen: pearls / pearl
  lexicon: BDAG
  rationale: μαργαρίτης straightforwardly denotes 'pearl.' The plural then singular
    construction is preserved to reflect that the twelve gates correspond to twelve
    pearls, each gate being from one pearl.
- source_word: ἀνὰ εἷς ἕκαστος
  chosen: each one
  alternatives:
  - one each
  - each individually
  lexicon: BDAG
  rationale: The distributive force of ἀνά with εἷς, reinforced by ἕκαστος, indicates
    one apiece. 'Each one' preserves the emphasis in idiomatic English.
- source_word: ἐξ ἑνὸς μαργαρίτου
  chosen: was made from a single pearl
  alternatives:
  - was out of one pearl
  - consisted of one pearl
  lexicon: BDAG
  rationale: ἐκ/ἐξ marks material or source. 'Was made from' is clear modern English,
    and 'single pearl' preserves the emphasis of ἑνός better than simply 'one pearl'
    in this descriptive context.
- source_word: πλατεῖα
  chosen: street
  alternatives:
  - broad street
  - main street
  - square
  lexicon: BDAG
  rationale: πλατεῖα can denote a broad street or open public way. Here the singular
    feature within the city is best rendered 'street' for readability, while the grandeur
    is already conveyed by the surrounding imagery. 'Square' would suggest a plaza
    rather than a roadway, and 'broad street' is possible but less natural in English
    style here.
- source_word: χρυσίον καθαρὸν
  chosen: pure gold
  alternatives:
  - refined gold
  - clean gold
  lexicon: BDAG
  rationale: χρυσίον is 'gold' and καθαρός here describes purity. 'Pure gold' is the
    standard and most natural rendering.
- source_word: ὡς ὕαλος διαυγής
  chosen: like transparent glass
  alternatives:
  - like clear glass
  - like translucent glass
  lexicon: BDAG
  rationale: ὕαλος means 'glass,' and διαυγής conveys clarity/transparency. 'Transparent
    glass' best preserves the striking apocalyptic image of gold with glass-like clarity.
    'Clear glass' is also possible, but 'transparent' more directly reflects διαυγής.
