id: REV.18.18
reference: Revelation 18:18
source:
  edition: SBLGNT
  text: καὶ ⸀ἔκραξαν βλέποντες τὸν καπνὸν τῆς πυρώσεως αὐτῆς λέγοντες· Τίς ὁμοία τῇ πόλει τῇ μεγάλῃ;
translation:
  text: And they cried out as they saw the smoke of her burning[a], saying, “What city is like the great city?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “What was like the great city?” The Greek is elliptical; “city” is supplied in English to make the comparison explicit.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκραξαν
  chosen: they cried out
  alternatives:
  - they shouted
  - they cried
  lexicon: BDAG
  rationale: Aorist indicative of κράζω denotes a loud cry or shout. 'Cried out' preserves the force without sounding overly colloquial.
- source_word: βλέποντες
  chosen: as they saw
  alternatives:
  - seeing
  - when they saw
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verb. 'As they saw' gives natural English while preserving the temporal sense.
- source_word: καπνὸν
  chosen: the smoke
  lexicon: BDAG
  rationale: Direct and standard rendering of καπνός.
- source_word: πυρώσεως
  chosen: burning
  alternatives:
  - burning up
  - fire
  - consuming fire
  lexicon: BDAG
  rationale: πύρωσις refers to burning or the state/process of being burned. 'Burning' fits the genitive construction 'the smoke of her burning' and is more precise than simply 'fire'.
- source_word: αὐτῆς
  chosen: her
  alternatives:
  - it
  lexicon: BDAG
  rationale: The referent is the city, grammatically feminine in Greek and personified throughout the passage. 'Her' preserves the personification.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Standard participial introduction to direct speech; concise and natural in English.
- source_word: Τίς ὁμοία τῇ πόλει τῇ μεγάλῃ;
  chosen: What city was like the great city?
  alternatives:
  - Who was like the great city?
  - What was like the great city?
  lexicon: BDAG
  rationale: Although τίς can mean 'who?' or 'what?', the dative phrase 'to the city' and the idiom call for an elliptical English expression supplied as 'What city.' The imperfect/copular sense is naturally supplied in English as 'was like.' This preserves the lament's rhetorical comparison.
- source_word: τῇ πόλει τῇ μεγάλῃ
  chosen: the great city
  alternatives:
  - that great city
  lexicon: BDAG
  rationale: The article-adjective construction identifies the well-known referent in context. 'The great city' is direct and idiomatic; 'that great city' is possible but less necessary here.
