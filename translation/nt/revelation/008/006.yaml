id: REV.8.6
reference: Revelation 8:6
source:
  edition: SBLGNT
  text: Καὶ οἱ ἑπτὰ ἄγγελοι οἱ ἔχοντες τὰς ἑπτὰ σάλπιγγας ἡτοίμασαν ⸀αὑτοὺς ἵνα σαλπίσωσιν.
translation:
  text: And the seven angels who had the seven trumpets prepared themselves to sound them[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'might blow the trumpets.' The Greek verb means 'to sound a trumpet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελοι
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In Revelation, ἄγγελος overwhelmingly refers to heavenly beings unless context clearly indicates human messengers. Here the apocalyptic scene and possession of the seven trumpets favor 'angels'.
- source_word: ἔχοντες
  chosen: who had
  alternatives:
  - having
  lexicon: BDAG
  rationale: The present participle is rendered with a relative clause for natural English. 'Who had' conveys their possession of the trumpets in the narrative setting without awkwardness.
- source_word: σάλπιγγας
  chosen: trumpets
  alternatives:
  - bugles
  lexicon: BDAG
  rationale: σάλπιγξ is the standard term for 'trumpet.' 'Trumpets' preserves the established apocalyptic and cultic resonance of the imagery.
- source_word: ἡτοίμασαν αὑτοὺς
  chosen: prepared themselves
  alternatives:
  - made themselves ready
  - got ready
  lexicon: BDAG
  rationale: The aorist verb with reflexive pronoun explicitly indicates self-preparation. 'Prepared themselves' is both accurate and suitably formal for the scene.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - to
  lexicon: BDAG
  rationale: ἵνα introduces purpose. 'So that' expresses purpose clearly in contemporary English while preserving the clause structure.
- source_word: σαλπίσωσιν
  chosen: they might sound them
  alternatives:
  - they might blow
  - they might trumpet
  lexicon: BDAG
  rationale: The verb means to sound a trumpet. Because English normally requires an object for clarity here, 'them' is supplied from the immediate context ('the seven trumpets'). 'Sound them' is more idiomatic and precise than 'trumpet' and slightly more formal than 'blow'.
