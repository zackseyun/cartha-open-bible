id: 1TI.4.2
reference: 1 Timothy 4:2
source:
  edition: SBLGNT
  text: ἐν ὑποκρίσει ψευδολόγων, κεκαυστηριασμένων τὴν ἰδίαν συνείδησιν,
translation:
  text: through the hypocrisy of liars whose own conscience has been seared,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'branded in their own conscience' or 'cauterized in their own conscience.' The Greek image may suggest a conscience marked or rendered insensitive.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν
  chosen: through
  alternatives:
  - in
  - by
  lexicon: BDAG
  rationale: Although ἐν is formally 'in,' in this construction it expresses means or instrumentality in relation to the preceding clause ('through/by means of'). 'Through' is idiomatic in English and preserves the causal-instrumental sense.
- source_word: ὑποκρίσει
  chosen: hypocrisy
  alternatives:
  - pretense
  - insincerity
  lexicon: BDAG
  rationale: ὑπόκρισις denotes hypocrisy or pretended virtue. 'Hypocrisy' is the most direct and standard rendering, fitting the moral-religious context.
- source_word: ψευδολόγων
  chosen: of liars
  alternatives:
  - of false speakers
  - of those who speak lies
  lexicon: BDAG
  rationale: 'The genitive plural is best taken with ὑποκρίσει: ''the hypocrisy of liars.'' ''Liars'' is concise, natural English and captures the sense of people characterized by falsehood.'
- source_word: κεκαυστηριασμένων
  chosen: whose own conscience has been seared
  alternatives:
  - having been branded in their own conscience
  - having had their own conscience cauterized
  lexicon: BDAG
  rationale: The perfect passive participle from καυστηριάζω evokes cauterizing/searing, likely metaphorically indicating moral insensibility. English 'seared' is idiomatic and preserves the image. The participle is rendered as a relative clause for natural English while retaining the resulting state implied by the perfect.
- source_word: τὴν ἰδίαν συνείδησιν
  chosen: their own conscience
  alternatives:
  - their own consciences
  lexicon: BDAG
  rationale: 'συνείδησις is singular in Greek, and English can naturally use singular collective/distributive sense here: ''their own conscience.'' The possessive force of ἰδίαν is preserved with ''own.'''
