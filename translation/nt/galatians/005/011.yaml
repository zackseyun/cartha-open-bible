id: GAL.5.11
reference: Galatians 5:11
source:
  edition: SBLGNT
  text: ἐγὼ δέ, ἀδελφοί, εἰ περιτομὴν ἔτι κηρύσσω, τί ἔτι διώκομαι; ἄρα κατήργηται τὸ σκάνδαλον τοῦ σταυροῦ.
translation:
  text: But I[a], brothers, if I am still preaching circumcision[b], why am I still being persecuted? Then the offense of the cross has been removed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers' can address a mixed group.
    reason: lexical_alternative
  - marker: b
    text: Or 'the stumbling block of the cross.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: 'Vocative plural of ἀδελφός. Per doctrine, gender-accurate over gender-neutral: retain the masculine form ''brothers'' while recognizing the mixed audience context. Inclusivity can be noted in a footnote rather than flattening the source term in the main text.'
- source_word: περιτομήν
  chosen: circumcision
  lexicon: BDAG
  rationale: Standard rendering of περιτομή. In Galatians this refers not merely to the physical act but to the requirement/practice as a marker of Torah observance; 'circumcision' is still the most direct and auditable English equivalent.
- source_word: ἔτι
  chosen: still
  alternatives:
  - yet
  lexicon: BDAG
  rationale: Used twice in the verse with temporal/logical force. 'Still' fits natural English in both clauses and preserves Paul's argument that if his message had not changed, the present persecution would be inexplicable.
- source_word: κηρύσσω
  chosen: am still preaching
  alternatives:
  - proclaim
  - announce
  lexicon: BDAG
  rationale: Present indicative with ongoing sense. 'Preaching' is idiomatic in Pauline context and preserves the public heralding force of κηρύσσω.
- source_word: διώκομαι
  chosen: am still being persecuted
  alternatives:
  - am pursued
  - am harassed
  lexicon: BDAG
  rationale: Present passive indicative. In Pauline usage διώκω commonly denotes persecution, especially for the gospel. 'Being persecuted' makes the passive and hostile religious opposition explicit.
- source_word: ἄρα
  chosen: In that case
  alternatives:
  - then
  - so then
  lexicon: BDAG
  rationale: Inferential particle drawing the conclusion of the hypothetical statement. 'In that case' clearly conveys the logic in contemporary English.
- source_word: κατήργηται
  chosen: has been removed
  alternatives:
  - has been abolished
  - has been nullified
  lexicon: BDAG
  rationale: Perfect passive indicative of καταργέω, indicating a resulting state. Here the sense is that the stumbling/offensive force would be rendered inoperative if Paul preached circumcision. 'Has been removed' is clear modern English; alternatives are possible but can sound overly technical or absolute.
- source_word: σκάνδαλον
  chosen: offense
  alternatives:
  - stumbling block
  - scandal
  lexicon: BDAG
  rationale: σκάνδαλον can denote either a cause of stumbling or an offense that provokes rejection. In this context the cross is what offends those insisting on circumcision. 'Offense' best captures the social-theological provocation in idiomatic English, while 'stumbling block' is preserved in a footnote as a viable alternative.
- source_word: σταυροῦ
  chosen: cross
  lexicon: BDAG
  rationale: Standard rendering of σταυρός in Pauline theological usage. 'Cross' preserves the central redemptive symbol without importing additional interpretation.
