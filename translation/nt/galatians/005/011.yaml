theological_decisions:
- issue: Rendering ἀδελφοί in a mixed-audience epistolary address
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the doctrine's gender-accurate principle, the masculine vocative is retained in the main text rather than neutralized. Because modern readers may hear 'brothers' as male-only, an explanatory footnote preserves the representative force without altering the source-facing translation.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sense of σκάνδαλον τοῦ σταυροῦ
  chosen_reading: the offense of the cross
  alternative_readings:
  - the stumbling block of the cross
  rationale: The phrase refers to the cross as the element that provokes rejection and opposition, especially if circumcision is not preached. 'Offense' communicates this clearly in modern English while preserving the theological tension that the cross remains inherently scandalous. The more literal 'stumbling block' is preserved in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
