theological_decisions:
- issue: Whether to make explicit that these are Jewish or religious calendar observances
  chosen_reading: Keep the temporal terms in the main text without adding 'special,' 'sacred,' or 'festival' language.
  alternative_readings:
  - You are observing special days and months and seasons and years.
  - You are observing religious days, months, seasons, and years.
  rationale: Paul's wording itself lists time units without modifiers. The context in Galatians indicates ritual/calendar observance, but the translation should not import more specificity than the Greek explicitly states. The nuance can be noted in a footnote rather than elevated into the main text.
