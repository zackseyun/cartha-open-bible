theological_decisions:
- issue: Paul's compressed argument in the first clause
  chosen_reading: Rendered the clause as referring to a mediator involving more than one party, without specifying more of Paul's argument than the Greek states.
  alternative_readings:
  - A mediator is not of one.
  - A mediator does not act on behalf of one alone.
  - A mediator is not for one person alone.
  rationale: Galatians 3:20 is famously difficult. The translation should preserve the tension rather than resolve the verse into a full interpretive paraphrase about covenant theology, Moses, Christ, or the law. "One party alone" offers the clearest minimal-expansion reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
