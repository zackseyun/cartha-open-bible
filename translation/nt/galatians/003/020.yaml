id: GAL.3.20
reference: Galatians 3:20
source:
  edition: SBLGNT
  text: ὁ δὲ μεσίτης ἑνὸς οὐκ ἔστιν, ὁ δὲ θεὸς εἷς ἐστιν.
translation:
  text: Now a mediator is not of one[b][a], but God is one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “a mediator is not of one”; the sense may be “does not act for one alone” or “is not for one party alone.”
    reason: alternative_reading
  - marker: b
    text: “God is one” likely echoes Israel’s confession of monotheism; compare Deuteronomy 6:4.
    reason: cross_reference
lexical_decisions:
- source_word: μεσίτης
  chosen: mediator
  alternatives:
  - go-between
  - intermediary
  lexicon: BDAG
  rationale: '"Mediator" is the standard and most precise English equivalent for one who stands between parties to arrange or ratify an agreement. It preserves Paul''s covenantal/legal sense without unnecessary paraphrase.'
- source_word: ἑνὸς
  chosen: one party alone
  alternatives:
  - one
  - one person
  - one side
  lexicon: BDAG
  rationale: The genitive "of one" is terse and ambiguous in Greek. "One party alone" makes explicit the relational sense most likely implied by "mediator" while preserving the logic that mediation ordinarily involves more than one side.
- source_word: οὐκ ἔστιν
  chosen: is not
  alternatives:
  - does not belong to
  - does not concern
  lexicon: BDAG
  rationale: A direct rendering best preserves the compressed and somewhat enigmatic force of the clause. The added phrase "for one party alone" supplies only the minimum English clarification needed.
- source_word: δὲ
  chosen: now / but
  alternatives:
  - and
  - however
  lexicon: BDAG
  rationale: The first δέ is represented by "Now" to mark transition; the second by "but" to preserve the contrast between the mediator statement and the affirmation about God.
- source_word: θεὸς εἷς ἐστιν
  chosen: God is one
  alternatives:
  - God is one God
  lexicon: BDAG
  rationale: This is the most natural and direct rendering, preserving both the Greek word order's emphatic simplicity and the likely echo of biblical monotheistic confession.
