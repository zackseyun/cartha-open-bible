id: GAL.3.29
reference: Galatians 3:29
source:
  edition: SBLGNT
  text: εἰ δὲ ὑμεῖς Χριστοῦ, ἄρα τοῦ Ἀβραὰμ σπέρμα ἐστέ, ⸀κατ’ ἐπαγγελίαν κληρονόμοι.
translation:
  text: And if you are Messiah’s[a], then you are Abraham’s seed[b], heirs according to promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'offspring' or 'descendants'; Greek 'seed' is singular here and echoes Paul’s earlier wording in this chapter.
    reason: lexical_alternative
  - marker: b
    text: Or 'if you are Christ’s.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Χριστός is used as a title here, so the default doctrinal rendering 'Messiah' is followed rather than the more name-like 'Christ.' Because the Greek genitive expresses belonging, it is rendered idiomatically in English as 'belong to the Messiah' rather than the stiffer 'are Messiah’s.'
- source_word: σπέρμα
  chosen: seed
  alternatives:
  - offspring
  - descendants
  lexicon: BDAG
  rationale: The singular collective 'seed' is retained to preserve Paul’s wording and its connection to the earlier argument in Galatians 3 about Abraham’s 'seed.' Although 'offspring' is smoother modern English, it weakens that lexical link.
- source_word: κληρονόμοι
  chosen: heirs
  alternatives:
  - inheritors
  lexicon: BDAG
  rationale: '''Heirs'' is the natural and theologically established English equivalent for κληρονόμοι in covenantal and familial contexts.'
- source_word: κατ’ ἐπαγγελίαν
  chosen: according to promise
  alternatives:
  - in accordance with the promise
  - on the basis of promise
  lexicon: BDAG
  rationale: The prepositional phrase is rendered with a straightforward English equivalent that preserves the Greek sense without over-specifying whether Paul means basis, standard, or manner. The anarthrous 'promise' is kept without inserting 'the' in the main text.
- source_word: εἰ δὲ ὑμεῖς ... ἄρα
  chosen: And if ... then
  alternatives:
  - Now if ... then
  lexicon: BDAG
  rationale: This preserves the conditional logic and keeps δέ as a light connective. 'And if ... then' is clear, natural English and reflects Paul’s inference structure.
