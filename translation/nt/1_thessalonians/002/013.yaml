theological_decisions:
- issue: Referent of the relative pronoun ὃς
  chosen_reading: The relative clause refers to 'the word of God,' yielding 'which is also at work in you who believe.'
  alternative_readings:
  - 'The clause refers more directly to God: ''who is also at work in you who believe.'''
  rationale: Grammatically, ὃς agrees with the masculine singular λόγος and follows immediately after λόγον θεοῦ. While θεός is also masculine singular and semantically possible, the nearest and most natural antecedent is 'word,' and this fits Paul's emphasis on the effective operation of the proclaimed word in believers.
  doctrine_reference: Preserve theological tension rather than resolve it; choose the most natural reading and preserve the alternative in a footnote where worthwhile.
- issue: Force of 'word of God' in apostolic preaching
  chosen_reading: The phrase is rendered straightforwardly as a claim that the apostolic message is God's word, without expanding the claim beyond the verse.
  alternative_readings:
  - A looser rendering such as 'God's message'
  rationale: The text explicitly contrasts human word and God's word. Rendering λόγος as 'word' preserves the theological weight and rhetorical contrast without importing a broader doctrine of inspiration than the verse itself states.
  doctrine_reference: Original-language primacy over translation tradition; do not import doctrinal claims the text does not make.
