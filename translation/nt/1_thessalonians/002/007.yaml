id: 1TH.2.7
reference: 1 Thessalonians 2:7
source:
  edition: SBLGNT
  text: δυνάμενοι ἐν βάρει εἶναι ὡς Χριστοῦ ἀπόστολοι· ἀλλὰ ἐγενήθημεν ⸀ἤπιοι ἐν μέσῳ ὑμῶν, ὡς ⸀ἐὰν τροφὸς θάλπῃ τὰ ἑαυτῆς τέκνα·
translation:
  text: though we could have been a burden as apostles of the Messiah[a], yet we became gentle among you[c][b], as a nursing mother cherishes her own children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'could have asserted our authority' or 'could have made demands' as apostles of the Messiah. The Greek literally says 'could have been weighty.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''apostles of Christ.'''
    reason: alternative_reading
  - marker: c
    text: Or 'as a nurse' or 'as a wet nurse'; the image is of tender maternal care.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάμενοι
  chosen: though we could have
  alternatives:
  - being able to
  - although we were able to
  lexicon: BDAG
  rationale: Participial form gives concessive force in context with ἀλλά; English idiom is best expressed as 'though we could have.'
- source_word: ἐν βάρει εἶναι
  chosen: have been weighty
  alternatives:
  - assert our authority
  - make demands
  - be burdensome
  lexicon: BDAG
  rationale: Literally 'to be in weight.' The phrase likely refers to exercising apostolic weight or status rather than financial burden specifically. 'Weighty' preserves the metaphor and leaves the nuance broad; alternatives are interpretive and are preserved in a footnote.
- source_word: ὡς Χριστοῦ ἀπόστολοι
  chosen: as apostles of the Messiah
  alternatives:
  - as Christ's apostles
  - as apostles of Christ
  lexicon: BDAG
  rationale: Χριστοῦ is titular here, so per doctrine it is rendered 'Messiah' rather than 'Christ.' Genitive is rendered naturally as 'of the Messiah.'
- source_word: ἀλλὰ ἐγενήθημεν
  chosen: yet we became
  alternatives:
  - but we were
  - but we proved to be
  lexicon: BDAG
  rationale: γίνομαι commonly marks becoming or coming to be; 'became' preserves the verbal force better than a simple stative 'were.' 'Yet' fits the contrast with the preceding concessive clause.
- source_word: ἤπιοι
  chosen: gentle
  alternatives:
  - kind
  - mild
  lexicon: BDAG
  rationale: The adjective denotes gentleness or mildness. 'Gentle' is the most natural and contextually fitting English equivalent.
- source_word: ἐν μέσῳ ὑμῶν
  chosen: among you
  alternatives:
  - in your midst
  lexicon: BDAG
  rationale: Idiomatic rendering of the prepositional phrase; 'among you' is natural modern English while preserving the sense.
- source_word: ὡς ἐὰν τροφὸς
  chosen: as a nursing mother
  alternatives:
  - as a nurse
  - as a wet nurse
  lexicon: BDAG
  rationale: τροφός here refers to a woman who nurses and cares for children. 'Nursing mother' communicates the maternal image clearly in modern English; 'nurse' could sound clinical and 'wet nurse' is more specific than the context requires.
- source_word: θάλπῃ
  chosen: cherishes
  alternatives:
  - nurtures
  - warms
  - cares for tenderly
  lexicon: BDAG
  rationale: The verb literally involves warming, and by extension tender care. 'Cherishes' captures the affectionate nurturing sense in this simile.
- source_word: τὰ ἑαυτῆς τέκνα
  chosen: her own children
  alternatives:
  - her own little children
  lexicon: BDAG
  rationale: τέκνα is best rendered 'children'; ἑαυτῆς adds emphasis that they are her own.
