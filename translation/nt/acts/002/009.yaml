id: ACT.2.9
reference: Acts 2:9
source:
  edition: SBLGNT
  text: Πάρθοι καὶ Μῆδοι καὶ Ἐλαμῖται, καὶ οἱ κατοικοῦντες τὴν Μεσοποταμίαν, Ἰουδαίαν τε καὶ Καππαδοκίαν, Πόντον καὶ τὴν Ἀσίαν,
translation:
  text: Parthians and Medes and Elamites[a], and those living in Mesopotamia, Judea and Cappadocia, Pontus and Asia[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the Roman province of Asia in western Asia Minor, not the modern continent.
    reason: cultural_note
  - marker: b
    text: Or 'those dwelling in Mesopotamia ... and Judea and Cappadocia.' The phrase τε καί can be rendered more simply as 'and' or with a slight additive nuance.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάρθοι
  chosen: Parthians
  lexicon: BDAG
  rationale: Standard transliteration of the ethnonym/name of the people group; names are transliterated rather than translated.
- source_word: Μῆδοι
  chosen: Medes
  lexicon: BDAG
  rationale: Standard English ethnonym for the people from Media; preserves the list of peoples/regions.
- source_word: Ἐλαμῖται
  chosen: Elamites
  lexicon: BDAG
  rationale: Standard transliteration of the ethnonym referring to people from Elam.
- source_word: οἱ κατοικοῦντες
  chosen: those living in
  alternatives:
  - those dwelling in
  - the residents of
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring to inhabitants/residents. 'Those living in' is natural modern English while preserving the participial sense.
- source_word: τὴν Μεσοποταμίαν
  chosen: Mesopotamia
  lexicon: BDAG
  rationale: Standard geographical name in English; article not normally represented in English with proper place names.
- source_word: Ἰουδαίαν
  chosen: Judea
  alternatives:
  - Judaea
  lexicon: BDAG
  rationale: Standard modern English spelling of the region name. Retains the geographical sense rather than any broader ethnic/religious paraphrase.
- source_word: τε καὶ
  chosen: also and
  alternatives:
  - and
  - both ... and
  lexicon: BDAG
  rationale: The combination τε καί links items with a slight additive nuance. Rendering it as 'also and' preserves some of that connective force without overinterpreting the syntax.
- source_word: Καππαδοκίαν
  chosen: Cappadocia
  lexicon: BDAG
  rationale: Standard English form of the regional name.
- source_word: Πόντον
  chosen: Pontus
  lexicon: BDAG
  rationale: Standard English form of the regional name.
- source_word: τὴν Ἀσίαν
  chosen: Asia
  alternatives:
  - the province of Asia
  lexicon: BDAG
  rationale: In Acts this refers to the Roman province in Asia Minor, not the modern continent. The main text keeps the familiar proper name, with clarification preserved in a footnote.
