theological_decisions:
- issue: Rendering of Χριστοῦ in the baptismal formula
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project's default is to translate Χριστός as 'Messiah' where it functions
    as a title and retain 'Christ' where it is name-like. In Acts 10:48 the phrase
    'in the name of Jesus Messiah' reads as titular and confessional, so the translated
    title is preferred while preserving the traditional alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
