id: ACT.10.48
reference: Acts 10:48
source:
  edition: SBLGNT
  text: προσέταξεν ⸀δὲ αὐτοὺς ⸂ἐν τῷ ὀνόματι Ἰησοῦ Χριστοῦ βαπτισθῆναι⸃. τότε ἠρώτησαν
    αὐτὸν ἐπιμεῖναι ἡμέρας τινάς.
translation:
  text: So he ordered them to be baptized in the name of Jesus Messiah. Then they
    asked him to remain for some days.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'Jesus Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: προσέταξεν
  chosen: ordered
  alternatives:
  - commanded
  - directed
  lexicon: BDAG
  rationale: Aorist active indicative of προστάσσω denotes giving an authoritative
    instruction. 'Ordered' is natural modern English and preserves the force better
    than the slightly more formal 'commanded.'
- source_word: δὲ
  chosen: So
  alternatives:
  - and
  - then
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'So'
    gives a smooth English transition from the preceding events and reflects the inferential
    flow.
- source_word: ἐν τῷ ὀνόματι
  chosen: in the name
  alternatives:
  - by the authority of
  - on the basis of
  lexicon: BDAG
  rationale: The idiom is well established in English biblical usage and can encompass
    authority, allegiance, and invocation. A more interpretive rendering like 'by
    the authority of' would narrow the phrase beyond what the Greek itself states.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ functions as a title here rather than a fixed surname-like element.
    Per project guidance, titles are translated where context supports it; 'Messiah'
    preserves the title's meaning.
- source_word: βαπτισθῆναι
  chosen: to be baptized
  alternatives:
  - to be immersed
  lexicon: BDAG
  rationale: The passive infinitive is best rendered straightforwardly as 'to be baptized.'
    Although immersion is historically associated with the term, 'baptized' is the
    standard and less interpretively restrictive English rendering.
- source_word: τότε
  chosen: Then
  alternatives:
  - at that time
  - after that
  lexicon: BDAG
  rationale: τότε marks the next event in sequence. 'Then' is concise and idiomatic.
- source_word: ἠρώτησαν
  chosen: asked
  alternatives:
  - requested
  - urged
  lexicon: BDAG
  rationale: The verb commonly means 'ask' or 'request.' 'Asked' fits the social context
    without overstating urgency.
- source_word: ἐπιμεῖναι
  chosen: to remain
  alternatives:
  - to stay
  - to continue with them
  lexicon: BDAG
  rationale: The infinitive of ἐπιμένω here refers to staying on for a time. 'Remain'
    is slightly more formal than 'stay' and fits Luke's narrative style while remaining
    clear.
- source_word: ἡμέρας τινάς
  chosen: for some days
  alternatives:
  - for a few days
  - for several days
  lexicon: BDAG
  rationale: The phrase is indefinite. 'For some days' is a close, natural rendering
    that preserves the nonspecific duration.
