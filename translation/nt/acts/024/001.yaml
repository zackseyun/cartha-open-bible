id: ACT.24.1
reference: Acts 24:1
source:
  edition: SBLGNT
  text: Μετὰ δὲ πέντε ἡμέρας κατέβη ὁ ἀρχιερεὺς Ἁνανίας μετὰ ⸂πρεσβυτέρων τινῶν⸃ καὶ ῥήτορος Τερτύλλου τινός, οἵτινες ἐνεφάνισαν τῷ ἡγεμόνι κατὰ τοῦ Παύλου.
translation:
  text: Now after five days[a], the high priest Ananias came down with some elders and a certain orator named Tertullus, and they brought charges against Paul before the governor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "an advocate named Tertullus"; the Greek word can refer to a public speaker or legal spokesman.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ πέντε ἡμέρας
  chosen: Now after five days
  alternatives:
  - After five days
  - Five days later
  lexicon: BDAG
  rationale: μετά with the accusative indicates time elapsed ('after'). δέ is rendered with a light connective ('Now') to preserve narrative progression without overtranslating.
- source_word: κατέβη
  chosen: came down
  alternatives:
  - went down
  - came
  lexicon: BDAG
  rationale: καταβαίνω literally means 'go/come down.' 'Came down' preserves the directional sense common in travel to Caesarea from Jerusalem and reads naturally in English.
- source_word: ὁ ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς in this context refers to the Jewish high priestly office, conventionally and accurately rendered 'high priest.'
- source_word: Ἁνανίας
  chosen: Ananias
  rationale: Personal name transliterated by standard English convention, per translation philosophy.
- source_word: μετὰ πρεσβυτέρων τινῶν
  chosen: with some elders
  alternatives:
  - with certain elders
  - with some of the elders
  lexicon: BDAG
  rationale: πρεσβύτεροι here are Jewish leaders/elders, not necessarily Christian church elders. τις is indefinite; 'some elders' is natural and sufficiently precise.
- source_word: ῥήτορος Τερτύλλου τινός
  chosen: a certain orator named Tertullus
  alternatives:
  - an advocate named Tertullus
  - a spokesman named Tertullus
  - a certain rhetorician, Tertullus
  lexicon: BDAG
  rationale: ῥήτωρ denotes a trained speaker, advocate, or orator in a legal/public setting. 'Orator' preserves the lexical sense and forensic context; 'named' clarifies the appositional relationship in idiomatic English. τις adds indefiniteness, reflected by 'a certain.'
- source_word: οἵτινες
  chosen: and they
  alternatives:
  - who
  - these men
  lexicon: BDAG
  rationale: οἵτινες introduces the action of the group just mentioned. 'And they' is smoother in English narrative while preserving the plural referent.
- source_word: ἐνεφάνισαν
  chosen: brought charges
  alternatives:
  - presented their case
  - laid information
  - made accusation
  lexicon: BDAG
  rationale: In legal context, ἐμφανίζω can mean to make known formally, inform against, or bring charges. 'Brought charges' best captures the judicial force in contemporary English.
- source_word: τῷ ἡγεμόνι
  chosen: before the governor
  alternatives:
  - to the governor
  lexicon: BDAG
  rationale: ἡγεμών refers to the Roman governor. Although the dative could be rendered 'to the governor,' English legal idiom prefers 'before the governor' with 'brought charges.'
- source_word: κατὰ τοῦ Παύλου
  chosen: against Paul
  alternatives:
  - concerning Paul
  lexicon: BDAG
  rationale: κατά with the genitive in judicial contexts means 'against.' This is the standard and contextually precise rendering.
