id: ACT.24.6
reference: Acts 24:6
source:
  edition: SBLGNT
  text: ὃς καὶ τὸ ἱερὸν ἐπείρασεν βεβηλῶσαι, ὃν καὶ ⸀ἐκρατήσαμεν,
translation:
  text: He even tried to defile the temple, and we seized him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add a longer reading here, including that they wanted to
      judge Paul according to their law and that Lysias the commander took him from
      their hands.
    reason: textual_variant
lexical_decisions:
- source_word: ὃς
  chosen: He
  alternatives:
  - who
  lexicon: BDAG
  rationale: The relative pronoun refers back to Paul in the accusation. English idiom
    prefers starting the clause with the resumptive pronoun 'He' rather than the more
    wooden 'who' when rendering this fragmentary forensic charge.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - and
  lexicon: BDAG
  rationale: 'In this accusatory context, καὶ heightens the charge: ''even tried to
    defile the temple.'' ''Even'' best conveys the emphatic force in natural English.'
- source_word: τὸ ἱερὸν
  chosen: the temple
  alternatives:
  - the sanctuary precincts
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν denotes the temple complex rather than the inner sanctuary specifically.
    'The temple' is the standard readable rendering in English; the broader precinct
    sense is not crucial enough to require expansion in the main text.
- source_word: ἐπείρασεν
  chosen: tried
  alternatives:
  - attempted
  - undertook
  lexicon: BDAG
  rationale: Aorist of πειράζω here means 'attempt, try.' 'Tried' is concise and idiomatic,
    pairing naturally with the infinitive βεβηλῶσαι.
- source_word: βεβηλῶσαι
  chosen: to defile
  alternatives:
  - to profane
  - to desecrate
  lexicon: BDAG
  rationale: βεβηλόω means to profane or make ritually unclean. 'Defile' is clear
    modern English and fits the temple-purity accusation; 'profane' is possible but
    slightly less accessible.
- source_word: ὃν
  chosen: him
  alternatives:
  - whom
  lexicon: BDAG
  rationale: The accusative relative pronoun resumes the object in the next clause.
    English idiom favors 'him' rather than the formal 'whom' in a modern translation.
- source_word: ἐκρατήσαμεν
  chosen: we seized
  alternatives:
  - we arrested
  - we took into custody
  lexicon: BDAG
  rationale: κρατέω here means to take hold of or seize. 'Seized' preserves the physical
    and hostile nuance of the accusation better than the more procedural 'arrested.'
