id: ACT.24.25
reference: Acts 24:25
source:
  edition: SBLGNT
  text: διαλεγομένου δὲ αὐτοῦ περὶ δικαιοσύνης καὶ ἐγκρατείας καὶ τοῦ κρίματος τοῦ
    ⸀μέλλοντος ἔμφοβος γενόμενος ὁ Φῆλιξ ἀπεκρίθη· Τὸ νῦν ἔχον πορεύου, καιρὸν δὲ
    μεταλαβὼν μετακαλέσομαί σε·
translation:
  text: But as he was discussing righteousness and self-control and the coming judgment,
    Felix became afraid and answered, “For the present, go away. When I get an opportunity,
    I will summon you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'justice' for 'righteousness' (δικαιοσύνη). The Greek term can carry
      both moral and judicial overtones.
    reason: lexical_alternative
  - marker: b
    text: Or 'the judgment to come.'
    reason: alternative_reading
lexical_decisions:
- source_word: διαλεγομένου
  chosen: was discussing
  alternatives:
  - was reasoning
  - was speaking
  lexicon: BDAG
  rationale: The present middle participle indicates ongoing discourse or reasoned
    conversation. 'Was discussing' is natural modern English and preserves the sense
    of sustained dialogue without overstating it as formal debate.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine defaults, δικαιοσύνη is rendered 'righteousness' in the
    main text, while 'justice' is preserved as a lexical alternative in a footnote-worthy
    note. In this context Paul is speaking of moral rectitude before God, though the
    semantic overlap with justice remains relevant.
- source_word: ἐγκρατείας
  chosen: self-control
  alternatives:
  - temperance
  lexicon: BDAG
  rationale: '''Self-control'' is the clearest contemporary rendering and fits the
    ethical triad Paul discusses. ''Temperance'' is traditional but narrower and somewhat
    archaic.'
- source_word: κρίματος τοῦ μέλλοντος
  chosen: the coming judgment
  alternatives:
  - the judgment to come
  - the future judgment
  lexicon: BDAG
  rationale: The genitive participial construction naturally means judgment that is
    about to come or lies ahead. 'The coming judgment' is idiomatic modern English
    and preserves the eschatological force.
- source_word: ἔμφοβος γενόμενος
  chosen: became afraid
  alternatives:
  - became terrified
  - became alarmed
  lexicon: BDAG
  rationale: The expression denotes entering a state of fear. 'Became afraid' is straightforward
    and avoids overstating the intensity, though fear strong enough to interrupt Paul
    is clearly implied.
- source_word: Τὸ νῦν ἔχον
  chosen: For now
  alternatives:
  - for the present
  - as things now stand
  lexicon: BDAG
  rationale: This idiom means 'for the time being' or 'at present.' 'For now' is concise,
    natural, and accurately captures Felix's postponement.
- source_word: πορεύου
  chosen: go away
  alternatives:
  - go
  - depart
  lexicon: BDAG
  rationale: The imperative dismisses Paul from the present audience. 'Go away' makes
    the dismissive force clearer in English than the bare 'go,' while remaining within
    the semantic range.
- source_word: καιρὸν ... μεταλαβὼν
  chosen: When I get an opportunity
  alternatives:
  - when I find a suitable time
  - when I have a convenient time
  lexicon: BDAG
  rationale: καιρός denotes a fitting or opportune time, and μεταλαβών here conveys
    obtaining or having such an occasion. 'When I get an opportunity' is idiomatic
    and preserves the sense of a future convenient moment.
- source_word: μετακαλέσομαί σε
  chosen: I will summon you
  alternatives:
  - I will call for you
  - I will send for you
  lexicon: BDAG
  rationale: The future middle indicates Felix will have Paul called back to him.
    'I will summon you' is clear and slightly more formal, fitting the judicial setting.
