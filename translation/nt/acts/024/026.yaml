id: ACT.24.26
reference: Acts 24:26
source:
  edition: SBLGNT
  text: ἅμα καὶ ἐλπίζων ὅτι χρήματα δοθήσεται αὐτῷ ὑπὸ τοῦ ⸀Παύλου· διὸ καὶ πυκνότερον
    αὐτὸν μεταπεμπόμενος ὡμίλει αὐτῷ.
translation:
  text: At the same time he was hoping that money would be given to him by Paul; therefore
    he also sent for him more often and talked with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more specifically in context, 'he was hoping for a bribe from Paul.'
      The Greek says simply 'money.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἅμα καὶ
  chosen: At the same time
  alternatives:
  - Meanwhile
  - At the same time also
  lexicon: BDAG
  rationale: The combination marks simultaneity with the preceding narrative. 'At
    the same time' is natural modern English and preserves the temporal nuance without
    awkwardly reproducing both particles.
- source_word: ἐλπίζων
  chosen: he was hoping
  alternatives:
  - hoping
  lexicon: BDAG
  rationale: The present participle describes Felix's ongoing expectation concurrent
    with his actions. Rendering it with an imperfect-like English form fits the narrative
    flow and links naturally to the main clause.
- source_word: χρήματα
  chosen: money
  alternatives:
  - a sum of money
  - bribe
  lexicon: BDAG
  rationale: The noun plainly means 'money.' Although the context implies a bribe,
    the Greek does not explicitly use a term meaning 'bribe,' so 'money' is the most
    textually restrained rendering.
- source_word: δοθήσεται αὐτῷ ὑπὸ τοῦ Παύλου
  chosen: would be given to him by Paul
  alternatives:
  - would be given him by Paul
  - would be paid to him by Paul
  lexicon: BDAG
  rationale: The future passive with ὑπό + genitive explicitly presents Paul as the
    expected source of the money. 'Would be given to him by Paul' preserves both the
    passive construction and the expectation conveyed after ὅτι.
- source_word: διὸ καὶ
  chosen: therefore he also
  alternatives:
  - for this reason also
  - so also
  lexicon: BDAG
  rationale: διό marks result or inference from Felix's hope for money. 'Therefore'
    preserves the causal connection; 'also' reflects καί.
- source_word: πυκνότερον
  chosen: more often
  alternatives:
  - more frequently
  lexicon: BDAG
  rationale: The comparative adverb indicates increased frequency. 'More often' is
    idiomatic and clear.
- source_word: μεταπεμπόμενος
  chosen: sent for him
  alternatives:
  - summoning him
  - having him brought
  lexicon: BDAG
  rationale: The middle participle commonly means to send for someone or summon them.
    'Sent for him' is natural English and suits the custodial setting.
- source_word: ὡμίλει αὐτῷ
  chosen: talked with him
  alternatives:
  - conversed with him
  - spoke with him
  lexicon: BDAG
  rationale: ὁμιλέω here denotes conversational interaction rather than formal speech.
    'Talked with him' captures the repeated, personal nature of the meetings in readable
    modern English.
