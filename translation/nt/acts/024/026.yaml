theological_decisions:
- issue: Whether to make Felix's corrupt motive explicit as 'bribe' in the main text
  chosen_reading: Keep the main text at 'money' and allow the implication to arise
    from context
  alternative_readings:
  - he was hoping that Paul would bribe him
  - he was hoping for a bribe from Paul
  rationale: The verse strongly implies corruption, but the Greek lexical item is
    χρήματα ('money'), not a more specific term for 'bribe.' Optimal equivalence here
    favors preserving the source wording while not obscuring the narrative implication.
  doctrine_reference: Translation philosophy §1, §6
