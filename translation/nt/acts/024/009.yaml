id: ACT.24.9
reference: Acts 24:9
source:
  edition: SBLGNT
  text: συνεπέθεντο δὲ καὶ οἱ Ἰουδαῖοι φάσκοντες ταῦτα οὕτως ἔχειν.
translation:
  text: And the Jews also joined in the charge, asserting that these things were so.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Jews also joined in, claiming that these things were so.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπέθεντο
  chosen: joined in the attack
  alternatives:
  - joined in
  - supported the charge
  - assailed together
  lexicon: BDAG
  rationale: The verb συνεπιτίθεμαι can mean to join in an attack or assault, whether
    physical or verbal. In this forensic context, the sense is that the Jewish accusers
    aligned themselves with Tertullus's accusations. 'Joined in the attack' preserves
    the adversarial force better than a weaker 'agreed,' while still fitting a courtroom
    setting.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - Then
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the narrative. 'And'
    is natural modern English and avoids overstating contrast.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - too
  lexicon: BDAG
  rationale: καί adds the Jews to the action already underway, namely the accusations
    presented by Tertullus. 'Also' clearly marks their participation.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish accusers
  - the Judeans
  lexicon: BDAG
  rationale: Ἰουδαῖοι is most straightforwardly rendered 'Jews' here, referring to
    the group present in the hearing. 'Judeans' is possible in some contexts, but
    here the emphasis is on the accusers as an identifiable Jewish group rather than
    geographic origin. The article is retained naturally in English.
- source_word: φάσκοντες
  chosen: asserting
  alternatives:
  - claiming
  - maintaining
  - alleging
  lexicon: BDAG
  rationale: The participle introduces the content of what they were saying in support
    of the charges. 'Asserting' fits the legal setting and is slightly firmer than
    'claiming' without adding unwarranted skepticism.
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - these charges
  - this
  lexicon: BDAG
  rationale: The demonstrative refers back to the accusations just made. 'These things'
    is formally close to the Greek and broad enough to include the full set of allegations.
    'These charges' is interpretive and possible, but the more literal wording is
    preferable.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: οὕτως with ἔχειν idiomatically means 'to be so' or 'to be the case.'
    'So' is the most natural concise rendering in English.
- source_word: ἔχειν
  chosen: were
  alternatives:
  - to be
  - to be the case
  lexicon: BDAG
  rationale: Within the idiom ταῦτα οὕτως ἔχειν, a more literal 'to have' would be
    misleading. English idiom requires 'were so' or 'were the case.' The finite 'were'
    is supplied to produce natural English from the participial construction.
