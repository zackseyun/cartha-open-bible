theological_decisions:
- issue: Rendering πρόνοια in a non-theological administrative context
  chosen_reading: foresight
  alternative_readings:
  - providence
  - prudence
  rationale: Although 'providence' is a possible lexical rendering, in English it
    often suggests divine governance. Here the speaker flatters a human ruler for
    his administrative planning, so 'foresight' avoids unintended theological import
    while remaining faithful to the Greek.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the
    text does not make; readable modern English.'
