theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  - Jesus the Messiah
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title rather than a name-like form. In this prepositional phrase
    the titular sense is still present, so 'Messiah Jesus' is preferred.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Understanding τῆς εἰς Χριστὸν Ἰησοῦν πίστεως
  chosen_reading: the faith in Messiah Jesus
  alternative_readings:
  - faith toward Messiah Jesus
  - the faithfulness of Messiah Jesus
  rationale: The construction with πίστις plus εἰς + accusative most naturally denotes
    faith directed toward Jesus. This is less ambiguous than genitival pistis constructions,
    so the main text uses 'faith in Messiah Jesus.' A lexical alternative is footnoted
    for transparency because πίστις can overlap with 'trust.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Contested terms table for πίστις'
