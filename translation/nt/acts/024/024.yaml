id: ACT.24.24
reference: Acts 24:24
source:
  edition: SBLGNT
  text: Μετὰ δὲ ἡμέρας τινὰς παραγενόμενος ὁ Φῆλιξ σὺν Δρουσίλλῃ τῇ ⸀ἰδίᾳ γυναικὶ
    οὔσῃ Ἰουδαίᾳ μετεπέμψατο τὸν Παῦλον καὶ ἤκουσεν αὐτοῦ περὶ τῆς εἰς Χριστὸν ⸀Ἰησοῦν
    πίστεως.
translation:
  text: Now after some days, Felix came with Drusilla, his own wife, who was Jewish,
    and sent for Paul and heard him concerning faith in Messiah Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title rather than merely a name.
    reason: alternative_reading
  - marker: b
    text: Or 'trust in Messiah Jesus.' The noun πίστις can also carry the sense of
      'trust,' though 'faith' is the default rendering.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ἡμέρας τινὰς
  chosen: Now after some days
  alternatives:
  - After some days
  - Several days later
  lexicon: BDAG
  rationale: μετά with the accusative plus ἡμέρας τινάς is a temporal expression meaning
    'after some days.' δέ is rendered with a light discourse marker ('Now') to preserve
    narrative flow without overtranslating.
- source_word: παραγενόμενος
  chosen: came
  alternatives:
  - arrived
  - appeared
  lexicon: BDAG
  rationale: The participle from παραγίνομαι here functions adverbially with Felix
    as subject, indicating his arrival/presence. 'Came' is natural English and fits
    the narrative sequence.
- source_word: σὺν Δρουσίλλῃ
  chosen: with Drusilla
  lexicon: BDAG
  rationale: σύν with the dative straightforwardly indicates accompaniment.
- source_word: τῇ ἰδίᾳ γυναικὶ
  chosen: his own wife
  alternatives:
  - his wife
  - his wife of his own
  lexicon: BDAG
  rationale: ἴδιος adds possessive/emphatic force beyond the article; 'his own wife'
    preserves that emphasis better than simply 'his wife,' while remaining idiomatic.
- source_word: οὔσῃ Ἰουδαίᾳ
  chosen: who was Jewish
  alternatives:
  - being a Jewess
  - who was a Jew
  lexicon: BDAG
  rationale: The participle plus adjective modifies Drusilla. 'Jewish' is readable
    modern English and avoids archaic 'Jewess' while accurately conveying ethnicity/religious
    identity.
- source_word: μετεπέμψατο
  chosen: sent for
  alternatives:
  - summoned
  - sent to call
  lexicon: BDAG
  rationale: μεταπέμπομαι commonly means to send for someone. 'Sent for' is idiomatic
    and fits the middle voice sense without sounding overly formal.
- source_word: ἤκουσεν αὐτοῦ
  chosen: heard him
  alternatives:
  - listened to him
  - heard from him
  lexicon: BDAG
  rationale: ἀκούω with the genitive can mean 'hear' or 'listen to.' 'Heard him' is
    concise and natural here, with the following περὶ phrase specifying the subject
    matter.
- source_word: περὶ τῆς ... πίστεως
  chosen: about the faith
  alternatives:
  - concerning the faith
  - about faith
  lexicon: BDAG
  rationale: περί with the genitive introduces the topic of Paul's speech. πίστις
    is rendered by the default 'faith' per doctrine guidance. The article supports
    a more definite expression, though the phrase remains somewhat idiomatic in English.
- source_word: εἰς Χριστὸν Ἰησοῦν
  chosen: in Messiah Jesus
  alternatives:
  - in Christ Jesus
  - in Jesus the Messiah
  lexicon: BDAG
  rationale: 'εἰς with πίστις commonly expresses faith directed toward someone: ''faith
    in.'' Χριστός is a title here, so per doctrine it is translated ''Messiah'' rather
    than transliterated ''Christ.'' ''Messiah Jesus'' preserves the Greek order and
    title force.'
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: πίστις defaults to 'faith' per DOCTRINE.md. In this construction the
    sense is most naturally the faith directed toward Messiah Jesus, not Christ's
    own faithfulness; the alternative is preserved in a footnote because πίστις can
    bear related nuances.
