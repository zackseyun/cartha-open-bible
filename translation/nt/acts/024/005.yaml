theological_decisions:
- issue: Rendering αἵρεσις in a hostile accusation
  chosen_reading: sect
  alternative_readings:
  - heresy
  - party
  - faction
  rationale: The term here is used by Tertullus as a legal-polemical label for the
    Christian movement. Rendering it 'heresy' would import later ecclesiastical categories
    not demanded by the first-century context. 'Sect' preserves the social-religious
    classification without doctrinal overreach.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
