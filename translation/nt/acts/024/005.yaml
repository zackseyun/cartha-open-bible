id: ACT.24.5
reference: Acts 24:5
source:
  edition: SBLGNT
  text: εὑρόντες γὰρ τὸν ἄνδρα τοῦτον λοιμὸν καὶ κινοῦντα ⸀στάσεις πᾶσι τοῖς Ἰουδαίοις
    τοῖς κατὰ τὴν οἰκουμένην πρωτοστάτην τε τῆς τῶν Ναζωραίων αἱρέσεως,
translation:
  text: For we have found this man to be a plague, stirring up riots among all the
    Jews throughout the inhabited world, and also a ringleader of the sect of the
    Nazarenes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'throughout the world'; the Greek οἰκουμένη can refer to the inhabited
      world, often the Roman world in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'party' or 'faction'; the Greek αἵρεσις here means a sectarian group,
      not necessarily 'heresy' in the later technical sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρόντες
  chosen: we have found
  alternatives:
  - having found
  - we found
  lexicon: BDAG
  rationale: Aorist participle in accusatory rhetoric is naturally rendered as a finite
    verb in English. 'We have found' fits the forensic present relevance of the charge
    better than the more wooden 'having found.'
- source_word: λοιμὸν
  chosen: a plague
  alternatives:
  - a pest
  - a pestilent fellow
  lexicon: BDAG
  rationale: Used metaphorically as a term of abuse for a public menace. 'A plague'
    is vivid, current English and preserves the force better than archaic 'pestilent
    fellow.'
- source_word: κινοῦντα
  chosen: stirring up
  alternatives:
  - inciting
  - causing
  lexicon: BDAG
  rationale: Present participle indicates ongoing activity. 'Stirring up' idiomatically
    matches the sense of provoking unrest.
- source_word: στάσεις
  chosen: riots
  alternatives:
  - disturbances
  - insurrections
  - dissensions
  lexicon: BDAG
  rationale: In this legal accusation context, the word denotes civil unrest or sedition-like
    disturbances. 'Riots' best captures the public-disorder sense in accessible English.
- source_word: πᾶσι τοῖς Ἰουδαίοις
  chosen: among all the Jews
  alternatives:
  - for all the Jews
  - to all the Jews
  lexicon: BDAG
  rationale: The dative is best taken in relation to the sphere/affected group of
    the unrest rather than strict indirect object. 'Among all the Jews' communicates
    that the disturbances occur within Jewish communities.
- source_word: κατὰ τὴν οἰκουμένην
  chosen: throughout the inhabited world
  alternatives:
  - throughout the world
  - throughout the Roman world
  lexicon: BDAG
  rationale: οἰκουμένη commonly refers to the inhabited world, often the Roman imperial
    world. The fuller phrase preserves the Greek term's scope without over-specifying
    'Roman' in the main text.
- source_word: πρωτοστάτην
  chosen: a ringleader
  alternatives:
  - a leader
  - a chief spokesman
  - a champion
  lexicon: BDAG
  rationale: In hostile legal speech, the term carries a pejorative sense of one who
    stands at the front of a movement. 'Ringleader' reflects that accusatory tone.
- source_word: αἱρέσεως
  chosen: sect
  alternatives:
  - party
  - faction
  - heresy
  lexicon: BDAG
  rationale: In first-century usage the term can denote a party or sect without necessarily
    carrying the later technical sense 'heresy.' 'Sect' is historically and lexically
    appropriate here.
- source_word: Ναζωραίων
  chosen: the Nazarenes
  alternatives:
  - the Nazarene sect
  - the followers of Jesus the Nazarene
  lexicon: BDAG
  rationale: A group designation used by opponents. 'Nazarenes' preserves the label
    directly and transparently.
- source_word: τε
  chosen: and also
  alternatives:
  - and
  - also
  lexicon: BDAG
  rationale: τε links this accusation with the previous one, adding another charge.
    'And also' brings out the additive force in natural English.
