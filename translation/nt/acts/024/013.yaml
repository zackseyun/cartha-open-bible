id: ACT.24.13
reference: Acts 24:13
source:
  edition: SBLGNT
  text: ⸀οὐδὲ ⸀παραστῆσαι δύνανταί ⸀σοι περὶ ὧν ⸀νυνὶ κατηγοροῦσίν μου.
translation:
  text: Nor can they prove to you the things of which they are now accusing me[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'present to you' or 'demonstrate to you'; the Greek verb can mean to present or establish something, here in the sense of substantiating a legal charge.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  chosen: Nor
  alternatives:
  - And not
  - Neither
  lexicon: BDAG
  rationale: Connective negative continuing Paul's defense from the previous verse. 'Nor' is natural English at the start of a sentence and preserves the adversative/continuative force better than the more wooden 'Neither'.
- source_word: παραστῆσαι
  chosen: prove
  alternatives:
  - present
  - demonstrate
  - establish
  lexicon: BDAG
  rationale: Although the verb literally can mean 'present' or 'bring forward,' in this legal context with an infinitive after δύνανται and with the object being the charges, the sense is to substantiate or prove the accusation before the judge. 'Prove' communicates the courtroom force clearly in modern English.
- source_word: δύνανταί
  chosen: can
  alternatives:
  - are able to
  lexicon: BDAG
  rationale: Simple modal of ability. 'Can' is idiomatic modern English and sufficiently precise.
- source_word: σοι
  chosen: to you
  alternatives:
  - before you
  lexicon: BDAG
  rationale: Dative pronoun addressed to Felix. 'To you' is the most direct rendering; the legal setting already implies the audience is the judge. 'Before you' is possible but slightly more interpretive.
- source_word: περὶ ὧν
  chosen: the things about which
  alternatives:
  - what
  - the charges concerning which
  lexicon: BDAG
  rationale: This relative construction refers to the matters of accusation. 'The things about which' preserves the formal linkage without over-specifying beyond the Greek. A more compressed 'what' is possible but less explicit.
- source_word: νυνὶ
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: Temporal adverb marking the present legal accusation. 'Now' is concise and natural.
- source_word: κατηγοροῦσίν μου
  chosen: they are now accusing me
  alternatives:
  - they accuse me
  - they bring charges against me
  lexicon: BDAG
  rationale: The verb means 'accuse' in a legal sense, with μου as the object ('me'). The present tense is well represented by 'are ... accusing.' 'Bring charges against me' is a valid legal paraphrase, but 'accusing me' stays closer to the Greek while remaining clear.
