id: ACT.24.22
reference: Acts 24:22
source:
  edition: SBLGNT
  text: ⸂Ἀνεβάλετο δὲ αὐτοὺς ὁ Φῆλιξ⸃, ἀκριβέστερον εἰδὼς τὰ περὶ τῆς ὁδοῦ, ⸀εἴπας·
    Ὅταν Λυσίας ὁ χιλίαρχος καταβῇ διαγνώσομαι τὰ καθ’ ὑμᾶς·
translation:
  text: But Felix, having a more accurate knowledge concerning the Way, put them off,
    saying, “When Lysias the commander comes down, I will decide your case.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “postponed the proceedings”; the Greek verb can mean to defer or adjourn
      judicial action.
    reason: lexical_alternative
  - marker: b
    text: “The Way” was an early designation for the Christian movement.
    reason: cultural_note
  - marker: c
    text: Or “I will determine the matters concerning you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνεβάλετο
  chosen: put them off
  alternatives:
  - postponed the matter
  - adjourned them/the proceedings
  lexicon: BDAG
  rationale: The middle of ἀναβάλλομαι here means to defer or postpone judicial action.
    'Put them off' captures the personal object αὐτούς and the sense of delaying a
    decision; 'adjourned the proceedings' is possible but slightly more interpretive
    since 'proceedings' is not explicit.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - the case
  - the proceedings
  lexicon: BDAG
  rationale: The pronoun is masculine plural and most directly refers to the parties
    before Felix, not explicitly to the case itself. English idiom allows 'put them
    off' in context, while the judicial sense is clarified by the following speech.
- source_word: ἀκριβέστερον εἰδὼς
  chosen: having a more accurate knowledge
  alternatives:
  - being better informed
  - knowing more accurately
  lexicon: BDAG
  rationale: This participial phrase explains Felix's reason for delaying. 'Having
    a more accurate knowledge' preserves the comparative force of ἀκριβέστερον and
    the cognitive sense of εἰδώς. 'Being better informed' is smoother but slightly
    more dynamic.
- source_word: τὰ περὶ τῆς ὁδοῦ
  chosen: about the Way
  alternatives:
  - concerning the Way
  - about this Way
  lexicon: BDAG
  rationale: In Acts, ἡ ὁδός functions as a designation for the Christian movement.
    Capitalizing 'Way' signals this semi-technical usage without over-paraphrasing.
    'This Way' lacks support here because οὗτος is absent.
- source_word: εἴπας
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered with an English participial
    connection to the main verb. 'Saying' is concise and idiomatic.
- source_word: Ὅταν ... καταβῇ
  chosen: When ... comes down
  alternatives:
  - whenever ... comes down
  lexicon: BDAG
  rationale: Ὅταν with the aorist subjunctive marks a future contingency. In this
    context Felix refers to a specific anticipated arrival, so 'when' is preferable
    to the more general 'whenever.' 'Comes down' preserves καταβῇ literally, fitting
    travel from Jerusalem/Caesarea in ancient geographic idiom.
- source_word: χιλίαρχος
  chosen: the commander
  alternatives:
  - the tribune
  - the chiliarch
  - the commander of a thousand
  lexicon: BDAG
  rationale: χιλίαρχος denotes a Roman military commander, commonly a tribune. 'Commander'
    is clear modern English and avoids unexplained transliteration; 'tribune' is historically
    precise but less accessible.
- source_word: διαγνώσομαι
  chosen: I will decide
  alternatives:
  - I will determine
  - I will examine thoroughly and decide
  lexicon: BDAG
  rationale: The verb means to decide or determine after consideration, especially
    in a legal setting. 'I will decide' is natural English and fits the judicial context.
- source_word: τὰ καθ’ ὑμᾶς
  chosen: your case
  alternatives:
  - the matters concerning you
  - the things about you
  lexicon: BDAG
  rationale: The idiom refers to the matters pertaining to the accused. 'Your case'
    communicates the legal setting clearly in idiomatic English; the more literal
    alternatives are preserved as possible glosses.
