id: ACT.24.18
reference: Acts 24:18
source:
  edition: SBLGNT
  text: ἐν ⸀αἷς εὗρόν με ἡγνισμένον ἐν τῷ ἱερῷ, οὐ μετὰ ὄχλου οὐδὲ μετὰ θορύβου,
translation:
  text: In these circumstances they found me purified in the temple, not with a crowd
    nor with an uproar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'During which they found me purified in the temple.' The Greek relative
      phrase ἐν αἷς may be rendered more formally as 'in which.'
    reason: lexical_alternative
  - marker: b
    text: '''Purified'' refers to ritual or ceremonial purification.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐν αἷς
  chosen: In these circumstances
  alternatives:
  - In which
  - During which
  lexicon: BDAG
  rationale: The feminine plural relative pronoun refers back to the preceding matters/events.
    A strictly formal 'in which' is possible, but 'In these circumstances' makes the
    anaphoric sense clear in natural English without over-paraphrasing.
- source_word: εὗρόν με
  chosen: they found me
  alternatives:
  - they discovered me
  lexicon: BDAG
  rationale: 'Standard narrative sense of εὑρίσκω in context: Paul''s accusers encountered
    him in the temple. ''Found'' is idiomatic and sufficiently formal.'
- source_word: ἡγνισμένον
  chosen: purified
  alternatives:
  - having been purified
  - ceremonially purified
  lexicon: BDAG
  rationale: Perfect passive participle of ἁγνίζω indicates a completed state of ritual
    purification. 'Purified' preserves the cultic sense succinctly. 'Ceremonially
    purified' is interpretively explicit and therefore better reserved as an alternative
    nuance.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the sanctuary precincts
  lexicon: BDAG
  rationale: ἱερόν denotes the temple complex rather than the inner sanctuary specifically.
    'Temple' is the standard and natural rendering; more specific expansions are possible
    but not required by the text.
- source_word: οὐ μετὰ ὄχλου
  chosen: not with a crowd
  alternatives:
  - not accompanied by a crowd
  - not with a mob
  lexicon: BDAG
  rationale: ὄχλος commonly means crowd/multitude. 'Crowd' is neutral and fits Paul's
    defense that he was not stirring up a public gathering. 'Mob' would overstate
    the term here.
- source_word: οὐδὲ μετὰ θορύβου
  chosen: nor with an uproar
  alternatives:
  - nor with a disturbance
  - nor with tumult
  lexicon: BDAG
  rationale: θόρυβος denotes noise, commotion, or uproar. 'Uproar' best captures the
    public-disorder sense in this legal defense context while remaining readable.
