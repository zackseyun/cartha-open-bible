id: ACT.24.11
reference: Acts 24:11
source:
  edition: SBLGNT
  text: δυναμένου σου ⸀ἐπιγνῶναι, ὅτι οὐ πλείους εἰσίν μοι ἡμέραι ⸀δώδεκα ἀφ’ ἧς ἀνέβην
    προσκυνήσων ⸀εἰς Ἰερουσαλήμ,
translation:
  text: as you are able to ascertain, that it has been no more than twelve days since
    I went up to Jerusalem to worship,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more smoothly, 'it has been no more than twelve days since I went up
      to Jerusalem to worship.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δυναμένου σου ἐπιγνῶναι
  chosen: as you are able to ascertain
  alternatives:
  - since you can verify
  - because you are able to learn
  lexicon: BDAG
  rationale: The genitive absolute with δύναμαι + infinitive expresses the governor's
    ability to determine the facts. 'Ascertain' fits the forensic setting better than
    a flatter 'know' or 'learn.' 'As' preserves the circumstantial force without overstating
    causation.
- source_word: ἐπιγνῶναι
  chosen: ascertain
  alternatives:
  - verify
  - learn
  - recognize
  lexicon: BDAG
  rationale: In context Paul appeals to something Felix can determine from the timeline.
    'Ascertain' captures informed recognition or verification in a legal context.
- source_word: οὐ πλείους εἰσίν μοι ἡμέραι δώδεκα
  chosen: it is not more than twelve days for me
  alternatives:
  - there are no more than twelve days for me
  - it has been no more than twelve days
  lexicon: BDAG
  rationale: The Greek is somewhat idiomatic, literally 'there are not more than twelve
    days to me.' The chosen English preserves the sense of elapsed time while remaining
    readable. 'It has been no more than twelve days' is smoother but slightly more
    interpretive.
- source_word: ἀφ’ ἧς
  chosen: since
  alternatives:
  - from the time when
  - from which day
  lexicon: BDAG
  rationale: This preposition plus relative pronoun marks the starting point of the
    time span. 'Since' is the most natural English equivalent.
- source_word: ἀνέβην
  chosen: I went up
  alternatives:
  - I came up
  lexicon: BDAG
  rationale: ἀναβαίνω commonly reflects the conventional idiom of going up to Jerusalem.
    'Went up' preserves both the directional idiom and the likely speaker perspective.
- source_word: προσκυνήσων
  chosen: to worship
  alternatives:
  - to pay worship
  - to worship God
  lexicon: BDAG
  rationale: 'The future participle expresses purpose: Paul went up for the purpose
    of worship. ''To worship'' is concise and accurate; adding ''God'' would be interpretive
    since the object is implicit.'
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: With a city name, εἰς is naturally rendered 'to' in English. This avoids
    wooden phrasing while preserving the destination.
