id: ACT.24.27
reference: Acts 24:27
source:
  edition: SBLGNT
  text: Διετίας δὲ πληρωθείσης ἔλαβεν διάδοχον ὁ Φῆλιξ Πόρκιον Φῆστον· θέλων τε ⸀χάριτα
    καταθέσθαι τοῖς Ἰουδαίοις ὁ Φῆλιξ κατέλιπε τὸν Παῦλον δεδεμένον.
translation:
  text: But when two years had been completed, Felix was succeeded by Porcius Festus;
    and because Felix wanted to lay up favor with the Jews, he left Paul bound.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to gain favor with the Jews.' The Greek expression can mean either to
      bestow a favor on them or to secure their goodwill.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διετίας ... πληρωθείσης
  chosen: when two years had been completed
  alternatives:
  - after two years had passed
  - when a period of two years was fulfilled
  lexicon: BDAG
  rationale: The genitive absolute marks a temporal circumstance. 'Had been completed'
    preserves the passive sense of πληρωθείσης while remaining natural English.
- source_word: ἔλαβεν διάδοχον
  chosen: was succeeded by
  alternatives:
  - received as successor
  - had as successor
  lexicon: BDAG
  rationale: Although literally 'received a successor,' idiomatic English expresses
    the sense as 'was succeeded by.' This keeps the focus on the change of office
    without awkwardness.
- source_word: Πόρκιον Φῆστον
  chosen: Porcius Festus
  rationale: Personal names are transliterated by standard English conventions per
    translation philosophy.
- source_word: θέλων
  chosen: because Felix wanted
  alternatives:
  - since Felix wanted
  - Felix, wanting
  lexicon: BDAG
  rationale: The participle gives Felix's motive for the main action. Rendering it
    causally in English communicates the relationship clearly.
- source_word: χάριτα καταθέσθαι
  chosen: to lay up favor
  alternatives:
  - to grant a favor
  - to do a favor
  - to gain favor
  lexicon: BDAG
  rationale: The expression is somewhat idiomatic. καταθέσθαι literally suggests placing
    or laying down, and with χάριτα it conveys currying or storing up favor. 'Lay
    up favor' preserves more of the Greek imagery than the smoother 'do a favor,'
    while still being understandable. An alternative is preserved in a footnote because
    'gain favor' is also plausible in context.
- source_word: τοῖς Ἰουδαίοις
  chosen: with the Jews
  alternatives:
  - for the Jews
  - to the Jews
  lexicon: BDAG
  rationale: With the idiom 'lay up favor,' English most naturally takes 'with.' This
    reflects the relational sense of seeking goodwill from them.
- source_word: κατέλιπε
  chosen: he left
  alternatives:
  - he abandoned
  - he kept behind
  lexicon: BDAG
  rationale: The verb here means Felix left Paul in his condition when office changed
    hands. 'Left' is the most natural and contextually sufficient rendering.
- source_word: δεδεμένον
  chosen: bound
  alternatives:
  - in chains
  - imprisoned
  lexicon: BDAG
  rationale: The perfect passive participle emphasizes Paul's continuing state of
    being bound. 'Bound' is closer to the Greek than the more interpretive 'imprisoned';
    'in chains' is possible but more specific than the text requires.
