theological_decisions:
- issue: Nature of the resurrection in Paul's claim
  chosen_reading: a resurrection of both the righteous and the unrighteous
  alternative_readings:
  - a general resurrection without emphasis on moral distinction
  rationale: The Greek explicitly states a resurrection encompassing two groups, the
    righteous and the unrighteous. The translation preserves this scope without importing
    later doctrinal systematization about timing or judgment sequence.
  doctrine_reference: Preserve theological tension rather than resolve it.
