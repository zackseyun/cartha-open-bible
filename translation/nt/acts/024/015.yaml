id: ACT.24.15
reference: Acts 24:15
source:
  edition: SBLGNT
  text: ἐλπίδα ἔχων εἰς τὸν θεόν, ἣν καὶ αὐτοὶ οὗτοι προσδέχονται, ἀνάστασιν μέλλειν
    ⸀ἔσεσθαι δικαίων τε καὶ ἀδίκων·
translation:
  text: having hope in God—which these men themselves also accept—that there is going
    to be a resurrection of both the righteous and the unrighteous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which they themselves also await.' The verb can mean 'accept' or 'look
      forward to/await'; here it likely emphasizes shared expectation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίδα ἔχων
  chosen: having hope
  alternatives:
  - having a hope
  - hoping
  lexicon: BDAG
  rationale: Retains the participial construction and the noun ἐλπίς rather than converting
    too freely to a finite verb. 'Having hope' is natural enough in English while
    staying close to the Greek syntax.
- source_word: εἰς τὸν θεόν
  chosen: in God
  alternatives:
  - toward God
  - in relation to God
  lexicon: BDAG
  rationale: With ἐλπίς/ἔχω, εἰς marks the object or direction of hope. 'Hope in God'
    is idiomatic English and accurately conveys reliance directed toward God.
- source_word: ἣν
  chosen: which
  alternatives:
  - that
  lexicon: BDAG
  rationale: Refers back to 'hope.' In the final English sentence, the relative idea
    is carried by the dash clause ('which these men... also accept') rather than a
    wooden repetition.
- source_word: καὶ αὐτοὶ οὗτοι
  chosen: these men themselves also
  alternatives:
  - they themselves also
  - even these men
  lexicon: BDAG
  rationale: 'Captures both emphatic elements: αὐτοὶ (''themselves'') and οὗτοι (''these'').
    ''These men'' fits the forensic setting, where Paul refers to his accusers/opponents
    present.'
- source_word: προσδέχονται
  chosen: accept
  alternatives:
  - await
  - look for
  - welcome
  lexicon: BDAG
  rationale: In context, Paul is stressing shared belief with his Jewish interlocutors,
    not merely emotional welcome. 'Accept' communicates that they acknowledge or hold
    this expectation. 'Await' is lexically possible and worth preserving in a footnote
    because the verb can denote eager expectation.
- source_word: ἀνάστασιν
  chosen: resurrection
  alternatives:
  - rising again
  lexicon: BDAG
  rationale: Standard and precise rendering for bodily rising from the dead in this
    context.
- source_word: μέλλειν ἔσεσθαι
  chosen: there is going to be
  alternatives:
  - is about to be
  - will be
  lexicon: BDAG
  rationale: The periphrastic future idea combines μέλλω with ἔσεσθαι. 'There is going
    to be' preserves the verbal force more explicitly than a simple 'will be,' while
    avoiding the misleading immediacy that 'is about to be' can suggest in English.
- source_word: δικαίων τε καὶ ἀδίκων
  chosen: of both the righteous and the unrighteous
  alternatives:
  - of both the just and the unjust
  lexicon: BDAG
  rationale: Uses clear modern English while preserving the moral contrast. 'Both
    ... and ...' reflects τε καὶ.
