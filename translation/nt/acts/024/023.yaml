id: ACT.24.23
reference: Acts 24:23
source:
  edition: SBLGNT
  text: ⸀διαταξάμενος τῷ ἑκατοντάρχῃ τηρεῖσθαι ⸀αὐτὸν ἔχειν τε ἄνεσιν καὶ μηδένα κωλύειν
    τῶν ἰδίων αὐτοῦ ⸀ὑπηρετεῖν αὐτῷ.
translation:
  text: And he ordered the centurion to keep him in custody, yet to let him have some
    freedom, and to prevent none of his own people from attending to his needs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to let him have some ease' or 'to have liberty.' The Greek term can
      denote relief, ease, or a measure of freedom from strict confinement.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'none of his own [people].' This likely refers to Paul's associates
      or supporters who were permitted to assist him.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαταξάμενος
  chosen: he ordered
  alternatives:
  - having given orders
  - having commanded
  lexicon: BDAG
  rationale: Aorist middle participle from διατάσσω, introducing Felix's action toward
    the centurion. In natural English narrative, 'he ordered' best conveys the force
    without awkward participial structure.
- source_word: ἑκατοντάρχῃ
  chosen: the centurion
  alternatives:
  - the captain
  lexicon: BDAG
  rationale: Standard rendering for the Roman officer in charge of a hundred soldiers.
    'Centurion' is precise and familiar.
- source_word: τηρεῖσθαι αὐτόν
  chosen: to keep him in custody
  alternatives:
  - to guard him
  - to keep him
  lexicon: BDAG
  rationale: τηρέω here refers to keeping Paul under guard rather than merely watching
    over him. 'In custody' makes the legal-custodial sense explicit in idiomatic English.
- source_word: ἔχειν τε ἄνεσιν
  chosen: yet to let him have some freedom
  alternatives:
  - and to have liberty
  - and to have some ease
  - and to have relaxation
  lexicon: BDAG
  rationale: ἄνεσις can denote relief, ease, or freedom from constraint. In this custodial
    context it refers to a measure of leniency rather than full release. 'Some freedom'
    communicates limited liberty clearly for modern readers.
- source_word: τε ... καὶ
  chosen: yet ... and
  alternatives:
  - and ... and
  - both ... and
  lexicon: LSJ
  rationale: 'The pair coordinates two permissions: leniency for Paul and noninterference
    with his associates. Rendering the first link with ''yet'' helps English flow
    after ''keep him in custody'' by signaling concession-like contrast implied by
    the combination of custody and leniency.'
- source_word: μηδένα κωλύειν
  chosen: to prevent none
  alternatives:
  - to hinder no one
  - to forbid no one
  lexicon: BDAG
  rationale: κωλύω means hinder, prevent, or forbid. The construction requires that
    no person be obstructed. 'Prevent none' preserves the universal negative force,
    though smoothed in the full sentence as 'to prevent none of his own people...'.
- source_word: τῶν ἰδίων αὐτοῦ
  chosen: of his own people
  alternatives:
  - his own friends
  - his own companions
  - his own people
  lexicon: BDAG
  rationale: The phrase literally means 'his own [people/those belonging to him].'
    It likely refers to Paul's associates or supporters rather than family specifically.
    'His own people' preserves the breadth of the Greek without over-specifying.
- source_word: ὑπηρετεῖν αὐτῷ
  chosen: from attending to his needs
  alternatives:
  - from serving him
  - from helping him
  - from ministering to him
  lexicon: BDAG
  rationale: ὑπηρετέω can mean serve, assist, or render service. In this prison context
    it likely refers to practical assistance and provision. 'Attending to his needs'
    makes the sense explicit without importing ecclesiastical overtones of 'minister'.
