id: ACT.24.21
reference: Acts 24:21
source:
  edition: SBLGNT
  text: ἢ περὶ μιᾶς ταύτης φωνῆς ἧς ἐκέκραξα ⸂ἐν αὐτοῖς ἑστὼς⸃ ὅτι Περὶ ἀναστάσεως
    νεκρῶν ἐγὼ κρίνομαι σήμερον ⸀ἐφ’ ὑμῶν.
translation:
  text: 'or about this one statement that I shouted while standing among them: ‘It
    is concerning the resurrection of the dead that I am being judged before you today.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cry' or 'voice' for 'statement'; the Greek term can denote the utterance
      itself or the voice/cry by which it was made.
    reason: lexical_alternative
  - marker: b
    text: Or 'resurrection from the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φωνῆς
  chosen: statement
  alternatives:
  - cry
  - voice
  - declaration
  lexicon: BDAG
  rationale: Although φωνή often means 'voice' or 'sound,' here the genitive with
    περὶ and the following content clause points to the utterance itself. 'Statement'
    communicates the sense of a specific spoken declaration more naturally in English
    than 'voice.'
- source_word: ἐκέκραξα
  chosen: I shouted
  alternatives:
  - I cried out
  - I called out
  lexicon: BDAG
  rationale: κράζω denotes loud public utterance. 'I shouted' preserves the force
    and courtroom/public setting better than the more traditional but slightly less
    natural 'I cried out.'
- source_word: ἐν αὐτοῖς ἑστὼς
  chosen: while standing among them
  alternatives:
  - standing in their midst
  - standing among them
  lexicon: BDAG
  rationale: The participial phrase is circumstantial, describing Paul's position
    when he spoke. 'While standing among them' is natural English and preserves the
    spatial sense of ἐν αὐτοῖς and the participial nuance of ἑστώς.
- source_word: ἀναστάσεως νεκρῶν
  chosen: the resurrection of the dead
  alternatives:
  - resurrection from the dead
  lexicon: BDAG
  rationale: The genitive construction is most straightforwardly rendered 'of the
    dead.' This is also the established idiom in English for the general doctrine
    under dispute, matching the likely sense in context.
- source_word: κρίνομαι
  chosen: I am being judged
  alternatives:
  - I am on trial
  - I am being tried
  lexicon: BDAG
  rationale: The present passive indicates that Paul is presently under judicial evaluation.
    'I am being judged' is formally closer to the Greek, while still idiomatic in
    context.
- source_word: ἐφ’ ὑμῶν
  chosen: before you
  alternatives:
  - by you
  - in your presence
  lexicon: BDAG
  rationale: With judicial language, ἐπί plus genitive can indicate appearance before
    a tribunal or authority. 'Before you' best fits the courtroom setting and avoids
    implying that the audience alone are the direct agents of judgment.
- source_word: ἢ
  chosen: or
  alternatives:
  - unless it is
  - or else
  lexicon: BDAG
  rationale: 'ἤ links this verse to the previous defense: Paul is saying the accusers
    found no wrongdoing in him, except possibly this one matter. Simple ''or'' preserves
    the Greek connection without overinterpreting.'
- source_word: μιᾶς ταύτης
  chosen: this one
  alternatives:
  - this single
  - this one particular
  lexicon: BDAG
  rationale: The combination emphasizes singularity and specificity. 'This one' is
    concise and natural, preserving the focus on a single utterance.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: Standard temporal adverb; 'today' is clear modern English.
