theological_decisions:
- issue: Nature of the disputed charge
  chosen_reading: Paul frames the issue as the resurrection of the dead, without narrowing
    it to Jesus' resurrection alone in the main text.
  alternative_readings:
  - Paul implicitly refers specifically to Jesus' resurrection as the basis of the
    broader resurrection hope.
  rationale: 'The Greek phrase is general: περὶ ἀναστάσεως νεκρῶν. The translation
    should preserve that broader wording rather than importing a more specific christological
    claim not explicit in this verse, even though Acts as a whole connects Paul''s
    preaching with Jesus'' resurrection.'
  doctrine_reference: Preserve theological tension rather than resolve it.
