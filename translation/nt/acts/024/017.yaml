id: ACT.24.17
reference: Acts 24:17
source:
  edition: SBLGNT
  text: δι’ ἐτῶν δὲ πλειόνων ⸂ἐλεημοσύνας ποιήσων εἰς τὸ ἔθνος μου παρεγενόμην⸃ καὶ
    προσφοράς,
translation:
  text: Now after several years I came to bring gifts for the poor to my nation, and
    offerings.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “alms.” The Greek term refers to charitable gifts for the needy.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ἐτῶν δὲ πλειόνων
  chosen: Now after several years
  alternatives:
  - But after many years
  - After a number of years
  lexicon: BDAG
  rationale: διά with the genitive in a temporal expression means 'after' in the sense
    of an interval having passed. δέ is lightly connective; 'now' gives natural English
    discourse flow without overstating contrast. πλειόνων is comparative in form but
    idiomatically means 'several/many' years here.
- source_word: ἐλεημοσύνας
  chosen: gifts for the poor
  alternatives:
  - alms
  - charitable gifts
  lexicon: BDAG
  rationale: ἐλεημοσύνη commonly denotes almsgiving or charitable assistance to the
    needy. 'Gifts for the poor' communicates the sense in clear modern English better
    than the more traditional but less common 'alms.'
- source_word: ποιήσων
  chosen: to bring
  alternatives:
  - to make
  - to do
  lexicon: BDAG
  rationale: Although ποιέω literally means 'make/do,' with ἐλεημοσύνας it forms the
    idiom 'do alms' = 'give alms' or 'bring charitable gifts.' English requires an
    idiomatic rendering rather than a wooden one.
- source_word: εἰς τὸ ἔθνος μου
  chosen: to my nation
  alternatives:
  - for my people
  - to my people
  lexicon: BDAG
  rationale: ἔθνος can mean nation, people, or Gentiles depending on context. Here
    Paul refers to the Jewish nation as his own people. 'Nation' preserves the lexical
    force of ἔθνος while remaining natural in context.
- source_word: παρεγενόμην
  chosen: I came
  alternatives:
  - I arrived
  - I was present
  lexicon: BDAG
  rationale: παραγίνομαι here denotes arrival/presence. 'I came' is concise and idiomatic
    in Paul's self-report.
- source_word: προσφοράς
  chosen: offerings
  alternatives:
  - sacrificial offerings
  - offerings to God
  lexicon: BDAG
  rationale: προσφορά refers to offerings, often cultic. Since the Greek leaves the
    exact type implicit, 'offerings' preserves the breadth while allowing the temple
    context to inform the reader.
