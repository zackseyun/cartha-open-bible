theological_decisions:
- issue: Nature of Paul's charitable act in Jerusalem
  chosen_reading: Render ἐλεημοσύνας as 'gifts for the poor' rather than the traditional
    'alms.'
  alternative_readings:
  - alms
  - charitable gifts
  rationale: This is primarily lexical, not doctrinal. The chosen rendering preserves
    the concrete charitable sense in accessible English without importing a technical
    ecclesiastical term.
  doctrine_reference: Translation philosophy §6 (readable modern English, not archaic
    or academic)
