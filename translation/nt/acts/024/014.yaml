theological_decisions:
- issue: Paul's relation to Judaism and the Christian movement
  chosen_reading: Paul presents worship 'according to the Way' as continuous with
    worship of Israel's ancestral God and belief in the Law and the Prophets.
  alternative_readings:
  - Paul contrasts Christianity over against Judaism as a separate religion.
  rationale: The verse explicitly frames 'the Way' as the path by which Paul worships
    the same ancestral God and affirms the Jewish Scriptures. The translation therefore
    preserves continuity rather than importing later separation between Christianity
    and Judaism.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Preserve theological tension rather than resolve it.'
