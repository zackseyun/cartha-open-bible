id: ACT.24.14
reference: Acts 24:14
source:
  edition: SBLGNT
  text: ὁμολογῶ δὲ τοῦτό σοι ὅτι κατὰ τὴν ὁδὸν ἣν λέγουσιν αἵρεσιν οὕτως λατρεύω τῷ
    πατρῴῳ θεῷ, πιστεύων πᾶσι τοῖς κατὰ τὸν νόμον καὶ ⸂τοῖς ἐν⸃ τοῖς προφήταις γεγραμμένοις,
translation:
  text: 'But I confess this to you: according to the Way, which they call a sect,
    so I worship the God of our fathers, believing everything written in the Law and
    in the Prophets,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'party.' The Greek word can denote a faction or sect; later English 'heresy'
      would be misleading here.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the ancestral God'; the sense is the God worshiped by the fathers
      of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμολογῶ
  chosen: I confess
  alternatives:
  - I admit
  - I acknowledge
  lexicon: BDAG
  rationale: ὁμολογέω here introduces Paul's open acknowledgment before Felix. 'Confess'
    preserves the formal forensic tone without implying admission of guilt as strongly
    as 'admit' might in English.
- source_word: κατὰ τὴν ὁδόν
  chosen: according to the Way
  alternatives:
  - in accordance with the Way
  - following the Way
  lexicon: BDAG
  rationale: ὁδός is the early Christian self-designation 'the Way' in Acts. Retaining
    the capitalized title preserves the historical and literary usage. κατά is rendered
    'according to' to reflect conformity or alignment.
- source_word: αἵρεσιν
  chosen: sect
  alternatives:
  - party
  - heresy
  lexicon: BDAG
  rationale: In this context αἵρεσις refers to a faction or sect as labeled by opponents,
    not necessarily doctrinal 'heresy' in the later technical sense. 'Sect' best fits
    first-century usage and avoids anachronism.
- source_word: οὕτως
  chosen: so
  alternatives:
  - in this way
  - thus
  lexicon: BDAG
  rationale: οὕτως links the manner of Paul's worship to the preceding phrase. 'So'
    is concise and natural, preserving the connective force.
- source_word: λατρεύω
  chosen: I worship
  alternatives:
  - I serve in worship
  - I render worship
  lexicon: BDAG
  rationale: λατρεύω in this context denotes religious service/worship offered to
    God. 'I worship' is the clearest modern English rendering while preserving the
    cultic-religious sense.
- source_word: τῷ πατρῴῳ θεῷ
  chosen: the God of our fathers
  alternatives:
  - the ancestral God
  - the God of my fathers
  lexicon: BDAG
  rationale: Literally the phrase is 'the ancestral/fatherly God' or 'the God handed
    down from the fathers.' In English, 'the God of our fathers' best conveys Paul's
    claim of continuity with Israel's ancestral faith. Although the Greek adjective
    is singular, the idiomatic plural 'our fathers' is the most natural equivalent
    and matches the communal Jewish sense.
- source_word: πιστεύων
  chosen: believing
  alternatives:
  - while believing
  - as one who believes
  lexicon: BDAG
  rationale: The present participle explains the manner/content of Paul's worship.
    'Believing' preserves the participial connection without overcomplicating the
    English syntax.
- source_word: πᾶσι τοῖς ... γεγραμμένοις
  chosen: everything written
  alternatives:
  - all the things written
  - all that is written
  lexicon: BDAG
  rationale: The dative plural with the perfect passive participle refers to the totality
    of what stands written. 'Everything written' is idiomatic and comprehensive.
- source_word: κατὰ τὸν νόμον
  chosen: in the Law
  alternatives:
  - according to the Law
  - in accordance with the Law
  lexicon: BDAG
  rationale: Here κατά marks relation or location within the scriptural corpus. 'In
    the Law' is the most natural English expression for material written in the Mosaic
    Law.
- source_word: τοῖς ἐν τοῖς προφήταις γεγραμμένοις
  chosen: in the Prophets
  alternatives:
  - in the prophetic writings
  - among the Prophets
  lexicon: BDAG
  rationale: The phrase refers to what is written in the prophetic books. 'In the
    Prophets' preserves the conventional Jewish scriptural division and parallels
    'in the Law.'
