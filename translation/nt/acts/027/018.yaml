id: ACT.27.18
reference: Acts 27:18
source:
  edition: SBLGNT
  text: σφοδρῶς δὲ χειμαζομένων ἡμῶν τῇ ἑξῆς ἐκβολὴν ἐποιοῦντο,
translation:
  text: As we were being violently storm-tossed[a], on the next day they began to throw the cargo overboard.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'they made a jettison.' The Greek uses a nautical expression for throwing cargo out of a ship to lighten it.
    reason: lexical_alternative
lexical_decisions:
- source_word: σφοδρῶς
  chosen: violently
  alternatives:
  - severely
  - greatly
  lexicon: BDAG
  rationale: Adverb intensifying the severity of the storm's effect. 'Violently' conveys the forceful, dangerous nature in natural English better than the more generic 'severely' or 'greatly'.
- source_word: χειμαζομένων
  lemma: χειμάζομαι
  chosen: were being violently battered by the storm
  alternatives:
  - were being storm-tossed
  - were being battered by the storm
  lexicon: BDAG
  rationale: The participle from χειμάζομαι denotes being caught in or distressed by a storm. The passive sense is important. Expanded slightly in English to make the verbal idea idiomatic and explicit.
- source_word: ἡμῶν
  chosen: we
  alternatives:
  - us
  lexicon: BDAG
  rationale: 'Genitive absolute with the participle; in English this is best rendered as a subordinate clause with ''we'' as subject: ''Because we were being...''.'
- source_word: τῇ ἑξῆς
  chosen: on the next day
  alternatives:
  - the following day
  - on the following day
  lexicon: BDAG
  rationale: Standard temporal idiom meaning the next/following day. 'On the next day' is concise and natural.
- source_word: ἐκβολὴν
  chosen: throw the cargo overboard
  alternatives:
  - make a jettison
  - throw things overboard
  lexicon: BDAG
  rationale: Noun meaning a throwing out, especially jettisoning cargo from a ship. Rather than the wooden 'made a jettison,' the translation states the maritime action idiomatically. 'Cargo' is supplied because this is the normal sense in context.
- source_word: ἐποιοῦντο
  chosen: they began to throw
  alternatives:
  - they were making
  - they proceeded to make
  lexicon: BDAG
  rationale: Imperfect middle indicates the crew's ongoing action. In English, with ἐκβολὴν, an idiomatic rendering is 'they began to throw ... overboard' or 'they were throwing ... overboard.' 'Began to' captures the narrative onset on the next day without forcing an overly literal 'made' construction.
