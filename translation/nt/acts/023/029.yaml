id: ACT.23.29
reference: Acts 23:29
source:
  edition: SBLGNT
  text: ὃν εὗρον ἐγκαλούμενον περὶ ζητημάτων τοῦ νόμου αὐτῶν, μηδὲν ⸀δὲ ἄξιον θανάτου ἢ δεσμῶν ⸂ἔχοντα ἔγκλημα⸃.
translation:
  text: I found that he was being accused concerning questions of their law[b][a], but charged with nothing deserving death or imprisonment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about disputed matters of their law.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'nothing worthy of death or chains.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκαλούμενον
  chosen: was being accused
  alternatives:
  - was being charged
  - was being prosecuted
  lexicon: BDAG
  rationale: Passive participle indicating that accusations were being brought against him. 'Was being accused' is natural modern English and preserves the ongoing/passive sense.
- source_word: περὶ ζητημάτων
  chosen: about questions
  alternatives:
  - concerning disputes
  - about matters in dispute
  lexicon: BDAG
  rationale: ζητήματα refers to debated questions or disputed matters. 'Questions' keeps the wording relatively formal while remaining readable; the broader contentious sense is carried by context.
- source_word: τοῦ νόμου αὐτῶν
  chosen: of their law
  alternatives:
  - concerning their law
  - of their own law
  lexicon: BDAG
  rationale: The genitive phrase specifies the sphere of the questions. 'Their law' reflects the Roman official's perspective in context and preserves the possessive αὐτῶν.
- source_word: μηδὲν ... ἄξιον θανάτου ἢ δεσμῶν
  chosen: nothing deserving death or imprisonment
  alternatives:
  - nothing worthy of death or chains
  - nothing deserving death or bonds
  lexicon: BDAG
  rationale: ἄξιον with genitives expresses deserving liability. 'Imprisonment' communicates δεσμῶν idiomatically in English legal context better than the more literal 'chains' or 'bonds,' while preserving the judicial sense.
- source_word: ἔχοντα ἔγκλημα
  chosen: charged with
  alternatives:
  - having a charge of
  - guilty of
  lexicon: BDAG
  rationale: The participle-noun combination is somewhat compressed Greek. In context it means having a charge/accusation against him. 'Charged with' yields clear English without overstating guilt; 'guilty of' would wrongly imply conviction.
- source_word: εὗρον
  chosen: I found
  alternatives:
  - I discovered
  - I determined
  lexicon: BDAG
  rationale: Aorist of εὑρίσκω here reports the commander's conclusion after investigation. 'I found' is the standard and sufficiently idiomatic rendering.
