id: ACT.23.7
reference: Acts 23:7
source:
  edition: SBLGNT
  text: τοῦτο δὲ αὐτοῦ ⸀λαλοῦντος ἐγένετο στάσις τῶν Φαρισαίων ⸂καὶ Σαδδουκαίων⸃, καὶ ἐσχίσθη τὸ πλῆθος.
translation:
  text: And as he was saying this[a], a dispute arose between the Pharisees and Sadducees[b], and the assembly was divided.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the crowd was split' or 'the multitude was divided.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a dissension arose between the Pharisees and Sadducees.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δὲ αὐτοῦ λαλοῦντος
  chosen: And when he said this
  alternatives:
  - while he was saying this
  - as he was saying this
  lexicon: BDAG
  rationale: This is a genitive absolute with present participle, indicating contemporaneous action. 'When he said this' is natural English and preserves the temporal sense without awkwardness; 'while/as he was saying this' are possible but less idiomatic here.
- source_word: ἐγένετο
  chosen: arose
  alternatives:
  - there was
  - came about
  lexicon: BDAG
  rationale: With στάσις as subject complement, ἐγένετο idiomatically means that something came into being or broke out. 'Arose' fits English narrative style and conveys the onset of the conflict.
- source_word: στάσις
  chosen: dispute
  alternatives:
  - dissension
  - conflict
  - division
  lexicon: BDAG
  rationale: στάσις can denote strife, dissension, or factional conflict. 'Dispute' communicates the immediate argumentative clash in context. 'Dissension' is also strong, but 'dispute' is more readable modern English while still accurate.
- source_word: τῶν Φαρισαίων καὶ Σαδδουκαίων
  chosen: between the Pharisees and Sadducees
  alternatives:
  - of the Pharisees and Sadducees
  - among the Pharisees and Sadducees
  lexicon: BDAG
  rationale: Although the Greek uses a genitive construction after στάσις, English idiom naturally expresses the opposing parties with 'between.' This makes clear that the conflict was between these two groups.
- source_word: ἐσχίσθη
  chosen: was divided
  alternatives:
  - was split
  - was torn apart
  lexicon: BDAG
  rationale: The passive of σχίζω literally means 'was split' or 'was torn.' In this social context it refers to the crowd becoming divided. 'Was divided' preserves the metaphor in idiomatic English without over-literal awkwardness.
- source_word: τὸ πλῆθος
  chosen: the assembly
  alternatives:
  - the crowd
  - the multitude
  lexicon: BDAG
  rationale: In context this refers to the gathered body before whom Paul was speaking, not merely a random crowd. 'Assembly' captures the collective body in a formal hearing context better than 'crowd,' while remaining accessible.
