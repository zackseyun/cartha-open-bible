id: ACT.21.33
reference: Acts 21:33
source:
  edition: SBLGNT
  text: ⸂τότε ἐγγίσας⸃ ὁ χιλίαρχος ἐπελάβετο αὐτοῦ καὶ ἐκέλευσε δεθῆναι ἁλύσεσι δυσί,
    καὶ ἐπυνθάνετο ⸀τίς εἴη καὶ τί ἐστιν πεποιηκώς.
translation:
  text: Then the commander came up, seized him, and ordered him to be bound with two
    chains, and was asking who he was and what he had done.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tribune.' The Greek χιλίαρχος refers to a Roman military officer, literally
      'commander of a thousand.'
    reason: lexical_alternative
  - marker: b
    text: '''Two chains'' may echo the prophecy in Acts 21:11 about Paul being bound
      in Jerusalem.'
    reason: cross_reference
lexical_decisions:
- source_word: χιλίαρχος
  chosen: commander
  alternatives:
  - tribune
  - military commander
  - commander of a thousand
  lexicon: BDAG
  rationale: Refers to a Roman officer commanding a cohort/tribune-level figure. 'Commander'
    is clear modern English and avoids the archaic or overly technical feel of 'tribune,'
    while preserving official military authority.
- source_word: ἐγγίσας
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: The aorist participle indicates drawing near before the main action.
    'Came up' is natural in narrative English and fits the physical movement in the
    scene.
- source_word: ἐπελάβετο αὐτοῦ
  chosen: seized him
  alternatives:
  - took hold of him
  - laid hold of him
  lexicon: BDAG
  rationale: The middle of ἐπιλαμβάνομαι here conveys taking hold of Paul physically.
    'Seized him' best matches the forceful arrest context.
- source_word: ἐκέλευσε δεθῆναι
  chosen: ordered him to be bound
  alternatives:
  - commanded that he be bound
  - gave orders to bind him
  lexicon: BDAG
  rationale: This construction expresses an authoritative order with an infinitive
    complement. 'Ordered him to be bound' is idiomatic and preserves the passive sense
    of δεθῆναι.
- source_word: ἁλύσεσι δυσί
  chosen: with two chains
  alternatives:
  - with two shackles
  lexicon: BDAG
  rationale: ἅλυσις denotes a chain, especially in custody contexts. 'Two chains'
    is the straightforward rendering and may echo the earlier prophecy without overexplaining
    in the main text.
- source_word: ἐπυνθάνετο
  chosen: he was asking
  alternatives:
  - he inquired
  - he kept asking
  lexicon: BDAG
  rationale: The imperfect portrays ongoing inquiry amid the disturbance. 'He was
    asking' preserves the progressive sense better than a simple past.
- source_word: τίς εἴη
  chosen: who he was
  alternatives:
  - who he might be
  lexicon: BDAG
  rationale: The optative in indirect question after a past-tense verb is naturally
    rendered in English as 'who he was.' A more literal 'might be' is possible but
    less natural here.
- source_word: τί ἐστιν πεποιηκώς
  chosen: what he had done
  alternatives:
  - what he was doing
  - what he has done
  lexicon: BDAG
  rationale: The periphrastic perfect (ἐστιν πεποιηκώς) points to completed action
    with present relevance. In English indirect discourse after a past narrative verb,
    'what he had done' is the most natural equivalent.
