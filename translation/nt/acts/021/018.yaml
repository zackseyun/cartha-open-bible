theological_decisions:
- issue: Identity and role of Ἰάκωβον
  chosen_reading: Render simply as the personal name 'James' without appositional
    expansion.
  alternative_readings:
  - James the brother of the Lord
  - James the leader of the Jerusalem church
  rationale: The verse names Ἰάκωβος without further identification. While context
    strongly suggests the Jerusalem leader, adding an identifier in the main text
    would import information not stated here.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never import doctrinal claims the text does not make.'
- issue: Ecclesial sense of οἱ πρεσβύτεροι
  chosen_reading: Translate as 'the elders' in a church-governance sense without denominational
    specification.
  alternative_readings:
  - the presbyters
  - the church leaders
  rationale: The term denotes recognized leaders in the Jerusalem church, but the
    translation should not privilege later denominational structures. 'Elders' preserves
    the lexical sense and theological neutrality.
  doctrine_reference: 'Affirmations; Translation philosophy: does not advocate for
    a particular denominational distinctive unless unambiguously supported.'
