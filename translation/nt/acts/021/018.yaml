id: ACT.21.18
reference: Acts 21:18
source:
  edition: SBLGNT
  text: τῇ δὲ ἐπιούσῃ εἰσῄει ὁ Παῦλος σὺν ἡμῖν πρὸς Ἰάκωβον, πάντες τε παρεγένοντο
    οἱ πρεσβύτεροι.
translation:
  text: On the next day, Paul went in with us to James, and all the elders were present.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'On the following day.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the elders came' or 'all the elders arrived.' The Greek verb can
      emphasize either arrival or presence.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ δὲ ἐπιούσῃ
  chosen: On the next day
  alternatives:
  - On the following day
  - The next day
  lexicon: BDAG
  rationale: The dative participial expression is an idiom meaning the next or following
    day. 'On the next day' is natural modern English and preserves the temporal force
    without unnecessary literalism.
- source_word: εἰσῄει
  chosen: went in
  alternatives:
  - entered
  - went
  lexicon: BDAG
  rationale: The imperfect of εἴσειμι denotes movement inward/entry. 'Went in' preserves
    the directional nuance and reads naturally in context of visiting James.
- source_word: σὺν ἡμῖν
  chosen: with us
  alternatives:
  - together with us
  lexicon: BDAG
  rationale: σύν with the dative straightforwardly indicates accompaniment. 'With
    us' is the clearest idiomatic rendering.
- source_word: πρὸς Ἰάκωβον
  chosen: to James
  alternatives:
  - to visit James
  - to James's place
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward a person, idiomatically
    'to James.' More expansive renderings would add interpretive detail not explicit
    in the Greek.
- source_word: πάντες τε
  chosen: and all
  alternatives:
  - and indeed all
  - and also all
  lexicon: BDAG
  rationale: τέ links this clause with mild connective force. In English, simple 'and'
    best conveys the coordination without overtranslating the particle.
- source_word: παρεγένοντο
  chosen: were present
  alternatives:
  - came
  - arrived
  - gathered
  lexicon: BDAG
  rationale: παραγίνομαι can mean to arrive or be present. Given the focus is the
    state of those attending the meeting rather than their act of arrival, 'were present'
    best fits the context and smooth English style.
- source_word: οἱ πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the presbyters
  lexicon: BDAG
  rationale: πρεσβύτεροι in Acts refers to recognized church leaders. 'Elders' is
    the standard transparent rendering and avoids importing later ecclesiastical terminology.
