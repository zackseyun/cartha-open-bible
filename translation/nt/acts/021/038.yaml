id: ACT.21.38
reference: Acts 21:38
source:
  edition: SBLGNT
  text: οὐκ ἄρα σὺ εἶ ὁ Αἰγύπτιος ὁ πρὸ τούτων τῶν ἡμερῶν ἀναστατώσας καὶ ἐξαγαγὼν εἰς τὴν ἔρημον τοὺς τετρακισχιλίους ἄνδρας τῶν σικαρίων;
translation:
  text: Then you are not the Egyptian who some days ago stirred up a revolt and led the four thousand men of the assassins out into the wilderness?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the dagger-men'; Greek 'of the Sicarii,' a group known for concealed-knife attacks.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἄρα
  chosen: Then ... not
  alternatives:
  - So ... not
  - Therefore ... not
  lexicon: BDAG
  rationale: 'The combination introduces an inference in question form: the commander is drawing a conclusion from Paul''s Greek speech. ''Then'' captures the inferential force in natural English better than a wooden ''therefore''.'
- source_word: Αἰγύπτιος
  chosen: the Egyptian
  alternatives:
  - that Egyptian
  lexicon: BDAG
  rationale: With the article, the phrase refers to a known figure, likely notorious to the speaker and audience. 'The Egyptian' is the most direct rendering.
- source_word: πρὸ τούτων τῶν ἡμερῶν
  chosen: some days ago
  alternatives:
  - before these days
  - recently
  lexicon: BDAG
  rationale: The idiom means a short time before the present. 'Some days ago' preserves the temporal sense in idiomatic modern English without over-specifying.
- source_word: ἀναστατώσας
  chosen: stirred up a revolt
  alternatives:
  - caused an uprising
  - threw into disorder
  lexicon: BDAG
  rationale: The verb can mean to upset, disturb, or incite turmoil. In this historical-political context, 'stirred up a revolt' best conveys public insurrection rather than mere confusion.
- source_word: ἐξαγαγὼν
  chosen: led ... out
  alternatives:
  - brought ... out
  - took ... out
  lexicon: BDAG
  rationale: The participle denotes leading people out from one place to another. 'Led ... out' is idiomatic and fits a rebel leader gathering followers.
- source_word: ἔρημον
  chosen: the wilderness
  alternatives:
  - the desert
  lexicon: BDAG
  rationale: ἔρημος can denote desert or uninhabited region. 'Wilderness' is broader and avoids implying a sandy desert specifically, while fitting Judean geography and biblical usage.
- source_word: τετρακισχιλίους ἄνδρας
  chosen: the four thousand men
  alternatives:
  - four thousand men
  lexicon: BDAG
  rationale: The article with the numeral points to a definite group associated with the Egyptian. Retaining 'the' reflects that specificity.
- source_word: τῶν σικαρίων
  chosen: of the assassins
  alternatives:
  - of the dagger-men
  - of the Sicarii
  lexicon: BDAG
  rationale: σικάριοι refers to men associated with dagger-assassinations; 'assassins' communicates the sense clearly to modern readers. Because 'Sicarii' is a historically recognized label and 'dagger-men' is more literal, both are preserved in a footnote.
