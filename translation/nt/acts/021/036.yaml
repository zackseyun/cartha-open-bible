id: ACT.21.36
reference: Acts 21:36
source:
  edition: SBLGNT
  text: ἠκολούθει γὰρ τὸ πλῆθος τοῦ λαοῦ ⸀κράζοντες· Αἶρε αὐτόν.
translation:
  text: For the crowd of the people was following, shouting, “Take him away!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Away with him!”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  - kept following
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing action in past time; 'was following'
    preserves the progressive sense in natural English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connective linking this verse to the preceding
    narrative.
- source_word: πλῆθος
  chosen: crowd
  alternatives:
  - multitude
  - mass
  lexicon: BDAG
  rationale: '''Crowd'' is clear modern English and fits the collective sense of a
    large group.'
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - of the populace
  - of the mob
  lexicon: BDAG
  rationale: A straightforward genitival qualifier. 'People' is neutral and does not
    import the more pejorative sense of 'mob' beyond the Greek.
- source_word: κράζοντες
  chosen: shouting
  alternatives:
  - crying out
  - yelling
  lexicon: BDAG
  rationale: The participle expresses the manner accompanying their following. 'Shouting'
    is idiomatic and forceful without becoming colloquial.
- source_word: Αἶρε αὐτόν
  chosen: Take him away!
  alternatives:
  - Away with him!
  - Remove him!
  lexicon: BDAG
  rationale: The imperative of αἴρω here is an idiomatic demand for removal, not merely
    physical lifting. 'Take him away!' communicates the hostile force clearly in contemporary
    English.
