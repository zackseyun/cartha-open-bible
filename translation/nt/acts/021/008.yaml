id: ACT.21.8
reference: Acts 21:8
source:
  edition: SBLGNT
  text: τῇ δὲ ἐπαύριον ἐξελθόντες ⸀ἤλθομεν εἰς Καισάρειαν, καὶ εἰσελθόντες εἰς τὸν οἶκον Φιλίππου τοῦ εὐαγγελιστοῦ ὄντος ἐκ τῶν ἑπτὰ ἐμείναμεν παρ’ αὐτῷ.
translation:
  text: On the next day we departed and came to Caesarea[a], and entering the house of Philip the evangelist, who was one of the seven, we stayed with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, one of the seven men appointed earlier for service in Jerusalem (see Acts 6:3–6).
    reason: cross_reference
lexical_decisions:
- source_word: τῇ δὲ ἐπαύριον
  chosen: On the next day
  alternatives:
  - the next day
  - on the following day
  lexicon: BDAG
  rationale: This idiomatic temporal expression is best rendered in natural English as a single phrase. 'On the next day' preserves the narrative sequencing signaled by δέ without overtranslating it.
- source_word: ἐξελθόντες
  chosen: departed
  alternatives:
  - set out
  - went out
  lexicon: BDAG
  rationale: The participle refers to leaving the previous location as part of travel narrative. 'Departed' is concise and idiomatic in English, preserving the movement sense without awkwardly literal 'having gone out'.
- source_word: ἤλθομεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: With εἰς Καισάρειαν, 'came to Caesarea' is standard English for arrival at a destination. 'Arrived' is possible but would slightly compress the verbal distinction between the participle and main verb.
- source_word: Καισάρειαν
  chosen: Caesarea
  alternatives:
  - Caesarea Maritima
  lexicon: BDAG
  rationale: Standard transliteration of the place name. No expansion is needed in the main text.
- source_word: εἰσελθόντες εἰς τὸν οἶκον
  chosen: entering the house
  alternatives:
  - having entered the house
  - going into the house
  lexicon: BDAG
  rationale: The participle is rendered with a natural English participial construction that preserves the sequence of actions. 'House' is retained rather than generalized to 'home' to stay close to the Greek while remaining readable.
- source_word: Φιλίππου
  chosen: Philip
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: τοῦ εὐαγγελιστοῦ
  chosen: the evangelist
  alternatives:
  - the one who proclaimed the good news
  - the gospel preacher
  lexicon: BDAG
  rationale: '''Evangelist'' is the established and accurate rendering of εὐαγγελιστής here, functioning as a recognized ministry designation. It is readable modern English and preserves the title-like force.'
- source_word: ὄντος ἐκ τῶν ἑπτὰ
  chosen: who was one of the seven
  alternatives:
  - being one of the seven
  - who belonged to the seven
  lexicon: BDAG
  rationale: This genitive absolute-like descriptive phrase identifies Philip as one of the seven men previously appointed in Acts 6. 'Who was one of the seven' is clear and natural.
- source_word: ἐμείναμεν
  chosen: we stayed
  alternatives:
  - we remained
  - we lodged
  lexicon: BDAG
  rationale: In context of hospitality and travel, 'stayed' is the most natural modern English rendering. 'Remained' is more formal but less idiomatic.
- source_word: παρ’ αὐτῷ
  chosen: with him
  alternatives:
  - at his place
  - beside him
  lexicon: BDAG
  rationale: With μένω in a hospitality context, παρά with the dative indicates staying with someone. 'With him' is the clearest idiomatic rendering.
