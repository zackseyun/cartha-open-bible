theological_decisions:
- issue: Identification of Philip as 'one of the seven'
  chosen_reading: Retain the historical designation 'who was one of the seven' without expanding its ecclesial significance.
  alternative_readings:
  - who was one of the Seven
  rationale: The phrase likely alludes to the seven appointed in Acts 6, but the verse itself does not require capitalization or a technical office label in English. The translation preserves the historical reference without importing later church-structural claims.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
