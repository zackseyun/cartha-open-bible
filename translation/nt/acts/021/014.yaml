id: ACT.21.14
reference: Acts 21:14
source:
  edition: SBLGNT
  text: μὴ πειθομένου δὲ αὐτοῦ ἡσυχάσαμεν εἰπόντες· ⸂Τοῦ κυρίου τὸ θέλημα⸃ ⸀γινέσθω.
translation:
  text: And since he would not be persuaded[a], we became quiet, saying, “The Lord’s will be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we fell silent.”
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πειθομένου δὲ αὐτοῦ
  chosen: since he would not be persuaded
  alternatives:
  - when he would not be persuaded
  - because he would not be persuaded
  - as he was not persuaded
  lexicon: BDAG
  rationale: The genitive absolute with μή + present participle of πείθω conveys the circumstance that Paul was not yielding to their pleas. 'Would not be persuaded' preserves the passive/middle sense in context better than a more interpretive 'would not listen.' 'Since' gives a natural English connection to the following main verb.
- source_word: ἡσυχάσαμεν
  chosen: we became quiet
  alternatives:
  - we fell silent
  - we kept quiet
  - we stopped
  lexicon: BDAG
  rationale: ἡσυχάζω here means to cease pressing the matter and become quiet. 'We became quiet' preserves the ingressive aorist sense and avoids over-paraphrasing, while still sounding natural in English.
- source_word: εἰπόντες
  chosen: saying
  alternatives:
  - and said
  - as we said
  lexicon: BDAG
  rationale: 'The aorist participle is most naturally rendered with an English participial construction linked to the main verb: they became quiet, saying the words that follow.'
- source_word: Τοῦ κυρίου
  chosen: The Lord’s
  alternatives:
  - of the Lord
  - the Master's
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for this contested term. The possessive English form is the most natural way to render the genitive with θέλημα here.
- source_word: τὸ θέλημα
  chosen: will
  alternatives:
  - purpose
  - desire
  lexicon: BDAG
  rationale: θέλημα commonly denotes will or what one intends/desires. 'Will' is the standard and most fitting rendering in this prayer-like expression.
- source_word: γινέσθω
  chosen: be done
  alternatives:
  - happen
  - come to pass
  - take place
  lexicon: BDAG
  rationale: The present middle/passive imperative of γίνομαι in this idiom is well rendered 'be done,' expressing submission to the Lord's will. This also echoes familiar biblical idiom without distorting the Greek.
