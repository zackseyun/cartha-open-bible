id: ACT.21.15
reference: Acts 21:15
source:
  edition: SBLGNT
  text: Μετὰ δὲ τὰς ἡμέρας ταύτας ἐπισκευασάμενοι ἀνεβαίνομεν εἰς ⸀Ἱεροσόλυμα·
translation:
  text: After these days[a], having packed up, we went up to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'having made preparations' or 'having gotten ready.' The Greek participle may refer generally to preparing for the journey, not only to packing baggage.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ τὰς ἡμέρας ταύτας
  chosen: After these days
  alternatives:
  - After these days had passed
  - After those days
  lexicon: BDAG
  rationale: μετά with the accusative indicates temporal sequence, 'after.' The phrase refers back to the immediately preceding period. 'After these days' is natural English and stays close to the Greek without adding more than the text states.
- source_word: ἐπισκευασάμενοι
  chosen: having packed up
  alternatives:
  - having made preparations
  - having gotten ready
  - having packed our baggage
  lexicon: BDAG
  rationale: The participle can mean to prepare or equip oneself, and in this travel context likely refers to making ready for departure, possibly including packing baggage. 'Having packed up' gives a concrete, idiomatic sense that fits the journey setting while remaining within the semantic range. A broader alternative is preserved in a footnote because the term may denote general preparation rather than specifically packing luggage.
- source_word: ἀνεβαίνομεν
  chosen: we went up
  alternatives:
  - we were going up
  - we set out for
  lexicon: BDAG
  rationale: The imperfect here narrates the journey in past time. 'Went up' is the standard idiomatic rendering for travel to Jerusalem, preserving both the motion and the conventional/topographical sense of ascent. 'Set out for' would weaken the directional nuance.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: εἰς marks movement toward the city. In English, 'to Jerusalem' is the most natural rendering in travel narrative; 'into Jerusalem' is possible but less idiomatic here.
