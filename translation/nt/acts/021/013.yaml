theological_decisions:
- issue: Rendering κύριος in reference to Jesus
  chosen_reading: the Lord Jesus
  alternative_readings:
  - the Master Jesus
  rationale: Per doctrine, κύριος defaults to 'Lord.' In this context it is a christological
    title and should be translated, not paraphrased or weakened.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Preservation of 'the name' idiom
  chosen_reading: for the name of the Lord Jesus
  alternative_readings:
  - for the sake of the Lord Jesus
  - for the reputation of the Lord Jesus
  rationale: The text speaks of suffering 'for the name,' a biblical idiom with theological
    weight concerning Jesus' person and authority. The translation preserves the idiom
    rather than resolving it into a narrower explanatory phrase.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3, #6'
