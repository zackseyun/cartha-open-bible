id: ACT.21.13
reference: Acts 21:13
source:
  edition: SBLGNT
  text: ⸂τότε ἀπεκρίθη⸃ ὁ Παῦλος· Τί ποιεῖτε κλαίοντες καὶ συνθρύπτοντές μου τὴν καρδίαν;
    ἐγὼ γὰρ οὐ μόνον δεθῆναι ἀλλὰ καὶ ἀποθανεῖν εἰς Ἰερουσαλὴμ ἑτοίμως ἔχω ὑπὲρ τοῦ
    ὀνόματος τοῦ κυρίου Ἰησοῦ.
translation:
  text: Then Paul answered, “What are you doing, weeping and breaking my heart? For
    I am ready not only to be bound but even to die in Jerusalem for the name of the
    Lord Jesus.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “crushing my heart.” The Greek verb is stronger than simple sadness and
      pictures inward emotional breaking.
    reason: lexical_alternative
  - marker: b
    text: Or “for the sake of the name of the Lord Jesus.” “The name” is a biblical
      way of referring to Jesus himself, his authority, and the cause identified with
      him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative speech verb; 'answered' is natural and sufficiently
    formal in context.
- source_word: Τί ποιεῖτε
  chosen: What are you doing
  alternatives:
  - Why are you doing this
  lexicon: BDAG
  rationale: A direct rendering of the idiom that preserves Paul's emotional protest
    without adding interpretive force. 'Why are you doing this' is possible but less
    literal than the Greek question.
- source_word: κλαίοντες
  chosen: weeping
  alternatives:
  - crying
  lexicon: BDAG
  rationale: Retains the participial sense and solemn tone; 'weeping' fits the pathos
    of the scene.
- source_word: συνθρύπτοντές μου τὴν καρδίαν
  chosen: breaking my heart
  alternatives:
  - crushing my heart
  - shattering my heart
  lexicon: BDAG
  rationale: The verb conveys crushing or breaking together; in idiomatic English
    with 'heart,' 'breaking my heart' best communicates the emotional force while
    remaining faithful to the metaphor.
- source_word: δεθῆναι
  chosen: to be bound
  alternatives:
  - to be tied up
  - to be imprisoned
  lexicon: BDAG
  rationale: The aorist passive infinitive of δέω means 'to be bound.' 'Imprisoned'
    is interpretive and broader than the lexical sense, though contextually related.
- source_word: ἀποθανεῖν
  chosen: to die
  lexicon: BDAG
  rationale: Straightforward infinitive meaning; no expansion needed.
- source_word: εἰς Ἰερουσαλὴμ
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: BDAG
  rationale: Although εἰς commonly means 'into/to,' with verbs of being ready for
    what will occur there, idiomatic English expresses the location of suffering as
    'in Jerusalem.' This avoids awkwardness while preserving the sense.
- source_word: ἑτοίμως ἔχω
  chosen: I am ready
  alternatives:
  - I am prepared
  lexicon: BDAG
  rationale: This idiom means to be in readiness. 'I am ready' is concise and natural.
- source_word: ὑπὲρ τοῦ ὀνόματος
  chosen: for the name
  alternatives:
  - for the sake of the name
  - on behalf of the name
  lexicon: BDAG
  rationale: Preserves the biblical idiom of 'the name' as representing the person,
    authority, and cause of Jesus. 'For the sake of the name' is interpretive and
    can be preserved in a footnote.
- source_word: κυρίου Ἰησοῦ
  chosen: the Lord Jesus
  alternatives:
  - Lord Jesus
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The article is naturally
    represented in English as 'the Lord Jesus' in this construction.
