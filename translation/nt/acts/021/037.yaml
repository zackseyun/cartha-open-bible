id: ACT.21.37
reference: Acts 21:37
source:
  edition: SBLGNT
  text: Μέλλων τε εἰσάγεσθαι εἰς τὴν παρεμβολὴν ὁ Παῦλος λέγει τῷ χιλιάρχῳ· Εἰ ἔξεστίν
    μοι εἰπεῖν ⸀τι πρὸς σέ; ὁ δὲ ἔφη· Ἑλληνιστὶ γινώσκεις;
translation:
  text: As Paul was about to be brought into the barracks, he said to the tribune,
    “If it is permitted for me to say something to you?” And he said, “Do you know
    Greek?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “May I say something to you?”
    reason: lexical_alternative
  - marker: b
    text: Or “commander.” The Greek term refers to a Roman military officer, traditionally
      rendered “tribune.”
    reason: cultural_note
  - marker: c
    text: “Barracks” refers to the Roman military quarters, likely within the fortress
      complex.
    reason: cultural_note
lexical_decisions:
- source_word: Μέλλων τε εἰσάγεσθαι
  chosen: was about to be brought in
  alternatives:
  - was about to be led in
  - being about to be brought in
  lexicon: BDAG
  rationale: μέλλω with the present passive infinitive conveys imminence; the passive
    sense of εἰσάγεσθαι should be preserved. English smooths the participial construction
    into a temporal clause.
- source_word: παρεμβολή
  chosen: barracks
  alternatives:
  - camp
  - fortress
  lexicon: BDAG
  rationale: In this Jerusalem military setting, παρεμβολή refers to the Roman military
    quarters/fortress area rather than a generic camp. 'Barracks' is the most natural
    modern equivalent.
- source_word: χιλίαρχος
  chosen: tribune
  alternatives:
  - commander
  - military commander
  - chiliarch
  lexicon: BDAG
  rationale: The term denotes a Roman officer commanding roughly a cohort. 'Tribune'
    is a concise historical equivalent; 'commander' is possible but less specific.
- source_word: Εἰ ἔξεστίν μοι εἰπεῖν τι πρὸς σέ
  chosen: If it is permitted for me to say something to you?
  alternatives:
  - May I say something to you?
  - Is it lawful for me to say something to you?
  lexicon: BDAG
  rationale: ἔξεστιν expresses permission/allowance. The Greek is phrased as a polite
    conditional question. This rendering stays close to the form while remaining intelligible.
    A more idiomatic English alternative is preserved in a footnote.
- source_word: τι
  chosen: something
  alternatives:
  - a word
  - anything
  lexicon: BDAG
  rationale: The indefinite pronoun here naturally means 'something' in context.
- source_word: Ἑλληνιστί
  chosen: Greek
  alternatives:
  - in Greek
  - the Greek language
  lexicon: BDAG
  rationale: The adverb means 'in Greek' or 'in the Greek language.' English idiom
    with γινώσκεις is best rendered 'Do you know Greek?'
- source_word: γινώσκεις
  chosen: do you know
  alternatives:
  - can you speak
  - do you understand
  lexicon: BDAG
  rationale: γινώσκω fundamentally means 'know,' but in language contexts it can imply
    ability/understanding. 'Do you know Greek?' is both natural and sufficiently literal.
