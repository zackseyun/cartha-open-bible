id: ACT.21.20
reference: Acts 21:20
source:
  edition: SBLGNT
  text: οἱ δὲ ἀκούσαντες ἐδόξαζον τὸν ⸀θεόν, ⸂εἶπόν τε⸃ αὐτῷ· Θεωρεῖς, ἀδελφέ, πόσαι
    μυριάδες εἰσὶν ⸂ἐν τοῖς Ἰουδαίοις⸃ τῶν πεπιστευκότων, καὶ πάντες ζηλωταὶ τοῦ νόμου
    ὑπάρχουσιν·
translation:
  text: When they heard this, they glorified God, and they said to him, “You see,
    brother, how many thousands there are among the Jews who have believed, and they
    are all zealous for the law.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “how many tens of thousands.” The Greek μυριάδες can denote units of
      ten thousand or, more generally, a very large number.
    reason: lexical_alternative
  - marker: b
    text: Or “among the Judeans,” if taken geographically rather than ethnically/religiously.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when they heard this
  alternatives:
  - after hearing
  - when they heard
  lexicon: BDAG
  rationale: Aorist participle with an implied object from context; English supplies
    'this' naturally from the preceding report. 'When they heard this' gives smooth
    temporal sense without over-paraphrase.
- source_word: ἐδόξαζον
  chosen: they glorified
  alternatives:
  - they praised
  - they gave glory to
  lexicon: BDAG
  rationale: δοξάζω here denotes giving honor/glory to God. 'Glorified' preserves
    the theological weight better than the flatter 'praised'.
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἐδόξαζον; standard rendering.
- source_word: εἶπόν τε
  chosen: and they said
  alternatives:
  - then they said
  - and they told
  lexicon: BDAG
  rationale: The combination of aorist εἶπον with connective τέ is best represented
    by a simple coordinate clause in English. 'And they said' preserves the narrative
    flow.
- source_word: Θεωρεῖς
  chosen: You see
  alternatives:
  - You observe
  - You can see
  lexicon: BDAG
  rationale: Present indicative used rhetorically to direct Paul's attention to an
    evident situation. 'You see' is idiomatic and sufficiently close.
- source_word: ἀδελφέ
  chosen: brother
  lexicon: BDAG
  rationale: Vocative singular addressed to Paul. Gender-accurate rendering is appropriate
    because a specific male individual is addressed.
- source_word: πόσαι μυριάδες
  chosen: how many thousands
  alternatives:
  - how many tens of thousands
  - how many myriads
  lexicon: BDAG
  rationale: μυριάς can denote ten thousand or, more generally, a very large number.
    In idiomatic English here, 'how many thousands' communicates a large count naturally
    without the awkward transliteration 'myriads.' The more specific 'tens of thousands'
    is possible but slightly more interpretive, so it is preserved in a footnote.
- source_word: ἐν τοῖς Ἰουδαίοις
  chosen: among the Jews
  alternatives:
  - among the Judeans
  lexicon: BDAG
  rationale: In Acts this term can mean either ethnic/religious Jews or Judeans depending
    on context. Here the contrast is not geographical but refers to Jews as a people
    group within whom many have believed, so 'among the Jews' is the better rendering;
    'Judeans' is preserved as an alternative nuance in a footnote.
- source_word: τῶν πεπιστευκότων
  chosen: who have believed
  alternatives:
  - who are believers
  - who have come to faith
  lexicon: BDAG
  rationale: Perfect participle indicates those who have come to believe and remain
    in that state. 'Who have believed' preserves the verbal force better than the
    nominal 'believers'.
- source_word: ζηλωταὶ
  chosen: zealous
  alternatives:
  - ardent
  - devoted
  lexicon: BDAG
  rationale: Predicate nominative describing strong commitment. 'Zealous' is the most
    direct lexical equivalent and preserves the intensity.
- source_word: τοῦ νόμου
  chosen: for the law
  alternatives:
  - for the Law
  - for the Torah
  lexicon: BDAG
  rationale: νόμος here refers to the Mosaic law. Lowercase 'law' keeps readable English,
    while the referent is clear from context. 'Torah' is possible but would introduce
    a transliterated term not required by the Greek.
- source_word: ὑπάρχουσιν
  chosen: they are
  alternatives:
  - they exist as
  - they remain
  lexicon: BDAG
  rationale: ὑπάρχω in this context functions as a copular/existential verb. English
    naturally renders it simply as 'they are' with the predicate 'all zealous for
    the law.'
