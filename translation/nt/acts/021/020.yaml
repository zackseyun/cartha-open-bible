theological_decisions:
- issue: Reference of ἐν τοῖς Ἰουδαίοις
  chosen_reading: among the Jews
  alternative_readings:
  - among the Judeans
  rationale: The context concerns Jewish believers' continued zeal for the Mosaic
    law, emphasizing ethnic-religious identity rather than merely geographic residence
    in Judea. Rendering as 'Jews' avoids narrowing the scope unnecessarily while preserving
    the social-religious force of the statement.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of μυριάδες
  chosen_reading: how many thousands
  alternative_readings:
  - how many tens of thousands
  rationale: The Greek term can be either a precise 'ten thousand' unit or a broader
    expression for a very large number. The less over-specific English 'thousands'
    fits optimal equivalence in context, while the more precise alternative is worth
    preserving in a footnote.
  doctrine_reference: Translation philosophy §1, §6
