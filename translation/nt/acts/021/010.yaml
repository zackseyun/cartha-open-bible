id: ACT.21.10
reference: Acts 21:10
source:
  edition: SBLGNT
  text: ἐπιμενόντων ⸀δὲ ἡμέρας πλείους κατῆλθέν τις ἀπὸ τῆς Ἰουδαίας προφήτης ὀνόματι
    Ἅγαβος,
translation:
  text: While we were staying there for several days, a prophet named Agabus came
    down from Judea.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιμενόντων
  chosen: while we were staying there
  alternatives:
  - while they were staying
  - as we remained
  lexicon: BDAG
  rationale: Genitive plural present participle of ἐπιμένω, functioning in a genitive
    absolute with temporal force. The subject is implicit and contextually refers
    to Paul and his companions, so 'we' is appropriate in English narrative style.
    'Staying there' brings out continued remaining in the place just mentioned.
- source_word: δὲ
  chosen: while
  alternatives:
  - and
  - now
  - then
  lexicon: BDAG
  rationale: Though δέ often marks simple transition, in combination with the genitive
    absolute it is naturally absorbed into a temporal connective in English. 'While'
    conveys both the participial temporal sense and the mild discourse transition.
- source_word: ἡμέρας πλείους
  chosen: for several days
  alternatives:
  - more days
  - many days
  lexicon: BDAG
  rationale: Accusative of extent of time. πλείους literally means 'more,' but idiomatically
    in this context it refers to an additional number of days beyond an initial stay.
    'Several days' is natural English and preserves the sense without woodenly saying
    'more days.'
- source_word: κατῆλθέν
  chosen: came down
  alternatives:
  - went down
  - arrived
  lexicon: BDAG
  rationale: Aorist of κατέρχομαι. 'Came down' preserves the directional imagery conventional
    in travel to the coast/from Judea and fits the narrator's spatial perspective.
- source_word: τις
  chosen: a
  alternatives:
  - someone
  - a certain
  lexicon: BDAG
  rationale: Indefinite pronoun introducing a new participant. In English, 'a prophet'
    is smoother than 'someone, a prophet,' while still preserving indefiniteness.
- source_word: ἀπὸ τῆς Ἰουδαίας
  chosen: from Judea
  alternatives:
  - out of Judea
  - from the region of Judea
  lexicon: BDAG
  rationale: Straightforward source expression. 'Judea' is the standard English geographical
    form for Ἰουδαία in this context.
- source_word: προφήτης
  chosen: a prophet
  alternatives:
  - one who prophesies
  lexicon: BDAG
  rationale: Standard rendering of προφήτης. No reason to paraphrase; the narrative
    identifies Agabus by recognized prophetic role.
- source_word: ὀνόματι Ἅγαβος
  chosen: named Agabus
  alternatives:
  - by name Agabus
  lexicon: BDAG
  rationale: Dative ὀνόματι is an idiom meaning 'named/called.' 'Named Agabus' is
    idiomatic modern English while preserving the identification.
