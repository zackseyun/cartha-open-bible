id: ACT.21.11
reference: Acts 21:11
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν πρὸς ἡμᾶς καὶ ἄρας τὴν ζώνην τοῦ Παύλου δήσας ⸀ἑαυτοῦ τοὺς πόδας καὶ τὰς χεῖρας εἶπεν· Τάδε λέγει τὸ πνεῦμα τὸ ἅγιον Τὸν ἄνδρα οὗ ἐστιν ἡ ζώνη αὕτη, οὕτως δήσουσιν ἐν Ἰερουσαλὴμ οἱ Ἰουδαῖοι καὶ παραδώσουσιν εἰς χεῖρας ἐθνῶν.
translation:
  text: 'And coming to us[a], and taking Paul’s belt, he bound his own feet and hands and said[b], “Thus says the Holy Spirit: ‘In this way the Jews in Jerusalem will bind the man to whom this belt belongs and will hand him over into the hands of the Gentiles.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “whose belt this is.”
    reason: lexical_alternative
  - marker: b
    text: Or “Thus says the Holy Spirit” could be rendered “This is what the Holy Spirit says.”
    reason: alternative_reading
lexical_decisions:
- source_word: ζώνην
  chosen: belt
  alternatives:
  - waistband
  - girdle
  lexicon: BDAG
  rationale: ζώνη refers to a belt or sash worn around the waist. 'Belt' is the clearest modern English equivalent; 'girdle' is archaic and 'waistband' is less idiomatic here.
- source_word: δήσας ἑαυτοῦ τοὺς πόδας καὶ τὰς χεῖρας
  chosen: he bound his own feet and hands
  alternatives:
  - he tied up his own feet and hands
  lexicon: BDAG
  rationale: δέω means to bind or tie. 'Bound' preserves the formal prophetic sign-act and matches the future δήσουσιν later in the verse. ἑαυτοῦ is reflexive, indicating Agabus bound himself, not Paul.
- source_word: Τάδε λέγει
  chosen: Thus says
  alternatives:
  - These things says
  - This is what ... says
  lexicon: BDAG
  rationale: This formula echoes prophetic speech in Scripture. 'Thus says' preserves the solemn prophetic register in natural English.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard contemporary rendering of the divine person named in the text; 'Holy Ghost' is archaic in modern English.
- source_word: Τὸν ἄνδρα
  chosen: the man
  alternatives:
  - this man
  lexicon: BDAG
  rationale: ἀνήρ here refers specifically to an adult male individual, namely Paul. 'The man' matches the Greek article and keeps the prophetic wording intact.
- source_word: οὗ ἐστιν ἡ ζώνη αὕτη
  chosen: to whom this belt belongs
  alternatives:
  - whose belt this is
  lexicon: BDAG
  rationale: Both are accurate. The chosen rendering is slightly smoother in English while preserving the genitival relation expressed by οὗ.
- source_word: οὕτως
  chosen: In this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Links the enacted sign to the prediction. 'In this way' makes the demonstrative force clear in contemporary English.
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek says 'the Jews' without further qualification. 'Judeans' is possible in some contexts, but here the conventional ethnic-religious sense fits the Jerusalem setting. 'Jewish leaders' would add specificity not present in the text.
- source_word: παραδώσουσιν
  chosen: will hand him over
  alternatives:
  - will deliver him over
  - will betray
  lexicon: BDAG
  rationale: παραδίδωμι commonly means to hand over or deliver over. 'Hand him over' is natural modern English and fits the hostile transfer to Gentile authorities.
- source_word: εἰς χεῖρας ἐθνῶν
  chosen: into the hands of the Gentiles
  alternatives:
  - to the Gentiles
  - into Gentile hands
  lexicon: BDAG
  rationale: The idiom 'into the hands of' should be preserved because it is a common biblical expression for being delivered into another's power. ἐθνῶν in this context refers to non-Jews, hence 'Gentiles' rather than the more general 'nations'.
