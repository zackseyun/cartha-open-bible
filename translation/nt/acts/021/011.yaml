theological_decisions:
- issue: Rendering of prophetic formula as direct speech from the Spirit
  chosen_reading: Thus says the Holy Spirit
  alternative_readings:
  - This is what the Holy Spirit says
  rationale: The Greek closely mirrors biblical prophetic formulas. Retaining 'Thus says' preserves the text's claim to prophetic authority without adding doctrinal interpretation beyond the wording itself.
  doctrine_reference: Translation philosophy §1, §6
- issue: Reference of ἑαυτοῦ
  chosen_reading: Agabus bound his own feet and hands
  alternative_readings:
  - Agabus bound Paul's feet and hands
  rationale: The reflexive pronoun naturally refers to the subject of the participle, making the action a symbolic self-binding. This preserves the enacted prophecy as narrated in the Greek.
  doctrine_reference: Translation philosophy §1, §5
