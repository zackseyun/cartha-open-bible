id: ACT.21.40
reference: Acts 21:40
source:
  edition: SBLGNT
  text: ἐπιτρέψαντος δὲ αὐτοῦ ὁ Παῦλος ἑστὼς ἐπὶ τῶν ἀναβαθμῶν κατέσεισε τῇ χειρὶ
    τῷ λαῷ, πολλῆς δὲ σιγῆς γενομένης ⸀προσεφώνησεν τῇ Ἑβραΐδι διαλέκτῳ λέγων
translation:
  text: 'And when he had given permission, Paul, standing on the steps, motioned with
    his hand to the people. And when a great silence had come, he addressed them in
    the Hebrew language, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or possibly, 'in Aramaic.' The Greek reads 'in the Hebrew dialect/language,'
      which in this setting may refer to the local Semitic speech commonly called
      Aramaic.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιτρέψαντος δὲ αὐτοῦ
  chosen: And when he had given permission
  alternatives:
  - And after he had permitted it
  - And when he allowed him
  lexicon: BDAG
  rationale: Genitive absolute referring to the commander from the previous context.
    'Given permission' is idiomatic English and preserves the causal-temporal force
    without over-paraphrase.
- source_word: ἑστὼς ἐπὶ τῶν ἀναβαθμῶν
  chosen: standing on the steps
  alternatives:
  - having stood on the stairs
  - standing on the stairway
  lexicon: BDAG
  rationale: Perfect participle used descriptively of Paul's position. ἀναβαθμοί refers
    to the stairway/steps leading to the barracks; 'steps' is natural modern English.
- source_word: κατέσεισε τῇ χειρὶ τῷ λαῷ
  chosen: motioned with his hand to the people
  alternatives:
  - gestured with his hand to the crowd
  - beckoned to the people with his hand
  lexicon: BDAG
  rationale: κατασείω here denotes making a hand signal to quiet or address a crowd.
    'Motioned with his hand' is clear and sufficiently formal; 'people' reflects λαός
    without importing a more interpretive 'crowd' into the main text.
- source_word: τῷ λαῷ
  chosen: to the people
  alternatives:
  - to the crowd
  lexicon: BDAG
  rationale: λαός commonly means 'people.' In context it is the gathered populace,
    but 'people' preserves the lexical value more directly.
- source_word: πολλῆς δὲ σιγῆς γενομένης
  chosen: And when a great silence had come
  alternatives:
  - And when there was a great hush
  - And after much silence had fallen
  lexicon: BDAG
  rationale: Second genitive absolute. The phrase indicates the onset of substantial
    quiet. 'A great silence had come' keeps the eventive sense of γενομένης while
    remaining readable.
- source_word: προσεφώνησεν
  chosen: he addressed them
  alternatives:
  - he spoke to them
  - he called out to them
  lexicon: BDAG
  rationale: The verb means to address or speak to someone publicly. 'Addressed them'
    fits the formal public-speaking context.
- source_word: τῇ Ἑβραΐδι διαλέκτῳ
  chosen: in the Hebrew language
  alternatives:
  - in the Hebrew dialect
  - in Aramaic
  lexicon: BDAG
  rationale: The Greek expression is literally 'in the Hebrew dialect/language.' In
    Acts this likely refers to Aramaic, but the text says 'Hebrew'; the main text
    preserves the source wording, with the likely referent noted in a footnote.
- source_word: λέγων
  chosen: 'saying:'
  alternatives:
  - 'and said:'
  lexicon: BDAG
  rationale: Participle introducing the following speech. 'Saying:' is a standard
    and transparent way to introduce the direct discourse in the next verse.
