id: ACT.21.2
reference: Acts 21:2
source:
  edition: SBLGNT
  text: καὶ εὑρόντες πλοῖον διαπερῶν εἰς Φοινίκην ἐπιβάντες ἀνήχθημεν.
translation:
  text: And after finding a ship crossing over to Phoenicia, we went aboard and set
    sail.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a ship bound for Phoenicia.' The Greek literally describes a ship 'crossing
      over to Phoenicia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρόντες
  chosen: after finding
  alternatives:
  - having found
  - finding
  lexicon: BDAG
  rationale: Aorist participle indicating action prior to the main verb. 'After finding'
    makes the temporal sequence clear in natural English while preserving the participial
    force.
- source_word: πλοῖον
  chosen: a ship
  alternatives:
  - a vessel
  - a boat
  lexicon: BDAG
  rationale: Standard term for a seagoing vessel. 'Ship' is the most natural and contextually
    appropriate rendering for Mediterranean travel.
- source_word: διαπερῶν
  chosen: crossing over
  alternatives:
  - going across
  - sailing across
  - bound for
  lexicon: BDAG
  rationale: Present participle modifying 'ship,' describing its course. 'Crossing
    over' preserves the verbal idea of traversing the sea. 'Bound for' is idiomatic
    but slightly more interpretive than the Greek wording.
- source_word: εἰς Φοινίκην
  chosen: to Phoenicia
  alternatives:
  - for Phoenicia
  lexicon: BDAG
  rationale: εἰς marks destination. 'To Phoenicia' is the straightforward rendering
    of the route/destination.
- source_word: ἐπιβάντες
  chosen: we went aboard
  alternatives:
  - having boarded
  - after boarding
  lexicon: BDAG
  rationale: Aorist participle from ἐπιβαίνω, here in nautical context meaning to
    board a vessel. Rendering it with a finite verb in English improves readability
    while preserving the sequence before the main action.
- source_word: ἀνήχθημεν
  chosen: set sail
  alternatives:
  - put out to sea
  - we sailed away
  - we were brought up
  lexicon: BDAG
  rationale: In maritime usage ἀνάγω commonly means to put to sea or set sail. 'Set
    sail' is idiomatic modern English and fits the travel narrative better than a
    more literal but opaque rendering.
