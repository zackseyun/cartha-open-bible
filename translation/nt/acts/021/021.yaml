theological_decisions:
- issue: Nature of the accusation against Paul regarding the Mosaic law
  chosen_reading: Render the accusation as 'teaching ... to forsake Moses' without endorsing its truth or expanding it into a doctrinal statement about the law.
  alternative_readings:
  - teaching apostasy from Moses
  - teaching abandonment of the law of Moses
  rationale: The verse reports what others said about Paul, not Luke's own doctrinal conclusion. The translation should preserve the accusation's force while not importing a theological judgment beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
