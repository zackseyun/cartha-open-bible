id: ACT.21.21
reference: Acts 21:21
source:
  edition: SBLGNT
  text: κατηχήθησαν δὲ περὶ σοῦ ὅτι ἀποστασίαν διδάσκεις ἀπὸ Μωϋσέως τοὺς κατὰ τὰ ἔθνη πάντας Ἰουδαίους, λέγων μὴ περιτέμνειν αὐτοὺς τὰ τέκνα μηδὲ τοῖς ἔθεσιν περιπατεῖν.
translation:
  text: But they have been informed about you that you are teaching all the Jews among the Gentiles to forsake Moses[c][b][a], telling them not to circumcise their children nor to walk according to the customs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that you teach apostasy from Moses.' The Greek uses the noun ἀποστασία, meaning defection or abandonment.
    reason: lexical_alternative
  - marker: b
    text: '''Moses'' here stands for the Mosaic law and ancestral Jewish practice.'
    reason: cultural_note
  - marker: c
    text: Or 'nor to live according to the customs.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατηχήθησαν
  chosen: have been informed
  alternatives:
  - were instructed
  - were told
  - were informed
  lexicon: BDAG
  rationale: Passive of κατηχέω here refers to what people have been orally informed about Paul. 'Have been informed' captures the passive report sense in natural English and fits the present relevance of the report.
- source_word: ἀποστασίαν
  chosen: to forsake
  alternatives:
  - apostasy
  - rebellion
  - defection
  lexicon: BDAG
  rationale: The noun denotes abandonment or defection. In this context, an abstract noun in English ('apostasy from Moses') sounds wooden and may overstate a technical theological category; 'to forsake Moses' expresses the accusation's force clearly while preserving the idea of turning away.
- source_word: ἀπὸ Μωϋσέως
  chosen: Moses
  alternatives:
  - from Moses
  - from the law of Moses
  lexicon: BDAG
  rationale: The preposition with ἀποστασίαν is incorporated idiomatically into 'forsake Moses.' 'Moses' here stands metonymically for the Mosaic law/customary Jewish practice; the translation preserves the Greek wording rather than expanding it to 'law of Moses' in the main text.
- source_word: τοὺς κατὰ τὰ ἔθνη πάντας Ἰουδαίους
  chosen: all the Jews among the Gentiles
  alternatives:
  - all the Jews throughout the nations
  - all the Jews living among the Gentiles
  lexicon: BDAG
  rationale: κατὰ τὰ ἔθνη refers to Jews dispersed among the nations/Gentiles. 'Among the Gentiles' is concise, natural, and contextually clear in Acts.
- source_word: λέγων
  chosen: telling them
  alternatives:
  - saying
  - by telling them
  lexicon: BDAG
  rationale: The participle explains the content/manner of the alleged teaching. 'Telling them' reads naturally in English and connects the participle to the Jews just mentioned.
- source_word: μὴ περιτέμνειν αὐτοὺς τὰ τέκνα
  chosen: not to circumcise their children
  alternatives:
  - not to circumcise the children
  - not to circumcise their sons
  lexicon: BDAG
  rationale: αὐτούς functions as the possessive idea with τὰ τέκνα in idiomatic English, hence 'their children.' Although circumcision applies to males, the Greek says 'children,' so the broader term is retained rather than narrowed to 'sons.'
- source_word: μηδὲ τοῖς ἔθεσιν περιπατεῖν
  chosen: nor to walk according to the customs
  alternatives:
  - nor to live according to the customs
  - nor to follow the customs
  lexicon: BDAG
  rationale: περιπατεῖν is literally 'to walk' but commonly means conduct one's life. 'Walk according to' preserves the metaphor and remains understandable in biblical English; 'customs' renders ἔθεσιν as inherited Jewish practices.
