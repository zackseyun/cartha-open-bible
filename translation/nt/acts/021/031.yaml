id: ACT.21.31
reference: Acts 21:31
source:
  edition: SBLGNT
  text: ζητούντων ⸀τε αὐτὸν ἀποκτεῖναι ἀνέβη φάσις τῷ χιλιάρχῳ τῆς σπείρης ὅτι ὅλη
    ⸀συγχύννεται Ἰερουσαλήμ,
translation:
  text: And as they were seeking to kill him, a report went up to the commander of
    the cohort that all Jerusalem was in an uproar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was in confusion' or 'was in turmoil.'
    reason: lexical_alternative
  - marker: b
    text: '''Commander of the cohort'' refers to a Roman military officer (a tribune)
      in charge of the cohort stationed there.'
    reason: cultural_note
lexical_decisions:
- source_word: ζητούντων τε
  chosen: And as they were seeking
  alternatives:
  - while they were trying
  - as they were attempting
  lexicon: BDAG
  rationale: The genitive absolute with present participle conveys ongoing action
    contemporaneous with the main verb. 'Seeking' preserves the verbal aspect and
    avoids overinterpreting motive beyond the Greek.
- source_word: αὐτὸν ἀποκτεῖναι
  chosen: to kill him
  alternatives:
  - to put him to death
  lexicon: BDAG
  rationale: ἀποκτείνω is the ordinary verb for killing. 'Kill him' is the most direct
    and natural rendering in modern English.
- source_word: ἀνέβη φάσις
  chosen: a report went up
  alternatives:
  - word came up
  - news reached
  lexicon: BDAG
  rationale: The idiom literally uses 'went up' with 'report,' reflecting movement
    upward to the fortress/commander. 'A report went up' preserves the imagery while
    remaining intelligible. More idiomatic alternatives are possible but less formally
    transparent.
- source_word: τῷ χιλιάρχῳ
  chosen: to the commander
  alternatives:
  - to the tribune
  - to the chiliarch
  lexicon: BDAG
  rationale: χιλίαρχος denotes a military commander, roughly a tribune. 'Commander'
    is clear modern English; 'tribune' is historically specific but less accessible,
    and 'chiliarch' is transliterated jargon.
- source_word: τῆς σπείρης
  chosen: of the cohort
  alternatives:
  - of the Roman cohort
  - of the regiment
  lexicon: BDAG
  rationale: σπεῖρα refers to a cohort, a Roman military unit. 'Cohort' is both accurate
    and reasonably understandable. 'Roman' is implied by context but not explicit
    in this verse, so it is not added to the main text.
- source_word: ὅτι ὅλη Ἰερουσαλήμ
  chosen: that all Jerusalem
  alternatives:
  - that the whole city of Jerusalem
  lexicon: BDAG
  rationale: The phrase is a natural metonymy for the city and its populace. 'All
    Jerusalem' preserves the compact force of the Greek without unnecessary expansion.
- source_word: συγχύννεται
  chosen: was in an uproar
  alternatives:
  - was in confusion
  - was being thrown into confusion
  - was in turmoil
  lexicon: BDAG
  rationale: The present passive indicates the city was in a state of disturbance/confusion.
    'Was in an uproar' communicates the public disorder idiomatically in English and
    fits the narrative context of mob unrest.
