id: ACT.21.23
reference: Acts 21:23
source:
  edition: SBLGNT
  text: τοῦτο οὖν ποίησον ὅ σοι λέγομεν· εἰσὶν ἡμῖν ἄνδρες τέσσαρες εὐχὴν ἔχοντες
    ⸀ἀφ’ ἑαυτῶν.
translation:
  text: 'Therefore do what we tell you: we have four men who have a vow upon themselves.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who have taken a vow.' The Greek literally says 'having a vow.'
    reason: lexical_alternative
  - marker: b
    text: The wider context may suggest a Nazirite-type vow, but the verse itself
      states only 'a vow.'
    reason: cultural_note
lexical_decisions:
- source_word: τοῦτο οὖν
  chosen: Therefore
  alternatives:
  - So
  - Therefore, this
  lexicon: BDAG
  rationale: οὖν marks an inferential transition; rendering the phrase compactly as
    'Therefore' gives natural English while preserving the logical connection. τοῦτο
    is then carried into the following command ('do what...').
- source_word: ποίησον
  chosen: do
  alternatives:
  - carry out
  - do this
  lexicon: BDAG
  rationale: Aorist imperative of ποιέω is naturally rendered 'do' here. 'Carry out'
    is possible but less direct; the object is supplied by the following relative
    clause.
- source_word: ὅ σοι λέγομεν
  chosen: what we tell you
  alternatives:
  - what we are saying to you
  - what we say to you
  lexicon: BDAG
  rationale: The relative pronoun with λέγομεν functions idiomatically as the content
    of the command. Present tense is best rendered in idiomatic English as 'tell'
    rather than the more wooden 'are saying.'
- source_word: εἰσὶν ἡμῖν
  chosen: we have
  alternatives:
  - there are for us
  - there are among us
  lexicon: BDAG
  rationale: 'The existential construction with dative ἡμῖν is idiomatically expressed
    in English as possession: ''we have.'' This is clearer and more natural than a
    literal rendering.'
- source_word: ἄνδρες τέσσαρες
  chosen: four men
  alternatives:
  - four males
  lexicon: BDAG
  rationale: ἀνήρ refers to adult male persons; 'men' is the natural gender-accurate
    rendering in line with the translation philosophy.
- source_word: εὐχὴν ἔχοντες
  chosen: who are under a vow
  alternatives:
  - having a vow
  - who have taken a vow
  lexicon: BDAG
  rationale: The participial phrase denotes men bound by a vow. 'Under a vow' communicates
    the ongoing state more idiomatically than the wooden 'having a vow,' while avoiding
    over-specification beyond the Greek.
- source_word: ἀφ’ ἑαυτῶν
  chosen: of their own
  alternatives:
  - upon themselves
  - on their own behalf
  lexicon: BDAG
  rationale: The phrase most naturally indicates that the vow pertains to themselves
    / is their own. 'Of their own' preserves this sense in smooth English without
    forcing a more technical interpretation.
