theological_decisions:
- issue: Nature of the vow in context
  chosen_reading: Render generically as 'a vow' without specifying Nazirite in the
    main text.
  alternative_readings:
  - a Nazirite vow
  rationale: Although the wider context strongly suggests a Nazirite-type vow, the
    verse itself says only εὐχήν. To avoid importing more than the text explicitly
    states, the main text remains generic.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation
    tradition; Never paraphrase beyond what the source text warrants.'
