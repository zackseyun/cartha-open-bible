theological_decisions:
- issue: Nature of the apostolic decree's prohibitions
  chosen_reading: Render the four prohibitions straightforwardly without narrowing them to one specific theological system in the main text.
  alternative_readings:
  - Interpret the food laws as purely temporary table-fellowship concessions
  - Interpret them as permanently binding universal moral law
  rationale: The verse reports the content of a prior apostolic decision but does not itself explain the full theological rationale or duration of each prohibition. The translation therefore preserves the decree's wording without importing a denominational interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
