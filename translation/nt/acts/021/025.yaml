id: ACT.21.25
reference: Acts 21:25
source:
  edition: SBLGNT
  text: περὶ δὲ τῶν πεπιστευκότων ἐθνῶν ἡμεῖς ⸀ἀπεστείλαμεν ⸀κρίναντες φυλάσσεσθαι αὐτοὺς τό τε εἰδωλόθυτον ⸀καὶ αἷμα καὶ πνικτὸν καὶ πορνείαν.
translation:
  text: But concerning the Gentiles who have believed[a], we sent word, having decided that they should keep themselves from what is sacrificed to idols, and from blood, and from what is strangled[c][b], and from sexual immorality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'we sent word'; the Greek verb 'sent' leaves the object implicit, though the context points back to the letter/decree sent in Acts 15.
    reason: lexical_alternative
  - marker: b
    text: Or 'that they should abstain from.'
    reason: lexical_alternative
  - marker: c
    text: That is, food associated with idol sacrifices.
    reason: cultural_note
lexical_decisions:
- source_word: περὶ δὲ
  chosen: But concerning
  alternatives:
  - Now concerning
  - As for
  lexicon: BDAG
  rationale: περὶ with the genitive introduces the topic under discussion ('concerning/regarding'), while δέ marks a mild transition or contrast with the preceding discussion about Jewish believers. 'But concerning' preserves both functions naturally in English.
- source_word: τῶν πεπιστευκότων ἐθνῶν
  chosen: the Gentiles who have believed
  alternatives:
  - the believing Gentiles
  - the Gentiles who are believers
  lexicon: BDAG
  rationale: The perfect participle πεπιστευκότων denotes those who have come to faith and remain in that state. Rendering it as a relative clause is natural English and preserves the completed-yet-continuing force. ἐθνῶν here clearly means Gentiles rather than 'nations' in context.
- source_word: ἡμεῖς
  chosen: we
  lexicon: BDAG
  rationale: 'The explicit pronoun adds emphasis: ''we'' ourselves had already acted on this matter. English can preserve this simply with ''we'' without artificial stress marking.'
- source_word: ἀπεστείλαμεν
  chosen: sent a letter
  alternatives:
  - sent word
  - sent
  lexicon: BDAG
  rationale: Although the direct object is not repeated in this verse, the context refers to the Jerusalem letter/decree previously sent (Acts 15). Supplying 'a letter' makes the English idiomatic and reflects the implied object without adding new content beyond the immediate narrative context.
- source_word: κρίναντες
  chosen: having decided
  alternatives:
  - having judged
  - after deciding
  - having determined
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb and expresses the council's formal decision. 'Having decided' is clear modern English and avoids overly judicial wording while retaining deliberative force.
- source_word: φυλάσσεσθαι αὐτοὺς
  chosen: that they should keep themselves from
  alternatives:
  - that they should abstain from
  - to keep themselves from
  lexicon: BDAG
  rationale: φυλάσσεσθαι can mean to guard/keep oneself from. Here it governs the listed prohibited items. 'Keep themselves from' is slightly more formal and reflects the reflexive nuance better than a bare 'abstain,' though that is a viable alternative.
- source_word: τό τε εἰδωλόθυτον
  chosen: what is sacrificed to idols
  alternatives:
  - food sacrificed to idols
  - idol-sacrifices
  lexicon: BDAG
  rationale: εἰδωλόθυτον refers to meat/food associated with idol sacrifice. 'What is sacrificed to idols' closely follows the Greek and avoids narrowing the term more than necessary, while remaining understandable.
- source_word: αἷμα
  chosen: blood
  lexicon: BDAG
  rationale: A straightforward rendering. In this decree it refers to consuming blood, but the Greek simply says 'blood,' so the translation preserves the concise form.
- source_word: πνικτόν
  chosen: what is strangled
  alternatives:
  - meat from strangled animals
  - the strangled thing
  lexicon: BDAG
  rationale: πνικτόν denotes an animal killed by strangling/suffocation, with blood not drained. 'What is strangled' is a literal and readable rendering that matches the parallel structure of the list.
- source_word: πορνείαν
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual misconduct
  lexicon: BDAG
  rationale: πορνεία is broader than premarital sex alone and in early Christian/Jewish moral discourse covers illicit sexual behavior generally. 'Sexual immorality' is the standard accessible rendering and best captures the breadth of the term.
