id: ACT.21.17
reference: Acts 21:17
source:
  edition: SBLGNT
  text: Γενομένων δὲ ἡμῶν εἰς Ἱεροσόλυμα ἀσμένως ⸀ἀπεδέξαντο ἡμᾶς οἱ ἀδελφοί.
translation:
  text: When we arrived in Jerusalem, the brothers welcomed us gladly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers,' which can also
      refer to fellow believers more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γενομένων δὲ ἡμῶν
  chosen: When we arrived
  alternatives:
  - After we came
  - When we came
  lexicon: BDAG
  rationale: The genitive absolute with γίνομαι here functions idiomatically to mark
    the circumstance/time of arrival. 'When we arrived' gives natural English while
    preserving the temporal sense better than a wooden 'when we came to be.'
- source_word: εἰς Ἱεροσόλυμα
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  - into Jerusalem
  lexicon: BDAG
  rationale: With the arrival verb implied by the genitive absolute, εἰς marks destination.
    In idiomatic English after 'arrived,' 'in Jerusalem' is preferred, though the
    sense is arrival to Jerusalem.
- source_word: ἀσμένως
  chosen: gladly
  alternatives:
  - warmly
  - with joy
  lexicon: BDAG
  rationale: The adverb denotes gladness or eagerness in receiving someone. 'Gladly'
    is concise and semantically close; 'warmly' is possible but slightly more interpretive.
- source_word: ἀπεδέξαντο
  chosen: welcomed
  alternatives:
  - received
  - accepted
  lexicon: BDAG
  rationale: ἀποδέχομαι here refers to receiving persons hospitably. 'Welcomed' communicates
    the interpersonal sense more clearly in modern English than the more formal 'received.'
- source_word: οἱ ἀδελφοί
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the believers
  lexicon: BDAG
  rationale: Following the project's gender-accurate policy, the masculine plural
    ἀδελφοί is rendered 'brothers.' In early Christian usage it can include the wider
    believing community, but the translation preserves the source form; an inclusive
    nuance is worth noting in a footnote rather than replacing the term in the main
    text.
