theological_decisions:
- issue: Gendered rendering of ἀδελφοί for the Jerusalem Christian community
  chosen_reading: the brothers
  alternative_readings:
  - the brothers and sisters
  - the believers
  rationale: The Greek uses the masculine plural noun ἀδελφοί. Per the doctrine's
    gender-accurate policy, the main text should match the source's form and likely
    representative force rather than flatten it into a gender-neutral term. Because
    the referent may well include women within the Christian community, that inclusive
    possibility is preserved in a footnote rather than adopted in the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
