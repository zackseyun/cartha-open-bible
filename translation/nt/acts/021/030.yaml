id: ACT.21.30
reference: Acts 21:30
source:
  edition: SBLGNT
  text: ἐκινήθη τε ἡ πόλις ὅλη καὶ ἐγένετο συνδρομὴ τοῦ λαοῦ, καὶ ἐπιλαβόμενοι τοῦ Παύλου εἷλκον αὐτὸν ἔξω τοῦ ἱεροῦ, καὶ εὐθέως ἐκλείσθησαν αἱ θύραι.
translation:
  text: And the whole city was stirred up[a], and a crowd of the people formed; and after seizing Paul, they dragged him outside the temple[c][b], and immediately the doors were shut.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the people rushed together.' The Greek expression describes a sudden convergence of the crowd.
    reason: lexical_alternative
  - marker: b
    text: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary.
    reason: cultural_note
  - marker: c
    text: Or 'the gates were shut,' since the word can refer to access doors/gates in this temple setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκινήθη
  chosen: was stirred up
  alternatives:
  - was moved
  - was set in motion
  - was thrown into turmoil
  lexicon: BDAG
  rationale: Passive of κινέω here is idiomatic for civic agitation rather than literal motion. 'Was stirred up' captures the city's collective disturbance in natural English without over-paraphrasing.
- source_word: τε
  chosen: and
  alternatives:
  - now
  - indeed
  - ''
  lexicon: BDAG
  rationale: The enclitic τε links the clause with mild continuity. English usually absorbs this with a simple coordinating 'and' rather than a separate particle.
- source_word: ἡ πόλις ὅλη
  chosen: the whole city
  alternatives:
  - the entire city
  - all the city
  lexicon: BDAG
  rationale: A straightforward rendering of the noun with attributive adjective; 'the whole city' is idiomatic and preserves the scope of the disturbance.
- source_word: ἐγένετο συνδρομὴ τοῦ λαοῦ
  chosen: a crowd of the people formed
  alternatives:
  - there was a running together of the people
  - an uproar of the people arose
  - the people rushed together
  lexicon: BDAG
  rationale: συνδρομή denotes a concourse/rush together. 'A crowd of the people formed' communicates the gathering action in readable English while preserving the sense of public convergence. The genitive τοῦ λαοῦ is taken as the people who made up the gathering.
- source_word: ἐπιλαβόμενοι
  chosen: after seizing
  alternatives:
  - taking hold of
  - laying hold of
  - grabbing
  lexicon: BDAG
  rationale: The participle of ἐπιλαμβάνομαι often means to take hold of someone physically. 'After seizing' conveys force and temporal sequence naturally.
- source_word: εἷλκον
  chosen: they were dragging
  alternatives:
  - they dragged
  - they pulled
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing action as the mob moved Paul. 'They were dragging' preserves the imperfective aspect better than a simple past.
- source_word: ἔξω τοῦ ἱεροῦ
  chosen: outside the temple
  alternatives:
  - out of the temple precincts
  - outside the temple courts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex/precincts rather than the inner sanctuary. 'Temple' is retained in the main text for readability, with the precinct nuance preserved in a footnote.
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: A common adverb of promptness; 'immediately' is clear modern English.
- source_word: ἐκλείσθησαν αἱ θύραι
  chosen: the doors were shut
  alternatives:
  - the gates were shut
  - the doors were closed
  lexicon: BDAG
  rationale: θύραι literally means 'doors,' but in temple context could refer to gates/doors of the precinct access points. 'Doors were shut' stays close to the Greek while remaining natural; the contextual alternative 'gates' is preserved in a footnote.
