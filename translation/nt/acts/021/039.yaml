- issue: Rendering Ἰουδαῖος in context
  chosen_reading: Jewish / Jew rather than Judean
  alternative_readings:
  - Judean
  rationale: In this context Paul is identifying his ethnic-religious identity before
    the Roman commander, while separately naming Tarsus in Cilicia as his city. 'Jewish
    man' best preserves that distinction and avoids implying that his origin was Judea.
  doctrine_reference: Translation philosophy §1, §4
