theological_decisions:
- issue: Reference of 'the Law' (τοῦ νόμου)
  chosen_reading: Capitalized as 'the Law' to indicate the Mosaic Law
  alternative_readings:
  - lowercase 'the law' as a more generic reference
  rationale: In this Jerusalem temple context, the accusation is specifically that Paul teaches against the Jewish Law, not law in an abstract sense. Capitalization helps modern readers catch the referent without altering meaning.
  doctrine_reference: 'Translation philosophy: readable modern English; original-language primacy over tradition where context clarifies referent.'
- issue: Rendering of ἱερόν
  chosen_reading: Main text 'temple' with footnote clarifying the broader temple complex
  alternative_readings:
  - '''temple courts'' in the main text'
  - '''temple precincts'' in the main text'
  rationale: English 'temple' is the most natural main-text rendering, but ἱερόν denotes the temple complex rather than the inner sanctuary. The nuance is important for auditability and historical accuracy, so it is preserved in a footnote.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve significant lexical nuance in documentation/footnotes.'
