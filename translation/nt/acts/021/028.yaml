id: ACT.21.28
reference: Acts 21:28
source:
  edition: SBLGNT
  text: κράζοντες· Ἄνδρες Ἰσραηλῖται, βοηθεῖτε· οὗτός ἐστιν ὁ ἄνθρωπος ὁ κατὰ τοῦ λαοῦ καὶ τοῦ νόμου καὶ τοῦ τόπου τούτου πάντας ⸀πανταχῇ διδάσκων, ἔτι τε καὶ Ἕλληνας εἰσήγαγεν εἰς τὸ ἱερὸν καὶ κεκοίνωκεν τὸν ἅγιον τόπον τοῦτον.
translation:
  text: shouting[a], “Men of Israel, help! This is the man who teaches everyone everywhere against the people and the law and this place. And besides that, he has even brought Greeks into the temple and has defiled this holy place.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek ἱερόν refers to the temple complex or courts, not specifically the inner sanctuary.
    reason: lexical_alternative
lexical_decisions:
- source_word: κράζοντες
  chosen: shouting
  alternatives:
  - crying out
  - yelling
  lexicon: BDAG
  rationale: Present participle introducing the manner of their accusation. 'Shouting' is natural modern English and preserves the public, urgent outcry without becoming overly colloquial.
- source_word: Ἄνδρες Ἰσραηλῖται
  chosen: Men of Israel
  alternatives:
  - Men, Israelites
  - Israelite men
  lexicon: BDAG
  rationale: Vocative address. 'Men of Israel' is the most idiomatic English equivalent and preserves the masculine form in keeping with the gender-accurate policy.
- source_word: βοηθεῖτε
  chosen: help!
  alternatives:
  - come help!
  - help us!
  lexicon: BDAG
  rationale: Imperative cry for assistance. The Greek does not explicitly include 'us,' so the concise 'help!' avoids adding content not stated in the text.
- source_word: οὗτός ἐστιν ὁ ἄνθρωπος
  chosen: This is the man
  alternatives:
  - This is that man
  - Here is the man
  lexicon: BDAG
  rationale: Straightforward identificational statement. 'This is the man' is idiomatic and preserves the accusatory force.
- source_word: ὁ κατὰ τοῦ λαοῦ καὶ τοῦ νόμου καὶ τοῦ τόπου τούτου
  chosen: against the people and the Law and this place
  alternatives:
  - against the people and the law and this place
  lexicon: BDAG
  rationale: κατά with the genitive indicates opposition. 'The people' refers to the Jewish people in context; 'the Law' is capitalized to reflect likely reference to the Mosaic Law rather than law in general; 'this place' refers to the temple precincts.
- source_word: πάντας πανταχῇ διδάσκων
  chosen: who teaches everyone everywhere
  alternatives:
  - teaching all people everywhere
  - who teaches all men everywhere
  lexicon: BDAG
  rationale: The participial phrase modifies 'the man.' πάντας + πανταχῇ is best represented by the emphatic 'everyone everywhere.' 'Everyone' communicates the broad scope naturally in modern English.
- source_word: ἔτι τε καὶ
  chosen: And besides that
  alternatives:
  - Moreover
  - And further
  lexicon: BDAG
  rationale: This combination intensifies the accusation by adding a further charge. 'And besides that' captures the cumulative rhetorical force in readable English.
- source_word: Ἕλληνας
  chosen: Greeks
  alternatives:
  - Gentiles
  lexicon: BDAG
  rationale: The lexical sense is specifically 'Greeks,' not the broader 'Gentiles.' Since the accusation concerns bringing non-Jews into the temple area, 'Greeks' should be retained as the direct wording.
- source_word: εἰσήγαγεν εἰς τὸ ἱερὸν
  chosen: has even brought Greeks into the temple
  alternatives:
  - brought Greeks into the temple courts
  - led Greeks into the temple
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός). 'Temple' is acceptable in the main text for readability, with a footnote preserving the more precise sense 'temple courts/precincts.' The perfective force is adequately conveyed in English accusation style with 'has ... brought.'
- source_word: κεκοίνωκεν
  chosen: has defiled
  alternatives:
  - has made common
  - has profaned
  lexicon: BDAG
  rationale: κοινόω in cultic context means to render unclean/profane. 'Has defiled' is the clearest modern English equivalent and fits the temple-purity accusation.
- source_word: τὸν ἅγιον τόπον τοῦτον
  chosen: this holy place
  alternatives:
  - this sacred place
  lexicon: BDAG
  rationale: A natural rendering preserving the demonstrative emphasis and the cultic holiness of the temple area.
