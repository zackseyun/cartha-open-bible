id: ACT.21.7
reference: Acts 21:7
source:
  edition: SBLGNT
  text: Ἡμεῖς δὲ τὸν πλοῦν διανύσαντες ἀπὸ Τύρου κατηντήσαμεν εἰς Πτολεμαΐδα, καὶ ἀσπασάμενοι τοὺς ἀδελφοὺς ἐμείναμεν ἡμέραν μίαν παρ’ αὐτοῖς.
translation:
  text: We[a], having finished the voyage from Tyre, arrived at Ptolemais, and after greeting the brothers, we stayed with them one day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the brothers and sisters'; the Greek says 'brothers,' a masculine plural that can refer to fellow believers more broadly.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμεῖς δὲ
  chosen: We
  alternatives:
  - Now we
  - But we
  lexicon: BDAG
  rationale: The explicit pronoun marks the narrative subject, while δέ signals transition/continuation. In natural English, 'We' carries the subject adequately without forcing an awkward connective; the transitional force is absorbed into the flow of the sentence.
- source_word: τὸν πλοῦν διανύσαντες
  chosen: having finished the voyage
  alternatives:
  - having completed the voyage
  - having made the voyage
  lexicon: BDAG
  rationale: διανύω means to complete or finish a span/journey, and πλοῦς is a sea voyage/sailing. 'Having finished the voyage' preserves the participial sequence and the sense of bringing the sea journey to its end.
- source_word: ἀπὸ Τύρου
  chosen: from Tyre
  alternatives:
  - after leaving Tyre
  lexicon: BDAG
  rationale: ἀπό straightforwardly marks point of departure. 'From Tyre' is the most direct rendering.
- source_word: κατηντήσαμεν
  chosen: arrived
  alternatives:
  - came to
  - reached
  lexicon: BDAG
  rationale: καταντάω in travel context means to arrive at or reach a destination. 'Arrived' is idiomatic and precise.
- source_word: εἰς Πτολεμαΐδα
  chosen: at Ptolemais
  alternatives:
  - in Ptolemais
  - to Ptolemais
  lexicon: BDAG
  rationale: With verbs of motion εἰς marks destination. In English, 'arrived at Ptolemais' is the most natural collocation.
- source_word: ἀσπασάμενοι
  chosen: after greeting
  alternatives:
  - having greeted
  - after welcoming
  lexicon: BDAG
  rationale: ἀσπάζομαι commonly means to greet or welcome. 'After greeting' renders the aorist participle as antecedent action in smooth English.
- source_word: τοὺς ἀδελφοὺς
  chosen: the brothers
  alternatives:
  - the brothers and sisters
  - the fellow believers
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and in early Christian usage often refers to fellow believers, potentially including women. Per the project's gender-accurate policy, the main text keeps 'brothers' rather than neutralizing it; inclusivity can be noted in a footnote.
- source_word: ἐμείναμεν
  chosen: we stayed
  alternatives:
  - we remained
  - we spent
  lexicon: BDAG
  rationale: μένω means remain or stay. 'Stayed' is natural modern English in a lodging/travel context.
- source_word: ἡμέραν μίαν
  chosen: one day
  alternatives:
  - for one day
  - a day
  lexicon: BDAG
  rationale: The accusative of extent of time indicates duration. 'One day' is concise and idiomatic; the duration sense is clear with 'stayed.'
- source_word: παρ’ αὐτοῖς
  chosen: with them
  alternatives:
  - among them
  - at their place
  lexicon: BDAG
  rationale: παρά with the dative here indicates being in the company/presence of persons. 'With them' best captures the relational and locative sense.
