id: ACT.21.27
reference: Acts 21:27
source:
  edition: SBLGNT
  text: Ὡς δὲ ἔμελλον αἱ ἑπτὰ ἡμέραι συντελεῖσθαι, οἱ ἀπὸ τῆς Ἀσίας Ἰουδαῖοι θεασάμενοι αὐτὸν ἐν τῷ ἱερῷ συνέχεον πάντα τὸν ὄχλον καὶ ἐπέβαλον ⸂ἐπ’ αὐτὸν τὰς χεῖρας⸃,
translation:
  text: As the seven days were about to be completed[a], the Jews from Asia, seeing him in the temple, stirred up the whole crowd and laid hands on him[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'threw the whole crowd into confusion.' The Greek verb can emphasize either stirring up or confusing the crowd.
    reason: lexical_alternative
  - marker: b
    text: Or 'seized him.' The expression 'laid hands on him' is an idiom for taking hold of someone forcibly.
    reason: lexical_alternative
  - marker: c
    text: '''Temple'' here translates the Greek term for the temple complex or precincts, not specifically the inner sanctuary.'
    reason: cultural_note
lexical_decisions:
- source_word: Ὡς δὲ
  chosen: As
  alternatives:
  - Now as
  - And as
  lexicon: BDAG
  rationale: Introduces the temporal setting of the action. 'As' is natural English and preserves the sense of events unfolding at that time; δέ is left implicit rather than separately rendered to avoid stiffness.
- source_word: ἔμελλον ... συντελεῖσθαι
  chosen: were about to be completed
  alternatives:
  - were nearly over
  - were about to end
  - were being completed
  lexicon: BDAG
  rationale: μέλλω with the infinitive conveys imminence ('were about to'), and συντελεῖσθαι indicates being brought to completion. This preserves both the progressive timing and the completion nuance better than the simpler 'were nearly over.'
- source_word: αἱ ἑπτὰ ἡμέραι
  chosen: the seven days
  alternatives:
  - the seven-day period
  lexicon: BDAG
  rationale: A straightforward rendering of the phrase, likely referring to the purification period mentioned in context. 'The seven days' is sufficiently clear without importing explanatory material into the main text.
- source_word: οἱ ἀπὸ τῆς Ἀσίας Ἰουδαῖοι
  chosen: the Jews from Asia
  alternatives:
  - the Asian Jews
  - the Jews from the province of Asia
  lexicon: BDAG
  rationale: ἀπὸ τῆς Ἀσίας denotes origin or association with the Roman province of Asia. 'The Jews from Asia' is idiomatic and avoids possible ambiguity of 'Asian' for modern readers.
- source_word: θεασάμενοι
  chosen: seeing
  alternatives:
  - when they saw
  - having seen
  - catching sight of
  lexicon: BDAG
  rationale: The participle is contemporaneous or slightly antecedent in sense. 'Seeing' keeps the participial flow and links their observation directly to their reaction.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple courts
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary. 'Temple' is the standard readable rendering; the more precise 'temple courts/precincts' is possible but not necessary in the main text.
- source_word: συνέχεον πάντα τὸν ὄχλον
  chosen: stirred up the whole crowd
  alternatives:
  - threw the whole crowd into confusion
  - agitated the whole crowd
  lexicon: BDAG
  rationale: συγχέω can mean to confuse, stir up, or throw into disorder. In this mob scene, 'stirred up' best captures incitement and resulting agitation in natural English. πάντα with τὸν ὄχλον is rendered idiomatically as 'the whole crowd.'
- source_word: ἐπέβαλον ἐπ’ αὐτὸν τὰς χεῖρας
  chosen: laid hands on him
  alternatives:
  - seized him
  - put their hands on him
  lexicon: BDAG
  rationale: This idiom commonly denotes physically taking hold of or arresting someone. 'Laid hands on him' preserves the idiomatic force and leaves the exact degree of force appropriately broad; 'seized him' is a valid interpretive alternative.
