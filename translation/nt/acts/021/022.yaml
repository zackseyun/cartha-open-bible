id: ACT.21.22
reference: Acts 21:22
source:
  edition: SBLGNT
  text: τί οὖν ἐστιν; πάντως ⸀ἀκούσονται ὅτι ἐλήλυθας.
translation:
  text: What then is to be done? They will certainly hear that you have come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'What then is it?' The Greek idiom asks what should
      be done in view of the situation.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί οὖν ἐστιν;
  chosen: What then is to be done?
  alternatives:
  - What then is it?
  - What then?
  - What is to be done, then?
  lexicon: BDAG
  rationale: Literally the phrase is 'What then is it?' but in context it functions
    idiomatically as a practical question about the situation and next step. Rendering
    it as 'What then is to be done?' brings out the discourse force in natural English
    without over-paraphrasing.
- source_word: πάντως
  chosen: certainly
  alternatives:
  - surely
  - by all means
  - in any case
  lexicon: BDAG
  rationale: Here the adverb intensifies the certainty of the following event. 'Certainly'
    best fits the predictive sense in context.
- source_word: ἀκούσονται
  chosen: they will hear
  alternatives:
  - they will come to hear
  - it will be heard
  lexicon: BDAG
  rationale: Future middle of ἀκούω here is best taken in the active sense 'they will
    hear.' The plural subject is implicit from context (the Jewish believers/community),
    so English supplies 'they.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of what will be heard, not a causal clause.
- source_word: ἐλήλυθας
  chosen: you have come
  alternatives:
  - you have arrived
  - you came
  lexicon: BDAG
  rationale: Perfect of ἔρχομαι emphasizes the present result of Paul's arrival. 'You
    have come' preserves the aspect better than simple past 'you came'; 'arrived'
    is possible but less directly tied to the Greek verb.
