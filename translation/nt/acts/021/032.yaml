id: ACT.21.32
reference: Acts 21:32
source:
  edition: SBLGNT
  text: ὃς ἐξαυτῆς παραλαβὼν στρατιώτας καὶ ἑκατοντάρχας κατέδραμεν ἐπ’ αὐτούς, οἱ δὲ ἰδόντες τὸν χιλίαρχον καὶ τοὺς στρατιώτας ἐπαύσαντο τύπτοντες τὸν Παῦλον.
translation:
  text: He immediately took soldiers and centurions and ran down to them[a], and when they saw the tribune and the soldiers, they stopped beating Paul.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'military tribune' or 'commander' for the Roman χιλίαρχος, the officer in command of a cohort.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαυτῆς
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: The adverbial expression indicates immediate action. 'Immediately' is natural modern English and preserves the urgency better than the more archaic 'straightway.'
- source_word: παραλαβὼν
  chosen: took
  alternatives:
  - took along
  - gathered
  lexicon: BDAG
  rationale: In context the participle describes the commander taking soldiers with him before moving. 'Took' is concise and idiomatic; 'took along' is possible but slightly more expansive than needed.
- source_word: στρατιώτας
  chosen: soldiers
  alternatives:
  - troops
  lexicon: BDAG
  rationale: The ordinary sense is individual soldiers. 'Troops' is broader and less precise.
- source_word: ἑκατοντάρχας
  chosen: centurions
  alternatives:
  - captains of hundreds
  lexicon: BDAG
  rationale: This is the standard Roman military title. 'Centurions' is the clearest established English equivalent.
- source_word: κατέδραμεν ἐπ’ αὐτούς
  chosen: ran down to them
  alternatives:
  - rushed down upon them
  - ran down against them
  lexicon: BDAG
  rationale: The verb with ἐπί conveys rapid movement toward the crowd from the higher location of the fortress area. 'Ran down to them' preserves both the speed and likely downward movement without overstating hostility.
- source_word: χιλίαρχον
  chosen: tribune
  alternatives:
  - commander
  - military tribune
  lexicon: BDAG
  rationale: The term denotes the Roman cohort commander. 'Tribune' is a concise historical equivalent; 'military tribune' is more explicit but heavier in running text.
- source_word: ἐπαύσαντο
  chosen: stopped
  alternatives:
  - ceased
  - desisted
  lexicon: BDAG
  rationale: The middle verb here means they stopped their action. 'Stopped' is clear modern English.
- source_word: τύπτοντες
  chosen: beating
  alternatives:
  - striking
  - hitting
  lexicon: BDAG
  rationale: The participle denotes repeated physical blows. 'Beating' best conveys the ongoing violent action in idiomatic English.
