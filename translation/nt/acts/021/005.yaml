id: ACT.21.5
reference: Acts 21:5
source:
  edition: SBLGNT
  text: ὅτε δὲ ἐγένετο ⸂ἐξαρτίσαι ἡμᾶς⸃ τὰς ἡμέρας, ἐξελθόντες ἐπορευόμεθα προπεμπόντων ἡμᾶς πάντων σὺν γυναιξὶ καὶ τέκνοις ἕως ἔξω τῆς πόλεως, καὶ θέντες τὰ γόνατα ἐπὶ τὸν αἰγιαλὸν ⸀προσευξάμενοι
translation:
  text: When it came time for us to complete those days[a], we departed and went on our way, while they all, with wives and children, were accompanying us as far as outside the city. And after kneeling down on the beach[b], we prayed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'all were seeing us off.' The Greek verb can denote accompanying someone on departure as an act of farewell.
    reason: lexical_alternative
  - marker: b
    text: Or 'on the shore' or 'on the seashore.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ⸂ἐξαρτίσαι ἡμᾶς⸃ τὰς ἡμέρας
  chosen: it came time for us to complete those days
  alternatives:
  - our days there were ended
  - we had completed the days
  - the time came to finish the days
  lexicon: BDAG
  rationale: The idiom with ἐγένετο + infinitive marks the arrival of a point in time ('it came time'), and ἐξαρτίζω here means to complete or finish a set period. 'Those days' preserves the article and the concrete reference to the allotted stay more closely than a freer paraphrase.
- source_word: ἐξελθόντες ἐπορευόμεθα
  chosen: we departed and went on our way
  alternatives:
  - we set out
  - we went away
  lexicon: BDAG
  rationale: The participle plus imperfect main verb conveys departure followed by continued travel. 'Departed and went on our way' preserves both elements without awkwardness.
- source_word: προπεμπόντων ἡμᾶς πάντων
  chosen: they all ... were accompanying us
  alternatives:
  - all were escorting us
  - all were seeing us off
  lexicon: BDAG
  rationale: προπέμπω can mean accompany/escort someone on departure, often as an act of sending off. 'Accompanying us' fits the participial construction and the scene of believers going with them out of the city. The more idiomatic 'seeing us off' is preserved as an alternative.
- source_word: σὺν γυναιξὶ καὶ τέκνοις
  chosen: with wives and children
  alternatives:
  - with women and children
  lexicon: BDAG
  rationale: Given πάντων is masculine plural and the scene describes whole households joining the farewell, γυναιξὶ most naturally means 'wives' rather than simply 'women.' This is gender-accurate and contextually specific.
- source_word: ἕως ἔξω τῆς πόλεως
  chosen: as far as outside the city
  alternatives:
  - to the outskirts of the city
  - out of the city
  lexicon: BDAG
  rationale: The phrase indicates accompaniment to a point beyond the city limits. 'As far as outside the city' is slightly wooden but preserves the directional force better than the smoother 'to the outskirts,' which is interpretive.
- source_word: θέντες τὰ γόνατα
  chosen: after kneeling down
  alternatives:
  - having placed their knees
  - having knelt
  lexicon: BDAG
  rationale: This is an idiomatic expression for kneeling. 'After kneeling down' renders the aorist participle naturally in English while preserving the action preceding prayer.
- source_word: ἐπὶ τὸν αἰγιαλὸν
  chosen: on the beach
  alternatives:
  - on the shore
  - on the seashore
  lexicon: BDAG
  rationale: αἰγιαλός denotes shore/beach. 'Beach' is clear modern English; 'shore' is a viable alternative and slightly more formal.
- source_word: προσευξάμενοι
  chosen: we prayed
  alternatives:
  - having prayed
  lexicon: BDAG
  rationale: The nominative plural participle refers to the traveling party, likely including the gathered believers in the scene, but English commonly resolves the sequence with a finite verb. 'We prayed' keeps the narrative flowing and matches Luke's first-person travel account.
