id: ACT.21.1
reference: Acts 21:1
source:
  edition: SBLGNT
  text: Ὡς δὲ ἐγένετο ἀναχθῆναι ἡμᾶς ἀποσπασθέντας ἀπ’ αὐτῶν, εὐθυδρομήσαντες ἤλθομεν
    εἰς τὴν ⸀Κῶ, τῇ δὲ ἑξῆς εἰς τὴν Ῥόδον, κἀκεῖθεν εἰς Πάταρα·
translation:
  text: After we had torn ourselves away from them and put out to sea, we ran a straight
    course and came to Cos, and on the next day to Rhodes, and from there to Patara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Kos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡς δὲ ἐγένετο
  chosen: After
  alternatives:
  - When it happened that
  - When
  lexicon: BDAG
  rationale: The idiom ὡς δὲ ἐγένετο + infinitive introduces the next event in narrative
    sequence. 'After' gives natural English while preserving the temporal transition
    without woodenly reproducing the Greek idiom.
- source_word: ἀναχθῆναι
  chosen: put out to sea
  alternatives:
  - set sail
  - put to sea
  lexicon: BDAG
  rationale: ἀνάγω in nautical contexts means to put out to sea or set sail. 'Put
    out to sea' is clear modern English and fits the infinitival construction with
    ἐγένετο.
- source_word: ἀποσπασθέντας ἀπ’ αὐτῶν
  chosen: had torn ourselves away from them
  alternatives:
  - had parted from them
  - had been separated from them
  lexicon: BDAG
  rationale: ἀποσπάω is stronger than a neutral 'depart'; it conveys being pulled
    or torn away. The middle/passive participial sense in context reflects the emotional
    difficulty of the separation, so 'torn ourselves away' best preserves the force.
- source_word: εὐθυδρομήσαντες
  chosen: ran a straight course
  alternatives:
  - sailed straight
  - made a direct voyage
  lexicon: BDAG
  rationale: The nautical verb means to sail a straight course. 'Ran a straight course'
    preserves the maritime flavor and the directness of the route.
- source_word: ἤλθομεν εἰς
  chosen: came to
  alternatives:
  - arrived at
  - went to
  lexicon: BDAG
  rationale: ἔρχομαι with εἰς in travel narrative is naturally rendered 'came to'
    or 'arrived at.' 'Came to' keeps the flow of the itinerary concise.
- source_word: Κῶ
  chosen: Cos
  alternatives:
  - Kos
  lexicon: BDAG
  rationale: A standard English transliteration of the island name. 'Cos' is traditional
    in many English Bible renderings; 'Kos' is a viable modern alternative preserved
    in a footnote.
- source_word: τῇ δὲ ἑξῆς
  chosen: on the next day
  alternatives:
  - the following day
  - on the next day after that
  lexicon: BDAG
  rationale: This temporal dative idiom means 'on the next day' or 'the following
    day.' The chosen rendering is idiomatic and precise.
- source_word: Ῥόδον
  chosen: Rhodes
  lexicon: BDAG
  rationale: Standard English transliteration of the island name.
- source_word: κἀκεῖθεν
  chosen: from there
  alternatives:
  - and from there
  - and then from there
  lexicon: BDAG
  rationale: The crasis of καί + ἐκεῖθεν links the next leg of the journey. In English,
    'from there' sufficiently carries the sense in the coordinated sequence.
- source_word: Πάταρα
  chosen: Patara
  lexicon: BDAG
  rationale: Standard English transliteration of the place name.
