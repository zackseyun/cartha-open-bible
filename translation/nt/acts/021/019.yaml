theological_decisions:
- issue: Agency in Paul's missionary report
  chosen_reading: God is presented as the one who acted, with Paul as the instrumental servant through whose ministry those acts occurred.
  alternative_readings:
  - Paul reported what he himself accomplished among the Gentiles
  rationale: The clause ὧν ἐποίησεν ὁ θεὸς explicitly assigns the action to God, while διὰ τῆς διακονίας αὐτοῦ marks Paul's ministry as the means. The translation preserves divine agency and human instrumentality without diminishing either.
