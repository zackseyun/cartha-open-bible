id: ACT.21.19
reference: Acts 21:19
source:
  edition: SBLGNT
  text: καὶ ἀσπασάμενος αὐτοὺς ἐξηγεῖτο καθ’ ἓν ἕκαστον ὧν ἐποίησεν ὁ θεὸς ἐν τοῖς ἔθνεσιν διὰ τῆς διακονίας αὐτοῦ.
translation:
  text: And after greeting them[b][a], he began to relate one by one the things that God had done among the Gentiles through his ministry.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'among the nations.' In this context, the phrase refers to the Gentiles, that is, non-Jewish peoples.
    reason: lexical_alternative
  - marker: b
    text: Or 'he recounted in detail' or 'he explained.' The Greek verb suggests an extended, item-by-item report.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπασάμενος
  chosen: after greeting
  alternatives:
  - having greeted
  - welcoming
  lexicon: BDAG
  rationale: Aorist middle participle preceding the main verb, naturally rendered as an action prior to the narration. 'After greeting' is idiomatic modern English and preserves the sequence without unnecessary stiffness.
- source_word: ἐξηγεῖτο
  chosen: he began to relate
  alternatives:
  - he explained
  - he recounted
  - he reported in detail
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing or progressive narration. The verb can mean to recount, relate, or explain in detail. 'Began to relate' captures the imperfective sense of setting forth an extended report, without overtranslating technical nuance.
- source_word: καθ’ ἓν ἕκαστον
  chosen: one by one
  alternatives:
  - in detail
  - each one individually
  - one thing after another
  lexicon: BDAG
  rationale: This idiom emphasizes item-by-item narration. 'One by one' is concise, natural English that preserves the distributive force.
- source_word: ὧν ἐποίησεν ὁ θεὸς
  chosen: the things that God had done
  alternatives:
  - what God did
  - the things God did
  lexicon: BDAG
  rationale: The relative pronoun with the aorist verb points to specific acts. 'The things that God had done' fits the English syntax after 'relate one by one' and foregrounds God as the true actor in Paul's report.
- source_word: ἐν τοῖς ἔθνεσιν
  chosen: among the Gentiles
  alternatives:
  - among the nations
  - among the non-Jews
  lexicon: BDAG
  rationale: In Acts, ἔθνη in this context refers to Gentiles rather than nations in a geopolitical sense. 'Among the Gentiles' is the clearest contextual rendering and matches common NT usage.
- source_word: διὰ τῆς διακονίας αὐτοῦ
  chosen: through his ministry
  alternatives:
  - through his service
  - by means of his ministry
  lexicon: BDAG
  rationale: διά with the genitive marks means or instrumentality. διακονία can mean service or ministry; here it refers to Paul's apostolic work. 'Through his ministry' is natural and contextually precise without importing ecclesiastical office language beyond the text.
