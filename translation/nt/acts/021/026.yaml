id: ACT.21.26
reference: Acts 21:26
source:
  edition: SBLGNT
  text: τότε ὁ Παῦλος παραλαβὼν τοὺς ἄνδρας τῇ ἐχομένῃ ἡμέρᾳ σὺν αὐτοῖς ἁγνισθεὶς
    εἰσῄει εἰς τὸ ἱερόν, διαγγέλλων τὴν ἐκπλήρωσιν τῶν ἡμερῶν τοῦ ἁγνισμοῦ ἕως οὗ
    προσηνέχθη ὑπὲρ ἑνὸς ἑκάστου αὐτῶν ἡ προσφορά.
translation:
  text: Then Paul took the men, and on the next day, having purified himself with
    them, he entered the temple, giving notice of the completion of the days of purification,
    until the offering was presented for each one of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the temple precincts'; the Greek ἱερόν refers to the temple complex,
      not specifically the inner sanctuary.
    reason: lexical_alternative
  - marker: b
    text: Or 'was offered' for 'was presented.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραλαβὼν
  chosen: took
  alternatives:
  - took along
  - took with him
  lexicon: BDAG
  rationale: Aorist participle indicating Paul took the men with him for the stated
    purpose. 'Took' is natural English and sufficiently captures the action without
    over-specifying accompaniment.
- source_word: τῇ ἐχομένῃ ἡμέρᾳ
  chosen: on the next day
  alternatives:
  - the following day
  - on the succeeding day
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning the day immediately following.
    'On the next day' is clear modern English.
- source_word: σὺν αὐτοῖς
  chosen: with them
  alternatives:
  - together with them
  lexicon: BDAG
  rationale: Simple accompaniment. Rendered directly and attached to Paul's purification.
- source_word: ἁγνισθεὶς
  chosen: having purified himself
  alternatives:
  - having undergone purification
  - having been purified
  lexicon: BDAG
  rationale: The participle refers to ritual purification in the temple context. 'Having
    purified himself' communicates the middle/reflexive sense naturally in English,
    while avoiding the ambiguity of a purely passive rendering.
- source_word: εἰσῄει
  chosen: he was entering
  alternatives:
  - he entered
  - he went into
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing or repeated action rather than a simple
    punctiliar event. 'He was entering' preserves that aspect better than the traditional
    simple past, though the exact nuance may include customary entry during the period.
- source_word: τὸ ἱερόν
  chosen: the temple
  alternatives:
  - the temple courts
  - the temple precincts
  lexicon: BDAG
  rationale: ἱερόν denotes the temple complex rather than the inner sanctuary (ναός).
    'The temple' is the standard readable rendering; the broader precinct sense is
    noted as an alternative but need not be forced into the main text here.
- source_word: διαγγέλλων
  chosen: giving notice
  alternatives:
  - declaring
  - reporting
  - announcing
  lexicon: BDAG
  rationale: The participle describes formal communication to the temple authorities
    about the purification timetable. 'Giving notice' best fits the procedural context.
- source_word: τὴν ἐκπλήρωσιν τῶν ἡμερῶν τοῦ ἁγνισμοῦ
  chosen: of the completion of the days of purification
  alternatives:
  - that the days of purification would be completed
  - of the fulfillment of the days of purification
  lexicon: BDAG
  rationale: A fairly formal phrase referring to the end point of the required purification
    period. 'Completion' is more idiomatic than 'fulfillment' in this ritual-calendar
    context.
- source_word: ἕως οὗ
  chosen: until
  alternatives:
  - up to the time when
  lexicon: BDAG
  rationale: Marks the terminus of the purification period and notice process. 'Until'
    is sufficient and natural.
- source_word: προσηνέχθη
  chosen: was presented
  alternatives:
  - was offered
  - had been offered
  lexicon: BDAG
  rationale: Passive of προσφέρω in sacrificial context. 'Was presented' preserves
    the formal cultic sense and avoids sounding overly interpretive, though 'was offered'
    is also viable.
- source_word: ὑπὲρ ἑνὸς ἑκάστου αὐτῶν
  chosen: for each one of them
  alternatives:
  - on behalf of each one of them
  - for every one of them
  lexicon: BDAG
  rationale: ὑπέρ here indicates representation/benefit in relation to the offering.
    'For each one of them' is clear and idiomatic.
- source_word: ἡ προσφορά
  chosen: the offering
  alternatives:
  - the sacrifice
  - the offering sacrifice
  lexicon: BDAG
  rationale: General cultic term for an offering. 'Offering' is the most direct and
    least over-specific rendering; 'sacrifice' could narrow the sense beyond the Greek
    term itself.
