theological_decisions:
- issue: Nature of Paul's action in the temple purification rite
  chosen_reading: Render the verse straightforwardly as describing Paul's participation
    in Jewish purification procedures without adding explanatory theological framing.
  alternative_readings:
  - Render in a way that implies endorsement or rejection of the continuing validity
    of temple rites for Christians
  rationale: The verse narrates an event and does not itself resolve broader theological
    debates about law observance, apostolic practice, or covenant theology. Per translation
    philosophy, doctrinal conclusions not explicit in the text should not be imported.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Aspect of εἰσῄει
  chosen_reading: Preserve the imperfect nuance with 'he was entering.'
  alternative_readings:
  - Use simple past 'he entered' for smoother English
  rationale: The Greek imperfect likely reflects ongoing or iterative action during
    the purification period. Preserving that nuance improves transparency to the source
    text, even if slightly less idiomatic.
  doctrine_reference: Translation philosophy item 1
