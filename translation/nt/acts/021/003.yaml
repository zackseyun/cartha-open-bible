id: ACT.21.3
reference: Acts 21:3
source:
  edition: SBLGNT
  text: ⸀ἀναφάναντες δὲ τὴν Κύπρον καὶ καταλιπόντες αὐτὴν εὐώνυμον ἐπλέομεν εἰς Συρίαν,
    καὶ ⸀κατήλθομεν εἰς Τύρον, ἐκεῖσε γὰρ ⸂τὸ πλοῖον ἦν⸃ ἀποφορτιζόμενον τὸν γόμον.
translation:
  text: After sighting Cyprus and leaving it on our left, we sailed on to Syria and
    came down to Tyre, for there the ship was unloading its cargo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'came in sight of Cyprus.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'leaving it on the left'; that is, Cyprus remained on the ship's
      left side as they sailed.
    reason: cultural_note
  - marker: c
    text: Or 'arrived at Tyre.' The Greek more literally says 'came down to Tyre.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the ship was being unloaded' or 'was discharging its cargo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναφάναντες
  chosen: after sighting
  alternatives:
  - after coming in sight of
  - after seeing
  lexicon: BDAG
  rationale: Aorist participle indicating prior action relative to the main verb ἐπλέομεν.
    'After sighting' is concise, natural English and preserves the nautical/travel
    sense of coming into view.
- source_word: καταλιπόντες αὐτὴν εὐώνυμον
  chosen: leaving it on our left
  alternatives:
  - leaving it to port
  - passing it on the left side
  lexicon: BDAG
  rationale: εὐώνυμος literally means 'left(-hand).' In a sailing context it denotes
    the left side as they traveled, i.e., Cyprus remained on the ship's left. 'On
    our left' is clear modern English; 'to port' is possible but more technical.
- source_word: ἐπλέομεν εἰς Συρίαν
  chosen: we sailed on to Syria
  alternatives:
  - we sailed to Syria
  - we continued sailing to Syria
  lexicon: BDAG
  rationale: Imperfect ἐπλέομεν presents the ongoing voyage. 'Sailed on to' captures
    continued travel naturally without overtranslating the imperfect.
- source_word: κατήλθομεν εἰς Τύρον
  chosen: came down to Tyre
  alternatives:
  - went down to Tyre
  - arrived at Tyre
  lexicon: BDAG
  rationale: κατέρχομαι commonly means 'go/come down.' Although English might simply
    say 'arrived at,' retaining 'came down' preserves Luke's directional idiom while
    remaining understandable.
- source_word: ἐκεῖσε
  chosen: there
  alternatives:
  - to that place
  lexicon: BDAG
  rationale: Adverb referring to Tyre as the reason for stopping there. 'There' is
    the natural English equivalent.
- source_word: ἀποφορτιζόμενον
  chosen: was unloading
  alternatives:
  - was being unloaded
  - was discharging
  lexicon: BDAG
  rationale: Present middle/passive participle with ἦν forms a periphrastic construction.
    The verb can mean unload/discharge cargo. 'Was unloading' is idiomatic English
    for a ship offloading cargo; passive 'was being unloaded' is also possible but
    less natural here.
- source_word: τὸν γόμον
  chosen: its cargo
  alternatives:
  - the cargo
  - the load
  - the freight
  lexicon: BDAG
  rationale: γόμος denotes a ship's freight/cargo. 'Its cargo' makes explicit in English
    that the cargo belongs to the ship and reads smoothly.
