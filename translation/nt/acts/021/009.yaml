theological_decisions:
- issue: Rendering of παρθένοι in a context involving women with prophetic ministry
  chosen_reading: unmarried
  alternative_readings:
  - virgins
  rationale: The verse states both their marital/sexual status and their prophetic activity, but it does not explain any theological relation between the two. Rendering παρθένοι as 'unmarried' avoids importing later doctrinal valuations of virginity while still conveying the likely social sense in context. The more literal 'virgins' is preserved in a footnote because it is a significant lexical alternative.
  doctrine_reference: 'Translation philosophy: readable modern English; preserve theological tension rather than resolve it.'
