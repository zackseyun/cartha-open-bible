id: ACT.21.9
reference: Acts 21:9
source:
  edition: SBLGNT
  text: τούτῳ δὲ ἦσαν θυγατέρες ⸂τέσσαρες παρθένοι⸃ προφητεύουσαι.
translation:
  text: He had four virgin daughters who were prophesying.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'four virgin daughters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτῳ
  chosen: He
  alternatives:
  - This man
  - To him
  lexicon: BDAG
  rationale: Dative singular of οὗτος refers back to Philip in the immediate context.
    English idiom prefers an explicit subject pronoun rather than a more literal 'to
    this man' with 'there were.'
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - now
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective/continuative particle. In natural English
    it is best left untranslated, with the connection carried by sentence flow.
- source_word: ἦσαν
  chosen: had
  alternatives:
  - there were
  - were
  lexicon: BDAG
  rationale: 'The existential construction τούτῳ ... ἦσαν θυγατέρες is most naturally
    rendered in English as possession: ''he had daughters,'' rather than the more
    wooden ''to him there were daughters.'''
- source_word: θυγατέρες
  chosen: daughters
  alternatives:
  - female children
  lexicon: BDAG
  rationale: Standard familial sense; 'daughters' is the natural and precise English
    equivalent.
- source_word: τέσσαρες
  chosen: four
  lexicon: BDAG
  rationale: Cardinal numeral directly modifying 'daughters.'
- source_word: παρθένοι
  chosen: unmarried
  alternatives:
  - virgins
  - maidens
  lexicon: BDAG
  rationale: παρθένος can denote a virgin, often with the social implication of an
    unmarried young woman. In contemporary English, 'virgins' is formally possible
    but can sound clinically narrow or distracting; 'unmarried' communicates the likely
    social state in readable modern English while preserving the sense relevant to
    the narrative. The more literal alternative is preserved in a footnote for auditability.
- source_word: προφητεύουσαι
  chosen: who were prophesying
  alternatives:
  - prophesying
  - who prophesied
  lexicon: BDAG
  rationale: Present active participle, nominative feminine plural, modifying 'daughters.'
    'Who were prophesying' captures the attributive participial force and ongoing
    characteristic/activity better than a simple past finite verb.
