id: ACT.21.4
reference: Acts 21:4
source:
  edition: SBLGNT
  text: ⸂ἀνευρόντες δὲ τοὺς⸃ μαθητὰς ἐπεμείναμεν αὐτοῦ ἡμέρας ἑπτά, οἵτινες τῷ Παύλῳ ἔλεγον διὰ τοῦ πνεύματος μὴ ⸀ἐπιβαίνειν εἰς ⸀Ἱεροσόλυμα.
translation:
  text: After finding the disciples[a], we stayed there seven days. They kept telling Paul through the Spirit not to go up to Jerusalem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by the Spirit.' The phrase may indicate that the Spirit revealed Paul's coming suffering, from which the disciples drew the conclusion that he should not go on to Jerusalem.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνευρόντες
  chosen: After finding
  alternatives:
  - having found
  - when we found
  lexicon: BDAG
  rationale: Aorist participle introducing prior action relative to the main verb. 'After finding' is natural English and preserves the sequence without over-paraphrase.
- source_word: μαθητάς
  chosen: the disciples
  alternatives:
  - the disciples there
  - the believers
  lexicon: BDAG
  rationale: Standard rendering of μαθητής in Acts. 'Disciples' preserves the term's established sense better than the broader 'believers'.
- source_word: ἐπεμείναμεν αὐτοῦ
  chosen: we stayed there
  alternatives:
  - we remained there
  - we stayed with them there
  lexicon: BDAG
  rationale: ἐπιμένω here means to remain/stay. αὐτοῦ is idiomatic for location ('there'). 'Stayed there' is clear modern English; 'with them' is possible by implication but not explicit, so omitted from the main text.
- source_word: ἡμέρας ἑπτά
  chosen: seven days
  alternatives:
  - for seven days
  lexicon: BDAG
  rationale: Accusative of extent of time. English commonly expresses this as 'seven days'; the duration sense is clear from the verb.
- source_word: οἵτινες
  chosen: They
  alternatives:
  - who
  - and they
  lexicon: BDAG
  rationale: Refers back to the disciples with a qualitative/explicative nuance. A new English sentence with 'They' reads naturally while preserving the referent.
- source_word: ἔλεγον
  chosen: kept telling
  alternatives:
  - were saying
  - told
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or continued action. 'Kept telling' captures the durative force better than simple past 'told'.
- source_word: διὰ τοῦ πνεύματος
  chosen: through the Spirit
  alternatives:
  - through the Holy Spirit
  - by the Spirit
  lexicon: BDAG
  rationale: The phrase indicates means or agency. In Acts, πνεῦμα in this construction naturally refers to the Holy Spirit; 'the Spirit' is idiomatic and sufficiently explicit in Christian usage, while avoiding adding 'Holy' where the Greek does not state it.
- source_word: μὴ ἐπιβαίνειν
  chosen: not to go up
  alternatives:
  - not to set foot on
  - not to embark for
  - not to go
  lexicon: BDAG
  rationale: ἐπιβαίνω can mean to go onto/board or to set foot on, but with εἰς Ἱεροσόλυμα in travel context it functions idiomatically as proceeding to a destination. 'Go up' also fits Jerusalem's conventional directional idiom in biblical usage.
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard destination rendering. 'To Jerusalem' is natural English for travel.
