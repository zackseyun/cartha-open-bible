theological_decisions:
- issue: How to render διὰ τοῦ πνεύματος in relation to Paul's journey
  chosen_reading: through the Spirit
  alternative_readings:
  - by the Spirit
  rationale: The text states that the disciples were speaking to Paul 'through the Spirit,' without requiring the translation to resolve the broader interpretive tension with Acts 19:21; 20:22-23 about whether this was a Spirit-given warning or a prohibition inferred from revelation. The rendering preserves the wording and leaves the tension intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
