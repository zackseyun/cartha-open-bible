id: ACT.21.16
reference: Acts 21:16
source:
  edition: SBLGNT
  text: συνῆλθον δὲ καὶ τῶν μαθητῶν ἀπὸ Καισαρείας σὺν ἡμῖν, ἄγοντες παρ’ ᾧ ξενισθῶμεν
    Μνάσωνί τινι Κυπρίῳ, ἀρχαίῳ μαθητῇ.
translation:
  text: And some of the disciples from Caesarea also went with us, bringing us to
    Mnason, a certain Cypriot, an early disciple, with whom we were to stay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'leading us to Mnason … with whom we might lodge' or 'taking us to the
      house of Mnason.' The Greek participle and lodging verb can be understood in
      slightly different but closely related ways.
    reason: lexical_alternative
  - marker: b
    text: Or 'a longtime disciple.' The phrase may mean that Mnason had been a disciple
      for a long time, possibly from the early days of the movement.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆλθον
  chosen: went with
  alternatives:
  - came along
  - accompanied
  lexicon: BDAG
  rationale: The verb literally means 'came together/went together.' In context with
    σὺν ἡμῖν, the sense is accompaniment on the journey. 'Went with' is natural English
    and preserves the movement.
- source_word: τῶν μαθητῶν
  chosen: the disciples
  alternatives:
  - the learners
  - the followers
  lexicon: BDAG
  rationale: 'Standard NT sense for μαθητής is ''disciple.'' The article with genitive
    after καὶ gives a partitive sense: ''some of the disciples.'''
- source_word: ἀπὸ Καισαρείας
  chosen: from Caesarea
  lexicon: BDAG
  rationale: Straightforward source/location phrase indicating these disciples came
    from Caesarea.
- source_word: σὺν ἡμῖν
  chosen: with us
  lexicon: BDAG
  rationale: Simple accompaniment phrase; retained directly.
- source_word: ἄγοντες
  chosen: bringing us to
  alternatives:
  - leading us to
  - taking us to
  lexicon: BDAG
  rationale: 'The participle explains how they accompanied the group: they were bringing/leading
    them to a host. ''Bringing us to'' fits the travel-and-lodging context and reads
    naturally in English.'
- source_word: παρ’ ᾧ ξενισθῶμεν
  chosen: with whom we were to stay
  alternatives:
  - at whose house we might lodge
  - with whom we should be hosted
  lexicon: BDAG
  rationale: ξενίζω here means to receive as a guest/provide lodging. The aorist subjunctive
    after the relative phrase points to intended lodging. 'With whom we were to stay'
    is idiomatic and captures the hospitality sense without archaic wording.
- source_word: Μνάσωνί τινι
  chosen: Mnason, a certain
  alternatives:
  - a man named Mnason
  - one Mnason
  lexicon: BDAG
  rationale: 'τινι with a proper name often introduces a person not previously mentioned:
    ''a certain Mnason'' or ''one Mnason.'' The chosen wording preserves the Greek''s
    slightly indefinite introduction while remaining readable.'
- source_word: Κυπρίῳ
  chosen: Cypriot
  alternatives:
  - from Cyprus
  lexicon: BDAG
  rationale: The adjective/noun denotes a person from Cyprus. 'Cypriot' is concise
    and natural.
- source_word: ἀρχαίῳ μαθητῇ
  chosen: an early disciple
  alternatives:
  - a longtime disciple
  - one of the early disciples
  lexicon: BDAG
  rationale: ἀρχαῖος here likely means 'of long standing' or 'from the early period.'
    'An early disciple' preserves the temporal nuance without over-interpreting whether
    he belonged to the very earliest Jerusalem circle.
