theological_decisions:
- issue: Meaning of ἀρχαίῳ μαθητῇ
  chosen_reading: an early disciple
  alternative_readings:
  - a longtime disciple
  - one of the first disciples
  rationale: The phrase is descriptive rather than doctrinally loaded, but it can
    be overread historically. 'An early disciple' preserves the likely sense that
    Mnason had been a disciple for a long time, without asserting more than the Greek
    requires.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve
    it
