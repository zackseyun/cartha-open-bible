id: ACT.21.24
reference: Acts 21:24
source:
  edition: SBLGNT
  text: τούτους παραλαβὼν ἁγνίσθητι σὺν αὐτοῖς καὶ δαπάνησον ἐπ’ αὐτοῖς ἵνα ⸀ξυρήσονται
    τὴν κεφαλήν, καὶ ⸀γνώσονται πάντες ὅτι ὧν κατήχηνται περὶ σοῦ οὐδέν ἐστιν, ἀλλὰ
    στοιχεῖς καὶ αὐτὸς ⸂φυλάσσων τὸν νόμον⸃.
translation:
  text: Take these men, purify yourself along with them, and pay their expenses so
    that they may shave their heads. Then everyone will know that there is nothing
    to the things they have been told about you, but that you yourself also are living
    in observance of the law.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what they have been instructed about you.' The Greek verb can mean 'to
      instruct' or more generally 'to inform.' In this context it refers to reports
      circulating about Paul.
    reason: lexical_alternative
  - marker: b
    text: Literally 'walk in line,' that is, live in a way consistent with keeping
      the law.
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτους παραλαβὼν
  chosen: Take these men
  alternatives:
  - Take these
  - Take these with you
  lexicon: BDAG
  rationale: παραλαμβάνω here is an attendant participle with imperative force in
    context, naturally rendered as an English imperative. 'Men' is supplied from the
    context of the four men in the preceding verse, making the referent clear in English
    without overtranslating.
- source_word: ἁγνίσθητι σὺν αὐτοῖς
  chosen: purify yourself along with them
  alternatives:
  - be purified with them
  - join them in purification
  lexicon: BDAG
  rationale: ἁγνίζω in the passive/deponent imperative refers to entering ritual purification.
    'Purify yourself' is idiomatic and preserves the reflexive sense; 'along with
    them' renders σύν clearly.
- source_word: δαπάνησον ἐπ’ αὐτοῖς
  chosen: pay their expenses
  alternatives:
  - spend on them
  - pay for them
  lexicon: BDAG
  rationale: δαπανάω means to spend or incur expense. With ἐπί + dative here, the
    sense is to bear the cost on their behalf, likely the expenses associated with
    the vow. 'Pay their expenses' is the clearest natural English rendering.
- source_word: ἵνα ξυρήσονται τὴν κεφαλήν
  chosen: so that they may shave their heads
  alternatives:
  - so that they will shave their heads
  lexicon: BDAG
  rationale: The future middle after ἵνα is idiomatic Koine usage expressing intended
    result/purpose. 'May shave' communicates purpose in English. The singular 'head'
    in Greek is distributive; English idiom prefers plural 'heads' for multiple persons.
- source_word: γνώσονται πάντες
  chosen: Then everyone will know
  alternatives:
  - and all will know
  - and everyone will come to know
  lexicon: BDAG
  rationale: Future middle of γινώσκω is straightforward. 'Then' brings out the consequential
    flow from the previous purpose/result clause in natural English.
- source_word: ὧν κατήχηνται περὶ σοῦ
  chosen: the things they have been told about you
  alternatives:
  - what they have been instructed about you
  - the reports they have received about you
  lexicon: BDAG
  rationale: κατηχέω can mean instruct or inform. In this context of circulating claims
    about Paul, 'have been told' best fits the sense without implying formal catechesis.
- source_word: οὐδέν ἐστιν
  chosen: there is nothing to
  alternatives:
  - is nothing
  - has no basis
  lexicon: BDAG
  rationale: The idiom means the reported claims are baseless or amount to nothing.
    'There is nothing to' is idiomatic English that preserves the force.
- source_word: ἀλλὰ στοιχεῖς
  chosen: but that you yourself also are living in observance
  alternatives:
  - but that you also walk
  - but that you also conduct yourself
  lexicon: BDAG
  rationale: στοιχέω literally means to walk in line with, follow, or live according
    to. 'Are living in observance' captures ongoing conduct and fits the legal/religious
    context better than the more literal but less transparent 'walk'.
- source_word: καὶ αὐτὸς
  chosen: you yourself also
  alternatives:
  - you also yourself
  - you too
  lexicon: BDAG
  rationale: 'The combination is emphatic: Paul personally, not merely others, also
    does this. ''You yourself also'' preserves both emphasis and addition.'
- source_word: φυλάσσων τὸν νόμον
  chosen: of the law
  alternatives:
  - keeping the law
  - guarding the law
  lexicon: BDAG
  rationale: 'φυλάσσω with νόμος means keep/observe. Because English already uses
    ''living in observance'' for στοιχεῖς, the phrase is compressed to ''in observance
    of the law'' to avoid awkward redundancy while preserving both verbal ideas together:
    living in line with and keeping the law.'
- source_word: νόμον
  chosen: the law
  alternatives:
  - the Mosaic law
  lexicon: BDAG
  rationale: νόμος here refers to the Jewish law in context. 'The law' preserves the
    Greek wording; specifying 'Mosaic' would be interpretive and unnecessary in the
    main text.
