id: ACT.21.29
reference: Acts 21:29
source:
  edition: SBLGNT
  text: ἦσαν γὰρ ⸀προεωρακότες Τρόφιμον τὸν Ἐφέσιον ἐν τῇ πόλει σὺν αὐτῷ, ὃν ἐνόμιζον
    ὅτι εἰς τὸ ἱερὸν εἰσήγαγεν ὁ Παῦλος.
translation:
  text: For they had previously seen Trophimus the Ephesian in the city with him,
    and they supposed that Paul had brought him into the temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'the temple' here uses a term that can refer to the temple complex
      or precincts, not necessarily the inner sanctuary alone.
    reason: lexical_alternative
lexical_decisions:
- source_word: προεωρακότες
  chosen: had previously seen
  alternatives:
  - had seen before
  - had earlier seen
  lexicon: BDAG
  rationale: The pluperfect-like sense is conveyed by the periphrastic construction
    ἦσαν ... προεωρακότες. 'Previously' captures the prior time reference naturally
    in English while preserving the explanatory force of γάρ.
- source_word: Τρόφιμον τὸν Ἐφέσιον
  chosen: Trophimus the Ephesian
  alternatives:
  - Trophimus, an Ephesian
  lexicon: BDAG
  rationale: The appositional adjective Ἐφέσιον identifies Trophimus by origin. 'The
    Ephesian' is a natural and sufficiently formal rendering that preserves the Greek
    structure.
- source_word: ἐν τῇ πόλει
  chosen: in the city
  alternatives:
  - in the town
  lexicon: BDAG
  rationale: πόλις here refers to Jerusalem as the urban setting distinct from the
    temple precincts. 'City' is the standard and clearest rendering.
- source_word: σὺν αὐτῷ
  chosen: with him
  alternatives:
  - in his company
  lexicon: BDAG
  rationale: A straightforward rendering of σύν with the dative. The pronoun refers
    to Paul in context.
- source_word: ἐνόμιζον
  chosen: they assumed
  alternatives:
  - they supposed
  - they thought
  lexicon: BDAG
  rationale: νομίζω here denotes an inference or supposition based on what they had
    seen. 'Assumed' communicates that this was their conclusion, not certain knowledge.
- source_word: εἰς τὸ ἱερὸν
  chosen: into the temple
  alternatives:
  - into the temple courts
  - into the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than the inner sanctuary (ναός).
    However, in idiomatic English 'the temple' is acceptable in the main text, while
    the broader precinct sense is worth preserving in a footnote because the accusation
    concerns bringing a Gentile into the sacred complex.
- source_word: εἰσήγαγεν
  chosen: had brought
  alternatives:
  - had led in
  - had taken in
  lexicon: BDAG
  rationale: 'The aorist is best rendered in English relative past after ''assumed'':
    ''assumed that Paul had brought.'' ''Brought'' is idiomatic and fits the accusation
    of taking someone into a restricted area.'
