id: ACT.21.6
reference: Acts 21:6
source:
  edition: SBLGNT
  text: ⸂ἀπησπασάμεθα ἀλλήλους, καὶ⸃ ⸀ἐνέβημεν εἰς τὸ πλοῖον, ἐκεῖνοι δὲ ὑπέστρεψαν
    εἰς τὰ ἴδια.
translation:
  text: After we had said farewell to one another, we boarded the ship, and they returned
    to their own homes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'took leave of one another.' The Greek expression can denote greeting
      or parting; the departure context favors a farewell sense.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to their own things/places,' an idiom meaning 'to their own
      homes' or 'to their own place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπησπασάμεθα ἀλλήλους
  chosen: had said farewell to one another
  alternatives:
  - greeted one another
  - took leave of one another
  lexicon: BDAG
  rationale: In this departure context, the middle form with reciprocal pronoun naturally
    conveys parting rather than mere greeting. 'Said farewell' is idiomatic modern
    English and fits the narrative situation better than 'greeted.'
- source_word: ἐνέβημεν
  chosen: we boarded
  alternatives:
  - we went aboard
  - we got into
  lexicon: BDAG
  rationale: The verb means to go into or board, especially a vessel in this context.
    'Boarded' is concise and natural with 'the ship.'
- source_word: πλοῖον
  chosen: ship
  alternatives:
  - boat
  lexicon: BDAG
  rationale: The term can denote a boat or ship; 'ship' is the conventional and fitting
    rendering in Acts' sea-travel narratives.
- source_word: ὑπέστρεψαν
  chosen: they returned
  alternatives:
  - they went back
  lexicon: BDAG
  rationale: The verb straightforwardly means 'returned.' This preserves the simple
    narrative movement.
- source_word: εἰς τὰ ἴδια
  chosen: to their own homes
  alternatives:
  - to their own places
  - to what was their own
  lexicon: BDAG
  rationale: The idiom refers to one's own place or home. In this context, 'their
    own homes' makes the sense explicit and natural in English without overtranslating.
