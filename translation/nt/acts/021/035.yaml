id: ACT.21.35
reference: Acts 21:35
source:
  edition: SBLGNT
  text: ὅτε δὲ ἐγένετο ἐπὶ τοὺς ἀναβαθμούς, συνέβη βαστάζεσθαι αὐτὸν ὑπὸ τῶν στρατιωτῶν διὰ τὴν βίαν τοῦ ὄχλου,
translation:
  text: When he came to the steps[a], it happened that he was being carried by the soldiers because of the violence of the crowd[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he had to be carried by the soldiers.' The Greek expression can emphasize the resulting necessity caused by the crowd's violence.
    reason: lexical_alternative
  - marker: b
    text: '''The steps'' likely refers to the stairway leading up to the Roman barracks (cf. Acts 21:34, 37).'
    reason: cross_reference
lexical_decisions:
- source_word: ὅτε δὲ
  chosen: When
  alternatives:
  - Now when
  - But when
  lexicon: BDAG
  rationale: ὅτε introduces a temporal clause; δέ is lightly connective and is naturally absorbed in English without requiring an explicit adversative. 'When' gives smooth modern English while preserving the temporal transition.
- source_word: ἐγένετο ἐπὶ τοὺς ἀναβαθμούς
  chosen: he came to the steps
  alternatives:
  - he reached the stairs
  - he came onto the steps
  lexicon: BDAG
  rationale: γίνομαι with ἐπί + accusative here functions idiomatically for arriving at/reaching a place. ἀναβαθμοί are steps/stairs leading up to the barracks. 'Came to the steps' is natural and sufficiently literal.
- source_word: ἀναβαθμούς
  chosen: the steps
  alternatives:
  - the stairs
  - the stairway
  lexicon: BDAG
  rationale: The term denotes steps or a flight of stairs. 'Steps' is a straightforward rendering and fits the narrative setting.
- source_word: συνέβη
  chosen: it happened
  alternatives:
  - it came about
  - it occurred
  lexicon: BDAG
  rationale: συμβαίνω here introduces the resulting circumstance. 'It happened' preserves Luke's narrative style without sounding overly formal.
- source_word: βαστάζεσθαι
  chosen: was being carried
  alternatives:
  - had to be carried
  - was carried
  lexicon: BDAG
  rationale: The present passive infinitive conveys that Paul was in the process of being borne along. 'Was being carried' preserves the passive and the ongoing sense better than the more interpretive 'had to be carried,' though the necessity is implied by context.
- source_word: ὑπὸ τῶν στρατιωτῶν
  chosen: by the soldiers
  alternatives:
  - by the troops
  lexicon: BDAG
  rationale: στρατιῶται are soldiers. 'By the soldiers' is the direct and natural rendering of the passive agent.
- source_word: διὰ τὴν βίαν
  chosen: because of the violence
  alternatives:
  - because of the force
  - on account of the violence
  lexicon: BDAG
  rationale: διά with the accusative gives cause. βία denotes violence/force; in this riot context 'violence' best captures the crowd's aggressive action.
- source_word: τοῦ ὄχλου
  chosen: of the crowd
  alternatives:
  - of the mob
  lexicon: BDAG
  rationale: ὄχλος commonly means crowd/multitude. Although 'mob' would stress hostility, 'crowd' is the more neutral lexical equivalent and lets the immediately preceding 'violence' carry the negative force.
