id: ACT.28.31
reference: Acts 28:31
source:
  edition: SBLGNT
  text: κηρύσσων τὴν βασιλείαν τοῦ θεοῦ καὶ διδάσκων τὰ περὶ τοῦ κυρίου Ἰησοῦ Χριστοῦ
    μετὰ πάσης παρρησίας ἀκωλύτως.
translation:
  text: proclaiming the kingdom of God and teaching the things concerning the Lord
    Jesus Messiah with all boldness, unhindered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'' The Greek Χριστός can function as a title (''Messiah'')
      or, in some contexts, as a name-like designation (''Christ'').'
    reason: alternative_reading
lexical_decisions:
- source_word: κηρύσσων
  chosen: proclaiming
  alternatives:
  - preaching
  - heralding
  lexicon: BDAG
  rationale: Present participle continuing the narrative summary of Paul's activity.
    'Proclaiming' preserves the public declarative sense without narrowing it to formal
    sermonizing.
- source_word: βασιλείαν τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: Standard rendering that preserves both the concrete and dynamic dimensions
    of βασιλεία. 'Reign' is possible but less natural here; 'kingdom' remains the
    best optimal-equivalence choice.
- source_word: διδάσκων
  chosen: teaching
  alternatives:
  - instructing
  lexicon: BDAG
  rationale: Straightforward rendering of the participle, coordinated with κηρύσσων
    to describe Paul's ongoing ministry.
- source_word: τὰ περὶ
  chosen: the things concerning
  alternatives:
  - what concerns
  - the matters about
  - about
  lexicon: BDAG
  rationale: This phrase is somewhat idiomatic. 'The things concerning' is slightly
    more formal but transparently reflects the Greek construction and avoids over-paraphrase.
    It can be smoothed in reading as 'about,' but the fuller phrase better exposes
    the source structure.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as a christological title. 'Master'
    is possible lexically but does not fit the established NT title usage as well
    here.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a fixed name-like form. In this context, paired with 'Lord' and in
    teaching content, the titular sense is still active enough to preserve meaning.
- source_word: μετὰ πάσης παρρησίας
  chosen: with all boldness
  alternatives:
  - with complete boldness
  - with all openness
  lexicon: BDAG
  rationale: παρρησία carries the sense of bold, open, fearless speech. 'With all
    boldness' is idiomatic and preserves πάσης as an intensifier.
- source_word: ἀκωλύτως
  chosen: unhindered
  alternatives:
  - without hindrance
  - freely
  lexicon: BDAG
  rationale: This adverb climactically closes Acts by emphasizing that Paul's gospel
    ministry was not stopped. 'Unhindered' is concise, natural, and preserves the
    force of the Greek.
