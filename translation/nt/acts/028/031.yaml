- issue: Rendering Χριστός in a christological title sequence
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated
    to preserve meaning where context supports title force. Here 'Jesus Messiah' better
    exposes the semantic content of Χριστός, while 'Jesus Christ' remains a familiar
    alternative preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
