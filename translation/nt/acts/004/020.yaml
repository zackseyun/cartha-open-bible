id: ACT.4.20
reference: Acts 4:20
source:
  edition: SBLGNT
  text: οὐ δυνάμεθα γὰρ ἡμεῖς ἃ εἴδαμεν καὶ ἠκούσαμεν μὴ λαλεῖν.
translation:
  text: For we are not able not to speak about what we have seen and heard[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'For we cannot help speaking about what we have seen and heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δυνάμεθα
  chosen: we are not able
  alternatives:
  - we cannot
  - it is impossible for us
  lexicon: BDAG
  rationale: The combination expresses inability. 'We are not able' preserves the verbal force transparently and allows the following infinitive construction with μή to remain visible in English. 'We cannot' is idiomatic but slightly compresses the structure.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement. 'For' preserves the connective, discourse-level explanatory force better than the more colloquial 'because' in this context.
- source_word: ἡμεῖς
  chosen: we
  alternatives:
  - we ourselves
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis, but English can convey this adequately with simple 'we' in this short clause. 'We ourselves' would over-mark the emphasis.
- source_word: ἃ
  chosen: what
  alternatives:
  - the things that
  - that which
  lexicon: BDAG
  rationale: The neuter plural relative pronoun refers to the content of apostolic witness. 'What' is natural modern English and captures the object of seeing and hearing without wooden phrasing.
- source_word: εἴδαμεν
  chosen: we have seen
  alternatives:
  - we saw
  lexicon: BDAG
  rationale: Although formally aorist, in this paired testimony formula with 'heard' English present perfect communicates abiding relevance of witnessed events. This fits natural English while preserving eyewitness force.
- source_word: ἠκούσαμεν
  chosen: heard
  alternatives:
  - we have heard
  lexicon: BDAG
  rationale: Rendered in coordination with 'we have seen' as 'have seen and heard' in the full clause. The hearing is part of the apostolic witness alongside seeing.
- source_word: μὴ λαλεῖν
  chosen: not to speak
  alternatives:
  - to keep from speaking
  - to say nothing
  lexicon: BDAG
  rationale: μή with the infinitive after δύναμαι yields 'not to speak.' This preserves the Greek double-negative-like structure of inability to remain silent. More idiomatic alternatives risk paraphrase.
- source_word: λαλεῖν
  chosen: speak about
  alternatives:
  - speak
  - tell
  lexicon: BDAG
  rationale: In context the verb refers to speaking concerning the witnessed events and message. 'Speak about' makes the implied object relation clear in English; bare 'speak' can sound incomplete.
