id: ACT.14.12
reference: Acts 14:12
source:
  edition: SBLGNT
  text: ἐκάλουν τε ⸀τὸν Βαρναβᾶν Δία, τὸν δὲ Παῦλον Ἑρμῆν, ἐπειδὴ αὐτὸς ἦν ὁ ἡγούμενος τοῦ λόγου.
translation:
  text: And they were calling Barnabas Zeus[a], and Paul Hermes[b], because he was the chief speaker.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the one leading in speech'' or ''the chief speaker.'''
    reason: lexical_alternative
  - marker: b
    text: Traditional English versions often read 'Jupiter' and 'Mercury,' using the Roman names for these gods; the Greek text has 'Zeus' and 'Hermes.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκάλουν
  chosen: were calling
  alternatives:
  - called
  lexicon: BDAG
  rationale: Imperfect active indicates ongoing or repeated action in the crowd's response; 'were calling' preserves the progressive sense better than simple past 'called.'
- source_word: τε
  chosen: And
  alternatives:
  - then
  - also
  - ''
  lexicon: BDAG
  rationale: Here τε lightly connects this clause to the preceding narrative. English often does not require an explicit equivalent, but 'And' gives a natural connective without overtranslating.
- source_word: Δία
  chosen: Zeus
  alternatives:
  - Jupiter
  lexicon: BDAG
  rationale: The Greek names the Greek deity Zeus directly. 'Zeus' follows the source text and avoids importing the Roman equivalent 'Jupiter,' which appears in some traditional renderings due to Latin influence.
- source_word: Ἑρμῆν
  chosen: Hermes
  alternatives:
  - Mercury
  lexicon: BDAG
  rationale: The Greek names Hermes directly. 'Hermes' is preferred over the Roman equivalent 'Mercury' in keeping with original-language primacy.
- source_word: ἐπειδὴ
  chosen: because
  alternatives:
  - since
  - for
  lexicon: BDAG
  rationale: Introduces the reason the crowd identified Paul with Hermes. 'Because' is the clearest modern English causal connector.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is somewhat emphatic, distinguishing Paul from Barnabas. English can convey this adequately with simple 'he' in context; 'he himself' would be heavier than needed.
- source_word: ὁ ἡγούμενος
  chosen: the leading
  alternatives:
  - the chief
  - the one taking the lead
  - the spokesman
  lexicon: BDAG
  rationale: Present middle participle of ἡγέομαι here denotes one who leads or takes the principal role. 'The leading' naturally modifies 'speaker' and captures Paul's prominent role in speaking.
- source_word: τοῦ λόγου
  chosen: speaker
  alternatives:
  - in speaking
  - of the message
  - of speech
  - spokesman
  lexicon: BDAG
  rationale: λόγος here refers to speech/discourse rather than 'Word' in a theological sense. Rendering the phrase idiomatically as 'leading speaker' communicates that Paul was the principal spokesman. This is a contextual compression of the genitive construction into natural English.
