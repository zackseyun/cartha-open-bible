id: ACT.14.26
reference: Acts 14:26
source:
  edition: SBLGNT
  text: κἀκεῖθεν ἀπέπλευσαν εἰς Ἀντιόχειαν, ὅθεν ἦσαν παραδεδομένοι τῇ χάριτι τοῦ θεοῦ εἰς τὸ ἔργον ὃ ἐπλήρωσαν.
translation:
  text: And from there they sailed to Antioch[b][a], where they had been committed to the grace of God for the work that they had fulfilled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more explicitly, 'from where they had been entrusted to the grace of God.'
    reason: lexical_alternative
  - marker: b
    text: Or 'completed' for 'fulfilled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖθεν
  chosen: And from there
  alternatives:
  - and from that place
  - from there
  lexicon: BDAG
  rationale: The compound conjunction/adverb links this sentence to the previous movement in the narrative and marks departure from the prior location. 'And from there' preserves both the connective force and the spatial reference in natural English.
- source_word: ἀπέπλευσαν
  chosen: they sailed away
  alternatives:
  - they sailed
  - they set sail
  lexicon: BDAG
  rationale: The verb specifically denotes departure by sea. 'Sailed away' preserves the directional nuance of ἀπό better than the flatter 'sailed,' while remaining idiomatic.
- source_word: εἰς Ἀντιόχειαν
  chosen: to Antioch
  alternatives:
  - into Antioch
  lexicon: BDAG
  rationale: With a verb of motion, εἰς is naturally rendered 'to.' 'Antioch' is transliterated as a place name per translation philosophy.
- source_word: ὅθεν
  chosen: where
  alternatives:
  - from where
  - from which place
  lexicon: BDAG
  rationale: 'The adverb can mean ''from where,'' but in this context English idiom prefers ''where'' after naming Antioch, while the sense of origin remains clear: Antioch was the place from which they had been sent/commended. A footnote preserves the more explicit alternative.'
- source_word: ἦσαν παραδεδομένοι
  chosen: they had been entrusted
  alternatives:
  - they had been committed
  - they had been commended
  lexicon: BDAG
  rationale: The periphrastic pluperfect indicates a prior completed act with continuing relevance. παραδίδωμι here means to hand over or entrust. 'Entrusted' best fits the dative phrase 'to the grace of God' and avoids the ecclesiastical idiom 'commended' while preserving the sense of being placed into God's care.
- source_word: τῇ χάριτι τοῦ θεοῦ
  chosen: to the grace of God
  alternatives:
  - to God's grace
  lexicon: BDAG
  rationale: The dative after παραδίδωμι expresses the one/thing to which they were entrusted. 'The grace of God' preserves the full genitival expression and its theological weight without paraphrase.
- source_word: εἰς τὸ ἔργον
  chosen: for the work
  alternatives:
  - for the task
  - for the mission
  lexicon: BDAG
  rationale: ἔργον is broadly 'work' or 'task.' 'Work' is the most direct rendering and leaves the nature of the missionary labor to context rather than importing a more interpretive term like 'mission.'
- source_word: ὃ ἐπλήρωσαν
  chosen: that they had fulfilled
  alternatives:
  - which they completed
  - that they accomplished
  lexicon: BDAG
  rationale: πληρόω here carries the sense of bringing to completion or fulfilling. 'Fulfilled' preserves the lexical connection to completion without reducing it merely to task management; it also fits the retrospective summary of their completed commission. A footnote preserves 'completed' as a viable alternative.
