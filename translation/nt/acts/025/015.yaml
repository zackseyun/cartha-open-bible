id: ACT.25.15
reference: Acts 25:15
source:
  edition: SBLGNT
  text: περὶ οὗ γενομένου μου εἰς Ἱεροσόλυμα ἐνεφάνισαν οἱ ἀρχιερεῖς καὶ οἱ πρεσβύτεροι τῶν Ἰουδαίων, αἰτούμενοι κατ’ αὐτοῦ ⸀καταδίκην·
translation:
  text: Concerning him[a], when I arrived in Jerusalem, the chief priests and the elders of the Jews informed me, asking for a sentence of condemnation against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'asking for condemnation against him' or 'asking for a guilty verdict against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ οὗ
  chosen: about him
  alternatives:
  - concerning whom
  - about whom
  lexicon: BDAG
  rationale: The preposition περί with the genitive relative pronoun refers back to Paul and introduces the matter under discussion. 'About him' is natural English in indirect discourse and preserves the referential sense without awkwardness.
- source_word: γενομένου μου εἰς Ἱεροσόλυμα
  chosen: When I arrived in Jerusalem
  alternatives:
  - when I came to Jerusalem
  - upon my coming to Jerusalem
  lexicon: BDAG
  rationale: The genitive absolute with γίνομαι plus εἰς + place idiomatically denotes one's arrival or coming to a place. 'When I arrived in Jerusalem' is clear modern English and accurately conveys the temporal force.
- source_word: ἐνεφάνισαν
  chosen: informed me
  alternatives:
  - laid information before me
  - made known to me
  - presented their case to me
  lexicon: BDAG
  rationale: ἐμφανίζω here means to make something known or report it to an authority. 'Informed me' fits the legal-administrative context and reads naturally, while avoiding an overly technical or archaic expression.
- source_word: οἱ ἀρχιερεῖς
  chosen: the chief priests
  alternatives:
  - the high priests
  lexicon: BDAG
  rationale: Standard rendering for the plural title referring to the leading priestly authorities, not a single high priest.
- source_word: οἱ πρεσβύτεροι τῶν Ἰουδαίων
  chosen: the elders of the Jews
  alternatives:
  - the Jewish elders
  - the elders among the Jews
  lexicon: BDAG
  rationale: The genitive τῶν Ἰουδαίων identifies which elders are meant. 'The elders of the Jews' stays close to the Greek and avoids prematurely narrowing the phrase to an ethnic or religious nuance beyond the context.
- source_word: αἰτούμενοι
  chosen: asking for
  alternatives:
  - requesting
  - seeking
  lexicon: BDAG
  rationale: The participle expresses attendant action accompanying their informing Festus. 'Asking for' is straightforward and preserves the petitionary sense.
- source_word: κατ’ αὐτοῦ
  chosen: against him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: κατά with the genitive in this legal context carries an adversative sense, indicating hostile legal action directed against Paul.
- source_word: καταδίκην
  chosen: a sentence of condemnation
  alternatives:
  - condemnation
  - a guilty verdict
  lexicon: BDAG
  rationale: καταδίκη denotes judicial condemnation. 'A sentence of condemnation' preserves the legal force and makes explicit that this is a formal adverse judgment, not merely general disapproval.
