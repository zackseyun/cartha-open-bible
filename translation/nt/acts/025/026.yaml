theological_decisions:
- issue: Rendering of κύριος in a non-theological imperial context
  chosen_reading: my lord
  alternative_readings:
  - the emperor
  - the sovereign
  rationale: DOCTRINE.md gives 'Lord' as the default rendering for κύριος. In this
    verse the term refers not to God or Messiah but to the Roman ruler in formal administrative
    usage. 'My lord' preserves the lexical value of κύριος while a footnote clarifies
    the referent as the emperor.
  doctrine_reference: 'DOCTRINE.md: Contested terms table — κύριος → Lord; Translation
    philosophy #1 and #2'
