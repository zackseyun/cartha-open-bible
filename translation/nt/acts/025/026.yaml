id: ACT.25.26
reference: Acts 25:26
source:
  edition: SBLGNT
  text: περὶ οὗ ἀσφαλές τι γράψαι τῷ κυρίῳ οὐκ ἔχω· διὸ προήγαγον αὐτὸν ἐφ’ ὑμῶν καὶ
    μάλιστα ἐπὶ σοῦ, βασιλεῦ Ἀγρίππα, ὅπως τῆς ἀνακρίσεως γενομένης σχῶ τί ⸀γράψω·
translation:
  text: Concerning him I have nothing definite to write to my lord. Therefore I have
    brought him before you all, and especially before you, King Agrippa, so that,
    after the examination has taken place, I may have something to write.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'to the emperor.' The Greek says 'to my lord,' using
      the standard title κύριος in this imperial context.
    reason: alternative_reading
  - marker: b
    text: '''Examination'' can also be rendered ''hearing'' or ''inquiry,'' referring
      to the judicial investigation of Paul''s case.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσφαλές τι
  chosen: nothing definite
  alternatives:
  - nothing certain
  - nothing reliable
  lexicon: BDAG
  rationale: ἀσφαλές denotes something secure, certain, or definite. In this administrative/legal
    context, Festus means he lacks a clear, solid charge to report. 'Definite' is
    natural modern English and fits the official setting.
- source_word: γράψαι
  chosen: to write
  lexicon: BDAG
  rationale: The aorist infinitive straightforwardly expresses the act of composing
    a written report.
- source_word: τῷ κυρίῳ
  chosen: to my lord
  alternatives:
  - to the emperor
  - to the sovereign
  lexicon: BDAG
  rationale: κύριος normally means 'Lord/lord.' Here the referent is the Roman emperor
    in official address. To preserve the lexical form while remaining intelligible,
    the main text keeps 'my lord'; the more explicit referent is preserved in a footnote.
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: BDAG
  rationale: διό introduces the reasoned consequence of the previous statement. 'Therefore'
    preserves the formal connection.
- source_word: προήγαγον
  chosen: I have brought
  alternatives:
  - I brought
  - I presented
  lexicon: BDAG
  rationale: The verb means to bring forward or present before an audience. English
    present perfect works well in context, linking the prior action to the present
    purpose of inquiry.
- source_word: ἐφ’ ὑμῶν
  chosen: before you all
  alternatives:
  - before you
  - in your presence
  lexicon: BDAG
  rationale: ἐπί with the genitive here conveys presentation before a group. 'You
    all' reflects the plural ὑμῶν and avoids losing the distinction from the following
    singular address to Agrippa.
- source_word: μάλιστα ἐπὶ σοῦ
  chosen: especially before you
  alternatives:
  - and particularly before you
  - most of all before you
  lexicon: BDAG
  rationale: μάλιστα heightens the focus on Agrippa in contrast to the larger audience.
    'Especially' is concise and natural.
- source_word: βασιλεῦ Ἀγρίππα
  chosen: King Agrippa
  lexicon: BDAG
  rationale: Vocative title plus name is best rendered directly in standard English
    order.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ὅπως introduces purpose. 'So that' is idiomatic and clear.
- source_word: τῆς ἀνακρίσεως γενομένης
  chosen: after the examination has taken place
  alternatives:
  - after the hearing has taken place
  - once the inquiry has been made
  lexicon: BDAG
  rationale: ἀνάκρισις refers to judicial examination or inquiry. 'Examination' preserves
    the legal nuance without sounding overly technical. The genitive absolute is naturally
    rendered temporally as 'after ... has taken place.'
- source_word: σχῶ τί γράψω
  chosen: I may have something to write
  alternatives:
  - I may have what I should write
  - I may have something I can write
  lexicon: BDAG
  rationale: The idiom combines σχῶ ('I may have') with an indirect object/content
    clause ('something to write'). The chosen rendering is idiomatic English that
    preserves the sense of obtaining material for an official report.
