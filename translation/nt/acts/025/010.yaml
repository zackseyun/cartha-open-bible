id: ACT.25.10
reference: Acts 25:10
source:
  edition: SBLGNT
  text: εἶπεν δὲ ὁ Παῦλος· ⸂Ἐπὶ τοῦ βήματος Καίσαρος ἑστώς⸃ εἰμι, οὗ με δεῖ κρίνεσθαι. Ἰουδαίους οὐδὲν ⸀ἠδίκησα, ὡς καὶ σὺ κάλλιον ἐπιγινώσκεις.
translation:
  text: But Paul said[a], “I am standing before Caesar’s tribunal, where I ought to be judged. I have done no wrong to the Jews[c][b], as you yourself know very well.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “judgment seat.” The Greek βῆμα refers to the official judicial seat or tribunal.
    reason: lexical_alternative
  - marker: b
    text: Or “I stand before Caesar’s tribunal.” The Greek uses a periphrastic expression that emphasizes Paul’s present legal standing there.
    reason: lexical_alternative
  - marker: c
    text: Or “I have committed no offense against the Jews.”
    reason: lexical_alternative
lexical_decisions:
- source_word: βῆμα
  chosen: tribunal
  alternatives:
  - judgment seat
  - court
  lexicon: BDAG
  rationale: βῆμα here refers to the official judicial seat or court of Roman authority, not merely a physical step or platform. “Tribunal” communicates the legal setting in natural modern English better than the more traditional but less transparent “judgment seat.”
- source_word: Καίσαρος
  chosen: Caesar’s
  alternatives:
  - the emperor’s
  lexicon: BDAG
  rationale: Καῖσαρ can function as the imperial title. “Caesar” preserves the historical and legal Roman setting and matches the Greek wording closely.
- source_word: ἑστώς εἰμι
  chosen: I am standing
  alternatives:
  - I stand
  - I am here standing
  lexicon: BDAG
  rationale: The periphrastic construction with perfect participle plus εἰμί conveys Paul’s present standing/position before the court. “I am standing” preserves the vividness and immediate legal posture.
- source_word: οὗ
  chosen: where
  alternatives:
  - before which
  - at which place
  lexicon: BDAG
  rationale: The adverb refers back to the tribunal as the proper place of judgment. “Where” is idiomatic English and sufficiently precise in context.
- source_word: δεῖ
  chosen: ought to
  alternatives:
  - must
  - it is necessary for me to
  lexicon: BDAG
  rationale: 'δεῖ expresses necessity or obligation. “Ought to” fits the legal-procedural sense here: Paul is asserting the proper jurisdiction for his case, not merely personal compulsion.'
- source_word: κρίνεσθαι
  chosen: to be judged
  alternatives:
  - to be tried
  lexicon: BDAG
  rationale: κρίνω in passive legal context means to be judged or tried. “To be judged” is closer to the Greek while still natural; “tried” is a possible contextual gloss.
- source_word: Ἰουδαίους
  chosen: the Jews
  alternatives:
  - Jewish people
  - the Judeans
  lexicon: BDAG
  rationale: In Acts this term commonly denotes the Jewish people or Jewish authorities depending on context. Here Paul speaks broadly of Jews as those he is accused of offending. “The Jews” is the most direct rendering; “the Judeans” would be too geographically narrow in this context.
- source_word: οὐδὲν ἠδίκησα
  chosen: I have done no wrong
  alternatives:
  - I have wronged in no way
  - I have committed no offense
  lexicon: BDAG
  rationale: ἀδικέω means to do wrong, injure, or act unjustly. “I have done no wrong” is clear, idiomatic, and preserves the moral-legal force.
- source_word: ὡς καὶ σὺ κάλλιον ἐπιγινώσκεις
  chosen: as you yourself know very well
  alternatives:
  - as you also know better
  - as even you know more fully
  lexicon: BDAG
  rationale: ἐπιγινώσκω intensifies knowing, and κάλλιον is comparative ('better'). The phrase is idiomatic, meaning Festus knows this quite well. “Yourself” brings out καὶ σὺ emphatically, and “very well” captures the force of κάλλιον in natural English.
