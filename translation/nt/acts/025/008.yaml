theological_decisions:
- issue: Legal versus moral nuance of ἥμαρτον
  chosen_reading: Retain 'I have sinned' rather than reducing the statement to purely legal language.
  alternative_readings:
  - I have committed no offense
  - I have done nothing wrong
  rationale: The verse is forensic, but the Greek verb remains ἁμαρτάνω. Preserving 'sinned' avoids flattening the lexical and moral dimension into a merely technical legal denial.
  doctrine_reference: Translation philosophy §1, §5
