id: ACT.25.27
reference: Acts 25:27
source:
  edition: SBLGNT
  text: ἄλογον γάρ μοι δοκεῖ πέμποντα δέσμιον μὴ καὶ τὰς κατ’ αὐτοῦ αἰτίας σημᾶναι.
translation:
  text: For it seems unreasonable to me, when sending a prisoner, not also to indicate
    the charges against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to specify the charges against him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλογον
  chosen: unreasonable
  alternatives:
  - irrational
  - senseless
  - absurd
  lexicon: BDAG
  rationale: ἄλογος here describes something lacking reason or sense. 'Unreasonable'
    is natural modern English and fits Festus's administrative judgment better than
    the more philosophical 'irrational' or the sharper 'absurd.'
- source_word: δοκεῖ μοι
  chosen: it seems ... to me
  alternatives:
  - I think
  - it appears to me
  lexicon: BDAG
  rationale: The impersonal construction δοκεῖ μοι is well represented by 'it seems
    to me.' This preserves the Greek idiom and the tentative/personal evaluative force
    better than the flatter 'I think.'
- source_word: πέμποντα
  chosen: when sending
  alternatives:
  - in sending
  - to send
  lexicon: BDAG
  rationale: The present participle modifies the implied action and is best rendered
    adverbially. 'When sending' captures the circumstance naturally in English while
    preserving the participial relation.
- source_word: δέσμιον
  chosen: a prisoner
  alternatives:
  - a bound man
  - a captive
  lexicon: BDAG
  rationale: δέσμιος is the standard term for someone in custody. 'Prisoner' is the
    clear and idiomatic English equivalent in this legal context.
- source_word: μὴ καὶ
  chosen: not also
  alternatives:
  - without also
  - and not
  lexicon: BDAG
  rationale: The combination conveys the impropriety of sending the prisoner without
    the accompanying action of specifying charges. 'Not also' preserves the additive
    force of καί; the smoother English syntax still reflects that force.
- source_word: τὰς κατ’ αὐτοῦ αἰτίας
  chosen: the charges against him
  alternatives:
  - the accusations against him
  - the grounds of complaint against him
  lexicon: BDAG
  rationale: αἰτία in judicial contexts commonly means 'charge' or 'accusation.' 'Charges
    against him' is the most idiomatic legal English and fits the Roman hearing context.
- source_word: σημᾶναι
  chosen: to indicate
  alternatives:
  - to make known
  - to specify
  - to report
  lexicon: BDAG
  rationale: σημαίνω means to indicate, make known, or signify. 'Indicate' fits the
    formal administrative setting and pairs well with 'the charges'; 'specify' is
    possible but slightly more interpretive.
