id: ACT.25.7
reference: Acts 25:7
source:
  edition: SBLGNT
  text: παραγενομένου δὲ αὐτοῦ περιέστησαν ⸀αὐτὸν οἱ ἀπὸ Ἱεροσολύμων καταβεβηκότες
    Ἰουδαῖοι, πολλὰ καὶ βαρέα αἰτιώματα ⸀καταφέροντες ἃ οὐκ ἴσχυον ἀποδεῖξαι,
translation:
  text: And when he arrived, the Jews who had come down from Jerusalem stood around
    him, bringing many serious charges that they were not able to prove.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'surrounded him.' The Greek verb can emphasize standing around someone,
      with the surrounding posture implying pressure in the legal setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Judeans who had come down from Jerusalem.' Here the translation
      uses 'Jews' because the phrase refers to Jewish accusers from Jerusalem rather
      than merely residents of Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγενομένου δὲ αὐτοῦ
  chosen: And when he arrived
  alternatives:
  - And after he came
  - And when he appeared
  lexicon: BDAG
  rationale: Genitive absolute marking temporal circumstance. 'When he arrived' is
    natural English and preserves the sequence without over-literal awkwardness.
- source_word: περιέστησαν αὐτὸν
  chosen: stood around him
  alternatives:
  - surrounded him
  - stood by him
  lexicon: BDAG
  rationale: The verb literally conveys standing around/surrounding. 'Stood around
    him' preserves the physical courtroom scene without overstating hostility beyond
    the context.
- source_word: οἱ ἀπὸ Ἱεροσολύμων καταβεβηκότες Ἰουδαῖοι
  chosen: the Jews who had come down from Jerusalem
  alternatives:
  - the Judeans who had come down from Jerusalem
  lexicon: BDAG
  rationale: Ἰουδαῖοι can mean 'Jews' or 'Judeans.' Here the reference is to Jewish
    accusers from Jerusalem rather than inhabitants of Judea in general. 'Jews' is
    the most idiomatic and contextually clear rendering, while the geographic element
    is already expressed by 'from Jerusalem.'
- source_word: πολλὰ καὶ βαρέα αἰτιώματα
  chosen: many serious charges
  alternatives:
  - many and weighty accusations
  - many grave charges
  lexicon: BDAG
  rationale: αἰτιώματα are formal accusations/charges; βαρέα adds the sense of seriousness
    or gravity. 'Many serious charges' is concise, clear, and legally appropriate.
- source_word: καταφέροντες
  chosen: bringing
  alternatives:
  - bringing against him
  - making
  - lodging
  lexicon: BDAG
  rationale: In legal context the participle means bringing or pressing charges. 'Bringing'
    fits smoothly with 'charges' in English; the object 'against him' is implicit
    from context.
- source_word: ἃ οὐκ ἴσχυον ἀποδεῖξαι
  chosen: that they were not able to prove
  alternatives:
  - which they could not prove
  - that they were unable to demonstrate
  lexicon: BDAG
  rationale: ἰσχύω with infinitive expresses ability; ἀποδεῖξαι means to prove or
    demonstrate. The imperfect suggests ongoing inability in the proceedings; English
    simple past with 'were not able' communicates this well.
