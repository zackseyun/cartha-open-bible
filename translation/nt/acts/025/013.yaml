id: ACT.25.13
reference: Acts 25:13
source:
  edition: SBLGNT
  text: Ἡμερῶν δὲ διαγενομένων τινῶν Ἀγρίππας ὁ βασιλεὺς καὶ Βερνίκη κατήντησαν εἰς
    Καισάρειαν ἀσπασάμενοι τὸν Φῆστον.
translation:
  text: Now after some days had passed, King Agrippa and Bernice arrived at Caesarea
    to greet Festus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bernice may also be transliterated 'Berenice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμερῶν δὲ διαγενομένων τινῶν
  chosen: Now after some days had passed
  alternatives:
  - After some days had passed
  - When some days had passed
  - And after some days had passed
  lexicon: BDAG
  rationale: Genitive absolute marking temporal background. δέ is lightly connective;
    'Now' preserves narrative progression in natural English without overtranslating.
- source_word: Ἀγρίππας ὁ βασιλεὺς
  chosen: King Agrippa
  alternatives:
  - Agrippa the king
  lexicon: BDAG
  rationale: Title plus personal name; English idiom prefers 'King Agrippa' while
    preserving βασιλεύς as an actual royal title.
- source_word: Βερνίκη
  chosen: Bernice
  alternatives:
  - Berenice
  lexicon: BDAG
  rationale: Standard English transliteration often appears as 'Bernice'; the form
    is recognizable and natural in English. Alternative spelling is preserved in a
    footnote as a transliteration variant.
- source_word: κατήντησαν
  chosen: arrived
  alternatives:
  - came
  - reached
  lexicon: BDAG
  rationale: In context of travel to a destination, 'arrived' best captures the aorist
    narrative event and the sense of reaching Caesarea.
- source_word: εἰς Καισάρειαν
  chosen: at Caesarea
  alternatives:
  - to Caesarea
  - into Caesarea
  lexicon: BDAG
  rationale: With a verb of motion εἰς is literally 'to/into,' but idiomatic English
    with 'arrived' takes 'at.' The destination sense is preserved.
- source_word: ἀσπασάμενοι τὸν Φῆστον
  chosen: to greet Festus
  alternatives:
  - to pay their respects to Festus
  - having greeted Festus
  - to welcome Festus
  lexicon: BDAG
  rationale: Aorist middle participle expressing attendant purpose/circumstance. 'To
    greet Festus' is concise and natural; 'pay their respects' may over-specify courtly
    nuance not explicit in the verb.
- source_word: Φῆστον
  chosen: Festus
  lexicon: BDAG
  rationale: Standard English transliteration of the Roman governor's name.
