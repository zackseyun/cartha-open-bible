id: ACT.25.14
reference: Acts 25:14
source:
  edition: SBLGNT
  text: ὡς δὲ πλείους ἡμέρας ⸀διέτριβον ἐκεῖ, ὁ Φῆστος τῷ βασιλεῖ ἀνέθετο τὰ κατὰ
    τὸν Παῦλον λέγων· Ἀνήρ τίς ἐστιν καταλελειμμένος ὑπὸ Φήλικος δέσμιος,
translation:
  text: And as they stayed there many days, Festus laid before the king the matters
    concerning Paul, saying, “There is a certain man left behind by Felix as a prisoner,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “reported to the king” for 'laid before the king.' The Greek suggests
      presenting a matter for consideration, not merely giving information.
    reason: lexical_alternative
  - marker: b
    text: Or “the case concerning Paul.” The phrase can refer more specifically to
      Paul's legal situation.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλείους ἡμέρας
  chosen: many days
  alternatives:
  - several days
  - more days
  lexicon: BDAG
  rationale: The comparative πλείους with a temporal accusative idiomatically means
    'many' or 'several' days in context, not necessarily a strict comparative in English.
    'Many days' is natural and preserves the sense of an extended stay.
- source_word: διέτριβον
  chosen: they stayed
  alternatives:
  - they spent time
  - they remained
  lexicon: BDAG
  rationale: διατρίβω here refers to spending time or staying in a place. 'They stayed'
    is concise, natural English and fits the plural subject implied by the verb.
- source_word: ἀνέθετο
  chosen: laid before
  alternatives:
  - reported
  - presented
  - set forth
  lexicon: BDAG
  rationale: ἀνατίθεμαι in this middle form can mean to lay a matter before someone
    for consideration. 'Laid before' preserves that sense better than the flatter
    'reported'.
- source_word: τὰ κατὰ τὸν Παῦλον
  chosen: the matters concerning Paul
  alternatives:
  - the case about Paul
  - the things concerning Paul
  lexicon: BDAG
  rationale: This idiom refers to matters relating to Paul, likely his legal case.
    'The matters concerning Paul' is faithful and readable without over-specifying
    beyond the Greek.
- source_word: Ἀνήρ τίς
  chosen: There is a certain man
  alternatives:
  - A certain man
  - There is a man
  lexicon: BDAG
  rationale: The expression introduces an indefinite but specific individual. 'There
    is a certain man' fits the direct-speech setup and preserves the idiomatic force.
- source_word: καταλελειμμένος
  chosen: left behind
  alternatives:
  - left
  - abandoned
  lexicon: BDAG
  rationale: The perfect passive participle of καταλείπω indicates someone who has
    been left in a continuing state. 'Left behind' captures both the action and resulting
    condition without implying emotional abandonment.
- source_word: δέσμιος
  chosen: as a prisoner
  alternatives:
  - a prisoner
  - in custody
  lexicon: BDAG
  rationale: 'δέσμιος means prisoner. Rendering it with ''as a prisoner'' makes clear
    its predicative relation to the participle in English: Felix left him behind in
    the status of a prisoner.'
- source_word: βασιλεῖ
  chosen: the king
  alternatives:
  - King Agrippa
  lexicon: BDAG
  rationale: The Greek says 'the king' and does not repeat the proper name in this
    verse. The translation keeps the title in the main text; the identity is clear
    from context.
