id: ACT.25.25
reference: Acts 25:25
source:
  edition: SBLGNT
  text: ἐγὼ δὲ ⸀κατελαβόμην μηδὲν ἄξιον ⸂αὐτὸν θανάτου⸃ πεπραχέναι, ⸀αὐτοῦ δὲ τούτου
    ἐπικαλεσαμένου τὸν Σεβαστὸν ἔκρινα ⸀πέμπειν.
translation:
  text: But I found that he had done nothing deserving death; and because he himself
    appealed to the Emperor, I decided to send him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Augustus.' The Greek title Σεβαστός refers here to the Roman emperor.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατελαβόμην
  chosen: I found
  alternatives:
  - I determined
  - I concluded
  - I understood
  lexicon: BDAG
  rationale: In this judicial context, the verb conveys Festus's assessment or finding
    after examination. 'I found' is natural modern English and preserves the sense
    of reaching a conclusion without overstating formal legal finality.
- source_word: μηδὲν ἄξιον ... θανάτου
  chosen: nothing deserving death
  alternatives:
  - nothing worthy of death
  - nothing deserving the death penalty
  lexicon: BDAG
  rationale: The phrase denotes the absence of any act meriting capital punishment.
    'Deserving death' is idiomatic and close to the Greek; 'the death penalty' is
    interpretive and more explicitly Roman-legal than the text states.
- source_word: αὐτὸν θανάτου πεπραχέναι
  chosen: he had done ...
  alternatives:
  - him to have committed
  - that he had committed
  lexicon: BDAG
  rationale: The accusative-plus-infinitive construction after κατελαβόμην is best
    rendered as an English content clause. 'He had done' captures πεπραχέναι straightforwardly
    in context.
- source_word: πεπραχέναι
  chosen: had done
  alternatives:
  - had committed
  - had practiced
  lexicon: BDAG
  rationale: πράσσω here refers to actions committed. 'Had done' is broad and natural;
    'had committed' is possible in legal context, but the surrounding phrase already
    supplies the judicial nuance.
- source_word: αὐτοῦ δὲ τούτου ἐπικαλεσαμένου
  chosen: because he himself appealed
  alternatives:
  - but when he appealed
  - and since he appealed
  - after he appealed
  lexicon: BDAG
  rationale: The genitive absolute gives the circumstance prompting Festus's decision.
    'Because' makes the causal force explicit in good English. 'He himself' reflects
    the emphatic placement and pronoun.
- source_word: ἐπικαλεσαμένου
  chosen: appealed
  alternatives:
  - invoked
  - made appeal to
  lexicon: BDAG
  rationale: In Roman legal setting, ἐπικαλέω with the accusative of the ruler means
    to appeal to higher imperial jurisdiction. 'Appealed' is the clearest idiomatic
    rendering.
- source_word: τὸν Σεβαστόν
  chosen: the Emperor
  alternatives:
  - Augustus
  - the August One
  lexicon: BDAG
  rationale: Σεβαστός is the Greek equivalent of the imperial title Augustus. In this
    context it refers to the Roman emperor as office/title, not specifically the historical
    Caesar Augustus. 'The Emperor' communicates the referent clearly for modern readers.
- source_word: ἔκρινα
  chosen: I decided
  alternatives:
  - I judged
  - I resolved
  lexicon: BDAG
  rationale: The verb here expresses Festus's official decision. 'I decided' is readable
    modern English; 'I judged' can sound more evaluative than procedural in contemporary
    usage.
- source_word: πέμπειν
  chosen: to send him
  alternatives:
  - to send
  - to refer him
  lexicon: BDAG
  rationale: The infinitive complements ἔκρινα. Supplying 'him' is required in English
    from context and makes the object explicit without adding new content.
