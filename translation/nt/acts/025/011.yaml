id: ACT.25.11
reference: Acts 25:11
source:
  edition: SBLGNT
  text: εἰ μὲν ⸀οὖν ἀδικῶ καὶ ἄξιον θανάτου πέπραχά τι, οὐ παραιτοῦμαι τὸ ἀποθανεῖν· εἰ δὲ οὐδέν ἐστιν ὧν οὗτοι κατηγοροῦσίν μου, οὐδείς με δύναται αὐτοῖς χαρίσασθαι· Καίσαρα ἐπικαλοῦμαι.
translation:
  text: If[a], then, I am doing wrong and have done anything deserving death, I do not refuse to die. But if there is nothing to the things these men are accusing me of, no one can hand me over to them as a favor. I appeal to Caesar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'no one can give me up to them to please them.' The Greek verb includes the sense of granting or handing someone over as a favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδικῶ
  chosen: am doing wrong
  alternatives:
  - am guilty of wrongdoing
  - have committed an offense
  lexicon: BDAG
  rationale: Present tense is best reflected with an ongoing/state sense ('am doing wrong') rather than a simple past. 'Doing wrong' is natural modern English and preserves the moral-legal force without over-specifying the charge.
- source_word: ἄξιον θανάτου
  chosen: deserving death
  alternatives:
  - worthy of death
  - punishable by death
  lexicon: BDAG
  rationale: This idiom denotes liability to capital punishment. 'Deserving death' is clear, idiomatic, and preserves the evaluative force of ἄξιον.
- source_word: πέπραχά τι
  chosen: have done anything
  alternatives:
  - have committed anything
  - have practiced anything
  lexicon: BDAG
  rationale: The perfect conveys completed action with present relevance. 'Have done anything' is broad enough to match the indefinite τι and fits the legal setting.
- source_word: οὐ παραιτοῦμαι τὸ ἀποθανεῖν
  chosen: I do not refuse to die
  alternatives:
  - I do not seek to escape death
  - I do not decline death
  lexicon: BDAG
  rationale: παραιτέομαι here means to decline or refuse. The infinitival construction is naturally rendered 'to die.' This communicates Paul's willingness to accept lawful execution if guilty.
- source_word: οὐδέν ἐστιν ὧν οὗτοι κατηγοροῦσίν μου
  chosen: there is nothing to the things these men are accusing me of
  alternatives:
  - none of the things of which these men accuse me is true
  - there is nothing in what these men charge against me
  lexicon: BDAG
  rationale: The Greek asserts that the accusations have no substance. 'There is nothing to the things...' captures the idiomatic force without adding 'true' explicitly, though that sense is implied.
- source_word: κατηγοροῦσίν μου
  chosen: are accusing me of
  alternatives:
  - bring charges against me for
  - accuse me
  lexicon: BDAG
  rationale: Legal accusation is in view. English requires 'of' to complete the sense with the preceding relative phrase.
- source_word: χαρίσασθαι
  chosen: hand me over to them as a favor
  alternatives:
  - grant me to them
  - give me up to them to please them
  lexicon: BDAG
  rationale: χαρίζομαι literally involves granting as a favor or gracious concession. In this judicial context, Festus would be yielding Paul to his accusers to curry favor. The rendering makes the implied political/judicial nuance explicit while staying within the semantic range.
- source_word: Καίσαρα ἐπικαλοῦμαι
  chosen: I appeal to Caesar
  alternatives:
  - I invoke Caesar
  lexicon: BDAG
  rationale: This is a technical legal appeal to the emperor. 'Appeal to Caesar' is the standard and clearest English legal rendering.
- source_word: μὲν οὖν ... δὲ
  chosen: If, then, ... But if
  alternatives:
  - Therefore if ... but if
  - If indeed ... but if
  lexicon: LSJ
  rationale: The particles structure Paul's argument with a first conditional branch followed by a contrasting second branch. 'If, then' and 'But if' preserve the discourse flow in readable English.
