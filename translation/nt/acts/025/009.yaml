id: ACT.25.9
reference: Acts 25:9
source:
  edition: SBLGNT
  text: ὁ Φῆστος δὲ ⸂θέλων τοῖς Ἰουδαίοις⸃ χάριν καταθέσθαι ἀποκριθεὶς τῷ Παύλῳ εἶπεν·
    Θέλεις εἰς Ἱεροσόλυμα ἀναβὰς ἐκεῖ περὶ τούτων ⸀κριθῆναι ἐπ’ ἐμοῦ;
translation:
  text: But Festus, wanting to do the Jews a favor, answered Paul and said, “Do you
    want to go up to Jerusalem and there be judged before me concerning these things?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “grant the Jews a favor”; the expression refers to Festus seeking to
      accommodate Paul's Jewish accusers.
    reason: lexical_alternative
  - marker: b
    text: “The Jews” here refers contextually to the Jewish accusers or leaders pressing
      the case, not to every Jewish person without distinction.
    reason: cultural_note
  - marker: c
    text: Or “be tried before me” or “have your case heard before me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλων
  chosen: wanting
  alternatives:
  - wishing
  - desiring
  lexicon: BDAG
  rationale: Present participle expressing Festus's ongoing motive. 'Wanting' is natural
    modern English and preserves the participial sense without overstating intent.
- source_word: τοῖς Ἰουδαίοις
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek says 'the Jews.' In this narrative context it refers specifically
    to the Jewish accusers/leaders, but the text itself uses the broader ethnoreligious
    term. 'The Jews' preserves the source wording; narrowing to 'leaders' would interpret
    beyond the text. 'Judeans' is possible in some contexts but less likely here,
    where the dispute is not primarily geographic.
- source_word: χάριν καταθέσθαι
  chosen: to do ... a favor
  alternatives:
  - to grant ... a favor
  - to lay up favor with
  - to curry favor with
  lexicon: BDAG
  rationale: This idiom means to confer a favor or win goodwill. 'Do the Jews a favor'
    is idiomatic English and fits the legal-political context. 'Curry favor' would
    shift the nuance toward manipulative motive more explicitly than the Greek requires.
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Standard narrative participle introducing speech. 'Answered' is concise
    and idiomatic in English biblical narrative.
- source_word: Θέλεις
  chosen: Do you want
  alternatives:
  - Are you willing
  - Do you wish
  lexicon: BDAG
  rationale: Direct question about Paul's willingness. 'Do you want' is clear modern
    English; 'Are you willing' could imply mere consent rather than desire.
- source_word: εἰς Ἱεροσόλυμα ἀναβὰς
  chosen: to go up to Jerusalem
  alternatives:
  - to go to Jerusalem
  - to travel up to Jerusalem
  lexicon: BDAG
  rationale: ἀναβαίνω with Jerusalem conventionally means 'go up,' reflecting both
    geography and customary idiom. Retaining 'go up' preserves the source nuance without
    awkwardness.
- source_word: περὶ τούτων
  chosen: concerning these things
  alternatives:
  - about these matters
  - regarding these charges
  lexicon: BDAG
  rationale: A broad reference to the matters under dispute. 'Concerning these things'
    is slightly formal but transparent and avoids specifying 'charges,' which is implied
    by context but not explicit in the Greek.
- source_word: κριθῆναι
  chosen: be judged
  alternatives:
  - be tried
  - have your case decided
  lexicon: BDAG
  rationale: The passive infinitive of κρίνω in judicial context can mean 'be tried'
    or 'be judged.' 'Be judged' stays closer to the Greek while remaining intelligible
    in context.
- source_word: ἐπ’ ἐμοῦ
  chosen: before me
  alternatives:
  - by me
  - under my authority
  lexicon: BDAG
  rationale: In this legal setting, ἐπί with the genitive can indicate the authority
    or presence of the official overseeing the case. 'Before me' is idiomatic and
    preserves Festus's role without overdefining whether he is sole judge or presiding
    authority.
