theological_decisions:
- issue: Potential anti-Jewish overreading of 'the Jews'
  chosen_reading: Retain 'the Jews' in the main text as the direct rendering of τοῖς
    Ἰουδαίοις, while understanding from context that this refers to the Jewish accusers
    in the narrative setting.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: The translation follows original-language primacy and avoids replacing
    the Greek term with an interpretive narrowing in the main text. Because the phrase
    can be misunderstood in English, a footnote clarifies the contextual reference
    without altering the wording.
