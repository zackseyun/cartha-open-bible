id: ACT.25.23
reference: Acts 25:23
source:
  edition: SBLGNT
  text: Τῇ οὖν ἐπαύριον ἐλθόντος τοῦ Ἀγρίππα καὶ τῆς Βερνίκης μετὰ πολλῆς φαντασίας καὶ εἰσελθόντων εἰς τὸ ἀκροατήριον σύν ⸀τε χιλιάρχοις καὶ ἀνδράσιν τοῖς κατ’ ⸀ἐξοχὴν τῆς πόλεως καὶ κελεύσαντος τοῦ Φήστου ἤχθη ὁ Παῦλος.
translation:
  text: So on the next day[a], Agrippa and Bernice came with great pomp and entered the audience hall with the military tribunes and the prominent men of the city[b], and at Festus's command Paul was brought in.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with much pageantry' or 'with great display' for 'with great pomp.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the leading men of the city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ οὖν ἐπαύριον
  chosen: So on the next day
  alternatives:
  - Therefore on the following day
  - Then the next day
  lexicon: BDAG
  rationale: The dative article with ἐπαύριον forms a temporal expression, 'on the next day.' οὖν is rendered 'So' to preserve narrative continuity without sounding overly formal.
- source_word: ἐλθόντος
  chosen: came
  alternatives:
  - having come
  - arrived
  lexicon: BDAG
  rationale: Although formally an aorist participle in a genitive absolute construction, idiomatic English prefers a finite verb here. 'Came' preserves the movement sense and keeps the narrative flowing.
- source_word: Ἀγρίππα ... Βερνίκης
  chosen: Agrippa and Bernice
  rationale: Personal names are transliterated by standard English conventions per project philosophy.
- source_word: μετὰ πολλῆς φαντασίας
  chosen: with great pomp
  alternatives:
  - with much pageantry
  - with great display
  lexicon: BDAG
  rationale: φαντασία here denotes outward show, splendor, or pageantry in a public appearance. 'With great pomp' is concise, idiomatic, and captures the ceremonial ostentation of the scene.
- source_word: εἰσελθόντων εἰς τὸ ἀκροατήριον
  chosen: entered the audience hall
  alternatives:
  - went into the hearing room
  - entered the auditorium
  lexicon: BDAG
  rationale: ἀκροατήριον refers to a place of hearing, likely an official hearing chamber. 'Audience hall' is natural modern English and fits the judicial/public setting better than the more ambiguous 'auditorium.'
- source_word: σύν τε χιλιάρχοις
  chosen: with both the military tribunes
  alternatives:
  - together with the commanders
  - with the chiliarchs
  lexicon: BDAG
  rationale: χιλίαρχοι were high-ranking military officers, commonly rendered 'tribunes' in Roman contexts. The particle τε is reflected by 'both' to show coordination with the following group.
- source_word: ἀνδράσιν τοῖς κατ’ ἐξοχὴν τῆς πόλεως
  chosen: the prominent men of the city
  alternatives:
  - the leading men of the city
  - the men of high standing in the city
  lexicon: BDAG
  rationale: The phrase κατ’ ἐξοχήν denotes prominence or distinction. 'Prominent men of the city' is clear, natural, and preserves the masculine reference present in the Greek.
- source_word: κελεύσαντος τοῦ Φήστου
  chosen: at Festus's command
  alternatives:
  - when Festus gave the order
  - after Festus commanded
  lexicon: BDAG
  rationale: The genitive absolute is rendered idiomatically as a prepositional phrase. 'At Festus's command' is concise and preserves the official authority implied by κελεύω.
- source_word: ἤχθη ὁ Παῦλος
  chosen: Paul was brought in
  alternatives:
  - Paul was led in
  - Paul was brought forward
  lexicon: BDAG
  rationale: The passive of ἄγω indicates that Paul was escorted or conducted into the chamber. 'Brought in' is natural in English and suits the courtroom setting.
