id: ACT.25.18
reference: Acts 25:18
source:
  edition: SBLGNT
  text: περὶ οὗ σταθέντες οἱ κατήγοροι οὐδεμίαν αἰτίαν ⸀ἔφερον ὧν ⸂ἐγὼ ὑπενόουν⸃ ⸀πονηρῶν,
translation:
  text: Concerning him, when the accusers stood up, they brought no charge of the
    evil things that I was suspecting,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they brought no charge of the crimes I suspected.' The Greek says 'evil
      things,' which may refer more generally to wrongdoing than to formally defined
      crimes.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ οὗ
  chosen: Concerning him
  alternatives:
  - about whom
  - regarding him
  lexicon: BDAG
  rationale: περί with the genitive relative pronoun introduces the matter under discussion.
    'Concerning him' is natural English and preserves the referential force toward
    Paul.
- source_word: σταθέντες
  chosen: when ... stood up
  alternatives:
  - having stood up
  - standing
  lexicon: BDAG
  rationale: 'Aorist participle from ἵστημι here functions temporally in context:
    the accusers appearing/standing to present their case. ''When ... stood up'' is
    idiomatic and reflects the courtroom setting.'
- source_word: οἱ κατήγοροι
  chosen: the accusers
  alternatives:
  - the prosecutors
  - his accusers
  lexicon: BDAG
  rationale: κατήγοροι denotes those bringing accusations in a legal setting. 'The
    accusers' is the most direct and broadly understandable rendering.
- source_word: οὐδεμίαν αἰτίαν ἔφερον
  chosen: they brought no charge
  alternatives:
  - they presented no accusation
  - they brought no case
  lexicon: BDAG
  rationale: The idiom φέρειν αἰτίαν in forensic context means to bring or present
    a charge/accusation. 'Charge' is concise and legal in tone.
- source_word: ὧν
  chosen: of the ... things that
  alternatives:
  - such things as
  - the things which
  lexicon: BDAG
  rationale: 'Genitive plural relative pronoun governed by αἰτίαν in a partitive/qualifying
    sense: no charge of the kinds of things Festus expected. Rendering it with ''of
    the ... things that'' preserves the relation to the following adjective.'
- source_word: ἐγὼ ὑπενόουν
  chosen: I was suspecting
  alternatives:
  - I suspected
  - I was supposing
  lexicon: BDAG
  rationale: Imperfect of ὑπονοέω conveys an ongoing prior expectation or suspicion.
    'I was suspecting' preserves the imperfective nuance better than simple past,
    though somewhat wooden; it fits the narrative contrast.
- source_word: πονηρῶν
  chosen: evil things
  alternatives:
  - crimes
  - wrongdoings
  - wicked things
  lexicon: BDAG
  rationale: πονηρός in neuter plural can denote evil acts/things generally. 'Evil
    things' stays close to the Greek without over-specifying as criminal charges,
    though the legal context implies alleged wrongdoing.
