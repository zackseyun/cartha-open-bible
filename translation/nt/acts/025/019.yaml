id: ACT.25.19
reference: Acts 25:19
source:
  edition: SBLGNT
  text: ζητήματα δέ τινα περὶ τῆς ἰδίας δεισιδαιμονίας εἶχον πρὸς αὐτὸν καὶ περί τινος Ἰησοῦ τεθνηκότος, ὃν ἔφασκεν ὁ Παῦλος ζῆν.
translation:
  text: Rather[a], they had certain disputes with him about their own religion and about a certain Jesus who had died, whom Paul claimed to be alive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about their own superstition.' The Greek term can be used neutrally for religion or more pejoratively by an outsider.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζητήματα
  chosen: disputes
  alternatives:
  - questions
  - points of dispute
  - controversies
  lexicon: BDAG
  rationale: The noun denotes matters under dispute rather than neutral inquiries. 'Disputes' fits Festus's summary of accusations and keeps the adversarial sense without over-translating.
- source_word: δέ
  chosen: Rather
  alternatives:
  - but
  - instead
  lexicon: BDAG
  rationale: In context Festus is contrasting the absence of expected criminal charges with what they actually had. 'Rather' brings out the corrective contrast more naturally in English than a bare 'but.'
- source_word: τινα
  chosen: certain
  alternatives:
  - some
  lexicon: BDAG
  rationale: An indefinite qualifier modifying ζητήματα. 'Certain' preserves the slightly formal, nonspecific force of the Greek.
- source_word: περὶ τῆς ἰδίας δεισιδαιμονίας
  chosen: about their own religion
  alternatives:
  - about their own superstition
  - about their own religious practice
  lexicon: BDAG
  rationale: δεισιδαιμονία can range from 'religion' to 'superstition' depending on speaker and context. Since Festus is a Roman outsider summarizing Jewish concerns, the term may carry some distance or mild condescension, but 'superstition' in modern English is overly pejorative and can distort the tone. 'Religion' best captures the referent accessibly, while the alternative is preserved in a footnote.
- source_word: ἰδίας
  chosen: their own
  alternatives:
  - their particular
  - their private
  lexicon: BDAG
  rationale: The adjective marks this as belonging particularly to the accusers' sphere, from Festus's perspective. 'Their own' preserves that distancing nuance.
- source_word: εἶχον πρὸς αὐτόν
  chosen: they had ... with him
  alternatives:
  - they brought against him
  - they had against him
  lexicon: BDAG
  rationale: The idiom indicates that they had disputes directed toward Paul. 'Had certain disputes with him' is idiomatic English and avoids importing a more formal legal sense than the Greek itself states here.
- source_word: καὶ περί τινος Ἰησοῦ
  chosen: and about a certain Jesus
  alternatives:
  - and about someone named Jesus
  lexicon: BDAG
  rationale: τινος with the name reflects Festus's detached, perhaps uninformed reference. 'A certain Jesus' preserves that distancing and lack of familiarity.
- source_word: τεθνηκότος
  chosen: who had died
  alternatives:
  - being dead
  - who was dead
  lexicon: BDAG
  rationale: The perfect participle denotes a state resulting from death. 'Who had died' is natural English and fits the contrast with Paul's claim that he lives.
- source_word: ὃν ἔφασκεν ὁ Παῦλος ζῆν
  chosen: whom Paul claimed to be alive
  alternatives:
  - whom Paul asserted was alive
  - whom Paul said lives
  lexicon: BDAG
  rationale: φάσκω means 'claim' or 'assert,' often reporting another's statement without endorsing it. 'Claimed to be alive' preserves Festus's outsider perspective and the infinitive ζῆν as the content of the claim.
