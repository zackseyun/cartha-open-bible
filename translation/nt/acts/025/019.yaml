theological_decisions:
- issue: Rendering δεισιδαιμονία in Festus's speech
  chosen_reading: religion
  alternative_readings:
  - superstition
  - religious practice
  rationale: The verse reports a pagan official's characterization of Jewish belief. Translating as 'religion' avoids importing a stronger modern insult than the Greek necessarily requires, while preserving Festus's distance through 'their own.' Because the term can bear a pejorative nuance, that alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §1, §6
- issue: Resurrection claim phrasing
  chosen_reading: whom Paul claimed to be alive
  alternative_readings:
  - whom Paul said was alive
  rationale: The translation must reflect that this is Festus's report, not the narrator's direct affirmation in this clause. Using 'claimed' accurately renders φάσκω without denying the truth of the resurrection elsewhere affirmed by Christian orthodoxy.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
