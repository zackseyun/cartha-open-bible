id: ACT.25.12
reference: Acts 25:12
source:
  edition: SBLGNT
  text: τότε ὁ Φῆστος συλλαλήσας μετὰ τοῦ συμβουλίου ἀπεκρίθη· Καίσαρα ἐπικέκλησαι,
    ἐπὶ Καίσαρα πορεύσῃ.
translation:
  text: Then Festus, after conferring with the council, answered, “You have appealed
    to Caesar; to Caesar you will go.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “before Caesar you will go.” The phrase carries the legal sense of going
      to the emperor’s tribunal after making an appeal.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Standard temporal/sequential connective introducing the next event in
    the narrative. 'Then' is natural and sufficiently formal.
- source_word: συλλαλήσας
  chosen: after conferring
  alternatives:
  - having spoken with
  - after consulting
  lexicon: BDAG
  rationale: Aorist participle indicating prior action before the main verb. 'After
    conferring' captures deliberative discussion better than the more wooden 'having
    spoken with.'
- source_word: μετὰ τοῦ συμβουλίου
  chosen: with the council
  alternatives:
  - with the advisory council
  - with his council
  lexicon: BDAG
  rationale: συμβούλιον here refers to a deliberative body or council. 'The council'
    is concise and fits the legal-administrative setting; 'his' is not explicit in
    the Greek.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  - responded
  lexicon: BDAG
  rationale: Common narrative verb for giving a response. 'Answered' preserves the
    formal courtroom tone.
- source_word: Καίσαρα
  chosen: Caesar
  alternatives:
  - the emperor
  lexicon: BDAG
  rationale: Proper title/name retained by transliteration in keeping with the philosophy
    of transliterating names and preserving the Roman legal context.
- source_word: ἐπικέκλησαι
  chosen: you have appealed to
  alternatives:
  - you have invoked
  - you have called upon
  lexicon: BDAG
  rationale: 'Perfect middle indicative of ἐπικαλέω in a legal sense: invoking Caesar''s
    jurisdiction by appeal. ''Appealed to'' is the clearest idiomatic legal English.'
- source_word: ἐπὶ Καίσαρα
  chosen: to Caesar
  alternatives:
  - before Caesar
  lexicon: BDAG
  rationale: With πορεύσῃ in this legal context, ἐπί conveys movement toward the authority
    appealed to. 'To Caesar' is idiomatic and matches the judicial sense, though 'before
    Caesar' is a plausible interpretive alternative.
- source_word: πορεύσῃ
  chosen: you will go
  alternatives:
  - you shall go
  - you will be sent
  lexicon: BDAG
  rationale: Future middle indicative of movement. 'You will go' is direct and natural.
    'You will be sent' over-interprets the passive implication of Roman procedure,
    which is not explicit in the verb.
