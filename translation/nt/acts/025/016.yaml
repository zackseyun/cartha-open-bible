id: ACT.25.16
reference: Acts 25:16
source:
  edition: SBLGNT
  text: πρὸς οὓς ἀπεκρίθην ὅτι οὐκ ἔστιν ἔθος Ῥωμαίοις χαρίζεσθαί τινα ⸀ἄνθρωπον πρὶν
    ἢ ὁ κατηγορούμενος κατὰ πρόσωπον ἔχοι τοὺς κατηγόρους τόπον τε ἀπολογίας λάβοι
    περὶ τοῦ ἐγκλήματος.
translation:
  text: To them I answered that it is not the custom for Romans to hand over any man
    before the accused has his accusers face to face and receives an opportunity for
    a defense concerning the charge.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to grant any man as a favor'; the Greek verb can carry the sense of
      handing someone over to satisfy an accuser's request.
    reason: lexical_alternative
  - marker: b
    text: Greek 'any man'; the expression is grammatically masculine but used generically
      in this legal setting.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθος
  chosen: custom
  alternatives:
  - practice
  lexicon: BDAG
  rationale: ἔθος denotes an established custom or practice. 'Custom' is natural English
    and fits the legal-administrative context.
- source_word: Ῥωμαίοις
  chosen: Romans
  alternatives:
  - the Romans
  - Roman authorities
  lexicon: BDAG
  rationale: The dative plural refers to Romans as a people/legal body. 'Romans' is
    sufficiently direct; the broader legal context makes clear this concerns Roman
    judicial custom.
- source_word: χαρίζεσθαί
  chosen: hand over
  alternatives:
  - grant as a favor
  - deliver up
  lexicon: BDAG
  rationale: In this context χαρίζομαι carries the sense of granting or surrendering
    someone as a favor to another party. 'Hand over' communicates the judicial sense
    clearly in modern English without implying generosity in a positive sense.
- source_word: τινα ἄνθρωπον
  chosen: any man
  alternatives:
  - any person
  - anyone
  lexicon: BDAG
  rationale: The Greek explicitly uses the masculine singular ἄνθρωπον with τις. Following
    the gender-accurate principle, 'any man' preserves the source form while still
    functioning generically in context.
- source_word: ὁ κατηγορούμενος
  chosen: the accused
  alternatives:
  - the one being accused
  - the defendant
  lexicon: BDAG
  rationale: The participle functions substantivally for the person under accusation.
    'The accused' is concise, idiomatic, and appropriate in legal context.
- source_word: κατὰ πρόσωπον
  chosen: face to face
  alternatives:
  - in person
  - before him
  lexicon: BDAG
  rationale: The idiom literally means 'according to face' and conveys direct personal
    confrontation. 'Face to face' preserves the force well in English.
- source_word: τόπον ... ἀπολογίας
  chosen: an opportunity for a defense
  alternatives:
  - room for a defense
  - occasion to make a defense
  lexicon: BDAG
  rationale: τόπος here is idiomatic for opportunity or scope, not physical place.
    ἀπολογία is a legal defense. The combined phrase is best rendered idiomatically
    as 'an opportunity for a defense.'
- source_word: ἐγκλήματος
  chosen: the charge
  alternatives:
  - the accusation
  - the indictment
  lexicon: BDAG
  rationale: ἔγκλημα is a legal charge or accusation. 'The charge' is clear and suitably
    formal without overtechnicality.
