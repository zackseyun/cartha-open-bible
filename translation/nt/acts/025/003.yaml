id: ACT.25.3
reference: Acts 25:3
source:
  edition: SBLGNT
  text: αἰτούμενοι χάριν κατ’ αὐτοῦ ὅπως μεταπέμψηται αὐτὸν εἰς Ἰερουσαλήμ, ἐνέδραν
    ποιοῦντες ἀνελεῖν αὐτὸν κατὰ τὴν ὁδόν.
translation:
  text: asking a favor against him, that he would have him brought to Jerusalem, while
    setting an ambush to kill him on the way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'that he would send for him to Jerusalem.' The Greek verb can mean 'send
      for' or 'have brought.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰτούμενοι
  chosen: asking
  alternatives:
  - requesting
  - begging
  lexicon: BDAG
  rationale: Present middle participle, nominative plural, linked to the subject from
    the previous verse; 'asking' is natural English and preserves the participial,
    contemporaneous sense.
- source_word: χάριν
  chosen: a favor
  alternatives:
  - favor
  - gracious concession
  lexicon: BDAG
  rationale: In the idiom αἰτεῖν χάριν, the sense is to ask for a favor or concession.
    The indefinite article makes the English idiomatic without adding meaning.
- source_word: κατ’ αὐτοῦ
  chosen: against him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: In context the request is hostile to Paul rather than merely about him;
    'against him' best captures the adversative force.
- source_word: ὅπως
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of the request. 'That' is concise and
    idiomatic after 'asking a favor.'
- source_word: μεταπέμψηται
  chosen: he would have him brought
  alternatives:
  - he would send for him
  - he would summon him
  lexicon: BDAG
  rationale: Middle subjunctive of μεταπέμπομαι often means 'send for' or 'summon.'
    Here Festus is being asked to arrange Paul's transfer to Jerusalem; 'have him
    brought' makes the causative sense explicit in context.
- source_word: εἰς Ἰερουσαλήμ
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard directional rendering.
- source_word: ἐνέδραν ποιοῦντες
  chosen: while setting an ambush
  alternatives:
  - preparing an ambush
  - forming an ambush
  lexicon: BDAG
  rationale: Participial phrase expressing attendant action/circumstance. 'Setting
    an ambush' is idiomatic English for the hostile plot.
- source_word: ἀνελεῖν
  chosen: to kill
  alternatives:
  - to do away with
  - to murder
  lexicon: BDAG
  rationale: Aorist infinitive of ἀναιρέω here denotes killing. 'To kill' is direct
    and sufficiently strong without overinterpreting legal or moral nuance.
- source_word: κατὰ τὴν ὁδόν
  chosen: on the way
  alternatives:
  - along the road
  - on the road
  lexicon: BDAG
  rationale: Idiomatic expression for the journey route; 'on the way' is natural modern
    English and fits the ambush context.
