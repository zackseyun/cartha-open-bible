id: ACT.25.21
reference: Acts 25:21
source:
  edition: SBLGNT
  text: τοῦ δὲ Παύλου ἐπικαλεσαμένου τηρηθῆναι αὐτὸν εἰς τὴν τοῦ Σεβαστοῦ διάγνωσιν,
    ἐκέλευσα τηρεῖσθαι αὐτὸν ἕως οὗ ⸀ἀναπέμψω αὐτὸν πρὸς Καίσαρα.
translation:
  text: But when Paul appealed to be kept in custody for the decision of the Emperor,
    I ordered that he be kept in custody until I send him to Caesar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the decision of the Emperor.' The Greek has 'the August One' (Σεβαστός),
      the imperial title equivalent to 'Augustus.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπικαλεσαμένου
  chosen: appealed
  alternatives:
  - invoked
  - appealed to
  lexicon: BDAG
  rationale: In Roman legal context, the middle participle refers to making a formal
    appeal. 'Appealed' is idiomatic and fits the judicial setting better than a more
    wooden 'invoked.'
- source_word: τηρηθῆναι / τηρεῖσθαι
  chosen: be kept in custody / be kept in custody
  alternatives:
  - be kept
  - be guarded
  - be held
  lexicon: BDAG
  rationale: The verb τηρέω here concerns official detention rather than mere protection
    or observation. 'Kept in custody' makes the legal-custodial sense explicit in
    natural English and preserves consistency across both infinitives.
- source_word: διάγνωσιν
  chosen: decision
  alternatives:
  - hearing
  - judgment
  - examination
  lexicon: BDAG
  rationale: The noun denotes a judicial determination or decision. 'Decision' is
    broad enough to include the emperor's adjudication without overstating the procedural
    nuance. 'Judgment' could sound too final or condemnatory; 'hearing' is too procedural.
- source_word: Σεβαστοῦ
  chosen: the August One
  alternatives:
  - the Emperor
  - Augustus
  lexicon: BDAG
  rationale: Σεβαστός is the Greek equivalent of the imperial title Augustus, not
    a personal name here. Rendering it as 'the August One' translates the title rather
    than replacing it with an interpretation. Because this may be unfamiliar, an alternative
    is preserved in a footnote.
- source_word: ἀναπέμψω
  chosen: I send
  alternatives:
  - I send up
  - I refer
  - I dispatch
  lexicon: BDAG
  rationale: In context Festus means sending Paul on to the higher imperial authority.
    'I send' is clear modern English; the directional nuance in ἀναπέμπω is not essential
    in English here.
- source_word: πρὸς Καίσαρα
  chosen: to Caesar
  alternatives:
  - to the emperor
  lexicon: BDAG
  rationale: Καίσαρ functions as the imperial title/name in Roman legal context. 'To
    Caesar' preserves the historical wording and is readily understood in Acts.
