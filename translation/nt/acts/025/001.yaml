id: ACT.25.1
reference: Acts 25:1
source:
  edition: SBLGNT
  text: Φῆστος οὖν ἐπιβὰς τῇ ἐπαρχείᾳ μετὰ τρεῖς ἡμέρας ἀνέβη εἰς Ἱεροσόλυμα ἀπὸ Καισαρείας,
translation:
  text: So Festus, after arriving in the province, went up to Jerusalem from Caesarea
    after three days,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having entered the province' or 'after taking charge of the province.'
      The Greek participle can denote Festus's arrival in his province and, by implication,
      the commencement of his administration there.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  - Now
  lexicon: BDAG
  rationale: Marks narrative progression/inference from the preceding context. 'So'
    is natural modern English and preserves the connective force without sounding
    overly formal.
- source_word: ἐπιβὰς τῇ ἐπαρχείᾳ
  chosen: after arriving in the province
  alternatives:
  - having entered the province
  - upon taking charge of the province
  - after coming into the province
  lexicon: BDAG
  rationale: The participle ἐπιβὰς literally means 'having stepped upon/entered,'
    and with the dative τῇ ἐπαρχείᾳ idiomatically refers to Festus's arrival in or
    assumption of his provincial post. 'After arriving in the province' is clear English
    that preserves the temporal participial sense without over-interpreting it as
    formal assumption of office.
- source_word: ἐπαρχείᾳ
  chosen: province
  alternatives:
  - governorship
  - jurisdiction
  lexicon: BDAG
  rationale: ἐπαρχεία denotes a Roman administrative province. 'Province' is the most
    direct and historically appropriate rendering.
- source_word: μετὰ τρεῖς ἡμέρας
  chosen: after three days
  alternatives:
  - three days later
  - within three days
  lexicon: BDAG
  rationale: μετά with the accusative is temporal here, indicating succession in time.
    'After three days' is a straightforward rendering and keeps the Greek order and
    sense.
- source_word: ἀνέβη
  chosen: went up
  alternatives:
  - traveled up
  - ascended
  lexicon: BDAG
  rationale: ἀναβαίνω is the standard idiom for going up to Jerusalem, reflecting
    elevation and conventional travel language. 'Went up' preserves this biblical-geographical
    idiom better than the flatter 'traveled to.'
- source_word: εἰς Ἱεροσόλυμα
  chosen: to Jerusalem
  alternatives:
  - into Jerusalem
  lexicon: BDAG
  rationale: Standard destination phrase. 'To Jerusalem' is idiomatic English.
- source_word: ἀπὸ Καισαρείας
  chosen: from Caesarea
  lexicon: BDAG
  rationale: ἀπό marks point of origin. 'From Caesarea' is the natural and precise
    rendering.
- source_word: Φῆστος
  chosen: Festus
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
