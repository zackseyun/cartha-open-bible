id: ACT.25.4
reference: Acts 25:4
source:
  edition: SBLGNT
  text: ὁ μὲν οὖν Φῆστος ἀπεκρίθη τηρεῖσθαι τὸν Παῦλον ⸂εἰς Καισάρειαν⸃, ἑαυτὸν δὲ μέλλειν ἐν τάχει ἐκπορεύεσθαι·
translation:
  text: Festus therefore answered that Paul was being kept in Caesarea[a], and that he himself was about to depart shortly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was being held at Caesarea.' The Greek phrase uses 'into/to Caesarea' idiomatically for Paul's place of custody.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὲν οὖν
  chosen: therefore
  alternatives:
  - so
  - then
  lexicon: BDAG
  rationale: The combination marks a transitional and inferential response in the narrative. 'Therefore' captures the inferential force concisely in natural English.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative verb for giving a response. 'Answered' is slightly more formal and fits Luke's style well.
- source_word: τηρεῖσθαι
  chosen: was being kept
  alternatives:
  - was being held
  - was being guarded
  lexicon: BDAG
  rationale: The present passive infinitive conveys an ongoing state. 'Kept' preserves the broad sense without over-specifying imprisonment conditions; 'held' is possible, but 'kept' aligns closely with the Greek.
- source_word: εἰς Καισάρειαν
  chosen: in Caesarea
  alternatives:
  - at Caesarea
  - for Caesarea
  lexicon: BDAG
  rationale: Although εἰς commonly means 'into/to,' in this construction after τηρεῖσθαι it idiomatically indicates location or custody there. English 'in Caesarea' best communicates the sense. A more literal 'for Caesarea' would be unclear.
- source_word: μέλλειν
  chosen: was about to
  alternatives:
  - intended to
  - was going to
  lexicon: BDAG
  rationale: μέλλω here indicates imminence rather than mere intention. 'Was about to' best reflects the near-future sense.
- source_word: ἐν τάχει
  chosen: shortly
  alternatives:
  - soon
  - quickly
  lexicon: BDAG
  rationale: The phrase denotes nearness in time. 'Shortly' works naturally with 'was about to leave' and avoids redundancy with 'soon' while preserving temporal force.
- source_word: ἐκπορεύεσθαι
  chosen: leave
  alternatives:
  - depart
  - go out
  lexicon: BDAG
  rationale: In travel context, 'leave' is idiomatic modern English. 'Depart' is more formal; 'go out' is too literal for the context.
- source_word: ἑαυτόν
  chosen: he himself
  alternatives:
  - himself
  lexicon: BDAG
  rationale: The reflexive pronoun is explicit in Greek and adds emphasis contrasting Festus with Paul. 'He himself' preserves that emphasis clearly.
