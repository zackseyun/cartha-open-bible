id: JUD.1.19
reference: Jude 1:19
source:
  edition: SBLGNT
  text: οὗτοί εἰσιν οἱ ἀποδιορίζοντες, ψυχικοί, πνεῦμα μὴ ἔχοντες.
translation:
  text: These are the ones who cause divisions, worldly people, not having the Spirit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who separate themselves' / 'those who make divisions.'
    reason: lexical_alternative
  - marker: b
    text: Or 'unspiritual' or 'natural people' for 'worldly people.'
    reason: lexical_alternative
  - marker: c
    text: Or 'spirit,' though in context this most likely refers to the Holy Spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοί
  chosen: These
  alternatives:
  - These people
  lexicon: BDAG
  rationale: Demonstrative pronoun referring back to the intruders described in context.
    'These' is concise and natural in English while preserving the deictic force.
- source_word: οἱ ἀποδιορίζοντες
  chosen: the ones who cause divisions
  alternatives:
  - those who separate themselves
  - those who make divisions
  lexicon: BDAG
  rationale: The participle describes these people by their divisive activity. 'Cause
    divisions' best captures the likely sense in context and reads naturally in English.
    'Separate themselves' is possible, but the broader context of schismatic behavior
    favors an active divisive sense.
- source_word: ψυχικοί
  chosen: worldly people
  alternatives:
  - unspiritual
  - natural people
  lexicon: BDAG
  rationale: ψυχικός contrasts with possession of the Spirit in the next phrase. 'Worldly'
    communicates life oriented to merely natural human impulses rather than the Holy
    Spirit, in accessible modern English. Because 'unspiritual' is also a strong lexical
    option and closely tied to the contrast with πνεῦμα, it is preserved in a footnote.
- source_word: πνεῦμα
  chosen: the Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: In Jude's polemical and theological context, the contrast is most naturally
    with the Holy Spirit rather than merely a human spirit. The anarthrous noun does
    not prevent a definite rendering in English. Capitalization signals this interpretive
    judgment.
- source_word: μὴ ἔχοντες
  chosen: not having
  alternatives:
  - who do not have
  - devoid of
  lexicon: BDAG
  rationale: A straightforward participial negation. 'Not having' preserves the Greek
    structure and links tightly with the preceding descriptor.
