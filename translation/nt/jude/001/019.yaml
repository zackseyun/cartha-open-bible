theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: the Holy Spirit
  alternative_readings:
  - human spirit
  rationale: The immediate contrast with ψυχικοί strongly suggests people governed
    by merely natural life and lacking the Holy Spirit. This is the dominant contextual
    reading and best fits Jude's warning about false teachers. The alternative is
    possible at a purely lexical level but less likely in context.
  doctrine_reference: Preserve theological tension rather than resolve it; render
    one in the main text and preserve the alternative where ambiguity is genuine.
