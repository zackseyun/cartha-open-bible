id: JUD.1.25
reference: Jude 1:25
source:
  edition: SBLGNT
  text: ⸀μόνῳ θεῷ σωτῆρι ἡμῶν ⸂διὰ Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν⸃ ⸀δόξα μεγαλωσύνη κράτος καὶ ἐξουσία ⸂πρὸ παντὸς τοῦ αἰῶνος⸃ καὶ νῦν καὶ εἰς πάντας τοὺς αἰῶνας· ἀμήν.
translation:
  text: to the only God our Savior[a], through Jesus Messiah our Lord, be glory, majesty, dominion, and authority, before all time and now and forever[b]. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Literally 'before every age ... unto all the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνῳ
  chosen: only
  alternatives:
  - alone
  lexicon: BDAG
  rationale: μόνος in the dative modifies θεῷ and emphasizes God's uniqueness. 'Only' is idiomatic in English doxology and preserves the exclusivity without sounding awkward.
- source_word: θεῷ
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. The dative is governed by the implied doxological sense ('to ... be').
- source_word: σωτῆρι ἡμῶν
  chosen: our Savior
  alternatives:
  - our deliverer
  lexicon: BDAG
  rationale: σωτήρ commonly means 'Savior' in theological contexts. 'Deliverer' is possible lexically, but 'Savior' best fits Jude's doxological and redemptive context.
- source_word: διὰ
  chosen: through
  alternatives:
  - by means of
  lexicon: BDAG
  rationale: With the genitive, διά denotes means or mediation. 'Through' is the natural English equivalent and preserves the mediatorial sense.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title. Here the phrase remains titular rather than merely name-like, so 'Jesus Messiah' preserves the meaning of Χριστός.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: our Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered ''Lord'' per the project''s default for the title. The genitive stands in apposition to Jesus Messiah: ''Jesus Messiah our Lord.'''
- source_word: δόξα
  chosen: glory
  lexicon: BDAG
  rationale: Standard doxological rendering; concise and natural in a blessing formula.
- source_word: μεγαλωσύνη
  chosen: majesty
  alternatives:
  - greatness
  lexicon: BDAG
  rationale: μεγαλωσύνη denotes greatness or majesty. 'Majesty' fits the elevated doxological register better in English.
- source_word: κράτος
  chosen: dominion
  alternatives:
  - might
  - power
  lexicon: BDAG
  rationale: κράτος refers to manifested strength or ruling power. 'Dominion' fits the sequence with ἐξουσία and avoids flattening both terms into near-synonyms.
- source_word: ἐξουσία
  chosen: authority
  alternatives:
  - power
  lexicon: BDAG
  rationale: ἐξουσία often denotes delegated or rightful authority. 'Authority' distinguishes it from κράτος and preserves the semantic nuance.
- source_word: πρὸ παντὸς τοῦ αἰῶνος
  chosen: before all time
  alternatives:
  - before every age
  - before all the ages
  lexicon: BDAG
  rationale: The phrase is idiomatic and points to pretemporal or pre-creational duration. 'Before all time' communicates the sense clearly in modern English better than the more wooden 'before every age.'
- source_word: νῦν
  chosen: now
  lexicon: BDAG
  rationale: Straightforward temporal adverb; retained to preserve the threefold temporal sweep of the doxology.
- source_word: εἰς πάντας τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - for all ages
  - unto all the ages
  lexicon: BDAG
  rationale: The idiom denotes unending future duration. 'Forever' is the clearest natural English rendering, while the more literal alternatives are preserved in a footnote.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Conventional transliteration retained in English liturgical and biblical usage.
