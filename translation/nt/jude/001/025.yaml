theological_decisions:
- issue: Mediatorial phrase in the doxology
  chosen_reading: The doxology is directed to the only God our Savior, with praise offered through Jesus Messiah our Lord.
  alternative_readings:
  - The phrase could be taken as more loosely attached, but still indicates mediation through Jesus.
  rationale: The syntax most naturally takes διὰ Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν with the ascribed praise to God, preserving both monotheistic focus and the mediatorial role of Jesus without collapsing the persons.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The project default is to translate Χριστός as 'Messiah' where it functions as a title. Here that preserves the christological meaning without importing a merely name-like usage.
  doctrine_reference: Translation philosophy §2; Contested terms table
