id: JUD.1.4
reference: Jude 1:4
source:
  edition: SBLGNT
  text: παρεισέδυσαν γάρ τινες ἄνθρωποι, οἱ πάλαι προγεγραμμένοι εἰς τοῦτο τὸ κρίμα,
    ἀσεβεῖς, τὴν τοῦ θεοῦ ἡμῶν χάριτα μετατιθέντες εἰς ἀσέλγειαν καὶ τὸν μόνον ⸀δεσπότην
    καὶ κύριον ἡμῶν Ἰησοῦν Χριστὸν ἀρνούμενοι.
translation:
  text: For certain men have slipped in unnoticed, who long ago were marked out for
    this judgment, ungodly men who turn the grace of our God into sensuality and deny
    our only Master and Lord, Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'have crept in unnoticed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who long ago were written about beforehand for this judgment' or 'were
      designated beforehand for this judgment.'
    reason: alternative_reading
  - marker: c
    text: Or 'debauchery' or 'licentiousness.'
    reason: lexical_alternative
  - marker: d
    text: Greek 'Jesus Christ'; translated 'Jesus Messiah' because Χριστός is treated
      here as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεισέδυσαν
  chosen: have slipped in unnoticed
  alternatives:
  - have crept in unnoticed
  - have secretly slipped in
  lexicon: BDAG
  rationale: The verb conveys stealthy entry by infiltration. 'Slipped in unnoticed'
    is natural modern English and preserves the clandestine force without sounding
    archaic. The perfect-like English present perfect fits the discourse context of
    a present threat resulting from a past action.
- source_word: πάλαι
  chosen: long ago
  alternatives:
  - beforehand
  - from long ago
  lexicon: BDAG
  rationale: Adverb indicating something in the distant past. 'Long ago' is idiomatic
    and clear.
- source_word: προγεγραμμένοι
  chosen: were marked out
  alternatives:
  - were written about beforehand
  - were designated beforehand
  lexicon: BDAG
  rationale: The participle can mean written beforehand or publicly posted/marked
    out beforehand. In this context, linked with 'for this judgment,' it most naturally
    conveys prior designation or prior scriptural notice of condemnation. 'Marked
    out' preserves the ambiguity better than a stronger predestinarian rendering such
    as 'appointed.'
- source_word: κρίμα
  chosen: judgment
  alternatives:
  - condemnation
  - sentence
  lexicon: BDAG
  rationale: κρίμα can denote judicial verdict or resulting condemnation. 'Judgment'
    is broad enough to preserve the term's judicial force without over-specifying
    the nuance.
- source_word: ἀσεβεῖς
  chosen: ungodly men
  alternatives:
  - impious men
  - godless men
  lexicon: BDAG
  rationale: The adjective characterizes these intruders as irreverent toward God.
    'Ungodly' is standard, accessible, and theologically weighty. 'Men' is supplied
    because the adjective is substantival and refers back to ἄνθρωποι.
- source_word: χάριτα
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: '''Grace'' is the established and accurate rendering in this theological
    context, referring to God''s gracious favor.'
- source_word: μετατιθέντες
  chosen: turn
  alternatives:
  - pervert
  - transfer
  - change
  lexicon: BDAG
  rationale: The participle indicates changing something into something else. 'Turn
    ... into' is transparent and avoids importing the more interpretive 'pervert'
    into the main text, though that sense is contextually present.
- source_word: ἀσέλγειαν
  chosen: sensuality
  alternatives:
  - debauchery
  - licentiousness
  - indecency
  lexicon: BDAG
  rationale: The noun denotes shameless self-indulgence, often especially sexual.
    'Sensuality' is readable modern English and captures the moral looseness without
    narrowing too specifically.
- source_word: μόνον δεσπότην καὶ κύριον
  chosen: only Master and Lord
  alternatives:
  - only Sovereign and Lord
  - only Master, even Lord
  lexicon: BDAG
  rationale: δεσπότης and κύριος are distinct titles and should both be represented.
    'Master and Lord' preserves the double designation. 'Sovereign' is possible for
    δεσπότης, but 'Master' better reflects the personal authority nuance while avoiding
    redundancy with 'Lord.'
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' Here it is retained
    distinctly alongside δεσπότης.
- source_word: Ἰησοῦν Χριστόν
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per translation philosophy, titles are translated where context supports
    title force. Here Χριστός remains titular rather than merely name-like, so 'Messiah'
    is preferred.
- source_word: ἀρνούμενοι
  chosen: deny
  alternatives:
  - disown
  - reject
  lexicon: BDAG
  rationale: The participle denotes repudiation in belief and conduct. 'Deny' is the
    most direct and standard rendering.
- source_word: ἄνθρωποι
  chosen: men
  alternatives:
  - people
  - persons
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and refers to specific male
    intruders in context; 'men' is gender-accurate and aligns with the morphology
    and doctrine guidance.
