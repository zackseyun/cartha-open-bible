theological_decisions:
- issue: Force of προγεγραμμένοι εἰς τοῦτο τὸ κρίμα
  chosen_reading: prior marking out or prior scriptural notice for this judgment,
    without making an explicit claim about individual predestination in the English
    wording
  alternative_readings:
  - predestined for this condemnation
  - written about beforehand with reference to this judgment
  rationale: The phrase has generated theological debate. The translation preserves
    the judicial and prior-notice force while avoiding importing a stronger doctrinal
    conclusion than the Greek requires. This follows the instruction to preserve theological
    tension rather than resolve it beyond the text.
  doctrine_reference: Translation philosophy §3
- issue: Referent of 'only Master and Lord, Jesus Messiah'
  chosen_reading: the titles refer to Jesus Messiah
  alternative_readings:
  - '''Master'' refers to God the Father and ''Lord'' to Jesus Messiah'
  rationale: The most natural reading of the Greek syntax takes both titles together
    with Ἰησοῦν Χριστόν as their referent. This also coheres with historic orthodox
    Christology affirmed in the doctrine statement, while remaining grounded in the
    grammar rather than imported dogma.
  doctrine_reference: Affirmations; Translation philosophy §2
