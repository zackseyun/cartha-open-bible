id: JUD.1.5
reference: Jude 1:5
source:
  edition: SBLGNT
  text: Ὑπομνῆσαι δὲ ὑμᾶς βούλομαι, εἰδότας ⸂ὑμᾶς ἅπαξ⸃ ⸀πάντα, ὅτι ⸀Ἰησοῦς λαὸν ἐκ γῆς Αἰγύπτου σώσας τὸ δεύτερον τοὺς μὴ πιστεύσαντας ἀπώλεσεν,
translation:
  text: Now I want to remind you[a], though you know all things once for all, that Jesus, having saved a people out of the land of Egypt, afterward destroyed those who did not believe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the Lord' or 'God' instead of 'Jesus.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὑπομνῆσαι
  chosen: to remind
  alternatives:
  - to call to mind
  - to remind again
  lexicon: BDAG
  rationale: 'Aorist infinitive with βούλομαι expresses purpose: ''I want to remind.'' ''Remind'' is natural modern English and preserves the sense of bringing known truth back to mind.'
- source_word: βούλομαι
  chosen: I want
  alternatives:
  - I intend
  - I wish
  lexicon: BDAG
  rationale: First-person middle indicative expressing volition. 'I want' is clear, idiomatic, and not overly formal.
- source_word: εἰδότας ὑμᾶς ἅπαξ πάντα
  chosen: though you know all this once for all
  alternatives:
  - although you once knew all things
  - since you know everything once for all
  lexicon: BDAG
  rationale: 'The participial construction is concessive in context: Jude reminds readers of what they already know. ἅπαξ is best taken with the knowing as ''once for all,'' not merely ''once.'' πάντα here is contextually ''all this'' rather than an absolute ''everything,'' since Jude refers to shared salvation-history knowledge.'
- source_word: Ἰησοῦς
  chosen: Jesus
  alternatives:
  - the Lord
  lexicon: NA28/SBLGNT textual tradition; BDAG
  rationale: The given source text reads Ἰησοῦς. This should be translated directly as 'Jesus.' Because this reading identifies Jesus as active in the exodus, the translation preserves the christological force of the text rather than harmonizing it to a less specific title.
- source_word: λαὸν
  chosen: a people
  alternatives:
  - the people
  - a people-group
  lexicon: BDAG
  rationale: Anarthrous accusative object of σώσας. 'A people' is the most straightforward rendering in English here; it avoids over-specifying while still referring to Israel corporately.
- source_word: ἐκ γῆς Αἰγύπτου
  chosen: out of the land of Egypt
  alternatives:
  - from Egypt
  - out of Egypt
  lexicon: BDAG
  rationale: This phrase echoes biblical exodus language. 'Out of the land of Egypt' preserves that resonance more fully than the shorter alternatives.
- source_word: σώσας
  chosen: having saved
  alternatives:
  - after saving
  - who saved
  lexicon: BDAG
  rationale: Aorist participle antecedent to the main verb ἀπώλεσεν. 'Having saved' clearly marks prior action while remaining natural.
- source_word: τὸ δεύτερον
  chosen: afterward
  alternatives:
  - the second time
  - subsequently
  lexicon: BDAG
  rationale: The idiom here indicates a subsequent action following the saving event. 'Afterward' communicates the temporal sequence in idiomatic English without forcing an awkward literalism like 'the second [thing/time].'
- source_word: τοὺς μὴ πιστεύσαντας
  chosen: those who did not believe
  alternatives:
  - those who were unbelieving
  - those who did not trust
  lexicon: BDAG
  rationale: Aorist participle with μή identifies the group characterized by failure to believe. 'Did not believe' is the standard and clearest rendering; 'trust' is possible but less established in this warning context.
- source_word: ἀπώλεσεν
  chosen: destroyed
  alternatives:
  - ruined
  - brought to destruction
  lexicon: BDAG
  rationale: Aorist active indicative summarizing divine judgment on the unbelieving generation. 'Destroyed' is direct and matches the severity of the warning.
