theological_decisions:
- issue: Christological subject in the exodus clause
  chosen_reading: Translate the subject as 'Jesus' in the main text.
  alternative_readings:
  - the Lord
  - God
  rationale: The supplied Greek text reads Ἰησοῦς, a significant and well-attested reading. In keeping with original-language primacy, the main text should reflect 'Jesus,' even though some manuscripts/readers have 'Lord' or 'God.' This preserves the strong christological claim without softening it. Alternative readings are preserved in a footnote because the variant is textually and theologically significant.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
