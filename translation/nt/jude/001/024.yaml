id: JUD.1.24
reference: Jude 1:24
source:
  edition: SBLGNT
  text: Τῷ δὲ δυναμένῳ φυλάξαι ⸀ὑμᾶς ἀπταίστους καὶ στῆσαι κατενώπιον τῆς δόξης αὐτοῦ ἀμώμους ἐν ἀγαλλιάσει
translation:
  text: Now to the one who is able to keep you from stumbling and to present you blameless before his glory with rejoicing[c][b][a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''from falling.'' The Greek adjective ἀπταίστους carries the sense of not stumbling or not falling.'
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'before his glorious presence'; more literally, 'before his glory.'
    reason: alternative_reading
  - marker: c
    text: 'Or: ''faultless.'' The Greek ἀμώμους can also evoke the idea of being ''without blemish.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῷ ... δυναμένῳ
  chosen: to the one who is able
  alternatives:
  - to him who is able
  - to the able one
  lexicon: BDAG
  rationale: The dative articular participle functions as an indirect object in the doxological construction continued in v. 25. 'To the one who is able' is natural English and preserves the participial sense without over-literal awkwardness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ', (left untranslated)'
  lexicon: BDAG
  rationale: δέ here marks a mild transition into the closing doxology rather than strong contrast. 'Now' captures the discourse shift in readable English.
- source_word: φυλάξαι
  chosen: to keep
  alternatives:
  - to guard
  - to preserve
  lexicon: BDAG
  rationale: φυλάσσω commonly means keep/guard/preserve. 'Keep' is concise and idiomatic here, especially with the complementary infinitive after 'able.'
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Direct second-person plural object; English 'you' adequately represents it.
- source_word: ἀπταίστους
  chosen: from stumbling
  alternatives:
  - unstumbling
  - without falling
  - blameless in conduct
  lexicon: BDAG
  rationale: The adjective literally denotes not stumbling or not falling into error. In English, after 'keep you,' the idiomatic construction is 'keep you from stumbling.' This best conveys the verbal force implied in context without flattening it into mere forensic innocence.
- source_word: καὶ στῆσαι
  chosen: and to present
  alternatives:
  - and to make stand
  - and to cause to stand
  lexicon: BDAG
  rationale: Although ἵστημι literally means 'cause to stand,' in judicial/cultic presentation contexts English 'present' communicates the result naturally, especially with the following prepositional phrase 'before his glory.'
- source_word: κατενώπιον
  chosen: before
  alternatives:
  - in the presence of
  - in the sight of
  lexicon: BDAG
  rationale: The preposition means 'before/in the presence of.' 'Before' is concise and fits the elevated style.
- source_word: τῆς δόξης αὐτοῦ
  chosen: his glory
  alternatives:
  - the glory of him
  - his glorious presence
  lexicon: BDAG
  rationale: A formally close rendering is 'his glory.' While many English versions expand to 'his glorious presence,' the Greek noun is δόξα, not παρουσία. Retaining 'glory' preserves the source text's theological weight and avoids interpretive expansion.
- source_word: ἀμώμους
  chosen: blameless
  alternatives:
  - without blemish
  - faultless
  lexicon: BDAG
  rationale: ἀμώμος can denote sacrificial unblemishedness and moral blamelessness. 'Blameless' is accessible modern English and fits the presentation before divine glory. 'Faultless' is possible and traditional, but 'blameless' better preserves both ethical and cultic resonance without sounding archaic.
- source_word: ἐν ἀγαλλιάσει
  chosen: with rejoicing
  alternatives:
  - with great joy
  - in exultation
  lexicon: BDAG
  rationale: ἀγαλλίασις denotes exultant joy. 'With rejoicing' is a close, readable rendering that preserves the noun form. 'With great joy' is idiomatic but adds 'great,' which is not explicit in the Greek.
