theological_decisions:
- issue: Whether to render τῆς δόξης αὐτοῦ as 'his glory' or the more interpretive traditional 'his glorious presence'
  chosen_reading: his glory
  alternative_readings:
  - his glorious presence
  rationale: The Greek explicitly says 'his glory.' Rendering it this way avoids importing an interpretive expansion while still allowing readers to understand the implied presence of God in context. This follows original-language primacy over translation tradition.
  doctrine_reference: Translation philosophy §1
- issue: Whether ἀπταίστους should be rendered as moral preservation ('from stumbling') or final apostasy/falling
  chosen_reading: from stumbling
  alternative_readings:
  - from falling
  rationale: The adjective's core image is stumbling. 'From stumbling' preserves the metaphor and theological tension without narrowing it to either daily sinlessness or final apostasy. The broader doctrinal implications are left unresolved by the translation itself.
  doctrine_reference: Translation philosophy §3
