id: JUD.1.7
reference: Jude 1:7
source:
  edition: SBLGNT
  text: ὡς Σόδομα καὶ Γόμορρα καὶ αἱ περὶ αὐτὰς πόλεις, τὸν ὅμοιον ⸂τρόπον τούτοις⸃ ἐκπορνεύσασαι καὶ ἀπελθοῦσαι ὀπίσω σαρκὸς ἑτέρας, πρόκεινται δεῖγμα πυρὸς αἰωνίου δίκην ὑπέχουσαι.
translation:
  text: just as Sodom and Gomorrah and the cities around them[a], having in like manner committed sexual immorality and gone after other flesh, are set forth as an example[b], undergoing the punishment of eternal fire.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more fully, 'in the same way as these'; the pronoun 'these' may refer to the angels mentioned in the previous verse or more generally to the preceding examples of rebellion and judgment.
    reason: alternative_reading
  - marker: b
    text: Or 'different flesh'; traditionally 'strange flesh.' The phrase is rendered literally and not narrowed in translation to one specific interpretation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: Introduces the comparison with the preceding examples; 'just as' makes the comparative force clear in natural English.
- source_word: Σόδομα καὶ Γόμορρα
  chosen: Sodom and Gomorrah
  rationale: Standard transliteration of place names, following the policy to transliterate names.
- source_word: αἱ περὶ αὐτὰς πόλεις
  chosen: the cities around them
  alternatives:
  - the surrounding cities
  lexicon: BDAG
  rationale: περὶ with accusative here denotes surrounding location. 'Around them' is clear modern English and preserves the geographic sense.
- source_word: τὸν ὅμοιον τρόπον τούτοις
  chosen: likewise
  alternatives:
  - in like manner to these
  - in the same way as these
  lexicon: BDAG
  rationale: The phrase means 'in the same/similar manner as these.' Because the referent of τούτοις is debated in interpretation, the main text uses the adverbial sense 'likewise' without over-specifying the comparison, while preserving a fuller alternative in a footnote.
- source_word: ἐκπορνεύσασαι
  chosen: having indulged in sexual immorality
  alternatives:
  - having committed sexual immorality
  - having practiced sexual immorality
  lexicon: BDAG
  rationale: The compound verb intensifies πορνεύω and denotes sexual immorality. 'Indulged in sexual immorality' captures the aorist participle's descriptive force without euphemism.
- source_word: ἀπελθοῦσαι ὀπίσω
  chosen: gone after
  alternatives:
  - departed after
  - followed after
  lexicon: BDAG
  rationale: This idiom means to pursue or follow after. 'Gone after' is idiomatic English and preserves the metaphor of pursuit.
- source_word: σαρκὸς ἑτέρας
  chosen: other flesh
  alternatives:
  - strange flesh
  - different flesh
  lexicon: BDAG
  rationale: σάρξ is rendered literally as 'flesh' per the doctrine guidance for literal contexts. ἑτέρας means 'other/different.' 'Other flesh' is more transparent to modern readers than the traditional but potentially misleading 'strange flesh.'
- source_word: πρόκεινται
  chosen: are set forth
  alternatives:
  - lie before
  - are exhibited
  - are displayed
  lexicon: BDAG
  rationale: The verb here conveys being publicly presented or exhibited. 'Are set forth' is natural and preserves the exemplary/public sense.
- source_word: δεῖγμα
  chosen: an example
  alternatives:
  - a warning example
  - a specimen
  lexicon: BDAG
  rationale: δεῖγμα denotes something shown as an example or warning. 'An example' is the most direct rendering; the warning force is supplied by the context of judgment.
- source_word: πυρὸς αἰωνίου
  chosen: of eternal fire
  alternatives:
  - of everlasting fire
  lexicon: BDAG
  rationale: A straightforward genitival construction. 'Eternal' is the standard rendering of αἰώνιος and preserves the theological weight without paraphrase.
- source_word: δίκην ὑπέχουσαι
  chosen: undergoing the punishment
  alternatives:
  - suffering punishment
  - paying the penalty
  lexicon: BDAG
  rationale: This idiom means to undergo penalty or punishment. 'Undergoing the punishment' preserves the participial aspect and judicial sense.
