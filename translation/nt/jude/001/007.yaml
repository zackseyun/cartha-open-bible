theological_decisions:
- issue: Referent of 'τούτοις' in the phrase 'τὸν ὅμοιον τρόπον τούτοις'
  chosen_reading: Render the comparison non-specifically as 'likewise' in the main text.
  alternative_readings:
  - '''in the same way as these,'' referring to the angels in v. 6'
  - '''in the same way as these,'' referring more generally to the preceding examples of judgment'
  rationale: The Greek marks a comparison but the exact antecedent of τούτοις is debated. The translation preserves the comparison without forcing a specific interpretive resolution in the main text, in keeping with the instruction to preserve theological tension where the source is genuinely ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Meaning of 'σαρκὸς ἑτέρας'
  chosen_reading: Translate literally as 'other flesh' without specifying the exact nature of the transgression.
  alternative_readings:
  - '''strange flesh'''
  - interpretively specifying homosexual practice
  - interpretively specifying angelic/human boundary crossing
  rationale: The phrase is lexically literal and its precise referent is debated in relation to Genesis 19 and Second Temple Jewish background. The translation should not import a narrower doctrinal claim than the Greek itself states. A literal rendering preserves the text's wording and leaves interpretation to readers and notes.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension where ambiguity is genuine.'
- issue: Force of 'πυρὸς αἰωνίου'
  chosen_reading: Retain 'eternal fire' as the text's own expression.
  alternative_readings:
  - '''everlasting fire'''
  rationale: The phrase should be translated directly without softening or expanding it into a full doctrinal statement beyond the verse. This preserves the gravity of the judgment language while avoiding imported systematic conclusions.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make.'
