- issue: Sense of διακρινομένους in a context of pastoral response to endangered believers
  chosen_reading: those who are doubting
  alternative_readings:
  - those who are wavering
  - those who are disputing
  rationale: The immediate context distinguishes groups needing different responses.
    Rendering the participle as 'doubting' presents this group as spiritually uncertain
    rather than hostile, which coheres with the command to show mercy. The ambiguity
    is not fully resolved dogmatically; alternatives are preserved in a footnote in
    keeping with the instruction to preserve theological tension where the source
    is genuinely ambiguous.
