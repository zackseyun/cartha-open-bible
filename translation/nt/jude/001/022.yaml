id: JUD.1.22
reference: Jude 1:22
source:
  edition: SBLGNT
  text: καὶ οὓς μὲν ⸀ἐλεᾶτε ⸂διακρινομένους,
translation:
  text: And have mercy on those who are doubting,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who are wavering'; possibly 'those who are disputing.' The Greek
      participle can carry more than one nuance in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - and
  lexicon: BDAG
  rationale: Simple connective linking this clause to the surrounding exhortations;
    retained straightforwardly as 'And'.
- source_word: οὓς μὲν
  chosen: those
  alternatives:
  - some
  - those on the one hand
  lexicon: BDAG
  rationale: The accusative relative pronoun with μέν introduces one group in a series.
    English idiom does not require a literal 'on the one hand' here, so 'those' captures
    the referent naturally while leaving the μέν structure to be completed by the
    following verse.
- source_word: ἐλεᾶτε
  chosen: have mercy on
  alternatives:
  - show mercy to
  - be merciful to
  lexicon: BDAG
  rationale: The verb ἐλεάω means to show mercy or compassion. 'Have mercy on' is
    idiomatic, clear modern English and preserves the ethical force of the imperative.
- source_word: διακρινομένους
  chosen: who are doubting
  alternatives:
  - who are wavering
  - who are disputing
  - who are divided
  lexicon: BDAG
  rationale: The participle from διακρίνω can denote doubting, wavering, or being
    at odds. In this pastoral context, 'who are doubting' best fits the call for mercy
    toward those unsettled by false teaching. Because the term is genuinely ambiguous,
    key alternatives are preserved in a footnote.
