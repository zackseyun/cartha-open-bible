id: JUD.1.17
reference: Jude 1:17
source:
  edition: SBLGNT
  text: Ὑμεῖς δέ, ἀγαπητοί, μνήσθητε τῶν ῥημάτων τῶν προειρημένων ὑπὸ τῶν ἀποστόλων τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ·
translation:
  text: But you[a], beloved, remember the words spoken beforehand by the apostles of our Lord Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''Jesus Christ.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς δέ
  chosen: But you
  alternatives:
  - But as for you
  - Yet you
  lexicon: BDAG
  rationale: Retains the contrastive force of δέ and the emphatic subject Ὑμεῖς without sounding overly stiff. 'But you' clearly marks the shift from the false teachers just described to Jude's audience.
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  - loved ones
  lexicon: BDAG
  rationale: Vocative plural used as an affectionate address. 'Beloved' preserves both the warmth and the established epistolary/theological tone better than the more colloquial 'dear friends.'
- source_word: μνήσθητε
  chosen: remember
  alternatives:
  - call to mind
  - keep in mind
  lexicon: BDAG
  rationale: Aorist middle imperative calling the readers to recall prior instruction. 'Remember' is the most natural and sufficiently direct English imperative.
- source_word: τῶν ῥημάτων
  chosen: the words
  alternatives:
  - the sayings
  - what was said
  lexicon: BDAG
  rationale: ῥήματα here refers to spoken utterances or statements. 'Words' is the most straightforward rendering and fits the following participle 'spoken beforehand.'
- source_word: τῶν προειρημένων
  chosen: spoken beforehand
  alternatives:
  - previously spoken
  - foretold
  lexicon: BDAG
  rationale: Perfect passive participle of προλέγω. 'Spoken beforehand' preserves both the verbal idea and the temporal priority. 'Foretold' is possible, but could overemphasize predictive prophecy rather than prior apostolic warning.
- source_word: ὑπὸ τῶν ἀποστόλων
  chosen: by the apostles
  alternatives:
  - by the emissaries
  lexicon: BDAG
  rationale: Standard and contextually appropriate rendering of ἀπόστολοι in the New Testament. 'Apostles' is the established English equivalent and best fits Jude's appeal to authoritative Christian witnesses.
- source_word: τοῦ κυρίου ἡμῶν
  chosen: of our Lord
  alternatives:
  - of our master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord.' The genitive links the apostles to the one who commissioned them.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title rather than a name-like element. In this confessional phrase, the titular sense remains clear, so 'Jesus Messiah' preserves the meaning of the Greek.
