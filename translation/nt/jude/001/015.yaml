id: JUD.1.15
reference: Jude 1:15
source:
  edition: SBLGNT
  text: ποιῆσαι κρίσιν κατὰ πάντων καὶ ἐλέγξαι ⸂πάντας τοὺς ἀσεβεῖς⸃ περὶ πάντων τῶν
    ἔργων ἀσεβείας αὐτῶν ὧν ἠσέβησαν καὶ περὶ πάντων τῶν σκληρῶν ὧν ἐλάλησαν κατ’
    αὐτοῦ ἁμαρτωλοὶ ἀσεβεῖς.
translation:
  text: to execute judgment against all and to convict all the ungodly concerning
    all their ungodly deeds that they committed in ungodliness, and concerning all
    the harsh things that ungodly sinners have spoken against him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to expose' or 'to prove guilty' for 'to convict.' The Greek verb can
      denote bringing wrongdoing to light, but here it stands in a judicial context
      alongside 'execute judgment.'
    reason: lexical_alternative
  - marker: b
    text: '''Him'' refers contextually to the Lord mentioned in the previous verse.'
    reason: cross_reference
  - marker: c
    text: Or 'hard things.' The Greek likely refers to harsh, defiant, or insolent
      words spoken against him.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιῆσαι κρίσιν
  chosen: to execute judgment
  alternatives:
  - to do judgment
  - to carry out judgment
  lexicon: BDAG
  rationale: The infinitive phrase expresses the carrying out of judicial action,
    not merely making a decision. 'Execute judgment' is idiomatic, formal enough for
    the legal sense, and fits the eschatological context from the preceding verse.
- source_word: κατὰ πάντων
  chosen: against all
  alternatives:
  - on all
  - upon all
  lexicon: BDAG
  rationale: κατά with the genitive here has an adversative/judicial sense, so 'against
    all' best conveys the direction of judgment.
- source_word: ἐλέγξαι
  chosen: to convict
  alternatives:
  - to expose
  - to reprove
  - to prove guilty
  lexicon: BDAG
  rationale: In a judicial context alongside κρίσιν, ἐλέγχω is stronger than mere
    moral rebuke. 'Convict' captures exposing guilt and establishing culpability.
- source_word: πάντας τοὺς ἀσεβεῖς
  chosen: all the ungodly
  alternatives:
  - every ungodly person
  - all ungodly people
  lexicon: BDAG
  rationale: The phrase is substantival and plural. 'All the ungodly' is concise,
    natural, and preserves the repeated lexical link with ἀσέβεια/ἀσεβέω later in
    the verse.
- source_word: περὶ πάντων τῶν ἔργων ἀσεβείας αὐτῶν
  chosen: concerning all their ungodly deeds
  alternatives:
  - about all the works of their ungodliness
  - concerning all the deeds of ungodliness they have done
  lexicon: BDAG
  rationale: A more literal rendering ('works of ungodliness') is possible, but 'ungodly
    deeds' is clearer modern English while preserving the attributive force of the
    genitive ἀσεβείας.
- source_word: ὧν ἠσέβησαν
  chosen: that they committed in ungodliness
  alternatives:
  - which they did ungodly
  - which they committed ungodly
  - in which they acted ungodly
  lexicon: BDAG
  rationale: The cognate verb ἀσεβέω intensifies the repeated ungodliness motif. English
    cannot naturally mirror the exact cognate repetition, so 'committed in ungodliness'
    preserves both the action and the manner.
- source_word: σκληρῶν
  chosen: harsh things
  alternatives:
  - hard things
  - defiant things
  - offensive things
  lexicon: BDAG
  rationale: σκληρός literally means 'hard,' but in speech contexts it refers to severe,
    harsh, or insolent words. 'Harsh things' is natural and broad enough to include
    the hostile speech in view.
- source_word: ἐλάλησαν κατ’ αὐτοῦ
  chosen: have spoken against him
  alternatives:
  - spoke against him
  - said against him
  lexicon: BDAG
  rationale: The aorist refers to completed acts, but English present perfect works
    well in this denunciatory list and connects the speech to the standing charge.
    'Against him' reflects κατά with the genitive.
- source_word: αὐτοῦ
  chosen: him
  alternatives:
  - the Lord
  - God
  lexicon: BDAG
  rationale: The pronoun's referent is supplied by context from the citation about
    the Lord's coming. The translation keeps the pronoun rather than interpreting
    it explicitly, preserving the Greek wording.
- source_word: ἁμαρτωλοὶ ἀσεβεῖς
  chosen: ungodly sinners
  alternatives:
  - sinful ungodly people
  - sinners who are ungodly
  lexicon: BDAG
  rationale: The paired descriptors are emphatic and climactic. 'Ungodly sinners'
    preserves both terms compactly; the order foregrounds the repeated ἀσεβ- word
    group that dominates the verse.
