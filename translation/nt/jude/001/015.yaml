theological_decisions:
- issue: Referent of αὐτοῦ in the phrase 'spoken against him'
  chosen_reading: Retain the pronoun 'him' without expanding it to 'the Lord' or 'God'
    in the main text.
  alternative_readings:
  - spoken against the Lord
  - spoken against God
  rationale: The immediate context (v. 14) identifies the coming one as the Lord,
    so the referent is contextually clear. However, the Greek uses a pronoun, and
    preserving that wording avoids over-interpretation while allowing readers to follow
    the contextual referent.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather
    than resolve it.'
