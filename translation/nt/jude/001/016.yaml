theological_decisions:
- issue: Moral force of ἐπιθυμίαι
  chosen_reading: desires in the main text, with the context supplying the negative moral sense
  alternative_readings:
  - lusts
  - cravings
  rationale: The term can denote strong desires generally, but in Jude's polemical context it clearly refers to self-indulgent impulses. 'Desires' avoids over-specifying sexual lust while preserving the broader moral indictment.
  doctrine_reference: Translation philosophy §1, §6
- issue: Idiomatic force of θαυμάζοντες πρόσωπα
  chosen_reading: showing favoritism
  alternative_readings:
  - flattering people
  - admiring persons
  rationale: The Greek idiom concerns partiality toward persons, here for selfish benefit. Rendering the idiom rather than translating woodenly best fits optimal equivalence and avoids obscuring the ethical charge.
  doctrine_reference: Translation philosophy §1, §6
