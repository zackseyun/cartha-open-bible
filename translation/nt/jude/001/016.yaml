id: JUD.1.16
reference: Jude 1:16
source:
  edition: SBLGNT
  text: οὗτοί εἰσιν γογγυσταί, μεμψίμοιροι, κατὰ τὰς ἐπιθυμίας ⸀αὐτῶν πορευόμενοι, καὶ τὸ στόμα αὐτῶν λαλεῖ ὑπέρογκα, θαυμάζοντες πρόσωπα ὠφελείας χάριν.
translation:
  text: These are grumblers[a], malcontents, walking according to their own desires, and their mouth speaks arrogant things[c][b], showing favoritism for the sake of gain.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'admiring faces'—an idiom for showing partiality or favor toward people.
    reason: lexical_alternative
  - marker: b
    text: Or 'following their own lusts.'
    reason: alternative_reading
  - marker: c
    text: Or 'their mouth speaks swelling words.'
    reason: alternative_reading
lexical_decisions:
- source_word: γογγυσταί
  chosen: grumblers
  alternatives:
  - murmurers
  - complainers
  lexicon: BDAG
  rationale: The noun denotes people characterized by muttering complaint. 'Grumblers' is natural modern English and preserves the repeated, discontented sense better than the more archaic 'murmurers.'
- source_word: μεμψίμοιροι
  chosen: malcontents
  alternatives:
  - faultfinders
  - complainers about their lot
  lexicon: BDAG
  rationale: This rare term refers to those who complain about their lot or fate. 'Malcontents' is concise and idiomatic, while capturing settled dissatisfaction. 'Faultfinders' is possible but overlaps too much with general criticism rather than resentment over one's condition.
- source_word: κατὰ τὰς ἐπιθυμίας αὐτῶν πορευόμενοι
  chosen: walking according to their own desires
  alternatives:
  - following their own lusts
  - living according to their own cravings
  lexicon: BDAG
  rationale: πορεύομαι in participial form often carries the metaphorical sense 'conduct oneself' or 'walk.' ἐπιθυμίαι can mean desires generally, though in moral-warning contexts 'lusts' is traditional. 'Desires' is broader and more readable, while still conveying morally disordered impulses in context.
- source_word: τὸ στόμα αὐτῶν λαλεῖ ὑπέρογκα
  chosen: their mouth speaks arrogant things
  alternatives:
  - their mouth speaks boastful things
  - their mouth utters swelling words
  lexicon: BDAG
  rationale: The singular 'mouth' is retained as in Greek, a common idiom for speech. ὑπέρογκα denotes inflated, overblown, arrogant speech. 'Arrogant things' is clear modern English; 'swelling words' is traditional but less transparent.
- source_word: θαυμάζοντες πρόσωπα
  chosen: showing favoritism
  alternatives:
  - admiring faces
  - flattering people
  lexicon: BDAG
  rationale: The idiom literally means 'admiring faces' and refers to partiality based on outward regard. In this context, where it is tied to advantage, 'showing favoritism' communicates the idiomatic sense clearly. 'Flattering people' is related but narrower.
- source_word: ὠφελείας χάριν
  chosen: for the sake of gain
  alternatives:
  - for advantage
  - for profit
  lexicon: BDAG
  rationale: 'The phrase expresses motive: acting for benefit or advantage. ''For the sake of gain'' fits the denunciatory tone and makes explicit the self-serving motive behind the favoritism.'
- source_word: οὗτοί εἰσιν
  chosen: These are
  alternatives:
  - These people are
  lexicon: BDAG
  rationale: A straightforward demonstrative identification. 'These are' is sufficiently clear in context and keeps the terseness of the Greek.
