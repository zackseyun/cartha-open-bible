id: JUD.1.13
reference: Jude 1:13
source:
  edition: SBLGNT
  text: κύματα ἄγρια θαλάσσης ἐπαφρίζοντα τὰς ἑαυτῶν αἰσχύνας, ἀστέρες πλανῆται οἷς
    ὁ ζόφος τοῦ σκότους εἰς αἰῶνα τετήρηται.
translation:
  text: wild waves of the sea, foaming up their own shames; wandering stars, for whom
    the gloom of darkness has been reserved forever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'casting up their own disgrace' or 'foaming out their own shameful deeds.'
      The Greek plural 'shames' may refer either to disgrace itself or to shameful
      acts that expose them.
    reason: lexical_alternative
  - marker: b
    text: Or 'the blackness of darkness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κύματα ἄγρια θαλάσσης
  chosen: wild waves of the sea
  alternatives:
  - wild sea waves
  - savage waves of the sea
  lexicon: BDAG
  rationale: 'A straightforward image: κύματα means ''waves,'' ἄγρια adds the sense
    ''wild/savage,'' and θαλάσσης is a genitive ''of the sea.'' ''Wild waves of the
    sea'' is natural English and preserves the vivid metaphor.'
- source_word: ἐπαφρίζοντα
  chosen: foaming up
  alternatives:
  - foaming out
  - casting up foam
  lexicon: BDAG
  rationale: The participle denotes the action of producing foam or surf. 'Foaming
    up' is idiomatic modern English and preserves the active, ongoing sense of the
    present participle.
- source_word: τὰς ἑαυτῶν αἰσχύνας
  chosen: their own shames
  alternatives:
  - their own shameful deeds
  - their own disgrace
  lexicon: BDAG
  rationale: αἰσχύνη can denote shame, disgrace, or shameful conduct. The plural αἰσχύνας
    is striking and is best preserved with 'shames' rather than flattened to a singular
    abstraction. 'Their own' reflects ἑαυτῶν emphatically.
- source_word: ἀστέρες πλανῆται
  chosen: wandering stars
  alternatives:
  - errant stars
  - planets
  lexicon: BDAG
  rationale: πλανῆται literally relates to wandering bodies, the source of 'planet,'
    but in this context 'wandering stars' is the established and clearest English
    rendering, preserving the metaphor without introducing modern astronomical precision
    foreign to the text.
- source_word: οἷς
  chosen: for whom
  alternatives:
  - for which
  - to whom
  lexicon: BDAG
  rationale: The relative pronoun is dative plural and refers back to the people metaphorically
    described as 'wandering stars.' Since the referent is personal, 'for whom' is
    preferable to 'for which.'
- source_word: ὁ ζόφος τοῦ σκότους
  chosen: the gloom of darkness
  alternatives:
  - the blackness of darkness
  - the deepest darkness
  lexicon: BDAG
  rationale: ζόφος denotes deep gloom or murky darkness; paired with σκότους it intensifies
    the image. 'The gloom of darkness' preserves the genitival construction and the
    poetic force without sounding archaic. The traditional 'blackness of darkness'
    is possible but less natural in contemporary English.
- source_word: εἰς αἰῶνα
  chosen: forever
  alternatives:
  - for eternity
  - for the age
  lexicon: BDAG
  rationale: In this judgment context, εἰς αἰῶνα idiomatically means 'forever.' This
    is a natural equivalent that preserves the durative force better than a more wooden
    'for the age.'
- source_word: τετήρηται
  chosen: has been kept
  alternatives:
  - has been reserved
  - has been kept in store
  lexicon: BDAG
  rationale: 'The perfect passive indicates a state resulting from prior action: it
    stands kept/reserved. ''Has been kept'' is a clear, direct rendering; ''reserved''
    is also possible, but ''kept'' more closely reflects τηρέω and avoids over-interpretation.'
