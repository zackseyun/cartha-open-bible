id: JUD.1.12
reference: Jude 1:12
source:
  edition: SBLGNT
  text: οὗτοί εἰσιν ⸀οἱ ἐν ταῖς ἀγάπαις ὑμῶν σπιλάδες συνευωχούμενοι, ἀφόβως ἑαυτοὺς
    ποιμαίνοντες, νεφέλαι ἄνυδροι ὑπὸ ἀνέμων παραφερόμεναι, δένδρα φθινοπωρινὰ ἄκαρπα
    δὶς ἀποθανόντα ἐκριζωθέντα,
translation:
  text: These are the hidden reefs at your love feasts, feasting with you without
    fear, shepherding themselves; waterless clouds carried along by winds; autumn
    trees without fruit, twice dead, uprooted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'blemishes' or 'stains' at your love feasts.' The Greek word may be understood
      morally, but it can also denote dangerous hidden reefs; the latter best fits
      Jude's sequence of vivid metaphors.
    reason: alternative_reading
  - marker: b
    text: '''Shepherding themselves'' may also be rendered ''feeding themselves,''
      highlighting their self-serving conduct.'
    reason: lexical_alternative
  - marker: c
    text: Compare Ezekiel 34 for the image of leaders who feed themselves instead
      of the flock.
    reason: cross_reference
lexical_decisions:
- source_word: σπιλάδες
  chosen: hidden reefs
  alternatives:
  - blemishes
  - stains
  lexicon: BDAG
  rationale: The noun can denote rocks/reefs and has been traditionally rendered 'spots'
    or 'blemishes' under influence from the parallel in 2 Peter 2:13. In Jude's imagery,
    'hidden reefs' fits the metaphor of dangerous, concealed hazards within communal
    meals and coheres with the following string of vivid natural images.
- source_word: ἀγάπαις
  chosen: love feasts
  alternatives:
  - love meals
  - meals of fellowship
  lexicon: BDAG
  rationale: Although ἀγάπη is ordinarily rendered 'love,' the plural here refers
    to communal meals characterized by Christian love. 'Love feasts' is the established
    and most precise rendering in this context, while preserving the lexical connection
    to love.
- source_word: συνευωχούμενοι
  chosen: feasting with you
  alternatives:
  - joining in the feast with you
  - banqueting together with you
  lexicon: BDAG
  rationale: The participle denotes sharing in a feast together. 'Feasting with you'
    is natural English and keeps the communal meal setting explicit.
- source_word: ἀφόβως
  chosen: without fear
  alternatives:
  - fearlessly
  - without reverence
  lexicon: BDAG
  rationale: The adverb likely conveys shameless lack of concern or restraint. 'Without
    fear' preserves the ambiguity between recklessness and irreverence better than
    a more interpretive gloss.
- source_word: ἑαυτοὺς ποιμαίνοντες
  chosen: shepherding themselves
  alternatives:
  - feeding themselves
  - looking after themselves
  lexicon: BDAG
  rationale: ποιμαίνω literally means 'to shepherd.' In context it implies self-serving
    leadership or care directed only toward themselves. 'Shepherding themselves' preserves
    the metaphor and echoes Ezekiel 34, while allowing readers to infer the selfishness.
- source_word: νεφέλαι ἄνυδροι
  chosen: waterless clouds
  alternatives:
  - clouds without water
  - rainless clouds
  lexicon: BDAG
  rationale: A compact, vivid rendering that preserves the metaphor of promise without
    provision.
- source_word: παραφερόμεναι
  chosen: carried along
  alternatives:
  - driven about
  - swept along
  lexicon: BDAG
  rationale: The passive participle indicates being borne along by external forces.
    'Carried along' is idiomatic and sufficiently literal.
- source_word: φθινοπωρινὰ
  chosen: autumn
  alternatives:
  - late-autumn
  - autumnal
  lexicon: BDAG
  rationale: The adjective refers to the autumn season, likely when fruit should be
    expected or when barrenness is especially evident. 'Autumn trees' is clear modern
    English.
- source_word: ἄκαρπα
  chosen: without fruit
  alternatives:
  - fruitless
  - barren
  lexicon: BDAG
  rationale: '''Without fruit'' keeps the image concrete and avoids prematurely abstracting
    the metaphor.'
- source_word: δὶς ἀποθανόντα
  chosen: twice dead
  alternatives:
  - dead twice
  - completely dead
  lexicon: BDAG
  rationale: The phrase is rhetorically striking and should be preserved as such rather
    than explained away. 'Twice dead' is the most direct rendering.
- source_word: ἐκριζωθέντα
  chosen: uprooted
  alternatives:
  - rooted out
  - torn up by the roots
  lexicon: BDAG
  rationale: The participle intensifies the image of irreversible lifelessness. 'Uprooted'
    is concise and vivid.
