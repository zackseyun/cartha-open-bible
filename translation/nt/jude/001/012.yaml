theological_decisions:
- issue: Interpretation of σπιλάδες in relation to the false teachers
  chosen_reading: dangerous hidden reefs within the community's shared meals
  alternative_readings:
  - moral blemishes or stains at your love feasts
  rationale: The immediate context is a chain of metaphors, and 'hidden reefs' best
    fits Jude's imagery of concealed danger. The alternative is preserved because
    of longstanding translation tradition and possible lexical overlap in interpretation.
  doctrine_reference: Translation philosophy §1, §3
- issue: Force of ποιμαίνοντες in ἑαυτοὺς ποιμαίνοντες
  chosen_reading: retained the shepherd metaphor rather than reducing it to mere eating
  alternative_readings:
  - feeding themselves
  rationale: The Greek verb ordinarily means 'to shepherd,' and preserving the metaphor
    allows intertextual resonance with condemnations of self-serving shepherds in
    Ezekiel 34. 'Feeding themselves' is possible in context but narrows the image
    too quickly.
  doctrine_reference: Translation philosophy §1, §5
