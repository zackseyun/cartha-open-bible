id: JUD.1.20
reference: Jude 1:20
source:
  edition: SBLGNT
  text: ὑμεῖς δέ, ἀγαπητοί, ⸂ἐποικοδομοῦντες ἑαυτοὺς τῇ ἁγιωτάτῃ ὑμῶν πίστει⸃, ἐν πνεύματι ἁγίῳ προσευχόμενοι,
translation:
  text: But you[a], beloved, building yourselves up in your most holy faith and praying in the Holy Spirit[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'on your most holy faith.' The Greek construction can be understood as building on a foundation as well as building up in relation to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the Holy Spirit.' The phrase may emphasize either the sphere of prayer ('in') or the Spirit's enabling agency ('by').
    reason: alternative_reading
  - marker: c
    text: '''Faith'' could also be understood here as ''faithfulness'' or ''trust,'' though in Jude the sense likely points to the community''s shared Christian faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δέ
  chosen: But you
  alternatives:
  - But as for you
  - But you yourselves
  lexicon: BDAG
  rationale: δέ marks contrast with the ungodly opponents in the preceding context, and the explicit pronoun ὑμεῖς adds emphasis. 'But you' preserves both the contrast and the direct address in natural English.
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  - loved ones
  lexicon: BDAG
  rationale: As a vocative plural, ἀγαπητοί is both affectionate and theologically weighty, commonly used for fellow believers as those loved by God and the writer. 'Beloved' preserves that gravity better than the more colloquial 'dear friends'.
- source_word: ἐποικοδομοῦντες
  chosen: building ... up
  alternatives:
  - building on
  - edifying
  lexicon: BDAG
  rationale: The participle literally conveys building upon an existing foundation. In this exhortational context, 'building yourselves up' is idiomatic and preserves the metaphor of spiritual strengthening without importing a different image.
- source_word: ἑαυτοὺς
  chosen: yourselves
  alternatives:
  - one another
  - yourselves collectively
  lexicon: BDAG
  rationale: The reflexive pronoun directly modifies the participle and refers to the addressed community. 'Yourselves' preserves the reflexive force; the plural address naturally includes a corporate sense without changing the wording to 'one another.'
- source_word: τῇ ἁγιωτάτῃ ὑμῶν πίστει
  chosen: in your most holy faith
  alternatives:
  - on your most holy faith
  - by your most holy faith
  lexicon: BDAG
  rationale: The dative with ἐποικοδομοῦντες can be rendered as the sphere or basis on which the building occurs. 'In your most holy faith' is natural English and keeps the metaphor intact. ἁγιωτάτῃ is a superlative, so 'most holy' should be retained. πίστις is rendered 'faith' per the project's default; here it refers to the believers' received faith rather than a clearly contested subjective/objective genitive construction.
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per the doctrine table, πίστις defaults to 'faith.' In Jude this likely denotes the Christian faith as believed/confessed, not primarily personal faithfulness, so 'faith' best fits the context.
- source_word: ἐν πνεύματι ἁγίῳ
  chosen: in the Holy Spirit
  alternatives:
  - by the Holy Spirit
  - in holy spirit
  lexicon: BDAG
  rationale: The phrase is best read as a reference to the Holy Spirit, not merely a human spiritual disposition. The anarthrous construction does not preclude definiteness in Greek. 'In the Holy Spirit' preserves the preposition ἐν and avoids over-interpreting instrumentality with 'by.'
- source_word: προσευχόμενοι
  chosen: praying
  alternatives:
  - while praying
  - as you pray
  lexicon: BDAG
  rationale: This present middle participle coordinates with ἐποικοδομοῦντες as part of Jude's chain of exhortational participles. 'Praying' keeps the participial flow and leaves the sentence open for the continuation in the next verse.
