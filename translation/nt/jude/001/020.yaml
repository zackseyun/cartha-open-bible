theological_decisions:
- issue: Reference of 'Holy Spirit' in ἐν πνεύματι ἁγίῳ
  chosen_reading: A reference to the divine Holy Spirit
  alternative_readings:
  - a human spiritual disposition ('in a holy spirit')
  rationale: Within early Christian usage and Jude's paraenetic context, the phrase most naturally refers to prayer carried out in the sphere or influence of the Holy Spirit. This aligns with historic orthodox Trinitarian reading without adding claims beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD); Translation philosophy §3 preserve theological tension rather than resolve it'
- issue: Sense of πίστις in 'your most holy faith'
  chosen_reading: the believers' faith as the received Christian faith/belief
  alternative_readings:
  - your act of trusting
  - your faithfulness
  rationale: In Jude, 'the faith' language elsewhere points toward the apostolic faith once delivered; here the possessive 'your' addresses the community's shared faith. 'Faith' preserves the lexical form while allowing the communal doctrinal sense to remain visible.
  doctrine_reference: 'Contested terms table: πίστις → faith; footnote alternatives where contested'
