id: JUD.1.9
reference: Jude 1:9
source:
  edition: SBLGNT
  text: ὁ δὲ Μιχαὴλ ὁ ἀρχάγγελος, ὅτε τῷ διαβόλῳ διακρινόμενος διελέγετο περὶ τοῦ
    Μωϋσέως σώματος, οὐκ ἐτόλμησεν κρίσιν ἐπενεγκεῖν βλασφημίας, ἀλλὰ εἶπεν· Ἐπιτιμήσαι
    σοι κύριος.
translation:
  text: But Michael the archangel, when he was disputing with the devil and arguing
    about Moses’ body, did not dare to bring a slanderous judgment against him, but
    said, “May the Lord rebuke you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “did not dare to pronounce a reviling accusation
      against him.”
    reason: lexical_alternative
  - marker: b
    text: The wording echoes Zechariah 3:2, where the Lord rebukes Satan.
    reason: cross_reference
lexical_decisions:
- source_word: ἀρχάγγελος
  chosen: archangel
  alternatives:
  - chief angel
  lexicon: BDAG
  rationale: Standard English rendering of the title; transparent and established
    without obscuring meaning.
- source_word: διαβόλῳ
  chosen: the devil
  alternatives:
  - the slanderer
  lexicon: BDAG
  rationale: Here διάβολος functions as the personal supernatural adversary, so the
    titular rendering 'the devil' is more natural than the more literal but less idiomatic
    'the slanderer'.
- source_word: διακρινόμενος
  chosen: was disputing
  alternatives:
  - was contending
  - was arguing
  lexicon: BDAG
  rationale: In this context the participle conveys engaging in a dispute or contention.
    'Was disputing' fits the legal-conflict nuance and pairs naturally with the following
    finite verb.
- source_word: διελέγετο
  chosen: arguing
  alternatives:
  - debating
  - conversing
  lexicon: BDAG
  rationale: The imperfect middle indicates ongoing verbal exchange. 'Arguing' captures
    the adversarial tone better than the more neutral 'conversing.' Used alongside
    'was disputing' to reflect the two verbal forms without collapsing them entirely.
- source_word: περὶ τοῦ Μωϋσέως σώματος
  chosen: about Moses’ body
  alternatives:
  - concerning the body of Moses
  lexicon: BDAG
  rationale: Natural modern English while preserving the genitive construction and
    the concrete reference.
- source_word: οὐκ ἐτόλμησεν
  chosen: did not dare
  alternatives:
  - did not presume
  - did not venture
  lexicon: BDAG
  rationale: τολμάω denotes daring or presuming to do something. 'Did not dare' is
    direct and idiomatic.
- source_word: κρίσιν ἐπενεγκεῖν βλασφημίας
  chosen: to bring a slanderous judgment against him
  alternatives:
  - to pronounce a blasphemous judgment
  - to bring a reviling accusation against him
  lexicon: BDAG
  rationale: The phrase is syntactically difficult. βλασφημίας most naturally qualifies
    the kind of judgment/charge involved. 'Bring a slanderous judgment against him'
    preserves the forensic sense of κρίσις + ἐπιφέρω while avoiding the possible misunderstanding
    that Michael himself was blaspheming God. The alternative traditional rendering
    is preserved in a footnote.
- source_word: Ἐπιτιμήσαι σοι κύριος
  chosen: May the Lord rebuke you
  alternatives:
  - The Lord rebuke you
  lexicon: BDAG
  rationale: The aorist optative expresses a wish or invocation. 'May the Lord rebuke
    you' makes the force explicit in contemporary English.
- source_word: κύριος
  chosen: the Lord
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' The article
    is represented idiomatically in English.
