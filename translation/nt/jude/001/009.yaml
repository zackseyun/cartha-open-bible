theological_decisions:
- issue: Nature of Michael’s restraint in addressing the devil
  chosen_reading: Michael refrains from issuing his own condemnatory denunciation
    and instead appeals to the Lord’s rebuke.
  alternative_readings:
  - Michael avoids a blasphemous judgment in the sense of irreverent speech
  - Michael avoids a reviling accusation as such
  rationale: 'The Greek phrase κρίσιν ... βλασφημίας is debated. The translation avoids
    importing a detailed angelology or over-specifying the exact theological mechanism,
    while preserving the clear contrast: Michael does not act on his own authority
    but invokes the Lord’s authority.'
  doctrine_reference: Preserve theological tension rather than resolve it.
