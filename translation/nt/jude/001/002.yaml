id: JUD.1.2
reference: Jude 1:2
source:
  edition: SBLGNT
  text: ἔλεος ὑμῖν καὶ εἰρήνη καὶ ἀγάπη πληθυνθείη.
translation:
  text: May mercy and peace and love be multiplied to you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'increase' or 'abound' for 'be multiplied.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  lexicon: BDAG
  rationale: Standard gloss for ἔλεος in epistolary blessing contexts; 'mercy' preserves
    both covenantal and affective dimensions better than the softer 'compassion' here.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: Dative pronoun in a blessing formula is naturally rendered 'to you' in
    English, matching the direction of the wish.
- source_word: εἰρήνη
  chosen: peace
  alternatives:
  - well-being
  lexicon: BDAG
  rationale: '''Peace'' is the established and accurate rendering, preserving both
    interpersonal and covenantal resonance without overexpanding the term.'
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.' 'Charity' is archaic
    and would obscure the lexical connection for modern readers.
- source_word: πληθυνθείη
  chosen: be multiplied
  alternatives:
  - increase
  - abound
  lexicon: BDAG
  rationale: Aorist passive optative in a benedictory wish is well captured by 'be
    multiplied.' This preserves the formal imagery of increase more closely than the
    smoother but less literal 'increase' or 'abound'.
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... and
  alternatives:
  - comma-separated list
  lexicon: LSJ
  rationale: The repeated καί is retained with repeated 'and' to preserve the rhythmic,
    solemn accumulation of the blessing rather than flattening it into a simple list.
