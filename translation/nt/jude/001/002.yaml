- issue: Rendering the optative blessing formula
  chosen_reading: May mercy and peace and love be multiplied to you.
  alternative_readings:
  - Mercy and peace and love be multiplied to you.
  - May mercy, peace, and love increase to you.
  rationale: English idiom normally expresses the optative force with 'May ...' This
    makes the benedictory wish explicit without adding doctrinal content. Retaining
    'be multiplied' preserves the source metaphor of increase.
