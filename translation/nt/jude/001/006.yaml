id: JUD.1.6
reference: Jude 1:6
source:
  edition: SBLGNT
  text: ἀγγέλους τε τοὺς μὴ τηρήσαντας τὴν ἑαυτῶν ἀρχὴν ἀλλὰ ἀπολιπόντας τὸ ἴδιον οἰκητήριον εἰς κρίσιν μεγάλης ἡμέρας δεσμοῖς ἀϊδίοις ὑπὸ ζόφον τετήρηκεν·
translation:
  text: And the angels who did not keep their own domain[a], but abandoned their proper dwelling[c][b], he has kept in eternal chains under gloom for the judgment of the great day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their own position' or 'their own rule' for 'their own domain.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their own dwelling-place' for 'their proper dwelling.'
    reason: lexical_alternative
  - marker: c
    text: Or 'under darkness'; the Greek term denotes deep gloom.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this judgment context, referring to supernatural beings fits the immediate sense and the broader Jewish background of Jude better than 'messengers.'
- source_word: τηρήσαντας / τετήρηκεν
  chosen: did not keep / he has kept
  alternatives:
  - guarded / has reserved
  - observed / has preserved
  lexicon: BDAG
  rationale: 'Using ''keep'' for both occurrences preserves Jude''s deliberate verbal repetition and contrast: they did not keep their assigned place, so God has kept them for judgment.'
- source_word: τὴν ἑαυτῶν ἀρχὴν
  chosen: their own domain
  alternatives:
  - their own position
  - their own rule
  - their own beginning
  lexicon: BDAG
  rationale: ἀρχή can denote beginning, authority, or sphere/position. Here 'domain' best captures an assigned sphere or station that they failed to maintain, without overcommitting to political 'rule' or temporal 'beginning.'
- source_word: ἀπολιπόντας
  chosen: abandoned
  alternatives:
  - left
  - forsook
  lexicon: BDAG
  rationale: '''Abandoned'' conveys deliberate departure with culpable force, fitting the verse''s judicial tone.'
- source_word: τὸ ἴδιον οἰκητήριον
  chosen: their proper dwelling
  alternatives:
  - their own dwelling-place
  - their habitation
  - their home
  lexicon: BDAG
  rationale: οἰκητήριον denotes a dwelling place. 'Proper dwelling' brings out both ἴδιον ('their own') and the sense of a fitting or appointed habitation in context.
- source_word: εἰς κρίσιν μεγάλης ἡμέρας
  chosen: for the judgment of the great day
  alternatives:
  - for judgment on the great day
  - until the judgment of the great day
  lexicon: BDAG
  rationale: This phrase expresses purpose/result with eschatological orientation. 'For the judgment of the great day' is natural English and preserves the genitival structure. 'Until' is interpretive and less directly tied to εἰς.
- source_word: δεσμοῖς ἀϊδίοις
  chosen: in eternal chains
  alternatives:
  - with everlasting bonds
  - in everlasting chains
  lexicon: BDAG
  rationale: δεσμοῖς is naturally 'chains' or 'bonds'; 'chains' is vivid and idiomatic. ἀΐδιος denotes perpetual or everlasting duration; 'eternal' is the clearest modern rendering.
- source_word: ὑπὸ ζόφον
  chosen: under gloom
  alternatives:
  - under darkness
  - in gloomy darkness
  lexicon: BDAG
  rationale: ζόφος is not ordinary darkness but deep gloom or murky darkness. 'Under gloom' preserves the preposition and the stark imagery without overexpansion.
- source_word: τε
  chosen: And
  alternatives:
  - Now
  - also
  lexicon: BDAG
  rationale: τε links this example with the preceding judgments. 'And' is the most natural connective in English here.
