theological_decisions:
- issue: Meaning of the angels' transgression
  chosen_reading: The verse is translated to state that angels failed to keep their assigned domain and abandoned their proper dwelling, without specifying beyond the Greek what that domain or dwelling precisely was.
  alternative_readings:
  - A reference to the Genesis 6 tradition of angelic rebellion
  - A more general reference to primordial angelic fall
  rationale: Jude likely evokes a known Jewish tradition, but the Greek text itself does not define the background in detail. The translation preserves the text's wording and theological tension rather than importing a full interpretive framework into the main text.
  doctrine_reference: Translation philosophy §3
- issue: Force of ἀΐδιος
  chosen_reading: eternal
  alternative_readings:
  - everlasting
  - perpetual
  rationale: The term denotes enduring permanence. 'Eternal' is standard and clear, while not requiring a more detailed doctrinal claim about the metaphysics of the chains than the text itself states.
