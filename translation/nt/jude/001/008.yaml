id: JUD.1.8
reference: Jude 1:8
source:
  edition: SBLGNT
  text: Ὁμοίως μέντοι καὶ οὗτοι ἐνυπνιαζόμενοι σάρκα μὲν μιαίνουσιν, κυριότητα δὲ
    ἀθετοῦσιν, δόξας δὲ βλασφημοῦσιν.
translation:
  text: Yet in the same way, these people also, dreaming, defile the flesh, reject
    authority, and slander glorious ones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "dreaming." The Greek participle can be rendered more formally, but
      here likely implies that they appeal to dreams as warrant for their behavior.'
    reason: lexical_alternative
  - marker: b
    text: '"Glorious ones" likely refers to exalted heavenly beings, possibly angels;
      Greek: "glories."'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁμοίως μέντοι
  chosen: Yet in the same way
  alternatives:
  - Likewise, however
  - Nevertheless, likewise
  lexicon: BDAG
  rationale: Combines ὁμοίως ('in the same way/likewise') with the mildly adversative
    μέντοι ('yet/however'). 'Yet in the same way' preserves both the comparison with
    prior examples and the contrastive force.
- source_word: οὗτοι
  chosen: these people
  alternatives:
  - these
  - these men
  lexicon: BDAG
  rationale: The demonstrative refers to the intruders described in context. 'These
    people' makes the referent clear in natural English without importing a male-specific
    term not explicit in the Greek here.
- source_word: ἐνυπνιαζόμενοι
  chosen: relying on dreams
  alternatives:
  - dreaming
  - being dreamers
  - on the basis of dreams
  lexicon: BDAG
  rationale: The participle likely indicates the basis or manner of their behavior,
    not merely that they happen to dream. 'Relying on dreams' captures the likely
    sense that they appeal to dream-experiences as warrant for their conduct. A more
    formal 'dreaming' is possible and preserved in a footnote.
- source_word: σάρκα
  chosen: the flesh
  alternatives:
  - flesh
  - their bodies
  - the body
  lexicon: BDAG
  rationale: Given the vice context and the doctrine guidance on σάρξ, 'the flesh'
    best preserves the Greek term without over-interpreting it as either merely physical
    body or the Pauline technical sense 'sinful nature.' The article in English helps
    it read idiomatically.
- source_word: μιαίνουσιν
  chosen: defile
  alternatives:
  - pollute
  - stain
  lexicon: BDAG
  rationale: '''Defile'' is the standard moral/ritual term and fits Jude''s denunciatory
    tone.'
- source_word: κυριότητα
  chosen: authority
  alternatives:
  - lordship
  - dominion
  lexicon: BDAG
  rationale: κυριότης can denote dominion or lordship, but here the object of ἀθετοῦσιν
    is best rendered generally as 'authority.' This preserves the ambiguity of whether
    Jude means divine lordship, angelic authority, or authority structures more broadly.
- source_word: ἀθετοῦσιν
  chosen: reject
  alternatives:
  - set aside
  - repudiate
  - disregard
  lexicon: BDAG
  rationale: '''Reject'' is concise and strong, matching the sense of repudiating
    what should be acknowledged.'
- source_word: δόξας
  chosen: glorious ones
  alternatives:
  - glories
  - glorious beings
  - majestic ones
  lexicon: BDAG
  rationale: The plural likely refers to glorious heavenly beings rather than abstract
    'glories.' 'Glorious ones' preserves the ambiguity and avoids prematurely specifying
    'angels' in the main text.
- source_word: βλασφημοῦσιν
  chosen: slander
  alternatives:
  - blaspheme
  - speak abusively of
  lexicon: BDAG
  rationale: In English, 'blaspheme' can imply speech only against God, whereas here
    the object is likely exalted beings. 'Slander' communicates abusive, reviling
    speech more clearly in modern English while retaining the seriousness.
