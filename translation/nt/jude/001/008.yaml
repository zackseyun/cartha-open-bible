theological_decisions:
- issue: Referent of δόξας
  chosen_reading: an intentionally broad expression for exalted/glorious beings
  alternative_readings:
  - angels
  - celestial majesties
  - glories as abstract heavenly dignities
  rationale: The immediate context in Jude 1:9 points toward angelic beings, but the
    noun itself is less explicit. The translation preserves the Greek's breadth in
    the main text and leaves more specific identification to context and footnote
    rather than resolving the ambiguity too strongly.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Force of ἐνυπνιαζόμενοι
  chosen_reading: their conduct is connected to reliance on dreams
  alternative_readings:
  - they are simply dreamers
  - while dreaming
  rationale: The participle plausibly explains the basis on which they act. Rendering
    it as 'relying on dreams' makes that relation clear, while a footnote preserves
    the more formal alternative 'dreaming.'
  doctrine_reference: Original-language primacy over translation tradition; Preserve
    theological tension rather than resolve it.
