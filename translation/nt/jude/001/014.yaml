id: JUD.1.14
reference: Jude 1:14
source:
  edition: SBLGNT
  text: Προεφήτευσεν δὲ καὶ τούτοις ἕβδομος ἀπὸ Ἀδὰμ Ἑνὼχ λέγων· Ἰδοὺ ἦλθεν κύριος
    ἐν ἁγίαις μυριάσιν αὐτοῦ,
translation:
  text: And Enoch, the seventh from Adam, also prophesied about these men, saying,
    “Behold, the Lord came with his holy myriads,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “against these” or “concerning these people.” The Greek dative τούτοις
      can be understood as indicating those about whom the prophecy speaks, and in
      context it refers to the ungodly intruders.
    reason: lexical_alternative
  - marker: b
    text: Or “with ten thousands of his holy ones.” μυριάσιν can denote ‘myriads’
      or ‘tens of thousands’; the phrase refers to a vast holy host.
    reason: lexical_alternative
  - marker: c
    text: The quotation echoes 1 Enoch 1:9.
    reason: cross_reference
lexical_decisions:
- source_word: Προεφήτευσεν
  chosen: prophesied
  alternatives:
  - foretold
  lexicon: BDAG
  rationale: Aorist indicative of προφητεύω; 'prophesied' preserves the prophetic
    speech act without narrowing it to mere prediction.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here functions as a mild connective advancing the discourse. 'And'
    is natural English and does not overstate contrast.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: καί adds Enoch as an additional witness against the intruders; 'also'
    captures the additive force.
- source_word: τούτοις
  chosen: about these men
  alternatives:
  - against these
  - concerning these people
  lexicon: BDAG
  rationale: Dative with προφητεύω can indicate reference/concern. In context Jude
    refers to the ungodly intruders just described, so 'about these men' is idiomatic
    and contextually specific without adding more than the discourse supplies.
- source_word: ἕβδομος ἀπὸ Ἀδὰμ
  chosen: the seventh from Adam
  alternatives:
  - seventh after Adam
  lexicon: BDAG
  rationale: This genealogical designation is best rendered straightforwardly. 'From
    Adam' is the more literal and common English expression here.
- source_word: Ἑνὼχ
  chosen: Enoch
  rationale: Standard English transliteration of the personal name.
- source_word: λέγων
  chosen: saying
  alternatives:
  - when he said
  lexicon: BDAG
  rationale: Present participle introducing the quotation; 'saying' is the standard
    concise rendering.
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the prophetic and solemn force of the deictic interjection. Though
    somewhat elevated, it remains readable and fits the quotation's tone.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - has come
  - is coming
  lexicon: BDAG
  rationale: Aorist indicative formally points to a past action. In prophetic citation
    this may function as a prophetic past, but the Greek form is best represented
    as 'came' here rather than importing an interpretive future.
- source_word: κύριος
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: κύριος is rendered by the doctrinal default 'Lord.' The article is present
    in Greek, so 'the Lord' is appropriate in English.
- source_word: ἐν ἁγίαις μυριάσιν αὐτοῦ
  chosen: with his holy myriads
  alternatives:
  - among his holy myriads
  - with ten thousands of his holy ones
  - with his holy ones in countless numbers
  lexicon: BDAG
  rationale: μυριάσιν denotes tens of thousands/myriads, often idiomatically an innumerable
    host. ἐν here is rendered instrumentally/associatively as 'with,' which fits the
    allusion and English idiom. 'Holy myriads' preserves the adjective's direct relation
    to the host without prematurely specifying 'angels,' which the Greek does not
    state explicitly.
