theological_decisions:
- issue: Identity of 'the Lord' in the Enoch citation
  chosen_reading: Render simply as 'the Lord' without specifying in the translation
    whether Jude intends God generally or the Lord Jesus specifically.
  alternative_readings:
  - a reference to God in the Enochic source context
  - a christological application to Jesus in Jude's usage
  rationale: The Greek text says only κύριος. In keeping with the doctrine of preserving
    theological tension rather than resolving it, the translation leaves the referent
    at the level stated by the text. The title is translated per the default rendering
    for κύριος.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Contested terms table for κύριος → Lord'
- issue: Nature of the quotation from 1 Enoch
  chosen_reading: Translate it as a prophetic quotation without commenting in the
    main text on canonical status.
  alternative_readings:
  - treat as a direct citation of 1 Enoch 1:9
  - treat as a traditional prophecy attributed to Enoch
  rationale: Jude presents Enoch as prophesying; the translation should reflect Jude's
    wording without importing a judgment about the status of 1 Enoch into the verse
    itself.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition;
    do not import doctrinal claims the text does not make'
