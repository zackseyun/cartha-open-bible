theological_decisions:
- issue: Meaning of the genitive in 'ἀγάπῃ θεοῦ'
  chosen_reading: Preserve the ambiguity with 'the love of God' rather than specifying
    either God's love for believers or believers' love for God.
  alternative_readings:
  - God's love
  - your love for God
  rationale: The Greek genitive can be understood in more than one way, and the immediate
    context does not require collapsing the ambiguity. Preserving the tension aligns
    with the translation philosophy not to resolve what the source leaves open.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it.
- issue: Rendering Χριστοῦ in the title 'Ἰησοῦ Χριστοῦ'
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The doctrinal guidance prefers translating Christological titles where
    context supports title force. Here the phrase still carries titular meaning, so
    'Jesus Messiah' is used.
  doctrine_reference: Translation philosophy §2 Translate titles; transliterate names;
    Contested terms table for Χριστός.
