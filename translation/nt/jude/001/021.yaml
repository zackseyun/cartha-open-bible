id: JUD.1.21
reference: Jude 1:21
source:
  edition: SBLGNT
  text: ἑαυτοὺς ἐν ἀγάπῃ θεοῦ τηρήσατε προσδεχόμενοι τὸ ἔλεος τοῦ κυρίου ἡμῶν Ἰησοῦ
    Χριστοῦ εἰς ζωὴν αἰώνιον.
translation:
  text: keep yourselves in the love of God, waiting for the mercy of our Lord Jesus
    Messiah that leads to eternal life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in God's love'; the Greek may also be understood as 'in love for God.'
    reason: alternative_reading
  - marker: b
    text: Greek 'Jesus Christ'; translated 'Jesus Messiah' here because Χριστός is
      treated as a title.
    reason: lexical_alternative
  - marker: c
    text: Or 'for eternal life' or 'unto eternal life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τηρήσατε
  chosen: keep yourselves
  alternatives:
  - guard yourselves
  - preserve yourselves
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural, giving a direct exhortation.
    'Keep yourselves' is idiomatic and preserves the imperative force without overinterpreting
    the means.
- source_word: ἐν ἀγάπῃ θεοῦ
  chosen: in the love of God
  alternatives:
  - in God's love
  - in love for God
  lexicon: BDAG
  rationale: ἀγάπη is rendered 'love' per default. The genitive θεοῦ is ambiguous
    in isolation, but in context 'the love of God' best preserves the Greek without
    prematurely resolving whether it is God's love for believers or believers' love
    oriented toward God. This also matches the surrounding triadic pattern in Jude
    1:20–21.
- source_word: προσδεχόμενοι
  chosen: waiting for
  alternatives:
  - expecting
  - eagerly awaiting
  lexicon: BDAG
  rationale: The present middle participle expresses an ongoing posture accompanying
    the imperative. 'Waiting for' is natural modern English and adequately conveys
    expectant reception without adding intensity not explicit in the form.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  lexicon: BDAG
  rationale: Standard rendering that preserves the theological sense of undeserved
    compassionate favor.
- source_word: κυρίου
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Follows the doctrinal default for κύριος as 'Lord' in NT usage.
- source_word: Ἰησοῦ Χριστοῦ
  chosen: Jesus Messiah
  alternatives:
  - Jesus Christ
  lexicon: BDAG
  rationale: Χριστοῦ functions as a title here rather than a mere name-like element,
    so 'Messiah' is preferred per doctrine to preserve meaning.
- source_word: εἰς ζωὴν αἰώνιον
  chosen: that leads to eternal life
  alternatives:
  - unto eternal life
  - for eternal life
  lexicon: BDAG
  rationale: εἰς marks goal/result. Rendering it as 'that leads to eternal life' makes
    the relation clear in contemporary English while preserving the forward movement
    of the Greek. 'Eternal life' is the standard rendering of ζωὴ αἰώνιος.
