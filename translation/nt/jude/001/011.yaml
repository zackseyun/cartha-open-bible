id: JUD.1.11
reference: Jude 1:11
source:
  edition: SBLGNT
  text: οὐαὶ αὐτοῖς, ὅτι τῇ ὁδῷ τοῦ Κάϊν ἐπορεύθησαν, καὶ τῇ πλάνῃ τοῦ Βαλαὰμ μισθοῦ
    ἐξεχύθησαν, καὶ τῇ ἀντιλογίᾳ τοῦ Κόρε ἀπώλοντο.
translation:
  text: Woe to them, because they have gone in the way of Cain, and have rushed headlong
    into Balaam’s error for pay, and have perished in Korah’s rebellion.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “and for profit they rushed headlong into Balaam’s error.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαὶ
  chosen: Woe
  alternatives:
  - Alas
  lexicon: BDAG
  rationale: Interjection of denunciation/judgment; 'Woe' preserves the prophetic
    force better than the softer 'Alas.'
- source_word: τῇ ὁδῷ τοῦ Κάϊν
  chosen: in the way of Cain
  alternatives:
  - on Cain's path
  - in Cain's way
  lexicon: BDAG
  rationale: ὁδός is commonly metaphorical for a course of conduct. 'In the way of
    Cain' is idiomatic English and preserves the biblical allusive force.
- source_word: ἐπορεύθησαν
  chosen: have walked
  alternatives:
  - went
  - have gone
  lexicon: BDAG
  rationale: Though literally 'went,' in this moral-metaphorical construction with
    ὁδός it denotes conduct. 'Have walked' preserves the metaphor and fits English
    biblical style without being archaic.
- source_word: τῇ πλάνῃ τοῦ Βαλαὰμ
  chosen: into Balaam’s error
  alternatives:
  - in Balaam's error
  - in Balaam's wandering
  - in Balaam's deception
  lexicon: BDAG
  rationale: πλάνη can denote error, deception, or wandering. Here the reference is
    to Balaam's morally corrupt false course; 'error' is concise and natural, while
    the preposition 'into' reflects the movement implied by the verb.
- source_word: μισθοῦ
  chosen: for pay
  alternatives:
  - for profit
  - for wages
  - for reward
  lexicon: BDAG
  rationale: μισθός denotes compensation or wages. 'For pay' is clear modern English
    and highlights mercenary motive without sounding overly technical.
- source_word: ἐξεχύθησαν
  chosen: have poured themselves out
  alternatives:
  - rushed headlong
  - abandoned themselves
  - were poured out
  lexicon: BDAG
  rationale: The verb is literally 'were poured out,' but in this context it is metaphorical
    and likely middle/passive in sense of reckless self-abandonment. 'Have poured
    themselves out' preserves the vivid image while making sense in English. The common
    interpretive rendering 'rushed headlong' captures sense but loses the metaphor,
    so it is preserved as an alternative rather than chosen for the main text.
- source_word: τῇ ἀντιλογίᾳ τοῦ Κόρε
  chosen: in Korah’s rebellion
  alternatives:
  - in Korah's opposition
  - in the rebellion of Korah
  - in Korah's contradiction
  lexicon: BDAG
  rationale: ἀντιλογία can mean opposition, contradiction, or rebellion. Given the
    allusion to Numbers 16, 'rebellion' best communicates the concrete biblical event
    and its theological significance.
- source_word: ἀπώλοντο
  chosen: have perished
  alternatives:
  - were destroyed
  - have been ruined
  lexicon: BDAG
  rationale: ἀπόλλυμι here refers to destruction/perishing. 'Have perished' is natural,
    solemn, and preserves the resultative force without over-specifying the mode of
    destruction.
- source_word: Κόρε
  chosen: Korah
  alternatives:
  - Core
  lexicon: BDAG
  rationale: Standard English transliteration aligns the Greek form with the familiar
    Old Testament name Korah.
- source_word: Βαλαὰμ
  chosen: Balaam
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
- source_word: Κάϊν
  chosen: Cain
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name.
