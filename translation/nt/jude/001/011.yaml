theological_decisions:
- issue: How to render the metaphorically difficult phrase καὶ τῇ πλάνῃ τοῦ Βαλαὰμ
    μισθοῦ ἐξεχύθησαν
  chosen_reading: and have poured themselves out for pay into Balaam’s error
  alternative_readings:
  - and for profit they rushed headlong into Balaam's error
  - and they were swept away in Balaam's error for wages
  rationale: The clause is syntactically compressed and metaphorical. The chosen rendering
    preserves the imagery of ἐξεχύθησαν ('poured out') while making explicit the mercenary
    motive signaled by μισθοῦ. This avoids flattening the text into pure interpretation,
    yet remains readable. Because the phrase is genuinely difficult, a more idiomatic
    alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
