id: JUD.1.18
reference: Jude 1:18
source:
  edition: SBLGNT
  text: ὅτι ἔλεγον ⸀ὑμῖν· ⸂Ἐπ’ ἐσχάτου χρόνου⸃ ἔσονται ἐμπαῖκται κατὰ τὰς ἑαυτῶν ἐπιθυμίας
    πορευόμενοι τῶν ἀσεβειῶν.
translation:
  text: that they were saying to you, “In the last time there will be mockers, going
    according to their own ungodly desires.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “scoffers.”
    reason: lexical_alternative
  - marker: b
    text: Or “In the end time” or “At the end of time.” The Greek is singular, “time,”
      not “days.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  - they used to say
  lexicon: BDAG
  rationale: Imperfect tense suggests repeated or ongoing past speech. 'They were
    saying' preserves that aspect better than simple past, while remaining natural
    in English.
- source_word: Ἐπ’ ἐσχάτου χρόνου
  chosen: In the last time
  alternatives:
  - In the end time
  - At the end of time
  - In the last days
  lexicon: BDAG
  rationale: The Greek is singular ('time'), not plural 'days.' 'In the last time'
    is a close and natural rendering that preserves the eschatological sense without
    importing the more traditional but less exact 'last days.'
- source_word: ἐμπαῖκται
  chosen: mockers
  alternatives:
  - scoffers
  lexicon: BDAG
  rationale: Both are viable. 'Mockers' is more accessible modern English and clearly
    conveys derisive opposition. 'Scoffers' is preserved as an alternative because
    of its familiarity in many translations.
- source_word: κατὰ τὰς ἑαυτῶν ἐπιθυμίας
  chosen: according to their own ... desires
  alternatives:
  - following their own ... desires
  - according to their own lusts
  lexicon: BDAG
  rationale: κατά with the accusative here conveys conformity or accordance. 'According
    to' is slightly more formal and tracks the Greek closely. ἐπιθυμίαι can mean desires
    generally or lusts more narrowly; 'desires' is broader and avoids oversexualizing
    the term.
- source_word: πορευόμενοι
  chosen: going
  alternatives:
  - walking
  - living
  - conducting themselves
  lexicon: BDAG
  rationale: The participle literally denotes going/walking and metaphorically describes
    manner of life. 'Going according to' preserves the verbal imagery and the participial
    linkage without over-paraphrasing.
- source_word: τῶν ἀσεβειῶν
  chosen: ungodly
  alternatives:
  - of ungodliness
  - godless
  lexicon: BDAG
  rationale: 'The genitive most naturally qualifies the desires: desires characterized
    by ungodliness. Rendering it adjectivally in English (''ungodly desires'') is
    idiomatic and preserves the moral-religious force of ἀσέβεια.'
