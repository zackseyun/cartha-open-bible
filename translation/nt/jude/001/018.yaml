theological_decisions:
- issue: Eschatological expression
  chosen_reading: In the last time
  alternative_readings:
  - In the last days
  - At the end of time
  rationale: The translation preserves the singular χρόνος and does not harmonize
    Jude's wording to more familiar eschatological phrases elsewhere. This maintains
    the source text's own expression without reducing its eschatological force.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Moral characterization of desires
  chosen_reading: ungodly desires
  alternative_readings:
  - desires of ungodliness
  - godless desires
  rationale: The phrase is rendered in clear modern English while preserving the text's
    moral judgment. It does not narrow the desires to one category such as sexual
    lust, since the Greek term is broader.
  doctrine_reference: Translation philosophy §§1, 6
