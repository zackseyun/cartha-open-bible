id: EPH.5.21
reference: Ephesians 5:21
source:
  edition: SBLGNT
  text: ὑποτασσόμενοι ἀλλήλοις ἐν φόβῳ Χριστοῦ.
translation:
  text: submitting to one another in the fear of Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in reverence for Christ' or 'in awe of Christ.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; translated 'the Messiah' here because Χριστός functions
      as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑποτασσόμενοι
  chosen: submitting
  alternatives:
  - being subject
  - subjecting yourselves
  lexicon: BDAG
  rationale: Present participle of ὑποτάσσω, continuing the series of participles
    dependent on the preceding imperative context. 'Submitting' preserves the participial
    form and avoids prematurely specifying reflexive force. 'Being subject' is possible
    but less natural in English here; 'subjecting yourselves' overstates reflexivity
    not explicit in the form.
- source_word: ἀλλήλοις
  chosen: to one another
  alternatives:
  - to each other
  lexicon: BDAG
  rationale: Reciprocal pronoun in the dative plural. 'To one another' is the standard
    clear rendering and preserves the reciprocal sense.
- source_word: ἐν
  chosen: in
  alternatives:
  - with
  - out of
  lexicon: BDAG
  rationale: The preposition with φόβῳ is most naturally rendered 'in,' expressing
    sphere or manner. English idiom could allow 'with,' but 'in' stays closer to the
    Greek while remaining readable.
- source_word: φόβῳ
  chosen: fear
  alternatives:
  - reverence
  - awe
  lexicon: BDAG
  rationale: φόβος can denote fear, reverence, or awe depending on context. 'Fear'
    is retained in the main text because it is the lexical core and preserves the
    theological tension of reverent fear toward the exalted Messiah. Softer alternatives
    are preserved in a footnote rather than replacing the term in the text.
- source_word: Χριστοῦ
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Genitive singular of Χριστός. Per doctrine guidance, titles are translated
    rather than transliterated where context supports title force. Here the phrase
    denotes reverence directed toward Jesus in his messianic identity, so 'the Messiah'
    is preferred over the traditional 'Christ'.
