theological_decisions:
- issue: Sense of 'fear of Christ'
  chosen_reading: 'objective genitive: reverent fear directed toward the Messiah'
  alternative_readings:
  - fear produced by the Messiah
  - reverence for Christ
  rationale: The most straightforward reading is that believers submit to one another
    in reverent fear toward Christ. Rendering φόβος as 'fear' preserves the text's
    stronger wording while allowing readers to understand it as reverential fear in
    context, rather than cringing terror. This avoids flattening the theological weight
    into mere politeness.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering Χριστοῦ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: DOCTRINE.md directs that Χριστός be translated as 'Messiah' where it
    functions as a title, with 'Christ' used where it is name-like. In this phrase
    the titular sense is still active enough to justify 'the Messiah.' The traditional
    alternative is preserved in a footnote.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where
    name-like).'
