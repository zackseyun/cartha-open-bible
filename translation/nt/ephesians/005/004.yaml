id: EPH.5.4
reference: Ephesians 5:4
source:
  edition: SBLGNT
  text: καὶ αἰσχρότης καὶ μωρολογία ἢ εὐτραπελία, ⸂ἃ οὐκ ἀνῆκεν⸃, ἀλλὰ μᾶλλον εὐχαριστία.
translation:
  text: And obscenity and foolish talk or crude joking—things that are not fitting—but
    rather thanksgiving.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coarse jesting.' The Greek term εὐτραπελία can refer more generally
      to wit, but here it is used negatively because it is grouped with unfitting
      speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'which are not proper' or 'which are not appropriate.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αἰσχρότης
  chosen: obscenity
  alternatives:
  - shamefulness
  - filthiness
  - indecency
  lexicon: BDAG
  rationale: The noun denotes what is shameful or base in speech/conduct. In this
    context, paired with speech-related vices, 'obscenity' best captures disgraceful,
    indecent expression in natural modern English without overgeneralizing to all
    moral shamefulness.
- source_word: μωρολογία
  chosen: foolish talk
  alternatives:
  - stupid talk
  - senseless speech
  lexicon: BDAG
  rationale: A compound meaning foolish/silly speech. 'Foolish talk' is transparent,
    idiomatic, and preserves the semantic link to speech without becoming slangy.
- source_word: ἢ
  chosen: or
  alternatives:
  - nor
  lexicon: BDAG
  rationale: The conjunction here links the final item in the vice list. 'Or' is the
    straightforward rendering; English style still conveys a cumulative prohibition
    from the surrounding syntax.
- source_word: εὐτραπελία
  chosen: crude joking
  alternatives:
  - coarse jesting
  - vulgar joking
  - ribaldry
  lexicon: BDAG
  rationale: Though the term could denote wit in some contexts, here it is grouped
    with vices and qualified as unfitting, so a negative rendering is required. 'Crude
    joking' communicates inappropriate, suggestive humor in accessible modern English.
- source_word: ἃ οὐκ ἀνῆκεν
  chosen: things that are not fitting
  alternatives:
  - which are not proper
  - which are not appropriate
  lexicon: BDAG
  rationale: The neuter plural relative pronoun refers back collectively to the listed
    behaviors. 'Not fitting' preserves the moral sense of what is improper or unsuitable
    while remaining concise.
- source_word: ἀλλὰ μᾶλλον
  chosen: but rather
  alternatives:
  - but instead
  - rather
  lexicon: BDAG
  rationale: This marks a strong contrast between prohibited speech and the positive
    replacement. 'But rather' preserves the adversative force and the comparative
    emphasis of μᾶλλον.
- source_word: εὐχαριστία
  chosen: thanksgiving
  alternatives:
  - gratitude
  - giving thanks
  lexicon: BDAG
  rationale: The noun denotes thankful expression. 'Thanksgiving' keeps the nominal
    contrast with the preceding nouns and fits Paul's emphasis on speech transformed
    into grateful acknowledgment.
