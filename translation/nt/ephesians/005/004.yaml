theological_decisions:
- issue: Scope of the vice list in relation to speech
  chosen_reading: Render the three nouns as primarily speech-related vices, culminating
    in a contrast with thankful speech.
  alternative_readings:
  - Take αἰσχρότης more broadly as general moral indecency rather than specifically
    obscene speech
  rationale: The immediate context includes terms explicitly about speech (μωρολογία,
    εὐτραπελία) and contrasts them with εὐχαριστία, also an expression in speech.
    Rendering αἰσχρότης as 'obscenity' reflects this contextual narrowing without
    importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Moral evaluation of εὐτραπελία
  chosen_reading: Translate negatively as 'crude joking' in the main text.
  alternative_readings:
  - '''wittiness'''
  - '''cleverness'''
  rationale: Although εὐτραπελία can be positive in other Greek usage, Paul's syntax
    and the clause 'things that are not fitting' require a pejorative sense here.
    The translation preserves the text's ethical contrast rather than neutralizing
    it.
  doctrine_reference: Translation philosophy §§1, 5
