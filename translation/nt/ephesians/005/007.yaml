theological_decisions:
- issue: Scope of participation implied by συμμέτοχοι αὐτῶν
  chosen_reading: A general prohibition against sharing in the people and their sinful
    way of life, rendered without over-specifying the object.
  alternative_readings:
  - do not become participants in these things
  - do not share in their deeds
  rationale: The immediate context concerns the works and identity of 'sons of disobedience'
    (vv. 6, 11). The Greek here names persons ('them') rather than explicitly 'these
    things,' so the translation preserves that wording while allowing the contextual
    implication of shared conduct to remain implicit.
  doctrine_reference: Translation philosophy §§1, 3, 5
