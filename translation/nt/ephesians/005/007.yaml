id: EPH.5.7
reference: Ephesians 5:7
source:
  edition: SBLGNT
  text: μὴ οὖν γίνεσθε συμμέτοχοι αὐτῶν·
translation:
  text: Therefore, do not become partners with them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'participants with them' or 'partakers with them.' The phrase refers
      contextually to sharing in their sinful conduct or its consequences.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  chosen: do not
  alternatives:
  - not
  lexicon: BDAG
  rationale: Standard negation with the imperative/middle verb γίνεσθε; in English
    it is naturally rendered with auxiliary 'do not'.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding warning context (vv. 3–6). 'Therefore'
    best preserves the logical connection in clear modern English.
- source_word: γίνεσθε
  chosen: become
  alternatives:
  - be
  - come to be
  lexicon: BDAG
  rationale: γίνομαι commonly means 'become' or 'come to be.' Here the present middle
    imperative warns against entering into or taking on a state, so 'become' is more
    precise than the stative 'be'.
- source_word: συμμέτοχοι
  chosen: partners
  alternatives:
  - partakers
  - participants
  - sharers
  lexicon: BDAG
  rationale: The term denotes those who share with others in something. 'Partners'
    is natural modern English and fits the context of sharing in the conduct or fate
    of the disobedient. 'Partakers' is more traditional but less idiomatic.
- source_word: αὐτῶν
  chosen: with them
  alternatives:
  - of them
  - in their deeds
  lexicon: BDAG
  rationale: The genitive pronoun depends on συμμέτοχοι and is idiomatically expressed
    in English as 'partners with them.' Expanding to 'in their deeds' would over-interpret
    beyond the explicit wording, though the context implies such participation.
