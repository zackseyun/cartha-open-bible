id: EPH.5.24
reference: Ephesians 5:24
source:
  edition: SBLGNT
  text: ἀλλὰ ⸀ὡς ἡ ἐκκλησία ὑποτάσσεται τῷ Χριστῷ, οὕτως καὶ αἱ γυναῖκες ⸀τοῖς ἀνδράσιν
    ἐν παντί.
translation:
  text: But as the church submits to the Messiah, so also wives are to submit to their
    husbands in everything.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  chosen: But
  alternatives:
  - Nevertheless
  - Rather
  lexicon: BDAG
  rationale: Marks contrast/resumption from the preceding statement; 'But' is the
    most natural English connective here.
- source_word: ὡς ... οὕτως καὶ
  chosen: as ... so also
  alternatives:
  - just as ... so also
  - as ... likewise
  lexicon: BDAG
  rationale: Preserves the correlative comparison structure in Greek without overloading
    the English.
- source_word: ἐκκλησία
  chosen: the church
  alternatives:
  - the assembly
  lexicon: BDAG
  rationale: In Pauline usage this commonly denotes the Christian community; 'church'
    is the standard and clearest rendering in context.
- source_word: ὑποτάσσεται
  chosen: submits
  alternatives:
  - is subject
  - is subordinate
  lexicon: BDAG
  rationale: Middle/passive form here conveys ordered submission. 'Submits' is readable
    modern English and matches the relational sense without importing coercive nuance
    beyond the verb itself.
- source_word: τῷ Χριστῷ
  chosen: to the Messiah
  alternatives:
  - to Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, not merely a name-like form. Per doctrine, titles
    are translated where context supports; thus 'Messiah' is preferred.
- source_word: αἱ γυναῖκες
  chosen: wives
  alternatives:
  - women
  lexicon: BDAG
  rationale: In the household-code context and paired with ἀνδράσιν, the relational
    sense 'wives' is contextually required rather than the broader 'women'.
- source_word: τοῖς ἀνδράσιν
  chosen: to their husbands
  alternatives:
  - to the husbands
  - to the men
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; here the domestic context requires
    'husbands.' 'Their' is supplied idiomatic English to express the reciprocal marital
    pairing implied by the Greek article+noun construction.
- source_word: ἐν παντί
  chosen: in everything
  alternatives:
  - in every respect
  - in all things
  lexicon: BDAG
  rationale: A straightforward rendering of the phrase. 'In everything' preserves
    the breadth of the expression without narrowing or explaining it.
- source_word: '[ellipsis from v. 22 with γυναῖκες]'
  chosen: are to submit
  alternatives:
  - submit
  - should submit
  lexicon: Greek grammar / discourse context
  rationale: The finite verb for wives is carried over from the previous verse. Supplying
    'are to submit' makes the English sentence complete while reflecting the dependent
    sense from the prior context better than a bare imperative.
