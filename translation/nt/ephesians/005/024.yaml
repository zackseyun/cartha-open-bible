theological_decisions:
- issue: Rendering Χριστός
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this comparison, and the doctrine guidelines
    direct that titles be translated where context supports. 'Christ' is preserved
    as an alternative because of strong English tradition.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Scope of the marital submission clause
  chosen_reading: Retain 'in everything' as stated, without adding limiting qualifiers
    in the main text
  alternative_readings:
  - Interpretive expansions such as 'in everything appropriate' or 'in everything
    fitting'
  rationale: The Greek text simply says ἐν παντί. To add qualifiers would import interpretive
    constraints not present in this verse. Any broader canonical balancing should
    not be inserted into the translation itself.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it; Never paraphrase beyond what the source text warrants'
