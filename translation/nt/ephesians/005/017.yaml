theological_decisions:
- issue: Referent of 'the Lord' (τοῦ κυρίου)
  chosen_reading: Rendered simply as 'the Lord' without specifying 'Jesus' in the
    main text.
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: The immediate context in Ephesians often uses 'Lord' for Jesus, but the
    verse itself says only κυρίου. To avoid importing a level of specificity not explicit
    in the Greek, the translation keeps 'the Lord' and lets the canonical context
    inform interpretation.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Force of the prohibition μὴ γίνεσθε
  chosen_reading: Translated as 'do not become' to preserve the verbal aspect of coming
    into a state.
  alternative_readings:
  - do not be
  - stop being
  rationale: This is primarily a lexical-syntactic decision, but it also affects exhortational
    force. 'Do not become' avoids implying that Paul assumes the audience already
    fully is what he forbids, while preserving the warning against falling into such
    a condition.
  doctrine_reference: Translation philosophy item 1
