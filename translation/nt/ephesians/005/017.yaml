id: EPH.5.17
reference: Ephesians 5:17
source:
  edition: SBLGNT
  text: διὰ τοῦτο μὴ γίνεσθε ἄφρονες, ἀλλὰ ⸀συνίετε τί τὸ θέλημα τοῦ κυρίου·
translation:
  text: For this reason, do not become foolish, but understand what the will of the
    Lord is.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Therefore, do not be foolish.' The Greek verb can be rendered more statively
      as 'be,' but 'become' better reflects γίνεσθε.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  chosen: For this reason
  alternatives:
  - Therefore
  - Because of this
  lexicon: BDAG
  rationale: διά with the accusative demonstrative points back to the preceding exhortation
    and gives an inferential/causal sense. 'For this reason' preserves the connective
    force clearly in modern English.
- source_word: μὴ γίνεσθε
  chosen: do not become
  alternatives:
  - do not be
  - stop becoming
  lexicon: BDAG
  rationale: γίνομαι means 'become' or 'come to be,' not simply stative 'be.' The
    present middle/passive imperative with μή is naturally prohibitive. 'Do not become'
    preserves the process-oriented nuance better than 'do not be.'
- source_word: ἄφρονες
  chosen: foolish
  alternatives:
  - senseless
  - unwise
  lexicon: BDAG
  rationale: ἄφρων denotes lack of understanding or practical sense. 'Foolish' is
    the most natural English equivalent here and pairs well with the following command
    to understand. 'Unwise' is possible but overlaps too closely with the wisdom language
    of the immediate context in a way that may flatten the lexical distinction.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Strong adversative contrast between the negative and positive commands
    is adequately conveyed by 'but.'
- source_word: συνίετε
  chosen: understand
  alternatives:
  - discern
  - comprehend
  lexicon: BDAG
  rationale: συνίημι commonly means to understand, grasp, or perceive. 'Understand'
    is clear and idiomatic, while still allowing the sense of thoughtful discernment
    in context.
- source_word: τί
  chosen: what
  alternatives:
  - what it is that
  - which
  lexicon: BDAG
  rationale: τί introduces the content of what is to be understood. Simple 'what'
    is the most natural English rendering.
- source_word: τὸ θέλημα
  chosen: the will
  alternatives:
  - the desire
  - the intention
  lexicon: BDAG
  rationale: θέλημα in Pauline usage commonly denotes will, purpose, or what one desires
    to be done. 'The will' is the standard and most theologically appropriate rendering
    here.
- source_word: τοῦ κυρίου
  chosen: of the Lord
  alternatives:
  - of Lord
  - of the Master
  lexicon: BDAG
  rationale: κύριος is a contested term in the project guidelines; the default rendering
    is 'Lord.' The genitive is naturally rendered 'of the Lord.' In this context it
    most likely refers to the Lord Jesus in the flow of Ephesians, but the translation
    preserves the Greek wording without over-specifying.
