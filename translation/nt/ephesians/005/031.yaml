theological_decisions:
- issue: Gendered language in the marriage citation
  chosen_reading: a man ... his wife
  alternative_readings:
  - a person ... spouse
  rationale: The source text presents a male-female marital pair in a quotation of Genesis 2:24. Following the gender-accurate policy, the translation preserves the gendered wording rather than neutralizing it.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering of σάρξ in the phrase εἰς σάρκα μίαν
  chosen_reading: one flesh
  alternative_readings:
  - one body
  rationale: Here σάρξ is literal/covenantal language from Genesis, not a metaphor for sinful nature. The translation preserves the established biblical expression without importing later theological categories.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
