id: EPH.5.31
reference: Ephesians 5:31
source:
  edition: SBLGNT
  text: ἀντὶ τούτου καταλείψει ἄνθρωπος ⸀τὸν ⸀πατέρα καὶ ⸀τὴν μητέρα καὶ προσκολληθήσεται ⸂τῇ γυναικὶ⸃ αὐτοῦ, καὶ ἔσονται οἱ δύο εἰς σάρκα μίαν.
translation:
  text: For this reason a man will leave his father and mother and be joined to his wife[a], and the two will become one flesh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less idiomatically, 'Because of this.' The Greek phrase ἀντὶ τούτου is functioning here as a causal connective in the Genesis citation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντὶ τούτου
  chosen: For this reason
  alternatives:
  - Because of this
  - Instead of this
  lexicon: BDAG
  rationale: In this citation formula echoing Genesis 2:24, ἀντί with the genitive functions idiomatically in the sense of causal/resultative reference rather than strict substitution. 'For this reason' is idiomatic English and matches the discourse function in context better than a wooden 'instead of this.'
- source_word: καταλείψει
  chosen: will leave
  alternatives:
  - will depart from
  - will forsake
  lexicon: BDAG
  rationale: The future of καταλείπω here denotes leaving one's parental household to form a new marital union. 'Will leave' is the natural and sufficiently formal rendering without importing emotional abandonment implied by 'forsake.'
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: Though ἄνθρωπος can be generic, in this marriage citation it is paired with 'his wife' and refers to the male partner. Per the gender-accurate philosophy, 'a man' best matches the source's intent here.
- source_word: πατέρα ... μητέρα
  chosen: his father and mother
  alternatives:
  - his father and his mother
  lexicon: BDAG
  rationale: English normally omits the repeated possessive/article while preserving the sense. The familial pair is rendered straightforwardly.
- source_word: προσκολληθήσεται
  chosen: be joined to
  alternatives:
  - be united to
  - cling to
  - be joined closely to
  lexicon: BDAG
  rationale: The passive/future form carries the sense of being joined or attaching closely in covenantal union. 'Be joined to' preserves the formal resonance of the Genesis citation and avoids the potentially too physical or colloquial nuance of 'cling to.'
- source_word: τῇ γυναικὶ αὐτοῦ
  chosen: his wife
  alternatives:
  - his woman
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife'; the marital context requires 'wife.'
- source_word: ἔσονται οἱ δύο
  chosen: the two will become
  alternatives:
  - the two will be
  - both will become
  lexicon: BDAG
  rationale: Although the verb is 'will be,' in the idiom 'become one flesh' English expresses the resulting union more naturally with 'become.' The explicit οἱ δύο is retained as 'the two,' following the Greek wording and common textual form of the citation.
- source_word: εἰς σάρκα μίαν
  chosen: one flesh
  alternatives:
  - one body
  - a single flesh
  lexicon: BDAG
  rationale: σάρξ here is literal/relational rather than Pauline metaphor for sinful nature. Per the doctrine guidance, 'flesh' is retained. The phrase is a fixed biblical expression for marital union and should not be flattened to 'one body'.
