id: EPH.5.13
reference: Ephesians 5:13
source:
  edition: SBLGNT
  text: τὰ δὲ πάντα ἐλεγχόμενα ὑπὸ τοῦ φωτὸς φανεροῦται,
translation:
  text: But all things, when exposed by the light, are made visible,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'everything that is exposed by the light becomes visible.' The Greek
      participle and verb can be taken in a closely related way, with emphasis either
      on the act of exposure or on the resulting visibility.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... πάντα
  chosen: all things
  alternatives:
  - everything
  - all
  lexicon: BDAG
  rationale: The neuter plural with article is broad and comprehensive. 'All things'
    preserves the formal scope better than the slightly smoother 'everything.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development from the previous statement.
    'But' best reflects the adversative turn in context.
- source_word: ἐλεγχόμενα
  chosen: when exposed
  alternatives:
  - being exposed
  - being reproved
  - being brought to light
  - being convicted
  lexicon: BDAG
  rationale: ἐλέγχω can mean expose, reprove, or convict depending on context. Here,
    with ὑπὸ τοῦ φωτός and followed by φανεροῦται, the sense is not merely verbal
    rebuke but disclosure by light. 'When exposed' renders the participle naturally
    in English while preserving its passive sense and temporal/logical relation to
    the main verb.
- source_word: ὑπὸ τοῦ φωτὸς
  chosen: by the light
  alternatives:
  - by light
  lexicon: BDAG
  rationale: The preposition ὑπό with genitive marks agency. The article is retained
    in English because the context has already identified 'the light' in the surrounding
    passage.
- source_word: φανεροῦται
  chosen: are made visible
  alternatives:
  - become visible
  - are revealed
  - are manifested
  lexicon: BDAG
  rationale: φανερόω in the passive means to become visible or be revealed. 'Are made
    visible' preserves the passive form and fits the imagery of illumination better
    than the more abstract 'are revealed.'
