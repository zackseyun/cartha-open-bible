theological_decisions:
- issue: Meaning of 'the light' in context
  chosen_reading: Translate as 'the light' without specifying its referent in the
    verse itself.
  alternative_readings:
  - Christ
  - the gospel
  - moral truth
  - the believing community's witness
  rationale: The immediate context identifies believers as light in the Lord (5:8)
    and speaks of exposing works of darkness (5:11). The verse itself does not explicitly
    define the referent beyond 'the light,' so the translation preserves the metaphorical
    breadth rather than narrowing it to one theological interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
