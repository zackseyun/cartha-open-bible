id: EPH.5.8
reference: Ephesians 5:8
source:
  edition: SBLGNT
  text: ἦτε γάρ ποτε σκότος, νῦν δὲ φῶς ἐν κυρίῳ· ὡς τέκνα φωτὸς περιπατεῖτε,
translation:
  text: For you were once darkness, but now you are light in the Lord. Walk as children
    of light,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more interpretively, 'live as children of light.' The Greek says 'walk,'
      a common Pauline metaphor for one's manner of life.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦτε
  chosen: you were
  alternatives:
  - you used to be
  lexicon: BDAG
  rationale: Imperfect of εἰμί indicates a past state. 'You were' is the most direct
    and natural English rendering.
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives explanatory grounding for the preceding exhortation. 'For'
    preserves the connective force without overinterpreting the relation.
- source_word: ποτε
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: '''Once'' is concise, idiomatic, and captures the contrast between former
    and present condition.'
- source_word: σκότος
  chosen: darkness
  lexicon: BDAG
  rationale: 'The noun is predicate nominative and metaphorical: Paul does not say
    they were merely ''in darkness'' but ''darkness.'' Retaining the abstract noun
    preserves the force of identity/transformation language.'
- source_word: νῦν δὲ
  chosen: but now
  alternatives:
  - now, however
  lexicon: BDAG
  rationale: The pair marks strong contrast between former and present state. 'But
    now' is natural and preserves the adversative shift.
- source_word: φῶς
  chosen: light
  lexicon: BDAG
  rationale: As with 'darkness,' the predicate nominative is metaphorical and identity-laden.
    'Light' should be retained rather than softened to 'in the light' or 'enlightened.'
- source_word: ἐν κυρίῳ
  chosen: in the Lord
  alternatives:
  - by the Lord
  - through the Lord
  lexicon: BDAG
  rationale: 'ἐν with dative here most naturally expresses sphere or union: their
    new identity as ''light'' is in relation to and within the Lord. ''In the Lord''
    also aligns with Pauline usage. κύριος is rendered ''Lord'' per doctrine defaults.'
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: 'Introduces manner consistent with identity: they are to walk as those
    who are children of light. ''As'' is more fitting than the potentially comparative
    ''like.'''
- source_word: τέκνα φωτός
  chosen: children of light
  alternatives:
  - sons of light
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive 'children,' not specifically male 'sons.' The
    genitive 'of light' is preserved to maintain the metaphor and likely Semitic-style
    characterization.
- source_word: περιπατεῖτε
  chosen: Walk
  alternatives:
  - live
  - conduct yourselves
  lexicon: BDAG
  rationale: Present imperative of περιπατέω is a common Pauline ethical metaphor.
    'Walk' preserves the metaphor and is still readable modern English; alternatives
    are interpretive expansions.
