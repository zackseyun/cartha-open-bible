theological_decisions:
- issue: Metaphorical identity language in 'you were once darkness, but now you are
    light'
  chosen_reading: Retain the stark identity metaphors 'darkness' and 'light' rather
    than softening to location ('in darkness') or experience ('darkened/enlightened').
  alternative_readings:
  - you were in darkness, but now you are in the light
  - you were once dark, but now enlightened
  rationale: Paul's Greek uses predicate nominatives without prepositions, emphasizing
    transformation of identity and moral-spiritual condition, not merely environment.
    Preserving this tension avoids importing a weaker or more paraphrastic reading.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The doctrinal guidance specifies κύριος → 'Lord' as the default, matching
    NT usage and preserving theological resonance without narrowing the sense.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος'
