id: EPH.5.30
reference: Ephesians 5:30
source:
  edition: SBLGNT
  text: ὅτι μέλη ἐσμὲν τοῦ σώματος ⸀αὐτοῦ.
translation:
  text: because we are members of his body.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts add, 'of his flesh and of his bones.'
    reason: textual_variant
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the preceding statement. 'Because'
    is natural modern English and preserves the causal force better than the slightly
    more formal 'for'.
- source_word: μέλη
  chosen: members
  alternatives:
  - parts
  - limbs
  lexicon: BDAG
  rationale: The plural noun denotes constituent parts of a body. 'Members' is the
    standard idiomatic rendering in Pauline body imagery and preserves both the metaphorical
    and corporate sense without over-specifying anatomy.
- source_word: ἐσμὲν
  chosen: are
  lexicon: BDAG
  rationale: Straightforward present indicative of 'to be'; simple present 'are' accurately
    reflects the Greek.
- source_word: σώματος
  chosen: body
  lexicon: BDAG
  rationale: In context this is Paul's established metaphor of the church's union
    with Christ as his body. 'Body' is the direct and natural rendering.
- source_word: αὐτοῦ
  chosen: his
  alternatives:
  - it
  lexicon: BDAG
  rationale: The genitive pronoun refers to Christ in the surrounding context, so
    English personal reference 'his' is appropriate and clearer than a more wooden
    rendering.
