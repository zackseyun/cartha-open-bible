theological_decisions:
- issue: Whether to include the longer Byzantine reading 'of his flesh and of his
    bones'
  chosen_reading: 'Translate only the SBLGNT text: ''because we are members of his
    body.'''
  alternative_readings:
  - because we are members of his body, of his flesh and of his bones
  rationale: The provided source text is the shorter reading, which is widely regarded
    as the earliest recoverable text. The longer expansion likely reflects assimilation
    to Genesis 2:23 language already echoed in the context. To preserve transparency,
    the longer reading is noted in a footnote as a textual variant rather than incorporated
    into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition
