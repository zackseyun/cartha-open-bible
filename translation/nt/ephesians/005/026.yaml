id: EPH.5.26
reference: Ephesians 5:26
source:
  edition: SBLGNT
  text: ἵνα αὐτὴν ἁγιάσῃ καθαρίσας τῷ λουτρῷ τοῦ ὕδατος ἐν ῥήματι,
translation:
  text: so that he might sanctify her, having cleansed her by the washing of water
    with the word,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in order that he might make her holy, having cleansed her by the washing
      of water by the word.'
    reason: lexical_alternative
  - marker: b
    text: The phrase 'washing of water with the word' likely evokes baptismal imagery,
      but the Greek does not by itself settle how specifically sacramental the reference
      is.
    reason: cultural_note
  - marker: c
    text: Or 'with the message' for 'with the word' (Greek rhēmati).
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is natural modern English while preserving
    the purposive force.
- source_word: αὐτὴν
  chosen: her
  lexicon: BDAG
  rationale: Feminine singular pronoun referring to the church in context; English
    singular feminine pronoun is required.
- source_word: ἁγιάσῃ
  chosen: might sanctify
  alternatives:
  - might make holy
  - might consecrate
  lexicon: BDAG
  rationale: Aorist subjunctive under ἵνα expresses intended result/purpose. 'Sanctify'
    preserves the theological and lexical connection to holiness better than the more
    paraphrastic 'make holy,' while remaining standard English.
- source_word: καθαρίσας
  chosen: having cleansed her
  alternatives:
  - after cleansing her
  - having purified her
  lexicon: BDAG
  rationale: Aorist participle is best represented as antecedent or attendant action
    relative to the main verb. 'Having cleansed her' preserves the participial structure
    and the sequence implied in the Greek. The object 'her' is supplied in English
    from context because the participle's object is understood from αὐτήν.
- source_word: τῷ λουτρῷ
  chosen: by the washing
  alternatives:
  - with the washing
  - by the bath
  lexicon: BDAG
  rationale: Dative instrumental is most naturally rendered 'by the washing.' λουτρόν
    denotes washing/bath; 'washing' is idiomatic here and fits the genitive that follows.
- source_word: τοῦ ὕδατος
  chosen: of water
  alternatives:
  - with water
  lexicon: BDAG
  rationale: Genitive construction modifying λουτρόν is retained straightforwardly
    as 'of water.' This keeps close to the Greek and avoids over-interpreting the
    relation.
- source_word: ἐν ῥήματι
  chosen: with the word
  alternatives:
  - by the word
  - in word
  - with a word
  lexicon: BDAG
  rationale: ἐν plus dative here likely expresses means or attendant circumstance.
    'With the word' is a balanced rendering that preserves the ambiguity better than
    a more interpretive choice. The article is absent in Greek, but English idiom
    in this context naturally takes 'the word' to express a definite, contextually
    recognizable utterance/message.
- source_word: ῥήματι
  chosen: word
  alternatives:
  - message
  - utterance
  lexicon: BDAG
  rationale: ῥῆμα can mean word, saying, or message. 'Word' preserves the lexical
    form and theological resonance without forcing a narrower interpretation such
    as gospel proclamation or baptismal formula.
