theological_decisions:
- issue: Relation of cleansing, washing, and word in a potentially sacramental context
  chosen_reading: Render the clause in a way that preserves the text's imagery and
    ambiguity without specifying a denominational sacramental theology.
  alternative_readings:
  - An explicit baptismal-sacramental reading
  - A purely metaphorical non-sacramental reading
  rationale: The verse's language strongly evokes washing and likely baptismal imagery,
    but the Greek does not require the translator to resolve how sacramental, metaphorical,
    or ecclesiological the reference is. The translation therefore keeps 'washing
    of water with the word' and avoids importing a specific doctrinal framework.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Whether ῥήματι should be rendered as 'word' or interpreted more specifically
  chosen_reading: Use 'word' in the main text.
  alternative_readings:
  - message
  - spoken word
  - gospel word
  rationale: The context may suggest the proclaimed message associated with Christ's
    saving work, but the Greek term itself is broader. Retaining 'word' avoids narrowing
    the sense beyond what the text warrants.
  doctrine_reference: Original-language primacy over translation tradition; Preserve
    theological tension rather than resolve it.
