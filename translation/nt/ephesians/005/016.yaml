id: EPH.5.16
reference: Ephesians 5:16
source:
  edition: SBLGNT
  text: ἐξαγοραζόμενοι τὸν καιρόν, ὅτι αἱ ἡμέραι πονηραί εἰσιν.
translation:
  text: making the most of the time[a], because the days are evil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'redeeming the time'; the Greek expression can also mean 'buying up the opportunity.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαγοραζόμενοι
  chosen: making the most of
  alternatives:
  - redeeming
  - buying up
  - taking full advantage of
  lexicon: BDAG
  rationale: The participle literally evokes 'buying out/up,' but in idiomatic context it means to make the best use of an opportunity or time. 'Making the most of' communicates the sense in natural modern English without flattening the metaphor entirely. 'Redeeming the time' is traditional but can misleadingly suggest soteriological redemption in English.
- source_word: καιρόν
  chosen: the time
  alternatives:
  - the opportunity
  - the season
  lexicon: BDAG
  rationale: καιρός often denotes a fitting or opportune time rather than time in the abstract. Here 'the time' is retained in the main text for readability and familiarity, while the sense of opportunity is carried by 'making the most of.' 'Opportunity' is a viable alternative and worth preserving in a footnote.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the exhortation. 'Because' is the clearest contemporary English equivalent.
- source_word: ἡμέραι
  chosen: the days
  lexicon: BDAG
  rationale: A straightforward plural noun; retained formally. In context it refers to the present age or circumstances, but no expansion is warranted in the main text.
- source_word: πονηραί
  chosen: evil
  alternatives:
  - wicked
  - troubled
  lexicon: BDAG
  rationale: πονηρός here characterizes the days as morally corrupt or hostile. 'Evil' is the most direct and theologically weighty rendering; 'troubled' would weaken the moral dimension.
