theological_decisions:
- issue: Potential misunderstanding of ἐξαγοραζόμενοι as redemptive/salvific language
  chosen_reading: Idiomatic exhortation to use time/opportunity wisely
  alternative_readings:
  - redeeming the time
  rationale: Although the verb can be rendered literally as 'redeeming,' in this paraenetic context the sense is practical rather than doctrinally salvific. The translation avoids importing atonement language the text does not make explicit while preserving the alternative in a footnote.
