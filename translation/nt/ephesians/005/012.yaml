theological_decisions:
- issue: Scope of αὐτῶν
  chosen_reading: Retain the pronoun as 'them' without specifying the antecedent in
    the verse text.
  alternative_readings:
  - expand to 'those who are disobedient'
  - expand to 'the sons of disobedience'
  - expand to 'them' with explanatory footnote
  rationale: The antecedent is supplied by the surrounding context (the works of darkness
    / those practicing them). Adding an explicit antecedent in the verse text would
    import context into the translation rather than translate the Greek as given.
    The pronoun is sufficiently clear in context.
  doctrine_reference: Translation philosophy §1, §3
