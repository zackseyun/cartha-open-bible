id: EPH.5.12
reference: Ephesians 5:12
source:
  edition: SBLGNT
  text: τὰ γὰρ κρυφῇ γινόμενα ὑπ’ αὐτῶν αἰσχρόν ἐστιν καὶ λέγειν·
translation:
  text: For it is shameful even to speak of the things done by them in secret.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what they do in secret.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ... γινόμενα
  chosen: the things done
  alternatives:
  - what is done
  - the deeds being done
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to actions/deeds. 'The things done' is natural English while preserving the impersonal,
    substantive force better than a more interpretive paraphrase.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives explanatory support for the preceding exhortation. 'For' preserves
    the connective and fits Paul's argumentative flow.
- source_word: κρυφῇ
  chosen: in secret
  alternatives:
  - secretly
  - in hiding
  lexicon: BDAG
  rationale: The dative adverbial form denotes manner/location in a concealed way.
    'In secret' is idiomatic and preserves the sense of hiddenness.
- source_word: γινόμενα
  chosen: done
  alternatives:
  - being done
  - taking place
  lexicon: BDAG
  rationale: Although the participle is present/passive-middle in form, English idiom
    prefers the simple 'done' here. 'Being done' is more formally precise but less
    natural; the ongoing aspect is not central in this clause.
- source_word: ὑπ’ αὐτῶν
  chosen: by them
  alternatives:
  - by those people
  - by them themselves
  lexicon: BDAG
  rationale: ὑπό with genitive marks agency. 'By them' is the most direct rendering;
    the antecedent is supplied by context and need not be repeated in the verse itself.
- source_word: αἰσχρόν
  chosen: shameful
  alternatives:
  - disgraceful
  - base
  lexicon: BDAG
  rationale: αἰσχρός denotes what is morally shameful or disgraceful. 'Shameful' is
    clear, modern, and preserves the ethical force without overstatement.
- source_word: καὶ λέγειν
  chosen: even to speak of
  alternatives:
  - also to mention
  - even to say
  lexicon: BDAG
  rationale: 'καί here has an ascensive force (''even''), intensifying the statement:
    not only are the deeds shameful, but even speaking of them is. ''Speak of'' is
    more idiomatic in English than the overly literal ''say''.'
