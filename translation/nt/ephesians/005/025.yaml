id: EPH.5.25
reference: Ephesians 5:25
source:
  edition: SBLGNT
  text: Οἱ ἄνδρες, ἀγαπᾶτε τὰς ⸀γυναῖκας, καθὼς καὶ ὁ Χριστὸς ἠγάπησεν τὴν ἐκκλησίαν καὶ ἑαυτὸν παρέδωκεν ὑπὲρ αὐτῆς,
translation:
  text: Husbands[a], love your wives, just as Messiah also loved the church and gave himself up for her[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'handed himself over for her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνδρες
  chosen: Husbands
  alternatives:
  - Men
  lexicon: BDAG
  rationale: In the household-code context, ἄνδρες is relational rather than generic; paired with γυναῖκας, it refers to married men in relation to their wives. 'Husbands' is therefore more precise than 'men'.
- source_word: ἀγαπᾶτε
  chosen: love
  lexicon: BDAG
  rationale: The imperative of ἀγαπάω is best rendered with the ordinary English verb 'love.' This preserves the lexical connection with ἠγάπησεν later in the verse and matches the project's default rendering for ἀγάπη cognates.
- source_word: γυναῖκας
  chosen: your wives
  alternatives:
  - women
  - wives
  lexicon: BDAG
  rationale: Given the direct address to husbands and the broader context of marriage in Eph 5:22–33, γυναῖκας here means 'wives.' 'Your' is supplied naturally in English because the vocative address and article imply the hearers' own wives, not women in general.
- source_word: καθὼς καὶ
  chosen: just as ... also
  alternatives:
  - as also
  - even as
  lexicon: BDAG
  rationale: This construction sets up Christ's love as the model for husbands' love. 'Just as ... also' captures both the comparative force of καθώς and the additive/emphatic καί in natural English.
- source_word: Χριστὸς
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per project policy, Χριστός is translated as 'Messiah' where it functions as a title rather than a name-like form. Here with the article (ὁ Χριστός), the titular sense is clear.
- source_word: ἠγάπησεν
  chosen: loved
  lexicon: BDAG
  rationale: Aorist indicative rendered simply as past tense 'loved.' This keeps the lexical parallel with the imperative ἀγαπᾶτε and avoids interpretive expansion.
- source_word: ἐκκλησίαν
  chosen: the church
  alternatives:
  - the assembly
  lexicon: BDAG
  rationale: In Pauline usage here, ἐκκλησία refers to the people of God corporately, not merely a local civic assembly. 'The church' is the clearest established English equivalent in this theological context.
- source_word: ἑαυτὸν παρέδωκεν
  chosen: gave himself up
  alternatives:
  - handed himself over
  - delivered himself up
  lexicon: BDAG
  rationale: The idiom conveys voluntary self-surrender, especially unto death. 'Gave himself up' is idiomatic, faithful, and preserves the sacrificial nuance without over-specifying atonement language not explicit in this clause.
- source_word: ὑπὲρ αὐτῆς
  chosen: for her
  alternatives:
  - on behalf of her
  - for the sake of her
  lexicon: BDAG
  rationale: ὑπέρ with genitive commonly means 'for/on behalf of.' 'For her' is natural English and preserves the representative, self-giving sense. The pronoun αὐτῆς refers back to the church, appropriately rendered as 'her' because ἐκκλησία is grammatically feminine and personified in the passage.
