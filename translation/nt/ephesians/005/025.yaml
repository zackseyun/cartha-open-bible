  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah'' where title; Translation philosophy §2'
- issue: Extent of sacrificial nuance in παρέδωκεν ὑπὲρ αὐτῆς
  chosen_reading: gave himself up for her
  alternative_readings:
