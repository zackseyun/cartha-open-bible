id: EPH.5.6
reference: Ephesians 5:6
source:
  edition: SBLGNT
  text: Μηδεὶς ὑμᾶς ἀπατάτω κενοῖς λόγοις, διὰ ταῦτα γὰρ ἔρχεται ἡ ὀργὴ τοῦ θεοῦ ἐπὶ
    τοὺς υἱοὺς τῆς ἀπειθείας.
translation:
  text: Let no one deceive you with empty words, for because of these things the wrath
    of God comes upon the sons of disobedience.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the children of disobedience,' that is, those characterized by disobedience.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδεὶς
  chosen: Let no one
  alternatives:
  - No one
  lexicon: BDAG
  rationale: With the present imperative ἀπατάτω, the idiomatic prohibitive force
    in English is best conveyed as 'Let no one...' rather than the less natural bare
    'No one...'.
- source_word: ἀπατάτω
  chosen: deceive
  alternatives:
  - mislead
  - cheat
  lexicon: BDAG
  rationale: '''Deceive'' is the standard and clearest rendering for ἀπατάω here,
    matching the warning context against false moral reasoning.'
- source_word: κενοῖς λόγοις
  chosen: with empty words
  alternatives:
  - with vain words
  - with worthless arguments
  lexicon: BDAG
  rationale: κενοῖς means 'empty, futile, without content'; λόγοις is broadly 'words,
    statements, arguments.' 'Empty words' preserves the metaphor and remains natural
    English.
- source_word: διὰ ταῦτα
  chosen: because of these things
  alternatives:
  - for these things
  - on account of these things
  lexicon: BDAG
  rationale: διά with the accusative normally expresses cause here. 'Because of these
    things' makes the causal sense explicit and avoids ambiguity with a demonstrative
    reference alone.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - is coming
  - comes down
  lexicon: BDAG
  rationale: The present middle/passive indicative can be rendered as a present with
    gnomic or imminent force. 'Comes' is concise and preserves the Greek aspect without
    over-specifying timing.
- source_word: ἡ ὀργὴ τοῦ θεοῦ
  chosen: the wrath of God
  alternatives:
  - God's wrath
  lexicon: BDAG
  rationale: This is the straightforward lexical sense. The fuller form 'the wrath
    of God' preserves the weight and formal structure of the Greek.
- source_word: ἐπὶ
  chosen: upon
  alternatives:
  - 'on'
  - against
  lexicon: BDAG
  rationale: With persons as object, ἐπί here indicates movement or directed arrival
    upon them. 'Upon' is slightly more formal and fits the judicial tone.
- source_word: τοὺς υἱοὺς τῆς ἀπειθείας
  chosen: the sons of disobedience
  alternatives:
  - the children of disobedience
  - those characterized by disobedience
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural with a Hebraic/idiomatic genitive
    construction indicating characterization. Per the gender-accurate philosophy,
    'sons' is retained in the main text rather than flattened to 'children,' while
    the idiomatic sense can be clarified in a footnote.
- source_word: ἀπειθείας
  chosen: disobedience
  alternatives:
  - rebellion
  - unbelief
  lexicon: BDAG
  rationale: ἀπείθεια commonly denotes disobedience or refusal to obey. 'Disobedience'
    best matches the lexical form and the ethical context of the surrounding passage.
