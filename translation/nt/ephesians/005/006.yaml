theological_decisions:
- issue: Rendering divine wrath language
  chosen_reading: the wrath of God
  alternative_readings:
  - God's judgment
  rationale: The text explicitly uses ὀργή, not a more general term for judgment.
    The translation should preserve the theological force of divine wrath rather than
    soften it into a broader concept.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve theological tension rather than resolve it.'
- issue: Rendering the idiom τοὺς υἱοὺς τῆς ἀπειθείας
  chosen_reading: the sons of disobedience
  alternative_readings:
  - the children of disobedience
  - people characterized by disobedience
  rationale: The phrase is an idiom for people marked by disobedience, but the source
    text is grammatically masculine and uses 'sons.' Per the stated gender-accurate
    policy, the main text should reflect that form, with clarification preserved in
    a footnote rather than neutralized in translation.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
