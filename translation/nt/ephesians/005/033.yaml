theological_decisions:
- issue: Rendering φοβῆται in a marital exhortation
  chosen_reading: respect
  alternative_readings:
  - fear
  - reverence
  rationale: The Greek verb can denote fear, reverence, or respect depending on context. In Ephesians 5:33, the immediate context is reciprocal marital instruction, not servile dread. Rendering it as 'respect' preserves the relational and honor-oriented sense without importing coercive or abusive implications the text does not require. The more literal 'fear' is preserved in a footnote for transparency.
  doctrine_reference: Translation philosophy §3, §6
- issue: Gendered singular exhortation
  chosen_reading: his own wife ... the wife ... her husband
  alternative_readings:
  - their own spouses
  rationale: The Greek uses gendered singular forms tied to husband-wife relations. Per the doctrine's gender-accurate principle, the translation preserves the source's marital and gendered specificity rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
