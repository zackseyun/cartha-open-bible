id: EPH.5.33
reference: Ephesians 5:33
source:
  edition: SBLGNT
  text: πλὴν καὶ ὑμεῖς οἱ καθ’ ἕνα ἕκαστος τὴν ἑαυτοῦ γυναῖκα οὕτως ἀγαπάτω ὡς ἑαυτόν, ἡ δὲ γυνὴ ἵνα φοβῆται τὸν ἄνδρα.
translation:
  text: Nevertheless[a], you also—each one individually—must love his own wife as himself[b], and the wife must fear her husband.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'that the wife should fear her husband'; here 'fear' carries the sense of reverential respect.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'each one individually' renders a distributive expression emphasizing that this instruction applies to every husband personally.
    reason: lexical_alternative
lexical_decisions:
- source_word: πλὴν
  chosen: Nevertheless
  alternatives:
  - However
  - In any case
  lexicon: BDAG
  rationale: Signals a concluding or limiting transition from the preceding discussion to a practical summary. 'Nevertheless' preserves the adversative/concessive force better than a flat 'but.'
- source_word: καὶ ὑμεῖς
  chosen: you also
  alternatives:
  - you too
  lexicon: BDAG
  rationale: Retains the emphatic inclusion of the Ephesian hearers in the exhortation after the broader theological reflection.
- source_word: οἱ καθ’ ἕνα ἕκαστος
  chosen: each one individually
  alternatives:
  - each one
  - every one of you
  lexicon: BDAG
  rationale: This idiomatic combination intensifies distributive force. 'Each one individually' makes explicit that the command applies person by person, not merely corporately.
- source_word: τὴν ἑαυτοῦ γυναῖκα
  chosen: his own wife
  alternatives:
  - his wife
  lexicon: BDAG
  rationale: γυνή here clearly means 'wife' in the household context, and ἑαυτοῦ adds the reflexive sense 'his own,' which is worth preserving.
- source_word: οὕτως
  chosen: must
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: In context οὕτως points back to the manner just described ('in this way'), but idiomatic English expresses the force more naturally by carrying the exhortational weight into the verb phrase. The backward-looking sense is implicit in the summary nature of the sentence.
- source_word: ἀγαπάτω
  chosen: must love
  alternatives:
  - should love
  - is to love
  - let him love
  lexicon: BDAG
  rationale: Present active imperative, third singular, functioning distributively with ἕκαστος. 'Must love' conveys the imperative force clearly in contemporary English without sounding archaic.
- source_word: ὡς ἑαυτόν
  chosen: as himself
  alternatives:
  - as he loves himself
  - as his own self
  lexicon: BDAG
  rationale: A concise comparison preserving the reflexive standard of self-love stated in the Greek.
- source_word: ἡ δὲ γυνὴ
  chosen: and the wife
  alternatives:
  - but the wife
  - and the woman
  lexicon: BDAG
  rationale: γυνή again means 'wife' in this marital context. δέ is rendered coordinately here ('and') for smoother English in a paired summary statement, while still marking the second half of the exhortation.
- source_word: ἵνα φοβῆται
  chosen: must respect
  alternatives:
  - should fear
  - should reverence
  - must show respect
  lexicon: BDAG
  rationale: φοβέομαι literally means 'fear,' but in this relational context it commonly carries the sense of reverential regard or respect rather than terror. 'Respect' best communicates the intended sense in modern English while avoiding a misleading implication of fright.
- source_word: τὸν ἄνδρα
  chosen: her husband
  alternatives:
  - the husband
  - the man
  lexicon: BDAG
  rationale: ἀνήρ in this context means 'husband.' English idiom naturally supplies the possessive 'her' in a marital exhortation.
