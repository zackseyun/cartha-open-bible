theological_decisions:
- issue: Meaning of πλεονεξία in a vice list alongside sexual sins
  chosen_reading: Rendered as the broader 'greed' rather than restricting it to sexual
    lust.
  alternative_readings:
  - covetousness
  - sexual greed
  rationale: Although the immediate context includes sexual ethics, πλεονεξία itself
    is a broader vice in Pauline usage and should not be narrowed without explicit
    textual warrant. The translation preserves the term's wider moral scope.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Referent of ἁγίοις
  chosen_reading: Translated as 'saints' referring to all believers.
  alternative_readings:
  - holy ones
  - God's holy people
  rationale: The term denotes Christians as consecrated people of God. 'Saints' preserves
    the ecclesial and theological identity in a concise way while remaining within
    historic orthodox usage.
  doctrine_reference: Affirmations; Translation philosophy §6
