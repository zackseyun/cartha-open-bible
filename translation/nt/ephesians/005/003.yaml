id: EPH.5.3
reference: Ephesians 5:3
source:
  edition: SBLGNT
  text: Πορνεία δὲ καὶ ⸂ἀκαθαρσία πᾶσα⸃ ἢ πλεονεξία μηδὲ ὀνομαζέσθω ἐν ὑμῖν, καθὼς
    πρέπει ἁγίοις,
translation:
  text: But sexual immorality and every impurity or greed must not even be named among
    you, as is proper for saints,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'let it not even be mentioned among you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'covetousness' for 'greed.'
    reason: lexical_alternative
  - marker: c
    text: '''Saints'' here means believers as God''s holy people, not a later canonized
      class.'
    reason: cultural_note
lexical_decisions:
- source_word: Πορνεία
  chosen: sexual immorality
  alternatives:
  - fornication
  - sexual sin
  lexicon: BDAG
  rationale: πορνεία broadly denotes illicit sexual conduct, not only premarital intercourse.
    'Sexual immorality' is the clearest modern English rendering and avoids the narrower,
    tradition-bound 'fornication'.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast/transition from the preceding exhortation. 'But'
    best preserves the adversative force in context.
- source_word: ἀκαθαρσία πᾶσα
  chosen: every impurity
  alternatives:
  - all uncleanness
  - every kind of impurity
  lexicon: BDAG
  rationale: The adjective πᾶσα modifies ἀκαθαρσία to express comprehensiveness. 'Every
    impurity' is natural English and preserves the breadth of the prohibition.
- source_word: ἢ
  chosen: or
  alternatives:
  - and
  lexicon: BDAG
  rationale: ἤ is disjunctive here, linking another prohibited category. 'Or' reflects
    the Greek straightforwardly.
- source_word: πλεονεξία
  chosen: greed
  alternatives:
  - covetousness
  - greediness
  lexicon: BDAG
  rationale: πλεονεξία denotes grasping desire for more, often with moral overtones
    of acquisitiveness and exploitation. 'Greed' is idiomatic modern English; 'covetousness'
    is more traditional but less accessible.
- source_word: μηδὲ ὀνομαζέσθω
  chosen: must not even be named
  alternatives:
  - let it not even be mentioned
  - must not be spoken of
  lexicon: BDAG
  rationale: The present passive imperative with μηδέ expresses strong prohibition.
    'Must not even be named' closely follows the Greek while sounding natural in English
    and preserving the emphatic 'not even'.
- source_word: ἐν ὑμῖν
  chosen: among you
  alternatives:
  - in your midst
  - among you all
  lexicon: BDAG
  rationale: In this communal ethical context, ἐν ὑμῖν is best rendered corporately
    as 'among you,' referring to the Christian community rather than merely inward
    individual experience.
- source_word: καθὼς πρέπει
  chosen: as is proper
  alternatives:
  - as is fitting
  - as befits
  lexicon: BDAG
  rationale: καθὼς πρέπει introduces a standard of appropriateness. 'As is proper'
    is clear, contemporary, and preserves the ethical fittingness Paul expresses.
- source_word: ἁγίοις
  chosen: saints
  alternatives:
  - holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι is Paul's regular designation for believers as those set apart
    to God. 'Saints' preserves the established theological sense without importing
    canonization concepts from later tradition; alternatives are possible but less
    concise.
