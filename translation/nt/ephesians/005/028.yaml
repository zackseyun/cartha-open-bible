theological_decisions:
- issue: Gendered language in household-code exhortation
  chosen_reading: Rendered οἱ ἄνδρες / ὁ ἀγαπῶν with masculine terms ('husbands,'
    'He who loves')
  alternative_readings:
  - men
  - the one who loves
  rationale: The context is specifically marital instruction, not a generic statement
    about humanity. This follows the doctrine's gender-accurate principle rather than
    neutralizing the masculine forms.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Nature of the comparison between wife and body
  chosen_reading: Kept the analogy explicit without expanding it doctrinally
  alternative_readings:
  - Interpreting the statement as a metaphysical identity claim
  rationale: Paul's wording compares a husband's love for his wife to care for his
    own body and concludes that loving one's wife is loving oneself. The translation
    preserves this theological and ethical logic without importing additional doctrinal
    explanation into the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
