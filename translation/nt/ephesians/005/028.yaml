id: EPH.5.28
reference: Ephesians 5:28
source:
  edition: SBLGNT
  text: οὕτως ὀφείλουσιν ⸀καὶ οἱ ἄνδρες ἀγαπᾶν τὰς ἑαυτῶν γυναῖκας ὡς τὰ ἑαυτῶν σώματα·
    ὁ ἀγαπῶν τὴν ἑαυτοῦ γυναῖκα ἑαυτὸν ἀγαπᾷ,
translation:
  text: In the same way, husbands also ought to love their own wives as their own
    bodies. He who loves his own wife loves himself,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὕτως
  chosen: In the same way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Connects this verse to the preceding comparison and exhortation; 'In
    the same way' is natural English that preserves the inferential force better than
    the more wooden 'thus.'
- source_word: ὀφείλουσιν
  chosen: ought to
  alternatives:
  - are obligated to
  - must
  lexicon: BDAG
  rationale: Expresses moral obligation without overstating into an absolute imperative
    beyond the indicative form. 'Ought to' fits the paraenetic context.
- source_word: καὶ
  chosen: also
  alternatives:
  - even
  - indeed
  lexicon: BDAG
  rationale: Here καί adds husbands to the pattern just described; 'also' captures
    the additive force in idiomatic English.
- source_word: οἱ ἄνδρες
  chosen: husbands
  alternatives:
  - men
  lexicon: BDAG
  rationale: In this household-code context paired with γυναῖκες, ἀνήρ refers specifically
    to married men, so 'husbands' is contextually precise.
- source_word: ἀγαπᾶν
  chosen: to love
  lexicon: BDAG
  rationale: Maintains the lexical connection with repeated ἀγαπάω in the verse and
    aligns with the project's default rendering of the ἀγάπη word group as 'love.'
- source_word: τὰς ἑαυτῶν γυναῖκας
  chosen: their own wives
  alternatives:
  - their wives
  lexicon: BDAG
  rationale: γυναῖκας here means 'wives' in context, and ἑαυτῶν is preserved with
    'own' to retain the reflexive emphasis.
- source_word: ὡς τὰ ἑαυτῶν σώματα
  chosen: as their own bodies
  alternatives:
  - like their own bodies
  lexicon: BDAG
  rationale: A straightforward comparison; 'as' is idiomatic and preserves the analogy.
    'Bodies' is retained literally for σῶμα.
- source_word: ὁ ἀγαπῶν
  chosen: He who loves
  alternatives:
  - the one who loves
  - whoever loves
  lexicon: BDAG
  rationale: Preserves the substantival participle with a gender-accurate singular
    expression, fitting the immediate reference to a husband.
- source_word: τὴν ἑαυτοῦ γυναῖκα
  chosen: his own wife
  alternatives:
  - his wife
  lexicon: BDAG
  rationale: Again preserves the reflexive emphasis of ἑαυτοῦ and the marital sense
    of γυνή in context.
- source_word: ἑαυτὸν ἀγαπᾷ
  chosen: loves himself
  lexicon: BDAG
  rationale: Directly reflects the reflexive pronoun and repeated verb, preserving
    Paul's logic that love for one's wife is, in this analogy, self-love.
