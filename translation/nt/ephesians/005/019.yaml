id: EPH.5.19
reference: Ephesians 5:19
source:
  edition: SBLGNT
  text: λαλοῦντες ⸀ἑαυτοῖς ψαλμοῖς καὶ ὕμνοις καὶ ᾠδαῖς πνευματικαῖς, ᾄδοντες καὶ
    ⸀ψάλλοντες τῇ καρδίᾳ ὑμῶν τῷ κυρίῳ,
translation:
  text: speaking to one another with psalms and hymns and spiritual songs, singing
    and making melody with your heart to the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''among yourselves'' or ''to yourselves''; the Greek reflexive here
      is commonly understood reciprocally: ''to one another.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'singing praise'; the Greek can denote singing praise or making melody,
      without necessarily specifying instrumental accompaniment.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλοῦντες
  chosen: speaking
  alternatives:
  - addressing
  lexicon: BDAG
  rationale: Present participle coordinated with following participles; 'speaking'
    preserves the verbal form and broad sense without over-specifying formal address.
- source_word: ἑαυτοῖς
  chosen: to one another
  alternatives:
  - among yourselves
  - to yourselves
  lexicon: BDAG
  rationale: In reciprocal plural context, the reflexive commonly carries a reciprocal
    sense. 'To one another' is idiomatic English and fits the communal exhortation
    better than the potentially misleading 'to yourselves.'
- source_word: ψαλμοῖς
  chosen: psalms
  lexicon: BDAG
  rationale: Direct cognate and standard rendering; likely includes psalm-like songs
    and possibly canonical Psalms, but the text itself does not require narrowing
    further.
- source_word: ὕμνοις
  chosen: hymns
  lexicon: BDAG
  rationale: Standard lexical equivalent; distinct from ψαλμοῖς and ᾠδαῖς, so the
    translation preserves the threefold sequence.
- source_word: ᾠδαῖς πνευματικαῖς
  chosen: spiritual songs
  alternatives:
  - songs inspired by the Spirit
  lexicon: BDAG
  rationale: The adjective πνευματικαῖς most naturally modifies ᾠδαῖς as 'spiritual.'
    This preserves the phrase's established sense without importing a stronger claim
    about inspiration than the text states.
- source_word: ᾄδοντες
  chosen: singing
  lexicon: BDAG
  rationale: Straightforward participial rendering; paired with ψάλλοντες as a related
    but distinct action.
- source_word: ψάλλοντες
  chosen: making melody
  alternatives:
  - singing praise
  - playing
  lexicon: BDAG
  rationale: By NT usage ψάλλω commonly means to sing praise or make melody, not necessarily
    to play an instrument. 'Making melody' preserves the musical nuance while avoiding
    an unwarranted instrumental requirement.
- source_word: τῇ καρδίᾳ ὑμῶν
  chosen: in your heart
  alternatives:
  - with your heart
  - in your hearts
  lexicon: BDAG
  rationale: The dative phrase is best taken as sphere or manner. 'In your heart'
    is idiomatic collective address in English; plural 'your' already marks the audience.
    Singular 'heart' reflects the Greek singular without awkwardness.
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - for the Lord
  lexicon: BDAG
  rationale: 'κύριος is rendered by the doctrinal default ''Lord.'' The dative here
    is naturally directional/objective with the acts of singing and melody-making:
    they are offered to the Lord.'
