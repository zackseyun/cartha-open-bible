theological_decisions:
- issue: Meaning of ψάλλοντες in relation to music practice
  chosen_reading: Rendered as 'making melody' without specifying instrumental accompaniment.
  alternative_readings:
  - render as 'singing praise'
  - render as 'playing' or imply instrumental music
  rationale: The Greek term historically could involve plucking/playing, but in Koine
    and this context it does not require instruments. The translation avoids importing
    a denominational stance either for or against instrumental accompaniment in worship.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referent of 'the Lord'
  chosen_reading: Retained as 'the Lord' without specifying 'the Lord Jesus' in the
    translation.
  alternative_readings:
  - explicitly identify the referent as Christ
  rationale: Within Ephesians the referent may well be Christ, but the verse itself
    says κύριος. The translation preserves the text's wording and leaves fuller identification
    to context rather than importing it into the verse.
  doctrine_reference: 'κύριος default rendering: Lord; do not import doctrinal claims
    the text does not make.'
