id: EPH.5.27
reference: Ephesians 5:27
source:
  edition: SBLGNT
  text: ἵνα παραστήσῃ ⸀αὐτὸς ἑαυτῷ ἔνδοξον τὴν ἐκκλησίαν, μὴ ἔχουσαν σπίλον ἢ ῥυτίδα ἤ τι τῶν τοιούτων, ἀλλ’ ἵνα ᾖ ἁγία καὶ ἄμωμος.
translation:
  text: so that he himself might present the church to himself in splendor[a], not having spot or wrinkle or anything like that[c][b], but so that she might be holy and blameless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''glorious'': the Greek adjective can be rendered either as a quality (''glorious'') or as a state (''in splendor'').'
    reason: lexical_alternative
  - marker: b
    text: Or 'or any such thing.'
    reason: lexical_alternative
  - marker: c
    text: Or 'without blemish.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραστήσῃ
  chosen: might present
  alternatives:
  - might bring before
  - might present as
  lexicon: BDAG
  rationale: The aorist subjunctive with ἵνα expresses purpose. 'Present' is a natural English equivalent for παρίστημι in contexts of bringing someone into a formal or evaluative presence, and it preserves the nuptial/purificatory imagery without over-paraphrasing.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic. Rendering it as 'he himself' preserves the emphasis that the subject personally performs the action.
- source_word: ἑαυτῷ
  chosen: to himself
  alternatives:
  - for himself
  - before himself
  lexicon: BDAG
  rationale: The dative reflexive indicates relation to the subject. 'To himself' is the most straightforward rendering in English and preserves the reflexive force in the marriage metaphor.
- source_word: ἔνδοξον
  chosen: in splendor
  alternatives:
  - glorious
  - splendid
  lexicon: BDAG
  rationale: The adjective modifies 'the church' as the state in which she is presented. 'In splendor' communicates the resultant glorious condition in idiomatic English while avoiding a flat adjectival stack ('the glorious church').
- source_word: ἐκκλησίαν
  chosen: the church
  alternatives:
  - the assembly
  lexicon: BDAG
  rationale: In Pauline usage here, ἐκκλησία refers to the people of God corporately, not merely a local gathering. 'The church' is the established and contextually accurate rendering.
- source_word: μὴ ἔχουσαν
  chosen: not having
  alternatives:
  - without having
  - without
  lexicon: BDAG
  rationale: The participial phrase describes the church's condition. 'Not having' closely follows the Greek syntax; although 'without' is smoother, this rendering keeps the participial force visible.
- source_word: σπίλον
  chosen: spot
  alternatives:
  - stain
  - blemish
  lexicon: BDAG
  rationale: '''Spot'' is a standard rendering in purity imagery and pairs naturally with ''wrinkle.'' ''Blemish'' is possible, but ''spot'' better preserves the concrete metaphor.'
- source_word: ῥυτίδα
  chosen: wrinkle
  alternatives:
  - crease
  lexicon: BDAG
  rationale: '''Wrinkle'' is the direct lexical equivalent and fits the bridal imagery of beauty and perfection.'
- source_word: ἤ τι τῶν τοιούτων
  chosen: or anything like that
  alternatives:
  - or any such thing
  - or anything of that kind
  lexicon: BDAG
  rationale: This phrase generalizes beyond the two examples. 'Anything like that' is idiomatic modern English and preserves the open-ended category.
- source_word: ἀλλ’ ἵνα ᾖ
  chosen: but so that she might be
  alternatives:
  - but that she might be
  - but in order that she be
  lexicon: BDAG
  rationale: The second ἵνα clause states the positive purpose/result corresponding to the negative description. Supplying 'she' makes explicit the referent of the feminine singular predicate adjectives in natural English.
- source_word: ἁγία
  chosen: holy
  alternatives:
  - set apart
  lexicon: BDAG
  rationale: '''Holy'' is the standard and theologically weighty rendering. ''Set apart'' explains but does not translate as well in this context.'
- source_word: ἄμωμος
  chosen: blameless
  alternatives:
  - without blemish
  - faultless
  lexicon: BDAG
  rationale: ἄμωμος can denote freedom from defect or blame. 'Blameless' reads naturally alongside 'holy' and captures moral purity, while the preceding 'spot' imagery already conveys blemish language.
