theological_decisions:
- issue: Reflexive presentation imagery in the husband-Christ/church analogy
  chosen_reading: Retained the reflexive wording 'he himself...to himself' without resolving the broader theological symbolism beyond the verse's wording.
  alternative_readings:
  - Simplify to 'present the church' without the reflexive emphasis
  - Interpret explicitly as eschatological presentation before God
  rationale: The Greek explicitly includes both emphatic αὐτὸς and reflexive ἑαυτῷ. The translation preserves this theological and literary tension rather than collapsing it into a smoother but less precise English expression.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of purity language for the church
  chosen_reading: Used 'spot or wrinkle...holy and blameless' to preserve both bridal and sacrificial purity imagery.
  alternative_readings:
  - Use 'stain or wrinkle...holy and without blemish'
  rationale: The verse combines concrete bodily/bridal imagery with holiness language. The chosen rendering keeps both dimensions visible in readable English without importing a narrower doctrinal interpretation.
  doctrine_reference: Optimal equivalence; preserve theological tension rather than resolve it.
