id: EPH.5.2
reference: Ephesians 5:2
source:
  edition: SBLGNT
  text: καὶ περιπατεῖτε ἐν ἀγάπῃ, καθὼς καὶ ὁ Χριστὸς ἠγάπησεν ⸀ἡμᾶς καὶ παρέδωκεν
    ἑαυτὸν ὑπὲρ ⸀ἡμῶν προσφορὰν καὶ θυσίαν τῷ θεῷ εἰς ὀσμὴν εὐωδίας.
translation:
  text: and walk in love, just as the Messiah also loved us and gave himself up for
    us, an offering and sacrifice to God for a fragrant aroma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because
      it functions as a title.
    reason: alternative_reading
  - marker: b
    text: Or 'on our behalf.' The phrase 'for us' translates ὑπὲρ ἡμῶν and can carry
      representative or benefactive force in this context.
    reason: lexical_alternative
  - marker: c
    text: The expression 'for a fragrant aroma' echoes Old Testament sacrificial language
      for an offering pleasing to God.
    reason: cross_reference
lexical_decisions:
- source_word: περιπατεῖτε
  chosen: walk
  alternatives:
  - live
  - conduct yourselves
  lexicon: BDAG
  rationale: Pauline metaphor for manner of life; 'walk' preserves the verbal imagery
    and common NT idiom while remaining natural in English.
- source_word: ἐν ἀγάπῃ
  chosen: in love
  alternatives:
  - with love
  lexicon: BDAG
  rationale: Retains the prepositional phrase and matches the default rendering of
    ἀγάπη as 'love.' 'In love' is idiomatic and preserves the sphere/manner nuance.
- source_word: ὁ Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here the article supports titular force.
- source_word: ἠγάπησεν ἡμᾶς
  chosen: loved us
  lexicon: BDAG
  rationale: Straightforward aorist rendering; keeps lexical cognate with ἀγάπη in
    the verse.
- source_word: παρέδωκεν ἑαυτὸν
  chosen: gave himself up
  alternatives:
  - handed himself over
  - gave himself
  lexicon: BDAG
  rationale: This is the established sense of self-surrender in sacrificial/redemptive
    contexts; 'gave himself up' is both accurate and natural.
- source_word: ὑπὲρ ἡμῶν
  chosen: for us
  alternatives:
  - on our behalf
  - for our sake
  lexicon: BDAG
  rationale: '''For us'' is the most natural rendering and preserves the representative/benefactive
    force of ὑπέρ without over-specifying substitution in the English wording.'
- source_word: προσφορὰν καὶ θυσίαν
  chosen: an offering and sacrifice
  alternatives:
  - an offering and a sacrifice
  lexicon: BDAG
  rationale: Both sacrificial terms are retained rather than collapsed, preserving
    the paired cultic language. A single article in English is stylistically sufficient
    while still representing both nouns.
- source_word: τῷ θεῷ
  chosen: to God
  alternatives:
  - for God
  lexicon: BDAG
  rationale: The dative is well represented by 'to God' in this sacrificial context,
    expressing the direction/recipient of the offering.
- source_word: εἰς ὀσμὴν εὐωδίας
  chosen: for a fragrant aroma
  alternatives:
  - as a pleasing fragrance
  - for a sweet-smelling aroma
  lexicon: BDAG
  rationale: Preserves the sacrificial idiom echoing the OT while using readable modern
    English. 'Fragrant aroma' keeps the concrete imagery better than the more interpretive
    'pleasing fragrance.'
