theological_decisions:
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: The translation philosophy directs that Christological titles be translated.
    In this context Χριστός appears with the article and functions as a title, so
    'the Messiah' best preserves meaning.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of ὑπὲρ ἡμῶν in a sacrificial context
  chosen_reading: for us
  alternative_readings:
  - on our behalf
  - in our place
  rationale: The verse clearly presents Christ's self-giving as sacrificial and benefactive,
    but the preposition ὑπέρ itself need not be sharpened in translation to an explicitly
    substitutionary formula beyond what the Greek states. 'For us' preserves the theological
    weight without importing a narrower doctrinal formulation.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
