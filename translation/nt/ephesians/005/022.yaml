theological_decisions:
- issue: Whether to supply 'submit' in the main text despite its absence in the Greek
    of v. 22
  chosen_reading: Do not supply the verb in the main text; preserve the elliptical
    construction and note the implied sense from v. 21.
  alternative_readings:
  - Wives, submit to your own husbands as to the Lord.
  rationale: The source text for this verse is elliptical, with the sense carried
    over from v. 21. Supplying 'submit' makes the English smoother and is interpretively
    defensible, but it adds a word not present in this verse's Greek. Preserving the
    ellipsis better reflects original-language primacy and avoids overstating what
    is explicitly in v. 22 alone.
  doctrine_reference: Translation philosophy §1, §3, §5
