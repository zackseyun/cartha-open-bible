id: EPH.5.22
reference: Ephesians 5:22
source:
  edition: SBLGNT
  text: Αἱ γυναῖκες τοῖς ἰδίοις ⸀ἀνδράσιν ὡς τῷ κυρίῳ,
translation:
  text: Wives, to your own husbands as to the Lord,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Many English translations supply ''submit'' from verse 21: ''Wives, submit
      to your own husbands as to the Lord.'' The Greek of verse 22 itself is elliptical
      and depends on the preceding clause.'
    reason: alternative_reading
lexical_decisions:
- source_word: γυναῖκες
  chosen: Wives
  alternatives:
  - women
  lexicon: BDAG
  rationale: In household-code context and with the paired dative ἀνδράσιν modified
    by ἰδίοις ('their own'), γυνή is relationally 'wives' rather than the more general
    'women.' This preserves the marital sense explicit in context.
- source_word: ἰδίοις ἀνδράσιν
  chosen: your own husbands
  alternatives:
  - your own men
  - your own spouses
  lexicon: BDAG
  rationale: ἀνήρ can mean 'man' or 'husband'; here the possessive adjective ἰδίοις
    and the surrounding paraenesis make 'husbands' the natural sense. 'Own' is retained
    because it is present in the Greek and emphasizes the specific marital relationship.
- source_word: ὡς
  chosen: as
  alternatives:
  - as if
  - in the same way as
  lexicon: BDAG
  rationale: A simple comparative 'as' best reflects the Greek without over-interpreting
    the comparison. It leaves the precise nuance to be clarified by the immediate
    context.
- source_word: κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' The article is represented
    in English as 'the Lord,' and in Pauline usage here it refers to the Lord Jesus.
- source_word: implicit verb from context
  chosen: '[understand ''submit'']'
  alternatives:
  - be subject
  - defer
  lexicon: NA28/SBLGNT apparatus; BDAG
  rationale: This verse in the earliest text lacks an explicit finite verb and depends
    syntactically on the participle ὑποτασσόμενοι ('submitting') in v. 21. The English
    draft preserves the ellipsis rather than supplying a verb in the main text, since
    the supplied verb is contextually recoverable but not present in this verse's
    Greek wording.
