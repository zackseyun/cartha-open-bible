id: EPH.5.1
reference: Ephesians 5:1
source:
  edition: SBLGNT
  text: γίνεσθε οὖν μιμηταὶ τοῦ θεοῦ, ὡς τέκνα ἀγαπητά,
translation:
  text: Therefore, become imitators of God, as beloved children,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be imitators of God'; the Greek imperative can emphasize either becoming
      or being in an ongoing way.
    reason: lexical_alternative
lexical_decisions:
- source_word: γίνεσθε
  chosen: become
  alternatives:
  - be
  - keep becoming
  lexicon: BDAG
  rationale: Present middle/passive imperative of γίνομαι naturally carries an ingressive/process
    sense ('become' / 'come to be') rather than the simple copular 'be.' 'Become'
    preserves the exhortational force without over-paraphrasing.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding argument. 'Therefore' best preserves
    the logical connection in clear modern English.
- source_word: μιμηταὶ
  chosen: imitators
  alternatives:
  - followers
  - copyists
  lexicon: BDAG
  rationale: The noun denotes those who imitate or emulate. 'Imitators' is the most
    direct and standard rendering; 'followers' is too broad and weakens the explicit
    imitation motif.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - of the God
  lexicon: BDAG
  rationale: The genitive with article is idiomatically rendered 'of God' in English;
    retaining 'the' would be unnatural here.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  - since you are
  lexicon: BDAG
  rationale: Here ὡς introduces the manner/basis of the exhortation. 'As' preserves
    the compact comparison/identity sense without making explicit a causal nuance
    not required by the Greek.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  - offspring
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive and refers to filial relationship rather than
    specifically male offspring. 'Children' is both accurate and natural, fitting
    the doctrine's gender-accurate principle.
- source_word: ἀγαπητά
  chosen: beloved
  alternatives:
  - dearly loved
  - loved
  lexicon: BDAG
  rationale: ἀγαπητά carries the sense of being loved/dear. 'Beloved' is concise,
    natural in biblical register, and preserves the covenantal-affectionate weight
    better than the flatter 'loved'.
