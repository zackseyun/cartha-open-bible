theological_decisions:
- issue: Force of the exhortation in relation to divine sonship
  chosen_reading: The verse exhorts believers to become imitators of God on the basis
    of their identity as beloved children, without implying they become God's children
    by imitation.
  alternative_readings:
  - 'The phrase could be taken more loosely as a simple comparison: imitate God like
    beloved children do.'
  rationale: The syntax places 'as beloved children' as the manner/ground of the command.
    The translation preserves this without importing a doctrinal claim about adoption
    beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
