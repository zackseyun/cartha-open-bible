id: EPH.5.11
reference: Ephesians 5:11
source:
  edition: SBLGNT
  text: καὶ μὴ συγκοινωνεῖτε τοῖς ἔργοις τοῖς ἀκάρποις τοῦ σκότους, μᾶλλον δὲ καὶ ἐλέγχετε,
translation:
  text: And do not participate in the unfruitful works of darkness[a], but instead even expose them[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'share in' or 'have fellowship with.'
    reason: lexical_alternative
  - marker: b
    text: Or 'reprove' or 'rebuke them.' The Greek can include verbal correction, but in this context also carries the sense of bringing such works to light.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγκοινωνεῖτε
  chosen: participate in
  alternatives:
  - share in
  - have fellowship with
  - be partners with
  lexicon: BDAG
  rationale: The verb means to share with or participate together in something. 'Participate in' is natural modern English and preserves the sense of active involvement without the archaic feel of 'have fellowship with.'
- source_word: ἔργοις
  chosen: works
  alternatives:
  - deeds
  lexicon: BDAG
  rationale: '''Works'' is the standard rendering and fits Pauline usage well. ''Deeds'' is possible, but ''works'' better preserves lexical continuity with Paul''s moral vocabulary.'
- source_word: ἀκάρποις
  chosen: unfruitful
  alternatives:
  - fruitless
  - barren
  lexicon: BDAG
  rationale: '''Unfruitful'' closely reflects the agricultural metaphor in the Greek and preserves the moral contrast with fruitful living in the surrounding context.'
- source_word: σκότους
  chosen: of darkness
  alternatives:
  - belonging to darkness
  - done in darkness
  lexicon: BDAG
  rationale: The genitive is rendered straightforwardly as 'of darkness,' preserving both the metaphorical and moral force without over-interpreting the relationship.
- source_word: μᾶλλον δὲ καὶ
  chosen: but instead even
  alternatives:
  - but rather also
  - but rather even
  - instead, rather
  lexicon: BDAG
  rationale: 'This combination intensifies the contrast: not only must believers avoid participation, they must go further. ''But instead even'' captures both the adversative shift and the added force of καὶ.'
- source_word: ἐλέγχετε
  chosen: expose
  alternatives:
  - reprove
  - rebuke
  - convict
  lexicon: BDAG
  rationale: In context, the sense is to bring to light or expose wrongdoing, not merely to scold. 'Expose' fits the immediate imagery of darkness/light in the passage and is clearer in modern English than 'reprove,' while preserving the moral confrontational force.
