theological_decisions:
- issue: Sense of ἐλέγχετε in relation to evil works
  chosen_reading: expose them
  alternative_readings:
  - reprove them
  - rebuke them
  rationale: The context in Ephesians 5 emphasizes light making things visible (vv. 8, 13). Therefore 'expose' best preserves the thematic connection between darkness and disclosure, while still allowing for moral censure. This avoids narrowing the command to verbal rebuke alone.
  doctrine_reference: Translation philosophy §3, §6
- issue: Force of the imperative contrast
  chosen_reading: do not participate ... but instead even expose
  alternative_readings:
  - do not share ... but rather reprove
  rationale: 'The verse presents a two-part ethical command: abstention from evil and active opposition to it. The translation preserves that tension without expanding it into a specific method beyond what the Greek states.'
  doctrine_reference: Translation philosophy §1, §3
