theological_decisions:
- issue: Gendered rendering of the masculine plural adjectives ἄσοφοι / σοφοί
  chosen_reading: Retain representative masculine force with 'unwise men' in the first
    contrast, while leaving the second adjective simply 'wise' for natural English.
  alternative_readings:
  - unwise people ... wise people
  - unwise ... wise
  rationale: The Greek uses masculine plural forms that can function generically.
    Per doctrine, gender-accurate renderings are preferred over flattening to gender-neutral
    language. A footnote preserves the inclusive sense for modern readers, since Paul
    addresses the church broadly rather than males only.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
