id: EPH.5.10
reference: Ephesians 5:10
source:
  edition: SBLGNT
  text: δοκιμάζοντες τί ἐστιν εὐάρεστον τῷ κυρίῳ·
translation:
  text: testing what is pleasing to the Lord;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "discerning" or "finding out" what is pleasing to the Lord.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκιμάζοντες
  chosen: testing
  alternatives:
  - discerning
  - proving
  - finding out
  - approving after testing
  lexicon: BDAG
  rationale: Present active participle, nominative masculine plural, continuing the
    exhortational flow from the surrounding context. "Testing" preserves the active
    sense of examining/proving something to determine its worth, without over-paraphrasing.
    "Discerning" is possible in context, but can underplay the evaluative/probative
    force of δοκιμάζω.
- source_word: τί
  chosen: what
  alternatives:
  - that which
  lexicon: BDAG
  rationale: 'Interrogative/indefinite sense in an indirect question: "what is pleasing."
    "What" is the most natural modern English rendering.'
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula linking the clause; no expansion is needed.
- source_word: εὐάρεστον
  chosen: pleasing
  alternatives:
  - acceptable
  - well-pleasing
  lexicon: BDAG
  rationale: '"Pleasing" is clear, natural English and accurately conveys what is
    agreeable/acceptable in God''s sight. "Well-pleasing" is more traditional but
    less natural in contemporary English; "acceptable" is possible but slightly flatter
    and less relational.'
- source_word: τῷ κυρίῳ
  chosen: to the Lord
  alternatives:
  - before the Lord
  lexicon: BDAG
  rationale: Dative with εὐάρεστον is naturally rendered "pleasing to." κύριος follows
    the project's default rendering "Lord." In Ephesians, the referent is most naturally
    the Lord Jesus within the paraenetic context, but the translation leaves the title
    as the Greek does without importing further specification.
