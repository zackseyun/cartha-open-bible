- issue: Referent of κύριος
  chosen_reading: Lord
  alternative_readings:
  - the Lord Jesus
  - God
  rationale: The Greek text uses the title κύριος without explicit expansion. In Pauline
    usage and in the immediate context of Ephesians 5, the referent may be understood
    christologically, but the translation should preserve the textual wording and
    not resolve beyond what the verse explicitly states.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it.'
