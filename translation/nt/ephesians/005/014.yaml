theological_decisions:
- issue: Nature of the introductory citation
  chosen_reading: Render the source of the quotation impersonally as 'it says' without identifying it as Scripture, God, or a known hymn.
  alternative_readings:
  - scripture says
  - he says
  - it is said in a hymn
  rationale: The Greek leaves the speaker/source unstated. Since the exact source of the quotation is debated, the translation should preserve that openness rather than resolve it.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of Χριστός
  chosen_reading: the Messiah
  alternative_readings:
  - the Christ
  rationale: The term is a title here, and the project's default is to translate titles to preserve meaning. This avoids treating Χριστός as a mere proper name while remaining within orthodox Christology.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ where name-like)'
