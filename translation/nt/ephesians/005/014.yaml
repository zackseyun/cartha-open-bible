id: EPH.5.14
reference: Ephesians 5:14
source:
  edition: SBLGNT
  text: πᾶν γὰρ τὸ φανερούμενον φῶς ἐστιν. διὸ λέγει· Ἔγειρε, ὁ καθεύδων, καὶ ἀνάστα ἐκ τῶν νεκρῶν, καὶ ἐπιφαύσει σοι ὁ Χριστός.
translation:
  text: For everything that is made visible is light[a]. Therefore it says, “Wake up, sleeper, and rise from the dead[c][b], and Messiah will shine on you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “everything exposed is light.” The participle φανερούμενον can be understood as “made visible” or “exposed/revealed.”
    reason: lexical_alternative
  - marker: b
    text: 'Greek “the Christ”; rendered “the Messiah” here because Χριστός functions as a title. Traditional English: “Christ.”'
    reason: alternative_reading
  - marker: c
    text: The source of the quotation is uncertain; it may echo Scripture themes (especially Isa 60:1) or an early Christian hymn.
    reason: cross_reference
lexical_decisions:
- source_word: πᾶν
  chosen: everything
  alternatives:
  - all things
  - everything/everyone
  lexicon: BDAG
  rationale: 'Neuter singular with the articular participle is best taken generically: ''everything'' that comes into the state described. This avoids forcing a personal referent while preserving the broad scope of the statement.'
- source_word: φανερούμενον
  chosen: that is made visible
  alternatives:
  - that is exposed
  - that becomes visible
  - being revealed
  lexicon: BDAG
  rationale: The passive participle of φανερόω can mean 'made visible' or 'exposed/revealed.' In this context, following the preceding discussion of exposure by light, either is possible. 'Made visible' fits the immediate predicate 'is light' more naturally in English, while an alternative is preserved in a footnote because many understand the sense as 'exposed.'
- source_word: φῶς
  chosen: light
  lexicon: BDAG
  rationale: Straightforward lexical rendering. The metaphorical force should remain implicit rather than paraphrased.
- source_word: διὸ
  chosen: therefore
  alternatives:
  - for this reason
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding statement; 'therefore' is concise and natural.
- source_word: λέγει
  chosen: it says
  alternatives:
  - he says
  - scripture says
  lexicon: BDAG
  rationale: The subject is unspecified in Greek. English idiom commonly uses impersonal 'it says' for an introduced citation, without over-specifying the source as Scripture, God, or a hymn.
- source_word: Ἔγειρε
  chosen: Wake up
  alternatives:
  - Awake
  - Rise
  lexicon: BDAG
  rationale: Imperative addressed metaphorically to a sleeper. 'Wake up' is idiomatic modern English and preserves the metaphor better than the more archaic 'Awake.'
- source_word: ὁ καθεύδων
  chosen: sleeper
  alternatives:
  - you who sleep
  - sleeping one
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'Sleeper' is concise, natural, and preserves the vocative force in English quotation style.
- source_word: ἀνάστα
  chosen: rise
  alternatives:
  - stand up
  - get up
  lexicon: BDAG
  rationale: Aorist imperative of ἀνίστημι here likely carries the sense of rising up, especially in parallel with 'from the dead.' 'Rise' preserves both literal and metaphorical resonance.
- source_word: ἐκ τῶν νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: Standard idiomatic rendering. 'From among the dead' is more explicit but less natural in contemporary English.
- source_word: ἐπιφαύσει
  chosen: will shine on
  alternatives:
  - will shine upon
  - will give light to
  lexicon: BDAG
  rationale: Future verb meaning to shine upon/give light. 'Shine on' is clear modern English and keeps the imagery of light rather than interpreting it abstractly.
- source_word: Χριστός
  chosen: the Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός is translated as ''Messiah'' where it functions as a title rather than a name-like form. Here the article ὁ supports titular force: ''the Messiah.'' The traditional alternative ''Christ'' is preserved in a footnote.'
