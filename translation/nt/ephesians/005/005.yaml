id: EPH.5.5
reference: Ephesians 5:5
source:
  edition: SBLGNT
  text: τοῦτο γὰρ ⸀ἴστε γινώσκοντες ὅτι πᾶς πόρνος ἢ ἀκάθαρτος ἢ πλεονέκτης, ⸀ὅ ἐστιν
    εἰδωλολάτρης, οὐκ ἔχει κληρονομίαν ἐν τῇ βασιλείᾳ τοῦ Χριστοῦ καὶ θεοῦ.
translation:
  text: For you know this, understanding that every sexually immoral or unclean or
    greedy person, who is an idolater, has no inheritance in the kingdom of Messiah
    and God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'which is idolatry,' likely referring especially to
      greed/covetousness.
    reason: alternative_reading
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴστε γινώσκοντες
  chosen: you know this, recognizing
  alternatives:
  - you know this well
  - be sure of this
  - know this for certain
  lexicon: BDAG
  rationale: The construction combines οἶδα with a participle of γινώσκω for emphatic
    knowing/recognizing. Rendering both elements preserves the rhetorical force without
    collapsing the participle entirely. 'Recognizing' keeps the participial nuance
    better than a flat idiom, though idiomatic alternatives are possible.
- source_word: πόρνος
  chosen: sexually immoral
  alternatives:
  - fornicator
  - sexually immoral person
  lexicon: BDAG
  rationale: Refers to one characterized by sexual immorality. 'Sexually immoral'
    is clear modern English and avoids the narrower or archaic feel of 'fornicator'
    while preserving the moral category.
- source_word: ἀκάθαρτος
  chosen: unclean
  alternatives:
  - impure
  lexicon: BDAG
  rationale: In Pauline ethical vice lists this term can denote moral impurity broadly.
    'Unclean' preserves the metaphorical and cultic resonance better than 'impure,'
    though the latter is a viable English alternative.
- source_word: πλεονέκτης
  chosen: greedy person
  alternatives:
  - covetous person
  - one who is greedy
  lexicon: BDAG
  rationale: Denotes one marked by grasping greed/covetousness. 'Greedy person' is
    natural modern English; 'covetous' is more traditional but less current.
- source_word: ὅ ἐστιν εἰδωλολάτρης
  chosen: who is an idolater
  alternatives:
  - which is idolatry
  - who is an idol-worshiper
  lexicon: BDAG
  rationale: The relative pronoun is neuter, creating a syntactic difficulty after
    masculine nouns. The sense in context is that the greedy person is an idolater,
    as in the close parallel Col 3:5. Main text follows the most natural contextual
    sense in English. The more literal alternative is preserved in a footnote because
    the Greek form allows reference to the preceding vice, especially greed, rather
    than directly to the person.
- source_word: κληρονομίαν
  chosen: inheritance
  alternatives:
  - share
  - heritage
  lexicon: BDAG
  rationale: '''Inheritance'' is the standard Pauline term and preserves covenantal/eschatological
    resonance better than the flatter ''share''.'
- source_word: βασιλείᾳ
  chosen: kingdom
  alternatives:
  - reign
  - royal dominion
  lexicon: BDAG
  rationale: '''Kingdom'' is the established and still accurate rendering here, encompassing
    both realm and reign.'
- source_word: Χριστοῦ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine guidance, Χριστός is translated as 'Messiah' where functioning
    as a title. Here the genitive in 'the kingdom of the Messiah and God' is titular
    rather than name-like.
- source_word: τοῦ Χριστοῦ καὶ θεοῦ
  chosen: of the Messiah and God
  alternatives:
  - of Christ and God
  lexicon: BDAG
  rationale: The single article with two singular personal genitives may suggest a
    close conceptual unity, but the phrase is best translated straightforwardly without
    importing a more specific syntactical conclusion into the English. 'Messiah and
    God' preserves the Greek wording and title translation policy.
