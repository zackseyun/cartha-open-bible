theological_decisions:
- issue: Referent of ὅ ἐστιν εἰδωλολάτρης
  chosen_reading: 'Applied in translation to the person just mentioned, especially
    the greedy person: ''who is an idolater.'''
  alternative_readings:
  - Taken more abstractly as 'which is idolatry,' referring especially to greed/covetousness
  rationale: The neuter relative pronoun creates ambiguity. Context and Pauline parallel
    in Col 3:5 strongly support the idea that greed is idolatrous, and in this list
    the clause most naturally qualifies the final item while still describing the
    person characterized by it. English requires a smoother resolution than a wooden
    neuter relative would allow, so the main text personalizes it; the abstract alternative
    is preserved in a footnote to maintain auditability and theological tension.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Meaning of exclusion from inheritance
  chosen_reading: 'Rendered as a present statement of status: ''has no inheritance
    in the kingdom.'''
  alternative_readings:
  - will not inherit the kingdom
  rationale: The Greek uses present tense οὐκ ἔχει, not a future verb. The translation
    preserves the present aspect without softening the warning or converting it into
    a merely future event.
- issue: Relation of 'the Messiah and God'
  chosen_reading: 'Straightforward coordinate genitives: ''the kingdom of the Messiah
    and God.'''
  alternative_readings:
  - A more interpretively loaded rendering emphasizing a specific christological syntactical
    claim
  rationale: Historic orthodoxy is affirmed, but the translation should not force
    a debated syntactical conclusion beyond what the Greek plainly states. The wording
    preserves the text while remaining fully compatible with orthodox Christology.
  doctrine_reference: Affirmations; Translation philosophy §1
