id: EPH.5.18
reference: Ephesians 5:18
source:
  edition: SBLGNT
  text: καὶ μὴ μεθύσκεσθε οἴνῳ, ἐν ᾧ ἐστιν ἀσωτία, ἀλλὰ πληροῦσθε ἐν πνεύματι,
translation:
  text: And do not get drunk with wine, in which there is debauchery, but be filled
    with the Spirit,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "in the Spirit"; some understand this more generally as "in spirit."
    reason: alternative_reading
lexical_decisions:
- source_word: μεθύσκεσθε
  chosen: do not get drunk
  alternatives:
  - do not be drunk
  - do not become drunk
  lexicon: BDAG
  rationale: Present passive/deponent imperative with μή gives a prohibition. 'Get
    drunk' is idiomatic modern English and captures the process/result sense better
    than the stative 'be drunk,' while remaining close to the Greek.
- source_word: οἴνῳ
  chosen: with wine
  alternatives:
  - by wine
  - in wine
  lexicon: BDAG
  rationale: Dative with the verb is naturally rendered 'with wine' in English for
    the intoxicating means or substance involved.
- source_word: ἐν ᾧ
  chosen: in which
  alternatives:
  - wherein
  - in it
  lexicon: BDAG
  rationale: The relative construction most naturally refers back to 'wine' or the
    drunkenness associated with it. 'In which' preserves the Greek linkage without
    over-interpreting.
- source_word: ἀσωτία
  chosen: debauchery
  alternatives:
  - dissipation
  - recklessness
  - profligacy
  lexicon: BDAG
  rationale: The noun denotes wasteful, morally unrestrained conduct. 'Debauchery'
    is clear modern English and preserves the ethical force better than the less common
    'dissipation.'
- source_word: πληροῦσθε
  chosen: be filled
  alternatives:
  - be continually filled
  - be full
  lexicon: BDAG
  rationale: Present passive imperative calls for an ongoing disposition or repeated
    action, but English normally leaves that aspect implicit. 'Be filled' is the standard
    and sufficiently transparent rendering.
- source_word: ἐν πνεύματι
  chosen: with the Spirit
  alternatives:
  - in the Spirit
  - by the Spirit
  lexicon: BDAG
  rationale: Here ἐν with dative after πληροῦσθε is best rendered in idiomatic English
    as content or sphere closely tied to the Holy Spirit. 'With the Spirit' fits the
    contrast with 'with wine' and is the most natural English expression, while preserving
    the ambiguity of means/sphere better than an overly interpretive paraphrase.
