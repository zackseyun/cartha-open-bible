theological_decisions:
- issue: Referent of πνεύματι
  chosen_reading: the Spirit (Holy Spirit)
  alternative_readings:
  - spirit
  - your spirit
  rationale: In the immediate context of Pauline exhortation and the anarthrous πνεύματι,
    the phrase is most plausibly a reference to the Holy Spirit rather than merely
    human disposition. Capitalization in English signals this interpretive judgment,
    but the alternative is preserved in a footnote because the Greek lacks the article
    and some take it as 'in spirit.'
  doctrine_reference: Preserve theological tension rather than resolve it; document
    ambiguity and preserve alternatives in a footnote.
