theological_decisions:
- issue: Referent of 'the coming world'
  chosen_reading: An eschatological world/order to come, not merely the present inhabited earth.
  alternative_readings:
  - the inhabited earth in general
  - the gospel age specifically
  rationale: The phrase τὴν οἰκουμένην τὴν μέλλουσαν naturally points to the world/order that is to come. The immediate context in Hebrews 2, especially the citation and exposition of Psalm 8, concerns dominion in relation to humanity and ultimately the Son, not angelic rule.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
