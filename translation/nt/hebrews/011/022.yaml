id: HEB.11.22
reference: Hebrews 11:22
source:
  edition: SBLGNT
  text: πίστει Ἰωσὴφ τελευτῶν περὶ τῆς ἐξόδου τῶν υἱῶν Ἰσραὴλ ἐμνημόνευσεν, καὶ περὶ
    τῶν ὀστέων αὐτοῦ ἐνετείλατο.
translation:
  text: By faith Joseph, as he was nearing the end of his life, mentioned the exodus
    of the sons of Israel and gave instructions concerning his bones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when he was dying.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the departure' of the sons of Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - by faithfulness
  - by trust
  lexicon: BDAG
  rationale: Follows the default rendering of πίστις as 'faith' in the Hebrews 11
    refrain. Although 'faithfulness' is a possible gloss in some contexts, here the
    dative functions instrumentally within the chapter's repeated pattern, highlighting
    the faith by which the patriarch acted.
- source_word: τελευτῶν
  chosen: as he was nearing the end of his life
  alternatives:
  - dying
  - when he was dying
  lexicon: BDAG
  rationale: The participle literally means 'dying' or 'coming to an end.' The chosen
    rendering expresses the contemporaneous sense in natural English while preserving
    the idea that Joseph spoke at life's end. 'Dying' is more formal/literal and is
    preserved as an alternative.
- source_word: περὶ τῆς ἐξόδου
  chosen: the exodus
  alternatives:
  - the departure
  - the going out
  lexicon: BDAG
  rationale: ἔξοδος literally denotes 'departure' or 'going out,' but in this context
    it refers specifically to Israel's future departure from Egypt. 'Exodus' is both
    accurate and theologically/historically recognizable, while still directly reflecting
    the Greek noun.
- source_word: τῶν υἱῶν Ἰσραήλ
  chosen: the sons of Israel
  alternatives:
  - the children of Israel
  - the Israelites
  lexicon: BDAG
  rationale: This preserves the explicit familial wording of the Greek ('sons') in
    keeping with the gender-accurate policy, rather than flattening it to 'Israelites.'
    'Children of Israel' is idiomatic and traditional, but 'sons of Israel' more closely
    matches the source form.
- source_word: ἐμνημόνευσεν
  chosen: mentioned
  alternatives:
  - spoke about
  - made mention of
  - remembered
  lexicon: BDAG
  rationale: In this construction with περὶ, the verb means to make mention of or
    speak about, not merely to remember internally. 'Mentioned' is concise and natural
    English.
- source_word: ἐνετείλατο
  chosen: gave instructions
  alternatives:
  - commanded
  - gave orders
  lexicon: BDAG
  rationale: The middle verb means to give instructions or command. 'Gave instructions'
    communicates the sense clearly in modern English without sounding overly harsh,
    while still preserving Joseph's intentional directive.
- source_word: περὶ τῶν ὀστέων αὐτοῦ
  chosen: concerning his bones
  alternatives:
  - about his bones
  - concerning his remains
  lexicon: BDAG
  rationale: The Greek explicitly says 'bones,' alluding to Joseph's request that
    his bones be carried up from Egypt. The concrete term should be retained rather
    than generalized to 'remains' in the main text.
