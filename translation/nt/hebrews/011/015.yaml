theological_decisions:
- issue: Nature of the 'country' remembered
  chosen_reading: An earthly homeland previously left behind, contrasted implicitly with the better/heavenly country in the surrounding context.
  alternative_readings:
  - A generalized former way of life rather than a literal homeland
  rationale: The immediate context in Hebrews 11:13–16 contrasts the patriarchs' earthly origin with their forward-looking desire for a better, heavenly country. The translation keeps the concrete spatial language ('that land ... from which they had gone out') and does not allegorize it in the main text.
  doctrine_reference: Translation philosophy §§1, 3, 5
