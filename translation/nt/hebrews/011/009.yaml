id: HEB.11.9
reference: Hebrews 11:9
source:
  edition: SBLGNT
  text: πίστει παρῴκησεν εἰς γῆν τῆς ἐπαγγελίας ὡς ἀλλοτρίαν, ἐν σκηναῖς κατοικήσας
    μετὰ Ἰσαὰκ καὶ Ἰακὼβ τῶν συγκληρονόμων τῆς ἐπαγγελίας τῆς αὐτῆς·
translation:
  text: By faith he lived as a foreigner in the land of promise, as in a foreign land,
    dwelling in tents with Isaac and Jacob, fellow heirs of the same promise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By faith he sojourned in the land of promise as a foreign land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - by faithfulness
  - by trust
  lexicon: BDAG
  rationale: Dative of means/instrument; the standard and contextually fitting rendering
    in Hebrews 11 is 'by faith.' Per doctrine defaults, alternatives are acknowledged
    but not adopted here because the chapter repeatedly highlights faith as the operative
    response.
- source_word: παρῴκησεν
  chosen: he lived as a foreigner
  alternatives:
  - he sojourned
  - he lived as an alien
  - he resided temporarily
  lexicon: BDAG
  rationale: The verb conveys residing in a place as a non-native/outsider rather
    than simply living there. 'Lived as a foreigner' preserves the social sense in
    clear modern English better than the more archaic 'sojourned.'
- source_word: εἰς γῆν τῆς ἐπαγγελίας
  chosen: in the land of promise
  alternatives:
  - into the land of promise
  - in a land of promise
  lexicon: BDAG
  rationale: Although εἰς often means 'into,' with verbs of residence it can function
    idiomatically for location/direction toward residence. English idiom favors 'in
    the land of promise.' The genitive is rendered attributively as 'of promise,'
    preserving the close link to God's promise.
- source_word: ὡς ἀλλοτρίαν
  chosen: as in a foreign land
  alternatives:
  - as foreign
  - as though it were чуж?
  - as belonging to another
  lexicon: BDAG
  rationale: ἀλλότριος means belonging to another, foreign, strange. Because it modifies
    γῆν and follows a residence verb, the sense is that Abraham lived there as though
    it were not his own. 'As in a foreign land' communicates this naturally and preserves
    the comparison introduced by ὡς.
- source_word: ἐν σκηναῖς κατοικήσας
  chosen: dwelling in tents
  alternatives:
  - having lived in tents
  - living in tents
  - settling in tents
  lexicon: BDAG
  rationale: The aorist participle is contemporaneous/circumstantial relative to the
    main verb, describing the manner of his life there. 'Dwelling in tents' is concise
    and natural, preserving the concrete image of temporary habitation.
- source_word: μετὰ Ἰσαὰκ καὶ Ἰακώβ
  chosen: with Isaac and Jacob
  lexicon: BDAG
  rationale: μετά with genitive straightforwardly means 'with.' Names are transliterated
    per translation policy.
- source_word: τῶν συγκληρονόμων
  chosen: fellow heirs
  alternatives:
  - co-heirs
  - joint heirs
  lexicon: BDAG
  rationale: The term denotes sharing an inheritance together. 'Fellow heirs' is readable
    modern English and avoids overly technical phrasing while preserving the shared-inheritance
    idea.
- source_word: τῆς ἐπαγγελίας τῆς αὐτῆς
  chosen: of the same promise
  alternatives:
  - of that same promise
  - of the very same promise
  lexicon: BDAG
  rationale: 'The repeated noun with αὐτῆς emphasizes identity: Isaac and Jacob shared
    the very promise Abraham had. ''The same promise'' is idiomatic and preserves
    the emphasis without overtranslation.'
