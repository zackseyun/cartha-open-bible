id: HEB.11.33
reference: Hebrews 11:33
source:
  edition: SBLGNT
  text: οἳ διὰ πίστεως κατηγωνίσαντο βασιλείας, εἰργάσαντο δικαιοσύνην, ἐπέτυχον ἐπαγγελιῶν,
    ἔφραξαν στόματα λεόντων,
translation:
  text: who through faith conquered kingdoms, worked righteousness, obtained promises,
    shut the mouths of lions,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "worked justice." The Greek word can denote righteousness or justice
      depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or "by faith." The phrase may also be understood as acting by means of trust
      in God.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ πίστεως
  chosen: through faith
  alternatives:
  - by faith
  - through trust
  - through faithfulness
  lexicon: BDAG
  rationale: πίστις is a contested term in the project guidelines, with default rendering
    'faith.' Here the phrase denotes the means/instrument by which these people acted.
    'Through faith' preserves the preposition διά with the genitive and fits the catalog
    style of Hebrews 11. Alternatives such as 'trust' or 'faithfulness' are possible
    in broader usage, but this context strongly favors 'faith' as the operative response
    to God.
- source_word: κατηγωνίσαντο
  chosen: conquered
  alternatives:
  - subdued
  - overcame
  - defeated
  lexicon: BDAG
  rationale: The verb καταγωνίζομαι carries the sense of prevailing against or subduing
    in conflict. 'Conquered' is natural modern English and suitably forceful. 'Subdued'
    is traditional and possible, but 'conquered kingdoms' reads more idiomatically
    while preserving the military-political sense.
- source_word: βασιλείας
  chosen: kingdoms
  alternatives:
  - realms
  - kingdoms/rulers
  lexicon: BDAG
  rationale: βασιλεία here is best taken as 'kingdom' in the concrete political sense,
    plural accusative as the object of the verb. 'Kingdoms' is the straightforward
    rendering; 'realms' is possible but less direct.
- source_word: εἰργάσαντο
  chosen: worked
  alternatives:
  - practiced
  - accomplished
  - brought about
  lexicon: BDAG
  rationale: ἐργάζομαι commonly means to work, do, or accomplish. 'Worked' preserves
    the verbal force and pairs well with the object δικαιοσύνην. 'Practiced' is possible,
    but 'worked righteousness' better reflects the active accomplishment implied in
    the list.
- source_word: δικαιοσύνην
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per project defaults, δικαιοσύνη is rendered 'righteousness,' with 'justice'
    preserved where relevant. In this non-Pauline catalog of faithful deeds, 'righteousness'
    best captures upright action in covenantal and moral terms, while 'justice' remains
    a viable nuance worth preserving in a footnote.
- source_word: ἐπέτυχον
  chosen: obtained
  alternatives:
  - gained
  - received
  - attained
  lexicon: BDAG
  rationale: ἐπιτυγχάνω means to attain, obtain, or receive. 'Obtained' is concise
    and idiomatic in this list. It avoids over-specifying whether the promises were
    fully realized or partially received, leaving the broader Hebrews tension intact.
- source_word: ἐπαγγελιῶν
  chosen: promises
  alternatives:
  - what was promised
  lexicon: BDAG
  rationale: The genitive plural after ἐπέτυχον is idiomatically rendered 'obtained
    promises.' This keeps close to the Greek and matches the catalog style. 'What
    was promised' is smoother in some contexts but less formally aligned with the
    source.
- source_word: ἔφραξαν
  chosen: shut
  alternatives:
  - closed
  - stopped
  lexicon: BDAG
  rationale: φράσσω means to stop up, shut, or silence. 'Shut' is the most natural
    choice with 'mouths' in English and preserves the vivid imagery, likely alluding
    to Daniel without making the allusion explicit in the main text.
- source_word: στόματα λεόντων
  chosen: the mouths of lions
  alternatives:
  - lions' mouths
  lexicon: BDAG
  rationale: The phrase is rendered literally to preserve the concrete imagery and
    the cadence of the series. 'The mouths of lions' is slightly more formal and echoes
    familiar biblical diction without becoming archaic.
