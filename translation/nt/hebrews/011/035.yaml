id: HEB.11.35
reference: Hebrews 11:35
source:
  edition: SBLGNT
  text: ἔλαβον γυναῖκες ἐξ ἀναστάσεως τοὺς νεκροὺς αὐτῶν· ἄλλοι δὲ ἐτυμπανίσθησαν, οὐ προσδεξάμενοι τὴν ἀπολύτρωσιν, ἵνα κρείττονος ἀναστάσεως τύχωσιν·
translation:
  text: Women received back their dead by resurrection[a]; but others were tortured, not accepting release[c][b], so that they might obtain a better resurrection.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'release' could be rendered 'deliverance'; the Greek term here refers to being freed from torture or death, not necessarily to redemption in the salvation sense.
    reason: lexical_alternative
  - marker: b
    text: '''Were tortured'' translates a verb associated with severe bodily torment, possibly by beating on a rack or drum-like frame; the exact method is uncertain.'
    reason: cultural_note
  - marker: c
    text: The 'better resurrection' contrasts with the earlier restoration of the dead to ordinary mortal life; here the sense is a superior resurrection hope beyond death.
    reason: cross_reference
lexical_decisions:
- source_word: ἔλαβον
  chosen: received back
  alternatives:
  - received
  lexicon: BDAG
  rationale: In context with τοὺς νεκροὺς αὐτῶν and ἐξ ἀναστάσεως, the sense is not merely 'received' but 'received back,' i.e., had their dead restored to them alive.
- source_word: γυναῖκες
  chosen: Women
  alternatives:
  - wives
  lexicon: BDAG
  rationale: The plural refers to women such as the widows of 1–2 Kings who received their dead back; 'women' is the natural contextual sense, not specifically 'wives'.
- source_word: ἐξ ἀναστάσεως
  chosen: by resurrection
  alternatives:
  - from resurrection
  - out of resurrection
  lexicon: BDAG
  rationale: 'The preposition ἐκ/ἐξ with ἀνάστασις expresses source or means: the dead were returned to them as a result of resurrection. ''By resurrection'' is idiomatic English while preserving the causal/source idea.'
- source_word: τοὺς νεκροὺς αὐτῶν
  chosen: their dead
  alternatives:
  - their dead ones
  - their dead people
  lexicon: BDAG
  rationale: A natural English rendering of the substantival adjective νεκρούς with possessive pronoun; it refers to their deceased loved ones.
- source_word: ἄλλοι δὲ
  chosen: but others
  alternatives:
  - and others
  - others however
  lexicon: BDAG
  rationale: δέ marks contrast with the preceding examples of deliverance; 'but others' brings out the rhetorical shift to sufferers who were not delivered in this life.
- source_word: ἐτυμπανίσθησαν
  chosen: were tortured
  alternatives:
  - were beaten to death
  - were stretched on the rack
  - were clubbed
  lexicon: BDAG
  rationale: The verb refers to torture, historically associated with the tympanum/rack. Because the exact instrument is uncertain to modern readers, 'were tortured' best communicates the core sense without over-specifying.
- source_word: οὐ προσδεξάμενοι
  chosen: not accepting
  alternatives:
  - not welcoming
  - not receiving
  lexicon: BDAG
  rationale: The participle indicates refusal of what was offered. 'Not accepting' is clear and fits the legal/offer context.
- source_word: τὴν ἀπολύτρωσιν
  chosen: release
  alternatives:
  - deliverance
  - redemption
  lexicon: BDAG
  rationale: Here the word denotes release from torture or death if they would comply, not redemptive salvation in the theological sense. 'Release' avoids importing soteriological meaning not demanded by the context.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: 'This introduces purpose: they refused release with a view to obtaining something better.'
- source_word: κρείττονος ἀναστάσεως
  chosen: a better resurrection
  alternatives:
  - a greater resurrection
  lexicon: BDAG
  rationale: κρείττων in Hebrews regularly carries the sense 'better.' The comparison is between temporary restoration to mortal life and the superior resurrection hope beyond martyrdom.
- source_word: τύχωσιν
  chosen: they might obtain
  alternatives:
  - they might attain
  - they might receive
  lexicon: BDAG
  rationale: τυγχάνω here means to obtain or attain. 'Obtain' is idiomatic with the object 'a better resurrection.'
