theological_decisions:
- issue: Meaning of ἀπολύτρωσιν in context
  chosen_reading: temporal release from torture/death
  alternative_readings:
  - redemption in a broader theological sense
  rationale: The immediate context concerns persecuted faithful people refusing an offered escape in order to remain faithful. Rendering the term as 'release' preserves the narrative sense and avoids importing a doctrinal claim about atonement or salvation not explicit here.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it'
- issue: Force of 'better resurrection'
  chosen_reading: eschatological resurrection superior to mere restoration to mortal life
  alternative_readings:
  - simply a more favorable resurrection without explicit contrast to prior examples
  rationale: Within Hebrews 11:35 the first clause describes people restored to ordinary earthly life, while the second contrasts martyrs seeking a superior resurrection. This preserves the text's rhetorical and theological contrast without over-defining the mechanics of resurrection.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
