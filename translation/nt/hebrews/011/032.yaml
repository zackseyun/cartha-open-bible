id: HEB.11.32
reference: Hebrews 11:32
source:
  edition: SBLGNT
  text: Καὶ τί ἔτι λέγω; ἐπιλείψει ⸂με γὰρ⸃ διηγούμενον ὁ χρόνος περὶ Γεδεών, Βαράκ, ⸀Σαμψών, Ἰεφθάε, Δαυίδ τε καὶ Σαμουὴλ καὶ τῶν προφητῶν,
translation:
  text: And what more shall I say? For time would fail me if I were telling about Gideon[a], Barak, Samson, Jephthah, David, and also Samuel and the prophets,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'For time will fail me as I recount...'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ τί ἔτι λέγω;
  chosen: And what more shall I say?
  alternatives:
  - And what else shall I say?
  - And why should I say more?
  lexicon: BDAG
  rationale: τί ἔτι with λέγω is an idiomatic rhetorical question introducing further examples. 'What more shall I say?' is natural English and preserves the forward-driving rhetorical force.
- source_word: ἐπιλείψει
  chosen: would fail
  alternatives:
  - will fail
  - would run out
  lexicon: BDAG
  rationale: Future indicative used in a rhetorical/hypothetical sense with the participial construction; English idiom is best captured by 'would fail' rather than a simple predictive 'will fail.'
- source_word: με γὰρ
  chosen: For ... me
  alternatives:
  - for me indeed
  - for me
  lexicon: BDAG
  rationale: γάρ gives explanatory force, introducing the reason the speaker will not continue at length. με is the object of ἐπιλείψει. English reorders naturally as 'For time would fail me...'.
- source_word: διηγούμενον
  chosen: if I were telling
  alternatives:
  - while telling
  - in recounting
  - to tell
  lexicon: BDAG
  rationale: Present middle participle accusative masculine singular agreeing with με, expressing the circumstance in which time would fail him. 'If I were telling' captures the contingent, ongoing sense in idiomatic English.
- source_word: ὁ χρόνος
  chosen: time
  alternatives:
  - the time
  lexicon: BDAG
  rationale: 'Although articular in Greek, English idiom omits the article here: ''time would fail me'' is the established and natural equivalent.'
- source_word: περὶ
  chosen: about
  alternatives:
  - concerning
  - regarding
  lexicon: BDAG
  rationale: With genitive names following διηγούμενον, περί introduces the topic of narration. 'About' is the most natural modern English rendering.
- source_word: Γεδεών, Βαράκ, Σαμψών, Ἰεφθάε, Δαυίδ, Σαμουὴλ
  chosen: Gideon, Barak, Samson, Jephthah, David, Samuel
  lexicon: standard transliteration practice
  rationale: Per translation philosophy, personal names are transliterated by standard English conventions rather than translated.
- source_word: τε καὶ
  chosen: and also
  alternatives:
  - and
  - as well as
  lexicon: BDAG
  rationale: τε καὶ links David with Samuel in a slightly additive way. 'And also' preserves the connective nuance better than a bare 'and,' while remaining readable.
- source_word: τῶν προφητῶν
  chosen: the prophets
  lexicon: BDAG
  rationale: Straightforward plural noun referring to the prophetic figures as a group. The article is naturally retained in English.
