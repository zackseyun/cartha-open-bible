theological_decisions:
- issue: Nature of the promised city
  chosen_reading: Render as 'the city that has foundations' without specifying 'heavenly'
    or 'New Jerusalem' in the main text.
  alternative_readings:
  - the heavenly city
  - the city with permanent foundations
  rationale: The verse itself identifies the city by its permanence and by God as
    its architect and builder, but does not explicitly name it here. The translation
    should preserve the imagery without importing a fuller theological identification
    from nearby passages.
  doctrine_reference: Preserve theological tension rather than resolve it.
