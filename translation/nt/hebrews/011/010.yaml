id: HEB.11.10
reference: Hebrews 11:10
source:
  edition: SBLGNT
  text: ἐξεδέχετο γὰρ τὴν τοὺς θεμελίους ἔχουσαν πόλιν, ἧς τεχνίτης καὶ δημιουργὸς
    ὁ θεός.
translation:
  text: For he was waiting for the city that has foundations, whose architect and
    builder is God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the city having foundations.' The plural may emphasize permanence and
      stability.
    reason: lexical_alternative
  - marker: b
    text: Or, 'whose designer and maker is God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεδέχετο
  chosen: was waiting for
  alternatives:
  - was expecting
  - was looking forward to
  - was awaiting
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing expectation or patient waiting in
    past time. 'Was waiting for' is natural English and preserves the durative sense
    better than a simple past like 'waited for.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this verse to the prior statement
    about Abraham's sojourning by faith.
- source_word: τοὺς θεμελίους ἔχουσαν πόλιν
  chosen: the city that has foundations
  alternatives:
  - the city having foundations
  - the founded city
  lexicon: BDAG
  rationale: The participial phrase literally means 'the city having the foundations.'
    The plural 'foundations' is significant and should be preserved. 'That has foundations'
    is idiomatic while remaining close to the Greek. The article suggests a definite,
    eschatologically known city.
- source_word: θεμελίους
  chosen: foundations
  alternatives:
  - foundation stones
  - bases
  lexicon: BDAG
  rationale: Standard rendering of θεμέλιος. The plural likely emphasizes permanence
    and stability in contrast to temporary tents in the context.
- source_word: πόλιν
  chosen: city
  alternatives:
  - town
  lexicon: BDAG
  rationale: '''City'' is the normal and contextually appropriate rendering, especially
    given Hebrews'' theological motif of the heavenly/city of God.'
- source_word: ἧς
  chosen: whose
  alternatives:
  - of which
  lexicon: BDAG
  rationale: Genitive relative pronoun referring back to 'city.' 'Whose' is the most
    natural English way to introduce the possessive relation with the following predicate
    nouns.
- source_word: τεχνίτης
  chosen: architect
  alternatives:
  - designer
  - craftsman
  lexicon: BDAG
  rationale: τεχνίτης denotes a skilled worker or artisan. In this paired expression
    with δημιουργός, 'architect' captures the planning/design aspect and differentiates
    it from the subsequent term for maker/builder.
- source_word: δημιουργός
  chosen: builder
  alternatives:
  - maker
  - creator
  - craftsman
  lexicon: BDAG
  rationale: In context of a city, 'builder' is the most concrete and fitting rendering.
    While δημιουργός can mean 'maker' more broadly, 'builder' preserves the construction
    imagery and complements 'architect.'
- source_word: ὁ θεός
  chosen: God
  lexicon: BDAG
  rationale: Subject of the clause; standard rendering.
