theological_decisions:
- issue: Nature of Moses' alternative to suffering with God's people
  chosen_reading: The phrase is rendered as a moral contrast between solidarity with
    God's people and the short-lived enjoyment associated with sin, without specifying
    the exact sinful acts in view.
  alternative_readings:
  - The 'enjoyment of sin' may specifically refer to the privileges and compromises
    of Pharaoh's court.
  - The phrase may broadly denote all sinful pleasures tied to Egypt.
  rationale: The Greek does not define the content of the sin beyond contrasting it
    with identification with God's people. The translation preserves that breadth
    and does not narrow the referent beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
