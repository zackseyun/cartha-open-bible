id: HEB.11.25
reference: Hebrews 11:25
source:
  edition: SBLGNT
  text: μᾶλλον ἑλόμενος συγκακουχεῖσθαι τῷ λαῷ τοῦ θεοῦ ἢ πρόσκαιρον ἔχειν ἁμαρτίας
    ἀπόλαυσιν,
translation:
  text: choosing rather to be mistreated with the people of God than to have the fleeting
    enjoyment of sin,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the fleeting pleasure of sin.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μᾶλλον
  chosen: rather
  alternatives:
  - instead
  - more
  lexicon: BDAG
  rationale: Comparative adverb marking preference between two options. 'Rather' is
    idiomatic in English with a participle of choosing and preserves the contrast
    with ἢ.
- source_word: ἑλόμενος
  chosen: choosing
  alternatives:
  - having chosen
  - preferring
  lexicon: BDAG
  rationale: Aorist middle participle of αἱρέομαι, modifying Moses from the prior
    verse and expressing deliberate personal choice. 'Choosing' reads naturally in
    English and fits the participial flow into the infinitival complements.
- source_word: συγκακουχεῖσθαι
  chosen: to be mistreated with
  alternatives:
  - to suffer affliction with
  - to share ill-treatment with
  lexicon: BDAG
  rationale: The verb combines shared participation (συν-) with suffering mistreatment.
    'To be mistreated with' preserves both the passive sense and the solidarity implied
    by the prefix without sounding archaic.
- source_word: τῷ λαῷ τοῦ θεοῦ
  chosen: the people of God
  alternatives:
  - God's people
  lexicon: BDAG
  rationale: A standard covenantal expression. 'The people of God' is slightly more
    formal and preserves the genitival structure of the Greek.
- source_word: ἢ
  chosen: than
  alternatives:
  - rather than
  lexicon: BDAG
  rationale: Introduces the second member of the comparison after μᾶλλον. 'Than' is
    the most natural English comparator here.
- source_word: πρόσκαιρον
  chosen: temporary
  alternatives:
  - fleeting
  - for a time
  - passing
  lexicon: BDAG
  rationale: The adjective denotes something lasting only for a short time. 'Temporary'
    is clear modern English and preserves the contrast between short-lived pleasure
    and enduring identification with God's people.
- source_word: ἔχειν
  chosen: to have
  alternatives:
  - to enjoy
  lexicon: BDAG
  rationale: The Greek verb is simply 'to have.' Although English could smooth the
    phrase as 'to enjoy,' retaining 'to have' avoids importing more interpretation
    than the text states; the noun ἀπόλαυσιν already carries the enjoyment idea.
- source_word: ἁμαρτίας
  chosen: of sin
  alternatives:
  - sinful
  - from sin
  lexicon: BDAG
  rationale: 'Genitive most naturally taken as an objective/attributive genitive qualifying
    the enjoyment: enjoyment associated with sin. ''Of sin'' is the most direct and
    least interpretively loaded rendering.'
- source_word: ἀπόλαυσιν
  chosen: enjoyment
  alternatives:
  - pleasure
  - delight
  lexicon: BDAG
  rationale: Refers to enjoyment or pleasure derived from something. 'Enjoyment' pairs
    well with the more literal 'to have' and avoids overstating sensuality that 'pleasure'
    might suggest in English.
