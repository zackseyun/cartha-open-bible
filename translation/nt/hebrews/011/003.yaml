id: HEB.11.3
reference: Hebrews 11:3
source:
  edition: SBLGNT
  text: πίστει νοοῦμεν κατηρτίσθαι τοὺς αἰῶνας ῥήματι θεοῦ, εἰς τὸ μὴ ἐκ φαινομένων
    ⸂τὸ βλεπόμενον⸃ γεγονέναι.
translation:
  text: By faith we understand that the ages were framed by the word of God, so that
    what is seen did not come into being from things that are visible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the worlds' or 'the universe'; Greek 'the ages,' which can denote the
      world-order across time.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - By means of faith
  - Through faith
  lexicon: BDAG
  rationale: Dative of means/instrument; 'By faith' is the standard concise rendering
    and aligns with the chapter's repeated formula while preserving πίστις as 'faith'
    per doctrine defaults.
- source_word: νοοῦμεν
  chosen: we understand
  alternatives:
  - we perceive
  - we comprehend
  lexicon: BDAG
  rationale: νοέω here denotes mental apprehension or understanding rather than mere
    sensory perception. 'We understand' is natural modern English and fits the epistemic
    emphasis of the verse.
- source_word: κατηρτίσθαι
  chosen: were framed
  alternatives:
  - were prepared
  - were ordered
  - were put in order
  lexicon: BDAG
  rationale: Perfect passive infinitive of καταρτίζω conveys that the worlds/ages
    have been set in proper order or constituted. 'Were framed' preserves the sense
    of ordered formation without over-specifying material creation language beyond
    the Greek.
- source_word: τοὺς αἰῶνας
  chosen: the ages
  alternatives:
  - the worlds
  - the universe
  lexicon: BDAG
  rationale: αἰῶνες literally means 'ages,' but in Hebrews can denote the created
    order across time. 'The ages' is more source-near and preserves the temporal-cosmic
    breadth better than the interpretive 'universe.' An alternative is worth preserving
    because many English versions render 'worlds' or 'universe.'
- source_word: ῥήματι θεοῦ
  chosen: by the word of God
  alternatives:
  - by God's word
  - by the utterance of God
  lexicon: BDAG
  rationale: ῥῆμα emphasizes spoken word/utterance, but 'word of God' is idiomatic
    and sufficiently transparent in English. Instrumental dative indicates means.
- source_word: εἰς τὸ μὴ ... γεγονέναι
  chosen: so that ... did not come into being
  alternatives:
  - with the result that ... was not made
  - so that ... was not brought into existence
  lexicon: BDAG
  rationale: The construction expresses result/purpose. 'So that ... did not come
    into being' is readable and preserves the verbal idea of γίνομαι without importing
    stronger metaphysical terminology than necessary.
- source_word: ἐκ φαινομένων
  chosen: from things that are visible
  alternatives:
  - from visible things
  - from what appears
  lexicon: BDAG
  rationale: The participle φαινομένων refers to things appearing/visible. 'Things
    that are visible' is explicit and natural in English, matching the contrast with
    what is seen.
- source_word: τὸ βλεπόμενον
  chosen: what is seen
  alternatives:
  - the visible thing
  - what is visible
  lexicon: BDAG
  rationale: Substantival participle; singular collective sense in context. 'What
    is seen' is idiomatic and preserves the broad reference to the visible order.
