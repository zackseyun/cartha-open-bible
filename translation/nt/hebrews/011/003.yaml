theological_decisions:
- issue: Scope of αἰῶνες in relation to creation
  chosen_reading: Rendered as 'the ages' rather than 'the universe' or 'the worlds.'
  alternative_readings:
  - the worlds
  - the universe
  rationale: The Greek term αἰῶνες can encompass the world-order through time, not
    merely spatial cosmos. 'The ages' preserves the text's temporal-cosmic breadth
    and avoids narrowing the statement to material cosmology alone, while still affirming
    divine creation/ordering.
  doctrine_reference: Translation philosophy §1, §5
- issue: Implication of creation from non-visible realities
  chosen_reading: The verse is rendered without explicitly stating creatio ex nihilo
    in the main text.
  alternative_readings:
  - A rendering that more directly implies creation out of nothing
  rationale: The text states that what is seen did not come into being from visible
    things. While this coheres with the doctrine of creation ex nihilo, the Greek
    wording should not be expanded beyond its explicit claim. The translation preserves
    the theological implication without importing a fuller doctrinal formulation into
    the main text.
  doctrine_reference: Translation philosophy §1, §3
