id: HEB.11.7
reference: Hebrews 11:7
source:
  edition: SBLGNT
  text: πίστει χρηματισθεὶς Νῶε περὶ τῶν μηδέπω βλεπομένων εὐλαβηθεὶς κατεσκεύασεν κιβωτὸν εἰς σωτηρίαν τοῦ οἴκου αὐτοῦ, δι’ ἧς κατέκρινεν τὸν κόσμον, καὶ τῆς κατὰ πίστιν δικαιοσύνης ἐγένετο κληρονόμος.
translation:
  text: By faith Noah[a], having been warned about things not yet seen, in reverent fear constructed an ark for the salvation of his household[d][c][b], through which he condemned the world and became heir of the righteousness according to faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been divinely instructed' or 'having received a divine warning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'being moved with godly fear.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'through which' most naturally refers to the ark; some understand it more broadly as Noah's faith or obedient response.
    reason: alternative_reading
  - marker: d
    text: Or 'justice' for 'righteousness,' though here the context favors covenantal righteousness received in relation to faith.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - by trust
  - by faithfulness
  lexicon: BDAG
  rationale: Dative of means/instrument at the head of the clause, matching the repeated pattern in Hebrews 11. Per doctrine defaults, πίστις is rendered 'faith' in the main text; alternatives are noted but not adopted here because the context emphasizes Noah's believing response.
- source_word: χρηματισθεὶς
  chosen: having been warned by God
  alternatives:
  - having been instructed
  - having received a divine message
  lexicon: BDAG
  rationale: In this passive participial form, the verb commonly denotes receiving a divine communication or warning. 'Warned by God' makes the implied divine source explicit in idiomatic English and fits the context of impending judgment.
- source_word: περὶ τῶν μηδέπω βλεπομένων
  chosen: about things not yet seen
  alternatives:
  - concerning things not yet visible
  - about what had not yet been seen
  lexicon: BDAG
  rationale: A concise rendering of the prepositional phrase with the present passive participle. 'Not yet seen' preserves the temporal force of μηδέπω and the unseen nature of the coming flood/judgment.
- source_word: εὐλαβηθεὶς
  chosen: in reverent fear
  alternatives:
  - with reverence
  - being moved with godly fear
  - having become cautious
  lexicon: BDAG
  rationale: The participle conveys a pious, reverent response rather than mere terror. 'In reverent fear' preserves both the affective and religious dimensions without archaic phrasing.
- source_word: κατεσκεύασεν
  chosen: constructed
  alternatives:
  - prepared
  - built
  lexicon: BDAG
  rationale: '''Constructed'' reflects the deliberate act of making the ark and is slightly more precise than ''prepared,'' while remaining natural English.'
- source_word: κιβωτὸν
  chosen: an ark
  alternatives:
  - a chest
  - a vessel
  lexicon: BDAG
  rationale: Established contextual sense in the Noah narrative; 'ark' is the natural English equivalent here.
- source_word: εἰς σωτηρίαν τοῦ οἴκου αὐτοῦ
  chosen: for the salvation of his household
  alternatives:
  - for the deliverance of his house
  - for saving his family
  lexicon: BDAG
  rationale: σωτηρία can mean salvation or deliverance; 'salvation' preserves the theological weight while still fitting the immediate sense of rescue. 'Household' is broader and more accurate than merely 'family' for οἶκος.
- source_word: δι’ ἧς
  chosen: through which
  alternatives:
  - by which
  - through it
  lexicon: BDAG
  rationale: The feminine relative most naturally refers back to κιβωτός ('ark'), though some take it more broadly as Noah's faith/obedient action. 'Through which' preserves the likely grammatical antecedent while remaining readable.
- source_word: κατέκρινεν τὸν κόσμον
  chosen: he condemned the world
  alternatives:
  - he passed judgment on the world
  - he showed the world to be condemned
  lexicon: BDAG
  rationale: Direct rendering of the aorist verb and object. In context, Noah's faithful obedience stands as a condemning witness against the unbelieving world.
- source_word: τῆς κατὰ πίστιν δικαιοσύνης
  chosen: the righteousness according to faith
  alternatives:
  - the righteousness that is according to faith
  - the righteousness by faith
  lexicon: BDAG
  rationale: This preserves the Greek structure and avoids over-interpreting κατά. Because δικαιοσύνη is a contested theological term, the default 'righteousness' is retained in the main text rather than 'justice'.
- source_word: ἐγένετο κληρονόμος
  chosen: became heir
  alternatives:
  - came to be an heir
  - proved to be heir
  lexicon: BDAG
  rationale: Idiomatic rendering of the middle verb plus predicate nominative. 'Became heir' communicates resultant status clearly and naturally.
