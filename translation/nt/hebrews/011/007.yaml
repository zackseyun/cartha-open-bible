theological_decisions:
- issue: Sense of χρηματισθεὶς and whether to name God as the source
  chosen_reading: having been warned by God
  alternative_readings:
  - having been divinely instructed
  - having received an oracle
  rationale: The passive often implies divine agency, and the context of Noah and the flood is explicitly God's warning. Making the source explicit aids clarity without adding foreign theology.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nuance of εὐλαβηθεὶς
  chosen_reading: in reverent fear
  alternative_readings:
  - being moved with godly fear
  - with reverence
  rationale: The term should not be flattened into mere fright; it denotes a reverent, pious response to God's warning. This preserves theological tension between fear and faithful obedience.
  doctrine_reference: Translation philosophy §3, §6
- issue: Reference of δι’ ἧς
  chosen_reading: through which = through the ark
  alternative_readings:
  - through faith
  - through Noah's obedient action
  rationale: The nearest grammatical antecedent is the feminine noun κιβωτός. While the broader context is faith, the syntax most naturally points to the ark as the means through which the world was condemned.
  doctrine_reference: Translation philosophy §1, §3
- issue: Rendering of δικαιοσύνη
  chosen_reading: righteousness
  alternative_readings:
  - justice
  rationale: Per the contested-terms table, the default rendering is 'righteousness,' with 'justice' preserved as an alternative where relevant. Here the inheritance language and the phrase 'according to faith' favor the covenantal/relational sense rather than a social-judicial emphasis.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
