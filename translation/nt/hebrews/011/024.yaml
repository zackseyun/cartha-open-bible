id: HEB.11.24
reference: Hebrews 11:24
source:
  edition: SBLGNT
  text: πίστει Μωϋσῆς μέγας γενόμενος ἠρνήσατο λέγεσθαι υἱὸς θυγατρὸς Φαραώ,
translation:
  text: By faith Moses[a], when he had grown up, refused to be called the son of Pharaoh’s daughter,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By faithfulness' or 'By trust'; Greek πίστει. Here the main text follows the chapter’s recurring formula 'By faith.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - by faithfulness
  - by trust
  lexicon: BDAG
  rationale: Dative of means/instrument; in Hebrews 11 the repeated formula πίστει is idiomatically and contextually best rendered 'by faith.' Per doctrine defaults, alternatives such as 'faithfulness' or 'trust' are acknowledged but not preferred here because the chapter emphasizes actions undertaken in faith.
- source_word: Μωϋσῆς
  chosen: Moses
  rationale: Standard English transliteration of the personal name.
- source_word: μέγας γενόμενος
  chosen: when he had grown up
  alternatives:
  - having become great
  - when he became great
  lexicon: BDAG
  rationale: The participial phrase is idiomatic for reaching maturity/adulthood rather than becoming 'great' in status. 'When he had grown up' conveys temporal force and natural English while preserving the sense of attaining maturity.
- source_word: ἠρνήσατο
  chosen: refused
  alternatives:
  - denied
  - renounced
  lexicon: BDAG
  rationale: In this context the verb denotes a deliberate refusal of an identity or claim. 'Refused' fits the infinitival complement and reads naturally in English.
- source_word: λέγεσθαι
  chosen: to be called
  alternatives:
  - to be named
  - to be spoken of as
  lexicon: BDAG
  rationale: Passive infinitive after ἠρνήσατο; 'to be called' is the most direct and idiomatic rendering.
- source_word: υἱὸς θυγατρὸς Φαραώ
  chosen: the son of Pharaoh’s daughter
  alternatives:
  - a son of Pharaoh’s daughter
  lexicon: BDAG
  rationale: The anarthrous Greek predicate is definite in sense because it refers to Moses' specific adopted royal identity. English idiom favors 'the son of Pharaoh’s daughter' in this context.
- source_word: Φαραώ
  chosen: Pharaoh’s
  rationale: Standard English form of the title/name, rendered in possessive construction for natural English.
