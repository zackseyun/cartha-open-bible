id: HEB.11.23
reference: Hebrews 11:23
source:
  edition: SBLGNT
  text: Πίστει Μωϋσῆς γεννηθεὶς ἐκρύβη τρίμηνον ὑπὸ τῶν πατέρων αὐτοῦ, διότι εἶδον ἀστεῖον τὸ παιδίον καὶ οὐκ ἐφοβήθησαν τὸ διάταγμα τοῦ βασιλέως.
translation:
  text: By faith Moses[a], when he was born, was hidden for three months by his parents, because they saw that the child was beautiful, and they were not afraid of the king’s edict.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'fine' or 'exceptional' for 'beautiful' (Greek ἀστεῖον), echoing Exodus 2:2 and Acts 7:20.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  chosen: By faith
  alternatives:
  - Through faith
  lexicon: BDAG
  rationale: Dative of means/instrument introducing the recurring motif in Hebrews 11. Per doctrine, πίστις defaults to 'faith'; this is not a contested pistis-Christou context, so no alternative is needed in the main text.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Standard English transliteration of the personal name, in keeping with the policy to transliterate names.
- source_word: γεννηθεὶς
  chosen: when he was born
  alternatives:
  - having been born
  - after he was born
  lexicon: BDAG
  rationale: Aorist passive participle rendered temporally in natural English. 'When he was born' best conveys the participial relation to the main verb without sounding wooden.
- source_word: ἐκρύβη
  chosen: was hidden
  alternatives:
  - was concealed
  lexicon: BDAG
  rationale: Aorist passive indicative; straightforward passive rendering preserves that Moses is the one hidden by others.
- source_word: τρίμηνον
  chosen: for three months
  alternatives:
  - three months
  lexicon: BDAG
  rationale: Accusative of duration; English idiom normally supplies 'for' to express the time span.
- source_word: ὑπὸ τῶν πατέρων αὐτοῦ
  chosen: by his parents
  alternatives:
  - by his fathers
  - by his father and mother
  lexicon: BDAG
  rationale: Although πατέρων is literally 'fathers,' in this context and in idiomatic Greek it refers to parents collectively. 'By his parents' is the clearest and most accurate English rendering, matching the plural verb forms and the Exodus background involving both father and mother.
- source_word: διότι
  chosen: because
  alternatives:
  - since
  lexicon: BDAG
  rationale: Introduces the reason for their action; 'because' is the most direct modern equivalent.
- source_word: εἶδον
  chosen: they saw
  alternatives:
  - they perceived
  lexicon: BDAG
  rationale: Simple aorist active; 'saw' preserves the concrete observation that motivates their action.
- source_word: ἀστεῖον
  chosen: beautiful
  alternatives:
  - fine
  - exceptional
  - lovely
  lexicon: BDAG
  rationale: The adjective can mean attractive, fine, or exceptional. 'Beautiful' is idiomatic and reflects the Exodus tradition (cf. Exod 2:2; Acts 7:20), while leaving room for the sense that the child was notably pleasing in appearance.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the baby
  lexicon: BDAG
  rationale: '''The child'' is a direct rendering and fits both the Greek and the formal tone of the passage. ''Baby'' is possible contextually but slightly more interpretive.'
- source_word: οὐκ ἐφοβήθησαν
  chosen: they were not afraid
  alternatives:
  - they did not fear
  lexicon: BDAG
  rationale: Idiomatic English rendering of the passive/deponent verb φοβέομαι. This preserves the contrast between faith and fear in the verse.
- source_word: τὸ διάταγμα τοῦ βασιλέως
  chosen: the king’s edict
  alternatives:
  - the decree of the king
  - the king's command
  lexicon: BDAG
  rationale: διάταγμα denotes an official order or decree. 'Edict' captures the formal, royal nature of the command in concise modern English.
