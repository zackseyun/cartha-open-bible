theological_decisions:
- issue: Nature of the parents' motivation in hiding Moses
  chosen_reading: The verse presents their action as an act of faith expressed in refusing fear of the king's edict, while also noting their perception that the child was beautiful.
  alternative_readings:
  - The beauty of the child alone motivated the action
  - The phrase implies a special divine sign in the child's appearance
  rationale: 'The syntax gives both reasons: they saw the child was ἀστεῖον and they did not fear the king''s edict, all under the heading ''By faith.'' The translation preserves this tension without importing a stronger theological claim about miraculous appearance than the text states.'
  doctrine_reference: Preserve theological tension rather than resolve it.
