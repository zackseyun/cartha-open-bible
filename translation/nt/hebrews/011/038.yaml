theological_decisions:
- issue: Referent and force of 'the world was not worthy'
  chosen_reading: The clause is retained as a moral indictment of the world/society
    in contrast to the worth of the faithful sufferers.
  alternative_readings:
  - A more neutral statement about incompatibility between the faithful and the world
  rationale: The Greek makes a strong evaluative claim, not merely a sociological
    observation. The translation preserves that tension without expanding it into
    a broader doctrinal statement beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
