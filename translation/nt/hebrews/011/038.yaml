id: HEB.11.38
reference: Hebrews 11:38
source:
  edition: SBLGNT
  text: ὧν οὐκ ἦν ἄξιος ὁ κόσμος ⸀ἐπὶ ἐρημίαις πλανώμενοι καὶ ὄρεσι καὶ σπηλαίοις
    καὶ ταῖς ὀπαῖς τῆς γῆς·
translation:
  text: —of whom the world was not worthy—wandering in deserts and mountains, and
    in caves and holes in the ground.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in desolate places.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'holes of the earth.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν
  chosen: of whom
  alternatives:
  - of these
  lexicon: BDAG
  rationale: Genitive plural relative pronoun referring back to the faithful sufferers
    in the preceding verse. 'Of whom' preserves the idiomatic genitive construction
    in English and fits the evaluative statement that follows.
- source_word: ἄξιος
  chosen: worthy
  alternatives:
  - deserving
  lexicon: BDAG
  rationale: Standard rendering in evaluative contexts. 'Worthy' preserves the moral
    valuation of the clause without flattening it into mere merit language.
- source_word: κόσμος
  chosen: the world
  alternatives:
  - the world order
  lexicon: BDAG
  rationale: Here κόσμος refers to the human world/society that rejected these faithful
    people. 'The world' is the natural and sufficiently broad English rendering.
- source_word: ἐπὶ ἐρημίαις
  chosen: in deserts
  alternatives:
  - in desolate places
  - through deserts
  lexicon: BDAG
  rationale: With ἐπί plus the dative in this travel/wandering context, the sense
    is locative. 'In deserts' is idiomatic and concrete; 'desolate places' is possible
    but less vivid and less tied to the noun ἐρημία.
- source_word: πλανώμενοι
  chosen: wandering
  alternatives:
  - roaming
  - going about
  lexicon: BDAG
  rationale: The participle describes their unsettled, fugitive movement. 'Wandering'
    is both natural English and consistent with the context of displacement and hardship.
- source_word: ὄρεσι
  chosen: mountains
  alternatives:
  - hills
  lexicon: BDAG
  rationale: ὄρος normally denotes mountain/high hill; 'mountains' is the straightforward
    rendering and matches the elevated wilderness setting.
- source_word: σπηλαίοις
  chosen: caves
  alternatives:
  - caverns
  lexicon: BDAG
  rationale: Common term for caves; 'caves' is accessible modern English and fits
    the catalog of hiding places.
- source_word: ὀπαῖς τῆς γῆς
  chosen: holes in the ground
  alternatives:
  - holes of the earth
  - openings of the earth
  lexicon: BDAG
  rationale: ὀπή denotes an opening, hole, or crevice. The genitive τῆς γῆς specifies
    earthly/ground openings. 'Holes in the ground' is idiomatic modern English while
    preserving the concrete image. 'Holes of the earth' is more formal but less natural.
