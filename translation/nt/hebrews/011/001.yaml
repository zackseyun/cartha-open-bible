theological_decisions:
- issue: Meaning of ὑπόστασις in Hebrews 11:1
  chosen_reading: Rendered as 'assurance' rather than 'substance'
  alternative_readings:
  - substance
  - reality
  - confidence
  rationale: The verse defines faith in practical-experiential terms within the chapter's
    exhortational context. 'Assurance' preserves the sense without suggesting a technical
    metaphysical definition of faith as ontological 'substance.' The alternative traditional
    rendering is worth preserving because of its historical influence.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - faithfulness
  - trust
  rationale: The doctrine table sets 'faith' as the default rendering, with alternatives
    documented where relevant. Here no genitival ambiguity like pistis Christou is
    present, so 'faith' is retained in the main text.
  doctrine_reference: 'Contested terms table: πίστις'
