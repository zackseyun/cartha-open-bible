id: HEB.11.1
reference: Hebrews 11:1
source:
  edition: SBLGNT
  text: Ἔστιν δὲ πίστις ἐλπιζομένων ὑπόστασις, πραγμάτων ἔλεγχος οὐ βλεπομένων·
translation:
  text: Now faith is the assurance of things hoped for, the proof of things not seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'substance' or 'reality' of things hoped for.
    reason: lexical_alternative
  - marker: b
    text: Or 'evidence' or 'conviction' of things not seen.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστις
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per doctrine default, πίστις is rendered 'faith' in the main text. In
    this context the noun denotes the believer's stance of trust/confidence toward
    God's promises rather than Christ's faithfulness or a merely subjective feeling.
    Because πίστις is a contested theological term, alternatives are preserved in
    documentation, though here 'faith' is the most natural sense.
- source_word: ἐλπιζομένων
  chosen: of things hoped for
  alternatives:
  - of hoped-for things
  - of what is being hoped for
  lexicon: BDAG
  rationale: The present passive participle in the genitive plural functions substantivally
    and is best rendered as the object/content of hope. 'Things hoped for' is idiomatic
    English and preserves the genitive relation to ὑπόστασις.
- source_word: ὑπόστασις
  chosen: assurance
  alternatives:
  - substance
  - reality
  - confidence
  lexicon: BDAG
  rationale: ὑπόστασις has a broad semantic range including 'substance,' 'actuality,'
    and 'confidence/assurance.' In Hebrews 11:1, 'assurance' best communicates the
    experiential and evidentiary force in readable English without importing later
    metaphysical terminology. 'Substance' is traditional but can mislead modern readers
    into hearing an ontological claim not plainly required by the context.
- source_word: πραγμάτων
  chosen: of things
  alternatives:
  - of matters
  - of realities
  lexicon: BDAG
  rationale: πρᾶγμα is a broad term for things, matters, or realities. 'Things' is
    sufficiently general and matches the parallelism with 'things hoped for' and 'things
    not seen.'
- source_word: ἔλεγχος
  chosen: proof
  alternatives:
  - conviction
  - evidence
  - certainty
  lexicon: BDAG
  rationale: ἔλεγχος can denote proof, evidence, or inner conviction produced by proof.
    'Proof' preserves the term's objective evidentiary force more clearly than the
    traditional 'evidence' or 'conviction,' while remaining natural in English. It
    also balances 'assurance' in the first clause.
- source_word: οὐ βλεπομένων
  chosen: of things not seen
  alternatives:
  - of unseen things
  - of things that are not seen
  lexicon: BDAG
  rationale: The negative with the present passive participle is rendered straightforwardly.
    'Things not seen' preserves the parallel structure and keeps the focus on realities
    beyond present sight.
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: δέ here marks a mild transition into the chapter's exposition on faith.
    'Now' is idiomatic and signals development rather than strong contrast.
