id: HEB.11.39
reference: Hebrews 11:39
source:
  edition: SBLGNT
  text: ⸀καὶ πάντες μαρτυρηθέντες διὰ τῆς πίστεως οὐκ ἐκομίσαντο τὴν ἐπαγγελίαν,
translation:
  text: And all these, though commended through faith, did not receive the promise,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having received approval' or 'having been attested.' The Greek participle
      emphasizes that these people were borne favorable witness through faith.
    reason: lexical_alternative
  - marker: b
    text: Or 'did not obtain the promise.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - And yet
  - Now
  lexicon: BDAG
  rationale: Standard connective linking this summary statement to the preceding catalog
    of faithful people. Simple 'And' best preserves the flow without adding contrast
    not explicit in the conjunction itself.
- source_word: πάντες
  chosen: all these
  alternatives:
  - all
  - all of them
  lexicon: BDAG
  rationale: Refers back to the exemplars just listed in Hebrews 11. 'All these' makes
    the anaphoric force clear in natural English while remaining close to the Greek.
- source_word: μαρτυρηθέντες
  chosen: though commended
  alternatives:
  - having been testified to
  - having received approval
  - having been attested
  lexicon: BDAG
  rationale: Aorist passive participle of μαρτυρέω here carries the sense of receiving
    favorable testimony/approval from God, as throughout the chapter. 'Commended'
    is idiomatic and matches the chapter's repeated theme better than the more wooden
    'testified to.' 'Though' brings out the concessive sense created in context by
    the following 'did not receive.'
- source_word: διὰ τῆς πίστεως
  chosen: through faith
  alternatives:
  - by faith
  lexicon: BDAG
  rationale: πίστις is rendered by the doctrinal default 'faith.' διά with the genitive
    commonly expresses means or instrumentality; 'through faith' is both accurate
    and consistent with the chapter's recurring phrasing.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per DOCTRINE.md, the default rendering of πίστις is 'faith,' with alternatives
    preserved where contested. In Hebrews 11 the sense is the believers' faith/trust,
    not a notably contested construction requiring an alternative in the main text.
- source_word: οὐκ ἐκομίσαντο
  chosen: did not receive
  alternatives:
  - did not obtain
  - did not carry away for themselves
  lexicon: BDAG
  rationale: κομίζω in the middle can mean receive/obtain what is promised or due.
    'Did not receive' is clear modern English and fits the eschatological point of
    the verse.
- source_word: τὴν ἐπαγγελίαν
  chosen: the promise
  alternatives:
  - what was promised
  - the fulfillment of the promise
  lexicon: BDAG
  rationale: Singular with article is best kept as 'the promise,' likely referring
    collectively to the promised consummation discussed in the context. This preserves
    the Greek's compact theological wording without over-interpreting it as full 'fulfillment'
    in the main text.
