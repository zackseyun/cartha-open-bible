theological_decisions:
- issue: Meaning of 'the promise' in context
  chosen_reading: Rendered as 'the promise' without expanding it in the main text.
  alternative_readings:
  - what was promised
  - the fulfillment of the promise
  - the promised inheritance/blessing
  rationale: The verse states that the faithful of old did not yet receive the promised
    consummation, clarified further in v. 40. Expanding the phrase in translation
    would resolve an interpretive question the Greek leaves compact. Preserving 'the
    promise' maintains the theological tension and lets the context explain it.
  doctrine_reference: Preserve theological tension rather than resolve it.
