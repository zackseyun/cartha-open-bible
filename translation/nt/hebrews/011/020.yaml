id: HEB.11.20
reference: Hebrews 11:20
source:
  edition: SBLGNT
  text: Πίστει ⸀καὶ περὶ μελλόντων εὐλόγησεν Ἰσαὰκ τὸν Ἰακὼβ καὶ τὸν Ἠσαῦ.
translation:
  text: By faith Isaac blessed Jacob and Esau concerning things to come[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'about future things' or 'concerning future events.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  chosen: By faith
  alternatives:
  - In faith
  lexicon: BDAG
  rationale: Dative of means/instrument or manner in the recurring Hebrews 11 formula; 'By faith' is the established and natural English rendering. Per doctrine, πίστις defaults to 'faith'; 'faithfulness' is not likely here because the construction describes the means by which Isaac acted.
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - indeed
  lexicon: BDAG
  rationale: 'Here καί has an ascensive/emphatic force linking Isaac''s blessing to matters beyond the immediate act: ''even concerning things to come.'' Rendering it as simple ''and'' in English is awkward and obscures the emphasis.'
- source_word: περὶ μελλόντων
  chosen: concerning things to come
  alternatives:
  - about future things
  - concerning future events
  lexicon: BDAG
  rationale: περί with the genitive means 'concerning/about,' and the present participle μελλόντων functions substantivally for what is impending or future. 'Things to come' is idiomatic, concise, and preserves the open-ended scope better than the more interpretive 'future events.'
- source_word: εὐλόγησεν
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: BDAG
  rationale: Aorist active indicative of εὐλογέω, straightforwardly 'blessed.' The simpler English verb preserves the biblical register without unnecessary expansion.
- source_word: Ἰσαὰκ
  chosen: Isaac
  rationale: Standard English transliteration of the personal name, in keeping with the translation policy to transliterate names.
- source_word: τὸν Ἰακὼβ
  chosen: Jacob
  rationale: Direct object with article; standard transliteration of the personal name.
- source_word: καὶ τὸν Ἠσαῦ
  chosen: and Esau
  rationale: Second coordinated direct object; standard transliteration of the personal name. The order of names is preserved from the Greek.
