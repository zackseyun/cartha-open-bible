theological_decisions:
- issue: Meaning of τελειωθῶσιν in Hebrews' salvation-historical context
  chosen_reading: Retain 'be made perfect' in the main text, allowing the term to carry both completion and perfection without narrowing it.
  alternative_readings:
  - be brought to completion
  - reach their consummation
  rationale: Hebrews uses τελειόω with rich theological force tied to fulfillment, access, and consummation. Rendering it 'be made perfect' preserves that tension rather than resolving it into only moral perfection or only chronological completion.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
