id: HEB.11.34
reference: Hebrews 11:34
source:
  edition: SBLGNT
  text: ἔσβεσαν δύναμιν πυρός, ἔφυγον στόματα ⸀μαχαίρης, ⸀ἐδυναμώθησαν ἀπὸ ἀσθενείας, ἐγενήθησαν ἰσχυροὶ ἐν πολέμῳ, παρεμβολὰς ἔκλιναν ἀλλοτρίων·
translation:
  text: quenched the power of fire[a], escaped the edge of the sword, were made strong out of weakness, became mighty in battle[b], put foreign armies to flight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'the mouths of the sword,' an idiom meaning 'the edge of the sword.'
    reason: lexical_alternative
  - marker: b
    text: Or 'encampments'; the term refers here to military forces, hence 'armies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσβεσαν
  chosen: quenched
  alternatives:
  - extinguished
  lexicon: BDAG
  rationale: Aorist active indicative plural from σβέννυμι, literally 'to quench/extinguish.' 'Quenched' preserves the vivid idiom and echoes the likely allusion to deliverance from fiery danger without over-paraphrasing.
- source_word: δύναμιν πυρός
  chosen: the power of fire
  alternatives:
  - the force of fire
  - fire
  lexicon: BDAG
  rationale: δύναμις with genitive πυρός is more than simply 'fire'; it denotes fire's power/force. 'The power of fire' keeps the Greek expression rather than flattening it to 'fire,' while remaining natural English.
- source_word: ἔφυγον
  chosen: escaped
  alternatives:
  - fled from
  lexicon: BDAG
  rationale: In context with 'the sword,' the sense is successful escape rather than merely running away. 'Escaped' best captures the result implied by the aorist.
- source_word: στόματα μαχαίρης
  chosen: the edge of the sword
  alternatives:
  - the mouth of the sword
  - the swords' mouths
  lexicon: BDAG
  rationale: A literal rendering is 'mouths of the sword,' a Semitic/idiomatic expression for a sword's cutting edge. English idiom requires 'the edge of the sword'; the singular 'sword' is a natural collective rendering.
- source_word: ἐδυναμώθησαν
  chosen: were made strong
  alternatives:
  - were strengthened
  - became strong
  lexicon: BDAG
  rationale: Passive form of δυναμόω. 'Were made strong' preserves the passive nuance better than the intransitive 'became strong,' suggesting strength received rather than self-generated.
- source_word: ἀπὸ ἀσθενείας
  chosen: out of weakness
  alternatives:
  - from weakness
  - after weakness
  lexicon: BDAG
  rationale: ἀπό with genitive here marks source/origin. 'Out of weakness' idiomatically conveys emergence from a state of weakness and fits the rhetorical progression of the verse.
- source_word: ἐγενήθησαν ἰσχυροὶ
  chosen: became mighty
  alternatives:
  - became strong
  - proved strong
  lexicon: BDAG
  rationale: γίνομαι + adjective indicates coming into a state. Since 'strong' already appears in the previous clause, 'mighty' provides readable English variety while preserving the semantic field of ἰσχυρός.
- source_word: ἐν πολέμῳ
  chosen: in battle
  alternatives:
  - in war
  lexicon: BDAG
  rationale: πόλεμος can mean war broadly, but in this sequence of heroic acts 'in battle' is the more idiomatic and immediate English expression.
- source_word: παρεμβολὰς
  chosen: armies
  alternatives:
  - camps
  - encampments
  lexicon: BDAG
  rationale: παρεμβολή literally means camp/encampment, but in military contexts it commonly stands for the army or force encamped. 'Armies' communicates the intended military referent in natural English.
- source_word: ἔκλιναν
  chosen: put ... to flight
  alternatives:
  - turned back
  - routed
  lexicon: BDAG
  rationale: κλίνω literally means 'turn' or 'cause to turn aside.' In this military context, the idiomatic sense is causing enemy forces to retreat. 'Put ... to flight' is a standard and accurate military rendering.
- source_word: ἀλλοτρίων
  chosen: foreign
  alternatives:
  - strangers'
  - alien
  lexicon: BDAG
  rationale: Genitive plural adjective meaning 'belonging to another/foreign.' With military παρεμβολὰς, 'foreign armies' is the clearest contextual rendering.
