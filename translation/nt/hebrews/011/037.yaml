id: HEB.11.37
reference: Hebrews 11:37
source:
  edition: SBLGNT
  text: ἐλιθάσθησαν, ⸀ἐπρίσθησαν, ἐν φόνῳ ⸀μαχαίρης ἀπέθανον, περιῆλθον ἐν μηλωταῖς,
    ἐν αἰγείοις δέρμασιν, ὑστερούμενοι, θλιβόμενοι, κακουχούμενοι,
translation:
  text: They were stoned, they were sawn in two, they died by the slaughter of the
    sword; they went about in sheepskins, in goatskins, destitute, afflicted, mistreated—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or simply, 'they died by the sword.' The Greek more literally includes 'slaughter'
      (ἐν φόνῳ μαχαίρης), which intensifies the violence of the phrase.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλιθάσθησαν
  chosen: they were stoned
  alternatives:
  - they were killed by stoning
  lexicon: BDAG
  rationale: Aorist passive of λιθάζω straightforwardly denotes being stoned. 'They
    were stoned' is the natural English equivalent and preserves the passive form
    without adding 'killed,' since the verse continues a list of sufferings and deaths.
- source_word: ἐπρίσθησαν
  chosen: they were sawn in two
  alternatives:
  - they were sawn apart
  - they were sawed in two
  lexicon: BDAG
  rationale: Passive of πρίζω means to saw. 'Sawn in two' reflects the traditional
    and likely intended sense in this martyrdom catalog, while using standard modern
    English. 'Sawed' is possible but less idiomatic here.
- source_word: ἐν φόνῳ μαχαίρης
  chosen: by the slaughter of the sword
  alternatives:
  - by the sword
  - by murder with the sword
  lexicon: BDAG
  rationale: The phrase is more forceful than a simple instrumental 'by the sword'
    because φόνος carries the sense of slaughter/murder. Rendering it 'by the slaughter
    of the sword' preserves that weight, though somewhat idiomatically. A simpler
    alternative is preserved in a footnote.
- source_word: ἀπέθανον
  chosen: they died
  alternatives:
  - they were put to death
  lexicon: BDAG
  rationale: Aorist active of ἀποθνῄσκω is simply 'they died.' The surrounding phrase
    already conveys violent agency, so 'were put to death' would be interpretive expansion.
- source_word: περιῆλθον
  chosen: they went about
  alternatives:
  - they wandered about
  - they went around
  lexicon: BDAG
  rationale: περιέρχομαι here describes moving from place to place. 'Went about' is
    concise and natural; 'wandered about' is also plausible and preserved as an alternative
    nuance.
- source_word: ἐν μηλωταῖς
  chosen: in sheepskins
  alternatives:
  - wearing sheepskins
  lexicon: BDAG
  rationale: μηλωτή denotes a sheepskin garment. 'In sheepskins' closely follows the
    Greek prepositional phrase while remaining readable.
- source_word: ἐν αἰγείοις δέρμασιν
  chosen: in goatskins
  alternatives:
  - wearing goatskins
  - in goat skins
  lexicon: BDAG
  rationale: αἴγειος + δέρμα means goat skins/goatskins. 'In goatskins' matches the
    parallel structure with 'in sheepskins.'
- source_word: ὑστερούμενοι
  chosen: destitute
  alternatives:
  - being in need
  - lacking
  lexicon: BDAG
  rationale: Present participle of ὑστερέω here conveys being in want or lacking necessities.
    'Destitute' best captures the severity in context.
- source_word: θλιβόμενοι
  chosen: afflicted
  alternatives:
  - oppressed
  - hard-pressed
  lexicon: BDAG
  rationale: θλίβω in passive participial form denotes being afflicted/pressed. 'Afflicted'
    is broad, idiomatic, and fits the suffering catalog.
- source_word: κακουχούμενοι
  chosen: mistreated
  alternatives:
  - ill-treated
  - abused
  lexicon: BDAG
  rationale: κακουχέομαι means to be mistreated or suffer ill-treatment. 'Mistreated'
    is clear modern English without overstating beyond the lexical sense.
