theological_decisions:
- issue: Degree of explicitness in the violent death phrase ἐν φόνῳ μαχαίρης
  chosen_reading: Retain the stronger sense of φόνος with 'by the slaughter of the
    sword' in the main text.
  alternative_readings:
  - by the sword
  rationale: This is not a doctrinally contested term, but it is a significant interpretive
    choice. The Greek includes φόνος, which adds a nuance of violent killing/slaughter
    beyond a bare instrumental phrase. Preserving that force avoids flattening the
    text, while a more idiomatic alternative is noted in a footnote.
  doctrine_reference: Translation philosophy §1, §5
