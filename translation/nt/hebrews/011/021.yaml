theological_decisions:
- issue: Relation of Jacob's worship to the staff in the final clause
  chosen_reading: Jacob worshiped God while leaning on the top of his staff.
  alternative_readings:
  - Jacob bowed in worship over the head/top of his bed (reflecting the Hebrew of
    Gen 47:31)
  - Jacob worshiped toward the top of his staff
  rationale: The Greek text of Hebrews reads 'staff,' likely echoing the Septuagint
    of Genesis 47:31, whereas the Hebrew text of Genesis can be read 'bed.' To avoid
    suggesting worship directed to the staff, the English construes the phrase adverbially
    ('while leaning on'). The alternative tied to the Genesis Hebrew is preserved
    in a footnote because it is a notable intertextual/text-form issue.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
