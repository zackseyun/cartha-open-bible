id: HEB.11.21
reference: Hebrews 11:21
source:
  edition: SBLGNT
  text: πίστει Ἰακὼβ ἀποθνῄσκων ἕκαστον τῶν υἱῶν Ἰωσὴφ εὐλόγησεν, καὶ προσεκύνησεν
    ἐπὶ τὸ ἄκρον τῆς ῥάβδου αὐτοῦ.
translation:
  text: By faith Jacob, as he was dying, blessed each of the sons of Joseph, and worshiped
    while leaning on the top of his staff.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew text of Genesis 47:31, 'and bowed in worship over
      the head of his bed.' The Greek text here reads 'staff.'
    reason: textual_variant
  - marker: b
    text: Or 'worshiped toward the top of his staff.' The phrase likely describes
      Jacob's posture, not the object of his worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - by faithfulness
  - by trust
  lexicon: BDAG
  rationale: Follows the default rendering of πίστις as 'faith' per doctrine guidance.
    In Hebrews 11 the dative functions instrumentally or modally, introducing the
    exemplars' actions as done by faith.
- source_word: ἀποθνῄσκων
  chosen: as he was dying
  alternatives:
  - dying
  - when he was dying
  lexicon: BDAG
  rationale: The present participle is contemporaneous with the main verbs and is
    best rendered with a temporal nuance in natural English. 'As he was dying' preserves
    the ongoing sense without sounding wooden.
- source_word: ἕκαστον τῶν υἱῶν Ἰωσὴφ
  chosen: each of the sons of Joseph
  alternatives:
  - each son of Joseph
  - every one of Joseph's sons
  lexicon: BDAG
  rationale: ἕκαστον with the partitive genitive stresses the individual blessing
    of both sons. 'Each of the sons of Joseph' preserves that distributive force clearly.
- source_word: εὐλόγησεν
  chosen: blessed
  alternatives:
  - pronounced a blessing on
  lexicon: BDAG
  rationale: Standard and natural rendering of εὐλογέω here, matching the Genesis
    background and preserving the covenantal significance of Jacob's act.
- source_word: προσεκύνησεν
  chosen: worshiped
  alternatives:
  - bowed in worship
  - bowed down
  lexicon: BDAG
  rationale: προσκυνέω in this context refers to an act of reverence toward God, not
    merely physical prostration. 'Worshiped' best captures the religious sense in
    Hebrews' interpretation of the Genesis event.
- source_word: ἐπὶ τὸ ἄκρον τῆς ῥάβδου αὐτοῦ
  chosen: while leaning on the top of his staff
  alternatives:
  - at the top of his staff
  - on the top of his staff
  - toward the top of his staff
  lexicon: BDAG
  rationale: The phrase is difficult if rendered hyper-literally in English. 'While
    leaning on the top of his staff' expresses the likely physical sense naturally
    and coheres with the LXX-style wording reflected here. It avoids implying that
    the staff itself was the object of worship.
