id: HEB.11.14
reference: Hebrews 11:14
source:
  edition: SBLGNT
  text: οἱ γὰρ τοιαῦτα λέγοντες ἐμφανίζουσιν ὅτι πατρίδα ἐπιζητοῦσιν.
translation:
  text: For those who say such things make it clear that they are seeking a homeland[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their own country' or 'native land.' The following verse clarifies that the hoped-for homeland is ultimately heavenly.
    reason: lexical_alternative
lexical_decisions:
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding verse. 'For' is natural and sufficiently formal here.
- source_word: τοιαῦτα
  chosen: such things
  alternatives:
  - things like these
  lexicon: BDAG
  rationale: Neuter plural demonstrative referring back to the kind of statements just quoted in context. 'Such things' is idiomatic and concise.
- source_word: λέγοντες
  chosen: who say
  alternatives:
  - saying
  - who speak
  lexicon: BDAG
  rationale: Present participle modifying οἱ; rendered as a relative clause in English for readability while preserving ongoing/general force.
- source_word: ἐμφανίζουσιν
  chosen: make it clear
  alternatives:
  - show
  - make evident
  - reveal
  lexicon: BDAG
  rationale: Conveys the sense of making something evident or plain. 'Make it clear' is natural modern English and captures the inferential force from their speech.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content made evident by their words; straightforward content clause.
- source_word: πατρίδα
  chosen: a homeland
  alternatives:
  - a fatherland
  - their own country
  - a native land
  lexicon: BDAG
  rationale: πατρίς denotes one's native country or homeland. 'Homeland' is idiomatic modern English and preserves the sense without the archaic or politically loaded feel of 'fatherland.' The anarthrous noun is well represented by 'a homeland' rather than the more definite 'their homeland,' though the latter is implied contextually.
- source_word: ἐπιζητοῦσιν
  chosen: are seeking
  alternatives:
  - seek
  - long for
  lexicon: BDAG
  rationale: Present tense indicates ongoing pursuit. 'Are seeking' preserves the progressive sense. While contextually it includes longing, the core verbal idea is active seeking rather than merely desiring.
