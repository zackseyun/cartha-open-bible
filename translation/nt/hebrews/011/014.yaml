theological_decisions:
- issue: Meaning of the patriarchs' desired πατρίς in context
  chosen_reading: Rendered generally as 'a homeland' without specifying earthly or heavenly in the main text.
  alternative_readings:
  - an earthly homeland
  - a heavenly homeland
  rationale: The immediate verse states only that they were seeking a homeland; the following verse clarifies that the ultimate referent is a better, heavenly one. The translation preserves the wording of this verse without importing the fuller interpretation prematurely.
  doctrine_reference: Preserve theological tension rather than resolve it.
