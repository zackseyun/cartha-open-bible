theological_decisions:
- issue: Rendering of πίστις in a doctrinally significant context
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: The doctrine file specifies 'faith' as the default rendering for πίστις,
    with alternatives preserved where relevant. In this verse the immediate explanatory
    infinitive πιστεῦσαι supports the sense of believing/trusting God, but 'faith'
    remains the best main-text rendering and does not force a denominational reading.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Force of γίνεται in relation to God's character
  chosen_reading: he becomes a rewarder
  alternative_readings:
  - he is a rewarder
  - he proves to be a rewarder
  rationale: The Greek uses γίνεται rather than a simple copula. Rendering it transparently
    as 'becomes' preserves the verbal form and avoids flattening the text, while not
    implying a change in God's nature; in context it expresses what God is found to
    be toward seekers.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
