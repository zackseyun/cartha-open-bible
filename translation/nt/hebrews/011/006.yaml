id: HEB.11.6
reference: Hebrews 11:6
source:
  edition: SBLGNT
  text: χωρὶς δὲ πίστεως ἀδύνατον εὐαρεστῆσαι, πιστεῦσαι γὰρ δεῖ τὸν προσερχόμενον
    τῷ θεῷ ὅτι ἔστιν καὶ τοῖς ἐκζητοῦσιν αὐτὸν μισθαποδότης γίνεται.
translation:
  text: And without faith it is impossible to please him, for the one who comes to
    God must believe that he exists and that he becomes a rewarder of those who diligently
    seek him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'trust'; πίστις can also carry the sense 'faithfulness' in some contexts,
      but here the immediate explanation centers on believing God.
    reason: lexical_alternative
  - marker: b
    text: Or 'that he is.' The Greek is concise and can be rendered more literally
      this way.
    reason: lexical_alternative
  - marker: c
    text: Or 'he is a rewarder' or 'he proves to be a rewarder.' The Greek says 'becomes,'
      which in context expresses what God is found to be for those who seek him.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς δὲ
  chosen: And without
  alternatives:
  - But without
  - Now without
  lexicon: BDAG
  rationale: χωρίς marks separation ('without'), and δέ is a mild connective. 'And'
    fits the flow from the preceding examples without overstating contrast.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις is rendered 'faith' in the main text. Here
    the context is the human response of believing God, so 'faith' is the most natural
    and established sense; alternatives are worth preserving lexically but are not
    the main reading.
- source_word: ἀδύνατον εὐαρεστῆσαι
  chosen: it is impossible to please him
  alternatives:
  - it is impossible to please God
  - to be pleasing is impossible
  lexicon: BDAG
  rationale: The impersonal adjective with infinitive is naturally rendered 'it is
    impossible to please.' The object 'him' is supplied from the immediate context
    ('God') and keeps the English smooth while preserving the referent.
- source_word: πιστεῦσαι γὰρ δεῖ
  chosen: for ... must believe
  alternatives:
  - for it is necessary to believe
  - for one must believe
  lexicon: BDAG
  rationale: γάρ gives the reason, and δεῖ expresses necessity. 'Must believe' is
    concise and idiomatic while preserving the force of necessity.
- source_word: τὸν προσερχόμενον τῷ θεῷ
  chosen: the one who comes to God
  alternatives:
  - whoever approaches God
  - the one drawing near to God
  lexicon: BDAG
  rationale: The present middle participle denotes one approaching/drawing near. 'Comes
    to God' is natural English and preserves the relational movement without importing
    cultic overtones too strongly, though 'approaches' is possible.
- source_word: ὅτι ἔστιν
  chosen: that he exists
  alternatives:
  - that he is
  - that he is there
  lexicon: BDAG
  rationale: The clause most directly affirms God's reality/existence. 'That he exists'
    makes explicit in English what the Greek idiom conveys and avoids ambiguity that
    'that he is' might create.
- source_word: καὶ
  chosen: and that
  alternatives:
  - and
  - also that
  lexicon: BDAG
  rationale: This coordinates the second content clause governed by 'must believe,'
    so 'and that' is the clearest English rendering.
- source_word: τοῖς ἐκζητοῦσιν αὐτὸν
  chosen: those who diligently seek him
  alternatives:
  - those who seek him
  - those who earnestly seek him
  lexicon: BDAG
  rationale: ἐκζητέω intensifies ζητέω, so an adverb such as 'diligently' or 'earnestly'
    helps reflect the strengthened sense. 'Diligently seek' is clear modern English.
- source_word: μισθαποδότης γίνεται
  chosen: he becomes a rewarder
  alternatives:
  - he is a rewarder
  - he proves to be a rewarder
  lexicon: BDAG
  rationale: μισθαποδότης means 'rewarder/one who pays wages or rewards.' γίνεται
    is literally 'becomes,' but in predicate constructions can function as 'proves
    to be' or 'is shown to be.' I retained 'becomes' to reflect the Greek verb more
    transparently, though idiomatic English often uses 'is.'
