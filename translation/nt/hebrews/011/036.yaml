id: HEB.11.36
reference: Hebrews 11:36
source:
  edition: SBLGNT
  text: ἕτεροι δὲ ἐμπαιγμῶν καὶ μαστίγων πεῖραν ἔλαβον, ἔτι δὲ δεσμῶν καὶ φυλακῆς·
translation:
  text: And others experienced mocking and flogging, and even chains and imprisonment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'underwent trials of mocking and flogging, and even of chains and prison.'
      The Greek more literally says 'received a trial of...'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕτεροι
  chosen: others
  alternatives:
  - some others
  lexicon: BDAG
  rationale: Indefinite plural adjective referring to another group within the catalog
    of faithful sufferers. 'Others' is natural English and preserves the contrast
    with prior examples.
- source_word: ἐμπαιγμῶν
  chosen: mocking
  alternatives:
  - mockings
  - ridicule
  - derision
  lexicon: BDAG
  rationale: The genitive depends on πεῖραν ἔλαβον ('underwent/experienced a trial
    of'). 'Mocking' is idiomatic modern English and captures public scorn without
    sounding archaic.
- source_word: μαστίγων
  chosen: flogging
  alternatives:
  - scourgings
  - whippings
  lexicon: BDAG
  rationale: Refers to beating with lashes. 'Flogging' is clear, contemporary, and
    weightier than the broader 'beatings'; 'scourgings' is more traditional but less
    natural for modern readers.
- source_word: πεῖραν ἔλαβον
  chosen: experienced
  alternatives:
  - underwent
  - received a trial of
  - were tested by
  lexicon: BDAG
  rationale: The idiom literally means 'received a trial/test of' these sufferings.
    In English, 'experienced' best conveys the sense smoothly while preserving the
    idea that these were ordeals they underwent.
- source_word: ἔτι δὲ
  chosen: and even
  alternatives:
  - and further
  - and moreover
  - yes, even
  lexicon: BDAG
  rationale: Marks escalation beyond mocking and flogging to harsher treatment. 'And
    even' communicates the intensifying force naturally.
- source_word: δεσμῶν
  chosen: chains
  alternatives:
  - bonds
  - fetters
  lexicon: BDAG
  rationale: Concrete term for restraints. 'Chains' is the clearest modern equivalent;
    'bonds' is possible but less vivid and more idiomatic than literal in contemporary
    English.
- source_word: φυλακῆς
  chosen: imprisonment
  alternatives:
  - prison
  - confinement
  lexicon: BDAG
  rationale: In coordination with δεσμῶν under the same idiom, the abstract 'imprisonment'
    fits English style better than the bare noun 'prison' after 'experienced.' It
    conveys the state of being confined rather than merely the place.
