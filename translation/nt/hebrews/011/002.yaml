id: HEB.11.2
reference: Hebrews 11:2
source:
  edition: SBLGNT
  text: ἐν ταύτῃ γὰρ ἐμαρτυρήθησαν οἱ πρεσβύτεροι.
translation:
  text: For by this the elders received approval[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were commended' or 'were testified to.' The Greek verb means to receive favorable testimony.
    reason: lexical_alternative
  - marker: b
    text: That is, by faith, as described in the previous verse.
    reason: cross_reference
  - marker: c
    text: Or 'the ancients' or 'the people of old.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ταύτῃ
  chosen: by this
  alternatives:
  - in this
  - because of this
  - by it
  lexicon: BDAG
  rationale: The preposition ἐν with the demonstrative feminine singular most naturally refers back to πίστις in 11:1 and expresses means or sphere. In English, 'by this' best captures the instrumental sense in context ('by faith'), while remaining readable. 'In this' is more literal but less clear in English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces an explanation grounding the preceding statement about faith. 'For' preserves the explanatory connection in a concise, natural way.
- source_word: ἐμαρτυρήθησαν
  chosen: received approval
  alternatives:
  - were commended
  - were testified to
  - obtained a good testimony
  lexicon: BDAG
  rationale: The aorist passive of μαρτυρέω here means to receive favorable testimony or commendation from God, as the chapter repeatedly indicates. 'Received approval' communicates the passive sense and divine evaluation clearly in modern English. 'Were commended' is also strong and more traditional; 'were testified to' is too wooden in English.
- source_word: οἱ πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the ancients
  - the people of old
  - the forefathers
  lexicon: BDAG
  rationale: πρεσβύτεροι literally means 'elders,' but in this context refers broadly to the faithful people of former generations highlighted in Hebrews 11. 'The elders' preserves the lexical form and allows the reader to connect it with the historical exemplars. Alternatives such as 'the people of old' are interpretive expansions better suited to a footnote than the main text.
