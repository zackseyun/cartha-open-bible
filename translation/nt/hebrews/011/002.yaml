theological_decisions:
- issue: Referent of ταύτῃ
  chosen_reading: The demonstrative refers to faith, linking verse 2 directly to the definition in 11:1.
  alternative_readings:
  - The demonstrative refers more broadly to the reality just described in 11:1 rather than to faith alone.
  rationale: The feminine singular naturally matches πίστις and the flow of the argument in Hebrews 11 centers on faith as the means by which the ancients were approved. Rendering 'by this' preserves the Greek wording while allowing the antecedent to be understood from context.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
