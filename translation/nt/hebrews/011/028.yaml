id: HEB.11.28
reference: Hebrews 11:28
source:
  edition: SBLGNT
  text: πίστει πεποίηκεν τὸ πάσχα καὶ τὴν πρόσχυσιν τοῦ αἵματος, ἵνα μὴ ὁ ὀλοθρεύων
    τὰ πρωτότοκα θίγῃ αὐτῶν.
translation:
  text: By faith he has kept the Passover and the sprinkling of the blood, so that
    the destroyer of the firstborn might not touch them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the application of the blood.' The Greek term refers to the ritual placing
      of blood; 'sprinkling' is a traditional cultic rendering, while 'application'
      may reflect the Passover setting more specifically.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - through faith
  - by trust
  lexicon: BDAG
  rationale: Dative of means/instrument; the default rendering for πίστις is 'faith'
    per doctrine. 'By faith' also matches the repeated formula throughout Hebrews
    11.
- source_word: πεποίηκεν
  chosen: he has kept
  alternatives:
  - he has observed
  - he has instituted
  - he has celebrated
  lexicon: BDAG
  rationale: Perfect active of ποιέω here refers to Moses' carrying out/observing
    the Passover ordinance. 'Kept' is idiomatic English for observing a feast and
    preserves the completed action with continuing significance better than a flat
    'did.'
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  - Passover
  lexicon: BDAG
  rationale: πάσχα can denote the Passover event/feast or meal. 'The Passover' is
    broad enough to include the observance as a whole without over-specifying 'meal.'
- source_word: τὴν πρόσχυσιν τοῦ αἵματος
  chosen: the sprinkling of the blood
  alternatives:
  - the application of the blood
  - the pouring out of the blood
  lexicon: BDAG
  rationale: Although πρόσχυσις can more literally suggest pouring/applying, in this
    Passover context the blood is put onto the doorposts/lintel, and 'sprinkling'
    is the conventional cultic rendering that communicates ritual application clearly.
    Because 'application' is also plausible and perhaps more precise to Exodus 12,
    that alternative is preserved in a footnote.
- source_word: ἵνα μὴ
  chosen: so that ... might not
  alternatives:
  - in order that ... not
  - so that ... would not
  lexicon: BDAG
  rationale: Standard purpose clause with μή and subjunctive. 'So that ... might not'
    is natural English and preserves the purposive force.
- source_word: ὁ ὀλοθρεύων
  chosen: the destroyer
  alternatives:
  - the one destroying
  - the destroying angel
  lexicon: BDAG
  rationale: Substantival participle meaning 'the destroyer.' 'Destroying angel' imports
    an interpretive identification not explicit in the Greek, so it is avoided in
    the main text.
- source_word: τὰ πρωτότοκα
  chosen: the firstborn
  alternatives:
  - the firstborn ones
  - the firstborn children
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally. 'The firstborn' is the standard
    and sufficiently broad rendering.
- source_word: θίγῃ
  chosen: might not touch
  alternatives:
  - might not strike
  - might not harm
  lexicon: BDAG
  rationale: The verb literally means 'touch,' though in context the touch would be
    destructive. Retaining 'touch' preserves the lexical form and allusive force to
    the Exodus narrative without over-interpreting.
- source_word: αὐτῶν
  chosen: them
  alternatives:
  - their people
  - the Israelites
  lexicon: BDAG
  rationale: The pronoun refers to the people associated with Moses/Israel in context.
    'Them' keeps the Greek's concise pronominal reference and avoids adding an explicit
    noun absent from the text.
