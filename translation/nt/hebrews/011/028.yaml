theological_decisions:
- issue: Identity of the implied subject of 'he has kept'
  chosen_reading: Moses is the implied subject, continuing the pattern of Hebrews
    11.
  rationale: The broader context (vv. 23–29) concerns Moses. This is contextual identification
    rather than a doctrinally contested issue, but it affects English clarity; the
    pronoun 'he' is retained rather than replacing it with 'Moses' to stay close to
    the Greek.
- issue: Rendering of πίστις
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: DOCTRINE.md specifies 'faith' as the default rendering for πίστις, with
    alternatives preserved where relevant. In Hebrews 11 the chapter-wide theme strongly
    supports 'faith' here rather than 'faithfulness.'
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
