id: HEB.11.26
reference: Hebrews 11:26
source:
  edition: SBLGNT
  text: μείζονα πλοῦτον ἡγησάμενος τῶν Αἰγύπτου θησαυρῶν τὸν ὀνειδισμὸν τοῦ Χριστοῦ,
    ἀπέβλεπεν γὰρ εἰς τὴν μισθαποδοσίαν.
translation:
  text: He considered the reproach of Christ greater wealth than the treasures of
    Egypt, for he was looking to the reward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the reproach of Christ.' The Greek title Χριστοῦ can be rendered 'Christ,'
      but 'Messiah' is used here because the term functions as a title.
    reason: alternative_reading
  - marker: b
    text: The phrase 'the reproach of the Messiah' may mean reproach borne for the
      Messiah, reproach shared with God's anointed one, or reproach that Hebrews sees
      as fulfilled in the Messiah; the Greek wording is preserved without narrowing
      it.
    reason: lexical_alternative
lexical_decisions:
- source_word: μείζονα πλοῦτον
  chosen: greater wealth
  alternatives:
  - greater riches
  - more valuable wealth
  lexicon: BDAG
  rationale: Comparative adjective with πλοῦτος expresses relative value. 'Greater
    wealth' is natural English and preserves the comparison with Egypt's treasures.
- source_word: ἡγησάμενος
  chosen: He considered
  alternatives:
  - having regarded
  - counting
  lexicon: BDAG
  rationale: Aorist middle participle of ἡγέομαι commonly means 'consider/regard.'
    Rendering it with a finite verb in English gives clear, natural sense while preserving
    the evaluative force.
- source_word: τῶν Αἰγύπτου θησαυρῶν
  chosen: the treasures of Egypt
  alternatives:
  - Egypt's treasures
  lexicon: BDAG
  rationale: Genitive construction is straightforwardly possessive/source-related.
    'The treasures of Egypt' is idiomatic and keeps the contrast with Moses' renunciation.
- source_word: τὸν ὀνειδισμὸν
  chosen: the reproach
  alternatives:
  - the disgrace
  - the insult
  lexicon: BDAG
  rationale: ὀνειδισμός denotes reproach, insult, or disgrace borne from identification
    with someone. 'Reproach' best preserves both public shame and covenantal resonance
    in biblical usage.
- source_word: τοῦ Χριστοῦ
  chosen: of the Messiah
  alternatives:
  - of Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is translated as 'Messiah' where it functions as
    a title rather than a name-like form. Here the phrase is titular and theological,
    not a proper-name usage.
- source_word: ἀπέβλεπεν
  chosen: he was looking to
  alternatives:
  - he was looking ahead to
  - he kept his eyes on
  lexicon: BDAG
  rationale: Imperfect verb conveys ongoing orientation or sustained focus. 'Was looking
    to' preserves the progressive sense without over-paraphrasing.
- source_word: μισθαποδοσίαν
  chosen: the reward
  alternatives:
  - the recompense
  - the repayment
  lexicon: BDAG
  rationale: The noun denotes recompense/reward. 'Reward' is the clearest modern English
    choice and fits the faith-and-endurance context of Hebrews 11.
