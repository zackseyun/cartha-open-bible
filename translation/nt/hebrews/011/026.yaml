theological_decisions:
- issue: Meaning of 'the reproach of the Messiah' in relation to Moses
  chosen_reading: Retain the genitival phrase straightforwardly as 'the reproach of
    the Messiah' without interpretive expansion.
  alternative_readings:
  - the reproach for the sake of the Messiah
  - the reproach associated with God's anointed people
  - the reproach that anticipates the Messiah
  rationale: The Greek text explicitly says 'the reproach of the Messiah.' Because
    the exact theological relationship is debated, the translation preserves the wording
    rather than resolving it into a narrower interpretation. This maintains the text's
    theological tension and allows readers to see the christological claim made by
    Hebrews.
  doctrine_reference: Preserve theological tension rather than resolve it; Χριστός
    default rendering 'Messiah' where title.
