id: HEB.11.12
reference: Hebrews 11:12
source:
  edition: SBLGNT
  text: διὸ καὶ ἀφ’ ἑνὸς ἐγεννήθησαν, καὶ ταῦτα νενεκρωμένου, καθὼς τὰ ἄστρα τοῦ οὐρανοῦ
    τῷ πλήθει καὶ ὡς ἡ ἄμμος ἡ παρὰ τὸ χεῖλος τῆς θαλάσσης ἡ ἀναρίθμητος.
translation:
  text: Therefore from one man, and this one as good as dead, descendants were born
    as numerous as the stars of heaven and as the innumerable sand by the seashore.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'from one, and these things from one having been deadened.'
      The sense is that Abraham was beyond normal childbearing age.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - So then
  lexicon: BDAG
  rationale: Marks an inferential conclusion from the preceding statement about Sarah
    and Abraham; 'Therefore' is natural and preserves the logical connection.
- source_word: ἀφ’ ἑνὸς
  chosen: from one man
  alternatives:
  - from one
  - from one person
  lexicon: BDAG
  rationale: The masculine form and the context point specifically to Abraham, not
    an abstract 'one' or a gender-neutral 'person.' This follows the gender-accurate
    principle and makes the referent clear in English.
- source_word: ἐγεννήθησαν
  chosen: descendants were born
  alternatives:
  - were begotten
  - were born
  - were fathered
  lexicon: BDAG
  rationale: The passive plural refers to the coming into existence of Abraham's offspring.
    'Descendants were born' communicates the result idiomatically in English without
    the archaic feel of 'were begotten.'
- source_word: καὶ ταῦτα νενεκρωμένου
  chosen: and this one as good as dead
  alternatives:
  - and him already deadened
  - and this one having been made dead
  - and he being as good as dead
  lexicon: BDAG
  rationale: The phrase is idiomatic and refers to Abraham's reproductive incapacity
    due to age, not literal death. 'As good as dead' is the clearest natural English
    equivalent and matches the contextual sense also seen in the preceding verse.
- source_word: καθὼς τὰ ἄστρα τοῦ οὐρανοῦ τῷ πλήθει
  chosen: as numerous as the stars of heaven
  alternatives:
  - like the stars of the sky in number
  - as the stars of heaven in multitude
  lexicon: BDAG
  rationale: This renders the comparison naturally while preserving the explicit idea
    of number/multitude.
- source_word: ὡς ἡ ἄμμος ἡ παρὰ τὸ χεῖλος τῆς θαλάσσης
  chosen: as the sand by the seashore
  alternatives:
  - as the sand beside the shore of the sea
  - as the sand along the edge of the sea
  lexicon: BDAG
  rationale: χείλος literally means 'lip' or 'edge,' but in this idiom 'seashore'
    is the most natural English expression.
- source_word: ἀναρίθμητος
  chosen: innumerable
  alternatives:
  - countless
  - without number
  lexicon: BDAG
  rationale: Captures the sense of being beyond counting and preserves the elevated
    style of the promise language.
