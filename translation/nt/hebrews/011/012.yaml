theological_decisions:
- issue: Referent of 'from one'
  chosen_reading: Abraham is explicitly represented as 'one man' in English.
  alternative_readings:
  - from one
  - from one person
  rationale: The Greek masculine and immediate context identify Abraham. Making the
    referent explicit avoids ambiguity while not adding doctrinal content beyond the
    text.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Force of νενεκρωμένου
  chosen_reading: A metaphor for Abraham's aged, reproductively spent condition rather
    than literal death.
  alternative_readings:
  - literally dead
  - physically deadened
  rationale: The context concerns the miraculous birth of descendants through Abraham
    and Sarah despite old age. The wording should preserve the miracle without implying
    Abraham was literally dead.
  doctrine_reference: Translation philosophy §1 and §6
