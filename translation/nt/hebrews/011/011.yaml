theological_decisions:
- issue: Subject and sense of Sarah's action in a syntactically difficult clause
  chosen_reading: 'Sarah is the subject: she received power to conceive offspring.'
  alternative_readings:
  - 'Abraham is implicitly involved or primary: Sarah received power for the laying down of seed through Abraham'
  - Sarah received power for the founding of a line/descendants
  rationale: The dative phrase αὐτῇ Σάρρᾳ most naturally identifies Sarah as the subject of ἔλαβεν in this text form. Although the idiom καταβολὴ σπέρματος can sound male-oriented in literal English, the verse's point in context is Sarah's faith and miraculous conception despite age. The translation preserves Sarah as the acting subject while noting the more literal phrasing in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of πιστός for God
  chosen_reading: faithful
  alternative_readings:
  - trustworthy
  - reliable
  rationale: The verse grounds Sarah's faith in God's dependable character. 'Faithful' best preserves the theological weight without adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §6
