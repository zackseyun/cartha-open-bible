id: HEB.11.11
reference: Hebrews 11:11
source:
  edition: SBLGNT
  text: πίστει καὶ ⸂αὐτῇ Σάρρᾳ⸃ δύναμιν εἰς καταβολὴν σπέρματος ἔλαβεν καὶ παρὰ καιρὸν ⸀ἡλικίας, ἐπεὶ πιστὸν ἡγήσατο τὸν ἐπαγγειλάμενον·
translation:
  text: By faith even Sarah herself received power to conceive offspring[a], even beyond the proper time of life, because she considered the one who had promised to be faithful.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “received power for the laying down of seed.” The Greek expression is unusual and idiomatic; in context it refers to the ability to produce offspring.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - By trust
  - By faithfulness
  lexicon: BDAG
  rationale: Dative of means/instrument in Hebrews 11's repeated formula; per doctrine defaults to 'faith' in the main text, with alternatives noted only as lexical possibilities.
- source_word: καὶ αὐτῇ Σάρρᾳ
  chosen: even Sarah herself
  alternatives:
  - also Sarah herself
  - Sarah too
  lexicon: BDAG
  rationale: καὶ with the intensive pronoun αὐτῇ highlights Sarah as an additional and somewhat surprising example in the list; 'even Sarah herself' preserves the emphatic force.
- source_word: δύναμιν ... ἔλαβεν
  chosen: received power
  alternatives:
  - received ability
  - was enabled
  lexicon: BDAG
  rationale: Aorist active with δύναμις naturally yields 'received power/ability.' 'Received power' keeps the lexical link to δύναμις while remaining idiomatic.
- source_word: εἰς καταβολὴν σπέρματος
  chosen: to conceive offspring
  alternatives:
  - for the laying down of seed
  - for the founding of seed
  - for procreation
  lexicon: BDAG
  rationale: The phrase is idiomatic and difficult if rendered woodenly. In context it refers to generating offspring. Because Sarah is the grammatical subject, 'to conceive offspring' gives the natural English sense without importing male imagery into the main text. A more literal alternative is preserved in a footnote due to the phrase's unusual wording.
- source_word: καὶ παρὰ καιρὸν ἡλικίας
  chosen: even beyond the proper time of life
  alternatives:
  - even past the age
  - beyond the time of age
  - though she was past childbearing age
  lexicon: BDAG
  rationale: παρὰ with accusative here conveys going beyond the normal limit; καιρός is the fitting/appointed time, and ἡλικία refers to age/stage of life. 'Beyond the proper time of life' is faithful and readable, avoiding over-specification not explicit in the Greek.
- source_word: ἐπεὶ
  chosen: because
  alternatives:
  - since
  - for
  lexicon: BDAG
  rationale: Introduces the reason for Sarah's receiving power; 'because' is the clearest modern English connector.
- source_word: πιστὸν
  chosen: faithful
  alternatives:
  - trustworthy
  - reliable
  lexicon: BDAG
  rationale: Predicate adjective describing the promiser's character. 'Faithful' preserves the covenantal and theological resonance and fits Hebrews' style.
- source_word: ἡγήσατο
  chosen: considered
  alternatives:
  - regarded
  - deemed
  lexicon: BDAG
  rationale: Middle voice of ἡγέομαι here denotes evaluative judgment. 'Considered' is natural modern English and accurately reflects the cognitive sense.
- source_word: τὸν ἐπαγγειλάμενον
  chosen: the one who had promised
  alternatives:
  - him who promised
  - the promiser
  lexicon: BDAG
  rationale: Substantival participle referring to God. 'The one who had promised' is clear, reverent, and avoids unnecessary gender ambiguity while matching the Greek construction.
