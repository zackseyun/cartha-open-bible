id: HEB.11.31
reference: Hebrews 11:31
source:
  edition: SBLGNT
  text: πίστει Ῥαὰβ ἡ πόρνη οὐ συναπώλετο τοῖς ἀπειθήσασιν, δεξαμένη τοὺς κατασκόπους
    μετ’ εἰρήνης.
translation:
  text: By faith Rahab the prostitute did not perish with those who were disobedient,
    because she had welcomed the spies in peace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did not perish along with those who disobeyed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'having received the spies peacefully.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - By means of faith
  - Through faith
  lexicon: BDAG
  rationale: Dative of means/instrument introducing the exemplary basis of Rahab's
    action in Hebrews 11. Per doctrine defaults, πίστις is rendered 'faith' in the
    main text; alternatives like 'trust' or 'faithfulness' are not as natural or contextually
    primary here.
- source_word: Ῥαὰβ
  chosen: Rahab
  rationale: Standard transliteration of the personal name, following the policy to
    transliterate names rather than translate them.
- source_word: ἡ πόρνη
  chosen: the prostitute
  alternatives:
  - the harlot
  lexicon: BDAG
  rationale: πόρνη straightforwardly denotes a prostitute. 'Harlot' is traditional
    but archaic; 'prostitute' is clearer modern English and preserves the social/moral
    force of the term without euphemism.
- source_word: οὐ συναπώλετο
  chosen: did not perish
  alternatives:
  - was not destroyed with
  - did not perish along with
  lexicon: BDAG
  rationale: The compound verb means to perish together with or be destroyed along
    with others. English can express the co-destruction idea naturally by pairing
    'did not perish' with 'with those who…' later in the clause.
- source_word: τοῖς ἀπειθήσασιν
  chosen: with those who were disobedient
  alternatives:
  - with those who disobeyed
  - with the unbelieving
  lexicon: BDAG
  rationale: ἀπειθέω commonly means 'disobey' or 'be disobedient.' In this context
    it refers to Jericho's inhabitants who refused/responded contrary to God's warning.
    'Disobedient' preserves the moral-volitional sense better than 'unbelieving,'
    though unbelief is related. The dative is governed by the compound sense of συναπώλετο
    ('perish with').
- source_word: δεξαμένη
  chosen: because she had welcomed
  alternatives:
  - having received
  - after receiving
  lexicon: BDAG
  rationale: Aorist middle participle from δέχομαι, here giving the circumstance/reason
    associated with her not perishing. 'Welcomed' is more idiomatic than 'received'
    for hosting persons, and 'because she had welcomed' makes the participial relation
    clear in natural English without over-paraphrasing.
- source_word: τοὺς κατασκόπους
  chosen: the spies
  alternatives:
  - the scouts
  lexicon: BDAG
  rationale: κατάσκοπος means spy or scout. 'Spies' is the standard and clearest rendering
    in the Joshua context.
- source_word: μετ’ εἰρήνης
  chosen: in peace
  alternatives:
  - peacefully
  - with peace
  lexicon: BDAG
  rationale: The prepositional phrase indicates the peaceful manner in which Rahab
    received the spies. 'In peace' is concise and preserves the biblical idiom; 'peacefully'
    is possible but less textually transparent.
