id: HEB.11.16
reference: Hebrews 11:16
source:
  edition: SBLGNT
  text: νῦν δὲ κρείττονος ὀρέγονται, τοῦτ’ ἔστιν ἐπουρανίου. διὸ οὐκ ἐπαισχύνεται
    αὐτοὺς ὁ θεὸς θεὸς ἐπικαλεῖσθαι αὐτῶν, ἡτοίμασεν γὰρ αὐτοῖς πόλιν.
translation:
  text: But as it is, they long for a better country—that is, a heavenly one. Therefore
    God is not ashamed to be called their God, for he has prepared a city for them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a better homeland.' The Greek adjective is feminine and likely refers
      back to the implied idea of 'country/homeland' from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν δὲ
  chosen: But as it is
  alternatives:
  - But now
  - But in fact
  lexicon: BDAG
  rationale: Idiomatic discourse marker introducing the present reality in contrast
    with the prior hypothetical in v. 15. 'As it is' conveys the logical contrast
    more naturally in English than a strictly temporal 'now.'
- source_word: κρείττονος
  chosen: better
  alternatives:
  - superior
  lexicon: BDAG
  rationale: Comparative adjective meaning 'better/superior.' 'Better' is the natural
    English equivalent and fits Hebrews' recurring contrastive vocabulary.
- source_word: ὀρέγονται
  chosen: they long for
  alternatives:
  - they desire
  - they reach for
  - they aspire to
  lexicon: BDAG
  rationale: Middle verb expressing earnest desire or striving after something. 'Long
    for' captures the affective and aspirational force better than the flatter 'desire.'
- source_word: κρείττονος ... ἐπουρανίου
  chosen: a better country—that is, a heavenly one
  alternatives:
  - a better homeland—that is, a heavenly one
  - something better, that is, a heavenly country
  lexicon: BDAG
  rationale: The feminine genitives are understood from the preceding πατρίδα in v.
    14. Supplying 'country' makes the ellipsis clear in English. 'Heavenly one' preserves
    the adjectival force of ἐπουρανίου while avoiding over-interpretation.
- source_word: διὸ
  chosen: Therefore
  alternatives:
  - For this reason
  - Hence
  lexicon: BDAG
  rationale: Marks inference from their heavenly longing to God's response.
- source_word: οὐκ ἐπαισχύνεται
  chosen: is not ashamed
  alternatives:
  - does not feel shame
  - is not embarrassed
  lexicon: BDAG
  rationale: Standard rendering of the verb; 'ashamed' preserves the covenantal-honor
    nuance better than 'embarrassed.'
- source_word: ἐπικαλεῖσθαι αὐτῶν
  chosen: to be called their God
  alternatives:
  - to be invoked as their God
  - to be named as their God
  lexicon: BDAG
  rationale: The infinitive with genitive pronoun here refers to designation/naming,
    echoing OT formulae where God identifies himself as the God of the patriarchs.
    'To be called their God' is the clearest idiomatic rendering.
- source_word: ἡτοίμασεν
  chosen: he has prepared
  alternatives:
  - he prepared
  - he made ready
  lexicon: BDAG
  rationale: Aorist rendered with English present perfect to express a completed action
    with present relevance in context; this is natural English and preserves the force
    of God's prior provision.
- source_word: πόλιν
  chosen: a city
  alternatives:
  - the city
  - a homeland-city
  lexicon: BDAG
  rationale: Anarthrous noun best rendered indefinitely here. 'City' preserves the
    concrete eschatological image used throughout Hebrews.
