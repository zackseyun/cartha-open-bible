theological_decisions:
- issue: Implied noun with feminine genitives κρείττονος and ἐπουρανίου
  chosen_reading: Supply 'country' from the immediate context (v. 14)
  alternative_readings:
  - Supply 'homeland'
  - 'Leave the noun implicit: ''they long for something better, that is, a heavenly
    one'''
  rationale: The Greek uses feminine genitives without an explicit noun in this verse,
    but the antecedent concept of πατρίς/πατρίδα from the context governs the sense.
    'Country' is clear, natural, and avoids importing a more emotionally loaded term
    unless context requires it.
  doctrine_reference: Translation philosophy §1, §5
- issue: Covenantal formula in 'their God'
  chosen_reading: Retain the relational formula without expanding it
  alternative_readings:
  - Paraphrase as 'to acknowledge them as his people'
  rationale: The text specifically states that God is not ashamed to be called their
    God. Expanding to a broader covenant formula would import meaning not explicitly
    stated, even if contextually related.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants'
