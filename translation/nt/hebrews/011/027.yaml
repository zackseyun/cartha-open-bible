id: HEB.11.27
reference: Hebrews 11:27
source:
  edition: SBLGNT
  text: πίστει κατέλιπεν Αἴγυπτον, μὴ φοβηθεὶς τὸν θυμὸν τοῦ βασιλέως, τὸν γὰρ ἀόρατον ὡς ὁρῶν ἐκαρτέρησεν.
translation:
  text: By faith he left Egypt[a], not fearing the king’s anger[b], for he endured as seeing the One who is invisible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the invisible One.' The Greek could also be rendered 'the unseen One.'
    reason: lexical_alternative
  - marker: b
    text: The verse may allude either to Moses' departure from Egypt after fleeing Pharaoh (Exod 2) or to the exodus departure with Israel (Exod 12–14); the Greek wording itself does not specify the episode.
    reason: cross_reference
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - by trust
  - by faithfulness
  lexicon: BDAG
  rationale: Follows the project's default rendering of πίστις as 'faith.' The dative is instrumental/modal here, introducing the manner by which Moses acted. 'Trust' is possible in English sense, and 'faithfulness' is a known semantic option for πίστις, but this context in Hebrews 11 catalogs acts done in faith, so 'By faith' best matches both the Greek and the discourse pattern.
- source_word: κατέλιπεν
  chosen: he left
  alternatives:
  - he departed from
  - he abandoned
  lexicon: BDAG
  rationale: Aorist active indicative of καταλείπω, here naturally rendered 'left.' 'Abandoned' can overstate the nuance, while 'departed from' is slightly more formal than needed. 'He left' is clear, direct, and fits modern English.
- source_word: Αἴγυπτον
  chosen: Egypt
  lexicon: BDAG
  rationale: Standard transliteration of the place name.
- source_word: μὴ φοβηθεὶς
  chosen: not fearing
  alternatives:
  - without fearing
  - not being afraid of
  lexicon: BDAG
  rationale: Aorist passive participle with μή, modifying the subject and expressing attendant circumstance or manner. 'Not fearing' is concise and idiomatic in English, preserving the participial connection to the main verb.
- source_word: τὸν θυμὸν
  chosen: anger
  alternatives:
  - wrath
  - rage
  - fury
  lexicon: BDAG
  rationale: θυμός denotes strong anger. 'Anger' is the most natural modern English rendering here. 'Wrath' can sound elevated and theologically loaded; 'rage' or 'fury' may over-intensify beyond what the context requires.
- source_word: τοῦ βασιλέως
  chosen: the king’s
  alternatives:
  - of the king
  lexicon: BDAG
  rationale: Rendered with the English possessive for natural style while preserving the genitival relationship.
- source_word: τὸν ἀόρατον
  chosen: the One who is invisible
  alternatives:
  - the invisible One
  - the unseen One
  lexicon: BDAG
  rationale: The adjective ἀόρατος is articular and functions substantivally. 'The One who is invisible' makes the personal referent explicit and reads naturally in English. It preserves the paradox with 'as seeing.' 'The invisible One' is also possible, but slightly less natural for contemporary readers.
- source_word: ὡς ὁρῶν
  chosen: as seeing
  alternatives:
  - as though seeing
  - like one who saw
  lexicon: BDAG
  rationale: Preserves the comparative force of ὡς with the participle. 'As seeing' keeps the vivid paradox of perceiving the invisible by faith. 'As though seeing' is interpretive and slightly weaker.
- source_word: ἐκαρτέρησεν
  chosen: he endured
  alternatives:
  - he persevered
  - he remained steadfast
  lexicon: BDAG
  rationale: καρτερέω conveys steadfast endurance or persistence. 'He endured' is concise and fits the aorist narrative summary. 'Persevered' is also good, but 'endured' better matches the immediate context of not fearing royal anger.
