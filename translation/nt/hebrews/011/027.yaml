theological_decisions:
- issue: Identity and historical referent of 'he left Egypt'
  chosen_reading: The translation leaves the referent as Moses and does not resolve whether the author primarily alludes to Moses' flight in Exodus 2 or the exodus departure in Exodus 12–14.
  alternative_readings:
  - Moses' flight from Pharaoh after killing the Egyptian
  - Moses leading Israel out in the exodus
  rationale: The Greek text itself simply states that 'he left Egypt' and 'did not fear the king's anger.' Because interpreters dispute which episode is in view, the translation preserves the wording without importing a harmonizing explanation into the main text. This follows the project's principle of preserving theological or interpretive tension rather than resolving it where the text is not explicit.
  doctrine_reference: Translation philosophy §3
