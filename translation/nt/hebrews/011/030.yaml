id: HEB.11.30
reference: Hebrews 11:30
source:
  edition: SBLGNT
  text: πίστει τὰ τείχη Ἰεριχὼ ⸀ἔπεσαν κυκλωθέντα ἐπὶ ἑπτὰ ἡμέρας.
translation:
  text: By faith the walls of Jericho fell after they had been encircled for seven days[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'through faith.' The Greek dative πίστει can express means or manner; the main text keeps the familiar Hebrews 11 formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστει
  chosen: By faith
  alternatives:
  - through faith
  - by means of faith
  lexicon: BDAG
  rationale: Dative singular of πίστις used instrumentally or with a modal nuance in Hebrews 11's repeated formula. Per doctrine defaults, πίστις is rendered 'faith' in the main text. 'By faith' preserves the chapter's cadence and the likely instrumental sense without over-specifying agency.
- source_word: τὰ τείχη
  chosen: the walls
  alternatives:
  - the fortifications
  lexicon: BDAG
  rationale: τεῖχος commonly denotes a wall, especially a city wall. 'Walls' is the natural and sufficiently precise English rendering here.
- source_word: Ἰεριχὼ
  chosen: of Jericho
  lexicon: BDAG
  rationale: 'Ἰεριχώ is a proper name transliterated as ''Jericho'' per translation philosophy. Although the morphology table marks it genitive, the sense is possessive/appositional with τὰ τείχη: ''the walls of Jericho.'''
- source_word: ἔπεσαν
  chosen: fell
  alternatives:
  - collapsed
  lexicon: BDAG
  rationale: Aorist active indicative of πίπτω, straightforwardly 'fell.' 'Collapsed' is interpretive and slightly more specific; 'fell' better matches the Greek while remaining idiomatic.
- source_word: κυκλωθέντα
  chosen: after they had been encircled
  alternatives:
  - having been encircled
  - after being marched around
  lexicon: BDAG
  rationale: 'Aorist passive participle of κυκλόω, ''to surround/encircle.'' The passive participle is best represented as a prior action relative to the main verb: the walls fell after they had been encircled. ''Marched around'' captures the historical event from Joshua 6 but imports the human action more explicitly than the Greek participle itself, which focuses on the walls being encircled.'
- source_word: ἐπὶ ἑπτὰ ἡμέρας
  chosen: for seven days
  alternatives:
  - during seven days
  - over seven days
  lexicon: BDAG
  rationale: ἐπί with an accusative temporal expression can denote duration or extent of time. 'For seven days' is the most natural English equivalent and fits the narrative allusion to Joshua 6.
