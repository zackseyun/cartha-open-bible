id: HEB.11.29
reference: Hebrews 11:29
source:
  edition: SBLGNT
  text: Πίστει διέβησαν τὴν Ἐρυθρὰν Θάλασσαν ὡς διὰ ξηρᾶς ⸀γῆς, ἧς πεῖραν λαβόντες
    οἱ Αἰγύπτιοι κατεπόθησαν.
translation:
  text: By faith they crossed the Red Sea as through dry land, and when the Egyptians
    attempted it, they were swallowed up.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Reed Sea.' The Greek text here reads 'Red Sea' (Ἐρυθρὰν Θάλασσαν),
      while discussion of the underlying Exodus place-name sometimes favors 'Sea of
      Reeds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πίστει
  chosen: By faith
  alternatives:
  - By trust
  - By faithfulness
  lexicon: BDAG
  rationale: Dative of means/instrument. Per doctrine defaults, πίστις is rendered
    'faith' in the main text. 'Trust' is possible in English sense, and 'faithfulness'
    is a lexical possibility, but here the context of Hebrews 11's exemplars favors
    'faith' as the governing motif.
- source_word: διέβησαν
  chosen: they crossed
  alternatives:
  - they passed through
  lexicon: BDAG
  rationale: Aorist active indicative of διαβαίνω, referring to traversing from one
    side to the other. 'Crossed' is idiomatic modern English and preserves the event
    sense without unnecessary stiffness.
- source_word: Ἐρυθρὰν Θάλασσαν
  chosen: the Red Sea
  alternatives:
  - the Reed Sea
  lexicon: BDAG
  rationale: The Greek phrase conventionally denotes the Red Sea in biblical Greek
    usage. Although the underlying Hebrew name in Exodus is often argued to mean 'Sea
    of Reeds,' this verse's Greek text explicitly has Ἐρυθρὰν Θάλασσαν, so 'Red Sea'
    best reflects the source text. The alternative is preserved in a footnote as a
    lexical/tradition note.
- source_word: ὡς διὰ ξηρᾶς γῆς
  chosen: as through dry land
  alternatives:
  - as through dry ground
  - as on dry land
  lexicon: BDAG
  rationale: The comparison introduced by ὡς is retained with 'as through.' ξηρᾶς
    γῆς is literally 'dry land/ground.' 'Dry land' is natural English and echoes the
    Exodus narrative.
- source_word: ἧς
  chosen: it
  alternatives:
  - which
  - of which
  lexicon: BDAG
  rationale: Genitive feminine singular relative pronoun referring back to the crossing
    of the sea/dry-land passage. In idiomatic English, the sense is best carried forward
    in the clause 'attempted it' rather than a more wooden 'of which' construction.
- source_word: πεῖραν λαβόντες
  chosen: attempted it
  alternatives:
  - having made the attempt
  - having undertaken the trial
  - trying to do so
  lexicon: BDAG
  rationale: The idiom πεῖραν λαμβάνειν means to make an attempt or try. 'Attempted
    it' is concise, natural, and accurately conveys the participial action in context.
- source_word: οἱ Αἰγύπτιοι
  chosen: the Egyptians
  lexicon: BDAG
  rationale: Straightforward ethnic/national designation referring to Pharaoh's forces
    in the Exodus event.
- source_word: κατεπόθησαν
  chosen: they were swallowed up
  alternatives:
  - they were drowned
  - they were engulfed
  lexicon: BDAG
  rationale: Aorist passive of καταπίνω, literally 'to swallow down/up.' 'Were swallowed
    up' preserves the vivid metaphorical/passive force of the Greek better than the
    more interpretive 'were drowned,' though drowning is the historical implication.
