id: TIT.2.11
reference: Titus 2:11
source:
  edition: SBLGNT
  text: Ἐπεφάνη γὰρ ἡ χάρις τοῦ ⸀θεοῦ σωτήριος πᾶσιν ἀνθρώποις
translation:
  text: For the grace of God has appeared[b][a], bringing salvation to all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has appeared, saving all people' or 'has appeared to all people.' The Greek adjective σωτήριος ('saving,' 'bringing salvation') and the dative phrase πᾶσιν ἀνθρώποις can be construed slightly differently in English.
    reason: lexical_alternative
  - marker: b
    text: '''All people'' translates Greek anthrōpois generically for humanity, not males only.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπεφάνη
  chosen: has appeared
  alternatives:
  - appeared
  - has shone forth
  - has become visible
  lexicon: BDAG
  rationale: Aorist passive/intransitive of ἐπιφαίνω here functions as an intransitive 'appeared' or 'became manifest.' 'Has appeared' gives natural English while preserving the epiphanic sense and the present relevance of the event.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the ground or explanation for the preceding exhortation. 'For' is the most straightforward connective in context.
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  - gracious gift
  lexicon: BDAG
  rationale: '''Grace'' is the established and contextually appropriate rendering in Pauline usage, preserving both divine favor and saving efficacy without over-paraphrase.'
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - from God
  lexicon: BDAG
  rationale: 'The genitive is most naturally rendered attributively/possessively: the grace belonging to or characterized by God. ''Of God'' is more formally transparent than ''from God'' here.'
- source_word: σωτήριος
  chosen: bringing salvation
  alternatives:
  - saving
  - salvific
  - that brings salvation
  lexicon: BDAG
  rationale: σωτήριος modifies 'grace' and denotes that which brings salvation or is saving. 'Bringing salvation' expresses the adjective's force in idiomatic English better than the less natural 'saving' attached directly to 'grace,' while avoiding a doctrinally loaded expansion.
- source_word: πᾶσιν ἀνθρώποις
  chosen: for all people
  alternatives:
  - to all people
  - for all men
  - to all men
  lexicon: BDAG
  rationale: ἄνθρωποι here is generic for humanity, not specifically males, so 'people' fits the gender-accurate policy. The dative with σωτήριος can be understood as advantage/reference ('for all people') or direction ('to all people'); 'for' works naturally with 'bringing salvation.' 'All people' preserves the universal scope of the statement without importing a specific theory of salvation.
