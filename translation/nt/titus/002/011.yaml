theological_decisions:
- issue: Scope of πᾶσιν ἀνθρώποις in relation to salvation
  chosen_reading: Rendered as 'for all people' to preserve the text's universal scope without specifying whether Paul means every individual without exception or all kinds/classes of people.
  alternative_readings:
  - to all people
  - for all men
  - for all kinds of people
  rationale: The verse affirms the universal relevance and availability of God's saving grace, but the phrase's theological implications are debated in relation to soteriology and the immediate context (including various groups in Titus 2). The translation should preserve the breadth of the Greek without narrowing it to a denominational reading.
  doctrine_reference: Preserve theological tension rather than resolve it.
