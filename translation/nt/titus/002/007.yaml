theological_decisions:
- issue: Whether to render διδασκαλία with ecclesiastical terminology
  chosen_reading: Rendered as 'teaching' rather than 'doctrine.'
  alternative_readings:
  - in doctrine
  rationale: The verse concerns Titus's manner and content of instruction, and the translation philosophy prefers readable modern English over ecclesiastical jargon unless required by the text. 'Teaching' preserves meaning without narrowing it to formal dogmatic formulation.
  doctrine_reference: Translation philosophy §6
- issue: How specifically to interpret ἀφθορίαν in relation to teaching
  chosen_reading: Kept the more literal 'incorruptibility' in the main text.
  alternative_readings:
  - purity
  - integrity
  rationale: The term is somewhat debated in this context, but the text itself does not force a narrower interpretive gloss. Preserving the broader lexical sense maintains the text's theological and ethical breadth rather than resolving it prematurely.
  doctrine_reference: Translation philosophy §3
