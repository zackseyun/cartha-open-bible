theological_decisions:
- issue: Rendering Χριστός in the christological title Χριστοῦ Ἰησοῦ
  chosen_reading: Messiah Jesus
  alternative_readings:
  - Christ Jesus
  rationale: Following the project's contested-terms guidance, Χριστός is translated as 'Messiah' where title force is present. This preserves the semantic content of the Greek rather than relying on inherited transliteration.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός *Christos*'
- issue: Referent of σωτῆρος ἡμῶν
  chosen_reading: The title 'our Savior' modifies Messiah Jesus in the immediate syntax.
  alternative_readings:
  - The phrase could be heard more loosely across the coordinated source phrase, but the article τοῦ directly with σωτῆρος most naturally attaches to Χριστοῦ Ἰησοῦ.
  rationale: The Greek sequence καὶ Χριστοῦ Ἰησοῦ τοῦ σωτῆρος ἡμῶν most naturally reads with the article-noun phrase in apposition to Χριστοῦ Ἰησοῦ, identifying Jesus as Savior. This should be reflected without obscuring the syntax.
  doctrine_reference: Nicene orthodoxy affirmed; translation follows syntax rather than importing doctrine.
