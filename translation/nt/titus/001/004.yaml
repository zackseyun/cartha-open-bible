id: TIT.1.4
reference: Titus 1:4
source:
  edition: SBLGNT
  text: Τίτῳ γνησίῳ τέκνῳ κατὰ κοινὴν πίστιν· χάρις ⸀καὶ εἰρήνη ἀπὸ θεοῦ πατρὸς καὶ ⸂Χριστοῦ Ἰησοῦ⸃ τοῦ σωτῆρος ἡμῶν.
translation:
  text: 'To Titus[b][a], my true child according to our common faith: grace and peace from God the Father and Messiah Jesus our Savior.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'shared faith.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ Jesus'; rendered 'Messiah Jesus' here because Χριστός is treated as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: γνησίῳ
  chosen: 'true'
  alternatives:
  - genuine
  - legitimate
  lexicon: BDAG
  rationale: In the epistolary relationship with τέκνῳ, γνήσιος conveys authenticity of spiritual kinship rather than biological legitimacy. 'True' is natural English and preserves Paul's affirmation of Titus as an authentic spiritual child.
- source_word: τέκνῳ
  chosen: child
  alternatives:
  - son
  lexicon: BDAG
  rationale: τέκνον is more general than 'son' and commonly denotes child in a familial or spiritual sense. 'Child' preserves the metaphor without over-specifying gendered nuance not explicit in the noun itself, though Titus is male.
- source_word: κατὰ κοινὴν πίστιν
  chosen: according to our common faith
  alternatives:
  - in accordance with a common faith
  - on the basis of our shared faith
  lexicon: BDAG
  rationale: κατά with the accusative here expresses relation or standard. κοινήν indicates something shared in common. πίστις is rendered 'faith' per project default. Adding 'our' makes explicit the relational sense naturally implied in English by Paul's address to Titus and the shared Christian faith.
- source_word: πίστιν
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: The project default for πίστις is 'faith.' In this context it refers to the shared Christian faith rather than an abstract quality of faithfulness. Because alternatives are possible at the lexical level, they are documented, but the context is not strongly contested here.
- source_word: χάρις
  chosen: grace
  lexicon: BDAG
  rationale: Standard Pauline epistolary blessing term; 'grace' is the established and accurate rendering.
- source_word: εἰρήνη
  chosen: peace
  lexicon: BDAG
  rationale: Standard blessing term paired with χάρις; 'peace' is the natural and accurate rendering.
- source_word: θεοῦ πατρὸς
  chosen: God the Father
  alternatives:
  - God our Father
  lexicon: BDAG
  rationale: The Greek text lacks ἡμῶν with πατρός here, so 'God the Father' is more textually precise than 'God our Father.'
- source_word: Χριστοῦ Ἰησοῦ
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per project policy, Χριστός is translated as 'Messiah' where it functions as a title rather than a name-like element. In the Pastorals the phrase can sound name-like in English tradition, but the titular force remains intelligible and the project prefers translating titles.
- source_word: σωτῆρος ἡμῶν
  chosen: our Savior
  lexicon: BDAG
  rationale: The genitive phrase appositionally identifies Messiah Jesus as 'our Savior.' This is a straightforward and theologically significant title that should be preserved directly.
