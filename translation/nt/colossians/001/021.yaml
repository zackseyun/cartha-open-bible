theological_decisions:
- issue: Relation of inward hostility to evil deeds
  chosen_reading: Rendered as 'hostile in mind, doing evil deeds' to reflect both internal disposition and outward conduct without over-specifying causation.
  alternative_readings:
  - '''hostile in mind because of evil deeds'''
  - '''hostile in mind in evil deeds'''
  rationale: The Greek construction can be taken as describing the sphere/manifestation of hostility rather than strictly its cause. The chosen rendering preserves the tension between inward alienation and outward practice without importing a stronger causal claim than the text requires.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
