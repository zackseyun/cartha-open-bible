theological_decisions:
- issue: Meaning of πίστις in contrast with ἀπιστία
  chosen_reading: faith
  alternative_readings:
  - trust
  - faithfulness
  rationale: Following the project's contested-terms policy, πίστις is rendered 'faith'
    in the main text. In this verse the contrast with 'unbelief' strongly favors the
    human response of faith rather than Christ's faithfulness or a broader abstraction,
    though 'trust' is a viable explanatory alternative.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved
    where contested'
- issue: Force of φοβοῦ
  chosen_reading: fear
  alternative_readings:
  - be afraid
  - have reverent fear
  rationale: The verse warns Gentile believers against presumption in light of God's
    severity and kindness in the surrounding context. Rendering simply 'fear' preserves
    the theological tension without softening it into mere respect or intensifying
    it into panic.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological
    tension rather than resolve it'
