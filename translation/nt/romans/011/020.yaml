id: ROM.11.20
reference: Romans 11:20
source:
  edition: SBLGNT
  text: καλῶς· τῇ ἀπιστίᾳ ἐξεκλάσθησαν, σὺ δὲ τῇ πίστει ἕστηκας. μὴ ⸂ὑψηλὰ φρόνει⸃,
    ἀλλὰ φοβοῦ·
translation:
  text: 'Quite right: they were broken off because of unbelief, but you stand by faith.
    Do not be arrogant, but fear.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Well' or 'That is true.'
    reason: lexical_alternative
  - marker: b
    text: Or 'through faith' or 'by trust.' Greek pistis is rendered 'faith' by default
      in the main text.
    reason: alternative_reading
  - marker: c
    text: Or 'Do not be high-minded' or 'do not think proudly.'
    reason: lexical_alternative
  - marker: d
    text: That is, fear with humble reverence and caution before God, not arrogant
      presumption.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλῶς
  chosen: Quite right
  alternatives:
  - Well
  - That is true
  lexicon: BDAG
  rationale: Used as an approving response to the interlocutor's statement in the
    previous verse. 'Quite right' preserves the affirming force more naturally than
    the bare adverb 'well.'
- source_word: ἀπιστίᾳ
  chosen: because of unbelief
  alternatives:
  - by unbelief
  - through unbelief
  lexicon: BDAG
  rationale: 'The dative here is best rendered causally/instrumentally in context:
    the branches were broken off on account of unbelief. ''Unbelief'' fits Pauline
    usage and preserves the contrast with πίστις.'
- source_word: ἐξεκλάσθησαν
  chosen: were broken off
  alternatives:
  - were cut off
  lexicon: BDAG
  rationale: Keeps the olive-tree metaphor from the surrounding context. 'Broken off'
    is the standard and most concrete rendering of ἐκκλάω here.
- source_word: πίστει
  chosen: by faith
  alternatives:
  - through faith
  - by trust
  lexicon: BDAG
  rationale: 'Per doctrine defaults, πίστις is rendered ''faith'' in the main text.
    The dative expresses means or basis: the Gentile believer stands by faith in contrast
    to Israel''s unbelief.'
- source_word: ἕστηκας
  chosen: you stand
  alternatives:
  - you have stood firm
  - you are standing
  lexicon: BDAG
  rationale: The perfect of ἵστημι conveys a present state resulting from prior action.
    'You stand' is idiomatic English and adequately conveys the settled standing without
    overtranslating.
- source_word: ὑψηλὰ φρόνει
  chosen: be arrogant
  alternatives:
  - think high thoughts
  - be high-minded
  - do not think proudly
  lexicon: BDAG
  rationale: The idiom means to think in a lofty or proud way about oneself. 'Be arrogant'
    communicates the sense clearly in modern English while preserving the warning
    against pride.
- source_word: φοβοῦ
  chosen: fear
  alternatives:
  - be afraid
  - stand in fear
  lexicon: BDAG
  rationale: The present middle/passive imperative calls for ongoing fear/reverent
    caution. 'Fear' is concise and preserves the rhetorical sharpness; context indicates
    humble reverence rather than mere terror.
