id: ROM.11.19
reference: Romans 11:19
source:
  edition: SBLGNT
  text: ἐρεῖς οὖν· Ἐξεκλάσθησαν κλάδοι ἵνα ἐγὼ ἐγκεντρισθῶ.
translation:
  text: You will say then, “Branches were broken off so that I might be grafted in.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐρεῖς
  chosen: You will say
  alternatives:
  - Then you will say
  - You may say
  lexicon: BDAG
  rationale: Future active indicative, second person singular of λέγω. In this diatribe-style
    argument Paul addresses an imagined interlocutor. 'You will say' is the most direct
    rendering; 'may say' is possible idiomatically, but the future form is retained.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Inferential/discourse connective. 'Then' fits natural English in argumentative
    dialogue and preserves the logical progression without sounding overly formal.
- source_word: Ἐξεκλάσθησαν
  chosen: were broken off
  alternatives:
  - were cut off
  lexicon: BDAG
  rationale: Aorist passive indicative of ἐκκλάω, used in the olive-tree metaphor.
    'Broken off' preserves the horticultural image better than the more abstract 'cut
    off'.
- source_word: κλάδοι
  chosen: branches
  lexicon: BDAG
  rationale: Literal rendering of the metaphorical noun in the olive-tree context
    of Romans 11. 'Branches' is standard and clear.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result. 'So that' is idiomatic modern English and
    preserves the stated purpose claim of the interlocutor.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: Explicit pronoun is emphatic in Greek. English naturally conveys this
    within the clause; no added emphasis marker is necessary, though the wording keeps
    the first-person subject prominent.
- source_word: ἐγκεντρισθῶ
  chosen: might be grafted in
  alternatives:
  - might be grafted among them
  - might be engrafted
  lexicon: BDAG
  rationale: Aorist passive subjunctive of ἐγκεντρίζω in the olive-tree metaphor.
    'Grafted in' is natural modern English and preserves the passive sense. 'Among
    them' is not present in this verse and belongs to the broader context, so it is
    not imported here.
