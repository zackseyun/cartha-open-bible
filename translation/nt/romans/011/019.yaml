theological_decisions:
- issue: Whether to make explicit that the speaker is an imagined interlocutor in
    Paul's argument
  chosen_reading: Retain the direct second-person address without adding explanatory
    wording in the main text
  alternative_readings:
  - You may say then
  - Then someone will say
  rationale: Paul's diatribe style is evident from context, but the Greek text itself
    simply says 'you will say then.' Adding 'someone' or shifting to a more interpretive
    idiom would move beyond the wording of the verse.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
- issue: Whether to intensify the purpose clause into a theological claim about divine
    intent
  chosen_reading: Translate the interlocutor's statement straightforwardly as 'so
    that I might be grafted in'
  alternative_readings:
  - in order that I could be grafted in
  rationale: The verse reports the boastful inference of the imagined Gentile speaker,
    not necessarily Paul's endorsed theological formulation. The translation preserves
    the claim as stated without adding approval or disapproval.
  doctrine_reference: 'Affirmations and translation philosophy: do not import doctrinal
    claims the text does not make.'
