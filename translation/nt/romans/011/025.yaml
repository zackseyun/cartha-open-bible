theological_decisions:
- issue: Meaning of 'the fullness of the Gentiles'
  chosen_reading: Rendered as 'the fullness of the Gentiles' in the main text without
    specifying whether this means the full number, full inclusion, or eschatological
    completion.
  alternative_readings:
  - the full number of the Gentiles
  - the full inclusion of the Gentiles
  rationale: The phrase is theologically debated. To preserve the text's tension rather
    than resolve it, the main text keeps the more literal 'fullness,' while a footnote
    preserves a common interpretive alternative.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Scope of 'brothers'
  chosen_reading: Retained 'brothers' in the main text.
  alternative_readings:
  - brothers and sisters
  rationale: The Greek form is masculine plural vocative, and the doctrine calls for
    gender-accurate rendering over gender-neutral. Because the audience likely includes
    women, the inclusive sense is preserved in a footnote rather than replacing the
    source-shaped wording.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
