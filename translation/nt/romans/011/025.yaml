id: ROM.11.25
reference: Romans 11:25
source:
  edition: SBLGNT
  text: Οὐ γὰρ θέλω ὑμᾶς ἀγνοεῖν, ἀδελφοί, τὸ μυστήριον τοῦτο, ἵνα μὴ ⸀ἦτε ἑαυτοῖς
    φρόνιμοι, ὅτι πώρωσις ἀπὸ μέρους τῷ Ἰσραὴλ γέγονεν ἄχρι οὗ τὸ πλήρωμα τῶν ἐθνῶν
    εἰσέλθῃ,
translation:
  text: 'For I do not want you to be unaware, brothers, of this mystery, so that you
    may not be wise in your own sight: a partial hardening has come upon Israel until
    the fullness of the Gentiles has come in,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and can address a mixed
      group.
    reason: lexical_alternative
  - marker: b
    text: Or 'the full number of the Gentiles.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγνοεῖν
  chosen: to be unaware
  alternatives:
  - to be ignorant
  - not to know
  lexicon: BDAG
  rationale: Pauline idiom οὐ θέλω ὑμᾶς ἀγνοεῖν is a conventional formula meaning
    'I do not want you to be uninformed/unaware.' 'Unaware' is natural modern English
    and avoids the potentially misleading pejorative force of 'ignorant.'
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural vocative. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. 'Brothers' preserves the form of address;
    inclusivity can be noted in a footnote because Paul addresses the mixed Roman
    Christian audience.
- source_word: μυστήριον
  chosen: mystery
  alternatives:
  - secret
  lexicon: BDAG
  rationale: In Paul, μυστήριον commonly denotes a divine purpose once hidden and
    now disclosed. 'Mystery' preserves this theological register better than 'secret,'
    which can sound merely private or esoteric.
- source_word: ἵνα μὴ ἦτε ἑαυτοῖς φρόνιμοι
  chosen: so that you may not be wise in your own sight
  alternatives:
  - so that you may not be wise in yourselves
  - lest you be wise in your own estimation
  lexicon: BDAG
  rationale: This clause expresses purpose/result. 'In your own sight' idiomatically
    conveys ἑαυτοῖς with φρόνιμοι and matches the warning against self-conceit without
    over-paraphrasing.
- source_word: πώρωσις
  chosen: hardening
  alternatives:
  - callousness
  - dullness
  lexicon: BDAG
  rationale: In this salvation-historical context, πώρωσις refers to spiritual insensitivity
    or hardening. 'Hardening' is the established and clearest theological equivalent
    in English.
- source_word: ἀπὸ μέρους
  chosen: partial
  alternatives:
  - in part
  - partially
  lexicon: BDAG
  rationale: The phrase modifies the extent of Israel's hardening, not necessarily
    its duration. 'Partial' is concise and idiomatic in English; 'in part' is possible
    but less smooth here.
- source_word: τῷ Ἰσραήλ
  chosen: upon Israel
  alternatives:
  - to Israel
  - for Israel
  lexicon: BDAG
  rationale: With γέγονεν, the dative is naturally rendered in English as the state
    having come upon Israel. 'Upon Israel' communicates the experienced condition
    more clearly than a wooden 'to Israel.'
- source_word: γέγονεν
  chosen: has come upon
  alternatives:
  - has happened to
  - has occurred to
  lexicon: BDAG
  rationale: The perfect tense indicates a present state resulting from a past event.
    'Has come upon' preserves both the eventive and resultant nuance in context.
- source_word: πλήρωμα
  chosen: fullness
  alternatives:
  - full number
  - completion
  lexicon: BDAG
  rationale: πλήρωμα can denote fullness, full number, or totality. 'Fullness' preserves
    the lexical form and leaves the exact nuance open, which is preferable in this
    debated passage; an alternative is preserved in a footnote.
- source_word: τῶν ἐθνῶν
  chosen: of the Gentiles
  alternatives:
  - of the nations
  lexicon: BDAG
  rationale: In Pauline usage here, ἐθνῶν contrasts with Israel and refers to non-Jews.
    'Gentiles' communicates that contrast more precisely than the broader 'nations.'
- source_word: εἰσέλθῃ
  chosen: has come in
  alternatives:
  - enters
  - comes in
  - has entered
  lexicon: BDAG
  rationale: After ἄχρι οὗ, the aorist subjunctive marks the terminus of the hardening.
    English present perfect ('has come in') reads naturally with 'until' and conveys
    the event as the threshold condition.
