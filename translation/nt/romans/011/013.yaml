theological_decisions:
- issue: Meaning of Paul's statement about his ministry
  chosen_reading: Paul says he magnifies or highly esteems his ministry to the Gentiles, not that he glorifies himself.
  alternative_readings:
  - Paul glorifies his ministry in the sense of making it honorable
  - Paul boasts in his ministry
  rationale: The object of δοξάζω is 'my ministry,' but the broader context shows this serves God's saving purpose, especially regarding Israel and the Gentiles, rather than personal self-exaltation. The English 'magnify' preserves this nuance without importing a doctrine of self-boasting.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Referent of ἔθνη / ἐθνῶν
  chosen_reading: Gentiles
  alternative_readings:
  - nations
  rationale: In Romans 9–11 Paul contrasts Israel and the non-Jewish peoples. 'Gentiles' best conveys the ethnic-religious contrast intended in context.
  doctrine_reference: Translation philosophy §1, §5
