id: ROM.11.9
reference: Romans 11:9
source:
  edition: SBLGNT
  text: καὶ Δαυὶδ λέγει· Γενηθήτω ἡ τράπεζα αὐτῶν εἰς παγίδα καὶ εἰς θήραν καὶ εἰς
    σκάνδαλον καὶ εἰς ἀνταπόδομα αὐτοῖς,
translation:
  text: And David says, “Let their table become a snare and a trap and a stumbling
    block and a repayment to them,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a snare and a hunting trap'; the paired terms are near-synonyms for
      entrapment.
    reason: lexical_alternative
  - marker: b
    text: Or 'retribution' or 'recompense' for 'repayment.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δαυὶδ
  chosen: David
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the philosophy
    of transliterating names rather than translating them.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Present tense in Greek is naturally rendered as a literary present in
    English ('says') when introducing a citation.
- source_word: Γενηθήτω
  chosen: Let ... become
  alternatives:
  - May ... become
  - Let ... be made
  lexicon: BDAG
  rationale: Aorist passive/deponent imperative of γίνομαι here functions as a jussive
    wish in the quoted imprecation. 'Let ... become' is idiomatic and preserves the
    force without over-paraphrase.
- source_word: τράπεζα
  chosen: table
  alternatives:
  - table fellowship
  - banquet table
  lexicon: BDAG
  rationale: The basic sense is 'table.' In the Psalm citation the image likely includes
    provision or feasting, but the concrete term should be retained in the main text.
- source_word: παγίδα
  chosen: snare
  alternatives:
  - trap
  lexicon: BDAG
  rationale: Rendered 'snare' to preserve distinction from the following θήραν and
    to reflect a common metaphor for entrapment.
- source_word: θήραν
  chosen: trap
  alternatives:
  - prey
  - hunting net
  lexicon: BDAG
  rationale: Chosen as a near-synonym distinct from 'snare.' Although the noun can
    be associated with hunting/prey, in this context of parallel terms 'trap' best
    communicates the entangling image in natural English.
- source_word: σκάνδαλον
  chosen: stumbling block
  alternatives:
  - offense
  - cause for falling
  lexicon: BDAG
  rationale: '''Stumbling block'' is the standard and contextually clear rendering,
    preserving the metaphor of something causing downfall rather than merely subjective
    offense.'
- source_word: ἀνταπόδομα
  chosen: repayment
  alternatives:
  - retribution
  - payback
  - recompense
  lexicon: BDAG
  rationale: This term denotes requital or repayment. 'Repayment' is transparent modern
    English and leaves open whether the requital is punitive, which the context implies
    without requiring a more interpretive term.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - for them
  lexicon: BDAG
  rationale: The dative is naturally rendered 'to them' here with ἀνταπόδομα, preserving
    the direction of the requital.
