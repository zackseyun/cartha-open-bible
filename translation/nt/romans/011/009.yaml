theological_decisions:
- issue: Imprecatory citation from Psalm 69:22
  chosen_reading: 'Retain the jussive imprecation directly: ''Let their table become...,''
    without softening it into a mere prediction.'
  alternative_readings:
  - Their table will become...
  - May their table become...
  rationale: Paul is quoting Davidic Scripture in a form that preserves the force
    of an imprecatory appeal/judgment. Rendering it as a direct jussive best reflects
    the Greek imperative and avoids muting the severity of the citation.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense;
    do not import doctrinal softening.'
