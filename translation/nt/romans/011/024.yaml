id: ROM.11.24
reference: Romans 11:24
source:
  edition: SBLGNT
  text: εἰ γὰρ σὺ ἐκ τῆς κατὰ φύσιν ἐξεκόπης ἀγριελαίου καὶ παρὰ φύσιν ἐνεκεντρίσθης
    εἰς καλλιέλαιον, πόσῳ μᾶλλον οὗτοι οἱ κατὰ φύσιν ἐγκεντρισθήσονται τῇ ἰδίᾳ ἐλαίᾳ.
translation:
  text: For if you were cut from what is by nature a wild olive tree and, contrary
    to nature, were grafted into a cultivated olive tree, how much more will these,
    the natural branches, be grafted into their own olive tree.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'these, who are natural'; Greek simply says 'these, the ones according
      to nature,' with 'branches' supplied from the olive-tree metaphor in the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be grafted back into their own olive tree.' The idea of return
      is contextually implied, though 'back' is not explicit in the Greek verb.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεκόπης
  chosen: were cut
  alternatives:
  - were cut out
  - were broken off
  lexicon: BDAG
  rationale: The verb ἐκκόπτω means to cut out/off. 'Were cut' is concise and fits
    the horticultural metaphor. 'Were broken off' is possible by contextual assimilation
    to nearby olive-tree imagery in Romans 11, but here the lexical sense is specifically
    cutting rather than breaking.
- source_word: ἀγριελαίου
  chosen: a wild olive tree
  alternatives:
  - wild olive
  lexicon: BDAG
  rationale: The noun denotes a wild olive tree. Including 'tree' makes the horticultural
    image explicit in English and clarifies the genitive after ἐκ.
- source_word: παρὰ φύσιν
  chosen: contrary to nature
  alternatives:
  - against nature
  lexicon: BDAG
  rationale: This is the standard sense of the phrase. 'Contrary to nature' is idiomatic
    modern English and preserves Paul's rhetorical contrast with κατὰ φύσιν.
- source_word: ἐνεκεντρίσθης
  chosen: were grafted into
  alternatives:
  - were grafted in among
  - were grafted onto
  lexicon: BDAG
  rationale: ἐγκεντρίζω is the technical horticultural verb 'to graft.' 'Into' matches
    εἰς and the image of insertion into a cultivated tree. 'Among' belongs more naturally
    to v. 17, not here.
- source_word: καλλιέλαιον
  chosen: a cultivated olive tree
  alternatives:
  - a cultivated olive
  - a good olive tree
  lexicon: BDAG
  rationale: The term contrasts with ἀγριέλαιος and refers to the cultivated/domesticated
    olive. 'Cultivated olive tree' is clearer and less evaluative than 'good olive
    tree.'
- source_word: πόσῳ μᾶλλον
  chosen: how much more
  alternatives:
  - much more then
  - how much more so
  lexicon: BDAG
  rationale: This is the standard idiomatic rendering of the a fortiori expression.
- source_word: οὗτοι οἱ κατὰ φύσιν
  chosen: these, the natural branches
  alternatives:
  - these, who are natural
  - these, the ones according to nature
  lexicon: BDAG
  rationale: Although 'branches' is not explicitly present in Greek, it is strongly
    implied by the olive-tree grafting metaphor and by the immediate context in Romans
    11. Supplying it yields natural English while preserving the sense of those who
    belong by nature to the cultivated tree, namely ethnic Israel.
- source_word: ἐγκεντρισθήσονται
  chosen: will be grafted
  alternatives:
  - will be grafted in
  - will be grafted back
  lexicon: BDAG
  rationale: Future passive of ἐγκεντρίζω. 'Will be grafted' is the core sense. 'Back'
    is interpretively true in context, but not explicit in the verb itself, so it
    is omitted from the main text.
- source_word: τῇ ἰδίᾳ ἐλαίᾳ
  chosen: into their own olive tree
  alternatives:
  - into theirown olive tree
  - to their own olive tree
  lexicon: BDAG
  rationale: 'The dative here is best rendered with English ''into'' in keeping with
    the grafting metaphor and the preceding εἰς phrase. ἰδίᾳ emphasizes rightful belonging:
    the tree is ''their own.'''
