theological_decisions:
- issue: Whether to make explicit that 'these' refers to Israel/Jews
  chosen_reading: Keep the referent implicit in the main text as 'these, the natural
    branches' and let the immediate context identify them.
  alternative_readings:
  - these Jews
  - these Israelites
  rationale: Paul's argument in Romans 11 clearly concerns ethnic Israel, but the
    Greek here uses the demonstrative plus the phrase 'according to nature' within
    the olive-tree metaphor rather than an explicit ethnic label. Preserving the metaphor
    in the main text avoids importing more than the verse states while still communicating
    the referent naturally.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
- issue: Whether to supply 'branches' though not explicit in Greek
  chosen_reading: Supply 'branches' in the main text.
  alternative_readings:
  - leave it as 'these, the natural ones'
  rationale: English requires some completion of the metaphor for clarity. Because
    the entire surrounding passage is about branches broken off and grafted in, supplying
    'branches' is a contextually warranted, minimally interpretive expansion consistent
    with optimal equivalence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern
    English, not archaic or academic.'
