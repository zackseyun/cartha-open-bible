theological_decisions:
- issue: Meaning of σάρξ in Paul's self-reference to his ethnic group
  chosen_reading: kinship/ethnic sense preserved as 'my own flesh'
  alternative_readings:
  - my own people
  - my fellow Jews
  rationale: Here σάρξ does not mean 'sinful nature' but Paul's natural kinship group,
    consistent with nearby language in Romans about Israel and 'kinsmen according
    to the flesh.' The main text preserves the Greek metaphor while a footnote clarifies
    the referent.
