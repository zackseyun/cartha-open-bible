id: ROM.11.14
reference: Romans 11:14
source:
  edition: SBLGNT
  text: εἴ πως παραζηλώσω μου τὴν σάρκα καὶ σώσω τινὰς ἐξ αὐτῶν.
translation:
  text: if somehow I may provoke my own flesh to jealousy and save some of them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my own people,' that is, my fellow Jews; literally 'my flesh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ πως
  chosen: if somehow
  alternatives:
  - if by any means
  - if perhaps
  lexicon: BDAG
  rationale: The combination expresses Paul's tentative hope or aim rather than certainty.
    'If somehow' is natural modern English and preserves the sense of uncertainty
    better than the more archaic 'if by any means.'
- source_word: παραζηλώσω
  chosen: I may provoke ... to jealousy
  alternatives:
  - I may make ... jealous
  - I may provoke ... to emulation
  lexicon: BDAG
  rationale: The verb means to arouse jealousy, here echoing the theme of Israel being
    made jealous by Gentile inclusion in the surrounding context. 'Provoke ... to
    jealousy' preserves the verbal force and intertextual resonance better than the
    flatter 'make ... jealous.' The modal 'may' reflects the tentative force of the
    clause in English.
- source_word: μου τὴν σάρκα
  chosen: my own flesh
  alternatives:
  - my own people
  - my fellow Jews
  - my kinsmen according to the flesh
  lexicon: BDAG
  rationale: σάρξ is literally 'flesh,' and the doctrine guidance prefers 'flesh'
    when literal or kinship-based rather than importing a theological paraphrase.
    In this context it refers to Paul's ethnic kin, but 'my own flesh' preserves the
    source expression and its familial/ethnic nuance. A footnote preserves the more
    explicit interpretive sense.
- source_word: σώσω
  chosen: save
  alternatives:
  - rescue
  lexicon: BDAG
  rationale: In Pauline usage this verb regularly carries soteriological weight. 'Save'
    is the standard and most theologically transparent rendering.
- source_word: τινὰς
  chosen: some
  alternatives:
  - some people
  - some of them
  lexicon: BDAG
  rationale: The indefinite pronoun is concise and naturally rendered 'some.' The
    following phrase ἐξ αὐτῶν specifies the group from which these are drawn.
- source_word: ἐξ αὐτῶν
  chosen: of them
  alternatives:
  - from among them
  lexicon: BDAG
  rationale: The phrase indicates a subset drawn from the previously mentioned group.
    'Of them' is idiomatic with 'some' in English; 'from among them' is slightly more
    explicit but less smooth in the main text.
