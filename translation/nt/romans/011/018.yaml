theological_decisions:
- issue: Metaphorical force of root and branches in Paul's olive-tree imagery
  chosen_reading: Retain the metaphor plainly without explicating the identity of
    the root or branches in the main text.
  alternative_readings:
  - Interpret the root explicitly as the patriarchs, Abraham, or the covenant promises
    in translation
  rationale: The Greek text states the metaphor without interpretive expansion. To
    identify the root more specifically in the translation would import commentary
    into the text and reduce the theological openness Paul leaves for readers to infer
    from context.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it; Never import doctrinal claims the text does not make.'
