id: ROM.11.18
reference: Romans 11:18
source:
  edition: SBLGNT
  text: μὴ κατακαυχῶ τῶν κλάδων· εἰ δὲ κατακαυχᾶσαι, οὐ σὺ τὴν ῥίζαν βαστάζεις ἀλλὰ
    ἡ ῥίζα σέ.
translation:
  text: do not boast over the branches. But if you do boast, it is not you who support
    the root, but the root supports you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not boast against the branches.'
    reason: lexical_alternative
  - marker: b
    text: Or 'you do not bear the root, but the root bears you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακαυχῶ / κατακαυχᾶσαι
  chosen: boast over / do boast
  alternatives:
  - boast against
  - exult over
  lexicon: BDAG
  rationale: The verb carries the sense of boasting over or against someone. 'Boast
    over' is idiomatic modern English and preserves the relational superiority implied
    by κατά without sounding wooden. The second occurrence is rendered conditionally
    as 'if you do boast' to match the clause structure.
- source_word: κλάδων
  chosen: the branches
  alternatives:
  - branches
  lexicon: BDAG
  rationale: The article is retained in English because Paul refers to the specific
    branches in the olive-tree metaphor developed in the surrounding context.
- source_word: ῥίζαν / ῥίζα
  chosen: the root
  lexicon: BDAG
  rationale: Rendered consistently in both occurrences to preserve the metaphor of
    source and support in the olive tree image.
- source_word: βαστάζεις
  chosen: support
  alternatives:
  - bear
  - carry
  - sustain
  lexicon: BDAG
  rationale: In this metaphor the sense is not merely physical carrying but providing
    sustaining support. 'Support' communicates the relational dependence clearly in
    contemporary English while remaining close to the image.
- source_word: οὐ σὺ ... ἀλλὰ ἡ ῥίζα σέ
  chosen: it is not you who support the root, but the root supports you
  alternatives:
  - you do not bear the root, but the root bears you
  lexicon: BDAG
  rationale: This construction is emphatic, contrasting 'you' with 'the root.' The
    English cleft-like phrasing preserves the emphasis and the reversal of dependence.
- source_word: μὴ
  chosen: do not
  alternatives:
  - do not keep boasting
  lexicon: BDAG
  rationale: Used with the present imperative to prohibit the action. 'Do not' is
    the most natural direct prohibition in English without overinterpreting aspect.
