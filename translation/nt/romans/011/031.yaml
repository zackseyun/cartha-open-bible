id: ROM.11.31
reference: Romans 11:31
source:
  edition: SBLGNT
  text: οὕτως καὶ οὗτοι νῦν ἠπείθησαν τῷ ὑμετέρῳ ἐλέει ἵνα καὶ αὐτοὶ ⸀νῦν ἐλεηθῶσιν·
translation:
  text: So also these now have been disobedient, so that by the mercy shown to you
    they also may now receive mercy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “through your mercy.” The Greek phrase could be taken more literally
      that way, but in context it most likely refers to the mercy God has shown to
      you.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  chosen: So also
  alternatives:
  - In this way also
  - Likewise
  lexicon: BDAG
  rationale: Introduces an analogy with the preceding statement. 'So also' is concise
    and preserves the inferential/comparative force without sounding wooden.
- source_word: οὗτοι
  chosen: these
  alternatives:
  - these people
  - they
  lexicon: BDAG
  rationale: Retains the demonstrative force referring to Israel in context. 'These'
    is more textually transparent than simply 'they,' though English requires the
    later pronoun as well.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: Marks the present stage in salvation history. 'Now' is natural and preserves
    Paul's temporal contrast.
- source_word: ἠπείθησαν
  chosen: have been disobedient
  alternatives:
  - have been unbelieving
  - have refused to obey
  lexicon: BDAG
  rationale: ἀπειθέω can denote disobedience or unbelief; here 'disobedient' best
    preserves the broader covenantal sense in Romans 9–11 without narrowing it merely
    to intellectual unbelief.
- source_word: τῷ ὑμετέρῳ ἐλέει
  chosen: by the mercy shown to you
  alternatives:
  - through your mercy
  - because of the mercy given to you
  lexicon: BDAG
  rationale: The dative phrase is somewhat compressed in Greek. 'By the mercy shown
    to you' makes explicit that the mercy is God's mercy received by the Gentile believers,
    not mercy exercised by them, which best fits the argument of the chapter.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Expresses purpose/result in idiomatic modern English while preserving
    the clause relationship.
- source_word: αὐτοὶ
  chosen: they also
  alternatives:
  - they themselves also
  - even they
  lexicon: BDAG
  rationale: Keeps the emphatic inclusion of Israel in the divine purpose without
    overloading the English.
- source_word: νῦν
  chosen: now
  alternatives:
  - at present
  lexicon: BDAG
  rationale: The second νῦν is retained to mirror the Greek emphasis on the present
    moment of mercy.
- source_word: ἐλεηθῶσιν
  chosen: may now receive mercy
  alternatives:
  - may be shown mercy
  - may obtain mercy
  lexicon: BDAG
  rationale: Passive form indicates mercy bestowed by God. 'Receive mercy' is clear
    modern English and avoids an overly stiff passive while preserving the sense.
