theological_decisions:
- issue: Whether 'your mercy' refers to mercy exercised by Gentile believers or mercy
    granted to them by God
  chosen_reading: the mercy shown to you
  alternative_readings:
  - your mercy
  rationale: In Romans 11:30–32 Paul contrasts groups who were disobedient and then
    received divine mercy. The flow favors God's mercy granted to the Gentiles as
    the means by which Israel too will receive mercy. Rendering the phrase as mercy
    shown to the Gentile audience avoids implying that human mercy is the primary
    agent in view.
  doctrine_reference: Translation philosophy §1, §3
