id: ROM.11.16
reference: Romans 11:16
source:
  edition: SBLGNT
  text: εἰ δὲ ἡ ἀπαρχὴ ἁγία, καὶ τὸ φύραμα· καὶ εἰ ἡ ῥίζα ἁγία, καὶ οἱ κλάδοι.
translation:
  text: Now if the firstfruits are holy[a], so is the whole batch of dough; and if the root is holy, so are the branches.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the lump.' The Greek φύραμα refers to a mass or mixture of dough.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαρχὴ
  chosen: firstfruits
  alternatives:
  - first portion
  - first offering
  lexicon: BDAG
  rationale: Retains the cultic and covenantal sense of the first portion offered to God, echoing OT firstfruits language. 'Firstfruits' is more theologically precise than a flattened 'first portion.'
- source_word: ἁγία
  chosen: holy
  alternatives:
  - consecrated
  - set apart
  lexicon: BDAG
  rationale: '''Holy'' preserves the biblical category and keeps the parallelism intact in both clauses. ''Consecrated'' or ''set apart'' capture aspects of meaning but are less natural in this compact proverb-like statement.'
- source_word: φύραμα
  chosen: the whole batch of dough
  alternatives:
  - the lump
  - the batch
  lexicon: BDAG
  rationale: The noun refers to dough mixture or lump. 'The whole batch of dough' makes the image clear in modern English while preserving the contrast between the first portion and the remainder. 'The lump' is more traditional but less transparent to contemporary readers.
- source_word: ῥίζα
  chosen: root
  lexicon: BDAG
  rationale: Straightforward botanical metaphor; 'root' is the natural and precise rendering.
- source_word: κλάδοι
  chosen: branches
  alternatives:
  - boughs
  lexicon: BDAG
  rationale: Standard rendering for the botanical image and consistent with the surrounding olive-tree metaphor in Romans 11.
- source_word: εἰ δὲ ... καὶ ...; καὶ εἰ ... καὶ ...
  chosen: Now if ... so is ...; and if ... so are ...
  alternatives:
  - if ... then ...
  - if ... also ...
  lexicon: Greek grammar
  rationale: The Greek omits the verb in the second member of each clause, creating a concise analogy. Supplying 'so is/so are' in English makes the logic explicit and readable without adding interpretive content. 'Now' reflects δέ as a mild connective in context.
