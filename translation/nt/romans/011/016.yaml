theological_decisions:
- issue: Nature of holiness in the metaphors of firstfruits/root and batch/branches
  chosen_reading: Render 'holy' without specifying whether the holiness is covenantal, representative, or saving.
  alternative_readings:
  - consecrated in a covenantal sense
  - made holy in a salvific sense
  rationale: Paul's analogy supports a derivative relation between the first portion and the whole, and between root and branches, but the verse itself does not explicitly define the exact mode of holiness. The translation preserves the theological tension rather than resolving it toward sacramental, ethnic, or individual-salvific conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
