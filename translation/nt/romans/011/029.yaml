theological_decisions:
- issue: Scope of 'the gifts and the calling of God' in context
  chosen_reading: Retain the phrase without specifying in translation whether it refers narrowly to Israel's privileges/calling or more broadly to God's gracious calling.
  alternative_readings:
  - A specific reference to Israel's covenantal privileges and calling in Romans 9–11
  - A broader principle about God's gracious gifts and calling generally
  rationale: The immediate context in Romans 11 strongly concerns Israel, but the Greek phrase itself does not explicitly restate the object. The translation should preserve Paul's wording and not import a narrower or broader doctrinal conclusion into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
