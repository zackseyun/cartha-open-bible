id: ROM.11.23
reference: Romans 11:23
source:
  edition: SBLGNT
  text: κἀκεῖνοι δέ, ἐὰν μὴ ⸀ἐπιμένωσι τῇ ἀπιστίᾳ, ἐγκεντρισθήσονται· δυνατὸς γάρ ⸂ἐστιν ὁ θεὸς⸃ πάλιν ἐγκεντρίσαι αὐτούς.
translation:
  text: And even they[a], if they do not continue in unbelief, will be grafted in[b]; for God is able to graft them in again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'if they do not remain in unfaithfulness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to graft them back in.' The Greek explicitly says 'again' in the second clause.
    reason: alternative_reading
lexical_decisions:
- source_word: κἀκεῖνοι
  chosen: even they
  alternatives:
  - those also
  - they too
  lexicon: BDAG
  rationale: Conveys the additive force of καί with the demonstrative/pronominal sense of ἐκεῖνοι in context, referring back to the unbelieving branches/Israelites. 'Even they' captures the surprising inclusion implied by the argument.
- source_word: ἐὰν μὴ ἐπιμένωσι
  chosen: if they do not continue
  alternatives:
  - if they do not remain
  - if they do not persist
  lexicon: BDAG
  rationale: ἐάν with present subjunctive gives a future-more-vivid conditional. ἐπιμένω here denotes continuing or persisting in a state. 'Continue' is idiomatic and preserves the durative aspect better than a punctiliar English verb.
- source_word: τῇ ἀπιστίᾳ
  chosen: in unbelief
  alternatives:
  - in lack of faith
  - in unfaithfulness
  lexicon: BDAG
  rationale: Dative after ἐπιμένω is naturally rendered with 'in.' In this Romans context, ἀπιστία most directly denotes unbelief, especially refusal to believe the gospel, rather than the broader 'unfaithfulness.'
- source_word: ἐγκεντρισθήσονται
  chosen: will be grafted in
  alternatives:
  - will be grafted back in
  - will be engrafted
  lexicon: BDAG
  rationale: Future passive of ἐγκεντρίζω in the olive-tree metaphor. 'Grafted in' is clear modern English. 'Back in' is not explicit in this verb itself and is better reserved for πάλιν later in the verse.
- source_word: δυνατὸς
  chosen: able
  alternatives:
  - powerful enough
  - capable
  lexicon: BDAG
  rationale: Predicate adjective with ἐστιν. 'Able' is the most natural English equivalent in this construction and preserves the emphasis on divine capability without overexpansion.
- source_word: πάλιν
  chosen: again
  alternatives:
  - back
  - once more
  lexicon: BDAG
  rationale: πάλιν explicitly marks restoration/repetition. 'Again' is the most straightforward rendering and supplies the sense that might otherwise be imported into the earlier passive verb.
- source_word: ἐγκεντρίσαι
  chosen: to graft them in
  alternatives:
  - to graft them back in
  - to engraft them
  lexicon: BDAG
  rationale: Aorist infinitive complementing 'able.' Repeating 'graft them in' maintains the metaphor and verbal consistency with ἐγκεντρισθήσονται. The restorative nuance is sufficiently conveyed by 'again'.
- source_word: δὲ
  chosen: And
  alternatives:
  - But
  - Now
  lexicon: BDAG
  rationale: δέ here continues and contrasts with the previous statement while advancing the argument. 'And' gives smooth English discourse flow without overstating adversative force; the contrast is already clear from context.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Subject explicitly stated for emphasis. Standard rendering with no need for expansion.
