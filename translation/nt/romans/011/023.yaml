theological_decisions:
- issue: Nature of ἀπιστία in this context
  chosen_reading: Rendered as 'unbelief' referring to refusal to believe, especially in Paul's olive-tree argument about Israel.
  alternative_readings:
  - unfaithfulness
  rationale: While ἀπιστία can in some contexts shade toward 'unfaithfulness,' Romans 11 repeatedly contrasts belief and unbelief in relation to inclusion in God's people. 'Unbelief' best preserves Paul's immediate argument without importing a broader covenantal category beyond the text's plain sense.
  doctrine_reference: Preserve theological tension rather than resolve it; contested term πίστις defaults do not directly govern ἀπιστία, but the belief/unbelief contrast is maintained.
- issue: Whether to make restoration explicit in the first grafting verb
  chosen_reading: Kept 'will be grafted in' in the first clause and expressed restoration with 'again' in the second clause.
  alternative_readings:
  - will be grafted back in
  rationale: The Greek places πάλιν only in the second clause. Rendering the first verb as 'back in' would front-load an element not explicit there. The verse's restorative sense is still fully preserved by 'again' later in the sentence.
  doctrine_reference: 'Translation philosophy: original-language primacy and preserve what the source text explicitly marks.'
