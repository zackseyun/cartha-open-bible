theological_decisions:
- issue: Meaning of προέγνω in relation to divine election
  chosen_reading: foreknew
  alternative_readings:
  - knew beforehand
  - foreloved
  - chose beforehand
  rationale: The verse participates in broader Pauline discussions of election, but
    the translation should not resolve that theological debate beyond the lexical
    data. 'Foreknew' preserves the Greek wording and theological tension rather than
    importing a specific doctrinal interpretation.
  doctrine_reference: Translation philosophy §3; Affirmations on not advocating denominational
    distinctives unless unambiguous
