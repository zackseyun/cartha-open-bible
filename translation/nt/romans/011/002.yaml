id: ROM.11.2
reference: Romans 11:2
source:
  edition: SBLGNT
  text: οὐκ ἀπώσατο ὁ θεὸς τὸν λαὸν αὐτοῦ ὃν προέγνω. ἢ οὐκ οἴδατε ἐν Ἠλίᾳ τί λέγει
    ἡ γραφή, ὡς ἐντυγχάνει τῷ θεῷ κατὰ τοῦ ⸀Ἰσραήλ;
translation:
  text: God has not rejected his people, whom he foreknew. Or do you not know what
    the Scripture says in the passage about Elijah, how he appeals to God against
    Israel?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'in Elijah,' an idiom meaning 'in the passage about Elijah.'
    reason: lexical_alternative
  - marker: b
    text: Or 'how he pleads with God against Israel.'
    reason: lexical_alternative
  - marker: c
    text: '''Foreknew'' could also be rendered ''knew beforehand''; some interpret
      it more strongly as implying prior choice, but the Greek term itself is left
      untranslated in that theological tension here.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπώσατο
  chosen: has not rejected
  alternatives:
  - has not cast off
  - has not pushed away
  lexicon: BDAG
  rationale: Aorist middle of ἀπωθέομαι in this context means to reject or cast off.
    'Rejected' is clear modern English and fits Paul's denial that God has repudiated
    Israel.
- source_word: λαὸν αὐτοῦ
  chosen: his people
  alternatives:
  - his people Israel
  lexicon: BDAG
  rationale: λαός commonly means 'people,' especially covenant people. 'His people'
    preserves the covenantal sense without adding 'Israel' into the first clause,
    since Israel is named explicitly later in the verse.
- source_word: προέγνω
  chosen: foreknew
  alternatives:
  - knew beforehand
  - chose beforehand
  lexicon: BDAG
  rationale: The verb literally means 'knew beforehand.' 'Foreknew' preserves the
    established theological and lexical force without importing the stronger interpretive
    gloss 'chose beforehand' into the main text.
- source_word: ἢ οὐκ οἴδατε
  chosen: Or do you not know
  alternatives:
  - Or do you not know?
  - Or do you not realize
  lexicon: BDAG
  rationale: This introduces a rhetorical question. 'Do you not know' is a natural
    and sufficiently formal rendering of Paul's idiom.
- source_word: ἐν Ἠλίᾳ
  chosen: in the passage about Elijah
  alternatives:
  - in Elijah
  - in the section about Elijah
  lexicon: BDAG
  rationale: This idiom refers to the scriptural section concerning Elijah, not spatial
    location. Rendering the sense avoids an opaque literalism in English.
- source_word: ἡ γραφή
  chosen: the Scripture
  alternatives:
  - the scripture
  - the writing
  lexicon: BDAG
  rationale: In Pauline usage γραφή refers to sacred Scripture. Capitalized singular
    is idiomatic in English Bible translation.
- source_word: ὡς ἐντυγχάνει τῷ θεῷ
  chosen: how he appeals to God
  alternatives:
  - how he intercedes with God
  - how he pleads with God
  lexicon: BDAG
  rationale: ἐντυγχάνω can mean appeal, petition, or intercede. Because the following
    phrase is hostile ('against Israel'), 'appeals to God' best fits the context without
    suggesting positive intercession.
- source_word: κατὰ τοῦ Ἰσραήλ
  chosen: against Israel
  alternatives:
  - against the people of Israel
  lexicon: BDAG
  rationale: κατά with the genitive here is adversative, 'against.' 'Israel' is retained
    as the proper covenant name.
