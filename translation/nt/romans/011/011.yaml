id: ROM.11.11
reference: Romans 11:11
source:
  edition: SBLGNT
  text: Λέγω οὖν, μὴ ἔπταισαν ἵνα πέσωσιν; μὴ γένοιτο· ἀλλὰ τῷ αὐτῶν παραπτώματι ἡ σωτηρία τοῖς ἔθνεσιν, εἰς τὸ παραζηλῶσαι αὐτούς.
translation:
  text: So I say[a], they did not stumble so as to fall, did they? May it never be! Rather, by their trespass salvation has come to the Gentiles[d][c][b], to make them jealous.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'so that they might fall'—the Greek distinguishes 'stumble' from 'fall,' and the question expects the answer no.
    reason: lexical_alternative
  - marker: b
    text: Or 'through their transgression.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'the nations'; in this context, 'Gentiles' means the non-Jewish peoples.
    reason: lexical_alternative
  - marker: d
    text: Or 'to provoke them to jealousy'; the sense may include stirring them to seek the same salvation.
    reason: alternative_reading
lexical_decisions:
- source_word: Λέγω οὖν
  chosen: So I say
  alternatives:
  - I ask then
  - Therefore I say
  lexicon: BDAG
  rationale: λέγω in this discourse-setting introduces Paul's rhetorical question. 'So I say' is natural modern English and preserves the inferential force of οὖν without overformal stiffness.
- source_word: μὴ ἔπταισαν
  chosen: they did not stumble ... did they?
  alternatives:
  - did they stumble?
  - they have not stumbled, have they?
  lexicon: BDAG
  rationale: μή with the indicative in a rhetorical question expects a negative answer. Rendering with an English tag question best captures the force. The aorist ἔπταισαν is represented simply as 'did ... stumble' rather than a perfective English form.
- source_word: ἵνα πέσωσιν
  chosen: so as to fall
  alternatives:
  - in order that they might fall
  - so that they would fall completely
  lexicon: BDAG
  rationale: ἵνα + subjunctive here expresses result/purpose in the rhetorical question. 'So as to fall' is concise and preserves the distinction between stumbling (πταίω) and falling (πίπτω) without importing the stronger idea of irreversible ruin into the main text.
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - By no means!
  - Certainly not!
  lexicon: BDAG
  rationale: Paul's stock repudiation is emphatic. 'May it never be!' preserves the optative force and strong rejection better than the flatter 'By no means,' while remaining idiomatic.
- source_word: τῷ αὐτῶν παραπτώματι
  chosen: by their trespass
  alternatives:
  - through their transgression
  - by their offense
  lexicon: BDAG
  rationale: παράπτωμα in Paul often denotes a false step or transgression. 'Trespass' is clear, morally weighty, and resonates with the stumble/fall imagery without being overly technical. The dative is rendered instrumentally as 'by'.
- source_word: ἡ σωτηρία
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: σωτηρία in Romans carries soteriological weight; 'salvation' is the standard and most theologically appropriate rendering here.
- source_word: τοῖς ἔθνεσιν
  chosen: to the Gentiles
  alternatives:
  - to the nations
  lexicon: BDAG
  rationale: In Pauline Jewish-Gentile contrast, ἔθνη commonly refers to non-Jews. 'Gentiles' best communicates the contextual sense in Romans 9–11, while 'nations' is preserved as an alternative.
- source_word: εἰς τὸ παραζηλῶσαι αὐτούς
  chosen: to make them jealous
  alternatives:
  - to provoke them to jealousy
  - to stir them to emulation
  lexicon: BDAG
  rationale: The articular infinitive with εἰς expresses purpose/result. παραζηλόω can mean provoke to jealousy or emulation. 'To make them jealous' is idiomatic and concise; the fuller alternative is preserved in a footnote because the nuance may include a positive provocation toward seeking the same salvation.
