theological_decisions:
- issue: Whether Israel's stumbling is portrayed as final or irreversible
  chosen_reading: The verse denies that their stumbling had the purpose/result of final fall.
  alternative_readings:
  - The verse denies only immediate collapse, not necessarily final ruin.
  - The verse implies a complete but temporary fall.
  rationale: The paired verbs πταίω ('stumble') and πίπτω ('fall') are kept distinct in translation to preserve Paul's rhetorical denial of a terminal outcome for Israel. The main text avoids interpretive additions such as 'completely' or 'beyond recovery,' though those ideas are discussed by interpreters in context.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of jealousy language in salvation history
  chosen_reading: The Gentiles' reception of salvation is presented as serving the purpose of provoking Israel to jealousy.
  alternative_readings:
  - Provoking envy in a purely negative sense
  - Provoking emulation or desire for the same blessing
  rationale: παραζηλόω can carry the sense of arousing jealousy that leads to emulation. The main text uses ordinary 'jealous' language, while a footnote preserves the more explicit alternative nuance so as not to flatten Paul's salvation-historical logic.
  doctrine_reference: Preserve theological tension rather than resolve it.
