theological_decisions:
- issue: Nature of διαθήκη in Pauline citation of prophetic promise
  chosen_reading: covenant
  alternative_readings:
  - testament
  rationale: The verse echoes Isaiah/Jeremiah covenant language about God's redemptive promise to Israel. Rendering as 'covenant' preserves the intertextual and theological frame without importing later testamentary notions.
  doctrine_reference: Translation philosophy §1, §5
- issue: Temporal force of ὅταν ἀφέλωμαι
  chosen_reading: when I take away their sins
  alternative_readings:
  - whenever I take away their sins
  rationale: The context is a salvation-historical promise, not a repeated general condition. 'When' preserves the prophetic certainty without over-specifying timing.
  doctrine_reference: Translation philosophy §3
