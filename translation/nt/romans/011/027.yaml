id: ROM.11.27
reference: Romans 11:27
source:
  edition: SBLGNT
  text: καὶ αὕτη αὐτοῖς ἡ παρ’ ἐμοῦ διαθήκη, ὅταν ἀφέλωμαι τὰς ἁμαρτίας αὐτῶν.
translation:
  text: And this will be my covenant with them[a], when I take away their sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the covenant from me to them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διαθήκη
  chosen: covenant
  alternatives:
  - testament
  - agreement
  lexicon: BDAG
  rationale: In Pauline and scriptural citation context, διαθήκη carries the covenantal sense rooted in God's binding promise, not a last will/testament. 'Covenant' preserves the OT allusion and theological weight.
- source_word: ἡ παρ’ ἐμοῦ διαθήκη
  chosen: my covenant
  alternatives:
  - the covenant from me
  - the covenant on my part
  lexicon: BDAG
  rationale: The phrase literally means 'the covenant from me.' In idiomatic English, 'my covenant' best conveys divine source and possession without awkwardness, while preserving that the covenant originates with God.
- source_word: αὐτοῖς
  chosen: with them
  alternatives:
  - to them
  - for them
  lexicon: BDAG
  rationale: Although formally dative ('to/for them'), with διαθήκη English idiom normally uses 'with them' to express covenant relationship. This is a context-driven adjustment for natural English.
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Here ὅταν introduces the time at which the covenant promise is realized, not repeated indefinite occasions. 'When' fits the prophetic, salvation-historical sense.
- source_word: ἀφέλωμαι
  chosen: I take away
  alternatives:
  - I remove
  - I take off
  lexicon: BDAG
  rationale: ἀφαιρέω here refers to removing sins. 'Take away' is the most natural English equivalent and echoes biblical idiom for the removal of sin.
- source_word: ἁμαρτίας
  chosen: sins
  alternatives:
  - sinful acts
  - offenses
  lexicon: BDAG
  rationale: The plural noun is best rendered straightforwardly as 'sins,' preserving both lexical simplicity and the moral-theological sense.
- source_word: καὶ αὕτη
  chosen: And this will be
  alternatives:
  - And this is
  - And this shall be
  lexicon: BDAG
  rationale: Though no explicit future verb appears, the clause is elliptical in a prophetic citation context. English normally supplies 'will be' to make the sentence complete and to reflect the forward-looking promise.
