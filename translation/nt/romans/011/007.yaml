theological_decisions:
- issue: Meaning of ἡ ἐκλογὴ in context
  chosen_reading: Rendered as 'the elect' (the people chosen by God), not the abstract
    noun 'election.'
  alternative_readings:
  - the election
  - the chosen
  rationale: The clause contrasts a subset within Israel with 'the rest,' indicating
    persons rather than an abstract principle. This preserves Paul's distinction without
    importing a denominational system beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: Voice and agency in ἐπωρώθησαν
  chosen_reading: Kept the passive 'were hardened' without specifying the agent.
  alternative_readings:
  - God hardened them
  - they hardened themselves
  rationale: The Greek passive leaves the agent unstated here. To preserve theological
    tension, the translation does not resolve whether the emphasis is divine judicial
    action, human culpability, or both; surrounding context may inform interpretation,
    but this clause itself does not explicitly specify the agent.
  doctrine_reference: Translation philosophy §3
