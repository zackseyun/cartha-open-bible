id: ROM.11.7
reference: Romans 11:7
source:
  edition: SBLGNT
  text: τί οὖν; ὃ ἐπιζητεῖ Ἰσραήλ, τοῦτο οὐκ ἐπέτυχεν, ἡ δὲ ἐκλογὴ ἐπέτυχεν· οἱ δὲ
    λοιποὶ ἐπωρώθησαν,
translation:
  text: What then? Israel did not obtain what it is seeking, but the elect obtained
    it, and the rest were hardened,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the election obtained it.' The Greek ἐκλογή is literally 'election'
      or 'choice,' but here likely stands for the people chosen.
    reason: lexical_alternative
  - marker: b
    text: Or 'were made callous.' The verb can denote being hardened or rendered spiritually
      insensitive.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί οὖν
  chosen: What then?
  alternatives:
  - What therefore?
  - So what then?
  lexicon: BDAG
  rationale: Standard inferential-rhetorical formula in Paul introducing a conclusion
    or implication from the preceding argument. 'What then?' is idiomatic modern English
    and preserves the rhetorical force without sounding wooden.
- source_word: ὃ ἐπιζητεῖ
  chosen: what it is seeking
  alternatives:
  - what it seeks
  - what it is searching for
  lexicon: BDAG
  rationale: The neuter singular relative pronoun with ἐπιζητέω refers to the object
    of Israel's pursuit. 'Is seeking' captures the present tense's ongoing aspect
    naturally in English; 'what it seeks' is possible but slightly less vivid.
- source_word: Ἰσραήλ
  chosen: Israel
  lexicon: BDAG
  rationale: Proper name retained by transliteration. In context Paul speaks corporately
    of ethnic/national Israel rather than the patriarch individually.
- source_word: τοῦτο οὐκ ἐπέτυχεν
  chosen: did not obtain
  alternatives:
  - did not attain
  - did not achieve
  lexicon: BDAG
  rationale: ἐπιτυγχάνω here means to attain or obtain what is sought. 'Obtain' fits
    the object pursued and reads naturally with the repeated verb later in the verse,
    preserving Paul's contrast.
- source_word: ἡ δὲ ἐκλογὴ
  chosen: the elect
  alternatives:
  - the chosen
  - the election
  lexicon: BDAG
  rationale: Although ἐκλογή is literally 'election/choice,' here it functions metonymically
    for the people characterized by God's choosing, as shown by the singular verb
    followed by the plural contrast 'the rest were hardened.' 'The elect' is the most
    natural English rendering for the group in view.
- source_word: ἐπέτυχεν
  chosen: obtained it
  alternatives:
  - attained it
  lexicon: BDAG
  rationale: Repeats the same verb as earlier in the verse, so the English should
    also repeat for rhetorical consistency. 'It' is supplied in English from the prior
    clause's object.
- source_word: οἱ δὲ λοιποὶ
  chosen: the rest
  alternatives:
  - the others
  - the remainder
  lexicon: BDAG
  rationale: λοιποί denotes those remaining in contrast to the elect. 'The rest' is
    concise and idiomatic.
- source_word: ἐπωρώθησαν
  chosen: were hardened
  alternatives:
  - were made hard
  - were calloused
  - were blinded
  lexicon: BDAG
  rationale: πωρόω literally involves hardening/callousing and in biblical usage often
    denotes spiritual insensibility. 'Were hardened' best preserves the metaphor and
    intertextual resonance with scriptural hardening language. 'Were blinded' is too
    interpretive for this verb in this verse.
