id: ROM.11.21
reference: Romans 11:21
source:
  edition: SBLGNT
  text: εἰ γὰρ ὁ θεὸς τῶν κατὰ φύσιν κλάδων οὐκ ἐφείσατο, ⸀οὐδὲ σοῦ φείσεται.
translation:
  text: For if God did not spare the branches that were natural, neither will he spare
    you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the natural branches'; literally 'the branches according to nature.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ
  chosen: For if
  alternatives:
  - If indeed
  - For if indeed
  lexicon: BDAG
  rationale: Renders the conditional particle εἰ with the explanatory connective γάρ
    in natural English. 'For if' preserves the argumentative flow from the previous
    verse.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός with the article functioning normally as the
    subject.
- source_word: τῶν κατὰ φύσιν κλάδων
  chosen: the branches that were natural
  alternatives:
  - the natural branches
  - the branches according to nature
  lexicon: BDAG
  rationale: κατὰ φύσιν means 'according to nature' or 'natural.' The phrase refers
    to the naturally belonging branches in Paul's olive-tree metaphor, i.e., ethnic
    Israel in context. 'The branches that were natural' is clear English while preserving
    the metaphor. A more compact 'the natural branches' is possible, but this wording
    keeps the adjectival force explicit.
- source_word: οὐκ ἐφείσατο
  chosen: did not spare
  alternatives:
  - did not refrain from cutting off
  - did not show mercy to
  lexicon: BDAG
  rationale: φείδομαι commonly means 'to spare' or 'to refrain from harming.' 'Did
    not spare' is the established and accurate idiom here, preserving both the severity
    and the verbal parallel with the next clause.
- source_word: οὐδὲ σοῦ φείσεται
  chosen: neither will he spare you
  alternatives:
  - neither will he spare even you
  - he will not spare you either
  lexicon: BDAG
  rationale: 'οὐδὲ links the second clause as a negative continuation: ''neither/nor
    ... either.'' The future middle φείσεται is naturally rendered ''will spare.''
    ''You'' is singular in Greek (σοῦ), addressing the Gentile interlocutor as a representative
    singular; English ''you'' preserves this without awkwardness.'
