theological_decisions:
- issue: Referent of 'the natural branches' in Paul's olive-tree metaphor
  chosen_reading: Retained the metaphor without explicating the referent in the main
    text.
  alternative_readings:
  - Explicitly interpret as ethnic Israel in the translation
  rationale: The immediate context strongly indicates Israel as the referent, but
    Paul states it metaphorically here. To avoid importing interpretation into the
    translation beyond what the Greek explicitly says, the main text preserves 'branches'
    and leaves the referent to context.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source
    text warrants; preserve theological tension rather than resolve it.'
- issue: Force of the warning to 'you'
  chosen_reading: Rendered as a direct warning without adding doctrinal qualifiers
    about perseverance, apostasy, or corporate vs. individual election.
  alternative_readings:
  - Interpret the warning through a specific soteriological framework
  rationale: The verse issues a real warning, but the translation should not resolve
    broader debates between denominational traditions unless the Greek unambiguously
    does so. The singular 'you' is preserved as written, while leaving theological
    systematization to interpretation.
  doctrine_reference: Affirmations section on not advocating a denominational distinctive
    unless the Greek unambiguously supports one reading.
