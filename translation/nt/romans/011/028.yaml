theological_decisions:
- issue: Referent of 'they' in the verse
  chosen_reading: '''They'' refers to ethnic Israel / the Jewish people in Paul''s
    argument of Romans 9–11.'
  alternative_readings:
  - '''They'' refers more narrowly to unbelieving Jews of Paul''s present time'
  rationale: The immediate context concerns Israel corporately, though in the present
    historical situation many are unbelieving. The translation leaves the pronoun
    implicit in English predication without narrowing beyond the Greek, while the
    lexical choices ('enemies,' 'beloved') preserve Paul's corporate and covenantal
    tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sense of 'enemies'
  chosen_reading: The phrase describes their status in relation to the gospel, not
    a denial of God's covenantal love.
  alternative_readings:
  - It means God hates them absolutely
  - It means they are merely socially opposed
  rationale: The verse itself balances 'enemies' with 'beloved,' so the translation
    must preserve both poles without flattening either. Rendering ἐχθροὶ as 'enemies'
    and ἀγαπητοὶ as 'beloved' keeps Paul's paradox intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'the fathers'
  chosen_reading: A reference to the patriarchal ancestors (Abraham, Isaac, Jacob)
    as the basis of covenantal regard.
  alternative_readings:
  - Ancestors in a general ethnic sense
  rationale: In Romans 9–11, 'the fathers' naturally evokes the patriarchs and God's
    promises to them. The main text keeps the literal phrase 'the fathers' rather
    than expanding to 'the patriarchs,' preserving source texture while allowing the
    covenantal sense to remain evident from context.
