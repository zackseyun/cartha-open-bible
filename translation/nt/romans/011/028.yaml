id: ROM.11.28
reference: Romans 11:28
source:
  edition: SBLGNT
  text: κατὰ μὲν τὸ εὐαγγέλιον ἐχθροὶ δι’ ὑμᾶς, κατὰ δὲ τὴν ἐκλογὴν ἀγαπητοὶ διὰ τοὺς
    πατέρας·
translation:
  text: With respect to the gospel, they are enemies for your sake; but with respect
    to election, they are beloved because of the fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'As regards the gospel, they are enemies because of you ... but as regards
      election, they are beloved for the sake of the fathers.'
    reason: lexical_alternative
  - marker: b
    text: '''The fathers'' refers to Israel''s patriarchs, especially Abraham, Isaac,
      and Jacob.'
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ μὲν τὸ εὐαγγέλιον
  chosen: With respect to the gospel
  alternatives:
  - As regards the gospel
  - According to the gospel
  lexicon: BDAG
  rationale: κατά with the accusative here marks a standard or sphere of consideration,
    not motion. 'With respect to' best captures the contrastive framework introduced
    by μέν...δέ in natural English while preserving the formal structure.
- source_word: εὐαγγέλιον
  chosen: gospel
  alternatives:
  - good news
  lexicon: BDAG
  rationale: '''Gospel'' is the established and accurate rendering in Pauline contexts,
    carrying the technical sense of the proclaimed good news about Messiah. ''Good
    news'' is possible but less precise here.'
- source_word: ἐχθροὶ
  chosen: enemies
  alternatives:
  - hostile
  - hated
  lexicon: BDAG
  rationale: 'The nominative plural adjective functions predicatively: ''they are
    enemies.'' This preserves the relational sense in context. ''Hostile'' weakens
    the noun force; ''hated'' would shift the sense from their status in relation
    to the gospel to God''s attitude toward them, which is not required here.'
- source_word: δι’ ὑμᾶς
  chosen: for your sake
  alternatives:
  - because of you
  - on account of you
  lexicon: BDAG
  rationale: διά with the accusative commonly expresses reason or benefit. 'For your
    sake' fits Paul's argument that Israel's present opposition has served the inclusion
    of the Gentiles, while remaining idiomatic English.
- source_word: κατὰ δὲ τὴν ἐκλογὴν
  chosen: but with respect to election
  alternatives:
  - but as regards election
  - but according to election
  lexicon: BDAG
  rationale: Again κατά marks the sphere of consideration. 'Election' is retained
    as the established theological term for ἐκλογή and matches Paul's argument in
    this chapter.
- source_word: ἐκλογὴν
  chosen: election
  alternatives:
  - choice
  - God's choosing
  lexicon: BDAG
  rationale: ἐκλογή in Romans 9–11 refers to God's electing purpose. 'Election' is
    concise and theologically precise; 'choice' is too generic, and 'God's choosing'
    is interpretive expansion beyond the Greek.
- source_word: ἀγαπητοὶ
  chosen: beloved
  alternatives:
  - loved
  - dear
  lexicon: BDAG
  rationale: The adjective denotes being loved, here in relation to God's covenantal
    regard. 'Beloved' preserves both the predicative adjective and the theological
    weight better than the flatter 'loved'.
- source_word: διὰ τοὺς πατέρας
  chosen: because of the fathers
  alternatives:
  - for the sake of the fathers
  - on account of the patriarchs
  lexicon: BDAG
  rationale: διά with the accusative expresses reason/ground. 'Because of the fathers'
    is the most direct rendering. 'The fathers' preserves Paul's covenantal shorthand
    for the patriarchs without adding interpretive material to the main text.
