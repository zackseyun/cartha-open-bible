theological_decisions:
- issue: Divine agency in hardening/judicial insensibility
  chosen_reading: Retain the direct statement 'God gave them a spirit of stupor' without
    softening the subject or converting it into mere permission.
  alternative_readings:
  - God allowed them to have a spirit of stupor
  - God gave over them to stupor
  rationale: The Greek explicitly names God as subject of Ἔδωκεν. To weaken this into
    mere permission would import a theological mitigation not stated in the text.
    At the same time, the translation does not over-specify a doctrinal system beyond
    Paul's wording; it preserves the tension of divine judgment and human responsibility.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it.
