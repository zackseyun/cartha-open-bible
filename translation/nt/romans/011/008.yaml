id: ROM.11.8
reference: Romans 11:8
source:
  edition: SBLGNT
  text: ⸀καθὼς γέγραπται· Ἔδωκεν αὐτοῖς ὁ θεὸς πνεῦμα κατανύξεως, ὀφθαλμοὺς τοῦ μὴ
    βλέπειν καὶ ὦτα τοῦ μὴ ἀκούειν, ἕως τῆς σήμερον ἡμέρας.
translation:
  text: 'just as it is written: “God gave them a spirit of stupor, eyes so as not
    to see and ears so as not to hear, until this very day.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a spirit of deep sleep.” The phrase echoes Isaiah 29:10, though the
      Greek here uses a term meaning dullness or stupefaction.
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς γέγραπται
  chosen: just as it is written
  alternatives:
  - as it is written
  lexicon: BDAG
  rationale: Standard citation formula introducing Scripture. 'Just as' slightly reflects
    καθώς more fully than a bare 'as,' while remaining natural English.
- source_word: Ἔδωκεν
  chosen: gave
  alternatives:
  - has given
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this citation context.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Direct and unambiguous rendering of the subject.
- source_word: πνεῦμα κατανύξεως
  chosen: a spirit of stupor
  alternatives:
  - a spirit of deep sleep
  - a spirit of numbness
  - a spirit of torpor
  lexicon: BDAG, LSJ
  rationale: κατάνυξις denotes a state of dullness, numbness, or stupefaction. 'Stupor'
    is concise, intelligible modern English and fits Paul's sense of judicial spiritual
    insensibility. 'Deep sleep' reflects the Isaiah background but is less precise
    to the Greek noun here, so it is preserved in a footnote as an alternative.
- source_word: ὀφθαλμοὺς τοῦ μὴ βλέπειν
  chosen: eyes not to see
  alternatives:
  - eyes so as not to see
  - eyes that do not see
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ + μή expresses result/purpose in citation
    style. 'Eyes not to see' preserves the compact, solemn cadence of the Greek and
    the scriptural allusion.
- source_word: ὦτα τοῦ μὴ ἀκούειν
  chosen: ears not to hear
  alternatives:
  - ears so as not to hear
  - ears that do not hear
  lexicon: BDAG
  rationale: Parallel to the previous phrase; 'hear' is retained rather than 'listen'
    because ἀκούω here denotes the basic faculty of hearing in a spiritually unresponsive
    sense.
- source_word: ἕως τῆς σήμερον ἡμέρας
  chosen: until this very day
  alternatives:
  - until today
  - to this day
  lexicon: BDAG
  rationale: This idiom points from the scriptural citation to Paul's present. 'This
    very day' preserves the emphatic force and solemnity better than the flatter 'until
    today.'
