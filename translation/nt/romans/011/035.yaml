id: ROM.11.35
reference: Romans 11:35
source:
  edition: SBLGNT
  text: ἢ τίς προέδωκεν αὐτῷ, καὶ ἀνταποδοθήσεται αὐτῷ;
translation:
  text: Or who has first given to him[b][a], and it will be repaid to him?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'who has given to him beforehand.'
    reason: lexical_alternative
  - marker: b
    text: That is, no one has given to God in such a way that God would be obligated to repay.
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  lexicon: BDAG
  rationale: Introduces the next rhetorical question in a series; 'Or' is the natural concise English connective.
- source_word: τίς
  chosen: who
  alternatives:
  - what person
  lexicon: BDAG
  rationale: Interrogative pronoun referring to a person; 'who' is the idiomatic English equivalent in this rhetorical question.
- source_word: προέδωκεν
  chosen: has first given
  alternatives:
  - gave beforehand
  - has given first
  lexicon: BDAG
  rationale: The compound verb conveys giving beforehand or first, echoing the sense of prior contribution that could obligate repayment. 'Has first given' preserves the priority nuance and reads naturally in English.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to God
  lexicon: BDAG
  rationale: Dative pronoun referring back to God in context. The pronoun is retained rather than replacing it with 'God' in order to mirror the Greek wording while remaining clear from context.
- source_word: καὶ
  chosen: and
  alternatives:
  - so that
  lexicon: BDAG
  rationale: Simple coordinating conjunction linking the two clauses. 'And' preserves the formal rhetorical structure.
- source_word: ἀνταποδοθήσεται
  chosen: it will be repaid
  alternatives:
  - he will be repaid
  - it will be paid back
  - it will be returned
  lexicon: BDAG
  rationale: Future passive of 'repay/return in exchange.' An impersonal passive, 'it will be repaid,' best captures the Greek without adding an explicit subject not present in the text. This also preserves the sense that what was supposedly given would be recompensed.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - to God
  lexicon: BDAG
  rationale: Repeated dative pronoun retained for fidelity to the Greek and to preserve the rhetorical parallelism of the verse.
