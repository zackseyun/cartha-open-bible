id: ROM.11.26
reference: Romans 11:26
source:
  edition: SBLGNT
  text: καὶ οὕτως πᾶς Ἰσραὴλ σωθήσεται· καθὼς γέγραπται· Ἥξει ἐκ Σιὼν ὁ ⸀ῥυόμενος, ἀποστρέψει ἀσεβείας ἀπὸ Ἰακώβ.
translation:
  text: 'And in this way all Israel will be saved[a], just as it is written: “The Deliverer will come from Zion[c][b]; he will turn away ungodliness from Jacob.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “And thus all Israel will be saved.” The Greek οὕτως can be rendered “thus/so,” but here it likely means “in this way,” pointing to the manner just described.
    reason: lexical_alternative
  - marker: b
    text: “All Israel” is a disputed phrase in interpretation; the translation preserves the Greek wording without deciding whether Paul means ethnic Israel as a whole, the believing remnant, or the full people of God.
    reason: alternative_reading
  - marker: c
    text: Some English versions render ἐκ Σιὼν as “out of Zion.”
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: in this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Rendered as 'in this way' to preserve the adverb's manner sense, pointing back to the process just described in context rather than merely marking result ('and so'). This avoids importing a specific theological scheme while reflecting the Greek more precisely.
- source_word: πᾶς Ἰσραήλ
  chosen: all Israel
  alternatives:
  - the whole of Israel
  lexicon: BDAG
  rationale: Kept the traditional and most natural rendering of the phrase. The Greek lacks an article, but English idiom does not require one here. The phrase is left interpretively open rather than narrowed to ethnic, remnant, or church-only readings in translation.
- source_word: σωθήσεται
  chosen: will be saved
  alternatives:
  - will be delivered
  lexicon: BDAG
  rationale: The future passive of σῴζω in Pauline usage commonly carries salvific force; 'will be saved' preserves that theological weight. 'Will be delivered' is possible but weaker and less fitting in this context.
- source_word: καθὼς γέγραπται
  chosen: just as it is written
  alternatives:
  - as it is written
  lexicon: BDAG
  rationale: A standard citation formula. 'Just as' slightly highlights the correspondence between Paul's claim and Scripture without overtranslating.
- source_word: Ἥξει
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: '''Will come'' is idiomatic and suits prophetic citation style better than the more prosaic ''will arrive.'''
- source_word: ἐκ Σιὼν
  chosen: from Zion
  alternatives:
  - out of Zion
  lexicon: BDAG
  rationale: Rendered 'from Zion' as the most natural English equivalent of ἐκ here. 'Out of Zion' is possible and closer formally, but less idiomatic in contemporary English.
- source_word: ὁ ῥυόμενος
  chosen: the Deliverer
  alternatives:
  - the one who delivers
  - the rescuer
  lexicon: BDAG
  rationale: Substantival participle rendered as a title-like expression, 'the Deliverer,' which is both natural English and appropriately weighty in this messianic citation.
- source_word: ἀποστρέψει
  chosen: he will turn away
  alternatives:
  - he will remove
  lexicon: BDAG
  rationale: '''Turn away'' preserves the verbal imagery of causing something to be turned aside, matching the Greek more closely than the more interpretive ''remove.'''
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - godlessness
  - impieties
  lexicon: BDAG
  rationale: '''Ungodliness'' is the standard and clearest rendering for ἀσέβεια in Pauline and citation contexts, preserving moral-religious force.'
- source_word: ἀπὸ Ἰακώβ
  chosen: from Jacob
  alternatives:
  - from Israel
  lexicon: BDAG
  rationale: Translated literally as 'from Jacob,' preserving the scriptural citation's wording and poetic parallelism with 'Israel' in the preceding clause rather than harmonizing the terms.
