theological_decisions:
- issue: Referent of 'all Israel'
  chosen_reading: Retained the phrase 'all Israel' without interpretive expansion.
  alternative_readings:
  - the totality of ethnic Israel
  - the elect remnant within Israel
  - the full people of God including Gentiles
  rationale: The phrase is theologically disputed, but the Greek expression itself should stand without narrowing paraphrase. This preserves theological tension rather than resolving it in translation.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Messianic identity of 'the Deliverer'
  chosen_reading: Capitalized 'Deliverer' as a title in a scriptural citation applied by Paul in a messianic context.
  alternative_readings:
  - the deliverer
  rationale: The citation functions christologically in context, and capitalization in English signals title-like force without adding content absent from the text.
  doctrine_reference: Affirmations; Translation philosophy §2 (Translate titles; transliterate names)
