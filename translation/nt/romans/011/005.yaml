id: ROM.11.5
reference: Romans 11:5
source:
  edition: SBLGNT
  text: οὕτως οὖν καὶ ἐν τῷ νῦν καιρῷ λεῖμμα κατ’ ἐκλογὴν χάριτος γέγονεν·
translation:
  text: So then, at the present time also, there has come to be a remnant according
    to the election of grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'according to gracious election' or 'according to election by grace.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως οὖν καὶ
  chosen: So then ... also
  alternatives:
  - In the same way then ... also
  - Thus then ... also
  lexicon: BDAG
  rationale: οὕτως with οὖν draws an inference from the Elijah example in the preceding
    context; 'So then' captures the logical conclusion in natural English, while καὶ
    is retained as 'also' to mark the parallel with the present time.
- source_word: ἐν τῷ νῦν καιρῷ
  chosen: in the present time
  alternatives:
  - at the present time
  - in the current season
  lexicon: BDAG
  rationale: καιρός here denotes a particular time/era rather than mere clock-time.
    'In the present time' is clear, idiomatic, and preserves Paul's temporal contrast
    between Elijah's day and now.
- source_word: λεῖμμα
  chosen: a remnant
  alternatives:
  - a remainder
  lexicon: BDAG
  rationale: λεῖμμα is a technical-sounding but established biblical term for a surviving
    minority preserved by God. 'Remnant' best fits the OT/Pauline theological context
    and is more natural than 'remainder'.
- source_word: κατ’ ἐκλογὴν χάριτος
  chosen: according to the election of grace
  alternatives:
  - by grace's election
  - according to gracious election
  - chosen by grace
  lexicon: BDAG
  rationale: The phrase is compact and theologically weighty. 'According to the election
    of grace' preserves both ἐκλογή ('election/choice') and χάρις ('grace') without
    collapsing the expression into a looser paraphrase. 'Of grace' is taken as a genitive
    characterizing the election as grounded in grace.
- source_word: γέγονεν
  chosen: has come to be
  alternatives:
  - has arisen
  - has remained
  - exists
  lexicon: BDAG
  rationale: The perfect of γίνομαι indicates a present state resulting from prior
    action. 'Has come to be' preserves the verbal force better than the flatter 'is'
    or the interpretive 'has remained.'
