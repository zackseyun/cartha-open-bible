theological_decisions:
- issue: Rendering ἐκλογή in a doctrinally contested Pauline context
  chosen_reading: election
  alternative_readings:
  - choice
  - chosenness
  rationale: Because ἐκλογή is the standard lexical form behind Pauline discussions
    often rendered 'election,' the translation preserves that term rather than softening
    it. This maintains the text's theological weight without importing a specific
    denominational system; the phrase itself is left as Paul states it, grounded in
    grace.
  doctrine_reference: 'Affirmations; Translation philosophy #3 and #5'
- issue: Relation of grace to election in κατ’ ἐκλογὴν χάριτος
  chosen_reading: the election of grace
  alternative_readings:
  - gracious election
  - election by grace
  rationale: The wording preserves the genitival relationship without over-specifying
    whether Paul emphasizes source, quality, or basis. This keeps the theological
    tension intact rather than resolving it into a narrower doctrinal formula.
  doctrine_reference: 'Translation philosophy #3'
