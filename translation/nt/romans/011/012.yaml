id: ROM.11.12
reference: Romans 11:12
source:
  edition: SBLGNT
  text: εἰ δὲ τὸ παράπτωμα αὐτῶν πλοῦτος κόσμου καὶ τὸ ἥττημα αὐτῶν πλοῦτος ἐθνῶν, πόσῳ μᾶλλον τὸ πλήρωμα αὐτῶν.
translation:
  text: Now if their trespass means riches for the world[a], and their loss means riches for the Gentiles[b], how much more will their fullness mean?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their defeat' or 'their diminishment' for 'their loss.'
    reason: lexical_alternative
  - marker: b
    text: Or 'their full number' or 'their full inclusion' for 'their fullness.'
    reason: alternative_reading
lexical_decisions:
- source_word: παράπτωμα
  chosen: trespass
  alternatives:
  - transgression
  - failure
  lexicon: BDAG
  rationale: παράπτωμα commonly denotes a false step, offense, or trespass. 'Trespass' preserves the moral sense of Israel's offense in context without over-specifying the nuance.
- source_word: πλοῦτος
  chosen: riches
  alternatives:
  - wealth
  - abundance
  lexicon: BDAG
  rationale: In Pauline usage πλοῦτος often carries a figurative sense of abundance or richness of divine blessing. 'Riches' is idiomatic and preserves the metaphor.
- source_word: κόσμου
  chosen: the world
  alternatives:
  - the world order
  - humanity
  lexicon: BDAG
  rationale: κόσμος here refers broadly to the world beyond Israel that benefits from Israel's trespass. 'The world' is the most natural and sufficiently broad rendering.
- source_word: ἥττημα
  chosen: loss
  alternatives:
  - defeat
  - diminishment
  lexicon: BDAG
  rationale: ἥττημα is rare and can denote loss, defeat, or diminution. 'Loss' fits the parallelism with παράπτωμα and avoids prematurely deciding whether the emphasis is numerical reduction or failure; the alternative nuance is preserved in a footnote.
- source_word: ἐθνῶν
  chosen: the Gentiles
  alternatives:
  - the nations
  lexicon: BDAG
  rationale: In Romans, ἔθνη regularly contrasts with Israel/Jews and is best rendered 'Gentiles' in this context. 'Nations' is possible more literally, but would obscure Paul's Jew-Gentile contrast for modern readers.
- source_word: πόσῳ μᾶλλον
  chosen: how much more
  alternatives:
  - by how much more
  - how much greater
  lexicon: BDAG
  rationale: This is a standard comparative idiom introducing an a fortiori argument. 'How much more' is the natural English equivalent.
- source_word: πλήρωμα
  chosen: fullness
  alternatives:
  - full number
  - full inclusion
  - fulfillment
  lexicon: BDAG
  rationale: πλήρωμα can denote fullness, full number, or full measure. 'Fullness' best preserves the Greek's breadth and Paul's deliberate openness here, allowing readers to hear both quantitative and qualitative overtones without over-interpretation; alternatives are preserved in a footnote.
