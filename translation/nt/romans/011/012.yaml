theological_decisions:
- issue: Referent and nuance of 'their fullness' (τὸ πλήρωμα αὐτῶν)
  chosen_reading: Render broadly as 'their fullness' without specifying whether this means Israel's full number, full inclusion, or eschatological restoration.
  alternative_readings:
  - their full number
  - their full inclusion
  - their fulfillment/restoration
  rationale: Paul's wording is compressed and suggestive. A more interpretive rendering would resolve a debated theological question that the Greek itself leaves open in this verse. Following the translation philosophy, the main text preserves the tension and the footnote records the main interpretive options.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
