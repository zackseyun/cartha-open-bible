theological_decisions:
- issue: Rendering ψυχή in an idiomatic threat formula
  chosen_reading: my life
  alternative_readings:
  - my soul
  rationale: In this context the phrase means an attempt on Elijah's life, not a statement about the immaterial soul. Rendering 'my life' avoids importing a theological anthropology issue not intended by the text.
