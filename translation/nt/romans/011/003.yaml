id: ROM.11.3
reference: Romans 11:3
source:
  edition: SBLGNT
  text: Κύριε, τοὺς προφήτας σου ἀπέκτειναν, ⸀τὰ θυσιαστήριά σου κατέσκαψαν, κἀγὼ ὑπελείφθην μόνος, καὶ ζητοῦσιν τὴν ψυχήν μου.
translation:
  text: Lord[a], they killed your prophets, they tore down your altars, and I alone was left, and they are seeking my life.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'they seek my soul'; here the Greek idiom means 'they are seeking my life.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of κύριος used in direct address to God. Per doctrine default, render as 'Lord,' not 'Master' or small-caps 'LORD' in this NT context.
- source_word: ἀπέκτειναν
  chosen: killed
  alternatives:
  - put to death
  - murdered
  lexicon: BDAG
  rationale: Aorist active indicative plural of ἀποκτείνω. 'Killed' is the most natural modern English equivalent; 'murdered' adds a moral nuance not explicit in the verb itself, though context implies hostility.
- source_word: θυσιαστήριά
  chosen: altars
  alternatives:
  - sacrificial altars
  lexicon: BDAG
  rationale: θυσιαστήριον denotes an altar, especially for sacrifice. 'Altars' is sufficiently clear in English; 'sacrificial altars' is more explicit but unnecessarily heavy.
- source_word: κατέσκαψαν
  chosen: tore down
  alternatives:
  - demolished
  - dug down
  - destroyed
  lexicon: BDAG
  rationale: κατασκάπτω literally involves digging down or razing. In context of altars, 'tore down' communicates the destructive action idiomatically in modern English while preserving the concrete sense better than the broader 'destroyed'.
- source_word: κἀγὼ
  chosen: and I
  alternatives:
  - and even I
  lexicon: BDAG
  rationale: Contraction of καὶ ἐγώ. Rendered simply as 'and I'; the emphasis is sufficiently carried by word order in the clause without adding 'even,' which could overstate the emphasis.
- source_word: ὑπελείφθην μόνος
  chosen: I alone was left
  alternatives:
  - I was left alone
  - I alone remain
  lexicon: BDAG
  rationale: Aorist passive with predicate adjective μόνος. 'I alone was left' preserves both the passive sense and the emphasis on Elijah as the sole remaining one in his perception. 'I was left alone' can suggest emotional isolation more than numerical exclusivity.
- source_word: ζητοῦσιν τὴν ψυχήν μου
  chosen: they are seeking my life
  alternatives:
  - they seek my life
  - they are trying to kill me
  lexicon: BDAG
  rationale: ψυχή here refers to life rather than 'soul.' The present tense ζητοῦσιν is well represented by 'are seeking.' 'Trying to kill me' captures the sense but interprets more than the Greek idiom requires.
