theological_decisions:
- issue: Whether to make explicit that the speaker in the citation is God
  chosen_reading: Rendered χρηματισμός as 'the divine response' and retained first-person
    divine speech in the quotation.
  alternative_readings:
  - Rendered more minimally as 'the response' without specifying divine source
  rationale: The context and the OT source make clear that this is God's reply to
    Elijah. Making the divine source explicit reflects the sense of χρηματισμός without
    adding doctrinal content beyond the text.
  doctrine_reference: Translation philosophy §1, §6
- issue: Gender rendering of ἄνδρας
  chosen_reading: men
  alternative_readings:
  - people
  rationale: The source text uses a specifically masculine term. Per the gender-accurate
    policy, the translation preserves that form rather than neutralizing it.
  doctrine_reference: Translation philosophy §4
