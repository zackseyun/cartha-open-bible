id: ROM.11.4
reference: Romans 11:4
source:
  edition: SBLGNT
  text: ἀλλὰ τί λέγει αὐτῷ ὁ χρηματισμός; Κατέλιπον ἐμαυτῷ ἑπτακισχιλίους ἄνδρας,
    οἵτινες οὐκ ἔκαμψαν γόνυ τῇ Βάαλ.
translation:
  text: But what does the divine response say to him? “I have kept for myself seven
    thousand men, who have not bent the knee to Baal.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the answer from God” or “the oracle.”
    reason: lexical_alternative
  - marker: b
    text: Or “I have reserved for myself.”
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηματισμός
  chosen: the divine response
  alternatives:
  - the answer from God
  - the oracle
  - the revelation
  lexicon: BDAG
  rationale: In this context the noun refers to God's authoritative reply to Elijah,
    echoing 1 Kings 19. 'Divine response' is natural English and preserves that the
    response is from God, not merely a human answer. A more literal 'oracle' is possible
    but sounds less natural here.
- source_word: Κατέλιπον
  chosen: I have kept
  alternatives:
  - I left
  - I preserved
  - I have reserved
  lexicon: BDAG
  rationale: 'Although the aorist form is formally past, in this citation God''s speech
    emphasizes the present result of his action: a remnant remains. ''I have kept''
    communicates both the completed action and its continuing significance in idiomatic
    English. ''Reserved'' is traditional and possible, but ''kept'' is clearer for
    modern readers.'
- source_word: ἐμαυτῷ
  chosen: for myself
  alternatives:
  - for me
  - for my own sake
  lexicon: BDAG
  rationale: The reflexive dative indicates that God has kept this remnant for himself.
    'For myself' is the most direct and idiomatic rendering.
- source_word: ἑπτακισχιλίους ἄνδρας
  chosen: seven thousand men
  alternatives:
  - seven thousand people
  - seven thousand males
  lexicon: BDAG
  rationale: The Greek explicitly uses the masculine noun ἄνδρας, not a generic term
    for people. Following the gender-accurate policy, 'men' is retained rather than
    neutralizing to 'people'.
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - such as
  lexicon: BDAG
  rationale: The relative pronoun introduces a defining description of the seven thousand.
    Simple 'who' is sufficient in English without overtranslating the qualitative
    nuance.
- source_word: οὐκ ἔκαμψαν γόνυ
  chosen: have not bent the knee
  alternatives:
  - did not bow the knee
  - have not knelt
  lexicon: BDAG
  rationale: This is an idiom for worshipful submission. 'Bent the knee' preserves
    the imagery and remains understandable in English. The singular 'knee' follows
    the Greek idiom.
- source_word: τῇ Βάαλ
  chosen: to Baal
  alternatives:
  - to the Baal
  lexicon: BDAG
  rationale: Βάαλ is a proper name transliterated into English. Although the Greek
    article appears, English idiom normally omits the article with proper names of
    deities here.
