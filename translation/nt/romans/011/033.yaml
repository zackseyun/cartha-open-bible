id: ROM.11.33
reference: Romans 11:33
source:
  edition: SBLGNT
  text: Ὦ βάθος πλούτου καὶ σοφίας καὶ γνώσεως θεοῦ· ὡς ἀνεξεραύνητα τὰ κρίματα αὐτοῦ
    καὶ ἀνεξιχνίαστοι αἱ ὁδοὶ αὐτοῦ.
translation:
  text: Oh, the depth of the riches and wisdom and knowledge of God! How unsearchable
    are his judgments and untraceable his ways!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Oh, the depth of the riches both of the wisdom and knowledge of God!'
      The Greek syntax allows a tighter connection between 'riches' and the following
      pair, but the main text takes all three nouns together as qualities belonging
      to God.
    reason: alternative_reading
  - marker: b
    text: '''Untraceable'' renders a term meaning ''not capable of being tracked out''
      or ''past tracing out,'' preserving a nuance distinct from ''unsearchable.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ
  chosen: Oh
  alternatives:
  - O
  lexicon: BDAG
  rationale: An exclamatory particle introducing doxological astonishment. 'Oh' is
    natural modern English while preserving the emotional force; 'O' is possible but
    more archaic/liturgical.
- source_word: βάθος
  chosen: depth
  alternatives:
  - deepness
  lexicon: BDAG
  rationale: The noun denotes depth in a literal or figurative sense. Here it metaphorically
    expresses the immeasurable profundity of God's riches, wisdom, and knowledge.
    'Depth' is the standard and most idiomatic rendering.
- source_word: πλούτου
  chosen: riches
  alternatives:
  - wealth
  - abundance
  lexicon: BDAG
  rationale: In Pauline usage πλοῦτος often denotes abundance or richness, frequently
    with theological weight. 'Riches' preserves both the metaphor and the traditional
    Pauline resonance better than 'wealth'.
- source_word: σοφίας
  chosen: wisdom
  lexicon: BDAG
  rationale: Standard rendering for σοφία, referring here to God's wise ordering and
    counsel.
- source_word: γνώσεως
  chosen: knowledge
  lexicon: BDAG
  rationale: Standard rendering for γνῶσις. Distinct from 'wisdom' and therefore kept
    as a separate term rather than merged conceptually.
- source_word: θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: 'The genitive most naturally modifies the preceding nouns: the riches,
    wisdom, and knowledge belonging to God. ''Of God'' preserves the formal structure
    and rhetorical cadence of the Greek.'
- source_word: ὡς
  chosen: How
  alternatives:
  - how very
  - how greatly
  lexicon: BDAG
  rationale: 'In exclamatory usage ὡς introduces the second half of the doxology:
    ''How unsearchable...''. ''How'' is concise and idiomatic.'
- source_word: ἀνεξεραύνητα
  chosen: unsearchable
  alternatives:
  - inscrutable
  - past finding out
  lexicon: BDAG
  rationale: The adjective means not capable of being searched out or fully investigated.
    'Unsearchable' is clear modern English and closely reflects the Greek. 'Inscrutable'
    is possible but less transparent for many readers.
- source_word: κρίματα
  chosen: judgments
  alternatives:
  - decisions
  - decrees
  lexicon: BDAG
  rationale: 'κρίμα can denote judgment, verdict, or decision. ''Judgments'' best
    preserves the breadth here: God''s evaluative acts and determinations, without
    narrowing to formal decrees only.'
- source_word: ἀνεξιχνίαστοι
  chosen: untraceable
  alternatives:
  - inscrutable
  - past tracing out
  - unfathomable
  lexicon: BDAG
  rationale: The adjective denotes what cannot be tracked down or traced. Rendering
    it as 'untraceable' preserves a distinction from ἀνεξεραύνητα ('unsearchable')
    rather than flattening both into the same English word.
- source_word: ὁδοὶ
  chosen: ways
  alternatives:
  - paths
  lexicon: BDAG
  rationale: A common metaphor for God's manner of acting or courses of action. 'Ways'
    is idiomatic and preserves the biblical metaphor.
- source_word: αὐτοῦ
  chosen: his
  lexicon: BDAG
  rationale: The repeated possessive pronoun is rendered straightforwardly in English,
    referring back to God.
