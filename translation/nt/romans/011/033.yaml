theological_decisions:
- issue: Relation of 'of God' to the triad 'riches and wisdom and knowledge'
  chosen_reading: 'The genitive ''of God'' modifies all three nouns: riches, wisdom,
    and knowledge.'
  alternative_readings:
  - '''the depth of the riches both of the wisdom and of the knowledge of God'''
  rationale: 'The Greek sequence can be punctuated and construed in more than one
    way, but the most natural reading in this context is a threefold ascription to
    God: his riches, wisdom, and knowledge. This avoids importing a more elaborate
    syntactical hierarchy not explicit in the text while preserving Paul''s doxological
    accumulation.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Distinguishing the two adjectives ἀνεξεραύνητα and ἀνεξιχνίαστοι
  chosen_reading: 'Use two differentiated English renderings: ''unsearchable'' and
    ''untraceable.'''
  alternative_readings:
  - Render both with near-synonyms such as 'inscrutable'/'inscrutable' or 'unsearchable'/'inscrutable'
  rationale: The Greek uses two related but distinct terms. Preserving the distinction
    reflects the source text's rhetorical richness without overstating a technical
    theological difference.
  doctrine_reference: Translation philosophy §5
