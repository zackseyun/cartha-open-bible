id: ROM.11.30
reference: Romans 11:30
source:
  edition: SBLGNT
  text: ὥσπερ ⸀γὰρ ὑμεῖς ποτε ἠπειθήσατε τῷ θεῷ, νῦν δὲ ἠλεήθητε τῇ τούτων ἀπειθείᾳ,
translation:
  text: For just as you once were disobedient to God[a], but now have received mercy because of their disobedience,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unbelief' for both 'were disobedient' and 'their disobedience'; the Greek terms can carry both senses in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - Just as
  - For as
  lexicon: BDAG
  rationale: The combination introduces an explanatory comparison tied to the surrounding argument. 'For just as' preserves both the comparative force of ὥσπερ and the explanatory connective γάρ in natural English.
- source_word: ὑμεῖς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural, referring to the Gentile audience in context. English 'you' adequately represents the plural here without adding 'you Gentiles,' which would import context into the verse beyond the immediate wording.
- source_word: ποτε
  chosen: once
  alternatives:
  - formerly
  - at one time
  lexicon: BDAG
  rationale: '''Once'' is concise, idiomatic, and captures the past-time contrast with νῦν (''now'').'
- source_word: ἠπειθήσατε
  chosen: were disobedient
  alternatives:
  - disobeyed
  - refused to believe
  lexicon: BDAG
  rationale: From ἀπειθέω, which can denote disobedience and unbelief. In this context, 'were disobedient' best matches the noun ἀπείθεια later in the verse and preserves the moral-relational sense toward God without narrowing it merely to intellectual unbelief.
- source_word: τῷ θεῷ
  chosen: to God
  lexicon: BDAG
  rationale: Standard dative complement with ἀπειθέω, naturally rendered 'disobedient to God.'
- source_word: νῦν δὲ
  chosen: but now
  alternatives:
  - now, however
  - but now
  lexicon: BDAG
  rationale: Marks the strong contrast between former disobedience and present mercy. 'But now' is natural and preserves the adversative force.
- source_word: ἠλεήθητε
  chosen: have received mercy
  alternatives:
  - were shown mercy
  - have been shown mercy
  lexicon: BDAG
  rationale: Passive of ἐλεάω. 'Have received mercy' is idiomatic English and keeps the focus on mercy granted to the addressees. It also fits Paul's salvation-historical contrast. 'Were shown mercy' is possible but slightly less natural here.
- source_word: τῇ τούτων ἀπειθείᾳ
  chosen: because of their disobedience
  alternatives:
  - by their disobedience
  - through their disobedience
  lexicon: BDAG
  rationale: The dative here is best taken instrumentally or causally. 'Because of their disobedience' communicates the sense clearly in English without overstating mechanism. τούτων ('of these') refers to the presently disobedient Israelites in context, naturally rendered 'their.'
