theological_decisions:
- issue: Sense of ἀπειθέω / ἀπείθεια in Pauline salvation context
  chosen_reading: disobedience
  alternative_readings:
  - unbelief
  rationale: The terms can overlap semantically, but 'disobedience' better preserves the lexical connection between verb and noun in this verse and avoids resolving Paul's language into a purely cognitive category. The broader context includes unbelief, but the Greek wording here emphasizes disobedience toward God.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
