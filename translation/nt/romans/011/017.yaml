theological_decisions:
- issue: Metaphorical identity of ἀγριέλαιος
  chosen_reading: Render literally within the olive-tree metaphor as 'a wild olive
    tree' rather than interpretively identifying the addressee as 'a Gentile.'
  alternative_readings:
  - a wild olive shoot
  - a Gentile from a wild olive tree
  rationale: Paul's theological point depends on the horticultural metaphor and its
    relation to Israel and the nations. The translation should preserve the image
    rather than resolve the metaphor into a doctrinal paraphrase.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relation of 'root' and 'richness'
  chosen_reading: 'Express both as objects of shared participation: ''became a fellow
    sharer in the root, in the richness of the olive tree.'''
  alternative_readings:
  - became a sharer in the rich root of the olive tree
  - became a partaker of the root and fatness of the olive tree
  rationale: The Greek piles up genitives in a compressed metaphor. Rather than flattening
    them into a single adjectival phrase, the translation preserves the tension between
    the root and the tree's richness while remaining readable. A more traditional
    'root and fatness' is possible but less natural in modern English.
  doctrine_reference: Translation philosophy §§3, 6
