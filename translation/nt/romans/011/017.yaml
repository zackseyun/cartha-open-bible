id: ROM.11.17
reference: Romans 11:17
source:
  edition: SBLGNT
  text: Εἰ δέ τινες τῶν κλάδων ἐξεκλάσθησαν, σὺ δὲ ἀγριέλαιος ὢν ἐνεκεντρίσθης ἐν
    αὐτοῖς καὶ συγκοινωνὸς τῆς ⸀ῥίζης τῆς πιότητος τῆς ἐλαίας ἐγένου,
translation:
  text: But if some of the branches were broken off, and you, although being a wild
    olive tree, were grafted in among them and became a fellow sharer in the root,
    in the richness of the olive tree,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'were grafted in among those branches.'
    reason: lexical_alternative
  - marker: b
    text: Or 'became a sharer of the root and richness of the olive tree'; traditionally,
      'the root and fatness of the olive tree.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ δέ
  chosen: But if
  alternatives:
  - Now if
  - But if indeed
  lexicon: BDAG
  rationale: Introduces a conditional statement with mild contrast/resumption. 'But
    if' preserves both εἰ and δέ naturally in English.
- source_word: τινες τῶν κλάδων
  chosen: some of the branches
  alternatives:
  - some branches
  - certain of the branches
  lexicon: BDAG
  rationale: τινες is indefinite ('some, certain ones'), and the partitive genitive
    τῶν κλάδων is best represented as 'some of the branches.'
- source_word: ἐξεκλάσθησαν
  chosen: were broken off
  alternatives:
  - were cut off
  lexicon: BDAG
  rationale: Passive aorist of ἐκκλάω in the olive-tree metaphor. 'Broken off' is
    the standard and most precise image for branches removed from a tree; 'cut off'
    is possible but less tied to the branch metaphor.
- source_word: σὺ δὲ
  chosen: and you
  alternatives:
  - but you
  - now you
  lexicon: BDAG
  rationale: Marks contrast with the broken-off branches. In English, after the first
    clause, 'and you' reads smoothly while still preserving the adversative shift
    in context.
- source_word: ἀγριέλαιος ὢν
  chosen: although being a wild olive tree
  alternatives:
  - being a wild olive shoot
  - though you were a wild olive
  lexicon: BDAG
  rationale: The participle ὢν is concessive in sense here ('although being'). ἀγριέλαιος
    denotes a wild olive. Because Paul is speaking to a singular addressee within
    an extended tree metaphor, 'wild olive tree' is literal, though 'wild olive shoot'
    is a plausible contextual alternative.
- source_word: ἐνεκεντρίσθης
  chosen: were grafted in
  alternatives:
  - were grafted
  lexicon: BDAG
  rationale: Passive aorist of ἐγκεντρίζω, a horticultural term. 'Grafted in' is idiomatic
    English and anticipates the following relational phrase.
- source_word: ἐν αὐτοῖς
  chosen: among them
  alternatives:
  - in among them
  - among those branches
  lexicon: BDAG
  rationale: Refers most naturally to the remaining branches within the olive tree
    image. 'Among them' is concise and idiomatic; the more literal 'in among them'
    is possible but less natural.
- source_word: συγκοινωνὸς
  chosen: a fellow sharer
  alternatives:
  - a شریک/partner
  - a fellow participant
  - a co-partaker
  lexicon: BDAG
  rationale: The noun denotes joint participation or sharing with others. 'Fellow
    sharer' preserves the communal sense better than the more abstract 'participant.'
- source_word: τῆς ῥίζης
  chosen: in the root
  alternatives:
  - of the root
  lexicon: BDAG
  rationale: Taken with συγκοινωνός, the sense is participation in what belongs to
    the root. English often requires a preposition for clarity; 'in the root' makes
    the relation intelligible in the metaphor.
- source_word: τῆς πιότητος
  chosen: the richness
  alternatives:
  - the richness/fatness
  - the abundance
  - the nourishing richness
  lexicon: BDAG
  rationale: πιότης literally conveys richness, fatness, or fullness. 'Richness' is
    clear modern English and preserves the metaphorical sense of nourishing abundance
    without awkwardness.
- source_word: τῆς ἐλαίας
  chosen: of the olive tree
  alternatives:
  - of the olive
  lexicon: BDAG
  rationale: English normally supplies 'tree' for clarity in this metaphor. The genitive
    links the richness to the cultivated olive tree as a whole.
- source_word: ἐγένου
  chosen: became
  alternatives:
  - came to be
  - have become
  lexicon: BDAG
  rationale: Aorist middle of γίνομαι, indicating entry into a new state. 'Became'
    is the most direct rendering in context.
