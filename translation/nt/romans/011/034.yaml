theological_decisions:
- issue: Referent of 'the Lord' in the Isaiah-derived quotation
  chosen_reading: Rendered as 'the Lord' without narrowing beyond the text; in Pauline
    context it refers to God and supports the doxological force of God's unsearchable
    wisdom.
  alternative_readings:
  - A more explicitly covenantal rendering tied to the divine name in the Isaiah background
  rationale: The Greek text has κυρίου, and the doctrine guidelines specify the default
    rendering 'Lord.' Because Paul cites Isaiah 40:13 through the Greek tradition,
    the translation preserves the NT wording rather than importing 'the LORD' into
    the main text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
