id: ROM.11.15
reference: Romans 11:15
source:
  edition: SBLGNT
  text: εἰ γὰρ ἡ ἀποβολὴ αὐτῶν καταλλαγὴ κόσμου, τίς ἡ πρόσλημψις εἰ μὴ ζωὴ ἐκ νεκρῶν;
translation:
  text: For if their rejection means reconciliation for the world, what will their
    acceptance mean if not life from the dead?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'receiving.' The Greek term contrasts with 'rejection' and can denote
      being received back or accepted.
    reason: lexical_alternative
  - marker: b
    text: '''Life from the dead'' may refer figuratively to extraordinary spiritual
      renewal, or more specifically to resurrection; Paul leaves the expression compressed
      and evocative.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποβολὴ
  chosen: rejection
  alternatives:
  - casting away
  - loss
  lexicon: BDAG
  rationale: In this context of Israel's present setting aside, 'rejection' best conveys
    the relational sense of being refused or set aside. 'Casting away' is more wooden;
    'loss' is too weak and less personal.
- source_word: καταλλαγὴ
  chosen: reconciliation
  alternatives:
  - restoration to favor
  lexicon: BDAG
  rationale: Standard Pauline sense of restored relationship. 'Reconciliation' is
    both accurate and idiomatic in English.
- source_word: κόσμου
  chosen: the world
  alternatives:
  - the Gentile world
  - the world of humanity
  lexicon: BDAG
  rationale: κόσμος here is broad and should not be narrowed in the main text beyond
    what Paul states. The context includes Gentiles, but 'the world' preserves Paul's
    wider formulation.
- source_word: πρόσλημψις
  chosen: acceptance
  alternatives:
  - receiving
  - reception
  lexicon: BDAG
  rationale: The noun contrasts naturally with ἀποβολή. 'Acceptance' gives a clear
    English antithesis to 'rejection' and fits the sense of Israel being received
    again.
- source_word: ζωὴ ἐκ νεκρῶν
  chosen: life from the dead
  alternatives:
  - life out of the dead
  - resurrection life
  lexicon: BDAG
  rationale: A close, natural rendering that preserves the vividness and possible
    eschatological breadth of the Greek. 'Resurrection life' interprets more than
    translates.
- source_word: εἰ μὴ
  chosen: if not
  alternatives:
  - except
  - but
  lexicon: BDAG
  rationale: In this rhetorical question, εἰ μὴ introduces the expected emphatic answer.
    'If not' is idiomatic and preserves the force without over-paraphrase.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - now
  lexicon: BDAG
  rationale: Maintains the logical connection with the preceding argument in a standard
    Pauline way.
