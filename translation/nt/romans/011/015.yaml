theological_decisions:
- issue: Meaning of 'life from the dead'
  chosen_reading: Retain the phrase as an open eschatological expression without specifying
    whether it refers to Israel's spiritual renewal, general resurrection, or a figurative
    worldwide enlivening.
  alternative_readings:
  - a figurative description of great spiritual revival
  - a reference to the final resurrection
  - a compressed expression encompassing both renewed life and eschatological resurrection
  rationale: Paul's wording is terse and evocative. The translation should preserve
    the theological tension rather than resolve it beyond the Greek. Rendering it
    simply as 'life from the dead' leaves the interpretive possibilities open, in
    keeping with the translation philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
