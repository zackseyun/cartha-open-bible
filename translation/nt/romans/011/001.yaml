id: ROM.11.1
reference: Romans 11:1
source:
  edition: SBLGNT
  text: Λέγω οὖν, μὴ ἀπώσατο ὁ θεὸς τὸν λαὸν αὐτοῦ; μὴ γένοιτο· καὶ γὰρ ἐγὼ Ἰσραηλίτης
    εἰμί, ἐκ σπέρματος Ἀβραάμ, φυλῆς Βενιαμίν.
translation:
  text: So I ask, has God rejected his people? May it never be! For I myself am an
    Israelite, from the offspring of Abraham, of the tribe of Benjamin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'cast off his people.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek: ''May it never be,'' a strong expression of repudiation; also rendered
      ''By no means!'''
    reason: lexical_alternative
  - marker: c
    text: Or 'of the seed of Abraham.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω οὖν
  chosen: So I ask
  alternatives:
  - Therefore I say
  - Then I say
  lexicon: BDAG
  rationale: λέγω here introduces a rhetorical question rather than merely reporting
    speech; 'So I ask' gives natural English while preserving the inferential force
    of οὖν.
- source_word: μὴ ἀπώσατο
  chosen: has ... rejected
  alternatives:
  - has ... cast off
  - has ... pushed away
  lexicon: BDAG
  rationale: The μή with the question expects a negative answer, and ἀπωθέομαι conveys
    rejection/repudiation. 'Rejected' is clear modern English and fits Paul's argument
    about God's relation to Israel.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός; no contextual reason to expand or qualify.
- source_word: τὸν λαὸν αὐτοῦ
  chosen: his people
  alternatives:
  - the people belonging to him
  - his own people
  lexicon: BDAG
  rationale: λαός commonly means 'people,' often covenant people in biblical usage.
    'His people' preserves the possessive covenantal sense without overtranslation.
- source_word: μὴ γένοιτο
  chosen: May it never be!
  alternatives:
  - By no means!
  - Certainly not!
  - Far be it!
  lexicon: BDAG
  rationale: This Pauline repudiation is stronger than a simple 'no.' 'May it never
    be!' preserves the optative force and emphatic rejection in readable English.
- source_word: καὶ γὰρ ἐγὼ
  chosen: For I myself
  alternatives:
  - For even I
  - For I too
  lexicon: BDAG
  rationale: γάρ gives the reason, and ἐγώ is emphatic. 'I myself' reflects Paul's
    self-reference as evidence.
- source_word: Ἰσραηλίτης
  chosen: an Israelite
  alternatives:
  - an Israelite man
  lexicon: BDAG
  rationale: Ethnic/covenantal identifier; 'an Israelite' is the natural English equivalent.
- source_word: ἐκ σπέρματος Ἀβραάμ
  chosen: from the offspring of Abraham
  alternatives:
  - of the seed of Abraham
  - a descendant of Abraham
  lexicon: BDAG
  rationale: σπέρμα is literally 'seed,' but 'offspring' is idiomatic and preserves
    the collective-descendant sense. 'Descendant' is possible, but 'from the offspring
    of Abraham' stays closer to the Greek structure.
- source_word: φυλῆς Βενιαμίν
  chosen: of the tribe of Benjamin
  alternatives:
  - from the tribe of Benjamin
  lexicon: BDAG
  rationale: φυλή is 'tribe.' 'Of the tribe of Benjamin' is a standard and clear genealogical
    expression in English.
