theological_decisions:
- issue: Whether Paul's question should imply total repudiation of ethnic Israel
  chosen_reading: Render the question straightforwardly as 'has God rejected his people?'
    without adding qualifiers such as 'finally' or 'completely.'
  alternative_readings:
  - has God rejected his people completely?
  - has God cast away his people forever?
  rationale: The Greek text itself does not include an explicit adverb such as 'completely'
    or 'forever.' The translation should preserve Paul's rhetorical question and let
    the surrounding context develop its scope, rather than importing a theological
    conclusion into the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
