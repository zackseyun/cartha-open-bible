theological_decisions:
- issue: Scope of 'all' in both clauses
  chosen_reading: Render τοὺς πάντας as 'all' in both instances, preserving Paul's
    symmetrical wording without narrowing or expanding the referent in translation.
  alternative_readings:
  - all people
  - everyone
  - both Jews and Gentiles
  rationale: This verse is often drawn into debates over universal salvation versus
    representative universality. The Greek repeats the same broad expression in both
    clauses, and the translation should preserve that tension rather than resolve
    it. Contextually, Paul has Jews and Gentiles in view, but the wording itself should
    remain as broad as the source text allows.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
