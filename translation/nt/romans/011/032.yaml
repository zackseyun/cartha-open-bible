id: ROM.11.32
reference: Romans 11:32
source:
  edition: SBLGNT
  text: συνέκλεισεν γὰρ ὁ θεὸς τοὺς πάντας εἰς ἀπείθειαν ἵνα τοὺς πάντας ἐλεήσῃ.
translation:
  text: For God has shut up all into disobedience, so that he may show mercy to all.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'consigned all' or 'confined all.'
    reason: lexical_alternative
  - marker: b
    text: '''Disobedience'' can also be rendered ''unbelief'' in some contexts, but
      here the broader sense of refusal to obey is likely intended.'
    reason: lexical_alternative
  - marker: c
    text: The repeated 'all' preserves Paul's wording and should not be prematurely
      narrowed; in context he is discussing Jews and Gentiles together.
    reason: alternative_reading
lexical_decisions:
- source_word: συνέκλεισεν
  chosen: has shut up
  alternatives:
  - consigned
  - imprisoned
  - confined
  lexicon: BDAG
  rationale: The aorist of συγκλείω means to enclose, confine, or shut up together.
    'Has shut up' preserves the concrete metaphor without overinterpreting it as purely
    penal ('imprisoned') or overly idiomatic ('consigned'). The English present perfect
    reads naturally in context while still conveying the completed divine action with
    present relevance.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces an explanation of the preceding argument. 'For' is the
    standard concise connective in English and preserves Paul's argumentative flow.
- source_word: τοὺς πάντας
  chosen: all
  alternatives:
  - all people
  - everyone
  lexicon: BDAG
  rationale: The phrase occurs twice and literally means 'the all'/'all.' In context
    Paul is speaking comprehensively of the groups under discussion (Jews and Gentiles
    together). 'All' preserves the Greek's breadth and rhetorical symmetry without
    prematurely resolving debates about scope by adding 'people' in a way that could
    sound more interpretively loaded.
- source_word: εἰς ἀπείθειαν
  chosen: into disobedience
  alternatives:
  - to disobedience
  - under disobedience
  lexicon: BDAG
  rationale: ἀπείθεια denotes disobedience/unbelief, often with the sense of refusal
    to obey. 'Into disobedience' follows εἰς closely and preserves the movement/result
    nuance of the Greek. 'Unbelief' is possible in some contexts, but here 'disobedience'
    better matches Paul's broader argument and avoids narrowing the term to intellectual
    nonbelief alone.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: ἵνα introduces purpose or result. 'So that' is natural modern English
    and preserves the purposive force without sounding wooden.
- source_word: ἐλεήσῃ
  chosen: he may show mercy
  alternatives:
  - he may have mercy
  - he might show mercy
  lexicon: BDAG
  rationale: ἐλεάω means to show mercy or have mercy. 'Show mercy' is clear contemporary
    English and makes the verbal action explicit. 'May' reflects the subjunctive after
    ἵνα without implying uncertainty in God.
