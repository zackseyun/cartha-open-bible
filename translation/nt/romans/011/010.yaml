id: ROM.11.10
reference: Romans 11:10
source:
  edition: SBLGNT
  text: σκοτισθήτωσαν οἱ ὀφθαλμοὶ αὐτῶν τοῦ μὴ βλέπειν, καὶ τὸν νῶτον αὐτῶν διὰ παντὸς
    σύγκαμψον.
translation:
  text: Let their eyes be darkened so that they do not see, and bend their back continually.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'be blinded.' The Greek literally says 'be darkened,' preserving the
      imagery of darkness from the source text.
    reason: lexical_alternative
  - marker: b
    text: Or 'always.' The phrase can denote continual or constant duration.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκοτισθήτωσαν
  chosen: Let ... be darkened
  alternatives:
  - let ... be blinded
  - become darkened
  lexicon: BDAG
  rationale: A third-person passive imperative/jussive. 'Be darkened' preserves the
    imagery of darkness in the Greek and the Psalm citation background better than
    the more interpretive 'be blinded.' 'Let' conveys the imprecatory/jussive force
    in natural English.
- source_word: οἱ ὀφθαλμοὶ αὐτῶν
  chosen: their eyes
  lexicon: BDAG
  rationale: Straightforward possessive noun phrase; retained literally because the
    bodily imagery is central to the metaphor.
- source_word: τοῦ μὴ βλέπειν
  chosen: so that they do not see
  alternatives:
  - from seeing
  - so as not to see
  lexicon: BDAG
  rationale: The articular infinitive with μή expresses result/purpose. 'So that they
    do not see' is idiomatic English and preserves the sense without over-specifying
    whether purpose or result is primary.
- source_word: τὸν νῶτον
  chosen: their back
  alternatives:
  - their backs
  - their spine
  lexicon: BDAG
  rationale: νῶτος is singular in Greek and refers to the back. English idiom commonly
    uses singular with a distributive possessive ('their back') in elevated style;
    this also stays close to the source and the citation form.
- source_word: διὰ παντός
  chosen: continually
  alternatives:
  - always
  - forever
  lexicon: BDAG
  rationale: The phrase means 'continually/constantly.' 'Continually' fits the context
    of ongoing judgment without importing the stronger eschatological finality that
    'forever' might suggest.
- source_word: σύγκαμψον
  chosen: bend
  alternatives:
  - bow down
  - make stoop
  lexicon: BDAG
  rationale: An aorist active imperative, here in a citation addressed to God. 'Bend'
    is concise and preserves the physical metaphor of being bowed over. 'Bow down'
    is possible, but 'bend' better matches the direct object 'back'.
