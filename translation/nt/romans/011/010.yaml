theological_decisions:
- issue: Imprecatory citation and divine agency
  chosen_reading: 'Retain the jussive/imperatival force as a prayer-like imprecation:
    ''Let their eyes be darkened ... and bend their back continually.'''
  alternative_readings:
  - Render as a predictive statement ('their eyes will be darkened')
  - Soften into passive consequence without divine address
  rationale: Paul is quoting Scripture in a form that preserves the force of an imprecation/judgment
    oracle. The translation should not mute the severity into mere prediction or impersonal
    consequence. At the same time, it should not add theological explanation beyond
    the text.
  doctrine_reference: Translation philosophy §§1, 3, 6
