id: ROM.11.22
reference: Romans 11:22
source:
  edition: SBLGNT
  text: ἴδε οὖν χρηστότητα καὶ ἀποτομίαν θεοῦ· ἐπὶ μὲν τοὺς πεσόντας ⸀ἀποτομία, ἐπὶ
    δὲ σὲ ⸂χρηστότης θεοῦ⸃, ἐὰν ⸀ἐπιμένῃς τῇ χρηστότητι, ἐπεὶ καὶ σὺ ἐκκοπήσῃ.
translation:
  text: 'Consider, then, the kindness and severity of God: severity toward those who
    have fallen, but God''s kindness toward you, if you continue in his kindness;
    otherwise you too will be cut off.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'goodness.' The Greek χρηστότης can denote kindness, goodness, or benevolence;
      'kindness' was chosen to preserve the relational contrast with 'severity.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will be broken off.' The Greek verb literally means 'will be cut off';
      'broken off' is a contextual alternative because of the olive-tree imagery in
      the surrounding passage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδε
  chosen: Consider
  alternatives:
  - See
  - Behold
  lexicon: BDAG
  rationale: Imperatival call to attentive reflection. 'Consider' communicates the
    exhortational force in natural modern English better than the more literal but
    less idiomatic 'behold.'
- source_word: χρηστότητα / χρηστότης
  chosen: kindness
  alternatives:
  - goodness
  - benevolence
  lexicon: BDAG
  rationale: In Pauline usage here the term denotes God's benevolent graciousness.
    'Kindness' is clear modern English and fits the contrast with 'severity.' 'Goodness'
    is possible but less relationally pointed in this context.
- source_word: ἀποτομίαν / ἀποτομία
  chosen: severity
  alternatives:
  - strictness
  - sharpness
  lexicon: BDAG
  rationale: The noun conveys decisiveness and harshness in judgment. 'Severity' is
    the established and most natural English equivalent in this contrastive construction,
    without overstating beyond the text.
- source_word: θεοῦ
  chosen: of God / God’s
  lexicon: BDAG
  rationale: Rendered once as 'of God' and once possessively as 'God’s' for natural
    English while preserving the genitival sense in both occurrences.
- source_word: ἐπὶ μὲν τοὺς πεσόντας
  chosen: toward those who have fallen
  alternatives:
  - upon those who fell
  - for those who have fallen
  lexicon: BDAG
  rationale: With ἐπί plus accusative in this distributive contrast, 'toward' best
    conveys direction/reference in English. The aorist participle πεσόντας is rendered
    'have fallen' to express their state resulting from falling without overpressing
    aspect.
- source_word: πεσόντας
  chosen: those who have fallen
  alternatives:
  - those who fell
  lexicon: BDAG
  rationale: Substantival participle referring to those who fell from their prior
    standing in the olive-tree metaphor. 'Have fallen' reads naturally and connects
    with the present warning.
- source_word: ἐπὶ δὲ σὲ
  chosen: toward you
  alternatives:
  - upon you
  - for you
  lexicon: BDAG
  rationale: Maintains the parallel with the previous ἐπί phrase and communicates
    the contrastive direction of God's kindness toward the addressee.
- source_word: ἐὰν ἐπιμένῃς
  chosen: if you continue
  alternatives:
  - if you remain
  - if you persist
  lexicon: BDAG
  rationale: The verb means to continue or persist in something. 'Continue' is idiomatic
    and avoids implying either mere static location ('remain') or excessive stubbornness
    ('persist').
- source_word: τῇ χρηστότητι
  chosen: in his kindness
  alternatives:
  - in kindness
  - in that kindness
  - in God's kindness
  lexicon: BDAG
  rationale: The dative is rendered with 'in' to reflect continuance within the sphere
    of God's kindness. 'His' is supplied in English because the referent is clearly
    God's kindness from the immediate context and improves readability.
- source_word: ἐπεὶ
  chosen: otherwise
  alternatives:
  - since
  - else
  lexicon: BDAG
  rationale: Although ἐπεί often means 'since,' here in context it introduces the
    negative consequence if the condition is not met. 'Otherwise' best captures the
    warning logic in idiomatic English.
- source_word: ἐκκοπήσῃ
  chosen: will be cut off
  alternatives:
  - will be broken off
  lexicon: BDAG
  rationale: The future passive of ἐκκόπτω literally means 'cut off.' In the olive-tree
    metaphor 'broken off' is possible by contextual assimilation to nearby language
    in the passage, but 'cut off' more directly reflects this verb's lexical force
    here.
