theological_decisions:
- issue: Conditional warning in relation to divine kindness and judgment
  chosen_reading: 'Retained the straightforward conditional warning: God''s kindness
    toward the addressee is experienced if he continues in that kindness; otherwise
    he too will be cut off.'
  alternative_readings:
  - A reading that softens the warning into merely hypothetical rhetoric
  - A reading that imports a specific denominational doctrine of perseverance or apostasy
    into the translation
  rationale: The Greek presents a real conditional exhortation and warning without
    resolving later theological debates about perseverance, apostasy, or corporate
    versus individual application. Per doctrine, the translation preserves the tension
    rather than importing a confessional conclusion.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
