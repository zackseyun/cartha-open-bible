theological_decisions:
- issue: Relation of grace and works in Paul's argument
  chosen_reading: 'The verse states a mutual exclusivity at the level of basis: if
    something is by grace, it is not on the basis of works.'
  alternative_readings:
  - The verse addresses specifically works of the Mosaic law
  - The verse addresses any and all human effort without qualification
  rationale: The Greek says only 'works' and does not explicitly narrow the term to
    Mosaic law here, nor does it elaborate a full doctrinal system. The translation
    preserves Paul's contrast without importing a denominational explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
