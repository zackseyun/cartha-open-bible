id: ROM.11.6
reference: Romans 11:6
source:
  edition: SBLGNT
  text: εἰ δὲ χάριτι, οὐκέτι ἐξ ἔργων, ἐπεὶ ἡ χάρις οὐκέτι γίνεται ⸀χάρις.
translation:
  text: But if by grace, it is no longer from works; otherwise grace is no longer
    grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'otherwise grace is no longer grace.' The Greek verb is 'becomes,' which
      may be smoothed in English as 'is.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτι
  chosen: by grace
  alternatives:
  - through grace
  - by favor
  lexicon: BDAG
  rationale: 'The dative is best taken instrumentally or by basis here: election/salvation
    is on the basis of grace. ''Grace'' preserves Paul''s key theological term and
    matches established Pauline usage without paraphrase.'
- source_word: οὐκέτι
  chosen: no longer
  alternatives:
  - not any more
  lexicon: BDAG
  rationale: Standard temporal/logical negation. 'No longer' is idiomatic and preserves
    Paul's exclusion of works once grace is established as the basis.
- source_word: ἐξ ἔργων
  chosen: from works
  alternatives:
  - on the basis of works
  - by works
  lexicon: BDAG
  rationale: ἐκ/ἐξ marks source or basis. 'From works' is slightly more formal and
    mirrors the Greek contrast with 'by grace'; the sense is basis/origin rather than
    mere means. 'Works' is left broad, as Paul does not specify 'works of the law'
    here.
- source_word: ἐπεὶ
  chosen: otherwise
  alternatives:
  - since
  - for then
  lexicon: BDAG
  rationale: In this compressed argument, ἐπεί introduces the consequence if the prior
    statement were denied. 'Otherwise' captures the inferential force more naturally
    in English than a wooden 'since'.
- source_word: γίνεται
  chosen: becomes
  alternatives:
  - is
  - proves to be
  lexicon: BDAG
  rationale: The verb is γίνομαι, not εἰμί. 'Becomes' preserves the verbal idea that
    grace would cease to be grace if mixed with works. Though slightly unusual in
    English, it is more textually transparent and auditable than smoothing to 'is.'
- source_word: χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: Paul's repeated use of χάρις is rhetorically emphatic; repeating 'grace'
    in English preserves the wordplay and theological contrast with works.
