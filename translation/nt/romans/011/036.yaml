theological_decisions:
- issue: Referent of the repeated pronoun αὐτοῦ/αὐτὸν/αὐτῷ
  chosen_reading: God is the referent throughout, in continuity with the immediate
    context of Romans 11:33–35.
  alternative_readings:
  - A broader theocentric reference that is not narrowed beyond the immediate context
  rationale: The verse concludes a doxology to God in the surrounding context. The
    translation preserves the pronouns rather than replacing them with 'God,' allowing
    the text's rhetorical force to stand while recognizing the referent from context.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Rendering the doxological phrase αὐτῷ ἡ δόξα
  chosen_reading: To him be the glory
  alternative_readings:
  - To him belongs the glory
  - To him is the glory
  rationale: The Greek is a verbless doxological ascription. Supplying 'be' is idiomatic
    in English and preserves the worshipful force without importing additional doctrinal
    content.
  doctrine_reference: 'Translation philosophy: readable modern English, not archaic
    or academic'
