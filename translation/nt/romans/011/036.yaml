id: ROM.11.36
reference: Romans 11:36
source:
  edition: SBLGNT
  text: ὅτι ἐξ αὐτοῦ καὶ δι’ αὐτοῦ καὶ εἰς αὐτὸν τὰ πάντα· αὐτῷ ἡ δόξα εἰς τοὺς αἰῶνας,
    ἀμήν.
translation:
  text: For from him and through him and to him are all things. To him be the glory
    forever. Amen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because from him and through him and to him are all things.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'into the ages.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the ground or explanation for the preceding doxology; 'For'
    fits natural English while preserving the causal force.
- source_word: ἐξ αὐτοῦ
  chosen: from him
  alternatives:
  - out of him
  lexicon: BDAG
  rationale: ἐκ/ἐξ with the genitive denotes source or origin. 'From him' is idiomatic
    and preserves the sense that all things have their source in God.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by means of him
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses agency or means. 'Through him'
    is the standard concise rendering and preserves the mediating sense.
- source_word: εἰς αὐτὸν
  chosen: to him
  alternatives:
  - for him
  - unto him
  lexicon: BDAG
  rationale: εἰς can denote goal, direction, or purpose. 'To him' preserves the directional/teleological
    force in clear modern English without over-specifying purpose.
- source_word: τὰ πάντα
  chosen: all things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: The neuter plural with the article is comprehensive in scope. 'All things'
    preserves the elevated, cosmic breadth of Paul's wording better than the more
    colloquial 'everything.'
- source_word: αὐτῷ ἡ δόξα
  chosen: To him be the glory
  alternatives:
  - to him belongs the glory
  - his is the glory
  lexicon: BDAG
  rationale: This is a doxological ascription. English idiom commonly supplies 'be'
    in such verbless clauses. 'The glory' reflects the article and the formal tone
    of praise.
- source_word: εἰς τοὺς αἰῶνας
  chosen: forever
  alternatives:
  - unto the ages
  - for the ages
  - forever and ever
  lexicon: BDAG
  rationale: Literally 'into the ages,' an idiom for unending duration. 'Forever'
    is natural modern English and adequately conveys the sense without unnecessary
    archaism. 'Forever and ever' is traditional but adds wording not present here.
- source_word: ἀμήν
  chosen: Amen
  lexicon: BDAG
  rationale: Retained as a transliterated liturgical affirmation in standard English
    usage.
