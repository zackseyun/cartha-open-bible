id: ROM.8.11
reference: Romans 8:11
source:
  edition: SBLGNT
  text: εἰ δὲ τὸ πνεῦμα τοῦ ἐγείραντος ⸀τὸν Ἰησοῦν ἐκ νεκρῶν οἰκεῖ ἐν ὑμῖν, ὁ ἐγείρας ⸂ἐκ νεκρῶν Χριστὸν Ἰησοῦν⸃ ζῳοποιήσει καὶ τὰ θνητὰ σώματα ὑμῶν διὰ ⸂τὸ ἐνοικοῦν αὐτοῦ πνεῦμα⸃ ἐν ὑμῖν.
translation:
  text: And if the Spirit of the one who raised Jesus from the dead dwells in you[b][a], the one who raised Messiah Jesus from the dead will also give life to your mortal bodies through his Spirit dwelling in you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, "through his Spirit dwelling in you."
    reason: alternative_reading
  - marker: b
    text: Greek "Christ Jesus"; rendered "Messiah Jesus" here because Χριστός retains title force.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα
  chosen: Spirit
  alternatives:
  - spirit
  lexicon: BDAG
  rationale: Rendered as "Spirit" in both occurrences because the referent is the Holy Spirit in Paul's argument, not a merely human spirit or impersonal force.
- source_word: ἐγείραντος / ἐγείρας
  chosen: raised
  alternatives:
  - awakened
  - brought up
  lexicon: BDAG
  rationale: '"Raised" is the standard and most natural resurrection term in this context, preserving the bodily-resurrection sense.'
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: '"From the dead" is the most idiomatic modern English rendering, while still conveying resurrection out from the realm of the dead.'
- source_word: οἰκεῖ
  chosen: dwells
  alternatives:
  - lives
  - resides
  lexicon: BDAG
  rationale: '"Dwells" preserves the indwelling sense with theological weight and matches the participial form later in the verse.'
- source_word: Χριστὸν Ἰησοῦν
  chosen: Messiah Jesus
  alternatives:
  - Christ Jesus
  lexicon: BDAG
  rationale: Per project doctrine, Χριστός is translated as "Messiah" where title force is present. Here the title remains meaningful rather than functioning as a bare surname.
- source_word: ζῳοποιήσει
  chosen: will also give life
  alternatives:
  - will make alive
  - will bring to life
  lexicon: BDAG
  rationale: '"Will also give life" is clear modern English and preserves the future, life-giving action without unnecessary archaism.'
- source_word: θνητὰ σώματα
  chosen: mortal bodies
  alternatives:
  - dying bodies
  lexicon: BDAG
  rationale: '"Mortal bodies" is the direct and established sense of the phrase, retaining both bodily concreteness and mortality.'
- source_word: διὰ τὸ ἐνοικοῦν αὐτοῦ πνεῦμα
  chosen: because of his Spirit dwelling in you
  alternatives:
  - through his Spirit dwelling in you
  lexicon: BDAG
  rationale: The SBLGNT reads διά with the accusative articular participle, which naturally carries a causal sense ("because of") rather than an instrumental one ("through," more typical with the genitive). The translation follows the printed Greek rather than later smoothing in translation tradition.
- source_word: ἐνοικοῦν
  chosen: dwelling
  alternatives:
  - living
  - indwelling
  lexicon: BDAG
  rationale: '"Dwelling" keeps close lexical continuity with οἰκεῖ earlier in the verse and reads naturally in English.'
