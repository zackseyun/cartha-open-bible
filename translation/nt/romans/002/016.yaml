id: ROM.2.16
reference: Romans 2:16
source:
  edition: SBLGNT
  text: ἐν ⸂ἡμέρᾳ ὅτε⸃ ⸀κρίνει ὁ θεὸς τὰ κρυπτὰ τῶν ἀνθρώπων κατὰ τὸ εὐαγγέλιόν μου
    διὰ ⸂Χριστοῦ Ἰησοῦ⸃.
translation:
  text: on the day when God judges the secrets of people through Messiah Jesus, according
    to my gospel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "through Christ Jesus."'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἡμέρᾳ ὅτε
  chosen: on the day when
  alternatives:
  - in the day when
  - when
  rationale: This preserves the temporal construction naturally in English while retaining
    the explicit reference to a definite day of judgment.
- source_word: κρίνει
  chosen: judges
  alternatives:
  - will judge
  lexicon: BDAG
  rationale: 'The Greek has present indicative, but in this eschatological context
    English idiom commonly uses the present in a future-oriented temporal clause:
    ''when God judges.'''
- source_word: τὰ κρυπτὰ
  chosen: the secrets
  alternatives:
  - the hidden things
  - the secret things
  lexicon: BDAG
  rationale: '''The secrets'' is natural modern English and captures what is concealed
    within human beings without sounding wooden.'
- source_word: τῶν ἀνθρώπων
  chosen: of people
  alternatives:
  - of men
  - of human beings
  lexicon: BDAG
  rationale: The term is generic here, referring to humanity rather than males specifically.
    'People' best matches the sense in clear modern English.
- source_word: κατὰ τὸ εὐαγγέλιόν μου
  chosen: according to my gospel
  alternatives:
  - according to the gospel I proclaim
  - as my gospel declares
  lexicon: BDAG
  rationale: This keeps Paul's personal possessive and the standard Pauline sense
    of εὐαγγέλιον while remaining readable.
- source_word: διὰ Χριστοῦ Ἰησοῦ
  chosen: through Messiah Jesus
  alternatives:
  - through Christ Jesus
  - by Messiah Jesus
  lexicon: BDAG
  rationale: διά with the genitive is best rendered 'through,' expressing agency or
    instrumentality. Per doctrine, Χριστός is rendered 'Messiah' where it functions
    as a title rather than a name-like form.
