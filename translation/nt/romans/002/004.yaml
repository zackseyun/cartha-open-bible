theological_decisions:
- issue: Whether χρηστότης / χρηστόν should be rendered as "kindness" or "goodness" in a way that might affect the tone of God's action.
  chosen_reading: Rendered both occurrences as "kindness."
  alternative_readings:
  - Rendered as "goodness" in one or both occurrences.
  rationale: The context emphasizes God's gracious restraint toward the sinner, so "kindness" better captures the personal and relational force while remaining faithful to the Greek.
