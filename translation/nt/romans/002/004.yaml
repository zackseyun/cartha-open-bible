id: ROM.2.4
reference: Romans 2:4
source:
  edition: SBLGNT
  text: ἢ τοῦ πλούτου τῆς χρηστότητος αὐτοῦ καὶ τῆς ἀνοχῆς καὶ τῆς μακροθυμίας καταφρονεῖς, ἀγνοῶν ὅτι τὸ χρηστὸν τοῦ θεοῦ εἰς μετάνοιάν σε ἄγει;
translation:
  text: Or do you despise the riches of his kindness and forbearance and patience[a], not knowing that God's kindness is leading you to repentance?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "goodness" for both occurrences of "kindness."
    reason: lexical_alternative
lexical_decisions:
- source_word: πλούτου
  chosen: riches
  alternatives:
  - wealth
  - abundance
  lexicon: BDAG
  rationale: '"Riches" is the natural English metaphor for abundant moral qualities and preserves Paul''s genitive construction better than the flatter "abundance."'
- source_word: χρηστότητος / τὸ χρηστόν
  chosen: kindness
  alternatives:
  - goodness
  - benevolence
  lexicon: BDAG
  rationale: Using "kindness" in both occurrences preserves lexical consistency across the verse and fits the relational, moral sense here better than the broader "goodness."
- source_word: ἀνοχῆς
  chosen: forbearance
  alternatives:
  - tolerance
  - restraint
  lexicon: BDAG
  rationale: '"Forbearance" best conveys restrained judgment in a morally charged context without implying modern relativistic "tolerance."'
- source_word: μακροθυμίας
  chosen: patience
  alternatives:
  - longsuffering
  - steadfast patience
  lexicon: BDAG
  rationale: '"Patience" is clear modern English; "longsuffering" is more traditional but less readable for the target audience.'
- source_word: καταφρονεῖς
  chosen: despise
  alternatives:
  - think lightly of
  - show contempt for
  lexicon: BDAG
  rationale: '"Despise" preserves the sharp rebuking force of the verb in concise English.'
- source_word: ἀγνοῶν
  chosen: not knowing
  alternatives:
  - being ignorant
  - ignoring
  lexicon: BDAG
  rationale: '"Not knowing" best reflects the participle''s sense here without over-translating it as willful disregard.'
- source_word: εἰς μετάνοιάν
  chosen: to a change of mind
  alternatives:
  - toward repentance
  lexicon: BDAG
  rationale: '"To repentance" is idiomatic and preserves the directional force of εἰς with ἄγει.'
- source_word: ἄγει
  chosen: is leading
  alternatives:
  - leads
  - is guiding
  lexicon: BDAG
  rationale: The present tense is represented naturally with "is leading," highlighting God's ongoing action toward the addressee.
