id: ROM.9.6
reference: Romans 9:6
source:
  edition: SBLGNT
  text: Οὐχ οἷον δὲ ὅτι ἐκπέπτωκεν ὁ λόγος τοῦ θεοῦ. οὐ γὰρ πάντες οἱ ἐξ Ἰσραήλ, οὗτοι Ἰσραήλ·
translation:
  text: But it is not as though the word of God has failed[b][a]. For not all those from Israel are Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those descended from Israel.' The Greek phrase denotes origin or descent.
    reason: lexical_alternative
  - marker: b
    text: The second 'Israel' is used in a narrower sense than the first; Paul distinguishes physical descent from the fuller covenantal sense of 'Israel.'
    reason: cross_reference
lexical_decisions:
- source_word: Οὐχ οἷον δὲ ὅτι
  chosen: But it is not as though
  alternatives:
  - But it is not as if
  - However, it is not that
  lexicon: BDAG
  rationale: Idiomatic negated expression introducing a correction to a possible inference from Paul's lament. 'As though' preserves the sense of denying that God's word has come to nothing without sounding wooden.
- source_word: ἐκπέπτωκεν
  chosen: has failed
  alternatives:
  - has fallen
  - has come to nothing
  - has fallen away
  lexicon: BDAG
  rationale: Perfect tense indicates a present state resulting from prior action. In context of God's promise/word, 'has failed' best conveys the idiomatic sense of something not having fallen short or become ineffective.
- source_word: ὁ λόγος τοῦ θεοῦ
  chosen: the word of God
  alternatives:
  - the promise of God
  - God's word
  lexicon: BDAG
  rationale: Formal rendering retained because λόγος here can denote God's spoken/promissory word broadly. 'Promise' is interpretive; Paul may especially mean God's covenantal word, but the Greek says 'word of God.'
- source_word: οὐ γὰρ πάντες
  chosen: For not all
  alternatives:
  - Because not all
  - For they are not all
  lexicon: BDAG
  rationale: γάρ gives explanation for the previous denial. 'For not all' is natural English and preserves the logical connection.
- source_word: οἱ ἐξ Ἰσραήλ
  chosen: those from Israel
  alternatives:
  - those of Israel
  - those descended from Israel
  - those who are from Israel
  lexicon: BDAG
  rationale: ἐξ marks source/origin. 'Those from Israel' keeps the concise Greek sense and allows the subsequent distinction between physical descent and the narrower sense of Israel to emerge without over-interpreting.
- source_word: οὗτοι Ἰσραήλ
  chosen: are Israel
  alternatives:
  - these are Israel
  - belong to Israel
  lexicon: BDAG
  rationale: Elliptical equative clause best completed in English with 'are.' This preserves Paul's stark distinction between ethnic origin and the true referent of 'Israel.'
