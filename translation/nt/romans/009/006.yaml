theological_decisions:
- issue: Meaning of the second occurrence of 'Israel'
  chosen_reading: The second 'Israel' refers to Israel in a narrower covenantal/theological sense rather than merely ethnic descent.
  alternative_readings:
  - The second 'Israel' refers to the elect within ethnic Israel
  - The second 'Israel' refers to the true people of God more broadly
  rationale: Paul's immediate point is that God's word has not failed because mere physical descent from Israel does not exhaust what 'Israel' means in God's saving purpose. The translation leaves the precise theological scope unstated in the main text, preserving Paul's tension rather than importing a denominational conclusion.
  doctrine_reference: Preserve theological tension rather than resolve it.
