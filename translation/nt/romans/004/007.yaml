id: ROM.4.7
reference: Romans 4:7
source:
  edition: SBLGNT
  text: Μακάριοι ὧν ἀφέθησαν αἱ ἀνομίαι καὶ ὧν ἐπεκαλύφθησαν αἱ ἁμαρτίαι,
translation:
  text: Blessed are those whose lawless deeds have been forgiven[a], and whose sins have been covered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whose iniquities have been forgiven.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριοι
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: Retains the covenantal and declarative sense of divine blessedness better than the more subjective 'happy' or the flatter 'fortunate.'
- source_word: ἀφέθησαν
  chosen: have been forgiven
  alternatives:
  - were forgiven
  - have been pardoned
  lexicon: BDAG
  rationale: The passive of ἀφίημι here denotes forgiveness/remission. 'Have been forgiven' gives natural English and preserves the completed-result sense of the aorist within this beatitude.
- source_word: ἀνομίαι
  chosen: lawless deeds
  alternatives:
  - lawless acts
  - iniquities
  lexicon: BDAG
  rationale: ἀνομία is more than generic wrongdoing; it carries the sense of violation of law. 'Lawless deeds' preserves that force in accessible modern English better than the more traditional but less transparent 'iniquities.'
- source_word: ἐπεκαλύφθησαν
  chosen: have been covered
  alternatives:
  - were covered
  - have been concealed
  lexicon: BDAG
  rationale: This verb is the natural source of 'covered' in this citation of Psalm 32:1. The rendering preserves the metaphor rather than flattening it into interpretation.
- source_word: ἁμαρτίαι
  chosen: sins
  alternatives:
  - sinful acts
  lexicon: BDAG
  rationale: Standard and transparent rendering for ἁμαρτίαι; no contextual reason here to expand or paraphrase.
