theological_decisions:
- issue: Implicit subject of the promise and ability
  chosen_reading: Retain the pronoun 'he' rather than supplying 'God' in the main text.
  alternative_readings:
  - that God was able also to do what he had promised
  rationale: The immediate context identifies God as the referent, but this verse itself leaves the subject implicit. Preserving 'he' stays closer to the Greek while remaining clear in context.
