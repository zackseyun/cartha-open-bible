  rationale: 'The immediate context explains why hope does not put to shame: God’s love has been poured out in believers’ hearts through the Holy Spirit. That causal logic favors the subjective genitive.'
  doctrine_reference: Preserve theological tension where ambiguity is genuine; render one in the main text and preserve the alternative in a footnote.
