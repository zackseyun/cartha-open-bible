id: ROM.13.14
reference: Romans 13:14
source:
  edition: SBLGNT
  text: ἀλλὰ ἐνδύσασθε τὸν κύριον Ἰησοῦν Χριστόν, καὶ τῆς σαρκὸς πρόνοιαν μὴ ποιεῖσθε
    εἰς ἐπιθυμίας.
translation:
  text: But put on the Lord Jesus Messiah, and make no provision for the flesh, for
    its desires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'make no provision for the sinful nature.' The Greek says 'flesh,' which
      Paul often uses for fallen human impulses in contrast to life directed by God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδύσασθε
  chosen: put on
  alternatives:
  - clothe yourselves with
  lexicon: BDAG
  rationale: The middle imperative is metaphorical, drawing on clothing imagery for
    adopting a manner of life or identity. 'Put on' is idiomatic modern English and
    preserves the metaphor without sounding overly formal.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In this christological
    context it functions as Jesus' title and should retain its theological weight.
- source_word: Χριστόν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine defaults, Χριστός is rendered 'Messiah' where it clearly
    functions as a title rather than a fixed surname-like name. Here 'Jesus Messiah'
    preserves the title's meaning.
- source_word: πρόνοιαν
  chosen: provision
  alternatives:
  - forethought
  - planning
  - care
  lexicon: BDAG
  rationale: πρόνοια denotes advance planning or provision. 'Make no provision' is
    a natural English rendering that captures the sense of not arranging beforehand
    for what follows.
- source_word: σάρξ
  chosen: flesh
  alternatives:
  - sinful nature
  lexicon: BDAG
  rationale: Per doctrine defaults, σάρξ may be rendered 'flesh' literally or 'sinful
    nature' metaphorically depending on context. Here Paul speaks of fallen human
    impulses, but 'flesh' is retained in the main text to preserve Paul's terminology
    and theological tension rather than resolving it interpretively.
- source_word: ποιεῖσθε
  chosen: make
  alternatives:
  - give
  - provide
  lexicon: BDAG
  rationale: With πρόνοιαν, ποιεῖσθε forms the idiom 'make provision.' This is the
    most natural and established English equivalent.
- source_word: εἰς ἐπιθυμίας
  chosen: to gratify its desires
  alternatives:
  - for desires
  - for lusts
  - unto cravings
  lexicon: BDAG
  rationale: 'The prepositional phrase expresses purpose or result: provision for
    the flesh leading to the fulfillment of its desires. ''To gratify its desires''
    makes the sense explicit in clear modern English. ''Its'' refers back to ''the
    flesh'' and avoids leaving the relation ambiguous.'
