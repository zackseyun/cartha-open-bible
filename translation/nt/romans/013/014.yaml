theological_decisions:
- issue: Rendering of σάρξ in a morally charged Pauline context
  chosen_reading: flesh
  alternative_readings:
  - sinful nature
  rationale: Although the context is ethical and refers to disordered human desires,
    rendering σάρξ as 'sinful nature' would interpret the metaphor more narrowly and
    potentially over-systematize Paul's anthropology. The main text keeps 'flesh'
    and preserves the interpretive alternative in a footnote, in line with the doctrine's
    instruction to preserve theological tension.
