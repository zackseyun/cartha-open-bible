id: ROM.1.23
reference: Romans 1:23
source:
  edition: SBLGNT
  text: καὶ ἤλλαξαν τὴν δόξαν τοῦ ἀφθάρτου θεοῦ ἐν ὁμοιώματι εἰκόνος φθαρτοῦ ἀνθρώπου καὶ πετεινῶν καὶ τετραπόδων καὶ ἑρπετῶν.
translation:
  text: and exchanged the glory of the imperishable God for the likeness of an image of perishable man and birds and four-footed animals and reptiles[a][b][c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the glory of the incorruptible God.”
    reason: lexical_alternative
  - marker: b
    text: Lit. “for the likeness of an image of perishable man...”
    reason: lexical_alternative
  - marker: c
    text: Or “mortal man.”
    reason: lexical_alternative
  - marker: d
    text: Or “creeping things.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤλλαξαν
  chosen: exchanged
  alternatives:
  - traded
  - changed
  lexicon: BDAG
  rationale: '"Exchanged" best preserves the sense of deliberate substitution in context.'
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  - honor
  lexicon: BDAG
  rationale: '"Glory" is the standard theological rendering and fits Paul''s contrast between God''s majesty and idols.'
- source_word: ἀφθάρτου
  chosen: imperishable
  alternatives:
  - incorruptible
  - immortal
  lexicon: BDAG
  rationale: '"Imperishable" most directly reflects the adjective''s sense of not being subject to decay, while sounding natural in modern English.'
- source_word: ἐν ὁμοιώματι εἰκόνος
  chosen: for images resembling
  alternatives:
  - for the likeness of an image
  - in the likeness of an image
  lexicon: BDAG
  rationale: This compressed rendering communicates the idiomatic force in readable English. The Greek uses overlapping image-language; "images resembling" preserves the sense without wooden redundancy.
- source_word: φθαρτοῦ ἀνθρώπου
  chosen: perishable man
  alternatives:
  - mortal man
  - corruptible man
  - perishable humanity
  lexicon: BDAG
  rationale: '"Perishable" forms a strong contrast with "imperishable," and "man" follows the singular Greek accurately.'
- source_word: πετεινῶν
  chosen: birds
  alternatives:
  - flying creatures
  lexicon: BDAG
  rationale: '"Birds" is the clearest natural English equivalent here.'
- source_word: τετραπόδων
  chosen: four-footed animals
  alternatives:
  - quadrupeds
  - four-footed creatures
  lexicon: BDAG
  rationale: This keeps the literal force while remaining readable modern English.
- source_word: ἑρπετῶν
  chosen: reptiles
  alternatives:
  - creeping things
  - crawling creatures
  lexicon: BDAG
  rationale: '"Reptiles" is concise and natural, though the Greek can be broader than the modern zoological category.'
