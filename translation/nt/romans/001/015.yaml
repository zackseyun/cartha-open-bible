id: ROM.1.15
reference: Romans 1:15
source:
  edition: SBLGNT
  text: οὕτως τὸ κατ’ ἐμὲ πρόθυμον καὶ ὑμῖν τοῖς ἐν Ῥώμῃ εὐαγγελίσασθαι.
translation:
  text: So[a], for my part, I am eager to proclaim the good news also to you who are in Rome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to preach the gospel to you also who are in Rome.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  chosen: So
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Here it functions as an inferential/concluding connector linking Paul’s prior explanation to this statement of intent, so 'So' is the most natural modern English rendering.
- source_word: τὸ κατ’ ἐμὲ πρόθυμον
  chosen: for my part, I am eager
  alternatives:
  - as far as it depends on me, I am ready
  - my readiness
  lexicon: BDAG
  rationale: The Greek is elliptical and idiomatic, literally something like 'the according-to-me eager(thing).' Rendering it as 'for my part, I am eager' preserves the sense without wooden English. 'Ready' is possible, but 'eager' better reflects πρόθυμον as willingness with zeal, not mere availability.
- source_word: καὶ ὑμῖν
  chosen: to you also
  alternatives:
  - also to you
  - to you as well
  lexicon: BDAG
  rationale: The placement of καὶ highlights that Rome is included along with other places Paul longs to evangelize. 'To you also' keeps that inclusion explicit in natural English.
- source_word: τοῖς ἐν Ῥώμῃ
  chosen: who are in Rome
  alternatives:
  - those in Rome
  - the ones in Rome
  lexicon: BDAG
  rationale: The article plus prepositional phrase identifies the Roman believers as the recipients. 'Who are in Rome' is slightly fuller and reads smoothly after 'you also.'
- source_word: εὐαγγελίσασθαι
  chosen: to proclaim the good news
  alternatives:
  - to preach the gospel
  - to evangelize
  lexicon: BDAG
  rationale: This verb means to announce good news / proclaim the gospel. 'Proclaim the good news' is readable modern English and avoids importing a narrower image of formal preaching only.
