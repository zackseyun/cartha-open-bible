theological_decisions:
- issue: Rendering the vocative ἀδελφοί in a mixed-audience epistle
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: Following the doctrine's gender-accurate principle, the grammatically
    masculine representative term is retained in the main text. Because the address
    likely includes the whole Roman Christian community, an inclusive explanatory
    footnote preserves contextual relevance without replacing the source form.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Rendering λογικὴν λατρείαν
  chosen_reading: your reasonable worship
  alternative_readings:
  - your spiritual worship
  - your rational service
  rationale: The phrase is interpretively contested. The main text keeps a close,
    minimally interpretive rendering with 'reasonable worship.' The common alternative
    'spiritual worship' is preserved in a footnote to maintain transparency and theological
    tension rather than collapsing the ambiguity.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
