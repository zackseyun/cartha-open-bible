id: ROM.12.1
reference: Romans 12:1
source:
  edition: SBLGNT
  text: Παρακαλῶ οὖν ὑμᾶς, ἀδελφοί, διὰ τῶν οἰκτιρμῶν τοῦ θεοῦ παραστῆσαι τὰ σώματα
    ὑμῶν θυσίαν ζῶσαν ἁγίαν ⸂εὐάρεστον τῷ θεῷ⸃, τὴν λογικὴν λατρείαν ὑμῶν·
translation:
  text: Therefore I urge you, brothers, by the mercies of God, to present your bodies
    as a living sacrifice, holy and pleasing to God—your reasonable worship.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the
      masculine form to address a mixed group.
    reason: alternative_reading
  - marker: b
    text: Or 'your spiritual worship' or 'your rational service'; the Greek phrase
      can carry senses of reasoned, fitting, or spiritual service/worship.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  chosen: I urge
  alternatives:
  - I appeal
  - I exhort
  - I beseech
  lexicon: BDAG
  rationale: παρακαλέω here introduces earnest apostolic exhortation rather than mere
    request. 'I urge' is natural modern English and preserves the force without archaic
    tone.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: οὖν marks an inference from the preceding argument in Romans 1–11. 'Therefore'
    best preserves the logical connection.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: Per doctrine, gender-accurate over gender-neutral. The vocative masculine
    plural is retained as 'brothers,' while the mixed audience implication is preserved
    by footnote rather than replacing the source-shaped form in the main text.
- source_word: διὰ τῶν οἰκτιρμῶν τοῦ θεοῦ
  chosen: by the mercies of God
  alternatives:
  - because of the mercies of God
  - through the mercies of God
  - in view of God's mercies
  lexicon: BDAG
  rationale: διά with the genitive can express means or basis. In this hortatory context
    Paul appeals on the basis of God's mercies. 'By the mercies of God' is close to
    the Greek and idiomatic, while preserving the plural 'mercies' of οἰκτιρμῶν.
- source_word: παραστῆσαι
  chosen: to present
  alternatives:
  - to offer
  - to place at one's disposal
  lexicon: BDAG
  rationale: παρίστημι in sacrificial and ethical contexts commonly means 'present'
    or 'offer.' 'Present' preserves the formal sacrificial nuance and echoes Paul's
    usage elsewhere.
- source_word: τὰ σώματα ὑμῶν
  chosen: your bodies
  alternatives:
  - yourselves
  - your bodily selves
  lexicon: BDAG
  rationale: σώματα is literally 'bodies.' Although it can imply the whole embodied
    person, the concrete term should be retained rather than generalized to 'yourselves.'
- source_word: θυσίαν ζῶσαν
  chosen: as a living sacrifice
  alternatives:
  - a sacrifice that is living
  lexicon: BDAG
  rationale: The accusative phrase is best rendered appositionally after 'present
    your bodies.' 'Living sacrifice' preserves Paul's paradoxical sacrificial imagery.
- source_word: ἁγίαν
  chosen: holy
  alternatives:
  - consecrated
  - set apart
  lexicon: BDAG
  rationale: ἅγιος here describes the sacrifice as set apart to God. 'Holy' is the
    standard and theologically weighty rendering.
- source_word: εὐάρεστον τῷ θεῷ
  chosen: pleasing to God
  alternatives:
  - acceptable to God
  - well-pleasing to God
  lexicon: BDAG
  rationale: εὐάρεστος denotes what is pleasing or acceptable to God. 'Pleasing to
    God' is clear modern English; 'acceptable' is possible but can sound merely minimal.
- source_word: λογικὴν
  chosen: reasonable
  alternatives:
  - rational
  - spiritual
  lexicon: BDAG
  rationale: λογικός can mean rational, reasonable, or in some contexts spiritual.
    Here it contrasts fitting, thoughtful worship with merely external ritual. 'Reasonable'
    best captures the sense without overinterpreting toward either philosophical rationalism
    or explicitly immaterial spirituality; the alternative is preserved in a footnote
    because the term is debated.
- source_word: λατρείαν
  chosen: worship
  alternatives:
  - service
  - priestly service
  lexicon: BDAG
  rationale: λατρεία refers to cultic service or worship rendered to God. In this
    context of sacrificial presentation, 'worship' communicates the God-directed act
    clearly in modern English, while the sacrificial/service nuance is noted by the
    surrounding imagery.
