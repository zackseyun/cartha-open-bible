theological_decisions:
- issue: Ecclesiological force of the body metaphor
  chosen_reading: Render the metaphor plainly as 'one body' and 'many members' without
    making the church referent explicit in this verse.
  alternative_readings:
  - Paraphrase as 'one body, the church'
  rationale: Paul's metaphor clearly points toward the church in the next verse, but
    this verse itself states the analogy rather than naming the referent. The translation
    preserves the textual progression and avoids importing explanatory material into
    the main text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
