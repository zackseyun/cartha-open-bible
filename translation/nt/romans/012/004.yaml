id: ROM.12.4
reference: Romans 12:4
source:
  edition: SBLGNT
  text: καθάπερ γὰρ ἐν ἑνὶ σώματι ⸂πολλὰ μέλη⸃ ἔχομεν, τὰ δὲ μέλη πάντα οὐ τὴν αὐτὴν
    ἔχει πρᾶξιν,
translation:
  text: For just as in one body we have many members, but the members do not all have
    the same function,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'many parts' for 'many members.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the same activity.' The Greek term can denote activity or function;
      here 'function' fits Paul's body metaphor and the context of differing roles.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - for just as
  - as
  lexicon: BDAG
  rationale: Introduces a comparison that Paul will complete in the following verse.
    'Just as' captures the comparative force naturally in English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: BDAG
  rationale: Retained as 'for' to preserve the explanatory connection with the preceding
    exhortation.
- source_word: ἐν ἑνὶ σώματι
  chosen: in one body
  alternatives:
  - within one body
  lexicon: BDAG
  rationale: A straightforward locative phrase; 'one body' preserves the singularity
    of the metaphor without overinterpreting it ecclesiologically in this verse alone.
- source_word: πολλὰ μέλη
  chosen: many members
  alternatives:
  - many parts
  - many limbs
  lexicon: BDAG
  rationale: '''Members'' is the standard and most fitting rendering in Paul''s body
    metaphor, preserving both the anatomical image and its corporate application.
    ''Parts'' is possible but less idiomatic in this context.'
- source_word: ἔχομεν
  chosen: we have
  alternatives:
  - there are for us
  lexicon: BDAG
  rationale: Simple present indicative best rendered directly as 'we have.'
- source_word: τὰ δὲ μέλη πάντα
  chosen: but the members do not all
  alternatives:
  - and the members all do not
  - yet not all the members
  lexicon: BDAG
  rationale: The combination of δέ with πάντα and negation is best expressed in idiomatic
    English as 'but the members do not all...' preserving the contrast and scope of
    the negation.
- source_word: οὐ τὴν αὐτὴν ἔχει πρᾶξιν
  chosen: do not all have the same function
  alternatives:
  - do not all have the same activity
  - do not all have the same practice
  - do not all have the same role
  lexicon: BDAG
  rationale: πρᾶξις can denote function, activity, or practice. In the body metaphor
    and immediate context of differing gifts and roles, 'function' best conveys the
    intended sense in natural English without importing later technical terminology.
