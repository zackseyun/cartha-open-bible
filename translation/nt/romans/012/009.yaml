id: ROM.12.9
reference: Romans 12:9
source:
  edition: SBLGNT
  text: Ἡ ἀγάπη ἀνυπόκριτος. ἀποστυγοῦντες τὸ πονηρόν, κολλώμενοι τῷ ἀγαθῷ·
translation:
  text: Let love be without hypocrisy[a]. Abhor what is evil; cling to what is good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Let love be sincere.' The Greek literally says 'Love without hypocrisy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - charity
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη. 'Love' is the natural modern English equivalent and preserves the ethical force of the term without archaic overtones.
- source_word: ἀνυπόκριτος
  chosen: without hypocrisy
  alternatives:
  - sincere
  - genuine
  - unhypocritical
  lexicon: BDAG
  rationale: Literally denotes something not hypocritical or not play-acted. 'Without hypocrisy' preserves the concrete moral sense more transparently than the smoother but slightly interpretive 'sincere.' Because the Greek is verbless, English supplies 'Let ... be' to make the exhortation idiomatic.
- source_word: ἀποστυγοῦντες
  chosen: abhor
  alternatives:
  - hate utterly
  - detest
  - shun
  lexicon: BDAG
  rationale: This participle carries a strong sense of intense aversion. 'Abhor' best captures the force without becoming paraphrastic. It is rendered as an imperative in English because the participial sequence functions paranetically in context.
- source_word: τὸ πονηρόν
  chosen: what is evil
  alternatives:
  - evil
  - the evil thing
  - what is wicked
  lexicon: BDAG
  rationale: The articular neuter adjective functions substantivally. 'What is evil' is idiomatic English and preserves the broad moral category rather than narrowing it to a single act.
- source_word: κολλώμενοι
  chosen: cling to
  alternatives:
  - hold fast to
  - be joined to
  - cleave to
  lexicon: BDAG
  rationale: The verb conveys close attachment or adherence. 'Cling to' is vivid, natural English and preserves the relational intensity better than the archaic 'cleave to.' As with the previous participle, it is rendered imperativally in context.
- source_word: τῷ ἀγαθῷ
  chosen: what is good
  alternatives:
  - the good
  - what is beneficial
  lexicon: BDAG
  rationale: The articular dative neuter adjective is substantival. 'What is good' is the clearest idiomatic equivalent and matches the parallel structure with 'what is evil.'
