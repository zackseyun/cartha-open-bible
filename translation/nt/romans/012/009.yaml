theological_decisions:
- issue: Force of the verbless clause and participles in paraenetic context
  chosen_reading: 'Render the verse as a series of exhortations: ''Let love be ... Abhor ... cling ...'''
  alternative_readings:
  - A more formally literal fragmentary rendering such as 'Love without hypocrisy, abhorring evil, clinging to good'
  rationale: Although the Greek opens with a nominal clause and continues with participles, in Romans 12 the discourse is a chain of exhortations. Supplying imperative force in English communicates the author's intent while remaining close to the syntax.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
