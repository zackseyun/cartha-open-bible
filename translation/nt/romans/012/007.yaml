theological_decisions:
- issue: Whether διακονία should be rendered with ecclesial terminology
  chosen_reading: service
  alternative_readings:
  - ministry
  rationale: The verse lists grace-gifts/functions in concise parallel form. Rendering
    διακονία as 'service' avoids prematurely narrowing the term to formal church ministry
    while still allowing that sense where context may imply it. This preserves the
    text's breadth and does not import denominational assumptions about office.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Whether ὁ διδάσκων should be institutionalized as an office title
  chosen_reading: the one teaching
  alternative_readings:
  - the teacher
  rationale: The Greek participle emphasizes the person engaged in the act/function
    rather than explicitly naming an office. The translation preserves that functional
    emphasis and avoids overstating ecclesial structure beyond the text.
  doctrine_reference: Translation philosophy §§1, 5
