theological_decisions:
- issue: Whether κακός/ἀγαθός should be personalized ('the evil one') or kept as abstract moral categories
  chosen_reading: 'abstract moral categories: ''evil'' and ''good'''
  alternative_readings:
  - personalized evil, e.g. 'the evil one'
  rationale: Nothing in the immediate syntax requires a personal referent such as Satan. The neuter forms naturally support abstract or qualitative moral categories, and the surrounding context in Romans 12 concerns ethical response to wrongdoing. The translation therefore preserves Paul's moral exhortation without importing a more specific doctrinal referent than the text states.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve the source text''s plain sense.'
