id: ROM.12.21
reference: Romans 12:21
source:
  edition: SBLGNT
  text: μὴ νικῶ ὑπὸ τοῦ κακοῦ, ἀλλὰ νίκα ἐν τῷ ἀγαθῷ τὸ κακόν.
translation:
  text: Do not be overcome by evil[a], but overcome evil with good.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Do not let yourself be overcome by what is evil ... overcome what is evil with what is good.' The Greek uses articular neuter adjectives, which can be rendered either abstractly ('evil,' 'good') or as 'what is evil' and 'what is good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ νικῶ
  chosen: Do not be overcome
  alternatives:
  - Do not be conquered
  - Do not let yourself be overcome
  lexicon: BDAG
  rationale: The form is present imperative/passive, second person singular, with μή giving a prohibition. English idiom prefers a passive rendering here. 'Be overcome' preserves the passive sense more naturally than a more wooden 'be conquered,' while still reflecting νικάω as defeat/overcome language.
- source_word: ὑπὸ τοῦ κακοῦ
  chosen: by evil
  alternatives:
  - by the evil
  - by what is evil
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency in the passive clause. The articular neuter singular τοῦ κακοῦ can mean 'evil' or 'what is evil.' In English, 'by evil' is the most natural generic rendering and fits Paul's moral contrast. The article is not reproduced because English abstract nouns commonly omit it.
- source_word: ἀλλὰ νίκα
  chosen: but overcome
  alternatives:
  - but conquer
  - but be victorious over
  lexicon: BDAG
  rationale: The adversative ἀλλά sets a strong contrast. νίκα is present active imperative, second person singular. 'Overcome' keeps lexical continuity with the first clause and is more idiomatic and pastorally clear than 'conquer' in this ethical context.
- source_word: ἐν τῷ ἀγαθῷ
  chosen: with good
  alternatives:
  - by good
  - in good
  - by what is good
  lexicon: BDAG
  rationale: ἐν with the dative here is instrumental or means-related in sense. 'With good' is concise, idiomatic English and communicates the means by which evil is to be overcome. 'In good' would sound unnatural in English, and 'by good' is possible but less idiomatic.
- source_word: τὸ κακόν
  chosen: evil
  alternatives:
  - the evil
  - what is evil
  lexicon: BDAG
  rationale: The articular neuter singular again functions generically. 'Evil' best captures the broad moral category in English. Repeating 'evil' maintains the rhetorical contrast with 'good' and mirrors the Greek's concise antithesis.
