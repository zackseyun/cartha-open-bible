theological_decisions:
- issue: Scope of προϊστάμενος
  chosen_reading: rendered generally as 'the one who leads' rather than as a technical church office
  alternative_readings:
  - the one who rules
  - the presiding officer/elder
  rationale: The verse lists grace-gifts in broad participial form without explicit office terminology. A general rendering preserves the text's breadth and avoids importing a denominational polity.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Sense of ἁπλότης in giving
  chosen_reading: material/resource generosity
  alternative_readings:
  - sincerity of motive
  - simplicity
  rationale: In the immediate context of sharing resources, the generosity/liberality sense is most likely. This is a lexical-contextual decision, not a doctrinal one, but it affects how the ethical force of the gift is understood.
  doctrine_reference: Translation philosophy §1, §5
