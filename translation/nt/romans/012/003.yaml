id: ROM.12.3
reference: Romans 12:3
source:
  edition: SBLGNT
  text: Λέγω γὰρ διὰ τῆς χάριτος τῆς δοθείσης μοι παντὶ τῷ ὄντι ἐν ὑμῖν μὴ ὑπερφρονεῖν
    παρ’ ὃ δεῖ φρονεῖν, ἀλλὰ φρονεῖν εἰς τὸ σωφρονεῖν, ἑκάστῳ ὡς ὁ θεὸς ἐμέρισεν μέτρον
    πίστεως.
translation:
  text: For by the grace given to me I say to everyone among you not to think of himself
    more highly than he ought to think, but to think with sound judgment, as God has
    apportioned to each a measure of faith.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'but to think so as to be sober-minded.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the measure of faith' or possibly 'a measure of faithfulness/trust.'
      The Greek phrase may refer to a God-given measure related to faith without specifying
      the exact nuance.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τῆς χάριτος τῆς δοθείσης μοι
  chosen: by the grace given to me
  alternatives:
  - through the grace given to me
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses means or basis. 'By the grace
    given to me' communicates Paul's divinely granted apostolic commission without
    overexpanding the phrase.
- source_word: παντὶ τῷ ὄντι ἐν ὑμῖν
  chosen: to everyone among you
  alternatives:
  - to every one of you
  - to everyone who is among you
  lexicon: BDAG
  rationale: The participial expression is idiomatic for each person within the Roman
    Christian community. 'Everyone among you' is natural English and preserves the
    distributive force of παντί.
- source_word: μὴ ὑπερφρονεῖν
  chosen: not to think of himself more highly
  alternatives:
  - not to think too highly of himself
  - not to be arrogant
  lexicon: BDAG
  rationale: ὑπερφρονέω means to think too highly or be conceited. The chosen rendering
    keeps the cognitive metaphor tied to the repeated φρονέω wordplay in the verse.
- source_word: παρ’ ὃ δεῖ φρονεῖν
  chosen: than he ought to think
  alternatives:
  - beyond what he ought to think
  - beyond what is necessary to think
  lexicon: BDAG
  rationale: The phrase sets a proper limit on self-estimation. 'Than he ought to
    think' is idiomatic in English and preserves the comparative sense of παρά with
    ὅ.
- source_word: ἀλλὰ φρονεῖν εἰς τὸ σωφρονεῖν
  chosen: but to think with sound judgment
  alternatives:
  - but to think so as to be sober-minded
  - but to think toward sound-mindedness
  lexicon: BDAG
  rationale: Paul uses a wordplay on φρονέω/σωφρονέω. σωφρονέω carries the sense of
    sober, sensible, self-controlled judgment. 'With sound judgment' is clear modern
    English while preserving the ethical-intellectual nuance.
- source_word: ἑκάστῳ
  chosen: to each
  alternatives:
  - to each one
  lexicon: BDAG
  rationale: Dative of distribution; concise English preserves the individual application.
- source_word: ἐμέρισεν
  chosen: has apportioned
  alternatives:
  - has assigned
  - distributed
  lexicon: BDAG
  rationale: μερίζω means divide, distribute, apportion. 'Has apportioned' fits the
    distributive context and the perfective sense of God's deliberate allotment.
- source_word: μέτρον πίστεως
  chosen: a measure of faith
  alternatives:
  - the measure of faith
  - a measure of trust
  - a measure of faithfulness
  lexicon: BDAG
  rationale: The default rendering of πίστις is 'faith' per doctrine guidelines. The
    anarthrous μέτρον is naturally rendered 'a measure.' The phrase likely refers
    to God-given capacity or sphere related to faith, and the translation preserves
    that ambiguity rather than specifying more than the Greek states.
- source_word: πίστεως
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: Per DOCTRINE.md, πίστις defaults to 'faith.' In this verse the genitive
    may be interpreted in more than one way, but 'faith' best preserves the lexical
    default and the ambiguity of the phrase.
- source_word: ἑαυτόν implied in the masculine infinitive construction
  chosen: himself
  alternatives:
  - themselves
  - oneself
  lexicon: English style / Greek grammar
  rationale: The Greek uses grammatically masculine singular forms in a distributive
    generic sense. Following the project's gender-accurate policy, 'himself' matches
    the source form and representative force rather than flattening it into plural
    or fully gender-neutral English.
