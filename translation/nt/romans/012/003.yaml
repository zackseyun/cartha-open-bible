theological_decisions:
- issue: Meaning of μέτρον πίστεως
  chosen_reading: Retain the broad phrase 'a measure of faith' without specifying
    whether it means saving faith, capacity for ministry, or a standard/norm of faith.
  alternative_readings:
  - a measure of trust
  - the measure of faith as a standard
  - a God-given capacity corresponding to spiritual gifts
  rationale: The immediate context moves into differing gifts (12:4–8), which may
    suggest a distributed capacity for service, yet the Greek phrase itself does not
    force a narrow theological interpretation. The translation preserves the text's
    tension rather than resolving a denominationally sensitive question.
  doctrine_reference: Preserve theological tension rather than resolve it; πίστις
    default rendering is 'faith'.
