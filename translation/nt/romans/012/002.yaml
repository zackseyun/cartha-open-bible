theological_decisions:
- issue: Rendering αἰών in ethical contrast
  chosen_reading: this age
  alternative_readings:
  - this world
  - this present world-order
  rationale: Using 'age' avoids importing a cosmological contrast not explicit in
    αἰών and preserves Paul's temporal-ethical framework of the present fallen era
    versus God's renewing work.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation
    tradition
- issue: Force of δοκιμάζειν in relation to God's will
  chosen_reading: discern
  alternative_readings:
  - test
  - test and approve
  rationale: The verse does not imply that humans sit in judgment over God's will;
    rather, renewed minds come to recognize and approve it. 'Discern' communicates
    that theological sense in accessible English while remaining within the semantic
    range.
  doctrine_reference: Translation philosophy §6, readable modern English; §3, preserve
    tension without over-resolving
