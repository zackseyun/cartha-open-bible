id: ROM.12.11
reference: Romans 12:11
source:
  edition: SBLGNT
  text: τῇ σπουδῇ μὴ ὀκνηροί, τῷ πνεύματι ζέοντες, τῷ κυρίῳ δουλεύοντες,
translation:
  text: Do not be lazy in diligence; be fervent in spirit; serve the Lord.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Spirit,' if πνεύματι is understood as referring to the Holy Spirit
      rather than the believer's spirit.
    reason: alternative_reading
lexical_decisions:
- source_word: σπουδῇ
  chosen: diligence
  alternatives:
  - zeal
  - eagerness
  - earnestness
  lexicon: BDAG
  rationale: σπουδή denotes earnestness, zeal, or diligence. In this ethical exhortation,
    'diligence' fits the paired contrast with ὀκνηροί ('lazy/slothful') and preserves
    the concrete moral sense without sounding archaic.
- source_word: ὀκνηροί
  chosen: lazy
  alternatives:
  - slothful
  - idle
  - hesitant
  lexicon: BDAG
  rationale: The adjective here contrasts with σπουδή and describes reluctance or
    sluggishness. 'Lazy' is clear modern English and captures the practical force
    better than the more archaic 'slothful.'
- source_word: πνεύματι
  chosen: spirit
  alternatives:
  - the Spirit
  - your spirit
  lexicon: BDAG
  rationale: 'The anarthrous dative can be read as the human spirit or, less likely,
    the Holy Spirit. ''Spirit'' with lowercase in English would over-specify one reading,
    so ''spirit'' is used as the most natural rendering of the likely sense: inward
    disposition enlivened before God. The alternative ''the Spirit'' is preserved
    in a footnote because the phrase has been read that way by some interpreters.'
- source_word: ζέοντες
  chosen: be fervent
  alternatives:
  - boiling
  - be aglow
  - be enthusiastic
  lexicon: BDAG
  rationale: Literally meaning 'boiling,' the participle is metaphorical for ardor
    or intensity. 'Be fervent' preserves the metaphorical force in idiomatic English
    without flattening it into mere enthusiasm.
- source_word: κυρίῳ
  chosen: the Lord
  alternatives:
  - Lord
  - master
  lexicon: BDAG
  rationale: Following the project's default for κύριος, 'Lord' is used. The article
    is represented naturally in English as 'the Lord,' and in Pauline context this
    most likely refers to the Lord Jesus, though the translation leaves the title
    itself unchanged.
- source_word: δουλεύοντες
  chosen: serve
  alternatives:
  - be enslaved to
  - be a slave to
  lexicon: BDAG
  rationale: Although δουλεύω is cognate with δοῦλος and can carry the sense of slavery,
    in this exhortational construction with dative object ('to the Lord') idiomatic
    English 'serve' best communicates the intended devotion and obedience. Rendering
    it as 'be enslaved to' would sound overly wooden here and obscure the paraenetic
    flow.
