theological_decisions:
- issue: Referent of πνεύματι in τῷ πνεύματι ζέοντες
  chosen_reading: human spirit / inward disposition
  alternative_readings:
  - the Holy Spirit
  rationale: 'The immediate context is a series of ethical exhortations marked by
    parallel datives and participles. Reading πνεύματι as the believer''s spirit fits
    the paraenetic flow: not lazy in diligence, fervent in spirit, serving the Lord.
    Because the Greek does not explicitly mark the referent and some interpreters
    understand it as the Holy Spirit, that alternative is preserved in a footnote
    rather than resolved dogmatically.'
  doctrine_reference: Preserve theological tension rather than resolve it.
