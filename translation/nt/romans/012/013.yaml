id: ROM.12.13
reference: Romans 12:13
source:
  edition: SBLGNT
  text: ταῖς χρείαις τῶν ἁγίων κοινωνοῦντες, τὴν φιλοξενίαν διώκοντες.
translation:
  text: sharing in the needs of the saints[b][a], pursuing hospitality.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'contributing to the needs of the saints.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'the hospitality'; the Greek term can carry the sense of welcoming strangers.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρείαις
  chosen: needs
  alternatives:
  - necessities
  lexicon: BDAG
  rationale: χρεία here denotes practical needs or necessities. 'Needs' is natural modern English and fits the paraenetic context of material support without sounding archaic.
- source_word: ἁγίων
  chosen: saints
  alternatives:
  - holy ones
  - God's people
  lexicon: BDAG
  rationale: ἅγιοι in Paul commonly refers to believers as the holy people of God. 'Saints' preserves the established Pauline term and its theological identity marker better than the more paraphrastic 'God's people.'
- source_word: κοινωνοῦντες
  chosen: sharing in
  alternatives:
  - contributing to
  - participating in
  lexicon: BDAG
  rationale: κοινωνέω can mean to share, participate, or contribute. With the dative 'the needs,' the sense is active participation in meeting those needs. 'Sharing in' preserves the lexical connection to fellowship/participation while remaining idiomatic; 'contributing to' is a viable contextual alternative but slightly narrows the sense to financial giving.
- source_word: φιλοξενίαν
  chosen: hospitality
  alternatives:
  - love for strangers
  - welcoming strangers
  lexicon: BDAG
  rationale: φιλοξενία literally involves love of strangers, but in idiomatic English 'hospitality' is the standard and sufficiently transparent rendering. The more literal alternatives are preserved because they highlight the outward-facing dimension of the virtue.
- source_word: διώκοντες
  chosen: pursuing
  alternatives:
  - practicing
  - eagerly seeking
  lexicon: BDAG
  rationale: διώκω literally means pursue, chase, or strive for. 'Pursuing' preserves the verbal force and urgency better than the traditional but weaker 'practicing.' It conveys intentional active seeking of opportunities for hospitality.
