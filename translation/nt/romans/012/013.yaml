- issue: Referent of 'the saints'
  chosen_reading: believers / the holy people of God
  alternative_readings:
  - canonized saints in a later ecclesiastical sense
  rationale: In Pauline usage, 'the saints' refers to Christians generally, not a later restricted category. The translation retains 'saints' as the lexical equivalent while understanding it corporately.
