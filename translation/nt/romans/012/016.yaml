theological_decisions:
- issue: Interpretation of τὰ ὑψηλά and τοῖς ταπεινοῖς in a social-humility exhortation
  chosen_reading: 'The translation preserves Paul''s exhortation broadly: not to orient
    oneself toward what is socially or pridefully elevated, but to identify with the
    lowly.'
  alternative_readings:
  - Do not be haughty, but associate with the humble
  - Do not aspire to lofty things, but give yourselves to lowly tasks
  rationale: The Greek allows both attitude-focused and social-status-focused nuances,
    and τοῖς ταπεινοῖς may denote lowly people or lowly things. The chosen rendering
    intentionally preserves this tension rather than narrowing the verse to only internal
    pride or only social association.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
