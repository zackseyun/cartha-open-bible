id: ROM.12.16
reference: Romans 12:16
source:
  edition: SBLGNT
  text: τὸ αὐτὸ εἰς ἀλλήλους φρονοῦντες, μὴ τὰ ὑψηλὰ φρονοῦντες ἀλλὰ τοῖς ταπεινοῖς
    συναπαγόμενοι. μὴ γίνεσθε φρόνιμοι παρ’ ἑαυτοῖς.
translation:
  text: Be of the same mind toward one another; do not set your mind on high things,
    but associate with the lowly. Do not become wise in your own sight.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'do not aspire to lofty things' or 'do not be haughty.'
    reason: lexical_alternative
  - marker: b
    text: Or 'associate with the humble'; the Greek may mean either lowly people or
      lowly things.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ αὐτὸ ... φρονοῦντες
  chosen: Be of the same mind
  alternatives:
  - think the same thing
  - have the same mindset
  lexicon: BDAG
  rationale: The idiom τὸ αὐτὸ φρονεῖν commonly denotes shared attitude or mutual
    harmony rather than mere identical thoughts. 'Be of the same mind' preserves the
    relational and exhortational force in natural English.
- source_word: εἰς ἀλλήλους
  chosen: toward one another
  alternatives:
  - for one another
  - with one another
  lexicon: BDAG
  rationale: εἰς with ἀλλήλους here expresses orientation toward each other in the
    community. 'Toward one another' best fits the interpersonal sense.
- source_word: μὴ τὰ ὑψηλὰ φρονοῦντες
  chosen: do not set your mind on high things
  alternatives:
  - do not be haughty
  - do not think proud thoughts
  - do not aspire to lofty things
  lexicon: BDAG
  rationale: The phrase is literally 'not thinking the high things.' It can refer
    either to proud attitudes or to aspiration toward socially elevated things/people.
    'Set your mind on high things' preserves the Greek imagery and leaves the nuance
    broad, while remaining readable.
- source_word: τοῖς ταπεινοῖς
  chosen: the lowly
  alternatives:
  - humble people
  - lowly things
  lexicon: BDAG
  rationale: The dative plural adjective may be read as masculine ('humble/lowly people')
    or neuter by sense ('lowly things'). 'The lowly' preserves the ambiguity and can
    naturally include low-status people, which fits the social context.
- source_word: συναπαγόμενοι
  chosen: be carried along with
  alternatives:
  - associate with
  - give yourselves to
  - be led along with
  lexicon: BDAG
  rationale: The verb literally means to be led or carried along with. Many English
    versions smooth this to 'associate with,' but the more vivid rendering better
    reflects the Greek while still making sense idiomatically with 'the lowly.'
- source_word: μὴ γίνεσθε
  chosen: Do not become
  alternatives:
  - Do not be
  lexicon: BDAG
  rationale: γίνομαι is ingressive/process-oriented ('become'), not simply stative.
    The wording preserves the warning against adopting such a posture.
- source_word: φρόνιμοι παρ’ ἑαυτοῖς
  chosen: wise in your own sight
  alternatives:
  - wise in yourselves
  - wise by your own estimation
  lexicon: BDAG
  rationale: This is a standard idiom for self-conceit in one's own judgment. 'In
    your own sight' is clear, idiomatic, and close to the Greek.
