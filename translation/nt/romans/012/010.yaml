id: ROM.12.10
reference: Romans 12:10
source:
  edition: SBLGNT
  text: τῇ φιλαδελφίᾳ εἰς ἀλλήλους φιλόστοργοι, τῇ τιμῇ ἀλλήλους προηγούμενοι,
translation:
  text: In brotherly love, be affectionate toward one another; in honor, outdo one
    another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'give preference to one another in honor,' or 'take the lead in honoring
      one another.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φιλαδελφίᾳ
  chosen: brotherly love
  alternatives:
  - familial love
  - love for fellow believers
  lexicon: BDAG
  rationale: The noun denotes love characterized by sibling/family bonds. 'Brotherly
    love' preserves the lexical connection to sibling affection and the Christian
    family metaphor better than a more generalized 'love.'
- source_word: εἰς ἀλλήλους
  chosen: toward one another
  alternatives:
  - for one another
  - to one another
  lexicon: BDAG
  rationale: With the relational noun and adjective, the phrase marks mutual direction.
    'Toward one another' is natural English and preserves the reciprocal force.
- source_word: φιλόστοργοι
  chosen: be affectionate
  alternatives:
  - be devoted
  - be tenderly affectionate
  lexicon: BDAG
  rationale: The adjective refers to warm natural affection, especially family affection.
    'Be affectionate' is concise and readable; 'be devoted' is possible but can sound
    less emotionally warm than the Greek suggests.
- source_word: τιμῇ
  chosen: honor
  alternatives:
  - esteem
  - respect
  lexicon: BDAG
  rationale: The noun denotes honor or value accorded to others. 'Honor' is the most
    direct and weighty rendering in this ethical context.
- source_word: προηγούμενοι
  chosen: outdo
  alternatives:
  - take the lead in showing
  - give preference to
  - go before
  lexicon: BDAG
  rationale: The participle can mean going before, taking the lead, or giving preference.
    In this context of mutual honor, 'outdo one another' captures the competitive-in-good
    sense of taking initiative in honoring others, and is idiomatic English. Because
    'give preference to one another' is also a viable reading, it is preserved in
    a footnote.
