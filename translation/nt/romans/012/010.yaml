theological_decisions:
- issue: Nature of mutual Christian affection in ethical exhortation
  chosen_reading: Render familial terms concretely ('brotherly love,' 'be affectionate')
    without flattening them into generic kindness.
  alternative_readings:
  - Use broader language such as 'love one another deeply' or 'be devoted to one another'
  rationale: The verse uses two family-affection terms in close succession, emphasizing
    warm kinship within the Christian community. The translation preserves that texture
    rather than generalizing it.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Sense of προηγούμενοι in relation to honor
  chosen_reading: Translate as 'outdo one another' in the main text, with 'give preference
    to one another' preserved in a footnote.
  alternative_readings:
  - give preference to one another
  - take the lead in honoring one another
  rationale: The Greek participle allows either the nuance of taking initiative or
    preferring others. 'Outdo one another' best conveys the reciprocal, active exhortation
    in contemporary English while preserving the alternative in a footnote to avoid
    over-resolving the nuance.
  doctrine_reference: Translation philosophy §3
