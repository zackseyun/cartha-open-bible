id: ROM.12.15
reference: Romans 12:15
source:
  edition: SBLGNT
  text: χαίρειν μετὰ ⸀χαιρόντων, κλαίειν μετὰ κλαιόντων.
translation:
  text: Rejoice with those who rejoice[a]; weep with those who weep.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Be glad with those who are glad; weep with those who are weeping.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρειν
  chosen: Rejoice
  alternatives:
  - be glad
  lexicon: BDAG
  rationale: Present active infinitive used imperativally in this paraenetic context; English imperative best conveys the exhortational force. 'Rejoice' preserves the verbal and affective sense better than the flatter 'be glad.'
- source_word: μετὰ
  chosen: with
  alternatives:
  - among
  lexicon: BDAG
  rationale: With the genitive participle, μετά denotes association/companionship. 'With' is the natural and precise English equivalent here.
- source_word: χαιρόντων
  chosen: those who rejoice
  alternatives:
  - the rejoicing ones
  - those who are rejoicing
  lexicon: BDAG
  rationale: Present active participle, genitive plural, functioning substantivally after μετά. 'Those who rejoice' is idiomatic English and preserves the generic plural sense without unnecessary stiffness.
- source_word: κλαίειν
  chosen: weep
  alternatives:
  - cry
  - mourn
  lexicon: BDAG
  rationale: Like χαίρειν, this infinitive carries imperatival force. 'Weep' best matches κλαίω's sense of audible grieving/crying and pairs well stylistically with 'rejoice.' 'Mourn' is too broad; 'cry' can sound less solemn.
- source_word: κλαιόντων
  chosen: those who weep
  alternatives:
  - the weeping ones
  - those who are weeping
  lexicon: BDAG
  rationale: Present active participle, genitive plural, substantival after μετά. 'Those who weep' is clear, natural, and maintains the parallelism with 'those who rejoice.'
