theological_decisions:
- issue: Imperatival force of the infinitives in a paraenetic series
  chosen_reading: Render both infinitives as English imperatives ('Rejoice...; weep...')
  alternative_readings:
  - To rejoice with those who rejoice; to weep with those who weep
  rationale: Although the Greek uses infinitives, in Romans 12:9–21 Paul strings together exhortations, and these infinitives function as commands/instructions. Rendering them as imperatives communicates the discourse function in natural English without adding doctrinal content.
  doctrine_reference: 'Translation philosophy: optimal equivalence; readable modern English, not archaic or academic'
