id: ROM.12.17
reference: Romans 12:17
source:
  edition: SBLGNT
  text: μηδενὶ κακὸν ἀντὶ κακοῦ ἀποδιδόντες· προνοούμενοι καλὰ ἐνώπιον πάντων ἀνθρώπων·
translation:
  text: Repaying no one evil for evil, but taking thought for what is good in the
    sight of all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'what is honorable' or 'what is noble.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδενὶ
  chosen: no one
  alternatives:
  - nobody
  - to no one
  lexicon: BDAG
  rationale: 'Dative singular of μηδείς functions as the indirect object with ἀποδιδόντες:
    ''to no one.'' ''No one'' is idiomatic modern English and preserves the universal
    scope.'
- source_word: κακὸν
  chosen: evil
  alternatives:
  - wrong
  - harm
  lexicon: BDAG
  rationale: In the phrase κακὸν ἀντὶ κακοῦ, 'evil' best preserves the moral force
    of κακός without narrowing it merely to personal injury. 'Wrong' or 'harm' are
    possible but slightly flatten the ethical dimension.
- source_word: ἀντὶ κακοῦ
  chosen: for evil
  alternatives:
  - in return for evil
  - instead of evil
  lexicon: BDAG
  rationale: 'ἀντί here expresses exchange/retaliation: ''in return for.'' In English,
    ''evil for evil'' is a natural and established way to express reciprocal retaliation.
    The fuller sense is reflected in the participle ''repaying.'''
- source_word: ἀποδιδόντες
  chosen: Repaying
  alternatives:
  - returning
  - paying back
  lexicon: BDAG
  rationale: Present participle modifying the implied addressees, carrying imperatival
    force in context. 'Repaying' captures the sense of giving back in response, especially
    in a retaliatory setting. It is more precise than 'returning' and less colloquial
    than 'paying back.'
- source_word: προνοούμενοι
  chosen: taking thought
  alternatives:
  - taking thought beforehand
  - being careful
  - providing for
  - considering in advance
  lexicon: BDAG
  rationale: προνοέω can mean to think ahead, take thought for, or give careful consideration
    to. 'Taking thought' preserves the deliberative, forward-looking sense without
    over-specifying material provision. The participle continues the exhortational
    flow.
- source_word: καλὰ
  chosen: what is good
  alternatives:
  - good things
  - what is honorable
  - what is right
  - what is noble
  lexicon: BDAG
  rationale: καλά can denote morally good, noble, or honorable things. 'What is good'
    is broad and natural, preserving the ethical sense without restricting it to social
    respectability alone. Because καλός can also carry the nuance 'honorable,' that
    alternative is preserved in a footnote.
- source_word: ἐνώπιον πάντων ἀνθρώπων
  chosen: in the sight of all people
  alternatives:
  - before all people
  - in the presence of all people
  - before everyone
  lexicon: BDAG
  rationale: ἐνώπιον literally means 'before/in the sight of.' 'In the sight of all
    people' communicates public visibility and social accountability. 'All people'
    is preferred over 'all men' as the Greek ἀνθρώπων is generic for humanity here.
