id: ROM.12.19
reference: Romans 12:19
source:
  edition: SBLGNT
  text: μὴ ἑαυτοὺς ἐκδικοῦντες, ἀγαπητοί, ἀλλὰ δότε τόπον τῇ ὀργῇ, γέγραπται γάρ· Ἐμοὶ ἐκδίκησις, ἐγὼ ἀνταποδώσω, λέγει κύριος.
translation:
  text: 'Do not avenge yourselves[a], beloved, but give place to wrath, for it is written: “Vengeance is mine; I will repay[b], says the Lord.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “leave room for wrath,” likely meaning God’s wrath in light of the following quotation.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: “Vengeance is mine; I will repay.”'
    reason: alternative_reading
lexical_decisions:
- source_word: μὴ ἑαυτοὺς ἐκδικοῦντες
  chosen: Do not avenge yourselves
  alternatives:
  - Do not take revenge yourselves
  - Do not vindicate yourselves
  lexicon: BDAG
  rationale: The present participle with μή functions imperativally in context. 'Avenge yourselves' is concise and preserves the reflexive force of ἑαυτούς with ἐκδικέω. 'Take revenge' is possible but slightly more idiomatic than the Greek wording; 'vindicate yourselves' is too weak in this context.
- source_word: ἀγαπητοί
  chosen: beloved
  alternatives:
  - dear friends
  lexicon: BDAG
  rationale: '''Beloved'' preserves the affectionate vocative and its theological warmth without flattening it into merely colloquial address.'
- source_word: ἀλλὰ δότε τόπον
  chosen: but give place
  alternatives:
  - but leave room
  - but make room
  lexicon: BDAG
  rationale: The idiom literally means 'give place/room.' 'Give place' keeps the metaphor and leaves the object of yielding explicit in the next phrase. 'Leave room' is a common interpretive rendering and is preserved in a footnote as a lexical alternative.
- source_word: τῇ ὀργῇ
  chosen: to wrath
  alternatives:
  - for wrath
  - for God's wrath
  lexicon: BDAG
  rationale: The dative after the idiom διδόναι τόπον is naturally rendered 'to wrath.' The phrase is somewhat elliptical in Greek. In context, the following citation about divine vengeance strongly suggests God's wrath, but the text itself does not explicitly say 'God's,' so the main text preserves the terser expression and the interpretive alternative is footnoted.
- source_word: γέγραπται γάρ
  chosen: for it is written
  alternatives:
  - for it stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture. 'It is written' is natural English and preserves the scriptural citation formula.
- source_word: Ἐμοὶ ἐκδίκησις
  chosen: Vengeance belongs to me
  alternatives:
  - Vengeance is mine
  lexicon: BDAG
  rationale: The dative pronoun plus noun expresses possession. 'Belongs to me' is clear modern English; the traditional 'Vengeance is mine' is preserved as an alternative in a footnote-worthy lexical note.
- source_word: ἐγὼ ἀνταποδώσω
  chosen: I will repay
  alternatives:
  - I will recompense
  lexicon: BDAG
  rationale: '''Repay'' is straightforward modern English for ἀνταποδίδωμι and fits the judicial context of divine recompense.'
- source_word: λέγει κύριος
  chosen: says the Lord
  alternatives:
  - says Lord
  lexicon: BDAG
  rationale: κύριος follows the project's default rendering 'Lord.' The article is absent in Greek, but idiomatic English in citation formulas normally uses 'the Lord.'
