theological_decisions:
- issue: Referent of 'wrath' in τῇ ὀργῇ
  chosen_reading: An intentionally concise expression best understood in context as divine wrath, without adding 'God's' to the main text.
  alternative_readings:
  - human wrath in general
  - explicitly God's wrath in the main text
  rationale: The immediate quotation from Deut 32:35 grounds the prohibition of personal vengeance in God's prerogative to judge, so divine wrath is the likely referent. However, because the Greek says only 'the wrath,' adding 'God's' in the main text would resolve an ambiguity the source leaves implicit. The translation therefore preserves the wording and notes the contextual sense.
  doctrine_reference: Preserve theological tension rather than resolve it.
