theological_decisions:
- issue: Meaning of κατὰ τὴν ἀναλογίαν τῆς πίστεως
  chosen_reading: Rendered broadly as 'in proportion to faith' without specifying
    whether Paul means the prophet's measure of faith or conformity to the faith.
  alternative_readings:
  - in proportion to one's faith
  - in agreement with the faith
  rationale: The Greek phrase is concise and genuinely open to more than one interpretive
    construal. To preserve theological tension rather than resolve it, the translation
    keeps the literal-broad wording in the main text and notes the main interpretive
    options in a footnote.
  doctrine_reference: 'Translation philosophy §3; Contested terms: πίστις → faith,
    with alternatives preserved where contested'
