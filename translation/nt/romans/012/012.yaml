id: ROM.12.12
reference: Romans 12:12
source:
  edition: SBLGNT
  text: τῇ ἐλπίδι χαίροντες, τῇ θλίψει ὑπομένοντες, τῇ προσευχῇ προσκαρτεροῦντες,
translation:
  text: rejoicing in hope[a], enduring in affliction, persisting in prayer[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'devoting yourselves to prayer' for προσκαρτεροῦντες, emphasizing steadfast devotion rather than persistence alone.
    reason: lexical_alternative
  - marker: b
    text: Or 'tribulation' for θλίψει; the term denotes severe pressure, distress, or affliction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίδι
  chosen: hope
  alternatives:
  - the hope
  lexicon: BDAG
  rationale: ἐλπίς commonly denotes hope or expectation. The dative with the article here is best rendered idiomatically as 'in hope' rather than more woodenly 'in the hope,' preserving the compact paraenetic style.
- source_word: χαίροντες
  chosen: rejoicing
  alternatives:
  - being joyful
  - rejoice
  lexicon: BDAG
  rationale: Present active participle, coordinated with the following participles in a series of exhortational descriptors. 'Rejoicing' preserves the participial form and ongoing aspect better than the finite imperative 'rejoice,' while remaining natural in English.
- source_word: θλίψει
  chosen: affliction
  alternatives:
  - tribulation
  - trouble
  - distress
  lexicon: BDAG
  rationale: θλῖψις refers to pressure, trouble, or affliction. 'Affliction' is clear modern English and retains the weight of suffering without sounding overly archaic like 'tribulation.'
- source_word: ὑπομένοντες
  chosen: enduring
  alternatives:
  - persevering
  - patiently enduring
  - remaining steadfast
  lexicon: BDAG
  rationale: ὑπομένω conveys steadfast endurance under difficulty. 'Enduring' is concise, matches the participial series, and avoids importing the narrower emotional nuance of 'patient' into the main text.
- source_word: προσευχῇ
  chosen: prayer
  alternatives:
  - the prayer
  lexicon: BDAG
  rationale: The noun denotes prayer generally. As with the other datives in the verse, the article is not naturally carried over into English; 'in prayer' is the idiomatic rendering.
- source_word: προσκαρτεροῦντες
  chosen: persisting
  alternatives:
  - devoting yourselves
  - continuing steadfastly
  - being devoted
  lexicon: BDAG
  rationale: προσκαρτερέω conveys continuing steadfastly in, persisting at, or devoting oneself to something. 'Persisting' fits the concise triadic structure and preserves the sense of ongoing devoted continuance. 'Devoting yourselves' is possible but shifts from participial parallelism and adds a reflexive element not explicit in the Greek.
