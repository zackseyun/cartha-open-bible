theological_decisions:
- issue: Scope and limitation of the exhortation
  chosen_reading: Paul commands believers to pursue peace universally, while explicitly limiting their responsibility to what is genuinely within their control.
  alternative_readings:
  - Paul commands peace without qualification
  - Paul implies peace must always be achieved if believers act rightly
  rationale: The paired qualifiers εἰ δυνατόν and τὸ ἐξ ὑμῶν prevent overreading the verse as an absolute guarantee of peace. The translation preserves both the universal scope ('with all people') and the realistic limitation ('if possible ... as far as it depends on you').
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
