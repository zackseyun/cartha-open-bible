id: ROM.12.18
reference: Romans 12:18
source:
  edition: SBLGNT
  text: εἰ δυνατόν, τὸ ἐξ ὑμῶν μετὰ πάντων ἀνθρώπων εἰρηνεύοντες·
translation:
  text: If possible[a], as far as it depends on you, live at peace with all people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'If it is possible, for your part, be at peace with all people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δυνατόν
  chosen: If possible
  alternatives:
  - If it is possible
  lexicon: BDAG
  rationale: The conditional phrase introduces a realistic qualification rather than an absolute command. 'If possible' is idiomatic modern English and preserves the sense of contingent possibility.
- source_word: τὸ ἐξ ὑμῶν
  chosen: as far as it depends on you
  alternatives:
  - so far as it is from you
  - for your part
  - as far as it is up to you
  lexicon: BDAG
  rationale: This idiomatic construction refers to what lies within the readers' own power or responsibility. 'As far as it depends on you' best captures the sense in natural English while preserving the limitation Paul places on the command.
- source_word: μετὰ πάντων ἀνθρώπων
  chosen: with all people
  alternatives:
  - with all men
  - with everyone
  lexicon: BDAG
  rationale: ἄνθρωποι here is generic for human beings, not specifically males. 'All people' is gender-accurate to the source's representative sense and reads naturally in contemporary English.
- source_word: εἰρηνεύοντες
  chosen: live at peace
  alternatives:
  - be at peace
  - keeping peace
  - living peaceably
  lexicon: BDAG
  rationale: The present participle functions imperativally in context, continuing the exhortation. 'Live at peace' conveys an ongoing manner of life rather than a momentary state, and is more idiomatic than a wooden participial rendering.
