id: ROM.12.20
reference: Romans 12:20
source:
  edition: SBLGNT
  text: ⸂ἀλλὰ ἐὰν⸃ πεινᾷ ὁ ἐχθρός σου, ψώμιζε αὐτόν· ἐὰν διψᾷ, πότιζε αὐτόν· τοῦτο
    γὰρ ποιῶν ἄνθρακας πυρὸς σωρεύσεις ἐπὶ τὴν κεφαλὴν αὐτοῦ.
translation:
  text: But if your enemy is hungry, feed him; if he is thirsty, give him something
    to drink; for by doing this you will heap burning coals on his head.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'coals of fire.' The image may suggest shame leading to repentance, painful
      moral conviction, or impending judgment; the Greek metaphor is left intact in
      the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ ἐὰν
  chosen: But if
  alternatives:
  - Rather, if
  - But whenever
  lexicon: BDAG
  rationale: ἀλλά marks contrast with the preceding prohibition against vengeance,
    and ἐάν introduces a conditional clause. 'But if' is natural English and preserves
    the adversative force.
- source_word: πεινᾷ
  chosen: is hungry
  alternatives:
  - hungers
  lexicon: BDAG
  rationale: Present active subjunctive in a conditional clause; 'is hungry' is idiomatic
    modern English, preferable to the more formal 'hungers'.
- source_word: ὁ ἐχθρός σου
  chosen: your enemy
  alternatives:
  - the enemy of you
  lexicon: BDAG
  rationale: Definite singular with possessive pronoun is best rendered naturally
    as 'your enemy.' The singular is retained.
- source_word: ψώμιζε
  chosen: feed him
  alternatives:
  - give him food
  - nourish him
  lexicon: BDAG
  rationale: Imperative from ψωμίζω, specifically to provide food. 'Feed him' is concise,
    idiomatic, and preserves the concrete action.
- source_word: διψᾷ
  chosen: is thirsty
  alternatives:
  - thirsts
  lexicon: BDAG
  rationale: As with πεινᾷ, idiomatic English favors 'is thirsty' over the more wooden
    'thirsts.'
- source_word: πότιζε
  chosen: give him something to drink
  alternatives:
  - give him drink
  - make him drink
  - give him water
  lexicon: BDAG
  rationale: Imperative from ποτίζω means to give drink. 'Give him something to drink'
    is clear modern English and avoids the archaic feel of 'give him drink.' 'Give
    him water' is too specific for the Greek.
- source_word: τοῦτο γὰρ ποιῶν
  chosen: for by doing this
  alternatives:
  - for doing this
  - for in doing this
  lexicon: BDAG
  rationale: The participial construction explains the result of the commanded actions.
    'By doing this' captures the instrumental nuance naturally.
- source_word: ἄνθρακας πυρὸς
  chosen: burning coals
  alternatives:
  - coals of fire
  - fiery coals
  lexicon: BDAG
  rationale: A literal rendering would be 'coals of fire,' but 'burning coals' is
    standard, clear English that preserves the image without unnecessary stiffness.
- source_word: σωρεύσεις
  chosen: you will heap
  alternatives:
  - you will pile up
  - you will gather
  lexicon: BDAG
  rationale: Future active indicative. 'Heap' is the conventional and accurate rendering
    for the metaphorical piling up of coals.
- source_word: ἐπὶ τὴν κεφαλὴν αὐτοῦ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: BDAG
  rationale: Straightforward prepositional phrase; 'on his head' is natural modern
    English while preserving the concrete metaphor.
