theological_decisions:
- issue: Meaning of the metaphor 'heap burning coals on his head'
  chosen_reading: Retain the metaphor without interpreting it in the main text.
  alternative_readings:
  - an image of intensifying shame leading to repentance
  - an image of divine judgment on the enemy
  - an image of painful moral conviction
  rationale: The phrase is metaphorical and interpretively disputed. In keeping with
    the translation philosophy, the text preserves the image rather than resolving
    whether Paul means shame, repentance, conviction, or judgment. The translation
    remains close to the Greek and leaves interpretation to footnote/commentary level.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
