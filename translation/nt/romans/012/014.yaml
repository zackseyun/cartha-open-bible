theological_decisions:
- issue: Scope of διώκω in context
  chosen_reading: Rendered as hostile persecution rather than mere pursuit
  alternative_readings:
  - those pursuing you
  rationale: Although διώκω can mean 'pursue,' in Pauline and early Christian ethical contexts it commonly denotes persecution. The verse's moral contrast with blessing versus cursing also favors hostile treatment in view. This is a lexical-contextual decision, not a sectarian theological one.
