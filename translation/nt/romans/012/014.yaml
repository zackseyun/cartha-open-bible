id: ROM.12.14
reference: Romans 12:14
source:
  edition: SBLGNT
  text: εὐλογεῖτε τοὺς ⸀διώκοντας, εὐλογεῖτε καὶ μὴ καταρᾶσθε.
translation:
  text: Bless those who persecute you[a]; bless and do not curse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those pursuing you.' The Greek verb can mean 'pursue,' but here likely refers to hostile persecution.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  chosen: Bless
  alternatives:
  - Speak well of
  - Invoke blessing on
  lexicon: BDAG
  rationale: Imperative plural of εὐλογέω. 'Bless' is the natural concise English equivalent and preserves both the verbal force and the ethical/religious sense of speaking or seeking good for others. Repetition is retained in English to match Paul's emphatic repetition.
- source_word: τοὺς διώκοντας
  chosen: those who persecute you
  alternatives:
  - your persecutors
  - those pursuing you
  lexicon: BDAG
  rationale: 'The participle διώκοντας with the article functions substantivally: ''those who are persecuting.'' In this context, given Romans 12''s ethic toward hostile opponents and standard NT usage, ''persecute'' is preferable to the broader ''pursue.'' ''You'' is supplied in English because the object is implicit from the exhortational context and required for idiomatic clarity.'
- source_word: καὶ
  chosen: and
  alternatives:
  - indeed
  - also
  lexicon: BDAG
  rationale: Simple connective linking the repeated positive command with the negative prohibition. 'And' best preserves the straightforward parataxis.
- source_word: μὴ καταρᾶσθε
  chosen: do not curse
  alternatives:
  - and never curse
  - do not call down curses
  lexicon: BDAG
  rationale: Present middle/passive imperative with μή gives a prohibition. 'Do not curse' is the clearest modern English rendering and preserves the contrast with 'bless.' A more expanded rendering like 'call down curses' is possible but unnecessarily interpretive in the main text.
