id: ROM.12.5
reference: Romans 12:5
source:
  edition: SBLGNT
  text: οὕτως οἱ πολλοὶ ἓν σῶμά ἐσμεν ἐν Χριστῷ, ⸀τὸ δὲ καθ’ εἷς ἀλλήλων μέλη.
translation:
  text: so we, though many, are one body in the Messiah, and individually members
    of one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “in Christ.” The Greek title Χριστός can be rendered either way; here
      it is translated “Messiah” to preserve its titular sense.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: Connects this verse to the analogy developed in the previous verse; 'so'
    is natural English and preserves the inferential/comparative force.
- source_word: οἱ πολλοὶ
  chosen: we, though many
  alternatives:
  - the many
  - we who are many
  lexicon: BDAG
  rationale: In context Paul speaks inclusively of believers, so English idiom benefits
    from making the implied first-person reference explicit. 'Though many' captures
    the concessive sense in context without over-paraphrasing.
- source_word: ἓν σῶμά
  chosen: one body
  alternatives:
  - a single body
  lexicon: BDAG
  rationale: Standard and clear rendering of the corporate metaphor; 'one body' preserves
    both unity and metaphorical force.
- source_word: ἐν Χριστῷ
  chosen: in the Messiah
  alternatives:
  - in Christ
  lexicon: BDAG
  rationale: Χριστῷ is titular here rather than merely name-like. Per doctrine, Χριστός
    is rendered 'Messiah' where context supports the title's meaning. 'In the Messiah'
    preserves Paul's union-with-Christ language while translating the title.
- source_word: τὸ δὲ καθ’ εἷς
  chosen: and individually
  alternatives:
  - and each one individually
  - but one by one
  lexicon: BDAG
  rationale: This idiom means 'with respect to each one' or 'individually.' The adverbial
    English rendering is concise and natural while preserving the distributive force.
- source_word: ἀλλήλων
  chosen: of one another
  alternatives:
  - belonging to one another
  - of each other
  lexicon: BDAG
  rationale: Genitive reciprocal pronoun expressing mutual relation among believers.
    'Of one another' is the most direct rendering in the phrase 'members of one another.'
- source_word: μέλη
  chosen: members
  alternatives:
  - limbs
  - parts
  lexicon: BDAG
  rationale: Within Paul's body metaphor, 'members' is the established and clearest
    English equivalent, preserving both bodily imagery and corporate belonging.
