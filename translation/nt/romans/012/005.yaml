theological_decisions:
- issue: Rendering Χριστῷ in the phrase ἐν Χριστῷ
  chosen_reading: in the Messiah
  alternative_readings:
  - in Christ
  rationale: The phrase is a key Pauline theological expression, but the noun itself
    remains the title Χριστός. Following the project's doctrine, titles are translated
    where context supports it. This preserves the messianic sense without altering
    the theology of union with Christ.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #2; Contested terms table
    for Χριστός'
