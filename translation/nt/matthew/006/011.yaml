id: MAT.6.11
reference: Matthew 6:11
source:
  edition: SBLGNT
  text: τὸν ἄρτον ἡμῶν τὸν ἐπιούσιον δὸς ἡμῖν σήμερον·
translation:
  text: Give us today our daily bread[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'our bread for today,' 'our bread for the coming day,' or 'the bread we need.' The Greek adjective ἐπιούσιον is rare and its precise sense is debated.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - food
  lexicon: BDAG
  rationale: ἄρτος literally means 'bread' and is the natural direct object here. While it can stand more broadly for food or provision, the concrete image should be preserved in the main text.
- source_word: ἡμῶν
  chosen: our
  lexicon: BDAG
  rationale: Straightforward possessive genitive modifying 'bread.'
- source_word: ἐπιούσιον
  chosen: daily
  alternatives:
  - for today
  - for the coming day
  - necessary for existence
  lexicon: BDAG
  rationale: ἐπιούσιος is rare and debated. 'Daily' is the most established and contextually fitting rendering in the Lord's Prayer, especially with σήμερον ('today'). It communicates the petition for ongoing, day-by-day provision in clear modern English. Because the term is lexically uncertain, major alternatives are preserved in a footnote.
- source_word: δὸς
  chosen: Give
  alternatives:
  - grant
  lexicon: BDAG
  rationale: Aorist imperative of δίδωμι, naturally rendered 'Give.' 'Grant' is possible but less direct and less idiomatic in this prayer.
- source_word: ἡμῖν
  chosen: us
  lexicon: BDAG
  rationale: Indirect object of the imperative; simple dative pronoun.
- source_word: σήμερον
  chosen: today
  alternatives:
  - this day
  lexicon: BDAG
  rationale: σήμερον means 'today.' 'This day' is traditional but less natural in contemporary English. 'Today' preserves the temporal force in readable modern English.
