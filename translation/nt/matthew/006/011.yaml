theological_decisions:
- issue: Meaning of ἐπιούσιον in the Lord's Prayer
  chosen_reading: daily
  alternative_readings:
  - for today
  - for the coming day
  - necessary/sufficient bread
  rationale: The adjective ἐπιούσιος is famously difficult and may denote bread for the present day, the coming day, or bread necessary for sustenance. In keeping with optimal equivalence and readable modern English, 'daily' best captures the prayer's dependence-on-God theme without over-specifying one scholarly reconstruction. Because the ambiguity is genuine, alternatives are preserved in a footnote rather than suppressed.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
