id: MAT.24.40
reference: Matthew 24:40
source:
  edition: SBLGNT
  text: τότε ⸂δύο ἔσονται⸃ ἐν τῷ ἀγρῷ, ⸀εἷς παραλαμβάνεται καὶ ⸁εἷς ἀφίεται·
translation:
  text: Then two men will be in the field; one is taken and one is left.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one is taken along.' The verb itself does not by itself specify whether the taking is for rescue or for judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb linking this saying to the preceding eschatological context. 'Then' is natural, concise English and preserves the sequence.
- source_word: δύο ἔσονται
  chosen: two men will be
  alternatives:
  - two will be
  lexicon: BDAG
  rationale: The Greek explicitly says 'two will be,' with masculine forms in context (εἷς ... εἷς). English commonly supplies 'men' to make the referents clear, especially since the next verse presents a female parallel. This follows the gender-accurate principle rather than flattening the masculine reference.
- source_word: ἐν τῷ ἀγρῷ
  chosen: in the field
  alternatives:
  - out in the field
  lexicon: BDAG
  rationale: Straightforward locative phrase. 'In the field' is the most direct rendering; 'out in the field' is possible but adds slight vividness not required by the Greek.
- source_word: εἷς
  chosen: one
  alternatives:
  - one man
  lexicon: BDAG
  rationale: Indefinite numeral/pronominal use. 'One' preserves the concise contrast of the Greek. 'Man' is implied by the masculine context already made explicit earlier in the clause.
- source_word: παραλαμβάνεται
  chosen: is taken
  alternatives:
  - is taken along
  - is received
  lexicon: BDAG
  rationale: Present passive used in a future-context scene description. 'Is taken' is idiomatic in English and preserves the ambiguity of the verb here without importing a specific theological interpretation about whether the taking is for salvation or judgment.
- source_word: ἀφίεται
  chosen: is left
  alternatives:
  - is left behind
  - is abandoned
  lexicon: BDAG
  rationale: Passive of ἀφίημι in this context is best rendered 'is left.' 'Left behind' is interpretively loaded in modern English because of rapture associations, and 'abandoned' overstates the sense.
