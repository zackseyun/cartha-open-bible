id: MAT.24.5
reference: Matthew 24:5
source:
  edition: SBLGNT
  text: πολλοὶ γὰρ ἐλεύσονται ἐπὶ τῷ ὀνόματί μου λέγοντες· Ἐγώ εἰμι ὁ χριστός, καὶ
    πολλοὺς πλανήσουσιν.
translation:
  text: For many will come in my name, saying, ‘I am the Messiah,’ and they will lead
    many astray.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'I am the Christ.' The Greek title is ὁ χριστός.
    reason: alternative_reading
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  lexicon: BDAG
  rationale: Standard quantitative adjective; 'many' is the natural and sufficiently
    formal rendering in context.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Connects this statement as an explanation of the preceding warning; 'for'
    preserves the explanatory force better than omitting it.
- source_word: ἐλεύσονται
  chosen: will come
  alternatives:
  - will arrive
  lexicon: BDAG
  rationale: Future middle of ἔρχομαι is idiomatically rendered 'will come'; 'arrive'
    is too narrow.
- source_word: ἐπὶ τῷ ὀνόματί μου
  chosen: in my name
  alternatives:
  - on the basis of my name
  - under my name
  lexicon: BDAG
  rationale: This prepositional phrase is idiomatically rendered 'in my name,' conveying
    appeal to Jesus' authority/identity. More literal alternatives are less natural
    in English.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - claiming
  lexicon: BDAG
  rationale: Present participle introducing the content of their claim; 'saying' is
    straightforward and does not over-interpret.
- source_word: Ἐγώ εἰμι ὁ χριστός
  chosen: I am the Messiah
  alternatives:
  - I am the Christ
  lexicon: BDAG
  rationale: 'Χριστός here is clearly titular rather than name-like, and DOCTRINE.md
    specifies ''Messiah'' as the default where title is intended. The article supports
    the titular sense: ''the Messiah.'''
- source_word: πλανήσουσιν
  chosen: will lead ... astray
  alternatives:
  - will deceive
  - will mislead
  lexicon: BDAG
  rationale: πλανάω can mean to cause someone to wander or be deceived. 'Lead astray'
    preserves both deception and deviation imagery better than the flatter 'deceive.'
- source_word: πολλοὺς
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: Object of πλανήσουσιν; 'many' is concise and natural, with 'people' unnecessary
    in English.
