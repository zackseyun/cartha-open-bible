theological_decisions:
- issue: Scope of 'the love of many'
  chosen_reading: Rendered without specifying whether this refers to humanity in general, professed disciples, or a mixed group.
  alternative_readings:
  - the love among believers will grow cold
  - human love in society will grow cold
  rationale: The Greek phrase τῶν πολλῶν is indefinite and does not explicitly identify the group. To preserve theological tension and avoid importing a narrower interpretive claim, the translation keeps the broader wording 'the love of many.'
  doctrine_reference: Preserve theological tension rather than resolve it.
