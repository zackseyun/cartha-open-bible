id: MAT.24.12
reference: Matthew 24:12
source:
  edition: SBLGNT
  text: καὶ διὰ τὸ πληθυνθῆναι τὴν ἀνομίαν ψυγήσεται ἡ ἀγάπη τῶν πολλῶν.
translation:
  text: And because lawlessness will be multiplied[b][a], the love of many will grow cold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of the increase of lawlessness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the love of the many will grow cold.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ πληθυνθῆναι
  chosen: because ... will be multiplied
  alternatives:
  - because ... increases
  - because of the increase of
  lexicon: BDAG
  rationale: 'The preposition διά with the articular infinitive expresses cause (''because, on account of''). The aorist passive infinitive πληθυνθῆναι is most naturally rendered with an English future-oriented passive in context: ''will be multiplied.'' This preserves the verbal force better than a nominalized rendering, though ''because of the increase of'' is possible.'
- source_word: ἀνομίαν
  chosen: lawlessness
  alternatives:
  - wickedness
  - iniquity
  lexicon: BDAG
  rationale: ἀνομία denotes disregard for or violation of law, especially God's law. 'Lawlessness' is the most direct and theologically transparent rendering; 'wickedness' is broader and less precise, while 'iniquity' is traditional but less accessible.
- source_word: ψυγήσεται
  chosen: will grow cold
  alternatives:
  - will be cooled
  - will cool off
  lexicon: BDAG
  rationale: The future middle/passive form of ψύχομαι is idiomatic here for emotional cooling. 'Will grow cold' is natural modern English and preserves the metaphor. 'Will be cooled' is too wooden, and 'cool off' is too informal.
- source_word: ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.' The context concerns relational and covenantal affection/fidelity among people, and 'love' is the standard, accurate gloss.
- source_word: τῶν πολλῶν
  chosen: of many
  alternatives:
  - of the many
  - of most people
  lexicon: BDAG
  rationale: The genitive plural with article is best rendered idiomatically as 'of many' rather than the more wooden 'of the many.' 'Most people' overinterprets the phrase statistically. 'Many' preserves the Greek's broad but indefinite scope.
