theological_decisions:
- issue: Meaning of Jesus' statement about his approaching καιρός
  chosen_reading: Rendered as 'My time is near' without specifying whether this refers
    narrowly to his death, the Passover meal, or the broader culmination of his mission.
  alternative_readings:
  - My appointed time is near
  - My hour is near
  rationale: The verse signals imminence but does not itself fully define the scope
    of 'time.' Preserving the broader wording maintains the narrative and theological
    tension rather than resolving it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
