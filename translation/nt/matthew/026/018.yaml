id: MAT.26.18
reference: Matthew 26:18
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν· Ὑπάγετε εἰς τὴν πόλιν πρὸς τὸν δεῖνα καὶ εἴπατε αὐτῷ· Ὁ διδάσκαλος
    λέγει· Ὁ καιρός μου ἐγγύς ἐστιν· πρὸς σὲ ποιῶ τὸ πάσχα μετὰ τῶν μαθητῶν μου.
translation:
  text: He said, “Go into the city to a certain man and tell him, ‘The Teacher says,
    “My time is near. I am keeping the Passover with you with my disciples.”’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to so-and-so.' The Greek names an intentionally unspecified but particular
      person.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with you'; the sense in context is 'at your house' or 'at your
      place.'
    reason: lexical_alternative
  - marker: c
    text: Or 'I celebrate the Passover' or 'I observe the Passover.' The Greek idiom
      is literally 'I do/make the Passover.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπάγετε
  chosen: Go
  alternatives:
  - Go away
  - Depart
  lexicon: BDAG
  rationale: Imperative of movement; simple 'Go' is natural English and fits the commissioning
    context without adding emphasis not required by the Greek.
- source_word: πρὸς τὸν δεῖνα
  chosen: to a certain man
  alternatives:
  - to so-and-so
  - to a certain one
  lexicon: BDAG
  rationale: δεῖνα refers to an unnamed but specific person. 'A certain man' communicates
    an intentionally unspecified individual in readable English. 'So-and-so' is possible
    but too colloquial for the register.
- source_word: Ὁ διδάσκαλος
  chosen: The Teacher
  alternatives:
  - The master
  - The instructor
  lexicon: BDAG
  rationale: διδάσκαλος is best rendered 'Teacher' here as a recognized title Jesus
    uses of himself in the message. 'Master' could suggest κύριος rather than διδάσκαλος.
- source_word: Ὁ καιρός μου ἐγγύς ἐστιν
  chosen: My time is near
  alternatives:
  - My appointed time is near
  - My hour is near
  lexicon: BDAG
  rationale: καιρός often denotes a significant or appointed time. 'My time is near'
    is concise and faithful; 'appointed time' is interpretively fuller and 'hour'
    would import wording from other Johannine contexts not used here.
- source_word: πρὸς σὲ
  chosen: at your house
  alternatives:
  - with you
  - at your place
  lexicon: BDAG
  rationale: Literally 'with you' or 'toward you,' but in this hospitality context
    it idiomatically indicates location/hosting. 'At your house' makes the sense explicit
    in natural English without materially departing from the meaning.
- source_word: ποιῶ τὸ πάσχα
  chosen: I am keeping the Passover
  alternatives:
  - I keep the Passover
  - I celebrate the Passover
  - I am observing the Passover
  lexicon: BDAG
  rationale: ποιέω with πάσχα is an idiom meaning to keep/celebrate/observe the Passover.
    'Keeping the Passover' preserves the festal-observance sense with moderate formality
    and avoids a wooden 'do the Passover.'
- source_word: τὸ πάσχα
  chosen: the Passover
  lexicon: BDAG
  rationale: Standard rendering for the Jewish feast; definite article retained.
- source_word: μετὰ τῶν μαθητῶν μου
  chosen: with my disciples
  alternatives:
  - with my students
  - with my followers
  lexicon: BDAG
  rationale: μαθηταί in the Gospel context are Jesus' disciples. 'Disciples' preserves
    the established relational and theological sense better than flatter alternatives.
