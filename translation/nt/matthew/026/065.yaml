id: MAT.26.65
reference: Matthew 26:65
source:
  edition: SBLGNT
  text: τότε ὁ ἀρχιερεὺς διέρρηξεν τὰ ἱμάτια αὐτοῦ ⸀λέγων· Ἐβλασφήμησεν· τί ἔτι χρείαν
    ἔχομεν μαρτύρων; ἴδε νῦν ἠκούσατε τὴν ⸀βλασφημίαν·
translation:
  text: Then the high priest tore his garments, saying, “He has blasphemed! Why do
    we still need witnesses? Look, now you have heard the blasphemy.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'What further need do we have of witnesses?'
    reason: lexical_alternative
  - marker: b
    text: The high priest's tearing of his garments was a public sign of shock, grief,
      or outrage.
    reason: cultural_note
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in narrative
    sequence; 'Then' is natural and sufficiently formal.
- source_word: ὁ ἀρχιερεὺς
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Conventional and accurate rendering of the singular office-holder; 'high
    priest' best matches Jewish leadership context.
- source_word: διέρρηξεν
  chosen: tore
  alternatives:
  - rent
  - tore apart
  lexicon: BDAG
  rationale: Aorist active indicative of tearing/rending. 'Tore' is clear modern English;
    'rent' is archaic.
- source_word: τὰ ἱμάτια αὐτοῦ
  chosen: his garments
  alternatives:
  - his clothes
  - his robes
  lexicon: BDAG
  rationale: ἱμάτια refers broadly to garments/clothing. 'Garments' preserves the
    formal, public, and culturally weighty action better than 'clothes'; 'robes' may
    be too specific.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle contemporaneous with the action. 'Saying' preserves
    the participial linkage without overcomplicating the English.
- source_word: Ἐβλασφήμησεν
  chosen: He has blasphemed
  alternatives:
  - He blasphemed
  - He has spoken blasphemy
  lexicon: BDAG
  rationale: Aorist used in exclamatory accusation. English present perfect conveys
    the immediate force of the charge in courtroom-like speech. 'Blasphemed' preserves
    the theological/legal term.
- source_word: τί ἔτι χρείαν ἔχομεν μαρτύρων;
  chosen: Why do we still need witnesses?
  alternatives:
  - What further need do we have of witnesses?
  - Why do we need any more witnesses?
  lexicon: BDAG
  rationale: Idiomatic rendering of the Greek expression χρείαν ἔχειν with genitive.
    'Still need' captures ἔτι naturally in modern English.
- source_word: ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic/interjectional imperative drawing attention. 'Look' is readable
    modern English; 'Behold' is too archaic.
- source_word: νῦν
  chosen: now
  alternatives:
  - just now
  lexicon: BDAG
  rationale: Temporal adverb retained explicitly to reflect the Greek emphasis on
    immediacy.
- source_word: ἠκούσατε
  chosen: you have heard
  alternatives:
  - you heard
  lexicon: BDAG
  rationale: 'Aorist rendered with English present perfect to fit the immediate evidentiary
    force in direct speech: the hearers have just heard and now stand accountable
    to that hearing.'
- source_word: τὴν βλασφημίαν
  chosen: the blasphemy
  alternatives:
  - this blasphemy
  - the blasphemous statement
  lexicon: BDAG
  rationale: Definite article retained. 'The blasphemy' reflects the high priest's
    characterization of Jesus' words without softening the legal-religious accusation
    into a mere 'statement'.
