theological_decisions:
- issue: Rendering the accusation of βλασφημέω / βλασφημία
  chosen_reading: Use 'blasphemed' / 'the blasphemy' in the main text as the high
    priest's charge, without implying the narrator endorses the accusation.
  alternative_readings:
  - spoken irreverently
  - uttered blasphemy
  rationale: The verse reports the high priest's reaction and legal-theological accusation
    against Jesus. Retaining the traditional legal term preserves the historical and
    theological stakes while the narrative context makes clear this is the accuser's
    judgment, not necessarily the evangelist's endorsement.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
