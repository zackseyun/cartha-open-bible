id: MAT.26.39
reference: Matthew 26:39
source:
  edition: SBLGNT
  text: καὶ ⸀προελθὼν μικρὸν ἔπεσεν ἐπὶ πρόσωπον αὐτοῦ προσευχόμενος καὶ λέγων· Πάτερ μου, εἰ δυνατόν ἐστιν, παρελθάτω ἀπ’ ἐμοῦ τὸ ποτήριον τοῦτο· πλὴν οὐχ ὡς ἐγὼ θέλω ἀλλ’ ὡς σύ.
translation:
  text: And going a little farther[a], he fell on his face, praying and saying, “My Father, if it is possible, let this cup pass from me; yet not as I will[b], but as you will.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he fell facedown.'
    reason: lexical_alternative
  - marker: b
    text: '''This cup'' is a biblical image for an appointed portion, especially suffering; compare Matthew 20:22 and 26:42.'
    reason: cross_reference
lexical_decisions:
- source_word: προελθὼν μικρὸν
  chosen: going a little farther
  alternatives:
  - having gone a little farther
  - going on a little
  lexicon: BDAG
  rationale: The aorist participle with μικρόν indicates moving a short distance onward. 'Going a little farther' is natural modern English and preserves the comparative sense better than simply 'going a little.'
- source_word: ἔπεσεν ἐπὶ πρόσωπον αὐτοῦ
  chosen: he fell on his face
  alternatives:
  - he fell facedown
  - he fell upon his face
  lexicon: BDAG
  rationale: This is a standard idiom for prostration. 'He fell on his face' preserves the vivid bodily posture and the solemnity of the scene.
- source_word: προσευχόμενος καὶ λέγων
  chosen: praying and saying
  alternatives:
  - while praying and saying
  - praying, saying
  lexicon: BDAG
  rationale: The present participles are contemporaneous with the main verb and are best carried over straightforwardly. This keeps the narrative flow without over-paraphrasing.
- source_word: Πάτερ μου
  chosen: My Father
  alternatives:
  - Father of me
  - My dear Father
  lexicon: BDAG
  rationale: Vocative πατήρ with possessive μου is naturally rendered 'My Father.' This preserves both intimacy and reverence without adding emotional coloring not explicit in the Greek.
- source_word: εἰ δυνατόν ἐστιν
  chosen: if it is possible
  alternatives:
  - if possible
  - if this is possible
  lexicon: BDAG
  rationale: '''If it is possible'' reflects the full clause and sounds natural in English. It avoids adding ''this'' where the Greek does not explicitly supply it.'
- source_word: παρελθάτω ἀπ’ ἐμοῦ
  chosen: let this cup pass from me
  alternatives:
  - let this cup go away from me
  - may this cup pass away from me
  lexicon: BDAG
  rationale: 'The aorist imperative expresses a request: ''let ... pass.'' Combined with ἀπ’ ἐμοῦ, ''pass from me'' is the most idiomatic and traditional rendering while remaining faithful to the Greek.'
- source_word: τὸ ποτήριον τοῦτο
  chosen: this cup
  alternatives:
  - this drinking cup
  lexicon: BDAG
  rationale: '''Cup'' is the literal term and should be retained because of its metaphorical theological resonance in biblical usage for an allotted suffering or divine wrath. A more explicit paraphrase would flatten the imagery.'
- source_word: πλὴν
  chosen: yet
  alternatives:
  - nevertheless
  - except that
  - but
  lexicon: BDAG
  rationale: πλήν here marks a strong qualification to the preceding request. 'Yet' is concise, natural, and preserves the contrast without sounding archaic.
- source_word: οὐχ ὡς ἐγὼ θέλω ἀλλ’ ὡς σύ
  chosen: not as I will, but as you will
  alternatives:
  - not as I want, but as you want
  - not what I will, but what you will
  lexicon: BDAG
  rationale: Rendering θέλω as 'will' preserves the solemn register and the interplay of Jesus' human desire with submission to the Father's will. Supplying 'will' in the second clause makes the ellipsis clear in English.
