theological_decisions:
- issue: The metaphor of 'the cup' in Jesus' prayer
  chosen_reading: Retained the literal image 'this cup' in the main text
  alternative_readings:
  - this suffering
  - this fate
  rationale: The Greek uses ποτήριον literally but metaphorically, echoing biblical imagery of an appointed portion, often suffering and divine wrath. Preserving 'cup' maintains intertextual and theological depth without prematurely interpreting the metaphor.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition where source sense is plain.'
- issue: Expression of Jesus' will in relation to the Father's will
  chosen_reading: Rendered θέλω as 'will' rather than 'want'
  alternative_readings:
  - want
  rationale: The verse presents Jesus' genuine human volition in submission to the Father. 'Will' better preserves the theological and literary gravity of the contrast and avoids reducing the statement to mere preference.
  doctrine_reference: 'Affirmations: Chalcedonian bounds on the two natures of Christ; translation should not flatten theological nuance.'
