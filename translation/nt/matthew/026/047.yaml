theological_decisions:
- issue: Whether to make explicit that the crowd was officially commissioned by the
    Jewish leaders
  chosen_reading: from the chief priests and elders of the people
  alternative_readings:
  - sent by the chief priests and elders of the people
  rationale: The Greek preposition ἀπό indicates source, and the context implies authorization,
    but the text does not explicitly use a verb of sending. The translation preserves
    the source wording without importing a stronger claim into the main text.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; preserve the source text''s plain sense.'
