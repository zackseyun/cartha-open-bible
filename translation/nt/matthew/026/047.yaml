id: MAT.26.47
reference: Matthew 26:47
source:
  edition: SBLGNT
  text: Καὶ ἔτι αὐτοῦ λαλοῦντος ἰδοὺ Ἰούδας εἷς τῶν δώδεκα ἦλθεν καὶ μετ’ αὐτοῦ ὄχλος
    πολὺς μετὰ μαχαιρῶν καὶ ξύλων ἀπὸ τῶν ἀρχιερέων καὶ πρεσβυτέρων τοῦ λαοῦ.
translation:
  text: And while he was still speaking, behold, Judas, one of the twelve, came, and
    with him a large crowd with swords and clubs, from the chief priests and elders
    of the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sent by the chief priests and elders of the people.' The Greek more
      literally says 'from the chief priests and elders of the people.'
    reason: alternative_reading
  - marker: b
    text: Or 'sticks.' The Greek term literally refers to pieces of wood, here likely
      used as clubs.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι αὐτοῦ λαλοῦντος
  chosen: while he was still speaking
  alternatives:
  - while he was yet speaking
  - as he was still speaking
  lexicon: BDAG
  rationale: Genitive absolute indicating contemporaneous action. 'Still' captures
    ἔτι naturally in modern English; 'while' conveys the temporal force without awkward
    literalism.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: Retained as a discourse marker signaling vividness and immediacy. 'Behold'
    is slightly traditional but still understandable and preserves the narrative punch
    better than omitting it; 'suddenly' overinterprets.
- source_word: Ἰούδας
  chosen: Judas
  rationale: Standard English transliteration of the personal name.
- source_word: εἷς τῶν δώδεκα
  chosen: one of the twelve
  alternatives:
  - one of the Twelve
  lexicon: BDAG
  rationale: Literal rendering of the partitive expression. Lowercase 'twelve' keeps
    the phrase transparent; capitalization as a quasi-title is possible but not required
    by the Greek.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Simple aorist of ἔρχομαι; 'came' is the most direct narrative equivalent.
- source_word: ὄχλος πολὺς
  chosen: a large crowd
  alternatives:
  - a great crowd
  - a large mob
  lexicon: BDAG
  rationale: '''Large crowd'' is natural modern English and preserves the quantitative
    sense of πολύς. ''Mob'' adds hostility more explicitly than the noun itself requires,
    though the context implies it.'
- source_word: μετὰ μαχαιρῶν
  chosen: with swords
  alternatives:
  - with short swords
  - with knives
  lexicon: BDAG
  rationale: μάχαιρα commonly denotes a sword or dagger-like weapon. 'Swords' is the
    standard and sufficiently broad rendering in this arrest context.
- source_word: καὶ ξύλων
  chosen: and clubs
  alternatives:
  - and sticks
  lexicon: BDAG
  rationale: ξύλον literally means 'wood' or 'piece of wood,' but in this plural weapon
    context it refers to clubs/staves. 'Clubs' communicates intended use more clearly
    than the overly literal 'wooden sticks.'
- source_word: ἀπὸ τῶν ἀρχιερέων καὶ πρεσβυτέρων τοῦ λαοῦ
  chosen: from the chief priests and elders of the people
  alternatives:
  - sent from the chief priests and elders of the people
  - from the leading priests and elders of the people
  lexicon: BDAG
  rationale: ἀπό here marks source/origin of the crowd's commission or association.
    A bare 'from' is faithful and lets the reader infer authorization from context
    without adding 'sent.' 'Chief priests' is the standard rendering for ἀρχιερεῖς;
    'elders of the people' preserves the genitive relation.
