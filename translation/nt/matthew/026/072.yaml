theological_decisions:
- issue: Reference of 'the man' in Peter's denial
  chosen_reading: Retain the literal expression 'the man' rather than replacing it with 'him' or 'Jesus.'
  alternative_readings:
  - him
  - Jesus
  rationale: The Greek explicitly says 'the man,' which conveys Peter's distancing language in the moment of denial. Replacing it with 'Jesus' would import interpretation into the main text and soften the rhetorical force of Peter's disavowal.
  doctrine_reference: Translation philosophy §§1, 4, 5
