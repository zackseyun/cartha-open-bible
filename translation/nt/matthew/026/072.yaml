id: MAT.26.72
reference: Matthew 26:72
source:
  edition: SBLGNT
  text: καὶ πάλιν ἠρνήσατο μετὰ ὅρκου ὅτι Οὐκ οἶδα τὸν ἄνθρωπον.
translation:
  text: 'And again he denied it with an oath: “I do not know the man.”[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he denied' rather than 'he denied it'; the Greek verb is followed by the content of the denial.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the simple narrative coordination without adding temporal nuance beyond the Greek.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Marks repetition of Peter's denial. 'Again' is the most natural and direct rendering in modern English.
- source_word: ἠρνήσατο
  chosen: he denied it
  alternatives:
  - he denied
  - he disowned it
  lexicon: BDAG
  rationale: The verb means to deny or repudiate. English idiom commonly supplies an object here because the content clause follows; 'he denied it' smoothly introduces the clause without changing meaning. 'Disowned' is possible but too interpretive in this context.
- source_word: μετὰ ὅρκου
  chosen: with an oath
  alternatives:
  - under oath
  - with swearing
  lexicon: BDAG
  rationale: 'The preposition with the genitive indicates accompaniment: he denied while invoking an oath. ''With an oath'' is both accurate and idiomatic. ''Under oath'' could imply a formal judicial setting not present in the text.'
- source_word: ὅτι
  chosen: ':'
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of the denial. In English, punctuation plus direct quotation is more natural than retaining 'that,' while preserving the same propositional content.
- source_word: Οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  lexicon: BDAG
  rationale: A straightforward negated statement of knowledge. The full form 'do not' fits the solemn tone better than the contraction.
- source_word: τὸν ἄνθρωπον
  chosen: the man
  alternatives:
  - this man
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a male individual, not humanity in general, so 'the man' is gender-accurate and contextually precise. 'This man' is possible in some contexts, but the demonstrative is not present in the Greek.
