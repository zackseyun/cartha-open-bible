id: MAT.26.50
reference: Matthew 26:50
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτῷ· Ἑταῖρε, ἐφ’ ⸀ὃ πάρει. τότε προσελθόντες ἐπέβαλον τὰς
    χεῖρας ἐπὶ τὸν Ἰησοῦν καὶ ἐκράτησαν αὐτόν.
translation:
  text: But Jesus said to him, “Friend, do what you came for.” Then they came up,
    laid hands on Jesus, and seized him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Friend, for what have you come?” The Greek expression is terse and
      may be understood as a question.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἑταῖρε
  chosen: Friend
  alternatives:
  - Companion
  - Comrade
  lexicon: BDAG
  rationale: Vocative address to Judas. 'Friend' is the most natural modern English
    equivalent and preserves the restrained, non-affectionate tone better than more
    formal or archaic options. It should not be overstated as intimate friendship.
- source_word: ἐφ’ ὃ πάρει
  chosen: do what you came for
  alternatives:
  - for what have you come?
  - why are you here?
  lexicon: BDAG
  rationale: The phrase is syntactically compressed and has been understood either
    as an elliptical statement/imperative-like expression ('do what you came for')
    or as a question ('for what have you come?'). Given the relative pronoun ὃ and
    the idiomatic force in context, the main text adopts the widely supported sense
    of permitting or exposing Judas's purpose. Because the Greek is terse and somewhat
    ambiguous, the interrogative alternative is preserved in a footnote.
- source_word: προσελθόντες
  chosen: they came up
  alternatives:
  - approaching
  - coming forward
  lexicon: BDAG
  rationale: Aorist participle indicating movement toward Jesus by the arresting party.
    'They came up' is natural English and fits the narrative sequence.
- source_word: ἐπέβαλον τὰς χεῖρας ἐπὶ τὸν Ἰησοῦν
  chosen: laid hands on Jesus
  alternatives:
  - put their hands on Jesus
  lexicon: BDAG
  rationale: This is a standard idiom for physically taking hold of someone, especially
    in arrest or hostile action. 'Laid hands on' preserves the idiomatic force in
    clear English.
- source_word: ἐκράτησαν αὐτόν
  chosen: seized him
  alternatives:
  - arrested him
  - took hold of him
  lexicon: BDAG
  rationale: κρατέω here denotes forceful grasping/capturing. 'Seized him' conveys
    the physical action without importing the more formal legal nuance of 'arrested'
    beyond the immediate wording.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the narrative turn
    from Judas's action to Jesus's response.
