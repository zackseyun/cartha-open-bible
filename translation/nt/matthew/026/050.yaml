theological_decisions:
- issue: Interpretation of Jesus's address and response to Judas
  chosen_reading: 'Render Jesus''s words without softening their tension: ''Friend,
    do what you came for.'''
  alternative_readings:
  - Friend, for what have you come?
  - Friend, why are you here?
  rationale: The verse presents Jesus addressing Judas with restraint while not resolving
    all interpretive nuance in the compressed Greek. The translation preserves the
    tension rather than forcing either a purely gentle or purely condemnatory tone.
    Because the clause is genuinely debated, the alternative is preserved in a footnote
    in keeping with the translation philosophy.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
