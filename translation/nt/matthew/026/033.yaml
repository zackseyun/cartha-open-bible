theological_decisions:
- issue: Rendering σκανδαλίζω in a discipleship-failure context
  chosen_reading: fall away
  alternative_readings:
  - stumble
  - be offended
  rationale: The verse concerns disciples abandoning loyalty to Jesus under pressure.
    'Fall away' preserves that stronger covenantal/discipleship sense better than
    the more physical or emotional 'stumble'/'be offended,' while not importing a
    technical doctrine of final apostasy.
  doctrine_reference: Preserve theological tension rather than resolve it; optimal
    equivalence
