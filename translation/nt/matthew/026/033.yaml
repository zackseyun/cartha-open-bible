id: MAT.26.33
reference: Matthew 26:33
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ ὁ Πέτρος εἶπεν αὐτῷ· Εἰ πάντες σκανδαλισθήσονται ἐν σοί, ⸀ἐγὼ
    οὐδέποτε σκανδαλισθήσομαι.
translation:
  text: But Peter answered him, “Even if all fall away because of you, I will never
    fall away.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “stumble” or “be caused to stumble.” The Greek verb can denote being
      tripped up, taking offense, or falling away.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in narrative ('answered and said'). English normally reduces
    this to 'answered' for natural style without loss of meaning.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks mild contrast or development. 'But' fits the context because
    Peter's response stands in contrast to Jesus' prior prediction.
- source_word: εἶπεν αὐτῷ
  chosen: Peter answered him
  alternatives:
  - Peter said to him
  lexicon: BDAG
  rationale: The combination of participle plus finite speech verb is represented
    idiomatically in English as a single speech introduction. 'Him' preserves the
    indirect object αὐτῷ.
- source_word: Εἰ πάντες
  chosen: Even if all
  alternatives:
  - If all
  - Though all
  lexicon: BDAG
  rationale: Although εἰ formally means 'if,' in this emphatic context with Peter's
    self-contrast, 'Even if all' best conveys the concessive force implied in English.
- source_word: σκανδαλισθήσονται
  chosen: fall away
  alternatives:
  - stumble
  - take offense
  - be caused to stumble
  lexicon: BDAG
  rationale: In this discipleship context, σκανδαλίζω refers not merely to tripping
    but to being caused to stumble into defection. 'Fall away' communicates the relational
    and spiritual sense more clearly in modern English.
- source_word: ἐν σοί
  chosen: because of you
  alternatives:
  - in you
  - on account of you
  lexicon: BDAG
  rationale: Here ἐν with a personal pronoun is idiomatic and tied to σκανδαλίζω,
    meaning to stumble because of someone or in connection with someone. 'Because
    of you' is the clearest natural English rendering.
- source_word: ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek, contrasting Peter with 'all.'
    English captures this sufficiently by placement and context without needing the
    heavier 'I myself.'
- source_word: οὐδέποτε
  chosen: never
  alternatives:
  - certainly never
  - not ever
  lexicon: BDAG
  rationale: οὐδέποτε is an emphatic negation of time. 'Never' is the standard concise
    equivalent.
- source_word: σκανδαλισθήσομαι
  chosen: fall away
  alternatives:
  - stumble
  - be caused to stumble
  lexicon: BDAG
  rationale: For consistency with the previous occurrence of the same verb in the
    same sentence, the same English gloss is retained. The context is Peter's denial
    of apostasy/defection, not merely momentary stumbling.
