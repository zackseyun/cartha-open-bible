id: MAT.26.21
reference: Matthew 26:21
source:
  edition: SBLGNT
  text: καὶ ἐσθιόντων αὐτῶν εἶπεν· Ἀμὴν λέγω ὑμῖν ὅτι εἷς ἐξ ὑμῶν παραδώσει με.
translation:
  text: And while they were eating, he said, “Truly I tell you, one of you will betray
    me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “will hand me over” or “will deliver me over.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσθιόντων αὐτῶν
  chosen: while they were eating
  alternatives:
  - as they were eating
  - during their eating
  lexicon: BDAG
  rationale: The genitive absolute indicates contemporaneous action. 'While they were
    eating' is natural modern English and preserves the temporal force without wooden
    literalism.
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: In Jesus' sayings, ἀμήν functions as a solemn affirmation introducing
    an authoritative statement. 'Truly' communicates the force idiomatically in English
    better than leaving it untranslated as 'Amen' here.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: This is a common speech formula. 'I tell you' is idiomatic contemporary
    English while preserving the direct address and solemnity.
- source_word: εἷς ἐξ ὑμῶν
  chosen: one of you
  alternatives:
  - one from among you
  lexicon: BDAG
  rationale: This is the straightforward sense of the partitive expression. 'One of
    you' is the clearest natural rendering.
- source_word: παραδώσει
  chosen: will betray
  alternatives:
  - will hand over
  - will deliver over
  lexicon: BDAG
  rationale: Although παραδίδωμι can mean 'hand over' or 'deliver,' in this context
    of Judas's act against Jesus the relational treachery is foregrounded, and standard
    English expresses that as 'betray.' The future tense is preserved with 'will betray'.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; no special nuance requires
    expansion.
