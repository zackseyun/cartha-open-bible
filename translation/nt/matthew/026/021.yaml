theological_decisions:
- issue: Rendering of παραδώσει in the passion context
  chosen_reading: will betray
  alternative_readings:
  - will hand me over
  - will deliver me over
  rationale: The Greek verb itself is broader than 'betray,' but in this narrative
    context the act is specifically the treacherous handing over of Jesus by one of
    his own disciples. 'Betray' best communicates the contextual meaning in natural
    English without importing additional doctrine.
  doctrine_reference: Translation philosophy §1, §6
