theological_decisions:
- issue: Reference of 'the temple of God' in the accusation
  chosen_reading: Translate the accusation at face value as referring to the physical temple, without importing John's later interpretive identification of Jesus' body into the main text.
  alternative_readings:
  - An allusive reference to Jesus' body/resurrection should control the translation here
  rationale: In Matthew 26:61 the speakers are reporting an accusation during Jesus' trial. The translation should render what they claim he said, not harmonize the line in the main text with John 2:21. Any christological interpretation belongs in cross-reference or commentary, not in the translation itself.
  doctrine_reference: Translation philosophy §§1, 3
