id: MAT.26.61
reference: Matthew 26:61
source:
  edition: SBLGNT
  text: εἶπαν· Οὗτος ἔφη· Δύναμαι καταλῦσαι τὸν ναὸν τοῦ θεοῦ καὶ διὰ τριῶν ἡμερῶν ⸀οἰκοδομῆσαι.
translation:
  text: They said[a], “This man said[b], ‘I am able to destroy the temple of God and to build it in three days.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “within three days.” The Greek expression can denote completion during that span.
    reason: lexical_alternative
  - marker: b
    text: John 2:19–21 identifies Jesus' saying about the temple as referring to his body.
    reason: cross_reference
lexical_decisions:
- source_word: εἶπαν
  chosen: They said
  alternatives:
  - They were saying
  lexicon: BDAG
  rationale: Aorist indicative introduces the witnesses' accusation as a simple past event; 'They said' is the natural narrative rendering.
- source_word: Οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: In accusatory courtroom-style speech, οὗτος can be rendered more idiomatically as 'this man' in English, preserving the dismissive/deictic force better than the wooden 'this one.'
- source_word: ἔφη
  chosen: said
  alternatives:
  - declared
  - claimed
  lexicon: BDAG
  rationale: φημί here simply reports alleged speech. 'Said' is sufficient and avoids overstating the force.
- source_word: Δύναμαι
  chosen: I am able
  alternatives:
  - I can
  lexicon: BDAG
  rationale: Both are possible; 'I am able' slightly better reflects the lexical sense of capability and fits the formal accusation being quoted.
- source_word: καταλῦσαι
  chosen: to destroy
  alternatives:
  - to tear down
  - to dismantle
  lexicon: BDAG
  rationale: For a temple/building context, καταλύω can mean destroy or tear down. 'Destroy' is the most natural English in this accusation and matches the hostile framing.
- source_word: ναὸν
  chosen: temple
  alternatives:
  - sanctuary
  lexicon: BDAG
  rationale: ναός can denote the sanctuary/temple. In this reported accusation about the Jerusalem temple, 'temple' is the clearest idiomatic rendering, while 'sanctuary' would sound overly narrow or technical in English.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - God's
  lexicon: BDAG
  rationale: The genitive is straightforwardly possessive/descriptive. 'Of God' preserves the formal tone of the accusation.
- source_word: διὰ τριῶν ἡμερῶν
  chosen: in three days
  alternatives:
  - within three days
  - through three days
  lexicon: BDAG
  rationale: With the genitive, διά can express a span of time. In idiomatic English here, 'in three days' best conveys the sense of accomplishing the rebuilding within that period. 'Within three days' is possible but slightly more interpretive.
- source_word: οἰκοδομῆσαι
  chosen: to build it
  alternatives:
  - to rebuild it
  - to build
  lexicon: BDAG
  rationale: Because the object 'temple' carries over from the previous infinitive, English benefits from supplying 'it.' 'Build it' is closer to the Greek wording; 'rebuild it' is interpretive though contextually plausible.
