theological_decisions:
- issue: Nature of Gethsemane
  chosen_reading: Rendered χωρίον as 'place' rather than 'garden.'
  alternative_readings:
  - garden
  rationale: Matthew's wording itself says only that Jesus came to a 'place' called
    Gethsemane. Translating 'garden' would import detail from John 18:1 rather than
    preserve Matthew's own wording.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition)
