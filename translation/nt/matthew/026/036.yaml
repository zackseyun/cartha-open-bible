id: MAT.26.36
reference: Matthew 26:36
source:
  edition: SBLGNT
  text: Τότε ἔρχεται μετ’ αὐτῶν ὁ Ἰησοῦς εἰς χωρίον λεγόμενον Γεθσημανί, καὶ λέγει
    τοῖς μαθηταῖς· Καθίσατε αὐτοῦ ἕως οὗ ἀπελθὼν ⸂ἐκεῖ προσεύξωμαι⸃.
translation:
  text: Then Jesus comes with them to a place called Gethsemane, and he says to the
    disciples, “Sit here while I go over there and pray.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Sit here until I go there and pray.' The Greek expression can be rendered
      more literally with 'until,' though 'while' is more natural in English here.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in sequence;
    'Then' is natural modern English and preserves narrative flow.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  - arrives
  lexicon: BDAG
  rationale: 'Greek uses the historical present. English can preserve vividness with
    present tense in narrative: ''comes.'' ''Arrives'' is possible but less direct.'
- source_word: μετ’ αὐτῶν
  chosen: with them
  lexicon: BDAG
  rationale: Straightforward accompaniment sense of μετά with genitive.
- source_word: χωρίον
  chosen: place
  alternatives:
  - plot of land
  - estate
  - garden
  lexicon: BDAG
  rationale: χωρίον denotes a place/property/tract of land. 'Place' is broad and idiomatic
    here. 'Garden' is interpretive from Johannine context, not stated by Matthew.
- source_word: λεγόμενον
  chosen: called
  alternatives:
  - named
  lexicon: BDAG
  rationale: Common participial formula for naming a location; 'called' is the most
    natural English equivalent.
- source_word: Γεθσημανί
  chosen: Gethsemane
  rationale: Proper name is transliterated per translation philosophy.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Another historical present; retained as present for narrative vividness
    and consistency with ἔρχεται.
- source_word: Καθίσατε
  chosen: Sit
  alternatives:
  - Sit down
  - Remain seated
  lexicon: BDAG
  rationale: Aorist imperative gives a simple command. 'Sit' is concise and natural
    in direct speech.
- source_word: αὐτοῦ
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Adverb meaning 'here/in this place.' 'Here' is idiomatic in Jesus' instruction
    to the disciples.
- source_word: ἕως οὗ
  chosen: while
  alternatives:
  - until
  lexicon: BDAG
  rationale: 'Literally ''until [the time when],'' but in English with a first-person
    action clause, ''while'' communicates the intended temporary waiting more naturally:
    they are to remain seated during the period of his going and praying.'
- source_word: ἀπελθὼν
  chosen: I go
  alternatives:
  - having gone
  - after going away
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb can be rendered with an English
    finite verb for natural style. 'I go' avoids wooden phrasing while preserving
    sequence.
- source_word: ἐκεῖ
  chosen: over there
  alternatives:
  - there
  lexicon: BDAG
  rationale: ἐκεῖ marks a location distinct from where the disciples are sitting.
    'Over there' brings out the deictic contrast with αὐτοῦ ('here').
- source_word: προσεύξωμαι
  chosen: pray
  alternatives:
  - may pray
  lexicon: BDAG
  rationale: Aorist middle subjunctive after ἕως οὗ expresses intended action. In
    idiomatic English direct speech, 'and pray' best conveys purpose/result without
    awkwardness.
