id: MAT.26.54
reference: Matthew 26:54
source:
  edition: SBLGNT
  text: πῶς οὖν πληρωθῶσιν αἱ γραφαὶ ὅτι οὕτως δεῖ γενέσθαι;
translation:
  text: How then would the Scriptures be fulfilled[a], that it must happen this way?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'How then could the Scriptures be fulfilled, that it must happen so?'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: How
  alternatives:
  - How then could
  - In what way
  lexicon: BDAG
  rationale: Interrogative adverb introducing a rhetorical question. 'How' is the natural English equivalent and preserves the force of Jesus' question.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Inferential particle linking this question to the preceding statement about refusing violent resistance. 'Then' is idiomatic and preserves the logical connection without sounding overly formal.
- source_word: πληρωθῶσιν
  chosen: would ... be fulfilled
  alternatives:
  - might be fulfilled
  - could be fulfilled
  lexicon: BDAG
  rationale: 'Aorist passive subjunctive of πληρόω after πῶς in a rhetorical question. ''Would be fulfilled'' best conveys the potential/contrary-to-fact sense in context: if events were otherwise, the Scriptures would not reach fulfillment.'
- source_word: αἱ γραφαὶ
  chosen: the Scriptures
  alternatives:
  - the writings
  - the scriptural writings
  lexicon: BDAG
  rationale: γραφή in the plural commonly refers to the sacred Scriptures. Capitalized 'Scriptures' reflects established referential force to Israel's sacred writings rather than generic texts.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  - namely that
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the content of what the Scriptures indicate: ''that it must happen this way.'' ''That'' is the most straightforward rendering.'
- source_word: οὕτως
  chosen: this way
  alternatives:
  - thus
  - so
  lexicon: BDAG
  rationale: Adverb referring to the manner in which the events of Jesus' arrest and suffering are unfolding. 'This way' is clear modern English and avoids the slightly archaic 'thus.'
- source_word: δεῖ
  chosen: it must
  alternatives:
  - it is necessary
  - it has to
  lexicon: BDAG
  rationale: δεῖ expresses necessity, here in relation to divine necessity implied by scriptural fulfillment. 'It must' is concise and preserves the force without overexplaining the source of the necessity.
- source_word: γενέσθαι
  chosen: happen
  alternatives:
  - take place
  - come to pass
  lexicon: BDAG
  rationale: Infinitive of γίνομαι in this context refers to events occurring. 'Happen' is natural modern English; 'come to pass' is traditional but archaic.
