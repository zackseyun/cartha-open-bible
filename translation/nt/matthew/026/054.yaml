theological_decisions:
- issue: Nature of the necessity expressed by δεῖ
  chosen_reading: Render the necessity simply as 'it must' without explicitly adding 'according to God's plan' or similar explanatory language.
  alternative_readings:
  - it is necessary
  - it must happen according to God's will
  rationale: The verse implies divine/scriptural necessity through the combination of scriptural fulfillment and δεῖ, but the Greek does not explicitly spell out a fuller doctrinal explanation. Preserving the tension avoids importing more theological interpretation than the text states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
