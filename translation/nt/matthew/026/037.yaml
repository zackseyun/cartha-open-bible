id: MAT.26.37
reference: Matthew 26:37
source:
  edition: SBLGNT
  text: καὶ παραλαβὼν τὸν Πέτρον καὶ τοὺς δύο υἱοὺς Ζεβεδαίου ἤρξατο λυπεῖσθαι καὶ ἀδημονεῖν.
translation:
  text: And taking Peter and the two sons of Zebedee with him[a], he began to be sorrowful and deeply distressed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he began to be grieved and troubled.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παραλαβὼν
  chosen: taking ... with him
  alternatives:
  - taking along
  - bringing with him
  lexicon: BDAG
  rationale: Aorist participle of παραλαμβάνω here indicates Jesus taking selected companions along with him. 'With him' makes the relational force natural in English without overtranslating.
- source_word: τοὺς δύο υἱοὺς Ζεβεδαίου
  chosen: the two sons of Zebedee
  alternatives:
  - the two sons of Zebedee's household
  - James and John
  lexicon: BDAG
  rationale: This is the literal identification in the Greek. The names are not supplied in this verse, so the translation preserves the source wording rather than expanding interpretively to 'James and John.'
- source_word: ἤρξατο
  chosen: he began
  alternatives:
  - he started
  lexicon: BDAG
  rationale: The ingressive sense is explicit in the Greek middle form with complementary infinitives. 'Began' is the standard and suitably weighty English rendering.
- source_word: λυπεῖσθαι
  chosen: to be sorrowful
  alternatives:
  - to be grieved
  - to be sad
  lexicon: BDAG
  rationale: The verb denotes experiencing grief or sorrow. 'Sorrowful' preserves the solemn register appropriate to the scene better than the flatter 'sad,' while remaining clear.
- source_word: ἀδημονεῖν
  chosen: deeply distressed
  alternatives:
  - troubled
  - anguished
  - in great distress
  lexicon: BDAG
  rationale: The verb conveys acute inner distress, anxiety, or anguish. 'Deeply distressed' is idiomatic modern English and preserves the intensification beyond λυπεῖσθαι without becoming overly interpretive.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - both ... and
  lexicon: BDAG
  rationale: The repeated καί coordinates both the companions and the paired emotional verbs. Standard 'and' keeps the flow natural while preserving the accumulation in the Greek.
