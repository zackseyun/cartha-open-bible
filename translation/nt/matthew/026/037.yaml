theological_decisions:
- issue: Description of Jesus' emotional state in light of Christology
  chosen_reading: Render both verbs straightforwardly as real human sorrow and distress
  alternative_readings:
  - Soften the language to avoid strong emotional vulnerability
  - Heighten the language to 'terror' or 'despair' beyond the lexical evidence
  rationale: In keeping with Chalcedonian orthodoxy, the verse should be translated plainly, showing Jesus' genuine human emotional suffering without diminishing his humanity or overstating the Greek into hopeless despair. The paired verbs indicate authentic sorrow and severe distress.
  doctrine_reference: 'Affirmations: Definition of Chalcedon (451 AD); Translation philosophy §3 preserve theological tension rather than resolve it'
