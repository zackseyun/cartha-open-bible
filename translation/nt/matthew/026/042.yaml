id: MAT.26.42
reference: Matthew 26:42
source:
  edition: SBLGNT
  text: πάλιν ἐκ δευτέρου ἀπελθὼν προσηύξατο λέγων· Πάτερ μου, εἰ οὐ δύναται ⸀τοῦτο
    ⸀παρελθεῖν ἐὰν μὴ αὐτὸ πίω, γενηθήτω τὸ θέλημά σου.
translation:
  text: Again, a second time he went away and prayed, saying, “My Father, if this
    cannot pass unless I drink it, your will be done.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the cup of suffering mentioned in the previous verse; Greek here
      says simply 'this' and 'it.'
    reason: cross_reference
  - marker: b
    text: Or 'if it is not possible for this to pass unless I drink it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: Again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Adverb marking repetition; 'Again' is concise and natural in narrative
    English.
- source_word: ἐκ δευτέρου
  chosen: a second time
  alternatives:
  - for the second time
  - again, for the second time
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'for the second time.' Rendered smoothly
    with πάλιν as 'Again, a second time' to preserve both elements rather than collapsing
    them into one English phrase.
- source_word: ἀπελθὼν
  chosen: he went away
  alternatives:
  - having gone away
  - after going away
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb; in English narrative it is
    best rendered with a finite verb coordinated with the main action.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  lexicon: BDAG
  rationale: Standard rendering of the middle deponent verb προσεύχομαι; 'prayed'
    is clear and idiomatic.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Participle introducing the content of the prayer; 'saying' preserves
    the Greek structure naturally.
- source_word: Πάτερ μου
  chosen: My Father
  alternatives:
  - Father of me
  - My dear Father
  lexicon: BDAG
  rationale: Vocative with possessive pronoun expressing intimate filial address.
    'My Father' is the most direct and theologically appropriate rendering.
- source_word: εἰ οὐ δύναται τοῦτο παρελθεῖν
  chosen: if this cannot pass
  alternatives:
  - if this is not able to pass away
  - if it is not possible for this to pass
  lexicon: BDAG
  rationale: οὐ δύναται expresses inability/impossibility; τοῦτο is the subject ('this'),
    and παρελθεῖν means 'to pass.' 'Cannot pass' is natural English and preserves
    the sense without overexpansion.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this thing
  - this cup
  lexicon: BDAG
  rationale: The demonstrative is explicit in the Greek, but 'cup' is not stated in
    this verse. The immediate context implies the cup, yet the translation should
    not import the noun into the main text. The contextual identification is preserved
    in a footnote.
- source_word: ἐὰν μὴ αὐτὸ πίω
  chosen: unless I drink it
  alternatives:
  - except I drink it
  - if I do not drink it
  lexicon: BDAG
  rationale: Standard conditional idiom ἐὰν μή = 'unless.' αὐτό refers back to 'this';
    'drink it' preserves the implied object without adding 'cup' to the main text.
- source_word: γενηθήτω
  chosen: be done
  alternatives:
  - come to pass
  - happen
  - take place
  lexicon: BDAG
  rationale: Aorist passive imperative of γίνομαι in a volitional prayer formula.
    'Be done' is the established and accurate English equivalent in this context.
- source_word: τὸ θέλημά σου
  chosen: your will
  alternatives:
  - what you will
  - your desire
  lexicon: BDAG
  rationale: θέλημα here denotes God's will/purpose. 'Your will' is both accurate
    and idiomatic, preserving the theological weight of submission.
