theological_decisions:
- issue: Whether to specify 'cup' in the main text for τοῦτο / αὐτό
  chosen_reading: Retain the more literal 'this' ... 'it' in the main text
  alternative_readings:
  - '''this cup'' ... ''it'''
  - '''this cup'' ... ''this cup'''
  rationale: The immediate context (26:39) makes clear that Jesus is speaking of the
    cup, but Matthew 26:42 itself does not repeat ποτήριον. To avoid importing a noun
    not present in the Greek while still preserving intelligibility, the main text
    keeps the demonstrative and pronoun, with the contextual referent noted in a footnote.
    This preserves the narrative and theological connection to the cup of suffering
    without overtranslating.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering Jesus' prayer of submission
  chosen_reading: your will be done
  alternative_readings:
  - let your will be done
  - may your will happen
  rationale: This wording preserves the imperative force and echoes the same prayer
    language in Matthew 6:10, maintaining intratextual consistency and theological
    resonance without adding interpretive material.
  doctrine_reference: Translation philosophy §5
