id: MAT.26.6
reference: Matthew 26:6
source:
  edition: SBLGNT
  text: Τοῦ δὲ Ἰησοῦ γενομένου ἐν Βηθανίᾳ ἐν οἰκίᾳ Σίμωνος τοῦ λεπροῦ,
translation:
  text: Now while Jesus was in Bethany[a], in the house of Simon the leper[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'when Jesus was in Bethany.' The Greek uses a genitive absolute that sets the scene temporally.
    reason: lexical_alternative
  - marker: b
    text: '''Leper'' reflects the Greek term used as Simon''s identifying epithet; it does not by itself specify whether he currently had the condition or had it formerly.'
    reason: cultural_note
lexical_decisions:
- source_word: Τοῦ δὲ Ἰησοῦ γενομένου
  chosen: while Jesus was
  alternatives:
  - when Jesus was
  - after Jesus had come to be
  lexicon: BDAG
  rationale: The genitive absolute with γίνομαι here functions idiomatically to set the scene temporally. 'While Jesus was' gives natural English and preserves the circumstantial force without woodenly rendering γίνομαι as 'came to be.' 'Now' separately reflects δέ.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective marking narrative transition rather than strong contrast. 'Now' signals the shift in scene naturally in English.
- source_word: ἐν Βηθανίᾳ
  chosen: in Bethany
  lexicon: BDAG
  rationale: Straightforward locative use of ἐν with the place name Βηθανία.
- source_word: ἐν οἰκίᾳ
  chosen: in the house
  alternatives:
  - at the house
  - in the home
  lexicon: BDAG
  rationale: 'οἰκία can mean house or household/home. Here the physical setting is in view, so ''house'' is the clearest and most direct rendering. The article is supplied in English for natural possessive construction: ''the house of Simon.'''
- source_word: Σίμωνος
  chosen: of Simon
  lexicon: BDAG
  rationale: Genitive of possession identifying whose house it was.
- source_word: τοῦ λεπροῦ
  chosen: the leper
  alternatives:
  - the man with a skin disease
  lexicon: BDAG
  rationale: λεπρός is conventionally rendered 'leper.' Although broader than modern Hansen's disease terminology, 'leper' remains the most recognizable concise label in this narrative identifier. A more expansive rendering could reduce stigma but would be less idiomatic as a fixed epithet attached to Simon's name.
