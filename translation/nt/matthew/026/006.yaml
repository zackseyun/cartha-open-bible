theological_decisions:
- issue: Potential implication of Simon's condition from the epithet 'the leper'
  chosen_reading: Retain the narrative identifier 'Simon the leper' without inferring whether he currently had leprosy or had previously been healed.
  alternative_readings:
  - Simon, formerly a leper
  - Simon, a man with a skin disease
  rationale: The Greek simply uses an identifying epithet and does not specify timing or medical precision. The translation should not import an unstated healing tradition or modern diagnostic specificity.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
