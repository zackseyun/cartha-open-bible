theological_decisions:
- issue: Strength of Peter's denial statement
  chosen_reading: Rendered οὐ μή with emphatic future negation as 'I will certainly not deny you.'
  alternative_readings:
  - I will never deny you
  rationale: The Greek expresses strong negation. 'Will certainly not' preserves the emphasis while avoiding a potentially over-idiomatic absolute phrasing. The verse narrates Peter's emphatic self-confidence without importing theological interpretation beyond the text.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it
