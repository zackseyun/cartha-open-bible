id: MAT.26.35
reference: Matthew 26:35
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Πέτρος· Κἂν δέῃ με σὺν σοὶ ἀποθανεῖν, οὐ μή σε ⸀ἀπαρνήσομαι. ⸀ὁμοίως καὶ πάντες οἱ μαθηταὶ εἶπαν.
translation:
  text: Peter said to him[a], “Even if I must die with you, I will certainly not deny you.” Likewise all the disciples also said the same.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “I will never deny you.” The Greek uses a strong negation (οὐ μή).
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('says'), English narrative style is more natural with the simple past 'said' here. This is a standard optimal-equivalence adjustment that preserves the discourse function without woodenly retaining the present tense.
- source_word: Κἂν
  chosen: Even if
  alternatives:
  - and if
  - if indeed
  lexicon: BDAG
  rationale: κἄν here introduces a concessive condition. 'Even if' best captures Peter's emphatic concession in idiomatic English.
- source_word: δέῃ
  chosen: I must
  alternatives:
  - it should be necessary for me
  - I need to
  lexicon: BDAG
  rationale: The verb conveys necessity. 'I must' is concise, natural English and fits the force of the subjunctive construction with κἄν.
- source_word: σὺν σοὶ
  chosen: with you
  alternatives:
  - together with you
  lexicon: BDAG
  rationale: The prepositional phrase expresses accompaniment. 'With you' is the natural English rendering; 'together with you' would be unnecessarily heavy.
- source_word: ἀποθανεῖν
  chosen: die
  alternatives:
  - to die
  lexicon: BDAG
  rationale: The infinitive complements the idea of necessity. In English, 'must die with you' is smoother than 'must to die with you' and fully conveys the sense.
- source_word: οὐ μή
  chosen: will certainly not
  alternatives:
  - will never
  - surely will not
  lexicon: BDAG
  rationale: οὐ μή is a strong negation. 'Will certainly not' preserves the emphatic force without sounding overly idiomatic or absolute beyond the future context.
- source_word: ἀπαρνήσομαι
  chosen: deny
  alternatives:
  - disown
  - renounce
  lexicon: BDAG
  rationale: In this context of Peter's coming denial of Jesus, 'deny' is the clearest and most established English equivalent. 'Disown' is possible but less direct; 'renounce' is too strong and formal.
- source_word: ὁμοίως
  chosen: the same
  alternatives:
  - likewise
  - in the same way
  lexicon: BDAG
  rationale: The adverb means 'likewise/in the same way.' In the clause 'all the disciples said the same,' this becomes idiomatic modern English while preserving the meaning.
- source_word: πάντες οἱ μαθηταὶ
  chosen: all the disciples
  alternatives:
  - all the learners
  - all his disciples
  lexicon: BDAG
  rationale: μαθηταί is regularly rendered 'disciples' in Gospel narrative. The possessive 'his' is implied by context but not explicit, so it is omitted.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - spoke
  - declared
  lexicon: BDAG
  rationale: Aorist of λέγω is straightforwardly rendered 'said.' More elevated alternatives add nuance not required by the Greek.
