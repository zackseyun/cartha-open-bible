theological_decisions:
- issue: Whether to include 'new' with 'covenant'
  chosen_reading: of the covenant
  alternative_readings:
  - of the new covenant
  rationale: The provided Greek base text lacks καινῆς ('new'). To avoid importing
    wording from parallels or later textual traditions into the main text, the translation
    follows the source text as given while preserving the common alternative in a
    footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition); §3 (Preserve theological tension rather than resolve it)
- issue: Implication of 'for many' in atonement language
  chosen_reading: for many
  alternative_readings:
  - for all
  rationale: The Greek says πολλῶν, 'many.' The translation preserves the wording
    without resolving broader theological debates about the extent of the atonement.
    No expansion to 'all' is warranted by this verse's wording alone.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives
    unless the Greek unambiguously supports one reading
