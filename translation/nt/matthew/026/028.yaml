id: MAT.26.28
reference: Matthew 26:28
source:
  edition: SBLGNT
  text: τοῦτο γάρ ἐστιν τὸ αἷμά ⸀μου ⸀τῆς διαθήκης τὸ περὶ πολλῶν ἐκχυννόμενον εἰς
    ἄφεσιν ἁμαρτιῶν·
translation:
  text: For this is my blood of the covenant, which is poured out for many for the
    forgiveness of sins.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'my blood of the new covenant.'
    reason: textual_variant
  - marker: b
    text: Or 'on behalf of many.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this cup
  lexicon: BDAG
  rationale: Demonstrative pronoun referring to what Jesus presents in the meal. The
    Greek text here says simply 'this,' not 'this cup'; 'cup' is supplied in some
    English traditions from the broader context, but is not present in this clause.
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this statement to the preceding
    command to drink. 'For' is concise and natural in English.
- source_word: αἷμά
  chosen: blood
  lexicon: BDAG
  rationale: Direct rendering of αἷμα. The sacrificial and covenantal resonance is
    important and should not be paraphrased away.
- source_word: τῆς διαθήκης
  chosen: of the covenant
  alternatives:
  - of the new covenant
  lexicon: BDAG
  rationale: The SBLGNT text reads simply 'of the covenant.' 'New' appears in parallel
    tradition and in some manuscripts of this verse, but is not in the provided base
    text, so it is not imported into the main translation.
- source_word: περὶ πολλῶν
  chosen: for many
  alternatives:
  - concerning many
  - on behalf of many
  lexicon: BDAG
  rationale: In this sacrificial context, περί with the genitive carries the sense
    of reference/benefit on behalf of others. 'For many' is idiomatic and preserves
    the wording's intertextual echo of Isaianic servant language without overinterpreting
    the extent question.
- source_word: ἐκχυννόμενον
  chosen: which is poured out
  alternatives:
  - being poured out
  - which is shed
  lexicon: BDAG
  rationale: Present passive participle modifying 'blood.' 'Poured out' is both accurate
    and readable, and preserves sacrificial imagery better than the more traditional
    but less transparent 'shed.' Relative clause Englishes the participle naturally.
- source_word: εἰς ἄφεσιν ἁμαρτιῶν
  chosen: for the forgiveness of sins
  alternatives:
  - for remission of sins
  - unto forgiveness of sins
  lexicon: BDAG
  rationale: Standard and clear rendering. 'Forgiveness' is accessible modern English;
    'remission' is more traditional but less natural for contemporary readers. The
    phrase expresses purpose/result tied to Jesus' blood.
