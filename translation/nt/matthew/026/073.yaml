id: MAT.26.73
reference: Matthew 26:73
source:
  edition: SBLGNT
  text: μετὰ μικρὸν δὲ προσελθόντες οἱ ἑστῶτες εἶπον τῷ Πέτρῳ· Ἀληθῶς καὶ σὺ ἐξ αὐτῶν
    εἶ, καὶ γὰρ ἡ λαλιά σου δῆλόν σε ποιεῖ·
translation:
  text: After a little while, those standing there came up and said to Peter, “Surely
    you also are one of them, for your accent makes it evident.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your speech gives you away.' The Greek λαλιά can mean speech, manner
      of speaking, or accent.
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ μικρὸν
  chosen: After a little while
  alternatives:
  - After a short time
  - A little later
  lexicon: BDAG
  rationale: Idiomatic temporal expression meaning a brief interval later. 'After
    a little while' is natural modern English and preserves the sense without sounding
    wooden.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the narrative. It is
    not necessary to represent it with a separate English word because English narrative
    style can carry the transition with word order and punctuation.
- source_word: προσελθόντες
  chosen: came up
  alternatives:
  - approached
  - came near
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, describing movement toward Peter. 'Came
    up' is readable modern English and fits the scene naturally.
- source_word: οἱ ἑστῶτες
  chosen: those standing there
  alternatives:
  - the bystanders
  - those who were standing there
  lexicon: BDAG
  rationale: Literally 'the ones standing [there].' The phrase refers to the people
    nearby in the courtyard. 'Those standing there' preserves the participial force
    and avoids overinterpretation, while 'bystanders' is a plausible but slightly
    more interpretive compression.
- source_word: εἶπον τῷ Πέτρῳ
  chosen: said to Peter
  alternatives:
  - told Peter
  lexicon: BDAG
  rationale: Standard rendering of λέγω with dative indirect object. 'Said to Peter'
    is straightforward and formally close.
- source_word: Ἀληθῶς
  chosen: Surely
  alternatives:
  - Truly
  - Certainly
  lexicon: BDAG
  rationale: The adverb marks confident assertion. 'Surely' fits idiomatic accusation/recognition
    in English better than the more formal 'truly' in this dialogue context.
- source_word: καὶ σὺ
  chosen: you also
  alternatives:
  - you too
  - even you
  lexicon: BDAG
  rationale: The combination emphasizes Peter's inclusion with the group. 'You also'
    preserves the emphasis without overstating it.
- source_word: ἐξ αὐτῶν
  chosen: one of them
  alternatives:
  - from among them
  - of them
  lexicon: BDAG
  rationale: Idiomatic expression of belonging/association with the group identified
    as Jesus' followers. 'One of them' is the natural English equivalent.
- source_word: καὶ γὰρ
  chosen: for even
  alternatives:
  - for
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for their claim, and καί adds emphasis. 'For even'
    captures both the explanatory and emphatic force in concise English.
- source_word: ἡ λαλιά σου
  chosen: your accent
  alternatives:
  - your speech
  - your way of speaking
  lexicon: BDAG
  rationale: λαλιά can mean manner of speech, dialect, or accent. In context the speakers
    identify Peter by how he talks, likely his Galilean speech pattern. 'Accent' communicates
    the practical sense most clearly for modern readers, while 'speech' is preserved
    as an alternative.
- source_word: δῆλόν σε ποιεῖ
  chosen: makes you evident
  alternatives:
  - gives you away
  - makes it clear who you are
  - reveals you
  lexicon: BDAG
  rationale: Literally 'makes you evident/clear.' The chosen rendering stays relatively
    close to the Greek while remaining understandable. More idiomatic options like
    'gives you away' are vivid but more interpretive.
