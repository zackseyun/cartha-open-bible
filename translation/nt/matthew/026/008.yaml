id: MAT.26.8
reference: Matthew 26:8
source:
  edition: SBLGNT
  text: ἰδόντες δὲ οἱ ⸀μαθηταὶ ἠγανάκτησαν λέγοντες· Εἰς τί ἡ ἀπώλεια αὕτη;
translation:
  text: But when the disciples saw it[a], they were indignant, saying, “Why this waste?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “For what purpose is this waste?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when ... saw it
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in natural English: ''when ... saw it.'' The object ''it'' is supplied from context (the woman''s act/anointing) because English normally requires an explicit object, though Greek leaves it implicit.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ marks a mild development/contrast with the preceding action. 'But' best captures the narrative turn to the disciples' negative reaction.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  - the learners
  lexicon: BDAG
  rationale: Standard rendering for μαθηταί in Gospel narrative. 'His' is contextually true but not explicit here, so omitted for closer adherence to the Greek.
- source_word: ἠγανάκτησαν
  chosen: were indignant
  alternatives:
  - became angry
  - were upset
  lexicon: BDAG
  rationale: ἀγανακτέω conveys strong displeasure or indignation. 'Were indignant' preserves the moralized tone better than the flatter 'were upset' and is more precise than simply 'became angry.'
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle is naturally rendered 'saying' to introduce direct speech while preserving the participial linkage to their indignation.
- source_word: Εἰς τί
  chosen: Why
  alternatives:
  - For what purpose
  - To what end
  lexicon: BDAG
  rationale: Idiomatic question meaning 'for what purpose?' In this context, concise 'Why' best communicates the force in contemporary English.
- source_word: ἡ ἀπώλεια αὕτη
  chosen: this waste
  alternatives:
  - this loss
  - this destruction
  - this wastefulness
  lexicon: BDAG
  rationale: ἀπώλεια can denote loss, ruin, or waste. In context of expensive ointment being poured out, 'this waste' is the most idiomatic and contextually precise English rendering.
