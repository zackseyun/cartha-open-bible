id: MAT.26.60
reference: Matthew 26:60
source:
  edition: SBLGNT
  text: καὶ οὐχ εὗρον ⸂πολλῶν προσελθόντων ψευδομαρτύρων. ὕστερον δὲ προσελθόντες δύο⸃
translation:
  text: and they did not find any[a], though many false witnesses had come forward. But later two came forward
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they found none'; the Greek leaves the object implicit, referring to the sought-after testimony or charge.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ εὗρον
  chosen: they did not find any
  alternatives:
  - they found none
  - they did not find [it/testimony]
  lexicon: BDAG
  rationale: 'The verb εὗρον has an implied object from context: the council was seeking testimony against Jesus (v. 59). English requires supplying the sense, and ''any'' naturally conveys that they found no usable testimony/witness. ''Found none'' is possible but slightly less idiomatic in modern English.'
- source_word: πολλῶν προσελθόντων ψευδομαρτύρων
  chosen: though many false witnesses had come forward
  alternatives:
  - although many false witnesses came forward
  - despite many false witnesses coming forward
  lexicon: BDAG
  rationale: The genitive absolute is concessive in context, explaining that no adequate testimony was found despite numerous false witnesses appearing. 'Had come forward' reflects the aorist participle in relation to the main verb and reads naturally in English. ψευδομάρτυρες is best rendered 'false witnesses,' not merely 'liars,' because the judicial setting is explicit.
- source_word: ὕστερον δὲ
  chosen: But later
  alternatives:
  - Later, however
  - But afterward
  lexicon: BDAG
  rationale: ὕστερον marks a later point in the proceedings; δέ is lightly adversative or transitional. 'But later' preserves the narrative turn in concise modern English.
- source_word: προσελθόντες δύο
  chosen: two came forward
  alternatives:
  - two approached
  - two stepped forward
  lexicon: BDAG
  rationale: In this legal hearing context, προσέρχομαι is idiomatically 'come forward' rather than the more spatially literal 'approach.' The word order in English is adjusted for natural style while preserving the emphasis that eventually two witnesses appeared.
