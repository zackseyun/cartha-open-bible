id: MAT.26.69
reference: Matthew 26:69
source:
  edition: SBLGNT
  text: Ὁ δὲ Πέτρος ⸂ἐκάθητο ἔξω⸃ ἐν τῇ αὐλῇ· καὶ προσῆλθεν αὐτῷ μία παιδίσκη λέγουσα·
    Καὶ σὺ ἦσθα μετὰ Ἰησοῦ τοῦ Γαλιλαίου·
translation:
  text: Now Peter was sitting outside in the courtyard, and one servant girl came
    up to him, saying, “You also were with Jesus the Galilean.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “a maidservant” or “a slave girl.” The Greek παιδίσκη can denote a young
      female servant, sometimes with slave status.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: Used as a mild discourse transition in narrative. 'Now' reads naturally
    in modern English without overstating contrast.
- source_word: ἐκάθητο ἔξω
  chosen: was sitting outside
  alternatives:
  - sat outside
  - was seated outside
  lexicon: BDAG
  rationale: Imperfect middle/passive of κάθημαι conveys ongoing past action/state;
    'was sitting' preserves the imperfect better than simple 'sat.' ἔξω is rendered
    'outside' in relation to the interior proceedings.
- source_word: αὐλή
  chosen: courtyard
  alternatives:
  - court
  - palace courtyard
  lexicon: BDAG
  rationale: Refers to the open court area of the high priest's residence. 'Courtyard'
    is clear, natural English and more precise than 'court.'
- source_word: προσῆλθεν αὐτῷ
  chosen: came up to him
  alternatives:
  - approached him
  - came to him
  lexicon: BDAG
  rationale: προσέρχομαι here denotes physical approach. 'Came up to him' is idiomatic
    and vivid while remaining accurate.
- source_word: μία παιδίσκη
  chosen: one servant girl
  alternatives:
  - a servant girl
  - a maidservant
  - a slave girl
  lexicon: BDAG
  rationale: 'παιδίσκη denotes a young female servant/slave. ''Servant girl'' is the
    best contextual rendering here: it preserves her social role without overloading
    the scene where bonded status is not the main point. μία is retained as ''one''
    to reflect the Greek''s introduction of a particular individual.'
- source_word: λέγουσα
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally represented by 'saying,' preserving the Greek
    flow rather than converting it into a finite verb.
- source_word: Καὶ σὺ
  chosen: You also
  alternatives:
  - You too
  - And you
  lexicon: BDAG
  rationale: καί with emphatic σὺ marks Peter as one among others associated with
    Jesus. 'You also' captures the emphasis clearly.
- source_word: ἦσθα μετὰ
  chosen: were with
  alternatives:
  - were among the followers of
  - were together with
  lexicon: BDAG
  rationale: A straightforward relational expression; 'were with' is the plain sense
    and avoids interpretive expansion.
- source_word: Ἰησοῦ τοῦ Γαλιλαίου
  chosen: Jesus the Galilean
  alternatives:
  - Jesus of Galilee
  lexicon: BDAG
  rationale: The genitive with the adjectival substantive Γαλιλαίου is most naturally
    rendered as an epithet, 'the Galilean.' This preserves the servant girl's identifying
    description.
