id: MAT.26.2
reference: Matthew 26:2
source:
  edition: SBLGNT
  text: Οἴδατε ὅτι μετὰ δύο ἡμέρας τὸ πάσχα γίνεται, καὶ ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται
    εἰς τὸ σταυρωθῆναι.
translation:
  text: You know that after two days the Passover is coming, and the Son of Man is
    being handed over to be crucified.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'is betrayed.' The Greek verb can denote betrayal, but more broadly
      means 'is handed over' or 'is delivered up.'
    reason: alternative_reading
lexical_decisions:
- source_word: Οἴδατε
  chosen: You know
  alternatives:
  - You know well
  - You are aware
  lexicon: BDAG
  rationale: Second person plural perfect with present sense from οἶδα; straightforwardly
    rendered as present 'you know.'
- source_word: μετὰ δύο ἡμέρας
  chosen: after two days
  alternatives:
  - in two days
  lexicon: BDAG
  rationale: μετά with accusative is temporal, 'after.' English idiom could also be
    'in two days,' but 'after two days' more closely reflects the Greek wording.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - Passover feast
  lexicon: BDAG
  rationale: πάσχα refers to Passover; article retained naturally in English. 'Passover'
    is sufficient without adding 'feast,' which is not explicit.
- source_word: γίνεται
  chosen: is coming
  alternatives:
  - takes place
  - happens
  - is
  lexicon: BDAG
  rationale: γίνομαι here refers to the arrival/occurrence of the Passover. 'Is coming'
    is natural modern English and captures imminent occurrence better than the wooden
    'happens' or ambiguous 'is.'
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Standard rendering of Jesus' self-designation; preserves the title's
    established biblical and theological resonance without paraphrase.
- source_word: παραδίδοται
  chosen: is being handed over
  alternatives:
  - is handed over
  - is betrayed
  lexicon: BDAG
  rationale: Present passive indicates an action impending/in process. 'Handed over'
    preserves the broader sense of παραδίδωμι without narrowing it to 'betrayed,'
    since the term can include betrayal but is not limited to it.
- source_word: εἰς τὸ σταυρωθῆναι
  chosen: to be crucified
  alternatives:
  - for crucifixion
  lexicon: BDAG
  rationale: Articular infinitive with εἰς expresses purpose/result. 'To be crucified'
    is the clearest and most direct English rendering.
