theological_decisions:
- issue: Rendering παραδίδοται in a passion prediction
  chosen_reading: is being handed over
  alternative_readings:
  - is betrayed
  rationale: The context includes Judas's betrayal, but the Greek verb itself is broader
    and can encompass human betrayal and divine handing over. Preserving 'handed over'
    maintains the text's theological tension rather than resolving it too narrowly.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
