theological_decisions:
- issue: Rendering the hostile intent of the leaders' deliberation
  chosen_reading: Use 'conspired' rather than a neutral expression such as 'consulted together.'
  alternative_readings:
  - they consulted together
  - they took counsel together
  - they plotted
  rationale: The verse describes a coordinated plan to seize and kill Jesus. A neutral rendering could understate the moral and narrative force of the Greek in context. 'Conspired' reflects the malicious collective purpose without importing extra doctrinal claims.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve the source text''s plain sense in readable modern English.'
