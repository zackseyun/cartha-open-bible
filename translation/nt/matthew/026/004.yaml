id: MAT.26.4
reference: Matthew 26:4
source:
  edition: SBLGNT
  text: καὶ συνεβουλεύσαντο ἵνα τὸν Ἰησοῦν δόλῳ κρατήσωσιν καὶ ἀποκτείνωσιν·
translation:
  text: and they conspired to seize Jesus by stealth and kill him[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by deceit.' The Greek term can denote deceit, trickery, or cunning.
    reason: lexical_alternative
  - marker: b
    text: Or 'they plotted' / 'they took counsel together.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεβουλεύσαντο
  chosen: they conspired
  alternatives:
  - they plotted
  - they took counsel together
  - they consulted together
  lexicon: BDAG
  rationale: The middle voice here conveys joint deliberation with hostile intent in context. 'Conspired' captures both the collective planning and the malicious purpose more naturally than the more neutral 'consulted together.'
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - to
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' preserves the purposive force in readable modern English.
- source_word: δόλῳ
  chosen: by stealth
  alternatives:
  - by deceit
  - treacherously
  - secretly
  lexicon: BDAG
  rationale: δόλος denotes deceit, trickery, or cunning. 'By stealth' fits the immediate context of secretly apprehending Jesus, while still conveying underhandedness. 'By deceit' is possible but sounds less idiomatic with 'seize' in English.
- source_word: κρατήσωσιν
  chosen: seize
  alternatives:
  - arrest
  - take hold of
  - capture
  lexicon: BDAG
  rationale: κρατέω means to take hold of or seize. 'Seize' is broad and faithful; 'arrest' may over-specify a legal process not explicit in the verb itself, though context involves an official plot.
- source_word: ἀποκτείνωσιν
  chosen: kill him
  alternatives:
  - put him to death
  - murder him
  lexicon: BDAG
  rationale: The verb means 'kill.' 'Kill him' is direct and natural. 'Put him to death' can imply formal execution, which is not yet explicit in this clause; 'murder him' adds a moral evaluation true to context but not lexically required.
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction, linking both the opening narrative flow and the paired purposes of seizing and killing.
- source_word: τὸν Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name is transliterated per translation philosophy; the accusative article is not separately represented in English.
