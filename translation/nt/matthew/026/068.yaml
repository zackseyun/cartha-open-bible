id: MAT.26.68
reference: Matthew 26:68
source:
  edition: SBLGNT
  text: λέγοντες· Προφήτευσον ἡμῖν, χριστέ, τίς ἐστιν ὁ παίσας σε;
translation:
  text: 'saying, “Prophesy to us, Messiah: who is it that struck you?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ.” The Greek title Χριστός is rendered “Messiah” here because
      it is being used as a title rather than as a name-like form.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and saying
  lexicon: BDAG
  rationale: Present participle introducing the mockers' speech; English idiom naturally
    renders it as 'saying' without needing an explicit conjunction.
- source_word: Προφήτευσον
  chosen: Prophesy
  alternatives:
  - Prophesy!
  - Tell us by prophecy
  lexicon: BDAG
  rationale: Aorist imperative of προφητεύω, here used mockingly to demand prophetic
    identification of the assailant. 'Prophesy' preserves the verbal form and irony
    better than an explanatory paraphrase.
- source_word: ἡμῖν
  chosen: to us
  alternatives:
  - for us
  lexicon: BDAG
  rationale: Dative pronoun indicating the addressees of the demanded prophecy; 'to
    us' is the most natural English rendering here.
- source_word: χριστέ
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Vocative title of Χριστός. Per doctrine, titles are translated rather
    than transliterated where context supports; here it is clearly titular and used
    in mockery, so 'Messiah' best preserves meaning.
- source_word: τίς ἐστιν
  chosen: who is it
  alternatives:
  - who is
  lexicon: BDAG
  rationale: The expression asks for identification; 'who is it' is idiomatic English
    that preserves the force of the question.
- source_word: ὁ παίσας
  chosen: that struck
  alternatives:
  - who struck
  - that hit
  lexicon: BDAG
  rationale: Aorist participle of παίω functioning substantivally, 'the one who struck.'
    'That struck' fits smooth modern English after 'who is it,' while retaining the
    concrete act of striking.
- source_word: σε
  chosen: you
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforward second-person
    singular object in English.
