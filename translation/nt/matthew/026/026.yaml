id: MAT.26.26
reference: Matthew 26:26
source:
  edition: SBLGNT
  text: Ἐσθιόντων δὲ αὐτῶν λαβὼν ὁ Ἰησοῦς ⸀ἄρτον καὶ ⸀εὐλογήσας ἔκλασεν καὶ ⸂δοὺς
    τοῖς μαθηταῖς⸃ εἶπεν· Λάβετε φάγετε, τοῦτό ἐστιν τὸ σῶμά μου.
translation:
  text: While they were eating, Jesus took bread, and after blessing it, he broke
    it and gave it to the disciples and said, “Take, eat; this is my body.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'As they were eating.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'having blessed it'; some understand the action as giving thanks over
      the bread.
    reason: lexical_alternative
  - marker: c
    text: Or, 'Take and eat.'
    reason: lexical_alternative
  - marker: d
    text: The Greek reads literally, 'this is my body'; some interpret this as 'this
      means/signifies my body,' but the translation preserves the wording of the source
      text.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐσθιόντων δὲ αὐτῶν
  chosen: While they were eating
  alternatives:
  - As they were eating
  - And while they were eating
  lexicon: BDAG
  rationale: The genitive absolute sets the scene temporally. 'While they were eating'
    is natural modern English and preserves the ongoing action. δέ is lightly connective
    and does not require a strong adversative; 'while' carries the temporal force
    adequately.
- source_word: λαβὼν
  chosen: took
  alternatives:
  - having taken
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered in English
    as a finite verb in sequence. 'Took' is idiomatic and preserves the action without
    woodenness.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - a loaf of bread
  lexicon: BDAG
  rationale: ἄρτος commonly means 'bread' and in meal context can refer to a loaf,
    but 'bread' is the standard and sufficiently precise rendering here.
- source_word: εὐλογήσας
  chosen: after blessing it
  alternatives:
  - having blessed it
  - after giving thanks
  lexicon: BDAG
  rationale: εὐλογέω here most naturally refers to pronouncing a blessing over the
    bread/meal. 'After blessing it' preserves the participial sequence and avoids
    collapsing it into εὐχαριστέω ('giving thanks'), though that is a nearby conceptual
    alternative in parallel accounts.
- source_word: ἔκλασεν
  chosen: he broke it
  alternatives:
  - broke
  lexicon: BDAG
  rationale: The verb means 'broke.' Supplying 'it' is required in natural English
    and refers back to the bread.
- source_word: δοὺς τοῖς μαθηταῖς
  chosen: gave it to the disciples
  alternatives:
  - giving it to the disciples
  - gave it to his disciples
  lexicon: BDAG
  rationale: The participle is rendered as a coordinated finite verb for smooth English
    narrative. The article with μαθηταῖς identifies the known group; 'the disciples'
    is sufficient without adding 'his,' which is not explicit.
- source_word: Λάβετε φάγετε
  chosen: Take, eat
  alternatives:
  - Take and eat
  lexicon: BDAG
  rationale: Two aorist imperatives in direct succession. 'Take, eat' preserves the
    asyndetic force and traditional cadence more closely than smoothing to 'Take and
    eat.'
- source_word: τοῦτό ἐστιν
  chosen: this is
  alternatives:
  - this means
  - this signifies
  lexicon: BDAG
  rationale: ἐστιν straightforwardly means 'is.' The translation should not import
    a denominational interpretation of the Eucharistic saying by paraphrasing it as
    'means' or 'signifies.' Any theological alternatives belong in documentation,
    not the main text.
- source_word: τὸ σῶμά μου
  chosen: my body
  lexicon: BDAG
  rationale: σῶμα is the ordinary word for 'body.' The possessive is rendered directly.
