theological_decisions:
- issue: Eucharistic wording in Jesus' saying
  chosen_reading: Render τοῦτό ἐστιν τὸ σῶμά μου as 'this is my body' without interpretive
    expansion.
  alternative_readings:
  - this means my body
  - this signifies my body
  rationale: The Greek uses the simple copula ἐστιν. In keeping with the doctrine's
    instruction to preserve theological tension rather than resolve it, the translation
    retains the literal wording and does not encode a particular sacramental theology
    in the main text.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it.'
