theological_decisions:
- issue: Rendering of Χριστός in a direct christological interrogation
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title, not a name-like designation, in the high
    priest's question. Following the doctrine's contested-terms guidance, the main
    text uses 'Messiah' while preserving 'Christ' as an alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of the high priest's formula Ἐξορκίζω σε κατὰ τοῦ θεοῦ τοῦ ζῶντος
  chosen_reading: A solemn legal adjuration/oath formula
  alternative_readings:
  - A simple command without oath force
  rationale: The wording invokes God formally and heightens the judicial setting.
    Rendering it as 'I put you under oath' preserves the solemn forensic force without
    importing later technical legal language beyond the text.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; preserve source-text plain
    sense'
