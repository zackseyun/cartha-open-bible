id: MAT.26.63
reference: Matthew 26:63
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς ἐσιώπα. ⸀καὶ ὁ ἀρχιερεὺς εἶπεν αὐτῷ· Ἐξορκίζω σε κατὰ τοῦ θεοῦ
    τοῦ ζῶντος ἵνα ἡμῖν εἴπῃς εἰ σὺ εἶ ὁ χριστὸς ὁ υἱὸς τοῦ θεοῦ.
translation:
  text: 'But Jesus kept silent. And the high priest said to him, “I put you under
    oath by the living God: tell us if you are the Messiah, the Son of God.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Christ.” The Greek title is Christos, here rendered “Messiah” because
      it functions as a title rather than a name.
    reason: alternative_reading
  - marker: b
    text: Or “I adjure you by the living God.” The Greek is a solemn oath formula.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσιώπα
  chosen: kept silent
  alternatives:
  - was silent
  - remained silent
  lexicon: BDAG
  rationale: Imperfect tense conveys continued silence rather than a mere punctiliar
    moment. 'Kept silent' captures the ongoing aspect in natural English.
- source_word: ἀρχιερεὺς
  chosen: high priest
  lexicon: BDAG
  rationale: Standard and precise rendering for the Jewish chief priestly office in
    this trial context.
- source_word: Ἐξορκίζω
  chosen: I put you under oath
  alternatives:
  - I adjure you
  - I charge you under oath
  lexicon: BDAG
  rationale: The verb here is juridical/solemn rather than exorcistic in sense. 'I
    put you under oath' communicates the legal force clearly in modern English; 'adjure'
    is more formal but less accessible.
- source_word: κατὰ τοῦ θεοῦ τοῦ ζῶντος
  chosen: by the living God
  alternatives:
  - before the living God
  lexicon: BDAG
  rationale: With ἐξορκίζω, κατά plus genitive expresses the solemn basis/invocation
    of the oath. 'By the living God' is the most idiomatic English oath formula and
    preserves the force of appeal to God.
- source_word: ἵνα ἡμῖν εἴπῃς
  chosen: tell us
  alternatives:
  - that you tell us
  - say to us
  lexicon: BDAG
  rationale: After a verb of adjuration, ἵνα + subjunctive functions as the content
    demanded. 'Tell us' is concise, natural, and faithful to the sense.
- source_word: Χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Christological titles are translated rather than transliterated
    where context supports. Here ὁ χριστός is clearly titular, referring to the expected
    anointed deliverer, so 'Messiah' best preserves the Hebraic messianic context.
- source_word: υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  lexicon: BDAG
  rationale: Definite article with the title is best represented directly. This preserves
    the christological claim without either weakening or over-expanding it.
- source_word: ὁ δὲ Ἰησοῦς
  chosen: But Jesus
  alternatives:
  - Now Jesus
  lexicon: BDAG
  rationale: δέ marks mild contrast with the preceding accusations and testimony.
    'But Jesus' fits the narrative turn and English discourse flow.
