theological_decisions:
- issue: Address to Peter while the plural verb ἰσχύσατε refers to more than one disciple
  chosen_reading: Retain singular addressee ('to Peter') and plural rebuke in English
    ('were you not able'), allowing the tension to stand.
  alternative_readings:
  - Smooth the number shift by making the rebuke singular to Peter alone
  - Expand the wording to make explicit that Peter represents the group
  rationale: The Greek explicitly says Jesus speaks to Peter, yet uses a second-person
    plural verb, likely addressing Peter as representative of the disciples. Per translation
    philosophy, the tension should be preserved rather than resolved by paraphrase.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
