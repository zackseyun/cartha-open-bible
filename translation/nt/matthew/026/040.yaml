id: MAT.26.40
reference: Matthew 26:40
source:
  edition: SBLGNT
  text: καὶ ἔρχεται πρὸς τοὺς μαθητὰς καὶ εὑρίσκει αὐτοὺς καθεύδοντας, καὶ λέγει τῷ
    Πέτρῳ· Οὕτως οὐκ ἰσχύσατε μίαν ὥραν γρηγορῆσαι μετ’ ἐμοῦ;
translation:
  text: And he comes to the disciples and finds them sleeping, and he says to Peter,
    “So, were you not able to stay awake with me for one hour?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Could you not stay awake with me for one hour?'
    reason: lexical_alternative
  - marker: b
    text: Or 'keep watch with me for one hour.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  lexicon: BDAG
  rationale: Rendered as present-tense 'comes' to preserve the Greek historical present,
    which gives narrative vividness. English can bear the present here without sounding
    unnatural.
- source_word: πρὸς τοὺς μαθητὰς
  chosen: to the disciples
  alternatives:
  - toward the disciples
  lexicon: BDAG
  rationale: '''To the disciples'' is the natural English rendering of πρός with motion
    in this context.'
- source_word: εὑρίσκει αὐτοὺς καθεύδοντας
  chosen: finds them sleeping
  alternatives:
  - finds them asleep
  lexicon: BDAG
  rationale: The participle καθεύδοντας is verbal ('sleeping'), and 'finds them sleeping'
    closely reflects the Greek construction while remaining idiomatic. 'Asleep' is
    possible but slightly less explicit verbally.
- source_word: λέγει τῷ Πέτρῳ
  chosen: he says to Peter
  alternatives:
  - he says to Petros
  - he said to Peter
  lexicon: BDAG
  rationale: Standard narrative present retained with the historical present 'says.'
    The name Πέτρῳ is transliterated by standard English convention as 'Peter' per
    project philosophy.
- source_word: Οὕτως
  chosen: So
  alternatives:
  - Thus
  - Then
  - In this way
  lexicon: BDAG
  rationale: Here οὕτως functions idiomatically as an exclamatory or inferential particle
    introducing mild rebuke or surprise. 'So' best captures the tone in natural modern
    English.
- source_word: οὐκ ἰσχύσατε
  chosen: were you not able
  alternatives:
  - could you not
  - did you not have strength
  lexicon: BDAG
  rationale: ἰσχύω here conveys capability or strength. 'Were you not able' preserves
    the sense without over-literal awkwardness. 'Could you not' is also viable and
    is preserved in a footnote as a lexical alternative.
- source_word: μίαν ὥραν
  chosen: for one hour
  alternatives:
  - one hour
  lexicon: BDAG
  rationale: English idiom prefers 'for one hour' with 'stay awake.' The accusative
    expresses duration of time.
- source_word: γρηγορῆσαι
  chosen: to stay awake
  alternatives:
  - to keep watch
  - to watch
  lexicon: BDAG
  rationale: γρηγορέω literally means to be awake/watchful. In this immediate contrast
    with sleeping, 'stay awake' makes the concrete sense clear. 'Keep watch' is possible
    and preserves the vigilance nuance, so it is noted in a footnote.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - along with me
  lexicon: BDAG
  rationale: Simple accompaniment is intended; 'with me' is direct and natural.
