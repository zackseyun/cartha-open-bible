id: MAT.26.19
reference: Matthew 26:19
source:
  edition: SBLGNT
  text: καὶ ἐποίησαν οἱ μαθηταὶ ὡς συνέταξεν αὐτοῖς ὁ Ἰησοῦς, καὶ ἡτοίμασαν τὸ πάσχα.
translation:
  text: And the disciples did as Jesus had directed them, and they prepared the Passover.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Passover meal'; πάσχα can refer to the Passover observance more
      broadly, including the meal prepared for it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  chosen: did
  alternatives:
  - acted
  - carried out
  lexicon: BDAG
  rationale: A common verb meaning 'do/make.' Here with ὡς συνέταξεν it idiomatically
    means they did as instructed. 'Did' is the most natural and sufficiently formal
    rendering.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  - the followers
  lexicon: BDAG
  rationale: Standard rendering for μαθηταί in the Gospels; it preserves the recognized
    relational sense of Jesus' committed followers without unnecessary novelty.
- source_word: ὡς
  chosen: as
  alternatives:
  - just as
  - according as
  lexicon: BDAG
  rationale: 'Introduces comparison/conformity: they acted in the manner Jesus instructed.
    ''As'' is concise and natural.'
- source_word: συνέταξεν
  chosen: had directed
  alternatives:
  - commanded
  - instructed
  - ordered
  lexicon: BDAG
  rationale: συντάσσω can mean to order, direct, or instruct. In this narrative context,
    'had directed' fits the preparatory instructions Jesus gave in the previous verses
    and avoids overstating harshness while preserving authority. The pluperfect sense
    in English ('had directed') reflects action prior to their doing.
- source_word: ἡτοίμασαν
  chosen: prepared
  alternatives:
  - made ready
  - got ready
  lexicon: BDAG
  rationale: Direct and standard rendering of ἑτοιμάζω. 'Prepared' is both accurate
    and idiomatic in English.
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  - the Passover lamb
  lexicon: BDAG
  rationale: πάσχα can refer to Passover broadly, including the meal/observance. 'The
    Passover' preserves the Greek's wording without over-specifying. Because English
    readers may infer the meal here, that nuance is preserved in a footnote rather
    than the main text.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy.
