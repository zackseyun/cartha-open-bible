theological_decisions:
- issue: Scope of τὸ πάσχα
  chosen_reading: the Passover
  alternative_readings:
  - the Passover meal
  - the Passover lamb
  rationale: The term can denote the festival, the meal, or associated sacrificial
    elements depending on context. Here the disciples are making preparations for
    Jesus' meal, but the Greek itself does not narrowly specify 'meal' or 'lamb.'
    To preserve the text's breadth and avoid importing more specificity than warranted,
    the main text keeps 'the Passover,' with a footnote noting the likely meal-related
    sense in context.
  doctrine_reference: Translation philosophy §§1, 3, 5
