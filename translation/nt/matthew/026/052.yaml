theological_decisions:
- issue: Scope of Jesus' saying about the sword
  chosen_reading: Render as a general principle ('all who take up the sword will perish by the sword') without narrowing it to an absolute prohibition of all force or to a prediction only about this moment.
  alternative_readings:
  - A universal pacifist prohibition
  - A statement limited only to Peter's immediate situation
  rationale: The Greek uses a gnomic construction ('all who...') and should be translated as such. The translation preserves the saying's breadth while avoiding importing a denominational stance on violence beyond what the text itself states.
  doctrine_reference: Affirmations; Translation philosophy §3
