id: MAT.26.52
reference: Matthew 26:52
source:
  edition: SBLGNT
  text: τότε λέγει αὐτῷ ὁ Ἰησοῦς· Ἀπόστρεψον ⸂τὴν μάχαιράν σου⸃ εἰς τὸν τόπον αὐτῆς, πάντες γὰρ οἱ λαβόντες μάχαιραν ἐν μαχαίρῃ ⸀ἀπολοῦνται·
translation:
  text: Then Jesus said to him[a], “Put your sword back in its place, for all who take up the sword will perish by the sword.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “take the sword”; the expression likely means to resort to violent force, not merely to grasp a weapon.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal adverb introducing the next event in narrative sequence; 'Then' is natural and sufficiently formal.
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: Although λέγει is present tense (historical present), English narrative style normally renders it as simple past. This preserves sense without awkwardness.
- source_word: Ἀπόστρεψον
  chosen: Put ... back
  alternatives:
  - Turn back
  - Return
  lexicon: BDAG
  rationale: Aorist imperative calling for immediate reversal. In context of replacing a drawn weapon, 'Put ... back' best captures the idiomatic force in clear English.
- source_word: τὴν μάχαιράν σου
  chosen: your sword
  alternatives:
  - your dagger
  - your short sword
  lexicon: BDAG
  rationale: μάχαιρα can denote a blade ranging from knife/dagger to short sword, but 'sword' is the clearest conventional rendering in this arrest scene and matches the following proverbial statement.
- source_word: εἰς τὸν τόπον αὐτῆς
  chosen: back in its place
  alternatives:
  - into its place
  - to its place
  lexicon: BDAG
  rationale: The phrase indicates returning the weapon to where it belongs. 'Back in its place' makes the restorative sense explicit and idiomatic in English.
- source_word: πάντες γὰρ οἱ λαβόντες μάχαιραν
  chosen: for all who take up the sword
  alternatives:
  - for all who take the sword
  - for everyone who has taken a sword
  lexicon: BDAG
  rationale: The articular participle is gnomic/generalizing here. 'Take up the sword' conveys not merely grasping an object but resorting to violent force.
- source_word: ἐν μαχαίρῃ
  chosen: by the sword
  alternatives:
  - with the sword
  lexicon: BDAG
  rationale: Instrumental dative; 'by the sword' is the most natural English expression and preserves the proverbial parallelism.
- source_word: ἀπολοῦνται
  chosen: will perish
  alternatives:
  - will be destroyed
  - will die
  lexicon: BDAG
  rationale: Future middle of ἀπόλλυμι here denotes coming to ruin/death. 'Will perish' preserves the gravity and traditional proverbial force without over-specifying the mode.
