theological_decisions:
- issue: Repetition of prayer language
  chosen_reading: The verse is rendered to preserve that Jesus prayed on a third occasion
    and repeated the same prayer content.
  alternative_readings:
  - A smoother English rendering could omit the final 'again' as stylistic redundancy.
  rationale: The Greek contains two instances of πάλιν, and preserving the repetition
    maintains the narrative emphasis without importing theological interpretation
    beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
