id: MAT.26.44
reference: Matthew 26:44
source:
  edition: SBLGNT
  text: καὶ ἀφεὶς αὐτοὺς ⸂πάλιν ἀπελθὼν⸃ προσηύξατο ἐκ τρίτου τὸν αὐτὸν λόγον εἰπὼν
    ⸀πάλιν.
translation:
  text: And leaving them again, he went away and prayed a third time, saying the same
    thing again.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''the same thing.'' Greek: ''the same word/saying.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφεὶς
  chosen: leaving
  alternatives:
  - having left
  lexicon: BDAG
  rationale: Aorist participle of ἀφίημι here has the sense of departing from or leaving
    behind the disciples. 'Leaving' is natural English while preserving the participial
    sequence.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to the disciples.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: The adverb marks repetition. 'Again' is the most direct and idiomatic
    rendering.
- source_word: ἀπελθὼν
  chosen: he went away
  alternatives:
  - having gone away
  - departing
  lexicon: BDAG
  rationale: Aorist participle of ἀπέρχομαι indicates movement away from the disciples.
    Rendered with an English finite verb for smooth narrative flow in optimal equivalence.
- source_word: προσηύξατο
  chosen: prayed
  alternatives:
  - offered prayer
  lexicon: BDAG
  rationale: Middle deponent verb meaning 'prayed.' Simple past best fits the narrative.
- source_word: ἐκ τρίτου
  chosen: a third time
  alternatives:
  - for the third time
  lexicon: BDAG
  rationale: Idiomatic expression meaning repetition on the third occasion. 'A third
    time' is standard and clear English.
- source_word: τὸν αὐτὸν λόγον
  chosen: the same words
  alternatives:
  - the same word
  - the same thing
  lexicon: BDAG
  rationale: Although λόγον is singular, in English 'the same words' best conveys
    repeated prayer content idiomatically. 'The same thing' is possible but less textually
    concrete.
- source_word: εἰπὼν
  chosen: saying
  alternatives:
  - having said
  lexicon: BDAG
  rationale: Aorist participle of λέγω introducing the content or manner of the prayer.
    'Saying' is natural in English and preserves the participial linkage.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: The second occurrence is textually present in SBLGNT and is best represented
    in translation rather than omitted, even though English style can feel repetitive.
    It emphasizes repeated action/content.
