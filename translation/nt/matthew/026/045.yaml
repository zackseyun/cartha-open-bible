theological_decisions:
- issue: Force of Καθεύδετε ... καὶ ἀναπαύεσθε
  chosen_reading: 'Rendered as an ironic/concessive statement: ''Sleep on now and
    take your rest.'''
  alternative_readings:
  - 'Rendered as questions: ''Are you still sleeping and resting?'''
  - Rendered as direct imperatives without irony
  rationale: The Greek forms can be read as indicatives functioning imperativally
    or rhetorically in context. Because the immediate follow-up announces the arrival
    of the hour, the line is likely ironic or concessive. The translation preserves
    the tension rather than resolving it into an explicit question not marked in the
    Greek.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Meaning of παραδίδοται in passion context
  chosen_reading: '''is being handed over'''
  alternative_readings:
  - is betrayed
  - is delivered over
  rationale: The verse refers to Jesus's impending arrest and passion. 'Handed over'
    preserves both human betrayal and the broader divine-passive/passive-of-events
    resonance without importing a narrower doctrinal interpretation.
  doctrine_reference: Affirmations + Translation philosophy §1, §3
