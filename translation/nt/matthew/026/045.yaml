id: MAT.26.45
reference: Matthew 26:45
source:
  edition: SBLGNT
  text: τότε ἔρχεται πρὸς τοὺς ⸀μαθητὰς καὶ λέγει αὐτοῖς· Καθεύδετε ⸀τὸ λοιπὸν καὶ
    ἀναπαύεσθε· ἰδοὺ ἤγγικεν ἡ ὥρα καὶ ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται εἰς χεῖρας
    ἁμαρτωλῶν.
translation:
  text: Then he comes to the disciples and says to them, “Sleep on now and take your
    rest. Look, the hour has come near, and the Son of Man is being handed over into
    the hands of sinners.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Are you still sleeping and taking your rest?' The Greek wording can
      be understood as a rhetorical question; the main text preserves the ambiguity
      and likely irony of the statement.
    reason: alternative_reading
  - marker: b
    text: Or, 'the hour has arrived' or 'the hour is at hand.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'is betrayed.' The Greek more broadly means 'is handed over' or 'is
      delivered over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in sequence;
    'Then' is natural and sufficiently formal.
- source_word: ἔρχεται
  chosen: comes
  alternatives:
  - came
  - is coming
  lexicon: BDAG
  rationale: Present-tense historical narrative is common in the Gospels. English
    can preserve the vivid historical present with 'comes'.
- source_word: πρὸς τοὺς μαθητάς
  chosen: to the disciples
  alternatives:
  - toward the disciples
  lexicon: BDAG
  rationale: πρός with accusative here indicates movement toward/approach; idiomatic
    English is 'comes to the disciples.'
- source_word: λέγει αὐτοῖς
  chosen: says to them
  alternatives:
  - said to them
  - tells them
  lexicon: BDAG
  rationale: Historical present retained for narrative vividness; 'says to them' is
    a straightforward rendering.
- source_word: Καθεύδετε
  chosen: Sleep on
  alternatives:
  - Are you still sleeping?
  - Sleep
  lexicon: BDAG
  rationale: Form is indicative in the morphology provided, and in context likely
    carries an ironic or concessive force rather than a simple command. 'Sleep on'
    preserves the surface form while allowing the tension with the following announcement
    to remain.
- source_word: τὸ λοιπὸν
  chosen: now
  alternatives:
  - for the rest of the time
  - from now on
  - still
  lexicon: BDAG
  rationale: Idiomatic adverbial use meaning 'for the remaining time / from now on.'
    In this context, 'now' gives natural English without overtranslating.
- source_word: ἀναπαύεσθε
  chosen: take your rest
  alternatives:
  - rest
  - be resting
  lexicon: BDAG
  rationale: Middle/passive form here is naturally rendered idiomatically as 'take
    your rest,' matching the paired sense with sleeping.
- source_word: ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Introduces solemn attention. 'Look' is readable modern English; 'Behold'
    is too archaic for the stated philosophy.
- source_word: ἤγγικεν ἡ ὥρα
  chosen: the hour has come near
  alternatives:
  - the hour has arrived
  - the hour is at hand
  lexicon: BDAG
  rationale: Perfect of ἐγγίζω emphasizes nearness that has now arrived. 'Has come
    near' is closer to the Greek than the more interpretive 'has arrived,' while still
    natural enough.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Established and contextually important self-designation of Jesus; should
    be translated, not paraphrased.
- source_word: παραδίδοται
  chosen: is being handed over
  alternatives:
  - is betrayed
  - is delivered over
  lexicon: BDAG
  rationale: παραδίδωμι has a broader sense than 'betray' and here the passive highlights
    the act of being given over. 'Handed over' preserves the lexical range without
    prematurely narrowing it to Judas's betrayal alone.
- source_word: εἰς χεῖρας
  chosen: into the hands
  alternatives:
  - to the power
  - into the power
  lexicon: BDAG
  rationale: Literal idiom retained because it is clear in English and preserves the
    concrete force of the Greek expression.
- source_word: ἁμαρτωλῶν
  chosen: of sinners
  alternatives:
  - of sinful men
  lexicon: BDAG
  rationale: Substantival adjective meaning 'sinners.' The simple rendering avoids
    adding 'men,' which is not explicit in the Greek.
