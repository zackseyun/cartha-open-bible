id: MAT.26.13
reference: Matthew 26:13
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν, ὅπου ἐὰν κηρυχθῇ τὸ εὐαγγέλιον τοῦτο ἐν ὅλῳ τῷ κόσμῳ, λαληθήσεται
    καὶ ὃ ἐποίησεν αὕτη εἰς μνημόσυνον αὐτῆς.
translation:
  text: Truly I tell you, wherever this good news is proclaimed in the whole world,
    what this woman has done will also be spoken of in memory of her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'this gospel.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'will also be told' or 'will also be spoken of as a memorial to her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Introduces a solemn affirmation. In Jesus' sayings, idiomatic English
    prefers 'Truly' over a transliterated 'Amen' for readability while preserving
    the force.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: Standard direct-address formula. 'I tell you' is natural modern English
    and preserves the personal address.
- source_word: ὅπου ἐὰν
  chosen: wherever
  alternatives:
  - where
  - wherever it may be that
  lexicon: BDAG
  rationale: The combination expresses an indefinite locative sense, best rendered
    compactly as 'wherever'.
- source_word: κηρυχθῇ
  chosen: is proclaimed
  alternatives:
  - is preached
  - is announced
  lexicon: BDAG
  rationale: Passive aorist subjunctive of κηρύσσω in a general future condition.
    'Proclaimed' preserves the heralding sense without sounding overly ecclesiastical;
    'preached' is possible but narrower in modern usage.
- source_word: τὸ εὐαγγέλιον τοῦτο
  chosen: this good news
  alternatives:
  - this gospel
  lexicon: BDAG
  rationale: εὐαγγέλιον literally means 'good news.' Given the translation philosophy's
    preference for readable modern English and original-language sense over tradition,
    'good news' is preferred, while 'gospel' remains a viable traditional alternative.
- source_word: ἐν ὅλῳ τῷ κόσμῳ
  chosen: in the whole world
  alternatives:
  - throughout the whole world
  - in all the world
  lexicon: BDAG
  rationale: κόσμος here refers to the inhabited world in a broad universal sense.
    'In the whole world' is a straightforward rendering of the prepositional phrase.
- source_word: λαληθήσεται
  chosen: will ... be spoken of
  alternatives:
  - will be told
  - will be spoken
  lexicon: BDAG
  rationale: Future passive of λαλέω. Because the object is the deed ('what this woman
    has done'), idiomatic English requires 'spoken of' rather than simply 'spoken'.
- source_word: ὃ ἐποίησεν αὕτη
  chosen: what this woman has done
  alternatives:
  - what she did
  - what this one did
  lexicon: BDAG
  rationale: The neuter relative ὃ refers to the act, and αὕτη points to the woman
    just mentioned in context. Supplying 'woman' makes the English clear and contextually
    explicit without adding new content.
- source_word: εἰς μνημόσυνον αὐτῆς
  chosen: in memory of her
  alternatives:
  - as a memorial to her
  - for her remembrance
  lexicon: BDAG
  rationale: μνημόσυνον denotes memorial/remembrance. 'In memory of her' is natural
    English and preserves the commemorative force; 'as a memorial to her' is slightly
    more formal and is preserved as an alternative.
