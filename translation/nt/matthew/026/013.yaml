theological_decisions:
- issue: Rendering εὐαγγέλιον
  chosen_reading: good news
  alternative_readings:
  - gospel
  rationale: This is primarily a lexical rather than doctrinal choice, but it bears
    theological register. 'Good news' better reflects the Greek meaning in accessible
    English without diminishing the message's theological weight.
  doctrine_reference: Translation philosophy §1, §6
