id: MAT.26.46
reference: Matthew 26:46
source:
  edition: SBLGNT
  text: ἐγείρεσθε ἄγωμεν· ἰδοὺ ἤγγικεν ὁ παραδιδούς με.
translation:
  text: Get up[a], let us go. Look, the one betraying me has come near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the one handing me over' or 'the one delivering me up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγείρεσθε
  chosen: Get up
  alternatives:
  - Rise
  - Arise
  lexicon: BDAG
  rationale: Second person plural present imperative of ἐγείρω. In this context Jesus is addressing the disciples and telling them to get up from sleep/rest. 'Get up' is natural modern English and preserves the imperative force without archaic tone.
- source_word: ἄγωμεν
  chosen: let us go
  alternatives:
  - let us be going
  - let us leave
  lexicon: BDAG
  rationale: First person plural present subjunctive used hortatorily. 'Let us go' is the standard natural rendering and fits the immediate movement implied by the scene.
- source_word: ἰδού
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic particle drawing attention to what follows. 'Look' preserves the vividness in readable modern English better than the archaic 'Behold.'
- source_word: ἤγγικεν
  chosen: has come near
  alternatives:
  - is near
  - has arrived
  lexicon: BDAG
  rationale: Perfect active indicative of ἐγγίζω. The perfect suggests a completed approach with present relevance. 'Has come near' preserves that aspect better than the flatter 'is near,' while avoiding overstatement such as full arrival.
- source_word: ὁ παραδιδούς
  chosen: the one betraying
  alternatives:
  - the one handing over
  - the one delivering up
  - the betrayer
  lexicon: BDAG
  rationale: Present active participle with article, functioning substantivally. 'The one betraying' closely reflects the Greek verbal form and keeps the action in view. 'The betrayer' is possible but turns the participle into a title-like noun and slightly reduces the ongoing sense. 'Handing over' is more literal for παραδίδωμι, but in this passion context 'betraying' best communicates the relational treachery intended.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; straightforwardly rendered 'me'.
