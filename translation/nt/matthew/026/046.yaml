theological_decisions:
- issue: Rendering παραδιδούς in the passion context
  chosen_reading: the one betraying me
  alternative_readings:
  - the one handing me over
  - the one delivering me up
  rationale: Although παραδίδωμι can more literally mean 'hand over' or 'deliver up,' in the Gospel passion narrative it commonly carries the sense of betrayal by Judas. Rendering it 'betraying' communicates the moral and relational force recognized in standard interpretation while remaining textually warranted. The more literal alternatives are preserved in a footnote for auditability.
