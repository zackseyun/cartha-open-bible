id: MAT.26.14
reference: Matthew 26:14
source:
  edition: SBLGNT
  text: Τότε πορευθεὶς εἷς τῶν δώδεκα, ὁ λεγόμενος Ἰούδας Ἰσκαριώτης, πρὸς τοὺς ἀρχιερεῖς
translation:
  text: Then one of the twelve[a], the one called Judas Iscariot, went to the chief priests,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'one of the Twelve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then' is natural modern English and preserves the narrative flow.
- source_word: πορευθεὶς
  chosen: went
  alternatives:
  - having gone
  - departed
  lexicon: BDAG
  rationale: Aorist passive-form deponent participle from πορεύομαι, functioning adverbially before the main directional phrase. English idiom prefers the finite verb 'went' here rather than the more wooden 'having gone.' This captures the movement toward the chief priests without awkwardness.
- source_word: εἷς τῶν δώδεκα
  chosen: one of the twelve
  alternatives:
  - one of the Twelve
  lexicon: BDAG
  rationale: Standard partitive expression. Lowercase 'twelve' is chosen because the Greek itself does not mark capitalization, though 'the Twelve' is a recognizable group designation and remains a viable alternative.
- source_word: ὁ λεγόμενος
  chosen: the one called
  alternatives:
  - who was called
  - called
  lexicon: BDAG
  rationale: The participial expression identifies Judas appositionally. 'The one called' preserves the Greek structure and emphasis slightly better than the smoother but less explicit 'who was called.'
- source_word: Ἰούδας Ἰσκαριώτης
  chosen: Judas Iscariot
  lexicon: BDAG
  rationale: Personal name and epithet are transliterated in keeping with the translation philosophy to transliterate names rather than translate them.
- source_word: πρὸς τοὺς ἀρχιερεῖς
  chosen: to the chief priests
  alternatives:
  - to the high priests
  - to the leading priests
  lexicon: BDAG
  rationale: πρός with accusative indicates movement toward. ἀρχιερεῖς in Second Temple/Jewish leadership contexts is conventionally and accurately rendered 'chief priests,' referring to the senior priestly authorities rather than a single high priest.
