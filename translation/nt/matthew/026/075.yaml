id: MAT.26.75
reference: Matthew 26:75
source:
  edition: SBLGNT
  text: καὶ ἐμνήσθη ὁ Πέτρος τοῦ ⸀ῥήματος Ἰησοῦ ⸀εἰρηκότος ὅτι Πρὶν ἀλέκτορα φωνῆσαι
    τρὶς ἀπαρνήσῃ με, καὶ ἐξελθὼν ἔξω ἔκλαυσεν πικρῶς.
translation:
  text: 'And Peter remembered the word Jesus had spoken: “Before a rooster crows,
    you will deny me three times.” And he went outside and wept bitterly.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Before the rooster crows.” The Greek lacks the article, but English
      may use either indefinite or definite wording idiomatically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμνήσθη
  chosen: remembered
  alternatives:
  - was reminded of
  - recalled
  lexicon: BDAG
  rationale: Aorist passive/deponent here carries the sense of coming to remember
    or recalling. 'Remembered' is the most natural modern English rendering and preserves
    the narrative force without overinterpreting the passive form.
- source_word: ῥήματος
  chosen: word
  alternatives:
  - statement
  - saying
  lexicon: BDAG
  rationale: ῥῆμα often denotes a spoken word or saying. 'Word' is concise and idiomatic
    in English, especially with the following participle clarifying that it was something
    Jesus had spoken.
- source_word: εἰρηκότος
  chosen: had spoken
  alternatives:
  - had said
  lexicon: BDAG
  rationale: Perfect active participle of λέγω indicates a prior utterance with continuing
    relevance. 'Had spoken' fits well with 'word' and avoids the awkwardness of 'the
    word Jesus had said.'
- source_word: Πρὶν ἀλέκτορα φωνῆσαι
  chosen: Before a rooster crows
  alternatives:
  - Before the rooster crows
  - Before rooster-crow
  lexicon: BDAG
  rationale: This infinitival construction is naturally rendered as a temporal clause
    in English. The anarthrous ἀλέκτορα is well represented by 'a rooster,' though
    English tradition often uses 'the rooster.' The clause refers to the event of
    rooster crowing rather than a specific identified bird.
- source_word: τρὶς
  chosen: three times
  alternatives:
  - thrice
  lexicon: BDAG
  rationale: '''Three times'' is clear modern English; ''thrice'' is archaic and contrary
    to the project''s readability aims.'
- source_word: ἀπαρνήσῃ
  chosen: you will deny
  alternatives:
  - you will disown
  lexicon: BDAG
  rationale: Future middle of ἀπαρνέομαι means to deny or repudiate. 'Deny' is the
    standard and clearest rendering in this context, preserving the gravity of Peter's
    action.
- source_word: ἐξελθὼν ἔξω
  chosen: went outside
  alternatives:
  - went out
  - having gone out outside
  lexicon: BDAG
  rationale: The participle plus adverb is somewhat redundant in Greek for emphasis
    of departure. Idiomatic English compresses this to 'went outside' while preserving
    the movement away from the scene.
- source_word: ἔκλαυσεν πικρῶς
  chosen: wept bitterly
  alternatives:
  - cried bitterly
  - wept with bitter grief
  lexicon: BDAG
  rationale: This is the standard sense of the verb-adverb combination. 'Wept bitterly'
    is both natural and weighty, conveying deep remorse without embellishment.
