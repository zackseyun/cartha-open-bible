id: MAT.26.74
reference: Matthew 26:74
source:
  edition: SBLGNT
  text: τότε ἤρξατο καταθεματίζειν καὶ ὀμνύειν ὅτι Οὐκ οἶδα τὸν ἄνθρωπον. καὶ ⸀εὐθέως ἀλέκτωρ ἐφώνησεν·
translation:
  text: Then he began to curse and to swear[a], “I do not know the man.” And immediately a rooster crowed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “he began to invoke curses and to swear.” The sense is likely that he called down curses on himself to strengthen his denial.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Temporal-sequential adverb marking the next event in the narrative; 'Then' is the natural concise English equivalent.
- source_word: ἤρξατο
  chosen: he began
  alternatives:
  - he started
  lexicon: BDAG
  rationale: The ingressive force of ἄρχομαι with complementary infinitives is preserved by 'began,' showing escalation in Peter's denial.
- source_word: καταθεματίζειν
  chosen: to call down curses on himself
  alternatives:
  - to curse
  - to invoke curses
  lexicon: BDAG
  rationale: The verb denotes invoking a curse, likely upon oneself as an oath formula in this context, not merely using profanity. 'Call down curses on himself' makes the sense explicit in idiomatic English and avoids misunderstanding.
- source_word: ὀμνύειν
  chosen: to swear
  alternatives:
  - to take an oath
  - to swear an oath
  lexicon: BDAG
  rationale: This refers to oath-taking/solemn swearing. 'To swear' is concise and natural, and in combination with the previous verb conveys intensified denial.
- source_word: ὅτι
  chosen: “
  alternatives:
  - that
  lexicon: BDAG
  rationale: Introduces the content of the oath/denial. In English direct quotation is the clearest rendering here.
- source_word: Οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  lexicon: BDAG
  rationale: A straightforward negated statement of knowledge/acquaintance. The full form 'do not' suits the gravity of the scene better than contraction.
- source_word: τὸν ἄνθρωπον
  chosen: the man
  alternatives:
  - this man
  lexicon: BDAG
  rationale: ἄνθρωπος here refers specifically to Jesus as 'the man.' The article is preserved. 'This man' is possible in some contexts, but the Greek text here simply has 'the man.'
- source_word: καὶ εὐθέως
  chosen: And immediately
  alternatives:
  - And at once
  - And right away
  lexicon: BDAG
  rationale: Marks the instant fulfillment of Jesus' prediction. 'Immediately' preserves the narrative urgency.
- source_word: ἀλέκτωρ
  chosen: a rooster
  alternatives:
  - the rooster
  - a cock
  lexicon: BDAG
  rationale: English idiom normally uses 'a rooster' for the animal whose crow marks the time. The anarthrous Greek does not require 'the rooster,' though that is possible contextually.
- source_word: ἐφώνησεν
  chosen: crowed
  alternatives:
  - called out
  lexicon: BDAG
  rationale: For a rooster, the idiomatic English verb is 'crowed,' not the more generic 'called out.'
