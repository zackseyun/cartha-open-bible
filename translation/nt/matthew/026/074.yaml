theological_decisions:
- issue: Sense of καταθεματίζειν in Peter's denial
  chosen_reading: Peter invokes curses upon himself as part of his denial/oath, not merely that he uses profane language or curses Jesus.
  alternative_readings:
  - Peter began to curse in a general sense
  - Peter called down curses on Jesus/the man
  rationale: In this oath context, paired with ὀμνύειν ('to swear'), the verb most naturally refers to self-imprecatory cursing to reinforce the denial. This preserves the severity of Peter's repudiation without importing the idea that he cursed Jesus directly.
  doctrine_reference: Translation philosophy §1, §3
