theological_decisions:
- issue: Force of Jesus' reply Σὺ εἶπας to the high priest
  chosen_reading: 'An affirmative but not woodenly explicit response: ''You have said
    so.'''
  alternative_readings:
  - A blunt 'Yes'
  - An evasive non-answer
  rationale: The Greek expression functions as an affirmation, but translating it
    simply as 'Yes' removes the wording Jesus actually uses, while treating it as
    evasive underplays the context and the high priest's reaction. The chosen rendering
    preserves both affirmation and the phrasing of the source.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referent of 'Power' (τῆς δυνάμεως)
  chosen_reading: A reverential circumlocution for God, retained as 'Power' rather
    than expanded to 'God.'
  alternative_readings:
  - Explicitly 'God'
  - '''the Mighty One'''
  rationale: The verse likely uses a Jewish reverential substitute for the divine
    name or direct mention of God. Expanding it to 'God' would interpret correctly
    but go beyond the wording; retaining 'Power' preserves the source's theological
    register and restraint.
  doctrine_reference: Translation philosophy §1, §3
- issue: Scope of 'you will see' in relation to exaltation and coming
  chosen_reading: The saying joins enthronement ('seated at the right hand') and eschatological
    vindication ('coming on the clouds') without forcing a single temporal scheme
    in translation.
  alternative_readings:
  - Entirely fulfilled in the immediate future
  - Exclusively future second-coming language
  rationale: The Greek presents both participles together as the content of what 'you
    will see.' The translation should preserve the tension and allusive richness without
    resolving debated eschatological timing.
  doctrine_reference: Translation philosophy §3
