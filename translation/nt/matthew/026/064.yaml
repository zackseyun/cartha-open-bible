id: MAT.26.64
reference: Matthew 26:64
source:
  edition: SBLGNT
  text: λέγει αὐτῷ ὁ Ἰησοῦς· Σὺ εἶπας· πλὴν λέγω ὑμῖν, ἀπ’ ἄρτι ὄψεσθε τὸν υἱὸν τοῦ
    ἀνθρώπου καθήμενον ἐκ δεξιῶν τῆς δυνάμεως καὶ ἐρχόμενον ἐπὶ τῶν νεφελῶν τοῦ οὐρανοῦ.
translation:
  text: Jesus said to him, “You have said so. But I tell you, from now on you will
    see the Son of Man seated at the right hand of Power and coming on the clouds
    of heaven.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You said it.” The Greek wording is an idiomatic affirmative reply.
    reason: lexical_alternative
  - marker: b
    text: “Power” is a reverential way of referring to God.
    reason: cultural_note
  - marker: c
    text: An allusion to Daniel 7:13 and Psalm 110:1.
    reason: cross_reference
lexical_decisions:
- source_word: Σὺ εἶπας
  chosen: You have said so
  alternatives:
  - You said it
  - That is what you say
  lexicon: BDAG
  rationale: An idiomatic affirmative response that does not overstate the force as
    a simple unqualified 'yes.' It preserves Jesus' acceptance of the charge while
    reflecting the Greek wording literally enough to remain auditable.
- source_word: πλὴν
  chosen: But
  alternatives:
  - Nevertheless
  - Yet
  lexicon: BDAG
  rationale: Marks a strong transition from the immediate reply to the solemn declaration
    that follows. 'But' is natural modern English and preserves the adversative force.
- source_word: ἀπ’ ἄρτι
  chosen: from now on
  alternatives:
  - from this time
  - hereafter
  lexicon: BDAG
  rationale: Best captures the temporal sense in readable modern English. It need
    not mean 'immediately this moment' only, but indicates the beginning of a new
    state of affairs from this point forward.
- source_word: ὄψεσθε
  chosen: you will see
  alternatives:
  - you will perceive
  - you will behold
  lexicon: BDAG
  rationale: Future middle of ὁράω is naturally rendered 'you will see.' 'Behold'
    is too archaic for the stated translation philosophy.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: Retains the established and textually grounded self-designation with
    its Danielic resonance. Although more idiomatic alternatives exist, they risk
    muting the title's intertextual force.
- source_word: καθήμενον
  chosen: seated
  alternatives:
  - sitting
  lexicon: BDAG
  rationale: '''Seated'' better conveys enthronement and exalted status in this context
    than the more ordinary ''sitting,'' while remaining a direct rendering of the
    participle.'
- source_word: ἐκ δεξιῶν
  chosen: at the right hand of
  alternatives:
  - at the right side of
  - on the right hand of
  lexicon: BDAG
  rationale: Standard idiomatic rendering for the expression of honor, authority,
    and proximity. 'At the right hand of' is clear and preserves the biblical idiom.
- source_word: τῆς δυνάμεως
  chosen: Power
  alternatives:
  - the Power
  - the Mighty One
  - God
  lexicon: BDAG
  rationale: Capitalized 'Power' preserves the likely reverential circumlocution for
    God without making the referent more explicit than the Greek does. Omitting the
    article in English yields the most natural expression after 'right hand of' while
    still signaling a title-like use.
- source_word: ἐρχόμενον
  chosen: coming
  alternatives:
  - arriving
  lexicon: BDAG
  rationale: Direct participial rendering that preserves the allusion to Daniel 7
    and eschatological movement. 'Arriving' is too flat and loses biblical resonance.
- source_word: ἐπὶ τῶν νεφελῶν τοῦ οὐρανοῦ
  chosen: on the clouds of heaven
  alternatives:
  - upon the clouds of heaven
  - with the clouds of heaven
  lexicon: BDAG
  rationale: '''On the clouds of heaven'' is the most transparent rendering of the
    prepositional phrase here and preserves the Daniel 7:13 wording echoed by the
    verse.'
