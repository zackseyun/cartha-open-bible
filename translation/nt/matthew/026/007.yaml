id: MAT.26.7
reference: Matthew 26:7
source:
  edition: SBLGNT
  text: προσῆλθεν αὐτῷ γυνὴ ⸂ἔχουσα ἀλάβαστρον μύρου⸃ βαρυτίμου καὶ κατέχεεν ἐπὶ ⸂τῆς
    κεφαλῆς⸃ αὐτοῦ ἀνακειμένου.
translation:
  text: a woman came to him holding an alabaster jar of very costly perfume, and she
    poured it on his head as he was reclining at the table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an alabaster flask of very costly ointment.' The Greek μύρον can refer
      to perfumed oil or ointment, not only modern liquid perfume.
    reason: lexical_alternative
  - marker: b
    text: That is, reclining in the customary posture for a meal.
    reason: cultural_note
lexical_decisions:
- source_word: προσῆλθεν
  chosen: came to
  alternatives:
  - approached
  lexicon: BDAG
  rationale: Aorist of προσέρχομαι denotes movement toward someone. 'Came to' is natural
    modern English and preserves the directional sense without sounding stiff; 'approached'
    is possible but slightly more formal.
- source_word: γυνή
  chosen: a woman
  lexicon: BDAG
  rationale: Indefinite singular noun; no identifying descriptor is supplied here,
    so 'a woman' best matches the Greek.
- source_word: ἔχουσα
  chosen: holding
  alternatives:
  - having
  - carrying
  lexicon: BDAG
  rationale: Present participle modifying 'woman.' 'Holding' fits the immediate physical
    sense in context better than the more wooden 'having,' while remaining close to
    the Greek.
- source_word: ἀλάβαστρον μύρου
  chosen: an alabaster jar of ... perfume
  alternatives:
  - an alabaster flask of ... ointment
  lexicon: BDAG
  rationale: ἀλάβαστρον can denote an alabaster container, and μύρον refers to perfumed
    oil/ointment. 'Alabaster jar' is idiomatic English; 'perfume' communicates the
    costly fragrant substance clearly for modern readers.
- source_word: βαρυτίμου
  chosen: very costly
  alternatives:
  - expensive
  - of great value
  lexicon: BDAG
  rationale: The adjective intensifies the value of the perfume. 'Very costly' preserves
    the elevated sense better than the flatter 'expensive.'
- source_word: κατέχεεν
  chosen: poured
  alternatives:
  - was pouring out
  - poured out
  lexicon: BDAG
  rationale: The verb καταχέω means to pour down/upon. 'Poured' is the clearest rendering
    here; 'poured out' is possible but the following phrase 'on his head' already
    supplies the directional force.
- source_word: ἐπὶ τῆς κεφαλῆς αὐτοῦ
  chosen: on his head
  alternatives:
  - upon his head
  lexicon: BDAG
  rationale: ἐπί with the genitive here indicates location/contact. 'On his head'
    is straightforward modern English.
- source_word: ἀνακειμένου
  chosen: as he was reclining at the table
  alternatives:
  - while he was reclining
  - as he reclined
  lexicon: BDAG
  rationale: The participle refers to the customary dining posture. Simply saying
    'reclining' may sound ambiguous in English, so 'reclining at the table' makes
    the cultural setting explicit without adding foreign content.
