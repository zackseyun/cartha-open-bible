id: MAT.26.67
reference: Matthew 26:67
source:
  edition: SBLGNT
  text: τότε ἐνέπτυσαν εἰς τὸ πρόσωπον αὐτοῦ καὶ ἐκολάφισαν αὐτόν, οἱ δὲ ἐράπισαν
translation:
  text: Then they spat in his face and struck him with their fists, and others slapped
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spat on his face.' The Greek expression literally says they spat 'into
      the face' of him, an idiom for direct spitting at his face.
    reason: lexical_alternative
  - marker: b
    text: Or 'struck him' or 'punched him.' The verb specifically suggests blows with
      the fist.
    reason: lexical_alternative
  - marker: c
    text: Or 'others struck him with open hands.' The final verb often refers to a
      slap.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the next event in sequence; 'Then' is natural,
    concise English and preserves narrative flow.
- source_word: ἐνέπτυσαν εἰς τὸ πρόσωπον αὐτοῦ
  chosen: spat in his face
  alternatives:
  - spat on his face
  - spat into his face
  lexicon: BDAG
  rationale: ἐμπτύω means 'to spit.' With εἰς τὸ πρόσωπον, the idiomatic sense is
    direct spitting at/on the face. 'Spat in his face' is standard English for this
    act of contempt and preserves the force of the insult.
- source_word: ἐκολάφισαν αὐτόν
  chosen: struck him with their fists
  alternatives:
  - beat him
  - punched him
  lexicon: BDAG
  rationale: κολαφίζω refers to striking with the fist, not merely generic beating.
    'Struck him with their fists' makes the manner explicit while remaining readable;
    'punched' is possible but slightly more colloquial.
- source_word: οἱ δὲ ἐράπισαν
  chosen: and others slapped him
  alternatives:
  - but others struck him
  - and others hit him with open hands
  lexicon: BDAG
  rationale: 'The nominative article with δέ functions substantivally: ''others.''
    ῥαπίζω commonly denotes striking with the palm/open hand, hence ''slapped.'' Supplying
    ''him'' in English is necessary from context because the object is implicit after
    the previous clause.'
- source_word: δέ
  chosen: and
  alternatives:
  - but
  - while
  lexicon: BDAG
  rationale: Here δέ marks a mild transition to another group/action rather than a
    strong contrast. 'And' reads more naturally in English narrative, while 'others'
    preserves the distinction between participants.
