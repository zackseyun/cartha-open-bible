theological_decisions:
- issue: Description of the abuse of Jesus before the council
  chosen_reading: 'Render the actions concretely and without softening: spitting,
    fist-striking, and slapping.'
  alternative_readings:
  - Use more general terms such as 'mistreated' or 'beat'
  rationale: The verse emphasizes the humiliation and physical abuse inflicted on
    Jesus. A concrete rendering preserves the narrative force without importing additional
    theological commentary.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; readable modern English, not archaic or academic.'
