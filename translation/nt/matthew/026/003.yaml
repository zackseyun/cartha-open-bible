id: MAT.26.3
reference: Matthew 26:3
source:
  edition: SBLGNT
  text: Τότε συνήχθησαν οἱ ⸀ἀρχιερεῖς καὶ οἱ πρεσβύτεροι τοῦ λαοῦ εἰς τὴν αὐλὴν τοῦ ἀρχιερέως τοῦ λεγομένου Καϊάφα,
translation:
  text: Then the chief priests and the elders of the people were gathered in the courtyard of the high priest[a], who was called Caiaphas[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'assembled' for 'were gathered.' The Greek verb is passive in form.
    reason: lexical_alternative
  - marker: b
    text: '''Courtyard'' could also be rendered ''palace court,'' since the Greek term can refer to the court area of a large residence.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then' is natural and sufficiently formal.
- source_word: συνήχθησαν
  chosen: were gathered
  alternatives:
  - gathered together
  - assembled
  lexicon: BDAG
  rationale: Aorist passive indicates that the group came together/was assembled. 'Were gathered' preserves the passive form more closely than simple active 'gathered' while remaining natural English.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: Standard rendering in Gospel contexts for the leading priestly authorities, not multiple holders of the singular office of high priest.
- source_word: πρεσβύτεροι τοῦ λαοῦ
  chosen: the elders of the people
  alternatives:
  - the people's elders
  lexicon: BDAG
  rationale: Genitive construction is best represented straightforwardly. This refers to recognized lay leaders among the Jewish people.
- source_word: εἰς τὴν αὐλὴν
  chosen: in the courtyard
  alternatives:
  - into the courtyard
  - in the palace court
  lexicon: BDAG
  rationale: Although εἰς often means 'into,' with verbs of gathering the resulting location is prominent in English. αὐλή can denote courtyard or palace court; 'courtyard' is the clearest non-speculative choice here.
- source_word: τοῦ ἀρχιερέως
  chosen: of the high priest
  lexicon: BDAG
  rationale: Singular office-holder in context; standard and precise rendering.
- source_word: τοῦ λεγομένου Καϊάφα
  chosen: who was called Caiaphas
  alternatives:
  - named Caiaphas
  - called Caiaphas
  lexicon: BDAG
  rationale: Participial phrase identifies the high priest by name. 'Who was called Caiaphas' closely reflects the Greek while remaining idiomatic. Personal name is transliterated per translation philosophy.
