id: MAT.26.57
reference: Matthew 26:57
source:
  edition: SBLGNT
  text: Οἱ δὲ κρατήσαντες τὸν Ἰησοῦν ἀπήγαγον πρὸς Καϊάφαν τὸν ἀρχιερέα, ὅπου οἱ γραμματεῖς
    καὶ οἱ πρεσβύτεροι συνήχθησαν.
translation:
  text: Now those who had seized Jesus led him away to Caiaphas the high priest, where
    the scribes and the elders had gathered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'had assembled.' The Greek verb can be rendered either as a passive ('were
      assembled') or as an intransitive event ('had gathered') in this context.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἱ δὲ
  chosen: Now those who
  alternatives:
  - And those who
  - But those who
  lexicon: BDAG
  rationale: δέ is a mild connective that advances the narrative. 'Now' gives natural
    English flow without overstating contrast; the article with participle is rendered
    as a substantival phrase, 'those who.'
- source_word: κρατήσαντες
  chosen: had seized
  alternatives:
  - having seized
  - arrested
  - taken hold of
  lexicon: BDAG
  rationale: Aorist participle prior to the main verb indicates antecedent action.
    'Had seized' is idiomatic English and preserves the force of κρατέω as taking
    hold of or apprehending. 'Arrested' is possible but slightly more interpretive/legal
    than the Greek itself requires.
- source_word: ἀπήγαγον
  chosen: led him away
  alternatives:
  - took him away
  - brought him away
  lexicon: BDAG
  rationale: ἀπάγω commonly means to lead or take away. 'Led him away' fits the custodial
    movement after seizure and is standard, clear English.
- source_word: πρὸς Καϊάφαν
  chosen: to Caiaphas
  alternatives:
  - before Caiaphas
  - to the house of Caiaphas
  lexicon: BDAG
  rationale: πρός with accusative here marks movement toward a person. 'To Caiaphas'
    is the most direct rendering; 'before' is more interpretive, and 'to the house
    of Caiaphas' adds information not explicit in the Greek.
- source_word: τὸν ἀρχιερέα
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: ἀρχιερεύς in the singular for Caiaphas is best rendered 'high priest,'
    the standard title for the office in this context.
- source_word: ὅπου
  chosen: where
  alternatives:
  - the place where
  lexicon: BDAG
  rationale: Simple locative relative adverb; 'where' is natural and sufficient.
- source_word: οἱ γραμματεῖς
  chosen: the scribes
  alternatives:
  - the legal experts
  - the teachers of the law
  lexicon: BDAG
  rationale: γραμματεῖς is traditionally and accurately rendered 'scribes' in Gospel
    judicial/religious contexts. Alternatives are more explanatory than translational.
- source_word: οἱ πρεσβύτεροι
  chosen: the elders
  alternatives:
  - the senior leaders
  lexicon: BDAG
  rationale: πρεσβύτεροι in this setting refers to the recognized Jewish leaders/elders.
    'The elders' is the established and precise rendering.
- source_word: συνήχθησαν
  chosen: had gathered
  alternatives:
  - were assembled
  - had assembled
  lexicon: BDAG
  rationale: Aorist passive can be rendered in English as an intransitive middle-like
    sense in context. 'Had gathered' conveys that they were already assembled when
    Jesus was brought there. 'Were assembled' is also possible, but 'had gathered'
    reads more naturally with the narrative sequence.
