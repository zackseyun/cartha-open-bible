id: MAT.26.70
reference: Matthew 26:70
source:
  edition: SBLGNT
  text: ὁ δὲ ἠρνήσατο ⸀ἔμπροσθεν πάντων λέγων· Οὐκ οἶδα τί λέγεις.
translation:
  text: But he denied it before them all, saying, “I do not know what you are saying.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, “I do not know what you are saying.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρνήσατο
  chosen: denied it
  alternatives:
  - denied
  - disowned
  lexicon: BDAG
  rationale: The middle aorist of ἀρνέομαι here refers to Peter's denial of the accusation
    just made. English idiom benefits from supplying the implied object ('it') to
    make clear that he denied the claim, not merely that he spoke negatively. 'Disowned'
    is too strong and more relationally loaded than the immediate context requires.
- source_word: ἔμπροσθεν πάντων
  chosen: before them all
  alternatives:
  - before everyone
  - in front of them all
  lexicon: BDAG
  rationale: ἔμπροσθεν with the genitive means 'before' or 'in the presence of.' Since
    πάντων is masculine plural and refers to the gathered people in context, 'before
    them all' preserves both the public setting and the personal reference better
    than the more abstract 'before everyone.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally rendered with 'saying' in English to preserve
    the Greek flow without overformal stiffness. 'And said' is possible but slightly
    flattens the participial construction.
- source_word: Οὐκ οἶδα
  chosen: I do not know
  alternatives:
  - I don't know
  lexicon: BDAG
  rationale: This is the straightforward negated verb of knowing. The full form 'I
    do not know' fits the gravity of the narrative better than the contraction while
    remaining natural modern English.
- source_word: τί λέγεις
  chosen: what you are talking about
  alternatives:
  - what you are saying
  - what you mean
  lexicon: BDAG
  rationale: Literally, the phrase is 'what you are saying.' In idiomatic English
    within a denial scene, 'what you are talking about' best conveys Peter's claim
    of non-comprehension without sounding wooden. The more literal alternative is
    preserved in a footnote for auditability.
