theological_decisions:
- issue: Nature of Peter's denial
  chosen_reading: Peter publicly denies the accusation or association being made,
    without adding interpretive detail beyond the text.
  alternative_readings:
  - Peter denied Jesus directly
  - Peter denied knowing the servant girl
  rationale: The Greek simply states that 'he denied' in response to the preceding
    accusation. The translation avoids importing a more specific object than the immediate
    discourse warrants, while still making English sense by supplying the implied
    'it.'
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text
    does not make; optimal equivalence.'
