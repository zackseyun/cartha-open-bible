id: MAT.26.20
reference: Matthew 26:20
source:
  edition: SBLGNT
  text: Ὀψίας δὲ γενομένης ἀνέκειτο μετὰ τῶν δώδεκα ⸀μαθητῶν
translation:
  text: When evening came, he reclined at the table with the twelve disciples.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read simply 'with the twelve' instead of 'with the twelve
      disciples.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  chosen: When evening came
  alternatives:
  - When it was evening
  - After evening had come
  lexicon: BDAG
  rationale: This genitive absolute marks a temporal setting. 'When evening came'
    is natural modern English and preserves the temporal force without unnecessary
    stiffness.
- source_word: ἀνέκειτο
  chosen: he reclined at the table
  alternatives:
  - he reclined
  - he was reclining
  lexicon: BDAG
  rationale: The verb refers to reclining for a meal, not merely sitting or lying
    down. 'At the table' is supplied in English to make the meal context explicit,
    reflecting the idiomatic sense of the verb in banquet settings.
- source_word: μετὰ
  chosen: with
  alternatives:
  - in the company of
  lexicon: BDAG
  rationale: With the genitive, μετά straightforwardly means 'with.' The simple English
    preposition best matches the Greek.
- source_word: τῶν δώδεκα μαθητῶν
  chosen: the twelve disciples
  alternatives:
  - the twelve
  - the twelve learners
  lexicon: BDAG
  rationale: The noun μαθητῶν is present in the SBLGNT text and should be translated
    rather than omitted. 'Disciples' is the established and accurate rendering for
    μαθητής in Gospel contexts. 'The twelve' alone would undertranslate the phrase,
    though it is a natural shorthand elsewhere.
