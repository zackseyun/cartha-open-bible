id: MAT.26.15
reference: Matthew 26:15
source:
  edition: SBLGNT
  text: εἶπεν· Τί θέλετέ μοι δοῦναι κἀγὼ ὑμῖν παραδώσω αὐτόν; οἱ δὲ ἔστησαν αὐτῷ τριάκοντα
    ἀργύρια.
translation:
  text: He said, “What are you willing to give me, and I will hand him over to you?”
    And they weighed out for him thirty pieces of silver.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “betray him to you.” The Greek verb can mean “hand over,” “deliver,”
      or, in context, “betray.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τί θέλετέ μοι δοῦναι
  chosen: What are you willing to give me
  alternatives:
  - What do you want to give me
  - What will you give me
  lexicon: BDAG
  rationale: θέλω can denote desire or willingness. In this bargaining context, 'are
    you willing to give me' captures the volitional nuance naturally in English without
    overparaphrasing.
- source_word: κἀγὼ ὑμῖν παραδώσω αὐτόν
  chosen: and I will hand him over to you
  alternatives:
  - and I will deliver him to you
  - and I will betray him to you
  lexicon: BDAG
  rationale: παραδίδωμι has a broad range including 'hand over, deliver.' Here Judas
    is offering Jesus to the authorities; 'hand him over' is precise and idiomatic.
    'Betray' reflects interpretation of the act's moral character, but the verb itself
    is broader, so it is preserved as an alternative rather than chosen for the main
    text.
- source_word: οἱ δὲ
  chosen: And they
  alternatives:
  - But they
  - So they
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And they' fits the narrative flow in modern
    English without overstating contrast.
- source_word: ἔστησαν αὐτῷ
  chosen: they weighed out for him
  alternatives:
  - they paid him
  - they set before him
  - they appointed to him
  lexicon: BDAG
  rationale: ἵστημι in this idiom can mean to set or fix an amount; in context with
    'thirty silver [pieces],' it refers to payment being counted/weighed out. 'Weighed
    out' preserves the concrete commercial sense better than the more generic 'paid.'
- source_word: τριάκοντα ἀργύρια
  chosen: thirty pieces of silver
  alternatives:
  - thirty silver coins
  - thirty silver pieces
  lexicon: BDAG
  rationale: ἀργύρια literally means 'silver [pieces/money].' English normally requires
    an explicit unit; 'pieces of silver' is the established and accurate idiom, preserving
    the material and the likely coinage/payment sense without specifying a denomination
    not present in the Greek.
