theological_decisions:
- issue: Rendering παραδώσω in Judas's offer
  chosen_reading: hand him over
  alternative_readings:
  - betray him
  - deliver him
  rationale: The translation preserves the lexical breadth of παραδίδωμι and avoids
    importing the full theological/moral evaluation into the verb itself when the
    immediate Greek can be rendered more neutrally. The betrayal sense is contextually
    true and common in translation tradition, but the source wording is broader.
  doctrine_reference: Translation philosophy §1, §3
