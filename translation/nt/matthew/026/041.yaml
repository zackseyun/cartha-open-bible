theological_decisions:
- issue: Referent of πνεῦμα
  chosen_reading: human spirit/inner disposition, rendered 'spirit' with lowercase
  alternative_readings:
  - the Holy Spirit
  rationale: The contrast with 'flesh' and the immediate context of the disciples' sincere intention but actual failure favors the human spirit rather than the Holy Spirit. Lowercase preserves this reading without importing a pneumatological claim the text does not make.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
- issue: Rendering of σάρξ
  chosen_reading: '''flesh'' rather than ''sinful nature'''
  alternative_readings:
  - sinful nature
  - body
  rationale: The doctrine guidance specifies σάρξ as 'flesh' when literal and 'sinful nature' when metaphorical, documented per verse. Here the sense is human frailty in embodied weakness, not a developed Pauline category of 'sinful nature.' 'Flesh' preserves the idiom and avoids over-interpretation.
