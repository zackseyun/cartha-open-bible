id: MAT.26.41
reference: Matthew 26:41
source:
  edition: SBLGNT
  text: γρηγορεῖτε καὶ προσεύχεσθε, ἵνα μὴ εἰσέλθητε εἰς πειρασμόν· τὸ μὲν πνεῦμα πρόθυμον ἡ δὲ σὰρξ ἀσθενής.
translation:
  text: Stay awake and pray[a], so that you may not enter into temptation. The spirit indeed is willing, but the flesh is weak.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'testing' or 'trial' for 'temptation' (πειρασμόν). The Greek term can refer either to enticement to sin or to a testing ordeal.
    reason: lexical_alternative
lexical_decisions:
- source_word: γρηγορεῖτε
  chosen: Stay awake
  alternatives:
  - Keep watch
  - Be watchful
  lexicon: BDAG
  rationale: Imperative plural from γρηγορέω, literally 'be awake/watch.' 'Stay awake' is natural modern English in the Gethsemane context, where the disciples have been physically sleeping, while still preserving the moral/spiritual vigilance implied by the verb.
- source_word: προσεύχεσθε
  chosen: pray
  alternatives:
  - be praying
  lexicon: BDAG
  rationale: Present middle/passive imperative plural. 'Pray' is the standard and clear rendering; the present imperative nuance of ongoing action is adequately conveyed in English by the paired command without forcing an awkward progressive form.
- source_word: ἵνα μὴ εἰσέλθητε
  chosen: so that you may not enter
  alternatives:
  - lest you enter
  - so that you may not fall
  lexicon: BDAG
  rationale: ἵνα with μή and aorist subjunctive expresses purpose/prevention. 'So that you may not enter' is closer to the Greek than the more interpretive 'fall,' preserving the metaphor of entering into a testing situation.
- source_word: πειρασμόν
  chosen: temptation
  alternatives:
  - testing
  - trial
  lexicon: BDAG
  rationale: πειρασμός can mean temptation, testing, or trial. In this immediate context Jesus warns the disciples about impending moral failure under pressure; 'temptation' best fits the warning while preserving the traditional and likely sense. The broader semantic range is worth preserving in a footnote.
- source_word: τὸ μὲν πνεῦμα
  chosen: The spirit indeed
  alternatives:
  - The spirit on the one hand
  - The Spirit indeed
  lexicon: BDAG
  rationale: μέν marks the first half of a contrast with δέ. 'Indeed' captures the concessive/contrastive force idiomatically. Lowercase 'spirit' is preferred because the saying contrasts the human inner willingness with human fleshly weakness, not explicitly the Holy Spirit.
- source_word: πρόθυμον
  chosen: is willing
  alternatives:
  - is eager
  - is ready
  lexicon: BDAG
  rationale: πρόθυμος denotes readiness, willingness, eagerness. 'Willing' is concise, idiomatic, and fits the familiar contrast without overstating emotional enthusiasm.
- source_word: ἡ δὲ σὰρξ
  chosen: but the flesh
  alternatives:
  - but the body
  - but human nature
  lexicon: BDAG
  rationale: Per project defaults, σάρξ is rendered 'flesh' when literal or when the metaphor should be preserved rather than interpreted away. Here it refers to human frailty/weakness in contrast to spirit. 'Flesh' keeps the biblical idiom and theological tension; more interpretive alternatives are preserved as alternatives rather than adopted in the main text.
- source_word: ἀσθενής
  chosen: is weak
  alternatives:
  - is feeble
  - is powerless
  lexicon: BDAG
  rationale: ἀσθενής means weak, sick, powerless depending on context. 'Weak' best matches the contrast and standard English usage here.
