theological_decisions:
- issue: Whether to render the cup's contents explicitly as 'wine' or preserve the idiom
  chosen_reading: Preserved the phrase 'fruit of the vine' in the main text
  alternative_readings:
  - wine
  rationale: The Greek says 'fruit/product of the vine,' not simply οἶνος ('wine'). Retaining the idiom respects original-language primacy and avoids importing sacramental or symbolic specificity beyond the text, while readers can naturally understand it as referring to the cup's contents.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sense of καινὸν in the eschatological meal
  chosen_reading: '''new'' in the main text, without specifying whether it means newly made, renewed participation, or new in quality'
  alternative_readings:
  - anew
  - in a new way
  rationale: The adjective can suggest newness in kind/quality, but the verse does not fully resolve the nuance. To preserve theological tension rather than over-interpret, the main text keeps 'new' and a footnote notes the possible nuance 'anew.'
  doctrine_reference: Translation philosophy §3
