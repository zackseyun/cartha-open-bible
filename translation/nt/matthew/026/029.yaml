id: MAT.26.29
reference: Matthew 26:29
source:
  edition: SBLGNT
  text: λέγω δὲ ⸀ὑμῖν, οὐ μὴ πίω ἀπ’ ἄρτι ἐκ τούτου τοῦ γενήματος τῆς ἀμπέλου ἕως τῆς ἡμέρας ἐκείνης ὅταν αὐτὸ πίνω μεθ’ ὑμῶν καινὸν ἐν τῇ βασιλείᾳ τοῦ πατρός μου.
translation:
  text: But I tell you[a], from now on I will certainly not drink from this fruit of the vine until that day when I drink it new with you in the kingdom of my Father.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anew'; the Greek adjective can denote newness in kind or quality, and the phrase may imply drinking it in a new way in the coming kingdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - And I tell you
  - Now I tell you
  lexicon: BDAG
  rationale: δέ is mildly adversative or transitional here; 'But I tell you' is natural English and preserves the discourse shift without overstating contrast.
- source_word: οὐ μὴ πίω
  chosen: I will certainly not drink
  alternatives:
  - I will never drink
  - I shall by no means drink
  lexicon: BDAG
  rationale: οὐ μὴ with the aorist subjunctive is an emphatic future negation. 'Will certainly not' preserves the force in readable modern English better than the more absolute-sounding 'never,' while avoiding archaic phrasing.
- source_word: ἀπ’ ἄρτι
  chosen: from now on
  alternatives:
  - from this moment
  - from now
  lexicon: BDAG
  rationale: The phrase marks the starting point from the present moment forward. 'From now on' is idiomatic and captures the temporal force.
- source_word: ἐκ τούτου τοῦ γενήματος τῆς ἀμπέλου
  chosen: from this fruit of the vine
  alternatives:
  - of this produce of the vine
  - from this vine-fruit
  - from this fruit of the grapevine
  lexicon: BDAG
  rationale: γένημα is literally 'product/fruit,' and the full phrase is a Jewish idiom for wine. 'Fruit of the vine' preserves the wording of the source and its liturgical resonance without over-paraphrasing to simply 'wine'.
- source_word: ἕως τῆς ἡμέρας ἐκείνης
  chosen: until that day
  alternatives:
  - until the day
  - until that day comes
  lexicon: BDAG
  rationale: The demonstrative ἐκείνης is significant and points to a definite future eschatological day; 'until that day' preserves this emphasis.
- source_word: ὅταν αὐτὸ πίνω
  chosen: when I drink it
  alternatives:
  - when I drink from it
  - whenever I drink it
  lexicon: BDAG
  rationale: 'ὅταν with the present subjunctive points to a future event contingent in time: ''when I drink it.'' The pronoun αὐτό refers back to the cup''s contents / fruit of the vine.'
- source_word: καινὸν
  chosen: new
  alternatives:
  - anew
  - fresh
  lexicon: BDAG
  rationale: καινός commonly denotes newness in kind or quality. 'New' is the most direct rendering. Because English readers may wonder whether this means 'anew' or 'in a new way,' the alternative is preserved in a footnote rather than expanded in the main text.
- source_word: μεθ’ ὑμῶν
  chosen: with you
  alternatives:
  - together with you
  - in your company
  lexicon: BDAG
  rationale: Simple accompaniment is in view; 'with you' is clear and natural.
- source_word: ἐν τῇ βασιλείᾳ τοῦ πατρός μου
  chosen: in the kingdom of my Father
  alternatives:
  - in my Father's kingdom
  lexicon: BDAG
  rationale: Both are possible in English. The chosen wording stays closer to the Greek order and preserves the solemnity of Jesus' reference to 'my Father'.
