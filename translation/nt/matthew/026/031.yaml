id: MAT.26.31
reference: Matthew 26:31
source:
  edition: SBLGNT
  text: Τότε λέγει αὐτοῖς ὁ Ἰησοῦς· Πάντες ὑμεῖς σκανδαλισθήσεσθε ἐν ἐμοὶ ἐν τῇ νυκτὶ
    ταύτῃ, γέγραπται γάρ· Πατάξω τὸν ποιμένα, καὶ ⸀διασκορπισθήσονται τὰ πρόβατα τῆς
    ποίμνης·
translation:
  text: 'Then Jesus says to them, “You will all fall away because of me this night,
    for it is written: ‘I will strike the shepherd, and the sheep of the flock will
    be scattered.’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “stumble,” “be caused to stumble,” or “take offense.” The Greek can cover
      a range from stumbling to falling away; here the context favors desertion of
      Jesus.
    reason: lexical_alternative
  - marker: b
    text: Or “tonight.”
    reason: lexical_alternative
  - marker: c
    text: Quotation from Zechariah 13:7.
    reason: cross_reference
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal adverb introducing the next event in narrative sequence.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Greek present is often used as a historical present in narrative. Rendered
    as English present for vividness and to reflect the Greek form.
- source_word: Πάντες ὑμεῖς
  chosen: You will all
  alternatives:
  - All of you will
  lexicon: BDAG
  rationale: The combination is emphatic; English preserves the emphasis by explicitly
    including both 'you' and 'all'.
- source_word: σκανδαλισθήσεσθε
  chosen: fall away
  alternatives:
  - stumble
  - be caused to stumble
  - take offense
  lexicon: BDAG
  rationale: In this context of disciples abandoning Jesus, 'fall away' best captures
    the relational and discipleship sense, not merely a momentary stumble. It is more
    idiomatic than 'be scandalized' and more contextually precise than bare 'stumble'.
- source_word: ἐν ἐμοὶ
  chosen: because of me
  alternatives:
  - on account of me
  - in me
  lexicon: BDAG
  rationale: Here ἐν with the pronoun is idiomatic in the sense of being caused to
    stumble in relation to Jesus. 'Because of me' communicates the causal sense clearly
    in English.
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  chosen: this night
  alternatives:
  - tonight
  - in this night
  lexicon: BDAG
  rationale: '''This night'' is natural, slightly formal narrative English and stays
    close to the Greek wording. ''Tonight'' is possible but slightly more colloquial.'
- source_word: γέγραπται γάρ
  chosen: for it is written
  alternatives:
  - for it stands written
  lexicon: BDAG
  rationale: Standard rendering of the perfect passive formula introducing Scripture
    citation.
- source_word: Πατάξω
  chosen: I will strike
  alternatives:
  - I will strike down
  - I will smite
  lexicon: BDAG
  rationale: '''Strike'' is the plain sense and avoids archaic ''smite.'' ''Strike
    down'' may over-specify the result beyond the wording here.'
- source_word: τὸν ποιμένα
  chosen: the shepherd
  lexicon: BDAG
  rationale: Direct and standard rendering of the metaphor, preserving the scriptural
    imagery.
- source_word: διασκορπισθήσονται
  chosen: will be scattered
  alternatives:
  - will be dispersed
  lexicon: BDAG
  rationale: Passive future is naturally rendered 'will be scattered,' preserving
    both the imagery and the passive form.
- source_word: τὰ πρόβατα τῆς ποίμνης
  chosen: the sheep of the flock
  alternatives:
  - the flock's sheep
  - the sheep
  lexicon: BDAG
  rationale: The Greek explicitly includes both πρόβατα and ποίμνης. 'The sheep of
    the flock' preserves the full wording rather than collapsing it to simply 'the
    sheep.'
