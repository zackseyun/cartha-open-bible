theological_decisions:
- issue: Sense of σκανδαλισθήσεσθε in relation to Jesus
  chosen_reading: The disciples will fall away from faithful attachment to Jesus because
    of what happens to him.
  alternative_readings:
  - The disciples will merely be offended by Jesus
  - The disciples will stumble in a more general moral sense
  rationale: In context, Jesus predicts the disciples' desertion that very night,
    reinforced by the shepherd/sheep citation. 'Fall away because of me' preserves
    the relational and prophetic force without importing a later doctrinal category
    of final apostasy.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering the historical present λέγει
  chosen_reading: English present 'says' retained.
  alternative_readings:
  - English past 'said'
  rationale: 'This is a translation-philosophy decision rather than a doctrinal one:
    retaining the historical present reflects the Greek narrative texture without
    changing meaning.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
