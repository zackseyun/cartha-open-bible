id: MAT.26.17
reference: Matthew 26:17
source:
  edition: SBLGNT
  text: Τῇ δὲ πρώτῃ τῶν ἀζύμων προσῆλθον οἱ μαθηταὶ τῷ Ἰησοῦ ⸀λέγοντες· Ποῦ θέλεις ⸀ἑτοιμάσωμέν σοι φαγεῖν τὸ πάσχα;
translation:
  text: Now on the first day of Unleavened Bread[a], the disciples came to Jesus, saying[b], “Where do you want us to prepare for you to eat the Passover?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, “the Passover meal.”
    reason: lexical_alternative
  - marker: b
    text: “The first day of Unleavened Bread” reflects the Greek wording directly; discussions of Passover chronology should not be settled by translation alone.
    reason: cultural_note
lexical_decisions:
- source_word: Τῇ δὲ πρώτῃ
  chosen: Now on the first day
  alternatives:
  - And on the first day
  - On the first day
  lexicon: BDAG
  rationale: Τῇ πρώτῃ is a dative temporal construction, naturally rendered 'on the first day.' δέ is a mild connective; 'Now' preserves discourse movement in readable English without overstating contrast.
- source_word: τῶν ἀζύμων
  chosen: of Unleavened Bread
  alternatives:
  - of the Unleavened Bread
  - of the Feast of Unleavened Bread
  lexicon: BDAG
  rationale: The genitive plural with the adjective used substantivally refers to the unleavened-bread festival period. 'Unleavened Bread' is the standard idiomatic English rendering and preserves the Jewish festal reference without over-expanding the text.
- source_word: προσῆλθον
  chosen: came
  alternatives:
  - approached
  - came up
  lexicon: BDAG
  rationale: προσέρχομαι often means 'come to' or 'approach.' Here 'came' is natural English with the indirect object 'to Jesus' making the direction explicit.
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article plus noun identifies the known group. 'The disciples' is sufficient because the context already makes their relation to Jesus clear; adding 'his' would slightly exceed the explicit wording.
- source_word: τῷ Ἰησοῦ
  chosen: to Jesus
  alternatives:
  - up to Jesus
  lexicon: BDAG
  rationale: Dative complement with προσῆλθον indicates the person approached. 'To Jesus' is the straightforward rendering.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  - asking
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb. 'Saying' preserves the participial linkage; 'asking' would interpret the speech-act more specifically than the Greek states.
- source_word: Ποῦ θέλεις
  chosen: Where do you want
  alternatives:
  - Where do you wish
  - Where will you have us
  lexicon: BDAG
  rationale: θέλω here expresses desire or intention. 'Want' is idiomatic modern English and appropriately direct.
- source_word: ἑτοιμάσωμέν σοι
  chosen: us to prepare for you
  alternatives:
  - for us to prepare for you
  - that we should prepare for you
  lexicon: BDAG
  rationale: 'The first person plural aorist subjunctive in an indirect deliberative question is well represented by English infinitival construction after ''want'': ''want us to prepare.'' σοι is retained as ''for you,'' indicating preparation on Jesus'' behalf.'
- source_word: φαγεῖν
  chosen: to eat
  alternatives:
  - for you to eat
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose/result with the preparation: they are preparing so that Jesus may eat. In English, ''prepare for you to eat'' is the clearest way to preserve both σοι and φαγεῖν.'
- source_word: τὸ πάσχα
  chosen: the Passover
  alternatives:
  - the Passover meal
  - Passover
  lexicon: BDAG
  rationale: πάσχα can denote the Passover festival or the meal. In this context of preparing to eat, the meal is in view, but 'the Passover' is the most direct translation and naturally implies the meal in English.
