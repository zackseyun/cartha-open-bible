theological_decisions:
- issue: Chronological expression 'the first day of Unleavened Bread' in relation to Passover meal timing
  chosen_reading: Retain the literal festal expression without harmonizing or expanding it.
  alternative_readings:
  - Interpretively expand as 'the day before the Feast of Unleavened Bread'
  - Render as 'the first day of Passover'
  rationale: The Greek text itself says 'the first day of Unleavened Bread.' Because Gospel chronology discussions are debated, the translation preserves the wording rather than resolving the issue by paraphrase or harmonization.
  doctrine_reference: Preserve theological tension rather than resolve it.
