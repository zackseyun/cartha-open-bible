theological_decisions:
- issue: Relation between divine script and human culpability
  chosen_reading: 'The verse is translated to preserve both truths stated in the Greek:
    the Son of Man goes in accordance with what is written, and the betrayer remains
    personally accountable under woe.'
  alternative_readings:
  - A deterministic reading that minimizes Judas's responsibility
  - A purely human reading that minimizes the force of scriptural fulfillment
  rationale: The wording keeps both clauses intact and does not soften either divine
    foreordination/fulfillment or human guilt. This follows the doctrine guideline
    to preserve theological tension rather than resolve it beyond the text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
- issue: Force of the final saying about non-birth
  chosen_reading: The statement is rendered as a severe judgment saying without importing
    a specific doctrinal conclusion beyond the text.
  alternative_readings:
  - A rhetorical hyperbole only
  - A proof-text for a detailed doctrine of reprobation or annihilation
  rationale: The Greek states that it would have been good for that man not to have
    been born. The translation preserves the gravity of judgment but does not expand
    it into a systematic theological claim the verse itself does not explicitly make.
  doctrine_reference: 'Affirmations; Translation philosophy: Never import doctrinal
    claims the text does not make'
