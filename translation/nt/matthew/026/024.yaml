id: MAT.26.24
reference: Matthew 26:24
source:
  edition: SBLGNT
  text: ὁ μὲν υἱὸς τοῦ ἀνθρώπου ὑπάγει καθὼς γέγραπται περὶ αὐτοῦ, οὐαὶ δὲ τῷ ἀνθρώπῳ
    ἐκείνῳ δι’ οὗ ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται· καλὸν ἦν αὐτῷ εἰ οὐκ ἐγεννήθη ὁ
    ἄνθρωπος ἐκεῖνος.
translation:
  text: The Son of Man indeed goes just as it is written about him, but woe to that
    man through whom the Son of Man is betrayed. It would have been better for him
    if that man had not been born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'through whom the Son of Man is handed over.' The Greek verb can mean
      either 'betray' or more literally 'hand over'; here 'betrayed' was chosen because
      Judas's treachery is in view.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὲν υἱὸς τοῦ ἀνθρώπου
  chosen: The Son of Man indeed
  alternatives:
  - The Son of Man
  - Indeed, the Son of Man
  lexicon: BDAG
  rationale: Retains the established titular expression 'Son of Man' for ὁ υἱὸς τοῦ
    ἀνθρώπου. The particle μὲν is lightly represented by 'indeed' to preserve the
    contrast with δὲ later in the verse without making the English wooden.
- source_word: ὑπάγει
  chosen: goes
  alternatives:
  - is going
  - goes away
  - departs
  lexicon: BDAG
  rationale: A present-tense verb rendered simply as 'goes' preserves the Greek aspect
    and avoids overinterpreting the nuance as either mere departure or specifically
    death, though the context implies Jesus' impending passion.
- source_word: καθὼς γέγραπται περὶ αὐτοῦ
  chosen: just as it has been written about him
  alternatives:
  - as it is written about him
  - just as it stands written concerning him
  lexicon: BDAG
  rationale: γέγραπται is perfect passive, commonly rendered 'it is written'; 'it
    has been written' preserves the completed-and-standing force while remaining natural.
    'About him' is a clear rendering of περὶ αὐτοῦ.
- source_word: οὐαὶ δὲ
  chosen: but woe
  alternatives:
  - but alas
  - yet woe
  lexicon: BDAG
  rationale: οὐαί is best rendered 'woe,' preserving the prophetic and judicial force.
    δὲ is represented by 'but' to mark the contrast with the Son of Man's destined
    path.
- source_word: τῷ ἀνθρώπῳ ἐκείνῳ
  chosen: to that man
  alternatives:
  - to that person
  - to that one
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a specific male individual, Judas, so 'man' is
    both accurate and consistent with the gender-accurate policy.
- source_word: δι’ οὗ
  chosen: through whom
  alternatives:
  - by whom
  - through whose agency
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses agency or instrumentality. 'Through
    whom' is idiomatic and preserves the mediated sense without overformalizing.
- source_word: παραδίδοται
  chosen: is betrayed
  alternatives:
  - is handed over
  - is delivered over
  lexicon: BDAG
  rationale: παραδίδωμι can mean 'hand over' or 'betray.' In this immediate context
    of Judas' action, 'is betrayed' communicates the relational treachery that English
    readers naturally hear here. The more literal alternative is preserved in a footnote
    because the verb can also carry the broader sense 'handed over.'
- source_word: καλὸν ἦν αὐτῷ
  chosen: It would have been good for him
  alternatives:
  - It would be better for him
  - It was good for him
  lexicon: BDAG
  rationale: This idiom expresses what would have been preferable for the man in question.
    'It would have been good for him' is a natural English rendering that preserves
    the counterfactual force implied by the following εἰ-clause.
- source_word: εἰ οὐκ ἐγεννήθη
  chosen: if ... had not been born
  alternatives:
  - if ... had never been born
  lexicon: BDAG
  rationale: The aorist passive of γεννάω is straightforwardly 'was born.' English
    counterfactual style requires 'had not been born.'
- source_word: ὁ ἄνθρωπος ἐκεῖνος
  chosen: that man
  alternatives:
  - the man
  - that one
  lexicon: BDAG
  rationale: The repeated demonstrative phrase is retained as 'that man' to preserve
    the emphatic, distancing force of ἐκεῖνος.
