id: MAT.26.9
reference: Matthew 26:9
source:
  edition: SBLGNT
  text: ἐδύνατο γὰρ ⸀τοῦτο πραθῆναι πολλοῦ καὶ δοθῆναι πτωχοῖς.
translation:
  text: For this could have been sold for a great deal and given to the poor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for much' or 'for a high price.' The Greek uses a genitive of price.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδύνατο
  chosen: could have been
  alternatives:
  - was able to be
  - might have been
  lexicon: BDAG
  rationale: Imperfect middle of δύναμαι expresses possibility in past time; with
    the infinitives it naturally yields 'could have been' in idiomatic English.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: Retains the explanatory force connecting this statement to the prior
    complaint.
- source_word: τοῦτο
  chosen: this
  alternatives:
  - this perfume
  - this ointment
  lexicon: BDAG
  rationale: The demonstrative is neuter singular and refers back to the item just
    mentioned; 'this' preserves the Greek wording without importing the noun into
    the text.
- source_word: πραθῆναι
  chosen: been sold
  alternatives:
  - be sold
  lexicon: BDAG
  rationale: Aorist passive infinitive of πιπράσκω means 'to be sold'; with ἐδύνατο
    the English perfect infinitive 'have been sold' best reflects the past unrealized
    possibility.
- source_word: πολλοῦ
  chosen: for a great deal
  alternatives:
  - for much
  - for a high price
  lexicon: BDAG
  rationale: Genitive of price after πιπράσκω indicates the amount for which something
    is sold. 'A great deal' is natural modern English and preserves the sense of a
    large sum without over-specifying.
- source_word: δοθῆναι
  chosen: given
  alternatives:
  - be given
  lexicon: BDAG
  rationale: Aorist passive infinitive of δίδωμι; coordinated with πραθῆναι and likewise
    rendered with English perfect infinitive sense under ἐδύνατο.
- source_word: πτωχοῖς
  chosen: the poor
  alternatives:
  - poor people
  lexicon: BDAG
  rationale: Substantival dative plural adjective referring to poor persons. 'The
    poor' is concise, idiomatic, and preserves the collective sense.
