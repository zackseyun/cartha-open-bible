id: MAT.26.1
reference: Matthew 26:1
source:
  edition: SBLGNT
  text: Καὶ ἐγένετο ὅτε ἐτέλεσεν ὁ Ἰησοῦς πάντας τοὺς λόγους τούτους, εἶπεν τοῖς μαθηταῖς αὐτοῦ·
translation:
  text: And when Jesus had finished all these words[a], he said to his disciples,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'And it happened when Jesus finished all these words, he said to his disciples.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  chosen: And when
  alternatives:
  - And it happened when
  - Now when
  lexicon: BDAG
  rationale: This Matthean narrative formula is semitic in flavor. A strictly formal rendering ('And it happened when') is possible, but in modern English it is awkward and adds little semantic content. 'And when' preserves the transitional force and temporal setup without unnecessary woodenness.
- source_word: ὅτε
  chosen: when
  alternatives:
  - after
  lexicon: BDAG
  rationale: The conjunction introduces the temporal clause. 'When' is the most direct rendering; 'after' would slightly over-interpret the relation, though the sense is close in context.
- source_word: ἐτέλεσεν
  chosen: had finished
  alternatives:
  - finished
  - completed
  - ended
  lexicon: BDAG
  rationale: The aorist in this temporal clause is naturally rendered in English with a past perfect ('had finished') to show action completed prior to the main verb 'said.' 'Finished' is more idiomatic here than 'completed' or 'ended.'
- source_word: πάντας τοὺς λόγους τούτους
  chosen: all these words
  alternatives:
  - all these sayings
  - all these things
  lexicon: BDAG
  rationale: λόγους is literally 'words,' and in Matthew this formula often closes a discourse. 'All these words' preserves the lexical form and discourse-closing effect. 'Sayings' is possible and somewhat idiomatic, but less direct; 'things' is too broad.
- source_word: εἶπεν
  chosen: he said
  alternatives:
  - he told
  - he spoke
  lexicon: BDAG
  rationale: A straightforward rendering of λέγω in narrative. 'Said' is the default and avoids importing nuances not explicit in the Greek.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to the disciples
  lexicon: BDAG
  rationale: The possessive αὐτοῦ is explicit and should be retained. 'Disciples' is the standard rendering of μαθηταί and fits both lexical meaning and Gospel usage.
