id: MAT.26.51
reference: Matthew 26:51
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ εἷς τῶν μετὰ Ἰησοῦ ἐκτείνας τὴν χεῖρα ἀπέσπασεν τὴν μάχαιραν αὐτοῦ
    καὶ πατάξας τὸν δοῦλον τοῦ ἀρχιερέως ἀφεῖλεν αὐτοῦ τὸ ὠτίον.
translation:
  text: And behold, one of those with Jesus stretched out his hand, drew his sword,
    and struck the high priest’s slave, and cut off his ear.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'servant' for 'slave' (δοῦλος).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the narrative vividness and suddenness of the discourse marker.
    Though somewhat formal, it remains understandable and reflects Matthew's style
    better than omitting it.
- source_word: εἷς τῶν μετὰ Ἰησοῦ
  chosen: one of those with Jesus
  alternatives:
  - one of those who were with Jesus
  - one of Jesus' companions
  lexicon: BDAG
  rationale: A natural rendering of the partitive construction that stays close to
    the Greek without over-specifying identity.
- source_word: ἐκτείνας τὴν χεῖρα
  chosen: stretched out his hand
  alternatives:
  - reached out his hand
  - extended his hand
  lexicon: BDAG
  rationale: Aorist participle rendered as an attendant action preceding the main
    verb. 'Stretched out' is idiomatic and preserves the physical motion.
- source_word: ἀπέσπασεν τὴν μάχαιραν αὐτοῦ
  chosen: drew his sword
  alternatives:
  - pulled out his sword
  - unsheathed his sword
  lexicon: BDAG
  rationale: ἀποσπάω here means to draw or pull away. 'Drew his sword' is concise,
    idiomatic English for the action, while preserving the weapon as μάχαιρα.
- source_word: μάχαιραν
  chosen: sword
  alternatives:
  - short sword
  - dagger
  lexicon: BDAG
  rationale: The term can denote a relatively short sword or large knife, but 'sword'
    is the standard and sufficiently accurate rendering in this narrative context.
    More specific options would over-interpret.
- source_word: πατάξας
  chosen: struck
  alternatives:
  - hit
  - smote
  lexicon: BDAG
  rationale: Aorist participle expressing the violent blow. 'Struck' is clear modern
    English and avoids archaic 'smote'.
- source_word: δοῦλον
  chosen: slave
  alternatives:
  - servant
  lexicon: BDAG
  rationale: Per project guidance, δοῦλος should be rendered 'slave' where the bonded
    status is in view. Here it denotes the high priest's subordinate in a household/institutional
    relation, and 'slave' better reflects the social reality than the softer 'servant'.
- source_word: ἀρχιερέως
  chosen: high priest’s
  alternatives:
  - chief priest's
  lexicon: BDAG
  rationale: Standard rendering for ἀρχιερεύς in this singular possessive construction.
- source_word: ἀφεῖλεν αὐτοῦ τὸ ὠτίον
  chosen: cutting off his ear
  alternatives:
  - took off his ear
  - removed his ear
  - cut off his ear
  lexicon: BDAG
  rationale: The Greek literally says 'took away his ear.' In English, 'cutting off
    his ear' best conveys the result of the sword strike. The participial English
    phrasing smooths the sequence while preserving the violent outcome.
- source_word: ὠτίον
  chosen: ear
  alternatives:
  - earlobe
  lexicon: BDAG
  rationale: Diminutive form, but ordinary 'ear' is the natural English equivalent
    here; 'earlobe' would be too specific.
