id: MAT.26.43
reference: Matthew 26:43
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν ⸂πάλιν εὗρεν αὐτοὺς⸃ καθεύδοντας, ἦσαν γὰρ αὐτῶν οἱ ὀφθαλμοὶ βεβαρημένοι.
translation:
  text: And coming again, he found them sleeping, for their eyes were weighed down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their eyes were heavy.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: coming
  alternatives:
  - having come
  - when he came
  lexicon: BDAG
  rationale: Aorist participle of ἔρχομαι, functioning adverbially before the main
    verb. 'Coming' keeps the participial flow in natural English without over-paraphrasing.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense indicating repetition. 'Again' is the most natural
    and concise rendering.
- source_word: εὗρεν
  chosen: he found
  alternatives:
  - he came upon
  lexicon: BDAG
  rationale: Common narrative use of εὑρίσκω meaning 'find.' The explicit subject
    'he' is supplied naturally in English from context.
- source_word: καθεύδοντας
  chosen: sleeping
  alternatives:
  - asleep
  lexicon: BDAG
  rationale: Present participle describing their ongoing state when he found them.
    'Sleeping' preserves the verbal aspect better than the adjectival 'asleep.'
- source_word: ἦσαν γὰρ
  chosen: for ... were
  alternatives:
  - because ... were
  - for they were
  lexicon: BDAG
  rationale: γάρ gives explanatory force for why he found them sleeping. 'For' preserves
    the connective relation with suitable literalness.
- source_word: οἱ ὀφθαλμοὶ
  chosen: their eyes
  alternatives:
  - the eyes of them
  lexicon: BDAG
  rationale: The Greek construction αὐτῶν οἱ ὀφθαλμοί is idiomatically rendered 'their
    eyes' in English.
- source_word: βεβαρημένοι
  chosen: were weighed down
  alternatives:
  - were heavy
  - had become heavy
  - were burdened
  lexicon: BDAG
  rationale: Perfect passive participle of βαρέω, indicating a resultant state. 'Were
    weighed down' reflects both the passive sense and the heaviness causing sleep.
    'Were heavy' is possible but less vivid and slightly less transparent to the verbal
    root.
