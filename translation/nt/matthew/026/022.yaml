  chosen_reading: Lord
  alternative_readings:
  - sir
  - master
  rationale: The translation follows the project's default rendering of κύριος as
    'Lord.' While in some contexts the term can mean 'sir,' Matthew regularly uses
    it in ways that carry more than mere politeness when directed to Jesus. This rendering
    preserves that theological and narrative weight without overexpansion.
