id: MAT.26.22
reference: Matthew 26:22
source:
  edition: SBLGNT
  text: καὶ λυπούμενοι σφόδρα ἤρξαντο λέγειν αὐτῷ ⸂εἷς ἕκαστος⸃· Μήτι ἐγώ εἰμι, κύριε;
translation:
  text: And being deeply grieved, they began to say to him one by one, “Surely not
    I, Lord?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “each one” / “one after another.”
    reason: lexical_alternative
  - marker: b
    text: 'The Greek question uses μήτι, which expects a negative answer: “Surely
      not I, Lord?”'
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπούμενοι
  chosen: being deeply grieved
  alternatives:
  - becoming sorrowful
  - being distressed
  lexicon: BDAG
  rationale: The present participle conveys their ongoing emotional state. 'Grieved'
    is natural modern English and preserves the sorrowful force without sounding archaic.
- source_word: σφόδρα
  chosen: deeply
  alternatives:
  - greatly
  - very much
  - exceedingly
  lexicon: BDAG
  rationale: This adverb intensifies λυπούμενοι. 'Deeply' fits idiomatic English with
    an emotion term better than the more wooden 'exceedingly.'
- source_word: ἤρξαντο λέγειν
  chosen: began to say
  alternatives:
  - started saying
  - began saying
  lexicon: BDAG
  rationale: This is a standard ingressive construction. 'Began to say' preserves
    the verbal aspect and reads naturally.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Simple dative indirect object; no reason to expand beyond the Greek.
- source_word: εἷς ἕκαστος
  chosen: one by one
  alternatives:
  - each one
  - one after another
  lexicon: BDAG
  rationale: The doubled distributive expression emphasizes individual response. 'One
    by one' captures the sense idiomatically in English.
- source_word: Μήτι
  chosen: Surely not
  alternatives:
  - It is not ... is it?
  - Surely it isn't
  lexicon: BDAG
  rationale: Μήτι introduces a question expecting a negative answer. 'Surely not'
    best conveys the rhetorical force in concise, natural English.
- source_word: ἐγώ εἰμι
  chosen: I
  alternatives:
  - am I
  - it is I
  lexicon: BDAG
  rationale: In English the copula is naturally absorbed into the question, yielding
    'Surely not I...?' This preserves the self-referential emphasis without awkwardness.
    The sense is equivalent to 'Am I...?' in context.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In Matthew's passion narrative,
    addressing Jesus as 'Lord' is both contextually appropriate and consistent with
    the translation's handling of the title.
