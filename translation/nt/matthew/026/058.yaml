id: MAT.26.58
reference: Matthew 26:58
source:
  edition: SBLGNT
  text: ὁ δὲ Πέτρος ἠκολούθει αὐτῷ ἀπὸ μακρόθεν ἕως τῆς αὐλῆς τοῦ ἀρχιερέως, καὶ εἰσελθὼν
    ἔσω ἐκάθητο μετὰ τῶν ὑπηρετῶν ἰδεῖν τὸ τέλος.
translation:
  text: But Peter was following him from a distance, as far as the courtyard of the
    high priest. And after going inside, he was sitting with the officers to see the
    outcome.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the servants,' 'with the attendants,' or 'with the guards'; the
      Greek ὑπηρέται can denote subordinate officials or attendants, and the exact
      nuance depends on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'to see the end.' The Greek τὸ τέλος can mean 'the end' more literally,
      but here likely refers to the outcome of what would happen to Jesus.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκολούθει
  chosen: was following
  alternatives:
  - followed
  lexicon: BDAG
  rationale: Imperfect tense suggests ongoing action in the background, so the progressive
    English form best reflects the aspect.
- source_word: ἀπὸ μακρόθεν
  chosen: from a distance
  alternatives:
  - from afar
  - at a distance
  lexicon: BDAG
  rationale: This is idiomatic modern English that preserves the sense of physical
    distance without archaic tone.
- source_word: ἕως τῆς αὐλῆς
  chosen: as far as the courtyard
  alternatives:
  - up to the courtyard
  - to the courtyard
  lexicon: BDAG
  rationale: ἕως marks extent, and 'as far as' makes the boundary sense explicit.
    αὐλή here refers to the enclosed court/courtyard area, not merely a house or palace.
- source_word: ἀρχιερέως
  chosen: the high priest
  alternatives:
  - the chief priest
  lexicon: BDAG
  rationale: Standard and contextually correct rendering for ἀρχιερεύς in the Gospel
    passion narrative.
- source_word: εἰσελθὼν ἔσω
  chosen: after going inside
  alternatives:
  - having gone in
  - entering within
  lexicon: BDAG
  rationale: The participle plus adverb indicates prior action before the main verb.
    'After going inside' is natural English and preserves the sequence.
- source_word: ἐκάθητο
  chosen: he was sitting
  alternatives:
  - he sat
  lexicon: BDAG
  rationale: The imperfect again suggests continued posture/action rather than a simple
    punctiliar event.
- source_word: μετὰ τῶν ὑπηρετῶν
  chosen: with the officers
  alternatives:
  - with the servants
  - with the attendants
  - with the guards
  lexicon: BDAG
  rationale: In this context ὑπηρέται refers to subordinate officials/attendants connected
    with the high priestly household and arrest scene, not domestic servants in a
    narrow sense. 'Officers' captures their functional role without over-specifying
    as armed guards.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to watch
  - to find out
  lexicon: BDAG
  rationale: The infinitive expresses purpose. 'To see' is the most direct rendering
    and leaves the nuance open.
- source_word: τὸ τέλος
  chosen: the outcome
  alternatives:
  - the end
  - how it would end
  lexicon: BDAG
  rationale: τέλος here refers to the result or outcome of the proceedings rather
    than merely a temporal endpoint. 'The outcome' communicates that sense clearly
    in modern English.
