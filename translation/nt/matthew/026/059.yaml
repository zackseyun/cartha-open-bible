theological_decisions:
- issue: Judicial nuance of the leaders' intent
  chosen_reading: The verse is rendered to show an ongoing search for false testimony
    with the purpose of securing Jesus' death.
  alternative_readings:
  - A more compressed rendering could say they 'sought false witness to put Jesus
    to death.'
  rationale: The Greek imperfect ἐζήτουν and purpose clause ὅπως...θανατώσωσιν together
    portray deliberate, ongoing judicial maneuvering. The translation preserves that
    narrative and moral force without adding doctrinal commentary.
  doctrine_reference: Translation philosophy §§1, 3, 6
