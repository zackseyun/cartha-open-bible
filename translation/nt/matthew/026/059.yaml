id: MAT.26.59
reference: Matthew 26:59
source:
  edition: SBLGNT
  text: οἱ δὲ ἀρχιερεῖς ⸀καὶ τὸ συνέδριον ὅλον ἐζήτουν ψευδομαρτυρίαν κατὰ τοῦ Ἰησοῦ
    ὅπως ⸂αὐτὸν θανατώσωσιν⸃,
translation:
  text: Now the chief priests and the whole council were seeking false testimony against
    Jesus so that they might put him to death,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'false witness.' The Greek term can refer either to false testimony or
      to false witness in a legal setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'the whole Sanhedrin.' The Greek term refers to the Jewish ruling council.
    reason: cultural_note
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - But
  lexicon: BDAG
  rationale: Rendered as a mild discourse transition in narrative context. 'Now' carries
    the forward movement without overstating contrast; 'but' would suggest a sharper
    adversative force than the context requires.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: Standard and contextually precise rendering for the plural referring
    to the senior priestly leadership, not a plurality of officeholders each serving
    as high priest simultaneously in the strictest sense.
- source_word: συνέδριον ὅλον
  chosen: the whole council
  alternatives:
  - the whole Sanhedrin
  - the entire council
  lexicon: BDAG
  rationale: Translated rather than transliterated in keeping with readability and
    because the term denotes the ruling council. 'Whole' reflects ὅλον, emphasizing
    the body as a whole. 'Sanhedrin' is a valid alternative but less transparent for
    general readers.
- source_word: ἐζήτουν
  chosen: were seeking
  alternatives:
  - were looking for
  - sought
  lexicon: BDAG
  rationale: Imperfect tense is represented with progressive aspect, indicating ongoing
    effort rather than a simple punctiliar action.
- source_word: ψευδομαρτυρίαν
  chosen: false testimony
  alternatives:
  - false witness
  - false evidence
  lexicon: BDAG
  rationale: The noun denotes false testimony/witness. 'False testimony' is clear
    modern English and fits the legal setting. 'False witness' is possible but can
    sound more like the person than the content of the testimony.
- source_word: κατὰ τοῦ Ἰησοῦ
  chosen: against Jesus
  alternatives:
  - against Jesus personally
  lexicon: BDAG
  rationale: κατά with the genitive here expresses opposition directed against Jesus
    in a judicial sense. Simple 'against Jesus' is idiomatic and sufficient.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - so they could
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' preserves the purposive force in natural
    English.
- source_word: θανατώσωσιν
  chosen: they might put him to death
  alternatives:
  - they might kill him
  - they might have him executed
  lexicon: BDAG
  rationale: This legal setting favors 'put him to death,' which preserves the formal/judicial
    tone better than the blunter 'kill him.' 'Have him executed' is interpretively
    possible but slightly more specific than the Greek wording itself.
