id: MAT.26.11
reference: Matthew 26:11
source:
  edition: SBLGNT
  text: πάντοτε γὰρ τοὺς πτωχοὺς ἔχετε μεθ’ ἑαυτῶν, ἐμὲ δὲ οὐ πάντοτε ἔχετε·
translation:
  text: For you always have the poor with you[a], but you do not always have me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'poor people.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  chosen: always
  alternatives:
  - continually
  lexicon: BDAG
  rationale: The adverb denotes continual or constant availability. 'Always' is the most natural modern English equivalent and preserves the repetition in the verse.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement. 'For' preserves the explanatory connection in a concise, standard English form.
- source_word: τοὺς πτωχοὺς
  chosen: the poor
  alternatives:
  - poor people
  lexicon: BDAG
  rationale: πτωχός here refers to poor persons collectively. 'The poor' is idiomatic English for the class of people in view and matches the generic plural force without unnecessary expansion.
- source_word: ἔχετε
  chosen: have
  alternatives:
  - keep
  - possess
  lexicon: BDAG
  rationale: ἔχω here expresses ongoing presence or availability rather than ownership. 'Have' is the straightforward idiomatic rendering in both clauses.
- source_word: μεθ’ ἑαυτῶν
  chosen: with you
  alternatives:
  - among you
  - with yourselves
  lexicon: BDAG
  rationale: The phrase indicates accompaniment/presence in relation to the disciples. 'With you' is natural English and avoids the awkwardly literal 'with yourselves' while preserving the sense.
- source_word: ἐμὲ
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus himself; 'me' is the plain and exact rendering.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - however
  lexicon: BDAG
  rationale: δέ marks contrast between the continual presence of the poor and the limited duration of Jesus' bodily presence. 'But' best conveys that contrast in English.
- source_word: οὐ πάντοτε
  chosen: do not always
  alternatives:
  - not always
  lexicon: BDAG
  rationale: The negated adverbial phrase contrasts with the first πάντοτε. Rendering it with auxiliary support ('do not always') produces clear, natural English while preserving the contrast.
