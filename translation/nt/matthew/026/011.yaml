theological_decisions:
- issue: Implication of Jesus' presence
  chosen_reading: The verse contrasts the ongoing presence of the poor with the temporary nature of Jesus' physical presence among the disciples.
  alternative_readings:
  - The verse is sometimes taken as minimizing care for the poor.
  rationale: The Greek makes a temporal contrast, not a moral devaluation of the poor. The wording should preserve Jesus' emphasis on the unique moment of his impending death without importing a dismissal of almsgiving or mercy.
  doctrine_reference: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.
