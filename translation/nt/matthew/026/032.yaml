id: MAT.26.32
reference: Matthew 26:32
source:
  edition: SBLGNT
  text: μετὰ δὲ τὸ ἐγερθῆναί με προάξω ὑμᾶς εἰς τὴν Γαλιλαίαν.
translation:
  text: But after I am raised, I will go ahead of you into Galilee.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''after I rise.'' The Greek more literally uses a passive form: ''after
      I am raised.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: μετὰ δὲ
  chosen: But after
  alternatives:
  - And after
  - But afterward
  lexicon: BDAG
  rationale: μετά with the articular infinitive expresses temporal sequence, 'after.'
    δέ is a mild connective that can be rendered 'but' here to preserve the slight
    contrast with the preceding prediction of stumbling/falling away.
- source_word: τὸ ἐγερθῆναί με
  chosen: I am raised
  alternatives:
  - I am raised up
  - I rise
  - my being raised
  lexicon: BDAG
  rationale: The articular aorist passive infinitive of ἐγείρω with accusative subject
    με means 'after I am raised.' The passive form is preserved rather than converting
    to the intransitive 'I rise,' since the Greek explicitly uses the passive and
    in resurrection contexts often implies divine agency without stating it.
- source_word: προάξω
  chosen: I will go ahead of
  alternatives:
  - I will go before
  - I will precede
  - I will lead the way before
  lexicon: BDAG
  rationale: προάγω here means to go before or ahead of someone. 'Go ahead of' is
    natural modern English and preserves the directional sense without overinterpreting
    it as formal leadership, though that nuance may be present.
- source_word: ὑμᾶς
  chosen: you
  lexicon: BDAG
  rationale: Second person plural object; English 'you' is number-neutral, and the
    plural is clear from context (Jesus addressing the disciples).
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: BDAG
  rationale: εἰς normally indicates movement into/toward. 'Into Galilee' is slightly
    more formally aligned with the Greek than the more idiomatic 'to Galilee,' while
    remaining natural in English.
