theological_decisions:
- issue: Resurrection wording in ἐγερθῆναί
  chosen_reading: Rendered as 'after I am raised' with passive force preserved.
  alternative_readings:
  - after I rise
  - after I have been raised
  rationale: The passive infinitive should be reflected in English to avoid obscuring
    the Greek form and its common resurrection idiom. This preserves the text's wording
    without importing further doctrinal explanation.
  doctrine_reference: 'Translation philosophy #1 and #3'
