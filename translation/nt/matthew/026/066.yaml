theological_decisions:
- issue: Judicial force of the council's verdict
  chosen_reading: He is deserving of death
  alternative_readings:
  - He is guilty of death
  - He is liable to death
  rationale: The verse records the council's condemnation of Jesus in legal terms. The translation should preserve the judicial nature of the statement without importing later theological interpretation about atonement or actual guilt before God. 'Deserving of death' reflects the council's verdict as stated in context.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
