id: MAT.26.66
reference: Matthew 26:66
source:
  edition: SBLGNT
  text: τί ὑμῖν δοκεῖ; οἱ δὲ ἀποκριθέντες εἶπαν· Ἔνοχος θανάτου ἐστίν.
translation:
  text: What do you think? They answered[a], “He is deserving of death.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “He is guilty of death” or “He is liable to death.” The Greek expression is a legal verdict.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ὑμῖν δοκεῖ
  chosen: What do you think?
  alternatives:
  - What seems right to you?
  - What is your judgment?
  lexicon: BDAG
  rationale: δοκέω with the dative ὑμῖν is an idiomatic way of asking for an opinion or judgment. 'What do you think?' is natural modern English and preserves the direct interrogative force without unnecessary formality.
- source_word: οἱ δὲ ἀποκριθέντες εἶπαν
  chosen: And they answered
  alternatives:
  - But they answered
  - And answering they said
  lexicon: BDAG
  rationale: The participle ἀποκριθέντες plus εἶπαν is a common Semitic-influenced narrative expression. In English it is best rendered with a finite verb, 'they answered.' δέ here is lightly connective; 'And' fits the narrative flow better than a stronger adversative.
- source_word: ἔνοχος
  chosen: deserving
  alternatives:
  - guilty
  - liable
  lexicon: BDAG
  rationale: ἔνοχος can mean 'liable,' 'answerable for,' or 'guilty of/deserving.' In the judicial setting with the genitive θανάτου, the sense is that Jesus is liable to or deserving of the death penalty. 'Deserving' communicates the verdict clearly in contemporary English. 'Guilty of death' is less idiomatic in English, and 'liable to death' is more formal/legal but less natural.
- source_word: θανάτου
  chosen: of death
  alternatives:
  - to death
  - the death penalty
  lexicon: BDAG
  rationale: The genitive with ἔνοχος expresses liability with respect to death. 'Of death' is retained within the phrase 'deserving of death' to preserve the compact judicial wording of the Greek while remaining idiomatic.
- source_word: ἐστίν
  chosen: He is
  lexicon: BDAG
  rationale: The explicit copula is preserved. English requires the subject pronoun for a complete sentence, and 'He is' makes the judicial declaration direct and clear.
