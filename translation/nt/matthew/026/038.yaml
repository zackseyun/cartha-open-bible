id: MAT.26.38
reference: Matthew 26:38
source:
  edition: SBLGNT
  text: τότε λέγει ⸀αὐτοῖς· Περίλυπός ἐστιν ἡ ψυχή μου ἕως θανάτου· μείνατε ὧδε καὶ
    γρηγορεῖτε μετ’ ἐμοῦ.
translation:
  text: Then he says to them, “My soul is deeply grieved, even to death. Remain here
    and keep watch with me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “very sorrowful,” “deeply sorrowful,” or “overwhelmed with sorrow.”
    reason: lexical_alternative
  - marker: b
    text: Or “to the point of death.”
    reason: lexical_alternative
  - marker: c
    text: Or “stay awake with me.” The Greek can carry both the sense of remaining
      awake and of watchful vigilance.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in sequence;
    'Then' is natural modern English and preserves narrative flow.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek uses the historical present. Rendering it as present ('he says')
    preserves the vividness of the narrative and is acceptable in English, though
    many translations smooth it to past tense.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative indirect object after λέγει; straightforwardly rendered 'to them.'
- source_word: Περίλυπός
  chosen: deeply grieved
  alternatives:
  - very sorrowful
  - overwhelmed with sorrow
  - deeply sorrowful
  lexicon: BDAG
  rationale: περίλυπος denotes intense sorrow or distress. 'Deeply grieved' communicates
    the emotional weight in clear modern English without sounding archaic. Alternatives
    are viable, especially 'very sorrowful,' but 'deeply grieved' is more idiomatic
    for contemporary readers.
- source_word: ἡ ψυχή μου
  chosen: My soul
  alternatives:
  - I
  - my inner self
  lexicon: BDAG
  rationale: ψυχή is retained as 'soul' rather than reduced to a mere pronoun, because
    the expression is idiomatic yet theologically and anthropologically weighty. It
    reflects Jesus' profound inner anguish without importing a technical anthropology
    beyond the text.
- source_word: ἕως θανάτου
  chosen: even to death
  alternatives:
  - to the point of death
  - unto death
  lexicon: BDAG
  rationale: 'This phrase expresses extremity: sorrow so intense that it reaches the
    point of death. ''Even to death'' is concise, natural, and preserves the force
    of the idiom.'
- source_word: μείνατε
  chosen: Remain
  alternatives:
  - Stay
  lexicon: BDAG
  rationale: Aorist imperative calling for the disciples to stay in that place. 'Remain'
    fits the solemn tone slightly better than the more casual 'stay,' while still
    being natural English.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: Simple adverb of place; 'here' is the natural equivalent.
- source_word: γρηγορεῖτε
  chosen: keep watch
  alternatives:
  - stay awake
  - be watchful
  - watch
  lexicon: BDAG
  rationale: γρηγορέω can mean to stay awake or to remain vigilant. In Gethsemane
    both senses are present, but 'keep watch' best captures the immediate context
    of alert, prayerful vigilance with Jesus. The alternative 'stay awake' is worth
    preserving because of the literal sense.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  lexicon: BDAG
  rationale: μετά with genitive indicates accompaniment; 'with me' is direct and natural.
