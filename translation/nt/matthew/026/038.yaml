theological_decisions:
- issue: Rendering ψυχή in Jesus' statement
  chosen_reading: My soul
  alternative_readings:
  - I am deeply grieved
  rationale: The translation preserves the explicit noun ψυχή rather than collapsing
    it into an English idiom with only the first-person subject. This maintains the
    text's wording and the depth of Jesus' inner anguish without forcing a more technical
    doctrinal claim about anthropology. It also coheres with Chalcedonian orthodoxy
    by allowing the full reality of Jesus' human emotional experience to stand as
    stated.
  doctrine_reference: 'Affirmations: Chalcedon (451 AD); Translation philosophy #1
    and #3'
- issue: Force of γρηγορεῖτε in context
  chosen_reading: keep watch
  alternative_readings:
  - stay awake
  rationale: The command likely includes literal wakefulness and spiritual vigilance.
    The main text uses 'keep watch' to preserve the broader force, while the more
    literal alternative is preserved in a footnote so the tension is not flattened.
  doctrine_reference: 'Translation philosophy #3'
