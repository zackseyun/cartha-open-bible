theological_decisions:
- issue: Rendering παραδῷ in the Judas context
  chosen_reading: hand him over
  alternative_readings:
  - betray him
  rationale: Although Judas's action is commonly described as betrayal, the Greek verb here is the broader παραδίδωμι. Following original-language primacy and avoiding unnecessary interpretive narrowing, the main text keeps the more literal 'hand him over,' while preserving 'betray him' as a lexical alternative in a footnote.
