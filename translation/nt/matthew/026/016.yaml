id: MAT.26.16
reference: Matthew 26:16
source:
  edition: SBLGNT
  text: καὶ ἀπὸ τότε ἐζήτει εὐκαιρίαν ἵνα αὐτὸν παραδῷ.
translation:
  text: And from then on he was seeking an opportunity to hand him over[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'betray him.' The Greek verb more literally means 'hand him over' or 'deliver him over.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τότε
  chosen: from then on
  alternatives:
  - from that time
  - from then
  lexicon: BDAG
  rationale: Captures the temporal sense idiomatically in modern English while preserving the ongoing point of commencement indicated by ἀπό + τότε.
- source_word: ἐζήτει
  chosen: was looking for
  alternatives:
  - sought
  - kept seeking
  - was seeking
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated action. 'Was looking for' communicates the durative sense more naturally than the more formal 'sought.'
- source_word: εὐκαιρίαν
  chosen: an opportunity
  alternatives:
  - a favorable opportunity
  - a suitable time
  lexicon: BDAG
  rationale: εὐκαιρία denotes a favorable or suitable occasion. 'An opportunity' is clear modern English; the favorable nuance is contextually implied by Judas seeking a moment to act.
- source_word: ἵνα
  chosen: to
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces purpose. English infinitive 'to' expresses that purpose naturally and concisely in this construction.
- source_word: παραδῷ
  chosen: hand him over
  alternatives:
  - betray him
  - deliver him over
  lexicon: BDAG
  rationale: παραδίδωμι literally means 'hand over/deliver over.' In the Judas context 'betray' is interpretively true, but 'hand him over' preserves the lexical sense and avoids importing a more specific gloss than the verb itself requires.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to Jesus in context.
