- issue: Moral force of παραδιδοὺς in reference to Judas
  chosen_reading: Rendered as 'the one betraying him'
  alternative_readings:
  - the one handing him over
  rationale: The narrative context of Judas's action in the passion account makes
    'betraying' the most contextually faithful rendering. This reflects the text's
    portrayal without adding doctrinal interpretation beyond the immediate context.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation
    tradition) and §6 (Readable modern English)
