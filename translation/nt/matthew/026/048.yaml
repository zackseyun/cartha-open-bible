id: MAT.26.48
reference: Matthew 26:48
source:
  edition: SBLGNT
  text: ὁ δὲ παραδιδοὺς αὐτὸν ἔδωκεν αὐτοῖς σημεῖον λέγων· Ὃν ἂν φιλήσω αὐτός ἐστιν·
    κρατήσατε αὐτόν.
translation:
  text: Now the one betraying him had given them a sign, saying, “The one I kiss is
    he; seize him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the one handing him over.” The Greek verb can mean “hand over,” but
      in this context it refers to Judas’s betrayal.
    reason: lexical_alternative
  - marker: b
    text: Or “signal.”
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδιδοὺς
  chosen: betraying
  alternatives:
  - handing over
  lexicon: BDAG
  rationale: In the passion context, παραδίδωμι refers specifically to Judas's act
    of betrayal, not merely a neutral 'handing over.' 'Betraying' communicates the
    moral force recognized in context while remaining idiomatic English.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - signal
  lexicon: BDAG
  rationale: σημεῖον can mean 'sign' or 'signal.' Here Judas gives an identifying
    token to the arresting party. 'Sign' is slightly more literal and natural, while
    the context makes clear it functions as a prearranged signal.
- source_word: Ὃν ἂν φιλήσω
  chosen: The one I kiss
  alternatives:
  - Whomever I kiss
  - The man I kiss
  lexicon: BDAG
  rationale: The construction with ἄν and the aorist subjunctive expresses an indefinite
    relative clause. 'The one I kiss' is natural English and preserves the identifying
    force. 'Whomever I kiss' is possible but less smooth in contemporary style.
- source_word: φιλήσω
  chosen: kiss
  alternatives:
  - greet with a kiss
  lexicon: BDAG
  rationale: φιλέω here denotes the act of kissing as the identifying gesture. 'Kiss'
    is sufficient in context; adding 'greet with a kiss' would over-specify what the
    Greek leaves implicit.
- source_word: αὐτός ἐστιν
  chosen: is he
  alternatives:
  - is the one
  - that's him
  lexicon: BDAG
  rationale: The expression identifies Jesus succinctly. 'Is he' preserves the compactness
    and emphasis of the Greek better than the more colloquial 'that's him,' while
    remaining understandable.
- source_word: κρατήσατε
  chosen: seize
  alternatives:
  - arrest
  - take hold of
  lexicon: BDAG
  rationale: κρατέω means to grasp or take hold of firmly. In this arrest context,
    'seize' best captures both the physical force and the legal-hostile setting without
    importing a more formal procedural term like 'arrest' that is not explicit in
    the verb itself.
