id: MAT.26.30
reference: Matthew 26:30
source:
  edition: SBLGNT
  text: καὶ ὑμνήσαντες ἐξῆλθον εἰς τὸ Ὄρος τῶν Ἐλαιῶν.
translation:
  text: And after singing a hymn, they went out to the Mount of Olives.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after singing praise.' The Greek verb can refer generally to singing
      praise, though 'singing a hymn' fits the immediate meal setting and common usage.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμνήσαντες
  chosen: after singing a hymn
  alternatives:
  - having sung
  - after singing praise
  lexicon: BDAG
  rationale: Aorist active participle of ὑμνέω, referring to singing praise/hymns.
    'After singing a hymn' is natural modern English and captures the participial
    action antecedent to the main verb. The singular 'a hymn' reflects idiomatic English
    for the likely Passover hymn(s), while preserving the sense of hymn-singing.
- source_word: ἐξῆλθον
  chosen: they went out
  alternatives:
  - they departed
  - they went forth
  lexicon: BDAG
  rationale: Aorist indicative of ἐξέρχομαι, straightforwardly meaning 'go out' or
    'depart.' 'They went out' is the most direct and idiomatic rendering in context.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  chosen: to the Mount of Olives
  alternatives:
  - to the hill of olives
  lexicon: BDAG
  rationale: Standard geographic designation. ὄρος is 'mount/mountain,' and τῶν Ἐλαιῶν
    is a genitive 'of olives/olive trees.' 'Mount of Olives' is the established and
    accurate English place name, preserving the toponym rather than rendering it descriptively.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Simple connective linking this action to the preceding narrative. 'And'
    preserves the Greek coordination without adding temporal nuance beyond what the
    context already supplies.
