id: MAT.26.56
reference: Matthew 26:56
source:
  edition: SBLGNT
  text: τοῦτο δὲ ὅλον γέγονεν ἵνα πληρωθῶσιν αἱ γραφαὶ τῶν προφητῶν. τότε οἱ μαθηταὶ πάντες ἀφέντες αὐτὸν ἔφυγον.
translation:
  text: But all this has happened so that the Scriptures of the prophets might be fulfilled[a]. Then all the disciples left him and fled.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having abandoned him'; the participle ἀφέντες can carry the stronger sense of desertion in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δὲ ὅλον
  chosen: But all this
  alternatives:
  - Now all this
  - But this whole thing
  lexicon: BDAG
  rationale: τοῦτο with ὅλον functions idiomatically to refer to the entire preceding event or situation. 'But all this' is natural English and preserves δέ as a mild connective/adversative.
- source_word: γέγονεν
  chosen: has happened
  alternatives:
  - has come about
  - has taken place
  lexicon: BDAG
  rationale: Perfect tense of γίνομαι indicates a present state resulting from the event; 'has happened' is idiomatic and preserves the completed action with present relevance better than a simple past.
- source_word: ἵνα πληρωθῶσιν
  chosen: so that ... might be fulfilled
  alternatives:
  - in order that ... may be fulfilled
  lexicon: BDAG
  rationale: This standard purpose/result construction is well represented by 'so that ... might be fulfilled,' which is both readable and faithful to the subjunctive force.
- source_word: αἱ γραφαὶ
  chosen: the Scriptures
  alternatives:
  - the writings
  - the scriptural writings
  lexicon: BDAG
  rationale: In this context γραφαί refers to sacred writings, not merely writings in general. 'The Scriptures' is the established and accurate sense.
- source_word: τῶν προφητῶν
  chosen: of the prophets
  alternatives:
  - spoken by the prophets
  - written by the prophets
  lexicon: BDAG
  rationale: The genitive is best left concise as 'of the prophets.' Expanding to 'spoken by' or 'written by' would interpret beyond the Greek.
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: τότε marks the next event in sequence. 'Then' is the most natural narrative connector.
- source_word: οἱ μαθηταὶ πάντες
  chosen: all the disciples
  alternatives:
  - the disciples, all of them
  - all his disciples
  lexicon: BDAG
  rationale: πάντες modifies οἱ μαθηταί emphatically. 'All the disciples' preserves the totality without adding 'his,' which is implied by context but not explicit.
- source_word: ἀφέντες αὐτὸν
  chosen: left him
  alternatives:
  - having abandoned him
  - forsaking him
  lexicon: BDAG
  rationale: The participle from ἀφίημι here means leaving behind or abandoning. 'Left him' is concise and natural in English; the stronger nuance 'abandoned' is possible but the following 'fled' already conveys the force of desertion.
- source_word: ἔφυγον
  chosen: fled
  alternatives:
  - ran away
  - escaped
  lexicon: BDAG
  rationale: ἔφυγον straightforwardly means 'fled.' This is more precise and weighty than the more colloquial 'ran away.'
