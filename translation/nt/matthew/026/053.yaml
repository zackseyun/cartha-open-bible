id: MAT.26.53
reference: Matthew 26:53
source:
  edition: SBLGNT
  text: ἢ δοκεῖς ὅτι οὐ ⸀δύναμαι παρακαλέσαι τὸν πατέρα μου, καὶ παραστήσει μοι ⸂ἄρτι πλείω⸃ δώδεκα λεγιῶνας ἀγγέλων;
translation:
  text: Or do you think that I cannot appeal to my Father[c][b][a], and he will at once place at my disposal more than twelve legions of angels?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'call upon' or 'ask my Father.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'he will place beside me'; that is, make available for my aid.
    reason: lexical_alternative
  - marker: c
    text: A Roman legion was a large military unit; the expression emphasizes an overwhelming heavenly force.
    reason: cultural_note
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  - Do you think then that
  lexicon: BDAG
  rationale: Introduces an alternative challenge in Jesus' rebuke; simple 'Or' preserves the rhetorical flow.
- source_word: δοκεῖς
  chosen: do you think
  alternatives:
  - do you suppose
  - does it seem to you
  lexicon: BDAG
  rationale: Idiomatic present question in English; 'do you think' best captures the direct rhetorical force.
- source_word: οὐ δύναμαι
  chosen: I cannot
  alternatives:
  - I am not able
  - I do not have the power
  lexicon: BDAG
  rationale: The negated verb expresses ability. 'I cannot' is natural English and preserves the sense of capability, not permission.
- source_word: παρακαλέσαι
  chosen: appeal to
  alternatives:
  - call upon
  - ask
  - entreat
  lexicon: BDAG
  rationale: In this context Jesus speaks of making an urgent request to the Father for aid. 'Appeal to' preserves both the relational and petitionary sense better than the weaker 'ask' and avoids over-formal 'entreat'.
- source_word: τὸν πατέρα μου
  chosen: my Father
  alternatives:
  - my father
  lexicon: BDAG
  rationale: Capitalized 'Father' reflects a direct divine filial reference in English Bible style without adding content beyond the Greek.
- source_word: παραστήσει μοι
  chosen: he will place at my disposal
  alternatives:
  - he will provide me with
  - he will send me
  - he will present to me
  lexicon: BDAG
  rationale: παρίστημι here conveys making something available or placing it beside someone for service. 'Place at my disposal' captures the sense of immediate availability for aid more precisely than simply 'send'.
- source_word: ἄρτι
  chosen: at once
  alternatives:
  - now
  - immediately
  - right now
  lexicon: BDAG
  rationale: Conveys immediacy in context. 'At once' is natural and fits the rhetorical point that divine aid is instantly available.
- source_word: πλείω δώδεκα
  chosen: more than twelve
  alternatives:
  - more than twelve full
  - greater than twelve
  lexicon: BDAG
  rationale: Comparative adjective with numeral means a quantity exceeding twelve. The straightforward English rendering is best.
- source_word: λεγιῶνας
  chosen: legions
  alternatives:
  - army divisions
  lexicon: BDAG
  rationale: The military term is well established in English and preserves the Roman military imagery of a very large force.
- source_word: ἀγγέλων
  chosen: of angels
  alternatives:
  - of messengers
  lexicon: BDAG
  rationale: In this context heavenly beings are clearly intended, not human messengers.
