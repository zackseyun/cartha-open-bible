theological_decisions:
- issue: Whether Jesus' statement should be rendered as inability, permission, or willingness regarding divine aid
  chosen_reading: 'Rendered as ability: ''I cannot appeal to my Father'''
  alternative_readings:
  - '''I am not able to call on my Father'''
  - A looser rendering implying unwillingness rather than ability
  rationale: δύναμαι denotes ability/power. The verse emphasizes that Jesus is fully able to summon overwhelming heavenly aid, underscoring that his arrest is not due to helplessness. The translation preserves that theological tension without expanding into doctrinal explanation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
