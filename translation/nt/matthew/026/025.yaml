theological_decisions:
- issue: Force of Jesus's reply Σὺ εἶπας
  chosen_reading: An indirect affirmation of Judas's role as the betrayer
  alternative_readings:
  - A merely evasive response without affirmation
  rationale: In context, Jesus's reply functions as confirmation without restating
    the accusation directly. The translation 'You have said so' preserves that tension
    rather than over-resolving it into a blunt 'Yes.'
  doctrine_reference: Preserve theological tension rather than resolve it.
