id: MAT.26.25
reference: Matthew 26:25
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ Ἰούδας ὁ παραδιδοὺς αὐτὸν εἶπεν· Μήτι ἐγώ εἰμι, ῥαββί; λέγει
    αὐτῷ· Σὺ εἶπας.
translation:
  text: Then Judas, the one betraying him, answered and said, “Surely I am not the
    one, Rabbi?” He said to him, “You have said so.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Am I not the one, Rabbi?” The Greek question uses a
      particle that expects a negative answer.
    reason: lexical_alternative
  - marker: b
    text: Or, “You said it.” Jesus' reply is an indirect affirmation.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically with
    a following speech verb in narrative. 'Answered' preserves the conventional responsive
    sense without awkwardness.
- source_word: δὲ
  chosen: Then
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'Then'
    gives natural English flow while preserving the discourse movement.
- source_word: Ἰούδας
  chosen: Judas
  rationale: Personal name is transliterated by standard English convention, in keeping
    with the translation philosophy.
- source_word: ὁ παραδιδοὺς αὐτὸν
  chosen: the one betraying him
  alternatives:
  - his betrayer
  - the one handing him over
  lexicon: BDAG
  rationale: παραδίδωμι can mean 'hand over, deliver up, betray.' In the passion context,
    'betraying' is the clearest idiomatic English. Rendering the participial phrase
    as 'the one betraying him' preserves the Greek's appositional, ongoing characterization
    more closely than the more compressed 'his betrayer.'
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω in this context.
- source_word: Μήτι
  chosen: Surely ... not
  alternatives:
  - it is not ... is it?
  - I am not ... am I?
  lexicon: BDAG
  rationale: μήτι introduces a question expecting a negative answer. 'Surely I am
    not the one' captures both the interrogative force and the expectation embedded
    in the particle.
- source_word: ἐγώ εἰμι
  chosen: I am
  alternatives:
  - am I
  lexicon: BDAG
  rationale: With μήτι, the clause forms the substance of Judas's question. English
    requires reshaping the word order to express the negative-expectation question
    naturally.
- source_word: ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: The vocative ῥαββί is best retained as 'Rabbi' rather than translated,
    since it functions as a recognized Jewish form of address and preserves the historical
    setting. 'Teacher' is a possible sense but loses the specific Semitic title used
    here.
- source_word: λέγει αὐτῷ
  chosen: He said to him
  alternatives:
  - Jesus said to him
  - he tells him
  lexicon: BDAG
  rationale: The historical present λέγει is commonly rendered with simple past in
    English narrative for readability. The subject is implicit from context; 'He said
    to him' is sufficient and avoids adding a name not present in the Greek.
- source_word: Σὺ εἶπας
  chosen: You have said so
  alternatives:
  - You said it
  - You yourself said it
  lexicon: BDAG
  rationale: This idiom is an affirming but somewhat indirect response. 'You have
    said so' preserves the measured force better than the more colloquial 'You said
    it,' while still communicating that Jesus confirms Judas's implication.
