theological_decisions:
- issue: Rendering Judas's greeting Χαῖρε
  chosen_reading: Greetings
  alternative_readings:
  - Hail
  rationale: The term is a conventional greeting, not a theological acclamation in
    this context. 'Greetings' preserves the ordinary social form while allowing the
    irony of Judas's betrayal to emerge from the narrative rather than from archaic
    diction.
  doctrine_reference: Translation philosophy §6 (Readable modern English, not archaic
    or academic)
- issue: Rendering the force of κατεφίλησεν
  chosen_reading: kissed
  alternative_readings:
  - kissed him fervently
  - kissed him repeatedly
  rationale: The intensified verb may suggest an emphatic or repeated kiss, but English
    style normally leaves that nuance implicit unless context requires explicit expansion.
    To avoid over-paraphrase, the main text keeps 'kissed,' with the fuller nuance
    preserved in a footnote.
  doctrine_reference: Translation philosophy §1 and §5 (original-language primacy;
    consistency with documented exception)
