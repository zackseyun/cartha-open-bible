id: MAT.26.49
reference: Matthew 26:49
source:
  edition: SBLGNT
  text: καὶ εὐθέως προσελθὼν τῷ Ἰησοῦ εἶπεν· Χαῖρε, ῥαββί· καὶ κατεφίλησεν αὐτόν.
translation:
  text: And immediately he came up to Jesus and said, “Greetings, Rabbi,” and kissed
    him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Hail, Rabbi.”
    reason: lexical_alternative
  - marker: b
    text: 'The verb can imply an emphatic or repeated kiss: “kissed him fervently”
      or “kissed him repeatedly.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  chosen: immediately
  alternatives:
  - at once
  - straightway
  lexicon: BDAG
  rationale: Conveys the adverb's sense of promptness without archaic tone. 'Immediately'
    is natural modern English and preserves the narrative urgency.
- source_word: προσελθὼν
  chosen: he came up to
  alternatives:
  - approaching
  - having come to
  - coming up to
  lexicon: BDAG
  rationale: The aorist participle of προσέρχομαι indicates approaching or coming
    near. 'He came up to' fits idiomatic English in sequence with the main verb and
    preserves the physical movement toward Jesus.
- source_word: τῷ Ἰησοῦ
  chosen: to Jesus
  alternatives:
  - toward Jesus
  lexicon: BDAG
  rationale: Dative object after προσέρχομαι is naturally rendered 'to Jesus' in English.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: Simple narrative speech verb; no need to expand beyond the Greek.
- source_word: Χαῖρε
  chosen: Greetings
  alternatives:
  - Hail
  - Rejoice
  - Hello
  lexicon: BDAG
  rationale: As a conventional greeting, χαῖρε is best rendered 'Greetings' in readable
    modern English. 'Hail' is traditional but archaic and can sound overly formal;
    'Hello' is too casual for the register.
- source_word: ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: The Greek preserves the Semitic title by transliteration, and the translation
    philosophy favors transliterating names while preserving meaningful titles where
    appropriate. Here 'Rabbi' is a recognized form in English and reflects Judas's
    address without interpretive flattening.
- source_word: κατεφίλησεν
  chosen: kissed
  alternatives:
  - kissed fervently
  - kissed repeatedly
  - embraced with kisses
  lexicon: BDAG
  rationale: καταφιλέω can intensify φιλέω, suggesting an emphatic or demonstrative
    kiss. In this context, standard English 'kissed' is sufficient in the main text
    for readability, while the intensified nuance is worth preserving in a footnote.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to Jesus.
