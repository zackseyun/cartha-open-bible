id: MAT.26.10
reference: Matthew 26:10
source:
  edition: SBLGNT
  text: γνοὺς δὲ ὁ Ἰησοῦς εἶπεν αὐτοῖς· Τί κόπους παρέχετε τῇ γυναικί; ἔργον γὰρ καλὸν ἠργάσατο εἰς ἐμέ·
translation:
  text: But Jesus[a], knowing this, said to them[b], “Why are you causing trouble for the woman? For she has done a beautiful work to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Why do you trouble the woman?”
    reason: lexical_alternative
  - marker: b
    text: Or “For she has done a good work for me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  chosen: knowing this
  alternatives:
  - aware of this
  - knowing
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω, functioning circumstantially before the main verb. 'Knowing this' makes explicit the implied object from context (their criticism) in natural English without over-paraphrasing.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the shift from the disciples' complaint to Jesus' corrective response.
- source_word: Τί κόπους παρέχετε
  chosen: Why are you causing trouble
  alternatives:
  - Why do you trouble
  - Why are you bothering
  - Why do you cause distress
  lexicon: BDAG
  rationale: The idiom combines κόπους ('troubles, burdens') with παρέχω ('cause, provide'), yielding the sense of causing difficulty or distress. 'Why are you causing trouble' is idiomatic modern English while preserving the rebuking force.
- source_word: τῇ γυναικί
  chosen: for the woman
  alternatives:
  - to the woman
  lexicon: BDAG
  rationale: Dative after παρέχω can be rendered with 'for' or 'to'; 'for the woman' reads more naturally in English with 'causing trouble' while preserving the affected person.
- source_word: ἔργον καλὸν
  chosen: a beautiful work
  alternatives:
  - a good work
  - a noble deed
  - a fine deed
  lexicon: BDAG
  rationale: καλός here carries not merely moral goodness but also nobility/fitting beauty. 'Beautiful work' preserves the commendatory force in context of her anointing act better than the flatter 'good work.'
- source_word: ἠργάσατο
  chosen: has done
  alternatives:
  - did
  - has worked
  lexicon: BDAG
  rationale: English present perfect can naturally render the completed act with present relevance in this discourse context. 'Has done' is idiomatic with 'work/deed.'
- source_word: εἰς ἐμέ
  chosen: to me
  alternatives:
  - for me
  - toward me
  lexicon: BDAG
  rationale: εἰς with persons can indicate direction toward or relation to someone. 'To me' is a close, natural rendering here, though 'for me' is also possible and worth preserving in a footnote because it can emphasize benefit rather than direction.
