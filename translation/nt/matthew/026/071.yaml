id: MAT.26.71
reference: Matthew 26:71
source:
  edition: SBLGNT
  text: ἐξελθόντα ⸀δὲ εἰς τὸν πυλῶνα εἶδεν αὐτὸν ἄλλη καὶ λέγει ⸀τοῖς ἐκεῖ· ⸀Οὗτος ἦν μετὰ Ἰησοῦ τοῦ Ναζωραίου·
translation:
  text: But when he had gone out to the gateway[a], another woman saw him and said to those there, “This man was with Jesus the Nazarene.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “This one was with Jesus of Nazareth.” The Greek reads “Jesus the Nazarene.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντα
  chosen: when he had gone out
  alternatives:
  - after he went out
  - as he was going out
  lexicon: BDAG
  rationale: Aorist active participle, accusative masculine singular, agreeing with the understood object αὐτόν/Peter. Rendered temporally in smooth English as 'when he had gone out,' preserving antecedent action relative to the main verb.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks narrative progression with mild contrast from the previous denial scene. 'But' preserves the slight turn in the narrative better than a simple 'and.'
- source_word: πυλῶνα
  chosen: gateway
  alternatives:
  - gatehouse
  - porch
  - entryway
  lexicon: BDAG
  rationale: πυλών refers to a gate or gateway area rather than merely a door. 'Gateway' is natural modern English and fits the courtyard setting.
- source_word: ἄλλη
  chosen: another woman
  alternatives:
  - another servant girl
  - another
  lexicon: BDAG
  rationale: 'The feminine adjective functions substantivally: ''another [woman/girl].'' Because the noun is not explicit here, ''woman'' is the least interpretively loaded supplied term. ''Servant girl'' reflects harmonization with nearby parallels more than this verse alone warrants.'
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - is saying
  lexicon: BDAG
  rationale: Present tense in narrative is a historical present. Rendering it as 'says' preserves the vividness of Matthew's Greek; English can naturally sustain the shift here.
- source_word: τοῖς ἐκεῖ
  chosen: to those there
  alternatives:
  - to the people there
  - to those standing there
  lexicon: BDAG
  rationale: The phrase is elliptical but clearly refers to persons present at that location. 'Those there' is concise and faithful without over-specifying.
- source_word: Οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: Demonstrative used of a male person. 'This man' is idiomatic English and preserves the accusatory force better than the less natural 'this one.'
- source_word: μετὰ
  chosen: with
  alternatives:
  - in company with
  lexicon: BDAG
  rationale: Simple associative sense with the genitive; 'with' is the direct and natural rendering.
- source_word: τοῦ Ναζωραίου
  chosen: the Nazarene
  alternatives:
  - the Nazarene one
  - of Nazareth
  lexicon: BDAG
  rationale: Ναζωραῖος is an appellation/title-like ethnic or geographic designation. 'The Nazarene' is the most direct rendering of the Greek form; 'of Nazareth' would reflect a different expression.
