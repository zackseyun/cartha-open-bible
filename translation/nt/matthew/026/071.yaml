theological_decisions:
- issue: Rendering the designation Ναζωραῖος for Jesus
  chosen_reading: the Nazarene
  alternative_readings:
  - of Nazareth
  rationale: The Greek uses the substantive designation Ναζωραῖος, not the prepositional phrase 'from Nazareth.' Translating it as 'the Nazarene' preserves the form of the accusation and avoids flattening the wording into a more familiar but less precise expression.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Translate titles; transliterate names.'
