id: MAT.26.34
reference: Matthew 26:34
source:
  edition: SBLGNT
  text: ἔφη αὐτῷ ὁ Ἰησοῦς· Ἀμὴν λέγω σοι ὅτι ἐν ταύτῃ τῇ νυκτὶ πρὶν ἀλέκτορα φωνῆσαι τρὶς ἀπαρνήσῃ με.
translation:
  text: Jesus said to him[a], “Truly I tell you, this very night, before a rooster crows[b], you will deny me three times.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or “tonight.” Greek: “in this night,” with emphasis from “this.”'
    reason: lexical_alternative
  - marker: b
    text: Or “before the rooster crows.” The Greek does not require the English article here.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - told
  - declared
  lexicon: BDAG
  rationale: A simple past speech verb is most natural here. 'Said' fits standard narrative English without overstating the force.
- source_word: Ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  - I assure you
  lexicon: BDAG
  rationale: In the Synoptics, ἀμήν introducing a saying functions as a solemn affirmation. 'Truly' preserves the weight without leaving the untranslated Hebrew form in the main text.
- source_word: λέγω σοι
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: '''I tell you'' is idiomatic modern English while preserving the direct personal address. ''I say to you'' is more formal but less natural.'
- source_word: ἐν ταύτῃ τῇ νυκτί
  chosen: in this very night
  alternatives:
  - this night
  - tonight
  - during this night
  lexicon: BDAG
  rationale: The Greek is literally 'in this night,' with ταύτῃ adding demonstrative emphasis. 'In this very night' preserves that emphasis more closely than the smoother 'tonight,' though the latter is possible.
- source_word: πρὶν ἀλέκτορα φωνῆσαι
  chosen: before a rooster crows
  alternatives:
  - before the rooster crows
  - before rooster-crow
  lexicon: BDAG
  rationale: This infinitival construction is naturally rendered with a finite clause in English. The anarthrous ἀλέκτορα does not require 'the' in English, so 'a rooster crows' is a straightforward rendering.
- source_word: τρὶς
  chosen: three times
  alternatives:
  - thrice
  lexicon: BDAG
  rationale: '''Three times'' is clear modern English; ''thrice'' is archaic.'
- source_word: ἀπαρνήσῃ
  chosen: you will deny
  alternatives:
  - you will disown
  - you will repudiate
  lexicon: BDAG
  rationale: The future middle indicates Peter's coming act of denial. 'Deny' is the standard and clearest rendering in this context; 'disown' is possible but slightly more interpretive.
- source_word: με
  chosen: me
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus; no special nuance requires expansion.
