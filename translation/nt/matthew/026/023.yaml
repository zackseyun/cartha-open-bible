theological_decisions:
- issue: Rendering παραδίδωμι in the Judas context
  chosen_reading: will betray
  alternative_readings:
  - will hand over
  rationale: The verb can mean 'hand over/deliver up,' but here the narrative and relational context make the treacherous sense primary. Using 'betray' reflects the contextual meaning without importing extra doctrine. The more literal alternative is preserved in a footnote for auditability.
