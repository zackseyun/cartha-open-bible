id: MAT.26.23
reference: Matthew 26:23
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν· Ὁ ἐμβάψας μετ’ ἐμοῦ ⸂τὴν χεῖρα ἐν τῷ τρυβλίῳ⸃ οὗτός με παραδώσει·
translation:
  text: He answered[b][a], “The one who dipped his hand with me in the bowl—this one will betray me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the dish.”
    reason: lexical_alternative
  - marker: b
    text: Or “will hand me over.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: He answered
  alternatives:
  - He answered and said
  - In reply he said
  lexicon: BDAG
  rationale: This participle + finite verb is a common Semitic-influenced Greek expression meaning simply 'answered' or 'replied.' Rendering both verbs woodenly in English is unnecessary; 'He answered' preserves the sense in natural modern English.
- source_word: ἐμβάψας
  chosen: dipped
  alternatives:
  - having dipped
  - dips
  lexicon: BDAG
  rationale: Aorist participle referring to the completed identifying action. 'Dipped' is the plain lexical sense and fits idiomatic English in this context.
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - together with me
  lexicon: BDAG
  rationale: Standard rendering of μετά with the genitive indicating accompaniment.
- source_word: τὴν χεῖρα
  chosen: his hand
  alternatives:
  - the hand
  - a hand
  lexicon: BDAG
  rationale: Greek often uses the article where English prefers a possessive for body parts. 'His hand' is the natural English equivalent and makes explicit that the subject's own hand is meant.
- source_word: ἐν τῷ τρυβλίῳ
  chosen: in the bowl
  alternatives:
  - in the dish
  - in the serving bowl
  lexicon: BDAG
  rationale: τρύβλιον denotes a dish or bowl used for food. 'Bowl' is clear modern English; 'dish' is possible and preserved in a footnote as a lexical alternative.
- source_word: οὗτός
  chosen: this one
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: The demonstrative is emphatic. 'This one' preserves the force better than a simple pronoun, while still sounding natural in direct speech.
- source_word: παραδώσει
  chosen: will betray
  alternatives:
  - will hand over
  lexicon: BDAG
  rationale: In the passion context, παραδίδωμι refers specifically to Judas's treacherous handing Jesus over. 'Will betray' communicates the contextual force more clearly than the more general 'hand over,' which is preserved in a footnote.
