id: MAT.26.5
reference: Matthew 26:5
source:
  edition: SBLGNT
  text: ἔλεγον δέ· Μὴ ἐν τῇ ἑορτῇ, ἵνα μὴ θόρυβος γένηται ἐν τῷ λαῷ.
translation:
  text: But they were saying[a], “Not during the feast[b], lest there be an uproar among the people.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “during the festival.” The Greek ἑορτή can be rendered either “feast” or “festival” in this context.
    reason: lexical_alternative
  - marker: b
    text: Or “lest there be a disturbance” or “lest a riot arise among the people.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  chosen: they were saying
  alternatives:
  - they said
  lexicon: BDAG
  rationale: Imperfect tense indicates ongoing or repeated speech in deliberation; 'they were saying' preserves that aspect better than simple past.
- source_word: δέ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or development from the previous verse; 'But' fits the narrative turn to their caution.
- source_word: Μὴ
  chosen: Not
  alternatives:
  - 'No'
  lexicon: BDAG
  rationale: 'Used elliptically with the prepositional phrase to express a prohibition or decision: ''Not during...'' is natural and close to the Greek.'
- source_word: ἐν τῇ ἑορτῇ
  chosen: during the feast
  alternatives:
  - at the feast
  - during the festival
  lexicon: BDAG
  rationale: ἐν with the dative here is temporal, meaning 'during.' ἑορτή can be 'feast' or 'festival'; 'feast' is concise and idiomatic in this Passover context.
- source_word: ἵνα μὴ
  chosen: lest
  alternatives:
  - so that not
  - in order that not
  lexicon: BDAG
  rationale: Introduces intended avoidance; 'lest' is the most compact natural English equivalent without losing the purposive nuance.
- source_word: θόρυβος
  chosen: an uproar
  alternatives:
  - a riot
  - a disturbance
  - a commotion
  lexicon: BDAG
  rationale: The term denotes public tumult or disorder. 'Uproar' captures the threat of crowd unrest without overstating it to a full-scale 'riot'.
- source_word: γένηται
  chosen: there be
  alternatives:
  - arise
  - occur
  - happen
  lexicon: BDAG
  rationale: With θόρυβος as subject, γίνομαι means 'come to be/occur.' English existential 'there be' is the most natural rendering in this construction.
- source_word: ἐν τῷ λαῷ
  chosen: among the people
  alternatives:
  - among the crowd
  - among the populace
  - in the people
  lexicon: BDAG
  rationale: λαός here refers to the gathered people/populace. 'Among the people' is idiomatic and preserves the social setting better than the more wooden 'in the people.'
