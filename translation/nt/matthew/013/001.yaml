id: MAT.13.1
reference: Matthew 13:1
source:
  edition: SBLGNT
  text: ⸀Ἐν τῇ ἡμέρᾳ ἐκείνῃ ἐξελθὼν ὁ Ἰησοῦς ⸀τῆς οἰκίας ἐκάθητο παρὰ τὴν θάλασσαν·
translation:
  text: On that day Jesus went out of the house and sat beside the sea[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'That same day,' if the phrase is taken to emphasize continuity with the preceding context rather than simply marking time.
    reason: alternative_reading
  - marker: b
    text: Or 'by the sea.' The Greek expression denotes a position near the sea without specifying the exact distance from the shoreline.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν τῇ ἡμέρᾳ ἐκείνῃ
  chosen: On that day
  alternatives:
  - In that day
  - That same day
  lexicon: BDAG
  rationale: The prepositional phrase is a common temporal expression. 'On that day' is idiomatic modern English and preserves the temporal reference without unnecessary stiffness. 'That same day' is possible contextually, but the Greek does not explicitly add 'same.'
- source_word: ἐξελθὼν
  chosen: went out
  alternatives:
  - having gone out
  - after going out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, functioning adverbially before the main verb. In English, finite coordination is more natural than a wooden participial construction here. 'Went out' preserves the movement sense without overformalizing.
- source_word: τῆς οἰκίας
  chosen: of the house
  alternatives:
  - from the house
  - out of the house
  lexicon: BDAG
  rationale: With ἐξέρχομαι, the genitive marks the place exited. In idiomatic English, the sense is best carried together with the verb as 'went out of the house.' The lexical content of οἰκία is therefore represented in the combined phrase rather than isolated as a separate wooden gloss.
- source_word: ἐκάθητο
  chosen: was sitting
  alternatives:
  - sat
  - took his seat
  lexicon: BDAG
  rationale: Imperfect middle/passive in form, here intransitive with imperfective aspect. 'Was sitting' preserves the ongoing scene-setting force better than the simple past 'sat,' though 'sat' is possible. 'Took his seat' overinterprets ingressiveness not required by the form.
- source_word: παρὰ τὴν θάλασσαν
  chosen: beside the sea
  alternatives:
  - by the sea
  - along the seashore
  lexicon: BDAG
  rationale: παρά with the accusative here indicates position near the sea. 'Beside the sea' is clear and fairly literal. 'By the sea' is also good English; 'along the seashore' is more specific than the Greek and is therefore avoided.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: 'Personal name transliterated according to the project''s policy: translate titles, transliterate names.'
