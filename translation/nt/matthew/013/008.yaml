id: MAT.13.8
reference: Matthew 13:8
source:
  edition: SBLGNT
  text: ἄλλα δὲ ἔπεσεν ἐπὶ τὴν γῆν τὴν καλὴν καὶ ἐδίδου καρπόν, ὃ μὲν ἑκατὸν ὃ δὲ ἑξήκοντα ὃ δὲ τριάκοντα.
translation:
  text: But other seed fell on the good soil and was producing fruit—one a hundredfold, another sixty, and another thirty.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'yielded fruit, some a hundredfold, some sixty, some thirty.' The Greek distributive expression can be represented either with 'one...another...another' or with 'some...some...some.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα
  chosen: other seed
  alternatives:
  - others
  - other seeds
  lexicon: BDAG
  rationale: Neuter plural adjective used substantivally in the parable context, referring back to seed sown in prior verses. English supplies 'seed' for clarity; singular collective 'seed' fits the agricultural imagery better than 'seeds'.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks contrast with the previous kinds of soil/seed outcomes. 'But' brings out the adversative force naturally in English.
- source_word: ἔπεσεν
  chosen: fell
  alternatives:
  - was sown
  - landed
  lexicon: BDAG
  rationale: The verb is literally 'fell.' Although the broader parable concerns sowing, the Greek here keeps the imagery of seed falling, so 'fell' is retained.
- source_word: ἐπὶ τὴν γῆν τὴν καλὴν
  chosen: on the good soil
  alternatives:
  - upon the good ground
  - on the good land
  lexicon: BDAG
  rationale: γῆ can mean land/earth/ground, but in this agricultural context 'soil' is the most natural and precise English rendering. καλὴν is rendered 'good' in the sense of fertile/suitable.
- source_word: ἐδίδου καρπόν
  chosen: was producing fruit
  alternatives:
  - gave fruit
  - yielded fruit
  - was bearing fruit
  lexicon: BDAG
  rationale: Imperfect ἐδίδου suggests ongoing or characteristic action; 'was producing' reflects the imperfect better than a simple past. καρπός in this context is agricultural produce, and 'fruit' preserves the metaphor used throughout the tradition.
- source_word: ὃ μὲν ἑκατὸν ὃ δὲ ἑξήκοντα ὃ δὲ τριάκοντα
  chosen: one a hundredfold, another sixty, and another thirty
  alternatives:
  - some a hundred, some sixty, some thirty
  - one yielding a hundred, another sixty, another thirty
  lexicon: BDAG
  rationale: This distributive construction distinguishes varying yields from the good soil. 'A hundredfold' is supplied for the first number because the sense is yield multiplication; the same idea is understood with 'sixty' and 'thirty.' 'One...another...another' mirrors the Greek pattern more closely than 'some...some...some.'
