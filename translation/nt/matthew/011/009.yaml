theological_decisions:
- issue: Identity and status of John the Baptist in Jesus' saying
  chosen_reading: Render the phrase as 'more than a prophet' without expanding the implied meaning.
  alternative_readings:
  - greater than a prophet
  - more than an ordinary prophet
  rationale: The verse elevates John above the category of prophet, but the text itself does not specify in this clause how. A restrained rendering preserves the theological force without importing explanatory tradition into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
