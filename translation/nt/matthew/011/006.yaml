id: MAT.11.6
reference: Matthew 11:6
source:
  edition: SBLGNT
  text: καὶ μακάριός ἐστιν ὃς ⸀ἐὰν μὴ σκανδαλισθῇ ἐν ἐμοί.
translation:
  text: And blessed is the one who is not offended by me[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'does not take offense at me' / 'is not offended because of me.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριος
  chosen: blessed
  alternatives:
  - fortunate
  - happy
  lexicon: BDAG
  rationale: '''Blessed'' preserves the covenantal/religious weight of μακάριος better than the more subjective ''happy'' or the flatter ''fortunate.'' It is the standard beatitude-style rendering and fits Jesus'' pronouncement here.'
- source_word: ὃς ἐὰν μὴ
  chosen: the one who is not
  alternatives:
  - whoever does not
  - who does not
  lexicon: BDAG
  rationale: This construction expresses an indefinite/generic person under a condition. 'The one who is not' gives natural English while preserving the representative singular force of the masculine form without over-paraphrasing.
- source_word: σκανδαλισθῇ
  chosen: is not caused to stumble
  alternatives:
  - does not stumble
  - is not offended
  - does not take offense
  lexicon: BDAG
  rationale: 'The aorist passive subjunctive of σκανδαλίζω is best represented with passive force: ''is caused to stumble.'' This preserves the metaphor of stumbling and avoids reducing the term merely to emotional offense. Because in context the sense can include taking offense at Jesus, that alternative is preserved in a footnote.'
- source_word: ἐν ἐμοί
  chosen: by me
  alternatives:
  - in me
  - because of me
  - on account of me
  lexicon: BDAG
  rationale: With σκανδαλίζω, ἐν plus dative can denote the person in relation to whom offense/stumbling occurs. 'By me' is concise and idiomatic in English, conveying that Jesus is the occasion of stumbling. 'Because of me' is also possible and is preserved in a footnote as a lexical alternative.
- source_word: καί
  chosen: And
  alternatives:
  - —
  lexicon: BDAG
  rationale: The conjunction straightforwardly links this saying to the preceding context; 'And' preserves the discourse flow.
