id: MAT.19.21
reference: Matthew 19:21
source:
  edition: SBLGNT
  text: ἔφη αὐτῷ ὁ Ἰησοῦς· Εἰ θέλεις τέλειος εἶναι, ὕπαγε πώλησόν σου τὰ ὑπάρχοντα καὶ ⸀δὸς πτωχοῖς, καὶ ἕξεις θησαυρὸν ἐν ⸀οὐρανοῖς, καὶ δεῦρο ἀκολούθει μοι.
translation:
  text: Jesus said to him[a], “If you want to be perfect, go, sell your possessions and give to the poor, and you will have treasure in heaven; then come, follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “perfect.” The Greek word can mean “perfect,” “complete,” or “mature.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: Standard narrative speech verb; 'said' is the natural English equivalent and avoids over-specifying the manner of speaking.
- source_word: τέλειος
  chosen: complete
  alternatives:
  - perfect
  - mature
  lexicon: BDAG
  rationale: τέλειος can mean 'perfect,' 'complete,' or 'fully developed/mature.' In this context of wholehearted discipleship and undivided obedience, 'complete' best conveys the sense without suggesting sinless perfection. 'Perfect' is preserved as an alternative because of translation tradition and possible allusion to wholeheartedness.
- source_word: ὕπαγε
  chosen: go
  alternatives:
  - go away
  - be on your way
  lexicon: BDAG
  rationale: Imperative of departure; simple 'go' is idiomatic and sufficient in English.
- source_word: πώλησόν
  chosen: sell
  lexicon: BDAG
  rationale: Direct imperative; 'sell' is the plain lexical equivalent.
- source_word: τὰ ὑπάρχοντα
  chosen: your possessions
  alternatives:
  - what you own
  - your belongings
  lexicon: BDAG
  rationale: The participial expression refers to one's property or possessions. 'Your possessions' is concise, natural, and accurately reflects material holdings.
- source_word: δὸς πτωχοῖς
  chosen: give to the poor
  alternatives:
  - give to poor people
  lexicon: BDAG
  rationale: πτωχοῖς is substantival ('the poor'). The phrase denotes giving alms or material support to poor people; 'give to the poor' is idiomatic English.
- source_word: ἕξεις
  chosen: you will have
  alternatives:
  - you will possess
  lexicon: BDAG
  rationale: Future of ἔχω; 'you will have' is the straightforward rendering.
- source_word: θησαυρὸν ἐν οὐρανοῖς
  chosen: treasure in heaven
  alternatives:
  - treasure in the heavens
  lexicon: BDAG
  rationale: Although the Greek has plural οὐρανοῖς, idiomatic English commonly uses singular 'heaven' in this expression. This preserves meaning while remaining readable. The more formal 'in the heavens' is possible but less natural in contemporary English.
- source_word: δεῦρο
  chosen: then come
  alternatives:
  - come
  - come here
  lexicon: BDAG
  rationale: δεῦρο is a deictic summons ('come!'). Rendering it as 'then come' captures both the summons and the sequence after the prior commands.
- source_word: ἀκολούθει μοι
  chosen: follow me
  lexicon: BDAG
  rationale: Standard discipleship language in the Gospels; 'follow me' is the established and accurate rendering.
