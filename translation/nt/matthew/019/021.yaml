theological_decisions:
- issue: Meaning of τέλειος in relation to discipleship
  chosen_reading: Rendered as 'complete' rather than 'perfect' to avoid implying an abstract standard of sinless moral perfection and to reflect the sense of wholeness/completion in context.
  alternative_readings:
  - perfect
  - mature
  rationale: The verse addresses the rich man's lack in wholehearted obedience and attachment to possessions. 'Complete' preserves the demand for full devotion without importing a later doctrinal claim about perfectionism. The traditional 'perfect' remains viable and is preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 3, 6
