id: MAT.19.10
reference: Matthew 19:10
source:
  edition: SBLGNT
  text: Λέγουσιν αὐτῷ οἱ ⸀μαθηταί· Εἰ οὕτως ἐστὶν ἡ αἰτία τοῦ ἀνθρώπου μετὰ τῆς γυναικός, οὐ συμφέρει γαμῆσαι.
translation:
  text: His disciples said to him[a], “If that is the case of a man with his wife, it is not beneficial to marry.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “If such is the case of a man with a wife.” The Greek phrase is compact and may also be rendered “the matter” or “the situation” instead of “the case.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγουσιν αὐτῷ
  chosen: said to him
  alternatives:
  - say to him
  lexicon: BDAG
  rationale: Greek present is commonly used as a historical present in narrative; English simple past is the natural narrative equivalent.
- source_word: μαθηταί
  chosen: disciples
  alternatives:
  - students
  - followers
  lexicon: BDAG
  rationale: Standard Gospel term for Jesus' disciples; 'students' is too academic and 'followers' loses the learner relationship.
- source_word: Εἰ οὕτως ἐστίν
  chosen: If that is the case
  alternatives:
  - If thus it is
  - If it is so
  lexicon: BDAG
  rationale: Idiomatic English conditional preserving the inferential force of the disciples' response to Jesus' prior teaching.
- source_word: ἡ αἰτία
  chosen: the case
  alternatives:
  - the matter
  - the cause
  - the situation
  lexicon: BDAG
  rationale: αἰτία can denote circumstance, case, or matter here rather than strict causation. 'The case' best fits the disciples' summary of the marital situation just described.
- source_word: τοῦ ἀνθρώπου
  chosen: of a man
  alternatives:
  - of the man
  - of a person
  lexicon: BDAG
  rationale: The singular generic masculine refers representatively to a husband/man in relation to a wife. Per doctrine, gender-accurate rendering is preferred over gender-neutral where the source is masculine and contextually male-female marriage is in view.
- source_word: μετὰ τῆς γυναικός
  chosen: with his wife
  alternatives:
  - with the woman
  - with a wife
  lexicon: BDAG
  rationale: In this marital context γυνή is best rendered 'wife,' not merely 'woman.' The possessive is implicit in idiomatic English for the marital relationship, though not explicit in Greek.
- source_word: οὐ συμφέρει
  chosen: it is not beneficial
  alternatives:
  - it is not advantageous
  - it is not better
  - it is not expedient
  lexicon: BDAG
  rationale: συμφέρει denotes advantage or benefit. 'Not beneficial' preserves the pragmatic force without archaic tone.
- source_word: γαμῆσαι
  chosen: to marry
  alternatives:
  - to get married
  lexicon: BDAG
  rationale: Aorist infinitive is naturally rendered by the English infinitive 'to marry.' 'Get married' is more colloquial than needed.
