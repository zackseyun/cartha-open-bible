  chosen_reading: of a man with his wife
  alternative_readings:
  - of a person with a spouse
  - between a man and a woman
  rationale: The immediate context concerns marriage in explicitly male-female terms, and the Greek uses masculine singular with γυναῖκα in marital sense. Following the doctrine's gender-accurate principle, the translation preserves the male-female framing rather than neutralizing it.
