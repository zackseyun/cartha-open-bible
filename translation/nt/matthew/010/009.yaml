id: MAT.10.9
reference: Matthew 10:9
source:
  edition: SBLGNT
  text: μὴ κτήσησθε χρυσὸν μηδὲ ἄργυρον μηδὲ χαλκὸν εἰς τὰς ζώνας ὑμῶν,
translation:
  text: Do not acquire gold or silver or copper for your belts[b][a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bronze” for “copper.”
    reason: lexical_alternative
  - marker: b
    text: That is, money carried in belts or money pouches worn at the waist.
    reason: cultural_note
lexical_decisions:
- source_word: μὴ κτήσησθε
  chosen: Do not acquire
  alternatives:
  - Do not get
  - Do not take
  - Do not obtain
  lexicon: BDAG
  rationale: κτάομαι commonly means to acquire or obtain. In this mission context, the sense is not merely 'carry' but 'procure for yourselves' or 'acquire.' 'Do not acquire' preserves the force of the aorist middle prohibition without overparaphrasing.
- source_word: χρυσὸν
  chosen: gold
  lexicon: BDAG
  rationale: Straightforward material term; here it refers to money in the form of gold.
- source_word: ἄργυρον
  chosen: silver
  lexicon: BDAG
  rationale: Straightforward material term; in context, silver money.
- source_word: χαλκὸν
  chosen: copper
  alternatives:
  - bronze
  lexicon: BDAG
  rationale: χαλκός can denote copper or bronze. In a money list paired with gold and silver, 'copper' is the more natural modern rendering for low-value coinage, while 'bronze' is a viable lexical alternative preserved in a footnote.
- source_word: εἰς τὰς ζώνας ὑμῶν
  chosen: for your belts
  alternatives:
  - in your belts
  - in your money belts
  lexicon: BDAG
  rationale: ζώνη means belt or waistband. In context, belts functioned as places to carry money. 'For your belts' is a natural rendering of εἰς with the idiomatic sense of putting money into belts, while avoiding an overly interpretive expansion in the main text.
