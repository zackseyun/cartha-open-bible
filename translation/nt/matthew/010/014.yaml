id: MAT.10.14
reference: Matthew 10:14
source:
  edition: SBLGNT
  text: καὶ ὃς ⸀ἂν μὴ δέξηται ὑμᾶς μηδὲ ἀκούσῃ τοὺς λόγους ὑμῶν, ἐξερχόμενοι ⸀ἔξω τῆς οἰκίας ἢ τῆς πόλεως ἐκείνης ἐκτινάξατε τὸν κονιορτὸν τῶν ποδῶν ὑμῶν.
translation:
  text: And whoever does not receive you or listen to your words[a], as you go out of that house or that town[c][b], shake off the dust from your feet.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'whoever does not receive you or hear your words.'
    reason: lexical_alternative
  - marker: b
    text: '''Shake off the dust from your feet'' was a symbolic act of dissociation and judgment against those who rejected the message.'
    reason: cultural_note
  - marker: c
    text: Or 'that house or that city.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἂν μὴ
  chosen: if anyone does not
  alternatives:
  - whoever does not
  - and whoever does not
  lexicon: BDAG
  rationale: 'The relative construction with ἄν has an indefinite/generic force: ''whoever/if anyone.'' Rendering it as ''if anyone does not'' produces natural English while preserving the conditional sense carried into the imperative that follows. The initial καί is absorbed into the flow as ''And if'' rather than a wooden ''And whoever.'''
- source_word: δέξηται ὑμᾶς
  chosen: receive you
  alternatives:
  - welcome you
  - accept you
  lexicon: BDAG
  rationale: δέχομαι here refers to receiving the messengers hospitably and favorably. 'Receive you' is slightly more formal and broad than 'welcome you,' preserving both hospitality and acceptance of their mission.
- source_word: μηδὲ ἀκούσῃ τοὺς λόγους ὑμῶν
  chosen: or listen to your words
  alternatives:
  - nor hear your words
  - or heed your words
  lexicon: BDAG
  rationale: ἀκούω can mean hear/listen, and in context implies attentive reception of the disciples' message. 'Listen to your words' is idiomatic modern English and preserves the verbal content of λόγοι. 'Heed' would over-specify obedience beyond the lexical minimum.
- source_word: ἐξερχόμενοι ἔξω
  chosen: as you leave
  alternatives:
  - when you go out of
  - departing from
  lexicon: BDAG
  rationale: The participle plus ἔξω expresses going out from the place. 'As you leave' is concise, natural, and captures the attendant circumstance before the main imperative.
- source_word: τῆς οἰκίας ἢ τῆς πόλεως ἐκείνης
  chosen: that house or that town
  alternatives:
  - that house or that city
  - the house or that town
  lexicon: BDAG
  rationale: The repeated article with ἐκείνης points to a specific house or town just mentioned in context. 'That house or that town' preserves the demonstrative force. πόλις can be 'city' or 'town'; 'town' fits many modern readers and avoids implying a large urban center where the context may simply mean a locality.
- source_word: ἐκτινάξατε
  chosen: shake off
  alternatives:
  - shake out
  - wipe off
  lexicon: BDAG
  rationale: The imperative denotes a symbolic act of forcefully removing dust. 'Shake off' is the standard and clearest English equivalent.
- source_word: τὸν κονιορτὸν
  chosen: the dust
  alternatives:
  - the dirt
  lexicon: BDAG
  rationale: κονιορτός refers specifically to dust, not generic dirt. 'The dust' preserves the concrete image and the symbolic action.
- source_word: τῶν ποδῶν ὑμῶν
  chosen: from your feet
  alternatives:
  - off your feet
  lexicon: BDAG
  rationale: The genitive with the action verb indicates removal from the feet. 'From your feet' is natural and precise in English.
