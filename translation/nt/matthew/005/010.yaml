id: MAT.5.10
reference: Matthew 5:10
source:
  edition: SBLGNT
  text: μακάριοι οἱ δεδιωγμένοι ἕνεκεν δικαιοσύνης, ὅτι αὐτῶν ἐστιν ἡ βασιλεία τῶν οὐρανῶν.
translation:
  text: Blessed are those who have been persecuted because of righteousness[a], for theirs is the kingdom of heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'because of justice.' The Greek word can carry both moral and covenantal senses.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  chosen: Blessed
  alternatives:
  - Flourishing
  - Happy
  lexicon: BDAG
  rationale: Standard beatitude term; 'Blessed' preserves the declarative, covenantal sense better than the more subjective 'happy.'
- source_word: οἱ δεδιωγμένοι
  chosen: those who have been persecuted
  alternatives:
  - the persecuted
  - those who are persecuted
  lexicon: BDAG
  rationale: The article plus perfect passive participle functions substantivally. 'Those who have been persecuted' reflects the perfect aspect/resultative state while remaining natural English.
- source_word: ἕνεκεν
  chosen: because of
  alternatives:
  - for the sake of
  - on account of
  lexicon: BDAG
  rationale: Conveys causation clearly in modern English; 'for the sake of' is possible but slightly more formal.
- source_word: δικαιοσύνης
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Per doctrine default, δικαιοσύνη is rendered 'righteousness.' In this Matthean context it denotes right standing/conduct aligned with God's will; 'justice' is a plausible nuance but is not preferred in the main text.
- source_word: ὅτι
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the reason for the beatitude. 'For' fits idiomatic English beatitude style and preserves the explanatory force.
- source_word: αὐτῶν
  chosen: theirs
  alternatives:
  - to them belongs
  lexicon: BDAG
  rationale: Possessive genitive rendered idiomatically and concisely in English.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Traditional yet accurate rendering of Matthew's characteristic expression. Singular 'heaven' is idiomatic in English for the Greek plural and avoids awkwardness while preserving the meaning of God's heavenly reign.
