id: MAT.14.15
reference: Matthew 14:15
source:
  edition: SBLGNT
  text: ὀψίας δὲ γενομένης προσῆλθον αὐτῷ οἱ ⸀μαθηταὶ λέγοντες· Ἔρημός ἐστιν ὁ τόπος καὶ ἡ ὥρα ἤδη παρῆλθεν· ἀπόλυσον τοὺς ὄχλους, ἵνα ἀπελθόντες εἰς τὰς κώμας ἀγοράσωσιν ἑαυτοῖς βρώματα.
translation:
  text: Now when evening came[a], the disciples came to him and said, “The place is deserted, and the hour is already late. Send the crowds away[b], so that they may go into the villages and buy food for themselves.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “This is a desolate place.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “the hour has already passed.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψίας δὲ γενομένης
  chosen: Now when evening came
  alternatives:
  - When it became evening
  - As evening came
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal transition. 'Now' reflects δέ as narrative development; 'when evening came' is idiomatic modern English while preserving the temporal sense.
- source_word: προσῆλθον αὐτῷ
  chosen: came to him
  alternatives:
  - approached him
  lexicon: BDAG
  rationale: προσέρχομαι commonly means 'come to/approach.' 'Came to him' is natural and sufficiently formal in narrative context.
- source_word: μαθηταὶ
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: The article identifies the known group around Jesus. 'The disciples' is adequate in context without adding possessive material not explicit in the Greek.
- source_word: Ἔρημός ἐστιν ὁ τόπος
  chosen: The place is deserted
  alternatives:
  - This is a desolate place
  - The place is isolated
  lexicon: BDAG
  rationale: ἔρημος here describes an uninhabited or sparsely populated area. 'Deserted' communicates lack of nearby settlement better than the potentially geographic 'desolate' or 'wilderness' in this sentence structure.
- source_word: ἡ ὥρα ἤδη παρῆλθεν
  chosen: the hour is already late
  alternatives:
  - the time has already passed
  - it is already late
  lexicon: BDAG
  rationale: Literally 'the hour has already passed,' an idiom indicating lateness of the day. 'The hour is already late' preserves the metaphor while sounding natural in English.
- source_word: ἀπόλυσον τοὺς ὄχλους
  chosen: Send the crowds away
  alternatives:
  - Dismiss the crowds
  - Release the crowds
  lexicon: BDAG
  rationale: ἀπολύω in this context means to dismiss or send away. 'Send the crowds away' is idiomatic and fits the practical request being made.
- source_word: ἵνα ἀπελθόντες
  chosen: so that they may go
  alternatives:
  - so that, after going, they may
  - in order that they may go away
  lexicon: BDAG
  rationale: The participle plus ἵνα clause expresses intended action. English smooths the participial sequence into a natural purpose clause without loss of meaning.
- source_word: εἰς τὰς κώμας
  chosen: into the villages
  alternatives:
  - to the villages
  - into the nearby villages
  lexicon: BDAG
  rationale: κώμη means village. 'Into the villages' follows εἰς straightforwardly; 'nearby' is implied by context but not explicit, so omitted from the main text.
- source_word: ἀγοράσωσιν ἑαυτοῖς βρώματα
  chosen: buy food for themselves
  alternatives:
  - buy provisions for themselves
  - buy something to eat for themselves
  lexicon: BDAG
  rationale: βρώματα refers to food. 'Buy food for themselves' is clear modern English and preserves the reflexive ἑαυτοῖς.
