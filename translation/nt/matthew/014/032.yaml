id: MAT.14.32
reference: Matthew 14:32
source:
  edition: SBLGNT
  text: καὶ ⸀ἀναβάντων αὐτῶν εἰς τὸ πλοῖον ἐκόπασεν ὁ ἄνεμος.
translation:
  text: And when they got into the boat[a], the wind ceased.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'after they went up into the boat.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβάντων αὐτῶν
  chosen: when they got into
  alternatives:
  - after they went up into
  - when they climbed into
  lexicon: BDAG
  rationale: The genitive absolute is best rendered as a temporal clause in natural English. ἀναβαίνω literally means 'go up,' but with εἰς τὸ πλοῖον in this narrative context, idiomatic English is 'got into the boat.' 'Went up into' is more formally literal but less natural here.
- source_word: πλοῖον
  chosen: boat
  alternatives:
  - ship
  lexicon: BDAG
  rationale: πλοῖον in the Gospel context refers to the disciples' fishing vessel on the Sea of Galilee; 'boat' is the natural modern English equivalent. 'Ship' would sound too large and archaic for this setting.
- source_word: ἐκόπασεν
  chosen: ceased
  alternatives:
  - grew calm
  - stopped
  - abated
  lexicon: BDAG
  rationale: κοπάζω means to stop or subside, especially of wind or storm conditions. 'Ceased' is concise, natural, and preserves the directness of the Greek. 'Grew calm' adds a nuance of process not explicit in the aorist verb.
- source_word: ὁ ἄνεμος
  chosen: the wind
  lexicon: BDAG
  rationale: A straightforward rendering of the nominative subject with article. The article is naturally retained in English.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: καί here continues the narrative sequence. 'And' preserves the connective force without adding interpretive nuance. 'Then' is possible but slightly more interpretive as a temporal marker.
