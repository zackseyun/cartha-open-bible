theological_decisions:
- issue: Narrative implication of Jesus' authority over nature
  chosen_reading: Translate the event plainly without expanding its theological significance in the main text.
  alternative_readings:
  - A more interpretive rendering that foregrounds miraculous authority
  rationale: The verse narrates that the wind ceased when Jesus and Peter entered the boat. The theological significance is clear in context, but the translation should not import explanatory wording beyond the Greek.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
