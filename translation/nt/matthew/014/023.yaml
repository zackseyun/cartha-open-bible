id: MAT.14.23
reference: Matthew 14:23
source:
  edition: SBLGNT
  text: καὶ ἀπολύσας τοὺς ὄχλους ἀνέβη εἰς τὸ ὄρος κατ’ ἰδίαν προσεύξασθαι. ὀψίας δὲ γενομένης μόνος ἦν ἐκεῖ.
translation:
  text: And after dismissing the crowds[a], he went up on the mountain by himself to pray. When evening came, he was there alone.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'privately' for 'by himself' (κατ’ ἰδίαν).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολύσας
  chosen: after dismissing
  alternatives:
  - having dismissed
  - after sending away
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered with temporal force in English. 'Dismissing' fits the context of sending the crowds away without adding nuance beyond the Greek.
- source_word: τοὺς ὄχλους
  chosen: the crowds
  alternatives:
  - the multitudes
  - the people
  lexicon: BDAG
  rationale: ὄχλοι in the Gospels commonly refers to gathered crowds. 'Crowds' is natural modern English and preserves the plural.
- source_word: ἀνέβη εἰς τὸ ὄρος
  chosen: he went up on the mountain
  alternatives:
  - he went up into the mountain
  - he ascended the mountain
  - he went up the mountain
  lexicon: BDAG
  rationale: ἀναβαίνω with εἰς τὸ ὄρος denotes upward movement to the mountain/hill area. 'Went up on the mountain' is idiomatic English and preserves the topographical sense without archaic phrasing.
- source_word: κατ’ ἰδίαν
  chosen: by himself
  alternatives:
  - privately
  - alone
  lexicon: BDAG
  rationale: The phrase means 'in private' or 'by oneself.' Here 'by himself' fits the action of withdrawing from others to pray and reads smoothly with the infinitive.
- source_word: προσεύξασθαι
  chosen: to pray
  lexicon: BDAG
  rationale: Straightforward infinitive of purpose after ἀνέβη.
- source_word: ὀψίας δὲ γενομένης
  chosen: When evening came
  alternatives:
  - and when evening had come
  - after evening came
  lexicon: BDAG
  rationale: Genitive absolute marking a temporal circumstance. 'When evening came' is concise, natural, and preserves the temporal transition.
- source_word: μόνος ἦν ἐκεῖ
  chosen: he was there alone
  alternatives:
  - he was alone there
  - he was there by himself
  lexicon: BDAG
  rationale: μόνος emphasizes solitude; placing 'there' before 'alone' mirrors the Greek adverb while remaining idiomatic English.
