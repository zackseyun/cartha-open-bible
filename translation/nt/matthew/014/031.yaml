id: MAT.14.31
reference: Matthew 14:31
source:
  edition: SBLGNT
  text: εὐθέως δὲ ὁ Ἰησοῦς ἐκτείνας τὴν χεῖρα ἐπελάβετο αὐτοῦ καὶ λέγει αὐτῷ· Ὀλιγόπιστε, εἰς τί ἐδίστασας;
translation:
  text: Immediately Jesus stretched out his hand[a], took hold of him, and said to him, “You of little faith, why did you doubt?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “did you waver?” The Greek verb can denote hesitation or wavering as well as doubt.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθέως
  chosen: Immediately
  alternatives:
  - At once
  - Straightway
  lexicon: BDAG
  rationale: Conveys the adverb's sense of immediate action in clear modern English. 'Immediately' is natural and preserves the narrative urgency.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: The connective is lightly adversative/continuative, but in English it is best left untranslated here to avoid stiffness. The transition is adequately conveyed by word order and context.
- source_word: ἐκτείνας τὴν χεῖρα
  chosen: stretched out his hand
  alternatives:
  - reached out his hand
  - extended his hand
  lexicon: BDAG
  rationale: A natural rendering of the participial phrase that preserves the concrete imagery and sequence of action.
- source_word: ἐπελάβετο αὐτοῦ
  chosen: took hold of him
  alternatives:
  - caught him
  - grasped him
  lexicon: BDAG
  rationale: Reflects the middle verb's sense of seizing or taking hold of someone. 'Took hold of him' is precise without overinterpreting the manner.
- source_word: λέγει αὐτῷ
  chosen: says to him
  alternatives:
  - said to him
  lexicon: BDAG
  rationale: The Greek uses the historical present λέγει. Rendering it as 'says' preserves the vividness of the narrative. English can naturally accommodate the shift after past-tense verbs in narrative.
- source_word: Ὀλιγόπιστε
  chosen: You of little faith
  alternatives:
  - O you of little faith
  - Little-faith one
  lexicon: BDAG
  rationale: This vocative addresses Peter directly and is best rendered idiomatically in English. It preserves the focus on deficient faith without flattening it into a mere adjective like 'faithless,' which would overstate the rebuke.
- source_word: εἰς τί
  chosen: why
  alternatives:
  - for what reason
  - to what end
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the interrogative phrase in this context.
- source_word: ἐδίστασας
  chosen: did you doubt
  alternatives:
  - did you waver
  - were you divided in mind
  lexicon: BDAG
  rationale: The verb denotes wavering or doubting. 'Did you doubt' is the clearest and most familiar English rendering here, while alternatives are preserved because the nuance may include hesitation or wavering rather than settled unbelief.
