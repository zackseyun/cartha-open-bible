id: MAT.14.35
reference: Matthew 14:35
source:
  edition: SBLGNT
  text: καὶ ἐπιγνόντες αὐτὸν οἱ ἄνδρες τοῦ τόπου ἐκείνου ἀπέστειλαν εἰς ὅλην τὴν περίχωρον ἐκείνην, καὶ προσήνεγκαν αὐτῷ πάντας τοὺς κακῶς ἔχοντας,
translation:
  text: And when the men of that place recognized him[a], they sent into that whole surrounding region and brought to him all who were sick[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they sent throughout that whole surrounding district,' with the object ('word' or 'messengers') left implicit in Greek.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'all those having it badly,' an idiom meaning those who were sick or ill.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγνόντες
  chosen: recognized
  alternatives:
  - identified
  - came to know
  lexicon: BDAG
  rationale: Aorist participle of ἐπιγινώσκω here denotes recognizing/identifying Jesus upon seeing him, not coming to know in a broader relational sense. 'Recognized' is natural English and fits the narrative context.
- source_word: οἱ ἄνδρες τοῦ τόπου ἐκείνου
  chosen: the men of that place
  alternatives:
  - the people of that place
  - the men of that region
  lexicon: BDAG
  rationale: ἀνήρ is specifically 'man/men,' not the more general 'people.' Per gender-accurate philosophy, the masculine term is retained. τόπος is best rendered 'place' here, referring to the locality where Jesus landed.
- source_word: ἀπέστειλαν εἰς ὅλην τὴν περίχωρον ἐκείνην
  lemma: ἀποστέλλω
  chosen: they sent word into that whole surrounding region
  alternatives:
  - they sent into all that surrounding district
  - they sent messengers throughout that whole region
  lexicon: BDAG
  rationale: The verb ἀποστέλλω normally means 'send,' but the object is implicit; in idiomatic English the sense is that they sent a message or messengers. περίχωρος denotes the surrounding area/region. 'Sent word' makes the implied communicative action explicit without over-paraphrasing.
- source_word: προσήνεγκαν αὐτῷ
  chosen: brought to him
  alternatives:
  - brought before him
  - presented to him
  lexicon: BDAG
  rationale: προσφέρω in this narrative context means bringing persons to Jesus, not offering in a sacrificial sense. 'Brought to him' is the clearest natural rendering.
- source_word: πάντας τοὺς κακῶς ἔχοντας
  chosen: all who were sick
  alternatives:
  - all who were ill
  - all those who were suffering
  lexicon: BDAG
  rationale: The idiom κακῶς ἔχειν means to be sick or unwell. 'All who were sick' is concise, idiomatic, and accurately conveys the sense.
