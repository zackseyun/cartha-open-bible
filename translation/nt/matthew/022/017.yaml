id: MAT.22.17
reference: Matthew 22:17
source:
  edition: SBLGNT
  text: εἰπὸν οὖν ἡμῖν τί σοι δοκεῖ· ἔξεστιν δοῦναι κῆνσον Καίσαρι ἢ οὔ;
translation:
  text: Tell us[a], then, what do you think? Is it lawful to pay the poll tax to Caesar, or not?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tax,' 'tribute tax,' or 'census tax.' The Greek term refers to the Roman poll tax.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰπὸν
  chosen: Tell
  alternatives:
  - Say
  lexicon: BDAG
  rationale: Aorist imperative of λέγω addressed to Jesus. 'Tell' is idiomatic in English when followed by an indirect object ('us') and a content question.
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks inference or continuation from the preceding exchange. 'Then' is natural modern English in direct speech here.
- source_word: τί σοι δοκεῖ
  chosen: what do you think
  alternatives:
  - what seems right to you
  - what is your opinion
  lexicon: BDAG
  rationale: δοκέω here expresses personal judgment or opinion. 'What do you think' is the clearest idiomatic rendering.
- source_word: ἔξεστιν
  chosen: Is it lawful
  alternatives:
  - Is it permitted
  - Is it allowed
  lexicon: BDAG
  rationale: In this context the question concerns what is permitted under law/custom, not mere ability. 'Lawful' preserves the legal-ethical force of the trap question.
- source_word: δοῦναι
  chosen: to give
  alternatives:
  - to pay
  lexicon: BDAG
  rationale: The infinitive of δίδωμι is literally 'to give.' Although in context it refers to paying a tax, retaining 'give' stays closer to the Greek while remaining natural with 'tax'.
- source_word: κῆνσον
  chosen: the poll tax
  alternatives:
  - the tax
  - tribute tax
  - census tax
  lexicon: BDAG
  rationale: κῆνσος refers specifically to the Roman capitation tax associated with the census. 'Poll tax' best captures the historical specificity better than the generic 'tax.'
- source_word: Καίσαρι
  chosen: to Caesar
  alternatives:
  - to the emperor
  lexicon: BDAG
  rationale: Καῖσαρ is a title/name for the Roman ruler. 'Caesar' is the standard transliteration and fits the instruction to transliterate names while preserving the historical setting.
- source_word: ἢ οὔ
  chosen: or not
  alternatives:
  - or no
  lexicon: BDAG
  rationale: Standard Greek disjunctive question ending; 'or not' is the natural English equivalent.
