id: MAT.22.44
reference: Matthew 22:44
source:
  edition: SBLGNT
  text: ⸀Εἶπεν κύριος τῷ κυρίῳ μου· Κάθου ἐκ δεξιῶν μου ἕως ἂν θῶ τοὺς ἐχθρούς σου
    ⸀ὑποκάτω τῶν ποδῶν σου;
translation:
  text: The Lord said to my Lord, ‘Sit at my right hand until I put your enemies under
    your feet’?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, following the Hebrew idiom of Psalm 110:1, “make your enemies a footstool
      for your feet.”
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  chosen: Lord
  alternatives:
  - LORD
  - Master
  lexicon: BDAG
  rationale: Rendered as 'Lord' in keeping with the project's default for κύριος.
    In this citation of Psalm 110:1, the first κύριος refers to God and the second
    to David's lord/Messiah, but the Greek text uses the same title for both; English
    capitalization alone does not distinguish them here, so both are rendered 'Lord'
    while preserving the relational distinction through 'my Lord'.
- source_word: Εἶπεν
  chosen: said
  alternatives:
  - declared
  lexicon: BDAG
  rationale: Aorist of λέγω is most naturally rendered 'said' in this quotation formula.
    'Declared' is possible but stronger than the plain speech verb warrants.
- source_word: τῷ κυρίῳ μου
  chosen: to my Lord
  alternatives:
  - to my master
  lexicon: BDAG
  rationale: The dative phrase marks the addressee of the speech. 'My Lord' preserves
    both the Greek title κύριος and the messianic significance of the Psalm citation
    better than 'my master'.
- source_word: Κάθου
  chosen: Sit
  alternatives:
  - Be seated
  lexicon: BDAG
  rationale: Present middle imperative of κάθημαι in an enthronement context. 'Sit'
    is concise and idiomatic; 'Be seated' is possible but less natural and slightly
    more formal than needed.
- source_word: ἐκ δεξιῶν μου
  chosen: at my right hand
  alternatives:
  - at my right side
  - on my right
  lexicon: BDAG
  rationale: This idiom denotes the place of highest honor and shared rule. 'At my
    right hand' is the established and accurate English rendering of the Greek idiom.
- source_word: ἕως ἂν θῶ
  chosen: until I put
  alternatives:
  - until I place
  - while I make
  lexicon: BDAG
  rationale: 'The conjunction with ἄν and aorist subjunctive expresses a future contingency:
    ''until I put.'' ''Place'' is possible, but ''put'' is more idiomatic in the fixed
    expression that follows.'
- source_word: ἐχθρούς
  chosen: enemies
  alternatives:
  - foes
  lexicon: BDAG
  rationale: Standard rendering of ἐχθρός in this context; clear and natural modern
    English.
- source_word: ὑποκάτω τῶν ποδῶν σου
  chosen: under your feet
  alternatives:
  - beneath your feet
  - as a footstool for your feet
  lexicon: BDAG
  rationale: The Greek phrase literally means 'under your feet.' Although Psalm 110:1
    in many English versions reads 'make your enemies your footstool,' Matthew's wording
    here is more directly represented by 'put your enemies under your feet.' The more
    interpretive 'footstool' image is preserved in a footnote because it reflects
    the Hebrew source and common translation tradition.
