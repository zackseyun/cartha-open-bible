theological_decisions:
- issue: Rendering the Psalm 110:1 citation with two instances of κύριος
  chosen_reading: The Lord said to my Lord
  alternative_readings:
  - The LORD said to my Lord
  - The Lord said to my master
  rationale: The Greek text has κύριος for both referents. Following the doctrine's
    default rendering for κύριος, both are translated 'Lord.' 'The LORD' would foreground
    the Hebrew divine name behind the Psalm, but that distinction is not explicit
    in the Greek citation itself; preserving the same title in both places also supports
    Jesus' argument about the Messiah's status. 'My master' is lexically possible
    for the second κύριος but weakens the christological force of the passage.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Translation
    philosophy items 1, 2, 3, and 5'
