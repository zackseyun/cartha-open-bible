id: MAT.22.38
reference: Matthew 22:38
source:
  edition: SBLGNT
  text: αὕτη ἐστὶν ⸂ἡ μεγάλη καὶ πρώτη⸃ ἐντολή.
translation:
  text: This is the great and first commandment[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, ''This is the foremost commandment.'' The Greek more literally has two descriptors: ''the great and first commandment.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  chosen: This
  alternatives:
  - This one
  lexicon: BDAG
  rationale: Demonstrative pronoun referring back to the command just quoted in v. 37. 'This' is natural English and preserves the anaphoric force without unnecessary stiffness.
- source_word: ἐστὶν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula; present indicative is best rendered directly as 'is'.
- source_word: μεγάλη
  chosen: great
  alternatives:
  - greatest
  - large
  lexicon: BDAG
  rationale: The adjective means 'great' here in the sense of importance or rank. 'Greatest' would overtranslate the positive form into a superlative, and 'large' is contextually inappropriate.
- source_word: πρώτη
  chosen: first
  alternatives:
  - foremost
  - primary
  lexicon: BDAG
  rationale: πρῶτος commonly denotes first in sequence or rank. In this context of ranking commandments, 'first' is the most direct rendering and pairs naturally with 'great.' Alternatives like 'foremost' are interpretive rather than necessary.
- source_word: ἐντολή
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: In biblical and Jewish legal context, ἐντολή is well represented by 'commandment.' 'Command' is possible, but 'commandment' better preserves the scriptural register and connection to the law discussion in context.
