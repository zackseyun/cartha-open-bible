theological_decisions:
- issue: Relationship of μεγάλη and πρώτη in describing the commandment
  chosen_reading: 'Render both adjectives coordinately: ''the great and first commandment.'''
  alternative_readings:
  - '''the greatest and first commandment'''
  - '''the foremost commandment'''
  rationale: The Greek has two coordinated positive adjectives, μεγάλη and πρώτη, both modifying ἐντολή. Rendering both explicitly preserves the text's rhetorical emphasis without collapsing them into a single superlative idea. This also avoids importing an interpretive smoothing that would obscure the distinction between greatness and primacy.
  doctrine_reference: Translation philosophy §§1, 3, 5
