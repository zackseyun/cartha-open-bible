id: MAT.22.16
reference: Matthew 22:16
source:
  edition: SBLGNT
  text: καὶ ἀποστέλλουσιν αὐτῷ τοὺς μαθητὰς αὐτῶν μετὰ τῶν Ἡρῳδιανῶν ⸀λέγοντες· Διδάσκαλε,
    οἴδαμεν ὅτι ἀληθὴς εἶ καὶ τὴν ὁδὸν τοῦ θεοῦ ἐν ἀληθείᾳ διδάσκεις, καὶ οὐ μέλει
    σοι περὶ οὐδενός, οὐ γὰρ βλέπεις εἰς πρόσωπον ἀνθρώπων·
translation:
  text: And they sent to him their disciples along with the Herodians, saying, “Teacher,
    we know that you are true and teach the way of God in truth, and you do not care
    what anyone thinks, for you do not look at the face of men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “you do not show partiality to people” or “you do not judge by appearances.”
    reason: lexical_alternative
  - marker: b
    text: Greek “men”; here used generically for human beings.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστέλλουσιν
  chosen: they sent
  alternatives:
  - they send
  lexicon: BDAG
  rationale: Rendered as simple past in idiomatic English narrative, though the Greek
    is present; English commonly uses past here to match surrounding narrative flow.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - students
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually appropriate rendering
    for followers/learners in the Gospel setting.'
- source_word: μετὰ τῶν Ἡρῳδιανῶν
  chosen: along with the Herodians
  alternatives:
  - with the Herodians
  lexicon: BDAG
  rationale: Expresses association clearly in natural English while preserving the
    political-religious alliance implied by μετά with the genitive.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: '''Teacher'' best reflects the ordinary sense of the address without
    importing older English tradition or hierarchical nuance.'
- source_word: ἀληθὴς
  chosen: 'true'
  alternatives:
  - truthful
  - genuine
  lexicon: BDAG
  rationale: '''True'' is concise and fits the predicative use describing Jesus''
    character; ''truthful'' is possible but slightly narrower.'
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  chosen: the way of God
  alternatives:
  - God's way
  lexicon: BDAG
  rationale: A relatively formal rendering that preserves the idiom and possible broader
    sense of God's path/way of life rather than reducing it to a mere possessive phrase.
- source_word: ἐν ἀληθείᾳ
  chosen: in truth
  alternatives:
  - truthfully
  - truly
  lexicon: BDAG
  rationale: Preserves the prepositional phrase and its emphasis on accordance with
    truth; more formal than an adverb, but still natural enough in context.
- source_word: οὐ μέλει σοι περὶ οὐδενός
  chosen: you do not care what anyone thinks
  alternatives:
  - you are not concerned about anyone
  - nothing matters to you
  lexicon: BDAG
  rationale: The idiom means Jesus is not swayed by anyone's opinion or status, not
    that he is indifferent in a general moral sense. This rendering communicates the
    intended force in clear English.
- source_word: οὐ γὰρ βλέπεις εἰς πρόσωπον ἀνθρώπων
  chosen: for you do not look at the face of men
  alternatives:
  - for you do not show partiality to people
  - for you do not judge by appearances
  lexicon: BDAG
  rationale: Kept relatively close to the Greek idiom for auditability, while preserving
    the sense of impartiality. Because the phrase is idiomatic, an explanatory alternative
    is preserved in a footnote.
- source_word: ἀνθρώπων
  chosen: men
  alternatives:
  - people
  - humans
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and here refers generically
    to human beings. Per doctrine, gender-accurate rendering is preferred; inclusivity-relevant
    alternative is preserved in a footnote.
