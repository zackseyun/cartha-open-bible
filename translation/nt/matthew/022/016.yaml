theological_decisions:
- issue: Idiomatic expression of impartiality
  chosen_reading: Retained a relatively literal rendering ('do not look at the face
    of men') in the main text.
  alternative_readings:
  - do not show partiality to people
  - do not judge by appearances
  rationale: The Greek idiom refers to impartiality and freedom from being swayed
    by status. A more literal main text preserves the source texture, while a footnote
    supplies the idiomatic sense so the translation does not mislead.
  doctrine_reference: Translation philosophy §§3, 4, 5
