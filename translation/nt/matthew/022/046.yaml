id: MAT.22.46
reference: Matthew 22:46
source:
  edition: SBLGNT
  text: καὶ οὐδεὶς ἐδύνατο ⸂ἀποκριθῆναι αὐτῷ⸃ λόγον, οὐδὲ ἐτόλμησέν τις ἀπ’ ἐκείνης
    τῆς ἡμέρας ἐπερωτῆσαι αὐτὸν οὐκέτι.
translation:
  text: And no one was able to answer him a word, nor did anyone dare from that day
    on to question him any longer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to answer him a single word.' The Greek idiom is literally 'to answer
      him a word.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Indefinite negative pronoun referring to the complete absence of any
    person able to respond. 'No one' is standard, clear English.
- source_word: ἐδύνατο
  chosen: was able
  alternatives:
  - could
  lexicon: BDAG
  rationale: Imperfect middle/passive of δύναμαι expresses inability in past time.
    'Was able' preserves the verbal idea more explicitly than the contracted 'could'
    and fits the formal force of the clause.
- source_word: ἀποκριθῆναι αὐτῷ λόγον
  chosen: to answer him a word
  alternatives:
  - to answer him a single word
  - to reply to him
  lexicon: BDAG
  rationale: The idiom literally includes λόγον ('word') after ἀποκριθῆναι. Rendering
    it as 'answer him a word' preserves the emphatic idiom without over-paraphrasing.
    'A single word' is interpretive intensification; 'reply to him' is smoother but
    loses the explicit λόγον.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: BDAG
  rationale: Connects the second negative clause closely to the first. 'Nor' is the
    most natural English equivalent in this construction.
- source_word: ἐτόλμησέν τις
  chosen: did anyone dare
  alternatives:
  - anyone dared
  lexicon: BDAG
  rationale: Aorist of τολμάω denotes the act of venturing or daring. The English
    auxiliary construction is natural after the preceding negative clause.
- source_word: ἀπ’ ἐκείνης τῆς ἡμέρας
  chosen: from that day on
  alternatives:
  - from that day
  - since that day
  lexicon: BDAG
  rationale: The prepositional phrase marks the starting point of a continuing state.
    'From that day on' best conveys the idiomatic force in English.
- source_word: ἐπερωτῆσαι
  chosen: to question
  alternatives:
  - to ask
  - to interrogate
  lexicon: BDAG
  rationale: In context, the verb refers not to a simple request for information but
    to putting questions to Jesus, often in a testing or disputational setting. 'Question'
    preserves that nuance better than the more neutral 'ask,' while 'interrogate'
    is too strong.
- source_word: οὐκέτι
  chosen: any longer
  alternatives:
  - no longer
  - anymore
  lexicon: BDAG
  rationale: Conveys cessation from that point forward. 'Any longer' reads naturally
    at the end of the clause in modern English.
