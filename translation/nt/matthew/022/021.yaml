id: MAT.22.21
reference: Matthew 22:21
source:
  edition: SBLGNT
  text: λέγουσιν ⸀αὐτῷ· Καίσαρος. τότε λέγει αὐτοῖς· Ἀπόδοτε οὖν τὰ Καίσαρος Καίσαρι
    καὶ τὰ τοῦ θεοῦ τῷ θεῷ.
translation:
  text: They said to him, “Caesar’s.” Then he said to them, “Therefore render to Caesar
    the things that are Caesar’s, and to God the things that are God’s.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “render to Caesar … and to God …” The Greek verb can mean “give back,”
      “pay,” or “render what is due.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγουσιν
  chosen: They said
  alternatives:
  - They say
  lexicon: BDAG
  rationale: Rendered as simple past in idiomatic English narrative, though the Greek
    present is a historical present. This preserves natural English flow without losing
    the discourse function.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Standard dative indirect object after λέγουσιν.
- source_word: Καίσαρος
  chosen: Caesar’s
  alternatives:
  - Of Caesar
  lexicon: BDAG
  rationale: The genitive here answers the implied question about whose image/inscription
    is on the coin. English possessive is the most natural equivalent.
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  - So then
  lexicon: BDAG
  rationale: Marks sequential development in the exchange; 'Then' is concise and natural.
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Another historical present rendered as past for smooth English narrative
    consistency.
- source_word: Ἀπόδοτε
  chosen: give back
  alternatives:
  - render
  - repay
  - give
  lexicon: BDAG
  rationale: ἀποδίδωμι carries the sense of giving back or paying what is due. 'Give
    back' preserves the notion of returning what belongs to another more clearly than
    the traditional 'render,' while remaining readable.
- source_word: οὖν
  chosen: Therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: 'Signals inference from the preceding answer: because the coin bears
    Caesar''s mark, they should return to Caesar what is his.'
- source_word: τὰ Καίσαρος
  chosen: the things that are Caesar’s
  alternatives:
  - Caesar's things
  - what belongs to Caesar
  lexicon: BDAG
  rationale: The neuter plural article with genitive is best expressed in English
    as 'the things that are Caesar’s.' This preserves the parallelism with the following
    clause.
- source_word: Καίσαρι
  chosen: to Caesar
  lexicon: BDAG
  rationale: Dative of indirect object after the imperative.
- source_word: τὰ τοῦ θεοῦ
  chosen: the things that are God’s
  alternatives:
  - God's things
  - what belongs to God
  lexicon: BDAG
  rationale: Matches the structure of τὰ Καίσαρος and preserves the rhetorical balance
    of the saying.
- source_word: θεοῦ / τῷ θεῷ
  chosen: God / to God
  lexicon: BDAG
  rationale: θεός here refers to the one true God in a Jewish monotheistic context;
    standard English 'God' is appropriate.
