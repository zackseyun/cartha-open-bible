theological_decisions:
- issue: Force of Jesus' command regarding civic and divine obligation
  chosen_reading: The translation preserves the parallel command without expanding
    it into a full political theory or reducing it to mere tax compliance.
  alternative_readings:
  - A narrowly political statement about paying taxes only
  - A broad endorsement of absolute state authority
  rationale: The Greek states a principle of giving to Caesar what belongs to Caesar
    and to God what belongs to God. The wording should preserve the tension and distinction
    between civic obligation and ultimate divine claim without importing later doctrinal
    or political systems.
  doctrine_reference: Preserve theological tension rather than resolve it.
