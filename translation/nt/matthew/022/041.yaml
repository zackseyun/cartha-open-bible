id: MAT.22.41
reference: Matthew 22:41
source:
  edition: SBLGNT
  text: Συνηγμένων δὲ τῶν Φαρισαίων ἐπηρώτησεν αὐτοὺς ὁ Ἰησοῦς
translation:
  text: Now while the Pharisees were gathered together, Jesus asked them,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Συνηγμένων
  chosen: were gathered together
  alternatives:
  - had gathered
  - were assembled
  lexicon: BDAG
  rationale: 'Genitive absolute from συνάγω, conveying a circumstantial setting: ''while
    ... were gathered together.'' The periphrastic English preserves the participial
    background sense better than a simple finite verb. ''Together'' reflects the συν-
    prefix and the collective force, though English could omit it idiomatically.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - And
  - Then
  - ''
  lexicon: BDAG
  rationale: δέ marks a mild transition rather than strong contrast. 'Now' signals
    narrative progression naturally in English. It is not adversative here.
- source_word: τῶν Φαρισαίων
  chosen: the Pharisees
  alternatives:
  - the Pharisee party
  lexicon: BDAG
  rationale: Standard rendering of the group name Φαρισαῖοι. The genitive is governed
    by the genitive absolute construction with Συνηγμένων.
- source_word: ἐπηρώτησεν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist indicative of ἐπερωτάω, here introducing Jesus' question to the
    Pharisees. 'Asked' is the most natural modern English equivalent; 'questioned'
    can sound more adversarial than the verb itself requires in this context.
- source_word: αὐτοὺς
  chosen: them
  lexicon: BDAG
  rationale: Direct object pronoun referring to the Pharisees just mentioned.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name with article functioning as the subject. English omits the
    article before personal names.
