id: MAT.22.2
reference: Matthew 22:2
source:
  edition: SBLGNT
  text: Ὡμοιώθη ἡ βασιλεία τῶν οὐρανῶν ἀνθρώπῳ βασιλεῖ, ὅστις ἐποίησεν γάμους τῷ υἱῷ αὐτοῦ.
translation:
  text: The kingdom of heaven was compared to a king who gave a wedding feast for his son[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'may be compared to.' The Greek verb can be rendered in the familiar parabolic formula that way, though the form here is literally 'was compared to' or 'was made like.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'weddings' (plural), an idiom for wedding festivities or a wedding banquet.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὡμοιώθη
  chosen: was compared to
  alternatives:
  - may be compared to
  - was made like
  lexicon: BDAG
  rationale: Aorist passive of ὁμοιόω. In this parabolic formula, English idiom is best served by 'was compared to' rather than a wooden 'was made like.' 'May be compared to' reflects the common traditional rendering but imports a modal nuance not explicit in the aorist indicative.
- source_word: ἡ βασιλεία τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the reign of heaven
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Standard Matthean expression. 'Kingdom' is the most natural and established rendering in English, while still capable of conveying both realm and reign. 'Of heaven' preserves Matthew's wording rather than harmonizing to 'of God.'
- source_word: ἀνθρώπῳ βασιλεῖ
  chosen: a man, a king
  alternatives:
  - a king
  - a human king
  lexicon: BDAG
  rationale: The dative phrase contains both ἄνθρωπος and βασιλεύς. Rendering both terms preserves the Greek's appositional fullness. 'A man, a king' sounds natural enough in English and avoids omitting ἀνθρώπῳ. 'A human king' is possible but less idiomatic and slightly interpretive.
- source_word: ὅστις
  chosen: who
  alternatives:
  - who indeed
  - such a one as
  lexicon: BDAG
  rationale: Relative pronoun introducing the king's action. Simple 'who' is sufficient in English; stronger renderings would overstate the nuance here.
- source_word: ἐποίησεν
  chosen: gave
  alternatives:
  - made
  - prepared
  - held
  lexicon: BDAG
  rationale: Although ποιέω is literally 'made/did,' with γάμους the idiomatic sense is to hold or give a wedding celebration. 'Gave' is natural modern English for hosting a feast and fits the context of a royal banquet.
- source_word: γάμους
  chosen: a wedding feast
  alternatives:
  - wedding celebrations
  - wedding banquet
  - marriage feast
  lexicon: BDAG
  rationale: Plural γάμοι can denote wedding festivities rather than merely the marriage act. Singular 'a wedding feast' communicates the event idiomatically in English. 'Wedding banquet' is also strong, but 'feast' is slightly broader and fits the parable's celebratory setting.
- source_word: τῷ υἱῷ αὐτοῦ
  chosen: for his son
  alternatives:
  - for his son’s wedding
  - for his son
  lexicon: BDAG
  rationale: 'Dative of advantage/interest: the celebration is for the son. ''For his son'' is formally closer; the wedding sense is already carried by γάμους, so adding ''wedding'' here would be redundant.'
