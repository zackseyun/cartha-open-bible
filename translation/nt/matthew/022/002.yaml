theological_decisions:
- issue: Nature of 'kingdom of heaven' language
  chosen_reading: Retain 'kingdom of heaven' as Matthew's wording without interpretive substitution.
  alternative_readings:
  - the kingdom of God
  - the reign of heaven
  rationale: The phrase is not to be flattened into a theological paraphrase. Preserving Matthew's expression maintains literary and theological distinctiveness while leaving the realm/reign nuance intact for readers.
