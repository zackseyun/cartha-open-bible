theological_decisions:
- issue: Whether to make the king's violent judgment more interpretive by using explicitly
    lethal language for ἀπώλεσεν
  chosen_reading: Retain the broader judicial term 'destroyed' in the main text.
  alternative_readings:
  - '''killed those murderers'''
  - '''put those murderers to death'''
  rationale: The parable depicts severe royal judgment, but the Greek verb ἀπώλεσεν
    is broader than a narrowly explicit execution formula. 'Destroyed' preserves the
    source wording and leaves the full force of judgment intact without adding precision
    the text itself does not require.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Whether to render στρατεύματα as 'armies' or 'troops'
  chosen_reading: Use 'troops.'
  alternative_readings:
  - '''armies'''
  - '''soldiers'''
  rationale: This is not a doctrinal issue in itself, but it affects how concretely
    the king's judgment is portrayed. 'Troops' balances accuracy and readability,
    preserving the military sense without implying a scale beyond the Greek collective
    noun.
  doctrine_reference: Translation philosophy §§5, 6
