id: MAT.22.7
reference: Matthew 22:7
source:
  edition: SBLGNT
  text: ⸂ὁ δὲ βασιλεὺς⸃ ὠργίσθη, καὶ πέμψας τὰ στρατεύματα αὐτοῦ ἀπώλεσεν τοὺς φονεῖς
    ἐκείνους καὶ τὴν πόλιν αὐτῶν ἐνέπρησεν.
translation:
  text: But the king became angry, and sending his troops, he destroyed those murderers
    and burned their city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his armies.' The Greek term refers to military forces and can be rendered
      more broadly than 'troops.'
    reason: lexical_alternative
  - marker: b
    text: Or 'killed those murderers' or 'put those murderers to death.' The Greek
      says 'destroyed,' a broader term of judgment.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ βασιλεὺς
  chosen: But the king
  alternatives:
  - Now the king
  - And the king
  lexicon: BDAG
  rationale: βασιλεύς is straightforwardly 'king.' δέ is rendered 'But' to mark the
    narrative contrast with the previous response of the invited guests and to preserve
    the adversative turn.
- source_word: ὠργίσθη
  chosen: became angry
  alternatives:
  - was enraged
  - grew angry
  lexicon: BDAG
  rationale: Aorist passive/deponent of ὀργίζομαι conveys the king's anger. 'Became
    angry' is natural modern English and preserves the ingressive sense without overstating
    the intensity.
- source_word: πέμψας
  chosen: he sent
  alternatives:
  - sending
  - having sent
  lexicon: BDAG
  rationale: 'The aorist participle is contemporaneous/prior to the main verbs and
    is best rendered idiomatically in English as a finite verb in sequence: ''and
    he sent.'' This avoids awkwardness while preserving the action flow.'
- source_word: τὰ στρατεύματα αὐτοῦ
  chosen: his troops
  alternatives:
  - his armies
  - his soldiers
  lexicon: BDAG
  rationale: στρατεύματα denotes military forces. 'Troops' is clear, natural, and
    fits the immediate action of punitive deployment. 'Armies' is possible but can
    sound larger-scale than the context requires; 'soldiers' is slightly more individualizing
    than the collective Greek.
- source_word: ἀπώλεσεν
  chosen: destroyed
  alternatives:
  - killed
  - put to death
  lexicon: BDAG
  rationale: ἀπόλλυμι here means to destroy or bring to ruin. Because the object is
    personal ('those murderers'), English could specify 'killed,' but 'destroyed'
    better preserves the broader lexical force and matches the severe judicial tone
    of the parable.
- source_word: τοὺς φονεῖς ἐκείνους
  chosen: those murderers
  alternatives:
  - those killers
  - those murderers there
  lexicon: BDAG
  rationale: φονεύς is 'murderer,' not merely 'killer,' and ἐκείνους adds demonstrative
    emphasis, naturally rendered 'those murderers.'
- source_word: τὴν πόλιν αὐτῶν
  chosen: their city
  alternatives:
  - the city belonging to them
  - their town
  lexicon: BDAG
  rationale: πόλις is best rendered 'city' here, especially in a royal/judicial setting.
    αὐτῶν refers back to the murderers, hence 'their city.'
- source_word: ἐνέπρησεν
  chosen: burned
  alternatives:
  - set on fire
  - burned down
  lexicon: BDAG
  rationale: ἐμπίμπρημι means to set fire to or burn. 'Burned' is concise and natural;
    'burned down' is interpretive, while 'set on fire' is slightly more explicit but
    less smooth in the sequence.
