id: MAT.22.27
reference: Matthew 22:27
source:
  edition: SBLGNT
  text: ὕστερον δὲ πάντων ἀπέθανεν ⸀ἡ γυνή.
translation:
  text: Last of all[a], the woman died.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "Finally, the woman died"; Greek "Afterward/last of all, the woman died."
    reason: lexical_alternative
lexical_decisions:
- source_word: ὕστερον
  chosen: Last
  alternatives:
  - Later
  - Afterward
  - Finally
  lexicon: BDAG
  rationale: 'In this idiom with πάντων, ὕστερον conveys sequence in a summary sense: ''last'' or ''finally.'' ''Last'' is the most natural English in the phrase ''last of all.'''
- source_word: δὲ
  chosen: of all,
  alternatives:
  - and
  - then
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective. In English, its force is best absorbed into the idiomatic phrase 'last of all' rather than represented by a separate conjunction.
- source_word: πάντων
  chosen: of all
  alternatives:
  - of them all
  - after all
  lexicon: BDAG
  rationale: Genitive plural with ὕστερον forms the idiom 'last of all,' referring to the previously mentioned brothers. 'Of all' is concise and natural.
- source_word: ἀπέθανεν
  chosen: died
  alternatives:
  - passed away
  lexicon: BDAG
  rationale: The aorist indicative simply states the event of death. 'Died' is the plain, direct equivalent and avoids euphemism.
- source_word: ἡ γυνή
  chosen: the woman
  alternatives:
  - the wife
  lexicon: BDAG
  rationale: γυνή can mean 'woman' or 'wife.' Here the referent is the woman in the levirate-marriage scenario; 'the woman' best matches the Greek wording and avoids implying a single husband's perspective in a context involving multiple husbands.
