id: MAT.22.36
reference: Matthew 22:36
source:
  edition: SBLGNT
  text: Διδάσκαλε, ποία ἐντολὴ μεγάλη ἐν τῷ νόμῳ;
translation:
  text: Teacher[a], which commandment is greatest in the Law?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'which commandment is the greatest in the Law?'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of address to Jesus. 'Teacher' is the plain and standard sense of διδάσκαλος in this context and avoids the potentially misleading hierarchical nuance of 'Master.'
- source_word: ποία
  chosen: which
  alternatives:
  - what sort of
  - which one
  lexicon: BDAG
  rationale: Interrogative adjective asking for identification within a set. 'Which' best fits the question about one commandment among the commandments of the Law.
- source_word: ἐντολὴ
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: In Jewish legal and scriptural context, ἐντολή is well rendered 'commandment,' preserving the connection to the commandments of the Mosaic Law.
- source_word: μεγάλη
  chosen: great
  alternatives:
  - greatest
  - important
  lexicon: BDAG
  rationale: The adjective is positive, not superlative. 'Great' reflects the Greek form directly. Because the idiomatic sense in context may imply rank or primacy, 'greatest' is preserved in a footnote rather than imported into the main text.
- source_word: ἐν τῷ νόμῳ
  chosen: in the Law
  alternatives:
  - in the law
  - in the Torah
  lexicon: BDAG
  rationale: νόμος here refers specifically to the Jewish Law/Torah. Capitalized 'Law' signals this recognized scriptural referent in English. 'Torah' is possible but less immediately accessible for the target audience.
