  chosen_reading: great
  alternative_readings:
  - greatest
  rationale: The Greek uses the positive adjective μεγάλη rather than an explicit superlative. To preserve the source wording and avoid over-interpretation, the main text keeps 'great,' while the common idiomatic alternative 'greatest' is preserved in a footnote because the context concerns ranking among commandments.
