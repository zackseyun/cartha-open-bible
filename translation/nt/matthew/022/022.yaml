id: MAT.22.22
reference: Matthew 22:22
source:
  edition: SBLGNT
  text: καὶ ἀκούσαντες ἐθαύμασαν, καὶ ἀφέντες αὐτὸν ἀπῆλθαν.
translation:
  text: And when they heard it, they were amazed, and leaving him, they went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having heard, they marveled, and leaving him, they departed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when they heard it
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist active participle, nominative plural, functioning temporally before
    the main verb. English idiom is smoother with an explicit temporal clause. 'It'
    is supplied because the object is implicit from context and natural in English.
- source_word: ἐθαύμασαν
  chosen: they were amazed
  alternatives:
  - they marveled
  - they were astonished
  lexicon: BDAG
  rationale: The verb θαυμάζω denotes wonder or amazement. 'Were amazed' is clear
    modern English and fits the reaction to Jesus' answer. 'Marveled' is traditional
    but slightly less natural for contemporary readers.
- source_word: ἀφέντες αὐτὸν
  chosen: leaving him
  alternatives:
  - having left him
  - leaving him alone
  lexicon: BDAG
  rationale: Aorist participle of ἀφίημι here carries the sense of departing from
    or leaving someone. 'Leaving him' is the most direct rendering. 'Leaving him alone'
    adds nuance not explicit in the Greek.
- source_word: ἀπῆλθαν
  chosen: they went away
  alternatives:
  - they departed
  - they went off
  lexicon: BDAG
  rationale: ἀπέρχομαι means to go away or depart. 'Went away' is natural, readable
    English and preserves the narrative movement without sounding overly formal.
- source_word: καὶ ... καὶ
  chosen: and ... and
  alternatives:
  - then ... and
  - and then ...
  lexicon: BDAG
  rationale: The repeated καί links the sequence of actions straightforwardly. Retaining
    'and' reflects the Greek coordination and preserves the brisk narrative flow.
