theological_decisions:
- issue: Moral characterization of those gathered
  chosen_reading: both evil and good
  alternative_readings:
  - both bad and good
  rationale: The verse emphasizes the indiscriminate scope of the invitation without resolving the parable's later distinction between mere attendance and proper response. Rendering πονηρούς as 'evil' preserves the moral edge of the Greek while not importing a doctrinal conclusion beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
