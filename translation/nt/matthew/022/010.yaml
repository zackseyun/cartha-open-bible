id: MAT.22.10
reference: Matthew 22:10
source:
  edition: SBLGNT
  text: καὶ ἐξελθόντες οἱ δοῦλοι ἐκεῖνοι εἰς τὰς ὁδοὺς συνήγαγον πάντας ⸀οὓς εὗρον, πονηρούς τε καὶ ἀγαθούς· καὶ ἐπλήσθη ὁ ⸀γάμος ἀνακειμένων.
translation:
  text: And those slaves went out into the roads and gathered everyone they found[a], both evil and good[c][b]; and the wedding hall was filled with guests reclining at the table.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "both bad and good."
    reason: lexical_alternative
  - marker: b
    text: Greek "the wedding"; here the term likely refers to the wedding feast or its hall, since it is described as being filled with diners.
    reason: lexical_alternative
  - marker: c
    text: That is, reclining in the customary posture for a formal meal.
    reason: cultural_note
lexical_decisions:
- source_word: δοῦλοι
  chosen: slaves
  alternatives:
  - servants
  - bondservants
  lexicon: BDAG
  rationale: The default for δοῦλος is context-dependent. In this parable, the figures are household agents under a king's authority; 'slaves' better preserves the bonded status than 'servants,' in line with the project's preference to avoid softening the term where the underlying social reality remains visible.
- source_word: ὁδοὺς
  chosen: roads
  alternatives:
  - streets
  - highways
  lexicon: BDAG
  rationale: ὁδός commonly means 'road' or 'way.' Here it refers broadly to public thoroughfares where people may be found, not necessarily urban streets. 'Roads' is natural modern English and fits the plural.
- source_word: συνήγαγον
  chosen: gathered
  alternatives:
  - collected
  - brought together
  lexicon: BDAG
  rationale: συνάγω means to gather or bring together. 'Gathered' is the most direct and idiomatic rendering in this narrative context.
- source_word: πάντας οὓς εὗρον
  chosen: everyone they found
  alternatives:
  - all whom they found
  - all they found
  lexicon: BDAG
  rationale: The phrase is comprehensive and personal. 'Everyone they found' communicates the inclusive scope in clear modern English while preserving the sense of πάντας with the relative clause.
- source_word: πονηρούς τε καὶ ἀγαθούς
  chosen: both evil and good
  alternatives:
  - both bad and good
  - both wicked and good
  lexicon: BDAG
  rationale: πονηρός can mean evil, bad, or wicked; ἀγαθός means good. 'Evil and good' preserves the moral contrast more strongly than the flatter 'bad and good,' which suits the parable's surprising inclusiveness.
- source_word: γάμος
  chosen: wedding hall
  alternatives:
  - wedding feast
  - wedding
  - banquet hall
  lexicon: BDAG
  rationale: γάμος can denote the wedding celebration/banquet, but here it is said to be 'filled' with reclining guests, which points to the venue or assembled feast scene rather than the abstract event. 'Wedding hall' makes the image explicit in English.
- source_word: ἐπλήσθη
  chosen: was filled
  alternatives:
  - became full
  - was filled up
  lexicon: BDAG
  rationale: The passive verb straightforwardly indicates that the place came to be full. 'Was filled' is the natural English equivalent.
- source_word: ἀνακειμένων
  chosen: with guests reclining at the table
  alternatives:
  - with those reclining
  - with diners
  lexicon: BDAG
  rationale: ἀνάκειμαι refers to reclining for a meal, a standard banquet posture in the ancient Mediterranean world. Because English readers may not infer banquet context from 'reclining' alone, 'with guests reclining at the table' makes the participle's force clear while remaining faithful to the scene.
