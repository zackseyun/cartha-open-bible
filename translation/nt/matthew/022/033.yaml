id: MAT.22.33
reference: Matthew 22:33
source:
  edition: SBLGNT
  text: καὶ ἀκούσαντες οἱ ὄχλοι ἐξεπλήσσοντο ἐπὶ τῇ διδαχῇ αὐτοῦ.
translation:
  text: And when the crowds heard it[a], they were astonished at his teaching.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'after hearing this' or more formally 'having heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: when [they] heard it
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist active participle, nominative plural, modifying 'the crowds.' In natural English, a temporal clause best conveys the participial relation here. 'Heard it' supplies the implied object from context, namely Jesus' preceding answer.
- source_word: οἱ ὄχλοι
  chosen: the crowds
  alternatives:
  - the crowd
  - the multitudes
  lexicon: BDAG
  rationale: Plural noun with article; 'the crowds' preserves the Greek plural better than singular 'the crowd.' 'Multitudes' is possible but less natural in contemporary English.
- source_word: ἐξεπλήσσοντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were astounded
  lexicon: BDAG
  rationale: Imperfect middle/passive indicative expressing the crowds' ongoing or vivid reaction. 'Were astonished' captures the force well in readable modern English without overstating it.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  chosen: at his teaching
  alternatives:
  - because of his teaching
  - at his doctrine
  lexicon: BDAG
  rationale: ἐπί with the dative here marks the basis or occasion of astonishment. 'At his teaching' is idiomatic and preserves διδαχή as 'teaching.' 'Doctrine' is more traditional but sounds more technical than the context requires.
- source_word: καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Simple connective linking this reaction to the preceding exchange. 'And' is sufficiently transparent and formal enough for narrative continuity.
