id: MAT.22.8
reference: Matthew 22:8
source:
  edition: SBLGNT
  text: τότε λέγει τοῖς δούλοις αὐτοῦ· Ὁ μὲν γάμος ἕτοιμός ἐστιν, οἱ δὲ κεκλημένοι οὐκ ἦσαν ἄξιοι·
translation:
  text: Then he says to his servants[a], ‘The wedding feast is ready, but those who were invited were not worthy.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'those who were called.' The Greek participle can be rendered more literally this way, but in this banquet context it refers to those invited to the wedding feast.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal adverb introducing the next step in the narrative; 'Then' is natural modern English and preserves sequence.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Greek uses the historical present; rendering as present ('he says') preserves the narrative vividness of the source better than flattening to simple past.
- source_word: δούλοις
  chosen: servants
  alternatives:
  - slaves
  lexicon: BDAG
  rationale: Although δοῦλος can mean 'slave,' in this parabolic court setting the bonded status is not theologically salient in this verse; 'servants' fits the context and aligns with the doctrine guideline allowing context-dependent rendering.
- source_word: Ὁ μὲν γάμος
  chosen: The wedding feast
  alternatives:
  - The wedding
  - The marriage feast
  - The banquet
  lexicon: BDAG
  rationale: γάμος can denote the wedding celebration/banquet, not merely the marriage event. In this parable the prepared meal is in view, so 'wedding feast' best conveys the sense in idiomatic English. The particle μὲν is reflected in the contrastive structure completed by 'but' later in the sentence rather than translated separately.
- source_word: ἕτοιμός ἐστιν
  chosen: is ready
  alternatives:
  - has been prepared
  lexicon: BDAG
  rationale: Simple predicate adjective plus copula; 'is ready' is the most direct and natural rendering.
- source_word: οἱ δὲ κεκλημένοι
  chosen: those who were invited
  alternatives:
  - the invited ones
  - those who had been called
  lexicon: BDAG
  rationale: Perfect passive participle of καλέω here refers to invited guests in the banquet context. 'Invited' communicates the social sense clearly; 'called' would be more ambiguous in English and could import theological overtones not required by the immediate context.
- source_word: οὐκ ἦσαν ἄξιοι
  chosen: were not worthy
  alternatives:
  - were not fit
  - did not deserve it
  lexicon: BDAG
  rationale: ἄξιος means worthy/fit/deserving. 'Were not worthy' is the most transparent rendering and preserves the evaluative force without overinterpreting the basis of unworthiness.
