theological_decisions:
- issue: Potential theological overtones of κεκλημένοι ('called') in a parable context
  chosen_reading: Render as 'those who were invited'
  alternative_readings:
  - those who were called
  rationale: In this immediate context the referent is plainly the previously summoned wedding guests, so the banquet sense 'invited' is primary. Using 'called' in the main text could suggest later theological categories of calling/election more strongly than the verse itself requires. The alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
