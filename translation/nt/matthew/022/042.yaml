id: MAT.22.42
reference: Matthew 22:42
source:
  edition: SBLGNT
  text: λέγων· Τί ὑμῖν δοκεῖ περὶ τοῦ χριστοῦ; τίνος υἱός ἐστιν; λέγουσιν αὐτῷ· Τοῦ
    Δαυίδ.
translation:
  text: saying, “What do you think about the Messiah? Whose son is he?” They said
    to him, “David’s.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Christ.” The Greek title is Χριστός (Christos), here used in its
      messianic sense.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - asking
  lexicon: BDAG
  rationale: Present participle of λέγω introducing Jesus' speech. 'Saying' is the
    straightforward formal rendering and fits the narrative flow without adding interpretive
    nuance.
- source_word: Τί ὑμῖν δοκεῖ
  chosen: What do you think
  alternatives:
  - What does it seem to you
  - What is your opinion
  lexicon: BDAG
  rationale: δοκέω with dative commonly asks for someone's judgment or opinion. 'What
    do you think' is idiomatic modern English that preserves the sense without wooden
    literalism.
- source_word: περὶ τοῦ χριστοῦ
  chosen: about the Messiah
  alternatives:
  - about the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός is rendered 'Messiah' where it functions as a title
    rather than a name. Here the phrase is clearly titular and embedded in Jewish
    messianic discussion.
- source_word: τίνος υἱός ἐστιν
  chosen: Whose son is he
  alternatives:
  - Whose son is the Messiah
  - He is whose son
  lexicon: BDAG
  rationale: A direct question about lineage/descent. English requires an explicit
    pronoun for natural style; 'he' refers back to 'the Messiah.' This preserves the
    filial and dynastic sense of υἱός.
- source_word: λέγουσιν αὐτῷ
  chosen: They said to him
  alternatives:
  - They say to him
  lexicon: BDAG
  rationale: Historical present in Greek narrative is commonly rendered as simple
    past in English for readability. 'To him' preserves the indirect object αὐτῷ.
- source_word: Τοῦ Δαυίδ
  chosen: David’s
  alternatives:
  - The son of David
  - Of David
  lexicon: BDAG
  rationale: The genitive answer is elliptical in Greek, supplying the omitted noun
    from the question. 'David's' is concise, natural English and accurately reflects
    the ellipsis; 'The son of David' is interpretive expansion rather than direct
    translation.
