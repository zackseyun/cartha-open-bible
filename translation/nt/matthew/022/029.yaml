id: MAT.22.29
reference: Matthew 22:29
source:
  edition: SBLGNT
  text: Ἀποκριθεὶς δὲ ὁ Ἰησοῦς εἶπεν αὐτοῖς· Πλανᾶσθε μὴ εἰδότες τὰς γραφὰς μηδὲ τὴν
    δύναμιν τοῦ θεοῦ·
translation:
  text: But Jesus answered them, “You are mistaken, because you know neither the Scriptures
    nor the power of God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “You are deceived” or “You are in error.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκριθεὶς δὲ
  chosen: But ... answered
  alternatives:
  - And ... answered
  - In reply ... answered
  lexicon: BDAG
  rationale: Ἀποκριθεὶς is the common participial formula 'answering/responding,'
    and δέ is mildly adversative or transitional. 'But Jesus answered' is natural
    English and preserves the discourse shift without overtranslating the participle.
- source_word: εἶπεν αὐτοῖς
  chosen: Jesus answered them
  alternatives:
  - said to them
  lexicon: BDAG
  rationale: Although εἶπεν literally means 'said,' in combination with Ἀποκριθεὶς
    it functions idiomatically as a response formula. 'Answered them' avoids wooden
    redundancy ('answering ... said') while preserving the sense.
- source_word: Πλανᾶσθε
  chosen: You are mistaken
  alternatives:
  - You are deceived
  - You are in error
  - You go astray
  lexicon: BDAG
  rationale: The present passive/middle here conveys being in error or led astray.
    'You are mistaken' is clear modern English and fits the polemical context without
    implying only external deception. Alternatives are possible, but this rendering
    best balances accuracy and readability.
- source_word: μὴ εἰδότες
  chosen: because you know not / because you know neither
  alternatives:
  - not knowing
  - since you do not know
  lexicon: BDAG
  rationale: The participial phrase gives the reason for their error. In idiomatic
    English, 'because you know neither...' best conveys the causal force and prepares
    for the paired μηδέ construction.
- source_word: τὰς γραφὰς
  chosen: the Scriptures
  alternatives:
  - the writings
  - the scriptural writings
  lexicon: BDAG
  rationale: γραφή in the plural in Jewish and early Christian usage refers to the
    sacred writings. 'The Scriptures' is the standard and accurate rendering.
- source_word: μηδὲ τὴν δύναμιν τοῦ θεοῦ
  chosen: nor the power of God
  alternatives:
  - nor God's power
  lexicon: BDAG
  rationale: δύναμις is straightforwardly 'power.' The genitive τοῦ θεοῦ is naturally
    rendered 'of God'; 'God's power' is also possible, but 'the power of God' preserves
    the formal weight of the Greek.
- source_word: τοῦ θεοῦ
  chosen: God
  lexicon: BDAG
  rationale: θεός here refers to the one true God in a Jewish scriptural context.
    No special title issue or contested term applies beyond the standard rendering
    'God'.
