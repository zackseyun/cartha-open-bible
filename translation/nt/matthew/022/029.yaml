theological_decisions:
- issue: Cause of the Sadducees' error
  chosen_reading: Jesus states that their error is due to ignorance of both the Scriptures
    and God's power.
  alternative_readings:
  - Jesus states only that they are generally deceived, without emphasizing causation.
  rationale: The participial construction μὴ εἰδότες with the paired objects naturally
    explains why they are mistaken. The translation preserves that causal relationship
    rather than flattening it into a bare accusation.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
