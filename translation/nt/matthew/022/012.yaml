id: MAT.22.12
reference: Matthew 22:12
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ· Ἑταῖρε, πῶς εἰσῆλθες ὧδε μὴ ἔχων ἔνδυμα γάμου; ὁ δὲ ἐφιμώθη.
translation:
  text: And he says to him[a], ‘Friend, how did you come in here without a wedding garment?’ But he was speechless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “was silenced.” The Greek verb can also mean “was muzzled.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑταῖρε
  chosen: Friend
  alternatives:
  - Companion
  - Sir
  lexicon: BDAG
  rationale: Vocative address used by Jesus/host in Matthew with a formal but distancing tone; 'Friend' is the most natural English equivalent and preserves the irony without overstating hostility.
- source_word: πῶς
  chosen: how
  alternatives:
  - why
  lexicon: BDAG
  rationale: The adverb asks about manner or means, not motive; 'how' best reflects the Greek.
- source_word: εἰσῆλθες ὧδε
  chosen: did you come in here
  alternatives:
  - did you enter here
  - have you come in here
  lexicon: BDAG
  rationale: Aorist indicative refers to the completed act of entering; 'come in here' is idiomatic modern English while preserving the sense of entry into this place.
- source_word: μὴ ἔχων
  chosen: without
  alternatives:
  - not having
  lexicon: BDAG
  rationale: The participial construction is naturally rendered in English with 'without,' preserving the attendant circumstance of lacking the required garment.
- source_word: ἔνδυμα γάμου
  chosen: wedding garment
  alternatives:
  - wedding clothes
  - wedding robe
  lexicon: BDAG
  rationale: A singular garment/clothing item associated with a wedding feast; 'wedding garment' is clear, fairly literal, and avoids over-specifying the exact type of clothing.
- source_word: ἐφιμώθη
  chosen: was speechless
  alternatives:
  - was silenced
  - was muzzled
  lexicon: BDAG
  rationale: Passive of φιμόω literally means 'to muzzle' and idiomatically 'to silence.' In this context the man is unable to answer; 'was speechless' communicates the result in natural English, while the more literal alternative is preserved in a footnote.
