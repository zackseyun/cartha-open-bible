theological_decisions:
- issue: Tone of the host's address to the improperly dressed guest
  chosen_reading: A courteous but implicitly reproving 'Friend'
  alternative_readings:
  - A harsher address such as 'Fellow' or 'Companion'
  rationale: The verse does not require a doctrinally loaded interpretation; the chosen rendering preserves the narrative tension without importing either warmth or contempt beyond the Greek vocative.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Rendering of ἐφιμώθη
  chosen_reading: Result-focused idiom 'was speechless' in the main text
  alternative_readings:
  - More literal 'was silenced'
  rationale: Optimal equivalence favors readable modern English while preserving the force of the passive. Because the Greek verb has a vivid literal background ('muzzle'), a more literal alternative is preserved in a footnote rather than forced into the main text.
  doctrine_reference: Translation philosophy §§5, 6
