id: MAT.22.3
reference: Matthew 22:3
source:
  edition: SBLGNT
  text: καὶ ἀπέστειλεν τοὺς δούλους αὐτοῦ καλέσαι τοὺς κεκλημένους εἰς τοὺς γάμους,
    καὶ οὐκ ἤθελον ἐλθεῖν.
translation:
  text: And he sent his servants to call those who had been invited to the wedding
    feast, and they were unwilling to come.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'slaves.' The Greek word can denote either servants or slaves; here
      'servants' was chosen because the parable emphasizes their role as the king's
      agents rather than their bonded status.
    reason: lexical_alternative
  - marker: b
    text: Or, 'those who had been called.' The Greek repeats the same verb family
      as 'to call,' but in this context it refers to those already invited.
    reason: lexical_alternative
  - marker: c
    text: Or, 'to the wedding banquet.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: Aorist indicative of ἀποστέλλω is straightforwardly rendered 'sent.'
    'Dispatched' is possible but less natural in modern English and adds a nuance
    not required by the context.
- source_word: δούλους
  chosen: servants
  alternatives:
  - slaves
  lexicon: BDAG
  rationale: δοῦλος can mean 'slave' or 'servant.' Per doctrine, 'slave' is preferred
    where bonded status is theologically salient. In this parabolic narrative, the
    focus is on the king's emissaries carrying out his command, not on the social
    institution of slavery, so 'servants' best fits the context while preserving readability.
- source_word: καλέσαι
  chosen: to call
  alternatives:
  - to summon
  - to invite
  lexicon: BDAG
  rationale: The infinitive expresses purpose after 'sent.' 'To call' preserves the
    lexical connection with κεκλημένους ('those who had been invited/called'). 'To
    invite' would be smoother but would obscure the verbal repetition in Greek.
- source_word: κεκλημένους
  chosen: those who had been invited
  alternatives:
  - those who had been called
  - the invited ones
  lexicon: BDAG
  rationale: Perfect passive participle of καλέω refers to people already invited.
    'Those who had been invited' communicates the prior completed invitation naturally
    in English. 'Called' is more literal but less clear in this banquet context.
- source_word: εἰς τοὺς γάμους
  chosen: to the wedding feast
  alternatives:
  - to the wedding
  - to the wedding banquet
  lexicon: BDAG
  rationale: γάμοι in this context refers to the wedding celebration/banquet, not
    merely the marriage event itself. 'Wedding feast' captures the social setting
    of the parable in idiomatic English.
- source_word: οὐκ ἤθελον ἐλθεῖν
  chosen: they were unwilling to come
  alternatives:
  - they did not want to come
  - they refused to come
  lexicon: BDAG
  rationale: ἤθελον with infinitive denotes volition. 'They were unwilling to come'
    preserves the emphasis on their will. 'Refused' is a plausible contextual inference,
    but it is slightly stronger than the Greek wording.
