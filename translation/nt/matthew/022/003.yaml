theological_decisions:
- issue: Rendering of δοῦλος in a parabolic narrative
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The doctrine excerpt allows 'servant / slave' context-dependently. Here
    the parable emphasizes the king's messengers and the invited guests' response,
    not the bonded status of the messengers. Therefore 'servants' is the best contextual
    rendering without importing unnecessary social emphasis.
