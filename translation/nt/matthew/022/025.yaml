theological_decisions:
- issue: Whether to make the levirate-marriage background explicit in the main text
  chosen_reading: Keep the wording implicit and translate only what the Greek states.
  alternative_readings:
  - Expand to 'left his wife for his brother to marry'
  rationale: The legal background from Deuteronomy 25:5 is clearly assumed, but the
    Greek text itself does not explicitly add 'to marry' here. In keeping with optimal
    equivalence and the instruction not to paraphrase beyond the source, the main
    text remains concise while the cultural/legal implication can be preserved in
    a footnote.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
