id: MAT.22.25
reference: Matthew 22:25
source:
  edition: SBLGNT
  text: ἦσαν δὲ παρ’ ἡμῖν ἑπτὰ ἀδελφοί· καὶ ὁ πρῶτος ⸀γήμας ἐτελεύτησεν, καὶ μὴ ἔχων
    σπέρμα ἀφῆκεν τὴν γυναῖκα αὐτοῦ τῷ ἀδελφῷ αὐτοῦ·
translation:
  text: Now there were seven brothers among us. The first married and died, and having
    no offspring, he left his wife to his brother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'having no seed.' Here 'seed' means offspring or descendants.
    reason: lexical_alternative
  - marker: b
    text: This reflects the levirate-marriage custom, in which a deceased man's brother
      was expected to marry the widow to raise up offspring for him; see Deuteronomy
      25:5.
    reason: cultural_note
lexical_decisions:
- source_word: παρ’ ἡμῖν
  chosen: among us
  alternatives:
  - with us
  - in our midst
  lexicon: BDAG
  rationale: παρά with the dative here indicates association or presence in the group
    being described. 'Among us' is idiomatic English and fits the Sadducees' framing
    of a hypothetical case within their community.
- source_word: ἑπτὰ ἀδελφοί
  chosen: seven brothers
  alternatives:
  - seven brothers/kinsmen
  lexicon: BDAG
  rationale: ἀδελφοί in this context plainly refers to male siblings in a levirate-marriage
    scenario, so 'brothers' is the accurate gender-specific rendering.
- source_word: ὁ πρῶτος
  chosen: the first
  alternatives:
  - the oldest
  - the first one
  lexicon: BDAG
  rationale: πρῶτος here marks sequence within the set of brothers, not necessarily
    age rank, so 'the first' is best.
- source_word: γήμας
  chosen: married
  alternatives:
  - having married
  - after marrying
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb and indicates that
    he entered marriage before he died. 'Married' gives natural English while preserving
    the sequence.
- source_word: ἐτελεύτησεν
  chosen: died
  alternatives:
  - passed away
  - came to his end
  lexicon: BDAG
  rationale: τελευτάω means to die or come to the end of life. 'Died' is direct, clear,
    and avoids euphemism.
- source_word: μὴ ἔχων σπέρμα
  chosen: having no offspring
  alternatives:
  - having no children
  - having no seed
  lexicon: BDAG
  rationale: σπέρμα literally means 'seed,' but in this familial/legal context it
    refers to descendants or offspring. 'Having no offspring' preserves the legal-genealogical
    sense better than the more colloquial 'no children,' while avoiding the opaque
    literalism 'no seed' in the main text.
- source_word: ἀφῆκεν τὴν γυναῖκα αὐτοῦ
  chosen: he left his wife
  alternatives:
  - he left behind his wife
  lexicon: BDAG
  rationale: ἀφίημι here means to leave behind at death, not to divorce or abandon.
    'Left his wife' is concise; the context of death prevents misunderstanding, though
    the nuance is noted here.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  chosen: to his brother
  alternatives:
  - for his brother
  lexicon: BDAG
  rationale: The dative marks the surviving brother as the one to whom the widow is
    left in accordance with levirate expectation. 'To his brother' is the most straightforward
    rendering.
