id: MAT.22.30
reference: Matthew 22:30
source:
  edition: SBLGNT
  text: ἐν γὰρ τῇ ἀναστάσει οὔτε γαμοῦσιν οὔτε ⸀γαμίζονται, ἀλλ’ ὡς ἄγγελοι ⸀θεοῦ
    ἐν ⸀τῷ οὐρανῷ εἰσιν·
translation:
  text: For in the resurrection they neither marry nor are given in marriage, but
    are like the angels of God in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'at the resurrection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ... τῇ ἀναστάσει
  chosen: in the resurrection
  alternatives:
  - at the resurrection
  - in the resurrection state
  lexicon: BDAG
  rationale: The prepositional phrase is most naturally rendered 'in the resurrection,'
    referring to the condition or time of resurrected life. 'At the resurrection'
    is possible, but 'in' preserves the Greek preposition and fits the ensuing description
    of ongoing existence.
- source_word: γαμοῦσιν
  chosen: marry
  alternatives:
  - take wives
  - enter into marriage
  lexicon: BDAG
  rationale: A general verb for marrying. 'Marry' is idiomatic modern English and
    avoids over-specifying the male-oriented nuance that English no longer naturally
    carries in this form.
- source_word: γαμίζονται
  chosen: are given in marriage
  alternatives:
  - are married off
  lexicon: BDAG
  rationale: The passive form is distinct from γαμοῦσιν and traditionally refers to
    being given in marriage. Rendering both verbs differently preserves the Greek
    distinction between marrying and being given in marriage.
- source_word: ὡς
  chosen: like
  alternatives:
  - as
  lexicon: BDAG
  rationale: Here ὡς marks comparison, not identity. 'Like' makes clear that resurrected
    people are compared to angels in this respect, not said to become angels.
- source_word: ἄγγελοι θεοῦ
  chosen: the angels of God
  alternatives:
  - God's angels
  - angels
  lexicon: BDAG
  rationale: The genitive θεοῦ is present in the source and should be represented.
    'The angels of God' is slightly more formal and transparent to the Greek than
    simply 'angels.'
- source_word: ἐν τῷ οὐρανῷ
  chosen: in heaven
  alternatives:
  - in the heavenly realm
  - in the sky
  lexicon: BDAG
  rationale: οὐρανός here refers to heaven, the dwelling place of angels, not the
    physical sky. 'In heaven' is the natural English equivalent.
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement. 'For' preserves the
    explanatory connection succinctly.
