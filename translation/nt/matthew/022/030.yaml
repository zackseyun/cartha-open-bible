theological_decisions:
- issue: Nature of the comparison with angels
  chosen_reading: Resurrected people are like angels with respect to not marrying,
    not transformed into angels.
  alternative_readings:
  - The comparison could be overextended to imply a broader angelic mode of existence.
  rationale: The particle ὡς introduces comparison, and the immediate context specifies
    the point of comparison as the absence of marriage in the resurrection. The translation
    therefore uses 'like,' preserving similarity without implying identity or ontological
    change.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it'
