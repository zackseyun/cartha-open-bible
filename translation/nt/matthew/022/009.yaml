id: MAT.22.9
reference: Matthew 22:9
source:
  edition: SBLGNT
  text: πορεύεσθε οὖν ἐπὶ τὰς διεξόδους τῶν ὁδῶν, καὶ ὅσους ⸀ἐὰν εὕρητε καλέσατε εἰς τοὺς γάμους.
translation:
  text: Therefore go to the street intersections[b][a], and invite to the wedding feast as many as you find.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the crossroads' or 'to the road exits'; the Greek refers to places where roads branch out or meet.
    reason: lexical_alternative
  - marker: b
    text: Greek 'to the weddings,' an idiom meaning the wedding celebration or banquet.
    reason: lexical_alternative
lexical_decisions:
- source_word: πορεύεσθε
  chosen: go
  alternatives:
  - be going
  - travel
  lexicon: BDAG
  rationale: A present middle/passive imperative with straightforward directive force. 'Go' is idiomatic modern English and preserves the command without unnecessary formality.
- source_word: οὖν
  chosen: therefore
  alternatives:
  - then
  - so
  lexicon: BDAG
  rationale: Marks inference/result from the preceding instruction. 'Therefore' preserves the logical connection more explicitly than 'then' or 'so'.
- source_word: ἐπὶ τὰς διεξόδους τῶν ὁδῶν
  chosen: to the street intersections
  alternatives:
  - to the main roads
  - to the road exits
  - to the crossroads
  lexicon: BDAG
  rationale: διέξοδοι literally denotes outlets/exits, here idiomatically the places where roads branch out or meet. 'Street intersections' gives a clear modern equivalent without over-specifying geography. 'Crossroads' is possible, but 'intersections' better reflects plural urban/public thoroughfares in readable English.
- source_word: ὅσους ἐὰν εὕρητε
  chosen: as many as you find
  alternatives:
  - whoever you find
  - all whom you find
  lexicon: BDAG
  rationale: 'The construction expresses indefiniteness and breadth: ''as many as you find.'' This preserves the quantitative openness of ὅσους with ἐάν better than the singular-sounding ''whoever.'''
- source_word: καλέσατε
  chosen: invite
  alternatives:
  - call
  - summon
  lexicon: BDAG
  rationale: In banquet context καλέω means to invite rather than merely call aloud. 'Invite' communicates the social action naturally in English.
- source_word: εἰς τοὺς γάμους
  chosen: to the wedding feast
  alternatives:
  - to the wedding
  - to the marriage feast
  lexicon: BDAG
  rationale: Plural γάμοι in this context refers to the wedding celebration/banquet, not multiple weddings. 'Wedding feast' makes the banquet setting explicit and fits the parable's imagery.
