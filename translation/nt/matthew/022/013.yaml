id: MAT.22.13
reference: Matthew 22:13
source:
  edition: SBLGNT
  text: τότε ⸂ὁ βασιλεὺς εἶπεν⸃ τοῖς διακόνοις· Δήσαντες αὐτοῦ πόδας καὶ χεῖρας ⸂ἐκβάλετε
    αὐτὸν⸃ εἰς τὸ σκότος τὸ ἐξώτερον· ἐκεῖ ἔσται ὁ κλαυθμὸς καὶ ὁ βρυγμὸς τῶν ὀδόντων.
translation:
  text: Then the king said to the attendants, ‘Bind his feet and hands and throw him
    out into the outer darkness. In that place there will be weeping and gnashing
    of teeth.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Bind his hands and feet and cast him out into the darkness outside.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal adverb introducing the next event in the narrative;
    'Then' is natural and sufficiently formal.
- source_word: ὁ βασιλεὺς
  chosen: the king
  alternatives:
  - the ruler
  lexicon: BDAG
  rationale: βασιλεύς straightforwardly denotes a king in the parable setting; 'king'
    preserves the royal imagery.
- source_word: τοῖς διακόνοις
  chosen: to the attendants
  alternatives:
  - to the servants
  - to the ministers
  lexicon: BDAG
  rationale: διάκονος can mean servant, attendant, or minister depending on context.
    In this banquet-parable scene, 'attendants' best fits those serving the king without
    importing later ecclesial overtones of 'minister' or the stronger household-status
    sense of 'servants'.
- source_word: Δήσαντες
  chosen: Tie
  alternatives:
  - Bind
  - After tying
  lexicon: BDAG
  rationale: 'Aorist participle of δέω preceding the main imperative. English idiom
    commonly renders the participle imperativally with the following command: ''Tie
    ... and throw him out.'' ''Bind'' is possible but less natural for modern readers.'
- source_word: αὐτοῦ πόδας καὶ χεῖρας
  chosen: his feet and hands
  alternatives:
  - his hands and feet
  lexicon: BDAG
  rationale: The Greek order is 'feet and hands,' so the translation preserves that
    order rather than conforming to the more familiar English idiom 'hands and feet.'
- source_word: ἐκβάλετε αὐτὸν
  chosen: throw him out
  alternatives:
  - cast him out
  - drive him out
  lexicon: BDAG
  rationale: ἐκβάλλω here is forceful expulsion. 'Throw him out' conveys the abruptness
    and severity in clear modern English; 'cast him out' is more traditional but less
    contemporary.
- source_word: εἰς τὸ σκότος τὸ ἐξώτερον
  chosen: into the outer darkness
  alternatives:
  - into the darkness outside
  - into the farthest darkness
  lexicon: BDAG
  rationale: This is a recognizable Matthean expression. 'Outer darkness' preserves
    the phrase's literary and theological force while remaining intelligible. 'Darkness
    outside' is possible but less idiomatic in English.
- source_word: ἐκεῖ
  chosen: In that place
  alternatives:
  - There
  lexicon: BDAG
  rationale: Rendered explicitly as 'In that place' to avoid repetitive bare 'there'
    after 'outer darkness' and to preserve the locative emphasis of ἐκεῖ.
- source_word: ἔσται
  chosen: there will be
  alternatives:
  - there shall be
  lexicon: BDAG
  rationale: Future of εἰμί; 'there will be' is the natural modern English equivalent.
- source_word: ὁ κλαυθμὸς
  chosen: weeping
  alternatives:
  - wailing
  lexicon: BDAG
  rationale: κλαυθμός denotes crying/weeping, often with lament. 'Weeping' preserves
    the standard Matthean collocation and avoids overstating the term.
- source_word: ὁ βρυγμὸς τῶν ὀδόντων
  chosen: gnashing of teeth
  alternatives:
  - grinding of teeth
  lexicon: BDAG
  rationale: Established and accurate rendering of the idiom; it conveys anguish and/or
    rage without unnecessary paraphrase.
