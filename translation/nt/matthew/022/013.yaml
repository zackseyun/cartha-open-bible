theological_decisions:
- issue: Nature of the exclusion imagery in the parable
  chosen_reading: Retain the concrete metaphorical language of expulsion into 'the
    outer darkness' without interpreting it in the translation as hell, final judgment,
    or mere social shame.
  alternative_readings:
  - Explicitly render as hellish punishment
  - Soften to exclusion from the banquet only
  rationale: The verse uses vivid judgment imagery within a parable. The translation
    should preserve the theological tension and not resolve the imagery into a narrower
    doctrinal interpretation than the Greek itself states.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
