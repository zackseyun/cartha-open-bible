theological_decisions:
- issue: Relation of the second commandment to the first
  chosen_reading: a second is like it
  alternative_readings:
  - the second is like it
  - a second is similar to it
  rationale: The Greek emphasizes that the second commandment is of the same kind
    or rank in significance as the first, without collapsing them into one. The rendering
    preserves the comparison without importing extra theological explanation.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather
    than resolve it.
