id: MAT.22.39
reference: Matthew 22:39
source:
  edition: SBLGNT
  text: Δευτέρα ⸀δὲ ὁμοία ⸀αὐτῇ· Ἀγαπήσεις τὸν πλησίον σου ὡς σεαυτόν.
translation:
  text: 'And a second is like it: You shall love your neighbor as yourself.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'The second is like it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Δευτέρα
  chosen: a second
  alternatives:
  - the second
  lexicon: BDAG
  rationale: Anarthrous feminine adjective functioning substantivally; in context
    Jesus is naming the second commandment. English idiom is natural with 'a second,'
    while still preserving the ordinal sense.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the discourse rather than marking
    strong contrast. 'And' best fits smooth modern English and the relation to the
    previous commandment.
- source_word: ὁμοία αὐτῇ
  chosen: is like it
  alternatives:
  - is similar to it
  - is like this
  lexicon: BDAG
  rationale: ὁμοία with the dative αὐτῇ means 'like/similar to it,' referring back
    to the first commandment. 'Is like it' is concise and idiomatic.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - You must love
  - Love
  lexicon: BDAG
  rationale: Future indicative used in citation of the commandment carries imperatival
    force, echoing the LXX wording of Lev 19:18. 'You shall love' preserves the scriptural
    and covenantal register better than a bare imperative.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - the one near you
  lexicon: BDAG
  rationale: In this idiomatic expression τὸν πλησίον σου means 'your neighbor.' This
    is the established and accurate sense, not merely spatial proximity.
- source_word: ὡς
  chosen: as
  alternatives:
  - like
  lexicon: BDAG
  rationale: Introduces the standard of comparison. 'As' is the most natural and precise
    rendering in this ethical maxim.
- source_word: σεαυτόν
  chosen: yourself
  alternatives:
  - your own self
  lexicon: BDAG
  rationale: Reflexive pronoun referring back to the subject 'you.' 'Yourself' is
    the direct and idiomatic English equivalent.
