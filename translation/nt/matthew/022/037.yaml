id: MAT.22.37
reference: Matthew 22:37
source:
  edition: SBLGNT
  text: ὁ ⸀δὲ ἔφη αὐτῷ· Ἀγαπήσεις κύριον τὸν θεόν σου ἐν ὅλῃ ⸀τῇ καρδίᾳ σου καὶ ἐν
    ὅλῃ ⸁τῇ ψυχῇ σου καὶ ἐν ὅλῃ τῇ διανοίᾳ σου·
translation:
  text: And he said to him, “You shall love the Lord your God with all your heart
    and with all your soul and with all your mind.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in all your heart ... in all your soul ... in all your mind.' The Greek
      preposition is ἐν ('in'), but English idiom commonly renders this construction
      as 'with.'
    reason: lexical_alternative
  - marker: b
    text: ψυχή can also mean 'life' or 'self' in some contexts; here 'soul' preserves
      the wording and sense of the command as a comprehensive call to love God.
    reason: lexical_alternative
  - marker: c
    text: διάνοια may also be rendered 'understanding.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: And
  alternatives:
  - But
  - Now
  lexicon: BDAG
  rationale: Here δέ functions as a mild connective advancing the dialogue rather
    than marking a strong contrast. 'And' is natural modern English and preserves
    the narrative flow.
- source_word: ἔφη
  chosen: he said
  alternatives:
  - he told
  - he answered
  lexicon: BDAG
  rationale: φημί commonly introduces direct speech. 'He said' is the most straightforward
    rendering; 'answered' would import a nuance not explicit in the verb itself.
- source_word: Ἀγαπήσεις
  chosen: You shall love
  alternatives:
  - You must love
  - Love
  lexicon: BDAG
  rationale: Future indicative here echoes the wording of the command from Deuteronomy
    and functions imperativally. 'You shall love' preserves the scriptural citation
    style and covenantal force better than the more colloquial 'You must love' or
    the bare imperative 'Love'.
- source_word: κύριον
  chosen: the Lord
  alternatives:
  - Lord
  - Master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' With the article in
    this citation context, 'the Lord' is appropriate and preserves the covenantal
    resonance of the Shema tradition.
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός. In the phrase 'the Lord your God,' English
    idiom naturally omits a second article before 'God' while preserving the sense
    of the Greek construction.
- source_word: ἐν
  chosen: with
  alternatives:
  - in
  lexicon: BDAG
  rationale: Although ἐν is formally 'in,' in this idiom of Deuteronomy citation it
    expresses the sphere or totality of devotion. English conventionally renders this
    as 'with all your heart/soul/mind,' which is both accurate and natural.
- source_word: ὅλῃ
  chosen: all
  alternatives:
  - the whole of
  - your whole
  lexicon: BDAG
  rationale: '''All'' is the idiomatic English equivalent in this repeated construction
    and clearly conveys totality without awkwardness.'
- source_word: καρδίᾳ
  chosen: heart
  lexicon: BDAG
  rationale: '''Heart'' is the established and accurate rendering, denoting the inner
    person, including affections and volition.'
- source_word: ψυχῇ
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: BDAG
  rationale: ψυχή can mean 'life,' 'self,' or 'soul' depending on context. In this
    triadic citation, 'soul' best preserves the traditional and lexical sense of the
    whole living self devoted to God.
- source_word: διανοίᾳ
  chosen: mind
  alternatives:
  - understanding
  - thought
  lexicon: BDAG
  rationale: διάνοια refers to the faculty of thinking or understanding. 'Mind' is
    concise, natural, and matches the common NT citation form in English while preserving
    the intellectual dimension of devotion.
