theological_decisions:
- issue: Rendering the Deuteronomy citation in Jesus's reply
  chosen_reading: Retain the triad 'heart ... soul ... mind' in familiar citation
    form
  alternative_readings:
  - Use 'understanding' instead of 'mind'
  - Render ἐν literally as 'in' rather than idiomatically as 'with'
  rationale: This verse quotes the great commandment in a form familiar from the Synoptic
    tradition. The chosen rendering preserves the lexical distinctions among καρδία,
    ψυχή, and διάνοια without collapsing them into a paraphrase, while still using
    natural English. No doctrinal tension is resolved beyond what the Greek states.
  doctrine_reference: 'Translation philosophy §§1, 3, 6; Contested terms: κύριος →
    Lord'
