theological_decisions:
- issue: Meaning of ἀνάστασις in the Sadducees' challenge
  chosen_reading: Refers to the future resurrection of the dead, not merely a generalized
    afterlife.
  alternative_readings:
  - a vague life after death
  rationale: In context the Sadducees are disputing resurrection specifically, and
    Jesus answers on that same topic in the following verses. Rendering it as 'the
    resurrection' preserves the concrete doctrinal claim without expanding it.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
