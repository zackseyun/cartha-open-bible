id: MAT.22.28
reference: Matthew 22:28
source:
  edition: SBLGNT
  text: ἐν τῇ ⸂ἀναστάσει οὖν⸃ τίνος τῶν ἑπτὰ ἔσται γυνή; πάντες γὰρ ἔσχον αὐτήν.
translation:
  text: In the resurrection, then, whose wife will she be of the seven? For they all
    had her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'For all seven married her.' The Greek says literally,
      'For they all had her.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστάσει
  chosen: the resurrection
  alternatives:
  - the rising
  - the resurrection state
  lexicon: BDAG
  rationale: 'The dative with ἐν is temporal/situational: ''in the resurrection.''
    Given the Sadducees'' question and the established NT usage of ἀνάστασις, ''resurrection''
    is the clear and natural rendering.'
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: οὖν here marks an inferential continuation in the argument. 'Then' fits
    idiomatic English in a question while preserving the logical connection.
- source_word: τίνος
  chosen: whose
  alternatives:
  - of which one
  lexicon: BDAG
  rationale: 'The genitive interrogative asks possession/relationship: ''whose wife.''
    This is the most natural English equivalent.'
- source_word: τῶν ἑπτὰ
  chosen: of the seven
  alternatives:
  - among the seven
  lexicon: BDAG
  rationale: The genitive phrase specifies the group from which the husband is to
    be identified. 'Of the seven' is both literal and idiomatic.
- source_word: ἔσται
  chosen: will she be
  alternatives:
  - shall she be
  lexicon: BDAG
  rationale: Future middle of εἰμί is best rendered with a simple English future.
    'Will' is modern and readable without loss of meaning.
- source_word: γυνή
  chosen: wife
  alternatives:
  - woman
  lexicon: BDAG
  rationale: Although γυνή can mean either 'woman' or 'wife,' the marital context
    requires 'wife.'
- source_word: πάντες
  chosen: they all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: Refers to the seven brothers collectively. 'They all' is concise and
    natural in English.
- source_word: γὰρ
  chosen: for
  alternatives:
  - because
  lexicon: BDAG
  rationale: γάρ introduces the reason supporting the question. 'For' preserves the
    explanatory force and suits the formal tone of the exchange.
- source_word: ἔσχον αὐτήν
  chosen: had her
  alternatives:
  - married her
  - took her as wife
  lexicon: BDAG
  rationale: The Greek literally says 'had her,' an idiomatic way of referring to
    marriage/sexual possession in context. 'Had her' preserves the terseness and rhetorical
    force of the original better than the more interpretive 'married her,' though
    the latter reflects the sense.
