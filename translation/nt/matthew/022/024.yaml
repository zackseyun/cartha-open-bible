id: MAT.22.24
reference: Matthew 22:24
source:
  edition: SBLGNT
  text: λέγοντες· Διδάσκαλε, Μωϋσῆς εἶπεν· Ἐάν τις ἀποθάνῃ μὴ ἔχων τέκνα, ἐπιγαμβρεύσει
    ὁ ἀδελφὸς αὐτοῦ τὴν γυναῖκα αὐτοῦ καὶ ἀναστήσει σπέρμα τῷ ἀδελφῷ αὐτοῦ.
translation:
  text: saying, “Teacher, Moses said, ‘If a man dies without having children, his
    brother shall marry his wife and raise up offspring for his brother.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “his brother shall perform the duty of a husband's brother
      to the widow.” The Greek refers specifically to levirate marriage.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Direct address to Jesus as an instructor; 'Teacher' is the clear, natural
    modern equivalent and avoids the ambiguity of 'Master' in contemporary English.
- source_word: Ἐάν τις ἀποθάνῃ
  chosen: If a man dies
  alternatives:
  - If someone dies
  lexicon: BDAG
  rationale: The indefinite singular τις with masculine participle ἔχων is rendered
    gender-accurately as 'a man' in keeping with the legal case under discussion and
    the translation philosophy's preference for gender-accurate renderings over neutralizing
    the masculine form.
- source_word: μὴ ἔχων τέκνα
  chosen: without having children
  alternatives:
  - having no children
  - childless
  lexicon: BDAG
  rationale: τέκνα is plural and broadly means 'children,' not specifically 'sons.'
    'Without having children' closely reflects the participial construction while
    remaining readable English.
- source_word: ἐπιγαμβρεύσει
  chosen: shall marry
  alternatives:
  - shall perform the duty of a husband's brother
  - shall take in marriage
  lexicon: BDAG
  rationale: The verb refers to entering a levirate marriage with a deceased brother's
    widow. 'Shall marry' gives the core sense in clear English; the more technical
    force is implicit in context and may be preserved in a note.
- source_word: τὴν γυναῖκα αὐτοῦ
  chosen: his wife
  alternatives:
  - the wife of the deceased
  - his widow
  lexicon: BDAG
  rationale: In context the pronoun refers to the deceased man's wife. 'His wife'
    is the most direct rendering of the Greek syntax, though English readers understand
    from context that she is now his widow.
- source_word: ἀναστήσει σπέρμα
  chosen: raise up offspring
  alternatives:
  - raise up seed
  - produce descendants
  lexicon: BDAG
  rationale: This is an idiomatic expression drawn from levirate marriage language.
    'Raise up offspring' communicates the sense naturally in modern English while
    preserving the familial/procreative force of σπέρμα.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  chosen: for his brother
  alternatives:
  - for the sake of his brother
  - to his brother
  lexicon: BDAG
  rationale: 'The dative expresses benefit/reference: the offspring is reckoned on
    behalf of the deceased brother. ''For his brother'' is concise and accurate.'
