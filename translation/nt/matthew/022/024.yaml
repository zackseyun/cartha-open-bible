theological_decisions:
- issue: Rendering the legal example in gendered terms
  chosen_reading: Use 'a man' and 'his brother' rather than gender-neutral language
  alternative_readings:
  - If someone dies ... that person's brother
  - If a person dies childless
  rationale: The verse cites Mosaic levirate law framed in specifically male familial
    roles. Following the translation philosophy, the masculine forms are preserved
    where they match the source's intent rather than neutralized.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over
    gender-neutral)'
