id: MAT.22.26
reference: Matthew 22:26
source:
  edition: SBLGNT
  text: ὁμοίως καὶ ὁ δεύτερος καὶ ὁ τρίτος, ἕως τῶν ἑπτά·
translation:
  text: Likewise the second and the third, up to the seven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “until all seven.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  chosen: Likewise
  alternatives:
  - In the same way
  - Similarly
  lexicon: BDAG
  rationale: Adverb indicating that what happened previously also happened to the
    following subjects. 'Likewise' is concise and natural, preserving the discourse
    connection to the prior verse.
- source_word: καὶ
  chosen: and
  alternatives:
  - also
  lexicon: BDAG
  rationale: Coordinates the listed brothers. The first καὶ after ὁμοίως can be absorbed
    naturally into English structure, while the repeated conjunction is represented
    by 'and' to preserve the sequence.
- source_word: ὁ δεύτερος
  chosen: the second
  alternatives:
  - the second brother
  lexicon: BDAG
  rationale: Ordinal with article functioning substantivally. 'Brother' is implied
    from context (the sequence of brothers in the levirate-marriage scenario) but
    not expressed here, so the more formally restrained 'the second' is preferred
    in the main text.
- source_word: ὁ τρίτος
  chosen: the third
  alternatives:
  - the third brother
  lexicon: BDAG
  rationale: Like ὁ δεύτερος, the ordinal stands substantivally. The translation keeps
    the ellipsis present in Greek rather than supplying 'brother' in the main text.
- source_word: ἕως τῶν ἑπτά
  chosen: up to the seven
  alternatives:
  - until the seven
  - up to all seven
  - until all seven
  lexicon: BDAG
  rationale: The phrase indicates continuation through the full set of seven brothers.
    'Up to the seven' is a close rendering of the Greek structure, while the footnote
    preserves the more idiomatic English expansion 'until all seven.'
