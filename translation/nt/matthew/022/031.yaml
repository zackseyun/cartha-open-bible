theological_decisions:
- issue: Divine authorship and scriptural address
  chosen_reading: Render the clause as 'what was spoken to you by God'
  alternative_readings:
  - what God spoke to you
  - what was said to you by God
  rationale: The Greek explicitly presents Scripture as speech spoken by God and addressed
    to Jesus' hearers. The translation preserves both divine agency and present address
    without adding a theory of inspiration beyond the text itself.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
