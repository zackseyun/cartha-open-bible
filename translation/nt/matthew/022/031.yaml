id: MAT.22.31
reference: Matthew 22:31
source:
  edition: SBLGNT
  text: περὶ δὲ τῆς ἀναστάσεως τῶν νεκρῶν οὐκ ἀνέγνωτε τὸ ῥηθὲν ὑμῖν ὑπὸ τοῦ θεοῦ
    λέγοντος·
translation:
  text: Now concerning the resurrection of the dead, have you not read what was spoken
    to you by God, saying,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'did you not read what God spoke to you, saying,'
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ
  chosen: Now concerning
  alternatives:
  - But concerning
  - And concerning
  lexicon: BDAG
  rationale: περί with the genitive introduces the topic under discussion ('concerning/regarding'),
    while δέ marks a transition. 'Now concerning' gives natural English discourse
    flow and preserves the shift to a new point without overstating contrast.
- source_word: ἀναστάσεως
  chosen: resurrection
  alternatives:
  - rising
  lexicon: BDAG
  rationale: ἀνάστασις in this context refers specifically to bodily resurrection,
    the debated issue with the Sadducees. 'Resurrection' is the standard and clearest
    theological term in English.
- source_word: τῶν νεκρῶν
  chosen: of the dead
  alternatives:
  - from the dead
  lexicon: BDAG
  rationale: The genitive construction naturally yields 'of the dead.' While English
    often says 'resurrection from the dead,' the Greek here is more directly 'the
    resurrection of the dead,' referring to the dead as the class who are raised.
- source_word: οὐκ ἀνέγνωτε
  chosen: have you not read
  alternatives:
  - did you not read
  lexicon: BDAG
  rationale: The aorist can be rendered simply as a past tense, but in idiomatic English
    Jesus' rhetorical challenge is well conveyed by 'have you not read,' which emphasizes
    their familiarity with Scripture rather than a single past act.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what was said
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'What was spoken'
    is natural English and preserves the passive sense. 'What was said' is possible
    but slightly less formal and less clearly echoes divine speech.
- source_word: ὑμῖν
  chosen: to you
  alternatives:
  - for you
  lexicon: BDAG
  rationale: 'The dative here is best taken as indirect object: the Scripture was
    spoken ''to'' them in the sense that it addresses them.'
- source_word: ὑπὸ τοῦ θεοῦ
  chosen: by God
  alternatives:
  - by the God
  lexicon: BDAG
  rationale: ὑπό with the genitive marks agency. English idiom requires 'by God.'
    The anarthrous English form is natural despite the Greek article.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - who says
  lexicon: BDAG
  rationale: The present participle introduces the forthcoming quotation. 'Saying'
    is concise and idiomatic, preserving the connection to the direct speech in the
    next verse.
