theological_decisions:
- issue: Rendering the Sadducees' doctrinal denial
  chosen_reading: there is no resurrection
  alternative_readings:
  - who say there is no resurrection
  rationale: The Greek participial construction identifies the Sadducees by their
    denial of resurrection. The chosen wording preserves the content of their belief
    without importing later doctrinal elaboration. It leaves the statement as narrative
    description, not endorsement.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
