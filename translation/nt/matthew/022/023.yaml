id: MAT.22.23
reference: Matthew 22:23
source:
  edition: SBLGNT
  text: Ἐν ἐκείνῃ τῇ ἡμέρᾳ προσῆλθον αὐτῷ Σαδδουκαῖοι, ⸀λέγοντες μὴ εἶναι ἀνάστασιν,
    καὶ ἐπηρώτησαν αὐτὸν
translation:
  text: On that day Sadducees came to him, saying there is no resurrection, and they
    questioned him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'Sadducees, who say there is no resurrection.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῃ τῇ ἡμέρᾳ
  chosen: On that day
  alternatives:
  - In that day
  - On that same day
  lexicon: BDAG
  rationale: The prepositional phrase is a common temporal expression. 'On that day'
    is idiomatic modern English and preserves the temporal reference without unnecessary
    stiffness.
- source_word: προσῆλθον
  chosen: came to
  alternatives:
  - approached
  - came up to
  lexicon: BDAG
  rationale: προσέρχομαι often means 'come to/approach.' 'Came to' is natural English
    here and fits the narrative flow; 'approached' is possible but slightly more formal.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative object of προσῆλθον is naturally expressed in English within
    'came to him.' The pronoun refers to Jesus.
- source_word: Σαδδουκαῖοι
  chosen: Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name, following the philosophy
    of transliterating personal and group names.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - who say
  - who were saying
  lexicon: BDAG
  rationale: The present participle is rendered adverbially/attendantly as 'saying,'
    closely following the Greek while remaining readable. It introduces their characteristic
    belief as relevant background to the question.
- source_word: μὴ εἶναι ἀνάστασιν
  chosen: there is no resurrection
  alternatives:
  - that there is no resurrection
  - there to be no resurrection
  lexicon: BDAG
  rationale: This infinitival clause after λέγοντες expresses the Sadducean denial.
    'There is no resurrection' is the most natural English rendering and clearly conveys
    the content of their claim.
- source_word: ἀνάστασιν
  chosen: resurrection
  alternatives:
  - rising again
  lexicon: BDAG
  rationale: ἀνάστασις is the standard term for resurrection in this context. 'Resurrection'
    preserves the theological and lexical force of the Greek.
- source_word: ἐπηρώτησαν
  chosen: questioned
  alternatives:
  - asked
  - interrogated
  lexicon: BDAG
  rationale: ἐπερωτάω means 'ask, question.' 'Questioned' reflects a somewhat formal
    or probing inquiry, fitting the context of a challenge posed to Jesus. 'Asked'
    is possible but slightly flatter.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object pronoun referring to Jesus.
