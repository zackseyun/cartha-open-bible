theological_decisions:
- issue: Degree of hostility expressed in συμβούλιον ἔλαβον
  chosen_reading: Render the phrase neutrally as 'took counsel' and let the purpose
    clause express the malicious intent.
  alternative_readings:
  - Render more interpretively as 'plotted'
  rationale: The verse clearly depicts hostile intent, but that hostility is explicitly
    carried by 'that they might trap him.' Retaining a more literal rendering for
    the idiom avoids overloading the first phrase while preserving the full sense
    of the sentence.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language
    primacy over translation tradition.'
