id: MAT.22.15
reference: Matthew 22:15
source:
  edition: SBLGNT
  text: Τότε πορευθέντες οἱ Φαρισαῖοι συμβούλιον ἔλαβον ὅπως αὐτὸν παγιδεύσωσιν ἐν
    λόγῳ.
translation:
  text: Then the Pharisees went and took counsel how they might trap him in his words.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'plotted how they might trap him by what he said.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking narrative sequence; 'Then' is the natural concise
    English equivalent in this context.
- source_word: πορευθέντες
  chosen: went
  alternatives:
  - having gone
  - departed
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, often functioning idiomatically
    with a finite verb in narrative. 'Went' captures the movement without awkwardly
    over-literal English ('having gone').
- source_word: οἱ Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard rendering of the group designation Φαρισαῖοι; the article is
    naturally retained in English.
- source_word: συμβούλιον ἔλαβον
  chosen: took counsel
  alternatives:
  - plotted
  - made plans
  - held a consultation
  lexicon: BDAG
  rationale: The idiom literally means 'took counsel' or 'formed a plan.' 'Took counsel'
    preserves the deliberative sense without prematurely importing the hostile nuance
    into this phrase alone; the hostile intent is made explicit by the purpose clause.
- source_word: ὅπως
  chosen: how
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Introduces the content/purpose of their counsel. With English idiom after
    'took counsel,' 'how they might...' reads naturally while preserving the purposive
    sense.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward pronoun rendering.
- source_word: παγιδεύσωσιν
  chosen: trap
  alternatives:
  - ensnare
  - entrap
  lexicon: BDAG
  rationale: Conveys the metaphor of catching in a snare. 'Trap' is clear modern English
    and fits the hostile intent of the context.
- source_word: ἐν λόγῳ
  chosen: in his words
  alternatives:
  - by a word
  - in speech
  - in what he said
  lexicon: BDAG
  rationale: λόγος here refers to speech/utterance. 'In his words' makes explicit
    the sense that they sought to ensnare him through something he would say; the
    possessive is implied by the context and common in English rendering of this idiom.
