id: MAT.22.14
reference: Matthew 22:14
source:
  edition: SBLGNT
  text: πολλοὶ γάρ εἰσιν κλητοὶ ὀλίγοι δὲ ἐκλεκτοί.
translation:
  text: For many are called[b][a], but few are chosen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "invited"; the word can carry banquet-invitation nuance in this context.
    reason: lexical_alternative
  - marker: b
    text: Or "elect."
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - a great many
  - many people
  lexicon: BDAG
  rationale: 'The adjective functions substantivally in the nominative plural: ''many.'' This is the natural concise English equivalent and preserves the contrast with ὀλίγοι.'
- source_word: γάρ
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives an explanatory ground for the preceding statement in the parable. 'For' preserves the connective force without overinterpreting the logic.
- source_word: εἰσιν
  chosen: are
  lexicon: BDAG
  rationale: Simple present of εἰμί; English 'are' is the direct equivalent.
- source_word: κλητοὶ
  chosen: called
  alternatives:
  - invited
  - summoned
  lexicon: BDAG
  rationale: κλητοί can mean 'called' or, in banquet contexts, 'invited.' Because this saying concludes the wedding-banquet parable, 'invited' is contextually possible; however, 'called' best preserves the broader semantic and theological resonance in Matthew while remaining natural English. The banquet nuance is preserved in a footnote.
- source_word: ὀλίγοι
  chosen: few
  alternatives:
  - not many
  lexicon: BDAG
  rationale: Direct antonymic counterpart to πολλοί. 'Few' is idiomatic and preserves the terse proverbial form.
- source_word: δὲ
  chosen: but
  alternatives:
  - and
  - yet
  lexicon: BDAG
  rationale: δέ marks contrast here; 'but' best reflects the adversative sense between the two clauses.
- source_word: ἐκλεκτοί
  chosen: chosen
  alternatives:
  - elect
  - selected
  lexicon: BDAG
  rationale: ἐκλεκτοί literally means 'chosen' or 'elect.' 'Chosen' is clearer in contemporary English and avoids importing later theological systematization into the main text, while still accurately representing the Greek. The traditional alternative 'elect' is preserved in a footnote.
