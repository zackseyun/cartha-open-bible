theological_decisions:
- issue: Rendering ἐκλεκτοί in a verse often cited in debates over election and calling
  chosen_reading: chosen
  alternative_readings:
  - elect
  rationale: The Greek adjective can be rendered either 'chosen' or 'elect.' To preserve theological tension rather than foreground a later doctrinal term, the main text uses the transparent lexical sense 'chosen.' The traditional theological rendering 'elect' is preserved in a footnote so readers can see the interpretive connection without the translation itself adjudicating denominational debates.
  doctrine_reference: Translation philosophy §3; Affirmations paragraph on not advocating denominational distinctives unless the source unambiguously supports one reading over another.
- issue: Rendering κλητοί in the banquet-parable context
  chosen_reading: called
  alternative_readings:
  - invited
  rationale: Within the immediate parable, 'invited' is contextually apt, but 'called' better preserves the wording's wider resonance and the familiar contrast with ἐκλεκτοί. A footnote preserves 'invited' as a legitimate contextual alternative without collapsing the saying into only banquet imagery.
  doctrine_reference: Translation philosophy §1 and §3.
