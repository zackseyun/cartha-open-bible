id: MAT.22.32
reference: Matthew 22:32
source:
  edition: SBLGNT
  text: Ἐγώ εἰμι ὁ θεὸς Ἀβραὰμ καὶ ὁ θεὸς Ἰσαὰκ καὶ ὁ θεὸς Ἰακώβ; οὐκ ἔστιν ⸂ὁ θεὸς⸃
    νεκρῶν ἀλλὰ ζώντων.
translation:
  text: I am the God of Abraham and the God of Isaac and the God of Jacob. He is not
    the God of the dead, but of the living.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''God is not the God of the dead, but of the living.'' The Greek repeats
      ''God'' explicitly in the second sentence; the main text uses ''He'' for natural
      English style.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγώ εἰμι
  chosen: I am
  alternatives:
  - I am he
  lexicon: BDAG
  rationale: Direct present-tense self-identification, echoing the wording of the
    cited Scripture. The simple 'I am' best preserves the Greek form and the argument
    Jesus draws from the present tense.
- source_word: ὁ θεὸς Ἀβραὰμ ... ὁ θεὸς Ἰσαὰκ ... ὁ θεὸς Ἰακώβ
  chosen: the God of Abraham and the God of Isaac and the God of Jacob
  alternatives:
  - God of Abraham, Isaac, and Jacob
  lexicon: BDAG
  rationale: The repeated article+noun construction is retained rather than compressed,
    since the repetition is present in Greek and contributes rhetorical weight.
- source_word: οὐκ ἔστιν ὁ θεὸς
  chosen: He is not the God
  alternatives:
  - God is not the God
  lexicon: BDAG
  rationale: English idiom prefers an explicit pronoun here, with 'He' referring back
    to God just named. This preserves the sense without awkward repetition, while
    keeping the predicate statement intact.
- source_word: νεκρῶν
  chosen: the dead
  alternatives:
  - dead people
  lexicon: BDAG
  rationale: The genitive plural adjective functions substantivally. 'The dead' is
    the natural and sufficiently formal English equivalent.
- source_word: ζώντων
  chosen: the living
  alternatives:
  - living people
  - those who are living
  lexicon: BDAG
  rationale: The present participle is substantival and contrasts with 'the dead.'
    'The living' preserves the concise antithesis in natural English.
