theological_decisions:
- issue: Implication of the patriarchs' continued life before God in Jesus' argument
    about resurrection
  chosen_reading: Render the statement straightforwardly without expanding it into
    an explicit doctrinal paraphrase about resurrection or the intermediate state.
  alternative_readings:
  - He is not God of dead people, but of people who are still alive to him
  - God is not God of the dead, but of the living
  rationale: The verse supports Jesus' argument that Abraham, Isaac, and Jacob remain
    living before God, but the translation should not import explanatory theological
    conclusions beyond the wording of the text. The chosen rendering preserves the
    argument's force while avoiding interpretive expansion.
  doctrine_reference: Preserve theological tension rather than resolve it.
