theological_decisions:
- issue: Referent of 'Spirit' in ἐν πνεύματι
  chosen_reading: the Holy Spirit is intended
  alternative_readings:
  - David's own spirit / spiritual state
  rationale: In context Jesus is grounding his argument in inspired Scripture, and
    the idiom naturally points to David speaking under the Holy Spirit's influence.
    This preserves the text's theological weight without adding more than the phrase
    warrants.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering of κύριος
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: DOCTRINE.md lists κύριος with default rendering 'Lord.' In this messianic
    and scriptural context, 'Lord' best preserves the title's significance and intertextual
    connection to Psalm 110.
  doctrine_reference: 'Contested terms: κύριος → Lord'
