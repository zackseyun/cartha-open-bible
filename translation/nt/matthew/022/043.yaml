id: MAT.22.43
reference: Matthew 22:43
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς· Πῶς οὖν Δαυὶδ ἐν πνεύματι ⸂καλεῖ αὐτὸν κύριον⸃ λέγων·
translation:
  text: He said to them, “How then does David, in the Spirit, call him Lord, saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "by the Spirit." The Greek phrase can express sphere or agency; "in the
      Spirit" more closely follows the wording.
    reason: lexical_alternative
  - marker: b
    text: Or "call him master." The Greek title is κύριος, commonly rendered "Lord."
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐτοῖς
  chosen: He said to them
  alternatives:
  - He says to them
  lexicon: BDAG
  rationale: The Greek present is a historical present. English narrative style normally
    renders this naturally as a simple past, while preserving the discourse function.
- source_word: Πῶς οὖν
  chosen: How then
  alternatives:
  - How, then
  - How is it then
  lexicon: BDAG
  rationale: Retains the interrogative force of πῶς and the inferential/continuative
    nuance of οὖν without overexpanding the syntax.
- source_word: Δαυὶδ
  chosen: David
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, in keeping with
    the translation philosophy.
- source_word: ἐν πνεύματι
  chosen: in the Spirit
  alternatives:
  - by the Spirit
  - in spirit
  lexicon: BDAG
  rationale: The phrase most naturally refers to the Holy Spirit as the sphere or
    agency of David's inspired speech in this citation context. Capitalization reflects
    that likely referent. 'By the Spirit' is possible, but 'in the Spirit' more closely
    follows the Greek preposition ἐν.
- source_word: καλεῖ αὐτὸν κύριον
  chosen: call him Lord
  alternatives:
  - call him master
  lexicon: BDAG
  rationale: κύριος is a contested term with default rendering 'Lord' per DOCTRINE.md.
    Here it functions as a title in the Psalm citation argument, so 'Lord' preserves
    both the lexical meaning and the christological force of Jesus' question.
- source_word: λέγων
  chosen: saying
  alternatives:
  - when he says
  lexicon: BDAG
  rationale: A straightforward participial rendering that preserves the connection
    to the following quotation without unnecessary expansion.
