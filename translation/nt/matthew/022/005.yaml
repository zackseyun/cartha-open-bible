id: MAT.22.5
reference: Matthew 22:5
source:
  edition: SBLGNT
  text: οἱ δὲ ἀμελήσαντες ἀπῆλθον, ⸀ὃς μὲν εἰς τὸν ἴδιον ἀγρόν, ⸁ὃς δὲ ⸀ἐπὶ τὴν ἐμπορίαν
    αὐτοῦ·
translation:
  text: But they paid no attention and went away, one to his own field, another to
    his business.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'disregarded it' or 'neglected it,' referring to the king's invitation
      in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμελήσαντες
  chosen: paid no attention
  alternatives:
  - disregarded it
  - were unconcerned
  - neglected it
  lexicon: BDAG
  rationale: The participle from ἀμελέω conveys disregard or lack of concern. 'Paid
    no attention' is idiomatic modern English and captures the dismissive force in
    context better than the less natural 'neglecting' or the more interpretive 'disregarded
    it.' The object is implicit from context (the invitation), so English supplies
    a natural equivalent without over-paraphrasing.
- source_word: ἀπῆλθον
  chosen: went away
  alternatives:
  - went off
  - departed
  lexicon: BDAG
  rationale: ἀπέρχομαι here marks departure from the summons. 'Went away' is clear,
    natural, and preserves the narrative movement without sounding overly formal like
    'departed.'
- source_word: ὃς μὲν ... ὃς δὲ
  chosen: one ... another
  alternatives:
  - one ... and another
  - this one ... that one
  lexicon: BDAG
  rationale: This distributive construction divides the group into individuals taking
    different destinations. 'One ... another' is the most natural English equivalent
    and preserves the contrast signaled by μέν ... δέ.
- source_word: εἰς τὸν ἴδιον ἀγρόν
  chosen: to his own field
  alternatives:
  - to his own farm
  - to his field
  lexicon: BDAG
  rationale: ἀγρός is literally 'field' or 'farm/land.' 'Field' is the more direct
    lexical match; 'his own' preserves ἴδιον, emphasizing private personal concerns
    over the king's invitation.
- source_word: ἐπὶ τὴν ἐμπορίαν αὐτοῦ
  chosen: to his business
  alternatives:
  - to his trade
  - to his commercial dealings
  - to his merchandise
  lexicon: BDAG
  rationale: ἐμπορία denotes trade, commerce, or business activity. 'Business' is
    the most natural contemporary rendering and fits the contrast with agricultural
    work. 'Merchandise' would shift the sense from activity to goods, and 'trade'
    is possible but slightly narrower.
