theological_decisions:
- issue: Implied object of ἀμελήσαντες
  chosen_reading: The verse refers to the invitees ignoring the king's summons, rendered
    idiomatically as 'paid no attention.'
  alternative_readings:
  - They neglected it
  - They disregarded the invitation
  rationale: The Greek leaves the object implicit, but the immediate context supplies
    the invitation. The translation makes the sense clear in natural English without
    adding doctrinal content or over-specifying beyond the narrative context.
  doctrine_reference: Translation philosophy §1, §6
