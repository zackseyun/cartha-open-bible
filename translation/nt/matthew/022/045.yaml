id: MAT.22.45
reference: Matthew 22:45
source:
  edition: SBLGNT
  text: εἰ οὖν Δαυὶδ καλεῖ αὐτὸν κύριον, πῶς υἱὸς αὐτοῦ ἐστιν;
translation:
  text: If[a], then, David calls him Lord, how is he his son?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more explicitly from the context: ''If, then, David calls the Messiah "Lord," how is he his son?'''
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ οὖν
  chosen: If, then
  alternatives:
  - If therefore
  - Since then
  lexicon: BDAG
  rationale: Retains the conditional/inferential force of εἰ plus οὖν. 'If, then' is natural modern English and preserves the argumentative structure of Jesus' question better than a more wooden 'If therefore.' 'Since then' would tilt toward assuming the premise rather than simply posing the logic.
- source_word: Δαυὶδ
  chosen: David
  lexicon: BDAG
  rationale: Standard transliteration of the personal name, following the translation principle to transliterate names rather than translate them.
- source_word: καλεῖ
  chosen: calls
  alternatives:
  - says
  - addresses
  lexicon: BDAG
  rationale: καλέω here means 'calls/names.' 'Calls' preserves the lexical sense and fits the citation logic from Psalm 110:1. 'Says' is too generic and loses the predicative nuance; 'addresses' is possible but less direct.
- source_word: αὐτὸν
  chosen: him
  lexicon: BDAG
  rationale: Straightforward accusative pronoun referring to the Messiah in the argument.
- source_word: κύριον
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as 'Lord.' In this context the term is honorific and christologically significant, echoing Psalm 110:1; 'master' would underrepresent that resonance.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what sense
  lexicon: BDAG
  rationale: 'The adverb introduces a question of logical relation: if David calls him ''Lord,'' how can he be merely David''s son? ''How'' is the most direct and idiomatic rendering.'
- source_word: υἱὸς αὐτοῦ
  chosen: his son
  alternatives:
  - the son of him
  - his descendant
  lexicon: BDAG
  rationale: Formal but natural rendering of the phrase. 'His son' preserves the familial/royal descendant language used in messianic expectation. 'His descendant' is interpretively broader and weakens the deliberate tension in Jesus' wording.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple present copula, retained directly in English.
