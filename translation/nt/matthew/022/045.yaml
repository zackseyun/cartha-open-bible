theological_decisions:
- issue: Messianic and christological force of David calling the Messiah 'Lord'
  chosen_reading: Retain the wording 'Lord' and 'his son' without explanatory expansion.
  alternative_readings:
  - If David calls the Messiah 'Lord,' how can the Messiah be David's son?
  rationale: The verse's force depends on preserving Jesus' rhetorical tension rather than resolving it in translation. Adding 'Messiah' in the main text would clarify the referent but goes beyond the explicit Greek of this verse, where the pronoun αὐτόν carries over from the prior context. The chosen wording lets the text present both Davidic sonship and superior lordship without importing a doctrinal explanation into the translation itself.
  doctrine_reference: Preserve theological tension rather than resolve it; κύριος default rendering 'Lord'.
