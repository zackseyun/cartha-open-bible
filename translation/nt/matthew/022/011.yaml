id: MAT.22.11
reference: Matthew 22:11
source:
  edition: SBLGNT
  text: εἰσελθὼν δὲ ὁ βασιλεὺς θεάσασθαι τοὺς ἀνακειμένους εἶδεν ἐκεῖ ἄνθρωπον οὐκ
    ἐνδεδυμένον ἔνδυμα γάμου·
translation:
  text: But when the king came in to look at the guests reclining at the table, he
    saw there a man not dressed in wedding clothes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a man not wearing a wedding garment.'
    reason: lexical_alternative
  - marker: b
    text: The Greek says 'those reclining,' reflecting the customary posture of guests
      at a formal banquet.
    reason: cultural_note
lexical_decisions:
- source_word: εἰσελθὼν
  chosen: came in
  alternatives:
  - entered
  lexicon: BDAG
  rationale: Aorist participle of εἰσέρχομαι, introducing the king's action prior
    to the main verb. 'Came in' is natural modern English and preserves the movement
    into the banquet setting.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks narrative development with mild contrast. 'But' fits the turn
    in the parable as the king's inspection introduces tension.
- source_word: βασιλεὺς
  chosen: the king
  alternatives:
  - the ruler
  lexicon: BDAG
  rationale: Standard rendering for βασιλεύς in a royal-parable context.
- source_word: θεάσασθαι
  chosen: to look at
  alternatives:
  - to observe
  - to inspect
  - to see
  lexicon: BDAG
  rationale: 'The infinitive expresses purpose: the king came in for the purpose of
    viewing the diners. ''To look at'' is idiomatic and avoids overstating the verb
    as a formal inspection, though that nuance is present contextually.'
- source_word: τοὺς ἀνακειμένους
  chosen: the guests reclining at the table
  alternatives:
  - those reclining
  - those seated at the table
  lexicon: BDAG
  rationale: ἀνάκειμαι in banquet contexts refers to reclining for a meal rather than
    generic sitting. Rendering the implied banquet role as 'guests' clarifies the
    scene without departing from the sense, while 'reclining at the table' preserves
    the cultural detail.
- source_word: εἶδεν
  chosen: he saw
  alternatives:
  - he noticed
  lexicon: BDAG
  rationale: Simple aorist of ὁράω; 'he saw' is the straightforward narrative rendering.
- source_word: ἐκεῖ
  chosen: there
  alternatives:
  - in that place
  lexicon: BDAG
  rationale: Adverb of place, naturally rendered 'there.'
- source_word: ἄνθρωπον
  chosen: a man
  alternatives:
  - someone
  - a person
  lexicon: BDAG
  rationale: The Greek is singular masculine and refers to an individual male figure
    in the parable. Per gender-accurate policy, 'a man' is preferred over a neutral
    substitute.
- source_word: οὐκ ἐνδεδυμένον
  chosen: not dressed
  alternatives:
  - not clothed
  - not wearing
  lexicon: BDAG
  rationale: Perfect middle/passive participle of ἐνδύω describing the man's present
    state. 'Not dressed' is idiomatic English for lacking the required attire.
- source_word: ἔνδυμα γάμου
  chosen: wedding clothes
  alternatives:
  - a wedding garment
  - wedding attire
  lexicon: BDAG
  rationale: The singular noun can function collectively in English. 'Wedding clothes'
    sounds natural in modern English and conveys attire appropriate for the wedding
    feast. 'A wedding garment' is more formal and traditional, but less idiomatic
    for contemporary readers.
