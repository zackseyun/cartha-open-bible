theological_decisions:
- issue: Parabolic imagery of banquet posture
  chosen_reading: Retain the cultural detail of reclining while clarifying that these
    are banquet guests.
  alternative_readings:
  - Translate simply as 'guests' without mention of reclining
  - Translate more formally as 'those reclining'
  rationale: The verse depicts an ancient banquet setting. Including 'reclining at
    the table' preserves historical texture without requiring readers to infer the
    meal context from 'those reclining' alone.
  doctrine_reference: Translation philosophy §§5–6
- issue: Gender rendering of ἄνθρωπον
  chosen_reading: a man
  alternative_readings:
  - a person
  - someone
  rationale: The source text uses a masculine singular noun for an individual in the
    story, not a generic reference to humanity. The translation therefore keeps the
    gendered form in line with the gender-accurate policy.
  doctrine_reference: Translation philosophy §4
