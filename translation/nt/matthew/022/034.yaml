id: MAT.22.34
reference: Matthew 22:34
source:
  edition: SBLGNT
  text: Οἱ δὲ Φαρισαῖοι ἀκούσαντες ὅτι ἐφίμωσεν τοὺς Σαδδουκαίους συνήχθησαν ἐπὶ τὸ
    αὐτό.
translation:
  text: But when the Pharisees heard that he had silenced the Sadducees, they gathered
    together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'had muzzled the Sadducees.' The Greek uses a verb that
      can mean to muzzle, here figuratively for silencing them in debate.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a mild narrative transition/contrast with the preceding exchange.
    'But' preserves the adversative flow in natural English.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name; names/groups are transliterated
    rather than translated.
- source_word: ἀκούσαντες
  chosen: when ... heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle giving attendant circumstance/temporal sense. 'When
    ... heard' is idiomatic English and preserves the temporal relation.
- source_word: ἐφίμωσεν
  chosen: had silenced
  alternatives:
  - muzzled
  - put to silence
  - shut the mouths of
  lexicon: BDAG
  rationale: The verb literally evokes muzzling, but in this context refers to decisively
    stopping the Sadducees' argument. 'Had silenced' communicates the idiomatic force
    without awkwardness; the more literal imagery is worth preserving in a footnote.
- source_word: Σαδδουκαίους
  chosen: the Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name.
- source_word: συνήχθησαν
  chosen: they gathered together
  alternatives:
  - they assembled
  - they came together
  lexicon: BDAG
  rationale: 'Aorist passive with intransitive/middle-like sense in context: the Pharisees
    assembled as a group. ''Gathered together'' is clear and natural.'
- source_word: ἐπὶ τὸ αὐτό
  chosen: together
  alternatives:
  - in the same place
  - for the same purpose
  lexicon: BDAG
  rationale: Idiomatic expression meaning 'together' or 'at the same place.' Here
    'together' best fits the narrative context and avoids over-specifying location
    or motive.
