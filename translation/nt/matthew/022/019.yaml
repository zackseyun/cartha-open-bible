id: MAT.22.19
reference: Matthew 22:19
source:
  edition: SBLGNT
  text: ἐπιδείξατέ μοι τὸ νόμισμα τοῦ κήνσου. οἱ δὲ προσήνεγκαν αὐτῷ δηνάριον.
translation:
  text: Show me the coin for the tax. And they brought him a denarius.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the poll tax' or 'the census tax' for κῆνσος, a Roman imperial tax.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδείξατέ
  chosen: Show me
  alternatives:
  - Bring me
  - Display to me
  lexicon: BDAG
  rationale: Aorist active imperative, second person plural, from ἐπιδείκνυμι. 'Show
    me' is natural modern English and preserves the command to produce the object
    for inspection. 'Bring me' is possible in context but less directly reflects the
    visual force of the verb.
- source_word: νόμισμα
  chosen: coin
  alternatives:
  - money
  - coinage
  lexicon: BDAG
  rationale: νόμισμα denotes a coin or piece of money in circulation. 'Coin' is the
    clearest idiomatic rendering here, especially since the following clause specifies
    the particular coin as a denarius.
- source_word: τοῦ κήνσου
  chosen: for the tax
  alternatives:
  - of the poll tax
  - for the census tax
  - for the tribute tax
  lexicon: BDAG
  rationale: κῆνσος is a Latin loanword referring to the Roman tax under discussion
    in this context. 'For the tax' is concise and readable, while still matching the
    immediate question about paying tax to Caesar. More specific renderings like 'poll
    tax' are possible but may over-specify for the main text.
- source_word: προσήνεγκαν
  chosen: brought
  alternatives:
  - presented
  - brought forward
  lexicon: BDAG
  rationale: Aorist active indicative from προσφέρω. In this narrative setting, 'brought'
    is straightforward and idiomatic. 'Presented' is possible but slightly more formal
    than needed.
- source_word: δηνάριον
  chosen: a denarius
  alternatives:
  - a Roman denarius
  lexicon: BDAG
  rationale: δηνάριον names a specific coin, so transliteration preserves the historical
    specificity better than a generic equivalent. The indefinite article fits English
    idiom.
