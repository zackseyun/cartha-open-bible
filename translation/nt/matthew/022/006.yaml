id: MAT.22.6
reference: Matthew 22:6
source:
  edition: SBLGNT
  text: οἱ δὲ λοιποὶ κρατήσαντες τοὺς δούλους αὐτοῦ ὕβρισαν καὶ ἀπέκτειναν.
translation:
  text: But the rest[a], seizing his slaves, mistreated them and killed them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his servants' (Greek doulous).
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ λοιποὶ
  chosen: But the rest
  alternatives:
  - But the others
  - And the rest
  lexicon: BDAG
  rationale: λοιποί refers to those remaining from the previously mentioned invitees. 'But' captures δέ's mild adversative force in context, contrasting these with those who ignored the invitation in the prior verse.
- source_word: κρατήσαντες
  chosen: after seizing
  alternatives:
  - having seized
  - taking hold of
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verbs, so 'after seizing' expresses the sequence naturally in English while preserving the participial relationship.
- source_word: τοὺς δούλους αὐτοῦ
  chosen: his slaves
  alternatives:
  - his servants
  - his bondservants
  lexicon: BDAG
  rationale: δοῦλος can mean servant or slave depending on context. Here these are the king's emissaries in a parable, and the bonded status is present though not heavily theological. Following the project's contested-terms guidance, 'slaves' is retained as a transparent rendering, with 'servants' preserved as an alternative.
- source_word: ὕβρισαν
  chosen: mistreated them
  alternatives:
  - insulted them
  - outraged them
  - treated them shamefully
  lexicon: BDAG
  rationale: ὑβρίζω includes abusive, shameful mistreatment, not merely verbal insult. 'Mistreated them' communicates the broader violent abuse in idiomatic modern English; the object 'them' is supplied from context in English.
- source_word: ἀπέκτειναν
  chosen: killed them
  alternatives:
  - murdered them
  - put them to death
  lexicon: BDAG
  rationale: A straightforward rendering of ἀποκτείνω. 'Killed' is the most direct and natural English equivalent; 'murdered' would add a legal/moral nuance not explicit in the verb itself.
