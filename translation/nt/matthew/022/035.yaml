id: MAT.22.35
reference: Matthew 22:35
source:
  edition: SBLGNT
  text: καὶ ἐπηρώτησεν εἷς ἐξ αὐτῶν νομικὸς πειράζων ⸀αὐτόν·
translation:
  text: And one of them, a lawyer, asked him a question, testing him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'an expert in the law.' The Greek term refers to a specialist in the
      Jewish law.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this episode to the preceding context. 'And'
    preserves the simple narrative flow without adding temporal nuance beyond the
    Greek.
- source_word: ἐπηρώτησεν
  chosen: asked him a question
  alternatives:
  - asked
  - questioned
  lexicon: BDAG
  rationale: The verb means 'ask, inquire of, question.' Rendering it as 'asked him
    a question' brings out the interrogative force naturally in English and avoids
    the slightly harsher tone of 'questioned,' which can imply interrogation beyond
    the context.
- source_word: εἷς ἐξ αὐτῶν
  chosen: one of them
  alternatives:
  - one from among them
  lexicon: BDAG
  rationale: Idiomatic rendering of the partitive expression, preserving the sense
    that the speaker belonged to the group just mentioned.
- source_word: νομικὸς
  chosen: a lawyer
  alternatives:
  - an expert in the law
  - a legal expert
  lexicon: BDAG
  rationale: In this Jewish context the term refers to a specialist in the Mosaic
    law. 'Lawyer' is concise and traditional, but because modern readers may think
    of civil or courtroom law, an explanatory alternative is preserved in a footnote.
- source_word: πειράζων
  chosen: testing
  alternatives:
  - trying to test
  - tempting
  lexicon: BDAG
  rationale: 'The participle indicates motive or manner: he asked while testing Jesus.
    ''Testing'' fits the context of hostile probing better than ''tempting'' in contemporary
    English, which can suggest enticement to sin rather than examination or challenge.'
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward pronominal rendering.
