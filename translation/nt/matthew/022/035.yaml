theological_decisions:
- issue: Nuance of πειράζων in relation to Jesus
  chosen_reading: testing him
  alternative_readings:
  - tempting him
  rationale: The Greek can denote testing, trying, or tempting. In this narrative
    setting the sense is adversarial examination rather than solicitation to evil.
    Rendering 'testing him' preserves the hostile intent without importing a narrower
    theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it; readable
    modern English, not archaic or academic.
