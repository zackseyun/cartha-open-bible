  chosen_reading: slaves
  alternative_readings:
  - servants
  - bondservants
  rationale: Following the doctrine's context-dependent guidance, 'slave' is preferred where bonded status is salient. In a king's household within a parable, these are not merely employees delivering invitations but members of the household under authority. 'Slaves' preserves that social reality without importing further theological claims.
