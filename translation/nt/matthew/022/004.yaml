id: MAT.22.4
reference: Matthew 22:4
source:
  edition: SBLGNT
  text: πάλιν ἀπέστειλεν ἄλλους δούλους λέγων· Εἴπατε τοῖς κεκλημένοις· Ἰδοὺ τὸ ἄριστόν μου ⸀ἡτοίμακα, οἱ ταῦροί μου καὶ τὰ σιτιστὰ τεθυμένα, καὶ πάντα ἕτοιμα· δεῦτε εἰς τοὺς γάμους.
translation:
  text: Again he sent other slaves[a], saying, ‘Tell those who have been invited, “Look, I have prepared my dinner; my oxen and my fattened cattle have been slaughtered, and everything is ready[c][b]. Come to the wedding feast.”’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “other servants.” The Greek word is doulous, which can mean either “servants” or “slaves” depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or “my banquet” for “my dinner”; the Greek refers to a prepared meal.
    reason: lexical_alternative
  - marker: c
    text: Or simply “to the wedding”; the Greek plural can refer to the wedding celebrations as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  chosen: Again
  alternatives:
  - Once more
  lexicon: BDAG
  rationale: Adverb marking repeated action; 'Again' is concise and natural in narrative English.
- source_word: ἀπέστειλεν
  chosen: he sent
  alternatives:
  - he dispatched
  lexicon: BDAG
  rationale: Standard narrative rendering of aorist ἀποστέλλω; 'sent' is idiomatic and sufficient.
- source_word: ἄλλους δούλους
  chosen: other slaves
  alternatives:
  - other servants
  - other bondservants
  lexicon: BDAG
  rationale: δοῦλος can be 'servant' or 'slave' per doctrine. In this parabolic royal-household setting, the bonded status is more salient than mere hired service, so 'slaves' best reflects the term while remaining understandable.
- source_word: λέγων
  chosen: saying
  alternatives:
  - with these words
  lexicon: BDAG
  rationale: Participial construction naturally introduces the content of the message.
- source_word: Εἴπατε τοῖς κεκλημένοις
  chosen: Tell those who have been invited
  alternatives:
  - Say to the invited ones
  - Tell those who were invited
  lexicon: BDAG
  rationale: Perfect passive participle κεκλημένοις denotes those already invited. 'Those who have been invited' preserves the prior completed invitation with present relevance.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Discourse particle drawing attention; 'Look' is readable modern English without archaic tone.
- source_word: τὸ ἄριστόν μου
  chosen: my dinner
  alternatives:
  - my banquet
  - my midday meal
  lexicon: BDAG
  rationale: ἄριστον refers to a meal, often the earlier main meal. In this wedding context it is a formal feast meal, but 'dinner' best matches ordinary English for a prepared meal before the invitation to attend the wedding feast itself. 'Banquet' would risk collapsing the distinction with the final phrase.
- source_word: ἡτοίμακα
  chosen: I have prepared
  alternatives:
  - I have made ready
  lexicon: BDAG
  rationale: Perfect tense indicates completed preparation with present result; English present perfect matches well.
- source_word: οἱ ταῦροί μου
  chosen: my oxen
  alternatives:
  - my bulls
  - my cattle
  lexicon: BDAG
  rationale: ταῦροι are bovines, often bulls/oxen. 'Oxen' is a conventional and natural rendering in feast imagery; 'bulls' is possible but less idiomatic in this collocation.
- source_word: τὰ σιτιστὰ
  chosen: my fattened calves
  alternatives:
  - the fattened animals
  - the stall-fed cattle
  lexicon: BDAG
  rationale: σιτιστός denotes fattened, specially fed animals for slaughter. In idiomatic English feast language, 'fattened calves' communicates the sense clearly, even though 'calves' is supplied from context rather than explicit in the adjective alone.
- source_word: τεθυμένα
  chosen: have been slaughtered
  alternatives:
  - have been butchered
  - have been sacrificed
  lexicon: BDAG
  rationale: Perfect passive participle from θύω here refers to slaughtering animals for the meal. 'Sacrificed' could wrongly suggest cultic sacrifice; 'slaughtered' fits the banquet context.
- source_word: καὶ πάντα ἕτοιμα
  chosen: and everything is ready
  alternatives:
  - and all things are ready
  lexicon: BDAG
  rationale: Straightforward idiomatic rendering preserving the comprehensive scope of πάντα.
- source_word: δεῦτε
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: Invitation formula; simple imperative is best in English.
- source_word: εἰς τοὺς γάμους
  chosen: to the wedding feast
  alternatives:
  - to the wedding
  - to the marriage feast
  lexicon: BDAG
  rationale: Plural γάμοι in this context refers to wedding festivities/banquet, not merely the marriage event. 'Wedding feast' makes the social setting explicit and avoids ambiguity.
