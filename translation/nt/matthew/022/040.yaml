id: MAT.22.40
reference: Matthew 22:40
source:
  edition: SBLGNT
  text: ἐν ταύταις ταῖς δυσὶν ἐντολαῖς ὅλος ὁ νόμος ⸂κρέμαται καὶ οἱ προφῆται⸃.
translation:
  text: On these two commandments hang the whole Law and the Prophets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'In these two commandments.' The Greek preposition is ἐν ('in'), but
      'hang on' is the more natural English expression for the metaphor.
    reason: lexical_alternative
  - marker: b
    text: That is, the whole scriptural witness summarized as 'the Law and the Prophets'
      depends on these two commands.
    reason: cross_reference
lexical_decisions:
- source_word: ἐν ταύταις ταῖς δυσὶν ἐντολαῖς
  chosen: On these two commandments
  alternatives:
  - In these two commandments
  lexicon: BDAG
  rationale: The preposition ἐν with this idiom can be rendered formally as 'in,'
    but in English 'hang on' is the natural collocation with κρέμαται. Rendering the
    phrase as 'On these two commandments' preserves the metaphor and yields idiomatic
    English without departing from the Greek sense of dependence/resting upon.
- source_word: ὅλος ὁ νόμος
  chosen: the whole Law
  alternatives:
  - all the Law
  - the entire Law
  lexicon: BDAG
  rationale: ὅλος with the singular νόμος emphasizes totality. 'The whole Law' is
    natural English and preserves the comprehensive force. 'Law' is capitalized because
    in Matthean Jewish context νόμος refers to the Torah/the scriptural legal corpus,
    not merely law in the abstract.
- source_word: κρέμαται
  chosen: hang
  alternatives:
  - depends
  - is suspended
  lexicon: BDAG
  rationale: κρέμαται literally means 'hangs.' The metaphor communicates that the
    Law and the Prophets are dependent on or summed up in these commandments. Retaining
    'hang' preserves the vivid image and remains understandable in English; 'depends'
    is interpretive and less formally transparent.
- source_word: καὶ οἱ προφῆται
  chosen: and the Prophets
  alternatives:
  - and the prophets
  lexicon: BDAG
  rationale: This phrase is part of the established Jewish expression 'the Law and
    the Prophets,' referring to the scriptural witness. Capitalizing 'Prophets' signals
    the canonical/literary reference rather than merely prophetic persons in general.
