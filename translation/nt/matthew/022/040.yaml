theological_decisions:
- issue: Meaning of the formula 'the Law and the Prophets'
  chosen_reading: A reference to the scriptural/covenantal witness as a whole, summarized
    as dependent on the two love commandments
  alternative_readings:
  - A narrower reference only to legal and prophetic ethical teaching
  rationale: In Matthew, 'the Law and the Prophets' is a stock expression for the
    authoritative scriptural corpus or its summed-up teaching. The translation preserves
    the formula rather than paraphrasing it as 'Scripture' or 'all God's commands,'
    allowing the canonical resonance to remain visible.
