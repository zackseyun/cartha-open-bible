theological_decisions:
- issue: Rendering Jesus' perception of his opponents' inner motive
  chosen_reading: Jesus is described as knowing their evil intent.
  alternative_readings:
  - Jesus perceived their wickedness
  - Jesus knew their malice
  rationale: The verse presents Jesus as accurately discerning the moral character
    of their approach. The translation preserves that claim without expanding it into
    a broader doctrinal statement beyond the text.
