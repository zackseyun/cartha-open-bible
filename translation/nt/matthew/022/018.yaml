id: MAT.22.18
reference: Matthew 22:18
source:
  edition: SBLGNT
  text: γνοὺς δὲ ὁ Ἰησοῦς τὴν πονηρίαν αὐτῶν εἶπεν· Τί με πειράζετε, ὑποκριταί;
translation:
  text: But Jesus, knowing their evil intent, said, “Why are you testing me, hypocrites?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “their wickedness” or “their malice.”
    reason: lexical_alternative
  - marker: b
    text: Or “Why are you tempting me?” The Greek verb can mean “test,” “try,” or
      “tempt,” depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  chosen: knowing
  alternatives:
  - perceiving
  - understanding
  - becoming aware of
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω, functioning circumstantially before the
    main verb. 'Knowing' is concise and natural in English while preserving the sense
    that Jesus was aware of their inner motive before speaking.
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: δέ here marks a mild contrast or transition. 'But' fits the adversative
    nuance in context, as Jesus responds to their deceptive approach.
- source_word: πονηρίαν
  chosen: evil intent
  alternatives:
  - wickedness
  - malice
  - evil
  lexicon: BDAG
  rationale: πονηρία can denote wickedness or malicious intent. In this context Jesus
    discerns not merely abstract moral evil but the hostile motive behind their question,
    so 'evil intent' brings out the contextual force clearly.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: Standard narrative rendering of λέγω in the aorist. 'Said' is the most
    natural and sufficiently formal choice.
- source_word: Τί
  chosen: Why
  alternatives:
  - for what reason
  - what
  lexicon: BDAG
  rationale: Although literally 'what,' τί in this idiom with a verb can mean 'why.'
    English idiom requires 'Why are you testing me?' rather than the wooden 'What
    are you testing me for?'
- source_word: πειράζετε
  chosen: are you testing
  alternatives:
  - are you trying
  - are you tempting
  lexicon: BDAG
  rationale: πειράζω can mean test, try, or tempt. Here the opponents are attempting
    to trap Jesus, so 'testing' preserves the lexical link without importing only
    inward moral temptation. Present tense is naturally rendered 'are you testing.'
- source_word: ὑποκριταί
  chosen: hypocrites
  alternatives:
  - pretenders
  - play-actors
  lexicon: BDAG
  rationale: The established and accurate rendering is 'hypocrites.' While the term
    historically relates to acting, in this context it denotes people who feign sincerity
    while concealing hostile motives.
