id: MAT.22.20
reference: Matthew 22:20
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Τίνος ἡ εἰκὼν αὕτη καὶ ἡ ἐπιγραφή;
translation:
  text: And he said to them, “Whose image is this, and whose inscription?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Whose is this image and inscription?' The Greek asks
      about ownership/association by means of the genitive interrogative.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: he said
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Although the Greek present can be rendered as a historical present ('he
    says'), idiomatic modern English in narrative commonly uses the simple past. This
    preserves the sense without awkwardness.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun indicating the indirect object of speech; 'to them'
    is the natural English equivalent.
- source_word: Τίνος
  chosen: Whose
  alternatives:
  - Of whom
  lexicon: BDAG
  rationale: Genitive interrogative asking possession or ownership. 'Whose' is the
    clear, idiomatic English rendering in this context.
- source_word: εἰκών
  chosen: image
  alternatives:
  - likeness
  - portrait
  lexicon: BDAG
  rationale: '''Image'' is the standard and contextually fitting rendering for εἰκών
    here, referring to the emperor''s likeness on the coin. It also preserves the
    lexical connection familiar in biblical usage without overinterpreting.'
- source_word: αὕτη
  chosen: this
  alternatives:
  - this one
  lexicon: BDAG
  rationale: Demonstrative modifying 'image'; simple 'this' is natural English.
- source_word: ἐπιγραφή
  chosen: inscription
  alternatives:
  - writing
  - legend
  lexicon: BDAG
  rationale: Refers to the written marking on the coin. 'Inscription' is precise,
    readable modern English, and more specific than 'writing.'
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction linking the two queried features of
    the coin.
