id: MAT.22.1
reference: Matthew 22:1
source:
  edition: SBLGNT
  text: Καὶ ἀποκριθεὶς ὁ Ἰησοῦς πάλιν εἶπεν ⸂ἐν παραβολαῖς αὐτοῖς⸃ λέγων·
translation:
  text: 'And Jesus answered and again spoke to them in parables[a], saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'responded and again said to them in parables.' The Greek uses the common narrative idiom 'answered' even when no direct question is stated immediately beforehand.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Then
  - Now
  lexicon: BDAG
  rationale: Standard connective; 'And' preserves the narrative flow without adding temporal nuance not explicit in the Greek.
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - responding
  lexicon: BDAG
  rationale: Aorist participle of ἀποκρίνομαι commonly functions idiomatically in narrative as 'answered.' English can sound slightly abrupt when no direct question precedes, but this reflects common Greek usage and preserves the textual wording.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  rationale: Proper name with article in Greek; English omits the article before personal names.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  - anew
  lexicon: BDAG
  rationale: Indicates repeated action in the discourse sequence; 'again' is the most natural and direct rendering.
- source_word: εἶπεν
  chosen: spoke
  alternatives:
  - said
  lexicon: BDAG
  rationale: Because λέγων follows, rendering εἶπεν as 'spoke' avoids awkward repetition ('said ... saying') while preserving the sense of verbal address.
- source_word: ἐν παραβολαῖς
  chosen: in parables
  alternatives:
  - with parables
  - by parables
  lexicon: BDAG
  rationale: The preposition ἐν with the dative here expresses manner or medium; 'in parables' is the standard and natural English equivalent.
- source_word: αὐτοῖς
  chosen: to them
  alternatives:
  - to those people
  lexicon: BDAG
  rationale: Dative pronoun indicating the audience of Jesus' speech; 'to them' is the straightforward rendering.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  - with these words
  lexicon: BDAG
  rationale: Present participle introducing the content of the speech. Retained as 'saying' to mirror the Greek structure and prepare for the following quotation/parabolic discourse.
