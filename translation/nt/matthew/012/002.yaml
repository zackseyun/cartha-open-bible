id: MAT.12.2
reference: Matthew 12:2
source:
  edition: SBLGNT
  text: οἱ δὲ Φαρισαῖοι ἰδόντες εἶπαν αὐτῷ· Ἰδοὺ οἱ μαθηταί σου ποιοῦσιν ὃ οὐκ ἔξεστιν ποιεῖν ἐν σαββάτῳ.
translation:
  text: But when the Pharisees saw it[a], they said to him, “Look, your disciples are doing what is not lawful to do on the Sabbath.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “what is not permitted to do on the Sabbath.”
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding narrative development; 'But' best conveys the adversative force in natural English.
- source_word: ἰδόντες
  chosen: when ... saw it
  alternatives:
  - seeing
  - having seen
  lexicon: BDAG
  rationale: 'Aorist participle is rendered temporally in idiomatic English. ''Saw it'' makes explicit the object implied by context: the disciples'' action in the grainfields.'
- source_word: εἶπαν αὐτῷ
  chosen: they said to him
  alternatives:
  - they told him
  lexicon: BDAG
  rationale: Standard speech formula; 'said to him' is the most direct and neutral rendering.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: Deictic interjection drawing attention to the accusation. 'Look' preserves force in readable modern English; 'Behold' is too archaic.
- source_word: μαθηταί
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate term for μαθηταί in Gospel contexts, preserving the teacher-disciple relationship.'
- source_word: ποιοῦσιν ... ποιεῖν
  chosen: are doing ... to do
  alternatives:
  - are doing ... to perform
  - do ... to do
  lexicon: BDAG
  rationale: The repeated forms of ποιέω are preserved with 'doing ... to do' to reflect the Greek emphasis and accusation without unnecessary paraphrase.
- source_word: ὃ οὐκ ἔξεστιν
  chosen: what is not lawful
  alternatives:
  - what is not permitted
  - what is unlawful
  lexicon: BDAG
  rationale: ἔξεστιν denotes what is permitted or allowed. 'Not lawful' fits the Pharisees' halakhic objection and matches the legal-religious register of the context.
- source_word: ἐν σαββάτῳ
  chosen: on the Sabbath
  alternatives:
  - on a Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: Idiomatic English for temporal ἐν with Sabbath observance context is 'on the Sabbath.' The article is not present in Greek, but English usage normally takes 'the Sabbath' for the institution/day in view.
