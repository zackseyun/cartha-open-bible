theological_decisions:
- issue: Nature of the Pharisees' objection
  chosen_reading: Render ἔξεστιν in legal-permissive terms ('not lawful') without specifying whether the issue is biblical law or Pharisaic tradition.
  alternative_readings:
  - not permitted
  - against the law
  rationale: The verse presents the accusation without adjudicating its correctness or defining the precise legal source. This preserves the narrative and theological tension rather than importing a later interpretive conclusion.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
