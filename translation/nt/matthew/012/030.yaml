theological_decisions:
- issue: Force of Jesus' absolute antithesis
  chosen_reading: The verse is rendered as an uncompromising statement of alignment
    with or opposition to Jesus, without softening the polarity.
  alternative_readings:
  - A more idiomatic paraphrase that weakens the absolute contrast
  rationale: The Greek presents two stark parallel clauses with no mitigating language.
    The translation preserves that theological tension and exclusivity without importing
    further doctrinal conclusions.
  doctrine_reference: Preserve theological tension rather than resolve it.
