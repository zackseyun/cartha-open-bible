id: MAT.12.30
reference: Matthew 12:30
source:
  edition: SBLGNT
  text: ὁ μὴ ὢν μετ’ ἐμοῦ κατ’ ἐμοῦ ἐστιν, καὶ ὁ μὴ συνάγων μετ’ ἐμοῦ σκορπίζει.
translation:
  text: The one who is not with me is against me, and the one who does not gather
    with me scatters.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Whoever is not with me is against me, and whoever does not gather with
      me scatters.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὴ ὢν
  chosen: the one who is not
  alternatives:
  - whoever is not
  - he who is not
  lexicon: BDAG
  rationale: The article with participle functions substantivally, referring to a
    person characterized by not being with Jesus. 'The one who is not' preserves the
    generic singular force without sounding archaic like 'he who is not.'
- source_word: μετ’ ἐμοῦ
  chosen: with me
  alternatives:
  - on my side
  - along with me
  lexicon: BDAG
  rationale: μετά with the genitive normally means association or accompaniment. 'With
    me' is the most direct rendering and preserves the relational alignment implied
    in the saying.
- source_word: κατ’ ἐμοῦ
  chosen: against me
  alternatives:
  - opposed to me
  lexicon: BDAG
  rationale: κατά with the genitive here expresses opposition. 'Against me' is the
    standard and clearest English equivalent.
- source_word: συνάγων
  chosen: gather
  alternatives:
  - bring together
  - collect
  lexicon: BDAG
  rationale: The participle denotes the act of gathering together. 'Gather' is concise,
    idiomatic, and preserves the likely shepherding/harvest imagery without over-specifying
    it.
- source_word: σκορπίζει
  chosen: scatters
  alternatives:
  - disperses
  lexicon: BDAG
  rationale: σκορπίζω commonly means to scatter or disperse. 'Scatters' pairs naturally
    with 'gather' and preserves the antithetical parallelism of the Greek.
- source_word: καὶ
  chosen: and
  alternatives:
  - but
  lexicon: BDAG
  rationale: The conjunction is additive here, linking two parallel assertions. 'And'
    preserves the Greek coordination better than an interpretive 'but.'
