id: MAT.12.34
reference: Matthew 12:34
source:
  edition: SBLGNT
  text: γεννήματα ἐχιδνῶν, πῶς δύνασθε ἀγαθὰ λαλεῖν πονηροὶ ὄντες; ἐκ γὰρ τοῦ περισσεύματος
    τῆς καρδίας τὸ στόμα λαλεῖ.
translation:
  text: Offspring of vipers, how can you speak good things when you are evil? For
    out of the overflow of the heart the mouth speaks.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Brood of vipers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'For out of the abundance of the heart the mouth speaks.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γεννήματα ἐχιδνῶν
  chosen: Offspring of vipers
  alternatives:
  - Brood of vipers
  - Children of vipers
  lexicon: BDAG
  rationale: γέννημα denotes that which is begotten or produced; with the genitive
    ἐχιδνῶν it forms a sharp metaphor of lineage/character. 'Offspring of vipers'
    is natural modern English and preserves the image without archaic tone. 'Brood
    of vipers' is a strong traditional alternative and is preserved in a footnote.
- source_word: πῶς δύνασθε
  chosen: how can you
  alternatives:
  - how are you able to
  lexicon: BDAG
  rationale: The combination expresses rhetorical impossibility or incapacity. 'How
    can you' is idiomatic English and preserves the force of the rebuke.
- source_word: ἀγαθὰ λαλεῖν
  chosen: speak good things
  alternatives:
  - speak what is good
  - say good things
  lexicon: BDAG
  rationale: ἀγαθά is neuter plural functioning substantivally, and λαλεῖν is 'to
    speak/say.' 'Speak good things' stays close to the Greek while remaining readable.
    'Speak what is good' is possible but slightly more interpretive.
- source_word: πονηροὶ ὄντες
  chosen: when you are evil
  alternatives:
  - being evil
  - since you are evil
  lexicon: BDAG
  rationale: The participial construction gives the circumstance/condition under which
    the rhetorical question is posed. 'When you are evil' is smooth modern English
    and preserves the moral characterization of πονηροί.
- source_word: ἐκ γὰρ τοῦ περισσεύματος
  chosen: For out of the overflow
  alternatives:
  - For out of the abundance
  - For from what fills up
  lexicon: BDAG
  rationale: περίσσευμα refers to abundance, surplus, or overflow. 'Overflow' vividly
    conveys the image of what spills out from inward fullness and fits the metaphorical
    context. 'Abundance' is a viable more formal alternative and is preserved in a
    footnote.
- source_word: τῆς καρδίας
  chosen: of the heart
  lexicon: BDAG
  rationale: καρδία in biblical usage commonly denotes the inner person, including
    thought and will, not merely emotion. 'Heart' is the standard and sufficiently
    broad English equivalent.
- source_word: τὸ στόμα λαλεῖ
  chosen: the mouth speaks
  alternatives:
  - the mouth says
  lexicon: BDAG
  rationale: A straightforward clause linking speech to inner moral condition. 'The
    mouth speaks' is both literal and idiomatic.
