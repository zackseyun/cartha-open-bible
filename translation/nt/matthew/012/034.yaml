theological_decisions:
- issue: Metaphorical force of 'heart'
  chosen_reading: Retain 'heart' as the biblical term for the inner person rather
    than interpreting it as merely emotions or mind.
  alternative_readings:
  - inner self
  - mind
  rationale: The verse grounds outward speech in the inward moral/spiritual center.
    Preserving 'heart' maintains biblical anthropology and avoids narrowing the term
    beyond what the Greek states.
  doctrine_reference: Translation philosophy §1, §6
- issue: Moral characterization in πονηροὶ ὄντες
  chosen_reading: Translate πονηροί as 'evil' rather than softening to 'bad.'
  alternative_readings:
  - bad
  - wicked
  rationale: In this rebuke Jesus is making a moral judgment, not merely describing
    poor quality. 'Evil' best preserves the ethical weight without over-intensifying
    beyond the text.
  doctrine_reference: Translation philosophy §1, §6
