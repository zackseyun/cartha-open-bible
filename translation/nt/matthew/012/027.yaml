id: MAT.12.27
reference: Matthew 12:27
source:
  edition: SBLGNT
  text: καὶ εἰ ἐγὼ ἐν Βεελζεβοὺλ ἐκβάλλω τὰ δαιμόνια, οἱ υἱοὶ ὑμῶν ἐν τίνι ἐκβάλλουσιν; διὰ τοῦτο αὐτοὶ ⸂κριταὶ ἔσονται ὑμῶν⸃.
translation:
  text: And if I cast out demons by Beelzebul[a], by whom do your sons cast them out? Therefore they will be your judges.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''Beelzebul''; many English translations have ''Beelzebub.'''
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν Βεελζεβοὺλ
  chosen: by Beelzebul
  alternatives:
  - in Beelzebul
  - by Beelzebub
  lexicon: BDAG
  rationale: The preposition ἐν here is instrumental in sense in this accusation context, so 'by Beelzebul' communicates agency/means more naturally than a wooden 'in Beelzebul.' The SBLGNT form is Βεελζεβούλ, so the name is transliterated as 'Beelzebul'; the familiar variant 'Beelzebub' is preserved as an alternative.
- source_word: ἐκβάλλω τὰ δαιμόνια
  chosen: cast out demons
  alternatives:
  - drive out demons
  lexicon: BDAG
  rationale: ἐκβάλλω in exorcism contexts commonly means 'cast out' or 'drive out.' 'Cast out' is the established and still natural English equivalent, and it preserves the force of expulsion. δαιμόνια is rendered 'demons' in standard modern English.
- source_word: οἱ υἱοὶ ὑμῶν
  chosen: your sons
  alternatives:
  - your people
  - your followers
  lexicon: BDAG
  rationale: The literal phrase is 'your sons.' In context it likely refers to members of the hearers' own group or disciples, but the Greek uses the kinship term υἱοί, and the translation philosophy prefers preserving the source wording unless context requires otherwise. This also maintains the rhetorical parallel in Jesus' argument.
- source_word: ἐν τίνι
  chosen: by whom
  alternatives:
  - by what
  - in whom
  lexicon: BDAG
  rationale: As with the earlier ἐν, the sense is instrumental/agentive. Because the implied comparison is with a personal power or authority, 'by whom' is the most idiomatic and contextually fitting rendering in English.
- source_word: διὰ τοῦτο
  chosen: Therefore
  alternatives:
  - for this reason
  - because of this
  lexicon: BDAG
  rationale: διὰ τοῦτο introduces the conclusion drawn from the rhetorical question. 'Therefore' is concise and preserves the inferential force.
- source_word: κριταὶ ἔσονται ὑμῶν
  chosen: they will be your judges
  alternatives:
  - they will judge you
  - they will be judges of you
  lexicon: BDAG
  rationale: The predicate nominative construction is most directly represented by 'they will be your judges.' This preserves both the future tense and the nominative noun κριταί without over-paraphrasing, while still sounding natural in English.
