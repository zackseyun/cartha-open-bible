id: MAT.12.43
reference: Matthew 12:43
source:
  edition: SBLGNT
  text: Ὅταν δὲ τὸ ἀκάθαρτον πνεῦμα ἐξέλθῃ ἀπὸ τοῦ ἀνθρώπου, διέρχεται δι’ ἀνύδρων
    τόπων ζητοῦν ἀνάπαυσιν, καὶ οὐχ εὑρίσκει.
translation:
  text: Now when the unclean spirit goes out from the man, it passes through waterless
    places seeking rest, and does not find it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'dry places.' The Greek is literally 'waterless places.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅταν
  chosen: when
  alternatives:
  - whenever
  - now when
  lexicon: BDAG
  rationale: Introduces a general temporal condition. In English, 'when' is the most
    natural base rendering; the discourse particle δέ is reflected by 'Now' at the
    start of the sentence rather than folding all force into ὅταν.
- source_word: δὲ
  chosen: Now
  alternatives:
  - but
  - and
  lexicon: BDAG
  rationale: Marks a transition in Jesus' discourse. 'Now' conveys the mild connective/continuative
    force better than adversative 'but' in this context.
- source_word: τὸ ἀκάθαρτον πνεῦμα
  chosen: the unclean spirit
  alternatives:
  - the impure spirit
  lexicon: BDAG
  rationale: Standard and transparent rendering of the phrase in Gospel exorcism contexts.
    'Unclean spirit' preserves the Jewish purity-background resonance better than
    the more generic 'impure spirit'.
- source_word: ἐξέλθῃ
  chosen: goes out
  alternatives:
  - comes out
  - has gone out
  lexicon: BDAG
  rationale: Aorist subjunctive after ὅταν in a general condition is naturally rendered
    with English present 'goes out.' 'Comes out' is possible, but 'goes out' fits
    the movement away from the man.
- source_word: ἀπὸ τοῦ ἀνθρώπου
  chosen: from the man
  alternatives:
  - from a man
  - from the person
  lexicon: BDAG
  rationale: The article supports a definite singular reference within the illustrative
    saying. 'Man' follows the gender-accurate policy and matches ἄνθρωπος here without
    flattening to gender-neutral 'person'.
- source_word: διέρχεται
  chosen: it passes through
  alternatives:
  - it goes through
  - it travels through
  lexicon: BDAG
  rationale: Conveys movement through a region. 'Passes through' is idiomatic and
    suitably neutral.
- source_word: δι’ ἀνύδρων τόπων
  chosen: through waterless places
  alternatives:
  - through dry places
  - through arid regions
  lexicon: BDAG
  rationale: ἄνυδρος is literally 'without water.' 'Waterless places' preserves the
    concrete imagery more closely than the traditional but slightly interpretive 'dry
    places'.
- source_word: ζητοῦν
  chosen: seeking
  alternatives:
  - looking for
  lexicon: BDAG
  rationale: Participial action contemporaneous with διέρχεται. 'Seeking' is concise
    and preserves the verbal connection to purposeful search.
- source_word: ἀνάπαυσιν
  chosen: rest
  alternatives:
  - a resting place
  - relief
  lexicon: BDAG
  rationale: The noun denotes rest/repose. 'Rest' is the most direct rendering; 'a
    resting place' is interpretive and more specific than the Greek requires.
- source_word: καὶ οὐχ εὑρίσκει
  chosen: and does not find it
  alternatives:
  - but does not find any
  - and finds none
  lexicon: BDAG
  rationale: English idiom benefits from supplying the object 'it,' referring back
    to 'rest,' though it is implicit in Greek. This keeps the sentence natural without
    adding new content.
