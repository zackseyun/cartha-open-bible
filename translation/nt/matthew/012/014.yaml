id: MAT.12.14
reference: Matthew 12:14
source:
  edition: SBLGNT
  text: ⸂ἐξελθόντες δὲ οἱ Φαρισαῖοι συμβούλιον ἔλαβον κατ’ αὐτοῦ⸃ ὅπως αὐτὸν ἀπολέσωσιν.
translation:
  text: But the Pharisees went out and took counsel against him[a], how they might destroy him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'kill him' or 'put him to death.' The Greek says 'destroy him,' which can include lethal intent in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  chosen: went out
  alternatives:
  - having gone out
  - after going out
  lexicon: BDAG
  rationale: Aorist participle of ἐξέρχομαι, functioning temporally/sequentially. 'Went out' gives natural English while preserving the action of departure that sets up the plot.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or development. 'But' fits the narrative turn from Jesus' action to the Pharisees' hostile response.
- source_word: Φαρισαῖοι
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the Jewish group name; names are transliterated by project philosophy.
- source_word: συμβούλιον ἔλαβον
  chosen: conspired
  alternatives:
  - took counsel
  - held a council
  - made plans
  lexicon: BDAG
  rationale: The idiom literally means 'took counsel,' but in this hostile context it denotes deliberate plotting. 'Conspired' captures the sense idiomatically without overstating beyond the following purpose clause.
- source_word: κατ’ αὐτοῦ
  chosen: against him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: κατά with the genitive here carries adversative force in context. 'Against him' best reflects the hostile intent.
- source_word: ὅπως
  chosen: how they might
  alternatives:
  - so that they might
  - in order that they might
  lexicon: BDAG
  rationale: Introduces the content/purpose of their plotting. 'How they might' is idiomatic English after 'conspired' and preserves the deliberative nuance.
- source_word: ἀπολέσωσιν
  chosen: destroy him
  alternatives:
  - kill him
  - put him to death
  lexicon: BDAG
  rationale: ἀπόλλυμι can mean 'destroy' or 'kill' depending on context. Here it refers to eliminating Jesus, likely with lethal intent, but 'destroy him' preserves the Greek's broader wording and traditional Matthean diction without narrowing more than necessary.
