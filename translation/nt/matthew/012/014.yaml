theological_decisions:
- issue: Degree of specificity in rendering ἀπολέσωσιν
  chosen_reading: destroy him
  alternative_readings:
  - kill him
  - put him to death
  rationale: The context clearly indicates hostile intent, but the Greek verb itself is broader than an explicit verb for killing. To avoid importing a more specific claim than the text states, the main text keeps 'destroy him,' while preserving more explicit alternatives in a footnote.
