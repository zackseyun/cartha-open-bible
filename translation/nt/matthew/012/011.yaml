id: MAT.12.11
reference: Matthew 12:11
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Τίς ⸀ἔσται ἐξ ὑμῶν ἄνθρωπος ὃς ἕξει πρόβατον ἕν, καὶ ἐὰν ἐμπέσῃ τοῦτο τοῖς σάββασιν εἰς βόθυνον, οὐχὶ κρατήσει αὐτὸ καὶ ἐγερεῖ;
translation:
  text: But he said to them[a], “Which man among you, if he has one sheep and it falls into a pit on the Sabbath[b], will not take hold of it and lift it out?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'on the Sabbaths,' an idiomatic plural meaning 'on the Sabbath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will he not take hold of it and raise it up?'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τίς ἔσται ἐξ ὑμῶν ἄνθρωπος
  chosen: Which man among you
  alternatives:
  - What man among you
  - Who among you is the man
  lexicon: BDAG
  rationale: Renders the idiomatic rhetorical question naturally in English while preserving the masculine singular ἄνθρωπος as 'man' per gender-accurate policy. 'Which man among you' fits the expected-answer structure.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  lexicon: BDAG
  rationale: The Greek is grammatically masculine singular and representative; 'man' preserves the source form and rhetorical style better than the gender-neutral 'person' in this context.
- source_word: ἕξει
  chosen: has
  alternatives:
  - owns
  - keeps
  lexicon: BDAG
  rationale: 'Although future in form within the rhetorical construction, idiomatic English expresses the condition with present ''has'': ''if he has one sheep.'' This preserves sense without wooden futurity.'
- source_word: πρόβατον ἕν
  chosen: one sheep
  alternatives:
  - a single sheep
  lexicon: BDAG
  rationale: Straightforward rendering of numeral plus noun; 'one sheep' is natural and preserves the emphasis on the animal's singularity and value.
- source_word: ἐὰν ἐμπέσῃ τοῦτο
  chosen: if it falls
  alternatives:
  - if this one falls
  - if it should fall
  lexicon: BDAG
  rationale: Conditional aorist subjunctive is well represented by 'if it falls' in English. The pronoun τοῦτο refers to the sheep and is naturally rendered 'it.'
- source_word: τοῖς σάββασιν
  chosen: on the Sabbath
  alternatives:
  - on a Sabbath
  - on the Sabbaths
  lexicon: BDAG
  rationale: The plural form σάββασιν is a common idiomatic way of referring to the Sabbath day. In this dispute context, singular 'the Sabbath' best conveys the sense in English.
- source_word: εἰς βόθυνον
  chosen: into a pit
  alternatives:
  - into a ditch
  - into a cistern
  lexicon: BDAG
  rationale: βόθυνος denotes a pit or hole. 'Pit' is broad, natural, and avoids over-specifying the kind of depression.
- source_word: οὐχὶ
  chosen: will not
  alternatives:
  - will he not
  lexicon: BDAG
  rationale: οὐχί marks a question expecting a positive answer. 'Will not' communicates that expectation in smooth modern English; the inversion 'will he not' is more formal.
- source_word: κρατήσει
  chosen: take hold of
  alternatives:
  - grab
  - seize
  - lay hold of
  lexicon: BDAG
  rationale: κρατέω here means to grasp firmly. 'Take hold of' is clear, dignified, and avoids the harshness of 'seize' or the colloquial tone of 'grab.'
- source_word: ἐγερεῖ
  chosen: lift it out
  alternatives:
  - raise it up
  - pull it out
  lexicon: BDAG
  rationale: In context, ἐγείρω refers to raising the sheep from the pit. 'Lift it out' makes the implied motion explicit in natural English. The object 'out' is contextually supplied from the pit imagery.
