  chosen_reading: man
  alternative_readings:
  - person
  rationale: The verse uses masculine singular representative language in a rhetorical example. Per doctrine, gender-accurate rendering is preferred over gender-neutral smoothing unless context requires otherwise.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Rendering of σάββασιν
  chosen_reading: on the Sabbath
  alternative_readings:
