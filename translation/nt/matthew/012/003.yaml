id: MAT.12.3
reference: Matthew 12:3
source:
  edition: SBLGNT
  text: ὁ δὲ εἶπεν αὐτοῖς· Οὐκ ἀνέγνωτε τί ἐποίησεν Δαυὶδ ὅτε ⸀ἐπείνασεν καὶ οἱ μετ’
    αὐτοῦ;
translation:
  text: But he said to them, “Have you not read what David did when he was hungry,
    and those with him were hungry?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Did you not read what David did when he and those with him were hungry?”
      The Greek can be understood with the hunger applying to both David and those
      with him, though the singular verb explicitly refers to David.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ
  chosen: But he
  alternatives:
  - And he
  - Then he
  lexicon: BDAG
  rationale: δέ is a mild connective often rendered 'but,' 'and,' or left untranslated
    depending on discourse flow. Here 'But he' naturally marks Jesus' response to
    the Pharisees' accusation.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: λέγω with dative αὐτοῖς is straightforwardly 'said to them.' 'Told' is
    possible but slightly more interpretive.
- source_word: Οὐκ ἀνέγνωτε
  chosen: Have you not read
  alternatives:
  - Did you not read
  lexicon: BDAG
  rationale: The aorist indicative in this rhetorical question idiom is commonly rendered
    in English as 'Have you not read,' especially in Gospel dispute contexts, preserving
    the force of an appeal to Scripture familiarity more naturally than the simple
    past.
- source_word: τί ἐποίησεν
  chosen: what ... did
  alternatives:
  - what ... did happen to do
  lexicon: BDAG
  rationale: ποιέω here means 'do' in a simple historical sense. No expansion is warranted.
- source_word: Δαυὶδ
  chosen: David
  lexicon: BDAG
  rationale: Standard transliteration of the personal name.
- source_word: ὅτε ἐπείνασεν
  chosen: when he was hungry
  alternatives:
  - when he became hungry
  - when he hungered
  lexicon: BDAG
  rationale: πεινάω means 'to be hungry.' 'Was hungry' is idiomatic modern English;
    'hungered' is archaic, and 'became hungry' over-presses aspect.
- source_word: καὶ οἱ μετ’ αὐτοῦ
  chosen: and those with him
  alternatives:
  - and his companions
  - and the ones with him
  lexicon: BDAG
  rationale: The articular phrase literally means 'the ones with him.' 'Those with
    him' is clear and close to the Greek. 'His companions' is smoother but slightly
    more interpretive.
