theological_decisions:
- issue: Nature of Jesus' knowledge of their inner thoughts
  chosen_reading: Render the text simply as Jesus 'knowing their thoughts' without
    specifying whether this knowledge was supernatural omniscience, prophetic insight,
    or perceptive discernment.
  alternative_readings:
  - Jesus supernaturally knew their thoughts
  - Jesus inferred their thoughts from context and speech
  rationale: The verse states the fact of his knowledge but does not explain its mechanism.
    To preserve theological tension and avoid importing a doctrinal claim beyond the
    text, the translation leaves the mode of knowledge unstated.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
