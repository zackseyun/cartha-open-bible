id: MAT.12.25
reference: Matthew 12:25
source:
  edition: SBLGNT
  text: εἰδὼς ⸀δὲ τὰς ἐνθυμήσεις αὐτῶν εἶπεν αὐτοῖς· Πᾶσα βασιλεία μερισθεῖσα καθ’
    ἑαυτῆς ἐρημοῦται, καὶ πᾶσα πόλις ἢ οἰκία μερισθεῖσα καθ’ ἑαυτῆς οὐ σταθήσεται.
translation:
  text: But knowing their thoughts, he said to them, “Every kingdom divided against
    itself is laid waste, and every city or house divided against itself will not
    stand.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reasonings' or 'intentions' for 'thoughts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'becomes desolate' or 'is brought to ruin.'
    reason: lexical_alternative
  - marker: c
    text: '''House'' may also carry the sense of ''household'' in this context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  chosen: knowing
  alternatives:
  - perceiving
  - being aware of
  lexicon: BDAG
  rationale: Aorist participle from ὁράω used idiomatically for mental perception/knowledge.
    'Knowing' is natural English and preserves the participial connection to the main
    verb without overinterpreting how Jesus knew.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild transition/contrast. 'But' fits the argumentative turn
    in context better than a simple connective.
- source_word: ἐνθυμήσεις
  chosen: thoughts
  alternatives:
  - reasonings
  - intentions
  lexicon: BDAG
  rationale: The noun can denote thoughts, reflections, or inward reasonings. 'Thoughts'
    is the clearest modern English rendering here, while still covering hostile inner
    deliberation.
- source_word: Πᾶσα βασιλεία
  chosen: Every kingdom
  alternatives:
  - Any kingdom
  lexicon: BDAG
  rationale: πᾶσα with a singular noun in a proverbial statement is well rendered
    'Every kingdom,' preserving the universal principle Jesus states.
- source_word: μερισθεῖσα καθ’ ἑαυτῆς
  chosen: divided against itself
  alternatives:
  - divided within itself
  - split against itself
  lexicon: BDAG
  rationale: This participial phrase expresses internal division. 'Divided against
    itself' is idiomatic English and preserves the adversative force of κατά with
    the reflexive pronoun.
- source_word: ἐρημοῦται
  chosen: is laid waste
  alternatives:
  - is devastated
  - is brought to ruin
  - becomes desolate
  lexicon: BDAG
  rationale: The verb carries the sense of becoming desolate or ruined. 'Is laid waste'
    preserves the passive/resultative force and the severity of the image better than
    the flatter 'is ruined.'
- source_word: πόλις ἢ οἰκία
  chosen: city or house
  alternatives:
  - town or household
  - city or household
  lexicon: BDAG
  rationale: πόλις is straightforwardly 'city.' οἰκία can mean house or household;
    here the parallel with kingdom and city allows either a literal house or a household
    unit. 'House' preserves the Greek form and keeps the saying broad enough to include
    both senses by implication.
- source_word: οὐ σταθήσεται
  chosen: will not stand
  alternatives:
  - will not endure
  - will not remain standing
  lexicon: BDAG
  rationale: Future passive of ἵστημι in this idiom means to remain established or
    endure. 'Will not stand' is concise, traditional, and fully natural in English.
