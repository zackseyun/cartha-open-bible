id: MAT.12.21
reference: Matthew 12:21
source:
  edition: SBLGNT
  text: καὶ τῷ ὀνόματι αὐτοῦ ἔθνη ἐλπιοῦσιν.
translation:
  text: and in his name the nations will hope.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Gentiles will hope in his name.'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  chosen: and
  lexicon: BDAG
  rationale: Standard coordinating conjunction; retained straightforwardly to preserve
    the verse's connection to the preceding quotation.
- source_word: τῷ ὀνόματι αὐτοῦ
  chosen: in his name
  alternatives:
  - in his reputation
  - on his name
  lexicon: BDAG
  rationale: The dative with ἐλπίζω is naturally rendered 'in' in English here. ὄνομα
    can denote name, reputation, or person/authority represented by the name; 'in
    his name' preserves the biblical-theological resonance and the Isaianic quotation's
    force without over-interpreting.
- source_word: ἔθνη
  chosen: the nations
  alternatives:
  - Gentiles
  - the peoples
  lexicon: BDAG
  rationale: ἔθνη can mean 'nations' or 'Gentiles.' In this Isaianic context the broader
    sense of the peoples/nations beyond Israel is primary. 'The nations' preserves
    the OT quotation's scope and avoids narrowing the term to an ethnic label only.
- source_word: ἐλπιοῦσιν
  chosen: will hope
  alternatives:
  - will place their hope
  - will trust
  lexicon: BDAG
  rationale: Future active indicative, so 'will hope' is the most direct rendering.
    'Trust' is possible in context, but 'hope' better reflects the lexical value of
    ἐλπίζω and preserves the eschatological tone of the promise.
