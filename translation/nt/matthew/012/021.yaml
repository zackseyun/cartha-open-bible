theological_decisions:
- issue: Rendering of ἔθνη in a messianic quotation
  chosen_reading: the nations
  alternative_readings:
  - Gentiles
  rationale: The verse quotes Isaiah and speaks of the wider peoples placing hope
    in the servant/Messiah. 'The nations' best preserves the OT horizon while still
    including the Gentile sense. 'Gentiles' is preserved as an alternative because
    many English translations use it and it is contextually plausible.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency
    of key terms, or documented exception.
