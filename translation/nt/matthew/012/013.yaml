id: MAT.12.13
reference: Matthew 12:13
source:
  edition: SBLGNT
  text: τότε λέγει τῷ ἀνθρώπῳ· Ἔκτεινόν ⸂σου τὴν χεῖρα⸃· καὶ ἐξέτεινεν, καὶ ἀπεκατεστάθη
    ὑγιὴς ὡς ἡ ἄλλη.
translation:
  text: Then he says to the man, “Stretch out your hand.” And he stretched it out,
    and it was restored, healthy like the other one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “it was healed”; the Greek verb emphasizes restoration to a proper condition.
    reason: lexical_alternative
  - marker: b
    text: Literally, “healthy as the other,” with “other” referring to the man's other
      hand.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking narrative sequence; 'Then' is natural modern
    English and preserves the flow.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: Greek present is a historical present. Rendering as present ('he says')
    preserves the vivid narrative style of Matthew without obscuring meaning.
- source_word: τῷ ἀνθρώπῳ
  chosen: to the man
  alternatives:
  - to the person
  lexicon: BDAG
  rationale: ἄνθρωπος here refers to a specific male individual in context, so 'the
    man' is gender-accurate and more precise than a neutral alternative.
- source_word: Ἔκτεινόν
  chosen: Stretch out
  alternatives:
  - Extend
  - Hold out
  lexicon: BDAG
  rationale: Aorist imperative of ἐκτείνω gives a direct command. 'Stretch out' is
    idiomatic English and fits the physical action described.
- source_word: σου τὴν χεῖρα
  chosen: your hand
  alternatives:
  - your arm
  lexicon: BDAG
  rationale: χείρ normally means 'hand,' though it can sometimes extend semantically
    toward 'arm.' Here 'hand' matches both the immediate wording and the healing context.
- source_word: ἐξέτεινεν
  chosen: he stretched it out
  alternatives:
  - he extended it
  lexicon: BDAG
  rationale: English normally supplies the object pronoun for clarity after the prior
    command. 'Stretched it out' mirrors the verbal repetition between command and
    response.
- source_word: ἀπεκατεστάθη
  chosen: it was restored
  alternatives:
  - it was healed
  - it was made well
  lexicon: BDAG
  rationale: Passive of ἀποκαθίστημι emphasizes restoration to a former proper condition.
    'Was restored' preserves that nuance better than the more general 'was healed.'
- source_word: ὑγιὴς
  chosen: healthy
  alternatives:
  - sound
  - well
  - whole
  lexicon: BDAG
  rationale: ὑγιής denotes soundness/health. 'Healthy' is clear modern English; 'whole'
    is possible but can sound more interpretive or idiomatic than the adjective itself.
- source_word: ὡς ἡ ἄλλη
  chosen: like the other one
  alternatives:
  - as the other
  - like the other hand
  lexicon: BDAG
  rationale: The feminine adjective implies comparison with the other hand. 'Like
    the other one' is natural English while preserving the implied referent without
    overloading the text.
