theological_decisions:
- issue: Nature of the healing description
  chosen_reading: The text describes the man's hand as restored to health, without
    adding further doctrinal interpretation.
  alternative_readings:
  - The hand was healed
  - The hand was made whole
  rationale: The verse narrates a miracle plainly. 'Restored' best reflects ἀπεκατεστάθη
    and avoids importing extra theological claims beyond the text's wording.
  doctrine_reference: Preserve theological tension rather than resolve it.
