theological_decisions:
- issue: Rendering of familial language in Jesus' redefinition of kinship
  chosen_reading: 'Retain literal family terms: ''mother'' and ''brothers'''
  alternative_readings:
  - Use inclusive paraphrase such as 'family' or 'siblings'
  rationale: The verse intentionally uses concrete kinship terms to identify Jesus'
    disciples with his true family. A broader paraphrase would soften the rhetorical
    force and import interpretation beyond the Greek wording.
  doctrine_reference: Translation philosophy §§3-4
