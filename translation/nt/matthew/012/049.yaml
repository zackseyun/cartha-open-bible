id: MAT.12.49
reference: Matthew 12:49
source:
  edition: SBLGNT
  text: καὶ ἐκτείνας τὴν χεῖρα αὐτοῦ ἐπὶ τοὺς μαθητὰς αὐτοῦ εἶπεν· Ἰδοὺ ἡ μήτηρ μου
    καὶ οἱ ἀδελφοί μου·
translation:
  text: And stretching out his hand toward his disciples, he said, “Behold, my mother
    and my brothers.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Look” or “See” for “Behold.”
    reason: lexical_alternative
  - marker: b
    text: Greek “brothers”; the masculine plural is retained here rather than expanded
      to “brothers and sisters.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκτείνας
  chosen: stretching out
  alternatives:
  - extending
  - having stretched out
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main verb, naturally rendered as an
    attendant action: ''stretching out.'' This preserves the physical gesture without
    sounding overly wooden.'
- source_word: χεῖρα
  chosen: hand
  alternatives:
  - arm
  lexicon: BDAG
  rationale: The normal sense here is 'hand,' matching the concrete gesture Jesus
    makes toward the disciples.
- source_word: ἐπὶ
  chosen: toward
  alternatives:
  - over
  - to
  - towards
  lexicon: BDAG
  rationale: With the accusative and this gesture context, ἐπί conveys direction toward
    the disciples rather than location over them. 'Toward' best captures the motion
    and sense in idiomatic English.
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - followers
  lexicon: BDAG
  rationale: '''Disciples'' is the standard and contextually precise rendering for
    μαθηταί in the Gospels, preserving the teacher-disciple relationship.'
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: ἰδού is a demonstrative attention-getter. 'Behold' preserves the solemn,
    emphatic force in a concise way, though 'Look' or 'See' are possible in more colloquial
    English.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Straightforward familial term; no contextual reason to vary from the
    ordinary gloss.
- source_word: ἀδελφοί
  chosen: brothers
  alternatives:
  - brothers and sisters
  - siblings
  lexicon: BDAG
  rationale: The Greek is grammatically masculine plural and in this immediate saying
    parallels literal family language. Per the project's gender-accurate policy, 'brothers'
    is preferred over an inclusive expansion not explicit in the text.
