theological_decisions:
- issue: Potential interpretive softening of Jesus' rhetorical question about family identity
  chosen_reading: Retain the literal rhetorical questions without explanatory expansion
  alternative_readings:
  - Who counts as my mother, and who count as my brothers?
  rationale: The verse sets up Jesus' redefinition of kinship in the following context, but this verse itself should not import that explanation into the wording. A straightforward rendering preserves the narrative and theological tension.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Gender rendering of ἀδελφοί
  chosen_reading: brothers
  alternative_readings:
  - brothers and sisters
  - siblings
  rationale: The immediate referent is Jesus' named family members in the scene, not a generic mixed group. The translation therefore follows the source's masculine kinship term rather than broadening it.
  doctrine_reference: Translation philosophy §4 Gender-accurate over gender-neutral
