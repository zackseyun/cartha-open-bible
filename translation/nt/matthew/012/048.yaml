id: MAT.12.48
reference: Matthew 12:48
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν τῷ ⸀λέγοντι αὐτῷ· Τίς ἐστιν ἡ μήτηρ μου, καὶ τίνες εἰσὶν οἱ ἀδελφοί μου;
translation:
  text: But he answered the one speaking to him[a], “Who is my mother, and who are my brothers?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “But he answered and said to the one speaking to him.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ ἀποκριθεὶς εἶπεν
  chosen: But he answered
  alternatives:
  - And he answered and said
  - But answering, he said
  lexicon: BDAG
  rationale: The participle ἀποκριθεὶς with εἶπεν is a common Semitic-influenced Greek idiom meaning 'answered and said.' In natural English, 'answered' sufficiently conveys the sense without unnecessary redundancy, while δέ is represented by 'But' to mark the discourse turn.
- source_word: τῷ λέγοντι αὐτῷ
  chosen: the one speaking to him
  alternatives:
  - the one who was speaking to him
  - him who told him
  lexicon: BDAG
  rationale: The present participle λέγοντι is substantival and dative, referring to the person addressing Jesus. 'The one speaking to him' preserves the ongoing verbal action more closely than a more interpretive rendering.
- source_word: Τίς
  chosen: Who
  alternatives:
  - What person
  lexicon: BDAG
  rationale: The interrogative pronoun naturally asks for identity here. Simple 'Who' is idiomatic and precise.
- source_word: μήτηρ μου
  chosen: my mother
  lexicon: BDAG
  rationale: A direct, literal rendering of the kinship term with possessive pronoun.
- source_word: καὶ τίνες
  chosen: and who
  alternatives:
  - and which ones are
  lexicon: BDAG
  rationale: The second interrogative parallels the first. English idiom prefers 'and who' rather than a more wooden plural form.
- source_word: οἱ ἀδελφοί μου
  chosen: my brothers
  alternatives:
  - my brothers and sisters
  - my siblings
  lexicon: BDAG
  rationale: ἀδελφοί is grammatically masculine plural and in this immediate context refers to Jesus' familial 'brothers' as presented in the narrative. Per the gender-accurate policy, 'brothers' is preferred over gender-neutral alternatives.
