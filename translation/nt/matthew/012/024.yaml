id: MAT.12.24
reference: Matthew 12:24
source:
  edition: SBLGNT
  text: οἱ δὲ Φαρισαῖοι ἀκούσαντες εἶπον· Οὗτος οὐκ ἐκβάλλει τὰ δαιμόνια εἰ μὴ ἐν τῷ Βεελζεβοὺλ ἄρχοντι τῶν δαιμονίων.
translation:
  text: But when the Pharisees heard it[a], they said, “This man does not cast out demons except by Beelzebul, the ruler of the demons.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Beelzebul: traditionally ''Beelzebub.'''
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks contrast with the preceding positive reaction; 'But' best conveys the adversative force in natural English.
- source_word: ἀκούσαντες
  chosen: when the Pharisees heard it
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle is naturally rendered temporally in English. 'Heard it' supplies the implied object from context rather than leaving the English abrupt.
- source_word: Οὗτος
  chosen: This man
  alternatives:
  - This one
  - He
  lexicon: BDAG
  rationale: The demonstrative is slightly dismissive in context; 'This man' preserves that hostile tone better than the more neutral 'he'.
- source_word: ἐκβάλλει
  chosen: cast out
  alternatives:
  - drives out
  - expels
  lexicon: BDAG
  rationale: Standard idiomatic rendering in exorcism contexts; clear and natural while remaining close to the Greek.
- source_word: δαιμόνια
  chosen: demons
  alternatives:
  - evil spirits
  lexicon: BDAG
  rationale: Direct and conventional rendering of δαιμόνια in the Synoptic context.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this construction it introduces the sole alleged means or basis; 'except' is the most concise and natural English equivalent.
- source_word: ἐν τῷ Βεελζεβοὺλ
  chosen: by Beelzebul
  alternatives:
  - in Beelzebul
  - by the power of Beelzebul
  lexicon: BDAG
  rationale: Although ἐν is formally 'in,' here it expresses means or agency in context. 'By Beelzebul' communicates the accusation clearly without over-paraphrasing.
- source_word: Βεελζεβοὺλ
  chosen: Beelzebul
  alternatives:
  - Beelzebub
  lexicon: BDAG
  rationale: Follows the Greek form in the SBLGNT rather than the more familiar traditional English form. As a proper name, it is transliterated per translation philosophy; the common variant is preserved in a footnote.
- source_word: ἄρχοντι τῶν δαιμονίων
  chosen: the ruler of the demons
  alternatives:
  - the prince of demons
  - the chief of the demons
  lexicon: BDAG
  rationale: ἄρχων denotes a ruler or prince. 'Ruler' is more accessible modern English while preserving the sense of authority over demons.
