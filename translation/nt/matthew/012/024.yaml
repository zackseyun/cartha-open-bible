theological_decisions:
- issue: Rendering the hostile demonstrative Οὗτος
  chosen_reading: This man
  alternative_readings:
  - This one
  - He
  rationale: The Pharisees speak contemptuously about Jesus. 'This man' preserves the disparaging force without adding doctrinal interpretation.
  doctrine_reference: Translation philosophy §6 (readable modern English) and §1 (source-language primacy).
- issue: Name form Βεελζεβούλ
  chosen_reading: Beelzebul
  alternative_readings:
  - Beelzebub
  rationale: The Greek text here reads Βεελζεβούλ, so the main text follows the source form. Because 'Beelzebub' is a familiar traditional form and may reflect a textual/name variant in transmission and reception, it is preserved in a footnote rather than replacing the source-based rendering.
  doctrine_reference: Translation philosophy §1 (source-language primacy) and §2 (transliterate names).
