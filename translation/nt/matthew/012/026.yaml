theological_decisions:
- issue: Referent and force of Satan's self-division
  chosen_reading: 'The verse is rendered as a reductio argument: if Satan were expelling Satan, his own dominion would be internally divided and unable to endure.'
  alternative_readings:
  - A more paraphrastic rendering could foreground 'house divided' imagery from the broader context.
  rationale: The Greek itself states the logic of internal division and the instability of Satan's kingdom without requiring expansion. The translation preserves the theological point without importing extra explanatory wording.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
