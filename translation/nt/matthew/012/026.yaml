id: MAT.12.26
reference: Matthew 12:26
source:
  edition: SBLGNT
  text: καὶ εἰ ὁ Σατανᾶς τὸν Σατανᾶν ἐκβάλλει, ἐφ’ ἑαυτὸν ἐμερίσθη· πῶς οὖν σταθήσεται ἡ βασιλεία αὐτοῦ;
translation:
  text: And if Satan casts out Satan[a], he is divided against himself[c][b]. How then will his kingdom stand?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'drives out Satan.'
    reason: lexical_alternative
  - marker: b
    text: Or 'has been divided against himself.'
    reason: lexical_alternative
  - marker: c
    text: Or 'How then can his kingdom stand?'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἰ
  chosen: And if
  alternatives:
  - If
  lexicon: BDAG
  rationale: Retains the connective καὶ along with the conditional εἰ. In English, 'And if' preserves the argumentative flow from the preceding context better than simply 'If.'
- source_word: ὁ Σατανᾶς / τὸν Σατανᾶν
  chosen: Satan
  alternatives:
  - the Adversary
  lexicon: BDAG
  rationale: Standard transliteration of the personal name/title Σατανᾶς, in keeping with the translation philosophy to transliterate names rather than translate them.
- source_word: ἐκβάλλει
  chosen: casts out
  alternatives:
  - drives out
  - expels
  lexicon: BDAG
  rationale: '''Casts out'' is the established and accurate rendering in exorcism contexts, matching the semantic force of ἐκβάλλω without becoming overly technical.'
- source_word: ἐφ’ ἑαυτὸν
  chosen: against himself
  alternatives:
  - against his own self
  - over against himself
  lexicon: BDAG
  rationale: The idiom ἐπὶ + reflexive pronoun here conveys opposition or internal conflict. 'Against himself' is natural English and preserves the sense.
- source_word: ἐμερίσθη
  chosen: he is divided
  alternatives:
  - he has been divided
  - he was divided
  lexicon: BDAG
  rationale: 'Aorist passive of μερίζω in this proverbial/logical statement is best rendered with an English present-result sense: ''is divided.'' This communicates the state resulting from the hypothetical action and fits the argument''s immediacy.'
- source_word: πῶς οὖν
  chosen: How then
  alternatives:
  - How, then
  - How therefore
  lexicon: BDAG
  rationale: Preserves both the interrogative πῶς and inferential οὖν in clear modern English.
- source_word: σταθήσεται
  chosen: will ... stand
  alternatives:
  - will ... remain
  - will ... endure
  lexicon: BDAG
  rationale: Future passive of ἵστημι here means 'stand' in the sense of continue, remain established. 'Stand' is concise and preserves the metaphor used in the argument.
- source_word: ἡ βασιλεία αὐτοῦ
  chosen: his kingdom
  alternatives:
  - the kingdom belonging to him
  - his reign
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom; here 'kingdom' best fits the image of a divided dominion and is the most natural English rendering in context.
