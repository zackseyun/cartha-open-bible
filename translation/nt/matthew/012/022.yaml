theological_decisions:
- issue: Nature of demonic affliction language
  chosen_reading: 'Retain explicit demonic language: ''demon-possessed'''
  alternative_readings:
  - mentally ill
  - afflicted
  rationale: The Greek explicitly attributes the man's condition to demonic agency.
    Per translation philosophy, the draft must not naturalize or demythologize the
    text by substituting a modern clinical category or a vague term.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
- issue: Sense of κωφός in this context
  chosen_reading: Render as inability to speak rather than deafness
  alternative_readings:
  - deaf
  - deaf and mute
  rationale: While κωφός can mean either deaf or mute, the result clause specifies
    restored speaking and seeing, not hearing. The translation preserves the contextual
    sense without importing an additional disability not stated in the outcome clause.
  doctrine_reference: Translation philosophy 1 and 5
