id: MAT.12.22
reference: Matthew 12:22
source:
  edition: SBLGNT
  text: Τότε ⸂προσηνέχθη αὐτῷ δαιμονιζόμενος τυφλὸς καὶ κωφός⸃· καὶ ἐθεράπευσεν αὐτόν,
    ὥστε τὸν ⸀κωφὸν λαλεῖν καὶ βλέπειν.
translation:
  text: Then a demon-possessed man, blind and mute, was brought to him; and he healed
    him, so that the mute man spoke and saw.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'deaf.' The Greek word can refer to someone who is deaf or unable to
      speak; here the context favors 'unable to speak' because the result is that
      he spoke and saw.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural and sufficiently precise.
- source_word: προσηνέχθη αὐτῷ
  chosen: was brought to him
  alternatives:
  - they brought to him
  lexicon: BDAG
  rationale: Aorist passive singular of προσφέρω is best represented by an English
    passive here. The agent is unspecified in Greek, so 'was brought to him' preserves
    that.
- source_word: δαιμονιζόμενος
  chosen: demon-possessed
  alternatives:
  - demonized
  - under the power of a demon
  lexicon: BDAG
  rationale: Standard idiomatic rendering for one afflicted by demonic influence.
    'Demonized' is more literal to form but less natural in English; 'demon-possessed'
    communicates the sense without adding detail beyond the text.
- source_word: τυφλὸς
  chosen: blind
  lexicon: BDAG
  rationale: Direct lexical equivalent.
- source_word: κωφός
  chosen: unable to speak
  alternatives:
  - mute
  - deaf
  lexicon: BDAG
  rationale: Although κωφός can denote 'deaf' or 'mute/speech-impaired' depending
    on context, the immediate result clause 'to speak and see' shows that inability
    to speak is the disability in view here. 'Unable to speak' is clearer and more
    natural than 'mute' for modern readers.
- source_word: ἐθεράπευσεν
  chosen: he healed
  alternatives:
  - he cured
  lexicon: BDAG
  rationale: θεραπεύω commonly means 'heal' in Gospel miracle contexts. 'He healed'
    is the standard and most transparent rendering.
- source_word: ὥστε
  chosen: so that
  alternatives:
  - with the result that
  lexicon: BDAG
  rationale: Introduces the result of the healing. 'So that' is concise and natural.
- source_word: τὸν κωφὸν
  chosen: the man who had been unable to speak
  alternatives:
  - the mute man
  - the speechless man
  lexicon: BDAG
  rationale: The article plus adjective functions substantivally. Because κωφός was
    rendered earlier as 'unable to speak' from context, this phrase is expanded slightly
    for clear English and consistency of sense.
- source_word: λαλεῖν
  chosen: spoke
  alternatives:
  - began to speak
  lexicon: BDAG
  rationale: Infinitive after ὥστε expressing result; in idiomatic English the finite
    verb 'spoke' best conveys the outcome. 'Began to speak' adds an inceptive nuance
    not explicit in the Greek.
- source_word: βλέπειν
  chosen: saw
  alternatives:
  - could see
  lexicon: BDAG
  rationale: Simple result of restored sight. 'Saw' is concise; the context already
    implies restored ability.
