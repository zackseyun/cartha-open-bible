theological_decisions:
- issue: Rendering of σάββασιν
  chosen_reading: on the Sabbath
  alternative_readings:
  - on the Sabbaths
  rationale: Although the Greek form is plural, in this idiom it refers to the Sabbath
    day. The choice is grammatical and contextual rather than doctrinal, and avoids
    misleading the reader into thinking multiple Sabbaths are in view.
  doctrine_reference: Translation philosophy §1, §6
