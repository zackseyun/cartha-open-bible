id: MAT.12.1
reference: Matthew 12:1
source:
  edition: SBLGNT
  text: Ἐν ἐκείνῳ τῷ καιρῷ ἐπορεύθη ὁ Ἰησοῦς τοῖς σάββασιν διὰ τῶν σπορίμων· οἱ δὲ
    μαθηταὶ αὐτοῦ ἐπείνασαν καὶ ἤρξαντο τίλλειν στάχυας καὶ ἐσθίειν.
translation:
  text: At that time Jesus went through the grainfields on the Sabbath, and his disciples
    became hungry and began to pluck heads of grain and eat.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'on the Sabbaths,' an idiomatic plural meaning 'on the Sabbath.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῳ τῷ καιρῷ
  chosen: At that time
  alternatives:
  - At that season
  - At that point
  lexicon: BDAG
  rationale: καιρός here denotes a time/occasion rather than a clock-time. 'At that
    time' is natural English and preserves the narrative temporal marker without overtranslating.
- source_word: ἐπορεύθη
  chosen: went
  alternatives:
  - traveled
  - was going
  lexicon: BDAG
  rationale: πορεύομαι often means 'go' or 'travel.' In this narrative context, simple
    'went' is idiomatic and sufficient; 'was going' would overemphasize aspect in
    English.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbath
  alternatives:
  - on the Sabbaths
  - during the Sabbath
  lexicon: BDAG
  rationale: The plural form σάββασιν is a common idiomatic way of referring to the
    Sabbath day in Koine. Singular 'on the Sabbath' best reflects the sense in natural
    English.
- source_word: διὰ τῶν σπορίμων
  chosen: through the grainfields
  alternatives:
  - through the grainfields
  - through the standing grain
  - through the fields of grain
  lexicon: BDAG
  rationale: σπόριμος refers to sown/planted fields, especially grainfields. 'Grainfields'
    is concise, accurate, and readable.
- source_word: οἱ δὲ μαθηταὶ αὐτοῦ
  chosen: and his disciples
  alternatives:
  - but his disciples
  - now his disciples
  lexicon: BDAG
  rationale: δέ here is mildly connective rather than strongly adversative. 'And his
    disciples' fits the flow of English narrative better than a more contrastive 'but.'
- source_word: ἐπείνασαν
  chosen: became hungry
  alternatives:
  - were hungry
  - grew hungry
  lexicon: BDAG
  rationale: The aorist ingressive sense is well represented by 'became hungry,' indicating
    the onset of hunger rather than merely a static condition.
- source_word: ἤρξαντο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: ἄρχομαι with an infinitive marks the beginning of an action. 'Began'
    is the standard and suitably formal rendering.
- source_word: τίλλειν
  chosen: to pluck
  alternatives:
  - to pick
  lexicon: BDAG
  rationale: τίλλω means to pluck or pull off. 'Pluck' is slightly more precise than
    'pick' for removing grain heads by hand.
- source_word: στάχυας
  chosen: heads of grain
  alternatives:
  - ears of grain
  - grain heads
  lexicon: BDAG
  rationale: στάχυς denotes an ear/head of grain. 'Heads of grain' is clear in contemporary
    English; 'ears of grain' is traditional but less immediately transparent to some
    readers.
- source_word: καὶ ἐσθίειν
  chosen: and eat
  alternatives:
  - and to eat
  lexicon: BDAG
  rationale: The infinitive coordinates with τίλλειν after ἤρξαντο. English idiom
    prefers 'began to pluck ... and eat' rather than repeating 'to' before both verbs.
