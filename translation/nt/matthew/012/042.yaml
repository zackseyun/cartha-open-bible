theological_decisions:
- issue: How to render the neuter comparative πλεῖον in relation to Jesus
  chosen_reading: something greater than Solomon
  alternative_readings:
  - one greater than Solomon
  - more than Solomon
  rationale: The Greek uses the neuter form πλεῖον, which can point to a reality greater
    than Solomon rather than simply a male individual. Rendering it as 'something
    greater' preserves the grammatical form and the theological breadth of Jesus'
    claim without diminishing that he himself is the one in view. 'One greater' is
    a common interpretive rendering but is less formally precise.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
