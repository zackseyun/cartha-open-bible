id: MAT.12.42
reference: Matthew 12:42
source:
  edition: SBLGNT
  text: βασίλισσα νότου ἐγερθήσεται ἐν τῇ κρίσει μετὰ τῆς γενεᾶς ταύτης καὶ κατακρινεῖ
    αὐτήν· ὅτι ἦλθεν ἐκ τῶν περάτων τῆς γῆς ἀκοῦσαι τὴν σοφίαν Σολομῶνος, καὶ ἰδοὺ
    πλεῖον Σολομῶνος ὧδε.
translation:
  text: The queen of the South will rise up in the judgment with this generation and
    will condemn it, because she came from the ends of the earth to hear the wisdom
    of Solomon, and behold, something greater than Solomon is here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'one greater than Solomon is here.' The Greek uses a neuter form ('something
      greater'), which may emphasize the surpassing greatness present in Jesus and
      his ministry.
    reason: alternative_reading
  - marker: b
    text: The 'queen of the South' alludes to the queen of Sheba (1 Kings 10:1–13;
      2 Chronicles 9:1–12), though the Greek text does not name Sheba explicitly.
    reason: cross_reference
lexical_decisions:
- source_word: βασίλισσα νότου
  chosen: the queen of the South
  alternatives:
  - the queen of the south
  - the Queen of Sheba
  lexicon: BDAG
  rationale: A genitive construction meaning 'queen of the South.' Capitalizing 'South'
    is a stylistic choice reflecting a geographic designation. 'Queen of Sheba' is
    interpretive from the OT background (1 Kgs 10; 2 Chr 9) but not stated in the
    Greek, so it is not used in the main text.
- source_word: ἐγερθήσεται
  chosen: will rise up
  alternatives:
  - will be raised
  - will stand up
  lexicon: BDAG
  rationale: Future passive of ἐγείρω can mean 'be raised' or 'rise up.' In this judgment
    context, 'will rise up' preserves both the resurrection/judicial nuance and idiomatic
    English without over-specifying the mechanism.
- source_word: ἐν τῇ κρίσει
  chosen: in the judgment
  alternatives:
  - at the judgment
  - in judgment
  lexicon: BDAG
  rationale: The article points to a definite eschatological judgment. 'In the judgment'
    is a natural rendering that preserves the formal sense of the prepositional phrase.
- source_word: μετὰ τῆς γενεᾶς ταύτης
  chosen: with this generation
  alternatives:
  - against this generation
  - along with this generation
  lexicon: BDAG
  rationale: μετά with the genitive normally means 'with,' not 'against.' The adversative
    force comes from the following 'will condemn it,' so the main text keeps the preposition's
    ordinary sense.
- source_word: γενεᾶς ταύτης
  chosen: this generation
  alternatives:
  - these people of this generation
  lexicon: BDAG
  rationale: γενεά here refers to the contemporaneous generation addressed by Jesus.
    'This generation' is the standard and sufficiently clear rendering.
- source_word: κατακρινεῖ αὐτήν
  chosen: and will condemn it
  alternatives:
  - and will pass judgment on it
  - and will condemn this generation
  lexicon: BDAG
  rationale: κατακρίνω means 'condemn.' The pronoun αὐτήν refers back to the feminine
    noun γενεά, hence 'it' in English for the collective noun 'generation.' Expanding
    to 'this generation' is possible but less formally transparent.
- source_word: ἐκ τῶν περάτων τῆς γῆς
  chosen: from the ends of the earth
  alternatives:
  - from the farthest parts of the earth
  - from the ends of the land
  lexicon: BDAG
  rationale: A conventional idiom for extreme distance. 'Earth' is preferable to 'land'
    here because the expression is universalized and idiomatic in English.
- source_word: ἀκοῦσαι
  chosen: to hear
  alternatives:
  - to listen to
  lexicon: BDAG
  rationale: 'The aorist infinitive expresses purpose: she came ''to hear.'' This
    is direct and idiomatic.'
- source_word: τὴν σοφίαν Σολομῶνος
  chosen: the wisdom of Solomon
  alternatives:
  - Solomon's wisdom
  lexicon: BDAG
  rationale: A straightforward genitive construction. The more formal phrasing preserves
    the Greek order and emphasis.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing emphatic attention. 'Behold' preserves
    the solemn force better than the more colloquial 'look,' while remaining understandable
    in context.
- source_word: πλεῖον Σολομῶνος
  chosen: something greater than Solomon
  alternatives:
  - one greater than Solomon
  - more than Solomon
  lexicon: BDAG
  rationale: The neuter πλεῖον is best preserved as 'something greater' rather than
    'one greater.' This avoids prematurely resolving the grammatical form into a masculine
    personal referent while still conveying the comparison. In context Jesus refers
    to a greatness present in himself and his ministry that surpasses Solomon.
- source_word: ὧδε
  chosen: is here
  alternatives:
  - is in this place
  - here
  lexicon: BDAG
  rationale: ὧδε means 'here'; supplying 'is' is required in English. 'Is here' is
    concise and natural.
