id: MAT.12.28
reference: Matthew 12:28
source:
  edition: SBLGNT
  text: εἰ δὲ ἐν πνεύματι θεοῦ ἐγὼ ἐκβάλλω τὰ δαιμόνια, ἄρα ἔφθασεν ἐφ’ ὑμᾶς ἡ βασιλεία
    τοῦ θεοῦ.
translation:
  text: But if I cast out the demons by the Spirit of God, then the kingdom of God
    has come upon you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the Spirit of God.' The Greek phrase can be rendered either way;
      here it is taken as expressing means or agency.
    reason: lexical_alternative
  - marker: b
    text: Or 'has overtaken you' or 'has arrived upon you.' The Greek verb emphasizes
      that God's kingdom has reached them in Jesus' works.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  chosen: But if
  alternatives:
  - If, however
  - But if indeed
  lexicon: BDAG
  rationale: Renders the conditional particle with δέ's mild contrast. 'But if' is
    natural English and preserves the argumentative turn from the preceding context.
- source_word: ἐν πνεύματι θεοῦ
  chosen: by the Spirit of God
  alternatives:
  - in the Spirit of God
  - by God's Spirit
  lexicon: BDAG
  rationale: With ἐν plus dative, the phrase can denote means or agency here. 'By
    the Spirit of God' best fits the sense that Jesus' exorcisms are performed through
    divine agency, while preserving the personal reference to the Spirit.
- source_word: ἐγὼ
  chosen: I
  lexicon: BDAG
  rationale: The explicit pronoun is retained in English because it contributes emphasis
    in the Greek argument, though English does not require additional stress marking
    beyond the pronoun itself.
- source_word: ἐκβάλλω
  chosen: cast out
  alternatives:
  - drive out
  - expel
  lexicon: BDAG
  rationale: '''Cast out'' is the standard and transparent rendering in exorcism contexts,
    preserving both the force and the idiomatic biblical usage without becoming archaic.'
- source_word: τὰ δαιμόνια
  chosen: the demons
  alternatives:
  - demons
  - the evil spirits
  lexicon: BDAG
  rationale: The article is retained as 'the demons,' referring to demonic beings
    as the objects of Jesus' exorcistic activity. 'Demons' is the clearest modern
    equivalent for δαιμόνια.
- source_word: ἄρα
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks the inference drawn from the condition. 'Then' is concise and natural
    in English while preserving the logical conclusion.
- source_word: ἔφθασεν
  chosen: has come
  alternatives:
  - has arrived
  - has overtaken
  - came
  lexicon: BDAG
  rationale: The aorist of φθάνω here conveys arrival/reaching. 'Has come' communicates
    the present relevance of the kingdom's arrival in idiomatic English. 'Has overtaken'
    is possible but too strong and less natural in this context.
- source_word: ἐφ’ ὑμᾶς
  chosen: upon you
  alternatives:
  - to you
  - among you
  - against you
  lexicon: BDAG
  rationale: ἐπί with accusative after φθάνω naturally conveys movement reaching 'upon'
    or 'to' someone. 'Upon you' preserves the vividness and possible confrontational
    force of the kingdom's arrival better than the flatter 'to you' or the interpretive
    'among you'.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  chosen: the kingdom of God
  alternatives:
  - God's kingdom
  - the reign of God
  lexicon: BDAG
  rationale: This is the established and accurate rendering of βασιλεία τοῦ θεοῦ.
    'Kingdom' preserves both royal rule and kingdom-domain associations without narrowing
    the phrase to only abstract reign.
