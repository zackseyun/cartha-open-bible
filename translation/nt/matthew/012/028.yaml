theological_decisions:
- issue: Meaning of 'the kingdom of God' in relation to Jesus' exorcisms
  chosen_reading: The verse presents Jesus' casting out of demons by the Spirit as
    evidence that God's kingdom has already arrived upon his hearers in a real, present
    sense.
  alternative_readings:
  - The kingdom has merely drawn near but not yet arrived
  - The phrase refers only to a future consummation
  rationale: The aorist ἔφθασεν indicates arrival/reaching, and the argument depends
    on the exorcisms being present evidence of God's kingly rule breaking in now.
    This preserves inaugurated-kingdom tension without denying future consummation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Reference of 'Spirit of God'
  chosen_reading: A personal reference to the Spirit of God, not an impersonal divine
    force.
  alternative_readings:
  - A general reference to divine power
  rationale: πνεύματι θεοῦ in this context refers to the Spirit as the divine agent
    of Jesus' exorcisms. Rendering 'Spirit' with capitalization in English reflects
    standard Christian understanding and the likely referent in context without adding
    content beyond the text.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD)'
