theological_decisions:
- issue: Forensic sense of δικαιόω in relation to speech and judgment
  chosen_reading: Rendered δικαιωθήσῃ as 'you will be justified' in a judicial sense, indicating acquittal/vindication on the basis of one's words as evidence.
  alternative_readings:
  - you will be vindicated
  - you will be acquitted
  rationale: The immediate parallel with 'you will be condemned' makes the courtroom setting explicit. Retaining 'justified' preserves canonical and theological continuity while not importing a full doctrinal formulation of justification beyond what this verse states.
  doctrine_reference: Translation philosophy §§1, 3, 5
