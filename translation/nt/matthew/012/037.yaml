id: MAT.12.37
reference: Matthew 12:37
source:
  edition: SBLGNT
  text: ἐκ γὰρ τῶν λόγων σου δικαιωθήσῃ, καὶ ἐκ τῶν λόγων σου καταδικασθήσῃ.
translation:
  text: For by your words you will be justified[a], and by your words you will be condemned.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'you will be vindicated' or 'you will be acquitted.' The Greek verb can carry a judicial sense of being declared in the right.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ
  chosen: by
  alternatives:
  - from
  - out of
  lexicon: BDAG
  rationale: 'Here ἐκ with the genitive marks basis or evidence: the judgment proceeds on the basis of a person''s words. ''By'' is idiomatic in English and preserves the forensic sense better than a more wooden ''from'' or ''out of''.'
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ introduces the ground or explanation for the preceding warning about speech. 'For' preserves the connective force without overinterpreting the exact nuance.
- source_word: λόγων
  chosen: words
  alternatives:
  - speech
  - statements
  lexicon: BDAG
  rationale: λόγος in the plural here refers to spoken utterances. 'Words' is the most direct and natural rendering, matching the repeated parallelism of the Greek.
- source_word: σου
  chosen: your
  lexicon: BDAG
  rationale: The genitive pronoun is possessive, directly modifying 'words' in both clauses.
- source_word: δικαιωθήσῃ
  chosen: you will be justified
  alternatives:
  - you will be declared righteous
  - you will be acquitted
  - you will be vindicated
  lexicon: BDAG
  rationale: The future passive of δικαιόω in this judgment context is forensic. 'Justified' preserves the legal-theological register and the verbal connection to broader biblical usage. 'Declared righteous' is interpretively fuller; 'acquitted' and 'vindicated' capture aspects of the sense but narrow or shift the term.
- source_word: καταδικασθήσῃ
  chosen: you will be condemned
  alternatives:
  - you will be found guilty
  - you will be sentenced
  lexicon: BDAG
  rationale: The future passive of καταδικάζω is judicial and stands in deliberate antithesis to δικαιωθήσῃ. 'Condemned' is the clearest English equivalent and preserves the courtroom contrast.
