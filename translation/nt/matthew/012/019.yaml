id: MAT.12.19
reference: Matthew 12:19
source:
  edition: SBLGNT
  text: οὐκ ἐρίσει οὐδὲ κραυγάσει, οὐδὲ ἀκούσει τις ἐν ταῖς πλατείαις τὴν φωνὴν αὐτοῦ.
translation:
  text: He will not quarrel or cry out[a], and no one will hear his voice in the streets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He will not strive or shout, and no one will hear his voice in the public squares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρίσει
  chosen: will quarrel
  alternatives:
  - will strive
  - will argue
  - will contend
  lexicon: BDAG
  rationale: Future of ἐρίζω denotes engaging in strife or quarrelling. 'Quarrel' is natural modern English and fits the Isaiah citation context about the servant's non-contentious manner better than the more archaic 'strive.'
- source_word: κραυγάσει
  chosen: will cry out
  alternatives:
  - will shout
  - will raise a cry
  lexicon: BDAG
  rationale: κραυγάζω refers to crying out loudly or shouting. 'Cry out' preserves the verbal parallelism and avoids overstating mere volume with a more aggressive 'shout,' while still conveying public loudness.
- source_word: ἀκούσει τις
  chosen: no one will hear
  alternatives:
  - nor will anyone hear
  - and no one will hear
  lexicon: BDAG
  rationale: Although literally 'nor will anyone hear,' idiomatic English expresses the negated indefinite as 'no one will hear.' This preserves the sense of the Greek construction without awkwardness.
- source_word: ἐν ταῖς πλατείαις
  chosen: in the streets
  alternatives:
  - in the public squares
  - in the broad streets
  lexicon: BDAG
  rationale: πλατεῖα refers to a broad street or public thoroughfare. 'In the streets' is idiomatic and readable in English, while still conveying the public setting. 'Public squares' is possible but less direct here.
- source_word: φωνὴν αὐτοῦ
  chosen: his voice
  alternatives:
  - his sound
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' in this context. 'His voice' is the standard and clearest rendering, especially in a statement about public proclamation.
- source_word: οὐκ…οὐδὲ…οὐδὲ
  chosen: will not…or…and no one will…
  alternatives:
  - neither…nor…nor
  lexicon: Greek grammar
  rationale: The repeated negatives create a triadic denial. The chosen English preserves the cumulative force while using smooth contemporary syntax rather than a more wooden 'neither...nor...nor.'
