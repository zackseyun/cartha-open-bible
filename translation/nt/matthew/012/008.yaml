theological_decisions:
- issue: Christological force of 'κύριος ... τοῦ σαββάτου'
  chosen_reading: 'Render as a strong title of authority: ''the Son of Man is Lord
    of the Sabbath.'''
  alternative_readings:
  - the Son of Man is master over the Sabbath
  rationale: The verse presents Jesus' authority in relation to the Sabbath without
    softening the claim. 'Lord' aligns with the project's default for κύριος and preserves
    the theological weight of the statement while not importing claims beyond the
    text itself.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Lord); Affirmations
    on historic Christology'
- issue: Rendering of 'ὁ υἱὸς τοῦ ἀνθρώπου'
  chosen_reading: Treat as the titular self-designation 'the Son of Man.'
  alternative_readings:
  - the human one
  rationale: The phrase functions as a recognized title in the Gospel tradition and
    likely carries apocalyptic/intertextual resonance. Preserving the traditional
    title maintains theological tension and avoids flattening it into a merely generic
    anthropological expression.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve theological tension
    rather than resolve it'
