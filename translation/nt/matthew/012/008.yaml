id: MAT.12.8
reference: Matthew 12:8
source:
  edition: SBLGNT
  text: κύριος γάρ ἐστιν τοῦ σαββάτου ὁ υἱὸς τοῦ ἀνθρώπου.
translation:
  text: For the Son of Man is Lord of the Sabbath.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Son of Man is master over the Sabbath.'
    reason: lexical_alternative
  - marker: b
    text: '''Son of Man'' is Jesus'' characteristic self-designation in the Gospels;
      alternatively, it could be rendered more generically as ''the human one,'' though
      that weakens its likely titular resonance.'
    reason: alternative_reading
lexical_decisions:
- source_word: γάρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory force linking this statement to the preceding
    argument. 'For' is concise and natural in English here.
- source_word: κύριος
  chosen: Lord
  alternatives:
  - master
  lexicon: BDAG
  rationale: Follows the project's default rendering for κύριος as a title. In this
    christological context, 'Lord' best preserves both authority and theological weight;
    'master' is too weak and less idiomatic here.
- source_word: τοῦ σαββάτου
  chosen: of the Sabbath
  alternatives:
  - over the Sabbath
  lexicon: BDAG
  rationale: The genitive after κύριος is naturally rendered 'Lord of.' 'Sabbath'
    is capitalized because it refers to the specific Jewish sacred day/institution,
    not merely rest in general. 'Over the Sabbath' is interpretive and less traditional
    to the Greek construction.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the human one
  - the son of man
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels and should
    be preserved as a title. 'The Son of Man' maintains the idiomatic and intertextual
    force, likely echoing Daniel 7, whereas 'the human one' loses that resonance.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple present copula; no expansion is needed in English.
