theological_decisions:
- issue: Rendering of the temporal contrast αἰών / μέλλων
  chosen_reading: neither in this age nor in the coming one
  alternative_readings:
  - neither in this world nor in the world to come
  - neither in this age nor in the age to come
  rationale: The verse contrasts present and future ages, not spatial 'worlds.' Rendering αἰών as 'age' preserves the eschatological framework without importing a specific doctrinal system. 'The coming one' closely reflects the Greek ellipsis, though the more explicit 'age to come' is preserved in a footnote as a natural alternative.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Nature of the unforgivable offense
  chosen_reading: Retain the text's warning without specifying a later doctrinal definition of 'blasphemy against the Holy Spirit.'
  alternative_readings:
  - Interpret it narrowly as a unique historical accusation against Jesus' exorcisms
  - Interpret it broadly as final impenitence
  rationale: The verse itself states the consequence of speaking against the Holy Spirit but does not define the offense with later theological precision. The translation therefore preserves the warning and leaves interpretive elaboration outside the main text.
  doctrine_reference: Translation philosophy §3
