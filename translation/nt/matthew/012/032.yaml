id: MAT.12.32
reference: Matthew 12:32
source:
  edition: SBLGNT
  text: καὶ ὃς ἐὰν εἴπῃ λόγον κατὰ τοῦ υἱοῦ τοῦ ἀνθρώπου, ἀφεθήσεται αὐτῷ· ὃς δ’ ἂν εἴπῃ κατὰ τοῦ πνεύματος τοῦ ἁγίου, οὐκ ἀφεθήσεται αὐτῷ οὔτε ἐν ⸂τούτῳ τῷ⸃ αἰῶνι οὔτε ἐν τῷ μέλλοντι.
translation:
  text: And whoever speaks a word against the Son of Man[a], it will be forgiven him; but whoever speaks against the Holy Spirit, it will not be forgiven him[c][b], neither in this age nor in the coming one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “speaks a word” could be rendered “says a word” or “utters a word.”'
    reason: lexical_alternative
  - marker: b
    text: Greek αἰών means “age” here; traditional English often has “world.”
    reason: lexical_alternative
  - marker: c
    text: 'Or more explicitly: “nor in the age to come.” The Greek says literally “nor in the coming one,” with “age” understood from the previous phrase.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς ἐὰν / ὃς δ’ ἂν
  chosen: whoever ... but whoever
  alternatives:
  - whoever may
  - anyone who ... but anyone who
  lexicon: BDAG
  rationale: 'The relative pronoun with ἐάν/ἄν gives an indefinite general condition: ''whoever'' is natural English and preserves the open, general force.'
- source_word: εἴπῃ λόγον
  chosen: speaks a word
  alternatives:
  - says a word
  - utters a word
  lexicon: BDAG
  rationale: λέγω with λόγον is somewhat idiomatic; 'speaks a word' keeps the lexical presence of λόγον without over-paraphrasing. It also fits the solemn warning context.
- source_word: κατὰ
  chosen: against
  alternatives:
  - concerning
  - in opposition to
  lexicon: BDAG
  rationale: In this context κατά with the genitive expresses hostile speech directed against someone; 'against' is the plain and idiomatic rendering in both clauses.
- source_word: τοῦ υἱοῦ τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and accurate rendering of the self-designation/title, preserving both the Greek wording and its messianic/apocalyptic resonance. It should not be flattened to 'the man' or paraphrased.
- source_word: ἀφεθήσεται αὐτῷ
  chosen: it will be forgiven him
  alternatives:
  - he will be forgiven
  - it will be forgiven to him
  lexicon: BDAG
  rationale: The passive future of ἀφίημι here refers to forgiveness of the offense. 'It will be forgiven him' preserves the impersonal/passive structure and keeps the focus on the spoken offense being forgiven.
- source_word: τοῦ πνεύματος τοῦ ἁγίου
  chosen: the Holy Spirit
  alternatives:
  - the Holy Ghost
  lexicon: BDAG
  rationale: Standard modern English rendering of the title; 'Holy Ghost' is archaic. The article is naturally omitted in English title style.
- source_word: οὐκ ἀφεθήσεται αὐτῷ
  chosen: it will not be forgiven him
  alternatives:
  - he will not be forgiven
  lexicon: BDAG
  rationale: Maintains the same passive structure as the first clause for contrast and consistency.
- source_word: οὔτε ἐν τούτῳ τῷ αἰῶνι
  chosen: neither in this age
  alternatives:
  - neither in this world
  - not in this age either
  lexicon: BDAG
  rationale: αἰών is better rendered 'age' than 'world' here, since the contrast is temporal with 'the coming one.' This follows original-language primacy over traditional English inertia.
- source_word: οὔτε ἐν τῷ μέλλοντι
  chosen: nor in the coming one
  alternatives:
  - nor in the age to come
  - nor in the coming age
  lexicon: BDAG
  rationale: The participle μέλλοντι is substantival and elliptical, referring back to αἰῶνι. 'The coming one' is formally close to the Greek while still intelligible in context; the implied noun is recoverable from the previous phrase.
