theological_decisions:
- issue: Messianic servant identity in παῖς
  chosen_reading: Render παῖς as 'servant' in keeping with the Isaianic servant quotation.
  alternative_readings:
  - child
  - son
  rationale: The verse quotes Isaiah's servant passage and presents Jesus in that role. 'Servant' preserves the OT intertext and avoids importing a different christological emphasis from this specific lexical item, while remaining fully consistent with orthodox Christology.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 5
- issue: Rendering κρίσις in prophetic mission context
  chosen_reading: Translate κρίσις as 'justice' in the main text.
  alternative_readings:
  - judgment
  rationale: This context concerns what the servant brings to the nations; 'justice' better expresses the establishment and announcement of God's righteous order. The alternative 'judgment' is preserved in a footnote because the Greek term can bear that sense and readers may expect it from traditional translations.
  doctrine_reference: Translation philosophy §§1, 3, 5
