id: MAT.12.18
reference: Matthew 12:18
source:
  edition: SBLGNT
  text: Ἰδοὺ ὁ παῖς μου ὃν ᾑρέτισα, ὁ ἀγαπητός μου ⸂εἰς ὃν⸃ εὐδόκησεν ἡ ψυχή μου· θήσω τὸ πνεῦμά μου ἐπ’ αὐτόν, καὶ κρίσιν τοῖς ἔθνεσιν ἀπαγγελεῖ.
translation:
  text: Behold[a], my servant whom I have chosen, my beloved in whom my soul has delighted. I will put my Spirit upon him[c][b], and he will proclaim justice to the nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'judgment' for 'justice' (κρίσις).
    reason: lexical_alternative
  - marker: b
    text: Or 'my soul is well pleased' for 'my soul has delighted.'
    reason: lexical_alternative
  - marker: c
    text: Or 'to the Gentiles' for 'to the nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: BDAG
  rationale: Retains the prophetic, attention-calling force of the citation. 'Behold' is slightly elevated but still recognizable in English and fits the quotation style better than the more colloquial 'Look.'
- source_word: παῖς
  chosen: servant
  alternatives:
  - child
  - son
  lexicon: BDAG
  rationale: In this Isaianic servant context, παῖς carries the sense of 'servant' rather than merely 'child.' This preserves the messianic-servant theme without importing filial language not explicit in this word here.
- source_word: ᾑρέτισα
  chosen: have chosen
  alternatives:
  - chose
  - selected
  lexicon: BDAG
  rationale: 'The aorist is rendered idiomatically in English as a present perfect within the quotation: ''whom I have chosen.'' This reads naturally while preserving the completed divine choice.'
- source_word: ἀγαπητός
  chosen: beloved
  alternatives:
  - dear one
  - one I love
  lexicon: BDAG
  rationale: '''Beloved'' is the most natural and theologically weighty rendering for ἀγαπητός in divine speech, preserving both affection and dignity.'
- source_word: εἰς ὃν
  chosen: in whom
  alternatives:
  - with whom
  - toward whom
  lexicon: BDAG
  rationale: Although εἰς can be more literally directional, in this idiom with εὐδοκέω the sense is effectively 'in whom.' This is the standard and clearest English expression for the relational object of divine delight.
- source_word: εὐδόκησεν ἡ ψυχή μου
  chosen: my soul has delighted
  alternatives:
  - my soul is well pleased
  - I am well pleased
  lexicon: BDAG
  rationale: This preserves the explicit subject 'my soul' from the Greek rather than flattening it to 'I am well pleased.' 'Has delighted' communicates favorable pleasure while keeping the personal, affective force of the expression.
- source_word: θήσω τὸ πνεῦμά μου ἐπ’ αὐτόν
  chosen: I will put my Spirit upon him
  alternatives:
  - I will place my Spirit on him
  - I will put my Spirit on him
  lexicon: BDAG
  rationale: '''Put ... upon him'' closely follows the Greek and echoes prophetic commissioning language. ''Spirit'' is capitalized because the referent is God''s Spirit in direct divine speech.'
- source_word: κρίσιν
  chosen: justice
  alternatives:
  - judgment
  lexicon: BDAG
  rationale: In this Isaianic mission context, κρίσις is better rendered 'justice' than 'judgment,' emphasizing the establishment and proclamation of God's righteous order among the nations rather than merely punitive sentencing.
- source_word: τοῖς ἔθνεσιν
  chosen: to the nations
  alternatives:
  - to the Gentiles
  lexicon: BDAG
  rationale: ἔθνη can mean 'Gentiles,' but in this prophetic quotation the broader sense 'nations' best captures the universal scope and echoes Isaiah's language.
- source_word: ἀπαγγελεῖ
  chosen: will proclaim
  alternatives:
  - will announce
  - will declare
  lexicon: BDAG
  rationale: '''Proclaim'' fits the formal, public sense of the verb and suits the prophetic-messianic context better than the more neutral ''announce.'''
