theological_decisions:
- issue: Whether Jesus' statement should be softened to avoid implying actual Sabbath
    violation by priests
  chosen_reading: Retain the strong wording 'profane the Sabbath' while preserving
    that they 'are guiltless'
  alternative_readings:
  - violate the Sabbath and are innocent
  - break the Sabbath and are blameless
  rationale: 'The Greek intentionally creates tension: priests perform work on the
    Sabbath in temple service, which could be described as profaning in a literal
    sense, yet the Law itself renders them not culpable. The translation should preserve
    this rhetorical tension rather than resolve it by softening the verb.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
