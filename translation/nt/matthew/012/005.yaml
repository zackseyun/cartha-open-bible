id: MAT.12.5
reference: Matthew 12:5
source:
  edition: SBLGNT
  text: ἢ οὐκ ἀνέγνωτε ἐν τῷ νόμῳ ὅτι τοῖς σάββασιν οἱ ἱερεῖς ἐν τῷ ἱερῷ τὸ σάββατον
    βεβηλοῦσιν καὶ ἀναίτιοί εἰσιν;
translation:
  text: Or have you not read in the Law that on the Sabbaths the priests in the temple
    profane the Sabbath and are guiltless?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'violate the Sabbath' or 'break the Sabbath.' The Greek verb has the
      sense of treating something as common or profane.
    reason: lexical_alternative
  - marker: b
    text: Greek 'on the Sabbaths,' likely referring to repeated Sabbath occasions
      rather than a single instance.
    reason: lexical_alternative
  - marker: c
    text: The 'Law' here refers to the Mosaic Law/Scripture, likely including regulations
      about priestly service on the Sabbath (cf. Num 28:9–10).
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or again
  lexicon: BDAG
  rationale: Introduces an alternative scriptural argument in Jesus' rebuttal. Simple
    'Or' preserves the rhetorical flow without overtranslating.
- source_word: οὐκ ἀνέγνωτε
  chosen: have you not read
  alternatives:
  - did you not read
  lexicon: BDAG
  rationale: A standard rhetorical formula in Matthew. Present perfect English idiomatically
    conveys familiarity with Scripture, though the Greek aorist could be rendered
    as simple past.
- source_word: ἐν τῷ νόμῳ
  chosen: in the Law
  alternatives:
  - in the law
  lexicon: BDAG
  rationale: Capitalized 'Law' reflects reference to the Mosaic Law/scriptural corpus
    rather than law in an abstract sense. This matches the Jewish scriptural context.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath
  - during the Sabbath days
  lexicon: BDAG
  rationale: The dative plural is retained as 'on the Sabbaths.' Although English
    often uses singular idiomatically, the plural likely reflects repeated Sabbath
    occasions and is worth preserving.
- source_word: ἱερεῖς
  chosen: the priests
  lexicon: BDAG
  rationale: Straightforward rendering of the temple priests who perform sacrificial
    duties.
- source_word: ἐν τῷ ἱερῷ
  chosen: in the temple
  alternatives:
  - in the temple precincts
  lexicon: BDAG
  rationale: ἱερόν refers to the temple complex rather than specifically the sanctuary
    proper. 'Temple' is the natural English rendering; the more precise 'temple precincts'
    is possible but unnecessarily cumbersome in the main text.
- source_word: τὸ σάββατον
  chosen: the Sabbath
  lexicon: BDAG
  rationale: Direct object of βεβηλοῦσιν; singular retained as the institution/day
    being spoken of.
- source_word: βεβηλοῦσιν
  chosen: profane
  alternatives:
  - violate
  - break
  lexicon: BDAG
  rationale: The verb means to treat as common/profane. 'Profane' preserves the provocative
    force of Jesus' argument better than the flatter 'break,' while still allowing
    the irony that their temple service does not incur guilt.
- source_word: ἀναίτιοί εἰσιν
  chosen: are guiltless
  alternatives:
  - are innocent
  - are blameless
  lexicon: BDAG
  rationale: Conveys freedom from legal culpability in context. 'Guiltless' fits the
    forensic/rhetorical contrast with 'profane' more sharply than 'innocent'.
