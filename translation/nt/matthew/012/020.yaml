id: MAT.12.20
reference: Matthew 12:20
source:
  edition: SBLGNT
  text: κάλαμον συντετριμμένον οὐ κατεάξει καὶ λίνον τυφόμενον οὐ σβέσει, ἕως ἂν ἐκβάλῃ
    εἰς νῖκος τὴν κρίσιν.
translation:
  text: He will not break a bruised reed, and he will not extinguish a smoldering
    wick, until he brings justice to victory.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a smoking flax he will not quench.' The Greek literally refers to flax
      used as a lamp wick.
    reason: lexical_alternative
  - marker: b
    text: Or 'until he brings forth judgment to victory.'
    reason: alternative_reading
lexical_decisions:
- source_word: κάλαμον
  chosen: reed
  alternatives:
  - cane
  - stalk
  lexicon: BDAG
  rationale: κάλαμος commonly denotes a reed or reed-stalk. 'Reed' is the natural
    English equivalent in this prophetic imagery and matches the Isaiah background.
- source_word: συντετριμμένον
  chosen: bruised
  alternatives:
  - broken
  - crushed
  lexicon: BDAG
  rationale: The participle from συντρίβω indicates something crushed or broken. 'Bruised'
    preserves the traditional metaphor and fits the sense of something damaged but
    not fully snapped, which coheres with the following future verb 'will not break.'
    'Broken reed' would risk awkward repetition and overstate the condition before
    the action of breaking.
- source_word: κατεάξει
  chosen: will not break
  alternatives:
  - will not snap
  - will not shatter
  lexicon: BDAG
  rationale: κατάγνυμι means to break or snap. 'Will not break' is straightforward,
    idiomatic, and preserves the metaphor's gentleness.
- source_word: λίνον
  chosen: wick
  alternatives:
  - flax
  - linen wick
  lexicon: BDAG
  rationale: Although λίνον literally refers to flax/linen, in this idiom it denotes
    the flax wick of a lamp. 'Wick' communicates the intended referent in clear modern
    English; 'flax' is preserved as an alternative because of the Isaiah citation
    tradition.
- source_word: τυφόμενον
  chosen: smoldering
  alternatives:
  - smoking
  - faintly burning
  lexicon: BDAG
  rationale: The participle from τύφομαι describes something giving off smoke, especially
    a wick about to go out. 'Smoldering' is idiomatic modern English and conveys weak,
    lingering combustion better than the more wooden 'smoking.'
- source_word: σβέσει
  chosen: will not extinguish
  alternatives:
  - will not quench
  - will not put out
  lexicon: BDAG
  rationale: σβέννυμι means to extinguish or quench. 'Extinguish' is clear modern
    English; 'quench' is a strong traditional alternative worth preserving in a footnote
    because of its familiarity in biblical diction.
- source_word: ἕως ἂν
  chosen: until
  alternatives:
  - until such time as
  lexicon: BDAG
  rationale: The construction marks a future point up to which the preceding negations
    hold. 'Until' is the natural concise rendering.
- source_word: ἐκβάλῃ
  chosen: brings
  alternatives:
  - leads out
  - causes to go forth
  lexicon: BDAG
  rationale: ἐκβάλλω literally means 'throw out' or 'bring out,' but in this idiomatic
    context, echoing Isa 42:3 LXX, it conveys bringing forth or causing justice to
    emerge decisively. 'Brings' is the best optimal-equivalence rendering in English.
- source_word: εἰς νῖκος
  chosen: to victory
  alternatives:
  - into victory
  - unto victory
  lexicon: BDAG
  rationale: The phrase means 'to victory' or 'unto victory,' expressing successful
    outcome. 'To victory' is idiomatic and preserves the telic force.
- source_word: τὴν κρίσιν
  chosen: justice
  alternatives:
  - judgment
  lexicon: BDAG
  rationale: κρίσις can mean judgment or justice. In this Isaianic servant context,
    the sense is not merely a judicial verdict but the establishment of just order.
    'Justice' best captures the prophetic and messianic force in readable English,
    while 'judgment' is preserved as an alternative.
