theological_decisions:
- issue: Rendering κρίσις in the Isaianic servant quotation
  chosen_reading: justice
  alternative_readings:
  - judgment
  rationale: The context is the Servant's gentle yet effective mission to establish
    God's righteous order among the nations, not only to pronounce sentence. 'Justice'
    better reflects that broader covenantal-prophetic sense without importing a narrower
    modern political meaning.
  doctrine_reference: Translation philosophy §1, §5
- issue: Degree of literalness in the lamp image
  chosen_reading: wick ... extinguish
  alternative_readings:
  - flax ... quench
  rationale: The Greek idiom refers to a lamp wick made of flax. Rendering the image
    as 'wick' in the main text communicates the actual object to modern readers, while
    preserving the more formal 'flax'/'quench' tradition in a footnote maintains auditability
    and connection to the source tradition.
  doctrine_reference: Translation philosophy §6
