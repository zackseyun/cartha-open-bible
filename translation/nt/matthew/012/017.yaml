id: MAT.12.17
reference: Matthew 12:17
source:
  edition: SBLGNT
  text: ⸀ἵνα πληρωθῇ τὸ ῥηθὲν διὰ Ἠσαΐου τοῦ προφήτου λέγοντος·
translation:
  text: 'so that what was spoken through Isaiah the prophet might be fulfilled, saying:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'by Isaiah the prophet.' The Greek more literally uses 'through,' which
      highlights prophetic mediation.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - with the result that
  lexicon: BDAG
  rationale: Introduces a purpose/result clause. 'So that' is natural modern English
    and preserves the connective force without over-specifying whether Matthew intends
    purpose or result alone.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  - be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ἵνα is well represented by 'might be
    fulfilled' in English. This preserves the fulfillment formula common in Matthew
    without flattening the subjunctive nuance.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been said
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'What was spoken'
    is idiomatic and keeps the passive sense, fitting Matthew's citation formula.
- source_word: διὰ
  chosen: through
  alternatives:
  - by
  - by means of
  lexicon: BDAG
  rationale: With the genitive and a named prophet, διά commonly marks intermediate
    agency. 'Through Isaiah' preserves the sense that God is the ultimate speaker
    and the prophet the human instrument.
- source_word: Ἠσαΐου
  chosen: Isaiah
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name, in keeping with
    the translation policy to transliterate personal names.
- source_word: τοῦ προφήτου
  chosen: the prophet
  lexicon: BDAG
  rationale: Appositional identification of Isaiah. Retained explicitly because it
    is present in the Greek and is part of Matthew's citation formula.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - which says
  - who said
  lexicon: BDAG
  rationale: Genitive participle agreeing with 'Isaiah the prophet' and introducing
    the quotation that follows in the next verse. 'Saying' is the standard concise
    English equivalent and preserves the forward link.
