theological_decisions:
- issue: Prophetic agency in the citation formula
  chosen_reading: through Isaiah the prophet
  alternative_readings:
  - by Isaiah the prophet
  rationale: The wording preserves the biblical pattern in which Scripture is spoken
    by God through a human prophet. This reflects the Greek preposition διά with genitive
    and avoids implying Isaiah as the ultimate source of the message.
  doctrine_reference: Translation philosophy §1, §5
