theological_decisions:
- issue: Meaning of 'adulterous' in Jesus' indictment
  chosen_reading: Retain the metaphorical-prophetic term 'adulterous' in the main
    text rather than interpretively paraphrasing it as 'unfaithful.'
  alternative_readings:
  - unfaithful
  rationale: The Greek term evokes biblical covenant-infidelity imagery while also
    functioning as a moral accusation. Preserving 'adulterous' maintains the theological
    and intertextual tension rather than resolving it into a single explanatory gloss.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
- issue: Nature of 'the sign of Jonah'
  chosen_reading: Leave the phrase untranslated beyond its lexical sense and do not
    explain it in the main text.
  alternative_readings:
  - a sign like Jonah's experience
  - the sign consisting in Jonah himself
  rationale: The verse introduces a phrase whose fuller meaning is clarified by the
    immediate context (especially the following verse). The translation should not
    import a specific interpretation prematurely.
  doctrine_reference: Translation philosophy §1 and §3.
