id: MAT.12.39
reference: Matthew 12:39
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν αὐτοῖς· Γενεὰ πονηρὰ καὶ μοιχαλὶς σημεῖον ἐπιζητεῖ,
    καὶ σημεῖον οὐ δοθήσεται αὐτῇ εἰ μὴ τὸ σημεῖον Ἰωνᾶ τοῦ προφήτου.
translation:
  text: But he answered and said to them, “An evil and adulterous generation seeks
    a sign, and no sign will be given to it except the sign of Jonah the prophet.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the sign of the prophet Jonah.”
    reason: lexical_alternative
  - marker: b
    text: “Adulterous” likely evokes covenant unfaithfulness as well as literal sexual
      immorality; compare prophetic uses of adultery imagery for spiritual infidelity.
    reason: cross_reference
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  - replied
  lexicon: BDAG
  rationale: This participle + finite verb construction is a common Semitic-influenced
    narrative formula in the Gospels. Rendering both elements preserves the Greek
    wording without becoming unnatural English.
- source_word: Γενεὰ
  chosen: generation
  alternatives:
  - people
  - age
  lexicon: BDAG
  rationale: '''Generation'' is the standard and contextually fitting rendering for
    a contemporaneous group characterized morally; it preserves the corporate force
    of the singular noun.'
- source_word: πονηρὰ
  chosen: evil
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: '''Evil'' is clear, natural, and sufficiently weighty in modern English,
    matching the moral condemnation in context.'
- source_word: μοιχαλὶς
  chosen: adulterous
  alternatives:
  - unfaithful
  lexicon: BDAG
  rationale: Although literally related to adultery, in prophetic and Jewish idiom
    it can denote covenant unfaithfulness. 'Adulterous' preserves the metaphorical
    sharpness and echoes established biblical usage without flattening it to the interpretation
    'unfaithful'.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - miraculous sign
  lexicon: BDAG
  rationale: '''Sign'' is the direct and sufficiently broad rendering, fitting both
    the request for validating proof and the later reference to Jonah. Adding ''miraculous''
    would over-specify what the Greek leaves implicit.'
- source_word: ἐπιζητεῖ
  chosen: seeks
  alternatives:
  - demands
  - looks for
  lexicon: BDAG
  rationale: '''Seeks'' is the most straightforward rendering. While the verb can
    intensify the idea (''earnestly seeks'' or ''demands''), the context already conveys
    the negative posture, so the simpler English best matches optimal equivalence.'
- source_word: δοθήσεται
  chosen: will be given
  alternatives:
  - shall be given
  lexicon: BDAG
  rationale: Future passive is naturally rendered 'will be given' in contemporary
    English.
- source_word: αὐτῇ
  chosen: to it
  alternatives:
  - to this generation
  - to her
  lexicon: BDAG
  rationale: The pronoun refers back to the grammatically feminine singular 'generation.'
    English normally uses 'it' for a collective noun here. 'To this generation' is
    possible but less formally tied to the pronoun; 'to her' would sound misleadingly
    personal in English.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: In this negated construction, 'except' best conveys the exclusion with
    a single natural English term.
- source_word: τὸ σημεῖον Ἰωνᾶ τοῦ προφήτου
  chosen: the sign of Jonah the prophet
  alternatives:
  - the sign of the prophet Jonah
  lexicon: BDAG
  rationale: Both are accurate. 'The sign of Jonah the prophet' follows the Greek
    word order more closely while remaining natural English. The phrase leaves the
    nature of the sign to the following context rather than importing interpretation
    here.
