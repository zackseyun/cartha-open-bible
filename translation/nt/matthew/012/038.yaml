id: MAT.12.38
reference: Matthew 12:38
source:
  edition: SBLGNT
  text: Τότε ἀπεκρίθησαν ⸀αὐτῷ τινες τῶν γραμματέων καὶ Φαρισαίων λέγοντες· Διδάσκαλε, θέλομεν ἀπὸ σοῦ σημεῖον ἰδεῖν.
translation:
  text: Then some of the scribes and Pharisees answered him[a], saying, “Teacher, we want to see a sign from you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a miraculous sign.” The Greek word can denote a sign with miraculous significance, but the main text keeps the broader term “sign.”
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal adverb introducing the next event in narrative sequence; 'Then' is natural and sufficiently formal.
- source_word: ἀπεκρίθησαν
  chosen: answered
  alternatives:
  - responded
  - replied
  lexicon: BDAG
  rationale: Though no direct question precedes in the immediate verse, ἀποκρίνομαι commonly functions as 'answer/respond' in narrative discourse. 'Answered' preserves the Greek idiom and common Matthean usage.
- source_word: αὐτῷ
  chosen: him
  alternatives:
  - to him
  lexicon: BDAG
  rationale: The dative object is naturally incorporated in English as 'answered him'; this is idiomatic and preserves the addressee.
- source_word: τινες
  chosen: some
  alternatives:
  - certain ones
  lexicon: BDAG
  rationale: Indefinite plural referring to a subset, not all scribes and Pharisees. 'Some' is the clearest modern equivalent.
- source_word: τῶν γραμματέων
  chosen: of the scribes
  alternatives:
  - of the experts in the law
  - of the teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the standard and concise rendering for γραμματεῖς in the Gospels. Alternatives are interpretive expansions; the traditional term remains understandable and more formally aligned.'
- source_word: καὶ Φαρισαίων
  chosen: and Pharisees
  lexicon: BDAG
  rationale: Straightforward group designation; transliteration is appropriate for the Jewish sectarian name.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces direct speech. 'Saying' keeps the Greek structure while remaining natural in English.
- source_word: Διδάσκαλε
  chosen: Teacher
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Vocative of address to Jesus. 'Teacher' best matches the lexical sense without importing the stronger authority nuance of 'Master'.
- source_word: θέλομεν
  chosen: we want
  alternatives:
  - we wish
  - we desire
  lexicon: BDAG
  rationale: '''Want'' is direct, natural modern English and accurately reflects volition without sounding archaic.'
- source_word: ἀπὸ σοῦ
  chosen: from you
  alternatives:
  - by you
  lexicon: BDAG
  rationale: 'ἀπό with genitive here marks source/origin: they want a sign that comes from Jesus. ''From you'' is the most transparent rendering.'
- source_word: σημεῖον
  chosen: a sign
  alternatives:
  - a miraculous sign
  lexicon: BDAG
  rationale: σημεῖον means 'sign,' often with miraculous force in context. The plain 'sign' preserves the Greek term and allows the context to supply the supernatural implication without overtranslation.
- source_word: ἰδεῖν
  chosen: to see
  alternatives:
  - to witness
  lexicon: BDAG
  rationale: Infinitive of ὁράω is straightforwardly 'to see.' 'Witness' would be more interpretive than the Greek requires.
