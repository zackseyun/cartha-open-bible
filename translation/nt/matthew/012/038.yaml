theological_decisions:
- issue: Nature of σημεῖον in context
  chosen_reading: Rendered as 'sign' rather than 'miraculous sign' in the main text.
  alternative_readings:
  - miraculous sign
  rationale: The request is for authenticating evidence from Jesus, and in context this implies a miraculous sign. However, the Greek term itself is simply σημεῖον, so the main text preserves the broader lexical value without narrowing it beyond what the word explicitly states.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve what the source text plainly says.'
