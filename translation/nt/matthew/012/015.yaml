theological_decisions:
- issue: Implicit object of γνοὺς
  chosen_reading: Jesus knew the hostile intent/counsel described in the previous verse, rendered as 'knowing this.'
  alternative_readings:
  - Jesus, knowing [it]
  - Jesus, becoming aware [of this]
  rationale: The participle has no explicit object in this verse, so English requires either leaving it bare or supplying the contextual referent. Supplying 'this' preserves the connection to the preceding narrative without importing additional doctrinal content.
  doctrine_reference: Translation philosophy §1, §6
- issue: Nuance of Jesus' departure
  chosen_reading: withdrew
  alternative_readings:
  - departed
  - went away
  rationale: The wording should not imply fear or cowardice, but it should preserve Matthew's recurring motif of purposeful withdrawal in response to opposition. 'Withdrew' best reflects the narrative nuance without theological overstatement.
  doctrine_reference: Translation philosophy §5, §6
