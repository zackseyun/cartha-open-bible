id: MAT.12.15
reference: Matthew 12:15
source:
  edition: SBLGNT
  text: Ὁ δὲ Ἰησοῦς γνοὺς ἀνεχώρησεν ἐκεῖθεν. καὶ ἠκολούθησαν ⸀αὐτῷ πολλοί, καὶ ἐθεράπευσεν
    αὐτοὺς πάντας,
translation:
  text: But Jesus, knowing this, withdrew from there. And many followed him, and he
    healed them all,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Jesus, knowing it, withdrew from there.' The Greek leaves the object
      of 'knowing' implicit; the context supplies it from the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  chosen: knowing this
  alternatives:
  - becoming aware
  - having known
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω indicating prior awareness motivating the
    main verb. 'Knowing this' makes the implicit object clear from context (the Pharisees'
    counsel in the previous verse) and reads naturally in English without over-paraphrasing.
- source_word: ἀνεχώρησεν
  chosen: withdrew
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: ἀναχωρέω in Matthew often carries the sense of withdrawing from danger
    or opposition. 'Withdrew' preserves that nuance better than the more neutral 'departed'.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Standard adverbial expression of movement away from a location; 'from
    there' is the most natural concise rendering.
- source_word: ἠκολούθησαν αὐτῷ πολλοί
  chosen: many followed him
  alternatives:
  - great crowds followed him
  - many people followed him
  lexicon: BDAG
  rationale: πολλοί is simply 'many,' not explicitly 'crowds.' The Greek word order
    is naturally represented in English as 'many followed him.'
- source_word: ἐθεράπευσεν
  chosen: he healed
  alternatives:
  - he cured
  lexicon: BDAG
  rationale: θεραπεύω in Gospel healing contexts is best rendered 'heal,' the standard
    and clearest English equivalent.
- source_word: αὐτοὺς πάντας
  chosen: them all
  alternatives:
  - all of them
  lexicon: BDAG
  rationale: This preserves the distributive force of πάντας while remaining idiomatic
    English.
