theological_decisions:
- issue: Representative masculine language in a generic statement
  chosen_reading: he is my brother and sister and mother
  alternative_readings:
  - that person is my brother and sister and mother
  - the same is my brother and sister and mother
  rationale: The Greek uses grammatically masculine singular forms (ὅστις, αὐτός,
    ἀδελφός) in a generic sense. Per doctrine, gender-accurate rendering is preferred
    over flattening to gender-neutral language. Because the verse itself immediately
    includes both 'sister' and 'mother,' the inclusive scope is already explicit in
    the predicate nouns, while 'he' preserves the source grammar.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
