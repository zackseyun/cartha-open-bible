id: MAT.12.50
reference: Matthew 12:50
source:
  edition: SBLGNT
  text: ὅστις γὰρ ἂν ποιήσῃ τὸ θέλημα τοῦ πατρός μου τοῦ ἐν οὐρανοῖς, αὐτός μου ἀδελφὸς
    καὶ ἀδελφὴ καὶ μήτηρ ἐστίν.
translation:
  text: For whoever does the will of my Father in heaven, he is my brother and sister
    and mother.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'anyone who does the will of my Father in heaven, that person is my brother
      and sister and mother.' The Greek uses a grammatically masculine singular form
      generically.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅστις ... ἂν
  chosen: whoever
  alternatives:
  - anyone who
  lexicon: BDAG
  rationale: 'Indefinite relative construction with ἄν expresses a general condition:
    ''whoever'' best captures the open, generic force in natural English.'
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: Retains the explanatory connection to the preceding context; 'for' is
    concise and idiomatic here.
- source_word: ποιήσῃ
  chosen: does
  alternatives:
  - does/does carry out
  - does/obeys
  lexicon: BDAG
  rationale: ποιέω with θέλημα is naturally rendered 'do the will.' 'Obey' is interpretive
    and slightly narrows the sense from performing/acting in accordance with the will.
- source_word: τὸ θέλημα
  chosen: the will
  alternatives:
  - what ... wants
  lexicon: BDAG
  rationale: '''The will'' preserves the theological and relational sense without
    paraphrase.'
- source_word: τοῦ πατρός μου τοῦ ἐν οὐρανοῖς
  chosen: of my Father in heaven
  alternatives:
  - of my Father who is in heaven
  - of my heavenly Father
  lexicon: BDAG
  rationale: This is a compact, natural rendering of the genitive phrase with the
    attributive article + prepositional phrase. 'My Father in heaven' preserves the
    wording closely; 'heavenly Father' is smoother but less formally aligned.
- source_word: αὐτός
  chosen: he
  alternatives:
  - that person
  - this one
  lexicon: BDAG
  rationale: The pronoun is emphatic, marking the one who does the Father's will as
    the true family member. 'He' preserves the grammatically masculine representative
    singular in line with the project's gender-accurate policy.
- source_word: ἀδελφὸς
  chosen: brother
  lexicon: BDAG
  rationale: Straightforward lexical equivalent; singular matches the Greek.
- source_word: ἀδελφὴ
  chosen: sister
  lexicon: BDAG
  rationale: Straightforward lexical equivalent; explicitly retained rather than subsumed
    under a generic term because the Greek lists family roles individually.
- source_word: μήτηρ
  chosen: mother
  lexicon: BDAG
  rationale: Straightforward lexical equivalent; singular matches the Greek and preserves
    the familial triad.
- source_word: ἐστίν
  chosen: is
  lexicon: BDAG
  rationale: Simple copula; present tense retained.
