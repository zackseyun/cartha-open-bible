id: MAT.12.33
reference: Matthew 12:33
source:
  edition: SBLGNT
  text: Ἢ ποιήσατε τὸ δένδρον καλὸν καὶ τὸν καρπὸν αὐτοῦ καλόν, ἢ ποιήσατε τὸ δένδρον
    σαπρὸν καὶ τὸν καρπὸν αὐτοῦ σαπρόν· ἐκ γὰρ τοῦ καρποῦ τὸ δένδρον γινώσκεται.
translation:
  text: Either make the tree good and its fruit good, or make the tree rotten and
    its fruit rotten; for the tree is known by its fruit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bad' instead of 'rotten' for σαπρός; the Greek can denote something
      spoiled, corrupt, or worthless.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'make' may function rhetorically as 'consider' or 'show to
      be,' but the Greek form is imperative.
    reason: alternative_reading
lexical_decisions:
- source_word: ποιήσατε
  chosen: make
  alternatives:
  - consider
  - regard
  - show to be
  lexicon: BDAG
  rationale: Aorist imperative plural of ποιέω is rendered 'make' in a balanced formal
    sense. In context it may carry a rhetorical force ('suppose/classify as'), but
    'make' preserves the direct parallelism and metaphor without over-interpreting.
- source_word: δένδρον
  chosen: tree
  lexicon: BDAG
  rationale: Standard gloss; central to the metaphor and naturally rendered 'tree'.
- source_word: καλός
  chosen: good
  alternatives:
  - sound
  - healthy
  - fine
  lexicon: BDAG
  rationale: In this moral-metaphorical context, 'good' best preserves both quality
    and ethical resonance. 'Healthy' would narrow the sense too much to physical condition.
- source_word: καρπός
  chosen: fruit
  alternatives:
  - produce
  lexicon: BDAG
  rationale: '''Fruit'' is the established and natural metaphor in English and matches
    the source image directly.'
- source_word: σαπρός
  chosen: rotten
  alternatives:
  - bad
  - decayed
  - worthless
  lexicon: BDAG
  rationale: σαπρός denotes something spoiled or corrupt. 'Rotten' preserves the vividness
    of the image better than the flatter 'bad' and fits both tree and fruit in English.
- source_word: ἐκ γὰρ τοῦ καρποῦ
  chosen: for ... by its fruit
  alternatives:
  - from its fruit
  - out of its fruit
  lexicon: BDAG
  rationale: The preposition ἐκ is retained idiomatically in the passive clause as
    'by its fruit,' while γάρ is rendered 'for' to show the explanatory relationship.
- source_word: γινώσκεται
  chosen: is known
  alternatives:
  - is recognized
  - is identified
  lexicon: BDAG
  rationale: Present passive is best rendered 'is known,' a clear and sufficiently
    formal English equivalent. 'Recognized' is possible but less direct.
- source_word: αὐτοῦ
  chosen: its
  alternatives:
  - his
  lexicon: BDAG
  rationale: The pronoun refers to the neuter noun 'tree'; English idiom uses 'its'
    for non-personal referents.
