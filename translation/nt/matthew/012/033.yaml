theological_decisions:
- issue: Force of the imperatives in Jesus' metaphor
  chosen_reading: Retained as direct imperatives ('make the tree...') rather than
    converting to declarative paraphrase.
  alternative_readings:
  - Either consider the tree good...
  - If you make the tree good...
  rationale: The Greek uses repeated aorist imperatives, likely rhetorically, but
    the text itself presents them as commands/challenges. Preserving the imperative
    form avoids importing an interpretive smoothing and keeps the sharpness of Jesus'
    argument.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve
    tension rather than resolve it.'
