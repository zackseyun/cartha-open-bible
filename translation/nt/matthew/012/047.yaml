id: MAT.12.47
reference: Matthew 12:47
source:
  edition: SBLGNT
  text: ⸂εἶπεν δέ τις αὐτῷ· Ἰδοὺ ἡ μήτηρ σου καὶ οἱ ἀδελφοί σου ἔξω ἑστήκασιν, ζητοῦντές σοι λαλῆσαι.⸃
translation:
  text: Then someone said to him[a], “Look, your mother and your brothers are standing outside, seeking to speak to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts omit this verse.
    reason: textual_variant
lexical_decisions:
- source_word: εἶπεν δέ τις αὐτῷ
  chosen: Then someone said to him
  alternatives:
  - And someone said to him
  - Now someone said to him
  lexicon: BDAG
  rationale: δέ is mildly connective; 'Then' gives natural narrative progression in English without overstating contrast. τις is indefinite, so 'someone' is preferable to the more wooden 'a certain one'.
- source_word: Ἰδοὺ
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: ἰδού is an attention-getter. 'Look' preserves the deictic force in readable modern English; 'Behold' is too archaic for the stated philosophy.
- source_word: μήτηρ σου
  chosen: your mother
  lexicon: BDAG
  rationale: Straightforward possessive construction; no reason to depart from the ordinary gloss.
- source_word: οἱ ἀδελφοί σου
  chosen: your brothers
  alternatives:
  - your siblings
  lexicon: BDAG
  rationale: ἀδελφοί here refers to male family members in the narrative setting, not a mixed-gender generic group. Per the gender-accurate principle, 'brothers' best matches the source.
- source_word: ἔξω ἑστήκασιν
  chosen: are standing outside
  alternatives:
  - stand outside
  - are outside
  lexicon: BDAG
  rationale: 'The perfect of ἵστημι here conveys a present state resulting from having taken a stand: ''are standing.'' Including ''outside'' preserves ἔξω explicitly.'
- source_word: ζητοῦντές
  chosen: seeking
  alternatives:
  - wanting
  - trying
  lexicon: BDAG
  rationale: ζητέω commonly means 'seek.' 'Seeking' preserves the participial nuance and avoids overinterpreting motive.
- source_word: σοι λαλῆσαι
  chosen: to speak to you
  alternatives:
  - to talk with you
  lexicon: BDAG
  rationale: The dative σοι with infinitive λαλῆσαι is naturally rendered 'to speak to you.' This is slightly more formal and closer to the Greek than 'talk with you'.
