id: MAT.12.10
reference: Matthew 12:10
source:
  edition: SBLGNT
  text: καὶ ἰδοὺ ⸀ἄνθρωπος χεῖρα ἔχων ξηράν. καὶ ἐπηρώτησαν αὐτὸν λέγοντες· Εἰ ἔξεστι
    τοῖς σάββασιν ⸀θεραπεύειν; ἵνα κατηγορήσωσιν αὐτοῦ.
translation:
  text: And behold, there was a man with a withered hand. And they asked him, saying,
    “Is it lawful to heal on the Sabbaths?” so that they might accuse him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically in English, “Is it lawful to heal on the Sabbath?”
      The Greek has the plural “on the Sabbaths,” a common way of referring to Sabbath
      days.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retains the discourse-marking force of ἰδού, which draws attention to
    the scene. 'Behold' is slightly traditional but still understandable and preserves
    the narrative vividness better than omitting it.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The singular masculine noun here refers to an individual male, not generic
    humanity, so 'a man' is the gender-accurate rendering.
- source_word: χεῖρα ἔχων ξηράν
  chosen: with a withered hand
  alternatives:
  - having a shriveled hand
  - having a dried-up hand
  lexicon: BDAG
  rationale: This participial construction is rendered idiomatically in English with
    'with.' ξηράν in this healing context refers to a hand that is dried up, wasted,
    or paralyzed; 'withered' is the most natural and established medical-context rendering
    without over-specifying the condition.
- source_word: ἐπηρώτησαν
  chosen: they asked
  alternatives:
  - they questioned
  - they inquired of
  lexicon: BDAG
  rationale: A straightforward past-tense rendering that fits the narrative context.
    'Questioned' could sound more hostile than the verb itself requires; the hostile
    intent is made explicit later by ἵνα κατηγορήσωσιν αὐτοῦ.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - asking
  - and said
  lexicon: BDAG
  rationale: Preserves the participial linkage to the main verb and reflects the Greek
    structure naturally enough in English.
- source_word: ἔξεστι
  chosen: is it lawful
  alternatives:
  - is it permitted
  - is it allowed
  lexicon: BDAG
  rationale: In this Sabbath-law context, the question concerns what is permitted
    under the law, not mere social permission. 'Lawful' best captures the legal-religious
    force.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath
  - during the Sabbath
  lexicon: BDAG
  rationale: The Greek is plural, a common idiom for Sabbath observance days. The
    main text preserves the plural form for transparency to the source, while the
    singular idiomatic English alternative is worth preserving in a footnote.
- source_word: θεραπεύειν
  chosen: to heal
  alternatives:
  - to cure
  lexicon: BDAG
  rationale: '''Heal'' is the most natural rendering in Gospel miracle contexts and
    carries both physical restoration and the broader resonance of Jesus''s ministry.'
- source_word: ἵνα κατηγορήσωσιν αὐτοῦ
  chosen: so that they might accuse him
  alternatives:
  - in order that they might bring charges against him
  lexicon: BDAG
  rationale: ἵνα expresses purpose here, and κατηγορέω means to accuse or bring charges.
    'Accuse him' is concise and natural while preserving the adversarial legal sense.
