theological_decisions:
- issue: Rendering the Sabbath expression in a legal controversy context
  chosen_reading: on the Sabbaths
  alternative_readings:
  - on the Sabbath
  rationale: The Greek dative plural τοῖς σάββασιν is retained in the main text for
    source transparency. Because English commonly uses the singular idiomatically
    in such contexts, the singular alternative is preserved in a footnote rather than
    silently normalizing the number.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve alternatives in footnotes where helpful'
