id: MAT.12.4
reference: Matthew 12:4
source:
  edition: SBLGNT
  text: πῶς εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ καὶ τοὺς ἄρτους τῆς προθέσεως ⸂ἔφαγον, ὃ⸃ οὐκ ἐξὸν ἦν αὐτῷ φαγεῖν οὐδὲ τοῖς μετ’ αὐτοῦ, εἰ μὴ τοῖς ἱερεῦσιν μόνοις;
translation:
  text: how he entered into the house of God and ate the bread of the Presence[a], which it was not lawful for him to eat, nor for those with him[b], but only for the priests?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts/readings have 'he ate' instead of 'they ate.'
    reason: textual_variant
  - marker: b
    text: Or 'the showbread,' a traditional English rendering for the consecrated bread set before God.
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: 'Introduces the content of Jesus'' appeal to the David narrative: ''how'' he entered. This is the standard idiomatic rendering in this construction.'
- source_word: εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ
  chosen: he entered into the house of God
  alternatives:
  - he went into the house of God
  lexicon: BDAG
  rationale: Aorist of εἰσέρχομαι with εἰς is naturally rendered 'entered into.' 'House of God' preserves the wording of the Greek and the sacred setting; although the referent is the tabernacle/holy place contextually, the text itself says 'house of God.'
- source_word: τοὺς ἄρτους τῆς προθέσεως
  chosen: the bread of the Presence
  alternatives:
  - the loaves of presentation
  - the showbread
  lexicon: BDAG
  rationale: This is the established sense of the cultic expression, referring to the consecrated bread set before God. 'Bread of the Presence' is both accurate and readable; 'showbread' is traditional but archaic.
- source_word: ἔφαγον
  chosen: they ate
  alternatives:
  - he ate
  lexicon: NA28/SBLGNT textual tradition
  rationale: The printed text reads plural, yielding 'they ate,' which fits the following mention of 'those with him.' Some manuscripts/readings support singular 'he ate'; that alternative is preserved in a footnote because it affects the immediate subject of the verb.
- source_word: ὃ οὐκ ἐξὸν ἦν αὐτῷ φαγεῖν
  chosen: which it was not lawful for him to eat
  alternatives:
  - which it was not permitted for him to eat
  - which he was not allowed to eat
  lexicon: BDAG
  rationale: The impersonal expression ἐξὸν ἦν conveys what is permitted or lawful. 'Lawful' best preserves the legal/cultic force in context.
- source_word: οὐδὲ τοῖς μετ’ αὐτοῦ
  chosen: nor for those with him
  alternatives:
  - nor for his companions
  - nor for the ones with him
  lexicon: BDAG
  rationale: This phrase refers to David's accompanying men. 'Those with him' is a close, natural rendering that avoids over-paraphrase.
- source_word: εἰ μὴ τοῖς ἱερεῦσιν μόνοις
  chosen: but only for the priests
  alternatives:
  - except for the priests alone
  lexicon: BDAG
  rationale: εἰ μὴ marks exception. 'But only for the priests' is idiomatic English and preserves the exclusivity conveyed by μόνοις.
