theological_decisions:
- issue: Cultic/legal force of ἐξὸν
  chosen_reading: Rendered as 'it was not lawful' rather than a weaker 'not allowed' to preserve the Torah-based legal and priestly context.
  alternative_readings:
  - it was not permitted
  - he was not allowed
  rationale: Jesus' argument depends on a recognized sacred/legal restriction, not merely a social rule. 'Lawful' best communicates that force without importing extra doctrinal claims.
  doctrine_reference: Translation philosophy §1, §6
- issue: Textual subject of ἔφαγον
  chosen_reading: Main text follows the plural reading 'they ate.'
  alternative_readings:
  - 'singular reading: ''he ate'''
  rationale: The provided SBLGNT text prints the plural, and it coheres with the subsequent reference to 'those with him.' Because the singular reading is well known in translation tradition and materially affects the clause, it is preserved in a footnote rather than silently ignored.
  doctrine_reference: Translation philosophy §1, §3
