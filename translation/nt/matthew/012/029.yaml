theological_decisions:
- issue: Representative masculine language in the metaphor
  chosen_reading: the strong man / someone
  alternative_readings:
  - the strong one / anyone
  rationale: The Greek uses masculine forms (τις in context with τὸν ἰσχυρόν) within
    a concrete metaphor. Following the gender-accurate policy, the translation preserves
    the masculine image 'strong man' while rendering the indefinite subject idiomatically
    as 'someone.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Metaphorical scope of 'house' and 'goods'
  chosen_reading: Retain the concrete burglary metaphor without importing a full allegorical
    explanation into the translation
  alternative_readings:
  - Render more interpretively as domain/possessions
  rationale: The verse occurs in a context about Jesus' authority over demonic powers,
    but the translation should preserve the metaphor itself rather than encode a theological
    interpretation into the wording.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
