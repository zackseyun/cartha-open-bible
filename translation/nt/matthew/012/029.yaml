id: MAT.12.29
reference: Matthew 12:29
source:
  edition: SBLGNT
  text: ἢ πῶς δύναταί τις εἰσελθεῖν εἰς τὴν οἰκίαν τοῦ ἰσχυροῦ καὶ τὰ σκεύη αὐτοῦ
    ⸀ἁρπάσαι, ἐὰν μὴ πρῶτον δήσῃ τὸν ἰσχυρόν; καὶ τότε τὴν οἰκίαν αὐτοῦ ⸀διαρπάσει.
translation:
  text: Or how can someone enter the strong man's house and seize his goods, unless
    he first binds the strong man? And then he will plunder his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his possessions' for 'his goods'; the Greek term can refer literally
      to vessels or more broadly to belongings.
    reason: lexical_alternative
  - marker: b
    text: Or 'ties up' for 'binds.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or else
  lexicon: BDAG
  rationale: Introduces an alternative explanatory comparison tied to the preceding
    argument; 'Or' is the most natural concise English equivalent.
- source_word: πῶς
  chosen: how
  alternatives:
  - in what way
  lexicon: BDAG
  rationale: Interrogative adverb retained directly to preserve the rhetorical question
    structure.
- source_word: δύναταί τις
  chosen: can someone
  alternatives:
  - is anyone able to
  - can anyone
  lexicon: BDAG
  rationale: Combines the modal verb with the indefinite pronoun into idiomatic English
    while preserving the generic sense.
- source_word: εἰσελθεῖν εἰς τὴν οἰκίαν
  chosen: enter the house
  alternatives:
  - go into the house
  lexicon: BDAG
  rationale: Straightforward infinitival construction; 'enter the house' is natural
    and sufficiently formal.
- source_word: τοῦ ἰσχυροῦ / τὸν ἰσχυρόν
  chosen: the strong man
  alternatives:
  - the mighty man
  - the strong one
  lexicon: BDAG
  rationale: Although ἰσχυρός is adjectival ('strong'), English idiom requires a substantive
    expression. 'Strong man' preserves the metaphor and matches the representative
    masculine form in the Greek.
- source_word: τὰ σκεύη αὐτοῦ
  chosen: his goods
  alternatives:
  - his possessions
  - his property
  - his vessels
  lexicon: BDAG
  rationale: σκεύη literally means 'vessels/implements,' but in this house-plundering
    metaphor it refers broadly to belongings or goods. 'Goods' is concise, natural,
    and contextually accurate.
- source_word: ἁρπάσαι
  chosen: seize
  alternatives:
  - snatch
  - carry off
  - plunder
  lexicon: BDAG
  rationale: Conveys forceful taking without prematurely collapsing it into the fuller
    plundering idea expressed later by διαρπάσει.
- source_word: ἐὰν μὴ πρῶτον δήσῃ
  chosen: unless he first binds
  alternatives:
  - unless he first ties up
  lexicon: BDAG
  rationale: δήσῃ means to bind or tie. 'Binds' is slightly more formal and preserves
    the metaphorical force; 'first' reflects πρῶτον.
- source_word: καὶ τότε
  chosen: And then
  alternatives:
  - and only then
  - then
  lexicon: BDAG
  rationale: Marks the sequence explicitly; 'And then' preserves the connective and
    temporal progression.
- source_word: διαρπάσει
  chosen: will plunder
  alternatives:
  - will thoroughly rob
  - will carry off
  lexicon: BDAG
  rationale: The compound verb intensifies the act beyond ἁρπάζω. 'Will plunder' captures
    the fuller sense of stripping the house after overpowering its owner.
- source_word: τὴν οἰκίαν αὐτοῦ
  chosen: his house
  alternatives:
  - his household
  lexicon: BDAG
  rationale: In context the literal image is a house being robbed. While 'household'
    could be metaphorically inferred, the immediate lexical sense is best preserved
    as 'house.'
