theological_decisions:
- issue: Gender-accurate rendering of ἄνθρωπος
  chosen_reading: a man
  alternative_readings:
  - a person
  - a human being
  rationale: The translation philosophy specifies gender-accurate over gender-neutral
    where the Greek is grammatically masculine and representative. Here Jesus states
    a general principle using singular ἄνθρωπος in contrast with a sheep; 'a man'
    preserves that form while still functioning generically.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Rendering the Sabbath plural idiom
  chosen_reading: on the Sabbaths
  alternative_readings:
  - on the Sabbath
  - on Sabbath days
  rationale: The Greek uses the plural σάββασιν, which can function idiomatically
    for Sabbath observance. To maintain auditability and source transparency, the
    plural is retained in the main text, while the more idiomatic singular is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 5
