id: MAT.12.12
reference: Matthew 12:12
source:
  edition: SBLGNT
  text: πόσῳ οὖν διαφέρει ἄνθρωπος προβάτου. ὥστε ἔξεστιν τοῖς σάββασιν καλῶς ποιεῖν.
translation:
  text: How much more valuable, then, is a man than a sheep. So it is lawful to do
    good on the Sabbaths.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'on the Sabbath.' The Greek uses the plural 'on the
      Sabbaths,' a common idiom for Sabbath observance.
    reason: lexical_alternative
lexical_decisions:
- source_word: πόσῳ
  chosen: How much more
  alternatives:
  - How much
  - By how much
  lexicon: BDAG
  rationale: 'Used idiomatically with the comparative force of the dative to introduce
    an argument from lesser to greater: ''how much more.'' This best reflects the
    rhetorical sense in context.'
- source_word: οὖν
  chosen: then
  alternatives:
  - therefore
  - so
  lexicon: BDAG
  rationale: Marks inference from the preceding example of rescuing a sheep on the
    Sabbath. 'Then' is natural English and preserves the logical connection without
    sounding overly formal.
- source_word: διαφέρει
  chosen: is more valuable
  alternatives:
  - differs from
  - surpasses
  - is superior to
  lexicon: BDAG
  rationale: In this context the verb expresses comparative worth, not mere difference.
    'Is more valuable' makes explicit the implied valuation in Jesus's argument.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - a human being
  lexicon: BDAG
  rationale: Rendered gender-accurately per project philosophy. Here ἄνθρωπος is singular
    and representative of a human being in contrast with a sheep; 'a man' preserves
    the source form and generic force.
- source_word: προβάτου
  chosen: a sheep
  alternatives:
  - sheep
  lexicon: BDAG
  rationale: 'The genitive after διαφέρει marks the comparison: ''than a sheep.''
    The article is absent in Greek, so the English indefinite is appropriate.'
- source_word: ὥστε
  chosen: So
  alternatives:
  - Therefore
  - Consequently
  lexicon: BDAG
  rationale: Introduces the conclusion drawn from the preceding comparison. 'So' is
    concise, natural, and preserves the inferential force.
- source_word: ἔξεστιν
  chosen: it is lawful
  alternatives:
  - it is permitted
  - it is allowed
  lexicon: BDAG
  rationale: The context is a dispute about Sabbath lawfulness, so 'lawful' best captures
    the legal-ethical nuance rather than mere permission.
- source_word: τοῖς σάββασιν
  chosen: on the Sabbaths
  alternatives:
  - on the Sabbath
  - on Sabbath days
  lexicon: BDAG
  rationale: The Greek is plural, a common idiom for Sabbath observance. The main
    text preserves the plural form for transparency to the source, while an alternative
    more idiomatic English rendering is worth noting.
- source_word: καλῶς ποιεῖν
  chosen: to do good
  alternatives:
  - to do what is good
  - to act rightly
  lexicon: BDAG
  rationale: A standard idiom meaning beneficent action. 'To do good' is both natural
    English and close to the Greek wording.
