theological_decisions:
- issue: Anthropological/moral contrast in proverbial form
  chosen_reading: The verse describes a person's outward actions or words as flowing
    from an inward moral store, without specifying a later doctrinal system beyond
    the immediate metaphor.
  alternative_readings:
  - A stronger emphasis on spoken words specifically, from the immediate context about
    speech
  - A broader emphasis on deeds and words generally
  rationale: Because the immediate context concerns speech (vv. 34, 36-37), some translations
    may narrow the output to words. However, the Greek uses substantival adjectives
    ('good things,' 'evil things') without an explicit noun, so the main text preserves
    the broader expression while allowing the context to inform interpretation.
  doctrine_reference: Preserve theological tension rather than resolve it.
