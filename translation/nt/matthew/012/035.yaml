id: MAT.12.35
reference: Matthew 12:35
source:
  edition: SBLGNT
  text: ὁ ἀγαθὸς ἄνθρωπος ἐκ τοῦ ἀγαθοῦ θησαυροῦ ἐκβάλλει ἀγαθά, καὶ ὁ πονηρὸς ἄνθρωπος
    ἐκ τοῦ πονηροῦ θησαυροῦ ἐκβάλλει πονηρά.
translation:
  text: The good man brings out good things from his good treasure, and the evil man
    brings out evil things from his evil treasure.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'person' for 'man'; Greek has the masculine singular ἄνθρωπος in a representative
      sense.
    reason: lexical_alternative
  - marker: b
    text: The immediate context concerns speech, so 'good things' and 'evil things'
      may especially refer to words.
    reason: cross_reference
lexical_decisions:
- source_word: ἀγαθὸς
  chosen: good
  alternatives:
  - virtuous
  - beneficial
  lexicon: BDAG
  rationale: Rendered as 'good' for both the man and the things produced, preserving
    the repeated lexical pattern and moral contrast in the Greek.
- source_word: ἄνθρωπος
  chosen: man
  alternatives:
  - person
  - human being
  lexicon: BDAG
  rationale: Rendered 'man' because the Greek is grammatically masculine singular
    and functions here as a representative individual in a paired proverb-like statement.
    This follows the gender-accurate policy rather than flattening to a gender-neutral
    term in the main text.
- source_word: θησαυροῦ
  chosen: treasure
  alternatives:
  - storehouse
  - store
  lexicon: BDAG
  rationale: Rendered 'treasure' as the most natural equivalent and because it preserves
    the metaphor of an inner stored reserve from which deeds or words proceed. 'Storehouse'
    is possible but too concrete here.
- source_word: ἐκβάλλει
  chosen: brings out
  alternatives:
  - produces
  - throws out
  lexicon: BDAG
  rationale: Rendered 'brings out' to reflect the literal movement implied by ἐκ +
    βάλλω while remaining idiomatic in English. 'Produces' is smoother but weakens
    the imagery; 'throws out' is too forceful for this context.
- source_word: ἀγαθά
  chosen: good things
  alternatives:
  - good
  - what is good
  lexicon: BDAG
  rationale: The adjective is substantival neuter plural, so 'good things' makes the
    implied object explicit in natural English while preserving the broad scope of
    what proceeds from the person.
- source_word: πονηρὸς
  chosen: evil
  alternatives:
  - wicked
  - bad
  lexicon: BDAG
  rationale: Rendered 'evil' to preserve the stronger moral sense of πονηρός in contrast
    with ἀγαθός. 'Bad' is too weak; 'wicked' is possible but less natural in this
    balanced parallelism.
- source_word: πονηρά
  chosen: evil things
  alternatives:
  - evil
  - what is evil
  lexicon: BDAG
  rationale: As with ἀγαθά, the substantival neuter plural is best represented by
    'evil things,' preserving the symmetry and broad moral category.
- source_word: ἐκ
  chosen: from
  alternatives:
  - out of
  lexicon: BDAG
  rationale: Rendered 'from' in the main text for readability, while the verb 'brings
    out' already carries the outward-motion sense. This avoids awkward repetition
    of 'out of ... brings out' in English.
