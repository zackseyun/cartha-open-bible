theological_decisions:
- issue: Rendering of demonic language in πνεύματα within the parable/application
  chosen_reading: spirits
  alternative_readings:
  - demons
  rationale: The Greek says 'spirits' and the immediate context already identifies
    the referent as an unclean spirit. Retaining 'spirits' avoids importing a more
    specific term not present in this clause while preserving the demonic sense from
    context.
  doctrine_reference: Original-language primacy over translation tradition
- issue: Gender rendering of ἀνθρώπου
  chosen_reading: that man
  alternative_readings:
  - that person
  rationale: The example is singular and grammatically masculine. In line with the
    doctrine's gender-accurate principle, 'man' is retained rather than neutralizing
    the expression.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral
