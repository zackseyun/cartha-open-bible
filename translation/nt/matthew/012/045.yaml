id: MAT.12.45
reference: Matthew 12:45
source:
  edition: SBLGNT
  text: τότε πορεύεται καὶ παραλαμβάνει μεθ’ ἑαυτοῦ ἑπτὰ ἕτερα πνεύματα πονηρότερα
    ἑαυτοῦ, καὶ εἰσελθόντα κατοικεῖ ἐκεῖ· καὶ γίνεται τὰ ἔσχατα τοῦ ἀνθρώπου ἐκείνου
    χείρονα τῶν πρώτων. οὕτως ἔσται καὶ τῇ γενεᾷ ταύτῃ τῇ πονηρᾷ.
translation:
  text: Then it goes and brings with itself seven other spirits more evil than itself,
    and they enter and live there; and the last state of that man becomes worse than
    the first. So it will be also with this evil generation.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'seven different spirits more wicked than itself.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'the last things of that man become worse than the first,' an idiom
      meaning his final condition is worse than his former one.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the next step in the narrative sequence; 'Then'
    is natural and sufficiently precise.
- source_word: πορεύεται
  chosen: it goes
  alternatives:
  - it departs
  - it travels
  lexicon: BDAG
  rationale: Present middle used in vivid narrative. 'Goes' is the plain contextual
    sense for the unclean spirit's action.
- source_word: παραλαμβάνει
  chosen: brings with itself
  alternatives:
  - takes along with itself
  - takes with itself
  lexicon: BDAG
  rationale: The verb means to take or bring along. In English, after 'goes,' 'brings
    with itself' reads naturally and conveys accompaniment without overformal stiffness.
- source_word: μεθ’ ἑαυτοῦ
  chosen: with itself
  alternatives:
  - along with itself
  lexicon: BDAG
  rationale: Reflexive accompaniment; 'with itself' is direct and idiomatic.
- source_word: ἑπτὰ ἕτερα πνεύματα
  chosen: seven other spirits
  alternatives:
  - seven different spirits
  lexicon: BDAG
  rationale: ἕτερα here means 'other' in addition to the first spirit, not necessarily
    emphasizing difference in kind. 'Spirits' is the straightforward rendering of
    πνεύματα in this demonic context.
- source_word: πονηρότερα ἑαυτοῦ
  chosen: more evil than itself
  alternatives:
  - more wicked than itself
  lexicon: BDAG
  rationale: Comparative adjective describing greater moral malignancy. 'Evil' is
    more common and accessible than 'wicked' while preserving the force.
- source_word: εἰσελθόντα
  chosen: they enter
  alternatives:
  - after entering
  - having entered
  lexicon: BDAG
  rationale: Aorist participle plural agreeing with the spirits. Rendering it as a
    finite verb coordinated in English is natural optimal equivalence and preserves
    the sequence of action.
- source_word: κατοικεῖ ἐκεῖ
  chosen: live there
  alternatives:
  - dwell there
  - settle there
  lexicon: BDAG
  rationale: Although κατοικεῖ is singular in form in the printed text, the sense
    in context is that the spirits take up residence there. 'Live there' is idiomatic
    modern English for κατοικέω.
- source_word: γίνεται τὰ ἔσχατα τοῦ ἀνθρώπου ἐκείνου
  chosen: the last state of that man becomes
  alternatives:
  - the final condition of that man becomes
  - the latter things of that man become
  lexicon: BDAG
  rationale: Idiomatic expression contrasting end condition with beginning condition.
    'Last state' is clear and preserves the comparative structure.
- source_word: χείρονα τῶν πρώτων
  chosen: worse than the first
  alternatives:
  - worse than the former state
  - worse than the first things
  lexicon: BDAG
  rationale: Comparative construction contrasting final and initial condition. Supplying
    'state' implicitly in English is necessary for clarity; 'the first' is concise
    and idiomatic.
- source_word: τοῦ ἀνθρώπου ἐκείνου
  chosen: of that man
  alternatives:
  - of that person
  lexicon: BDAG
  rationale: ἄνθρωπος here is singular masculine in a representative example. Per
    doctrine, gender-accurate rendering is preferred where it matches the source;
    thus 'man' rather than gender-neutral 'person'.
- source_word: οὕτως ἔσται καὶ
  chosen: So it will be also
  alternatives:
  - Thus it will be also
  - So also it will be
  lexicon: BDAG
  rationale: This draws the application from the illustrative case to the present
    generation. 'So it will be also' preserves the emphatic analogy in natural English.
- source_word: τῇ γενεᾷ ταύτῃ τῇ πονηρᾷ
  chosen: with this evil generation
  alternatives:
  - for this evil generation
  - with this wicked generation
  lexicon: BDAG
  rationale: γενεά here refers to the contemporary generation as a moral category.
    'With' best reflects the dative after ἔσται in this idiom ('it will be with...').
    'Evil' matches πονηρᾷ consistently with earlier πονηρότερα.
