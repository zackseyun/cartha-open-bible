id: MAT.12.40
reference: Matthew 12:40
source:
  edition: SBLGNT
  text: ὥσπερ γὰρ ἦν Ἰωνᾶς ἐν τῇ κοιλίᾳ τοῦ κήτους τρεῖς ἡμέρας καὶ τρεῖς νύκτας,
    οὕτως ἔσται ὁ υἱὸς τοῦ ἀνθρώπου ἐν τῇ καρδίᾳ τῆς γῆς τρεῖς ἡμέρας καὶ τρεῖς νύκτας.
translation:
  text: For just as Jonah was in the belly of the sea creature three days and three
    nights, so the Son of Man will be in the heart of the earth three days and three
    nights.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'great fish.' The Greek word denotes a large sea creature and is broader
      than a specific zoological term.
    reason: lexical_alternative
  - marker: b
    text: '''In the heart of the earth'' may refer to burial, the grave, or the depths/realm
      of the dead; the Greek expression is left metaphorical in the main text.'
    reason: alternative_reading
  - marker: c
    text: '''Three days and three nights'' is sometimes understood idiomatically as
      including parts of three days, though others take it more strictly.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  chosen: For just as
  alternatives:
  - For as
  - Just as
  lexicon: BDAG
  rationale: Renders the comparative force of ὥσπερ and the explanatory/connecting
    force of γάρ in natural English. 'For just as' preserves both the logic and the
    emphasis.
- source_word: Ἰωνᾶς
  chosen: Jonah
  rationale: Standard English transliteration of the personal name, in keeping with
    the policy to transliterate names.
- source_word: ἐν τῇ κοιλίᾳ
  chosen: in the belly
  alternatives:
  - in the stomach
  - inside the belly
  lexicon: BDAG
  rationale: κοιλία most naturally denotes 'belly' or 'stomach.' 'Belly' is the established
    and most idiomatic rendering here, matching the narrative allusion without unnecessary
    technicality.
- source_word: τοῦ κήτους
  chosen: of the sea creature
  alternatives:
  - of the great fish
  - of the monster
  lexicon: BDAG
  rationale: κῆτος denotes a large sea creature/monster. 'Sea creature' is a source-oriented
    but readable rendering that avoids importing the more specific 'fish' where the
    Greek itself is broader. 'Monster' can sound mythic in English beyond what the
    text requires.
- source_word: τρεῖς ἡμέρας καὶ τρεῖς νύκτας
  chosen: three days and three nights
  lexicon: BDAG
  rationale: A direct rendering of the repeated temporal expression. It should be
    preserved as stated rather than paraphrased, even though its idiomatic force is
    discussed interpretively elsewhere.
- source_word: οὕτως
  chosen: so
  alternatives:
  - thus
  - in the same way
  lexicon: BDAG
  rationale: Marks the second half of the comparison succinctly and naturally in English.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and semantically appropriate rendering of Jesus'
    self-designation. It preserves the title's biblical resonance and does not flatten
    it into 'the human one.'
- source_word: ἔσται
  chosen: will be
  alternatives:
  - will remain
  lexicon: BDAG
  rationale: Future of εἰμί is most straightforwardly rendered 'will be.' 'Will remain'
    adds durative nuance not explicit in the verb itself.
- source_word: ἐν τῇ καρδίᾳ τῆς γῆς
  chosen: in the heart of the earth
  alternatives:
  - in the depths of the earth
  - in the center of the earth
  lexicon: BDAG
  rationale: A formally close rendering that preserves the metaphor of καρδία ('heart').
    Alternatives such as 'depths' are interpretive and should be preserved, if at
    all, in a footnote rather than replacing the metaphor in the main text.
