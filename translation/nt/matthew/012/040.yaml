theological_decisions:
- issue: Meaning of 'the heart of the earth'
  chosen_reading: Rendered literally as 'the heart of the earth' without specifying
    whether it refers to burial, death, the grave, or the realm of the dead.
  alternative_readings:
  - the grave
  - the depths of the earth
  - the realm of the dead
  rationale: The phrase is metaphorical and theologically discussed, but the Greek
    itself does not force a single interpretive expansion. Per translation philosophy,
    the tension is preserved rather than resolved in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of 'three days and three nights'
  chosen_reading: Kept as a literal temporal expression in the main text.
  alternative_readings:
  - a Semitic idiom for parts of three days
  - a strict seventy-two-hour period
  rationale: The verse states the expression explicitly. Because debates about chronology
    extend beyond the wording itself, the translation should preserve the phrase rather
    than interpret it in the main text.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
