theological_decisions:
- issue: Messianic force of 'the Son of David'
  chosen_reading: Retain the title 'the Son of David' in the main text without paraphrasing
    it as 'the Messiah.'
  alternative_readings:
  - the Messiah
  - David's promised heir
  rationale: The Greek uses the title itself, and the translation should preserve
    that historically and theologically loaded expression rather than resolve it into
    an interpretive paraphrase. Readers can infer the messianic significance from
    the title, and a footnote can make that explicit.
  doctrine_reference: 'Translation philosophy: optimal equivalence; translate according
    to source text''s plain sense and preserve theological tension rather than resolve
    it.'
