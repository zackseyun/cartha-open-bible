id: MAT.12.23
reference: Matthew 12:23
source:
  edition: SBLGNT
  text: καὶ ἐξίσταντο πάντες οἱ ὄχλοι καὶ ἔλεγον· Μήτι οὗτός ἐστιν ὁ υἱὸς Δαυίδ;
translation:
  text: And all the crowds were astonished and said, “Can this be the Son of David?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"The Son of David" is a messianic title, referring to the promised royal
      deliverer from David''s line.'
    reason: cross_reference
  - marker: b
    text: Or, more literally reflecting the force of the question, "Surely this is
      not the Son of David, is it?"
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξίσταντο
  chosen: were astonished
  alternatives:
  - were amazed
  - were beside themselves
  lexicon: BDAG
  rationale: The imperfect middle/passive here conveys an ongoing state of amazement
    or astonishment in response to Jesus' healing. 'Were astonished' is natural modern
    English and preserves the strength of the reaction without the more idiomatic
    or potentially misleading 'were beside themselves.'
- source_word: πάντες οἱ ὄχλοι
  chosen: all the crowds
  alternatives:
  - all the people
  - the whole crowd
  lexicon: BDAG
  rationale: The plural ὄχλοι is explicit in the Greek, so 'all the crowds' preserves
    the number better than singular renderings. Although slightly less idiomatic than
    'all the people,' it reflects Matthew's wording more closely.
- source_word: ἔλεγον
  chosen: said
  alternatives:
  - were saying
  - kept saying
  lexicon: BDAG
  rationale: The imperfect suggests repeated or ongoing speech, but English often
    renders this naturally with simple past in narrative dialogue introduction. The
    sense of communal, continuing reaction is already supported by the context.
- source_word: Μήτι
  chosen: Can this be
  alternatives:
  - Surely this is not
  - This cannot be
  lexicon: BDAG
  rationale: Μήτι introduces a question that often expects a negative answer or expresses
    hesitation. In this context the crowds are wondering aloud rather than making
    a firm denial, so 'Can this be' captures the tentative, astonished inquiry better
    than a strongly negative English question.
- source_word: ὁ υἱὸς Δαυίδ
  chosen: the Son of David
  alternatives:
  - David's Son
  lexicon: BDAG
  rationale: This is a recognized messianic title in Matthew. 'The Son of David' preserves
    both the literal form and the title's theological resonance in Jewish expectation.
