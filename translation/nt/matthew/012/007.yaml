theological_decisions:
- issue: Rendering the Hosea 6:6 citation in a way that preserves prophetic priority
    without denying the legitimacy of sacrifice in its covenantal context
  chosen_reading: I desire mercy and not sacrifice
  alternative_readings:
  - I want mercy, not sacrifice
  rationale: The Greek quotation presents a prophetic contrast emphasizing God's priority
    of mercy over ritual observance when the latter is severed from covenant faithfulness.
    The translation preserves the sharp wording of Jesus' argument without importing
    a blanket abolition of sacrifice beyond what the citation itself states.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather
    than resolve it.'
