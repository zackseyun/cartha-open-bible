id: MAT.12.7
reference: Matthew 12:7
source:
  edition: SBLGNT
  text: εἰ δὲ ἐγνώκειτε τί ἐστιν· Ἔλεος θέλω καὶ οὐ θυσίαν, οὐκ ἂν κατεδικάσατε τοὺς
    ἀναιτίους.
translation:
  text: But if you had known what this means, ‘I desire mercy and not sacrifice,’
    you would not have condemned the guiltless.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the innocent.'
    reason: lexical_alternative
  - marker: b
    text: Jesus quotes Hosea 6:6.
    reason: cross_reference
lexical_decisions:
- source_word: ἐγνώκειτε
  chosen: you had known
  alternatives:
  - you knew
  - you had understood
  lexicon: BDAG
  rationale: Pluperfect sense in the conditional clause is best represented by 'had
    known' in English, matching the unreal condition and Jesus' rebuke about prior
    understanding.
- source_word: τί ἐστιν
  chosen: what this means
  alternatives:
  - what it is
  - what this is
  lexicon: BDAG
  rationale: Idiomatic English for τί ἐστιν in a quotation-introduction context is
    'what this means,' conveying understanding of the cited Scripture rather than
    mere identification.
- source_word: Ἔλεος
  chosen: mercy
  alternatives:
  - compassion
  - steadfast love
  lexicon: BDAG
  rationale: In this Hosea citation, 'mercy' is the established and accurate rendering
    for ἔλεος, expressing covenantal compassion without overexpanding the term.
- source_word: θέλω
  chosen: I desire
  alternatives:
  - I want
  lexicon: BDAG
  rationale: '''I desire'' fits both the elevated register of the prophetic citation
    and the semantic force of θέλω here better than the flatter ''I want.'''
- source_word: θυσίαν
  chosen: sacrifice
  alternatives:
  - sacrificial offering
  lexicon: BDAG
  rationale: '''Sacrifice'' is the natural singular rendering and preserves the prophetic
    contrast without unnecessary expansion.'
- source_word: κατεδικάσατε
  chosen: would not have condemned
  alternatives:
  - would not have pronounced guilty against
  - would not have judged against
  lexicon: BDAG
  rationale: The aorist with ἄν in the apodosis of this contrary-to-fact condition
    is well rendered 'would not have condemned.' 'Condemned' captures the judicial
    force of καταδικάζω.
- source_word: ἀναιτίους
  chosen: the guiltless
  alternatives:
  - the innocent
  - those without guilt
  - the blameless
  lexicon: BDAG
  rationale: '''The guiltless'' closely reflects the adjective''s forensic sense and
    fits the judicial verb ''condemned.'' ''Innocent'' is possible, but ''guiltless''
    better preserves the legal nuance.'
