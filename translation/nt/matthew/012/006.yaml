theological_decisions:
- issue: Identity of the unstated referent in the neuter comparative μεῖζόν
  chosen_reading: Render impersonally as 'something greater' rather than explicitly 'one greater' or directly naming Jesus in the main text.
  alternative_readings:
  - someone greater than the temple is here
  - one greater than the temple is here
  rationale: The Greek uses neuter singular μεῖζόν, not a masculine form. While the context strongly points to Jesus and his messianic authority, the translation should preserve the Greek form and not over-specify the referent in the main text. This also preserves the theological force that something greater than the temple is present in Jesus and his kingdom without forcing a narrower interpretive gloss.
  doctrine_reference: Preserve theological tension rather than resolve it.
