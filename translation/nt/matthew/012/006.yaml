id: MAT.12.6
reference: Matthew 12:6
source:
  edition: SBLGNT
  text: λέγω δὲ ὑμῖν ὅτι τοῦ ἱεροῦ μεῖζόν ἐστιν ὧδε.
translation:
  text: But I tell you that something greater than the temple is here[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'someone greater than the temple is here' or 'one greater than the temple is here.' The Greek uses a neuter form ('greater'), leaving the referent formally unstated.
    reason: alternative_reading
  - marker: b
    text: Or, 'in this place.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγω δὲ ὑμῖν
  chosen: But I tell you
  alternatives:
  - And I tell you
  - Yet I tell you
  - But I say to you
  lexicon: BDAG
  rationale: λέγω with ὑμῖν is a standard direct-address formula. δέ is mildly adversative or continuative; 'But' fits the contrast with the preceding argument while remaining natural English.
- source_word: ὅτι
  chosen: that
  alternatives:
  - —
  lexicon: BDAG
  rationale: Introduces the content of Jesus' statement; explicit 'that' keeps the syntax clear in English.
- source_word: τοῦ ἱεροῦ
  chosen: than the temple
  alternatives:
  - than the sanctuary
  - than the temple precincts
  lexicon: BDAG
  rationale: ἱερόν ordinarily refers to the temple complex rather than the inner sanctuary (which would more specifically be ναός). In this context, 'the temple' is the most idiomatic and contextually accurate English rendering.
- source_word: μεῖζόν
  chosen: greater
  alternatives:
  - more important
  - greater thing/person
  lexicon: BDAG
  rationale: The neuter singular comparative is used substantivally. Because the Greek does not specify the referent explicitly, 'greater' should be preserved rather than interpreted more narrowly.
- source_word: ἐστιν
  chosen: is
  lexicon: BDAG
  rationale: Simple present copula; no reason to expand or paraphrase.
- source_word: ὧδε
  chosen: here
  alternatives:
  - in this place
  lexicon: BDAG
  rationale: A locative adverb meaning 'here' or 'in this place.' 'Here' is concise and natural; the fuller alternative is worth preserving because it can echo the solemnity of the saying.
