id: MAT.12.9
reference: Matthew 12:9
source:
  edition: SBLGNT
  text: Καὶ μεταβὰς ἐκεῖθεν ἦλθεν εἰς τὴν συναγωγὴν αὐτῶν·
translation:
  text: And departing from there, he went into their synagogue.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective linking this episode to the preceding narrative.
    'And' preserves the simple coordinative force without adding temporal nuance not
    explicit in the Greek.
- source_word: μεταβὰς
  chosen: departing
  alternatives:
  - having gone on
  - moving on
  - leaving
  lexicon: BDAG
  rationale: Aorist active participle of μεταβαίνω, indicating movement away from
    the previous location. 'Departing' preserves the participial form and the sense
    of transition from one place to another. 'Leaving' is possible but slightly more
    colloquial; 'moving on' is more interpretive.
- source_word: ἐκεῖθεν
  chosen: from there
  alternatives:
  - from that place
  lexicon: BDAG
  rationale: Adverb of place indicating departure from the previously mentioned location.
    'From there' is the most natural and direct English equivalent.
- source_word: ἦλθεν
  chosen: he went
  alternatives:
  - he came
  lexicon: BDAG
  rationale: Though ἔρχομαι often means 'come,' in narrative movement from the prior
    scene into a new location English idiom prefers 'went.' This reflects target-language
    naturalness while preserving the basic motion verb.
- source_word: εἰς τὴν συναγωγὴν
  chosen: into their synagogue
  alternatives:
  - to their synagogue
  lexicon: BDAG
  rationale: εἰς with the accusative normally marks movement into. 'Into their synagogue'
    preserves the directional force more clearly than 'to their synagogue.'
- source_word: συναγωγὴν
  chosen: synagogue
  alternatives:
  - assembly hall
  lexicon: BDAG
  rationale: '''Synagogue'' is the established and accurate rendering for the Jewish
    place of assembly/worship in this context. A more explanatory gloss would be unnecessarily
    paraphrastic.'
- source_word: αὐτῶν
  chosen: their
  alternatives:
  - theirs
  lexicon: BDAG
  rationale: Genitive plural pronoun modifying 'synagogue.' 'Their' is the natural
    attributive rendering. The referent is the local Jewish group associated with
    the setting, without requiring a more specific identification in translation.
