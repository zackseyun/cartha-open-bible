  chosen_reading: Rendered neutrally as 'their synagogue' without specifying a hostile
    or sectarian group.
  alternative_readings:
  - their meeting place
  - the synagogue belonging to them
  rationale: The Greek simply uses αὐτῶν with συναγωγή and does not explicitly identify
    the referent beyond the narrative context. The translation preserves the wording
    without importing additional polemical force.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language
    primacy over translation tradition.
