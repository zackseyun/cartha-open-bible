id: MAT.12.16
reference: Matthew 12:16
source:
  edition: SBLGNT
  text: καὶ ἐπετίμησεν αὐτοῖς ἵνα μὴ φανερὸν αὐτὸν ποιήσωσιν,
translation:
  text: And he warned them not to make him known,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'strictly warned them' or 'ordered them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  chosen: warned
  alternatives:
  - strictly warned
  - rebuked
  - ordered
  lexicon: BDAG
  rationale: ἐπιτιμάω can mean rebuke, censure, or give a stern warning/charge depending
    on context. Here the content clause ἵνα μὴ ... ποιήσωσιν shows Jesus is directing
    them not to disclose him publicly. 'Warned' fits natural English and conveys a
    strong prohibition without implying moral fault as strongly as 'rebuked.'
- source_word: αὐτοῖς
  chosen: them
  lexicon: BDAG
  rationale: Dative plural pronoun referring to those just healed/following him in
    context; straightforwardly rendered 'them.'
- source_word: ἵνα μὴ
  chosen: not to
  alternatives:
  - so that they would not
  - that they should not
  lexicon: BDAG
  rationale: ἵνα with μή and the subjunctive expresses purpose/content after a verb
    of command or warning. In idiomatic English after 'warned,' 'not to' best captures
    the force.
- source_word: φανερὸν ... ποιήσωσιν
  chosen: make him known
  alternatives:
  - make him public
  - reveal him
  - make him evident
  lexicon: BDAG
  rationale: The idiom φανερὸν ποιέω means to make known, disclose, or make public.
    'Make him known' is clear, natural, and preserves the personal object αὐτόν.
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - So
  lexicon: BDAG
  rationale: Simple connective continuing the narrative; 'And' preserves the Greek
    coordination without adding interpretive nuance.
