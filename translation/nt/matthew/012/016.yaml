theological_decisions:
- issue: Nature of Jesus' command regarding publicity
  chosen_reading: A strong warning to avoid public disclosure of his identity/activity
  alternative_readings:
  - A rebuke of those addressed
  - A formal command/order
  rationale: The verse participates in Matthew's theme of Jesus restraining premature
    publicity. The Greek supports a stern directive, but does not itself specify the
    theological reason; the translation therefore avoids importing a fuller explanation
    into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
