id: MAT.12.44
reference: Matthew 12:44
source:
  edition: SBLGNT
  text: τότε λέγει· ⸂Εἰς τὸν οἶκόν μου ἐπιστρέψω⸃ ὅθεν ἐξῆλθον· καὶ ἐλθὸν ⸀εὑρίσκει
    ⸀σχολάζοντα σεσαρωμένον καὶ κεκοσμημένον.
translation:
  text: Then it says, ‘I will return to my house from which I came out,’ and when
    it comes, it finds it unoccupied, swept, and put in order.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'empty' for 'unoccupied.'
    reason: lexical_alternative
  - marker: b
    text: Or 'decorated' / 'adorned' for 'put in order.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb introducing the next action in the narrative; 'Then'
    is the natural concise English equivalent.
- source_word: λέγει
  chosen: it says
  alternatives:
  - he says
  lexicon: BDAG
  rationale: Present tense used in vivid narration. The speaker is the unclean spirit
    from the prior context, grammatically implicit; 'it says' fits English usage for
    a spirit and preserves the present-tense vividness better than shifting to past.
- source_word: Εἰς τὸν οἶκόν μου ἐπιστρέψω
  chosen: I will return to my house
  alternatives:
  - I will go back to my house
  lexicon: BDAG
  rationale: ἐπιστρέφω here means return/go back. 'Return' is slightly more formal
    and matches the directional phrase εἰς τὸν οἶκόν μου. 'My house' preserves the
    possessive claim made by the spirit.
- source_word: ὅθεν ἐξῆλθον
  chosen: from which I came out
  alternatives:
  - from where I went out
  - from which I departed
  lexicon: BDAG
  rationale: ὅθεν is 'from which/from where'; ἐξῆλθον is 'I came/went out.' 'From
    which I came out' is idiomatic with 'house' as antecedent and preserves the concrete
    exit imagery.
- source_word: ἐλθὸν
  chosen: when it comes
  alternatives:
  - and having come
  - and when it has come
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main verb, naturally rendered in English
    as a temporal clause: ''when it comes.'' This is smoother than a wooden participial
    rendering while preserving sequence.'
- source_word: εὑρίσκει
  chosen: it finds
  alternatives:
  - it discovers
  lexicon: BDAG
  rationale: Simple present in vivid narration; 'finds' is the standard equivalent.
- source_word: σχολάζοντα
  chosen: unoccupied
  alternatives:
  - empty
  - idle
  - vacant
  lexicon: BDAG
  rationale: σχολάζω can mean to be free, unoccupied, or empty. In this context of
    a 'house' representing a person, 'unoccupied' best preserves the idea that the
    place is available/open rather than merely physically empty. 'Empty' is a common
    traditional rendering and is preserved in a footnote.
- source_word: σεσαρωμένον
  chosen: swept
  alternatives:
  - clean-swept
  lexicon: BDAG
  rationale: 'Perfect passive participle from σαρόω, indicating a completed state:
    the house has been swept clean. ''Swept'' is concise and idiomatic.'
- source_word: κεκοσμημένον
  chosen: put in order
  alternatives:
  - decorated
  - arranged
  - adorned
  lexicon: BDAG
  rationale: Perfect passive participle from κοσμέω, which can mean arrange, put in
    order, adorn. In this context, 'put in order' best conveys orderly condition without
    overemphasizing ornamentation. 'Decorated/adorned' are possible and preserved
    in a footnote.
