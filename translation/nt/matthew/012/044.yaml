theological_decisions:
- issue: Metaphorical force of 'house' in the saying about the returning unclean spirit
  chosen_reading: Retain 'house' literally in the main text without explicating the
    metaphor as 'person' or 'life.'
  alternative_readings:
  - I will return to the person I left
  rationale: The immediate context explains the metaphor, but the verse itself uses
    'house.' Preserving the image avoids interpretive paraphrase and maintains Jesus's
    rhetorical picture.
  doctrine_reference: 'Translation philosophy: original-language primacy; never paraphrase
    beyond what the source text warrants.'
