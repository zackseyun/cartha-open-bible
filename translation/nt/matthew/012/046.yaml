- issue: Rendering of ἀδελφοί in relation to Jesus' family
  chosen_reading: his brothers
  alternative_readings:
  - his brothers and sisters
  - his siblings
  rationale: The Greek form is masculine plural and in this narrative context most naturally rendered 'brothers.' The translation does not use this verse to adjudicate later theological debates about the precise relationship of these brothers to Jesus; it simply renders the lexical surface of the text.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve theological tension rather than resolve it.'
