id: MAT.12.46
reference: Matthew 12:46
source:
  edition: SBLGNT
  text: Ἔτι ⸀δὲ αὐτοῦ λαλοῦντος τοῖς ὄχλοις ἰδοὺ ἡ μήτηρ καὶ οἱ ἀδελφοὶ αὐτοῦ εἱστήκεισαν ἔξω ζητοῦντες αὐτῷ λαλῆσαι.
translation:
  text: While he was still speaking to the crowds[a], behold, his mother and his brothers were standing outside, seeking to speak to him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his siblings,' if ἀδελφοί is taken more broadly as close kin; the Greek term here is masculine plural and is rendered 'brothers' in the main text.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔτι δὲ
  chosen: While ... still
  alternatives:
  - And while ... still
  - But while ... still
  - Still
  lexicon: BDAG
  rationale: Combined with the genitive absolute, ἔτι marks ongoing action ('still') and δέ provides mild narrative transition. 'While he was still...' captures both temporal continuity and readable English flow.
- source_word: αὐτοῦ λαλοῦντος
  chosen: he was ... speaking
  alternatives:
  - he was talking
  - he was saying these things
  lexicon: BDAG
  rationale: Genitive absolute indicating contemporaneous action. 'Speaking' is a straightforward rendering of λαλέω and avoids over-specifying content.
- source_word: τοῖς ὄχλοις
  chosen: to the crowds
  alternatives:
  - to the crowd
  - to the multitudes
  lexicon: BDAG
  rationale: ὄχλοις is plural, so 'crowds' best reflects the Greek number. 'Multitudes' is traditional but less natural in modern English.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to a new development. 'Behold' preserves the marked, vivid narrative force better than flatter modern options, while remaining understandable.
- source_word: ἡ μήτηρ
  chosen: his mother
  alternatives:
  - the mother
  lexicon: BDAG
  rationale: Although the possessive is not repeated with μήτηρ, English idiom naturally supplies it from context, and the following αὐτοῦ with 'brothers' governs the whole family reference.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  chosen: his brothers
  alternatives:
  - his brothers and sisters
  - his siblings
  lexicon: BDAG
  rationale: ἀδελφοί here refers to male siblings/kin as presented in the narrative. Per translation philosophy, gender-accurate rendering favors 'brothers' rather than an inclusive paraphrase.
- source_word: εἱστήκεισαν
  chosen: were standing
  alternatives:
  - stood
  - had taken their stand
  lexicon: BDAG
  rationale: Pluperfect/intransitive form of ἵστημι conveys a stative posture. 'Were standing' gives natural English for their continuing position outside.
- source_word: ἔξω
  chosen: outside
  alternatives:
  - outdoors
  - outside the house
  lexicon: BDAG
  rationale: '''Outside'' is the plain sense. Adding ''the house'' would import context not explicit in this verse.'
- source_word: ζητοῦντες
  chosen: seeking
  alternatives:
  - wanting
  - trying
  lexicon: BDAG
  rationale: ζητέω often means 'seek' in a purposeful sense. 'Seeking' preserves the verbal connection without reducing it to mere desire.
- source_word: αὐτῷ λαλῆσαι
  chosen: to speak to him
  alternatives:
  - to talk with him
  - to speak with him
  lexicon: BDAG
  rationale: Dative pronoun with infinitive naturally yields 'to speak to him.' This is idiomatic and sufficiently close to the Greek.
