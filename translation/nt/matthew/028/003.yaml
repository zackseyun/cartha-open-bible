theological_decisions:
- issue: Referent of αὐτοῦ
  chosen_reading: The pronouns refer to the angel described in the immediate context, not to Jesus.
  alternative_readings:
  - The pronouns could be misunderstood by English readers as referring to Jesus because of the broader resurrection context.
  rationale: The nearest antecedent in context is the angel of the Lord who descended and rolled away the stone (v. 2). The translation keeps the pronoun 'his' because the Greek does, without importing an explicit noun not present in the verse.
