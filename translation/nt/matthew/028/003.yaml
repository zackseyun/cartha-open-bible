id: MAT.28.3
reference: Matthew 28:3
source:
  edition: SBLGNT
  text: ἦν δὲ ἡ εἰδέα αὐτοῦ ⸀ὡς ἀστραπὴ καὶ τὸ ἔνδυμα αὐτοῦ λευκὸν ὡς χιών.
translation:
  text: His appearance was like lightning[a], and his clothing white as snow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'form' or 'look' for 'appearance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' gives natural English narrative progression without implying strong contrast.
- source_word: εἰδέα
  chosen: appearance
  alternatives:
  - form
  - look
  lexicon: BDAG
  rationale: εἰδέα refers to visible appearance or outward form. 'Appearance' is the most natural and precise English rendering here.
- source_word: ὡς ἀστραπή
  chosen: like lightning
  alternatives:
  - as lightning
  lexicon: BDAG
  rationale: ὡς marks comparison. 'Like lightning' is idiomatic modern English and preserves the simile.
- source_word: ἔνδυμα
  chosen: clothing
  alternatives:
  - garment
  - robe
  lexicon: BDAG
  rationale: ἔνδυμα is a general term for clothing or garment. 'Clothing' is clear modern English and avoids specifying a type of garment not stated in the Greek.
- source_word: λευκόν
  chosen: white
  alternatives:
  - bright white
  lexicon: BDAG
  rationale: The adjective straightforwardly denotes whiteness. 'White' preserves the plain sense without adding intensity not explicit in the text.
- source_word: ὡς χιών
  chosen: as snow
  alternatives:
  - like snow
  lexicon: BDAG
  rationale: A second simile comparing the whiteness of the clothing to snow. 'As snow' is idiomatic and traditional while remaining accurate.
