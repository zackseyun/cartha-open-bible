id: MAT.4.9
reference: Matthew 4:9
source:
  edition: SBLGNT
  text: καὶ ⸀εἶπεν αὐτῷ· Ταῦτά ⸂σοι πάντα⸃ δώσω, ἐὰν πεσὼν προσκυνήσῃς μοι.
translation:
  text: And he said to him[a], “I will give you all these things, if you fall down and worship me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “bow down to me” or “pay homage to me.” The Greek verb can denote prostration or homage, but here the context favors “worship.”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  - And so
  lexicon: BDAG
  rationale: Standard connective; simple coordination fits the narrative flow without adding temporal nuance not explicit in the conjunction.
- source_word: εἶπεν αὐτῷ
  chosen: he said to him
  alternatives:
  - he said to Jesus
  - he told him
  lexicon: BDAG
  rationale: The Greek uses pronouns only; 'he said to him' preserves the text's wording and avoids importing names not present in this clause.
- source_word: Ταῦτά
  chosen: these things
  alternatives:
  - these
  - all this
  lexicon: BDAG
  rationale: The demonstrative is neuter plural and points to the displayed kingdoms/glory of the previous verse; 'these things' is natural English and preserves the plural sense.
- source_word: σοι
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: The dative indirect object is naturally expressed in English within 'I will give you'; an explicit 'to' is unnecessary.
- source_word: πάντα
  chosen: all
  alternatives:
  - all of them
  - the whole of them
  lexicon: BDAG
  rationale: Placed with Ταῦτά, it yields 'all these things,' preserving the comprehensive force of the adjective.
- source_word: δώσω
  chosen: I will give
  alternatives:
  - I shall give
  - I will hand over
  lexicon: BDAG
  rationale: Future active indicative straightforwardly expresses a promise/offer; 'give' is the most direct and idiomatic rendering.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - provided that
  - on condition that
  lexicon: BDAG
  rationale: Introduces a conditional clause; 'if' is the plain English equivalent.
- source_word: πεσὼν
  chosen: you fall down
  alternatives:
  - falling down
  - having fallen down
  - prostrate yourself
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb conveys the bodily act accompanying worship. 'Fall down' preserves the concrete physical imagery without overinterpreting it as full prostration in the main text.
- source_word: προσκυνήσῃς
  chosen: worship
  alternatives:
  - bow down to
  - pay homage to
  lexicon: BDAG
  rationale: In this temptation context, the act demanded is religiously charged rather than mere civic homage. 'Worship' best captures the theological force, while alternatives are preserved in a footnote because προσκυνέω can denote bowing/prostration in some contexts.
- source_word: μοι
  chosen: me
  alternatives:
  - to me
  - before me
  lexicon: BDAG
  rationale: The dative with προσκυνέω is naturally rendered as the object in English, 'worship me.'
