theological_decisions:
- issue: Rendering προσκυνέω in Satan's demand to Jesus
  chosen_reading: worship me
  alternative_readings:
  - bow down to me
  - pay homage to me
  rationale: Given the immediate context of temptation and the exclusivity of worship due to God in the following verse, the demand is best rendered as 'worship me' rather than a merely political gesture. This preserves the theological gravity of the scene without denying the verb's broader semantic range.
