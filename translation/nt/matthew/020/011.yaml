id: MAT.20.11
reference: Matthew 20:11
source:
  edition: SBLGNT
  text: λαβόντες δὲ ἐγόγγυζον κατὰ τοῦ οἰκοδεσπότου
translation:
  text: And after receiving it[a], they began grumbling against the master of the house,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having received, they were grumbling against the landowner.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  chosen: after receiving it
  alternatives:
  - having received
  - when they received
  lexicon: BDAG
  rationale: Aorist participle of λαμβάνω, temporally prior to the main verb. 'After receiving it' makes the sequence clear in natural English. The object ('it,' i.e., the denarius from context) is implicit in Greek and may be supplied in English for readability without altering sense.
- source_word: δὲ
  chosen: And
  alternatives:
  - Now
  - But
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking strong contrast. 'And' best fits the flow in English.
- source_word: ἐγόγγυζον
  chosen: they began grumbling
  alternatives:
  - they were grumbling
  - they complained
  - they murmured
  lexicon: BDAG
  rationale: Imperfect of γογγύζω denotes ongoing or inceptive past action. 'Began grumbling' captures the onset after payment, while 'grumbling' preserves the low, dissatisfied nuance better than the more formal 'murmured' or broader 'complained'.
- source_word: κατὰ
  chosen: against
  alternatives:
  - about
  - at
  lexicon: BDAG
  rationale: With the genitive, κατά commonly expresses opposition directed toward someone. 'Against' is the most direct and idiomatic rendering here.
- source_word: τοῦ οἰκοδεσπότου
  chosen: the master of the house
  alternatives:
  - the landowner
  - the householder
  lexicon: BDAG
  rationale: οἰκοδεσπότης is literally the head/master of a household or estate. 'Master of the house' preserves the compound sense more transparently than 'landowner,' though the latter fits the parable's setting. 'Householder' is accurate but less natural in contemporary English.
