id: MAT.27.44
reference: Matthew 27:44
source:
  edition: SBLGNT
  text: τὸ δ’ αὐτὸ καὶ οἱ λῃσταὶ οἱ συσταυρωθέντες ⸀σὺν αὐτῷ ὠνείδιζον αὐτόν.
translation:
  text: In the same way[b][a], even the robbers who had been crucified with him were insulting him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the same thing'; the Greek idiom means that they too were treating him in the same way.
    reason: lexical_alternative
  - marker: b
    text: Or 'were reviling him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... αὐτὸ
  chosen: In the same way
  alternatives:
  - the same thing
  - likewise
  lexicon: BDAG
  rationale: The idiom τὸ αὐτό with δέ here functions adverbially, referring back to the same kind of mockery just described. 'In the same way' conveys the idiomatic sense in natural English better than the overly literal 'the same thing.'
- source_word: καὶ
  chosen: even
  alternatives:
  - also
  - and
  lexicon: BDAG
  rationale: 'In context καί adds emphasis: not only passersby and leaders, but even the robbers joined in. ''Even'' best captures the climactic force.'
- source_word: λῃσταὶ
  chosen: robbers
  alternatives:
  - bandits
  - criminals
  lexicon: BDAG
  rationale: λῃστής commonly denotes a robber or bandit. 'Robbers' is a standard, clear rendering and matches the Matthean passion context without over-specifying political insurgency.
- source_word: συσταυρωθέντες σὺν αὐτῷ
  chosen: who had been crucified with him
  alternatives:
  - who were crucified with him
  - having been crucified with him
  lexicon: BDAG
  rationale: The participle is adjectival, identifying the robbers as those crucified alongside Jesus. 'Had been crucified with him' is natural English that preserves the passive sense and prior action relative to the main verb.
- source_word: ὠνείδιζον
  chosen: were insulting
  alternatives:
  - were reviling
  - were mocking
  - were heaping insults on
  lexicon: BDAG
  rationale: The imperfect indicates ongoing action. 'Were insulting' preserves the durative force in accessible modern English. 'Reviling' is more formal but less natural for the target audience.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; straightforward pronominal rendering.
