theological_decisions:
- issue: Whether to harmonize with Luke's account of one criminal speaking differently
  chosen_reading: Translate Matthew's statement as applying to the robbers in this scene without qualification.
  alternative_readings:
  - Interpret as a general statement later nuanced by Luke's more detailed narrative
  - Render in a way that softens the plural to avoid apparent tension
  rationale: The Greek plainly uses the plural 'the robbers' and an imperfect verb, indicating that those crucified with Jesus were insulting him. The translation should preserve Matthew's wording and not smooth over inter-Gospel narrative tension.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
