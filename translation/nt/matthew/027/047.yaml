theological_decisions:
- issue: Whether to render the bystanders' statement in a way that implies Jesus actually called Elijah or only that they thought he did
  chosen_reading: 'Render as reported perception: ''This man is calling for Elijah.'''
  alternative_readings:
  - This one is calling Elijah
  - He is calling to Elijah
  rationale: The Greek reports what the bystanders said after hearing Jesus' cry; the translation should not import a theological judgment beyond their misunderstanding. The wording preserves the narrative irony without resolving whether they misheard 'Eli' as 'Elijah' in the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
