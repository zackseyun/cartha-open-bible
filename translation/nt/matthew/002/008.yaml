id: MAT.2.8
reference: Matthew 2:8
source:
  edition: SBLGNT
  text: καὶ πέμψας αὐτοὺς εἰς Βηθλέεμ εἶπεν· Πορευθέντες ⸂ἐξετάσατε ἀκριβῶς⸃ περὶ
    τοῦ παιδίου· ἐπὰν δὲ εὕρητε, ἀπαγγείλατέ μοι, ὅπως κἀγὼ ἐλθὼν προσκυνήσω αὐτῷ.
translation:
  text: And after sending them to Bethlehem, he said, “Go and search carefully for
    the child, and when you find him, report to me, so that I too may come and worship
    him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “pay him homage” or “bow down to him.” The Greek verb can denote either
      worship or an act of reverence before a royal figure.
    reason: lexical_alternative
lexical_decisions:
- source_word: πέμψας
  chosen: after sending
  alternatives:
  - having sent
  - sending
  lexicon: BDAG
  rationale: 'Aorist participle preceding the main verb εἶπεν is rendered as antecedent
    action in natural English: ''after sending them.'' This preserves the sequence
    without awkwardness.'
- source_word: Πορευθέντες
  chosen: Go
  alternatives:
  - having gone
  - go on your way
  lexicon: BDAG
  rationale: The participle functions imperativally with ἐξετάσατε. English idiom
    prefers 'Go and search' rather than the more wooden 'Having gone, search.'
- source_word: ἐξετάσατε ἀκριβῶς
  chosen: search carefully
  alternatives:
  - inquire diligently
  - investigate thoroughly
  - examine carefully
  lexicon: BDAG
  rationale: The verb-adverb combination conveys careful, exact inquiry. 'Search carefully'
    is clear modern English and fits the narrative context of locating the child.
- source_word: περὶ τοῦ παιδίου
  chosen: for the child
  alternatives:
  - concerning the child
  - about the child
  lexicon: BDAG
  rationale: 'With a verb of inquiry/search, περί is naturally rendered in English
    as the object sought: ''for the child.'' This is more idiomatic than ''about the
    child'' in this context.'
- source_word: παιδίου
  chosen: child
  alternatives:
  - young child
  - little child
  lexicon: BDAG
  rationale: παιδίον denotes a child; 'child' is the most natural and sufficiently
    precise rendering here. 'Young child' is possible but not required by the word
    itself in this verse.
- source_word: ἐπὰν δὲ εὕρητε
  chosen: when you find him
  alternatives:
  - if you find him
  - once you find him
  lexicon: BDAG
  rationale: The construction can be rendered conditionally, but in this directive
    context English commonly uses 'when' to express expected contingency. This preserves
    Herod's instruction naturally without overstating certainty.
- source_word: ἀπαγγείλατέ μοι
  chosen: report to me
  alternatives:
  - tell me
  - inform me
  lexicon: BDAG
  rationale: ἀπαγγέλλω carries the sense of bringing back a report. 'Report to me'
    preserves that nuance better than the simpler 'tell me.'
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  - that
  lexicon: BDAG
  rationale: ὅπως introduces purpose. 'So that' is natural modern English and preserves
    the purposive force.
- source_word: κἀγὼ
  chosen: I too
  alternatives:
  - I also
  - even I
  lexicon: BDAG
  rationale: The crasis emphasizes Herod's claimed shared intention with the magi.
    'I too' captures this succinctly.
- source_word: ἐλθὼν προσκυνήσω αὐτῷ
  chosen: may come and worship him
  alternatives:
  - having come, may bow down to him
  - may come and pay him homage
  lexicon: BDAG
  rationale: The participle plus subjunctive is naturally rendered as coordinated
    action in English. προσκυνέω can mean prostration/homage or worship; in Matthew's
    infancy narrative, where the child Jesus is the object, 'worship' best preserves
    the evangelist's theological framing while remaining lexically defensible.
