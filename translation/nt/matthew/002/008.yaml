theological_decisions:
- issue: Rendering προσκυνήσω αὐτῷ in relation to the child Jesus
  chosen_reading: worship him
  alternative_readings:
  - pay him homage
  - bow down to him
  rationale: προσκυνέω can denote either reverential prostration before a ruler or
    worship. In Matthew, especially in contexts involving Jesus, the term often carries
    heightened theological significance. Here Herod's stated intent is deceitful,
    but the narrator's wording still permits the stronger rendering. 'Worship him'
    aligns with Matthew's broader presentation without importing a claim beyond the
    lexical range; alternatives are preserved in a footnote for auditability.
  doctrine_reference: Affirmations; Translation philosophy §3
