theological_decisions:
- issue: Rendering ψυχή in a context of mortal threat
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The idiom 'seek someone's ψυχή' in this narrative context means to seek
    the person's life, i.e., to kill him. Rendering it as 'soul' would import a theological
    nuance not intended by the immediate context.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition; preserve the source text''s plain sense.'
