id: MAT.2.20
reference: Matthew 2:20
source:
  edition: SBLGNT
  text: λέγων· Ἐγερθεὶς παράλαβε τὸ παιδίον καὶ τὴν μητέρα αὐτοῦ καὶ πορεύου εἰς γῆν
    Ἰσραήλ, τεθνήκασιν γὰρ οἱ ζητοῦντες τὴν ψυχὴν τοῦ παιδίου.
translation:
  text: saying, “Get up, take the child and his mother, and go to the land of Israel,
    for those seeking the child’s life are dead.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'those seeking the life of the child have died.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Present participle introducing the angel's speech; 'saying' preserves
    the participial linkage to the previous verse more directly than the finite 'and
    said.'
- source_word: Ἐγερθείς
  chosen: Get up
  alternatives:
  - having arisen
  - rise
  lexicon: BDAG
  rationale: Aorist passive participle used idiomatically before an imperative. In
    English, 'Get up' communicates the force naturally without awkward literalism.
- source_word: παράλαβε
  chosen: take
  alternatives:
  - take along
  - receive
  lexicon: BDAG
  rationale: Imperative of παραλαμβάνω here means to take someone with oneself. 'Take'
    is concise and natural; 'take along' is possible but slightly more expansive than
    needed.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the young child
  lexicon: BDAG
  rationale: παιδίον commonly means 'child.' 'Young child' reflects some traditional
    renderings but adds specificity not required by the Greek.
- source_word: τὴν μητέρα αὐτοῦ
  chosen: his mother
  alternatives:
  - the child's mother
  lexicon: BDAG
  rationale: The possessive pronoun naturally modifies 'mother' in English as 'his
    mother.' This is both accurate and readable.
- source_word: πορεύου
  chosen: go
  alternatives:
  - travel
  - be on your way
  lexicon: BDAG
  rationale: Middle imperative of πορεύομαι often functions as a simple command to
    go or travel. 'Go' is the most straightforward equivalent.
- source_word: εἰς γῆν Ἰσραήλ
  chosen: to the land of Israel
  alternatives:
  - into the land of Israel
  - to Israel's land
  lexicon: BDAG
  rationale: γῆ with the genitive Ἰσραήλ denotes the territory/land of Israel. 'To
    the land of Israel' is idiomatic and preserves the geographic sense better than
    simply 'to Israel.'
- source_word: τεθνήκασιν
  chosen: are dead
  alternatives:
  - have died
  lexicon: BDAG
  rationale: Perfect tense of θνῄσκω emphasizes the present state resulting from death.
    'Are dead' captures that resultant state more naturally in English than 'have
    died' in this context.
- source_word: οἱ ζητοῦντες
  chosen: those seeking
  alternatives:
  - those who were seeking
  - those trying to find
  lexicon: BDAG
  rationale: Present participle used substantivally. 'Those seeking' preserves the
    verbal nuance and avoids overinterpreting the nature of the search.
- source_word: τὴν ψυχὴν τοῦ παιδίου
  chosen: the child’s life
  alternatives:
  - the life of the child
  - the child's soul
  lexicon: BDAG
  rationale: In this idiom, ψυχή means 'life' rather than 'soul.' The phrase refers
    to an attempt to kill the child, not to his immaterial soul.
