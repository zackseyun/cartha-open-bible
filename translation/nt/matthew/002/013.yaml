theological_decisions:
- issue: Rendering of κύριος in ἄγγελος κυρίου
  chosen_reading: Lord
  alternative_readings:
  - Master
  rationale: The phrase is conventionally and lexically best rendered 'angel of the
    Lord.' This follows the project's default rendering of κύριος as 'Lord' and does
    not force a narrower interpretive claim beyond the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
