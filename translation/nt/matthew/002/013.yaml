id: MAT.2.13
reference: Matthew 2:13
source:
  edition: SBLGNT
  text: Ἀναχωρησάντων δὲ αὐτῶν ἰδοὺ ἄγγελος κυρίου ⸂φαίνεται κατ’ ὄναρ⸃ τῷ Ἰωσὴφ λέγων·
    Ἐγερθεὶς παράλαβε τὸ παιδίον καὶ τὴν μητέρα αὐτοῦ καὶ φεῦγε εἰς Αἴγυπτον, καὶ
    ἴσθι ἐκεῖ ἕως ἂν εἴπω σοι· μέλλει γὰρ Ἡρῴδης ζητεῖν τὸ παιδίον τοῦ ἀπολέσαι αὐτό.
translation:
  text: After they had departed, behold, an angel of the Lord appeared to Joseph in
    a dream, saying, “Get up, take the child and his mother, and flee to Egypt, and
    stay there until I tell you; for Herod is about to seek the child in order to
    destroy him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the angel of the Lord.' The Greek lacks the article, but some readers
      may hear the phrase as a familiar biblical expression.
    reason: alternative_reading
  - marker: b
    text: Greek 'is about to seek,' expressing imminent intent.
    reason: lexical_alternative
  - marker: c
    text: Or 'to kill him.' The Greek says 'to destroy him,' here in the sense of
      causing his death.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀναχωρησάντων δὲ αὐτῶν
  chosen: After they had departed
  alternatives:
  - When they had withdrawn
  - After they left
  lexicon: BDAG
  rationale: A genitive absolute marking prior action. 'After they had departed' is
    natural English and preserves the temporal sequence without over-paraphrasing.
    'They' refers to the visitors just mentioned in context.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained to preserve Matthew's vivid narrative marker. Though somewhat
    literary in English, it remains readable and signals sudden divine intervention.
- source_word: ἄγγελος κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: BDAG
  rationale: The anarthrous construction here is best rendered indefinitely in English.
    κύριος is translated 'Lord' per doctrine guidance for the title.
- source_word: φαίνεται κατ’ ὄναρ
  chosen: appeared to Joseph in a dream
  alternatives:
  - was seen by Joseph in a dream
  - appears to Joseph in a dream
  lexicon: BDAG
  rationale: Although φαίνεται is present tense in the Greek, English narrative style
    normally uses past tense here. κατ’ ὄναρ is an idiom meaning 'in a dream,' not
    merely 'during sleep.' The dative τῷ Ἰωσὴφ is incorporated naturally with the
    verb.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: A participle introducing direct speech; 'saying' preserves the Greek
    structure smoothly.
- source_word: Ἐγερθεὶς
  chosen: Get up
  alternatives:
  - Arise
  - After getting up
  lexicon: BDAG
  rationale: Though formally a participle ('having arisen'), in command sequence it
    functions naturally as an imperative in English. 'Get up' is clear modern English
    without archaic tone.
- source_word: παράλαβε
  chosen: take
  alternatives:
  - take along
  - receive
  lexicon: BDAG
  rationale: In this context the sense is to take along with oneself. 'Take' is concise
    and idiomatic; the accompaniment is clear from context.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the young child
  lexicon: BDAG
  rationale: παιδίον denotes a child/young child. 'The child' is the most natural
    and sufficiently precise in context.
- source_word: τὴν μητέρα αὐτοῦ
  chosen: his mother
  alternatives:
  - the child's mother
  lexicon: BDAG
  rationale: The possessive pronoun naturally refers to the child. 'His mother' is
    concise and clear in English.
- source_word: φεῦγε εἰς Αἴγυπτον
  chosen: flee to Egypt
  alternatives:
  - escape to Egypt
  - run away to Egypt
  lexicon: BDAG
  rationale: φεῦγε carries urgency and danger; 'flee' best preserves that force.
- source_word: ἴσθι ἐκεῖ
  chosen: stay there
  alternatives:
  - remain there
  - be there
  lexicon: BDAG
  rationale: Though literally 'be there,' the idiomatic force in context is continued
    presence, hence 'stay there'.
- source_word: ἕως ἂν εἴπω σοι
  chosen: until I tell you
  alternatives:
  - until I speak to you
  - until I inform you
  lexicon: BDAG
  rationale: This construction expresses an indefinite future limit. 'Until I tell
    you' is direct and natural.
- source_word: μέλλει γὰρ Ἡρῴδης ζητεῖν
  chosen: for Herod is about to seek
  alternatives:
  - for Herod is going to search for
  - for Herod intends to look for
  lexicon: BDAG
  rationale: μέλλει conveys imminence or impending action. 'Is about to seek' preserves
    the urgency better than a flat future.
- source_word: τοῦ ἀπολέσαι αὐτό
  chosen: in order to destroy him
  alternatives:
  - to kill him
  - so as to destroy him
  lexicon: BDAG
  rationale: The articular infinitive with τοῦ expresses purpose. ἀπόλλυμι here means
    to bring about death/destruction. 'Destroy him' preserves the lexical breadth
    while fitting the murderous context.
