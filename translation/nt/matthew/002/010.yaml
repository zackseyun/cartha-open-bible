id: MAT.2.10
reference: Matthew 2:10
source:
  edition: SBLGNT
  text: ἰδόντες δὲ τὸν ἀστέρα ἐχάρησαν χαρὰν μεγάλην σφόδρα.
translation:
  text: And when they saw the star[a], they rejoiced with exceedingly great joy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally, 'they rejoiced with great joy exceedingly,' a strongly emphatic expression.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when they saw
  alternatives:
  - seeing
  - after seeing
  - having seen
  lexicon: BDAG
  rationale: Aorist participle of ὁράω, functioning temporally before the main verb. 'When they saw' gives natural English while preserving the participial relation better than a wooden 'having seen.'
- source_word: δὲ
  chosen: And
  alternatives:
  - now
  - then
  - but
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative rather than marking strong contrast. 'And' is the most natural English narrative connector.
- source_word: ἀστέρα
  chosen: the star
  lexicon: BDAG
  rationale: ἀστήρ straightforwardly means 'star.' The article is retained because it refers to the specific star already introduced in context.
- source_word: ἐχάρησαν
  chosen: they rejoiced
  alternatives:
  - they were glad
  - they felt joy
  lexicon: BDAG
  rationale: Aorist passive/deponent form of χαίρω, idiomatically active in meaning. 'They rejoiced' preserves the verbal force and elevated tone better than flatter alternatives.
- source_word: χαρὰν μεγάλην
  chosen: with great joy
  alternatives:
  - a great joy
  - greatly
  lexicon: BDAG
  rationale: Cognate accusative construction intensifying the verb. English commonly renders this with a prepositional phrase, 'with great joy,' rather than the less idiomatic 'rejoiced a great joy.'
- source_word: σφόδρα
  chosen: exceedingly
  alternatives:
  - very much
  - greatly
  - extremely
  lexicon: BDAG
  rationale: σφόδρα intensifies the whole expression. 'Exceedingly' preserves the emphatic, somewhat heightened style of the Greek in a readable way.
