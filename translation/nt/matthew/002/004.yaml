id: MAT.2.4
reference: Matthew 2:4
source:
  edition: SBLGNT
  text: καὶ συναγαγὼν πάντας τοὺς ἀρχιερεῖς καὶ γραμματεῖς τοῦ λαοῦ ἐπυνθάνετο παρ’
    αὐτῶν ποῦ ὁ χριστὸς γεννᾶται.
translation:
  text: And gathering together all the chief priests and scribes of the people, he
    was inquiring of them where the Christ was to be born.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve the Jewish messianic context.
    reason: alternative_reading
lexical_decisions:
- source_word: συναγαγὼν
  chosen: after gathering
  alternatives:
  - having gathered
  - gathering together
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered as antecedent
    action in English. 'After gathering' is idiomatic while preserving the sequence.
- source_word: πάντας
  chosen: all
  alternatives:
  - all of the
  lexicon: BDAG
  rationale: Retains the comprehensiveness of the Greek adjective without unnecessary
    expansion.
- source_word: ἀρχιερεῖς
  chosen: chief priests
  alternatives:
  - high priests
  - leading priests
  lexicon: BDAG
  rationale: Standard and accurate rendering for the plural referring to the senior
    priestly leadership, not multiple holders of the singular office of high priest.
- source_word: γραμματεῖς
  chosen: scribes
  alternatives:
  - teachers of the law
  - legal experts
  lexicon: BDAG
  rationale: '''Scribes'' is the most direct rendering and remains understandable
    in context; alternatives are more interpretive.'
- source_word: τοῦ λαοῦ
  chosen: of the people
  alternatives:
  - of the Jewish people
  - of the nation
  lexicon: BDAG
  rationale: A straightforward genitive preserving the source wording without importing
    an explanatory ethnic gloss into the main text.
- source_word: ἐπυνθάνετο
  chosen: he was asking
  alternatives:
  - he inquired
  - he kept asking
  lexicon: BDAG
  rationale: Imperfect middle indicates ongoing or attempted inquiry. 'He was asking'
    preserves the imperfective sense better than the simple past 'he asked'.
- source_word: παρ’ αὐτῶν
  chosen: them
  alternatives:
  - from them
  - of them
  lexicon: BDAG
  rationale: English idiom normally absorbs the preposition with 'ask.' The sense
    'from them' is preserved in the verb-object construction.
- source_word: ποῦ
  chosen: where
  lexicon: BDAG
  rationale: Direct interrogative adverb with no need for expansion.
- source_word: ὁ χριστὸς
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title is translated 'Messiah' rather than
    transliterated 'Christ,' preserving the Jewish messianic context.
- source_word: γεννᾶται
  chosen: is to be born
  alternatives:
  - is born
  - would be born
  lexicon: BDAG
  rationale: 'Present passive in an indirect question about the expected birthplace
    of the Messiah is naturally rendered in English as futurally oriented expectation:
    ''is to be born.'' This avoids an awkward present while preserving the sense of
    prophetic expectation.'
