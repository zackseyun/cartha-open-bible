id: MAT.2.14
reference: Matthew 2:14
source:
  edition: SBLGNT
  text: ὁ δὲ ἐγερθεὶς παρέλαβε τὸ παιδίον καὶ τὴν μητέρα αὐτοῦ νυκτὸς καὶ ἀνεχώρησεν
    εἰς Αἴγυπτον,
translation:
  text: So he got up, took the child and his mother during the night, and departed
    for Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Egypt.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: So
  alternatives:
  - Then
  - And
  lexicon: BDAG
  rationale: δέ here is a mild connective advancing the narrative. 'So' gives natural
    English flow while preserving the consequential progression from the prior command.
- source_word: ἐγερθεὶς
  chosen: got up
  alternatives:
  - having arisen
  - rose
  lexicon: BDAG
  rationale: The aorist participle denotes Joseph's immediate action upon receiving
    the instruction. 'Got up' is idiomatic modern English and fits the narrative sequence
    better than the more wooden 'having arisen.'
- source_word: παρέλαβε
  chosen: took
  alternatives:
  - took along
  - received
  lexicon: BDAG
  rationale: In this context παραλαμβάνω means to take someone along with oneself.
    'Took' is concise and natural; 'received' would be misleading in English.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the young child
  lexicon: BDAG
  rationale: παιδίον refers to a child; 'the child' is the plain sense and avoids
    importing emphasis not explicit in the Greek. 'Young child' is possible but unnecessary
    here.
- source_word: τὴν μητέρα αὐτοῦ
  chosen: his mother
  alternatives:
  - the child's mother
  - his mother
  lexicon: BDAG
  rationale: The genitive pronoun naturally refers to the child, not Joseph. English
    'his mother' clearly conveys this and mirrors the Greek phrasing.
- source_word: νυκτὸς
  chosen: during the night
  alternatives:
  - by night
  - at night
  lexicon: BDAG
  rationale: The genitive of time indicates the action occurred in the nighttime.
    'During the night' is clear modern English; 'by night' is more traditional but
    less natural for contemporary readers.
- source_word: ἀνεχώρησεν
  chosen: departed
  alternatives:
  - withdrew
  - left
  lexicon: BDAG
  rationale: ἀναχωρέω can mean depart or withdraw. Here it denotes leaving for another
    place in response to danger. 'Departed' preserves the purposeful movement without
    overinterpreting motive.
- source_word: εἰς Αἴγυπτον
  chosen: for Egypt
  alternatives:
  - to Egypt
  - into Egypt
  lexicon: BDAG
  rationale: εἰς marks movement toward a destination. 'For Egypt' is idiomatic with
    'departed'; 'to Egypt' would also be accurate.
