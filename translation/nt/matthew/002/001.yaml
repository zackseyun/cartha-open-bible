id: MAT.2.1
reference: Matthew 2:1
source:
  edition: SBLGNT
  text: Τοῦ δὲ Ἰησοῦ γεννηθέντος ἐν Βηθλέεμ τῆς Ἰουδαίας ἐν ἡμέραις Ἡρῴδου τοῦ βασιλέως,
    ἰδοὺ μάγοι ἀπὸ ἀνατολῶν παρεγένοντο εἰς Ἱεροσόλυμα
translation:
  text: Now after Jesus was born in Bethlehem of Judea in the days of Herod the king,
    behold, wise men from the east arrived in Jerusalem,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'magi.' The Greek term refers to learned men from the East, likely associated
      with astrology or court wisdom.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦ δὲ Ἰησοῦ γεννηθέντος
  chosen: Now after Jesus was born
  alternatives:
  - When Jesus was born
  - After Jesus had been born
  lexicon: BDAG
  rationale: The genitive absolute marks background circumstance prior to the main
    action. 'After Jesus was born' captures the temporal force naturally in English;
    'Now' renders δέ as a mild narrative transition.
- source_word: Βηθλέεμ τῆς Ἰουδαίας
  chosen: Bethlehem of Judea
  alternatives:
  - Bethlehem in Judea
  lexicon: BDAG
  rationale: A standard transliteration of the place name is appropriate for a proper
    noun. The genitive τῆς Ἰουδαίας is naturally rendered 'of Judea' to distinguish
    this Bethlehem from others.
- source_word: ἐν ἡμέραις Ἡρῴδου τοῦ βασιλέως
  chosen: in the days of Herod the king
  alternatives:
  - during the reign of King Herod
  - in the time of Herod the king
  lexicon: BDAG
  rationale: This idiom is common for locating events historically. 'In the days of'
    preserves the biblical narrative flavor without becoming archaic, and 'Herod the
    king' follows the Greek order and apposition.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - suddenly
  lexicon: BDAG
  rationale: ἰδού is a discourse marker drawing attention to what follows. 'Behold'
    preserves the markedness and narrative force better than flatter modern options,
    while remaining understandable.
- source_word: μάγοι
  chosen: wise men
  alternatives:
  - magi
  lexicon: BDAG
  rationale: μάγοι refers to eastern astrologer-sages or court experts. 'Wise men'
    is the most accessible English rendering in this context; 'magi' is more formally
    precise but less immediately clear, so it is preserved in a footnote.
- source_word: ἀπὸ ἀνατολῶν
  chosen: from the east
  alternatives:
  - from the eastlands
  - from eastern regions
  lexicon: BDAG
  rationale: The plural noun literally means 'from the east' or 'from eastern regions.'
    Idiomatic English prefers the singular collective expression 'from the east.'
- source_word: παρεγένοντο
  chosen: arrived
  alternatives:
  - came
  - appeared
  lexicon: BDAG
  rationale: The verb indicates arrival or coming on the scene. 'Arrived' fits well
    with the destination phrase 'in Jerusalem' and makes the motion explicit.
- source_word: εἰς Ἱεροσόλυμα
  chosen: in Jerusalem
  alternatives:
  - to Jerusalem
  lexicon: BDAG
  rationale: Although εἰς often means 'to,' with a verb of arrival English idiom commonly
    uses 'arrived in Jerusalem.' This preserves the sense while sounding natural.
