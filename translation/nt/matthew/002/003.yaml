theological_decisions:
- issue: Scope of πᾶσα Ἱεροσόλυμα
  chosen_reading: A corporate/metonymic reference to the city and its populace being
    disturbed along with Herod
  alternative_readings:
  - A hyperbolic statement meaning many in Jerusalem
  - A reference especially to Jerusalem's leadership circles
  rationale: The Greek names the city as a whole, a common metonymy. The translation
    preserves that wording rather than narrowing it to leaders or expanding it interpretively
    to 'people of Jerusalem.' This maintains the narrative tension without importing
    a more specific sociological claim than the text states.
  doctrine_reference: Preserve theological tension rather than resolve it
