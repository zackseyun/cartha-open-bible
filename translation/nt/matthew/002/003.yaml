id: MAT.2.3
reference: Matthew 2:3
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ⸂ὁ βασιλεὺς Ἡρῴδης⸃ ἐταράχθη καὶ πᾶσα Ἱεροσόλυμα μετ’ αὐτοῦ,
translation:
  text: When King Herod heard this, he was troubled, and all Jerusalem with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was disturbed.'
    reason: lexical_alternative
  - marker: b
    text: '''All Jerusalem'' uses the city name for its inhabitants; it may be a general
      or hyperbolic way of describing the city''s shared alarm.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  chosen: heard this
  alternatives:
  - having heard
  - when he heard
  lexicon: BDAG
  rationale: Aorist participle of ἀκούω, functioning temporally. English idiom prefers
    an explicit temporal clause or smooth finite rendering. 'Heard this' supplies
    the implied object from the immediate context (the report of the magi) and avoids
    an awkward absolute 'having heard.'
- source_word: δὲ
  chosen: when
  alternatives:
  - now
  - and
  - but
  lexicon: BDAG
  rationale: δέ is a mild connective, often transitional. In combination with the
    participle ἀκούσας, its discourse function is adequately represented by the temporal
    'when' in English rather than a separate conjunction.
- source_word: ὁ βασιλεὺς Ἡρῴδης
  chosen: King Herod
  alternatives:
  - Herod the king
  lexicon: BDAG
  rationale: Both are accurate, but 'King Herod' is more natural modern English while
    preserving the titular force of βασιλεύς and the proper name Ἡρῴδης by standard
    transliteration.
- source_word: ἐταράχθη
  chosen: was troubled
  alternatives:
  - was disturbed
  - was agitated
  lexicon: BDAG
  rationale: Passive aorist of ταράσσω, denoting inner disturbance or alarm. 'Was
    troubled' is natural, readable English and preserves the emotional force without
    overinterpreting the degree.
- source_word: πᾶσα Ἱεροσόλυμα
  chosen: all Jerusalem
  alternatives:
  - the whole of Jerusalem
  - all the people of Jerusalem
  lexicon: BDAG
  rationale: The phrase is a city-name used corporately for its inhabitants. 'All
    Jerusalem' preserves the metonymy of the Greek and avoids adding 'people' into
    the main text, though that sense is implicit.
- source_word: μετ’ αὐτοῦ
  chosen: with him
  alternatives:
  - along with him
  lexicon: BDAG
  rationale: Straightforward rendering of μετά with the genitive. 'With him' preserves
    the association between Herod's disturbance and that of Jerusalem.
