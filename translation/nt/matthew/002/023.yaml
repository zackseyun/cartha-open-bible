theological_decisions:
- issue: Nature of Matthew's fulfillment citation in a verse without a single exact Old Testament source
  chosen_reading: Render the formula straightforwardly as a plural-prophets summary citation without identifying a specific source in the main text.
  alternative_readings:
  - Interpret as an allusion to Isaiah 11:1 (נֵצֶר, 'branch')
  - Interpret as a thematic summary of prophetic expectations about Messiah's lowliness and despised status
  - Render Ναζωραῖος as 'Nazirite'
  rationale: The Greek explicitly says 'through the prophets' (plural), which suggests a composite or thematic prophetic witness rather than a quotation from one named text. The main text should preserve Matthew's wording without importing a speculative identification. 'Nazirite' is rejected because Ναζωραῖος refers to association with Nazareth, not the distinct term for a Nazirite vow.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Rendering of Ναζωραῖος
  chosen_reading: Nazarene
  alternative_readings:
  - Nazorean
  rationale: The term is best rendered as a designation tied to Nazareth in this context. Because the exact prophetic background is debated and some scholars prefer 'Nazorean' to preserve formal ambiguity, that alternative is preserved in a footnote rather than resolved dogmatically in the main text.
  doctrine_reference: Translation philosophy §3
