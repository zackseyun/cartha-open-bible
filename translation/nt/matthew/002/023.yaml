id: MAT.2.23
reference: Matthew 2:23
source:
  edition: SBLGNT
  text: καὶ ἐλθὼν κατῴκησεν εἰς πόλιν λεγομένην Ναζαρέτ, ὅπως πληρωθῇ τὸ ῥηθὲν διὰ τῶν προφητῶν ὅτι Ναζωραῖος κληθήσεται.
translation:
  text: 'And he came and lived in a city called Nazareth[a], so that what was spoken through the prophets might be fulfilled: “He will be called a Nazarene.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Nazorean.” The exact prophetic background of “He will be called a Nazarene” is debated; Matthew may be summarizing themes from the prophets rather than quoting one specific text.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  chosen: he came
  alternatives:
  - having come
  - after coming
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb, naturally rendered in English as a finite verb coordinated with the main action. 'He came and lived' is idiomatic and preserves sequence without awkwardness.
- source_word: κατῴκησεν
  chosen: lived
  alternatives:
  - dwelt
  - settled
  - resided
  lexicon: BDAG
  rationale: κατοικέω denotes taking up residence. 'Lived' is clear modern English; 'dwelt' is archaic, while 'settled' may overemphasize permanence beyond the verb itself.
- source_word: εἰς πόλιν λεγομένην Ναζαρέτ
  chosen: in a city called Nazareth
  alternatives:
  - into a city called Nazareth
  - in the town called Nazareth
  lexicon: BDAG
  rationale: Although εἰς is literally 'into,' with κατοικέω English idiom prefers 'lived in.' πόλις can be 'city' or 'town'; 'city' follows the Greek term directly, while remaining natural in English.
- source_word: ὅπως
  chosen: so that
  alternatives:
  - in order that
  lexicon: BDAG
  rationale: Introduces purpose/result in Matthew's fulfillment formula. 'So that' is natural and preserves the teleological sense.
- source_word: πληρωθῇ
  chosen: might be fulfilled
  alternatives:
  - would be fulfilled
  - should be fulfilled
  lexicon: BDAG
  rationale: Aorist passive subjunctive after ὅπως is well represented by 'might be fulfilled' in English, preserving the fulfillment formula without overstating modality.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been spoken
  lexicon: BDAG
  rationale: Standard Matthean formula. 'What was spoken' is idiomatic and accurately reflects the articular participle.
- source_word: διὰ τῶν προφητῶν
  chosen: through the prophets
  alternatives:
  - by the prophets
  lexicon: BDAG
  rationale: διά with genitive commonly indicates agency/instrumentality. 'Through the prophets' preserves the sense that God spoke by means of prophetic witnesses, fitting Matthew's formula and avoiding flattening the mediating nuance.
- source_word: Ναζωραῖος
  chosen: Nazarene
  alternatives:
  - Nazorean
  lexicon: BDAG
  rationale: Standard English rendering for the inhabitant/designation associated with Nazareth. 'Nazorean' is more formally closer to the Greek form and may preserve a distinction from other related terms, but 'Nazarene' is the established and more readable English equivalent here.
- source_word: κληθήσεται
  chosen: he will be called
  alternatives:
  - he will be named
  lexicon: BDAG
  rationale: Future passive of καλέω in citation formula is naturally 'will be called.' This preserves both the passive form and the prophetic style.
