theological_decisions:
- issue: Rendering προσκυνῆσαι in relation to the child Jesus
  chosen_reading: to pay him homage
  alternative_readings:
  - to worship him
  rationale: The term can bear either royal homage or worship depending on context.
    Here the speakers are seeking the newborn 'king of the Jews,' so the immediate
    semantic frame is royal honor. Rendering it as 'pay him homage' preserves the
    narrative's lexical range and avoids importing a fuller theological conclusion
    into this verse alone, while not denying the broader Matthean witness to Jesus'
    identity.
  doctrine_reference: Preserve theological tension rather than resolve it.
