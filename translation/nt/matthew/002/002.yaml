id: MAT.2.2
reference: Matthew 2:2
source:
  edition: SBLGNT
  text: λέγοντες· Ποῦ ἐστιν ὁ τεχθεὶς βασιλεὺς τῶν Ἰουδαίων; εἴδομεν γὰρ αὐτοῦ τὸν
    ἀστέρα ἐν τῇ ἀνατολῇ καὶ ἤλθομεν προσκυνῆσαι αὐτῷ.
translation:
  text: saying, “Where is the one who has been born king of the Jews? For we saw his
    star in the east and have come to pay him homage.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “at its rising.” The Greek phrase ἐν τῇ ἀνατολῇ can mean “in the east”
      or refer to the star’s rising.
    reason: alternative_reading
  - marker: b
    text: Or “to worship him.” The Greek verb can denote either homage to a king or
      worship, depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - asking
  - they were saying
  lexicon: BDAG
  rationale: Present participle introducing the content of the magi's speech. 'Saying'
    is the most direct and natural narrative rendering in English.
- source_word: Ποῦ ἐστιν
  chosen: Where is
  alternatives:
  - Where can he be
  lexicon: BDAG
  rationale: A straightforward locative question; no need to soften or expand beyond
    the Greek.
- source_word: ὁ τεχθεὶς
  chosen: the one who has been born
  alternatives:
  - he who was born
  - the newborn
  lexicon: BDAG
  rationale: The articular aorist passive participle of τίκτω functions substantivally.
    'The one who has been born' preserves both the participial force and the focus
    on birth without adding the nuance of infancy implied by 'newborn'.
- source_word: βασιλεὺς τῶν Ἰουδαίων
  chosen: king of the Jews
  alternatives:
  - the Jews' king
  lexicon: BDAG
  rationale: This is the standard and natural rendering of the genitival royal title.
    It preserves the political and messianic force of the expression.
- source_word: εἴδομεν γὰρ
  chosen: For we saw
  alternatives:
  - because we saw
  - for we have seen
  lexicon: BDAG
  rationale: γάρ gives the reason for their question. The aorist εἴδομεν is naturally
    rendered as simple past here in narrative sequence.
- source_word: αὐτοῦ τὸν ἀστέρα
  chosen: his star
  alternatives:
  - the star belonging to him
  - his rising star
  lexicon: BDAG
  rationale: The genitive pronoun is possessive. 'His star' is the most natural English
    rendering and leaves unspecified the exact nature of the astronomical sign, as
    in the Greek.
- source_word: ἐν τῇ ἀνατολῇ
  chosen: in the east
  alternatives:
  - at its rising
  - in the rising
  lexicon: BDAG
  rationale: ἀνατολή can denote either 'east' as a geographical direction or 'rising'
    in an astronomical sense. The traditional and contextually plausible rendering
    is 'in the east,' but the alternative is significant enough to preserve in a footnote
    because the phrase is genuinely ambiguous.
- source_word: ἤλθομεν
  chosen: have come
  alternatives:
  - came
  lexicon: BDAG
  rationale: 'English present perfect fits the discourse situation: their arrival
    is a completed action with present relevance as they speak. This is a natural
    optimal-equivalence rendering of the aorist in direct speech.'
- source_word: προσκυνῆσαι αὐτῷ
  chosen: to pay him homage
  alternatives:
  - to worship him
  - to bow down before him
  lexicon: BDAG
  rationale: προσκυνέω can denote reverence ranging from prostration/homage before
    a ruler to worship offered to God. In this narrative moment, 'pay him homage'
    preserves the act of royal reverence without prematurely resolving the full christological
    weight into explicit divine worship, while allowing later Matthean context to
    develop that significance.
