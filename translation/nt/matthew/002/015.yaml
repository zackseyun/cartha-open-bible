id: MAT.2.15
reference: Matthew 2:15
source:
  edition: SBLGNT
  text: καὶ ἦν ἐκεῖ ἕως τῆς τελευτῆς Ἡρῴδου· ἵνα πληρωθῇ τὸ ῥηθὲν ⸀ὑπὸ κυρίου διὰ τοῦ προφήτου λέγοντος· Ἐξ Αἰγύπτου ἐκάλεσα τὸν υἱόν μου.
translation:
  text: and was there until the death of Herod[a], so that what was spoken by the Lord through the prophet might be fulfilled, saying[c][b], “Out of Egypt I called my son.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “From Egypt I called my son.”
    reason: lexical_alternative
  - marker: b
    text: Matthew cites Hosea 11:1, originally referring to Israel as God's son; here he presents Jesus as fulfilling that Scripture.
    reason: cross_reference
  - marker: c
    text: Or “what had been spoken by the Lord through the prophet.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν ἐκεῖ
  chosen: was there
  alternatives:
  - remained there
  - stayed there
  lexicon: BDAG
  rationale: The imperfect of εἰμί with ἐκεῖ is naturally rendered 'was there.' 'Remained' or 'stayed' are possible contextual expansions, but the Greek itself is simpler and does not require the added nuance.
- source_word: ἕως τῆς τελευτῆς Ἡρῴδου
  chosen: until the death of Herod
  alternatives:
  - until Herod died
  - until the end of Herod
  lexicon: BDAG
  rationale: τελευτή here denotes death/end of life. 'Until the death of Herod' is both accurate and idiomatic, preserving the nominal construction of the Greek more closely than the verbal paraphrase 'until Herod died.'
- source_word: ἵνα πληρωθῇ
  chosen: so that ... might be fulfilled
  alternatives:
  - in order that ... might be fulfilled
  - to fulfill
  lexicon: BDAG
  rationale: Matthew regularly uses ἵνα + passive of πληρόω in fulfillment formulas. 'So that ... might be fulfilled' preserves the purposive/resultative force without flattening it into a bare infinitive.
- source_word: τὸ ῥηθὲν
  chosen: what was spoken
  alternatives:
  - the thing spoken
  - what had been said
  lexicon: BDAG
  rationale: The articular participle is best rendered idiomatically as 'what was spoken.' This preserves the passive sense and avoids awkward literalism.
- source_word: ὑπὸ κυρίου
  chosen: by the Lord
  alternatives:
  - by the Lord God
  lexicon: BDAG
  rationale: κύριος is rendered 'Lord' per the project's default for Kyrios. The phrase identifies the ultimate speaker of the prophetic word. Adding 'God' would go beyond the Greek.
- source_word: διὰ τοῦ προφήτου
  chosen: through the prophet
  alternatives:
  - by the prophet
  lexicon: BDAG
  rationale: διά with genitive commonly marks agency/instrumentality as mediated agency. 'Through the prophet' preserves the distinction between the Lord as ultimate source and the prophet as human instrument.
- source_word: λέγοντος
  chosen: saying
  alternatives:
  - which says
  - when he said
  lexicon: BDAG
  rationale: The participle introduces the quotation in standard narrative style. 'Saying' is concise and idiomatic.
- source_word: Ἐξ Αἰγύπτου
  chosen: Out of Egypt
  alternatives:
  - From Egypt
  lexicon: BDAG
  rationale: Both are possible for ἐκ/ἐξ. 'Out of Egypt' better preserves the imagery and matches the citation's traditional force while remaining natural English.
- source_word: ἐκάλεσα
  chosen: I called
  alternatives:
  - I summoned
  lexicon: BDAG
  rationale: καλέω here means 'call' in the sense of calling forth/out, echoing Hosea 11:1. 'Summoned' is possible but too narrow and less intertextually recognizable.
- source_word: τὸν υἱόν μου
  chosen: my son
  alternatives:
  - my child
  lexicon: BDAG
  rationale: υἱός specifically means 'son' here, and the singular filial language is important for the Hosea citation and Matthew's christological application. 'Child' would weaken the lexical and theological connection.
