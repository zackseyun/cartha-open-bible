theological_decisions:
- issue: Fulfillment formula and prophetic citation of Hosea 11:1
  chosen_reading: The verse is translated to preserve Matthew's claim that Jesus' return from Egypt fulfills what the Lord spoke through the prophet, without narrowing the mechanism of fulfillment beyond the text itself.
  alternative_readings:
  - Direct predictive prophecy only
  - Typological recapitulation of Israel's sonship fulfilled in the Messiah
  rationale: Matthew's wording explicitly presents fulfillment, but the translation should not force a specific theory of fulfillment into the English text. Retaining the formal fulfillment language preserves the theological tension between prophetic citation and typological application.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: κύριος in the fulfillment formula
  chosen_reading: Lord
  alternative_readings:
  - the LORD
  rationale: The Greek text reads κυρίου, and the project's default rendering for κύριος is 'Lord.' Although the quotation ultimately derives from Israel's Scriptures and may evoke the divine name in Hebrew context, the Greek here does not itself use a special form requiring 'the LORD' in the main text.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
