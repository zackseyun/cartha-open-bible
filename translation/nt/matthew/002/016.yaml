id: MAT.2.16
reference: Matthew 2:16
source:
  edition: SBLGNT
  text: Τότε Ἡρῴδης ἰδὼν ὅτι ἐνεπαίχθη ὑπὸ τῶν μάγων ἐθυμώθη λίαν, καὶ ἀποστείλας
    ἀνεῖλεν πάντας τοὺς παῖδας τοὺς ἐν Βηθλέεμ καὶ ἐν πᾶσι τοῖς ὁρίοις αὐτῆς ἀπὸ διετοῦς
    καὶ κατωτέρω, κατὰ τὸν χρόνον ὃν ἠκρίβωσεν παρὰ τῶν μάγων.
translation:
  text: Then Herod, seeing that he had been tricked by the magi, became very angry,
    and he sent men and killed all the boys in Bethlehem and in all its surrounding
    districts, from two years old and under, according to the time that he had determined
    from the magi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'had been mocked' by the magi.
    reason: lexical_alternative
  - marker: b
    text: Traditionally, 'wise men.' The Greek term is magi, referring to eastern
      sage-astrologers.
    reason: cultural_note
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Standard temporal connective introducing the next event in sequence;
    'Then' is natural and sufficiently formal.
- source_word: Ἡρῴδης
  chosen: Herod
  rationale: Personal name is transliterated by standard English convention per translation
    philosophy.
- source_word: ἰδὼν ὅτι
  chosen: seeing that
  alternatives:
  - when he saw that
  - realizing that
  lexicon: BDAG
  rationale: The participle plus ὅτι clause expresses Herod's perception of a fact.
    'Seeing that' preserves the causal-perceptive force without over-paraphrase.
- source_word: ἐνεπαίχθη
  chosen: had been tricked
  alternatives:
  - had been mocked
  - had been outwitted
  - had been deceived
  lexicon: BDAG
  rationale: ἐμπαίζω literally can mean 'mock' or 'ridicule,' but in this context
    the sense is that the magi made a fool of Herod by not returning. 'Tricked' communicates
    the contextual force clearly in modern English. The more literal 'mocked' is preserved
    in a footnote.
- source_word: ὑπὸ τῶν μάγων
  chosen: by the magi
  alternatives:
  - by the wise men
  lexicon: BDAG
  rationale: μάγοι refers to eastern astrologer-sages; 'magi' preserves the specific
    term better than the interpretive traditional 'wise men.'
- source_word: ἐθυμώθη λίαν
  chosen: became very angry
  alternatives:
  - was enraged
  - became furious
  lexicon: BDAG
  rationale: The verb denotes becoming angry, intensified by λίαν. 'Became very angry'
    is transparent and avoids adding emotional color beyond the Greek.
- source_word: ἀποστείλας
  chosen: he sent men
  alternatives:
  - having sent
  - sending
  lexicon: BDAG
  rationale: The aorist participle is attendant to the main verb and implies dispatching
    agents to carry out the killing. English requires an object for clarity; 'men'
    is implied by the action and avoids a wooden 'having sent.' This is a context-driven
    expansion for natural English.
- source_word: ἀνεῖλεν
  chosen: killed
  alternatives:
  - put to death
  - slew
  lexicon: BDAG
  rationale: ἀναιρέω here means to kill or do away with. 'Killed' is direct, contemporary,
    and accurate.
- source_word: πάντας τοὺς παῖδας
  chosen: all the boys
  alternatives:
  - all the children
  - all the male children
  lexicon: BDAG
  rationale: In this context παῖδας refers specifically to male children, as the narrative
    concerns the search for a boy and the age specification follows. 'Boys' is concise
    and accurate; 'children' would be too broad.
- source_word: τοὺς ἐν Βηθλέεμ καὶ ἐν πᾶσι τοῖς ὁρίοις αὐτῆς
  chosen: in Bethlehem and in all its surrounding districts
  alternatives:
  - in Bethlehem and in all its vicinity
  - in Bethlehem and in all its borders
  lexicon: BDAG
  rationale: ὅρια can mean borders, region, or surrounding territory. 'Surrounding
    districts' communicates the inhabited area around Bethlehem more naturally than
    the literal 'borders.'
- source_word: ἀπὸ διετοῦς καὶ κατωτέρω
  chosen: from two years old and under
  alternatives:
  - two years old and younger
  - from the age of two and below
  lexicon: BDAG
  rationale: This idiom marks the upper age limit inclusively. 'From two years old
    and under' is idiomatic and precise.
- source_word: κατὰ τὸν χρόνον
  chosen: according to the time
  alternatives:
  - in keeping with the time
  - based on the time
  lexicon: BDAG
  rationale: κατά with the accusative here indicates conformity to or in accordance
    with a time reference. 'According to the time' is suitably close to the Greek.
- source_word: ὃν ἠκρίβωσεν
  chosen: that he had determined
  alternatives:
  - that he had ascertained exactly
  - that he had learned precisely
  lexicon: BDAG
  rationale: ἀκριβόω means to learn or determine accurately. 'Determined' reads naturally
    in English while preserving the idea of careful ascertainment.
- source_word: παρὰ τῶν μάγων
  chosen: from the magi
  alternatives:
  - from the wise men
  lexicon: BDAG
  rationale: παρά with the genitive indicates source; 'from the magi' is straightforward
    and consistent with the earlier rendering.
