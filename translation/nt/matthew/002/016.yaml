theological_decisions:
- issue: Rendering μάγοι
  chosen_reading: magi
  alternative_readings:
  - wise men
  rationale: This is not a major doctrinal dispute, but 'magi' better reflects the
    historical-cultural identity of the visitors without importing later traditional
    imagery. The familiar alternative is preserved in a footnote for reader orientation.
  doctrine_reference: Translation philosophy §1, §6
- issue: Rendering ἐνεπαίχθη
  chosen_reading: had been tricked
  alternative_readings:
  - had been mocked
  rationale: The contextual sense is that Herod was made a fool of by the magi's failure
    to return. 'Tricked' best communicates the event in readable modern English, while
    the more literal lexical option 'mocked' is preserved in a footnote to maintain
    auditability and lexical transparency.
  doctrine_reference: Translation philosophy §1, §6
