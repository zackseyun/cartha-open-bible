id: MAT.2.19
reference: Matthew 2:19
source:
  edition: SBLGNT
  text: Τελευτήσαντος δὲ τοῦ Ἡρῴδου ἰδοὺ ἄγγελος κυρίου ⸂φαίνεται κατ’ ὄναρ⸃ τῷ Ἰωσὴφ
    ἐν Αἰγύπτῳ
translation:
  text: But after Herod died, behold, an angel of the Lord appears in a dream to Joseph
    in Egypt.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the angel of the Lord.' The Greek here reads 'an angel of the Lord'
      without the article before 'angel.'
    reason: alternative_reading
lexical_decisions:
- source_word: Τελευτήσαντος
  chosen: after ... died
  alternatives:
  - after ... had died
  - when ... died
  lexicon: BDAG
  rationale: Aorist participle in a genitive absolute with τοῦ Ἡρῴδου; rendered temporally
    as 'after Herod died' in natural English. 'Died' is clearer and more idiomatic
    than a more wooden 'having come to an end.'
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: δέ marks narrative transition. 'But' preserves a mild contrast/continuation
    from the prior episode better than 'And,' while remaining natural in English narrative.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Matthew uses ἰδού as a vivid narrative attention-marker. 'Behold' preserves
    the literary force and solemnity better than colloquial alternatives.
- source_word: ἄγγελος κυρίου
  chosen: an angel of the Lord
  alternatives:
  - the angel of the Lord
  lexicon: BDAG
  rationale: The noun lacks the article in Greek here, so 'an angel of the Lord' is
    the most straightforward rendering. κύριος follows the doctrinal default 'Lord.'
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: BDAG
  rationale: 'In the genitive construction ἄγγελος κυρίου, idiomatic English normally
    supplies the article: ''an angel of the Lord.'' This also follows the default
    rendering for κύριος as a title.'
- source_word: φαίνεται
  chosen: appears
  alternatives:
  - appeared
  - is seen
  lexicon: BDAG
  rationale: Present middle/passive indicative is often used as a historical present
    in narrative. English can preserve the vividness with 'appears' rather than flattening
    to past tense.
- source_word: κατ’ ὄναρ
  chosen: in a dream
  alternatives:
  - by a dream
  - while dreaming
  lexicon: BDAG
  rationale: This idiom in Matthew denotes revelation received in a dream. 'In a dream'
    is the standard, natural equivalent.
- source_word: τῷ Ἰωσὴφ
  chosen: to Joseph
  alternatives:
  - to Yoseph
  lexicon: BDAG
  rationale: Dative indirect object. Personal names are transliterated by standard
    English convention; 'Joseph' is the established transliteration.
- source_word: ἐν Αἰγύπτῳ
  chosen: in Egypt
  lexicon: BDAG
  rationale: Simple locative phrase indicating Joseph's location at the time of the
    dream.
