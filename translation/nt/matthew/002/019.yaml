theological_decisions:
- issue: Rendering of κύριος in ἄγγελος κυρίου
  chosen_reading: the Lord
  alternative_readings:
  - Lord
  - Master
  rationale: The doctrine file specifies κύριος should normally be rendered 'Lord.'
    In this idiomatic phrase, English naturally reads 'an angel of the Lord.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Article with ἄγγελος
  chosen_reading: an angel of the Lord
  alternative_readings:
  - the angel of the Lord
  rationale: Because Greek lacks the article before ἄγγελος here, the main text uses
    the indefinite form. The alternative is worth preserving because 'the angel of
    the Lord' can carry intertextual and theological associations in English tradition
    that the Greek here does not require.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
