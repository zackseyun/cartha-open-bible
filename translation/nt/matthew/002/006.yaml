theological_decisions:
- issue: Royal versus pastoral nuance in the description of the coming figure
  chosen_reading: Retain both dimensions by rendering ἡγούμενος as 'a ruler' and ποιμανεῖ
    as 'will shepherd.'
  alternative_readings:
  - Render both terms in political language ('leader' / 'will rule')
  - Render both terms in pastoral language
  rationale: The verse combines governance and shepherding imagery in a messianic
    citation. Preserving both avoids collapsing the theological richness into only
    kingship or only pastoral care.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather
    than resolve it.
