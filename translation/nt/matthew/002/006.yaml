id: MAT.2.6
reference: Matthew 2:6
source:
  edition: SBLGNT
  text: Καὶ σύ, Βηθλέεμ γῆ Ἰούδα, οὐδαμῶς ἐλαχίστη εἶ ἐν τοῖς ἡγεμόσιν Ἰούδα· ἐκ σοῦ
    γὰρ ἐξελεύσεται ἡγούμενος, ὅστις ποιμανεῖ τὸν λαόν μου τὸν Ἰσραήλ.
translation:
  text: And you, Bethlehem, land of Judah, are by no means least among the rulers
    of Judah; for from you will come a ruler who will shepherd my people Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will come forth' (more literally, 'will go out').
    reason: lexical_alternative
  - marker: b
    text: '''Will shepherd'' can also carry the sense ''will rule,'' preserving royal
      leadership imagery alongside pastoral care.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γῆ
  chosen: land
  alternatives:
  - district
  - territory
  lexicon: BDAG
  rationale: In apposition to 'Bethlehem' and followed by the genitive 'of Judah,'
    γῆ here denotes the region/land associated with Judah rather than soil or earth.
    'Land' is natural English and preserves the geographic sense.
- source_word: οὐδαμῶς
  chosen: by no means
  alternatives:
  - certainly not
  - not at all
  lexicon: BDAG
  rationale: The adverb strongly negates the following predicate. 'By no means' preserves
    the emphatic force better than a simple 'not.'
- source_word: ἐλαχίστη
  chosen: least
  alternatives:
  - smallest
  - most insignificant
  lexicon: BDAG
  rationale: The superlative concerns rank or significance in context. 'Least' is
    idiomatic with 'among' and echoes the contrast with Bethlehem's apparent smallness
    without over-paraphrasing.
- source_word: ἡγεμόσιν
  chosen: rulers
  alternatives:
  - governors
  - leaders
  - princes
  lexicon: BDAG
  rationale: The plural dative refers to ruling figures or clans within Judah in this
    citation context. 'Rulers' is broad enough to preserve the governing sense without
    forcing a narrower political office such as 'governors.'
- source_word: ἐξελεύσεται
  chosen: will come
  alternatives:
  - will come forth
  - will go out
  lexicon: BDAG
  rationale: The future middle of ἐξέρχομαι literally means 'will come/go out,' but
    in English 'will come' communicates emergence from Bethlehem naturally. The fuller
    literal option is preserved in a footnote.
- source_word: ἡγούμενος
  chosen: a ruler
  alternatives:
  - one who leads
  - leader
  lexicon: BDAG
  rationale: As a substantival participle, it denotes the coming person's governing
    role. 'A ruler' fits the royal-messianic context and reads naturally in English.
- source_word: ποιμανεῖ
  chosen: will shepherd
  alternatives:
  - will tend
  - will rule
  lexicon: BDAG
  rationale: ποιμαίνω literally means 'to shepherd' and can extend metaphorically
    to ruling. Because the shepherd imagery is theologically and intertextually important,
    the main text keeps 'shepherd' rather than flattening it to 'rule.'
- source_word: λαόν μου τὸν Ἰσραήλ
  chosen: my people Israel
  alternatives:
  - my people, Israel
  - the people of me, Israel
  lexicon: BDAG
  rationale: This preserves the covenantal phrase straightforwardly. The appositional
    relation is clear in English without adding words beyond the Greek.
