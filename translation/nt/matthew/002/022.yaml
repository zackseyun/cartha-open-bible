theological_decisions:
- issue: Whether to make the divine source of the warning explicit in χρηματισθείς
  chosen_reading: Kept the passive 'after being warned' in the main text without adding
    'by God.'
  alternative_readings:
  - after being warned by God
  - after receiving divine instruction
  rationale: The verb in Matthew commonly implies divine communication, but the Greek
    here leaves the agent implicit. To preserve the text's wording and avoid importing
    more than the verse states, the main text retains the passive; the divine implication
    is acknowledged in the lexical rationale.
  doctrine_reference: Translation philosophy items 1 and 3
