id: MAT.2.22
reference: Matthew 2:22
source:
  edition: SBLGNT
  text: ἀκούσας δὲ ὅτι Ἀρχέλαος ⸀βασιλεύει τῆς Ἰουδαίας ἀντὶ ⸂τοῦ πατρὸς αὐτοῦ Ἡρῴδου⸃
    ἐφοβήθη ἐκεῖ ἀπελθεῖν· χρηματισθεὶς δὲ κατ’ ὄναρ ἀνεχώρησεν εἰς τὰ μέρη τῆς Γαλιλαίας,
translation:
  text: But when he heard that Archelaus was reigning over Judea in place of his father
    Herod, he was afraid to go there. And after being warned in a dream, he withdrew
    to the regions of Galilee,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been warned'; the verb commonly implies divine warning or instruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  chosen: when he heard
  alternatives:
  - having heard
  - after hearing
  lexicon: BDAG
  rationale: Aorist participle introducing the circumstance prior to the main action.
    'When he heard' is natural English and preserves the temporal force without sounding
    wooden.
- source_word: δὲ
  chosen: But
  alternatives:
  - Now
  - And
  lexicon: BDAG
  rationale: Marks a development or contrast in the narrative. 'But' fits the shift
    from the prior intention to the new obstacle.
- source_word: βασιλεύει
  chosen: was reigning
  alternatives:
  - was king
  - ruled
  lexicon: BDAG
  rationale: The present tense in indirect discourse is well represented by the English
    progressive here. 'Was reigning' preserves the royal nuance of βασιλεύω better
    than the flatter 'ruled.'
- source_word: τῆς Ἰουδαίας
  chosen: over Judea
  alternatives:
  - of Judea
  - in Judea
  lexicon: BDAG
  rationale: With βασιλεύω plus genitive, English idiom is best expressed as reigning
    'over' a territory.
- source_word: ἀντὶ τοῦ πατρὸς αὐτοῦ Ἡρῴδου
  chosen: in place of his father Herod
  alternatives:
  - instead of his father Herod
  - succeeding his father Herod
  lexicon: BDAG
  rationale: ἀντί here denotes succession or replacement. 'In place of' is clear,
    natural, and close to the Greek.
- source_word: ἐφοβήθη
  chosen: he was afraid
  alternatives:
  - he feared
  lexicon: BDAG
  rationale: Passive-form deponent with straightforward sense. 'He was afraid' is
    more idiomatic contemporary English than 'he feared' while preserving the meaning.
- source_word: ἐκεῖ ἀπελθεῖν
  chosen: to go there
  alternatives:
  - to depart there
  - to go away there
  lexicon: BDAG
  rationale: Infinitive complement to ἐφοβήθη. 'Go there' conveys the destination
    sense naturally in English.
- source_word: χρηματισθεὶς
  chosen: after being warned
  alternatives:
  - having been warned
  - after receiving divine instruction
  lexicon: BDAG
  rationale: In Matthew this verb commonly refers to divine warning or instruction.
    'After being warned' is concise and preserves the passive sense; the divine source
    is implied by context and made explicit in the rationale rather than over-translated
    into the main text.
- source_word: κατ’ ὄναρ
  chosen: in a dream
  alternatives:
  - through a dream
  lexicon: BDAG
  rationale: Standard Matthean expression for revelatory warning received during sleep.
    'In a dream' is the normal English rendering.
- source_word: ἀνεχώρησεν
  chosen: he withdrew
  alternatives:
  - he departed
  - he went away
  - he retreated
  lexicon: BDAG
  rationale: Matthew often uses ἀναχωρέω for purposeful departure in response to danger
    or circumstance. 'Withdrew' preserves that nuance better than the more neutral
    'departed.'
- source_word: εἰς τὰ μέρη τῆς Γαλιλαίας
  chosen: to the regions of Galilee
  alternatives:
  - into the region of Galilee
  - to the parts of Galilee
  lexicon: BDAG
  rationale: Plural μέρη is best reflected by 'regions,' indicating an area or district
    rather than a single point destination.
