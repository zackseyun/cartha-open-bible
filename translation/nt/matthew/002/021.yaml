id: MAT.2.21
reference: Matthew 2:21
source:
  edition: SBLGNT
  text: ὁ δὲ ἐγερθεὶς παρέλαβε τὸ παιδίον καὶ τὴν μητέρα αὐτοῦ καὶ ⸀εἰσῆλθεν εἰς γῆν
    Ἰσραήλ.
translation:
  text: So he rose, took the child and his mother, and entered the land of Israel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  chosen: So
  alternatives:
  - Then
  - And
  lexicon: BDAG
  rationale: δέ here marks narrative progression rather than strong contrast. 'So'
    gives natural English flow while preserving the connective force.
- source_word: ἐγερθεὶς
  chosen: rose
  alternatives:
  - got up
  - having arisen
  lexicon: BDAG
  rationale: The aorist passive participle of ἐγείρω in this context functions intransitively
    ('having gotten up'). 'Rose' is concise, natural, and preserves the sequential
    action without over-literal participial awkwardness.
- source_word: παρέλαβε
  chosen: took
  alternatives:
  - took along
  - received
  lexicon: BDAG
  rationale: παραλαμβάνω here means to take along with oneself. 'Took' is idiomatic
    in English narrative and fits the repeated Matthean phrasing in this infancy account.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the young child
  lexicon: BDAG
  rationale: παιδίον denotes a child; 'the child' is the plain and natural rendering.
    'Young child' is possible but adds specificity not required by the Greek.
- source_word: τὴν μητέρα αὐτοῦ
  chosen: his mother
  alternatives:
  - the child's mother
  - his mother
  lexicon: BDAG
  rationale: The possessive αὐτοῦ most naturally refers to the child. 'His mother'
    is concise and reflects the Greek construction.
- source_word: εἰσῆλθεν
  chosen: entered
  alternatives:
  - went into
  - came into
  lexicon: BDAG
  rationale: εἰσέρχομαι means 'enter/go into.' 'Entered' is slightly more formal but
    still natural and matches the directional phrase that follows.
- source_word: εἰς γῆν Ἰσραήλ
  chosen: the land of Israel
  alternatives:
  - the land Israel
  - Israel's land
  lexicon: BDAG
  rationale: γῆ with a following proper name in the genitive is idiomatically rendered
    'the land of Israel.' This preserves the geographic-national sense without over-interpretation.
