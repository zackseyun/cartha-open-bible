id: MAT.2.9
reference: Matthew 2:9
source:
  edition: SBLGNT
  text: οἱ δὲ ἀκούσαντες τοῦ βασιλέως ἐπορεύθησαν, καὶ ἰδοὺ ὁ ἀστὴρ ὃν εἶδον ἐν τῇ ἀνατολῇ προῆγεν αὐτούς, ἕως ἐλθὼν ⸀ἐστάθη ἐπάνω οὗ ἦν τὸ παιδίον.
translation:
  text: After hearing the king[a], they went on their way, and behold, the star that they had seen in the east went before them until it came and stood over where the child was.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "at its rising" for "in the east"; the Greek expression can refer either to the east as a region/direction or to a star's rising.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσαντες
  chosen: After hearing
  alternatives:
  - having heard
  - when they heard
  lexicon: BDAG
  rationale: Aorist participle preceding the main verb is naturally rendered as a temporal participial clause in English. 'After hearing' is concise and preserves the sequence without over-paraphrasing.
- source_word: τοῦ βασιλέως
  chosen: the king
  alternatives:
  - from the king
  - King Herod
  lexicon: BDAG
  rationale: The genitive with ἀκούω can indicate the person heard. 'The king' is the explicit Greek wording; adding 'Herod' would import context not stated in this verse.
- source_word: ἐπορεύθησαν
  chosen: they went on their way
  alternatives:
  - they went
  - they departed
  lexicon: BDAG
  rationale: πορεύομαι often means to go or travel. 'Went on their way' gives natural English narrative movement and reflects departure after the audience with the king.
- source_word: ἰδοὺ
  chosen: behold
  alternatives:
  - look
  - see
  lexicon: BDAG
  rationale: Retained as a discourse marker signaling sudden attention. 'Behold' is still readable here and preserves the narrative vividness better than flattening it away.
- source_word: ἀστήρ
  chosen: star
  lexicon: BDAG
  rationale: Standard lexical sense; no contextual reason to vary.
- source_word: ὃν εἶδον
  chosen: that they had seen
  alternatives:
  - which they saw
  lexicon: BDAG
  rationale: English past perfect clarifies that the seeing occurred prior to the star's leading them in this scene.
- source_word: ἐν τῇ ἀνατολῇ
  chosen: in the east
  alternatives:
  - at its rising
  - in the eastern region
  lexicon: BDAG
  rationale: The phrase can mean either geographical east or rising. Because Matthew already used this expression in the magi narrative and many understand astronomical nuance, the main text keeps the common geographical rendering for readability, while preserving the alternative in a footnote.
- source_word: προῆγεν αὐτούς
  chosen: went before them
  alternatives:
  - led them on
  - went ahead of them
  lexicon: BDAG
  rationale: προάγω literally means to go before or lead onward. 'Went before them' preserves the imagery without overstating mechanism.
- source_word: ἕως ἐλθὼν ἐστάθη
  chosen: until it came and stood
  alternatives:
  - until, having come, it stood
  - until it arrived and stopped
  lexicon: BDAG
  rationale: The participle plus main verb expresses arrival followed by stopping. 'Came and stood' is idiomatic and close to the Greek sequence.
- source_word: ἐπάνω οὗ ἦν
  chosen: over where
  alternatives:
  - above where
  - over the place where
  lexicon: BDAG
  rationale: ἐπάνω with the relative adverb indicates position above the location. 'Over where' is natural English and sufficiently precise.
- source_word: τὸ παιδίον
  chosen: the child
  alternatives:
  - the young child
  lexicon: BDAG
  rationale: παιδίον denotes a child. 'The child' is the straightforward rendering; 'young child' is possible but adds emphasis not required by the Greek.
