theological_decisions:
- issue: Meaning of ἐν τῇ ἀνατολῇ in the star narrative
  chosen_reading: in the east
  alternative_readings:
  - at its rising
  rationale: The phrase is lexically capable of an astronomical sense ('at its rising') or a geographical one ('in the east'). The verse does not require resolving the broader interpretive debate about the star's appearance. Following optimal equivalence and preserving ambiguity where meaningful, the main text uses the familiar and natural 'in the east,' while the alternative is preserved in a footnote for auditability.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
