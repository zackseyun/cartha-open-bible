theological_decisions:
- issue: Nature of Rachel in the quotation
  chosen_reading: Retain Rachel as the prophetic/maternal figure from Jeremiah, without
    explicating the symbolism in the main text.
  alternative_readings:
  - Interpret Rachel directly as a symbol of Israel's mothers
  - Interpret Rachel as a literal historical mother speaking
  rationale: Matthew cites Jeremiah typologically. The translation should preserve
    the personified figure 'Rachel' without resolving the symbolic level in the main
    text, since the Greek itself simply presents the citation.
  doctrine_reference: Preserve theological tension rather than resolve it.
