id: MAT.2.18
reference: Matthew 2:18
source:
  edition: SBLGNT
  text: Φωνὴ ἐν Ῥαμὰ ⸀ἠκούσθη, κλαυθμὸς καὶ ὀδυρμὸς πολύς· Ῥαχὴλ κλαίουσα τὰ τέκνα
    αὐτῆς, καὶ οὐκ ἤθελεν παρακληθῆναι ὅτι οὐκ εἰσίν.
translation:
  text: 'A voice was heard in Ramah, weeping and great mourning: Rachel weeping for
    her children, and she was not willing to be comforted, because they are no more.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'lamentation and much mourning.'
    reason: lexical_alternative
  - marker: b
    text: Or 'she refused to be comforted.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'because they are not.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Φωνὴ
  chosen: A voice
  alternatives:
  - A sound
  lexicon: BDAG
  rationale: φωνή commonly denotes 'voice' or 'sound'; 'voice' best preserves the
    personified, prophetic tone of the citation from Jeremiah and fits the following
    participial depiction of Rachel.
- source_word: ἐν Ῥαμὰ
  chosen: in Ramah
  alternatives:
  - at Ramah
  lexicon: BDAG
  rationale: The preposition ἐν with a place name is most naturally rendered 'in.'
    'Ramah' is transliterated as a proper name per translation philosophy.
- source_word: ἠκούσθη
  chosen: was heard
  alternatives:
  - was heard of
  lexicon: BDAG
  rationale: Aorist passive of ἀκούω is straightforwardly 'was heard.' This preserves
    the impersonal report style of the Greek.
- source_word: κλαυθμὸς
  chosen: weeping
  alternatives:
  - lamentation
  - crying
  lexicon: BDAG
  rationale: κλαυθμός denotes audible weeping or wailing. 'Weeping' is natural modern
    English and pairs well with ὀδυρμός without becoming overly archaic.
- source_word: ὀδυρμὸς πολύς
  chosen: great mourning
  alternatives:
  - much mourning
  - bitter lamentation
  lexicon: BDAG
  rationale: ὀδυρμός refers to lamentation or mourning, and πολύς intensifies it.
    'Great mourning' is idiomatic and preserves the force without overtranslating
    emotional nuance not explicit in the Greek.
- source_word: Ῥαχὴλ
  chosen: Rachel
  rationale: Proper name is transliterated by standard convention.
- source_word: κλαίουσα
  chosen: weeping
  alternatives:
  - crying
  lexicon: BDAG
  rationale: Present participle conveys ongoing action. 'Weeping' maintains lexical
    connection with κλαυθμός and preserves the solemn register.
- source_word: τὰ τέκνα αὐτῆς
  chosen: her children
  alternatives:
  - her childen/offspring
  - her sons
  lexicon: BDAG
  rationale: τέκνα is the broad term 'children,' not specifically 'sons.' 'Children'
    is the most accurate and natural rendering here.
- source_word: οὐκ ἤθελεν
  chosen: she was not willing
  alternatives:
  - she refused
  lexicon: BDAG
  rationale: θέλω means 'to will, want, be willing.' 'She was not willing' is closer
    to the Greek than the more idiomatic but slightly stronger 'she refused.'
- source_word: παρακληθῆναι
  chosen: to be comforted
  alternatives:
  - to be consoled
  lexicon: BDAG
  rationale: Passive infinitive of παρακαλέω here means receiving comfort or consolation.
    'To be comforted' is standard, clear English.
- source_word: ὅτι οὐκ εἰσίν
  chosen: because they are no more
  alternatives:
  - because they are not
  - because they no longer exist
  lexicon: BDAG
  rationale: The idiom means the children are gone, i.e., dead or absent through loss.
    'They are no more' is established English that preserves the starkness of the
    Greek without adding an explicit interpretive gloss such as 'dead.'
