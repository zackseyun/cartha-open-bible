id: MAT.2.7
reference: Matthew 2:7
source:
  edition: SBLGNT
  text: Τότε Ἡρῴδης λάθρᾳ καλέσας τοὺς μάγους ἠκρίβωσεν παρ’ αὐτῶν τὸν χρόνον τοῦ
    φαινομένου ἀστέρος,
translation:
  text: Then Herod secretly summoned the magi and determined from them the time when
    the star had appeared,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the wise men.' The Greek μάγοι is more specifically 'magi,' referring
      to learned eastern astrologer-sages.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural modern English and preserves narrative flow.
- source_word: Ἡρῴδης
  chosen: Herod
  rationale: Standard English transliteration of the personal name, following the
    policy to transliterate names rather than translate them.
- source_word: λάθρᾳ
  chosen: secretly
  alternatives:
  - privately
  - in secret
  lexicon: BDAG
  rationale: Adverb indicating concealment. 'Secretly' is concise, idiomatic, and
    captures the covert nature of Herod's action.
- source_word: καλέσας
  chosen: summoned
  alternatives:
  - called
  - having called
  lexicon: BDAG
  rationale: Aorist participle modifying Herod. 'Summoned' better conveys an official
    or deliberate calling than the flatter 'called,' and in English it naturally absorbs
    the participial force in sequence with the main verb.
- source_word: τοὺς μάγους
  chosen: the magi
  alternatives:
  - the wise men
  lexicon: BDAG
  rationale: '''Magi'' is the more direct rendering of μάγοι and avoids importing
    later traditional imagery. ''Wise men'' is preserved as a familiar alternative
    in a footnote.'
- source_word: ἠκρίβωσεν
  chosen: determined
  alternatives:
  - ascertained
  - learned exactly
  - inquired carefully
  lexicon: BDAG
  rationale: The verb conveys finding out with precision. 'Determined' communicates
    careful ascertainment in clear modern English without sounding overly technical.
- source_word: παρ’ αὐτῶν
  chosen: from them
  alternatives:
  - from the magi
  lexicon: BDAG
  rationale: παρά with the genitive indicates source. 'From them' is a direct and
    natural rendering, with the antecedent clear from context.
- source_word: τὸν χρόνον
  chosen: the time
  alternatives:
  - the exact time
  - the point in time
  lexicon: BDAG
  rationale: χρόνος here refers to the time in question. Although precision is implied
    by ἠκρίβωσεν, it need not be redundantly built into χρόνον in the main text.
- source_word: τοῦ φαινομένου ἀστέρος
  chosen: when the star had appeared
  alternatives:
  - of the appearing star
  - of the star that was appearing
  lexicon: BDAG
  rationale: The genitive participial phrase is most naturally rendered in English
    as a temporal clause. The participle likely points to the star's appearing event
    relative to Herod's inquiry, so 'when the star had appeared' is idiomatic and
    contextually clear.
