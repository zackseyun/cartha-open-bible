id: MAT.2.12
reference: Matthew 2:12
source:
  edition: SBLGNT
  text: καὶ χρηματισθέντες κατ’ ὄναρ μὴ ἀνακάμψαι πρὸς Ἡρῴδην δι’ ἄλλης ὁδοῦ ἀνεχώρησαν
    εἰς τὴν χώραν αὐτῶν.
translation:
  text: And having been warned in a dream not to return to Herod, they departed for
    their own country by another route.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'having been divinely warned.' The Greek passive implies a warning from
      God, though God is not explicitly named in the verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'by another way.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηματισθέντες
  chosen: having been warned
  alternatives:
  - having been instructed
  - having been divinely warned
  - having received a revelation
  lexicon: BDAG
  rationale: The passive participle of χρηματίζω in Matthew commonly carries the sense
    of receiving a divine warning or instruction. 'Having been warned' is natural
    English and preserves the implied divine source without over-specifying beyond
    the text.
- source_word: κατ’ ὄναρ
  chosen: in a dream
  alternatives:
  - by a dream
  - during a dream
  lexicon: BDAG
  rationale: This Matthean expression idiomatically means revelation received in a
    dream. 'In a dream' is standard, clear English.
- source_word: μὴ ἀνακάμψαι
  chosen: not to return
  alternatives:
  - not to go back
  - not to turn back
  lexicon: BDAG
  rationale: The infinitive with μή gives the content of the warning. 'Return' best
    fits the travel context and is idiomatic in English.
- source_word: πρὸς Ἡρῴδην
  chosen: to Herod
  alternatives:
  - back to Herod
  - toward Herod
  lexicon: BDAG
  rationale: πρός with the accusative here indicates movement toward a person. 'To
    Herod' is the most natural rendering in context.
- source_word: δι’ ἄλλης ὁδοῦ
  chosen: by another route
  alternatives:
  - by another way
  - through another road
  lexicon: BDAG
  rationale: ὁδός can mean road, way, or route. In a travel narrative, 'route' communicates
    the concrete sense clearly in modern English while avoiding possible metaphorical
    overtones of 'way'.
- source_word: ἀνεχώρησαν
  chosen: they departed
  alternatives:
  - they withdrew
  - they went away
  lexicon: BDAG
  rationale: ἀναχωρέω often means withdraw or depart. In this narrative setting, 'departed'
    is straightforward and fits the travel sequence.
- source_word: εἰς τὴν χώραν αὐτῶν
  chosen: for their own country
  alternatives:
  - to their country
  - to their own land
  - into their region
  lexicon: BDAG
  rationale: χώρα can denote country, land, or region. Since the magi are returning
    home from Judea, 'their own country' best captures the destination and the possessive
    force of αὐτῶν in natural English.
