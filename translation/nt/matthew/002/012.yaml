theological_decisions:
- issue: Implied divine source of the warning
  chosen_reading: The warning is rendered as passive ('having been warned') without
    explicitly adding 'by God' in the main text.
  alternative_readings:
  - having been divinely warned
  - having been warned by God
  rationale: The passive participle strongly implies divine agency in context, but
    the Greek does not explicitly name God here. The translation preserves the implication
    without importing an explicit subject not stated in the verse.
  doctrine_reference: Translation philosophy §1, §3
