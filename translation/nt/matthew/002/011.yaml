theological_decisions:
- issue: Rendering προσκυνέω in relation to the child Jesus
  chosen_reading: paid homage
  alternative_readings:
  - worshiped
  - bowed down before him
  rationale: Given the narrative context, the magi's action can be understood as reverence offered to a royal child and, in canonical light, as worship of Jesus. To preserve the lexical range and avoid resolving the theological force more narrowly than the immediate context requires, the main text uses 'paid homage,' while preserving 'worshiped' as a footnoted alternative.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
