id: MAT.2.11
reference: Matthew 2:11
source:
  edition: SBLGNT
  text: καὶ ἐλθόντες εἰς τὴν οἰκίαν εἶδον τὸ παιδίον μετὰ Μαρίας τῆς μητρὸς αὐτοῦ, καὶ πεσόντες προσεκύνησαν αὐτῷ, καὶ ἀνοίξαντες τοὺς θησαυροὺς αὐτῶν προσήνεγκαν αὐτῷ δῶρα, χρυσὸν καὶ λίβανον καὶ σμύρναν.
translation:
  text: 'And when they came into the house[a], they saw the child with Mary his mother, and falling down they paid homage to him, and opening their treasures they offered him gifts: gold and frankincense and myrrh.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'worshiped him.' The Greek verb can denote worship or an act of reverent homage, depending on context.
    reason: alternative_reading
lexical_decisions:
- source_word: οἰκίαν
  chosen: house
  alternatives:
  - home
  lexicon: BDAG
  rationale: οἰκία ordinarily denotes a house/household dwelling. 'House' is the most direct and natural rendering here, preserving the concrete setting without adding interpretive nuance.
- source_word: παιδίον
  chosen: child
  alternatives:
  - young child
  - boy
  lexicon: BDAG
  rationale: παιδίον refers to a child/young child. 'Child' is accurate and idiomatic; 'young child' is possible but unnecessarily repetitive in English, and 'boy' is more specific than the Greek requires.
- source_word: μετὰ Μαρίας τῆς μητρὸς αὐτοῦ
  chosen: with Mary his mother
  alternatives:
  - with Mary, his mother
  lexicon: BDAG
  rationale: μετά with the genitive means 'with.' The appositional phrase identifies Mary as his mother. The unpunctuated rendering is smooth modern English while preserving the relationship.
- source_word: πεσόντες
  chosen: falling down
  alternatives:
  - having fallen down
  - prostrating themselves
  lexicon: BDAG
  rationale: The aorist participle depicts the accompanying action preceding the main verb. 'Falling down' preserves the vivid bodily posture without overformalizing; 'prostrating themselves' interprets the gesture more fully than the participle alone states.
- source_word: προσεκύνησαν
  chosen: paid homage
  alternatives:
  - worshiped
  - bowed down before
  lexicon: BDAG
  rationale: προσκυνέω can denote worship or reverential prostration/homage depending on context. Here the magi's act clearly conveys profound honor to the child, but the term can be read either as worship in a stronger theological sense or as royal homage. 'Paid homage' preserves the action without forcing a narrower interpretive conclusion in the main text.
- source_word: θησαυροὺς
  chosen: treasures
  alternatives:
  - treasure chests
  - stores of treasure
  lexicon: BDAG
  rationale: θησαυρός means treasure or treasury. 'Treasures' is a natural plural here and can refer to the valuable containers/contents they opened. 'Treasure chests' is interpretive and more specific than the Greek.
- source_word: προσήνεγκαν
  chosen: offered
  alternatives:
  - presented
  - brought
  lexicon: BDAG
  rationale: προσφέρω here means to offer/present. 'Offered' fits the formal gift-giving context and pairs well with 'gifts' without sounding archaic.
- source_word: δῶρα
  chosen: gifts
  alternatives:
  - presents
  - offerings
  lexicon: BDAG
  rationale: δῶρον means gift/present, and in some contexts offering. 'Gifts' is the clearest and least interpretively loaded choice here.
- source_word: λίβανον
  chosen: frankincense
  alternatives:
  - incense
  lexicon: BDAG
  rationale: λίβανος in this context refers specifically to frankincense, the aromatic resin traditionally named in this verse. 'Incense' is broader and less precise.
- source_word: σμύρναν
  chosen: myrrh
  lexicon: BDAG
  rationale: σμύρνα straightforwardly denotes myrrh; the traditional rendering is precise and readily understood.
