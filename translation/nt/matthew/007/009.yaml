id: MAT.7.9
reference: Matthew 7:9
source:
  edition: SBLGNT
  text: ἢ τίς ⸀ἐστιν ἐξ ὑμῶν ἄνθρωπος, ὃν ⸀αἰτήσει ὁ υἱὸς αὐτοῦ ἄρτον— μὴ λίθον ἐπιδώσει αὐτῷ;
translation:
  text: Or what man is there among you whose son asks him for bread[a], and he will give him a stone?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively in English idiom, 'what person is there among you'; Greek has 'man' in a representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  chosen: Or
  alternatives:
  - Or rather
  - Or what
  lexicon: BDAG
  rationale: Introduces the next rhetorical comparison in Jesus' argument. 'Or' is the natural connective in English and preserves the discourse flow from the preceding verse.
- source_word: τίς ... ἄνθρωπος
  chosen: what man is there
  alternatives:
  - which man is there
  - who among you is the man
  lexicon: BDAG
  rationale: The idiom τίς ἐστιν ἐξ ὑμῶν ἄνθρωπος is naturally rendered as 'what man is there among you.' 'Man' preserves the grammatically masculine representative force in keeping with the gender-accurate policy.
- source_word: ἐξ ὑμῶν
  chosen: among you
  alternatives:
  - from among you
  - of you
  lexicon: BDAG
  rationale: Idiomatic English for the partitive expression, preserving the sense of Jesus addressing his hearers collectively.
- source_word: ὃν
  chosen: whose
  alternatives:
  - whom
  - if him
  lexicon: BDAG
  rationale: Although formally accusative ('whom'), English idiom prefers restructuring the clause as 'whose son will ask him,' which conveys the relative connection clearly and naturally.
- source_word: αἰτήσει
  chosen: will ask
  alternatives:
  - asks
  - will request
  lexicon: BDAG
  rationale: Future indicative is best preserved as 'will ask.' 'Ask' is more natural and less formal than 'request' for a son asking a father for food.
- source_word: ὁ υἱὸς αὐτοῦ
  chosen: his son
  alternatives:
  - the son of him
  lexicon: BDAG
  rationale: Standard English rendering of the possessive phrase. 'Son' should be retained rather than generalized, since the Greek is specific.
- source_word: ἄρτον
  chosen: bread
  alternatives:
  - a loaf of bread
  - food
  lexicon: BDAG
  rationale: '''Bread'' is the direct and contextually appropriate rendering. ''Food'' would be too broad; ''a loaf'' is more specific than the Greek requires.'
- source_word: μὴ
  chosen: and he will give him
  alternatives:
  - will he give him
  lexicon: BDAG
  rationale: μή marks a rhetorical question expecting a negative answer. In idiomatic English, the negative expectation is conveyed by the whole rhetorical question without needing an explicit 'not' in the main clause.
- source_word: λίθον
  chosen: a stone
  alternatives:
  - stone
  lexicon: BDAG
  rationale: The indefinite article is natural in English count-noun usage and matches the contrast with 'bread.'
- source_word: ἐπιδώσει αὐτῷ
  chosen: will give him
  alternatives:
  - will hand to him
  - will present to him
  lexicon: BDAG
  rationale: A straightforward rendering of the future verb with indirect object. 'Give' is idiomatic and sufficient here; more wooden alternatives are unnecessary.
