id: MAT.16.5
reference: Matthew 16:5
source:
  edition: SBLGNT
  text: Καὶ ἐλθόντες οἱ ⸀μαθηταὶ εἰς τὸ πέραν ἐπελάθοντο ἄρτους λαβεῖν.
translation:
  text: And when the disciples came to the other side[a], they had forgotten to take bread.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek 'loaves'; rendered 'bread' for natural English in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  chosen: when ... came
  alternatives:
  - having come
  - after coming
  lexicon: BDAG
  rationale: 'Aorist participle of ἔρχομαι is rendered temporally in smooth English: ''when ... came.'' This preserves the participial relation to the main verb without awkwardness.'
- source_word: οἱ μαθηταὶ
  chosen: the disciples
  alternatives:
  - the learners
  lexicon: BDAG
  rationale: Standard contextual rendering for μαθηταί in the Gospels; it refers specifically to Jesus' disciples, not generic students.
- source_word: εἰς τὸ πέραν
  chosen: to the other side
  alternatives:
  - to the far side
  - across
  lexicon: BDAG
  rationale: Idiomatic Gospel expression for crossing to the other side of the lake/sea. 'The other side' is the most natural and contextually precise English rendering.
- source_word: ἐπελάθοντο
  chosen: they had forgotten
  alternatives:
  - they forgot
  - they neglected
  lexicon: BDAG
  rationale: 'ἐπιλανθάνομαι means ''to forget.'' The pluperfect-like English ''had forgotten'' fits the narrative sense: upon arriving, it became evident that the forgetting had already occurred.'
- source_word: ἄρτους
  chosen: bread
  alternatives:
  - loaves
  - bread loaves
  lexicon: BDAG
  rationale: Although plural in Greek ('loaves'), English often uses mass noun 'bread' naturally in this context. This is an optimal-equivalence choice for readability while preserving the sense of provisions.
- source_word: λαβεῖν
  chosen: to take
  alternatives:
  - to bring
  - to carry along
  lexicon: BDAG
  rationale: 'Infinitive of purpose/complement after ''forgotten'': they forgot ''to take'' bread. ''Bring'' is possible in context, but ''take'' more directly reflects λαβεῖν.'
