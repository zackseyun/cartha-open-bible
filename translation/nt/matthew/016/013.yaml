id: MAT.16.13
reference: Matthew 16:13
source:
  edition: SBLGNT
  text: Ἐλθὼν δὲ ὁ Ἰησοῦς εἰς τὰ μέρη Καισαρείας τῆς Φιλίππου ἠρώτα τοὺς μαθητὰς αὐτοῦ λέγων· ⸀Τίνα λέγουσιν οἱ ἄνθρωποι εἶναι τὸν υἱὸν τοῦ ἀνθρώπου;
translation:
  text: Now when Jesus came into the region of Caesarea Philippi[a], he was asking his disciples, saying[b], “Who do people say the Son of Man is?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Who do people say the Son of Man to be?”
    reason: lexical_alternative
  - marker: b
    text: “Son of Man” is Jesus’ characteristic self-designation; alternatively, some render it “the Human One.”
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐλθὼν δὲ
  chosen: Now when ... came
  alternatives:
  - And when ... came
  - Then ... came
  lexicon: BDAG
  rationale: The aorist participle Ἐλθὼν with δέ introduces a new scene. 'Now when ... came' gives natural English narrative flow while preserving the temporal sense and mild transition.
- source_word: εἰς τὰ μέρη
  chosen: into the region
  alternatives:
  - into the parts
  - to the district
  lexicon: BDAG
  rationale: μέρη here refers idiomatically to the surrounding territory or district, not literal 'parts.' 'Region' is natural and accurate.
- source_word: Καισαρείας τῆς Φιλίππου
  chosen: Caesarea Philippi
  alternatives:
  - the region of Caesarea of Philip
  lexicon: BDAG
  rationale: This is the standard English transliteration of the place name and avoids an awkward overly literal rendering of the genitive construction.
- source_word: ἠρώτα
  chosen: he was asking
  alternatives:
  - he asked
  - he questioned
  lexicon: BDAG
  rationale: The imperfect tense suggests ongoing or inceptive action in narrative. 'Was asking' preserves that aspect better than simple past 'asked.'
- source_word: μαθητὰς
  chosen: disciples
  alternatives:
  - learners
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering for μαθηταί in Gospel contexts.'
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle is naturally represented by 'saying,' preserving the Greek structure without awkwardness.
- source_word: Τίνα λέγουσιν οἱ ἄνθρωποι
  chosen: Who do people say
  alternatives:
  - Who do men say
  - Whom do people say
  lexicon: BDAG
  rationale: ἄνθρωποι here is generic for human beings, not specifically males. Per gender-accurate policy, 'people' best matches the source intent. 'Who' is idiomatic modern English in this predicate-accusative construction.
- source_word: εἶναι
  chosen: is
  alternatives:
  - to be
  lexicon: BDAG
  rationale: English indirect discourse normally omits the infinitive form here and uses finite 'is' for natural readability while preserving meaning.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' established self-designation in the Gospels. 'The Son of Man' preserves the wording, intertextual resonance, and theological weight better than more interpretive alternatives.
