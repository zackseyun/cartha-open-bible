theological_decisions:
- issue: Rendering of ὁ υἱὸς τοῦ ἀνθρώπου
  chosen_reading: the Son of Man
  alternative_readings:
  - the Human One
  rationale: The phrase is both idiomatic and title-like in the Gospel tradition, with likely resonance to Daniel 7 and Jesus' self-reference. Preserving the traditional but still transparent title maintains theological tension and intertextual depth without over-resolving its nuance.
