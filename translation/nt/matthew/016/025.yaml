- issue: Rendering ψυχή in a discipleship paradox
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse contrasts saving, losing, and finding ψυχή in the context of following Jesus and facing death. Rendering ψυχή as 'life' best preserves the paradox in idiomatic English without narrowing the term to the immaterial soul. Because 'soul' is a longstanding and theologically weighty alternative, it is preserved in a footnote rather than excluded.
