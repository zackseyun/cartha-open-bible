id: MAT.16.25
reference: Matthew 16:25
source:
  edition: SBLGNT
  text: ὃς γὰρ ⸀ἐὰν θέλῃ τὴν ψυχὴν αὐτοῦ σῶσαι ἀπολέσει αὐτήν· ὃς δ’ ἂν ἀπολέσῃ τὴν ψυχὴν αὐτοῦ ἕνεκεν ἐμοῦ εὑρήσει αὐτήν.
translation:
  text: For whoever wants to save his life will lose it[a], but whoever loses his life for my sake will find it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'soul' throughout the verse; the Greek word psychē can mean 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς γὰρ ἐὰν / ὃς δ’ ἂν
  chosen: whoever ... but whoever
  alternatives:
  - for whoever ... and whoever
  - whoever ... whoever
  lexicon: BDAG
  rationale: The relative construction with ἐὰν/ἂν expresses an indefinite general condition, best rendered idiomatically as 'whoever.' γάρ is retained as 'For' to connect with the preceding statement, while δέ is rendered adversatively as 'but' to mark the contrast between the two clauses.
- source_word: θέλῃ
  chosen: wants
  alternatives:
  - wishes
  - desires
  lexicon: BDAG
  rationale: θέλω here denotes volition or desire. 'Wants' is natural modern English and preserves the sense without sounding stilted.
- source_word: ψυχὴν
  chosen: life
  alternatives:
  - soul
  - self
  lexicon: BDAG
  rationale: In this saying ψυχή carries the paradoxical sense of one's life, not merely the immaterial soul. 'Life' best fits the paired verbs 'save/lose/find' and the discipleship context. Because 'soul' is a traditional alternative with theological significance, it is preserved in a footnote.
- source_word: σῶσαι
  chosen: to save
  alternatives:
  - to preserve
  lexicon: BDAG
  rationale: σῴζω means 'save' or 'preserve.' 'Save' preserves the verbal parallelism with 'lose' and reflects the common force of the term here.
- source_word: ἀπολέσει / ἀπολέσῃ
  chosen: will lose / loses
  alternatives:
  - will destroy
  - ruins
  - forfeits
  lexicon: BDAG
  rationale: ἀπόλλυμι in this context refers to losing one's life rather than annihilation. Future 'will lose' in the first clause matches the Greek future; the aorist subjunctive in the second clause under ἄν is naturally rendered in English as 'whoever loses.'
- source_word: ἕνεκεν ἐμοῦ
  chosen: for my sake
  alternatives:
  - because of me
  - on account of me
  lexicon: BDAG
  rationale: ἕνεκεν with the genitive expresses cause or motive. 'For my sake' is idiomatic, concise, and preserves the personal allegiance to Jesus emphasized in the phrase.
- source_word: εὑρήσει
  chosen: will find
  alternatives:
  - will gain
  - will discover
  lexicon: BDAG
  rationale: εὑρίσκω is straightforwardly 'find.' This keeps the paradox vivid and avoids interpretive expansion such as 'gain,' though that sense is conceptually related.
- source_word: αὐτοῦ / αὐτήν
  chosen: his / it
  alternatives:
  - one's / it
  - their / it
  lexicon: Greek grammar
  rationale: The Greek uses grammatically masculine singular forms in a representative sense. Per the gender-accurate policy, 'his' matches the source form and generic force better than a pluralizing paraphrase. 'It' naturally refers back to 'life' in English.
