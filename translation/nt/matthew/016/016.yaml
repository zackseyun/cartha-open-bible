id: MAT.16.16
reference: Matthew 16:16
source:
  edition: SBLGNT
  text: ἀποκριθεὶς δὲ Σίμων Πέτρος εἶπεν· Σὺ εἶ ὁ χριστὸς ὁ υἱὸς τοῦ θεοῦ τοῦ ζῶντος.
translation:
  text: Simon Peter answered, “You are the Messiah, the Son of the living God.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Christ.” The Greek title Χριστός can be rendered “Christ”; here
      it is translated “Messiah” to preserve its title sense and Jewish messianic
      context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replying
  - answering
  lexicon: BDAG
  rationale: Aorist passive participle of ἀποκρίνομαι commonly functions deponently
    in narrative speech introductions. 'Answered' is idiomatic modern English and
    fits the construction with εἶπεν.
- source_word: δὲ
  chosen: —
  alternatives:
  - and
  - but
  - now
  lexicon: BDAG
  rationale: δέ marks mild discourse continuity or transition. It is not naturally
    represented in English here, since 'Simon Peter answered' already carries the
    narrative flow.
- source_word: Σίμων Πέτρος
  chosen: Simon Peter
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
- source_word: εἶπεν
  chosen: answered
  alternatives:
  - said
  lexicon: BDAG
  rationale: Although εἶπεν literally means 'said,' in combination with ἀποκριθεὶς
    the idiomatic sense is 'answered.' Rendering the pair as 'answered' avoids wooden
    redundancy ('answered and said') while preserving the speech-response function.
- source_word: Σὺ
  chosen: You
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. English naturally preserves
    this with stated subject 'You' at the front of the clause.
- source_word: ὁ χριστὸς
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Χριστός is a title here, not a name-like designation. Per doctrine guidelines,
    titles are translated, and the default rendering is 'Messiah' where context supports
    the messianic sense.
- source_word: ὁ υἱὸς
  chosen: the Son
  lexicon: BDAG
  rationale: Definite article plus noun identifies a specific filial title. 'The Son'
    preserves the titular force rather than reducing it to an indefinite description.
- source_word: τοῦ θεοῦ
  chosen: of God
  lexicon: BDAG
  rationale: Standard genitival construction indicating filial relation to God. No
    article is needed in English before 'God' in this construction.
- source_word: τοῦ ζῶντος
  chosen: the living
  alternatives:
  - who lives
  - alive
  lexicon: BDAG
  rationale: Present participle used attributively with θεοῦ. 'The living God' is
    the most natural and established English equivalent, preserving the qualitative
    contrast implied by the Greek.
