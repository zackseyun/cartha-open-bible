theological_decisions:
- issue: Rendering Χριστός as title or name-like form
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: In Peter's confession, Χριστός functions clearly as a messianic title.
    The project's contested-terms guidance specifies 'Messiah' where title is intended,
    while preserving 'Christ' as an alternative in a footnote.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested
    terms table for Χριστός'
- issue: Force of 'Son of God'
  chosen_reading: the Son of the living God
  rationale: The translation preserves the confessional and titular wording of the
    Greek without expanding it into later doctrinal formulations, while remaining
    fully compatible with historic orthodox Christology.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve
    it'
