id: MAT.16.27
reference: Matthew 16:27
source:
  edition: SBLGNT
  text: μέλλει γὰρ ὁ υἱὸς τοῦ ἀνθρώπου ἔρχεσθαι ἐν τῇ δόξῃ τοῦ πατρὸς αὐτοῦ μετὰ τῶν ἀγγέλων αὐτοῦ, καὶ τότε ἀποδώσει ἑκάστῳ κατὰ τὴν πρᾶξιν αὐτοῦ.
translation:
  text: For the Son of Man is about to come in the glory of his Father with his angels[b][a], and then he will repay each one according to his deed.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will come' or 'is going to come.' The Greek says 'is about to come,' preserving a sense of imminence.
    reason: lexical_alternative
  - marker: b
    text: Or 'according to what he has done.' The Greek has the singular 'deed/action,' used distributively for each person's conduct.
    reason: lexical_alternative
lexical_decisions:
- source_word: μέλλει
  chosen: is about to
  alternatives:
  - is going to
  - is destined to
  - will soon
  lexicon: BDAG
  rationale: μέλλω with an infinitive commonly expresses imminence or impending action. 'Is about to' preserves that force more clearly than a simple future ('will').
- source_word: γὰρ
  chosen: For
  alternatives:
  - because
  - indeed
  lexicon: BDAG
  rationale: γάρ gives the reason for the preceding statement; 'For' is the most natural concise connector in English here.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: This is the established and literal rendering of the self-designation, preserving both its idiomatic force and its intertextual resonance with Danielic imagery.
- source_word: ἔρχεσθαι
  chosen: to come
  alternatives:
  - to arrive
  lexicon: BDAG
  rationale: The infinitive complements μέλλει. 'To come' is the standard rendering and preserves eschatological and christological associations.
- source_word: ἐν τῇ δόξῃ τοῦ πατρὸς αὐτοῦ
  chosen: in the glory of his Father
  alternatives:
  - with the glory of his Father
  - in his Father's glory
  lexicon: BDAG
  rationale: ἐν with δόξα here is best rendered 'in,' expressing the sphere or manifestation in which the coming occurs. 'Of his Father' keeps the genitive relation explicit.
- source_word: μετὰ τῶν ἀγγέλων αὐτοῦ
  chosen: with his angels
  alternatives:
  - accompanied by his angels
  lexicon: BDAG
  rationale: μετά with the genitive denotes accompaniment. 'With his angels' is direct and natural while preserving the possessive pronoun.
- source_word: καὶ τότε
  chosen: and then
  alternatives:
  - then
  - and at that time
  lexicon: BDAG
  rationale: 'The phrase marks sequence: first the coming, then the recompense. ''And then'' preserves the connective and temporal progression.'
- source_word: ἀποδώσει
  chosen: will repay
  alternatives:
  - will render
  - will recompense
  - will give back
  lexicon: BDAG
  rationale: ἀποδίδωμι in judgment contexts carries the sense of rendering what is due. 'Will repay' is idiomatic and preserves the judicial-retributive nuance without archaic diction.
- source_word: ἑκάστῳ
  chosen: each one
  alternatives:
  - each person
  - to each
  lexicon: BDAG
  rationale: The dative singular is distributive. 'Each one' is natural English and keeps the individualizing force.
- source_word: κατὰ τὴν πρᾶξιν αὐτοῦ
  chosen: according to his deed
  alternatives:
  - according to what he has done
  - according to his practice
  - according to his actions
  lexicon: BDAG
  rationale: πρᾶξις denotes deed, action, or practice. The singular is retained in English as 'deed' to reflect the Greek form and avoid over-paraphrase, though the sense is collective/behavioral.
