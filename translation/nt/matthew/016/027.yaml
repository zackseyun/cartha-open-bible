theological_decisions:
- issue: Eschatological force of μέλλει with the Son of Man's coming
  chosen_reading: Retain the imminence nuance with 'is about to come' rather than flattening to a simple future.
  alternative_readings:
  - will come
  - is going to come
  rationale: The Greek explicitly uses μέλλω + infinitive, which normally adds a sense of impending action. Preserving that tension is preferable to resolving broader debates about timing by weakening the wording.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Judgment according to works/deeds
  chosen_reading: Render ἀποδώσει ... κατὰ τὴν πρᾶξιν αὐτοῦ as 'he will repay each one according to his deed.'
  alternative_readings:
  - he will reward each person according to what he has done
  - he will repay each person according to his actions
  rationale: The verse states individual recompense in judgment without importing a broader doctrinal system. 'Repay' and 'deed' preserve the text's judicial sense while avoiding interpretive expansion.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3
