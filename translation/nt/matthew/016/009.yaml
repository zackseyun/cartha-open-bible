id: MAT.16.9
reference: Matthew 16:9
source:
  edition: SBLGNT
  text: οὔπω νοεῖτε, οὐδὲ μνημονεύετε τοὺς πέντε ἄρτους τῶν πεντακισχιλίων καὶ πόσους
    κοφίνους ἐλάβετε;
translation:
  text: Do you still not understand, nor do you remember the five loaves for the five
    thousand, and how many baskets you gathered?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'not yet understand.'
    reason: lexical_alternative
  - marker: b
    text: Or 'how many baskets you took up.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔπω
  chosen: still not
  alternatives:
  - not yet
  lexicon: BDAG
  rationale: Conveys the adverb's temporal force in Jesus' rebuke. 'Still not' is
    idiomatic in English and fits the rhetorical question better than the more wooden
    'not yet.'
- source_word: νοεῖτε
  chosen: understand
  alternatives:
  - perceive
  - grasp
  lexicon: BDAG
  rationale: νοέω here refers to mental comprehension of the significance of the prior
    events, not mere sensory perception. 'Understand' is clear modern English and
    suits the context.
- source_word: οὐδὲ
  chosen: nor
  alternatives:
  - and not
  - neither
  lexicon: BDAG
  rationale: Links the two present verbs in a coordinated negative construction. 'Nor'
    is the most natural English connector after 'Do you still not understand.'
- source_word: μνημονεύετε
  chosen: remember
  alternatives:
  - recall
  - keep in mind
  lexicon: BDAG
  rationale: The verb denotes remembering the earlier miracle. 'Remember' is the most
    direct and natural rendering.
- source_word: τοὺς πέντε ἄρτους
  chosen: the five loaves
  alternatives:
  - the five bread loaves
  lexicon: BDAG
  rationale: ἄρτους in the feeding narrative refers to loaves of bread. 'Loaves' is
    the established and accurate English term in this context.
- source_word: τῶν πεντακισχιλίων
  chosen: for the five thousand
  alternatives:
  - of the five thousand
  - belonging to the five thousand
  lexicon: BDAG
  rationale: The genitive is contextually associated with the feeding of the five
    thousand. 'For the five thousand' makes the relationship explicit and natural
    in English.
- source_word: πόσους κοφίνους
  chosen: how many baskets
  alternatives:
  - how many basketfuls
  lexicon: BDAG
  rationale: κόφινος denotes a basket; the phrase asks about the number of baskets
    collected after the miracle. 'How many baskets' is straightforward and preserves
    the concrete image.
- source_word: ἐλάβετε
  chosen: you gathered
  alternatives:
  - you took up
  - you received
  lexicon: BDAG
  rationale: Although λαμβάνω commonly means 'take/receive,' in this feeding context
    it refers to picking up the leftover pieces into baskets. 'You gathered' communicates
    the event clearly in contemporary English; 'you took up' is possible but less
    natural for many readers.
