theological_decisions:
- issue: Metaphorical force of 'leaven'
  chosen_reading: 'Render the metaphor explicitly only as far as the text does: ''leaven''
    in contrast with ''the teaching of the Pharisees and Sadducees.'''
  alternative_readings:
  - Interpretive expansion such as 'hypocrisy' or 'corrupt teaching' in the main text
  rationale: The verse itself explains the metaphor as referring to 'teaching,' but
    it does not further specify the exact moral quality here. The translation preserves
    the text's own level of explanation without importing fuller interpretive conclusions
    from parallel passages.
  doctrine_reference: Preserve theological tension rather than resolve it.
