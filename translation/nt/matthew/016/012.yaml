id: MAT.16.12
reference: Matthew 16:12
source:
  edition: SBLGNT
  text: τότε συνῆκαν ὅτι οὐκ εἶπεν προσέχειν ἀπὸ τῆς ζύμης ⸂τῶν ἄρτων⸃ ἀλλὰ ἀπὸ τῆς
    διδαχῆς τῶν Φαρισαίων καὶ Σαδδουκαίων.
translation:
  text: Then they understood that he had not said to beware of the leaven of bread,
    but of the teaching of the Pharisees and Sadducees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'of the loaves.' The Greek has a plural noun here.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking the point at which the disciples finally grasped
    Jesus' meaning; 'Then' is natural and sufficiently precise.
- source_word: συνῆκαν
  chosen: they understood
  alternatives:
  - they comprehended
  - they realized
  lexicon: BDAG
  rationale: Aorist of συνίημι indicates coming to understanding. 'Understood' is
    clear, idiomatic, and preserves the cognitive sense without overinterpreting.
- source_word: οὐκ εἶπεν
  chosen: he had not said
  alternatives:
  - he did not say
  lexicon: BDAG
  rationale: 'English past perfect fits the discourse flow: only then did they understand
    what he had not meant in the earlier statement. This is a natural English rendering
    of the Greek aorist in context.'
- source_word: προσέχειν
  chosen: to beware
  alternatives:
  - to pay attention to
  - to be on guard against
  lexicon: BDAG
  rationale: In this warning context, προσέχω carries the sense of being alert or
    on guard. 'Beware' is concise and idiomatic in English, matching the force of
    Jesus' warning.
- source_word: ἀπὸ τῆς ζύμης
  chosen: of the leaven
  alternatives:
  - against the leaven
  - from the leaven
  - of the yeast
  lexicon: BDAG
  rationale: ζύμη is literally 'leaven/yeast.' 'Leaven' is retained because it preserves
    the metaphorical and biblical resonance already established in the context. The
    preposition with προσέχειν is idiomatically rendered in English as 'beware of.'
- source_word: τῶν ἄρτων
  chosen: of bread
  alternatives:
  - of the loaves
  - of breads
  lexicon: BDAG
  rationale: Although ἄρτων is plural, English commonly uses the mass noun 'bread'
    in this construction. This avoids awkwardness while preserving the sense that
    literal bread was not in view.
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  lexicon: BDAG
  rationale: Marks contrast between literal leaven and the intended metaphorical referent.
    'But' is straightforward and natural.
- source_word: διδαχῆς
  chosen: the teaching
  alternatives:
  - the doctrine
  - the instruction
  lexicon: BDAG
  rationale: διδαχή refers to teaching or doctrine. 'Teaching' is preferred as readable
    modern English without unnecessary ecclesiastical jargon, while still conveying
    content being taught.
- source_word: Φαρισαίων
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name, following the policy to transliterate
    names.
- source_word: Σαδδουκαίων
  chosen: Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the group name, following the policy to transliterate
    names.
