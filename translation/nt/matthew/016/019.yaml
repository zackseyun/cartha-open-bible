theological_decisions:
- issue: Aspect and theological implication of binding/loosing formula
  chosen_reading: Rendered the clauses as 'will have been bound/loosed in heaven'
    rather than 'will be bound/loosed in heaven.'
  alternative_readings:
  - will be bound in heaven / will be loosed in heaven
  rationale: The Greek construction ἔσται + perfect passive participle suggests a
    future state of something already bound/loosed, which can imply that the earthly
    action corresponds to, rather than initiates, the heavenly determination. This
    preserves the grammatical force without importing a denominational doctrine of
    ecclesial authority beyond the text.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Meaning of 'keys of the kingdom of heaven'
  chosen_reading: Kept the metaphor 'keys' without interpretive expansion.
  alternative_readings:
  - authority to admit and exclude
  - stewardship authority
  rationale: The image likely conveys authority, but the text itself uses the metaphor.
    Preserving it avoids importing a specific ecclesiological system not explicit
    in the verse.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
