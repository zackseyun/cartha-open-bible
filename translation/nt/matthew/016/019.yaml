id: MAT.16.19
reference: Matthew 16:19
source:
  edition: SBLGNT
  text: ⸀δώσω σοι τὰς ⸀κλεῖδας τῆς βασιλείας τῶν οὐρανῶν, καὶ ὃ ⸀ἐὰν δήσῃς ἐπὶ τῆς
    γῆς ἔσται δεδεμένον ἐν τοῖς οὐρανοῖς, καὶ ὃ ⸁ἐὰν λύσῃς ἐπὶ τῆς γῆς ἔσται λελυμένον
    ἐν τοῖς οὐρανοῖς.
translation:
  text: I will give you the keys of the kingdom of heaven, and whatever you bind on
    earth will have been bound in heaven, and whatever you loose on earth will have
    been loosed in heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'the kingdom of the heavens.' Matthew frequently uses
      this expression.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often reads 'will be bound ... will be loosed.' The
      Greek more precisely can be understood as 'will have been bound ... will have
      been loosed.'
    reason: alternative_reading
  - marker: c
    text: '''Bind'' and ''loose'' can carry the sense of forbidding and permitting,
      or of imposing and lifting obligations, though the translation preserves the
      Greek metaphor.'
    reason: cultural_note
lexical_decisions:
- source_word: δώσω
  chosen: I will give
  alternatives:
  - I shall give
  lexicon: BDAG
  rationale: Future active indicative, straightforward future promise. 'Will' is natural
    modern English.
- source_word: σοι
  chosen: you
  alternatives:
  - to you
  lexicon: BDAG
  rationale: Dative indirect object is naturally carried in English by 'give you'
    rather than the more wooden 'give to you'.
- source_word: κλεῖδας
  chosen: keys
  lexicon: BDAG
  rationale: Literal plural noun; metaphor should be preserved rather than interpreted.
- source_word: βασιλείας τῶν οὐρανῶν
  chosen: the kingdom of heaven
  alternatives:
  - the kingdom of the heavens
  lexicon: BDAG
  rationale: Standard Matthean expression. Singular 'heaven' is idiomatic English
    while preserving the sense of God's reign; the more literal plural is preserved
    as an alternative.
- source_word: ὃ ἐὰν
  chosen: whatever
  alternatives:
  - whatever thing
  lexicon: BDAG
  rationale: Indefinite relative construction is best rendered idiomatically as 'whatever'
    in both clauses.
- source_word: δήσῃς
  chosen: bind
  lexicon: BDAG
  rationale: Aorist subjunctive after ἐάν in a future more vivid condition. 'Bind'
    preserves the metaphor and its juridical/authoritative resonance without over-interpreting
    it.
- source_word: ἐπὶ τῆς γῆς
  chosen: on earth
  alternatives:
  - upon the earth
  lexicon: BDAG
  rationale: Idiomatic English rendering of ἐπί with genitive in this formulaic contrast
    with heaven.
- source_word: ἔσται δεδεμένον
  chosen: will have been bound
  alternatives:
  - will be bound
  lexicon: BDAG
  rationale: Future of εἰμί with perfect passive participle most naturally conveys
    a future state resulting from prior completed action. 'Will have been bound' better
    reflects the Greek form than the traditional but less precise 'will be bound'.
- source_word: ἐν τοῖς οὐρανοῖς
  chosen: in heaven
  alternatives:
  - in the heavens
  lexicon: BDAG
  rationale: Greek plural is often idiomatically singular in English in this Matthean
    expression. 'In heaven' is clear and natural; literal plural preserved as an alternative.
- source_word: λύσῃς
  chosen: loose
  alternatives:
  - release
  lexicon: BDAG
  rationale: Pairs naturally with 'bind' and preserves the metaphorical symmetry of
    the Greek. 'Release' is possible but less traditional and less tightly paired.
- source_word: ἔσται λελυμένον
  chosen: will have been loosed
  alternatives:
  - will be loosed
  lexicon: BDAG
  rationale: As with the previous clause, the future + perfect passive participle
    is best represented by an English future perfect passive to preserve the aspectual
    force.
