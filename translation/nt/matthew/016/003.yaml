theological_decisions:
- issue: Meaning of 'the signs of the times'
  chosen_reading: Retain the phrase without narrowing it to specifically eschatological
    signs alone.
  alternative_readings:
  - the signs of these present times
  - the messianic signs of the age
  rationale: Jesus rebukes his hearers for failing to interpret the significance of
    the present moment and his works. The Greek phrase is broad enough to include
    messianic and possibly eschatological significance, so the translation preserves
    that tension rather than resolving it.
  doctrine_reference: Preserve theological tension rather than resolve it.
