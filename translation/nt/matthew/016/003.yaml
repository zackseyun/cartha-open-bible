id: MAT.16.3
reference: Matthew 16:3
source:
  edition: SBLGNT
  text: καὶ πρωΐ· Σήμερον χειμών, πυρράζει γὰρ στυγνάζων ὁ οὐρανός. ⸀τὸ μὲν πρόσωπον
    τοῦ οὐρανοῦ γινώσκετε διακρίνειν, τὰ δὲ σημεῖα τῶν καιρῶν οὐ δύνασθε.⸃
translation:
  text: And in the morning, ‘Today, stormy weather, for the sky is red and overcast.’
    You know how to discern the appearance of the sky, but you are not able to discern
    the signs of the times.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the face of the sky.'
    reason: lexical_alternative
  - marker: b
    text: '''The signs of the times'' may refer more specifically to the spiritually
      significant character of the present moment, including Jesus'' messianic works.'
    reason: alternative_reading
lexical_decisions:
- source_word: πρωΐ
  chosen: in the morning
  alternatives:
  - morning
  lexicon: BDAG
  rationale: Adverbial temporal expression; 'in the morning' is natural English and
    preserves the contrast with the prior weather saying implied by καὶ.
- source_word: χειμών
  chosen: stormy weather
  alternatives:
  - winter
  - tempest
  - bad weather
  lexicon: BDAG
  rationale: Here the noun refers to weather conditions rather than the season 'winter.'
    'Stormy weather' best fits the context of forecasting from the sky.
- source_word: πυρράζει
  chosen: is red
  alternatives:
  - is fiery red
  - reddens
  lexicon: BDAG
  rationale: The verb denotes a reddish appearance. 'Is red' is idiomatic in English
    weather language and avoids overtranslation.
- source_word: στυγνάζων
  chosen: overcast
  alternatives:
  - gloomy
  - threatening
  - darkening
  lexicon: BDAG
  rationale: The participle describes the sky as gloomy or darkening. 'Overcast' fits
    the meteorological context and pairs naturally with 'is red.'
- source_word: πρόσωπον
  chosen: appearance
  alternatives:
  - face
  lexicon: BDAG
  rationale: Although literally 'face,' in this idiom it refers to the visible aspect
    of the sky. 'Appearance' communicates the sense clearly in modern English.
- source_word: γινώσκετε διακρίνειν
  chosen: know how to discern
  alternatives:
  - know how to interpret
  - can distinguish
  lexicon: BDAG
  rationale: The construction expresses learned ability. 'Know how to discern' preserves
    both the cognitive and evaluative force without becoming too paraphrastic.
- source_word: σημεῖα
  chosen: signs
  alternatives:
  - indications
  - portents
  lexicon: BDAG
  rationale: '''Signs'' is the standard rendering and suits Matthew''s broader usage,
    including evidential and revelatory nuance.'
- source_word: καιρῶν
  chosen: of the times
  alternatives:
  - of the seasons
  - of the appointed times
  lexicon: BDAG
  rationale: καιρός here refers not to weather seasons but significant times or epochs.
    'Of the times' preserves the broader, likely eschatological and situational sense.
- source_word: οὐ δύνασθε
  chosen: you are not able to discern
  alternatives:
  - you cannot discern
  lexicon: BDAG
  rationale: The verb explicitly expresses inability. Repeating 'discern' from the
    prior clause makes the contrast clear, though the infinitive is implied in the
    second clause.
