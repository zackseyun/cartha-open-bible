theological_decisions:
- issue: Rendering of ψυχή in a saying about ultimate loss
  chosen_reading: life
  alternative_readings:
  - soul
  rationale: The verse does not require a narrowed anthropological distinction between body and immaterial soul; ψυχή here denotes the person's life/self in its ultimate value. Rendering it 'life' preserves the broader semantic range and avoids importing a more technical doctrine of the soul than the text itself states. Because 'soul' is a longstanding and plausible rendering with theological resonance, it is preserved in a footnote rather than excluded.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it); §6 (readable modern English, not archaic or academic)
