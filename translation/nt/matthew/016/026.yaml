id: MAT.16.26
reference: Matthew 16:26
source:
  edition: SBLGNT
  text: τί γὰρ ⸀ὠφεληθήσεται ἄνθρωπος ἐὰν τὸν κόσμον ὅλον κερδήσῃ τὴν δὲ ψυχὴν αὐτοῦ ζημιωθῇ; ἢ τί δώσει ἄνθρωπος ἀντάλλαγμα τῆς ψυχῆς αὐτοῦ;
translation:
  text: For what will it profit a man if he gains the whole world but forfeits his life? Or what will a man give in exchange for his life?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his soul' in both occurrences of 'his life.' The Greek word ψυχή can mean 'life,' 'self,' or 'soul,' depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γὰρ
  chosen: For what
  alternatives:
  - For what indeed
  - What for
  lexicon: BDAG
  rationale: τί introduces the rhetorical question ('what?'), and γάρ gives explanatory force linking back to the preceding teaching. 'For what' preserves both the interrogative and the connective better than a bare 'what.'
- source_word: ὠφεληθήσεται
  chosen: will ... be benefited
  alternatives:
  - will it profit
  - will ... gain
  lexicon: BDAG
  rationale: Future passive of ὠφελέω denotes receiving benefit or profit. 'Be benefited' is clear modern English and preserves the passive sense; 'profit' is traditional but less natural here.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a person
  - someone
  lexicon: BDAG
  rationale: The noun is grammatically masculine singular used generically. Per doctrine, gender-accurate over gender-neutral, so 'a man' best matches the representative force of the Greek.
- source_word: ἐὰν
  chosen: if
  alternatives:
  - if ever
  lexicon: BDAG
  rationale: Standard conditional particle introducing the hypothetical scenario.
- source_word: τὸν κόσμον ὅλον
  chosen: the whole world
  alternatives:
  - the entire world
  lexicon: BDAG
  rationale: κόσμος here refers to the world in its totality as the object of gain; ὅλον intensifies comprehensiveness. 'The whole world' is idiomatic and exact.
- source_word: κερδήσῃ
  chosen: gains
  alternatives:
  - wins
  - acquires
  lexicon: BDAG
  rationale: Aorist subjunctive of κερδαίνω means to gain or win. 'Gains' fits the economic contrast with loss/forfeit and sounds natural in English.
- source_word: τὴν δὲ ψυχὴν αὐτοῦ
  chosen: his life
  alternatives:
  - his soul
  - his self
  lexicon: BDAG
  rationale: ψυχή can mean life, self, or soul depending on context. In this saying, the contrast with worldly gain and the parallel 'what will a man give in exchange' points to one's life/self in the fullest sense. 'Life' is the clearest main-text rendering, while 'soul' remains a significant traditional alternative worth preserving in a footnote.
- source_word: ζημιωθῇ
  chosen: forfeits
  alternatives:
  - suffers loss of
  - loses
  lexicon: BDAG
  rationale: Passive of ζημιόω can mean suffer loss, forfeit, or be deprived of. 'Forfeits' captures the sense of losing something of supreme value in exchange for gain, fitting the rhetorical contrast.
- source_word: ἢ τί
  chosen: Or what
  alternatives:
  - Or what indeed
  lexicon: BDAG
  rationale: Introduces the second rhetorical question in parallel with the first.
- source_word: δώσει
  chosen: will ... give
  alternatives:
  - could ... give
  lexicon: BDAG
  rationale: Future indicative of δίδωμι. 'Will give' preserves the Greek form and the rhetorical force.
- source_word: ἀντάλλαγμα
  chosen: in exchange
  alternatives:
  - as a ransom price
  - as compensation
  - as an exchange
  lexicon: BDAG
  rationale: ἀντάλλαγμα denotes something given in return or exchange. 'In exchange' is idiomatic with 'give' and preserves the commercial metaphor without overinterpreting it as ransom terminology.
- source_word: τῆς ψυχῆς αὐτοῦ
  chosen: for his life
  alternatives:
  - for his soul
  lexicon: BDAG
  rationale: Genitive after ἀντάλλαγμα expresses the thing for which an exchange is made. For consistency with the first clause, ψυχή is rendered 'life' in the main text, with 'soul' preserved as a lexical alternative in a footnote.
