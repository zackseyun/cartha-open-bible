id: MAT.16.22
reference: Matthew 16:22
source:
  edition: SBLGNT
  text: καὶ προσλαβόμενος αὐτὸν ὁ Πέτρος ἤρξατο ἐπιτιμᾶν αὐτῷ λέγων· Ἵλεώς σοι, κύριε· οὐ μὴ ἔσται σοι τοῦτο.
translation:
  text: And Peter took him aside and began to rebuke him[a], saying, “Far be it from you, Lord; this will certainly not happen to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “Far be it from you, Lord,” or “God forbid, Lord.” The Greek expression is idiomatic and elliptical.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσλαβόμενος
  chosen: took him aside
  alternatives:
  - took him
  - took hold of him
  - drew him aside
  lexicon: BDAG
  rationale: In this context the middle participle suggests Peter drew Jesus to himself privately rather than merely 'received' him. 'Took him aside' captures the likely nuance of a private interruption before the rebuke.
- source_word: ἤρξατο ἐπιτιμᾶν
  chosen: began to rebuke
  alternatives:
  - started rebuking
  - began to warn sharply
  lexicon: BDAG
  rationale: This is a standard ingressive construction with ἄρχομαι + infinitive. ἐπιτιμάω commonly means 'rebuke' or 'censure sharply'; 'rebuke' is the most direct and idiomatic rendering.
- source_word: Ἵλεώς σοι
  chosen: May God be merciful to you
  alternatives:
  - Far be it from you
  - Mercy to you
  - God forbid
  lexicon: BDAG
  rationale: The expression is elliptical and idiomatic, literally involving 'merciful/favorable to you.' 'May God be merciful to you' makes the sense explicit in natural English without using the traditional but less transparent 'Be it far from you.' Because the phrase is idiomatic and debated, key alternatives are preserved in a footnote.
- source_word: κύριε
  chosen: Lord
  alternatives:
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' Here Peter addresses Jesus respectfully; 'Lord' preserves both the lexical value and the Gospel's christological resonance.
- source_word: οὐ μὴ ἔσται σοι τοῦτο
  chosen: this will certainly not happen to you
  alternatives:
  - this shall never happen to you
  - this will never be for you
  lexicon: BDAG
  rationale: οὐ μὴ with the future is an emphatic negation. 'Will certainly not happen' conveys the force in contemporary English. 'To you' reflects σοι naturally in context.
