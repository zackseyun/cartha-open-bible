theological_decisions:
- issue: Rendering Peter's protest without importing more theology than the text states
  chosen_reading: May God be merciful to you, Lord; this will certainly not happen to you.
  alternative_readings:
  - Far be it from you, Lord; this shall never happen to you.
  - God forbid, Lord! This shall never happen to you.
  rationale: The Greek idiom Ἵλεώς σοι is difficult and elliptical. The chosen rendering preserves the likely appeal for divine favor/mercy while avoiding the English idiom 'God forbid,' which can sound like a translator-supplied exclamation rather than a transparent rendering of the Greek. Alternatives are preserved because the phrase is genuinely idiomatic and traditional translations vary.
  doctrine_reference: Translation philosophy §§1, 3, 6; Contested terms table for κύριος
