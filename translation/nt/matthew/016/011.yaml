theological_decisions:
- issue: Metaphorical force of 'leaven'
  chosen_reading: Retain the metaphor 'leaven' in the main text without explicating it as 'teaching' here.
  alternative_readings:
  - But beware of the teaching of the Pharisees and Sadducees
  rationale: The immediate context in the next verse explains the metaphor, but this verse itself uses ζύμη figuratively. Preserving the metaphor maintains the wording of the source and avoids importing the explanation into the verse prematurely.
