id: MAT.16.11
reference: Matthew 16:11
source:
  edition: SBLGNT
  text: πῶς οὐ νοεῖτε ὅτι οὐ περὶ ⸀ἄρτων εἶπον ὑμῖν; ⸂προσέχετε δὲ⸃ ἀπὸ τῆς ζύμης τῶν Φαρισαίων καὶ Σαδδουκαίων.
translation:
  text: How do you not understand that I did not speak to you about bread? But beware of the leaven of the Pharisees and Sadducees[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'watch out for the leaven of the Pharisees and Sadducees.'
    reason: lexical_alternative
  - marker: b
    text: '''Leaven'' is a metaphor here; in the following verse it is explained as the teaching of the Pharisees and Sadducees.'
    reason: cross_reference
lexical_decisions:
- source_word: πῶς οὐ νοεῖτε
  chosen: How do you not understand
  alternatives:
  - How is it that you do not understand
  - Why do you not understand
  lexicon: BDAG
  rationale: πῶς with οὐ and νοέω forms a rebuking question about failure to grasp the point. 'Understand' is the most natural modern English equivalent for νοέω here; 'How do you not understand' preserves the rhetorical force without over-paraphrase.
- source_word: ὅτι οὐ περὶ ἄρτων εἶπον ὑμῖν
  chosen: that I did not speak to you about bread
  alternatives:
  - that I did not tell you about bread
  - that I was not speaking to you about loaves
  lexicon: BDAG
  rationale: περὶ ἄρτων is most naturally 'about bread' in this context. Although ἄρτων is plural ('loaves/breads'), English idiom prefers the mass noun 'bread' here. εἶπον ὑμῖν is rendered 'I did not speak to you' to keep the verbal sense straightforward.
- source_word: προσέχετε
  chosen: beware
  alternatives:
  - watch out
  - pay attention
  lexicon: BDAG
  rationale: In this context προσέχω is an imperative warning, not merely a call to attention. 'Beware' best captures the cautionary force and fits the following ἀπό phrase.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: δέ marks a mild contrast or transition. 'But' fits the corrective movement from misunderstanding about literal bread to the actual warning.
- source_word: ἀπὸ τῆς ζύμης
  chosen: of the leaven
  alternatives:
  - against the leaven
  - from the yeast
  lexicon: BDAG
  rationale: With προσέχετε, ἀπό indicates guarding oneself from something. 'Leaven' preserves the metaphor and biblical resonance better than 'yeast,' while remaining understandable in context.
- source_word: τῶν Φαρισαίων καὶ Σαδδουκαίων
  chosen: of the Pharisees and Sadducees
  lexicon: BDAG
  rationale: 'Standard transliterations for these Jewish groups are appropriate. The genitive is possessive/associative: the leaven belonging to or characteristic of the Pharisees and Sadducees.'
