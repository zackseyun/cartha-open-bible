id: MAT.16.7
reference: Matthew 16:7
source:
  edition: SBLGNT
  text: οἱ δὲ διελογίζοντο ἐν ἑαυτοῖς λέγοντες ὅτι Ἄρτους οὐκ ἐλάβομεν.
translation:
  text: And they were discussing among themselves, saying, “We did not bring bread.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “we did not take bread with us.”
    reason: lexical_alternative
lexical_decisions:
- source_word: διελογίζοντο
  chosen: were discussing
  alternatives:
  - were reasoning
  - were debating
  - were discussing among themselves
  lexicon: BDAG
  rationale: The imperfect middle indicates an ongoing internal discussion/deliberation.
    'Were discussing' is natural modern English and fits the context of the disciples
    trying to interpret Jesus' statement.
- source_word: ἐν ἑαυτοῖς
  chosen: among themselves
  alternatives:
  - within themselves
  - among themselves internally
  lexicon: BDAG
  rationale: The phrase marks discussion within their own group rather than public
    speech. 'Among themselves' is the idiomatic English equivalent in this narrative
    context.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - saying to one another
  lexicon: BDAG
  rationale: The participle introduces the content of their discussion and is naturally
    rendered with 'saying' in English.
- source_word: ὅτι
  chosen: It is because
  alternatives:
  - because
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι introduces the substance of their reasoning: they infer Jesus
    spoke as he did because of their failure regarding bread. ''It is because'' makes
    the implied ellipsis explicit in clear English without adding foreign content.'
- source_word: Ἄρτους
  chosen: bread
  alternatives:
  - loaves
  - bread loaves
  lexicon: BDAG
  rationale: Although plural, ἄρτους in this context refers generically to bread/loaves
    as provisions. English commonly uses the mass noun 'bread' naturally here. 'Loaves'
    is possible, but 'bread' better fits contemporary readable English.
- source_word: οὐκ ἐλάβομεν
  chosen: we did not bring
  alternatives:
  - we did not take
  - we did not receive
  - we did not bring with us
  lexicon: BDAG
  rationale: 'λαμβάνω literally means ''take/receive,'' but in travel/provision contexts
    it idiomatically refers to taking along. ''Bring'' best conveys the disciples''
    meaning in English: they failed to bring bread with them.'
- source_word: οἱ δὲ
  chosen: And they
  alternatives:
  - But they
  - Now they
  lexicon: BDAG
  rationale: δέ is a mild connective. 'And' preserves narrative flow smoothly in English
    without overstating contrast.
