id: MAT.16.10
reference: Matthew 16:10
source:
  edition: SBLGNT
  text: οὐδὲ τοὺς ἑπτὰ ἄρτους τῶν τετρακισχιλίων καὶ πόσας σπυρίδας ἐλάβετε;
translation:
  text: Or the seven loaves for the four thousand, and how many large baskets you
    picked up?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nor the seven loaves of the four thousand, and how many large baskets
      you took up?'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  chosen: Or
  alternatives:
  - Nor
  lexicon: BDAG
  rationale: In this elliptical continuation of Jesus' question sequence, οὐδὲ introduces
    the next item in a series best rendered idiomatically as 'Or' in English. 'Nor'
    is possible but sounds less natural after the preceding rhetorical questions when
    this verse stands alone.
- source_word: τοὺς ἑπτὰ ἄρτους
  chosen: the seven loaves
  alternatives:
  - the seven breads
  lexicon: BDAG
  rationale: ἄρτους refers to loaves of bread in the feeding narrative context. 'Loaves'
    is the natural English equivalent and preserves the concrete image.
- source_word: τῶν τετρακισχιλίων
  chosen: for the four thousand
  alternatives:
  - of the four thousand
  lexicon: BDAG
  rationale: The genitive is contextually associated with the feeding of the four
    thousand. English idiom is clearer with 'for the four thousand,' expressing the
    relationship implied in context.
- source_word: πόσας
  chosen: how many
  alternatives:
  - how many of
  lexicon: BDAG
  rationale: πόσας is an interrogative adjective modifying σπυρίδας; 'how many' is
    the straightforward rendering in English.
- source_word: σπυρίδας
  chosen: large baskets
  alternatives:
  - baskets
  - hamper-baskets
  lexicon: BDAG
  rationale: σπυρίς denotes a larger kind of basket than κόφινος in the parallel feeding
    account. Rendering it 'large baskets' preserves the lexical distinction that is
    significant in the Gospel narratives.
- source_word: ἐλάβετε
  chosen: you picked up
  alternatives:
  - you took up
  - you collected
  lexicon: BDAG
  rationale: In this context of gathering leftovers after a feeding miracle, 'picked
    up' is natural modern English and accurately conveys the action of collecting
    what remained.
