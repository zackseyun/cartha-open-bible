id: MAT.16.20
reference: Matthew 16:20
source:
  edition: SBLGNT
  text: τότε ⸀διεστείλατο τοῖς ⸀μαθηταῖς ἵνα μηδενὶ εἴπωσιν ὅτι αὐτός ⸀ἐστιν ὁ χριστός.
translation:
  text: Then he strictly instructed the disciples to tell no one that he is the Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Christ.' The Greek title Χριστός is rendered 'Messiah' here to
      preserve its meaning as a title.
    reason: alternative_reading
lexical_decisions:
- source_word: τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal adverb marking sequence in the narrative; 'Then' is the natural
    concise English equivalent.
- source_word: διεστείλατο
  chosen: strictly instructed
  alternatives:
  - warned
  - ordered
  - charged
  lexicon: BDAG
  rationale: The middle of διαστέλλομαι here conveys a strong directive or injunction.
    'Strictly instructed' preserves the force without sounding archaic; 'warned' is
    possible but can imply danger rather than command.
- source_word: τοῖς μαθηταῖς
  chosen: the disciples
  alternatives:
  - his disciples
  lexicon: BDAG
  rationale: Definite plural noun referring to the known group of Jesus' followers.
    'The disciples' is sufficient in context; 'his' is implied and need not be added.
- source_word: ἵνα μηδενὶ εἴπωσιν
  chosen: to tell no one
  alternatives:
  - that they should tell no one
  - to say to no one
  lexicon: BDAG
  rationale: ἵνα with the subjunctive expresses the content/purpose of the command.
    'To tell no one' is idiomatic modern English and accurately conveys the prohibition.
- source_word: ὅτι
  chosen: that
  alternatives:
  - about how
  lexicon: BDAG
  rationale: Introduces the content of what was not to be said.
- source_word: αὐτός ἐστιν
  chosen: he is
  alternatives:
  - he himself is
  lexicon: BDAG
  rationale: Simple predication. The pronoun is explicit in Greek but does not require
    emphatic 'himself' in English here.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός as a title should be translated 'Messiah' rather
    than transliterated 'Christ.' The article marks it as the recognized messianic
    title.
