  chosen_reading: A rebuke of the disciples' inadequate trust, rendered without expanding into a broader doctrinal statement.
  alternative_readings:
  - A milder description of misunderstanding without emphasis on faith
  rationale: The term directly critiques deficient faith/trust in the immediate situation. The translation preserves that theological force but does not import later doctrinal categories beyond the text.
