id: MAT.16.8
reference: Matthew 16:8
source:
  edition: SBLGNT
  text: γνοὺς δὲ ὁ Ἰησοῦς ⸀εἶπεν· Τί διαλογίζεσθε ἐν ἑαυτοῖς, ὀλιγόπιστοι, ὅτι ἄρτους οὐκ ⸀ἐλάβετε;
translation:
  text: But Jesus[a], knowing this, said, “Why are you discussing among yourselves, you of little faith, that you have no bread?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, “you did not bring loaves.”
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  chosen: knowing this
  alternatives:
  - becoming aware
  - perceiving
  lexicon: BDAG
  rationale: Aorist participle of γινώσκω introducing Jesus' awareness prior to speaking. 'Knowing this' is natural English and captures the participial sense; 'this' is supplied from context because the object is implicit in Greek.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or transition. 'But' fits the narrative turn as Jesus responds to the disciples' internal discussion.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - asked
  - spoke
  lexicon: BDAG
  rationale: Standard rendering of λέγω in narrative introduction. Although the content is a question, English commonly uses 'said' before direct discourse.
- source_word: Τί
  chosen: Why
  alternatives:
  - What
  lexicon: BDAG
  rationale: In this idiom with διαλογίζεσθε and ὅτι-clause, τί functions adverbially, asking the reason for their discussion rather than requesting the content alone. 'Why' best reflects the sense in context.
- source_word: διαλογίζεσθε
  chosen: are you discussing
  alternatives:
  - are you reasoning
  - are you debating
  lexicon: BDAG
  rationale: The middle/passive form here refers to the disciples' deliberation among themselves. 'Discussing' is readable modern English and fits the immediate context of their conversation.
- source_word: ἐν ἑαυτοῖς
  chosen: among yourselves
  alternatives:
  - within yourselves
  - among one another
  lexicon: BDAG
  rationale: The phrase can mean either inwardly or among themselves; in this context the disciples are conversing together, so 'among yourselves' best matches the scene.
- source_word: ὀλιγόπιστοι
  chosen: you of little faith
  alternatives:
  - you who have little faith
  - you small-faith ones
  lexicon: BDAG
  rationale: A direct vocative rebuke. 'You of little faith' preserves the idiomatic force and familiar Matthean expression without sounding overly wooden.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'Introduces the content of what they are discussing: namely, that they have no bread. ''That'' better fits the discourse structure here than a causal ''because'' in English.'
- source_word: ἄρτους
  chosen: bread
  alternatives:
  - loaves
  lexicon: BDAG
  rationale: Plural 'loaves' is more literal, but English often uses mass noun 'bread' naturally in this context. Since the concern is provision of bread generally, singular mass-noun English is idiomatic while preserving meaning.
- source_word: οὐκ ἐλάβετε
  chosen: you have no bread
  alternatives:
  - you did not take bread
  - you did not bring bread
  lexicon: BDAG
  rationale: λαμβάνω literally means 'receive/take,' and in context refers to their failure to bring bread along. The resulting state is their lack of bread, which English expresses naturally as 'you have no bread.' This is a modest contextual smoothing consistent with optimal equivalence.
