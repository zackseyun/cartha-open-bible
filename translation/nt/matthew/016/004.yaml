theological_decisions:
- issue: Meaning of 'adulterous generation'
  chosen_reading: Retain the metaphor 'adulterous' in the main text, allowing both
    moral and covenant-unfaithfulness connotations.
  alternative_readings:
  - Render interpretively as 'unfaithful generation'
  rationale: The phrase likely echoes prophetic language for spiritual infidelity,
    but the Greek itself uses the adultery metaphor. Preserving the metaphor maintains
    theological tension rather than resolving it into a single interpretive gloss.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather
    than resolve it
- issue: Meaning of 'the sign of Jonah'
  chosen_reading: Keep the phrase untranslated beyond a literal rendering, without
    specifying resurrection in the main text.
  alternative_readings:
  - Interpret explicitly as a reference to Jesus' death and resurrection
  rationale: Matthew elsewhere explains the Jonah typology (12:39–40), but this verse
    itself leaves the phrase concise. The translation should not import the fuller
    interpretation into the main text.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation
    tradition; §3 Preserve theological tension rather than resolve it
