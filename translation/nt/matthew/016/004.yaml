id: MAT.16.4
reference: Matthew 16:4
source:
  edition: SBLGNT
  text: Γενεὰ πονηρὰ καὶ μοιχαλὶς σημεῖον ἐπιζητεῖ, καὶ σημεῖον οὐ δοθήσεται αὐτῇ
    εἰ μὴ τὸ σημεῖον ⸀Ἰωνᾶ. καὶ καταλιπὼν αὐτοὺς ἀπῆλθεν.
translation:
  text: An evil and adulterous generation seeks a sign, and no sign will be given
    to it except the sign of Jonah. And leaving them, he went away.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'unfaithful generation.' The Greek says 'adulterous,' likely echoing
      prophetic language of covenant infidelity.
    reason: lexical_alternative
  - marker: b
    text: '''The sign of Jonah'' is explained in Matthew 12:39–40 as referring to
      Jonah''s three days and three nights, a pattern applied to the Son of Man.'
    reason: cross_reference
lexical_decisions:
- source_word: Γενεὰ
  chosen: generation
  alternatives:
  - people
  - age
  lexicon: BDAG
  rationale: γενεά commonly denotes a generation or kind of people. 'Generation' preserves
    the established sense in Matthew for the present unbelieving cohort without over-paraphrasing.
- source_word: πονηρὰ
  chosen: evil
  alternatives:
  - wicked
  lexicon: BDAG
  rationale: '''Evil'' is the most direct and natural rendering of πονηρός here, describing
    moral corruption. ''Wicked'' is possible but slightly more stylized.'
- source_word: μοιχαλὶς
  chosen: adulterous
  alternatives:
  - unfaithful
  lexicon: BDAG
  rationale: Though literally related to adultery, in prophetic and Jewish scriptural
    usage this can carry covenant-unfaithfulness overtones. 'Adulterous' preserves
    the metaphor and its sharpness better than the interpretive 'unfaithful'.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - miraculous sign
  lexicon: BDAG
  rationale: σημεῖον is best rendered 'sign' here. The context concerns a demanded
    validating wonder, but adding 'miraculous' in the main text would over-specify
    what the Greek leaves implicit.
- source_word: ἐπιζητεῖ
  chosen: seeks
  alternatives:
  - demands
  - looks for
  lexicon: BDAG
  rationale: ἐπιζητέω can mean seek, look for, or demand earnestly. 'Seeks' is the
    most straightforward rendering; the hostile nuance is supplied by context rather
    than forced into the verb.
- source_word: δοθήσεται
  chosen: will be given
  alternatives:
  - will be granted
  lexicon: BDAG
  rationale: The future passive of δίδωμι is naturally rendered 'will be given.' 'Granted'
    is possible but less direct.
- source_word: αὐτῇ
  chosen: to it
  alternatives:
  - to this generation
  - to her
  lexicon: BDAG
  rationale: The pronoun is feminine singular agreeing with γενεά. English idiom prefers
    'to it' for the collective noun, though the referent is the generation. 'To this
    generation' is clearer but less formally tied to the pronoun.
- source_word: εἰ μὴ
  chosen: except
  alternatives:
  - unless
  lexicon: BDAG
  rationale: 'In this construction εἰ μὴ introduces the sole exception: no sign except
    one. ''Except'' is the clearest English equivalent.'
- source_word: τὸ σημεῖον Ἰωνᾶ
  chosen: the sign of Jonah
  alternatives:
  - the sign of Jonas
  lexicon: BDAG
  rationale: The genitive is best rendered 'of Jonah.' This preserves the ambiguity
    of the phrase as in Matthew 12:39–40, without importing an explanatory gloss into
    the main text.
- source_word: καταλιπὼν
  chosen: leaving
  alternatives:
  - having left
  lexicon: BDAG
  rationale: The aorist participle is naturally rendered with an English participle
    preceding the main verb. 'Leaving' is smooth and accurate.
- source_word: ἀπῆλθεν
  chosen: he went away
  alternatives:
  - he departed
  - he left
  lexicon: BDAG
  rationale: ἀπέρχομαι here indicates departure from them. 'He went away' is readable
    modern English and preserves the movement sense.
