id: MAT.16.2
reference: Matthew 16:2
source:
  edition: SBLGNT
  text: ὁ δὲ ἀποκριθεὶς εἶπεν αὐτοῖς· ⸂Ὀψίας γενομένης λέγετε· Εὐδία, πυρράζει γὰρ
    ὁ οὐρανός·
translation:
  text: But he answered and said to them, “When evening comes, you say, ‘Fair weather,
    for the sky is red.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the heaven is red.' In this context, the Greek word can mean either
      'sky' or 'heaven,' but the weather saying clearly points to 'sky.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: A standard participial idiom with εἶπεν ('answered and said'). 'Answered'
    preserves the Greek form and discourse function without unnecessary smoothing.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Default rendering of λέγω in narrative speech introduction; paired with
    ἀποκριθεὶς as the common formula 'answered and said.'
- source_word: Ὀψίας γενομένης
  chosen: When evening comes
  alternatives:
  - When evening has come
  - At evening
  lexicon: BDAG
  rationale: Genitive absolute indicating time. 'When evening comes' is natural modern
    English while preserving the temporal sense.
- source_word: λέγετε
  chosen: you say
  alternatives:
  - you are saying
  lexicon: BDAG
  rationale: Present tense here expresses customary speech or repeated observation;
    simple present in English best captures the proverbial force.
- source_word: Εὐδία
  chosen: Fair weather
  alternatives:
  - Clear weather
  - Good weather
  lexicon: BDAG
  rationale: Refers to favorable weather conditions. 'Fair weather' is idiomatic English
    and fits the weather proverb context.
- source_word: πυρράζει
  chosen: is red
  alternatives:
  - glows red
  - is fiery red
  lexicon: BDAG
  rationale: Describes the sky's reddish appearance. 'Is red' is concise and natural;
    stronger renderings like 'fiery red' are possible but less idiomatic in this proverb.
- source_word: οὐρανός
  chosen: sky
  alternatives:
  - heaven
  lexicon: BDAG
  rationale: In a meteorological context οὐρανός refers to the visible sky, not the
    theological 'heaven.' This follows original-language sense over traditional ambiguity.
