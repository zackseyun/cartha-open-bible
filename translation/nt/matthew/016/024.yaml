id: MAT.16.24
reference: Matthew 16:24
source:
  edition: SBLGNT
  text: Τότε ὁ Ἰησοῦς εἶπεν τοῖς μαθηταῖς αὐτοῦ· Εἴ τις θέλει ὀπίσω μου ἐλθεῖν, ἀπαρνησάσθω
    ἑαυτὸν καὶ ἀράτω τὸν σταυρὸν αὐτοῦ καὶ ἀκολουθείτω μοι.
translation:
  text: Then Jesus said to his disciples, “If anyone wants to come after me, let him
    deny himself and take up his cross and follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more inclusively in English, 'If anyone wants to come after me, let
      them deny themselves and take up their cross and follow me.' The Greek is singular
      and grammatically masculine, used here in a representative sense.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τότε
  chosen: Then
  alternatives:
  - At that time
  lexicon: BDAG
  rationale: Temporal discourse marker introducing the next event in sequence; 'Then'
    is natural and sufficiently formal.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - told
  lexicon: BDAG
  rationale: Standard rendering of λέγω in narrative; 'said' preserves the direct-speech
    introduction without adding nuance.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: to his disciples
  alternatives:
  - to his learners
  - to his followers
  lexicon: BDAG
  rationale: '''Disciples'' is the established and accurate rendering of μαθηταί in
    Gospel context, preserving the teacher-follower relationship better than looser
    alternatives.'
- source_word: Εἴ τις θέλει
  chosen: If anyone wants
  alternatives:
  - If anyone wishes
  - If someone wants
  lexicon: BDAG
  rationale: Conditional construction with indefinite τις and θέλω expresses volition.
    'Anyone' captures the generic scope; 'wants' is readable modern English.
- source_word: ὀπίσω μου ἐλθεῖν
  chosen: to come after me
  alternatives:
  - to come behind me
  - to follow after me
  lexicon: BDAG
  rationale: Idiomatic expression for discipleship. 'Come after me' preserves the
    metaphor and avoids prematurely collapsing it into the later explicit verb 'follow'
    (ἀκολουθείτω).
- source_word: ἀπαρνησάσθω ἑαυτὸν
  chosen: let him deny himself
  alternatives:
  - he must deny himself
  - let him renounce himself
  lexicon: BDAG
  rationale: Aorist middle imperative calls for decisive self-denial. 'Deny himself'
    is the most direct and established rendering. 'Let him' reflects the third-person
    imperative naturally in English. Masculine singular is retained as representative/generic
    per gender-accurate policy.
- source_word: ἀράτω
  chosen: take up
  alternatives:
  - pick up
  - carry
  lexicon: BDAG
  rationale: Aorist imperative of αἴρω here means to take up or lift for carrying.
    'Take up' is idiomatic in this collocation with 'cross' and preserves the solemn
    force.
- source_word: τὸν σταυρὸν αὐτοῦ
  chosen: his cross
  alternatives:
  - the cross that is his
  lexicon: BDAG
  rationale: σταυρός is literally 'cross.' The possessive pronoun is retained as 'his,'
    matching the Greek and preserving the individualized cost of discipleship.
- source_word: ἀκολουθείτω μοι
  chosen: follow me
  alternatives:
  - keep following me
  - be following me
  lexicon: BDAG
  rationale: Present imperative suggests ongoing action, but in English 'follow me'
    adequately conveys the command without awkwardness. The durative nuance is implicit
    in the discipleship context.
