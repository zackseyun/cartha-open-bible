theological_decisions:
- issue: Generic masculine forms in the conditional and imperatives
  chosen_reading: 'Retain masculine singular in English: ''If anyone... let him deny
    himself'''
  alternative_readings:
  - 'Use gender-neutral forms: ''If anyone... let them deny themselves'''
  rationale: The Greek uses τις with masculine singular imperatives and reflexive
    pronoun. Per doctrine, gender-accurate over gender-neutral, representative masculine
    should be reflected in English where it matches source intent. 'Anyone' preserves
    the universal scope, while 'let him... himself' mirrors the singular grammar.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
