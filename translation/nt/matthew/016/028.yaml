id: MAT.16.28
reference: Matthew 16:28
source:
  edition: SBLGNT
  text: ἀμὴν λέγω ὑμῖν ⸀ὅτι εἰσίν τινες ⸂τῶν ὧδε ἑστώτων⸃ οἵτινες οὐ μὴ γεύσωνται
    θανάτου ἕως ἂν ἴδωσιν τὸν υἱὸν τοῦ ἀνθρώπου ἐρχόμενον ἐν τῇ βασιλείᾳ αὐτοῦ.
translation:
  text: Truly I tell you, there are some standing here who will certainly not taste
    death until they see the Son of Man coming in his kingdom.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'will by no means taste death'; the Greek uses an emphatic negation.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the Son of Man coming in his kingdom' may refer to the transfiguration,
      resurrection/exaltation, judgment on Jerusalem, or the final coming; the text
      itself does not specify which event.
    reason: alternative_reading
  - marker: c
    text: Or 'in his reign' or 'in his royal rule.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  chosen: Truly
  alternatives:
  - Amen
  - Truly, truly
  lexicon: BDAG
  rationale: Used as a solemn affirmation introducing an authoritative saying. 'Truly'
    communicates the force idiomatically in modern English without unnecessary transliteration.
- source_word: λέγω ὑμῖν
  chosen: I tell you
  alternatives:
  - I say to you
  lexicon: BDAG
  rationale: A natural modern-English rendering of the present formula while preserving
    direct address and solemnity.
- source_word: ὅτι
  chosen: that / implied after comma
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of the saying. In English it is naturally represented
    by punctuation rather than an explicit 'that' after 'I tell you.'
- source_word: εἰσίν τινες
  chosen: there are some
  alternatives:
  - some are
  lexicon: BDAG
  rationale: Existential construction is best rendered idiomatically as 'there are
    some.'
- source_word: τῶν ὧδε ἑστώτων
  chosen: standing here
  alternatives:
  - of those standing here
  - who are standing here
  lexicon: BDAG
  rationale: The genitive participial phrase identifies a subset of those present.
    'Standing here' is concise and natural; the partitive sense is already conveyed
    by 'some.'
- source_word: οἵτινες
  chosen: who
  alternatives:
  - who indeed
  - such as
  lexicon: BDAG
  rationale: Relative pronoun introducing the defining clause. English does not require
    the fuller nuance of οἵτινες here.
- source_word: οὐ μὴ γεύσωνται
  chosen: will certainly not taste
  alternatives:
  - will by no means taste
  - will never taste
  lexicon: BDAG
  rationale: οὐ μή with the aorist subjunctive is an emphatic negation. 'Will certainly
    not' preserves the strong force in readable English.
- source_word: γεύσωνται θανάτου
  chosen: taste death
  alternatives:
  - experience death
  - die
  lexicon: BDAG
  rationale: The idiom literally means 'taste death.' Retaining it preserves the vivid
    metaphor and its established biblical resonance while remaining understandable.
- source_word: ἕως ἂν ἴδωσιν
  chosen: until they see
  alternatives:
  - until they have seen
  lexicon: BDAG
  rationale: Standard temporal construction with ἕως ἄν and subjunctive referring
    to a future event. 'Until they see' is the most natural equivalent.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  chosen: the Son of Man
  lexicon: BDAG
  rationale: Fixed self-designation/title used by Jesus. It should be translated,
    not paraphrased, preserving both its idiomatic and apocalyptic resonance.
- source_word: ἐρχόμενον
  chosen: coming
  alternatives:
  - coming with power
  - arriving
  lexicon: BDAG
  rationale: Present participle modifying 'the Son of Man.' 'Coming' is the direct
    and contextually appropriate rendering; 'with power' is not present in this verse
    and should not be imported from parallels.
- source_word: ἐν τῇ βασιλείᾳ αὐτοῦ
  chosen: in his kingdom
  alternatives:
  - in his royal reign
  - in the kingdom that is his
  lexicon: BDAG
  rationale: βασιλεία can denote reign or kingdom. Here 'in his kingdom' preserves
    the concrete wording and traditional apocalyptic sense without over-interpreting
    whether emphasis falls on realm or reign.
