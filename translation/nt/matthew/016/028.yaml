theological_decisions:
- issue: Referent of 'the Son of Man coming in his kingdom'
  chosen_reading: Render the phrase straightforwardly without specifying whether it
    refers to the transfiguration, resurrection/exaltation, Jerusalem's judgment,
    Pentecost, or the final coming.
  alternative_readings:
  - transfiguration
  - resurrection/exaltation
  - coming in judgment on Jerusalem
  - Pentecost
  - eschatological return
  rationale: The verse is interpretively disputed, and the Greek itself does not identify
    the event with precision. Per translation philosophy, the wording should preserve
    the theological tension rather than resolve it in translation.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
- issue: Force of βασιλεία
  chosen_reading: kingdom
  alternative_readings:
  - reign
  - royal rule
  rationale: Both 'kingdom' and 'reign' are lexically possible. 'Kingdom' better preserves
    the wording and imagery here while avoiding an interpretive narrowing to an abstract
    concept of rule alone.
  doctrine_reference: 'Translation philosophy §5: Consistency of key terms, or documented
    exception.'
