id: MAT.16.15
reference: Matthew 16:15
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς· Ὑμεῖς δὲ τίνα με λέγετε εἶναι;
translation:
  text: He says to them, “But who do you say that I am?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “But you, who do you say me to be?” The Greek uses an
      accusative-and-infinitive construction, expressed idiomatically in English as
      “who do you say that I am?”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: He says
  alternatives:
  - He said
  lexicon: BDAG
  rationale: Present-tense historical narrative is common in Greek. Rendering it as
    English present ('He says') preserves the vividness of the historical present
    more closely than smoothing to past tense.
- source_word: αὐτοῖς
  chosen: to them
  lexicon: BDAG
  rationale: Dative plural pronoun indicating the indirect object of speech; straightforwardly
    rendered 'to them'.
- source_word: Ὑμεῖς
  chosen: you
  alternatives:
  - you yourselves
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek. English can convey much of
    this emphasis by word order with 'But who do you say...'; 'you yourselves' would
    be more explicit but less natural.
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Here δέ marks a contrast between others' opinions in the preceding context
    and the disciples' own confession. 'But' best preserves that adversative force.
- source_word: τίνα
  chosen: who
  alternatives:
  - whom
  lexicon: BDAG
  rationale: Accusative interrogative pronoun functioning as the predicate complement
    in indirect discourse. Idiomatic modern English prefers 'who' rather than the
    more formal 'whom' in this construction.
- source_word: με
  chosen: I
  alternatives:
  - me
  lexicon: BDAG
  rationale: Although με is the accusative subject of the infinitive εἶναι in Greek
    indirect discourse ('me to be'), idiomatic English restructures this as 'that
    I am,' requiring nominative 'I'.
- source_word: λέγετε
  chosen: do you say
  alternatives:
  - are you saying
  lexicon: BDAG
  rationale: Present active indicative, second person plural. The simple present with
    auxiliary 'do' is the most natural English interrogative equivalent.
- source_word: εἶναι
  chosen: that I am
  alternatives:
  - me to be
  lexicon: BDAG
  rationale: Infinitive of being in accusative-and-infinitive indirect discourse.
    English normally renders this with a finite clause, 'that I am,' rather than a
    literal but awkward infinitival construction.
