theological_decisions:
- issue: Emphasis of the disciples' personal confession
  chosen_reading: Render the contrast as 'But who do you say that I am?'
  alternative_readings:
  - And you, who do you say I am?
  - But you, who do you say I am?
  rationale: The verse pivots from public opinion to the disciples' own assessment.
    The chosen wording preserves the contrast without overinterpreting the emphasis
    or importing a doctrinal confession not yet stated in this verse.
