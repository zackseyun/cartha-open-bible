theological_decisions:
- issue: Metaphorical force of 'leaven'
  chosen_reading: Retain 'leaven' as a metaphor without explicating it in the main text.
  alternative_readings:
  - teaching
  - influence
  rationale: In the immediate literary context Jesus later explains the metaphor with reference to teaching, but this verse itself uses the figurative term ζύμη. Preserving the metaphor avoids importing the explanation prematurely while remaining clear enough in English.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
