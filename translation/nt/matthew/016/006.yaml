id: MAT.16.6
reference: Matthew 16:6
source:
  edition: SBLGNT
  text: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς· Ὁρᾶτε καὶ προσέχετε ἀπὸ τῆς ζύμης τῶν Φαρισαίων καὶ Σαδδουκαίων.
translation:
  text: But Jesus said to them[a], “Watch out and beware of the leaven of the Pharisees and Sadducees.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'yeast.' The Greek uses 'leaven,' a metaphor Jesus later explains in relation to the teaching or influence of the Pharisees and Sadducees.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  chosen: But
  alternatives:
  - And
  - Now
  lexicon: BDAG
  rationale: Marks a mild contrast or transition with the preceding context; 'But' fits the discourse flow in English better than a bare 'And' here.
- source_word: εἶπεν αὐτοῖς
  chosen: said to them
  alternatives:
  - told them
  lexicon: BDAG
  rationale: Standard rendering of λέγω with indirect object; 'said to them' is more formally transparent than 'told them'.
- source_word: Ὁρᾶτε
  chosen: Watch out
  alternatives:
  - See
  - Take heed
  - Be on guard
  lexicon: BDAG
  rationale: Imperative of ὁράω here functions idiomatically as a warning. 'Watch out' conveys the alerting force in natural modern English.
- source_word: προσέχετε
  chosen: beware
  alternatives:
  - pay attention
  - be on guard
  - take heed
  lexicon: BDAG
  rationale: The verb intensifies the warning alongside Ὁρᾶτε. Rendering the pair as 'Watch out and beware' preserves the rhetorical doubling without sounding wooden.
- source_word: ἀπὸ
  chosen: of
  alternatives:
  - from
  lexicon: BDAG
  rationale: With verbs of warning/guarding, ἀπό can be rendered idiomatically in English as 'beware of.' A more literal 'beware from' would be unnatural.
- source_word: ζύμης
  chosen: leaven
  alternatives:
  - yeast
  lexicon: BDAG
  rationale: '''Leaven'' preserves the metaphorical and biblical resonance of ζύμη better than ''yeast,'' especially since the saying is figurative and later explained in context.'
- source_word: Φαρισαίων
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
- source_word: Σαδδουκαίων
  chosen: Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the group name.
