id: MAT.16.17
reference: Matthew 16:17
source:
  edition: SBLGNT
  text: ⸂ἀποκριθεὶς δὲ⸃ ὁ Ἰησοῦς εἶπεν αὐτῷ· Μακάριος εἶ, Σίμων Βαριωνᾶ, ὅτι σὰρξ
    καὶ αἷμα οὐκ ἀπεκάλυψέν σοι ἀλλ’ ὁ πατήρ μου ὁ ἐν τοῖς οὐρανοῖς·
translation:
  text: And Jesus answered him, “Blessed are you, Simon Bar-Jonah, because flesh and
    blood did not reveal this to you, but my Father who is in heaven did.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Simon son of Jonah.' The Greek preserves an Aramaic patronymic form,
      here transliterated as 'Bar-Jonah.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'flesh and blood,' an idiom for human beings or merely human source.
    reason: cultural_note
  - marker: c
    text: Greek 'in the heavens'; rendered 'in heaven' as standard English idiom.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς δὲ ... εἶπεν
  chosen: And Jesus answered him
  alternatives:
  - And in answer Jesus said to him
  - But Jesus answered and said to him
  lexicon: BDAG
  rationale: The participle + finite verb is a common Semitic-influenced Greek construction
    meaning 'answered and said.' In natural modern English, 'answered him' conveys
    the sense without unnecessary redundancy. δέ is rendered 'And' here to continue
    the narrative smoothly.
- source_word: Μακάριος
  chosen: Blessed
  alternatives:
  - Happy
  - Fortunate
  lexicon: BDAG
  rationale: '''Blessed'' preserves the covenantal and theological weight of μακάριος
    in Jesus'' speech better than the more psychological ''happy'' or the flatter
    ''fortunate.'''
- source_word: Σίμων Βαριωνᾶ
  chosen: Simon Bar-Jonah
  alternatives:
  - Simon son of Jonah
  lexicon: BDAG
  rationale: Following the philosophy of transliterating personal names, Σίμων is
    rendered 'Simon' and Βαριωνᾶ is transliterated as 'Bar-Jonah' rather than translated.
    This preserves the Aramaic patronymic form present in the Greek text.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for Jesus' pronouncement of blessing,
    so 'because' is the clearest modern English rendering.
- source_word: σὰρξ καὶ αἷμα
  chosen: flesh and blood
  alternatives:
  - mere human beings
  - human beings
  lexicon: BDAG
  rationale: This is an idiomatic expression referring to human agency or human origin.
    The literal rendering 'flesh and blood' is retained because it is natural in English
    and preserves the idiom's force. Since σάρξ is literal/idiomatic here rather than
    Pauline-metaphorical, the default 'flesh' is appropriate.
- source_word: ἀπεκάλυψέν σοι
  chosen: did not reveal this to you
  alternatives:
  - did not disclose this to you
  - did not make this known to you
  lexicon: BDAG
  rationale: ἀποκαλύπτω means to reveal or disclose. 'Reveal' preserves the theological
    resonance of divine disclosure. 'This' is supplied in English because the object
    is implicit from context and required for natural translation.
- source_word: ἀλλ’ ὁ πατήρ μου
  chosen: but my Father
  alternatives:
  - but rather my Father
  lexicon: BDAG
  rationale: ἀλλά marks strong contrast. 'But my Father' is sufficient in English
    and preserves the contrast between human and divine source.
- source_word: ὁ ἐν τοῖς οὐρανοῖς
  chosen: in heaven
  alternatives:
  - who is in the heavens
  - who is in heaven
  lexicon: BDAG
  rationale: Although the Greek uses the plural 'in the heavens,' idiomatic English
    commonly uses singular 'in heaven' for this reverential circumlocution. This is
    an optimal-equivalence rendering that preserves meaning while avoiding awkwardness.
