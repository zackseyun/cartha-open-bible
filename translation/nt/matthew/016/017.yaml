theological_decisions:
- issue: Nature of the source of Peter's confession
  chosen_reading: Jesus contrasts merely human source ('flesh and blood') with divine
    revelation from the Father, without specifying a full doctrine of inspiration
    beyond this immediate disclosure.
  alternative_readings:
  - '''flesh and blood'' as specifically Peter''s own natural reasoning'
  - '''flesh and blood'' as any human teacher or authority'
  rationale: The idiom broadly excludes human origin and attributes Peter's insight
    to the Father's revelation. The translation preserves that contrast without narrowing
    the referent beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it.
