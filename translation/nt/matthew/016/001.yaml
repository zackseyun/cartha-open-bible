theological_decisions:
- issue: Hostile nuance of the Pharisees' and Sadducees' request
  chosen_reading: Render πειράζοντες as 'testing him' rather than a more neutral 'asking'
    or a more interpretive 'trying to trap him.'
  alternative_readings:
  - tempting him
  - trying to trap him
  rationale: The verse presents the request as adversarial, but the translation should
    preserve the lexical wording without importing more than the Greek states. 'Testing
    him' keeps the tension and leaves the reader to infer the motive from context.
  doctrine_reference: Preserve theological tension rather than resolve it.
