id: MAT.16.1
reference: Matthew 16:1
source:
  edition: SBLGNT
  text: Καὶ προσελθόντες οἱ Φαρισαῖοι καὶ Σαδδουκαῖοι πειράζοντες ἐπηρώτησαν αὐτὸν
    σημεῖον ἐκ τοῦ οὐρανοῦ ἐπιδεῖξαι αὐτοῖς.
translation:
  text: And the Pharisees and Sadducees came and, testing him, asked him to show them
    a sign from heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'tempting him' or 'trying to trap him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  chosen: came
  alternatives:
  - approached
  - came up
  lexicon: BDAG
  rationale: Aorist participle of προσέρχομαι, introducing the action prior to the
    main verb. 'Came' is natural modern English and sufficiently captures movement
    toward Jesus without awkwardness.
- source_word: Φαρισαῖοι
  chosen: Pharisees
  lexicon: BDAG
  rationale: Standard transliteration of the group name, following the policy to transliterate
    names.
- source_word: Σαδδουκαῖοι
  chosen: Sadducees
  lexicon: BDAG
  rationale: Standard transliteration of the group name, following the policy to transliterate
    names.
- source_word: πειράζοντες
  chosen: testing
  alternatives:
  - tempting
  - trying to trap
  lexicon: BDAG
  rationale: The participle indicates hostile intent in context. 'Testing' preserves
    the lexical sense of πειράζω without over-interpreting; 'tempting' is less idiomatic
    here, and 'trying to trap' is interpretive.
- source_word: ἐπηρώτησαν
  chosen: asked
  alternatives:
  - questioned
  - requested
  lexicon: BDAG
  rationale: Aorist main verb meaning to ask or question. 'Asked' is the clearest
    and most natural rendering in this construction.
- source_word: σημεῖον
  chosen: a sign
  alternatives:
  - a miraculous sign
  lexicon: BDAG
  rationale: σημεῖον commonly means 'sign.' The context implies a miraculous validating
    sign, but the Greek itself says 'sign,' so the simpler rendering best preserves
    the source wording.
- source_word: ἐκ τοῦ οὐρανοῦ
  chosen: from heaven
  alternatives:
  - out of heaven
  lexicon: BDAG
  rationale: Standard idiomatic rendering of the prepositional phrase. 'From heaven'
    communicates origin/source and matches common English usage.
- source_word: ἐπιδεῖξαι
  chosen: to show
  alternatives:
  - to display
  - to demonstrate
  lexicon: BDAG
  rationale: Complementary infinitive after ἐπηρώτησαν, expressing what they asked
    Jesus to do. 'To show' is straightforward and idiomatic.
