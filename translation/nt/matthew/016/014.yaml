id: MAT.16.14
reference: Matthew 16:14
source:
  edition: SBLGNT
  text: οἱ δὲ εἶπαν· Οἱ μὲν Ἰωάννην τὸν βαπτιστήν, ἄλλοι δὲ Ἠλίαν, ἕτεροι δὲ Ἰερεμίαν
    ἢ ἕνα τῶν προφητῶν.
translation:
  text: And they said, “Some say John the Baptist, others Elijah, and others Jeremiah
    or one of the prophets.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more explicitly in English: “Some say that you are John the Baptist,
      others Elijah, and others Jeremiah or one of the prophets.”'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  chosen: And they said
  alternatives:
  - So they said
  - And they answered
  lexicon: BDAG
  rationale: δέ is rendered with a simple connective ('And') to maintain narrative
    flow without overstating contrast. εἶπαν from λέγω is naturally 'said' here in
    reported speech.
- source_word: Οἱ μὲν
  chosen: Some say
  alternatives:
  - Some say that you are
  - Some, on the one hand
  lexicon: BDAG
  rationale: μέν introduces the first item in a distribution that is completed by
    later ἄλλοι/ἕτεροι. English idiom is best served by 'Some say,' with the implied
    object supplied from the context of Jesus' prior question.
- source_word: Ἰωάννην τὸν βαπτιστήν
  chosen: John the Baptist
  alternatives:
  - John the Baptizer
  lexicon: BDAG
  rationale: Standard English rendering for the recognized figure. 'Baptizer' is more
    formally transparent to βαπτιστής but less idiomatic in contemporary English.
- source_word: ἄλλοι δὲ
  chosen: others
  alternatives:
  - but others
  - and others
  lexicon: BDAG
  rationale: This continues the distributive sequence. English does not require repeating
    an adversative particle; 'others' is sufficient and natural.
- source_word: Ἠλίαν
  chosen: Elijah
  alternatives:
  - Elias
  lexicon: BDAG
  rationale: Standard modern transliteration of the prophet's name.
- source_word: ἕτεροι δὲ
  chosen: and others
  alternatives:
  - others
  - still others
  lexicon: BDAG
  rationale: ἕτεροι marks another group in the sequence. 'And others' keeps the list
    readable in English; 'still others' is possible but slightly more interpretive.
- source_word: Ἰερεμίαν
  chosen: Jeremiah
  alternatives:
  - Jeremias
  lexicon: BDAG
  rationale: Standard English transliteration of the prophet's name.
- source_word: ἢ ἕνα τῶν προφητῶν
  chosen: or one of the prophets
  alternatives:
  - or one of the other prophets
  lexicon: BDAG
  rationale: ἤ introduces an alternative identification. The Greek does not explicitly
    say 'other,' so it is omitted from the main text to avoid adding nuance not present
    in the source.
