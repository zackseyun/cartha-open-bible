theological_decisions:
- issue: Implied object of the identifications
  chosen_reading: The translation leaves the object implicit in the verse itself ('Some
    say John the Baptist...'), relying on the immediately preceding context rather
    than adding 'that you are.'
  alternative_readings:
  - Some say that you are John the Baptist, others Elijah...
  rationale: The Greek in this verse lists the identifications elliptically. English
    can preserve that ellipsis while remaining clear in context. Adding 'that you
    are' is interpretively valid but not required by the wording of this verse alone.
  doctrine_reference: Translation philosophy §1, §3
