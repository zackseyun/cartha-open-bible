id: MAT.16.23
reference: Matthew 16:23
source:
  edition: SBLGNT
  text: ὁ δὲ στραφεὶς εἶπεν τῷ Πέτρῳ· Ὕπαγε ὀπίσω μου, Σατανᾶ· σκάνδαλον ⸂εἶ ἐμοῦ⸃, ὅτι οὐ φρονεῖς τὰ τοῦ θεοῦ ἀλλὰ τὰ τῶν ἀνθρώπων.
translation:
  text: But he turned and said to Peter[a], “Go behind me, Satan! You are a stumbling block to me, because you are not setting your mind on the things of God[b], but on the things of men.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “Get behind me, Satan!”
    reason: lexical_alternative
  - marker: b
    text: Greek “the things of men,” that is, merely human concerns.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  chosen: turned
  alternatives:
  - turned around
  lexicon: BDAG
  rationale: Aorist passive participle used intransitively; 'turned' is natural English and preserves the physical reorientation before speaking.
- source_word: Ὕπαγε ὀπίσω μου
  chosen: Go behind me
  alternatives:
  - Get behind me
  - Go away behind me
  lexicon: BDAG
  rationale: The phrase is idiomatic but spatially meaningful. 'Go behind me' preserves the literal force of ὀπίσω while remaining idiomatic enough in English. 'Get behind me' is traditional and possible, but 'go' more directly reflects Ὕπαγε.
- source_word: Σατανᾶ
  chosen: Satan
  alternatives:
  - adversary
  lexicon: BDAG
  rationale: As a vocative proper name/title in this context, 'Satan' is the standard transliteration and best preserves the force of Jesus' rebuke. Rendering it 'adversary' would over-interpret and weaken the recognized designation.
- source_word: σκάνδαλον
  chosen: stumbling block
  alternatives:
  - offense
  - snare
  lexicon: BDAG
  rationale: '''Stumbling block'' best captures the metaphor of an obstacle causing one to trip, which fits the immediate context of Peter hindering Jesus'' mission. ''Offense'' is too abstract in modern English; ''snare'' shifts the imagery.'
- source_word: ἐμοῦ
  chosen: to me
  alternatives:
  - for me
  - of me
  lexicon: BDAG
  rationale: With σκάνδαλον, the genitive is idiomatically rendered in English as the person affected by the stumbling. 'To me' communicates that Peter is an obstacle in relation to Jesus. More literal renderings like 'of me' are unnatural and unclear.
- source_word: φρονεῖς
  chosen: are setting your mind on
  alternatives:
  - are thinking about
  - have in mind
  - are minded toward
  lexicon: BDAG
  rationale: φρονέω here denotes one's mindset, orientation, or concern, not merely a passing thought. 'Are setting your mind on' preserves the volitional and dispositional sense better than simple 'thinking about.'
- source_word: τὰ τοῦ θεοῦ
  chosen: the things of God
  alternatives:
  - God's interests
  - the concerns of God
  lexicon: BDAG
  rationale: This plural substantive expression is best kept fairly literal. 'The things of God' preserves the contrast and avoids over-paraphrasing, while still being understandable in English.
- source_word: τὰ τῶν ἀνθρώπων
  chosen: the things of men
  alternatives:
  - human things
  - the things of people
  lexicon: BDAG
  rationale: The Greek is explicitly masculine plural and contrasts with God in a representative sense. Per the gender-accurate policy, 'men' is retained here as a generic human reference matching the source form and rhetorical contrast. A footnote preserves the inclusive sense for modern readers.
