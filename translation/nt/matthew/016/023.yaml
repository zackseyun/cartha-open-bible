theological_decisions:
- issue: Force of Jesus' address 'Satan' to Peter
  chosen_reading: Jesus directly rebukes Peter with the designation 'Satan' without requiring the translation to specify whether Peter is being identified with Satan himself or acting as Satan's adversarial instrument.
  alternative_readings:
  - Jesus is calling Peter 'adversary' in a generic sense
  - Jesus is addressing Satan operating through Peter
  rationale: The translation should preserve the sharpness and ambiguity of the Greek rather than resolve the theological interpretation. Using 'Satan' keeps the canonical resonance with the temptation narrative and leaves interpretation to readers and teachers.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Gender rendering of ἀνθρώπων
  chosen_reading: Render as 'men' in the main text with an explanatory footnote.
  alternative_readings:
  - people
  - humans
  - human beings
  rationale: The source uses masculine plural ἀνθρώπων in a representative contrast with God. The project's policy prefers gender-accurate rendering over flattening to gender-neutral language, while allowing annotation where inclusivity is contextually relevant.
  doctrine_reference: Gender-accurate over gender-neutral.
