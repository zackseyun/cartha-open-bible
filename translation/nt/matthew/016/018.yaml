theological_decisions:
- issue: Referent of 'this rock' (πέτρᾳ)
  chosen_reading: Retained as 'this rock' without specifying in the translation whether
    it refers to Peter himself, Peter's confession, or Peter as confessor/apostolic
    representative.
  alternative_readings:
  - Peter himself
  - Peter's confession that Jesus is the Messiah, the Son of the living God
  - Peter in relation to his confession/apostolic role
  rationale: The verse is theologically contested across Christian traditions. The
    Greek intentionally preserves the wordplay between Πέτρος and πέτρα, but the translation
    should not resolve the interpretive debate beyond the text itself. Rendering the
    phrase simply as 'on this rock' preserves the ambiguity and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering of ᾅδης
  chosen_reading: Hades
  alternative_readings:
  - hell
  - the realm of the dead
  rationale: Using 'Hades' avoids importing later doctrinal associations of 'hell'
    as final punishment and more closely reflects the Greek term's semantic range
    in this context.
  doctrine_reference: Original-language primacy over translation tradition.
