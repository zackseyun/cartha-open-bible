id: MAT.16.18
reference: Matthew 16:18
source:
  edition: SBLGNT
  text: κἀγὼ δέ σοι λέγω ὅτι σὺ εἶ Πέτρος, καὶ ἐπὶ ταύτῃ τῇ πέτρᾳ οἰκοδομήσω μου τὴν
    ἐκκλησίαν, καὶ πύλαι ᾅδου οὐ κατισχύσουσιν αὐτῆς·
translation:
  text: And I also say to you that you are Peter, and on this rock I will build my
    church, and the gates of Hades will not prevail against it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'on this rock' may be understood as referring to Peter, to Peter's confession,
      or to Peter as confessor and representative apostle.
    reason: alternative_reading
  - marker: b
    text: Greek 'Hades'; that is, the realm of the dead. Traditionally, 'hell.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ δέ
  chosen: And I also
  alternatives:
  - And I
  - And I in turn
  lexicon: BDAG
  rationale: κἀγώ adds emphasis ('I also / I too'), while δέ marks continuation or
    mild contrast. 'And I also' preserves the responsive force to Peter's confession
    without overstating contrast.
- source_word: σοι λέγω
  chosen: say to you
  alternatives:
  - tell you
  lexicon: BDAG
  rationale: λέγω commonly means 'say'; 'say to you' is slightly more formal and preserves
    the direct-speech introduction.
- source_word: Πέτρος
  chosen: Peter
  alternatives:
  - Petros
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per translation
    philosophy. 'Peter' also preserves the wordplay with πέτρα as much as English
    allows.
- source_word: ἐπὶ ταύτῃ τῇ πέτρᾳ
  chosen: on this rock
  alternatives:
  - upon this rock
  lexicon: BDAG
  rationale: ἐπί with the dative here is naturally rendered 'on/upon.' 'On this rock'
    is clear modern English and preserves the demonstrative force of ταύτῃ.
- source_word: οἰκοδομήσω
  chosen: I will build
  alternatives:
  - I will establish
  lexicon: BDAG
  rationale: The future of οἰκοδομέω is literally 'build.' This keeps the construction
    metaphor that governs the clause.
- source_word: μου τὴν ἐκκλησίαν
  chosen: my church
  alternatives:
  - my assembly
  lexicon: BDAG
  rationale: ἐκκλησία can mean 'assembly' in a general sense, but in Matthew 16:18
    it refers to the community belonging to Jesus in a way that is conventionally
    and contextually captured by 'church.' 'My church' is natural English and preserves
    the possessive μου.
- source_word: πύλαι ᾅδου
  chosen: the gates of Hades
  alternatives:
  - the gates of the realm of the dead
  - the gates of hell
  lexicon: BDAG
  rationale: ᾅδης refers to Hades/the realm of the dead, not Gehenna. 'Hades' is more
    precise than 'hell,' while retaining the traditional imagery of hostile death-realm
    powers.
- source_word: οὐ κατισχύσουσιν αὐτῆς
  chosen: will not prevail against it
  alternatives:
  - will not overpower it
  - will not be stronger than it
  lexicon: BDAG
  rationale: κατισχύω means to prevail over, overpower, or prove stronger than. 'Will
    not prevail against it' is idiomatic and preserves the adversarial sense with
    αὐτῆς referring to the church.
