id: MAT.16.21
reference: Matthew 16:21
source:
  edition: SBLGNT
  text: Ἀπὸ τότε ἤρξατο ⸂ὁ Ἰησοῦς⸃ δεικνύειν τοῖς μαθηταῖς αὐτοῦ ὅτι δεῖ αὐτὸν ⸂εἰς
    Ἱεροσόλυμα ἀπελθεῖν⸃ καὶ πολλὰ παθεῖν ἀπὸ τῶν πρεσβυτέρων καὶ ἀρχιερέων καὶ γραμματέων
    καὶ ἀποκτανθῆναι καὶ τῇ τρίτῃ ἡμέρᾳ ἐγερθῆναι.
translation:
  text: From that time Jesus began to show his disciples that he must go to Jerusalem
    and suffer many things from the elders and chief priests and scribes, and be killed,
    and on the third day be raised.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'suffer much.' The Greek literally says 'suffer many things,' emphasizing
      the variety of sufferings.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the hands of the elders and chief priests and scribes.'
    reason: alternative_reading
  - marker: c
    text: 'Or ''rise.'' The Greek is passive: ''be raised.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ τότε
  chosen: From that time
  alternatives:
  - From then on
  - Since then
  lexicon: BDAG
  rationale: Marks a narrative turning point. 'From that time' is a natural, fairly
    formal rendering that preserves the temporal force without paraphrase.
- source_word: ἤρξατο
  chosen: began
  alternatives:
  - started
  lexicon: BDAG
  rationale: Standard rendering of the ingressive aorist middle here; it signals the
    beginning of a new phase in Jesus's instruction.
- source_word: δεικνύειν
  chosen: to show
  alternatives:
  - to make clear
  - to explain
  lexicon: BDAG
  rationale: '''Show'' preserves the lexical sense of indicating or making known.
    ''Explain'' is possible but slightly more interpretive than the Greek requires.'
- source_word: τοῖς μαθηταῖς αὐτοῦ
  chosen: his disciples
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: 'The indirect object is naturally expressed in English after ''show'':
    ''show his disciples.'' This preserves the relationship and audience clearly.'
- source_word: δεῖ
  chosen: he must
  alternatives:
  - it is necessary for him to
  - he has to
  lexicon: BDAG
  rationale: Conveys necessity. 'Must' is concise and preserves the force of divine
    or ordained necessity without over-explaining its source.
- source_word: εἰς Ἱεροσόλυμα ἀπελθεῖν
  chosen: go to Jerusalem
  alternatives:
  - depart to Jerusalem
  lexicon: BDAG
  rationale: Idiomatic English for movement toward a destination. 'Depart' is more
    wooden and less natural here.
- source_word: πολλὰ παθεῖν
  chosen: suffer many things
  alternatives:
  - suffer much
  lexicon: BDAG
  rationale: A formally close rendering of the neuter plural πολλὰ. 'Suffer much'
    is smoother English, but 'suffer many things' better reflects the Greek expression
    and the variety of sufferings implied.
- source_word: ἀπὸ τῶν πρεσβυτέρων καὶ ἀρχιερέων καὶ γραμματέων
  chosen: from the elders and chief priests and scribes
  alternatives:
  - at the hands of the elders and chief priests and scribes
  lexicon: BDAG
  rationale: '''From'' is a direct rendering of ἀπό and leaves the agency/source relation
    intact. ''At the hands of'' is interpretive though contextually accurate.'
- source_word: πρεσβυτέρων
  chosen: elders
  alternatives:
  - leaders
  lexicon: BDAG
  rationale: '''Elders'' is the standard and sufficiently transparent rendering for
    the Jewish leadership group in context.'
- source_word: ἀρχιερέων
  chosen: chief priests
  alternatives:
  - high priests
  lexicon: BDAG
  rationale: In plural, 'chief priests' is the established and contextually accurate
    rendering for the priestly ruling group, not multiple holders of the high-priestly
    office simultaneously.
- source_word: γραμματέων
  chosen: scribes
  alternatives:
  - teachers of the law
  lexicon: BDAG
  rationale: '''Scribes'' is the more direct lexical equivalent. ''Teachers of the
    law'' can clarify function but is less formally tied to the Greek term.'
- source_word: ἀποκτανθῆναι
  chosen: be killed
  alternatives:
  - be put to death
  lexicon: BDAG
  rationale: Clear, direct, and natural English for the passive infinitive. 'Be put
    to death' is also valid but slightly more formal.
- source_word: τῇ τρίτῃ ἡμέρᾳ
  chosen: on the third day
  alternatives:
  - on the third day after
  lexicon: BDAG
  rationale: Standard temporal dative rendering. No need to expand beyond the Greek
    wording.
- source_word: ἐγερθῆναι
  chosen: be raised
  alternatives:
  - rise
  - be resurrected
  lexicon: BDAG
  rationale: The passive form is significant and should be preserved in English. 'Be
    raised' reflects the Greek better than the intransitive 'rise,' while avoiding
    unnecessary jargon.
