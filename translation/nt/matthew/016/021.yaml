theological_decisions:
- issue: Force of δεῖ in Jesus's passion prediction
  chosen_reading: Render as 'he must' without specifying the source of necessity in
    the main text.
  alternative_readings:
  - he has to
  - it is necessary for him to
  rationale: The Greek states necessity but does not explicitly unpack whether it
    is divine decree, scriptural fulfillment, or historical inevitability in this
    clause. 'He must' preserves the theological weight and tension without importing
    a fuller doctrinal explanation.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Voice of ἐγερθῆναι
  chosen_reading: Use passive 'be raised' rather than active/intransitive 'rise.'
  alternative_readings:
  - rise
  rationale: The Greek infinitive is passive. Preserving the passive maintains the
    text's wording and leaves intact the broader New Testament pattern in which God
    raises Jesus, without denying passages that speak of Jesus rising.
  doctrine_reference: Original-language primacy over translation tradition; preserve
    theological tension rather than resolve it.
