id: MAT.21.20
reference: Matthew 21:20
source:
  edition: SBLGNT
  text: καὶ ἰδόντες οἱ μαθηταὶ ἐθαύμασαν λέγοντες· Πῶς παραχρῆμα ἐξηράνθη ἡ συκῆ;
translation:
  text: And when the disciples saw it[a], they marveled, saying, “How did the fig tree wither immediately?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “How did the fig tree wither immediately?”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  chosen: when ... saw it
  alternatives:
  - seeing
  - after seeing
  lexicon: BDAG
  rationale: 'Aorist participle of ὁράω is rendered temporally in smooth English: ''when ... saw it.'' The object ''it'' is supplied from context, referring to the withered fig tree/event just mentioned, since English normally requires an object here.'
- source_word: ἐθαύμασαν
  chosen: they marveled
  alternatives:
  - they were amazed
  - they wondered
  lexicon: BDAG
  rationale: θαυμάζω denotes amazement or wonder. 'Marveled' preserves the sense and register without sounding overly colloquial.
- source_word: λέγοντες
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: 'Present participle is naturally rendered as attendant speech: ''saying.'' This keeps the Greek participial flow.'
- source_word: Πῶς
  chosen: How did
  alternatives:
  - How
  - In what way did
  lexicon: BDAG
  rationale: Introduces the disciples' question about manner/process. 'How did' is idiomatic in English interrogative form.
- source_word: παραχρῆμα
  chosen: so quickly
  alternatives:
  - immediately
  - at once
  - instantly
  lexicon: BDAG
  rationale: παραχρῆμα means 'immediately/at once.' Here 'so quickly' fits the disciples' astonishment in natural English while preserving the temporal force. A more formal alternative is preserved in a footnote.
- source_word: ἐξηράνθη
  chosen: wither
  alternatives:
  - dried up
  - was dried up
  lexicon: BDAG
  rationale: Aorist passive of ξηραίνω in this context refers to the fig tree becoming withered. 'Wither' is the most natural English verb for a tree, while 'dried up' is a viable alternative.
- source_word: ἡ συκῆ
  chosen: the fig tree
  alternatives:
  - the fig tree itself
  lexicon: BDAG
  rationale: συκῆ specifically denotes a fig tree. The article is retained with the standard English noun phrase.
