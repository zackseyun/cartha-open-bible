id: MAT.21.18
reference: Matthew 21:18
source:
  edition: SBLGNT
  text: ⸀Πρωῒ δὲ ⸀ἐπανάγων εἰς τὴν πόλιν ἐπείνασεν.
translation:
  text: Now early in the morning, as he was returning to the city, he became hungry.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πρωῒ
  chosen: early in the morning
  alternatives:
  - in the morning
  - at dawn
  - early
  lexicon: BDAG
  rationale: Adverb indicating the early part of the day. 'Early in the morning' is
    natural English and preserves the temporal emphasis better than the bare 'in the
    morning.'
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ here is a mild connective marking narrative progression rather than
    strong contrast. 'Now' gives a natural English transition without overstating
    contrast.
- source_word: ἐπανάγων
  chosen: as he was returning
  alternatives:
  - returning
  - going back
  lexicon: BDAG
  rationale: Present active participle, contemporaneous with the main verb, describing
    Jesus' movement back toward the city. 'As he was returning' captures the participial
    force smoothly in English.
- source_word: εἰς τὴν πόλιν
  chosen: to the city
  alternatives:
  - into the city
  - toward the city
  lexicon: BDAG
  rationale: εἰς with the accusative normally indicates movement toward/into. In this
    context of re-entry to Jerusalem, 'to the city' is idiomatic and sufficiently
    precise without implying arrival had already occurred.
- source_word: ἐπείνασεν
  chosen: he became hungry
  alternatives:
  - he was hungry
  - he hungered
  lexicon: BDAG
  rationale: Aorist ingressive sense is well conveyed by 'became hungry.' 'He was
    hungry' is possible but less clearly reflects the eventive force; 'he hungered'
    is too archaic for the project's style.
