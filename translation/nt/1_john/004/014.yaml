theological_decisions:
- issue: Scope implied by 'Savior of the world'
  chosen_reading: Retained the broad Johannine expression 'the Savior of the world'
    without narrowing it to a particular theory of atonement or salvation.
  alternative_readings:
  - Savior of the elect
  - potential Savior of the world
  rationale: The Greek text states the title and scope directly. Per doctrine, the
    translation must not import denominational conclusions beyond the text. The phrase
    is preserved as written.
  doctrine_reference: Affirmations; Translation philosophy 3
- issue: Father-Son relationship language
  chosen_reading: Translated relational titles as 'the Father' and 'the Son' in their
    straightforward Johannine sense.
  alternative_readings:
  - God the Father sent Jesus Christ
  rationale: The verse itself uses relational titles rather than the personal name
    'Jesus' or the title 'Messiah/Christ.' Expanding the wording would import content
    not present in the Greek.
  doctrine_reference: Affirmations; Translation philosophy 1, 2
