id: 1JN.4.14
reference: 1 John 4:14
source:
  edition: SBLGNT
  text: καὶ ἡμεῖς τεθεάμεθα καὶ μαρτυροῦμεν ὅτι ὁ πατὴρ ἀπέσταλκεν τὸν υἱὸν σωτῆρα
    τοῦ κόσμου.
translation:
  text: And we have seen and testify that the Father has sent the Son as the Savior
    of the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'the Father has sent the Son, Savior of the world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεθεάμεθα
  chosen: have seen
  alternatives:
  - have beheld
  - have looked upon
  lexicon: BDAG
  rationale: Perfect middle indicative conveys a completed act with abiding significance;
    'have seen' is natural modern English and preserves eyewitness force without archaic
    tone.
- source_word: μαρτυροῦμεν
  chosen: testify
  alternatives:
  - bear witness
  - witness
  lexicon: BDAG
  rationale: '''Testify'' communicates formal witness-bearing in accessible English.
    ''Bear witness'' is possible but slightly more traditional; the present tense
    is naturally rendered in coordination with ''have seen'' as ongoing witness flowing
    from prior sight.'
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content of the testimony, not a causal clause.
- source_word: ὁ πατήρ
  chosen: the Father
  alternatives:
  - the father
  lexicon: BDAG
  rationale: In Johannine usage this is a titular reference to God in relation to
    the Son; capitalization in English helps signal the personal divine title without
    adding meaning beyond the Greek.
- source_word: ἀπέσταλκεν
  chosen: has sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: Perfect active indicates a completed sending with continuing relevance;
    'has sent' preserves that aspect better than simple past.
- source_word: τὸν υἱόν
  chosen: the Son
  alternatives:
  - his Son
  lexicon: BDAG
  rationale: The Greek has the article, not an explicit possessive pronoun. In context
    'the Son' clearly denotes filial relation to 'the Father' and preserves Johannine
    title language.
- source_word: σωτῆρα
  chosen: Savior
  alternatives:
  - deliverer
  - rescuer
  lexicon: BDAG
  rationale: '''Savior'' is the standard and most theologically appropriate rendering
    here, matching both lexical sense and established Christian usage without distortion.'
- source_word: τοῦ κόσμου
  chosen: of the world
  alternatives:
  - for the world
  lexicon: BDAG
  rationale: Genitive after σωτήρ is naturally rendered 'Savior of the world.' This
    preserves the broad scope of κόσμος in Johannine usage.
- source_word: καί ἡμεῖς
  chosen: And we
  alternatives:
  - We also
  - And we ourselves
  lexicon: BDAG
  rationale: The conjunction plus explicit pronoun gives mild emphasis. 'And we' preserves
    the discourse flow and enough emphasis without overtranslating.
- source_word: σωτῆρα τοῦ κόσμου
  chosen: as the Savior of the world
  alternatives:
  - the Savior of the world
  lexicon: BDAG
  rationale: The appositional accusative after 'has sent the Son' can sound awkward
    if rendered too literally in English. 'As the Savior of the world' makes the son's
    role explicit and idiomatic while preserving the appositional sense.
