theological_decisions:
- issue: Mutual indwelling language
  chosen_reading: Retain the reciprocal formulation 'God remains in him, and he in God' without expanding or systematizing it.
  alternative_readings:
  - God lives in him, and he lives in God
  - God abides in him, and he abides in God
  rationale: The verse states reciprocal divine-human indwelling tied to confessing Jesus as the Son of God. The translation preserves this theological tension and symmetry without importing later doctrinal explanation or reducing it to mere association.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Christological title
  chosen_reading: Translate ὁ υἱὸς τοῦ θεοῦ as 'the Son of God.'
  alternative_readings:
  - God's Son
  rationale: Given the doctrinal centrality of the confession in 1 John, the full titular rendering best preserves the text's explicit christological claim and aligns with historic orthodoxy without adding interpretive material beyond the Greek.
