id: 1JN.4.15
reference: 1 John 4:15
source:
  edition: SBLGNT
  text: ὃς ⸀ἐὰν ὁμολογήσῃ ὅτι ⸀Ἰησοῦς ἐστιν ὁ υἱὸς τοῦ θεοῦ, ὁ θεὸς ἐν αὐτῷ μένει καὶ αὐτὸς ἐν τῷ θεῷ.
translation:
  text: Whoever confesses that Jesus is the Son of God[a], God remains in him, and he in God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'abides in him, and he in God.' The Greek verb menō is a key Johannine term that can be rendered 'remain' or 'abide.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἐὰν
  chosen: Whoever
  alternatives:
  - Anyone who
  - Who if ever
  lexicon: BDAG
  rationale: The relative pronoun with ἐάν forms an indefinite relative clause meaning 'whoever' or 'anyone who.' 'Whoever' is concise, natural English and preserves the generalizing force.
- source_word: ὁμολογήσῃ
  chosen: confesses
  alternatives:
  - acknowledges
  - declares
  - professes
  lexicon: BDAG
  rationale: ὁμολογέω in Johannine context carries the sense of openly acknowledging or confessing a truth about Jesus. 'Confesses' preserves both the verbal/public aspect and the theological weight better than the flatter 'acknowledges.' The aorist subjunctive is governed by ἐάν and is best rendered in idiomatic English with present tense in this general condition.
- source_word: ὅτι
  chosen: that
  lexicon: BDAG
  rationale: Introduces the content of the confession straightforwardly.
- source_word: Ἰησοῦς
  chosen: Jesus
  rationale: Personal name is transliterated by standard English convention, in keeping with the translation philosophy.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: This is a central christological title. 'The Son of God' preserves the article and the established titular force without paraphrase. 'God's Son' is possible but slightly less formal and less clearly titular.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Definite nominative subject; rendered simply as 'God.' No need to mark the article in English.
- source_word: ἐν αὐτῷ μένει
  chosen: remains in him
  alternatives:
  - abides in him
  - stays in him
  lexicon: BDAG
  rationale: μένω is a key Johannine term. 'Remains' is chosen as clear modern English while preserving the durative relational sense. 'Abides' is traditional and strong, but slightly more archaic for the target audience; preserved as an alternative because of Johannine thematic significance.
- source_word: καὶ αὐτὸς ἐν τῷ θεῷ
  chosen: and he in God
  alternatives:
  - and he remains in God
  lexicon: BDAG
  rationale: The second clause omits the verb, which is naturally supplied from the first. Rendering it as 'and he in God' preserves the Greek ellipsis and rhetorical balance. English readers readily understand the implied 'remains.' An explicit 'remains' is possible but less formally aligned with the source.
