theological_decisions:
- issue: Whether πνεῦμα in the first phrase should be capitalized as a reference to
    the Holy Spirit
  chosen_reading: the Spirit of truth
  alternative_readings:
  - the spirit of truth
  rationale: Within the immediate context of testing spirits (1 John 4:1–6) and broader
    Johannine usage, 'the Spirit of truth' is a recognized designation for the Holy
    Spirit, especially in contrast to false or deceptive spiritual influence. Capitalizing
    the first occurrence preserves this likely referent while retaining the antithetical
    parallel with 'the spirit of error.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Whether ἀκούει ἡμῶν should be rendered as simple auditory hearing or receptive
    listening to apostolic witness
  chosen_reading: listens to us
  alternative_readings:
  - hears us
  rationale: The context concerns recognizing true and false spirits by their response
    to apostolic teaching. 'Listens to us' better communicates receptive attention
    without importing stronger notions such as obedience. This preserves the theological
    test in the verse without overstatement.
  doctrine_reference: Translation philosophy §1, §3
