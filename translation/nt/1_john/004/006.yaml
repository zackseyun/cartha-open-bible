id: 1JN.4.6
reference: 1 John 4:6
source:
  edition: SBLGNT
  text: ἡμεῖς ἐκ τοῦ θεοῦ ἐσμεν· ὁ γινώσκων τὸν θεὸν ἀκούει ἡμῶν, ὃς οὐκ ἔστιν ἐκ
    τοῦ θεοῦ οὐκ ἀκούει ἡμῶν. ἐκ τούτου γινώσκομεν τὸ πνεῦμα τῆς ἀληθείας καὶ τὸ πνεῦμα
    τῆς πλάνης.
translation:
  text: We are from God. The one who knows God listens to us; whoever is not from
    God does not listen to us. By this we know the Spirit of truth and the spirit
    of error.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'hears us' in both occurrences; the Greek verb can denote hearing, but
      here likely carries the sense of receptive listening to apostolic testimony.
    reason: lexical_alternative
  - marker: b
    text: Or 'the spirit of truth.' The phrase may be read more generally, though
      in Johannine usage it commonly refers to the Holy Spirit.
    reason: alternative_reading
  - marker: c
    text: '''Spirit of truth'' echoes John 14:17; 15:26; 16:13.'
    reason: cross_reference
lexical_decisions:
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  lexicon: BDAG
  rationale: Rendered with 'from' to preserve the preposition ἐκ and its sense of
    source/origin rather than simple possession. This wording is natural in English
    and important in Johannine contrasts between those whose origin is in God and
    those who are not.
- source_word: γινώσκων
  chosen: the one who knows
  alternatives:
  - who knows
  lexicon: BDAG
  rationale: The substantival present participle is represented with 'the one who
    knows' to preserve the generic, characteristic force of the Greek while remaining
    readable.
- source_word: ἀκούει ἡμῶν
  chosen: listens to us
  alternatives:
  - hears us
  lexicon: BDAG
  rationale: Although ἀκούω can be glossed 'hear,' in this context it carries the
    sense of heeding or receiving apostolic testimony. 'Listens to us' better conveys
    responsive reception in idiomatic English without overtranslating to 'obeys.'
- source_word: ὃς οὐκ ἔστιν ἐκ τοῦ θεοῦ
  chosen: whoever is not from God
  alternatives:
  - the one who is not from God
  lexicon: BDAG
  rationale: Rendered generically with 'whoever' to express the class sense of the
    relative pronoun in smooth English. 'From God' again preserves ἐκ as source/origin.
- source_word: ἐκ τούτου
  chosen: By this
  alternatives:
  - From this
  - By this means
  lexicon: BDAG
  rationale: A standard Johannine inferential phrase. 'By this' is concise and idiomatic,
    preserving the idea of discernment on the basis of the preceding criterion.
- source_word: γινώσκομεν
  chosen: we know
  alternatives:
  - we recognize
  - we discern
  lexicon: BDAG
  rationale: Kept as 'know' for consistency with γινώσκω in the verse and in Johannine
    usage. The context implies discernment, but 'know' preserves the lexical link
    and remains intelligible.
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  chosen: the Spirit of truth
  alternatives:
  - the spirit of truth
  lexicon: BDAG
  rationale: Capitalized 'Spirit' here because in Johannine usage this expression
    commonly refers to the Holy Spirit in contrast with deceptive spiritual influence.
    The article and established usage support a personal referent rather than a mere
    disposition.
- source_word: τὸ πνεῦμα τῆς πλάνης
  chosen: the spirit of error
  alternatives:
  - the spirit of deception
  - the spirit of wandering
  lexicon: BDAG
  rationale: πλάνη denotes error, deception, or wandering from truth. 'Error' is the
    most concise and traditional English equivalent here, matching the antithesis
    with 'truth' while allowing the phrase to denote a deceptive spiritual influence.
