theological_decisions:
- issue: Whether to supply an object for 'we love'
  chosen_reading: 'Leave the object unstated: ''We love'''
  alternative_readings:
  - We love him
  - We love God
  rationale: The Greek text as given does not include an explicit object after ἀγαπῶμεν.
    Supplying 'him' reflects a later textual tradition and common translation tradition,
    but the SBLGNT reading is shorter and should be translated as such. The broader
    context supports love flowing from God's prior love, without requiring the object
    to be specified in this verse alone.
  doctrine_reference: Translation philosophy §1 (original-language primacy), §3 (preserve
    tension rather than resolve it)
