id: 1JN.4.19
reference: 1 John 4:19
source:
  edition: SBLGNT
  text: ἡμεῖς ⸀ἀγαπῶμεν, ὅτι αὐτὸς πρῶτος ἠγάπησεν ἡμᾶς.
translation:
  text: We love because he first loved us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read, 'We love him because he first loved us.'
    reason: textual_variant
lexical_decisions:
- source_word: ἡμεῖς
  chosen: We
  alternatives:
  - We ourselves
  lexicon: BDAG
  rationale: Explicit subject pronoun adds emphasis/contrast in Greek, but standard
    English can preserve the sense without overtranslating. 'We' is sufficient and
    natural.
- source_word: ἀγαπῶμεν
  chosen: love
  alternatives:
  - are loving
  lexicon: BDAG
  rationale: Present active indicative, first person plural. Rendered as simple present
    'love' for idiomatic English and to preserve the lexical connection with ἀγάπη/ἀγαπάω
    in the context.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: 'Here ὅτι is best taken as causal, giving the reason for the believers''
    love: God''s prior love. ''Because'' is clearer than the more ambiguous ''for''
    or ''that''.'
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: Refers to God in context. The pronoun carries some emphasis, but English
    'he' adequately conveys the subject without unnecessary heaviness.
- source_word: πρῶτος
  chosen: first
  alternatives:
  - first of all
  - beforehand
  lexicon: BDAG
  rationale: 'Temporal priority is the point: God''s love precedes and grounds ours.
    ''First'' is the most direct and natural rendering.'
- source_word: ἠγάπησεν
  chosen: loved
  alternatives:
  - has loved
  lexicon: BDAG
  rationale: Aorist indicative is best rendered as simple past in this context, referring
    to God's decisive prior act of love.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object of ἠγάπησεν; straightforwardly rendered 'us'.
