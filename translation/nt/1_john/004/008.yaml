id: 1JN.4.8
reference: 1 John 4:8
source:
  edition: SBLGNT
  text: ὁ μὴ ἀγαπῶν οὐκ ἔγνω τὸν θεόν, ὅτι ὁ θεὸς ἀγάπη ἐστίν.
translation:
  text: The one who does not love has not known God, because God is love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Whoever does not love does not know God.' The Greek aorist may be rendered
      more simply in English, but 'has not known' preserves the sense of not having
      come to know God.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὴ ἀγαπῶν
  chosen: The one who does not love
  alternatives:
  - Whoever does not love
  - The person not loving
  lexicon: BDAG
  rationale: The article with present participle functions substantivally, referring
    to a person characterized by not loving. 'The one who does not love' preserves
    the generic singular force and the ongoing/habitual sense of the present participle
    better than a more wooden 'the not-loving one.'
- source_word: ἀγαπῶν
  chosen: love
  alternatives:
  - show love
  lexicon: BDAG
  rationale: Rendered with the cognate 'love' to preserve the lexical connection with
    ἀγάπη later in the verse, in line with the doctrine's preference for keeping lexical
    cognates visible.
- source_word: οὐκ ἔγνω
  chosen: has not known
  alternatives:
  - does not know
  - did not know
  lexicon: BDAG
  rationale: 'The aorist ἔγνω can be rendered in English with a present perfect here
    to express the resulting state implied in context: the loveless person stands
    as one who has not come to know God. This fits Johannine usage, where knowing
    God is relational and evidenced in present conduct.'
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἔγνω; standard rendering.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the preceding statement, not merely
    content. 'Because' makes the causal force clear in modern English.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Subject with article; English does not require the article with the proper
    divine designation.
- source_word: ἀγάπη
  chosen: love
  alternatives:
  - loving
  lexicon: BDAG
  rationale: Default rendering per doctrine table. The predicate nominative is best
    rendered as the abstract noun 'love,' yielding the established and textually precise
    statement 'God is love.'
- source_word: ἐστίν
  chosen: is
  lexicon: BDAG
  rationale: Simple present copula; no expansion is warranted.
