theological_decisions:
- issue: Force of 'God is love'
  chosen_reading: Retained as a predicative statement about God's character/nature
    without converting it into an exhaustive definition.
  alternative_readings:
  - God is loving
  - Love is God
  rationale: The Greek states ὁ θεὸς ἀγάπη ἐστίν, with 'God' as subject and 'love'
    as predicate nominative. 'God is love' faithfully preserves the theological weight
    while avoiding the erroneous reversal 'Love is God.' 'God is loving' is interpretively
    weaker than the noun predicate and loses the lexical tie to ἀγαπῶν/ἀγάπη in the
    verse.
  doctrine_reference: 'Affirmations; Translation philosophy #5'
- issue: Aspect of knowing God
  chosen_reading: Rendered relationally as 'has not known God' rather than merely
    cognitive 'has not understood God.'
  alternative_readings:
  - has not understood God
  - does not know God
  rationale: In Johannine literature, γινώσκω commonly denotes relational knowledge
    evidenced in life and conduct. The translation preserves that theological and
    lexical sense without over-paraphrasing.
  doctrine_reference: 'Translation philosophy #1; #3'
