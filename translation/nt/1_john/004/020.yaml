id: 1JN.4.20
reference: 1 John 4:20
source:
  edition: SBLGNT
  text: ἐάν τις εἴπῃ ὅτι Ἀγαπῶ τὸν θεόν, καὶ τὸν ἀδελφὸν αὐτοῦ μισῇ, ψεύστης ἐστίν·
    ὁ γὰρ μὴ ἀγαπῶν τὸν ἀδελφὸν αὐτοῦ ὃν ἑώρακεν, τὸν θεὸν ὃν οὐχ ἑώρακεν ⸀οὐ δύναται
    ἀγαπᾶν.
translation:
  text: If anyone says, “I love God,” and hates his brother, he is a liar; for the
    one who does not love his brother whom he has seen cannot love God whom he has
    not seen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his brother or sister.' The Greek says 'his brother' (ἀδελφόν), a masculine
      singular form that can function representatively in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις εἴπῃ
  chosen: If anyone says
  alternatives:
  - If someone says
  lexicon: BDAG
  rationale: ἐάν with the aorist subjunctive εἴπῃ introduces a general conditional
    statement. 'Anyone' is natural modern English and preserves the indefinite force
    of τις.
- source_word: Ἀγαπῶ
  chosen: I love
  lexicon: BDAG
  rationale: The present indicative is best rendered straightforwardly as 'I love.'
    This preserves the lexical connection with the repeated ἀγαπάω/ἀγαπῶν/ἀγαπᾶν in
    the verse and aligns with the project's default rendering of ἀγάπη cognates as
    'love.'
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἀγαπῶ. English does not require the article here; 'God'
    is the natural rendering.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - his fellow believer
  - his brother or sister
  lexicon: BDAG
  rationale: ἀδελφός is grammatically masculine singular. Per doctrine, gender-accurate
    rendering is preferred over gender-neutral. In 1 John the term often refers to
    a fellow believer, but 'brother' preserves the source wording without over-interpreting
    in the main text.
- source_word: μισῇ
  chosen: hates
  alternatives:
  - is hating
  lexicon: BDAG
  rationale: Present subjunctive in the conditional clause is well represented by
    simple present 'hates' in English.
- source_word: ψεύστης ἐστίν
  chosen: he is a liar
  alternatives:
  - he is lying
  - he is false
  lexicon: BDAG
  rationale: ψεύστης is a predicate noun, not merely a verbal idea. 'He is a liar'
    preserves John's categorical moral judgment.
- source_word: ὁ γὰρ μὴ ἀγαπῶν
  chosen: for the one who does not love
  alternatives:
  - for whoever does not love
  - because the one not loving
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'The one who does
    not love' is clear and reasonably formal; 'for' preserves γάρ as explanatory.
- source_word: ὃν ἑώρακεν
  chosen: whom he has seen
  alternatives:
  - whom he has looked at
  - whom he has seen before
  lexicon: BDAG
  rationale: The perfect ἑώρακεν indicates a completed perception with present relevance.
    English present perfect 'has seen' matches well.
- source_word: οὐ δύναται ἀγαπᾶν
  chosen: cannot love
  alternatives:
  - is not able to love
  lexicon: BDAG
  rationale: δύναται expresses ability/possibility. 'Cannot love' is idiomatic and
    preserves the force of impossibility in John's argument.
