theological_decisions:
- issue: Rendering of ἀδελφός in a context that may refer to fellow believers generally
  chosen_reading: brother
  alternative_readings:
  - brother or sister
  - fellow believer
  rationale: The Greek is masculine singular and the doctrine requires gender-accurate
    rendering over gender-neutral. Because the term may carry representative force
    in context, an inclusive alternative is worth preserving in a footnote rather
    than moving to the main text.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over
    gender-neutral)
- issue: Force of οὐ δύναται ἀγαπᾶν
  chosen_reading: cannot love God
  alternative_readings:
  - is not able to love God
  rationale: The verse states a moral-spiritual impossibility within John's argument,
    not merely practical difficulty. 'Cannot love' preserves the text's strong claim
    without adding philosophical explanation.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
