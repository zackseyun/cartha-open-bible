theological_decisions:
- issue: Identity of 'the one who is in you' and 'the one who is in the world'
  chosen_reading: Kept both expressions implicit in the main text as 'the one who
    is in you' and 'the one who is in the world.'
  alternative_readings:
  - Explicitly identifying the first as the Holy Spirit/God and the second as Satan/the
    evil one
  rationale: The context strongly suggests God or his Spirit for the first expression
    and the evil one behind the world for the second, but the Greek itself uses implicit
    substantival expressions. Preserving that wording maintains the text's rhetorical
    force without importing a fuller doctrinal gloss into the translation line.
  doctrine_reference: Preserve theological tension rather than resolve it.
