id: 1JN.4.4
reference: 1 John 4:4
source:
  edition: SBLGNT
  text: ὑμεῖς ἐκ τοῦ θεοῦ ἐστε, τεκνία, καὶ νενικήκατε αὐτούς, ὅτι μείζων ἐστὶν ὁ
    ἐν ὑμῖν ἢ ὁ ἐν τῷ κόσμῳ·
translation:
  text: You are from God, little children, and you have overcome them, because the
    one who is in you is greater than the one who is in the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, the opponents just mentioned, especially the false prophets.
    reason: cross_reference
  - marker: b
    text: Or 'he who is in you ... he who is in the world.' The Greek leaves both
      referents implicit; context suggests God or his Spirit for the first, and the
      evil one behind the world for the second.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑμεῖς
  chosen: You
  alternatives:
  - You yourselves
  lexicon: BDAG
  rationale: The pronoun is explicit and emphatic in Greek. English can preserve the
    emphasis adequately with sentence position and direct address without adding the
    more marked 'yourselves,' which would sound heavier than the context requires.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  lexicon: BDAG
  rationale: ἐκ here denotes source/origin or belonging derived from God. 'From God'
    is idiomatic modern English and preserves the Johannine contrast with what is
    'in the world.' 'Of God' is more traditional but less natural today.
- source_word: τεκνία
  chosen: little children
  alternatives:
  - dear children
  - children
  lexicon: BDAG
  rationale: τεκνία is a diminutive form used affectionately by John. 'Little children'
    preserves both the familial and tender force more transparently than the interpretive
    'dear children.'
- source_word: νενικήκατε
  chosen: you have overcome
  alternatives:
  - you have conquered
  - you have been victorious over
  lexicon: BDAG
  rationale: The perfect tense indicates a completed victory with continuing result.
    'You have overcome' is natural English, preserves the aspect reasonably well,
    and matches Johannine usage without sounding militaristic beyond the text.
- source_word: αὐτούς
  chosen: them
  alternatives:
  - those people
  - those spirits
  lexicon: BDAG
  rationale: The pronoun refers back to the false prophets/antichrist-related opponents
    in the immediate context. 'Them' keeps the anaphoric reference without over-specifying
    in the main text.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Here ὅτι introduces the reason for the believers' overcoming. 'Because'
    is clearer in contemporary English than 'for.'
- source_word: μείζων
  chosen: greater
  alternatives:
  - stronger
  - mightier
  lexicon: BDAG
  rationale: The comparative adjective is broad and should not be narrowed to mere
    strength. 'Greater' preserves the full comparative sense and echoes familiar Johannine/theological
    language.
- source_word: ὁ ἐν ὑμῖν
  chosen: the one who is in you
  alternatives:
  - he who is in you
  lexicon: BDAG
  rationale: The substantival article with prepositional phrase is best rendered personally
    but without unnecessarily gendered English. 'The one who is in you' is accurate,
    readable, and leaves the referent implicit as in Greek.
- source_word: ὁ ἐν τῷ κόσμῳ
  chosen: the one who is in the world
  alternatives:
  - he who is in the world
  lexicon: BDAG
  rationale: This mirrors the previous phrase and preserves the rhetorical contrast.
    'The one who is in the world' keeps the referent implicit and avoids importing
    a more explicit identification into the main text.
- source_word: κόσμῳ
  chosen: world
  alternatives:
  - world-system
  lexicon: BDAG
  rationale: κόσμος in Johannine literature often carries the sense of the world in
    rebellion against God, but 'world' is the proper base rendering. The more interpretive
    'world-system' would over-explain in the main text.
