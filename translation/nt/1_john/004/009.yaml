id: 1JN.4.9
reference: 1 John 4:9
source:
  edition: SBLGNT
  text: ἐν τούτῳ ἐφανερώθη ἡ ἀγάπη τοῦ θεοῦ ἐν ἡμῖν, ὅτι τὸν υἱὸν αὐτοῦ τὸν μονογενῆ
    ἀπέσταλκεν ὁ θεὸς εἰς τὸν κόσμον ἵνα ζήσωμεν δι’ αὐτοῦ.
translation:
  text: 'In this the love of God was revealed among us: that God has sent his one
    and only Son into the world so that we might live through him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in us.' The Greek phrase can denote manifestation within believers or
      among us corporately.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''his only begotten Son.'' The Greek μονογενής emphasizes
      the Son''s uniqueness; ''only begotten'' preserves the historic churchly wording.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: In this
  alternatives:
  - By this
  - In this way
  lexicon: BDAG
  rationale: A standard Johannine demonstrative formula introducing the manner or
    sphere in which something is shown. 'In this' preserves the Greek structure and
    allows the following ὅτι-clause to explain it.
- source_word: ἐφανερώθη
  chosen: was revealed
  alternatives:
  - was made manifest
  - was shown
  lexicon: BDAG
  rationale: Passive aorist of φανερόω. 'Was revealed' is natural modern English and
    preserves the sense of something becoming openly visible or known.
- source_word: ἡ ἀγάπη τοῦ θεοῦ
  chosen: the love of God
  alternatives:
  - God's love
  lexicon: BDAG
  rationale: 'Rendered with the default gloss ''love'' for ἀγάπη per doctrine. The
    genitive is most naturally subjective here in context: the love that belongs to
    or proceeds from God, demonstrated in sending the Son.'
- source_word: ἐν ἡμῖν
  chosen: among us
  alternatives:
  - in us
  lexicon: BDAG
  rationale: Though literally 'in us,' in this context the phrase most naturally refers
    to God's love being manifested in the community's midst or in relation to us,
    not merely as an inward experience. 'Among us' reads more idiomatically in English
    while preserving the communal force. The alternative is worth preserving because
    some read it as inward manifestation.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: Introduces the content/explanation of how God's love was revealed. 'That'
    fits the explanatory function better than a strictly causal 'because' in this
    sentence.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his ... Son
  lexicon: BDAG
  rationale: Straightforward rendering of the filial designation. Capitalized 'Son'
    because the referent is Jesus in a titular, christological sense.
- source_word: τὸν μονογενῆ
  chosen: one and only
  alternatives:
  - only
  - only begotten
  - unique
  lexicon: BDAG
  rationale: μονογενής in Johannine usage most naturally conveys uniqueness/one-of-a-kind
    sonship rather than explicitly describing begetting as an act. 'One and only'
    is clear modern English and preserves the exclusivity of the relationship. 'Only
    begotten' is preserved as a traditional alternative in a footnote because of its
    theological and translational history.
- source_word: ἀπέσταλκεν
  chosen: has sent
  alternatives:
  - sent
  lexicon: BDAG
  rationale: Perfect active indicative of ἀποστέλλω. 'Has sent' preserves the perfect
    aspect better than simple past, suggesting a completed sending with abiding significance.
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  lexicon: BDAG
  rationale: Standard rendering. κόσμος here refers to the human world/order into
    which the Son was sent.
- source_word: ἵνα ζήσωμεν
  chosen: so that we might live
  alternatives:
  - so that we may live
  lexicon: BDAG
  rationale: ἵνα with aorist subjunctive expresses purpose. 'Might live' communicates
    intended result without overstating aspect.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  lexicon: BDAG
  rationale: διά with genitive commonly denotes means or agency. 'Through him' is
    the most natural and theologically precise English rendering here.
