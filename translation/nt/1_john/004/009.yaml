theological_decisions:
- issue: Meaning of μονογενής in reference to the Son
  chosen_reading: Rendered as 'one and only Son' in the main text
  alternative_readings:
  - only begotten Son
  - unique Son
  rationale: Within orthodox Christology, the verse affirms the Son's unique relation
    to the Father. The translation avoids importing later doctrinal formulation directly
    into the lexical gloss while still preserving the traditional 'only begotten'
    in a footnote because of its historic theological significance.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including the homoousios
    language); Translation philosophy §§1, 3, 6'
- issue: Force of ἐν ἡμῖν
  chosen_reading: Rendered as 'among us'
  alternative_readings:
  - in us
  rationale: This preserves the communal and manifested character of God's love in
    context, while not denying that the phrase can also be understood more inwardly.
    The alternative is preserved in a footnote to maintain interpretive transparency
    and avoid over-resolving the ambiguity.
  doctrine_reference: Translation philosophy §3
