theological_decisions:
- issue: Rendering of ἱλασμός in a doctrinally sensitive atonement context
  chosen_reading: an atoning sacrifice
  alternative_readings:
  - propitiation
  - expiation
  rationale: The verse teaches that God's love is shown in sending his Son to deal
    effectively with human sins. 'Atoning sacrifice' preserves that core meaning while
    avoiding unnecessary technicality. Because ἱλασμός is theologically contested
    in English tradition, traditional alternatives are preserved in a footnote rather
    than excluded.
  doctrine_reference: 'DOCTRINE.md: Readable modern English, not archaic or academic;
    Preserve theological tension rather than resolve it; Contested terms table principle
    for ἱλαστήριον applied analogically to cognate ἱλασμός.'
