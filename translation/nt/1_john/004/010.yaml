id: 1JN.4.10
reference: 1 John 4:10
source:
  edition: SBLGNT
  text: ἐν τούτῳ ἐστὶν ἡ ἀγάπη, οὐχ ὅτι ἡμεῖς ⸀ἠγαπήκαμεν τὸν θεόν, ἀλλ’ ὅτι αὐτὸς
    ἠγάπησεν ἡμᾶς καὶ ἀπέστειλεν τὸν υἱὸν αὐτοῦ ἱλασμὸν περὶ τῶν ἁμαρτιῶν ἡμῶν.
translation:
  text: 'In this is love: not that we have loved God, but that he loved us and sent
    his Son as the atoning sacrifice for our sins.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'propitiation'; also possibly 'expiation.' The Greek term ἱλασμός refers
      to the Son's sacrificial dealing with sins.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  chosen: In this
  alternatives:
  - In this way
  - Herein
  lexicon: BDAG
  rationale: A common Johannine idiom pointing to what follows as the defining instance
    or sphere. 'In this' preserves the formal structure while remaining natural English.
- source_word: ἡ ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Follows the project's default rendering of ἀγάπη as 'love.' The article
    marks the concept definitively ('the love'), but idiomatic English omits the article
    here.
- source_word: οὐχ ὅτι ... ἀλλ’ ὅτι
  chosen: not that ... but that
  alternatives:
  - not because ... but because
  lexicon: BDAG
  rationale: Preserves the Greek contrastive construction and keeps the focus on defining
    what love consists in, rather than introducing a causal paraphrase.
- source_word: ἠγαπήκαμεν
  chosen: we have loved
  alternatives:
  - we loved
  lexicon: BDAG
  rationale: The perfect tense is represented with 'have loved' to preserve the aspectual
    force better than a simple past, especially in contrast with God's decisive past
    action.
- source_word: θεόν
  chosen: God
  lexicon: BDAG
  rationale: Standard rendering of θεός in this context.
- source_word: αὐτὸς
  chosen: he
  alternatives:
  - he himself
  lexicon: BDAG
  rationale: The pronoun is somewhat emphatic in Greek, contrasting God with 'we.'
    English conveys the contrast sufficiently with 'he' in the 'not ... but' structure
    without overloading the sentence.
- source_word: ἠγάπησεν
  chosen: loved
  lexicon: BDAG
  rationale: Aorist indicative referring to God's decisive act of love in salvation
    history; simple past is the most natural English rendering.
- source_word: ἀπέστειλεν
  chosen: sent
  lexicon: BDAG
  rationale: Straightforward rendering of the aorist verb; preserves the missional/sending
    language central to Johannine theology.
- source_word: τὸν υἱὸν αὐτοῦ
  chosen: his Son
  alternatives:
  - the Son of him
  lexicon: BDAG
  rationale: Idiomatic and precise rendering; preserves filial and christological
    significance.
- source_word: ἱλασμὸν
  chosen: an atoning sacrifice
  alternatives:
  - propitiation
  - expiation
  lexicon: BDAG
  rationale: Although the doctrine table explicitly lists ἱλαστήριον, the same accessibility
    principle applies here to the cognate ἱλασμός. 'Atoning sacrifice' communicates
    the sacrificial and sin-dealing sense in readable English without requiring technical
    theological vocabulary. Traditional alternatives are preserved in a footnote.
- source_word: περὶ τῶν ἁμαρτιῶν ἡμῶν
  chosen: for our sins
  alternatives:
  - concerning our sins
  - with regard to our sins
  lexicon: BDAG
  rationale: With sacrificial language, περί commonly carries the sense 'for' in relation
    to sins. This is the most natural and contextually appropriate English rendering.
