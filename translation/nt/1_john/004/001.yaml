id: 1JN.4.1
reference: 1 John 4:1
source:
  edition: SBLGNT
  text: Ἀγαπητοί, μὴ παντὶ πνεύματι πιστεύετε, ἀλλὰ δοκιμάζετε τὰ πνεύματα εἰ ἐκ τοῦ θεοῦ ἐστιν, ὅτι πολλοὶ ψευδοπροφῆται ἐξεληλύθασιν εἰς τὸν κόσμον.
translation:
  text: Beloved[a], do not believe every spirit, but test the spirits to see whether they are from God[b], because many false prophets have gone out into the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Dear friends.' The Greek address literally means 'beloved ones.'
    reason: lexical_alternative
  - marker: b
    text: That is, test the spiritual source behind prophetic claims; the next clause speaks of 'false prophets' as the human agents.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  lexicon: BDAG
  rationale: Vocative plural adjective used as a warm address. 'Beloved' preserves the lexical connection to ἀγαπάω/ἀγάπη and keeps John's affectionate, theologically weighty style better than the more idiomatic 'dear friends'.
- source_word: παντὶ πνεύματι
  chosen: every spirit
  alternatives:
  - every spiritual utterance
  - every inspired person
  lexicon: BDAG
  rationale: The singular with πιστεύετε is generic. In context John is speaking of spiritual influences/claims behind prophetic speech, not merely human teachers, so 'every spirit' is the most direct rendering. The following reference to 'false prophets' shows the spirits are discerned through human claimants, but does not require replacing 'spirit' with 'prophet' in translation.
- source_word: πιστεύετε
  chosen: believe
  alternatives:
  - trust
  lexicon: BDAG
  rationale: Present imperative with μή gives a general prohibition. 'Believe' fits the object 'spirit' in English and preserves the cognitive/credal sense of accepting claims as true; 'trust' is possible but less natural here.
- source_word: δοκιμάζετε
  chosen: test
  alternatives:
  - examine
  - prove
  lexicon: BDAG
  rationale: The verb denotes testing for genuineness. 'Test' is concise, idiomatic, and preserves the evaluative force without sounding overly technical.
- source_word: τὰ πνεύματα
  chosen: the spirits
  alternatives:
  - spiritual influences
  - the spiritual claims
  lexicon: BDAG
  rationale: Plural direct object corresponding to the prior singular generic. Retaining 'spirits' preserves the text's supernatural framing and avoids interpretive narrowing.
- source_word: εἰ ἐκ τοῦ θεοῦ ἐστιν
  chosen: to see whether they are from God
  alternatives:
  - whether they are from God
  lexicon: BDAG
  rationale: Although ἐστιν is singular in the printed text, the sense with plural antecedent is naturally distributive/collective in English. 'To see' makes explicit the common English sense after 'test' without adding substantial content, yielding natural modern English.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  lexicon: BDAG
  rationale: ἐκ here indicates source/origin. 'From God' is clearer and more idiomatic in modern English than 'of God' while preserving the theological claim of divine origin.
- source_word: πολλοὶ ψευδοπροφῆται
  chosen: many false prophets
  lexicon: BDAG
  rationale: Straightforward rendering. 'False prophets' is the established and accurate gloss for ψευδοπροφῆται.
- source_word: ἐξεληλύθασιν
  chosen: have gone out
  alternatives:
  - have gone forth
  - have appeared
  lexicon: BDAG
  rationale: 'Perfect tense indicates a completed action with present result: they have gone out and are now active in the world. ''Have gone out'' preserves the verbal imagery and aspect better than the more interpretive ''have appeared''.'
- source_word: εἰς τὸν κόσμον
  chosen: into the world
  alternatives:
  - into the world system
  lexicon: BDAG
  rationale: κόσμος here refers to the inhabited human sphere/world of opposition in Johannine usage. 'Into the world' is the natural and sufficiently broad rendering; adding 'system' would over-interpret.
