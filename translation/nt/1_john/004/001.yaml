theological_decisions:
- issue: Referent of 'spirits'
  chosen_reading: Actual spirits/spiritual sources behind prophetic claims, discerned through human prophets
  alternative_readings:
  - Merely human teachers
  - Prophetic utterances abstractly considered
  rationale: The text explicitly contrasts 'spirits' with 'false prophets,' suggesting the prophets are human agents through whom these spirits speak. The translation preserves the supernatural language rather than reducing it to sociology, while not denying the practical focus on testing teachers.
  doctrine_reference: Preserve theological tension rather than resolve it.
