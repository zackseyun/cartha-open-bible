theological_decisions:
- issue: Meaning of 'perfect love' and 'not been perfected'
  chosen_reading: Render with 'perfect love' and 'has not been perfected' to preserve the text's tension between love's completeness and the believer's incomplete formation in love.
  alternative_readings:
  - '''mature love'' / ''has not become mature in love'''
  rationale: The verse speaks of love reaching its intended completeness and thereby excluding fear. Using 'perfect' preserves the lexical connection between τελεία and τετελείωται and avoids reducing the statement to mere emotional maturity, while not importing a doctrine of sinless perfection.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
