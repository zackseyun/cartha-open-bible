id: 1JN.4.18
reference: 1 John 4:18
source:
  edition: SBLGNT
  text: φόβος οὐκ ἔστιν ἐν τῇ ἀγάπῃ, ἀλλ’ ἡ τελεία ἀγάπη ἔξω βάλλει τὸν φόβον, ὅτι ὁ φόβος κόλασιν ἔχει, ὁ δὲ φοβούμενος οὐ τετελείωται ἐν τῇ ἀγάπῃ.
translation:
  text: There is no fear in love[a], but perfect love drives out fear, because fear has punishment[c][b]. But the one who fears has not been perfected in love.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'casts out fear.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'fear has punishment.'
    reason: lexical_alternative
  - marker: c
    text: '''Perfect love'' may also be understood as ''complete'' or ''mature'' love—love brought to its intended fullness.'
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβος
  chosen: fear
  alternatives:
  - dread
  lexicon: BDAG
  rationale: Standard sense in context of anxiety before judgment; 'fear' is natural English and preserves the repeated lexical link across the verse.
- source_word: ἀγάπῃ / ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Follows the project's default rendering for ἀγάπη and preserves the repeated key term consistently.
- source_word: τελεία
  chosen: perfect
  alternatives:
  - complete
  - mature
  lexicon: BDAG
  rationale: In Johannine usage the idea is love brought to its intended fullness. 'Perfect' is the established and still intelligible rendering, while the following clause clarifies the sense. Alternatives are possible but less direct here.
- source_word: ἔξω βάλλει
  chosen: drives out
  alternatives:
  - casts out
  lexicon: BDAG
  rationale: Idiomatic English for forceful expulsion. 'Casts out' is more formal and traditional, but 'drives out' better fits readable modern English while preserving the metaphor.
- source_word: κόλασιν ἔχει
  chosen: has to do with punishment
  alternatives:
  - has punishment
  - involves punishment
  lexicon: BDAG
  rationale: The Greek is literally 'has punishment,' but idiomatic English requires expansion. This rendering communicates that fear is bound up with expectation of punishment without overstating the clause.
- source_word: ὁ δὲ φοβούμενος
  chosen: the one who fears
  alternatives:
  - whoever fears
  - the person who fears
  lexicon: BDAG
  rationale: Accurately reflects the substantival participle in natural English without introducing unnecessary gendering.
- source_word: τετελείωται
  chosen: has not been perfected
  alternatives:
  - has not been made perfect
  - is not complete
  lexicon: BDAG
  rationale: Perfect passive indicates a state resulting from completion. 'Has not been perfected' preserves both the verbal connection to τελεία/τελειόω and the aspect better than a flatter paraphrase.
- source_word: ἐν τῇ ἀγάπῃ
  chosen: in love
  alternatives:
  - in the sphere of love
  lexicon: BDAG
  rationale: Simple and natural rendering of the prepositional phrase; the relational/spherical sense is adequately conveyed by 'in love'.
