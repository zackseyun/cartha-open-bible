theological_decisions:
- issue: Referent of 'his' and identity of 'Spirit'
  chosen_reading: '''his Spirit'' refers to God, and ''Spirit'' is rendered with capitalization
    to indicate the Holy Spirit.'
  alternative_readings:
  - lowercase 'spirit' as a more generic spiritual gift or disposition
  rationale: In the immediate context of 1 John, mutual indwelling between God and
    believers is evidenced by God's gift of the Spirit. Capitalization signals the
    personal divine referent without adding content beyond the context.
  doctrine_reference: Affirmations; Translation philosophy §6
- issue: Rendering of Johannine mutual indwelling language
  chosen_reading: Use 'remain in him and he in us' without expanding the second clause.
  alternative_readings:
  - '''abide in him and he abides in us'''
  - '''live in him and he in us'''
  rationale: This preserves the theological reciprocity of indwelling while avoiding
    paraphrase. It also maintains consistency for μένω as a key Johannine term.
  doctrine_reference: Translation philosophy §5
