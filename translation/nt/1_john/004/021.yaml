id: 1JN.4.21
reference: 1 John 4:21
source:
  edition: SBLGNT
  text: καὶ ταύτην τὴν ἐντολὴν ἔχομεν ἀπ’ αὐτοῦ, ἵνα ὁ ἀγαπῶν τὸν θεὸν ἀγαπᾷ καὶ τὸν
    ἀδελφὸν αὐτοῦ.
translation:
  text: 'And we have this commandment from him: that the one who loves God should
    also love his brother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his brother or sister'; the Greek says 'his brother,' using a masculine
      singular form that can function representatively for a fellow believer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντολήν
  chosen: commandment
  alternatives:
  - command
  lexicon: BDAG
  rationale: Rendered as 'commandment' to preserve the moral and authoritative force
    common in Johannine usage, while remaining natural English. 'Command' is possible,
    but 'commandment' better reflects the established semantic weight of ἐντολή in
    this context.
- source_word: ἀπ’ αὐτοῦ
  chosen: from him
  alternatives:
  - from God
  lexicon: BDAG
  rationale: Rendered literally as 'from him' because the pronoun naturally refers
    back to God in the immediate context, and the Greek uses a pronoun rather than
    repeating θεός. This preserves the discourse flow of the source text.
- source_word: ἵνα
  chosen: that
  alternatives:
  - so that
  - in order that
  lexicon: BDAG
  rationale: Here ἵνα introduces the content or substance of the command rather than
    a strongly purposive clause. 'That' gives idiomatic English while preserving the
    sense of what the command requires.
- source_word: ὁ ἀγαπῶν τὸν θεόν
  chosen: the one who loves God
  alternatives:
  - whoever loves God
  - he who loves God
  lexicon: BDAG
  rationale: The articular participle is best represented by the gender-accurate but
    broadly representative English expression 'the one who loves God.' This avoids
    archaic 'he who' while preserving the singular form of the Greek.
- source_word: ἀγαπᾷ
  chosen: should also love
  alternatives:
  - must also love
  - also loves
  lexicon: BDAG
  rationale: The present subjunctive after ἵνα expresses what the command enjoins.
    'Should also love' communicates obligation in natural English without over-intensifying
    to 'must,' while avoiding a flat indicative sense.
- source_word: ἀδελφὸν αὐτοῦ
  chosen: his brother
  alternatives:
  - his fellow believer
  - his brother or sister
  lexicon: BDAG
  rationale: Rendered 'his brother' to remain gender-accurate to the masculine singular
    ἀδελφός, in keeping with the stated philosophy. The term in Johannine context
    refers to a fellow member of the believing community, but that interpretive expansion
    is not brought into the main text. Inclusivity and communal sense are preserved
    in a footnote rather than replacing the source form.
- source_word: καὶ
  chosen: also
  alternatives:
  - and
  lexicon: BDAG
  rationale: 'The second καί is rendered ''also'' to make explicit the additive force:
    love for God is inseparable from love for one''s brother. This is a natural English
    equivalent of the connective emphasis.'
- source_word: ἀγαπάω / ἀγαπῶν / ἀγαπᾷ
  chosen: love / loves
  alternatives: []
  lexicon: BDAG
  rationale: Used the English cognate 'love' consistently for the ἀγαπάω word group,
    following the project's default treatment of ἀγάπη cognates and preserving Johannine
    thematic coherence.
