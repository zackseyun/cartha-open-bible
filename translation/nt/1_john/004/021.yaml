theological_decisions:
- issue: Gendered singular reference in ἀδελφὸν αὐτοῦ
  chosen_reading: Retain 'his brother' in the main text, with inclusive communal sense
    noted in a footnote.
  alternative_readings:
  - his brother or sister
  - fellow believer
  rationale: The Greek is grammatically masculine singular and functions representatively.
    Per the doctrine's gender-accurate principle, the main text should reflect the
    source form rather than neutralize it. Because the referent in context extends
    to fellow believers generally, an inclusive alternative is preserved in a footnote
    rather than imported into the translation itself.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
