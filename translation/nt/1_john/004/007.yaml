id: 1JN.4.7
reference: 1 John 4:7
source:
  edition: SBLGNT
  text: Ἀγαπητοί, ἀγαπῶμεν ἀλλήλους, ὅτι ἡ ἀγάπη ἐκ τοῦ θεοῦ ἐστιν, καὶ πᾶς ὁ ἀγαπῶν
    ἐκ τοῦ θεοῦ γεγέννηται καὶ γινώσκει τὸν θεόν.
translation:
  text: Beloved, let us love one another, because love is from God, and everyone who
    loves has been born of God and knows God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Dear friends.' The Greek address is literally 'Beloved,' echoing the
      love-word family repeated throughout the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  chosen: Beloved
  alternatives:
  - Dear friends
  - Loved ones
  lexicon: BDAG
  rationale: Vocative plural adjective used as a form of affectionate address. 'Beloved'
    preserves the lexical connection with the ἀγαπάω/ἀγάπη word group in the verse
    better than 'dear friends,' maintaining John's rhetorical repetition.
- source_word: ἀγαπῶμεν
  chosen: let us love
  alternatives:
  - we should love
  - let us keep loving
  lexicon: BDAG
  rationale: Present active subjunctive, first person plural, functioning hortatorily.
    'Let us love' is the natural English equivalent. The present aspect may imply
    ongoing action, but explicit 'keep loving' would over-specify what is only implicit.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal pronoun rendering in idiomatic English.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - since
  lexicon: BDAG
  rationale: Introduces the ground or reason for the exhortation. 'Because' communicates
    the causal force clearly in modern English.
- source_word: ἡ ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Default rendering per doctrine table. The article is generic rather than
    requiring 'the love' in English.
- source_word: ἐκ τοῦ θεοῦ
  chosen: from God
  alternatives:
  - of God
  - out of God
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From God' is clear, idiomatic, and preserves
    the theological claim that love has its source in God.
- source_word: πᾶς ὁ ἀγαπῶν
  chosen: everyone who loves
  alternatives:
  - whoever loves
  - everyone loving
  lexicon: BDAG
  rationale: Substantival participle with πᾶς expresses a general class. 'Everyone
    who loves' is idiomatic and preserves the gnomic force.
- source_word: γεγέννηται
  chosen: has been born
  alternatives:
  - has been begotten
  - is born
  lexicon: BDAG
  rationale: Perfect passive indicative of γεννάω. 'Has been born' best conveys the
    completed action with abiding result in natural English. 'Begotten' is more formal
    and less idiomatic here.
- source_word: ἐκ τοῦ θεοῦ γεγέννηται
  chosen: has been born of God
  alternatives:
  - has been born from God
  lexicon: BDAG
  rationale: This Johannine expression is conventionally and naturally rendered 'born
    of God' in English. While ἐκ often means 'from,' 'born of God' better reflects
    established English idiom without changing the sense of divine source.
- source_word: γινώσκει τὸν θεόν
  chosen: knows God
  alternatives:
  - has come to know God
  lexicon: BDAG
  rationale: Present tense indicates ongoing relational knowledge. 'Knows God' is
    the most direct rendering; 'has come to know' would import an ingressive nuance
    not explicit in the present form.
