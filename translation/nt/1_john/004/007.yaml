theological_decisions:
- issue: Relationship between love, new birth, and knowledge of God
  chosen_reading: Render the verse straightforwardly as describing love as evidence
    of being born of God and knowing God, without importing a denominationally specific
    order-of-salvation framework.
  alternative_readings:
  - Read as a strict test proving regeneration in a technical systematic-theology
    sense
  - Read as a purely ethical statement detached from regeneration
  rationale: The Greek states that everyone who loves has been born of God and knows
    God. The translation preserves John's theological linkage without expanding it
    into later doctrinal formulations or weakening it into mere moralism.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Rendering of ἀγάπη / ἀγαπάω word group
  chosen_reading: Use 'love' consistently across the cognates in this verse.
  alternative_readings:
  - Use varied English such as 'dear friends' alongside 'love' without signaling the
    lexical connection
  rationale: The verse is rhetorically built on repetition of the ἀγαπ- root. Consistent
    rendering preserves the theological and literary emphasis.
  doctrine_reference: Translation philosophy §5; Contested terms table for ἀγάπη
