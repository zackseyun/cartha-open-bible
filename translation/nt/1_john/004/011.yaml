id: 1JN.4.11
reference: 1 John 4:11
source:
  edition: SBLGNT
  text: ἀγαπητοί, εἰ οὕτως ὁ θεὸς ἠγάπησεν ἡμᾶς, καὶ ἡμεῖς ὀφείλομεν ἀλλήλους ἀγαπᾶν.
translation:
  text: Beloved, if God so loved us, we also ought to love one another.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'since God loved us in this way.' The Greek uses a conditional form ('if')
      that likely assumes the condition as true in context.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαπητοί
  chosen: Beloved
  alternatives:
  - dear friends
  - loved ones
  lexicon: BDAG
  rationale: Vocative plural adjective used as a direct address. 'Beloved' preserves
    the lexical connection to ἀγαπάω/ἀγάπη in the verse and keeps John's affectionate,
    theologically loaded style better than the more interpretive 'dear friends'.
- source_word: εἰ
  chosen: if
  alternatives:
  - since
  lexicon: BDAG
  rationale: Rendered 'if' to preserve the Greek conditional form. In context the
    condition is assumed true for rhetorical force, but translating as 'since' would
    resolve the nuance more interpretively than necessary.
- source_word: οὕτως
  chosen: so
  alternatives:
  - in this way
  - thus
  lexicon: BDAG
  rationale: Here οὕτως most naturally intensifies or points back to the manner/extent
    of God's love in context. 'So' is idiomatic and concise in English, while still
    allowing both manner and degree resonance.
- source_word: ὁ θεὸς
  chosen: God
  lexicon: BDAG
  rationale: Straightforward rendering of the subject with the article not requiring
    explicit representation in English.
- source_word: ἠγάπησεν
  chosen: loved
  lexicon: BDAG
  rationale: Aorist active indicative of ἀγαπάω. 'Loved' is the standard and contextually
    appropriate rendering, preserving the lexical family with ἀγαπητοί and ἀγαπᾶν.
- source_word: ἡμᾶς
  chosen: us
  lexicon: BDAG
  rationale: Direct object pronoun, naturally rendered 'us'.
- source_word: καὶ ἡμεῖς
  chosen: we also
  alternatives:
  - we too
  - also we
  lexicon: BDAG
  rationale: The explicit pronoun adds emphasis. 'We also' captures both the conjunction
    and the emphatic subject in natural English.
- source_word: ὀφείλομεν
  chosen: ought to
  alternatives:
  - are obligated to
  - must
  lexicon: BDAG
  rationale: ὀφείλω can denote indebtedness or moral obligation. 'Ought to' conveys
    ethical obligation without overstating to an absolute imperative like 'must,'
    fitting John's paraenetic tone.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering in English.
- source_word: ἀγαπᾶν
  chosen: to love
  lexicon: BDAG
  rationale: Present infinitive after ὀφείλομεν, rendered naturally as complementary
    infinitive 'to love,' preserving the key love vocabulary.
