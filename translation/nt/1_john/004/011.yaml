theological_decisions:
- issue: Force of the conditional clause εἰ οὕτως ὁ θεὸς ἠγάπησεν ἡμᾶς
  chosen_reading: Retain the formal conditional 'if God so loved us' rather than converting
    it to a causal 'since God loved us in this way.'
  alternative_readings:
  - since God so loved us
  - since God loved us in this way
  rationale: The statement assumes the truth of God's love, but the Greek is still
    cast as a conditional for rhetorical exhortation. Preserving 'if' maintains the
    source structure and theological tension without flattening it into an explicit
    causal statement.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
