id: 1JN.4.12
reference: 1 John 4:12
source:
  edition: SBLGNT
  text: θεὸν οὐδεὶς πώποτε τεθέαται· ἐὰν ἀγαπῶμεν ἀλλήλους, ὁ θεὸς ἐν ἡμῖν μένει καὶ
    ἡ ἀγάπη αὐτοῦ ⸂ἐν ἡμῖν τετελειωμένη ἐστιν⸃.
translation:
  text: No one has ever seen God; if we love one another, God remains in us, and his
    love is perfected in us.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'our love for God is perfected in us.' The Greek 'his love' can be understood
      either as God's love for us or our love directed toward God; the context favors
      God's love.
    reason: alternative_reading
  - marker: b
    text: Or, 'is made complete in us.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεθέαται
  chosen: has ever seen
  alternatives:
  - has beheld
  - has gazed upon
  lexicon: BDAG
  rationale: θεάομαι denotes seeing/viewing, often with the nuance of beholding. In
    natural modern English here, 'has ever seen' best conveys the perfect tense with
    πώποτε and matches the statement's broad force without sounding archaic.
- source_word: πώποτε
  chosen: ever
  alternatives:
  - at any time
  lexicon: BDAG
  rationale: 'Used with the negation to intensify the universal claim: ''No one has
    ever seen God.'' ''Ever'' is concise and idiomatic.'
- source_word: ἐὰν ἀγαπῶμεν
  chosen: if we love
  alternatives:
  - if we should love
  - whenever we love
  lexicon: BDAG
  rationale: ἐάν with the present subjunctive expresses a conditional situation. 'If
    we love' preserves the condition without overtranslating aspect.
- source_word: ἀλλήλους
  chosen: one another
  alternatives:
  - each other
  lexicon: BDAG
  rationale: Standard reciprocal rendering in Johannine contexts; 'one another' fits
    the elevated but readable style.
- source_word: μένει
  chosen: remains
  alternatives:
  - abides
  - stays
  lexicon: BDAG
  rationale: μένω is a key Johannine term. 'Remains' preserves the durative relational
    sense in accessible modern English better than the more traditional but less common
    'abides.'
- source_word: ἀγάπη
  chosen: love
  lexicon: BDAG
  rationale: Per doctrine defaults, ἀγάπη is rendered 'love.'
- source_word: ἡ ἀγάπη αὐτοῦ
  chosen: his love
  alternatives:
  - the love he has
  - love for him
  lexicon: BDAG
  rationale: 'The genitive αὐτοῦ is most naturally taken as subjective/possessive
    here: God''s love, not our love for God. This fits the immediate context of God''s
    initiating love in the passage.'
- source_word: τετελειωμένη ἐστιν
  chosen: is perfected
  alternatives:
  - has been perfected
  - has reached completion
  - is made complete
  lexicon: BDAG
  rationale: The periphrastic perfect indicates a completed state with ongoing result.
    'Is perfected' is concise and preserves the verbal connection to τελειόω used
    elsewhere in 1 John, while avoiding paraphrase. 'Made complete' is a viable interpretive
    alternative but slightly less transparent to the Greek form.
- source_word: ἐν ἡμῖν
  chosen: in us
  alternatives:
  - among us
  lexicon: BDAG
  rationale: The repeated ἐν ἡμῖν is rendered consistently as 'in us.' While 'among
    us' is possible in some contexts, the indwelling theme with μένει favors 'in us'
    here.
