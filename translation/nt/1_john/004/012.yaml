theological_decisions:
- issue: Sense of 'his love' (ἡ ἀγάπη αὐτοῦ)
  chosen_reading: God's love is perfected in us
  alternative_readings:
  - our love for God is perfected in us
  rationale: The immediate context emphasizes God's love as prior and active (vv.
    10–11), so the possessive/subjective sense is more likely than an objective genitive.
    The translation preserves that reading in the main text while noting the alternative.
  doctrine_reference: Translation philosophy §3 (preserve theological tension where
    genuine ambiguity exists)
