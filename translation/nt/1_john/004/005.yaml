id: 1JN.4.5
reference: 1 John 4:5
source:
  edition: SBLGNT
  text: αὐτοὶ ἐκ τοῦ κόσμου εἰσίν· διὰ τοῦτο ἐκ τοῦ κόσμου λαλοῦσιν καὶ ὁ κόσμος αὐτῶν
    ἀκούει.
translation:
  text: They are from the world; for this reason they speak from the world, and the
    world listens to them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'They are of the world … they speak of the world.' The Greek repeatedly
      uses 'from/out of the world,' emphasizing source or origin.
    reason: lexical_alternative
  - marker: b
    text: '''The world'' here means the human order opposed to God, not the created
      universe as such.'
    reason: cultural_note
lexical_decisions:
- source_word: αὐτοὶ
  chosen: They
  alternatives:
  - These people
  - They themselves
  lexicon: BDAG
  rationale: Personal pronoun referring back to the false prophets/spirits in context.
    English does not require the emphatic force to be made explicit, though 'they'
    preserves the contrast with 'we' in the following verse.
- source_word: ἐκ τοῦ κόσμου
  chosen: from the world
  alternatives:
  - of the world
  - out of the world
  lexicon: BDAG
  rationale: ἐκ marks source/origin. 'From the world' best preserves the repeated
    Johannine idea of deriving one's character and message from the fallen world-order,
    while remaining natural English. 'Of the world' is possible but less explicit
    about source.
- source_word: κόσμος
  chosen: world
  alternatives:
  - world-system
  lexicon: BDAG
  rationale: In Johannine usage here, κόσμος refers not to the physical creation but
    to the human order in rebellion against God. 'World' is the standard rendering
    and preserves the theological resonance; 'world-system' would over-interpret in
    the main text.
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - therefore
  - because of this
  lexicon: BDAG
  rationale: This causal phrase links their origin with their speech. 'For this reason'
    is slightly more explicit than 'therefore' and fits readable modern English.
- source_word: λαλοῦσιν
  chosen: speak
  alternatives:
  - are speaking
  - talk
  lexicon: BDAG
  rationale: Present tense with general/habitual force. 'Speak' is concise and appropriately
    weighty; 'talk' is too casual.
- source_word: ἐκ τοῦ κόσμου λαλοῦσιν
  chosen: speak from the world
  alternatives:
  - speak as from the world
  - speak from a worldly source
  lexicon: BDAG
  rationale: Repeats the same ἐκ + κόσμος construction and should be rendered consistently.
    'Speak from the world' preserves the source/origin nuance and the rhetorical repetition
    in Greek.
- source_word: ὁ κόσμος αὐτῶν ἀκούει
  chosen: the world listens to them
  alternatives:
  - the world hears them
  - the world listens to what they say
  lexicon: BDAG
  rationale: ἀκούω can mean hear or listen to; here the sense is receptive hearing.
    'Listens to them' communicates not mere auditory perception but favorable reception.
    The genitive αὐτῶν is naturally rendered as the object in English.
