theological_decisions:
- issue: Meaning of κόσμος in Johannine theology
  chosen_reading: '''world'' refers to the human order alienated from God, not the
    created universe as such'
  alternative_readings:
  - the physical world
  - humanity in a neutral sense
  rationale: The immediate context contrasts those who are 'from God' with those who
    are 'from the world.' The verse concerns spiritual/moral origin and receptivity,
    so the ethical-theological Johannine sense is intended. The translation keeps
    the simple term 'world' in the main text and avoids importing an expanded interpretive
    gloss.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of αὐτοὶ
  chosen_reading: No explicit emphatic rendering in English main text
  alternative_readings:
  - They themselves are from the world
  rationale: The pronoun is somewhat emphatic in Greek, but the contrastive discourse
    is adequately conveyed in English without adding 'themselves,' which could sound
    overstated. The decision favors readable modern English while preserving the sense.
  doctrine_reference: Translation philosophy §6
