id: 1JN.5.8
reference: 1 John 5:8
source:
  edition: SBLGNT
  text: τὸ πνεῦμα καὶ τὸ ὕδωρ καὶ τὸ αἷμα, καὶ οἱ τρεῖς εἰς τὸ ἕν εἰσιν.
translation:
  text: the Spirit and the water and the blood[a], and the three are for the one.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'and the three are one.' The Greek idiom here likely means that their testimony agrees.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: Rendered with capital 'Spirit' because in the immediate context (1 John 5:6–8) πνεῦμα most naturally refers to the Holy Spirit as a witness. The article supports a definite referent. The lowercase alternative is grammatically possible but contextually less likely.
- source_word: τὸ ὕδωρ
  chosen: the water
  lexicon: BDAG
  rationale: Translated formally as 'the water,' preserving the article and the concrete imagery of the Greek. The verse does not itself explain the referent, so the translation should not interpret it further in the main text.
- source_word: τὸ αἷμα
  chosen: the blood
  lexicon: BDAG
  rationale: Translated formally as 'the blood,' preserving the article and concrete noun. As with 'water,' the verse leaves the precise referent to context rather than explicit explanation.
- source_word: οἱ τρεῖς
  chosen: the three
  lexicon: BDAG
  rationale: A direct rendering of the substantival phrase, preserving the collective reference to the three witnesses just named.
- source_word: εἰς τὸ ἕν
  chosen: are in agreement
  alternatives:
  - are for the one
  - are unto one
  - are one
  lexicon: BDAG
  rationale: The idiom εἰς τὸ ἕν here is best rendered as agreement in testimony rather than ontological identity. 'Are one' is too terse in English and can suggest metaphysical oneness, whereas the context is witness-bearing. 'Are in agreement' communicates the sense clearly while remaining faithful to the idiom.
