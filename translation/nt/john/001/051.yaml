id: JHN.1.51
reference: John 1:51
source:
  edition: SBLGNT
  text: καὶ λέγει αὐτῷ· Ἀμὴν ἀμὴν λέγω ⸀ὑμῖν, ὄψεσθε τὸν οὐρανὸν ἀνεῳγότα καὶ τοὺς ἀγγέλους τοῦ θεοῦ ἀναβαίνοντας καὶ καταβαίνοντας ἐπὶ τὸν υἱὸν τοῦ ἀνθρώπου.
translation:
  text: And he said to him[a], “Truly, truly, I say to you[b], you will see heaven opened and the angels of God ascending and descending on the Son of Man.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The 'you' in 'I say to you' and 'you will see' is plural in Greek.
    reason: lexical_alternative
  - marker: b
    text: This imagery echoes Jacob's dream in Genesis 28:12, now centered on the Son of Man.
    reason: cross_reference
lexical_decisions:
- source_word: Ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula while expressing its force in natural English. 'Truly, truly' is clear and preserves the solemn introductory weight better for modern readers than leaving 'Amen' untranslated in the main text.
- source_word: ὑμῖν
  chosen: you
  alternatives:
  - you all
  lexicon: BDAG
  rationale: The pronoun is plural, even though Jesus is speaking to Nathanael individually in the narrative frame. English 'you' can represent the plural in the main text; the plural force is worth preserving in a footnote because it broadens the saying beyond Nathanael alone.
- source_word: ὄψεσθε
  chosen: you will see
  alternatives:
  - you shall see
  lexicon: BDAG
  rationale: Future middle indicative of ὁράω is naturally rendered as a simple future in English. 'Will' is more readable modern English than 'shall'.
- source_word: τὸν οὐρανὸν ἀνεῳγότα
  chosen: heaven opened
  alternatives:
  - the heaven opened
  - heaven standing open
  lexicon: BDAG
  rationale: The accusative object with perfect active participle conveys the state of heaven as having been opened. English idiom prefers 'heaven opened' rather than the more wooden 'the heaven opened.' 'Standing open' is possible but adds interpretive color beyond the Greek.
- source_word: ἀγγέλους
  chosen: angels
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this visionary context, with explicit reference to God and allusion to Jacob's ladder imagery, supernatural 'angels' is the clear sense rather than generic 'messengers'.
- source_word: ἀναβαίνοντας καὶ καταβαίνοντας
  chosen: ascending and descending
  alternatives:
  - going up and coming down
  lexicon: BDAG
  rationale: The participles echo Genesis 28 language and are best preserved with the traditional directional pair 'ascending and descending,' which is both accurate and intertextually transparent.
- source_word: ἐπὶ
  chosen: 'on'
  alternatives:
  - upon
  - over
  lexicon: BDAG
  rationale: With the accusative, ἐπί here is best rendered 'on,' preserving the imagery of angelic movement in relation to the Son of Man. 'Upon' is possible but less natural in contemporary English.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  chosen: the Son of Man
  alternatives:
  - the Human One
  lexicon: BDAG
  rationale: This is Jesus' self-designation with strong apocalyptic and scriptural resonance (especially Dan 7 and Gen 28/Jacob imagery in context). 'The Son of Man' preserves the title's established theological and intertextual force better than a paraphrastic alternative.
