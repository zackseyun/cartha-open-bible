theological_decisions:
- issue: Scope of the addressee shifts from singular narrative address (αὐτῷ, 'to him') to plural direct speech (ὑμῖν, 'to you').
  chosen_reading: Main text keeps simple 'you' for readability, with plural force preserved in a footnote.
  alternative_readings:
  - Render explicitly as 'you all' in the main text
  rationale: The Greek intentionally broadens the saying beyond Nathanael alone. Because standard English 'you' is number-ambiguous, the main text remains natural while the footnote documents the plural to preserve the exegetical significance.
  doctrine_reference: Translation philosophy §3, §6
- issue: Intertextual imagery of angels ascending and descending on the Son of Man likely evokes Jacob's ladder (Gen 28:12) and presents Jesus as the locus of divine revelation.
  chosen_reading: Preserve the imagery without interpretive expansion in the main text.
  alternative_readings:
  - Paraphrase to make the Jacob allusion explicit
  rationale: The translation should not import explanatory theology into the text itself. The allusion is important, but it belongs in a footnote rather than the main line of translation.
  doctrine_reference: Translation philosophy §1, §3
