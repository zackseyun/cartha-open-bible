id: JHN.1.22
reference: John 1:22
source:
  edition: SBLGNT
  text: εἶπαν οὖν αὐτῷ· Τίς εἶ; ἵνα ἀπόκρισιν δῶμεν τοῖς πέμψασιν ἡμᾶς· τί λέγεις
    περὶ σεαυτοῦ;
translation:
  text: So they said to him, “Who are you, so that we may give an answer to those
    who sent us? What do you say about yourself?”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὖν
  chosen: So
  alternatives:
  - Therefore
  - Then
  lexicon: BDAG
  rationale: Marks an inferential or transitional continuation from the prior exchange.
    'So' is natural modern English and preserves the discourse flow without sounding
    overly formal.
- source_word: εἶπαν ... αὐτῷ
  chosen: they said to him
  alternatives:
  - they said to him
  - they told him
  lexicon: BDAG
  rationale: λέγω here introduces direct speech. 'Said to him' is the standard and
    least interpretive rendering.
- source_word: Τίς εἶ;
  chosen: Who are you?
  alternatives:
  - Who are you then?
  - Who are you, then?
  lexicon: BDAG
  rationale: A direct identity question. The Greek is terse; 'Who are you?' best matches
    the plain sense without adding emphasis not present in the clause itself.
- source_word: ἵνα
  chosen: so that
  alternatives:
  - in order that
  - so that
  lexicon: BDAG
  rationale: Introduces purpose. 'So that' is idiomatic modern English while preserving
    the purposive force.
- source_word: ἀπόκρισιν
  chosen: an answer
  alternatives:
  - a reply
  - an answer
  lexicon: BDAG
  rationale: Refers to a response given back to the senders. 'Answer' is the most
    natural English equivalent in this investigative context.
- source_word: δῶμεν
  chosen: we may give
  alternatives:
  - we may give
  - we may provide
  lexicon: BDAG
  rationale: Aorist subjunctive after ἵνα expresses intended action. 'Give' preserves
    the common idiom 'give an answer' and reflects the underlying verb δίδωμι.
- source_word: τοῖς πέμψασιν ἡμᾶς
  chosen: to those who sent us
  alternatives:
  - to the ones who sent us
  - to those having sent us
  lexicon: BDAG
  rationale: The articular participle functions substantivally. 'Those who sent us'
    is clear, natural, and sufficiently formal to reflect the Greek structure.
- source_word: τί λέγεις
  chosen: What do you say
  alternatives:
  - What are you saying
  - What do you say
  lexicon: BDAG
  rationale: Present tense in context asks for his stated self-testimony. English
    simple present is the most idiomatic rendering in direct questioning.
- source_word: περὶ σεαυτοῦ
  chosen: about yourself
  alternatives:
  - concerning yourself
  - about yourself
  lexicon: BDAG
  rationale: περί with the genitive indicates reference or subject matter. 'About
    yourself' is natural modern English and accurately conveys the reflexive sense.
