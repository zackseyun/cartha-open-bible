theological_decisions:
- issue: Identity of 'the Prophet'
  chosen_reading: Render as 'the Prophet' without interpretive expansion in the main
    text.
  alternative_readings:
  - the prophet like Moses of Deuteronomy 18
  - a generic prophet
  rationale: The Greek article indicates a recognized expected figure. The translation
    preserves the title as stated rather than resolving the referent in the main text,
    maintaining the text's historical and theological tension.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: John's denial regarding Elijah
  chosen_reading: Translate the denial plainly as 'I am not' without harmonizing it
    with other passages.
  alternative_readings:
  - expand to imply 'I am not Elijah literally'
  - harmonize with Synoptic identification of John as Elijah-like
  rationale: The verse presents John's direct denial and should stand without imported
    interpretive reconciliation. Any harmonization belongs outside the translation
    itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
