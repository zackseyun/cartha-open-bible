id: JHN.1.21
reference: John 1:21
source:
  edition: SBLGNT
  text: καὶ ἠρώτησαν αὐτόν· Τί οὖν; ⸂σὺ Ἠλίας εἶ⸃; καὶ λέγει· Οὐκ εἰμί. Ὁ προφήτης
    εἶ σύ; καὶ ἀπεκρίθη· Οὔ.
translation:
  text: And they asked him, “What then? Are you Elijah?” And he says, “I am not.”
    “Are you the Prophet?” And he answered, “No.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “that Prophet,” likely referring to the expected prophet like Moses
      (Deut 18:15, 18).
    reason: alternative_reading
  - marker: b
    text: Greek has the historical present, “he says,” a vivid narrative style.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠρώτησαν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist of ἐρωτάω here introduces direct questioning in straightforward
    narrative. 'Asked' is the most natural modern English equivalent without adding
    intensity.
- source_word: Τί οὖν;
  chosen: What then?
  alternatives:
  - What, then?
  - What therefore?
  lexicon: BDAG
  rationale: This compact idiom signals a follow-up question based on the previous
    denials. 'What then?' preserves the abruptness and logic of the Greek better than
    a smoother paraphrase.
- source_word: σὺ Ἠλίας εἶ
  chosen: Are you Elijah?
  alternatives:
  - You are Elijah?
  - Are you Elias?
  lexicon: BDAG
  rationale: English idiom requires inversion for a direct question. The emphatic
    pronoun σὺ is naturally absorbed into English word order rather than rendered
    woodenly. The name Ἠλίας is transliterated as 'Elijah' per the policy to transliterate
    names by standard conventions.
- source_word: Οὐκ εἰμί
  chosen: I am not
  alternatives:
  - I am not he
  - No, I am not
  lexicon: BDAG
  rationale: The Greek is a bare negated copula, concise and emphatic. 'I am not'
    preserves the terseness without supplying an object not present in the text.
- source_word: Ὁ προφήτης
  chosen: the Prophet
  alternatives:
  - that Prophet
  lexicon: BDAG
  rationale: The article marks a specific expected figure, not merely any prophet.
    'The Prophet' preserves the likely allusion to the anticipated prophet like Moses
    while staying close to the Greek.
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb. 'Answered' is the most direct and conventional
    rendering.
- source_word: Οὔ
  chosen: 'No'
  alternatives:
  - No.
  - Not so
  lexicon: BDAG
  rationale: The standalone negative particle functions as a direct negative answer.
    'No' is the natural English equivalent.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The present tense is a historical present in Johannine narrative. Rendering
    it as 'he says' preserves the Greek verbal aspect and discourse vividness; English
    can bear this in narrative dialogue.
