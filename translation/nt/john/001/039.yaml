theological_decisions:
- issue: Reckoning of 'the tenth hour'
  chosen_reading: 'Preserve the literal time expression in the main text: ''the tenth
    hour.'''
  alternative_readings:
  - About 4:00 PM if counted from sunrise (common Jewish reckoning)
  - About 10:00 AM if counted by Roman civil reckoning
  rationale: The text itself does not specify the timekeeping system. Preserving 'the
    tenth hour' avoids importing a debated harmonization and maintains the narrative
    detail transparently. A footnote preserves the main interpretive options.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve
    it.
