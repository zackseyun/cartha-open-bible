id: JHN.1.39
reference: John 1:39
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς· Ἔρχεσθε καὶ ⸂ὄψεσθε. ἦλθαν οὖν⸃ καὶ εἶδαν ποῦ μένει, καὶ παρ’
    αὐτῷ ἔμειναν τὴν ἡμέραν ἐκείνην· ὥρα ἦν ὡς δεκάτη.
translation:
  text: He said to them, “Come, and you will see.” So they went and saw where he was
    staying, and they stayed with him that day. It was about the tenth hour.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, if counted from sunrise, about 4:00 PM; some understand it by Roman
      reckoning as about 10:00 AM.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔρχεσθε
  chosen: Come
  alternatives:
  - Come along
  - Come here
  lexicon: BDAG
  rationale: Present middle imperative plural functioning as an invitation. 'Come'
    is the most natural and direct English equivalent without adding nuance not explicit
    in the Greek.
- source_word: ὄψεσθε
  chosen: you will see
  alternatives:
  - see
  - you shall see
  lexicon: BDAG
  rationale: Future middle indicative plural of ὁράω. Rendering it as 'you will see'
    preserves the future form and the invitational force of the expression 'Come,
    and you will see.'
- source_word: ἦλθαν οὖν
  chosen: So they went
  alternatives:
  - Therefore they came
  - Then they went
  lexicon: BDAG
  rationale: οὖν marks a natural consequence, well conveyed by 'So.' Although ἦλθαν
    can be rendered 'came,' in English after Jesus' invitation 'went' better reflects
    movement from the disciples' standpoint in the narrative.
- source_word: εἶδαν
  chosen: saw
  alternatives:
  - looked at
  - observed
  lexicon: BDAG
  rationale: Simple aorist of ὁράω. 'Saw' is the straightforward narrative equivalent
    and also preserves the verbal echo with 'you will see'.
- source_word: ποῦ μένει
  chosen: where he was staying
  alternatives:
  - where he stayed
  - where he remained
  - where he was lodging
  lexicon: BDAG
  rationale: μένω in this immediate context refers to Jesus' place of lodging or temporary
    stay. The progressive English form 'was staying' fits the present tense and natural
    idiom.
- source_word: παρ’ αὐτῷ
  chosen: with him
  alternatives:
  - beside him
  - at his place
  lexicon: BDAG
  rationale: παρά with the dative here indicates proximity/association. 'With him'
    is idiomatic and fits the sense that they remained in his company, likely at his
    lodging.
- source_word: ἔμειναν
  chosen: they stayed
  alternatives:
  - they remained
  - they lodged
  lexicon: BDAG
  rationale: Aorist of μένω. 'Stayed' is natural English and preserves the lexical
    connection with the previous μένει ('was staying').
- source_word: τὴν ἡμέραν ἐκείνην
  chosen: that day
  alternatives:
  - the rest of that day
  - that whole day
  lexicon: BDAG
  rationale: The phrase identifies the time span of their remaining. 'That day' is
    the cleanest equivalent; adding 'rest of' would interpret beyond the explicit
    wording, even if context may imply it.
- source_word: ὥρα ἦν ὡς δεκάτη
  chosen: It was about the tenth hour
  alternatives:
  - It was about four in the afternoon
  - It was about the tenth hour of the day
  lexicon: BDAG
  rationale: The Greek gives an approximate time using the ordinal 'tenth.' The main
    text preserves the source expression rather than resolving the debated reckoning
    system into a modern clock time. 'About' reflects ὡς.
- source_word: λέγει αὐτοῖς
  chosen: He said to them
  alternatives:
  - He says to them
  lexicon: BDAG
  rationale: Although λέγει is a present tense historical present, English narrative
    style commonly renders it as simple past. This is an optimal-equivalence smoothing
    that preserves the narrative sense.
