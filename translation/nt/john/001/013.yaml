id: JHN.1.13
reference: John 1:13
source:
  edition: SBLGNT
  text: οἳ οὐκ ἐξ αἱμάτων οὐδὲ ἐκ θελήματος σαρκὸς οὐδὲ ἐκ θελήματος ἀνδρὸς ἀλλ’ ἐκ θεοῦ ἐγεννήθησαν.
translation:
  text: who were born[a], not from blood, nor from the will of the flesh, nor from the will of man, but from God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, 'not from bloodlines.' The Greek has the plural 'bloods,' an unusual expression referring to natural descent or human parentage.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ
  chosen: who
  alternatives:
  - those who
  lexicon: BDAG
  rationale: Relative pronoun referring back to the people described in the previous verse; 'who' preserves the syntactic linkage naturally in English.
- source_word: ἐξ αἱμάτων
  chosen: from bloods
  alternatives:
  - of blood
  - from blood
  - from bloodlines
  lexicon: BDAG
  rationale: The plural αἱμάτων is striking and likely idiomatic for natural descent/parentage. 'From bloods' preserves the unusual plural and the formal contrast with divine begetting better than smoothing to singular. Because the English is somewhat unusual, an alternative is preserved in a footnote.
- source_word: θελήματος
  chosen: will
  alternatives:
  - desire
  - decision
  lexicon: BDAG
  rationale: '''Will'' best matches the semantic range here and preserves the repeated structure ''nor from the will of...'' across the clause.'
- source_word: σαρκὸς
  chosen: flesh
  alternatives:
  - human nature
  - the body
  lexicon: BDAG
  rationale: Per doctrine, σάρξ is rendered 'flesh' in literal contexts. Here it refers to human procreative impulse or natural human generation, not specifically the Pauline metaphor 'sinful nature'.
- source_word: ἀνδρὸς
  chosen: a man
  alternatives:
  - man
  - husband
  - male
  lexicon: BDAG
  rationale: ἀνήρ commonly means an adult male/man, and in this context likely contrasts with 'flesh' to denote specifically male human agency in begetting. 'A man' is idiomatic and preserves the singular generic force without flattening it to a gender-neutral term.
- source_word: ἐκ θεοῦ
  chosen: from God
  alternatives:
  - of God
  - out of God
  lexicon: BDAG
  rationale: '''From God'' is the most natural English rendering of ἐκ with genitive here and preserves the source/origin contrast with the preceding three negated phrases.'
- source_word: ἐγεννήθησαν
  chosen: were born
  alternatives:
  - were begotten
  - were fathered
  lexicon: BDAG
  rationale: Aorist passive of γεννάω in this context is best rendered 'were born' in natural English. 'Were begotten' is more formally tied to the verb's begetting sense but is archaic in modern English and less readable.
