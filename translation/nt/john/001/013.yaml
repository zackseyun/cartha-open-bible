theological_decisions:
- issue: Nature of the contrast between human and divine origin
  chosen_reading: The verse speaks of those who have a birth/origin that is not grounded in natural human descent or human procreative will, but in God.
  alternative_readings:
  - The verse may be read more narrowly as excluding ethnic lineage alone.
  - The verse may be read more sacramentally or metaphysically in later theological traditions.
  rationale: The threefold negation ('not from bloods... nor from the will of the flesh... nor from the will of a man') most naturally contrasts ordinary human generation with divine begetting. The translation preserves that contrast without importing a specific denominational doctrine of regeneration beyond what the text states.
  doctrine_reference: Preserve theological tension rather than resolve it; historic ecumenical orthodoxy without denominational distinctives.
