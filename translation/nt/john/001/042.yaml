id: JHN.1.42
reference: John 1:42
source:
  edition: SBLGNT
  text: ⸀ἤγαγεν αὐτὸν πρὸς τὸν Ἰησοῦν. ἐμβλέψας αὐτῷ ὁ Ἰησοῦς εἶπεν· Σὺ εἶ Σίμων ὁ υἱὸς ⸀Ἰωάννου, σὺ κληθήσῃ Κηφᾶς (ὃ ἑρμηνεύεται Πέτρος).
translation:
  text: He brought him to Jesus[a]. Looking at him, Jesus said, “You are Simon, the son of John[b]; you will be called Cephas” (which is translated Peter).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'Jonah' instead of 'John'; the SBLGNT text reads 'John.'
    reason: textual_variant
  - marker: b
    text: Cephas is the Semitic name corresponding to Peter, with the sense 'rock' or 'stone.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤγαγεν
  chosen: brought
  alternatives:
  - led
  lexicon: BDAG
  rationale: Aorist of ἄγω here naturally means bringing someone to a person. 'Brought' is idiomatic and fits the completed action better than the slightly more process-oriented 'led'.
- source_word: πρὸς τὸν Ἰησοῦν
  chosen: to Jesus
  alternatives:
  - before Jesus
  lexicon: BDAG
  rationale: πρός with the accusative commonly indicates movement toward a person. 'To Jesus' is the plain and natural English equivalent.
- source_word: ἐμβλέψας αὐτῷ
  chosen: Looking at him
  alternatives:
  - fixing his gaze on him
  - looking intently at him
  lexicon: BDAG
  rationale: The participle ἐμβλέψας suggests more than a casual glance, but 'Looking at him' preserves readability while allowing the context to carry the significance. A more intensified rendering is possible but not required in the main text.
- source_word: Σὺ εἶ Σίμων
  chosen: You are Simon
  lexicon: BDAG
  rationale: The explicit pronoun σὺ adds directness, but standard English conveys this naturally as 'You are Simon' without artificial emphasis.
- source_word: ὁ υἱὸς Ἰωάννου
  chosen: the son of John
  alternatives:
  - son of Jonah
  - son of John
  lexicon: BDAG
  rationale: The SBLGNT reading here is Ἰωάννου, so the translation follows 'John.' Because some translation traditions read 'Jonah' or 'John' differently due to textual variation and harmonization with other passages, the alternative is preserved in a footnote.
- source_word: κληθήσῃ
  chosen: will be called
  alternatives:
  - shall be called
  - will be named
  lexicon: BDAG
  rationale: Future passive of καλέω is straightforwardly rendered 'will be called.' This preserves both the future sense and the naming/passive nuance.
- source_word: Κηφᾶς
  chosen: Cephas
  lexicon: BDAG
  rationale: Per translation philosophy, personal names are transliterated rather than translated. Κηφᾶς is therefore kept as 'Cephas' in the main text.
- source_word: ὃ ἑρμηνεύεται Πέτρος
  chosen: which is translated Peter
  alternatives:
  - which is interpreted Peter
  - which means Rock
  lexicon: BDAG
  rationale: The text itself glosses the Semitic name with the Greek name Πέτρος. Since Πέτρος is a personal name in this context, it is transliterated 'Peter' rather than translated as 'Rock' in the main text. 'Which is translated Peter' best reflects ἑρμηνεύεται while preserving the explanatory parenthesis.
