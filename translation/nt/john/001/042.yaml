theological_decisions:
- issue: Rendering of the explanatory gloss for Κηφᾶς/Πέτρος
  chosen_reading: 'Keep both as personal names in the main text: ''Cephas'' ... ''Peter'''
  alternative_readings:
  - Translate the meaning dynamically as 'Rock'
  - Render 'Peter' with an explanatory note about the underlying meaning
  rationale: The verse concerns Jesus assigning Simon a new name. The translation philosophy directs that personal names be transliterated by standard conventions. Because the Greek itself explains the Aramaic/Semitic form with the Greek name, the main text preserves the naming function, while a footnote can note the underlying meaning 'rock.' This avoids importing later theological conclusions into the main line while preserving the lexical significance.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve theological tension rather than resolve it.'
