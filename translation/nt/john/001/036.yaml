theological_decisions:
- issue: Whether ὁ ἀμνὸς τοῦ θεοῦ should be rendered as a title with capitalization
  chosen_reading: the Lamb of God
  alternative_readings:
  - the lamb of God
  rationale: In context this is not merely a generic description but John the Baptist's
    identifying designation for Jesus, echoing 1:29 and carrying sacrificial and messianic
    significance. Capitalizing 'Lamb' signals title-like force in English without
    adding content beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§2, 6
- issue: How to preserve the theological resonance of ἀμνὸς without importing a specific
    atonement theory
  chosen_reading: Lamb
  alternative_readings:
  - sacrificial lamb
  rationale: The verse clearly identifies Jesus with 'the Lamb of God,' but the Greek
    itself does not specify the mechanism of atonement here. Retaining 'Lamb' preserves
    the biblical imagery and theological weight while avoiding interpretive expansion.
  doctrine_reference: Translation philosophy §§1, 3, 6
