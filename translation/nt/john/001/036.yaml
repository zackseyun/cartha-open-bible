id: JHN.1.36
reference: John 1:36
source:
  edition: SBLGNT
  text: καὶ ἐμβλέψας τῷ Ἰησοῦ περιπατοῦντι λέγει· Ἴδε ὁ ἀμνὸς τοῦ θεοῦ.
translation:
  text: And looking at Jesus as he was walking, he says, “Behold, the Lamb of God!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “Behold, the Lamb of God!”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψας
  chosen: looking at
  alternatives:
  - fixing his gaze on
  - looking intently at
  lexicon: BDAG
  rationale: The participle denotes directed, attentive looking. 'Looking at' is natural
    modern English and fits optimal equivalence without overstating the intensity;
    stronger alternatives are possible but not required by the context.
- source_word: περιπατοῦντι
  chosen: as he was walking
  alternatives:
  - walking
  - passing by
  lexicon: BDAG
  rationale: The present participle describes Jesus in motion at the moment John speaks.
    'As he was walking' conveys the contemporaneous action smoothly in English. 'Passing
    by' is interpretive and not explicit in the Greek.
- source_word: λέγει
  chosen: he says
  alternatives:
  - he said
  lexicon: BDAG
  rationale: The Greek uses the historical present, common in narrative. Rendering
    it as present preserves Johannine vividness and is acceptable modern English.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: The imperative draws attention emphatically. 'Look' is clear, idiomatic
    modern English; 'Behold' is traditional but archaic for the stated translation
    philosophy.
- source_word: ἀμνὸς
  chosen: Lamb
  alternatives:
  - young lamb
  lexicon: BDAG
  rationale: The noun refers to a lamb and in Johannine context functions as a loaded
    sacrificial/messianic designation. 'Lamb' preserves both the literal sense and
    the title-like force without overexplaining.
- source_word: τοῦ θεοῦ
  chosen: of God
  alternatives:
  - belonging to God
  - from God
  lexicon: BDAG
  rationale: The genitive is best left as the familiar and theologically resonant
    'of God.' More explicit paraphrases narrow the relation beyond what the Greek
    states.
