id: JHN.1.26
reference: John 1:26
source:
  edition: SBLGNT
  text: ἀπεκρίθη αὐτοῖς ὁ Ἰωάννης λέγων· Ἐγὼ βαπτίζω ἐν ὕδατι· ⸀μέσος ὑμῶν ⸀ἕστηκεν ὃν ὑμεῖς οὐκ οἴδατε,
translation:
  text: John answered them[a], saying, “I baptize in water. Among you stands one whom you do not know,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in your midst stands one whom you do not know.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative response verb; 'answered' is the most natural and common English rendering in Johannine dialogue.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The participle introduces the content of John's reply. 'Saying' preserves the Greek structure without awkwardness.
- source_word: βαπτίζω
  chosen: baptize
  alternatives:
  - immerse
  lexicon: BDAG
  rationale: '''Baptize'' is the established and semantically appropriate rendering in this context; ''immerse'' is too narrow for translation here and would import a denominationally charged specificity not demanded by the text.'
- source_word: ἐν ὕδατι
  chosen: in water
  alternatives:
  - with water
  lexicon: BDAG
  rationale: The preposition ἐν with the dative is rendered more formally as 'in water.' English idiom could allow 'with water,' but 'in water' better preserves the Greek wording and the contrast with the one standing among them.
- source_word: μέσος ὑμῶν
  chosen: among you
  alternatives:
  - in your midst
  - in the middle of you
  lexicon: BDAG
  rationale: Idiomatic English for the expression while preserving the sense of presence within the group. 'In your midst' is possible but slightly more traditional/literary.
- source_word: ἕστηκεν
  chosen: stands
  alternatives:
  - has stood
  - is standing
  lexicon: BDAG
  rationale: Perfect form of ἵστημι here conveys a present state resulting from having taken a stand. English present 'stands' communicates the stative force naturally.
- source_word: ὃν
  chosen: whom
  alternatives:
  - that one ... him
  lexicon: BDAG
  rationale: Relative pronoun referring to the unidentified person; 'whom' fits the object function in formal written English.
- source_word: οὐκ οἴδατε
  chosen: you do not know
  alternatives:
  - you have not known
  - you do not recognize
  lexicon: BDAG
  rationale: οἶδα commonly means 'know.' 'Recognize' is interpretive and may over-specify; the text states lack of knowledge, which in context can include failure to recognize.
- source_word: ὁ Ἰωάννης
  chosen: John
  alternatives:
  - John the Baptist
  lexicon: BDAG
  rationale: The Greek names him simply as 'John.' Expanding to 'John the Baptist' would add information not present in this verse.
