theological_decisions:
- issue: Identity of the unnamed one standing among them
  chosen_reading: Render generically as 'one' without explicit messianic identification in the main text.
  alternative_readings:
  - the Messiah
  - he
  rationale: Although the broader context identifies Jesus, this verse itself leaves the referent unnamed for rhetorical effect. The translation should preserve that narrative tension rather than resolve it prematurely.
  doctrine_reference: Preserve theological tension rather than resolve it.
