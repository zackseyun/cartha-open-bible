id: JHN.1.29
reference: John 1:29
source:
  edition: SBLGNT
  text: Τῇ ἐπαύριον βλέπει τὸν Ἰησοῦν ἐρχόμενον πρὸς αὐτόν, καὶ λέγει· Ἴδε ὁ ἀμνὸς τοῦ θεοῦ ὁ αἴρων τὴν ἁμαρτίαν τοῦ κόσμου.
translation:
  text: The next day he sees Jesus coming toward him and says[a], “Behold, the Lamb of God, who takes away the sin of the world!”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “who bears the sin of the world.” The Greek verb can mean both to take away/remove and to bear/carry, and the latter may echo sacrificial imagery.
    reason: alternative_reading
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  chosen: The next day
  alternatives:
  - On the next day
  - The following day
  lexicon: BDAG
  rationale: Idiomatic temporal dative-adverbial expression meaning the following day. 'The next day' is natural modern English and preserves the narrative sequence.
- source_word: βλέπει
  chosen: he sees
  alternatives:
  - he saw
  - he catches sight of
  lexicon: BDAG
  rationale: Present tense is retained as historical present, a common Johannine narrative feature. Rendering it as 'he sees' preserves the vividness of the Greek better than smoothing to past tense.
- source_word: ἐρχόμενον πρὸς αὐτόν
  chosen: coming toward him
  alternatives:
  - coming to him
  - approaching him
  lexicon: BDAG
  rationale: The participle with πρός + accusative indicates motion in John's direction. 'Coming toward him' is clear and natural while preserving the directional sense.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  - declares
  lexicon: BDAG
  rationale: Like βλέπει, this is a historical present. 'Says' preserves the Greek narrative style and immediacy.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: An attention-getting imperative/interjection. 'Look' is readable modern English and avoids archaic 'Behold' while retaining the force of drawing attention.
- source_word: ὁ ἀμνὸς τοῦ θεοῦ
  chosen: the Lamb of God
  lexicon: BDAG
  rationale: Standard and direct rendering of the noun phrase. 'Lamb' preserves the sacrificial and Passover resonance without interpretive expansion.
- source_word: ὁ αἴρων
  chosen: who takes away
  alternatives:
  - who bears
  - who carries away
  - who removes
  lexicon: BDAG
  rationale: αἴρω can mean lift, carry, bear, or take away. In this context, with 'the sin of the world,' 'takes away' best captures the likely sense of removal while remaining broad enough to leave sacrificial overtones intact. The alternative 'bears' is worth preserving because of possible Isaianic sacrificial resonance.
- source_word: τὴν ἁμαρτίαν
  chosen: the sin
  alternatives:
  - sinfulness
  lexicon: BDAG
  rationale: Singular ἁμαρτία is best kept as 'sin,' likely functioning collectively or comprehensively rather than referring to individual sins one by one. This preserves the Greek number and theological weight.
- source_word: τοῦ κόσμου
  chosen: of the world
  lexicon: BDAG
  rationale: κόσμος in John commonly denotes the world in its human and created order, often with moral-theological overtones. 'Of the world' is the most transparent rendering and avoids narrowing the scope.
