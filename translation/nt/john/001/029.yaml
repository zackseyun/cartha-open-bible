theological_decisions:
- issue: Meaning of ὁ αἴρων τὴν ἁμαρτίαν τοῦ κόσμου
  chosen_reading: who takes away the sin of the world
  alternative_readings:
  - who bears the sin of the world
  rationale: The verb αἴρω can support both removal and bearing. In context, 'takes away' is the clearest main-text rendering in modern English and fits the likely sense of sin's removal, while 'bears' preserves sacrificial and Isaianic associations that should not be erased. To preserve theological tension rather than over-resolve it, the alternative is retained in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Rendering of singular ἁμαρτία
  chosen_reading: the sin
  alternative_readings:
  - the sins
  rationale: The Greek is singular, and the singular may present sin as a collective reality or the world's sin considered as a whole. Rendering it as plural would interpret beyond the form of the source text.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
