theological_decisions:
- issue: Rendering μονογενοῦς in a christologically sensitive context
  chosen_reading: the one and only Son
  alternative_readings:
  - only begotten Son
  - unique Son
  rationale: The translation aims to reflect the likely lexical sense of uniqueness
    while remaining within Nicene and Chalcedonian orthodoxy. 'Only begotten' has
    deep doctrinal significance in church tradition, but as a translation choice here
    it is not required by the Greek in most modern lexical assessments, so it is preserved
    in a footnote rather than used in the main text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Whether to foreground tabernacle imagery in ἐσκήνωσεν
  chosen_reading: dwelt among us
  alternative_readings:
  - tabernacled among us
  - pitched his tent among us
  rationale: The main text uses readable modern English under optimal equivalence,
    while preserving the likely allusion to tabernacle presence in a footnote so the
    theological resonance is not lost or overinterpreted in the main line.
  doctrine_reference: Translation philosophy §§1, 3, 6
