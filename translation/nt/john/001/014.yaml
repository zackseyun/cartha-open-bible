id: JHN.1.14
reference: John 1:14
source:
  edition: SBLGNT
  text: Καὶ ὁ λόγος σὰρξ ἐγένετο καὶ ἐσκήνωσεν ἐν ἡμῖν, καὶ ἐθεασάμεθα τὴν δόξαν αὐτοῦ,
    δόξαν ὡς μονογενοῦς παρὰ πατρός, πλήρης χάριτος καὶ ἀληθείας·
translation:
  text: And the Word became flesh and dwelt among us, and we saw his glory, glory
    as of the one and only Son from the Father, full of grace and truth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "tabernacled among us"; the verb echoes tent/tabernacle imagery.
    reason: lexical_alternative
  - marker: b
    text: Or "only begotten Son"; alternatively, "unique Son."
    reason: alternative_reading
lexical_decisions:
- source_word: λόγος
  chosen: the Word
  alternatives:
  - the Message
  - the Reason
  lexicon: BDAG
  rationale: Retains the established and contextually rich Johannine title while accurately
    reflecting the Greek term. Alternatives such as 'Message' or 'Reason' capture
    partial semantic range but flatten the personal and theological force in this
    prologue.
- source_word: σὰρξ
  chosen: flesh
  alternatives:
  - humanity
  - human nature
  lexicon: BDAG
  rationale: Per doctrine default, σάρξ is rendered 'flesh' in literal contexts. Here
    it refers to real embodied human existence, and 'flesh' preserves the force of
    the incarnation without reducing it to an abstraction.
- source_word: ἐγένετο
  chosen: became
  alternatives:
  - came to be
  lexicon: BDAG
  rationale: '''Became'' is the most natural English rendering here and preserves
    the strong sense of transition in the incarnation. ''Came to be'' is more wooden
    and less idiomatic.'
- source_word: ἐσκήνωσεν ἐν ἡμῖν
  chosen: dwelt among us
  alternatives:
  - tabernacled among us
  - pitched his tent among us
  lexicon: BDAG
  rationale: '''Dwelt among us'' is clear modern English and fits optimal equivalence.
    The verb alludes to tabernacle imagery, so the more literal alternatives are preserved
    in a footnote rather than placed in the main text.'
- source_word: ἐθεασάμεθα
  chosen: we saw
  alternatives:
  - we beheld
  - we gazed upon
  lexicon: BDAG
  rationale: Aorist middle here conveys direct witness. 'We saw' is natural and accessible;
    'beheld' is traditional but archaic for the target audience.
- source_word: δόξαν
  chosen: glory
  alternatives:
  - splendor
  - majesty
  lexicon: BDAG
  rationale: '''Glory'' is the standard and theologically weighty rendering in Johannine
    and biblical usage. Alternatives are possible but narrower.'
- source_word: ὡς
  chosen: as of
  alternatives:
  - like
  - as
  lexicon: BDAG
  rationale: '''As of'' preserves the comparative nuance without implying mere resemblance
    divorced from reality.'
- source_word: μονογενοῦς
  chosen: the one and only Son
  alternatives:
  - only begotten Son
  - unique Son
  lexicon: BDAG
  rationale: '''One and only Son'' best reflects the sense of uniqueness in contemporary
    English while remaining christologically faithful. Because ''only begotten'' is
    a historically important alternative in Christian tradition, it is preserved in
    a footnote.'
- source_word: παρὰ πατρός
  chosen: from the Father
  alternatives:
  - from a father
  - from beside the Father
  lexicon: BDAG
  rationale: In context this refers specifically to God the Father, so 'the Father'
    is appropriate. 'From' captures παρά naturally here, indicating origin or relation.
- source_word: πλήρης χάριτος καὶ ἀληθείας
  chosen: full of grace and truth
  alternatives:
  - filled with grace and truth
  lexicon: BDAG
  rationale: This preserves the familiar and accurate expression, echoing covenantal
    language and fitting the nominative predicate description of the Word/Son.
