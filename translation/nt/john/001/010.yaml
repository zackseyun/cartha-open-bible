theological_decisions:
- issue: Referent of the implied subject
  chosen_reading: Render the subject personally as 'He,' referring to the Logos of
    the immediate context.
  alternative_readings:
  - Supply 'it' if one were translating only from the abstract noun 'Word' without
    regard to context
  rationale: Although no explicit subject noun appears in this verse, the immediate
    context (John 1:1–9) has already personified and identified the Logos with masculine
    pronouns. Rendering 'He' preserves the personal subject intended by the discourse
    and avoids depersonalizing the one through whom the world came into being.
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD), within original-language
    primacy and no importation beyond the text'
- issue: Creation language in relation to the Logos
  chosen_reading: Use 'came into being through him' to preserve the distinction between
    the world's created status and the Logos's prior existence.
  alternative_readings:
  - '''was made through him'''
  rationale: John's alternation between ἦν and ἐγένετο is theologically significant
    in the prologue. Preserving that distinction in English supports the text's own
    Christological claim without adding later doctrinal terminology.
  doctrine_reference: Translation philosophy §1 original-language primacy; §3 preserve
    theological tension
