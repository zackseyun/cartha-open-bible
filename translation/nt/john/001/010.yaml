id: JHN.1.10
reference: John 1:10
source:
  edition: SBLGNT
  text: Ἐν τῷ κόσμῳ ἦν, καὶ ὁ κόσμος δι’ αὐτοῦ ἐγένετο, καὶ ὁ κόσμος αὐτὸν οὐκ ἔγνω.
translation:
  text: He was in the world, and the world came into being through him, and the world
    did not know him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was made through him.' The Greek verb means 'came to be' or 'came into
      existence.'
    reason: lexical_alternative
  - marker: b
    text: '''Did not know him'' can also imply ''did not recognize him'' or ''did
      not acknowledge him.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: κόσμῳ / κόσμος
  chosen: world
  alternatives:
  - created order
  - humanity
  lexicon: BDAG
  rationale: κόσμος occurs three times in the verse and is best rendered consistently
    as 'world.' In Johannine usage it can shade toward the inhabited world or humanity
    in rebellion, but 'world' preserves the layered sense across all three clauses
    without over-interpreting any one occurrence.
- source_word: ἦν
  chosen: was
  alternatives:
  - existed
  lexicon: BDAG
  rationale: 'The imperfect of εἰμί here states continued presence: ''He was in the
    world.'' ''Was'' is natural English and preserves the simple verbal force without
    importing additional philosophical nuance.'
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  - by means of him
  lexicon: BDAG
  rationale: διά with the genitive commonly expresses agency or instrumentality. 'Through
    him' is the standard and clearest rendering in this Johannine context, matching
    the mediating role expressed in 1:3.
- source_word: ἐγένετο
  chosen: came into being
  alternatives:
  - was made
  - came to be
  lexicon: BDAG
  rationale: γίνομαι here refers to coming into existence. 'Came into being' preserves
    the creation sense clearly and distinguishes this verb from ἦν earlier in the
    verse, reflecting John's deliberate contrast between being and becoming.
- source_word: ἔγνω
  chosen: did not know
  alternatives:
  - did not recognize
  - did not acknowledge
  lexicon: BDAG
  rationale: γινώσκω commonly means 'know.' In context it likely includes recognition
    and relational acknowledgment, but 'did not know him' best preserves the Greek
    wording and Johannine theological depth; interpretive expansions are better left
    to footnote or commentary.
- source_word: αὐτόν / αὐτοῦ
  chosen: him
  lexicon: BDAG
  rationale: The pronouns refer back to the Logos of the preceding context. 'Him'
    preserves the personal reference explicit in the Greek and aligns with the masculine
    pronouns used in the passage.
