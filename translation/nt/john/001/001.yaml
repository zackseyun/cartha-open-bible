id: JHN.1.1
reference: John 1:1
source:
  edition: SBLGNT
  text: Ἐν ἀρχῇ ἦν ὁ λόγος, καὶ ὁ λόγος ἦν πρὸς τὸν θεόν, καὶ θεὸς ἦν ὁ λόγος.
translation:
  text: In the beginning was the Word, and the Word was with God, and the Word was
    God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Word was divine' or 'what God was, the Word was.' The Greek wording
      presents 'God' qualitatively in the final clause, affirming the Word's full
      deity while distinguishing the Word from 'God' in the preceding clause.
    reason: alternative_reading
  - marker: b
    text: The opening phrase echoes Genesis 1:1, linking the Word with the beginning
      of creation.
    reason: cross_reference
lexical_decisions:
- source_word: Ἐν ἀρχῇ
  chosen: In the beginning
  alternatives:
  - At the beginning
  - In the first place
  lexicon: BDAG
  rationale: The prepositional phrase echoes Genesis 1:1 in both Greek and conceptual
    framing. 'In the beginning' preserves the literary and theological resonance better
    than more idiomatic alternatives.
- source_word: ἦν
  chosen: was
  alternatives:
  - existed
  lexicon: BDAG
  rationale: Imperfect of εἰμί is most naturally rendered 'was.' 'Existed' can bring
    out durative force, but 'was' is simpler, more idiomatic, and preserves the repeated
    cadence of the verse.
- source_word: ὁ λόγος
  chosen: the Word
  alternatives:
  - the Message
  - the Reason
  - the Logos
  lexicon: BDAG
  rationale: λόγος has a broad semantic range, but in Johannine usage here it functions
    as a loaded christological designation. 'Word' is the established and still accurate
    English rendering, preserving both speech/revelation and personal identity without
    over-interpreting toward Greek philosophy ('Reason') or paraphrase ('Message').
- source_word: πρὸς τὸν θεόν
  chosen: with God
  alternatives:
  - toward God
  - in the presence of God
  lexicon: BDAG
  rationale: πρός with the accusative can imply orientation or relationship, but in
    this context 'with God' best conveys personal distinction and communion in natural
    English. 'Toward God' is too wooden; 'in the presence of God' is interpretive
    expansion.
- source_word: τὸν θεόν
  chosen: God
  lexicon: BDAG
  rationale: The articular accusative refers to God personally and definitely. English
    does not require an article before the proper divine designation here.
- source_word: θεὸς ἦν ὁ λόγος
  chosen: the Word was God
  alternatives:
  - the Word was divine
  - what God was, the Word was
  lexicon: BDAG
  rationale: The anarthrous predicate θεός preceding the verb is qualitative in force,
    describing the nature of the Word without identifying the Word as the same person
    as 'the God' of the previous clause. 'The Word was God' is the most faithful and
    natural rendering in English, provided the distinction from the previous clause
    is documented. 'Divine' can understate the full force of the predicate in English,
    while 'what God was, the Word was' is explanatory rather than translational.
