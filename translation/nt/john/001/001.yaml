theological_decisions:
- issue: Rendering the anarthrous predicate θεός in the final clause
  chosen_reading: the Word was God
  alternative_readings:
  - the Word was divine
  - what God was, the Word was
  rationale: 'Within historic Nicene orthodoxy and the Greek syntax of the clause,
    the predicate θεός is best understood qualitatively: it affirms the full deity
    of the Word while maintaining personal distinction from ''the God'' mentioned
    in the preceding clause. The main text keeps the traditional and syntactically
    defensible rendering ''the Word was God.'' Alternatives are preserved in a footnote
    because they can help readers see the qualitative nuance, but they are not preferred
    as the main translation.'
  doctrine_reference: 'Affirmations: Nicene Creed (381 AD, including homoousios language);
    Translation philosophy §3 Preserve theological tension rather than resolve it'
