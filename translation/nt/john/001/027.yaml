id: JHN.1.27
reference: John 1:27
source:
  edition: SBLGNT
  text: ⸀ὁ ὀπίσω μου ⸀ἐρχόμενος, οὗ ⸂οὐκ εἰμὶ⸃ ἄξιος ἵνα λύσω αὐτοῦ τὸν ἱμάντα τοῦ
    ὑποδήματος.
translation:
  text: the one coming after me, whose sandal strap I am not worthy to untie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'of whom I am not worthy that I should untie the strap
      of his sandal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὀπίσω μου ἐρχόμενος
  chosen: the one coming after me
  alternatives:
  - he who comes after me
  - the one who comes after me
  lexicon: BDAG
  rationale: The articular present participle functions substantivally, referring
    to a specific person. 'The one coming after me' preserves the participial force
    and is natural modern English. 'After me' is the idiomatic sense of ὀπίσω μου
    in this context, indicating succession rather than merely spatial position.
- source_word: οὗ
  chosen: whose
  alternatives:
  - of whom
  lexicon: BDAG
  rationale: The genitive relative pronoun introduces possession with the following
    nouns ('his sandal strap'). 'Whose' is the most natural English equivalent and
    preserves the genitival relationship.
- source_word: οὐκ εἰμὶ ἄξιος
  chosen: I am not worthy
  alternatives:
  - I am not fit
  - I am not deserving
  lexicon: BDAG
  rationale: ἄξιος denotes worthiness or fitness. 'I am not worthy' is both accurate
    and idiomatic, and it preserves the humility expressed by John without overinterpreting
    the nuance.
- source_word: ἵνα λύσω
  chosen: to untie
  alternatives:
  - that I might untie
  - to loosen
  lexicon: BDAG
  rationale: After expressions of worthiness, ἵνα with the subjunctive can express
    contemplated action in a way English commonly renders with an infinitive. 'To
    untie' is smoother and accurately conveys λύω here in the specific sense of loosening
    footwear fastenings.
- source_word: ἱμάντα
  chosen: strap
  alternatives:
  - thong
  - lace
  lexicon: BDAG
  rationale: ἱμάς refers to a strap or thong, especially of a sandal. 'Strap' is clear
    modern English and avoids archaic or potentially distracting wording like 'thong.'
- source_word: τοῦ ὑποδήματος
  chosen: sandal
  alternatives:
  - shoe
  - footwear
  lexicon: BDAG
  rationale: ὑπόδημα refers to a sandal or shoe. In this historical and cultural setting,
    'sandal' is the more precise and contextually appropriate rendering.
