- issue: Relation of 'after me' to the coming one
  chosen_reading: 'Rendered as temporal/successive: ''coming after me'''
  alternative_readings:
  - coming behind me
  rationale: In Johannine context, John the Baptist speaks of the one who follows
    him in ministry sequence while also implying superiority. The translation keeps
    the common temporal sense without importing the fuller theological claim from
    nearby verses into this clause itself.
  doctrine_reference: Preserve theological tension rather than resolve it.
