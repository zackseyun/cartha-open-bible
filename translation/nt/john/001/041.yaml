id: JHN.1.41
reference: John 1:41
source:
  edition: SBLGNT
  text: εὑρίσκει οὗτος ⸀πρῶτον τὸν ἀδελφὸν τὸν ἴδιον Σίμωνα καὶ λέγει αὐτῷ· Εὑρήκαμεν
    τὸν Μεσσίαν (ὅ ἐστιν μεθερμηνευόμενον χριστός).
translation:
  text: He first found his own brother Simon and said to him, “We have found the Messiah”
    (which means Messiah).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, “We have found the Messiah” (which is translated
      “Christ”).
    reason: alternative_reading
lexical_decisions:
- source_word: εὑρίσκει
  chosen: found
  alternatives:
  - finds
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('finds'), English narrative
    style is more natural with a past tense here. This is a standard optimal-equivalence
    smoothing that preserves the event sense without awkwardness.
- source_word: οὗτος
  chosen: he
  alternatives:
  - this one
  lexicon: BDAG
  rationale: The demonstrative refers back to Andrew in context. English normally
    uses the pronoun 'he' rather than the more wooden 'this one' in narrative.
- source_word: πρῶτον
  chosen: first
  alternatives:
  - first of all
  lexicon: BDAG
  rationale: Retains the temporal/sequential force that Andrew's first action was
    to find Simon.
- source_word: ἀδελφὸν τὸν ἴδιον
  chosen: his own brother
  alternatives:
  - his brother
  - his own sibling
  lexicon: BDAG
  rationale: ἴδιον adds emphasis, so 'his own brother' preserves that nuance better
    than simply 'his brother.' 'Brother' is gender-accurate and contextually specific.
- source_word: Σίμωνα
  chosen: Simon
  lexicon: BDAG
  rationale: Personal name is transliterated by standard convention, following project
    policy.
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  - told him
  lexicon: BDAG
  rationale: Like εὑρίσκει, the present-tense historical narrative is rendered with
    English past tense for readability. 'Said to him' is closer to the Greek than
    the more interpretive 'told him.'
- source_word: Εὑρήκαμεν
  chosen: We have found
  alternatives:
  - We found
  lexicon: BDAG
  rationale: The perfect is best represented by English present perfect, conveying
    a discovered reality with present relevance.
- source_word: Μεσσίαν
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: BDAG
  rationale: Per doctrine, Χριστός/related messianic title language is rendered 'Messiah'
    where title sense is in view, preserving the Jewish messianic context. Here Μεσσίας
    is explicitly the Semitic title.
- source_word: μεθερμηνευόμενον
  chosen: which means
  alternatives:
  - which is translated
  - which is interpreted
  lexicon: BDAG
  rationale: This explanatory gloss introduces the meaning of the title for readers
    unfamiliar with the term. 'Which means' is natural modern English and accurately
    conveys the explanatory function.
- source_word: χριστός
  chosen: Anointed One
  alternatives:
  - Messiah
  - Christ
  lexicon: BDAG
  rationale: Since the parenthetical clause explains Μεσσίας for Greek readers, rendering
    χριστός as 'Anointed One' makes the semantic content explicit in English rather
    than merely repeating another title form. This preserves the explanatory force
    of the parenthesis.
