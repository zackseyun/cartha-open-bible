theological_decisions:
- issue: Rendering of messianic title language
  chosen_reading: Main text uses 'Messiah' for Μεσσίαν and explanatory gloss 'Anointed
    One' for χριστός.
  alternative_readings:
  - '''Messiah ... which is translated Christ'''
  - '''Messiah ... which means Christ'''
  rationale: The doctrine excerpt directs that Χριστός be rendered 'Messiah' where
    title sense is present rather than preserving traditional 'Christ' by inertia.
    In the explanatory parenthesis, however, a semantic rendering ('Anointed One')
    better communicates why the gloss is present at all. This avoids obscuring the
    explanatory relationship between the Semitic title and its Greek equivalent.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Contested
    terms table: Χριστός → Messiah (where title; Christ where name-like).'
