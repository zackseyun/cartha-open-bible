id: JHN.1.40
reference: John 1:40
source:
  edition: SBLGNT
  text: ἦν Ἀνδρέας ὁ ἀδελφὸς Σίμωνος Πέτρου εἷς ἐκ τῶν δύο τῶν ἀκουσάντων παρὰ Ἰωάννου καὶ ἀκολουθησάντων αὐτῷ·
translation:
  text: Andrew[a], Simon Peter’s brother, was one of the two who had heard from John and followed him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'one of the two who heard from John and followed him.' The 'him' refers to Jesus in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  chosen: was
  alternatives:
  - there was
  lexicon: BDAG
  rationale: 'Imperfect of εἰμί functions here as a simple copula introducing identification: Andrew was one of the two. English ''was'' is the most natural equivalent.'
- source_word: Ἀνδρέας
  chosen: Andrew
  rationale: Personal name is transliterated by standard English convention, following the translation philosophy to transliterate names.
- source_word: ὁ ἀδελφὸς Σίμωνος Πέτρου
  chosen: Simon Peter’s brother
  alternatives:
  - the brother of Simon Peter
  lexicon: BDAG
  rationale: ἀδελφός here denotes literal familial brother. The possessive construction is smoother modern English while preserving the genitive relationship. 'Simon Peter' keeps both names/titles as the standard personal designation in context.
- source_word: εἷς ἐκ τῶν δύο
  chosen: one of the two
  alternatives:
  - one out of the two
  lexicon: BDAG
  rationale: Standard partitive expression; 'one of the two' is idiomatic and precise.
- source_word: τῶν ἀκουσάντων
  chosen: who had heard
  alternatives:
  - who heard
  lexicon: BDAG
  rationale: 'Aorist participle is rendered with English pluperfect-style relative clause for natural sequencing in context: they heard first, then followed. The object of hearing is supplied by the following prepositional phrase.'
- source_word: παρὰ Ἰωάννου
  chosen: from John
  alternatives:
  - John's words
  - from John the Baptist
  lexicon: BDAG
  rationale: παρά with genitive commonly means 'from' or 'from the side of.' 'From John' preserves the source wording without over-specifying 'the Baptist,' though the referent is clear from context.
- source_word: καὶ ἀκολουθησάντων αὐτῷ
  chosen: and followed him
  alternatives:
  - and became his followers
  - and followed after him
  lexicon: BDAG
  rationale: ἀκολουθέω is straightforwardly 'follow.' The dative αὐτῷ is rendered 'him.' The pronoun most naturally refers to Jesus in the narrative flow, though the Greek leaves the pronoun itself implicit in English antecedent resolution.
