id: JHN.1.48
reference: John 1:48
source:
  edition: SBLGNT
  text: λέγει αὐτῷ Ναθαναήλ· Πόθεν με γινώσκεις; ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῷ· Πρὸ
    τοῦ σε Φίλιππον φωνῆσαι ὄντα ὑπὸ τὴν συκῆν εἶδόν σε.
translation:
  text: Nathanael said to him, “How do you know me?” Jesus answered and said to him,
    “Before Philip called you, when you were under the fig tree, I saw you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “From where do you know me?”
    reason: lexical_alternative
lexical_decisions:
- source_word: Πόθεν
  chosen: How
  alternatives:
  - From where
  - How is it that
  lexicon: BDAG
  rationale: Literally 'from where,' but in this idiom with γινώσκεις it asks the
    basis/source of Jesus' knowledge. 'How do you know me?' is natural modern English
    and preserves the sense better than a wooden 'From where do you know me?'.
- source_word: γινώσκεις
  chosen: do you know
  alternatives:
  - are you acquainted with
  - do you recognize
  lexicon: BDAG
  rationale: Standard rendering of γινώσκω here for personal knowledge/acquaintance.
    'Know' is both accurate and idiomatic.
- source_word: ἀπεκρίθη ... καὶ εἶπεν
  chosen: answered and said
  alternatives:
  - answered
  - replied and said
  lexicon: BDAG
  rationale: The Greek uses both verbs. Retaining both reflects the discourse style
    of John without becoming unnatural in English.
- source_word: Πρὸ τοῦ ... φωνῆσαι
  chosen: Before ... called
  alternatives:
  - Before ... summoned
  - Prior to ... calling
  lexicon: BDAG
  rationale: Πρὸ τοῦ with infinitive marks prior time. 'Before Philip called you'
    is the clearest idiomatic rendering.
- source_word: φωνῆσαι
  chosen: called
  alternatives:
  - summoned
  - spoke to
  lexicon: BDAG
  rationale: φωνέω commonly means 'call' or 'summon.' 'Called' fits the narrative
    context of Philip calling Nathanael.
- source_word: ὄντα
  chosen: when you were
  alternatives:
  - while you were
  - being
  lexicon: BDAG
  rationale: The participle modifies 'you' and gives the circumstance in which Jesus
    saw Nathanael. 'When you were' is smooth English that preserves the temporal-circumstantial
    force.
- source_word: ὑπὸ τὴν συκῆν
  chosen: under the fig tree
  alternatives:
  - beneath the fig tree
  lexicon: BDAG
  rationale: Direct and natural rendering of the prepositional phrase. The definite
    article is retained.
- source_word: εἶδόν σε
  chosen: I saw you
  alternatives:
  - I had seen you
  lexicon: BDAG
  rationale: Aorist indicative in direct speech is best rendered as simple past. English
    does not require the pluperfect here, though the seeing occurred prior to Philip's
    call; the temporal relation is already established by 'Before Philip called you.'
- source_word: συκῆν
  chosen: fig tree
  lexicon: BDAG
  rationale: Standard lexical meaning; no contextual reason to vary.
