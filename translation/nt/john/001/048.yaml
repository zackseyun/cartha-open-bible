theological_decisions:
- issue: Nature of Jesus' knowledge of Nathanael
  chosen_reading: Render the statement straightforwardly without explicating whether
    the knowledge is supernatural, prophetic, or ordinary.
  alternative_readings:
  - Imply supernatural foreknowledge in the translation
  - Soften the statement to ordinary prior observation
  rationale: The verse presents Jesus' prior sight/knowledge of Nathanael but does
    not itself explain the mechanism. To preserve theological tension and avoid importing
    interpretation, the translation remains textually direct and leaves the reader
    to infer from context.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
