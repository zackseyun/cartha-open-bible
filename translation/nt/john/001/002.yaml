id: JHN.1.2
reference: John 1:2
source:
  edition: SBLGNT
  text: οὗτος ἦν ἐν ἀρχῇ πρὸς τὸν θεόν.
translation:
  text: He was in the beginning with God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'This one was in the beginning with God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτος
  chosen: He
  alternatives:
  - This one
  - This man
  lexicon: BDAG
  rationale: Although οὗτος is formally 'this one,' in context it refers back to the
    λόγος of v.1. English uses the personal pronoun naturally here to avoid stiffness
    while preserving the anaphoric reference. 'This one' is possible but wooden in
    modern English.
- source_word: ἦν
  chosen: was
  alternatives:
  - existed
  lexicon: BDAG
  rationale: Imperfect of εἰμί is most naturally rendered 'was.' 'Existed' can bring
    out durative force, but here 'was' is both idiomatic and sufficiently preserves
    the ongoing state indicated in the prologue.
- source_word: ἐν ἀρχῇ
  chosen: in the beginning
  alternatives:
  - at the beginning
  lexicon: BDAG
  rationale: This preserves the clear echo of Genesis 1:1 and matches the established
    sense of the phrase in John 1:1–2. 'At the beginning' is possible but weakens
    the literary and theological resonance.
- source_word: πρὸς
  chosen: with
  alternatives:
  - toward
  - in the presence of
  lexicon: BDAG
  rationale: In Johannine usage here, πρός with the accusative conveys personal relationship
    or orientation. 'With' is the best concise English rendering, preserving both
    proximity and relational distinction without overtranslating.
- source_word: τὸν θεόν
  chosen: God
  alternatives:
  - the God
  lexicon: BDAG
  rationale: The article is present in Greek, but idiomatic English does not normally
    say 'with the God' here. 'God' accurately renders the referent while maintaining
    natural English style.
