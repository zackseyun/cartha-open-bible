theological_decisions:
- issue: Referent of οὗτος in relation to John 1:1
  chosen_reading: The pronoun refers back to the Word and is rendered personally as
    'He.'
  alternative_readings:
  - This one
  rationale: The verse summarizes and reinforces the identity and relation of the
    λόγος from v.1. Rendering οὗτος as 'He' preserves the personal referent without
    importing additional doctrinal wording beyond the text.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Force of πρὸς τὸν θεόν
  chosen_reading: Relational distinction expressed as 'with God.'
  alternative_readings:
  - toward God
  - in the presence of God
  rationale: The phrase indicates personal relation/distinction between the Word and
    God in the prologue. 'With God' is the standard and most natural rendering, preserving
    theological tension without over-specifying metaphysical categories.
  doctrine_reference: Translation philosophy §3
