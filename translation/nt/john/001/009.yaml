theological_decisions:
- issue: Syntactical attachment of ἐρχόμενον ('coming')
  chosen_reading: 'Attached in sense to ''the true light'': ''The true light ... was
    coming into the world.'''
  alternative_readings:
  - 'Attached to ''every man'': ''The true light ... enlightens every man coming into
    the world.'''
  rationale: The Greek participle is accusative singular masculine and can grammatically
    modify ἄνθρωπον. However, Johannine usage strongly favors 'coming into the world'
    as a christological expression (cf. John 3:19; 6:14; 11:27; 16:28; 18:37), and
    the broader prologue context centers on the Light's advent. To preserve the genuine
    ambiguity without flattening it, the main text follows the christological reading
    and the alternative is preserved in a footnote.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
