id: JHN.1.9
reference: John 1:9
source:
  edition: SBLGNT
  text: ἦν τὸ φῶς τὸ ἀληθινὸν ὃ φωτίζει πάντα ἄνθρωπον ἐρχόμενον εἰς τὸν κόσμον.
translation:
  text: The true light, which enlightens every man, was coming into the world.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: ''The true light, which enlightens every man coming into the world.''
      The Greek participle ''coming'' can be read with ''every man'' rather than with
      ''the true light.'''
    reason: alternative_reading
lexical_decisions:
- source_word: φῶς
  chosen: light
  alternatives:
  - Light
  lexicon: BDAG
  rationale: Rendered with the ordinary noun 'light.' Although in Johannine context
    it functions christologically, the Greek uses the common noun with article, and
    English can preserve that without capitalization in the main text.
- source_word: ἀληθινόν
  chosen: 'true'
  alternatives:
  - real
  - genuine
  lexicon: BDAG
  rationale: '''True'' is the standard Johannine rendering and preserves the sense
    of what is ultimate or genuine, not merely factually correct.'
- source_word: φωτίζει
  chosen: enlightens
  alternatives:
  - gives light to
  - illumines
  lexicon: BDAG
  rationale: '''Enlightens'' best captures the verb''s metaphorical force in context
    while remaining natural English. ''Gives light to'' is possible but less concise.'
- source_word: πάντα ἄνθρωπον
  chosen: every man
  alternatives:
  - everyone
  - every person
  lexicon: BDAG
  rationale: Following the project's gender-accurate principle, ἄνθρωπον here is singular
    generic 'man' representing humanity. 'Every man' preserves the source's form and
    representative force more closely than the more neutral 'everyone,' while still
    being idiomatic.
- source_word: ἐρχόμενον εἰς τὸν κόσμον
  chosen: was coming into the world
  alternatives:
  - coming into the world
  - that comes into the world
  lexicon: BDAG
  rationale: 'The participle ἐρχόμενον is syntactically ambiguous: it can modify ''every
    man'' or, by sense, refer to ''the true light.'' In Johannine context and common
    ancient/modern interpretation, it is taken with ''the true light,'' yielding ''was
    coming into the world.'' The imperfect ἦν is brought forward as part of the verbal
    idea.'
- source_word: κόσμον
  chosen: world
  lexicon: BDAG
  rationale: Standard Johannine rendering for κόσμος; no contextual pressure suggests
    a narrower gloss.
- source_word: ἦν
  chosen: was
  alternatives:
  - there was
  lexicon: BDAG
  rationale: Rendered as simple imperfect 'was.' In English, combined with the participial
    idea, it naturally becomes 'was coming' to reflect the clause's flow.
