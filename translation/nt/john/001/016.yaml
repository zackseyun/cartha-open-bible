id: JHN.1.16
reference: John 1:16
source:
  edition: SBLGNT
  text: ⸀ὅτι ἐκ τοῦ πληρώματος αὐτοῦ ἡμεῖς πάντες ἐλάβομεν, καὶ χάριν ἀντὶ χάριτος·
translation:
  text: For from his fullness we have all received, and grace upon grace.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'grace upon grace' or 'one grace after another.' The Greek phrase can
      suggest successive grace as one gift follows another, though ἀντί more literally
      means 'in place of.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context this conjunction introduces an explanatory ground for the
    preceding statement (v. 14–15), so 'For' reads naturally in English while preserving
    the causal/explanatory force.
- source_word: ἐκ τοῦ πληρώματος αὐτοῦ
  chosen: from his fullness
  alternatives:
  - out of his fullness
  - from the fullness that is his
  lexicon: BDAG
  rationale: πλήρωμα denotes fullness, totality, or that which fills. 'From his fullness'
    is concise and idiomatic, preserving the genitive relation and the sense that
    what believers receive comes out of the plenitude belonging to the Word.
- source_word: ἡμεῖς πάντες
  chosen: we have all
  alternatives:
  - we all
  - all of us
  lexicon: BDAG
  rationale: The explicit pronoun plus πάντες is emphatic. 'We have all' keeps the
    emphasis while fitting English word order with the following verb.
- source_word: ἐλάβομεν
  chosen: have received
  alternatives:
  - received
  lexicon: BDAG
  rationale: The aorist is rendered with English present perfect to sound natural
    in this context of present possession resulting from a past reception. This preserves
    the sense without woodenly forcing a simple past.
- source_word: καὶ
  chosen: and
  alternatives:
  - even
  lexicon: BDAG
  rationale: The conjunction straightforwardly links the second phrase to the first.
    'And' preserves the syntax without overinterpreting the relation.
- source_word: χάριν ἀντὶ χάριτος
  chosen: grace in place of grace
  alternatives:
  - grace upon grace
  - grace for grace
  - one grace after another
  lexicon: BDAG
  rationale: ἀντί most basically means 'instead of' or 'in place of.' While the idiomatic
    sense may imply successive grace, 'grace in place of grace' best preserves the
    Greek's lexical force and the theological tension of the phrase. More interpretive
    renderings are preserved in a footnote.
