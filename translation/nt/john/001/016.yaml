theological_decisions:
- issue: Interpretation of χάριν ἀντὶ χάριτος
  chosen_reading: grace in place of grace
  alternative_readings:
  - grace upon grace
  - one grace after another
  rationale: The phrase is famously debated. Rather than resolve the ambiguity into
    a purely accumulative sense, the main text keeps the more literal force of ἀντί
    ('in place of'), allowing readers to see the tension between replacement and succession.
    This follows the doctrine guideline to preserve theological tension where the
    source is genuinely ambiguous.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it.'
