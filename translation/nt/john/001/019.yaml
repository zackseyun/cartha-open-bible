theological_decisions:
- issue: Referent and rendering of οἱ Ἰουδαῖοι in John
  chosen_reading: Render literally as "the Jews" in the main text, while clarifying in a footnote that in Johannine usage this often refers more specifically to the Judean religious authorities, not the Jewish people as a whole.
  alternative_readings:
  - the Jewish leaders
  - the Judeans
  rationale: This preserves original-language primacy and avoids overinterpreting the referent in the main text, while also guarding against an anachronistic or ethnically totalizing reading that the narrative context does not require. In this verse, the sending of priests and Levites from Jerusalem suggests leadership/authority structures are especially in view.
  doctrine_reference: Translation philosophy §§1, 3, 6
