id: JHN.1.19
reference: John 1:19
source:
  edition: SBLGNT
  text: Καὶ αὕτη ἐστὶν ἡ μαρτυρία τοῦ Ἰωάννου ὅτε ⸀ἀπέστειλαν οἱ Ἰουδαῖοι ἐξ Ἱεροσολύμων ἱερεῖς καὶ Λευίτας ἵνα ἐρωτήσωσιν αὐτόν· Σὺ τίς εἶ;
translation:
  text: And this is the testimony of John[a], when the Jews sent priests and Levites from Jerusalem to ask him, “Who are you?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "the Jewish leaders" or "the Judeans." In John, "the Jews" often refers especially to the Judean religious authorities rather than to the Jewish people as a whole.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρία
  chosen: testimony
  alternatives:
  - witness
  lexicon: BDAG
  rationale: '"Testimony" fits the noun sense of a formal witness-bearing report in context, while preserving Johannine legal/witness overtones. "Witness" is possible, but here the clause introduces the content of John''s attestation, so "testimony" reads more naturally in English.'
- source_word: τοῦ Ἰωάννου
  chosen: of John
  alternatives:
  - about John
  lexicon: BDAG
  rationale: 'The genitive is best taken as subjective: the testimony given by John, not testimony about John. This matches the following interrogation scene in which John speaks concerning himself and, in context, concerning the Messiah.'
- source_word: ὅτε
  chosen: when
  alternatives:
  - at the time when
  lexicon: BDAG
  rationale: A straightforward temporal conjunction is most natural here, introducing the occasion on which this testimony occurred.
- source_word: ἀπέστειλαν
  chosen: sent
  alternatives:
  - dispatched
  lexicon: BDAG
  rationale: '"Sent" is the standard and clear rendering of ἀποστέλλω in this narrative context. "Dispatched" is possible but unnecessarily stiff.'
- source_word: οἱ Ἰουδαῖοι
  chosen: the Jews
  alternatives:
  - the Jewish leaders
  - the Judeans
  lexicon: BDAG
  rationale: The Greek expression is literally "the Jews," and John regularly uses this phrase as a socio-religious group designation, often especially for the Judean religious authorities. The main text preserves the source wording; alternatives are worth noting because the referent in John is often narrower than all Jewish people.
- source_word: ἐξ Ἱεροσολύμων
  chosen: from Jerusalem
  alternatives:
  - out of Jerusalem
  lexicon: BDAG
  rationale: Standard idiomatic rendering of ἐκ/ἐξ with place of origin.
- source_word: ἱερεῖς καὶ Λευίτας
  chosen: priests and Levites
  lexicon: BDAG
  rationale: These are distinct temple-associated groups and should be translated plainly and literally.
- source_word: ἵνα ἐρωτήσωσιν αὐτόν
  chosen: to ask him
  alternatives:
  - so that they might question him
  lexicon: BDAG
  rationale: The ἵνα clause expresses purpose. "To ask him" is concise, natural English and adequately conveys the intended purpose of the sending.
- source_word: Σὺ τίς εἶ;
  chosen: Who are you?
  alternatives:
  - You—who are you?
  lexicon: BDAG
  rationale: This is the natural English equivalent. The explicit pronoun Σὺ adds emphasis, but English normally conveys the question without a marked pronoun unless one wishes to sound overly dramatic.
