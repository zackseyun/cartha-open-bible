id: JHN.1.35
reference: John 1:35
source:
  edition: SBLGNT
  text: Τῇ ἐπαύριον πάλιν εἱστήκει ⸀ὁ Ἰωάννης καὶ ἐκ τῶν μαθητῶν αὐτοῦ δύο,
translation:
  text: On the next day, John was standing there again, and two of his disciples were
    with him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: "The next day, John was standing again, and two of his disciples [were
      there]."'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  chosen: On the next day
  alternatives:
  - The next day
  - On the following day
  lexicon: BDAG
  rationale: The article with ἐπαύριον forms a temporal idiom meaning 'on the next
    day' or 'the following day.' 'On the next day' preserves the temporal force naturally
    in English.
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: πάλιν marks repetition from the prior scene. 'Again' is the most natural
    concise rendering and preserves the narrative continuity.
- source_word: εἱστήκει
  chosen: was standing there
  alternatives:
  - stood
  - was standing
  lexicon: BDAG
  rationale: This pluperfect/imperfective form of ἵστημι functions here as a stative
    past, describing John's posture/location in the scene. 'Was standing there' conveys
    the ongoing state better than the simple 'stood' and makes the scene vivid in
    idiomatic English. 'There' is supplied to make the intransitive sense natural
    in English, not to add new content.
- source_word: ὁ Ἰωάννης
  chosen: John
  lexicon: BDAG
  rationale: Standard transliteration of the personal name. In context this is John
    the Baptist, but the Greek text simply says 'John,' so the translation does not
    expand the name in the main text.
- source_word: καὶ
  chosen: and
  alternatives:
  - with
  lexicon: BDAG
  rationale: The conjunction straightforwardly coordinates John with the following
    phrase. 'And' preserves the simple parataxis of the Greek.
- source_word: ἐκ τῶν μαθητῶν αὐτοῦ δύο
  chosen: two of his disciples were with him
  alternatives:
  - and two of his disciples
  - and two from among his disciples
  lexicon: BDAG
  rationale: Literally, 'and two from his disciples.' English normally requires a
    verb or fuller predication, supplied from the scene context. 'Two of his disciples
    were with him' makes explicit the relationship implied by the Greek while preserving
    the partitive sense of ἐκ. 'Disciples' is retained as the standard rendering of
    μαθηταί.
