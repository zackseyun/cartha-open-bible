id: JHN.1.4
reference: John 1:4
source:
  edition: SBLGNT
  text: ἐν αὐτῷ ζωὴ ἦν, καὶ ἡ ζωὴ ἦν τὸ φῶς τῶν ἀνθρώπων·
translation:
  text: In him was life, and the life was the light of men.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the light of humanity' or 'the light of people'; Greek 'of men' uses
      a masculine plural with generic human reference.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αὐτῷ
  chosen: In him
  alternatives:
  - in it
  lexicon: BDAG
  rationale: The preposition ἐν with the dative is most naturally rendered 'in.' The
    pronoun αὐτῷ refers back to the λόγος in the preceding context, which is personal
    in John's presentation, so 'him' is preferred over the grammatically possible
    but contextually inferior 'it.'
- source_word: ζωὴ
  chosen: life
  lexicon: BDAG
  rationale: ζωή is straightforwardly 'life.' In Johannine context it carries rich
    theological weight, but the English should preserve the simple lexical form and
    let the context supply the depth rather than paraphrasing as 'eternal life' here.
- source_word: ἦν
  chosen: was
  alternatives:
  - existed
  lexicon: BDAG
  rationale: The imperfect of εἰμί is naturally rendered 'was.' 'Existed' is possible
    and can highlight ongoing existence, but 'was' is both accurate and stylistically
    consistent with the surrounding prologue.
- source_word: ἡ ζωὴ
  chosen: the life
  lexicon: BDAG
  rationale: The article is retained in English because the second clause refers back
    to the life just mentioned and gives it a predicative identification. 'The life'
    preserves the anaphoric force.
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: φῶς is best rendered 'light.' The article is retained because the clause
    identifies 'the life' with 'the light' in a definite, thematic way central to
    Johannine imagery.
- source_word: τῶν ἀνθρώπων
  chosen: of men
  alternatives:
  - of humanity
  - of people
  - for men
  lexicon: BDAG
  rationale: ἄνθρωποι here denotes human beings generally. Following the project's
    gender-accurate principle, 'men' is retained because it matches the representative/generic
    force of the Greek and preserves the traditional cadence of the line. 'Of humanity'
    or 'of people' are possible inclusive renderings, but they are less formally aligned
    with the genitive construction and less consistent with the stated philosophy.
