theological_decisions:
- issue: Referent and personal force of αὐτῷ
  chosen_reading: The pronoun is rendered personally as 'him,' referring to the Word.
  alternative_readings:
  - '''it,'' if λόγος were taken more abstractly'
  rationale: Within the immediate context of John 1, the Word is portrayed in personal
    terms and in relation to God, culminating in incarnation later in the prologue.
    Rendering αὐτῷ as 'him' preserves that personal force without importing later
    doctrinal language into the verse itself.
  doctrine_reference: 'Affirmations: Nicene/Chalcedonian orthodoxy; Translation philosophy
    1'
- issue: Generic force of ἀνθρώπων
  chosen_reading: Rendered 'men' as a generic term for humankind.
  alternative_readings:
  - '''humanity'''
  - '''people'''
  rationale: The Greek is grammatically masculine plural but generic in sense. Per
    the project's gender-accurate policy, the translation uses the English form judged
    to match the source's representative force, while preserving the possibility of
    an inclusive understanding in a footnote.
  doctrine_reference: Translation philosophy 4
