theological_decisions:
- issue: Force of Jesus' question πιστεύεις;
  chosen_reading: 'A genuine rhetorical question: ''do you believe?'''
  alternative_readings:
  - 'An implicit mild rebuke: ''You believe because...?'''
  - A statement rather than a question in some translations
  rationale: The Greek punctuation and word order support an interrogative, and the
    immediate context leads into a promise of greater revelation rather than a doctrinally
    loaded statement about the adequacy of Nathanael's faith. The translation preserves
    the rhetorical force without sharpening it into rebuke beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
