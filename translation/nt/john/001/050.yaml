id: JHN.1.50
reference: John 1:50
source:
  edition: SBLGNT
  text: ἀπεκρίθη Ἰησοῦς καὶ εἶπεν αὐτῷ· Ὅτι εἶπόν σοι ⸀ὅτι εἶδόν σε ὑποκάτω τῆς συκῆς
    πιστεύεις; μείζω τούτων ⸀ὄψῃ.
translation:
  text: Jesus answered and said to him, “Because I told you that I saw you under the
    fig tree, do you believe? You will see greater things than these.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Is it because I told you that I saw you under the fig tree that you
      believe?'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue. 'Answered'
    fits the idiom ἀπεκρίθη ... καὶ εἶπεν without overtranslating both verbs.
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Common and natural rendering of λέγω here. Keeping both 'answered and
    said' reflects the Greek narrative formula without paraphrase.
- source_word: Ὅτι
  chosen: Because
  alternatives:
  - Is it because
  - That
  lexicon: BDAG
  rationale: Introduces the reason for Jesus' question. Rendering as 'Because' makes
    the syntax clear in English while preserving the causal force. An expanded 'Is
    it because' is possible but adds words not explicit in Greek.
- source_word: ὅτι
  chosen: that
  alternatives:
  - because
  lexicon: BDAG
  rationale: 'The second ὅτι introduces the content of what Jesus said: ''that I saw
    you...'' Distinguishing the two uses of ὅτι reflects the Greek structure.'
- source_word: εἶδόν
  chosen: I saw
  alternatives:
  - I had seen
  lexicon: BDAG
  rationale: Aorist rendered simply as English past. No need for pluperfect in context.
- source_word: ὑποκάτω τῆς συκῆς
  chosen: under the fig tree
  alternatives:
  - beneath the fig tree
  lexicon: BDAG
  rationale: Natural English equivalent preserving the concrete image. 'Under' is
    more idiomatic than 'beneath' here.
- source_word: πιστεύεις
  chosen: do you believe
  alternatives:
  - are you believing
  - do you trust
  lexicon: BDAG
  rationale: Present indicative in a rhetorical question is best rendered with simple
    present in English. 'Believe' is preferred over 'trust' here because the Johannine
    usage commonly centers on belief/faith in response to revelation.
- source_word: μείζω
  chosen: greater things
  alternatives:
  - greater things still
  - things greater
  lexicon: BDAG
  rationale: Neuter plural comparative used substantivally. 'Greater things' is the
    most natural and direct English rendering.
- source_word: τούτων
  chosen: than these
  alternatives:
  - than this
  lexicon: BDAG
  rationale: Genitive of comparison with neuter plural demonstrative; 'than these'
    preserves the plural reference to the things just mentioned.
- source_word: ὄψῃ
  chosen: you will see
  alternatives:
  - you shall see
  lexicon: BDAG
  rationale: Future middle indicative of ὁράω. 'You will see' is clear modern English;
    'shall' is unnecessarily archaic.
