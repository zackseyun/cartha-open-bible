theological_decisions:
- issue: Relational sequence between 'received him' and 'believe in his name'
  chosen_reading: Render both expressions, with the latter in apposition explaining
    the former rather than collapsing them into one phrase.
  alternative_readings:
  - Treat 'received him' and 'believe in his name' as exact synonyms and translate
    only one idea
  rationale: 'The Greek keeps both expressions: ὅσοι...ἔλαβον αὐτόν ... τοῖς πιστεύουσιν
    εἰς τὸ ὄνομα αὐτοῦ. The second phrase identifies the recipients more specifically
    without eliminating the first. Preserving both maintains Johannine theological
    texture without over-resolving the relationship.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather
    than resolve it)
- issue: Meaning of divine sonship term
  chosen_reading: Use 'children of God' rather than 'sons of God.'
  alternative_readings:
  - sons of God
  rationale: The Greek uses τέκνα, a broader filial term, not υἱοί. This avoids importing
    male-specific language where the source is not male-specific and aligns with the
    gender-accurate principle.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
