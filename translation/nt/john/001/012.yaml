id: JHN.1.12
reference: John 1:12
source:
  edition: SBLGNT
  text: ὅσοι δὲ ἔλαβον αὐτόν, ἔδωκεν αὐτοῖς ἐξουσίαν τέκνα θεοῦ γενέσθαι, τοῖς πιστεύουσιν
    εἰς τὸ ὄνομα αὐτοῦ,
translation:
  text: But to all who received him, he gave them the right to become children of
    God—to those who believe in his name,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'authority' or 'power' to become children of God; the Greek term can
      denote delegated authority, right, or capability.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅσοι
  chosen: all who
  alternatives:
  - as many as
  - whoever
  lexicon: BDAG
  rationale: Plural relative expression meaning all those who; 'all who' is natural
    modern English and preserves the collective sense better than the more wooden
    'as many as.'
- source_word: δὲ
  chosen: But
  alternatives:
  - and
  - now
  lexicon: BDAG
  rationale: Marks contrast with the previous verse's rejection; 'but' best signals
    the adversative force in context.
- source_word: ἔλαβον αὐτόν
  chosen: received him
  alternatives:
  - accepted him
  - took him
  lexicon: BDAG
  rationale: λαμβάνω here refers to welcoming/receiving the Logos rather than physically
    taking him. 'Received him' is both idiomatic and faithful to Johannine usage;
    'accepted him' is interpretive and slightly narrower.
- source_word: ἔδωκεν
  chosen: he gave
  alternatives:
  - he granted
  lexicon: BDAG
  rationale: Simple aorist of δίδωμι; 'gave' is the most direct rendering. The nuance
    of granting is carried by the object ἐξουσίαν.
- source_word: ἐξουσίαν
  chosen: the right
  alternatives:
  - authority
  - power
  - privilege
  lexicon: BDAG
  rationale: In this context ἐξουσία denotes entitlement or authorization to become
    God's children, not raw power. 'Right' communicates granted status/access in clear
    English. 'Authority' is more literal but less natural here; 'privilege' may understate
    the juridical nuance.
- source_word: τέκνα θεοῦ
  chosen: children of God
  alternatives:
  - sons of God
  lexicon: BDAG
  rationale: τέκνα is gender-inclusive 'children,' not specifically male 'sons' (which
    would suggest υἱοί). This follows the Greek accurately and avoids importing a
    narrower filial image.
- source_word: γενέσθαι
  chosen: to become
  alternatives:
  - to be
  - to come to be
  lexicon: BDAG
  rationale: Aorist middle infinitive of γίνομαι indicates coming into a new state.
    'To become' preserves the sense of transition better than 'to be.'
- source_word: τοῖς πιστεύουσιν
  chosen: to those who believe
  alternatives:
  - to the ones believing
  - to those who have faith
  lexicon: BDAG
  rationale: Present participle denotes those characterized by believing. 'Believe'
    is the standard and natural verbal rendering; using 'have faith' would shift from
    the verbal form in Greek.
- source_word: εἰς τὸ ὄνομα αὐτοῦ
  chosen: in his name
  alternatives:
  - into his name
  - in him
  lexicon: BDAG
  rationale: πιστεύω εἰς commonly means believing in/into someone, and with 'name'
    refers to trust directed toward his revealed person and identity. 'In his name'
    is the established and accurate English expression; 'into his name' is overly
    literal, while 'in him' omits ὄνομα.
