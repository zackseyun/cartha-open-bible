theological_decisions:
- issue: Referent of αὐτοῦ ('his') in 'the two disciples of him'
  chosen_reading: Understood as referring to John the Baptist, not Jesus.
  alternative_readings:
  - Taken as a more ambiguous 'his two disciples'
  rationale: In the immediate context (John 1:35-36), John the Baptist is standing
    with two of his disciples and speaks about Jesus; verse 37 then narrates that
    those two disciples heard him and followed Jesus. The translation keeps the referent
    clear by using 'the two disciples' rather than the potentially misleading 'his
    two disciples' in English.
