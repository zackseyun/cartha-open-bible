id: JHN.1.37
reference: John 1:37
source:
  edition: SBLGNT
  text: καὶ ἤκουσαν ⸂οἱ δύο μαθηταὶ αὐτοῦ⸃ λαλοῦντος καὶ ἠκολούθησαν τῷ Ἰησοῦ.
translation:
  text: And the two disciples heard him speaking, and they followed Jesus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'his two disciples,' referring to John the Baptist.
    reason: alternative_reading
lexical_decisions:
- source_word: ἤκουσαν
  chosen: heard
  alternatives:
  - listened to
  lexicon: BDAG
  rationale: Aorist indicative of ἀκούω here denotes the simple event of hearing what
    was said, not necessarily sustained attentive listening. 'Heard' is the most natural
    English equivalent in context.
- source_word: οἱ δύο μαθηταὶ αὐτοῦ
  chosen: the two disciples
  alternatives:
  - his two disciples
  lexicon: BDAG
  rationale: The phrase refers back to John the Baptist's two disciples from the previous
    verse. English can naturally omit 'his' because the referent is clear from context,
    while preserving the definite identification with 'the two disciples.'
- source_word: λαλοῦντος
  chosen: speaking
  alternatives:
  - talking
  lexicon: BDAG
  rationale: 'The present participle of λαλέω indicates contemporaneous action: they
    heard him while he was speaking. ''Speaking'' is slightly more neutral and dignified
    than ''talking'' and fits Johannine narrative style.'
- source_word: ἠκολούθησαν
  chosen: followed
  alternatives:
  - went after
  lexicon: BDAG
  rationale: ἀκολουθέω commonly means 'follow' both physically and in discipleship
    contexts. Here the immediate sense is literal movement after Jesus, while also
    carrying the narrative resonance of becoming his followers. 'Followed' preserves
    both levels without over-interpreting.
- source_word: τῷ Ἰησοῦ
  chosen: Jesus
  alternatives:
  - to Jesus
  lexicon: BDAG
  rationale: The dative with ἀκολουθέω marks the person followed. Standard English
    idiom is simply 'followed Jesus,' not 'followed to Jesus,' so the object is rendered
    directly.
