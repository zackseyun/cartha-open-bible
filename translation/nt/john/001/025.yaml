theological_decisions:
- issue: Rendering Χριστός in a Johannine identification question
  chosen_reading: Messiah
  alternative_readings:
  - Christ
  rationale: The term functions as a title in this context, not as a name. Following the project's contested-terms guidance, 'Messiah' preserves the Hebraic expectation in the dialogue.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Whether ὁ προφήτης should be treated as a specific eschatological title
  chosen_reading: the Prophet
  alternative_readings:
  - the prophet
  rationale: In John's Gospel this expression refers to a distinct expected figure, not merely any prophet. Capitalization in English helps preserve that recognized titular sense while remaining faithful to the article in Greek.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: translate titles; preserve source meaning'
