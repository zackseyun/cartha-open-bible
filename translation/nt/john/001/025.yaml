id: JHN.1.25
reference: John 1:25
source:
  edition: SBLGNT
  text: καὶ ἠρώτησαν αὐτὸν καὶ εἶπαν αὐτῷ· Τί οὖν βαπτίζεις εἰ σὺ οὐκ εἶ ὁ χριστὸς ⸂οὐδὲ Ἠλίας οὐδὲ⸃ ὁ προφήτης;
translation:
  text: And they asked him and said to him[a], “Why then are you baptizing, if you are not the Messiah, nor Elijah[b], nor the Prophet?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the Christ.” The Greek title is Χριστός (Christos), rendered here as “the Messiah” to preserve the Jewish messianic context.
    reason: alternative_reading
  - marker: b
    text: “The Prophet” likely refers to the expected prophet like Moses (see Deut. 18:15).
    reason: cross_reference
lexical_decisions:
- source_word: ἠρώτησαν
  chosen: asked
  alternatives:
  - questioned
  - inquired of
  lexicon: BDAG
  rationale: Aorist active indicative of ἐρωτάω; 'asked' is the most natural modern English rendering and fits the narrative sequence without overstating hostility.
- source_word: εἶπαν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Standard rendering of λέγω in narrative introduction. Keeping both 'asked' and 'said' reflects the Greek's two verbs rather than collapsing them into one.
- source_word: Τί οὖν
  chosen: Why then
  alternatives:
  - What then
  - Why, then
  lexicon: BDAG
  rationale: 'Although τί is formally ''what,'' in this idiom with οὖν and a following verb it functions to ask for the reason or basis: ''Why then...?'' This best captures the force in idiomatic English.'
- source_word: βαπτίζεις
  chosen: are you baptizing
  alternatives:
  - do you baptize
  lexicon: BDAG
  rationale: Present indicative conveys ongoing activity. English progressive better reflects the immediate, current practice under question.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: 'Per doctrine, Χριστός as a title is rendered ''Messiah'' rather than ''Christ'' to preserve the Jewish messianic context. The article marks it as a title: ''the Messiah.'''
- source_word: Ἠλίας
  chosen: Elijah
  lexicon: BDAG
  rationale: Proper name transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: ὁ προφήτης
  chosen: the Prophet
  alternatives:
  - the prophet
  lexicon: BDAG
  rationale: The article indicates a recognized expected figure, likely the prophet like Moses anticipated in Deut 18:15 and reflected in Johannine expectation. Capitalizing 'Prophet' signals titular force in English without adding content beyond the Greek.
- source_word: οὐδὲ ... οὐδὲ
  chosen: nor ... nor
  alternatives:
  - or ... or
  lexicon: BDAG
  rationale: The repeated οὐδέ coordinates the negated alternatives after 'you are not,' best represented by 'nor ... nor' in English.
