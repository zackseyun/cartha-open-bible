theological_decisions:
- issue: Christological force of Nathanael's confession 'the Son of God'
  chosen_reading: 'Retain the title as stated without weakening or expanding it: ''the
    Son of God.'''
  alternative_readings:
  - a son of God
  - God's Son with reduced titular force
  rationale: Within John's Gospel this expression carries strong messianic and christological
    significance. The translation preserves the title exactly as the Greek presents
    it, without importing later creedal wording or diluting it into an indefinite
    expression.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve
    it
- issue: Royal-messianic sense of 'King of Israel'
  chosen_reading: Translate as the explicit royal title 'the King of Israel.'
  alternative_readings:
  - king over Israel
  - Israel's king
  rationale: The phrase evokes Israel's expected royal Messiah. The translation keeps
    the formal title and does not paraphrase it into a looser possessive or prepositional
    expression.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation
    tradition'
