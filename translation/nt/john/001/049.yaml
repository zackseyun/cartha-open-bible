id: JHN.1.49
reference: John 1:49
source:
  edition: SBLGNT
  text: ἀπεκρίθη ⸂αὐτῷ Ναθαναήλ⸃· Ῥαββί, σὺ εἶ ὁ υἱὸς τοῦ θεοῦ, σὺ ⸂βασιλεὺς εἶ⸃ τοῦ
    Ἰσραήλ.
translation:
  text: Nathanael answered him, “Rabbi, you are the Son of God; you are the King of
    Israel.”
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπεκρίθη
  chosen: answered
  alternatives:
  - replied
  lexicon: BDAG
  rationale: Standard narrative rendering for ἀποκρίνομαι in dialogue. 'Answered'
    is slightly more literal and idiomatic in English narrative style.
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - Teacher
  lexicon: BDAG
  rationale: Kept as the familiar transliterated Jewish honorific because it functions
    as a direct address title in the Gospel and preserves first-century Jewish context.
    'Teacher' is a valid sense but loses the specific cultural form.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  chosen: the Son of God
  alternatives:
  - God's Son
  lexicon: BDAG
  rationale: The articular construction is best represented with the definite title
    'the Son of God.' This preserves the christological force of Nathanael's confession
    without paraphrase.
- source_word: βασιλεὺς
  chosen: King
  alternatives:
  - the king
  - ruler
  lexicon: BDAG
  rationale: '''King'' is the direct lexical equivalent. The anarthrous predicate
    nominative in Greek is naturally definite here because it is qualified by ''of
    Israel'' and functions as a recognized royal-messianic title.'
- source_word: τοῦ Ἰσραήλ
  chosen: of Israel
  alternatives:
  - over Israel
  lexicon: BDAG
  rationale: A straightforward genitival rendering. 'Of Israel' preserves the titular
    form; 'over Israel' would be interpretive expansion.
- source_word: σὺ εἶ … σὺ … εἶ
  chosen: you are … you are
  alternatives:
  - you are … and are
  lexicon: Greek grammar
  rationale: The repeated explicit pronoun and verb are retained in English to preserve
    the emphatic, confessional parallelism of the Greek.
- source_word: Ναθαναήλ
  chosen: Nathanael
  lexicon: N/A
  rationale: Personal names are transliterated by standard convention per translation
    philosophy.
