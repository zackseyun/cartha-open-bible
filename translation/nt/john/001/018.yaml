id: JHN.1.18
reference: John 1:18
source:
  edition: SBLGNT
  text: θεὸν οὐδεὶς ἑώρακεν πώποτε· ⸂μονογενὴς θεὸς⸃ ὁ ὢν εἰς τὸν κόλπον τοῦ πατρὸς
    ἐκεῖνος ἐξηγήσατο.
translation:
  text: No one has ever seen God; the one and only God, who is in the bosom of the
    Father, he has made him known.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts read 'the only Son' (or 'the only begotten Son') instead
      of 'the one and only God.'
    reason: textual_variant
  - marker: b
    text: Or 'at the Father's side.' The Greek literally says 'in the bosom of the
      Father,' expressing intimate closeness.
    reason: lexical_alternative
  - marker: c
    text: Or 'has explained him' or 'has revealed him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὸν
  chosen: God
  lexicon: BDAG
  rationale: Direct object of ἑώρακεν; standard rendering for θεός here referring
    to God absolutely.
- source_word: οὐδεὶς
  chosen: no one
  alternatives:
  - nobody
  lexicon: BDAG
  rationale: Idiomatic modern English equivalent preserving the universal negation.
- source_word: ἑώρακεν
  chosen: has ever seen
  alternatives:
  - has seen
  lexicon: BDAG
  rationale: Perfect tense conveys a state/result extending to the present; combined
    with πώποτε, 'has ever seen' is natural English.
- source_word: πώποτε
  chosen: ever
  alternatives:
  - at any time
  lexicon: BDAG
  rationale: With the negated perfect, 'ever' gives the sense succinctly in modern
    English; the fuller traditional 'at any time' is possible but less natural.
- source_word: μονογενὴς θεὸς
  chosen: the one and only God
  alternatives:
  - the only begotten God
  - the unique God
  - the only Son
  lexicon: BDAG
  rationale: The SBLGNT text reads μονογενὴς θεός. μονογενής is best understood as
    'one and only/unique' rather than deriving its sense from 'begotten' in ordinary
    lexical usage. Because the noun is θεός in this reading, the phrase is rendered
    'the one and only God.' The well-known variant 'the only Son' is preserved in
    a footnote as a textual alternative.
- source_word: ὁ ὢν
  chosen: who is
  alternatives:
  - the one who is
  - who exists
  lexicon: BDAG
  rationale: Substantival participle functioning appositionally to μονογενὴς θεός;
    relative clause is the most natural English rendering.
- source_word: εἰς τὸν κόλπον τοῦ πατρὸς
  chosen: in the bosom of the Father
  alternatives:
  - at the Father's side
  - in the Father's embrace
  lexicon: BDAG
  rationale: κόλπος literally means 'bosom' or 'chest,' an image of intimate closeness.
    'Bosom' preserves the metaphor more transparently than the more interpretive 'side,'
    while remaining understandable in context.
- source_word: πατρὸς
  chosen: the Father
  lexicon: BDAG
  rationale: Definite relational title in Johannine usage, referring to God as Father
    in relation to the Son.
- source_word: ἐκεῖνος
  chosen: he
  alternatives:
  - that one
  lexicon: BDAG
  rationale: Emphatic demonstrative referring back to the subject just named; English
    normally expresses this with an explicit 'he' rather than the stiffer 'that one.'
- source_word: ἐξηγήσατο
  chosen: has made him known
  alternatives:
  - has explained him
  - has revealed him
  lexicon: BDAG
  rationale: The verb carries the sense of narrating, explaining, or making known.
    In context, 'has made him known' communicates revelatory disclosure clearly and
    idiomatically without reducing the force to mere verbal explanation.
