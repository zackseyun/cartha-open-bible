theological_decisions:
- issue: Textual reading of μονογενὴς θεὸς versus ὁ μονογενὴς υἱός
  chosen_reading: Render the main text according to the printed SBLGNT reading, 'the
    one and only God,' and preserve 'the only Son' in a footnote.
  alternative_readings:
  - the only Son
  - the only begotten Son
  rationale: The provided source text is SBLGNT, which reads μονογενὴς θεός. Because
    this is a major christological and textual crux, the translation follows the source
    text in the main line while preserving the familiar alternative in a footnote
    for transparency. This also fits the doctrine requirement to preserve tension
    and document contested readings rather than silently resolve them.
  doctrine_reference: Translation philosophy §1, §3; Affirmations (Nicene/Chalcedonian
    orthodoxy)
- issue: Rendering μονογενής
  chosen_reading: Translate as 'one and only' rather than 'only begotten.'
  alternative_readings:
  - only begotten
  - unique
  rationale: Current lexical evidence favors the sense 'one of a kind/unique/one and
    only' in Johannine usage. 'Only begotten' is historically important and theologically
    familiar, but it risks suggesting that the lexical meaning itself directly encodes
    begetting rather than uniqueness. The traditional rendering is preserved as a
    lexical alternative in the footnote discussion.
  doctrine_reference: Translation philosophy §1, §6; Affirmations (Nicene orthodoxy
    without importing claims beyond the text)
