theological_decisions:
- issue: Meaning of κατέλαβεν in the light/darkness contrast
  chosen_reading: has not overcome
  alternative_readings:
  - has not comprehended it
  - did not grasp it
  rationale: The Greek permits both cognitive ('grasp/comprehend') and hostile ('seize/overcome')
    senses. The immediate metaphor of light and darkness favors 'overcome,' while
    John's style may allow layered meaning. To preserve that tension without flattening
    the text, the main text uses 'overcome' and the cognitive alternative is preserved
    in a footnote.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 (Preserve theological
    tension rather than resolve it)
