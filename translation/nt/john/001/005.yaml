id: JHN.1.5
reference: John 1:5
source:
  edition: SBLGNT
  text: καὶ τὸ φῶς ἐν τῇ σκοτίᾳ φαίνει, καὶ ἡ σκοτία αὐτὸ οὐ κατέλαβεν.
translation:
  text: And the light shines in the darkness, and the darkness has not overcome it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the darkness has not comprehended it' or 'grasped it.' The Greek verb
      can carry either the sense of overcoming or of grasping/understanding.
    reason: alternative_reading
lexical_decisions:
- source_word: φῶς
  chosen: the light
  alternatives:
  - light
  lexicon: BDAG
  rationale: Rendered with the article as 'the light' to preserve the definite, thematic
    reference established in the immediate context of John's prologue.
- source_word: σκοτίᾳ / σκοτία
  chosen: the darkness
  alternatives:
  - darkness
  lexicon: BDAG
  rationale: Rendered with the article both times as 'the darkness' to reflect the
    Greek articles and the personified/thematic contrast with 'the light' in the prologue.
- source_word: φαίνει
  chosen: shines
  alternatives:
  - is shining
  - shines forth
  lexicon: BDAG
  rationale: Present indicative is best rendered as a vivid present, 'shines,' expressing
    ongoing action without overtranslating aspect.
- source_word: κατέλαβεν
  chosen: has not overcome
  alternatives:
  - did not comprehend
  - did not grasp
  - did not seize
  lexicon: BDAG
  rationale: καταλαμβάνω can mean 'seize,' 'grasp,' or 'overcome.' In this context
    of light versus darkness, 'overcome' best fits the imagery and preserves the theological
    tension of conflict. Because the verb is genuinely ambiguous and 'comprehend/grasp'
    has a long translation history, that alternative is preserved in a footnote.
- source_word: αὐτὸ
  chosen: it
  alternatives:
  - him
  lexicon: BDAG
  rationale: The pronoun is neuter singular, agreeing grammatically with φῶς ('light'),
    so 'it' is the most direct rendering here, even though the broader context speaks
    personally of the Logos.
