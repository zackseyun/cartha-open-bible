id: JHN.1.8
reference: John 1:8
source:
  edition: SBLGNT
  text: οὐκ ἦν ἐκεῖνος τὸ φῶς, ἀλλ’ ἵνα μαρτυρήσῃ περὶ τοῦ φωτός.
translation:
  text: He was not the light[a], but came to bear witness about the light.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'He was not the light, but that he might bear witness about the light.' The Greek leaves the verb in the second clause implied from the context.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἦν
  chosen: was not
  alternatives:
  - was not himself
  lexicon: BDAG
  rationale: Straightforward negated imperfect of εἰμί. English simple past is the most natural equivalent here.
- source_word: ἐκεῖνος
  chosen: He
  alternatives:
  - that one
  - that man
  lexicon: BDAG
  rationale: Although demonstrative in form, in Johannine style ἐκεῖνος often functions as an emphatic personal reference. 'He' gives natural English while preserving the personal subject; 'that one' would sound overly wooden here.
- source_word: τὸ φῶς
  chosen: the light
  lexicon: BDAG
  rationale: Definite article retained because the phrase refers to the specific revelatory light introduced in the prologue, not light in a general sense.
- source_word: ἀλλ’ ἵνα
  chosen: but came to
  alternatives:
  - but in order that
  - but so that
  lexicon: BDAG
  rationale: The Greek ellipsis after ἀλλά leaves the contrastive purpose clause to be supplied from context. English requires a fuller expression; 'but came to' naturally conveys the implied sense from the preceding verse that John's role/purpose was to testify.
- source_word: μαρτυρήσῃ
  chosen: bear witness
  alternatives:
  - testify
  - give testimony
  lexicon: BDAG
  rationale: '''Bear witness'' preserves the forensic/testimonial nuance of μαρτυρέω and fits Johannine usage well. ''Testify'' is possible but slightly less concrete in English style here.'
- source_word: περὶ τοῦ φωτός
  chosen: about the light
  alternatives:
  - concerning the light
  - regarding the light
  lexicon: BDAG
  rationale: περί with genitive is well rendered 'about' in readable modern English; this keeps the sense without sounding overly formal.
