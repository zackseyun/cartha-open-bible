theological_decisions:
- issue: Identity and role of John relative to the true light
  chosen_reading: The verse denies that John himself was the light and states his purpose as bearing witness to the light.
  alternative_readings:
  - The verse could be rendered more literally as 'He was not the light, but in order that he might bear witness concerning the light.'
  rationale: The translation preserves the prologue's distinction between the witness and the light without importing further doctrinal explanation. The supplied 'came' reflects the contextual ellipsis rather than adding new theology.
  doctrine_reference: Translation philosophy §§1, 3, 6
