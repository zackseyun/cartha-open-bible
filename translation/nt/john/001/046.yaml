theological_decisions:
- issue: Tone of Nathanael's question about Nazareth
  chosen_reading: Render as a straightforward rhetorical question without adding interpretive markers of sarcasm or contempt beyond what the words themselves convey.
  alternative_readings:
  - Can any good thing come out of Nazareth?
  - Is anything good able to be from Nazareth?
  rationale: The Greek question implies skepticism, but the text does not explicitly mark sneering tone. The translation preserves the rhetorical force without importing a stronger judgment than the wording warrants.
  doctrine_reference: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.
