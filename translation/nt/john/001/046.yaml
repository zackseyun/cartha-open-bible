id: JHN.1.46
reference: John 1:46
source:
  edition: SBLGNT
  text: καὶ εἶπεν αὐτῷ Ναθαναήλ· Ἐκ Ναζαρὲτ δύναταί τι ἀγαθὸν εἶναι; λέγει αὐτῷ ⸀ὁ Φίλιππος· Ἔρχου καὶ ἴδε.
translation:
  text: And Nathanael said to him[a], “Can anything good come from Nazareth?” Philip said to him, “Come and see.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “Can anything good be from Nazareth?”
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  chosen: And
  alternatives:
  - Then
  lexicon: BDAG
  rationale: Standard connective linking the narrative to the previous verse. 'And' preserves the simple paratactic flow of John's narrative better than a more interpretive 'Then.'
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Aorist of λέγω is naturally rendered 'said' in English narrative. 'Spoke' is possible but less idiomatic here.
- source_word: αὐτῷ
  chosen: to him
  alternatives:
  - him
  lexicon: BDAG
  rationale: The dative pronoun marks the indirect object. 'To him' is the clearest natural English rendering.
- source_word: Ναθαναήλ
  chosen: Nathanael
  rationale: Personal name transliterated according to standard English convention, following the translation philosophy to transliterate names rather than translate them.
- source_word: Ἐκ Ναζαρὲτ
  chosen: from Nazareth
  alternatives:
  - out of Nazareth
  lexicon: BDAG
  rationale: ἐκ denotes source/origin. 'From Nazareth' is idiomatic modern English; 'out of Nazareth' is more literal but less natural here.
- source_word: δύναταί
  chosen: Can
  alternatives:
  - Is it possible that
  lexicon: BDAG
  rationale: The verb δύναμαι expresses possibility/ability. In this rhetorical question, English idiom strongly favors 'Can'.
- source_word: τι ἀγαθὸν
  chosen: anything good
  alternatives:
  - any good thing
  lexicon: BDAG
  rationale: The indefinite pronoun with neuter adjective is best rendered idiomatically as 'anything good.' 'Any good thing' is more formal but less natural in contemporary English.
- source_word: εἶναι
  chosen: come
  alternatives:
  - be
  - exist
  lexicon: BDAG
  rationale: Although the infinitive is literally 'to be,' in English the idiomatic expression with a place of origin is 'come from.' This preserves the sense of origin/source conveyed by ἐκ + place while producing natural English.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Greek often uses the historical present in narrative. English commonly smooths this to the past tense for readability. 'Says' would be more formally close but less natural in this context.
- source_word: ὁ Φίλιππος
  chosen: Philip
  rationale: Personal name transliterated by standard English convention. The article is not represented in English because it is not idiomatic before a personal name here.
- source_word: Ἔρχου
  chosen: Come
  alternatives:
  - Come here
  lexicon: BDAG
  rationale: Present middle imperative of ἔρχομαι functions as a straightforward invitation. 'Come' is sufficient; 'Come here' adds specificity not explicit in the Greek.
- source_word: καὶ ἴδε
  chosen: and see
  alternatives:
  - and look
  lexicon: BDAG
  rationale: A common Johannine invitation formula. 'See' preserves both the literal sense and the Gospel's thematic resonance of perceiving/recognizing. 'Look' is possible but weaker in this literary context.
