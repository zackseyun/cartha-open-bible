theological_decisions:
- issue: Referent and nuance of the double use of ἴδιος
  chosen_reading: The first phrase refers to what belonged to him ('his own' realm/home), while the second refers to his own people.
  alternative_readings:
  - Both phrases refer simply to 'his own people'
  - The first phrase specifically means 'his own home/household'
  rationale: The Greek shifts from neuter plural (τὰ ἴδια) to masculine plural (οἱ ἴδιοι), suggesting a deliberate distinction between place/domain and persons. The translation preserves that tension without narrowing it to one overly specific interpretation.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
