id: JHN.1.11
reference: John 1:11
source:
  edition: SBLGNT
  text: εἰς τὰ ἴδια ἦλθεν, καὶ οἱ ἴδιοι αὐτὸν οὐ παρέλαβον.
translation:
  text: He came to his own[b][a], and his own people did not receive him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'He came to what was his own'; the Greek first phrase is neuter plural, distinct from the following masculine plural 'his own people.'
    reason: alternative_reading
  - marker: b
    text: Or 'did not accept him' or 'did not welcome him.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τὰ ἴδια
  chosen: to his own
  alternatives:
  - to his own things
  - to what was his own
  - to his own home/domain
  lexicon: BDAG
  rationale: The neuter plural ἴδια likely refers to what belonged to him—his own realm, home, or possessions—rather than directly to persons. English 'to his own' preserves the compactness and the contrast with the following masculine plural while remaining natural.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - went
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is straightforwardly rendered 'came.' This keeps the narrative movement simple and idiomatic.
- source_word: οἱ ἴδιοι
  chosen: his own people
  alternatives:
  - his own
  - his own ones
  lexicon: BDAG
  rationale: The masculine plural points to people, not things. 'His own people' makes explicit in English what the Greek gender/number signals, and preserves the deliberate contrast with the preceding neuter τὰ ἴδια.
- source_word: παρέλαβον
  chosen: did not receive
  alternatives:
  - did not accept
  - did not welcome
  lexicon: BDAG
  rationale: παραλαμβάνω here carries the sense of receiving or accepting a person. 'Receive' is broad enough to include both welcome and acceptance, and it matches established Johannine usage nearby without overinterpreting.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: The pronoun refers back to the Word/light in the context and is naturally rendered 'him.'
