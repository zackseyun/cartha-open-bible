id: JHN.1.24
reference: John 1:24
source:
  edition: SBLGNT
  text: ⸀Καὶ ἀπεσταλμένοι ἦσαν ἐκ τῶν Φαρισαίων.
translation:
  text: And they had been sent from the Pharisees.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or "they were sent by the Pharisees." The Greek more literally indicates
      that they were from the Pharisees.
    reason: alternative_reading
lexical_decisions:
- source_word: Καὶ
  chosen: And
  alternatives:
  - Now
  - Then
  lexicon: BDAG
  rationale: Standard connective; retained as simple coordination to preserve the
    narrative flow without adding interpretive nuance.
- source_word: ἀπεσταλμένοι ἦσαν
  chosen: they had been sent
  alternatives:
  - they were sent
  - they were emissaries
  lexicon: BDAG
  rationale: The periphrastic construction with the perfect participle of ἀποστέλλω
    plus ἦσαν naturally conveys a completed sending with present relevance. 'Had been
    sent' best reflects the resultant state in idiomatic English better than the flatter
    'were sent.' 'Were emissaries' overinterprets the verbal idea as a noun.
- source_word: ἐκ
  chosen: from
  alternatives:
  - by
  - out of
  lexicon: BDAG
  rationale: ἐκ most basically denotes source or origin. 'From' preserves the likely
    sense that these delegates originated from the Pharisees. 'By' would suggest direct
    agency more strongly than the preposition itself warrants.
- source_word: τῶν Φαρισαίων
  chosen: the Pharisees
  lexicon: BDAG
  rationale: Standard rendering of the group name Φαρισαῖοι. The article is naturally
    carried over in English as part of the recognized designation.
