theological_decisions:
- issue: Relationship of the delegation to the Pharisees
  chosen_reading: The men in view were sent from the Pharisees, indicating source/origin
    of the delegation.
  alternative_readings:
  - The men were sent by the Pharisees, emphasizing agency.
  rationale: The Greek uses ἐκ with the genitive, which more directly marks origin/source
    than explicit agency. The translation therefore avoids overstating the Pharisees'
    role while still allowing the context to imply sponsorship.
