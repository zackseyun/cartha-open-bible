id: JHN.1.44
reference: John 1:44
source:
  edition: SBLGNT
  text: ἦν δὲ ὁ Φίλιππος ἀπὸ Βηθσαϊδά, ἐκ τῆς πόλεως Ἀνδρέου καὶ Πέτρου.
translation:
  text: Now Philip was from Bethsaida, from the town of Andrew and Peter.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the city of Andrew and Peter,' that is, their hometown.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν
  chosen: was
  alternatives:
  - came from
  lexicon: BDAG
  rationale: Imperfect of εἰμί here functions as a simple past-state verb, identifying
    Philip's origin/background. 'Was' is the most direct and natural English rendering.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' preserves the narrative transition without
    implying strong contrast. English may omit it, but retaining it reflects the discourse
    flow.
- source_word: Φίλιππος
  chosen: Philip
  rationale: Personal name transliterated by standard English convention, in keeping
    with the translation philosophy to transliterate names.
- source_word: ἀπὸ Βηθσαϊδά
  chosen: from Bethsaida
  alternatives:
  - out of Bethsaida
  lexicon: BDAG
  rationale: ἀπό marks source/origin. 'From Bethsaida' is idiomatic and accurate.
    Bethsaida is transliterated as a place name.
- source_word: ἐκ τῆς πόλεως
  chosen: from the town
  alternatives:
  - from the city
  lexicon: BDAG
  rationale: πόλις can mean 'city' or 'town.' Since Bethsaida was likely a smaller
    locality in common English perception, 'town' is more natural modern English while
    still accurate. The repeated preposition is preserved with a second 'from' to
    reflect the Greek structure.
- source_word: Ἀνδρέου καὶ Πέτρου
  chosen: of Andrew and Peter
  alternatives:
  - belonging to Andrew and Peter
  - where Andrew and Peter were from
  lexicon: BDAG
  rationale: 'The genitives depend on πόλεως and indicate association/origin: the
    town associated with Andrew and Peter, i.e., their hometown. ''Of Andrew and Peter''
    is concise and formally close, while the broader sense is clear in context.'
