id: JHN.1.28
reference: John 1:28
source:
  edition: SBLGNT
  text: ταῦτα ἐν Βηθανίᾳ ἐγένετο πέραν τοῦ Ἰορδάνου, ὅπου ἦν ⸀ὁ Ἰωάννης βαπτίζων.
translation:
  text: These things took place in Bethany beyond the Jordan[a], where John was baptizing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some manuscripts and later translation traditions read 'Bethabara' instead of 'Bethany.'
    reason: textual_variant
lexical_decisions:
- source_word: ταῦτα
  chosen: These things
  alternatives:
  - This
  lexicon: BDAG
  rationale: Plural demonstrative referring back to the preceding exchange/events. 'These things' preserves the Greek number and Johannine narrative style better than the smoother singular 'this.'
- source_word: ἐν Βηθανίᾳ
  chosen: in Bethany
  alternatives:
  - at Bethany
  lexicon: BDAG
  rationale: Standard locative use of ἐν with a place name. 'In Bethany' is the most natural and direct rendering.
- source_word: ἐγένετο
  chosen: took place
  alternatives:
  - happened
  - came to pass
  lexicon: BDAG
  rationale: γίνομαι here denotes occurrence of events. 'Took place' is idiomatic modern English and fits narrative reporting without archaic tone.
- source_word: πέραν τοῦ Ἰορδάνου
  chosen: beyond the Jordan
  alternatives:
  - across the Jordan
  - on the other side of the Jordan
  lexicon: BDAG
  rationale: πέραν with the genitive indicates location on the far side relative to the speaker/narrative perspective. 'Beyond the Jordan' is concise and traditional while remaining clear.
- source_word: ὅπου
  chosen: where
  alternatives:
  - the place where
  lexicon: BDAG
  rationale: Simple relative adverb introducing the location clause. 'Where' is sufficient and natural.
- source_word: βαπτίζων
  chosen: was baptizing
  alternatives:
  - was immersing
  lexicon: BDAG
  rationale: Present participle with ἦν forms a periphrastic imperfect, indicating ongoing activity. 'Was baptizing' preserves the verbal aspect and uses the established English rendering for βαπτίζω in this context.
