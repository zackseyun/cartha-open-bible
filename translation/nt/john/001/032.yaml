theological_decisions:
- issue: Identification of τὸ πνεῦμα
  chosen_reading: the Spirit refers to the Holy Spirit
  alternative_readings:
  - the spirit (lowercase, indefinite)
  rationale: The immediate context of John 1:32–33 concerns the divine sign at Jesus'
    baptism and the one who baptizes in the Holy Spirit. Rendering with capital 'Spirit'
    reflects the contextual referent without importing extra doctrinal content beyond
    the passage.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Force of ὡς περιστερὰν
  chosen_reading: 'comparative: the Spirit descended like a dove'
  alternative_readings:
  - the Spirit descended as a dove
  rationale: The Greek ὡς naturally marks likeness/comparison. This preserves the
    text's imagery without overdefining the mode of manifestation.
  doctrine_reference: Translation philosophy §3
