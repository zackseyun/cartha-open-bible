id: JHN.1.32
reference: John 1:32
source:
  edition: SBLGNT
  text: καὶ ἐμαρτύρησεν Ἰωάννης λέγων ὅτι Τεθέαμαι τὸ πνεῦμα καταβαῖνον ⸀ὡς περιστερὰν
    ἐξ οὐρανοῦ, καὶ ἔμεινεν ἐπ’ αὐτόν·
translation:
  text: And John testified, saying, “I have seen the Spirit descending like a dove
    out of heaven, and it remained on him.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “as a dove.” The Greek can be rendered either way, though the wording
      most naturally expresses likeness.
    reason: lexical_alternative
  - marker: b
    text: Or “from heaven.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμαρτύρησεν
  chosen: testified
  alternatives:
  - bore witness
  - gave testimony
  lexicon: BDAG
  rationale: The aorist of μαρτυρέω denotes giving witness/testimony. 'Testified'
    is clear modern English and preserves the juridical/witness nuance without sounding
    overly wooden.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: The present participle introduces the content of John's testimony. 'Saying'
    closely reflects the Greek structure and reads naturally in English.
- source_word: Τεθέαμαι
  chosen: I have seen
  alternatives:
  - I beheld
  - I have beheld
  lexicon: BDAG
  rationale: The perfect middle indicative of θεάομαι conveys a witnessed sight with
    present relevance. 'I have seen' is idiomatic modern English and preserves the
    force better than the archaic 'I beheld.'
- source_word: τὸ πνεῦμα
  chosen: the Spirit
  alternatives:
  - the spirit
  lexicon: BDAG
  rationale: In Johannine baptism context this refers to the Holy Spirit, not an impersonal
    spirit. Capitalization in English signals the personal divine referent while remaining
    a translation convention rather than an added word.
- source_word: καταβαῖνον
  chosen: descending
  alternatives:
  - coming down
  lexicon: BDAG
  rationale: The participle modifies 'the Spirit' and denotes downward movement. 'Descending'
    is slightly more formal and fits the solemn narrative tone.
- source_word: ὡς περιστερὰν
  chosen: like a dove
  alternatives:
  - as a dove
  lexicon: BDAG
  rationale: ὡς here marks comparison. 'Like a dove' makes clear that the text describes
    the manner/appearance of descent, not necessarily an ontological identification
    of the Spirit as a literal dove.
- source_word: ἐξ οὐρανοῦ
  chosen: out of heaven
  alternatives:
  - from heaven
  lexicon: BDAG
  rationale: ἐκ/ἐξ denotes movement out from a source. 'Out of heaven' is a slightly
    more literal rendering that preserves the spatial imagery; 'from heaven' is possible
    but less vivid.
- source_word: ἔμεινεν
  chosen: remained
  alternatives:
  - stayed
  - abode
  lexicon: BDAG
  rationale: μένω is a significant Johannine verb often rendered 'remain' to preserve
    thematic consistency across the Gospel. 'Abode' is archaic; 'stayed' is less thematically
    resonant.
- source_word: ἐπ’ αὐτόν
  chosen: on him
  alternatives:
  - upon him
  lexicon: BDAG
  rationale: ἐπί with the accusative here indicates movement/rest upon the person.
    'On him' is natural modern English; 'upon him' is possible but slightly more elevated
    without adding meaning.
