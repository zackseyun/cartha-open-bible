id: JHN.1.31
reference: John 1:31
source:
  edition: SBLGNT
  text: κἀγὼ οὐκ ᾔδειν αὐτόν, ἀλλ’ ἵνα φανερωθῇ τῷ Ἰσραὴλ διὰ τοῦτο ἦλθον ἐγὼ ⸀ἐν
    ὕδατι βαπτίζων.
translation:
  text: 'And I did not know him, but for this reason I came baptizing in water: that
    he might be revealed to Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I did not recognize him.' The Greek can refer either to lack of acquaintance
      or lack of recognition; the main text preserves the broader wording.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ
  chosen: And I
  alternatives:
  - I also
  - And I also
  lexicon: BDAG
  rationale: κἀγώ is a crasis of καί + ἐγώ, adding emphasis/continuity with the preceding
    testimony. 'And I' preserves the discourse flow and mild emphasis without overtranslating
    the additive force.
- source_word: οὐκ ᾔδειν
  chosen: did not know
  alternatives:
  - had not known
  - did not recognize
  lexicon: BDAG
  rationale: οἶδα in the imperfect commonly conveys a past state of knowing. 'Did
    not know' is the most direct rendering. 'Did not recognize' is interpretive and
    possible in context, but the Greek more plainly states lack of knowledge/acquaintance.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Simple accusative pronoun referring to Jesus; 'him' is straightforward
    and contextually clear.
- source_word: ἀλλ’
  chosen: but
  alternatives:
  - rather
  - except that
  lexicon: BDAG
  rationale: Marks contrast between John's prior lack of knowledge and the purpose
    of his baptizing ministry. 'But' is the natural English equivalent.
- source_word: ἵνα φανερωθῇ
  chosen: so that he might be revealed
  alternatives:
  - in order that he might be made known
  - so that he might be manifested
  lexicon: BDAG
  rationale: ἵνα introduces purpose; φανερόω in the passive means to be revealed/made
    known. 'Revealed' is clear modern English and preserves the passive sense without
    importing extra theological nuance.
- source_word: τῷ Ἰσραήλ
  chosen: to Israel
  alternatives:
  - among Israel
  - to the people of Israel
  lexicon: BDAG
  rationale: Dative with passive φανερωθῇ is naturally rendered 'to Israel.' This
    preserves the corporate covenantal referent without unnecessary expansion.
- source_word: διὰ τοῦτο
  chosen: for this reason
  alternatives:
  - because of this
  - therefore
  lexicon: BDAG
  rationale: This phrase points forward to the stated purpose. 'For this reason' best
    captures the explanatory force in idiomatic English.
- source_word: ἦλθον ἐγὼ
  chosen: I came
  alternatives:
  - I have come
  - I arrived
  lexicon: BDAG
  rationale: Aorist ἦλθον is best rendered as a simple past here. The explicit ἐγώ
    adds emphasis, but English can carry that sufficiently with normal word order
    in context.
- source_word: ἐν ὕδατι
  chosen: in water
  alternatives:
  - with water
  lexicon: BDAG
  rationale: ἐν with the dative here is most literally 'in water.' While 'with water'
    is idiomatic in English for means/instrument, 'in water' preserves the Greek wording
    and Johannine style, and remains natural enough.
- source_word: βαπτίζων
  chosen: baptizing
  alternatives:
  - immersing
  lexicon: BDAG
  rationale: 'The participle is contemporaneous with ἦλθον: ''I came baptizing.''
    ''Baptizing'' preserves the established religious action without narrowing the
    mode beyond the text.'
