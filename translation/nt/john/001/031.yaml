theological_decisions:
- issue: Meaning of John's statement that he did not know Jesus
  chosen_reading: Render as a straightforward statement of prior non-knowledge without
    specifying whether this means lack of personal acquaintance or lack of messianic
    recognition.
  alternative_readings:
  - I did not recognize him
  - I had not known him as the Messiah
  rationale: The verse itself does not explicitly define the nature of John's prior
    non-knowledge. To preserve theological tension and avoid importing a harmonization,
    the translation keeps the broader 'did not know him.'
  doctrine_reference: Preserve theological tension rather than resolve it.
