id: JHN.1.45
reference: John 1:45
source:
  edition: SBLGNT
  text: εὑρίσκει Φίλιππος τὸν Ναθαναὴλ καὶ λέγει αὐτῷ· Ὃν ἔγραψεν Μωϋσῆς ἐν τῷ νόμῳ καὶ οἱ προφῆται εὑρήκαμεν, ⸀Ἰησοῦν υἱὸν τοῦ Ἰωσὴφ τὸν ἀπὸ Ναζαρέτ.
translation:
  text: 'Philip found Nathanael and said to him[a], “We have found him of whom Moses in the Law and also the prophets wrote: Jesus son of Joseph[b], from Nazareth.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “the one of whom Moses wrote in the Law, and the prophets also.”
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has “Jesus of Nazareth”; the Greek more literally says “Jesus ... from Nazareth.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εὑρίσκει
  chosen: found
  alternatives:
  - finds
  lexicon: BDAG
  rationale: Although the Greek uses the historical present ('finds'), English narrative style more naturally renders it as a simple past here, especially since λέγει is likewise best rendered in past sequence. This preserves the event flow without woodenly reproducing Greek aspect.
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Another historical present. Rendering as past in English gives natural narrative progression and matches the surrounding context.
- source_word: Ὃν
  chosen: the one ... wrote about
  alternatives:
  - him whom ... wrote
  - the one ... wrote of
  lexicon: BDAG
  rationale: The relative pronoun refers to a person identified by scriptural witness. 'The one ... wrote about' is idiomatic English and preserves the personal reference.
- source_word: ἔγραψεν
  chosen: wrote about
  alternatives:
  - wrote
  - wrote of
  lexicon: BDAG
  rationale: Although γράφω is literally 'write,' English requires an object-completing preposition in this construction. 'Wrote about' makes explicit the sense already implied by the Greek relative-object construction.
- source_word: ἐν τῷ νόμῳ
  chosen: in the Law
  alternatives:
  - in the law
  - in the Torah
  lexicon: BDAG
  rationale: Capitalized 'Law' signals the recognized scriptural corpus associated with Moses rather than law in a generic sense. 'Torah' is possible, but 'Law' is more immediately accessible in English while preserving the Jewish-scriptural reference.
- source_word: οἱ προφῆται
  chosen: the prophets
  lexicon: BDAG
  rationale: Standard rendering for the prophetic writings/persons as scriptural witnesses; here it functions as shorthand for the prophetic Scriptures.
- source_word: εὑρήκαμεν
  chosen: we have found
  alternatives:
  - we found
  lexicon: BDAG
  rationale: 'The Greek perfect naturally conveys a present-result sense: Philip announces a discovery now in hand. English present perfect preserves that force well.'
- source_word: υἱὸν τοῦ Ἰωσὴφ
  chosen: son of Joseph
  alternatives:
  - the son of Joseph
  lexicon: BDAG
  rationale: Anarthrous appositional identification in Greek is naturally rendered without forcing an English article. This reflects ordinary human identification, not a denial or affirmation of deeper christological claims beyond the verse itself.
- source_word: τὸν ἀπὸ Ναζαρέτ
  chosen: from Nazareth
  alternatives:
  - the one from Nazareth
  - of Nazareth
  lexicon: BDAG
  rationale: ἀπό most directly means 'from.' 'Of Nazareth' is traditional in English, but 'from Nazareth' more transparently reflects the Greek preposition and likely sense of origin/association.
- source_word: Ναθαναήλ
  chosen: Nathanael
  lexicon: BDAG
  rationale: Personal names are transliterated by standard English convention per project philosophy.
- source_word: Ἰησοῦν
  chosen: Jesus
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
- source_word: Μωϋσῆς
  chosen: Moses
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
- source_word: Ἰωσὴφ
  chosen: Joseph
  lexicon: BDAG
  rationale: Personal name transliterated by standard convention.
