theological_decisions:
- issue: Reference of 'son of Joseph' in relation to Christology
  chosen_reading: Retained the narrative identification 'Jesus son of Joseph' as spoken by Philip, without modifying it to harmonize with later doctrinal understanding.
  alternative_readings:
  - Jesus, the one thought to be the son of Joseph
  - Jesus, son of Joseph (legal/social designation)
  rationale: The verse reports Philip's initial identification of Jesus in ordinary social terms. Historic orthodoxy regarding the virgin conception must not be imported into the translation in a way that alters the wording of the text. The translation preserves the statement as given while allowing readers to understand it as the speaker's perspective.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Scope of 'Moses in the Law and the prophets'
  chosen_reading: 'Rendered as scriptural testimony to a person: ''the one Moses wrote about in the Law, and also the prophets.'''
  alternative_readings:
  - the one of whom Moses in the Law and the prophets wrote
  rationale: This keeps the canonical witness language without over-specifying messianic interpretation beyond what Philip explicitly claims. It also preserves the twofold scriptural reference in clear English.
  doctrine_reference: Translation philosophy items 1 and 6
