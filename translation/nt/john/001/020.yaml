id: JHN.1.20
reference: John 1:20
source:
  edition: SBLGNT
  text: καὶ ὡμολόγησεν καὶ οὐκ ἠρνήσατο, καὶ ὡμολόγησεν ὅτι ⸂Ἐγὼ οὐκ εἰμὶ⸃ ὁ χριστός.
translation:
  text: And he confessed and did not deny[a], but confessed, “I am not the Messiah.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “the Christ.” The Greek title is Χριστός (Christos). Here it functions as a messianic title, so the main text renders it “the Messiah.”
    reason: alternative_reading
lexical_decisions:
- source_word: ὡμολόγησεν
  chosen: confessed
  alternatives:
  - acknowledged
  - declared openly
  lexicon: BDAG
  rationale: ὁμολογέω here carries the sense of open, public acknowledgment. 'Confessed' preserves the repetition in Greek and the solemn, formal force better than the flatter 'acknowledged.'
- source_word: οὐκ ἠρνήσατο
  chosen: did not deny
  alternatives:
  - did not refuse
  - did not disown
  lexicon: BDAG
  rationale: 'ἀρνέομαι commonly means ''deny'' in Johannine usage. Rendering it directly preserves the emphatic sequence: he confessed and did not deny.'
- source_word: καὶ ... καὶ ... καὶ
  chosen: And ... and ... but ...
  alternatives:
  - and ... and ... and ...
  lexicon: BDAG
  rationale: The Greek uses repeated καί for emphasis. In English, rendering the third conjunction as 'but' best communicates the climactic restatement without losing the rhetorical buildup. This is a stylistic adjustment within optimal equivalence.
- source_word: Ἐγὼ οὐκ εἰμὶ
  chosen: I am not
  alternatives:
  - I myself am not
  lexicon: BDAG
  rationale: The explicit pronoun Ἐγώ adds emphasis, but standard English can convey this adequately without an awkward 'I myself.' The denial remains direct and emphatic in context.
- source_word: ὁ χριστός
  chosen: the Messiah
  alternatives:
  - the Christ
  lexicon: BDAG
  rationale: 'Per doctrine guidelines, Χριστός as a title is translated ''Messiah'' rather than transliterated ''Christ,'' preserving the Jewish messianic context of the passage. The article supports a titular sense: ''the Messiah.'''
