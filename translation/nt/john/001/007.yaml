theological_decisions:
- issue: Referent of 'him' in δι’ αὐτοῦ
  chosen_reading: '''him'' refers to John the witness, not to the Light/Messiah'
  alternative_readings:
  - '''him'' refers to the Light'
  rationale: The nearest and most natural antecedent in the discourse is John, the
    subject of the verse. This yields the sense that all might believe through John's
    testimony. This also fits the immediate context, where John is explicitly distinguished
    from the Light in the following verse.
  doctrine_reference: Preserve theological tension rather than resolve it only where
    the source is genuinely ambiguous; here the contextual antecedent favors John.
