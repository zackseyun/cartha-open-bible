id: JHN.1.7
reference: John 1:7
source:
  edition: SBLGNT
  text: οὗτος ἦλθεν εἰς μαρτυρίαν, ἵνα μαρτυρήσῃ περὶ τοῦ φωτός, ἵνα πάντες πιστεύσωσιν
    δι’ αὐτοῦ.
translation:
  text: This one came as a witness, so that he might testify about the Light, so that
    all might believe through him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'bear witness about the Light.'
    reason: lexical_alternative
  - marker: b
    text: That is, through John's testimony; some take 'through him' to refer to the
      Light instead.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτος
  chosen: This one
  alternatives:
  - He
  - This man
  lexicon: BDAG
  rationale: The demonstrative points back emphatically to John introduced in the
    previous verse. 'This one' preserves the anaphoric force more transparently than
    a simple pronoun, while remaining natural enough in English.
- source_word: ἦλθεν
  chosen: came
  alternatives:
  - arrived
  lexicon: BDAG
  rationale: Aorist of ἔρχομαι is straightforwardly rendered 'came.' This is idiomatic
    and preserves the narrative movement without over-interpretation.
- source_word: εἰς μαρτυρίαν
  chosen: as a witness
  alternatives:
  - for testimony
  - for witness
  lexicon: BDAG
  rationale: 'The prepositional phrase expresses purpose/result in context: John came
    in the role of witness. ''As a witness'' is more natural modern English than ''for
    testimony'' while preserving the forensic/testimonial sense of μαρτυρία.'
- source_word: ἵνα μαρτυρήσῃ
  chosen: so that he might testify
  alternatives:
  - that he might bear witness
  - in order that he might testify
  lexicon: BDAG
  rationale: The ἵνα clause marks purpose. 'Testify' communicates the verbal witness
    sense clearly in contemporary English. 'Bear witness' is possible and traditional,
    but 'testify' better matches readable modern English while retaining legal/testimonial
    force.
- source_word: περὶ τοῦ φωτός
  chosen: about the Light
  alternatives:
  - concerning the Light
  lexicon: BDAG
  rationale: περί with genitive is naturally 'about/concerning.' 'The Light' capitalizes
    φῶς here because in Johannine context it functions as a title-like reference to
    the true Light, not merely physical light.
- source_word: ἵνα πάντες πιστεύσωσιν
  chosen: so that all might believe
  alternatives:
  - so that everyone might believe
  - so that all may believe
  lexicon: BDAG
  rationale: A second purpose clause is best preserved with 'so that.' πάντες is broad
    and unqualified; 'all' is concise and faithful. The subjunctive is well represented
    by 'might believe' in this purpose construction.
- source_word: πιστεύσωσιν
  chosen: believe
  alternatives:
  - have faith
  - trust
  lexicon: BDAG
  rationale: Per doctrine defaults, πίστις-family terms are normally rendered with
    'faith/believe' unless context strongly favors another nuance. Here 'believe'
    is the standard and most natural rendering.
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by means of him
  lexicon: BDAG
  rationale: διά with genitive indicates means or agency. 'Through him' is the most
    natural rendering and preserves the sense that John is the mediating witness through
    whom people come to believe, not the object of belief.
