theological_decisions:
- issue: Christological title in John 1:34
  chosen_reading: the Chosen One of God
  alternative_readings:
  - the Son of God
  rationale: The provided SBLGNT text reads ὁ ἐκλεκτὸς τοῦ θεοῦ, which should be translated
    directly rather than conformed to the more familiar variant 'the Son of God.'
    This preserves the source-text primacy and avoids importing a different textual
    tradition into the main text. Because 'Son of God' is a significant and well-known
    textual variant with theological relevance, it should be preserved in a footnote.
  doctrine_reference: Translation philosophy §1 (Original-language primacy), §3 (Preserve
    theological tension rather than resolve it)
