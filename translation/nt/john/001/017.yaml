id: JHN.1.17
reference: John 1:17
source:
  edition: SBLGNT
  text: ὅτι ὁ νόμος διὰ Μωϋσέως ἐδόθη, ἡ χάρις καὶ ἡ ἀλήθεια διὰ Ἰησοῦ Χριστοῦ ἐγένετο.
translation:
  text: For the law was given through Moses[a]; grace and truth came through Jesus Messiah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, traditionally, 'through Jesus Christ.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  chosen: For
  alternatives:
  - because
  lexicon: BDAG
  rationale: In context, ὅτι introduces an explanatory ground for the preceding statement (John 1:16), so 'For' reads naturally in English while preserving the causal/explanatory force.
- source_word: ὁ νόμος
  chosen: the law
  alternatives:
  - the Law
  lexicon: BDAG
  rationale: νόμος here refers to the Mosaic law as a known covenantal body of instruction. 'the law' is clear and idiomatic; capitalization as 'the Law' is possible, but lowercase avoids importing a later stylistic convention while retaining the referent through context and the mention of Moses.
- source_word: διὰ Μωϋσέως
  chosen: through Moses
  alternatives:
  - by Moses
  - by means of Moses
  lexicon: BDAG
  rationale: διά with the genitive commonly marks agency or instrumentality. 'through Moses' preserves the mediatorial sense and matches the parallel phrase with Jesus Messiah.
- source_word: ἐδόθη
  chosen: was given
  alternatives:
  - was granted
  lexicon: BDAG
  rationale: Aorist passive of δίδωμι is straightforwardly rendered 'was given.' This preserves the passive form and the sense of divine gift/issuance without overinterpreting.
- source_word: ἡ χάρις
  chosen: grace
  alternatives:
  - favor
  lexicon: BDAG
  rationale: χάρις in Johannine context carries the rich sense of divine grace rather than mere favor. 'grace' is the established and most semantically adequate rendering here.
- source_word: ἡ ἀλήθεια
  chosen: truth
  alternatives:
  - reality
  - faithfulness
  lexicon: BDAG
  rationale: ἀλήθεια in John regularly denotes truth/reality as revealed in and through Jesus. 'truth' best preserves Johannine usage and the echo of 1:14.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  chosen: through Jesus Messiah
  alternatives:
  - through Jesus Christ
  lexicon: BDAG
  rationale: διά with the genitive again indicates mediation. Per doctrine, Χριστός is translated as 'Messiah' where functioning as a title rather than retained as the name-like 'Christ.' In this context the title sense remains intelligible and preserves the Hebraic messianic meaning.
- source_word: ἐγένετο
  chosen: came
  alternatives:
  - came to be
  - happened
  - became
  lexicon: BDAG
  rationale: γίνομαι here contrasts with ἐδόθη. 'came' is concise, idiomatic, and preserves the sense that grace and truth arrived or came into historical realization through Jesus Messiah. 'came to be' is more literal but less natural; 'became' would be misleading in English.
