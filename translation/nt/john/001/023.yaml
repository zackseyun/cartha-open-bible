theological_decisions:
- issue: Rendering of κύριος in the Isaiah citation
  chosen_reading: the Lord
  alternative_readings:
  - the master
  rationale: The project's default rendering for κύριος is 'Lord.' In a quotation
    of Isaiah, this also preserves the covenantal resonance of the prophetic source
    and avoids weakening the theological force of the text.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Relation of 'in the wilderness' to the participle
  chosen_reading: a voice of one crying out in the wilderness
  alternative_readings:
  - a voice in the wilderness, of one crying out
  rationale: The Greek wording here naturally yields the familiar construction in
    which the one is crying out in the wilderness. This aligns with the Gospel's presentation
    of John ministering in the wilderness and with common understanding of the Isaiah
    citation, while preserving the source syntax as much as possible.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
