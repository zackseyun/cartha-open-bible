id: JHN.1.23
reference: John 1:23
source:
  edition: SBLGNT
  text: ἔφη· Ἐγὼ φωνὴ βοῶντος ἐν τῇ ἐρήμῳ· Εὐθύνατε τὴν ὁδὸν κυρίου, καθὼς εἶπεν Ἠσαΐας
    ὁ προφήτης.
translation:
  text: He said, “I am a voice of one crying out in the wilderness, ‘Make straight
    the way of the Lord,’ just as Isaiah the prophet said.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, less likely in English punctuation, “I am a voice in the wilderness
      of one crying out.” The Greek phrase can be construed differently, but the main
      text reflects the most natural reading here.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔφη
  chosen: He said
  alternatives:
  - He declared
  lexicon: BDAG
  rationale: A standard narrative speech introducer. 'He said' is the most natural
    modern English rendering and fits the immediate dialogue context.
- source_word: Ἐγὼ
  chosen: I
  alternatives:
  - I myself
  lexicon: BDAG
  rationale: The explicit pronoun is emphatic in Greek, but normal English can convey
    the sense without adding awkward stress. The self-identification remains clear
    in context.
- source_word: φωνὴ
  chosen: a voice
  alternatives:
  - the voice
  - voice
  lexicon: BDAG
  rationale: 'Anarthrous nominative favors an indefinite sense in English here: John
    identifies himself as ''a voice,'' echoing Isaiah. This preserves the metaphor
    without over-specifying.'
- source_word: βοῶντος
  chosen: of one crying out
  alternatives:
  - crying out
  - of one calling
  lexicon: BDAG
  rationale: The genitive participle is most naturally linked to 'voice' as 'a voice
    of one crying out.' 'Crying out' preserves the vividness and prophetic force better
    than the flatter 'calling.'
- source_word: ἐν τῇ ἐρήμῳ
  chosen: in the wilderness
  alternatives:
  - in the desert
  lexicon: BDAG
  rationale: '''Wilderness'' is the established and contextually appropriate rendering
    for ἔρημος in this prophetic citation, preserving both geographic and theological
    resonance.'
- source_word: Εὐθύνατε
  chosen: Make straight
  alternatives:
  - Straighten
  - Prepare straight
  lexicon: BDAG
  rationale: The aorist imperative calls for direct action. 'Make straight' is both
    idiomatic and close to the Greek, preserving the Isaianic imagery of preparing
    a direct path.
- source_word: τὴν ὁδὸν
  chosen: the way
  alternatives:
  - the road
  - the path
  lexicon: BDAG
  rationale: '''Way'' best preserves the literal image and its metaphorical force
    in biblical usage. ''Road'' is too concrete; ''path'' is possible but less traditional
    in this citation.'
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - the master
  lexicon: BDAG
  rationale: Per doctrine, κύριος is rendered 'Lord.' In this Isaianic citation it
    carries covenantal and theological weight, and in Johannine context it participates
    in the identification of Jesus within the Lord's saving work.
- source_word: καθὼς
  chosen: just as
  alternatives:
  - as
  lexicon: BDAG
  rationale: '''Just as'' clearly marks correspondence between John''s self-description
    and Isaiah''s prophetic word.'
- source_word: εἶπεν
  chosen: said
  alternatives:
  - spoke
  lexicon: BDAG
  rationale: Simple past 'said' is the most natural rendering for the citation formula.
- source_word: Ἠσαΐας ὁ προφήτης
  chosen: Isaiah the prophet
  alternatives:
  - the prophet Isaiah
  lexicon: BDAG
  rationale: Both are acceptable English; 'Isaiah the prophet' follows the Greek word
    order more closely while remaining natural.
