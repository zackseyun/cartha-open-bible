id: JHN.1.47
reference: John 1:47
source:
  edition: SBLGNT
  text: εἶδεν ⸀ὁ Ἰησοῦς τὸν Ναθαναὴλ ἐρχόμενον πρὸς αὐτὸν καὶ λέγει περὶ αὐτοῦ· Ἴδε
    ἀληθῶς Ἰσραηλίτης ἐν ᾧ δόλος οὐκ ἔστιν.
translation:
  text: Jesus saw Nathanael coming toward him and said about him, “Behold, truly an
    Israelite in whom there is no deceit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “an Israelite indeed.”
    reason: lexical_alternative
  - marker: b
    text: Or “no guile.”
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδεν
  chosen: saw
  alternatives:
  - noticed
  lexicon: BDAG
  rationale: Aorist of ὁράω is straightforwardly rendered 'saw'; 'noticed' is possible
    but less direct and less natural here.
- source_word: ἐρχόμενον πρὸς αὐτόν
  chosen: coming toward him
  alternatives:
  - coming to him
  - approaching him
  lexicon: BDAG
  rationale: The present participle with πρός conveys movement in Jesus' direction.
    'Coming toward him' preserves the participial sense and spatial nuance in natural
    English.
- source_word: λέγει περὶ αὐτοῦ
  chosen: said about him
  alternatives:
  - said concerning him
  - said of him
  lexicon: BDAG
  rationale: περί with genitive indicates speech concerning Nathanael. 'Said about
    him' is idiomatic modern English and preserves that Jesus is speaking with reference
    to Nathanael.
- source_word: Ἴδε
  chosen: Look
  alternatives:
  - Behold
  - See
  lexicon: BDAG
  rationale: An attention-getting interjection. 'Look' is readable modern English;
    'Behold' is traditional but archaic for the stated translation philosophy.
- source_word: ἀληθῶς
  chosen: truly
  alternatives:
  - indeed
  - really
  lexicon: BDAG
  rationale: ἀληθῶς intensifies the assessment. 'Truly' preserves the solemn evaluative
    force better than the more colloquial 'really.'
- source_word: Ἰσραηλίτης
  chosen: Israelite
  alternatives:
  - man of Israel
  lexicon: BDAG
  rationale: The noun denotes a member of Israel. 'Israelite' is the standard concise
    rendering and preserves the ethnic-covenantal identity.
- source_word: ἐν ᾧ
  chosen: in whom
  alternatives:
  - in which there is
  - who has
  lexicon: BDAG
  rationale: The relative construction is naturally rendered 'in whom' with a personal
    antecedent, preserving the Greek structure without awkwardness.
- source_word: δόλος
  chosen: deceit
  alternatives:
  - guile
  - treachery
  lexicon: BDAG
  rationale: δόλος denotes deceit or guile. 'Deceit' is clearer in contemporary English,
    while 'guile' is a viable traditional alternative worth preserving.
