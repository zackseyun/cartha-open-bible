theological_decisions:
- issue: Characterization of Nathanael as ἀληθῶς Ἰσραηλίτης
  chosen_reading: '''truly an Israelite'' as a commendation of genuine covenantal
    integrity, not a denial of ethnic identity to others'
  alternative_readings:
  - '''a real Israelite'''
  - '''an Israelite indeed'''
  rationale: The phrase commends Nathanael's authenticity and moral straightforwardness
    in context, especially as explained by 'in whom there is no deceit.' The translation
    avoids importing later theological claims about 'true Israel' beyond what this
    verse itself states.
  doctrine_reference: Preserve theological tension rather than resolve it; do not
    import doctrinal claims the text does not make.
