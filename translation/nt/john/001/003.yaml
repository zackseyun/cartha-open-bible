id: JHN.1.3
reference: John 1:3
source:
  edition: SBLGNT
  text: πάντα δι’ αὐτοῦ ἐγένετο, καὶ χωρὶς αὐτοῦ ἐγένετο οὐδὲ ἕν. ὃ γέγονεν
translation:
  text: All things came into being through him, and apart from him not even one thing
    came into being that has come into being.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, beginning with verse 4: ''What has come into being in him was life.'''
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  chosen: All things
  alternatives:
  - everything
  lexicon: BDAG
  rationale: Neuter plural with comprehensive force; 'All things' preserves the cosmic
    scope and matches the plural form better than the more idiomatic singular 'everything.'
- source_word: δι’ αὐτοῦ
  chosen: through him
  alternatives:
  - by him
  - by means of him
  lexicon: BDAG
  rationale: διά with the genitive commonly denotes agency or instrumentality. 'Through
    him' is the most natural English rendering here and preserves the distinction
    that all things came into being by means of the Logos.
- source_word: ἐγένετο
  chosen: came into being
  alternatives:
  - was made
  - came to be
  lexicon: BDAG
  rationale: γίνομαι here denotes coming into existence rather than simple manufacture.
    'Came into being' preserves the ontological sense and avoids flattening the verb
    into mere craftsmanship language.
- source_word: χωρὶς αὐτοῦ
  chosen: apart from him
  alternatives:
  - without him
  lexicon: BDAG
  rationale: χωρίς expresses separation or absence. 'Apart from him' is slightly more
    formal and fits the elevated style of the prologue while clearly negating any
    independent origin of creation.
- source_word: οὐδὲ ἕν
  chosen: not even one thing
  alternatives:
  - nothing
  - not one
  lexicon: BDAG
  rationale: The phrase is emphatic. 'Not even one thing' preserves the force of οὐδὲ
    plus the neuter singular ἕν and makes explicit the exhaustive negation.
- source_word: ὃ γέγονεν
  chosen: that has come into being
  alternatives:
  - what has come into being
  lexicon: BDAG
  rationale: Given the punctuation of the provided Greek text, this clause is taken
    with verse 3 rather than verse 4. The perfect γέγονεν is rendered 'has come into
    being' to reflect completed action with continuing result. 'That has come into
    being' fits the restrictive sense after 'not even one thing.'
