theological_decisions:
- issue: Relation of the final clause ὃ γέγονεν
  chosen_reading: 'Attach the clause to verse 3: ''not even one thing came into being
    that has come into being.'''
  alternative_readings:
  - Begin verse 4 with 'What has come into being in him was life.'
  rationale: The Greek manuscript tradition lacked original punctuation, so the clause
    can be construed with either verse 3 or verse 4. Attaching it to verse 3 yields
    a coherent and widely accepted sense that reinforces the totality of creation
    through the Logos without importing additional theological claims. The alternative
    is preserved in a footnote because the ambiguity is genuine and should not be
    erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather
    than resolve it; preserve alternatives in a footnote where the source is genuinely
    ambiguous.'
