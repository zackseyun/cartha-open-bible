id: JHN.1.43
reference: John 1:43
source:
  edition: SBLGNT
  text: Τῇ ἐπαύριον ἠθέλησεν ἐξελθεῖν εἰς τὴν Γαλιλαίαν. καὶ εὑρίσκει Φίλιππον καὶ λέγει αὐτῷ ὁ Ἰησοῦς· Ἀκολούθει μοι.
translation:
  text: The next day he wanted to go out into Galilee[a], and Jesus finds Philip and says to him[c][b], “Follow me.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to Galilee.' The Greek preposition can be rendered either more literally ('into') or more idiomatically ('to') in English.
    reason: lexical_alternative
  - marker: b
    text: The verbs 'finds' and 'says' are present tense in Greek, a historical present used for vivid narration.
    reason: lexical_alternative
  - marker: c
    text: The command 'Follow me' can denote both literal accompanying and the broader call to become Jesus' disciple.
    reason: alternative_reading
lexical_decisions:
- source_word: Τῇ ἐπαύριον
  chosen: The next day
  alternatives:
  - On the next day
  - The following day
  lexicon: BDAG
  rationale: This idiomatic temporal expression is best rendered in natural English as 'The next day.' It preserves the narrative sequence without awkward literalism.
- source_word: ἠθέλησεν
  chosen: he wanted
  alternatives:
  - he decided
  - he intended
  - he was willing
  lexicon: BDAG
  rationale: θέλω commonly denotes desire or intention. 'Wanted' preserves the volitional sense without overstating deliberation as 'decided.' The subject is understood from context as Jesus.
- source_word: ἐξελθεῖν
  chosen: to go out
  alternatives:
  - to leave
  - to depart
  lexicon: BDAG
  rationale: The infinitive of ἐξέρχομαι literally means 'to go out.' This is retained, though in English it functions idiomatically with the destination phrase 'into Galilee.'
- source_word: εἰς τὴν Γαλιλαίαν
  chosen: into Galilee
  alternatives:
  - to Galilee
  lexicon: BDAG
  rationale: εἰς often marks movement into a place. 'Into Galilee' reflects the preposition more closely than 'to Galilee,' while remaining natural English.
- source_word: εὑρίσκει
  chosen: finds
  alternatives:
  - found
  lexicon: BDAG
  rationale: The Greek uses the historical present, a common Johannine narrative feature. Rendering it as 'finds' preserves the vividness of the present-tense narration.
- source_word: λέγει
  chosen: says
  alternatives:
  - said
  lexicon: BDAG
  rationale: Like εὑρίσκει, this is a historical present. 'Says' keeps the narrative immediacy present in the Greek.
- source_word: Ἀκολούθει μοι
  chosen: Follow me
  alternatives:
  - Come with me
  - Be following me
  lexicon: BDAG
  rationale: The present imperative calls for ongoing discipleship, not merely accompanying Jesus momentarily. 'Follow me' is the established and accurate English rendering that naturally carries the summons to discipleship.
- source_word: Φίλιππον
  chosen: Philip
  lexicon: BDAG
  rationale: Personal names are transliterated by standard convention per translation philosophy.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: The explicit subject is retained in translation for clarity in English narrative flow.
