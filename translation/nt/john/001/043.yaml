theological_decisions:
- issue: Force of Jesus' command to Philip
  chosen_reading: 'A direct summons to discipleship: ''Follow me.'''
  alternative_readings:
  - A simple invitation to accompany Jesus physically
  rationale: While the immediate scene includes literal movement, ἀκολούθει μοι in the Gospels regularly carries discipleship significance. The translation preserves the wording without reducing it to mere travel companionship, thus maintaining the narrative and theological depth without overexpansion.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
