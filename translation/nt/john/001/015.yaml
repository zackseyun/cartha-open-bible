theological_decisions:
- issue: How explicitly to render the final clause in relation to Christ's preexistence
  chosen_reading: Render πρῶτός μου ἦν as 'he was before me' rather than the more
    explicit interpretive gloss 'he existed before me.'
  alternative_readings:
  - he existed before me
  rationale: The verse strongly implies the preexistence and superiority of the Word/Son,
    fully consistent with orthodox Christology, but the translation should not import
    explanatory wording beyond the Greek. 'He was before me' preserves the theological
    tension and lets the context establish the preexistence claim.
  doctrine_reference: Preserve theological tension rather than resolve it; Nicene
    orthodoxy affirmed without over-translation.
