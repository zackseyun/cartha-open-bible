id: JHN.1.15
reference: John 1:15
source:
  edition: SBLGNT
  text: (Ἰωάννης μαρτυρεῖ περὶ αὐτοῦ καὶ κέκραγεν λέγων· Οὗτος ἦν ⸂ὃν εἶπον⸃· Ὁ ὀπίσω
    μου ἐρχόμενος ἔμπροσθέν μου γέγονεν, ὅτι πρῶτός μου ἦν·)
translation:
  text: John testifies about him and has cried out, saying, “This was he of whom I
    said, ‘The one coming after me has become before me, because he was before me.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “has taken precedence over me” / “has surpassed me” for “has become
      before me.” The Greek can express priority or rank as well as sequence.
    reason: lexical_alternative
  - marker: b
    text: Or, “he existed before me.” The wording 'he was before me' preserves the
      Greek more closely while still allowing the implication of preexistence in context.
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρεῖ
  chosen: testifies
  alternatives:
  - bears witness
  - witnesses
  lexicon: BDAG
  rationale: Present tense conveys ongoing or vivid testimony. 'Testifies' is clear
    modern English and preserves the forensic/witness sense without archaic tone.
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: Natural English equivalent for περί + genitive here; 'concerning' is
    more formal but not necessary.
- source_word: κέκραγεν
  chosen: has cried out
  alternatives:
  - has called out
  - cried out
  lexicon: BDAG
  rationale: Perfect tense is significant in John; 'has cried out' preserves the completed-yet-enduring
    force better than a simple past.
- source_word: λέγων
  chosen: saying
  alternatives:
  - and said
  lexicon: BDAG
  rationale: Retains participial linkage in readable English.
- source_word: Οὗτος ἦν ὃν εἶπον
  chosen: This was he of whom I said
  alternatives:
  - This is he of whom I said
  - This was the one about whom I spoke
  lexicon: BDAG
  rationale: Reflects the past reference introduced by ἦν and preserves the relative
    construction. 'He of whom I said' is slightly formal but concise and faithful.
- source_word: Ὁ ὀπίσω μου ἐρχόμενος
  chosen: The one coming after me
  alternatives:
  - He who comes after me
  - The one who comes after me
  lexicon: BDAG
  rationale: Substantival participle rendered naturally. 'Coming' preserves the participial
    aspect; 'after me' reflects both temporal/sequential and ministerial sense.
- source_word: ἔμπροσθέν μου γέγονεν
  chosen: has become before me
  alternatives:
  - has come to be before me
  - has surpassed me
  - has taken precedence over me
  lexicon: BDAG
  rationale: Keeps the perfect of γίνομαι and spatial/comparative language of ἔμπροσθεν
    without over-interpreting. More interpretive renderings like 'surpassed me' capture
    sense but move beyond the Greek wording.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the preceding claim in clear modern English.
- source_word: πρῶτός μου ἦν
  chosen: he was before me
  alternatives:
  - he was first before me
  - he existed before me
  lexicon: BDAG
  rationale: Preserves the comparative priority claim with minimal interpretive expansion.
    'Existed before me' is a legitimate interpretive gloss, especially in Johannine
    context, but 'was before me' stays closer to the Greek while still allowing the
    theological force to stand.
