theological_decisions:
- issue: Nature of John's mission
  chosen_reading: 'John is presented as divinely commissioned: ''sent from God.'''
  alternative_readings:
  - John was merely associated with God
  - John was sent by God
  rationale: The phrase παρὰ θεοῦ with the passive participle ἀπεσταλμένος indicates
    divine source/commission. The translation preserves this without importing later
    theological claims about prophetic office beyond the text itself.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense
    without importing doctrinal claims the text does not make.'
