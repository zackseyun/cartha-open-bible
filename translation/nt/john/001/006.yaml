id: JHN.1.6
reference: John 1:6
source:
  edition: SBLGNT
  text: Ἐγένετο ἄνθρωπος ἀπεσταλμένος παρὰ θεοῦ, ὄνομα αὐτῷ Ἰωάννης·
translation:
  text: There was a man sent from God, whose name was John.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'his name was John' or more compactly 'named John.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγένετο
  chosen: There was
  alternatives:
  - There came to be
  - A man appeared
  lexicon: BDAG
  rationale: γίνομαι here introduces a new figure into the narrative. 'There was'
    is natural English and preserves the existential sense without overinterpreting
    it as either mere appearance or creation.
- source_word: ἄνθρωπος
  chosen: a man
  alternatives:
  - a human being
  lexicon: BDAG
  rationale: The singular masculine refers to an individual male person, John. 'A
    man' is both natural and gender-accurate to the referent.
- source_word: ἀπεσταλμένος
  chosen: sent
  alternatives:
  - having been sent
  - commissioned
  lexicon: BDAG
  rationale: The perfect/passive participle describes John as one who has been sent,
    with the emphasis on divine commissioning. 'Sent' is concise and idiomatic in
    English while preserving the passive sense.
- source_word: παρὰ θεοῦ
  chosen: from God
  alternatives:
  - by God
  - from the presence of God
  lexicon: BDAG
  rationale: παρά with genitive commonly denotes source or origin. 'From God' best
    captures the commissioning source in context; 'by God' would stress agency more
    than source.
- source_word: ὄνομα αὐτῷ Ἰωάννης
  chosen: whose name was John
  alternatives:
  - his name was John
  - named John
  lexicon: BDAG
  rationale: The idiom literally means 'name to him, John.' 'Whose name was John'
    is smooth English that preserves the identificational force. 'Named John' is possible
    but slightly more compressed than the Greek phrasing.
- source_word: Ἰωάννης
  chosen: John
  rationale: Personal names are transliterated by standard English convention per
    project philosophy.
