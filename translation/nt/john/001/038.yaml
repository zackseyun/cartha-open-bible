theological_decisions:
- issue: Rendering μένω in an early Johannine context where the verb later carries
    theological weight
  chosen_reading: where are you staying?
  alternative_readings:
  - where are you remaining?
  - where are you abiding?
  rationale: 'Although μένω becomes a major theological verb in John, this first occurrence
    is best rendered according to immediate discourse context: the disciples are asking
    where Jesus is lodging. Preserving readability here does not deny later theological
    significance; it avoids importing later developed Johannine themes into a plainly
    situational question.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Rendering ζητέω with possible Johannine double meaning
  chosen_reading: What are you seeking?
  alternative_readings:
  - What are you looking for?
  rationale: John often uses ordinary language with layered significance. 'Seeking'
    preserves that tension better than a purely colloquial rendering, without overstating
    the theology. This aligns with the instruction to preserve theological tension
    rather than flatten it.
  doctrine_reference: Translation philosophy §3
