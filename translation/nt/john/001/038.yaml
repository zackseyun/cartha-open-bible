id: JHN.1.38
reference: John 1:38
source:
  edition: SBLGNT
  text: στραφεὶς δὲ ὁ Ἰησοῦς καὶ θεασάμενος αὐτοὺς ἀκολουθοῦντας λέγει αὐτοῖς· Τί
    ζητεῖτε; οἱ δὲ εἶπαν αὐτῷ· Ῥαββί (ὃ λέγεται ⸀μεθερμηνευόμενον Διδάσκαλε), ποῦ
    μένεις;
translation:
  text: Then Jesus turned and, seeing them following, said to them, “What are you
    seeking?” They said to him, “Rabbi” (which translated means Teacher), “where are
    you staying?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “What are you looking for?” The Greek can refer to ordinary searching,
      but “seeking” better preserves the possible deeper sense in John’s narrative.
    reason: lexical_alternative
  - marker: b
    text: “Rabbi” is a Hebrew/Aramaic title meaning “Teacher.”
    reason: cultural_note
  - marker: c
    text: Or “where are you remaining?” The Greek verb is the same one often rendered
      “remain” or “abide” elsewhere in John.
    reason: lexical_alternative
lexical_decisions:
- source_word: στραφεὶς
  chosen: turned
  alternatives:
  - turned around
  lexicon: BDAG
  rationale: Aorist participle of στρέφω, introducing Jesus' action prior to speaking.
    'Turned' is natural modern English and sufficiently captures the motion without
    over-specifying direction.
- source_word: θεασάμενος
  chosen: seeing
  alternatives:
  - looking at
  - noticing
  lexicon: BDAG
  rationale: The participle conveys visual perception with attentiveness. 'Seeing'
    is concise and idiomatic in sequence with 'turned,' while preserving the observational
    force without adding interpretive nuance.
- source_word: ἀκολουθοῦντας
  chosen: following
  alternatives:
  - coming after
  lexicon: BDAG
  rationale: Present participle indicating ongoing action. 'Following' is the standard
    and contextually appropriate rendering, and in Johannine context can carry both
    literal and emerging discipleship overtones without forcing either one.
- source_word: Τί ζητεῖτε;
  chosen: What are you seeking?
  alternatives:
  - What do you seek?
  - What are you looking for?
  lexicon: BDAG
  rationale: ζητέω can mean seek, look for, or desire. 'What are you seeking?' preserves
    both the literal question and the deeper Johannine resonance of spiritual searching
    better than the more colloquial 'looking for.'
- source_word: Ῥαββί
  chosen: Rabbi
  alternatives:
  - my master
  lexicon: BDAG
  rationale: Per translation philosophy, names are transliterated, and this Jewish
    address/title is preserved in transliteration because the text itself immediately
    supplies an explanatory gloss.
- source_word: μεθερμηνευόμενον Διδάσκαλε
  chosen: which translated means Teacher
  alternatives:
  - which is translated Teacher
  - which means Teacher
  lexicon: BDAG
  rationale: John's parenthetical note explains the Semitic title for Greek readers.
    'Which translated means Teacher' is readable modern English while preserving the
    explanatory function. 'Teacher' appropriately renders Διδάσκαλε as a title of
    address.
- source_word: ποῦ μένεις;
  chosen: where are you staying?
  alternatives:
  - where are you remaining?
  - where do you stay?
  lexicon: BDAG
  rationale: μένω often has theological depth in John ('remain/abide'), but here the
    immediate sense is locative and practical. 'Where are you staying?' best fits
    natural English in context, while the more literal 'remaining' would sound unnatural
    and overplay later Johannine themes.
