id: JHN.1.30
reference: John 1:30
source:
  edition: SBLGNT
  text: οὗτός ἐστιν ⸀ὑπὲρ οὗ ἐγὼ εἶπον· Ὀπίσω μου ἔρχεται ἀνὴρ ὃς ἔμπροσθέν μου γέγονεν,
    ὅτι πρῶτός μου ἦν·
translation:
  text: This is he of whom I said, ‘After me comes a man who has come before me, because
    he was before me.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'has taken precedence over me.' The Greek can express precedence or superior
      rank, not only temporal sequence.
    reason: lexical_alternative
  - marker: b
    text: Or 'he existed before me.' The wording likely implies Jesus’ preexistence,
      though the Greek states it more compactly as 'he was before me.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτός
  chosen: This is he
  alternatives:
  - This is the one
  - He is the one
  lexicon: BDAG
  rationale: Demonstrative with copula introducing identification. 'This is he' preserves
    the emphatic, somewhat formal identification in John’s testimony without unnecessary
    paraphrase.
- source_word: ὑπὲρ οὗ
  chosen: of whom
  alternatives:
  - about whom
  - concerning whom
  lexicon: BDAG
  rationale: Although ὑπέρ often means 'on behalf of' or 'concerning,' in this idiom
    after εἶπον it functions naturally as 'of/about whom I said.' 'Of whom' is concise
    and idiomatic in English while preserving the referential force.
- source_word: Ὀπίσω μου ἔρχεται
  chosen: After me comes
  alternatives:
  - He who comes after me
  - Behind me comes
  lexicon: BDAG
  rationale: ὀπίσω with genitive here is temporal/rank sequence, not merely spatial.
    'After me comes' preserves the word order and John’s comparative framing.
- source_word: ἀνὴρ
  chosen: a man
  alternatives:
  - a male
  - one
  lexicon: BDAG
  rationale: The noun is explicitly masculine singular and refers to Jesus as an individual
    human person. Per the translation philosophy, gender-accurate rendering is preferred
    over neutralizing.
- source_word: ἔμπροσθέν μου γέγονεν
  chosen: has come before me
  alternatives:
  - has become before me
  - has taken precedence over me
  - is ahead of me
  lexicon: BDAG
  rationale: The perfect γέγονεν with ἔμπροσθεν expresses a present state of precedence/result.
    'Has come before me' is natural English and preserves the comparative sense without
    over-interpreting as status alone. 'Has taken precedence over me' is interpretive
    and better preserved as an alternative.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  - that
  lexicon: BDAG
  rationale: Here ὅτι gives the reason for the preceding statement of precedence.
    'Because' makes the causal relation explicit in modern English.
- source_word: πρῶτός μου ἦν
  chosen: he was before me
  alternatives:
  - he was first before me
  - he existed before me
  lexicon: BDAG
  rationale: πρῶτος in this context can denote priority, including temporal priority
    and thus preexistence. 'He was before me' preserves the Greek’s compact ambiguity/tension
    between rank and temporal priority, while naturally conveying the likely sense
    in context.
