theological_decisions:
- issue: How explicitly to render the final clause in relation to Christ’s preexistence
  chosen_reading: he was before me
  alternative_readings:
  - he existed before me
  - he ranked before me
  rationale: In Johannine context the clause strongly supports Jesus’ preexistence,
    yet the translation should not over-specify beyond the Greek. 'He was before me'
    preserves both temporal priority and superiority, allowing the theological force
    to emerge from the text itself rather than from an expanded paraphrase.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological
    tension rather than resolve it
