theological_decisions:
- issue: Sense of πιστεύω εἰς αὐτόν in Johannine usage
  chosen_reading: personal belief/trust directed toward Jesus
  alternative_readings:
  - were not putting faith in him
  - were not trusting him
  rationale: John regularly uses πιστεύω with εἰς to denote believing in or trusting in Jesus. The verse states their lack of such belief without specifying the full theological reasons for it. The translation preserves that claim without importing later doctrinal conclusions.
