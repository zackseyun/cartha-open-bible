id: JHN.7.24
reference: John 7:24
source:
  edition: SBLGNT
  text: μὴ κρίνετε κατ’ ὄψιν, ἀλλὰ τὴν δικαίαν κρίσιν ⸀κρίνετε.
translation:
  text: Do not judge according to appearance[a], but judge with righteous judgment.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: “Do not judge by outward appearance, but judge with just judgment.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ κρίνετε
  chosen: Do not judge
  alternatives:
  - Stop judging
  - Do not pass judgment
  lexicon: BDAG
  rationale: Present active imperative with μή is naturally prohibitive here. 'Do not judge' is concise and idiomatic, preserving the imperative force without overinterpreting aspect as 'stop judging.'
- source_word: κατ’ ὄψιν
  chosen: according to appearances
  alternatives:
  - by appearance
  - according to outward appearance
  - by what is seen
  lexicon: BDAG
  rationale: The phrase means judging on the basis of outward appearance or surface impression. 'According to appearances' is natural English and captures the idiom better than the more wooden 'according to sight/face.'
- source_word: ἀλλὰ
  chosen: but
  alternatives:
  - rather
  - instead
  lexicon: BDAG
  rationale: Strong adversative contrasting the forbidden manner of judging with the commanded manner. 'But' is the most straightforward English equivalent.
- source_word: τὴν δικαίαν κρίσιν
  chosen: with righteous judgment
  alternatives:
  - the righteous judgment
  - just judgment
  - a righteous judgment
  lexicon: BDAG
  rationale: The accusative object with κρίνετε is somewhat awkward if rendered woodenly as 'judge the righteous judgment.' English idiom is better served by 'judge with righteous judgment,' which preserves both δικαίαν ('righteous/just') and κρίσιν ('judgment') while reflecting the sense of making judgments in a righteous way. 'Righteous' is preferred over 'just' to preserve the moral quality conveyed by δίκαιος and its broader biblical resonance.
- source_word: κρίνετε
  chosen: judge
  alternatives:
  - render judgment
  - decide
  lexicon: BDAG
  rationale: Repeating 'judge' preserves the rhetorical parallelism of the Greek, where the same verb frames both clauses.
