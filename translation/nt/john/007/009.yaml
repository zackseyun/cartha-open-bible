id: JHN.7.9
reference: John 7:9
source:
  edition: SBLGNT
  text: ταῦτα ⸀δὲ εἰπὼν ⸀αὐτὸς ἔμεινεν ἐν τῇ Γαλιλαίᾳ.
translation:
  text: After saying these things, he himself remained in Galilee.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  chosen: these things
  alternatives:
  - this
  lexicon: BDAG
  rationale: The neuter plural demonstrative naturally refers back to the preceding
    statements. 'These things' preserves the plural form and Johannine style better
    than the more idiomatic but less formal 'this'.
- source_word: δὲ
  chosen: After
  alternatives:
  - and
  - then
  - now
  lexicon: BDAG
  rationale: 'Although δέ commonly marks mild contrast or continuation, in this construction
    with the participle εἰπών it is well represented in English by a temporal transition:
    ''After saying...''. This yields natural English while preserving the discourse
    movement.'
- source_word: εἰπὼν
  chosen: saying
  alternatives:
  - having said
  - after saying
  lexicon: BDAG
  rationale: The aorist participle is antecedent to the main verb. In English, its
    force is best conveyed in the clause 'After saying these things.' The lexical
    sense remains 'say' rather than a more interpretive verb.
- source_word: αὐτὸς
  chosen: he himself
  alternatives:
  - he
  - he on his part
  lexicon: BDAG
  rationale: The explicit pronoun is unnecessary for simple subject reference in Greek
    and therefore carries emphasis. 'He himself' preserves that emphasis, likely contrasting
    Jesus' own action with that of his brothers in the surrounding context.
- source_word: ἔμεινεν
  chosen: remained
  alternatives:
  - stayed
  lexicon: BDAG
  rationale: μένω often carries the sense 'remain' or 'stay.' 'Remained' is chosen
    because it is slightly more consistent with Johannine usage, where μένω can bear
    thematic weight, while still fitting this narrative context naturally.
- source_word: ἐν τῇ Γαλιλαίᾳ
  chosen: in Galilee
  alternatives:
  - within Galilee
  lexicon: BDAG
  rationale: A straightforward locative phrase. 'In Galilee' is the natural English
    rendering and preserves the geographical reference without embellishment.
