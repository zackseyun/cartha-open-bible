id: JHN.18.1
reference: John 18:1
source:
  edition: SBLGNT
  text: Ταῦτα ⸀εἰπὼν Ἰησοῦς ἐξῆλθεν σὺν τοῖς μαθηταῖς αὐτοῦ πέραν τοῦ χειμάρρου ⸀τοῦ Κεδρὼν ὅπου ἦν κῆπος, εἰς ὃν εἰσῆλθεν αὐτὸς καὶ οἱ μαθηταὶ αὐτοῦ.
translation:
  text: After saying these things[a], Jesus went out with his disciples across the Kidron Valley, where there was a garden, into which he and his disciples entered.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'across the Kidron ravine' or 'beyond the brook Kidron.' The Greek term refers to a seasonal watercourse.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα εἰπὼν
  chosen: After saying these things
  alternatives:
  - Having said these things
  - When he had said these things
  lexicon: BDAG
  rationale: The aorist participle with ταῦτα is naturally rendered as a temporal participial clause. 'After saying these things' is idiomatic modern English and preserves the sequence without unnecessary stiffness.
- source_word: ἐξῆλθεν
  chosen: went out
  alternatives:
  - departed
  - went away
  lexicon: BDAG
  rationale: The verb literally means 'went out.' This preserves the concrete movement and aligns with Johannine narrative style better than the more interpretive 'departed.'
- source_word: σὺν τοῖς μαθηταῖς αὐτοῦ
  chosen: with his disciples
  alternatives:
  - together with his disciples
  lexicon: BDAG
  rationale: σύν with the dative indicates accompaniment. 'With his disciples' is clear and natural; 'together with' is more formal but adds no essential meaning.
- source_word: πέραν τοῦ χειμάρρου τοῦ Κεδρών
  chosen: across the Kidron brook
  alternatives:
  - beyond the brook Kidron
  - across the ravine of the Kidron
  - across the winter torrent of Kidron
  lexicon: BDAG
  rationale: πέραν indicates movement to the far side, so 'across' fits the context. χείμαρρος denotes a seasonal stream, wadi, or brook; 'brook' is the most readable English equivalent here. Κεδρών is transliterated as the proper name 'Kidron' in keeping with the philosophy of transliterating names.
- source_word: ὅπου ἦν κῆπος
  chosen: where there was a garden
  alternatives:
  - where a garden was
  - where there was an orchard
  lexicon: BDAG
  rationale: κῆπος ordinarily means 'garden.' 'Where there was a garden' is natural English and preserves the existential force of ἦν.
- source_word: εἰς ὃν εἰσῆλθεν
  lemma: εἰς
  chosen: into which he ... entered
  alternatives:
  - which he ... entered
  - into it he ... went
  lexicon: BDAG
  rationale: The preposition εἰς with the relative pronoun is best preserved by 'into which,' even if slightly formal, because it reflects the directional movement explicitly present in Greek.
- source_word: αὐτὸς καὶ οἱ μαθηταὶ αὐτοῦ
  lemma: αὐτός
  chosen: he and his disciples
  alternatives:
  - he himself and his disciples
  lexicon: BDAG
  rationale: The explicit pronoun αὐτός can be represented simply by 'he' in English; adding 'himself' would overemphasize the subject beyond what the context requires.
