theological_decisions:
- issue: Rendering of Ἐγώ εἰμι in a Johannine context with possible theological resonance
  chosen_reading: I am he
  alternative_readings:
  - I am
  rationale: The immediate discourse context favors straightforward self-identification, so the main text uses idiomatic English. However, because John's Gospel can invest ἐγώ εἰμι with deeper resonance, the more literal 'I am' is preserved in a footnote rather than being erased.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
