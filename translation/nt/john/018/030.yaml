id: JHN.18.30
reference: John 18:30
source:
  edition: SBLGNT
  text: ἀπεκρίθησαν καὶ εἶπαν αὐτῷ· Εἰ μὴ ἦν οὗτος ⸂κακὸν ποιῶν⸃, οὐκ ἄν σοι παρεδώκαμεν αὐτόν.
translation:
  text: They answered and said to him[a], “If this man were not an evildoer, we would not have handed him over to you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “If this man were not an evildoer, we would not have handed him over to you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθησαν
  chosen: They answered
  alternatives:
  - They replied
  lexicon: BDAG
  rationale: Aorist passive-form deponent commonly means 'answered' or 'replied.' 'Answered' preserves the narrative linkage closely and fits standard English style.
- source_word: καὶ εἶπαν
  chosen: and said
  alternatives:
  - and spoke
  lexicon: BDAG
  rationale: The paired expression ἀπεκρίθησαν καὶ εἶπαν is a common Semitic-influenced narrative formula. Rendering both verbs as 'answered and said' preserves the emphatic/full formula without awkward paraphrase.
- source_word: αὐτῷ
  chosen: to him
  lexicon: BDAG
  rationale: Dative indirect object; straightforwardly refers to Pilate in context.
- source_word: Εἰ μὴ
  chosen: If ... not
  alternatives:
  - Unless
  lexicon: BDAG
  rationale: Here εἰ μή introduces a contrary-to-fact condition. 'If ... not' preserves the Greek structure more transparently than the compressed 'unless,' though the latter is possible idiomatic English.
- source_word: οὗτος
  chosen: this man
  alternatives:
  - this one
  - this fellow
  lexicon: BDAG
  rationale: The demonstrative refers to Jesus with a distancing tone from his accusers. 'This man' is natural English and preserves that tone better than the bare 'this one'; 'this fellow' would add extra contempt not required by the Greek.
- source_word: κακὸν ποιῶν
  chosen: doing evil
  alternatives:
  - an evildoer
  - doing wrong
  lexicon: BDAG
  rationale: The participial phrase is literally 'doing evil/bad.' 'Doing evil' preserves the verbal force of ποιῶν and the moral charge of κακόν. 'An evildoer' is idiomatic but shifts from action to label; 'doing wrong' is somewhat softer.
- source_word: οὐκ ἄν ... παρεδώκαμεν
  chosen: we would not have handed
  alternatives:
  - we would not have delivered
  - we would not have turned over
  lexicon: BDAG
  rationale: 'οὐκ ἄν with the aorist indicative expresses the apodosis of a contrary-to-fact condition: ''we would not have ...'' παραδίδωμι in this judicial context means ''hand over/deliver.'' ''Handed over'' is clear modern English and preserves the legal nuance without sounding wooden.'
- source_word: σοι
  chosen: to you
  lexicon: BDAG
  rationale: Dative second person singular, addressed to Pilate.
- source_word: αὐτόν
  chosen: him
  lexicon: BDAG
  rationale: Direct object referring to Jesus; standard pronoun rendering.
