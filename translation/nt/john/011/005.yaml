id: JHN.11.5
reference: John 11:5
source:
  edition: SBLGNT
  text: ἠγάπα δὲ ὁ Ἰησοῦς τὴν Μάρθαν καὶ τὴν ἀδελφὴν αὐτῆς καὶ τὸν Λάζαρον.
translation:
  text: Now Jesus loved Martha and her sister and Lazarus.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἠγάπα
  chosen: loved
  alternatives:
  - was loving
  - had love for
  lexicon: BDAG
  rationale: From ἀγαπάω, rendered with the standard cognate 'love' in keeping with
    the project's default for ἀγάπη-family terms. The imperfect is best conveyed idiomatically
    in English as 'loved' here, expressing Jesus' ongoing disposition without awkwardness.
- source_word: δὲ
  chosen: Now
  alternatives:
  - and
  - but
  - ''
  lexicon: BDAG
  rationale: δέ is a mild connective. 'Now' signals narrative transition in natural
    English without forcing a strong adversative sense ('but'). An untranslated option
    is possible, but retaining a light connective better reflects the Greek discourse
    flow.
- source_word: ἀδελφὴν αὐτῆς
  chosen: her sister
  alternatives:
  - the sister of her
  lexicon: BDAG
  rationale: A natural English rendering of the noun plus possessive pronoun. Since
    Mary is unnamed in this verse but identified in the context, 'her sister' accurately
    reflects the Greek without over-specifying.
- source_word: Μάρθαν
  chosen: Martha
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names.
- source_word: Λάζαρον
  chosen: Lazarus
  lexicon: BDAG
  rationale: Personal name transliterated by standard English convention, following
    the project's policy to transliterate names.
- source_word: καὶ ... καὶ ... καὶ
  chosen: and ... and ... and
  alternatives:
  - both ... and ... and
  lexicon: BDAG
  rationale: The repeated καί coordinates the three objects straightforwardly. Preserving
    each 'and' reflects the Greek structure and keeps the list balanced.
