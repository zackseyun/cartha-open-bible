id: JHN.10.22
reference: John 10:22
source:
  edition: SBLGNT
  text: Ἐγένετο ⸀τότε τὰ ἐγκαίνια ἐν ⸀τοῖς Ἱεροσολύμοις· ⸀χειμὼν ἦν,
translation:
  text: At that time the Feast of Dedication took place in Jerusalem[a]. It was winter,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Hanukkah,' the Jewish festival commemorating the rededication of the temple.
    reason: cultural_note
lexical_decisions:
- source_word: Ἐγένετο
  chosen: took place
  alternatives:
  - came about
  - was held
  - occurred
  lexicon: BDAG
  rationale: γίνομαι here introduces an event in time rather than simple existence; 'took place' is idiomatic English that preserves the eventive sense better than a wooden 'it happened'.
- source_word: τότε
  chosen: At that time
  alternatives:
  - then
  - at that time
  lexicon: BDAG
  rationale: τότε marks temporal transition. 'At that time' is slightly fuller and smoother in English narrative than bare 'then' while preserving the temporal force.
- source_word: τὰ ἐγκαίνια
  chosen: the Feast of Dedication
  alternatives:
  - the Dedication
  - Hanukkah
  lexicon: BDAG
  rationale: ἐγκαίνια refers to the dedication festival of the temple. 'Feast of Dedication' communicates the meaning transparently to readers unfamiliar with the Jewish festival, while 'Hanukkah' is a later/common designation worth preserving in a footnote.
- source_word: ἐν τοῖς Ἱεροσολύμοις
  chosen: in Jerusalem
  alternatives:
  - at Jerusalem
  lexicon: BDAG
  rationale: Standard locative expression. 'In Jerusalem' is natural modern English; 'at Jerusalem' is possible but less idiomatic here.
- source_word: χειμὼν ἦν
  chosen: It was winter
  alternatives:
  - winter had come
  - it was the winter season
  lexicon: BDAG
  rationale: The clause is simple and descriptive. 'It was winter' is the most direct and natural rendering, preserving both the temporal note and the atmosphere of the scene.
