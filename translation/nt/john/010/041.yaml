id: JHN.10.41
reference: John 10:41
source:
  edition: SBLGNT
  text: καὶ πολλοὶ ἦλθον πρὸς αὐτὸν καὶ ἔλεγον ὅτι Ἰωάννης μὲν σημεῖον ἐποίησεν οὐδέν, πάντα δὲ ὅσα εἶπεν Ἰωάννης περὶ τούτου ἀληθῆ ἦν.
translation:
  text: And many came to him and were saying, “John did no sign, but everything that John said about this man was true.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “John performed no sign.”
    reason: lexical_alternative
  - marker: b
    text: Or “about him.” The Greek says “about this one/this man.”
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  chosen: many
  alternatives:
  - many people
  lexicon: BDAG
  rationale: The nominative plural adjective functions substantivally. 'Many' is natural and sufficiently explicit in English without adding unnecessary words.
- source_word: ἦλθον πρὸς αὐτὸν
  chosen: came to him
  alternatives:
  - went to him
  lexicon: BDAG
  rationale: ἔρχομαι with πρός + accusative commonly means movement toward a person. 'Came to him' is idiomatic in context and fits the narrative perspective better than 'went to him.'
- source_word: ἔλεγον
  chosen: were saying
  alternatives:
  - said
  - kept saying
  lexicon: BDAG
  rationale: The imperfect indicates ongoing or repeated speech. 'Were saying' preserves that aspect without overinterpreting the frequency.
- source_word: σημεῖον
  chosen: sign
  alternatives:
  - miracle
  lexicon: BDAG
  rationale: In John, σημεῖον is a theologically loaded term referring to a sign that points beyond itself, not merely a miracle. 'Sign' preserves Johannine usage and meaning.
- source_word: ἐποίησεν οὐδέν
  chosen: did no sign
  alternatives:
  - performed no sign
  - did not do any sign
  lexicon: BDAG
  rationale: This closely reflects the Greek wording while remaining readable. 'Performed' is possible, but 'did no sign' keeps the verbal simplicity of ἐποίησεν.
- source_word: πάντα δὲ ὅσα
  chosen: everything that
  alternatives:
  - all that
  - all the things that
  lexicon: BDAG
  rationale: The construction is comprehensive. 'Everything that' is natural modern English and preserves the totalizing force.
- source_word: περὶ τούτου
  chosen: about this man
  alternatives:
  - about him
  - concerning this one
  lexicon: BDAG
  rationale: τούτου refers to Jesus. 'About this man' makes the referent explicit and reflects the demonstrative force better than the more ambiguous 'about him,' while remaining natural in reported speech.
- source_word: ἀληθῆ ἦν
  chosen: was true
  alternatives:
  - proved true
  - was truthful
  lexicon: BDAG
  rationale: The neuter plural subject πάντα takes a singular verb idiomatically. 'Was true' is the most direct rendering of the predicate ἀληθῆ. 'Proved true' adds a nuance of subsequent verification not explicit in the Greek.
