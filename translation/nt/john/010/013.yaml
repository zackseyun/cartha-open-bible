theological_decisions:
- issue: Characterization of the μισθωτός in contrast to the good shepherd
  chosen_reading: Render the clause in straightforward ethical terms without importing
    broader doctrinal conclusions beyond the text.
  alternative_readings:
  - Interpret the hired hand as a specific class of false leaders
  - Soften the contrast into mere professional detachment
  rationale: 'The verse itself states the reason plainly: he is a hired hand and therefore
    lacks concern for the sheep. The translation should preserve the contrast with
    the good shepherd without specifying an identity the verse does not explicitly
    name.'
