id: JHN.10.13
reference: John 10:13
source:
  edition: SBLGNT
  text: ⸀ὅτι μισθωτός ἐστιν καὶ οὐ μέλει αὐτῷ περὶ τῶν προβάτων.
translation:
  text: because he is a hired hand and does not care about the sheep.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: In context this gives the reason for the hired man's flight in the previous
    clause, so the causal sense 'because' is clearer in modern English than the more
    formal 'for'.
- source_word: μισθωτός
  chosen: a hired hand
  alternatives:
  - hireling
  - hired worker
  lexicon: BDAG
  rationale: The term denotes one who works for wages rather than out of ownership
    or covenantal responsibility. 'Hired hand' is natural modern English and fits
    the shepherding context better than the archaic 'hireling'.
- source_word: μέλει αὐτῷ περὶ
  chosen: does not care about
  alternatives:
  - is of no concern to him
  - is not concerned about
  lexicon: BDAG
  rationale: The impersonal construction μέλει with dative plus περί expresses concern
    or care. 'Does not care about' is idiomatic, accurate, and preserves the moral
    force of the statement.
- source_word: τῶν προβάτων
  chosen: the sheep
  alternatives:
  - the flock
  lexicon: BDAG
  rationale: The literal 'the sheep' matches the Greek noun and preserves the pastoral
    imagery central to the discourse. 'Flock' is interpretive and broader than the
    singular lexical item.
