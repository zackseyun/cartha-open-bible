id: JHN.21.14
reference: John 21:14
source:
  edition: SBLGNT
  text: τοῦτο ἤδη τρίτον ἐφανερώθη ⸀ὁ Ἰησοῦς τοῖς ⸀μαθηταῖς ἐγερθεὶς ἐκ νεκρῶν.
translation:
  text: This was now the third time Jesus was revealed to the disciples after he had
    been raised from the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'This was now the third time Jesus appeared to the disciples after he
      had been raised from the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  chosen: This
  alternatives:
  - This thing
  - This event
  lexicon: BDAG
  rationale: Demonstrative referring to the appearance just narrated; simple 'This'
    is natural English and preserves the anaphoric force.
- source_word: ἤδη
  chosen: now
  alternatives:
  - already
  - by this time
  lexicon: BDAG
  rationale: Here ἤδη marks the count as having reached this point in the narrative;
    'now' fits idiomatic English in 'This was now the third time.'
- source_word: τρίτον
  chosen: the third time
  alternatives:
  - thirdly
  - for the third time
  lexicon: BDAG
  rationale: Accusative used adverbially to indicate ordinal occurrence. English requires
    an idiomatic expansion; 'the third time' best conveys the sense.
- source_word: ἐφανερώθη
  chosen: was revealed
  alternatives:
  - appeared
  - was made manifest
  - was manifested
  lexicon: BDAG
  rationale: Passive of φανερόω means 'to be revealed/made manifest.' 'Was revealed'
    preserves the passive form and Johannine diction better than the more interpretive
    'appeared,' though the latter is a viable contextual gloss.
- source_word: ὁ Ἰησοῦς
  chosen: Jesus
  lexicon: BDAG
  rationale: Proper name with article, standardly rendered simply as 'Jesus' in English.
- source_word: τοῖς μαθηταῖς
  chosen: to the disciples
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: Dative indirect object after the passive verb. 'The disciples' follows
    the Greek, which does not explicitly include 'his,' though that is contextually
    understood.
- source_word: ἐγερθεὶς
  chosen: after he had been raised
  alternatives:
  - having been raised
  - after being raised
  lexicon: BDAG
  rationale: Aorist passive participle of ἐγείρω, modifying Jesus and indicating antecedent
    action relative to the main verb. 'After he had been raised' expresses the temporal
    relationship clearly in natural English while preserving the passive voice.
- source_word: ἐκ νεκρῶν
  chosen: from the dead
  alternatives:
  - from among the dead
  lexicon: BDAG
  rationale: Standard idiom for resurrection. 'From the dead' is natural English;
    'from among the dead' is more literal but less idiomatic.
