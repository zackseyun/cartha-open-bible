theological_decisions:
- issue: Rendering of resurrection language in ἐγερθεὶς ἐκ νεκρῶν
  chosen_reading: after he had been raised from the dead
  alternative_readings:
  - after he rose from the dead
  rationale: The Greek participle is passive, so the main text preserves that voice
    rather than shifting to the intransitive active 'rose.' This maintains the wording
    of the source without altering orthodox resurrection meaning.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
