theological_decisions:
- issue: Whether to interpret the saying explicitly as crucifixion in the main text
  chosen_reading: Keep the wording literal and non-explicit in the main text
  alternative_readings:
  - Render 'stretch out your hands' and 'another will dress/bind you' as an explicit crucifixion prediction
  rationale: The immediate verse uses imagery that the following verse interprets as indicating the kind of death by which Peter would glorify God. To preserve the text's own progression and avoid importing the narrator's explanation into Jesus' words prematurely, the main text remains literal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
