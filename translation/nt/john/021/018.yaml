id: JHN.21.18
reference: John 21:18
source:
  edition: SBLGNT
  text: ἀμὴν ἀμὴν λέγω σοι, ὅτε ἦς νεώτερος, ἐζώννυες σεαυτὸν καὶ περιεπάτεις ὅπου ἤθελες· ὅταν δὲ γηράσῃς, ἐκτενεῖς τὰς χεῖράς σου, καὶ ἄλλος ⸂σε ζώσει⸃ καὶ οἴσει ὅπου οὐ θέλεις.
translation:
  text: Truly[a], truly, I say to you, when you were younger, you used to dress yourself and walk where you wanted; but when you grow old, you will stretch out your hands[c][b], and another will dress you and carry you where you do not want to go.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'gird yourself' / 'another will gird you.' The Greek verb refers literally to fastening or binding on clothing; here it contrasts Peter's former independence with later dependence.
    reason: lexical_alternative
  - marker: b
    text: '''Stretch out your hands'' is often understood as alluding to Peter''s death by crucifixion; the next verse explains that Jesus said this to indicate the kind of death by which Peter would glorify God.'
    reason: cross_reference
  - marker: c
    text: Or 'lead you' / 'take you.' The Greek can denote being borne or taken along to an unwanted destination.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν ἀμὴν
  chosen: Truly, truly
  alternatives:
  - Amen, amen
  - Most truly
  lexicon: BDAG
  rationale: Retains the emphatic doubled formula in natural English. 'Truly, truly' is established and clear, preserving solemnity without transliterating.
- source_word: λέγω σοι
  chosen: I say to you
  alternatives:
  - I tell you
  lexicon: BDAG
  rationale: A close rendering that preserves the direct address and Johannine style.
- source_word: ὅτε ἦς νεώτερος
  chosen: when you were younger
  alternatives:
  - when you were young
  - when you were younger than now
  lexicon: BDAG
  rationale: Comparative νεώτερος is best reflected by 'younger,' likely relative to Peter's later old age in the saying.
- source_word: ἐζώννυες σεαυτόν
  chosen: you used to dress yourself
  alternatives:
  - you used to gird yourself
  - you used to belt yourself
  lexicon: BDAG
  rationale: ζώννυμι literally refers to girding/binding on clothing, but in contemporary English 'dress yourself' communicates the idiom naturally while preserving the contrast with another dressing him later.
- source_word: περιεπάτεις ὅπου ἤθελες
  chosen: walk where you wanted
  alternatives:
  - go where you wished
  - move about where you wanted
  lexicon: BDAG
  rationale: περιπατέω here refers to ordinary movement rather than a metaphorical ethical walk. 'Walk where you wanted' preserves the concrete image and personal freedom.
- source_word: ὅταν δὲ γηράσῃς
  chosen: but when you grow old
  alternatives:
  - but when you become old
  - but whenever you grow old
  lexicon: BDAG
  rationale: A natural future-oriented rendering of the aorist subjunctive with ὅταν. 'But' reflects δέ as a mild contrast.
- source_word: ἐκτενεῖς τὰς χεῖράς σου
  chosen: you will stretch out your hands
  alternatives:
  - you will extend your hands
  - you will spread out your hands
  lexicon: BDAG
  rationale: A straightforward rendering of the future verb and object. 'Hands' is retained rather than interpreted in the main text, since the next verse explains the manner of death.
- source_word: ἄλλος σε ζώσει
  chosen: another will dress you
  alternatives:
  - another will gird you
  - another will bind you
  lexicon: BDAG
  rationale: For consistency with the earlier ἐζώννυες, the same semantic field is preserved. 'Dress you' keeps the contrast between self-directed and externally directed action. 'Bind you' is possible in light of the death prediction, but the immediate lexical parallel favors 'dress you' in the main text.
- source_word: οἴσει
  chosen: carry you
  alternatives:
  - lead you
  - take you
  lexicon: BDAG
  rationale: φέρω commonly means 'carry' or 'bring.' 'Carry you' is the more literal choice, though in context it can imply being taken under compulsion.
- source_word: ὅπου οὐ θέλεις
  chosen: where you do not want to go
  alternatives:
  - where you do not want
  - where you do not wish to go
  lexicon: BDAG
  rationale: English idiom requires 'to go' for clarity, though it is implied rather than explicit in Greek. This preserves the sense of unwilling destination.
