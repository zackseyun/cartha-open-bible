id: JHN.21.15
reference: John 21:15
source:
  edition: SBLGNT
  text: Ὅτε οὖν ἠρίστησαν λέγει τῷ Σίμωνι Πέτρῳ ὁ Ἰησοῦς· Σίμων ⸀Ἰωάννου, ἀγαπᾷς με
    πλέον τούτων; λέγει αὐτῷ· Ναί, κύριε, σὺ οἶδας ὅτι φιλῶ σε. λέγει αὐτῷ· Βόσκε
    τὰ ἀρνία μου.
translation:
  text: So when they had eaten breakfast, Jesus said to Simon Peter, “Simon, son of
    John, do you love me more than these?” He said to him, “Yes, Lord; you know that
    I love you.” He said to him, “Feed my lambs.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek has two different verbs here: Jesus asks with ἀγαπάω (''love''),
      and Peter replies with φιλέω (''love, have affection for''). Many interpreters
      see a distinction; others take the variation as stylistic. The main text renders
      both as ''love'' to avoid overstating a contrast the context does not make explicit.'
    reason: lexical_alternative
  - marker: b
    text: '''More than these'' may mean ''more than these men do'' or ''more than
      these things.'' The Greek leaves the comparison implicit.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἠρίστησαν
  chosen: had eaten breakfast
  alternatives:
  - had breakfast
  - had eaten
  lexicon: BDAG
  rationale: The verb ἀριστάω refers specifically to taking the morning meal. 'Had
    eaten breakfast' preserves the temporal sense naturally in English and avoids
    the overly bare 'had eaten.'
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Although the Greek uses the historical present, standard English narrative
    style normally renders it with a past tense. 'Said' communicates the discourse
    clearly without awkwardness.
- source_word: Σίμων Ἰωάννου
  chosen: Simon, son of John
  alternatives:
  - Simon John’s son
  - Simon son of Jonah
  lexicon: BDAG
  rationale: The genitive Ἰωάννου is most naturally rendered as a patronymic, 'son
    of John.' This follows the direct Greek reading here. 'Son of Jonah' reflects
    a different traditional form known from Matt 16:17, not this verse's wording.
- source_word: ἀγαπᾷς
  chosen: do you love
  alternatives:
  - do you have love for
  lexicon: BDAG
  rationale: The ordinary and most natural rendering of ἀγαπάω is 'love.' The verse's
    rhetorical force depends on the direct personal question, and English should preserve
    that simplicity.
- source_word: πλέον τούτων
  chosen: more than these
  alternatives:
  - more than these things
  - more than these men do
  - more than you love these things
  lexicon: BDAG
  rationale: 'The Greek expression is elliptical and genuinely ambiguous: it may compare
    Peter''s love for Jesus with his attachment to the other disciples or to the surrounding
    things, or compare Peter''s love with that of the others. The traditional and
    concise ''more than these'' best preserves the ambiguity rather than resolving
    it.'
- source_word: κύριε
  chosen: Lord
  alternatives:
  - sir
  - master
  lexicon: BDAG
  rationale: Per doctrine defaults, κύριος is rendered 'Lord.' In Johannine context,
    Peter addresses Jesus with reverence that exceeds a merely polite 'sir.'
- source_word: οἶδας
  chosen: you know
  alternatives:
  - you understand
  - you are aware
  lexicon: BDAG
  rationale: '''You know'' is the direct and idiomatic rendering of οἶδα here, fitting
    Peter''s appeal to Jesus'' personal knowledge.'
- source_word: φιλῶ
  chosen: I love
  alternatives:
  - I am fond of
  - I have affection for
  lexicon: BDAG
  rationale: Although φιλέω can emphasize affection or friendship, in this context
    'I love' is the most natural English equivalent. Rendering it differently in the
    main text would overstate a lexical distinction that is debated and may not be
    semantically sharp in Johannine usage; the distinction is better preserved in
    a footnote.
- source_word: Βόσκε
  chosen: Feed
  alternatives:
  - tend
  - pasture
  lexicon: BDAG
  rationale: βόσκω specifically denotes feeding rather than the broader shepherding
    sense. 'Feed' best matches the imperative and prepares for the later alternation
    with ποιμαίνω in the passage.
- source_word: ἀρνία
  chosen: lambs
  alternatives:
  - little lambs
  - young sheep
  lexicon: BDAG
  rationale: ἀρνίον denotes a lamb or young sheep. 'Lambs' is clear, natural, and
    preserves the pastoral imagery without unnecessary diminutive wording.
- source_word: μου
  chosen: my
  alternatives:
  - belonging to me
  lexicon: BDAG
  rationale: The possessive pronoun marks Jesus' ownership and care over the flock.
    The simple possessive 'my' preserves this directly.
