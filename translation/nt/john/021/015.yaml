theological_decisions:
- issue: Whether to distinguish ἀγαπάω and φιλέω sharply in the main text
  chosen_reading: Render both with 'love' in the main text, while preserving the lexical
    alternation in a footnote.
  alternative_readings:
  - Render ἀγαπάω as 'love' and φιλέω as 'be fond of' or 'have affection for'
  - Treat the alternation as a deliberate hierarchy of loves
  rationale: The passage uses two Greek verbs for love, but scholarship is divided
    on whether John intends a strong semantic contrast here or stylistic variation.
    To avoid importing a theological psychology of 'higher' versus 'lower' love that
    the text does not unambiguously state, the main text keeps the common English
    verb 'love' for both, while a footnote documents the Greek variation. This preserves
    theological tension rather than resolving it.
  doctrine_reference: 'Translation philosophy §3; Contested terms: ἀγάπη → love'
- issue: Interpretation of πλέον τούτων
  chosen_reading: Preserve the ambiguity with 'more than these.'
  alternative_readings:
  - more than these men love me
  - more than you love these things
  rationale: The Greek does not specify the comparison explicitly. A translation that
    chooses one option would narrow the text beyond what the wording warrants. The
    main text therefore retains the ambiguity, with alternatives noted in a footnote.
  doctrine_reference: Translation philosophy §3
