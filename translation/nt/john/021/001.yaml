theological_decisions:
- issue: Rendering of resurrection appearance language
  chosen_reading: revealed himself
  alternative_readings:
  - appeared
  - made himself known
  rationale: The verse describes the risen Jesus' self-manifestation to the disciples.
    'Revealed himself' preserves the Greek verb's emphasis on disclosure without reducing
    the event to mere visual appearance, while still affirming a real post-resurrection
    encounter.
