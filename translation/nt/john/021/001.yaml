id: JHN.21.1
reference: John 21:1
source:
  edition: SBLGNT
  text: Μετὰ ταῦτα ἐφανέρωσεν ἑαυτὸν πάλιν ⸀ὁ Ἰησοῦς τοῖς μαθηταῖς ἐπὶ τῆς θαλάσσης
    τῆς Τιβεριάδος· ἐφανέρωσεν δὲ οὕτως.
translation:
  text: After these things, Jesus revealed himself again to the disciples by the Sea
    of Tiberias, and he revealed himself in this way.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'appeared'; the Greek verb can denote making oneself visible or known.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ ταῦτα
  chosen: After these things
  alternatives:
  - After this
  - Later
  lexicon: BDAG
  rationale: A straightforward temporal transition. 'After these things' preserves
    the plural demonstrative and Johannine narrative style more closely than the smoother
    'After this.'
- source_word: ἐφανέρωσεν ἑαυτὸν
  chosen: revealed himself
  alternatives:
  - appeared
  - made himself known
  lexicon: BDAG
  rationale: φανερόω means to make visible or manifest. 'Revealed himself' preserves
    the reflexive force and the theological nuance of self-disclosure better than
    the more generic 'appeared.'
- source_word: πάλιν
  chosen: again
  alternatives:
  - once more
  lexicon: BDAG
  rationale: Standard adverbial sense indicating a repeated manifestation after prior
    resurrection appearances.
- source_word: τοῖς μαθηταῖς
  chosen: to the disciples
  alternatives:
  - to his disciples
  lexicon: BDAG
  rationale: The possessive 'his' is implied by context but not explicit in the Greek.
    'To the disciples' stays closer to the text.
- source_word: ἐπὶ τῆς θαλάσσης τῆς Τιβεριάδος
  chosen: by the Sea of Tiberias
  alternatives:
  - at the Sea of Tiberias
  - on the Sea of Tiberias
  lexicon: BDAG
  rationale: With ἐπί plus genitive in this narrative setting, 'by' naturally conveys
    location in idiomatic English. 'Sea of Tiberias' follows the Greek designation
    used in John.
- source_word: ἐφανέρωσεν δὲ οὕτως
  chosen: and he revealed himself in this way
  alternatives:
  - and he appeared in this way
  - and this is how he revealed himself
  lexicon: BDAG
  rationale: The repeated verb is retained for literary cohesion with the first clause.
    δέ is rendered with a simple connective, and οὕτως introduces the manner of the
    ensuing account.
