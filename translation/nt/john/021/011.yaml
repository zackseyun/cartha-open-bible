id: JHN.21.11
reference: John 21:11
source:
  edition: SBLGNT
  text: ἀνέβη ⸀οὖν Σίμων Πέτρος καὶ εἵλκυσεν τὸ δίκτυον ⸂εἰς τὴν γῆν⸃ μεστὸν ἰχθύων μεγάλων ἑκατὸν πεντήκοντα τριῶν· καὶ τοσούτων ὄντων οὐκ ἐσχίσθη τὸ δίκτυον.
translation:
  text: So Simon Peter went aboard and pulled the net onto the shore[a], full of large fish, one hundred fifty-three; and though there were so many[b], the net was not torn.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'went up'; the Greek verb is literally 'went up,' but in context likely means that Simon Peter got into or onto the boat to pull in the net.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to the land'; here 'shore' conveys the sense in context.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη
  chosen: went aboard
  alternatives:
  - went up
  - climbed aboard
  lexicon: BDAG
  rationale: Literally 'went up,' but in this narrative context it refers to Simon Peter getting into/onto the boat to handle the net. 'Went aboard' conveys the situational sense in natural English without over-paraphrasing.
- source_word: οὖν
  chosen: So
  alternatives:
  - therefore
  - then
  lexicon: BDAG
  rationale: Marks narrative consequence from the previous command and response. 'So' is a natural English connective in narrative.
- source_word: εἵλκυσεν
  chosen: pulled
  alternatives:
  - dragged
  - hauled
  lexicon: BDAG
  rationale: '''Pulled'' is clear modern English and fits the action of drawing in the net. ''Dragged'' may overemphasize abrasion; ''hauled'' is possible but slightly more idiomatic than necessary.'
- source_word: δίκτυον
  chosen: net
  lexicon: BDAG
  rationale: Standard and direct rendering of the fishing implement.
- source_word: εἰς τὴν γῆν
  chosen: onto the shore
  alternatives:
  - to the land
  - onto the land
  lexicon: BDAG
  rationale: γῆ can mean 'land/ground/earth'; here in a fishing scene it refers to bringing the net onto land from the water. 'Shore' best captures the contextual sense in idiomatic English.
- source_word: μεστὸν
  chosen: full of
  alternatives:
  - filled with
  lexicon: BDAG
  rationale: Natural rendering of the adjective describing the net's contents.
- source_word: ἰχθύων μεγάλων
  chosen: large fish
  alternatives:
  - big fish
  lexicon: BDAG
  rationale: Straightforward rendering; 'large' is slightly more formal and suits the narrative tone.
- source_word: ἑκατὸν πεντήκοντα τριῶν
  chosen: one hundred fifty-three
  alternatives:
  - a hundred and fifty-three
  lexicon: BDAG
  rationale: Direct rendering of the explicit number; modern English style favors 'one hundred fifty-three.'
- source_word: τοσούτων ὄντων
  chosen: though there were so many
  alternatives:
  - although there were so many of them
  - despite there being so many
  lexicon: BDAG
  rationale: Genitive absolute expressing concession in context. This rendering preserves the sense that the large number would normally threaten the net.
- source_word: ἐσχίσθη
  chosen: was not torn
  alternatives:
  - did not tear
  - was not split
  lexicon: BDAG
  rationale: Passive form is best reflected by 'was not torn.' It naturally describes the net's remaining intact under strain.
