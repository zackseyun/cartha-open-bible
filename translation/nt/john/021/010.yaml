id: JHN.21.10
reference: John 21:10
source:
  edition: SBLGNT
  text: λέγει αὐτοῖς ὁ Ἰησοῦς· Ἐνέγκατε ἀπὸ τῶν ὀψαρίων ὧν ἐπιάσατε νῦν.
translation:
  text: Jesus said to them, “Bring some of the fish that you have just caught.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, “Bring from the fish that you caught now.”
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  chosen: said
  alternatives:
  - says
  lexicon: BDAG
  rationale: Historical present in Greek is commonly rendered with an English past
    tense in narrative for natural readability, while preserving the discourse function.
- source_word: Ἐνέγκατε
  chosen: Bring
  alternatives:
  - Carry here
  - Bring here
  lexicon: BDAG
  rationale: Aorist imperative plural from φέρω calls for a direct command. 'Bring'
    is idiomatic and fits the context of moving fish to Jesus.
- source_word: ἀπὸ
  chosen: some of
  alternatives:
  - from
  - out of
  lexicon: BDAG
  rationale: With the partitive genitive τῶν ὀψαρίων, ἀπό indicates taking a portion
    from the larger catch. 'Some of' expresses the partitive sense more naturally
    than a bare 'from' in English.
- source_word: ὀψαρίων
  chosen: fish
  alternatives:
  - small fish
  - cooked fish
  lexicon: BDAG
  rationale: ὀψάριον can denote fish as food, often small fish, but here the immediate
    context concerns the catch just taken from the sea. 'Fish' is the clearest natural
    rendering without over-specifying size or preparation.
- source_word: ὧν ἐπιάσατε
  chosen: that you have just caught
  alternatives:
  - which you caught
  - that you caught
  lexicon: BDAG
  rationale: The relative clause identifies the fish in view. English present perfect
    ('have caught') works well with νῦν to connect the recent completed action to
    the present moment.
- source_word: νῦν
  chosen: just
  alternatives:
  - now
  - recently
  lexicon: BDAG
  rationale: 'In this context νῦν modifies the recent catch rather than merely marking
    present time. ''Just'' conveys immediacy in idiomatic English: ''have just caught.'''
